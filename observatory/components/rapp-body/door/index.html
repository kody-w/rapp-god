<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Herald — the body's doorman</title>
<link rel="icon" href="data:," />
<script>
  (() => {
    const param = new URLSearchParams(window.location.search).get("scoutTheme");
    const theme =
      param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
:root {
  color-scheme: light;
  --cp-bg: #f7f4ef;
  --cp-bg-elevated: #fcfbf8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #f5f5f5;
  --cp-border: #dedede;
  --cp-border-strong: #919191;
  --cp-text: #242424;
  --cp-text-muted: #5c5c5c;
  --cp-text-soft: #6f6f6f;
  --cp-accent: #b11f4b;
  --cp-accent-hover: #9a1a41;
  --cp-accent-soft: rgba(177, 31, 75, 0.08);
  --cp-accent-fg: #ffffff;
  --cp-success: #16a34a;
  --cp-danger: #dc2626;
  --cp-warning: #f59e0b;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(177, 31, 75, 0.12);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #3d3b3a;
  --cp-bg-elevated: #343231;
  --cp-surface: #292929;
  --cp-surface-soft: #2e2e2e;
  --cp-border: #474747;
  --cp-border-strong: #5f5f5f;
  --cp-text: #dedede;
  --cp-text-muted: #919191;
  --cp-text-soft: #b0b0b0;
  --cp-accent: #fd8ea1;
  --cp-accent-hover: #fb7b91;
  --cp-accent-soft: rgba(253, 142, 161, 0.14);
  --cp-accent-fg: #1a1a1a;
  --cp-success: #4ade80;
  --cp-danger: #f87171;
  --cp-warning: #fbbf24;
  --cp-link: #4da6ff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(41, 41, 41, 0.88);
  --cp-panel: rgba(41, 41, 41, 0.72);
  --cp-panel-strong: rgba(41, 41, 41, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(253, 142, 161, 0.12);
}

* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; }
body {
  background: var(--cp-bg);
  color: var(--cp-text);
  font: 15px/1.5 "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, input { font: inherit; }
button, a, input { -webkit-tap-highlight-color: var(--cp-highlight); }
a { color: var(--cp-link); }
a:hover { color: var(--cp-accent-hover); }
button:focus-visible, input:focus-visible, a:focus-visible {
  outline: 2px solid var(--cp-accent);
  outline-offset: 2px;
}
::selection { background: var(--cp-highlight); }

.page {
  width: min(900px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 20px 20px 16px;
  display: flex;
  flex-direction: column;
}
.masthead {
  padding: 8px 4px 18px;
  border-bottom: 1px solid var(--cp-border);
}
.title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.brand { display: flex; align-items: flex-start; gap: 12px; min-width: 0; }
.door-mark {
  color: var(--cp-accent);
  font-size: 24px;
  line-height: 1.2;
}
h1 { margin: 0; font-size: clamp(20px, 4vw, 27px); letter-spacing: -0.02em; }
.body-id {
  margin: 2px 0 0;
  color: var(--cp-text-muted);
  font: 12px/1.4 Consolas, "Courier New", Courier, monospace;
  overflow-wrap: anywhere;
}
.status {
  flex: 0 0 auto;
  border: 1px solid var(--cp-border);
  border-radius: 999px;
  background: var(--cp-surface);
  color: var(--cp-text-muted);
  padding: 4px 9px;
  font-size: 11px;
  font-weight: 700;
}
.status.connected { color: var(--cp-success); border-color: var(--cp-success); }
.status.unreachable { color: var(--cp-danger); border-color: var(--cp-danger); }
.header-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  margin-top: 12px;
  padding-left: 40px;
  font-size: 12px;
}
.header-links a { text-decoration-thickness: 1px; text-underline-offset: 3px; }
.born-pin {
  color: var(--cp-accent);
  font-family: Consolas, "Courier New", Courier, monospace;
}

main { flex: 1; padding: 18px 0 12px; }
.chat {
  overflow: hidden;
  border: 1px solid var(--cp-border);
  border-radius: 16px;
  background: var(--cp-surface);
  box-shadow: 0 1px 2px var(--cp-border);
}
.transcript {
  height: min(58vh, 590px);
  min-height: 360px;
  overflow-y: auto;
  padding: 20px;
  background: var(--cp-bg-elevated);
  scroll-behavior: smooth;
}
.message {
  display: flex;
  gap: 9px;
  margin: 0 0 16px;
  animation: arrive 160ms ease-out;
}
.message.user { justify-content: flex-end; }
.avatar {
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  display: grid;
  place-items: center;
  border: 1px solid var(--cp-border);
  border-radius: 50%;
  background: var(--cp-surface);
  color: var(--cp-accent);
  font-size: 12px;
  font-weight: 800;
}
.bubble {
  max-width: min(690px, calc(100% - 37px));
  border: 1px solid var(--cp-border);
  border-radius: 0.625rem;
  background: var(--cp-surface);
  padding: 10px 12px;
  box-shadow: 0 1px 2px var(--cp-border);
  overflow-wrap: anywhere;
}
.assistant .bubble { border-left: 3px solid var(--cp-accent); }
.user .bubble {
  border-color: var(--cp-accent);
  background: var(--cp-accent);
  color: var(--cp-accent-fg);
}
.bubble p { margin: 0 0 9px; }
.bubble p:last-child { margin-bottom: 0; }
.source-label, .memory-label, .event-type {
  display: inline-block;
  margin-right: 5px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.source-label {
  display: block;
  margin: 0 0 7px;
  color: var(--cp-accent);
}
.memory-label { color: var(--cp-warning); }
.event-type { color: var(--cp-text-muted); }
.receipt {
  white-space: nowrap;
  color: var(--cp-link);
  font: 11px/1.4 Consolas, "Courier New", Courier, monospace;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}
code {
  border: 1px solid var(--cp-border);
  border-radius: 4px;
  background: var(--cp-surface-soft);
  padding: 1px 4px;
  color: var(--cp-text);
  font-family: Consolas, "Courier New", Courier, monospace;
  font-size: 0.9em;
}
.reading { color: var(--cp-text-muted); font-style: italic; }

.composer {
  border-top: 1px solid var(--cp-border);
  padding: 12px;
  background: var(--cp-surface);
}
.suggestions {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 1px 1px 9px;
  scrollbar-width: thin;
}
.suggestion {
  flex: 0 0 auto;
  border: 1px solid var(--cp-border);
  border-radius: 999px;
  background: var(--cp-surface-soft);
  color: var(--cp-text);
  padding: 5px 9px;
  cursor: pointer;
  font-size: 12px;
}
.suggestion:hover { border-color: var(--cp-accent); background: var(--cp-accent-soft); }
.ask-form { display: flex; gap: 8px; }
.ask-input {
  min-width: 0;
  flex: 1;
  border: 1px solid var(--cp-border-strong);
  border-radius: 0.625rem;
  background: var(--cp-bg-elevated);
  color: var(--cp-text);
  padding: 9px 11px;
}
.ask-input::placeholder { color: var(--cp-text-muted); }
.ask-button {
  border: 1px solid var(--cp-accent);
  border-radius: 0.625rem;
  background: var(--cp-accent);
  color: var(--cp-accent-fg);
  padding: 9px 16px;
  font-weight: 750;
  cursor: pointer;
}
.ask-button:hover { border-color: var(--cp-accent-hover); background: var(--cp-accent-hover); }
button:disabled, input:disabled { cursor: not-allowed; opacity: 0.55; }
.hint { margin: 7px 2px 0; color: var(--cp-text-muted); font-size: 11px; }
footer {
  padding: 8px 4px 0;
  color: var(--cp-text-muted);
  font-size: 11px;
  text-align: center;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
@keyframes arrive {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 620px) {
  .page { padding: 12px 10px; }
  .title-row { display: block; }
  .status { display: inline-block; margin: 10px 0 0 40px; }
  .header-links { padding-left: 40px; }
  .transcript { min-height: 330px; padding: 14px 10px; }
  .bubble { max-width: calc(100% - 37px); }
  .ask-button { padding-inline: 12px; }
}
@media (prefers-reduced-motion: reduce) {
  .message { animation: none; }
  .transcript { scroll-behavior: auto; }
}
</style>
</head>
<body>
<div class="page">
  <header class="masthead">
    <div class="title-row">
      <div class="brand">
        <span class="door-mark" aria-hidden="true">🚪</span>
        <div>
          <h1>Herald — the body's doorman</h1>
          <p class="body-id" id="bodyId">body rappid …</p>
        </div>
      </div>
      <span class="status" id="brainstemStatus" role="status" hidden>brainstem: checking</span>
    </div>
    <nav class="header-links" aria-label="Herald links">
      <a class="born-pin" id="bornPin" href="../frames/24.json">born of frame 24</a>
      <a href="../player.html">▶ watch me</a>
      <a href="https://github.com/kody-w/rapp-body">repo</a>
    </nav>
  </header>

  <main>
    <section class="chat" aria-label="Ask Herald from the body's biography">
      <div class="transcript" id="transcript" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div class="composer">
        <div class="suggestions" role="group" aria-label="Suggested questions">
          <button class="suggestion" type="button" data-question="Who are you?">Who are you?</button>
          <button class="suggestion" type="button" data-question="How were you born?">Birth</button>
          <button class="suggestion" type="button" data-question="What is your lexicon?">Lexicon</button>
          <button class="suggestion" type="button" data-question="How is your health?">Health</button>
          <button class="suggestion" type="button" data-question="How many organs?">Organs</button>
          <button class="suggestion" type="button" data-question="Tell me your story.">Story</button>
          <button class="suggestion" type="button" data-question="How do I verify you?">Verify</button>
          <button class="suggestion" type="button" data-question="Witnessed or reconstructed?">Memory registers</button>
        </div>
        <form class="ask-form" id="askForm">
          <label class="sr-only" for="question">Ask Herald a question</label>
          <input class="ask-input" id="question" name="question" type="text" autocomplete="off"
            placeholder="Ask about a frame, date, organ, or event…" aria-describedby="askHint" disabled />
          <button class="ask-button" id="askButton" type="submit" disabled>Ask</button>
        </form>
        <p class="hint" id="askHint">Enter sends. Every answer comes from a frame or refuses to guess.</p>
      </div>
    </section>
  </main>

  <footer>A posting, never a product.</footer>
</div>

<script>
"use strict";
(() => {
  const REFUSAL = "My biography doesn't record that.";
  const STOP_WORDS = new Set([
    "a", "about", "am", "an", "and", "are", "as", "at", "be", "biography", "body",
    "can", "could", "did", "do", "does", "for", "from", "how", "i", "in", "is", "it",
    "know", "me", "my", "of", "on", "or", "please", "record", "recorded", "remember",
    "say", "tell", "that", "the", "this", "to", "was", "were", "what", "when", "where",
    "which", "who", "why", "with", "you", "your"
  ]);
  const MONTHS = {
    january: 0, jan: 0, february: 1, feb: 1, march: 2, mar: 2, april: 3, apr: 3,
    may: 4, june: 5, jun: 5, july: 6, jul: 6, august: 7, aug: 7,
    september: 8, sep: 8, sept: 8, october: 9, oct: 9, november: 10, nov: 10,
    december: 11, dec: 11
  };
  const VOICE_PREAMBLE = [
    "SYSTEM-STYLE PREAMBLE — You are Herald, the body's doorman.",
    "Speak from the supplied public biography frames, and only from those frames.",
    "Every factual claim must resolve to a supplied frame receipt.",
    `If the frames do not carry the answer, reply exactly: ${REFUSAL}`,
    "Never invent, guess, decorate, or pad.",
    "Always label reconstructed memory as reconstructed when quoting it.",
    "Witnessed means directly observed by the pulse; reconstructed means archaeology with evidence.",
    "The body is public bones only: do not introduce private data."
  ].join("\n");

  const byId = (id) => document.getElementById(id);
  const transcript = byId("transcript");
  const questionInput = byId("question");
  const askButton = byId("askButton");
  const suggestions = Array.from(document.querySelectorAll(".suggestion"));
  const state = {
    identity: null,
    index: null,
    indexBySeq: new Map(),
    sweep: null,
    frames: new Map(),
    allFramesPromise: null,
    busy: true,
    brainstem: { configured: false, url: null, connected: false }
  };

  function make(tag, className, text) {
    const element = document.createElement(tag);
    if (className) element.className = className;
    if (text !== undefined) element.textContent = text;
    return element;
  }

  async function loadJSON(url) {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status} for ${url}`);
    return response.json();
  }

  async function getFrame(seq) {
    if (!Number.isInteger(seq) || !state.indexBySeq.has(seq)) throw new Error(`unknown frame ${seq}`);
    if (!state.frames.has(seq)) {
      const meta = state.indexBySeq.get(seq);
      const framePath = meta.path && meta.path.startsWith("frames/")
        ? `../${meta.path}`
        : `../frames/${seq}.json`;
      const pending = loadJSON(framePath).then((frame) => {
        if (frame.seq !== seq) throw new Error(`frame ${seq} has mismatched sequence`);
        return frame;
      }).catch((error) => {
        state.frames.delete(seq);
        throw error;
      });
      state.frames.set(seq, pending);
    }
    return state.frames.get(seq);
  }

  async function loadAllFrames() {
    if (!state.allFramesPromise) {
      state.allFramesPromise = Promise.all(state.index.frames.map((meta) => getFrame(meta.seq)))
        .catch((error) => {
          state.allFramesPromise = null;
          throw error;
        });
    }
    return state.allFramesPromise;
  }

  function memoryMode(frame) {
    return frame.payload && frame.payload.provenance
      && frame.payload.provenance.mode === "reconstructed" ? "reconstructed" : "witnessed";
  }

  function receipt(frame) {
    const mode = memoryMode(frame);
    const link = make("a", "receipt");
    link.href = `../frames/${frame.seq}.json`;
    link.textContent = `[seq ${frame.seq} · ${String(frame.ts).slice(0, 10)} · ${mode} · ${String(frame.sha256).slice(0, 8)}]`;
    link.setAttribute("aria-label", `Receipt: frame ${frame.seq}, ${String(frame.ts).slice(0, 10)}, ${mode}, sha256 ${String(frame.sha256).slice(0, 8)}`);
    return link;
  }

  function addClaim(root, content, frame, className) {
    const paragraph = make("p", className || "");
    const parts = Array.isArray(content) ? content : [content];
    for (const part of parts) paragraph.append(part);
    if (frame) {
      paragraph.append(" ");
      paragraph.append(receipt(frame));
    }
    root.append(paragraph);
    return paragraph;
  }

  function eventText(event) {
    if (typeof event.text === "string" && event.text) return event.text;
    if (typeof event.detail === "string" && event.detail) return event.detail;
    if (Array.isArray(event.repos) && event.repos.length) {
      if (event.type === "birth") return `${event.repos.length} organ(s) appeared: ${event.repos.join(", ")}.`;
      if (event.type === "vanish") return `${event.repos.length} organ(s) vanished: ${event.repos.join(", ")}.`;
      return `${event.repos.length} organ(s): ${event.repos.join(", ")}.`;
    }
    return `${event.type}.`;
  }

  function addEventClaim(root, frame, event) {
    const parts = [];
    if (memoryMode(frame) === "reconstructed") {
      parts.push(make("span", "memory-label", "reconstructed"), " ");
    }
    parts.push(make("span", "event-type", event.type), " ");
    const quote = make("q", "", eventText(event));
    parts.push(quote);
    addClaim(root, parts, frame);
  }

  function addRefusal(root) {
    addClaim(root, REFUSAL, null);
  }

  function addUserMessage(question) {
    const article = make("article", "message user");
    article.setAttribute("aria-label", "You");
    article.append(make("div", "bubble", question));
    transcript.append(article);
    scrollTranscript();
  }

  function addAssistantMessage(intent, sourceLabel) {
    const article = make("article", "message assistant");
    article.dataset.intent = intent;
    article.setAttribute("aria-label", "Herald");
    article.append(make("div", "avatar", "H"));
    const bubble = make("div", "bubble");
    if (sourceLabel) bubble.append(make("span", "source-label", sourceLabel));
    article.append(bubble);
    transcript.append(article);
    scrollTranscript();
    return bubble;
  }

  function scrollTranscript() {
    transcript.scrollTo({ top: transcript.scrollHeight, behavior: "smooth" });
  }

  function setBusy(busy) {
    state.busy = busy;
    questionInput.disabled = busy;
    askButton.disabled = busy;
    for (const button of suggestions) button.disabled = busy;
  }

  function shortRappid(value) {
    const text = String(value || "");
    const colon = text.lastIndexOf(":");
    return colon === -1 ? text : `${text.slice(0, colon + 1)}${text.slice(colon + 1, colon + 9)}…`;
  }

  function verifyBirthPin(frame) {
    const pin = state.identity && state.identity.born_of_frame;
    if (!pin || frame.seq !== pin.seq || frame.sha256 !== pin.sha256) {
      throw new Error("born_of_frame pin does not match its frame");
    }
  }

  function allEventRefs(frames) {
    const refs = [];
    for (const frame of frames) {
      const events = frame.payload && Array.isArray(frame.payload.events) ? frame.payload.events : [];
      events.forEach((event, eventIndex) => refs.push({ frame, event, eventIndex }));
    }
    return refs;
  }

  async function recentEvents(types, limit, predicate) {
    const wanted = new Set(types);
    const found = [];
    for (let i = state.index.frames.length - 1; i >= 0 && found.length < limit; i--) {
      const frame = await getFrame(state.index.frames[i].seq);
      const events = frame.payload && Array.isArray(frame.payload.events) ? frame.payload.events : [];
      for (let j = events.length - 1; j >= 0 && found.length < limit; j--) {
        const event = events[j];
        if (wanted.has(event.type) && (!predicate || predicate(event))) {
          found.push({ frame, event, eventIndex: j });
        }
      }
    }
    return found;
  }

  async function renderIntro(root) {
    const frame = await getFrame(state.identity.born_of_frame.seq);
    verifyBirthPin(frame);
    addClaim(root, `${state.identity.display_name}.`, frame);
    addClaim(root, `I was born of frame ${frame.seq} to answer at the membrane from the public biography.`, frame);
    addClaim(root, "I front the door; the body's memory is behind me.", frame);
  }

  async function renderBirth(root) {
    const frame = await getFrame(state.identity.born_of_frame.seq);
    verifyBirthPin(frame);
    const events = frame.payload.events || [];
    const birth = events.find((event) => event.type === "birth" && event.text);
    const lexicon = events.find((event) => event.type === "lexicon-sealed");
    if (birth) addEventClaim(root, frame, birth);
    if (lexicon) addEventClaim(root, frame, lexicon);
    const cradle = await getFrame(0);
    const firstRepo = cradle.payload.census && cradle.payload.census.repos
      && cradle.payload.census.repos[0] ? cradle.payload.census.repos[0].name : "RAPP";
    addClaim(root, [
      make("span", "memory-label", "reconstructed"), " ",
      `The cradle is dated ${String(cradle.ts).slice(0, 10)}; ${firstRepo} is the one recorded organ.`
    ], cradle);
  }

  async function renderLexicon(root) {
    const frame = await getFrame(state.identity.born_of_frame.seq);
    const event = (frame.payload.events || []).find((item) => item.type === "lexicon-sealed");
    if (!event) {
      addRefusal(root);
      return;
    }
    addEventClaim(root, frame, event);
    const hash = event.lexicon_sha || frame.payload.lexicon_sha || state.identity.lexicon_sha;
    const lexiconLink = make("a", "", "LEXICON.md");
    lexiconLink.href = "https://github.com/kody-w/RAPP/blob/main/LEXICON.md";
    addClaim(root, ["lexicon_sha ", make("code", "", hash), " · ", lexiconLink], frame);
  }

  async function renderHealth(root) {
    const latest = await getFrame(state.index.head.seq);
    const sync = latest.payload.vitals && latest.payload.vitals.sync;
    const sweep = state.sweep || {};
    const verdict = sweep.verdict || (sync && sync.verdict);
    const gate = sweep.gate || null;
    if (verdict || gate) {
      const parts = [];
      if (verdict) parts.push(`Latest sweep: ${verdict}.`);
      if (gate) parts.push(` Gate: ${gate}.`);
      addClaim(root, parts, latest);
    }
    if (sync) {
      const open = latest.payload.vitals.drift_issues
        && latest.payload.vitals.drift_issues.open;
      addClaim(root, `Latest recorded drift: ${sync.findings} findings, ${sync.high} high, ${open} open drift() issues.`, latest);
    }
    const delta = await recentEvents(["drift-delta"], 1);
    if (delta.length) addEventClaim(root, delta[0].frame, delta[0].event);
  }

  async function renderOrgans(root) {
    const latest = await getFrame(state.index.head.seq);
    const census = latest.payload.census || {};
    const present = census.present === undefined ? "" : `; ${census.present} present`;
    addClaim(root, `The latest census records ${census.count} organs${present}.`, latest);
    const changes = await recentEvents(
      ["birth", "vanish"],
      4,
      (event) => Array.isArray(event.repos) && event.repos.length > 0
    );
    for (const ref of changes) addEventClaim(root, ref.frame, ref.event);
  }

  function temporalRequest(question) {
    const frameMatch = question.match(/\b(?:frame|seq(?:uence)?)\s*#?\s*(\d+)\b/i);
    if (frameMatch) return { kind: "frame", seq: Number(frameMatch[1]) };

    const isoMatch = question.match(/\b(\d{4}-\d{2}-\d{2})\b/);
    if (isoMatch) {
      const value = isoMatch[1];
      const parsed = new Date(`${value}T12:00:00Z`);
      const valid = !Number.isNaN(parsed.getTime()) && parsed.toISOString().slice(0, 10) === value;
      return valid ? { kind: "date", date: value, explicitYear: true } : { kind: "invalid" };
    }

    const monthMatch = question.match(/\b(january|jan|february|feb|march|mar|april|apr|may|june|jun|july|jul|august|aug|september|sept|sep|october|oct|november|nov|december|dec)\s+(\d{1,2})(?:,?\s+(\d{4}))?\b/i);
    if (!monthMatch) return null;
    const month = MONTHS[monthMatch[1].toLowerCase()];
    const day = Number(monthMatch[2]);
    const latestYear = Number(String(state.index.head.ts).slice(0, 4));
    const year = monthMatch[3] ? Number(monthMatch[3]) : latestYear;
    const parsed = new Date(Date.UTC(year, month, day, 12));
    if (parsed.getUTCFullYear() !== year || parsed.getUTCMonth() !== month || parsed.getUTCDate() !== day) {
      return { kind: "invalid" };
    }
    return {
      kind: "date",
      date: parsed.toISOString().slice(0, 10),
      monthDay: parsed.toISOString().slice(5, 10),
      explicitYear: Boolean(monthMatch[3])
    };
  }

  function resolveDate(request) {
    let exact;
    if (!request.explicitYear && request.monthDay) {
      exact = state.index.frames.filter((meta) => String(meta.ts).slice(5, 10) === request.monthDay);
    } else {
      exact = state.index.frames.filter((meta) => String(meta.ts).slice(0, 10) === request.date);
    }
    if (exact.length) return { meta: exact[exact.length - 1], exact: true };

    const target = Date.parse(`${request.date}T12:00:00Z`);
    let nearest = null;
    let nearestDistance = Number.POSITIVE_INFINITY;
    for (const meta of state.index.frames) {
      const distance = Math.abs(Date.parse(meta.ts) - target);
      if (distance < nearestDistance || (distance === nearestDistance && meta.seq > nearest.seq)) {
        nearest = meta;
        nearestDistance = distance;
      }
    }
    return nearest ? { meta: nearest, exact: false } : null;
  }

  async function renderTemporal(root, question) {
    const request = temporalRequest(question);
    if (!request || request.kind === "invalid") {
      addRefusal(root);
      return;
    }
    let frame;
    if (request.kind === "frame") {
      if (!state.indexBySeq.has(request.seq)) {
        addRefusal(root);
        return;
      }
      frame = await getFrame(request.seq);
      addClaim(root, `Frame ${frame.seq} is the ${memoryMode(frame)} slice for ${String(frame.ts).slice(0, 10)}.`, frame);
    } else {
      const resolved = resolveDate(request);
      if (!resolved) {
        addRefusal(root);
        return;
      }
      frame = await getFrame(resolved.meta.seq);
      const wording = resolved.exact ? "The latest recorded slice on" : "The nearest recorded slice to";
      addClaim(root, `${wording} ${request.date} is frame ${frame.seq}, dated ${String(frame.ts).slice(0, 10)}.`, frame);
    }
    const events = frame.payload && Array.isArray(frame.payload.events) ? frame.payload.events : [];
    if (!events.length) {
      addClaim(root, "This slice records no events.", frame);
      return;
    }
    for (const event of events) addEventClaim(root, frame, event);
  }

  async function renderStory(root) {
    const frames = await loadAllFrames();
    const refs = allEventRefs(frames);
    const selected = [{ frame: frames[0], event: null, eventIndex: -1, cradle: true }];
    const canons = refs.filter((ref) => ref.event.type === "canon");
    if (canons.length) selected.push(canons[0]);
    if (canons.length > 1) selected.push(canons[canons.length - 1]);
    const firstGenesis = refs.find((ref) => ref.event.type === "genesis");
    const firstSweep = refs.find((ref) => ref.event.type === "sweep");
    const drift = refs.filter((ref) => ref.event.type === "drift-delta").pop();
    const spec = refs.filter((ref) => ref.event.type === "spec-version-change").pop();
    const publicBirth = refs.filter((ref) => ref.event.type === "birth" && ref.event.text).pop();
    for (const ref of [firstGenesis, firstSweep, publicBirth, spec, drift]) {
      if (ref) selected.push(ref);
    }
    const unique = Array.from(new Map(selected.map((ref) => {
      const key = `${ref.frame.seq}:${ref.eventIndex}:${ref.cradle ? "cradle" : ref.event.type}`;
      return [key, ref];
    })).values()).sort((a, b) => a.frame.seq - b.frame.seq || a.eventIndex - b.eventIndex).slice(0, 8);

    for (const ref of unique) {
      if (ref.cradle) {
        const repo = ref.frame.payload.census.repos[0];
        addClaim(root, [
          make("span", "memory-label", "reconstructed"), " ",
          `Cradle: ${repo.name} is the first recorded organ.`
        ], ref.frame);
      } else {
        addEventClaim(root, ref.frame, ref.event);
      }
    }
  }

  async function renderVerify(root) {
    const frame = await getFrame(state.identity.born_of_frame.seq);
    verifyBirthPin(frame);
    const cradle = await getFrame(0);
    addClaim(root, "Fetch a frame, canonicalize its payload with recursively sorted object keys, recompute sha256, then follow parent_sha to the preceding frame.", frame);
    addClaim(root, "The cradle closes the walk with parent_sha null.", cradle);
    const verifier = make("a", "", "tools/verify-chain.mjs");
    verifier.href = "../tools/verify-chain.mjs";
    addClaim(root, [verifier, " performs the integrity, linkage, sequence, time, and provenance checks."], frame);
    addClaim(root, [
      `Herald's born_of_frame pin names frame ${frame.seq} at `,
      make("code", "", frame.sha256),
      "; matching that pin makes this door's parent moment checkable."
    ], frame);
  }

  async function renderRegisters(root) {
    const reconstructed = await getFrame(0);
    const witnessedMeta = state.index.frames.find((meta) => meta.kind === "body.pulse");
    const witnessed = witnessedMeta ? await getFrame(witnessedMeta.seq) : null;
    addClaim(root, [
      make("span", "memory-label", "reconstructed"), " ",
      "memory is archaeology carried with evidence. Sepia marks that register; it is never presented as direct witness."
    ], reconstructed);
    if (witnessed) {
      addClaim(root, "Witnessed memory is a slice the pulse observed directly with the body's eyes open.", witnessed);
    }
  }

  function searchTerms(question) {
    return Array.from(new Set(
      question.toLowerCase().replace(/[^a-z0-9-]+/g, " ").trim().split(/\s+/)
        .filter((term) => term.length > 1 && !STOP_WORDS.has(term))
    ));
  }

  async function matchingEvents(question, limit) {
    const frames = await loadAllFrames();
    const terms = searchTerms(question);
    if (!terms.length) return [];
    const normalizedQuestion = question.toLowerCase().trim();
    const matches = [];
    for (const ref of allEventRefs(frames)) {
      const haystack = [
        ref.event.type,
        eventText(ref.event),
        Array.isArray(ref.event.repos) ? ref.event.repos.join(" ") : ""
      ].join(" ").toLowerCase();
      let score = haystack.includes(normalizedQuestion) ? 10 : 0;
      for (const term of terms) if (haystack.includes(term)) score++;
      if (score > 0) matches.push({ ...ref, score });
    }
    matches.sort((a, b) => b.score - a.score || b.frame.seq - a.frame.seq || a.eventIndex - b.eventIndex);
    return matches.slice(0, limit);
  }

  function frameContext(refs) {
    const grouped = new Map();
    for (const ref of refs) {
      if (!grouped.has(ref.frame.seq)) grouped.set(ref.frame.seq, { frame: ref.frame, events: [] });
      grouped.get(ref.frame.seq).events.push(ref.event);
    }
    return Array.from(grouped.values()).map(({ frame, events }) => [
      `FRAME seq=${frame.seq} date=${String(frame.ts).slice(0, 10)} mode=${memoryMode(frame)} sha256=${frame.sha256} parent_sha=${frame.parent_sha}`,
      ...events.map((event) => `EVENT type=${event.type} text=${JSON.stringify(eventText(event))}`)
    ].join("\n")).join("\n\n");
  }

  async function brainstemReply(question, refs) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);
    try {
      const userInput = [
        VOICE_PREAMBLE,
        "",
        "SUPPLIED FRAME CONTEXT:",
        frameContext(refs) || "(no matching frame context)",
        "",
        `QUESTION: ${question}`
      ].join("\n");
      const response = await fetch(`${state.brainstem.url}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_input: userInput }),
        signal: controller.signal
      });
      if (!response.ok) throw new Error(`brainstem HTTP ${response.status}`);
      const payload = await response.json();
      if (!payload || typeof payload.response !== "string" || !payload.response.trim()) {
        throw new Error("brainstem response missing response");
      }
      return payload.response.trim();
    } finally {
      clearTimeout(timer);
    }
  }

  async function renderFallback(root, question) {
    const refs = await matchingEvents(question, 5);
    if (state.brainstem.connected) {
      try {
        const reply = await brainstemReply(question, refs);
        if (refs.length || reply === REFUSAL) {
          root.prepend(make("span", "source-label", "via your brainstem, from my frames"));
          if (reply === REFUSAL) {
            addRefusal(root);
            if (refs.length) {
              const receiptRow = make("p");
              const uniqueFrames = Array.from(new Map(refs.map((ref) => [ref.frame.seq, ref.frame])).values());
              for (const frame of uniqueFrames) {
                receiptRow.append(receipt(frame), " ");
              }
              root.append(receiptRow);
            }
          } else {
            const paragraph = addClaim(root, reply, null);
            const uniqueFrames = Array.from(new Map(refs.map((ref) => [ref.frame.seq, ref.frame])).values());
            for (const frame of uniqueFrames) {
              paragraph.append(" ");
              paragraph.append(receipt(frame));
            }
          }
          return;
        }
      } catch {}
    }
    if (!refs.length) {
      addRefusal(root);
      return;
    }
    for (const ref of refs) addEventClaim(root, ref.frame, ref.event);
  }

  function classifyIntent(question) {
    const lower = question.toLowerCase();
    if (temporalRequest(question)) return "temporal";
    if (/\bwho\s+(?:are|r)\s+you\b/.test(lower) || /\bwhat\s+is\s+this\b/.test(lower) || /\bwhat\s+are\s+you\b/.test(lower)) return "intro";
    if (/\bhealth\b|\bdrift\b|\bsweep\b|\bsick\b/.test(lower)) return "health";
    if (/\borgans?\b|\brepos?\b|\brepositories\b|\bhow\s+many\b/.test(lower)) return "organs";
    if (/\bborn\b|\bbirth\b|\bgenesis\b/.test(lower)) return "birth";
    if (/\blexicon\b|\blanguage\b|\bsealed\b/.test(lower)) return "lexicon";
    if (/\bstory\b|\bhistory\b|\btimeline\b|\blife\b/.test(lower)) return "story";
    if (/\bverify\b|\bproof\b|\btrust\b|\bfake\b/.test(lower)) return "verify";
    if (/\bwitnessed\b|\breconstructed\b|\bsepia\b/.test(lower)) return "registers";
    return "fallback";
  }

  async function renderIntent(root, intent, question) {
    if (intent === "intro") return renderIntro(root);
    if (intent === "birth") return renderBirth(root);
    if (intent === "lexicon") return renderLexicon(root);
    if (intent === "health") return renderHealth(root);
    if (intent === "organs") return renderOrgans(root);
    if (intent === "temporal") return renderTemporal(root, question);
    if (intent === "story") return renderStory(root);
    if (intent === "verify") return renderVerify(root);
    if (intent === "registers") return renderRegisters(root);
    return renderFallback(root, question);
  }

  async function ask(question) {
    const trimmed = String(question || "").trim();
    if (!trimmed || state.busy) return;
    setBusy(true);
    addUserMessage(trimmed);
    const intent = classifyIntent(trimmed);
    const root = addAssistantMessage(intent);
    const reading = make("p", "reading", "reading the frames…");
    root.append(reading);
    try {
      await renderIntent(root, intent, trimmed);
      reading.remove();
    } catch {
      root.replaceChildren();
      addClaim(root, "I cannot reach that part of my biography.", null);
    } finally {
      setBusy(false);
      questionInput.value = "";
      questionInput.focus();
      scrollTranscript();
    }
  }

  function configuredBrainstem() {
    const raw = new URLSearchParams(window.location.search).get("brainstem");
    if (raw === null) return null;
    try {
      const url = new URL(raw);
      if (url.protocol !== "http:" && url.protocol !== "https:") return "";
      return url.href.replace(/\/+$/, "");
    } catch {
      return "";
    }
  }

  async function probeBrainstem() {
    const status = byId("brainstemStatus");
    const configured = configuredBrainstem();
    if (configured === null) return;
    state.brainstem.configured = true;
    state.brainstem.url = configured;
    status.hidden = false;
    if (!configured) {
      status.textContent = "brainstem: unreachable";
      status.className = "status unreachable";
      return;
    }
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3500);
    try {
      const response = await fetch(`${configured}/health`, {
        cache: "no-store",
        signal: controller.signal
      });
      const payload = response.ok ? await response.json() : null;
      if (!response.ok || !payload || payload.status !== "ok") throw new Error("unhealthy");
      state.brainstem.connected = true;
      status.textContent = "brainstem: connected";
      status.className = "status connected";
    } catch {
      status.textContent = "brainstem: unreachable";
      status.className = "status unreachable";
    } finally {
      clearTimeout(timer);
    }
  }

  async function boot() {
    void probeBrainstem();
    const root = addAssistantMessage("intro");
    const reading = make("p", "reading", "opening the biography…");
    root.append(reading);
    try {
      const [identity, index, sweep] = await Promise.all([
        loadJSON("rappid.json"),
        loadJSON("../frames/index.json"),
        loadJSON("../sweeps/latest.json").catch(() => null)
      ]);
      state.identity = identity;
      state.index = index;
      state.sweep = sweep;
      state.indexBySeq = new Map(index.frames.map((meta) => [meta.seq, meta]));
      byId("bodyId").textContent = `body ${shortRappid(identity.parent_rappid)}`;
      const bornPin = byId("bornPin");
      bornPin.href = `../frames/${identity.born_of_frame.seq}.json`;
      bornPin.textContent = `born of frame ${identity.born_of_frame.seq}`;
      bornPin.title = `sha256 ${identity.born_of_frame.sha256}`;
      await renderIntro(root);
      reading.remove();
      setBusy(false);
      questionInput.focus();
    } catch {
      root.replaceChildren();
      addClaim(root, "I cannot read the frames here. Serve the repository over HTTP so relative biography fetches are available.", null);
    }
  }

  byId("askForm").addEventListener("submit", (event) => {
    event.preventDefault();
    void ask(questionInput.value);
  });
  for (const button of suggestions) {
    button.addEventListener("click", () => void ask(button.dataset.question));
  }

  boot();
})();
</script>
</body>
</html>
