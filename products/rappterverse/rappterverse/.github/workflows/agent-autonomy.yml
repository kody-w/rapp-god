name: Agent Autonomy

on:
  # schedule:
  #   - cron: '*/15 * * * *'
  # NOTE: Cron is intentionally disabled. Budget math doesn't work:
  #   */15 * 5 agents = ~480 LLM calls/day, but LLM_DAILY_BUDGET = 200.
  # The world would sleep most of the day. Use scripts/local_platform.sh
  # (no budget cap when running locally) or trigger via:
  #   - repository_dispatch (external webhook)
  #   - workflow_dispatch (UI / `gh workflow run`)
  # See commit history for the experiment that proved the math wrong.
  repository_dispatch:           # On-demand via API
    types: [agent-action]
  workflow_dispatch:             # Manual trigger
    inputs:
      agent_id:
        description: 'Specific agent to activate (e.g. warden-001)'
        required: false
      world:
        description: 'Activate all agents in a world (e.g. dungeon)'
        required: false
      respond_to:
        description: 'Message ID to respond to (e.g. msg-1500)'
        required: false
      max_agents:
        description: 'Max agents for ambient mode (default: 5)'
        required: false
        default: '5'

concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build agent registry
        run: python scripts/build_agent_registry.py

      - name: Run agent dispatch (lispy VM)
        run: |
          # Determine dispatch mode from trigger type
          AGENT_ID="${{ github.event.client_payload.agent_id }}${{ github.event.inputs.agent_id }}"
          WORLD="${{ github.event.client_payload.world }}${{ github.event.inputs.world }}"
          RESPOND_TO="${{ github.event.client_payload.respond_to }}${{ github.event.inputs.respond_to }}"
          MAX_AGENTS="${{ github.event.inputs.max_agents || '5' }}"
          POKE="${{ github.event.client_payload.poke }}"

          POKE_FLAG=""
          if [ "$POKE" = "true" ]; then POKE_FLAG="--poke"; fi

          # --brainstem activates the lispy VM (scripts/lisp_vm.py):
          # multi-step LLM reasoning per encounter, sleep-on-no-LLM,
          # per-archetype attention, zombie-goal invalidation. Without
          # it, the legacy single-shot path runs (still works, just
          # less expressive).
          if [ -n "$AGENT_ID" ]; then
            echo "🎯 Dispatching single agent: $AGENT_ID"
            python scripts/agent_dispatch.py --agent "$AGENT_ID" $POKE_FLAG --brainstem --no-push
          elif [ -n "$RESPOND_TO" ]; then
            echo "↩️ Responding to message: $RESPOND_TO"
            python scripts/agent_dispatch.py --respond-to "$RESPOND_TO" --brainstem --no-push
          elif [ -n "$WORLD" ]; then
            echo "🌍 Dispatching world: $WORLD"
            python scripts/agent_dispatch.py --world "$WORLD" --brainstem --no-push
          else
            echo "🤖 Ambient activity — up to $MAX_AGENTS agents (lispy VM)"
            python scripts/agent_dispatch.py --all --max-agents "$MAX_AGENTS" --brainstem --no-push
          fi
        env:
          GH_TOKEN: ${{ secrets.MODELS_TOKEN || secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR if state changed
        id: create_pr
        run: |
          git diff --quiet -- state/ worlds/ feed/ && echo "No state changes to commit" && exit 0

          BRANCH="auto/agent-dispatch-$(date -u '+%Y%m%d-%H%M%S')"
          git config --local user.email "action@github.com"
          git config --local user.name "RAPPverse Bot"
          git checkout -b "$BRANCH"
          git add state/ worlds/ feed/
          git commit -m "[action] Agent dispatch — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --set-upstream origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "[action] Agent dispatch activity" \
            --body "Automated agent activity via unified dispatch." \
            --base main \
            --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo $PR_URL | grep -o '[0-9]*$')" >> "$GITHUB_OUTPUT"
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wake durable state queue
        if: steps.create_pr.outputs.has_pr == 'true'
        run: gh workflow run state-drain.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
