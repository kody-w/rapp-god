name: Regression Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Classify derived-state ownership
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | grep -Ev '^(state|worlds|feed)/' \
            | grep -q .; then
            echo "ALLOW_DERIVED_STATE_DRIFT=0" >> "$GITHUB_ENV"
          else
            echo "ALLOW_DERIVED_STATE_DRIFT=1" >> "$GITHUB_ENV"
          fi

      - name: Run regression tests
        run: python scripts/test_state_integrity.py -v

      - name: Run deterministic world-pack compiler tests
        run: python -m unittest discover -s tests -p 'test_world_pack_compiler.py' -v

      - name: Validate inert universe-lock sentinel
        run: python -m unittest discover -s tests -p 'test_universe_lock_v2.py' -v

      - name: Run frontend trust tests
        run: node scripts/test_frontend_security.js

      - name: Verify frontend bundle is current
        if: env.ALLOW_DERIVED_STATE_DRIFT != '1'
        run: |
          bash scripts/bundle.sh
          git diff --exit-code -- docs/index.html

  report-scheduled-failure:
    name: Report scheduled failure
    needs: [test]
    if: >-
      always() &&
      github.event_name == 'schedule' &&
      needs.test.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 Regression test failure — $(date -u '+%Y-%m-%d')" \
            --body "The daily regression test suite failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --label "bug"
