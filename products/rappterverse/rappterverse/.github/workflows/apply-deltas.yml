name: Apply Inbox Deltas

on:
  workflow_dispatch:

concurrency:
  group: state-writer
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  wake-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Continue durable state queue
        run: gh workflow run state-drain.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
