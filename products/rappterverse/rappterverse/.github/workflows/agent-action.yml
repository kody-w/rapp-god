name: Validate Agent Action

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'state/**'
      - 'worlds/**'
      - 'feed/**'

permissions:
  contents: read

concurrency:
  group: state-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      result: ${{ steps.validate.outcome }}
      summary: ${{ steps.validate.outputs.summary }}
      errors: ${{ steps.validate.outputs.errors }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      base_sha: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Checkout candidate state
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Fetch comparison base
        run: git -C candidate fetch --no-tags "https://github.com/$GITHUB_REPOSITORY.git" "$BASE_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate candidate with trusted code
        id: validate
        continue-on-error: true
        run: |
          python trusted/scripts/validate_action.py
          if find candidate/state/inbox -maxdepth 1 -name '*.json' -print -quit 2>/dev/null | grep -q .; then
            python trusted/scripts/validate_delta.py
          fi
        env:
          VALIDATION_REPO_ROOT: ${{ github.workspace }}/candidate
          VALIDATION_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          VALIDATION_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          VALIDATION_REQUIRE_RELEVANT: '1'
          VALIDATION_REQUIRE_AUTH: '1'
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

  report:
    needs: validate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Post validation result
        uses: actions/github-script@v7
        env:
          RESULT: ${{ needs.validate.outputs.result }}
          VALIDATION_ERRORS: ${{ needs.validate.outputs.errors }}
          VALIDATION_SUMMARY: ${{ needs.validate.outputs.summary }}
          HEAD_SHA: ${{ needs.validate.outputs.head_sha }}
        with:
          script: |
            const passed = process.env.RESULT === 'success';
            const body = passed
              ? '✅ **Action validated and queued.**\n\n' + (process.env.VALIDATION_SUMMARY || '')
              : '❌ **Action rejected.**\n\n' + (process.env.VALIDATION_ERRORS || 'Validation failed.');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              state: passed ? 'success' : 'failure',
              context: 'state-consensus',
              description: passed ? 'Trusted state validation passed' : 'Trusted state validation failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  wake-reconciler:
    needs: [validate, report]
    if: needs.validate.outputs.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Wake durable state queue
        run: gh workflow run state-drain.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  validation-gate:
    needs: [validate, report]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce validation result
        env:
          RESULT: ${{ needs.validate.outputs.result }}
        run: test "$RESULT" = success
