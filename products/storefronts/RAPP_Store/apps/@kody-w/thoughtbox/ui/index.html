<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Thoughtbox</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #15171c;
    --panel-2: #1b1e25;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8a93a4;
    --accent: #7aa2f7;
    --accent-2: #9ece6a;
    --danger: #f7768e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  body { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }
  header { padding: 14px 18px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
  header .pill { font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .toolbar { display: flex; gap: 6px; padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .toolbar input, .toolbar button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 6px; font: inherit; outline: none;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .toolbar input { flex: 1; min-width: 120px; }
  .toolbar button { cursor: pointer; transition: background .15s, border-color .15s; }
  .toolbar button:hover { background: var(--border); border-color: var(--accent); }
  .toolbar button.danger:hover { border-color: var(--danger); color: var(--danger); }
  main { overflow-y: auto; padding: 14px 16px 8px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .entry { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 8px; }
  .entry .meta { display: flex; gap: 10px; margin-bottom: 6px; font-size: 11px; color: var(--muted); }
  .entry .meta time { font-variant-numeric: tabular-nums; }
  .entry .meta .id { font-family: ui-monospace, "SF Mono", monospace; }
  .entry .meta .del { margin-left: auto; cursor: pointer; padding: 0 6px; border-radius: 4px;
    background: transparent; border: 1px solid transparent; color: var(--muted); }
  .entry .meta .del:hover { color: var(--danger); border-color: var(--danger); }
  .entry .text { white-space: pre-wrap; word-wrap: break-word; }
  .entry .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  .entry .tag { font-size: 11px; padding: 2px 7px; border-radius: 3px;
    background: var(--panel-2); color: var(--accent); cursor: pointer; }
  .entry .tag:hover { background: var(--border); }
  footer { padding: 10px 14px; background: var(--panel); border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end; }
  footer textarea { flex: 1; resize: none; padding: 8px 10px; border-radius: 6px;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    font: inherit; line-height: 1.4; min-height: 38px; max-height: 160px; outline: none; }
  footer textarea:focus { border-color: var(--accent); }
  footer button { background: var(--accent); color: #0e0f12; border: none; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-weight: 600; }
  footer button:hover { background: #8db3f9; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--accent-2); color: #0e0f12; padding: 8px 14px; border-radius: 6px;
    opacity: 0; transition: opacity .25s; pointer-events: none; font-weight: 600; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); }
  .stats-row { font-size: 12px; color: var(--muted); padding: 4px 0 8px; }
</style>
</head>
<body>
  <header>
    <h1>📓 Thoughtbox</h1>
    <span class="pill" id="pill">— entries</span>
  </header>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search text or #tag..." />
    <button id="export-btn" title="Export all entries as JSON">Export</button>
    <button id="import-btn" title="Import entries from JSON">Import</button>
    <button id="clear-btn" class="danger" title="Clear search/filter">Clear</button>
  </div>
  <main>
    <div class="stats-row" id="stats"></div>
    <div id="entries"><div class="empty">Loading…</div></div>
  </main>
  <footer>
    <textarea id="input" rows="1"
      placeholder="Append a thought… (Enter to save, Shift+Enter for newline; type #tag to tag it)"></textarea>
    <button id="send">Save</button>
  </footer>
  <div id="toast" class="toast"></div>

<script>
(function () {
  "use strict";

  // ── Cartridge protocol bridge ───────────────────────────────────────────
  // The brainstem runtime hosts this iframe and listens for postMessage
  // envelopes of shape { rapp: "invoke", id, action, args }.
  const PARENT = window.parent !== window ? window.parent : null;
  const pending = new Map();
  let nextId = 1;

  function invoke(action, args = {}) {
    if (!PARENT) {
      // Standalone preview — fake a no-op echo so the UI stays interactive.
      return Promise.resolve({ ok: false, error: "no parent brainstem (standalone preview)" });
    }
    const id = "tb-" + (nextId++);
    return new Promise((resolve) => {
      pending.set(id, resolve);
      PARENT.postMessage({ rapp: "invoke", id, action, args }, "*");
      // 8s safety timeout
      setTimeout(() => {
        if (pending.has(id)) {
          pending.delete(id);
          resolve({ ok: false, error: "timeout (8s) waiting for brainstem reply" });
        }
      }, 8000);
    });
  }

  window.addEventListener("message", (e) => {
    const m = e.data;
    if (!m || m.rapp !== "result" || !m.id) return;
    const cb = pending.get(m.id);
    if (!cb) return;
    pending.delete(m.id);
    let payload = m.result;
    if (typeof payload === "string") {
      try { payload = JSON.parse(payload); } catch (_) { /* leave as string */ }
    }
    cb(payload);
  });

  // ── DOM refs ────────────────────────────────────────────────────────────
  const $entries = document.getElementById("entries");
  const $input = document.getElementById("input");
  const $send = document.getElementById("send");
  const $search = document.getElementById("search");
  const $stats = document.getElementById("stats");
  const $pill = document.getElementById("pill");
  const $toast = document.getElementById("toast");

  let currentFilter = { kind: "list" };

  // ── Toast ───────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, error) {
    $toast.textContent = msg;
    $toast.className = "toast show" + (error ? " error" : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { $toast.className = "toast"; }, 1800);
  }

  // ── Render ──────────────────────────────────────────────────────────────
  function fmtTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay
      ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      : d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  }

  function renderEntries(entries, total) {
    if (!entries || !entries.length) {
      $entries.innerHTML = '<div class="empty">No thoughts yet. Add one below.</div>';
      $pill.textContent = (total || 0) + " entries";
      return;
    }
    const frag = document.createDocumentFragment();
    for (const e of entries) {
      const el = document.createElement("div");
      el.className = "entry";
      el.innerHTML = `
        <div class="meta">
          <time>${escapeHtml(fmtTime(e.ts))}</time>
          <span class="id">${escapeHtml((e.id || "").slice(0, 8))}</span>
          <button class="del" title="Delete">×</button>
        </div>
        <div class="text"></div>
        <div class="tags"></div>
      `;
      el.querySelector(".text").textContent = e.text || "";
      const $tags = el.querySelector(".tags");
      for (const tag of (e.tags || [])) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = "#" + tag;
        span.addEventListener("click", () => filterByTag(tag));
        $tags.appendChild(span);
      }
      el.querySelector(".del").addEventListener("click", () => deleteEntry(e.id));
      frag.appendChild(el);
    }
    $entries.innerHTML = "";
    $entries.appendChild(frag);
    $pill.textContent = (total || entries.length) + " entries";
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ── Data fetchers ──────────────────────────────────────────────────────
  async function refresh() {
    let res;
    if (currentFilter.kind === "search") {
      res = await invoke("search", { query: currentFilter.query, limit: 200 });
    } else if (currentFilter.kind === "tag") {
      res = await invoke("tag", { tag: currentFilter.tag, limit: 200 });
    } else {
      res = await invoke("list", { limit: 200 });
    }
    if (res && res.ok) {
      renderEntries(res.entries, res.total);
    } else {
      $entries.innerHTML = '<div class="empty">' +
        escapeHtml((res && res.error) || "no response") + '</div>';
    }
    refreshStats();
  }

  async function refreshStats() {
    const s = await invoke("stats");
    if (s && s.ok) {
      const tags = Object.entries(s.tag_counts || {})
        .slice(0, 6).map(([t, n]) => "#" + t + " (" + n + ")").join("  ");
      $stats.textContent = (s.total || 0) + " total" +
        (s.earliest ? "  ·  since " + fmtTime(s.earliest) : "") +
        (tags ? "  ·  " + tags : "");
    } else { $stats.textContent = ""; }
  }

  function filterByTag(tag) {
    currentFilter = { kind: "tag", tag };
    $search.value = "#" + tag;
    refresh();
  }

  async function deleteEntry(id) {
    if (!id) return;
    const r = await invoke("delete", { id });
    if (r && r.ok) { toast("Deleted"); refresh(); }
    else { toast((r && r.error) || "delete failed", true); }
  }

  // ── Append ─────────────────────────────────────────────────────────────
  function parseInput(raw) {
    const text = raw.trim();
    if (!text) return null;
    const tags = [];
    const cleaned = text.replace(/(?:^|\s)#([A-Za-z0-9_\-]+)/g, (_, t) => {
      tags.push(t.toLowerCase()); return " ";
    }).replace(/\s+/g, " ").trim();
    return { text: cleaned || text, tags };
  }

  async function send() {
    const parsed = parseInput($input.value);
    if (!parsed) return;
    $send.disabled = true;
    const r = await invoke("append", parsed);
    $send.disabled = false;
    if (r && r.ok) {
      $input.value = "";
      $input.style.height = "auto";
      toast("Saved");
      currentFilter = { kind: "list" };
      $search.value = "";
      refresh();
    } else {
      toast((r && r.error) || "save failed", true);
    }
  }

  // ── Search ─────────────────────────────────────────────────────────────
  let searchTimer;
  $search.addEventListener("input", () => {
    const q = $search.value.trim();
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      if (!q) currentFilter = { kind: "list" };
      else if (q.startsWith("#")) currentFilter = { kind: "tag", tag: q.slice(1).toLowerCase() };
      else currentFilter = { kind: "search", query: q };
      refresh();
    }, 180);
  });

  document.getElementById("clear-btn").addEventListener("click", () => {
    $search.value = ""; currentFilter = { kind: "list" }; refresh();
  });

  // ── Send hotkeys ───────────────────────────────────────────────────────
  $send.addEventListener("click", send);
  $input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  $input.addEventListener("input", () => {
    $input.style.height = "auto";
    $input.style.height = Math.min($input.scrollHeight, 160) + "px";
  });

  // ── Export / Import ────────────────────────────────────────────────────
  document.getElementById("export-btn").addEventListener("click", async () => {
    const r = await invoke("export");
    if (!(r && r.ok)) { toast((r && r.error) || "export failed", true); return; }
    const blob = new Blob([r.json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
    a.href = url; a.download = "thoughtbox-" + stamp + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Exported " + r.count + " entries");
  });

  document.getElementById("import-btn").addEventListener("click", () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", async () => {
      const f = inp.files && inp.files[0];
      if (!f) return;
      const text = await f.text();
      const r = await invoke("import_json", { blob: text });
      if (r && r.ok) { toast("Imported " + r.added + " new entries"); refresh(); }
      else { toast((r && r.error) || "import failed", true); }
    });
    inp.click();
  });

  // ── Boot ───────────────────────────────────────────────────────────────
  refresh();
  $input.focus();
})();
</script>
</body>
</html>
