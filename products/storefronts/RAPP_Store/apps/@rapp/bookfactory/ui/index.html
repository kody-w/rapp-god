<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BookFactory — source in, chapter out</title>
<style>
  :root { --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d; --text:#e6edf3; --dim:#8b949e; --mute:#6e7681; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#d29922; --pink:#f778ba; --purple:#bc8cff; --gold:#ffd166; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  header { padding: 18px 22px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 5; }
  header .glyph { font-size: 22px; }
  header h1 { font-size: 16px; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; }
  header .ctx { margin-left: auto; font-size: 11px; color: var(--dim); }
  header .ctx code { color: var(--accent); }

  main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px 22px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }
  @media (max-width: 700px) {
    header { padding: 12px 14px; gap: 10px; flex-wrap: wrap; }
    header .ctx { margin-left: 0; flex-basis: 100%; }
    main { padding: 12px 14px; gap: 12px; }
    section { padding: 14px 14px; }
    textarea { min-height: 180px; }
    .controls { flex-wrap: wrap; }
    .output-actions { flex-wrap: wrap; }
  }

  section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 12px; font-weight: 700; }

  label { display: block; font-size: 11px; color: var(--dim); margin: 12px 0 4px; }
  textarea, input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 7px; font: inherit; font-size: 13px; resize: vertical; }
  textarea { min-height: 240px; line-height: 1.55; }
  textarea:focus, input:focus { outline: 0; border-color: var(--accent); }

  button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 18px; border-radius: 8px; cursor: pointer; font: inherit; font-size: 13px; font-weight: 500; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
  button.primary:hover { filter: brightness(1.1); color: #fff; }
  button:disabled { opacity: .55; cursor: not-allowed; }

  .controls { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .controls .est { font-size: 11px; color: var(--mute); font-family: ui-monospace, monospace; }

  .pipeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .stage {
    display: grid; grid-template-columns: 32px 1fr auto; gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: background .25s, border-color .25s;
  }
  .stage .icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px; font-weight: 700;
    background: var(--surface); color: var(--mute);
    border: 1px solid var(--border);
    transition: all .25s;
  }
  .stage .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .stage .name { font-size: 13px; font-weight: 600; color: var(--text); }
  .stage .desc { font-size: 11px; color: var(--dim); font-family: ui-monospace, monospace; }
  .stage .time { font-size: 11px; color: var(--mute); font-family: ui-monospace, monospace; }

  .stage.running { border-color: var(--orange); background: rgba(210,153,34,.08); }
  .stage.running .icon { background: var(--orange); color: #fff; border-color: var(--orange); animation: pulse 1.4s ease-in-out infinite; }
  .stage.done { border-color: var(--green); background: rgba(63,185,80,.06); }
  .stage.done .icon { background: var(--green); color: #fff; border-color: var(--green); }
  .stage.error { border-color: var(--red); background: rgba(248,81,73,.08); }
  .stage.error .icon { background: var(--red); color: #fff; border-color: var(--red); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(210,153,34,.4); } 50% { box-shadow: 0 0 0 6px rgba(210,153,34,0); } }

  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin: 4px 0 16px; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); width: 0%; transition: width .3s ease-out; }

  .output { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .output.empty { color: var(--mute); font-style: italic; text-align: center; padding: 50px 20px; white-space: normal; }
  .output h1, .output h2, .output h3 { font-weight: 700; margin: 18px 0 10px; }
  .output h1 { font-size: 22px; }
  .output h2 { font-size: 17px; color: var(--dim); }
  .output p { margin-bottom: 12px; }
  .output code { background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-size: 12px; color: var(--accent); }
  .output pre { background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 7px; overflow-x: auto; font-size: 12px; margin: 12px 0; }

  .output-actions { display: flex; gap: 8px; margin-top: 14px; }

  .err { background: rgba(248,81,73,.1); border: 1px solid var(--red); border-radius: 7px; padding: 10px 14px; color: var(--red); font-size: 13px; }

  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 9px 16px; font-size: 12px; opacity: 0; transition: opacity .25s; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.ok  { border-color: var(--green); }
  .toast.err { border-color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="glyph">📚</div>
  <div>
    <h1>BookFactory</h1>
    <div class="sub">5-persona pipeline · source material in, chapter out</div>
  </div>
  <div class="ctx" id="ctxBanner"></div>
</header>

<main>
  <section>
    <h2>Source</h2>
    <label for="source">Raw source material</label>
    <textarea id="source" placeholder="Paste notes, an outline, an interview transcript, raw research dumps — anything the writer can shape into a chapter."></textarea>
    <label for="title">Chapter title</label>
    <input id="title" placeholder="e.g. Why we shipped the slow build">
    <label for="byline">Author byline</label>
    <input id="byline" value="@you">
    <div class="controls">
      <button class="primary" id="runBtn" onclick="runPipeline()">Run pipeline</button>
      <span class="est">5 personas · ~75–110s p50/p90</span>
    </div>
  </section>

  <section>
    <h2 id="progressHeader">Pipeline</h2>
    <div class="pipeline" id="pipeline"></div>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <h2 style="margin-top: 22px;">Output</h2>
    <div class="output empty" id="output">Source material in, publishable chapter out.<br>Writer → Editor → CEO → Publisher → Reviewer.</div>
    <div class="output-actions" id="outputActions" style="display:none">
      <button onclick="copyOutput()">📋 Copy</button>
      <button onclick="downloadOutput()">⬇ Download .md</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── Cartridge ──────────────────────────────────────────────────────────
let cartridge = null;
window.addEventListener('message', (ev) => {
  const d = ev.data;
  if (d?.type === 'rapp:cartridge') { cartridge = d; onCartridge(); }
});
window.parent.postMessage({ type: 'rapp:get_cartridge' }, '*');

function onCartridge() {
  const t = cartridge?.context?.tether;
  const u = cartridge?.context?.user;
  const parts = [];
  if (u) parts.push(`<code>@${u.login}</code>`);
  parts.push(t?.active ? `tethered <code>${t.base}</code>` : `cloud`);
  document.getElementById('ctxBanner').innerHTML = parts.join(' · ');
}

// ─── Pipeline visualization ─────────────────────────────────────────────
// BookFactory.perform() runs all 5 personas in one call; real per-stage
// streaming would need an agent-side protocol change. For now we drive
// the visualization with timer-based estimates so the user sees motion
// instead of "Loading…". When the real result lands, we mark all done.
const STAGES = [
  { key: 'writer',    label: 'Writer',    desc: 'shapes raw material into a draft',           estimated_ms: 18000 },
  { key: 'editor',    label: 'Editor',    desc: 'cuts weak lines, fact-checks, restructures', estimated_ms: 28000 },
  { key: 'ceo',       label: 'CEO',       desc: 'risk + decision pass',                       estimated_ms: 14000 },
  { key: 'publisher', label: 'Publisher', desc: 'publish-ready polish',                       estimated_ms: 14000 },
  { key: 'reviewer',  label: 'Reviewer',  desc: 'final once-over',                            estimated_ms: 11000 },
];
const stageState = STAGES.map(() => 'pending');

function renderStages() {
  const root = document.getElementById('pipeline');
  root.innerHTML = '';
  STAGES.forEach((s, i) => {
    const status = stageState[i];
    const div = document.createElement('div');
    div.className = 'stage ' + status;
    div.innerHTML = `
      <div class="icon">${status === 'done' ? '✓' : status === 'error' ? '!' : i + 1}</div>
      <div class="meta">
        <div class="name">${esc(s.label)}</div>
        <div class="desc">${esc(s.desc)}</div>
      </div>
      <div class="time" id="t-${s.key}"></div>
    `;
    root.appendChild(div);
  });
}
renderStages();

// ─── Run ────────────────────────────────────────────────────────────────
let isRunning = false;
let stageTimers = [];
let progressTick = null;

async function runPipeline() {
  if (isRunning) return;
  const source = document.getElementById('source').value.trim();
  const title  = document.getElementById('title').value.trim() || 'Untitled';
  const byline = document.getElementById('byline').value.trim() || '@you';
  if (!source) { toast('Add some source material first', 'err'); return; }

  isRunning = true;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').textContent = 'Running…';
  document.getElementById('output').className = 'output empty';
  document.getElementById('output').innerHTML = '<em>pipeline running…</em>';
  document.getElementById('outputActions').style.display = 'none';
  document.getElementById('progressHeader').textContent = 'Pipeline · running';

  for (let i = 0; i < stageState.length; i++) stageState[i] = 'pending';
  renderStages();
  stageTimers.forEach(clearTimeout); stageTimers = [];

  const totalMs = STAGES.reduce((a, s) => a + s.estimated_ms, 0);
  const fill = document.getElementById('progressFill');
  fill.style.width = '0%';
  const startTime = Date.now();

  // Schedule stage transitions based on per-stage estimates
  let cursor = 0;
  STAGES.forEach((s, i) => {
    const startAt = cursor;
    const endAt = startAt + s.estimated_ms;
    stageTimers.push(setTimeout(() => {
      if (!isRunning) return;
      stageState[i] = 'running';
      renderStages();
      const tEl = document.getElementById('t-' + s.key);
      if (tEl) tEl.textContent = '~' + Math.round(s.estimated_ms / 1000) + 's';
    }, startAt));
    stageTimers.push(setTimeout(() => {
      if (!isRunning) return;
      if (stageState[i] === 'running') {
        stageState[i] = 'done';
        renderStages();
        const tEl = document.getElementById('t-' + s.key);
        if (tEl) tEl.textContent = Math.round((Date.now() - startTime) / 1000) + 's';
      }
    }, endAt));
    cursor = endAt;
  });

  // Smooth progress bar — caps at 95% until the real result lands
  progressTick = setInterval(() => {
    if (!isRunning) return;
    const pct = Math.min(95, ((Date.now() - startTime) / totalMs) * 100);
    fill.style.width = pct + '%';
  }, 200);

  try {
    const result = await invoke({ source, chapter_title: title, byline });
    finishOK(result, startTime);
  } catch (e) {
    finishError(e);
  } finally {
    document.getElementById('runBtn').disabled = false;
    document.getElementById('runBtn').textContent = 'Run pipeline';
  }
}

function finishOK(result, startTime) {
  isRunning = false;
  clearInterval(progressTick); progressTick = null;
  stageTimers.forEach(clearTimeout); stageTimers = [];
  document.getElementById('progressFill').style.width = '100%';
  for (let i = 0; i < stageState.length; i++) stageState[i] = 'done';
  renderStages();
  const totalSec = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('progressHeader').textContent = `Pipeline · done in ${totalSec}s`;
  showOutput(String(result));
}

function finishError(e) {
  isRunning = false;
  clearInterval(progressTick); progressTick = null;
  stageTimers.forEach(clearTimeout); stageTimers = [];
  let errIdx = stageState.findIndex(s => s === 'running');
  if (errIdx === -1) errIdx = stageState.findIndex(s => s === 'pending');
  if (errIdx === -1) errIdx = stageState.length - 1;
  stageState[errIdx] = 'error';
  renderStages();
  const out = document.getElementById('output');
  out.className = 'output';
  out.innerHTML = `<div class="err">Pipeline failed: ${esc(e.message || e)}</div>`;
  document.getElementById('progressHeader').textContent = 'Pipeline · failed';
}

function showOutput(text) {
  const out = document.getElementById('output');
  out.className = 'output';
  out.innerHTML = renderMarkdown(text);
  document.getElementById('outputActions').style.display = 'flex';
  out._raw = text;
}

function copyOutput() {
  const text = document.getElementById('output')._raw || '';
  navigator.clipboard.writeText(text).then(() => toast('Copied', 'ok'), () => toast('Copy failed', 'err'));
}

function downloadOutput() {
  const text = document.getElementById('output')._raw || '';
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (document.getElementById('title').value.trim() || 'chapter')
    .replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Cartridge invoke (NO /api/binder/* — direct cartridge protocol) ────
function invoke(args) {
  return new Promise((resolve, reject) => {
    const id = 'inv-' + Math.random().toString(36).slice(2);
    const handler = (ev) => {
      const d = ev.data;
      if (!d || d.type !== 'rapp:invoke:result' || d.id !== id) return;
      window.removeEventListener('message', handler);
      d.error ? reject(new Error(d.error)) : resolve(d.result);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'rapp:invoke', id, args }, '*');
  });
}

// ─── Tiny markdown ──────────────────────────────────────────────────────
function renderMarkdown(s) {
  s = String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_m, lang, code) => `<pre><code class="lang-${lang}">${code}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/\n\n+/g, '</p><p>');
  s = '<p>' + s + '</p>';
  s = s.replace(/<p>(\s*<(?:h[1-6]|pre)[^>]*>)/g, '$1');
  s = s.replace(/(<\/(?:h[1-6]|pre)>)\s*<\/p>/g, '$1');
  return s;
}

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (kind || '');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>

</body>
</html>
