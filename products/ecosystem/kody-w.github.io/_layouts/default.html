<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="canonical" href="{{ page.url | prepend: site.url }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ page.url | prepend: site.url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    {% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 50 }}{% else %}{{ site.description }}{% endif %}">

    <link href="/feed.xml" type="application/atom+xml" rel="alternate" title="{{ site.title }} posts" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div>
      <a class="site-title" href="/">{{ site.title }}</a>
      <p class="site-subtitle">Local-First Designer · Agent Systems Builder · Copilot Specialist</p>
    </div>
    <nav class="site-nav" aria-label="Primary navigation">
      <div class="trigger">
        <a class="page-link" href="/">Blog</a>
        <a class="page-link" href="/learnwithkody/">Learn with Kody</a>
        <a class="page-link" href="/tags/">Tags</a>
        <a class="page-link" href="/idea4blog/">Idea4Blog</a>
        <a class="page-link" href="/digital-twin/">Digital Twin</a>
        <a class="page-link" href="/about/">About</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </nav>
  </div>
</header>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-container">
    <div class="search-input-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search posts..." autocomplete="off">
      <kbd>Esc</kbd>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<div class="page-content">
  <div class="wrap">
    {{ content }}
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </div>
</footer>

<script src="/js/theme.js"></script>
<script src="/js/search.js"></script>
</body>
</html>
