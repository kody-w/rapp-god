<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Captain's Log — A Pirate's Caribbean</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;color:#e9d9b1;font-family:'Georgia','Times New Roman',serif;overflow:hidden;user-select:none}
canvas{position:fixed;inset:0;display:block;width:100vw;height:100vh}
#hud{position:fixed;inset:0;pointer-events:none;z-index:5}
.panel{pointer-events:auto;background:linear-gradient(180deg,#3b2615f5,#1f140af5);border:2px solid #6a4827;border-radius:8px;box-shadow:0 6px 24px #000a, inset 0 0 14px #000a;color:#e9d9b1;padding:10px 12px;font-size:13px;line-height:1.4}
#topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;padding:6px 18px;font-size:13px;background:#1a1208cc;border:1px solid #5a3e22;border-radius:6px;color:#ffe2a3;text-shadow:0 0 4px #000}
#title{font-size:16px;color:#ffd76b;letter-spacing:1px}
#mode{color:#bba070;font-size:11px;letter-spacing:2px}
#stats{position:absolute;top:54px;left:10px;width:240px}
#log{position:absolute;bottom:10px;left:10px;width:340px;max-height:240px;overflow:hidden}
#logEntries{font-size:12px;line-height:1.4}
#logEntries .e{padding:3px 0;border-bottom:1px dashed #5a3e22}
#logEntries .e:last-child{border:none}
#logEntries b{color:#ffd76b}
#islandList{position:absolute;top:54px;right:10px;width:230px;max-height:62vh;overflow:auto}
#islandList .island-btn{display:block;width:100%;text-align:left;background:#2a1a0d;border:1px solid #5a3e22;color:#e9d9b1;padding:5px 8px;margin:4px 0;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px}
#islandList .island-btn:hover{background:#3b2615;border-color:#a07840}
#islandList .island-btn.cursed{background:#3b1430;border-color:#c050c0;color:#ffaaee;animation:cursed 1.5s infinite}
@keyframes cursed{50%{box-shadow:0 0 12px #ff60ff}}
#actions{position:absolute;bottom:260px;left:10px;width:340px}
.btn{display:inline-block;background:#3a2614;border:2px solid #6a4827;color:#ffe2a3;padding:6px 12px;margin:3px 3px 0 0;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;pointer-events:auto;text-shadow:0 0 4px #000}
.btn:hover{background:#5a3e22;border-color:#a07840}
.btn.gold{background:#5a4012;border-color:#c08040;color:#ffe6a0}
.btn.evil{background:#3a1212;border-color:#a04040;color:#ffb0a0}
#compass{position:absolute;bottom:10px;right:10px;width:130px;height:130px;background:radial-gradient(circle,#3b2615 0%,#1a1208 80%);border:3px solid #8a6432;border-radius:50%;box-shadow:0 0 14px #000;pointer-events:auto}
#compass-rose{position:absolute;inset:8px;border-radius:50%;background:repeating-conic-gradient(from 0deg,#5a3e22 0deg 4deg,#3b2615 4deg 8deg)}
#compass-card{position:absolute;inset:14px;border-radius:50%;background:#1a1208;color:#e9d9b1;text-align:center;font-size:11px;font-weight:bold}
#compass-card .n{position:absolute;left:50%;top:6px;transform:translateX(-50%)}
#compass-card .e{position:absolute;right:8px;top:50%;transform:translateY(-50%)}
#compass-card .s{position:absolute;left:50%;bottom:6px;transform:translateX(-50%)}
#compass-card .w{position:absolute;left:8px;top:50%;transform:translateY(-50%)}
#compass-needle{position:absolute;left:50%;top:50%;width:4px;height:50px;margin-left:-2px;margin-top:-50px;background:linear-gradient(180deg,#ff5040,#ffe88a);transform-origin:50% 100%;border-radius:2px;box-shadow:0 0 6px #ffaa44}
#wind{position:absolute;bottom:150px;right:10px;width:130px;text-align:center;font-size:11px}
#wind-arrow{display:inline-block;font-size:24px;color:#ffd76b;text-shadow:0 0 6px #000}
#camButtons{position:absolute;bottom:10px;left:360px}
#camButtons .btn{font-size:11px;padding:4px 8px}
#endscreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#000c;z-index:20;text-align:center;color:#e9d9b1;font-size:15px;line-height:1.6;pointer-events:auto}
#endcontent{max-width:600px;background:linear-gradient(180deg,#3b2615,#1f140a);border:3px solid #c08040;border-radius:8px;padding:30px 36px;box-shadow:0 0 60px #ffaa44}
.frag{display:inline-block;width:14px;height:14px;background:radial-gradient(#ffd76b,#a07820);border:1px solid #ffe88a;border-radius:50%;margin:0 1px;vertical-align:middle;box-shadow:0 0 4px #ffaa44}
.frag.empty{background:#222;border-color:#444;box-shadow:none}
hr{border:none;border-top:1px solid #5a3e22;margin:6px 0}
</style>
</head>
<body>
<!-- ROUND11_3D_EPIC v1 -->
<canvas id="c"></canvas>
<div id="hud">
  <div id="topbar" class="panel">
    <div id="title">Captain</div>
    <div id="mode">AT SEA</div>
  </div>
  <div id="stats" class="panel"></div>
  <div id="islandList" class="panel"></div>
  <div id="log" class="panel"><div id="logEntries"></div></div>
  <div id="actions"></div>
  <div id="compass">
    <div id="compass-rose"></div>
    <div id="compass-card"><span class="n">N</span><span class="e">E</span><span class="s">S</span><span class="w">W</span></div>
    <div id="compass-needle"></div>
  </div>
  <div id="wind" class="panel"><div><span id="wind-arrow">&#x21E7;</span></div><div>Wind</div></div>
  <div id="camButtons">
    <button class="btn" id="cam-chase">Chase</button>
    <button class="btn" id="cam-map">Map</button>
    <button class="btn" id="cam-dock">Dock</button>
  </div>
</div>
<div id="endscreen"><div id="endcontent"></div></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
'use strict';
// ===== Pirate Captain — Real 3D Caribbean =====
const T = THREE;

// ---- Data ----
const CAPTAINS = [
  {name:"Captain Marisol Vega", coat:0x6b1f1f, hat:0x111111, sail:0xeeeedd, flag:0x111111},
  {name:"Bartholomew 'Black Bart' Crowe", coat:0x111111, hat:0x222222, sail:0xeeeedd, flag:0x551111},
  {name:"Anwen of the Mist", coat:0x224466, hat:0x111122, sail:0xddeeff, flag:0x224466},
  {name:"Don Esteban del Oro", coat:0x553311, hat:0x331100, sail:0xffe6b8, flag:0xffd76b}
];
const CREW_TEMPLATES = [
  {role:"First Mate", coat:0x553311, hat:0x111111, hatC:0x222222, scale:1.05},
  {role:"Lookout", coat:0x224422, hat:0xc04040, hatC:0xc04040, scale:0.95},
  {role:"Cook", coat:0x886633, hat:0xeeeeee, hatC:0xeeeeee, scale:1.0},
  {role:"Gunner", coat:0x222222, hat:0x441111, hatC:0x441111, scale:1.05},
  {role:"Bosun", coat:0x442211, hat:0x222222, hatC:0x222222, scale:1.0},
  {role:"Navigator", coat:0x224488, hat:0x111133, hatC:0x111133, scale:1.0}
];
const ISLANDS = [
  {n:"Tortuga", x:-60, z:60, port:true, base:"port"},
  {n:"Iron Bay", x:80, z:90, port:true, base:"port", treasure:true},
  {n:"Port Royal", x:120, z:0, port:true, base:"navy", frag:1},
  {n:"Nassau Cove", x:-130, z:-50, port:true, base:"pirate", frag:2},
  {n:"Devil's Triangle", x:-30, z:-100, port:false, base:"reef", frag:3},
  {n:"Ghostly Reach", x:60, z:-130, port:false, base:"ghost", frag:4},
  {n:"Coral Atoll", x:-90, z:0, port:true, base:"port"},
  {n:"Smuggler's Den", x:0, z:140, port:true, base:"port"},
  {n:"Skeleton Key", x:170, z:-90, port:false, base:"reef"},
  {n:"Sirens' Hollow", x:-180, z:120, port:true, base:"port"},
  {n:"El Dorado", x:0, z:0, port:false, base:"eldorado", hidden:true}
];

// ---- Renderer / Camera ----
const canvas = document.getElementById('c');
const renderer = new T.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio||1, 2));
renderer.setSize(innerWidth, innerHeight, false);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = T.PCFSoftShadowMap;
renderer.outputColorSpace = T.SRGBColorSpace;
renderer.toneMapping = T.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new T.Scene();
scene.fog = new T.Fog(0x9ec5e0, 220, 900);
scene.background = new T.Color(0x9ec5e0);

const camera = new T.PerspectiveCamera(58, innerWidth/innerHeight, 0.5, 5000);
camera.position.set(0, 30, 60);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight, false);
});

// ---- Lights ----
const sun = new T.DirectionalLight(0xfff1d6, 1.1);
sun.position.set(60, 120, 80);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -120; sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120; sun.shadow.camera.bottom = -120;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 400;
sun.shadow.bias = -0.0008;
scene.add(sun);
scene.add(sun.target);

const amb = new T.AmbientLight(0x6080a0, 0.45);
scene.add(amb);
const hemi = new T.HemisphereLight(0xa6d2ff, 0x4a3a2a, 0.55);
scene.add(hemi);

// ---- Stars + Constellations ----
const starGeo = new T.BufferGeometry();
const sv = [];
for(let i=0;i<800;i++){
  const r = 1500;
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos(Math.random()*0.6+0.05);
  sv.push(Math.sin(ph)*Math.cos(th)*r, Math.cos(ph)*r*0.9+200, Math.sin(ph)*Math.sin(th)*r);
}
starGeo.setAttribute('position', new T.Float32BufferAttribute(sv, 3));
const stars = new T.Points(starGeo, new T.PointsMaterial({color:0xffffff,size:2.5,transparent:true,opacity:0,sizeAttenuation:false}));
scene.add(stars);

const consGeo = new T.BufferGeometry();
const cv = [];
function addCons(pts){
  for(let i=0;i<pts.length-1;i++){
    cv.push(pts[i][0],pts[i][1],pts[i][2], pts[i+1][0],pts[i+1][1],pts[i+1][2]);
  }
}
addCons([[-400,800,-1100],[-300,820,-1080],[-200,780,-1050],[-150,750,-1000],[-50,720,-950]]);
addCons([[300,800,-1000],[350,830,-980],[420,790,-950],[480,770,-920],[520,810,-900]]);
addCons([[100,900,-1200],[180,920,-1180],[260,890,-1150],[300,870,-1100]]);
consGeo.setAttribute('position', new T.Float32BufferAttribute(cv, 3));
const constellations = new T.LineSegments(consGeo, new T.LineBasicMaterial({color:0x88aaff,transparent:true,opacity:0}));
scene.add(constellations);

// ---- Animated Ocean Shader ----
const OCEAN = 2400;
const oceanGeo = new T.PlaneGeometry(OCEAN, OCEAN, 110, 110);
oceanGeo.rotateX(-Math.PI/2);
const oceanMat = new T.ShaderMaterial({
  uniforms: {
    uTime: {value:0},
    uSunDir: {value: new T.Vector3(0.5,0.8,0.3).normalize()},
    uDeep: {value: new T.Color(0x0a3a52)},
    uShallow: {value: new T.Color(0x46a8c8)},
    uFoam: {value: new T.Color(0xffffff)},
    uNight: {value: 0.0},
    uStorm: {value: 0.0},
    uFog: {value: new T.Color(0x9ec5e0)}
  },
  vertexShader: `
    uniform float uTime; uniform float uStorm;
    varying float vH; varying vec3 vN; varying vec3 vWP;
    float wave(vec2 p, vec2 d, float w, float s, float a){
      float v = dot(d,p)*w + uTime*s;
      return a*sin(v);
    }
    void main(){
      vec4 wp = modelMatrix * vec4(position,1.0);
      vec2 p = wp.xz;
      float h = 0.0;
      h += wave(p, vec2(0.7,0.4), 0.07, 0.9, 1.2 + uStorm*1.6);
      h += wave(p, vec2(-0.3,0.95), 0.13, 0.7, 0.8 + uStorm*1.2);
      h += wave(p, vec2(0.95,-0.2), 0.25, 1.4, 0.45 + uStorm*0.9);
      vH = h;
      // Approx normal via cosine derivatives
      float dx = 0.07*1.2*cos(dot(vec2(0.7,0.4),p)*0.07 + uTime*0.9)*0.7;
      dx += 0.13*0.8*cos(dot(vec2(-0.3,0.95),p)*0.13 + uTime*0.7)*-0.3;
      dx += 0.25*0.45*cos(dot(vec2(0.95,-0.2),p)*0.25 + uTime*1.4)*0.95;
      float dz = 0.07*1.2*cos(dot(vec2(0.7,0.4),p)*0.07 + uTime*0.9)*0.4;
      dz += 0.13*0.8*cos(dot(vec2(-0.3,0.95),p)*0.13 + uTime*0.7)*0.95;
      dz += 0.25*0.45*cos(dot(vec2(0.95,-0.2),p)*0.25 + uTime*1.4)*-0.2;
      vN = normalize(vec3(-dx, 1.0, -dz));
      wp.y += h;
      vWP = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 uSunDir; uniform vec3 uDeep; uniform vec3 uShallow; uniform vec3 uFoam; uniform vec3 uFog;
    uniform float uNight; uniform float uTime; uniform float uStorm;
    varying float vH; varying vec3 vN; varying vec3 vWP;
    void main(){
      float ndl = max(dot(vN, uSunDir), 0.0);
      vec3 view = normalize(cameraPosition - vWP);
      vec3 H = normalize(view + uSunDir);
      float spec = pow(max(dot(vN, H), 0.0), 64.0);
      float depthMix = clamp(0.45 + vH*0.18, 0.0, 1.0);
      vec3 base = mix(uDeep, uShallow, depthMix);
      // caustics
      float caust = 0.5 + 0.5*sin(vWP.x*0.18 + uTime*0.7) * sin(vWP.z*0.18 + uTime*0.6);
      base += vec3(0.04,0.06,0.08) * caust;
      vec3 col = base * (0.45 + 0.65*ndl) + vec3(1.0,0.95,0.8) * spec * (1.0 - uNight*0.7);
      // foam
      if(vH > 1.7) col = mix(col, uFoam, smoothstep(1.7, 2.4, vH));
      // night tint
      col = mix(col, col*vec3(0.16,0.22,0.36) + vec3(0.04,0.05,0.10), uNight);
      // storm darken
      col = mix(col, col*vec3(0.45,0.5,0.6), uStorm*0.6);
      // fog
      float d = length(cameraPosition - vWP);
      float fogF = clamp((d-220.0)/(900.0-220.0), 0.0, 1.0);
      col = mix(col, uFog, fogF);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const ocean = new T.Mesh(oceanGeo, oceanMat);
ocean.receiveShadow = true;
scene.add(ocean);

function waveAt(x,z,t,storm){
  storm = storm||0;
  let h = 0;
  h += (1.2 + storm*1.6) * Math.sin((0.7*x + 0.4*z)*0.07 + t*0.9);
  h += (0.8 + storm*1.2) * Math.sin((-0.3*x + 0.95*z)*0.13 + t*0.7);
  h += (0.45 + storm*0.9) * Math.sin((0.95*x - 0.2*z)*0.25 + t*1.4);
  return h;
}

// ===== Factories =====
function makeHumanoid(opts){
  opts = opts || {};
  const g = new T.Group();
  const sk = (opts.scale||1);
  const skin = 0xe6c69a;
  const coatC = opts.coat || 0x553311;
  const hatC = opts.hatC || opts.hat || 0x111111;
  // body
  const body = new T.Mesh(new T.CylinderGeometry(0.42*sk, 0.5*sk, 1.5*sk, 8), new T.MeshStandardMaterial({color:coatC, roughness:0.85}));
  body.position.y = 0.75*sk; body.castShadow = true;
  g.add(body);
  // belt
  const belt = new T.Mesh(new T.CylinderGeometry(0.52*sk, 0.52*sk, 0.12*sk, 8), new T.MeshStandardMaterial({color:0x111111, roughness:0.6}));
  belt.position.y = 0.5*sk;
  g.add(belt);
  // head
  const head = new T.Mesh(new T.SphereGeometry(0.32*sk, 10, 8), new T.MeshStandardMaterial({color:skin, roughness:0.9}));
  head.position.y = 1.7*sk; head.castShadow = true;
  g.add(head);
  // beard
  if(opts.beard !== false && Math.random()<0.55){
    const bd = new T.Mesh(new T.SphereGeometry(0.22*sk, 8, 6), new T.MeshStandardMaterial({color:0x222222}));
    bd.position.set(0, 1.55*sk, 0.18*sk);
    bd.scale.set(1, 0.6, 0.7);
    g.add(bd);
  }
  // hat
  if(opts.hat==='tricorn' || !opts.hat){
    const brim = new T.Mesh(new T.CylinderGeometry(0.55*sk, 0.55*sk, 0.06*sk, 12), new T.MeshStandardMaterial({color:hatC, roughness:0.6}));
    brim.position.y = 1.95*sk;
    g.add(brim);
    const top = new T.Mesh(new T.ConeGeometry(0.32*sk, 0.32*sk, 12), new T.MeshStandardMaterial({color:hatC}));
    top.position.y = 2.1*sk;
    g.add(top);
  } else if(opts.hat === 'bandana' || opts.hat === undefined){
    const ban = new T.Mesh(new T.SphereGeometry(0.34*sk, 8, 6, 0, Math.PI*2, 0, Math.PI/2), new T.MeshStandardMaterial({color:hatC}));
    ban.position.y = 1.78*sk;
    g.add(ban);
  }
  // arms
  for(const sgn of [-1, 1]){
    const arm = new T.Mesh(new T.CylinderGeometry(0.13*sk, 0.13*sk, 1.0*sk, 6), new T.MeshStandardMaterial({color:coatC}));
    arm.position.set(sgn*0.55*sk, 1.0*sk, 0);
    arm.rotation.z = sgn*0.2;
    g.add(arm);
  }
  // legs
  for(const sgn of [-1, 1]){
    const leg = new T.Mesh(new T.CylinderGeometry(0.16*sk, 0.16*sk, 0.85*sk, 6), new T.MeshStandardMaterial({color:0x331a08}));
    leg.position.set(sgn*0.18*sk, 0.0, 0);
    g.add(leg);
  }
  // sword
  if(opts.sword){
    const blade = new T.Mesh(new T.BoxGeometry(0.05*sk, 0.9*sk, 0.04*sk), new T.MeshStandardMaterial({color:0xdddddd, metalness:0.7}));
    blade.position.set(0.7*sk, 0.7*sk, 0);
    blade.rotation.z = 0.3;
    g.add(blade);
    const hilt = new T.Mesh(new T.BoxGeometry(0.18*sk, 0.08*sk, 0.08*sk), new T.MeshStandardMaterial({color:0xffd76b}));
    hilt.position.set(0.65*sk, 0.3*sk, 0);
    g.add(hilt);
  }
  // telescope (lookout)
  if(opts.telescope){
    const tele = new T.Mesh(new T.CylinderGeometry(0.06*sk, 0.06*sk, 0.4*sk, 8), new T.MeshStandardMaterial({color:0x442211}));
    tele.position.set(0.45*sk, 1.7*sk, 0.25*sk);
    tele.rotation.x = -1.2;
    g.add(tele);
  }
  // ladle (cook)
  if(opts.ladle){
    const stk = new T.Mesh(new T.CylinderGeometry(0.04*sk, 0.04*sk, 0.5*sk, 6), new T.MeshStandardMaterial({color:0x553311}));
    stk.position.set(0.55*sk, 1.0*sk, 0.2*sk);
    g.add(stk);
    const bowl = new T.Mesh(new T.SphereGeometry(0.12*sk, 6, 5, 0, Math.PI*2, 0, Math.PI/2), new T.MeshStandardMaterial({color:0xaaaaaa, metalness:0.5}));
    bowl.position.set(0.55*sk, 0.74*sk, 0.2*sk);
    bowl.rotation.x = Math.PI;
    g.add(bowl);
  }
  if(opts.apron){
    const ap = new T.Mesh(new T.PlaneGeometry(0.7*sk, 1.0*sk), new T.MeshStandardMaterial({color:0xeeeeee, side:T.DoubleSide}));
    ap.position.set(0, 0.85*sk, 0.46*sk);
    g.add(ap);
  }
  g.traverse(o=>{ if(o.isMesh){ o.castShadow = true; }});
  return g;
}

function makeShip(theme){
  theme = theme || {};
  const s = new T.Group();
  s.userData.parts = {};
  s.userData.cannons = [];
  // Hull (tapered box)
  const hullG = new T.BoxGeometry(5, 3, 22, 4, 2, 8);
  const pos = hullG.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    let nx = x, ny = y, nz = z;
    if(z > 9) nx = x*0.22;       // bow
    else if(z < -9) nx = x*0.5;  // stern
    if(y < -1) nx *= 0.55;       // bottom narrower
    pos.setXYZ(i, nx, ny, nz);
  }
  hullG.computeVertexNormals();
  const hull = new T.Mesh(hullG, new T.MeshStandardMaterial({color: theme.hull||0x6b3f1e, roughness:0.85}));
  hull.position.y = 1.5;
  hull.castShadow = true; hull.receiveShadow = true;
  s.add(hull);
  s.userData.parts.hull = hull;
  // Trim stripe
  const trim = new T.Mesh(new T.BoxGeometry(5.1, 0.4, 22.0), new T.MeshStandardMaterial({color: 0x2a1a08}));
  trim.position.y = 2.6;
  s.add(trim);
  // Deck
  const deck = new T.Mesh(new T.BoxGeometry(4.5, 0.3, 21.5), new T.MeshStandardMaterial({color: 0x9b6f3a, roughness:0.95}));
  deck.position.y = 3.0;
  deck.receiveShadow = true;
  s.add(deck);
  // Stern castle
  const stern = new T.Mesh(new T.BoxGeometry(4.4, 1.5, 4), new T.MeshStandardMaterial({color: 0x6b3f1e}));
  stern.position.set(0, 3.9, -8);
  s.add(stern);
  // Wheel
  const wheel = new T.Mesh(new T.TorusGeometry(0.5, 0.07, 6, 12), new T.MeshStandardMaterial({color:0x5a2f12}));
  wheel.position.set(0, 5.1, -7.5);

function makePalm(){
  const g = new T.Group();
  const trunk = new T.Mesh(new T.CylinderGeometry(0.18, 0.3, 4.5, 6), new T.MeshStandardMaterial({color:0x6b4f2a}));
  trunk.position.y = 2.25;
  trunk.rotation.z = (Math.random()-0.5)*0.25;
  trunk.castShadow = true;
  g.add(trunk);
  for(let i=0;i<6;i++){
    const frondG = new T.PlaneGeometry(2.4, 0.5, 4, 1);
    const fp = frondG.attributes.position;
    for(let k=0;k<fp.count;k++){
      const x = fp.getX(k);
      fp.setY(k, fp.getY(k) - x*x*0.06);
    }
    frondG.computeVertexNormals();
    const frond = new T.Mesh(frondG, new T.MeshStandardMaterial({color:0x2a7a3a, side:T.DoubleSide}));
    frond.position.y = 4.6;
    frond.rotation.y = (i/6)*Math.PI*2;
    frond.rotation.z = -0.15;
    frond.position.x = Math.cos(frond.rotation.y)*1.1;
    frond.position.z = Math.sin(frond.rotation.y)*1.1;
    g.add(frond);
  }
  // coconuts
  for(let i=0;i<3;i++){
    const c = new T.Mesh(new T.SphereGeometry(0.13, 6, 4), new T.MeshStandardMaterial({color:0x442211}));
    c.position.set(Math.cos(i*2)*0.4, 4.3, Math.sin(i*2)*0.4);
    g.add(c);
  }
  return g;
}

function makeIsland(opts){
  opts = opts || {};
  const g = new T.Group();
  const radius = opts.radius || 18;
  const segs = 16;
  // Disk with bumpy top
  const ig = new T.CylinderGeometry(radius, radius*1.1, 2.4, segs, 2);
  const ip = ig.attributes.position;
  for(let i=0;i<ip.count;i++){
    const y = ip.getY(i);
    if(y > 0.5){
      const x = ip.getX(i), z = ip.getZ(i);
      const r = Math.sqrt(x*x+z*z);
      ip.setY(i, y + (1 - r/radius)*1.6 + Math.random()*0.3);
    }
  }
  ig.computeVertexNormals();
  const sandC = (opts.base==='reef')?0x5a7a8a : (opts.base==='ghost')?0x4a4055 : (opts.base==='eldorado')?0xffd76b : 0xe8d295;
  const sand = new T.Mesh(ig, new T.MeshStandardMaterial({color: sandC, roughness: 0.95, emissive: opts.base==='eldorado'?0x553311:0x000000, emissiveIntensity: opts.base==='eldorado'?0.3:0}));
  sand.position.y = 1.0;
  sand.receiveShadow = true; sand.castShadow = true;
  g.add(sand);
  // beach ring
  const beach = new T.Mesh(new T.RingGeometry(radius*0.95, radius*1.15, segs*2), new T.MeshStandardMaterial({color:0xf4e4ba, side:T.DoubleSide}));
  beach.rotation.x = -Math.PI/2;
  beach.position.y = 0.05;
  g.add(beach);
  // palms
  const pn = (opts.base==='reef'||opts.base==='ghost')?0:(opts.palms||3);
  for(let i=0;i<pn;i++){
    const ang = Math.random()*Math.PI*2;
    const pr = radius*0.6*Math.random()+1;
    const palm = makePalm();
    palm.position.set(Math.cos(ang)*pr, 1.8, Math.sin(ang)*pr);
    g.add(palm);
  }
  // Port: dock + buildings
  if(opts.port){
    const dock = new T.Mesh(new T.BoxGeometry(2.2, 0.5, 8), new T.MeshStandardMaterial({color:0x6b4f2a}));
    dock.position.set(0, 1.5, radius*0.95);
    dock.castShadow = true;
    g.add(dock);
    for(let i=0;i<4;i++){
      const post = new T.Mesh(new T.CylinderGeometry(0.1, 0.1, 1.5, 6), new T.MeshStandardMaterial({color:0x442211}));
      post.position.set((i%2?1:-1)*1.0, 0.75, radius*0.95 - 3.5 + (i<2?0:7));
      g.add(post);
    }
    // 2 small buildings
    for(let i=0;i<2;i++){
      const bx = (i?-1:1)*radius*0.4;
      const bz = -radius*0.3;
      const b = new T.Mesh(new T.BoxGeometry(2.5, 1.8, 2.0), new T.MeshStandardMaterial({color: 0xb38a5a}));
      b.position.set(bx, 2.4, bz);
      b.castShadow = true;
      g.add(b);
      const roof = new T.Mesh(new T.ConeGeometry(2.0, 1.0, 4), new T.MeshStandardMaterial({color:0x8a3a22}));
      roof.position.set(bx, 3.8, bz);
      roof.rotation.y = Math.PI/4;
      g.add(roof);
    }
  }
  if(opts.base==='navy'){
    const fort = makeFortress();
    fort.position.set(0, 1.6, -radius*0.2);
    g.add(fort);
  }
  if(opts.base==='reef'){
    for(let i=0;i<8;i++){
      const a = Math.random()*Math.PI*2;
      const r = radius*0.7 + Math.random()*radius*0.3;
      const rk = new T.Mesh(new T.DodecahedronGeometry(0.6+Math.random()*0.7,0), new T.MeshStandardMaterial({color:0x444a55}));
      rk.position.set(Math.cos(a)*r, 0.8, Math.sin(a)*r);
      g.add(rk);
    }
  }
  if(opts.base==='ghost'){
    // ghostly fog plane
    const fog = new T.Mesh(new T.SphereGeometry(radius*1.4, 12, 8), new T.MeshBasicMaterial({color:0x88aacc, transparent:true, opacity:0.18, depthWrite:false, side:T.BackSide}));
    fog.position.y = 5;
    g.add(fog);
    // ruined mast
    const rm = new T.Mesh(new T.CylinderGeometry(0.2, 0.3, 6, 6), new T.MeshStandardMaterial({color:0x222233}));
    rm.position.set(0, 4, 0);
    rm.rotation.z = 0.4;
    g.add(rm);
  }
  if(opts.base==='pirate'){
    // skull pole
    const pole = new T.Mesh(new T.CylinderGeometry(0.1, 0.1, 4, 6), new T.MeshStandardMaterial({color:0x111111}));
    pole.position.set(0, 3, 0);
    g.add(pole);
    const sk = new T.Mesh(new T.SphereGeometry(0.4, 10, 8), new T.MeshStandardMaterial({color:0xeeeeee}));
    sk.position.set(0, 5.2, 0);
    g.add(sk);
  }
  if(opts.base==='eldorado'){
    // Golden temple
    const base = new T.Mesh(new T.CylinderGeometry(5, 6, 3, 8), new T.MeshStandardMaterial({color:0xffd76b, metalness:0.7, roughness:0.3, emissive:0x553311, emissiveIntensity:0.4}));
    base.position.set(0, 3, 0);
    g.add(base);
    const top = new T.Mesh(new T.ConeGeometry(4, 5, 8), new T.MeshStandardMaterial({color:0xffe88a, metalness:0.8, emissive:0x553311, emissiveIntensity:0.6}));
    top.position.set(0, 7, 0);
    g.add(top);
    // glow
    const glow = new T.PointLight(0xffd76b, 1.5, 60);
    glow.position.set(0, 6, 0);
    g.add(glow);
  }
  return g;
}

// ===== Effects =====
const fxPool = [];
function fx(type, pos, vel, color, life){
  const o = {type, pos: pos.clone(), vel: vel?vel.clone():new T.Vector3(), color, life:life||1, age:0};
  if(type==='ball'){
    o.mesh = new T.Mesh(new T.SphereGeometry(0.32,7,6), new T.MeshStandardMaterial({color:0x111111, metalness:0.7, roughness:0.4, emissive:0x441100, emissiveIntensity:0.4}));
    o.mesh.castShadow = true;
  } else if(type==='smoke'){
    o.mesh = new T.Mesh(new T.SphereGeometry(0.7,6,5), new T.MeshBasicMaterial({color:0xeaeaea,transparent:true,opacity:0.65,depthWrite:false}));
  } else if(type==='flash'){
    o.mesh = new T.Mesh(new T.SphereGeometry(0.8,7,6), new T.MeshBasicMaterial({color:0xffe88a,transparent:true,opacity:0.95,depthWrite:false}));
  } else if(type==='splash'){
    o.mesh = new T.Mesh(new T.SphereGeometry(0.42,6,5), new T.MeshBasicMaterial({color:0xeaf4ff,transparent:true,opacity:0.85,depthWrite:false}));
  } else if(type==='rain'){
    o.mesh = new T.Mesh(new T.PlaneGeometry(0.05,1.6), new T.MeshBasicMaterial({color:0xaaccff,transparent:true,opacity:0.45,depthWrite:false,side:T.DoubleSide}));
  } else if(type==='spark'){
    o.mesh = new T.Mesh(new T.SphereGeometry(0.18,5,4), new T.MeshBasicMaterial({color:color||0xffaa44}));
  } else if(type==='debris'){
    o.mesh = new T.Mesh(new T.BoxGeometry(0.3,0.3,0.6), new T.MeshStandardMaterial({color:0x6b4f2a}));
  }
  if(o.mesh){ o.mesh.position.copy(pos); scene.add(o.mesh); fxPool.push(o); }
  return o;
}
function updateFX(dt){
  for(let i=fxPool.length-1;i>=0;i--){
    const o = fxPool[i];
    o.age += dt;
    if(o.type==='ball'){
      o.vel.y -= 22*dt;
      o.pos.addScaledVector(o.vel, dt);
      o.mesh.position.copy(o.pos);
      const wy = waveAt(o.pos.x, o.pos.z, oceanMat.uniforms.uTime.value, oceanMat.uniforms.uStorm.value);
      if(o.pos.y < wy + 0.5){
        for(let k=0;k<7;k++){
          const v = new T.Vector3((Math.random()-0.5)*9, 4+Math.random()*4, (Math.random()-0.5)*9);
          fx('splash', o.pos, v, 0xeaf4ff, 0.7);
        }
        o.age = o.life;
      }
    } else if(o.type==='smoke'){
      o.pos.addScaledVector(o.vel, dt);
      o.pos.y += 1.4*dt;
      o.mesh.position.copy(o.pos);
      o.mesh.material.opacity = Math.max(0, 0.65*(1 - o.age/o.life));
      o.mesh.scale.setScalar(1 + o.age*1.3);
    } else if(o.type==='flash'){
      o.mesh.material.opacity = Math.max(0, 0.95*(1 - o.age/o.life));
      o.mesh.scale.setScalar(1 + o.age*7);
    } else if(o.type==='splash'){
      o.vel.y -= 18*dt;
      o.pos.addScaledVector(o.vel, dt);
      o.mesh.position.copy(o.pos);
      o.mesh.material.opacity = Math.max(0, 0.85*(1 - o.age/o.life));
    } else if(o.type==='rain'){
      o.pos.y -= 65*dt;
      o.pos.x += 4*dt;
      o.mesh.position.copy(o.pos);
      if(o.pos.y < 1) o.age = o.life;
    } else if(o.type==='spark' || o.type==='debris'){
      o.vel.y -= 14*dt;
      o.pos.addScaledVector(o.vel, dt);
      o.mesh.position.copy(o.pos);
      o.mesh.rotation.x += 4*dt; o.mesh.rotation.z += 3*dt;
    }
    if(o.age >= o.life){
      scene.remove(o.mesh);
      o.mesh.geometry && o.mesh.geometry.dispose();
      o.mesh.material && o.mesh.material.dispose();
      fxPool.splice(i,1);
    }
  }
}
function fireCannons(srcShip, side){
  const sideC = srcShip.userData.cannons.filter(c=>c.side===side);
  const right = new T.Vector3(side, 0, 0);
  right.applyQuaternion(srcShip.quaternion);
  for(const c of sideC){
    const wp = new T.Vector3();
    c.mesh.getWorldPosition(wp);
    fx('flash', wp.clone().addScaledVector(right, 1.4), null, 0xffd76b, 0.22);
    for(let k=0;k<4;k++){
      const sv = right.clone().multiplyScalar(2+Math.random()*4).add(new T.Vector3((Math.random()-0.5), Math.random()*1.5, (Math.random()-0.5)));
      fx('smoke', wp.clone().addScaledVector(right,0.8+k*0.5), sv, 0xeeeeee, 1.7);
    }
    fx('ball', wp.clone().addScaledVector(right,1.8), right.clone().multiplyScalar(40 + Math.random()*5).add(new T.Vector3(0, 5+Math.random()*2, 0)), 0x111, 3.5);
  }
}

  state.crew.forEach((c,i)=>{
    if(!c.alive) return;
    const slot = slots[i] || {p:[(Math.random()-0.5)*4, 3.0, (Math.random()-0.5)*8], opts:{}};
    const opts = Object.assign({coat:c.coat, hat:c.hat, hatC:c.hatC, scale:c.scale||1}, slot.opts);
    const h = makeHumanoid(opts);
    h.position.set(slot.p[0], slot.p[1], slot.p[2]);
    ship.add(h);
    state.crewMeshes.push(h);
  });
}

// ===== HUD =====
const $ = id => document.getElementById(id);
const ranks = ['Buccaneer','Corsair','Captain','Commodore','Pirate King'];

function logEvent(html){
  state.log.unshift('<div class="e"><b>Day '+state.day+'</b> &mdash; '+html+'</div>');
  if(state.log.length>11) state.log.length = 11;
  $('logEntries').innerHTML = state.log.join('');
}
function windName(rad){
  const d = ['N','NE','E','SE','S','SW','W','NW'];
  let i = Math.round(((rad+Math.PI*2)%(Math.PI*2))/(Math.PI/4))%8;
  return d[i];
}
function updateHUD(){
  $('title').textContent = state.captain.name;
  const labels = {sailing:'AT SEA',sailingTo:'SAILING',encounter:'NAVAL COMBAT',island:'AT PORT',kraken:'KRAKEN ATTACK',storm:'STORM',eldorado:'EL DORADO',endgame:'ARMADA BATTLE',ending:''};
  $('mode').textContent = labels[state.mode] || '';
  $('stats').innerHTML =
    '<div style="font-size:14px"><b>'+state.captain.name+'</b></div>'+
    '<div style="margin-top:4px;color:#bba070">'+ranks[state.rep]+'</div>'+
    '<hr>'+
    '<div>Day <b>'+state.day+'</b> &middot; Gold <b>'+state.gold+'</b>&#9876;</div>'+
    '<div>Hull <b>'+(state.hull|0)+'</b>/100 &middot; Morale <b>'+(state.morale|0)+'</b></div>'+
    '<div>Cannons L'+state.cannons+' &middot; Sails L'+state.sails+' &middot; Hull L'+state.hullLvl+'</div>'+
    '<div>Crew: <b>'+state.crew.filter(c=>c.alive).length+'</b> aboard</div>'+
    '<div>Cargo: '+(state.inventory.length?state.inventory.slice(-3).join(', '):'<i>empty</i>')+'</div>'+
    '<div style="margin-top:4px">Map: '+[0,1,2,3].map(i=>'<span class="frag'+(state.fragMap[i]?'':' empty')+'"></span>').join('')+' <b>'+state.fragments+'/4</b></div>';
  let ang = state.windDir;
  if(state.target) ang = Math.atan2(state.target.x - ship.position.x, state.target.z - ship.position.z);
  $('compass-needle').style.transform = 'rotate('+(ang*180/Math.PI + 180)+'deg)';
  $('wind').innerHTML = '<div><span id="wind-arrow">&#x21E7;</span></div><div>Wind '+windName(state.windDir)+' &middot; '+(state.windPow*100|0)+'%</div>';
  $('wind-arrow').style.transform = 'rotate('+(state.windDir*180/Math.PI + 180)+'deg)';
  rebuildIslandList();
}
function rebuildIslandList(){
  const list = islandObjs.filter(o=>!o.data.hidden || o.group.visible).slice().sort(function(a,b){
    const da = Math.hypot(a.data.x-ship.position.x, a.data.z-ship.position.z);
    const db = Math.hypot(b.data.x-ship.position.x, b.data.z-ship.position.z);
    return da - db;
  });
  let html = '<b>NAVIGATION CHARTS</b>';
  for(const o of list){
    const d = Math.hypot(o.data.x-ship.position.x, o.data.z-ship.position.z)|0;
    const f = o.data.frag ? (state.fragMap[o.data.frag-1]?' &#9873;':' &#9873;?') : '';
    const cls = (o.data.base==='eldorado'?' cursed':'');
    html += '<button class="island-btn'+cls+'" data-name="'+o.data.n+'">'+o.data.n+f+' <span style="opacity:0.6;float:right">'+d+'m</span></button>';
  }
  $('islandList').innerHTML = html;
  for(const btn of $('islandList').querySelectorAll('.island-btn')){
    btn.onclick = function(){
      const isl = ISLANDS.find(i=>i.n===btn.dataset.name);
      if(isl && !state.paused && (state.mode==='island'||state.mode==='sailing'||state.mode==='sailingTo'||state.mode==='idle')){
        setSailTo(isl);
      }
    };
  }
}
function setActions(actions){
  $('actions').innerHTML = '';
  for(const a of actions){
    const label = a[0], fn = a[1], cls = a[2];
    const b = document.createElement('button');
    b.className = 'btn' + (cls?(' '+cls):'');
    b.innerHTML = label;
    b.onclick = fn;
    $('actions').appendChild(b);
  }
}
$('cam-chase').onclick = function(){state.cam='chase'};
$('cam-map').onclick = function(){state.cam='map'};
$('cam-dock').onclick = function(){state.cam='dock'};

// ===== Game flow =====
function pickName(prefix){
  const adj = ['Black','Crimson','Iron','Silver','Storm','Mad','Lucky','Bloody','Whispering','Iron-Hearted'];
  const noun = ['Wave','Hawk','Maiden','Fang','Banshee','Reaver','Tide','Lantern','Talon','Specter'];
  return (prefix||'') + adj[(Math.random()*adj.length)|0] + ' ' + noun[(Math.random()*noun.length)|0];
}
function setSailTo(island){
  if(state.mode==='encounter' || state.mode==='kraken' || state.mode==='endgame'){ logEvent('Cannot sail &mdash; engaged!'); return; }
  state.target = {x:island.x, z:island.z, isl:island};
  state.mode = 'sailingTo';
  logEvent('Setting sail for <b>'+island.n+'</b>.');
  setActions([
    ['Drop Anchor', dropAnchor],
    ['Quick Sail (skip)', skipSail, 'gold']
  ]);
}
function dropAnchor(){
  state.target = null;
  state.mode = 'sailing';
  logEvent('Dropped anchor mid-sea, drifting.');
  setActions([['Look at charts', function(){logEvent('Examining charts. Pick an island from the right panel.')}]]);
}
function skipSail(){
  if(!state.target) return;
  ship.position.set(state.target.x + (Math.random()<0.5?-30:30), 2, state.target.z + (Math.random()<0.5?-30:30));
  arriveAt(state.target.isl);
}
function arriveAt(island){
  state.mode = 'island';
  state.lastIsland = island;
  state.target = null;
  state.day += 1;
  logEvent('Arrived at <b>'+island.n+'</b>.');
  if(island.frag && !state.fragMap[island.frag-1]){
    triggerFragmentEncounter(island);
    return;
  }
  if(island.treasure && !state.invDigDone){
    setActions([
      ['&#x1FA99; Trade goods', doTrade, 'gold'],
      ['Repair hull', doRepair],
      ['&#x1F464; Recruit crew', doRecruit],
      ['Dig for treasure', doDig, 'evil'],
      ['&#x2693; Set sail', chooseDestination]
    ]);
    return;
  }
  if(island.base==='eldorado'){
    revealEldoradoArrival();
    return;
  }
  portMenu(island);
}
function portMenu(island){
  const acts = [
    ['&#x1FA99; Trade goods', doTrade, 'gold'],
    ['Repair hull', doRepair],
    ['&#x1F464; Recruit crew', doRecruit],
    ['Upgrade ship', doUpgrade, 'gold'],
    ['&#x1F37B; Tavern rumors', doTavern],
    ['&#x2693; Set sail', chooseDestination]
  ];
  if(island.base==='navy') acts.unshift(['&#x2694; Raid the fortress', doRaid, 'evil']);
  setActions(acts);
}
function doTrade(){
  const profit = 30 + ((Math.random()*70)|0) + state.rep*15;
  state.gold += profit; state.goldEver += profit;
  state.inventory.push(['silk','spice','rum','tobacco','sugar','silver'][(Math.random()*6)|0]);
  state.morale = Math.min(100, state.morale+3);
  logEvent('Traded goods at <b>'+state.lastIsland.n+'</b>. <b>+'+profit+'&#9876;</b>.');
  updateHUD();
}
function doRepair(){
  const cost = Math.max(20, ((100-state.hull)*2)|0);
  if(state.gold < cost){ logEvent('Not enough gold (need '+cost+'&#9876;).'); return; }
  state.gold -= cost; state.hull = Math.min(100, state.hull+45);
  logEvent('Repaired hull. <b>-'+cost+'&#9876;</b>, hull now '+(state.hull|0)+'/100.');
  updateHUD();
}
function doRecruit(){
  if(state.gold < 60){ logEvent('Need 60&#9876; to recruit.'); return; }
  state.gold -= 60;
  const tpl = CREW_TEMPLATES[(Math.random()*CREW_TEMPLATES.length)|0];
  const names = ['Bones','Salty','One-Eyed','Old','Lucky'];
  const surn = ['Jack','Sam','Pete','Rosa','Mira','Hawk','Pip','Vex'];
  const name = names[(Math.random()*names.length)|0]+' '+surn[(Math.random()*surn.length)|0];
  state.crew.push({...tpl, name, alive:true, loyalty:75});
  state.morale = Math.min(100, state.morale+5);
  logEvent('Recruited <b>'+name+'</b> ('+tpl.role+').');
  buildHero();
  updateHUD();
}
function doUpgrade(){
  const opts = [];
  if(state.cannons<3) opts.push(['Cannons L'+(state.cannons+1)+' (200&#9876;)', 200, function(){state.cannons++}]);
  if(state.sails<3) opts.push(['Sails L'+(state.sails+1)+' (180&#9876;)', 180, function(){state.sails++}]);
  if(state.hullLvl<3) opts.push(['Hull L'+(state.hullLvl+1)+' (220&#9876;)', 220, function(){state.hullLvl++; state.hull = 100}]);
  if(!opts.length){ logEvent('Ship is fully upgraded!'); return; }
  const acts = opts.map(function(o){
    return [o[0], function(){
      if(state.gold < o[1]){ logEvent('Need '+o[1]+'&#9876;.'); return; }
      state.gold -= o[1]; o[2](); logEvent('Upgraded! '+o[0]+'.'); updateHUD();
      portMenu(state.lastIsland);
    }, 'gold'];
  });
  acts.push(['&larr; Back', function(){portMenu(state.lastIsland)}]);
  setActions(acts);
}
function doTavern(){
  const rumors = [
    'Fragments are split across four cursed isles.',
    'The fortress of Port Royal hides one fragment beneath its keep.',
    'A rival pirate at Nassau Cove holds another piece.',
    "The Devil's Triangle stirs the kraken &mdash; beware!",
    'The ghost ship Banshee carries the last fragment.',
    'Iron Bay holds buried gold for one bold enough to dig.',
    'When all four fragments unite, El Dorado rises from the mist.'
  ];
  state.gold = Math.max(0, state.gold-10);
  logEvent('Tavern (-10&#9876;): "<i>'+rumors[(Math.random()*rumors.length)|0]+'</i>"');
  updateHUD();
}
function doRaid(){
  if(state.cannons<2){ logEvent('Need at least L2 cannons to raid a fort.'); return; }
  if(Math.random()<0.55){
    const g = 200 + ((Math.random()*250)|0);
    state.gold += g; state.goldEver += g;
    state.rep = Math.min(4, state.rep + 1);
    state.hull = Math.max(20, state.hull - 25);
    logEvent('Raided <b>'+state.lastIsland.n+'</b>! <b>+'+g+'&#9876;</b>, hull -25.');
  } else {
    state.hull = Math.max(0, state.hull - 50);
    logEvent('Raid failed at '+state.lastIsland.n+'. Hull -50.');
    if(state.hull<=0){ loseGame('Cannons silenced your hull. Davy Jones claims another.'); return; }
  }
  updateHUD();
}
function doDig(){
  state.invDigDone = true;
  if(Math.random()<0.7){
    const g = 300 + ((Math.random()*400)|0);
    state.gold += g; state.goldEver += g;
    logEvent('Dug up the X-mark on Iron Bay! <b>+'+g+'&#9876;</b> gold.');
  } else {
    logEvent('Dug all afternoon. Found only sand.');
    state.morale = Math.max(0, state.morale-5);
  }
  updateHUD();
}
function chooseDestination(){
  state.mode = 'sailing';
  state.invDigDone = false;
  setActions([['Open Charts', function(){logEvent('Pick an island from the navigation panel &rarr;')}]]);
  logEvent('Weighed anchor. Pick a destination.');
}

// ===== Combat =====
function triggerFragmentEncounter(island){
  state.mode = 'encounter';
  enemy.visible = true;
  enemy.position.set(ship.position.x + 60, 0, ship.position.z + 8);
  enemy.rotation.y = -Math.PI/2;
  state.enemyHP = 100 + island.frag*30;
  state.enemyName = pickName(island.frag===2?'Captain Vega the ':'') ;
  if(island.frag===4) state.enemyName = 'Ghost Ship Banshee';
  if(island.frag===1) state.enemyName = 'HMS Vanguard';
  if(island.frag===3) state.enemyName = 'Kraken-Riders';
  logEvent('A foe appears off <b>'+island.n+'</b>: <b>'+state.enemyName+'</b>!');
  combatActions();
}
function combatActions(){
  setActions([
    ['&#x1F4A5; Broadside (Port)', function(){broadside(-1)}, 'evil'],
    ['&#x1F4A5; Broadside (Starboard)', function(){broadside(1)}, 'evil'],
    ['&#x2694; Board them!', boarding, 'evil'],
    ['&#x1F4A8; Evade', evade]
  ]);
}
function broadside(side){
  fireCannons(ship, side);
  setTimeout(function(){
    const dmg = 12 + state.cannons*8 + ((Math.random()*8)|0);
    state.enemyHP -= dmg;
    logEvent('Broadside! <b>-'+dmg+'</b> enemy hull. ('+Math.max(0,state.enemyHP|0)+' left)');
    if(state.enemyHP<=0){ winCombat(); return; }
    setTimeout(function(){
      fireCannons(enemy, Math.random()<0.5?-1:1);
      setTimeout(function(){
        const ed = 8 + ((Math.random()*14)|0) - state.hullLvl*2;
        state.hull = Math.max(0, state.hull - Math.max(2,ed));
        logEvent('Enemy returns fire! <b>-'+Math.max(2,ed)+'</b> hull.');
        if(state.hull<=0){ loseGame('Hull breached in battle. The sea takes you.'); return; }
        updateHUD();
      }, 250);
    }, 600);
    updateHUD();
  }, 250);
}
function boarding(){
  const power = state.crew.filter(c=>c.alive).length * 12 + state.rep*5;
  const enemyPwr = 35 + ((Math.random()*45)|0);
  if(power >= enemyPwr){
    logEvent('Cutlasses flash &mdash; victory at boarding!');
    winCombat(true);
  } else {
    const lost = 1 + ((Math.random()*2)|0);
    for(let i=0;i<lost;i++){
      const idx = state.crew.findIndex(c=>c.alive && c.role!=='Captain');
      if(idx>=0) state.crew[idx].alive = false;
    }
    state.hull = Math.max(0, state.hull - 18);
    state.morale = Math.max(0, state.morale - 10);
    logEvent('Boarding repelled. Lost '+lost+' crew.');
    buildHero();
    if(state.hull<=0){ loseGame('Hull breached during boarding.'); return; }
    updateHUD();
  }
}
function evade(){
  if(Math.random() < 0.4 + state.sails*0.15){
    logEvent('Evaded into the fog. Combat ended.');
    enemy.visible = false; state.mode='sailing';
    setActions([['Open Charts', function(){logEvent('Pick an island.')}]]);
  } else {
    const ed = 10 + ((Math.random()*10)|0);
    state.hull = Math.max(0, state.hull - ed);
    logEvent('Evade failed! <b>-'+ed+'</b> hull.');
    if(state.hull<=0){ loseGame('Sails shredded mid-evade.'); return; }
    updateHUD();
  }
}
function winCombat(boarded){
  enemy.visible = false;
  state.mode = 'island';
  state.shipsSunk += 1;
  const g = 120 + ((Math.random()*220)|0) + (boarded?80:0);
  state.gold += g; state.goldEver += g;
  state.rep = Math.min(4, state.rep + 1);
  const isl = state.lastIsland;
  if(isl && isl.frag && !state.fragMap[isl.frag-1]){
    state.fragMap[isl.frag-1] = true;
    state.fragments += 1;
    state.inventory.push('Fragment '+isl.frag);
    logEvent('Defeated <b>'+state.enemyName+'</b>! Recovered <b>Fragment '+isl.frag+'/4</b>! +'+g+'&#9876;');
  } else {
    logEvent('Defeated <b>'+state.enemyName+'</b>! +'+g+'&#9876;');
  }
  if(state.fragments>=4){ revealEldorado(); return; }
  portMenu(isl);
  updateHUD();
}
function loseCombat(){ loseGame('Defeated in battle.'); }

// ===== Kraken =====
function triggerKraken(){
  state.mode = 'kraken';
  state.tentacles = [];
  for(let i=0;i<5;i++){
    const t = makeTentacle();
    const a = (i/5)*Math.PI*2 + Math.random();
    t.position.set(ship.position.x + Math.cos(a)*16, 0, ship.position.z + Math.sin(a)*16);
    t.userData.hp = 30; t.userData.angle = a; t.userData.t = Math.random()*10;
    scene.add(t);
    state.tentacles.push(t);
  }
  logEvent('<b>The Kraken!</b> Tentacles erupt around the ship!');
  setActions([
    ['&#x1F4A5; Volley both sides', fireKraken, 'evil'],
    ['&#x2694; Hack tentacles', hackKraken, 'evil'],
    ['Flee on the wind', fleeKraken]
  ]);
}
function fireKraken(){
  fireCannons(ship,-1); fireCannons(ship,1);
  setTimeout(function(){
    let killed = 0;
    for(const t of state.tentacles){
      if(t.userData.hp>0){
        t.userData.hp -= 12 + state.cannons*6;
        if(t.userData.hp<=0){
          for(let k=0;k<8;k++){
            const v = new T.Vector3((Math.random()-0.5)*6,4+Math.random()*4,(Math.random()-0.5)*6);
            fx('splash', t.position, v, 0xeaf4ff, 0.8);
          }
          scene.remove(t); killed++;
        }
      }
    }
    state.tentacles = state.tentacles.filter(t=>t.userData.hp>0);
    logEvent('Volley downs '+killed+' tentacle(s). '+state.tentacles.length+' remain.');
    if(state.tentacles.length===0){ krakenSlain(); return; }
    state.hull = Math.max(0, state.hull - 8);
    if(state.hull<=0){ loseGame('Crushed by tentacles.'); return; }
    updateHUD();
  }, 500);
}
function hackKraken(){
  const t = state.tentacles[0];
  if(!t) return;
  t.userData.hp = 0;
  for(let k=0;k<10;k++){
    const v = new T.Vector3((Math.random()-0.5)*8,5+Math.random()*4,(Math.random()-0.5)*8);
    fx('splash', t.position, v, 0xeaf4ff, 0.8);
  }
  scene.remove(t);
  state.tentacles.shift();
  logEvent('Hacked a tentacle clean off!');
  state.hull = Math.max(0, state.hull - 4);
  if(state.tentacles.length===0){ krakenSlain(); return; }
  if(state.hull<=0){ loseGame('Dragged under.'); return; }
  updateHUD();
}
function fleeKraken(){
  if(Math.random() < 0.3 + state.sails*0.18){
    logEvent('Slipped the kraken! Make way!');
    for(const t of state.tentacles) scene.remove(t);
    state.tentacles = [];
    state.mode = 'sailing';
    setActions([['Open Charts', function(){}]]);
  } else {
    state.hull = Math.max(0, state.hull - 18);
    logEvent('Tentacle smashes the deck! -18 hull.');
    if(state.hull<=0){ loseGame('Kraken pulls you under.'); return; }
    updateHUD();
  }
}
function krakenSlain(){
  state.krakenSlain = true;
  state.rep = Math.min(4, state.rep+1);
  const g = 400;
  state.gold += g; state.goldEver += g;
  if(!state.fragMap[2]){ state.fragMap[2] = true; state.fragments += 1; state.inventory.push('Fragment 3'); }
  logEvent('<b>The Kraken is slain!</b> +'+g+'&#9876;, Fragment 3 recovered.');
  state.mode = 'sailing';
  if(state.fragments>=4){ revealEldorado(); return; }
  setActions([['Open Charts', function(){}]]);
  updateHUD();
}

// ===== El Dorado endgame =====
function revealEldorado(){
  eldoradoIsland.visible = true;
  eldoradoData.hidden = false;
  logEvent('<b>The fragments unite!</b> A golden island rises in the south. Set sail for <b>El Dorado</b>!');
  state.mode = 'sailing';
  setActions([['Open Charts', function(){}]]);
  updateHUD();
}
function revealEldoradoArrival(){
  state.mode = 'eldorado';
  logEvent('You enter the lagoon of <b>El Dorado</b>. Three armada warships block the bay!');
  triggerEndgameFleet();
}
function triggerEndgameFleet(){
  state.mode = 'endgame';
  for(const f of fleet){ scene.remove(f); }
  fleet.length = 0;
  for(let i=0;i<3;i++){
    const f = makeShip({hull:0x301810, sail:0xe0e0e0, flag:0x223388});
    f.position.set(eldoradoData.x + 25 + i*20, 0, eldoradoData.z + 35 - i*4);
    f.rotation.y = Math.PI/2;
    f.userData.hp = 90;
    scene.add(f); fleet.push(f);
  }
  logEvent('Three armada ships open fire! Sink them all!');
  setActions([
    ['&#x1F4A5; Fleet Volley', fleetVolley, 'evil'],
    ['Hold the line', fleetHold]
  ]);
}
function fleetVolley(){
  fireCannons(ship,1); fireCannons(ship,-1);
  setTimeout(function(){
    const target = fleet.find(f=>f.userData.hp>0);
    if(target){
      const dmg = 18 + state.cannons*9 + ((Math.random()*8)|0);
      target.userData.hp -= dmg;
      logEvent('Hit! '+target.userData.hp+' hp on flagship target.');
      if(target.userData.hp<=0){
        for(let k=0;k<14;k++){
          const v = new T.Vector3((Math.random()-0.5)*10,5+Math.random()*5,(Math.random()-0.5)*10);
          fx('splash', target.position, v, 0xeaf4ff, 1.0);
          fx('debris', target.position, new T.Vector3((Math.random()-0.5)*10,4+Math.random()*4,(Math.random()-0.5)*10), 0, 1.6);
        }
        scene.remove(target);
        const idx = fleet.indexOf(target); if(idx>=0) fleet.splice(idx,1);
        logEvent('<b>Armada ship sunk!</b> '+fleet.length+' remain.');
      }
    }
    if(fleet.length===0){ winGame(); return; }
    for(const f of fleet){
      fireCannons(f, Math.random()<0.5?-1:1);
    }
    setTimeout(function(){
      const ed = 14 + ((Math.random()*8)|0) - state.hullLvl*2;
      state.hull = Math.max(0, state.hull - Math.max(2,ed));
      logEvent('Armada returns fire! -'+Math.max(2,ed)+' hull.');
      if(state.hull<=0){ loseGame('Lost in El Dorado bay.'); return; }
      updateHUD();
    }, 350);
  }, 350);
}
function fleetHold(){
  state.hull = Math.min(100, state.hull + 6);
  state.morale = Math.min(100, state.morale + 4);
  logEvent('Bracing for impact &mdash; crew patches the hull.');
  for(const f of fleet){ fireCannons(f, Math.random()<0.5?-1:1); }
  setTimeout(function(){
    const ed = 8;
    state.hull = Math.max(0, state.hull - ed);
    logEvent('Took partial hits while holding. -'+ed+' hull.');
    if(state.hull<=0){ loseGame('Held too long.'); return; }
    updateHUD();
  }, 300);
}

function endGame(won, reason){
  if(state.mode==='end' || state.mode==='ending') return;
  state.mode = 'ending';
  state.endResult = won;
  state.endTimer = 10;
  state.alive = won;
  const total = state.goldEver + (won?5000:0);
  const html =
    '<h1>'+(won?'&#x2620; LEGEND OF THE CARIBBEAN &#x2620;':'&#x2620; SUNK BY THE SEA &#x2620;')+'</h1>'+
    '<div class="sub">'+reason+'</div>'+
    '<div class="stats">'+
      '<div>Captain: <b>'+state.captain.name+'</b></div>'+
      '<div>Days at sea: <b>'+state.day+'</b></div>'+
      '<div>Gold earned: <b>'+total+'&#9876;</b></div>'+
      '<div>Ships sunk: <b>'+state.shipsSunk+'</b></div>'+
      '<div>Fragments: <b>'+state.fragments+'/4</b></div>'+
      '<div>Reputation: <b>'+ranks[state.rep]+'</b></div>'+
      '<div>Kraken slain: <b>'+(state.krakenSlain?'YES':'no')+'</b></div>'+
    '</div>'+
    '<div id="restartCounter">Auto-restart in <span id="rt">10</span>s &middot; click to restart now</div>';
  $('endcontent').innerHTML = html;
  $('endscreen').style.display = 'flex';
  $('endscreen').onclick = function(){ restartGame(); };
}
function winGame(){ endGame(true, 'You found El Dorado and lived to tell the tale.'); }
function loseGame(reason){ endGame(false, reason || 'The Caribbean claims another captain.'); }
function restartGame(){
  $('endscreen').style.display='none';
  state.gold=250; state.rep=0; state.morale=80; state.hull=100;
  state.cannons=1; state.sails=1; state.hullLvl=1;
  state.fragments=0; state.fragMap=[false,false,false,false];
  state.inventory=[]; state.log=[]; state.day=1;
  state.mode='idle'; state.target=null;
  state.cam='chase'; state.shipVel.set(0,0,0); state.windDir=Math.random()*Math.PI*2; state.windPow=0.7;
  state.enemyHP=100; state.combatTimer=0; state.storm=0;
  state.endTimer=0; state.endResult=null; state.alive=true; state.enemyName=null;
  state.goldEver=0; state.shipsSunk=0; state.krakenSlain=false; state.tentacles=[];
  state.invDigDone=false; state.paused=false;
  state.captain = CAPTAINS[Math.floor(Math.random()*CAPTAINS.length)];
  state.crew = CREW_TEMPLATES.slice(0,5).map(c=>({...c, alive:true, loyalty:80}));
  for(const f of fleet){ scene.remove(f); } fleet.length=0;
  for(const t of state.tentacles){ scene.remove(t); } state.tentacles=[];
  enemy.visible = false;
  eldoradoIsland.visible = false; eldoradoData.hidden = true;
  buildHero();
  setActions([['Open Charts', function(){logEvent('Pick an island.')}]]);
  logEvent('<b>A new captain takes the wheel.</b>');
  updateHUD();
}

// ===== Camera + day/night =====
const _camTarget = new T.Vector3();
const _camOff = new T.Vector3();
function updateCamera(dt){
  const sp = ship.position;
  const heading = state.shipHeading;
  if(state.cam==='chase'){
    const back = new T.Vector3(Math.sin(heading), 0, Math.cos(heading)).multiplyScalar(-22);
    _camTarget.set(sp.x + back.x, 12, sp.z + back.z);
    camera.position.lerp(_camTarget, 1 - Math.pow(0.001, dt));
    camera.lookAt(sp.x, 4, sp.z);
  } else if(state.cam==='map'){
    _camTarget.set(sp.x, 80, sp.z + 40);
    camera.position.lerp(_camTarget, 1 - Math.pow(0.001, dt));
    camera.lookAt(sp.x, 0, sp.z);
  } else if(state.cam==='dock'){
    const back = new T.Vector3(Math.sin(heading+0.6), 0, Math.cos(heading+0.6)).multiplyScalar(-14);
    _camTarget.set(sp.x + back.x, 6, sp.z + back.z);
    camera.position.lerp(_camTarget, 1 - Math.pow(0.001, dt));
    camera.lookAt(sp.x, 4, sp.z - 2);
  }
}

function updateDayNight(dt){
  state.daySec += dt;
  const cyc = (state.daySec / 90) % 1;
  const ang = cyc * Math.PI*2;
  sun.position.set(Math.cos(ang)*200, Math.sin(ang)*150 + 30, Math.sin(ang)*200);
  const isNight = sun.position.y < 12;
  const night = isNight ? Math.min(1, (12 - sun.position.y)/40) : 0;
  oceanMat.uniforms.uTime.value += dt;
  oceanMat.uniforms.uNight.value = night;
  oceanMat.uniforms.uSunDir.value.copy(sun.position).normalize();
  oceanMat.uniforms.uStorm.value = state.storm;
  oceanMat.uniforms.uFog.value = state.storm*0.5;
  const sky = new T.Color().setHSL(0.6 - 0.05*night, 0.5, 0.55 - 0.5*night);
  scene.background = sky;
  scene.fog.color = sky;
  scene.fog.density = 0.0035 + state.storm*0.012 + night*0.002;
  starField.material.opacity = night;
  constellations.material.opacity = Math.min(1, night*1.4);
  amb.intensity = 0.55 - night*0.35;
  hemi.intensity = 0.45 - night*0.3;
  sun.intensity = isNight ? 0.15 : 1.05;
  if(isNight && state.day !== state._lastDay){ state._lastDay = state.day; }
}


// ===== Animation loop =====
const clock = new T.Clock();
let lastEnc = 0;
let _lastSize = {w:0,h:0};
function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  if(w===_lastSize.w && h===_lastSize.h) return;
  _lastSize.w = w; _lastSize.h = h;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

function maybeEvent(){
  if(state.mode==='encounter'||state.mode==='kraken'||state.mode==='endgame'||state.mode==='ending'||state.mode==='end') return;
  state.encounterCD -= 1;
  if(state.encounterCD>0) return;
  state.encounterCD = 8 + ((Math.random()*8)|0);
  const r = Math.random();
  if(r<0.25){
    state.storm = 1.0;
    logEvent('A <b>storm</b> rolls in! Hold fast!');
    setTimeout(function(){ state.storm = 0; if(state.mode==='sailingTo'||state.mode==='sailing') logEvent('Storm passes &mdash; clear seas.'); }, 9000);
  } else if(r<0.40 && !state.krakenSlain){
    triggerKraken();
  } else if(r<0.55){
    const ghosts = ['A bottle floats by &mdash; +1 rumor.','A pod of dolphins escorts the ship. Morale +5.','Wind picks up. Speed bonus!','A merchant signals friendly trade. +30&#9876;.','A mutiny mutter is silenced by the captain.','A ghostly chant rolls across the waves...'];
    const e = ghosts[(Math.random()*ghosts.length)|0];
    logEvent(e);
    if(e.indexOf('+30')>=0){ state.gold += 30; state.goldEver+=30; }
    if(e.indexOf('Morale')>=0) state.morale = Math.min(100, state.morale+5);
    updateHUD();
  } else if(r<0.70 && state.crew.filter(c=>c.alive).length>2){
    if(state.morale<40 && Math.random()<0.5){
      const idx = state.crew.findIndex(c=>c.alive && c.role!=='Captain');
      if(idx>=0){ state.crew[idx].alive=false; buildHero(); logEvent('<b>Mutiny!</b> A crewman jumps ship.'); state.morale=Math.max(0,state.morale-10); }
    }
  }
}

function tickShip(dt){
  if(state.mode==='sailingTo' && state.target){
    const dx = state.target.x - ship.position.x;
    const dz = state.target.z - ship.position.z;
    const dist = Math.hypot(dx,dz);
    if(dist < 18){
      arriveAt(state.target.isl);
    } else {
      const desired = Math.atan2(dx, dz);
      let dh = desired - state.shipHeading;
      while(dh > Math.PI) dh -= Math.PI*2;
      while(dh < -Math.PI) dh += Math.PI*2;
      state.shipHeading += Math.max(-1.2*dt, Math.min(1.2*dt, dh));
      ship.rotation.y = state.shipHeading;
      const speed = 9 + state.sails*4 - state.storm*3;
      ship.position.x += Math.sin(state.shipHeading) * speed * dt;
      ship.position.z += Math.cos(state.shipHeading) * speed * dt;
    }
  }
  const t = oceanMat.uniforms.uTime.value;
  const s = state.storm;
  const wy = waveAt(ship.position.x, ship.position.z, t, s);
  ship.position.y = wy + 1.6;
  ship.rotation.z = Math.sin(t*1.1)*0.05 + s*0.06*Math.sin(t*2.3);
  const pitch = (waveAt(ship.position.x, ship.position.z+4, t, s) - waveAt(ship.position.x, ship.position.z-4, t, s)) * 0.04;
  ship.rotation.x = pitch;
  if(ship.userData.flag){
    const f = ship.userData.flag;
    f.rotation.y = Math.sin(t*3 + ship.position.x*0.05)*0.4 + state.windDir*0.3;
  }
  if(ship.userData.sails){
    for(const sl of ship.userData.sails){
      sl.rotation.x = Math.sin(t*1.5)*0.04;
    }
  }
  if(enemy.visible){
    const ewy = waveAt(enemy.position.x, enemy.position.z, t, s);
    enemy.position.y = ewy + 1.6;
    enemy.rotation.z = Math.sin(t*1.0+1)*0.05;
  }
  for(const f of fleet){
    const fwy = waveAt(f.position.x, f.position.z, t, s);
    f.position.y = fwy + 1.6;
    f.rotation.z = Math.sin(t*0.9+f.position.x)*0.05;
  }
  for(const tnt of state.tentacles){
    tnt.userData.t += dt;
    tnt.position.y = -1 + Math.sin(tnt.userData.t*1.2)*0.6;
    tnt.rotation.y += dt*0.4;
    tnt.rotation.z = Math.sin(tnt.userData.t)*0.2;
  }
}

let dayTimer = 0;
function tickDay(dt){
  dayTimer += dt;
  if(dayTimer > 12){
    dayTimer = 0;
    if(state.mode==='sailingTo' || state.mode==='sailing'){
      state.day += 1;
      maybeEvent();
      updateHUD();
    }
  }
}

let rainTimer = 0;
function tickWeather(dt){
  rainTimer -= dt;
  if(state.storm>0.1 && rainTimer<=0){
    rainTimer = 0.05;
    for(let i=0;i<6;i++){
      const px = ship.position.x + (Math.random()-0.5)*60;
      const pz = ship.position.z + (Math.random()-0.5)*60;
      fx('rain', new T.Vector3(px, 25+Math.random()*15, pz), null, 0xaaccff, 1.0);
    }
  }
}

function tickEndCounter(dt){
  if(state.mode==='ending'){
    state.endTimer -= dt;
    const rt = $('rt');
    if(rt) rt.textContent = Math.max(0, state.endTimer|0);
    if(state.endTimer<=0){ restartGame(); }
  }
}

function loop(){
  requestAnimationFrame(loop);
  let dt = clock.getDelta();
  if(dt > 0.1) dt = 0.1;
  updateDayNight(dt);
  tickShip(dt);
  tickDay(dt);
  tickWeather(dt);
  updateFX(dt);
  updateCamera(dt);
  tickEndCounter(dt);
  if(captainMesh){
    captainMesh.rotation.y = Math.sin(oceanMat.uniforms.uTime.value*0.4)*0.1;
  }
  if(state.mode==='sailingTo' && state.target){
    const dist = Math.hypot(state.target.x-ship.position.x, state.target.z-ship.position.z);
    if(dist > 90 && Math.random() < 0.005){
      maybeEvent();
    }
  }
  renderer.render(scene, camera);
}

logEvent('<b>'+state.captain.name+'</b> takes the wheel of <b>The '+pickName('').replace(/^.*? /,'')+'</b>.');
logEvent('Find the four fragments to reveal <b>El Dorado</b>.');
setActions([['Open Charts', function(){ logEvent('Pick an island from the right panel.'); }]]);
updateHUD();
loop();

})();
</script>
</body>
</html>
