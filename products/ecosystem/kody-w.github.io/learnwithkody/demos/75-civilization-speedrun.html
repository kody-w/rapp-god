<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Civilization Speedrun · 5000 Years in 5 Minutes</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, #15161e 0%, #050608 100%);
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #wrap {
    position: relative;
    width: 960px; height: 640px;
    box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 1px rgba(255,255,255,0.1);
  }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  .hud {
    position: absolute;
    padding: 9px 12px;
    background: rgba(8, 10, 16, 0.7);
    border-radius: 6px;
    font-size: 11px;
    min-width: 158px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.07);
    line-height: 1.35;
    pointer-events: none;
  }
  .hud .name { font-weight: 700; font-size: 13px; margin-bottom: 4px; letter-spacing: 1px; }
  .hud .row { display: flex; justify-content: space-between; margin: 1px 0; opacity: 0.92; }
  .hud .bar {
    height: 3px; background: rgba(255,255,255,0.08);
    margin: 1px 0 3px; border-radius: 2px; overflow: hidden;
  }
  .hud .bar > div { height: 100%; transition: width 0.25s ease-out; }
  .hud .techs { font-size: 13px; letter-spacing: 2px; min-height: 16px; margin-top: 2px; }
  .hud .ally { margin-top: 4px; font-size: 10px; opacity: 0.75; font-style: italic; }
  .hud.dead { opacity: 0.45; }
  .hud.dead .name { text-decoration: line-through; }
  #h0 { top: 8px; left: 8px; }
  #h1 { top: 8px; right: 8px; }
  #h2 { bottom: 56px; left: 8px; }
  #h3 { bottom: 56px; right: 8px; }
  #h1 .row, #h3 .row { flex-direction: row-reverse; }
  #year {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    padding: 6px 22px; background: rgba(8, 10, 16, 0.7);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border-radius: 20px; font-family: 'SF Mono', Menlo, monospace;
    font-size: 14px; letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  #year .era { opacity: 0.55; font-size: 10px; margin-left: 8px; letter-spacing: 2px; }
  #title {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px; letter-spacing: 6px; opacity: 0;
    pointer-events: none; transition: opacity 1s;
  }
  #controls {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center;
    padding: 6px 14px;
    background: rgba(8, 10, 16, 0.7);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border-radius: 20px; font-size: 11px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  #controls input[type="range"] { width: 130px; accent-color: #d4cf8e; }
  #controls span { opacity: 0.85; }
  #scoreboard {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0.85));
    opacity: 0; pointer-events: none;
    transition: opacity 0.9s ease;
  }
  #scoreboard.show { opacity: 1; }
  #winner {
    font-size: 46px; margin: 0; letter-spacing: 12px; font-weight: 200;
  }
  #winSub { margin-top: 4px; font-size: 12px; opacity: 0.75; letter-spacing: 3px; }
  #winStats { display: flex; gap: 26px; margin-top: 22px; }
  #winStats .ws { text-align: center; min-width: 92px; }
  #winStats .ws .nm { font-weight: 700; letter-spacing: 1px; font-size: 13px; }
  #winStats .ws .l1 { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  #winStats .ws .l2 { font-size: 11px; opacity: 0.8; }
  #restartTimer { margin-top: 24px; opacity: 0.55; font-size: 11px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="640"></canvas>
  <div id="year">Year 0<span class="era">DAWN</span></div>
  <div id="h0" class="hud"></div>
  <div id="h1" class="hud"></div>
  <div id="h2" class="hud"></div>
  <div id="h3" class="hud"></div>
  <div id="controls">
    <span>SPEED</span>
    <input type="range" id="speed" min="0.25" max="8" step="0.25" value="1">
    <span id="speedV">1.00×</span>
  </div>
  <div id="scoreboard">
    <h1 id="winner">VICTORY</h1>
    <div id="winSub"></div>
    <div id="winStats"></div>
    <div id="restartTimer">Next age beginning…</div>
  </div>
</div>
<script>
'use strict';

/* ============================================================
   CIVILIZATION SPEEDRUN
   4 tribes, 1 procedural map, 5000 years in 5 minutes.
   ============================================================ */

const TILE = 8, MAP_W = 120, MAP_H = 80;
const W = MAP_W * TILE, H = MAP_H * TILE;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const TERR = { WATER: 0, DESERT: 1, GRASS: 2, FOREST: 3, HILLS: 4, MOUNT: 5 };
const TERR_BASE = ['#2c5d8a', '#d4b876', '#7ba556', '#3a6b3c', '#9c8865', '#7a7670'];

const TRIBE_DEFS = [
  { name: 'CRIMSON', main: '#e74c3c', dark: '#922d20', rgb: [231, 76, 60] },
  { name: 'AZURE',   main: '#3498db', dark: '#1f5c87', rgb: [52, 152, 219] },
  { name: 'VERDANT', main: '#2dd577', dark: '#178244', rgb: [45, 213, 119] },
  { name: 'SOLAR',   main: '#f1c40f', dark: '#a78a08', rgb: [241, 196, 15] },
];

const ERAS = [
  [   0, 'STONE'   ],
  [ 200, 'BRONZE'  ],
  [ 800, 'CLASSICAL'],
  [1600, 'MEDIEVAL'],
  [2400, 'RENAISSANCE'],
  [3200, 'INDUSTRIAL'],
  [4000, 'MODERN'  ],
  [4800, 'ATOMIC'  ],
];

let world, gameOver, restartTimer, lastTime, tickAccum;

/* -------- Hash + value noise (deterministic from seed) -------- */
function hash2(x, y, s) {
  let h = Math.imul(x | 0, 374761393) ^ Math.imul(y | 0, 668265263) ^ Math.imul(s | 0, 1442695040);
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
}
function valueNoise(x, y, seed) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf);
  const v = yf * yf * (3 - 2 * yf);
  const a = hash2(xi,     yi,     seed);
  const b = hash2(xi + 1, yi,     seed);
  const c = hash2(xi,     yi + 1, seed);
  const d = hash2(xi + 1, yi + 1, seed);
  return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
}
function fbm(x, y, seed, oct = 4) {
  let sum = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < oct; i++) {
    sum += valueNoise(x * freq, y * freq, seed + i * 131) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return sum / max;
}

/* ------------------------------------------------------------------ */
/* World                                                              */
/* ------------------------------------------------------------------ */
class World {
  constructor(seed) {
    this.seed = seed;
    this.terrain = new Uint8Array(MAP_W * MAP_H);
    this.owner   = new Int8Array(MAP_W * MAP_H);
    this.settle  = new Uint8Array(MAP_W * MAP_H);
    this.owner.fill(-1);
    this.year = 0;
    this.tribes = [];
    this.events = [];

    this.generateTerrain();
    this.spawnTribes();

    this.terrainCanvas   = document.createElement('canvas');
    this.terrainCanvas.width = W; this.terrainCanvas.height = H;
    this.territoryCanvas = document.createElement('canvas');
    this.territoryCanvas.width = W; this.territoryCanvas.height = H;
    this.renderTerrain();
    this.dirtyTerritory = true;

    this._totalLand = -1;
  }

  idx(x, y) { return y * MAP_W + x; }

  /* --- Procedural terrain --- */
  generateTerrain() {
    const s = this.seed;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const nx = x * 0.055, ny = y * 0.075;
        const elev = fbm(nx, ny, s);
        const moist = fbm(nx + 17, ny - 31, s + 9999);
        const temp = 1 - Math.abs(y - MAP_H / 2) / (MAP_H / 2) * 0.6
                       + (fbm(nx, ny, s + 1212) - 0.5) * 0.3;
        let t;
        if (elev < 0.33)        t = TERR.WATER;
        else if (elev > 0.79)   t = TERR.MOUNT;
        else if (elev > 0.63)   t = TERR.HILLS;
        else if (moist > 0.6)   t = TERR.FOREST;
        else if (moist < 0.4 && temp > 0.6) t = TERR.DESERT;
        else                    t = TERR.GRASS;
        this.terrain[this.idx(x, y)] = t;
      }
    }
    // Carve a few rivers from high points down to water
    for (let r = 0; r < 3; r++) {
      let bx = -1, by = -1, bestE = 0.65;
      for (let i = 0; i < 250; i++) {
        const x = Math.floor(hash2(i, r, s + 7) * MAP_W);
        const y = Math.floor(hash2(r, i, s + 11) * MAP_H);
        const t = this.terrain[this.idx(x, y)];
        if (t !== TERR.MOUNT && t !== TERR.HILLS) continue;
        const e = fbm(x * 0.055, y * 0.075, s);
        if (e > bestE) { bestE = e; bx = x; by = y; }
      }
      if (bx < 0) continue;
      let cx = bx, cy = by;
      for (let step = 0; step < 50; step++) {
        const ck = this.idx(cx, cy);
        if (this.terrain[ck] === TERR.WATER) break;
        this.terrain[ck] = TERR.WATER;
        let nbx = cx, nby = cy, bestEl = 9;
        for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
          if (!dx && !dy) continue;
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) continue;
          const e = fbm(nx * 0.055, ny * 0.075, s) + (hash2(nx, ny, s + 99) - 0.5) * 0.04;
          if (e < bestEl) { bestEl = e; nbx = nx; nby = ny; }
        }
        if (nbx === cx && nby === cy) break;
        cx = nbx; cy = nby;
      }
    }
  }

  /* --- Spawn 4 tribes near 4 corners --- */
  spawnTribes() {
    const corners = [[7, 7], [MAP_W - 8, 7], [7, MAP_H - 8], [MAP_W - 8, MAP_H - 8]];
    for (let i = 0; i < 4; i++) {
      const [cx, cy] = corners[i];
      // BFS to closest passable tile
      const visited = new Uint8Array(MAP_W * MAP_H);
      const q = [[cx, cy]];
      let sx = cx, sy = cy, found = false;
      while (q.length && !found) {
        const [x, y] = q.shift();
        if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) continue;
        const k = this.idx(x, y);
        if (visited[k]) continue;
        visited[k] = 1;
        const t = this.terrain[k];
        if (t !== TERR.WATER && t !== TERR.MOUNT) { sx = x; sy = y; found = true; break; }
        q.push([x + 1, y]); q.push([x - 1, y]); q.push([x, y + 1]); q.push([x, y - 1]);
      }
      const tribe = {
        id: i,
        def: TRIBE_DEFS[i],
        pop: 30,
        food: 60,
        gold: 40,
        tech: 1,
        techProgress: 0,
        techs: { wood: false, farm: false, mining: false, trade: false, priest: false },
        territory: new Set(),
        border: new Set(),
        capital: [sx, sy],
        alliance: -1,
        allyTimer: 0,
        atWarWith: new Set(),
        warCooldown: 0,
        peakLand: 0,
        peakTech: 1,
        founded: 0,
        alive: true,
        deathYear: -1,
      };
      // claim capital + ring
      this.owner[this.idx(sx, sy)] = i;
      tribe.territory.add(this.idx(sx, sy));
      this.settle[this.idx(sx, sy)] = 2;
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
        const nx = sx + dx, ny = sy + dy;
        if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) continue;
        const k = this.idx(nx, ny);
        if (this.owner[k] !== -1) continue;
        const tt = this.terrain[k];
        if (tt === TERR.MOUNT) continue;
        this.owner[k] = i;
        tribe.territory.add(k);
      }
      this.tribes.push(tribe);
    }
    for (const tribe of this.tribes) this.recomputeBorder(tribe);
  }

  recomputeBorder(tribe) {
    tribe.border.clear();
    for (const k of tribe.territory) {
      const x = k % MAP_W, y = (k / MAP_W) | 0;
      let isB = false;
      if (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1) isB = true;
      else if (this.owner[this.idx(x + 1, y)] !== tribe.id) isB = true;
      else if (this.owner[this.idx(x - 1, y)] !== tribe.id) isB = true;
      else if (this.owner[this.idx(x, y + 1)] !== tribe.id) isB = true;
      else if (this.owner[this.idx(x, y - 1)] !== tribe.id) isB = true;
      if (isB) tribe.border.add(k);
    }
  }

  takeTile(tribe, k, fromTribe) {
    if (this.owner[k] === tribe.id) return;
    if (fromTribe) {
      fromTribe.territory.delete(k);
      fromTribe.border.delete(k);
      // capital lost? promote a settlement to capital
      const wasCapital = (this.settle[k] === 2);
      this.settle[k] = 0;
      if (wasCapital && fromTribe.territory.size > 0) {
        // pick first owned tile to become new capital
        const replacement = fromTribe.territory.values().next().value;
        this.settle[replacement] = 2;
        const rx = replacement % MAP_W, ry = (replacement / MAP_W) | 0;
        fromTribe.capital = [rx, ry];
      }
    }
    this.owner[k] = tribe.id;
    tribe.territory.add(k);
    this.dirtyTerritory = true;
    this._totalLand = -1; // unchanged actually, but harmless
    // Update borders for k and its 4 neighbors
    this._reBorderTile(k);
    const x = k % MAP_W, y = (k / MAP_W) | 0;
    if (x + 1 < MAP_W) this._reBorderTile(this.idx(x + 1, y));
    if (x - 1 >= 0)    this._reBorderTile(this.idx(x - 1, y));
    if (y + 1 < MAP_H) this._reBorderTile(this.idx(x, y + 1));
    if (y - 1 >= 0)    this._reBorderTile(this.idx(x, y - 1));
  }

  _reBorderTile(k) {
    const o = this.owner[k];
    if (o < 0) return;
    const t = this.tribes[o];
    const x = k % MAP_W, y = (k / MAP_W) | 0;
    let isB = (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1);
    if (!isB && this.owner[this.idx(x + 1, y)] !== o) isB = true;
    if (!isB && this.owner[this.idx(x - 1, y)] !== o) isB = true;
    if (!isB && this.owner[this.idx(x, y + 1)] !== o) isB = true;
    if (!isB && this.owner[this.idx(x, y - 1)] !== o) isB = true;
    if (isB) t.border.add(k); else t.border.delete(k);
  }

  /* --- Pre-render terrain to offscreen canvas --- */
  renderTerrain() {
    const tctx = this.terrainCanvas.getContext('2d');
    tctx.imageSmoothingEnabled = false;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = this.terrain[this.idx(x, y)];
        const px = x * TILE, py = y * TILE;
        // Base terrain
        const elev = fbm(x * 0.055, y * 0.075, this.seed);
        // Tint terrain slightly with elevation for depth
        let baseColor = TERR_BASE[t];
        const r = parseInt(baseColor.slice(1, 3), 16);
        const g = parseInt(baseColor.slice(3, 5), 16);
        const b = parseInt(baseColor.slice(5, 7), 16);
        const shade = (elev - 0.5) * 0.25;
        const rr = Math.max(0, Math.min(255, r + r * shade)) | 0;
        const gg = Math.max(0, Math.min(255, g + g * shade)) | 0;
        const bb = Math.max(0, Math.min(255, b + b * shade)) | 0;
        tctx.fillStyle = `rgb(${rr},${gg},${bb})`;
        tctx.fillRect(px, py, TILE, TILE);

        // Texture flecks
        const n = hash2(x, y, 99) - 0.5;
        if (Math.abs(n) > 0.3) {
          tctx.fillStyle = `rgba(${n > 0 ? 255 : 0},${n > 0 ? 255 : 0},${n > 0 ? 255 : 0},${Math.min(0.18, Math.abs(n) * 0.18)})`;
          tctx.fillRect(px, py, TILE, TILE);
        }
        // Per-biome decorations
        if (t === TERR.FOREST) {
          tctx.fillStyle = 'rgba(20,40,18,0.55)';
          const h = hash2(x, y, 5);
          tctx.fillRect(px + 2 + Math.floor(h * 3), py + 2, 2, 2);
          tctx.fillStyle = 'rgba(70,110,55,0.5)';
          tctx.fillRect(px + 4, py + 4 + Math.floor(h * 2), 2, 2);
        } else if (t === TERR.MOUNT) {
          tctx.fillStyle = 'rgba(50,45,40,0.5)';
          tctx.fillRect(px, py + TILE - 2, TILE, 2);
          tctx.fillStyle = 'rgba(255,255,255,0.55)';
          tctx.beginPath();
          tctx.moveTo(px + TILE / 2, py + 1);
          tctx.lineTo(px + 1, py + TILE - 2);
          tctx.lineTo(px + TILE - 1, py + TILE - 2);
          tctx.closePath();
          tctx.fill();
        } else if (t === TERR.HILLS) {
          tctx.fillStyle = 'rgba(60,45,30,0.45)';
          tctx.beginPath();
          tctx.arc(px + TILE / 2, py + TILE - 1.5, 2.4, Math.PI, 2 * Math.PI);
          tctx.fill();
        } else if (t === TERR.DESERT) {
          if (hash2(x, y, 13) > 0.7) {
            tctx.fillStyle = 'rgba(170,140,80,0.45)';
            tctx.fillRect(px + 1, py + 4, 4, 1);
          }
        } else if (t === TERR.WATER) {
          if (hash2(x, y, 17) > 0.85) {
            tctx.fillStyle = 'rgba(255,255,255,0.22)';
            tctx.fillRect(px + 1, py + Math.floor(TILE / 2), 3, 1);
          }
        }
      }
    }
    // Coastline darkening pass
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = this.terrain[this.idx(x, y)];
        if (t === TERR.WATER) continue;
        // any neighbor water?
        let coast = false;
        for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) continue;
          if (this.terrain[this.idx(nx, ny)] === TERR.WATER) { coast = true; break; }
        }
        if (coast) {
          tctx.fillStyle = 'rgba(20,30,40,0.28)';
          tctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        }
      }
    }
  }

  renderTerritory() {
    const tctx = this.territoryCanvas.getContext('2d');
    tctx.clearRect(0, 0, W, H);
    // Tinted fill per owned tile
    for (const tribe of this.tribes) {
      if (!tribe.alive) continue;
      const c = tribe.def.rgb;
      tctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.30)`;
      for (const k of tribe.territory) {
        const x = k % MAP_W, y = (k / MAP_W) | 0;
        tctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
    // Crisp border outlines on each border tile's outer edges
    for (const tribe of this.tribes) {
      if (!tribe.alive) continue;
      tctx.fillStyle = tribe.def.main;
      for (const k of tribe.border) {
        const x = k % MAP_W, y = (k / MAP_W) | 0;
        const px = x * TILE, py = y * TILE;
        const id = tribe.id;
        // edges where neighbor != self
        if (x === MAP_W - 1 || this.owner[this.idx(x + 1, y)] !== id)
          tctx.fillRect(px + TILE - 1, py, 1, TILE);
        if (x === 0 || this.owner[this.idx(x - 1, y)] !== id)
          tctx.fillRect(px, py, 1, TILE);
        if (y === MAP_H - 1 || this.owner[this.idx(x, y + 1)] !== id)
          tctx.fillRect(px, py + TILE - 1, TILE, 1);
        if (y === 0 || this.owner[this.idx(x, y - 1)] !== id)
          tctx.fillRect(px, py, TILE, 1);
      }
    }
  }

  /* --- Simulation tick --- */
  tick() {
    this.year++;
    for (const t of this.tribes) if (t.alive) this.tickEconomy(t);
    for (const t of this.tribes) if (t.alive) this.tickTech(t);
    for (const t of this.tribes) if (t.alive) this.tickExpand(t);
    for (const t of this.tribes) if (t.alive) this.tickSettlements(t);
    // Deaths
    for (const t of this.tribes) {
      if (!t.alive) continue;
      if (t.territory.size === 0 || t.pop < 1) {
        t.alive = false;
        t.deathYear = this.year;
        for (const k of t.territory) { this.owner[k] = -1; this.settle[k] = 0; }
        t.territory.clear();
        t.border.clear();
        // Clear alliances pointing here
        for (const o of this.tribes) {
          if (o.alliance === t.id) { o.alliance = -1; o.allyTimer = 0; }
          o.atWarWith.delete(t.id);
        }
        this.dirtyTerritory = true;
      } else {
        t.peakLand = Math.max(t.peakLand, t.territory.size);
        t.peakTech = Math.max(t.peakTech, t.tech);
      }
    }
    // Ally timers + cooldowns
    for (const t of this.tribes) {
      if (t.allyTimer > 0) {
        t.allyTimer--;
        if (t.allyTimer === 0) t.alliance = -1;
      }
      if (t.warCooldown > 0) t.warCooldown--;
    }
    if (this.year % 35 === 0) this.tickAlliances();
    if (this.year % 17 === 0) {
      // war fatigue: forget skirmishes after a while
      for (const t of this.tribes) t.atWarWith.clear();
    }
  }

  tickEconomy(tribe) {
    let foodGain = 0, goldGain = 0, riverFood = 0;
    for (const k of tribe.territory) {
      const t = this.terrain[k];
      if (t === TERR.GRASS)        foodGain += 0.80;
      else if (t === TERR.FOREST)  foodGain += 0.45;
      else if (t === TERR.HILLS) { foodGain += 0.30; if (tribe.techs.mining) goldGain += 0.50; }
      else if (t === TERR.DESERT){ foodGain += 0.10; if (tribe.techs.trade)  goldGain += 0.65; }
      else if (t === TERR.MOUNT)   foodGain += 0.08;
      // River bonus: water-adjacent land tiles
      if (tribe.techs.farm) {
        const x = k % MAP_W, y = (k / MAP_W) | 0;
        if ((x + 1 < MAP_W && this.terrain[this.idx(x + 1, y)] === TERR.WATER) ||
            (x - 1 >= 0    && this.terrain[this.idx(x - 1, y)] === TERR.WATER) ||
            (y + 1 < MAP_H && this.terrain[this.idx(x, y + 1)] === TERR.WATER) ||
            (y - 1 >= 0    && this.terrain[this.idx(x, y - 1)] === TERR.WATER)) {
          riverFood += 0.35;
        }
      }
      const s = this.settle[k];
      if (s) {
        goldGain += s === 2 ? 0.40 : 0.20;
        if (tribe.techs.farm) foodGain += 0.25;
      }
    }
    if (tribe.techs.farm)  foodGain += riverFood;
    if (tribe.techs.trade) goldGain *= 1.2;

    tribe.food += foodGain;
    tribe.gold += goldGain;

    // Population growth
    const popCost = tribe.pop * 0.28;
    const popCap = tribe.territory.size * (tribe.techs.farm ? 18 : 13);
    if (tribe.food >= popCost) {
      tribe.food -= popCost;
      const growthRate = 0.024 + (tribe.techs.priest ? 0.006 : 0);
      const growth = tribe.pop * growthRate * (1 - tribe.pop / Math.max(1, popCap));
      tribe.pop = Math.max(1, tribe.pop + growth);
    } else {
      // Famine
      tribe.pop = Math.max(0, tribe.pop * 0.95);
      tribe.food = 0;
    }
    tribe.gold = Math.min(tribe.gold, 99999);
  }

  tickTech(tribe) {
    let hasForest = false, hasRiver = false, hasHills = false, hasDesert = false, hasMount = false;
    // Also detect water-adjacent for "river"
    for (const k of tribe.territory) {
      const t = this.terrain[k];
      if (t === TERR.FOREST) hasForest = true;
      else if (t === TERR.HILLS)  hasHills = true;
      else if (t === TERR.DESERT) hasDesert = true;
      else if (t === TERR.MOUNT)  hasMount = true;
      if (!hasRiver) {
        const x = k % MAP_W, y = (k / MAP_W) | 0;
        if ((x + 1 < MAP_W && this.terrain[this.idx(x + 1, y)] === TERR.WATER) ||
            (x - 1 >= 0    && this.terrain[this.idx(x - 1, y)] === TERR.WATER) ||
            (y + 1 < MAP_H && this.terrain[this.idx(x, y + 1)] === TERR.WATER) ||
            (y - 1 >= 0    && this.terrain[this.idx(x, y - 1)] === TERR.WATER)) hasRiver = true;
      }
    }
    tribe.techProgress += 0.08 + tribe.gold * 0.0006 + tribe.territory.size * 0.0035;
    if (tribe.techProgress >= 28) {
      tribe.techProgress = 0;
      const opts = [];
      if (hasForest && !tribe.techs.wood)   opts.push('wood');
      if (hasRiver  && !tribe.techs.farm)   opts.push('farm');
      if (hasHills  && !tribe.techs.mining) opts.push('mining');
      if (hasDesert && !tribe.techs.trade)  opts.push('trade');
      if (hasMount  && !tribe.techs.priest) opts.push('priest');
      if (opts.length) {
        const choice = opts[Math.floor(Math.random() * opts.length)];
        tribe.techs[choice] = true;
        tribe.tech = Math.min(5, tribe.tech + 1);
      } else if (tribe.tech < 5 && Math.random() < 0.5) {
        tribe.tech++;
      }
    }
  }

  tickExpand(tribe) {
    if (tribe.border.size === 0 || tribe.pop < 8) return;
    // Collect all valid expansion edges (border tile -> neighbor not owned by self & not water/blocked)
    const edges = [];
    for (const k of tribe.border) {
      const x = k % MAP_W, y = (k / MAP_W) | 0;
      const candidates = [
        x + 1 < MAP_W ? this.idx(x + 1, y) : -1,
        x - 1 >= 0    ? this.idx(x - 1, y) : -1,
        y + 1 < MAP_H ? this.idx(x, y + 1) : -1,
        y - 1 >= 0    ? this.idx(x, y - 1) : -1,
      ];
      for (let ci = 0; ci < 4; ci++) {
        const nk = candidates[ci];
        if (nk < 0) continue;
        if (this.owner[nk] === tribe.id) continue;
        const t = this.terrain[nk];
        if (t === TERR.WATER) continue;
        if (t === TERR.MOUNT && !tribe.techs.mining) continue;
        edges.push(nk);
      }
    }
    if (edges.length === 0) return;
    const attempts = Math.max(1, Math.min(2, Math.floor(tribe.pop / 150) + 1));
    for (let i = 0; i < attempts && edges.length > 0; i++) {
      const idx = Math.floor(Math.random() * edges.length);
      const nk = edges[idx];
      // Remove (swap-pop) to avoid duplicate hits this turn
      edges[idx] = edges[edges.length - 1];
      edges.pop();
      const otherOwner = this.owner[nk];
      if (otherOwner === tribe.id) continue;
      const t = this.terrain[nk];
      if (otherOwner === -1) {
        // Peaceful expansion
        const cost = (t === TERR.DESERT) ? 4 : (t === TERR.MOUNT ? 12 : 6);
        if (tribe.food >= cost) {
          tribe.food -= cost;
          this.takeTile(tribe, nk, null);
        }
      } else {
        const enemy = this.tribes[otherOwner];
        if (!enemy.alive) continue;
        if (tribe.alliance === enemy.id) continue;
        // Skirmish: defender gets a homeland bonus
        const myWoodB    = tribe.techs.wood   ? 1.20 : 1;
        const myPriestB  = tribe.techs.priest ? 1.10 : 1;
        const enWallsB   = enemy.techs.mining ? 1.40 : 1;
        const enPriestB  = enemy.techs.priest ? 1.10 : 1;
        const enHomeland = 1.25;
        const myStr = tribe.pop * (1 + tribe.tech * 0.15) * myWoodB * myPriestB;
        const enStr = enemy.pop * (1 + enemy.tech * 0.15) * enWallsB * enPriestB * enHomeland;
        const total = myStr + enStr;
        if (total < 1) continue;
        const myWin = myStr / total;
        const r = Math.random();
        if (r < myWin) {
          tribe.pop *= (0.97 - 0.05 * (1 - myWin));
          enemy.pop *= (0.90 - 0.07 * myWin);
          this.takeTile(tribe, nk, enemy);
        } else {
          tribe.pop *= (0.88 - 0.06 * (1 - myWin));
          enemy.pop *= (0.97 - 0.04 * myWin);
        }
        tribe.atWarWith.add(enemy.id);
        enemy.atWarWith.add(tribe.id);
      }
    }
  }

  tickSettlements(tribe) {
    if (this.year % 6 !== 0) return;
    const target = Math.max(1, Math.floor(tribe.territory.size / 12));
    let count = 0;
    for (const k of tribe.territory) if (this.settle[k]) count++;
    if (count >= target) return;
    if (tribe.gold < 8) return;
    // Pick interior tile (not on border) preferred
    const candidates = [];
    for (const k of tribe.territory) {
      if (this.settle[k]) continue;
      const tt = this.terrain[k];
      if (tt === TERR.WATER || tt === TERR.MOUNT) continue;
      candidates.push(k);
    }
    if (!candidates.length) return;
    const k = candidates[Math.floor(Math.random() * candidates.length)];
    this.settle[k] = 1;
    tribe.gold -= 8;
  }

  tickAlliances() {
    if (Math.random() > 0.4) return;
    const free = this.tribes.filter(t => t.alive && t.alliance === -1);
    if (free.length < 2) return;
    for (let attempt = 0; attempt < 10; attempt++) {
      const a = free[Math.floor(Math.random() * free.length)];
      const b = free[Math.floor(Math.random() * free.length)];
      if (a === b) continue;
      if (a.atWarWith.has(b.id) || b.atWarWith.has(a.id)) continue;
      // Non-adjacent? check if A has any border tile adjacent to B's tile
      let adjacent = false;
      for (const k of a.border) {
        const x = k % MAP_W, y = (k / MAP_W) | 0;
        if ((x + 1 < MAP_W && this.owner[this.idx(x + 1, y)] === b.id) ||
            (x - 1 >= 0    && this.owner[this.idx(x - 1, y)] === b.id) ||
            (y + 1 < MAP_H && this.owner[this.idx(x, y + 1)] === b.id) ||
            (y - 1 >= 0    && this.owner[this.idx(x, y - 1)] === b.id)) { adjacent = true; break; }
      }
      if (adjacent) continue;
      a.alliance = b.id; a.allyTimer = 30;
      b.alliance = a.id; b.allyTimer = 30;
      return;
    }
  }

  totalLand() {
    if (this._totalLand >= 0) return this._totalLand;
    let total = 0;
    for (let i = 0; i < MAP_W * MAP_H; i++) {
      if (this.terrain[i] !== TERR.WATER) total++;
    }
    this._totalLand = total;
    return total;
  }

  checkWin() {
    const alive = this.tribes.filter(t => t.alive);
    if (alive.length === 0) return { winner: null, reason: 'extinction' };
    if (alive.length === 1) return { winner: alive[0], reason: 'lastStanding' };
    const totalP = this.totalLand();
    for (const t of alive) {
      if (t.territory.size > totalP * 0.55) return { winner: t, reason: 'domination' };
    }
    if (this.year >= 5000) {
      let best = alive[0];
      for (const t of alive) if (t.territory.size > best.territory.size) best = t;
      return { winner: best, reason: 'timeout' };
    }
    return null;
  }
}

/* ------------------------------------------------------------------ */
/* Render & UI                                                         */
/* ------------------------------------------------------------------ */
function eraName(year) {
  let cur = ERAS[0][1];
  for (const [yy, nm] of ERAS) if (year >= yy) cur = nm;
  return cur;
}

function draw(world, time) {
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(world.terrainCanvas, 0, 0);
  if (world.dirtyTerritory) {
    world.renderTerritory();
    world.dirtyTerritory = false;
  }
  ctx.drawImage(world.territoryCanvas, 0, 0);

  // Settlements + capitals
  const pulse = 0.5 + 0.5 * Math.sin(time * 0.005);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const k = y * MAP_W + x;
      const s = world.settle[k];
      if (!s) continue;
      const cx = x * TILE + TILE / 2, cy = y * TILE + TILE / 2;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.arc(cx, cy + 0.5, s === 2 ? 3.7 : 2.3, 0, Math.PI * 2);
      ctx.fill();
      // body
      ctx.fillStyle = s === 2 ? '#ffe680' : '#f4cf57';
      ctx.beginPath();
      ctx.arc(cx, cy, s === 2 ? 2.7 : 1.6, 0, Math.PI * 2);
      ctx.fill();
      if (s === 2) {
        // capital pulse + cross
        ctx.strokeStyle = `rgba(255,250,200,${0.45 + 0.35 * pulse})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, 3.5 + pulse * 1.6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(cx - 4.5, cy); ctx.lineTo(cx + 4.5, cy);
        ctx.moveTo(cx, cy - 4.5); ctx.lineTo(cx, cy + 4.5);
        ctx.stroke();
      }
    }
  }

  // Year + era
  document.getElementById('year').innerHTML =
    `Year ${world.year}<span class="era">${eraName(world.year)} AGE</span>`;

  // HUD
  const totalP = world.totalLand();
  for (let i = 0; i < 4; i++) {
    const tribe = world.tribes[i];
    const el = document.getElementById('h' + i);
    if (!tribe.alive) {
      el.classList.add('dead');
      el.innerHTML = `<div class="name" style="color:${tribe.def.dark}">${tribe.def.name}</div>
        <div style="opacity:0.7">fell year ${tribe.deathYear}</div>
        <div style="opacity:0.7;font-size:10px">peak ${tribe.peakLand} tiles · tech ${tribe.peakTech}</div>`;
      continue;
    }
    el.classList.remove('dead');
    const techList = [];
    if (tribe.techs.wood)   techList.push('🌲');
    if (tribe.techs.farm)   techList.push('🌾');
    if (tribe.techs.mining) techList.push('⛏');
    if (tribe.techs.trade)  techList.push('💰');
    if (tribe.techs.priest) techList.push('✨');
    const popPctBar  = Math.min(100, tribe.pop / 12);
    const goldPctBar = Math.min(100, tribe.gold / 12);
    const techPctBar = (tribe.tech / 5) * 100;
    const landPct    = (tribe.territory.size / totalP) * 100;
    const isWar = tribe.atWarWith.size > 0;
    el.innerHTML = `
      <div class="name" style="color:${tribe.def.main}">${tribe.def.name}${isWar ? ' ⚔' : ''}</div>
      <div class="row"><span>POP</span><span>${Math.floor(tribe.pop)}</span></div>
      <div class="bar"><div style="width:${popPctBar}%;background:${tribe.def.main}"></div></div>
      <div class="row"><span>GOLD</span><span>${Math.floor(tribe.gold)}</span></div>
      <div class="bar"><div style="width:${goldPctBar}%;background:#f1c40f"></div></div>
      <div class="row"><span>TECH ${tribe.tech}</span><span>LAND ${landPct.toFixed(1)}%</span></div>
      <div class="bar"><div style="width:${techPctBar}%;background:#9bbfee"></div></div>
      <div class="techs">${techList.join(' ') || '·'}</div>
      ${tribe.alliance >= 0 && world.tribes[tribe.alliance].alive
        ? `<div class="ally" style="color:${world.tribes[tribe.alliance].def.main}">⚭ allied with ${world.tribes[tribe.alliance].def.name}</div>`
        : ''}
    `;
  }
}

/* ------------------------------------------------------------------ */
/* Main loop                                                           */
/* ------------------------------------------------------------------ */
function loop(t) {
  if (!lastTime) lastTime = t;
  const dt = Math.min(120, t - lastTime);
  lastTime = t;

  if (!gameOver) {
    const speed = parseFloat(document.getElementById('speed').value);
    const ticksPerSec = 17 * speed;
    tickAccum += dt * ticksPerSec / 1000;
    let ticked = false;
    let safetyMax = 80;
    while (tickAccum >= 1 && safetyMax-- > 0) {
      world.tick();
      tickAccum -= 1;
      ticked = true;
      const w = world.checkWin();
      if (w) { endGame(w); break; }
    }
    draw(world, t);
  } else {
    restartTimer -= dt;
    document.getElementById('restartTimer').textContent =
      `next age beginning in ${Math.max(0, Math.ceil(restartTimer / 1000))}s`;
    if (restartTimer <= 0) restart();
  }

  requestAnimationFrame(loop);
}

function endGame(result) {
  if (gameOver) return;
  gameOver = true;
  restartTimer = 7000;
  const sb = document.getElementById('scoreboard');
  const wn = document.getElementById('winner');
  const ws = document.getElementById('winSub');
  const wstats = document.getElementById('winStats');
  const totalP = world.totalLand();
  if (result.winner) {
    const w = result.winner;
    wn.textContent = w.def.name + ' ASCENDS';
    wn.style.color = w.def.main;
    wn.style.textShadow = `0 0 28px ${w.def.main}, 0 0 60px ${w.def.main}`;
    let why = '';
    if (result.reason === 'lastStanding') why = 'last civilization standing';
    else if (result.reason === 'domination') why = 'world domination';
    else if (result.reason === 'timeout') why = 'greatest at the end of history';
    ws.textContent = `Year ${world.year} · ${(w.territory.size / totalP * 100).toFixed(1)}% of the world · ${why}`;
  } else {
    wn.textContent = 'EXTINCTION';
    wn.style.color = '#888';
    wn.style.textShadow = '0 0 28px #444';
    ws.textContent = `Year ${world.year} — All civilizations have fallen`;
  }
  let stats = '';
  for (const t of world.tribes) {
    const survives = t.alive;
    const landPct = survives ? (t.territory.size / totalP * 100).toFixed(1) + '%' : '—';
    stats += `<div class="ws" style="color:${t.def.main}">
      <div class="nm">${t.def.name}</div>
      <div class="l1">${survives ? 'survived' : 'fell yr ' + t.deathYear}</div>
      <div class="l2">tech ${t.peakTech} · land ${landPct}</div>
    </div>`;
  }
  wstats.innerHTML = stats;
  sb.classList.add('show');
}

function restart() {
  document.getElementById('scoreboard').classList.remove('show');
  gameOver = false;
  tickAccum = 0;
  world = new World((Math.random() * 1e9) | 0);
}

/* speed slider live value */
document.getElementById('speed').addEventListener('input', e => {
  document.getElementById('speedV').textContent = parseFloat(e.target.value).toFixed(2) + '×';
});

/* === Boot === */
world = new World((Math.random() * 1e9) | 0);
gameOver = false;
restartTimer = 0;
lastTime = 0;
tickAccum = 0;
requestAnimationFrame(loop);
</script>
