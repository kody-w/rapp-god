<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Predator–Prey Ecosystem — Lotka–Volterra in the wild</title>
<meta name="viewport" content="width=1240,initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#0b0a08;color:#d8cdb8;font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden;}
  #wrap{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 35%,#1a1612 0%,#0b0a08 70%);
  }
  #stage{
    position:relative;width:1200px;height:1000px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 1px #2a241c inset;
    border-radius:6px;overflow:hidden;background:#3b2e1f;
  }
  canvas{display:block;position:absolute;left:0;top:0;}
  #hud{
    position:absolute;left:14px;top:10px;font-size:12px;letter-spacing:.5px;
    text-shadow:0 1px 2px rgba(0,0,0,.7);pointer-events:none;line-height:1.45;
  }
  #title{
    position:absolute;right:14px;top:10px;text-align:right;font-size:12px;
    color:#a89679;text-shadow:0 1px 2px rgba(0,0,0,.7);pointer-events:none;
  }
  #title b{color:#e6dcc4;font-size:13px;display:block;letter-spacing:1px;}
  #overlay{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(8,5,2,0.55);backdrop-filter:blur(2px);font-size:48px;letter-spacing:6px;
    color:#ffb; text-shadow:0 0 20px rgba(255,80,40,.7),0 0 4px #000;
    font-weight:700;pointer-events:none;
  }
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle;}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="field" width="1200" height="800"></canvas>
    <canvas id="graph" width="1200" height="200" style="top:800px;"></canvas>
    <div id="hud">
      <div class="legend"><i style="background:#3fa44a"></i>grass <span id="cg">0</span></div>
      <div class="legend"><i style="background:#f5f5f5"></i>sheep <span id="cs">0</span></div>
      <div class="legend"><i style="background:#9aa0a6"></i>wolves <span id="cw">0</span></div>
      <div style="opacity:.6;margin-top:6px">tick <span id="ct">0</span> · gen <span id="cgen">1</span></div>
    </div>
    <div id="title"><b>PREDATOR · PREY</b>Lotka–Volterra emergence<br><span style="opacity:.55">grass → sheep → wolves</span></div>
    <div id="overlay"></div>
  </div>
</div>

<script>
(() => {
  // ---------- Canvases ----------
  const field = document.getElementById('field');
  const fctx  = field.getContext('2d');
  const graph = document.getElementById('graph');
  const gctx  = graph.getContext('2d');
  const overlay = document.getElementById('overlay');

  const W = 1200, H = 800;
  const TILE = 20;
  const COLS = W / TILE;          // 60
  const ROWS = H / TILE;          // 40

  // ---------- Tunables ----------
  const CFG = {
    startSheep: 200,
    startWolves: 30,
    grassRegrowChance: 0.0035,    // per empty tile per tick → ~600 at equilibrium
    sheepEat: 5,
    sheepRepro: 30,
    sheepMetab: 0.05,
    sheepSpeed: 1.1,
    wolfSight: 80,
    wolfEat: 25,
    wolfRepro: 60,
    wolfMetab: 0.10,
    wolfSpeed: 1.35,
    sheepRadius: 3.2,
    wolfRadius: 4.6,
    historyLen: 1000,
  };

  // ---------- State ----------
  let grass;          // Uint8Array COLS*ROWS, 1=grass present
  let grassCount = 0;
  let sheep = [];
  let wolves = [];
  let history = [];   // {g,s,w}
  let tick = 0;
  let gen = 1;
  let pausedUntil = 0;
  let extinctionMsg = '';

  // ---------- Helpers ----------
  const rand = (a, b) => a + Math.random() * (b - a);
  const irand = n => (Math.random() * n) | 0;
  const idx = (cx, cy) => cy * COLS + cx;

  // ---------- World init ----------
  function reset() {
    grass = new Uint8Array(COLS * ROWS);
    grassCount = 0;
    // Seed grass to roughly equilibrium
    for (let i = 0; i < COLS * ROWS; i++) {
      if (Math.random() < 0.30) { grass[i] = 1; grassCount++; }
    }
    sheep = [];
    for (let i = 0; i < CFG.startSheep; i++) {
      sheep.push(makeSheep(rand(0,W), rand(0,H), rand(10,25)));
    }
    wolves = [];
    for (let i = 0; i < CFG.startWolves; i++) {
      wolves.push(makeWolf(rand(0,W), rand(0,H), rand(20,45)));
    }
    history = [];
    tick = 0;
  }

  function makeSheep(x, y, e) {
    const a = Math.random() * Math.PI * 2;
    return { x, y, vx: Math.cos(a)*CFG.sheepSpeed, vy: Math.sin(a)*CFG.sheepSpeed, e, t: Math.random()*1000 };
  }
  function makeWolf(x, y, e) {
    const a = Math.random() * Math.PI * 2;
    return { x, y, vx: Math.cos(a)*CFG.wolfSpeed, vy: Math.sin(a)*CFG.wolfSpeed, e, t: Math.random()*1000 };
  }

  // ---------- Spatial hash for sheep (so wolves don't do O(N*M)) ----------
  const HCELL = 80;                  // matches wolf sight radius
  const HCOLS = Math.ceil(W / HCELL);
  const HROWS = Math.ceil(H / HCELL);
  let sheepBuckets = [];
  function rebuildBuckets() {
    sheepBuckets = new Array(HCOLS * HROWS);
    for (let i = 0; i < sheepBuckets.length; i++) sheepBuckets[i] = [];
    for (let i = 0; i < sheep.length; i++) {
      const s = sheep[i];
      const cx = Math.min(HCOLS-1, Math.max(0, (s.x / HCELL) | 0));
      const cy = Math.min(HROWS-1, Math.max(0, (s.y / HCELL) | 0));
      sheepBuckets[cy * HCOLS + cx].push(i);
    }
  }
  function nearestSheepIndex(x, y, maxDist) {
    const cx = Math.min(HCOLS-1, Math.max(0, (x / HCELL) | 0));
    const cy = Math.min(HROWS-1, Math.max(0, (y / HCELL) | 0));
    let best = -1, bestD2 = maxDist * maxDist;
    for (let oy = -1; oy <= 1; oy++) {
      const yy = cy + oy; if (yy < 0 || yy >= HROWS) continue;
      for (let ox = -1; ox <= 1; ox++) {
        const xx = cx + ox; if (xx < 0 || xx >= HCOLS) continue;
        const bucket = sheepBuckets[yy * HCOLS + xx];
        for (let k = 0; k < bucket.length; k++) {
          const i = bucket[k];
          if (!sheep[i]) continue;
          const dx = sheep[i].x - x, dy = sheep[i].y - y;
          const d2 = dx*dx + dy*dy;
          if (d2 < bestD2) { bestD2 = d2; best = i; }
        }
      }
    }
    return best;
  }

  // ---------- Step ----------
  function step() {
    tick++;

    // Grass regrowth
    // Cheap: sample a fraction of empty tiles each tick
    const samples = (COLS * ROWS) * CFG.grassRegrowChance | 0;
    for (let i = 0; i < samples; i++) {
      const t = irand(COLS * ROWS);
      if (!grass[t]) { grass[t] = 1; grassCount++; }
    }

    rebuildBuckets();

    // Sheep update
    const newSheep = [];
    for (let i = 0; i < sheep.length; i++) {
      const s = sheep[i];
      if (!s) continue;
      // wander: tiny heading wobble
      s.t += 0.02;
      const turn = (Math.random() - 0.5) * 0.35;
      const ang = Math.atan2(s.vy, s.vx) + turn;
      s.vx = Math.cos(ang) * CFG.sheepSpeed;
      s.vy = Math.sin(ang) * CFG.sheepSpeed;

      s.x += s.vx; s.y += s.vy;
      // wrap (toroidal field — keeps dynamics flowing nicely)
      if (s.x < 0) s.x += W; else if (s.x >= W) s.x -= W;
      if (s.y < 0) s.y += H; else if (s.y >= H) s.y -= H;

      // eat grass under foot
      const cx = (s.x / TILE) | 0, cy = (s.y / TILE) | 0;
      const gi = idx(cx, cy);
      if (grass[gi]) {
        grass[gi] = 0; grassCount--;
        s.e += CFG.sheepEat;
      }

      s.e -= CFG.sheepMetab;
      if (s.e <= 0) { sheep[i] = null; continue; }

      if (s.e > CFG.sheepRepro) {
        s.e *= 0.5;
        const child = makeSheep(s.x + rand(-3,3), s.y + rand(-3,3), s.e);
        newSheep.push(child);
      }
    }
    // compact sheep
    sheep = sheep.filter(Boolean).concat(newSheep);

    // Buckets must be rebuilt because sheep array indices changed
    rebuildBuckets();

    // Wolves update
    const newWolves = [];
    const eatenMask = new Uint8Array(sheep.length); // which sheep got eaten
    for (let i = 0; i < wolves.length; i++) {
      const w = wolves[i];
      if (!w) continue;

      // Look for nearest non-eaten sheep
      let targetIdx = nearestSheepIndex(w.x, w.y, CFG.wolfSight);
      if (targetIdx >= 0 && eatenMask[targetIdx]) targetIdx = -1;

      let ang;
      if (targetIdx >= 0) {
        const s = sheep[targetIdx];
        ang = Math.atan2(s.y - w.y, s.x - w.x);
      } else {
        ang = Math.atan2(w.vy, w.vx) + (Math.random() - 0.5) * 0.4;
      }
      w.vx = Math.cos(ang) * CFG.wolfSpeed;
      w.vy = Math.sin(ang) * CFG.wolfSpeed;
      w.x += w.vx; w.y += w.vy;
      if (w.x < 0) w.x += W; else if (w.x >= W) w.x -= W;
      if (w.y < 0) w.y += H; else if (w.y >= H) w.y -= H;

      // Catch sheep on contact
      if (targetIdx >= 0 && !eatenMask[targetIdx]) {
        const s = sheep[targetIdx];
        const dx = s.x - w.x, dy = s.y - w.y;
        if (dx*dx + dy*dy < (CFG.wolfRadius + CFG.sheepRadius + 1) * (CFG.wolfRadius + CFG.sheepRadius + 1)) {
          eatenMask[targetIdx] = 1;
          w.e += CFG.wolfEat;
        }
      }

      w.e -= CFG.wolfMetab;
      if (w.e <= 0) { wolves[i] = null; continue; }

      if (w.e > CFG.wolfRepro) {
        w.e *= 0.5;
        newWolves.push(makeWolf(w.x + rand(-4,4), w.y + rand(-4,4), w.e));
      }
    }
    // remove eaten sheep
    for (let i = 0; i < eatenMask.length; i++) if (eatenMask[i]) sheep[i] = null;
    sheep = sheep.filter(Boolean);
    wolves = wolves.filter(Boolean).concat(newWolves);

    // history
    history.push({ g: grassCount, s: sheep.length, w: wolves.length });
    if (history.length > CFG.historyLen) history.shift();
  }

  // ---------- Render ----------
  function render() {
    // earth background
    fctx.fillStyle = '#3b2e1f';
    fctx.fillRect(0, 0, W, H);

    // subtle dirt texture rings (cheap)
    fctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < ROWS; y += 4) {
      for (let x = 0; x < COLS; x += 6) {
        fctx.fillRect(x*TILE + 4, y*TILE + 6, 2, 2);
      }
    }

    // grass tiles
    for (let cy = 0; cy < ROWS; cy++) {
      for (let cx = 0; cx < COLS; cx++) {
        if (grass[idx(cx,cy)]) {
          // pseudo-random shade per tile based on position so patches feel organic
          const n = ((cx * 73856093) ^ (cy * 19349663)) & 0xff;
          const g = 110 + (n & 31);   // 110..141
          fctx.fillStyle = 'rgb(' + (40 + (n & 15)) + ',' + g + ',' + (40 + ((n>>4)&15)) + ')';
          fctx.fillRect(cx*TILE+1, cy*TILE+1, TILE-2, TILE-2);
          // small blade highlight
          fctx.fillStyle = 'rgba(255,255,200,0.08)';
          fctx.fillRect(cx*TILE+3 + (n & 7), cy*TILE+3 + ((n>>3) & 7), 2, 2);
        }
      }
    }

    // sheep
    fctx.fillStyle = '#f5f5f5';
    fctx.strokeStyle = 'rgba(0,0,0,0.35)';
    fctx.lineWidth = 1;
    for (let i = 0; i < sheep.length; i++) {
      const s = sheep[i];
      fctx.beginPath();
      fctx.arc(s.x, s.y, CFG.sheepRadius, 0, Math.PI*2);
      fctx.fill();
      fctx.stroke();
    }

    // wolves with subtle glow
    for (let i = 0; i < wolves.length; i++) {
      const w = wolves[i];
      // glow
      const grd = fctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, 14);
      grd.addColorStop(0, 'rgba(255,80,60,0.25)');
      grd.addColorStop(1, 'rgba(255,80,60,0)');
      fctx.fillStyle = grd;
      fctx.beginPath(); fctx.arc(w.x, w.y, 14, 0, Math.PI*2); fctx.fill();
      // body
      fctx.fillStyle = '#3a3a3e';
      fctx.strokeStyle = '#0c0c0e';
      fctx.beginPath();
      fctx.arc(w.x, w.y, CFG.wolfRadius, 0, Math.PI*2);
      fctx.fill(); fctx.stroke();
      // eye glint
      fctx.fillStyle = '#ffd070';
      fctx.fillRect(w.x - 0.5, w.y - 0.5, 1, 1);
    }

    // -------- graph --------
    gctx.fillStyle = '#0e0c0a';
    gctx.fillRect(0, 0, 1200, 200);
    // grid
    gctx.strokeStyle = 'rgba(255,220,170,0.08)';
    gctx.lineWidth = 1;
    for (let y = 0; y <= 4; y++) {
      const yy = y * 50 + 0.5;
      gctx.beginPath(); gctx.moveTo(0, yy); gctx.lineTo(1200, yy); gctx.stroke();
    }
    for (let x = 0; x <= 10; x++) {
      const xx = x * 120 + 0.5;
      gctx.beginPath(); gctx.moveTo(xx, 0); gctx.lineTo(xx, 200); gctx.stroke();
    }

    // determine scale per series (independent so all three are readable)
    let mg = 1, ms = 1, mw = 1;
    for (let i = 0; i < history.length; i++) {
      const h = history[i];
      if (h.g > mg) mg = h.g;
      if (h.s > ms) ms = h.s;
      if (h.w > mw) mw = h.w;
    }
    // pad
    mg = Math.max(mg, 100);
    ms = Math.max(ms, 50);
    mw = Math.max(mw, 20);

    function drawSeries(getter, max, color, glow) {
      if (history.length < 2) return;
      const n = history.length;
      gctx.lineWidth = 1.6;
      gctx.strokeStyle = color;
      if (glow) { gctx.shadowColor = color; gctx.shadowBlur = 6; } else { gctx.shadowBlur = 0; }
      gctx.beginPath();
      for (let i = 0; i < n; i++) {
        const x = (i / (CFG.historyLen - 1)) * 1200;
        const v = getter(history[i]) / max;
        const y = 195 - v * 180;
        if (i === 0) gctx.moveTo(x, y); else gctx.lineTo(x, y);
      }
      gctx.stroke();
      gctx.shadowBlur = 0;
    }

    drawSeries(h => h.g, mg, '#3fa44a', false);
    drawSeries(h => h.s, ms, '#f5f5f5', false);
    drawSeries(h => h.w, mw, '#ff7a55', true);

    // labels
    gctx.fillStyle = 'rgba(220,200,170,0.55)';
    gctx.font = '11px ui-monospace,Menlo,Consolas,monospace';
    gctx.fillText('populations · last ' + CFG.historyLen + ' ticks', 10, 14);
    gctx.fillText('grass / max ' + mg, 10, 188);
    gctx.fillStyle = '#f5f5f5';
    gctx.fillText('sheep / max ' + ms, 200, 188);
    gctx.fillStyle = '#ff7a55';
    gctx.fillText('wolves / max ' + mw, 400, 188);

    // HUD numbers
    document.getElementById('cg').textContent = grassCount;
    document.getElementById('cs').textContent = sheep.length;
    document.getElementById('cw').textContent = wolves.length;
    document.getElementById('ct').textContent = tick;
    document.getElementById('cgen').textContent = gen;
  }

  // ---------- Loop ----------
  function loop(now) {
    requestAnimationFrame(loop);

    if (pausedUntil > now) {
      // Keep rendering so the graph stays visible during the pause
      render();
      overlay.style.display = 'flex';
      overlay.textContent = extinctionMsg;
      return;
    } else if (overlay.style.display === 'flex') {
      overlay.style.display = 'none';
      gen++;
      reset();
    }

    // Run a couple of ticks per frame so dynamics evolve at a watchable pace
    const stepsPerFrame = 2;
    for (let k = 0; k < stepsPerFrame; k++) {
      step();

      if (sheep.length === 0 || wolves.length === 0) {
        if (sheep.length === 0 && wolves.length === 0) {
          extinctionMsg = 'EXTINCTION : ALL';
        } else if (wolves.length === 0) {
          extinctionMsg = 'EXTINCTION : WOLVES';
        } else {
          extinctionMsg = 'EXTINCTION : SHEEP';
        }
        pausedUntil = now + 3000;
        break;
      }
    }

    render();
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
