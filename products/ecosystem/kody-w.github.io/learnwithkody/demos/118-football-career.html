<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MANAGER LIFE — A FOOTBALL SAGA</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif}
#stage{position:fixed;inset:0;z-index:1}
canvas{display:block}
.ov{position:fixed;pointer-events:none;z-index:10}
#logo{top:14px;left:18px;display:flex;align-items:center;gap:10px}
#logo .badge{background:linear-gradient(135deg,#0a2d4a,#1a5fa0);padding:8px 14px;border-radius:4px;border:1px solid #ffd84d;font-weight:900;letter-spacing:2px;font-size:14px;text-shadow:0 1px 2px #000;box-shadow:0 2px 8px rgba(0,0,0,.5)}
#logo .net{font-size:10px;color:#ffd84d;letter-spacing:3px;font-weight:700;margin-top:2px;display:block}
#logo .live{display:flex;align-items:center;gap:6px;background:#c00;padding:6px 12px;border-radius:3px;font-weight:900;font-size:13px;letter-spacing:2px}
#logo .dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#info{top:14px;right:18px;text-align:right}
#info .season{background:rgba(0,0,0,.7);border:1px solid #ffd84d;padding:6px 14px;font-weight:800;font-size:13px;letter-spacing:2px;color:#ffd84d}
#info .phase{margin-top:6px;background:linear-gradient(90deg,#0a2d4a,#1a5fa0);padding:5px 12px;font-weight:700;font-size:11px;letter-spacing:1.5px;border-radius:2px}
#info .trophy{margin-top:6px;background:rgba(20,15,5,.85);border:1px solid #ffd84d;padding:6px 12px;font-size:12px;font-weight:800;color:#ffd84d;letter-spacing:1.5px}
#table{top:80px;left:18px;background:rgba(8,12,20,.82);border-left:3px solid #ffd84d;padding:10px 14px;min-width:230px}
#table .ttl{font-size:10px;color:#ffd84d;letter-spacing:2px;font-weight:700;margin-bottom:6px;border-bottom:1px solid #333;padding-bottom:4px}
#table .row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;font-weight:600}
#table .row.me{background:linear-gradient(90deg,rgba(255,216,77,.25),transparent);color:#ffd84d}
#table .row span:first-child{flex:1;text-align:left}
#table .row span:nth-child(2){flex:2;text-align:left;padding-left:6px}
#table .row span:last-child{font-weight:800}
#starbox{top:80px;right:18px;background:rgba(8,12,20,.82);border-right:3px solid #ffd84d;padding:10px 14px;min-width:200px;text-align:right}
#starbox .ttl{font-size:9px;color:#ffd84d;letter-spacing:2px;font-weight:700}
#starbox .nm{font-size:16px;font-weight:900;margin-top:3px;color:#fff}
#starbox .age{font-size:11px;color:#aaa;margin-top:2px}
#starbox .form{font-size:10px;color:#7fff7f;margin-top:4px;letter-spacing:1px;font-weight:700}
#starbox .portrait{margin-top:6px;width:60px;height:60px;border:2px solid #ffd84d;border-radius:50%;background:linear-gradient(135deg,#444,#222);float:right;clear:both;font-size:22px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#ffd84d}
#starbox::after{content:"";display:block;clear:both}
#cambadge{top:240px;right:18px;background:rgba(0,0,0,.7);border:1px solid #888;padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#0f6;letter-spacing:1.5px;font-weight:700}
#lower3{position:fixed;left:30px;bottom:135px;z-index:11;pointer-events:none;transform:translateX(-120%);transition:transform .55s cubic-bezier(.2,.9,.3,1.1);max-width:580px}
#lower3.show{transform:translateX(0)}
#lower3 .bar{background:linear-gradient(90deg,#0a2d4a 0%,#1a5fa0 100%);border-left:5px solid #ffd84d;padding:10px 18px;box-shadow:0 4px 14px rgba(0,0,0,.6)}
#lower3 .nm{font-size:20px;font-weight:900;letter-spacing:1.5px;color:#fff;text-shadow:1px 1px 2px #000}
#lower3 .ch{font-size:12px;color:#ffd84d;margin-top:3px;letter-spacing:1.5px;font-weight:600}
#anchors{position:fixed;left:18px;bottom:60px;z-index:11;display:flex;gap:10px}
.anchor{background:rgba(0,0,0,.65);border:1px solid #444;padding:5px 10px;font-size:11px;display:flex;align-items:center;gap:8px}
.anchor .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#000}
.anchor .av.h{background:#fff}
.anchor .av.b{background:#ffd84d}
.anchor .nm{font-weight:800;letter-spacing:1px;font-size:11px}
.anchor.active{border-color:#ffd84d;background:rgba(20,30,50,.85)}
.anchor .role{color:#aaa;font-size:9px;margin-top:1px;letter-spacing:1px}
#ticker{position:fixed;left:0;right:0;bottom:0;height:42px;background:linear-gradient(180deg,#040810,#0a1428);border-top:2px solid #ffd84d;display:flex;align-items:center;z-index:12}
#tickLogo{padding:0 16px;font-size:11px;font-weight:900;color:#ffd84d;letter-spacing:2px;background:#0a2d4a;height:100%;display:flex;align-items:center;border-right:1px solid #ffd84d;flex-shrink:0}
#tickWrap{flex:1;overflow:hidden;position:relative}
#tickRoll{display:inline-block;white-space:nowrap;position:absolute;font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;animation:roll 65s linear infinite;padding-left:100%}
#tickRoll .sep{color:#ffd84d;margin:0 14px}
#tickRoll .res{color:#7fff7f;font-weight:800;margin:0 4px}
#tickRoll .l{color:#ff6464;font-weight:800;margin:0 4px}
@keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
#dialogue{position:fixed;left:50%;bottom:170px;transform:translateX(-50%) translateY(40px);z-index:11;pointer-events:none;opacity:0;transition:all .5s ease;max-width:720px;text-align:center}
#dialogue.show{opacity:1;transform:translateX(-50%) translateY(0)}
#dialogue .who{font-size:11px;color:#ffd84d;letter-spacing:2px;font-weight:800;margin-bottom:4px}
#dialogue .ln{background:rgba(8,12,20,.85);border:1px solid #ffd84d;padding:10px 22px;font-size:16px;font-weight:600;font-style:italic;color:#fff;text-shadow:0 1px 2px #000}
#whois{position:fixed;right:30px;bottom:160px;z-index:11;pointer-events:none;transform:translateX(120%);transition:transform .55s cubic-bezier(.2,.9,.3,1.1);max-width:340px}
#whois.show{transform:translateX(0)}
#whois .bar{background:rgba(8,12,20,.92);border-right:5px solid #ffd84d;padding:10px 16px}
#whois .h{font-size:9px;color:#ffd84d;letter-spacing:3px;font-weight:800}
#whois .nm{font-size:18px;font-weight:900;color:#fff;margin-top:3px;letter-spacing:1px}
#whois .role{font-size:11px;color:#aaa;margin-top:3px}
#bigBanner{position:fixed;left:0;right:0;top:42%;z-index:13;pointer-events:none;text-align:center;opacity:0;transform:scale(.85);transition:all .55s cubic-bezier(.2,.9,.3,1.2)}
#bigBanner.show{opacity:1;transform:scale(1)}
#bigBanner .b{display:inline-block;background:linear-gradient(90deg,rgba(255,216,77,.95),rgba(255,180,40,.95));color:#0a2d4a;padding:18px 50px;font-size:30px;font-weight:900;letter-spacing:3px;text-shadow:0 1px 0 rgba(255,255,255,.4);box-shadow:0 10px 40px rgba(0,0,0,.7);border:3px solid #fff}
#bigBanner.bad .b{background:linear-gradient(90deg,rgba(180,30,30,.95),rgba(120,20,20,.95));color:#fff;border-color:#ffd84d;text-shadow:0 1px 2px #000}
#flash{position:fixed;inset:0;z-index:8;pointer-events:none;background:#fff;opacity:0}
#vignette{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(circle at center,transparent 55%,rgba(0,0,0,.55) 100%)}
#scanlines{position:fixed;inset:0;z-index:9;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0,rgba(255,255,255,.02) 1px,transparent 1px,transparent 3px);mix-blend-mode:overlay}
</style>
</head>
<body>
<!-- ROUND13_SAGA v1 -->
<div id="stage"></div>
<div id="vignette" class="ov"></div>
<div id="scanlines" class="ov"></div>
<div id="flash" class="ov"></div>
<div class="ov" id="logo">
  <div class="badge">MANAGER LIFE<span class="net">SKY FOOTBALL HQ</span></div>
  <div class="live"><span class="dot"></span>LIVE</div>
</div>
<div class="ov" id="info">
  <div class="season" id="seasonText">SEASON 1 OF 10</div>
  <div class="phase" id="phaseText">PRE-SEASON</div>
  <div class="trophy" id="trophyText">🏆 TROPHIES: 0</div>
</div>
<div class="ov" id="table">
  <div class="ttl" id="leagueTtl">PREMIERSHIP — TABLE</div>
  <div id="tableRows"></div>
</div>
<div class="ov" id="starbox">
  <div class="ttl">STAR PLAYER</div>
  <div class="portrait" id="starPort">★</div>
  <div class="nm" id="starName">—</div>
  <div class="age" id="starAge">AGE — POS —</div>
  <div class="form" id="starForm">FORM ★★★★☆</div>
</div>
<div class="ov" id="cambadge">CAM 1 — PITCH WIDE</div>
<div id="lower3"><div class="bar"><div class="nm" id="l3n">—</div><div class="ch" id="l3c">—</div></div></div>
<div id="whois"><div class="bar"><div class="h">WHO IS</div><div class="nm" id="wn">—</div><div class="role" id="wr">—</div></div></div>
<div id="bigBanner"><div class="b" id="bbT">—</div></div>
<div id="dialogue"><div class="who" id="dWho">—</div><div class="ln" id="dLn">—</div></div>
<div id="anchors">
  <div class="anchor" id="a1"><div class="av h">HM</div><div><div class="nm">HELEN MARSDEN</div><div class="role">PUNDIT</div></div></div>
  <div class="anchor" id="a2"><div class="av b">EC</div><div><div class="nm">EDDIE "BOOTS" CALLOWAY</div><div class="role">EX-PRO</div></div></div>
</div>
<div id="ticker">
  <div id="tickLogo">FIXTURES &amp; RESULTS</div>
  <div id="tickWrap"><div id="tickRoll" class="">—</div></div>
</div>
<script>
"use strict";
(function(){
const $=id=>document.getElementById(id);
const stageEl=$("stage"),flashEl=$("flash");
const W=()=>window.innerWidth,H=()=>window.innerHeight;

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.6));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=false;
renderer.outputColorSpace=THREE.SRGBColorSpace;
stageEl.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1428);
scene.fog=new THREE.Fog(0x0a1428,55,260);

const camera=new THREE.PerspectiveCamera(50,W()/H(),0.5,500);
camera.position.set(0,28,55);
camera.lookAt(0,0,0);

scene.add(new THREE.HemisphereLight(0xddeeff,0x223344,0.8));
const sun=new THREE.DirectionalLight(0xfff2c0,1.05);
sun.position.set(40,80,30);
scene.add(sun);
const fill=new THREE.PointLight(0xffaa55,0.6,150);
fill.position.set(-30,30,-30);
scene.add(fill);

// ---------- DATA ----------
const PLAYER_NAMES=["Tomás Vargas","Jaden Bell","Kenji Sato","Pierre Lacombe","Diogo Reyes","Mikkel Strand","Hassan Idris","Luca Bianchi","Andre Kowalski","Rafa Mendoza","Eli Brennan","Yuki Tanaka","Oskar Lindqvist","Mateo Dossena","Samir Khoury","Owen Pritchard","Bruno Costa","Niko Vasilev","Jules Antoine","Karim Bensalem","Felix Marais","Idris Onyema"];
const OTHER_CLUBS=["AC Vela","FC Karlstad","Royal Cresthaven","Atlético Sombra","Dynamo Pelagra","Sporting Tindale","CF Norfell","Real Marbruno","Olimpico Verde","Wanderers Hartwell"];
const CLUB_NAMES=[
  {n:"Northbridge Rovers",c:0xc41e3a,a:"NBR",league:"PREMIERSHIP",city:"Northbridge"},
  {n:"Westhaven United",c:0x1a5fa0,a:"WHU",league:"NATIONAL LEAGUE",city:"Westhaven"},
  {n:"Aurora City",c:0xff7a00,a:"AUR",league:"PREMIERSHIP",city:"Aurora"},
  {n:"Greypoint Athletic",c:0x4a4a4a,a:"GPA",league:"CHAMPIONSHIP",city:"Greypoint"},
  {n:"Rosendale FC",c:0xb02a85,a:"ROS",league:"PREMIERSHIP",city:"Rosendale"}
];
const MANAGER_NAMES=["Alan Whitfield","Sergio Marchetti","Erik Thorvaldsen","Marcus Holloway","Daniela Rico","Jorge Salinas","Henri Beaufort","Gunnar Eriksson","Patrick O'Doyle","Tomasz Kowal","Reggie Caldwell"];
const RIVAL_NAMES_BASE=["AC Vela","FC Karlstad","Royal Cresthaven","Atlético Sombra","Dynamo Pelagra","Sporting Tindale","CF Norfell","Real Marbruno","Olimpico Verde","Wanderers Hartwell","Eastdown Athletic","Meridian FC","Brookhart Town","Calderon FC","Hilltop United","Ridgemoor","Velaspark","Granthorpe","Foxhaven","Carrowfield"];

function pick(arr){return arr[(Math.random()*arr.length)|0];}
function rint(a,b){return a+((Math.random()*(b-a+1))|0);}
function uniqShuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

let club, season, phase, phaseT, seasonT, t0=performance.now()/1000, lastT=t0;
let camIdx=0, camHold=0;
const camLabels=["CAM 1 — PITCH WIDE","CAM 2 — DUGOUT","CAM 3 — BOARDROOM","CAM 4 — TRAINING","CAM 5 — TROPHY ROOM"];

function freshClub(idx){
  const c=CLUB_NAMES[idx%CLUB_NAMES.length];
  return {
    name:c.n, color:c.c, abbr:c.a, league:c.league, city:c.city,
    trophies:0, squadValue:10, position:14, capacity:30000,
    manager:{name:pick(MANAGER_NAMES),age:rint(46,58),seasons:0,sacked:false,retired:false},
    starPlayer:{name:PLAYER_NAMES[0],age:18,pos:"FW",rating:78,form:4,retired:false,arc:"wonderkid"},
    squad:[],
    rivals:uniqShuffle(RIVAL_NAMES_BASE).slice(0,19)
  };
}

function buildSquad(c){
  const names=uniqShuffle(PLAYER_NAMES).slice(0,12);
  c.squad=names.map((n,i)=>({
    name:n,
    pos:i<4?"DF":i<8?"MF":"FW",
    age:i===0?18:rint(19,30),
    rating:rint(72,84),
    introduced:false,
    isStar:i===0
  }));
  c.starPlayer=Object.assign(c.starPlayer,{name:names[0]});
  c.squad[0].isStar=true;
  c.squad[0].age=18;
  c.starPlayer.age=18;
  c.starPlayer.arc="wonderkid";
  c.starPlayer.retired=false;
}

let clubIdx=0;
club=freshClub(clubIdx);
buildSquad(club);

// ---------- STAGE BUILD ----------
const root=new THREE.Group();
scene.add(root);
const disposables=[];
function trackGeo(g){disposables.push(g);return g;}
function trackMat(m){disposables.push(m);return m;}

// pitch
const pitchG=trackGeo(new THREE.PlaneGeometry(70,46,1,1));
const pitchM=trackMat(new THREE.MeshLambertMaterial({color:0x0e6b1f}));
const pitch=new THREE.Mesh(pitchG,pitchM);
pitch.rotation.x=-Math.PI/2;
root.add(pitch);

// stripes
for(let i=0;i<10;i++){
  const sg=trackGeo(new THREE.PlaneGeometry(70,4.6));
  const sm=trackMat(new THREE.MeshLambertMaterial({color:i%2?0x108a26:0x0c5e1b,transparent:true,opacity:.55}));
  const s=new THREE.Mesh(sg,sm);
  s.rotation.x=-Math.PI/2;
  s.position.set(0,0.02,-23+i*4.6+2.3);
  root.add(s);
}

// pitch lines (white markings)
function lineRect(w,d,x,z,y=0.04){
  const pts=[
    new THREE.Vector3(-w/2,y,-d/2),new THREE.Vector3(w/2,y,-d/2),
    new THREE.Vector3(w/2,y,d/2),new THREE.Vector3(-w/2,y,d/2),
    new THREE.Vector3(-w/2,y,-d/2)
  ];
  const g=trackGeo(new THREE.BufferGeometry().setFromPoints(pts));
  const m=trackMat(new THREE.LineBasicMaterial({color:0xffffff}));
  const l=new THREE.Line(g,m);
  l.position.set(x,0,z);
  root.add(l);
}
lineRect(70,46,0,0);
lineRect(20,30,-25,0); // left box
lineRect(20,30,25,0);  // right box
lineRect(8,12,-31,0);  // left 6yard
lineRect(8,12,31,0);   // right 6yard
// halfway
{
  const pts=[new THREE.Vector3(0,0.04,-23),new THREE.Vector3(0,0.04,23)];
  const g=trackGeo(new THREE.BufferGeometry().setFromPoints(pts));
  const l=new THREE.Line(g,trackMat(new THREE.LineBasicMaterial({color:0xffffff})));
  root.add(l);
}
// center circle
{
  const pts=[];
  for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*7,0.04,Math.sin(a)*7));}
  const g=trackGeo(new THREE.BufferGeometry().setFromPoints(pts));
  const l=new THREE.Line(g,trackMat(new THREE.LineBasicMaterial({color:0xffffff})));
  root.add(l);
}

// goals
function goal(x){
  const grp=new THREE.Group();
  const m=trackMat(new THREE.MeshLambertMaterial({color:0xffffff}));
  const post1=new THREE.Mesh(trackGeo(new THREE.BoxGeometry(0.2,3,0.2)),m);
  const post2=post1.clone();
  const cross=new THREE.Mesh(trackGeo(new THREE.BoxGeometry(0.2,0.2,7)),m);
  post1.position.set(0,1.5,-3.4);
  post2.position.set(0,1.5,3.4);
  cross.position.set(0,3,0);
  grp.add(post1);grp.add(post2);grp.add(cross);
  // net
  const ng=trackGeo(new THREE.BoxGeometry(2.5,3,7));
  const nm=trackMat(new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.16,wireframe:true}));
  const net=new THREE.Mesh(ng,nm);
  net.position.set(-1.25*Math.sign(x),1.5,0);
  grp.add(net);
  grp.position.set(x,0,0);
  root.add(grp);
}
goal(-35);
goal(35);

// stands (kop + main)
function stand(z,color,h=10){
  const g=trackGeo(new THREE.BoxGeometry(80,h,12));
  const m=trackMat(new THREE.MeshLambertMaterial({color:color}));
  const s=new THREE.Mesh(g,m);
  s.position.set(0,h/2,z);
  root.add(s);
  // tier roof
  const rg=trackGeo(new THREE.BoxGeometry(82,1,14));
  const rm=trackMat(new THREE.MeshLambertMaterial({color:0x222f3f}));
  const r=new THREE.Mesh(rg,rm);
  r.position.set(0,h+1,z);
  root.add(r);
}
stand(-29,0x6f7c8a,12);  // kop (north)
stand(29,0x4a5868,10);   // main (south)
// short ends (visible behind goals)
function endStand(x,color){
  const g=trackGeo(new THREE.BoxGeometry(10,8,46));
  const m=trackMat(new THREE.MeshLambertMaterial({color:color}));
  const s=new THREE.Mesh(g,m);
  s.position.set(x,4,0);
  root.add(s);
}
endStand(-44,0x404e5e);
endStand(44,0x404e5e);

// crowd InstancedMesh (240 figures - 4 stands)
const crowdGeo=trackGeo(new THREE.CapsuleGeometry(0.45,0.7,3,6));
const crowdMat=trackMat(new THREE.MeshLambertMaterial({color:0xcccccc,vertexColors:true}));
const COUNT=240;
const crowd=new THREE.InstancedMesh(crowdGeo,crowdMat,COUNT);
const dummy=new THREE.Object3D();
const colors=new Float32Array(COUNT*3);
const baseY=new Float32Array(COUNT);
const cwSeed=new Float32Array(COUNT);
function placeCrowd(){
  let i=0;
  // kop (north z=-29) — 12x10
  for(let row=0;row<10;row++){
    for(let col=0;col<12;col++){
      if(i>=COUNT)break;
      const x=-33+col*6;
      const y=4+row*0.85;
      const z=-32-row*0.4;
      dummy.position.set(x,y,z);
      dummy.rotation.set(0,0,0);
      dummy.scale.set(1,1,1);
      dummy.updateMatrix();
      crowd.setMatrixAt(i,dummy.matrix);
      const home=Math.random()<0.7;
      const col2=home?new THREE.Color(club.color):new THREE.Color(0x222222);
      col2.toArray(colors,i*3);
      baseY[i]=y;
      cwSeed[i]=Math.random()*Math.PI*2;
      i++;
    }
  }
  // main (south z=29) — 12x10
  for(let row=0;row<10;row++){
    for(let col=0;col<12;col++){
      if(i>=COUNT)break;
      const x=-33+col*6;
      const y=3.5+row*0.7;
      const z=32+row*0.4;
      dummy.position.set(x,y,z);
      dummy.updateMatrix();
      crowd.setMatrixAt(i,dummy.matrix);
      const col2=new THREE.Color(Math.random()<0.5?club.color:0x666666);
      col2.toArray(colors,i*3);
      baseY[i]=y;
      cwSeed[i]=Math.random()*Math.PI*2;
      i++;
    }
  }
  crowd.instanceMatrix.needsUpdate=true;
  crowd.geometry.setAttribute("color",new THREE.InstancedBufferAttribute(colors,3));
}
placeCrowd();
root.add(crowd);

// dugout
const dugGrp=new THREE.Group();
{
  const g=trackGeo(new THREE.BoxGeometry(8,2.4,2));
  const m=trackMat(new THREE.MeshLambertMaterial({color:0x1a2030}));
  const d=new THREE.Mesh(g,m);
  d.position.set(0,1.2,0);
  dugGrp.add(d);
  // roof
  const rg=trackGeo(new THREE.BoxGeometry(9,0.2,2.4));
  const rm=trackMat(new THREE.MeshLambertMaterial({color:0x303a4d}));
  const r=new THREE.Mesh(rg,rm);
  r.position.set(0,2.5,0);

// trophy generator
function makeTrophy(idx){
  const grp=new THREE.Group();
  const cup=new THREE.Mesh(trackGeo(new THREE.CylinderGeometry(0.4,0.25,0.8,8)),trackMat(new THREE.MeshLambertMaterial({color:0xffd84d,emissive:0x553300,emissiveIntensity:0.4})));
  cup.position.y=0.6;
  grp.add(cup);
  const base=new THREE.Mesh(trackGeo(new THREE.CylinderGeometry(0.5,0.5,0.2,8)),trackMat(new THREE.MeshLambertMaterial({color:0x4a2a14})));
  base.position.y=0.1;
  grp.add(base);
  const handle=new THREE.Mesh(trackGeo(new THREE.TorusGeometry(0.18,0.04,4,12)),trackMat(new THREE.MeshLambertMaterial({color:0xffd84d})));
  handle.position.y=0.65;
  handle.rotation.y=Math.PI/2;
  grp.add(handle);
  const i=idx;
  const shelf=Math.min(2,(i/4)|0);
  const slot=i%4;
  grp.position.set(-4.5+slot*3,1.2+shelf*1.4,-3.7);
  return grp;
}

// ticker
function buildTickerText(){
  const parts=[];
  parts.push(`${club.name.toUpperCase()} ${club.position<10?"TOP 10":"MID-TABLE"} • POS ${club.position}`);
  for(let i=0;i<14;i++){
    const a=pick(club.rivals), b=pick(club.rivals);
    if(a===b)continue;
    const sa=rint(0,4),sb=rint(0,4);
    const cls=sa>sb?"res":sa<sb?"l":"";
    parts.push(`${a.substring(0,3).toUpperCase()} <span class="${cls}">${sa}-${sb}</span> ${b.substring(0,3).toUpperCase()}`);
  }
  parts.push(`MANAGER ${club.manager.name.toUpperCase()} • SQUAD £${club.squadValue}M`);
  parts.push(`STAR PLAYER ${club.starPlayer.name.toUpperCase()} (AGE ${club.starPlayer.age})`);
  parts.push(`TROPHY COUNT — ${club.trophies}`);
  return parts.join('<span class="sep">◆</span>');
}
function refreshTicker(){
  $("tickRoll").innerHTML=buildTickerText()+"<span class='sep'>◆</span>"+buildTickerText();
}

// ---------- EVENT QUEUE ----------
const evQ=[];
function enqueue(at,fn){evQ.push({at,fn,done:false});}
function processQ(){
  for(const e of evQ){
    if(!e.done && seasonT>=e.at){e.fn();e.done=true;}
  }
}

// ---------- SEASON SCHEDULER ----------
function scheduleSeason(){
  evQ.length=0;
  // clear residual flags
  // PRE-SEASON 0-10s: transfers in/out, training cam
  enqueue(0.4,()=>{
    setPhase("PRE-SEASON");
    setCam(3); // training
    refreshTicker();
    dialogue("HELEN MARSDEN",`Welcome back to Manager Life — ${club.name} preparing for ${club.league} season ${season} of 10.`);
  });
  // transfer in
  enqueue(2.5,()=>{
    const newName=pick(PLAYER_NAMES.filter(n=>!club.squad.find(s=>s.name===n)))||pick(PLAYER_NAMES);
    const fee=rint(8,32+season*2);
    const fromClub=pick(OTHER_CLUBS);
    bigBanner(`${club.abbr} SIGNS ${newName.toUpperCase()} FOR £${fee}M`);
    showL3(`${newName.toUpperCase()} SIGNS FOR ${club.name.toUpperCase()}`,`FROM ${fromClub.toUpperCase()} • £${fee}M • AGE ${rint(19,28)}`,5500);
    showWho(newName,`SIGNING — ${rint(19,28)} YO • ${pick(["DF","MF","FW"])}`);
    // replace someone in squad
    const dropIdx=rint(1,11);
    const dropped=club.squad[dropIdx];
    club.squad[dropIdx]={name:newName,pos:dropped.pos,age:rint(19,27),rating:rint(73,86),introduced:true,isStar:false};
    club.squadValue+=fee*0.6;
  });
  enqueue(5.5,()=>{
    const out=club.squad[rint(2,10)];
    const toClub=pick(OTHER_CLUBS);
    showL3(`${out.name.toUpperCase()} DEPARTS`,`TO ${toClub.toUpperCase()} • £${rint(5,40)}M`,4500);
    bigBanner(`${out.name.toUpperCase()} LEAVES`);
  });
  enqueue(8.5,()=>{
    setCam(3);
    dialogue("EDDIE \"BOOTS\" CALLOWAY",`${club.manager.name} drilling them hard at training. He needs results this season.`);
  });
  // KICKOFF 10-18s: first match
  enqueue(10.5,()=>{
    setPhase("KICKOFF");
    setCam(0);
    showL3(`MATCHDAY 1 — ${club.league}`,`${club.abbr} vs ${club.rivals[0].substring(0,3).toUpperCase()} • SOLD OUT`,4000);
  });
  enqueue(12.5,()=>{
    const won=Math.random()<0.55;
    const sa=won?rint(2,4):rint(0,1), sb=won?rint(0,1):rint(1,3);
    showL3(`${club.abbr} ${sa}-${sb} ${club.rivals[0].substring(0,3).toUpperCase()}`,won?"OPENING DAY VICTORY":"OPENING DEFEAT",4000);
    dialogue("HELEN MARSDEN",won?"What a start to the campaign!":"Difficult opening — pressure already on the gaffer.");
  });
  enqueue(15.5,()=>{
    if(Math.random()<0.3){injuryFlash();showL3("INJURY ON THE PITCH","KEY MIDFIELDER LIMPS OFF — SCAN PENDING",3500);}
  });
  // MIDSEASON 18-30s: 3 highlight matches
  enqueue(18.5,()=>{
    setPhase("MIDSEASON");
    setCam(0);
    dialogue("EDDIE \"BOOTS\" CALLOWAY","Mid-season grind separates the contenders from the pretenders.");
  });
  enqueue(20.5,()=>{
    const won=Math.random()<0.5;
    const opp=pick(club.rivals);
    showL3(`${club.abbr} ${won?rint(1,3):rint(0,1)}-${won?0:rint(1,3)} ${opp.substring(0,3).toUpperCase()}`,won?"AWAY VICTORY":"AWAY DEFEAT");
    if(won) club.position=Math.max(1,club.position-1);
    else club.position=Math.min(20,club.position+1);
  });
  enqueue(22.5,()=>{
    bigBanner("DERBY MATCH",false,2500);
    flashScreen("#ffd84d",250);
    showL3("THE NORTH DERBY",`${club.name.toUpperCase()} vs ${club.rivals[1].toUpperCase()}`,3500);
  });
  enqueue(25,()=>{
    const won=Math.random()<0.55;
    showL3(`DERBY ${won?"WIN":"LOSS"} — ${club.abbr} ${won?rint(2,3):rint(0,1)}-${won?rint(0,1):rint(2,3)} ${club.rivals[1].substring(0,3).toUpperCase()}`,won?"BRAGGING RIGHTS SECURED":"DERBY DAY HEARTBREAK");
    dialogue("HELEN MARSDEN",won?`Derby day! ${club.starPlayer.name.split(" ")[0]} the hero!`:"Derby day disaster for the home faithful.");
    if(won)club.position=Math.max(1,club.position-2);
    refreshTicker();
  });
  enqueue(27,()=>{
    if(Math.random()<0.25){
      bigBanner(`MANAGER ${club.manager.name.toUpperCase()} DEPARTS`,true,3500);
      showL3(`MANAGER SACKED`,`${club.manager.name.toUpperCase()} DEPARTS — INTERIM APPOINTED`,5000);
      const old=club.manager.name;
      club.manager={name:pick(MANAGER_NAMES.filter(n=>n!==old)),age:rint(45,58),seasons:0,sacked:false,retired:false};
      showWho(club.manager.name,"NEW MANAGER — INTERIM");
      dialogue("EDDIE \"BOOTS\" CALLOWAY",`Brutal call from the boardroom. ${old} out the door.`);
    }
  });
  // intro a player
  enqueue(28.5,()=>{
    const youth=club.squad.find(p=>!p.introduced&&!p.isStar);
    if(youth){
      youth.introduced=true;
      showWho(youth.name,`${youth.pos} • AGE ${youth.age} • RATING ${youth.rating}`);
    }
  });
  // CUP RUN 30-40s: 2 dramatic cup matches
  enqueue(30.5,()=>{
    setPhase("CUP RUN");
    setCam(0);
    bigBanner("CUP QUARTER FINAL");
    showL3(`${club.name.toUpperCase()} IN CUP ACTION`,"QUARTER FINAL — ALL OR NOTHING",3500);
  });
  enqueue(33,()=>{
    const won=Math.random()<0.6;
    if(won){
      showL3("THROUGH TO SEMIS!",`${club.abbr} ${rint(2,3)}-${rint(1,2)} ${pick(club.rivals).substring(0,3).toUpperCase()}`,4000);
      dialogue("HELEN MARSDEN","What a cup tie! Through to the semi-finals!");
    } else {
      showL3("CUP EXIT",`${club.abbr} ${rint(0,1)}-${rint(2,3)} ${pick(club.rivals).substring(0,3).toUpperCase()}`,4000);
      dialogue("EDDIE \"BOOTS\" CALLOWAY","Cup dream over for another year.");
    }
    seasonState.cupRun=won;
  });
  enqueue(36,()=>{
    if(seasonState.cupRun){
      bigBanner("CUP FINAL DAY",false,3500);
      flashScreen("#ffd84d",300);
      setCam(0);
      showL3("CUP FINAL — WEMBOROUGH STADIUM",`${club.name.toUpperCase()} vs ${club.rivals[3].toUpperCase()}`,5000);
    } else {
      setCam(2); // boardroom
      dialogue("HELEN MARSDEN","Boardroom meetings as the season pivots to league focus.");
    }
  });
  enqueue(38.5,()=>{
    if(seasonState.cupRun){
      const won=Math.random()<0.5;
      if(won){
        bigBanner("CUP WINNERS!");
        showL3("TROPHY LIFT!",`${club.name.toUpperCase()} CHAMPIONS — ${rint(1,3)}-${rint(0,2)}`,5500);
        dialogue("EDDIE \"BOOTS\" CALLOWAY","They've done it! What a moment for this football club!");
        club.trophies++;
        addTrophy();
        setCam(4); // trophy room
        confetti();
      } else {
        showL3("CUP FINAL HEARTBREAK",`${club.abbr} ${rint(0,1)}-${rint(1,2)} ${club.rivals[3].substring(0,3).toUpperCase()}`,5000);
        dialogue("HELEN MARSDEN","So close, yet so far. Heads will be down tonight.");
      }
    }
  });
  // END OF SEASON 40-50s
  enqueue(40.5,()=>{
    setPhase("END OF SEASON");
    setCam(0);
  });
  enqueue(42,()=>{
    // determine final position drift
    const drift=rint(-3,2);
    club.position=Math.max(1,Math.min(20,club.position+drift));
    if(club.position===1){
      bigBanner("LEAGUE CHAMPIONS!",false,4000);
      showL3(`${club.name.toUpperCase()} ARE CHAMPIONS!`,`${club.league} TITLE WINNERS`,5500);
      club.trophies++;
      addTrophy();
      confetti();confetti();
      setCam(4);
      dialogue("HELEN MARSDEN",`A historic title for ${club.name}! Pure gold confetti!`);
    } else if(club.position>=18){
      bigBanner("RELEGATED",true,4000);
      showL3(`${club.name.toUpperCase()} RELEGATED`,`FINISHED ${club.position}TH — DROP CONFIRMED`,5500);
      dialogue("EDDIE \"BOOTS\" CALLOWAY","Devastating. The fans deserve so much better than this.");
      // fans crying — vignette darken
      flashScreen("#000",400);
      // demote league
      if(club.league==="PREMIERSHIP")club.league="CHAMPIONSHIP";
      else if(club.league==="CHAMPIONSHIP")club.league="NATIONAL LEAGUE";
    } else if(club.position<=3){
      showL3(`TOP 3 FINISH — ${club.position}${club.position===2?"ND":"RD"}`,`${club.name.toUpperCase()} CONTINENTAL FOOTBALL NEXT SEASON`,5500);
      dialogue("HELEN MARSDEN",`A wonderful finish — ${club.position} place — Europe beckons!`);
    } else {
      showL3(`FINAL POSITION — ${club.position}TH`,`${club.name.toUpperCase()} ${club.league}`,5000);
      dialogue("EDDIE \"BOOTS\" CALLOWAY",`Solid mid-table — but the fans want ambition.`);
    }
  });
  // promotion check (if previous season relegated and finished top 2)
  enqueue(44,()=>{
    if(club.league!=="PREMIERSHIP"&&club.position<=2){
      bigBanner("PROMOTED!",false,3500);
      showL3(`${club.name.toUpperCase()} PROMOTED`,`UP TO ${club.league==="CHAMPIONSHIP"?"PREMIERSHIP":"CHAMPIONSHIP"}!`,5000);
      fireworks(15);
      club.trophies++;
      addTrophy();
      if(club.league==="CHAMPIONSHIP")club.league="PREMIERSHIP";
      else if(club.league==="NATIONAL LEAGUE")club.league="CHAMPIONSHIP";
      dialogue("HELEN MARSDEN","FIREWORKS! Promotion party in full swing!");
    }
  });
  // manager interview
  enqueue(46,()=>{
    setCam(2); // boardroom
    const lines=[
      "We will fight for every point next season — that's a promise.",
      "Tough campaign but we built something here.",
      "I'm proud of every single one of these lads.",
      "We need backing in the transfer window — simple as that.",
      "The fans were magnificent. We owe them more.",
      "Football is a results business. We move on."
    ];
    showL3(`MANAGER INTERVIEW — ${club.manager.name.toUpperCase()}`,club.league.toUpperCase(),5500);
    dialogue(`MANAGER ${club.manager.name.toUpperCase()}`,pick(lines),5500);
  });
  // age the star player
  enqueue(48,()=>{
    club.starPlayer.age++;
    if(club.starPlayer.age<=20)club.starPlayer.arc="wonderkid";
    else if(club.starPlayer.age<=24)club.starPlayer.arc="leader";
    else if(club.starPlayer.age<=27)club.starPlayer.arc="captain";
    else if(club.starPlayer.age<=30)club.starPlayer.arc="veteran";
    else club.starPlayer.arc="legend";
    club.starPlayer.form=rint(2,5);
    // retirement
    if(club.starPlayer.age>=31&&!club.starPlayer.retired){
      club.starPlayer.retired=true;
      bigBanner(`${club.starPlayer.name.toUpperCase()} RETIRES — A LEGEND OF ${club.name.toUpperCase()}`,false,4500);
      showL3(`${club.starPlayer.name.toUpperCase()} HANGS UP THE BOOTS`,`A LEGEND OF ${club.name.toUpperCase()}`,5500);
      dialogue("HELEN MARSDEN",`The end of an era. ${club.starPlayer.name} — a one-club legend.`);
      // promote a youngster
      const next=pick(PLAYER_NAMES.filter(n=>n!==club.starPlayer.name));
      club.starPlayer={name:next,age:18,pos:"FW",rating:78,form:4,retired:false,arc:"wonderkid"};
      setTimeout(()=>{showWho(next,"NEW STAR — 18 YEARS OLD • FW");},5000);
    }
    // squad value scales
    club.squadValue=Math.min(220,Math.max(8,club.squadValue+rint(-5,30)+(season>=5?15:0)));
    refreshTicker();
  });
  // manager retirement (rare, late seasons)
  enqueue(49.2,()=>{
    if(season>=6&&Math.random()<0.25&&!club.manager.retired){
      club.manager.retired=true;
      bigBanner(`MANAGER ${club.manager.name.toUpperCase()} HANGS UP THE BOOTS`,false,4000);
      showL3(`MANAGER RETIRES`,`${club.manager.name.toUpperCase()} STEPS DOWN AFTER ${club.manager.seasons+1} SEASONS`,5500);
      const old=club.manager.name;
      club.manager={name:pick(MANAGER_NAMES.filter(n=>n!==old)),age:rint(44,55),seasons:0,sacked:false,retired:false};
      showWho(club.manager.name,"NEW MANAGER — APPOINTED");
      dialogue("EDDIE \"BOOTS\" CALLOWAY","End of an era in the dugout. Massive shoes to fill.");
    }
  });
  // capacity expand
  enqueue(49.7,()=>{
    if(club.position<=4&&season>=4) club.capacity=Math.min(80000,club.capacity+5000);
    club.manager.seasons++;
  });
}

const seasonState={cupRun:false};

function setPhase(p){
  phase=p;
}

function startSeason(){
  refreshTicker();
  buildLeagueTable();
  scheduleSeason();
  seasonT=0;
  setPhase("PRE-SEASON");
  // reset transient
  for(const p of club.squad) p.introduced=p.introduced||p.isStar;
}

function startSaga(){
  clubIdx=(Math.random()*CLUB_NAMES.length)|0;
  club=freshClub(clubIdx);
  buildSquad(club);
  rebuildClubVisuals();
  clearTrophyCabinet();
  season=1;
  startSeason();
  bigBanner(`${club.name.toUpperCase()} — A NEW SAGA`,false,4000);
  showL3(`A NEW MANAGER ARRIVES`,`${club.manager.name.toUpperCase()} TAKES THE REINS AT ${club.name.toUpperCase()}`,6000);
  showWho(club.manager.name,`HEAD COACH — AGE ${club.manager.age}`);
}

function endSaga(){
  // career retrospective montage 12s
  setPhase("LEGACY");
  bigBanner(`LEGACY — ${club.manager.name.toUpperCase()}`,false,4500);
  showL3(`LEGACY OF MANAGER ${club.manager.name.toUpperCase()}`,`${club.trophies} TROPHIES IN 10 SEASONS — FINAL POSITION ${club.position}`,6500);
  setCam(4);
  confetti();
  setTimeout(()=>{
    dialogue("HELEN MARSDEN",`A ten-season chapter closes — ${club.trophies} trophies and counting.`);
  },1200);
  setTimeout(()=>{
    bigBanner(`A NEW SAGA BEGINS`,false,3500);
    setCam(0);
  },6000);
  setTimeout(()=>{
    startSaga();
  },10000);
}

// ---------- CAMERA WORK ----------
const camPositions=[
  {pos:new THREE.Vector3(0,28,55),look:new THREE.Vector3(0,2,0)},     // pitch wide
  {pos:new THREE.Vector3(2,4,22),look:new THREE.Vector3(0,2,16)},     // dugout (pitch group local)
  {pos:new THREE.Vector3(0,3.5,205),look:new THREE.Vector3(0,2.5,200)}, // boardroom (board at y=200)
  {pos:new THREE.Vector3(20,12,420),look:new THREE.Vector3(0,2,400)},  // training (train at y=400)
  {pos:new THREE.Vector3(0,2.5,605),look:new THREE.Vector3(0,2,599)}   // trophy room (tr at y=600)
];
function cameraTick(dt){
  const cp=camPositions[camIdx];
  // small drift
  const drift=Math.sin(performance.now()*0.0003)*1.5;
  const driftZ=Math.cos(performance.now()*0.0002)*0.8;
  const targetPos=cp.pos.clone();
  targetPos.x+=drift*(camIdx===0?1:0.2);
  targetPos.z+=driftZ*(camIdx===0?0.5:0.1);
  camera.position.lerp(targetPos,0.05);
  camera.lookAt(cp.look);
  camHold-=dt;
  if(camHold<=0){
    camHold=4+Math.random()*3.5;
  }
}

// ---------- PHYSICS / ANIM ----------
function ballTick(dt){
  if(camIdx!==0&&camIdx!==1){return;}
  // simple chase + bounce in pitch bounds
  ball.position.x+=ballVx*dt*8;
  ball.position.z+=ballVz*dt*8;
  ball.position.y+=ballVy*dt*8;
  ballVy-=9.8*dt*0.4;
  if(ball.position.y<=0.3){ball.position.y=0.3;ballVy*=-0.5;if(Math.abs(ballVy)<0.2)ballVy=0;}
  if(ball.position.x>33){ballVx=-Math.abs(ballVx);}
  if(ball.position.x<-33){ballVx=Math.abs(ballVx);}
  if(ball.position.z>20){ballVz=-Math.abs(ballVz);}
  if(ball.position.z<-20){ballVz=Math.abs(ballVz);}
  // random kick
  if(Math.random()<0.012){
    ballVx=(Math.random()-0.5)*1.4;
    ballVz=(Math.random()-0.5)*1.0;
    ballVy=Math.random()*0.6;
  }
}
function playerTick(dt){
  for(const m of playerMeshes){
    const b=m.userData.basePos;
    const t=performance.now()*0.001;
    const ox=Math.sin(t*1.2+m.userData.idx*0.7)*1.4*(m.userData.idx===0?0.15:1);
    const oz=Math.cos(t*1.0+m.userData.idx*0.5)*1.0*(m.userData.idx===0?0.15:1);
    m.position.x+=(b.x+ox-m.position.x)*0.04;
    m.position.z+=(b.z+oz-m.position.z)*0.04;
    // ball chase: a few pursue
    if(m.userData.idx===5||m.userData.idx===9){
      const dx=ball.position.x-m.position.x;
      const dz=ball.position.z-m.position.z;
      const d=Math.hypot(dx,dz);
      if(d<8){
        m.position.x+=dx*0.02;
        m.position.z+=dz*0.02;
      }
    }
  }
}
function crowdTick(dt){
  const t=performance.now()*0.001;
  for(let i=0;i<COUNT;i++){
    crowd.getMatrixAt(i,dummy.matrix);
    dummy.matrix.decompose(dummy.position,dummy.quaternion,dummy.scale);
    dummy.position.y=baseY[i]+Math.sin(t*4+cwSeed[i])*0.18;
    dummy.updateMatrix();
    crowd.setMatrixAt(i,dummy.matrix);
  }
  crowd.instanceMatrix.needsUpdate=true;
}
function fxTick(dt){
  for(let i=fxParts.length-1;i>=0;i--){
    const p=fxParts[i];
    p.userData.life-=dt;
    p.position.x+=p.userData.v.x;
    p.position.y+=p.userData.v.y;
    p.position.z+=p.userData.v.z;
    p.userData.v.y-=0.02;
    p.rotation.x+=0.1;
    p.rotation.z+=0.1;
    if(p.userData.life<=0){
      fxGroup.remove(p);
      p.geometry.dispose();p.material.dispose();
      fxParts.splice(i,1);
    }
  }
}
function trainerTick(){
  const tn=train.userData.trainees||[];
  const t=performance.now()*0.001;
  for(let i=0;i<tn.length;i++){
    tn[i].position.y=1.2+Math.abs(Math.sin(t*4+i))*0.5;
  }
}

// ---------- PHASE → CAMERA AUTO-CUTS ----------
function phaseCamPick(){
  if(phase==="PRE-SEASON"){
    return [3,2,0][rint(0,2)];
  } else if(phase==="KICKOFF"||phase==="MIDSEASON"){
    return [0,0,1,0][rint(0,3)];
  } else if(phase==="CUP RUN"){
    return [0,0,4,1][rint(0,3)];
  } else if(phase==="END OF SEASON"){
    return [4,2,0,1][rint(0,3)];
  } else if(phase==="LEGACY"){
    return 4;
  }
  return 0;
}

// ---------- MAIN LOOP ----------
let running=true;
function loop(){
  if(!running)return;
  const now=performance.now()/1000;
  const dt=Math.min(0.05,now-lastT);
  lastT=now;
  seasonT+=dt;
  processQ();
  ballTick(dt);
  playerTick(dt);
  crowdTick(dt);
  fxTick(dt);
  trainerTick();
  cameraTick(dt);
  if(camHold>=3.9){
    setCam(phaseCamPick());
  }
  updateUI();
  // season advance
  if(seasonT>=51){
    season++;
    if(season>10){
      endSaga();
      season=99; // sentinel
    } else {
      startSeason();
    }
  }
  renderer.render(scene,camera);
  raf=requestAnimationFrame(loop);
}

// ---------- INIT ----------
season=1;
phase="PRE-SEASON";
seasonT=0;
phaseT=0;
rebuildClubVisuals();
startSeason();
bigBanner(`${club.name.toUpperCase()} — A NEW SAGA`,false,4000);
showL3(`A NEW MANAGER ARRIVES`,`${club.manager.name.toUpperCase()} TAKES THE REINS AT ${club.name.toUpperCase()}`,6000);
showWho(club.manager.name,`HEAD COACH — AGE ${club.manager.age}`);
dialogue("HELEN MARSDEN",`Live from ${club.city}, this is Manager Life.`);

let raf=requestAnimationFrame(loop);

// resize
window.addEventListener("resize",()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});

// dispose / cleanup
window.addEventListener("beforeunload",()=>{
  running=false;
  cancelAnimationFrame(raf);
  for(const d of disposables){try{d.dispose&&d.dispose();}catch(e){}}
  try{renderer.dispose();}catch(e){}
});

// auto-restart safety
window.addEventListener("error",(e)=>{
  console.warn("ROUND13_SAGA error",e.message);
  setTimeout(()=>{if(!running){running=true;lastT=performance.now()/1000;raf=requestAnimationFrame(loop);}},800);
});

})();
