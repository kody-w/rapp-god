<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R25 W1/12 — Brimsworth Village 2024 — Living City Day-Cycle</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#0b0d12;color:#f5e9c8;font-family:"Georgia","Times New Roman",serif;overflow:hidden;height:100%}
  #c{display:block;width:100vw;height:100vh}
  .hud{position:fixed;pointer-events:none;font-size:11px;line-height:1.35;text-shadow:0 1px 3px rgba(0,0,0,.85)}
  #title{top:10px;left:14px;max-width:380px}
  #title h1{margin:0;font-size:14px;letter-spacing:.18em;color:#ffe9b0;font-variant:small-caps;text-transform:uppercase}
  #title .sub{font-size:10px;opacity:.78;letter-spacing:.18em}
  #cal{top:10px;right:14px;width:230px;background:rgba(20,18,14,.55);padding:8px 10px;border:1px solid rgba(255,220,160,.18);border-radius:4px}
  #cal h2{margin:0 0 4px;font-size:11px;letter-spacing:.18em;color:#ffd58a;font-variant:small-caps}
  #cal .ev{display:flex;justify-content:space-between;font-size:10px;opacity:.85}
  #cal .ev.now{color:#ffe18a;opacity:1;font-weight:bold}
  #cal .ev.past{opacity:.4}
  #clock{bottom:14px;left:14px;font-size:13px;letter-spacing:.22em;color:#ffe9b0}
  #clock .small{font-size:9px;letter-spacing:.18em;opacity:.7}
  #cam{bottom:14px;right:14px;font-size:10px;color:#fce4a8;text-align:right;max-width:300px}
  #ticker{position:fixed;bottom:42px;left:0;right:0;height:22px;overflow:hidden;background:linear-gradient(90deg,rgba(20,16,8,.0) 0%,rgba(20,16,8,.55) 8%,rgba(20,16,8,.55) 92%,rgba(20,16,8,.0) 100%);font-size:10px;letter-spacing:.18em;color:#ffd58a;text-shadow:0 1px 2px #000}
  #tickerInner{position:absolute;white-space:nowrap;padding:5px 0;animation:tk 90s linear infinite}
  @keyframes tk{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
  #chyron{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;font-size:13px;color:#fff;letter-spacing:.22em;font-variant:small-caps;text-shadow:0 0 12px #000,0 0 4px #000;opacity:0;transition:opacity .8s;text-align:center;pointer-events:none}
  #chyron.on{opacity:1}
  #stamp{position:fixed;top:60%;left:30px;font-size:9px;letter-spacing:.22em;color:#ffd58a;opacity:.55;font-variant:small-caps}
  .vignette{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 200px rgba(0,0,0,.55);z-index:5}
</style>
</head>
<body>
<!-- ROUND25_WORLDS v1 -->
<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="hud" id="title">
  <h1>Brimsworth Village · 2024</h1>
  <div class="sub">R25 · Worlds 1/12 · Living City Day-Cycle</div>
  <div class="sub" style="margin-top:4px;opacity:.55">all citizens fictional</div>
</div>
<div class="hud" id="cal">
  <h2>Today in Brimsworth</h2>
  <div id="calBody"></div>
</div>
<div class="hud" id="clock"><div id="clockTime">06:00</div><div class="small" id="clockDay">DAWN · CYCLE 1</div></div>
<div class="hud" id="cam"><div id="camName">CAM 01 · ROAMING</div><div id="camFollow" style="opacity:.7"></div></div>
<div id="ticker"><div id="tickerInner">· brimsworth wakes ·</div></div>
<div id="chyron"></div>
<div id="stamp">R25 · BRIMSWORTH WORLDS · ALL FICTIONAL</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
"use strict";
var SENTINEL = "ROUND25"+"_WORLDS"+" v1";
var LS_CYCLE = "worlds_village_2024_v1";
var LS_LEDGER = "brimsworth_worlds_v1";
var CITY_ID = "village-2024";

/* ---------- canon cross-read ---------- */
function rd(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
var canon = {
  multiverse: rd("brimsworth_multiverse_v1"),
  century: rd("brimsworth_century_v1"),
  lifetime: rd("brimsworth_lifetime_v1"),
  cast: rd("recurring_cast_v1")
};
var ledger = rd(LS_LEDGER) || {};
ledger.city_id = CITY_ID;
ledger.cycles = (ledger.cycles||0)+1;

/* ---------- name pools ---------- */
var GIVEN = ["Lily","Tomas","Henry","Margaret","Mortimer","Cordelia","Beatrix","Eliza","Otto","Edmund","Phineas","Emmeline","Aria","Zen","Sallow","Wren","Pip","Hazel","Rowan","Ivy","Silas","Maeve","Theodore","Clementine","Atticus","Penelope","Jasper","Iris","Felix","Daisy","Barnaby","Ophelia","Cyril","Mabel","Reginald","Agatha","Wilfred","Beryl","Cosmo","Ada","Albie","Nell","Bramwell","Tessa","Hollis","Marigold","Quentin","Rosalind","Ezra","Linnea","Bram","Posy","Caspar","Genevieve","Oswin","Tilda","Crispin","Lottie","Magnus","Vesper","Alban","June","Gideon","Esme","Toby","Maud","Roland","Cressida","Bertram","Winnie","Hugo","Greta","Florian","Saskia","Roscoe","Calla","Lucien","Ottilie","Percy","Verity","Sebastian","Honor","Albus","Briony","Cassian","Petra","Dorian","Annis","Octavian","Sybil","Lazarus","Tamsin","Quill","Hattie","Jago","Effie","Ronan","Lark","Soren","Pearl","Edric","Dahlia"];
var SURNAME = ["Bramble","Field","Pemberton","Vellum","Wren","Whitford","Hollis","Rookwood","Greenhollow","Brookline","Ashby","Moorcroft","Linden","Foxglove","Hartwell","Quinton","Ravenswood","Thistlewood","Underhill","Pennypacker","Crowe","Mossgrove","Hawthorn","Hollow","Briarly","Yarrow","Stoddard","Inglewood","Nettleton","Periwinkle"];

function rng(seed){return function(){seed=(seed*9301+49297)%233280;return seed/233280;};}
var SEED = Math.floor(Date.now()/600000);
var R = rng(SEED+1);

/* ---------- zones ---------- */
var ZONES = [
  {id:"village-green", name:"Village Green",     x:  0, z:  0, r: 28, hue:0x6fa563},
  {id:"bakery-row",    name:"Bakery Row",        x: 50, z: -8, r: 18, hue:0xd9a35c},
  {id:"cottage-res",   name:"Cottage Residential",x:-50, z: 10, r: 28, hue:0xd6c79b},
  {id:"school-church", name:"School & Church",   x: 14, z: 55, r: 22, hue:0xa8b2c5},
  {id:"farmer-market", name:"Farmer's Market",   x:-25, z:-50, r: 20, hue:0xcc8a55},
  {id:"riverside",     name:"Riverside Leisure", x: 60, z: 45, r: 22, hue:0x6dadc8}
];
function zone(id){for(var i=0;i<ZONES.length;i++)if(ZONES[i].id===id)return ZONES[i];return ZONES[0];}

/* ---------- citizens ---------- */
var CITIZENS = [];
var WED_CAST = [
  {n:"Lily Bramble",  age:30, role:"bride",   home:"cottage-res", work:"village-green", lunch:"bakery-row", leis:"riverside", sleep:"cottage-res"},
  {n:"Tomas Field",   age:32, role:"groom",   home:"cottage-res", work:"village-green", lunch:"bakery-row", leis:"riverside", sleep:"cottage-res"},
  {n:"Henry Bramble Sr.", age:62, role:"father", home:"cottage-res", work:"farmer-market", lunch:"bakery-row", leis:"village-green", sleep:"cottage-res"},
  {n:"Margaret Bramble",  age:60, role:"mother", home:"cottage-res", work:"bakery-row", lunch:"bakery-row", leis:"village-green", sleep:"cottage-res"},
  {n:"Otto Field",        age:28, role:"brother",home:"cottage-res", work:"farmer-market", lunch:"village-green", leis:"riverside", sleep:"cottage-res"},
  {n:"Bytes the Cat",     age: 7, role:"cat",   home:"village-green", work:"village-green", lunch:"bakery-row", leis:"riverside", sleep:"cottage-res"},
  {n:"Captain Crunch",    age:11, role:"dog",   home:"cottage-res", work:"village-green", lunch:"farmer-market", leis:"riverside", sleep:"cottage-res"},
  {n:"Mrs. Pemberton",    age:58, role:"baker", home:"bakery-row",  work:"bakery-row", lunch:"bakery-row", leis:"village-green", sleep:"cottage-res"},
  {n:"Eliza Vellum",      age:34, role:"librarian", home:"cottage-res", work:"school-church", lunch:"village-green", leis:"riverside", sleep:"cottage-res"},
  {n:"Margaret Wren",     age:71, role:"elder", home:"cottage-res", work:"village-green", lunch:"bakery-row", leis:"riverside", sleep:"cottage-res"},
  {n:"Mr. Whitford",      age:55, role:"vicar", home:"school-church", work:"school-church", lunch:"village-green", leis:"riverside", sleep:"school-church"}
];

function pick(arr){return arr[Math.floor(R()*arr.length)];}
function pickZone(){return ZONES[Math.floor(R()*ZONES.length)].id;}

for(var ci=0;ci<WED_CAST.length;ci++){
  var w=WED_CAST[ci];
  CITIZENS.push({
    id:ci, name:w.n, age:w.age, role:w.role, wed:true,
    home:w.home, work:w.work, lunch:w.lunch, leis:w.leis, sleep:w.sleep,
    color: 0xeed9a3,
    posX:0,posZ:0, mesh:null, baseY:0, phase:R()*Math.PI*2,
    speed:0.3+R()*0.4
  });
}

var TARGET = 520;
var seen={};
while(CITIZENS.length<TARGET){
  var nm = pick(GIVEN)+" "+pick(SURNAME);
  if(seen[nm]) continue; seen[nm]=1;
  var hm = pickZone();
  var wk = pickZone();
  var ln = pickZone();
  var ls = pickZone();
  var role = pick(["farmer","baker","weaver","fisher","teacher","smith","tailor","brewer","child","clerk","scholar","cobbler","grocer","piper","gardener","carpenter","sexton","ostler","drover","apothecary","poet","scribe","carter","mason","beekeeper","cooper"]);
  CITIZENS.push({
    id:CITIZENS.length, name:nm, age:8+Math.floor(R()*70), role:role, wed:false,
    home:hm, work:wk, lunch:ln, leis:ls, sleep:hm,
    color: [0xeed9a3,0xd9b07f,0xc59a6c,0xb98a55,0xefcfa3,0xddc89a,0xa8835c,0xc7a47a][Math.floor(R()*8)],
    posX:0, posZ:0, mesh:null, baseY:0, phase:R()*Math.PI*2,
    speed:0.25+R()*0.5
  });
}

ledger.citizen_count = CITIZENS.length;

/* ---------- three.js ---------- */
var canvas = document.getElementById("c");
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.5));
renderer.setSize(window.innerWidth,window.innerHeight,false);
renderer.shadowMap.enabled=false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2c9b8);
scene.fog = new THREE.FogExp2(0xc9d6e8,0.0048);

var camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.5, 800);
camera.position.set(0,12,80);

window.addEventListener("resize", function(){
  renderer.setSize(window.innerWidth,window.innerHeight,false);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

/* ---------- lights ---------- */
var hemi = new THREE.HemisphereLight(0xfff1d4,0x4a5040,0.65);
scene.add(hemi);
var sun = new THREE.DirectionalLight(0xffe5b3,1.05);
sun.position.set(20,40,15);
scene.add(sun);
var sunDisc = (function(){
  var g=new THREE.SphereGeometry(3.4,18,12);
  var m=new THREE.MeshBasicMaterial({color:0xffe9a3,transparent:true,opacity:.95});
  var s=new THREE.Mesh(g,m); scene.add(s); return s;
})();
var moonDisc = (function(){
  var g=new THREE.SphereGeometry(2.4,18,12);
  var m=new THREE.MeshBasicMaterial({color:0xe8eef9,transparent:true,opacity:0});
  var s=new THREE.Mesh(g,m); scene.add(s); return s;
})();

/* ---------- ground ---------- */
(function(){
  var g=new THREE.PlaneGeometry(420,420,1,1);
  var m=new THREE.MeshLambertMaterial({color:0x7da76a});
  var p=new THREE.Mesh(g,m); p.rotation.x=-Math.PI/2; p.position.y=-0.02;
  scene.add(p);
})();

/* zone tints (low-poly disks) */
ZONES.forEach(function(z){
  var g=new THREE.CircleGeometry(z.r,30);
  var m=new THREE.MeshLambertMaterial({color:z.hue,transparent:true,opacity:.65});
  var d=new THREE.Mesh(g,m); d.rotation.x=-Math.PI/2; d.position.set(z.x,0.01,z.z);
  scene.add(d);
});

/* roads (cobble streets, simple stripes) */
(function(){
  var roadMat=new THREE.MeshLambertMaterial({color:0x8a7a66});
  var rs=[
    [-100,0,100,0],
    [0,-100,0,100],
    [-60,30,80,30],
    [-60,-30,80,-30]
  ];
  rs.forEach(function(r){
    var dx=r[2]-r[0], dz=r[3]-r[1];
    var len=Math.hypot(dx,dz);
    var g=new THREE.PlaneGeometry(len,2.6);
    var m=new THREE.Mesh(g,roadMat);
    m.rotation.x=-Math.PI/2;
    m.position.set((r[0]+r[2])/2,0.02,(r[1]+r[3])/2);
    m.rotation.z=-Math.atan2(dz,dx);
    scene.add(m);
  });
})();

/* ---------- props ---------- */
function box(w,h,d,c){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:c}));}

function makeCottage(x,z,seed){
  var g = new THREE.Group();
  var w=2+0.6*((seed*7)%3), h=2.0+0.4*((seed*5)%3), d=2+0.6*((seed*11)%3);
  var creams=[0xf3e6c4,0xe9d6ad,0xefe1bd,0xd9b58a];
  var body=box(w,h,d,creams[seed%creams.length]);
  body.position.y=h/2; g.add(body);
  var roof=new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*0.85,1.4,4),new THREE.MeshLambertMaterial({color:0x6a4a2e}));
  roof.rotation.y=Math.PI/4; roof.position.y=h+0.7; g.add(roof);
  var win=box(0.55,0.55,0.05,0xfff1b8); win.position.set(0,h*0.55,d/2+0.03); g.add(win);
  win.userData.window=true; win.material.emissive=new THREE.Color(0xffd485); win.material.emissiveIntensity=0;
  g.position.set(x,0,z);
  g.userData.windows=[win.material];
  scene.add(g);
  return g;
}
var allWindows=[];
for(var i=0;i<54;i++){
  var z = ZONES[Math.floor(R()*ZONES.length)];
  var ang=R()*Math.PI*2, rad=R()*z.r*0.85;
  var x=z.x+Math.cos(ang)*rad, zz=z.z+Math.sin(ang)*rad;
  var cot = makeCottage(x,zz,i);
  cot.userData.windows.forEach(function(m){allWindows.push(m);});
}

/* bakery row larger storefronts */
function makeBakery(x,z){
  var g=new THREE.Group();
  var body=box(4,2.4,3,0xe6b06c); body.position.y=1.2; g.add(body);
  var roof=new THREE.Mesh(new THREE.BoxGeometry(4.4,0.4,3.4),new THREE.MeshLambertMaterial({color:0x7c2c25}));
  roof.position.y=2.6; g.add(roof);
  var awn=new THREE.Mesh(new THREE.BoxGeometry(4.2,0.16,0.9),new THREE.MeshLambertMaterial({color:0x9c2922}));
  awn.position.set(0,2.05,1.7); g.add(awn);
  var win=box(2.5,0.8,0.06,0xfff1b8); win.position.set(0,1.4,1.55); g.add(win);
  win.material.emissive=new THREE.Color(0xffc869); win.material.emissiveIntensity=0;
  allWindows.push(win.material);
  g.position.set(x,0,z); scene.add(g);
}
for(var bi=0;bi<6;bi++) makeBakery(38+bi*5, -8+(bi%2?2:-2));

/* school house with bell-tower */
(function(){
  var g=new THREE.Group();
  var body=box(7,3.2,5,0xefe1bd); body.position.y=1.6; g.add(body);
  var roof=new THREE.Mesh(new THREE.BoxGeometry(7.4,0.5,5.4),new THREE.MeshLambertMaterial({color:0x4d3324}));
  roof.position.y=3.45; g.add(roof);
  var tower=box(1.4,3,1.4,0xd9c89a); tower.position.set(0,4.2,0); g.add(tower);
  var bell=new THREE.Mesh(new THREE.ConeGeometry(0.7,1.2,5),new THREE.MeshLambertMaterial({color:0x4f2e1e}));
  bell.position.set(0,5.5,0); g.add(bell);
  var win1=box(4.5,0.7,0.05,0xfff1b8); win1.position.set(0,1.7,2.55); g.add(win1);
  win1.material.emissive=new THREE.Color(0xffb877); win1.material.emissiveIntensity=0; allWindows.push(win1.material);
  g.position.set(7,0,55); scene.add(g);
})();

/* church spire */
(function(){
  var g=new THREE.Group();
  var body=box(5,3.5,7,0xb8b6ad); body.position.y=1.75; g.add(body);
  var roof=new THREE.Mesh(new THREE.BoxGeometry(5.3,0.4,7.3),new THREE.MeshLambertMaterial({color:0x39261b}));
  roof.position.y=3.7; g.add(roof);
  var spire=new THREE.Mesh(new THREE.ConeGeometry(1.1,5,5),new THREE.MeshLambertMaterial({color:0x39261b}));
  spire.position.y=6.4; g.add(spire);
  var win=box(0.5,1.2,0.05,0xfff1b8); win.position.set(0,2.0,3.55); g.add(win);
  win.material.emissive=new THREE.Color(0xffd485); win.material.emissiveIntensity=0; allWindows.push(win.material);
  g.position.set(20,0,58); scene.add(g);
})();

/* farmer market stalls */
for(var si=0;si<10;si++){
  var sx = -25+Math.cos(si*0.7)*12, sz = -50+Math.sin(si*0.7)*9;
  var stallTop=box(2.5,0.15,2.0,[0xc6543a,0xd9a35c,0x6f8e54,0xb58b54][si%4]);
  stallTop.position.set(sx,1.6,sz); scene.add(stallTop);
  var leg=box(0.1,1.6,0.1,0x4a3625); leg.position.set(sx-1.1,0.8,sz-0.9); scene.add(leg);
  var leg2=box(0.1,1.6,0.1,0x4a3625); leg2.position.set(sx+1.1,0.8,sz+0.9); scene.add(leg2);
}

/* riverside path + river plane */
(function(){
  var g=new THREE.PlaneGeometry(80,8,1,1);
  var m=new THREE.MeshLambertMaterial({color:0x6dadc8,transparent:true,opacity:.8});
  var p=new THREE.Mesh(g,m); p.rotation.x=-Math.PI/2; p.position.set(60,0.03,55); p.rotation.z=0.18;
  scene.add(p);
})();

/* lampposts (with point-lights but simple emissive) */
var lampMats=[];
function makeLamp(x,z){
  var g=new THREE.Group();
  var post=box(0.12,2.4,0.12,0x2d231c); post.position.y=1.2; g.add(post);
  var globe=new THREE.Mesh(new THREE.SphereGeometry(0.28,10,8),new THREE.MeshLambertMaterial({color:0xffd485}));
  globe.position.y=2.45; g.add(globe);
  globe.material.emissive=new THREE.Color(0xffd485); globe.material.emissiveIntensity=0;
  lampMats.push(globe.material);
  g.position.set(x,0,z); scene.add(g);
}
for(var lp=0;lp<28;lp++){
  var ang=lp*Math.PI*2/28, rr=24+(lp%3)*8;
  makeLamp(Math.cos(ang)*rr+(lp%2?5:-5), Math.sin(ang)*rr+(lp%3?2:-2));
}

/* village green ceremony arch (flower-arch) */
var weddingArch = (function(){
  var g = new THREE.Group();
  var l = box(0.2,3.2,0.2,0xefe1bd); l.position.set(-1.6,1.6,0); g.add(l);
  var r = box(0.2,3.2,0.2,0xefe1bd); r.position.set( 1.6,1.6,0); g.add(r);
  var top = box(3.6,0.25,0.25,0xefe1bd); top.position.set(0,3.3,0); g.add(top);
  var f1 = new THREE.Mesh(new THREE.SphereGeometry(0.35,10,8),new THREE.MeshLambertMaterial({color:0xff8e9d}));
  f1.position.set(-1.3,3.45,0); g.add(f1);
  var f2 = new THREE.Mesh(new THREE.SphereGeometry(0.4,10,8),new THREE.MeshLambertMaterial({color:0xffd485}));
  f2.position.set(0.2,3.55,0); g.add(f2);
  var f3 = new THREE.Mesh(new THREE.SphereGeometry(0.32,10,8),new THREE.MeshLambertMaterial({color:0xffffff}));
  f3.position.set(1.3,3.45,0); g.add(f3);
  g.position.set(0,0,0);
  scene.add(g);
  return g;
})();

/* ---------- citizens (instanced) ---------- */
var bodyGeo = new THREE.CapsuleGeometry(0.22,0.55,4,8);
var headGeo = new THREE.SphereGeometry(0.18,8,6);
var bodyMat = new THREE.MeshLambertMaterial({color:0xeed9a3,vertexColors:false});
var headMat = new THREE.MeshLambertMaterial({color:0xf2cfa6});
var bodyInst = new THREE.InstancedMesh(bodyGeo,bodyMat,CITIZENS.length);
var headInst = new THREE.InstancedMesh(headGeo,headMat,CITIZENS.length);
bodyInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
headInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(bodyInst); scene.add(headInst);

/* per-instance color for body */
var colorArr = new Float32Array(CITIZENS.length*3);
for(var ic=0;ic<CITIZENS.length;ic++){
  var col=new THREE.Color(CITIZENS[ic].color);
  colorArr[ic*3]=col.r; colorArr[ic*3+1]=col.g; colorArr[ic*3+2]=col.b;
}
bodyInst.instanceColor = new THREE.InstancedBufferAttribute(colorArr,3);

/* assign initial pos within their home zone */
function placeInZone(c, zoneId){
  var z = zone(zoneId);
  var ang = c.phase + (c.id*0.137);
  var rr = (0.3 + ((c.id*7)%10)/14)*z.r;
  c.posX = z.x + Math.cos(ang)*rr;
  c.posZ = z.z + Math.sin(ang)*rr;
}
CITIZENS.forEach(function(c){placeInZone(c,c.home);});

/* ---------- routine schedule ---------- */
/*  in-world hours 06:00 to 18:00 (12 hours over 600s); after 18 we go evening/night/back to dawn-ish wrap */
function routineZoneAtHour(c,h){
  /* 6-7 commute_to_work, 7-12 work, 12-13 lunch, 13-14 leisure or work, 14-15 wedding (only some), 15-17 work, 17-19 leisure, 19-22 leisure (pub), 22-6 sleep */
  if(h<6.5) return c.home;
  if(h<7.5) return c.work;
  if(h<12) return c.work;
  if(h<13) return c.lunch;
  if(h<14) return c.leis;
  if(h<15) return (c.wed||((c.id*13)%4===0))?"village-green":c.work;
  if(h<17) return c.work;
  if(h<19) return c.leis;
  if(h<22) return ((c.id*5)%3===0)?"riverside":c.leis;
  return c.sleep;
}

/* ---------- sky/sun gradient stops ---------- */
function lerpC(a,b,t){return new THREE.Color(a.r+(b.r-a.r)*t,a.g+(b.g-a.g)*t,a.b+(b.b-a.b)*t);}
var sky_dawn = new THREE.Color(0xf6c5a8);
var sky_morn = new THREE.Color(0xc8dff0);
var sky_noon = new THREE.Color(0xa6cdee);
var sky_after= new THREE.Color(0xc6cee0);
var sky_sunset= new THREE.Color(0xf09d63);
var sky_twi  = new THREE.Color(0x6a5b8c);
var sky_night= new THREE.Color(0x121a2e);

function skyAt(h){
  if(h<6) return lerpC(sky_night,sky_dawn,Math.max(0,(h-4)/2));
  if(h<8) return lerpC(sky_dawn,sky_morn,(h-6)/2);
  if(h<11) return lerpC(sky_morn,sky_noon,(h-8)/3);
  if(h<14) return sky_noon;
  if(h<17) return lerpC(sky_noon,sky_after,(h-14)/3);
  if(h<19) return lerpC(sky_after,sky_sunset,(h-17)/2);
  if(h<20.5) return lerpC(sky_sunset,sky_twi,(h-19)/1.5);
  if(h<22) return lerpC(sky_twi,sky_night,(h-20.5)/1.5);
  return sky_night;
}

/* ---------- HUD: calendar ---------- */
var EVENTS = [
  {h:6.0,  t:"06:00", txt:"Bakery opens"},
  {h:8.0,  t:"08:00", txt:"School bells"},
  {h:10.0, t:"10:00", txt:"Farmer's Market opens"},
  {h:13.0, t:"13:00", txt:"Lunch hour"},
  {h:14.0, t:"14:00", txt:"Wedding ceremony begins"},
  {h:15.0, t:"15:00", txt:"Multiverse cat visits the village"}, /* portal at ~5min real */
  {h:17.0, t:"17:00", txt:"Children leave school"},
  {h:19.0, t:"19:00", txt:"Pub opens"},
  {h:22.0, t:"22:00", txt:"Church bells (vespers)"}
];

var calBody = document.getElementById("calBody");
function renderCalendar(curH){
  var html="";
  for(var i=0;i<EVENTS.length;i++){
    var e=EVENTS[i], cls="ev";
    if(curH>=e.h && curH<e.h+1) cls+=" now";
    else if(curH>=e.h+1) cls+=" past";
    html += '<div class="'+cls+'"><span>'+e.t+'</span><span>'+e.txt+'</span></div>';
  }
  calBody.innerHTML = html;
}

/* ---------- ledger and BroadcastChannel ---------- */
var bch = null;
try{ bch = new BroadcastChannel("brimsworth_worlds"); }catch(e){}
var twinTicker = [];
if(bch){
  bch.onmessage = function(ev){
    var d=ev.data; if(!d || d.city===CITY_ID) return;
    if(d.type==="city-event"){
      twinTicker.push("[" + (d.city||"?") + "] " + (d.event||""));
      if(twinTicker.length>10) twinTicker.shift();
      updateTicker();
    }
  };
}
function emitEvent(eventTxt){
  if(bch){ try{ bch.postMessage({type:"city-event", city:CITY_ID, event:eventTxt, t:Date.now()}); }catch(e){} }
  ledger.events_logged = (ledger.events_logged||0)+1;
}

function updateTicker(){
  var bits = [
    "BRIMSWORTH 2024",
    "cycle "+ledger.cycles,
    "citizens "+CITIZENS.length,
    "pop. "+CITIZENS.length+" souls",
    canon.lifetime?("lifetime: "+(canon.lifetime.protag||"Lily Bramble")):"",
    canon.century?("century rng: "+(canon.century.year||"---")):"",
    canon.multiverse?("multiverse last: "+(canon.multiverse.last_world||"---")):"",
    canon.cast?("cast: "+(canon.cast.count||"--")+" recurring"):""
  ].concat(twinTicker).filter(Boolean);
  document.getElementById("tickerInner").textContent = "  ·  " + bits.join("  ·  ") + "  ·  ";
}
updateTicker();

/* ---------- chyron ---------- */
var chyronEl=document.getElementById("chyron");
var chyronTimer=null;
function chyron(txt, dur){
  chyronEl.textContent = txt;
  chyronEl.classList.add("on");
  if(chyronTimer) clearTimeout(chyronTimer);
  chyronTimer=setTimeout(function(){chyronEl.classList.remove("on");}, dur||3500);
}

/* ---------- camera director ---------- */
var camTargets = [];
/* roaming overhead */
camTargets.push({name:"CAM 01 · ROAMING", type:"orbit"});
camTargets.push({name:"CAM 02 · GREEN ANGLE", type:"static", p:[28,12,40], l:[0,1.5,0]});
camTargets.push({name:"CAM 03 · BAKERY DOLLY", type:"static", p:[55,6,18], l:[42,1.6,-8]});
camTargets.push({name:"CAM 04 · COTTAGE LANE", type:"static", p:[-65,9,40], l:[-50,1,10]});
camTargets.push({name:"CAM 05 · SCHOOL BELL", type:"static", p:[2,16,75], l:[14,3,55]});
camTargets.push({name:"CAM 06 · MARKET STALLS", type:"static", p:[-50,7,-65], l:[-25,1,-50]});
camTargets.push({name:"CAM 07 · RIVERSIDE", type:"static", p:[80,9,30], l:[60,1.2,55]});
camTargets.push({name:"CAM 08 · WEDDING ARCH", type:"static", p:[6,3,12], l:[0,2.2,0]});
/* citizen-follow cams (30+) */
var followIds=[];
function addFollowCams(n){
  /* prefer wedding cast first then random */
  for(var i=0;i<WED_CAST.length && followIds.length<n;i++) followIds.push(i);
  while(followIds.length<n){
    var ix=Math.floor(R()*CITIZENS.length);
    if(followIds.indexOf(ix)<0) followIds.push(ix);
  }
}
addFollowCams(34);
followIds.forEach(function(idx,k){
  camTargets.push({name:"CAM "+(("0"+(9+k)).slice(-2))+" · FOLLOW", type:"follow", id:idx});
});

var curCam = 0;
var camSwitchAt = 0;
function nextCam(now){
  curCam = (curCam+1) % camTargets.length;
  camSwitchAt = now + (5+R()*5);
  var c = camTargets[curCam];
  document.getElementById("camName").textContent = c.name;
  document.getElementById("camFollow").textContent = c.type==="follow" ? CITIZENS[c.id].name+" · "+CITIZENS[c.id].role : (c.type==="orbit"?"DRIFT":"");
}

/* ---------- portal/wedding state ---------- */
var weddingActive=false, weddingFiredAt=-1;
var portalActive=false, portalFiredAt=-1;
var portalGroup = null;
var weddingGuests = [];

function spawnPortal(){
  portalActive=true;
  portalGroup = new THREE.Group();
  for(var i=0;i<7;i++){
    var g=new THREE.RingGeometry(2.0+i*0.18,2.18+i*0.18,32);
    var m=new THREE.MeshBasicMaterial({color:[0x9d6cff,0xb589ff,0x6cd6ff,0xff89c8,0xffe089,0x9be37f,0xff8d6b][i],side:THREE.DoubleSide,transparent:true,opacity:.7});
    var r=new THREE.Mesh(g,m); r.rotation.x=Math.PI/2; r.position.y=2+i*0.05;
    portalGroup.add(r);
  }
  portalGroup.position.set(-8,0,-10);
  scene.add(portalGroup);
  chyron("the multiverse cat visits the village.", 4500);
  emitEvent("Multiverse portal · Bytes arrives");
}

/* ---------- main loop ---------- */
var startReal = performance.now()/1000;
var sunriseT = startReal;
var lastSunsetT = -1;
var dummy = new THREE.Object3D();

ledger.sunrise_t = ledger.sunrise_t || Math.floor(Date.now()/1000);

function save(){
  try{
    localStorage.setItem(LS_CYCLE, JSON.stringify({
      sentinel: SENTINEL,
      cycle: ledger.cycles,
      seed: SEED,
      citizen_count: CITIZENS.length,
      t: Date.now()
    }));
    localStorage.setItem(LS_LEDGER, JSON.stringify(ledger));
  }catch(e){}
}
save();

var firedHours = {};
function maybeFireEvents(h){
  for(var i=0;i<EVENTS.length;i++){
    var e=EVENTS[i];
    if(!firedHours[e.t] && h>=e.h && h<e.h+0.2){
      firedHours[e.t]=1;
      chyron(e.t+" · "+e.txt, 3500);
      emitEvent(e.t+" · "+e.txt);
      if(e.t==="14:00"){weddingActive=true; weddingFiredAt=performance.now()/1000;}
    }
  }
}

/* portal at ~5min real (=t=300s); requirement says "at 5min" */
function maybePortal(realT){
  if(!portalActive && realT>=300){ spawnPortal(); portalFiredAt=realT; }
}

function fmtClock(h){
  var hh=Math.floor(h)%24, mm=Math.floor((h-Math.floor(h))*60);
  return ("0"+hh).slice(-2)+":"+("0"+mm).slice(-2);
}

function partOfDay(h){
  if(h<7) return "DAWN";
  if(h<11) return "MORNING";
  if(h<14) return "MIDDAY";
  if(h<17) return "AFTERNOON";
  if(h<19) return "GOLDEN HOUR";
  if(h<21) return "TWILIGHT";
  return "NIGHT";
}

var tmpV = new THREE.Vector3(), camTarget=new THREE.Vector3(), camPos=new THREE.Vector3();
function applyCamera(now){
  if(now>camSwitchAt) nextCam(now);
  var c=camTargets[curCam];
  if(c.type==="orbit"){
    var a=now*0.06;
    camPos.set(Math.cos(a)*70, 32+8*Math.sin(a*0.7), Math.sin(a)*70);
    camTarget.set(Math.sin(a*0.3)*8,1.5,Math.cos(a*0.3)*8);
  } else if(c.type==="static"){
    camPos.set(c.p[0],c.p[1],c.p[2]);
    camTarget.set(c.l[0],c.l[1],c.l[2]);
  } else if(c.type==="follow"){
    var ct=CITIZENS[c.id];
    var off = Math.sin(now*0.4+c.id)*4;
    camPos.set(ct.posX+off+5, 3.4, ct.posZ+5);
    camTarget.set(ct.posX,1.0,ct.posZ);
  }
  camera.position.lerp(camPos,0.08);
  tmpV.copy(camTarget); camera.lookAt(tmpV);
}

function loop(){
  var nowReal = performance.now()/1000 - startReal;
  /* every 600s reseed */
  if(nowReal>=600){
    startReal = performance.now()/1000;
    nowReal = 0;
    SEED = Math.floor(Date.now()/600000);
    R = rng(SEED+1);
    ledger.cycles = (ledger.cycles||0)+1;
    ledger.sunrise_t = Math.floor(Date.now()/1000);
    firedHours = {};
    weddingActive=false; portalActive=false;
    if(portalGroup){scene.remove(portalGroup);portalGroup=null;}
    save();
    chyron("a new day in brimsworth begins.", 4000);
    emitEvent("New cycle "+ledger.cycles);
    updateTicker();
  }

  /* compress 600s into 12 hours, starting at hour 6 */
  var hh = 6 + (nowReal/600)*12;       /* 6 -> 18 */
  /* but we want the cycle to span 24h-ish for dusk; map past 18 with extension via real time wrap */
  /* For cleaner sunset, allow last 2 in-world hours mapped from same range. We'll use hh as is and fake nightfall after 18 by extra wrap when we're near end. */
  var displayH = hh; /* primary hour for routines */

  /* sky color */
  var c = skyAt(displayH);
  scene.background.setRGB(c.r,c.g,c.b);
  scene.fog.color.setRGB(c.r*0.85+0.05,c.g*0.85+0.06,c.b*0.85+0.08);

  /* sun arc: noon at h=12; height by sin */
  var sunAng = ((displayH-6)/12)*Math.PI; /* 0..PI */
  var sunY = Math.sin(sunAng)*55+3;
  var sunX = Math.cos(sunAng)*70;
  sunDisc.position.set(-sunX,sunY,-30);
  sun.position.set(-sunX*0.6, Math.max(8,sunY*0.7), -30);
  var dayBright = Math.max(0.05, Math.sin(sunAng));
  sun.intensity = 0.25 + dayBright*0.95;
  hemi.intensity = 0.35 + dayBright*0.55;
  sun.color.setHSL(0.10 + (1-dayBright)*0.04, 0.55, 0.55+dayBright*0.15);
  sunDisc.material.opacity = 0.5+0.45*dayBright;
  /* moon counterphase */
  moonDisc.position.set(sunX,Math.max(0,55-sunY*0.5)*0.6,30);
  moonDisc.material.opacity = Math.max(0,1-dayBright*1.4)*0.85;

  /* lamp glow only at low light */
  var lampOn = Math.max(0,1.0 - dayBright*1.6);
  for(var li=0;li<lampMats.length;li++) lampMats[li].emissiveIntensity = lampOn*1.4;
  for(var wi=0;wi<allWindows.length;wi++) allWindows[wi].emissiveIntensity = lampOn*1.0;

  /* wedding arch flowers gentle bob */
  weddingArch.position.y = 0 + Math.sin(nowReal*1.4)*0.04;

  /* citizens move toward routine zone */
  for(var i=0;i<CITIZENS.length;i++){
    var ct=CITIZENS[i];
    var zid=routineZoneAtHour(ct,displayH);
    var z=zone(zid);
    /* desired anchor inside zone */
    var ang=ct.phase + nowReal*0.05*ct.speed + i*0.137;
    var rr = (0.2 + ((i*7)%10)/16)*z.r;
    var dx = z.x + Math.cos(ang)*rr;
    var dz = z.z + Math.sin(ang)*rr;
    /* if wedding active and citizen is meant to attend: cluster around arch */
    if(weddingActive && (ct.wed||((i*13)%4===0)) && displayH>=14 && displayH<15){
      var wa = ((i*0.27)%(Math.PI*2));
      var wr = 1.6 + ((i*3)%8)*0.4;
      dx = Math.cos(wa)*wr;
      dz = Math.sin(wa)*wr+1.2;
    }
    /* portal Bytes drift from portal toward green */
    /* lerp pos */
    var sp = 0.012*ct.speed + 0.005;
    ct.posX += (dx-ct.posX)*sp;
    ct.posZ += (dz-ct.posZ)*sp;
    var bob = Math.abs(Math.sin(nowReal*3.4*ct.speed + ct.phase))*0.12;
    var dxv = (dx-ct.posX), dzv=(dz-ct.posZ);
    var sleep = (displayH<6 || displayH>22);
    var heightY = sleep?0.25:(0.55+bob);
    /* body */
    dummy.position.set(ct.posX, heightY, ct.posZ);
    dummy.rotation.set(0, Math.atan2(dxv,dzv), 0);
    dummy.scale.set(1,1,1);
    dummy.updateMatrix();
    bodyInst.setMatrixAt(i,dummy.matrix);
    /* head */
    dummy.position.y = heightY + 0.55;
    dummy.scale.set(1,1,1);
    dummy.updateMatrix();
    headInst.setMatrixAt(i,dummy.matrix);
  }
  bodyInst.instanceMatrix.needsUpdate=true;
  headInst.instanceMatrix.needsUpdate=true;

  /* portal ring spin */
  if(portalGroup){
    portalGroup.rotation.y = nowReal*0.6;
    for(var pr=0;pr<portalGroup.children.length;pr++){
      portalGroup.children[pr].rotation.z = nowReal*(0.2+pr*0.05);
    }
  }

  /* events */
  maybeFireEvents(displayH);
  maybePortal(nowReal);

  /* HUD */
  document.getElementById("clockTime").textContent = fmtClock(displayH);
  document.getElementById("clockDay").textContent = partOfDay(displayH)+" · CYCLE "+ledger.cycles;
  renderCalendar(displayH);

  applyCamera(nowReal);

  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

/* periodic save and ledger sunset */
setInterval(function(){
  ledger.sunset_t = Math.floor(Date.now()/1000);
  save();
}, 8000);

requestAnimationFrame(loop);

/* ensure sentinel constant referenced */
window.__R25_W = SENTINEL;
})();
</script>
