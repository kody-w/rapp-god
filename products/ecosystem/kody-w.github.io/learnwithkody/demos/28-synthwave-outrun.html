<style>
  html, body {

    position: fixed; top: 14px; right: 16px; z-index: 5; text-align: right;

  }

    font-size: 11px; letter-spacing: 8px; opacity: 0.8; margin-top: 2px;

  #overlay {
    position: fixed; inset: 0; z-index: 50;

      0 0 60px #ff2bd6;

  }
  #overlay h2 {
    font-size: 18px; letter-spacing: 14px; margin: 6px 0 60px 0;

  #overlay .ctrls {
    margin-top: 40px; font-size: 12px; letter-spacing: 4px; color: #00f0ff;

  @keyframes pulse {

  @keyframes flicker {

  A/D STEER &nbsp;|&nbsp; W/S THROTTLE &nbsp;|&nbsp; M MUTE
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// =============================================================
//  RENDERER + SCENE
// =============================================================
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0014, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 800);
camera.position.set(0, 2.6, 0);
camera.lookAt(0, 2.6, -10);

// =============================================================
//  SKY GRADIENT (purple top -> hot pink near horizon)
// =============================================================
const skyGeo = new THREE.SphereGeometry(400, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    varying vec3 vWorldPos;
    uniform float uTime;
    void main() {
      float h = normalize(vWorldPos).y;
      // gradient: deep purple top -> magenta -> hot pink/orange near horizon
      vec3 top    = vec3(0.10, 0.02, 0.30);   // deep purple
      vec3 mid    = vec3(0.55, 0.04, 0.55);   // magenta
      vec3 horizon= vec3(1.00, 0.30, 0.55);   // hot pink
      vec3 below  = vec3(0.04, 0.0, 0.10);
      float t = clamp(h, -0.2, 1.0);
      vec3 col;
      if (t < 0.0) {
        col = mix(below, horizon, (t + 0.2) / 0.2);
      } else if (t < 0.35) {
        col = mix(horizon, mid, t / 0.35);
      } else {
        col = mix(mid, top, (t - 0.35) / 0.65);
      }
      // subtle stars at top
      float starSeed = fract(sin(dot(vWorldPos.xz, vec2(12.9898,78.233))) * 43758.5453);
      float star = step(0.998, starSeed) * smoothstep(0.3, 1.0, h);
      col += vec3(star);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// =============================================================
//  PIXEL-ART SUN with horizontal scanlines
// =============================================================
const sunGeo = new THREE.CircleGeometry(60, 64);
const sunMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vPos;
    uniform float uTime;
    void main() {
      // circular mask
      vec2 c = vUv - 0.5;
      float d = length(c) * 2.0;
      if (d > 1.0) discard;
      // gradient bottom (yellow) -> top (magenta)
      float v = vUv.y;
      vec3 yellow = vec3(1.0, 0.85, 0.20);
      vec3 orange = vec3(1.0, 0.45, 0.25);
      vec3 hot    = vec3(1.0, 0.20, 0.55);
      vec3 mag    = vec3(0.85, 0.05, 0.65);
      vec3 col;
      if (v < 0.4) col = mix(orange, yellow, v / 0.4);
      else if (v < 0.75) col = mix(orange, hot, (v - 0.4) / 0.35);
      else col = mix(hot, mag, (v - 0.75) / 0.25);

      // SCANLINES — horizontal dark stripes, growing toward bottom
      float yWorld = vPos.y;
      float linePos = (yWorld + 60.0) * 0.5;
      float stripeWidth = mix(0.4, 1.4, smoothstep(-60.0, -10.0, yWorld));
      float stripe = step(stripeWidth, mod(linePos, 1.6));
      // Only apply scanlines on lower 65% of sun for outrun look
      float scanMask = smoothstep(0.85, 0.55, v);
      col *= mix(1.0, stripe, scanMask * 0.95);

      // edge falloff
      float edge = smoothstep(1.0, 0.85, d);
      gl_FragColor = vec4(col, edge);
    }`
});
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(0, 30, -300);
scene.add(sun);

// sun glow halo
const haloGeo = new THREE.CircleGeometry(95, 64);
const haloMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {},
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    void main() {
      vec2 c = vUv - 0.5;
      float d = length(c) * 2.0;
      float a = pow(1.0 - clamp(d, 0.0, 1.0), 2.0) * 0.6;
      vec3 col = mix(vec3(1.0,0.3,0.6), vec3(0.6,0.0,0.7), d);
      gl_FragColor = vec4(col, a);
    }`
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.set(0, 30, -301);
scene.add(halo);

// =============================================================
//  GRID FLOOR (perspective magenta grid)
// =============================================================
const gridGeo = new THREE.PlaneGeometry(800, 1200, 1, 1);
const gridMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uOffset: { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorld;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vWorld;
    uniform float uTime;
    uniform float uOffset;
    void main() {
      // Grid in world coordinates that scrolls toward camera
      float gx = vWorld.x;
      float gz = vWorld.z + uOffset;
      float gridSize = 6.0;
      vec2 g = vec2(gx, gz);
      vec2 grid = abs(fract(g / gridSize - 0.5) - 0.5) / fwidth(g / gridSize);
      float line = min(grid.x, grid.y);
      float intensity = 1.0 - min(line, 1.0);
      // distance fade
      float distFromCam = length(vWorld.xz - vec2(0.0, 0.0));
      float distFade = smoothstep(400.0, 60.0, distFromCam);
      // road area is darker (z near vWorld.x near 0)
      float road = smoothstep(8.0, 6.0, abs(gx));
      vec3 baseCol = mix(vec3(0.06, 0.0, 0.12), vec3(0.02, 0.0, 0.04), road);
      vec3 lineCol = mix(vec3(1.0, 0.10, 0.85), vec3(0.0, 0.95, 1.0), road);
      vec3 col = baseCol + lineCol * intensity * distFade;
      // far horizon glow blend
      float hFade = smoothstep(380.0, 200.0, distFromCam);
      col = mix(col * 0.6 + vec3(0.6, 0.05, 0.4) * 0.15, col, hFade);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const grid = new THREE.Mesh(gridGeo, gridMat);
grid.rotation.x = -Math.PI / 2;
grid.position.set(0, 0, -300);
scene.add(grid);

// =============================================================
//  ROAD (darker strip on top of grid)
// =============================================================
const roadGeo = new THREE.PlaneGeometry(11, 1200);
const roadMat = new THREE.ShaderMaterial({
  uniforms: { uOffset: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorld;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vWorld;
    uniform float uOffset;
    void main() {
      float u = vUv.x;
      float z = vWorld.z + uOffset;
      // road dark
      vec3 col = vec3(0.04, 0.01, 0.10);
      // edges glow cyan
      float edge = smoothstep(0.97, 1.0, u) + smoothstep(0.97, 1.0, 1.0 - u);
      col += vec3(0.0, 1.0, 1.0) * edge * 1.4;
      // center dashed line
      float center = smoothstep(0.005, 0.0, abs(u - 0.5));
      float dash = step(0.5, fract(z * 0.15));
      col += vec3(1.0, 0.2, 0.9) * center * dash * 1.5;
      // distance fog
      float distFade = smoothstep(400.0, 50.0, length(vWorld.xz));
      col *= mix(0.3, 1.0, distFade);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.set(0, 0.02, -300);
scene.add(road);

// =============================================================
//  WIREFRAME CANYON / MOUNTAINS (procedural, glowing magenta)
// =============================================================
function makeMountains(side) {
  const segX = 60, segZ = 80;
  const w = 200, l = 800;
  const geo = new THREE.PlaneGeometry(w, l, segX, segZ);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i); // before rotation = z
    // distance from road
    const distFromRoad = Math.abs(x);
    // Heightmap - layered noise
    const n1 = Math.sin(x * 0.07) * Math.cos(y * 0.05) * 8;
    const n2 = Math.sin(x * 0.21 + 3.1) * 4 + Math.cos(y * 0.13) * 5;
    const n3 = Math.sin((x + y) * 0.03) * 12;
    const ridge = Math.max(0, Math.sin(x * 0.04 + y * 0.02)) * 14;
    let h = n1 + n2 + n3 + ridge;
    // raise terrain away from road
    const ramp = Math.pow(Math.max(0, distFromRoad - 8) / 80, 1.4);
    h += ramp * 30;
    // ensure no terrain on the road
    if (distFromRoad < 7) h = -0.5;
    pos.setZ(i, h);
  }
  geo.computeVertexNormals();
  const wireGeo = new THREE.WireframeGeometry(geo);
  const lineMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: { uOffset: { value: 0 }, uColor: { value: new THREE.Color(0xff10b0) } },
    vertexShader: `
      varying vec3 vWorld;
      uniform float uOffset;
      void main() {
        vec3 p = position;
        // scrolling offset along z
        p.y += mod(uOffset, 24.0); // before rotation, plane y = world z
        vec4 wp = modelMatrix * vec4(p, 1.0);
        vWorld = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }`,
    fragmentShader: `
      varying vec3 vWorld;
      uniform vec3 uColor;
      void main() {
        float d = length(vWorld.xz);
        float fade = smoothstep(380.0, 60.0, d);
        float far = smoothstep(60.0, 380.0, d);
        // distant mountains shift toward cyan-magenta blend
        vec3 col = mix(uColor, vec3(0.4, 0.0, 0.8), far * 0.5);
        gl_FragColor = vec4(col * (0.5 + fade * 1.5), fade);
      }`,
    blending: THREE.AdditiveBlending
  });
  const lines = new THREE.LineSegments(wireGeo, lineMat);
  lines.rotation.x = -Math.PI / 2;
  lines.position.set(side * 110, 0, -300);
  return lines;
}
const mountainsL = makeMountains(-1);
const mountainsR = makeMountains(1);
scene.add(mountainsL);
scene.add(mountainsR);

// distant mountain silhouette layer
function makeDistantMountains() {
  const verts = [];
  const colors = [];
  let x = -400;
  let prevY = 20;
  while (x < 400) {
    const y1 = 20 + Math.abs(Math.sin(x * 0.013) * 22) + Math.abs(Math.sin(x * 0.05 + 1.3) * 8);
    const y2 = 20 + Math.abs(Math.sin((x + 5) * 0.013) * 22) + Math.abs(Math.sin((x + 5) * 0.05 + 1.3) * 8);
    verts.push(x, y1, -380, x + 5, y2, -380);
    colors.push(0.7, 0.05, 0.55, 0.7, 0.05, 0.55);
    x += 5;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const m = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.85 });
  return new THREE.LineSegments(g, m);
}
scene.add(makeDistantMountains());

// =============================================================
//  PALM TREES (silhouette billboards procedurally drawn)
// =============================================================
function makePalmTexture() {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,128,256);
  ctx.fillStyle = '#000000';
  // trunk
  ctx.beginPath();
  ctx.moveTo(60, 256);
  ctx.quadraticCurveTo(50, 180, 64, 110);
  ctx.quadraticCurveTo(78, 180, 68, 256);
  ctx.fill();
  // fronds
  function frond(angle, len) {
    ctx.save();
    ctx.translate(64, 100);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(len * 0.4, -8, len, -2);
    ctx.quadraticCurveTo(len * 0.5, 4, 0, 4);
    ctx.fill();
    // leaflets
    for (let i = 1; i < 6; i++) {
      const t = i / 6;
      const lx = len * t;
      const ly = Math.sin(t * Math.PI) * -8;
      ctx.beginPath();
      ctx.ellipse(lx, ly, 6, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    frond(a, 50);
  }
  // crown blob
  ctx.beginPath();
  ctx.arc(64, 100, 14, 0, Math.PI * 2);
  ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.NearestFilter;
  return tex;
}
const palmTex = makePalmTexture();
const palmMat = new THREE.MeshBasicMaterial({
  map: palmTex, transparent: true, alphaTest: 0.4, depthWrite: true, side: THREE.DoubleSide
});
const palms = [];
const NUM_PALMS = 16;
for (let i = 0; i < NUM_PALMS; i++) {
  const palm = new THREE.Mesh(new THREE.PlaneGeometry(8, 16), palmMat);
  palm.position.set(
    (Math.random() < 0.5 ? -1 : 1) * (9 + Math.random() * 4),
    8,
    -i * 60 - Math.random() * 50
  );
  scene.add(palm);
  palms.push(palm);
}

// =============================================================
//  PLAYER CAR (just a cockpit silhouette / hood at bottom)
// =============================================================
const hoodGeo = new THREE.PlaneGeometry(10, 3);
const hoodMat = new THREE.ShaderMaterial({
  transparent: true,
  depthTest: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      // hood shape: a wide rounded trapezoid silhouette
      vec2 p = vUv - vec2(0.5, 0.5);
      // sloping top edge
      float topEdge = 0.5 - 0.15 * (1.0 - abs(p.x) * 2.0);
      if (vUv.y > topEdge) discard;
      // glow stripe near top edge
      float stripe = smoothstep(0.02, 0.0, abs(vUv.y - topEdge + 0.04));
      vec3 base = vec3(0.08, 0.0, 0.18);
      vec3 col = base + vec3(1.0, 0.1, 0.8) * stripe * 1.5;
      // headlight glows
      float hL = smoothstep(0.05, 0.0, length(vUv - vec2(0.18, topEdge - 0.08)));
      float hR = smoothstep(0.05, 0.0, length(vUv - vec2(0.82, topEdge - 0.08)));
      col += vec3(0.2, 1.0, 1.0) * (hL + hR) * 1.5;
      gl_FragColor = vec4(col, 1.0);
    }`
});
const hood = new THREE.Mesh(hoodGeo, hoodMat);
hood.renderOrder = 999;
camera.add(hood);
hood.position.set(0, -1.6, -2.0);
scene.add(camera);

// =============================================================
//  OBSTACLE CARS
// =============================================================
function makeObstacle() {
  const grp = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(2.4, 1.0, 4.4);
  const bodyMat = new THREE.MeshBasicMaterial({ color: 0x14001f });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  grp.add(body);
  const wireGeo = new THREE.EdgesGeometry(bodyGeo);
  const wireColors = [0xff10b0, 0x00f0ff, 0xff5dff, 0xff8800];
  const wireMat = new THREE.LineBasicMaterial({
    color: wireColors[Math.floor(Math.random() * wireColors.length)],
    transparent: true,
    opacity: 1.0
  });
  const wire = new THREE.LineSegments(wireGeo, wireMat);
  wire.position.y = 0.6;
  grp.add(wire);
  // tail lights
  const tailGeo = new THREE.PlaneGeometry(2.0, 0.3);
  const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0040, transparent: true, opacity: 0.95 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(0, 0.75, 2.21);
  grp.add(tail);
  return grp;
}
const obstacles = [];
function spawnObstacle(zPos) {
  const o = makeObstacle();
  const lane = (Math.random() * 2 - 1) * 3.2;
  o.position.set(lane, 0, zPos);
  o.userData = { speed: 0 };
  scene.add(o);
  obstacles.push(o);
}
for (let i = 0; i < 8; i++) {
  spawnObstacle(-80 - i * 70 - Math.random() * 40);
}

// =============================================================
//  CRT POST-PROCESSING (chromatic aberration, scanlines, vignette, barrel)
// =============================================================
const sceneRT = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
  type: THREE.UnsignedByteType
});
const postScene = new THREE.Scene();
const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const postMat = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: sceneRT.texture },
    uTime: { value: 0 },
    uShake: { value: 0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uShake;
    uniform vec2 uResolution;

    vec2 barrel(vec2 uv) {
      vec2 c = uv - 0.5;
      float r2 = dot(c, c);
      float k = 0.18;
      c *= 1.0 + k * r2;
      return c + 0.5;
    }

    void main() {
      vec2 uv = barrel(vUv);
      // shake
      uv.x += sin(uTime * 50.0) * uShake * 0.012;
      uv.y += cos(uTime * 45.0) * uShake * 0.012;
      // out of bounds => black border
      if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }
      // chromatic aberration
      float ca = 0.004 + length(uv - 0.5) * 0.008;
      float r = texture2D(tDiffuse, uv + vec2(ca, 0.0)).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - vec2(ca, 0.0)).b;
      vec3 col = vec3(r, g, b);
      // scanlines
      float scan = 0.85 + 0.15 * sin(uv.y * uResolution.y * 1.6);
      col *= scan;
      // subtle horizontal slow-rolling brightness band
      col *= 0.95 + 0.05 * sin(uv.y * 4.0 + uTime * 0.5);
      // vignette
      float vig = smoothstep(0.95, 0.35, length(uv - 0.5));
      col *= mix(0.3, 1.0, vig);
      // slight noise
      float n = fract(sin(dot(uv * uResolution + uTime, vec2(12.9898, 78.233))) * 43758.5453);
      col += (n - 0.5) * 0.025;
      // boost blacks-to-magenta tint
      col = mix(col, col * vec3(1.05, 0.95, 1.1), 0.5);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const postQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMat);
postScene.add(postQuad);

// =============================================================
//  AUDIO — Synthwave soundtrack (Web Audio, generated)
// =============================================================
let audioCtx = null;
let masterGain = null;
let engineNode = null;
let muted = false;
const audio = {
  startTime: 0,
  bpm: 110,
  beatLen: 60 / 110,
  nextNote: 0,
  schedAhead: 0.12,
  step: 0
};

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  // Master compressor for glue
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -10;
  comp.knee.value = 12;
  comp.ratio.value = 4;
  comp.attack.value = 0.003;
  comp.release.value = 0.18;
  masterGain.connect(comp);
  comp.connect(audioCtx.destination);

  // Reverb (impulse-less, simple feedback delay for retro feel)
  const delay = audioCtx.createDelay(1.0);
  delay.delayTime.value = audio.beatLen * 0.375;
  const fb = audioCtx.createGain();
  fb.gain.value = 0.32;
  const dWet = audioCtx.createGain();
  dWet.gain.value = 0.25;
  delay.connect(fb).connect(delay);
  delay.connect(dWet).connect(masterGain);
  audio.delay = delay;
  audio.delayWet = dWet;

  // Engine hum oscillator
  engineNode = audioCtx.createOscillator();
  engineNode.type = 'sawtooth';
  engineNode.frequency.value = 60;
  const engGain = audioCtx.createGain();
  engGain.gain.value = 0.0;
  const engFilter = audioCtx.createBiquadFilter();
  engFilter.type = 'lowpass';
  engFilter.frequency.value = 400;
  engineNode.connect(engFilter).connect(engGain).connect(masterGain);
  engineNode.start();
  audio.engineGain = engGain;
  audio.engineFilter = engFilter;
  audio.engineOsc = engineNode;

  // Sub-bass drone
  const droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sine';
  droneOsc.frequency.value = 41.2;
  const droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.10;
  droneOsc.connect(droneGain).connect(masterGain);
  droneOsc.start();

  audio.startTime = audioCtx.currentTime + 0.1;
  audio.nextNote = audio.startTime;
}

// musical scale (A minor / dorian-ish for that synthwave vibe)
// Chord progression (4 bars, 16 steps each = 64 steps total)
// Am - F - C - G   (vi - IV - I - V in C major / classic)
const chords = [
  { root: 'A2', notes: ['A3','C4','E4','G4'] },
  { root: 'F2', notes: ['F3','A3','C4','E4'] },
  { root: 'C2', notes: ['C3','E3','G3','B3'] },
  { root: 'G2', notes: ['G2','B3','D4','F4'] }
];
const noteFreq = (n) => {
  const map = { C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11 };
  const m = n.match(/^([A-G]#?)(-?\d)$/);
  if (!m) return 220;
  const semi = map[m[1]] + (parseInt(m[2]) + 1) * 12;
  return 440 * Math.pow(2, (semi - 69) / 12);
};

// Drum: kick
function playKick(t) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(140, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.85, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t + 0.3);
}
// snare-ish
function playSnare(t) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 1500;
  const g = audioCtx.createGain();
  g.gain.value = 0.35;
  src.connect(filt).connect(g).connect(masterGain);
  src.start(t);
}
// hi-hat
function playHat(t, open=false) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * (open ? 0.18 : 0.05), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, open ? 1.0 : 3.0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 7000;
  const g = audioCtx.createGain();
  g.gain.value = open ? 0.18 : 0.13;
  src.connect(filt).connect(g).connect(masterGain);
  src.start(t);
}
// bass
function playBass(t, freq, dur) {
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  o1.type = 'sawtooth';
  o2.type = 'square';
  o1.frequency.value = freq;
  o2.frequency.value = freq * 0.5;
  const g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(220, t);
  f.frequency.exponentialRampToValueAtTime(900, t + 0.04);
  f.frequency.exponentialRampToValueAtTime(180, t + dur);
  f.Q.value = 4;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.32, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o1.connect(f); o2.connect(f);
  f.connect(g).connect(masterGain);
  o1.start(t); o2.start(t);
  o1.stop(t + dur + 0.02); o2.stop(t + dur + 0.02);
}
// arpeggiated synth lead
function playArp(t, freq, dur) {
  const o = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o2.type = 'sawtooth';
  o.frequency.value = freq;
  o2.frequency.value = freq * 1.005; // detune
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(800, t);
  f.frequency.exponentialRampToValueAtTime(2400, t + 0.05);
  f.frequency.exponentialRampToValueAtTime(600, t + dur);
  f.Q.value = 6;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(f); o2.connect(f);
  f.connect(g);
  g.connect(masterGain);
  g.connect(audio.delay);
  o.start(t); o2.start(t);
  o.stop(t + dur); o2.stop(t + dur);
}
// FM sax-like lead
function playSax(t, freq, dur) {
  const car = audioCtx.createOscillator();
  const mod = audioCtx.createOscillator();
  const modGain = audioCtx.createGain();
  car.type = 'sine';
  mod.type = 'sine';
  car.frequency.value = freq;
  mod.frequency.value = freq * 2.0;
  modGain.gain.setValueAtTime(freq * 0.8, t);
  modGain.gain.exponentialRampToValueAtTime(freq * 0.2, t + dur);
  mod.connect(modGain).connect(car.frequency);
  // vibrato
  const vib = audioCtx.createOscillator();
  const vibG = audioCtx.createGain();
  vib.frequency.value = 5.5;
  vibG.gain.value = freq * 0.012;
  vib.connect(vibG).connect(car.frequency);
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.value = 2800;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.18, t + 0.06);
  g.gain.setValueAtTime(0.15, t + dur - 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  car.connect(f).connect(g);
  g.connect(masterGain);
  g.connect(audio.delay);
  car.start(t); mod.start(t); vib.start(t);
  car.stop(t + dur); mod.stop(t + dur); vib.stop(t + dur);
}
function playCrash() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.7, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(1200, t);
  f.frequency.exponentialRampToValueAtTime(120, t + 0.6);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  src.connect(f).connect(g).connect(masterGain);
  src.start(t);
  // boom
  const o = audioCtx.createOscillator();
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.5);
  const og = audioCtx.createGain();
  og.gain.setValueAtTime(0.7, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o.connect(og).connect(masterGain);
  o.start(t); o.stop(t + 0.55);
}

function scheduleAudio() {
  if (!audioCtx) return;
  while (audio.nextNote < audioCtx.currentTime + audio.schedAhead) {
    const t = audio.nextNote;
    const step = audio.step;
    const stepInBar = step % 16;
    const bar = Math.floor(step / 16) % 4;
    const chord = chords[bar];

    // KICK on every quarter (4 on the floor)
    if (stepInBar % 4 === 0) playKick(t);
    // SNARE on 2 and 4
    if (stepInBar === 4 || stepInBar === 12) playSnare(t);
    // HATS — closed on 8ths, open on offbeat last beat sometimes
    if (stepInBar % 2 === 0) playHat(t, false);
    if (stepInBar === 14) playHat(t, true);

    // BASS - walking pattern, root on 1 and offbeats
    if (stepInBar === 0) playBass(t, noteFreq(chord.root), audio.beatLen * 0.45);
    if (stepInBar === 3) playBass(t, noteFreq(chord.root) * 1.5, audio.beatLen * 0.25);
    if (stepInBar === 6) playBass(t, noteFreq(chord.root), audio.beatLen * 0.45);
    if (stepInBar === 8) playBass(t, noteFreq(chord.root), audio.beatLen * 0.45);
    if (stepInBar === 10) playBass(t, noteFreq(chord.root) * (Math.pow(2, 3/12)), audio.beatLen * 0.25);
    if (stepInBar === 12) playBass(t, noteFreq(chord.root), audio.beatLen * 0.45);
    if (stepInBar === 14) playBass(t, noteFreq(chord.root) * 1.5, audio.beatLen * 0.45);

    // ARP — 16th notes cycling chord tones
    {
      const arpIdx = stepInBar % 4;
      const note = chord.notes[arpIdx];
      const f = noteFreq(note) * 2; // octave up
      playArp(t, f, audio.beatLen * 0.45);
    }

    // SAX LEAD — long melodic notes, only on beats 1 and certain bars
    if (bar === 2 && stepInBar === 0) playSax(t, noteFreq(chord.notes[2]) * 2, audio.beatLen * 3.5);
    if (bar === 3 && stepInBar === 0) playSax(t, noteFreq(chord.notes[1]) * 2, audio.beatLen * 1.8);
    if (bar === 3 && stepInBar === 8) playSax(t, noteFreq(chord.notes[3]) * 2, audio.beatLen * 1.5);
    if (bar === 0 && stepInBar === 8) playSax(t, noteFreq(chord.notes[0]) * 2, audio.beatLen * 1.8);

    audio.step++;
    audio.nextNote += audio.beatLen / 4; // 16th note
  }
}

// =============================================================
//  GAME STATE
// =============================================================
const game = {
  speed: 30,        // units / sec
  maxSpeed: 130,
  accel: 0,
  steer: 0,
  playerX: 0,
  distance: 0,
  score: 0,
  scrollOffset: 0,
  alive: true,
  shake: 0,
  invuln: 0,
  started: false
};
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'm') {
    muted = !muted;
    if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 0.35, audioCtx.currentTime, 0.01);
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// =============================================================
//  RESIZE
// =============================================================
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  sceneRT.setSize(w, h);
  postMat.uniforms.uResolution.value.set(w, h);
});

// =============================================================
//  GAME LOOP
// =============================================================
const distEl = document.getElementById('dist');
const spdEl = document.getElementById('spd');
const scoreEl = document.getElementById('score');
const crashEl = document.getElementById('crash');

const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (game.started) {
    // INPUT
    const accelInput = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
    const steerInput = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
    // accelerate naturally over time + W boosts, S brakes
    const naturalAccel = 8;
    if (accelInput >= 0) {
      game.speed += (naturalAccel + accelInput * 22) * dt;
    } else {
      game.speed -= 60 * dt;
    }
    game.speed = Math.max(15, Math.min(game.maxSpeed, game.speed));
    // gradually raise max speed for tension
    game.maxSpeed = Math.min(180, game.maxSpeed + dt * 0.6);

    // STEERING
    game.steer += (steerInput * 8 - game.steer) * Math.min(1, dt * 6);
    game.playerX += game.steer * dt * (game.speed * 0.04);
    // confine to road
    game.playerX = Math.max(-4.6, Math.min(4.6, game.playerX));
    // off-road slow penalty
    if (Math.abs(game.playerX) > 4.2) game.speed *= 1 - dt * 0.6;

    // FORWARD
    game.distance += game.speed * dt;
    game.scrollOffset += game.speed * dt;
    game.score += game.speed * dt * 0.5;

    // CAMERA — rocking with speed and steer
    camera.position.x = -game.playerX * 0.7 + Math.sin(t * 4) * 0.04 * (game.speed / 100);
    camera.position.y = 2.6 + Math.sin(t * 7) * 0.06 * (game.speed / 100);
    camera.rotation.z = -game.steer * 0.04;
    camera.rotation.y = -game.steer * 0.02;

    // OBSTACLES update
    for (const o of obstacles) {
      o.position.z += game.speed * dt;
      // collision check (player at z=0, x=playerX)
      if (game.invuln <= 0 && o.position.z > -3 && o.position.z < 3) {
        const dx = Math.abs(o.position.x - game.playerX);
        if (dx < 2.4) {
          // CRASH
          game.shake = 1.0;
          game.speed *= 0.4;
          game.invuln = 1.5;
          playCrash();
          crashEl.style.opacity = '1';
          setTimeout(() => crashEl.style.opacity = '0', 250);
        }
      }
      if (o.position.z > 12) {
        // recycle
        o.position.z = -300 - Math.random() * 80;
        o.position.x = (Math.random() * 2 - 1) * 3.2;
      }
    }
    if (game.invuln > 0) game.invuln -= dt;
    game.shake *= Math.pow(0.001, dt);

    // PALMS recycle
    for (const p of palms) {
      p.position.z += game.speed * dt;
      // billboard
      p.lookAt(camera.position.x, p.position.y, camera.position.z);
      if (p.position.z > 12) {
        p.position.z = -300 - Math.random() * 80;
        p.position.x = (Math.random() < 0.5 ? -1 : 1) * (9 + Math.random() * 4);
      }
    }

    // ENGINE audio
    if (audio.engineGain) {
      const speedNorm = game.speed / 130;
      audio.engineGain.gain.setTargetAtTime(0.10 + speedNorm * 0.08, audioCtx.currentTime, 0.05);
      audio.engineOsc.frequency.setTargetAtTime(50 + speedNorm * 110, audioCtx.currentTime, 0.05);
      audio.engineFilter.frequency.setTargetAtTime(300 + speedNorm * 1200, audioCtx.currentTime, 0.05);
    }

    // UI
    distEl.textContent = String(Math.floor(game.distance / 10)).padStart(4, '0') + ' KM';
    spdEl.textContent = String(Math.floor(game.speed * 1.3)).padStart(3, '0') + ' MPH';
    scoreEl.textContent = String(Math.floor(game.score)).padStart(6, '0');

    // Schedule audio
    scheduleAudio();
  }

  // SHADER UNIFORM updates
  gridMat.uniforms.uOffset.value = game.scrollOffset;
  roadMat.uniforms.uOffset.value = game.scrollOffset;
  mountainsL.material.uniforms.uOffset.value = game.scrollOffset;
  mountainsR.material.uniforms.uOffset.value = game.scrollOffset;
  skyMat.uniforms.uTime.value = t;
  sunMat.uniforms.uTime.value = t;
  hoodMat.uniforms.uTime.value = t;
  postMat.uniforms.uTime.value = t;
  postMat.uniforms.uShake.value = game.shake;

  // RENDER scene to RT, then post to screen
  renderer.setRenderTarget(sceneRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(postScene, postCam);
}

// kick the loop immediately so the scene shows under the overlay
tick();

// =============================================================
//  START on click
// =============================================================
const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  overlay.style.transition = 'opacity 0.4s';
  overlay.style.opacity = '0';
  setTimeout(() => overlay.remove(), 400);
  if (!audioCtx) initAudio();
  game.started = true;
});

</script>
</body>
