// =================== UTILS ===================
function genHandle(){
  var p = pick(HPRE), s = pick(HSUF);
  var n = Math.random()<0.4 ? '_'+irand(2,99) : '';
  return '@'+p+s+n;
}
function genName(){
  if (Math.random()<0.7) return pick(FIRST)+' '+pick(LAST);
  return pick(FIRST);
}
function avatarURL(name, hue){
  var c = document.createElement('canvas');
  c.width = 72; c.height = 72;
  var g = c.getContext('2d');
  var grd = g.createRadialGradient(28,24,4,36,36,40);
  grd.addColorStop(0,'hsl('+hue+',70%,68%)');
  grd.addColorStop(1,'hsl('+((hue+40)%360)+',60%,32%)');
  g.fillStyle = grd;
  g.beginPath(); g.arc(36,36,36,0,TAU); g.fill();
  g.fillStyle = 'rgba(255,255,255,0.9)';
  g.font = 'bold 36px -apple-system,system-ui,sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText((name[0]||'?').toUpperCase(), 36, 38);
  return c.toDataURL();
}
function genUser(idx){
  var hue = (idx*47 + irand(0,40)) % 360;
  var nm = genName();
  var stance = pick(STANCES);
  var verif = Math.random()<0.18 ? (Math.random()<0.2?'g':'b') : '';
  if (stance === 'corpPR') verif = Math.random()<0.6 ? 'g' : 'b';
  if (stance === 'journalist') verif = Math.random()<0.55 ? 'b' : '';
  var fol;
  var r = Math.random();
  if (r<0.55) fol = irand(120,9999);
  else if (r<0.85) fol = irand(10000,500000);
  else if (r<0.97) fol = irand(500000,5000000);
  else fol = irand(5000000,30000000);
  if (verif==='g') fol = Math.max(fol, irand(50000,2000000));
  return {
    id: idx,
    handle: genHandle(),
    name: nm,
    stance: stance,
    verif: verif,
    fol: fol,
    avatar: avatarURL(nm, hue),
    hue: hue,
    sus: 0
  };
}
function pickUser(){return users[irand(0,users.length-1)]}
function pickCity(){return cities[irand(0,cities.length-1)]}
function timeAgo(){
  var s = irand(1,59);
  if (Math.random()<0.6) return s+'s';
  if (Math.random()<0.7) return irand(1,59)+'m';
  return irand(1,23)+'h';
}

// =================== TWEET GEN ===================
function fillTpl(t){
  return t.replace(/\[BRAND\]/g, pick(BRANDS))
          .replace(/\[BRAND2\]/g, pick(BRANDS))
          .replace(/\[CITY\]/g, pick(CITIES)[0])
          .replace(/\[TOPIC\]/g, pick(TOPICS))
          .replace(/\[USER\]/g, pickUser().handle);
}
function maybeAddHashtag(text){
  if (Math.random()<0.42){
    var t = pick(trending.length?trending:TAGS_BASE);
    text += ' '+(t.tag || t);
  }
  return text;
}
function genTweet(opts){
  opts = opts || {};
  var u = opts.user || pickUser();
  var city = opts.city || pickCity();
  var stance = u.stance;
  var pool = TPL[stance] || TPL.shitposter;
  var text = opts.text || maybeAddHashtag(fillTpl(pick(pool)));
  var kind = opts.kind || (Math.random()<0.7?'org':(Math.random()<0.55?'qt':(Math.random()<0.5?'rt':'reply')));
  var rt = irand(0, u.fol > 1e6 ? 5000 : (u.fol > 1e5 ? 1200 : (u.fol > 1e4 ? 200 : 30)));
  var lk = rt * irand(3,7) + irand(0,500);
  var re = (rt + lk) * (irand(3,15)/100) | 0;
  if (kind === 'reply') { rt = (rt/8)|0; lk = (lk/4)|0; }
  var quoted = null;
  if (kind === 'qt') {
    var qu = pickUser();
    var qtxt = fillTpl(pick(TPL[qu.stance]||TPL.shitposter));
    quoted = {user:qu, text:qtxt};
  }
  var rtBy = null;
  if (kind === 'rt') {
    rtBy = pickUser();
    var ou = pickUser();
    text = fillTpl(pick(TPL[ou.stance]||TPL.shitposter));
    u = ou;
  }
  return {
    id: ++tweetCounter,
    user: u,
    text: text,
    kind: kind,
    rt: rt, lk: lk, re: re,
    city: city,
    ago: timeAgo(),
    quoted: quoted,
    rtBy: rtBy,
    born: performance.now(),
    el: null,
    viral: false,
    cancel: false
  };
}

function pushTweet(tw){
  var inner = document.getElementById('tlInner');
  if (!inner) return;
  var div = renderTweet(tw);
  tw.el = div;
  inner.insertBefore(div, inner.firstChild);
  tweets.unshift(tw);
  while (tweets.length > 26) {
    var old = tweets.pop();
    if (old.el && old.el.parentNode) old.el.parentNode.removeChild(old.el);
  }
}
function updateTweetEl(tw){
  if (!tw.el) return;
  var bs = tw.el.querySelectorAll('.met b');
  if (bs.length>=3) {
    bs[0].textContent = fmt(tw.re);
    bs[1].textContent = fmt(tw.rt);
    bs[2].textContent = fmt(tw.lk);
  }
  if (tw.viral && !tw.el.classList.contains('viral')) tw.el.classList.add('viral');
  if (tw.cancel && !tw.el.classList.contains('cancel')) tw.el.classList.add('cancel');
}

// =================== UI: TRENDING ===================
function rebuildTrending(){
  trending = [];
  var pool = TAGS_BASE.slice();
  for (var i=0;i<10;i++){
    var idx = irand(0,pool.length-1);
    var tag = pool.splice(idx,1)[0];
    trending.push({tag: tag, count: irand(1200, 380000), heat: Math.random(), prev: i});
  }
  renderTrending();
}
function renderTrending(){
  trending.sort(function(a,b){return b.count-a.count});
  var box = document.getElementById('trendList');
  if (!box) return;
  box.innerHTML = '';
  trending.forEach(function(t,i){
    var d = document.createElement('div');
    var cls = 'trendItem t'+(i+1);
    if (t.heat > 0.7) cls += ' flame';
    if (t.prev > i) cls += ' up';
    if (t.fresh) cls += ' new';
    t.fresh = false;
    d.className = cls;
    d.innerHTML = '<span class="rank">'+(i+1)+'</span><span class="tag">'+esc(t.tag)+'</span><span class="cnt">'+fmt(t.count)+'</span>';
    box.appendChild(d);
    t.prev = i;
  });
}
function tickTrending(){
  trending.forEach(function(t){
    var d = irand(20,800) * (t.heat>0.6?3:1);
    t.count += d;
    t.heat = clamp(t.heat + rand(-0.05, 0.05), 0, 1);
  });
  if (Math.random()<0.18){
    var i = irand(0,trending.length-1);
    var pool = TAGS_BASE.filter(function(x){return !trending.some(function(t){return t.tag===x})});
    if (pool.length){
      trending[i].tag = pick(pool);
      trending[i].count = irand(8000,80000);
      trending[i].heat = Math.random();
      trending[i].fresh = true;
    }
  }
  renderTrending();
}

function triggerViral(){
  var tw = tweets[irand(0, Math.min(5,tweets.length-1))];
  if (!tw) return;
  tw.viral = true;
  viralTweet = tw;
  tw.rt = Math.max(tw.rt, irand(8000,40000));
  tw.lk = Math.max(tw.lk, tw.rt*4);
  tw.re = Math.max(tw.re, tw.rt/3|0);
  updateTweetEl(tw);
  showBanner('<span class="pill blink">VIRAL</span> '+esc(tw.user.handle)+' is going off — <b>'+fmt(tw.rt)+'</b> retweets and climbing','viral',6500);
  showViralCard(tw);
  setCam('VIRAL ZOOM');
  // Push into trending
  var newTag = '#'+tw.user.handle.replace('@','')+'Take';
  if (newTag.length<24){
    trending[trending.length-1].tag = newTag;
    trending[trending.length-1].count = tw.rt*8;
    trending[trending.length-1].heat = 1;
    trending[trending.length-1].fresh = true;
    renderTrending();
  }
  // Boost it over time
  var boosts = 0;
  var bi = setInterval(function(){
    if (boosts++ > 12 || !tw.viral) { clearInterval(bi); return; }
    tw.rt += irand(800, 4500);
    tw.lk += irand(2000, 12000);
    tw.re += irand(80, 600);
    updateTweetEl(tw);
    var rt = document.getElementById('vcRt'); if (rt) rt.textContent = fmt(tw.rt);
    var lk = document.getElementById('vcLk'); if (lk) lk.textContent = fmt(tw.lk);
    var re = document.getElementById('vcRe'); if (re) re.textContent = fmt(tw.re);
    var dt = document.getElementById('vcDt'); if (dt) dt.textContent = '+'+fmt((tw.rt/(boosts+1))|0)+'/s';
    if (!topTweet || tw.rt > topTweet.rt) topTweet = tw;
  }, 600);
  timers.push(bi);
  setT(function(){
    hideViralCard();
    tw.viral = false;
  }, 7500);
}

var camPresets = {
  'GLOBE WIDE':       { pos:[0, 0.4, 5.6], look:[0,0,0] },
  'TRENDING ZOOM':    { pos:[-2.5, 0.6, 4.6], look:[-0.6,0,0] },
  'VIRAL ZOOM':       { pos:[1.6, 1.2, 3.4], look:[0.2,0.2,0] },
  'CANCEL EVENT':     { pos:[2.0, -0.6, 3.8], look:[0.4,-0.2,0] },
  'SUBTWEET WAR':     { pos:[-0.4, 1.8, 3.2], look:[0,0.3,0] },
  'POLAR ARC':        { pos:[0, 4.2, 3.4], look:[0,0,0] },
  'EQUATOR PAN':      { pos:[3.6, 0, 3.4], look:[0,0,0] }
};
function setCam(name){
  if (!camPresets[name]) name = 'GLOBE WIDE';
  var p = camPresets[name];
  camTarget.x = p.pos[0]; camTarget.y = p.pos[1]; camTarget.z = p.pos[2];
  camLook.x = p.look[0]; camLook.y = p.look[1]; camLook.z = p.look[2];
  var lbl = document.getElementById('camName');
  if (lbl) lbl.textContent = name;
}
function autoCam(){
  // Cycle naturally unless an event takes over
  camIdx = (camIdx+1) % camStates.length;
  var name = camStates[camIdx];
  if (name==='VIRAL ZOOM' && !viralTweet) name = 'GLOBE WIDE';
  if (name==='CANCEL EVENT' && !cancelTarget) name = 'EQUATOR PAN';
  if (name==='SUBTWEET WAR' && !subtweetWar) name = 'TRENDING ZOOM';
  setCam(name);
}

// =================== 3D ===================
function latLngToVec(lat, lng, r){
  var phi = (90-lat)*Math.PI/180;
  var theta = (lng+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.sin(theta)
  );
}
function makeGlobeTexture(){
  var c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  var g = c.getContext('2d');
  // Ocean gradient
  var grd = g.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0a1830');
  grd.addColorStop(0.5,'#0a2244');
  grd.addColorStop(1,'#0a1830');
  g.fillStyle = grd;
  g.fillRect(0,0,1024,512);
  // Lat/lng grid
  g.strokeStyle = 'rgba(80,140,220,.18)';
  g.lineWidth = 1;
  for (var lat=-80;lat<=80;lat+=20){
    var y = (90-lat)/180*512;
    g.beginPath(); g.moveTo(0,y); g.lineTo(1024,y); g.stroke();
  }
  for (var lng=-180;lng<=180;lng+=20){
    var x = (lng+180)/360*1024;
    g.beginPath(); g.moveTo(x,0); g.lineTo(x,512); g.stroke();
  }
  // Procedural "continents" - pseudo random blobs
  g.globalCompositeOperation = 'lighter';
  for (var i=0;i<420;i++){
    var cx = Math.random()*1024;
    var cy = 80 + Math.random()*352;
    // Bias to known continent centers
    if (Math.random()<0.7){
      var picks = [[210,180],[270,260],[480,180],[540,260],[750,180],[810,300],[860,400],[160,360]];
      var p = picks[(Math.random()*picks.length)|0];
      cx = p[0]+(Math.random()-0.5)*120;
      cy = p[1]+(Math.random()-0.5)*80;
    }
    var rd = 2+Math.random()*22;
    var rg = g.createRadialGradient(cx,cy,0,cx,cy,rd);
    var alpha = 0.16+Math.random()*0.22;
    rg.addColorStop(0,'rgba(60,120,80,'+alpha+')');
    rg.addColorStop(1,'rgba(60,120,80,0)');
    g.fillStyle = rg;
    g.beginPath(); g.arc(cx,cy,rd,0,TAU); g.fill();
  }
  g.globalCompositeOperation = 'source-over';
  // Glowing hot zones
  for (var j=0;j<60;j++){
    var hx = Math.random()*1024, hy = 80+Math.random()*352;
    var rg2 = g.createRadialGradient(hx,hy,0,hx,hy,8);
    rg2.addColorStop(0,'rgba(120,200,255,.35)');
    rg2.addColorStop(1,'rgba(120,200,255,0)');
    g.fillStyle = rg2;
    g.beginPath(); g.arc(hx,hy,8,0,TAU); g.fill();
  }
  return c;
}
function makeStars(){
  var geom = new THREE.BufferGeometry();
  var n = 1400;
  var pos = new Float32Array(n*3);
  var col = new Float32Array(n*3);
  for (var i=0;i<n;i++){
    var th = Math.random()*TAU;
    var ph = Math.acos(2*Math.random()-1);
    var r = 60 + Math.random()*40;
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2] = r*Math.cos(ph);
    var b = 0.4+Math.random()*0.6;
    col[i*3]=b; col[i*3+1]=b; col[i*3+2]=b*(0.8+Math.random()*0.5);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geom.setAttribute('color', new THREE.BufferAttribute(col,3));
  var mat = new THREE.PointsMaterial({size:0.35, vertexColors:true, transparent:true, opacity:0.9});
  var pts = new THREE.Points(geom, mat);
  trackD(geom); trackD(mat);
  return pts;
}
function init3D(){
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x05070d, 8, 40);
  camera = new THREE.PerspectiveCamera(50, W()/H(), 0.1, 200);
  camera.position.set(0,0.4,5.6);
  camera.lookAt(0,0,0);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.setSize(W(), H());
  renderer.setClearColor(0x05070d, 1);
  document.getElementById('stage').appendChild(renderer.domElement);

  root = new THREE.Group();
  scene.add(root);

  // Stars
  starField = makeStars();
  scene.add(starField);

  // Globe
  var earthCanvas = makeGlobeTexture();
  var earthTex = new THREE.CanvasTexture(earthCanvas);
  earthTex.anisotropy = 4;
  trackD(earthTex);
  var gGeom = new THREE.SphereGeometry(1.5, 64, 48);
  var gMat = new THREE.MeshBasicMaterial({map:earthTex});
  trackD(gGeom); trackD(gMat);
  globe = new THREE.Mesh(gGeom, gMat);
  root.add(globe);

  // Wireframe overlay
  var wfGeom = new THREE.SphereGeometry(1.503, 36, 24);
  var wfMat = new THREE.MeshBasicMaterial({color:0x1d9bf0, wireframe:true, transparent:true, opacity:0.18});
  trackD(wfGeom); trackD(wfMat);
  var wf = new THREE.Mesh(wfGeom, wfMat);
  root.add(wf);

  // Atmosphere glow
  var atmoGeom = new THREE.SphereGeometry(1.62, 64, 48);
  var atmoMat = new THREE.ShaderMaterial({
    uniforms:{},
    transparent:true,
    side:THREE.BackSide,
    blending:THREE.AdditiveBlending,
    vertexShader: 'varying vec3 vN; void main(){ vN = normalize(normalMatrix*normal); gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: 'varying vec3 vN; void main(){ float i = pow(0.78 - dot(vN, vec3(0.0,0.0,1.0)), 3.0); gl_FragColor = vec4(0.11,0.61,0.94,1.0)*i*1.2; }'
  });
  trackD(atmoGeom); trackD(atmoMat);
  atmo = new THREE.Mesh(atmoGeom, atmoMat);
  root.add(atmo);

  // City pins
  pinGroup = new THREE.Group();
  root.add(pinGroup);
  cities = CITIES.slice();
  cities.forEach(function(c){
    var v = latLngToVec(c[1], c[2], 1.5);
    var pinG = new THREE.SphereGeometry(0.018, 10, 8);
    var pinM = new THREE.MeshBasicMaterial({color:0x9ad8ff});
    trackD(pinG); trackD(pinM);
    var pin = new THREE.Mesh(pinG, pinM);
    pin.position.copy(v);
    pinGroup.add(pin);
    c.pin = pin;
    c.vec = v;
  });

  pulseGroup = new THREE.Group();
  root.add(pulseGroup);
}
function spawnPulse(city){
  var v = city.vec;
  var ringG = new THREE.RingGeometry(0.02, 0.05, 32);
  var ringM = new THREE.MeshBasicMaterial({color:0x1d9bf0, transparent:true, opacity:0.95, side:THREE.DoubleSide, blending:THREE.AdditiveBlending});
  trackD(ringG); trackD(ringM);
  var ring = new THREE.Mesh(ringG, ringM);
  ring.position.copy(v).multiplyScalar(1.005);
  ring.lookAt(0,0,0);
  ring.userData = {age:0, ttl:1.4, geom:ringG, mat:ringM};
  pulseGroup.add(ring);
  // Vertical beam
  var beamG = new THREE.CylinderGeometry(0.002, 0.002, 0.5, 6);
  var beamM = new THREE.MeshBasicMaterial({color:0x9ad8ff, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending});
  trackD(beamG); trackD(beamM);
  var beam = new THREE.Mesh(beamG, beamM);
  beam.position.copy(v).multiplyScalar(1.0+0.25);
  beam.lookAt(v.clone().multiplyScalar(2));
  beam.rotateX(Math.PI/2);
  beam.userData = {age:0, ttl:1.0, geom:beamG, mat:beamM, beam:true};
  pulseGroup.add(beam);
  // Pin flash
  if (city.pin && city.pin.material) {
    var orig = 0x9ad8ff;
    city.pin.material.color.setHex(0xffffff);
    setT(function(){ if (city.pin && city.pin.material) city.pin.material.color.setHex(orig) }, 220);
  }
  // City label DOM
  spawnCityLabel(city);
}
function spawnCityLabel(city){
  var layer = document.getElementById('cityLayer');
  if (!layer) return;
  var d = document.createElement('div');
  d.className = 'city';
  d.textContent = city[0];
  layer.appendChild(d);
  // Project city pos to screen
  var v = city.vec.clone();
  v.applyMatrix4(globe.matrixWorld);
  v.project(camera);
  var x = (v.x*0.5+0.5)*W();
  var y = (-v.y*0.5+0.5)*H();
  d.style.left = x+'px';
  d.style.top = y+'px';
  setT(function(){if(d.parentNode)d.parentNode.removeChild(d)}, 2400);
}
function updatePulses(dt){
  var rm = [];
  pulseGroup.children.forEach(function(p){
    p.userData.age += dt;
    var t = p.userData.age / p.userData.ttl;
    if (t >= 1) { rm.push(p); return; }
    if (p.userData.beam) {
      p.material.opacity = (1-t) * 0.9;
    } else {
      p.scale.setScalar(1 + t*5);
      p.material.opacity = (1-t) * 0.85;
    }
  });
  rm.forEach(function(p){
    pulseGroup.remove(p);
    if (p.userData.geom) p.userData.geom.dispose();
    if (p.userData.mat) p.userData.mat.dispose();
  });
}

// =================== ANIMATE ===================
var lastT = 0, rotSpeed = 0.05;
function animate(t){
  animFrame = requestAnimationFrame(animate);
  var dt = Math.min(0.05, (t - lastT)/1000 || 0.016);
  lastT = t;
  if (root) root.rotation.y += rotSpeed * dt;
  if (atmo) atmo.rotation.y -= rotSpeed*0.3*dt;
  // Camera lerp
  camActual.x += (camTarget.x - camActual.x)*0.05;
  camActual.y += (camTarget.y - camActual.y)*0.05;
  camActual.z += (camTarget.z - camActual.z)*0.05;
  camLookActual.x += (camLook.x - camLookActual.x)*0.06;
  camLookActual.y += (camLook.y - camLookActual.y)*0.06;
  camLookActual.z += (camLook.z - camLookActual.z)*0.06;
  // gentle drift
  camera.position.set(camActual.x + Math.sin(t*0.0003)*0.15, camActual.y + Math.cos(t*0.00035)*0.08, camActual.z);
  camera.lookAt(camLookActual.x, camLookActual.y, camLookActual.z);
  updatePulses(dt);
  if (renderer && scene && camera) renderer.render(scene, camera);
}

// =================== TICKER / TPS ===================
function tickClock(){
  var d = new Date();
  var p = function(n){return n<10?'0'+n:''+n};
  var el = document.getElementById('clock');
  if (el) el.textContent = p(d.getUTCHours())+':'+p(d.getUTCMinutes())+':'+p(d.getUTCSeconds())+' UTC';
}
function tickTPS(){
  // record last 5s
  var now = performance.now();
  tpsSamples = tpsSamples.filter(function(s){return now-s<5000});
  var live = tpsSamples.length / 5;
  // augment with simulated firehose number
  tps = (live + rand(380, 420)) * 8 | 0;
  var el = document.querySelector('#tps b');
  if (el) el.textContent = fmt(tps);
}
function tickPipQuote(){
  var lines = [
    'tracking signal across 12 clusters…',
    'cluster #'+irand(1,9)+' showing anomalous spike — '+pick(TAGS_BASE),
    'sentiment inverting around '+pick(BRANDS)+' — collapse imminent',
    'reply velocity exceeds quote velocity 3:1 in '+pick(['London','NYC','Tokyo','LA','Berlin']),
    'firehose nominal — '+fmt(tps)+' tweets/sec sustained',
    'unusual coordination detected in cluster #'+irand(1,12),
    'trending pivot detected — flipping to '+pick(TAGS_BASE),
    'verified user ratio threshold breached',
    pick(BRANDS)+' brand mentions up '+irand(180,940)+'% in 4 minutes'
  ];
  var el = document.getElementById('pipQuote');
  if (el) el.textContent = pick(lines);
}
function tickTopTweet(){
  if (!topTweet || !tweets.includes(topTweet)) {
    var best = null;
    for (var i=0;i<tweets.length;i++){
      if (!best || tweets[i].rt > best.rt) best = tweets[i];
    }
    topTweet = best;
  }
  if (!topTweet) return;
  var who = document.getElementById('ttWho');
  var ct = document.getElementById('ttCt');
  var tx = document.getElementById('ttTxt');
  if (who) who.textContent = topTweet.user.handle;
  if (ct) ct.textContent = '♻ '+fmt(topTweet.rt);
  if (tx) tx.textContent = '"'+topTweet.text.slice(0,180)+(topTweet.text.length>180?'…':'')+'"';
}

// =================== TWEET LOOP ===================
function tickTweet(){
  var tw = genTweet();
  pushTweet(tw);
  tpsSamples.push(performance.now());
  // Spawn pulse
  spawnPulse(tw.city);
  // Slowly grow engagement on a few visible tweets
  if (Math.random()<0.4 && tweets.length>3){
    var t2 = tweets[irand(0, Math.min(8,tweets.length-1))];
    if (t2 && !t2.cancel){
      t2.rt += irand(2, 80);
      t2.lk += irand(8, 240);
      t2.re += irand(1, 25);
      updateTweetEl(t2);
    }
  }
}

// =================== START / RESEED ===================
function start(){
  init3D();
  // Generate users
  users = [];
  for (var i=0;i<irand(54,68);i++) users.push(genUser(i));
  // Trending
  rebuildTrending();
  // Seed initial tweets
  for (var j=0;j<8;j++) tickTweet();
  topTweet = tweets[0];
  setCam('GLOBE WIDE');

  // Tweet loop ~1-2 per second
  setI(tickTweet, irand(550, 900));
  // Bursts
  setI(function(){
    var burst = irand(2,5);
    for (var b=0;b<burst;b++) setT(tickTweet, b*120);
  }, 5400);
  // Trending updates
  setI(tickTrending, 1700);
  // Verified drop in
  setI(triggerVerifiedDrop, 4800);
  // TPS / clock
  setI(tickTPS, 380);
  setI(tickClock, 500);
  setI(tickPipQuote, 3200);
  setI(tickTopTweet, 1500);
  // Director cam
  setI(autoCam, 7000);

  // Macro events scheduling
  scheduleEvents();

  animate(0);
}
function scheduleEvents(){
  setT(triggerViral, irand(7000, 12000));
  setI(triggerViral, 22000);
  setT(triggerCancel, irand(18000, 28000));
  setI(triggerCancel, 40000);
  setT(triggerBreaking, irand(10000, 20000));
  setI(triggerBreaking, 35000);
  setT(triggerSubtweetWar, irand(25000, 40000));
  setI(triggerSubtweetWar, 55000);
}
function disposeAll(){
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = null;
  clearTimers();
  // Dispose tracked
  disposables.forEach(function(o){ try { if (o && o.dispose) o.dispose() } catch(e){} });
  disposables = [];
  // Clear scene
  if (scene) {
    scene.traverse(function(obj){
      if (obj.geometry) try { obj.geometry.dispose() } catch(e){}
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(function(m){try{m.dispose()}catch(e){}});
        else try { obj.material.dispose() } catch(e){}
      }
    });
  }
  if (renderer) {
    try { renderer.dispose() } catch(e){}
    if (renderer.domElement && renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
  }
  // Clear DOM lists
  var ids = ['tlInner','trendList','banners','cityLayer'];
  ids.forEach(function(id){ var e = document.getElementById(id); if (e) e.innerHTML = '' });
  hideViralCard();
  scene = null; renderer = null; camera = null; root = null; globe = null; atmo = null;
  pinGroup = null; pulseGroup = null; starField = null;
  users = []; tweets = []; cities = []; trending = []; topTweet = null;
  viralTweet = null; cancelTarget = null; subtweetWar = null;
  tweetCounter = 0; tpsSamples = [];
}
function reseed(){
  var rs = document.getElementById('reseed');
  if (rs) rs.classList.add('on');
  setTimeout(function(){
    disposeAll();
    start();
    if (rs) rs.classList.remove('on');
    // Schedule next reseed
    setTimeout(reseed, irand(8*60*1000, 10*60*1000));
  }, 1100);
}

// Resize
window.addEventListener('resize', function(){
  if (!renderer || !camera) return;
  renderer.setSize(W(), H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});
// Cosmetic click
window.addEventListener('click', function(e){
  // Find a city near a random location and pulse it
  if (cities && cities.length){
    var c = pick(cities);
    spawnPulse(c);
  }
});

// Boot
start();
setTimeout(reseed, irand(8*60*1000, 10*60*1000));

})();
