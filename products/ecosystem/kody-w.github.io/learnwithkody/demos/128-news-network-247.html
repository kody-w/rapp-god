<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;font-size:14px;letter-spacing:.02em}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%);pointer-events:none}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.02) 0 1px,transparent 1px 3px);pointer-events:none;mix-blend-mode:overlay}
.bug{position:absolute;top:14px;left:18px;display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#9c0a0a,#d40000);padding:8px 14px;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.bug .logo{font-weight:900;font-size:22px;letter-spacing:.18em;font-style:italic;color:#fff;text-shadow:0 2px 0 #5b0303}
.bug .live{display:flex;align-items:center;gap:6px;font-weight:800;font-size:12px;letter-spacing:.18em}
.bug .dot{width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff;animation:pulse 1.05s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.7)}}
.clock{position:absolute;top:14px;right:18px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);padding:8px 14px;border-radius:3px;font-variant-numeric:tabular-nums;text-align:right}
.clock .t{font-weight:800;font-size:18px}
.clock .d{font-size:11px;opacity:.75;letter-spacing:.06em}
.clock .w{font-size:11px;opacity:.85;margin-top:3px}
.lower3{position:absolute;left:0;right:0;bottom:74px;padding:0 18px;display:flex;flex-direction:column;gap:0;transition:opacity .35s,transform .35s;opacity:1}

.l3-top{align-self:flex-start;background:#c20000;color:#fff;font-weight:900;letter-spacing:.16em;padding:6px 14px;font-size:13px;text-transform:uppercase;border-left:5px solid #fff}
.l3-bot{align-self:flex-start;max-width:78%;background:linear-gradient(90deg,#001633,#003a73 70%,#0050a4);color:#fff;font-weight:700;font-size:22px;padding:10px 16px;border-left:5px solid #c20000;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.l3-sub{align-self:flex-start;background:rgba(0,0,0,.7);color:#cfe0ff;font-size:11px;letter-spacing:.18em;padding:4px 12px;text-transform:uppercase;font-weight:600}
.breaking{position:absolute;left:0;right:0;top:60px;background:repeating-linear-gradient(45deg,#a00000,#a00000 10px,#c00000 10px,#c00000 20px);color:#fff;font-weight:900;letter-spacing:.22em;padding:10px 18px;font-size:18px;text-transform:uppercase;text-align:center;display:none;border-top:2px solid #fff;border-bottom:2px solid #fff;text-shadow:0 1px 2px #000}
.breaking.on{display:block;animation:bkflash 0.6s ease}

.stock{position:absolute;left:0;right:0;bottom:36px;height:30px;background:linear-gradient(180deg,#0a0a0a,#1a1a1a);border-top:1px solid rgba(255,255,255,.12);overflow:hidden;display:flex;align-items:center}
.stock .lab{flex:0 0 auto;background:#c20000;color:#fff;font-weight:900;letter-spacing:.18em;padding:6px 12px;font-size:12px;height:100%;display:flex;align-items:center}

.news .lab{flex:0 0 auto;background:linear-gradient(90deg,#000,#222);color:#fff;font-weight:900;letter-spacing:.18em;padding:7px 14px;font-size:12px;height:100%;display:flex;align-items:center;border-right:3px solid #c20000}
.news .scroll{flex:1;overflow:hidden;position:relative;height:100%}
.news .row{position:absolute;white-space:nowrap;font-size:14px;height:100%;display:flex;align-items:center;padding:0 24px;color:#eee}

.coming{position:absolute;right:18px;top:78px;width:240px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.18);border-left:4px solid #c20000;padding:10px 12px;font-size:12px}

.whois.on{display:block}

.whois .v{font-weight:700;font-size:14px}

.split{position:absolute;inset:48px 0 76px 0;display:none;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:0 18px;z-index:5}

.split .cell canvas{width:100%;height:100%;display:block;object-fit:cover}
.split .cell .name{position:absolute;left:0;bottom:0;background:#c20000;color:#fff;padding:4px 10px;font-weight:800;letter-spacing:.14em;font-size:13px}
.split .cell .city{position:absolute;left:0;top:0;background:rgba(0,0,0,.7);color:#ffcf3a;padding:4px 8px;font-size:10px;letter-spacing:.18em;font-weight:800}
.commercial{position:absolute;inset:0;background:linear-gradient(135deg,#000,#1a0030 60%,#000);display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center;z-index:8}

.commercial .tag{font-size:18px;opacity:.85;letter-spacing:.06em}
.commercial .small{margin-top:30px;font-size:11px;opacity:.55;letter-spacing:.18em}
.wipe{position:absolute;inset:0;background:#c20000;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;font-weight:900;letter-spacing:.18em;text-transform:uppercase;transform:translateX(-100%);transition:transform .55s cubic-bezier(.7,.0,.2,1);z-index:7}
.wipe.in{transform:translateX(0)}
.wipe.out{transform:translateX(100%)}
.wipe .a{font-size:18px;opacity:.7;letter-spacing:.36em}
.wipe .b{font-size:54px;margin-top:6px}
.wipe .c{font-size:14px;margin-top:10px;opacity:.85}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9;mix-blend-mode:screen}

@keyframes fl{0%{opacity:.9}100%{opacity:0}}
.alertbar{position:absolute;left:0;right:0;top:0;height:6px;background:#c20000;display:none}
.alertbar.on{display:block;animation:abp 1.0s linear infinite}
@keyframes abp{0%,49%{background:#c20000}50%,100%{background:#280000}}

<script>
(function(){'use strict';
var THREE=window.THREE;
var seed=Math.floor(Math.random()*1e9);
function rng(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296}
function rand(a,b){return a+(b-a)*rng()}
function irand(a,b){return Math.floor(rand(a,b+1))}
function pick(a){return a[Math.floor(rng()*a.length)]}
function clamp(v,a,b){return v<a?a:v>b?b:v}
function lerp(a,b,t){return a+(b-a)*t}
function fmt2(n){return n<10?'0'+n:''+n}
function pad(n,w){var s=''+n;while(s.length<w)s='0'+s;return s}

var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));

scene.fog=new THREE.Fog(0x05060a,80,260);
var camera=new THREE.PerspectiveCamera(42,1,0.1,1000);
camera.position.set(0,4,18);
function resize(){var w=window.innerWidth,h=window.innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',resize);resize();

var disposables=[];
function track(o){if(o&&o.dispose)disposables.push(o);return o}
function disposeAll(){for(var i=0;i<disposables.length;i++){try{disposables[i].dispose()}catch(e){}}disposables.length=0}

function makeCanvas(w,h){var c=document.createElement('canvas');c.width=w;c.height=h;return c}

function paintGradient(ctx,w,h,c1,c2){var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(0,0,w,h)}

function paintNoise(ctx,w,h,a){var img=ctx.getImageData(0,0,w,h);var d=img.data;for(var i=0;i<d.length;i+=4){var n=(Math.random()-0.5)*a*255;d[i]=clamp(d[i]+n,0,255);d[i+1]=clamp(d[i+1]+n,0,255);d[i+2]=clamp(d[i+2]+n,0,255)}ctx.putImageData(img,0,0)}

function paintSkyline(ctx,w,h,sky1,sky2,bld,lights){
  paintGradient(ctx,w,h,sky1,sky2);
  ctx.fillStyle='rgba(255,255,255,0.05)';for(var i=0;i<60;i++){ctx.fillRect(rng()*w,rng()*h*0.4,1,1)}
  ctx.fillStyle=bld;
  var x=0;while(x<w){var bw=8+rng()*30;var bh=h*0.35+rng()*h*0.5;ctx.fillRect(x,h-bh,bw,bh);x+=bw+rng()*4}
  ctx.fillStyle=lights;for(var k=0;k<400;k++){var lx=rng()*w,ly=h*0.35+rng()*h*0.55;if(rng()<.5)ctx.fillRect(lx,ly,1.4,1.4)}
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.moveTo(0,h*0.55);ctx.lineTo(w,h*0.55);ctx.stroke();
}
function paintCapitol(ctx,w,h){paintGradient(ctx,w,h,'#3b4d72','#0a1428');var cx=w/2,cy=h*0.62;ctx.fillStyle='#dadde0';ctx.fillRect(cx-w*0.32,cy,w*0.64,h*0.32);ctx.fillRect(cx-w*0.18,cy-h*0.06,w*0.36,h*0.07);ctx.beginPath();ctx.arc(cx,cy-h*0.06,w*0.13,Math.PI,0);ctx.fill();ctx.fillStyle='#bcc1c7';for(var c=0;c<6;c++){ctx.fillRect(cx-w*0.16+c*w*0.06,cy+8,4,h*0.18)}ctx.fillStyle='#888';ctx.fillRect(cx-1.5,cy-h*0.18,3,h*0.12);ctx.fillStyle='#ffd24a';ctx.fillRect(cx-3,cy-h*0.2,6,4);paintNoise(ctx,w,h,0.04)}
function paintNYSE(ctx,w,h){paintGradient(ctx,w,h,'#3a2a1a','#120906');ctx.fillStyle='#7a4423';ctx.fillRect(0,h*0.45,w,h*0.55);ctx.fillStyle='#a36033';for(var i=0;i<6;i++){ctx.fillRect(w*0.15+i*w*0.12,h*0.45,w*0.06,h*0.55)}ctx.fillStyle='#1a0e08';for(var j=0;j<6;j++){ctx.fillRect(w*0.16+j*w*0.12,h*0.7,w*0.04,h*0.18)}ctx.fillStyle='#dec087';ctx.font='bold '+(h*0.06|0)+'px serif';ctx.textAlign='center';ctx.fillText('NYSE',w/2,h*0.4);var fx=w*0.7,fy=h*0.18;ctx.strokeStyle='#bbb';ctx.lineWidth=2;ctx.strokeRect(fx,fy,w*0.18,h*0.12);ctx.fillStyle='#c00';ctx.fillRect(fx,fy,w*0.06,h*0.04);ctx.fillStyle='#fff';ctx.fillRect(fx+w*0.06,fy,w*0.06,h*0.04);ctx.fillStyle='#1a4ea0';ctx.fillRect(fx+w*0.12,fy,w*0.06,h*0.04);paintNoise(ctx,w,h,0.04)}
function paintLA(ctx,w,h){paintGradient(ctx,w,h,'#ff8a3c','#5a1a44');ctx.fillStyle='rgba(255,200,90,0.4)';ctx.beginPath();ctx.arc(w*0.7,h*0.3,h*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a0e1a';for(var i=0;i<10;i++){var bw=20+rng()*40,bh=60+rng()*120;ctx.fillRect(rng()*w,h-bh,bw,bh)}ctx.fillStyle='#fff';ctx.font='bold '+(h*0.09|0)+'px sans-serif';ctx.fillText('HOLLYWOOD',w*0.1,h*0.55);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.beginPath();for(var k=0;k<6;k++){ctx.moveTo(0,h*0.6+k*8);ctx.lineTo(w,h*0.55+k*8)}ctx.stroke();paintNoise(ctx,w,h,0.04)}
function paintLondon(ctx,w,h){paintGradient(ctx,w,h,'#445a78','#0c1422');ctx.fillStyle='#5a4830';ctx.fillRect(w*0.35,h*0.35,w*0.1,h*0.65);ctx.fillRect(w*0.32,h*0.28,w*0.16,h*0.08);ctx.fillStyle='#f0e6c8';ctx.beginPath();ctx.arc(w*0.4,h*0.32,w*0.04,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(w*0.4,h*0.32);ctx.lineTo(w*0.4+w*0.025,h*0.3);ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#3a2a1a';ctx.fillRect(0,h*0.7,w,h*0.3);ctx.fillStyle='#1a3a6a';ctx.fillRect(0,h*0.78,w,h*0.04);for(var p=0;p<5;p++){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(rng()*w,h*0.78+rng()*h*0.04,20,2)}paintNoise(ctx,w,h,0.05)}

function paintNewsroom(ctx,w,h){
  paintGradient(ctx,w,h,'#1a2640','#050a18');
  ctx.fillStyle='rgba(255,255,255,0.03)';for(var i=0;i<200;i++)ctx.fillRect(rng()*w,rng()*h,1,1);
  ctx.fillStyle='#0e1828';for(var k=0;k<6;k++){ctx.fillRect(k*w/6+10,h*0.3,w/6-20,h*0.4)}
  ctx.fillStyle='#33405a';for(var j=0;j<30;j++){var x=rng()*w,y=h*0.3+rng()*h*0.4;ctx.fillRect(x,y,2,2)}
  ctx.strokeStyle='rgba(150,180,220,0.2)';for(var p=0;p<3;p++){ctx.beginPath();ctx.moveTo(0,h*0.2+p*h*0.05);ctx.lineTo(w,h*0.18+p*h*0.05);ctx.stroke()}
}

function paintGNNLogo(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#c40000');g.addColorStop(1,'#7a0000');ctx.fillStyle=g;
  ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#fff';ctx.font='italic 900 '+(h*0.5|0)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('GNN',w/2,h/2);
  ctx.fillStyle='#fff';ctx.font='bold '+(h*0.13|0)+'px sans-serif';ctx.fillText('GLOBAL NEWS NETWORK',w/2,h*0.85);
}

var SKIN=['#f1c8a4','#d8a07a','#a87149','#724a30','#3d2a1d'];
var HAIR=['#1a1208','#3a2a18','#6a4a2a','#a87133','#d8b070','#caa','#888','#2a2a2a'];

function paintFace(ctx,w,h,opt){
  ctx.clearRect(0,0,w,h);
  paintGradient(ctx,w,h,opt.bg1||'#1a2540',opt.bg2||'#050a18');
  for(var i=0;i<60;i++){ctx.fillStyle='rgba(255,255,255,'+(0.02+rng()*0.04)+')';ctx.fillRect(rng()*w,rng()*h,1,1)}
  if(opt.brand){ctx.fillStyle=opt.brand;ctx.fillRect(0,h*0.85,w,h*0.05)}
  var cx=w/2,cy=h*0.45,fw=w*0.32,fh=h*0.42;
  ctx.fillStyle='#0a0a18';ctx.beginPath();ctx.ellipse(cx,h*0.85,w*0.42,h*0.25,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=opt.suit||'#1a2030';ctx.beginPath();ctx.moveTo(cx-w*0.32,h);ctx.lineTo(cx-w*0.12,h*0.78);ctx.lineTo(cx+w*0.12,h*0.78);ctx.lineTo(cx+w*0.32,h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(cx-w*0.07,h*0.78);ctx.lineTo(cx,h*0.92);ctx.lineTo(cx+w*0.07,h*0.78);ctx.closePath();ctx.fill();
  ctx.fillStyle=opt.tie||'#c20000';ctx.beginPath();ctx.moveTo(cx-w*0.025,h*0.81);ctx.lineTo(cx+w*0.025,h*0.81);ctx.lineTo(cx+w*0.04,h);ctx.lineTo(cx-w*0.04,h);ctx.closePath();ctx.fill();
  ctx.fillStyle=opt.skin;ctx.beginPath();ctx.ellipse(cx,cy,fw,fh,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.ellipse(cx-fw*0.5,cy+fh*0.1,fw*0.3,fh*0.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=opt.hair;
  if(opt.hairStyle==='short'){ctx.beginPath();ctx.ellipse(cx,cy-fh*0.6,fw*1.05,fh*0.55,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(cx-fw*1.05,cy-fh*0.6,fw*0.2,fh*0.5);ctx.fillRect(cx+fw*0.85,cy-fh*0.6,fw*0.2,fh*0.5)}
  else if(opt.hairStyle==='long'){ctx.beginPath();ctx.ellipse(cx,cy-fh*0.5,fw*1.1,fh*0.5,0,Math.PI,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(cx-fw*1.1,cy-fh*0.5);ctx.quadraticCurveTo(cx-fw*1.3,cy+fh*0.4,cx-fw*0.8,cy+fh*0.6);ctx.lineTo(cx-fw*0.7,cy+fh*0.2);ctx.quadraticCurveTo(cx-fw,cy-fh*0.2,cx-fw*0.95,cy-fh*0.4);ctx.fill();ctx.beginPath();ctx.moveTo(cx+fw*1.1,cy-fh*0.5);ctx.quadraticCurveTo(cx+fw*1.3,cy+fh*0.4,cx+fw*0.8,cy+fh*0.6);ctx.lineTo(cx+fw*0.7,cy+fh*0.2);ctx.quadraticCurveTo(cx+fw,cy-fh*0.2,cx+fw*0.95,cy-fh*0.4);ctx.fill()}

function makePerson(opt){
  var c=makeCanvas(256,384);
  var tex=new THREE.CanvasTexture(c);track(tex);
  tex.minFilter=THREE.LinearFilter;
  var state={skin:opt.skin,hair:opt.hair,hairStyle:opt.hairStyle,suit:opt.suit,tie:opt.tie,eye:opt.eye,bg1:opt.bg1,bg2:opt.bg2,brand:opt.brand,mouthOpen:0,blink:false,talkPhase:0,blinkT:rand(2,5),blinkD:0};
  function repaint(){paintFace(c.getContext('2d'),256,384,state);tex.needsUpdate=true}
  repaint();
  var geo=new THREE.PlaneGeometry(opt.w||3.4,opt.h||5.1);track(geo);
  var mat=new THREE.MeshBasicMaterial({map:tex,transparent:true});track(mat);
  var mesh=new THREE.Mesh(geo,mat);
  return {mesh:mesh,state:state,repaint:repaint,update:function(dt,talking){
    state.blinkT-=dt;
    if(state.blinkD>0){state.blinkD-=dt;if(state.blinkD<=0){state.blink=false;state.blinkT=rand(2.5,5)}}
    else if(state.blinkT<=0){state.blink=true;state.blinkD=0.13}
    if(talking){state.talkPhase+=dt*9;state.mouthOpen=0.5+0.5*Math.sin(state.talkPhase)}
    else{state.mouthOpen=lerp(state.mouthOpen,0.05,Math.min(1,dt*6))}
    repaint();
  }};
}

function buildHeadlines(){
  var pool=[];function add(arr,cat){for(var i=0;i<arr.length;i++)pool.push({cat:cat,t:fillTpl(arr[i])})}
  add(POL,'POLITICS');add(BIZ,'BUSINESS');add(WX,'WEATHER');add(WORLD,'WORLD');add(SPORTS,'SPORTS');add(ENT,'ENTERTAINMENT');
  return pool;
}
function buildBreakings(){var p=[];for(var i=0;i<BREAK.length;i++)p.push(fillTpl(BREAK[i]));return p}

var headlines=buildHeadlines();
var breakings=buildBreakings();

var stockRow=document.getElementById('stockrow');
function renderStockRow(){
  var html='';
  for(var i=0;i<STOCKS.length;i++){var st=STOCKS[i];var up=st.c>=0;html+='<span><span class="sym">'+st.s+'</span> '+st.p.toFixed(2)+' <span class="'+(up?'up':'down')+'">'+(up?'▲':'▼')+' '+Math.abs(st.c).toFixed(2)+'</span></span>'}
  stockRow.innerHTML=html+html;
}
renderStockRow();
var stockX=0,stockW=0;
function tickStocks(dt){
  for(var i=0;i<STOCKS.length;i++){var st=STOCKS[i];st.c+=(rng()-0.5)*0.4;st.c=clamp(st.c,-9,9);st.p+=st.c*dt*0.3;if(st.p<1)st.p=1+rng()*5}
  if(!tickStocks._a||tickStocks._a<0){tickStocks._a=4;renderStockRow();stockW=stockRow.scrollWidth/2}
  tickStocks._a-=dt;
  stockX-=dt*60;if(stockW&&stockX<-stockW)stockX+=stockW;
  stockRow.style.left=stockX+'px';
}

var newsRow=document.getElementById('newsrow');
function renderNewsRow(){
  var s='';for(var i=0;i<headlines.length;i++){s+='<span><b>'+headlines[i].cat+'</b>'+headlines[i].t+'</span> &nbsp;•&nbsp; '}
  newsRow.innerHTML=s+s;
}
renderNewsRow();
var newsX=window.innerWidth,newsW=0;
function tickNews(dt){
  if(!newsW)newsW=newsRow.scrollWidth/2;
  newsX-=dt*90;if(newsW&&newsX<-newsW)newsX+=newsW;
  newsRow.style.left=newsX+'px';
}

var coming=document.getElementById('coming');
function refreshComing(){
  var items=[];for(var i=0;i<3;i++)items.push(pick(headlines).t);
  coming.innerHTML=items.map(function(x){return '<li>'+x+'</li>'}).join('');
}
refreshComing();

var feeds=document.getElementById('feeds');
var feedCanvases={};
(function(){
  for(var i=0;i<REPORTERS.length;i++){
    var rep=REPORTERS[i];
    var d=document.createElement('div');d.className='feed';
    var c=document.createElement('canvas');c.width=200;c.height=120;
    var cap=document.createElement('div');cap.className='cap';cap.textContent=rep.city;
    d.appendChild(c);d.appendChild(cap);feeds.appendChild(d);
    feedCanvases[rep.id]=c;
  }
})();
function paintFeeds(){
  var bgs={dc:paintCapitol,nyse:paintNYSE,la:paintLA,london:paintLondon};
  for(var i=0;i<REPORTERS.length;i++){var rep=REPORTERS[i];var c=feedCanvases[rep.id];paintReporterCard(c,rep,bgs[rep.area],pick(headlines).t)}
}
paintFeeds();

var split=document.getElementById('split');
function buildSplit(){
  split.innerHTML='';
  var bgs={dc:paintCapitol,nyse:paintNYSE,la:paintLA,london:paintLondon};
  for(var i=0;i<REPORTERS.length;i++){
    var rep=REPORTERS[i];
    var cell=document.createElement('div');cell.className='cell';
    var cv=document.createElement('canvas');cv.width=320;cv.height=200;paintReporterCard(cv,rep,bgs[rep.area],pick(headlines).t);
    var n=document.createElement('div');n.className='name';n.textContent=rep.name;
    var c=document.createElement('div');c.className='city';c.textContent=rep.city;
    cell.appendChild(cv);cell.appendChild(n);cell.appendChild(c);split.appendChild(cell);
  }
}
buildSplit();

var ct=document.getElementById('ct'),cd=document.getElementById('cd'),cw=document.getElementById('cw');
var WEATHER=['72° NYC · CLEAR','58° LDN · CLOUDY','81° LA · SUNNY','64° DC · LIGHT RAIN','77° HK · HUMID'];
var weatherIdx=0,weatherT=0;
function tickClock(dt){
  var d=new Date();
  ct.textContent=fmt2(d.getHours())+':'+fmt2(d.getMinutes())+':'+fmt2(d.getSeconds());
  cd.textContent=d.toDateString().toUpperCase();
  weatherT-=dt;if(weatherT<=0){weatherT=5;weatherIdx=(weatherIdx+1)%WEATHER.length;cw.textContent=WEATHER[weatherIdx]}
}

var l3top=document.getElementById('l3top'),l3bot=document.getElementById('l3bot'),l3sub=document.getElementById('l3sub'),l3=document.getElementById('lower3');
function setLower3(top,bot,sub){
  l3.classList.add('hide');
  setTimeout(function(){l3top.textContent=top;l3bot.textContent=bot;l3sub.textContent=sub;l3.classList.remove('hide')},220);
}

var breakingEl=document.getElementById('breaking'),flashEl=document.getElementById('flash'),alertbar=document.getElementById('alertbar');
function showBreaking(text){
  breakingEl.textContent='⚠ BREAKING NEWS · '+text;
  breakingEl.classList.add('on');
  alertbar.classList.add('on');
  flashEl.classList.add('on');
  setTimeout(function(){flashEl.classList.remove('on')},400);
}
function hideBreaking(){breakingEl.classList.remove('on');alertbar.classList.remove('on')}

var wipe=document.getElementById('wipe'),wipeCity=document.getElementById('wipecity'),wipeReporter=document.getElementById('wipereporter');
function doWipe(rep,cb){
  wipeCity.textContent=rep.city;wipeReporter.textContent=rep.name+' · '+rep.role;
  wipe.classList.remove('out');wipe.classList.add('in');
  setTimeout(function(){if(cb)cb();wipe.classList.remove('in');wipe.classList.add('out');setTimeout(function(){wipe.classList.remove('out')},600)},700);
}

var splitEl=document.getElementById('split');
var commercial=document.getElementById('commercial'),comhead=document.getElementById('comhead'),comtag=document.getElementById('comtag');
var COMMERCIALS=[
  {h:'MERIDIAN TRUST',t:'Building tomorrow, today.'},
  {h:'AURELIA INSURANCE',t:'Peace of mind, for every chapter.'},
  {h:'NORTHWIND TRAVEL',t:'The world is calling. Will you answer?'},
  {h:'CADENCE PHARMA',t:'Ask your doctor about CALMERIN®.'},
  {h:'SOLARIS MOTORS',t:'The drive of the future. Available now.'},
  {h:'HYPERION FIBER',t:'Ridiculously fast internet, ridiculously simple.'},
  {h:'GREENLINE FOODS',t:'Real ingredients. Real flavor. Real you.'}
];
function showCommercial(){
  var c=pick(COMMERCIALS);comhead.textContent=c.h;comtag.textContent=c.t;
  commercial.classList.add('on');
}
function hideCommercial(){commercial.classList.remove('on')}

var whois=document.getElementById('whois'),whoname=document.getElementById('whoname'),whorole=document.getElementById('whorole');
function showWhois(p){whoname.textContent=p.name.toUpperCase();whorole.textContent=p.role;whois.classList.add('on')}
function hideWhois(){whois.classList.remove('on')}

var director={
  state:'top',
  t:0,
  duration:6,
  cam:'ANCHOR_WIDE',
  speakers:{vivian:false,anderson:false,janet:false,marcus:false,gabi:false,theo:false},
  lastBreaking:0,
  lastCommercial:0,
  storyIdx:0,
  segCount:0
};

function setSpeakers(map){for(var k in director.speakers)director.speakers[k]=!!map[k]}

function pickAnchorCU(){return rng()<0.5?'ANCHOR_CU_L':'ANCHOR_CU_R'}

function updateMonitorsAll(){
  var s=areas.studio;if(!s||!s.monitors)return;
  for(var i=0;i<s.monitors.length;i++){
    var m=s.monitors[i];paintReporterCard(m.canvas,m.rep,m.paintBg,pick(headlines).t);m.tex.needsUpdate=true;
  }
}

function startSegment(){
  director.segCount++;
  director.t=0;
  hideWhois();
  hideBreaking();
  splitEl.classList.remove('on');
  hideCommercial();

  var sinceBreak=director.segCount-director.lastBreaking;
  var sinceComm=director.segCount-director.lastCommercial;
  var roll=rng();
  var type;
  if(sinceBreak>6&&roll<0.18)type='breaking';
  else if(sinceComm>10&&roll<0.32)type='commercial';
  else if(roll<0.45)type='top';
  else if(roll<0.78)type='remote';
  else if(roll<0.9)type='split';
  else type='teaser';
  director.state=type;

  if(type==='top'){
    var anch=pick(ANCHORS);
    var hl=pick(headlines);
    setLower3(hl.cat,hl.t,'GNN NEWSDESK · NEW YORK');
    setSpeakers(anch.id==='vivian'?{vivian:true}:{anderson:true});
    director.cam=rng()<0.4?'ANCHOR_2S':(rng()<0.5?pickAnchorCU():'ANCHOR_PUSH');
    director.duration=rand(7,12);
  } else if(type==='remote'){
    var rep=pick(REPORTERS);
    var hl2=pick(headlines);
    setLower3(rep.city,hl2.t,'GNN '+rep.city+' · LIVE');
    setSpeakers((function(){var o={};o[rep.id]=true;return o})());
    showWhois(rep);
    var camKey=rep.area.toUpperCase()+'_REMOTE';
    director.cam=camKey;
    director.duration=rand(8,13);
    doWipe(rep);
  } else if(type==='breaking'){
    director.lastBreaking=director.segCount;
    var bh=pick(breakings);
    showBreaking(bh.replace(/^BREAKING:\s*/,''));
    setLower3('BREAKING',bh.replace(/^BREAKING:\s*/,''),'GNN BREAKING NEWS · DEVELOPING');
    setSpeakers({vivian:true,anderson:rng()<0.4});
    director.cam=rng()<0.5?'ANCHOR_2S':'ANCHOR_PUSH';
    director.duration=rand(9,14);
  } else if(type==='split'){
    splitEl.classList.add('on');
    var hl3=pick(headlines);
    setLower3('LIVE FROM 4 CITIES',hl3.t,'GNN GLOBAL COVERAGE');
    setSpeakers({vivian:true});
    director.cam='ANCHOR_2S';
    director.duration=rand(7,11);
    buildSplit();
  } else if(type==='teaser'){
    refreshComing();
    setLower3('COMING UP','Stay with GNN — we\u2019ll be right back','TONIGHT ON GNN');
    setSpeakers({anderson:true,vivian:rng()<0.5});
    director.cam=rng()<0.5?'ANCHOR_PUSH':'STUDIO_CRANE';
    director.duration=rand(5,8);
  } else if(type==='commercial'){
    director.lastCommercial=director.segCount;
    setSpeakers({});
    showCommercial();
    director.cam='STUDIO_CRANE';
    director.duration=rand(5,8);
  }

  applyCam(CAMS[director.cam]||CAMS.ANCHOR_WIDE);
  updateMonitorsAll();
  paintFeeds();
}
startSegment();

var clock0=performance.now();
var lastT=clock0;
function tick(now){
  var dt=Math.min(0.05,(now-lastT)/1000);lastT=now;

  director.t+=dt;
  if(director.t>director.duration){
    if(director.state==='commercial')hideCommercial();
    if(director.state==='breaking')hideBreaking();
    startSegment();
  }
  if(director.state!=='commercial'&&director.t>director.duration*0.6&&rng()<dt*0.4){
    var newCam;
    if(director.state==='top'||director.state==='breaking')newCam=pick(['ANCHOR_2S','ANCHOR_PUSH','STUDIO_CRANE',pickAnchorCU()]);
    else if(director.state==='remote'){var rep=REPORTERS.filter(function(r){return director.speakers[r.id]})[0]||REPORTERS[0];newCam=rep.area.toUpperCase()+'_WIDE'}
    else newCam=pick(['ANCHOR_2S','STUDIO_CRANE','ANCHOR_PUSH']);
    if(CAMS[newCam]&&newCam!==director.cam){director.cam=newCam;applyCam(CAMS[newCam])}
  }

  var s=areas.studio;
  for(var i=0;i<s.anchors.length;i++){
    var a=s.anchors[i],aId=ANCHORS[i].id;
    a.update(dt,!!director.speakers[aId]);
  }
  for(var k=0;k<REPORTERS.length;k++){
    var r=REPORTERS[k];var ar=areas[r.area];if(ar&&ar.reporter)ar.reporter.update(dt,!!director.speakers[r.id]);
  }

  if(s.logoRing){s.logoRing.rotation.y+=dt*0.4}

  for(var L=0;L<s.lights.length;L++){var pl=s.lights[L];pl.intensity=0.4+0.15*Math.sin(now*0.001+L)}
  if(director.state==='breaking'){var pulse=0.5+0.5*Math.sin(now*0.012);renderer.setClearColor(new THREE.Color(0.02+0.05*pulse,0.02,0.04))}
  else renderer.setClearColor(0x05060a,1);

  tickStocks(dt);tickNews(dt);tickClock(dt);

  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function reseed(){
  seed=Math.floor(Math.random()*1e9);
  headlines=buildHeadlines();
  breakings=buildBreakings();
  renderNewsRow();newsW=0;
  refreshComing();
  paintFeeds();
  buildSplit();
  updateMonitorsAll();
  setTimeout(reseed,rand(8*60*1000,10*60*1000));
}
setTimeout(reseed,rand(8*60*1000,10*60*1000));

})();
</script>
</body>
</html>
