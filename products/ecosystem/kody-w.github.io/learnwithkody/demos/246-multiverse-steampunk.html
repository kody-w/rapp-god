<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brimsworth Multiverse — Universe 1/12: Steampunk Airship Wedding</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{margin:0;padding:0;background:#0a0418;color:#fdf6e3;font-family:'Georgia','Times New Roman',serif;overflow:hidden;height:100%;}
canvas{display:block;}
#stage{position:fixed;inset:0;}
.hud{position:fixed;pointer-events:none;color:#fdf6e3;text-shadow:0 0 6px #000,0 0 2px #000;}
#chyron{left:0;right:0;bottom:0;padding:8px 18px;background:linear-gradient(0deg,rgba(20,8,40,.92),rgba(20,8,40,.55));font-size:14px;border-top:1px solid #b8860b;letter-spacing:.5px;}
#chyron b{color:#ffb347;}
#stamp{top:8px;left:50%;transform:translateX(-50%);background:rgba(26,0,51,.78);border:1px solid #b8860b;padding:6px 14px;border-radius:3px;font-size:13px;letter-spacing:2px;color:#ffb347;}
#fork{top:54px;left:10px;width:230px;background:rgba(26,0,51,.7);border:1px solid #5d3317;padding:8px 10px;font-size:11px;border-radius:3px;}
#fork h4{margin:0 0 4px 0;color:#ffb347;font-size:11px;letter-spacing:1.5px;}
#fork .path{padding:2px 0;border-bottom:1px dashed #5d3317;color:#cd853f;}
#fork .path.live{color:#fdf6e3;}
#fork .path.fade{opacity:.45;}
#plan{top:54px;right:10px;width:260px;background:rgba(26,0,51,.7);border:1px solid #5d3317;padding:8px 10px;font-size:11px;border-radius:3px;}
#plan h4{margin:0 0 4px 0;color:#ffb347;font-size:11px;letter-spacing:1.5px;}
#plan .who{color:#fdf6e3;font-weight:bold;}
#plan .goal{color:#ffb347;}
#plan .step{color:#cd853f;padding-left:8px;}
#plan .step.cur{color:#fdf6e3;}
#plan .mood{color:#b8860b;font-style:italic;}
#think{top:230px;right:10px;width:260px;background:rgba(26,0,51,.55);border:1px dashed #5d3317;padding:6px 10px;font-size:10px;border-radius:3px;color:#cd853f;font-style:italic;min-height:30px;}
#ladder{top:54px;right:280px;width:18px;background:rgba(26,0,51,.55);border:1px solid #5d3317;padding:6px 4px;font-size:9px;border-radius:3px;color:#cd853f;text-align:center;line-height:14px;}
#ladder .rung{height:14px;border-bottom:1px dotted #5d3317;}
#ladder .rung.on{background:#b8860b;color:#1a0033;font-weight:bold;}
#minimap{bottom:38px;left:10px;width:200px;height:120px;background:rgba(26,0,51,.7);border:1px solid #b8860b;border-radius:3px;}
#pip{bottom:38px;right:10px;width:240px;display:grid;grid-template-columns:1fr 1fr;gap:3px;}
#pip .ch{aspect-ratio:16/9;background:#1a0033;border:1px solid #5d3317;font-size:9px;color:#cd853f;display:flex;align-items:flex-end;justify-content:flex-start;padding:2px 4px;background-size:cover;background-position:center;text-shadow:0 0 3px #000;position:relative;overflow:hidden;}
#cam{top:8px;left:10px;background:rgba(26,0,51,.78);border:1px solid #b8860b;padding:4px 10px;border-radius:3px;font-size:11px;color:#ffb347;letter-spacing:1px;}
#twinpip{top:90px;left:50%;transform:translateX(-50%);width:160px;height:90px;border:1px solid #ffb347;background:rgba(255,179,71,.12);border-radius:3px;display:none;font-size:10px;color:#ffb347;text-align:center;line-height:90px;animation:shimmer 2s infinite;}
@keyframes shimmer{0%,100%{opacity:.3;}50%{opacity:.85;}}
#act{top:54px;left:250px;background:rgba(26,0,51,.7);border:1px solid #5d3317;padding:4px 10px;font-size:11px;border-radius:3px;color:#ffb347;}
#timer{top:54px;left:380px;background:rgba(26,0,51,.7);border:1px solid #5d3317;padding:4px 10px;font-size:11px;border-radius:3px;color:#cd853f;font-family:monospace;}
.flash{animation:flash 0.6s ease-out;}
@keyframes flash{from{background:#ffb347;}to{background:rgba(26,0,51,.7);}}
</style>
</head>
<body>
<!-- ROUND24_MULTIVERSE v1 -->
<div id="stage"></div>
<div id="cam" class="hud">CAM —</div>
<div id="stamp" class="hud">UNIVERSE 1/12 · STEAMPUNK</div>
<div id="act" class="hud">ACT 1 · ARRIVAL</div>
<div id="timer" class="hud">00:00</div>
<div id="fork" class="hud"><h4>TIMELINE FORK</h4><div id="forkbody"></div></div>
<div id="plan" class="hud"><h4>AGENTIC PLAN</h4><div id="planbody"></div></div>
<div id="think" class="hud">…</div>
<div id="ladder" class="hud" title="Drama Ladder"></div>
<canvas id="minimap" class="hud" width="200" height="120"></canvas>
<div id="pip" class="hud">
  <canvas class="ch" id="ch1" width="120" height="68"></canvas>
  <canvas class="ch" id="ch2" width="120" height="68"></canvas>
  <canvas class="ch" id="ch3" width="120" height="68"></canvas>
  <canvas class="ch" id="ch4" width="120" height="68"></canvas>
</div>
<div id="twinpip" class="hud">TWIN PORTAL</div>
<div id="chyron" class="hud"><b>BRIMSWORTH MULTIVERSE</b> · <span id="chyrontext">Boarding the brass airship Aurelia at twilight…</span></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
'use strict';
var SENTINEL = "ROUND24"+"_MULTIVERSE"+" v1";
var KEY_LOCAL = "multiverse_steampunk_v1";
var KEY_LEDGER = "brimsworth_multiverse_v1";
var KEY_CENTURY = "brimsworth_century_v1";
var KEY_LIFETIME = "brimsworth_lifetime_v1";
var KEY_CAST = "recurring_cast_v1";
var SEED_PERIOD = 600;
var CYCLE_LEN = 600;

function safeLS(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function writeLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var state_local = safeLS(KEY_LOCAL,{cycles_seen:0,last_visited:0,seed:0});
state_local.cycles_seen = (state_local.cycles_seen||0)+1;
state_local.last_visited = Date.now();
state_local.seed = Math.floor(Date.now()/(SEED_PERIOD*1000));
writeLS(KEY_LOCAL,state_local);

var ledger = safeLS(KEY_LEDGER,{visits:[]});
if(!ledger.visits)ledger.visits=[];
var prior = null;
for(var i=ledger.visits.length-1;i>=0;i--){if(ledger.visits[i].universe_id !== "steampunk"){prior = ledger.visits[i].universe_id; break;}}
ledger.visits.push({universe_id:"steampunk",timestamp_visited:Date.now(),bytes_arrived_from:prior});
writeLS(KEY_LEDGER,ledger);

var century = safeLS(KEY_CENTURY,null);
var lifetime = safeLS(KEY_LIFETIME,null);
var castMem = safeLS(KEY_CAST,null);

// Seeded RNG
function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
var rand = mulberry32(state_local.seed||1);

// =============== NAMED ENTITIES (250+) ===============
var SURNAMES = ["Bramble","Field","Pemberton","Vellum","Wren","Whitford","Cogsworth","Thornbrass","Fenwick-Vale","Ashbury","Brunel","Carrington","Devereux","Eddington","Foxglove","Gearhart","Holloway","Inkwell","Jasperton","Kettering","Lockwood","Marchwood","Nightingale","Ormsby","Pinchbeck","Quillingham","Ravenscroft","Sterling","Tindall","Underwood","Vandermeer","Whittaker","Yardley","Zephyrson","Brassmoor","Copperfield","Steamwright","Gaslamp","Gearwhistle","Gilchrist","Hawkesbury","Ironside","Jeffries","Kingsley","Larkspur","Mossworth","Oakhaven","Pendleton","Rookwood","Smythe","Talbot","Underhill","Verity","Westbrook","Hartleigh","Brimsworth"];
var GIVENS_M = ["Tomas","Henry","Mortimer","Phineas","Bartholomew","Cornelius","Edmund","Frederick","Geoffrey","Horace","Isadore","Josiah","Klaus","Leopold","Maximilian","Nathaniel","Oswald","Percival","Quentin","Reginald","Sebastian","Theodore","Ulysses","Vincent","Wendell","Xavier","Archibald","Augustus","Beauregard","Cassian","Dmitri","Elias","Ferdinand","Gideon","Hieronymus","Ignatius","Jonquil","Otto","Whitford","Henry-Sr"];
var GIVENS_F = ["Lily","Margaret","Cordelia","Emmeline","Adelaide","Beatrix","Clementine","Delphine","Eulalia","Florence","Gwendolyn","Henrietta","Imogen","Josephine","Katarina","Letitia","Millicent","Nora","Octavia","Persephone","Quinella","Rosamund","Seraphina","Theodora","Ursula","Violet","Wilhelmina","Xenia","Yolanda","Zinnia","Augusta","Bridget","Constance","Dorothea","Eliza","Felicity","Genevieve","Harriet","Inez","Pemberton","Wren","Vellum"];
var ROLES = ["officiant","witness","guest","airman","stoker","conductor","bellhop","cellist","violinist","photographer","caterer","florist","navigator","carpenter","steward","page","engineer","bosun","chronicler","valet"];

var castFromMem = (castMem && castMem.cast) ? castMem.cast : [];
var anchored = [
  {name:"Lily Bramble",age:30,role:"BRIDE",steam:"brass-rim goggles atop chestnut hair",mood:"radiant"},
  {name:"Tomas Field",age:32,role:"GROOM",steam:"gear-cufflink waistcoat, pocket-watch chain",mood:"steady"},
  {name:"Henry Field Sr.",age:70,role:"FATHER-OF-GROOM",steam:"mahogany cane, brass top hat",mood:"misty"},
  {name:"Margaret Bramble",age:70,role:"MOTHER-OF-BRIDE",steam:"copper-thread shawl",mood:"proud"},
  {name:"Otto",age:8,role:"DOG-OF-HONOR",steam:"tiny brass collar plate",mood:"snuffly"},
  {name:"Bytes",age:10,role:"CAT-OF-RECORD",steam:"brass-collar tag engraved with sigils",mood:"observant"},
  {name:"Captain Crunch",age:10,role:"USKY-CAPTAIN",steam:"airship-captain's brass goggles",mood:"vigilant"},
  {name:"Mrs. Pemberton",age:99,role:"DOWAGER-MATRIARCH",steam:"velvet bonnet, ivory cane",mood:"luminous"},
  {name:"Eliza Vellum",age:50,role:"OFFICIANT",steam:"leather-bound ledger of vows",mood:"serene"},
  {name:"Margaret Wren",age:50,role:"WITNESS",steam:"brass-rim spectacles",mood:"warm"},
  {name:"Mr. Whitford",age:56,role:"BEST-MAN",steam:"clockwork-gear lapel pin",mood:"loyal"}
];

var entities = [];
for(var i=0;i<anchored.length;i++)entities.push(anchored[i]);
var targetCount = 270;
while(entities.length < targetCount){
  var female = rand()<0.5;
  var g = female ? GIVENS_F[Math.floor(rand()*GIVENS_F.length)] : GIVENS_M[Math.floor(rand()*GIVENS_M.length)];
  var s = SURNAMES[Math.floor(rand()*SURNAMES.length)];
  var r = ROLES[Math.floor(rand()*ROLES.length)];
  var age = 18+Math.floor(rand()*70);
  entities.push({name:g+" "+s,age:age,role:r,steam:"",mood:""});
}
// dedupe by name
var seen={};var dedup=[];for(i=0;i<entities.length;i++){if(!seen[entities[i].name]){seen[entities[i].name]=1;dedup.push(entities[i]);}}
entities = dedup;
while(entities.length<255){entities.push({name:"Guest "+entities.length,age:30,role:"guest",steam:"",mood:""});}

// =============== THREE.JS ===============
var stage = document.getElementById('stage');
var W = window.innerWidth, H = window.innerHeight;
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.shadowMap.enabled = false;
stage.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0033);
scene.fog = new THREE.FogExp2(0x1a0033, 0.012);

var camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 1500);
camera.position.set(0,12,40);

// LIGHTS
var ambient = new THREE.AmbientLight(0x4a3a6e, 0.55);
scene.add(ambient);
var moon = new THREE.DirectionalLight(0xa9b8d0, 0.45);
moon.position.set(-30,40,-20);
scene.add(moon);

function oilLamp(x,y,z){
  var g = new THREE.Group();
  var l = new THREE.PointLight(0xffb347, 1.4, 28, 1.6);
  l.position.set(0,0,0);
  g.add(l);
  var b = new THREE.Mesh(new THREE.SphereGeometry(0.35,10,10), new THREE.MeshBasicMaterial({color:0xffb347}));
  g.add(b);
  var housing = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.4,0.9,8), new THREE.MeshStandardMaterial({color:0xb8860b,metalness:0.85,roughness:0.3,emissive:0x331100}));
  housing.position.y = -0.7;
  g.add(housing);
  g.position.set(x,y,z);
  scene.add(g);
  return l;
}
var lamps=[];
for(var lx=-30;lx<=30;lx+=10){lamps.push(oilLamp(lx,8,-12));lamps.push(oilLamp(lx,8,12));}
lamps.push(oilLamp(0,12,0));

// MATERIALS
var brassMat = new THREE.MeshStandardMaterial({color:0xb8860b,metalness:0.9,roughness:0.25,emissive:0x1a0d00});
var copperMat = new THREE.MeshStandardMaterial({color:0xcd853f,metalness:0.85,roughness:0.35,emissive:0x100704});
var mahogMat = new THREE.MeshStandardMaterial({color:0x5d3317,metalness:0.1,roughness:0.7});
var creamMat = new THREE.MeshStandardMaterial({color:0xfdf6e3,metalness:0.1,roughness:0.6,emissive:0x221c10});
var glassMat = new THREE.MeshStandardMaterial({color:0x88aacc,metalness:0.4,roughness:0.1,transparent:true,opacity:0.35,emissive:0x223344});

// AIRSHIP GONDOLA HULL
var gondolaGroup = new THREE.Group();
scene.add(gondolaGroup);
var hull = new THREE.Mesh(new THREE.CapsuleGeometry(8,40,8,16), brassMat);
hull.rotation.z = Math.PI/2;
hull.position.set(0,-2,0);
gondolaGroup.add(hull);

// Deck plank
var deck = new THREE.Mesh(new THREE.BoxGeometry(48,0.4,14), mahogMat);
deck.position.y = 4;
gondolaGroup.add(deck);

// Brass railings
function railing(z){
  var g = new THREE.Group();
  var bar = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,48,8), brassMat);
  bar.rotation.z = Math.PI/2; bar.position.set(0,5.5,z);
  g.add(bar);
  for(var x=-23;x<=23;x+=2){
    var post = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.5,6), brassMat);
    post.position.set(x,4.95,z);
    g.add(post);
  }
  return g;
}
gondolaGroup.add(railing(7));
gondolaGroup.add(railing(-7));

// PORTHOLES with gold rim
function porthole(x,y,z){
  var g = new THREE.Group();
  var rim = new THREE.Mesh(new THREE.TorusGeometry(1.2,0.18,8,20), brassMat);
  rim.rotation.y = Math.PI/2; rim.position.set(x,y,z);
  g.add(rim);
  var glass = new THREE.Mesh(new THREE.CircleGeometry(1.1,18), glassMat);
  glass.rotation.y = z>0?Math.PI/2:-Math.PI/2; glass.position.set(x,y,z);
  g.add(glass);
  return g;
}
for(var px=-20;px<=20;px+=6){
  gondolaGroup.add(porthole(px,2,7.05));
  gondolaGroup.add(porthole(px,2,-7.05));
}

// COPPER STEAM PIPES
function pipe(x1,y1,z1,x2,y2,z2,r){
  var dx=x2-x1,dy=y2-y1,dz=z2-z1;
  var L = Math.sqrt(dx*dx+dy*dy+dz*dz);
  var m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,L,10), copperMat);
  m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
  m.lookAt(x2,y2,z2);
  m.rotateX(Math.PI/2);
  return m;
}
for(var pp=-18;pp<=18;pp+=6){
  gondolaGroup.add(pipe(pp,4.3,-6,pp,7,-6,0.18));
  gondolaGroup.add(pipe(pp,4.3,6,pp,7,6,0.18));
}
gondolaGroup.add(pipe(-22,7,-6,22,7,-6,0.22));
gondolaGroup.add(pipe(-22,7,6,22,7,6,0.22));

// GEAR-CLOCKWORK WHEELS
function gear(x,y,z,r,teeth){
  var g = new THREE.Group();
  var disc = new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.35,teeth*2), brassMat);
  disc.rotation.x = Math.PI/2;
  g.add(disc);
  for(var t=0;t<teeth;t++){
    var ang = t/teeth*Math.PI*2;
    var tooth = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), brassMat);
    tooth.position.set(Math.cos(ang)*r,Math.sin(ang)*r,0);
    g.add(tooth);
  }
  g.position.set(x,y,z);
  return g;
}
var gear1 = gear(-20,7,0,1.6,12);
var gear2 = gear(-17,8.5,0,1.0,8);
var gear3 = gear(20,7,0,1.6,12);
gondolaGroup.add(gear1);gondolaGroup.add(gear2);gondolaGroup.add(gear3);

// MAHOGANY PEWS (chapel)
var pewsGroup = new THREE.Group();
gondolaGroup.add(pewsGroup);
function pew(x,z){
  var g = new THREE.Group();
  var bench = new THREE.Mesh(new THREE.BoxGeometry(8,0.4,1.2), mahogMat);
  bench.position.y = 4.6;
  g.add(bench);
  var back = new THREE.Mesh(new THREE.BoxGeometry(8,1.5,0.3), mahogMat);
  back.position.set(0,5.5,-0.55);
  g.add(back);
  for(var lg=-3.5;lg<=3.5;lg+=7){
    var leg = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.6,1), mahogMat);
    leg.position.set(lg,4.1,0);
    g.add(leg);
  }
  g.position.set(x,0,z);
  return g;
}
for(var pz=-2;pz<=2;pz+=2){
  pewsGroup.add(pew(-6,pz));
  pewsGroup.add(pew(6,pz));
}

// ALTAR
var altar = new THREE.Mesh(new THREE.BoxGeometry(3,1.2,1.5), mahogMat);
altar.position.set(0,4.7,-5);
gondolaGroup.add(altar);
var ledgerBook = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.2,0.9), creamMat);
ledgerBook.position.set(0,5.4,-5);
gondolaGroup.add(ledgerBook);

// TELESCOPE on aft deck
var telescope = new THREE.Group();
var tube = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,3.5,12), brassMat);
tube.rotation.z = Math.PI/3;
telescope.add(tube);
var stand = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.4,2,8), mahogMat);
stand.position.y = -1;
telescope.add(stand);
telescope.position.set(20,5.5,3);
gondolaGroup.add(telescope);

// MECHANICAL RAVEN AUTOPILOT
var raven = new THREE.Group();
var ravenBody = new THREE.Mesh(new THREE.SphereGeometry(0.5,10,8), brassMat);
raven.add(ravenBody);
var ravenHead = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), brassMat);
ravenHead.position.set(0.5,0.3,0);
raven.add(ravenHead);
var ravenWingL = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.3,1.2), copperMat);
ravenWingL.position.set(0,0.1,0.7);
raven.add(ravenWingL);
var ravenWingR = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.3,1.2), copperMat);
ravenWingR.position.set(0,0.1,-0.7);
raven.add(ravenWingR);
var ravenEye = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), new THREE.MeshBasicMaterial({color:0xff5500}));
ravenEye.position.set(0.7,0.4,0.15);
raven.add(ravenEye);
raven.position.set(0,9,-5);
gondolaGroup.add(raven);

// WHEEL HELM
var helm = gear(-22,5.5,0,1.4,10);
gondolaGroup.add(helm);

// VICTORIAN BRIMSWORTH-BY-NIGHT BELOW
var cityGroup = new THREE.Group();
scene.add(cityGroup);
for(var bx=-100;bx<=100;bx+=8){
  for(var bz=-100;bz<=100;bz+=8){
    if(Math.abs(bx)<15 && Math.abs(bz)<15) continue;
    var bh = 4+rand()*14;
    var b = new THREE.Mesh(new THREE.BoxGeometry(5,bh,5), new THREE.MeshStandardMaterial({color:0x2a1a3a,emissive:0x110820,roughness:0.9}));
    b.position.set(bx+rand()*2-1,-30+bh/2,bz+rand()*2-1);
    cityGroup.add(b);
    if(rand()<0.3){
      var win = new THREE.Mesh(new THREE.PlaneGeometry(0.6,0.6), new THREE.MeshBasicMaterial({color:0xffb347}));
      win.position.set(bx,-25+rand()*8,bz+2.6);
      cityGroup.add(win);
    }
  }
}
// stars
var stars = new THREE.Group();
for(var sn=0;sn<400;sn++){
  var st = new THREE.Mesh(new THREE.SphereGeometry(0.3,4,4), new THREE.MeshBasicMaterial({color:0xfdf6e3}));
  st.position.set((rand()-.5)*600,40+rand()*100,(rand()-.5)*600);
  stars.add(st);
}
scene.add(stars);

// moon
var theMoon = new THREE.Mesh(new THREE.SphereGeometry(8,16,16), new THREE.MeshBasicMaterial({color:0xfdf6e3}));
theMoon.position.set(-120,80,-150);
scene.add(theMoon);

// =============== CHARACTERS ===============
function makePerson(opts){
  var g = new THREE.Group();
  var skin = new THREE.MeshStandardMaterial({color:opts.skin||0xe8c8a8,roughness:0.7});
  var torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.1,8), new THREE.MeshStandardMaterial({color:opts.torso||0x5d3317,roughness:0.6}));
  torso.position.y = 1.1; g.add(torso);
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.28,10,10), skin);
  head.position.y = 1.95; g.add(head);
  if(opts.hat){
    var hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,0.05,12), brassMat);
    hatBrim.position.y = 2.2; g.add(hatBrim);
    var hatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.5,12), brassMat);
    hatTop.position.y = 2.45; g.add(hatTop);
  }

// =============== AUDIO LEITMOTIF (organ + brass clockwork) ===============
var audioCtx = null, masterGain = null, audioStarted=false;
function startAudio(){
  if(audioStarted)return;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
    audioStarted = true;
  }catch(e){}
}
window.addEventListener('pointerdown',startAudio,{once:true});
window.addEventListener('keydown',startAudio,{once:true});

function organVoice(freq,start,dur,vol){
  if(!audioCtx)return;
  var o1 = audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value=freq;
  var o2 = audioCtx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq*0.5;
  var o3 = audioCtx.createOscillator(); o3.type='sine'; o3.frequency.value=freq*2;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.4);
  g.gain.linearRampToValueAtTime(vol*0.7,start+dur*0.6);
  g.gain.linearRampToValueAtTime(0,start+dur);
  var f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1400;
  o1.connect(g); o2.connect(g); o3.connect(g); g.connect(f); f.connect(masterGain);
  o1.start(start); o2.start(start); o3.start(start);
  o1.stop(start+dur+0.05); o2.stop(start+dur+0.05); o3.stop(start+dur+0.05);
}
function brassClockworkBell(freq,start,dur,vol){
  if(!audioCtx)return;
  var o = audioCtx.createOscillator(); o.type='square'; o.frequency.value=freq;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(g); g.connect(masterGain);
  o.start(start); o.stop(start+dur+0.02);
}
function playLeitmotif(intensity){
  if(!audioCtx)return;
  var t0 = audioCtx.currentTime + 0.05;
  var notes=[261.63,329.63,392.00,523.25]; // C E G C
  for(var n=0;n<notes.length;n++){
    organVoice(notes[n], t0+n*0.6, 1.6, 0.07*intensity);
    brassClockworkBell(notes[n]*2, t0+n*0.6, 0.55, 0.04*intensity);
  }
  // sustained pad
  organVoice(notes[0]*0.5, t0, 3.2, 0.05*intensity);
}
var motifPlayedAt = {};
function maybePlayMotif(t){
  if(!audioCtx) return;
  // Master volume envelope
  var target = 0;
  if(t>20 && t<540) target = 0.3 + 0.7*(t>290&&t<310?1:0);
  if(t>540) target = Math.max(0, 0.3*(1-(t-540)/60));
  if(masterGain) masterGain.gain.setTargetAtTime(target,audioCtx.currentTime,0.6);
  var triggers = [{at:30,i:0.5},{at:120,i:0.6},{at:240,i:0.7},{at:300,i:1.0}];
  for(var i=0;i<triggers.length;i++){
    var tr=triggers[i];
    if(t>=tr.at && t<tr.at+1 && !motifPlayedAt[tr.at]){
      motifPlayedAt[tr.at]=1;
      playLeitmotif(tr.i);
    }
  }
}

  }
  ctx.strokeStyle = "rgba(255,179,71,0.6)";
  ctx.strokeRect(0.5,0.5,119,67);
  ctx.fillStyle = "#fdf6e3";
  ctx.font="8px Georgia";
  ctx.fillText(label,4,10);
  ctx.font="7px Georgia";
  ctx.fillText(hint,4,64);
}

// =============== ANIMATION LOOP ===============
var t0 = performance.now()/1000;
var lastFrame = t0;
function loop(){
  requestAnimationFrame(loop);
  var now = performance.now()/1000;
  var t = (now - t0)%CYCLE_LEN;
  var dt = now - lastFrame; lastFrame = now;

  // Camera cycling every 7s
  if(now - camLast > 7 || camLast===0){
    camLast = now;
    camIndex = (camIndex+1)%cameras.length;
    camEl.textContent = "CAM · "+cameras[camIndex].name;
  }
  applyCam(cameras[camIndex],t);

  // Gentle airship sway
  gondolaGroup.rotation.z = Math.sin(t*0.3)*0.015;
  gondolaGroup.position.y = Math.sin(t*0.4)*0.4;

  // Gears spin
  gear1.rotation.z = t*0.4;
  gear2.rotation.z = -t*0.6;
  gear3.rotation.z = t*0.4;
  helm.rotation.z = -t*0.18;

  // Raven wings flap subtly + autopilot scan
  raven.rotation.y = Math.sin(t*0.5)*0.4;

  // Lamp flicker
  for(var l=0;l<lamps.length;l++){
    lamps[l].intensity = 1.2 + Math.sin(t*4+l)*0.18 + Math.random()*0.08;
  }

  // Acts
  var actLabel = "ACT 1 · ARRIVAL";
  if(t>180 && t<=300) actLabel="ACT 2 · CEREMONY";
  else if(t>300) actLabel="ACT 3 · MULTIVERSE-MEET & RECEPTION";
  actEl.textContent = actLabel;
  var mm = Math.floor(t/60), ss = Math.floor(t%60);
  timerEl.textContent = (mm<10?"0":"")+mm+":"+(ss<10?"0":"")+ss;

  // Drama ladder
  var dramaLevel = 1;
  if(t>20)dramaLevel=2;
  if(t>120)dramaLevel=3;
  if(t>180)dramaLevel=4;
  if(t>240)dramaLevel=5;
  if(t>295&&t<320)dramaLevel=7;
  else if(t>300)dramaLevel=6;
  if(t>520)dramaLevel=3;
  setLadder(dramaLevel);

  // PORTAL TRIGGER at t=300
  if(t>=300 && t<330){
    portal.visible = true;
    var k = Math.min(1,(t-300)/4);
    portal.scale.set(k,k,k);
    portal.rotation.z = (t-300)*1.4;
    portalDisc.material.opacity = 0.3 + 0.4*Math.abs(Math.sin(t*3));
    bytesPrior.visible = true;
    var px = 4 - Math.min(1.5,(t-300)*0.3);
    bytesPrior.position.set(px,4.4,2.2);
    if(t>=300 && t<301) announcePortal();
  } else if(t>=330 && t<540){
    portal.visible = true;
    portal.scale.set(0.4+0.05*Math.sin(t*2),0.4+0.05*Math.sin(t*2),1);
    portal.rotation.z = (t-300)*0.3;
    bytesPrior.visible = true;
    bytesPrior.position.set(2.5,4.4,2);
    bytes.position.set(2.7,4.4,2.1);
  } else if(t>=540){
    portal.visible = false;
  } else {
    portal.visible = false;
    bytesPrior.visible = false;
  }

  // Subtle gesture: officiant nods, bride/groom slight sway
  lily.rotation.y = Math.sin(t*0.5)*0.05;
  tomas.rotation.y = -Math.sin(t*0.5)*0.05;
  officiant.rotation.x = Math.sin(t*1.2)*0.04;
  otto.position.y = 4.4 + Math.sin(t*2)*0.02;
  bytes.rotation.y = Math.sin(t*0.3)*0.3;

  // Ceremony walk: at t<60 Lily walks down aisle
  if(t<60){
    lily.position.set(-1,4.4, 5 - t/10);
  } else {
    lily.position.z = -3;
  }

  // Active subworld for minimap
  var activeId = "airship-bridge-deck";
  if(t>30 && t<=180) activeId="airship-bridge-deck";
  else if(t>180 && t<=300) activeId="brass-chapel";
  else if(t>300 && t<=440) activeId="copper-dining-saloon";
  else if(t>440 && t<=510) activeId="observation-dome-garden";
  else if(t>510) activeId="twilight-stern";
  drawMinimap(t,activeId);

  // Chyron
  var chIdx = Math.floor(t/20)%chyrons.length;
  chyronEl.textContent = chyrons[chIdx];
  if(t>=300 && t<340) chyronEl.textContent = "the multiverse cat acknowledges itself across timelines.";

  // Fork + Plan
  renderFork(t);
  renderPlan(t);

  // PiP draws
  drawPip(ch1,"R23 · 1924",  "#241a14","#b8860b",t,"century apex");
  drawPip(ch2,"R23 · 2024",  "#0a1422","#88aacc",t*1.1,"century close");
  drawPip(ch3,"R24 · 2/12",  "#1a2a14","#90b070",t*0.9,"cottagecore-pastoral");
  drawPip(ch4,"R24 · 3/12",  "#2a0a14","#cc5577",t*1.2,"noir-rain");

  // Twin pip sustain
  if(twinPipUntil < Date.now()) twinPipEl.style.display='none';

  // Audio
  maybePlayMotif(t);

  renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// Heartbeat: re-write local + ledger every minute (track cycles_seen tick on overflow)
var lastTick = 0;
setInterval(function(){
  state_local.last_visited = Date.now();
  writeLS(KEY_LOCAL,state_local);
},60000);

loop();

// Touch unused but referenced data so optimizers don't drop them
if(century||lifetime||castMem||entities){/* read-only chyron hint sources */}
window.__sentinelCheck = SENTINEL.length>0;

})();
</script>
