<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storm Drive — vibe coding</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #cfd8dc;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 16px; z-index: 10;
    pointer-events: none; user-select: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    font-size: 12px; letter-spacing: 0.06em;
  }
  #hud .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; opacity: 0.95; }
  #hud .sub { opacity: 0.65; line-height: 1.5em; }
  #help {
    position: fixed; top: 14px; right: 16px; z-index: 10;
    text-align: right; font-size: 11px; opacity: 0.6;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    pointer-events: none; user-select: none;
  }
  #audio-prompt {
    position: fixed; inset: 0; display: flex;
    align-items: center; justify-content: center;
    z-index: 100; background: rgba(0,0,0,0.6);
    cursor: pointer; transition: opacity 0.4s;
  }
  #audio-prompt .box {
    padding: 18px 28px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(8,12,18,0.85); border-radius: 4px;
    text-align: center; font-size: 13px; letter-spacing: 0.1em;
  }
  #audio-prompt small { display:block; opacity: 0.6; margin-top: 6px; font-size: 10px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div class="title">STORM DRIVE</div>
  <div class="sub">a vibe-coded night<br/>country highway · rain · fog</div>
</div>
<div id="help">
  W / S — throttle &amp; brake<br/>
  A / D — steer<br/>
  H — high beam toggle
</div>
<div id="audio-prompt"><div class="box">CLICK TO START · headphones recommended<small>storm ambience &amp; thunder</small></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// =============================================================================
// CORE SETUP
// =============================================================================
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.FogExp2(0x07090e, 0.018);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 600);
// Driver eye height inside cabin
camera.position.set(0, 1.45, 0);
camera.rotation.order = 'YXZ';

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
app.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (fogQuad) fogMat.uniforms.uResolution.value.set(innerWidth, innerHeight);
  if (windshieldMat) windshieldMat.uniforms.uResolution.value.set(innerWidth, innerHeight);
});

// =============================================================================
// PROCEDURAL ROAD — using a 1D noise function for the spine
// =============================================================================
// Noise (smooth) — used for road curves and hills
function hash(n) { return ((Math.sin(n*127.1) * 43758.5453) % 1 + 1) % 1; }
function smooth(t) { return t*t*(3-2*t); }
function noise1(x) {
  const i = Math.floor(x), f = x - i;
  return THREE.MathUtils.lerp(hash(i), hash(i+1), smooth(f));
}
function fbm(x) {
  let s = 0, a = 0.5, f = 1;
  for (let i = 0; i < 4; i++) { s += noise1(x*f) * a; a *= 0.5; f *= 2; }
  return s;
}

// road spine in WORLD coords. s = "distance traveled" along road.
// returns x offset and y elevation
const ROAD_WIDTH = 7.0;
function roadX(s) { return (fbm(s*0.012) - 0.5) * 38; }
function roadY(s) { return (fbm(s*0.018 + 99.3) - 0.5) * 2.8; }

// road geometry — a long ribbon we slide forward, repositioning periodically.
const ROAD_SEGMENTS = 220;
const ROAD_LENGTH = 600;
const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH, 1, ROAD_SEGMENTS);
roadGeo.rotateX(-Math.PI/2);
// Reusable typed array for road verts
const roadPos = roadGeo.attributes.position;

// shoulders / dirt strips
const shoulderGeo = new THREE.PlaneGeometry(ROAD_WIDTH + 4, ROAD_LENGTH, 1, ROAD_SEGMENTS);
shoulderGeo.rotateX(-Math.PI/2);

const roadMat = new THREE.MeshStandardMaterial({
  color: 0x14171c,
  roughness: 0.42,
  metalness: 0.05,
  envMapIntensity: 0.0,
});
// Wet asphalt — we modify normal slightly via custom onBeforeCompile to keep it cheap
roadMat.onBeforeCompile = (shader) => {
  shader.uniforms.uTime = { value: 0 };
  roadMat.userData.shader = shader;
  shader.vertexShader = shader.vertexShader.replace(
    '#include <common>',
    `#include <common>\nvarying vec3 vWPos;`
  ).replace(
    '#include <begin_vertex>',
    `#include <begin_vertex>\nvWPos = (modelMatrix * vec4(position,1.0)).xyz;`
  );
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <common>',
    `#include <common>\nvarying vec3 vWPos;\nuniform float uTime;`
  ).replace(
    '#include <map_fragment>',
    `#include <map_fragment>
     // wet asphalt — subtle anisotropic streaks + lane lines
     float lane = smoothstep(0.06, 0.0, abs(vWPos.x)) * 0.0; // center
     // dashed yellow center line
     float dash = step(0.5, fract(vWPos.z * 0.04));
     float center = smoothstep(0.18, 0.0, abs(vWPos.x)) * dash * 0.5;
     // white edge lines
     float edge = smoothstep(0.18, 0.0, abs(abs(vWPos.x) - ${(ROAD_WIDTH/2 - 0.3).toFixed(2)})) * 0.45;
     diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.9, 0.78, 0.35), center);
     diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.85, 0.88, 0.9), edge);
     // wet specular wobble
     float wet = 0.5 + 0.5 * sin(vWPos.z * 0.3 + uTime*0.7) * sin(vWPos.x * 1.7);
     diffuseColor.rgb *= 1.0 + wet * 0.04;
    `
  );
};
const road = new THREE.Mesh(roadGeo, roadMat);
scene.add(road);

const shoulderMat = new THREE.MeshStandardMaterial({ color: 0x0a0d08, roughness: 1.0 });
const shoulder = new THREE.Mesh(shoulderGeo, shoulderMat);
shoulder.position.y = -0.02;
scene.add(shoulder);

// far ground plane
const groundGeo = new THREE.PlaneGeometry(800, 800);
groundGeo.rotateX(-Math.PI/2);
const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ color: 0x06080a, roughness: 1.0 }));
ground.position.y = -0.06;
scene.add(ground);

// =============================================================================
// ROADSIDE PROPS — instanced trees, fence posts, mailboxes
// =============================================================================
// Trees — simple cone + trunk, instanced
const treeGeo = (() => {
  const trunk = new THREE.CylinderGeometry(0.18, 0.25, 1.2, 5);
  trunk.translate(0, 0.6, 0);
  const cone = new THREE.ConeGeometry(1.6, 5.2, 6);
  cone.translate(0, 3.6, 0);
  // merge — we'll just use BufferGeometryUtils-free manual merge
  const merged = new THREE.BufferGeometry();
  const tPos = trunk.attributes.position.array;
  const cPos = cone.attributes.position.array;
  const tIdx = trunk.index.array;
  const cIdx = cone.index.array;
  const tNor = trunk.attributes.normal.array;
  const cNor = cone.attributes.normal.array;
  const positions = new Float32Array(tPos.length + cPos.length);
  const normals = new Float32Array(tNor.length + cNor.length);
  positions.set(tPos, 0); positions.set(cPos, tPos.length);
  normals.set(tNor, 0); normals.set(cNor, tNor.length);
  const indices = new Uint16Array(tIdx.length + cIdx.length);
  indices.set(tIdx, 0);
  const offset = tPos.length / 3;
  for (let i = 0; i < cIdx.length; i++) indices[tIdx.length + i] = cIdx[i] + offset;
  // colors per-vertex (trunk dark brown, foliage dark green)
  const colors = new Float32Array(positions.length);
  for (let i = 0; i < tPos.length / 3; i++) {
    colors[i*3+0] = 0.10; colors[i*3+1] = 0.07; colors[i*3+2] = 0.05;
  }
  for (let i = 0; i < cPos.length / 3; i++) {
    const idx = (tPos.length/3 + i) * 3;
    colors[idx+0] = 0.04; colors[idx+1] = 0.09; colors[idx+2] = 0.05;
  }
  merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  merged.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  merged.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  merged.setIndex(new THREE.BufferAttribute(indices, 1));
  return merged;
})();
const TREE_COUNT = 220;
const treeMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, flatShading: true });
const trees = new THREE.InstancedMesh(treeGeo, treeMat, TREE_COUNT);
trees.frustumCulled = false;
scene.add(trees);

// Fence posts — small cylinders
const fenceGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.0, 4);
fenceGeo.translate(0, 0.5, 0);
const fenceMat = new THREE.MeshStandardMaterial({ color: 0x2a221a, roughness: 0.9, flatShading: true });
const FENCE_COUNT = 240;
const fences = new THREE.InstancedMesh(fenceGeo, fenceMat, FENCE_COUNT);
fences.frustumCulled = false;
scene.add(fences);

// Mailboxes — boxes on stick
const mailboxGroupGeo = (() => {
  const stick = new THREE.BoxGeometry(0.06, 1.0, 0.06);
  stick.translate(0, 0.5, 0);
  const box = new THREE.BoxGeometry(0.5, 0.3, 0.3);
  box.translate(0, 1.15, 0);
  const positions = new Float32Array(stick.attributes.position.array.length + box.attributes.position.array.length);
  positions.set(stick.attributes.position.array, 0);
  positions.set(box.attributes.position.array, stick.attributes.position.array.length);
  const normals = new Float32Array(stick.attributes.normal.array.length + box.attributes.normal.array.length);
  normals.set(stick.attributes.normal.array, 0);
  normals.set(box.attributes.normal.array, stick.attributes.normal.array.length);
  const sIdx = stick.index.array, bIdx = box.index.array;
  const indices = new Uint16Array(sIdx.length + bIdx.length);
  indices.set(sIdx, 0);
  const off = stick.attributes.position.array.length / 3;
  for (let i = 0; i < bIdx.length; i++) indices[sIdx.length + i] = bIdx[i] + off;
  const merged = new THREE.BufferGeometry();
  merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  merged.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  merged.setIndex(new THREE.BufferAttribute(indices, 1));
  return merged;
})();
const mailboxMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.7, flatShading: true });
const MAILBOX_COUNT = 30;
const mailboxes = new THREE.InstancedMesh(mailboxGroupGeo, mailboxMat, MAILBOX_COUNT);
mailboxes.frustumCulled = false;
scene.add(mailboxes);

// Place props initially. They get repositioned in the streaming loop.
const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _v = new THREE.Vector3();
const _s = new THREE.Vector3();

function placeTree(i, sBase, side, scale) {
  const sx = sBase + (Math.random() - 0.5) * 8;
  const x = roadX(sx) + side * (ROAD_WIDTH/2 + 2.5 + Math.random() * 12);
  const y = roadY(sx);
  _v.set(x, y, -sx);
  _q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.random() * Math.PI * 2);
  const sc = scale * (0.7 + Math.random() * 0.7);
  _s.set(sc, sc * (0.85 + Math.random()*0.4), sc);
  _m.compose(_v, _q, _s);
  trees.setMatrixAt(i, _m);
}
function placeFence(i, sBase, side) {
  const sx = sBase;
  const x = roadX(sx) + side * (ROAD_WIDTH/2 + 1.4);
  const y = roadY(sx);
  _v.set(x, y, -sx);
  _q.identity();
  _s.set(1, 0.8 + Math.random() * 0.4, 1);
  _m.compose(_v, _q, _s);
  fences.setMatrixAt(i, _m);
}
function placeMailbox(i, sBase, side) {
  const sx = sBase;
  const x = roadX(sx) + side * (ROAD_WIDTH/2 + 1.6);
  const y = roadY(sx);
  _v.set(x, y, -sx);
  _q.setFromAxisAngle(new THREE.Vector3(0,1,0), side > 0 ? Math.PI/2 : -Math.PI/2);
  _s.set(1, 1, 1);
  _m.compose(_v, _q, _s);
  mailboxes.setMatrixAt(i, _m);
}

// initial placement
const TREE_SPACING = 5; // s-units between candidates
for (let i = 0; i < TREE_COUNT; i++) {
  const s = (i * TREE_SPACING) - 60;
  const side = (i % 2 === 0) ? -1 : 1;
  placeTree(i, s, side, 1.0);
}
for (let i = 0; i < FENCE_COUNT; i++) {
  const s = (i * 2.0) - 60;
  const side = (i % 2 === 0) ? -1 : 1;
  placeFence(i, s, side);
}
for (let i = 0; i < MAILBOX_COUNT; i++) {
  const s = (i * 38) - 60;
  const side = (i % 2 === 0) ? -1 : 1;
  placeMailbox(i, s, side);
}
trees.instanceMatrix.needsUpdate = true;
fences.instanceMatrix.needsUpdate = true;
mailboxes.instanceMatrix.needsUpdate = true;

// =============================================================================
// CAR / DRIVER STATE
// =============================================================================
const car = {
  s: 0,            // distance along road (auto-advancing)
  lateral: 0,      // -1..1 lane offset in [-half-lane .. +half-lane]
  speed: 14,       // m/s
  targetSpeed: 18, // cruising speed
  steer: 0,        // -1..1
  highBeam: false,
  yawTrim: 0,
};

const keys = { w:false, a:false, s:false, d:false };
addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k in keys) keys[k] = true;
  if (k === 'h') {
    car.highBeam = !car.highBeam;
    headL.intensity = headR.intensity = car.highBeam ? 9.0 : 5.5;
    headL.distance = headR.distance = car.highBeam ? 90 : 55;
    headL.angle = headR.angle = car.highBeam ? 0.42 : 0.32;
  }
});
addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k in keys) keys[k] = false;
});

// =============================================================================
// LIGHTING — moonlight ambient + headlights
// =============================================================================
const moon = new THREE.HemisphereLight(0x2a3550, 0x05060a, 0.18);
scene.add(moon);

// Headlights are SpotLights aimed forward
const headL = new THREE.SpotLight(0xfff4d8, 5.5, 55, 0.32, 0.55, 1.2);
const headR = new THREE.SpotLight(0xfff4d8, 5.5, 55, 0.32, 0.55, 1.2);
headL.position.set(-0.8, 1.0, -0.5);
headR.position.set( 0.8, 1.0, -0.5);
const headLTarget = new THREE.Object3D();
const headRTarget = new THREE.Object3D();
headLTarget.position.set(-2.5, 0.0, -25);
headRTarget.position.set( 2.5, 0.0, -25);
scene.add(headL, headR, headLTarget, headRTarget);
headL.target = headLTarget;
headR.target = headRTarget;

// flash light — for lightning
const flashLight = new THREE.DirectionalLight(0xb8c8ff, 0);
flashLight.position.set(40, 60, -30);
scene.add(flashLight);

// Sky-ish backdrop tint when lightning fires
const flashAmbient = new THREE.AmbientLight(0xa0b0d0, 0);
scene.add(flashAmbient);

// =============================================================================
// VOLUMETRIC FOG (full-screen ray-marched quad)
// =============================================================================
// Renders a fog layer that gets brightened inside the headlight cones.
const fogMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  depthTest: false,
  uniforms: {
    uTime: { value: 0 },
    uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
    uCamPos: { value: new THREE.Vector3() },
    uCamMat: { value: new THREE.Matrix4() },
    uInvProj: { value: new THREE.Matrix4() },
    uHeadLPos: { value: new THREE.Vector3() },
    uHeadRPos: { value: new THREE.Vector3() },
    uHeadLDir: { value: new THREE.Vector3() },
    uHeadRDir: { value: new THREE.Vector3() },
    uHeadAngle: { value: 0.32 },
    uHeadRange: { value: 55 },
    uHeadIntensity: { value: 1.0 },
    uFogColor: { value: new THREE.Color(0x07090e) },
    uFlash: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position.xy, 0.999, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;
    uniform vec2 uResolution;
    uniform vec3 uCamPos;
    uniform mat4 uCamMat;
    uniform mat4 uInvProj;
    uniform vec3 uHeadLPos, uHeadRPos;
    uniform vec3 uHeadLDir, uHeadRDir;
    uniform float uHeadAngle;
    uniform float uHeadRange;
    uniform float uHeadIntensity;
    uniform vec3 uFogColor;
    uniform float uFlash;

    // hash + value noise (3D-ish)
    float h(vec3 p){ return fract(sin(dot(p, vec3(12.9898,78.233,37.719)))*43758.5453); }
    float vn(vec3 p){
      vec3 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      float n = mix(mix(mix(h(i+vec3(0,0,0)), h(i+vec3(1,0,0)), f.x),
                       mix(h(i+vec3(0,1,0)), h(i+vec3(1,1,0)), f.x), f.y),
                   mix(mix(h(i+vec3(0,0,1)), h(i+vec3(1,0,1)), f.x),
                       mix(h(i+vec3(0,1,1)), h(i+vec3(1,1,1)), f.x), f.y), f.z);
      return n;
    }
    float fbm(vec3 p){
      float s = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++) { s += vn(p) * a; p *= 2.03; a *= 0.5; }
      return s;
    }

    // Returns brightness contribution along ray from headlight cone.
    // p = sample world pos, lp = light pos, ld = forward dir, range, ang
    float coneAt(vec3 p, vec3 lp, vec3 ld, float range, float ang){
      vec3 d = p - lp;
      float dist = length(d);
      if (dist > range) return 0.0;
      vec3 dn = d / max(dist, 0.0001);
      float c = dot(dn, normalize(ld));
      // smooth cone falloff
      float coneEdge = cos(ang);
      float coneCore = cos(ang * 0.55);
      float cone = smoothstep(coneEdge, coneCore, c);
      float distFall = 1.0 - dist / range;
      distFall = clamp(distFall, 0.0, 1.0);
      distFall *= distFall;
      return cone * distFall;
    }

    void main(){
      vec2 ndc = vUv * 2.0 - 1.0;
      // reconstruct world ray from clip
      vec4 nearPt = uInvProj * vec4(ndc, -1.0, 1.0); nearPt /= nearPt.w;
      vec4 farPt  = uInvProj * vec4(ndc,  1.0, 1.0); farPt  /= farPt.w;
      vec3 rayDirView = normalize(farPt.xyz - nearPt.xyz);
      // transform view-space dir to world
      vec3 rayDir = normalize((uCamMat * vec4(rayDirView, 0.0)).xyz);
      vec3 rayOrigin = uCamPos;

      // March the fog volume
      float maxDist = 90.0;
      const int STEPS = 22;
      float stepLen = maxDist / float(STEPS);
      float density = 0.0;
      float light = 0.0;
      float t = 0.5 + h(vec3(gl_FragCoord.xy, uTime)) * stepLen;
      for (int i = 0; i < STEPS; i++) {
        vec3 p = rayOrigin + rayDir * t;
        // fog density — denser near ground, animated turbulence
        float groundFalloff = exp(-max(p.y - 0.0, 0.0) * 0.15);
        float n = fbm(p * 0.05 + vec3(uTime * 0.04, 0.0, uTime*0.02));
        float d = (0.45 + 0.55 * n) * groundFalloff;
        density += d * stepLen * 0.018;

        // accumulate scattered light from headlights
        float l = coneAt(p, uHeadLPos, uHeadLDir, uHeadRange, uHeadAngle);
        l += coneAt(p, uHeadRPos, uHeadRDir, uHeadRange, uHeadAngle);
        light += l * d * stepLen * 0.18 * uHeadIntensity;

        t += stepLen;
        if (density > 1.5) break;
      }
      density = clamp(density, 0.0, 0.95);
      // base fog tint, brighter when lit by cone
      vec3 col = uFogColor * (0.7 + uFlash * 1.4);
      col += vec3(1.0, 0.92, 0.78) * light * 0.85;
      col += uFlash * vec3(0.6, 0.7, 0.95) * density * 0.6;
      gl_FragColor = vec4(col, density);
    }
  `,
});

const fogQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fogMat);
fogQuad.frustumCulled = false;
fogQuad.renderOrder = 5;
// Render fog using a separate scene so it draws between world and overlays
const fogScene = new THREE.Scene();
fogScene.add(fogQuad);
const fogCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// =============================================================================
// RAIN — instanced streaks (10,000)
// =============================================================================
const RAIN_COUNT = 10000;
const rainGeo = new THREE.InstancedBufferGeometry();
// streak quad in local space
const baseQuad = new THREE.PlaneGeometry(0.02, 0.6, 1, 1);
rainGeo.index = baseQuad.index;
rainGeo.setAttribute('position', baseQuad.attributes.position);
rainGeo.setAttribute('uv', baseQuad.attributes.uv);

const rainOffsets = new Float32Array(RAIN_COUNT * 3);
const rainSeeds = new Float32Array(RAIN_COUNT);
for (let i = 0; i < RAIN_COUNT; i++) {
  rainOffsets[i*3+0] = (Math.random() - 0.5) * 80;
  rainOffsets[i*3+1] = Math.random() * 30;
  rainOffsets[i*3+2] = -(Math.random() * 60);
  rainSeeds[i] = Math.random() * 1000;
}
rainGeo.setAttribute('iOffset', new THREE.InstancedBufferAttribute(rainOffsets, 3));
rainGeo.setAttribute('iSeed', new THREE.InstancedBufferAttribute(rainSeeds, 1));

const rainMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uCamPos: { value: new THREE.Vector3() },
    uHighBeam: { value: 0.0 },
    uHeadIntensity: { value: 1.0 },
  },
  vertexShader: `
    attribute vec3 iOffset;
    attribute float iSeed;
    uniform float uTime;
    uniform vec3 uCamPos;
    varying vec2 vUv;
    varying float vAlpha;
    void main(){
      // world-space position of this drop
      vec3 base = iOffset;
      // wrap around camera in a 70m bubble
      float fall = uTime * 28.0 + iSeed * 17.0;
      base.y = mod(iSeed * 31.0 + 30.0 - fall, 30.0);
      // diagonal wind drift
      base.x += sin(uTime * 0.7 + iSeed) * 0.5 + uTime * 2.5;
      // recenter around camera
      base.x = mod(base.x - uCamPos.x + 40.0, 80.0) - 40.0 + uCamPos.x;
      base.z = mod(base.z - uCamPos.z + 35.0, 70.0) - 35.0 + uCamPos.z;
      // streak orientation — slightly tilted, scaled long
      vec3 streakDir = normalize(vec3(0.18, -1.0, 0.08));
      // Build basis: streak along Y, width along X (both billboard-ish toward cam in XZ)
      vec3 toCam = normalize(uCamPos - base);
      vec3 right = normalize(cross(streakDir, toCam));
      vec3 up = streakDir;
      vec3 worldPos = base + right * position.x + up * position.y;
      vec4 mv = viewMatrix * vec4(worldPos, 1.0);
      gl_Position = projectionMatrix * mv;
      vUv = uv;
      // fade by distance
      float dist = length(worldPos - uCamPos);
      vAlpha = smoothstep(50.0, 8.0, dist) * 0.55;
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying float vAlpha;
    uniform float uHighBeam;
    uniform float uHeadIntensity;
    void main(){
      // fade along the streak length
      float a = smoothstep(0.0, 0.15, vUv.y) * smoothstep(1.0, 0.85, vUv.y);
      a *= 1.0 - smoothstep(0.3, 0.5, abs(vUv.x - 0.5)*2.0);
      vec3 col = vec3(0.7, 0.78, 0.9) * (0.7 + 0.6 * uHighBeam) * uHeadIntensity;
      gl_FragColor = vec4(col, a * vAlpha);
    }
  `,
});
const rain = new THREE.Mesh(rainGeo, rainMat);
rain.frustumCulled = false;
rain.renderOrder = 6;
scene.add(rain);

  },

    varying vec2 vUv;
    void main(){

      gl_Position = vec4(position.xy, 0.0, 1.0);

  `,

    precision highp float;

    uniform float uTime;

// Track raindrop blobs on canvas as moving entities so they drift down
const wsDrops = [];
function spawnDrop() {
  wsDrops.push({
    x: Math.random() * wsCanvas.width,
    y: Math.random() * wsCanvas.height * 0.7,
    r: 1.5 + Math.random() * 3.5,
    vy: 0.3 + Math.random() * 1.2,
    life: 0,
    maxLife: 200 + Math.random() * 200,
  });
}

function updateWindshield(dt) {
  // Add drops based on speed (more rain hits when moving faster)
  const dropsPerFrame = Math.floor(2 + car.speed * 0.25);
  for (let i = 0; i < dropsPerFrame; i++) spawnDrop();

  // Clear canvas with very slight fade so old streaks slowly fade
  wsCtx.globalCompositeOperation = 'destination-out';
  wsCtx.fillStyle = 'rgba(0,0,0,0.015)';
  wsCtx.fillRect(0, 0, wsCanvas.width, wsCanvas.height);

  // Move drops down
  wsCtx.globalCompositeOperation = 'source-over';
  wsCtx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = wsDrops.length - 1; i >= 0; i--) {
    const d = wsDrops[i];
    // Streak as it falls
    const oldY = d.y;
    d.y += d.vy * (dt * 60);
    d.x += Math.sin(d.life * 0.05) * 0.3;
    d.life += 1;
    // draw a vertical streak from oldY to new y
    wsCtx.beginPath();
    wsCtx.moveTo(d.x, oldY);
    wsCtx.lineTo(d.x, d.y);
    wsCtx.lineWidth = d.r * 0.6;
    wsCtx.strokeStyle = `rgba(255,255,255,${0.35 + Math.random()*0.2})`;
    wsCtx.stroke();
    // little blob
    wsCtx.beginPath();
    wsCtx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    wsCtx.fill();
    if (d.y > wsCanvas.height + 10 || d.life > d.maxLife) {
      wsDrops.splice(i, 1);
    }
  }

  // Apply wiper sweeps — erase wedges where each wiper currently is
  applyWiperErase();

  wsTex.needsUpdate = true;
}

function drawSpeedo(speedKmh) {
  const c = speedoCtx;
  const W = 256, H = 256, cx = 128, cy = 140, R = 90;
  c.clearRect(0, 0, W, H);
  // outer ring
  c.strokeStyle = '#1a1d24';
  c.lineWidth = 12;
  c.beginPath();
  c.arc(cx, cy, R, Math.PI * 0.78, Math.PI * 2.22);
  c.stroke();
  // active arc
  const t = Math.min(1, speedKmh / 140);
  const angStart = Math.PI * 0.78;
  const angEnd = angStart + (Math.PI * 1.44) * t;
  const grad = c.createLinearGradient(20, 80, 240, 200);
  grad.addColorStop(0, '#6cf0c8');
  grad.addColorStop(0.6, '#f4d96a');
  grad.addColorStop(1, '#ff5a55');
  c.strokeStyle = grad;
  c.lineWidth = 12;
  c.beginPath();
  c.arc(cx, cy, R, angStart, angEnd);
  c.stroke();
  // tick marks
  c.strokeStyle = '#3a3f4a';
  c.lineWidth = 2;
  for (let i = 0; i <= 14; i++) {
    const tt = i / 14;
    const a = angStart + (Math.PI * 1.44) * tt;
    const x1 = cx + Math.cos(a) * (R - 14);
    const y1 = cy + Math.sin(a) * (R - 14);
    const x2 = cx + Math.cos(a) * (R - 4);
    const y2 = cy + Math.sin(a) * (R - 4);
    c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
  }
  // needle
  const needleAng = angStart + (Math.PI * 1.44) * t;
  c.strokeStyle = '#ff7766';
  c.lineWidth = 3;
  c.beginPath();
  c.moveTo(cx, cy);
  c.lineTo(cx + Math.cos(needleAng) * (R - 16), cy + Math.sin(needleAng) * (R - 16));
  c.stroke();
  // hub
  c.fillStyle = '#222';
  c.beginPath(); c.arc(cx, cy, 6, 0, Math.PI * 2); c.fill();
  // text
  c.fillStyle = '#cfd8dc';
  c.font = 'bold 28px -apple-system, sans-serif';
  c.textAlign = 'center';
  c.fillText(`${Math.round(speedKmh)}`, cx, cy + 36);
  c.font = '11px -apple-system, sans-serif';
  c.fillStyle = '#7a8590';
  c.fillText('KM/H', cx, cy + 52);
  speedoTex.needsUpdate = true;
}

// WIPER SWEEP STATE — and canvas eraser
// =============================================================================
let wiperT = 0; // 0..1 cycle
let lastWiperPhase = 0; // for detecting swipe completion -> squeak
const WIPER_HALF_ANGLE = Math.PI * 0.55; // each blade swings this much

function wiperAngle(phase) {
  // Triangle wave so wiper swings back and forth
  const t = (phase < 0.5) ? phase * 2 : (1 - phase) * 2;
  // Ease in/out
  const e = 0.5 - 0.5 * Math.cos(t * Math.PI);
  return -WIPER_HALF_ANGLE * 0.5 + e * WIPER_HALF_ANGLE;
}

function applyWiperErase() {
  // Erase a wedge under each wiper's current position on the windshield canvas
  // Map wiperPivot dashboard coords (-1..1) to canvas coords (0..W, 0..H)
  for (let side = 0; side < 2; side++) {
    const cx = wiperCenters[side];
    const ang = wiperAngle(wiperT);
    // canvas mapping: dashboard x in [-1,1] -> canvas x in [0,W]; y -1..1 -> H..0
    const px = (cx.x * 0.5 + 0.5) * wsCanvas.width;
    const py = (1 - (cx.y * 0.5 + 0.5)) * wsCanvas.height;
    // Wiper length in canvas px
    const len = wsCanvas.height * 0.95;
    // Direction: dashboard rotation z=ang means blade points at angle (PI/2 + ang) above pivot
    const dirAng = -Math.PI/2 + ang;
    const tipX = px + Math.cos(dirAng) * len;
    const tipY = py + Math.sin(dirAng) * len;
    wsCtx.globalCompositeOperation = 'destination-out';
    wsCtx.lineCap = 'round';
    wsCtx.strokeStyle = 'rgba(0,0,0,1)';
    wsCtx.lineWidth = 38;
    wsCtx.beginPath();
    wsCtx.moveTo(px, py);
    wsCtx.lineTo(tipX, tipY);
    wsCtx.stroke();
  }
  wsCtx.globalCompositeOperation = 'source-over';
}

// =============================================================================
// AUDIO — Web Audio rain ambience + thunder + wiper squeak
// =============================================================================
let audioCtx = null;
let rainGain = null;
let masterGain = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
  // White noise buffer
  const bufLen = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const ch = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) ch[i] = Math.random() * 2 - 1;
  // Looping rain
  const rainSrc = audioCtx.createBufferSource();
  rainSrc.buffer = noiseBuf;
  rainSrc.loop = true;
  const rainFilt = audioCtx.createBiquadFilter();
  rainFilt.type = 'bandpass';
  rainFilt.frequency.value = 2200;
  rainFilt.Q.value = 0.7;
  const rainHP = audioCtx.createBiquadFilter();
  rainHP.type = 'highpass';
  rainHP.frequency.value = 600;
  rainGain = audioCtx.createGain();
  rainGain.gain.value = 0.18;
  rainSrc.connect(rainFilt).connect(rainHP).connect(rainGain).connect(masterGain);
  rainSrc.start();
}

function playWiperSqueak() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const dur = 0.18;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(280, now);
  osc.frequency.exponentialRampToValueAtTime(140, now + dur);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 600;
  filt.Q.value = 8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.05, now + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(filt).connect(g).connect(masterGain);
  osc.start(now);
  osc.stop(now + dur);
}

function playThunder(distance) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const dur = 2.4 + distance * 0.4;
  // Low rumble using filtered noise
  const len = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i/len);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 80 + Math.max(0, 200 - distance * 30);
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 30;
  const g = audioCtx.createGain();
  const peak = Math.max(0.05, 0.7 - distance * 0.07);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(peak, now + 0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(lp).connect(hp).connect(g).connect(masterGain);
  src.start(now);
}

// =============================================================================
// LIGHTNING SYSTEM
// =============================================================================
let nextFlashAt = 5 + Math.random() * 7;
let flashIntensity = 0;
let flashLifetime = 0;
let pendingThunder = null;
function maybeLightning(dt, t) {
  if (t > nextFlashAt && flashIntensity <= 0) {
    flashIntensity = 1.0;
    flashLifetime = 0;
    const distance = Math.random() * 5; // 0..5 (units affecting delay)
    pendingThunder = { delay: 1.2 + distance * 1.2, distance };
    nextFlashAt = t + 8 + Math.random() * 7;
  }
  if (flashIntensity > 0) {
    flashLifetime += dt;
    // Two-tap flash
    const a = Math.exp(-flashLifetime * 6);
    const b = (flashLifetime > 0.12) ? Math.exp(-(flashLifetime-0.12) * 8) * 0.7 : 0;
    flashIntensity = a + b;
    flashLight.intensity = flashIntensity * 1.6;
    flashAmbient.intensity = flashIntensity * 0.6;
    fogMat.uniforms.uFlash.value = flashIntensity * 0.7;
    if (flashLifetime > 0.6) {
      flashIntensity = 0;
      flashLight.intensity = 0;
      flashAmbient.intensity = 0;
      fogMat.uniforms.uFlash.value = 0;
    }
  }
  if (pendingThunder) {
    pendingThunder.delay -= dt;
    if (pendingThunder.delay <= 0) {
      playThunder(pendingThunder.distance);
      pendingThunder = null;
    }
  }
}

// =============================================================================
// ROAD STREAMING — rebuild road geometry to follow current camera s-position
// =============================================================================
function rebuildRoad(sCenter) {
  // Road plane is centered on sCenter in WORLD z. Z increases backward (we drive
  // toward -Z by convention). Vertex z in [-L/2..+L/2] maps to world z = -s.
  const L = ROAD_LENGTH;
  const segs = ROAD_SEGMENTS;
  for (let z = 0; z <= segs; z++) {
    const tt = z / segs;
    // world z position of this vertex row
    const wz = -L/2 + tt * L; // world space, but we will set vertex's world z = -s
    // The plane is centered at origin; we'll position the mesh at (0, 0, -sCenter).
    // So vertex world z = -sCenter + (vertex.z) where vertex.z spans [-L/2..L/2].
    // We want each vertex to follow road spine at s = sCenter - vertex.z.
    const sHere = sCenter - wz;
    const xOff = roadX(sHere);
    const yOff = roadY(sHere);
    for (let x = 0; x <= 1; x++) {
      const idx = (z * 2 + x) * 3;
      const baseX = (x === 0 ? -ROAD_WIDTH/2 : ROAD_WIDTH/2);
      roadPos.array[idx + 0] = baseX + xOff;
      roadPos.array[idx + 1] = yOff;
      // z stays
    }
  }
  roadPos.needsUpdate = true;
  roadGeo.computeVertexNormals();

  // shoulder mirrors road
  const sPos = shoulderGeo.attributes.position;
  for (let z = 0; z <= segs; z++) {
    const tt = z / segs;
    const wz = -L/2 + tt * L;
    const sHere = sCenter - wz;
    const xOff = roadX(sHere);
    const yOff = roadY(sHere);
    for (let x = 0; x <= 1; x++) {
      const idx = (z * 2 + x) * 3;
      const baseX = (x === 0 ? -(ROAD_WIDTH+4)/2 : (ROAD_WIDTH+4)/2);
      sPos.array[idx + 0] = baseX + xOff;
      sPos.array[idx + 1] = yOff - 0.02;
    }
  }
  sPos.needsUpdate = true;

  road.position.set(0, 0, -sCenter);
  shoulder.position.set(0, 0, -sCenter);
}

// recycle props that are behind the camera or too far ahead, by remapping s
function maybeRecycleProps(sCar) {
  // Trees: each instance covers ~5 s-units ahead/behind. If a tree is more than
  // ~30 behind the car, push it forward by TREE_COUNT * TREE_SPACING.
  const span = TREE_COUNT * TREE_SPACING;
  for (let i = 0; i < TREE_COUNT; i++) {
    trees.getMatrixAt(i, _m);
    _m.decompose(_v, _q, _s);
    const sTree = -_v.z;
    if (sTree < sCar - 30) {
      // push forward by span
      const newS = sTree + span;
      const side = (Math.random() < 0.5) ? -1 : 1;
      placeTree(i, newS, side, 1.0);
    } else if (sTree > sCar + (TREE_COUNT * TREE_SPACING) - 30) {
      const newS = sTree - span;
      const side = (Math.random() < 0.5) ? -1 : 1;
      placeTree(i, newS, side, 1.0);
    }
  }
  trees.instanceMatrix.needsUpdate = true;

  const fenceSpan = FENCE_COUNT * 2.0;
  for (let i = 0; i < FENCE_COUNT; i++) {
    fences.getMatrixAt(i, _m);
    _m.decompose(_v, _q, _s);
    const sF = -_v.z;
    if (sF < sCar - 20) {
      const side = (i % 2 === 0) ? -1 : 1;
      placeFence(i, sF + fenceSpan, side);
    } else if (sF > sCar + fenceSpan - 20) {
      const side = (i % 2 === 0) ? -1 : 1;
      placeFence(i, sF - fenceSpan, side);
    }
  }
  fences.instanceMatrix.needsUpdate = true;

  const mbSpan = MAILBOX_COUNT * 38;
  for (let i = 0; i < MAILBOX_COUNT; i++) {
    mailboxes.getMatrixAt(i, _m);
    _m.decompose(_v, _q, _s);
    const sM = -_v.z;
    if (sM < sCar - 30) {
      const side = (Math.random() < 0.5) ? -1 : 1;
      placeMailbox(i, sM + mbSpan, side);
    } else if (sM > sCar + mbSpan - 30) {
      const side = (Math.random() < 0.5) ? -1 : 1;
      placeMailbox(i, sM - mbSpan, side);
    }
  }
  mailboxes.instanceMatrix.needsUpdate = true;
}

// initial road build
rebuildRoad(0);

// =============================================================================
// MAIN LOOP
// =============================================================================
const clock = new THREE.Clock();
let elapsed = 0;
let lastRoadRebuildS = 0;

function frame() {
  const dt = Math.min(0.05, clock.getDelta());
  elapsed += dt;

  // --- Driver inputs ---
  const accel = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
  const steerInput = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
  car.targetSpeed += accel * dt * 8;
  car.targetSpeed = THREE.MathUtils.clamp(car.targetSpeed, 0, 38);
  car.speed += (car.targetSpeed - car.speed) * 0.05;
  // steering — affect lateral within lane, with auto-centering
  car.steer += (steerInput - car.steer) * 0.08;
  car.lateral += car.steer * dt * 1.4;
  car.lateral *= 0.985; // gentle return to center
  car.lateral = THREE.MathUtils.clamp(car.lateral, -ROAD_WIDTH/2 + 1.2, ROAD_WIDTH/2 - 1.2);

  // Advance distance traveled
  car.s += car.speed * dt;

  // Position camera on road
  const xOnRoad = roadX(car.s) + car.lateral;
  const yOnRoad = roadY(car.s) + 1.4; // driver eye height
  // Compute yaw by sampling road tangent
  const sAhead = car.s + 4;
  const xAhead = roadX(sAhead);
  const yawTangent = Math.atan2(xAhead - roadX(car.s), 4);
  // Camera follows yaw of road, with subtle steering offset
  const yaw = -yawTangent + car.steer * 0.05;
  camera.position.set(xOnRoad, yOnRoad, -car.s);
  camera.rotation.y = yaw;
  camera.rotation.x = -0.04; // looking very slightly down
  // gentle bob
  camera.position.y += Math.sin(elapsed * 4.5) * 0.02 * (car.speed / 20);

  // Position headlights with the camera, aimed forward
  const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
  const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);
  const lightOffsetY = -0.55;
  const lightOffsetForward = 1.6;
  const headLPos = camera.position.clone().add(right.clone().multiplyScalar(-0.7)).add(fwd.clone().multiplyScalar(lightOffsetForward));
  headLPos.y += lightOffsetY;
  const headRPos = camera.position.clone().add(right.clone().multiplyScalar(0.7)).add(fwd.clone().multiplyScalar(lightOffsetForward));
  headRPos.y += lightOffsetY;
  headL.position.copy(headLPos);
  headR.position.copy(headRPos);
  // diverging targets a bit
  const lookAhead = car.highBeam ? 60 : 30;
  const targetL = headLPos.clone().add(fwd.clone().multiplyScalar(lookAhead)).add(right.clone().multiplyScalar(-3.5));
  targetL.y -= 1.5;
  const targetR = headRPos.clone().add(fwd.clone().multiplyScalar(lookAhead)).add(right.clone().multiplyScalar(3.5));
  targetR.y -= 1.5;
  headLTarget.position.copy(targetL);
  headRTarget.position.copy(targetR);

  // Update fog uniforms
  fogMat.uniforms.uTime.value = elapsed;
  fogMat.uniforms.uCamPos.value.copy(camera.position);
  // Camera world matrix (rotation/translation)
  fogMat.uniforms.uCamMat.value.copy(camera.matrixWorld);
  fogMat.uniforms.uInvProj.value.copy(camera.projectionMatrixInverse);
  fogMat.uniforms.uHeadLPos.value.copy(headLPos);
  fogMat.uniforms.uHeadRPos.value.copy(headRPos);
  const dirL = targetL.clone().sub(headLPos).normalize();
  const dirR = targetR.clone().sub(headRPos).normalize();
  fogMat.uniforms.uHeadLDir.value.copy(dirL);
  fogMat.uniforms.uHeadRDir.value.copy(dirR);
  fogMat.uniforms.uHeadAngle.value = car.highBeam ? 0.42 : 0.32;
  fogMat.uniforms.uHeadRange.value = car.highBeam ? 90 : 55;
  fogMat.uniforms.uHeadIntensity.value = car.highBeam ? 1.4 : 1.0;

  // Rain uniforms
  rainMat.uniforms.uTime.value = elapsed;
  rainMat.uniforms.uCamPos.value.copy(camera.position);
  rainMat.uniforms.uHighBeam.value = car.highBeam ? 1.0 : 0.0;
  rainMat.uniforms.uHeadIntensity.value = car.highBeam ? 1.4 : 1.0;

  // Road material time uniform
  if (roadMat.userData.shader) roadMat.userData.shader.uniforms.uTime.value = elapsed;

  // Stream road if camera moved enough
  if (Math.abs(car.s - lastRoadRebuildS) > 30) {
    rebuildRoad(car.s);
    lastRoadRebuildS = car.s;
  }
  maybeRecycleProps(car.s);

  // Wipers
  const prevWiperT = wiperT;
  wiperT = (elapsed / WIPER_PERIOD) % 1;
  // detect crossing 0 or 0.5 to play squeak (end of each sweep)
  const crossings = [0.0, 0.5];
  for (const c of crossings) {
    // robust crossing detection
    if (prevWiperT > c && wiperT < c) playWiperSqueak();
    if (prevWiperT < c && wiperT >= c && Math.abs(prevWiperT - c) < 0.05) playWiperSqueak();
  }
  const ang = wiperAngle(wiperT);
  wiperLPivot.rotation.z = ang + Math.PI/2;
  wiperRPivot.rotation.z = -ang + Math.PI/2;
  // adjust wiper visual length so they reach high
  wiperL.scale.set(1.2, 1, 1);
  wiperR.scale.set(1.2, 1, 1);

  updateWindshield(dt);
  drawSpeedo(car.speed * 3.6);
  indHigh.material.opacity = car.highBeam ? 0.95 : 0.15;
  indRain.material.opacity = 0.6 + 0.3 * Math.sin(elapsed * 3);

  // Lightning
  maybeLightning(dt, elapsed);

  // RENDER PASSES
  renderer.autoClear = true;
  renderer.render(scene, camera);
  renderer.autoClear = false;
  // fog overlay
  renderer.render(fogScene, fogCam);
  // windshield streaks
  renderer.render(windshieldScene, fogCam);
  // dashboard
  renderer.render(dashScene, dashCam);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// =============================================================================
// AUDIO START GATE (browser autoplay policy)
// =============================================================================
const prompt = document.getElementById('audio-prompt');
function startAudio() {
  initAudio();
  prompt.style.opacity = '0';
  setTimeout(() => prompt.remove(), 400);
}
prompt.addEventListener('click', startAudio);
addEventListener('keydown', (e) => {
  if (!audioCtx) startAudio();
}, { once: true });
</script>
</body>
