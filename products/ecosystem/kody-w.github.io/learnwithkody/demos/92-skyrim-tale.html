<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Skyrim Tale — Round 11 Epic 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,'Times New Roman',serif;color:#e8d8a8}
canvas{display:block;position:absolute;top:0;left:0;z-index:1}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#stats{position:absolute;top:14px;left:14px;background:linear-gradient(180deg,rgba(28,18,8,.92),rgba(18,10,4,.85));border:2px solid #6b4a1c;padding:14px 18px;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.6),inset 0 0 12px rgba(140,90,30,.18);min-width:280px}
#stats h1{font-size:18px;color:#ffd680;letter-spacing:1px;margin-bottom:6px;text-shadow:0 0 8px #c08530}
#stats .sub{font-size:11px;color:#a89460;margin-bottom:10px;font-style:italic}
.bar{height:11px;background:#1a0e04;border:1px solid #5a3a14;border-radius:3px;margin:3px 0 7px;overflow:hidden;position:relative}
.bar>div{height:100%;transition:width .28s ease}
.bar .lbl{position:absolute;top:-1px;left:6px;font-size:9px;color:#fff;text-shadow:1px 1px 0 #000;letter-spacing:.5px;line-height:13px}
.hp>div{background:linear-gradient(90deg,#7a1010,#d63030)}
.sta>div{background:linear-gradient(90deg,#1a5a1a,#4ad04a)}
.mag>div{background:linear-gradient(90deg,#1a3a7a,#4a7adb)}
.xp>div{background:linear-gradient(90deg,#7a5010,#e8b040)}
.skl>div{background:linear-gradient(90deg,#5a3010,#c08538)}
#stats .row{display:flex;justify-content:space-between;font-size:12px;margin:2px 0}
#stats .row span:last-child{color:#ffd680;font-weight:bold}
#skills{margin-top:8px;padding-top:8px;border-top:1px solid #5a3a14}
#skills .skn{font-size:10px;color:#c8a868;margin-top:4px}
#quest{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,rgba(30,20,8,.92),rgba(20,12,4,.86));border:2px solid #6b4a1c;padding:10px 22px;border-radius:6px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.6),inset 0 0 10px rgba(140,90,30,.18);max-width:520px}
#quest .qt{font-size:14px;color:#ffd680;letter-spacing:1.5px;text-transform:uppercase;text-shadow:0 0 6px #c08530}
#quest .qo{font-size:11px;color:#c8a868;margin-top:3px;font-style:italic}
#chronicle{position:absolute;top:14px;right:14px;width:340px;background:linear-gradient(180deg,rgba(28,18,8,.88),rgba(20,12,4,.82));border:2px solid #6b4a1c;padding:12px 14px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.6),inset 0 0 10px rgba(140,90,30,.15);max-height:60vh;overflow:hidden}
#chronicle h2{font-size:13px;color:#ffd680;text-align:center;letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid #6b4a1c;padding-bottom:4px;text-shadow:0 0 5px #c08530}
#cstream{font-size:11px;line-height:1.4}
.entry{padding:3px 0;border-bottom:1px dotted #4a3010;color:#d8c898;animation:fadeIn .5s}
.entry .d{color:#ffd680;font-weight:bold}
.entry.combat{color:#e8a878}
.entry.gold{color:#ffd680}
.entry.quest{color:#a8d8e8}
.entry.epic{color:#ff8848;font-weight:bold;text-shadow:0 0 6px #c04020}
.entry.lore{color:#a8a8d8;font-style:italic}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
#zoneHud{position:absolute;bottom:14px;left:14px;background:rgba(20,12,4,.8);border:1px solid #6b4a1c;padding:6px 14px;border-radius:6px;font-size:13px;color:#ffd680;letter-spacing:2px}
#timeHud{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(20,12,4,.8);border:1px solid #6b4a1c;padding:6px 14px;border-radius:6px;font-size:12px;color:#c8a868}
#dmgLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;overflow:hidden}
.dmg{position:absolute;font-size:18px;color:#ffaa44;font-weight:bold;text-shadow:2px 2px 0 #000,0 0 8px #ff4400;animation:dmgF 1.4s ease-out forwards;pointer-events:none}
.dmg.crit{font-size:24px;color:#ff4040}
.dmg.heal{color:#40ff40}
@keyframes dmgF{0%{transform:translateY(0) scale(.7);opacity:0}20%{transform:translateY(-12px) scale(1.2);opacity:1}100%{transform:translateY(-60px) scale(.9);opacity:0}}
#banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:#ffd680;text-shadow:0 0 20px #c04020,4px 4px 0 #000;letter-spacing:6px;text-align:center;pointer-events:none;opacity:0;transition:opacity .8s;z-index:20}
#banner.show{opacity:1}
#banner .sub{font-size:18px;color:#e8a040;letter-spacing:2px;margin-top:8px}
#endScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(40,20,8,.95),rgba(0,0,0,.99));z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;overflow:hidden}
#endScreen.show{display:flex}
#endScreen h1{font-size:42px;color:#ffd680;letter-spacing:6px;text-shadow:0 0 25px #c04020,3px 3px 0 #000;margin-bottom:20px;text-align:center}
#endScreen .saga{max-width:680px;font-size:16px;line-height:1.7;color:#e8d8a8;text-align:center;animation:scrollUp 8s linear forwards}
#endScreen .saga p{margin:8px 0}
#endScreen .saga .h{color:#ffd680;font-size:20px;letter-spacing:3px}
@keyframes scrollUp{0%{transform:translateY(40vh);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-40vh);opacity:0}}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd680;font-size:20px;letter-spacing:3px;z-index:50}
</style>
</head>
<body>
<!-- ROUND11_3D_EPIC v1 -->
<div id="loading">FORGING THE REALM…</div>
<div id="hud">
  <div id="stats">
    <h1 id="heroName">— —</h1>
    <div class="sub" id="heroTitle">wanderer of the realm</div>
    <div class="bar hp"><div id="hpBar" style="width:100%"></div><span class="lbl" id="hpL">HP</span></div>
    <div class="bar sta"><div id="staBar" style="width:100%"></div><span class="lbl" id="staL">STA</span></div>
    <div class="bar mag"><div id="magBar" style="width:100%"></div><span class="lbl" id="magL">MAG</span></div>
    <div class="row"><span>Level</span><span id="lvl">1</span></div>
    <div class="bar xp"><div id="xpBar" style="width:0%"></div><span class="lbl" id="xpL">XP</span></div>
    <div class="row"><span>Gold</span><span id="gold">0</span></div>
    <div class="row"><span>Slain</span><span id="kills">0</span></div>
    <div id="skills">
      <div class="skn">One-Handed <span id="s0v" style="float:right;color:#ffd680">0</span></div>
      <div class="bar skl"><div id="s0b" style="width:0%"></div></div>
      <div class="skn">Archery <span id="s1v" style="float:right;color:#ffd680">0</span></div>
      <div class="bar skl"><div id="s1b" style="width:0%"></div></div>
      <div class="skn">Destruction <span id="s2v" style="float:right;color:#ffd680">0</span></div>
      <div class="bar skl"><div id="s2b" style="width:0%"></div></div>
      <div class="skn">Sneak <span id="s3v" style="float:right;color:#ffd680">0</span></div>
      <div class="bar skl"><div id="s3b" style="width:0%"></div></div>
    </div>
  </div>
  <div id="quest">
    <div class="qt" id="qTitle">— No Quest —</div>
    <div class="qo" id="qObj">Wandering the wilds…</div>
  </div>
  <div id="chronicle">
    <h2>~ THE CHRONICLE ~</h2>
    <div id="cstream"></div>
  </div>
  <div id="zoneHud">— UNKNOWN LANDS —</div>
  <div id="timeHud">Day 1 · Dawn</div>
</div>
<div id="dmgLayer"></div>
<div id="banner"><div id="bannerMain"></div><div class="sub" id="bannerSub"></div></div>
<div id="endScreen"><h1 id="endTitle">THE LEGEND</h1><div class="saga" id="endSaga"></div></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";
const W=window,D=document,M=Math,PI=M.PI,T2=PI*2;
const rnd=(a,b)=>a+M.random()*((b===undefined)?(a===undefined?1:0):(b-a));
const rndi=(a,b)=>M.floor(rnd(a,b));
const pick=a=>a[M.floor(M.random()*a.length)];
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(a,b)=>{const dx=a.x-b.x,dz=a.z-b.z;return M.sqrt(dx*dx+dz*dz)};

// ==== SCENE / RENDERER ====
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x88aacc,80,420);
const camera=new THREE.PerspectiveCamera(60,W.innerWidth/W.innerHeight,0.5,1500);
camera.position.set(0,30,50);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setSize(W.innerWidth,W.innerHeight);
renderer.setPixelRatio(M.min(W.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
D.body.appendChild(renderer.domElement);
W.addEventListener('resize',()=>{camera.aspect=W.innerWidth/W.innerHeight;camera.updateProjectionMatrix();renderer.setSize(W.innerWidth,W.innerHeight)});

// ==== LIGHTING ====
const ambient=new THREE.AmbientLight(0xffffff,0.42);
const hemi=new THREE.HemisphereLight(0x9bbfe8,0x3a4628,0.55);
const sun=new THREE.DirectionalLight(0xffeecc,1.2);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const sc=sun.shadow.camera; sc.left=-90;sc.right=90;sc.top=90;sc.bottom=-90;sc.near=0.5;sc.far=500;
sun.shadow.bias=-0.0008;
scene.add(ambient,hemi,sun,sun.target);

// ==== ZONE DEFINITIONS ====
// pos: [x,z]; r: influence radius
const ZONES={
  WHITEWATCH:{pos:[-30,-30],r:38,col:0x6f8a3a,name:"WHITEWATCH"},
  DAGGERWOOD:{pos:[60,-90],r:55,col:0x2a4218,name:"DAGGER WOOD"},
  FROSTFANG:{pos:[-130,90],r:60,col:0xb8c8d8,name:"FROSTFANG PASS"},
  BLEAKHALL:{pos:[-110,-130],r:42,col:0x4a4438,name:"BLEAKHALL"},
  ASHFORD:{pos:[70,40],r:46,col:0x6a8a4a,name:"ASHFORD"},
  SHRINE:{pos:[10,90],r:30,col:0x8a7ab0,name:"THE SHRINE"},
  SKYREACH:{pos:[160,150],r:55,col:0xe0e8f0,name:"SKYREACH"}
};
const ZONE_LIST=Object.keys(ZONES);

// ==== HEIGHTMAP FUNCTION ====
// pseudo-noise (cheap, deterministic)
function hash2(x,z){const s=M.sin(x*12.9898+z*78.233)*43758.5453;return s-M.floor(s)}
function vnoise(x,z){const ix=M.floor(x),iz=M.floor(z),fx=x-ix,fz=z-iz;
 const a=hash2(ix,iz),b=hash2(ix+1,iz),c=hash2(ix,iz+1),d=hash2(ix+1,iz+1);
 const ux=fx*fx*(3-2*fx),uz=fz*fz*(3-2*fz);
 return lerp(lerp(a,b,ux),lerp(c,d,ux),uz)}
function fbm(x,z){let v=0,a=1,f=1,t=0;for(let i=0;i<4;i++){v+=a*vnoise(x*f,z*f);t+=a;a*=0.5;f*=2.05}return v/t}
function heightAt(x,z){
  let h=fbm(x*0.02,z*0.02)*8-4;
  h+=fbm(x*0.06+5,z*0.06+5)*2-1;
  // Skyreach mountain
  const sx=x-160,sz=z-150;
  h+=M.exp(-(sx*sx+sz*sz)/3200)*45;
  // Frostfang mountains
  const fx=x+130,fz=z-90;
  h+=M.exp(-(fx*fx+fz*fz)/3500)*32;
  // Bleakhall hill
  const bx=x+110,bz=z+130;
  h+=M.exp(-(bx*bx+bz*bz)/2500)*8;
  // River valley (south to north through center)
  const rv=M.exp(-((x-20)*(x-20))/200);
  h-=rv*3.2;
  // Whitewatch flat
  const wx=x+30,wz=z+30;
  const wfl=M.exp(-(wx*wx+wz*wz)/600);
  h=lerp(h,1.2,wfl*0.85);
  // Ashford flat
  const ax=x-70,az=z-40;
  const afl=M.exp(-(ax*ax+az*az)/500);
  h=lerp(h,0.5,afl*0.8);
  return h;
}
// strongest zone at (x,z)
function zoneAt(x,z){
  let best=null,bv=-1;
  for(const k of ZONE_LIST){const z2=ZONES[k];const dx=x-z2.pos[0],dz=z-z2.pos[1];const d=M.sqrt(dx*dx+dz*dz);const inf=M.max(0,1-d/z2.r);if(inf>bv){bv=inf;best=k}}
  return bv>0.05?best:"WILDS";
}

// ==== TERRAIN MESH ====
const TERRAIN_SIZE=440,TERRAIN_SEG=140;
const tGeo=new THREE.PlaneGeometry(TERRAIN_SIZE,TERRAIN_SIZE,TERRAIN_SEG,TERRAIN_SEG);
tGeo.rotateX(-PI/2);
const tPos=tGeo.attributes.position;
const tCol=[];
for(let i=0;i<tPos.count;i++){
  const x=tPos.getX(i),z=tPos.getZ(i);
  const y=heightAt(x,z);
  tPos.setY(i,y);
  // color by height + zone
  const zk=zoneAt(x,z);
  let r=0.36,g=0.52,b=0.22;
  if(y>30){r=0.96;g=0.97;b=1.0}// snow
  else if(y>16){r=0.55;g=0.55;b=0.58}// rock
  else if(zk==="FROSTFANG"&&y>3){r=0.78;g=0.86;b=0.92}// frost
  else if(zk==="DAGGERWOOD"){r=0.18;g=0.32;b=0.12}// dark forest floor
  else if(zk==="BLEAKHALL"){r=0.32;g=0.30;b=0.24}// ash
  else if(zk==="ASHFORD"){r=0.42;g=0.58;b=0.28}// river grass
  else if(zk==="SHRINE"){r=0.34;g=0.42;b=0.36}// dim grass
  else if(zk==="WHITEWATCH"){r=0.46;g=0.60;b=0.28}// village green
  else if(zk==="SKYREACH"&&y<25){r=0.52;g=0.50;b=0.50}
  if(y<-1){r=0.62;g=0.56;b=0.36}// sand
  // slight per-vertex variance
  const j=(hash2(x*4,z*4)-0.5)*0.06;
  tCol.push(r+j,g+j,b+j);
}
tGeo.setAttribute('color',new THREE.Float32BufferAttribute(tCol,3));
tGeo.computeVertexNormals();
const terrainMat=new THREE.MeshLambertMaterial({vertexColors:true,flatShading:true});
const terrain=new THREE.Mesh(tGeo,terrainMat);
terrain.receiveShadow=true;
scene.add(terrain);

// ==== WATER (river) ====
// River runs roughly north-south near x≈20
const riverGeo=new THREE.PlaneGeometry(14,260,4,40);
riverGeo.rotateX(-PI/2);
const rPos=riverGeo.attributes.position;
for(let i=0;i<rPos.count;i++){const z=rPos.getZ(i);rPos.setX(i,rPos.getX(i)+M.sin(z*0.06)*4)}
const waterMat=new THREE.MeshPhongMaterial({color:0x2a6ab8,transparent:true,opacity:0.78,shininess:120,specular:0x99ccff,emissive:0x081830});
const water=new THREE.Mesh(riverGeo,waterMat);
water.position.set(20,-1.2,10);
scene.add(water);

// ==== SKY DOME ====
const skyGeo=new THREE.SphereGeometry(700,24,16);
const skyMat=new THREE.MeshBasicMaterial({color:0x87b8e8,side:THREE.BackSide,fog:false});
const skyDome=new THREE.Mesh(skyGeo,skyMat);
scene.add(skyDome);

// ==== STARS (visible at night) ====
const starG=new THREE.BufferGeometry();
const starP=[];
for(let i=0;i<900;i++){const t=M.random()*T2,p=M.acos(2*M.random()-1)*0.55;const r=600;starP.push(r*M.sin(p)*M.cos(t),r*M.cos(p)+50,r*M.sin(p)*M.sin(t))}
starG.setAttribute('position',new THREE.Float32BufferAttribute(starP,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:1.4,sizeAttenuation:false,transparent:true,opacity:0,fog:false});
const stars=new THREE.Points(starG,starMat);
scene.add(stars);

// ==== CLOUDS ====
const cloudGroup=new THREE.Group();
for(let i=0;i<14;i++){
  const cg=new THREE.Group();
  for(let j=0;j<5;j++){const s=new THREE.Mesh(new THREE.SphereGeometry(rnd(6,12),8,6),new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.85,fog:false}));s.position.set(rnd(-12,12),rnd(-2,2),rnd(-6,6));cg.add(s)}
  cg.position.set(rnd(-300,300),rnd(80,140),rnd(-300,300));
  cloudGroup.add(cg);
}
scene.add(cloudGroup);

// ==== MATERIAL CACHE ====
const matCache={};
function mat(c,opt){
  const k=c+":"+(opt||"");
  if(matCache[k])return matCache[k];
  const o={color:c,flatShading:true};
  if(opt&&opt.indexOf("e")>=0)o.emissive=c;
  const m=new THREE.MeshLambertMaterial(o);
  matCache[k]=m;return m;
}
function emat(c,e,i){const m=new THREE.MeshLambertMaterial({color:c,emissive:e||c,emissiveIntensity:i||0.6,flatShading:true});return m}

// ==== TREE BUILDER ====
function makeTree(scale,kind){
  const g=new THREE.Group();
  const tH=rnd(4,8)*scale;
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.4*scale,0.55*scale,tH,6),mat(0x4a3018));
  trunk.position.y=tH/2; trunk.castShadow=true;
  g.add(trunk);
  if(kind==="frost"){
    for(let i=0;i<3;i++){const s=1-i*0.25;const c=new THREE.Mesh(new THREE.ConeGeometry(2.4*scale*s,2.6*scale,7),mat(0x4a8060));c.position.y=tH-0.5+i*1.6;c.castShadow=true;g.add(c)}
  }else if(kind==="dead"){
    const c=new THREE.Mesh(new THREE.ConeGeometry(0.1,0.1,4),mat(0x2a1e10));g.add(c);
    for(let i=0;i<3;i++){const b=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.12,2.5,5),mat(0x2a1e10));b.position.set(rnd(-0.6,0.6),tH*0.6+i*0.4,rnd(-0.6,0.6));b.rotation.set(rnd(-0.5,0.5),rnd(-PI,PI),rnd(0.4,1.0));g.add(b)}
  }else{
    const fc=kind==="dark"?0x1a3a16:(kind==="autumn"?0xb8602a:0x356a28);
    const c1=new THREE.Mesh(new THREE.ConeGeometry(2.6*scale,4*scale,7),mat(fc));c1.position.y=tH+1;c1.castShadow=true;g.add(c1);
    const c2=new THREE.Mesh(new THREE.ConeGeometry(2.0*scale,3.0*scale,7),mat(fc));c2.position.y=tH+2.6;c2.castShadow=true;g.add(c2);
  }
  return g;
}

// ==== ROCK ====
function makeRock(scale,c){
  const g=new THREE.IcosahedronGeometry(scale,0);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){p.setX(i,p.getX(i)*rnd(0.7,1.3));p.setY(i,p.getY(i)*rnd(0.6,1.1));p.setZ(i,p.getZ(i)*rnd(0.7,1.3))}
  g.computeVertexNormals();
  const r=new THREE.Mesh(g,mat(c||0x6a6660));
  r.castShadow=true;r.receiveShadow=true;
  return r;
}

// ==== HOUSE BUILDER ====
function makeHouse(w,d,h,roofC,wallC){
  const g=new THREE.Group();
  const wall=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(wallC||0xc4a070));
  wall.position.y=h/2;wall.castShadow=true;wall.receiveShadow=true;g.add(wall);
  // foundation
  const fnd=new THREE.Mesh(new THREE.BoxGeometry(w+0.3,0.6,d+0.3),mat(0x5a4a38));
  fnd.position.y=0.3;fnd.receiveShadow=true;g.add(fnd);
  // roof - sloped (4 triangles via Box geometry tilted)
  const roofH=h*0.55;
  const r1=new THREE.Mesh(new THREE.BoxGeometry(w+0.4,0.18,d+0.4),mat(roofC||0x6a2a18));
  r1.position.y=h+0.05;r1.castShadow=true;g.add(r1);
  // peak
  const peakG=new THREE.ConeGeometry(d*0.7,roofH,4);
  const peak=new THREE.Mesh(peakG,mat(roofC||0x6a2a18));
  peak.rotation.y=PI/4;peak.scale.x=w/(d*0.7);
  peak.position.y=h+roofH/2;peak.castShadow=true;g.add(peak);
  // door
  const door=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.6,0.1),mat(0x3a1808));
  door.position.set(0,0.85,d/2+0.06);g.add(door);
  // windows
  for(let s=-1;s<=1;s+=2){const win=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.1),emat(0xffd680,0xc08530,0.3));win.position.set(s*(w/3),h*0.6,d/2+0.06);g.add(win);win.userData.lit=true;LITS.push(win)}
  return g;
}

// ==== TORCH ====
function makeTorch(){
  const g=new THREE.Group();
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.10,2.4,5),mat(0x3a2010));pole.position.y=1.2;pole.castShadow=true;g.add(pole);
  const flame=new THREE.Mesh(new THREE.SphereGeometry(0.34,6,6),emat(0xff8830,0xff6020,1.2));flame.position.y=2.5;g.add(flame);
  const pl=new THREE.PointLight(0xffaa55,0.0,12,1.7);pl.position.y=2.5;g.add(pl);
  g.userData.flame=flame;g.userData.light=pl;
  TORCHES.push(g);
  return g;
}

// ==== SCATTER WILD PROPS ====
for(let i=0;i<240;i++){
  const x=rnd(-200,200),z=rnd(-200,200);
  const y=heightAt(x,z);
  // skip water column
  if(M.abs(x-20)<6&&y<0.5)continue;
  const zk=zoneAt(x,z);
  if(zk==="WHITEWATCH"||zk==="ASHFORD"||zk==="SHRINE")continue;
  if(M.random()<0.55){
    const t=makeTree(rnd(0.6,1.2),y>14?"frost":(zk==="DAGGERWOOD"?"dark":"normal"));
    t.rotation.y=rnd(0,T2);
    placeAt(t,x,z,0);
  }else{
    const r=makeRock(rnd(0.4,1.6),y>20?0xa8b0c0:0x6a6660);
    placeAt(r,x,z,0);
  }
}


// ==== HUMANOID BUILDER ====
function buildHumanoid(opts){
  opts=opts||{};
  const skin=opts.skin||0xd4a878,
        cloth=opts.cloth||0x3a4a6a,
        cloth2=opts.cloth2||0x223040,
        hair=opts.hair||0x2a1a10,
        cape=opts.cape,
        scale=opts.scale||1.0,
        weapon=opts.weapon||"sword";
  const g=new THREE.Group();
  // legs
  const lLeg=new THREE.Mesh(new THREE.BoxGeometry(0.36,1.2,0.36),mat(cloth2));
  lLeg.position.set(-0.22,0.6,0);lLeg.castShadow=true;
  const rLeg=lLeg.clone();rLeg.position.x=0.22;
  g.add(lLeg);g.add(rLeg);
  // torso
  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.96,1.2,0.6),mat(cloth));
  torso.position.y=1.85;torso.castShadow=true;g.add(torso);
  // belt
  const belt=new THREE.Mesh(new THREE.BoxGeometry(1.02,0.18,0.66),mat(0x4a3018));belt.position.y=1.27;g.add(belt);
  // head
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.62,0.66,0.62),mat(skin));
  head.position.y=2.78;head.castShadow=true;g.add(head);
  // hair
  const hairTop=new THREE.Mesh(new THREE.BoxGeometry(0.66,0.22,0.66),mat(hair));hairTop.position.y=3.16;g.add(hairTop);
  // eyes
  const eL=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.04),mat(0x101010));eL.position.set(-0.13,2.82,0.32);g.add(eL);
  const eR=eL.clone();eR.position.x=0.13;g.add(eR);
  // arms (pivot via group so we can swing)
  function makeArm(side){
    const ag=new THREE.Group();
    const arm=new THREE.Mesh(new THREE.BoxGeometry(0.30,1.20,0.32),mat(cloth));
    arm.position.y=-0.6;arm.castShadow=true;
    ag.add(arm);
    ag.position.set(side*0.62,2.42,0);
    return ag;
  }
  const lArm=makeArm(-1),rArm=makeArm(1);
  g.add(lArm);g.add(rArm);
  // cape
  let capeMesh=null;
  if(cape){
    capeMesh=new THREE.Mesh(new THREE.PlaneGeometry(1.05,1.6,1,4),new THREE.MeshLambertMaterial({color:cape,side:THREE.DoubleSide,flatShading:true}));
    capeMesh.position.set(0,1.7,-0.34);
    g.add(capeMesh);
  }
  // weapon
  let wpn=null;
  if(weapon==="sword"){
    wpn=new THREE.Group();
    const blade=new THREE.Mesh(new THREE.BoxGeometry(0.10,1.4,0.04),mat(0xd0d8e0));blade.position.y=0.7;wpn.add(blade);
    const guard=new THREE.Mesh(new THREE.BoxGeometry(0.50,0.10,0.10),mat(0x8a6020));guard.position.y=0.0;wpn.add(guard);
    const hilt=new THREE.Mesh(new THREE.BoxGeometry(0.10,0.30,0.10),mat(0x4a2810));hilt.position.y=-0.18;wpn.add(hilt);
    rArm.add(wpn);wpn.position.set(0.0,-1.1,0.2);wpn.rotation.x=-0.2;
  }else if(weapon==="bow"){
    wpn=new THREE.Group();
    const bow=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.05,4,12,PI),mat(0x6a3a18));bow.rotation.z=PI/2;wpn.add(bow);
    const str=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,1.2,3),mat(0xeeeeee));wpn.add(str);
    rArm.add(wpn);wpn.position.set(0.0,-1.0,0.3);
  }else if(weapon==="staff"){
    wpn=new THREE.Group();
    const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,1.8,5),mat(0x4a2810));shaft.position.y=0.4;wpn.add(shaft);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(0.18,7,7),emat(0x88ddff,0x44aaff,1.4));orb.position.y=1.4;wpn.add(orb);
    rArm.add(wpn);wpn.position.set(0.0,-1.0,0.2);
  }else if(weapon==="axe"){
    wpn=new THREE.Group();
    const sh=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,1.3,5),mat(0x3a2010));sh.position.y=0.6;wpn.add(sh);
    const head2=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.1),mat(0xb0a098));head2.position.y=1.15;wpn.add(head2);
    rArm.add(wpn);wpn.position.set(0.0,-1.05,0.2);
  }
  if(scale!==1)g.scale.setScalar(scale);
  g.userData.parts={lLeg,rLeg,lArm,rArm,head,torso,cape:capeMesh,weapon:wpn};
  return g;
}

function buildWolf(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.7,0.7),mat(0x4a4038));body.position.y=0.85;body.castShadow=true;g.add(body);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),mat(0x3a3028));head.position.set(0.9,1.05,0);g.add(head);
  const sn=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.25,0.4),mat(0x2a2018));sn.position.set(1.15,0.95,0);g.add(sn);
  const eL=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.04),emat(0xffaa20,0xffaa20,1));eL.position.set(0.96,1.2,0.18);g.add(eL);
  const eR=eL.clone();eR.position.z=-0.18;g.add(eR);
  // legs
  const legs=[];
  for(let i=0;i<4;i++){
    const lx=(i<2?0.5:-0.5),lz=(i%2===0?0.25:-0.25);
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.6,0.18),mat(0x3a3028));
    leg.position.set(lx,0.3,lz);g.add(leg);legs.push(leg);
  }
  // tail
  const tail=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.18,0.18),mat(0x4a4038));tail.position.set(-0.95,0.95,0);g.add(tail);
  g.userData.parts={legs,head,tail};
  return g;
}
function buildHorse(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.0,1.0,0.9),mat(0x6a4830));body.position.y=1.4;body.castShadow=true;g.add(body);
  const neck=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.9,0.5),mat(0x6a4830));neck.position.set(1.0,1.9,0);neck.rotation.z=-0.4;g.add(neck);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.4),mat(0x5a3828));head.position.set(1.4,2.2,0);g.add(head);
  for(let i=0;i<4;i++){const lx=(i<2?0.7:-0.7),lz=(i%2===0?0.4:-0.4);const leg=new THREE.Mesh(new THREE.BoxGeometry(0.22,1.0,0.22),mat(0x4a3018));leg.position.set(lx,0.5,lz);g.add(leg)}
  return g;
}
function buildCart(){
  const g=new THREE.Group();
  const bed=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.6,1.3),mat(0x6a4830));bed.position.y=0.8;g.add(bed);
  for(let s=-1;s<=1;s+=2){const w=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.18,10),mat(0x3a2010));w.rotation.z=PI/2;w.position.set(0,0.55,s*0.85);g.add(w)}
  // crate
  const crate=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.7,0.7),mat(0x8a6020));crate.position.y=1.4;g.add(crate);
  return g;
}

// ==== CHRONICLE ====
const cstream=document.getElementById("cstream");
function addEntry(text,cls){
  const d=document.createElement("div");
  d.className="entry"+(cls?" "+cls:"");
  d.textContent=text;
  cstream.appendChild(d);
  STATE.saga.push(text);
  // cap visible
  while(cstream.children.length>14)cstream.removeChild(cstream.firstChild);
  // fade older
  for(let i=0;i<cstream.children.length;i++){
    cstream.children[i].style.opacity=(0.4+i*0.06).toString();
  }
}

// ==== HUD UPDATE ====
function pct(a,b){return M.max(0,M.min(100,(a/b)*100))+"%"}
function updateHud(){
  const hd=STATE.heroData;
  if(hd){
    document.getElementById("heroName").textContent=hd.name;
    document.getElementById("heroTitle").textContent=hd.title;
  }
  document.getElementById("hpBar").style.width=pct(STATE.hp,STATE.hpMax);
  document.getElementById("staBar").style.width=pct(STATE.sta,STATE.staMax);
  document.getElementById("magBar").style.width=pct(STATE.mag,STATE.magMax);
  document.getElementById("xpBar").style.width=pct(STATE.xp,STATE.xpNext);
  document.getElementById("lvl").textContent=STATE.lvl;
  document.getElementById("gold").textContent=STATE.gold;
  document.getElementById("kills").textContent=STATE.kills;
  const sk=["Sword","Bow","Magic","Stealth"];
  for(let i=0;i<4;i++){
    document.getElementById("s"+i+"v").textContent=STATE.skills[sk[i]];
    document.getElementById("s"+i+"b").style.width=M.min(100,STATE.skills[sk[i]]*4)+"%";
  }
  document.getElementById("zoneHud").textContent=ZONES[STATE.zone]?ZONES[STATE.zone].name:"Wilds";
  const t=STATE.time;
  let phase="Night";
  if(t>0.2&&t<0.35)phase="Dawn";
  else if(t>=0.35&&t<0.65)phase="Day";
  else if(t>=0.65&&t<0.8)phase="Dusk";
  document.getElementById("timeHud").textContent="Day "+STATE.day+" · "+phase;
  if(STATE.questActive){
    document.getElementById("qTitle").textContent=STATE.questActive.title;
    document.getElementById("qObj").textContent=STATE.questActive.obj;
  }else{
    document.getElementById("qTitle").textContent="Idle";
    document.getElementById("qObj").textContent="Pondering at the well…";
  }
}

// ==== DAMAGE NUMBERS ====
const dmgLayer=document.getElementById("dmgLayer");
function showDmg(worldPos,n,cls){
  const v=worldPos.clone().project(camera);
  const x=(v.x*0.5+0.5)*window.innerWidth;
  const y=(-v.y*0.5+0.5)*window.innerHeight;
  const d=document.createElement("div");
  d.className="dmg"+(cls?" "+cls:"");
  d.textContent=(n>0?"-"+n:"+"+(-n));
  d.style.left=x+"px";d.style.top=y+"px";
  dmgLayer.appendChild(d);
  setTimeout(()=>{if(d.parentNode)d.parentNode.removeChild(d)},1100);
}

// ==== AI: PICK QUEST ====
function pickQuest(){
  // find next undone quest in order
  for(const q of STATE.questsAll){
    if(!q.done){STATE.questActive=q;return q}
  }
  return null;
}

// ==== AI: TRAVEL TO ZONE ====
function travelTo(zoneKey){
  const z=ZONES[zoneKey];
  if(!z)return;
  STATE.target={x:z.pos[0]+rnd(-4,4),z:z.pos[1]+rnd(-4,4)};
  STATE.ai="travel";
  STATE.aiTimer=20;
}

// ==== AI: DO QUEST ACTIVITY ====
function startQuestActivity(){
  const q=STATE.questActive;
  if(!q)return;
  if(q.type==="hunt"){
    const z=ZONES[q.zone];
    // spawn enemies if not enough alive
    let alive=ENTITIES.filter(e=>e.alive&&e.kind===q.enemy).length;
    while(alive<q.count){
      const a=rnd(0,T2),r=rnd(8,16);
      const x=z.pos[0]+M.cos(a)*r,zz=z.pos[1]+M.sin(a)*r;
      spawnEnemy(q.enemy,x,zz);alive++;
    }
    // pick nearest
    pickNearestEnemy(q.enemy);
    STATE.ai="combat";
    addEntry(STATE.heroData.name+" hunts "+q.enemy+"s in "+z.name+".","quest");
  }else if(q.type==="talk"){
    STATE.ai="talk";STATE.aiTimer=2.4;
    addEntry(STATE.heroData.name+" speaks with the folk of "+ZONES[q.zone].name+".","quest");
  }else if(q.type==="kneel"){
    STATE.ai="kneel";STATE.aiTimer=3.5;
    addEntry(STATE.heroData.name+" kneels at the Shrine of the Old Gods.","lore");
  }else if(q.type==="travel"){
    STATE.ai="rest";STATE.aiTimer=2.0;
    addEntry(STATE.heroData.name+" reaches "+ZONES[q.zone].name+".","quest");
  }else if(q.type==="loot"){
    STATE.ai="loot";STATE.aiTimer=2.5;
    addEntry(STATE.heroData.name+" searches the ruins of "+ZONES[q.zone].name+".","quest");
  }
}
function pickNearestEnemy(kind){
  let best=null,bd=1e9;
  const h=STATE.hero.position;
  for(const e of ENTITIES){
    if(!e.alive||!e.isEnemy)continue;
    if(kind&&e.kind!==kind)continue;
    const dx=e.obj.position.x-h.x,dz=e.obj.position.z-h.z;
    const d=dx*dx+dz*dz;
    if(d<bd){bd=d;best=e}
  }
  STATE.targetEntity=best;
}

// ==== AI: COMPLETE QUEST ====
function completeQuest(){
  const q=STATE.questActive;
  if(!q)return;
  q.done=true;STATE.questsDone++;
  STATE.gold+=q.gold;
  gainXP(q.xp);
  addEntry("Quest complete: "+q.title+" (+"+q.xp+" XP, +"+q.gold+" gold).","quest");
  STATE.questActive=null;
  STATE.ai="idle";STATE.aiTimer=2.5;
  // back to whitewatch sometimes
  if(M.random()<0.5)travelTo("WHITEWATCH");
  // Dragon trigger
  if(STATE.lvl>=8&&STATE.questsDone>=6&&!STATE.bossSpawned){
    spawnDragon();
  }
}
function gainXP(n){
  STATE.xp+=n;
  while(STATE.xp>=STATE.xpNext){
    STATE.xp-=STATE.xpNext;
    STATE.lvl++;
    STATE.xpNext=M.floor(STATE.xpNext*1.35);
    STATE.hpMax+=20;STATE.hp=STATE.hpMax;
    STATE.staMax+=10;STATE.sta=STATE.staMax;
    STATE.magMax+=10;STATE.mag=STATE.magMax;
    addEntry("Level Up! "+STATE.heroData.name+" reaches Lvl "+STATE.lvl+".","epic");
    banner("LEVEL "+STATE.lvl,STATE.heroData.name+" grows stronger",2200);
  }
}
function gainSkill(s,n){
  STATE.skills[s]=(STATE.skills[s]||0)+(n||1);
  if(STATE.skills[s]%5===0)addEntry(s+" skill rises to "+STATE.skills[s]+".","lore");
}


// ==== DRAGON ====
function spawnDragon(){
  STATE.bossSpawned=true;
  banner("A SHADOW PASSES OVER WHITEWATCH","Skyreach awakens — Dragon spotted.",4500);
  addEntry("The skies darken — a dragon rises from Skyreach!","epic");
  const d=new THREE.Group();
  // body segments
  const segs=[];
  for(let i=0;i<6;i++){
    const r=1.6-i*0.18;
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(r,r-0.1,1.2,8),mat(0x4a2a1a));
    seg.rotation.z=PI/2;seg.position.x=-i*1.0;seg.castShadow=true;
    d.add(seg);segs.push(seg);
  }
  // head
  const head=new THREE.Mesh(new THREE.BoxGeometry(2.0,1.4,1.4),mat(0x3a2018));
  head.position.set(1.4,0,0);d.add(head);
  // jaw
  const jaw=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.4,1.2),mat(0x2a1818));jaw.position.set(1.6,-0.6,0);d.add(jaw);
  // horns
  for(let s=-1;s<=1;s+=2){const horn=new THREE.Mesh(new THREE.ConeGeometry(0.25,1.0,5),mat(0xc0a060));horn.position.set(1.0,1.0,s*0.55);horn.rotation.z=-0.4;d.add(horn)}
  // eyes
  for(let s=-1;s<=1;s+=2){const eye=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),emat(0xff4020,0xff2010,1.5));eye.position.set(1.6,0.3,s*0.55);d.add(eye)}
  // wings
  for(let s=-1;s<=1;s+=2){
    const wing=new THREE.Mesh(new THREE.PlaneGeometry(5,3),new THREE.MeshLambertMaterial({color:0x3a1f10,side:THREE.DoubleSide,flatShading:true,transparent:true,opacity:0.95}));
    wing.position.set(-1.5,0.2,s*0.4);
    wing.rotation.set(0,0,s*0.2);
    wing.userData.side=s;
    d.add(wing);
    if(!d.userData.wings)d.userData.wings=[];
    d.userData.wings.push(wing);
  }
  // tail tip
  const tail=new THREE.Mesh(new THREE.ConeGeometry(0.6,1.5,5),mat(0x4a2a1a));tail.rotation.z=PI/2;tail.position.x=-7;d.add(tail);
  // breath cone (hidden initially)
  const breath=new THREE.Mesh(new THREE.ConeGeometry(1.4,5,8,1,true),new THREE.MeshBasicMaterial({color:0xff7020,transparent:true,opacity:0.0}));
  breath.rotation.z=-PI/2;breath.position.set(5,0,0);d.add(breath);
  d.userData.breath=breath;
  d.userData.segs=segs;
  d.userData.flyT=0;
  d.position.set(ZONES.SKYREACH.pos[0]+30,40,ZONES.SKYREACH.pos[1]);
  scene.add(d);
  STATE.dragon={obj:d,hp:600,maxHp:600,phase:1,breathT:0,alive:true};
  // launch boss zone
  travelTo("SKYREACH");
}

// ==== END SAGA ====
function endSaga(victory){
  STATE.ended=true;STATE.cinematic=true;
  const hd=STATE.heroData;
  document.getElementById("endTitle").textContent="THE LEGEND OF "+hd.name.toUpperCase();
  const lines=[];
  lines.push(hd.title+" — "+hd.bg);
  lines.push("");
  lines.push("Day "+STATE.day+" of the saga.");
  lines.push("");
  lines.push((victory?"Slayer of the Skyreach Dragon.":"Fell beneath fang and flame at Skyreach."));
  lines.push("");
  lines.push("Quests Completed: "+STATE.questsDone);
  lines.push("Foes Vanquished: "+STATE.kills);
  lines.push("Treasure Hoarded: "+STATE.gold+" gold");
  lines.push("Reached Level "+STATE.lvl);
  lines.push("");
  lines.push("Skills:");
  for(const s of ["Sword","Bow","Magic","Stealth"])lines.push("  "+s+" "+STATE.skills[s]);
  lines.push("");
  lines.push("— CHRONICLE —");
  for(const ent of STATE.saga.slice(-12))lines.push(ent);
  lines.push("");
  lines.push((victory?"And so was sung the song of "+hd.name+".":"Yet the bards still whisper "+hd.name+"'s name."));
  document.getElementById("endSaga").textContent=lines.join("\n");
  const es=document.getElementById("endScreen");
  es.classList.add("show");
  setTimeout(()=>{
    es.classList.remove("show");
    // reset world
    HERO_INDEX=(HERO_INDEX+1)%HERO_ROSTER.length;
    softReset();
  },9500);
}
function softReset(){
  // remove hero and dragon and dead entities
  if(STATE.hero){scene.remove(STATE.hero);STATE.hero=null}
  if(STATE.dragon&&STATE.dragon.obj){scene.remove(STATE.dragon.obj);STATE.dragon=null}
  for(let i=ENTITIES.length-1;i>=0;i--){
    if(!ENTITIES[i].alive){scene.remove(ENTITIES[i].obj);ENTITIES.splice(i,1)}
  }
  cstream.innerHTML="";
  STATE.day=1;STATE.time=0.25;STATE.cinematic=false;
  spawnHero(HERO_INDEX);
}


// ==== HERO BEHAVIOUR LOOP ====
function tickHero(dt){
  if(!STATE.hero||STATE.ended)return;
  const h=STATE.hero;
  STATE.aiTimer-=dt;
  // determine current zone for HUD
  STATE.zone=zoneAt(h.position.x,h.position.z);
  // regen
  if(STATE.ai!=="combat"){STATE.hp=M.min(STATE.hpMax,STATE.hp+dt*4);STATE.sta=M.min(STATE.staMax,STATE.sta+dt*8);STATE.mag=M.min(STATE.magMax,STATE.mag+dt*5)}
  // state machine
  if(STATE.ai==="idle"){
    if(STATE.aiTimer<=0){
      const q=pickQuest();
      if(q){
        addEntry("New Quest: "+q.title+" — "+q.obj+".","quest");
        travelTo(q.zone);
      }else{STATE.ai="rest";STATE.aiTimer=4}
    }
  }else if(STATE.ai==="travel"){
    if(STATE.target){
      const dx=STATE.target.x-h.position.x,dz=STATE.target.z-h.position.z;
      const d=M.hypot(dx,dz);
      if(d<2.5||STATE.aiTimer<=0){
        startQuestActivity();
      }else{
        const sp=5.0*dt;
        h.position.x+=(dx/d)*sp;h.position.z+=(dz/d)*sp;
        h.position.y=heightAt(h.position.x,h.position.z);
        h.rotation.y=M.atan2(dx,dz);
        animateWalk(h,dt,1.0);
      }
    }
  }else if(STATE.ai==="combat"){
    if(!STATE.targetEntity||!STATE.targetEntity.alive){
      // check progress
      const q=STATE.questActive;
      if(q&&q.type==="hunt"){
        if(q.progress>=q.count){completeQuest()}
        else{pickNearestEnemy(q.enemy);if(!STATE.targetEntity){STATE.ai="idle";STATE.aiTimer=2}}
      }else{STATE.ai="idle";STATE.aiTimer=2}
      return;
    }
    const e=STATE.targetEntity;
    const ep=e.obj.position;
    const dx=ep.x-h.position.x,dz=ep.z-h.position.z;
    const d=M.hypot(dx,dz);
    h.rotation.y=M.atan2(dx,dz);
    if(d>2.4){
      const sp=4.5*dt;
      h.position.x+=(dx/d)*sp;h.position.z+=(dz/d)*sp;
      h.position.y=heightAt(h.position.x,h.position.z);
      animateWalk(h,dt,1.2);
    }else{
      // swing
      STATE.swingPhase+=dt*8;
      const swing=M.sin(STATE.swingPhase);
      if(h.userData.parts.rArm)h.userData.parts.rArm.rotation.x=-1.2-swing*1.4;
      if(M.sin(STATE.swingPhase-dt*8)<0&&swing>=0){
        // hit on swing crossing zero
        const dmg=8+STATE.lvl*3+~~rnd(0,6);
        e.hp-=dmg;
        showDmg(ep.clone().setY(ep.y+2),dmg,"crit");
        gainSkill(STATE.heroData.weapon==="bow"?"Bow":(STATE.heroData.weapon==="staff"?"Magic":"Sword"),1);
        if(e.hp<=0){
          e.alive=false;
          STATE.kills++;
          const q=STATE.questActive;
          if(q&&q.type==="hunt"&&e.kind===q.enemy)q.progress++;
          // gold drop
          const gold=~~rnd(4,18);
          STATE.gold+=gold;
          addEntry("Day "+STATE.day+" — "+STATE.heroData.name+" slew a "+e.kind+" at "+(ZONES[STATE.zone]?ZONES[STATE.zone].name:"the wilds")+". (+"+(~~(8+STATE.lvl*5))+" XP, +"+gold+" gold)","combat");
          gainXP(8+STATE.lvl*5);
          // fade body
          fadeAndRemove(e.obj,1.5);
          STATE.targetEntity=null;
        }else{
          // enemy hits back
          STATE.hp-=e.damage*0.4;
          showDmg(h.position.clone().setY(h.position.y+2),~~(e.damage*0.4),"red");
          if(STATE.hp<=0){
            STATE.hp=1;addEntry(STATE.heroData.name+" falls back, bloodied.","combat");
            STATE.ai="rest";STATE.aiTimer=4;
          }
        }
      }
    }
  }else if(STATE.ai==="talk"){
    if(STATE.aiTimer<=0){
      addEntry("\"Ay, traveler. Strange winds blow from Skyreach.\"","lore");
      completeQuest();
    }
  }else if(STATE.ai==="kneel"){
    // kneel pose
    const p=h.userData.parts;
    if(p.lLeg)p.lLeg.rotation.x=-0.8;
    if(p.rLeg)p.rLeg.rotation.x=-0.8;
    if(STATE.aiTimer<=0){
      if(p.lLeg)p.lLeg.rotation.x=0;
      if(p.rLeg)p.rLeg.rotation.x=0;
      addEntry("The shrine's runes hum. "+STATE.heroData.name+" feels old power stir.","lore");
      STATE.mag=STATE.magMax;
      completeQuest();
    }
  }else if(STATE.ai==="loot"){
    if(STATE.aiTimer<=0){
      const find=~~rnd(40,90);
      STATE.gold+=find;
      addEntry(STATE.heroData.name+" pries open a sarcophagus — "+find+" gold!","gold");
      completeQuest();
    }
  }else if(STATE.ai==="rest"){
    // brief rest
    if(STATE.aiTimer<=0){STATE.ai="idle";STATE.aiTimer=1.5}
  }else if(STATE.ai==="boss"){
    tickDragonBattle(dt);
  }
  // dragon trigger override
  if(STATE.dragon&&STATE.dragon.alive&&STATE.ai!=="boss"&&!STATE.cinematic){
    // travel toward dragon if close
    const d2=STATE.dragon.obj.position;
    const dx=d2.x-h.position.x,dz=d2.z-h.position.z;
    const dd=M.hypot(dx,dz);
    if(dd<25){STATE.ai="boss";STATE.aiTimer=0}
  }
}

function fadeAndRemove(obj,t){
  const start=performance.now();
  function step(){
    const e=(performance.now()-start)/(t*1000);
    obj.traverse(o=>{if(o.material&&o.material.transparent!==undefined){o.material.transparent=true;o.material.opacity=M.max(0,1-e)}});
    obj.position.y-=0.01;
    if(e<1)requestAnimationFrame(step);else{scene.remove(obj)}
  }
  step();
}

function animateWalk(g,dt,sp){
  STATE.walkPhase+=dt*8*(sp||1);
  const s=M.sin(STATE.walkPhase);
  const p=g.userData.parts;
  if(p.lLeg)p.lLeg.rotation.x=s*0.8;
  if(p.rLeg)p.rLeg.rotation.x=-s*0.8;
  if(p.lArm)p.lArm.rotation.x=-s*0.6;
  if(p.rArm)p.rArm.rotation.x=s*0.6;
}


// ==== DRAGON BATTLE ====
function tickDragonBattle(dt){
  const dr=STATE.dragon;
  if(!dr||!dr.alive)return;
  const h=STATE.hero;
  const d=dr.obj;
  // dragon flies in lazy orbit around skyreach
  dr.obj.userData.flyT+=dt;
  const t=dr.obj.userData.flyT;
  const sk=ZONES.SKYREACH.pos;
  const targetY=15+M.sin(t*0.5)*6 + (dr.phase===3?-4:0);
  const orbR=18+M.sin(t*0.3)*4;
  const tx=sk[0]+M.cos(t*0.3)*orbR,tz=sk[1]+M.sin(t*0.3)*orbR;
  d.position.x+=(tx-d.position.x)*0.04;
  d.position.y+=(targetY-d.position.y)*0.04;
  d.position.z+=(tz-d.position.z)*0.04;
  d.rotation.y=M.atan2(tx-d.position.x,tz-d.position.z)+PI/2;
  // wings flap
  if(d.userData.wings)for(const w of d.userData.wings){w.rotation.z=w.userData.side*(0.2+M.sin(t*5)*0.5)}
  // breath attack
  dr.breathT-=dt;
  if(dr.breathT<=0){
    dr.breathT=rnd(3.5,6);
    fireBreath();
  }
  d.userData.breath.material.opacity=M.max(0,d.userData.breath.material.opacity-dt*1.5);
  // hero approach
  const dx=d.position.x-h.position.x,dz=d.position.z-h.position.z;
  const horiz=M.hypot(dx,dz);
  // hero swings (ranged attack)
  STATE.swingPhase+=dt*6;
  const sw=M.sin(STATE.swingPhase);
  if(h.userData.parts.rArm)h.userData.parts.rArm.rotation.x=-1.2-sw*1.4;
  // close in
  if(horiz>4){
    const sp=4*dt;
    h.position.x+=(dx/horiz)*sp;h.position.z+=(dz/horiz)*sp;
    h.position.y=heightAt(h.position.x,h.position.z);
    h.rotation.y=M.atan2(dx,dz);
    animateWalk(h,dt,1.4);
  }
  // damage tick - hero strikes when dragon is close-low
  if(horiz<14&&d.position.y-h.position.y<14&&M.sin(STATE.swingPhase-dt*6)<0&&sw>=0){
    const dmg=12+STATE.lvl*3+~~rnd(0,10);
    dr.hp-=dmg;
    showDmg(d.position.clone(),dmg,"crit");
    // skill xp
    gainSkill(STATE.heroData.weapon==="bow"?"Bow":(STATE.heroData.weapon==="staff"?"Magic":"Sword"),1);
    // phase transitions
    if(dr.hp<dr.maxHp*0.66&&dr.phase===1){dr.phase=2;banner("DRAGON ROARS","The beast bleeds black flame.",2200);addEntry("The dragon's wings tear the sky — Phase II!","epic")}
    if(dr.hp<dr.maxHp*0.33&&dr.phase===2){dr.phase=3;banner("THE FINAL DESCENT","One last wound to end the saga.",2200);addEntry("The dragon plummets, jaws agape — Phase III!","epic")}
    if(dr.hp<=0){
      dr.alive=false;
      banner("DRAGON SLAIN",STATE.heroData.name+" stands above the corpse.",4000);
      addEntry("Day "+STATE.day+" — The Skyreach Dragon falls before "+STATE.heroData.name+"!","epic");
      gainXP(800);STATE.gold+=500;
      fadeAndRemove(d,3.5);
      setTimeout(()=>endSaga(true),2200);
    }
  }
}
function fireBreath(){
  const dr=STATE.dragon;
  if(!dr||!dr.alive)return;
  const d=dr.obj;
  d.userData.breath.material.opacity=0.85;
  // damage the hero if in cone
  const h=STATE.hero;
  const dx=h.position.x-d.position.x,dz=h.position.z-d.position.z;
  const dd=M.hypot(dx,dz);
  if(dd<12){
    const dmg=18+dr.phase*6;
    STATE.hp-=dmg;
    showDmg(h.position.clone().setY(h.position.y+2),dmg,"red");
    if(STATE.hp<=0){
      STATE.hp=0;
      banner("FALLEN",STATE.heroData.name+" succumbs to dragonfire.",3500);
      addEntry("The dragon's flame swallows "+STATE.heroData.name+".","epic");
      setTimeout(()=>endSaga(false),2400);
    }
  }
}

// ==== NPC TICK ====
function tickNPCs(dt){
  for(const e of ENTITIES){
    if(!e.alive)continue;
    if(e.kind==="caravan"){
      e.driftAngle=(e.driftAngle||0)+dt*0.05;
      const r=80;
      const tx=M.cos(e.driftAngle)*r,tz=30+M.sin(e.driftAngle)*40;
      const dx=tx-e.obj.position.x,dz=tz-e.obj.position.z;
      const d=M.hypot(dx,dz);
      if(d>0.5){e.obj.position.x+=(dx/d)*dt*2;e.obj.position.z+=(dz/d)*dt*2;e.obj.position.y=heightAt(e.obj.position.x,e.obj.position.z);e.obj.rotation.y=M.atan2(dx,dz)}
    }else if(e.isEnemy){
      // enemies: simple wander or chase if near hero
      if(STATE.hero){
        const dx=STATE.hero.position.x-e.obj.position.x,dz=STATE.hero.position.z-e.obj.position.z;
        const d=M.hypot(dx,dz);
        if(d<10&&STATE.targetEntity===e){
          // approached by hero, stay-ish
        }else if(d>40){
          // idle near home
          const hx=e.homeX-e.obj.position.x,hz=e.homeZ-e.obj.position.z;
          const dh=M.hypot(hx,hz);
          if(dh>0.5){e.obj.position.x+=(hx/dh)*dt*0.8;e.obj.position.z+=(hz/dh)*dt*0.8;e.obj.position.y=heightAt(e.obj.position.x,e.obj.position.z);e.obj.rotation.y=M.atan2(hx,hz)}
        }
      }
      if(e.kind==="wolf"&&e.obj.userData.parts){const s=M.sin(performance.now()*0.005+e.walkPhase);for(let i=0;i<e.obj.userData.parts.legs.length;i++)e.obj.userData.parts.legs[i].rotation.x=s*0.5*(i%2===0?1:-1)}
    }else{
      // villagers: small wander, retreat indoors at night
      e.wanderT=(e.wanderT||0)-dt;
      if(STATE.time<0.25||STATE.time>0.78){
        // night -> hide near home
        const hx=e.homeX-e.obj.position.x,hz=e.homeZ-e.obj.position.z;
        const dh=M.hypot(hx,hz);
        if(dh>0.5){e.obj.position.x+=(hx/dh)*dt*1.2;e.obj.position.z+=(hz/dh)*dt*1.2;e.obj.position.y=heightAt(e.obj.position.x,e.obj.position.z);e.obj.rotation.y=M.atan2(hx,hz);if(e.obj.userData.parts){const s=M.sin(performance.now()*0.008);e.obj.userData.parts.lLeg&&(e.obj.userData.parts.lLeg.rotation.x=s*0.5);e.obj.userData.parts.rLeg&&(e.obj.userData.parts.rLeg.rotation.x=-s*0.5)}}
      }else if(e.wanderT<=0){
        e.wanderT=rnd(2,5);
        e.target={x:e.homeX+rnd(-4,4),z:e.homeZ+rnd(-4,4)};
      }
      if(e.target){
        const dx=e.target.x-e.obj.position.x,dz=e.target.z-e.obj.position.z;
        const d=M.hypot(dx,dz);
        if(d>0.5){e.obj.position.x+=(dx/d)*dt*1.2;e.obj.position.z+=(dz/d)*dt*1.2;e.obj.position.y=heightAt(e.obj.position.x,e.obj.position.z);e.obj.rotation.y=M.atan2(dx,dz);if(e.obj.userData.parts){const s=M.sin(performance.now()*0.008);e.obj.userData.parts.lLeg&&(e.obj.userData.parts.lLeg.rotation.x=s*0.5);e.obj.userData.parts.rLeg&&(e.obj.userData.parts.rLeg.rotation.x=-s*0.5)}}
      }
    }
  }
}


// ==== DAY/NIGHT CYCLE ====
const SKY_DAWN=new THREE.Color(0xffa86a);
const SKY_DAY=new THREE.Color(0x87b8e8);
const SKY_DUSK=new THREE.Color(0xc06030);
const SKY_NIGHT=new THREE.Color(0x0a1530);
function tickDayNight(dt){
  // 90 second day
  STATE.time+=dt/90;
  if(STATE.time>=1){STATE.time-=1;STATE.day++;addEntry("Day "+STATE.day+" dawns over Whitewatch.","lore")}
  const t=STATE.time;
  // sun angle (0 = midnight, 0.5 = noon)
  const sunA=(t-0.25)*T2;
  sun.position.set(M.cos(sunA)*100,M.sin(sunA)*100,40);
  if(STATE.hero)sun.target.position.copy(STATE.hero.position);
  sun.target.updateMatrixWorld();
  // sky color
  let c=SKY_NIGHT.clone();
  if(t>0.18&&t<0.32){c=SKY_NIGHT.clone().lerp(SKY_DAWN,(t-0.18)/0.14)}
  else if(t>=0.32&&t<0.4){c=SKY_DAWN.clone().lerp(SKY_DAY,(t-0.32)/0.08)}
  else if(t>=0.4&&t<0.65){c=SKY_DAY.clone()}
  else if(t>=0.65&&t<0.78){c=SKY_DAY.clone().lerp(SKY_DUSK,(t-0.65)/0.13)}
  else if(t>=0.78&&t<0.86){c=SKY_DUSK.clone().lerp(SKY_NIGHT,(t-0.78)/0.08)}
  scene.background=c;
  if(scene.fog)scene.fog.color=c;
  skyMesh.material.color=c.clone().multiplyScalar(0.95);
  // sun intensity
  const dayness=M.max(0,M.sin(t*PI)); // 0 at midnight, 1 at noon
  sun.intensity=0.2+dayness*1.0;
  hemi.intensity=0.3+dayness*0.5;
  amb.intensity=0.25+dayness*0.25;
  // stars opacity
  stars.material.opacity=1-dayness;
  // torches/firelight
  const isNight=(t<0.22||t>0.8);
  for(const tr of TORCHES){tr.userData.light.intensity=isNight?1.4:0;tr.userData.flame.scale.setScalar(isNight?(1+M.sin(performance.now()*0.01)*0.15):0.1)}
  for(const f of FIRES){if(f.userData.flame)f.userData.flame.scale.setScalar(1+M.sin(performance.now()*0.012)*0.2)}
  // window glow
  for(const w of LITS){w.material.emissiveIntensity=isNight?1.0:0.2}
}

// ==== CAMERA FOLLOW ====
const camTarget=new THREE.Vector3();
function tickCamera(dt){
  if(!STATE.hero)return;
  const h=STATE.hero;
  let off,look;
  if(STATE.ai==="boss"&&STATE.dragon&&STATE.dragon.alive){
    // cinematic orbit
    const t=performance.now()*0.0003;
    off=new THREE.Vector3(M.cos(t)*16,8,M.sin(t)*16);
    look=h.position.clone().lerp(STATE.dragon.obj.position,0.4);
  }else{
    const ry=h.rotation.y;
    off=new THREE.Vector3(-M.sin(ry)*7,5,-M.cos(ry)*7);
    look=h.position.clone().add(new THREE.Vector3(0,1.4,0));
  }
  const target=h.position.clone().add(off);
  camera.position.lerp(target,M.min(1,dt*3));
  camTarget.lerp(look,M.min(1,dt*4));
  camera.lookAt(camTarget);
}

// ==== CLOUDS / WATER DRIFT ====
function tickAtmos(dt){
  // clouds
  for(const c of cloudGroups){c.position.x+=dt*1.2;if(c.position.x>240)c.position.x=-240}
  // mill wheel
  for(const w of WHEELS)w.rotation.x+=dt*0.6;
  // shrine runes pulse
  const p=0.7+M.sin(performance.now()*0.003)*0.3;
  for(const r of SHRINE_RUNES)r.material.emissiveIntensity=p;
  if(ALTAR_ORB)ALTAR_ORB.material.emissiveIntensity=p*1.2;
  // water shimmer
  if(water&&water.material){water.material.emissiveIntensity=0.1+M.sin(performance.now()*0.002)*0.1}
}

// ==== MAIN LOOP ====
let lastT=performance.now();
function loop(){
  const now=performance.now();
  const dt=M.min(0.06,(now-lastT)/1000);
  lastT=now;
  if(!STATE.cinematic||STATE.ai==="boss"){
    tickDayNight(dt);
    tickHero(dt);
    tickNPCs(dt);
    tickAtmos(dt);
  }else{
    tickAtmos(dt*0.3);
  }
  tickCamera(dt);
  updateHud();
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// ==== RESIZE ====
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ==== KICK OFF ====
spawnHero(HERO_INDEX);
loop();

</script>
