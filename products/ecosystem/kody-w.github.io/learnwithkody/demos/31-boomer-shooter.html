<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HELLBOUND // 1993 BOOMER SHOOTER</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden; background: #000;
    width: 100%; height: 100%;
    font-family: 'Courier New', 'Lucida Console', monospace;
    color: #ffcc00; user-select: none; cursor: none;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
  }
  canvas { display: block; image-rendering: pixelated; }
  #wrap { position: fixed; inset: 0; }
  #hud {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 110px; z-index: 5;
    background:
      linear-gradient(to bottom, #2a1a14 0%, #1a0a05 100%);
    border-top: 4px solid #5a2a18;
    box-shadow: inset 0 4px 0 #1a0805, inset 0 -2px 0 #0a0000;
    display: flex; align-items: center; padding: 0 24px;
    gap: 28px; font-family: monospace;
    image-rendering: pixelated;
  }
  .hud-block {
    display: flex; flex-direction: column; align-items: center;
    color: #ffcc00; font-size: 11px; letter-spacing: 2px;
    text-shadow: 1px 1px 0 #000;
  }
  .hud-num {
    font-size: 36px; font-weight: bold; color: #ff3300;
    text-shadow: 2px 2px 0 #000, 0 0 8px #ff3300;
    line-height: 1; margin-top: 4px;
    font-family: 'Courier New', monospace;
  }
  .hud-label { opacity: 0.85; margin-bottom: 2px; }
  #face {
    width: 64px; height: 80px;
    border: 2px solid #5a2a18; background: #000;
    image-rendering: pixelated;
  }
  #keys { display: flex; gap: 4px; margin-top: 4px; }
  .key-icon {
    width: 16px; height: 22px;
    border: 1px solid #000;
    opacity: 0.25;
  }
  .key-icon.have { opacity: 1; box-shadow: 0 0 6px currentColor; }
  .k-red { background: #cc1010; color: #ff3030; }
  .k-blue { background: #1030cc; color: #3060ff; }
  .k-yellow { background: #ccaa10; color: #ffd030; }
  #healthbar, #armorbar {
    width: 110px; height: 12px; background: #200; border: 2px solid #000;
    margin-top: 4px; box-shadow: inset 1px 1px 0 #500;
  }
  #healthbar > div, #armorbar > div {
    height: 100%; transition: width .25s;
  }
  #healthbar > div { background: linear-gradient(to right, #800, #f30); }
  #armorbar > div { background: linear-gradient(to right, #048, #4af); }
  #crosshair {
    position: fixed; left: 50%; top: calc(50% - 55px); width: 18px; height: 18px;
    margin: -9px 0 0 -9px; pointer-events: none; z-index: 4;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: #ffcc00;
    box-shadow: 0 0 3px #000;
  }
  #crosshair::before { left: 50%; top: 0; bottom: 0; width: 2px; margin-left: -1px; }
  #crosshair::after { top: 50%; left: 0; right: 0; height: 2px; margin-top: -1px; }
  #weapon {
    position: fixed; left: 50%; bottom: 100px;
    pointer-events: none; z-index: 3;
    image-rendering: pixelated;
    transform-origin: 50% 100%;
  }
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse at center, rgba(255,40,0,0) 0%, rgba(0,0,0,0) 70%);
    transition: background .12s;
  }
  #flash.hurt {
    background: radial-gradient(ellipse at center, rgba(255,40,0,.6) 0%, rgba(80,0,0,.4) 60%, rgba(0,0,0,0) 100%);
  }
  #flash.pickup {
    background: radial-gradient(ellipse at center, rgba(255,220,40,.35) 0%, rgba(0,0,0,0) 60%);
  }
  #message {
    position: fixed; left: 0; right: 0; top: 30px; z-index: 7;
    text-align: center; pointer-events: none;
    color: #ffcc00; font-size: 14px; letter-spacing: 4px;
    text-shadow: 2px 2px 0 #000, 0 0 8px #000;
    opacity: 0;
    transition: opacity .3s;
  }
  #message.show { opacity: 1; }
  #overlay {
    position: fixed; inset: 0; z-index: 60;
    background:
      radial-gradient(ellipse at center, #2a0500 0%, #000 90%);
    color: #ffcc00; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: 76px; letter-spacing: 12px; margin: 0;
    color: #ff2200;
    text-shadow:
      4px 4px 0 #000,
      0 0 16px #ff2200,
      0 0 40px #800;
    font-family: 'Impact', 'Courier New', sans-serif;
    font-weight: 900;
  }
  #overlay h2 {
    font-size: 14px; letter-spacing: 8px; margin: 8px 0 30px 0;
    color: #ffcc00; opacity: 0.85;
  }
  #overlay .cta {
    font-size: 22px; letter-spacing: 6px; padding: 14px 42px;
    border: 3px solid #ff2200; background: #1a0000;
    color: #ffcc00;
    text-shadow: 2px 2px 0 #000;
    box-shadow: 0 0 24px #800, inset 0 0 16px #300;
    animation: hellpulse 1.4s infinite;
    margin-top: 14px;
  }
  #overlay .ctrls {
    margin-top: 32px; font-size: 11px; letter-spacing: 3px;
    color: #aa6633; line-height: 1.9;
  }
  #overlay .ctrls b { color: #ffcc00; }
  @keyframes hellpulse {
    0%, 100% { box-shadow: 0 0 24px #800, inset 0 0 16px #300; }
    50% { box-shadow: 0 0 60px #f30, inset 0 0 24px #500; }
  }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 8;
    box-shadow: inset 0 0 200px #000;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,.55) 100%);
  }
  .end-screen #overlay h1 { color: #00ff44; text-shadow: 4px 4px 0 #000, 0 0 16px #00ff44, 0 0 40px #088; }
</style>

<div id="hud">

<div id="overlay">
  <h1>HELLBOUND</h1>
  <h2>EPISODE 1: THE CRYPT</h2>
  <div class="cta">CLICK TO ENTER HELL</div>
  <div class="ctrls">
    <b>WASD</b> MOVE &nbsp;&nbsp; <b>MOUSE</b> AIM &nbsp;&nbsp; <b>LMB</b> FIRE<br>
    <b>SHIFT</b> SPRINT &nbsp;&nbsp; <b>CTRL</b> CROUCH &nbsp;&nbsp; <b>SPACE</b> JUMP<br>
    <b>1</b> SHOTGUN &nbsp;&nbsp; <b>2</b> CHAINGUN &nbsp;&nbsp; <b>R</b> RELOAD<br>

</div>

<script type="module">
import * as THREE from 'three';

// =============================================================
// GLOBAL CONSTS
// =============================================================
const CELL = 4;          // world units per maze cell
const GRID_W = 20, GRID_H = 20;
const WALL_H = 4;
const PLAYER_H = 1.7, CROUCH_H = 1.0;
const PLAYER_R = 0.4;

// =============================================================
// PIXEL ART HELPERS
// =============================================================
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
// draw an array of [x,y,color] pixels
function drawPixels(ctx, pixels, sx=1, sy=1, ox=0, oy=0) {
  for (const [x, y, col] of pixels) {
    ctx.fillStyle = col;
    ctx.fillRect(ox + x*sx, oy + y*sy, sx, sy);
  }
}
function canvasToTexture(canvas) {
  const t = new THREE.CanvasTexture(canvas);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.needsUpdate = true;
  return t;
}

// ---- WALL TEXTURES ----
function makeWallTexture(seed=0) {
  const c = makeCanvas(64, 64);
  const ctx = c.getContext('2d');
  // base brick color
  ctx.fillStyle = '#3a201a';
  ctx.fillRect(0,0,64,64);
  // bricks
  let r = seed * 1234.567;
  function rnd() { r = (r * 9301 + 49297) % 233280; return r / 233280; }
  for (let row = 0; row < 8; row++) {
    const off = (row % 2) * 8;
    for (let col = 0; col < 8; col++) {
      const x = col*8 - off, y = row*8;
      const v = rnd();
      const r2 = Math.floor(35 + v*40), g2 = Math.floor(20 + v*20), b2 = Math.floor(15 + v*12);
      ctx.fillStyle = `rgb(${r2},${g2},${b2})`;
      ctx.fillRect(x+1, y+1, 7, 7);
      // stains
      if (rnd() < 0.15) {
        ctx.fillStyle = '#1a0805';
        ctx.fillRect(x+1+Math.floor(rnd()*5), y+1+Math.floor(rnd()*5), 2, 2);
      }
      if (rnd() < 0.08) {
        ctx.fillStyle = '#5a1a10';  // blood
        ctx.fillRect(x+Math.floor(rnd()*7), y+Math.floor(rnd()*7), 1, 3);
      }
    }
  }
  // grout
  ctx.fillStyle = '#0a0500';
  for (let i = 0; i <= 64; i += 8) {
    ctx.fillRect(i, 0, 1, 64);
    ctx.fillRect(0, i, 64, 1);
  }
  return canvasToTexture(c);
}
function makeFloorTexture() {
  const c = makeCanvas(64, 64);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a0c08';
  ctx.fillRect(0,0,64,64);
  for (let i = 0; i < 600; i++) {
    const x = Math.random()*64, y = Math.random()*64;
    const v = Math.random();
    ctx.fillStyle = `rgb(${20+v*20},${10+v*10},${5+v*5})`;
    ctx.fillRect(x, y, 1, 1);
  }
  // tile lines
  ctx.fillStyle = '#000';
  for (let i = 0; i <= 64; i += 16) {
    ctx.fillRect(i, 0, 1, 64);
    ctx.fillRect(0, i, 64, 1);
  }
  // occasional blood splat
  for (let i = 0; i < 6; i++) {
    if (Math.random() < 0.5) {
      const x = Math.random()*64, y = Math.random()*64;
      ctx.fillStyle = `rgba(80,15,5,0.6)`;
      ctx.beginPath(); ctx.arc(x, y, 2+Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
  }
  return canvasToTexture(c);
}
function makeCeilingTexture() {
  const c = makeCanvas(64, 64);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0a0500';
  ctx.fillRect(0,0,64,64);
  for (let i = 0; i < 200; i++) {
    const v = Math.random();
    ctx.fillStyle = `rgb(${10+v*10},${5+v*5},${2+v*3})`;
    ctx.fillRect(Math.random()*64, Math.random()*64, 1, 1);
  }
  return canvasToTexture(c);
}
function makeDoorTexture(color) {
  const c = makeCanvas(64, 64);
  const ctx = c.getContext('2d');
  // rivets and panel
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(0,0,64,64);
  ctx.fillStyle = color;
  ctx.fillRect(8, 8, 48, 48);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(8, 8, 48, 4);
  ctx.fillRect(8, 52, 48, 4);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(8, 8, 48, 48);
  // keyhole
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(32, 32, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(30, 32, 4, 8);
  // rivets
  ctx.fillStyle = '#222';
  for (const [x,y] of [[4,4],[60,4],[4,60],[60,60]]) {
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
  }
  return canvasToTexture(c);
}
function makeExitTexture() {
  const c = makeCanvas(64, 64);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#001a05';
  ctx.fillRect(0,0,64,64);
  // green glow
  const g = ctx.createRadialGradient(32,32,4,32,32,32);
  g.addColorStop(0,'#00ff44'); g.addColorStop(0.5,'#008822'); g.addColorStop(1,'#001a05');
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  // EXIT text
  ctx.fillStyle = '#ffffaa';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', 32, 36);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.strokeRect(4, 4, 56, 56);
  return canvasToTexture(c);
}

// =============================================================
// SPRITE TEXTURE GENERATORS (enemies, pickups, weapons)
// =============================================================
function pixArt(w, h, draw) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  draw(ctx);
  return c;
}

// IMP sprite (4-frame walk + attack)
function makeImpFrames() {
  const frames = [];
  for (let f = 0; f < 4; f++) {
    const c = pixArt(32, 48, (ctx) => {
      const armSway = (f%2===0) ? 0 : 1;
      const legA = (f===0||f===2) ? 0 : (f===1?1:-1);
      // body
      const body = '#7a2a10';
      const dark = '#3a1005';
      const skin = '#a04020';
      const horn = '#1a0a05';
      const eye = '#ff3300';
      // head
      ctx.fillStyle = skin;
      ctx.fillRect(11, 6, 10, 9);
      // horns
      ctx.fillStyle = horn;
      ctx.fillRect(10, 4, 2, 3);
      ctx.fillRect(20, 4, 2, 3);
      ctx.fillRect(9, 3, 1, 2);
      ctx.fillRect(22, 3, 1, 2);
      // eyes
      ctx.fillStyle = eye;
      ctx.fillRect(13, 9, 2, 2);
      ctx.fillRect(17, 9, 2, 2);
      // mouth (fangs)
      ctx.fillStyle = '#fff';
      ctx.fillRect(14, 13, 1, 1);
      ctx.fillRect(17, 13, 1, 1);
      ctx.fillStyle = '#000';
      ctx.fillRect(13, 12, 6, 1);
      // body
      ctx.fillStyle = body;
      ctx.fillRect(10, 15, 12, 14);
      ctx.fillStyle = dark;
      ctx.fillRect(10, 15, 12, 2);
      ctx.fillRect(15, 15, 2, 14); // spine
      // arms (sway with anim)
      ctx.fillStyle = skin;
      ctx.fillRect(7 + armSway, 16, 3, 9);
      ctx.fillRect(22 - armSway, 16, 3, 9);
      // claws
      ctx.fillStyle = '#fff';
      ctx.fillRect(7 + armSway, 24, 3, 1);
      ctx.fillRect(22 - armSway, 24, 3, 1);
      // legs
      ctx.fillStyle = body;
      ctx.fillRect(11, 29, 4, 10 + legA);
      ctx.fillRect(17, 29, 4, 10 - legA);
      // feet
      ctx.fillStyle = horn;
      ctx.fillRect(10, 38 + legA, 5, 2);
      ctx.fillRect(17, 38 - legA, 5, 2);
      // floor shadow inset
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(8, 46, 16, 2);
    });
    frames.push(canvasToTexture(c));
  }
  return frames;
}
// DEMON sprite (red bull-like)
function makeDemonFrames() {
  const frames = [];
  for (let f = 0; f < 4; f++) {
    const c = pixArt(40, 36, (ctx) => {
      const legA = (f===0||f===2) ? 0 : (f===1?1:-1);
      ctx.fillStyle = '#5a1010';
      ctx.fillRect(8, 14, 28, 14);
      ctx.fillStyle = '#3a0808';
      ctx.fillRect(8, 14, 28, 3);
      // head bulge
      ctx.fillStyle = '#702020';
      ctx.fillRect(4, 10, 12, 14);
      // teeth
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(4 + i*2, 18, 1, 3);
      }
      // jaw
      ctx.fillStyle = '#000';
      ctx.fillRect(4, 21, 10, 1);
      // eye
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(8, 13, 3, 2);
      ctx.fillStyle = '#ff2200';
      ctx.fillRect(9, 13, 1, 1);
      // horns
      ctx.fillStyle = '#1a0805';
      ctx.fillRect(2, 8, 2, 3);
      ctx.fillRect(14, 8, 2, 3);
      // legs
      ctx.fillStyle = '#3a0808';
      ctx.fillRect(10, 28, 4, 6 + legA);
      ctx.fillRect(18, 28, 4, 6 - legA);
      ctx.fillRect(26, 28, 4, 6 + legA);
      ctx.fillRect(32, 28, 4, 6 - legA);
      // tail
      ctx.fillStyle = '#5a1010';
      ctx.fillRect(36, 16, 3, 2);
      ctx.fillRect(38, 18, 2, 4);
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(6, 34, 30, 2);
    });
    frames.push(canvasToTexture(c));
  }
  return frames;
}
// SKULL sprite (floating)
function makeSkullFrames() {
  const frames = [];
  for (let f = 0; f < 4; f++) {
    const c = pixArt(24, 24, (ctx) => {
      const flameOff = (f===0||f===2) ? 0 : 1;
      // flame trail
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(8, 20 + flameOff, 8, 2);
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(10, 22 + flameOff, 4, 1);
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(11, 18, 2, 1);
      // skull
      ctx.fillStyle = '#e8e0c8';
      ctx.fillRect(6, 4, 12, 12);
      ctx.fillStyle = '#a89878';
      ctx.fillRect(6, 4, 12, 2);
      // jaw
      ctx.fillStyle = '#e8e0c8';
      ctx.fillRect(8, 16, 8, 3);
      // eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(8, 8, 3, 4);
      ctx.fillRect(13, 8, 3, 4);
      ctx.fillStyle = '#ff3300';
      ctx.fillRect(9, 9, 1, 2);
      ctx.fillRect(14, 9, 1, 2);
      // teeth
      ctx.fillStyle = '#000';
      for (let i = 0; i < 4; i++) ctx.fillRect(9 + i*2, 17, 1, 2);
    });
    frames.push(canvasToTexture(c));
  }
  return frames;
}
function makeFireballTexture() {
  const c = pixArt(16, 16, (ctx) => {
    const g = ctx.createRadialGradient(8, 8, 1, 8, 8, 8);
    g.addColorStop(0, '#ffff80');
    g.addColorStop(0.3, '#ffaa00');
    g.addColorStop(0.6, '#ff2200');
    g.addColorStop(1, 'rgba(60,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,16,16);
    // sparks
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(7,4,2,1); ctx.fillRect(4,9,1,1); ctx.fillRect(11,7,1,1);
  });
  return canvasToTexture(c);
}
function makeBloodTexture() {
  const c = pixArt(8, 8, (ctx) => {
    const g = ctx.createRadialGradient(4, 4, 0.5, 4, 4, 4);
    g.addColorStop(0, '#ff4422');
    g.addColorStop(0.5, '#aa1010');
    g.addColorStop(1, 'rgba(40,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,8,8);
  });
  return canvasToTexture(c);
}
// PICKUPS
function makeHealthTex() {
  return canvasToTexture(pixArt(20, 20, (ctx) => {
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(8, 4, 4, 12);
    ctx.fillRect(4, 8, 12, 4);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(8.5, 4.5, 3, 11);
    ctx.strokeRect(4.5, 8.5, 11, 3);
  }));
}
function makeAmmoTex() {
  return canvasToTexture(pixArt(20, 20, (ctx) => {
    ctx.fillStyle = '#cc8800';
    ctx.fillRect(3, 6, 14, 9);
    ctx.fillStyle = '#ffaa22';
    ctx.fillRect(3, 6, 14, 2);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 7px monospace';
    ctx.fillText('AMMO', 4, 13);
  }));
}
function makeArmorTex() {
  return canvasToTexture(pixArt(20, 20, (ctx) => {
    ctx.fillStyle = '#3388ff';
    ctx.beginPath();
    ctx.moveTo(10, 3); ctx.lineTo(17, 7); ctx.lineTo(15, 16); ctx.lineTo(10, 18);
    ctx.lineTo(5, 16); ctx.lineTo(3, 7); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.moveTo(10, 3); ctx.lineTo(17, 7); ctx.lineTo(10, 9); ctx.closePath();
    ctx.fill();
  }));
}
function makeKeycardTex(color) {
  return canvasToTexture(pixArt(20, 20, (ctx) => {
    ctx.fillStyle = color;
    ctx.fillRect(4, 6, 12, 10);
    ctx.fillStyle = '#000';
    ctx.fillRect(6, 8, 8, 1);
    ctx.fillRect(6, 10, 8, 1);
    ctx.fillRect(6, 12, 8, 1);
    ctx.fillStyle = '#fff';
    ctx.fillRect(13, 7, 2, 2);
  }));
}

// =============================================================
// PROCEDURAL DUNGEON GENERATION
// =============================================================
// 0 = wall, 1 = floor, 2 = red door, 3 = blue door, 4 = yellow door, 5 = exit
function generateDungeon(w, h, seed = 1) {
  // Deterministic-ish RNG
  let s = seed * 9999;
  function rnd() { s = (s * 9301 + 49297) % 233280; return s / 233280; }

  // Initialize grid as all walls
  const g = Array(h).fill(null).map(() => Array(w).fill(0));

  // Cellular automaton-ish + room carving
  // 1) carve random rooms
  const rooms = [];
  const numRooms = 12;
  for (let i = 0; i < numRooms; i++) {
    const rw = 3 + Math.floor(rnd() * 4);
    const rh = 3 + Math.floor(rnd() * 4);
    const rx = 1 + Math.floor(rnd() * (w - rw - 2));
    const ry = 1 + Math.floor(rnd() * (h - rh - 2));
    rooms.push({x: rx, y: ry, w: rw, h: rh, cx: rx+(rw>>1), cy: ry+(rh>>1)});
    for (let y = ry; y < ry + rh; y++) {
      for (let x = rx; x < rx + rw; x++) {
        g[y][x] = 1;
      }
    }
  }

  // 2) connect rooms with L-shaped corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i-1], b = rooms[i];
    let x = a.cx, y = a.cy;
    // horizontal first
    while (x !== b.cx) {
      g[y][x] = 1;
      // widen
      if (y+1 < h) g[y+1][x] = g[y+1][x] || 1;
      x += (b.cx > x) ? 1 : -1;
    }
    while (y !== b.cy) {
      g[y][x] = 1;
      if (x+1 < w) g[y][x+1] = g[y][x+1] || 1;
      y += (b.cy > y) ? 1 : -1;
    }
  }

  // ensure border is wall
  for (let i = 0; i < w; i++) { g[0][i] = 0; g[h-1][i] = 0; }
  for (let j = 0; j < h; j++) { g[j][0] = 0; g[j][w-1] = 0; }

  // 3) place doors at corridor pinch points: find floor cells that have walls on opposite sides
  const candidates = [];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      if (g[y][x] !== 1) continue;
      const horiz = g[y][x-1] === 0 && g[y][x+1] === 0 && g[y-1][x] === 1 && g[y+1][x] === 1;
      const vert  = g[y-1][x] === 0 && g[y+1][x] === 0 && g[y][x-1] === 1 && g[y][x+1] === 1;
      if (horiz || vert) candidates.push([x, y]);
    }
  }
  // pick 3 well-spaced candidates for keys-doors
  const colors = [2, 3, 4]; // red, blue, yellow doors
  const placedDoors = [];
  for (const c of colors) {
    if (candidates.length === 0) break;
    const idx = Math.floor(rnd() * candidates.length);
    const [dx, dy] = candidates[idx];
    g[dy][dx] = c;
    placedDoors.push({x: dx, y: dy, color: c});
    candidates.splice(idx, 1);
    // remove neighbors to avoid clumping
    for (let i = candidates.length - 1; i >= 0; i--) {
      const [cx, cy] = candidates[i];
      if (Math.abs(cx-dx) + Math.abs(cy-dy) < 3) candidates.splice(i,1);
    }
  }

  // 4) pick spawn (first room) and exit (last room)
  const spawn = rooms[0];
  const exitRoom = rooms[rooms.length - 1];
  // place exit cell at center of exit room (mark with 5)
  // Make sure exit is reachable; we'll place it as a special floor with a wall behind
  g[exitRoom.cy][exitRoom.cx] = 5;

  // 5) scatter keycards in floor cells (one per door color, avoid being in same room as door)
  const keys = [];
  const keyColors = [{c: 2, name: 'red'}, {c: 3, name: 'blue'}, {c: 4, name: 'yellow'}];
  // collect floor cells
  const floors = [];
  for (let y = 1; y < h-1; y++) for (let x = 1; x < w-1; x++) if (g[y][x] === 1) floors.push([x,y]);
  for (const k of keyColors) {
    if (floors.length === 0) break;
    const idx = Math.floor(rnd() * floors.length);
    keys.push({x: floors[idx][0], y: floors[idx][1], color: k.c, name: k.name});
    floors.splice(idx, 1);
  }

  // 6) scatter pickups
  const pickups = [];
  const pickupTypes = ['health','health','health','health','ammo','ammo','ammo','ammo','ammo','armor','armor'];
  for (let i = 0; i < 18 && floors.length > 0; i++) {
    const idx = Math.floor(rnd() * floors.length);
    const t = pickupTypes[Math.floor(rnd()*pickupTypes.length)];
    pickups.push({x: floors[idx][0], y: floors[idx][1], type: t});
    floors.splice(idx, 1);
  }

  // 7) place enemies in rooms (not in spawn room)
  const enemies = [];
  for (let i = 1; i < rooms.length; i++) {
    const r = rooms[i];
    const count = 1 + Math.floor(rnd()*2);
    for (let j = 0; j < count; j++) {
      const ex = r.x + Math.floor(rnd() * r.w);
      const ey = r.y + Math.floor(rnd() * r.h);
      if (g[ey][ex] !== 1) continue;
      const types = ['imp','imp','demon','skull','imp','demon'];
      enemies.push({x: ex, y: ey, type: types[Math.floor(rnd()*types.length)]});
    }
  }

  return { grid: g, rooms, spawn, exitRoom, keys, pickups, enemies, placedDoors };
}

// =============================================================
// COLLISION HELPERS
// =============================================================
function isWallAt(wx, wz) {
  const gx = Math.floor(wx / CELL);
  const gy = Math.floor(wz / CELL);
  if (gx < 0 || gy < 0 || gx >= GRID_W || gy >= GRID_H) return true;
  const v = dungeon.grid[gy][gx];
  if (v === 0) return true;
  if (v === 2 || v === 3 || v === 4) {
    const cm = colorMap[v];
    // door is wall unless opened
    const dm = doorMeshes.find(d => d.userData.gridX === gx && d.userData.gridY === gy);
    if (dm && dm.userData.opened) return false;
    return true;
  }
  return false;
}
function moveAndCollide(pos, dx, dz) {
  // separate axis
  const r = PLAYER_R;
  const newX = pos.x + dx;
  if (!isWallAt(newX + Math.sign(dx)*r, pos.z + r) && !isWallAt(newX + Math.sign(dx)*r, pos.z - r)) {
    pos.x = newX;
  }
  const newZ = pos.z + dz;
  if (!isWallAt(pos.x + r, newZ + Math.sign(dz)*r) && !isWallAt(pos.x - r, newZ + Math.sign(dz)*r)) {
    pos.z = newZ;
  }
}
function tryUseDoor() {
  // find door cell adjacent to player in facing direction
  const fx = -Math.sin(player.yaw);
  const fz = -Math.cos(player.yaw);
  const tx = player.pos.x + fx*1.5;
  const tz = player.pos.z + fz*1.5;
  const gx = Math.floor(tx / CELL);
  const gy = Math.floor(tz / CELL);
  if (gx < 0 || gy < 0 || gx >= GRID_W || gy >= GRID_H) return;
  const v = dungeon.grid[gy][gx];
  if (v !== 2 && v !== 3 && v !== 4) return;
  const cn = colorMap[v];
  if (!player.keys[cn]) {
    showMessage('NEED ' + cn.toUpperCase() + ' KEYCARD!');
    return;
  }
  const dm = doorMeshes.find(d => d.userData.gridX === gx && d.userData.gridY === gy);
  if (dm && !dm.userData.opened) {
    dm.userData.opened = true;
    // animate slide down
    dm.userData.openT = 0;
    showMessage('DOOR UNLOCKED');
    playSound('door');
  }
}

// =============================================================
// AUDIO (Web Audio)
// =============================================================
let audioCtx = null;
let musicGain = null;
let musicNodes = [];
let musicPlaying = false;
function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.18;
    musicGain.connect(audioCtx.destination);
  } catch (e) {}
}
function playSound(kind) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (kind === 'shotgun') {
    // Boom: noise + pitch sweep
    const dur = 0.32;
    const bufSize = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const env = Math.pow(1 - i/bufSize, 1.6);
      d[i] = (Math.random()*2-1) * env * 0.7;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(1200, t);
    filt.frequency.exponentialRampToValueAtTime(120, t + dur);
    const g = audioCtx.createGain();
    g.gain.value = 0.6;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur);
    // sub-thump
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.setValueAtTime(110, t); o.frequency.exponentialRampToValueAtTime(40, t+0.18);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.5, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.22);
  } else if (kind === 'chaingun') {
    const dur = 0.07;
    const o = audioCtx.createOscillator();
    o.type = 'square'; o.frequency.value = 220 + Math.random()*40;
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.0001, t);
    og.gain.exponentialRampToValueAtTime(0.3, t+0.005);
    og.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+dur);
    // noise
    const bufSize = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 0.8) * 0.5;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain(); g.gain.value = 0.25;
    src.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur);
  } else if (kind === 'reload') {
    const o = audioCtx.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(180, t);
    o.frequency.linearRampToValueAtTime(120, t+0.08);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.2, t);
    og.gain.exponentialRampToValueAtTime(0.0001, t+0.1);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.1);
  } else if (kind === 'pickup') {
    const o = audioCtx.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(880, t);
    o.frequency.linearRampToValueAtTime(1320, t+0.12);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.18, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.15);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.16);
  } else if (kind === 'hurt') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(60, t+0.25);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.3, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.3);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.32);
  } else if (kind === 'enemyhit') {
    const o = audioCtx.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(420, t);
    o.frequency.exponentialRampToValueAtTime(120, t+0.15);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.22, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.2);
  } else if (kind === 'enemydie') {
    // growl + crunch
    const bufSize = Math.floor(audioCtx.sampleRate * 0.4);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 0.8) * 0.6;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 800;
    const g = audioCtx.createGain(); g.gain.value = 0.4;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t+0.4);
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(40, t+0.4);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.3, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.42);
  } else if (kind === 'fireball') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(110, t+0.3);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.18, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.3);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.32);
  } else if (kind === 'door') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(80, t);
    o.frequency.linearRampToValueAtTime(40, t+0.5);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.25, t); og.gain.exponentialRampToValueAtTime(0.0001, t+0.6);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.62);
  } else if (kind === 'step') {
    const bufSize = Math.floor(audioCtx.sampleRate * 0.08);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 1.5) * 0.18;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 280;
    const g = audioCtx.createGain(); g.gain.value = 0.5;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t+0.08);
  }
}

// PROCEDURAL MUSIC (synthwave-MIDI loop, dark minor, ~140 BPM)
function startMusic() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;
  const bpm = 140;
  const beat = 60 / bpm;       // 0.4286s
  const sixteenth = beat / 4;
  // A minor: A C D E G | with some accidentals
  const minorScale = [220, 261.63, 293.66, 329.63, 392.00, 440, 523.25, 587.33];
  // bass walking line (eighths)
  const bassPattern = [0,0,3,0, 0,0,3,2, 5,5,3,5, 0,0,7,5];
  // arpeggiated lead (16ths over 2 bars)
  const leadPattern = [
    7,9,12,9, 7,9,12,9,  7,8,12,8, 7,8,12,8,
    5,7,10,7, 5,7,10,7,  4,5,9,5,  4,5,9,5,
  ];

  let step = 0;
  let nextNoteTime = audioCtx.currentTime + 0.05;

  function scheduleAhead() {
    if (!musicPlaying) return;
    while (nextNoteTime < audioCtx.currentTime + 0.2) {
      const tt = nextNoteTime;
      const sStep = step % 32;
      // 4-on-the-floor kick on every quarter (4 sixteenths apart)
      if (sStep % 4 === 0) {
        // kick
        const o = audioCtx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(120, tt);
        o.frequency.exponentialRampToValueAtTime(40, tt+0.15);
        const og = audioCtx.createGain();
        og.gain.setValueAtTime(0.5, tt); og.gain.exponentialRampToValueAtTime(0.0001, tt+0.2);
        o.connect(og); og.connect(musicGain);
        o.start(tt); o.stop(tt+0.22);
      }
      // closed hi-hat every 2 sixteenths
      if (sStep % 2 === 0) {
        const bufSize = Math.floor(audioCtx.sampleRate * 0.05);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 4);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const filt = audioCtx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=4000;
        const g = audioCtx.createGain(); g.gain.value = 0.06;
        src.connect(filt); filt.connect(g); g.connect(musicGain);
        src.start(tt); src.stop(tt+0.05);
      }
      // snare on 2 and 4 (every 8 sixteenths offset 4)
      if ((sStep + 4) % 8 === 0 && sStep !== 0) {
        const bufSize = Math.floor(audioCtx.sampleRate * 0.12);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/bufSize, 1.5);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const filt = audioCtx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1500;
        const g = audioCtx.createGain(); g.gain.value = 0.18;
        src.connect(filt); filt.connect(g); g.connect(musicGain);
        src.start(tt); src.stop(tt+0.13);
      }
      // bass: every 2 sixteenths (eighths), pattern length 16
      if (sStep % 2 === 0) {
        const bIdx = (sStep/2) % 16;
        const bn = bassPattern[bIdx];
        const freq = minorScale[bn % 7] / 2; // octave down
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = freq;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.setValueAtTime(800, tt);
        filt.frequency.exponentialRampToValueAtTime(200, tt+0.18);
        filt.Q.value = 4;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0, tt);
        g.gain.linearRampToValueAtTime(0.22, tt+0.005);
        g.gain.exponentialRampToValueAtTime(0.001, tt+0.18);
        o.connect(filt); filt.connect(g); g.connect(musicGain);
        o.start(tt); o.stop(tt+0.2);
      }
      // lead arp (every sixteenth, pattern length 32)
      {
        const ln = leadPattern[sStep];
        const freq = minorScale[ln % 7] * (ln >= 7 ? 2 : 1);
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.value = freq;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 2200; filt.Q.value = 2;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0, tt);
        g.gain.linearRampToValueAtTime(0.07, tt+0.005);
        g.gain.exponentialRampToValueAtTime(0.001, tt+0.13);
        o.connect(filt); filt.connect(g); g.connect(musicGain);
        o.start(tt); o.stop(tt+0.14);
      }

      step++;
      nextNoteTime += sixteenth;
    }
    setTimeout(scheduleAhead, 50);
  }
  scheduleAhead();
}

const keys = {};

});

  if (e.button === 0) mouseDown = false;

});

}

function switchWeapon(name) {
  if (player.weapon === name) return;
  player.weapon = name;
  player.reloading = 0;
  updateAmmoUI();
}

function startReload() {
  if (player.reloading > 0) return;
  if (player.weapon === 'shotgun') {
    if (player.mag.shotgun >= player.magMax.shotgun) return;
    if (player.ammo.shells <= 0) return;
    player.reloading = 1.4;
    playSound('reload');
  } else if (player.weapon === 'chaingun') {
    if (player.mag.chaingun >= player.magMax.chaingun) return;
    if (player.ammo.bullets <= 0) return;
    player.reloading = 1.7;
    playSound('reload');
  }
}

function fireWeapon(dt) {
  if (player.fireCD > 0) return;
  if (player.reloading > 0) return;
  if (player.weapon === 'shotgun') {
    if (player.mag.shotgun <= 0) { startReload(); return; }
    player.mag.shotgun--;
    player.fireCD = 0.65;
    player.recoil = 1.0;
    player.flashT = 0.12;
    playSound('shotgun');
    // 8 pellets in cone
    const dir = new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch), Math.sin(player.pitch), -Math.cos(player.yaw)*Math.cos(player.pitch));
    const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();
    const up = new THREE.Vector3().crossVectors(right, dir).normalize();
    for (let i = 0; i < 8; i++) {
      const sx = (Math.random()-0.5)*0.18;
      const sy = (Math.random()-0.5)*0.18;
      const d = dir.clone().add(right.clone().multiplyScalar(sx)).add(up.clone().multiplyScalar(sy)).normalize();
      raycastAndDamage(d, 14, 16);
    }
    updateAmmoUI();
  } else if (player.weapon === 'chaingun') {
    if (player.mag.chaingun <= 0) { startReload(); return; }
    player.mag.chaingun--;
    player.fireCD = 0.08;
    player.recoil = 0.4;
    player.flashT = 0.06;
    playSound('chaingun');
    const dir = new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch), Math.sin(player.pitch), -Math.cos(player.yaw)*Math.cos(player.pitch));
    // small spread
    const sx = (Math.random()-0.5)*0.06;
    const sy = (Math.random()-0.5)*0.06;
    const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();
    const up = new THREE.Vector3().crossVectors(right, dir).normalize();
    const d = dir.clone().add(right.clone().multiplyScalar(sx)).add(up.clone().multiplyScalar(sy)).normalize();
    raycastAndDamage(d, 8, 30);
    updateAmmoUI();
  }
}

function raycastAndDamage(dir, dmg, maxDist) {
  const origin = new THREE.Vector3(player.pos.x, player.pos.y - 0.05, player.pos.z);
  // first wall hit
  let wallDist = maxDist;
  // step ray to find wall
  const stepSize = 0.2;
  for (let d = 0.2; d < maxDist; d += stepSize) {
    const px = origin.x + dir.x * d;
    const py = origin.y + dir.y * d;
    const pz = origin.z + dir.z * d;
    if (py < 0.05 || py > WALL_H - 0.05) { wallDist = d; break; }
    if (isWallAt(px, pz)) { wallDist = d; break; }
  }
  // check enemies
  let hit = null, hitDist = wallDist;
  for (const en of enemies) {
    if (!en.alive) continue;
    const ex = en.sprite.position.x - origin.x;
    const ey = en.sprite.position.y - origin.y;
    const ez = en.sprite.position.z - origin.z;
    const t = ex*dir.x + ey*dir.y + ez*dir.z;
    if (t <= 0 || t > hitDist) continue;
    const cx = origin.x + dir.x * t;
    const cy = origin.y + dir.y * t;
    const cz = origin.z + dir.z * t;
    const dx = en.sprite.position.x - cx;
    const dy = en.sprite.position.y - cy;
    const dz = en.sprite.position.z - cz;
    const d2 = dx*dx + dy*dy + dz*dz;
    const r = en.sprite.scale.x * 0.5;
    if (d2 < r*r) {
      hit = en; hitDist = t;
    }
  }
  if (hit) {
    hit.hp -= dmg;
    hit.hurtT = 0.15;
    spawnBlood(hit.sprite.position.clone(), 6);
    playSound('enemyhit');
    if (hit.hp <= 0 && hit.alive) {
      hit.alive = false;
      hit.dieT = 0.3;
      player.killCount++;
      let bonus = 100;
      if (hit.type === 'demon') bonus = 200;
      if (hit.type === 'skull') bonus = 75;
      player.score += bonus;
      spawnBlood(hit.sprite.position.clone(), 16);
      playSound('enemydie');
      updateScore();
    }
  }
}

const faceCanvas = document.getElementById('face');
const faceCtx = faceCanvas.getContext('2d');
faceCtx.imageSmoothingEnabled = false;

function drawFace(health, hurtFlash) {
  const ctx = faceCtx;
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,32,40);
  // skin shade based on health
  const blood = Math.max(0, 1 - health/100);
  const skin = `rgb(${Math.floor(220 - blood*40)},${Math.floor(170 - blood*100)},${Math.floor(140 - blood*120)})`;
  // hair
  ctx.fillStyle = '#5a3010';
  ctx.fillRect(6, 4, 20, 6);
  ctx.fillStyle = '#3a1805';
  ctx.fillRect(6, 4, 20, 2);
  // face oval
  ctx.fillStyle = skin;
  ctx.fillRect(7, 9, 18, 22);
  ctx.fillRect(8, 8, 16, 1);
  ctx.fillRect(8, 31, 16, 1);
  // beard scruff
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(10, 25, 12, 3);
  // eyes
  const eyeY = hurtFlash > 0 ? 14 : 14;
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, eyeY, 4, 3);
  ctx.fillRect(18, eyeY, 4, 3);
  ctx.fillStyle = '#000';
  // eyes look toward last damage direction (if hurtFlash)
  const eyeOff = hurtFlash > 0 ? (Math.random() < 0.5 ? -1 : 1) : 0;
  ctx.fillRect(11 + eyeOff, eyeY, 2, 3);
  ctx.fillRect(19 + eyeOff, eyeY, 2, 3);
  // brow (angry)
  ctx.fillStyle = '#3a1808';
  ctx.fillRect(10, 12, 4, 1);
  ctx.fillRect(18, 12, 4, 1);
  // nose
  ctx.fillStyle = `rgb(${Math.floor(180 - blood*40)},${Math.floor(140 - blood*60)},${Math.floor(110 - blood*60)})`;
  ctx.fillRect(15, 18, 3, 4);
  // mouth (snarl)
  ctx.fillStyle = '#000';
  ctx.fillRect(11, 26, 10, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(13, 26, 1, 2);
  ctx.fillRect(15, 26, 1, 2);
  ctx.fillRect(17, 26, 1, 2);
  // BLOOD as health drops
  if (health < 75) {
    ctx.fillStyle = '#a01010';
    ctx.fillRect(11, 11, 1, 4);
    ctx.fillRect(20, 16, 1, 5);
  }
  if (health < 50) {
    ctx.fillStyle = '#700808';
    ctx.fillRect(8, 13, 2, 8);
    ctx.fillRect(22, 14, 2, 6);
    ctx.fillStyle = '#ff2020';
    ctx.fillRect(13, 22, 6, 1);
  }
  if (health < 25) {
    ctx.fillStyle = '#500';
    ctx.fillRect(7, 18, 4, 12);
    ctx.fillRect(21, 18, 4, 12);
    ctx.fillStyle = '#a00';
    ctx.fillRect(11, 28, 10, 2);
    // black eye
    ctx.fillStyle = '#400020';
    ctx.fillRect(9, 13, 6, 5);
  }
  if (health <= 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,32,40);
    ctx.fillStyle = '#400';
    ctx.fillRect(6, 14, 20, 14);
    ctx.fillStyle = '#a00';
    ctx.fillRect(10, 18, 4, 4);
    ctx.fillRect(18, 18, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(11, 19, 2, 2);
    ctx.fillRect(19, 19, 2, 2);
  }
  // Hurt flash
  if (hurtFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${0.4*hurtFlash})`;
    ctx.fillRect(0,0,32,40);
  }
}

  el.textContent = text;
  el.classList.add('show');
  messageTimer = 2.5;
}

// =============================================================
// MAIN LOOP
// =============================================================
const clock = new THREE.Clock();
let lastStep = 0;

function update(dt) {
  if (!player.alive) {
    // gentle camera fall
    camRig.position.y = Math.max(0.4, camRig.position.y - dt * 0.7);
    return;
  }
  if (player.won) return;

  // Movement input
  player.crouching = !!keys['ControlLeft'] || !!keys['ControlRight'];
  const sprint = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
  let speed = sprint ? 5.5 : 3.5;
  if (player.crouching) speed *= 0.5;

  let mx = 0, mz = 0;
  if (keys['KeyW']) mz -= 1;
  if (keys['KeyS']) mz += 1;
  if (keys['KeyA']) mx -= 1;
  if (keys['KeyD']) mx += 1;
  const len = Math.hypot(mx, mz);
  if (len > 0) { mx /= len; mz /= len; }

  // Rotate by yaw
  const sinY = Math.sin(player.yaw), cosY = Math.cos(player.yaw);
  const dx = (mx * cosY - mz * sinY) * speed * dt;
  const dz = (mx * sinY + mz * cosY) * speed * dt;
  moveAndCollide(player.pos, dx, dz);

  // walk bob
  const moving = len > 0;
  if (moving) {
    player.bobT += dt * speed * 1.5;
    player.walkBob = Math.sin(player.bobT * 2) * 0.06 * (sprint ? 1.4 : 1);
    // footstep audio
    lastStep += dt;
    const stepRate = sprint ? 0.32 : 0.45;
    if (lastStep >= stepRate) {
      lastStep = 0;
      playSound('step');
    }
  } else {
    player.walkBob *= 0.9;
  }

  // jump / gravity
  player.vel.y -= 14 * dt;
  player.pos.y += player.vel.y * dt;
  const targetH = player.crouching ? CROUCH_H : PLAYER_H;
  player.height += (targetH - player.height) * Math.min(1, dt*8);
  if (player.pos.y < player.height) {
    player.pos.y = player.height;
    player.vel.y = 0;
    player.onGround = true;
  }

  // Apply to camera
  camRig.position.set(player.pos.x, player.pos.y + player.walkBob, player.pos.z);
  camRig.rotation.y = player.yaw;
  camPitch.rotation.x = player.pitch;

  // Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.t += dt * 2;
    p.sprite.position.y = p.baseY + Math.sin(p.t)*0.08;
    const dx2 = p.sprite.position.x - player.pos.x;
    const dz2 = p.sprite.position.z - player.pos.z;
    if (dx2*dx2 + dz2*dz2 < 0.7) {
      // pickup
      let took = false;
      if (p.type === 'health') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 25);
          took = true;
          showMessage('+25 HEALTH');
        }
      } else if (p.type === 'ammo') {
        if (player.weapon === 'shotgun' || player.ammo.shells < 60) {
          player.ammo.shells = Math.min(60, player.ammo.shells + 8);
          player.ammo.bullets = Math.min(200, player.ammo.bullets + 30);
          took = true;
          showMessage('+AMMO');
        }
      } else if (p.type === 'armor') {
        if (player.armor < player.maxArmor) {
          player.armor = Math.min(player.maxArmor, player.armor + 25);
          took = true;
          showMessage('+25 ARMOR');
        }
      } else if (p.type === 'key') {
        player.keys[p.sub] = true;
        took = true;
        showMessage(p.sub.toUpperCase() + ' KEYCARD!');
        updateKeysUI();
      }
      if (took) {
        scene.remove(p.sprite);
        pickups.splice(i, 1);
        playSound('pickup');
        flashScreen('pickup');
        updateHealthUI();
        updateAmmoUI();
      }
    }
  }

  // Doors animate
  for (const d of doorMeshes) {
    if (d.userData.opened) {
      d.userData.openT = (d.userData.openT || 0) + dt;
      const k = Math.min(1, d.userData.openT / 0.7);
      d.position.y = WALL_H * 0.46 - k * WALL_H * 0.95;
      if (k >= 1) {
        d.visible = false;
      }
    }
  }

  // Auto-open near doors if have key
  for (const d of doorMeshes) {
    if (d.userData.opened) continue;
    const ddx = d.position.x - player.pos.x;
    const ddz = d.position.z - player.pos.z;
    if (ddx*ddx + ddz*ddz < 1.6*1.6) {
      const cn = colorMap[d.userData.color];
      if (player.keys[cn]) {
        d.userData.opened = true;
        d.userData.openT = 0;
        playSound('door');
        showMessage(cn.toUpperCase() + ' DOOR OPENED');
      }
    }
  }

  // Enemies
  const playerPos = new THREE.Vector3(player.pos.x, player.pos.y, player.pos.z);
  for (const en of enemies) {
    en.animT += dt;
    if (!en.alive) {
      // shrink and fade death
      en.dieT -= dt;
      en.sprite.scale.y *= (1 - dt*1.5);
      en.sprite.scale.x *= (1 - dt*0.5);
      en.sprite.position.y = Math.max(0.1, en.sprite.position.y - dt * 0.3);
      en.sprite.material.opacity = Math.max(0, en.sprite.material.opacity - dt*1.2);
      en.sprite.material.transparent = true;
      if (en.dieT < -1) {
        scene.remove(en.sprite);
      }
      continue;
    }
    en.attackCD -= dt;
    en.hurtT -= dt;
    // Walk frame
    const fIdx = Math.floor(en.animT * 6) % 4;
    if (fIdx !== en.frame) {
      en.frame = fIdx;
      en.sprite.material.map = en.frames[fIdx];
      en.sprite.material.needsUpdate = true;
    }
    // hurt flash tint
    if (en.hurtT > 0) {
      en.sprite.material.color.setRGB(1.2, 0.4, 0.4);
    } else {
      en.sprite.material.color.setRGB(1, 1, 1);
    }
    // Distance and direction to player
    const dx2 = playerPos.x - en.sprite.position.x;
    const dz2 = playerPos.z - en.sprite.position.z;
    const dist = Math.hypot(dx2, dz2);

    if (en.behavior === 'imp') {
      // approach to ~5, then throw fireballs
      if (dist > 5) {
        const stepX = (dx2/dist) * en.speed * dt;
        const stepZ = (dz2/dist) * en.speed * dt;
        moveEnemy(en, stepX, stepZ);
      }
      if (dist < 12 && en.attackCD <= 0) {
        en.attackCD = 1.6 + Math.random()*0.8;
        const from = en.sprite.position.clone(); from.y += 0.2;
        spawnFireball(from, playerPos.clone(), 'imp');
      }
    } else if (en.behavior === 'demon') {
      // melee charge
      if (dist > 0.8) {
        const stepX = (dx2/dist) * en.speed * dt;
        const stepZ = (dz2/dist) * en.speed * dt;
        moveEnemy(en, stepX, stepZ);
      } else if (en.attackCD <= 0) {
        en.attackCD = 0.8;
        damagePlayer(en.dmg);
      }
    } else if (en.behavior === 'skull') {
      // float, hover
      en.hover += dt * 3;
      en.sprite.position.y = 0.8 + Math.sin(en.hover)*0.3;
      if (dist > 0.8) {
        const stepX = (dx2/dist) * en.speed * dt;
        const stepZ = (dz2/dist) * en.speed * dt;
        moveEnemy(en, stepX, stepZ);
      } else if (en.attackCD <= 0) {
        en.attackCD = 0.6;
        damagePlayer(en.dmg);
      }
    }
  }

  // Fireballs
  for (let i = fireballs.length - 1; i >= 0; i--) {
    const f = fireballs[i];
    f.life -= dt;
    f.vel.y -= 4 * dt; // gravity
    f.sprite.position.x += f.vel.x * dt;
    f.sprite.position.y += f.vel.y * dt;
    f.sprite.position.z += f.vel.z * dt;
    // wiggle scale
    const sc = 0.4 + Math.sin(f.life*30)*0.08;
    f.sprite.scale.set(sc, sc, 1);
    let dead = false;
    if (f.life <= 0) dead = true;
    if (isWallAt(f.sprite.position.x, f.sprite.position.z)) dead = true;
    if (f.sprite.position.y < 0.1 || f.sprite.position.y > WALL_H) dead = true;
    // hit player
    const dx2 = f.sprite.position.x - player.pos.x;
    const dy2 = f.sprite.position.y - player.pos.y;
    const dz2 = f.sprite.position.z - player.pos.z;
    if (dx2*dx2 + dy2*dy2 + dz2*dz2 < 0.55*0.55) {
      damagePlayer(10);
      dead = true;
    }
    if (dead) {
      scene.remove(f.sprite);
      fireballs.splice(i, 1);
    }
  }

  // Blood particles
  for (let i = bloodParts.length - 1; i >= 0; i--) {
    const b = bloodParts[i];
    b.life -= dt;
    b.vel.y -= 9 * dt;
    b.sprite.position.x += b.vel.x * dt;
    b.sprite.position.y += b.vel.y * dt;
    b.sprite.position.z += b.vel.z * dt;
    b.sprite.material.opacity = Math.max(0, b.life / b.maxLife);
    if (b.life <= 0 || b.sprite.position.y < 0.05) {
      scene.remove(b.sprite);
      bloodParts.splice(i, 1);
    }
  }

  // Fire weapon
  player.fireCD -= dt;
  player.flashT -= dt;
  player.recoil *= Math.pow(0.001, dt); // decay quickly
  if (player.reloading > 0) {
    player.reloading -= dt;
    if (player.reloading <= 0) {
      player.reloading = 0;
      // refill mag
      if (player.weapon === 'shotgun') {
        const need = player.magMax.shotgun - player.mag.shotgun;
        const give = Math.min(need, player.ammo.shells);
        player.mag.shotgun += give;
        player.ammo.shells -= give;
      } else {
        const need = player.magMax.chaingun - player.mag.chaingun;
        const give = Math.min(need, player.ammo.bullets);
        player.mag.chaingun += give;
        player.ammo.bullets -= give;
      }
      updateAmmoUI();
    }
  } else if ((mouseDown || rmbDown) && player.fireCD <= 0) {
    fireWeapon(dt);
  }

  // EXIT check
  const exGx = Math.floor(player.pos.x / CELL);
  const exGy = Math.floor(player.pos.z / CELL);
  if (exGx === dungeon.exitRoom.cx && exGy === dungeon.exitRoom.cy) {
    if (player.keys.red && player.keys.blue && player.keys.yellow) {
      winGame();
    } else {
      const need = [];
      if (!player.keys.red) need.push('RED');
      if (!player.keys.blue) need.push('BLUE');
      if (!player.keys.yellow) need.push('YELLOW');
      showMessage('NEED: ' + need.join(', '));
    }
  }

  // Draw HUD weapon
  const recoilOff = player.recoil;
  player.recoil = Math.max(0, player.recoil - dt*4);
  const flash = Math.max(0, player.flashT) / 0.12;
  if (player.weapon === 'shotgun') drawShotgun(flash, recoilOff);
  else drawChaingun(flash, recoilOff);

  // Position weapon canvas with walk bob
  const wbob = Math.sin(player.bobT * 2) * 8;
  const wsway = Math.cos(player.bobT) * 4;
  weaponCanvas.style.transform = `translate(calc(-50% + ${wsway}px), ${wbob + recoilOff*20}px) scale(2)`;

  // Hurt flash
  if (player.hurtT > 0) {
    player.hurtT -= dt;
    document.getElementById('flash').classList.add('hurt');
    if (player.hurtT <= 0) document.getElementById('flash').classList.remove('hurt');
  }

  // Face redraw
  drawFace(player.health, Math.max(0, player.hurtT*5));

  // Message timer
  if (messageTimer > 0) {
    messageTimer -= dt;
    if (messageTimer <= 0) document.getElementById('message').classList.remove('show');
  }
}

function moveEnemy(en, dx, dz) {
  const r = 0.4;
  const nx = en.sprite.position.x + dx;
  if (!isWallAt(nx + Math.sign(dx)*r, en.sprite.position.z + r) && !isWallAt(nx + Math.sign(dx)*r, en.sprite.position.z - r)) {
    en.sprite.position.x = nx;
  }
  const nz = en.sprite.position.z + dz;
  if (!isWallAt(en.sprite.position.x + r, nz + Math.sign(dz)*r) && !isWallAt(en.sprite.position.x - r, nz + Math.sign(dz)*r)) {
    en.sprite.position.z = nz;
  }
}

function damagePlayer(amount) {
  if (!player.alive) return;
  // armor absorbs some
  if (player.armor > 0) {
    const absorbed = Math.min(player.armor, amount * 0.6);
    player.armor -= absorbed;
    amount -= absorbed;
  }
  player.health -= amount;
  player.hurtT = 0.5;
  flashScreen('hurt');
  playSound('hurt');
  updateHealthUI();
  if (player.health <= 0) {
    player.health = 0;
    player.alive = false;
    showDeathScreen();
  }
}

function flashScreen(kind) {
  const el = document.getElementById('flash');
  el.classList.add(kind);
  setTimeout(() => el.classList.remove(kind), 200);
}

function showDeathScreen() {
  const o = document.getElementById('overlay');
  o.style.display = 'flex';
  o.innerHTML = `
    <h1>YOU DIED</h1>
    <h2>HELL CLAIMED YOU</h2>
    <div style="color:#ffcc00;margin-bottom:8px;letter-spacing:3px;font-size:14px">
      KILLS: ${player.killCount} &nbsp;&nbsp; SCORE: ${player.score}
    </div>
    <div class="cta">CLICK TO TRY AGAIN</div>
  `;
  o.onclick = () => location.reload();
  document.exitPointerLock && document.exitPointerLock();
}
function winGame() {
  player.won = true;
  document.body.classList.add('end-screen');
  const o = document.getElementById('overlay');
  o.style.display = 'flex';
  o.innerHTML = `
    <h1>YOU ESCAPED</h1>
    <h2>HELL HAS BEEN CONQUERED</h2>
    <div style="color:#ffcc00;margin-bottom:14px;letter-spacing:3px;font-size:14px">
      KILLS: ${player.killCount} / ${dungeon.enemies.length}<br>
      SCORE: ${player.score}
    </div>
    <div class="cta">CLICK TO PLAY AGAIN</div>
  `;
  o.onclick = () => location.reload();
  document.exitPointerLock && document.exitPointerLock();
}

// =============================================================
// RESIZE
// =============================================================
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// =============================================================
// ENTER GAME
// =============================================================
const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  startMusic();
  overlay.style.display = 'none';
  renderer.domElement.requestPointerLock();
});

// Initial UI
updateHealthUI();
updateAmmoUI();
updateScore();
updateKeysUI();
drawFace(100, 0);

// Initial weapon draw
drawShotgun(0, 0);
weaponCanvas.style.transform = 'translate(-50%, 0) scale(2)';

// Make weapon canvas crispy
weaponCanvas.style.imageRendering = 'pixelated';

// =============================================================
// ANIMATE
// =============================================================
function animate() {
  const dt = Math.min(0.05, clock.getDelta());
  update(dt);
  // billboard sprites already auto-face the camera (Sprite type)
  // torch flicker
  torch.intensity = 1.3 + Math.sin(performance.now()*0.008)*0.18 + Math.random()*0.05;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
