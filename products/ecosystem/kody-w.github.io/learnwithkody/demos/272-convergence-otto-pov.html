<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brimsworth Convergence — POV 3 / 12 — Otto</title>
<style>
  :root{
    --gold:#e9c46a; --rose:#f4a3a8; --ivory:#fff8eb; --sage:#a3b58a; --ink:#1c140d;
  }
  html,body{margin:0;padding:0;background:#0a0807;color:var(--ivory);font-family:Georgia,'Times New Roman',serif;overflow:hidden;height:100%;}
  canvas{display:block;}
  #wrap{position:fixed;inset:0;}
  /* Chyron */
  #chyron{
    position:fixed;left:50%;bottom:7vh;transform:translateX(-50%);
    background:linear-gradient(90deg,rgba(28,20,13,.86),rgba(28,20,13,.92),rgba(28,20,13,.86));
    border:1px solid rgba(233,196,106,.55);border-radius:4px;
    padding:10px 22px;font-variant:small-caps;letter-spacing:.18em;font-size:14px;
    color:var(--gold);text-shadow:0 0 8px rgba(233,196,106,.35);
    box-shadow:0 4px 24px rgba(0,0,0,.5),inset 0 0 22px rgba(233,196,106,.08);
    pointer-events:none;opacity:0;transition:opacity .9s ease;max-width:78vw;text-align:center;z-index:30;
  }
  #chyron.show{opacity:1;}
  #chyron.big{font-size:18px;padding:14px 30px;border-color:var(--rose);color:#ffe3d6;}
  /* HUD */
  #hud{position:fixed;top:10px;left:12px;font-family:'Courier New',monospace;font-size:11px;
    color:rgba(255,248,235,.78);background:rgba(10,8,7,.55);padding:8px 12px;border-left:2px solid var(--gold);
    line-height:1.55;z-index:25;pointer-events:none;letter-spacing:.04em;}
  #hud b{color:var(--gold);font-weight:normal;}
  #hud .pulse{color:var(--rose);}
  /* Edge strip */
  #strip{position:fixed;right:8px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:6px;z-index:26;pointer-events:none;}
  .thumb{width:78px;height:44px;border:1px solid rgba(255,248,235,.18);background:#13100c;
    position:relative;overflow:hidden;font-family:'Courier New',monospace;font-size:9px;color:rgba(255,248,235,.65);
    letter-spacing:.05em;border-radius:2px;}
  .thumb.me{border-color:var(--gold);box-shadow:0 0 10px rgba(233,196,106,.6);}
  .thumb .lab{position:absolute;left:3px;bottom:2px;text-shadow:0 0 3px #000;}
  .thumb .clk{position:absolute;right:3px;top:2px;font-size:8px;color:rgba(255,248,235,.55);}
  .thumb canvas{position:absolute;inset:0;width:100%;height:100%;}
  /* Title card */
  #title{position:fixed;left:12px;bottom:14px;z-index:25;pointer-events:none;
    font-variant:small-caps;letter-spacing:.22em;color:rgba(255,248,235,.8);font-size:12px;}
  #title .h{color:var(--gold);font-size:14px;display:block;margin-bottom:3px;letter-spacing:.28em;}
  #fic{position:fixed;right:14px;bottom:6px;font-size:9px;color:rgba(255,248,235,.4);
    font-family:'Courier New',monospace;letter-spacing:.1em;z-index:25;pointer-events:none;}
  /* Vignette */
  #vig{position:fixed;inset:0;pointer-events:none;z-index:20;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 50%,rgba(0,0,0,.55) 100%);}
  /* Sniff/breath haze (slight blur band at bottom — close-to-ground feel) */
  #haze{position:fixed;left:0;right:0;bottom:0;height:18%;pointer-events:none;z-index:21;
    background:linear-gradient(to top,rgba(255,238,210,.18),rgba(255,238,210,0));
    mix-blend-mode:screen;}
  /* Heart pulse for convergence */
  #pulse{position:fixed;inset:0;pointer-events:none;z-index:22;opacity:0;
    box-shadow:inset 0 0 220px rgba(244,163,168,.55);transition:opacity .6s ease;}
  #pulse.on{opacity:1;}
  /* Big "good boy" overlay */
  #goodboy{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:31;
    font-family:'Brush Script MT','Lucida Handwriting',cursive;font-size:96px;color:#ffe3d6;
    text-shadow:0 0 30px rgba(244,163,168,.85),0 0 60px rgba(233,196,106,.4);
    opacity:0;transition:opacity 1.2s ease, transform 1.2s ease;pointer-events:none;letter-spacing:.02em;}
  #goodboy.on{opacity:1;transform:translate(-50%,-50%) scale(1.04);}
  @media (max-width:680px){
    #strip{transform:none;top:auto;bottom:64px;right:6px;flex-direction:row;flex-wrap:wrap;max-width:50vw;}
    .thumb{width:54px;height:32px;font-size:8px;}
    #goodboy{font-size:54px;}
    #chyron{font-size:12px;padding:8px 14px;bottom:10vh;}
  }
</style>
</head>

<div id="wrap"></div>

  <b>BRIMSWORTH CONVERGENCE</b> · pov 03 / 12<br>
  <span>pov_id:</span> <b>otto</b> &nbsp; eye-h ≈ 50cm<br>
  <span>master clock:</span> <b id="mc">000.0</b>s &nbsp; <span id="phase">approach</span><br>

<script>

<script>
/* Inline three.js r160 (strict subset, IIFE). To keep within 200KB and avoid

<script>
(function(){
'use strict';

/* ------------------------------------------------------------------
   ROUND26 — OTTO POV — BRIMSWORTH CONVERGENCE
   POV 3 / 12. 8yo golden retriever eye-level (~0.50m), tail-wag bob,
   sniff cycle. R21 wedding reprise. 540s "good boy" convergence beat.
   ------------------------------------------------------------------ */

const POV_ID = 'otto';
const LEDGER_KEY = 'brimsworth_convergence_v1';
const RESEED_S = 600;
const CONVERGE_S = 540;
const POV_LIST = [
  ['lily',     'bride'],
  ['tomas',    'groom'],
  ['otto',     'dog'],
  ['cpt',      'cat'],
  ['pember',   'matriarch'],
  ['hattie',   'baker'],
  ['oren',     'fiddler'],
  ['young-l',  'lily-aged-9'],
  ['ghost',    'manor-spirit'],
  ['sky',      'rookery-bird'],
  ['kit',      'flower-girl'],
  ['arch',     'floral-arch']
];

/* ---------- Cross-read prior ledgers (read-only, defensive) ---------- */
function safeRead(key){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return null;
    const v = JSON.parse(raw);
    return v;
  } catch(e){ return null; }
}
const xWorlds     = safeRead('brimsworth_worlds_v1');
const xMulti      = safeRead('brimsworth_multiverse_v1');
const xCentury    = safeRead('brimsworth_century_v1');
const xLifetime   = safeRead('brimsworth_lifetime_v1');
const xCast       = safeRead('recurring_cast_v1');

function pickFromCast(role, fallback){
  if(!xCast) return fallback;
  try{
    if(Array.isArray(xCast)){
      const m = xCast.find(c=>c && (c.role===role || c.tag===role));
      if(m && m.name) return m.name;
    } else if(typeof xCast==='object'){
      if(xCast[role] && xCast[role].name) return xCast[role].name;
      if(xCast[role] && typeof xCast[role]==='string') return xCast[role];
    }
  }catch(e){}
  return fallback;
}
const NAME = {
  bride:    pickFromCast('bride','Lily Brimsworth'),
  groom:    pickFromCast('groom','Tomas Vance'),
  dog:      pickFromCast('dog','Otto'),
  cat:      pickFromCast('cat','Captain Crunch'),
  matriarch:pickFromCast('matriarch','Mrs Pemberton'),
  baker:    pickFromCast('baker','Hattie'),
  fiddler:  pickFromCast('fiddler','Oren')
};

/* ---------- master clock + reseed ---------- */
const sessionStart = (function(){
  // align to wall-clock so twin tabs share phase
  const now = Date.now();
  const align = now - (now % (RESEED_S*1000));
  return align;
})();
function masterT(){ return (Date.now()-sessionStart)/1000; }
function epoch(){ return Math.floor((Date.now()-sessionStart)/(RESEED_S*1000)); }
function currentSeed(){
  // deterministic per-epoch seed
  return ((epoch()*2654435761) ^ 0x9E3779B1) >>> 0;
}

/* ---------- ledger append ---------- */
function appendLedger(){
  try{
    const arr = safeRead(LEDGER_KEY) || [];
    if(!Array.isArray(arr)) return;
    arr.push({
      pov_id: POV_ID,
      master_clock_at_join: +masterT().toFixed(2),
      convergence_at: CONVERGE_S,
      epoch: epoch(),
      ts: Date.now()
    });
    // cap
    while(arr.length>500) arr.shift();
    localStorage.setItem(LEDGER_KEY, JSON.stringify(arr));
  }catch(e){}
}
appendLedger();

/* ---------- BroadcastChannel sync ---------- */
let bc = null;
const peerClocks = {}; // pov_id -> last t
try{
  bc = new BroadcastChannel('brimsworth_convergence');
  bc.onmessage = (ev)=>{
    const m = ev.data || {};
    if(m.type==='tick' && m.pov_id){
      peerClocks[m.pov_id] = m.t;
    } else if(m.type==='hello' && m.pov_id){
      peerClocks[m.pov_id] = m.t;
      // respond once so new joiners learn we exist
      try{ bc.postMessage({type:'tick',pov_id:POV_ID,t:masterT()}); }catch(_){}
    } else if(m.type==='converge' && m.pov_id){
      // peer hit convergence — no-op besides log
    }
  };
  bc.postMessage({type:'hello',pov_id:POV_ID,t:masterT()});
}catch(e){ bc=null; }

/* ---------- seeded RNG ---------- */
function mkRng(seed){
  let s = seed>>>0 || 1;
  return function(){
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t>>>15), t | 1);
    t ^= t + Math.imul(t ^ (t>>>7), t | 61);
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}
let SEED = currentSeed();
let rng = mkRng(SEED);

/* ============================================================
   THREE.js scene
   ============================================================ */
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1612);
scene.fog = new THREE.FogExp2(0xb59870, 0.018);

const camera = new THREE.PerspectiveCamera(72, W()/H(), 0.05, 240);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
renderer.setSize(W(), H());
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.getElementById('wrap').appendChild(renderer.domElement);

window.addEventListener('resize',()=>{
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

/* ----- lighting (golden hour chapel) ----- */
const hemi = new THREE.HemisphereLight(0xffe9c2, 0x3a2a1c, 0.55);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffd9a0, 1.05);
sun.position.set(8, 10, 4);
scene.add(sun);
const fill = new THREE.PointLight(0xffc78a, 0.6, 30);
fill.position.set(-3, 2.2, -4);
scene.add(fill);
const altarGlow = new THREE.PointLight(0xfff0c8, 1.4, 14, 1.6);
altarGlow.position.set(0, 1.6, -7);
scene.add(altarGlow);

/* ----- ground (chapel floor) ----- */
const floorTex = (()=>{
  // procedural plank texture via canvas
  const c = document.createElement('canvas'); c.width=512; c.height=512;
  const g = c.getContext('2d');
  g.fillStyle = '#5b3a22'; g.fillRect(0,0,512,512);
  for(let y=0;y<512;y+=32){
    g.fillStyle = `rgb(${80+Math.floor(rng()*30)},${50+Math.floor(rng()*20)},${28+Math.floor(rng()*16)})`;
    g.fillRect(0,y,512,30);
    g.strokeStyle='rgba(20,12,6,.7)'; g.beginPath(); g.moveTo(0,y); g.lineTo(512,y); g.stroke();
    for(let x=0;x<512;x+=Math.floor(48+rng()*60)){
      g.fillStyle='rgba(30,18,8,.35)';
      g.fillRect(x,y,2,30);
    }
  }
  // grain
  for(let i=0;i<2400;i++){
    g.fillStyle=`rgba(${rng()<.5?20:200},${rng()<.5?12:140},${rng()<.5?6:80},${rng()*.18})`;
    g.fillRect(rng()*512,rng()*512,1,1);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(8,8);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
})();
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({map:floorTex, roughness:.85, metalness:.05})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* ----- aisle runner (rose) ----- */
const aisle = new THREE.Mesh(
  new THREE.PlaneGeometry(2.0, 22),
  new THREE.MeshStandardMaterial({color:0xf4a3a8, roughness:.9})
);
aisle.rotation.x = -Math.PI/2;
aisle.position.y = 0.005;
aisle.position.z = -3;
scene.add(aisle);
// petals on aisle
for(let i=0;i<140;i++){
  const p = new THREE.Mesh(
    new THREE.CircleGeometry(0.04+rng()*0.05, 6),
    new THREE.MeshStandardMaterial({color: rng()<.5?0xffd4d6:0xfff1c4, roughness:.8})
  );
  p.rotation.x = -Math.PI/2;
  p.rotation.z = rng()*Math.PI*2;
  p.position.set((rng()-.5)*1.7, 0.012, -14 + rng()*22);
  scene.add(p);
}

/* ----- pews (rows of brown blocks left/right) ----- */
function buildPew(side){
  const grp = new THREE.Group();
  for(let i=0;i<7;i++){
    const pew = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 0.5, 0.5),
      new THREE.MeshStandardMaterial({color:0x6e4a2c, roughness:.7})
    );
    pew.position.set(side*2.6, 0.27, -12 + i*2.2);
    grp.add(pew);
    // backrest
    const back = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 0.7, 0.1),
      new THREE.MeshStandardMaterial({color:0x5a3a22, roughness:.75})
    );
    back.position.set(side*2.6, 0.6, -12 + i*2.2 - 0.22);
    grp.add(back);
  }
  return grp;
}
scene.add(buildPew(-1));
scene.add(buildPew(1));

/* ----- chapel walls (warm) ----- */
const wallMat = new THREE.MeshStandardMaterial({color:0xc8a77a, roughness:.9});
const wallL = new THREE.Mesh(new THREE.PlaneGeometry(40, 8), wallMat);
wallL.position.set(-6, 4, -6); wallL.rotation.y = Math.PI/2; scene.add(wallL);
const wallR = wallL.clone(); wallR.position.x = 6; wallR.rotation.y = -Math.PI/2; scene.add(wallR);
const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(12, 8), wallMat);
wallBack.position.set(0,4,-12); scene.add(wallBack);
// stained glass behind altar (emissive)
const stainedMat = new THREE.MeshStandardMaterial({
  color:0xff9aa6, emissive:0xff7088, emissiveIntensity:.7, roughness:.4
});
const sg = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 4.4), stainedMat);
sg.position.set(0, 4.4, -11.95);
scene.add(sg);

/* ----- floral arch (altar) ----- */
const arch = new THREE.Group();
{
  const pillarMat = new THREE.MeshStandardMaterial({color:0xf6f1e0, roughness:.6});
  const pL = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,2.6,12), pillarMat);
  pL.position.set(-1.1, 1.3, -8); arch.add(pL);
  const pR = pL.clone(); pR.position.x = 1.1; arch.add(pR);
  const top = new THREE.Mesh(new THREE.TorusGeometry(1.1, 0.08, 8, 24, Math.PI),
    pillarMat);
  top.position.set(0, 2.6, -8);
  top.rotation.x = Math.PI; top.rotation.z = Math.PI; arch.add(top);
  // flowers (lots of small spheres clustered on the arch)
  for(let i=0;i<140;i++){
    const a = (i/140)*Math.PI;
    const r = 1.1 + (rng()-.5)*.15;
    const x = Math.cos(a)*r;
    const y = Math.sin(a)*r + 1.5;
    const palette = [0xff8aa1, 0xffd6a0, 0xffe4b3, 0xc9d8a3, 0xffb0c0];
    const f = new THREE.Mesh(
      new THREE.SphereGeometry(0.07+rng()*0.05, 6, 6),
      new THREE.MeshStandardMaterial({color: palette[(rng()*palette.length)|0], roughness:.7})
    );
    f.position.set(x, y, -8 + (rng()-.5)*.25);
    arch.add(f);
  }
  // along pillars
  for(let i=0;i<26;i++){
    const f = new THREE.Mesh(
      new THREE.SphereGeometry(0.07+rng()*0.04, 6, 6),
      new THREE.MeshStandardMaterial({color: rng()<.5?0xffb0c0:0xc9d8a3, roughness:.7})
    );
    const sx = (rng()<.5?-1:1)*1.1 + (rng()-.5)*.12;
    f.position.set(sx, rng()*2.4, -8 + (rng()-.5)*.18);
    arch.add(f);
  }
}
scene.add(arch);

/* ----- cake table ----- */
const cakeTable = new THREE.Group();
{
  const top = new THREE.Mesh(
    new THREE.CylinderGeometry(0.9,0.9,0.06,24),
    new THREE.MeshStandardMaterial({color:0x6c4a2c, roughness:.5})
  );
  top.position.y = 0.75;
  const cloth = new THREE.Mesh(
    new THREE.CylinderGeometry(1.05,1.15,0.78,24,1,true),
    new THREE.MeshStandardMaterial({color:0xfff1d6, roughness:.85, side:THREE.DoubleSide})
  );
  cloth.position.y = 0.39;
  // cake (3 tiers)
  const tier1 = new THREE.Mesh(
    new THREE.CylinderGeometry(0.55,0.55,0.32,24),
    new THREE.MeshStandardMaterial({color:0xfff8eb, roughness:.55})
  ); tier1.position.y = 0.94;
  const tier2 = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4,0.4,0.28,24),
    new THREE.MeshStandardMaterial({color:0xfff8eb, roughness:.55})
  ); tier2.position.y = 1.24;
  const tier3 = new THREE.Mesh(
    new THREE.CylinderGeometry(0.27,0.27,0.24,24),
    new THREE.MeshStandardMaterial({color:0xfff8eb, roughness:.55})
  ); tier3.position.y = 1.50;
  // tiny topper
  const topper = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 8,8),
    new THREE.MeshStandardMaterial({color:0xe9c46a, emissive:0x8a6020, emissiveIntensity:.4, roughness:.4})
  );
  topper.position.y = 1.66;
  // roses
  for(let i=0;i<14;i++){
    const a=(i/14)*Math.PI*2;
    const r = new THREE.Mesh(
      new THREE.SphereGeometry(0.06,6,6),
      new THREE.MeshStandardMaterial({color: rng()<.5?0xff8aa1:0xffd6a0, roughness:.7})
    );
    r.position.set(Math.cos(a)*0.5, 1.12, Math.sin(a)*0.5);
    cakeTable.add(r);
  }
  cakeTable.add(top, cloth, tier1, tier2, tier3, topper);
  cakeTable.position.set(3.4, 0, -3.5);
}
scene.add(cakeTable);

/* ----- a thrown ball that rolls ----- */
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.10, 16, 14),
  new THREE.MeshStandardMaterial({color:0xff5a3c, roughness:.55})
);
ball.position.set(-2, 0.10, 1.5);
scene.add(ball);

/* ----- helper: humanoid avatar (low-poly) ----- */
function makeAvatar(opts){
  const g = new THREE.Group();
  const skin = opts.skin || 0xf2c8a4;
  const dress = opts.dress || 0xfff1d6;
  // legs
  const lm = new THREE.MeshStandardMaterial({color:opts.pants||0x3a2a1c, roughness:.7});
  const ll = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.07,0.85,8), lm);
  ll.position.set(-0.09, 0.42, 0); g.add(ll);
  const lr = ll.clone(); lr.position.x = 0.09; g.add(lr);
  // torso
  const tm = new THREE.MeshStandardMaterial({color:dress, roughness:.6});
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,0.6,12), tm);
  torso.position.y = 1.12; g.add(torso);
  // arms
  const am = new THREE.MeshStandardMaterial({color:opts.sleeve||dress, roughness:.6});
  const al = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.55,8), am);
  al.position.set(-0.24, 1.12, 0); al.rotation.z = 0.18; g.add(al);
  const ar = al.clone(); ar.position.x = 0.24; ar.rotation.z = -0.18; g.add(ar);
  // head
  const hm = new THREE.MeshStandardMaterial({color:skin, roughness:.55});
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16,16,14), hm);
  head.position.y = 1.55; g.add(head);
  // hair
  if(opts.hair){
    const hairMat = new THREE.MeshStandardMaterial({color:opts.hair, roughness:.7});
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.17,12,10,0,Math.PI*2,0,Math.PI/1.6), hairMat);
    hair.position.y = 1.58; g.add(hair);
  }
  // optional veil
  if(opts.veil){
    const veil = new THREE.Mesh(
      new THREE.ConeGeometry(0.28, 0.7, 16, 1, true),
      new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:.55, roughness:.4, side:THREE.DoubleSide})
    );
    veil.position.set(0, 1.35, -0.05);
    g.add(veil);
  }
  // groom bowtie
  if(opts.bowtie){
    const bt = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.06,0.04),
      new THREE.MeshStandardMaterial({color:0x1a0e08, roughness:.5}));
    bt.position.set(0,1.36,0.18); g.add(bt);
  }
  // little dot eyes (face)

   ANIMATION TIMELINE — Otto's behaviors across 600s loop
   The 540s convergence beat is invariant.

/* Otto's "body" position+heading (camera follows) */
const otto = {
  pos: new THREE.Vector3(0, 0.50, 8),
  heading: Math.PI, // facing -Z (toward altar)
  vel: 0,
  panic: 0,
  sniff: 0,
  tailWag: 1
};

// path waypoints by phase
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function smoothstep(a,b,x){
  x = clamp((x-a)/(b-a),0,1);
  return x*x*(3-2*x);
}
function lerp(a,b,t){ return a + (b-a)*t; }
function lerpV(a,b,t,out){
  out.x = a.x + (b.x-a.x)*t;
  out.y = a.y + (b.y-a.y)*t;
  out.z = a.z + (b.z-a.z)*t;
  return out;
}

/* phases (seconds within reseed window 0..600)
   0..40    : approach back-of-aisle, tail wagging, sniff floor
   40..90   : run to Tomas (POV 2 reprise — Otto greets groom)
   90..150  : sniff cake table edge (almost-but-not-quite trouble)
   150..210 : chase Captain Crunch across nave
   210..270 : ball thrown — chase
   270..330 : floral arch sniff loop
   330..390 : lie under cake table (low panting POV)
   390..450 : head-tilt at Mrs Pemberton (she chuckles)
   450..520 : follow Lily down aisle (recessional rehearsal)
   520..540 : wait at Lily's feet
   540..560 : CONVERGENCE — Lily kneels, "good boy", ear-scratch
   560..600 : afterglow — slow tail wag, golden bloom
*/
const PHASES = [
  [0,40,'approach'],
  [40,90,'greet-tomas'],
  [90,150,'sniff-cake'],
  [150,210,'chase-cat'],
  [210,270,'chase-ball'],
  [270,330,'sniff-arch'],
  [330,390,'under-cake'],
  [390,450,'head-tilt-pemberton'],
  [450,520,'follow-lily'],
  [520,540,'await-lily'],
  [540,560,'convergence'],
  [560,600,'afterglow']
];
function getPhase(t){
  for(const p of PHASES){ if(t>=p[0] && t<p[1]) return p; }
  return PHASES[PHASES.length-1];
}

/* per-phase target positions for Otto (approximate path) */
function targetForPhase(phaseName, t, phaseStart, phaseEnd){
  const k = (t-phaseStart)/Math.max(0.001,(phaseEnd-phaseStart));
  const out = new THREE.Vector3();
  let head = Math.PI;
  let wag = 1.4;
  switch(phaseName){
    case 'approach': {
      out.set(lerp(0, 0, k), 0.50, lerp(8, 4.5, k));
      head = Math.PI + Math.sin(t*1.3)*0.15;
      wag = 1.6;
    } break;
    case 'greet-tomas': {
      // run forward to Tomas, then circle
      if(k<0.6){
        out.set(lerp(0, 0.55, k/0.6), 0.50, lerp(4.5, -6.6, k/0.6));
      } else {
        const a = (k-0.6)/0.4*Math.PI*2;
        out.set(0.55 + Math.cos(a)*0.7, 0.50, -6.6 + Math.sin(a)*0.7);
      }
      head = Math.PI + Math.sin(t*2.0)*0.25;
      wag = 2.6; // very excited
    } break;
    case 'sniff-cake': {
      out.set(lerp(0.55, 3.4 - 1.0, k), 0.40 - 0.1*Math.sin(t*4), lerp(-6.6, -3.5, k));
      head = Math.PI*0.4 + Math.sin(t*2.0)*0.2; // facing cake roughly
      wag = 1.2;
    } break;
    case 'chase-cat': {
      out.set(lerp(2.3, -2.0, k), 0.50, lerp(-3.5, -1, k));
      head = Math.PI*0.7 + Math.sin(t*4.5)*0.25;
      wag = 2.2;
    } break;
    case 'chase-ball': {
      // ball gets re-thrown at k~0,0.4,0.8
      const segs = 3;
      const seg = Math.floor(k*segs);
      const sk = (k*segs)%1;
      const pts = [
        new THREE.Vector3(-2.0,0.50,-1),
        new THREE.Vector3(-1.5,0.50, 2.5),
        new THREE.Vector3( 1.6,0.50, 1.0),
        new THREE.Vector3(-0.5,0.50,-2.5)
      ];
      const a = pts[seg], b = pts[seg+1];
      out.copy(a).lerp(b, sk);
      head = Math.atan2(b.x-a.x, b.z-a.z) + Math.PI;
      wag = 2.3;
    } break;
    case 'sniff-arch': {
      // circle the arch base
      const a = k*Math.PI*2;
      out.set(Math.cos(a)*1.4, 0.42 - Math.abs(Math.sin(t*3))*0.06, -8 + Math.sin(a)*1.2);
      head = a + Math.PI/2 + Math.sin(t*3)*0.15;
      wag = 1.4;
    } break;
    case 'under-cake': {
      out.set(3.4, 0.32, -3.5);
      head = Math.PI*1.0 + Math.sin(t*0.6)*0.3; // looking around lazily
      wag = 0.6;
    } break;
    case 'head-tilt-pemberton': {
      out.set(lerp(3.4, -1.8, k), 0.50, lerp(-3.5, -4.2, k));
      head = Math.PI*0.1 + Math.sin(t*0.8)*0.05;
      wag = 1.0;
    } break;
    case 'follow-lily': {
      // walk back from altar down aisle behind Lily then return
      if(k<0.55){
        out.set(lerp(-1.8, 0, k/0.55), 0.50, lerp(-4.2, 4, k/0.55));
      } else {
        out.set(lerp(0, 0, (k-0.55)/0.45), 0.50, lerp(4, -7.0, (k-0.55)/0.45));
      }
      head = Math.PI + Math.sin(t*1.5)*0.15;
      wag = 1.8;
    } break;
    case 'await-lily': {
      out.set(0, 0.50, -7.0);
      head = Math.PI;
      wag = 1.2;
    } break;
    case 'convergence': {
      out.set(0, 0.50, -7.0);
      head = Math.PI;
      wag = 0.9 + 0.6*Math.sin(t*5);
    } break;
    case 'afterglow': {
      out.set(0 + Math.sin((t-560)*0.3)*0.4, 0.50, -7.0 + Math.cos((t-560)*0.3)*0.4);
      head = Math.PI + Math.sin(t*0.5)*0.2;
      wag = 1.5;
    } break;
  }
  return {pos:out, heading:head, wag:wag};
}

/* ----- Captain Crunch path (parallel to Otto's chase phase) ----- */
function catPos(t){
  // resting / mischief / dash sequence
  // 0..150 : at right side near pew
  // 150..210 : dashes left to right across nave (Otto chases)
  // 210..600 : near cake table watching
  if(t<150){
    return new THREE.Vector3(2.6 + Math.sin(t*0.4)*0.1, 0, -2 + Math.cos(t*0.3)*0.1);
  } else if(t<210){
    const k = (t-150)/60;
    return new THREE.Vector3(lerp(2.6, -3.6, k), 0, lerp(-2, 0.6, k));
  } else {
    return new THREE.Vector3(-3.6 + Math.sin((t-210)*0.2)*0.1, 0, 0.6);
  }
}

/* ----- ball position ----- */
function ballPos(t){
  if(t<210 || t>=270) return new THREE.Vector3(-3.0, 0.10, 4.5);
  const segs = 3;
  const k = (t-210)/60;
  const seg = Math.floor(k*segs);
  const sk = (k*segs)%1;
  const pts = [
    new THREE.Vector3(-2.0, 0.10, -1.0),
    new THREE.Vector3(-1.5, 0.10,  2.5),
    new THREE.Vector3( 1.6, 0.10,  1.0),
    new THREE.Vector3(-0.5, 0.10, -2.5)
  ];
  // arc when first thrown
  const a = pts[seg], b = pts[seg+1];
  const out = a.clone().lerp(b, sk);
  out.y = 0.10 + Math.sin(sk*Math.PI)*0.6;
  return out;
}

/* ----- Lily positions ----- */
function lilyPos(t){
  // mostly at altar; during follow-lily phase she walks down then back; at 540 she kneels at z=-7
  if(t>=450 && t<520){
    const k = (t-450)/70;
    if(k<0.55){
      // walks back down aisle a bit
      return {p:new THREE.Vector3(-0.55, 0, lerp(-7.3, -3.5, k/0.55)), kneel:0, faceCam:0};
    } else {
      return {p:new THREE.Vector3(-0.55, 0, lerp(-3.5, -7.0, (k-0.55)/0.45)), kneel:0, faceCam:0};
    }
  }
  if(t>=520 && t<540){
    return {p:new THREE.Vector3(-0.2, 0, -7.0), kneel:0, faceCam:0};
  }
  if(t>=540 && t<560){
    const k = (t-540)/20;
    // kneel down to dog level, face camera
    return {
      p: new THREE.Vector3(lerp(-0.2,0,smoothstep(0,0.4,k)), 0, lerp(-7.0,-6.5,smoothstep(0,0.4,k))),
      kneel: smoothstep(0, 0.6, k),
      faceCam: smoothstep(0.1, 0.6, k)
    };
  }
  if(t>=560){
    // stays kneeling for a bit then rises
    const k = clamp((t-560)/40,0,1);
    return {
      p: new THREE.Vector3(lerp(0,-0.55,k), 0, lerp(-6.5,-7.3,k)),
      kneel: 1-k,
      faceCam: 1-k
    };
  }
  return {p:new THREE.Vector3(-0.55, 0, -7.3), kneel:0, faceCam:0};
}

function paintThumb(th, t){
  const ctx = th.ctx, w = th.cv.width, h = th.cv.height;
  // base color by role
  const palettes = {
    'bride':       ['#fff8eb','#f4a3a8','#d6b07a'],
    'groom':       ['#1a140d','#3a2a18','#a08060'],
    'dog':         ['#3a2418','#e9c46a','#fff1c4'],
    'cat':         ['#0f0a08','#3a2418','#e0c89a'],
    'matriarch':   ['#2a1018','#6c2a3a','#ddd2c0'],
    'baker':       ['#3a4a30','#9bb07a','#fff1d6'],
    'fiddler':     ['#2a1c10','#6a4030','#e9c46a'],
    'lily-aged-9': ['#fff1d6','#ffd6e0','#b0784a'],
    'manor-spirit':['#0a0c14','#3a4a6a','#a0b0c8'],
    'rookery-bird':['#1a2030','#506880','#ffd6a0'],
    'flower-girl': ['#fff8eb','#ffe4b3','#c9d8a3'],
    'floral-arch': ['#fff1d6','#ff8aa1','#c9d8a3']
  };
  const pal = palettes[th.role] || ['#222','#444','#aaa'];
  // gradient sky
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0, pal[0]);
  g.addColorStop(1, pal[1]);
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  // role-specific motif
  const phase = t + (th.id.charCodeAt(0)*0.13);
  ctx.fillStyle = pal[2];
  if(th.role==='dog'){
    // ground line + muzzle silhouette
    ctx.fillRect(0,h-12,w,12);
    ctx.beginPath(); ctx.ellipse(w/2, h-6, 16, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a0e08'; ctx.beginPath(); ctx.arc(w/2, h-9, 2, 0, Math.PI*2); ctx.fill();
  } else if(th.role==='cat'){
    ctx.fillRect(0,h-10,w,10);
    // little cat shape
    ctx.fillStyle = pal[2];
    ctx.beginPath();
    ctx.ellipse(w/2 + Math.sin(phase)*8, h-12, 8, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w/2 + 8 + Math.sin(phase)*8, h-14, 3, 0, Math.PI*2); ctx.fill();
  } else if(th.role==='bride' || th.role==='groom'){
    // aisle perspective
    ctx.fillRect(0,h-10,w,10);
    ctx.fillStyle = pal[2];
    ctx.beginPath();
    ctx.moveTo(w/2-12,h-10); ctx.lineTo(w/2+12,h-10);
    ctx.lineTo(w/2+3,h-30); ctx.lineTo(w/2-3,h-30);
    ctx.closePath(); ctx.fill();
    // figure
    ctx.beginPath(); ctx.arc(w/2, h-32+Math.sin(phase)*1, 3, 0, Math.PI*2); ctx.fill();
  } else if(th.role==='matriarch'){
    ctx.fillRect(0,h-10,w,10);
    ctx.beginPath(); ctx.arc(w/2 + Math.sin(phase*0.5)*2, h-18, 5, 0, Math.PI*2); ctx.fill();
  } else if(th.role==='baker'){
    // cake silhouette
    ctx.fillRect(0,h-10,w,10);
    ctx.fillStyle = pal[2];
    ctx.fillRect(w/2-10, h-22, 20, 12);
    ctx.fillRect(w/2-7,  h-30, 14, 8);
    ctx.fillRect(w/2-4,  h-36, 8, 6);
  } else if(th.role==='fiddler'){
    ctx.fillRect(0,h-10,w,10);
    ctx.strokeStyle = pal[2];
    ctx.beginPath();
    for(let x=0;x<w;x++){
      const y = h-22 + Math.sin((x*0.4)+phase*4)*4;
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  } else if(th.role==='lily-aged-9'){
    ctx.fillRect(0,h-10,w,10);
    // little figure swinging
    ctx.beginPath(); ctx.arc(w/2 + Math.sin(phase)*8, h-18, 4, 0, Math.PI*2); ctx.fill();
  } else if(th.role==='manor-spirit'){
    // wispy
    for(let i=0;i<5;i++){
      ctx.fillStyle = `rgba(160,176,200,${0.2+0.1*i})`;
      ctx.beginPath();
      ctx.ellipse(w/2 + Math.sin(phase+i)*10, h/2 + i*4, 18-i*2, 6, 0, 0, Math.PI*2);
      ctx.fill();
    }
  } else if(th.role==='rookery-bird'){
    // wings
    ctx.strokeStyle = pal[2];
    ctx.lineWidth = 2;
    ctx.beginPath();
    const cx=w/2, cy=h/2;
    ctx.moveTo(cx-12,cy+Math.sin(phase*4)*4);
    ctx.quadraticCurveTo(cx, cy-8, cx+12, cy+Math.sin(phase*4)*4);
    ctx.stroke();
  } else if(th.role==='flower-girl'){
    // confetti
    for(let i=0;i<10;i++){
      ctx.fillStyle = ['#ffd6e0','#fff1c4','#c9d8a3'][i%3];
      ctx.fillRect((i*9 + (phase*15)%9), (i*4 + Math.sin(phase+i)*6)%(h-8) + 4, 3, 3);
    }
  } else if(th.role==='floral-arch'){
    // arch curve
    ctx.strokeStyle = pal[2]; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(w/2, h+4, 18, Math.PI, 0);
    ctx.stroke();
    for(let i=0;i<8;i++){
      ctx.fillStyle = i%2? '#ff8aa1':'#c9d8a3';
      const a = Math.PI + (i/7)*Math.PI;
      ctx.beginPath(); ctx.arc(w/2 + Math.cos(a)*18, h+4 + Math.sin(a)*18, 2, 0, Math.PI*2); ctx.fill();
    }
  } else {
    // generic
    ctx.fillRect(0,h-10,w,10);
  }
  // convergence flash on every thumb at 540
  const T = t % RESEED_S;
  if(T>=540 && T<560){
    ctx.fillStyle = `rgba(244,163,168,${0.45*(1-(T-540)/20)})`;
    ctx.fillRect(0,0,w,h);
  }
}

let lastSeed = SEED;
let lastT = masterT();
let bcLastTick = 0;

/* convergence flash control */
let convergenceFlashed = false;
let convergeAnnounced = false;

/* head-bob state */
let bobPhase = 0;
let sniffPhase = 0;

function update(dt){
  const Tabs = masterT();
  const T = Tabs % RESEED_S;

  // reseed?
  const cs = currentSeed();
  if(cs !== lastSeed){
    SEED = cs; lastSeed = cs; rng = mkRng(SEED);
    convergenceFlashed = false;
    convergeAnnounced = false;
    Object.keys(triggered).forEach(k=>delete triggered[k]);
    showChyron('reseed · brimsworth resumes', 4.5);
    appendLedger();
  }

  // phase
  const ph = getPhase(T);
  elPhase.textContent = ph[2];
  elMC.textContent = T.toFixed(1);
  elSeed.textContent = '0x'+SEED.toString(16).slice(0,7);
  elRS.textContent = (RESEED_S - T).toFixed(0);

  // BroadcastChannel tick (1Hz)
  if(bc && (Tabs - bcLastTick) > 1.0){
    bcLastTick = Tabs;
    try{ bc.postMessage({type:'tick',pov_id:POV_ID,t:T}); }catch(_){}
  }

  /* otto target */
  const tgt = targetForPhase(ph[2], T, ph[0], ph[1]);
  // smoothly chase target
  otto.pos.x += (tgt.pos.x - otto.pos.x) * Math.min(1, dt*2.6);
  otto.pos.z += (tgt.pos.z - otto.pos.z) * Math.min(1, dt*2.6);
  otto.pos.y += (tgt.pos.y - otto.pos.y) * Math.min(1, dt*4.0);
  // heading wraps
  let dh = tgt.heading - otto.heading;
  while(dh>Math.PI) dh -= Math.PI*2;
  while(dh<-Math.PI) dh += Math.PI*2;
  otto.heading += dh * Math.min(1, dt*3.2);
  otto.tailWag += (tgt.wag - otto.tailWag)*Math.min(1, dt*2);

  /* head bob driven by tail wag (faster wag => more bob), and sniff cycle */
  bobPhase += dt * (5.5 + otto.tailWag*1.3);
  sniffPhase += dt * 1.2;
  const bobY = Math.sin(bobPhase) * 0.025 * otto.tailWag;
  const bobR = Math.sin(bobPhase*0.5) * 0.02 * otto.tailWag;
  const sniffYaw = Math.sin(sniffPhase) * 0.08;
  const sniffPitch = Math.sin(sniffPhase*1.3 + 0.7) * 0.06;
  // occasional sniff dive (head dips lower briefly)
  const dipT = (T*0.5) % 7;
  const dip = (dipT<0.5) ? -0.06*Math.sin((dipT/0.5)*Math.PI) : 0;

  /* camera orientation */
  // base look direction along otto.heading
  const lookY = otto.pos.y + bobY + dip;
  camera.position.set(otto.pos.x, lookY, otto.pos.z);
  // pitch slightly downward (dogs look at ground a lot)
  let pitch = -0.10 + sniffPitch + dip*1.5;
  // during specific phases, look at specific targets
  let lookAt = null;
  if(ph[2]==='greet-tomas')        lookAt = new THREE.Vector3(0.55, 1.4, -7.3);
  else if(ph[2]==='sniff-cake')    lookAt = new THREE.Vector3(3.4, 1.0, -3.5);
  else if(ph[2]==='chase-cat'){
    const cp = catPos(T);
    lookAt = new THREE.Vector3(cp.x, 0.25, cp.z);
  } else if(ph[2]==='chase-ball'){
    const bp = ballPos(T);
    lookAt = bp.clone().add(new THREE.Vector3(0,0.05,0));
  } else if(ph[2]==='sniff-arch')  lookAt = new THREE.Vector3(0, 1.6, -8);
  else if(ph[2]==='under-cake')    lookAt = new THREE.Vector3(2.2, 0.6, -3.5);
  else if(ph[2]==='head-tilt-pemberton') lookAt = new THREE.Vector3(-2.3, 1.4, -4.8);
  else if(ph[2]==='follow-lily'){
    lookAt = new THREE.Vector3(lily.position.x, 1.4, lily.position.z);
  } else if(ph[2]==='await-lily' || ph[2]==='convergence' || ph[2]==='afterglow'){
    lookAt = new THREE.Vector3(lily.position.x, lily.position.y + (1.4 - tgt && 0), lily.position.z);
  }
  if(lookAt){
    camera.lookAt(lookAt);
    // keep some pitch jitter & roll for dog feel
    camera.rotation.z += bobR;
    camera.rotation.y += sniffYaw*0.4;
    camera.rotation.x += sniffPitch*0.3;
  } else {
    // free heading
    camera.rotation.set(pitch, otto.heading + sniffYaw, bobR);
  }

  /* head-tilt phase: cute 30deg roll oscillation */
  if(ph[2]==='head-tilt-pemberton'){
    const k = (T - ph[0])/(ph[1]-ph[0]);
    const tilt = Math.sin(k*Math.PI*4) * 0.45 * smoothstep(0.1,0.6,k) * (1-smoothstep(0.7,1,k));
    camera.rotation.z += tilt;
  }

  /* convergence camera lock */
  if(ph[2]==='convergence'){
    const k = (T-540)/20;
    // Lily's face position
    const ly = lerp(1.55, 0.55, smoothstep(0,0.6,k)); // her head drops to 0.55m as she kneels
    const lx = lily.position.x;
    const lz = lily.position.z;
    camera.lookAt(lx, ly, lz);
    // slight wobble of joy
    camera.rotation.z += Math.sin(T*9)*0.04 * (1-smoothstep(0.7,1,k));
    // close in slightly (dog leans in)
    const lean = smoothstep(0.2, 0.7, k)*0.18;
    const dir = new THREE.Vector3(lx,ly,lz).sub(camera.position).normalize();
    camera.position.addScaledVector(dir, lean*dt*5);
  }

  /* update Lily/Tomas/cast positions */
  const lp = lilyPos(T);
  lily.position.x = lp.p.x;
  lily.position.z = lp.p.z;
  // kneel (scale down + lower)
  const kn = lp.kneel;
  lily.scale.y = 1 - 0.45*kn;
  lily.position.y = -0.05 * kn;
  if(lp.faceCam>0.5 && ph[2]==='convergence'){
    // face camera
    const dx = camera.position.x - lily.position.x;
    const dz = camera.position.z - lily.position.z;
    lily.rotation.y = Math.atan2(dx, dz) - Math.PI;
  } else {
    lily.rotation.y = 0; // facing -Z (toward altar) by default
  }
  // tomas slight sway
  tomas.position.y = Math.sin(Tabs*0.6)*0.01;
  tomas.rotation.y = Math.sin(Tabs*0.4)*0.03;
  // pemberton chuckle when head-tilt
  if(ph[2]==='head-tilt-pemberton'){
    pemberton.userData.head.position.y = 1.55 + Math.abs(Math.sin(Tabs*5))*0.03;
  }
  // hattie stirring
  hattie.userData.armR.rotation.x = Math.sin(Tabs*3)*0.4;
  // oren fiddling
  oren.userData.armR.rotation.x = Math.sin(Tabs*8)*0.6;
  fiddle.position.set(-2.8, 1.35 + Math.sin(Tabs*8)*0.02, 4);

  /* cat update */
  const cp = catPos(T);
  cat.position.copy(cp);
  cat.rotation.y = Math.atan2(cp.x - cat.userData.lastX || 0.001, cp.z - cat.userData.lastZ || 0.001) || 0;
  cat.userData.lastX = cp.x; cat.userData.lastZ = cp.z;

  /* ball update */
  const bp = ballPos(T);
  ball.position.copy(bp);

  /* CHYRONS */
  if(T>=0 && T<2)  trig('intro', ()=>showChyron('brimsworth · convergence · pov 03 / 12 — otto', 4.5));
  if(T>=40)        trig('greet', ()=>showChyron(NAME.dog+' bolts to '+NAME.groom+' · tail at terminal velocity', 4));
  if(T>=92)        trig('cake',  ()=>showChyron('the cake. so close. so sniffable.', 4));
  if(T>=152)       trig('cat',   ()=>showChyron(NAME.cat+' streaks across the nave · chase ON', 4));
  if(T>=212)       trig('ball',  ()=>showChyron('a ball appears · physics is for losers', 4));
  if(T>=272)       trig('arch',  ()=>showChyron('flowers smell like flowers · this is news', 4));
  if(T>=332)       trig('under', ()=>showChyron('under the cake table · strategic napping zone', 4));
  if(T>=392)       trig('tilt',  ()=>showChyron(NAME.matriarch+' speaks · head-tilt initiated', 4));
  if(T>=452)       trig('follow',()=>showChyron('follow '+NAME.bride.split(' ')[0]+' · tail metronome', 4));
  if(T>=520)       trig('await', ()=>showChyron('she stops · she turns · she sees me', 4));
  if(T>=540 && !convergeAnnounced){
    convergeAnnounced = true;
    showChyron('convergence: otto.', 8, true);
    elGB.classList.add('on');
    elPulse.classList.add('on');
    elCV.textContent = 'CONVERGED · '+T.toFixed(1)+'s';
    elCV.classList.remove('pulse');
    try{ bc && bc.postMessage({type:'converge',pov_id:POV_ID,t:T}); }catch(_){}
  }
  if(T>=556){
    elGB.classList.remove('on');
    elPulse.classList.remove('on');
  }
  if(T>=560 && T<562) trig('after',()=>showChyron('a hand on the head · the world is gold', 5));
  if(T>=595)         trig('rs',   ()=>showChyron('reseed pending · t→0', 3));

  tickChyron();

  // thumbnails (paint at ~10 Hz)
  if(!update._thumbT || (Tabs - update._thumbT)>0.1){
    update._thumbT = Tabs;
    thumbs.forEach(th=>{
      paintThumb(th, Tabs);
      const peerT = peerClocks[th.id];
      th.clk.textContent = (peerT!=null ? peerT.toFixed(0) : '··');
    });
  }
}

let prev = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-prev)/1000);
  prev = now;
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* clean up on hide */
window.addEventListener('beforeunload',()=>{ try{ bc && bc.close(); }catch(_){} });

})();
</script>
