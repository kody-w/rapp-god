<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIVILIZATION RISE — CIV-NET</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Georgia,'Times New Roman',serif}
#stage{position:fixed;inset:0;z-index:1}
canvas{display:block}
.ov{position:fixed;pointer-events:none;z-index:10}
#logo{top:14px;left:18px;display:flex;align-items:center;gap:10px;font-family:Arial,sans-serif}
#logo .badge{background:linear-gradient(135deg,#1a3a6b,#4a7ab8);padding:8px 14px;border-radius:3px;border:1px solid #d4b04a;font-weight:900;letter-spacing:3px;font-size:15px;color:#fff;text-shadow:0 1px 2px #000;box-shadow:0 2px 10px rgba(0,0,0,.6)}
#logo .net{display:block;font-size:10px;color:#d4b04a;letter-spacing:3px;font-weight:700;margin-top:2px}
#logo .live{display:flex;align-items:center;gap:6px;background:#c10;padding:6px 12px;border-radius:2px;font-weight:900;font-size:13px;letter-spacing:2px}
#logo .dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#agehead{top:14px;left:50%;transform:translateX(-50%);text-align:center;font-family:'Times New Roman',serif}
#agehead .age{background:linear-gradient(90deg,rgba(20,20,40,.8),rgba(80,60,20,.85),rgba(20,20,40,.8));border-top:1px solid #d4b04a;border-bottom:1px solid #d4b04a;padding:8px 28px;font-weight:900;font-size:18px;letter-spacing:4px;color:#fff;text-shadow:0 0 8px #d4b04a}
#agehead .yr{margin-top:4px;background:rgba(0,0,0,.65);padding:4px 16px;font-size:12px;letter-spacing:3px;color:#d4b04a;font-weight:700}
#info{top:14px;right:18px;text-align:right;font-family:Arial,sans-serif}
#info .cam{background:rgba(0,0,0,.7);border:1px solid #888;padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#0f6;letter-spacing:1.5px;font-weight:700}
#info .stat{margin-top:5px;background:linear-gradient(90deg,#1a3a6b,#4a7ab8);padding:5px 12px;font-weight:700;font-size:11px;letter-spacing:1.5px;border-radius:2px}
#tech{position:fixed;left:14px;top:90px;width:210px;background:rgba(8,12,28,.82);border-left:3px solid #d4b04a;border-radius:0 4px 4px 0;padding:10px 12px;z-index:10;font-family:Arial,sans-serif;pointer-events:none}
#tech .ttl{font-size:10px;letter-spacing:3px;color:#d4b04a;font-weight:800}
#tech .sub{font-size:9px;color:#aaa;margin-bottom:8px}
#tech .row{display:flex;align-items:center;gap:7px;margin:4px 0;font-size:11px;font-weight:700;color:#7a7a8a;transition:all .4s}
#tech .row.on{color:#fff;text-shadow:0 0 6px #d4b04a}
#tech .row.now{color:#ffe084;animation:flash 1s infinite}
#tech .dot2{width:9px;height:9px;border-radius:50%;background:#333;border:1px solid #555;flex-shrink:0;transition:all .4s}
#tech .row.on .dot2{background:#d4b04a;border-color:#fff;box-shadow:0 0 8px #d4b04a}
#tech .row.now .dot2{background:#ffe084;animation:flash 1s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}
#wonders{position:fixed;right:14px;top:90px;width:220px;background:rgba(8,12,28,.82);border-right:3px solid #c89b54;border-radius:4px 0 0 4px;padding:10px 12px;z-index:10;font-family:Arial,sans-serif;pointer-events:none}
#wonders .ttl{font-size:10px;letter-spacing:3px;color:#c89b54;font-weight:800;text-align:right}
#wonders .sub{font-size:9px;color:#aaa;margin-bottom:8px;text-align:right}
#wonders .wrow{display:flex;justify-content:space-between;align-items:center;margin:3px 0;font-size:11px;font-weight:700;color:#666;transition:all .4s}
#wonders .wrow.on{color:#fff}
#wonders .wrow.now{color:#ffd884;animation:flash 1s infinite}
#wonders .icn{font-size:13px;flex-shrink:0}
#leaders{position:fixed;right:14px;bottom:160px;width:230px;background:rgba(8,12,28,.85);border-right:3px solid #d4b04a;padding:10px 12px;z-index:10;font-family:Arial,sans-serif;pointer-events:none}
#leaders .ttl{font-size:10px;letter-spacing:3px;color:#d4b04a;font-weight:800;text-align:right;margin-bottom:6px}
#leaders .lrow{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px;font-weight:700}
#leaders .flag{width:14px;height:10px;border:1px solid #fff;flex-shrink:0;box-shadow:0 0 4px rgba(0,0,0,.6)}
#leaders .nm{flex:1;color:#fff;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
#leaders .sc{font-family:'Courier New',monospace;font-size:10px;color:#d4b04a}
#scores{position:fixed;left:14px;bottom:160px;width:240px;background:rgba(8,12,28,.85);border-left:3px solid #d4b04a;padding:10px 12px;z-index:10;font-family:Arial,sans-serif;pointer-events:none}
#scores .ttl{font-size:10px;letter-spacing:3px;color:#d4b04a;font-weight:800;margin-bottom:6px}
#scores .scrow{display:grid;grid-template-columns:14px 1fr 30px 30px 30px 30px;gap:4px;font-size:9px;font-weight:800;color:#fff;align-items:center;margin:3px 0}
#scores .hdr{color:#d4b04a;font-size:8px;letter-spacing:1px}
#scores .flg{width:12px;height:8px;border:1px solid #fff}
#lower3{position:fixed;left:30px;bottom:120px;z-index:11;pointer-events:none;transform:translateX(-120%);transition:transform .6s cubic-bezier(.2,.9,.3,1.1);max-width:560px}
#lower3.show{transform:translateX(0)}
#lower3 .bar{background:linear-gradient(90deg,#1a3a6b 0%,#0a1a3b 100%);border-left:5px solid #d4b04a;padding:10px 18px;font-family:Arial,sans-serif;box-shadow:0 4px 14px rgba(0,0,0,.7)}
#lower3 .nm{font-size:20px;font-weight:900;letter-spacing:1.5px;color:#fff;text-shadow:1px 1px 2px #000}
#lower3 .role{font-size:11px;color:#d4b04a;letter-spacing:2.5px;font-weight:700;margin-top:2px}
#chyron{position:fixed;left:30%;right:30%;top:55%;z-index:12;pointer-events:none;transform:translateY(-50%) scale(.7);opacity:0;transition:transform .5s,opacity .5s}
#chyron.show{transform:translateY(-50%) scale(1);opacity:1}
#chyron .box{background:linear-gradient(135deg,rgba(255,224,132,.95),rgba(212,176,74,.95));border:3px double #fff;color:#000;padding:14px 24px;text-align:center;font-family:'Times New Roman',serif;box-shadow:0 8px 30px rgba(0,0,0,.8)}
#chyron .ttl{font-size:11px;letter-spacing:5px;font-weight:700;color:#3a1a0a}
#chyron .msg{font-size:22px;font-weight:900;margin-top:4px;letter-spacing:1.5px;text-shadow:1px 1px 0 #fff}
#ticker{position:fixed;left:0;right:0;bottom:0;height:42px;background:linear-gradient(180deg,#0a1a3b,#000);border-top:2px solid #d4b04a;z-index:11;display:flex;align-items:center;font-family:Arial,sans-serif}
#ticker .lbl{background:linear-gradient(90deg,#c10,#900);height:100%;display:flex;align-items:center;padding:0 14px;font-weight:900;font-size:13px;letter-spacing:2px;color:#fff;flex-shrink:0;text-shadow:1px 1px 0 #000}
#ticker .scroll{flex:1;overflow:hidden;height:100%;position:relative}
#ticker .track{position:absolute;white-space:nowrap;font-size:14px;font-weight:700;color:#fff;line-height:42px;animation:tk 90s linear infinite;letter-spacing:.5px}
#ticker .track span{margin-right:54px;color:#fff}
#ticker .track .b{color:#d4b04a;margin-right:8px}
#ticker .clock{padding:0 16px;font-family:'Courier New',monospace;font-size:12px;color:#d4b04a;font-weight:800;flex-shrink:0;border-left:1px solid #444}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
#anchor{position:fixed;right:18px;bottom:62px;width:200px;height:120px;border:2px solid #d4b04a;background:#001;z-index:11;box-shadow:0 6px 18px rgba(0,0,0,.7);overflow:hidden}
#anchor canvas{display:block;width:100%;height:100%}
#anchor .lbl{position:absolute;top:4px;left:6px;background:#c10;color:#fff;font-size:9px;font-weight:900;letter-spacing:1.5px;padding:2px 6px;font-family:Arial,sans-serif}
#anchor .nm{position:absolute;bottom:4px;left:6px;background:rgba(0,0,0,.8);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;font-family:Arial,sans-serif;letter-spacing:1px}
#flag{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:13;pointer-events:none;opacity:0;transition:opacity 1s}
#flag.show{opacity:1}
#flag .box{padding:30px 50px;background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(20,20,40,.9));border:4px double #d4b04a;text-align:center;font-family:'Times New Roman',serif;box-shadow:0 0 60px rgba(212,176,74,.5)}
#flag .h1{font-size:34px;font-weight:900;letter-spacing:3px;color:#d4b04a;text-shadow:0 0 20px #d4b04a}
#flag .h2{font-size:14px;color:#fff;margin-top:8px;letter-spacing:4px}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:9;box-shadow:inset 0 0 200px rgba(0,0,0,.7)}
</style>
</head>
<body>
<!-- ROUND13_SAGA v1 -->
<div id="stage"></div>
<div id="vignette"></div>
<div id="logo" class="ov">
  <div><div class="badge">CIV-NET</div><span class="net">HISTORY UNFOLDING</span></div>
  <div class="live"><div class="dot"></div>LIVE</div>
</div>
<div id="agehead" class="ov">
  <div class="age" id="ageT">STONE AGE</div>
  <div class="yr" id="ageY">YEAR -3000 OF HUMANKIND</div>
</div>
<div id="info" class="ov">
  <div class="cam" id="camB">CAM: WORLD</div>
  <div class="stat" id="ageStat">DAWN OF MAN</div>
</div>
<div id="tech" class="ov">
  <div class="ttl">TECH TREE</div>
  <div class="sub">Knowledge of the ages</div>
  <div id="techList"></div>
</div>
<div id="wonders" class="ov">
  <div class="ttl">WONDERS</div>
  <div class="sub">Marvels of civilization</div>
  <div id="wList"></div>
</div>
<div id="leaders" class="ov">
  <div class="ttl">CIV LEADERS</div>
  <div id="lList"></div>
</div>
<div id="scores" class="ov">
  <div class="ttl">SCORES</div>
  <div class="scrow hdr"><span></span><span>CIV</span><span>POP</span><span>SCI</span><span>GLD</span><span>MIL</span></div>
  <div id="sList"></div>
</div>
<div id="lower3"><div class="bar"><div class="nm" id="l3n">—</div><div class="role" id="l3r">—</div></div></div>
<div id="chyron"><div class="box"><div class="ttl" id="chT">—</div><div class="msg" id="chM">—</div></div></div>
<div id="anchor"><canvas id="anchorC" width="400" height="240"></canvas><div class="lbl">ANCHOR</div><div class="nm" id="anN">PROF. HELENA VANCE</div></div>
<div id="ticker">
  <div class="lbl">CIV-WIRE</div>
  <div class="scroll"><div class="track" id="tkT"><span></span></div></div>
  <div class="clock" id="clk">YR -3000</div>
</div>
<div id="flag"><div class="box"><div class="h1" id="flH1">CIVILIZATION COMPLETE</div><div class="h2" id="flH2">ASCENSION TO TYPE-II KARDASHEV</div></div></div>
<script>
"use strict";
(function(){
const TAU=Math.PI*2, T3=THREE;
const W=()=>innerWidth,H=()=>innerHeight;
const renderer=new T3.WebGLRenderer({antialias:true,powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=false;
document.getElementById("stage").appendChild(renderer.domElement);
let scene,cam,clock,raf;
const dispose=()=>{try{renderer.dispose();renderer.forceContextLoss&&renderer.forceContextLoss();}catch(e){}};
addEventListener("beforeunload",dispose);
addEventListener("resize",()=>{cam.aspect=W()/H();cam.updateProjectionMatrix();renderer.setSize(W(),H());});

// ---- helpers ----
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b));
const pick=a=>a[irand(0,a.length)];
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

// ---- name pools ----
const CIV_NAMES=["Aurelians","Khemetri","Vanthar","Solengar","Mireshi","Ostrovan","Calidari","Kazanthi","Pelarian","Drakari","Tsenetep","Vorlandic","Hyperborean","Sundari","Meridian","Astralic"];
const LEADER_F=["Aetius","Vasek","Inara","Talyn","Ozara","Krelm","Mireya","Dorian","Selka","Yonatan","Nemea","Tarkin","Ileska","Vondar","Petra","Cassian"];
const LEADER_L=["the Eternal","Sky-Walker","Iron-Hand","the Wise","of Three Rivers","the Architect","Bronze-Heart","the Unburnt","Star-Born","of the Hidden Coast","the Reformer","the Conqueror","Mind-Touched","the Engineer","the Visionary","of Many Names"];
const CIV_COLORS=[0xc83a3a,0x3a78c8,0xd4b04a,0x9a4ac8,0x3aa86a,0xd4783a,0x4ad4c8,0xc83aa0];

// ---- fixed tech & wonders ----
const TECHS=[
  {n:"Pottery",a:0},{n:"Bronze Working",a:0},{n:"Iron Working",a:0},
  {n:"Currency",a:1},{n:"Mathematics",a:1},{n:"Astronomy",a:1},
  {n:"Gunpowder",a:2},{n:"Steam Power",a:2},{n:"Industrialization",a:2},
  {n:"Computing",a:3},{n:"Spaceflight",a:3},{n:"Singularity",a:3}
];
const WONDERS=[
  {n:"Pyramids",a:0,i:"\u25B2"},{n:"Hanging Gardens",a:0,i:"\u2698"},{n:"Great Wall",a:0,i:"\u25A0"},
  {n:"Coliseum",a:1,i:"\u25CB"},{n:"Cathedral",a:1,i:"\u271A"},{n:"University",a:1,i:"\u2691"},
  {n:"Bank",a:2,i:"\u00A4"},{n:"Industrial Park",a:2,i:"\u2692"},{n:"Hoover Dam",a:2,i:"\u2248"},
  {n:"Internet",a:3,i:"\u29C9"},{n:"Spaceport",a:3,i:"\u2737"},{n:"Mars Colony",a:3,i:"\u2641"}
];

const AGES=[
  {n:"STONE & CLASSICAL AGE",sub:"Dawn of Man",y0:-3000,y1:500,sky:0x6a4030,fog:0x3a2418,terr:1.0},
  {n:"MEDIEVAL & RENAISSANCE",sub:"Faith and Fire",y0:500,y1:1700,sky:0x4a4878,fog:0x2a2848,terr:1.0},
  {n:"INDUSTRIAL AGE",sub:"Smoke and Steel",y0:1700,y1:1950,sky:0x6a5a3a,fog:0x3a3024,terr:0.7},
  {n:"MODERN & SPACE AGE",sub:"To the Stars",y0:1950,y1:2200,sky:0x88aacc,fog:0x6088aa,terr:1.0}
];

// ---- biomes ----
const BIOMES=[
  {n:"plains",col:0x9bb86a,h:0.0},
  {n:"forest",col:0x3a7a3a,h:0.05},
  {n:"mountain",col:0x6a6a6a,h:0.6},
  {n:"river",col:0x3a78c8,h:-0.1},
  {n:"desert",col:0xd4b86a,h:0.0},
  {n:"tundra",col:0xd0d8e0,h:0.0}
];

// ---- HEX GRID ----
const GRID=8;
const hexR=1.0;
const hexW=Math.sqrt(3)*hexR;  // 1.732
const hexD=2*hexR;              // 2
function hexCoord(q,r){
  // pointy-top axial → world (x, z)
  const x=hexW*(q+r/2)-((GRID-1)*hexW/2)-((GRID-1)*hexW/4);
  const z=hexD*0.75*r-((GRID-1)*hexD*0.75/2);
  return [x,z];
}

// ---- state ----
let civs=[], tiles=[], cities=[], wonders=[], anims=[], boltsActive=[];
let currentTech=0, currentWonder=0;
let ageIdx=0, ageT=0;
let totalT=0;
let camTarget=new T3.Vector3(0,0,0);
let camPos=new T3.Vector3(0,12,15);
let camLook=new T3.Vector3(0,0,0);
let activeCam="WORLD";
let camTimer=0, camDur=6;
let pollutionLevel=0;
let dirLight, ambLight, sky;
let collapseTriggered=false;
let runId=0;

// ---- world group ----
let world;

function buildHex(biome,height){
  const g=new T3.CylinderGeometry(hexR*0.96,hexR*0.96,0.3+Math.max(0,height),6);
  const m=new T3.MeshLambertMaterial({color:biome.col});
  const mesh=new T3.Mesh(g,m);
  mesh.rotation.y=Math.PI/2;
  return {mesh,m,baseCol:new T3.Color(biome.col)};
}

function makeWorld(){
  if(world){scene.remove(world);world.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});}
  world=new T3.Group();
  tiles=[];
  // pre-design biome map: rivers along a sinuous line, mountains in clusters, forests in patches
  const map=[];
  for(let r=0;r<GRID;r++){
    map[r]=[];
    for(let q=0;q<GRID;q++){
      // base = plains
      let b=0;
      // mountains in NE & SW
      if((q+r>13)||(q+r<3))b=2;
      // a river snake
      const riverY=Math.round(GRID/2+Math.sin(q*0.9)*1.6);
      if(r===riverY||r===riverY-1&&q%3===0)b=3;
      // forests
      if((q*3+r*7)%11===2&&b===0)b=1;
      // desert
      if(r<2&&q>4&&b===0)b=4;
      // tundra
      if(r>5&&q<3&&b===0)b=5;
      map[r][q]=b;
    }
  }
  for(let r=0;r<GRID;r++){
    for(let q=0;q<GRID;q++){
      const b=BIOMES[map[r][q]];
      const [x,z]=hexCoord(q,r);
      const t=buildHex(b,b.h);
      t.mesh.position.set(x,b.h/2,z);
      t.q=q; t.r=r; t.bi=map[r][q]; t.owner=-1; t.city=null; t.wonder=null;
      t.x=x; t.z=z;
      t.cityLevel=0;
      world.add(t.mesh);
      tiles.push(t);
    }
  }
  // edge sea: ring of dark blue tiles around (visual border)
  const sea=new T3.Mesh(new T3.PlaneGeometry(40,40),new T3.MeshBasicMaterial({color:0x1a3a5a}));
  sea.rotation.x=-Math.PI/2;
  sea.position.y=-0.4;
  world.add(sea);
  scene.add(world);
}

// ---- city builder (low-poly stacked) ----
function makeHut(civCol){
  const g=new T3.Group();
  const base=new T3.Mesh(new T3.CylinderGeometry(0.18,0.22,0.18,6),new T3.MeshLambertMaterial({color:0x9a6a3a}));
  base.position.y=0.09;
  const roof=new T3.Mesh(new T3.ConeGeometry(0.24,0.22,6),new T3.MeshLambertMaterial({color:0x6a3a1a}));
  roof.position.y=0.3;
  g.add(base,roof);
  return g;
}
function makeHouse(civCol){
  const g=new T3.Group();
  const m1=new T3.MeshLambertMaterial({color:0xc8b48a});
  const m2=new T3.MeshLambertMaterial({color:0x8a3018});
  const b=new T3.Mesh(new T3.BoxGeometry(0.32,0.28,0.32),m1);
  b.position.y=0.14;
  const r=new T3.Mesh(new T3.ConeGeometry(0.28,0.22,4),m2);
  r.position.y=0.39;
  r.rotation.y=Math.PI/4;
  g.add(b,r);
  return g;
}
function makeWalledTown(civCol){
  const g=new T3.Group();
  const wm=new T3.MeshLambertMaterial({color:0x9a8a6a});
  const wallH=0.18;
  for(let i=0;i<6;i++){
    const a=i/6*TAU;
    const seg=new T3.Mesh(new T3.BoxGeometry(0.5,wallH,0.06),wm);
    seg.position.set(Math.cos(a)*0.42,wallH/2,Math.sin(a)*0.42);
    seg.rotation.y=a+Math.PI/2;
    g.add(seg);
    const tower=new T3.Mesh(new T3.CylinderGeometry(0.05,0.06,0.28,6),wm);
    tower.position.set(Math.cos(a)*0.42,0.14,Math.sin(a)*0.42);
    g.add(tower);
  }
  // keep
  const keep=new T3.Mesh(new T3.BoxGeometry(0.32,0.36,0.32),new T3.MeshLambertMaterial({color:0x8a7a5a}));
  keep.position.y=0.18;
  const flag=new T3.Mesh(new T3.PlaneGeometry(0.18,0.1),new T3.MeshBasicMaterial({color:civCol,side:T3.DoubleSide}));
  flag.position.set(0.04,0.42,0);
  const pole=new T3.Mesh(new T3.CylinderGeometry(0.005,0.005,0.18),new T3.MeshBasicMaterial({color:0xd4d4d4}));
  pole.position.y=0.45;
  g.add(keep,flag,pole);
  return g;
}
function makeMetropolis(civCol){
  const g=new T3.Group();
  const conc=new T3.MeshLambertMaterial({color:0x707080});
  const win=new T3.MeshBasicMaterial({color:0xd4e8ff});
  for(let i=0;i<5;i++){
    const a=i/5*TAU;
    const h=0.4+Math.random()*0.6;
    const tower=new T3.Mesh(new T3.BoxGeometry(0.18,h,0.18),conc);
    tower.position.set(Math.cos(a)*0.22,h/2,Math.sin(a)*0.22);
    g.add(tower);
    const cap=new T3.Mesh(new T3.BoxGeometry(0.14,0.04,0.14),win);
    cap.position.set(Math.cos(a)*0.22,h+0.02,Math.sin(a)*0.22);
    g.add(cap);
  }

function setCityLevel(tile,level){
  tile.cityLevel=level;
  if(tile.city){tile.city.parent.remove(tile.city);tile.city.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});tile.city=null;}
  if(level<=0)return;
  const civCol=tile.owner>=0?civs[tile.owner].color:0xffffff;
  let c;
  if(level===1)c=makeHut(civCol);
  else if(level===2)c=makeHouse(civCol);
  else if(level===3)c=makeWalledTown(civCol);
  else if(level===4)c=makeMetropolis(civCol);
  else c=makeSpaceCity(civCol);
  c.position.set(tile.x,BIOMES[tile.bi].h+0.16,tile.z);
  c.userData.tile=tile;
  c.userData.spawnT=totalT;
  world.add(c);
  tile.city=c;
}

function placeWonder(name){
  // pick an unowned-but-eligible tile far from existing wonders
  const candidates=tiles.filter(t=>t.bi!==3&&t.bi!==2&&!t.wonder);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>{
    const da=wonders.reduce((s,w)=>s+1/(1+Math.hypot(a.x-w.tile.x,a.z-w.tile.z)),0);
    const db=wonders.reduce((s,w)=>s+1/(1+Math.hypot(b.x-w.tile.x,b.z-w.tile.z)),0);
    return da-db;
  });
  const t=candidates[0];
  const civ=civs[t.owner>=0?t.owner:irand(0,civs.length)];
  const w=buildWonder(name,civ.color);
  w.scale.set(0.01,0.01,0.01);
  w.position.set(t.x,BIOMES[t.bi].h+0.16,t.z);
  world.add(w);
  t.wonder=w;
  const ent={name,tile:t,group:w,civ:civ.id,t0:totalT,riseT:3.0};
  wonders.push(ent);
  return ent;
}

// ---- civs ----
function spawnCivs(){
  civs=[];
  const palette=[...CIV_COLORS].sort(()=>Math.random()-.5).slice(0,4);
  const usedNames=new Set(),usedLeaders=new Set();
  for(let i=0;i<4;i++){
    let name;do{name=pick(CIV_NAMES);}while(usedNames.has(name));
    usedNames.add(name);
    let lf;do{lf=pick(LEADER_F);}while(usedLeaders.has(lf));
    usedLeaders.add(lf);
    const ll=pick(LEADER_L);
    civs.push({
      id:i,name,color:palette[i],
      colorHex:"#"+palette[i].toString(16).padStart(6,"0"),
      leader:lf+" "+ll,
      pop:1,sci:1,gold:1,mil:1,
      capital:null,tiles:0,
      score:0
    });
  }
  // place capitals: pick 4 plains/forest tiles in different quadrants
  const quads=[{q:[0,3],r:[0,3]},{q:[4,7],r:[0,3]},{q:[0,3],r:[4,7]},{q:[4,7],r:[4,7]}];
  for(let i=0;i<4;i++){
    const qd=quads[i];
    const opts=tiles.filter(t=>t.q>=qd.q[0]&&t.q<=qd.q[1]&&t.r>=qd.r[0]&&t.r<=qd.r[1]&&(t.bi===0||t.bi===1||t.bi===4));
    if(opts.length){
      const t=pick(opts);
      t.owner=i;civs[i].capital=t;civs[i].tiles=1;
      setCityLevel(t,1);
    }
  }
}

// ---- territory expansion ----
function neighbors(t){
  const offsets=[[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
  const out=[];
  for(const [dq,dr] of offsets){
    const nq=t.q+dq,nr=t.r+dr;
    if(nq>=0&&nq<GRID&&nr>=0&&nr<GRID){
      out.push(tiles[nr*GRID+nq]);
    }
  }
  return out;
}

function expandCivs(dt){
  // each civ expands probabilistically
  for(const civ of civs){
    if(Math.random()<0.4*dt*(1+ageIdx*0.3)){
      const owned=tiles.filter(t=>t.owner===civ.id);
      if(!owned.length)continue;
      const ot=pick(owned);
      const adj=neighbors(ot).filter(n=>n.owner===-1&&n.bi!==2&&n.bi!==3);
      if(adj.length){
        const target=pick(adj);
        target.owner=civ.id;
        civ.tiles++;
        // chance to found a city
        if(Math.random()<0.25&&!target.city){
          setCityLevel(target,1);
        }
      }
    }
  }
}

function upgradeCities(){
  // city level scales with age
  const targetLevel=Math.min(5,1+ageIdx+(ageT>0.6?1:0));
  for(const t of tiles){
    if(t.city&&t.cityLevel<targetLevel&&Math.random()<0.04){
      setCityLevel(t,t.cityLevel+1);
    }
  }
}

// ---- battles (combat lights between civs) ----
const battles=[];
function startBattle(){
  // pick two adjacent civs, find a frontier tile
  for(let try_=0;try_<8;try_++){
    const a=irand(0,4),b=(a+1+irand(0,3))%4;
    if(a===b)continue;
    const front=tiles.filter(t=>t.owner===a&&neighbors(t).some(n=>n.owner===b));
    if(front.length){
      const t=pick(front);
      battles.push({tile:t,a,b,t0:totalT,dur:rand(4,7)});
      addTicker(`\u2694 ${civs[a].name} clash with ${civs[b].name} near ${t.bi===4?"the desert":t.bi===5?"frozen lands":"the frontier"}`);
      return;
    }
  }
}

  // mouth (animated)
  const mo=Math.sin(mouthT*8)*.5+.5;
  aCtx.fillStyle="#5a2818";
  aCtx.fillRect(232,125,16,2+mo*4);
  // overlay tint
  aCtx.fillStyle="rgba(212,176,74,.04)";aCtx.fillRect(0,0,w,h);
  document.getElementById("anN").textContent=name;
}

// ---- age banner & sky ----
function setSkyForAge(idx,blend){
  const age=AGES[idx];
  const next=AGES[Math.min(idx+1,AGES.length-1)];
  const skyC=new T3.Color(age.sky).lerp(new T3.Color(next.sky),blend);
  scene.background=skyC;
  scene.fog.color=new T3.Color(age.fog).lerp(new T3.Color(next.fog),blend);
  scene.fog.near=20;scene.fog.far=60;
  // pollution (industrial tint)
  pollutionLevel=idx===2?Math.sin(blend*Math.PI)*0.6:idx===3?Math.max(0,1-blend*2)*0.3:0;
  if(dirLight){
    dirLight.intensity=lerp(0.55,1.0,(idx+blend)/4);
    dirLight.color.set(idx===0?0xffd0a0:idx===1?0xffe8c0:idx===2?0xc0a880:0xffffff);
  }
  if(ambLight){
    ambLight.intensity=0.35+(idx*0.05);
  }
}

function setAgeBanner(idx){
  const age=AGES[idx];
  document.getElementById("ageT").textContent=age.n;
  document.getElementById("ageStat").textContent=age.sub.toUpperCase();
}

// ---- year & clock ----
function getYear(){
  const a=AGES[ageIdx];
  return Math.round(lerp(a.y0,a.y1,ageT));
}
function fmtYear(y){
  if(y<0)return Math.abs(y)+" BCE";
  return y+" CE";
}

// ---- events ----
const EVENTS_BY_AGE={
  0:["BARBARIAN INVASION","FOUNDING OF EMPIRE","FIRST FORGE","PHILOSOPHER BORN"],
  1:["BLACK PLAGUE","CRUSADE LAUNCHED","RENAISSANCE BEGINS","CATHEDRAL CONSECRATED"],
  2:["INDUSTRIAL REVOLUTION","WORLD WAR DECLARED","TELEGRAPH STRUNG","COAL BOOM"],
  3:["COLD WAR ENGAGED","MOON LANDING","INTERNET ONLINE","MARS COLONY ESTABLISHED"]
};

function fireEvent(name){
  showChyron("HISTORICAL EVENT",name,4);
  addTicker(`\u26A0 ${name}`);
  if(name==="BARBARIAN INVASION"){
    setCam("BATTLEFIELD",6);
    startBattle();
  }else if(name==="BLACK PLAGUE"){
    // dim some cities
    setCam("CITY",6);
    for(const t of tiles){if(t.city&&Math.random()<0.3)setCityLevel(t,Math.max(1,t.cityLevel-1));}
  }else if(name==="WORLD WAR DECLARED"){
    setCam("BATTLEFIELD",8);
    for(let i=0;i<3;i++)startBattle();
  }else if(name==="MOON LANDING"||name==="MARS COLONY ESTABLISHED"){
    setCam("SPACE",8);
  }else{
    setCam(pick(["WORLD","CITY","WONDER"]),5);
  }
}

// ---- civilizational collapse ----
let collapseT=0,collapseMode=null;
function checkCollapse(){
  if(collapseTriggered)return;
  if(ageIdx===3&&ageT>0.85){
    collapseTriggered=true;
    if(Math.random()<0.5){
      collapseMode="fall";
      showChyron("COLLAPSE WARNING","CIVILIZATIONAL COLLAPSE IMMINENT",5);
      addTicker("\u26A0\u26A0 GLOBAL SYSTEMS FAILING — CIVILIZATIONAL COLLAPSE \u26A0\u26A0");
    }else{
      collapseMode="ascend";
      showChyron("ASCENSION","TYPE-II KARDASHEV ACHIEVED",5);
      addTicker("\u2737 HUMANITY ASCENDS — STARS WITHIN REACH \u2737");
    }
  }
}

// ---- leader quotes ----
const QUOTES_BY_AGE=[
  ["The river gives, and the river takes.","Stone teaches patience; bronze teaches power.","We are the children of fire.","Build high, that the gods may see us."],
  ["Faith is the wall no army can breach.","A coin in the hand is a kingdom in waiting.","The plague spares no crown.","From parchment, an empire of minds."],
  ["Steam is the new horse.","Smoke is the breath of nations.","Iron rails bind the world.","The factory never sleeps, and neither do we."],
  ["The atom is a doorway.","To Mars, then beyond.","The network is the nation.","We are no longer a planet — we are a people."]
];

let quoteTimer=0;
function rotateQuote(){
  const civ=pick(civs);
  const q=pick(QUOTES_BY_AGE[ageIdx]);
  showL3(`"${q}"`,`— ${civ.leader}, ${civ.name}`,5.5);
  quoteTimer=8+Math.random()*4;
}

// ---- tech & wonder pacing ----
function tickProgress(dt){
  // 12 techs over 4 ages → 3 per age, ~40 sec apart
  // 12 wonders over 4 ages → similar
  const ageSec=120;
  const techPerAge=3;
  const techTime=ageSec/techPerAge;
  const techForAge=ageIdx*techPerAge;
  const targetTech=Math.min(TECHS.length,techForAge+Math.floor((ageT*ageSec)/techTime+0.2));
  while(currentTech<targetTech){
    const t=TECHS[currentTech];
    showChyron("TECHNOLOGY UNLOCKED",t.n.toUpperCase(),3);
    addTicker(`\u269B TECH: ${t.n.toUpperCase()} discovered`);
    currentTech++;
    rebuildTechDOM();
    upgradeCities();
    if(Math.random()<0.4)setCam("CITY",4);
  }
  const wonderTime=ageSec/3;
  const wonderForAge=ageIdx*3;
  const targetWonder=Math.min(WONDERS.length,wonderForAge+Math.floor((ageT*ageSec-wonderTime/2)/wonderTime+0.2));
  while(currentWonder<targetWonder){
    const w=WONDERS[currentWonder];
    const built=placeWonder(w.n);
    showChyron("WONDER COMPLETE",w.n.toUpperCase(),4);
    addTicker(`\u2605 WONDER: ${w.n} completed by ${civs[built?built.civ:0].name}`);
    currentWonder++;
    rebuildWondersDOM();
    setCam("WONDER",6);
  }
}

// ---- score updates ----
function tickScores(dt){
  for(const civ of civs){
    civ.pop+=dt*civ.tiles*0.6*(1+ageIdx*0.5);
    civ.sci+=dt*(0.4+currentTech*0.15);
    civ.gold+=dt*(0.5+civ.tiles*0.2);
    civ.mil+=dt*(0.3+ageIdx*0.4);
    civ.score=civ.pop+civ.sci+civ.gold+civ.mil;
  }
  rebuildScoresDOM();
}

// ---- finale ceremony ----
let inCeremony=false, ceremonyT=0;
function startCeremony(){
  inCeremony=true;ceremonyT=0;
  const fl=document.getElementById("flag");
  if(collapseMode==="ascend"){
    document.getElementById("flH1").textContent="CIVILIZATION COMPLETE";
    document.getElementById("flH2").textContent="ASCENSION TO TYPE-II KARDASHEV";
  }else{
    document.getElementById("flH1").textContent="CIVILIZATION FALLEN";
    document.getElementById("flH2").textContent="REBIRTH BEGINS";
  }
  fl.classList.add("show");
  setCam("SPACE",12);
  addTicker("\u2737\u2737 LOOP COMPLETE — CIVILIZATION RESTARTS \u2737\u2737");
}

function endCeremony(){
  document.getElementById("flag").classList.remove("show");
  inCeremony=false;
  reseed();
}

// ---- reseed / init ----
function clearScene(){
  if(world){
    scene.remove(world);
    world.traverse(o=>{
      if(o.geometry)o.geometry.dispose();
      if(o.material){
        if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());
        else o.material.dispose();
      }
    });
    world=null;
  }
  // remove any extra scene children except lights
  const keep=[];
  for(const c of [...scene.children]){
    if(c.isLight||c.userData.persistent)keep.push(c);
    else scene.remove(c);
  }
  battles.length=0;anims.length=0;wonders.length=0;
  cities.length=0;tiles.length=0;
  currentTech=0;currentWonder=0;
  ageIdx=0;ageT=0;totalT=0;
  collapseTriggered=false;collapseMode=null;
  inCeremony=false;ceremonyT=0;
  tickerQueue=[];
}

function reseed(){
  runId++;
  clearScene();
  makeWorld();
  spawnCivs();
  rebuildTechDOM();
  rebuildWondersDOM();
  rebuildLeadersDOM();
  rebuildScoresDOM();
  setAgeBanner(0);
  // initial ticker burble
  addTicker(`\u25CF NEW EPOCH BEGINS — ${civs.map(c=>c.name).join(", ")} rise from the dust`);
  for(const c of civs){
    addTicker(`\u25C6 ${c.leader} crowned ruler of ${c.name}`);
  }
  setCam("WORLD",6);
}

// ---- scene init ----
function initScene(){
  scene=new T3.Scene();
  scene.background=new T3.Color(AGES[0].sky);
  scene.fog=new T3.Fog(AGES[0].fog,20,60);
  cam=new T3.PerspectiveCamera(55,W()/H(),0.5,500);
  cam.position.copy(camPos);
  cam.lookAt(0,0,0);
  ambLight=new T3.AmbientLight(0xffffff,0.45);
  scene.add(ambLight);
  dirLight=new T3.DirectionalLight(0xffd8a8,0.85);
  dirLight.position.set(8,15,6);
  scene.add(dirLight);
  // stars (visible in space age)
  const starGeom=new T3.BufferGeometry();
  const starCount=400;
  const sp=[];
  for(let i=0;i<starCount;i++){
    const ph=Math.acos(Math.random()*2-1);
    const th=Math.random()*TAU;
    const r=80;
    sp.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph)+10,r*Math.sin(ph)*Math.sin(th));
  }
  starGeom.setAttribute("position",new T3.Float32BufferAttribute(sp,3));
  const stars=new T3.Points(starGeom,new T3.PointsMaterial({color:0xffffff,size:0.4,transparent:true,opacity:0.8}));
  stars.userData.persistent=true;
  stars.userData.stars=true;
  scene.add(stars);
  clock=new T3.Clock();
  reseed();
}

// ---- animations & per-frame ----
function tickAnims(dt){
  // active anims
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i];
    const age=totalT-a.t0;
    if(age>a.dur){
      world.remove(a.mesh);
      a.mesh.geometry.dispose();a.mesh.material.dispose();
      anims.splice(i,1);continue;
    }
    if(a.type==="flare"){
      const t=age/a.dur;
      a.mesh.scale.setScalar(1+t*3);
      a.mesh.material.opacity=1-t;
    }else if(a.type==="smoke"){
      a.mesh.position.y+=a.vy*dt;
      const t=age/a.dur;
      a.mesh.scale.setScalar(1+t*2);
      a.mesh.material.opacity=0.5*(1-t);
    }
  }
  // wonders rise animation
  for(const w of wonders){
    const age=totalT-w.t0;
    if(age<w.riseT){
      const t=ease(clamp(age/w.riseT,0,1));
      w.group.scale.setScalar(t);
    }else{
      w.group.scale.setScalar(1);
      // rocket flame flicker for spaceport
      if(w.name==="Spaceport"){
        w.group.traverse(o=>{
          if(o.userData.flame)o.scale.setScalar(0.7+Math.sin(totalT*20)*0.3);
        });
      }
    }
  }
  // city pop-in scale
  world.traverse(o=>{
    if(o.userData.spawnT){
      const age=totalT-o.userData.spawnT;
      if(age<0.6){
        const t=ease(clamp(age/0.6,0,1));
        o.scale.setScalar(t);
      }
    }
  });
  // battles flash
  for(let i=battles.length-1;i>=0;i--){
    const b=battles[i];
    const age=totalT-b.t0;
    if(age>b.dur){
      battles.splice(i,1);continue;
    }
    if(Math.random()<0.4){
      makeFlare(b.tile.x+rand(-0.3,0.3),0.4+Math.random()*0.3,b.tile.z+rand(-0.3,0.3),
        Math.random()<0.5?0xffaa22:civs[b.a].color, 0.06);
    }
  }
  // ambient smoke (industrial age)
  if(ageIdx===2&&Math.random()<0.2){
    const cs=tiles.filter(t=>t.city&&t.cityLevel>=3);
    if(cs.length){
      const t=pick(cs);
      makeSmoke(t.x+rand(-0.2,0.2),0.6,t.z+rand(-0.2,0.2));
    }
  }
}

function tickCamera(dt){
  camTimer+=dt;
  if(camTimer>=camDur){
    // pick a new cam
    const opts=["WORLD","CITY","BATTLEFIELD","WONDER","ANCHOR","SPACE"];
    let pickList=opts.filter(o=>o!==activeCam);
    if(battles.length===0)pickList=pickList.filter(o=>o!=="BATTLEFIELD");
    if(wonders.length===0)pickList=pickList.filter(o=>o!=="WONDER");
    if(ageIdx<3&&Math.random()<0.7)pickList=pickList.filter(o=>o!=="SPACE");
    setCam(pick(pickList),rand(5,8));
  }
  // smooth move
  const a=clamp(dt*1.6,0,1);
  cam.position.lerp(camTarget,a);
  const lk=new T3.Vector3();
  lk.copy(camLook);
  // gentle camera sway
  cam.position.x+=Math.sin(totalT*0.3)*0.02;
  cam.position.y+=Math.sin(totalT*0.5)*0.015;
  cam.lookAt(lk);
}

function tickAge(dt){
  if(inCeremony){
    ceremonyT+=dt;
    if(ceremonyT>=12){
      endCeremony();
    }
    return;
  }
  totalT+=dt;
  ageT+=dt/120;
  if(ageT>=1){
    ageIdx++;
    ageT=0;
    if(ageIdx>=4){
      // start ceremony
      if(!collapseMode)collapseMode=Math.random()<0.5?"ascend":"fall";
      startCeremony();
      ageIdx=3;ageT=0.99;
      return;
    }else{
      setAgeBanner(ageIdx);
      showChyron("AGE TRANSITION",AGES[ageIdx].n,5);
      addTicker(`\u26AC AGE TRANSITION — ${AGES[ageIdx].n}`);
    }
  }
  setSkyForAge(ageIdx,ageT);
  // year display
  const y=getYear();
  document.getElementById("ageY").textContent=`YEAR ${fmtYear(y)} OF HUMANKIND`;
  document.getElementById("clk").textContent=`YR ${fmtYear(y)}`;
  // expand & develop
  expandCivs(dt);
  if(Math.random()<dt*0.8)upgradeCities();
  tickProgress(dt);
  tickScores(dt);
  // events
  if(Math.random()<dt*0.04){
    const evs=EVENTS_BY_AGE[ageIdx];
    fireEvent(pick(evs));
  }
  // periodic battles in earlier ages
  if(ageIdx<=2&&Math.random()<dt*0.06){startBattle();}
  // tile color tint by owner & pollution
  tintTiles();
  // collapse check
  checkCollapse();
}

function tintTiles(){
  for(const t of tiles){
    const col=t.m.color;
    col.copy(t.baseCol);
    if(t.owner>=0){
      const cc=new T3.Color(civs[t.owner].color);
      col.lerp(cc,0.3);
    }
    if(pollutionLevel>0){
      col.lerp(new T3.Color(0x4a3a2a),pollutionLevel*0.4);
    }
  }
}

function tickUI(dt){
  if(chyronTimer>0){
    chyronTimer-=dt;
    if(chyronTimer<=0)document.getElementById("chyron").classList.remove("show");
  }
  if(l3Timer>0){
    l3Timer-=dt;
    if(l3Timer<=0)document.getElementById("lower3").classList.remove("show");
  }
  quoteTimer-=dt;
  if(quoteTimer<=0)rotateQuote();
  // anchor swap
  mouthT+=dt;
  if(Math.random()<dt*0.06){anchorMode=1-anchorMode;}
  drawAnchor();
}

function loop(){
  raf=requestAnimationFrame(loop);
  const dt=Math.min(0.066,clock?clock.getDelta():0.016);
  tickAge(dt);
  tickAnims(dt);
  tickCamera(dt);
  tickUI(dt);
  renderer.render(scene,cam);
}

initScene();
loop();
})();
</script></body></html>
