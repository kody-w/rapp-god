<script>
(function(){
'use strict';
var SENTINEL = "ROUND24"+"_MULTIVERSE"+" v1";
var LS_SELF   = "multiverse_space_station_v1";
var LS_LEDGER = "brimsworth_multiverse_v1";
var LS_RECUR  = "recurring_cast_v1";
var LS_CANON  = "brimsworth_canon_v1";

// ---- cross-read canon + recurring cast + self ----
var canon={}, recur={}, selfst={};
try{ canon=JSON.parse(localStorage.getItem(LS_CANON)||"{}"); }catch(e){}
try{ recur=JSON.parse(localStorage.getItem(LS_RECUR)||"{}"); }catch(e){}
try{ selfst=JSON.parse(localStorage.getItem(LS_SELF)||"{}"); }catch(e){}
var NOW = Date.now();
var RESEED_MS = 600000; // 10 minutes
if(!selfst.seed || !selfst.seedAt || (NOW-selfst.seedAt) > RESEED_MS){
  selfst.seed = Math.floor(Math.random()*0xffffffff);
  selfst.seedAt = NOW;
  selfst.visits = (selfst.visits||0)+1;
  selfst.universe = "space-station";
  selfst.universe_index = "5/12";
  selfst.round = 24;
}
selfst.lastSeen = NOW;
function save(){ try{ localStorage.setItem(LS_SELF, JSON.stringify(selfst)); }catch(e){} }
save();

// PRNG seeded
var _s = (selfst.seed>>>0) || 1;
function rng(){ _s = (_s*1664525 + 1013904223) >>> 0; return _s/4294967296; }
function rrange(a,b){ return a + (b-a)*rng(); }
function rpick(a){ return a[Math.floor(rng()*a.length)]; }

// ledger append
function appendLedger(entry){
  var L=[]; try{ L=JSON.parse(localStorage.getItem(LS_LEDGER)||"[]"); }catch(e){}
  L.push(entry); if(L.length>240) L=L.slice(-240);
  try{ localStorage.setItem(LS_LEDGER, JSON.stringify(L)); }catch(e){}
}
appendLedger({
  universe_id: "space-station",
  universe_index: "5/12",
  round: 24,
  sentinel: SENTINEL,
  seed: selfst.seed,
  visits: selfst.visits,
  at: NOW,
  cast: ["Lily","Tomas","Otto","Bytes","CaptainCrunch"],
  motif: "C-E-G-C · pure sine + airlock hiss pad",
  setting: "brimsworth-orbital-observation-dome"
});

// recurring cast cross-read + write
function bumpRecur(name, role){
  var r = recur[name] = recur[name] || {firstSeen:NOW, count:0, universes:[]};
  r.count = (r.count||0) + 1;
  r.last = "space-station";
  r.lastAt = NOW;
  r.role = role;
  if(!r.universes.includes("space-station")) r.universes.push("space-station");
}
bumpRecur("Lily","bride");
bumpRecur("Tomas","groom");
bumpRecur("Otto","pet-ringbearer");
bumpRecur("Bytes","crystal-cat-globe");
bumpRecur("CaptainCrunch","pup-honor-guard");
try{ localStorage.setItem(LS_RECUR, JSON.stringify(recur)); }catch(e){}

// BroadcastChannel
var bc=null, peers=[], peerEvents=[];
try{ bc = new BroadcastChannel('brimsworth_multiverse'); }catch(e){}
if(bc){
  bc.onmessage = function(ev){
    var d = ev.data||{};
    if(d.universe && d.universe!=="space-station"){
      peers.push({u:d.universe, t:Date.now(), ev:d.event||'beat'});
      if(peers.length>20) peers.shift();
    }
    if(d.event){ peerEvents.push(d); if(peerEvents.length>20) peerEvents.shift(); }
  };
  try{ bc.postMessage({universe:"space-station", round:24, t:NOW, seed:selfst.seed, hello:true}); }catch(e){}
  setInterval(function(){ try{ bc.postMessage({universe:"space-station", round:24, t:Date.now(), beat:true}); }catch(e){} }, 9000);
}

// 6*42 = 252 minor + 5 mains + officiant = 258 named entities

scene.fog = new THREE.FogExp2(0x000010, 0.0006);

// ---- 32 cameras ----

function addCam(name, p, l, fov){

  c.position.set(p[0],p[1],p[2]);
  c.lookAt(new THREE.Vector3(l[0],l[1],l[2]));
  c.userData = {name:name, basePos:p.slice(), baseLook:l.slice()};
  cams.push(c); return c;
}
addCam("CAM 01 · DOME WIDE",          [0, 6, 30],   [0, 4, 0],   50);
addCam("CAM 02 · ALTAR CLOSE",        [0, 5, 8],    [0, 5, 0],   35);

addCam("CAM 04 · TOMAS SOLO",         [-3, 5.4, 6], [-0.7, 5.2, 0],32);

addCam("CAM 12 · STATION EXT",        [60, 25, 60], [0, 0, 0],   35);
addCam("CAM 13 · STATION EXT 2",      [-50, -8, 70],[0, 0, 0],   38);
addCam("CAM 14 · AIRLOCK FRONT",      [3, 3, 18],   [3, 3, 11],  40);
addCam("CAM 15 · GARDEN",             [-22, 3, 5],  [-30, 1.5, 5],55);
addCam("CAM 16 · MESS HALL",          [0, 4, -18],  [0, 1.5, -25], 50);
addCam("CAM 17 · TELESCOPE BAY",      [32, 3, -28], [40, 3, -30], 45);
addCam("CAM 18 · ORBITAL TOP",        [0, 90, 0],   [0, 0, 0.1], 60);
addCam("CAM 19 · TETHER DETAIL",      [1.2, 3.5, 3],[0.7, 4.4, 0],25);
addCam("CAM 20 · RING HOVER",         [0.4, 5.0, 0.7],[0, 5.05, 0],20);
addCam("CAM 21 · GUESTS LO",          [0, 1.5, 16], [0, 5, 0],   50);
addCam("CAM 22 · DOME ARC E",         [18, 8, 12],  [0, 4, 0],   40);
addCam("CAM 23 · DOME ARC W",         [-18, 8, 12], [0, 4, 0],   40);

addCam("CAM 25 · WINDOWSILL",         [4.5, 2.5, 2.5],[3.7, 1.5, 0.5],40);
addCam("CAM 26 · OVERHEAD ALTAR",     [0, 14, 2],   [0, 4, 0],   55);
addCam("CAM 27 · MOTHER POV",         [-6, 4, 10],  [0, 5, 0],   45);
addCam("CAM 28 · OFFICIANT",          [0, 5.4, -2], [0, 5, 4],   38);
addCam("CAM 29 · STAR FIELD",         [0, 5, 30],   [0, 5, 200], 60);
addCam("CAM 30 · DOLLY SLOW",         [0, 6, 22],   [0, 5, 0],   42);

// ---- lighting ----
scene.add(new THREE.AmbientLight(0x223355, 0.55));
var earthGlow = new THREE.DirectionalLight(0x6fb8ff, 0.65); earthGlow.position.set(0,-30,30); scene.add(earthGlow);
var amber1 = new THREE.PointLight(0xf9b572, 1.3, 80, 1.6); amber1.position.set(8, 9, 8); scene.add(amber1);
var amber2 = new THREE.PointLight(0xf9b572, 1.0, 80, 1.6); amber2.position.set(-8, 9, 8); scene.add(amber2);

scene.add(altarSpot); scene.add(altarSpot.target);

// ---- starfield ----
function makeStars(count, radius){
  var g = new THREE.BufferGeometry();
  var pos = new Float32Array(count*3);
  var col = new Float32Array(count*3);
  for(var i=0;i<count;i++){
    var u = rng()*2-1, t = rng()*Math.PI*2, r = radius*(0.6+0.4*rng()), sq=Math.sqrt(1-u*u);
    pos[i*3]   = r*sq*Math.cos(t);
    pos[i*3+1] = r*u;
    pos[i*3+2] = r*sq*Math.sin(t);
    var k = 0.55+0.45*rng();
    col[i*3]   = k*(0.85+0.15*rng());
    col[i*3+1] = k*(0.9+0.1*rng());
    col[i*3+2] = Math.min(1, k+0.15);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  var m = new THREE.PointsMaterial({size:1.4, vertexColors:true, sizeAttenuation:false, transparent:true, opacity:0.9});
  return new THREE.Points(g, m);
}
scene.add(makeStars(4500, 900));

// distant nebula glow
(function(){
  var g = new THREE.SphereGeometry(700, 24, 16);
  var m = new THREE.MeshBasicMaterial({color:0x1a2a44, transparent:true, opacity:0.18, side:THREE.BackSide});
  scene.add(new THREE.Mesh(g, m));
})();

// ---- Earth (procedural texture) ----
function earthTexture(){
  var cv = document.createElement('canvas'); cv.width=512; cv.height=256;
  var x = cv.getContext('2d');
  var og = x.createLinearGradient(0,0,0,256);
  og.addColorStop(0,'#0a3a6e'); og.addColorStop(0.5,'#1262a8'); og.addColorStop(1,'#0a3a6e');
  x.fillStyle = og; x.fillRect(0,0,512,256);
  for(var i=0;i<70;i++){
    var cx=rng()*512, cy=40+rng()*180, r=10+rng()*48;
    x.fillStyle = 'rgba('+(50+rng()*60|0)+','+(110+rng()*40|0)+','+(50+rng()*40|0)+',0.85)';
    x.beginPath();
    for(var a=0;a<26;a++){
      var ang = a/26*Math.PI*2;
      var rr = r*(0.6+rng()*0.7);
      var px = cx+Math.cos(ang)*rr, py = cy+Math.sin(ang)*rr*0.55;
      if(a===0) x.moveTo(px,py); else x.lineTo(px,py);
    }
    x.closePath(); x.fill();
  }
  for(var j=0;j<90;j++){
    x.fillStyle = 'rgba(255,255,255,'+(0.05+rng()*0.14).toFixed(3)+')';
    x.beginPath(); x.ellipse(rng()*512, rng()*256, 6+rng()*32, 3+rng()*10, rng()*Math.PI, 0, Math.PI*2); x.fill();
  }
  return new THREE.CanvasTexture(cv);
}
var earth = new THREE.Mesh(
  new THREE.SphereGeometry(50, 48, 32),
  new THREE.MeshStandardMaterial({map:earthTexture(), roughness:0.85, metalness:0.0, emissive:0x051a3a, emissiveIntensity:0.18})
);
earth.position.set(0, -75, -10); scene.add(earth);
var earthAtm = new THREE.Mesh(
  new THREE.SphereGeometry(52, 32, 16),
  new THREE.MeshBasicMaterial({color:0x6fb8ff, transparent:true, opacity:0.14, side:THREE.BackSide})
);
earthAtm.position.copy(earth.position); scene.add(earthAtm);

// ---- station structure (decorative around dome) ----
var station = new THREE.Group(); scene.add(station);
var ringMat = new THREE.MeshStandardMaterial({color:0xb6c8de, metalness:0.7, roughness:0.4, emissive:0x223355, emissiveIntensity:0.18});
var ring = new THREE.Mesh(new THREE.TorusGeometry(34, 1.6, 12, 64), ringMat);
ring.rotation.x = Math.PI/2; station.add(ring);
var hub = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.2, 8, 16), ringMat); station.add(hub);
for(var sk=0; sk<6; sk++){
  var spg = new THREE.CylinderGeometry(0.3,0.3,32,8);
  spg.translate(16,0,0);
  var sp = new THREE.Mesh(spg, ringMat);
  sp.rotation.z = sk*Math.PI/3; station.add(sp);
}
for(var mi=0; mi<28; mi++){
  var ang = mi/28*Math.PI*2;
  var modMat = new THREE.MeshStandardMaterial({color:0x8fa6c7, metalness:0.6, roughness:0.4, emissive:0xf9b572, emissiveIntensity:0.18});
  var m = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.6, 2.2), modMat);
  m.position.set(Math.cos(ang)*34, Math.sin(ang)*34, 0);
  station.add(m);
}
station.position.set(0, 6, 0);

// ---- observation dome ----
var dome = new THREE.Group(); scene.add(dome);
var domeGlass = new THREE.Mesh(
  new THREE.SphereGeometry(22, 48, 32, 0, Math.PI*2, 0, Math.PI/2),

);
dome.add(domeGlass);
// glass meridian wireframe
var domeWire = new THREE.Mesh(
  new THREE.SphereGeometry(22.05, 24, 16, 0, Math.PI*2, 0, Math.PI/2),
  new THREE.MeshBasicMaterial({color:0x6fbfff, wireframe:true, transparent:true, opacity:0.18})
);
dome.add(domeWire);
// dome floor
var floor = new THREE.Mesh(

  new THREE.MeshStandardMaterial({color:0x1a2a44, roughness:0.6, metalness:0.3, emissive:0x3a5e8c, emissiveIntensity:0.10})
);
floor.rotation.x = -Math.PI/2; dome.add(floor);
// aisle (amber runway)
var aisle = new THREE.Mesh(

  new THREE.MeshStandardMaterial({color:0xf9b572, emissive:0xf9b572, emissiveIntensity:0.55, roughness:0.4})
);
aisle.rotation.x = -Math.PI/2; aisle.position.set(0, 0.02, -8); dome.add(aisle);
// floor console panels (star-map screens)
for(var cp=0; cp<8; cp++){
  var apan = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.05, 0.7),
    new THREE.MeshStandardMaterial({color:0x223355, emissive:0x6fbfff, emissiveIntensity:0.7})
  );
  var ang2 = cp/8*Math.PI*2;
  apan.position.set(Math.cos(ang2)*16, 0.05, Math.sin(ang2)*16);

}
// altar pedestal
var altar = new THREE.Mesh(
  new THREE.CylinderGeometry(1.6, 1.8, 0.8, 18),
  new THREE.MeshStandardMaterial({color:0xb6c8de, metalness:0.6, roughness:0.3, emissive:0xf9b572, emissiveIntensity:0.25})
);
altar.position.set(0, 0.4, 0); dome.add(altar);
// arch over couple
var arch = new THREE.Mesh(
  new THREE.TorusGeometry(2.6, 0.06, 12, 32, Math.PI),

arch.position.set(0, 5.2, -0.6); dome.add(arch);
// arch flowers (orbital lilies)
for(var fi=0; fi<7; fi++){

// ---- guests (52 along aisle, named from NAMES[]) ----
var guests = new THREE.Group(); dome.add(guests);
var guestColors = [0xa83249,0x2a5d8c,0x4a7a55,0x8e6a3c,0x6a3c8e,0xc7a14c,0x3c8e7a,0x8e3c6a,0xb6c8de,0x4a4a4a,0x556677,0x9d3a55];
var skinColors = [0xf2c290,0xc88a5e,0x9a6342,0xe2b89a,0x6b4427,0xddae8b];
function makePerson(c1, c2, scl){
  scl = scl||1;
  var g = new THREE.Group();
  var body = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.28*scl, 0.6*scl, 4, 8),
    new THREE.MeshStandardMaterial({color:c1, roughness:0.6})
  );
  body.position.y = 0.55*scl; g.add(body);
  var head = new THREE.Mesh(
    new THREE.SphereGeometry(0.22*scl, 16, 12),
    new THREE.MeshStandardMaterial({color:c2, roughness:0.7})
  );
  head.position.y = 1.1*scl; g.add(head);
  // tiny tether ribbon
  var rib = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.012, 0.5, 4),
    new THREE.MeshStandardMaterial({color:0xf9b572, emissive:0xf9b572, emissiveIntensity:0.5})
  );
  rib.position.y = 0.25*scl; g.add(rib);
  return g;
}
for(var gi=0; gi<52; gi++){
  var row = Math.floor(gi/2);

  guests.add(p);

  // CH3 Garden
  x = pipCtxArr[2]; x.fillStyle='#08221a'; x.fillRect(0,0,130,78);
  for(var hh=0;hh<8;hh++){
    x.fillStyle='rgba(159,255,170,0.7)';
    x.fillRect(13+hh*13, 18+Math.sin(t+hh)*1, 2, 42);
    x.fillStyle='#2eaa3a';
    x.beginPath(); x.arc(14+hh*13, 60, 5, 0, Math.PI*2); x.fill();
    x.fillStyle='#9fffaa'; x.fillRect(13+hh*13-3, 18, 8, 4);
  }
  x.fillStyle='rgba(249,181,114,0.18)'; x.fillRect(0,0,130,78);
  // CH4 Portal
  x = pipCtxArr[3]; x.fillStyle='#000010'; x.fillRect(0,0,130,78);
  var portalOn = (t>=298 && t<=346);
  if(portalOn){
    for(var rr=32; rr>0; rr-=3){
      x.strokeStyle='rgba(166,212,255,'+(0.18+0.06*Math.sin(t*4+rr*0.3)).toFixed(2)+')';
      x.beginPath(); x.arc(65,40,rr,0,Math.PI*2); x.stroke();
    }
    x.fillStyle='#f9b572'; x.beginPath(); x.arc(65,40,6+Math.sin(t*5)*1.5,0,Math.PI*2); x.fill();
    x.fillStyle='#222244'; x.beginPath(); x.arc(65,40,3,0,Math.PI*2); x.fill();
  } else {
    x.strokeStyle='#3a5e8c'; x.lineWidth=2;
    x.strokeRect(40,15,50,50);
    x.fillStyle='#1a2a44'; x.fillRect(43,18,44,44);
    x.fillStyle='#f9b572'; x.fillRect(60,38,10,4);
    x.fillStyle='#6fbfff'; x.fillRect(45,55,5,5);
  }
}

// ---- audio: pure sine + airlock hiss pad ----
var actx=null, audioG=null, oscNotes=[], oscGains=[];
function audioInit(){
  if(actx) return;
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    actx = new AC();
    var master = actx.createGain(); master.gain.value = 0.18; master.connect(actx.destination);
    audioG = master;
    // C-E-G-C pure sine arpeggio
    var notes = [261.63, 329.63, 392.00, 523.25];
    for(var ni=0; ni<notes.length; ni++){
      var o = actx.createOscillator(); o.type='sine'; o.frequency.value = notes[ni];
      var g = actx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(master); o.start();
      oscNotes.push(o); oscGains.push(g);
    }
    // airlock hiss pad: filtered white noise + slow LFO
    var bufLen = actx.sampleRate*2;
    var nbuf = actx.createBuffer(1, bufLen, actx.sampleRate);
    var nd = nbuf.getChannelData(0);
    for(var bi=0; bi<bufLen; bi++) nd[bi] = (Math.random()*2-1)*0.5;
    var noise = actx.createBufferSource(); noise.buffer = nbuf; noise.loop=true;
    var lpf = actx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=400; lpf.Q.value=0.6;
    var nG = actx.createGain(); nG.gain.value = 0.05;
    noise.connect(lpf); lpf.connect(nG); nG.connect(master); noise.start();
    var lfo = actx.createOscillator(); lfo.frequency.value = 0.07;
    var lfoG = actx.createGain(); lfoG.gain.value = 130;
    lfo.connect(lfoG); lfoG.connect(lpf.frequency); lfo.start();
    audioInit.lpf = lpf; audioInit.nG = nG;
  }catch(e){}
}
function arpStep(t, portalActive){
  if(!actx || !oscGains.length) return;
  var idx = Math.floor(t/2.5) % 4;
  for(var i=0;i<oscGains.length;i++){
    var target = (i===idx) ? 0.16 : 0.0;
    try{ oscGains[i].gain.linearRampToValueAtTime(target, actx.currentTime+0.6); }catch(e){}
  }
  if(audioInit.nG && audioInit.lpf){
    try{
      audioInit.nG.gain.linearRampToValueAtTime(portalActive?0.14:0.05, actx.currentTime+0.5);
      audioInit.lpf.frequency.setTargetAtTime(portalActive?900:400, actx.currentTime, 0.7);
    }catch(e){}
  }
}
window.addEventListener('pointerdown', audioInit);
window.addEventListener('keydown', audioInit);

// ---- main loop ----
resize();
window.addEventListener('resize', resize);

var activeCam = 0;
var lastCamSwitch = 0;
var T0 = performance.now();
var lastReseedTs = NOW;
var portalChyronShown = false;
var ev_a=false, ev_b=false, ev_c=false, ev_d=false, ev_e=false, ev_f=false;

function setAct(n){
  if(n===1) actEl.textContent = 'ACT I · ARRIVAL';
  else if(n===2) actEl.textContent = 'ACT II · CEREMONY';
  else if(n===3) actEl.textContent = 'ACT III · RECEPTION';
}

function tick(){
  var nowMs = performance.now();
  var t = (nowMs - T0)/1000;
  var ts = Date.now();

  // reseed every ~10 minutes
  if(ts - lastReseedTs > RESEED_MS){
    selfst.seed = Math.floor(Math.random()*0xffffffff);
    selfst.seedAt = ts;
    _s = selfst.seed >>> 0;
    save();
    lastReseedTs = ts;
    appendLedger({universe_id:"space-station", reseed:true, seed:selfst.seed, at:ts, sentinel:SENTINEL});
    showChyron('reseed · seed#'+selfst.seed.toString(16).slice(0,7), 4000);
  }

  // camera switching ~ every 6s (slower for intimate moments)
  var dwell = 6.0;
  if(t>295 && t<350) dwell = 4.0; // portal sequence faster cuts
  if(t - lastCamSwitch > dwell){
    activeCam = (activeCam + 1 + Math.floor(rng()*3)) % cams.length;
    lastCamSwitch = t;
    camlbl.textContent = cams[activeCam].userData.name;
  }
  var cam = cams[activeCam];
  // gentle camera bob/dolly
  cam.position.y = cam.userData.basePos[1] + Math.sin(t*0.4)*0.06;
  if(activeCam===29 || activeCam===0 || activeCam===29){
    cam.position.z = cam.userData.basePos[2] - (t%30)*0.05;
  }

  // earth rotation
  earth.rotation.y = t*0.012;
  earthAtm.rotation.y = -t*0.005;
  // station rotation (slow)
  station.rotation.z = t*0.04;

  // Lily zero-G float
  lily.position.y = 0.9 + Math.sin(t*0.65)*0.05;
  lilyHair.position.y = 2.18 + 0.02 + Math.sin(t*0.9)*0.015;
  for(var hsi=0; hsi<hairStrands.length; hsi++){
    var st2 = hairStrands[hsi];
    st2.position.y = st2.userData.base + 0.04 + Math.sin(t*0.8 + st2.userData.ph)*0.02;
    st2.rotation.z = Math.sin(t*0.5 + st2.userData.ph)*0.18;
  }
  for(var vri=0; vri<veilRibbons.length; vri++){
    var v2 = veilRibbons[vri];
    v2.position.y = v2.userData.base + Math.sin(t*0.6 + v2.userData.ph)*0.07;
    v2.rotation.z = Math.sin(t*0.4 + v2.userData.ph)*0.32;
  }
  // Tomas subtle bob
  tomas.position.y = Math.sin(t*0.5)*0.025;
  // Otto/Crunch (tail wags via yaw)
  otto.rotation.y = Math.sin(t*1.5)*0.12;
  crunch.rotation.y = Math.sin(t*1.7)*0.12;
  // Bytes globe
  bytes.rotation.y = t*0.55;
  bytes.position.y = 1.2 + Math.sin(t*0.8)*0.07;
  // ring drift
  ringR1.position.x = -0.06 + Math.sin(t*0.6)*0.04;
  ringR2.position.x =  0.06 + Math.cos(t*0.6)*0.04;
  ringR1.rotation.x = t*0.4;
  ringR2.rotation.x = t*-0.4;
  // guests bob
  for(var gi2=0; gi2<guests.children.length; gi2++){
    var pg = guests.children[gi2];
    pg.position.y = Math.sin(t*0.4 + (pg.userData.bob||0))*0.04;
  }

  // act + plan progression
  if(t<90) setAct(1);
  else if(t<420) setAct(2);
  else setAct(3);

  if(t>5)   { setPlan('act1','done'); setPlan('arrive','done'); }
  if(t>20)  { setPlan('aisle','now'); }
  if(t>40)  { setPlan('aisle','done'); setPlan('act2','now'); setPlan('vows','now'); }
  if(t>90)  { setPlan('vows','done'); setPlan('rings','now'); }
  if(t>140) { setPlan('rings','done'); setPlan('pet','now'); }
  if(t>200) { setPlan('pet','done'); setPlan('portal','now'); }
  if(t>340) { setPlan('portal','done'); setPlan('kiss','now'); }
  if(t>410) { setPlan('kiss','done'); setPlan('act2','done'); setPlan('act3','now'); setPlan('recep','now'); }
  if(t>460) { setPlan('recep','done'); setPlan('garden','now'); }
  if(t>510) { setPlan('garden','done'); setPlan('twilight','now'); }

  // drama ladder
  if(t>10)  setLadder(0);
  if(t>40)  setLadder(1);
  if(t>90)  setLadder(2);
  if(t>150) setLadder(3);
  if(t>300) setLadder(4);
  if(t>340) setLadder(5);
  if(t>380) setLadder(6);

  // crossover chyrons
  if(!ev_a && t>20 && t<26){ ev_a=true; showChyron("Brimsworth Orbital · cabin pressure nominal · ceremony begin", 5200); }
  if(!ev_b && t>92 && t<98){ ev_b=true; showChyron("Tomas: I'd cross any orbit for you, Lily.", 5200); }
  if(!ev_c && t>165 && t<172){ ev_c=true; showChyron("Otto delivers the ring · zero-G pirouette · the ring drifts · Tomas catches", 5500); }
  if(!ev_d && t>380 && t<388){ ev_d=true; showChyron("Earth-rise kiss · 408km altitude · cabin amber meets ocean blue", 5500); }
  if(!ev_e && t>465 && t<472){ ev_e=true; showChyron("hydroponics toast · the lilies grew here · the lilies always grow", 5200); }
  if(!ev_f && t>515 && t<522){ ev_f=true; showChyron("telescope-bay twilight · the multiverse leans in to listen", 5500); }

  // ---- portal sequence at t=300s ----
  var portalActive = (t>=300 && t<=345);
  if(portalActive){
    var pT = t-300;
    shimmer.material.opacity = 0.55 + 0.4*Math.sin(t*7);
    shimmer.scale.setScalar(1 + 0.12*Math.sin(t*4));
    var hue = 0.55 + 0.05*Math.sin(t*3);
    portalDisc.material.color.setHSL(hue, 0.7, 0.55);
    portalDisc.material.opacity = 1.0;
    airlockStrobe.intensity = 1.4*(0.5+0.5*Math.sin(t*9));
    portalBytes.visible = true;
    var u = Math.min(1, pT/22);
    portalBytes.position.x = 3 + (4.0-3)*u;
    portalBytes.position.y = 1.0 + Math.sin(t*1.2)*0.06;
    portalBytes.position.z = 11 + (1.0-11)*u; // walks toward windowsill at z=1
    pbAura.material.opacity = 0.25 + 0.15*Math.sin(t*4);
    // crystal-globe Bytes drifts toward portal-Bytes & yawns
    var v = Math.min(1, Math.max(0,(pT-6)/18));
    bytes.position.x = 0 + (3.7-0)*v;
    bytes.position.z = 0.2 + (1.2-0.2)*v;
    var yawn = Math.max(0, Math.sin((pT-12)*1.2));
    bGlobe.scale.set(1+yawn*0.15, 1+yawn*0.18, 1+yawn*0.15);
    pbBody.scale.set(1+yawn*0.12, 1+yawn*0.16, 1+yawn*0.12);
    if(!portalChyronShown && pT>4){
      portalChyronShown = true;
      showChyron("the multiverse cat acknowledges itself across timelines", 7000);
      appendLedger({universe_id:"space-station", event:"portal_cat_meet", at:Date.now(), sentinel:SENTINEL, partner:"crystal-cat-globe×prior-Bytes"});
      try{ if(bc) bc.postMessage({universe:"space-station", event:"portal_cat_meet", t:Date.now()}); }catch(e){}
      setLadder(4);
    }
  } else {
    shimmer.material.opacity = Math.max(0, shimmer.material.opacity-0.02);
    portalDisc.material.color.setRGB(0,0,0.06);
    airlockStrobe.intensity = Math.max(0, airlockStrobe.intensity-0.05);
    if(t>345 && portalBytes.visible){
      // both cats settled at windowsill — drift slowly
      portalBytes.position.y = 1.0 + Math.sin(t*0.8)*0.04;
      bytes.position.y = 1.2 + Math.sin(t*0.6)*0.04;
    }
  }

  // mini-map active sub-world
  var aw='observation-dome-chapel';
  if(t<10) aw='airlock-arrival';
  else if(t>410 && t<460) aw='mess-hall-reception';
  else if(t>=460 && t<510) aw='hydroponics-garden';
  else if(t>=510) aw='telescope-bay-twilight';
  drawMiniMap(aw);

  // info box
  infobox.textContent = 'cast×'+ (Object.keys(recur).length) + ' · entities×258 · cams×'+cams.length+' · t='+t.toFixed(0)+'s';

  // audio + pip
  arpStep(t, portalActive);
  drawPip(t);

  renderer.render(scene, cam);
  requestAnimationFrame(tick);
}
tick();

// persist on unload
window.addEventListener('beforeunload', function(){
  try{ localStorage.setItem(LS_RECUR, JSON.stringify(recur)); }catch(e){}
  save();
});

// minimal verification trace
try{ console.info('[brimsworth] U5/12 space-station online · sentinel=', SENTINEL, '· seed=', selfst.seed); }catch(e){}
})();
</script>
