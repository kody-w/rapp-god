<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tank Skirmish — 2v2 Arena</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #06080b; overflow: hidden; font-family: "Segoe UI", system-ui, sans-serif; color: #eaeaea; }
  #wrap { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; image-rendering: optimizeQuality; }
  #boot { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); color: #9bb; font-size: 12px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="boot">LOADING ARENA…</div>
</div>
<script>
"use strict";

/* ============================================================
   2v2 TANK SKIRMISH — single-file autoplay demo
   - top-down, Canvas 2D
   - drift physics (separate body / turret)
   - power pickups, killfeed, announcer, drama-cam
   - auto-rematch forever
   ============================================================ */

const cv  = document.getElementById('game');
const ctx = cv.getContext('2d', { alpha: false });

const GW = 1600, GH = 900;            // logical game size
let   scale = 1, ox = 0, oy = 0;      // viewport transform
function resize() {
  cv.width  = Math.floor(window.innerWidth  * devicePixelRatio);
  cv.height = Math.floor(window.innerHeight * devicePixelRatio);
  cv.style.width  = window.innerWidth  + 'px';
  cv.style.height = window.innerHeight + 'px';
  scale = Math.min(cv.width / GW, cv.height / GH);
  ox = (cv.width  - GW * scale) / 2;
  oy = (cv.height - GH * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

document.getElementById('boot').remove();

/* --------------------- helpers --------------------- */
const TAU = Math.PI * 2;
const rand  = (a,b)=> a + Math.random()*(b-a);
const irand = (a,b)=> Math.floor(rand(a,b+1));
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp  = (a,b,t)=> a + (b-a)*t;
const dist  = (ax,ay,bx,by)=> Math.hypot(ax-bx, ay-by);
const angDiff = (a,b)=>{ let d=(b-a)%TAU; if(d>Math.PI) d-=TAU; if(d<-Math.PI) d+=TAU; return d; };
const pick = arr => arr[(Math.random()*arr.length)|0];
const shuffle = arr => { for(let i=arr.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; };

/* --------------------- roster & teams --------------------- */
const ROSTER = ['THUNDER','IRONFIST','GHOST','REAPER','FROST','VIPER','BLITZ','HAVOC','RAVEN','TITAN','STORM','ROGUE','HUNTER','WRAITH','CHARGER','APEX','PHANTOM','DOZER','SPECTRE','OMEGA','NOVA','HALO'];
const TEAMS = {
  red:  { color:'#ff4141', glow:'#ff7a4a', dark:'#5a1010', name:'CRIMSON', baseX: 180,        baseY: GH/2 },
  blue: { color:'#3aa8ff', glow:'#7fd0ff', dark:'#0e2c50', name:'AZURE',   baseX: GW - 180,   baseY: GH/2 }
};

/* --------------------- map data --------------------- */
const MAP = {
  bunkers: [
    { x: GW*0.30, y: GH*0.30, w: 110, h: 60, hp: 250, max: 250, alive: true, ang: 0 },
    { x: GW*0.30, y: GH*0.70, w: 110, h: 60, hp: 250, max: 250, alive: true, ang: 0 },
    { x: GW*0.70, y: GH*0.30, w: 110, h: 60, hp: 250, max: 250, alive: true, ang: 0 },
    { x: GW*0.70, y: GH*0.70, w: 110, h: 60, hp: 250, max: 250, alive: true, ang: 0 }
  ],
  ramps: [
    { x: GW*0.5, y: GH*0.18, w: 220, h: 80 },   // top elevated
    { x: GW*0.5, y: GH*0.82, w: 220, h: 80 }    // bottom elevated
  ],
  crater: { x: GW/2, y: GH/2, r: 92 },
  patches: [
    // sand (slow)
    { type:'sand', x: GW*0.22, y: GH*0.50, r: 130 },
    { type:'sand', x: GW*0.78, y: GH*0.50, r: 130 },
    // ice (drift)
    { type:'ice',  x: GW*0.50, y: GH*0.32, r: 150 },
    { type:'ice',  x: GW*0.50, y: GH*0.68, r: 150 }
  ],
  walls: [
    { x: 0,        y: 0,        w: GW,  h: 22 },
    { x: 0,        y: GH-22,    w: GW,  h: 22 },
    { x: 0,        y: 0,        w: 22,  h: GH },
    { x: GW-22,    y: 0,        w: 22,  h: GH }
  ]
};

/* --------------------- pickup spots --------------------- */
const PICKUP_DEFS = [
  { id:'mine_a',     type:'mine',      x: GW*0.42, y: GH*0.50, every: 30 },
  { id:'mine_b',     type:'mine',      x: GW*0.58, y: GH*0.50, every: 30 },
  { id:'scatter',    type:'scatter',   x: GW*0.50, y: GH*0.18, every: 60 },
  { id:'lightning',  type:'lightning', x: GW*0.50, y: GH*0.82, every: 90 },
  { id:'repair_a',   type:'repair',    x: GW*0.18, y: GH*0.18, every: 45 },
  { id:'repair_b',   type:'repair',    x: GW*0.82, y: GH*0.82, every: 45 }
];

/* --------------------- match state --------------------- */
const STATE = {
  phase: 'play',        // 'play' | 'scoreboard'
  matchTime: 0,         // counts down
  matchMax: 360,        // 6 min cap
  killTarget: 30,
  kills: { red:0, blue:0 },
  tanks: [],
  projectiles: [],
  pickups: [],
  effects: [],
  tracks: [],
  killfeed: [],
  announcer: null,      // { text, sub, t, life, color }
  firstBloodDone: false,
  recentKills: [],      // { team, t }
  comebackArmed: { red:false, blue:false },
  matchPointShown: { red:false, blue:false },
  lastFinalTankShoutAt: -999,
  scoreboardUntil: 0,
  cam: { x: GW/2, y: GH/2, zoom: 1, tx: GW/2, ty: GH/2, tz: 1, drama: 0 },
  matchNum: 0,
  flashTime: 0
};

/* --------------------- killfeed & announcer --------------------- */
function addKill(killer, victim, weapon){
  STATE.killfeed.unshift({ killer: killer? {n:killer.name, t:killer.team} : null,
                           victim: {n:victim.name, t:victim.team},
                           weapon, t: STATE.matchTime });
  if (STATE.killfeed.length > 6) STATE.killfeed.length = 6;
}
function announce(text, sub, life=2.6, color='#ffe066'){
  STATE.announcer = { text, sub: sub||'', t:0, life, color };
}

/* --------------------- pickups --------------------- */
function makePickup(def, ready=false){
  return { ...def, ready, timer: ready?0:def.every, pulse: 0 };
}
function resetPickups(){
  STATE.pickups = PICKUP_DEFS.map(d => makePickup({ ...d }, true));
}
function updatePickups(dt){
  for (const p of STATE.pickups){
    if (!p.ready){
      p.timer -= dt;
      if (p.timer <= 0){ p.ready = true; p.timer = 0; }
    } else {
      p.pulse += dt;
    }
  }
}
function consumePickup(p){
  p.ready = false;
  p.timer = p.every;
  p.pulse = 0;
}

/* --------------------- tank class --------------------- */
class Tank {
  constructor(name, team, baseAngle){
    this.name = name;
    this.team = team;
    const T = TEAMS[team];
    this.baseX = T.baseX; this.baseY = T.baseY;
    this.x = T.baseX + (team==='red'? 60 : -60);
    this.y = T.baseY + (Math.random()<0.5? -90 : 90);
    this.vx = 0; this.vy = 0;
    this.bodyAng   = baseAngle;
    this.turretAng = baseAngle;
    this.angVel = 0;
    this.maxHp = 300; this.hp = this.maxHp;
    this.alive = true; this.respawnAt = 0;
    this.weapon = null; this.weaponAmmo = 0;
    this.fireCD = 0; this.scatterCD = 0; this.lightningCD = 0; this.mineCD = 0;
    this.dropMineQueued = false;
    this.kills = 0; this.deaths = 0; this.streak = 0; this.bestStreak = 0;
    this.shots = 0; this.hits = 0;
    this.lastKillAt = -99;
    this.targetId = null; this.lastTargetSwitch = 0;
    this.role = 'attack';
    this.pathTarget = null; // {x,y,kind}
    this.pickupIntent = null;
    this.stuckTime = 0;
    this.lastPos = { x: this.x, y: this.y };
    this.aimError = 0;
    this.muzzleFlash = 0;
    this.hitFlash = 0;
    this.trailTimer = 0;
    this.id = Tank._id++;
  }
}
Tank._id = 1;

/* --------------------- surfaces --------------------- */
function surfaceAt(x,y){
  for (const p of MAP.patches){
    if (dist(x,y,p.x,p.y) < p.r) return p.type;
  }
  return 'dirt';
}
function inCrater(x,y){
  return dist(x,y,MAP.crater.x,MAP.crater.y) < MAP.crater.r;
}
function onRamp(x,y){
  for (const r of MAP.ramps){
    if (Math.abs(x-r.x)<r.w/2 && Math.abs(y-r.y)<r.h/2) return true;
  }
  return false;
}

/* --------------------- collision helpers --------------------- */
function rectOverlap(x1,y1,w1,h1,x2,y2,w2,h2){
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}
function clampToWalls(t){
  const r = 22;
  if (t.x < 22+r) t.x = 22+r;
  if (t.x > GW-22-r) t.x = GW-22-r;
  if (t.y < 22+r) t.y = 22+r;
  if (t.y > GH-22-r) t.y = GH-22-r;
}
function bunkerCollide(t){
  for (const b of MAP.bunkers){
    if (!b.alive) continue;
    const dx = t.x - b.x, dy = t.y - b.y;
    const hw = b.w/2 + 22, hh = b.h/2 + 22;
    if (Math.abs(dx) < hw && Math.abs(dy) < hh){
      // push out along smaller penetration axis
      const px = hw - Math.abs(dx);
      const py = hh - Math.abs(dy);
      if (px < py){
        t.x += Math.sign(dx) * px;
        // damp velocity along that axis
        const nx = Math.sign(dx);
        const vn = t.vx * nx;
        if (vn < 0) t.vx -= vn * 1.4;
      } else {
        t.y += Math.sign(dy) * py;
        const ny = Math.sign(dy);
        const vn = t.vy * ny;
        if (vn < 0) t.vy -= vn * 1.4;
      }
    }
  }
}
function tankCollide(t, others){
  for (const o of others){
    if (o === t || !o.alive) continue;
    const d = dist(t.x,t.y,o.x,o.y);
    const min = 44;
    if (d < min && d > 0.01){
      const nx = (t.x-o.x)/d, ny = (t.y-o.y)/d;
      const push = (min - d)/2;
      t.x += nx*push; t.y += ny*push;
      o.x -= nx*push; o.y -= ny*push;
    }
  }
}
function lineOfSight(ax,ay,bx,by, ignoreBunkerIdx=-1){
  // step march; if any alive bunker rect intersects, blocked
  const steps = 14;
  for (let i=1;i<steps;i++){
    const t = i/steps;
    const x = ax + (bx-ax)*t;
    const y = ay + (by-ay)*t;
    for (let bi=0; bi<MAP.bunkers.length; bi++){
      if (bi === ignoreBunkerIdx) continue;
      const b = MAP.bunkers[bi];
      if (!b.alive) continue;
      if (Math.abs(x-b.x) < b.w/2 && Math.abs(y-b.y) < b.h/2) return false;
    }
  }
  return true;
}

/* --------------------- projectiles --------------------- */
function spawnProjectile(owner, x, y, ang, kind){
  const speeds = { cannon: 700, scatter: 620 };
  const sp = speeds[kind] || 700;
  const dmg = kind==='scatter' ? 22 : 60;
  STATE.projectiles.push({
    owner: owner.id, team: owner.team,
    x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
    life: 1.5, kind, dmg,
    trail: [{x,y}]
  });
  owner.shots++;
  owner.muzzleFlash = 0.08;
}
function updateProjectiles(dt){
  for (let i=STATE.projectiles.length-1;i>=0;i--){
    const p = STATE.projectiles[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.life -= dt;
    p.trail.push({x:p.x, y:p.y}); if (p.trail.length>8) p.trail.shift();

    // walls
    if (p.x<22||p.x>GW-22||p.y<22||p.y>GH-22){ explodeAt(p.x,p.y, p.kind, 8); STATE.projectiles.splice(i,1); continue; }

    // bunkers
    let hitBunker = false;
    for (const b of MAP.bunkers){
      if (!b.alive) continue;
      if (Math.abs(p.x-b.x)<b.w/2 && Math.abs(p.y-b.y)<b.h/2){
        b.hp -= p.dmg;
        if (b.hp <= 0){ b.alive = false; explodeAt(b.x,b.y,'big',32); }
        else explodeAt(p.x,p.y, p.kind, 6);
        hitBunker = true; break;
      }
    }
    if (hitBunker){ STATE.projectiles.splice(i,1); continue; }

    // tanks
    let hitTank = false;
    for (const t of STATE.tanks){
      if (!t.alive || t.team === p.team) continue;
      if (dist(p.x,p.y,t.x,t.y) < 24){
        damageTank(t, p.dmg, getOwner(p.owner), p.kind);
        explodeAt(p.x,p.y, p.kind, 10);
        const owner = getOwner(p.owner); if (owner) owner.hits++;
        hitTank = true; break;
      }
    }
    if (hitTank){ STATE.projectiles.splice(i,1); continue; }

    if (p.life <= 0){ STATE.projectiles.splice(i,1); }
  }
}
function getOwner(id){ return STATE.tanks.find(t=>t.id===id) || null; }

/* --------------------- effects --------------------- */
function explodeAt(x,y, kind, n=12){
  for (let i=0;i<n;i++){
    const a = Math.random()*TAU;
    const sp = rand(80,260);
    STATE.effects.push({ kind:'spark', x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:rand(0.2,0.5), max:0.5, color: kind==='lightning'?'#cfeaff':'#ffd16a' });
  }
  STATE.effects.push({ kind:'shock', x, y, life: kind==='big'?0.6:0.35, max: kind==='big'?0.6:0.35, r: kind==='big'?80:36 });
  STATE.flashTime = Math.max(STATE.flashTime, kind==='big'?0.18:0.06);
}
function lightningChain(originTank, firstTarget){
  const chain = [originTank, firstTarget];
  // try to chain to up to 2 more nearby enemies
  for (let i=0;i<2;i++){
    const last = chain[chain.length-1];
    let best=null, bd=260;
    for (const t of STATE.tanks){
      if (!t.alive || t.team === originTank.team || chain.includes(t)) continue;
      const d = dist(last.x,last.y,t.x,t.y);
      if (d < bd){ bd=d; best=t; }
    }
    if (best) chain.push(best); else break;
  }
  // damage all chained enemies
  for (let i=1;i<chain.length;i++){
    damageTank(chain[i], 90, originTank, 'Lightning');
    originTank.hits++;
  }
  // visual arc
  const segs = [];
  for (let i=0;i<chain.length-1;i++){
    const a = chain[i], b = chain[i+1];
    segs.push(makeArcPoints(a.x,a.y,b.x,b.y));
  }
  STATE.effects.push({ kind:'lightning', segs, life:0.35, max:0.35 });
  STATE.flashTime = 0.2;
}
function makeArcPoints(ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay; const len=Math.hypot(dx,dy);
  const nx=-dy/len, ny=dx/len;
  const steps = Math.max(6, (len/26)|0);
  const pts = [{x:ax,y:ay}];
  for (let i=1;i<steps;i++){
    const t = i/steps;
    const j = (Math.random()-0.5) * 22;
    pts.push({ x: ax + dx*t + nx*j, y: ay + dy*t + ny*j });
  }
  pts.push({x:bx,y:by});
  return pts;
}
function updateEffects(dt){
  for (let i=STATE.effects.length-1;i>=0;i--){
    const e = STATE.effects[i];
    e.life -= dt;
    if (e.kind==='spark'){ e.x += e.vx*dt; e.y += e.vy*dt; e.vx*=0.92; e.vy*=0.92; }
    if (e.life <= 0) STATE.effects.splice(i,1);
  }
  // tracks fade
  for (let i=STATE.tracks.length-1;i>=0;i--){
    STATE.tracks[i].life -= dt;
    if (STATE.tracks[i].life <= 0) STATE.tracks.splice(i,1);
  }
  STATE.flashTime = Math.max(0, STATE.flashTime - dt);
}

/* --------------------- damage / death --------------------- */
function damageTank(t, dmg, attacker, weapon){
  if (!t.alive) return;
  t.hp -= dmg;
  t.hitFlash = 0.18;
  if (t.hp <= 0){
    t.alive = false;
    t.deaths++;
    t.streak = 0;
    t.respawnAt = STATE.matchTime + 4;
    explodeAt(t.x, t.y, 'big', 28);

    if (attacker && attacker !== t){
      attacker.kills++;
      attacker.streak++;
      attacker.bestStreak = Math.max(attacker.bestStreak, attacker.streak);
      attacker.lastKillAt = STATE.matchTime;
      STATE.kills[attacker.team]++;
      addKill(attacker, t, weapon || 'Cannon');
      checkAnnouncementsOnKill(attacker, t);
    } else {
      addKill(null, t, weapon || 'World');
    }
  }
}

/* --------------------- announcements --------------------- */
function checkAnnouncementsOnKill(killer, victim){
  const team = killer.team;
  STATE.recentKills.push({ team, t: STATE.matchTime });
  STATE.recentKills = STATE.recentKills.filter(r => STATE.matchTime - r.t < 4);

  if (!STATE.firstBloodDone){
    STATE.firstBloodDone = true;
    announce('FIRST BLOOD', killer.name + ' draws first', 2.4, '#ff5577');
  } else {
    // double kill within 4s same team
    const same = STATE.recentKills.filter(r => r.team === team);
    if (same.length === 2) announce('DOUBLE KILL', TEAMS[team].name, 2.0, TEAMS[team].color);
    else if (same.length === 3) announce('TRIPLE KILL', TEAMS[team].name, 2.0, TEAMS[team].color);
    else if (same.length >= 4) announce('OVERKILL', TEAMS[team].name, 2.0, TEAMS[team].color);

    if (killer.streak === 5) announce('RAMPAGE', killer.name, 2.4, '#ff8a3d');
    if (killer.streak === 8) announce('UNFRIGGINBELIEVABLE', killer.name, 2.6, '#ffd54a');
  }

  // match point
  const need = STATE.killTarget;
  for (const k of ['red','blue']){
    if (!STATE.matchPointShown[k] && STATE.kills[k] === need-1){
      STATE.matchPointShown[k] = true;
      announce('MATCH POINT', TEAMS[k].name, 2.0, TEAMS[k].color);
    }
  }

  // comeback (when team was -5 then evens or leads)
  const diff = STATE.kills[team] - STATE.kills[team==='red'?'blue':'red'];
  if (STATE.comebackArmed[team] && diff >= 0){
    STATE.comebackArmed[team] = false;
    announce('COMEBACK', TEAMS[team].name + ' surges back', 2.4, '#7fffaa');
  }
  // arm comeback if newly trailing by 5
  for (const tk of ['red','blue']){
    const other = tk==='red'?'blue':'red';
    if (STATE.kills[other] - STATE.kills[tk] >= 5) STATE.comebackArmed[tk] = true;
  }
}
function maybeFinalTankAnnouncement(){
  // if one team has exactly one alive and other has >=2 alive
  const alive = { red: STATE.tanks.filter(t=>t.team==='red' && t.alive),
                  blue: STATE.tanks.filter(t=>t.team==='blue' && t.alive) };
  let lone=null, otherCount=0;
  if (alive.red.length === 1 && alive.blue.length >= 2){ lone = alive.red[0]; otherCount = alive.blue.length; }
  if (alive.blue.length === 1 && alive.red.length >= 2){ lone = alive.blue[0]; otherCount = alive.red.length; }
  STATE.cam.drama = 0;
  if (lone){
    STATE.cam.drama = 1;
    STATE.cam.tx = lone.x; STATE.cam.ty = lone.y; STATE.cam.tz = 1.6;
    if (STATE.matchTime - STATE.lastFinalTankShoutAt > 6){
      STATE.lastFinalTankShoutAt = STATE.matchTime;
      announce('FINAL TANK', lone.name + ' alone vs ' + otherCount, 2.2, '#ff4f9a');
    }
  } else {
    STATE.cam.tx = GW/2; STATE.cam.ty = GH/2; STATE.cam.tz = 1;
  }
}

/* --------------------- AI --------------------- */
function updateAI(t, dt){
  if (!t.alive) return;

  // pickup priority
  let pick = null;
  if (t.hp < 170){
    pick = nearestReadyPickup(t, ['repair']);
  }
  if (!pick && !t.weapon){
    pick = nearestReadyPickup(t, ['lightning','scatter','mine']);
  }
  if (!pick && t.hp < t.maxHp - 50){
    pick = nearestReadyPickup(t, ['repair']);
  }
  if (!pick) pick = nearestReadyPickup(t, ['lightning','scatter','mine','repair']);

  // Pick target: nearest visible enemy, else nearest enemy
  let target = null, bestScore = 1e9;
  for (const o of STATE.tanks){
    if (!o.alive || o.team===t.team) continue;
    const d = dist(t.x,t.y,o.x,o.y);
    const visible = lineOfSight(t.x,t.y,o.x,o.y);
    let s = d + (visible?0:600);
    // prefer current target a bit (avoid flicker)
    if (t.targetId === o.id) s -= 80;
    if (s < bestScore){ bestScore = s; target = o; }
  }
  t.targetId = target ? target.id : null;

  // Decide role
  const aliveTeam  = STATE.tanks.filter(x=>x.team===t.team && x.alive).length;
  const aliveEnemy = STATE.tanks.filter(x=>x.team!==t.team && x.alive).length;
  const isFinal = aliveTeam===1 && aliveEnemy>=2;
  t.role = (t.hp<120 || isFinal) ? 'kite' : 'attack';

  // Movement target
  let goal = null;
  if (pick && (t.hp<170 || !t.weapon || t.role==='kite' && pick.type==='repair' || t.hp<t.maxHp-30)){
    goal = { x: pick.x, y: pick.y, kind:'pickup', ref:pick };
  } else if (target){
    if (t.role==='kite'){
      // kite: pick a cover bunker behind nearest, away from target
      const dx = t.x-target.x, dy = t.y-target.y; const dn = Math.hypot(dx,dy)||1;
      const tx = t.x + (dx/dn)*220, ty = t.y + (dy/dn)*180;
      // find nearest bunker to that retreat point
      let bb=null,bd=1e9;
      for (const b of MAP.bunkers){ if(!b.alive) continue;
        const d = dist(tx,ty,b.x,b.y); if (d<bd){ bd=d; bb=b; } }
      goal = bb ? { x: bb.x + (t.x-bb.x>0?60:-60), y: bb.y, kind:'cover' } : { x:tx, y:ty, kind:'retreat' };
    } else {
      // approach target side, optionally route through ice for flank
      const mid = { x:(t.x+target.x)/2, y:(t.y+target.y)/2 };
      // pick an offset to circle-strafe
      const ang = Math.atan2(target.y - t.y, target.x - t.x);
      const side = (t.id % 2 === 0) ? 1 : -1;
      const ox = Math.cos(ang+side*1.0)*210, oy = Math.sin(ang+side*1.0)*210;
      goal = { x: target.x + ox, y: target.y + oy, kind:'engage' };
      // sometimes route through ice patch for dramatic drift flank
      if (Math.random() < 0.005){
        const ip = MAP.patches.find(p=>p.type==='ice');
        goal = { x: ip.x + rand(-60,60), y: ip.y + rand(-60,60), kind:'flank' };
      }
    }
  } else {
    // wander toward enemy half
    goal = { x: TEAMS[t.team==='red'?'blue':'red'].baseX, y: GH/2, kind:'push' };
  }
  t.pathTarget = goal;
  t.pickupIntent = (goal.kind==='pickup') ? goal.ref : null;

  // Steering
  const ddx = goal.x - t.x, ddy = goal.y - t.y;
  const goalAng = Math.atan2(ddy, ddx);
  let steerDelta = angDiff(t.bodyAng, goalAng);

  // throttle
  let throttle = 1;
  const goalDist = Math.hypot(ddx,ddy);
  if (goalDist < 60) throttle = 0.2;
  // if pickup right under us and ready, hover
  if (goal.kind==='pickup' && goalDist < 40) throttle = 0.0;

  // if facing is way off, slow down to turn
  const absDelta = Math.abs(steerDelta);
  if (absDelta > 1.4) throttle *= 0.4;

  // kite: drive backwards-ish if facing away from goal but want to keep gun on target
  if (t.role==='kite' && target){
    // keep moving away from target
    const awayAng = Math.atan2(t.y - target.y, t.x - target.x);
    steerDelta = angDiff(t.bodyAng, awayAng);
    throttle = 1.0;
  }

  // unstuck wiggle
  const moved = dist(t.x,t.y,t.lastPos.x,t.lastPos.y);
  if (moved < 0.5 && throttle > 0.1) t.stuckTime += dt; else t.stuckTime = 0;
  t.lastPos.x = t.x; t.lastPos.y = t.y;
  if (t.stuckTime > 0.6){
    steerDelta = (Math.sin(STATE.matchTime*5 + t.id)) * 1.2;
    throttle = -0.6;
    if (t.stuckTime > 1.4) t.stuckTime = 0;
  }

  // store control intents
  t._throttle = clamp(throttle, -1, 1);
  t._steer    = clamp(steerDelta * 1.2, -1, 1);

  // ----- turret aim & firing -----
  if (target){
    // lead target by projectile travel time
    const sp = 700;
    const td = dist(t.x,t.y,target.x,target.y);
    const lead = td / sp;
    const px = target.x + target.vx * lead;
    const py = target.y + target.vy * lead;
    let aimAng = Math.atan2(py - t.y, px - t.x) + t.aimError;
    // ease aim error
    t.aimError = lerp(t.aimError, (Math.random()-0.5)*0.05, 0.02);
    const ad = angDiff(t.turretAng, aimAng);
    t.turretAng += clamp(ad, -3.2*dt, 3.2*dt);

    const aimGood = Math.abs(angDiff(t.turretAng, aimAng)) < 0.10;
    const visible = lineOfSight(t.x,t.y,target.x,target.y);
    if (visible && aimGood && t.fireCD <= 0){
      // muzzle position
      const mx = t.x + Math.cos(t.turretAng)*30;
      const my = t.y + Math.sin(t.turretAng)*30;
      spawnProjectile(t, mx, my, t.turretAng, 'cannon');
      t.fireCD = 0.85;
    }

    // scatter
    if (t.weapon === 'scatter' && visible && td < 360 && t.scatterCD <= 0 && aimGood){
      for (let k=-2;k<=2;k++){
        const a = t.turretAng + k*0.08;
        const mx = t.x + Math.cos(a)*30;
        const my = t.y + Math.sin(a)*30;
        spawnProjectile(t, mx, my, a, 'scatter');
      }
      t.scatterCD = 0.5;
      t.weaponAmmo--;
      if (t.weaponAmmo<=0){ t.weapon=null; t.weaponAmmo=0; }
    }

    // lightning
    if (t.weapon === 'lightning' && visible && td < 380 && t.lightningCD <= 0){
      lightningChain(t, target);
      t.lightningCD = 0.6;
      t.weaponAmmo--;
      if (t.weaponAmmo<=0){ t.weapon=null; t.weaponAmmo=0; }
    }
  } else {
    // sweep turret slowly
    t.turretAng += 0.6 * dt;
  }

  // mine drop: if we have mines and an enemy is roughly behind us, drop
  if (t.weapon === 'mine' && t.mineCD <= 0){
    // drop near corners or when an enemy is within 200 trailing
    let drop = false;
    for (const e of STATE.tanks){
      if (!e.alive || e.team===t.team) continue;
      const d = dist(t.x,t.y,e.x,e.y);
      const back = -Math.cos(t.bodyAng) * (e.x - t.x) + -Math.sin(t.bodyAng) * (e.y - t.y);
      if (d < 240 && back > 0){ drop = true; break; }
    }
    if (drop){
      const bx = t.x - Math.cos(t.bodyAng)*30;
      const by = t.y - Math.sin(t.bodyAng)*30;
      STATE.projectiles.push({ owner:t.id, team:t.team, x:bx, y:by, vx:0,vy:0, life:18, kind:'mine', dmg:120, trail:[{x:bx,y:by}], fuse:0.6, anchored:true });
      t.mineCD = 1.5;
      t.weaponAmmo--;
      if (t.weaponAmmo<=0){ t.weapon=null; t.weaponAmmo=0; }
    }
  }

  // pick up if standing on
  for (const p of STATE.pickups){
    if (!p.ready) continue;
    if (dist(t.x,t.y,p.x,p.y) < 30){
      applyPickup(t, p);
      consumePickup(p);
    }
  }
}

function nearestReadyPickup(t, types){
  let best=null, bd=1e9;
  for (const p of STATE.pickups){
    if (!p.ready) continue;
    if (!types.includes(p.type)) continue;
    const d = dist(t.x,t.y,p.x,p.y);
    if (d<bd){ bd=d; best=p; }
  }
  return best;
}
function applyPickup(t, p){
  if (p.type==='repair'){ t.hp = Math.min(t.maxHp, t.hp + 200); }
  else if (p.type==='mine'){ t.weapon='mine'; t.weaponAmmo=2; }
  else if (p.type==='scatter'){ t.weapon='scatter'; t.weaponAmmo=4; }
  else if (p.type==='lightning'){ t.weapon='lightning'; t.weaponAmmo=2; }
}

/* --------------------- physics --------------------- */
function physicsTank(t, dt){
  if (!t.alive){
    t.vx *= 0.9; t.vy *= 0.9;
    return;
  }
  const surf = surfaceAt(t.x, t.y);
  const onR  = onRamp(t.x, t.y);
  const inCr = inCrater(t.x, t.y);

  // surface params
  let latFric = 6.0, fwdFric = 1.2, accel = 320, maxSpd = 220;
  if (surf === 'sand'){ latFric = 11; fwdFric = 4.2; accel = 220; maxSpd = 160; }
  else if (surf === 'ice'){ latFric = 1.1; fwdFric = 0.25; accel = 240; maxSpd = 260; }
  if (onR){ accel *= 1.15; maxSpd *= 1.05; latFric *= 1.4; }

  const fx = Math.cos(t.bodyAng), fy = Math.sin(t.bodyAng);
  const rx = -fy, ry = fx;

  // apply throttle force
  const throttle = t._throttle || 0;
  t.vx += fx * accel * throttle * dt;
  t.vy += fy * accel * throttle * dt;

  // decompose, friction
  const vF = t.vx*fx + t.vy*fy;
  const vL = t.vx*rx + t.vy*ry;
  const kF = Math.exp(-fwdFric * dt);
  const kL = Math.exp(-latFric * dt);
  const nVF = vF * kF;
  const nVL = vL * kL;
  t.vx = fx*nVF + rx*nVL;
  t.vy = fy*nVF + ry*nVL;

  // clamp speed
  const sp = Math.hypot(t.vx, t.vy);
  if (sp > maxSpd){ t.vx *= maxSpd/sp; t.vy *= maxSpd/sp; }

  // steering: angular velocity scales with current forward speed sign and value
  const steer = t._steer || 0;
  const speedSign = Math.sign(vF) || 1;
  const turnRate = 2.4 * Math.min(1, Math.abs(vF)/120 + 0.35);
  const desiredAngVel = steer * turnRate * speedSign;
  t.angVel = lerp(t.angVel, desiredAngVel, 0.18);
  t.bodyAng += t.angVel * dt;

  // position
  t.x += t.vx * dt;
  t.y += t.vy * dt;

  clampToWalls(t);
  bunkerCollide(t);

  // crater hazard
  if (inCr){ t.hp -= 22 * dt; t.hitFlash = 0.15; if (t.hp<=0) damageTank(t, 1, null, 'Crater'); }

  // tracks
  t.trailTimer -= dt;
  if (t.trailTimer <= 0 && (Math.abs(vF)>30 || Math.abs(vL)>40)){
    t.trailTimer = (surf==='ice'? 0.05 : 0.07);
    STATE.tracks.push({ x:t.x - fx*8, y:t.y - fy*8, ang:t.bodyAng, life:1.6, max:1.6, surf });
  }

  // cooldowns
  t.fireCD = Math.max(0, t.fireCD - dt);
  t.scatterCD = Math.max(0, t.scatterCD - dt);
  t.lightningCD = Math.max(0, t.lightningCD - dt);
  t.mineCD = Math.max(0, t.mineCD - dt);
  t.muzzleFlash = Math.max(0, t.muzzleFlash - dt);
  t.hitFlash = Math.max(0, t.hitFlash - dt);
}

/* --------------------- mines tick --------------------- */
function tickMines(dt){
  for (let i=STATE.projectiles.length-1;i>=0;i--){
    const p = STATE.projectiles[i];
    if (p.kind !== 'mine') continue;
    p.life -= dt; if (p.fuse>0){ p.fuse-=dt; continue; }
    // proximity detonate any tank
    for (const t of STATE.tanks){
      if (!t.alive) continue;
      if (t.team === p.team) continue; // friendly mines harmless
      if (dist(p.x,p.y,t.x,t.y) < 38){
        damageTank(t, p.dmg, getOwner(p.owner), 'Mine');
        explodeAt(p.x,p.y,'big',24);
        STATE.projectiles.splice(i,1);
        break;
      }
    }
    if (p.life<=0){ STATE.projectiles.splice(i,1); }
  }
}

/* --------------------- match flow --------------------- */
function newMatch(){
  STATE.matchNum++;
  STATE.phase = 'play';
  STATE.matchTime = 0;
  STATE.kills = { red:0, blue:0 };
  STATE.projectiles.length = 0;
  STATE.effects.length = 0;
  STATE.tracks.length = 0;
  STATE.killfeed.length = 0;
  STATE.recentKills.length = 0;
  STATE.firstBloodDone = false;
  STATE.matchPointShown = { red:false, blue:false };
  STATE.comebackArmed = { red:false, blue:false };
  STATE.announcer = null;
  STATE.lastFinalTankShoutAt = -999;

  // bunkers reset
  for (const b of MAP.bunkers){ b.alive = true; b.hp = b.max; }
  resetPickups();
  // randomize pickup timers to stagger
  for (const p of STATE.pickups){ p.ready = Math.random()<0.5; if (!p.ready) p.timer = rand(5, p.every); }

  // pick callsigns
  const pool = shuffle([...ROSTER]);
  const names = pool.slice(0,4);
  STATE.tanks = [
    new Tank(names[0], 'red',  0),
    new Tank(names[1], 'red',  0),
    new Tank(names[2], 'blue', Math.PI),
    new Tank(names[3], 'blue', Math.PI)
  ];

  announce('MATCH ' + STATE.matchNum + ' — ' + names[0] + ' & ' + names[1] + ' vs ' + names[2] + ' & ' + names[3], 'FIRST TO ' + STATE.killTarget + ' KILLS', 3.0, '#ffffff');
}

function checkMatchEnd(){
  if (STATE.kills.red >= STATE.killTarget || STATE.kills.blue >= STATE.killTarget || STATE.matchTime >= STATE.matchMax){
    STATE.phase = 'scoreboard';
    STATE.scoreboardUntil = performance.now()/1000 + 6.0;
    const winner = STATE.kills.red === STATE.kills.blue
      ? null
      : (STATE.kills.red > STATE.kills.blue ? 'red' : 'blue');
    if (winner) announce(TEAMS[winner].name + ' WINS', STATE.kills[winner] + ' — ' + STATE.kills[winner==='red'?'blue':'red'], 3.5, TEAMS[winner].color);
    else        announce('DRAW', 'Time expired', 3.0, '#ddd');
  }
}

function tickRespawns(){
  for (const t of STATE.tanks){
    if (!t.alive && STATE.matchTime >= t.respawnAt){
      t.alive = true;
      t.hp = t.maxHp;
      t.x = TEAMS[t.team].baseX + (t.team==='red'? rand(40,90) : -rand(40,90));
      t.y = TEAMS[t.team].baseY + rand(-120,120);
      t.vx = 0; t.vy=0;
      t.bodyAng = t.team==='red'? 0 : Math.PI;
      t.turretAng = t.bodyAng;
      t.weapon = null; t.weaponAmmo = 0;
    }
  }
}

/* --------------------- camera --------------------- */
function updateCamera(dt){
  const c = STATE.cam;
  c.x = lerp(c.x, c.tx, 1 - Math.exp(-3.0*dt));
  c.y = lerp(c.y, c.ty, 1 - Math.exp(-3.0*dt));
  c.zoom = lerp(c.zoom, c.tz, 1 - Math.exp(-2.4*dt));
}

/* --------------------- rendering --------------------- */
function clear(){
  ctx.fillStyle = '#06080b';
  ctx.fillRect(0,0,cv.width,cv.height);
}
function applyView(){
  const c = STATE.cam;
  // viewport scale & center
  ctx.save();
  // letterbox
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  // camera transform (zoom about cam center, draw map relative)
  ctx.translate(GW/2, GH/2);
  ctx.scale(c.zoom, c.zoom);
  ctx.translate(-c.x, -c.y);
}
function endView(){ ctx.restore(); }

function drawArena(){
  // floor
  const grad = ctx.createRadialGradient(GW/2, GH/2, 100, GW/2, GH/2, GW*0.7);
  grad.addColorStop(0, '#2a2620');
  grad.addColorStop(1, '#171410');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,GW,GH);

  // soft grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x=0;x<GW;x+=80){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
  for (let y=0;y<GH;y+=80){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke(); }

  // patches
  for (const p of MAP.patches){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, TAU);
    if (p.type==='ice'){
      const g = ctx.createRadialGradient(p.x,p.y,10, p.x,p.y, p.r);
      g.addColorStop(0, 'rgba(180,220,255,0.35)');
      g.addColorStop(1, 'rgba(120,170,220,0.0)');
      ctx.fillStyle = g;
    } else {
      const g = ctx.createRadialGradient(p.x,p.y,10, p.x,p.y, p.r);
      g.addColorStop(0, 'rgba(212,176,108,0.40)');
      g.addColorStop(1, 'rgba(140,110,60,0.0)');
      ctx.fillStyle = g;
    }
    ctx.fill();
    // patch label
    ctx.fillStyle = p.type==='ice'? 'rgba(200,225,255,0.18)' : 'rgba(220,180,120,0.18)';
    ctx.font = '600 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(p.type.toUpperCase(), p.x, p.y+5);
  }

  // ramps
  for (const r of MAP.ramps){
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.fillStyle = 'rgba(120,120,140,0.18)';
    ctx.fillRect(-r.w/2,-r.h/2,r.w,r.h);
    ctx.strokeStyle = 'rgba(180,180,210,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect(-r.w/2,-r.h/2,r.w,r.h);
    // chevrons
    ctx.fillStyle = 'rgba(230,230,250,0.20)';
    for (let i=-2;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(i*40-10, -8);
      ctx.lineTo(i*40,    -2);
      ctx.lineTo(i*40+10, -8);
      ctx.lineTo(i*40+10, 0);
      ctx.lineTo(i*40,    -2+6);
      ctx.lineTo(i*40-10, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '600 12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('ELEVATED', 0, r.h/2 + 18);
    ctx.restore();
  }

  // crater
  const c = MAP.crater;
  const cg = ctx.createRadialGradient(c.x,c.y, 8, c.x,c.y, c.r);
  cg.addColorStop(0, 'rgba(255,80,40,0.65)');
  cg.addColorStop(0.6, 'rgba(120,30,10,0.45)');
  cg.addColorStop(1, 'rgba(80,20,8,0)');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, TAU); ctx.fill();
  // hazard ring
  ctx.strokeStyle = 'rgba(255,90,50,0.45)';
  ctx.lineWidth = 3;
  ctx.setLineDash([8,8]);
  ctx.beginPath(); ctx.arc(c.x, c.y, c.r-6, 0, TAU); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,200,170,0.7)';
  ctx.font = '700 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('KILL ZONE', c.x, c.y - c.r - 8);

  // bases
  for (const k of ['red','blue']){
    const T = TEAMS[k];
    ctx.save();
    ctx.translate(T.baseX, T.baseY);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.arc(0,0,120,0,TAU); ctx.fill();
    ctx.strokeStyle = T.color + 'aa';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(0,0,120,0,TAU); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = T.color;
    ctx.font = '700 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(T.name + ' BASE', 0, -130);
    ctx.restore();
  }

  // walls
  for (const w of MAP.walls){
    ctx.fillStyle = '#262320';
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle = '#3a352d';
    ctx.lineWidth = 2;
    ctx.strokeRect(w.x,w.y,w.w,w.h);
  }
}

function drawTracks(){
  for (const tr of STATE.tracks){
    const a = tr.life / tr.max * 0.55;
    ctx.save();
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.ang);
    ctx.fillStyle = `rgba(20,15,10,${a*0.85})`;
    ctx.fillRect(-12,-12,4,8);
    ctx.fillRect(-12, 4,4,8);
    ctx.restore();
  }
}

function drawBunkers(){
  for (const b of MAP.bunkers){
    if (!b.alive){
      // rubble
      ctx.fillStyle = 'rgba(60,55,48,0.6)';
      for (let i=0;i<5;i++){
        const a = i*1.1;
        ctx.fillRect(b.x + Math.cos(a)*b.w*0.25 - 6, b.y + Math.sin(a)*b.h*0.25 - 4, 12, 8);
      }
      continue;
    }
    ctx.save();
    ctx.translate(b.x,b.y);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(-b.w/2+4,-b.h/2+4,b.w,b.h);
    // body
    const grd = ctx.createLinearGradient(0,-b.h/2,0,b.h/2);
    grd.addColorStop(0,'#5b5446'); grd.addColorStop(1,'#332e26');
    ctx.fillStyle = grd;
    ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
    ctx.strokeStyle = '#1a1612';
    ctx.lineWidth = 3;
    ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
    // crenellations
    ctx.fillStyle = '#6f6657';
    for (let i=-2;i<=2;i++){
      ctx.fillRect(i*22-4,-b.h/2-6, 8, 6);
      ctx.fillRect(i*22-4, b.h/2,    8, 6);
    }
    // hp bar
    const ratio = clamp(b.hp/b.max, 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-b.w/2, -b.h/2-14, b.w, 4);
    ctx.fillStyle = ratio>0.5? '#9be07a' : ratio>0.25? '#e0c45a' : '#e07a7a';
    ctx.fillRect(-b.w/2, -b.h/2-14, b.w*ratio, 4);
    ctx.restore();
  }
}

function drawPickups(){
  for (const p of STATE.pickups){
    ctx.save();
    ctx.translate(p.x, p.y);
    if (p.ready){
      const pulse = 0.6 + 0.4*Math.sin(p.pulse*5);
      const col = pickupColor(p.type);
      // aura
      const g = ctx.createRadialGradient(0,0,2, 0,0, 38);
      g.addColorStop(0, col + 'cc');
      g.addColorStop(1, col + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0,0,38*pulse,0,TAU); ctx.fill();
      // base disc
      ctx.fillStyle = '#0c0e12';
      ctx.beginPath(); ctx.arc(0,0,16,0,TAU); ctx.fill();
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0,16,0,TAU); ctx.stroke();
      drawPickupIcon(p.type, col);
    } else {
      // gray countdown
      ctx.fillStyle = '#1a1d22';
      ctx.beginPath(); ctx.arc(0,0,16,0,TAU); ctx.fill();
      ctx.strokeStyle = '#3a3f48';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0,16,0,TAU); ctx.stroke();
      // arc countdown
      const frac = 1 - p.timer/p.every;
      ctx.strokeStyle = '#6f7a86';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0,0,20, -Math.PI/2, -Math.PI/2 + frac*TAU); ctx.stroke();
      ctx.fillStyle = '#9aa3ad';
      ctx.font = '700 11px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(p.timer)+'s', 0, 4);
    }
    ctx.restore();
  }
}
function pickupColor(t){
  return t==='lightning'?'#7fd0ff':t==='scatter'?'#ff9a3d':t==='mine'?'#ff5577':t==='repair'?'#88ff99':'#fff';
}
function drawPickupIcon(type, col){
  ctx.fillStyle = col;
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (type==='lightning'){
    ctx.moveTo(-4,-9); ctx.lineTo(2,-2); ctx.lineTo(-1,-1); ctx.lineTo(4,9); ctx.lineTo(-1,2); ctx.lineTo(2,1); ctx.closePath();
    ctx.fill();
  } else if (type==='scatter'){
    ctx.moveTo(-7,-3); ctx.lineTo(7,-7); ctx.lineTo(7,7); ctx.lineTo(-7,3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#0c0e12';
    ctx.fillRect(-2,-2,4,4);
  } else if (type==='mine'){
    ctx.arc(0,0,6,0,TAU); ctx.fill();
    for (let i=0;i<6;i++){
      const a = i*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*6, Math.sin(a)*6);
      ctx.lineTo(Math.cos(a)*10, Math.sin(a)*10);
      ctx.stroke();
    }
  } else if (type==='repair'){
    ctx.fillRect(-2,-8,4,16); ctx.fillRect(-8,-2,16,4);
  }
}

function drawProjectiles(){
  for (const p of STATE.projectiles){
    if (p.kind === 'mine'){
      ctx.save();
      ctx.translate(p.x, p.y);
      const blink = (Math.sin(STATE.matchTime*10) > 0)? 1 : 0.3;
      ctx.fillStyle = '#ff5577';
      ctx.globalAlpha = blink;
      ctx.beginPath(); ctx.arc(0,0,7,0,TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#ffaaa0';
      ctx.lineWidth = 1;
      for (let i=0;i<6;i++){
        const a = i*Math.PI/3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*7, Math.sin(a)*7);
        ctx.lineTo(Math.cos(a)*11, Math.sin(a)*11);
        ctx.stroke();
      }
      ctx.restore();
      continue;
    }
    // motion blur trail
    for (let i=0;i<p.trail.length;i++){
      const tp = p.trail[i];
      const a = (i+1)/p.trail.length;
      ctx.fillStyle = p.kind==='scatter'? `rgba(255,170,80,${a*0.45})` : `rgba(255,220,140,${a*0.5})`;
      ctx.beginPath(); ctx.arc(tp.x, tp.y, 2.6*a + 1, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#fff8cf';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, TAU); ctx.fill();
  }
}

function drawTanks(){
  for (const t of STATE.tanks){
    if (!t.alive) {
      // wreck
      ctx.save();
      ctx.translate(t.x, t.y);
      ctx.rotate(t.bodyAng);
      ctx.fillStyle = 'rgba(40,30,25,0.8)';
      ctx.fillRect(-22,-16,44,32);
      ctx.strokeStyle = 'rgba(20,10,6,0.9)';
      ctx.strokeRect(-22,-16,44,32);
      ctx.restore();
      continue;
    }
    const T = TEAMS[t.team];
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.ellipse(t.x+3, t.y+5, 24, 14, 0, 0, TAU); ctx.fill();

    // body
    ctx.translate(t.x, t.y);
    ctx.rotate(t.bodyAng);
    // tracks
    ctx.fillStyle = '#15110d';
    ctx.fillRect(-22,-18,44,5);
    ctx.fillRect(-22, 13,44,5);
    // body chassis
    const bg = ctx.createLinearGradient(0,-15,0,15);
    bg.addColorStop(0, T.color);
    bg.addColorStop(1, T.dark);
    ctx.fillStyle = bg;
    ctx.fillRect(-22,-13,44,26);
    ctx.strokeStyle = '#0d0a08';
    ctx.lineWidth = 2;
    ctx.strokeRect(-22,-13,44,26);
    // hull line
    ctx.fillStyle = T.glow;
    ctx.fillRect(-18,-3, 36, 6);
    if (t.hitFlash > 0){
      ctx.fillStyle = `rgba(255,255,255,${t.hitFlash*1.5})`;
      ctx.fillRect(-22,-13,44,26);
    }
    ctx.restore();

    // turret (independent rotation)
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.turretAng);
    // dome
    ctx.fillStyle = '#262022';
    ctx.beginPath(); ctx.arc(0,0,11,0,TAU); ctx.fill();
    ctx.strokeStyle = T.color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,11,0,TAU); ctx.stroke();
    // barrel
    ctx.fillStyle = '#3a3338';
    ctx.fillRect(0,-3, 28, 6);
    ctx.strokeStyle = '#0d0a08';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0,-3, 28, 6);
    // muzzle flash
    if (t.muzzleFlash > 0){
      const mf = t.muzzleFlash * 12;
      ctx.fillStyle = '#fff3a8';
      ctx.beginPath();
      ctx.moveTo(28, 0);
      ctx.lineTo(28+mf+10, -mf);
      ctx.lineTo(28+mf+18, 0);
      ctx.lineTo(28+mf+10,  mf);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // weapon indicator (small icon next to turret)
    if (t.weapon){
      ctx.save();
      ctx.translate(t.x + 18, t.y - 26);
      ctx.fillStyle = pickupColor(t.weapon);
      ctx.beginPath(); ctx.arc(0,0,5,0,TAU); ctx.fill();
      ctx.fillStyle = '#0c0e12';
      ctx.font = '700 9px system-ui';
      ctx.textAlign='center';
      ctx.fillText(t.weaponAmmo, 0, 3);
      ctx.restore();
    }

    // name + hp bar
    ctx.save();
    ctx.translate(t.x, t.y - 36);
    // bg
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(-32, -18, 64, 22);
    ctx.strokeStyle = T.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(-32, -18, 64, 22);
    // name
    ctx.fillStyle = T.color;
    ctx.font = '700 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(t.name, 0, -7);
    // hp bar
    const r = clamp(t.hp/t.maxHp, 0, 1);
    ctx.fillStyle = '#222';
    ctx.fillRect(-28, 0, 56, 3);
    ctx.fillStyle = r>0.55? '#69e074' : r>0.28? '#e0d24f' : '#e0584f';
    ctx.fillRect(-28, 0, 56*r, 3);
    ctx.restore();
  }
}

function drawEffects(){
  for (const e of STATE.effects){
    if (e.kind==='spark'){
      const a = clamp(e.life/e.max,0,1);
      ctx.fillStyle = e.color;
      ctx.globalAlpha = a;
      ctx.beginPath(); ctx.arc(e.x, e.y, 2.5*a + 0.8, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (e.kind==='shock'){
      const a = clamp(e.life/e.max,0,1);
      ctx.strokeStyle = `rgba(255,200,140,${a})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r*(1.4 - a), 0, TAU); ctx.stroke();
    } else if (e.kind==='lightning'){
      const a = clamp(e.life/e.max,0,1);
      for (const seg of e.segs){
        ctx.strokeStyle = `rgba(200,230,255,${0.4 + 0.6*a})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(seg[0].x, seg[0].y);
        for (let i=1;i<seg.length;i++) ctx.lineTo(seg[i].x, seg[i].y);
        ctx.stroke();
        ctx.strokeStyle = `rgba(255,255,255,${a})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
  }
}

/* --------------------- HUD (screen-space) --------------------- */
function drawHUD(){
  const sw = cv.width, sh = cv.height;

  // top vignette
  const vg = ctx.createLinearGradient(0,0,0,120);
  vg.addColorStop(0,'rgba(0,0,0,0.7)'); vg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,sw,140);

  // score / timer top center
  const cx = sw/2;
  const tt = Math.max(0, STATE.matchMax - STATE.matchTime);
  const mm = Math.floor(tt/60), ss = Math.floor(tt%60);
  const timeStr = mm + ':' + ss.toString().padStart(2,'0');

  ctx.font = '800 26px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0d1014';
  roundRect(ctx, cx-180, 18, 360, 56, 10, true, false);
  ctx.strokeStyle = '#222a33';
  ctx.lineWidth = 2;
  roundRect(ctx, cx-180, 18, 360, 56, 10, false, true);

  // red score
  ctx.fillStyle = TEAMS.red.color;
  ctx.fillText(STATE.kills.red, cx-100, 56);
  ctx.fillStyle = '#aaa';
  ctx.font = '600 11px system-ui';
  ctx.fillText(TEAMS.red.name, cx-100, 70);

  // timer
  ctx.fillStyle = '#fff';
  ctx.font = '800 28px system-ui';
  ctx.fillText(timeStr, cx, 58);
  ctx.fillStyle = '#7c8a99';
  ctx.font = '600 10px system-ui';
  ctx.fillText('FIRST TO ' + STATE.killTarget, cx, 72);

  // blue score
  ctx.fillStyle = TEAMS.blue.color;
  ctx.font = '800 26px system-ui';
  ctx.fillText(STATE.kills.blue, cx+100, 56);
  ctx.fillStyle = '#aaa';
  ctx.font = '600 11px system-ui';
  ctx.fillText(TEAMS.blue.name, cx+100, 70);

  // teams roster row (left of score block)
  const aliveRed  = STATE.tanks.filter(t=>t.team==='red');
  const aliveBlue = STATE.tanks.filter(t=>t.team==='blue');
  drawTeamRow(cx-220 - 220, 30, aliveRed,  'right');
  drawTeamRow(cx+220,        30, aliveBlue, 'left');

  // killfeed (right side, below match info area)
  const fx = sw - 22, fy = 110;
  ctx.textAlign = 'right';
  for (let i=0;i<Math.min(4, STATE.killfeed.length); i++){
    const k = STATE.killfeed[i];
    const yy = fy + i*30;
    const w = 360, h = 24;
    ctx.fillStyle = `rgba(0,0,0,${0.55 - i*0.08})`;
    roundRect(ctx, fx-w, yy, w, h, 6, true, false);

    ctx.font = '700 13px system-ui';
    let xText = fx - 10;
    ctx.fillStyle = '#fff';
    ctx.fillText(k.victim.n, xText, yy+16); xText -= ctx.measureText(k.victim.n).width;
    ctx.fillStyle = '#bcc4cc';
    const wlbl = ' ['+k.weapon+'] ';
    xText -= 6;
    ctx.fillText(wlbl, xText, yy+16); xText -= ctx.measureText(wlbl).width;
    if (k.killer){
      ctx.fillStyle = TEAMS[k.killer.t].color;
      xText -= 4;
      ctx.fillText(k.killer.n, xText, yy+16);
    } else {
      ctx.fillStyle = '#aaa';
      xText -= 4;
      ctx.fillText('WORLD', xText, yy+16);
    }
  }

  // bottom strip — match name
  ctx.textAlign = 'left';
  ctx.font = '700 11px system-ui';
  ctx.fillStyle = '#7d8894';
  ctx.fillText('TANK SKIRMISH • MATCH ' + STATE.matchNum.toString().padStart(3,'0') + ' • LIVE', 20, sh - 16);
  ctx.textAlign = 'right';
  ctx.fillText('AUTOPLAY • 2v2', sw - 20, sh - 16);

  // announcer banner
  if (STATE.announcer){
    const A = STATE.announcer;
    A.t += 1/60;
    const a = A.t < 0.25 ? A.t/0.25 : (A.t > A.life-0.4 ? Math.max(0,(A.life-A.t)/0.4) : 1);
    ctx.save();
    ctx.globalAlpha = a;
    const bw = 720, bh = 84;
    const bx = sw/2 - bw/2, by = sh*0.18;
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    roundRect(ctx, bx, by, bw, bh, 14, true, false);
    ctx.strokeStyle = A.color;
    ctx.lineWidth = 3;
    roundRect(ctx, bx, by, bw, bh, 14, false, true);
    ctx.fillStyle = A.color;
    ctx.font = '900 36px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(A.text, sw/2, by + 44);
    if (A.sub){
      ctx.fillStyle = '#cfd6dd';
      ctx.font = '600 14px system-ui';
      ctx.fillText(A.sub, sw/2, by + 68);
    }
    ctx.restore();
    if (A.t >= A.life) STATE.announcer = null;
  }

  // drama vignette
  if (STATE.cam.drama > 0){
    const a = STATE.cam.drama * 0.6;
    const vg2 = ctx.createRadialGradient(sw/2, sh/2, sh*0.2, sw/2, sh/2, sh*0.7);
    vg2.addColorStop(0,'rgba(0,0,0,0)');
    vg2.addColorStop(1,`rgba(0,0,0,${a})`);
    ctx.fillStyle = vg2;
    ctx.fillRect(0,0,sw,sh);
  }

  // global hit flash
  if (STATE.flashTime > 0){
    ctx.fillStyle = `rgba(255,240,200,${STATE.flashTime*0.5})`;
    ctx.fillRect(0,0,sw,sh);
  }
}

function drawTeamRow(x, y, tanks, anchor){
  ctx.save();
  ctx.translate(x, y);
  ctx.font = '700 12px system-ui';
  for (let i=0;i<tanks.length;i++){
    const t = tanks[i];
    const w = 200, h = 22;
    const yy = i*26;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect(ctx, 0, yy, w, h, 6, true, false);
    ctx.fillStyle = TEAMS[t.team].color;
    ctx.fillRect(anchor==='right'? w-3 : 0, yy, 3, h);
    // name
    ctx.fillStyle = t.alive? '#fff' : '#666';
    ctx.textAlign = 'left';
    ctx.fillText(t.name, 8, yy+15);
    // kills
    ctx.textAlign = 'right';
    ctx.fillStyle = '#cfd6dd';
    ctx.fillText(t.kills + ' / ' + t.deaths, w-10, yy+15);
    // streak chip
    if (t.streak >= 3){
      ctx.fillStyle = '#ffba3d';
      ctx.fillRect(w - 80, yy+5, 12, 12);
      ctx.fillStyle = '#241a07';
      ctx.font = '700 10px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(t.streak, w-74, yy+14);
      ctx.font = '700 12px system-ui';
    }
    if (!t.alive){
      const left = Math.max(0, t.respawnAt - STATE.matchTime);
      ctx.fillStyle = '#888';
      ctx.font = '600 10px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText('RESPAWN ' + left.toFixed(1)+'s', 8, yy+h+10);
      ctx.font = '700 12px system-ui';
      yy; // no-op
    }
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r, fill, stroke){
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y,   x+w, y+h, r);
  c.arcTo(x+w, y+h, x,   y+h, r);
  c.arcTo(x,   y+h, x,   y,   r);
  c.arcTo(x,   y,   x+w, y,   r);
  c.closePath();
  if (fill) c.fill();
  if (stroke) c.stroke();
}

/* --------------------- scoreboard overlay --------------------- */
function drawScoreboard(){
  const sw = cv.width, sh = cv.height;
  ctx.fillStyle = 'rgba(2,4,8,0.84)';
  ctx.fillRect(0,0,sw,sh);

  // determine winner & MVP
  let winnerTeam = STATE.kills.red === STATE.kills.blue ? null : (STATE.kills.red>STATE.kills.blue?'red':'blue');
  let mvp = null;
  let bestScore = -1;
  for (const t of STATE.tanks){
    const s = t.kills*10 + t.bestStreak*4 - t.deaths*2 + (t.shots? (t.hits/t.shots)*15 : 0);
    if (s > bestScore){ bestScore = s; mvp = t; }
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = '900 44px system-ui';
  ctx.fillText('FINAL SCORE', sw/2, 110);

  if (winnerTeam){
    ctx.fillStyle = TEAMS[winnerTeam].color;
    ctx.font = '900 28px system-ui';
    ctx.fillText(TEAMS[winnerTeam].name + ' WINS  ' + STATE.kills[winnerTeam] + ' — ' + STATE.kills[winnerTeam==='red'?'blue':'red'], sw/2, 150);
  } else {
    ctx.fillStyle = '#ddd';
    ctx.font = '900 28px system-ui';
    ctx.fillText('DRAW  ' + STATE.kills.red + ' — ' + STATE.kills.blue, sw/2, 150);
  }

  // table
  const tx = sw/2 - 460, ty = 200;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#9aa3ad';
  ctx.font = '700 13px system-ui';
  const headers = ['TANK','TEAM','K','D','BEST STK','ACC'];
  const cols    = [0, 280, 460, 540, 620, 760];
  for (let i=0;i<headers.length;i++) ctx.fillText(headers[i], tx + cols[i], ty);

  // sort tanks by kills desc
  const sorted = [...STATE.tanks].sort((a,b)=> b.kills - a.kills);

  for (let i=0;i<sorted.length;i++){
    const t = sorted[i];
    const yy = ty + 36 + i*46;
    const isMvp = (t === mvp);
    if (isMvp){
      ctx.fillStyle = 'rgba(255,210,90,0.18)';
      roundRect(ctx, tx-10, yy-26, 920, 38, 8, true, false);
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 2;
      roundRect(ctx, tx-10, yy-26, 920, 38, 8, false, true);
    }
    ctx.fillStyle = isMvp? '#ffd24a' : '#fff';
    ctx.font = '800 18px system-ui';
    ctx.fillText(t.name + (isMvp? '  ★ MVP' : ''), tx + cols[0], yy);

    ctx.fillStyle = TEAMS[t.team].color;
    ctx.font = '700 14px system-ui';
    ctx.fillText(TEAMS[t.team].name, tx + cols[1], yy);

    ctx.fillStyle = '#fff';
    ctx.font = '700 16px system-ui';
    ctx.fillText(t.kills, tx + cols[2], yy);
    ctx.fillStyle = '#cfd6dd';
    ctx.fillText(t.deaths, tx + cols[3], yy);
    ctx.fillText(t.bestStreak, tx + cols[4], yy);
    const acc = t.shots? Math.round(t.hits/t.shots*100) : 0;
    ctx.fillText(acc + '%', tx + cols[5], yy);
  }

  ctx.textAlign='center';
  ctx.fillStyle = '#7d8894';
  ctx.font = '600 12px system-ui';
  const left = Math.max(0, STATE.scoreboardUntil - performance.now()/1000);
  ctx.fillText('NEXT MATCH IN ' + left.toFixed(1)+'s — AUTO-REMATCH', sw/2, sh - 50);
}

/* --------------------- main loop --------------------- */
let lastTs = performance.now();
function frame(now){
  const rawDt = (now - lastTs)/1000;
  lastTs = now;
  const dt = Math.min(0.05, rawDt);

  if (STATE.phase === 'play'){
    STATE.matchTime += dt;

    // AI & physics
    for (const t of STATE.tanks) updateAI(t, dt);
    for (const t of STATE.tanks) physicsTank(t, dt);
    for (const t of STATE.tanks) tankCollide(t, STATE.tanks);

    updateProjectiles(dt);
    tickMines(dt);
    updateEffects(dt);
    updatePickups(dt);
    tickRespawns();
    maybeFinalTankAnnouncement();
    updateCamera(dt);
    checkMatchEnd();
  } else {
    // scoreboard
    updateEffects(dt);
    if (performance.now()/1000 >= STATE.scoreboardUntil){
      newMatch();
    }
  }

  // ---------- draw ----------
  clear();
  applyView();
  drawArena();
  drawTracks();
  drawBunkers();
  drawPickups();
  drawProjectiles();
  drawTanks();
  drawEffects();
  endView();
  drawHUD();
  if (STATE.phase === 'scoreboard') drawScoreboard();

  requestAnimationFrame(frame);
}

/* --------------------- start --------------------- */
newMatch();
requestAnimationFrame(frame);

</script>
