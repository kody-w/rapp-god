<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Oakwood Hollow — 3D AI Town</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0d18;color:#e8eaf2;font-family:Menlo,Consolas,monospace}
canvas{display:block;position:fixed;inset:0}
#ui{position:fixed;inset:0;pointer-events:none;z-index:5}
#chronicle{position:absolute;top:8px;left:8px;width:340px;max-height:62vh;overflow:hidden;
  background:rgba(8,10,20,.78);border:1px solid #2a3052;border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.45;
  pointer-events:auto;backdrop-filter:blur(4px)}
#chronicle h2{font-size:11px;letter-spacing:.18em;color:#9aa6e6;margin-bottom:6px;text-transform:uppercase}
#chronicleLog{max-height:54vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#3a4280 #0b0d18}
#chronicleLog::-webkit-scrollbar{width:6px}
#chronicleLog::-webkit-scrollbar-thumb{background:#3a4280;border-radius:3px}
.evt{margin-bottom:5px;padding-left:6px;border-left:2px solid #3a4280}
.evt .t{color:#ffcf6b;font-weight:bold;margin-right:4px}
.evt.drama{border-left-color:#ff5470}
.evt.drama .t{color:#ff8aa0}
.evt.romance{border-left-color:#ff9ad8}
.evt.romance .t{color:#ffc0e8}
.evt.civic{border-left-color:#6bc1ff}
.evt.civic .t{color:#aedcff}
#hud{position:absolute;top:8px;right:8px;width:230px;background:rgba(8,10,20,.78);border:1px solid #2a3052;border-radius:6px;padding:8px 10px;font-size:11px;pointer-events:auto}
#hud h2{font-size:11px;letter-spacing:.18em;color:#9aa6e6;margin-bottom:6px;text-transform:uppercase}
.row{display:flex;justify-content:space-between;margin:2px 0}
.row span:first-child{color:#9aa6e6}
#followInfo{margin-top:6px;color:#ffcf6b;font-size:10px;min-height:18px}
#agentList{margin-top:8px;max-height:36vh;overflow-y:auto;font-size:10px}
.agentRow{display:flex;align-items:center;gap:6px;padding:2px 4px;cursor:pointer;border-radius:3px}
.agentRow:hover{background:#1a2046}
.agentRow.active{background:#2a3262}
.swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bubble{position:absolute;background:rgba(255,255,255,.94);color:#1a1d2e;padding:4px 8px;border-radius:10px;font-size:10px;font-weight:bold;
  pointer-events:none;transform:translate(-50%,-110%);white-space:nowrap;border:1px solid #1a1d2e;max-width:240px;
  box-shadow:0 2px 6px rgba(0,0,0,.4)}
.bubble:after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#1a1d2e}
#endScreen{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(20,8,40,.94),rgba(0,0,0,.98));
  display:none;align-items:center;justify-content:center;flex-direction:column;padding:40px;z-index:50;pointer-events:auto}
#endScreen h1{font-size:36px;color:#ffcf6b;margin-bottom:24px;text-align:center;letter-spacing:.05em;text-shadow:0 0 20px #ff8a4c}
#endScreen .ep{font-size:14px;color:#dde;line-height:1.8;text-align:center;max-width:760px}
#endScreen .ep div{margin:5px 0}
#endScreen .countdown{margin-top:30px;color:#9aa6e6;font-size:11px;letter-spacing:.2em}
#labelLayer{position:absolute;inset:0;pointer-events:none}
.locLabel{position:absolute;color:#ffcf6b;font-size:10px;font-weight:bold;text-shadow:0 0 6px #000,0 0 3px #000;
  pointer-events:none;transform:translate(-50%,-50%);opacity:.85;letter-spacing:.05em}
#dayBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:42px;color:#ffcf6b;text-shadow:0 0 20px #ff8a4c,0 0 40px #ff5470;letter-spacing:.1em;
  opacity:0;pointer-events:none;transition:opacity .8s;font-weight:bold}
.relMatrix{position:absolute;left:8px;bottom:8px;background:rgba(8,10,20,.85);border:1px solid #2a3052;border-radius:6px;padding:6px;
  font-size:9px;display:none;pointer-events:auto}
#toggleMatrix{position:absolute;left:8px;bottom:8px;background:rgba(8,10,20,.85);border:1px solid #2a3052;color:#9aa6e6;
  padding:4px 8px;font-size:10px;font-family:inherit;cursor:pointer;border-radius:4px;pointer-events:auto}
#toggleMatrix:hover{background:#1a2046}
</style>
</head>
<body>
<!-- ROUND11_3D_EPIC v1 -->
<canvas id="c"></canvas>
<div id="ui">
  <div id="chronicle">
    <h2>📜 Chronicle of Oakwood Hollow</h2>
    <div id="chronicleLog"></div>
  </div>
  <div id="hud">
    <h2>🏘 Town Status</h2>
    <div class="row"><span>Day</span><b id="hudDay">1</b></div>

    <div class="row"><span>Phase</span><b id="hudPhase">Dawn</b></div>
    <div class="row"><span>Mood</span><b id="hudMood">Calm</b></div>
    <div id="followInfo">Director cam idle</div>
    <div id="agentList"></div>
  </div>
  <div id="labelLayer"></div>
  <div id="dayBanner"></div>
  <button id="toggleMatrix">Show relations ▲</button>
  <div class="relMatrix" id="relMatrix"></div>
  <div id="endScreen">
    <h1>WEEK 2 IN OAKWOOD HOLLOW</h1>
    <div class="ep" id="endText"></div>
    <div class="countdown" id="endCountdown">Reshuffling traits in 12s…</div>
  </div>
</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>

  {n:'Frank',  role:'Mechanic',  home:'autoshop',   work:'autoshop',   skin:0xd9a878, body:0x4a4a4a, accent:0xff7043, hat:'cap',     traits:['gruff','kind-hearted']},
  {n:'Grace',  role:'Doctor',    home:'clinic',     work:'clinic',     skin:0xf7d9bf, body:0xfafafa, accent:0xff1744, hat:'cross',   traits:['precise','overworked']},
  {n:'Henry',  role:'Mayor',     home:'townhall',   work:'townhall',   skin:0xefcfae, body:0x2c2c4d, accent:0xc0a060, hat:'top',     traits:['ambitious','vain']},
  {n:'Iris',   role:'Artist',    home:'artstudio',  work:'artstudio',  skin:0xf3d6bc, body:0x8e44ad, accent:0xffd54f, hat:'beret',   traits:['dreamy','melodramatic']},

// ----- Building positions (x, z) on 80x80 grid -----
const BUILDINGS = {

  sheriff:    {x:-26, z:8,   w:8,  h:6,  d:7,  color:0xb88f60, roof:0x4a2a18, label:"SHERIFF'S"},

  school:     {x:-32, z:-12, w:9,  h:8,  d:8,  color:0xeacb8a, roof:0xa05a3a, label:'SCHOOL', bell:true},
  autoshop:   {x:26,  z:18,  w:10, h:6,  d:9,  color:0x9aa0aa, roof:0x4a4a4a, label:'AUTO SHOP', tools:true},
  clinic:     {x:18,  z:12,  w:8,  h:7,  d:7,  color:0xfafaff, roof:0xc62828, label:'CLINIC', cross:true},
  townhall:   {x:0,   z:24,  w:12, h:11, d:10, color:0xeae0c8, roof:0x4a3020, label:'TOWN HALL', flag:true},
  artstudio:  {x:32,  z:-12, w:7,  h:8,  d:7,  color:0xc89edb, roof:0x6a3088, label:'ART STUDIO'},
  newsstand:  {x:6,   z:6,   w:4,  h:4,  d:4,  color:0xc18f5b, roof:0x6a3a18, label:'NEWS'},
  lighthouse: {x:-42, z:-32, w:5,  h:18, d:5,  color:0xfafafa, roof:0xc62828, label:'LIGHTHOUSE', light:true},
  cottage:    {x:38,  z:-28, w:6,  h:7,  d:6,  color:0x6a4a8a, roof:0x4a1c6a, label:"WITCH'S COTTAGE", twisted:true}
};

// Square / outdoor location anchors
const LANDMARKS = {
  square: {x:0, z:0},
  fountain: {x:0, z:0},
  forest: {x:30, z:-40},
  river: {x:-10, z:-45},
  pier:  {x:-42, z:-38}
};

// ----- Schedules: hour → location_key -----
// Locations resolve to building positions or landmarks
function locOf(key){
  if(BUILDINGS[key]) return {x:BUILDINGS[key].x, z:BUILDINGS[key].z + (BUILDINGS[key].d/2 + 2)};
  if(LANDMARKS[key]) return LANDMARKS[key];
  return {x:0,z:0};
}

const SCHEDULES = {
  Alice:  [{h:0,l:'bakery',a:'sleep'},{h:5,l:'bakery',a:'bake'},{h:8,l:'bakery',a:'sell'},{h:12,l:'tavern',a:'lunch'},{h:13,l:'bakery',a:'sell'},{h:17,l:'square',a:'gossip'},{h:19,l:'tavern',a:'drink'},{h:22,l:'bakery',a:'sleep'}],
  Bob:    [{h:0,l:'sheriff',a:'sleep'},{h:6,l:'sheriff',a:'patrol'},{h:9,l:'square',a:'patrol'},{h:12,l:'tavern',a:'lunch'},{h:13,l:'sheriff',a:'paperwork'},{h:17,l:'square',a:'patrol'},{h:20,l:'tavern',a:'drink'},{h:22,l:'sheriff',a:'sleep'}],
  Cassidy:[{h:0,l:'greenhouse',a:'sleep'},{h:6,l:'greenhouse',a:'tend'},{h:11,l:'forest',a:'forage'},{h:13,l:'tavern',a:'lunch'},{h:14,l:'greenhouse',a:'tend'},{h:18,l:'square',a:'read'},{h:21,l:'greenhouse',a:'sleep'}],
  Diego:  [{h:0,l:'tavern',a:'sleep'},{h:9,l:'tavern',a:'restock'},{h:11,l:'tavern',a:'serve'},{h:14,l:'square',a:'stroll'},{h:16,l:'tavern',a:'serve'},{h:23,l:'tavern',a:'close'}],
  Elena:  [{h:0,l:'school',a:'sleep'},{h:7,l:'school',a:'prep'},{h:8,l:'school',a:'teach'},{h:12,l:'tavern',a:'lunch'},{h:13,l:'school',a:'teach'},{h:16,l:'square',a:'read'},{h:19,l:'school',a:'grade'},{h:22,l:'school',a:'sleep'}],
  Frank:  [{h:0,l:'autoshop',a:'sleep'},{h:7,l:'autoshop',a:'fix'},{h:12,l:'tavern',a:'lunch'},{h:13,l:'autoshop',a:'fix'},{h:18,l:'tavern',a:'drink'},{h:21,l:'autoshop',a:'sleep'}],
  Grace:  [{h:0,l:'clinic',a:'sleep'},{h:6,l:'clinic',a:'rounds'},{h:12,l:'tavern',a:'lunch'},{h:13,l:'clinic',a:'rounds'},{h:18,l:'square',a:'walk'},{h:20,l:'clinic',a:'paperwork'},{h:23,l:'clinic',a:'sleep'}],
  Henry:  [{h:0,l:'townhall',a:'sleep'},{h:8,l:'townhall',a:'meetings'},{h:11,l:'square',a:'campaign'},{h:13,l:'tavern',a:'lunch'},{h:14,l:'townhall',a:'meetings'},{h:17,l:'square',a:'campaign'},{h:19,l:'tavern',a:'schmooze'},{h:22,l:'townhall',a:'sleep'}],
  Iris:   [{h:0,l:'artstudio',a:'sleep'},{h:9,l:'artstudio',a:'paint'},{h:13,l:'tavern',a:'lunch'},{h:14,l:'square',a:'sketch'},{h:17,l:'artstudio',a:'paint'},{h:21,l:'tavern',a:'drink'},{h:23,l:'artstudio',a:'sleep'}],
  Jamal:  [{h:0,l:'newsstand',a:'sleep'},{h:7,l:'newsstand',a:'open'},{h:10,l:'square',a:'snoop'},{h:12,l:'tavern',a:'eavesdrop'},{h:14,l:'square',a:'snoop'},{h:17,l:'newsstand',a:'write'},{h:19,l:'tavern',a:'gossip'},{h:22,l:'newsstand',a:'sleep'}],
  Kai:    [{h:0,l:'lighthouse',a:'sleep'},{h:5,l:'pier',a:'fish'},{h:11,l:'pier',a:'fish'},{h:13,l:'tavern',a:'lunch'},{h:14,l:'pier',a:'fish'},{h:18,l:'lighthouse',a:'tend'},{h:22,l:'lighthouse',a:'sleep'}],
  Luna:   [{h:0,l:'cottage',a:'sleep'},{h:10,l:'forest',a:'gather'},{h:13,l:'cottage',a:'brew'},{h:16,l:'square',a:'mutter'},{h:18,l:'cottage',a:'brew'},{h:23,l:'cottage',a:'ritual'}]
};

// ----- Dialogue templates per scenario -----
const DIALOG = {
  greet: ["Morning!", "Hello there.", "Hey!", "Lovely day.", "Howdy.", "Good to see you."],
  gossip: ["Did you hear about {x}?", "I shouldn't say but…", "{x} is up to something.", "Word is, {x} owes money.", "{x} was at the tavern again.", "Don't tell anyone, but…"],
  flirt: ["You look radiant.", "Care for a walk?", "I baked something for you.", "Your eyes catch the light.", "Stay a while?", "I think of you often."],
  argue: ["That's nonsense!", "How dare you!", "We're done here.", "You're impossible.", "Get out of my way.", "I'll remember this."],
  lunch: ["Pass the bread?", "Diego's stew is fine today.", "Quiet day, huh?", "Mind if I join?", "What's the news?", "Long morning."],
  business: ["About the order…", "Need this fixed.", "Same as usual.", "Put it on my tab.", "I'll pay tomorrow.", "Two of those, please."],
  campaign: ["Vote Henry!", "A vote for me is a vote for sourdough!", "Cassidy can't lead.", "I built this town.", "Four more years!", "Look at my poster."],
  witch: ["The cards say…", "Something is coming.", "Don't trust the moon tonight.", "I saw a comet in the leaves.", "Beware Tuesday.", "The wind is wrong."],
  apology: ["I'm sorry.", "I shouldn't have.", "Forgive me?", "I was wrong.", "Truly, my fault.", "Let me make it up."]
};

// ----- Activity → chronicle template -----
const ACTIVITY_TEMPLATES = {
  bake: ["{N} pulled {n} sourdough loaves from the oven.","{N} dusted flour from her apron.","{N} burned a tray of croissants — again."],
  sell: ["{N} sold {n} pastries to passersby.","{N} chatted with a customer about {x}."],
  patrol: ["{N} walked the perimeter of the square.","{N} squinted at a stranger's cart.","{N} ticketed a wagon parked too close to the fountain."],
  paperwork: ["{N} filed reports on a missing wagon.","{N} reviewed the mayor's complaints.","{N} signed an arrest warrant — then tore it up."],
  tend: ["{N} watered the orchids and whispered to them.","{N} catalogued a rare moss.","{N} sneezed into the ferns."],
  forage: ["{N} returned from the forest with {n} jars of berries.","{N} swore she heard footsteps behind her.","{N} found a fox skull. Kept it."],
  serve: ["{N} poured {n} pints behind the bar.","{N} listened to {x}'s problems again.","{N} slipped Henry a stronger drink than he ordered."],
  restock: ["{N} hauled crates of cider up from the cellar.","{N} caught Jamal eavesdropping on the back room."],
  teach: ["{N} taught long division to {n} children.","{N} broke up a fight over a marble.","{N} stayed late helping a struggling student."],
  prep: ["{N} arranged her chalkboard with care.","{N} made a fresh pot of tea before class."],
  grade: ["{N} graded {n} essays on civic duty."],
  fix: ["{N} repaired {x}'s engine — third time this month.","{N} rebuilt a carburetor from spare parts.","{N} cursed loudly under a wagon."],

  campaign: ["{N} handed out {n} buttons reading 'HENRY 4 EVER'.","{N} kissed a baby. Wrong baby.","{N} promised paved roads — again."],
  paint: ["{N} mixed cobalt and ochre for hours.","{N} declared her latest piece a masterpiece.","{N} threw a half-finished canvas across the room."],
  sketch: ["{N} sketched the fountain in charcoal.","{N} drew Diego from across the square. Twice."],
  open: ["{N} unfolded his stand and stacked {n} fresh papers.","{N} chalked today's headline."],
  snoop: ["{N} loitered near the bakery, listening.","{N} pretended to read while shadowing {x}."],
  write: ["{N} drafted a column titled '{x}'.","{N} burned a draft and started over."],
  fish: ["{N} caught {n} mackerel from the pier.","{N} watched the tide and said nothing.","{N} lost a hook to a stubborn cod."],
  gather: ["{N} collected nightshade by the river.","{N} muttered to a raven for forty minutes."],
  brew: ["{N} stirred a pot that smoked green.","{N} bottled {n} vials of unidentified tonic."],
  ritual: ["{N} chanted in the cottage. Lights flickered."],
  mutter: ["{N} sat on a bench and read tea leaves to no one."],
  gossip: ["{N} traded rumors with {x} by the fountain.","{N} told {x} about {y}'s secret."],
  lunch: ["{N} ordered the special at the tavern.","{N} sat alone, picking at bread.","{N} joined {x} at a corner table."],
  drink: ["{N} nursed a third pint.","{N} bought a round for the house."],
  schmooze: ["{N} cornered {x} about an endorsement."],
  drink_alt: ["{N} clinked glasses with {x}."],
  read: ["{N} read by the fountain until dusk."],
  walk: ["{N} took a slow loop around the square."],
  stroll: ["{N} strolled with hands behind his back."],
  eavesdrop: ["{N} sat one stool down from the gossiping baker."],
  sleep: [],
  close: ["{N} mopped the bar. Lights out."],
  tend_alt: ["{N} climbed the lighthouse to trim the wick."],
  rain: []
};

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2240);
scene.fog = new THREE.Fog(0x1a2240, 60, 160);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.5, 400);
camera.position.set(36, 32, 50);
camera.lookAt(0, 2, 0);

// Lights
const hemi = new THREE.HemisphereLight(0xddeaff, 0x3a3320, 0.55);
scene.add(hemi);
const ambient = new THREE.AmbientLight(0x4a5078, 0.32);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff1d4, 1.0);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -70;
sun.shadow.camera.right = 70;
sun.shadow.camera.top = 70;
sun.shadow.camera.bottom = -70;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.bias = -0.0005;
scene.add(sun);

// Moon (secondary directional light at night)
const moon = new THREE.DirectionalLight(0x8aa0ff, 0);
moon.position.set(-30, 40, -20);
scene.add(moon);

// ============================================================
// GROUND, ROADS, RIVER, FOREST
// ============================================================
const matGrass = new THREE.MeshLambertMaterial({color:0x4a8b3a});
const matRoad  = new THREE.MeshLambertMaterial({color:0x5a4a3a});
const matWater = new THREE.MeshLambertMaterial({color:0x2a4a8a, transparent:true, opacity:0.85});
const matWood  = new THREE.MeshLambertMaterial({color:0x6a3a1a});
const matStone = new THREE.MeshLambertMaterial({color:0x9a9a9a});
const matBrick = new THREE.MeshLambertMaterial({color:0xc78a5a});

const ground = new THREE.Mesh(new THREE.PlaneGeometry(200,200), matGrass);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Town square plaza
const plaza = new THREE.Mesh(new THREE.CircleGeometry(11, 32), new THREE.MeshLambertMaterial({color:0xb8a888}));
plaza.rotation.x = -Math.PI/2;
plaza.position.y = 0.02;
plaza.receiveShadow = true;
scene.add(plaza);

// Roads
function addRoad(x,z,w,d,rot=0){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d), matRoad);
  m.rotation.x = -Math.PI/2;
  m.rotation.z = rot;
  m.position.set(x,0.03,z);
  m.receiveShadow = true;
  scene.add(m);
}
addRoad(0,0,3,80, 0);     // N-S
addRoad(0,0,80,3, 0);     // E-W
addRoad(-15,-10, 30, 3, 0);

function makeBuilding(key, def){
  const g = new THREE.Group();
  g.position.set(def.x, 0, def.z);
  // Walls
  const wallMat = new THREE.MeshLambertMaterial({
    color: def.color,
    transparent: !!def.glass,
    opacity: def.glass ? 0.45 : 1
  });
  const walls = new THREE.Mesh(new THREE.BoxGeometry(def.w, def.h, def.d), wallMat);
  walls.position.y = def.h/2;
  walls.castShadow = true;
  walls.receiveShadow = true;
  g.add(walls);

  // Sloped roof: triangular prism made from a box rotated + scaled
  const roofMat = new THREE.MeshLambertMaterial({color:def.roof});
  const roofGeom = new THREE.ConeGeometry(Math.max(def.w, def.d)*0.78, def.h*0.55, 4);
  const roof = new THREE.Mesh(roofGeom, roofMat);
  roof.position.y = def.h + def.h*0.275;
  roof.rotation.y = Math.PI/4;
  roof.castShadow = true;
  g.add(roof);

  // Door
  const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 0.1), matWood);
  door.position.set(0, 1.1, def.d/2 + 0.05);
  g.add(door);

  // Windows (simple lit panels for night)
  const winMat = new THREE.MeshBasicMaterial({color:0xffd97a});
  const winData = [];
  for(let i=-1;i<=1;i+=2){
    const w = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), winMat);
    w.position.set(i*def.w*0.3, def.h*0.55, def.d/2 + 0.06);
    g.add(w);
    winData.push(w);
  }
  for(let i=-1;i<=1;i+=2){
    const w = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), winMat);
    w.position.set(i*def.w*0.5 + 0.001, def.h*0.55, 0);
    w.rotation.y = Math.PI/2;
    g.add(w);
    winData.push(w);
  }
  g.userData.windows = winData;

  // Special features
  if(def.bell){
    const tower = new THREE.Mesh(new THREE.BoxGeometry(1.4,1.8,1.4), wallMat);
    tower.position.set(0, def.h+1, 0); g.add(tower);
    const bell = new THREE.Mesh(new THREE.SphereGeometry(0.35,8,6), new THREE.MeshLambertMaterial({color:0xc8a040}));
    bell.position.set(0, def.h+1, 0); g.add(bell);
  }
  if(def.flag){
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,6,6), matStone);
    pole.position.set(def.w/2-0.5, def.h+3, def.d/2-0.5); g.add(pole);
    const flag = new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.7), new THREE.MeshLambertMaterial({color:0xc62828, side:THREE.DoubleSide}));
    flag.position.set(def.w/2-0.5+0.6, def.h+5, def.d/2-0.5);
    g.add(flag); g.userData.flag = flag;
  }
  if(def.cross){
    const cv = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.4, 0.1), new THREE.MeshLambertMaterial({color:0xc62828}));
    cv.position.set(0, def.h*0.6, def.d/2+0.07); g.add(cv);
    const ch = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 0.1), new THREE.MeshLambertMaterial({color:0xc62828}));
    ch.position.set(0, def.h*0.6, def.d/2+0.07); g.add(ch);
  }
  if(def.neon){
    const sign = new THREE.Mesh(new THREE.BoxGeometry(3, 0.7, 0.15), new THREE.MeshBasicMaterial({color:0xff5f8a}));
    sign.position.set(0, def.h*0.85, def.d/2+0.1);
    g.add(sign); g.userData.neon = sign;
  }
  if(def.tools){
    for(let i=0;i<4;i++){
      const part = new THREE.Mesh(new THREE.BoxGeometry(0.6+Math.random()*0.4, 0.4, 0.6+Math.random()*0.4), matStone);
      part.position.set(def.w/2 + 1 + (i-1)*0.9, 0.3, def.d/2 - 1 + (i%2)*0.8);
      part.castShadow = true; g.add(part);
    }
    // Car silhouette outside
    const car = new THREE.Mesh(new THREE.BoxGeometry(2.6,1.0,1.4), new THREE.MeshLambertMaterial({color:0x3a6abd}));
    car.position.set(def.w/2+3, 0.5, 0); car.castShadow = true; g.add(car);
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.7,1.3), new THREE.MeshLambertMaterial({color:0x3a6abd}));
    top.position.set(def.w/2+3, 1.35, 0); g.add(top);
  }
  if(def.glass){
    // Plants visible through glass walls
    for(let i=0;i<6;i++){
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.2,5), new THREE.MeshLambertMaterial({color:0x2c6a2a}));
      stem.position.set((Math.random()-0.5)*def.w*0.7, 0.6, (Math.random()-0.5)*def.d*0.7);
      g.add(stem);
      const bud = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 5), new THREE.MeshLambertMaterial({color:[0xff8aa0,0xffd54f,0xb04aff,0xff7043][i%4]}));
      bud.position.set(stem.position.x, 1.2, stem.position.z);
      g.add(bud);
    }
  }
  if(def.light){
    // Lighthouse: extra stripe
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(def.w*0.55, def.w*0.55, 0.4, 16), new THREE.MeshLambertMaterial({color:0xc62828}));
    stripe.position.y = def.h*0.55; g.add(stripe);
    const stripe2 = stripe.clone(); stripe2.position.y = def.h*0.85; g.add(stripe2);
    const lampMat = new THREE.MeshBasicMaterial({color:0xffeebb});
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.9, 10, 8), lampMat);
    lamp.position.y = def.h + 0.6; g.add(lamp);
    const point = new THREE.PointLight(0xfff1c0, 1.4, 50);
    point.position.y = def.h + 0.6; g.add(point);
    g.userData.beacon = point;
  }
  if(def.twisted){
    g.rotation.y = -0.18;
    walls.rotation.z = 0.06;
    roof.material = new THREE.MeshLambertMaterial({color:0x6a1c8a});
    // Mushroom out front
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,1.0,8), new THREE.MeshLambertMaterial({color:0xeeebd6}));
    stem.position.set(0, 0.5, def.d/2 + 1.5); g.add(stem);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.7, 10, 6, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshLambertMaterial({color:0xc62828}));
    cap.position.set(0, 1.0, def.d/2 + 1.5); g.add(cap);
    // Spots
    for(let i=0;i<4;i++){
      const spot = new THREE.Mesh(new THREE.SphereGeometry(0.12,6,5), new THREE.MeshLambertMaterial({color:0xffffff}));
      spot.position.set(Math.cos(i)*0.4, 1.15, def.d/2 + 1.5 + Math.sin(i)*0.4);
      g.add(spot);
    }
  }

  scene.add(g);
  return g;
}

function makeHumanoid(data){
  const g = new THREE.Group();
  const skinMat = new THREE.MeshLambertMaterial({color:data.skin});
  const bodyMat = new THREE.MeshLambertMaterial({color:data.body});
  const accMat  = new THREE.MeshLambertMaterial({color:data.accent});
  const pantsMat= new THREE.MeshLambertMaterial({color:0x2a2a3a});

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.8, 0.3), bodyMat);
  torso.position.y = 1.1;
  torso.castShadow = true; g.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), skinMat);
  head.position.y = 1.7;
  head.castShadow = true; g.add(head);

  // Eyes
  const eyeMat = new THREE.MeshBasicMaterial({color:0x000000});
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.03,5,4), eyeMat);
  eL.position.set(-0.07, 1.72, 0.2); g.add(eL);
  const eR = eL.clone(); eR.position.x = 0.07; g.add(eR);

  // Arms (separate so we can swing them)
  const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.65, 6), bodyMat);
  armL.position.set(-0.34, 1.05, 0); armL.castShadow = true; g.add(armL);
  const armR = armL.clone(); armR.position.x = 0.34; g.add(armR);

  // Legs
  const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.75, 6), pantsMat);
  legL.position.set(-0.14, 0.375, 0); legL.castShadow = true; g.add(legL);
  const legR = legL.clone(); legR.position.x = 0.14; g.add(legR);

  // Accessories per role
  const acc = data.hat;
  if(acc === 'chef'){
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.25, 8), accMat);
    cyl.position.y = 2.0; g.add(cyl);
    const top = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), accMat);
    top.position.y = 2.2; g.add(top);
    // Apron (white panel on torso)
    const ap = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.6, 0.05), accMat);
    ap.position.set(0, 1.0, 0.18); g.add(ap);
  } else if(acc === 'cowboy'){
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.05, 12), bodyMat);
    brim.position.y = 1.92; g.add(brim);
    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.22, 10), bodyMat);
    crown.position.y = 2.04; g.add(crown);
    // Sheriff star
    const star = new THREE.Mesh(new THREE.OctahedronGeometry(0.12, 0), accMat);
    star.position.set(-0.18, 1.3, 0.16); star.scale.z = 0.3; g.add(star);
  } else if(acc === 'leaf'){
    // Floppy hat
    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.32, 0.25, 8), accMat);
    hat.position.y = 2.0; g.add(hat);
    const stem = new THREE.Mesh(new THREE.SphereGeometry(0.05, 5, 4), accMat);
    stem.position.y = 2.13; g.add(stem);

    // Mustache
    const ms = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.04, 0.04), new THREE.MeshLambertMaterial({color:0x111111}));
    ms.position.set(0, 1.62, 0.21); g.add(ms);
    // Apron stripe
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.05), accMat);
    stripe.position.set(0, 1.0, 0.16); g.add(stripe);
  } else if(acc === 'glasses'){
    const f1 = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.08, 8), new THREE.MeshBasicMaterial({color:0x000000, side:THREE.DoubleSide}));
    f1.position.set(-0.07, 1.72, 0.22); g.add(f1);
    const f2 = f1.clone(); f2.position.x = 0.07; g.add(f2);
    // Pencil-bun: small sphere on top
    const bun = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 7), new THREE.MeshLambertMaterial({color:0x6a4a2a}));
    bun.position.y = 1.95; g.add(bun);
  } else if(acc === 'cap'){
    const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 10), accMat);
    cap.position.y = 1.93; g.add(cap);
    const peak = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.18), accMat);
    peak.position.set(0, 1.92, 0.18); g.add(peak);
    // Wrench in hand
    const wrench = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.4, 0.07), matStone);
    wrench.position.set(0.4, 0.85, 0.0); g.add(wrench);
  } else if(acc === 'cross'){
    // White coat (already body), red cross armband
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.14, 0.18), accMat);
    arm.position.set(-0.34, 1.18, 0); g.add(arm);
    // Bun
    const bun = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 7), new THREE.MeshLambertMaterial({color:0x6a4a2a}));
    bun.position.set(0, 1.92, -0.05); g.add(bun);
  } else if(acc === 'top'){
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.04, 12), bodyMat);
    brim.position.y = 1.92; g.add(brim);
    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.21, 0.21, 0.45, 12), bodyMat);
    top.position.y = 2.16; g.add(top);
    const band = new THREE.Mesh(new THREE.CylinderGeometry(0.215, 0.215, 0.06, 12), accMat);
    band.position.y = 1.97; g.add(band);
  } else if(acc === 'beret'){
    const beret = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.28, 0.1, 12), accMat);
    beret.position.y = 1.92; beret.rotation.z = 0.18; g.add(beret);
    const stub = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 5), accMat);
    stub.position.set(0.1, 1.99, 0); g.add(stub);
    // Paint palette
    const pal = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.04, 12), new THREE.MeshLambertMaterial({color:0xc8a070}));
    pal.position.set(0.45, 0.95, 0.1); pal.rotation.x = Math.PI/2; g.add(pal);
  } else if(acc === 'fedora'){
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.04, 12), bodyMat);
    brim.position.y = 1.92; g.add(brim);
    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.22, 10), bodyMat);
    crown.position.y = 2.05; g.add(crown);
    // Notepad
    const pad = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.22, 0.04), accMat);
    pad.position.set(0.4, 0.95, 0.1); g.add(pad);
  } else if(acc === 'rain'){
    // Hooded slicker — extra band
    const hood = new THREE.Mesh(new THREE.SphereGeometry(0.27, 10, 8, 0, TAU, 0, Math.PI/1.6), bodyMat);
    hood.position.y = 1.78; g.add(hood);
    // Fishing rod
    const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.6, 5), accMat);
    rod.position.set(0.45, 1.4, 0.0); rod.rotation.z = -0.6; g.add(rod);
  } else if(acc === 'witch'){
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.04, 12), accMat);
    brim.position.y = 1.93; g.add(brim);
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.7, 12), accMat);
    cone.position.y = 2.28; cone.rotation.z = 0.12; g.add(cone);
    // Cloak: extra long torso
    const cloak = new THREE.Mesh(new THREE.ConeGeometry(0.55, 1.5, 8, 1, true), bodyMat);
    cloak.position.y = 0.8; g.add(cloak);
  }

  // Speech bubble (HTML)
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.display = 'none';
  document.getElementById('ui').appendChild(bubble);
  g.userData.bubble = bubble;
  g.userData.bubbleTimer = 0;

  scene.add(g);

  // Store joints for animation
  g.userData.armL = armL;
  g.userData.armR = armR;
  g.userData.legL = legL;
  g.userData.legR = legR;
  g.userData.head = head;
  return g;
}

// RELATIONSHIP MATRIX 12x12
// ============================================================
const N = agents.length;
const REL = Array.from({length:N},()=>new Array(N).fill(0));
function adjustRel(i, j, d){
  if(i===j) return;
  REL[i][j] = Math.max(-100, Math.min(100, REL[i][j] + d));
  REL[j][i] = Math.max(-100, Math.min(100, REL[j][i] + d));
}
// Initial small randomness
for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
  const d = Math.round((Math.random()-0.5)*10);
  REL[i][j] = REL[j][i] = d;
}
// Some scripted starting biases
function biasPair(a,b,v){ const i=agentByName[a].i, j=agentByName[b].i; REL[i][j]=REL[j][i]=v; }

function updateSky(h){
  // h in 0..24
  // Color sky
  let sky;
  let sunI = 1.0, ambI = 0.32, hemiI = 0.55, fogColor;
  if(h < 5){ sky = 0x07091e; sunI = 0; ambI = 0.18; hemiI = 0.12; }
  else if(h < 7){ // dawn
    const t = (h-5)/2;
    sky = lerpColor(0x07091e, 0xff8aa0, t);
    sunI = t*0.8; ambI = 0.2 + t*0.15; hemiI = 0.2 + t*0.3;
  } else if(h < 17){ // day
    sky = 0x9adfff;
    sunI = 1.05; ambI = 0.4; hemiI = 0.7;
  } else if(h < 19){ // dusk
    const t = (h-17)/2;
    sky = lerpColor(0x9adfff, 0xff7a4a, t);
    sunI = 1.0 - t*0.7; ambI = 0.4 - t*0.18; hemiI = 0.7 - t*0.4;
  } else if(h < 21){ // twilight
    const t = (h-19)/2;
    sky = lerpColor(0xff7a4a, 0x14163a, t);
    sunI = 0.3 - t*0.3; ambI = 0.22; hemiI = 0.3 - t*0.18;
  } else { // night
    sky = 0x07091e; sunI = 0; ambI = 0.16; hemiI = 0.1;
  }
  scene.background = new THREE.Color(sky);
  scene.fog.color = new THREE.Color(sky);
  sun.intensity = sunI;
  ambient.intensity = ambI;
  hemi.intensity = hemiI;
  // Sun arc
  const sunAngle = ((h - 6) / 12) * Math.PI;
  sun.position.set(Math.cos(sunAngle)*70, Math.max(8, Math.sin(sunAngle)*60), Math.sin(sunAngle)*30);
  moon.intensity = (h>20 || h<5) ? 0.4 : 0;
  // Lamps glow at night
  const dim = (h<6 || h>19) ? 1.1 : 0;
  lampPosts.forEach(lp => {
    lp.userData.light.intensity = dim;
    lp.userData.bulb.material.color.setHex(dim>0 ? 0xfff5c0 : 0x6a6450);
  });
  // Windows glow at night
  for(const k in buildingMeshes){
    const wins = buildingMeshes[k].userData.windows;
    if(!wins) continue;
    const lit = (h<6 || h>18) ? 1 : 0.25;
    wins.forEach(w => w.material.color.setRGB(1*lit, 0.85*lit, 0.48*lit));
  }
}
function lerpColor(a, b, t){
  const ar = (a>>16)&255, ag=(a>>8)&255, ab=a&255;
  const br = (b>>16)&255, bg=(b>>8)&255, bb=b&255;
  const r = Math.round(ar+(br-ar)*t);
  const g = Math.round(ag+(bg-ag)*t);
  const bl = Math.round(ab+(bb-ab)*t);
  return (r<<16)|(g<<8)|bl;
}

function timePhaseLabel(h){
  if(h < 5) return 'Night';
  if(h < 7) return 'Dawn';
  if(h < 11) return 'Morning';
  if(h < 14) return 'Midday';
  if(h < 17) return 'Afternoon';
  if(h < 19) return 'Dusk';
  if(h < 21) return 'Evening';
  return 'Night';
}

function currentSchedule(agent){
  const s = SCHEDULES[agent.name];
  if(!s) return s;
  let cur = s[s.length-1];
  for(let i=0;i<s.length;i++){
    if(sim.hour >= s[i].h) cur = s[i]; else break;
  }
  return cur;
}

function moveTowardTarget(agent, dt){
  const dx = agent.target.x - agent.mesh.position.x;
  const dz = agent.target.z - agent.mesh.position.z;
  const dist = Math.hypot(dx, dz);
  if(dist < 0.18){
    agent.walking = false;
    return false;
  }
  agent.walking = true;
  const speed = 3.4;
  const v = Math.min(dist, speed*dt);
  agent.mesh.position.x += (dx/dist)*v;
  agent.mesh.position.z += (dz/dist)*v;
  agent.mesh.rotation.y = Math.atan2(dx, dz);
  return true;
}

function animateAgent(agent, dt){
  const u = agent.mesh.userData;
  if(agent.walking){
    const t = Date.now()*0.012;
    u.legL.rotation.x = Math.sin(t)*0.7;
    u.legR.rotation.x = -Math.sin(t)*0.7;
    u.armL.rotation.x = -Math.sin(t)*0.5;
    u.armR.rotation.x = Math.sin(t)*0.5;
  } else {
    u.legL.rotation.x *= 0.85;
    u.legR.rotation.x *= 0.85;
    u.armL.rotation.x *= 0.85;
    u.armR.rotation.x *= 0.85;
  }
  // Bubble fade-out
  if(agent.speakingTimer > 0){
    agent.speakingTimer -= dt;
    if(agent.speakingTimer <= 0){
      u.bubble.style.display = 'none';
      agent.speakingTo = null;
    }
  }
}

function setSpeech(agent, text, sec=3){
  const u = agent.mesh.userData;
  u.bubble.textContent = text;
  u.bubble.style.display = 'block';
  agent.speakingTimer = sec;
}

function pickTarget(agent){
  const sched = currentSchedule(agent);
  if(!sched){ return; }
  const loc = locOf(sched.l);
  const jitterX = (agent.i*0.7 % 3 - 1) * 0.8;
  const jitterZ = (agent.i*1.3 % 3 - 1) * 0.8;
  agent.target = {x: loc.x + jitterX, z: loc.z + jitterZ};
  agent.locKey = sched.l;
  agent.activity = sched.a;
}

const chronicleEl = document.getElementById('chronicleLog');
const chronicleEvents = [];
function fmtTime(h){
  let H = Math.floor(h);
  const m = Math.floor((h - H) * 60);
  const ampm = H < 12 ? 'am' : 'pm';
  let H12 = H % 12; if(H12 === 0) H12 = 12;
  return `${H12}:${m.toString().padStart(2,'0')}${ampm}`;
}
function logEvent(text, klass=''){
  const ev = {t:fmtTime(sim.hour), text, day:sim.day};
  chronicleEvents.push(ev);
  const div = document.createElement('div');
  div.className = 'evt' + (klass ? ' '+klass : '');
  div.innerHTML = `<span class="t">D${sim.day} ${ev.t}</span> ${text}`;
  chronicleEl.insertBefore(div, chronicleEl.firstChild);
  while(chronicleEl.children.length > 80) chronicleEl.removeChild(chronicleEl.lastChild);
}

function pickTemplate(activity){
  const list = ACTIVITY_TEMPLATES[activity];
  if(!list || !list.length) return null;
  return list[Math.floor(Math.random()*list.length)];
}
function fillTemplate(tpl, agent){
  let t = tpl.replace(/\{N\}/g, agent.name);
  t = t.replace(/\{n\}/g, Math.floor(2 + Math.random()*18));
  if(t.includes('{x}')){
    const others = agents.filter(a => a !== agent && !a.retired);
    const o = others[Math.floor(Math.random()*others.length)];
    t = t.replace(/\{x\}/g, o.name);
  }
  if(t.includes('{y}')){
    const others = agents.filter(a => a !== agent && !a.retired);
    const o = others[Math.floor(Math.random()*others.length)];
    t = t.replace(/\{y\}/g, o.name);
  }
  return t;
}

// PROXIMITY CHATTER + SOCIAL TICK
// ============================================================
const recentChatPairs = new Map(); // "i_j" → cooldown
function tickSocial(dt){
  for(const [k,v] of recentChatPairs){
    const nv = v - dt;
    if(nv <= 0) recentChatPairs.delete(k); else recentChatPairs.set(k, nv);
  }
  for(let i=0;i<N;i++){
    const a = agents[i];
    if(a.retired) continue;
    if(a.walking) continue;
    if(a.speakingTimer > 0) continue;
    for(let j=i+1;j<N;j++){
      const b = agents[j];
      if(b.retired) continue;
      if(b.walking) continue;
      if(b.speakingTimer > 0) continue;
      const dx = a.mesh.position.x - b.mesh.position.x;
      const dz = a.mesh.position.z - b.mesh.position.z;
      const d = Math.hypot(dx, dz);
      if(d > 3.5) continue;
      const key = i+'_'+j;
      if(recentChatPairs.has(key)) continue;
      // Decide chat type
      const rel = REL[i][j];
      let type;
      if(rel > 70) type = Math.random()<0.4 ? 'flirt' : 'greet';
      else if(rel > 30) type = Math.random()<0.5 ? 'gossip' : 'lunch';
      else if(rel < -40) type = Math.random()<0.4 ? 'argue' : 'gossip';
      else type = ['greet','lunch','business','gossip'][Math.floor(Math.random()*4)];
      const lines = DIALOG[type];
      let line = lines[Math.floor(Math.random()*lines.length)];
      if(line.includes('{x}')){
        const others = agents.filter(x => x!==a && x!==b && !x.retired);
        const o = others[Math.floor(Math.random()*others.length)];
        line = line.replace('{x}', o.name);
      }
      setSpeech(a, line, 3.0);
      a.speakingTo = b;
      // Relationship effects
      if(type === 'flirt') adjustRel(i,j,4);
      else if(type === 'argue') adjustRel(i,j,-6);
      else if(type === 'gossip') adjustRel(i,j,2);
      else adjustRel(i,j,1);
      recentChatPairs.set(key, 12);
      // Sometimes log it
      if(Math.random() < 0.35){
        const klass = type==='flirt'?'romance':(type==='argue'?'drama':'');
        logEvent(`${a.name} (to ${b.name}): "${line}"`, klass);
      }
      break;
    }
  }
}

let lastHourLogged = -1;
function tickHourlyEvents(){
  const H = Math.floor(sim.hour);
  if(H === lastHourLogged) return;
  lastHourLogged = H;
  // For each agent, generate ~2-3 activity events per hour distributed
  for(const a of agents){
    if(a.retired) continue;
    if(Math.random() < 0.85){
      const tpl = pickTemplate(a.activity);
      if(tpl){
        const text = fillTemplate(tpl, a);
        const isNight = (H<6 || H>=21);
        if(!(a.activity === 'sleep' && Math.random()>0.05)){
          logEvent(text);
        }
      }
    }
  }
  // Pick the schedule for new hour
  for(const a of agents) pickTarget(a);
}

const particleSystems = [];
function spawnParticles(x,y,z,color,count=40){
  const geom = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const vel = [];
  for(let i=0;i<count;i++){
    pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
    vel.push({vx:(Math.random()-0.5)*4, vy:Math.random()*5+2, vz:(Math.random()-0.5)*4});
  }
  geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({color, size:0.25, transparent:true, opacity:0.9});
  const pts = new THREE.Points(geom, mat);
  scene.add(pts);
  particleSystems.push({pts, vel, life:2.4});
}
function tickParticles(dt){
  for(let p=particleSystems.length-1;p>=0;p--){
    const ps = particleSystems[p];
    ps.life -= dt;
    const arr = ps.pts.geometry.attributes.position.array;
    for(let i=0;i<ps.vel.length;i++){
      arr[i*3] += ps.vel[i].vx*dt;
      arr[i*3+1] += ps.vel[i].vy*dt;
      arr[i*3+2] += ps.vel[i].vz*dt;
      ps.vel[i].vy -= 8*dt;
    }
    ps.pts.geometry.attributes.position.needsUpdate = true;
    ps.pts.material.opacity = Math.max(0, ps.life/2.4);
    if(ps.life <= 0){
      scene.remove(ps.pts);
      particleSystems.splice(p,1);
    }
  }
}

const sagaState = {dayDone: {}, electionResolved:false};

function fireSagaEventsForDay(day){
  if(sagaState.dayDone[day]) return;
  sagaState.dayDone[day] = true;
  const events = SAGA_PLAN[day] || [];
  events.forEach((ev, idx) => {
    const delay = 8000 + idx*22000;
    setTimeout(() => {
      if(ev==='intro') logEvent(`🌄 Day 1 in Oakwood Hollow begins. The kettle whistles. The clock tower chimes.`, 'civic');
      else if(ev==='gossip') dramaGossip();
      else if(ev==='affair') dramaAffair();
      else if(ev==='barfight') dramaBarFight();
      else if(ev==='election_start') dramaElection();
      else if(ev==='witchtrial') dramaWitchTrial();
      else if(ev==='festival') dramaFestival();
      else if(ev==='retirement') dramaRetirement();
      else if(ev==='wedding_check'){
        // Check natural wedding eligibility
        let ok = false;
        for(let i=0;i<N;i++)for(let j=i+1;j<N;j++) if(REL[i][j] >= 90) ok = true;
        if(ok) dramaWedding();
      } else if(ev==='election_results'){
        if(!sagaState.electionResolved && sim.electionRunning){
          sagaState.electionResolved = true;
          let winner = 'Henry', topV = -1;
          for(const k in sim.votes){ if(sim.votes[k] > topV){ topV = sim.votes[k]; winner = k; } }
          logEvent(`🏛 ELECTION RESULT: ${winner} wins with ${topV} votes! Henry: ${sim.votes.Henry}, Cassidy: ${sim.votes.Cassidy}, Bob: ${sim.votes.Bob}.`, 'civic');
          sim.winner = winner;
          if(sim.banners){ sim.banners.forEach(b=>scene.remove(b)); }
        }
      }
      else if(ev==='finale') triggerFinale();
    }, delay);
  });
}

function triggerFinale(){
  if(sim.finaleTriggered) return;
  sim.finaleTriggered = true;
  logEvent(`🌠 DAY 14: Comet sighted over the lighthouse! The Mayor's scandal breaks. Festival begins.`, 'drama');
  dramaFestival();
  setTimeout(()=>dramaWedding(true), 6000);
  setTimeout(()=>{
    if(!sagaState.electionResolved){
      sagaState.electionResolved = true;
      let winner = 'Henry', topV = -1;
      for(const k in sim.votes){ if(sim.votes[k] > topV){ topV = sim.votes[k]; winner = k; } }
      if(topV<=0){ winner = 'Cassidy'; sim.votes.Cassidy = 1; }
      sim.winner = winner;
      logEvent(`🏛 FINAL TALLY: ${winner} wins!`, 'civic');
    }
  }, 9000);
  setTimeout(()=>spawnParticles(0,8,0,0x9adfff,200), 11000);
  setTimeout(showEndScreen, 22000);
}

// ============================================================
// END SCREEN
// ============================================================
function showEndScreen(){
  if(sim.endActive) return;
  sim.endActive = true;
  const ep = document.getElementById('endText');
  // Build narrative
  const lines = [];
  if(sim.marriedPair) lines.push(`💒 ${sim.marriedPair[0]} married ${sim.marriedPair[1]} beneath the harvest lanterns.`);
  if(sim.winner){
    if(sim.winner === 'Henry') lines.push(`🏛 Henry held onto the mayor's office — for now.`);
    else lines.push(`🏛 Henry lost the election to ${sim.winner}. The town hall has a new keeper.`);
  }
  // Top relationship and worst
  let bestRel = -101, bestPair = null, worstRel = 101, worstPair = null;
  for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
    if(REL[i][j] > bestRel){ bestRel = REL[i][j]; bestPair = [i,j]; }
    if(REL[i][j] < worstRel){ worstRel = REL[i][j]; worstPair = [i,j]; }
  }
  if(bestPair) lines.push(`🌟 Closest bond: ${agents[bestPair[0]].name} & ${agents[bestPair[1]].name} (${bestRel}).`);
  if(worstPair) lines.push(`⚡ Bitterest feud: ${agents[worstPair[0]].name} vs ${agents[worstPair[1]].name} (${worstRel}).`);
  lines.push(`🎨 Iris's masterpiece sold for ${4000+Math.floor(Math.random()*3000)}g.`);
  if(agentByName['Luna'] && agentByName['Luna'].retired) lines.push(`🌲 Luna disappeared into the forest.`);
  else lines.push(`🌙 Luna brewed something new in the cottage.`);
  lines.push(`🔍 Bob solved the mystery of the missing wagon.`);
  lines.push(`📰 Jamal's column ran on page one.`);
  ep.innerHTML = lines.map(l=>`<div>${l}</div>`).join('');
  document.getElementById('endScreen').style.display = 'flex';
  let countdown = 12;
  const cd = document.getElementById('endCountdown');
  cd.textContent = `Reshuffling traits in ${countdown}s…`;
  const iv = setInterval(()=>{
    countdown--;
    cd.textContent = `Reshuffling traits in ${countdown}s…`;
    if(countdown <= 0){ clearInterval(iv); restartSaga(); }
  }, 1000);
}

function restartSaga(){
  // Shuffle traits
  const allTraits = ['warm','gossipy','stern','lonely','curious','awkward','charismatic','secretive','idealistic','anxious','gruff','kind-hearted','precise','overworked','ambitious','vain','dreamy','melodramatic','nosy','witty','quiet','philosophical','enigmatic','mischievous','reckless','prudent','jolly','grim'];
  agents.forEach(a => {
    a.traits = [];
    for(let k=0;k<2;k++) a.traits.push(allTraits[Math.floor(Math.random()*allTraits.length)]);
    a.retired = false;
    a.secrets = [];
    a.voteTarget = null;
    a.name = AGENT_DATA[a.i].n;
    a.role = AGENT_DATA[a.i].role;
  });
  for(let i=0;i<N;i++)for(let j=0;j<N;j++) REL[i][j] = (i===j?0:Math.round((Math.random()-0.5)*10));
  sim.day = 1;
  sim.hour = 6;
  sim.realT = 0;
  sim.electionRunning = false;
  sim.votes = {Henry:0, Cassidy:0, Bob:0};
  sim.marriedPair = null;
  sim.winner = null;
  sim.finaleTriggered = false;
  sim.endActive = false;
  sagaState.dayDone = {};
  sagaState.electionResolved = false;
  lastHourLogged = -1;
  chronicleEl.innerHTML = '';
  document.getElementById('endScreen').style.display = 'none';
  if(sim.banners){ sim.banners.forEach(b=>scene.remove(b)); sim.banners=null; }
  logEvent(`🌄 New saga begins in Oakwood Hollow with reshuffled fates.`, 'civic');
  refreshAgentList();
}

// ============================================================
// DIRECTOR CAMERA
// ============================================================
const dirCam = {
  target: new THREE.Vector3(0, 2, 0),
  desired: new THREE.Vector3(36, 32, 50),
  lookAt: new THREE.Vector3(0, 2, 0),
  followAgent: null,
  ensemble: false,
  zoomLevel: 1.0
};

function updateDirector(dt){
  // If a major event is in progress (>=4 agents in event), pull back ensemble
  let inEvent = agents.filter(a=>a.inProcession && !a.retired).length;
  let speakingAgent = null;
  let mostRecentT = -Infinity;
  for(const a of agents){
    if(a.retired) continue;
    if(a.speakingTimer > 0 && a.speakingTimer > mostRecentT){
      mostRecentT = a.speakingTimer; speakingAgent = a;
    }
  }
  if(inEvent >= 4){
    // Pull back to ensemble at square
    dirCam.desired.set(0, 28, 36);
    dirCam.lookAt.set(0, 2, 0);
    document.getElementById('followInfo').textContent = `📹 Ensemble shot`;
  } else if(speakingAgent){
    const p = speakingAgent.mesh.position;
    dirCam.desired.set(p.x + 5, 5.5, p.z + 7);
    dirCam.lookAt.set(p.x, 1.6, p.z);
    document.getElementById('followInfo').textContent = `📹 Following ${speakingAgent.name}`;
  } else {
    // Slow orbit
    const t = sim.realT * 0.05;
    dirCam.desired.set(Math.cos(t)*42, 26, Math.sin(t)*42);
    dirCam.lookAt.set(0, 2, 0);
    document.getElementById('followInfo').textContent = `📹 Wide shot of Oakwood Hollow`;
  }
  // Lerp camera
  camera.position.lerp(dirCam.desired, Math.min(1, dt*1.2));
  dirCam.target.lerp(dirCam.lookAt, Math.min(1, dt*1.6));
  camera.lookAt(dirCam.target);
}

// ============================================================
// HUD / UI
// ============================================================
const hudDay = document.getElementById('hudDay');
const hudTime = document.getElementById('hudTime');
const hudPhase = document.getElementById('hudPhase');
const hudMood = document.getElementById('hudMood');
const agentListEl = document.getElementById('agentList');

function refreshAgentList(){
  agentListEl.innerHTML = '';
  agents.forEach(a => {
    if(a.retired) return;
    const div = document.createElement('div');
    div.className = 'agentRow';
    div.innerHTML = `<span class="swatch" style="background:#${a.body.toString(16).padStart(6,'0')}"></span>${a.name} — ${a.role||''}`;
    div.title = `Traits: ${a.traits.join(', ')}`;
    agentListEl.appendChild(div);
  });
}
refreshAgentList();

function updateHUD(){
  hudDay.textContent = sim.day;
  hudTime.textContent = fmtTime(sim.hour);
  hudPhase.textContent = timePhaseLabel(sim.hour);
  hudMood.textContent = sim.mood;
}

// Place location labels in HTML overlay
const labelLayer = document.getElementById('labelLayer');
const labels = {};
for(const k in BUILDINGS){
  const el = document.createElement('div');
  el.className = 'locLabel';
  el.textContent = BUILDINGS[k].label;
  labelLayer.appendChild(el);
  labels[k] = {el, x:BUILDINGS[k].x, y:BUILDINGS[k].h+1.5, z:BUILDINGS[k].z};
}

const _v = new THREE.Vector3();
function projectLabels(){
  for(const k in labels){
    const L = labels[k];
    _v.set(L.x, L.y, L.z).project(camera);
    if(_v.z < -1 || _v.z > 1){ L.el.style.display='none'; continue; }
    L.el.style.display = 'block';
    const sx = (_v.x*0.5+0.5)*window.innerWidth;
    const sy = (-_v.y*0.5+0.5)*window.innerHeight;
    L.el.style.left = sx+'px';
    L.el.style.top = sy+'px';
  }
  // Bubbles
  for(const a of agents){
    if(a.speakingTimer > 0){
      _v.set(a.mesh.position.x, 2.4, a.mesh.position.z).project(camera);
      const sx = (_v.x*0.5+0.5)*window.innerWidth;
      const sy = (-_v.y*0.5+0.5)*window.innerHeight;
      a.mesh.userData.bubble.style.left = sx + 'px';
      a.mesh.userData.bubble.style.top = sy + 'px';
    }
  }
}

// ============================================================
// RELATIONSHIP MATRIX VIEW
// ============================================================
const relMatrixEl = document.getElementById('relMatrix');
const toggleBtn = document.getElementById('toggleMatrix');
let matrixVisible = false;
toggleBtn.addEventListener('click', () => {
  matrixVisible = !matrixVisible;
  if(matrixVisible){
    toggleBtn.style.bottom = '180px';
    toggleBtn.textContent = 'Hide relations ▼';
    renderMatrix();
    relMatrixEl.style.display = 'block';
  } else {
    toggleBtn.style.bottom = '8px';
    toggleBtn.textContent = 'Show relations ▲';
    relMatrixEl.style.display = 'none';
  }
});
function renderMatrix(){
  let html = '<table style="border-collapse:collapse;color:#ccc"><tr><td></td>';
  agents.forEach(a => html += `<td style="padding:1px 3px;color:#9aa6e6">${a.name.slice(0,3)}</td>`);
  html += '</tr>';
  agents.forEach((a,i) => {
    html += `<tr><td style="padding:1px 3px;color:#9aa6e6">${a.name.slice(0,3)}</td>`;
    agents.forEach((b,j) => {
      const v = i===j ? '·' : REL[i][j];
      let col = '#666';
      if(v !== '·'){
        if(v > 30) col = '#7af07a';
        else if(v > 10) col = '#aef0ae';
        else if(v < -30) col = '#ff5a5a';
        else if(v < -10) col = '#ff9090';
        else col = '#ccc';
      }
      html += `<td style="padding:1px 3px;text-align:center;color:${col}">${v}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  relMatrixEl.innerHTML = html;
}

// ============================================================
// RIVER ANIMATION + CLOCK HAND
// ============================================================
let waterT = 0;
function tickWater(dt){
  waterT += dt;
  river.material.color.setHSL(0.6, 0.6, 0.32 + Math.sin(waterT*1.2)*0.04);
}
function tickClock(){
  if(clockTower.userData.hand){
    clockTower.userData.hand.rotation.z = -((sim.hour/12)*TAU);
  }
}

// Day banner
function showDayBanner(text){
  const el = document.getElementById('dayBanner');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(()=>{ el.style.opacity = '0'; }, 2200);
}

// ============================================================
// MAIN LOOP
// ============================================================
let prevDay = 1;
let lastT = performance.now();
let totalLoggedDay = 0;

// Kick off day 1 events
fireSagaEventsForDay(1);
showDayBanner('DAY 1 — Oakwood Hollow');

function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  if(sim.endActive){ renderer.render(scene, camera); return; }

  sim.realT += dt;
  // Time advance: 24 in-game hours per 180 real seconds → 24/180 hours per second
  sim.hour += dt * (24/180);
  if(sim.hour >= 24){
    sim.hour -= 24;
    sim.day += 1;
    if(sim.day <= SAGA_DAYS){
      showDayBanner(`DAY ${sim.day}`);
      fireSagaEventsForDay(sim.day);
    } else if(!sim.finaleTriggered){
      triggerFinale();
    }
  }
  updateSky(sim.hour);
  tickHourlyEvents();
  for(const a of agents){
    if(!a.retired){
      moveTowardTarget(a, dt);
      animateAgent(a, dt);
    }
  }
  tickSocial(dt);
  tickParticles(dt);
  tickWater(dt);
  tickClock();
  // Decay extreme rels slightly toward 0
  if(Math.random() < 0.005){
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      if(REL[i][j] > 0) REL[i][j] = REL[j][i] = Math.max(0, REL[i][j]-1);
      else if(REL[i][j] < 0) REL[i][j] = REL[j][i] = Math.min(0, REL[i][j]+1);
    }
  }
  // Check natural wedding trigger
  if(!sim.marriedPair && sim.day >= 8){
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      if(REL[i][j] >= 100 && !agents[i].retired && !agents[j].retired){
        dramaWedding(); break;
      }
    }
  }
  // Mood
  let posCount = 0, negCount = 0;
  for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
    if(REL[i][j] > 30) posCount++;
    else if(REL[i][j] < -20) negCount++;
  }
  if(negCount > posCount + 4) sim.mood = 'Tense';
  else if(posCount > negCount + 4) sim.mood = 'Warm';
  else sim.mood = 'Calm';

  updateDirector(dt);
  updateHUD();
  projectLabels();
  if(matrixVisible && Math.random() < 0.05) renderMatrix();
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);

// ============================================================
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

window.addEventListener('keydown', e => {
  if(e.code === 'Space'){ sim.paused = !sim.paused; }
});

// Initial population of bubbles
agents.forEach(a => setSpeech(a, 'Good morning!', 1.5));
logEvent(`�� The sun rose over Oakwood Hollow on Day 1.`, 'civic');
