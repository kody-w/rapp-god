<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Thane of Greystone — Five Realms (Demo 163)</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; color:#f3e6c1; font-family:"Times New Roman", Georgia, serif; }
  canvas { display:block; }
  .hud { position:absolute; pointer-events:none; user-select:none; }
  #worldBanner {
    top:18px; left:50%; transform:translateX(-50%);
    padding:10px 28px;
    background: linear-gradient(180deg, rgba(28,18,8,0.84), rgba(48,32,14,0.84));
    border:1.5px solid #c2a35a; border-radius:4px;
    text-align:center; color:#f5dc8a;
    letter-spacing:3px; font-size:20px; text-transform:uppercase;
    box-shadow:0 0 22px rgba(0,0,0,0.6);
    min-width:340px;
  }
  #worldBanner .sub { font-size:11px; letter-spacing:2px; color:#cfa658; margin-top:3px; font-style:italic; text-transform:none; }
  #stats {
    top:18px; left:18px; padding:10px 14px;
    background:rgba(18,12,4,0.78); border:1px solid #8c6a2c; border-radius:3px;
    font-size:13px; line-height:1.55; min-width:200px; color:#e8d28a;
  }
  #stats b { color:#f8e7a8; font-weight:normal; }
  #stats .lab { color:#a8843c; font-style:italic; font-size:11px; letter-spacing:2px; text-transform:uppercase; }
  #stamps {
    top:18px; right:18px; padding:10px 14px;
    background:rgba(18,12,4,0.78); border:1px solid #8c6a2c; border-radius:3px;
    font-size:12px; line-height:1.5; min-width:220px; color:#e0c878;
  }
  #stamps .row { display:flex; justify-content:space-between; gap:10px; }
  #stamps .row.hot b { color:#ffe5a0; }
  #stamps h4 { font-size:11px; letter-spacing:2px; color:#cfa658; font-style:italic; font-weight:normal; margin-bottom:4px; }
  #cast {
    bottom:140px; left:18px; max-width:340px;
    padding:10px 14px;
    background:rgba(18,12,4,0.74); border:1px solid #7a5824; border-radius:3px;
    font-size:12px; line-height:1.55; color:#dfc880;
  }
  #cast h3 { font-size:12px; letter-spacing:2px; color:#f1d17a; margin-bottom:4px; font-weight:normal; font-style:italic; }
  #cast .role { color:#a8853a; font-style:italic; }
  #chyron {
    bottom:18px; left:50%; transform:translateX(-50%);
    width:78%; max-width:1100px;
    padding:14px 26px;
    background:linear-gradient(180deg, rgba(20,12,4,0.86), rgba(40,26,10,0.86));
    border:1.5px solid #c2a35a; border-radius:3px;
    text-align:center; color:#f5dc8a;
    font-size:17px; letter-spacing:1.5px; font-style:italic;
    text-shadow:0 1px 0 #2a1a06;
  }
  #map {
    bottom:18px; right:18px; width:220px; height:150px;
    background:rgba(18,12,4,0.82); border:1px solid #8c6a2c; border-radius:3px; padding:6px;
  }
  #map svg { width:100%; height:100%; }
  #shotLabel {
    bottom:90px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:3px; color:#b89352; text-transform:uppercase;
    text-shadow:0 0 8px rgba(0,0,0,0.9);
  }
  #fade {
    position:absolute; inset:0; background:#000;
    opacity:0; pointer-events:none; transition:opacity 1.0s ease;
  }
  #fade.on { opacity:1; }
</style>
</head>
<body>
<!-- ROUND17_PORTAL v1 -->
<div id="worldBanner" class="hud">
  <div id="worldTitle">THE WILDS OF DUNDRACK</div>
  <div class="sub" id="worldSub">An old road through the misted pines</div>
</div>
<div id="stats" class="hud"></div>
<div id="stamps" class="hud"></div>
<div id="cast" class="hud"><h3>FEATURED CAST IN THIS REALM</h3><div id="castList"></div></div>
<div id="chyron" class="hud">A bard&rsquo;s tale of the road, sung at the next inn&hellip;</div>
<div id="shotLabel" class="hud"></div>
<div id="map" class="hud">
  <svg viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg">
    <line x1="30" y1="75" x2="80" y2="35" stroke="#7a5824" stroke-width="1.2"/>
    <line x1="30" y1="75" x2="80" y2="115" stroke="#7a5824" stroke-width="1.2"/>
    <line x1="80" y1="35" x2="140" y2="35" stroke="#7a5824" stroke-width="1.2"/>
    <line x1="80" y1="115" x2="190" y2="75" stroke="#7a5824" stroke-width="1.2"/>
    <line x1="140" y1="35" x2="190" y2="75" stroke="#7a5824" stroke-width="1.2"/>
    <circle id="node0" cx="30" cy="75" r="7" fill="#3e5a2c" stroke="#cfa658" stroke-width="1.4"/>
    <text x="30" y="95" text-anchor="middle" font-size="9" fill="#cfa658" font-family="Times New Roman">Wilds</text>
    <circle id="node1" cx="80" cy="35" r="7" fill="#806848" stroke="#cfa658" stroke-width="1.4"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" fill="#cfa658" font-family="Times New Roman">Greystone</text>
    <circle id="node2" cx="80" cy="115" r="7" fill="#1a1010" stroke="#cfa658" stroke-width="1.4"/>
    <text x="80" y="135" text-anchor="middle" font-size="9" fill="#cfa658" font-family="Times New Roman">Crypt</text>
    <circle id="node3" cx="140" cy="35" r="7" fill="#3a1810" stroke="#cfa658" stroke-width="1.4"/>
    <text x="140" y="22" text-anchor="middle" font-size="9" fill="#cfa658" font-family="Times New Roman">Tavern</text>
    <circle id="node4" cx="190" cy="75" r="7" fill="#5a4060" stroke="#cfa658" stroke-width="1.4"/>
    <text x="190" y="95" text-anchor="middle" font-size="9" fill="#cfa658" font-family="Times New Roman">Keep</text>
    <circle id="heroDot" cx="30" cy="75" r="4" fill="#f5dc8a" stroke="#000" stroke-width="0.6"/>
  </svg>
</div>
<div id="fade"></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
  'use strict';

  var T = window.THREE;

  // ============================================================
  // PERSISTENT MEMORY (cycles across reloads)
  // ============================================================
  var MEM_KEY = 'thane_quest_memory_v1';
  function loadMem(){
    try {
      var raw = localStorage.getItem(MEM_KEY);
      if (!raw) return null;
      var m = JSON.parse(raw);
      if (!m || typeof m.cycle !== 'number') return null;
      return m;
    } catch (e) { return null; }
  }
  function saveMem(m){
    try { localStorage.setItem(MEM_KEY, JSON.stringify(m)); } catch (e) {}
  }
  var mem = loadMem() || { cycle:0, level:1, gold:0, inventory:[], defeatedBosses:[] };
  if (!Array.isArray(mem.inventory)) mem.inventory = [];
  if (!Array.isArray(mem.defeatedBosses)) mem.defeatedBosses = [];
  mem.cycle = (mem.cycle | 0) + 1;
  if (mem.cycle % 3 === 0) mem.level = (mem.level | 0) + 1;
  saveMem(mem);

  // ============================================================
  // DOM REFS
  // ============================================================
  var elTitle  = document.getElementById('worldTitle');
  var elSub    = document.getElementById('worldSub');
  var elStats  = document.getElementById('stats');
  var elStamps = document.getElementById('stamps');
  var elCast   = document.getElementById('castList');
  var elChyron = document.getElementById('chyron');
  var elShot   = document.getElementById('shotLabel');
  var elFade   = document.getElementById('fade');
  var elDot    = document.getElementById('heroDot');
  var nodeCx   = [30, 80, 80, 140, 190];
  var nodeCy   = [75, 35, 115, 35, 75];

  // ============================================================
  // RENDERER / SCENE / CAMERA
  // ============================================================
  var scene = new T.Scene();
  scene.fog = new T.Fog(0xc0c8b0, 30, 220);
  var camera = new T.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 600);
  camera.position.set(0, 14, 36);
  camera.lookAt(0, 4, 0);
  var renderer = new T.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0xa0b0a0);
  document.body.appendChild(renderer.domElement);
  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============================================================
  // DISPOSABLE BOOK-KEEPING
  // ============================================================
  var DSP = { geom:[], mat:[], tex:[] };
  function disposeAll(){
    var i;
    for (i=0; i<DSP.geom.length; i++) { try { DSP.geom[i].dispose(); } catch(e){} }
    for (i=0; i<DSP.mat.length;  i++) { try { DSP.mat[i].dispose();  } catch(e){} }
    for (i=0; i<DSP.tex.length;  i++) { try { DSP.tex[i].dispose();  } catch(e){} }
    DSP.geom.length = 0; DSP.mat.length = 0; DSP.tex.length = 0;
    while (scene.children.length) {
      var ch = scene.children[0];
      scene.remove(ch);
    }
  }
  function gBox(w,h,d){ var g = new T.BoxGeometry(w,h,d); DSP.geom.push(g); return g; }
  function gCyl(rt,rb,h,r){ var g = new T.CylinderGeometry(rt,rb,h,r||10); DSP.geom.push(g); return g; }
  function gSph(r,a,b){ var g = new T.SphereGeometry(r,a||10,b||8); DSP.geom.push(g); return g; }
  function gCone(r,h,s){ var g = new T.ConeGeometry(r,h,s||8); DSP.geom.push(g); return g; }
  function gPlane(w,h){ var g = new T.PlaneGeometry(w,h); DSP.geom.push(g); return g; }
  function gTorus(r,t,a,b){ var g = new T.TorusGeometry(r,t,a||6,b||10); DSP.geom.push(g); return g; }
  function mat(c){ var m = new T.MeshLambertMaterial({ color:c }); DSP.mat.push(m); return m; }
  function matE(c,e,i){ var m = new T.MeshLambertMaterial({ color:c, emissive:e==null?c:e, emissiveIntensity:i==null?0.6:i }); DSP.mat.push(m); return m; }
  function matB(c){ var m = new T.MeshBasicMaterial({ color:c }); DSP.mat.push(m); return m; }

  // ============================================================
  // HELPERS
  // ============================================================
  function rnd(a,b){ return a + Math.random()*(b-a); }
  function pick(arr){ return arr[(Math.random()*arr.length)|0]; }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function lerp(a,b,t){ return a + (b-a)*t; }

  // ============================================================
  // CANVAS-TEXTURE LABEL (small sprite floating above featured)
  // ============================================================
  function makeLabel(text, sub){
    var c = document.createElement('canvas');
    c.width = 320; c.height = 96;
    var ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(20,12,4,0.78)';
    ctx.fillRect(0,0,320,96);
    ctx.strokeStyle = '#cfa658'; ctx.lineWidth = 3;
    ctx.strokeRect(2,2,316,92);
    ctx.fillStyle = '#f5dc8a';
    ctx.font = 'bold 26px "Times New Roman", serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, 160, sub ? 36 : 48);
    if (sub) {
      ctx.fillStyle = '#b89352';
      ctx.font = 'italic 16px "Times New Roman", serif';
      ctx.fillText(sub, 160, 68);
    }
    var tex = new T.CanvasTexture(c);
    tex.minFilter = T.LinearFilter;
    DSP.tex.push(tex);
    var m = new T.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false });
    DSP.mat.push(m);
    var s = new T.Sprite(m);
    s.scale.set(4.4, 1.32, 1);
    return s;
  }

  // ============================================================
  // CHARACTER BUILDER  (humanoid of cylinders + sphere)
  // ============================================================
  function makeChar(opts){
    opts = opts || {};
    var skin  = opts.skin  != null ? opts.skin  : 0xeaccaa;
    var tunic = opts.tunic != null ? opts.tunic : 0x6a4628;
    var pants = opts.pants != null ? opts.pants : 0x3a2818;
    var capCol= opts.cap   != null ? opts.cap   : tunic;
    var g = new T.Group();
    var torso = new T.Mesh(gCyl(0.36,0.55,1.1,8), mat(tunic));
    torso.position.y = 1.2; g.add(torso);
    var head = new T.Mesh(gSph(0.32,12,8), mat(skin));
    head.position.y = 2.0; g.add(head);
    if (opts.cap !== false) {
      var capM = new T.Mesh(gCyl(0.18,0.36,0.22,8), mat(capCol));
      capM.position.y = 2.34; g.add(capM);
    }
    if (opts.cape) {
      var cape = new T.Mesh(gBox(0.9,1.1,0.08), mat(opts.cape));
      cape.position.set(0, 1.35, -0.3);
      g.add(cape);
    }
    var armL = new T.Mesh(gCyl(0.11,0.11,0.85,6), mat(tunic));
    armL.position.set(-0.5,1.4,0); g.add(armL);
    var armR = new T.Mesh(gCyl(0.11,0.11,0.85,6), mat(tunic));
    armR.position.set( 0.5,1.4,0); g.add(armR);
    var legL = new T.Mesh(gCyl(0.15,0.15,0.95,6), mat(pants));
    legL.position.set(-0.2,0.5,0); g.add(legL);
    var legR = new T.Mesh(gCyl(0.15,0.15,0.95,6), mat(pants));
    legR.position.set( 0.2,0.5,0); g.add(legR);
    if (opts.weapon === 'sword') {
      var hilt = new T.Mesh(gBox(0.08,0.36,0.08), mat(0x6a4628));
      hilt.position.set(0.6, 1.65, 0.1);
      g.add(hilt);
      var blade = new T.Mesh(gBox(0.06,0.9,0.04), mat(0xc8c8d0));
      blade.position.set(0.6, 2.25, 0.1);
      g.add(blade);
    }
    if (opts.weapon === 'staff') {
      var staff = new T.Mesh(gCyl(0.05,0.05,2.4,6), mat(0x6a4020));
      staff.position.set(0.55, 1.5, 0.1);
      g.add(staff);
      var orb = new T.Mesh(gSph(0.18,10,8), matE(0x4080c0, 0x2050a0, 0.8));
      orb.position.set(0.55, 2.7, 0.1);
      g.add(orb);
    }
    if (opts.weapon === 'lute') {
      var lute = new T.Mesh(gSph(0.32,10,8), mat(0x6a4020));
      lute.scale.set(1, 1.2, 0.4);
      lute.position.set(0.45, 1.2, 0.4);
      g.add(lute);
      var neck = new T.Mesh(gBox(0.08,0.7,0.06), mat(0x4a2c10));
      neck.position.set(0.45, 1.7, 0.4);
      g.add(neck);
    }
    if (opts.weapon === 'hammer') {
      var hShaft = new T.Mesh(gCyl(0.06,0.06,1.2,6), mat(0x4a2c10));
      hShaft.position.set(0.55, 1.6, 0.1);
      g.add(hShaft);
      var hHead = new T.Mesh(gBox(0.32,0.22,0.22), mat(0x808890));
      hHead.position.set(0.55, 2.2, 0.1);
      g.add(hHead);
    }
    g.userData.armL = armL; g.userData.armR = armR;
    g.userData.legL = legL; g.userData.legR = legR;
    g.userData.walk = function(t, sp){
      sp = sp == null ? 1 : sp;
      var a = Math.sin(t * sp * 6) * 0.7;
      armL.rotation.x =  a; armR.rotation.x = -a;
      legL.rotation.x = -a; legR.rotation.x =  a;
    };
    g.userData.idle = function(t){
      var a = Math.sin(t*1.6)*0.16;
      armL.rotation.x =  a; armR.rotation.x = -a;
      legL.rotation.x = 0; legR.rotation.x = 0;
    };
    g.userData.cheer = function(t){
      var a = Math.PI*0.7 + Math.sin(t*4)*0.2;
      armL.rotation.x = -a; armR.rotation.x = -a;
      legL.rotation.x = 0; legR.rotation.x = 0;
    };
    return g;
  }

  // ============================================================
  // PORTAL / SUB-LOCATION HELPERS
  // ============================================================
  function makePortal(stoneCol, glowCol){
    var g = new T.Group();
    var arch = new T.Mesh(gTorus(2.2, 0.4, 10, 24), mat(stoneCol));
    arch.position.y = 2.5;
    arch.rotation.x = Math.PI/2;
    arch.scale.set(1,1.2,1);
    g.add(arch);
    var baseL = new T.Mesh(gCyl(0.45,0.55,2.4,8), mat(stoneCol));
    baseL.position.set(-2.2, 1.2, 0); g.add(baseL);
    var baseR = new T.Mesh(gCyl(0.45,0.55,2.4,8), mat(stoneCol));
    baseR.position.set( 2.2, 1.2, 0); g.add(baseR);
    var glow = new T.Mesh(gPlane(3.6, 4.4), matE(glowCol, glowCol, 0.85));
    glow.position.y = 2.5;
    g.add(glow);
    g.userData.glow = glow;
    g.userData.tick = function(t){
      glow.material.emissiveIntensity = 0.6 + 0.3*Math.sin(t*2.0);
      glow.scale.set(1 + 0.05*Math.sin(t*3), 1 + 0.05*Math.cos(t*2.4), 1);
    };
    return g;
  }
  function addSubLabel(parent, text, sub, x, y, z){
    var s = makeLabel(text, sub || null);
    s.position.set(x, (y == null ? 4.0 : y), z);
    parent.add(s);
    return s;
  }

  // ============================================================
  // WORLD CONTAINERS  (5 sub-worlds)
  // ============================================================
  var WORLDS = [];
  function addWorld(idx, name, sub, sky, ground, fogCol, fogN, fogF, target){
    var g = new T.Group();
    g.visible = false;
    scene.add(g);
    var w = {
      idx:idx, name:name, sub:sub, group:g,
      sky:sky, ground:ground,
      fog:{ color:fogCol, near:fogN, far:fogF },
      featured:[], npcs:[],
      portal:null, portalTarget:target,
      heroSpawn: new T.Vector3(0,0,32),
      heroExit:  new T.Vector3(0,0,-30)
    };
    WORLDS.push(w);
    return w;
  }

  // 0 Wilds  -> Greystone (1)
  var W0 = addWorld(0, 'THE WILDS OF DUNDRACK', 'An old road through the misted pines', 0xa0b0a0, 0x3e5a2c, 0xc0c8b0, 30, 220, 1);
  // 1 Greystone (town) -> Tavern (3)
  var W1 = addWorld(1, 'GREYSTONE-ON-THE-FORD', 'Market town under the watch of the Lord', 0xb0d0e8, 0x806848, 0xd8d0a0, 40, 260, 3);
  // 2 Crypt (dungeon) -> Keep (4)
  var W2 = addWorld(2, 'THE CRYPT OF AELRIC', 'A torchlit crypt beneath the moor', 0x080404, 0x1a1010, 0x080404, 8, 60, 4);
  // 3 Tavern -> Greystone Keep (4)
  var W3 = addWorld(3, 'THE BROKEN SHIELD INN', 'A warm hearth, a longer road', 0x3a1810, 0x402418, 0x1a0c04, 6, 36, 4);
  // 4 Lord's Keep -> Wilds (0)
  var W4 = addWorld(4, 'THE KEEP OF LORD HALLBRIK', 'Stone halls, banner walls, an old oath', 0x6a4878, 0x3a2c44, 0x584068, 24, 180, 0);

  // Wilds also branches to crypt (as cross-link): we'll set portal target dynamically at runtime via cycle modulo

  // ============================================================
  // BUILD WILDS (W0)
  // ============================================================
  function buildW0(w){
    var floor = new T.Mesh(gPlane(260, 260), mat(0x3e5a2c));
    floor.rotation.x = -Math.PI/2;
    w.group.add(floor);
    var road = new T.Mesh(gPlane(7, 240), mat(0x6a5a3a));
    road.rotation.x = -Math.PI/2;
    road.position.y = 0.02;
    w.group.add(road);
    // pines
    for (var i=0;i<170;i++) {
      var x = rnd(-115, 115);
      var z = rnd(-115, 115);
      if (Math.abs(x) < 5) continue;
      var tr = new T.Group();
      var trunk = new T.Mesh(gCyl(0.3,0.5,3,6), mat(0x3a2818));
      trunk.position.y = 1.5; tr.add(trunk);
      var crown = new T.Mesh(gCone(2.2 + Math.random()*0.8, 5 + Math.random()*2, 8), mat(0x244018));
      crown.position.y = 4.5 + Math.random()*1.2; tr.add(crown);
      tr.position.set(x, 0, z);
      tr.rotation.y = Math.random()*Math.PI;
      w.group.add(tr);
    }
    // Bear cave
    var caveG = new T.Group();
    caveG.position.set(-44, 0, -22);
    var mound = new T.Mesh(gSph(7, 14, 10), mat(0x4a4035));
    mound.scale.set(1, 0.55, 1);
    caveG.add(mound);
    var mouth = new T.Mesh(gBox(3, 3, 1.4), mat(0x040404));
    mouth.position.set(0, 1.5, 6.0);
    caveG.add(mouth);
    w.group.add(caveG);
    addSubLabel(w.group, 'THE BEAR CAVE', 'Hjor\'s den', -44, 6, -16);
    // Deer glade
    var glade = new T.Group();
    glade.position.set(38, 0, -28);
    for (var d=0; d<4; d++) {
      var deer = new T.Group();
      var db = new T.Mesh(gBox(1.6, 0.7, 0.55), mat(0xa07050));
      db.position.y = 1.0; deer.add(db);
      var dh = new T.Mesh(gBox(0.5, 0.5, 0.5), mat(0xa07050));
      dh.position.set(0.85, 1.45, 0); deer.add(dh);
      for (var k=0;k<4;k++) {
        var leg = new T.Mesh(gCyl(0.07, 0.07, 0.95, 6), mat(0x806040));
        leg.position.set((k<2 ? 0.55 : -0.55), 0.5, (k%2 ? 0.22 : -0.22));
        deer.add(leg);
      }
      deer.position.set(rnd(-4, 4), 0, rnd(-4, 4));
      deer.rotation.y = rnd(0, Math.PI*2);
      glade.add(deer);
    }
    w.group.add(glade);

  var hero, veera, norn;
  var heroState = { world:0, t:0, walking:false, target:null, hold:false };

  function spawnFeatured(){
    for (var i=0; i<FEATURED.length; i++) {
      var f = FEATURED[i];
      var c = makeChar(f);
      var label = makeLabel(f.name, f.role);
      label.position.y = 3.4;
      c.add(label);
      c.userData.featured = f;
      // Hero/Veera/Norn travel between worlds: parent to scene root, not a world group.
      if (i < 3) {
        scene.add(c);
        if (i === 0) hero = c;
        if (i === 1) veera = c;
        if (i === 2) norn = c;
      } else {
        WORLDS[f.world].group.add(c);
        // place at a sub-location
        var slots = [
          new T.Vector3(-8, 0, 4),
          new T.Vector3( 8, 0,-2),
          new T.Vector3(-2, 0,-10),
          new T.Vector3( 6, 0, 8),
          new T.Vector3(-6, 0, 12)
        ];
        var sp = slots[(i)%slots.length];
        c.position.copy(sp);

    if (norn)  norn.position.set(w.heroSpawn.x + 1.6, w.heroSpawn.y, w.heroSpawn.z + 1.0);

  // ============================================================
  // PORTAL TRAVEL STATE MACHINE
  // ============================================================
  var cycleLen = rnd(65, 85);
  var cycleT = 0;
  var portaling = false;
  var portalPhase = 0; // 0=idle 1=walk 2=fade 3=swap 4=fade-out

  function startPortal(){
    portaling = true;
    portalPhase = 1;
  }

  function nextWorldIdx(){
    var w = WORLDS[heroState.world];
    return w.portalTarget;
  }

  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  var clock = new T.Clock();
  var lastChyronT = 0;

  function updateNPCs(t){
    var w = WORLDS[heroState.world];
    for (var i=0; i<w.featured.length; i++) {
      var f = w.featured[i];
      if (!f.userData.basePos) continue;
      var ph = f.userData.wander.phase;
      var r = f.userData.wander.r;
      f.position.x = f.userData.basePos.x + Math.cos(t*0.6 + ph) * r;
      f.position.z = f.userData.basePos.z + Math.sin(t*0.6 + ph) * r;
      f.rotation.y = Math.atan2(-Math.sin(t*0.6 + ph), Math.cos(t*0.6 + ph)) + Math.PI/2;
      if (f.userData.walk) f.userData.walk(t, 0.5);
    }
    for (var n=0; n<w.npcs.length; n++) {
      var item = w.npcs[n];
      if (item.kind === 'npc') {
        var c = item.obj;
        var ph2 = c.userData.wander.phase;
        var r2 = c.userData.wander.r;
        var sp2 = c.userData.wander.sp;
        c.position.x = c.userData.basePos.x + Math.cos(t*sp2*0.4 + ph2) * r2;
        c.position.z = c.userData.basePos.z + Math.sin(t*sp2*0.4 + ph2) * r2;
        c.rotation.y = Math.atan2(-Math.sin(t*sp2*0.4 + ph2), Math.cos(t*sp2*0.4 + ph2)) + Math.PI/2;
        if (c.userData.walk) c.userData.walk(t, sp2 * 0.55);
      } else if (item.kind === 'torch' || item.kind === 'fp') {
        if (item.obj.userData.tick) item.obj.userData.tick(t);
      }
    }
    if (w.portal && w.portal.userData.tick) w.portal.userData.tick(t);
  }

  function moveHero(dt, t){
    if (!hero) return;
    var w = WORLDS[heroState.world];
    var sp = 2.6;
    if (portaling && portalPhase === 1) {
      // walk toward portal
      var target = w.heroExit;
      var dx = target.x - hero.position.x;
      var dz = target.z - hero.position.z;
      var d = Math.sqrt(dx*dx + dz*dz);
      if (d > 0.4) {
        hero.position.x += (dx/d) * sp * dt;
        hero.position.z += (dz/d) * sp * dt;
        hero.rotation.y = Math.atan2(dx, dz);
        hero.userData.walk(t, 1.0);
        // companions trail
        if (veera) {
          var vd = veera.position.distanceTo(hero.position);
          if (vd > 1.6) {
            var vdx = hero.position.x - veera.position.x;
            var vdz = hero.position.z - veera.position.z;
            veera.position.x += (vdx/vd) * sp * dt;
            veera.position.z += (vdz/vd) * sp * dt;
            veera.rotation.y = Math.atan2(vdx, vdz);
            veera.userData.walk(t, 0.95);
          } else { veera.userData.idle(t); }
        }
        if (norn) {
          var nd = norn.position.distanceTo(hero.position);
          if (nd > 1.6) {
            var ndx = hero.position.x - norn.position.x;
            var ndz = hero.position.z - norn.position.z;
            norn.position.x += (ndx/nd) * sp * dt;
            norn.position.z += (ndz/nd) * sp * dt;
            norn.rotation.y = Math.atan2(ndx, ndz);
            norn.userData.walk(t, 0.95);
          } else { norn.userData.idle(t); }
        }
      } else {
        portalPhase = 2;
        elFade.classList.add('on');
        portalT0 = t;
      }
    } else if (!portaling) {
      // gentle ambient walk near hero spawn
      var bx = w.heroSpawn.x;
      var bz = w.heroSpawn.z;
      var rx = bx + Math.cos(t * 0.35) * 4;
      var rz = bz + Math.sin(t * 0.35) * 4;
      var dxa = rx - hero.position.x;
      var dza = rz - hero.position.z;
      var dla = Math.sqrt(dxa*dxa + dza*dza);
      if (dla > 0.2) {
        hero.position.x += (dxa/dla) * 1.8 * dt;
        hero.position.z += (dza/dla) * 1.8 * dt;
        hero.rotation.y = Math.atan2(dxa, dza);
        hero.userData.walk(t, 0.85);
      } else {
        hero.userData.idle(t);
      }
      if (veera) {
        veera.position.set(hero.position.x - 1.4, 0, hero.position.z + 1.2);
        veera.rotation.y = hero.rotation.y;
        veera.userData.idle(t);
      }
      if (norn) {
        norn.position.set(hero.position.x + 1.4, 0, hero.position.z + 1.2);
        norn.rotation.y = hero.rotation.y;
        norn.userData.idle(t);
      }
    }
  }

  var portalT0 = 0;
  function tickPortal(t){
    if (!portaling) return;
    if (portalPhase === 2) {
      if (t - portalT0 > 1.05) {
        // swap world
        var nx = nextWorldIdx();
        // small rewards on transition
        mem.gold = (mem.gold | 0) + (5 + ((Math.random()*15)|0));
        if (nx === 2 && mem.cycle % 2 === 0) {
          if (mem.defeatedBosses.indexOf('Drok\'nar') < 0) mem.defeatedBosses.push('Drok\'nar');
        }
        if (nx === 1 && mem.inventory.indexOf('a loaf from the market') < 0 && Math.random() < 0.5) {
          mem.inventory.push('a loaf from the market');
        }
        if (nx === 3 && mem.inventory.indexOf('a song-token of Veera') < 0 && Math.random() < 0.4) {
          mem.inventory.push('a song-token of Veera');
        }
        saveMem(mem);
        setActiveWorld(nx, true);
        portalPhase = 3;
        portalT0 = t;
      }
    } else if (portalPhase === 3) {
      if (t - portalT0 > 0.4) {
        elFade.classList.remove('on');
        portalPhase = 4;
        portalT0 = t;
      }
    } else if (portalPhase === 4) {
      if (t - portalT0 > 1.0) {
        portaling = false;
        portalPhase = 0;
        cycleT = 0;
        cycleLen = rnd(65, 85);
      }
    }
  }

  function tick(){
    requestAnimationFrame(tick);
    var dt = Math.min(clock.getDelta(), 0.05);
    var t = clock.elapsedTime;
    cycleT += dt;
    nextShotIn -= dt;
    if (nextShotIn <= 0) pickShot(t);

    // Trigger portal walk in last 12s of cycle
    if (!portaling && cycleT > Math.max(8, cycleLen - 12)) {
      startPortal();
    }
    // Hard cap if walk takes too long
    if (portaling && portalPhase === 1 && cycleT > cycleLen + 6) {
      portalPhase = 2;
      elFade.classList.add('on');
      portalT0 = t;
    }

    updateNPCs(t);
    moveHero(dt, t);
    tickPortal(t);

    // Camera
    var p = currentShot.pos(t);
    var l = currentShot.look(t);
    camera.position.lerp(p, 0.06);
    var cur = new T.Vector3();
    camera.getWorldDirection(cur);
    var desired = new T.Vector3().subVectors(l, camera.position).normalize();
    var blended = cur.lerp(desired, 0.15).normalize();
    camera.lookAt(camera.position.clone().add(blended));

    // Chyron rotation every ~6s
    if (t - lastChyronT > 6) {
      elChyron.textContent = chyronLine(t);
      lastChyronT = t;
    }
    // Hero dot pulse on minimap
    elDot.setAttribute('r', String(3.4 + 0.6*Math.sin(t*3)));

    renderer.render(scene, camera);
  }

  // ============================================================
  // BOOT
  // ============================================================
  function boot(){
    buildW0(W0); buildW1(W1); buildW2(W2); buildW3(W3); buildW4(W4);
    spawnFeatured();
    spawnAmbientNPCs();
    setActiveWorld(0, true);
    elChyron.textContent = chyronLine(0);
    refreshHud();
    pickShot(0);
    tick();
  }
  boot();

  // ============================================================
  // 10-MINUTE RESEED  (dispose, rebuild, increment cycle/level)
  // ============================================================
  setInterval(function(){
    try {
      // Bump persistent memory at reseed
      mem.cycle = (mem.cycle | 0) + 1;
      if (mem.cycle % 3 === 0) mem.level = (mem.level | 0) + 1;
      saveMem(mem);
      // Dispose all current geometry/materials/textures and clear scene
      disposeAll();
      // Rebuild lights
      ambient = new T.AmbientLight(0xffffff, 0.55); scene.add(ambient);
      sun = new T.DirectionalLight(0xffe0b0, 0.85); sun.position.set(40, 80, 30); scene.add(sun);
      fire = new T.PointLight(0xff7028, 0, 22); fire.position.set(0, 4, 0); scene.add(fire);
      // Rebuild worlds
      WORLDS.length = 0;
      W0 = addWorld(0, 'THE WILDS OF DUNDRACK', 'An old road through the misted pines', 0xa0b0a0, 0x3e5a2c, 0xc0c8b0, 30, 220, 1);
      W1 = addWorld(1, 'GREYSTONE-ON-THE-FORD', 'Market town under the watch of the Lord', 0xb0d0e8, 0x806848, 0xd8d0a0, 40, 260, 3);
      W2 = addWorld(2, 'THE CRYPT OF AELRIC', 'A torchlit crypt beneath the moor', 0x080404, 0x1a1010, 0x080404, 8, 60, 4);
