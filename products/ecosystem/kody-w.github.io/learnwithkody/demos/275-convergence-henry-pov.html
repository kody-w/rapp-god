<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>275 — Brimsworth Convergence: Henry Sr POV</title>
<style>
  html,body{margin:0;padding:0;background:#0a0806;color:#f4ead8;font-family:Georgia,'Times New Roman',serif;overflow:hidden;height:100%}
  #cv{position:fixed;inset:0;display:block;width:100vw;height:100vh}
  /* HUD: kept minimal & elegant — this is a father's eye-level scene */
  .hud{position:fixed;left:14px;top:14px;font:11px/1.45 ui-monospace,Menlo,monospace;color:#e8d8b6;background:rgba(20,12,6,.55);padding:8px 10px;border:1px solid #b78b4a55;border-radius:4px;max-width:280px;backdrop-filter:blur(4px);pointer-events:none;z-index:6}
  .hud b{color:#f4d28a;letter-spacing:.5px}
  .chyron{position:fixed;left:0;right:0;bottom:7%;text-align:center;font:italic 18px/1.5 Georgia,serif;color:#fff5d8;text-shadow:0 1px 4px #000,0 0 18px #000;letter-spacing:.4px;padding:0 6%;z-index:7;pointer-events:none}
  .chyron .who{display:block;font-style:normal;font:600 10px/1 ui-monospace,Menlo,monospace;color:#e7b56a;letter-spacing:2.4px;margin-bottom:6px}
  .convergence{position:fixed;left:0;right:0;top:42%;text-align:center;color:#fff5d8;font:600 26px/1.3 Georgia,serif;text-shadow:0 0 22px #000,0 0 60px #c98a3aaa;letter-spacing:1.2px;opacity:0;transition:opacity 1.6s ease;pointer-events:none;z-index:8;padding:0 8%}
  .ticker{position:fixed;right:14px;top:14px;font:10px/1.4 ui-monospace,Menlo,monospace;color:#cfa86a;background:rgba(18,10,4,.55);padding:7px 9px;border:1px solid #80552855;border-radius:3px;max-width:230px;z-index:6}
  .ticker .pov{display:flex;justify-content:space-between;gap:10px;color:#e6c889}
  .ticker .pov.me{color:#ffe2a3;font-weight:700}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at 50% 56%,transparent 38%,rgba(0,0,0,.35) 72%,rgba(0,0,0,.78) 100%)}
  /* hint of glasses + brow furrow blur layer */
  .compose{position:fixed;inset:0;pointer-events:none;z-index:4;backdrop-filter:blur(0px);transition:backdrop-filter .9s ease}
  .compose.on{backdrop-filter:blur(2.6px) saturate(1.06)}
  .tear{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 1.4s ease;background:radial-gradient(ellipse at 50% 50%,rgba(255,240,210,.22),transparent 55%)}
  .tear.on{opacity:1}
  .tag{position:fixed;left:14px;bottom:14px;font:10px/1.3 ui-monospace,Menlo,monospace;color:#9c7e4d;z-index:6}
  .tag b{color:#d6a960}
  @media (max-width:560px){.chyron{font-size:15px;bottom:9%}.convergence{font-size:20px}}
</style>
</head>
<body>
<!-- ROUND26_CONVERGENCE v1 -->
<canvas id="cv"></canvas>
<div class="vignette"></div>
<div class="compose" id="compose"></div>
<div class="tear" id="tear"></div>
<div class="hud" id="hud">
  <b>BRIMSWORTH CONVERGENCE — POV 6/12</b><br>
  Henry Sr · 70 · father of the bride<br>
  <span id="hudClock">t+00:00</span> · <span id="hudPhase">vestibule</span><br>
  <span id="hudPulse" style="opacity:.75">·</span>
</div>
<div class="ticker" id="ticker">
  <div style="color:#f4d28a;font-weight:700;margin-bottom:4px">twin-tab POV ledger</div>
  <div id="povList"></div>
</div>
<div class="chyron" id="chy"><span class="who">HENRY SR — interior</span><span id="chyTxt">…</span></div>
<div class="convergence" id="conv"></div>
<div class="tag">demo <b>275</b> · brimsworth_convergence_v1 · <span id="seedTag">seed —</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
<script>
(function(){
  'use strict';

  /* ===================== CROSS-READ LEDGERS (R16–R25 lineage) ===================== */
  function readJSON(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function writeJSON(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

  var ledgers = {
    worlds:     readJSON('brimsworth_worlds_v1',    {worlds:[],lastSeed:0}),
    multiverse: readJSON('brimsworth_multiverse_v1',{branches:[]}),
    century:    readJSON('brimsworth_century_v1',   {decades:[]}),
    lifetime:   readJSON('brimsworth_lifetime_v1',  {chapters:[]}),
    cast:       readJSON('recurring_cast_v1',       {henry_sr:{age:70,role:'father'},lily:{age:32,role:'bride'},tomas:{age:34,role:'groom'},margaret:{age:68,role:'mother'}})
  };

  /* canonical convergence ledger */
  var CONV_KEY = 'brimsworth_convergence_v1';
  var convLedger = readJSON(CONV_KEY, {pov_log:[], master_clock_origin:0});

  /* ===================== RESEED EVERY 600s ===================== */
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
  var SEED_PERIOD_MS = 600*1000;
  function currentSeed(){
    var now = Date.now();
    return Math.floor(now / SEED_PERIOD_MS);
  }
  var SEED = currentSeed();
  var rand = mulberry32(SEED ^ 0x48454e52); // "HENR"
  document.getElementById('seedTag').textContent = 'seed '+SEED.toString(36);

  /* ===================== MASTER CLOCK + BroadcastChannel ===================== */
  var T_START = performance.now();
  var masterClockOrigin = (function(){
    var existing = readJSON('brimsworth_convergence_master_origin_v1', null);
    if(existing && (Date.now() - existing) < 12*3600*1000) return existing;
    var v = Date.now();
    writeJSON('brimsworth_convergence_master_origin_v1', v);
    return v;
  })();

  var POV_ID = 'henry';
  var pov_self = { pov_id: POV_ID, label: 'Henry Sr', age: 70, role: 'father-of-bride',
                   master_clock_at_join: Date.now() - masterClockOrigin,
                   convergence_at: null,
                   joined_wall: Date.now() };

  /* append at boot */
  convLedger.pov_log = convLedger.pov_log || [];
  convLedger.pov_log.push({ pov_id: pov_self.pov_id, master_clock_at_join: pov_self.master_clock_at_join, convergence_at: null, t: Date.now() });
  if(!convLedger.master_clock_origin) convLedger.master_clock_origin = masterClockOrigin;
  writeJSON(CONV_KEY, convLedger);

  var bc = null;
  try { bc = new BroadcastChannel('brimsworth_convergence'); } catch(e){}

  var twinPOVs = {}; // pov_id -> { label, t_local, last_seen }
  twinPOVs[POV_ID] = { label:'Henry Sr (me)', t_local:0, last_seen:Date.now(), me:true };

  function broadcastPulse(t){
    if(!bc) return;
    try{ bc.postMessage({ type:'pulse', pov_id:POV_ID, label:'Henry Sr', t_local:t, wall:Date.now() }); }catch(e){}
  }
  function broadcastConvergence(t){
    if(!bc) return;
    try{ bc.postMessage({ type:'convergence', pov_id:POV_ID, label:'Henry Sr', t_local:t, wall:Date.now() }); }catch(e){}
  }
  if(bc){
    bc.onmessage = function(ev){
      var d = ev.data; if(!d || !d.pov_id) return;
      twinPOVs[d.pov_id] = twinPOVs[d.pov_id] || {label:d.label||d.pov_id, t_local:0, last_seen:0};
      twinPOVs[d.pov_id].label   = d.label || twinPOVs[d.pov_id].label;
      twinPOVs[d.pov_id].t_local = (typeof d.t_local==='number') ? d.t_local : twinPOVs[d.pov_id].t_local;
      twinPOVs[d.pov_id].last_seen = Date.now();
      if(d.type==='convergence') twinPOVs[d.pov_id].convergence_at = d.wall;
    };
    try{ bc.postMessage({type:'hello', pov_id:POV_ID, label:'Henry Sr', t_local:0, wall:Date.now()}); }catch(e){}
  }

  /* ===================== THREE.JS SCENE ===================== */
  var THREE = window.THREE;
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0a07);
  scene.fog = new THREE.Fog(0x110c08, 14, 70);

  var camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.05, 200);
  camera.position.set(0, 1.70, 18); // Henry Sr eye level (~1.70m)

  var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('cv'), antialias:true});
  renderer.setPixelRatio(Math.min(2, devicePixelRatio));
  renderer.setSize(innerWidth, innerHeight, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  addEventListener('resize', function(){
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight, false);
  });

  /* ----- chapel structure ----- */
  var chapel = new THREE.Group(); scene.add(chapel);

  // Floor (long aisle runner + stone)
  var stoneGeo = new THREE.PlaneGeometry(24, 60);
  var stoneMat = new THREE.MeshStandardMaterial({color:0x2b231b, roughness:.96, metalness:0});
  var stone = new THREE.Mesh(stoneGeo, stoneMat); stone.rotation.x = -Math.PI/2; chapel.add(stone);

  var runnerGeo = new THREE.PlaneGeometry(2.0, 56);
  var runnerMat = new THREE.MeshStandardMaterial({color:0x6b1e1e, roughness:.85});
  var runner = new THREE.Mesh(runnerGeo, runnerMat); runner.rotation.x = -Math.PI/2; runner.position.y = 0.002; chapel.add(runner);

  // petals scattered on runner
  for(var p=0;p<140;p++){
    var pg = new THREE.PlaneGeometry(0.10+rand()*0.08, 0.10+rand()*0.08);
    var pm = new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.96+rand()*0.04, 0.55, 0.55+rand()*0.2), roughness:.9, side:THREE.DoubleSide});
    var pt = new THREE.Mesh(pg, pm); pt.rotation.x = -Math.PI/2; pt.rotation.z = rand()*Math.PI;
    pt.position.set((rand()-0.5)*1.8, 0.005, -22 + rand()*46);
    chapel.add(pt);
  }

  // Walls (warm sandstone)
  var wallMat = new THREE.MeshStandardMaterial({color:0x3a2a1c, roughness:.95});
  var wL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 7, 60), wallMat); wL.position.set(-12, 3.5, 0); chapel.add(wL);
  var wR = wL.clone(); wR.position.x = 12; chapel.add(wR);
  var wB = new THREE.Mesh(new THREE.BoxGeometry(24, 7, 0.4), wallMat); wB.position.set(0,3.5,30); chapel.add(wB);
  var wF = new THREE.Mesh(new THREE.BoxGeometry(24, 7, 0.4), wallMat); wF.position.set(0,3.5,-30); chapel.add(wF);
  var ceil = new THREE.Mesh(new THREE.BoxGeometry(24, 0.3, 60), new THREE.MeshStandardMaterial({color:0x1a120c, roughness:1}));
  ceil.position.y = 7; chapel.add(ceil);

  // Stained-glass-ish windows (emissive panels)
  function window4(x, side){
    var grp = new THREE.Group();
    for(var k=0;k<4;k++){
      var c = new THREE.Color().setHSL(0.10 + (rand()*0.7), 0.7, 0.55);
      var pane = new THREE.Mesh(
        new THREE.PlaneGeometry(1.4, 2.4),
        new THREE.MeshStandardMaterial({color:c, emissive:c, emissiveIntensity:0.9, roughness:.6})
      );
      pane.position.set(0, 4.0, -22 + k*12);
      pane.rotation.y = side<0 ? Math.PI/2 : -Math.PI/2;
      pane.position.x = x;
      grp.add(pane);
    }
    return grp;
  }
  chapel.add(window4(-11.78, -1));
  chapel.add(window4( 11.78,  1));

  // Pews
  var pewMat = new THREE.MeshStandardMaterial({color:0x4b2e18, roughness:.7});
  function pew(x, z){
    var g = new THREE.Group();
    var seat = new THREE.Mesh(new THREE.BoxGeometry(4, 0.18, 1.0), pewMat); seat.position.y = 0.55;
    var back = new THREE.Mesh(new THREE.BoxGeometry(4, 1.1, 0.18), pewMat); back.position.set(0, 1.0, -0.42);
    g.add(seat); g.add(back); g.position.set(x, 0, z); return g;
  }
  var pewRows = 9;
  for(var i=0;i<pewRows;i++){
    var z = -14 + i*3.4;
    chapel.add(pew(-3.0, z));
    chapel.add(pew( 3.0, z));
  }

  // Altar
  var altarStep = new THREE.Mesh(new THREE.BoxGeometry(10, 0.25, 4), new THREE.MeshStandardMaterial({color:0x2c2014, roughness:.9}));
  altarStep.position.set(0, 0.13, -18); chapel.add(altarStep);
  var altar = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.0, 1.0), new THREE.MeshStandardMaterial({color:0x6e4a23, roughness:.6}));
  altar.position.set(0, 0.75, -19.2); chapel.add(altar);
  var cloth = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 1.1), new THREE.MeshStandardMaterial({color:0xf4ead8, roughness:.85, side:THREE.DoubleSide}));
  cloth.rotation.x = -Math.PI/2; cloth.position.set(0, 1.26, -19.2); chapel.add(cloth);

  // Floral arch (over altar)
  var archGrp = new THREE.Group(); archGrp.position.set(0, 0, -19.6); chapel.add(archGrp);
  var archMat = new THREE.MeshStandardMaterial({color:0x2e3b1e, roughness:.85});
  var pillarL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4.2, 8), archMat); pillarL.position.set(-2.2, 2.1, 0); archGrp.add(pillarL);
  var pillarR = pillarL.clone(); pillarR.position.x = 2.2; archGrp.add(pillarR);
  var crown = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.18, 8, 22, Math.PI), archMat);
  crown.position.set(0, 4.2, 0); crown.rotation.x = Math.PI/2; archGrp.add(crown);
  // floral cluster
  for(var f=0; f<70; f++){
    var col = new THREE.Color().setHSL(0.92 + rand()*0.08, 0.55, 0.55 + rand()*0.2);
    var bud = new THREE.Mesh(new THREE.SphereGeometry(0.10 + rand()*0.07, 6, 6), new THREE.MeshStandardMaterial({color:col, roughness:.7}));
    var ang = rand()*Math.PI;
    bud.position.set(Math.cos(ang)*2.2 + (rand()-0.5)*0.4, 4.2 + Math.sin(ang)*2.2*0.0 + Math.sin(ang)*0.0 + 0, 0);
    // distribute along arch
    var t = rand();
    var ax = Math.cos(Math.PI*t) * 2.2;
    var ay = Math.sin(Math.PI*t) * 2.2 + 2.1;
    bud.position.set(ax + (rand()-0.5)*0.25, ay, (rand()-0.5)*0.3);
    archGrp.add(bud);
  }

  // Candles down the aisle
  var candleMat = new THREE.MeshStandardMaterial({color:0xf4e3b6, emissive:0xffb066, emissiveIntensity:1.4, roughness:.6});
  var flameLights = [];
  for(var c=0;c<10;c++){
    var z = -16 + c*3.4;
    var stand = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,1.2,6), new THREE.MeshStandardMaterial({color:0x171008, roughness:.6, metalness:.4}));
    stand.position.set(-1.4, 0.6, z); chapel.add(stand);
    var flame = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), candleMat);
    flame.position.set(-1.4, 1.25, z); chapel.add(flame);
    var pl = new THREE.PointLight(0xffb066, 0.8, 4.5, 2); pl.position.copy(flame.position); chapel.add(pl); flameLights.push(pl);

    var stand2 = stand.clone(); stand2.position.x = 1.4; chapel.add(stand2);
    var flame2 = flame.clone(); flame2.position.x = 1.4; chapel.add(flame2);
    var pl2 = new THREE.PointLight(0xffb066, 0.8, 4.5, 2); pl2.position.copy(flame2.position); chapel.add(pl2); flameLights.push(pl2);
  }

  /* ----- characters (low-poly, dignified) ----- */
  function makeFigure(opts){
    var g = new THREE.Group();
    var body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.34, 1.1, 10),
      new THREE.MeshStandardMaterial({color:opts.body||0x222428, roughness:.85}));
    body.position.y = 0.55 + 0.55; g.add(body);
    var torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.30, 0.6, 10),
      new THREE.MeshStandardMaterial({color:opts.body||0x222428, roughness:.85}));
    torso.position.y = 1.45; g.add(torso);
    var head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10),
      new THREE.MeshStandardMaterial({color:opts.skin||0xd9b48a, roughness:.7}));
    head.position.y = 1.78; g.add(head);
    if(opts.hair){
      var hair = new THREE.Mesh(new THREE.SphereGeometry(0.19, 12, 10, 0, Math.PI*2, 0, Math.PI*0.55),
        new THREE.MeshStandardMaterial({color:opts.hair, roughness:.85}));
      hair.position.y = 1.83; g.add(hair);
    }
    if(opts.veil){
      var veil = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.6),
        new THREE.MeshStandardMaterial({color:0xfaf3e0, transparent:true, opacity:.55, side:THREE.DoubleSide}));
      veil.position.set(0, 1.2, -0.05);
      g.add(veil);
      var dress = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.4, 14, 1, true),
        new THREE.MeshStandardMaterial({color:0xf6efdd, roughness:.7, side:THREE.DoubleSide}));
      dress.position.y = 0.7; g.add(dress);
    }
    if(opts.bouquet){
      var bq = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8),
        new THREE.MeshStandardMaterial({color:0xeacdb6, roughness:.8}));
      bq.position.set(0.18, 1.1, 0.2); g.add(bq);
      for(var b=0;b<14;b++){
        var c = new THREE.Color().setHSL(0.94+rand()*0.05, 0.5, 0.6);
        var pe = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), new THREE.MeshStandardMaterial({color:c}));
        pe.position.set(0.18+(rand()-0.5)*0.18, 1.1+(rand()-0.5)*0.18, 0.2+(rand()-0.5)*0.12);
        g.add(pe);
      }
    }
    return g;
  }

  // BRIDE — Lily, at the altar (initially walks beside Henry)
  var lily = makeFigure({skin:0xeac9a5, hair:0x6a3a1c, veil:true, bouquet:true});
  lily.position.set(0.8, 0, 0); // starts in vestibule beside camera
  scene.add(lily);

  // GROOM — Tomas, at altar
  var tomas = makeFigure({skin:0xd6a172, hair:0x1f1410, body:0x141414});
  tomas.position.set(0.6, 0, -19.5); tomas.rotation.y = Math.PI; scene.add(tomas);

  // OFFICIANT
  var officiant = makeFigure({skin:0xc89878, hair:0xe6e6e6, body:0x402a18});
  officiant.position.set(0, 0.25, -20.6); officiant.rotation.y = 0; scene.add(officiant);

  // MARGARET — mother, front pew left
  var margaret = makeFigure({skin:0xe2c0a2, hair:0xb8b8b0, body:0x4a2c4a});
  margaret.position.set(-3.0, 0.55, -14); margaret.rotation.y = 0; scene.add(margaret);

  // GUESTS — silhouettes in pews (deterministic)
  var guests = [];
  for(var rowi=0; rowi<pewRows; rowi++){
    for(var sl=0; sl<6; sl++){
      var sx = (sl%2===0?-1:1) * (1.0 + Math.floor(sl/2)*0.8);
      var sz = -14 + rowi*3.4 - 0.05;
      if(rowi===0 && sl<2) continue; // leave space for parents
      var skin = new THREE.Color().setHSL(0.08+rand()*0.05, 0.35, 0.45+rand()*0.2).getHex();
      var body = new THREE.Color().setHSL(rand(), 0.25, 0.18+rand()*0.18).getHex();
      var gst = makeFigure({skin:skin, hair:rand()<0.7?0x1a120a:0xe8e1d2, body:body});
      gst.position.set(sx, 0.55, sz);
      gst.rotation.y = (rowi%2===0)?0.02:-0.02;
      scene.add(gst); guests.push(gst);
    }
  }

  /* ----- Henry Sr — only his hand-on-Lily's-arm visible from POV ----- */
  // a forearm + hand reaching forward-left, gently linked through Lily's arm.
  var armGrp = new THREE.Group(); scene.add(armGrp);
  var sleeveMat = new THREE.MeshStandardMaterial({color:0x121214, roughness:.7});
  var cuffMat   = new THREE.MeshStandardMaterial({color:0xf3ead8, roughness:.85});
  var skinMat   = new THREE.MeshStandardMaterial({color:0xd6a888, roughness:.75});
  var sleeve = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.085, 0.65, 10), sleeveMat);
  sleeve.rotation.z = Math.PI/2; sleeve.position.set(0.45, 1.42, -0.15);
  var cuff = new THREE.Mesh(new THREE.CylinderGeometry(0.082, 0.082, 0.05, 10), cuffMat);
  cuff.rotation.z = Math.PI/2; cuff.position.set(0.78, 1.42, -0.15);
  var hand = new THREE.Mesh(new THREE.SphereGeometry(0.085, 10, 10), skinMat);
  hand.position.set(0.93, 1.42, -0.15);
  // wedding ring (his own)
  var ring = new THREE.Mesh(new THREE.TorusGeometry(0.022, 0.006, 6, 16), new THREE.MeshStandardMaterial({color:0xd0a35c, metalness:.85, roughness:.25}));
  ring.position.set(0.96, 1.40, -0.10); ring.rotation.y = Math.PI/2; ring.rotation.x = Math.PI/2;
  armGrp.add(sleeve); armGrp.add(cuff); armGrp.add(hand); armGrp.add(ring);
  // arm follows the camera
  function placeArm(){
    var fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    var right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
    var up = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);
    var base = camera.position.clone().add(fwd.multiplyScalar(0.55)).add(right.multiplyScalar(0.42)).add(up.multiplyScalar(-0.30));
    armGrp.position.copy(base);
    armGrp.quaternion.copy(camera.quaternion);
  }

  /* ===================== LIGHTING ===================== */
  var amb = new THREE.AmbientLight(0xffe0b2, 0.35); scene.add(amb);
  var hemi = new THREE.HemisphereLight(0xffd9a0, 0x1c140c, 0.5); scene.add(hemi);
  var keyLight = new THREE.DirectionalLight(0xffe5b8, 0.9);
  keyLight.position.set(2, 8, -10); scene.add(keyLight);
  var altarSpot = new THREE.SpotLight(0xfff0c8, 1.6, 24, Math.PI/6, 0.6, 1.2);
  altarSpot.position.set(0, 6.5, -16); altarSpot.target.position.set(0, 1, -19.5);
  scene.add(altarSpot); scene.add(altarSpot.target);

  /* ===================== CAMERA RIG (first-person, slow head-turn) ===================== */
  var camRig = {
    yaw: 0,           // radians, target
    pitch: 0,
    yawCur: 0,
    pitchCur: 0,
    yPos: 1.70,
    targetPos: new THREE.Vector3(0, 1.70, 18),
    posCur: new THREE.Vector3(0, 1.70, 18),
    breath: 0
  };
  // Henry's head turns SLOWER (he's 70). lerp factor ~0.035 instead of ~0.10
  var HEAD_LERP = 0.034;

  /* ===================== SCRIPT TIMELINE ===================== */
  // Total cycle ~ 720s (then loop). Events anchored to t (seconds since boot).
  // 0–30   : vestibule, looking at Lily (deep breath, last private moment)
  // 30–210 : the walk down the aisle (~180s, his act-1 climax)
  // 210–230: hand-off to Tomas, sit beside Margaret
  // 230–540: ceremony — vows, rings, kiss
  // 540    : CONVERGENCE — Lily turns, mouths "thank you, Dad"
  // 540–600: post-kiss, recessional begins
  // 600–720: reception toast (he stands and speaks)
  // loop

  // Internal-monologue lines, bittersweet & warm
  var monologue = [
    [  0, 5,"She's ready. I am not. But the music says we are."],
    [  5,12,"Margaret pinned the veil three times. \"It's perfect, Mum.\" Three times."],
    [ 12,22,"Eight pounds, two ounces. Forty years ago in that little hospital up the coast."],
    [ 22,30,"Don't trip on the runner, Henry. Don't trip on the runner."],
    [ 30,42,"Step. Pause. Step. The string quartet is patient. Be patient."],
    [ 42,55,"Her hand on my forearm — she's not gripping. She's steady. When did that happen?"],
    [ 55,70,"Tomas is at the altar. He looks the way I looked in '78 — terrified and lit up."],
    [ 70,86,"There's the Hawthorne family. There's old Reg. There's — God — there's her primary-school teacher."],
    [ 86,102,"Half this room watched her learn to walk. The other half is about to watch her get married."],
    [102,120,"She squeezes my arm. I think she felt me almost lose it."],
    [120,140,"I won't. Not yet. I budgeted for the toast. Save it for the toast."],
    [140,160,"Her mother is crying already. Margaret. Steady on, love. Steady on."],
    [160,180,"Six more steps. Five. Four. The smell of the lilies. Her name."],
    [180,200,"\"Who gives this woman?\" — I do. Her mother and I do. Of course we do."],
    [200,225,"Her arm leaves mine. I let go. I let go. I let go."],
    [225,260,"Margaret slides closer on the pew. I find her hand without looking. Forty-two years of finding her hand without looking."],
    [260,310,"He's good for her. I knew it the night he fixed the kitchen tap and stayed for tea."],
    [310,360,"Vows. Hers wobble at \"to grow with you.\" Mine wobbled at the same line in '78."],
    [360,420,"Rings. Tomas's hand is shaking. Good. He's taking this seriously."],
    [420,480,"They're laughing about something the officiant said. Margaret laughs once, sharp and surprised, and squeezes my hand."],
    [480,535,"Almost there. The kiss. The walk back. The toast. The dance. Then I can lose it in private."],
    [535,560,"She's turning. She's turning to look at me."],
    [560,605,"Tear-bright, both of us. She mouthed it. She mouthed it. I'll keep that one in a small box for the rest of my life."],
    [605,650,"Recessional. Confetti. Margaret threading her arm through mine. \"We did it,\" she says. We did, love. We did."],
    [650,720,"At the toast I'll say: Lily, you have always been our luck. Tomas, look after our luck. To the bride and groom."]
  ];

  // Phases for HUD
  function phaseAt(t){
    if(t<30) return 'vestibule';
    if(t<180) return 'walking the aisle';
    if(t<210) return 'hand-off';
    if(t<260) return 'sitting beside margaret';
    if(t<540) return 'ceremony';
    if(t<560) return 'CONVERGENCE';
    if(t<605) return 'recessional';
    return 'reception · the toast';
  }

  /* ===================== ANIMATION HELPERS ===================== */
  function lerp(a,b,k){ return a + (b-a)*k; }
  function clamp(x,a,b){ return x<a?a:(x>b?b:x); }
  function smooth(t){ return t*t*(3-2*t); }

  /* ===================== UI ELEMENTS ===================== */
  var hudClock = document.getElementById('hudClock');
  var hudPhase = document.getElementById('hudPhase');
  var hudPulse = document.getElementById('hudPulse');
  var chyTxt = document.getElementById('chyTxt');
  var convEl = document.getElementById('conv');
  var composeEl = document.getElementById('compose');
  var tearEl = document.getElementById('tear');
  var povList = document.getElementById('povList');

  function fmtClock(s){
    var m = Math.floor(s/60), ss = Math.floor(s%60);
    return 't+' + (m<10?'0':'') + m + ':' + (ss<10?'0':'') + ss;
  }

  function currentLine(t){
    for(var i=0;i<monologue.length;i++){
      if(t>=monologue[i][0] && t<monologue[i][1]) return monologue[i][2];
    }
    return monologue[monologue.length-1][2];
  }

  function updateTicker(){
    var ids = Object.keys(twinPOVs);
    var html = '';
    ids.sort();
    ids.forEach(function(id){
      var p = twinPOVs[id];
      var stale = (Date.now() - p.last_seen) > 8000;
      var meCls = (id===POV_ID) ? ' me' : '';
      html += '<div class="pov'+meCls+'" style="opacity:'+(stale?0.45:1)+'">'+
              '<span>'+p.label+'</span><span>'+ (p.t_local||0).toFixed(0) +'s</span></div>';
    });
    if(ids.length===1) html += '<div style="opacity:.5;margin-top:2px">(open another POV tab to sync)</div>';
    povList.innerHTML = html;
  }

  /* ===================== KEY MOMENT: 540s CONVERGENCE ===================== */
  var convergenceFired = false;
  var convergenceTime = 540;
  function fireConvergence(t){
    if(convergenceFired) return;
    convergenceFired = true;
    pov_self.convergence_at = Date.now() - masterClockOrigin;
    // append final entry to ledger
    convLedger.pov_log.push({
      pov_id: POV_ID,
      master_clock_at_join: pov_self.master_clock_at_join,
      convergence_at: pov_self.convergence_at,
      moment: "lily turned and mouthed: thank you, dad",
      t_local: t
    });
    writeJSON(CONV_KEY, convLedger);
    broadcastConvergence(t);

    convEl.innerHTML = 'convergence: <b>henry</b> — the father\'s hour.<br><span style="font-style:italic;font-size:18px;opacity:.92">she mouthed it: <i>thank you, Dad.</i></span>';
    convEl.style.opacity = 1;
    tearEl.classList.add('on');
    composeEl.classList.add('on');

    setTimeout(function(){ convEl.style.opacity = 0; }, 9000);
    setTimeout(function(){ tearEl.classList.remove('on'); composeEl.classList.remove('on'); }, 12000);
  }

  /* ===================== ANIMATION ===================== */
  var lastPulse = 0;
  var lastTickerTick = 0;
  var lastReseedCheck = 0;

  function animate(){
    requestAnimationFrame(animate);
    var nowMs = performance.now();
    var t = ((nowMs - T_START)/1000) % 720; // loop every 720s
    twinPOVs[POV_ID].t_local = t;
    twinPOVs[POV_ID].last_seen = Date.now();

    /* --- camera position over the timeline --- */
    var pos = camRig.targetPos;
    if(t < 30){
      // vestibule, slight sway, looking at Lily (off to the right)
      pos.set(0.0 + Math.sin(t*0.6)*0.02, 1.70, 18.0 - (t/30)*0.4);
      camRig.yaw   = -0.10 + Math.sin(t*0.4)*0.05; // glances at Lily on his left/right
      camRig.pitch = -0.02 + Math.sin(t*0.3)*0.02;
    } else if(t < 210){
      // walking the aisle slowly, ~180s, from z=17.6 to z=-13.8
      var u = (t - 30) / 180;            // 0..1
      var ue = smooth(clamp(u,0,1));
      var z = lerp(17.6, -13.8, ue);
      // measured stride bobbing (slow)
      var stride = Math.sin(t*1.4) * 0.025;
      var sway   = Math.sin(t*0.7) * 0.018;
      pos.set(sway*0.6, 1.70 + stride, z);
      // periodically glances at faces
      var gaze = Math.sin(t*0.42);
      camRig.yaw   = gaze*0.18 + Math.sin(t*0.21)*0.08;
      camRig.pitch = -0.02 + Math.sin(t*0.55)*0.012;
    } else if(t < 230){
      // hand-off & sit
      var u = (t-210)/20;
      var z = lerp(-13.8, -13.4, u);
      var x = lerp(0, -2.6, smooth(clamp(u,0,1)));
      var y = lerp(1.70, 1.32, smooth(clamp((t-220)/10,0,1))); // sits down on pew (eye drops)
      pos.set(x, y, z);
      camRig.yaw = lerp(0, 0.08, u);
      camRig.pitch = -0.02;
    } else if(t < 540){
      // seated next to Margaret, watching ceremony
      pos.set(-2.6, 1.32, -13.4);
      // subtle breathing + looking around
      var seg = (t - 230);
      camRig.yaw   = 0.05 + Math.sin(seg*0.18)*0.07 + Math.sin(seg*0.05)*0.05;
      camRig.pitch = -0.05 + Math.sin(seg*0.23)*0.015;
    } else if(t < 560){
      // CONVERGENCE — Lily turns, locks eyes
      pos.set(-2.6, 1.32, -13.4);
      // his head locks dead-center on Lily
      camRig.yaw   = lerp(0.08, 0.16, smooth(clamp((t-540)/4,0,1)));
      camRig.pitch = lerp(-0.05, -0.02, smooth(clamp((t-540)/4,0,1)));
    } else if(t < 605){
      // recessional starts; he stands; turns to watch them walk back
      var u = (t-560)/45;
      var y = lerp(1.32, 1.70, smooth(clamp((t-565)/8,0,1)));
      pos.set(-2.6, y, -13.4);
      camRig.yaw   = lerp(0.16, -0.45, smooth(clamp(u,0,1)));
      camRig.pitch = -0.02;
    } else {
      // reception toast — he stands at a head table further back
      pos.set(0, 1.72, 22);
      var seg = (t-605);
      camRig.yaw   = Math.sin(seg*0.15)*0.10;
      camRig.pitch = -0.04 + Math.sin(seg*0.25)*0.012;
    }

    // smooth (slow) head-turn — the hallmark of a 70-year-old
    camRig.yawCur   = lerp(camRig.yawCur,   camRig.yaw,   HEAD_LERP);
    camRig.pitchCur = lerp(camRig.pitchCur, camRig.pitch, HEAD_LERP);
    camRig.posCur.lerp(pos, 0.08);

    // breath-driven bob
    camRig.breath += 0.012;
    var breathY = Math.sin(camRig.breath) * 0.006;

    camera.position.copy(camRig.posCur);
    camera.position.y += breathY;
    camera.rotation.set(camRig.pitchCur, camRig.yawCur + Math.PI, 0, 'YXZ');
    // (Math.PI added because in vestibule we look toward -z; the aisle is at -z)

    /* --- Lily walks beside camera until t=210, then stays at altar facing Tomas --- */
    if(t < 30){
      lily.position.set(0.85 + Math.sin(t*0.8)*0.01, 0, 18.0 - (t/30)*0.4 - 0.05);
      lily.rotation.y = Math.PI;
    } else if(t < 210){
      var u = (t-30)/180;
      var ue = smooth(clamp(u,0,1));
      var z = lerp(17.55, -13.85, ue);
      lily.position.set(0.78, 0, z);
      lily.rotation.y = Math.PI + Math.sin(t*1.4)*0.05;
    } else if(t < 230){
      var u = (t-210)/20;
      lily.position.set(lerp(0.78, 0.4, u), 0, lerp(-13.85, -18.5, u));
      lily.rotation.y = Math.PI + lerp(0, -Math.PI*0.45, u);
    } else if(t < 540){
      lily.position.set(0.4, 0, -18.7);
      // turning between officiant and tomas
      lily.rotation.y = Math.PI*0.55 + Math.sin((t-230)*0.18)*0.05;
    } else if(t < 560){
      // turns BACK to look at her father — the convergence moment
      var u = (t-540)/6;
      lily.rotation.y = lerp(Math.PI*0.55, 0, smooth(clamp(u,0,1)));
      lily.position.set(0.4, 0, -18.7);
    } else if(t < 605){
      // recessional walk back
      var u = (t-560)/45;
      var ue = smooth(clamp(u,0,1));
      lily.position.set(lerp(0.4, 0.0, ue), 0, lerp(-18.7, 19.0, ue));
      lily.rotation.y = lerp(0, 0, ue);
    } else {
      lily.position.set(-0.6, 0, 22);
      lily.rotation.y = Math.PI;
    }

    // Tomas turns to look at her at convergence too
    if(t>=540 && t<560){
      tomas.rotation.y = lerp(Math.PI, Math.PI*0.95, smooth((t-540)/8));
    }

    // candle flicker
    for(var fi=0; fi<flameLights.length; fi++){
      flameLights[fi].intensity = 0.55 + Math.sin(t*9 + fi)*0.15 + (rand()-0.5)*0.05;
    }

    placeArm();

    /* === HUD === */
    hudClock.textContent = fmtClock(t);
    hudPhase.textContent = phaseAt(t);
    chyTxt.textContent = currentLine(t);

    // brow-furrow blur — composing himself during heavier moments
    var blurOn = (t>22 && t<30) || (t>120 && t<142) || (t>180 && t<205) || (t>535 && t<562) || (t>655 && t<700);
    if(blurOn) composeEl.classList.add('on'); else if(!convergenceFired || t>590) composeEl.classList.remove('on');

    // pulse beat
    if(nowMs - lastPulse > 1000){
      lastPulse = nowMs;
      hudPulse.textContent = '· master_clock '+ Math.floor((Date.now()-masterClockOrigin)/1000) +'s · seed '+SEED.toString(36);
      broadcastPulse(t);
    }

    if(nowMs - lastTickerTick > 800){
      lastTickerTick = nowMs;
      updateTicker();
    }

    // reseed check (every second is plenty)
    if(nowMs - lastReseedCheck > 2000){
      lastReseedCheck = nowMs;
      var s = currentSeed();
      if(s !== SEED){
        SEED = s; rand = mulberry32(SEED ^ 0x48454e52);
        document.getElementById('seedTag').textContent = 'seed '+SEED.toString(36)+' (reseed)';
      }
    }

    /* === 540s CONVERGENCE === */
    if(t >= convergenceTime && !convergenceFired){
      fireConvergence(t);
    }

    renderer.render(scene, camera);
  }

  animate();

  /* periodic ledger persist (lightweight) */
  setInterval(function(){
    // keep the most recent self entry's t_local up to date but don't spam
    var last = convLedger.pov_log[convLedger.pov_log.length-1];
    if(last && last.pov_id===POV_ID){
      last.t_local = ((performance.now() - T_START)/1000) % 720;
      writeJSON(CONV_KEY, convLedger);
    }
  }, 5000);

  /* leave a small footprint in the broader brimsworth ledgers (cross-read attestation) */
  (function attest(){
    var att = readJSON('brimsworth_lifetime_v1', {chapters:[]});
    att.chapters = att.chapters || [];
    var key = 'henry_sr_walk_aisle_'+SEED;
    if(!att.chapters.some(function(c){return c.key===key;})){
      att.chapters.push({key:key, who:'henry_sr', age:70, beat:'walks lily down the aisle', from_pov:'henry', t:Date.now()});
      writeJSON('brimsworth_lifetime_v1', att);
    }
  })();

})();
</script>
