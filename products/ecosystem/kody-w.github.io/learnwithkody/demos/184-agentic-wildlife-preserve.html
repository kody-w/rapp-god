  const mapCtx=mapCv.getContext("2d");
  const graphCv=document.getElementById("graph");
  const graphCtx=graphCv.getContext("2d");

  function loadMem(){
    try{const j=localStorage.getItem(STORE_KEY);if(j)return JSON.parse(j);}catch(e){}
    return {day:1,reseeds:0,sightings:[],hunts:[],herdMoves:[],tagged:{},log:[]};
  }
  function saveMem(m){try{localStorage.setItem(STORE_KEY,JSON.stringify(m));}catch(e){}}
  let memory=loadMem();
  memory.reseeds=(memory.reseeds||0)+1;
  memory.day=(memory.day||1)+(memory.reseeds>1?1:0);
  if(!memory.sightings)memory.sightings=[];
  if(!memory.hunts)memory.hunts=[];
  if(!memory.herdMoves)memory.herdMoves=[];
  if(!memory.tagged)memory.tagged={};
  if(!memory.log)memory.log=[];
  saveMem(memory);

  const ZONES=[
    {id:0,name:"SAVANNA",palette:{ground:0xc9a55a,grass:0xd4b56a,sky:0x9ec8e0,accent:0x8a6a2a,bg:0xc9d4e8},
     mapPos:[0.30,0.32],mapSize:[0.30,0.28]},
    {id:1,name:"WATER HOLE",palette:{ground:0x6a8a5a,grass:0x7aa46a,sky:0xa8c8d8,accent:0x3a6ab0,bg:0xa8c8d8},
     mapPos:[0.62,0.50],mapSize:[0.22,0.26]},
    {id:2,name:"JUNGLE",palette:{ground:0x2a4a26,grass:0x3a6a32,sky:0x6a8a4a,accent:0xe89a3a,bg:0x1a2a14},

    {id:3,name:"MOUNTAIN",palette:{ground:0x6a6a72,grass:0x8a8a92,sky:0xa8b4d4,accent:0x9a7ad4,bg:0x7a8aa0},
     mapPos:[0.18,0.78],mapSize:[0.20,0.20]},
    {id:4,name:"RANGER STATION",palette:{ground:0x6b432a,grass:0x8a6a3a,sky:0xc0c8d0,accent:0xd4b56a,bg:0x4a3a26},
     mapPos:[0.18,0.18],mapSize:[0.18,0.18]}
  ];

  const RANGERS=[
    {id:0,name:"Chief Ranger Kavi Mansoor",short:"Kavi",role:"Chief Ranger",
     goal:"Tag the alpha lion",mood:"Steady",home:4,target:"Maximus",
     plan:["Brief crew at station","Drive jeep to savanna","Track Maximus","Dart and tag"]},
    {id:1,name:"Ranger Esi Boateng",short:"Esi",role:"Jungle specialist",
     goal:"Count the toucan flock",mood:"Curious",home:2,target:"Mango",

    {id:2,name:"Ranger Pip Sundeen",short:"Pip",role:"Mountain specialist",

  const ANIMALS=[
    {id:0,name:"Maximus",species:"lion",home:0,role:"alpha lion",
     goal:"Stalk zebras at dawn",mood:"Focused",
     plan:["Wake under acacia","Scan herd","Stalk low","Decide hunt"]},
    {id:1,name:"Nala-cub",species:"lion",home:0,role:"cub",

    {id:2,name:"Brigida",species:"lion",home:0,role:"lioness",

    {id:3,name:"Tembo",species:"elephant",home:0,role:"matriarch",

    {id:4,name:"Kibo",species:"elephant",home:0,role:"bull",

    {id:6,name:"Stretch",species:"giraffe",home:0,role:"bull",

    {id:7,name:"Banah",species:"giraffe",home:0,role:"cow",

    {id:8,name:"Pinstripe",species:"zebra",home:0,role:"stallion",

    {id:9,name:"Domino",species:"zebra",home:0,role:"mare",

    {id:10,name:"Pajamas",species:"zebra",home:0,role:"foal",

     plan:["Tuck between mares","Mimic the gallop","Splash at edge","Rest in dust"]},
    {id:11,name:"Vela",species:"eagle",home:3,role:"matriarch eagle",
     goal:"Soar all five zones",mood:"Imperial",
     plan:["Launch from cliff","Ride the thermal","Scan the savanna","Return to nest"]},
    {id:12,name:"Mango",species:"toucan",home:2,role:"flock leader",
     goal:"Lead flock to bloom tree",mood:"Bright",
     plan:["Call from canopy","Swoop the vines","Pick at bloom","Roost with Plum"]},
    {id:13,name:"Plum",species:"toucan",home:2,role:"mate",

    {id:14,name:"Kiki",species:"monkey",home:2,role:"troop leader",

    {id:15,name:"Bananaman",species:"monkey",home:2,role:"trickster",

     plan:["Tail Kiki low","Snatch a fruit","Bound to high vine","Munch hidden"]},
    {id:16,name:"Toodle",species:"monkey",home:2,role:"juvenile",
     goal:"Copy Kiki",mood:"Eager",
     plan:["Mimic the swing","Miss the branch","Catch the next","Cling and chitter"]},
    {id:17,name:"Comet",species:"cheetah",home:0,role:"lone hunter",
     goal:"Sprint the savanna at dusk",mood:"Coiled",
     plan:["Wait in tall grass","Pick a runner","Burst","Walk it off"]},
    {id:18,name:"Nestor",species:"crocodile",home:1,role:"old croc",
     goal:"Sun on the log",mood:"Ancient",
     plan:["Float still","Slide to log","Yawn at sun","Drift back to reeds"]},
    {id:19,name:"Big Bess",species:"hippo",home:1,role:"matriarch hippo",

     plan:["Submerge to eyes","Yawn enormous","Mud-roll at noon","Bellow at dusk"]}
  ];

  const NAME_POOL=[
    "Acacia","Banyan","Cinder","Dapple","Echo","Fern","Glimmer","Hazel","Ibis","Juno",
    "Kestrel","Loam","Mosshart","Nimbus","Oryx","Petal","Quill","Rowan","Sable","Tinder",
    "Umber","Vesper","Willow","Xena","Yarrow","Zephyr","Aspen","Birch","Cricket","Drift"
  ];

  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=false;
  stage.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0xc9d4e8,40,160);
  scene.background=new THREE.Color(0xc9d4e8);

  const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,500);
  camera.position.set(0,18,32);
  camera.lookAt(0,2,0);

  const disposables=[];
  function track(o){disposables.push(o);return o;}
  function disposeMaterial(m){
    if(!m)return;
    if(m.map)m.map.dispose&&m.map.dispose();
    if(Array.isArray(m))m.forEach(x=>x&&x.dispose&&x.dispose());
    else m.dispose&&m.dispose();
  }
  function disposeAll(){
    scene.traverse(o=>{
      if(o.geometry)o.geometry.dispose();
      if(o.material)disposeMaterial(o.material);
    });
    while(scene.children.length)scene.remove(scene.children[0]);
    disposables.forEach(d=>{
      if(d&&d.geometry)d.geometry.dispose();
      if(d&&d.material)disposeMaterial(d.material);
    });
    disposables.length=0;
  }

  const ambient=new THREE.AmbientLight(0xfff0d8,0.65);
  scene.add(ambient);
  const sun=new THREE.DirectionalLight(0xfff0c8,0.95);
  sun.position.set(40,80,30);
  scene.add(sun);
  const warmFill=new THREE.PointLight(0xffae6a,0.45,80);
  warmFill.position.set(0,12,0);
  scene.add(warmFill);

  const zoneRoots=[];
  for(let i=0;i<ZONES.length;i++){
    const g=new THREE.Group();
    g.visible=(i===0);
    scene.add(g);
    zoneRoots.push(g);
  }

  function addMesh(root,geo,mat,x,y,z){
    const m=new THREE.Mesh(geo,mat);
    m.position.set(x,y,z);
    root.add(m);
    return m;
  }

  function buildSavanna(root,c){
    const ground=new THREE.Mesh(
      new THREE.PlaneGeometry(180,180,8,8),
      new THREE.MeshStandardMaterial({color:c.palette.ground,roughness:0.95})
    );
    ground.rotation.x=-Math.PI/2;
    root.add(ground);
    for(let i=0;i<60;i++){
      const tuft=new THREE.Mesh(
        new THREE.ConeGeometry(0.4+Math.random()*0.4,0.8+Math.random()*0.6,5),
        new THREE.MeshStandardMaterial({color:c.palette.grass,roughness:1})
      );
      tuft.position.set((Math.random()-0.5)*120,0.4,(Math.random()-0.5)*120);
      root.add(tuft);
    }
    const trunk=new THREE.Mesh(
      new THREE.CylinderGeometry(0.6,0.9,8,8),
      new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:0.9})
    );
    trunk.position.set(-14,4,-8);
    root.add(trunk);
    const canopy=new THREE.Mesh(
      new THREE.SphereGeometry(6,12,8),
      new THREE.MeshStandardMaterial({color:0x4a6a3a,roughness:0.9})
    );
    canopy.scale.set(1.4,0.5,1.4);
    canopy.position.set(-14,9,-8);
    root.add(canopy);
    const hole=new THREE.Mesh(
      new THREE.CircleGeometry(4,18),
      new THREE.MeshStandardMaterial({color:0x4a6ac0,roughness:0.4,metalness:0.2})
    );
    hole.rotation.x=-Math.PI/2;
    hole.position.set(18,0.05,12);
    root.add(hole);
    for(let i=0;i<8;i++){
      const stone=new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.6+Math.random()*0.6),
        new THREE.MeshStandardMaterial({color:0xa89870,roughness:1})
      );
      stone.position.set(18+Math.cos(i)*4.4,0.3,12+Math.sin(i)*4.4);
      root.add(stone);
    }
  }

  function buildWaterHole(root,c){
    const ground=new THREE.Mesh(
      new THREE.PlaneGeometry(120,120,8,8),
      new THREE.MeshStandardMaterial({color:c.palette.ground,roughness:0.9})
    );
    ground.rotation.x=-Math.PI/2;
    root.add(ground);
    const pond=new THREE.Mesh(
      new THREE.CircleGeometry(18,32),
      new THREE.MeshStandardMaterial({color:c.palette.accent,roughness:0.3,metalness:0.3})
    );
    pond.rotation.x=-Math.PI/2;
    pond.position.set(0,0.04,0);
    root.add(pond);
    const mud=new THREE.Mesh(
      new THREE.RingGeometry(18,22,32),
      new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:1})
    );
    mud.rotation.x=-Math.PI/2;
    mud.position.y=0.03;
    root.add(mud);
    for(let i=0;i<28;i++){
      const a=Math.random()*Math.PI*2;
      const r=22+Math.random()*4;
      const reed=new THREE.Mesh(
        new THREE.CylinderGeometry(0.05,0.05,2.4,4),
        new THREE.MeshStandardMaterial({color:0x4a6a32,roughness:1})
      );
      reed.position.set(Math.cos(a)*r,1.2,Math.sin(a)*r);
      root.add(reed);
    }
    const log=new THREE.Mesh(
      new THREE.CylinderGeometry(0.6,0.6,6,8),
      new THREE.MeshStandardMaterial({color:0x4a3220,roughness:1})
    );
    log.rotation.z=Math.PI/2;
    log.position.set(-14,0.6,0);
    root.add(log);
    for(let i=0;i<6;i++){
      const perch=new THREE.Mesh(
        new THREE.CylinderGeometry(0.06,0.06,3,4),
        new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:1})
      );
      perch.position.set(-22+i*7,1.5,-22);
      root.add(perch);
    }
  }

  function buildJungle(root,c){
    const ground=new THREE.Mesh(
      new THREE.PlaneGeometry(140,140,4,4),

    );
    ground.rotation.x=-Math.PI/2;
    root.add(ground);
    for(let i=0;i<28;i++){
      const x=(Math.random()-0.5)*100;
      const z=(Math.random()-0.5)*100;
      const h=10+Math.random()*8;
      const trunk=new THREE.Mesh(
        new THREE.CylinderGeometry(0.5,0.7,h,6),
        new THREE.MeshStandardMaterial({color:0x4a3220,roughness:1})
      );
      trunk.position.set(x,h/2,z);
      root.add(trunk);
      const leaves=new THREE.Mesh(
        new THREE.SphereGeometry(3+Math.random()*1.5,8,6),
        new THREE.MeshStandardMaterial({color:c.palette.grass,roughness:0.9})
      );
      leaves.scale.set(1.2,0.8,1.2);
      leaves.position.set(x,h+1,z);
      root.add(leaves);

    for(let i=0;i<12;i++){
      const bloom=new THREE.Mesh(

    root.add(tree);
    for(let i=0;i<6;i++){
      const branch=new THREE.Mesh(
        new THREE.CylinderGeometry(0.2,0.3,5,5),
        new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:1})

      branch.rotation.z=Math.PI/2.4;
      branch.rotation.y=i*Math.PI/3;
      branch.position.set(Math.cos(i)*2.5,10+i*0.3,Math.sin(i)*2.5);

  function buildMountain(root,c){
    const ground=new THREE.Mesh(

    obs.position.set(8,12,-4);

  const trailLines={};
  function ensureTrail(actorKey,color){
    if(trailLines[actorKey])return trailLines[actorKey];
    const geom=new THREE.BufferGeometry();
    geom.setAttribute("position",new THREE.BufferAttribute(new Float32Array(60*3),3));
    const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.6});
    const line=new THREE.Line(geom,mat);
    line.frustumCulled=false;
    scene.add(line);
    trailLines[actorKey]={line,points:[],color};
    return trailLines[actorKey];
  }
  function pushTrail(actorKey,pos){
    const t=trailLines[actorKey];
    if(!t)return;
    t.points.push(pos.clone());
    if(t.points.length>20)t.points.shift();
    const arr=t.line.geometry.attributes.position.array;
    for(let i=0;i<20;i++){
      const p=t.points[i]||t.points[t.points.length-1]||new THREE.Vector3();
      arr[i*3]=p.x;arr[i*3+1]=(p.y||0)+0.05;arr[i*3+2]=p.z;
    }
    t.line.geometry.attributes.position.needsUpdate=true;
    t.line.geometry.setDrawRange(0,t.points.length);
  }

  function setZone(z){
    if(z===currentZone)return;
    zoneRoots.forEach((g,i)=>{g.visible=(i===z);});
    currentZone=z;
    const c=ZONES[z];
    scene.background=new THREE.Color(c.palette.bg);
    scene.fog.color=new THREE.Color(c.palette.bg);
    showToast("ENTERING "+c.name);
    memory.log.push({day:memory.day,zone:c.name,t:Date.now()});
    if(memory.log.length>40)memory.log.shift();
    saveMem(memory);
    chooseCameraForZone(z);
  }

  function chooseCameraForZone(z){
    const opts=CAMERAS.filter(c=>c.zone===z);
    if(opts.length){
      const pick=opts[Math.floor(Math.random()*opts.length)];
      cameraIdx=CAMERAS.indexOf(pick);
    }
    cameraSwitchTime=0;

    saveMem(memory);
  }

  function showToast(s){
    toast.textContent=s;
    toast.style.opacity=1;
    setTimeout(()=>{toast.style.opacity=0;},1700);
  }

  function pickFocus(){
    const all=[...ANIMALS.map((a,i)=>({k:"A"+i,obj:a,kind:"animal"})),...RANGERS.map((r,i)=>({k:"R"+i,obj:r,kind:"ranger"}))];
    return all[Math.floor(Math.random()*all.length)];
  }
  focusActor=pickFocus();

  function renderBrain(){
    if(!focusActor)return;
    const o=focusActor.obj;
    const stepIdx=Math.floor((storyTime/9)%o.plan.length);
    const need=focusActor.kind==="ranger"?
      ("Find "+(o.target||"target")):
      (o.species==="elephant"?"All 3 elephants + safe path":
       o.species==="lion"?"Cover + a gap in the dazzle":
       o.species==="eagle"?"Updraft + clear sky":
       o.species==="zebra"?"Herd cohesion":
       o.species==="monkey"?"Branches + ripe fruit":
       o.species==="toucan"?"Bloom tree in reach":
       o.species==="giraffe"?"Tall acacia leaves":
       o.species==="cheetah"?"Open lane to sprint":
       o.species==="crocodile"?"Sun and still water":
       o.species==="hippo"?"Deep mud":"Quiet ground");
    const have=focusActor.kind==="ranger"?"Jeep, radio, log":"Kin nearby, terrain known";
    brainEl.innerHTML=
      "<h4>"+o.name.toUpperCase()+"</h4>"+
      "<div class='row'>"+(focusActor.kind==="ranger"?o.role:(o.role+" · "+o.species))+"</div>"+
      "<div class='row'><span class='lbl'>GOAL</span>"+o.goal+"</div>"+
      "<div class='row'><span class='lbl'>NEED</span>"+need+"</div>"+
      "<div class='row'><span class='lbl'>HAVE</span>"+have+"</div>"+
      "<div class='row'><span class='lbl'>PLAN</span>"+o.plan.join(" → ")+"</div>"+
      "<div class='row'><span class='lbl'>STEP</span>"+(stepIdx+1)+" of "+o.plan.length+" ("+o.plan[stepIdx]+")</div>"+
      "<div class='row'><span class='lbl'>MOOD</span>"+o.mood+"</div>";
  }

  function renderHud(){
    const z=ZONES[currentZone];
    const here=ANIMALS.filter(a=>a.home===currentZone).length;
    const headline=focusActor&&focusActor.kind==="animal"&&focusActor.obj.home===currentZone?
      (focusActor.obj.name.toUpperCase()+" "+focusActor.obj.plan[0].toUpperCase()):
      "RESERVE QUIET";
    hud.innerHTML=
      "<b>GREATPINE WILDLIFE RESERVE</b><br>"+
      "Day "+memory.day+" · Reseed "+memory.reseeds+"<br>"+
      "ZONE "+(currentZone+1)+" OF 5: "+z.name+" · "+here+" NAMED ANIMALS · "+headline+"<br>"+
      "<i style='color:#a9d27a'>Camera: "+CAMERAS[cameraIdx].name+"</i>";
    let ch="<b>CAST</b><br>";
    RANGERS.forEach(r=>{ch+="<span class='nm'>"+r.short+"</span> · <span class='gl'>"+r.goal+"</span><br>";});
    const focusAnimals=ANIMALS.slice(0,6);
    focusAnimals.forEach(a=>{ch+="<span class='nm'>"+a.name+"</span> · <span class='gl'>"+a.goal+"</span><br>";});
    castEl.innerHTML=ch;
  }

  function renderBalance(){
    const lions=ANIMALS.filter(a=>a.species==="lion").length;
    const cheetahs=ANIMALS.filter(a=>a.species==="cheetah").length;
    const zebras=ANIMALS.filter(a=>a.species==="zebra").length;
    const elephants=ANIMALS.filter(a=>a.species==="elephant").length;
    const giraffes=ANIMALS.filter(a=>a.species==="giraffe").length;
    const balance=(zebras+elephants+giraffes>=lions+cheetahs+1)?"HEALTHY":"WATCHFUL";
    balanceEl.innerHTML="<b>ECOSYSTEM</b> · Pride: "+lions+" lions · Cheetah: "+cheetahs+" · Herd: "+(zebras+elephants+giraffes)+" grazers · Balance: <b>"+balance+"</b>";
  }

  function renderMap(){
    const w=mapCv.width,h=mapCv.height;
    mapCtx.clearRect(0,0,w,h);
    mapCtx.fillStyle="#0a1410";
    mapCtx.fillRect(0,0,w,h);
    ZONES.forEach((z,i)=>{
      mapCtx.fillStyle=i===currentZone?"#9cd47a":"rgba(184,168,106,0.4)";
      const x=z.mapPos[0]*w,y=z.mapPos[1]*h;
      const sw=z.mapSize[0]*w,sh=z.mapSize[1]*h;
      mapCtx.fillRect(x-sw/2,y-sh/2,sw,sh);
      mapCtx.fillStyle="#0a1410";
      mapCtx.font="9px Georgia";
      mapCtx.textAlign="center";
      mapCtx.fillText(z.name,x,y+3);
    });
    ANIMALS.forEach(a=>{
      const z=ZONES[a.home];
      const x=z.mapPos[0]*w+(Math.random()-0.5)*z.mapSize[0]*w*0.6;
      const y=z.mapPos[1]*h+(Math.random()-0.5)*z.mapSize[1]*h*0.6;
      mapCtx.fillStyle=SPECIES_TRAIL_COLORS[a.species]?
        "#"+SPECIES_TRAIL_COLORS[a.species].toString(16).padStart(6,"0"):"#fff";
      mapCtx.beginPath();mapCtx.arc(x,y,1.6,0,Math.PI*2);mapCtx.fill();
    });
    RANGERS.forEach(r=>{
      const z=ZONES[r.home];
      const x=z.mapPos[0]*w,y=z.mapPos[1]*h-z.mapSize[1]*h*0.3;
      mapCtx.fillStyle="#9cd47a";
      mapCtx.beginPath();mapCtx.arc(x,y,2.4,0,Math.PI*2);mapCtx.fill();
    });
  }

  function renderGraph(){
    const w=graphCv.width,h=graphCv.height;
    graphCtx.clearRect(0,0,w,h);
    graphCtx.fillStyle="rgba(8,16,12,0.9)";
    graphCtx.fillRect(0,0,w,h);
    graphCtx.fillStyle="#ffd97a";
    graphCtx.font="14px Georgia";
    graphCtx.fillText("Greatpine · Day "+memory.day+" · Reseed "+memory.reseeds,18,30);
    graphCtx.font="11px 'Courier New'";
    graphCtx.fillStyle="#a9d27a";
    graphCtx.fillText("HERD MOVEMENTS",18,56);
    graphCtx.fillStyle="#e9d8b0";
    const moves=memory.herdMoves.slice(-7);
    moves.forEach((m,i)=>{
      graphCtx.fillText("Day "+m.day+" · "+m.from+" → "+m.to,28,76+i*14);
    });
    graphCtx.fillStyle="#a9d27a";
    graphCtx.fillText("RANGER SIGHTINGS",18,196);
    graphCtx.fillStyle="#e9d8b0";
    const s=memory.sightings.slice(-6);
    s.forEach((m,i)=>{
      graphCtx.fillText(m.ranger+" → "+m.animal+" ("+m.zone+")",28,216+i*14);
    });
    graphCtx.fillStyle="#a9d27a";
    graphCtx.fillText("HUNT CYCLE",260,196);
    graphCtx.fillStyle="#e9d8b0";
    const hu=memory.hunts.slice(-6);
    hu.forEach((m,i)=>{
      graphCtx.fillText(m.predator+" pursued "+m.prey+" ("+m.outcome+")",270,216+i*14);
    });
  }

  let storyArc=[
    "Day {D} Act 1 — Dawn lifts off the savanna. Tembo trumpets the herd awake.",
    "Day {D} Act 2 — Maximus stalks zebras at dawn. Vela soars over the cliff.",
    "Day {D} Act 3 — Tembo leads the herd to the water hole. Big Bess yawns awake.",
    "Day {D} Act 4 — Esi counts toucans along the canopy. Pip glasses the eagle nest.",
    "Day {D} Act 5 — Comet picks a lane at dusk. Kavi's jeep finds Maximus' tracks.",
    "Day {D} Act 6 — The reserve quiets. Rangers radio the day's sightings home."
  ];

  function pushChyron(){
    const beat=Math.floor(storyTime/22)%storyArc.length;
    chyron.textContent=storyArc[beat].replace("{D}",memory.day);
  }

  function maybeSighting(){
    if(Math.random()>0.7){
      const r=RANGERS[Math.floor(Math.random()*RANGERS.length)];
      const candidates=ANIMALS.filter(a=>a.home===currentZone||a.home===r.home);
      if(!candidates.length)return;
      const a=candidates[Math.floor(Math.random()*candidates.length)];
      memory.sightings.push({day:memory.day,ranger:r.short,animal:a.name,zone:ZONES[currentZone].name});
      if(memory.sightings.length>30)memory.sightings.shift();
      memory.tagged[a.name]=(memory.tagged[a.name]||0)+1;
      saveMem(memory);
      const m=actorMeshes["A"+ANIMALS.indexOf(a)];
      if(m)spawnSparkle(m.position);
      showToast(r.short+" SPOTS "+a.name.toUpperCase());
    }
  }

  function maybeHunt(){
    if(Math.random()>0.85){
      const preds=ANIMALS.filter(a=>a.species==="lion"||a.species==="cheetah");
      const prey=ANIMALS.filter(a=>a.species==="zebra"||a.species==="giraffe");
      if(!preds.length||!prey.length)return;
      const p=preds[Math.floor(Math.random()*preds.length)];
      const q=prey[Math.floor(Math.random()*prey.length)];
      const ok=Math.random()>0.5;
      memory.hunts.push({day:memory.day,predator:p.name,prey:q.name,outcome:ok?"successful":"prey escaped"});
      if(memory.hunts.length>30)memory.hunts.shift();
      saveMem(memory);
      chyron.textContent=p.name+(ok?" successfully hunts on the savanna.":" stalks "+q.name+", who escapes into the dazzle.");
    }
  }

  function tickActors(dt,t){
    ANIMALS.forEach((a,i)=>{
      const k="A"+i;
      const m=actorMeshes[k];
      if(!m)return;
      const z=a.home;
      const cx=Math.cos(t*0.2+i)*0.04;
      const cz=Math.sin(t*0.2+i)*0.04;
      if(a.species==="eagle"){
        const r=14+Math.sin(t*0.1+i)*4;
        m.position.set(Math.cos(t*0.13+i)*r,16+Math.sin(t*0.21+i)*5,Math.sin(t*0.13+i)*r);
      }else if(a.species==="crocodile"){
        m.position.set(-14+Math.cos(t*0.04)*0.3,0.6,Math.sin(t*0.05)*0.3);
      }else if(a.species==="hippo"){
        m.position.set(Math.cos(t*0.06+i)*4,0.4+Math.sin(t*0.4)*0.05,Math.sin(t*0.06+i)*4);
      }else{
        m.position.x+=cx;m.position.z+=cz;
        const lim=18;
        if(m.position.x>lim)m.position.x=lim;
        if(m.position.x<-lim)m.position.x=-lim;
        if(m.position.z>lim)m.position.z=lim;
        if(m.position.z<-lim)m.position.z=-lim;
        m.rotation.y=Math.atan2(cz,cx);
      }
      if(z===currentZone){
        pushTrail(k,m.position);
      }
      if(focusActor&&focusActor.k===k){
        const d=ensureDiamond(k);
        d.visible=true;
        d.position.set(m.position.x,m.position.y+(a.species==="eagle"?0.8:2.2),m.position.z);
        d.rotation.y=t*1.2;
      }else{
        const d=decisionDiamonds[k];
        if(d)d.visible=false;
      }
    });
    RANGERS.forEach((r,i)=>{
      const k="R"+i;
      const m=actorMeshes[k];
      if(!m)return;
      const cx=Math.cos(t*0.18+i*1.3)*0.05;
      const cz=Math.sin(t*0.18+i*1.3)*0.05;
      m.position.x+=cx;m.position.z+=cz;
      if(r.home===currentZone){pushTrail(k,m.position);}
      m.rotation.y=Math.atan2(cz,cx);
      if(focusActor&&focusActor.k===k){
        const d=ensureDiamond(k);
        d.visible=true;
        d.position.set(m.position.x,m.position.y+2.4,m.position.z);
        d.rotation.y=t*1.2;
      }else{
        const d=decisionDiamonds[k];
        if(d)d.visible=false;
      }
    });
    ambientHerds.forEach((h,i)=>{
      h.seed+=dt*0.3;
      if(h.species==="eagle"){
        const r=20+Math.sin(h.seed)*4;
        h.mesh.position.x=Math.cos(h.seed)*r;
        h.mesh.position.z=Math.sin(h.seed)*r;
        h.mesh.position.y=14+Math.sin(h.seed*1.3)*3;
      }else{
        h.mesh.position.x+=Math.cos(h.seed)*0.02;
        h.mesh.position.z+=Math.sin(h.seed)*0.02;
        h.mesh.rotation.y=h.seed;
      }
    });
    for(let i=sparkles.length-1;i>=0;i--){
      const sp=sparkles[i];
      sp.age+=dt;
      sp.g.children.forEach(c=>{
        c.position.y+=dt*0.6;
        c.material.opacity=Math.max(0,1-sp.age/sp.life);
      });
      if(sp.age>=sp.life){
        sp.g.children.forEach(c=>{c.geometry.dispose();c.material.dispose();});
        scene.remove(sp.g);
        sparkles.splice(i,1);
      }
    }
  }

  function applyCamera(t){
    const cam=CAMERAS[cameraIdx];
    if(cam.zone!==currentZone){
      chooseCameraForZone(currentZone);
      return;
    }
    cam.fn(t,camera);
  }

  function tickPortal(dt){
    if(!portalActive)return;
    portalT+=dt;
    const k=portalT/portalDur;
    const arc=Math.sin(k*Math.PI);
    camera.position.set(
      Math.cos(k*Math.PI)*40,
      40+arc*20,
      Math.sin(k*Math.PI)*40
    );
    camera.lookAt(0,0,0);
    if(k>0.5&&zoneRoots[portalTo].visible===false){
      zoneRoots.forEach((g,i)=>{g.visible=(i===portalTo);});
      const c=ZONES[portalTo];
      scene.background=new THREE.Color(c.palette.bg);
      scene.fog.color=new THREE.Color(c.palette.bg);
      currentZone=portalTo;
    }
    if(portalT>=portalDur){
      portalActive=false;
      chooseCameraForZone(portalTo);
      lastZoneSwitch=performance.now()/1000;
    }
  }

  let last=performance.now()/1000;
  let graphTimer=0;
  function frame(now){
    const t=now/1000;
    const dt=Math.min(0.06,t-last);
    last=t;
    storyTime+=dt;thinkTime+=dt;balanceTime+=dt;cameraSwitchTime+=dt;graphTimer+=dt;
    if(!portalActive){
      applyCamera(t);
      if(cameraSwitchTime>11){
        const opts=CAMERAS.map((c,i)=>({c,i})).filter(x=>x.c.zone===currentZone&&x.i!==cameraIdx);
        if(opts.length){
          cameraIdx=opts[Math.floor(Math.random()*opts.length)].i;
        }
        cameraSwitchTime=0;
      }
      const sinceZ=t-lastZoneSwitch;
      if(sinceZ>(60+Math.random()*30)){
        const next=(currentZone+1+Math.floor(Math.random()*4))%5;
        startPortal(next);
      }
    }else{
      tickPortal(dt);
    }
    tickActors(dt,t);
    if(thinkTime>4){
      thinkTime=0;
      if(Math.random()>0.5)focusActor=pickFocus();
      maybeSighting();
      maybeHunt();
    }
    if(balanceTime>2){balanceTime=0;renderBalance();}
    if(graphTimer>1.4){graphTimer=0;renderMap();}
    renderBrain();renderHud();pushChyron();
    renderer.render(scene,camera);
    rafId=requestAnimationFrame(frame);
  }
  let rafId=requestAnimationFrame(frame);
  renderGraph();
  setInterval(renderGraph,4000);

  setTimeout(()=>{graphCv.style.display="block";setTimeout(()=>{graphCv.style.display="none";},9000);},25000);

  document.addEventListener("keydown",e=>{
    if(e.key==="g"||e.key==="G"){graphCv.style.display=graphCv.style.display==="block"?"none":"block";}
    if(e.key==="c"||e.key==="C"){cameraIdx=(cameraIdx+1)%CAMERAS.length;chooseCameraForZone(currentZone);}
  });

  window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  setTimeout(function reseed(){
    cancelAnimationFrame(rafId);
    disposeAll();
    renderer.dispose();
    location.reload();
  },10*60*1000);

  showToast("DAY "+memory.day+" · GREATPINE RESERVE");
})();
</script>
</body>
</html>
