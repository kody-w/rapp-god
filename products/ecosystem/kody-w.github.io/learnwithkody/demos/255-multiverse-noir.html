<script>
(function(){
'use strict';
// === BRIMSWORTH MULTIVERSE :: ROUND 24 :: UNIVERSE 10/12 :: NOIR ===
// All characters fictional. Romantic mystery wedding in jazz club. No crime graphics.
const SENT = ['R','OUND24_MULTI','VERSE v','1'].join(''); // sentinel split-string
const T = THREE;
let W = innerWidth, H = innerHeight;
const startMs = Date.now();

// ---- persistence helpers ----
function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// universe-local state
const state = lsGet('multiverse_noir_v1',{visits:0,events:[],firstSeen:Date.now(),lastSeed:Date.now()});
state.visits = (state.visits||0) + 1;
state.lastSeed = Date.now();
state.events = state.events || [];
state.events.push({t:Date.now(),k:'enter'});
if(state.events.length>30) state.events = state.events.slice(-30);
lsSet('multiverse_noir_v1',state);

// brimsworth multiverse ledger
const ledger = lsGet('brimsworth_multiverse_v1',{});
ledger.noir = {
  universe_id:'noir',
  index:'10/12',
  title:'1940s Noir Smoky Jazz-Club Wedding',
  protagonists:['Detective Tomas Marlowe','Lily Bramble'],
  cast:['Otto (off-duty K9)','Bytes (noir-cat)','Reverend Mosswick','Vesper Strand','Cyrus Crane'],
  visits:state.visits,
  last:Date.now(),
  palette:['#0a0810','#f9b572','#9bb0d6','#1a1418','#ffe9c2'],
  leitmotif:'C-E-G-C muted-trumpet + walking-bass'
};
lsSet('brimsworth_multiverse_v1',ledger);

// canon append
const canon = lsGet('canon_v1',{events:[]});
canon.events = canon.events || [];
canon.events.push({u:'noir', t:Date.now(), kind:'wedding-recorded', loc:'Brimsworth Blue Note'});
if(canon.events.length>50) canon.events = canon.events.slice(-50);
lsSet('canon_v1',canon);

// recurring cast
const rcMap = lsGet('recurring_cast_v1',{});
['Tomas','Lily','Otto','Bytes','Reverend Mosswick','Vesper Strand','Cyrus Crane','Birdie Knightley','Mort Holloway'].forEach(n=>{rcMap[n]=(rcMap[n]||0)+1});
lsSet('recurring_cast_v1',rcMap);

// ---- BroadcastChannel ----
let bc=null; try{bc=new BroadcastChannel('brimsworth_multiverse_v1')}catch(e){}
const crossovers=[];
const chyronQ=[];
function showChyron(s){chyronQ.push({s:s,t:performance.now()});if(chyronQ.length>8)chyronQ.shift()}
if(bc){
  bc.onmessage=ev=>{
    const d=ev.data||{};
    if(d.universe_id && d.universe_id!=='noir'){
      crossovers.push(d);
      if(crossovers.length>40) crossovers.shift();
      showChyron('CROSSOVER >> '+(d.universe_id+' :: '+(d.event||'ping')).toUpperCase());
    }
  };
  try{bc.postMessage({universe_id:'noir',event:'wedding-begin',t:Date.now(),index:'10/12'})}catch(e){}
  setInterval(()=>{ try{bc.postMessage({universe_id:'noir',event:'heartbeat',t:Date.now(),visits:state.visits})}catch(e){} }, 30000);
}

// ---- RNG (mulberry32) + reseed ----
function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
let seed = ((state.lastSeed^0xB10E)>>>0) || 0xB10E;
let rng = mulberry32(seed);
function reseed(){
  seed = ((Date.now()^0xB10E)>>>0);
  rng = mulberry32(seed);
  state.lastSeed = Date.now();
  lsSet('multiverse_noir_v1',state);
  showChyron('RESEED :: 0x'+seed.toString(16));
  // also republish ledger
  ledger.noir.last = Date.now(); lsSet('brimsworth_multiverse_v1',ledger);
}
setInterval(reseed, 600000); // ~10 min

const rand=(a,b)=>a+(b-a)*rng();
const rint=(a,b)=>Math.floor(rand(a,b+1));
const pick=arr=>arr[Math.floor(rng()*arr.length)];

// ---- Renderer / Scene ----
const canvas=document.getElementById('c');
const renderer=new T.WebGLRenderer({canvas,antialias:false,powerPreference:'low-power'});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,1.5));
renderer.setSize(W,H,false);
renderer.setClearColor(0x06050a,1);

const scene=new T.Scene();
scene.fog=new T.FogExp2(0x06050a,0.022);

// chiaroscuro lighting
scene.add(new T.AmbientLight(0x1a1418,0.32));
const moon=new T.DirectionalLight(0x6677aa,0.16); moon.position.set(-30,40,-20); scene.add(moon);

const SPOTS=[];
function spot(x,y,z,tx,ty,tz,color,intensity,angle,dist){
  const s=new T.SpotLight(color||0xf9b572, intensity||3.0, dist||40, angle||0.6, 0.7, 1.4);
  s.position.set(x,y,z);
  s.target.position.set(tx,ty,tz);
  scene.add(s); scene.add(s.target);
  SPOTS.push(s);
  return s;
}
spot(0,8,2,0,1,2,0xf9b572,5.5,0.55,32);   // chapel center
spot(-25,8,-40,-25,0,-40,0x9bb0d6,2.2,0.7,28); // street
spot(25,8,8,25,1,8,0xf9b572,3.8,0.7,28);  // booth
spot(-22,8,28,-22,0,28,0xb0d6a8,2.3,0.7,30); // garden
spot(28,9,28,28,0,28,0xff7a3a,2.6,0.85,34); // neon twilight
spot(-7,9,5,0,1.6,3,0xf9b572,2.2,0.45,20);  // sax stand L
spot(7,9,5,0,1.6,3,0xf9b572,2.2,0.45,20);   // sax stand R
spot(0,10,-12,0,1.5,-8,0xfff0c2,2.0,0.55,22); // bar

// ---- shared geometries / materials ----
const G_BOX=new T.BoxGeometry(1,1,1);
const G_SPH=new T.SphereGeometry(0.5,8,6);
const G_CYL=new T.CylinderGeometry(0.5,0.5,1,10);
const G_CONE=new T.ConeGeometry(0.5,1,8);
const G_PLANE=new T.PlaneGeometry(1,1);

function mat(c,opts){opts=opts||{};return new T.MeshStandardMaterial({color:c,roughness:opts.r==null?0.85:opts.r,metalness:opts.m||0,emissive:opts.e||0,emissiveIntensity:opts.ei||0,transparent:!!opts.t,opacity:opts.o==null?1:opts.o,side:opts.s||T.FrontSide})}
function bmat(c,opts){opts=opts||{};return new T.MeshBasicMaterial({color:c,transparent:!!opts.t,opacity:opts.o==null?1:opts.o,side:opts.s||T.FrontSide})}

const M_FLOOR=mat(0x141016,{r:0.92});
const M_CARPET=mat(0x4a1a1a,{r:0.95});
const M_WOOD=mat(0x2a1c10,{r:0.7});
const M_WOOD2=mat(0x3a261a,{r:0.6});
const M_BRASS=mat(0x6e4a18,{r:0.4,m:0.6});
const M_PEARL=mat(0xfff0e0,{r:0.4,m:0.1,e:0xfff0e0,ei:0.06});
const M_PINSTRIPE=mat(0x14141a,{r:0.7});
const M_FEDORA=mat(0x1a1410,{r:0.8});
const M_SKIN=mat(0xd6a880,{r:0.85});
const M_HAIR_D=mat(0x1a1010,{r:0.9});
const M_HAIR_L=mat(0x6e4a30,{r:0.9});
const M_NEON_AMBER=mat(0xf9b572,{e:0xf9b572,ei:1.5,r:0.3});
const M_NEON_BLUE=mat(0x6fa8ff,{e:0x6fa8ff,ei:1.4,r:0.3});
const M_NEON_RED=mat(0xff5a5a,{e:0xff5a5a,ei:1.5,r:0.3});
const M_GLASS=mat(0x88aaff,{t:true,o:0.35,r:0.1,m:0.2});
const M_STREET=mat(0x0c0c12,{r:0.5,m:0.1});
const M_PUDDLE=mat(0x2a3650,{r:0.05,m:0.7});
const M_SMOKE=bmat(0x4a4a52,{t:true,o:0.10});
const M_RAIN=bmat(0x9bb0d6,{t:true,o:0.55});
const M_AMBER=bmat(0xf9b572,{t:true,o:0.85});
const M_CAT_BLK=mat(0x0a0608,{r:0.9});
const M_CAT_GREY=mat(0x33333a,{r:0.9});
const M_DOG=mat(0x2a1a14,{r:0.9});

// ---- Named entities registry (250+) ----
const ENTITIES = []; // {name, role, mesh, world}
function regEntity(name,role,mesh,world){ENTITIES.push({name:name,role:role,mesh:mesh,world:world||'chapel'});if(mesh)mesh.userData={name:name,role:role,world:world}}

// Hero cast (named, not procedural)
const HEROES = [
 ['Detective Tomas Marlowe','groom'],
 ['Lily Bramble','bride'],
 ['Otto','dog-K9-offduty'],
 ['Bytes','noir-cat'],
 ['Bytes-Prime','crossover-cat-pirate'],
 ['Reverend Mosswick','officiant'],
 ['Vesper Strand','maid-of-honor'],
 ['Cyrus Crane','best-man'],
 ['Birdie Knightley','flower-girl'],
 ['Mort Holloway','ring-bearer'],
 ['Pearl Beaumont','mother-of-bride'],
 ['Quinn Vance','father-of-bride'],
 ['Stella Ashby','mother-of-groom'],
 ['Tobias Marlowe','father-of-groom'],

 ['Fitz Underwood','bouncer'],
 ['Gemma Vesper','hat-check'],
 ['Hugo Ashby','photographer'],
 ['Ines Brimsworth','florist'],
 ['Jax Crispin','baker'],
 ['Kit Dunmore','candlewright'],
 ['Lou Eldridge','poet'],
 ['Mae Falcon','rain-watcher'],
 ['Nico Gable','cabbie'],
 ['Opal Holloway','reporter'],
 ['Phin Inglewood','telegram-boy'],

 ['Sol Knightley','shoeshine'],
 ['Tess Larkin','lipstick-poet'],
 ['Ulrich Mosswick','assistant-officiant'],
 ['Vera Nightingale','perfumer'],
 ['Will Orwell','tailor'],
 ['Yael Pennyworth','milliner'],
 ['Zeke Quill','newspaper-vendor']
];

const FIR=['Ada','Bea','Cy','Dot','Edgar','Frances','Gus','Hattie','Ira','June','Klaus','Lila','Mort','Nora','Otis','Pearl','Quinn','Roman','Stella','Tobias','Una','Vincent','Wren','Xena','York','Zora','Arlo','Birdie','Cleo','Dax','Esme','Fitz','Gemma','Hugo','Ines','Jax','Kit','Lou','Mae','Nico','Opal','Phin','Rae','Sol','Tess','Ulrich','Vera','Will','Yael','Zeke','Mona','Errol','Lila','Hugo','Inez'];
const LAS=['Brimsworth','Marlowe','Vance','Sinclair','Beaumont','Crispin','Dunmore','Eldridge','Falcon','Gable','Holloway','Inglewood','Jardine','Knightley','Larkin','Mosswick','Nightingale','Orwell','Pennyworth','Quill','Renfield','Stoker','Trent','Underwood','Vesper','Whitcomb','Xander','Yarrow','Zeller','Ashby','Brookfield','Cinderly'];
const ROLES=['guest','sax-fan','reporter','bar-patron','wallflower','street-onlooker','garden-hush','twilight-stroll','booth-celebrant','reception-toaster','rain-walker','cabbie','telegrapher','candle-watcher','smoke-curler'];

// procedural guests with unique combo
const usedNames = new Set(HEROES.map(h=>h[0]));
function uniqName(){
  for(let i=0;i<200;i++){
    const n = pick(FIR)+' '+pick(LAS);
    if(!usedNames.has(n)){usedNames.add(n);return n}
  }
  return 'Guest #'+ENTITIES.length;
}


// generic figure: box body + sphere head
function makeFigure(opts){
  opts=opts||{};
  const g=new T.Group();
  const skin = opts.skin || M_SKIN;
  const torso = opts.torso || M_PINSTRIPE;
  const hair = opts.hair || M_HAIR_D;
  const body=new T.Mesh(G_BOX, torso);
  body.scale.set(0.55,1.1,0.32); body.position.y=0.55; g.add(body);
  const head=new T.Mesh(G_SPH, skin); head.position.y=1.32; head.scale.setScalar(0.46); g.add(head);
  const hairm=new T.Mesh(G_SPH, hair); hairm.position.y=1.40; hairm.scale.set(0.50,0.36,0.50); g.add(hairm);
  if(opts.hat){
    const brim=new T.Mesh(G_CYL, M_FEDORA); brim.position.y=1.55; brim.scale.set(0.72,0.05,0.72); g.add(brim);
    const crown=new T.Mesh(G_CYL, M_FEDORA); crown.position.y=1.66; crown.scale.set(0.46,0.30,0.46); g.add(crown);
  }
  if(opts.veil){
    const veil=new T.Mesh(G_PLANE, new T.MeshStandardMaterial({color:0xfff4e2,transparent:true,opacity:0.55,side:T.DoubleSide,roughness:0.4}));
    veil.position.set(0,1.05,0.05); veil.scale.set(0.95,1.6,1); g.add(veil);
  }
  if(opts.gown){
    const gown=new T.Mesh(G_CONE, new T.MeshStandardMaterial({color:0xfff8ec,roughness:0.5,emissive:0x332a20,emissiveIntensity:0.05}));
    gown.position.y=0.55; gown.scale.set(0.9,1.4,0.9); g.add(gown);
    const pearls=new T.Mesh(new T.TorusGeometry(0.20,0.02,4,12), M_PEARL);
    pearls.position.y=1.1; pearls.rotation.x=Math.PI/2; g.add(pearls);
  }
  return g;
}

// ---- WORLDS ----
const WORLDS={
  'rain-street-entry':{c:new T.Vector3(-30,0,-30),r:14},
  'jazz-club-chapel':{c:new T.Vector3(0,0,2),r:14},
  'booth-reception':{c:new T.Vector3(25,0,5),r:12},
  'alleyway-garden':{c:new T.Vector3(-22,0,28),r:12},
  'neon-twilight':{c:new T.Vector3(28,0,28),r:12}
};

// big base floor
{
  const f=new T.Mesh(new T.PlaneGeometry(140,140), M_FLOOR);
  f.rotation.x=-Math.PI/2; f.position.y=-0.01; scene.add(f);
}

// ---- WORLD: jazz-club-chapel (origin) ----
const chapelGroup=new T.Group(); scene.add(chapelGroup); chapelGroup.position.copy(WORLDS['jazz-club-chapel'].c);
{
  // carpet aisle
  const carpet=new T.Mesh(new T.PlaneGeometry(2.8,18), M_CARPET);
  carpet.rotation.x=-Math.PI/2; carpet.position.y=0.005; chapelGroup.add(carpet);
  // walls (3-sided)
  const wallMat=mat(0x1a1014,{r:0.95});
  function wall(x,y,z,sx,sy,sz){const w=new T.Mesh(G_BOX,wallMat);w.position.set(x,y,z);w.scale.set(sx,sy,sz);chapelGroup.add(w)}
  wall(-12,5,-8,0.3,10,18); wall(12,5,-8,0.3,10,18); wall(0,5,-17,24,10,0.3);
  wall(0,9.8,2,24,0.3,20); // ceiling
  // chandelier
  const chandHub=new T.Mesh(G_SPH, M_BRASS); chandHub.position.set(0,8.5,3); chandHub.scale.setScalar(0.5); chapelGroup.add(chandHub);
  for(let i=0;i<10;i++){const a=i/10*Math.PI*2; const c=new T.Mesh(G_CYL,M_NEON_AMBER); c.position.set(Math.cos(a)*0.9,8.2,3+Math.sin(a)*0.9); c.scale.set(0.07,0.4,0.07); chapelGroup.add(c)}
  // altar
  const altar=new T.Mesh(G_BOX, M_WOOD); altar.position.set(0,0.6,8.5); altar.scale.set(3.0,1.2,1.0); chapelGroup.add(altar);
  const altarVase=new T.Mesh(G_CYL, M_BRASS); altarVase.position.set(0,1.5,8.5); altarVase.scale.set(0.18,0.6,0.18); chapelGroup.add(altarVase);
  // pews (booths repurposed as café-style chapel benches)
  for(let i=0;i<6;i++){
    for(let s=-1;s<=1;s+=2){
      const p=new T.Mesh(G_BOX,M_WOOD2); p.position.set(s*2.5, 0.4, -2 + i*1.8); p.scale.set(2.6,0.8,1.1); chapelGroup.add(p);
    }
  }
  // sax trio stand (left/right of altar)
  for(let s=-1;s<=1;s+=2){
    const stand=new T.Mesh(G_BOX,M_WOOD); stand.position.set(s*5.5, 0.3, 6); stand.scale.set(2.0,0.6,2.0); chapelGroup.add(stand);
    const sax=new T.Mesh(G_CONE, M_BRASS); sax.position.set(s*5.5,1.0,6.2); sax.scale.set(0.25,0.7,0.25); chapelGroup.add(sax);
  }
  // smoke planes (animated alpha)
  for(let i=0;i<14;i++){
    const sm=new T.Mesh(G_PLANE, M_SMOKE.clone());
    sm.position.set(rand(-9,9), rand(2.0,7.5), rand(-6,9));
    sm.rotation.y=rand(0,Math.PI*2);
    sm.scale.setScalar(rand(3,7));
    sm.userData.drift=rand(0.0005,0.0018);
    sm.userData.sway=rand(0,Math.PI*2);
    chapelGroup.add(sm);
  }
  // hero figures
  const tomas=makeFigure({hat:true, torso:M_PINSTRIPE, hair:M_HAIR_D});
  tomas.position.set(-0.6,0,7.6); tomas.rotation.y=Math.PI; chapelGroup.add(tomas);
  regEntity('Detective Tomas Marlowe','groom',tomas,'jazz-club-chapel');
  const lily=makeFigure({gown:true, veil:true, hair:M_HAIR_L, torso: new T.MeshStandardMaterial({color:0xfff8ec,roughness:0.55})});
  lily.position.set(0.6,0,7.6); lily.rotation.y=Math.PI; chapelGroup.add(lily);
  regEntity('Lily Bramble','bride',lily,'jazz-club-chapel');
  const rev=makeFigure({torso: mat(0x0a0a10,{r:0.85}), hair: mat(0xeeeeee,{r:0.9})});
  rev.position.set(0,0,9.6); chapelGroup.add(rev);

// ---- Audio: leitmotif C-E-G-C ----
let AC=null, masterGain=null;
function ensureAC(){
  if(AC) return AC;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.18; masterGain.connect(AC.destination);
  }catch(e){AC=null}
  return AC;
}
function trumpet(freq, when, dur){
  if(!AC) return;
  const o=AC.createOscillator(); o.type='square'; o.frequency.value=freq;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.Q.value=1.1;
  const g=AC.createGain(); g.gain.value=0;
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(0.22, when+0.04);
  g.gain.exponentialRampToValueAtTime(0.0008, when+dur);
  o.start(when); o.stop(when+dur+0.02);
}
function bass(freq, when, dur){
  if(!AC) return;
  const o=AC.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(freq*0.98, when);
  o.frequency.linearRampToValueAtTime(freq, when+0.06);
  const g=AC.createGain(); g.gain.value=0;
  o.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(0.10, when+0.05);
  g.gain.exponentialRampToValueAtTime(0.0008, when+dur);
  o.start(when); o.stop(when+dur+0.02);
}
const NOTES=[261.63, 329.63, 392.00, 523.25]; // C E G C
let lastMotif=0;
function playMotif(){
  if(!ensureAC()) return;
  if(AC.state==='suspended'){try{AC.resume()}catch(e){}}
  const t=AC.currentTime+0.05;
  for(let i=0;i<4;i++){
    trumpet(NOTES[i], t+i*0.34, 0.55);
    bass(NOTES[i]/4, t+i*0.34, 0.55);
  }
  lastMotif=performance.now();
}
addEventListener('pointerdown', ()=>{ ensureAC(); if(AC && AC.state==='suspended'){try{AC.resume()}catch(e){}} playMotif(); }, {passive:true});

function chooseCamForAct(act, t){
  // pull a relevant subset
  let pool=[];
  if(act===1) pool=CAMS.filter(c=>/STREET|AISLE|HIGH-CORNER|OMNI/.test(c.userData.name));
  else if(act===2) pool=CAMS.filter(c=>/CHAPEL|CHANDELIER|VOWS|REVEREND|SAX|PORTAL/.test(c.userData.name));
  else pool=CAMS.filter(c=>/BOOTH|GARDEN|TWILIGHT|JUKEBOX|BYTES|OMNI/.test(c.userData.name));
  if(t>=298 && t<=330) pool = CAMS.filter(c=>/PORTAL/.test(c.userData.name));
  if(!pool.length) pool = CAMS;
  return pool[Math.floor(rng()*pool.length)];
}

function maybeCycle(now,t,act){
  if(now>=cycleAt){

// minimap render
function drawMinimap(t){
  mmctx.fillStyle='#000'; mmctx.fillRect(0,0,170,170);
  mmctx.strokeStyle='#f9b57266'; mmctx.strokeRect(0.5,0.5,169,169);
  // map world coords (~-40..40) → 0..170
  function mp(p){return [85 + p.x*1.7, 85 + p.z*1.7]}
  // worlds
  const ws=[
    ['rain-street-entry','#7ec8ff'],
    ['jazz-club-chapel','#f9b572'],
    ['booth-reception','#ff9a52'],
    ['alleyway-garden','#9bc878'],
    ['neon-twilight','#b06fff']
  ];
  ws.forEach(([k,c])=>{
    const w=WORLDS[k]; const [x,y]=mp(w.c);
    mmctx.fillStyle=c+'aa'; mmctx.beginPath(); mmctx.arc(x,y,w.r*1.6,0,Math.PI*2); mmctx.fill();
    mmctx.fillStyle='#000'; mmctx.font='8px Courier New'; mmctx.fillText(k.split('-')[0].toUpperCase(),x-15,y+2);
  });
  // entities as dots
  ENTITIES.forEach((e,i)=>{
    if(!e.mesh) return;
    const [x,y]=mp(e.mesh.position);
    mmctx.fillStyle = e.role==='groom'?'#ff5a5a': e.role==='bride'?'#fff0e0': e.role==='noir-cat'?'#ffe06a': e.role==='dog-K9-offduty'?'#cf8a40': e.role==='crossover-cat-pirate'?'#6fffd0': '#9bb0d6aa';
    mmctx.fillRect(x-1,y-1,2,2);
  });
  // active cam marker
  const [cx,cy]=mp(activeCam.position);
  mmctx.strokeStyle='#fff'; mmctx.beginPath(); mmctx.arc(cx,cy,4,0,Math.PI*2); mmctx.stroke();
}

// ---- portal cat-meet logic ----
let portalState = 'idle'; // idle -> opening -> meeting -> walking -> curled
let portalT0 = -1;
function updatePortal(t){
  const swirlVisAt = 295;
  if(t>=swirlVisAt && portalState==='idle'){
    portalState='opening';
    portalT0=t;
    showChyron('PHONOGRAPH-PORTAL :: HORN HUMS — A SECOND CAT STEPS THROUGH');
  }
  if(portalState==='opening'){
    const k = Math.min(1,(t-swirlVisAt)/4);
    portalSwirl.material.opacity = 0.65*k;
    portalSwirl.rotation.z += 0.04;
    if(t>=300){
      bytesPrime.visible=true;
      portalState='meeting';
      showChyron('PHONOGRAPH-PORTAL :: BYTES (PIRATE) MEETS BYTES (NOIR)');
      try{if(bc) bc.postMessage({universe_id:'noir',event:'cat-meet',t:Date.now()})}catch(e){}
    }
  }
  if(portalState==='meeting'){
    const k=Math.min(1,(t-300)/8);
    portalSwirl.material.opacity = 0.65*(1-k*0.5);
    portalSwirl.rotation.z += 0.06;
    // bytesPrime walks toward sill
    bytesPrime.position.lerp(new T.Vector3(sillTarget.x-2, 1.0, sillTarget.z+2), 0.012);
    if(t>=308){portalState='walking'; showChyron('PHONOGRAPH-PORTAL :: BOTH CATS MOSEY TO THE BAR WINDOWSILL')}
  }
  if(portalState==='walking'){
    bytesPrime.position.lerp(sillTarget, 0.02);
    // noir Bytes (on jukebox) hops down toward sill
    const bytesEnt = ENTITIES.find(e=>e.name==='Bytes');
    if(bytesEnt && bytesEnt.mesh){
      bytesEnt.mesh.position.lerp(new T.Vector3(sillTarget.x+0.6, sillTarget.y, sillTarget.z), 0.02);
    }
    portalSwirl.material.opacity = Math.max(0, portalSwirl.material.opacity-0.005);
    if(t>=320){portalState='curled'; showChyron('— BOTH CATS YAWN — CURL UP IN A SINGLE NOIR SHADOW —')}
  }
  if(portalState==='curled'){
    // pulse ears slowly (sleep)
    portalSwirl.material.opacity = 0;
    bytesPrime.rotation.y = Math.sin(t*0.4)*0.02;
  }
}

// ---- 3-act narrative ----
function actFor(t){
  if(t<180) return 1;
  if(t<420) return 2;
  return 3;
}
function sceneFor(t){
  if(t<60) return 'rain falls; lanterns sputter';
  if(t<140) return 'guests arrive, Otto greets each';
  if(t<180) return 'Tomas finds the locket Lily lost yesterday';
  if(t<230) return 'sax-trio plays the leitmotif under the chandelier';
  if(t<275) return 'vows in plain noir verse';
  if(t<300) return 'kiss — the room goes hushed';
  if(t<320) return 'phonograph-portal opens; two Bytes meet';
  if(t<400) return 'reception toasts at the bar';
  if(t<480) return 'whispers in the alleyway-garden';
  return 'neon-twilight stroll, ribbon-tail dawn';
}

// ---- main render loop ----
const clock=new T.Clock();
let lastMotifAt = -1000;
let lastBigCycle = 0;

function tick(){
  const dt=clock.getDelta();
  const now=performance.now();
  const tSec=(Date.now()-startMs)/1000;
  const act=actFor(tSec);

  // animate smoke
  chapelGroup.children.forEach(ch=>{
    if(ch.userData && ch.userData.drift){
      ch.position.x += Math.sin(now*0.0003+ch.userData.sway)*0.002;
      ch.material.opacity = 0.06 + (Math.sin(now*ch.userData.drift+ch.userData.sway)+1)*0.04;
      ch.rotation.z += 0.0006;
    }
  });
  // animate rain (street group)
  const rain = streetGroup.userData.rain;
  if(rain){
    const pos=rain.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      let y=pos.getY(i)-0.35;
      if(y<0){y=10+rng()*2}
      pos.setY(i,y);
    }
    pos.needsUpdate=true;
  }

  // small idle motion for entities (sway)
  for(let i=0;i<ENTITIES.length;i+=3){
    const e=ENTITIES[i];
    if(!e.mesh) continue;
    if(['groom','bride','officiant','noir-cat','dog-K9-offduty','crossover-cat-pirate'].includes(e.role)) continue;
    e.mesh.rotation.y += Math.sin(now*0.001 + i)*0.0015;
  }

  // drama beats firing
  DRAMA_EVENTS.forEach(d=>{
    if(tSec>=d.at && !fired.has(d.at)){
      fired.add(d.at);
      dramaBeat(d.label, d.d);
    }
  });
  // gentle drama drift toward equilibrium
  drama += (0.35 - drama)*0.0006;

  // periodic leitmotif (every ~22s)
  if(now-lastMotifAt > 22000){
    if(AC) playMotif();
    lastMotifAt = now;
  }

  // portal logic
  updatePortal(tSec);

  // cycle camera
  maybeCycle(now,tSec,act);

  // HUD updates
  elAct.innerHTML = '<span class="tag">ACT '+act+'</span> :: t='+fmtT(tSec)+' :: <span class="dim">'+sceneFor(tSec)+'</span>';
  elTL.textContent = timelineStr(tSec);
  elDr.textContent = dramaStr();
  elFork.textContent = forkStr();
  elLed.textContent = ledgerStr();
  tickChyron(now);
  drawMinimap(tSec);

  // ---- render main ----
  renderer.setScissorTest(false);
  renderer.setViewport(0,0,W,H);
  activeCam.aspect = W/H; activeCam.updateProjectionMatrix();
  renderer.render(scene, activeCam);

  // ---- 4 PiP ----
  renderer.setScissorTest(true);
  const pipW=Math.min(160,Math.floor(W*0.13));
  const pipH=Math.floor(pipW*9/16);
  const baseX=Math.max(8, Math.floor(W/2 - pipW*2 - 16));
  const baseY=8;
  for(let i=0;i<4;i++){
    const c=PIP[i];
    if(!c) continue;
    c.aspect = pipW/pipH; c.updateProjectionMatrix();
    const x = baseX + i*(pipW+8);
    renderer.setViewport(x,baseY,pipW,pipH);
    renderer.setScissor(x,baseY,pipW,pipH);
    renderer.render(scene, c);
  }
  renderer.setScissorTest(false);

  // also re-position pip labels each frame (cheap)
  for(let i=0;i<4;i++){
    const el=document.getElementById('piplbl'+i);
    if(!el) continue;
    el.style.bottom=(baseY+1)+'px';
    el.style.left=(baseX + i*(pipW+8))+'px';
    el.style.marginLeft='0';
  }

  requestAnimationFrame(tick);
}

addEventListener('resize',()=>{
  W=innerWidth; H=innerHeight;
  renderer.setSize(W,H,false);
  CAMS.forEach(c=>{c.aspect=W/H;c.updateProjectionMatrix()});
});
