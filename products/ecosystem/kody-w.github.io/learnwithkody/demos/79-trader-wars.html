<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Wars — Vibe Coding</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #05070b;
    color: #cbd5e1;
    font-family: 'SF Mono', 'Menlo', Consolas, monospace;
    overflow: hidden;
    height: 100%;
    width: 100%;
  }
  body {
    background: radial-gradient(ellipse at top, #0a1019 0%, #05070b 70%);
  }
  #app {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 36px 1fr;
    gap: 8px;
    padding: 8px;
    height: 100vh;
    width: 100vw;
  }
  #topbar {
    grid-column: 1 / 3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    background: linear-gradient(90deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    border: 1px solid #1f2937;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 2px;
  }
  #title {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #f59e0b;
    text-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
  }
  #subtitle { color: #64748b; font-size: 11px; }
  #clock { color: #94a3b8; font-variant-numeric: tabular-nums; }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    min-height: 0;
    min-width: 0;
  }
  .cell {
    position: relative;
    background: #0a0e14;
    border: 1px solid #1f2937;
    border-radius: 6px;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
  }
  .cell canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .ticker {
    position: absolute; top: 5px; left: 8px;
    font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
    z-index: 2; pointer-events: none;
    text-shadow: 0 0 8px currentColor;
  }
  .price {
    position: absolute; top: 5px; right: 8px;
    font-size: 11px; font-variant-numeric: tabular-nums;
    z-index: 2; pointer-events: none;
  }
  .change {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 10px; font-variant-numeric: tabular-nums;
    z-index: 2; pointer-events: none; opacity: 0.8;
  }
  .news-flash {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1.5px;
    white-space: nowrap;
    z-index: 4;
    pointer-events: none;
    color: #000;
    box-shadow: 0 0 24px rgba(255,255,255,0.3);
    animation: flashIn 0.25s ease-out, flashPulse 1s ease-in-out infinite alternate;
  }
  @keyframes flashIn {
    from { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  @keyframes flashPulse {
    from { box-shadow: 0 0 12px rgba(255,255,255,0.2); }
    to   { box-shadow: 0 0 32px rgba(255,255,255,0.6); }
  }
  #right {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }
  #leaderboard {
    background: #0a0e14;
    border: 1px solid #1f2937;
    border-radius: 6px;
    padding: 10px 10px 8px 10px;
    flex-shrink: 0;
  }
  #leaderboard h2 {
    margin: 0 0 8px 0;
    font-size: 11px;
    letter-spacing: 3px;
    color: #64748b;
    font-weight: 600;
  }
  #rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .trader-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 12px;
    background: #11161d;
    border-left: 3px solid;
    transition: background 0.3s, transform 0.3s;
  }
  .trader-name { font-weight: 700; letter-spacing: 1px; }
  .trader-pnl { font-variant-numeric: tabular-nums; font-size: 11px; }
  .rank {
    display: inline-block;
    width: 16px;
    text-align: center;
    color: #475569;
    font-weight: 800;
    margin-right: 6px;
  }
  #networth-wrap {
    flex: 1;
    background: #0a0e14;
    border: 1px solid #1f2937;
    border-radius: 6px;
    position: relative;
    min-height: 0;
    overflow: hidden;
  }
  #nwCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #endcard {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(10,15,25,0.95) 0%, rgba(0,0,0,0.98) 100%);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.4s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #endcard.show { display: flex; }
  #endcard h1 {
    font-size: 42px;
    color: #f59e0b;
    letter-spacing: 10px;
    margin: 0 0 30px 0;
    text-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
    font-weight: 800;
  }
  .winner {
    font-size: 22px;
    margin: 8px 0;
    font-weight: 700;
    letter-spacing: 3px;
    text-shadow: 0 0 12px currentColor;
  }
  .winner.first { font-size: 32px; }
  #countdown {
    margin-top: 30px;
    color: #475569;
    font-size: 11px;
    letter-spacing: 4px;
  }
  .ticker-tape {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f59e0b, transparent);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="title">⚔ TRADER WARS</div>
    <div id="subtitle">PROCEDURAL MARKET • 4 AI STRATEGIES • 8 STOCKS</div>
    <div id="clock">SIM YEAR <span id="year">0.0</span> / 10.0</div>
  </div>
  <div id="grid"></div>
  <div id="right">
    <div id="leaderboard">
      <h2>◆ LEADERBOARD</h2>
      <div id="rows"></div>
    </div>
    <div id="networth-wrap"><canvas id="nwCanvas"></canvas></div>
  </div>
</div>
<div id="endcard">
  <h1>FINAL RANKINGS</h1>
  <div id="finalList"></div>
  <div id="countdown">RESTARTING IN <span id="cd">5</span>...</div>
</div>

<script>
'use strict';

const TICKERS = ['RAPP', 'ZYNK', 'MARS', 'KODY', 'BRGR', 'NOVA', 'OOZE', 'GLNX'];
const STOCK_GLOWS = ['#22d3ee', '#f472b6', '#fb923c', '#a78bfa', '#facc15', '#34d399', '#94a3b8', '#60a5fa'];

const TRADER_DEFS = [
  { name: 'MOMENTUM',   color: '#f59e0b', strat: 'momentum'  },
  { name: 'MEAN-REV',   color: '#22d3ee', strat: 'meanrev'   },
  { name: 'CONTRARIAN', color: '#ec4899', strat: 'contra'    },
  { name: 'RANDOM',     color: '#94a3b8', strat: 'random'    },
];

const TOTAL_TICKS = 2520;
const TICK_MS = (5 * 60 * 1000) / TOTAL_TICKS;
const HISTORY_BARS = 100;
const NEWS_PROB_PER_TICK = 1 / 84;

const NEWS_TYPES = [
  { type: 'EARNINGS BEAT',  mult: 1.15, color: '#10b981', positive: true,  scope: 'one' },
  { type: 'EARNINGS MISS',  mult: 0.85, color: '#f87171', positive: false, scope: 'one' },
  { type: 'SCANDAL',        mult: 0.75, color: '#dc2626', positive: false, scope: 'one' },
  { type: 'MERGER',         mult: 1.30, color: '#22c55e', positive: true,  scope: 'one' },
  { type: 'FED HIKE',       mult: 0.95, color: '#f97316', positive: false, scope: 'all' },
  { type: 'RALLY',          mult: 1.05, color: '#84cc16', positive: true,  scope: 'all' },
];

const DPR = Math.min(window.devicePixelRatio || 1, 2);

const grid = document.getElementById('grid');
const stockCells = [];
for (let i = 0; i < 8; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = `
    <div class="ticker" style="color:${STOCK_GLOWS[i]}">${TICKERS[i]}</div>
    <div class="price" id="p${i}">$0.00</div>
    <div class="change" id="ch${i}">—</div>
    <canvas></canvas>`;
  grid.appendChild(cell);
  stockCells.push(cell);
}

const rowsEl = document.getElementById('rows');
const traderRowEls = [];
TRADER_DEFS.forEach((t, i) => {
  const row = document.createElement('div');
  row.className = 'trader-row';
  row.style.borderLeftColor = t.color;
  row.innerHTML = `
    <span><span class="rank" id="rk${i}">${i + 1}</span><span class="trader-name" style="color:${t.color}">${t.name}</span></span>
    <span class="trader-pnl" id="pnl${i}">$10,000</span>`;
  rowsEl.appendChild(row);
  traderRowEls.push(row);
});

let stocks, traders, tick, activeFlashes, running, snapshotInterval, networthSnap;
const yearEl = document.getElementById('year');
const endcard = document.getElementById('endcard');
const finalList = document.getElementById('finalList');
const cdEl = document.getElementById('cd');

function gauss() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}

function init() {
  stocks = TICKERS.map((sym, i) => ({
    sym,
    idx: i,
    price: 40 + Math.random() * 160,
    drift: (Math.random() - 0.4) * 0.0012,
    sigma: 0.010 + Math.random() * 0.022,
    candles: [],
    history: [],
  }));
  for (const s of stocks) s.history.push(s.price);

  traders = TRADER_DEFS.map(t => ({
    name: t.name,
    color: t.color,
    strat: t.strat,
    cash: 10000,
    holdings: new Array(8).fill(0),
    buyPrice: new Array(8).fill(0),
    peakPrice: new Array(8).fill(0),
    networth: [10000],
  }));

  tick = 0;
  activeFlashes = [];
  networthSnap = traders.map(() => [10000]);
  snapshotInterval = 4;
  running = true;
  endcard.classList.remove('show');
}

function fireNews() {
  const news = NEWS_TYPES[(Math.random() * NEWS_TYPES.length) | 0];
  const affected = [];
  if (news.scope === 'all') {
    for (const s of stocks) { s.price *= news.mult; affected.push(s.idx); }
  } else {
    const idx = (Math.random() * stocks.length) | 0;
    stocks[idx].price *= news.mult;
    affected.push(idx);
  }
  for (const idx of affected) {
    activeFlashes = activeFlashes.filter(f => f.idx !== idx);
    activeFlashes.push({ idx, text: news.type, color: news.color, until: tick + 22 });
  }
  const contrarian = traders.find(t => t.strat === 'contra');
  if (contrarian) {
    for (const idx of affected) {
      if (!news.positive) {
        const spend = Math.min(contrarian.cash * 0.25, 2500);
        if (spend > 100) {
          const sh = spend / stocks[idx].price;
          contrarian.holdings[idx] += sh;
          contrarian.cash -= spend;
          contrarian.buyPrice[idx] = stocks[idx].price;
        }
      } else {
        if (contrarian.holdings[idx] > 0) {
          contrarian.cash += contrarian.holdings[idx] * stocks[idx].price;
          contrarian.holdings[idx] = 0;
        }
      }
    }
  }
}

function step() {
  tick++;

  const oldPrices = stocks.map(s => s.price);
  if (Math.random() < NEWS_PROB_PER_TICK) fireNews();

  for (let i = 0; i < 8; i++) {
    const s = stocks[i];
    s.price = s.price * (1 + s.drift + s.sigma * gauss());
    if (s.price < 1) s.price = 1;
    if (s.price > 9999) s.price = 9999;
    s.history.push(s.price);
    if (s.history.length > 600) s.history.shift();
    const o = oldPrices[i];
    const c = s.price;
    const wickRange = Math.abs(o - c) * 0.6 + s.price * 0.004;
    const h = Math.max(o, c) + Math.random() * wickRange;
    const l = Math.min(o, c) - Math.random() * wickRange;
    s.candles.push({ o, h, l: Math.max(l, 0.5), c });
    if (s.candles.length > HISTORY_BARS) s.candles.shift();
  }

  for (const tr of traders) {
    if (tr.strat === 'momentum') {
      for (let i = 0; i < 8; i++) {
        const s = stocks[i];
        if (s.history.length < 31) continue;
        const back = s.history[s.history.length - 31];
        const ret = (s.price - back) / back;
        if (tr.holdings[i] === 0 && ret > 0.05) {
          const spend = Math.min(tr.cash * 0.22, 2400);
          if (spend > 100) {
            tr.holdings[i] = spend / s.price;
            tr.cash -= spend;
            tr.buyPrice[i] = s.price;
            tr.peakPrice[i] = s.price;
          }
        } else if (tr.holdings[i] > 0) {
          if (s.price > tr.peakPrice[i]) tr.peakPrice[i] = s.price;
          if (s.price < tr.peakPrice[i] * 0.97) {
            tr.cash += tr.holdings[i] * s.price;
            tr.holdings[i] = 0;
          }
        }
      }
    } else if (tr.strat === 'meanrev') {
      for (let i = 0; i < 8; i++) {
        const s = stocks[i];
        if (s.history.length < 51) continue;
        const slice = s.history.slice(-51, -1);
        let sum = 0;
        for (let k = 0; k < slice.length; k++) sum += slice[k];
        const ma = sum / slice.length;
        if (tr.holdings[i] === 0 && s.price < ma * 0.9) {
          const spend = Math.min(tr.cash * 0.22, 2400);
          if (spend > 100) {
            tr.holdings[i] = spend / s.price;
            tr.cash -= spend;
            tr.buyPrice[i] = s.price;
          }
        } else if (tr.holdings[i] > 0 && s.price > tr.buyPrice[i] * 1.05) {
          tr.cash += tr.holdings[i] * s.price;
          tr.holdings[i] = 0;
        }
      }
    } else if (tr.strat === 'random') {
      if (Math.random() < 0.06) {
        const i = (Math.random() * 8) | 0;
        if (Math.random() < 0.5) {
          const spend = Math.min(tr.cash * 0.12, 1200);
          if (spend > 100) {
            tr.holdings[i] += spend / stocks[i].price;
            tr.cash -= spend;
          }
        } else if (tr.holdings[i] > 0) {
          tr.cash += tr.holdings[i] * stocks[i].price;
          tr.holdings[i] = 0;
        }
      }
    }
    let nw = tr.cash;
    for (let i = 0; i < 8; i++) nw += tr.holdings[i] * stocks[i].price;
    tr.networth.push(nw);
    if (tr.networth.length > TOTAL_TICKS + 10) tr.networth.shift();
  }

  if (tick % snapshotInterval === 0) {
    for (let i = 0; i < traders.length; i++) {
      networthSnap[i].push(traders[i].networth[traders[i].networth.length - 1]);
    }
  }

  activeFlashes = activeFlashes.filter(f => f.until > tick);
}

function drawCandles(canvas, stock) {
  const ctx = canvas.getContext('2d');
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  if (canvas.width !== cw * DPR) { canvas.width = cw * DPR; canvas.height = ch * DPR; }
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, W, H);

  if (!stock.candles.length) return;

  const padTop = 26 * DPR, padBot = 18 * DPR, padX = 4 * DPR;
  const cs = stock.candles;
  let lo = Infinity, hi = -Infinity;
  for (const c of cs) { if (c.l < lo) lo = c.l; if (c.h > hi) hi = c.h; }
  if (hi - lo < 0.0001) { lo -= 1; hi += 1; }
  const range = hi - lo;
  lo -= range * 0.08; hi += range * 0.08;
  const yScale = (H - padTop - padBot) / (hi - lo);
  const cwBar = (W - 2 * padX) / HISTORY_BARS;

  ctx.strokeStyle = '#161b22';
  ctx.lineWidth = 1;
  for (let g = 1; g <= 3; g++) {
    const y = padTop + (H - padTop - padBot) * g / 4;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  const lineSpark = stock.history.slice(-HISTORY_BARS);
  ctx.strokeStyle = STOCK_GLOWS[stock.idx] + '22';
  ctx.lineWidth = 2 * DPR;
  ctx.beginPath();
  for (let i = 0; i < lineSpark.length; i++) {
    const x = padX + (i + (HISTORY_BARS - lineSpark.length)) * cwBar + cwBar / 2;
    const y = padTop + (hi - lineSpark[i]) * yScale;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  for (let i = 0; i < cs.length; i++) {
    const c = cs[i];
    const x = padX + (i + (HISTORY_BARS - cs.length)) * cwBar + cwBar / 2;
    const yo = padTop + (hi - c.o) * yScale;
    const yc = padTop + (hi - c.c) * yScale;
    const yh = padTop + (hi - c.h) * yScale;
    const yl = padTop + (hi - c.l) * yScale;
    const up = c.c >= c.o;
    const col = up ? '#10b981' : '#ef4444';
    ctx.strokeStyle = col;
    ctx.fillStyle = col;
    ctx.lineWidth = Math.max(1, DPR);
    ctx.beginPath();
    ctx.moveTo(x, yh);
    ctx.lineTo(x, yl);
    ctx.stroke();
    const bw = Math.max(1, cwBar * 0.7);
    const top = Math.min(yo, yc);
    const bh = Math.max(1, Math.abs(yo - yc));
    ctx.fillRect(x - bw / 2, top, bw, bh);
  }
}

function drawNetworth() {
  const c = document.getElementById('nwCanvas');
  const ctx = c.getContext('2d');
  const cw = c.clientWidth, ch = c.clientHeight;
  if (c.width !== cw * DPR) { c.width = cw * DPR; c.height = ch * DPR; }
  const W = c.width, H = c.height;
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#64748b';
  ctx.font = `${10 * DPR}px 'SF Mono', Menlo, monospace`;
  ctx.textBaseline = 'top';
  ctx.fillText('◆ NET WORTH (STACKED)', 10 * DPR, 10 * DPR);

  const padTop = 28 * DPR, padBot = 14 * DPR, padL = 6 * DPR, padR = 6 * DPR;
  const len = networthSnap[0].length;
  if (len < 2) return;

  let maxTotal = 0;
  for (let i = 0; i < len; i++) {
    let sum = 0;
    for (let t = 0; t < traders.length; t++) sum += Math.max(0, networthSnap[t][i]);
    if (sum > maxTotal) maxTotal = sum;
  }
  if (maxTotal < 40000) maxTotal = 40000;
  const totalSnaps = Math.ceil(TOTAL_TICKS / snapshotInterval);
  const xScale = (W - padL - padR) / Math.max(totalSnaps - 1, 1);
  const yScale = (H - padTop - padBot) / maxTotal;

  const stack = new Array(len).fill(H - padBot);
  for (let ti = 0; ti < traders.length; ti++) {
    const tr = traders[ti];
    const arr = networthSnap[ti];
    ctx.fillStyle = tr.color + 'cc';
    ctx.beginPath();
    ctx.moveTo(padL, stack[0]);
    for (let i = 0; i < len; i++) {
      const x = padL + i * xScale;
      const v = Math.max(0, arr[i]);
      const newY = stack[i] - v * yScale;
      ctx.lineTo(x, newY);
    }
    for (let i = len - 1; i >= 0; i--) {
      ctx.lineTo(padL + i * xScale, stack[i]);
    }
    ctx.closePath();
    ctx.fill();
    for (let i = 0; i < len; i++) {
      const v = Math.max(0, arr[i]);
      stack[i] = stack[i] - v * yScale;
    }
  }

  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, H - padBot);
  ctx.lineTo(W - padR, H - padBot);
  ctx.stroke();

  const progress = Math.min(1, tick / TOTAL_TICKS);
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 1;
  const px = padL + (W - padL - padR) * progress;
  ctx.setLineDash([4 * DPR, 4 * DPR]);
  ctx.beginPath();
  ctx.moveTo(px, padTop);
  ctx.lineTo(px, H - padBot);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawAll() {
  for (let i = 0; i < 8; i++) {
    const canvas = stockCells[i].querySelector('canvas');
    drawCandles(canvas, stocks[i]);
    const s = stocks[i];
    const last = s.candles.length ? s.candles[s.candles.length - 1] : null;
    const priceEl = document.getElementById('p' + i);
    priceEl.textContent = '$' + s.price.toFixed(2);
    if (last) priceEl.style.color = last.c >= last.o ? '#10b981' : '#ef4444';
    const start = s.history[0];
    const change = ((s.price - start) / start) * 100;
    const chEl = document.getElementById('ch' + i);
    chEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(1) + '%';
    chEl.style.color = change >= 0 ? '#10b981' : '#ef4444';
  }

  document.querySelectorAll('.news-flash').forEach(el => el.remove());
  for (const f of activeFlashes) {
    const div = document.createElement('div');
    div.className = 'news-flash';
    div.style.background = f.color;
    div.textContent = f.text;
    stockCells[f.idx].appendChild(div);
  }

  const ranked = traders.map((t, i) => {
    let nw = t.cash;
    for (let k = 0; k < 8; k++) nw += t.holdings[k] * stocks[k].price;
    return { t, nw, idx: i };
  }).sort((a, b) => b.nw - a.nw);

  const medals = ['🥇', '🥈', '🥉', ' '];
  ranked.forEach((r, rank) => {
    const row = traderRowEls[r.idx];
    row.style.order = rank;
    const pct = ((r.nw - 10000) / 10000) * 100;
    const pnlEl = document.getElementById('pnl' + r.idx);
    pnlEl.textContent = fmtMoney(r.nw) + '  ' + (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
    pnlEl.style.color = pct >= 0 ? '#10b981' : '#ef4444';
    document.getElementById('rk' + r.idx).textContent = medals[rank] || (rank + 1);
    row.style.background = rank === 0 ? r.t.color + '22' : '#11161d';
    row.style.transform = rank === 0 ? 'scale(1.02)' : 'scale(1)';
  });

  drawNetworth();
  yearEl.textContent = (tick / 252).toFixed(1);
}

function endGame() {
  running = false;
  const ranked = traders.map(t => {
    let nw = t.cash;
    for (let i = 0; i < 8; i++) nw += t.holdings[i] * stocks[i].price;
    return { t, nw };
  }).sort((a, b) => b.nw - a.nw);

  const medals = ['🥇', '🥈', '🥉', '4.'];
  finalList.innerHTML = ranked.map((r, i) =>
    `<div class="winner ${i === 0 ? 'first' : ''}" style="color:${r.t.color}">${medals[i]} ${r.t.name} — ${fmtMoney(r.nw)}</div>`
  ).join('');
  endcard.classList.add('show');

  let cd = 5;
  cdEl.textContent = cd;
  const tickCd = setInterval(() => {
    cd--;
    cdEl.textContent = cd;
    if (cd <= 0) {
      clearInterval(tickCd);
      init();
      lastStep = 0;
      lastDraw = 0;
      requestAnimationFrame(loop);
    }
  }, 1000);
}

let lastStep = 0;
let lastDraw = 0;
function loop(now) {
  if (!running) return;
  if (!lastStep) lastStep = now;
  let safety = 0;
  while (now - lastStep > TICK_MS && safety < 8) {
    step();
    lastStep += TICK_MS;
    safety++;
    if (tick >= TOTAL_TICKS) {
      drawAll();
      endGame();
      return;
    }
  }
  if (now - lastDraw > 32) {
    drawAll();
    lastDraw = now;
  }
  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
