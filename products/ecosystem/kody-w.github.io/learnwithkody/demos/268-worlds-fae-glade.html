<!DOCTYPE html>

<style>
  html,body{margin:0;padding:0;background:#0a0814;color:#e6e6f4;overflow:hidden;font-family:Georgia,serif}
  canvas{display:block}
  #stamp{position:fixed;top:8px;right:8px;background:rgba(20,10,40,.78);border:1px solid #c0c0d8;

    box-shadow:0 0 12px rgba(180,170,255,.4)}

  #hud{position:fixed;left:8px;top:8px;background:rgba(15,8,30,.78);border:1px solid #6a4ea0;color:#e6e6f4;

  #hud b{color:#f4afaf}
  #hourClock{position:fixed;left:50%;top:8px;transform:translateX(-50%);background:rgba(15,8,30,.85);
    border:1px solid #c0c0d8;color:#f8f8ff;padding:7px 14px;font:bold 13px/1.2 Georgia,serif;
    z-index:10;border-radius:18px;letter-spacing:1.5px;box-shadow:0 0 16px rgba(255,235,71,.25)}
  #hourClock .phase{display:block;font-weight:normal;font-size:10px;color:#ffeb47;margin-top:2px;letter-spacing:1px}
  #brain{position:fixed;left:8px;top:160px;background:rgba(15,8,30,.78);border:1px solid #6a4ea0;color:#e6e6f4;
    padding:6px 9px;font:10px/1.35 Georgia,serif;z-index:10;max-width:260px;border-radius:3px;min-height:40px}
  #brain b{color:#ffeb47}
  #plan{position:fixed;left:8px;bottom:128px;background:rgba(15,8,30,.78);border:1px solid #6a4ea0;color:#e6e6f4;
    padding:6px 9px;font:10px/1.35 Georgia,serif;z-index:10;max-width:300px;border-radius:3px;max-height:180px;overflow:hidden}
  #plan b{color:#c0c0d8}
  #events{position:fixed;right:8px;top:64px;background:rgba(15,8,30,.78);border:1px solid #6a4ea0;color:#e6e6f4;
    padding:6px 9px;font:10px/1.35 Georgia,serif;z-index:10;max-width:240px;border-radius:3px}
  #events b{color:#f4afaf}
  #minimap{position:fixed;right:8px;bottom:8px;width:200px;height:200px;background:rgba(8,4,20,.85);
    border:1px solid #6a4ea0;z-index:10;border-radius:3px}
  #cast{position:fixed;left:8px;bottom:8px;background:rgba(15,8,30,.78);border:1px solid #6a4ea0;color:#e6e6f4;
    padding:6px 9px;font:10px/1.35 Georgia,serif;z-index:10;max-width:300px;border-radius:3px;max-height:120px;overflow:hidden}
  #cast b{color:#f4afaf}
  #pip{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
  #pip canvas{width:140px;height:84px;background:#000;border:1px solid #6a4ea0;border-radius:2px}
  #chyron{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(0deg,rgba(15,8,30,.95),rgba(15,8,30,.7));
    color:#f8f8ff;padding:6px 12px;font:italic 13px/1.3 Georgia,serif;z-index:9;border-top:1px solid #c0c0d8;
    text-align:center;letter-spacing:.5px}
  #area{position:fixed;right:8px;top:8px;background:rgba(15,8,30,.78);border:1px solid #c0c0d8;color:#f8f8ff;
    padding:5px 9px;font:bold 11px/1.2 Georgia,serif;z-index:11;border-radius:3px;letter-spacing:1px}
  #cam{position:fixed;left:50%;top:48px;transform:translateX(-50%);background:rgba(15,8,30,.78);
    border:1px solid #c0c0d8;color:#c0c0d8;padding:4px 9px;font:11px/1.2 Georgia,serif;z-index:10;border-radius:3px;letter-spacing:1px}
  #act{position:fixed;left:50%;top:74px;transform:translateX(-50%);background:rgba(15,8,30,.78);
    border:1px solid #ffeb47;color:#ffeb47;padding:4px 9px;font:bold 11px/1.2 Georgia,serif;z-index:10;border-radius:3px;letter-spacing:1px}
</style>

<body>
<!-- ROUND25_WORLDS v1 -->
<div id="stamp">LIVING CITY 11/12: FAE GLADE<span class="sub">Round 25 · Brimsworth Worlds</span></div>
<div id="hud">…</div>
<div id="hourClock">06:00<span class="phase">DAWN MIST</span></div>
<div id="brain">…</div>
<div id="plan">…</div>
<div id="events">…</div>
<div id="cast">…</div>
<canvas id="minimap" width="400" height="400"></canvas>
<div id="pip">
  <canvas id="pip0" width="280" height="168"></canvas>
  <canvas id="pip1" width="280" height="168"></canvas>
  <canvas id="pip2" width="280" height="168"></canvas>
  <canvas id="pip3" width="280" height="168"></canvas>
</div>
<div id="chyron">…</div>
<div id="area">CENTRAL MOONLIT ALTAR</div>
<div id="cam">CAM 01 · WIDE-ESTABLISH</div>
<div id="act">ACT I · DAWN MIST</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){'use strict';

// === Sentinel & keys (split-strings) ===
var TAG = 'ROUND25'+'_WORLDS v1';
var UID = 'fae-glade';
var LS_KEY = 'worlds_'+'fae_glade_v1';
var LEDGER_KEY = 'brimsworth_'+'worlds_v1';
var MULTI_KEY = 'brimsworth_'+'multiverse_v1';
var CANON_KEY = 'brimsworth_'+'canon_v1';
var CAST_KEY = 'recurring_'+'cast_v1';
var BC_NAME_W = 'brimsworth_'+'worlds';
var BC_NAME_M = 'brimsworth_'+'multiverse';

console.log('['+TAG+'] booting fae glade');

// === Seeded RNG ===
function makeRng(seed){var s=seed|0;return function(){s^=s<<13;s^=s>>>17;s^=s<<5;return ((s>>>0)%100000)/100000;};}
var SEED = Math.floor(Date.now()/600000);
var rng = makeRng(SEED+11);

// === Cross-canon read ===
var canon=null,cast=null,multi=null,self=null;
try{canon=JSON.parse(localStorage.getItem(CANON_KEY)||'null');}catch(e){}
try{cast=JSON.parse(localStorage.getItem(CAST_KEY)||'null');}catch(e){}
try{multi=JSON.parse(localStorage.getItem(MULTI_KEY)||'null');}catch(e){}
try{self=JSON.parse(localStorage.getItem(LS_KEY)||'null');}catch(e){}

// === Ledger append ===
var ledger={};
try{ledger=JSON.parse(localStorage.getItem(LEDGER_KEY)||'{}');}catch(e){ledger={};}
var visits = (ledger[UID] && ledger[UID].visits || 0) + 1;
ledger[UID] = {
  city_id: UID,
  label: 'FAE GLADE MOONLIT-COURT',
  index: '11/12',
  round: 25,
  tag: TAG,
  last_seen: Date.now(),
  visits: visits,
  cross_links: ['fairy-multiverse','noir','spirit-realm','recurring-cast','brimsworth-canon'],
  palette: ['#c0c0d8','#1f3a1f','#3a1a5b','#ffeb47','#f4afaf','#f8f8ff'],
  cycle: '12h-day-night',
  zones: ['central-moonlit-altar','glowing-mushroom-garden','fae-feast-table','mossy-spring','moonlit-pond','faerie-fire-grove'],
  seed: SEED
};
try{localStorage.setItem(LEDGER_KEY,JSON.stringify(ledger));}catch(e){}

// === BroadcastChannel ===
var bcW=null,bcM=null;
try{bcW=new BroadcastChannel(BC_NAME_W);bcW.postMessage({type:'hello',city:UID,tag:TAG,t:Date.now()});}catch(e){}
try{bcM=new BroadcastChannel(BC_NAME_M);}catch(e){}
function bcEmit(type,payload){var msg={type:type,city:UID,tag:TAG,t:Date.now(),payload:payload||{}};
  try{if(bcW)bcW.postMessage(msg);}catch(e){}}
var crossPings=[];
if(bcW)bcW.onmessage=function(e){if(e.data&&e.data.city!==UID)crossPings.push('W:'+(e.data.city||'?')+':'+e.data.type);};
if(bcM)bcM.onmessage=function(e){if(e.data)crossPings.push('M:'+(e.data.city||e.data.universe||'?')+':'+e.data.type);};

// === Audio leitmotif (celesta arpeggio) ===
var aCtx=null,aGain=null;
function audioInit(){if(aCtx)return;try{aCtx=new (window.AudioContext||window.webkitAudioContext)();
  aGain=aCtx.createGain();aGain.gain.value=0.04;aGain.connect(aCtx.destination);}catch(e){}}
function ping(freq,when,dur){if(!aCtx)return;var o=aCtx.createOscillator();var g=aCtx.createGain();
  o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(0.5,when+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,when+dur);o.connect(g);g.connect(aGain);o.start(when);o.stop(when+dur+0.05);}
function motifPlay(){if(!aCtx)return;var t=aCtx.currentTime;
  ping(523.25,t,0.6);ping(659.25,t+0.18,0.55);ping(783.99,t+0.36,0.5);ping(1046.5,t+0.54,0.7);}
window.addEventListener('pointerdown',function(){audioInit();},{once:true});

// === Scene setup ===
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1432);
scene.fog=new THREE.FogExp2(0x2a1a4a,0.018);

var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,500);
camera.position.set(0,12,30);camera.lookAt(0,2,0);

var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);});

// === Lights ===
var hemi=new THREE.HemisphereLight(0xc0c0d8,0x1f3a1f,0.5);scene.add(hemi);
var sun=new THREE.DirectionalLight(0xffeecc,0.0);sun.position.set(40,30,20);scene.add(sun);
var moon=new THREE.DirectionalLight(0xb6b6ff,0.4);moon.position.set(-30,40,-20);scene.add(moon);
var ambient=new THREE.AmbientLight(0x3a2a5a,0.4);scene.add(ambient);

// === Stars ===
(function(){var sg=new THREE.BufferGeometry();var sp=[];
  for(var i=0;i<800;i++){var th=Math.random()*Math.PI*2;var ph=Math.acos(2*Math.random()-1);var r=180+Math.random()*40;
    sp.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph)*0.6+50,r*Math.sin(ph)*Math.sin(th));}
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xf8f8ff,size:0.6,sizeAttenuation:true,transparent:true,opacity:0.85})));})();

// === Ground ===
var groundMat=new THREE.MeshStandardMaterial({color:0x1f3a1f,roughness:0.9,metalness:0.0});
var ground=new THREE.Mesh(new THREE.CircleGeometry(120,48),groundMat);
ground.rotation.x=-Math.PI/2;scene.add(ground);

// moss patches
for(var mp=0;mp<60;mp++){var mc=new THREE.Mesh(new THREE.CircleGeometry(2+rng()*4,12),
  new THREE.MeshStandardMaterial({color:rng()<0.5?0x2a4f2a:0x3a5a2a,roughness:0.95}));
  mc.rotation.x=-Math.PI/2;mc.position.set((rng()-0.5)*180,0.01,(rng()-0.5)*180);scene.add(mc);}

// === Entity tracking ===
var entities=[];
var NAMES={};
function uniqueName(pool,extra){
  for(var k=0;k<60;k++){var n=pool[Math.floor(rng()*pool.length)];
    if(extra)n=n+' '+extra[Math.floor(rng()*extra.length)];
    if(!NAMES[n]){NAMES[n]=1;return n;}}
  return pool[0]+'_'+Object.keys(NAMES).length;
}
function E(name,kind,obj,x,z,note){entities.push({name:name,kind:kind,obj:obj,x:x,z:z,note:note||''});return obj;}

// === Zones ===
var ZONES=[
  {name:'central-moonlit-altar',label:'CENTRAL MOONLIT ALTAR',cx:0,cz:0,r:18},
  {name:'glowing-mushroom-garden',label:'GLOWING MUSHROOM GARDEN',cx:-38,cz:-12,r:14},
  {name:'fae-feast-table',label:'FAE FEAST TABLE',cx:32,cz:-22,r:12},
  {name:'mossy-spring',label:'MOSSY SPRING',cx:-30,cz:30,r:10},
  {name:'moonlit-pond',label:'MOONLIT POND',cx:38,cz:24,r:13},
  {name:'faerie-fire-grove',label:'FAERIE FIRE GROVE',cx:0,cz:-46,r:14}
];

// === Reusable geometry ===
var trunkG=new THREE.CylinderGeometry(0.4,0.6,7,8);
var canopyG=new THREE.SphereGeometry(3.2,12,10);
var lanternG=new THREE.SphereGeometry(0.35,10,8);
var mushroomCapG=new THREE.SphereGeometry(0.6,10,8,0,Math.PI*2,0,Math.PI/2);
var mushroomStemG=new THREE.CylinderGeometry(0.18,0.22,0.6,8);
var bodyG=new THREE.CylinderGeometry(0.18,0.28,1.2,8);
var headG=new THREE.SphereGeometry(0.22,10,8);
var wingG=new THREE.PlaneGeometry(0.5,0.7);

// === Trees ringing the glade ===
var trees=[];
for(var t1=0;t1<70;t1++){
  var ang=(t1/70)*Math.PI*2+rng()*0.1;
  var rad=70+rng()*30;
  var tx=Math.cos(ang)*rad,tz=Math.sin(ang)*rad;
  var tr=new THREE.Group();
  var trunk=new THREE.Mesh(trunkG,new THREE.MeshStandardMaterial({color:0x2a1a0e,roughness:0.95}));
  trunk.position.y=3.5;tr.add(trunk);
  var canopy=new THREE.Mesh(canopyG,new THREE.MeshStandardMaterial({color:rng()<0.5?0x1f3a1f:0x2a4f2a,roughness:0.9}));
  canopy.position.y=8;canopy.scale.set(1+rng()*0.3,1+rng()*0.4,1+rng()*0.3);tr.add(canopy);
  tr.position.set(tx,0,tz);scene.add(tr);trees.push(tr);
}

// === Antlered ceremonial arch (central altar) ===
(function(){
  var arch=new THREE.Group();
  var post1=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,5,8),new THREE.MeshStandardMaterial({color:0x4a3a2a,roughness:0.85}));
  post1.position.set(-2.5,2.5,0);arch.add(post1);
  var post2=post1.clone();post2.position.x=2.5;arch.add(post2);
  var beam=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,5.5,8),new THREE.MeshStandardMaterial({color:0x4a3a2a,roughness:0.85}));
  beam.rotation.z=Math.PI/2;beam.position.y=5;arch.add(beam);
  // antlers
  for(var an=0;an<6;an++){var ant=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,1.2,6),
    new THREE.MeshStandardMaterial({color:0xe6dccc,roughness:0.7}));
    ant.position.set((an-2.5)*0.8,5.6,0);ant.rotation.z=(an-2.5)*0.2;arch.add(ant);}
  arch.position.set(0,0,2);scene.add(arch);
  E('Ceremonial Antler Arch','prop',arch,0,2);
})();

// === Mossy altar at center ===
(function(){
  var altar=new THREE.Group();
  var base=new THREE.Mesh(new THREE.BoxGeometry(3,0.6,1.6),new THREE.MeshStandardMaterial({color:0x4a5f3a,roughness:0.9}));
  base.position.y=0.3;altar.add(base);
  var top=new THREE.Mesh(new THREE.BoxGeometry(3.2,0.2,1.8),new THREE.MeshStandardMaterial({color:0x5a6f4a,roughness:0.85,emissive:0x223322,emissiveIntensity:0.2}));
  top.position.y=0.7;altar.add(top);
  altar.position.set(0,0,0);scene.add(altar);
  E('Mossy Altar Stone','prop',altar,0,0);
})();

// === Floating lanterns ===
var lanterns=[];
for(var ln=0;ln<48;ln++){
  var ang2=rng()*Math.PI*2;var rad2=8+rng()*52;
  var lx=Math.cos(ang2)*rad2,lz=Math.sin(ang2)*rad2;
  var lh=2.4+rng()*5.5;
  var l=new THREE.Mesh(lanternG,new THREE.MeshStandardMaterial({color:0xffeb47,emissive:0xffaa33,emissiveIntensity:1.4,roughness:0.4}));
  l.position.set(lx,lh,lz);scene.add(l);
  var pl=new THREE.PointLight(0xffaa44,0.6,7);pl.position.copy(l.position);scene.add(pl);
  lanterns.push({mesh:l,light:pl,baseY:lh,phase:rng()*Math.PI*2});
}

// === Glowing mushrooms (mushroom garden) ===
var mushrooms=[];
for(var mu=0;mu<70;mu++){
  var mz=ZONES[1];
  var mAng=rng()*Math.PI*2;var mR=rng()*mz.r*0.95;
  var mx=mz.cx+Math.cos(mAng)*mR;var mzc=mz.cz+Math.sin(mAng)*mR;
  var mg=new THREE.Group();
  var mc=new THREE.Mesh(mushroomCapG,new THREE.MeshStandardMaterial({color:rng()<0.5?0xc06bff:0xff8fbf,emissive:rng()<0.5?0x6633aa:0xaa3366,emissiveIntensity:0.6,roughness:0.5}));
  mc.position.y=0.6;mg.add(mc);
  var ms=new THREE.Mesh(mushroomStemG,new THREE.MeshStandardMaterial({color:0xeae0d6,roughness:0.85}));
  ms.position.y=0.3;mg.add(ms);
  var sc=0.6+rng()*1.4;mg.scale.set(sc,sc,sc);
  mg.position.set(mx,0,mzc);scene.add(mg);
  mushrooms.push(mg);
}

// === Faerie-fire pyres (faerie-fire-grove) ===
var pyres=[];
for(var py=0;py<8;py++){
  var pz=ZONES[5];
  var pAng=(py/8)*Math.PI*2;var pR=pz.r*0.7;
  var px=pz.cx+Math.cos(pAng)*pR;var pzc=pz.cz+Math.sin(pAng)*pR;
  var pg=new THREE.Group();
  var pyreBase=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.8,0.4,8),new THREE.MeshStandardMaterial({color:0x2a1a0e,roughness:0.95}));
  pyreBase.position.y=0.2;pg.add(pyreBase);
  var flame=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.4,8),new THREE.MeshStandardMaterial({color:0xffaa33,emissive:0xff6611,emissiveIntensity:1.6,transparent:true,opacity:0.85}));
  flame.position.y=1.1;pg.add(flame);
  var pyreLight=new THREE.PointLight(0xff7733,0,9);pyreLight.position.set(px,1.5,pzc);scene.add(pyreLight);
  pg.position.set(px,0,pzc);scene.add(pg);
  pyres.push({mesh:pg,flame:flame,light:pyreLight});
}

// === Moonlit pond ===
(function(){
  var pz=ZONES[4];
  var pond=new THREE.Mesh(new THREE.CircleGeometry(pz.r*0.9,32),
    new THREE.MeshStandardMaterial({color:0x1a2a4a,emissive:0x2a3a6a,emissiveIntensity:0.4,roughness:0.2,metalness:0.3,transparent:true,opacity:0.85}));
  pond.rotation.x=-Math.PI/2;pond.position.set(pz.cx,0.05,pz.cz);scene.add(pond);
  E('Moonlit Pond Mirror','prop',pond,pz.cx,pz.cz);
  // lily pads
  for(var lp=0;lp<14;lp++){var lpAng=rng()*Math.PI*2;var lpR=rng()*pz.r*0.8;
    var lpd=new THREE.Mesh(new THREE.CircleGeometry(0.5+rng()*0.4,8),new THREE.MeshStandardMaterial({color:0x2a5f3a,roughness:0.9}));
    lpd.rotation.x=-Math.PI/2;lpd.position.set(pz.cx+Math.cos(lpAng)*lpR,0.07,pz.cz+Math.sin(lpAng)*lpR);scene.add(lpd);}
})();

// === Mossy spring ===
(function(){
  var sz=ZONES[3];
  var spring=new THREE.Mesh(new THREE.CircleGeometry(sz.r*0.5,24),
    new THREE.MeshStandardMaterial({color:0x4a8aa6,emissive:0x2a5566,emissiveIntensity:0.4,roughness:0.3,transparent:true,opacity:0.85}));
  spring.rotation.x=-Math.PI/2;spring.position.set(sz.cx,0.05,sz.cz);scene.add(spring);
  // boulders
  for(var bb=0;bb<7;bb++){var bbAng=(bb/7)*Math.PI*2;var bbR=sz.r*0.55;
    var bld=new THREE.Mesh(new THREE.SphereGeometry(0.6+rng()*0.5,8,6),new THREE.MeshStandardMaterial({color:0x4a5f4a,roughness:0.95}));
    bld.position.set(sz.cx+Math.cos(bbAng)*bbR,0.4,sz.cz+Math.sin(bbAng)*bbR);scene.add(bld);}
  E('Mossy Spring','prop',spring,sz.cx,sz.cz);
})();

// === Fae feast table ===
(function(){
  var fz=ZONES[2];
  var tab=new THREE.Mesh(new THREE.BoxGeometry(7,0.2,2.2),new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:0.85}));
  tab.position.set(fz.cx,1.0,fz.cz);scene.add(tab);
  // legs
  for(var lg=0;lg<4;lg++){var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1,6),new THREE.MeshStandardMaterial({color:0x4a3a2a}));
    leg.position.set(fz.cx+(lg%2?2.8:-2.8),0.5,fz.cz+(lg<2?0.9:-0.9));scene.add(leg);}
  // goblets and platters
  for(var gp=0;gp<10;gp++){var gob=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.08,0.25,6),
    new THREE.MeshStandardMaterial({color:0xc0a060,emissive:0x554420,emissiveIntensity:0.3,metalness:0.6,roughness:0.4}));
    gob.position.set(fz.cx-3+gp*0.65,1.22,fz.cz+(gp%2?0.5:-0.5));scene.add(gob);}
  E('Fae Feast Table','prop',tab,fz.cx,fz.cz);
})();

// === Fireflies (additive points) ===
var fireflies=[];
(function(){
  var fg=new THREE.BufferGeometry();var fp=[];
  for(var fi=0;fi<320;fi++){var fa=rng()*Math.PI*2;var fr=rng()*70;

  {name:'TWILIGHT VIOLET',sky:0x6a3a7a,fog:0x4a2a5a,fogDen:0.022,sunI:0.2,moonI:0.5,ambient:0x4a2a5a,hemiI:0.45},

  {name:'DEEP-NIGHT FAERIE-FIRE',sky:0x0a0820,fog:0x1a1030,fogDen:0.028,sunI:0.0,moonI:0.7,ambient:0x1a1030,hemiI:0.3}
];
function lerp(a,b,k){return a+(b-a)*k;}
function lerpColor(c1,c2,k){var r1=(c1>>16)&255,g1=(c1>>8)&255,b1=c1&255;var r2=(c2>>16)&255,g2=(c2>>8)&255,b2=c2&255;
  return (Math.round(lerp(r1,r2,k))<<16)|(Math.round(lerp(g1,g2,k))<<8)|Math.round(lerp(b1,b2,k));}

function updateCycle(t){
  var h=6+(t/50);
  var hh=Math.floor(h)%24;var mm2=Math.floor((h%1)*60);
  // map hours to phase indices: 6→0 dawn, 11→1 noon, 14→2 afternoon, 17→3 twilight, 19→4 moonlit, 22→5 deep night
  var phaseI,phaseK;
  if(h<11){phaseI=0;phaseK=(h-6)/5;}
  else if(h<14){phaseI=1;phaseK=(h-11)/3;}
  else if(h<17){phaseI=2;phaseK=(h-14)/3;}
  else if(h<19){phaseI=3;phaseK=(h-17)/2;}
  else if(h<22){phaseI=4;phaseK=(h-19)/3;}
  else if(h<26){phaseI=5;phaseK=Math.min(1,(h-22)/4);}
  else{phaseI=0;phaseK=0;}
  var pa=phaseColors[phaseI];var pb=phaseColors[Math.min(phaseI+1,phaseColors.length-1)];
  var sky=lerpColor(pa.sky,pb.sky,phaseK);
  var fog=lerpColor(pa.fog,pb.fog,phaseK);
  var amb=lerpColor(pa.ambient,pb.ambient,phaseK);
  scene.background=new THREE.Color(sky);
  scene.fog.color=new THREE.Color(fog);
  scene.fog.density=lerp(pa.fogDen,pb.fogDen,phaseK);
  ambient.color=new THREE.Color(amb);
  hemi.intensity=lerp(pa.hemiI,pb.hemiI,phaseK);
  sun.intensity=lerp(pa.sunI,pb.sunI,phaseK);
  moon.intensity=lerp(pa.moonI,pb.moonI,phaseK);
  // sun/moon position
  var sunAng=((h-6)/12)*Math.PI;
  sun.position.set(Math.cos(sunAng)*40,Math.max(2,Math.sin(sunAng)*30),20);
  moon.position.set(-Math.cos(sunAng)*40,Math.max(2,-Math.sin(sunAng)*30+15),-20);
  // lantern emissive: brighter at night
  var night=1-Math.max(0,Math.min(1,(sun.intensity)));
  lanterns.forEach(function(l){l.mesh.material.emissiveIntensity=0.4+night*1.4;l.light.intensity=0.2+night*0.8;});
  // hour clock display
  hourEl.firstChild.nodeValue=hh.toString().padStart(2,'0')+':'+mm2.toString().padStart(2,'0');
  hourEl.lastChild.textContent=phaseColors[phaseI].name;
  return {h:h,phase:phaseColors[phaseI].name,phaseI:phaseI};
}

// === Plan tree (text overlay) ===
function buildPlan(){
  var lines=['<b>FAE GLADE PLAN · 12-HOUR CYCLE</b>'];
  beats.forEach(function(b){lines.push('• '+b.hour+' · '+b.msg.slice(0,52));});
  return lines.join('<br>');
}
planEl.innerHTML=buildPlan();

function buildEvents(t){
  var hr=6+(t/50);
  var lines=['<b>UPCOMING ✦</b>'];
  var found=0;
  for(var i=beatIdx;i<beats.length&&found<6;i++){
    var dt=beats[i].t-t;if(dt<0)continue;
    lines.push('+'+Math.floor(dt)+'s · '+beats[i].hour+' · '+beats[i].msg.slice(0,38));found++;
  }
  if(found===0)lines.push('— cycle resets —');
  return lines.join('<br>');
}

function buildCast(){
  var lines=['<b>NAMED FAE · '+entities.length+' ENTITIES</b>'];
  // sample 8 random named fae
  var sample=[];var keys=Object.keys(NAMES);
  for(var s=0;s<8&&keys.length>0;s++){sample.push(keys[Math.floor(rng()*keys.length)]);}
  sample.forEach(function(n){lines.push('· '+n.slice(0,56));});
  return lines.join('<br>');
}
castEl.innerHTML=buildCast();

function buildBrain(t,info){
  var f=faeFigures[Math.floor(t/3)%faeFigures.length];
  var ent=Object.keys(NAMES).length;
  var crossNote='';
  if(canon)crossNote+=' · canon✦';
  if(cast)crossNote+=' · cast✦';
  if(multi)crossNote+=' · R24multi✦';
  var lines=['<b>'+f.name.slice(0,52)+'</b>',
    'role: '+f.routine+' @ '+f.zone.label,
    'cycle: '+info.phase+' · h'+f.zone.label.slice(0,3),
    'glade·named·'+ent+crossNote,
    'cross-pings: '+(crossPings.length?crossPings.slice(-2).join(' / '):'—')];
  return lines.join('<br>');
}

function buildHud(t,info){
  var hr=Math.floor(6+(t/50));
  var lines=['<b>FAE GLADE</b>',
    'cycle '+info.phase+' · h'+(hr%24).toString().padStart(2,'0'),
    'visit #'+visits+' · seed '+SEED,
    'fae·'+entities.filter(function(e){return e.kind==='fae'||e.kind==='fae-citizen';}).length+' · zones·'+ZONES.length,
    'cams·'+cams.length+' · t·'+Math.floor(t)+'s',
    'tag: '+TAG];
  return lines.join('<br>');
}

// === Save state ===
var lastSave=0;
function saveState(t){
  var st={tag:TAG,uid:UID,t:t,seed:SEED,visits:visits,beatIdx:beatIdx,
    hour:6+(t/50),phase:phaseColors[Math.min(5,Math.max(0,Math.floor((t/950)*6)))].name,
    saved:Date.now()};
  try{localStorage.setItem(LS_KEY,JSON.stringify(st));}catch(e){}
}

// === Reseed check ===
var lastReseedCheck=0;
function checkReseed(){
  var nowSeed=Math.floor(Date.now()/600000);
  if(nowSeed!==SEED){console.log('['+TAG+'] reseed: '+SEED+' → '+nowSeed);SEED=nowSeed;rng=makeRng(SEED+11);}
}

// === Animation loop ===
var t0=performance.now();var lastFrame=t0;
function tick(){
  var now=performance.now();var dt=(now-lastFrame)/1000;lastFrame=now;
  var t=(now-t0)/1000;

  // beat advance
  while(beatIdx<beats.length-1&&t>=beats[beatIdx+1].t){beatIdx++;applyBeat(beats[beatIdx]);}
  if(beatIdx===0&&t<beats[0].t+0.2)applyBeat(beats[0]);

  var info=updateCycle(t);

  // camera switching
  camHold+=dt;
  if(camHold>camDur){camHold=0;camIdx=(camIdx+1)%cams.length;
    var c=cams[camIdx];camera.fov=c.fov;camera.updateProjectionMatrix();
    camera.position.set(c.pos[0],c.pos[1],c.pos[2]);camera.lookAt(c.look[0],c.look[1],c.look[2]);
    camEl.textContent=c.name;
    // area label
    var nearestZ=ZONES[0];var nearestD=1e9;
    ZONES.forEach(function(z){var d=(camera.position.x-z.cx)*(camera.position.x-z.cx)+(camera.position.z-z.cz)*(camera.position.z-z.cz);if(d<nearestD){nearestD=d;nearestZ=z;}});
    areaEl.textContent=nearestZ.label;
  }
  // dragonfly chase cams follow first dragonfly
  if(cams[camIdx].name.indexOf('DRAGONFLY-CHASE')>=0&&dragonflies[0]){
    var d0=dragonflies[0].obj;
    camera.position.set(d0.position.x-3,d0.position.y+1.5,d0.position.z-3);
    camera.lookAt(d0.position.x,d0.position.y,d0.position.z);
  }

  // lantern bob
  lanterns.forEach(function(l,i){l.mesh.position.y=l.baseY+Math.sin(t*0.6+l.phase)*0.25;l.light.position.y=l.mesh.position.y;});

  // firefly drift
  if(window.__fireflyPoints){
    var fp=window.__fireflyPoints.geometry.attributes.position.array;
    for(var fi=0;fi<fireflies.length;fi++){
      var fF=fireflies[fi];
      fF.phase+=dt*fF.sp;
      fp[fi*3]=fF.x+Math.sin(fF.phase)*1.2;
      fp[fi*3+1]=fF.base+Math.sin(fF.phase*1.7)*0.6;
      fp[fi*3+2]=fF.z+Math.cos(fF.phase*0.8)*1.2;
    }
    window.__fireflyPoints.geometry.attributes.position.needsUpdate=true;
    // brighten at night
    var night2=1-sun.intensity;
    window.__fireflyPoints.material.opacity=0.3+night2*0.7;
  }

  // petal fall
  if(window.__petalPoints){
    var pp=window.__petalPoints.geometry.attributes.position.array;
    for(var pi=0;pi<petals.length;pi++){
      var pe=petals[pi];
      pp[pi*3+1]+=pe.vy*dt*60;
      pp[pi*3]+=Math.sin(t*0.4+pe.phase)*0.02;
      if(pp[pi*3+1]<0.4){pp[pi*3+1]=8+rng()*4;pp[pi*3]=(rng()-0.5)*120;pp[pi*3+2]=(rng()-0.5)*120;}
    }
    window.__petalPoints.geometry.attributes.position.needsUpdate=true;
  }

  // fae figure idle: slight bob + rotate at zone
  faeFigures.forEach(function(f,i){
    f.obj.position.y=Math.abs(Math.sin(t*1.4+f.phase))*0.05;
    f.obj.rotation.y=f.phase+Math.sin(t*0.3+f.phase)*0.4;
  });

  // wedding figures idle
  if(weddingGroup.visible){weddingGroup.rotation.y=Math.sin(t*0.2)*0.05;
    for(var wi=2;wi<weddingGroup.children.length;wi++){weddingGroup.children[wi].rotation.y=Math.sin(t*0.5+wi)*0.3;}}

  // dragonfly orbits
  dragonflies.forEach(function(d){
    d.phase+=dt*d.sp;
    d.obj.position.x=Math.cos(d.phase)*d.r;
    d.obj.position.z=Math.sin(d.phase)*d.r;
    d.obj.position.y=d.cy+Math.sin(t*1.3+d.phase)*0.5;
    d.obj.rotation.y=-d.phase+Math.PI/2;
  });

  // pyres flicker (only after t>=800)
  if(t>=800){pyres.forEach(function(p){p.flame.scale.y=1+Math.sin(t*8+p.flame.id*0.5)*0.18;
    p.flame.material.emissiveIntensity=1.3+Math.sin(t*7+p.light.id)*0.4;p.light.intensity=1.4+Math.sin(t*9)*0.4;});}

  // portal swirl
  if(portalGroup.visible){portalGroup.children[0].rotation.z+=dt*0.5;portalGroup.children[1].rotation.z-=dt*0.3;
    portalGroup.children[1].material.opacity=0.55+Math.sin(t*2)*0.2;}

  // HUD updates
  hudEl.innerHTML=buildHud(t,info);
  brainEl.innerHTML=buildBrain(t,info);
  if(Math.floor(t*2)%2===0)eventsEl.innerHTML=buildEvents(t);

  // mini-map
  drawMinimap(t);

  // PiP renders (4 channels: WIDE-ESTABLISH, MOONLIT-ALTAR, FAERIE-FIRE-GROVE, MOONLIT-POND)
  var pipChoices=[0,4,5,11];
  for(var p=0;p<4;p++){
    var cc=cams[pipChoices[p]];
    pipCams[p].fov=cc.fov;pipCams[p].updateProjectionMatrix();
    pipCams[p].position.set(cc.pos[0],cc.pos[1],cc.pos[2]);
    pipCams[p].lookAt(cc.look[0],cc.look[1],cc.look[2]);
    pipRenderer.render(scene,pipCams[p]);
    var ctx=pipCanvases[p].getContext('2d');
    ctx.drawImage(pipRenderer.domElement,0,0,280,168);
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,150,280,18);
    ctx.fillStyle='#c0c0d8';ctx.font='bold 9px Georgia';
    ctx.fillText(cc.name,4,162);
  }

  // save / reseed
  if(t-lastSave>5){saveState(t);lastSave=t;}
  if(t-lastReseedCheck>20){checkReseed();lastReseedCheck=t;}

  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}

// === Diagnostics ===
console.log('['+TAG+'] entities='+entities.length+' fae-figures='+faeFigures.length+' offscreen='+offscreenFae.length+' total-named='+Object.keys(NAMES).length);
console.log('['+TAG+'] zones='+ZONES.length+' cams='+cams.length+' lanterns='+lanterns.length+' mushrooms='+mushrooms.length+' pyres='+pyres.length+' dragonflies='+dragonflies.length);
console.log('['+TAG+'] canon='+(!!canon)+' cast='+(!!cast)+' multi='+(!!multi)+' visits='+visits);

requestAnimationFrame(tick);

})();
</script>
