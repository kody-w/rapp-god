<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Rappter — A Browser Inside Your Browser</title>
<style>
  /* =========================================================
     HOST CHROME — these styles affect the OUTER browser shell.
     The engine never sees these; it builds its own DOM in #viewport.
     ========================================================= */
  :root{
    --bg:#1f1f2e; --bg2:#15151f; --chrome:#2d2d44; --chrome2:#3a3a55;
    --line:#444466; --fg:#e8e8f0; --muted:#9090b0; --accent:#7aa2ff;
    --hi:#ffd47a; --ok:#7ad97a; --err:#ff7a7a; --pink:#ff7ad9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg);
    font:13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color:var(--fg); overflow:hidden;
    background:
      radial-gradient(circle at 20% 0%, #2a2a48 0, transparent 50%),
      radial-gradient(circle at 90% 100%, #2a1a3a 0, transparent 50%),
      var(--bg);
  }
  #app{display:flex; flex-direction:column; height:100vh;}
  #titlebar{
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg,#3a3a55,#2a2a40);
    padding:6px 12px; border-bottom:1px solid #000;
    -webkit-app-region:drag; user-select:none;
  }
  #titlebar .dots{display:flex; gap:6px;}
  #titlebar .dot{width:12px; height:12px; border-radius:50%; background:#555; box-shadow:inset 0 0 2px rgba(0,0,0,.6);}
  #titlebar .dot.r{background:#ff5f57;}
  #titlebar .dot.y{background:#febc2e;}
  #titlebar .dot.g{background:#28c841;}
  #titlebar .title{font-size:12px; color:var(--muted); letter-spacing:.5px;}
  #titlebar .badge{font-size:10px; color:#000; background:var(--hi); padding:2px 6px; border-radius:8px; font-weight:700;}

  #tabs{
    display:flex; align-items:flex-end; padding:0 8px; background:#1a1a28;
    border-bottom:1px solid #000; gap:4px; height:32px;
  }
  .tab{
    background:linear-gradient(180deg,#3a3a55,#2a2a40);
    color:var(--fg); padding:6px 12px 7px;
    border:1px solid var(--line); border-bottom:none;
    border-top-left-radius:8px; border-top-right-radius:8px;
    font-size:12px; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-top:6px; cursor:default;
  }
  .tab.active{background:linear-gradient(180deg,#4d4d70,#3a3a55); color:#fff;}
  .tab .fav{display:inline-block; width:14px; height:14px; vertical-align:-2px; margin-right:6px;
    background:radial-gradient(circle,var(--hi),var(--pink)); border-radius:3px;}

  #toolbar{
    display:flex; gap:6px; align-items:center; padding:8px;
    background:var(--chrome); border-bottom:1px solid #000;
  }
  .btn{
    background:linear-gradient(180deg,#4a4a6a,#383852);
    color:#e8e8f0; border:1px solid #1a1a28;
    border-radius:6px; padding:5px 9px; font-size:14px; cursor:pointer;
    min-width:30px; text-align:center;
    box-shadow: 0 1px 0 rgba(255,255,255,.08) inset, 0 1px 2px rgba(0,0,0,.4);
    transition: filter .15s, transform .05s;
  }
  .btn:hover{filter:brightness(1.15);}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.4; cursor:not-allowed;}
  .btn.primary{background:linear-gradient(180deg,#5b7ccc,#3a59a3); border-color:#1a2a55;}
  .btn.toggle.on{background:linear-gradient(180deg,#caa53a,#a07c20); color:#000; border-color:#3a2a00;}
  .btn.danger{background:linear-gradient(180deg,#a44,#722); border-color:#400;}

  #addr-wrap{
    flex:1; display:flex; align-items:center; gap:8px;
    background:#1a1a28; border:1px solid #000; border-radius:6px;
    padding:0 10px; height:30px;
    box-shadow: 0 1px 0 rgba(255,255,255,.05) inset;
  }
  #addr-wrap.loading{box-shadow: 0 0 0 1px #5b7ccc inset;}
  #lock{color:var(--ok); font-size:11px;}
  #addr{
    flex:1; background:transparent; border:0; outline:0; color:#fff;
    font:13px ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing:.5px;
  }
  #addr::selection{background:var(--accent); color:#000;}
  #progress{
    position:absolute; left:0; right:0; bottom:0; height:2px;
    background:linear-gradient(90deg, var(--accent), var(--pink), var(--accent));
    background-size:200% 100%; transform-origin:left;
    transform:scaleX(0); transition: transform .1s linear;
  }
  #progress.loading{animation: shimmer 1.2s linear infinite;}
  @keyframes shimmer{from{background-position:0 0;} to{background-position:200% 0;}}

  #main{display:flex; flex:1; min-height:0; position:relative;}
  #left{flex:1; display:flex; flex-direction:column; min-width:0; position:relative; background:#fff;}
  #viewport{
    flex:1; overflow:auto; background:#fff; color:#000;
    /* The engine assigns its own styles to descendants. */
    position:relative;
  }
  #viewport.loading::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg, rgba(0,0,0,.02) 0 20px, rgba(0,0,0,.04) 20px 40px);
    pointer-events:none;
  }
  #source-pane{
    flex:1; overflow:auto; background:#0e1018; color:#d8d8e8;
    padding:14px; font:12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  #source-pane .tk-tag{color:#7aa2ff;}
  #source-pane .tk-name{color:#ff9ad9;}
  #source-pane .tk-attr{color:#ffd47a;}
  #source-pane .tk-val{color:#7ad97a;}
  #source-pane .tk-comment{color:#666; font-style:italic;}
  #source-pane .tk-doctype{color:#888;}
  #source-pane .tk-text{color:#e8e8f0;}

  #inspector{
    width:340px; background:var(--bg2); border-left:1px solid #000;
    display:flex; flex-direction:column;
  }
  #inspector.hidden{display:none;}
  .ins-tabs{display:flex; background:var(--chrome); border-bottom:1px solid #000;}
  .ins-tab{
    flex:1; padding:8px; text-align:center; font-size:11px;
    background:transparent; color:var(--muted); border:none; cursor:pointer;
    text-transform:uppercase; letter-spacing:1px;
  }
  .ins-tab.active{background:var(--bg2); color:var(--fg); box-shadow:inset 0 -2px 0 var(--accent);}
  .ins-pane{flex:1; overflow:auto; padding:8px; font:11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;}
  .ins-pane.hidden{display:none;}

  .dom-node{cursor:pointer; padding:1px 2px; border-radius:2px;}
  .dom-node:hover{background:rgba(255,255,255,.06);}
  .dom-node.focused{background:rgba(122,162,255,.2);}
  .dom-tag{color:#ff9ad9;}
  .dom-name{color:#7aa2ff;}
  .dom-attr{color:#ffd47a;}
  .dom-val{color:#7ad97a;}
  .dom-text{color:#aaa;}
  .dom-tree ul{list-style:none; margin:0; padding-left:14px; border-left:1px dotted #333;}
  .dom-tree > ul{padding-left:0; border:none;}
  .toggle{display:inline-block; width:10px; color:var(--muted); cursor:pointer;}
  .collapsed > ul{display:none;}

  .style-block{margin-bottom:10px; padding:6px 8px; background:#101018; border-radius:4px;}
  .style-block .h{color:var(--accent); font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;}
  .style-line{display:flex; gap:8px;}
  .style-line .k{color:#ff9ad9; min-width:90px;}
  .style-line .v{color:#7ad97a; word-break:break-all;}
  .style-line .src{color:#666; margin-left:4px; font-size:9px;}

  #status{
    height:22px; background:#0e0e18; color:var(--muted);
    font:11px ui-monospace, monospace; padding:3px 12px; border-top:1px solid #000;
    display:flex; align-items:center; justify-content:space-between;
  }
  #status .l{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  #status .r{color:var(--muted); font-size:10px;}

  /* Hover highlight overlay drawn above viewport */
  #hover-hint{
    position:absolute; pointer-events:none; z-index:10;
    border:1px solid var(--accent); background:rgba(122,162,255,.12);
    transition: all .08s ease-out; opacity:0;
  }
  #hover-hint.on{opacity:1;}
  #hover-hint .lbl{
    position:absolute; left:0; top:-18px; background:var(--accent); color:#000;
    font:10px ui-monospace, monospace; padding:1px 4px; border-radius:2px 2px 2px 0;
    white-space:nowrap;
  }

  /* Scrollbars styled */
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#444466; border-radius:6px;}
  ::-webkit-scrollbar-thumb:hover{background:#5a5a88;}
</style>
</head>
<body>
<div id="app">

  <div id="titlebar">
    <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
    <div class="title">Rappter — a tiny browser engine, written from scratch in JavaScript</div>
    <div class="badge">v0.42 · localhost</div>
  </div>

  <div id="tabs"><div class="tab active"><span class="fav"></span><span id="tab-title">Loading…</span></div></div>

  <div id="toolbar">
    <button class="btn" id="back" title="Back">‹</button>
    <button class="btn" id="fwd" title="Forward">›</button>
    <button class="btn" id="refresh" title="Refresh">⟳</button>
    <button class="btn danger" id="stop" title="Stop">×</button>
    <div id="addr-wrap" style="position:relative;">
      <span id="lock" title="rappter:// scheme — bundled corpus">🔒</span>
      <input id="addr" spellcheck="false" autocomplete="off" value="rappter://home" />
      <div id="progress"></div>
    </div>
    <button class="btn primary" id="go">Go</button>
    <button class="btn toggle" id="view-src" title="View source">{ }</button>
    <button class="btn toggle" id="inspect-toggle" title="Toggle inspector">⊞</button>
  </div>

  <div id="main">
    <div id="left">
      <div id="viewport"></div>
      <div id="source-pane" hidden></div>
      <div id="hover-hint"><div class="lbl"></div></div>
    </div>
    <div id="inspector" class="hidden">
      <div class="ins-tabs">
        <button class="ins-tab active" data-tab="dom">DOM</button>
        <button class="ins-tab" data-tab="styles">Computed</button>
        <button class="ins-tab" data-tab="rules">Rules</button>
      </div>
      <div id="ins-dom" class="ins-pane"></div>
      <div id="ins-styles" class="ins-pane hidden"></div>
      <div id="ins-rules" class="ins-pane hidden"></div>
    </div>
  </div>

  <div id="status"><div class="l" id="status-l">Ready.</div><div class="r" id="status-r">engine: tokenize → tree → cascade → layout → paint</div></div>

</div>

<script>
/* ============================================================================
 * RAPPTER — A toy browser engine in one file.
 *
 * Pipeline:
 *   raw HTML string
 *      └─► tokenize()   → tokens [doctype, start, end, text, comment]
 *      └─► buildTree()  → engine DOM { type, tag, attrs, children, parent }
 *      └─► parseCSS()   → CSS rules [{ selector[], declarations{} }]
 *      └─► computeStyles(node, rules) for every element node
 *      └─► layout()     → assigns display/box-model interpretation
 *      └─► paint()      → constructs HOST DOM divs/spans inside #viewport
 *
 * The engine never uses .innerHTML on user content. Every node is created with
 * document.createElement / createTextNode. Inline styles applied to the host
 * mirror the cascade computed by our own selector matcher.
 *
 * The corpus is a bundled object keyed by URL. There is NO networking.
 * ============================================================================ */

(() => {
'use strict';

/* ---------- 1. TOKENIZER ---------- */
function tokenize(html){
  const tokens = [];
  let i = 0;
  const n = html.length;
  while(i < n){
    const ch = html[i];
    if (ch === '<'){
      if (html.startsWith('<!--', i)){
        const end = html.indexOf('-->', i+4);
        const stop = end === -1 ? n : end;
        tokens.push({type:'comment', value:html.slice(i+4, stop)});
        i = end === -1 ? n : end + 3;
        continue;
      }
      if (/^<!doctype/i.test(html.slice(i, i+9))){
        const end = html.indexOf('>', i);
        tokens.push({type:'doctype', value:html.slice(i, end+1)});
        i = end + 1;
        continue;
      }
      if (html[i+1] === '/'){
        const end = html.indexOf('>', i);
        const tag = html.slice(i+2, end).trim().toLowerCase();
        tokens.push({type:'end', tag});
        i = end + 1;
        continue;
      }
      // start tag — but watch out for raw-text elements (style, script)
      const end = html.indexOf('>', i);
      if (end === -1){ tokens.push({type:'text', value: html.slice(i)}); break; }
      let inner = html.slice(i+1, end);
      let selfClose = false;
      if (inner.endsWith('/')) { selfClose = true; inner = inner.slice(0, -1); }
      const parsed = parseTagInner(inner);
      tokens.push({type:'start', tag:parsed.tag, attrs:parsed.attrs, selfClose});
      i = end + 1;
      // Raw-text elements: scan to matching end tag and emit a single text token
      if (parsed.tag === 'style' || parsed.tag === 'script' || parsed.tag === 'title'){
        const closer = '</' + parsed.tag;
        const lower = html.toLowerCase();
        const close = lower.indexOf(closer, i);
        if (close === -1){
          tokens.push({type:'text', value: html.slice(i)});
          i = n;
        } else {
          const content = html.slice(i, close);
          if (content.length) tokens.push({type:'text', value: content});
          const cend = html.indexOf('>', close);
          tokens.push({type:'end', tag: parsed.tag});
          i = cend + 1;
        }
      }
      continue;
    }
    // text run
    const next = html.indexOf('<', i);
    const stop = next === -1 ? n : next;
    const text = html.slice(i, stop);
    if (text.length) tokens.push({type:'text', value: text});
    i = stop;
  }
  return tokens;
}

function parseTagInner(s){
  s = s.trim();
  const m = s.match(/^([a-zA-Z][a-zA-Z0-9-]*)/);
  if (!m) return { tag:'', attrs:{} };
  const tag = m[1].toLowerCase();
  const rest = s.slice(m[0].length);
  const attrs = {};
  const re = /\s*([a-zA-Z_:][\w:.-]*)(?:\s*=\s*(?:"([^"]*)"|'([^']*)'|([^\s"'>]+)))?/g;
  let am;
  while ((am = re.exec(rest)) !== null){
    const name = am[1].toLowerCase();
    const val = am[2] !== undefined ? am[2] : am[3] !== undefined ? am[3] : am[4] !== undefined ? am[4] : '';
    attrs[name] = decodeEntities(val);
  }
  return { tag, attrs };
}

function decodeEntities(s){
  return s.replace(/&(amp|lt|gt|quot|apos|nbsp|copy|reg|hellip|mdash|ndash|larr|rarr|uarr|darr|trade|bull|middot|laquo|raquo|deg|times|divide|sect|para|loz|spades|clubs|hearts|diams|#x?\d+|#\d+);?/g, (m, e) => {
    if (e[0] === '#'){
      const n = e[1] === 'x' ? parseInt(e.slice(2),16) : parseInt(e.slice(1),10);
      return String.fromCodePoint(n);
    }
    return ({
      amp:'&', lt:'<', gt:'>', quot:'"', apos:"'", nbsp:' ',
      copy:'©', reg:'®', hellip:'…', mdash:'—', ndash:'–',
      larr:'←', rarr:'→', uarr:'↑', darr:'↓', trade:'™', bull:'•',
      middot:'·', laquo:'«', raquo:'»', deg:'°', times:'×', divide:'÷',
      sect:'§', para:'¶', loz:'◊', spades:'♠', clubs:'♣', hearts:'♥', diams:'♦'
    })[e] || m;
  });
}

/* ---------- 2. TREE BUILDER ---------- */
const VOID_TAGS = new Set(['img','br','hr','meta','link','input','area','base','col','embed','source','track','wbr']);
const IMPLICIT_CLOSE = {
  li: new Set(['li']),
  p:  new Set(['p','div','section','article','header','footer','nav','aside','ul','ol','h1','h2','h3','h4','h5','h6','blockquote','hr','pre','table']),
  dt: new Set(['dt','dd']),
  dd: new Set(['dt','dd']),
  tr: new Set(['tr']),
  td: new Set(['td','th','tr']),
  th: new Set(['td','th','tr']),
  option: new Set(['option']),
};

function buildTree(tokens){
  const root = { type:'document', tag:'#document', attrs:{}, children:[], parent:null };
  let stack = [root];
  let stylesheets = [];
  let title = '';
  for (const tok of tokens){
    const parent = stack[stack.length-1];
    if (tok.type === 'doctype' || tok.type === 'comment'){
      // collect comments as nodes for inspector flair
      if (tok.type === 'comment'){
        parent.children.push({type:'comment', value:tok.value, parent});
      }
      continue;
    }
    if (tok.type === 'text'){
      // Capture inside <style>
      if (parent.tag === 'style'){
        stylesheets.push(tok.value);
      } else if (parent.tag === 'title'){
        title += tok.value;
      } else if (parent.tag === 'script'){
        /* ignored */
      } else {
        parent.children.push({type:'text', value:tok.value, parent});
      }
      continue;
    }
    if (tok.type === 'start'){
      // Implicit close
      const ic = IMPLICIT_CLOSE[tok.tag];
      if (ic){
        while (stack.length > 1 && ic.has(stack[stack.length-1].tag)){
          stack.pop();
        }
      }
      const top = stack[stack.length-1];
      const node = {
        type:'element', tag:tok.tag, attrs:tok.attrs,
        children:[], parent: top
      };
      top.children.push(node);
      if (!VOID_TAGS.has(tok.tag) && !tok.selfClose){
        stack.push(node);
      }
      continue;
    }
    if (tok.type === 'end'){
      // walk up looking for a match
      for (let j = stack.length - 1; j > 0; j--){
        if (stack[j].tag === tok.tag){
          stack.length = j;
          break;
        }
      }
      continue;
    }
  }
  return { root, stylesheets, title: title.trim() };
}

/* ---------- 3. CSS PARSER ---------- */
function parseCSS(text){
  const rules = [];
  text = text.replace(/\/\*[\s\S]*?\*\//g, '');
  // Match selector { decls } pairs (no nested rules; flat only).
  const re = /([^{}]+)\{([^{}]*)\}/g;
  let m;
  while ((m = re.exec(text)) !== null){
    const sel = m[1].trim();
    if (!sel) continue;
    const decls = parseDeclarations(m[2]);
    if (Object.keys(decls).length === 0) continue;
    for (const part of sel.split(',')){
      const trimmed = part.trim();
      if (!trimmed) continue;
      rules.push({
        rawSelector: trimmed,
        selector: parseSelector(trimmed),
        declarations: decls
      });
    }
  }
  return rules;
}

function parseDeclarations(text){
  const out = {};
  for (const part of text.split(';')){
    const idx = part.indexOf(':');
    if (idx < 0) continue;
    const name = part.slice(0, idx).trim().toLowerCase();
    const value = part.slice(idx+1).trim();
    if (name) out[name] = value;
  }
  return out;
}

function parseSelector(sel){
  // Returns array of compound selectors (descendant combinator only).
  return sel.split(/\s+/).filter(Boolean).map(part => {
    const out = { tag:null, classes:[], id:null };
    const m = part.match(/^([a-zA-Z][a-zA-Z0-9-]*|\*)/);
    if (m){ out.tag = m[1] === '*' ? null : m[1].toLowerCase(); }
    const rest = m ? part.slice(m[0].length) : part;
    rest.replace(/\.([a-zA-Z_][\w-]*)/g, (_, c) => { out.classes.push(c); return ''; });
    const im = rest.match(/#([a-zA-Z_][\w-]*)/);
    if (im) out.id = im[1];
    return out;
  });
}

function matchSelector(node, parts){
  if (node.type !== 'element') return false;
  let i = parts.length - 1;
  if (!matchCompound(node, parts[i])) return false;
  i--;
  let cur = node.parent;
  while (i >= 0 && cur){
    if (cur.type === 'element' && matchCompound(cur, parts[i])) i--;
    cur = cur.parent;
  }
  return i < 0;
}

function matchCompound(node, c){
  if (c.tag && node.tag !== c.tag) return false;
  if (c.id && node.attrs.id !== c.id) return false;
  if (c.classes.length){
    const cls = (node.attrs.class || '').split(/\s+/);
    for (const k of c.classes) if (!cls.includes(k)) return false;
  }
  return true;
}

function specificity(parts){
  // Rough: id*100 + class*10 + tag
  let s = 0;
  for (const c of parts){
    if (c.id) s += 100;
    s += c.classes.length * 10;
    if (c.tag) s += 1;
  }
  return s;
}

/* ---------- 4. STYLE COMPUTATION ---------- */
const DEFAULT_STYLES = {
  html: { display:'block' },
  body: { display:'block', margin:'8px' },
  div:  { display:'block' },
  section:{ display:'block' }, article:{ display:'block' },
  header:{ display:'block' }, footer:{ display:'block' },
  nav:{ display:'block' }, main:{ display:'block' }, aside:{ display:'block' },
  p:    { display:'block', margin:'1em 0' },
  h1:   { display:'block', 'font-size':'2em',  'font-weight':'bold', margin:'0.67em 0' },
  h2:   { display:'block', 'font-size':'1.5em','font-weight':'bold', margin:'0.83em 0' },
  h3:   { display:'block', 'font-size':'1.17em','font-weight':'bold', margin:'1em 0' },
  h4:   { display:'block', 'font-size':'1em',  'font-weight':'bold', margin:'1.33em 0' },
  h5:   { display:'block', 'font-size':'.83em','font-weight':'bold', margin:'1.67em 0' },
  h6:   { display:'block', 'font-size':'.67em','font-weight':'bold', margin:'2.33em 0' },
  ul:   { display:'block', margin:'1em 0', padding:'0 0 0 40px' },
  ol:   { display:'block', margin:'1em 0', padding:'0 0 0 40px' },
  li:   { display:'list-item' },
  blockquote: { display:'block', margin:'1em 40px' },
  pre:  { display:'block', margin:'1em 0', 'font-family':'ui-monospace, Menlo, monospace', 'white-space':'pre' },
  hr:   { display:'block', border:'1px inset', margin:'.5em 0' },
  table:{ display:'block' /* treated as block; not full table layout */ },
  img:  { display:'inline-block' },
  a:    { display:'inline', color:'#0000ee', 'text-decoration':'underline' },
  strong:{ display:'inline', 'font-weight':'bold' },
  b:    { display:'inline', 'font-weight':'bold' },
  em:   { display:'inline', 'font-style':'italic' },
  i:    { display:'inline', 'font-style':'italic' },
  u:    { display:'inline', 'text-decoration':'underline' },
  small:{ display:'inline', 'font-size':'.83em' },
  code: { display:'inline', 'font-family':'ui-monospace, Menlo, monospace' },
  span: { display:'inline' },
  br:   { display:'inline' },
  marquee:{ display:'block' /* host browser will just show static; we add CSS animation */ },
  center: { display:'block', 'text-align':'center' },
  font:  { display:'inline' },
};

const SUPPORTED_PROPS = new Set([
  'display','color','background','background-color','background-image',
  'font-size','font-weight','font-style','font-family','text-decoration','text-align',
  'padding','padding-top','padding-right','padding-bottom','padding-left',
  'margin','margin-top','margin-right','margin-bottom','margin-left',
  'border','border-top','border-right','border-bottom','border-left',
  'border-radius','border-color','border-style','border-width',
  'width','height','min-width','min-height','max-width','max-height',
  'flex-direction','justify-content','align-items','gap','flex',
  'list-style','list-style-type','line-height','letter-spacing',
  'white-space','word-break','overflow','box-shadow','opacity','cursor'
]);

function computeStyles(node, rules){
  if (node.type !== 'element') return null;
  // Layered cascade: defaults → matched rules (by specificity) → inline style
  const matches = [];
  for (const r of rules){
    if (matchSelector(node, r.selector)){
      matches.push({ decls: r.declarations, spec: specificity(r.selector), order: matches.length, selector: r.rawSelector });
    }
  }
  matches.sort((a,b) => a.spec - b.spec || a.order - b.order);
  const computed = {};
  // Defaults
  const def = DEFAULT_STYLES[node.tag];
  if (def) Object.assign(computed, def);
  // Some tag-attribute mappings (retro support)
  if (node.tag === 'body' && node.attrs.bgcolor) computed['background'] = node.attrs.bgcolor;
  if (node.attrs.bgcolor) computed['background-color'] = node.attrs.bgcolor;
  if (node.attrs.color) computed['color'] = node.attrs.color;
  if (node.tag === 'font'){
    if (node.attrs.color) computed['color'] = node.attrs.color;
    if (node.attrs.size){
      const map = {'1':'10px','2':'13px','3':'16px','4':'18px','5':'24px','6':'32px','7':'48px'};
      computed['font-size'] = map[node.attrs.size] || '16px';
    }
    if (node.attrs.face) computed['font-family'] = node.attrs.face;
  }
  if (node.tag === 'center') computed['text-align'] = 'center';
  // Sources for inspector
  const sources = []; // {prop, value, src}
  if (def) for (const k in def) sources.push({prop:k, value:def[k], src:'default'});
  for (const m of matches){
    Object.assign(computed, m.decls);
    for (const k in m.decls) sources.push({prop:k, value:m.decls[k], src:m.selector});
  }
  if (node.attrs.style){
    const inline = parseDeclarations(node.attrs.style);
    Object.assign(computed, inline);
    for (const k in inline) sources.push({prop:k, value:inline[k], src:'style="…"'});
  }
  return { computed, sources };
}

/* ---------- 5. LAYOUT (decide display modes & box geometry) ---------- */
/* Our "layout engine" is a normalization pass. For each element it:
 *   - resolves display: block | inline | inline-block | flex | list-item | none
 *   - figures out which parent is the inline formatting context
 *   - wraps consecutive inline children inside an "anonymous block" wrapper
 *     so the host browser produces correct line boxes within ONE flow root
 *   - records margin/padding/border boxes the painter will apply
 *
 * Text wrapping itself is handled by host glyph metrics — we set width on the
 * formatting root and let the host wrap. This is honest: the engine decides
 * boxes; the host renders glyphs. Pure JS line-boxing is left as an exercise.
 */
function layout(node, parentDisplay = 'block'){
  if (node.type === 'document'){
    for (const c of node.children) layout(c, 'block');
    return;
  }
  if (node.type !== 'element') return;
  const cs = node.computed || {};
  let disp = (cs.display || '').toLowerCase();
  if (!disp){
    disp = (DEFAULT_STYLES[node.tag] && DEFAULT_STYLES[node.tag].display) || 'inline';
  }
  node.layout = { display: disp };
  // Recurse
  for (const c of node.children) layout(c, disp);
  // Anonymous block wrapping: if a block has a mix, mark inline runs.
  if (disp === 'block' || disp === 'list-item'){
    const runs = [];
    let curRun = null;
    for (const c of node.children){
      const isInline =
        c.type === 'text' ||
        (c.type === 'element' && (c.layout && (c.layout.display === 'inline' || c.layout.display === 'inline-block')));
      if (isInline){
        if (!curRun) { curRun = { kind:'inline', items:[] }; runs.push(curRun); }
        curRun.items.push(c);
      } else {
        curRun = null;
        runs.push({ kind:'block', node:c });
      }
    }
    node.layout.runs = runs;
  }
}

/* ---------- 6. PAINT — build host DOM ---------- */
function paint(node, parent){
  if (node.type === 'document'){
    for (const c of node.children) paint(c, parent);
    return;
  }
  if (node.type === 'comment') return;
  if (node.type === 'text'){
    // Whitespace-collapse consecutive whitespace, like a real browser would in non-pre contexts
    let v = node.value;
    if (!isPreformatted(node.parent)) v = v.replace(/\s+/g, ' ');
    if (v.length === 0) return;
    const t = document.createTextNode(v);
    parent.appendChild(t);
    nodeHostMap.set(t, node);
    node.host = t;
    return;
  }
  if (node.type !== 'element') return;
  const cs = node.computed || {};
  if (cs.display === 'none') return;

  // Map our element to a host element. We mostly use <div>/<span>, with a few
  // semantic exceptions that help with native behavior.
  let hostTag;
  if (node.tag === 'a') hostTag = 'a';
  else if (node.tag === 'img') hostTag = 'span'; // we render placeholder
  else if (node.tag === 'br') hostTag = 'br';
  else if (node.tag === 'hr') hostTag = 'hr';
  else if (node.tag === 'input') hostTag = 'input';
  else if (node.tag === 'pre' || node.tag === 'code') hostTag = (node.tag === 'pre' ? 'div' : 'span');
  else if (cs.display === 'inline' || cs.display === 'inline-block') hostTag = 'span';
  else hostTag = 'div';

  const el = document.createElement(hostTag);
  el.dataset.engineTag = node.tag;
  if (node.attrs.id) el.dataset.engineId = node.attrs.id;
  if (node.attrs.class) el.dataset.engineClass = node.attrs.class;

  // Apply computed styles
  applyStyles(el, cs, node);

  // Special handling per tag
  if (node.tag === 'a'){
    el.href = '#';
    el.dataset.href = node.attrs.href || '';
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const h = el.dataset.href;
      if (h && /^rappter:/i.test(h)){
        navigate(h);
      } else if (h) {
        setStatus('Link points outside the bundled corpus — refusing to navigate: ' + h);
      }
    });
  }
  if (node.tag === 'img'){
    // Placeholder "broken image" with alt text — peak 1996 vibes.
    el.style.display = 'inline-block';
    el.style.minWidth = (node.attrs.width || '60') + 'px';
    el.style.minHeight = (node.attrs.height || '40') + 'px';
    el.style.background = 'linear-gradient(135deg,#fff 25%,#ddd 25%,#ddd 50%,#fff 50%,#fff 75%,#ddd 75%) 0/12px 12px';
    el.style.border = '1px solid #888';
    el.style.padding = '4px';
    el.style.color = '#444';
    el.style.font = '11px ui-monospace, monospace';
    el.style.verticalAlign = 'middle';
    el.textContent = '🖼 ' + (node.attrs.alt || node.attrs.src || 'image');
  }
  if (node.tag === 'marquee'){
    // Animate the inside as a horizontal scroll. Pure CSS.
    const inner = document.createElement('div');
    inner.style.display = 'inline-block';
    inner.style.paddingLeft = '100%';
    inner.style.animation = 'rappter-marquee 14s linear infinite';
    el.style.overflow = 'hidden';
    el.style.whiteSpace = 'nowrap';
    el.appendChild(inner);
    for (const c of node.children) paint(c, inner);
    parent.appendChild(el);
    nodeHostMap.set(el, node);
    node.host = el;
    return;
  }
  if (node.tag === 'blink'){
    el.style.animation = 'rappter-blink 1s steps(2,start) infinite';
  }
  if (node.tag === 'hr'){
    parent.appendChild(el);
    nodeHostMap.set(el, node);
    node.host = el;
    return;
  }
  if (node.tag === 'br' || node.tag === 'input' || node.tag === 'img'){
    parent.appendChild(el);
    nodeHostMap.set(el, node);
    node.host = el;
    return;
  }

  // Lists: simulate list-item bullets ourselves (host browser uses our <div>, so
  // it won't draw bullets automatically).
  if (cs.display === 'list-item'){
    const bullet = document.createElement('span');
    bullet.textContent = node.parent && node.parent.tag === 'ol'
      ? (childIndex(node) + 1) + '. '
      : '• ';
    bullet.style.marginRight = '4px';
    el.appendChild(bullet);
    el.style.display = 'block';
    el.style.paddingLeft = '0';
  }

  // Recurse children
  for (const c of node.children) paint(c, el);
  parent.appendChild(el);
  nodeHostMap.set(el, node);
  node.host = el;
}

function childIndex(node){
  if (!node.parent) return 0;
  let i = 0;
  for (const c of node.parent.children){
    if (c === node) return i;
    if (c.type === 'element') i++;
  }
  return 0;
}

function isPreformatted(node){
  while (node){
    if (node.tag === 'pre') return true;
    node = node.parent;
  }
  return false;
}

function applyStyles(el, cs, node){
  // Pass through to host browser as inline style. We only forward properties
  // we claim to support — others are dropped (a real engine would do the same).
  for (const prop in cs){
    if (!SUPPORTED_PROPS.has(prop)) continue;
    try { el.style.setProperty(prop, cs[prop]); } catch(e){}
  }
  // Make our anonymous-block formatting work: a `display: list-item` becomes block in CSS.
  if (cs.display === 'list-item') el.style.display = 'block';
  // For body/html we want them to fill the viewport.
  if (node.tag === 'body'){
    el.style.minHeight = '100%';
    el.style.boxSizing = 'border-box';
  }
}

const nodeHostMap = new WeakMap();

/* ---------- 7. ROUTER / HISTORY ---------- */
const HISTORY = [];
let HIDX = -1;
let LOAD_TIMER = null;
let CURRENT_DOC = null; // { root, rules, title, source, url }

function navigate(url, push = true){
  url = (url || '').trim();
  if (!/^rappter:\/\//.test(url)){
    if (/^[a-z]+:/.test(url)){
      setStatus('Refusing scheme outside bundled corpus: ' + url);
      return;
    }
    url = 'rappter://' + url.replace(/^\/+/, '');
  }
  if (push){
    HISTORY.length = HIDX + 1;
    HISTORY.push(url);
    HIDX = HISTORY.length - 1;
  }
  $('#addr').value = url;
  setStatus('Connecting to ' + url + ' …');
  setLoading(true);
  if (LOAD_TIMER) clearTimeout(LOAD_TIMER);
  // Simulate dial-up. 350ms feels period-appropriate.
  const delay = 320 + Math.random() * 180;
  LOAD_TIMER = setTimeout(() => {
    LOAD_TIMER = null;
    render(url);
    setLoading(false);
  }, delay);
  updateNavButtons();
}

function stopLoading(){
  if (LOAD_TIMER){
    clearTimeout(LOAD_TIMER);
    LOAD_TIMER = null;
    setLoading(false);
    setStatus('Stopped loading.');
  }
}

function setLoading(on){
  const wrap = $('#addr-wrap');
  const prog = $('#progress');
  const vp = $('#viewport');
  if (on){
    wrap.classList.add('loading');
    prog.classList.add('loading');
    prog.style.transform = 'scaleX(.65)';
    vp.classList.add('loading');
  } else {
    wrap.classList.remove('loading');
    prog.classList.remove('loading');
    prog.style.transform = 'scaleX(1)';
    setTimeout(() => { prog.style.transform = 'scaleX(0)'; }, 220);
    vp.classList.remove('loading');
  }
}

function updateNavButtons(){
  $('#back').disabled = HIDX <= 0;
  $('#fwd').disabled  = HIDX >= HISTORY.length - 1;
}

function render(url){
  let html = CORPUS[url];
  if (html === undefined){
    html = CORPUS['rappter://404'].replace('{{URL}}', escapeHTML(url));
  }
  // Pipeline
  const tokens = tokenize(html);
  const { root, stylesheets, title } = buildTree(tokens);
  const rules = [];
  for (const sheet of stylesheets){
    const r = parseCSS(sheet);
    rules.push(...r);
  }
  // Walk and compute styles
  walk(root, n => {
    if (n.type === 'element'){
      const r = computeStyles(n, rules);
      n.computed = r.computed;
      n.styleSources = r.sources;
    }
  });
  layout(root);
  // Paint
  const vp = $('#viewport');
  vp.innerHTML = '';
  paint(root, vp);
  vp.scrollTop = 0;
  CURRENT_DOC = { root, rules, title, source: html, url };
  document.title = (title || url) + ' — Rappter';
  $('#tab-title').textContent = title || url;
  setStatus('Loaded ' + url + ' · ' + tokens.length + ' tokens · ' + rules.length + ' CSS rules');
  refreshInspector();
  refreshSourcePane();
}

function walk(node, visit){
  visit(node);
  if (node.children) for (const c of node.children) walk(c, visit);
}

/* ---------- 8. UI WIRING ---------- */
const $ = sel => document.querySelector(sel);

$('#go').addEventListener('click', () => navigate($('#addr').value));
$('#addr').addEventListener('keydown', e => {
  if (e.key === 'Enter') navigate($('#addr').value);
});
$('#back').addEventListener('click', () => {
  if (HIDX > 0){ HIDX--; navigate(HISTORY[HIDX], false); }
});
$('#fwd').addEventListener('click', () => {
  if (HIDX < HISTORY.length - 1){ HIDX++; navigate(HISTORY[HIDX], false); }
});
$('#refresh').addEventListener('click', () => navigate($('#addr').value, false));
$('#stop').addEventListener('click', stopLoading);

$('#view-src').addEventListener('click', () => {
  const btn = $('#view-src');
  btn.classList.toggle('on');
  const showing = btn.classList.contains('on');
  $('#viewport').hidden = showing;
  $('#source-pane').hidden = !showing;
  refreshSourcePane();
});

$('#inspect-toggle').addEventListener('click', () => {
  const btn = $('#inspect-toggle');
  btn.classList.toggle('on');
  $('#inspector').classList.toggle('hidden');
  refreshInspector();
});

document.querySelectorAll('.ins-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.ins-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const which = t.dataset.tab;
    $('#ins-dom').classList.toggle('hidden', which !== 'dom');
    $('#ins-styles').classList.toggle('hidden', which !== 'styles');
    $('#ins-rules').classList.toggle('hidden', which !== 'rules');
  });
});

/* Hover/focus highlighting for inspector */
let FOCUS_NODE = null;
$('#viewport').addEventListener('mousemove', e => {
  if ($('#inspector').classList.contains('hidden')) return;
  const t = e.target;
  let n = nodeHostMap.get(t);
  if (!n && t.parentNode) n = nodeHostMap.get(t.parentNode);
  if (!n) { hideHint(); return; }
  // climb to nearest element
  while (n && n.type !== 'element') n = n.parent;
  if (!n) { hideHint(); return; }
  showHintFor(n);
});
$('#viewport').addEventListener('mouseleave', hideHint);
$('#viewport').addEventListener('click', e => {
  if ($('#inspector').classList.contains('hidden')) return;
  let host = e.target;
  let n = nodeHostMap.get(host);
  while (!n && host && host !== $('#viewport')){ host = host.parentNode; n = nodeHostMap.get(host); }
  while (n && n.type !== 'element') n = n.parent;
  if (n && n.tag !== 'a'){ // links should still work
    FOCUS_NODE = n;
    refreshInspector();
  }
});

function showHintFor(n){
  if (!n.host) return hideHint();
  const r = n.host.getBoundingClientRect ? n.host.getBoundingClientRect() : null;
  const lr = $('#left').getBoundingClientRect();
  const hint = $('#hover-hint');
  if (!r) return hideHint();
  hint.classList.add('on');
  hint.style.left = (r.left - lr.left) + 'px';
  hint.style.top  = (r.top - lr.top) + 'px';
  hint.style.width = r.width + 'px';
  hint.style.height = r.height + 'px';
  hint.querySelector('.lbl').textContent =
    n.tag + (n.attrs.id ? '#' + n.attrs.id : '') +
    (n.attrs.class ? '.' + n.attrs.class.split(/\s+/).join('.') : '');
}
function hideHint(){ $('#hover-hint').classList.remove('on'); }

/* ---------- 9. INSPECTOR PANELS ---------- */
function refreshInspector(){
  if ($('#inspector').classList.contains('hidden')) return;
  if (!CURRENT_DOC) return;
  // DOM tree
  const dom = $('#ins-dom');
  dom.innerHTML = '';
  const tree = document.createElement('div');
  tree.className = 'dom-tree';
  const ul = document.createElement('ul');
  buildDomTreeUI(CURRENT_DOC.root, ul);
  tree.appendChild(ul);
  dom.appendChild(tree);
  // Styles
  const styles = $('#ins-styles');
  styles.innerHTML = '';
  if (FOCUS_NODE && FOCUS_NODE.computed){
    const block = document.createElement('div');
    block.className = 'style-block';
    const h = document.createElement('div');
    h.className = 'h';
    h.textContent = 'computed — ' + describeNode(FOCUS_NODE);
    block.appendChild(h);
    const props = Object.keys(FOCUS_NODE.computed).sort();
    for (const p of props){
      const line = document.createElement('div');
      line.className = 'style-line';
      line.innerHTML = '<span class="k">' + p + ':</span><span class="v">' + escapeHTML(FOCUS_NODE.computed[p]) + ';</span>';
      block.appendChild(line);
    }
    styles.appendChild(block);
  } else {
    styles.textContent = 'Click an element in the page or the DOM tree to see its computed styles.';
  }
  // Rules: always show top stylesheet rules from current doc
  const rules = $('#ins-rules');
  rules.innerHTML = '';
  if (FOCUS_NODE){
    const block = document.createElement('div');
    block.className = 'style-block';
    block.innerHTML = '<div class="h">matched rules — ' + describeNode(FOCUS_NODE) + '</div>';
    if (FOCUS_NODE.styleSources){
      for (const s of FOCUS_NODE.styleSources){
        const line = document.createElement('div');
        line.className = 'style-line';
        line.innerHTML =
          '<span class="k">' + s.prop + ':</span>' +
          '<span class="v">' + escapeHTML(s.value) + '</span>' +
          '<span class="src">' + escapeHTML(s.src) + '</span>';
        block.appendChild(line);
      }
    }
    rules.appendChild(block);
  } else {
    rules.textContent = 'Hover or click to populate.';
  }
}

function describeNode(n){
  return n.tag +
    (n.attrs.id ? '#' + n.attrs.id : '') +
    (n.attrs.class ? '.' + n.attrs.class.split(/\s+/).join('.') : '');
}

function buildDomTreeUI(node, parentUl){
  const li = document.createElement('li');
  if (node.type === 'document'){
    li.innerHTML = '<span class="dom-text">#document</span>';
    const ul = document.createElement('ul');
    li.appendChild(ul);
    parentUl.appendChild(li);
    for (const c of node.children) buildDomTreeUI(c, ul);
    return;
  }
  if (node.type === 'text'){
    const v = node.value.replace(/\s+/g,' ').trim();
    if (!v) return;
    li.innerHTML = '<span class="dom-text">"' + escapeHTML(v.slice(0,60)) + (v.length>60?'…':'') + '"</span>';
    parentUl.appendChild(li);
    return;
  }
  if (node.type === 'comment') return;
  if (node.type === 'element'){
    const hasKids = node.children.some(c => c.type === 'element' || (c.type === 'text' && c.value.trim()));
    const tag = '<span class="dom-tag">&lt;</span><span class="dom-name">'+node.tag+'</span>' +
      Object.keys(node.attrs).map(k => ' <span class="dom-attr">'+k+'</span>=<span class="dom-val">"'+escapeHTML(node.attrs[k])+'"</span>').join('') +
      '<span class="dom-tag">&gt;</span>';
    const tog = '<span class="toggle">' + (hasKids ? '▾' : '·') + '</span>';
    const row = document.createElement('div');
    row.className = 'dom-node';
    row.innerHTML = tog + tag;
    if (FOCUS_NODE === node) row.classList.add('focused');
    row.addEventListener('mouseenter', () => showHintFor(node));
    row.addEventListener('mouseleave', () => hideHint());
    row.addEventListener('click', e => {
      e.stopPropagation();
      if (e.target.classList.contains('toggle') && hasKids){
        li.classList.toggle('collapsed');
        e.target.textContent = li.classList.contains('collapsed') ? '▸' : '▾';
      } else {
        FOCUS_NODE = node;
        refreshInspector();
      }
    });
    li.appendChild(row);
    if (hasKids){
      const ul = document.createElement('ul');
      li.appendChild(ul);
      for (const c of node.children) buildDomTreeUI(c, ul);
    }
    parentUl.appendChild(li);
  }
}

/* ---------- 10. SOURCE VIEW ---------- */
function refreshSourcePane(){
  if (!CURRENT_DOC) return;
  if ($('#source-pane').hidden) return;
  const el = $('#source-pane');
  el.innerHTML = highlightSource(CURRENT_DOC.source);
}

function highlightSource(src){
  // Reuse our tokenizer to produce highlighted view
  const toks = tokenize(src);
  let out = '';
  for (const t of toks){
    if (t.type === 'doctype'){
      out += '<span class="tk-doctype">' + escapeHTML(t.value) + '</span>';
    } else if (t.type === 'comment'){
      out += '<span class="tk-comment">&lt;!--' + escapeHTML(t.value) + '--&gt;</span>';
    } else if (t.type === 'text'){
      out += '<span class="tk-text">' + escapeHTML(t.value) + '</span>';
    } else if (t.type === 'start'){
      let s = '<span class="tk-tag">&lt;</span><span class="tk-name">' + t.tag + '</span>';
      for (const k in t.attrs){
        s += ' <span class="tk-attr">' + k + '</span>=<span class="tk-val">"' + escapeHTML(t.attrs[k]) + '"</span>';
      }
      if (t.selfClose) s += '<span class="tk-tag">/</span>';
      s += '<span class="tk-tag">&gt;</span>';
      out += s;
    } else if (t.type === 'end'){
      out += '<span class="tk-tag">&lt;/</span><span class="tk-name">' + t.tag + '</span><span class="tk-tag">&gt;</span>';
    }
  }
  return out;
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setStatus(msg){
  $('#status-l').textContent = msg;
}

/* ---------- 11. CSS for engine-only animations ---------- */
const eng = document.createElement('style');
eng.textContent = `
  @keyframes rappter-marquee { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  @keyframes rappter-blink   { 50% { opacity: 0; } }
  @keyframes rappter-rainbow { 0%{filter:hue-rotate(0)} 100%{filter:hue-rotate(360deg)} }
`;
document.head.appendChild(eng);

/* ============================================================================
 * THE BUNDLED CORPUS — fictional retro internet, c. 1998.
 *
 * Every page is a complete (small) HTML document. They reference each other
 * via rappter:// URLs handled by the router above. No external resources.
 * ============================================================================ */

// Pixel-art helper: turns char-grids into our engine's HTML, used by some pages.
const PALETTE = {
  '.':'transparent', 'k':'#111', 'w':'#fff', 's':'#888', 'S':'#bbb',
  'r':'#e22', 'R':'#a00', 'o':'#fa0', 'y':'#ff0', 'Y':'#ed0',
  'g':'#2a2', 'G':'#0d2', 'b':'#22e', 'B':'#06f', 'c':'#0cc',
  'm':'#c2c', 'p':'#fac', 'n':'#732', 'N':'#a52', 'l':'#9d6',
};
function pixelArtHTML(rows, scale){
  const sz = scale || 9;
  const w = rows[0].length * sz;
  let html = '<div class="pxart" style="display:flex;flex-direction:column;background:#222;padding:'+(sz)+'px;border:3px ridge #fff;width:'+(w + sz*2)+'px;">';
  for (const row of rows){
    html += '<div style="display:flex;flex-direction:row;height:'+sz+'px;">';
    for (const c of row){
      const bg = PALETTE[c] || 'transparent';
      html += '<div style="width:'+sz+'px;height:'+sz+'px;background:'+bg+';"></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}
