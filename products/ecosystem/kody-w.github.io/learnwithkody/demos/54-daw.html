<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe DAW</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  :root {
    --bg: #15171b;
    --panel: #1d2026;
    --panel2: #232730;
    --panel3: #2a2f3a;
    --line: #353a46;
    --text: #d8dde8;
    --muted: #7a8190;
    --accent: #2dd9d9;
    --accent2: #ff8a3d;
    --red: #ff4d6d;
    --green: #43d17a;
    --yellow: #ffd13d;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-rows: 48px 1fr 220px;
    grid-template-columns: 1fr 260px;
    height: 100vh;
    width: 100vw;
    gap: 1px;
    background: #0c0d10;
  }
  /* TOP BAR */
  #topbar {
    grid-column: 1 / 3;
    background: var(--panel);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  #topbar .logo {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 14px;
    margin-right: 4px;
  }
  #topbar .logo span { color: var(--accent2); }
  .btn {
    background: var(--panel3);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }
  .btn:hover { background: #353a46; }
  .btn.active { background: var(--accent); color: #07252e; border-color: var(--accent); }
  .btn.rec { color: var(--red); }
  .btn.rec.active { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.accent { background: var(--accent); color: #07252e; border-color: var(--accent); font-weight: 600; }
  .btn.accent:hover { background: #4ee5e5; }
  .btn.warm { background: var(--accent2); color: #2d1505; border-color: var(--accent2); font-weight: 600; }
  .btn.warm:hover { background: #ff9c5c; }
  .sep {
    width: 1px;
    height: 24px;
    background: var(--line);
    margin: 0 4px;
  }
  .field {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input[type=number] {
    background: #0e1014;
    color: var(--text);
    border: 1px solid var(--line);
    padding: 4px 6px;
    border-radius: 3px;
    width: 56px;
    font-family: inherit;
    font-size: 11px;
    text-align: center;
  }
  .field input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }
  #pos {
    font-family: "SF Mono", monospace;
    color: var(--accent);
    background: #0a0c0e;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--line);
    min-width: 90px;
    text-align: center;
    font-size: 12px;
  }
  /* TIMELINE */
  #center {
    background: var(--panel);
    overflow: hidden;
    display: grid;
    grid-template-columns: 140px 1fr;
    grid-template-rows: 28px 1fr;
  }
  #ruler-corner {
    background: var(--panel2);
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
  }
  #ruler {
    background: var(--panel2);
    border-bottom: 1px solid var(--line);
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }
  #ruler-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #track-headers {
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: hidden;
    overflow-x: hidden;
  }
  .th {
    height: 64px;
    border-bottom: 1px solid var(--line);
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    background: var(--panel);
    transition: background 0.1s;
  }
  .th:hover { background: var(--panel2); }
  .th.sel { background: #1f2a32; border-left: 3px solid var(--accent); padding-left: 5px; }
  .th .name { font-size: 11px; font-weight: 600; color: var(--text); }
  .th .bot {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: auto;
  }
  .th .icon-btn {
    background: var(--panel3);
    border: 1px solid var(--line);
    color: var(--muted);
    width: 22px;
    height: 18px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .th .icon-btn.m.active { background: var(--red); color: #fff; border-color: var(--red); }
  .th .icon-btn.s.active { background: var(--yellow); color: #2d1505; border-color: var(--yellow); }
  .th .vol-mini {
    flex: 1;
    accent-color: var(--accent);
    height: 10px;
  }
  #timeline-wrap {
    position: relative;
    overflow: auto;
    background: #14161a;
  }
  #timeline-canvas {
    display: block;
    cursor: crosshair;
  }
  /* RIGHT PANEL */
  #right {
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #right h3 {
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .panel-section {
    background: var(--panel2);
    border-radius: 4px;
    padding: 8px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    gap: 6px;
  }
  .row span.label { flex-shrink: 0; }
  .row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    min-width: 60px;
  }
  .row .val {
    color: var(--text);
    font-family: "SF Mono", monospace;
    font-size: 10px;
    min-width: 36px;
    text-align: right;
  }
  .effect {
    background: var(--panel3);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px;
    margin-bottom: 6px;
    cursor: grab;
  }
  .effect.dragging { opacity: 0.4; }
  .effect.disabled { opacity: 0.4; }
  .effect-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .effect-header .name {
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
  }
  .effect-header .toggle {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--panel);
    cursor: pointer;
  }
  .effect-header .toggle.on { background: var(--accent); border-color: var(--accent); }
  .instr-pick {
    width: 100%;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
  }
  /* BOTTOM PIANO ROLL */
  #bottom {
    grid-column: 1 / 3;
    background: var(--panel);
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: 28px 1fr;
    overflow: hidden;
  }
  #pr-corner {
    background: var(--panel2);
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 10px;
    color: var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    gap: 8px;
    justify-content: space-between;
  }
  #pr-corner .clip-info {
    color: var(--muted);
    font-family: "SF Mono", monospace;
    font-size: 10px;
    text-transform: none;
  }
  #pr-toolbar {
    background: var(--panel2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    color: var(--muted);
    font-size: 10px;
  }
  #pr-keys-wrap, #pr-grid-wrap {
    overflow: hidden;
    background: #0e1014;
    position: relative;
  }
  #pr-keys-wrap { border-right: 1px solid var(--line); overflow-y: auto; }
  #pr-grid-wrap { overflow: auto; cursor: crosshair; }
  #pr-keys, #pr-grid {
    display: block;
  }
  /* FOOTER STATUS */
  .footer-info {
    color: var(--muted);
    font-size: 10px;
    margin-left: auto;
    font-family: "SF Mono", monospace;
  }
  /* Toast */
  #toast {
    position: fixed;
    bottom: 240px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #062528;
    padding: 8px 16px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 1000;
  }
  #toast.show { opacity: 1; }
  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--panel2); }
  ::-webkit-scrollbar-thumb { background: var(--panel3); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #404858; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">VIBE<span>DAW</span></div>
    <div class="sep"></div>
    <button class="btn" id="btn-play" title="Play/Pause [Space]">▶</button>
    <button class="btn" id="btn-stop" title="Stop">■</button>
    <button class="btn rec" id="btn-rec" title="Record (placeholder)">●</button>
    <div class="sep"></div>
    <div class="field">
      <span>BPM</span>
      <input type="number" id="bpm" min="40" max="240" value="120" step="1">
    </div>
    <div id="pos">1.1.1</div>
    <div class="sep"></div>
    <div class="field">
      <span>Master</span>
      <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.8">
    </div>
    <div class="sep"></div>
    <button class="btn warm" id="btn-demo">Load Demo Song</button>
    <button class="btn accent" id="btn-export">Export to WAV</button>
    <button class="btn" id="btn-clear" title="Clear all clips">Clear</button>
    <div class="footer-info" id="status">ready</div>
  </div>

  <div id="center">
    <div id="ruler-corner">TIMELINE</div>
    <div id="ruler"><canvas id="ruler-canvas"></canvas></div>
    <div id="track-headers"></div>
    <div id="timeline-wrap"><canvas id="timeline-canvas"></canvas></div>
  </div>

  <div id="right">
    <h3 id="track-title">Track Controls</h3>
    <div class="panel-section">
      <div class="row"><span class="label">Instrument</span></div>
      <select class="instr-pick" id="instr-pick">
        <option value="saw">Saw Lead</option>
        <option value="sub">Sub Bass (FM)</option>
        <option value="drum">Drum Kit</option>
        <option value="fmpiano">FM Piano</option>
        <option value="pad">Pad</option>
        <option value="pluck">Pluck</option>
        <option value="noise">Noise</option>
        <option value="bell">Sine Bell</option>
      </select>
      <div class="row"><span class="label">Volume</span><input type="range" id="t-vol" min="0" max="1" step="0.01" value="0.8"><span class="val" id="t-vol-v">0.80</span></div>
      <div class="row"><span class="label">Pan</span><input type="range" id="t-pan" min="-1" max="1" step="0.01" value="0"><span class="val" id="t-pan-v">0</span></div>
      <div class="row" style="gap: 4px;">
        <button class="btn" id="t-mute" style="flex:1">Mute</button>
        <button class="btn" id="t-solo" style="flex:1">Solo</button>
      </div>
    </div>
    <h3>Effects Rack</h3>
    <div id="fx-list"></div>
  </div>

  <div id="bottom">
    <div id="pr-corner">
      <span>Piano Roll</span>
      <span class="clip-info" id="clip-info">no clip</span>
    </div>
    <div id="pr-toolbar">
      <span>Click to add notes • Drag center to move • Drag edges to resize • Right-click to delete</span>
    </div>
    <div id="pr-keys-wrap"><canvas id="pr-keys"></canvas></div>
    <div id="pr-grid-wrap"><canvas id="pr-grid"></canvas></div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
/* ==========================================================
   VIBE DAW — single-file Web Audio DAW
   ========================================================== */

// ---------- AUDIO CONTEXT & STATE ----------
let actx = null;
const State = {
  bpm: 120,
  isPlaying: false,
  startTime: 0,        // audio time when play began
  startBeat: 0,        // beat offset playback resumed at
  curBeat: 0,          // current playhead beat
  totalBeats: 64,      // 16 bars at 4/4
  selectedTrack: 0,
  selectedClip: null,
  loopStart: -1,
  loopEnd: -1,
  pxPerBeat: 32,
  trackHeight: 64,
  masterVolume: 0.8,
  rafId: null,
  scheduledEvents: [], // {id, when, note, ...}
  schedulerLast: 0,
  scheduleAhead: 0.15, // sec
};

// ---------- TRACKS ----------
const INSTRUMENTS = ['saw', 'sub', 'drum', 'fmpiano', 'pad', 'pluck', 'noise', 'bell'];
const INSTR_NAMES = {
  saw: 'Saw Lead',
  sub: 'Sub Bass',
  drum: 'Drum Kit',
  fmpiano: 'FM Piano',
  pad: 'Pad',
  pluck: 'Pluck',
  noise: 'Noise',
  bell: 'Sine Bell'
};
const TRACK_COLORS = ['#2dd9d9', '#ff8a3d', '#ff4d6d', '#43d17a', '#a26bff', '#ffd13d', '#5f7eff', '#ff6bcf'];

const Tracks = INSTRUMENTS.map((inst, i) => ({
  name: INSTR_NAMES[inst],
  instrument: inst,
  color: TRACK_COLORS[i],
  volume: 0.8,
  pan: 0,
  mute: false,
  solo: false,
  clips: [],
  effects: [
    { type: 'reverb', enabled: false, params: { wet: 0.3, decay: 1.8 } },
    { type: 'delay', enabled: false, params: { time: 0.375, feedback: 0.35 } },
    { type: 'lowpass', enabled: false, params: { cutoff: 2000, q: 1 } },
    { type: 'compressor', enabled: false, params: { threshold: -18, ratio: 4 } },
  ],
  // audio nodes (built per session)
  _node: null,
  _gain: null,
  _pan: null,
}));

// ---------- INIT AUDIO ----------
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });

  // Master chain
  State.masterGain = actx.createGain();
  State.masterGain.gain.value = State.masterVolume;
  State.masterGain.connect(actx.destination);

  // Build per-track output chain (gain + pan into master)
  Tracks.forEach(t => {
    t._gain = actx.createGain();
    t._gain.gain.value = t.volume;
    t._pan = actx.createStereoPanner();
    t._pan.pan.value = t.pan;
    t._gain.connect(t._pan);
    t._pan.connect(State.masterGain);
    t._fxIn = actx.createGain();
    rebuildFx(t);
  });
}

function rebuildFx(track) {
  // Disconnect old chain
  try { track._fxIn.disconnect(); } catch(e) {}
  if (track._fxNodes) {
    track._fxNodes.forEach(arr => arr.forEach(n => { try { n.disconnect(); } catch(e){} }));
  }
  track._fxNodes = [];

  let cur = track._fxIn;
  for (const ef of track.effects) {
    if (!ef.enabled) continue;
    const nodes = makeEffect(ef);
    track._fxNodes.push(nodes);
    cur.connect(nodes.input);
    cur = nodes.output;
  }
  cur.connect(track._gain);
}

function makeEffect(ef) {
  if (ef.type === 'reverb') {
    const wet = ef.params.wet, decay = ef.params.decay;
    const conv = actx.createConvolver();
    conv.buffer = makeIR(decay);
    const wetG = actx.createGain(); wetG.gain.value = wet;
    const dryG = actx.createGain(); dryG.gain.value = 1 - wet * 0.6;
    const input = actx.createGain();
    const output = actx.createGain();
    input.connect(dryG); dryG.connect(output);
    input.connect(conv); conv.connect(wetG); wetG.connect(output);
    return { input, output, nodes: [conv, wetG, dryG] };
  }
  if (ef.type === 'delay') {
    const d = actx.createDelay(2.0); d.delayTime.value = ef.params.time;
    const fb = actx.createGain(); fb.gain.value = ef.params.feedback;
    const wet = actx.createGain(); wet.gain.value = 0.5;
    const input = actx.createGain();
    const output = actx.createGain();
    input.connect(output);
    input.connect(d);
    d.connect(fb); fb.connect(d);
    d.connect(wet); wet.connect(output);
    return { input, output, nodes: [d, fb, wet] };
  }
  if (ef.type === 'lowpass') {
    const f = actx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = ef.params.cutoff;
    f.Q.value = ef.params.q;
    return { input: f, output: f, nodes: [f] };
  }
  if (ef.type === 'compressor') {
    const c = actx.createDynamicsCompressor();
    c.threshold.value = ef.params.threshold;
    c.ratio.value = ef.params.ratio;
    c.attack.value = 0.005; c.release.value = 0.1;
    return { input: c, output: c, nodes: [c] };
  }
}

function makeIR(decaySec) {
  const sr = actx.sampleRate;
  const len = Math.max(1, Math.floor(sr * decaySec));
  const buf = actx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.5);
    }
  }
  return buf;
}

// ---------- INSTRUMENT VOICES ----------
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

function playNote(track, note, when, duration, ctx, dest) {
  // ctx, dest: optional override for offline render
  const ac = ctx || actx;
  const out = dest || track._fxIn;
  const freq = midiToFreq(note.pitch);
  const vel = (note.vel != null ? note.vel : 0.8);
  const inst = track.instrument;
  const dur = duration;

  if (inst === 'saw') {
    const o1 = ac.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
    const o2 = ac.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.005;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.35, when + 0.01);
    g.gain.linearRampToValueAtTime(vel * 0.25, when + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur + 0.05);
    const f = ac.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 4000; f.Q.value = 2;
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(out);
    o1.start(when); o2.start(when);
    o1.stop(when + dur + 0.1); o2.stop(when + dur + 0.1);
  }
  else if (inst === 'sub') {
    // FM sub bass
    const carrier = ac.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = freq;
    const mod = ac.createOscillator(); mod.type = 'sine'; mod.frequency.value = freq * 0.5;
    const modGain = ac.createGain(); modGain.gain.value = freq * 1.2;
    mod.connect(modGain); modGain.connect(carrier.frequency);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.7, when + 0.005);
    g.gain.exponentialRampToValueAtTime(vel * 0.3, when + dur);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur + 0.05);
    carrier.connect(g); g.connect(out);
    carrier.start(when); mod.start(when);
    carrier.stop(when + dur + 0.1); mod.stop(when + dur + 0.1);
  }
  else if (inst === 'drum') {
    const p = note.pitch % 12;
    if (p === 0 || p === 1) playKick(ac, when, vel, out);
    else if (p === 2 || p === 3 || p === 4) playSnare(ac, when, vel, out);
    else playHat(ac, when, vel, out, p > 7);
  }
  else if (inst === 'fmpiano') {
    const carrier = ac.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = freq;
    const mod = ac.createOscillator(); mod.type = 'sine'; mod.frequency.value = freq * 2;
    const modGain = ac.createGain(); modGain.gain.value = freq * 3;
    const modEnv = ac.createGain(); modEnv.gain.value = 1;
    modEnv.gain.setValueAtTime(1, when);
    modEnv.gain.exponentialRampToValueAtTime(0.05, when + 0.4);
    mod.connect(modGain); modGain.connect(modEnv); modEnv.connect(carrier.frequency);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.45, when + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur + 0.2);
    carrier.connect(g); g.connect(out);
    carrier.start(when); mod.start(when);
    carrier.stop(when + dur + 0.3); mod.stop(when + dur + 0.3);
  }
  else if (inst === 'pad') {
    const o1 = ac.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
    const o2 = ac.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.01;
    const o3 = ac.createOscillator(); o3.type = 'triangle'; o3.frequency.value = freq * 0.5;
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1500; f.Q.value = 1;
    f.frequency.setValueAtTime(800, when);
    f.frequency.linearRampToValueAtTime(2200, when + 0.8);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.18, when + 0.4);
    g.gain.linearRampToValueAtTime(vel * 0.15, when + dur);
    g.gain.linearRampToValueAtTime(0.0001, when + dur + 0.5);
    o1.connect(f); o2.connect(f); o3.connect(f); f.connect(g); g.connect(out);
    o1.start(when); o2.start(when); o3.start(when);
    o1.stop(when + dur + 0.6); o2.stop(when + dur + 0.6); o3.stop(when + dur + 0.6);
  }
  else if (inst === 'pluck') {
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
    const o2 = ac.createOscillator(); o2.type = 'square'; o2.frequency.value = freq * 2;
    const f = ac.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(5000, when);
    f.frequency.exponentialRampToValueAtTime(500, when + 0.3);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.4, when + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.4);
    const g2 = ac.createGain(); g2.gain.value = 0.2;
    o.connect(f); o2.connect(g2); g2.connect(f); f.connect(g); g.connect(out);
    o.start(when); o2.start(when);
    o.stop(when + 0.5); o2.stop(when + 0.5);
  }
  else if (inst === 'noise') {
    const buf = ac.createBuffer(1, ac.sampleRate * Math.max(0.2, dur + 0.1), ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = 'bandpass';
    f.frequency.setValueAtTime(freq * 2, when);
    f.frequency.exponentialRampToValueAtTime(freq * 8, when + dur * 0.5);
    f.frequency.exponentialRampToValueAtTime(freq * 2, when + dur);
    f.Q.value = 5;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.4, when + 0.05);
    g.gain.linearRampToValueAtTime(0.0001, when + dur);
    src.connect(f); f.connect(g); g.connect(out);
    src.start(when);
    src.stop(when + dur + 0.1);
  }
  else if (inst === 'bell') {
    const carrier = ac.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = freq;
    const mod = ac.createOscillator(); mod.type = 'sine'; mod.frequency.value = freq * 3.5;
    const modGain = ac.createGain(); modGain.gain.value = freq * 4;
    modGain.gain.setValueAtTime(freq * 4, when);
    modGain.gain.exponentialRampToValueAtTime(freq * 0.1, when + dur);
    mod.connect(modGain); modGain.connect(carrier.frequency);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vel * 0.4, when + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur + 0.5);
    carrier.connect(g); g.connect(out);
    carrier.start(when); mod.start(when);
    carrier.stop(when + dur + 0.6); mod.stop(when + dur + 0.6);
  }
}

function playKick(ac, when, vel, out) {
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(120, when);
  o.frequency.exponentialRampToValueAtTime(35, when + 0.12);
  const g = ac.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel * 0.9, when + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.3);
  o.connect(g); g.connect(out);
  o.start(when); o.stop(when + 0.35);
}
function playSnare(ac, when, vel, out) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1500;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel * 0.5, when + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.18);
  src.connect(f); f.connect(g); g.connect(out);
  src.start(when); src.stop(when + 0.2);
  // body tone
  const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = 220;
  const og = ac.createGain();
  og.gain.setValueAtTime(0, when);
  og.gain.linearRampToValueAtTime(vel * 0.3, when + 0.005);
  og.gain.exponentialRampToValueAtTime(0.0001, when + 0.1);
  o.connect(og); og.connect(out);
  o.start(when); o.stop(when + 0.12);
}
function playHat(ac, when, vel, out, open) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.15, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
  const g = ac.createGain();
  const decay = open ? 0.18 : 0.05;
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel * 0.35, when + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, when + decay);
  src.connect(f); f.connect(g); g.connect(out);
  src.start(when); src.stop(when + decay + 0.05);
}

// ---------- SCHEDULER ----------
function beatToTime(beat) { return (beat / State.bpm) * 60; }
function timeToBeat(time) { return (time * State.bpm) / 60; }

let scheduledNoteIds = new Set();

function scheduler() {
  if (!State.isPlaying) return;
  const now = actx.currentTime;
  const playStartTime = State.startTime;
  const lookahead = now + State.scheduleAhead;

  // Iterate every clip in every track
  for (let ti = 0; ti < Tracks.length; ti++) {
    const track = Tracks[ti];
    for (let ci = 0; ci < track.clips.length; ci++) {
      const clip = track.clips[ci];
      for (let ni = 0; ni < clip.notes.length; ni++) {
        const note = clip.notes[ni];
        const noteBeat = clip.start + note.start;
        const noteTime = playStartTime + beatToTime(noteBeat - State.startBeat);
        const id = `${ti}-${ci}-${ni}-${State.playEpoch}`;
        if (noteTime >= now && noteTime < lookahead && !scheduledNoteIds.has(id)) {
          // Effective mute/solo
          const anySolo = Tracks.some(t => t.solo);
          if (track.mute) continue;
          if (anySolo && !track.solo) continue;
          const dur = beatToTime(note.length);
          playNote(track, note, noteTime, dur);
          scheduledNoteIds.add(id);
        }
      }
    }
  }

  // Update playhead
  const elapsed = now - playStartTime;
  State.curBeat = State.startBeat + timeToBeat(elapsed);

  // Loop
  if (State.loopStart >= 0 && State.loopEnd > State.loopStart) {
    if (State.curBeat >= State.loopEnd) {
      // wrap
      State.startBeat = State.loopStart;
      State.startTime = now;
      State.curBeat = State.loopStart;
      scheduledNoteIds.clear();
      State.playEpoch = (State.playEpoch || 0) + 1;
    }
  } else if (State.curBeat >= State.totalBeats) {
    stop();
    return;
  }
  updatePosition();
  setTimeout(scheduler, 25);
}

function play() {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  if (State.isPlaying) return;
  State.isPlaying = true;
  State.startTime = actx.currentTime;
  scheduledNoteIds.clear();
  State.playEpoch = (State.playEpoch || 0) + 1;
  if (State.curBeat >= State.totalBeats) State.curBeat = 0;
  State.startBeat = State.curBeat;
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('btn-play').textContent = '⏸';
  scheduler();
  drawLoop();
}

function pause() {
  State.isPlaying = false;
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-play').textContent = '▶';
  scheduledNoteIds.clear();
}

function stop() {
  State.isPlaying = false;
  State.curBeat = 0;
  State.startBeat = 0;
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-play').textContent = '▶';
  scheduledNoteIds.clear();
  updatePosition();
  drawTimeline();
  drawRuler();
  drawPianoRoll();
}

function updatePosition() {
  const beat = State.curBeat;
  const bar = Math.floor(beat / 4) + 1;
  const beatInBar = Math.floor(beat % 4) + 1;
  const ticks = Math.floor((beat % 1) * 4) + 1;
  document.getElementById('pos').textContent = `${bar}.${beatInBar}.${ticks}`;
}

// ---------- TIMELINE RENDERING ----------
const timelineCanvas = document.getElementById('timeline-canvas');
const timelineCtx = timelineCanvas.getContext('2d');
const rulerCanvas = document.getElementById('ruler-canvas');
const rulerCtx = rulerCanvas.getContext('2d');

function resizeTimeline() {
  const wrap = document.getElementById('timeline-wrap');
  const w = State.totalBeats * State.pxPerBeat;
  const h = Tracks.length * State.trackHeight;
  timelineCanvas.width = w;
  timelineCanvas.height = h;
  timelineCanvas.style.width = w + 'px';
  timelineCanvas.style.height = h + 'px';

  const ruler = document.getElementById('ruler');
  rulerCanvas.width = w;
  rulerCanvas.height = 28;
  rulerCanvas.style.width = w + 'px';
  rulerCanvas.style.height = '28px';
}

function drawRuler() {
  const ctx = rulerCtx;
  const w = rulerCanvas.width, h = rulerCanvas.height;
  ctx.fillStyle = '#232730';
  ctx.fillRect(0, 0, w, h);

  // Loop region
  if (State.loopStart >= 0 && State.loopEnd > State.loopStart) {
    ctx.fillStyle = 'rgba(45, 217, 217, 0.25)';
    ctx.fillRect(State.loopStart * State.pxPerBeat, 0, (State.loopEnd - State.loopStart) * State.pxPerBeat, h);
  }

  // Bar lines
  for (let beat = 0; beat <= State.totalBeats; beat++) {
    const x = beat * State.pxPerBeat;
    if (beat % 4 === 0) {
      ctx.strokeStyle = '#5a6273';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, h - 14);
      ctx.lineTo(x + 0.5, h);
      ctx.stroke();
      ctx.fillStyle = '#9aa3b3';
      ctx.font = '10px -apple-system, monospace';
      ctx.textBaseline = 'top';
      ctx.fillText(((beat / 4) + 1).toString(), x + 4, 4);
    } else {
      ctx.strokeStyle = '#3a4050';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, h - 6);
      ctx.lineTo(x + 0.5, h);
      ctx.stroke();
    }
  }

  // Playhead
  const phx = State.curBeat * State.pxPerBeat;
  ctx.strokeStyle = '#ff8a3d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(phx, 0);
  ctx.lineTo(phx, h);
  ctx.stroke();
  ctx.fillStyle = '#ff8a3d';
  ctx.beginPath();
  ctx.moveTo(phx - 5, 0);
  ctx.lineTo(phx + 5, 0);
  ctx.lineTo(phx, 8);
  ctx.closePath();
  ctx.fill();
}

function drawTimeline() {
  const ctx = timelineCtx;
  const w = timelineCanvas.width, h = timelineCanvas.height;
  ctx.fillStyle = '#14161a';
  ctx.fillRect(0, 0, w, h);

  // Track row backgrounds
  for (let i = 0; i < Tracks.length; i++) {
    const y = i * State.trackHeight;
    if (i === State.selectedTrack) {
      ctx.fillStyle = 'rgba(45, 217, 217, 0.05)';
      ctx.fillRect(0, y, w, State.trackHeight);
    }
    ctx.strokeStyle = '#2a2f3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y + State.trackHeight + 0.5);
    ctx.lineTo(w, y + State.trackHeight + 0.5);
    ctx.stroke();
  }

  // Vertical bar lines
  for (let beat = 0; beat <= State.totalBeats; beat++) {
    const x = beat * State.pxPerBeat;
    if (beat % 4 === 0) {
      ctx.strokeStyle = '#2a2f3a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, 0);
      ctx.lineTo(x + 0.5, h);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#1f232b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, 0);
      ctx.lineTo(x + 0.5, h);
      ctx.stroke();
    }
  }

  // Loop region
  if (State.loopStart >= 0 && State.loopEnd > State.loopStart) {
    ctx.fillStyle = 'rgba(45, 217, 217, 0.06)';
    ctx.fillRect(State.loopStart * State.pxPerBeat, 0, (State.loopEnd - State.loopStart) * State.pxPerBeat, h);
  }

  // Clips
  for (let ti = 0; ti < Tracks.length; ti++) {
    const t = Tracks[ti];
    const y = ti * State.trackHeight;
    for (const clip of t.clips) {
      const cx = clip.start * State.pxPerBeat;
      const cw = clip.length * State.pxPerBeat;
      const isSel = clip === State.selectedClip;
      // Body
      const grad = ctx.createLinearGradient(0, y + 4, 0, y + State.trackHeight - 4);
      grad.addColorStop(0, t.color);
      grad.addColorStop(1, shade(t.color, -30));
      ctx.fillStyle = grad;
      ctx.globalAlpha = isSel ? 0.95 : 0.7;
      roundRect(ctx, cx + 1, y + 4, cw - 2, State.trackHeight - 8, 3);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Border
      ctx.strokeStyle = isSel ? '#ffffff' : 'rgba(0,0,0,0.4)';
      ctx.lineWidth = isSel ? 2 : 1;
      roundRect(ctx, cx + 1, y + 4, cw - 2, State.trackHeight - 8, 3);
      ctx.stroke();
      // Mini notes preview
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const minP = Math.min(...clip.notes.map(n => n.pitch), 60);
      const maxP = Math.max(...clip.notes.map(n => n.pitch), 72);
      const range = Math.max(1, maxP - minP);
      for (const n of clip.notes) {
        const nx = cx + (n.start / clip.length) * cw;
        const nw = (n.length / clip.length) * cw;
        const ny = y + 6 + (1 - (n.pitch - minP) / range) * (State.trackHeight - 16);
        ctx.fillRect(nx + 1, ny, Math.max(1, nw - 1), 2);
      }
    }
  }

  // Playhead
  const phx = State.curBeat * State.pxPerBeat;
  ctx.strokeStyle = '#ff8a3d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(phx + 0.5, 0);
  ctx.lineTo(phx + 0.5, h);
  ctx.stroke();
}

function shade(hex, percent) {
  const c = hex.replace('#', '');
  const num = parseInt(c, 16);
  let r = (num >> 16) + percent;
  let g = ((num >> 8) & 0xFF) + percent;
  let b = (num & 0xFF) + percent;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- TRACK HEADERS ----------
function buildTrackHeaders() {
  const wrap = document.getElementById('track-headers');
  wrap.innerHTML = '';
  Tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'th' + (i === State.selectedTrack ? ' sel' : '');
    div.dataset.idx = i;
    div.style.borderLeftColor = t.color;
    div.innerHTML = `
      <div class="name" style="color:${t.color}">${i+1}. ${t.name}</div>
      <div class="bot">
        <button class="icon-btn m ${t.mute?'active':''}" title="Mute">M</button>
        <button class="icon-btn s ${t.solo?'active':''}" title="Solo">S</button>
        <input type="range" class="vol-mini" min="0" max="1" step="0.01" value="${t.volume}" title="Volume">
      </div>
    `;
    div.onclick = (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      selectTrack(i);
    };
    div.querySelector('.m').onclick = (e) => {
      e.stopPropagation();
      t.mute = !t.mute;
      buildTrackHeaders();
    };
    div.querySelector('.s').onclick = (e) => {
      e.stopPropagation();
      t.solo = !t.solo;
      buildTrackHeaders();
    };
    div.querySelector('.vol-mini').oninput = (e) => {
      e.stopPropagation();
      t.volume = parseFloat(e.target.value);
      if (t._gain) t._gain.gain.value = t.volume;
      if (i === State.selectedTrack) {
        document.getElementById('t-vol').value = t.volume;
        document.getElementById('t-vol-v').textContent = t.volume.toFixed(2);
      }
    };
    wrap.appendChild(div);
  });
}

function selectTrack(i) {
  State.selectedTrack = i;
  buildTrackHeaders();
  updateTrackPanel();
  // Auto-select first clip on this track if any
  if (Tracks[i].clips.length > 0 && (!State.selectedClip || !Tracks[i].clips.includes(State.selectedClip))) {
    State.selectedClip = Tracks[i].clips[0];
  }
  drawTimeline();
  drawPianoRoll();
}

function updateTrackPanel() {
  const t = Tracks[State.selectedTrack];
  document.getElementById('track-title').textContent = `Track ${State.selectedTrack + 1}: ${t.name}`;
  document.getElementById('track-title').style.color = t.color;
  document.getElementById('instr-pick').value = t.instrument;
  document.getElementById('t-vol').value = t.volume;
  document.getElementById('t-vol-v').textContent = t.volume.toFixed(2);
  document.getElementById('t-pan').value = t.pan;
  document.getElementById('t-pan-v').textContent = t.pan.toFixed(1);
  document.getElementById('t-mute').classList.toggle('active', t.mute);
  document.getElementById('t-solo').classList.toggle('active', t.solo);
  buildEffectsRack();
}

// ---------- EFFECTS RACK UI ----------
function buildEffectsRack() {
  const t = Tracks[State.selectedTrack];
  const list = document.getElementById('fx-list');
  list.innerHTML = '';
  t.effects.forEach((ef, idx) => {
    const div = document.createElement('div');
    div.className = 'effect' + (ef.enabled ? '' : ' disabled');
    div.draggable = true;
    div.dataset.idx = idx;
    let inner = `<div class="effect-header">
      <span class="name">${effectLabel(ef.type)}</span>
      <span class="toggle ${ef.enabled?'on':''}" data-toggle="${idx}" title="Toggle"></span>
    </div>`;
    if (ef.type === 'reverb') {
      inner += `
        <div class="row"><span class="label">Wet</span><input type="range" min="0" max="1" step="0.01" value="${ef.params.wet}" data-p="wet"><span class="val">${ef.params.wet.toFixed(2)}</span></div>
        <div class="row"><span class="label">Decay</span><input type="range" min="0.1" max="5" step="0.1" value="${ef.params.decay}" data-p="decay"><span class="val">${ef.params.decay.toFixed(1)}s</span></div>`;
    } else if (ef.type === 'delay') {
      inner += `
        <div class="row"><span class="label">Time</span><input type="range" min="0.05" max="1" step="0.01" value="${ef.params.time}" data-p="time"><span class="val">${ef.params.time.toFixed(2)}s</span></div>
        <div class="row"><span class="label">Feedback</span><input type="range" min="0" max="0.85" step="0.01" value="${ef.params.feedback}" data-p="feedback"><span class="val">${ef.params.feedback.toFixed(2)}</span></div>`;
    } else if (ef.type === 'lowpass') {
      inner += `
        <div class="row"><span class="label">Cutoff</span><input type="range" min="100" max="12000" step="50" value="${ef.params.cutoff}" data-p="cutoff"><span class="val">${(ef.params.cutoff/1000).toFixed(1)}k</span></div>
        <div class="row"><span class="label">Q</span><input type="range" min="0.1" max="20" step="0.1" value="${ef.params.q}" data-p="q"><span class="val">${ef.params.q.toFixed(1)}</span></div>`;
    } else if (ef.type === 'compressor') {
      inner += `
        <div class="row"><span class="label">Thresh</span><input type="range" min="-60" max="0" step="1" value="${ef.params.threshold}" data-p="threshold"><span class="val">${ef.params.threshold}dB</span></div>
        <div class="row"><span class="label">Ratio</span><input type="range" min="1" max="20" step="0.5" value="${ef.params.ratio}" data-p="ratio"><span class="val">${ef.params.ratio}:1</span></div>`;
    }
    div.innerHTML = inner;
    div.querySelector('.toggle').onclick = (e) => {
      e.stopPropagation();
      ef.enabled = !ef.enabled;
      if (actx) rebuildFx(t);
      buildEffectsRack();
    };
    div.querySelectorAll('input[type=range]').forEach(inp => {
      inp.oninput = (e) => {
        const p = inp.dataset.p;
        const v = parseFloat(inp.value);
        ef.params[p] = v;
        // Update display
        const valEl = inp.nextElementSibling;
        if (p === 'wet') valEl.textContent = v.toFixed(2);
        else if (p === 'decay') valEl.textContent = v.toFixed(1) + 's';
        else if (p === 'time') valEl.textContent = v.toFixed(2) + 's';
        else if (p === 'feedback') valEl.textContent = v.toFixed(2);
        else if (p === 'cutoff') valEl.textContent = (v / 1000).toFixed(1) + 'k';
        else if (p === 'q') valEl.textContent = v.toFixed(1);
        else if (p === 'threshold') valEl.textContent = v + 'dB';
        else if (p === 'ratio') valEl.textContent = v + ':1';
        if (actx) rebuildFx(t);
      };
    });
    // drag reorder
    div.ondragstart = (e) => {
      div.classList.add('dragging');
      e.dataTransfer.setData('text/plain', idx);
    };
    div.ondragend = () => div.classList.remove('dragging');
    div.ondragover = (e) => e.preventDefault();
    div.ondrop = (e) => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = idx;
      if (from === to) return;
      const moved = t.effects.splice(from, 1)[0];
      t.effects.splice(to, 0, moved);
      if (actx) rebuildFx(t);
      buildEffectsRack();
    };
    list.appendChild(div);
  });
}
function effectLabel(type) {
  return { reverb: 'Reverb', delay: 'Delay', lowpass: 'Lowpass Filter', compressor: 'Compressor' }[type];
}

// ---------- TIMELINE INTERACTION ----------
let dragMode = null;       // 'create', 'move', 'resize-l', 'resize-r'
let dragData = null;

timelineCanvas.addEventListener('mousedown', (e) => {
  initAudio();
  const rect = timelineCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const beat = x / State.pxPerBeat;
  const trackIdx = Math.floor(y / State.trackHeight);
  if (trackIdx < 0 || trackIdx >= Tracks.length) return;
  selectTrack(trackIdx);

  // Check existing clip hit
  const t = Tracks[trackIdx];
  for (const clip of t.clips) {
    if (beat >= clip.start && beat <= clip.start + clip.length) {
      State.selectedClip = clip;
      const localX = beat - clip.start;
      // resize zones (10% from each edge or 0.25 beat min)
      const edge = Math.max(0.25, clip.length * 0.08);
      if (e.button === 2) {
        // delete clip
        t.clips.splice(t.clips.indexOf(clip), 1);
        State.selectedClip = null;
        drawTimeline();
        drawPianoRoll();
        return;
      }
      if (localX < edge) dragMode = 'resize-l';
      else if (localX > clip.length - edge) dragMode = 'resize-r';
      else dragMode = 'move';
      dragData = { clip, startBeat: beat, origStart: clip.start, origLen: clip.length };
      drawTimeline();
      drawPianoRoll();
      return;
    }
  }

  // Otherwise create a new clip
  const newClip = {
    start: Math.round(beat * 4) / 4,  // snap to 16th
    length: 1, // initial 1 beat, will expand on drag
    notes: []
  };
  t.clips.push(newClip);
  State.selectedClip = newClip;
  dragMode = 'create';
  dragData = { clip: newClip, startBeat: newClip.start };
  drawTimeline();
  drawPianoRoll();
});

window.addEventListener('mousemove', (e) => {
  if (!dragMode) {
    // Hover cursor on timeline
    return;
  }
  const rect = timelineCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const beat = Math.max(0, x / State.pxPerBeat);
  const snap = Math.round(beat * 4) / 4;

  if (dragMode === 'create') {
    const len = Math.max(0.25, snap - dragData.startBeat);
    dragData.clip.length = len;
    drawTimeline();
  } else if (dragMode === 'move') {
    const delta = beat - dragData.startBeat;
    const newStart = Math.max(0, Math.round((dragData.origStart + delta) * 4) / 4);
    dragData.clip.start = newStart;
    drawTimeline();
  } else if (dragMode === 'resize-l') {
    const delta = beat - dragData.startBeat;
    let newStart = Math.max(0, Math.round((dragData.origStart + delta) * 4) / 4);
    let newLen = dragData.origLen - (newStart - dragData.origStart);
    if (newLen < 0.25) {
      newLen = 0.25;
      newStart = dragData.origStart + dragData.origLen - 0.25;
    }
    dragData.clip.start = newStart;
    dragData.clip.length = newLen;
    drawTimeline();
    drawPianoRoll();
  } else if (dragMode === 'resize-r') {
    const newLen = Math.max(0.25, Math.round((beat - dragData.clip.start) * 4) / 4);
    dragData.clip.length = newLen;
    drawTimeline();
    drawPianoRoll();
  }
});

window.addEventListener('mouseup', (e) => {
  if (dragMode) {
    dragMode = null;
    dragData = null;
    drawTimeline();
    drawPianoRoll();
  }
});

timelineCanvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Ruler clicks: seek; shift-click: set loop boundaries
let loopAnchor = -1;
document.getElementById('ruler').addEventListener('mousedown', (e) => {
  initAudio();
  const rect = rulerCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left + document.getElementById('timeline-wrap').scrollLeft;
  // Actually ruler scrolls horizontally with timeline via JS sync, see below
  const beat = Math.max(0, x / State.pxPerBeat);
  if (e.shiftKey) {
    if (loopAnchor < 0) {
      loopAnchor = beat;
      State.loopStart = beat;
      State.loopEnd = beat;
    } else {
      State.loopStart = Math.min(loopAnchor, beat);
      State.loopEnd = Math.max(loopAnchor, beat);
      loopAnchor = -1;
    }
    drawRuler();
    drawTimeline();
  } else {
    State.curBeat = beat;
    State.startBeat = beat;
    if (State.isPlaying) {
      State.startTime = actx.currentTime;
      scheduledNoteIds.clear();
      State.playEpoch = (State.playEpoch || 0) + 1;
    }
    updatePosition();
    drawRuler();
    drawTimeline();
    loopAnchor = -1;
  }
});

// ---------- PIANO ROLL ----------
const prKeysCanvas = document.getElementById('pr-keys');
const prGridCanvas = document.getElementById('pr-grid');
const prKeysCtx = prKeysCanvas.getContext('2d');
const prGridCtx = prGridCanvas.getContext('2d');

const PR_KEY_HEIGHT = 8;
const PR_OCTAVES = 7; // C1 to C8 → 88-ish
const PR_LOW_NOTE = 21; // A0
const PR_HIGH_NOTE = 108; // C8
const PR_NUM_KEYS = PR_HIGH_NOTE - PR_LOW_NOTE + 1; // 88
const PR_PX_PER_BEAT = 64;

function resizePianoRoll() {
  const wrapK = document.getElementById('pr-keys-wrap');
  const wrapG = document.getElementById('pr-grid-wrap');
  const heightTotal = PR_NUM_KEYS * PR_KEY_HEIGHT;

  prKeysCanvas.width = 80;
  prKeysCanvas.height = heightTotal;
  prKeysCanvas.style.width = '80px';
  prKeysCanvas.style.height = heightTotal + 'px';

  let lengthBeats = State.selectedClip ? State.selectedClip.length : 4;
  prGridCanvas.width = Math.max(wrapG.clientWidth, lengthBeats * PR_PX_PER_BEAT);
  prGridCanvas.height = heightTotal;
  prGridCanvas.style.width = (lengthBeats * PR_PX_PER_BEAT) + 'px';
  prGridCanvas.style.height = heightTotal + 'px';
}

function noteName(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[midi % 12] + (Math.floor(midi / 12) - 1);
}

function isBlackKey(midi) {
  const m = midi % 12;
  return m === 1 || m === 3 || m === 6 || m === 8 || m === 10;
}

function drawKeys() {
  const ctx = prKeysCtx;
  const w = prKeysCanvas.width, h = prKeysCanvas.height;
  ctx.fillStyle = '#0e1014';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < PR_NUM_KEYS; i++) {
    const midi = PR_HIGH_NOTE - i;
    const y = i * PR_KEY_HEIGHT;
    if (isBlackKey(midi)) {
      ctx.fillStyle = '#1a1d24';
      ctx.fillRect(0, y, w * 0.65, PR_KEY_HEIGHT);
    } else {
      ctx.fillStyle = '#d8dde8';
      ctx.fillRect(0, y, w, PR_KEY_HEIGHT);
      ctx.strokeStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(0, y + PR_KEY_HEIGHT - 0.5);
      ctx.lineTo(w, y + PR_KEY_HEIGHT - 0.5);
      ctx.stroke();
    }
    if (midi % 12 === 0) {
      ctx.fillStyle = '#666';
      ctx.font = '8px monospace';
      ctx.fillText(noteName(midi), 50, y + PR_KEY_HEIGHT - 1);
    }
  }
}

function drawPianoRoll() {
  resizePianoRoll();
  drawKeys();
  const ctx = prGridCtx;
  const w = prGridCanvas.width, h = prGridCanvas.height;
  ctx.fillStyle = '#14161a';
  ctx.fillRect(0, 0, w, h);

  // Key row backgrounds
  for (let i = 0; i < PR_NUM_KEYS; i++) {
    const midi = PR_HIGH_NOTE - i;
    const y = i * PR_KEY_HEIGHT;
    if (isBlackKey(midi)) {
      ctx.fillStyle = '#181b22';
      ctx.fillRect(0, y, w, PR_KEY_HEIGHT);
    }
    if (midi % 12 === 0) {
      ctx.strokeStyle = '#2a2f3a';
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(w, y + 0.5);
      ctx.stroke();
    }
  }

  if (!State.selectedClip) {
    ctx.fillStyle = '#5a6273';
    ctx.font = '14px sans-serif';
    ctx.fillText('Select or create a clip on the timeline', 20, 100);
    document.getElementById('clip-info').textContent = 'no clip';
    return;
  }
  const clip = State.selectedClip;
  const trackIdx = Tracks.findIndex(t => t.clips.includes(clip));
  const track = Tracks[trackIdx];
  document.getElementById('clip-info').textContent = `${track.name} • ${clip.length.toFixed(2)} beats • ${clip.notes.length} notes`;

  // Beat lines
  const beats = clip.length;
  for (let b = 0; b <= beats * 4; b++) {
    const x = (b / 4) * PR_PX_PER_BEAT;
    if (b % 4 === 0) ctx.strokeStyle = '#3a4050';
    else ctx.strokeStyle = '#1f232b';
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, h);
    ctx.stroke();
  }

  // Notes
  for (const n of clip.notes) {
    const x = n.start * PR_PX_PER_BEAT;
    const nw = Math.max(2, n.length * PR_PX_PER_BEAT);
    const i = PR_HIGH_NOTE - n.pitch;
    const y = i * PR_KEY_HEIGHT;
    const vel = n.vel != null ? n.vel : 0.8;
    const baseColor = track.color;
    ctx.fillStyle = colorWithAlpha(baseColor, 0.4 + vel * 0.6);
    ctx.fillRect(x, y, nw, PR_KEY_HEIGHT - 1);
    ctx.strokeStyle = baseColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, nw - 1, PR_KEY_HEIGHT - 2);
  }

  // Playhead in piano roll
  if (State.isPlaying) {
    const clipStartBeat = clip.start;
    const localBeat = State.curBeat - clipStartBeat;
    if (localBeat >= 0 && localBeat <= clip.length) {
      const px = localBeat * PR_PX_PER_BEAT;
      ctx.strokeStyle = '#ff8a3d';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + 0.5, 0);
      ctx.lineTo(px + 0.5, h);
      ctx.stroke();
    }
  }
}

function colorWithAlpha(hex, alpha) {
  const c = hex.replace('#', '');
  const r = parseInt(c.substr(0,2), 16);
  const g = parseInt(c.substr(2,2), 16);
  const b = parseInt(c.substr(4,2), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Piano roll interaction
let prDragMode = null;
let prDragData = null;

prGridCanvas.addEventListener('mousedown', (e) => {
  initAudio();
  if (!State.selectedClip) return;
  const rect = prGridCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const beat = Math.max(0, x / PR_PX_PER_BEAT);
  const keyIdx = Math.floor(y / PR_KEY_HEIGHT);
  const pitch = PR_HIGH_NOTE - keyIdx;
  if (pitch < PR_LOW_NOTE || pitch > PR_HIGH_NOTE) return;

  const clip = State.selectedClip;

  // Hit existing note?
  for (let i = clip.notes.length - 1; i >= 0; i--) {
    const n = clip.notes[i];
    if (n.pitch !== pitch) continue;
    if (beat >= n.start && beat <= n.start + n.length) {
      if (e.button === 2) {
        clip.notes.splice(i, 1);
        drawPianoRoll();
        drawTimeline();
        return;
      }
      const local = beat - n.start;
      const edge = Math.max(0.05, n.length * 0.2);
      if (local > n.length - edge) {
        prDragMode = 'note-resize';
        prDragData = { note: n, startBeat: beat, origLen: n.length };
      } else {
        prDragMode = 'note-move';
        prDragData = { note: n, startBeat: beat, origStart: n.start, origPitch: n.pitch };
      }
      return;
    }
  }
  if (e.button === 2) return;

  // Create new note
  const snap = Math.floor(beat * 4) / 4;
  const newNote = {
    pitch: pitch,
    start: snap,
    length: 0.5,
    vel: 0.8
  };
  clip.notes.push(newNote);
  // preview
  if (actx) playNote(Tracks[Tracks.findIndex(t => t.clips.includes(clip))], newNote, actx.currentTime, beatToTime(0.5));
  prDragMode = 'note-resize';
  prDragData = { note: newNote, startBeat: snap, origLen: 0.5 };
  drawPianoRoll();
  drawTimeline();
});

window.addEventListener('mousemove', (e) => {
  if (!prDragMode) return;
  const rect = prGridCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const beat = Math.max(0, x / PR_PX_PER_BEAT);
  const keyIdx = Math.floor(y / PR_KEY_HEIGHT);
  const pitch = PR_HIGH_NOTE - keyIdx;
  const clip = State.selectedClip;
  if (!clip) return;

  if (prDragMode === 'note-resize') {
    const newLen = Math.max(0.0625, Math.round((beat - prDragData.note.start) * 16) / 16);
    prDragData.note.length = newLen;
    drawPianoRoll();
  } else if (prDragMode === 'note-move') {
    const delta = beat - prDragData.startBeat;
    const newStart = Math.max(0, Math.round((prDragData.origStart + delta) * 16) / 16);
    prDragData.note.start = Math.min(newStart, clip.length - prDragData.note.length);
    if (pitch >= PR_LOW_NOTE && pitch <= PR_HIGH_NOTE) {
      prDragData.note.pitch = pitch;
    }
    drawPianoRoll();
  }
});

window.addEventListener('mouseup', () => {
  if (prDragMode) {
    prDragMode = null;
    prDragData = null;
    drawTimeline();
    drawPianoRoll();
  }
});

// ---------- DEMO SONG ----------
function loadDemoSong() {
  // Clear
  Tracks.forEach(t => t.clips = []);

  // ===== Saw Lead (Track 0) - melodic line =====
  const leadNotes = [];
  // C minor pentatonic-ish melody, 4 bars
  const leadPitches = [72, 75, 77, 79, 82, 79, 77, 75, 77, 75, 72, 70, 72, 75, 77, 79];
  leadPitches.forEach((p, i) => {
    leadNotes.push({ pitch: p, start: i * 0.5, length: 0.45, vel: 0.7 + (i % 4 === 0 ? 0.2 : 0) });
  });
  Tracks[0].clips.push({ start: 8, length: 8, notes: leadNotes });

  // ===== Sub Bass (Track 1) - 8 bars =====
  const bassNotes = [];
  const bassPattern = [36, 36, 43, 36, 41, 41, 38, 36];
  for (let bar = 0; bar < 8; bar++) {
    const root = bassPattern[bar % bassPattern.length];
    bassNotes.push({ pitch: root, start: bar * 4, length: 1.5, vel: 0.85 });
    bassNotes.push({ pitch: root, start: bar * 4 + 2, length: 1.5, vel: 0.7 });
    bassNotes.push({ pitch: root + 12, start: bar * 4 + 3.5, length: 0.45, vel: 0.6 });
  }
  Tracks[1].clips.push({ start: 0, length: 32, notes: bassNotes });

  // ===== Drums (Track 2) - 4 bar loop, repeated =====
  const drumNotes = [];
  for (let bar = 0; bar < 8; bar++) {
    const off = bar * 4;
    // Kick on 1 and 3
    drumNotes.push({ pitch: 36, start: off + 0, length: 0.25, vel: 0.95 });
    drumNotes.push({ pitch: 36, start: off + 2, length: 0.25, vel: 0.85 });
    // extra kick
    if (bar % 2 === 1) drumNotes.push({ pitch: 36, start: off + 2.75, length: 0.2, vel: 0.6 });
    // Snare on 2 and 4
    drumNotes.push({ pitch: 38, start: off + 1, length: 0.25, vel: 0.8 });
    drumNotes.push({ pitch: 38, start: off + 3, length: 0.25, vel: 0.85 });
    // Hi-hat 8ths
    for (let i = 0; i < 8; i++) {
      drumNotes.push({ pitch: 42, start: off + i * 0.5, length: 0.1, vel: 0.5 + (i % 2 === 0 ? 0.15 : 0) });
    }
    // open hat occasional
    if (bar % 4 === 3) drumNotes.push({ pitch: 46, start: off + 3.5, length: 0.4, vel: 0.65 });
  }
  Tracks[2].clips.push({ start: 0, length: 32, notes: drumNotes });

  // ===== FM Piano (Track 3) - chords =====
  const pianoNotes = [];
  // Cm, Eb, Ab, G chords (in C minor)
  const chords = [
    [60, 63, 67],  // Cm
    [60, 63, 67],
    [63, 67, 70],  // Eb
    [63, 67, 70],
    [56, 60, 63],  // Ab
    [56, 60, 63],
    [55, 59, 62],  // G
    [55, 59, 62],
  ];
  chords.forEach((ch, bar) => {
    ch.forEach(p => {
      pianoNotes.push({ pitch: p, start: bar * 4 + 0, length: 1.8, vel: 0.5 });
      pianoNotes.push({ pitch: p, start: bar * 4 + 2, length: 1.8, vel: 0.5 });
    });
  });
  Tracks[3].clips.push({ start: 0, length: 32, notes: pianoNotes });

  // ===== Pad (Track 4) - sustained chords =====
  const padNotes = [];
  const padChords = [
    [48, 55, 60, 63],
    [51, 55, 58, 63],
    [44, 51, 56, 60],
    [43, 50, 55, 59],
  ];
  for (let i = 0; i < 4; i++) {
    const ch = padChords[i];
    ch.forEach(p => {
      padNotes.push({ pitch: p, start: i * 8, length: 7.5, vel: 0.55 });
    });
  }
  Tracks[4].clips.push({ start: 0, length: 32, notes: padNotes });

  // ===== Pluck (Track 5) - arpeggios =====
  const pluckNotes = [];
  const arpPattern = [72, 75, 79, 75, 72, 75, 79, 82];
  for (let bar = 4; bar < 8; bar++) {
    for (let i = 0; i < 8; i++) {
      pluckNotes.push({
        pitch: arpPattern[i],
        start: (bar - 4) * 4 + i * 0.5,
        length: 0.4,
        vel: 0.5 + (i === 0 ? 0.2 : 0)
      });
    }
  }
  Tracks[5].clips.push({ start: 16, length: 16, notes: pluckNotes });

  // ===== Noise (Track 6) - sweep risers =====
  const noiseNotes = [];
  noiseNotes.push({ pitch: 72, start: 7, length: 1, vel: 0.6 });  // riser into bar 3
  noiseNotes.push({ pitch: 72, start: 15, length: 1, vel: 0.7 }); // riser into bar 5
  noiseNotes.push({ pitch: 72, start: 23, length: 1, vel: 0.7 });
  Tracks[6].clips.push({ start: 0, length: 32, notes: noiseNotes });

  // ===== Bell (Track 7) - sparse accents =====
  const bellNotes = [];
  const bellHits = [
    [0, 84], [4, 87], [8, 91], [12, 87],
    [16, 84], [20, 87], [24, 91], [28, 94]
  ];
  bellHits.forEach(([t, p]) => {
    bellNotes.push({ pitch: p, start: t, length: 1.5, vel: 0.5 });
  });
  Tracks[7].clips.push({ start: 0, length: 32, notes: bellNotes });

  // Enable some effects for ambience
  Tracks[0].effects[1].enabled = true; // delay on lead
  Tracks[0].effects[1].params.feedback = 0.4;
  Tracks[3].effects[0].enabled = true; // reverb on piano
  Tracks[4].effects[0].enabled = true; // reverb on pad
  Tracks[4].effects[0].params.wet = 0.5;
  Tracks[5].effects[1].enabled = true; // delay on pluck
  Tracks[7].effects[0].enabled = true; // reverb on bell
  Tracks[7].effects[0].params.wet = 0.6;
  Tracks[7].effects[0].params.decay = 3;

  if (actx) Tracks.forEach(rebuildFx);

  State.selectedClip = Tracks[2].clips[0]; // Show drums in piano roll
  State.totalBeats = Math.max(32, State.totalBeats);
  resizeTimeline();
  buildTrackHeaders();
  updateTrackPanel();
  drawRuler();
  drawTimeline();
  drawPianoRoll();
  toast('Demo loaded! Press Play.');
}
document.getElementById('btn-demo').onclick = loadDemoSong;

// ---------- WAV EXPORT ----------
async function exportToWav() {
  // Determine length - up to last note across all clips
  let endBeat = 0;
  for (const t of Tracks) {
    for (const clip of t.clips) {
      const clipEnd = clip.start + clip.length;
      if (clipEnd > endBeat) endBeat = clipEnd;
    }
  }
  if (endBeat === 0) {
    toast('Nothing to export');
    return;
  }
  endBeat += 2; // tail
  const lengthSec = (endBeat / State.bpm) * 60;
  const sr = 44100;
  const totalSamples = Math.ceil(lengthSec * sr);

  toast('Rendering... ' + lengthSec.toFixed(1) + 's');
  document.getElementById('btn-export').textContent = 'Rendering...';
  document.getElementById('btn-export').disabled = true;

  const offline = new OfflineAudioContext(2, totalSamples, sr);

  // Master chain (offline)
  const offlineMaster = offline.createGain();
  offlineMaster.gain.value = State.masterVolume;
  offlineMaster.connect(offline.destination);

  // Build per-track chain in offline ctx
  const trackChains = Tracks.map(t => {
    const fxIn = offline.createGain();
    const gain = offline.createGain();
    gain.gain.value = t.volume;
    const pan = offline.createStereoPanner();
    pan.pan.value = t.pan;

    let cur = fxIn;
    for (const ef of t.effects) {
      if (!ef.enabled) continue;
      const nodes = makeOfflineEffect(offline, ef);
      cur.connect(nodes.input);
      cur = nodes.output;
    }
    cur.connect(gain);
    gain.connect(pan);
    pan.connect(offlineMaster);
    return { fxIn, gain, pan };
  });

  // Schedule all notes
  const anySolo = Tracks.some(t => t.solo);
  const beatsPerSec = State.bpm / 60;
  Tracks.forEach((t, ti) => {
    if (t.mute) return;
    if (anySolo && !t.solo) return;
    const dest = trackChains[ti].fxIn;
    for (const clip of t.clips) {
      for (const note of clip.notes) {
        const noteStartBeat = clip.start + note.start;
        const when = noteStartBeat / beatsPerSec;
        const dur = note.length / beatsPerSec;
        if (when < lengthSec) {
          playNote(t, note, when, dur, offline, dest);
        }
      }
    }
  });

  try {
    const renderedBuffer = await offline.startRendering();
    const wav = audioBufferToWav(renderedBuffer);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'vibedaw-export.wav';
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported ' + lengthSec.toFixed(1) + 's of audio!');
  } catch (e) {
    console.error(e);
    toast('Export failed: ' + e.message);
  } finally {
    document.getElementById('btn-export').textContent = 'Export to WAV';
    document.getElementById('btn-export').disabled = false;
  }
}

function makeOfflineEffect(ctx, ef) {
  if (ef.type === 'reverb') {
    const conv = ctx.createConvolver();
    // Build IR in this context
    const decaySec = ef.params.decay;
    const sr = ctx.sampleRate;
    const len = Math.max(1, Math.floor(sr * decaySec));
    const buf = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        const t = i / len;
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.5);
      }
    }
    conv.buffer = buf;
    const wetG = ctx.createGain(); wetG.gain.value = ef.params.wet;
    const dryG = ctx.createGain(); dryG.gain.value = 1 - ef.params.wet * 0.6;
    const input = ctx.createGain();
    const output = ctx.createGain();
    input.connect(dryG); dryG.connect(output);
    input.connect(conv); conv.connect(wetG); wetG.connect(output);
    return { input, output };
  }
  if (ef.type === 'delay') {
    const d = ctx.createDelay(2.0); d.delayTime.value = ef.params.time;
    const fb = ctx.createGain(); fb.gain.value = ef.params.feedback;
    const wet = ctx.createGain(); wet.gain.value = 0.5;
    const input = ctx.createGain();
    const output = ctx.createGain();
    input.connect(output);
    input.connect(d);
    d.connect(fb); fb.connect(d);
    d.connect(wet); wet.connect(output);
    return { input, output };
  }
  if (ef.type === 'lowpass') {
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = ef.params.cutoff; f.Q.value = ef.params.q;
    return { input: f, output: f };
  }
  if (ef.type === 'compressor') {
    const c = ctx.createDynamicsCompressor();
    c.threshold.value = ef.params.threshold;
    c.ratio.value = ef.params.ratio;
    c.attack.value = 0.005; c.release.value = 0.1;
    return { input: c, output: c };
  }
}

function audioBufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1;
  const bitDepth = 16;
  const length = buffer.length;
  const dataLen = length * numChannels * (bitDepth / 8);
  const bufferSize = 44 + dataLen;
  const ab = new ArrayBuffer(bufferSize);
  const view = new DataView(ab);

  function writeStr(o, s) { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); }
  writeStr(0, 'RIFF');
  view.setUint32(4, bufferSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
  view.setUint16(32, numChannels * (bitDepth / 8), true);
  view.setUint16(34, bitDepth, true);
  writeStr(36, 'data');
  view.setUint32(40, dataLen, true);

  // Interleave & convert to 16-bit PCM
  const channels = [];
  for (let c = 0; c < numChannels; c++) channels.push(buffer.getChannelData(c));
  let offset = 44;
  for (let i = 0; i < length; i++) {
    for (let c = 0; c < numChannels; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      view.setInt16(offset, s, true);
      offset += 2;
    }
  }
  return ab;
}

document.getElementById('btn-export').onclick = exportToWav;

// ---------- DRAW LOOP ----------
function drawLoop() {
  if (State.isPlaying) {
    drawTimeline();
    drawRuler();
    drawPianoRoll();
    State.rafId = requestAnimationFrame(drawLoop);
  }
}

// ---------- TOAST ----------
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTO);
  window._toastTO = setTimeout(() => t.classList.remove('show'), 1800);
}

// ---------- INIT ----------
function init() {
  resizeTimeline();
  buildTrackHeaders();
  updateTrackPanel();
  drawRuler();
  drawTimeline();
  resizePianoRoll();
  drawPianoRoll();

  // Window resize
  window.addEventListener('resize', () => {
    resizeTimeline();
    resizePianoRoll();
    drawRuler();
    drawTimeline();
    drawPianoRoll();
  });

  // Initialize audio on first user gesture
  document.body.addEventListener('mousedown', () => initAudio(), { once: true });
}
init();
