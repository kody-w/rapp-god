<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EPIC 5v5 — Summoner's Rift Auto-Broadcast (3D)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04060c;font-family:'Trebuchet MS','Helvetica Neue',Arial,sans-serif;color:#fff;user-select:none;cursor:none}
#stage{position:absolute;inset:0}
#stage canvas{display:block;width:100%;height:100%}
#hud{position:absolute;inset:0;pointer-events:none;font-family:'Trebuchet MS',sans-serif;z-index:5}
#liveTag{position:absolute;left:18px;top:14px;font-size:13px;letter-spacing:5px;color:#ff5050;font-weight:700;text-shadow:0 0 8px rgba(255,80,80,.5)}
#liveTag span{color:#fff;letter-spacing:3px;margin-left:8px;font-weight:600}
#scoreboard{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#1d2334 0%,#0e1320 100%);border:1px solid #3a4060;border-radius:6px;padding:8px 18px;display:flex;align-items:center;gap:14px;font-size:14px;letter-spacing:1px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
#scoreboard .tm{display:flex;align-items:center;gap:10px;font-weight:700}
#scoreboard .b{color:#5cb8ff} #scoreboard .r{color:#ff6a6a}
#scoreboard .num{font-size:20px;min-width:24px;text-align:center}
#scoreboard .ico{font-size:11px;color:#ddd;display:inline-flex;align-items:center;gap:3px}
#scoreboard .lbl{font-size:10px;letter-spacing:3px;color:#999;font-weight:600}
#matchTimer{font-size:22px;color:#ffd97a;font-weight:700;letter-spacing:3px;min-width:78px;text-align:center}
.rosterCol{position:absolute;top:60px;width:230px;display:flex;flex-direction:column;gap:6px}
#blueRoster{left:14px} #redRoster{right:14px}
.hRow{display:flex;align-items:center;background:linear-gradient(90deg,rgba(20,28,44,.92),rgba(14,18,30,.85));border:1px solid #2a3450;border-radius:5px;padding:6px;gap:8px;height:54px;box-shadow:0 2px 6px rgba(0,0,0,.45);transition:opacity .3s}
#redRoster .hRow{flex-direction:row-reverse}
.hRow.dead{opacity:.45;filter:grayscale(.7)}
.hPort{width:34px;height:34px;border-radius:4px;background:linear-gradient(135deg,#3a4a6a,#1a2030);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#ffd97a;border:1px solid #555;flex-shrink:0}
#blueRoster .hPort{border-color:#5cb8ff;box-shadow:0 0 6px rgba(92,184,255,.5)}
#redRoster .hPort{border-color:#ff6a6a;box-shadow:0 0 6px rgba(255,106,106,.5)}
.hInfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
#redRoster .hInfo{align-items:flex-end}
.hName{font-size:11px;letter-spacing:1.5px;font-weight:700;color:#fff;display:flex;justify-content:space-between;width:100%}
#redRoster .hName{flex-direction:row-reverse}
.hName .lvl{color:#ffd97a;font-size:9px;letter-spacing:1px}
.bar{height:5px;background:#000;border-radius:1px;overflow:hidden;width:100%;border:1px solid #222}
.bar>div{height:100%;width:100%;transition:width .15s}
.bar.bHP>div{background:linear-gradient(90deg,#3fdb5c,#7fff8c)}
.bar.bHP.low>div{background:linear-gradient(90deg,#ff5050,#ffaa50)}
.bar.bMP>div{background:linear-gradient(90deg,#3a8fff,#6cb9ff)}
.hKDA{font-size:9px;letter-spacing:1px;color:#aaa}
.hKDA .k{color:#3fdb5c} .hKDA .d{color:#ff5050} .hKDA .a{color:#ffd97a}
.hUlt{width:14px;height:14px;border-radius:50%;background:#222;border:1px solid #444;flex-shrink:0;transition:.2s}
.hUlt.ready{background:radial-gradient(circle,#ffd97a,#ff8800);border-color:#ffd97a;box-shadow:0 0 8px rgba(255,217,122,.85);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(255,217,122,.6)}50%{box-shadow:0 0 14px rgba(255,217,122,1)}}
#killfeed{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:340px;display:flex;flex-direction:column;gap:3px;align-items:center}
.kfRow{background:rgba(8,10,16,.85);border-left:3px solid #888;border-radius:3px;padding:4px 10px;font-size:11px;letter-spacing:1px;display:flex;gap:6px;align-items:center;animation:kfSlide .3s ease-out}
.kfRow.bk{border-left-color:#5cb8ff}
.kfRow.rk{border-left-color:#ff6a6a}
.kfRow .kArr{color:#999} .kfRow .kAtk{font-weight:700} .kfRow.bk .kAtk{color:#5cb8ff} .kfRow.rk .kAtk{color:#ff6a6a}
.kfRow .kVic{font-weight:700}
.kfRow.bk .kVic{color:#ff6a6a} .kfRow.rk .kVic{color:#5cb8ff}
@keyframes kfSlide{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
#banner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(.5);font-size:48px;font-weight:900;letter-spacing:6px;color:#ffd97a;text-shadow:0 0 24px #ffd97a,0 0 48px rgba(255,180,0,.7),0 4px 0 #000;text-align:center;opacity:0;transition:.5s cubic-bezier(.2,1.5,.4,1);pointer-events:none;text-transform:uppercase}
#banner.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#hpbars{position:absolute;inset:0;pointer-events:none}
.hpFloat{position:absolute;transform:translate(-50%,-100%);width:70px;text-align:center;transition:opacity .3s}
.hpFloat.dead{opacity:0}
.hpFloat .nm{font-size:9px;font-weight:700;letter-spacing:1px;color:#fff;text-shadow:0 0 4px #000,0 1px 2px #000;margin-bottom:1px;white-space:nowrap}
.hpFloat .bar2{width:60px;height:4px;margin:0 auto;background:#000;border:1px solid #222;border-radius:1px;overflow:hidden}
.hpFloat .bar2>div{height:100%;background:#3fdb5c;transition:width .15s}
.hpFloat.red .bar2>div{background:#ff6a6a}
#draftCard{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:linear-gradient(180deg,rgba(20,30,50,.96),rgba(8,12,20,.96));border:2px solid #ffd97a;border-radius:10px;padding:30px 50px;text-align:center;opacity:0;transition:.4s;pointer-events:none}
#draftCard.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.draftBox{display:flex;align-items:flex-start;gap:30px;font-size:14px}
.draftSide{flex:1;text-align:left}
.draftSide.B{color:#5cb8ff} .draftSide.R{color:#ff6a6a;text-align:right}
.draftSide h2{font-size:24px;letter-spacing:6px;margin-bottom:12px;font-weight:900}
.draftSide ul{list-style:none}
.draftSide li{padding:4px 0;font-size:13px;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:600}
.draftVs{font-size:36px;color:#ffd97a;font-weight:900;letter-spacing:4px;align-self:center}
#mvpCard{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:linear-gradient(180deg,rgba(20,30,50,.97),rgba(8,12,20,.97));border:2px solid #ffd97a;border-radius:12px;padding:34px 56px;text-align:center;opacity:0;transition:.5s;pointer-events:none;min-width:560px}
#mvpCard.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#mvpCard .mvpTtl{font-size:34px;letter-spacing:8px;color:#ffd97a;font-weight:900;margin-bottom:6px;text-shadow:0 0 18px rgba(255,217,122,.7)}
#mvpCard .mvpSub{font-size:14px;letter-spacing:4px;color:#ccc;margin-bottom:18px}
#mvpCard table{width:100%;border-collapse:collapse;font-size:12px;letter-spacing:1px}
#mvpCard td,#mvpCard th{padding:5px 10px;border-bottom:1px solid #2a3450}
#mvpCard th{color:#888;font-size:10px;letter-spacing:2px;text-align:left}
#mvpCard tr.B td{color:#5cb8ff} #mvpCard tr.R td{color:#ff6a6a}
#mvpCard tr.mvp td{background:rgba(255,217,122,.18);color:#ffd97a;font-weight:900}
#replayLabel{position:absolute;top:88px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(255,80,80,.92);color:#fff;font-size:14px;letter-spacing:5px;padding:6px 18px;border-radius:3px;font-weight:800;opacity:0;transition:.4s;pointer-events:none;text-align:center}
#replayLabel.show{opacity:1;transform:translateX(-50%) translateY(0)}
#replayLabel .sub{font-size:10px;letter-spacing:3px;font-weight:600;color:#ffd97a;margin-top:2px}
#minimap{position:absolute;right:14px;bottom:14px;width:200px;height:200px;border:2px solid #2a3450;border-radius:4px;background:#04060c;box-shadow:0 4px 12px rgba(0,0,0,.6)}
#footer{position:absolute;left:14px;bottom:10px;font-size:10px;letter-spacing:4px;color:#555}
</style>

<body>
<!-- ROUND11_3D_EPIC v1 -->
<div id="stage"></div>
<div id="hud">
  <div id="liveTag">LIVE<span>— SUMMONER'S RIFT</span></div>
  <div id="scoreboard">
    <div class="tm b"><span class="num" id="bKills">0</span><span class="ico">▲<span id="bTow">0</span></span><span class="ico">🐉<span id="bDrg">0</span></span><span class="ico">👁<span id="bBar">0</span></span><span class="lbl">BLUE</span></div>
    <div id="matchTimer">00:00</div>
    <div class="tm r"><span class="lbl">RED</span><span class="ico">👁<span id="rBar">0</span></span><span class="ico">🐉<span id="rDrg">0</span></span><span class="ico">▲<span id="rTow">0</span></span><span class="num" id="rKills">0</span></div>
  </div>
  <div id="blueRoster" class="rosterCol"></div>
  <div id="redRoster" class="rosterCol"></div>
  <div id="killfeed"></div>
  <div id="banner"></div>
  <div id="hpbars"></div>
  <div id="draftCard"></div>
  <div id="mvpCard"></div>
  <div id="replayLabel"></div>
  <canvas id="minimap" width="200" height="200"></canvas>
  <div id="footer">SUMMONER'S RIFT · BO1 · ROUND11_3D_EPIC</div>
</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>


'use strict';
const T=THREE;
const R=Math.random,PI=Math.PI,sin=Math.sin,cos=Math.cos,sqrt=Math.sqrt,min=Math.min,max=Math.max,abs=Math.abs,floor=Math.floor;
function rr(a,b){return a+R()*(b-a)}
function pick(a){return a[floor(R()*a.length)]}
function clamp(v,a,b){return v<a?a:v>b?b:v}
function lerp(a,b,t){return a+(b-a)*t}
function dist2(a,b){
  // Squared 2D (xz) distance between two Vector3-like objects with .x and .z.
  const dx=a.x-b.x, dz=a.z-b.z;
  return dx*dx+dz*dz;
}
function dist(a,b){return Math.sqrt(dist2(a,b))}
function v3(x,y,z){return new T.Vector3(x,y,z)}

// ===== Three.js setup =====
const scene=new T.Scene();
scene.background=new T.Color(0x05080f);
scene.fog=new T.Fog(0x05080f,90,210);
let W=innerWidth,H=innerHeight;
const cam=new T.PerspectiveCamera(46,W/H,0.5,400);
cam.position.set(0,55,55);cam.lookAt(0,0,0);
const renderer=new T.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(W,H);
renderer.setPixelRatio(min(devicePixelRatio||1,1.5));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=T.PCFSoftShadowMap;
renderer.outputColorSpace=T.SRGBColorSpace;
renderer.toneMapping=T.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
document.getElementById('stage').appendChild(renderer.domElement);
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();renderer.setSize(W,H)});

// ===== Lights =====
const sun=new T.DirectionalLight(0xfff0d0,1.05);
sun.position.set(45,75,30);
sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
const sc=sun.shadow.camera;
sc.left=-80;sc.right=80;sc.top=80;sc.bottom=-80;sc.near=10;sc.far=200;
sun.shadow.bias=-0.0006;
scene.add(sun);
scene.add(new T.AmbientLight(0x9aaccd,0.85));
scene.add(new T.HemisphereLight(0xbbd6ff,0x664422,0.7));

// ===== Constants =====
const BLUE=0,RED=1;
const TEAM_COL=[0x5da9ff,0xff6655];
const TEAM_LIGHT=[0xa8ccff,0xffaa99];
const TEAM_DARK=[0x1f3a6e,0x6a1e16];
const BLUE_BASE=v3(-50,0,50),RED_BASE=v3(50,0,-50);
const LANES={
  top:[v3(-46,0,42),v3(-46,0,15),v3(-46,0,-12),v3(-46,0,-42),v3(-15,0,-46),v3(15,0,-46),v3(42,0,-46)],
  mid:[v3(-42,0,42),v3(-22,0,22),v3(0,0,0),v3(22,0,-22),v3(42,0,-42)],
  bot:[v3(-42,0,46),v3(-15,0,46),v3(15,0,46),v3(42,0,46),v3(46,0,15),v3(46,0,-15),v3(46,0,-42)]
};

// ===== Shared geometries / materials (REUSE) =====
const G_BOX=new T.BoxGeometry(1,1,1);
const G_SPH=new T.SphereGeometry(1,12,8);
const G_CYL=new T.CylinderGeometry(1,1,1,12);
const G_CONE=new T.ConeGeometry(1,1,8);
const G_OCT=new T.OctahedronGeometry(1,0);
const G_TET=new T.TetrahedronGeometry(1,0);
const G_PLANE=new T.PlaneGeometry(1,1);
const G_RING=new T.RingGeometry(0.85,1,32);
const G_TORUS=new T.TorusGeometry(1,0.08,6,18);
function mat(c,o){const m=new T.MeshLambertMaterial({color:c});if(o)Object.assign(m,o);return m}
function matB(c,e,ei){return new T.MeshLambertMaterial({color:c,emissive:e||0,emissiveIntensity:ei||0.5})}
function matT(c,o,d){const m=new T.MeshBasicMaterial({color:c,transparent:true,opacity:o||0.7,depthWrite:false});if(d)m.side=T.DoubleSide;return m}

// ===== TERRAIN =====
const terrainGroup=new T.Group();
scene.add(terrainGroup);

// Ground (large grass plane with vertex noise)
{
  const g=new T.PlaneGeometry(140,140,40,40);
  const pos=g.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i);
    const d=sqrt(x*x+y*y);
    const n=(sin(x*0.18)*cos(y*0.18)+sin(x*0.07+y*0.05))*0.45;
    pos.setZ(i,n+sin(d*0.05)*0.3);
  }
  g.computeVertexNormals();
  const m=new T.MeshLambertMaterial({color:0x4a7a3a});
  const ground=new T.Mesh(g,m);
  ground.rotation.x=-PI/2;
  ground.receiveShadow=true;
  terrainGroup.add(ground);
}

// Lane paths (lighter dirt color overlay)
function lanePath(waypoints,width){
  const grp=new T.Group();
  for(let i=0;i<waypoints.length-1;i++){
    const a=waypoints[i],b=waypoints[i+1];
    const dx=b.x-a.x,dz=b.z-a.z;
    const len=sqrt(dx*dx+dz*dz);
    const seg=new T.Mesh(G_PLANE,new T.MeshLambertMaterial({color:0x8a7a55}));
    seg.scale.set(len+width*.5,width,1);
    seg.rotation.x=-PI/2;
    seg.position.set((a.x+b.x)/2,0.06,(a.z+b.z)/2);
    seg.rotation.z=Math.atan2(dz,dx);
    seg.receiveShadow=true;
    grp.add(seg);
    // intersection circle
    const cap=new T.Mesh(G_PLANE,new T.MeshLambertMaterial({color:0x8a7a55}));
    cap.scale.set(width,width,1);
    cap.rotation.x=-PI/2;
    cap.position.set(a.x,0.06,a.z);
    grp.add(cap);
  }
  // last cap
  const last=waypoints[waypoints.length-1];
  const cap=new T.Mesh(G_PLANE,new T.MeshLambertMaterial({color:0x8a7a55}));
  cap.scale.set(width,width,1);
  cap.rotation.x=-PI/2;
  cap.position.set(last.x,0.06,last.z);
  grp.add(cap);
  return grp;
}
terrainGroup.add(lanePath(LANES.top,7));
terrainGroup.add(lanePath(LANES.mid,7));
terrainGroup.add(lanePath(LANES.bot,7));

// River (diagonal blue plane perpendicular to mid lane)
const riverMesh=(()=>{
  const g=new T.PlaneGeometry(180,12,40,4);
  const pos=g.attributes.position;
  // store originals for animation
  const orig=new Float32Array(pos.count);
  for(let i=0;i<pos.count;i++)orig[i]=pos.getZ(i);
  const m=new T.MeshLambertMaterial({color:0x2466b8,emissive:0x113366,emissiveIntensity:0.3,transparent:true,opacity:0.85});
  const mesh=new T.Mesh(g,m);
  mesh.rotation.x=-PI/2;
  mesh.rotation.z=PI/4;
  mesh.position.y=0.12;
  mesh.receiveShadow=true;
  mesh.userData.orig=orig;
  return mesh;
})();
terrainGroup.add(riverMesh);

// ===== Bases (BLUE bottom-left, RED top-right) =====
function makeBase(team){
  const g=new T.Group();
  const pos=team===BLUE?BLUE_BASE:RED_BASE;
  const col=TEAM_COL[team],colL=TEAM_LIGHT[team],colD=TEAM_DARK[team];
  // platform
  const plat=new T.Mesh(new T.CylinderGeometry(11,12,1.2,16),mat(0x4a3a26));
  plat.position.set(pos.x,0.6,pos.z);
  plat.receiveShadow=true;plat.castShadow=true;
  g.add(plat);
  // platform rim
  const rim=new T.Mesh(new T.TorusGeometry(11,0.4,6,24),matB(col,col,0.6));
  rim.position.set(pos.x,1.1,pos.z);
  rim.rotation.x=PI/2;
  g.add(rim);
  return {group:g,pos};
}
const blueBase=makeBase(BLUE);scene.add(blueBase.group);
const redBase=makeBase(RED);scene.add(redBase.group);

// ===== TOWERS =====
const towers=[];
function makeTower(team,lane,tier,x,z){
  const g=new T.Group();
  const col=TEAM_COL[team],colD=TEAM_DARK[team];
  // base block
  const base=new T.Mesh(G_BOX,mat(0x6e6757));
  base.scale.set(3.6,1.2,3.6);
  base.position.set(0,0.6,0);
  base.castShadow=true;base.receiveShadow=true;
  g.add(base);
  // pillar
  const pillar=new T.Mesh(G_CYL,mat(0xb0a89a));
  pillar.scale.set(1.1,5.2,1.1);
  pillar.position.set(0,3.8,0);
  pillar.castShadow=true;
  g.add(pillar);
  // crystal eye top (octahedron)
  const eye=new T.Mesh(G_OCT,matB(col,col,0.85));
  eye.scale.set(1.4,1.7,1.4);
  eye.position.set(0,7.2,0);
  eye.castShadow=true;
  g.add(eye);
  // ring around eye (rotates)
  const ring=new T.Mesh(G_TORUS,matB(0xfff0bb,col,0.5));
  ring.scale.set(2.0,2.0,2.0);
  ring.position.set(0,7.2,0);
  ring.rotation.x=PI/2;
  g.add(ring);
  // tier flair
  if(tier===3){
    const cap=new T.Mesh(G_CONE,mat(0x888));
    cap.scale.set(1.4,1.6,1.4);
    cap.position.set(0,9.3,0);
    g.add(cap);
  }
  g.position.set(x,0,z);
  scene.add(g);
  const t={
    type:'tower',team,lane,tier,
    pos:v3(x,0,z),
    hp:1500+tier*300,maxHp:1500+tier*300,
    range:11,atkCD:0,atkInt:1.6,
    eye,ring,group:g,alive:true,
    target:null,beam:null,beamTimer:0,
    fellAt:-1,
    dmg:120
  };
  towers.push(t);
  return t;
}
// Tower coordinates: T1=outer(closest to mid), T3=inner(closest to base)
// BLUE base at (-50,+50), RED base at (+50,-50)
const TOWER_POS={
  BLUE:{
    top:[[-46,-12,1],[-46,12,2],[-46,34,3]],
    mid:[[-12,12,1],[-22,22,2],[-32,32,3]],
    bot:[[12,46,1],[-12,46,2],[-34,46,3]]
  },
  RED:{
    top:[[-12,-46,1],[12,-46,2],[34,-46,3]],
    mid:[[12,-12,1],[22,-22,2],[32,-32,3]],
    bot:[[46,12,1],[46,-12,2],[46,-34,3]]
  }
};

['top','mid','bot'].forEach(L=>{
  TOWER_POS.BLUE[L].forEach(p=>makeTower(BLUE,L,p[2],p[0],p[1]));
  TOWER_POS.RED[L].forEach(p=>makeTower(RED,L,p[2],p[0],p[1]));
});

// Nexus turrets (2 per base) at the corner
function makeNexusTurret(team,x,z){
  const t=makeTower(team,'nexus',4,x,z);
  t.range=13;t.dmg=150;t.maxHp=2000;t.hp=2000;
  t.lane='base';
  return t;
}
makeNexusTurret(BLUE,-44,46);
makeNexusTurret(BLUE,-46,44);
makeNexusTurret(RED,46,-44);
makeNexusTurret(RED,44,-46);

// ===== INHIBITORS =====
const inhibitors=[];
function makeInhib(team,lane,x,z){
  const g=new T.Group();
  const col=TEAM_COL[team];
  const cry=new T.Mesh(G_OCT,matB(col,col,0.7));
  cry.scale.set(1.4,3.8,1.4);
  cry.position.set(0,3.0,0);
  cry.castShadow=true;
  g.add(cry);
  const cry2=new T.Mesh(G_OCT,matB(col,col,0.5));
  cry2.scale.set(0.7,1.6,0.7);
  cry2.position.set(0,5.6,0);
  g.add(cry2);
  g.position.set(x,0,z);
  scene.add(g);
  const inh={
    type:'inhib',team,lane,
    pos:v3(x,0,z),
    hp:3500,maxHp:3500,

  let tx,tz,ok=false,tries=0;
  while(!ok && tries<20){
    tx=rr(-58,58); tz=rr(-58,58); tries++;
    // skip if too close to a lane (top: x≈-46, mid diag, bot: z≈46)
    const onTop = Math.abs(tx+46)<5 && tz>-50 && tz<46;
    const onLeftBot = tz>40 && tz<52 && tx>-50 && tx<46;
    const onRight = Math.abs(tx-46)<5 && tz<50 && tz>-46;
    const onTopEdge = Math.abs(tz+46)<5 && tx>-46 && tx<50;
    const onMidDiag = Math.abs(tx+tz)<6 && Math.abs(tx)<40;
    const inBase = (tx<-40 && tz>40) || (tx>40 && tz<-40);
    if(!onTop && !onLeftBot && !onRight && !onTopEdge && !onMidDiag && !inBase) ok=true;
  }
  if(ok){
    if(Math.random()<0.65) tree(tx,tz);
    else rock(tx,tz, rr(0.8,2.0));
  }
}

// ===== DRAFT (5v5 with role coverage) =====
const heroes=[];
function draftTeams(){
  // Reset
  heroes.forEach(h=>scene.remove(h));
  heroes.length=0;
  const ROLES=['tank','mage','adc','assassin','support'];
  const pool=[...HERO_DEFS];
  function pickRole(role){
    const cands=pool.filter(d=>d.role===role);
    if(cands.length===0) return pool.splice(rr(0,pool.length-1)|0,1)[0];
    const idx=pool.indexOf(cands[rr(0,cands.length-1)|0]);
    return pool.splice(idx,1)[0];
  }
  for(let team=0;team<2;team++){
    for(let r=0;r<5;r++){
      const def=pickRole(ROLES[r]);
      const h=makeHero(team,def);
      const ud=h.userData;
      ud.laneRole=r===0?'top':r===1?'mid':r===2?'bot':r===3?'jungle':'bot';
      // ADC bot, support bot
      if(r===2) ud.laneRole='bot';
      if(r===4) ud.laneRole='bot'; // support ducks bot
      // place at base
      const base=team===BLUE?BLUE_BASE:RED_BASE;
      ud.pos.set(base.x+rr(-3,3), 0, base.z+rr(-3,3));
      h.position.copy(ud.pos);
      heroes.push(h);
    }
  }
}

// ===== COMBAT HELPERS =====
function findNearestEnemy(pos, team, range, kinds){
  let best=null, bestD=range*range;
  // heroes
  if(!kinds || kinds.includes('hero')){
    for(const h of heroes){
      const ud=h.userData;
      if(!ud.alive || ud.team===team) continue;
      const d=dist2(pos,ud.pos);
      if(d<bestD){bestD=d;best=ud;}
    }
  }
  // minions
  if(!kinds || kinds.includes('minion')){
    for(const m of minions){
      if(!m.alive || m.team===team) continue;
      const d=dist2(pos,m.pos);
      if(d<bestD){bestD=d;best=m;}
    }
  }
  // towers
  if(!kinds || kinds.includes('tower')){
    for(const t of towers){
      if(!t.alive || t.team===team) continue;
      const d=dist2(pos,t.pos);
      if(d<bestD){bestD=d;best=t;}
    }
  }
  if(!kinds || kinds.includes('inhib')){
    for(const t of inhibitors){
      if(!t.alive || t.team===team) continue;
      const d=dist2(pos,t.pos);
      if(d<bestD){bestD=d;best=t;}
    }
  }
  if(!kinds || kinds.includes('nexus')){
    for(const n of nexuses){
      if(!n.alive || n.team===team) continue;
      const d=dist2(pos,n.pos);
      if(d<bestD){bestD=d;best=n;}
    }
  }
  if(kinds && kinds.includes('bigmon')){
    if(typeof dragon!=='undefined' && dragon.alive){
      const d=dist2(pos,dragon.pos);
      if(d<bestD){bestD=d;best=dragon;}
    }
    if(typeof baron!=='undefined' && baron.alive){
      const d=dist2(pos,baron.pos);
      if(d<bestD){bestD=d;best=baron;}
    }
  }
  return best;
}

function applyDamage(target, amt, attacker){
  if(!target.alive) return false;
  target.hp -= amt;
  if(attacker && attacker.type==='hero'){
    target.lastDmgFrom=attacker;
    target.lastDmgTime=gameTime;
  }
  if(target.hp<=0){
    target.hp=0;
    target.alive=false;
    onKill(target, attacker);
    return true;
  }
  return false;
}

// ===== LANE WAYPOINT FOLLOWER =====
// Each unit follows lane waypoints toward enemy base.
function getWaypoints(team, lane){
  const wps = LANES[lane];
  // BLUE follows in order, RED follows reversed
  return team===BLUE ? wps : wps.slice().reverse();
}
function moveAlongLane(unit, dt){
  const lane = unit.lane || unit.laneRole || 'mid';
  // Junglers detour through dragon/baron pit when alive.
  if(unit.type==='hero' && lane==='jungle'){
    let goal=null;
    if(typeof dragon!=='undefined' && dragon.alive){
      goal = dragon.pos;
    } else if(typeof baron!=='undefined' && baron.alive){
      goal = baron.pos;
    }
    if(goal){
      const dx=goal.x-unit.pos.x, dz=goal.z-unit.pos.z;
      const d=Math.hypot(dx,dz)||1;
      if(d>1.5){
        const sp=unit.speed||unit.moveSpeed||4;
        unit.pos.x+=dx/d*sp*dt;
        unit.pos.z+=dz/d*sp*dt;
        return true;
      }
      return false;
    }
  }
  const useLane = (lane==='jungle') ? 'mid' : lane;
  const wps=getWaypoints(unit.team, useLane);
  if(typeof unit.wpIdx !== 'number') unit.wpIdx = 0;
  if(unit.wpIdx>=wps.length){
    // head to enemy nexus
    const enemyNexus = nexuses.find(n=>n.team!==unit.team && n.alive);
    if(!enemyNexus) return false;
    const dx=enemyNexus.pos.x-unit.pos.x, dz=enemyNexus.pos.z-unit.pos.z;
    const d=Math.hypot(dx,dz);
    if(d<2) return false;
    const sp=unit.speed||unit.moveSpeed||4;
    unit.pos.x+=dx/d*sp*dt;
    unit.pos.z+=dz/d*sp*dt;
    return true;
  }
  const wp=wps[unit.wpIdx];
  const wpx = (wp.x!==undefined)?wp.x:wp[0];
  const wpz = (wp.z!==undefined)?wp.z:wp[1];
  const dx=wpx-unit.pos.x, dz=wpz-unit.pos.z;
  const d=Math.hypot(dx,dz);
  if(d<2.5){unit.wpIdx++; return true;}
  const sp=unit.speed||unit.moveSpeed||4;
  unit.pos.x+=dx/d*sp*dt;
  unit.pos.z+=dz/d*sp*dt;
  return true;
}
function moveTowards(unit, target, dt){
  const dx=target.pos.x-unit.pos.x, dz=target.pos.z-unit.pos.z;
  const d=Math.hypot(dx,dz)||1;
  if(d<=0.1) return 0;
  const sp=(unit.moveSpeed||unit.speed||4);
  unit.pos.x+=dx/d*sp*dt;
  unit.pos.z+=dz/d*sp*dt;
  return d;
}

// ===== KILL/EVENT HANDLER =====
let firstBlood=false;
let killStreaks={}; // playerId -> {count,resetAt}
function onKill(target, attacker){
  if(target.type==='hero'){
    target.deathT=0;
    target.respawnAt=gameTime + (8 + target.level*2);
    target.d++;
    if(attacker && attacker.type==='hero'){
      attacker.k++;
      attacker.gold += 300;
      // assist
      for(const h of heroes){
        const ud=h.userData;
        if(ud.team===attacker.team && ud!==attacker && ud.alive && dist2(ud.pos,target.pos)<400){
          ud.a++;
          ud.gold+=150;
        }
      }
      // killfeed
      pushKillfeed(attacker, target, attacker.def && attacker.def[pick(['q','w','e','r'])]);
      // first blood
      if(!firstBlood){
        firstBlood=true;
        showBanner('FIRST BLOOD','#ffaa44');
      }
      // multi-kill tracking
      const id = attacker.def.n;
      const ks = killStreaks[id] || {count:0, lastAt:-99};
      if(gameTime - ks.lastAt < 10){
        ks.count++;
        if(ks.count===2) showBanner(attacker.def.n+' DOUBLE KILL','#ff8855');
        else if(ks.count===3) showBanner(attacker.def.n+' TRIPLE KILL','#ff5544');
        else if(ks.count===4) showBanner(attacker.def.n+' QUADRA KILL','#ff3344');
        else if(ks.count>=5) showBanner(attacker.def.n+' PENTA KILL!!','#ffd700');
      }else{
        ks.count=1;
      }
      ks.lastAt=gameTime;
      killStreaks[id]=ks;
      // ACE check
      const enemyTeam = target.team;
      const aliveEnemies = heroes.filter(h=>h.userData.team===enemyTeam && h.userData.alive).length;
      if(aliveEnemies===0){
        showBanner('ACE!  '+(enemyTeam===BLUE?'RED':'BLUE')+' WIPED THE TEAM','#ffe055');
      }
      // record highlight
      addHighlight(attacker, target);
    }
  } else if(target.type==='tower'){
    showBanner((target.team===BLUE?'BLUE':'RED')+' TOWER FALLEN','#ddccff');
    if(attacker && attacker.type==='hero'){
      attacker.gold += 250;
    }
    score[1-target.team].towers++;
    target.group.visible=false;
  } else if(target.type==='inhib'){
    showBanner('INHIBITOR DESTROYED — SUPER MINIONS','#ffaa66');
    target.group.visible=false;
    target.respawnTimer = 180; // 3 game-min
    score[1-target.team].inhibs++;
  } else if(target.type==='dragon'){
    showBanner('DRAGON SLAIN','#ff8833');
    score[attacker?attacker.team:0].dragons++;
    target.group.visible=false;
    if(attacker && attacker.type==='hero'){
      // give all team gold
      for(const h of heroes){
        if(h.userData.team===attacker.team) h.userData.gold+=200;
      }
    }
  } else if(target.type==='baron'){
    showBanner('BARON SLAIN','#aa66ff');
    score[attacker?attacker.team:0].barons++;
    target.group.visible=false;
    if(attacker && attacker.type==='hero'){
      for(const h of heroes){
        if(h.userData.team===attacker.team) h.userData.gold+=300;
      }
    }
  } else if(target.type==='nexus'){
    showBanner((target.team===BLUE?'RED':'BLUE')+' VICTORY!','#ffd700');
    target.group.visible=false;
    matchWinner = target.team===BLUE?RED:BLUE;
    matchPhase='REPLAY';
    matchPhaseT=0;
  } else if(target.type==='minion'){
    if(attacker && attacker.type==='hero'){
      attacker.gold+=20; attacker.cs++;
    }
  }
}

// ===== HERO ABILITIES =====
function castAbility(h, slot){
  const ud=h.userData;
  if(!ud.alive) return;
  const target = ud.target;
  if(!target) return;
  ud.castT=0.5;
  emitBurst(ud.pos, TEAM_COL[ud.team], 6, 1.4);
  if(slot==='q'){
    // Skillshot projectile
    fireProjectile(ud.pos, target.pos, {
      dmg: 60+ud.level*10, color:TEAM_COL[ud.team], fromTeam:ud.team,
      targetEnt: target, by:ud, kind:'skillshot', speed:18, life:1.6, radius:0.5
    });
    ud.cdQ = 5;
  } else if(slot==='w'){
    // AoE ring at target pos
    const r=4.5;
    for(const en of [...heroes.map(h=>h.userData),...minions]){
      if(!en.alive || en.team===ud.team) continue;
      if(dist2(en.pos,target.pos)<r*r) applyDamage(en, 50+ud.level*8, ud);
    }
    emitBurst(target.pos, TEAM_COL[ud.team], 12, 3);
    ud.cdW = 9;
  } else if(slot==='e'){
    // Dash toward target
    const dx=target.pos.x-ud.pos.x, dz=target.pos.z-ud.pos.z;
    const d=Math.hypot(dx,dz)||1, dashD=Math.min(d-1,6);
    ud.pos.x += dx/d*dashD;
    ud.pos.z += dz/d*dashD;
    h.position.copy(ud.pos);
    emitBurst(ud.pos, TEAM_COL[ud.team], 10, 2);
    if(d<8) applyDamage(target, 35+ud.level*6, ud);
    ud.cdE = 11;
  } else if(slot==='r'){
    // Per-role ULT
    if(ud.def.role==='tank'){
      // Shockwave
      for(const en of [...heroes.map(h=>h.userData),...minions]){
        if(!en.alive || en.team===ud.team) continue;
        if(dist2(en.pos,ud.pos)<64) applyDamage(en, 100+ud.level*15, ud);
      }
      emitBurst(ud.pos, 0xffaa66, 30, 5);
    } else if(ud.def.role==='adc'){
      // Piercing beam toward target
      const dx=target.pos.x-ud.pos.x, dz=target.pos.z-ud.pos.z;
      const d=Math.hypot(dx,dz)||1;
      for(let s=2;s<20;s+=1.5){
        const px=ud.pos.x+dx/d*s, pz=ud.pos.z+dz/d*s;
        emitBurst(v3(px,0,pz), 0xffeeaa, 2, 0.6);
        for(const en of [...heroes.map(h=>h.userData),...minions]){
          if(!en.alive || en.team===ud.team) continue;
          if(dist2(en.pos,v3(px,0,pz))<4) applyDamage(en, 30+ud.level*8, ud);
        }
      }
    } else if(ud.def.role==='mage'){
      // Meteor at target
      emitBurst(target.pos, 0xff5522, 40, 6);
      for(const en of [...heroes.map(h=>h.userData),...minions]){
        if(!en.alive || en.team===ud.team) continue;
        if(dist2(en.pos,target.pos)<36) applyDamage(en, 200+ud.level*20, ud);
      }
    } else if(ud.def.role==='assassin'){
      // Execute / dash
      const dx=target.pos.x-ud.pos.x, dz=target.pos.z-ud.pos.z;
      const d=Math.hypot(dx,dz)||1;
      ud.pos.x = target.pos.x - dx/d*1.5;
      ud.pos.z = target.pos.z - dz/d*1.5;
      h.position.copy(ud.pos);
      applyDamage(target, 250+ud.level*22, ud);
      emitBurst(target.pos, 0xff2266, 25, 3);
    } else { // support
      // Heal nova
      for(const a of heroes){
        const aud=a.userData;
        if(aud.team===ud.team && aud.alive && dist2(aud.pos,ud.pos)<144){
          aud.hp = Math.min(aud.maxHp, aud.hp + 200 + ud.level*15);
        }
      }
      emitBurst(ud.pos, 0x88ffaa, 40, 5);
    }
    ud.cdR = 60;
  }
}

// ===== HERO AI / UPDATE =====
function updateHeroes(dt){
  for(const h of heroes){
    const ud=h.userData;
    // Respawn
    if(!ud.alive){
      if(gameTime >= ud.respawnAt){
        ud.alive=true;
        ud.hp=ud.maxHp; ud.mp=ud.maxMp;
        const base=ud.team===BLUE?BLUE_BASE:RED_BASE;
        ud.pos.set(base.x+rr(-3,3),0,base.z+rr(-3,3));
        h.position.copy(ud.pos);
        ud.deathT=0;
        ud.target=null;
        ud.objective=null;
        ud.wpIdx = ud.team===BLUE ? 0 : 0; // restart from base
        h.visible=true;
        h.rotation.set(0,0,0);
        // reset opacity
        h.traverse(o=>{if(o.material && o.material.opacity!==undefined){o.material.opacity=1;o.material.transparent=false;}});
      } else {
        ud.deathT += dt;
        // Tip over
        h.rotation.x = Math.min(PI/2, ud.deathT*1.2);
        // fade
        const o = Math.max(0, 1 - ud.deathT/2);
        h.traverse(o2=>{if(o2.material && 'opacity' in o2.material){o2.material.transparent=true;o2.material.opacity=o;}});
        if(ud.deathT>2) h.visible=false;
        continue;
      }
    }
    // HP regen
    if(ud.hp < ud.maxHp){ ud.hp = Math.min(ud.maxHp, ud.hp + 8*dt); }
    if(ud.mp < ud.maxMp){ ud.mp = Math.min(ud.maxMp, ud.mp + 5*dt); }
    // Cooldowns
    ud.cdQ = Math.max(0,ud.cdQ-dt);
    ud.cdW = Math.max(0,ud.cdW-dt);
    ud.cdE = Math.max(0,ud.cdE-dt);
    ud.cdR = Math.max(0,ud.cdR-dt);
    ud.atkCD = Math.max(0,ud.atkCD-dt);
    ud.castT = Math.max(0,ud.castT-dt);
    // Recall if low HP
    if(ud.hp < ud.maxHp*0.25 && ud.recallT<=0){
      ud.recallT = 4;
      ud.objective = 'recall';
    }
    if(ud.recallT>0){
      ud.recallT -= dt;
      if(ud.recallT<=0){
        const base=ud.team===BLUE?BLUE_BASE:RED_BASE;
        ud.pos.set(base.x+rr(-2,2),0,base.z+rr(-2,2));
        ud.hp = ud.maxHp; ud.mp = ud.maxMp;
        ud.objective = null;
        ud.wpIdx = 0;
      } else {
        // standing, no other action
        h.position.copy(ud.pos);
        continue;
      }
    }
    // Pick target — heroes preferred close, structures further
    const enemyHero = findNearestEnemy(ud.pos, ud.team, 14, ['hero']);
    const enemyMin = findNearestEnemy(ud.pos, ud.team, 11, ['minion']);
    const enemyTow = findNearestEnemy(ud.pos, ud.team, 16, ['tower','inhib','nexus']);
    const bigMon = (ud.laneRole==='jungle') ? findNearestEnemy(ud.pos, ud.team, 14, ['bigmon']) : null;
    ud.target = enemyHero || bigMon || enemyMin || enemyTow;
    // Move along lane if no target in attack range
    let attacked=false;
    if(ud.target){
      const d2 = dist2(ud.pos, ud.target.pos);
      const isRanged = ud.def.role==='adc' || ud.def.role==='mage';
      const range = isRanged ? 8 : 4;
      if(d2 < range*range){
        // attack
        if(ud.atkCD<=0){
          const dmg = 30 + ud.level*6 + (ud.def.role==='adc'?20:0);
          if(isRanged){
            fireProjectile(ud.pos, ud.target.pos, {
              dmg, color:TEAM_COL[ud.team], fromTeam:ud.team,
              targetEnt: ud.target, by:ud, kind:'basic', speed:20, life:1.2, radius:0.3
            });
          } else {
            applyDamage(ud.target, dmg, ud);
            emitBurst(ud.target.pos, TEAM_COL[ud.team], 3, 0.6);
          }
          ud.atkCD = 0.65;
          ud.castT = 0.3;
          attacked=true;
        }
        ud.facing = Math.atan2(ud.target.pos.x-ud.pos.x, ud.target.pos.z-ud.pos.z);
        if(ud.target.type==='hero' || ud.target.type==='tower' || ud.target.type==='nexus' || ud.target.type==='inhib'){
          if(ud.cdR<=0 && ud.target.type==='hero' && ud.target.hp < ud.target.maxHp*0.5){ castAbility(h,'r'); }
          else if(ud.cdQ<=0 && d2<60) castAbility(h,'q');
          else if(ud.cdW<=0 && d2<35) castAbility(h,'w');
          else if(ud.cdE<=0 && d2<40 && d2>9) castAbility(h,'e');
        }
      } else if(d2 < 144){
        moveTowards(ud, ud.target, dt);
      } else {
        moveAlongLane(ud, dt);
      }
    } else {
      moveAlongLane(ud, dt);
    }
    h.position.copy(ud.pos);
    // Walk anim
    if(!attacked){
      ud.walkPhase += dt*8;
      const s=Math.sin(ud.walkPhase)*0.5;
      ud.legL.rotation.x = s;
      ud.legR.rotation.x = -s;
      ud.armL.rotation.x = -s*0.5;
      ud.armR.rotation.x = s*0.5;
    }
    // Cast anim — raise arms
    if(ud.castT>0){
      ud.armL.rotation.x = -1.3;
      ud.armR.rotation.x = -1.3;
    }
    // Bob
    h.position.y = Math.sin(ud.walkPhase*0.5)*0.04;
    // Face target dir
    h.rotation.y = ud.facing;
    // Level up by xp
    ud.xp += dt*1.5;
    const newLvl = Math.min(18, 1 + Math.floor(ud.xp/30));
    if(newLvl > ud.level){
      ud.level = newLvl;
      ud.maxHp = 600 + (ud.level-1)*45;
      ud.hp = Math.min(ud.maxHp, ud.hp+50);
    }
  }
}

// ===== TOWER UPDATE =====
function updateTowers(dt){
  for(const t of towers){
    if(!t.alive) continue;
    // rotate eye/ring
    t.eye.rotation.y += dt*0.8;
    t.ring.rotation.z += dt*1.2;
    t.atkCD = Math.max(0, t.atkCD-dt);
    // pick target — minions first, then hero (only if in range AND took dmg or no minions nearby)
    let tgt = null;
    let bestD = t.range*t.range;
    for(const m of minions){
      if(!m.alive || m.team===t.team) continue;
      const d=dist2(t.pos,m.pos);
      if(d<bestD){bestD=d;tgt=m;}
    }
    if(!tgt){
      for(const h of heroes){
        const ud=h.userData;
        if(!ud.alive || ud.team===t.team) continue;
        const d=dist2(t.pos,ud.pos);
        if(d<bestD){bestD=d;tgt=ud;}
      }
    }
    t.target=tgt;
    if(tgt && t.atkCD<=0){
      applyDamage(tgt, t.dmg, null);
      emitBurst(tgt.pos, TEAM_COL[t.team], 4, 0.8);
      t.atkCD = t.atkInt;
      t.beamTimer = 0.15;
      // visualize beam: temp position eye->target
    }
    if(t.beamTimer>0) t.beamTimer-=dt;
  }
}

// ===== INHIBITOR UPDATE =====
function updateInhibs(dt){
  for(const inh of inhibitors){
    if(!inh.alive){
      inh.respawnTimer -= dt*TIME_SCALE;
      if(inh.respawnTimer<=0){
        inh.alive=true; inh.hp=inh.maxHp;
        inh.group.visible=true;
      }
    }
  }
}

// ===== MINION UPDATE =====
function updateMinions(dt){
  for(let i=minions.length-1;i>=0;i--){
    const m=minions[i];
    if(!m.alive){ minions.splice(i,1); continue; }
    m.atkCD = Math.max(0,m.atkCD-dt);
    // find target in range
    if(!m.target || !m.target.alive || dist2(m.pos,m.target.pos) > m.atkRange*m.atkRange*4){
      m.target = findNearestEnemy(m.pos, m.team, m.atkRange*2.5, ['minion','hero','tower','inhib','nexus']);
    }
    if(m.target && dist2(m.pos,m.target.pos) <= m.atkRange*m.atkRange){
      // attack
      if(m.atkCD<=0){
        if(m.type==='caster'){
          fireProjectile(m.pos, m.target.pos, {
            dmg:m.atk, color:TEAM_COL[m.team], fromTeam:m.team,
            targetEnt:m.target, kind:'basic', speed:15, life:1.5, radius:0.4
          });
        } else {
          applyDamage(m.target, m.atk, null);
        }
        m.atkCD = m.atkInt;
      }
    } else if(m.target && dist2(m.pos,m.target.pos) <= 25){
      // chase
      const dx=m.target.pos.x-m.pos.x, dz=m.target.pos.z-m.pos.z;
      const d=Math.hypot(dx,dz)||1;
      m.pos.x += dx/d*m.speed*dt;
      m.pos.z += dz/d*m.speed*dt;
    } else {
      moveAlongLane(m, dt);
    }
  }
  // Render via instanced meshes
  let melC=0, casC=0;
  const colArrM = minionMeshMelee.instanceColor.array;
  const colArrC = minionMeshCaster.instanceColor.array;
  for(const m of minions){
    if(!m.alive) continue;
    _dummy.position.set(m.pos.x, m.type==='melee'?0.7:1.0, m.pos.z);
    _dummy.scale.setScalar(m.scale*1.4);
    _dummy.rotation.y=0;
    _dummy.updateMatrix();
    if(m.type==='melee'){
      if(melC<MINION_MAX){
        minionMeshMelee.setMatrixAt(melC,_dummy.matrix);
        const c=TEAM_COL[m.team]; const r=((c>>16)&0xff)/255, g=((c>>8)&0xff)/255, b=(c&0xff)/255;
        colArrM[melC*3]=r; colArrM[melC*3+1]=g; colArrM[melC*3+2]=b;
        melC++;
      }
    } else {
      if(casC<MINION_MAX){
        minionMeshCaster.setMatrixAt(casC,_dummy.matrix);
        const c=TEAM_COL[m.team]; const r=((c>>16)&0xff)/255, g=((c>>8)&0xff)/255, b=(c&0xff)/255;
        colArrC[casC*3]=r; colArrC[casC*3+1]=g; colArrC[casC*3+2]=b;
        casC++;
      }
    }
  }
  minionMeshMelee.count=melC;
  minionMeshCaster.count=casC;
  minionMeshMelee.instanceMatrix.needsUpdate=true;
  minionMeshCaster.instanceMatrix.needsUpdate=true;
  minionMeshMelee.instanceColor.needsUpdate=true;
  minionMeshCaster.instanceColor.needsUpdate=true;
}

// ===== PROJECTILE UPDATE =====
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.life -= dt;
    if(p.life<=0){projectiles.splice(i,1);continue;}
    // home toward target
    if(p.targetEnt && p.targetEnt.alive){
      const dx=p.targetEnt.pos.x-p.pos.x, dz=p.targetEnt.pos.z-p.pos.z;
      const d=Math.hypot(dx,dz)||1;
      const sp=Math.hypot(p.vel.x,p.vel.z);
      p.vel.x = dx/d*sp;
      p.vel.z = dz/d*sp;
    }
    p.pos.x += p.vel.x*dt;
    p.pos.z += p.vel.z*dt;
    // collision check
    const range=p.radius+0.7;
    let hitTarget=null;
    if(p.targetEnt && p.targetEnt.alive && dist2(p.pos,p.targetEnt.pos)<range*range){
      hitTarget=p.targetEnt;
    } else {
      // proximity to enemy hero
      for(const h of heroes){
        const ud=h.userData;
        if(!ud.alive || ud.team===p.fromTeam) continue;
        if(dist2(p.pos,ud.pos)<range*range){hitTarget=ud;break;}
      }
    }
    if(hitTarget){
      applyDamage(hitTarget, p.dmg, p.by);
      emitBurst(hitTarget.pos, p.color, 5, 1);
      projectiles.splice(i,1);
    }
  }
  let pC=0;
  const colArr = projMeshA.instanceColor.array;
  for(const p of projectiles){
    if(pC>=PROJ_MAX) break;
    _dummy.position.set(p.pos.x,p.pos.y,p.pos.z);
    _dummy.scale.setScalar(p.radius*1.5);
    _dummy.rotation.set(0,0,0);
    _dummy.updateMatrix();
    projMeshA.setMatrixAt(pC,_dummy.matrix);
    const c=p.color; const r=((c>>16)&0xff)/255, g=((c>>8)&0xff)/255, b=(c&0xff)/255;
    colArr[pC*3]=r; colArr[pC*3+1]=g; colArr[pC*3+2]=b;
    pC++;
  }
  projMeshA.count=pC;
  projMeshA.instanceMatrix.needsUpdate=true;
  projMeshA.instanceColor.needsUpdate=true;
}

// ===== PARTICLE UPDATE =====
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.age += dt;
    if(p.age>=p.life){particles.splice(i,1);continue;}
    p.pos.x += p.vel.x*dt;
    p.pos.y += p.vel.y*dt;
    p.pos.z += p.vel.z*dt;
    p.vel.y -= 8*dt;
  }
  let pc=0;
  const colArr=partMesh.instanceColor.array;
  for(const p of particles){
    if(pc>=PART_MAX) break;
    _dummy.position.set(p.pos.x,p.pos.y,p.pos.z);
    const sc=p.scale*(1-p.age/p.life);
    _dummy.scale.setScalar(sc);
    _dummy.rotation.set(0,0,0);
    _dummy.updateMatrix();
    partMesh.setMatrixAt(pc,_dummy.matrix);
    const c=p.color; const r=((c>>16)&0xff)/255, g=((c>>8)&0xff)/255, b=(c&0xff)/255;
    colArr[pc*3]=r; colArr[pc*3+1]=g; colArr[pc*3+2]=b;
    pc++;
  }
  partMesh.count=pc;
  partMesh.instanceMatrix.needsUpdate=true;
  partMesh.instanceColor.needsUpdate=true;
}

// ===== DRAGON / BARON UPDATE =====
function updateBigMonsters(dt){
  if(dragon.alive){
    dragon.group.rotation.y += dt*0.3;
    if(dragon.wingL){
      dragon.wingL.rotation.x = Math.sin(gameTime*4)*0.5;
      dragon.wingR.rotation.x = -Math.sin(gameTime*4)*0.5;
    }
    // dmg from heroes nearby
    for(const h of heroes){
      const ud=h.userData;
      if(ud.alive && dist2(ud.pos,dragon.pos)<25){
        if(ud.atkCD<=0.05){
          applyDamage(dragon, 30, ud);
        }
      }
    }
  }
  if(baron.alive){
    baron.group.rotation.y += dt*0.2;
    baron.segs.forEach((s,i)=>{
      s.position.y = 1.5 + Math.sin(gameTime*2+i*0.5)*0.5;
    });
    for(const h of heroes){
      const ud=h.userData;
      if(ud.alive && dist2(ud.pos,baron.pos)<25){
        if(ud.atkCD<=0.05){
          applyDamage(baron, 25, ud);
        }
      }
    }
  }
}

// ===== DIRECTOR CAMERA =====
const _camV = new T.Vector3();
const _camL = new T.Vector3();
const camState = {
  pos: new T.Vector3(0, 70, 80),
  look: new T.Vector3(0, 0, 0),
  tgtPos: new T.Vector3(0, 70, 80),
  tgtLook: new T.Vector3(0, 0, 0),
  mode: 'overview',
  lastCut: 0,
  cutInterval: 6.5
};

function pickShot(){
  const now = gameTime;
  if(matchPhase==='REPLAY' || matchPhase==='MVP' || matchPhase==='INTRO'){
    return; // handled separately
  }
  // 1. Find teamfight cluster
  const aliveHeroes = heroes.filter(h=>h.userData.alive).map(h=>h.userData);
  let bestCluster=null, bestCount=0;
  for(const a of aliveHeroes){
    let count=0; let cx=0, cz=0;
    for(const b of aliveHeroes){
      if(dist2(a.pos,b.pos) < 200){
        count++; cx+=b.pos.x; cz+=b.pos.z;
      }
    }
    if(count>=4 && count>bestCount){
      bestCount=count;
      bestCluster={x:cx/count, z:cz/count, count};
    }
  }
  if(bestCluster){
    camState.tgtLook.set(bestCluster.x, 1, bestCluster.z);
    camState.tgtPos.set(bestCluster.x+12, 22, bestCluster.z+18);
    camState.mode='fight';
    return;
  }
  // 2. Objective contested?
  if(dragon.alive && dragon.hp < dragon.maxHp*0.95){
    let near=0;
    for(const h of aliveHeroes) if(dist2(h.pos,dragon.pos)<400) near++;
    if(near>=2){
      camState.tgtLook.set(20,1,28);
      camState.tgtPos.set(28,18,40);
      camState.mode='dragon';
      return;
    }
  }
  if(baron.alive && baron.hp < baron.maxHp*0.95){
    let near=0;
    for(const h of aliveHeroes) if(dist2(h.pos,baron.pos)<400) near++;
    if(near>=2){
      camState.tgtLook.set(-20,1,-28);
      camState.tgtPos.set(-28,18,-40);
      camState.mode='baron';
      return;
    }
  }
  // 3. Tower attacked?
  for(const t of towers){
    if(t.alive && t.hp<t.maxHp*0.85){
      camState.tgtLook.set(t.pos.x,2,t.pos.z);
      camState.tgtPos.set(t.pos.x+10, 16, t.pos.z+14);
      camState.mode='tower';
      return;
    }
  }
  // 4. Lead hero
  let lead=null, leadK=-1;
  for(const a of aliveHeroes){
    if(a.k>leadK){leadK=a.k; lead=a;}
  }
  if(lead){
    camState.tgtLook.set(lead.pos.x,1,lead.pos.z);
    camState.tgtPos.set(lead.pos.x+10, 14, lead.pos.z+12);
    camState.mode='leader';
    return;
  }
  // overview
  camState.tgtLook.set(0,0,0);
  camState.tgtPos.set(0,70,80);
  camState.mode='overview';
}

function updateCamera(dt){
  if(matchPhase==='REPLAY'){
    // cycle through highlights
    const idx = Math.floor(matchPhaseT/4) % Math.max(1,highlights.length);
    const hl = highlights[idx];
    if(hl){
      camState.tgtLook.set(hl.pos.x,1,hl.pos.z);
      camState.tgtPos.set(hl.pos.x+8+Math.sin(gameTime*0.6)*4, 12, hl.pos.z+10+Math.cos(gameTime*0.6)*4);
    }
  } else if(matchPhase==='MVP'){
    // slow orbit on MVP hero
    if(mvpHero){
      const ang = gameTime*0.4;
      camState.tgtLook.copy(mvpHero.pos);
      camState.tgtPos.set(mvpHero.pos.x+Math.cos(ang)*8, 6, mvpHero.pos.z+Math.sin(ang)*8);
    }
  } else if(matchPhase==='INTRO'){
    const ang = gameTime*0.3;
    camState.tgtLook.set(0,0,0);
    camState.tgtPos.set(Math.cos(ang)*70, 50, Math.sin(ang)*70);
  } else {
    if(gameTime - camState.lastCut > camState.cutInterval){
      pickShot();
      camState.lastCut = gameTime;
      camState.cutInterval = rr(5.5, 8.5);
    }
  }
  // Smooth lerp
  const f = Math.min(1, dt*1.6);
  camState.pos.lerp(camState.tgtPos, f);
  camState.look.lerp(camState.tgtLook, f);
  // breathing
  const bx=Math.sin(gameTime*0.7)*0.3, by=Math.cos(gameTime*0.5)*0.2;
  cam.position.set(camState.pos.x+bx, camState.pos.y+by, camState.pos.z);
  cam.lookAt(camState.look);
}

// MINIMAP
function updateMinimap(){
  const W=200, H=200;
  mctx.clearRect(0,0,W,H);
  // background terrain hint
  const gd = mctx.createLinearGradient(0,0,W,H);
  gd.addColorStop(0,'rgba(60,80,40,.5)');
  gd.addColorStop(1,'rgba(40,55,30,.5)');
  mctx.fillStyle=gd;
  mctx.fillRect(0,0,W,H);
  // river diag
  mctx.strokeStyle='#5a8cff';
  mctx.lineWidth=10;
  mctx.beginPath(); mctx.moveTo(15,W-15); mctx.lineTo(W-15,15); mctx.stroke();
  // lanes
  mctx.strokeStyle='rgba(190,160,80,.65)'; mctx.lineWidth=4;
  function mx(wx){return ((wx+60)/120)*W;}
  function mz(wz){return ((wz+60)/120)*H;}
  mctx.beginPath();
  for(const lane of ['top','mid','bot']){
    const wps=LANES[lane];
    mctx.moveTo(mx(wps[0][0]), mz(wps[0][1]));
    for(const wp of wps) mctx.lineTo(mx(wp[0]), mz(wp[1]));
  }
  mctx.stroke();
  // bases
  mctx.fillStyle='#3a78d6'; mctx.beginPath(); mctx.arc(mx(-50),mz(50),9,0,PI*2); mctx.fill();
  mctx.fillStyle='#d63a3a'; mctx.beginPath(); mctx.arc(mx(50),mz(-50),9,0,PI*2); mctx.fill();
  // towers
  for(const t of towers){
    if(!t.alive) continue;
    mctx.fillStyle = t.team===BLUE?'#5da9ff':'#ff6655';
    mctx.fillRect(mx(t.pos.x)-2, mz(t.pos.z)-2, 4, 4);
  }
  // dragon/baron
  if(dragon.alive){mctx.fillStyle='#ff8833';mctx.beginPath();mctx.arc(mx(20),mz(28),4,0,PI*2);mctx.fill();}
  if(baron.alive){mctx.fillStyle='#aa66ff';mctx.beginPath();mctx.arc(mx(-20),mz(-28),4,0,PI*2);mctx.fill();}
  // minions
  for(const m of minions){
    mctx.fillStyle=m.team===BLUE?'rgba(140,200,255,.7)':'rgba(255,140,120,.7)';
    mctx.fillRect(mx(m.pos.x)-1, mz(m.pos.z)-1, 2, 2);
  }
  // heroes
  for(const h of heroes){
    const ud=h.userData;
    if(!ud.alive) continue;
    mctx.fillStyle = ud.team===BLUE?'#aaddff':'#ffaa99';
    mctx.strokeStyle='#fff'; mctx.lineWidth=1;
    mctx.beginPath(); mctx.arc(mx(ud.pos.x),mz(ud.pos.z), 4, 0, PI*2); mctx.fill(); mctx.stroke();
  }
}

let waveTimer = 0;
function startMatch(){
  matchPhase='INTRO';
  matchPhaseT=0;
  gameTime=0;
  firstBlood=false;
  killStreaks={};
  killfeed.length=0;
  highlights.length=0;
  matchWinner=null;
  mvpHero=null;
  for(let i=0;i<2;i++){
    score[i].kills=0;score[i].towers=0;score[i].dragons=0;
    score[i].barons=0;score[i].inhibs=0;score[i].gold=0;
  }
  // Reset towers & inhibs & nexuses & dragon & baron
  for(const t of towers){
    t.alive=true; t.hp=t.maxHp; t.group.visible=true;
  }
  for(const inh of inhibitors){
    inh.alive=true; inh.hp=inh.maxHp; inh.group.visible=true; inh.respawnTimer=0;
  }
  for(const n of nexuses){
    n.alive=true; n.hp=n.maxHp; n.group.visible=true;
  }
  dragon.alive=true; dragon.hp=dragon.maxHp; dragon.group.visible=true;
  baron.alive=true; baron.hp=baron.maxHp; baron.group.visible=true;
  // Clear minions/projectiles/particles
  minions.length=0;
  projectiles.length=0;
  particles.length=0;
  // Draft
  draftTeams();
  buildRoster();
  // intro draft card
  elDraftCard.classList.add('show');
  elDraftCard.innerHTML = '<div class="draftBox"><div class="draftSide B"><h2>BLUE</h2><ul>'+
    heroes.filter(h=>h.userData.team===BLUE).map(h=>'<li>'+h.userData.def.i+'. '+h.userData.def.n+' · '+h.userData.def.role.toUpperCase()+'</li>').join('')+
    '</ul></div><div class="draftVs">VS</div><div class="draftSide R"><h2>RED</h2><ul>'+
    heroes.filter(h=>h.userData.team===RED).map(h=>'<li>'+h.userData.def.i+'. '+h.userData.def.n+' · '+h.userData.def.role.toUpperCase()+'</li>').join('')+
    '</ul></div></div>';
}

function endMatchToReplay(){
  matchPhase='REPLAY';
  matchPhaseT=0;
  showBanner((matchWinner===BLUE?'BLUE':'RED')+' VICTORY','#ffd700');
}
function endReplayToMVP(){
  matchPhase='MVP';
  matchPhaseT=0;
  // Pick MVP — highest k+a, lowest d
  let best=null, bestScore=-1;
  for(const h of heroes){
    const ud=h.userData;
    if(matchWinner!==null && ud.team!==matchWinner) continue;
    const s = ud.k*3 + ud.a*1 - ud.d*0.5 + ud.cs*0.05;
    if(s>bestScore){bestScore=s;best=ud;}
  }
  mvpHero = best || heroes[0].userData;
  // Build MVP card with full team table
  const all = heroes.map(h=>h.userData);
  const sorted = all.slice().sort((a,b)=>(b.k*3+b.a-b.d*0.5)-(a.k*3+a.a-a.d*0.5));
  const rows = sorted.map(ud=>`<tr class="${ud.team===BLUE?'B':'R'} ${ud===mvpHero?'mvp':''}">
    <td>${ud.def.i}. ${ud.def.n}</td>
    <td>${ud.def.role}</td>
    <td>${ud.k}/${ud.d}/${ud.a}</td>
    <td>${ud.cs}</td>
    <td>${(ud.gold/1000).toFixed(1)}k</td>
    <td>${ud.level}</td>
  </tr>`).join('');
  elMvpCard.classList.add('show');
  elMvpCard.innerHTML = `
    <div class="mvpTtl">PLAYER OF THE GAME</div>
    <div class="mvpSub">${mvpHero.def.i}. ${mvpHero.def.n} · ${mvpHero.def.role.toUpperCase()} · ${matchWinner===BLUE?'BLUE':'RED'} VICTORY</div>
    <table>
      <tr><th>HERO</th><th>ROLE</th><th>K/D/A</th><th>CS</th><th>GOLD</th><th>LVL</th></tr>
      ${rows}
    </table>`;
}

function tickWaves(dt){
  waveTimer -= dt*TIME_SCALE;
  if(waveTimer<=0){
    spawnMinionWave(BLUE);
    spawnMinionWave(RED);
    waveTimer = 30; // 30 game-sec per wave
  }
}

// ===== ANIMATE RIVER VERTICES =====
function animateRiver(){
  if(!riverMesh) return;
  const pos = riverMesh.geometry.attributes.position;
  const orig = riverMesh.userData.orig;
  for(let i=0;i<pos.count;i++){
    const ox = pos.getX(i), oy=pos.getY(i);
    pos.setZ(i, orig[i] + Math.sin(gameTime*1.4 + ox*0.3)*0.18 + Math.cos(gameTime*1.1+oy*0.4)*0.12);
  }
  pos.needsUpdate=true;
}

// ===== MAIN LOOP =====
let lastT = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dtReal = (now-lastT)/1000;
  lastT = now;
  if(dtReal>0.1) dtReal=0.1;
  const dt = dtReal * TIME_SCALE;

  if(matchPhase==='INTRO'){
    matchPhaseT += dtReal;
    gameTime += dtReal*0.5;
    if(matchPhaseT>3){
      matchPhase='LANING';
      elDraftCard.classList.remove('show');
      gameTime=0;
      // initial wave
      spawnMinionWave(BLUE); spawnMinionWave(RED);
      waveTimer=30;
    }
  } else if(matchPhase==='REPLAY'){
    matchPhaseT += dtReal;
    elReplayLabel.classList.add('show');
    const idx = Math.floor(matchPhaseT/4) % Math.max(1,highlights.length);
    const hl = highlights[idx];
    elReplayLabel.innerHTML = 'PLAY OF THE GAME<div class="sub">'+(hl?hl.text:'FINAL BLOW')+'</div>';
    if(matchPhaseT>12){
      elReplayLabel.classList.remove('show');
      endReplayToMVP();
    }
  } else if(matchPhase==='MVP'){
    matchPhaseT += dtReal;
    if(matchPhaseT>8){
      elMvpCard.classList.remove('show');
      matchNumber++;
      startMatch();
    }
  } else {
    // Active gameplay
    gameTime += dt;
    if(gameTime>240 && matchPhase==='LANING') matchPhase='MIDGAME';
    if(gameTime>600 && matchPhase==='MIDGAME') matchPhase='LATEGAME';
    if(gameTime>900){ // hard cap 15 game-min
      // win by towers
      matchWinner = score[BLUE].towers >= score[RED].towers ? BLUE : RED;
      endMatchToReplay();
    }
    tickWaves(dtReal);
    updateHeroes(dt);
    updateMinions(dt);
    updateProjectiles(dt);
    updateTowers(dt);
    updateInhibs(dtReal);
    updateBigMonsters(dt);
  }
  updateParticles(dtReal);
  updateCamera(dtReal);
  animateRiver();
  updateScoreboard();
  updateKillfeed(dtReal);
  updateBanner(dtReal);
  updateRoster();
  updateHpBars();
  updateMinimap();
  renderer.render(scene, cam);
}

// Boot
startMatch();
window.heroes = heroes;
window.towers = towers;
window.score = score;
window.matchPhase = matchPhase;
Object.defineProperty(window,'gameTime',{get:()=>gameTime});
Object.defineProperty(window,'matchPhaseG',{get:()=>matchPhase});
requestAnimationFrame(loop);


</script>
</body>
</html>
