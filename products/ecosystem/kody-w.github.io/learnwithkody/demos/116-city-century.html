<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif}
#stage{position:fixed;inset:0;z-index:1}

.ov{position:fixed;pointer-events:none;z-index:10}
#logo{top:14px;left:18px;display:flex;align-items:center;gap:10px}

#logo .dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1s infinite}

#yearbox{top:14px;left:50%;transform:translateX(-50%);text-align:center}
#yearbox .yr{background:rgba(8,12,22,.78);border:2px solid #d4a84a;padding:6px 22px;font-weight:900;font-size:38px;letter-spacing:5px;color:#fff;text-shadow:0 2px 6px #000;font-family:'Georgia','Times New Roman',serif}
#yearbox .era{margin-top:4px;background:linear-gradient(90deg,#0a2236,#1d4d76);padding:4px 12px;font-size:11px;letter-spacing:3px;color:#d4a84a;font-weight:700}

#mayorBox{top:80px;left:18px;background:rgba(8,12,22,.82);border-left:3px solid #d4a84a;padding:8px 12px;max-width:300px;display:flex;gap:10px;align-items:center}
#mayorBox .pic{width:54px;height:54px;border-radius:50%;border:2px solid #d4a84a;flex-shrink:0;background:#222;overflow:hidden;position:relative}
#mayorBox .pic canvas{width:100%;height:100%;display:block}
#mayorBox .info{flex:1}
#mayorBox .lab{font-size:9px;color:#d4a84a;letter-spacing:2px;font-weight:700}
#mayorBox .nm{font-size:14px;font-weight:800;color:#fff;line-height:1.15;margin-top:1px}
#mayorBox .term{font-size:10px;color:#aac;margin-top:2px}

#camBadge{top:80px;right:18px;background:rgba(0,0,0,.7);border:1px solid #d4a84a;padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#5fc;letter-spacing:1.5px;font-weight:700}

#stats{top:160px;right:18px;background:rgba(8,12,22,.78);border:1px solid #444;border-left:3px solid #d4a84a;padding:8px 12px;width:200px;font-size:11px}
#stats .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px dashed #335}
#stats .row:last-child{border-bottom:0}
#stats .lbl{color:#d4a84a;letter-spacing:1.5px;font-weight:700;font-size:10px}
#stats .val{color:#fff;font-weight:800;font-family:'Courier New',monospace}

#popBox{top:160px;left:18px;background:rgba(8,12,22,.78);border-left:3px solid #d4a84a;padding:8px 12px;width:200px}
#popBox .lbl{font-size:10px;color:#d4a84a;letter-spacing:2px;font-weight:700}
#popBox .val{font-size:24px;font-weight:900;color:#fff;font-family:'Georgia',serif;text-shadow:0 1px 3px #000;margin-top:2px}
#popBox .delta{font-size:10px;color:#5fc;margin-top:2px}

#skyline{position:fixed;right:18px;bottom:48px;z-index:11;pointer-events:none;width:240px;height:96px;background:rgba(8,12,22,.85);border:1px solid #d4a84a;padding:4px}
#skyline canvas{width:100%;height:100%;display:block}
#skyline .lbl{position:absolute;top:-9px;left:8px;background:#0a2236;padding:1px 6px;font-size:9px;color:#d4a84a;letter-spacing:2px;font-weight:700;border:1px solid #d4a84a}

#lower3{position:fixed;left:30px;bottom:140px;z-index:11;pointer-events:none;transform:translateX(-120%);transition:transform .55s cubic-bezier(.2,.9,.3,1.1);max-width:560px}

#hostline{position:fixed;left:30px;right:30px;bottom:54px;z-index:11;pointer-events:none;font-size:13px;color:#ffd;text-align:center;font-style:italic;text-shadow:1px 1px 3px #000;opacity:0;transition:opacity .35s}

#ticker{position:fixed;left:0;right:0;bottom:0;z-index:12;pointer-events:none;background:linear-gradient(180deg,#0a0e18,#000);border-top:2px solid #d4a84a;height:38px;overflow:hidden;display:flex;align-items:center}
#ticker .lab{flex:0 0 auto;background:linear-gradient(180deg,#1d4d76,#0a2236);padding:0 14px;height:100%;display:flex;align-items:center;font-weight:900;letter-spacing:2px;font-size:13px;color:#fff;border-right:1px solid #d4a84a}

@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

.pip{position:fixed;z-index:11;pointer-events:none;border:2px solid #d4a84a;background:#000;box-shadow:0 4px 16px rgba(0,0,0,.7);overflow:hidden}
.pip .lbl{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#d4a84a;border-left:2px solid #c00;z-index:2}

#vignette{position:fixed;inset:0;z-index:9;pointer-events:none;box-shadow:inset 0 0 200px rgba(0,0,0,.65)}

<script>
(function(){

// =============== CONSTANTS / DATA ===============
var YEAR_START = 1925, YEAR_END = 2025;

function eraOf(y){
  if(y<1935) return 0;
  if(y<1955) return 1;
  if(y<1975) return 2;
  if(y<1995) return 3;
  if(y<2010) return 4;
  if(y<2020) return 5;

}

var state = null;

function newState(){
  return {
    cityName: pick(CITY_POOL),
    runYear: YEAR_START,
    runT: 0,
    yearT: 0,
    pop: 2000,
    gdp: 12,
    crime: 28,
    culture: 9,

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randR(a,b){return a+Math.random()*(b-a);}
function randI(a,b){return Math.floor(a+Math.random()*(b-a+1));}
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function lerp(a,b,t){return a+(b-a)*t;}
function fmt(n){return Math.floor(n).toLocaleString('en-US');}

var sun, sunBack, ambient, hemi;
var ground, sidewalkMesh;
var skyColor = new THREE.Color(0x6e533a);
var fogColor = new THREE.Color(0x6e533a);

var tiles = []; // 256 tile objects
var tileBuildings = []; // building meshes per tile
var citizens, citizenData = [];
var cars = [], carDir = [];
var fxParticles = [];
var floodPlane;
var cityHall = null, cityHallTile = -1;
var sharedBoxGeo, sharedRoofGeo, sharedCarGeo, sharedCarTopGeo, sharedCitizenGeo;

var disposables = [];
var cleanups = [];

function track(o){
  if(o && o.dispose) disposables.push(o);
  return o;
}

function disposeScene(){
  // dispose owned per-building resources
  for(var b=0;b<tileBuildings.length;b++){
    if(tileBuildings[b]) disposeBuilding(tileBuildings[b]);
  }
  // dispose three resources
  for(var i=0;i<disposables.length;i++){
    try{disposables[i].dispose();}catch(e){}
  }
  disposables = [];
  if(renderer){
    try{renderer.dispose();}catch(e){}
    try{renderer.forceContextLoss();}catch(e){}
    if(renderer.domElement && renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
  }
  renderer = null;
  scene = null;
  camera = null;
  tiles = [];
  tileBuildings = [];
  cars = [];
  carDir = [];
  citizenData = [];
  fxParticles = [];
  citizens = null;
  cityHall = null;
}

function buildScene(){
  scene = new THREE.Scene();
  scene.background = skyColor.clone();
  scene.fog = new THREE.Fog(skyColor.clone(), 80, 260);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 800);
  camera.position.set(80, 70, 90);
  camera.lookAt(0,8,0);
  cameraTarget = new THREE.Vector3(0,6,0);

  renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'default'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = false;
  stage.appendChild(renderer.domElement);

  hemi = new THREE.HemisphereLight(0xeeddbb, 0x332211, 0.6);
  scene.add(hemi);
  ambient = new THREE.AmbientLight(0x556677, 0.35);
  scene.add(ambient);
  sun = new THREE.DirectionalLight(0xffeecc, 1.0);
  sun.position.set(80,120,40);
  scene.add(sun);
  sunBack = new THREE.DirectionalLight(0x99bbff, 0.25);
  sunBack.position.set(-60,40,-80);
  scene.add(sunBack);

  // ground
  var gg = track(new THREE.PlaneGeometry(900,900,1,1));
  var gm = track(new THREE.MeshLambertMaterial({color:0x3d3528}));
  ground = new THREE.Mesh(gg, gm);
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -0.05;
  scene.add(ground);

  // street/sidewalk plane covering the whole city footprint
  var sgg = track(new THREE.PlaneGeometry(GRID*TILE+8, GRID*TILE+8, 1,1));
  var sgm = track(new THREE.MeshLambertMaterial({color:0x2d2d2f}));
  var streetPlane = new THREE.Mesh(sgg, sgm);
  streetPlane.rotation.x = -Math.PI/2;
  streetPlane.position.y = 0.0;
  scene.add(streetPlane);

  // grid lines (sidewalks/road markings)
  buildRoads();

  // shared geometries
  sharedBoxGeo = track(new THREE.BoxGeometry(1,1,1));
  sharedRoofGeo = track(new THREE.ConeGeometry(0.8,0.6,4));
  sharedCarGeo = track(new THREE.BoxGeometry(1.2, 0.45, 0.6));
  sharedCarTopGeo = track(new THREE.BoxGeometry(0.7, 0.32, 0.55));
  sharedCitizenGeo = track(new THREE.BoxGeometry(0.22, 0.7, 0.22));

  // tiles & buildings
  buildTiles();

  // citizens
  buildCitizens();

  // cars
  buildCars();

  // flood plane
  var fpg = track(new THREE.PlaneGeometry(GRID*TILE+12, GRID*TILE+12,1,1));
  var fpm = track(new THREE.MeshBasicMaterial({color:0x3a76a8, transparent:true, opacity:0.55}));
  floodPlane = new THREE.Mesh(fpg, fpm);
  floodPlane.rotation.x = -Math.PI/2;
  floodPlane.position.y = -2;
  floodPlane.visible = false;
  scene.add(floodPlane);

  window.addEventListener('resize', onResize);
  cleanups.push(function(){window.removeEventListener('resize', onResize);});
}

function onResize(){
  if(!renderer || !camera) return;
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function buildRoads(){
  // road stripes — thin emissive lines along road centers
  var stripeMat = track(new THREE.MeshBasicMaterial({color:0xfff2c8, transparent:true, opacity:0.45}));
  var stripeGeo = track(new THREE.PlaneGeometry(GRID*TILE, 0.18,1,1));
  for(var i=0;i<=GRID;i++){
    var off = -HALF + i*TILE;
    var s1 = new THREE.Mesh(stripeGeo, stripeMat);
    s1.rotation.x = -Math.PI/2;
    s1.position.set(0, 0.02, off);
    scene.add(s1);
    var s2 = new THREE.Mesh(stripeGeo, stripeMat);
    s2.rotation.x = -Math.PI/2;
    s2.rotation.z = Math.PI/2;
    s2.position.set(off, 0.02, 0);
    scene.add(s2);
  }

  // sidewalk pads (thin white) at intersections
  var padMat = track(new THREE.MeshLambertMaterial({color:0x5a5b5e}));
  var padGeo = track(new THREE.BoxGeometry(2.5,0.08,2.5));
  for(var ix=0;ix<=GRID;ix+=2){
    for(var iz=0;iz<=GRID;iz+=2){
      var px = -HALF + ix*TILE;
      var pz = -HALF + iz*TILE;
      var pad = new THREE.Mesh(padGeo, padMat);
      pad.position.set(px, 0.04, pz);
      scene.add(pad);
    }
  }
}

function buildTiles(){
  for(var gx=0; gx<GRID; gx++){
    for(var gz=0; gz<GRID; gz++){
      var idx = gx*GRID+gz;
      var cx = -HALF + gx*TILE + TILE/2;
      var cz = -HALF + gz*TILE + TILE/2;
      var distFromCenter = Math.sqrt((gx-7.5)*(gx-7.5)+(gz-7.5)*(gz-7.5));
      tiles.push({
        idx: idx,
        gx: gx, gz: gz,
        cx: cx, cz: cz,
        d: distFromCenter,
        stories: 0,
        era: -1,
        targetStories: 0,
        risingT: 0,
        rising: false,
        damaged: 0,
        builtYear: 0,
        isFactory: false,
        isCityHall: false
      });
      tileBuildings.push(null);
    }
  }
  // mark city hall at center tile
  cityHallTile = 7*GRID + 7;
  tiles[cityHallTile].isCityHall = true;
}

function buildCitizens(){
  var mat = track(new THREE.MeshLambertMaterial({color:0xddccaa}));
  citizens = new THREE.InstancedMesh(sharedCitizenGeo, mat, 200);
  citizens.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(citizens);
  var dummy = new THREE.Object3D();
  for(var i=0;i<200;i++){
    var horiz = Math.random()<0.5;
    var laneIdx = randI(0,GRID);
    var roadOff = -HALF + laneIdx*TILE;
    var pos = randR(-HALF, HALF);
    var x = horiz ? pos : roadOff + (Math.random()<0.5?-1.4:1.4);
    var z = horiz ? roadOff + (Math.random()<0.5?-1.4:1.4) : pos;
    citizenData.push({
      x:x, z:z,
      horiz:horiz,
      speed: randR(1.4, 2.4),
      dir: Math.random()<0.5 ? 1 : -1,
      color: new THREE.Color().setHSL(Math.random(), 0.4, 0.4+Math.random()*0.3),
      visible: 1
    });
    dummy.position.set(x, 0.35, z);
    dummy.updateMatrix();
    citizens.setMatrixAt(i, dummy.matrix);
    citizens.setColorAt && citizens.setColorAt(i, citizenData[i].color);
  }
  citizens.instanceMatrix.needsUpdate = true;
  if(citizens.instanceColor) citizens.instanceColor.needsUpdate = true;
}

function buildCars(){
  for(var i=0;i<28;i++){
    var horiz = Math.random()<0.5;
    var laneIdx = randI(0,GRID);
    var roadOff = -HALF + laneIdx*TILE;
    var pos = randR(-HALF, HALF);
    var lane = (Math.random()<0.5?-0.7:0.7);
    var x = horiz ? pos : roadOff + lane;
    var z = horiz ? roadOff + lane : pos;
    var dir = Math.random()<0.5 ? 1 : -1;

    var carGroup = new THREE.Group();
    var bodyColor = new THREE.Color().setHSL(Math.random(), 0.7, 0.45);
    var bodyMat = track(new THREE.MeshLambertMaterial({color: bodyColor}));
    var body = new THREE.Mesh(sharedCarGeo, bodyMat);
    body.position.y = 0.27;
    carGroup.add(body);
    var topMat = track(new THREE.MeshLambertMaterial({color: bodyColor.clone().multiplyScalar(0.7)}));
    var top = new THREE.Mesh(sharedCarTopGeo, topMat);
    top.position.set(-0.05, 0.6, 0);
    carGroup.add(top);
    carGroup.position.set(x, 0, z);
    if(!horiz) carGroup.rotation.y = Math.PI/2;
    if(dir<0) carGroup.rotation.y += Math.PI;
    scene.add(carGroup);
    cars.push(carGroup);
    carDir.push({horiz:horiz, dir:dir, lane:lane, laneOff:roadOff, speed:randR(4,7), bodyMat:bodyMat, topMat:topMat, eraStyle:-1});
  }
}

// Build a single building model. Per-building materials/geometries are NOT pushed
// to the global `disposables` list — they are owned by the building group and
// disposed when the tile rebuilds (see rebuildTile) or when the scene tears down.
function makeBuilding(stories, eraIdx, isFactory, isCityHall){
  var g = new THREE.Group();
  g.userData.ownedMats = [];
  g.userData.ownedGeos = [];
  var own = function(thing, list){ list.push(thing); return thing; };
  var palette = ERA_PAL[eraIdx];
  var color = palette[Math.floor(Math.random()*palette.length)];
  var storyH = (eraIdx>=4) ? 1.6 : (eraIdx>=2 ? 1.7 : 2.0);
  var h = stories * storyH;
  var w = (stories<=3) ? randR(3.5,5.2) : (stories<=12 ? randR(4.0,5.5) : randR(4.6,6.0));
  if(isFactory){ w = randR(5.0,5.8); h = randR(4,9); }
  if(isCityHall){ w = 6.2; h = 8; }

  var mainMat = own(new THREE.MeshLambertMaterial({color:color}), g.userData.ownedMats);
  var main = new THREE.Mesh(sharedBoxGeo, mainMat);
  main.scale.set(w, h, w);
  main.position.y = h/2;
  g.add(main);

  if(eraIdx>=3 && stories>=4){
    var winColor = (eraIdx>=4) ? 0x6cd0ff : 0xffd58a;
    var winMat = own(new THREE.MeshBasicMaterial({color:winColor, transparent:true, opacity:0.55}), g.userData.ownedMats);
    for(var b=0;b<Math.min(stories, 30); b++){
      if(b%2!==0) continue;
      var band = new THREE.Mesh(sharedBoxGeo, winMat);
      var by = (b+0.5)*storyH;
      band.scale.set(w*0.92, storyH*0.45, w*1.005);
      band.position.y = by;
      g.add(band);
    }
  }

  if(stories<=2 && !isFactory){
    var roofMat = own(new THREE.MeshLambertMaterial({color:0x6b3a25}), g.userData.ownedMats);
    var roof = new THREE.Mesh(sharedRoofGeo, roofMat);
    roof.scale.set(w*0.85, 1, w*0.85);
    roof.position.y = h + 0.3;
    roof.rotation.y = Math.PI/4;
    g.add(roof);
  } else if(eraIdx>=5){
    var greenMat = own(new THREE.MeshLambertMaterial({color:0x6fb874}), g.userData.ownedMats);
    var green = new THREE.Mesh(sharedBoxGeo, greenMat);
    green.scale.set(w*0.95, 0.5, w*0.95);
    green.position.y = h + 0.25;
    g.add(green);
    var antMat = own(new THREE.MeshLambertMaterial({color:0x999999}), g.userData.ownedMats);
    var ant = new THREE.Mesh(sharedBoxGeo, antMat);
    ant.scale.set(0.18, 2.4, 0.18);
    ant.position.y = h + 1.7;
    g.add(ant);
  } else if(eraIdx>=3){
    var capMat = own(new THREE.MeshLambertMaterial({color:color}), g.userData.ownedMats);
    var cap = new THREE.Mesh(sharedBoxGeo, capMat);
    cap.scale.set(w*0.7, 1.0, w*0.7);
    cap.position.y = h + 0.5;
    g.add(cap);
  } else if(eraIdx>=1){
    var crownMat = own(new THREE.MeshLambertMaterial({color:0xc9b079}), g.userData.ownedMats);
    var crown = new THREE.Mesh(sharedBoxGeo, crownMat);
    crown.scale.set(w*0.9, 0.6, w*0.9);
    crown.position.y = h + 0.3;
    g.add(crown);
    var spire = new THREE.Mesh(sharedBoxGeo, crownMat);
    spire.scale.set(0.4, 1.2, 0.4);
    spire.position.y = h + 1.2;
    g.add(spire);
  }

  if(isFactory){
    var stackMat = own(new THREE.MeshLambertMaterial({color:0x6a5a4a}), g.userData.ownedMats);
    var stack = new THREE.Mesh(sharedBoxGeo, stackMat);
    stack.scale.set(0.7, 4, 0.7);
    stack.position.set(w*0.3, h+2, w*0.3);
    g.add(stack);
  }

  if(isCityHall){
    var domeMat = own(new THREE.MeshLambertMaterial({color:0xc9b079}), g.userData.ownedMats);
    var domeGeo = own(new THREE.SphereGeometry(2.2, 16, 12), g.userData.ownedGeos);
    var dome = new THREE.Mesh(domeGeo, domeMat);
    dome.position.y = h + 1.2;
    g.add(dome);
    var pillars = 4;
    var pmat = own(new THREE.MeshLambertMaterial({color:0xefe5cf}), g.userData.ownedMats);
    for(var p=0;p<pillars;p++){
      var ang = p*Math.PI*2/pillars;
      var px = Math.cos(ang)*w*0.45, pz = Math.sin(ang)*w*0.45;
      var pil = new THREE.Mesh(sharedBoxGeo, pmat);
      pil.scale.set(0.5, h*0.9, 0.5);
      pil.position.set(px, h*0.45, pz);
      g.add(pil);
    }
  }

  return g;
}

function disposeBuilding(b){
  if(!b) return;
  var mats = (b.userData && b.userData.ownedMats) || [];
  var geos = (b.userData && b.userData.ownedGeos) || [];
  for(var i=0;i<mats.length;i++){ try{ mats[i].dispose(); }catch(e){} }
  for(var j=0;j<geos.length;j++){ try{ geos[j].dispose(); }catch(e){} }
}

function rebuildTile(t, year, opts){
  opts = opts || {};
  var era = eraOf(year);
  var sr = ERA_STORY[era];
  var stories;
  if(opts.stories){
    stories = opts.stories;
  } else {
    var distFactor = clamp(1 - t.d/10, 0.15, 1);
    stories = Math.max(1, Math.floor(sr[0] + (sr[1]-sr[0])*distFactor*Math.random()));
    if(t.isCityHall) stories = 4;
    if(opts.isFactory) stories = randI(2,5);
  }
  // remove old (and dispose its owned materials/geometries)
  var old = tileBuildings[t.idx];
  if(old){
    scene.remove(old);
    disposeBuilding(old);
  }
  var bldg = makeBuilding(stories, era, opts.isFactory, t.isCityHall);
  bldg.position.set(t.cx, 0, t.cz);
  bldg.userData.targetY = 0;
  bldg.userData.startY = -Math.max(2, stories*0.9);
  bldg.position.y = bldg.userData.startY;
  bldg.userData.rising = true;
  bldg.userData.riseT = 0;
  scene.add(bldg);
  tileBuildings[t.idx] = bldg;

  t.stories = stories;
  t.era = era;
  t.builtYear = year;
  t.isFactory = !!opts.isFactory;
  t.damaged = 0;
  if(t.isCityHall) cityHall = bldg;
}

// =============== MAYORS ===============
function instantiateMayors(){
  state.mayors = [];
  for(var i=0;i<MAYOR_TEMPLATES.length;i++){
    var m = MAYOR_TEMPLATES[i];
    state.mayors.push({
      first: pick(m.first), last: pick(m.last),
      from: m.from, to: m.to, party: m.party, bio: m.bio,
      color: new THREE.Color().setHSL(Math.random(), 0.4, 0.4+Math.random()*0.25)
    });
  }
}

function getMayorForYear(y){
  for(var i=0;i<state.mayors.length;i++){
    if(y>=state.mayors[i].from && y<state.mayors[i].to) return i;
  }
  return state.mayors.length-1;
}

function drawMayorPortrait(canvas, mayor){
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#'+mayor.color.getHexString();
  ctx.fillRect(0,0,54,54);
  // head
  ctx.fillStyle = '#e6c8a4';
  ctx.beginPath();
  ctx.arc(27, 22, 12, 0, Math.PI*2);
  ctx.fill();
  // hair
  ctx.fillStyle = '#3a2618';
  ctx.beginPath();
  ctx.arc(27, 18, 13, Math.PI, 2*Math.PI);
  ctx.fill();
  // shoulders
  ctx.fillStyle = '#1f2a3a';
  ctx.fillRect(8, 38, 38, 16);
  // tie/collar
  ctx.fillStyle = mayor.party.indexOf('GREEN')>=0 ? '#5fc488' : (mayor.party.indexOf('REFORM')>=0 ? '#d4a84a' : '#c33');
  ctx.beginPath();
  ctx.moveTo(27, 38);
  ctx.lineTo(23, 54);
  ctx.lineTo(31, 54);
  ctx.closePath();
  ctx.fill();
}

function setMayor(idx){
  state.mayorIdx = idx;
  var m = state.mayors[idx];
  state.mayorName = m.first + ' ' + m.last;
  state.mayorBio = m.bio;
  state.mayorParty = m.party;
  state.mayorFrom = m.from;
  state.mayorTo = m.to;
  document.getElementById('mayorName').textContent = state.mayorName.toUpperCase();
  document.getElementById('mayorTerm').textContent = m.from+'–'+m.to+' · '+m.party;
  drawMayorPortrait(document.getElementById('mayorPic'), m);
  showLowerThird('NEW MAYOR · '+state.mayorName.toUpperCase(), m.party+' · '+m.bio);
}

// =============== EVENTS ===============
function fireDisaster(year, kind){
  // pick a random tile (not city hall) that has a building
  var attempts = 0;
  var t = null;
  while(attempts<40){
    var ti = tiles[randI(0, tiles.length-1)];
    if(!ti.isCityHall && tileBuildings[ti.idx]){ t = ti; break; }
    attempts++;
  }
  if(!t) return;
  if(kind==='FIRE'){
    state.fireTiles.push({tx:t.cx, tz:t.cz, life: 5, tileIdx:t.idx});
    showLowerThird('FIRE · WARD '+(t.gx+1)+'-'+(t.gz+1), 'FIRE DEPARTMENT RESPONDING');
    showChyron('BREAKING: STRUCTURE FIRE REPORTED IN WARD '+(t.gx+1)+'-'+(t.gz+1));
    // schedule rebuild
    setTimeout(function(){
      if(state) rebuildTile(t, year, {});
    }, 4000);
  } else if(kind==='FLOOD'){
    state.floodLvl = 0.6;
    state.floodTimer = 6;
    showLowerThird('FLOOD WARNING', 'RIVER OVERFLOWS ITS BANKS · LOW WARDS DARKENED');
    showChyron('FLOOD ALERT — LOW-LYING BLOCKS UNDERWATER');
  } else if(kind==='QUAKE'){
    state.shake = 1.6;
    showLowerThird('EARTHQUAKE', 'TREMORS REPORTED CITYWIDE');
    showChyron('EARTHQUAKE — STRUCTURAL DAMAGE TO 3 TOWERS');
    // damage 1-3 tiles
    for(var k=0;k<randI(1,3);k++){
      var dt = tiles[randI(0,tiles.length-1)];
      if(tileBuildings[dt.idx] && !dt.isCityHall){
        dt.damaged = 1;
        var b = tileBuildings[dt.idx];
        if(b) b.position.y -= randR(0.6, 1.8);
      }
    }
  } else if(kind==='PLAGUE'){
    state.plagueTint = 6;
    state.citizensVisible = 0.15;
    showLowerThird('PLAGUE OUTBREAK', 'CITIZENS ORDERED INDOORS');
    showChyron('HEALTH EMERGENCY — STREETS EMPTYING ACROSS THE CITY');
    setTimeout(function(){
      if(state) state.citizensVisible = 1;
    }, 6000);
  }
}

function processYearTick(year){
  // run fixed events
  for(var i=0;i<EVENTS_FIXED.length;i++){
    var e = EVENTS_FIXED[i];
    if(e.y === year){
      handleFixedEvent(e, year);
    }
  }
  // mayor change
  var mIdx = getMayorForYear(year);
  if(mIdx !== state.mayorIdx){
    setMayor(mIdx);
    state.camIdx = 3; // CITY-HALL on inauguration
    state.camTimer = 0;
    state.camDur = 7;
  }
  // pop & stats progression
  var t01 = (year - YEAR_START) / (YEAR_END - YEAR_START);
  state.pop = Math.floor(2000 + Math.pow(t01, 1.6) * 7998000);
  if(year>=2008 && year<2010) state.pop *= 0.99;
  state.gdp = Math.floor(12 + t01*1080 + Math.sin(year*0.3)*30);
  state.crime = Math.floor(28 + Math.sin(year*0.21)*16 + Math.cos(year*0.1)*9);
  state.culture = Math.floor(9 + t01*92 + Math.sin(year*0.18)*7);

  // construction logic — each year a portion of tiles upgrade/build
  if(state.constructionFrozen<=0){
    var era = eraOf(year);
    var pace = 0.04 + 0.01 * era; // more construction in later eras
    if(year>=1955 && year<1965) pace += 0.04; // suburban boom
    if(year>=1995 && year<2000) pace += 0.05; // tech boom
    if(year>=2015 && year<2020) pace += 0.04; // megacity
    var nBuild = Math.floor(tiles.length * pace);
    for(var b=0;b<nBuild;b++){
      var t = tiles[randI(0, tiles.length-1)];
      if(t.isCityHall && t.builtYear>0) continue;
      // require city to grow outward from center first 30 years
      if(year<1955 && t.d > 4 + (year-YEAR_START)*0.18) continue;
      if(year<1975 && t.d > 7 + (year-1955)*0.2) continue;
      // chance to leave empty if too far
      if(t.d>9 && Math.random()<0.5) continue;
      // if already has building, only rebuild ~10%
      if(tileBuildings[t.idx] && Math.random()<0.85) continue;
      var opts = {};
      if(year>=1942 && year<1955 && t.d>5 && t.d<9 && Math.random()<0.18) opts.isFactory = true;
      rebuildTile(t, year, opts);
      if(b<2 && Math.random()<0.18){
        var ti = tiles.indexOf(t);
        showLowerThird('NEW BUILDING · WARD '+(t.gx+1)+'-'+(t.gz+1), t.stories+'-STORY '+ERA_NAMES[era]);
      }
    }
    if(year===YEAR_START){
      // founding: initial 4 buildings near center plus city hall
      rebuildTile(tiles[cityHallTile], year, {});
      var seeds = [tiles[7*GRID+8], tiles[8*GRID+7], tiles[6*GRID+7], tiles[7*GRID+6]];
      for(var s=0;s<seeds.length;s++) rebuildTile(seeds[s], year, {});
    }
  } else {
    state.constructionFrozen--;
  }

  // tallest building tracking
  var maxStories = 0;
  for(var ti=0; ti<tiles.length; ti++){
    if(tiles[ti].stories>maxStories) maxStories = tiles[ti].stories;
  }
  state.skyMax = maxStories;
  state.yearHistory.push({year:year, tallest:maxStories, pop:state.pop});

  // disaster roll — 30% chance per decade ~ 3% per year
  if(Math.random()<0.045 && year>1928 && year<2025 && state.constructionFrozen<=0){
    var roll = Math.random();
    var kind = roll<0.4?'FIRE':(roll<0.6?'FLOOD':(roll<0.8?'QUAKE':'PLAGUE'));
    fireDisaster(year, kind);
  }

  // ticker — find a line for this year
  for(var t=0;t<TICKER_LINES.length;t++){
    var ln = TICKER_LINES[t];
    if(ln.indexOf(year+':') === 0){
      var prev = document.getElementById('tickerLn').textContent;
      document.getElementById('tickerLn').textContent = (prev+'    ····    '+ln).slice(-1200);
      break;
    }
  }
  // host narration occasionally
  if(year%5===0){
    var narr = pickNarration(year);
    showHost('"'+narr+'" — '+(Math.random()<0.5?'REPORTER VANCE':'HISTORIAN DR. OKAFOR'));
  }
}

function handleFixedEvent(e, year){
  showLowerThird(e.ttl, e.sub);
  showChyron(year+' — '+e.ttl);
  if(e.kind==='ECON' && e.ttl==='GREAT DEPRESSION'){
    state.constructionFrozen = 4;
  } else if(e.kind==='CRASH'){
    state.constructionFrozen = 2;
  } else if(e.kind==='BLACKOUT'){
    state.blackout = 4;
  } else if(e.kind==='PLAGUE'){
    state.plagueTint = 12;
    state.citizensVisible = 0.1;
    setTimeout(function(){
      if(state) state.citizensVisible = 1;
    }, 5500);
  } else if(e.kind==='SKY'){
    // place a 30-story tower near city hall
    var t = tiles[6*GRID + 8];
    rebuildTile(t, year, {stories:32});
  } else if(e.kind==='MEGA'){
    var t2 = tiles[8*GRID + 8];
    rebuildTile(t2, year, {stories:78});
  } else if(e.kind==='SMART'){
    var t3 = tiles[8*GRID + 7];
    rebuildTile(t3, year, {stories:60});
  } else if(e.kind==='INDUSTRY'){
    // place several factories
    var slots = [4*GRID+2, 4*GRID+4, 5*GRID+3, 13*GRID+12];
    for(var s=0;s<slots.length;s++){
      rebuildTile(tiles[slots[s]], year, {isFactory:true});
    }
  } else if(e.kind==='GENT'){
    // rebuild 6 random older buildings
    for(var g=0;g<8;g++){
      var ti = randI(0, tiles.length-1);
      if(tileBuildings[tiles[ti].idx] && !tiles[ti].isCityHall) rebuildTile(tiles[ti], year, {});
    }
  } else if(e.kind==='TECH'){
    for(var g2=0;g2<5;g2++){
      var ti2 = tiles[randI(5,10)*GRID + randI(5,10)];
      rebuildTile(ti2, year, {});
    }
  }
  state.camIdx = randI(0, 4);
  state.camTimer = 0;
  state.camDur = 8;
}

function pickNarration(year){
  var era = eraOf(year);
  var lines = [
    ['Look at this skyline — barely a steeple above two stories.','Founders bet everything on the river bend.'],
    ['Bread lines stretched four blocks long that winter.','New Deal masonry still holds up Public Square.'],
    ['Boomtown — every veteran got a mortgage and a Chevy.','You could feel the optimism in the cement.'],
    ['Rust on the rails, soot on the windows.','We almost lost downtown in the seventies.'],
    ['Glass came up like ice. Rents tripled in a decade.','The internet rewired the city before we noticed.'],
    ['Cranes everywhere. Cranes and quiet streets in 2020.','We learned to build vertical, then to build green.'],
    ['Drones above, vertical farms below — this is a new kind of city.','A century of one place, still becoming itself.']
  ];
  var pool = lines[era] || lines[0];
  return pool[randI(0, pool.length-1)];
}

// =============== CAMERA DIRECTOR ===============
var CAM_NAMES = ['SKYLINE','GROUND-LEVEL','HIGHWAY','CITY-HALL','AERIAL'];

function pickNextCam(){
  var n = randI(0, 4);
  if(n===state.camIdx) n = (n+1)%5;
  state.camIdx = n;
  state.camTimer = 0;
  state.camDur = randR(7, 11);
  document.getElementById('camBadge').textContent = 'CAM 0'+(n+1)+' · '+CAM_NAMES[n];
  document.getElementById('anchorPip').classList.toggle('show', n===0 || n===3);
}

function updateCamera(dt, t){
  state.camTimer += dt;
  if(state.camTimer > state.camDur) pickNextCam();

  var idx = state.camIdx;
  var tt = state.runT;
  var phase = state.runT*0.05;

  if(idx===0){
    // SKYLINE — orbit at altitude
    var ang = phase * 0.4;
    var r = 95;
    camera.position.set(Math.cos(ang)*r, 55, Math.sin(ang)*r);
    cameraTarget.set(0, 14, 0);
  } else if(idx===1){
    // GROUND-LEVEL — looking up at a tall building
    var pickIdx = (Math.floor(state.runT*0.3)) % tiles.length;
    var look = null;
    for(var i=0;i<tiles.length;i++){
      var ix = (pickIdx+i)%tiles.length;
      if(tiles[ix].stories>5){look = tiles[ix]; break;}
    }
    if(!look) look = tiles[cityHallTile];
    var off = 12;
    camera.position.set(look.cx + Math.cos(phase)*off, 4 + Math.sin(phase*0.5)*1.2, look.cz + Math.sin(phase)*off);
    cameraTarget.set(look.cx, 12 + look.stories*0.6, look.cz);
  } else if(idx===2){
    // HIGHWAY — follow a car
    var carIdx = Math.floor(state.runT*0.1) % cars.length;
    var c = cars[carIdx];
    var d = carDir[carIdx];
    camera.position.set(c.position.x - (d.horiz?d.dir*8:0), 3.5, c.position.z - (d.horiz?0:d.dir*8));
    cameraTarget.set(c.position.x + (d.horiz?d.dir*4:0), 1.5, c.position.z + (d.horiz?0:d.dir*4));
  } else if(idx===3){
    // CITY-HALL — orbit
    var ang2 = phase*0.6;
    var ch = tiles[cityHallTile];
    camera.position.set(ch.cx + Math.cos(ang2)*22, 14, ch.cz + Math.sin(ang2)*22);
    cameraTarget.set(ch.cx, 8, ch.cz);
  } else if(idx===4){
    // AERIAL — high top-down with slow pan
    camera.position.set(Math.sin(phase*0.3)*40, 110, Math.cos(phase*0.3)*40);
    cameraTarget.set(0, 0, 0);
  }

  // shake from earthquake
  if(state.shake>0){
    camera.position.x += (Math.random()-0.5)*state.shake;
    camera.position.y += (Math.random()-0.5)*state.shake;
    camera.position.z += (Math.random()-0.5)*state.shake;
    state.shake = Math.max(0, state.shake - dt*0.6);
  }

  camera.lookAt(cameraTarget);
}

// =============== UPDATES ===============
function updateBuildings(dt){
  for(var i=0;i<tileBuildings.length;i++){
    var b = tileBuildings[i];
    if(!b) continue;
    if(b.userData.rising){
      b.userData.riseT += dt*1.4;
      var k = clamp(b.userData.riseT, 0, 1);
      var ease = 1 - Math.pow(1-k, 3);
      b.position.y = lerp(b.userData.startY, 0, ease);
      if(k>=1) b.userData.rising = false;
    }
  }
}

function updateCitizens(dt){
  if(!citizens) return;
  var dummy = new THREE.Object3D();
  for(var i=0;i<citizenData.length;i++){
    var c = citizenData[i];
    var spd = c.speed * dt * c.dir;
    if(c.horiz) c.x += spd; else c.z += spd;
    if(c.x>HALF) c.x = -HALF;
    if(c.x<-HALF) c.x = HALF;
    if(c.z>HALF) c.z = -HALF;
    if(c.z<-HALF) c.z = HALF;

    var visTarget = state.citizensVisible;
    c.visible = lerp(c.visible, visTarget, Math.min(1, dt*1.5));

    dummy.position.set(c.x, 0.35, c.z);
    var sc = c.visible;
    dummy.scale.set(sc, sc, sc);
    dummy.updateMatrix();
    citizens.setMatrixAt(i, dummy.matrix);
  }
  citizens.instanceMatrix.needsUpdate = true;
}

function carEraColor(year){
  var e = eraOf(year);
  if(e===0) return 0x202020; // model T black
  if(e===1) return new THREE.Color().setHSL(Math.random(), 0.5, 0.3).getHex();
  if(e===2) return new THREE.Color().setHSL(Math.random(), 0.6, 0.4).getHex();
  if(e===3) return new THREE.Color().setHSL(Math.random(), 0.7, 0.42).getHex();
  if(e===4) return new THREE.Color().setHSL(Math.random(), 0.6, 0.45).getHex();
  if(e===5) return new THREE.Color().setHSL(Math.random(), 0.55, 0.5).getHex();
  return new THREE.Color().setHSL(Math.random(), 0.55, 0.55).getHex();
}

function updateCars(dt){
  for(var i=0;i<cars.length;i++){
    var c = cars[i];
    var d = carDir[i];
    var s = d.speed * dt * d.dir;
    if(d.horiz) c.position.x += s; else c.position.z += s;
    if(c.position.x>HALF+2) c.position.x = -HALF-2;
    if(c.position.x<-HALF-2) c.position.x = HALF+2;
    if(c.position.z>HALF+2) c.position.z = -HALF-2;
    if(c.position.z<-HALF-2) c.position.z = HALF+2;

    // change color/shape per era infrequently
    var era = eraOf(state.runYear);
    if(d.eraStyle !== era && Math.random()<0.02){
      d.eraStyle = era;
      var col = carEraColor(state.runYear);
      d.bodyMat.color.setHex(col);
      d.topMat.color.setHex(new THREE.Color(col).multiplyScalar(0.7).getHex());
    }
  }
}

function updateFires(dt){
  for(var i=state.fireTiles.length-1;i>=0;i--){
    var f = state.fireTiles[i];
    f.life -= dt;
    if(f.life<=0){ state.fireTiles.splice(i,1); continue; }
    // spawn a quick burst — handled in particle system
  }
}

// simple sprite particles for fire/smoke
var particleSystem = null;
function initParticles(){
  // Use simple Points
  var n = 600;
  var geo = track(new THREE.BufferGeometry());
  var positions = new Float32Array(n*3);
  var colors = new Float32Array(n*3);
  for(var i=0;i<n*3;i++) positions[i]=0;
  for(var c=0;c<n*3;c++) colors[c]=0;
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  var mat = track(new THREE.PointsMaterial({size:0.7, vertexColors:true, transparent:true, opacity:0.85, depthWrite:false}));
  particleSystem = new THREE.Points(geo, mat);
  scene.add(particleSystem);
  particleSystem.userData.particles = [];
  for(var p=0;p<n;p++){
    particleSystem.userData.particles.push({life:0, x:0, y:0, z:0, vx:0, vy:0, vz:0, r:1, g:0.3, b:0.1});
  }
}

function spawnFireParticles(x,z){
  var p = particleSystem.userData.particles;
  for(var i=0;i<8;i++){
    for(var j=0;j<p.length;j++){
      if(p[j].life<=0){
        p[j].life = randR(0.6, 1.4);
        p[j].x = x + randR(-0.6,0.6);
        p[j].y = randR(0.5, 2.5);
        p[j].z = z + randR(-0.6,0.6);
        p[j].vx = randR(-0.3,0.3);
        p[j].vy = randR(2.5, 4.5);
        p[j].vz = randR(-0.3,0.3);
        p[j].r = 1; p[j].g = randR(0.4,0.85); p[j].b = 0.1;
        break;
      }
    }
  }
  // smoke
  for(var i2=0;i2<5;i2++){
    for(var j2=0;j2<p.length;j2++){
      if(p[j2].life<=0){
        p[j2].life = randR(1.2, 2.2);
        p[j2].x = x + randR(-1,1);
        p[j2].y = randR(2.5, 4.5);
        p[j2].z = z + randR(-1,1);
        p[j2].vx = randR(-0.5,0.5);
        p[j2].vy = randR(1.0, 2.0);
        p[j2].vz = randR(-0.5,0.5);
        p[j2].r = 0.15; p[j2].g = 0.15; p[j2].b = 0.15;
        break;
      }
    }
  }
}

function updateParticles(dt){
  if(!particleSystem) return;
  var p = particleSystem.userData.particles;
  var pos = particleSystem.geometry.attributes.position.array;
  var col = particleSystem.geometry.attributes.color.array;
  // spawn from active fires
  for(var f=0;f<state.fireTiles.length;f++){
    var fi = state.fireTiles[f];
    spawnFireParticles(fi.tx, fi.tz);
  }
  for(var i=0;i<p.length;i++){
    var pp = p[i];
    if(pp.life>0){
      pp.life -= dt;
      pp.x += pp.vx*dt;
      pp.y += pp.vy*dt;
      pp.z += pp.vz*dt;
      pp.vy *= 0.96;
      pos[i*3]=pp.x; pos[i*3+1]=pp.y; pos[i*3+2]=pp.z;
      col[i*3]=pp.r; col[i*3+1]=pp.g; col[i*3+2]=pp.b;
    } else {
      pos[i*3]=0; pos[i*3+1]=-9999; pos[i*3+2]=0;
      col[i*3]=0; col[i*3+1]=0; col[i*3+2]=0;
    }
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;
  particleSystem.geometry.attributes.color.needsUpdate = true;
}

function drawAnchorFigure(ctx, cx, cy, skin, suit, tieColor, t, label){
  // shoulders
  ctx.fillStyle = suit;
  ctx.beginPath();
  ctx.moveTo(cx-22, cy+30);
  ctx.lineTo(cx-26, cy+50);
  ctx.lineTo(cx+26, cy+50);
  ctx.lineTo(cx+22, cy+30);
  ctx.closePath();
  ctx.fill();
  // tie
  ctx.fillStyle = tieColor;
  ctx.beginPath();
  ctx.moveTo(cx-3, cy+30); ctx.lineTo(cx+3, cy+30);
  ctx.lineTo(cx+5, cy+50); ctx.lineTo(cx-5, cy+50);
  ctx.closePath(); ctx.fill();
  // neck
  ctx.fillStyle = skin;
  ctx.fillRect(cx-5, cy+18, 10, 14);
  // head — bobs slightly
  var bob = Math.sin(t*1.2)*1.2;
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(cx, cy+bob, 14, 0, Math.PI*2);
  ctx.fill();
  // hair
  ctx.fillStyle = label==='V' ? '#5a3a20' : '#1a0f08';
  ctx.beginPath();
  ctx.arc(cx, cy-4+bob, 14, Math.PI, 2*Math.PI);
  ctx.fill();
  // eyes blink
  var blinkOn = (Math.floor(t*2)%9===0);
  ctx.fillStyle = '#222';
  if(!blinkOn){
    ctx.fillRect(cx-6, cy+bob-1, 2.2, 2.2);
    ctx.fillRect(cx+4, cy+bob-1, 2.2, 2.2);
  } else {
    ctx.fillRect(cx-6, cy+bob, 2.2, 0.5);
    ctx.fillRect(cx+4, cy+bob, 2.2, 0.5);
  }
  // mouth — open/close
  var mouthOpen = (Math.sin(t*7)+1)*0.5 * 4;
  ctx.fillStyle = '#3a1010';
  ctx.fillRect(cx-3, cy+8+bob, 6, mouthOpen);
}

// =============== SKY/AMBIENT TRANSITIONS ===============
function updateSky(dt){
  var year = state.runYear + state.yearT/YEAR_DURATION;
  var era = eraOf(Math.floor(year));
  var nextEra = Math.min(6, era+1);
  // find blend factor inside era
  var ranges = [1925,1935,1955,1975,1995,2010,2020,2025];
  var t01 = (year - ranges[era]) / (ranges[era+1]-ranges[era]);
  t01 = clamp(t01, 0, 1);
  var c0 = new THREE.Color(ERA_SKY[era]);
  var c1 = new THREE.Color(ERA_SKY[nextEra]);
  var target = c0.clone().lerp(c1, t01);

  // events that override
  if(state.plagueTint>0){
    target.lerp(new THREE.Color(0x4d6a3e), 0.55);
    state.plagueTint -= dt;
  }
  if(state.blackout>0){
    target.lerp(new THREE.Color(0x0a0a14), 0.85);
    state.blackout -= dt;
  }
  // night-day breath
  var breath = 0.95 + Math.sin(state.runT*0.07)*0.05;
  target.multiplyScalar(breath);

  skyColor.lerp(target, Math.min(1, dt*1.2));
  if(scene){
    scene.background = skyColor;
    if(scene.fog){
      scene.fog.color.copy(skyColor);
    }
  }
  // sun intensity dims at blackout
  if(sun) sun.intensity = state.blackout>0 ? 0.18 : 1.0;
  if(hemi) hemi.intensity = state.blackout>0 ? 0.18 : 0.6;

  // flood
  if(state.floodTimer>0){
    state.floodTimer -= dt;
    floodPlane.visible = true;
    floodPlane.position.y = lerp(floodPlane.position.y, state.floodLvl, dt*0.8);
    if(state.floodTimer<2) state.floodLvl = -2;
  } else {
    floodPlane.position.y = lerp(floodPlane.position.y, -2, dt*0.5);
    if(floodPlane.position.y<-1.8) floodPlane.visible = false;
  }
}

function reseed(){
  // demolish all buildings (dispose owned materials/geometries)
  for(var i=0;i<tileBuildings.length;i++){
    if(tileBuildings[i]){
      scene.remove(tileBuildings[i]);
      disposeBuilding(tileBuildings[i]);
      tileBuildings[i] = null;
    }
    tiles[i].stories = 0;
    tiles[i].era = -1;
    tiles[i].builtYear = 0;
    tiles[i].damaged = 0;
    tiles[i].isFactory = false;
  }
  state.cityName = pick(CITY_POOL.filter(function(n){return n!==state.cityName;}));
  state.runYear = YEAR_START;
  state.runT = 0;
  state.yearT = 0;
  state.pop = 2000;
  state.gdp = 12;
  state.crime = 28;
  state.culture = 9;
  state.skyMax = 0;
  state.yearHistory = [];
  state.cycleDone = false;
  state.constructionFrozen = 0;
  state.fireTiles = [];
  state.plagueTint = 0;
  state.blackout = 0;
  state.floodTimer = 0;
  state.floodLvl = -2;
  state.shake = 0;
  state.ceremonyT = 0;
  state.citizensVisible = 1;

  document.getElementById('tickerLn').textContent = 'CIVIC CHRONICLE — A NEW CHAPTER BEGINS — CITY OF '+state.cityName+' — POPULATION GROWING — STAY TUNED';
  endCeremony();
  showChyron('A NEW CITY · '+state.cityName, 5500);
  // initial founding tick
  processYearTick(YEAR_START);
}

// =============== MAIN LOOP ===============
var lastT = 0, rafId = null, running = true;

function loop(now){
  if(!running) return;
  rafId = requestAnimationFrame(loop);
  var dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  if(!dt) return;

  state.runT += dt;
  anchorTime += dt;

  if(!state.cycleDone){
    state.yearT += dt;
    if(state.yearT >= YEAR_DURATION){
      state.yearT = 0;
      state.runYear++;
      if(state.runYear>YEAR_END){
        state.runYear = YEAR_END;
        state.cycleDone = true;
        startCeremony();
      } else {
        processYearTick(state.runYear);
      }
    }
  } else {
    state.ceremonyT += dt;
    if(state.ceremonyT > CEREMONY_DURATION){
      reseed();
    }
  }

  // UI updates
  document.getElementById('yrText').textContent = state.runYear;
  document.getElementById('eraText').textContent = ERA_NAMES[eraOf(state.runYear)];
  document.getElementById('popVal').textContent = fmt(state.pop);
  document.getElementById('sGdp').textContent = state.gdp;
  document.getElementById('sCrime').textContent = state.crime;
  document.getElementById('sCult').textContent = state.culture;
  document.getElementById('sSky').textContent = state.skyMax+' fl';

  // ceremony pop delta
  var pd = document.getElementById('popDelta');
  pd.textContent = '▲ '+ERA_NAMES[eraOf(state.runYear)];

  // overlays timing
  if(lowerTimer>0){lowerTimer-=dt; if(lowerTimer<=0) document.getElementById('lower3').classList.remove('show');}
  if(chyronTimer>0){chyronTimer-=dt; if(chyronTimer<=0) document.getElementById('chyron').classList.remove('show');}
  if(hostTimer>0){hostTimer-=dt; if(hostTimer<=0) document.getElementById('hostline').classList.remove('show');}

  // scene updates
  updateSky(dt);
  updateBuildings(dt);
  updateCitizens(dt);
  updateCars(dt);
  updateFires(dt);
  updateParticles(dt);
  updateCamera(dt, state.runT);

  drawAnchorPip();
  drawSkyline();

  renderer.render(scene, camera);
}

// =============== BOOT ===============
function boot(){
  state = newState();
  buildScene();
  initParticles();
  initAnchorCanvas();
  initSkylineCanvas();
  instantiateMayors();
  setMayor(0);
  document.getElementById('cityName').textContent = 'CITY OF '+state.cityName;
  document.getElementById('tickerLn').textContent = 'CIVIC CHRONICLE — CITY OF '+state.cityName+' — A CENTURY OF CIVIC LIFE — STAY TUNED';
  processYearTick(YEAR_START);
  pickNextCam();
  lastT = performance.now();
  loop(lastT);
}

function shutdown(){
  running = false;
  if(rafId) cancelAnimationFrame(rafId);
  for(var i=0;i<cleanups.length;i++){ try{cleanups[i]();}catch(e){} }
  cleanups = [];
  disposeScene();
}

window.addEventListener('beforeunload', shutdown);
window.addEventListener('pagehide', shutdown);

// Recovery — if context lost or error, restart whole thing (with backoff).
var restartAttempts = 0, restartScheduled = false;
window.addEventListener('error', function(){
  if(restartScheduled) return;
  if(restartAttempts > 4) return; // give up after a few tries (e.g. no WebGL)
  restartScheduled = true;
  restartAttempts++;
  try{
    running = false;
    if(rafId) cancelAnimationFrame(rafId);
    setTimeout(function(){
      try{
        disposeScene();
        running = true;
        boot();
      }catch(e){}
      restartScheduled = false;
    }, 1500 * restartAttempts);
  }catch(e){ restartScheduled = false; }
});

boot();

})();
</script>
