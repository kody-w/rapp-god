<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOKYO RUSH HOUR 🌆</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
html,body{margin:0;padding:0;background:#05060a;color:#f8f8ff;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#c{position:fixed;inset:0;width:100vw;height:100vh;display:block;}
.hud{position:fixed;pointer-events:none;text-shadow:0 0 6px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.9);}
#logo{top:14px;left:18px;font-weight:900;font-size:22px;letter-spacing:3px;display:flex;align-items:center;gap:10px;}
#logo .live{display:inline-flex;align-items:center;gap:6px;background:#e0264a;padding:3px 10px;border-radius:3px;font-size:12px;letter-spacing:2px;color:#fff;}
#logo .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#logo .sub{font-size:11px;letter-spacing:2px;color:#aab;font-weight:600;margin-left:4px;}
#clock{top:14px;right:18px;text-align:right;font-variant-numeric:tabular-nums;}
#clock .t{font-size:30px;font-weight:800;letter-spacing:2px;color:#fff;}
#clock .d{font-size:11px;letter-spacing:3px;color:#9ab;margin-top:2px;}
#weather{top:60px;right:18px;font-size:11px;letter-spacing:2px;color:#cdd;text-align:right;}
#camLabel{bottom:130px;left:18px;font-size:11px;letter-spacing:3px;color:#fff;background:rgba(0,0,0,.55);padding:6px 12px;border-left:3px solid #ff3870;font-weight:700;}
#camLabel .cn{color:#ff5d8c;margin-right:8px;}
#minimap{bottom:18px;right:18px;width:200px;height:200px;background:rgba(2,4,10,.78);border:1px solid #2a3a55;border-radius:4px;}
#minimap canvas{width:100%;height:100%;display:block;}
#chyron{bottom:18px;left:18px;right:240px;height:48px;background:linear-gradient(90deg,rgba(8,12,24,.95),rgba(20,30,55,.92));border-top:2px solid #ff3870;display:flex;align-items:center;overflow:hidden;font-weight:700;}
#chyron .src{flex:0 0 auto;background:#ff3870;color:#fff;padding:14px 16px;font-size:11px;letter-spacing:3px;height:100%;display:flex;align-items:center;}
#chyron .msg{flex:1;padding:0 16px;font-size:14px;letter-spacing:1px;color:#fff;white-space:nowrap;overflow:hidden;}
#chyron .msg span{display:inline-block;animation:scroll 22s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
#lowerThird{bottom:74px;left:18px;background:rgba(8,12,24,.85);border-left:4px solid #4dd2ff;padding:10px 16px;font-size:13px;letter-spacing:1px;display:none;max-width:380px;}
#lowerThird .who{font-size:10px;color:#4dd2ff;letter-spacing:3px;font-weight:800;}
#lowerThird .name{font-size:18px;color:#fff;font-weight:800;margin:3px 0;}
#lowerThird .desc{font-size:11px;color:#bcd;letter-spacing:1px;}
#actBadge{top:60px;left:18px;font-size:10px;letter-spacing:3px;color:#ffd76d;background:rgba(0,0,0,.5);padding:4px 9px;border-radius:2px;font-weight:700;}
#reseedOverlay{position:fixed;inset:0;background:rgba(2,4,10,.92);display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:50;text-align:center;letter-spacing:3px;}
#reseedOverlay .big{font-size:30px;font-weight:900;color:#ff3870;}
#reseedOverlay .sm{font-size:12px;color:#9ab;margin-top:10px;letter-spacing:4px;}
#reseedOverlay.show{display:flex;}
#corner{bottom:230px;right:18px;font-size:9px;letter-spacing:2px;color:#67809a;text-align:right;}
</style>
</head>
<body>
<!-- ROUND15_MEGA v1 -->
<canvas id="c"></canvas>
<div id="logo" class="hud"><span>TOKYO LIVE</span><span class="live"><span class="dot"></span>LIVE</span><span class="sub">CH 138</span></div>
<div id="clock" class="hud"><div class="t" id="clockT">18:00</div><div class="d" id="clockD">JST · TUE</div></div>
<div id="weather" class="hud" id="weather">CLEAR · 18°C · WIND 4kph SE</div>
<div id="actBadge" class="hud" id="actBadge">ACT 1 — RUSH HOUR</div>
<div id="camLabel" class="hud"><span class="cn" id="camN">CAM 01</span><span id="camT">SHIBUYA AERIAL</span></div>
<div id="lowerThird" class="hud"><div class="who" id="ltWho">WHO IS</div><div class="name" id="ltName">—</div><div class="desc" id="ltDesc">—</div></div>
<div id="chyron" class="hud"><div class="src" id="chSrc">BREAKING</div><div class="msg"><span id="chMsg">TOKYO LIVE — TUESDAY EVENING — SHIBUYA RUSH HOUR — STAY TUNED</span></div></div>
<div id="minimap" class="hud"><canvas id="mm" width="200" height="200"></canvas></div>
<div id="corner" class="hud">RNDR · 60FPS · BCAST 138.0</div>
<div id="reseedOverlay"><div class="big">TOKYO LIVE</div><div class="sm">RESEEDING NEXT BLOCK…</div></div>
<script>
(function(){
'use strict';

// ========== STATE ==========
var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.setSize(window.innerWidth,window.innerHeight,false);
renderer.shadowMap.enabled=false;

var scene,camera;
var disposables=[];
var timers=[];
var rafId=null;
var clock=new THREE.Clock();
var simStart=18*3600;
var simSpeed=30;
var simElapsed=0;
var blockStart=performance.now();
var blockMs=600000;
var camIdx=0;
var camTimer=0;
var camDuration=10;
var fromPos=new THREE.Vector3(),fromTarget=new THREE.Vector3();
var toPos=new THREE.Vector3(),toTarget=new THREE.Vector3();
var lerpT=0;
var rng=mulberry32(8675309);
var crowdMesh=null,crowdData=[],crowdCount=220;
var trainMesh=null,trainData={x:300,active:false,phase:0};
var rainPts=null,rainPos=null;
var sky=null,sunMat=null;
var hotspots=[];
var cast=[];
var castTimer=0,castIdx=0;
var chyronQueue=[];
var chyronTimer=0;
var actState={i:0,name:'RUSH HOUR'};
var ground=null,groundMat=null;
var streetLights=[];
var trainEvery=24,trainCD=4;
var pedSpinTime=0;
var bicycleMesh=null,bicycleData={x:-60,z:30,a:0};
var ramenMesh=null;
var lastTickSim=-1;
var raining=false;
var domClockT=document.getElementById('clockT');
var domClockD=document.getElementById('clockD');
var domWeather=document.getElementById('weather');
var domAct=document.getElementById('actBadge');
var domCamN=document.getElementById('camN');
var domCamT=document.getElementById('camT');
var domLT=document.getElementById('lowerThird');
var domLTWho=document.getElementById('ltWho');
var domLTName=document.getElementById('ltName');
var domLTDesc=document.getElementById('ltDesc');
var domChSrc=document.getElementById('chSrc');
var domChMsg=document.getElementById('chMsg');
var domReseed=document.getElementById('reseedOverlay');
var mm=document.getElementById('mm');
var mmCtx=mm.getContext('2d');

// ========== UTIL ==========
function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
function rand(a,b){return a+rng()*(b-a);}
function track(o){disposables.push(o);return o;}
function trackTimer(id){timers.push(id);return id;}
function dispose(o){if(!o)return;if(o.geometry&&o.geometry.dispose)o.geometry.dispose();if(o.material){if(Array.isArray(o.material))o.material.forEach(function(m){if(m.map)m.map.dispose();m.dispose();});else{if(o.material.map)o.material.map.dispose();o.material.dispose();}}}
function disposeAll(){
  if(rafId!==null){cancelAnimationFrame(rafId);rafId=null;}
  timers.forEach(function(t){clearTimeout(t);clearInterval(t);});
  timers.length=0;
  if(scene){
    scene.traverse(function(o){
      if(o.isMesh||o.isPoints||o.isLine||o.isSprite||o.isInstancedMesh){dispose(o);}
    });
    while(scene.children.length>0)scene.remove(scene.children[0]);
  }
  disposables.forEach(function(o){if(o&&o.dispose)try{o.dispose();}catch(e){}});
  disposables.length=0;
  crowdData.length=0;
  cast.length=0;
  hotspots.length=0;
  streetLights.length=0;
  chyronQueue.length=0;
  crowdMesh=trainMesh=rainPts=sky=ground=bicycleMesh=ramenMesh=null;
}

// ========== BUILDERS ==========
function makeMat(color,emissive,opts){
  opts=opts||{};
  var p={color:color,emissive:emissive||0x000000};
  if(opts.shin!==undefined)p.shininess=opts.shin;
  if(opts.flat)p.flatShading=true;
  if(opts.trans){p.transparent=true;p.opacity=opts.opacity!==undefined?opts.opacity:0.6;}
  return new THREE.MeshLambertMaterial({color:color,emissive:emissive||0x000000,transparent:!!opts.trans,opacity:opts.opacity!==undefined?opts.opacity:1});
}

function buildSky(){
  var g=new THREE.SphereGeometry(900,32,16);
  var m=new THREE.ShaderMaterial({
    uniforms:{tHour:{value:18},tRain:{value:0}},
    vertexShader:'varying vec3 vN;void main(){vN=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:[
      'varying vec3 vN;uniform float tHour;uniform float tRain;',
      'void main(){',
      'float h=clamp((tHour-18.0)/5.0,0.0,1.0);',
      'vec3 dawn=vec3(0.95,0.45,0.35);',
      'vec3 dusk=vec3(0.45,0.20,0.42);',
      'vec3 night=vec3(0.04,0.05,0.12);',
      'vec3 horiz=mix(dusk,night,smoothstep(0.0,0.7,h));',
      'horiz=mix(dawn,horiz,smoothstep(0.0,0.3,h));',
      'vec3 zen=mix(vec3(0.18,0.12,0.30),vec3(0.02,0.02,0.08),h);',
      'float y=clamp(vN.y*0.8+0.2,0.0,1.0);',
      'vec3 col=mix(horiz,zen,y);',
      'col=mix(col,vec3(0.04,0.05,0.10),tRain*0.6);',
      'gl_FragColor=vec4(col,1.0);}'
    ].join('\n'),
    side:THREE.BackSide,
    depthWrite:false
  });
  track(m);
  var sk=new THREE.Mesh(g,m);
  track(g);
  scene.add(sk);
  sky=sk;sunMat=m;
}

function buildGround(){
  var g=new THREE.PlaneGeometry(900,900,1,1);
  var m=new THREE.MeshLambertMaterial({color:0x101218});
  track(g);track(m);
  ground=new THREE.Mesh(g,m);
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);
  groundMat=m;
}

function buildRoads(){
  var rg=new THREE.PlaneGeometry(20,500);
  var rm=new THREE.MeshLambertMaterial({color:0x0c0f15});
  track(rg);track(rm);
  // Big roads connecting hotspots, simple geometry (low cost)
  var coords=[
    {x:0,z:0,rot:0,len:200,w:24},
    {x:0,z:0,rot:Math.PI/2,len:200,w:24},
    {x:80,z:40,rot:0,len:120,w:14},
    {x:-40,z:80,rot:Math.PI/2,len:120,w:14}
  ];
  coords.forEach(function(c){
    var g=new THREE.PlaneGeometry(c.w,c.len);
    var mesh=new THREE.Mesh(g,rm);
    mesh.rotation.x=-Math.PI/2;
    mesh.rotation.z=c.rot;
    mesh.position.set(c.x,0.02,c.z);
    track(g);
    scene.add(mesh);
  });
  // Crosswalk stripes Shibuya scramble
  var stripeMat=new THREE.MeshBasicMaterial({color:0xeeeeee});
  track(stripeMat);
  for(var i=0;i<8;i++){
    var sg=new THREE.PlaneGeometry(2,18);
    track(sg);
    var s=new THREE.Mesh(sg,stripeMat);
    s.rotation.x=-Math.PI/2;
    s.position.set(-9+i*2.6,0.04,-10);
    scene.add(s);
  }
  for(var j=0;j<8;j++){
    var sg2=new THREE.PlaneGeometry(18,2);
    track(sg2);
    var s2=new THREE.Mesh(sg2,stripeMat);
    s2.rotation.x=-Math.PI/2;
    s2.position.set(0,0.04,-19+j*2.6);
    scene.add(s2);
  }
}

function buildBuilding(x,z,w,d,h,col,emis,winCol){
  var bg=new THREE.BoxGeometry(w,h,d);
  var bm=new THREE.MeshLambertMaterial({color:col});
  track(bg);track(bm);
  var b=new THREE.Mesh(bg,bm);
  b.position.set(x,h/2,z);
  scene.add(b);
  // Window strips (plane decals)
  var wm=new THREE.MeshBasicMaterial({color:winCol||0xffd370,transparent:true,opacity:0.92});
  track(wm);
  var rows=Math.max(2,Math.floor(h/3.5));
  for(var r=0;r<rows;r++){
    var y=2+r*3.4;
    if(y>h-1)continue;
    if(rng()<0.35)continue;
    var pg=new THREE.PlaneGeometry(w*0.9,1.4);
    track(pg);
    var pf=new THREE.Mesh(pg,wm);
    pf.position.set(x,y,z+d/2+0.02);
    scene.add(pf);
    var pb=new THREE.Mesh(pg,wm);
    pb.position.set(x,y,z-d/2-0.02);
    pb.rotation.y=Math.PI;
    scene.add(pb);
    var sg=new THREE.PlaneGeometry(d*0.9,1.4);
    track(sg);
    var ps=new THREE.Mesh(sg,wm);
    ps.position.set(x+w/2+0.02,y,z);
    ps.rotation.y=Math.PI/2;
    scene.add(ps);
    var ps2=new THREE.Mesh(sg,wm);
    ps2.position.set(x-w/2-0.02,y,z);
    ps2.rotation.y=-Math.PI/2;
    scene.add(ps2);
  }
  return b;
}

function buildSign(x,y,z,w,h,color,rotY){
  var g=new THREE.PlaneGeometry(w,h);
  var m=new THREE.MeshBasicMaterial({color:color});
  track(g);track(m);
  var s=new THREE.Mesh(g,m);
  s.position.set(x,y,z);
  if(rotY!==undefined)s.rotation.y=rotY;
  scene.add(s);
  // glow plane behind
  var gg=new THREE.PlaneGeometry(w*1.2,h*1.2);
  var gm=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending});
  track(gg);track(gm);
  var gs=new THREE.Mesh(gg,gm);
  gs.position.set(x,y,z+(rotY===undefined?-0.05:0));
  if(rotY!==undefined)gs.rotation.y=rotY;
  scene.add(gs);
  return s;
}

function buildShibuya(){
  // Center plaza ~ origin
  // Tall buildings around the scramble
  buildBuilding(-25,-25,28,28,40,0x1a1d28,0,0xffe588);
  buildBuilding(25,-25,28,28,52,0x161922,0,0xfff0a0);
  buildBuilding(-25,25,28,28,46,0x1a1820,0,0xfecc66);
  buildBuilding(25,25,28,28,60,0x14161e,0,0xffeeaa);
  // Big neon billboards
  buildSign(0,30,-39,18,12,0xff3870,0);
  buildSign(0,46,-39,16,8,0x4dd2ff,0);
  buildSign(-39,28,0,18,10,0xffd76d,Math.PI/2);
  buildSign(39,32,0,20,12,0x9bff7d,-Math.PI/2);
  // Massive video board (north tower) - animated material plane swap via uniforms
  var boardGeo=new THREE.PlaneGeometry(22,12);
  var boardMat=new THREE.ShaderMaterial({
    uniforms:{t:{value:0}},
    vertexShader:'varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:[
      'varying vec2 vU;uniform float t;',
      'float bar(vec2 u,float y,float h){return smoothstep(h,h*0.6,abs(u.y-y));}',
      'void main(){',
      'vec3 c=vec3(0.05,0.06,0.10);',
      'float s1=sin(vU.x*30.0+t*2.0)*0.5+0.5;',
      'float s2=sin(vU.x*12.0-t*3.0)*0.5+0.5;',
      'c+=vec3(1.0,0.22,0.44)*bar(vU,0.7,0.08)*s1;',
      'c+=vec3(0.30,0.82,1.0)*bar(vU,0.4,0.07)*s2;',
      'c+=vec3(1.0,0.86,0.4)*bar(vU,0.18,0.05)*(0.5+0.5*sin(t*4.0+vU.x*6.0));',
      'float scan=mod(vU.y*180.0-t*8.0,2.0)<1.0?0.85:1.0;',
      'gl_FragColor=vec4(c*scan,1.0);}'
    ].join('\n'),
    side:THREE.DoubleSide
  });
  track(boardGeo);track(boardMat);
  var bd=new THREE.Mesh(boardGeo,boardMat);
  bd.position.set(0,40,-39.5);
  scene.add(bd);
  bd.userData.shader=boardMat;
  scene.userData.bdMat=boardMat;
  // Traffic lights (poles)
  for(var i=0;i<4;i++){
    var ang=i*Math.PI/2+Math.PI/4;
    var px=Math.cos(ang)*18,pz=Math.sin(ang)*18;
    var pg=new THREE.CylinderGeometry(0.3,0.3,8,6);
    var pm=new THREE.MeshLambertMaterial({color:0x222});
    track(pg);track(pm);
    var pole=new THREE.Mesh(pg,pm);
    pole.position.set(px,4,pz);
    scene.add(pole);
    var lg=new THREE.SphereGeometry(0.6,8,6);
    var lm=new THREE.MeshBasicMaterial({color:0xff0040});
    track(lg);track(lm);
    var l=new THREE.Mesh(lg,lm);
    l.position.set(px,8,pz);
    scene.add(l);
    streetLights.push({mesh:l,mat:lm});
  }
}

function buildStation(){
  // Station block at z=-100
  var g=new THREE.BoxGeometry(80,16,30);
  var m=new THREE.MeshLambertMaterial({color:0x252830});
  track(g);track(m);
  var b=new THREE.Mesh(g,m);
  b.position.set(0,8,-100);
  scene.add(b);
  // Roof curve
  var rg=new THREE.CylinderGeometry(20,20,82,12,1,false,0,Math.PI);
  var rm=new THREE.MeshLambertMaterial({color:0x2a3142});
  track(rg);track(rm);
  var roof=new THREE.Mesh(rg,rm);
  roof.rotation.z=Math.PI/2;
  roof.position.set(0,18,-100);
  scene.add(roof);
  // Platform (long thin)
  var pg=new THREE.BoxGeometry(220,1,8);
  var pm=new THREE.MeshLambertMaterial({color:0x42454d});
  track(pg);track(pm);
  var plat=new THREE.Mesh(pg,pm);
  plat.position.set(0,0.6,-115);
  scene.add(plat);
  // Yellow safety strip
  var ysg=new THREE.PlaneGeometry(220,0.5);
  var ysm=new THREE.MeshBasicMaterial({color:0xffcc33});
  track(ysg);track(ysm);
  var ys=new THREE.Mesh(ysg,ysm);
  ys.rotation.x=-Math.PI/2;
  ys.position.set(0,1.12,-111.5);
  scene.add(ys);
  // Tracks
  var tg=new THREE.BoxGeometry(220,0.2,5);
  var tm=new THREE.MeshLambertMaterial({color:0x1a1d22});
  track(tg);track(tm);
  var t=new THREE.Mesh(tg,tm);
  t.position.set(0,0.1,-122);
  scene.add(t);
  // Train
  var trg=new THREE.BoxGeometry(70,4,3);
  var trm=new THREE.MeshLambertMaterial({color:0x2cba6c,emissive:0x1aa05c,emissiveIntensity:0.4});
  track(trg);track(trm);
  trainMesh=new THREE.Mesh(trg,trm);
  trainMesh.position.set(300,3,-122);
  scene.add(trainMesh);
  // Yamanote stripe
  var stg=new THREE.BoxGeometry(70,1,3.05);
  var stm=new THREE.MeshBasicMaterial({color:0x5dff9b});
  track(stg);track(stm);
  var st=new THREE.Mesh(stg,stm);
  st.position.set(0,3,0);
  trainMesh.add(st);
  // Train windows row
  var twg=new THREE.PlaneGeometry(64,2);
  var twm=new THREE.MeshBasicMaterial({color:0xffe9b8});
  track(twg);track(twm);
  var tw=new THREE.Mesh(twg,twm);
  tw.position.set(0,4,1.6);
  trainMesh.add(tw);
  // Station name sign
  buildSign(0,18,-84.5,30,4,0x4dd2ff);
}

function buildNeonAlley(){
  // narrow alley at +X
  // floor
  var ag=new THREE.PlaneGeometry(28,80);
  var am=new THREE.MeshLambertMaterial({color:0x12141a});
  track(ag);track(am);
  var a=new THREE.Mesh(ag,am);
  a.rotation.x=-Math.PI/2;
  a.position.set(80,0.05,0);
  scene.add(a);
  // walls (two long buildings)
  buildBuilding(80-16,0,4,90,30,0x1a1820,0,0xff5d8c);
  buildBuilding(80+16,0,4,90,30,0x18161c,0,0x9bff7d);
  // many vertical neon signs
  var colors=[0xff3870,0x4dd2ff,0xffd76d,0x9bff7d,0xa55dff,0xff8c4d];
  for(var i=0;i<22;i++){
    var z=rand(-40,40);
    var side=rng()<0.5?-1:1;
    var c=colors[Math.floor(rng()*colors.length)];
    buildSign(80+side*13.5,rand(4,18),z,1.5,rand(3,7),c,side<0?Math.PI/2:-Math.PI/2);
  }
  // hanging lanterns
  var lg=new THREE.SphereGeometry(0.6,8,6);
  var lm=new THREE.MeshBasicMaterial({color:0xff7733});
  track(lg);track(lm);
  for(var k=0;k<10;k++){
    var ln=new THREE.Mesh(lg,lm);
    ln.position.set(80+rand(-6,6),rand(5,7),-35+k*8);
    scene.add(ln);
  }
}

function buildKonbini(){
  // small lit shop at +Z
  buildBuilding(0,80,16,12,5,0xeeeeee,0,0xfdfdff);
  // big window facade
  var fg=new THREE.PlaneGeometry(15,4);
  var fm=new THREE.MeshBasicMaterial({color:0xfdfff5});
  track(fg);track(fm);
  var f=new THREE.Mesh(fg,fm);
  f.position.set(0,2.5,73.95);

function applyCam(c,instant){
  fromPos.copy(camera.position);
  fromTarget.copy(toTarget);
  if(instant)fromTarget.set(c.look[0],c.look[1],c.look[2]);
  toPos.set(c.pos[0],c.pos[1],c.pos[2]);

}

function chooseNextCamera(){
  var simH=18+(simElapsed*simSpeed)/3600;
  var ai=getActIndex(simH);
  var w=acts[ai].camWeights;
  var pool=[];
  cameras.forEach(function(c){
    var weight=(w[c.hub]||1);
    for(var i=0;i<weight;i++)pool.push(c);
  });
  pool=pool.filter(function(c){return c.n!==cameras[camIdx].n;});
  var pick=pool[Math.floor(rng()*pool.length)];
  for(var i=0;i<cameras.length;i++)if(cameras[i].n===pick.n){camIdx=i;break;}
  applyCam(pick,false);
  camDuration=rand(7,13);
  camTimer=0;
}

function updateCrowd(dt){
  if(!crowdMesh)return;
  var simH=18+(simElapsed*simSpeed)/3600;
  var simSec=simElapsed*simSpeed;
  var greenLight=Math.floor(simSec/14)%2===0;
  var mtx=new THREE.Matrix4();
  var q=new THREE.Quaternion();
  var s=new THREE.Vector3(1,1,1);
  var v=new THREE.Vector3();
  for(var i=0;i<crowdData.length;i++){
    var p=crowdData[i];
    if(p.role===0){
      // Scramble
      if(greenLight){
        var dx=-p.x,dz=-p.z;
        var dist=Math.sqrt(dx*dx+dz*dz);
        if(dist<6){
          // pick a new far target
          var ang=rng()*Math.PI*2;
          p.target=ang;
          p.x=Math.cos(ang)*18;
          p.z=Math.sin(ang)*18;
          dx=-p.x;dz=-p.z;
        }
        v.set(dx,0,dz).normalize();
        p.x+=v.x*p.sp*dt*4;
        p.z+=v.z*p.sp*dt*4;
      } else {
        // hover at edge
        var ax=p.x,az=p.z;
        var d2=Math.sqrt(ax*ax+az*az);
        if(d2<16){
          p.x*=1.005;p.z*=1.005;
        }
        p.x+=Math.sin(simSec*0.3+p.phase)*0.01;
      }
    } else if(p.role===1){
      // Station — flow toward platform when train arriving
      if(trainData.active){
        var tz=-115;
        p.z+=(tz-p.z)*0.012*p.sp;
      } else {
        p.x+=Math.sin(simSec*0.4+p.phase)*0.04;
        p.z+=Math.cos(simSec*0.3+p.phase)*0.03;
        if(p.z<-130)p.z=-130;
        if(p.z>-90)p.z=-90;
      }
    } else if(p.role===2){
      // Alley wander (Neon)
      p.z+=p.sp*dt*1.5*Math.sign(Math.sin(p.phase+simSec*0.05));
      if(p.z>40)p.z=-40;
      if(p.z<-40)p.z=40;
      p.x=p.hub.x+Math.sin(simSec*0.3+p.phase)*5;
    } else if(p.role===3){
      // Konbini queue
      p.x+=Math.sin(simSec+p.phase)*0.01;
      p.z=78+Math.cos(simSec*0.4+p.phase)*1.5;
    } else {
      // Karaoke
      p.x=p.hub.x+Math.sin(simSec*0.3+p.phase)*4;
      p.z=p.hub.z+Math.cos(simSec*0.3+p.phase)*4;
    }
    var bob=Math.sin(simSec*4+p.phase)*0.04;
    v.set(p.x,p.h/2+bob,p.z);
    mtx.compose(v,q,s.set(1,p.h/1.6,1));
    crowdMesh.setMatrixAt(i,mtx);
  }
  crowdMesh.instanceMatrix.needsUpdate=true;
}

function updateTrain(dt){
  if(!trainMesh)return;
  trainCD-=dt;
  if(!trainData.active&&trainCD<=0){
    trainData.active=true;
    trainData.x=300;
    trainData.phase=0;
    pushChyron({src:'JR EAST',msg:'YAMANOTE LINE — TRAIN ARRIVING — PLATFORM 2'});
  }
  if(trainData.active){
    trainData.phase+=dt;
    if(trainData.phase<3.5){
      trainData.x-=dt*90;
      if(trainData.x<0)trainData.x=0;
    } else if(trainData.phase<8){
      trainData.x=0;
    } else if(trainData.phase<12){
      trainData.x-=dt*70;
    } else {
      trainData.active=false;
      trainCD=trainEvery+rand(-3,3);
    }
    trainMesh.position.x=trainData.x;
  }
}

function updateBicycle(dt){
  if(!bicycleMesh)return;

  bicycleMesh.position.set(bicycleData.x,0,30+Math.sin(bicycleData.x*0.1)*1.5);
  bicycleMesh.rotation.y=Math.PI/2+Math.sin(bicycleData.x*0.1)*0.1;
}

function updateRain(dt){
  if(!rainPts)return;
  var simH=18+(simElapsed*simSpeed)/3600;
  raining=(simH>=21&&simH<22)||(simH>=22.5&&simH<23);
  var target=raining?0.7:0.0;
  rainPts.material.opacity+=(target-rainPts.material.opacity)*dt*2;
  if(rainPts.material.opacity>0.05){
    var pos=rainPos;
    for(var i=0;i<pos.length;i+=3){
      pos[i+1]-=dt*60;
      if(pos[i+1]<0){
        pos[i+1]=80;
        pos[i]=rand(-200,200);
        pos[i+2]=rand(-200,200);
      }
    }
    rainPts.geometry.attributes.position.needsUpdate=true;
  }
  if(groundMat){
    var wet=raining?0x14181f:0x101218;
    groundMat.color.setHex(wet);
  }
}

function updateClock(){
  var simSec=simStart+simElapsed*simSpeed;
  var totalMin=Math.floor(simSec/60)%(24*60);
  var hh=Math.floor(totalMin/60),mm=totalMin%60;
  domClockT.textContent=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
  var simH=hh+mm/60;
  var ai=getActIndex(simH);
  if(ai!==actState.i){
    actState.i=ai;
    actState.name=acts[ai].name;
    domAct.textContent='ACT '+(ai+1)+' — '+acts[ai].name;
    pushChyron({src:'TOKYO LIVE',msg:'NOW: '+acts[ai].name+' — TUNE IN'});
  }
  if(raining)domWeather.textContent='LIGHT RAIN · 16°C · WIND 6kph SE';
  else if(simH>=22)domWeather.textContent='COOL · 14°C · CLEAR';
  else domWeather.textContent='CLEAR · 18°C · WIND 4kph SE';
}

function updateMinimap(){
  var ctx=mmCtx;
  ctx.fillStyle='rgba(2,4,10,0.92)';
  ctx.fillRect(0,0,200,200);
  // Roads
  ctx.strokeStyle='#1a2238';
  ctx.lineWidth=14;
  ctx.beginPath();
  ctx.moveTo(100,0);ctx.lineTo(100,200);
  ctx.moveTo(0,100);ctx.lineTo(200,100);
  ctx.stroke();
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(0,140);ctx.lineTo(200,140);
  ctx.stroke();
  // Hotspots (world ±100 -> 0..200)
  var w2m=function(x,z){return [100+x*0.9,100+z*0.9];};
  hotspots.forEach(function(h){
    var p=w2m(h.x,h.z);
    var current=cameras[camIdx].hub===h.key;
    ctx.fillStyle=h.col;
    ctx.beginPath();
    ctx.arc(p[0],p[1],current?8:5,0,Math.PI*2);
    ctx.fill();
    if(current){
      ctx.strokeStyle='#fff';
      ctx.lineWidth=2;
      ctx.stroke();
    }
    ctx.fillStyle='#fff';
    ctx.font='9px sans-serif';
    ctx.fillText(h.name,p[0]+10,p[1]+3);
  });
  // Train marker
  if(trainMesh){
    var tp=w2m(trainMesh.position.x,trainMesh.position.z);
    if(tp[0]>=0&&tp[0]<=200){
      ctx.fillStyle='#5dff9b';
      ctx.fillRect(tp[0]-6,tp[1]-1,12,3);
    }
  }
  // Camera direction pin
  var cp=w2m(camera.position.x,camera.position.z);
  ctx.strokeStyle='#ff3870';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(cp[0],cp[1],4,0,Math.PI*2);
  ctx.stroke();
  // Title
  ctx.fillStyle='#9ab';
  ctx.font='8px sans-serif';
  ctx.fillText('TOKYO · CH 138',6,12);
  // Crowd dots (sample)
  ctx.fillStyle='rgba(255,255,255,0.18)';
  for(var i=0;i<crowdData.length;i+=4){
    var d=crowdData[i];
    var p=w2m(d.x,d.z);
    ctx.fillRect(p[0],p[1],1,1);
  }
}

// ========== ANIMATE ==========
function animate(){
  rafId=requestAnimationFrame(animate);
  var dt=Math.min(0.1,clock.getDelta());
  simElapsed+=dt;
  // Camera transition
  camTimer+=dt;
  if(lerpT<1){
    lerpT=Math.min(1,lerpT+dt/1.2);
    var ease=lerpT*lerpT*(3-2*lerpT);
    camera.position.lerpVectors(fromPos,toPos,ease);
    var t=new THREE.Vector3().lerpVectors(fromTarget,toTarget,ease);
    camera.lookAt(t);
  } else {
    camera.lookAt(toTarget);
  }
  if(camTimer>=camDuration)chooseNextCamera();
  updateCrowd(dt);
  updateTrain(dt);
  updateBicycle(dt);
  updateLights(dt);
  updateRain(dt);
  updateClock();
  updateMinimap();
  // Animated billboard
  if(scene.userData.bdMat)scene.userData.bdMat.uniforms.t.value=simElapsed;
  renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
  if(!camera)return;
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight,false);
});

// ========== START ==========
init();
animate();

})();
</script>
