<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏰 MEDIEVAL FEAST DAY — Realmvision Live</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
:root{
  --park:#f3e2b6; --park-2:#e6cd8b; --ink:#2a1a0a; --ink-2:#4a2c10;
  --gold:#d8a93b; --gold-2:#f0d27a; --blood:#7a1e1e; --moss:#3e5a2a;
  --night:#0e0a14; --flame:#ff8a3d; --stain-r:#a8203a; --stain-b:#1f4e8a; --stain-g:#1f7a3a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0805;color:var(--ink);
  font-family:'Cinzel','Trajan Pro','Times New Roman',serif;overflow:hidden;font-size:13px;line-height:1.35}
canvas#bg{position:fixed;inset:0;z-index:0;display:block}
#hud{position:fixed;inset:0;z-index:2;pointer-events:none}
.panel{position:absolute;background:linear-gradient(180deg,#f5e4b6 0%,#dfc587 100%);
  border:2px solid #6b4a18;border-radius:6px;color:#2a1a0a;
  box-shadow:0 4px 18px rgba(0,0,0,.55), inset 0 0 30px rgba(120,80,20,.18);
  padding:8px 10px}
.panel::before{content:'';position:absolute;inset:3px;border:1px solid rgba(106,74,24,.5);border-radius:4px;pointer-events:none}
.title{font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#3a2208}
.muted{color:#6a4a1a}
.gold{color:#a8801a}
.tag{display:inline-block;padding:1px 6px;border:1px solid #6b4a18;border-radius:3px;background:rgba(255,235,180,.5);font-size:10px;margin-right:3px}

#logo{top:14px;left:14px;width:340px;display:flex;align-items:center;gap:10px}
#logo .crest{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f6dc8a,#a87a1a 70%,#5a3a08);
  border:2px solid #5a3a08;display:flex;align-items:center;justify-content:center;font-size:24px;color:#2a1a08;
  text-shadow:0 1px 0 #f6dc8a}
#logo .ttl{font-weight:900;font-size:15px;letter-spacing:.18em;line-height:1.1}
#logo .sub{font-size:10px;letter-spacing:.3em;color:#6a4a1a}
#logo .live{display:inline-block;margin-left:6px;padding:2px 6px;background:#7a1e1e;color:#f6dc8a;
  border-radius:3px;font-size:9px;letter-spacing:.18em;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

#sun{top:14px;right:14px;width:280px;padding:10px 12px}
#sun .row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
#sun .arc{position:relative;height:46px;margin:6px 0 2px}
#sun .arc svg{width:100%;height:100%;display:block}
#sun .phases{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.18em;color:#6a4a1a}
#sun .phases span.act{color:#7a1e1e;font-weight:900}

#minimap{top:90px;left:14px;width:260px;height:200px;padding:8px}
#minimap canvas{width:100%;height:100%;display:block;border-radius:4px;
  filter:sepia(.35) contrast(1.1) saturate(.9)}
#minimap .lbl{position:absolute;top:4px;left:14px;font-size:10px;letter-spacing:.22em;color:#5a3a08}

#family{bottom:130px;left:14px;width:260px;padding:8px 10px}
#family .ttl{font-size:10px;letter-spacing:.2em;color:#5a3a08;margin-bottom:4px}
#family .tree{font-size:11px;line-height:1.5}
#family .king{font-weight:900;color:#7a1e1e}
#family .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#7a1e1e;margin:0 4px}

#cast{top:90px;right:14px;width:280px;padding:8px 10px;min-height:100px}
#cast .ttl{font-size:10px;letter-spacing:.2em;color:#5a3a08}
#cast .who{font-size:18px;font-weight:900;color:#3a2208;margin-top:4px;letter-spacing:.06em}
#cast .role{font-size:11px;color:#5a3a08;letter-spacing:.12em;margin-top:1px;font-style:italic}
#cast .quip{font-size:11px;color:#3a2208;margin-top:6px;border-top:1px dashed #8a6a2a;padding-top:5px;line-height:1.45}

#ticker{position:absolute;bottom:64px;left:14px;right:14px;height:46px;padding:0;
  background:linear-gradient(180deg,#f5e4b6,#dfc587);border:2px solid #6b4a18;border-radius:6px;
  display:flex;align-items:center;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.55), inset 0 0 30px rgba(120,80,20,.2)}
#ticker .badge{flex:0 0 auto;padding:0 14px;height:100%;display:flex;align-items:center;
  background:#7a1e1e;color:#f6dc8a;font-weight:900;letter-spacing:.22em;font-size:12px}
#ticker .scroll{flex:1;overflow:hidden;position:relative;height:100%}
#ticker .scroll .inner{position:absolute;white-space:nowrap;font-size:14px;color:#2a1a08;
  letter-spacing:.06em;line-height:46px;will-change:transform;font-weight:600}

#chyron{position:absolute;bottom:14px;left:14px;right:14px;height:42px;padding:0;
  background:linear-gradient(180deg,#3a2208,#1a0d02);border:2px solid #6b4a18;border-radius:6px;
  display:flex;align-items:center;color:#f6dc8a;
  box-shadow:0 4px 18px rgba(0,0,0,.6), inset 0 0 30px rgba(0,0,0,.6)}
#chyron .h{flex:0 0 auto;padding:0 14px;height:100%;display:flex;align-items:center;
  background:#a8801a;color:#1a0d02;font-weight:900;letter-spacing:.24em;font-size:11px}
#chyron .msg{flex:1;padding:0 14px;font-size:13px;letter-spacing:.06em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}

#camLabel{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(20,8,2,.78);color:#f6dc8a;padding:4px 12px;border:1px solid #6b4a18;border-radius:3px;
  font-size:11px;letter-spacing:.22em}

#actCard{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
  color:#f6dc8a;font-weight:900;letter-spacing:.32em;font-size:36px;
  text-shadow:0 0 20px rgba(0,0,0,.9), 0 0 40px rgba(168,128,26,.6);
  opacity:0;transition:opacity .8s;pointer-events:none}
#actCard .sub{display:block;font-size:14px;letter-spacing:.4em;color:#dfc587;margin-top:8px;font-weight:400;font-style:italic}

#dawnFlash{position:absolute;inset:0;background:#f6dc8a;opacity:0;pointer-events:none;transition:opacity 1s}

#bottomMid{position:absolute;bottom:114px;left:50%;transform:translateX(-50%);
  background:rgba(20,8,2,.7);color:#f6dc8a;padding:5px 14px;border:1px solid #6b4a18;border-radius:3px;
  font-size:11px;letter-spacing:.18em;display:flex;gap:14px;align-items:center}
#bottomMid .dot{width:6px;height:6px;border-radius:50%;background:#7a1e1e;animation:pulse 1.4s infinite}

@media (max-width:980px){
  #cast,#family,#minimap,#sun{display:none}
}
</style>
</head>
<body>
<!-- ROUND15_MEGA v1 -->
<canvas id="bg"></canvas>
<div id="hud">
  <div id="logo" class="panel">
    <div class="crest">⚜</div>
    <div>
      <div class="ttl">REALMVISION<span class="live">● LIVE</span></div>
      <div class="sub">DAY OF THE FEAST</div>
    </div>
  </div>
  <div id="sun" class="panel">
    <div class="row"><span class="title">SUN</span><span id="sunHr" class="gold">— —</span></div>
    <div class="arc">
      <svg viewBox="0 0 200 50" preserveAspectRatio="none">
        <path d="M 4 46 Q 100 -12 196 46" stroke="#6a4a1a" stroke-width="1.4" fill="none" stroke-dasharray="3 3"/>
        <circle id="sunDot" cx="4" cy="46" r="6" fill="#f0c040" stroke="#7a1e1e" stroke-width="1.2"/>
      </svg>
    </div>
    <div class="phases"><span data-p="DAWN">DAWN</span><span data-p="MORN">MORN</span><span data-p="NOON">NOON</span><span data-p="EVE">EVE</span><span data-p="NIGHT">NIGHT</span></div>
  </div>
  <div id="minimap" class="panel">
    <div class="lbl">— THE KINGDOM —</div>
    <canvas id="mm" width="280" height="220"></canvas>
  </div>
  <div id="family" class="panel">
    <div class="ttl">— ROYAL HOUSE —</div>
    <div class="tree" id="famTree"></div>
  </div>
  <div id="cast" class="panel">
    <div class="ttl">— WHO IS —</div>
    <div class="who" id="castWho">—</div>
    <div class="role" id="castRole">—</div>
    <div class="quip" id="castQuip">—</div>
  </div>
  <div id="bottomMid"><span class="dot"></span><span id="actName">DAWN</span> <span class="muted">·</span> <span id="locLbl">CASTLE</span></div>
  <div id="ticker">
    <div class="badge">HERALD</div>
    <div class="scroll"><div class="inner" id="tickerInner">Hear ye! Hear ye! The Feast of Saint Gavril begins…</div></div>
  </div>
  <div id="chyron"><div class="h">CRY</div><div class="msg" id="chyronMsg">— — —</div></div>
  <div id="camLabel">CAM 01 — KINGDOM WIDE</div>
  <div id="actCard"><span id="actCardMain">DAWN</span><span class="sub" id="actCardSub">— first light —</span></div>
  <div id="dawnFlash"></div>
</div>
<script>
(function(){'use strict';
var THREE=window.THREE;
// ============== DISPOSABLES REGISTRY ==============
var DISP={geos:[],mats:[],texs:[],meshes:[],timers:[],raf:0};
function rg(g){DISP.geos.push(g);return g;}
function rm(m){DISP.mats.push(m);return m;}
function rt(t){DISP.texs.push(t);return t;}
function rmesh(m){DISP.meshes.push(m);return m;}
function rT(id){DISP.timers.push(id);return id;}
function disposeAll(){
  if(DISP.raf)cancelAnimationFrame(DISP.raf);DISP.raf=0;
  DISP.timers.forEach(function(id){clearInterval(id);clearTimeout(id);});DISP.timers.length=0;
  if(scene){scene.traverse(function(o){if(o.isMesh){if(o.geometry)o.geometry.dispose();if(o.material){if(Array.isArray(o.material))o.material.forEach(function(m){m.dispose&&m.dispose();});else o.material.dispose();}}});}
  DISP.geos.forEach(function(g){try{g.dispose();}catch(e){}});DISP.geos.length=0;
  DISP.mats.forEach(function(m){try{m.dispose();}catch(e){}});DISP.mats.length=0;
  DISP.texs.forEach(function(t){try{t.dispose();}catch(e){}});DISP.texs.length=0;
  DISP.meshes.length=0;
  if(scene){while(scene.children.length){scene.remove(scene.children[0]);}}
}
window.addEventListener('beforeunload',disposeAll);

// ============== RNG ==============
var SEED=Date.now()&0x7fffffff;
function rngSeed(s){SEED=s>>>0||1;}
function rnd(){SEED=(SEED*1664525+1013904223)>>>0;return SEED/4294967296;}
function rint(a,b){return Math.floor(rnd()*(b-a+1))+a;}
function pick(a){return a[Math.floor(rnd()*a.length)];}

// ============== PROC TEXTURES ==============
function tex(c){var t=new THREE.CanvasTexture(c);t.anisotropy=4;rt(t);return t;}
function parchTex(){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,256,256);g.addColorStop(0,'#f3e2b6');g.addColorStop(1,'#c8a85a');
  x.fillStyle=g;x.fillRect(0,0,256,256);
  for(var i=0;i<800;i++){x.fillStyle='rgba('+(80+Math.random()*60|0)+','+(40+Math.random()*40|0)+',10,'+Math.random()*.18+')';x.fillRect(Math.random()*256,Math.random()*256,2,2);}
  for(var j=0;j<10;j++){x.strokeStyle='rgba(60,30,8,.08)';x.beginPath();x.moveTo(Math.random()*256,0);x.lineTo(Math.random()*256,256);x.stroke();}
  return tex(c);
}
function stoneTex(tone){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  var base=tone||'#7a7468';x.fillStyle=base;x.fillRect(0,0,256,256);
  for(var r=0;r<6;r++)for(var k=0;k<8;k++){
    var w=22+Math.random()*14,h=20+Math.random()*8,X=k*32+(r%2)*16-16+Math.random()*4,Y=r*36+Math.random()*4;
    var sh=70+Math.random()*40|0;x.fillStyle='rgb('+sh+','+(sh-6)+','+(sh-14)+')';x.fillRect(X,Y,w,h);
    x.strokeStyle='rgba(20,15,10,.55)';x.strokeRect(X,Y,w,h);
  }
  for(var i=0;i<2000;i++){x.fillStyle='rgba(0,0,0,'+Math.random()*.12+')';x.fillRect(Math.random()*256,Math.random()*256,1,1);}
  return tex(c);
}
function woodTex(){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  x.fillStyle='#5a3a18';x.fillRect(0,0,256,256);
  for(var i=0;i<60;i++){x.fillStyle='rgba('+(60+Math.random()*40|0)+','+(30+Math.random()*30|0)+',10,'+(.2+Math.random()*.4)+')';x.fillRect(0,i*4+Math.random()*3,256,2+Math.random()*2);}
  for(var k=0;k<5;k++){x.strokeStyle='rgba(20,10,4,.7)';x.beginPath();x.arc(Math.random()*256,Math.random()*256,4+Math.random()*3,0,7);x.stroke();}
  return tex(c);
}
function cobbleTex(){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  x.fillStyle='#3a3026';x.fillRect(0,0,256,256);
  for(var i=0;i<140;i++){var X=Math.random()*256,Y=Math.random()*256,r=8+Math.random()*8;
    var sh=60+Math.random()*50|0;x.fillStyle='rgb('+sh+','+(sh-6)+','+(sh-14)+')';
    x.beginPath();x.arc(X,Y,r,0,7);x.fill();x.strokeStyle='rgba(0,0,0,.6)';x.stroke();}
  return tex(c);
}
function bannerTex(sigil,bgCol,fgCol){
  var c=document.createElement('canvas');c.width=128;c.height=192;var x=c.getContext('2d');
  x.fillStyle=bgCol;x.fillRect(0,0,128,192);
  // border
  x.strokeStyle='#d8a93b';x.lineWidth=4;x.strokeRect(4,4,120,184);
  // sigil
  x.fillStyle=fgCol;x.font='bold 90px serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText(sigil,64,100);
  // tassels
  x.fillStyle='#d8a93b';x.fillRect(0,184,128,8);
  for(var i=0;i<6;i++){x.fillRect(i*22+4,188,4,8);}
  return tex(c);
}
function stainedGlassTex(palette){
  var c=document.createElement('canvas');c.width=128;c.height=256;var x=c.getContext('2d');
  x.fillStyle='#0a0a0a';x.fillRect(0,0,128,256);
  // central figure (cross / saint silhouette)
  x.fillStyle=palette[0];x.fillRect(58,30,12,140);x.fillRect(40,70,48,12);
  // panels
  for(var i=0;i<8;i++)for(var j=0;j<14;j++){
    if((i===2||i===3)&&(j>=2&&j<=10))continue;
    var col=palette[(i*3+j*7)%palette.length];
    x.fillStyle=col;x.fillRect(i*16+1,j*18+1,14,16);
    x.strokeStyle='#0a0a0a';x.lineWidth=2;x.strokeRect(i*16+1,j*18+1,14,16);
  }
  // arched top
  x.globalCompositeOperation='destination-in';x.fillStyle='#fff';x.beginPath();
  x.moveTo(0,256);x.lineTo(0,40);x.quadraticCurveTo(64,-20,128,40);x.lineTo(128,256);x.fill();
  x.globalCompositeOperation='source-over';
  return tex(c);
}
function dirtTex(){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  x.fillStyle='#6a5028';x.fillRect(0,0,256,256);
  for(var i=0;i<3000;i++){var sh=60+Math.random()*60|0;x.fillStyle='rgba('+sh+','+(sh-15)+','+(sh-30)+',.6)';x.fillRect(Math.random()*256,Math.random()*256,2,2);}
  return tex(c);
}
function grassTex(){
  var c=document.createElement('canvas');c.width=c.height=256;var x=c.getContext('2d');
  x.fillStyle='#3a5a22';x.fillRect(0,0,256,256);
  for(var i=0;i<4000;i++){var g=40+Math.random()*60|0;x.fillStyle='rgba('+(g-10)+','+g+','+(g-30)+',.7)';x.fillRect(Math.random()*256,Math.random()*256,2,3);}
  return tex(c);
}

// ============== SCENE / RENDERER ==============
var canvas=document.getElementById('bg');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.75));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=false;

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,800);
camera.position.set(0,40,80);camera.lookAt(0,4,0);

window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ============== LIGHTING (sun + ambient + torches) ==============
var ambient=new THREE.AmbientLight(0xfff1c0,0.45);scene.add(ambient);
var sun=new THREE.DirectionalLight(0xfff0c0,1.1);sun.position.set(40,80,30);scene.add(sun);
var hemi=new THREE.HemisphereLight(0xb8d4ff,0x3a2810,0.35);scene.add(hemi);

// fog for atmosphere
scene.fog=new THREE.Fog(0xc8b888,40,260);
scene.background=new THREE.Color(0xc8b888);

// ============== ZONES — anchor points for sub-locations ==============
var ZONES={
  CASTLE:   {x:  0, z:-60, lbl:'CASTLE'},
  HALL:     {x:  0, z:-44, lbl:'GREAT HALL'},
  CHAPEL:   {x:-46, z:-30, lbl:'CHAPEL'},
  BARRACKS: {x: 46, z:-30, lbl:'BARRACKS'},
  ARENA:    {x:  0, z: 18, lbl:'TOURNAMENT'},
  MARKET:   {x:-50, z: 30, lbl:'MARKET'},
  TAVERN:   {x: 50, z: 35, lbl:'TAVERN'}
};

// ============== HELPERS ==============
function box(w,h,d,col,texMap,opts){
  var g=rg(new THREE.BoxGeometry(w,h,d));
  var mp={color:col,roughness:.85,metalness:.05};
  if(texMap){mp.map=texMap;}
  if(opts&&opts.emissive){mp.emissive=opts.emissive;mp.emissiveIntensity=opts.emi||1;}
  var m=rm(new THREE.MeshStandardMaterial(mp));
  return rmesh(new THREE.Mesh(g,m));
}
function cyl(r1,r2,h,col,seg){
  var g=rg(new THREE.CylinderGeometry(r1,r2,h,seg||10));
  var m=rm(new THREE.MeshStandardMaterial({color:col,roughness:.85}));
  return rmesh(new THREE.Mesh(g,m));
}
function plane(w,h,col,texMap){
  var g=rg(new THREE.PlaneGeometry(w,h));
  var m=rm(new THREE.MeshStandardMaterial({color:col,map:texMap||null,roughness:.95,side:THREE.DoubleSide}));
  return rmesh(new THREE.Mesh(g,m));
}
function group(){var g=new THREE.Group();return g;}

// ============== GROUND ==============
var grassT=grassTex();grassT.wrapS=grassT.wrapT=THREE.RepeatWrapping;grassT.repeat.set(20,20);
var ground=plane(400,400,0x4a6a30,grassT);ground.rotation.x=-Math.PI/2;ground.position.y=0;scene.add(ground);

var dirtT=dirtTex();dirtT.wrapS=dirtT.wrapT=THREE.RepeatWrapping;dirtT.repeat.set(6,6);
// dirt road across kingdom
var road=plane(8,180,0x6a5028,dirtT);road.rotation.x=-Math.PI/2;road.position.set(0,0.02,0);scene.add(road);
var road2=plane(120,8,0x6a5028,dirtT);road2.rotation.x=-Math.PI/2;road2.position.set(0,0.02,30);scene.add(road2);

// cobblestones near castle
var cobT=cobbleTex();cobT.wrapS=cobT.wrapT=THREE.RepeatWrapping;cobT.repeat.set(8,8);
var courtyard=plane(50,40,0x55504a,cobT);courtyard.rotation.x=-Math.PI/2;courtyard.position.set(0,0.03,-44);scene.add(courtyard);
var marketCob=plane(28,22,0x55504a,cobT);marketCob.rotation.x=-Math.PI/2;marketCob.position.set(-50,0.03,30);scene.add(marketCob);

// ============== BANNERS (procedural sigils) ==============
var SIGILS=['🦁','🦅','🐗','🦌','🐺','🐻','⚔','♛','✝','🌳'];
var SIGIL_COLS=[
  {bg:'#7a1e1e',fg:'#f0c040',name:'Crimson Lion'},
  {bg:'#1f4e8a',fg:'#e8e8e8',name:'Azure Griffin'},
  {bg:'#2a5a30',fg:'#f0c040',name:'Verdant Stag'},
  {bg:'#4a1a4a',fg:'#f0c040',name:'Plum Boar'},
  {bg:'#1a1a1a',fg:'#d8a93b',name:'Sable Wolf'},
  {bg:'#a04a10',fg:'#f0e0a0',name:'Amber Bear'}
];
var bannerCache={};
function getBannerTex(idx){
  var k='b'+idx;if(bannerCache[k])return bannerCache[k];
  var col=SIGIL_COLS[idx%SIGIL_COLS.length];
  bannerCache[k]=bannerTex(SIGILS[idx%SIGILS.length],col.bg,col.fg);
  return bannerCache[k];
}
function bannerMesh(idx,h){
  h=h||4;
  var t=getBannerTex(idx);
  var g=rg(new THREE.PlaneGeometry(2.4,h));
  var m=rm(new THREE.MeshStandardMaterial({map:t,side:THREE.DoubleSide,roughness:.85}));
  var b=rmesh(new THREE.Mesh(g,m));return b;
}

// ============== CASTLE (great hall + walls) ==============

];

// herald narrator
var heraldEl=document.getElementById('heraldMsg');
var HERALD_LINES=[

];

// location label
function setLocLabel(zoneKey){
  var labels={CASTLE:'CASTLE • CURTAIN WALL',HALL:'GREAT HALL',CHAPEL:'CHAPEL OF SAINT GAVRIL',BARRACKS:'BARRACKS YARD',ARENA:'TILTYARD',MARKET:'VILLAGE MARKET',TAVERN:'THE GILDED MEAD'};
  var le=document.getElementById('locLbl');
  if(le)le.textContent=labels[zoneKey]||zoneKey;
}
setLocLabel('CASTLE');

// camera->location mapping
var camZoneMap=['CASTLE','CASTLE','HALL','HALL','HALL','CHAPEL','CHAPEL','BARRACKS','BARRACKS','MARKET','MARKET','MARKET','ARENA','ARENA','ARENA','ARENA','TAVERN','TAVERN','TAVERN','HALL','HALL','CASTLE','HALL','CASTLE','MARKET'];

// minimap
var mm=document.getElementById('mm');
function drawMinimap(){
  if(!mm)return;
  var ctx=mm.getContext('2d');var w=mm.width,h=mm.height;
  ctx.clearRect(0,0,w,h);
  // parchment bg
  var bg=parchTex().image;
  ctx.drawImage(bg,0,0,w,h);
  ctx.strokeStyle='#3a2010';ctx.lineWidth=2;ctx.strokeRect(2,2,w-4,h-4);
  ctx.font='10px Georgia,serif';ctx.fillStyle='#3a2010';
  ctx.textAlign='center';
  // map world coords (-70..70) → 0..w
  function toMap(x,z){return [(x+70)/140*w,(z+70)/140*h];}
  // draw roads
  ctx.strokeStyle='#8a6a3a';ctx.lineWidth=4;
  ctx.beginPath();var p1=toMap(-60,-30),p2=toMap(60,-30);ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();
  ctx.beginPath();p1=toMap(0,-50);p2=toMap(0,50);ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();
  // pins
  var Z=ZONES;var keys=['CASTLE','HALL','CHAPEL','BARRACKS','ARENA','MARKET','TAVERN'];
  var glyphs={CASTLE:'♛',HALL:'⚔',CHAPEL:'✝',BARRACKS:'⛨',ARENA:'⚜',MARKET:'☗',TAVERN:'⚱'};
  var active=camZoneMap[camIdx];
  keys.forEach(function(k){
    var z=Z[k];var pp=toMap(z.x,z.z);
    ctx.beginPath();
    ctx.fillStyle=(k===active)?'#a02018':'#5a3a18';
    ctx.arc(pp[0],pp[1],(k===active)?7:5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f3e2b6';ctx.font='10px Georgia,serif';
    ctx.fillText(glyphs[k]||'•',pp[0],pp[1]+3);
    ctx.fillStyle='#3a2010';ctx.font='8px Georgia,serif';
    ctx.fillText(k,pp[0],pp[1]+15);
  });
  // sun direction
  var su=Math.sin(actT*0.001)*0; // not used - sun is mapped to act
}

// sun widget
function updateSunWidget(){
  var dot=document.getElementById('sunDot');var hr=document.getElementById('sunHr');
  if(!dot||!hr)return;
  var A=ACTS[act];
  var prog=A.sun;var ang=prog*Math.PI;
  var cx=60,cy=40,r=44;
  var x=cx-Math.cos(ang)*r;var y=cy-Math.sin(ang)*r;
  dot.setAttribute('cx',x);dot.setAttribute('cy',y);
  var hours=['VI','VII','IX','XII','III','VI','IX'];
  var hidx=Math.min(hours.length-1,Math.floor(prog*6));
  hr.textContent=hours[hidx]+' OF THE CLOCK';
}


// ============== JOUST SIMULATION ==============
var joustState='IDLE';var joustT=0;var jousts=0;var lanceFrags=[];
function startJoust(){
  joustState='CHARGE';joustT=0;
  horse1.position.set(-19,0,0.8);horse2.position.set(19,0,-0.8);
  rider1.position.set(-19,1.4,0.8);rider2.position.set(19,1.4,-0.8);
  lance1.visible=true;lance2.visible=true;
  lance1.position.set(-17,2,1.2);lance2.position.set(17,2,-1.2);
  // clear previous frags
  lanceFrags.forEach(function(f){scene.remove(f);});lanceFrags=[];
}
function spawnLanceFragments(x,y,z){
  for(var fr=0;fr<3;fr++){
    var len=.6+rnd()*.6;var f=cyl(.06,.06,len,0x6a3a10,6);
    f.rotation.set(rnd()*7,rnd()*7,rnd()*7);
    f.position.set(x+(rnd()-.5)*.6,y+(rnd()-.5)*.6,z+(rnd()-.5)*.6);
    f.userData.vy=2+rnd()*2;f.userData.vx=(rnd()-.5)*4;f.userData.vz=(rnd()-.5)*1.4;
    f.userData.life=2.5;
    scene.add(f);lanceFrags.push(f);
  }
}
function updateJoust(dt){
  if(joustState==='IDLE')return;
  joustT+=dt;
  if(joustState==='CHARGE'){
    var sp=14;
    horse1.position.x+=sp*dt;horse2.position.x-=sp*dt;
    rider1.position.x=horse1.position.x;rider2.position.x=horse2.position.x;
    lance1.position.x=horse1.position.x+2;lance2.position.x=horse2.position.x-2;
    // legs gallop
    var ph=joustT*16;
    horse1.children[1].position.y=.6+Math.abs(Math.sin(ph))*.18;
    horse1.children[2].position.y=.6+Math.abs(Math.sin(ph+1.5))*.18;
    horse1.children[3].position.y=.6+Math.abs(Math.sin(ph+3))*.18;
    horse1.children[4].position.y=.6+Math.abs(Math.sin(ph+4.5))*.18;
    horse2.children[1].position.y=.6+Math.abs(Math.sin(ph+1))*.18;
    horse2.children[2].position.y=.6+Math.abs(Math.sin(ph+2.5))*.18;
    horse2.children[3].position.y=.6+Math.abs(Math.sin(ph+4))*.18;
    horse2.children[4].position.y=.6+Math.abs(Math.sin(ph+5.5))*.18;
    if(Math.abs(horse1.position.x-horse2.position.x)<3){
      joustState='CRACK';
      var hit=(horse1.position.x+horse2.position.x)/2;
      spawnLanceFragments(hit,2.4,0);
      lance1.visible=false;lance2.visible=false;
      // unhorse: rider1 falls
      var winner=rnd()<.5?'g':'c';
      if(winner==='g'){rider2.userData.fall=true;}
      else{rider1.userData.fall=true;}
      // herald cry
      nextHerald();
    }
  }else if(joustState==='CRACK'){
    if(joustT>2.0){joustState='RESET';}
    // continue gallop past
    horse1.position.x+=8*dt;horse2.position.x-=8*dt;
    rider1.position.x=horse1.position.x;rider2.position.x=horse2.position.x;
  }else if(joustState==='RESET'){
    if(joustT>3.5){jousts++;joustState='IDLE';}
  }
  // riders fall
  [rider1,rider2].forEach(function(r){
    if(r.userData.fall){r.position.y-=2.5*dt;r.rotation.z+=2*dt;
      if(r.position.y<.2){r.position.y=.2;}
    }
  });
  // lance fragments fall
  for(var fr=lanceFrags.length-1;fr>=0;fr--){
    var f=lanceFrags[fr];
    f.position.x+=f.userData.vx*dt;f.position.z+=f.userData.vz*dt;
    f.userData.vy-=8*dt;f.position.y+=f.userData.vy*dt;
    f.rotation.x+=4*dt;f.rotation.z+=2*dt;
    f.userData.life-=dt;
    if(f.position.y<.05){f.position.y=.05;f.userData.vy*=-.3;f.userData.vx*=.6;f.userData.vz*=.6;}
    if(f.userData.life<=0){scene.remove(f);lanceFrags.splice(fr,1);}
  }
}
function resetRiders(){
  rider1.position.set(-19,1.4,0.8);rider1.rotation.z=0;rider1.userData.fall=false;
  rider2.position.set(19,1.4,-0.8);rider2.rotation.z=0;rider2.userData.fall=false;
}

// ============== PEASANT WANDERING ==============
function updatePeasants(dt,T){
  for(var pi=0;pi<peasants.length;pi++){
    var p=peasants[pi];p.t+=dt;
    if(p.t>p.ph){
      p.t=0;p.ph=2+rnd()*5;
      var z=ZONES[p.zone];
      p.tx=z.x+(rnd()-.5)*16;p.tz=z.z+(rnd()-.5)*12;
    }
    if(p.tx!==undefined){
      var dx=p.tx-p.x,dz=p.tz-p.z;var d=Math.sqrt(dx*dx+dz*dz);
      if(d>0.1){p.x+=dx/d*1.2*dt;p.z+=dz/d*1.2*dt;p.dir=Math.atan2(dx,dz);}
    }
    // bob
    var bob=Math.abs(Math.sin((T+pi)*4))*.06;
    dummyObj.position.set(p.x,.9+bob,p.z);
    dummyObj.rotation.set(0,p.dir||0,0);
    dummyObj.updateMatrix();
    peasantMesh.setMatrixAt(pi,dummyObj.matrix);
    dummyObj.position.set(p.x,2.05+bob,p.z);
    dummyObj.rotation.set(0,p.dir||0,0);
    dummyObj.updateMatrix();
    headMesh.setMatrixAt(pi,dummyObj.matrix);
  }
  peasantMesh.instanceMatrix.needsUpdate=true;
  headMesh.instanceMatrix.needsUpdate=true;
}

// ============== HALL FLICKER ==============
var hallLightsRefs=[];scene.traverse(function(o){if(o.isPointLight&&o.position.y>3&&o.position.z<-44&&o.intensity>.5)hallLightsRefs.push(o);});
function flickerLights(T){
  hallLightsRefs.forEach(function(L,i){L.intensity=1.6+Math.sin(T*8+i*1.7)*.4+(rnd()-.5)*.18;});
  fireLight.intensity=2.2+Math.sin(T*9)*.6+(rnd()-.5)*.5;
  fireGlow.scale.setScalar(.8+Math.sin(T*9)*.18+rnd()*.1);
  // candles in chapel
  stainLight.intensity=1.0+Math.sin(T*1.5)*.2;
}

// ============== ANIMAL WANDER ==============
function updateAnimals(dt,T){
  animals.forEach(function(a,i){
    a.position.x=a.userData.baseX+Math.sin(T*.6+i)*.7;
    a.position.z=a.userData.baseZ+Math.cos(T*.5+i*1.3)*.5;
  });
}

// ============== BARD STRUMMING ==============
function updateBard(T){
  var f=castMeshes.finn;if(!f)return;
  if(f.userData.armR){f.userData.armR.rotation.x=Math.sin(T*4)*.6-.3;}
  if(f.userData.armL){f.userData.armL.rotation.x=Math.sin(T*4+1.5)*.3;}
}

// ============== JESTER ANTICS ==============
function updateJester(T){
  var p=castMeshes.pip;if(!p)return;
  p.position.y=Math.abs(Math.sin(T*4))*.5;
  p.rotation.y=T*1.5;
}

// ============== HEAD/SCROLL ==============
function updateHerald(){nextHerald();/* also write to chyron */if(chyronEl)chyronEl.textContent=HERALD_LINES[(heraldIdx-1+HERALD_LINES.length)%HERALD_LINES.length];}

// ============== CONSPIRACY (NIGHT) ==============
function updateConspiracy(T){
  if(act!==5)return;
  if(castMeshes.shadow&&castMeshes.roric){
    castMeshes.shadow.position.x=-12+Math.sin(T*.3)*.4;
    castMeshes.roric.position.x=-10+Math.sin(T*.3+.2)*.2;
  }
}

// ============== TICKER SCROLL ==============
function updateTickerScroll(){
  if(!tickerEl)return;
  tickerOffset-=1;
  if(tickerOffset<-tickerEl.scrollWidth/2)tickerOffset=0;
  tickerEl.style.transform='translateX('+tickerOffset+'px)';
}

// ============== KNIGHTS DRILL (BARRACKS) ==============
function updateDrill(T){
  if(castMeshes.osric){castMeshes.osric.children[0].rotation.x=Math.sin(T*3)*.2;}
  if(castMeshes.edric){castMeshes.edric.children[3]&&(castMeshes.edric.children[3].rotation.x=Math.sin(T*3+.4)*.4-.5);}
  // dummies sway when "hit"
  dummies.forEach(function(d,i){d.rotation.z=Math.sin(T*2+i)*.06;});
}

// ============== AT NIGHT — DIM CHAPEL/STAINED GLASS BRIGHTEN ==============
function updateNightLights(){
  var night=act>=5?1:(act===4?.5:0);
  fireLight.intensity*=(1+night*.5);
  // chapel candles glow more at night
  stainLight.intensity=1.0+night*.8;
}

// ============== INITIAL POPULATE ==============
spawnCast();reseedNames();
updateTicker();
nextChyron();
nextCast();

// ============== MAIN LOOP ==============
var clock=new THREE.Clock();var T=0;var lastChyron=0;var lastCast=0;var lastHerald=0;var lastMM=0;var lastJoust=0;
var rafId=0;
function tick(){
  rafId=requestAnimationFrame(tick);
  var dt=Math.min(.05,clock.getDelta());T+=dt;actT+=dt;camTimer+=dt;
  // act progression
  if(actT>ACTS[act].len){
    actT=0;act=(act+1)%ACTS.length;applyAct(act);
    if(act===0){reseedNames();}
  }
  // sun smoothly interp between acts (light tween)
  // camera cuts
  if(camTimer>camDuration){
    camTimer=0;camDuration=4+rnd()*4;
    // pick a camera, weighted to current act
    var pick;
    if(act===3&&rnd()<.55){pick=12+Math.floor(rnd()*4);}
    else if(act===4&&rnd()<.55){pick=16+Math.floor(rnd()*3);}
    else if(act===1&&rnd()<.55){pick=5+Math.floor(rnd()*2);}
    else if(act===2&&rnd()<.55){pick=2+Math.floor(rnd()*3);}
    else if(act===5&&rnd()<.4){pick=20;}
    else{pick=Math.floor(rnd()*CAMS.length);}
    cutTo(pick);
    setLocLabel(camZoneMap[camIdx]||'CASTLE');
  }
  // chyron cycling
  if(T-lastChyron>4.5){lastChyron=T;nextChyron();}
  // cast lower-third cycling
  if(T-lastCast>5.5){lastCast=T;nextCast();}
  // herald cycling
  if(T-lastHerald>7){lastHerald=T;updateHerald();}
  // minimap redraw
  if(T-lastMM>0.5){lastMM=T;drawMinimap();updateSunWidget();}
  // joust trigger during afternoon
  if(act===3&&joustState==='IDLE'&&T-lastJoust>8){lastJoust=T;resetRiders();startJoust();}
  if(act!==3&&joustState!=='IDLE'){joustState='IDLE';resetRiders();}
  updateJoust(dt);
  updatePeasants(dt,T);
  flickerLights(T);
  updateAnimals(dt,T);
  updateBard(T);
  updateJester(T);
  updateDrill(T);
  updateConspiracy(T);
  updateTickerScroll();
  updateNightLights();
  // small camera breathing
  camera.position.x+=Math.sin(T*.31)*.003;camera.position.y+=Math.cos(T*.42)*.003;
  renderer.render(scene,camera);
}
tick();

// ============== RESEED EVERY 10 MINUTES ==============
DISP.timers.push(setInterval(function(){
  rngSeed=Math.floor(Date.now()/1000);
  reseedNames();
  // flash dawn-style overlay
  var f=document.getElementById('dawnFlash');
  if(f){f.style.opacity='0.9';setTimeout(function(){f.style.opacity='0';},1200);}
  // show grand epilogue card
  var card=document.getElementById('actCard');var cm=document.getElementById('actCardMain');var cs=document.getElementById('actCardSub');
  if(card&&cm&&cs){cm.textContent='AND THUS ENDED THE FEAST OF SAINT GAVRIL';cs.textContent='— a new dawn rises. New banners. New songs. New gossip. —';
    card.style.opacity='1';setTimeout(function(){card.style.opacity='0';},6500);}
  // restart act cycle
  act=0;actT=0;applyAct(0);
},600000));

// ============== SAFETY: page unload disposal ==============
window.addEventListener('beforeunload',disposeAll);

})();
