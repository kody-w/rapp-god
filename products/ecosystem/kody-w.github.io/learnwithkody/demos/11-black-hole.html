<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schwarzschild Black Hole — Geodesic Ray Tracing</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #cfd6e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100%;
  }
  #c { display: block; width: 100vw; height: 100vh; }
  .overlay {
    position: fixed;
    top: 14px;
    left: 16px;
    pointer-events: none;
    z-index: 5;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    line-height: 1.35;
  }
  .overlay h1 {
    margin: 0 0 4px 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #ffd1a0;
  }
  .overlay p {
    margin: 0;
    font-size: 11px;
    opacity: 0.65;
    max-width: 360px;
  }
  .hint {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font-size: 10px;
    opacity: 0.45;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #ffd1a0;
    font-size: 12px;
    letter-spacing: 0.2em;
    z-index: 10;
    transition: opacity 0.6s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <h1>SCHWARZSCHILD BLACK HOLE</h1>
  <p>Backwards geodesic ray tracing in curved spacetime. Photons orbit the event horizon, accretion disk wraps overhead, light is Doppler-shifted and gravitationally redshifted.</p>
</div>
<div class="hint">RK4 integration · 220 steps/ray</div>
<div class="loading" id="loading">COMPILING SHADERS</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight, false);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const vertexShader = /* glsl */`
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
  }
`;

// The fragment shader does everything: integrates the geodesic equation
// for each pixel, intersects with the disk, samples the procedural sky.
const fragmentShader = /* glsl */`
  precision highp float;

  varying vec2 vUv;

  uniform vec2  uResolution;
  uniform float uTime;
  uniform vec3  uCamPos;
  uniform mat3  uCamBasis; // columns: right, up, forward

  // Schwarzschild radius normalized to 1.0
  const float Rs = 1.0;
  // Disk geometry
  const float DISK_IN  = 3.0 * Rs;   // visually pleasing inner edge
  const float DISK_OUT = 12.0 * Rs;
  // Photon sphere
  const float R_PH = 1.5 * Rs;

  // Integration parameters
  const int   STEPS  = 220;
  const float DLAM   = 0.18; // affine step
  const float ESCAPE = 60.0; // ray escapes when r > this

  // ------------- hashing / noise for stars -------------
  float hash21(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
  }

  float hash31(vec3 p) {
    p = fract(p * 0.3183099 + vec3(0.71, 0.113, 0.419));
    p *= 17.0;
    return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
  }

  // Procedural starfield from a unit direction. Several layered cell grids
  // give stars of varying brightness with deterministic positions.
  vec3 starfield(vec3 dir) {
    vec3 col = vec3(0.0);

    // Convert direction to spherical-ish 2D coords for cell hashing.
    // Use cube-mapped octahedral mapping for uniformity.
    vec3 ad = abs(dir);
    float m = max(ad.x, max(ad.y, ad.z));
    vec3 nd = dir / m;
    vec2 uv;
    if (ad.x >= ad.y && ad.x >= ad.z) uv = nd.yz * 0.5 + 0.5 + vec2(dir.x > 0.0 ? 0.0 : 1.0, 0.0);
    else if (ad.y >= ad.z)            uv = nd.xz * 0.5 + 0.5 + vec2(0.0, dir.y > 0.0 ? 1.0 : 2.0);
    else                              uv = nd.xy * 0.5 + 0.5 + vec2(dir.z > 0.0 ? 1.0 : 2.0, 1.0);

    for (int layer = 0; layer < 3; layer++) {
      float scale = 220.0 + float(layer) * 380.0;
      vec2 g = uv * scale;
      vec2 id = floor(g);
      vec2 fr = fract(g);

      float h = hash21(id + float(layer) * 17.13);
      // Threshold so most cells have no star; brighter stars are rarer.
      float thresh = 0.985 - float(layer) * 0.004;
      if (h > thresh) {
        vec2 starPos = vec2(hash21(id + 1.7), hash21(id + 9.1));
        float d = length(fr - starPos);
        float bright = pow(smoothstep(0.06, 0.0, d), 4.0);
        // Color tint via a second hash
        float t = hash21(id + 33.7);
        vec3 tint = mix(vec3(0.7, 0.85, 1.0), vec3(1.0, 0.9, 0.7), t);
        // Make rare stars sparkle a bit (slow time pulsing)
        float sparkle = 0.85 + 0.15 * sin(uTime * (0.7 + 4.0 * t) + h * 30.0);
        col += tint * bright * sparkle * (0.55 + (h - thresh) * 14.0);
      }
    }

    // Faint nebula wash so the sky isn't pure black.
    float nebula =
        0.5 + 0.5 * sin(dir.x * 1.3 + dir.y * 0.8 + 1.7);
    nebula *= 0.5 + 0.5 * sin(dir.z * 2.1 - dir.y * 1.4);
    nebula = pow(nebula, 6.0);
    col += mix(vec3(0.02, 0.01, 0.04), vec3(0.05, 0.02, 0.08), nebula) * 0.6;

    // Milky-band: a soft brighter equatorial wash in some random direction.
    vec3 bandAxis = normalize(vec3(0.3, 1.0, 0.2));
    float band = 1.0 - abs(dot(dir, bandAxis));
    band = pow(band, 14.0);
    col += vec3(0.10, 0.08, 0.13) * band;

    return col;
  }

  // ------------- accretion disk texture -------------
  // Radial bands + filamentary noise + temperature gradient.
  vec3 diskColor(vec2 diskPos, float r) {
    float t = (r - DISK_IN) / (DISK_OUT - DISK_IN); // 0 inner .. 1 outer

    // Spiral / band pattern — angle modulated by radius like real disks.
    float ang = atan(diskPos.y, diskPos.x);
    float spiral = sin(ang * 3.0 + 14.0 / max(r, 0.5) - uTime * 0.6);
    float bands  = 0.5 + 0.5 * sin(r * 4.5 + spiral * 1.4);

    // Filamentary fine structure
    float fila = 0.5 + 0.5 * sin(ang * 22.0 + r * 6.0 + uTime * 0.4);
    fila *= 0.5 + 0.5 * sin(r * 11.0 - ang * 7.0);

    float tex = mix(0.65, 1.0, bands) * mix(0.85, 1.15, fila);

    // Temperature (color) gradient
    vec3 hot   = vec3(1.10, 0.95, 0.78); // near inner edge
    vec3 mid   = vec3(1.10, 0.55, 0.18);
    vec3 cool  = vec3(0.55, 0.18, 0.08);
    vec3 c = mix(hot, mid, smoothstep(0.0, 0.35, t));
    c       = mix(c,   cool, smoothstep(0.35, 1.0, t));

    // Brightness falls off outward (thin-disk)
    float bright = (1.0 - t) * 1.6 + 0.25;
    // Strong inner-edge glow
    bright += 1.4 * exp(-pow((r - DISK_IN) / 0.6, 2.0));

    return c * tex * bright;
  }

  // ------------- main ray integration -------------
  // We integrate in equatorial-plane Cartesian coordinates using the
  // geodesic equation expressed via the conserved impact parameter b.
  // For a Schwarzschild light ray, in Cartesian (x,y) form the equation
  //   d^2 u / dphi^2 + u = (3/2) * Rs * u^2,    with u = 1/r
  // is the canonical "binet" form. We instead step in 2D Cartesian with
  // RK4 on position+velocity, with effective gravitational deflection
  //   d^2 r / dlambda^2 = -(3/2) * Rs * h^2 * r / |r|^5
  // where h = |r x v| (Schwarzschild conserved L for null geodesics in
  // units where energy = 1). This reproduces light-bending exactly in
  // the orbital plane and is the standard trick used in real-time BH
  // shaders.
  //
  // To get a 3D image we orient the integration plane to contain the
  // ray's start and direction — gravity for a single null geodesic is
  // confined to that plane in Schwarzschild.

  // Acceleration for the 2D in-plane coordinate.
  vec2 accel(vec2 pos, vec2 vel) {
    float r2 = dot(pos, pos);
    float r  = sqrt(r2);
    // angular momentum magnitude (z-component of pos x vel in 2D)
    float h  = pos.x * vel.y - pos.y * vel.x;
    // Standard relativistic light-bending term
    float fac = -1.5 * Rs * h * h / (r2 * r2 * r);
    return fac * pos;
  }

  // Single RK4 step on (pos, vel) in the 2D orbital plane.
  void rk4Step(inout vec2 pos, inout vec2 vel, float dt) {
    vec2 k1v = accel(pos, vel);
    vec2 k1p = vel;

    vec2 k2v = accel(pos + 0.5 * dt * k1p, vel + 0.5 * dt * k1v);
    vec2 k2p = vel + 0.5 * dt * k1v;

    vec2 k3v = accel(pos + 0.5 * dt * k2p, vel + 0.5 * dt * k2v);
    vec2 k3p = vel + 0.5 * dt * k2v;

    vec2 k4v = accel(pos + dt * k3p, vel + dt * k3v);
    vec2 k4p = vel + dt * k3v;

    pos += dt * (k1p + 2.0 * k2p + 2.0 * k3p + k4p) / 6.0;
    vel += dt * (k1v + 2.0 * k2v + 2.0 * k3v + k4v) / 6.0;
  }

  vec3 traceRay(vec3 ro, vec3 rd) {
    // Build the orbital plane: spanned by e1 = unit(ro), e2 perpendicular
    // to e1 in the plane(ro, rd).
    vec3 e1 = normalize(ro);
    vec3 perp = rd - dot(rd, e1) * e1;
    if (length(perp) < 1e-6) {
      // Ray points exactly radially — degenerate, just nudge.
      perp = vec3(-e1.y, e1.x, 0.0);
    }
    vec3 e2 = normalize(perp);
    // Plane normal — disk lies in xz; we need disk-plane intersections.
    vec3 nP = normalize(cross(e1, e2));

    // Initial 2D state in the plane
    vec2 p = vec2(dot(ro, e1), dot(ro, e2));
    vec2 v = vec2(dot(rd, e1), dot(rd, e2));
    v = normalize(v);

    // Track previous y-coordinate of disk plane (world y) for crossing.
    // We project the 3D position back: P3 = p.x*e1 + p.y*e2 ; its y is:
    //   yWorld = p.x * e1.y + p.y * e2.y
    float prevY = p.x * e1.y + p.y * e2.y;
    vec3  prevP3 = ro;

    vec3 accumDisk = vec3(0.0);
    float diskAlpha = 0.0;

    bool hitHorizon = false;
    bool escaped    = false;

    for (int i = 0; i < STEPS; i++) {
      // Adaptive-ish step: smaller near the hole where curvature is wild.
      float r = length(p);
      float dt = DLAM * (0.35 + 0.15 * r);

      rk4Step(p, v, dt);

      r = length(p);
      vec3 P3 = p.x * e1 + p.y * e2;
      float yWorld = P3.y;

      // Disk plane crossing test (y == 0). Only count if we cross,
      // and only if radius in xz plane is within [DISK_IN, DISK_OUT].
      if (prevY * yWorld < 0.0 && diskAlpha < 0.99) {
        // Linear interp parameter for crossing position
        float t = prevY / (prevY - yWorld);
        vec3  hitP = mix(prevP3, P3, t);
        float rd2 = length(hitP.xz);
        if (rd2 > DISK_IN && rd2 < DISK_OUT) {
          // Disk material orbits in the xz-plane (Keplerian-ish) about y.
          // Velocity direction in world (tangential, prograde):
          vec3 radial = vec3(hitP.x, 0.0, hitP.z) / rd2;
          vec3 tangent = vec3(-radial.z, 0.0, radial.x); // CCW about +y
          // Orbital speed (approx Keplerian — capped to keep <c)
          float vorb = sqrt(0.5 * Rs / max(rd2, 1.5 * Rs));
          vorb = clamp(vorb, 0.0, 0.85);

          // The light ray as it left the disk had direction v3 (at hit).
          // Reconstruct world-space ray direction at hit by interpolating
          // velocities — close enough.
          vec3 V3 = normalize(p.x * e1 + p.y * e2 - prevP3 + 1e-5);
          // Better: use current 3D velocity direction
          vec3 vWorld = normalize(v.x * e1 + v.y * e2);
          // Doppler factor: observer-direction is -ro_to_hit for the
          // CAMERA looking; but here we trace backwards, so the photon
          // emitted by disk travels OPPOSITE to vWorld.
          vec3 photonDir = -vWorld;
          // Doppler (relativistic): D = 1 / (gamma * (1 - v.n))
          float beta = vorb;
          float gamma = 1.0 / sqrt(max(1.0 - beta * beta, 1e-4));
          float vdotn = beta * dot(tangent, photonDir);
          float doppler = 1.0 / (gamma * (1.0 - vdotn));
          // Brightness scales as D^4 (relativistic beaming) but that's
          // overpowering; clamp for stability.
          float beam = clamp(pow(doppler, 3.0), 0.05, 8.0);

          // Gravitational redshift factor sqrt(1 - Rs/r)
          float grav = sqrt(max(1.0 - Rs / rd2, 0.0));
          // Color shift: doppler also tints — blueshift -> push toward blue.
          vec3 baseCol = diskColor(hitP.xz, rd2);
          vec3 tint = mix(vec3(1.4, 0.9, 0.6), vec3(0.6, 0.85, 1.4),
                          smoothstep(0.85, 1.25, doppler));
          vec3 col = baseCol * tint * beam * grav;

          // Soft edge fade
          float edgeFade = smoothstep(DISK_IN, DISK_IN + 0.4, rd2)
                         * (1.0 - smoothstep(DISK_OUT - 1.5, DISK_OUT, rd2));
          col *= edgeFade;

          float a = 0.85 * edgeFade;
          accumDisk += col * (1.0 - diskAlpha) * a;
          diskAlpha += (1.0 - diskAlpha) * a;
        }
      }

      prevY  = yWorld;
      prevP3 = P3;

      if (r < Rs * 1.02) { hitHorizon = true; break; }
      if (r > ESCAPE)    { escaped    = true; break; }
    }

    // Photon-sphere ring boost: rays that lingered near r ~ 1.5 Rs.
    // Approximate by checking minimum distance reached during trace.
    // (Cheaper proxy: small radius at end-of-trace correlates.)

    vec3 col = accumDisk;
    if (!hitHorizon) {
      // Sample background in the final ray direction (in world space).
      vec3 vWorld = normalize(v.x * e1 + v.y * e2);
      vec3 sky = starfield(vWorld);
      col += sky * (1.0 - diskAlpha);
    } else {
      // Pure black hole — nothing escapes the horizon.
      col += vec3(0.0);
    }

    return col;
  }

  void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / uResolution.y;

    // Camera ray
    float fov = 1.1; // radians-ish
    vec3 rd = normalize(uCamBasis * vec3(uv * fov, -1.0));
    vec3 ro = uCamPos;

    vec3 col = traceRay(ro, rd);

    // Subtle bloom-ish tonemap
    col = col / (1.0 + col * 0.7);
    col = pow(col, vec3(0.92));

    // Gentle vignette
    float vig = smoothstep(1.4, 0.4, length(uv));
    col *= mix(0.85, 1.0, vig);

    gl_FragColor = vec4(col, 1.0);
  }
`;

const uniforms = {
  uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  uTime:       { value: 0.0 },
  uCamPos:     { value: new THREE.Vector3(0, 1.2, 18.0) },
  uCamBasis:   { value: new THREE.Matrix3() },
};

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms,
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(quad);

// --- camera animation: slow auto-orbit just above disk plane ---
const right = new THREE.Vector3();
const up    = new THREE.Vector3();
const fwd   = new THREE.Vector3();
const target = new THREE.Vector3(0, 0, 0);

function updateCamera(t) {
  const orbitR = 17.0;
  const ang = t * 0.10;
  // Slowly pitch between 5 and 18 degrees above plane
  const pitch = (10.0 + 7.0 * Math.sin(t * 0.06)) * Math.PI / 180.0;
  const cy = Math.sin(pitch) * orbitR;
  const cr = Math.cos(pitch) * orbitR;
  const cx = Math.cos(ang) * cr;
  const cz = Math.sin(ang) * cr;
  uniforms.uCamPos.value.set(cx, cy, cz);

  fwd.copy(target).sub(uniforms.uCamPos.value).normalize();
  // World up
  const wup = new THREE.Vector3(0, 1, 0);
  right.copy(fwd).cross(wup).normalize();
  up.copy(right).cross(fwd).normalize();

  const m = uniforms.uCamBasis.value;
  // Column-major: cols are right, up, -fwd-equivalent (we use forward as -z in shader)
  m.set(
    right.x, up.x, -fwd.x,
    right.y, up.y, -fwd.y,
    right.z, up.z, -fwd.z
  );
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});

const start = performance.now();
let firstFrame = true;
function animate() {
  const t = (performance.now() - start) / 1000.0;
  uniforms.uTime.value = t;
  updateCamera(t);
  renderer.render(scene, camera);

  if (firstFrame) {
    firstFrame = false;
    const ld = document.getElementById('loading');
    ld.style.opacity = '0';
    setTimeout(() => ld.remove(), 700);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
