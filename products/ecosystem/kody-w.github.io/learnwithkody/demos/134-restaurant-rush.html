.lower-third{position:absolute;bottom:60px;left:24px;background:linear-gradient(90deg,#c00 0%,#600 80%,transparent);padding:10px 22px;min-width:420px;border-left:3px solid #ffb84a}

.lower-third .name{font-size:22px;font-weight:900;letter-spacing:2px}
.lower-third .desc{font-size:11px;color:#ddd;letter-spacing:1px;margin-top:1px}
.chyron{position:absolute;bottom:18px;left:0;right:0;height:32px;background:rgba(0,0,0,0.88);border-top:1px solid #ffb84a;overflow:hidden;display:flex;align-items:center}
.chyron .label{background:#c00;padding:8px 16px;font-weight:700;letter-spacing:2px;height:100%;display:flex;align-items:center;font-size:11px;flex-shrink:0}
.chyron-track{white-space:nowrap;font-size:13px;letter-spacing:1px;animation:scroll 70s linear infinite;padding-left:100%}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.cam-label{position:absolute;bottom:100px;left:24px;background:rgba(0,0,0,0.75);border-left:2px solid #ffb84a;padding:6px 14px;font-size:11px;letter-spacing:3px;color:#ffb84a;font-weight:700}

.pip-cell .face{width:100%;height:62px;border-radius:4px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:34px}
.pip-cell .nm{font-size:12px;font-weight:700;letter-spacing:1px}
.pip-cell .role{font-size:9px;color:#ffb84a;letter-spacing:1.5px;margin-top:1px}
.pip-cell .quote{font-size:10px;font-style:italic;color:#ccc;margin-top:6px;min-height:30px;line-height:1.3}
.fire-banner{position:absolute;top:130px;left:50%;transform:translateX(-50%);background:#ff2200;padding:9px 26px;font-weight:900;letter-spacing:3px;font-size:16px;box-shadow:0 0 30px #ff2200;display:none;animation:flash 0.4s infinite alternate;border:2px solid #fff}

@keyframes flash{0%{filter:brightness(1)}100%{filter:brightness(1.6)}}
.timer{position:absolute;top:170px;left:24px;font-size:54px;font-weight:200;letter-spacing:4px;color:#ffb84a;text-shadow:0 0 14px rgba(255,184,74,0.4);font-family:'Courier New',monospace}
.timer .lbl{display:block;font-size:10px;color:#fff;letter-spacing:5px;margin-bottom:0;font-family:Arial;font-weight:700}

.phase .p{color:#ff8a3a;font-size:10px;letter-spacing:3px;margin-bottom:3px;font-weight:700}
.quote-card{position:absolute;top:330px;left:24px;background:rgba(0,0,0,0.7);border-left:3px solid #c00;padding:9px 14px;max-width:280px;font-style:italic;font-size:13px;line-height:1.4;color:#ffd}
.quote-card .src{font-style:normal;font-size:10px;color:#ffb84a;letter-spacing:2px;margin-top:5px;display:block;font-weight:700}

.menu-board h4{color:#ffb84a;font-size:10px;letter-spacing:3px;margin-bottom:6px;font-weight:700}
.day{position:absolute;top:24px;left:50%;transform:translateX(-50%);margin-top:120px;font-size:12px;color:#888;letter-spacing:3px}
.shake{animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,2px)}50%{transform:translate(4px,-2px)}75%{transform:translate(-2px,1px)}}

<script>
(function(){
'use strict';
const TAU=Math.PI*2, RND=(a,b)=>a+Math.random()*(b-a), PICK=a=>a[Math.floor(Math.random()*a.length)];
const W0=()=>innerWidth, H0=()=>innerHeight;

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setSize(W0(),H0());
renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0608);
scene.fog=new THREE.Fog(0x0a0608,30,95);

const cams=[];
function mkCam(n){const c=new THREE.PerspectiveCamera(50,W0()/H0(),0.1,200);c.userData={n};cams.push(c);return c;}

addEventListener('resize',()=>{
  renderer.setSize(W0(),H0());
  cams.forEach(c=>{c.aspect=W0()/H0();c.updateProjectionMatrix();});
});

const matCache={};
function mat(c){const k='m'+c;if(!matCache[k])matCache[k]=new THREE.MeshLambertMaterial({color:c});return matCache[k];}
function matB(c,o){const k='b'+c+(o||1);if(!matCache[k]){matCache[k]=new THREE.MeshBasicMaterial({color:c,transparent:o!=null&&o<1,opacity:o==null?1:o});}return matCache[k];}

const dispGeo=[], dispMat=[], dispObjs=[];
function geo(g){dispGeo.push(g);return g;}
function box(w,h,d,c){return new THREE.Mesh(geo(new THREE.BoxGeometry(w,h,d)),mat(c));}
function cyl(r1,r2,h,c,s){return new THREE.Mesh(geo(new THREE.CylinderGeometry(r1,r2,h,s||10)),mat(c));}
function sph(r,c,s){return new THREE.Mesh(geo(new THREE.SphereGeometry(r,s||8,s||6)),mat(c));}
function plane(w,h,c){return new THREE.Mesh(geo(new THREE.PlaneGeometry(w,h)),mat(c));}

let root, stations=[], chefs=[], servers=[], plates=[], flames=[], tickets=[], runners=[];
let tableMeshes=[], tableData=[], stove=[], passEl, fireMesh=null, pastaPan;
let amb, dirLight, kitchenLights=[];

const SKINS=[0xf5cba7,0xd4a373,0xa0703f,0x6b4226,0xc89a73,0xefc294,0x88543a];
const STATION_TYPES=['SAUTÉ','GRILL','GARDE-MANGER','PASTA','PASTRY','FISH','GARDE-FRITURE','PASS'];
const COOK_NAMES_POOL=['Devon','Wei','Pat','Reggie','Marcus','Yara','Inez','Jonas','Priya','Sam','Lila','Kai','Arjun','Rosa','Noah','Mei'];
const HEAD_NAMES_POOL=['Gordon Brecon','Marco Pellegrini','Jasper Knox','Henri Dufort','Kazuo Mori','Aria Vance'];
const SOUS_POOL=['Marie Lavalle','Otto Reinhardt','Yuki Sato','Lena Volkov','Diego Alcantara','Rasha Karim'];
const VIP_POOL=['NY TIMES FOOD CRITIC','SENATOR MARSTON','MOVIE STAR IRIS HOLM','MICHELIN INSPECTOR','TECH CEO RAVI KHAN','SOCCER STAR KOVA'];
const DIS_POOL=['Kitchen Fire','Walk-in Cooler Failure','Power Flicker','Gas Leak Scare','Critic Sends Back Lamb'];
const MENU_POOLS=[
 ['Pan-Seared Scallops','Lobster Bisque','Wagyu Ribeye','Lamb Wellington','Risotto Milanese','Branzino','Beef Tartare','Chocolate Soufflé','Tiramisù','Crème Brûlée'],
 ['Foie Gras Torchon','Bouillabaisse','Duck Confit','Truffle Tagliatelle','Octopus Carpaccio','Whole Sea Bass','Veal Osso Buco','Chocolate Fondant','Panna Cotta','Tarte Tatin'],
 ['Beef Carpaccio','French Onion Soup','Coq au Vin','Bolognese','Cassoulet','Halibut en Croûte','Steak Frites','Profiteroles','Madeleines','Floating Island'],
 ['Tuna Tataki','Wild Mushroom Velouté','Rack of Lamb','Black Truffle Risotto','Hamachi Crudo','Dover Sole','Short Rib','Pavlova','Affogato','Lemon Tart']
];
const QUOTES_POOL=[
 ['WHERE IS MY LAMB?! WHERE IS MY [BLEEPED]ING LAMB?!','Chef'],
 ['THIS RISOTTO IS RAW! ABSOLUTE GARBAGE!','Chef'],
 ['YES CHEF! HEARD CHEF!','Line'],
 ['ELEVEN MINUTES ON TABLE NINE — MOVE!','Chef'],
 ['HANDS! I NEED HANDS ON THE PASS!','Chef'],
 ['IS THIS A JOKE? GET OUT OF MY KITCHEN!','Chef'],
 ['WALK-IN OF EIGHT?! NO RESERVATION?!','Chef'],
 ['CRITIC AT TWELVE — DO NOT MESS THIS UP!','Chef'],
 ['BEHIND! BEHIND! HOT BEHIND!','Cook'],
 ['ALL DAY: THREE LAMB, FOUR SCALLOP, TWO BISQUE!','Chef'],
 ['THE FISH IS DRY — REFIRE!','Chef'],
 ['SAUCE IS SPLIT! REDO IT!','Chef'],
 ['86 THE LOBSTER — I WARNED YOU!','Chef'],
 ['CORNER! CORNER!','Cook'],
 ['THIS IS NOT A MICHELIN PLATE — THIS IS A CRIME!','Chef'],
 ['SERVICE!','Exp'],
 ['HEARD!','Line']
];

let HEAD_CHEF_NAME='Gordon Brecon', SOUS_NAME='Marie Lavalle', VIP_NAME='NY TIMES FOOD CRITIC';
let DISASTER='Kitchen Fire', MENU=MENU_POOLS[0];
let day=1, ticketsIn=0, ticketsOut=0, plateThrowCount=0;

let ttl=0, phaseIdx=0;
let activeCamIdx=0, camHoldT=0, camHold=4;
let bannerHold=0, fireOn=false, vipTableIdx=-1, walkInPending=false;
let waiterDownT=0, plateSlamT=0, vipServeT=0, kitchenShake=0;

const PHASES=[
 {t:0,   name:'MISE EN PLACE',  desc:'Setup. Chef tasting sauces. Slow pace.'},
 {t:60,  name:'FIRST GUESTS',   desc:'Doors open. First reservations seated.'},
 {t:120, name:'ORDERS POURING', desc:'Tickets stacking up at the pass.'},
 {t:180, name:'IN THE WEEDS',   desc:'Kitchen overwhelmed. Chef screaming.'},
 {t:240, name:'KITCHEN FIRE',   desc:'Sauté flame-up! Sous extinguishes.'},
 {t:270, name:'VIP ARRIVES',    desc:'Food critic seated at table.'},
 {t:300, name:'WALK-IN OF 8',   desc:'No reservation. Maître d\' panicking.'},
 {t:360, name:'PLATE SLAMMED',  desc:'Quality issue. Plate goes BACK.'},
 {t:390, name:'VIP ENTRÉE OUT', desc:'Cinematic plating. Critic\'s lamb.'},
 {t:420, name:'RUSH CRESTS',    desc:'Dining room loud. Pass on fire.'},
 {t:450, name:'MAN DOWN',       desc:'Waiter slips with full tray.'},
 {t:480, name:'DESSERTS UP',    desc:'Pastry chef sends out the sweets.'},
 {t:510, name:'SERVICE DONE',   desc:'Hugs on the line. Brigade survived.'},
 {t:540, name:'RESET FOR DAY 2',desc:'Reseed: new menu, new VIP, new fire.'}
];
const PHASE_TOTAL=560;

function makeChef(name,role,coatColor,hatH,skinIdx){
 const g=new THREE.Group();
 const skin=SKINS[skinIdx%SKINS.length];
 const head=sph(0.18,skin); head.position.y=1.6; g.add(head);
 if(hatH>0){
   const hat=cyl(0.16,0.20,hatH,0xffffff); hat.position.y=1.78+hatH/2; g.add(hat);
   const hat2=cyl(0.22,0.18,0.06,0xffffff); hat2.position.y=1.78; g.add(hat2);
 } else {
   const hair=sph(0.19,0x2a1810); hair.position.y=1.65; hair.scale.set(1,0.6,1); g.add(hair);
 }
 const body=box(0.42,0.55,0.24,coatColor); body.position.y=1.18; g.add(body);
 const apronColor=coatColor===0xffffff?0xeeeeee:(coatColor===0x111111?0xffffff:0x111111);
 const apron=box(0.36,0.4,0.04,apronColor); apron.position.set(0,1.10,0.13); g.add(apron);
 const armLg=geo(new THREE.BoxGeometry(0.1,0.5,0.1));
 armLg.translate(0,-0.25,0);
 const armL=new THREE.Mesh(armLg,mat(coatColor)); armL.position.set(-0.26,1.43,0); g.add(armL);
 const armRg=geo(new THREE.BoxGeometry(0.1,0.5,0.1));
 armRg.translate(0,-0.25,0);
 const armR=new THREE.Mesh(armRg,mat(coatColor)); armR.position.set(0.26,1.43,0); g.add(armR);
 const legL=box(0.13,0.6,0.13,0x111); legL.position.set(-0.1,0.6,0); g.add(legL);
 const legR=box(0.13,0.6,0.13,0x111); legR.position.set(0.1,0.6,0); g.add(legR);
 const eyeL=sph(0.025,0x000,5); eyeL.position.set(-0.06,1.62,0.16); g.add(eyeL);
 const eyeR=sph(0.025,0x000,5); eyeR.position.set(0.06,1.62,0.16); g.add(eyeR);
 const mouth=box(0.09,0.018,0.02,0x331); mouth.position.set(0,1.55,0.18); g.add(mouth);
 g.userData={name,role,armL,armR,legL,legR,head,body,mouth,t:Math.random()*5,
   target:null,vx:0,vz:0,action:'idle',swing:0,yelling:false,prevY:0};
 return g;
}

function buildAll(){
 root=new THREE.Group(); scene.add(root);
 plates.length=0; flames.length=0; tickets.length=0; runners.length=0;
 stove.length=0; tableMeshes.length=0; tableData.length=0;
 stations.length=0; chefs.length=0; servers.length=0; cams.length=0;
 kitchenLights.length=0;

 // FLOOR — base
 const floor=box(80,0.4,50,0x1a1210); floor.position.y=-0.2; root.add(floor);
 const kFloor=box(34,0.05,18,0x2a2b30); kFloor.position.set(-12,0.03,-1); root.add(kFloor);
 const dFloor=box(28,0.05,20,0x4a2818); dFloor.position.set(13,0.03,1); root.add(dFloor);

 // KITCHEN BACK WALL & HOOD
 const bw=box(34,8,0.3,0x222228); bw.position.set(-12,4,-9); root.add(bw);
 const subwayTile=box(34,3,0.05,0xf0e8dc); subwayTile.position.set(-12,2.5,-8.85); root.add(subwayTile);
 const hood=box(28,1.4,4.2,0x404048); hood.position.set(-12,5.6,-6); root.add(hood);
 const hoodLip=box(28,0.18,4.4,0x202028); hoodLip.position.set(-12,4.95,-6); root.add(hoodLip);
 const hoodFront=box(28,0.7,0.15,0x303038); hoodFront.position.set(-12,5.2,-3.85); root.add(hoodFront);

 // RANGE BACK (continuous range top)
 const range=box(28,1.0,1.6,0x222226); range.position.set(-12,0.5,-7.2); root.add(range);
 const rangeTop=box(28,0.06,1.6,0x111114); rangeTop.position.set(-12,1.03,-7.2); root.add(rangeTop);

 // 8 STATIONS
 const stationXs=[-23,-19.7,-16.4,-13.1,-9.8,-6.5,-3.2,0.1];
 for(let i=0;i<8;i++){
   const sg=new THREE.Group();
   const x=stationXs[i], z=-5.5;
   const cnt=box(2.8,1.0,1.5,0xb8b8c0); cnt.position.y=0.5; sg.add(cnt);
   const tp=box(2.8,0.05,1.5,0xe8e8ee); tp.position.y=1.02; sg.add(tp);
   // station label sign on hood front
   if(i!==7){
     for(let bi=0;bi<2;bi++){
       const b=cyl(0.28,0.28,0.06,0x222,10); b.position.set(-0.6+bi*1.2,1.06,-1.3); sg.add(b);
       const ring=cyl(0.32,0.32,0.02,0xff5522,10); ring.material=matB(0xff4400,0.7);
       ring.position.set(-0.6+bi*1.2,1.08,-1.3); sg.add(ring);
       const flame=cyl(0.18,0.0,0.42,0xff6622,6);
       flame.material=matB(0xff7722,0.85);
       flame.position.set(x-0.6+bi*1.2,1.32,z-1.3);
       flame.userData={baseY:1.32,idx:i,sub:bi,ph:Math.random()*TAU,scale:1};
       flame.visible=(i<6);
       root.add(flame);
       flames.push(flame);
     }
   }
   if(i===2){ // garde-manger has cold counter
     const cold=box(2.6,0.03,1.4,0xddeeff); cold.position.set(0,1.04,0); sg.add(cold);
   }
   if(i===3){ // pasta station has pot
     const pot=cyl(0.4,0.4,0.5,0x333,12); pot.position.set(0,1.3,0); sg.add(pot);
     const water=cyl(0.36,0.36,0.05,0xeeeeff,12); water.material=matB(0xddeeff,0.7);
     water.position.set(0,1.5,0); sg.add(water);
   }
   if(i===1){ // grill grates
     const grates=box(2,0.04,1.0,0x111); grates.position.set(0,1.05,0); sg.add(grates);
     for(let g0=0;g0<6;g0++){const gr=box(2,0.06,0.05,0x222);gr.position.set(0,1.08,-0.45+g0*0.18);sg.add(gr);}
   }
   if(i===4){ // pastry — flour, eggs
     const bowl=cyl(0.25,0.18,0.18,0xf5deb3,12); bowl.position.set(0.5,1.12,0); sg.add(bowl);
     const board=box(0.8,0.04,0.5,0xd8b888); board.position.set(-0.4,1.05,0); sg.add(board);
   }
   sg.position.set(x,0,z);
   sg.userData={type:STATION_TYPES[i],x,z,idx:i};
   root.add(sg);
   stations.push(sg);
 }

 // PASS — at front of kitchen (between line and dining)
 passEl=new THREE.Group();
 const passTop=box(10,0.1,1.4,0xddccaa); passTop.position.y=1.0; passEl.add(passTop);
 const passBase=box(10,1,1.4,0x2a2a2a); passBase.position.y=0.5; passEl.add(passBase);
 const hlBar=box(9,0.12,0.32,0x222); hlBar.position.set(0,2.0,0); passEl.add(hlBar);
 for(let i=-4;i<=4;i++){
   const lamp=cyl(0.09,0.09,0.12,0xff5500,8);
   lamp.material=matB(0xff5500,1);
   lamp.position.set(i,1.92,0);
   passEl.add(lamp);
   const halo=cyl(0.16,0.30,0.06,0xff4400,10);
   halo.material=matB(0xff6622,0.45);
   halo.position.set(i,1.84,0);
   passEl.add(halo);
 }
 // ticket printer

// MAIN UPDATE
function updatePhase(){
 // find phase index
 let p=0;
 for(let i=0;i<PHASES.length;i++){if(ttl>=PHASES[i].t)p=i;}
 if(p!==phaseIdx){
   phaseIdx=p;
   onPhaseEnter(p);
 }
 const ph=PHASES[phaseIdx];
 document.getElementById('phase').innerHTML='<span class="p">PHASE '+(phaseIdx+1)+' / '+PHASES.length+'</span>'+ph.name+'<br><span style="color:#aaa;font-size:11px;letter-spacing:1px;font-weight:400">'+ph.desc+'</span>';
}

function onPhaseEnter(p){
 const ph=PHASES[p];
 if(p===0){ // mise en place
   // empty
 } else if(p===1){ // first guests
   for(let i=0;i<3;i++){seatTable(i);}
   setBanner('DOORS OPEN — FIRST SEATING','#0a4a2a',3);
 } else if(p===2){ // orders pour
   for(let i=3;i<8;i++){seatTable(i);}
   setBanner('ORDERS POURING IN','#c66a00',2.5);
 } else if(p===3){ // weeds
   for(let i=8;i<12;i++){if(i!==vipTableIdx)seatTable(i);}
   setBanner('IN THE WEEDS','#c00',3);
 } else if(p===4){ // fire
   triggerFire();
 } else if(p===5){ // VIP arrives
   vipTableIdx=Math.floor(RND(0,12));
   if(!tableData[vipTableIdx].occupied)seatTable(vipTableIdx);
   tableData[vipTableIdx].vip=true;
   setBanner('★ VIP — '+VIP_NAME+' SEATED ★','#9a6f00',4);
 } else if(p===6){ // walk-in
   walkInPending=true;
   setBanner('WALK-IN OF 8 — NO RESERVATION','#552288',3);
   // seat any remaining
   for(let i=0;i<12;i++){if(!tableData[i].occupied)seatTable(i);}
 } else if(p===7){ // plate slammed
   plateSlamT=2.0;
   plateThrowCount++;
   kitchenShake=0.6;
   setBanner('RUNNER 5 — BACK TO THE LINE','#c00',3.5);
 } else if(p===8){ // VIP entrée out
   vipServeT=4.0;
   if(vipTableIdx>=0)spawnPlate(-9,-3,tableMeshes[vipTableIdx].position.x,tableMeshes[vipTableIdx].position.z,0,'VIP LAMB');
   setBanner('VIP ENTRÉE OUT — TABLE '+(vipTableIdx+1),'#9a6f00',3.5);
 } else if(p===9){ // rush crests
   setBanner('FULL HOUSE — DINING ROOM ROARING','#c00',2.5);
 } else if(p===10){ // man down
   waiterDownT=4.0;
   setBanner('MAN DOWN ON FLOOR','#c00',4);
 } else if(p===11){ // desserts
   for(let i=0;i<6;i++){
     setTimeout(()=>{spawnPlate(stations[4].position.x,stations[4].position.z+1,4+RND(0,16),-5+RND(0,10),i*0.4,'DESSERT');},i*120);
   }
   setBanner('DESSERTS UP','#dd66aa',3);
 } else if(p===12){ // service done
   setBanner('SERVICE COMPLETE — BRIGADE SURVIVED','#0a4a2a',5);
   // chefs hug — visual: head moves to sous
 } else if(p===13){ // reset
   setBanner('RESET FOR DAY '+(day+1),'#333',3);
 }
}

// ANIMATIONS — chefs, plates, etc.
function updateChef(c, dt){
 const u=c.userData;
 u.t+=dt;
 // walk to target if any
 if(u.target){
   const dx=u.target.x-c.position.x, dz=u.target.z-c.position.z;
   const d=Math.hypot(dx,dz);
   if(d>0.1){
     const sp=(u.role==='head'?3.5:2.4)*dt;
     c.position.x+=dx/d*sp;
     c.position.z+=dz/d*sp;
     c.rotation.y=Math.atan2(dx,dz);
     u.action='walk';
   } else {
     u.target=null;
     u.action='idle';
     if(u.targetCb){u.targetCb();u.targetCb=null;}
   }
 }
 // limbs
 const sw=u.action==='walk'?Math.sin(u.t*8)*0.6:Math.sin(u.t*2.5)*0.12;
 u.armL.rotation.x=sw*0.8;
 u.armR.rotation.x=-sw*0.8;
 u.legL.position.z=Math.sin(u.t*8)*0.05*(u.action==='walk'?1:0.3);
 u.legR.position.z=-Math.sin(u.t*8)*0.05*(u.action==='walk'?1:0.3);
 // cooking action: arm swing on station  
 if(u.role==='cook' && u.action==='idle'){
   u.armR.rotation.x=Math.sin(u.t*5+u.station)*0.5-0.3;
   u.armL.rotation.x=Math.sin(u.t*5+u.station+1)*0.4-0.2;
   if(u.station===3){
     // pasta toss — bigger arm motion
     u.armR.rotation.x=Math.sin(u.t*4)*1.2-0.6;
   }
 }
 // head chef yelling
 if(u.role==='head' && u.yelling){
   c.position.y=Math.abs(Math.sin(u.t*9))*0.08;
   u.armR.rotation.x=Math.sin(u.t*7)*0.5-1.6;
   u.armL.rotation.x=Math.sin(u.t*6+1)*0.4-1.4;
   u.head.rotation.x=Math.sin(u.t*6)*0.15;
   u.mouth.scale.set(1.4+Math.sin(u.t*15)*0.4,2.5+Math.sin(u.t*15)*1,1);
 } else {
   c.position.y=0;
   u.mouth.scale.set(1,1,1);
   u.head.rotation.x=0;
 }
 // server with tray
 if(u.tray){
   u.armL.rotation.x=-1.4; u.armR.rotation.x=-1.4;
 }
}

function update(dt){
 ttl+=dt;
 if(ttl>=PHASE_TOTAL){reseed(); return;}
 updatePhase();

 // CHEFS dynamic behavior
 const head=chefs.find(c=>c.userData.role==='head');
 const sous=chefs.find(c=>c.userData.role==='sous');

 // head chef yells in weeds and beyond
 if(head){
   head.userData.yelling=(phaseIdx>=2 && phaseIdx<=11) || (phaseIdx===3) || (phaseIdx===7);
   // storm to a station occasionally
   if(!head.userData.target && Math.random()<0.005 && phaseIdx>=3 && phaseIdx<=10){
     const targetCook=chefs[Math.floor(Math.random()*8)];
     head.userData.target={x:targetCook.position.x+0.6,z:targetCook.position.z};
     head.userData.targetCb=()=>{
       kitchenShake=0.4;
       newQuote();
       setTimeout(()=>{head.userData.target={x:head.userData.home.x,z:head.userData.home.z};},2200);
     };
   }
 }

 // sous extinguishes fire
 if(fireOn && sous && fireMesh){
   const fx=fireMesh.position.x, fz=fireMesh.position.z;
   if(!sous.userData.target){
     sous.userData.target={x:fx+1.0,z:fz+1.5};
     sous.userData.targetCb=()=>{
       setTimeout(()=>{
         extinguishFire();
         sous.userData.target={x:sous.userData.home.x,z:sous.userData.home.z};
       },2500);
     };
   }
 }

 // CHEFS update
 chefs.forEach(c=>updateChef(c,dt));
 servers.forEach(s=>updateChef(s,dt));

 // FLAMES — pulse
 flames.forEach(f=>{
   f.userData.ph+=dt*8;
   const s=0.7+Math.sin(f.userData.ph)*0.35+(phaseIdx>=3?0.2:0);
   f.scale.set(s,1+Math.sin(f.userData.ph*1.4)*0.3,s);
   f.position.y=f.userData.baseY+Math.sin(f.userData.ph*2)*0.04;
 });

 // FIRE
 if(fireMesh){
   fireMesh.userData.t+=dt;
   const s=1+Math.sin(fireMesh.userData.t*8)*0.25;
   fireMesh.scale.set(s,1+Math.abs(Math.sin(fireMesh.userData.t*5))*0.4,s);
   fireMesh.rotation.y+=dt*5;
   fireMesh.material.color.setHSL(0.05+Math.sin(fireMesh.userData.t*6)*0.03,1,0.55);
   // light flicker
   kitchenLights.forEach((l,i)=>{
     if(i<2){l.intensity=0.7+Math.random()*0.5;l.color.setHex(0xff5522);}
   });
 } else {
   kitchenLights.forEach((l,i)=>{if(i<5){l.intensity=0.55;l.color.setHex(0xff8844);}});
 }

 // PASTA TOSS
 if(pastaPan){
   pastaPan.userData.t+=dt;
   pastaPan.position.y=1.4+Math.abs(Math.sin(pastaPan.userData.t*4))*0.25;
   pastaPan.rotation.z=Math.sin(pastaPan.userData.t*4)*0.4;
 }

 // PLATES — animate from station to pass to runner to table
 for(let i=plates.length-1;i>=0;i--){
   const pl=plates[i];
   const u=pl.userData;
   u.t+=dt;
   if(u.t<0)continue;
   const k=Math.min(1,u.t/u.dur);
   // arc from -> to via pass
   const passX=-9, passZ=-3;
   if(u.phase===0){
     // station -> pass
     const k1=k;
     pl.position.x=u.fromX*(1-k1)+passX*k1;
     pl.position.z=u.fromZ*(1-k1)+passZ*k1;
     pl.position.y=u.baseY+Math.sin(k1*Math.PI)*0.4;
     pl.rotation.y+=dt*2;
     if(k>=1){u.phase=1;u.t=0;u.dur=2.2;u.passX=passX;u.passZ=passZ;}
   } else {
     const k1=k;
     pl.position.x=passX*(1-k1)+u.toX*k1;
     pl.position.z=passZ*(1-k1)+u.toZ*k1;
     pl.position.y=1.05+Math.sin(k1*Math.PI)*0.25;
     if(k>=1){
       root.remove(pl);
       plates.splice(i,1);
       ticketsOut++;
       // mark table eaten if matches
       for(let j=0;j<tableData.length;j++){
         if(Math.abs(tableMeshes[j].position.x-u.toX)<0.5 && Math.abs(tableMeshes[j].position.z-u.toZ)<0.5){
           tableData[j].state='eat';
         }
       }
     }
   }
 }

 // SPAWN PLATES randomly during service
 if(phaseIdx>=2 && phaseIdx<=11 && Math.random()<dt*(phaseIdx>=3?2.0:1.0)){
   const occT=tableData.filter(t=>t.occupied && t.state!=='eat');
   if(occT.length>0){
     const t=PICK(occT);
     const sIdx=Math.floor(Math.random()*6);
     spawnPlate(stations[sIdx].position.x,stations[sIdx].position.z+0.5,
       tableMeshes[t.idx].position.x,tableMeshes[t.idx].position.z,
       0,PICK(MENU));
   }
 }

 // TICKETS — drop at pass
 if(phaseIdx>=2 && phaseIdx<=10 && Math.random()<dt*(phaseIdx>=3?5:2.5)){
   spawnTicket();
 }
 for(let i=tickets.length-1;i>=0;i--){
   const t=tickets[i];
   t.userData.t+=dt;
   t.position.y-=dt*0.3+t.userData.t*0.05;
   t.position.x+=Math.sin(t.userData.t*3+i)*0.005;
   t.rotation.y+=dt*1.5;
   t.rotation.x+=dt*0.8;
   if(t.position.y<1.05){
     t.position.y=1.05;
     if(t.userData.t>4){
       root.remove(t);
       tickets.splice(i,1);
     }
   }
 }

 // TABLE FLAMES (candle flicker)
 tableData.forEach(td=>{
   if(td.cflame){
     td.cflame.scale.y=0.8+Math.random()*0.4;
     td.cflame.scale.x=0.9+Math.random()*0.2;
   }
 });

 // TABLE STATE TRANSITIONS
 tableData.forEach((td,i)=>{
   if(td.occupied){
     td.seatedT+=dt;
     if(td.state==='order' && td.seatedT>RND(15,30)){td.state='wait';}
     if(td.state==='wait' && td.seatedT>RND(60,90)){td.state='late';}
     if(td.state==='eat' && td.seatedT>RND(90,140)){
       leaveTable(i);
     }
   }
 });

 // BANNER timer
 if(bannerHold>0){bannerHold-=dt;if(bannerHold<=0)hideBanner();}

 // CAMERA SWITCH
 camHoldT+=dt;
 if(camHoldT>camHold){
   camHoldT=0;
   camHold=RND(3.5,5.5);
   pickNextCam();
 }

 // CAMERA SHAKE
 const ac=cams[activeCamIdx];
 const baseLook=ac.userData.lookOrig||null;
 if(kitchenShake>0){
   kitchenShake-=dt;
   ac.position.x+=RND(-0.04,0.04);
   ac.position.y+=RND(-0.03,0.03);
   document.getElementById('ui').classList.add('shake');
   setTimeout(()=>document.getElementById('ui').classList.remove('shake'),300);
 }

 // SUNSET dimming over time
 const skyHue=Math.max(0.0,0.06-ttl*0.00006);
 // (skip for brevity — keep static for size)

 // QUOTE rotation
 quoteT+=dt;
 if(quoteT>5.5){newQuote();}

 // UI UPDATES
 updateUI();
}

function pickNextCam(){
 // bias toward current event
 let pool=[0,1,2,3,11];
 if(phaseIdx===4 && fireOn) pool=[5,2,6];
 else if(phaseIdx===5 || (vipTableIdx>=0 && phaseIdx>=5 && phaseIdx<=10)) pool=[4,3,1,8];
 else if(phaseIdx===6) pool=[10,3,0];
 else if(phaseIdx===7) pool=[6,1,7];
 else if(phaseIdx===8) pool=[7,4,1];
 else if(phaseIdx===10) pool=[3,4,1];
 else if(phaseIdx===11) pool=[7,3,1];
 else if(phaseIdx===12) pool=[6,0,1];
 else if(phaseIdx>=2) pool=[0,1,6,11,2,3];
 if(Math.random()<0.18) pool.push(8); // patio
 if(Math.random()<0.10) pool.push(9); // walk-in
 activeCamIdx=PICK(pool);
 const c=cams[activeCamIdx];
 document.getElementById('camLabel').innerHTML='<span class="num">CAM '+(activeCamIdx+1)+' /</span>'+c.userData.n;
}

function updateUI(){
 // status
 const inWeeds=phaseIdx>=3 && phaseIdx<=10;
 document.getElementById('status').innerHTML=
  '<b>TICKETS IN:</b> '+ticketsIn+'<br>'+
  '<b>TICKETS OUT:</b> '+ticketsOut+'<br>'+
  '<b>ON THE LINE:</b> '+Math.max(0,ticketsIn-ticketsOut)+'<br>'+
  '<b>IN THE WEEDS:</b> <span class="'+(inWeeds?'weeds':'ok')+'">'+(inWeeds?'YES':'NO')+'</span><br>'+
  '<b>FIRES:</b> '+(fireOn?'<span class="weeds">ACTIVE 🔥</span>':'<span class="ok">CLEAR</span>')+'<br>'+
  '<b>PLATES SLAMMED:</b> '+plateThrowCount+'<br>'+
  '<b>VIP TABLE:</b> '+(vipTableIdx>=0?('#'+(vipTableIdx+1)):'NONE');

 // timer
 const m=Math.floor(ttl/60), s=Math.floor(ttl%60);
 document.getElementById('timer').innerHTML='<span class="lbl">SERVICE TIME</span>'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;

 // tables grid
 for(let i=0;i<12;i++){
   const td=tableData[i], el=document.getElementById('tc'+i);
   if(!el)continue;
   let cls='table-cell ';
   if(!td.occupied)cls+='t-empty';
   else if(td.vip)cls+='t-vip';
   else if(td.state==='order')cls+='t-order';
   else if(td.state==='wait')cls+='t-wait';
   else if(td.state==='late')cls+='t-late';
   else if(td.state==='eat')cls+='t-eat';
   el.className=cls;
 }

 // lower third
 const head=chefs.find(c=>c.userData.role==='head');
 const lt=phaseIdx;
 let who, name, desc;
 if(lt<2){who='WHO IS';name=HEAD_CHEF_NAME;desc='HEAD CHEF · 12 YEARS · 2 MICHELIN STARS';}
 else if(lt===3 || lt===7){who='IN THE WEEDS';name=HEAD_CHEF_NAME;desc='HEAD CHEF · LOSING IT';}
 else if(lt===4){who='ON THE LINE';name=SOUS_NAME;desc='SOUS CHEF · FIRE EXTINGUISHER IN HAND';}
 else if(lt===5 || lt===8){who='AT TABLE '+(vipTableIdx+1);name=VIP_NAME;desc='REVIEWING TONIGHT';}
 else if(lt===6){who='AT THE DOOR';name='Lillian Park';desc='MAÎTRE D\' · NO TABLE LEFT';}
 else if(lt===10){who='ON THE FLOOR';name='Sasha Olin';desc='SERVER · MAN DOWN';}
 else if(lt===11){who='ON THE PASS';name='Camille Rho';desc='PASTRY CHEF · DESSERTS UP';}
 else if(lt===12){who='SERVICE OVER';name='Brigade';desc='THEY SURVIVED';}
 else {who='WHO IS';name=HEAD_CHEF_NAME;desc='HEAD CHEF · ON THE PASS';}
 document.getElementById('lower').innerHTML='<div class="who">'+who+'</div><div class="name">'+name+'</div><div class="desc">'+desc+'</div>';

 // PIP commenters
 if(currentQuote){
   document.getElementById('pip').innerHTML=
    '<div class="pip-cell"><div class="face" style="background:linear-gradient(135deg,#5a3320,#a06a44)">👩‍🍳</div><div class="nm">ELEANOR VANCE</div><div class="role">FOOD CRITIC</div><div class="quote">"'+(['The brigade is buckling.','That sauce is split — I can see it from here.','Twelve minutes on the lamb. Unacceptable.','The maître d\' is sweating through his suit.','Plating like that wins stars.','I\'d send this back too.'][Math.floor(ttl)%6])+'"</div></div>'+
    '<div class="pip-cell"><div class="face" style="background:linear-gradient(135deg,#3a4855,#7b8a99)">👨‍🍳</div><div class="nm">TOBI MENSAH</div><div class="role">RESTAURANT INSIDER</div><div class="quote">"'+(['I\'ve seen Brecon yell — never like this.','That walk-in is going to break them.','Sous chef just saved the night.','Heat lamps are on. Pass is stacked.','VIP table is the make-or-break.','Brigade still moving. Barely.'][Math.floor(ttl/3)%6])+'"</div></div>';
 }

 // QUOTE card
 if(currentQuote){
   document.getElementById('quoteCard').innerHTML='"'+currentQuote[0]+'"<span class="src">— '+(currentQuote[1]==='Chef'?HEAD_CHEF_NAME:currentQuote[1]==='Line'?'LINE COOK':'EXPEDITER')+'</span>';
 }
}

// BUILD + LOOP
buildAll();
buildMenuBoard();
buildTableGrid();
rebuildChyron();
newQuote();
setBanner('SERVICE NIGHT 1 — DOORS OPENING','#330d12',3.0);

let last=performance.now();
function loop(now){
 requestAnimationFrame(loop);
 const dt=Math.min(0.05,(now-last)/1000);
 last=now;
 try{ update(dt); }catch(e){console.error(e);}
 const ac=cams[activeCamIdx]||cams[0];
 renderer.render(scene,ac);
}
requestAnimationFrame(loop);

// expose for debug
window.__inferno={cams,chefs,reseed};
})();
</script></body></html>
