<style>

  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05060d;color:var(--ink);font-family:var(--sans);overflow:hidden}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* ── top overlay ── */
  .hud{position:fixed;top:0;left:0;right:0;padding:16px 18px;pointer-events:none;
       display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;justify-content:space-between}
  .id-card{pointer-events:auto;background:var(--panel);border:1px solid var(--panel-line);

  .id-card h1{margin:0;font-size:19px;font-weight:650;letter-spacing:.2px;

  .meta{margin-top:7px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}

  .caption{margin-top:9px;font-size:11.5px;line-height:1.45;color:var(--faint);max-width:280px}

       box-shadow:0 6px 20px rgba(0,0,0,.4);transition:transform .12s,border-color .2s,box-shadow .2s}

  .btn.primary{background:linear-gradient(180deg,#3a4bd0,#5e3cc0);border-color:rgba(160,150,255,.5)}

  /* ── bottom: DNA + load ── */
  .dock{position:fixed;left:18px;bottom:16px;right:18px;pointer-events:none;

  .loader{pointer-events:auto;background:var(--panel);border:1px solid var(--panel-line);border-radius:12px;

  @media (max-width:720px){

  }
  @media (prefers-reduced-motion:reduce){button.btn{transition:none}}
</style>

<div id="stage"><canvas id="c"></canvas></div>

<div class="hud">

    <h1 id="title">Prismstride</h1>

      A faceted crystalline arthropod. Its gem body is minted from a

<script>
/* ══════════════════════════════════════════════════════════════════════════
   FAUNA-EGG CORE — verified byte-exact against openrappter-vui / genome.js.
   Embed VERBATIM. Do NOT edit: genomeId must stay reproducible.
   ══════════════════════════════════════════════════════════════════════════ */
const EGG = (() => {
  const b64enc = s => btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const b64dec = s => { s=String(s).replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); };
  async function sha256hex(str){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
  function canonical(v){
    if(Array.isArray(v)) return '['+v.map(canonical).join(',')+']';
    if(v!==null&&typeof v==='object') return '{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+canonical(v[k])).join(',')+'}';
    return JSON.stringify(v);
  }
  async function genomeId(genome){ return (await sha256hex(canonical(genome))).slice(0,12); }
  // xmur3 → mulberry32 deterministic PRNG (byte-identical to genome.js mkRng)
  function mkRng(seed){ let h=1779033703^seed.length; for(let i=0;i<seed.length;i++){h=Math.imul(h^seed.charCodeAt(i),3432918353);h=h<<13|h>>>19;} h=Math.imul(h^h>>>16,2246822507); h=Math.imul(h^h>>>13,3266489909); let s=(h^=h>>>16)>>>0; return function(){s+=0x6D2B79F5;let t=Math.imul(s^s>>>15,1|s);t=(t+Math.imul(t^t>>>7,61|t))^t;return((t^t>>>14)>>>0)/4294967296;}; }
  // geohash encode (precision 6) so each egg carries a plausible born.coord
  function geohash(lat,lng,precision=6){ const B='0123456789bcdefghjkmnpqrstuvwxyz'; let even=true,hash='',bits=0,hc=0; const la=[-90,90],lo=[-180,180]; while(hash.length<precision){ if(even){const m=(lo[0]+lo[1])/2; if(lng>m){hc=(hc<<1)|1;lo[0]=m;}else{hc<<=1;lo[1]=m;}} else {const m=(la[0]+la[1])/2; if(lat>m){hc=(hc<<1)|1;la[0]=m;}else{hc<<=1;la[1]=m;}} even=!even; if(++bits===5){hash+=B[hc];bits=0;hc=0;} } return hash; }

  // Pack a genome into a canonical .egg payload (matches openrappter-vui exactly).
  async function pack(genome, meta={}){
    const id = await genomeId(genome);
    const rng = mkRng(id);
    const payload = {
      genome, id,
      born: meta.born || { coord: geohash((rng()*140)-70, (rng()*360)-180), t: 0 },
      title: meta.title || 'a rappter',
      rarity: meta.rarity || 'uncommon',
      source: meta.source || 'learnwithkody-fauna'
    };
    return { egg: b64enc(JSON.stringify(payload)), id, payload };
  }
  function unpack(b64){ return JSON.parse(b64dec(b64.trim())); }
  function download(b64, id){ const a=document.createElement('a'); a.href='data:application/octet-stream;base64,'+btoa(b64); /* raw text egg */ a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(b64); a.download=`rappter-${String(id).slice(0,8)}.egg`; document.body.appendChild(a); a.click(); a.remove(); }
  return { b64enc, b64dec, genomeId, mkRng, geohash, pack, unpack, download };
})();

/* ══════════════════════════════════════════════════════════════════════════
   PRISMSTRIDE — a faceted crystalline arthropod that walks on IK legs.
   Model: a hard-edged polygonal gem (two facet rings + core fan), hue-shifting.
   Animation: an event-driven procedural walk — feet plant in world space while
   the body advances; 2-bone IK solves each leg; it strides and turns at edges.
   ══════════════════════════════════════════════════════════════════════════ */
"use strict";
(() => {
const TAU = Math.PI*2, clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const smooth=t=>t*t*(3-2*t), r3=x=>Math.round(x*1000)/1000;
const R=(a,b)=>a+Math.random()*(b-a), Ri=(a,b)=>Math.floor(R(a,b+1)), pick=a=>a[Ri(0,a.length-1)];

/* ── colour helpers (HSL ↔ hex; genome stores hexes, we re-parse on render) ── */
function hslToHex(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  const to=x=>Math.round(x*255).toString(16).padStart(2,'0');
  return '#'+to(f(0))+to(f(8))+to(f(4));
}
function hexToHsl(hex){
  let m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex.trim());
  if(!m) return {h:200,s:70,l:55};
  let r=parseInt(m[1],16)/255,g=parseInt(m[2],16)/255,b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; let h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  const l=(mx+mn)/2, s=d?d/(1-Math.abs(2*l-1)):0;
  return {h, s:s*100, l:l*100};
}

/* ════════════════ GENOME — biased to Prismstride's crystalline identity ════════════════ */
const EPITHETS=['Vireo','Halide','Cinder','Zephyr','Vane','Quartz','Umbra','Lumen','Cairn','Ferrite','Onyx','Beryl','Spire','Cael'];
function mkGenome(){
  // jewel base hue → analogous body + a complementary refraction spark
  const base=R(0,360);
  const palette=[
    hslToHex(base,               R(64,84), R(50,60)),
    hslToHex(base+R(20,40),      R(70,88), R(56,66)),
    hslToHex(base+180+R(-14,14), R(74,90), R(58,66)),   // complementary glint
    hslToHex(base+R(-40,-18),    R(55,72), R(38,48)),   // deep shadow facet
    hslToHex(base+R(6,22),       R(85,98), R(70,80)),   // hot highlight
  ];
  const form={
    role:'form', k:40,
    shape: Math.random()<0.72 ? 'star' : 'ring',
    limbs: pick([4,6,6,8]),
    segments: Ri(5,12),
    symmetry: 'bilateral',
    body_r: r3(R(0.28,0.5)),
    limb_len: r3(R(0.36,0.58)),
    // extensions (hash into id; still a valid egg)
    crown: Ri(3,7),
    facetJitter: r3(R(0.05,0.2)),
    innerScale: r3(R(0.44,0.66)),
  };
  const surface={
    role:'surface', k:60,
    palette,
    pattern: pick(['glow','glow','stripe']),
    glow: r3(R(0.45,1)),
    opacity: r3(R(0.82,1)),
    refraction: r3(R(6,28)),      // hue-shift deg/sec across facets
    facetContrast: r3(R(0.25,0.6)),
  };
  const motion={
    role:'motion', k:50,
    breathe: r3(R(0.2,0.6)),
    drift:   r3(R(0.05,0.3)),
    pulse:   r3(R(0.35,1)),
    reach:   r3(R(0.35,0.7)),
    cadence: r3(R(0.7,1.5)),      // step frequency
    stride:  r3(R(0.4,0.85)),     // step length
    gaitSpread: r3(R(0.5,1)),
  };
  return { layers:[form,surface,motion], compose:{windows:[[0,1,2]], loop:true} };
}
function rollRarity(g){
  const f=g.layers[0], s=g.layers[1], m=g.layers[2];
  const score=(s.glow*0.9)+(m.pulse*0.8)+(f.limbs/8*0.6)+(f.segments/12*0.5)+(s.refraction/28*0.7)+Math.random()*0.5;
  if(score>3.0) return 'legendary';
  if(score>2.5) return 'epic';
  if(score>2.0) return 'rare';
  if(score>1.4) return 'uncommon';
  return 'common';
}
const RCOL={common:'#8b93b8',uncommon:'#63e6a0',rare:'#5ac8ff',epic:'#c07bff',legendary:'#ffcf4d'};

/* ════════════════ MODEL — precompute gem geometry + leg mounts in unit space ════════════════ */
function buildModel(genome, canvasMin){
  const f=genome.layers[0], s=genome.layers[1], m=genome.layers[2];
  const seg=f.segments, star=f.shape==='star';
  const size = clamp(canvasMin*0.135,60,260) * (0.82+f.body_r);
  const jit=f.facetJitter, inner=f.innerScale;

  // deterministic per-vertex jitter from a genome-seeded rng so shape is stable
  const rng=EGG.mkRng((f.segments+'-'+f.crown+'-'+f.body_r));
  const outer=[], mid=[];
  for(let i=0;i<seg;i++){
    const a=i/seg*TAU - Math.PI/2;
    // star → alternate spike/valley; crown biases spike sharpness
    let rad = star ? (i%2 ? 1.0 : lerp(0.5,0.72,(f.crown-3)/4)) : 1.0;
    rad *= 1 - jit*0.5 + rng()*jit;                    // crystalline irregularity
    outer.push({x:Math.cos(a)*rad, y:Math.sin(a)*rad});
    mid.push({x:Math.cos(a+0.16)*rad*inner, y:Math.sin(a+0.16)*rad*inner});
  }
  // facets: ring of quads (outer↔mid) + core fan (mid↔center) = 2·seg faces
  const palHsl=s.palette.map(hexToHsl);
  const facets=[];
  for(let i=0;i<seg;i++){
    const j=(i+1)%seg;
    facets.push({pts:[outer[i],outer[j],mid[j],mid[i]], pal:i%palHsl.length, hoff:(i*37)%80-40, ring:0});
    facets.push({pts:[mid[i],mid[j],{x:0,y:0}], pal:(i+2)%palHsl.length, hoff:(i*53)%70-35, ring:1});
  }

  // legs — hips spread along the gem's lower silhouette, bilateral
  const legLen=size*(1.35+f.limb_len*1.9);
  const hips=[]; const N=f.limbs;
  for(let i=0;i<N;i++){
    const t=N>1 ? i/(N-1) : 0.5;
    hips.push({x:lerp(-0.72,0.72,t), y:0.42+Math.abs(t-0.5)*0.22, near:i%2===0, idx:i});
  }
  return {
    genome, f,s,m, size, seg, outer, mid, facets, palHsl,
    legLen, L1:legLen*0.52, L2:legLen*0.5, hips,
    standHeight: legLen*0.8,
  };
}

/* ════════════════ WALK STATE ════════════════ */
function initWalk(model, W, H){
  const groundY=H*0.74;
  const bx=W*0.5;
  const dir=Math.random()<0.5?1:-1;
  const legs=model.hips.map((h,i)=>{
    const hx=bx + h.x*model.size*dir;
    return {plantX:hx + dir*model.size*(0.2+ (i%3)*0.24), targetX:hx, swinging:false, t:0};
  });
  return { bx, dir, groundY, dist:0, legs, tGlobal:0, turnHold:0 };
}

/* ════════════════ RENDERER ════════════════ */
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
let W=0,H=0,DPR=1, dust=[];
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  dust=Array.from({length:reduce?24:70},()=>({
    x:Math.random()*W, y:Math.random()*H, z:Math.random(), ph:Math.random()*TAU
  }));
  if(state) state.walk.groundY=H*0.74;
}
window.addEventListener('resize',resize);

// 2-bone IK → knee bent upward (spider-like): pick solution with higher knee
function solveIK(hx,hy,fx,fy,L1,L2){
  let dx=fx-hx, dy=fy-hy, d=Math.hypot(dx,dy);
  const dmin=Math.abs(L1-L2)+0.001, dmax=L1+L2-0.001;
  if(d<dmin){ d=dmin; } if(d>dmax){ d=dmax; }
  const ux=dx/(Math.hypot(dx,dy)||1), uy=dy/(Math.hypot(dx,dy)||1);
  const a=(L1*L1 - L2*L2 + d*d)/(2*d);
  const hh=Math.sqrt(Math.max(0,L1*L1-a*a));
  const mx=hx+a*ux, my=hy+a*uy;
  const k1={x:mx - hh*uy, y:my + hh*ux}, k2={x:mx + hh*uy, y:my - hh*ux};
  return k1.y<k2.y ? k1 : k2;
}

let state=null;  // {model, walk, id, eggB64, title, rarity, ...}

function updateWalk(dt){
  const {model,walk}=state, m=model.m;
  const speed = model.size*(1.4+m.cadence*1.1);       // px/sec
  const stride = model.size*(1.05+m.stride*1.5);
  const lift = model.size*(0.32+m.reach*0.42);
  const swingTime = clamp(0.34/(m.cadence+0.3),0.14,0.5);

  // edge turn
  const margin=Math.max(model.size*1.3, W*0.12);
  if(walk.turnHold>0){ walk.turnHold-=dt; }
  else if((walk.dir>0 && walk.bx>W-margin) || (walk.dir<0 && walk.bx<margin)){
    walk.dir*=-1; walk.turnHold=0.32;
  }
  const move = walk.turnHold>0 ? speed*dt*0.15 : speed*dt;
  walk.bx += move*walk.dir; walk.dist += move;

  const maxSwing=Math.max(1,Math.floor(model.hips.length*0.4));
  let swinging=walk.legs.filter(l=>l.swinging).length;

  for(let i=0;i<walk.legs.length;i++){
    const h=model.hips[i], L=walk.legs[i];
    const hipX = walk.bx + h.x*model.size*walk.dir;
    if(!L.swinging){
      const behind = walk.dir>0 ? (hipX-L.plantX) : (L.plantX-hipX);
      const overreach = -behind;   // foot way ahead (after a turn)
      if((behind>stride*0.55 || overreach>stride*1.25) && swinging<maxSwing){
        L.swinging=true; L.t=0; L.targetX=hipX + walk.dir*stride*0.5; L.fromX=L.plantX; swinging++;
      }
    } else {
      L.t += dt/swingTime;
      if(L.t>=1){ L.t=1; L.swinging=false; L.plantX=L.targetX; }
    }
  }
  walk._stride=stride; walk._lift=lift;
}

function footPos(L, groundY){
  if(!L.swinging) return {x:L.plantX, y:groundY};
  const t=smooth(clamp(L.t,0,1));
  return { x:lerp(L.fromX,L.targetX,t), y:groundY - state.walk._lift*Math.sin(clamp(L.t,0,1)*Math.PI) };
}

function draw(now, dt){
  const {model,walk}=state, s=model.s, m=model.m, f=model.f;
  const tsec=state.clock;

  // ── background: deep radial + vignette ──
  const bg=ctx.createRadialGradient(W*0.5,H*0.42,0,W*0.5,H*0.5,Math.hypot(W,H)*0.62);
  const bh=model.palHsl[0].h;
  bg.addColorStop(0, `hsl(${bh+200},34%,7%)`);
  bg.addColorStop(0.6,'#070810');
  bg.addColorStop(1,'#030409');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // drifting dust motes
  for(const d of dust){
    d.y -= (0.06+d.z*0.14)*dt*60; if(d.y<-4){ d.y=H+4; d.x=Math.random()*W; }
    const tw=0.3+0.7*(0.5+0.5*Math.sin(tsec*(1+d.z*2)+d.ph));
    ctx.globalAlpha=tw*(0.12+d.z*0.2);
    ctx.fillStyle=`hsl(${bh+d.z*140},80%,${60+d.z*20}%)`;
    ctx.fillRect(d.x, d.y, 1.2+d.z*1.6, 1.2+d.z*1.6);
  }
  ctx.globalAlpha=1;

  // ── ground: horizon glow ──
  const gy=walk.groundY;
  const gg=ctx.createLinearGradient(0,gy-40,0,gy+80);
  gg.addColorStop(0,'rgba(120,150,255,0)');
  gg.addColorStop(0.5,`hsla(${bh+30},60%,50%,0.10)`);
  gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg; ctx.fillRect(0,gy-40,W,120);
  ctx.strokeStyle=`hsla(${bh+40},70%,64%,0.18)`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();

  // ── body transform params ──
  const breathe = 1 + m.breathe*0.06*Math.sin(tsec*1.6);
  const bob = Math.sin(walk.dist/model.size*2.4)*model.size*0.045;
  const tilt = walk.dir*0.05 + Math.sin(walk.dist/model.size*1.2)*0.03;
  const bcx = walk.bx, bcy = gy - model.standHeight - bob;
  const sc = model.size*breathe;
  const cosT=Math.cos(tilt), sinT=Math.sin(tilt);
  const tp=(px,py)=>{                       // unit → screen (mirror·rotate·translate)
    const x=px*walk.dir*sc, y=py*sc;
    return { x:bcx + x*cosT - y*sinT, y:bcy + x*sinT + y*cosT };
  };

  // hip screen positions
  const hipS=model.hips.map(h=>tp(h.x,h.y));
  const feet=walk.legs.map(L=>footPos(L,gy));

  // ── soft contact shadow ──
  ctx.save();
  ctx.globalAlpha=0.5;
  for(const ft of feet){
    const sh=ctx.createRadialGradient(ft.x,gy+3,0,ft.x,gy+3,model.size*0.4);
    sh.addColorStop(0,'rgba(0,0,0,0.5)'); sh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(ft.x,gy+3,model.size*0.4,model.size*0.09,0,0,TAU); ctx.fill();
  }
  const bsh=ctx.createRadialGradient(bcx,gy+4,0,bcx,gy+4,model.size*1.3);
  bsh.addColorStop(0,'rgba(0,0,0,0.45)'); bsh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bsh; ctx.beginPath(); ctx.ellipse(bcx,gy+4,model.size*1.2,model.size*0.16,0,0,TAU); ctx.fill();
  ctx.restore();

  // ── legs: far side first (dim), then body, then near side ──
  const drawLeg=(i,nearPass)=>{
    const h=model.hips[i]; if(h.near!==nearPass) return;
    const hp=hipS[i], ft=feet[i];
    const knee=solveIK(hp.x,hp.y,ft.x,ft.y,model.L1,model.L2);
    const shade=nearPass?1:0.5;
    const lh=model.palHsl[3].h;
    ctx.lineCap='round';
    // upper bone (thicker)
    ctx.strokeStyle=`hsla(${lh},50%,${nearPass?58:40}%,${0.9*shade})`;
    ctx.lineWidth=Math.max(2,model.size*0.07)*shade;
    ctx.beginPath(); ctx.moveTo(hp.x,hp.y); ctx.lineTo(knee.x,knee.y); ctx.stroke();
    // lower bone (tapered)
    ctx.strokeStyle=`hsla(${lh+20},60%,${nearPass?66:46}%,${0.95*shade})`;
    ctx.lineWidth=Math.max(1.4,model.size*0.045)*shade;
    ctx.beginPath(); ctx.moveTo(knee.x,knee.y); ctx.lineTo(ft.x,ft.y); ctx.stroke();
    // joint + foot glints
    ctx.fillStyle=`hsla(${lh+40},80%,72%,${0.8*shade})`;
    ctx.beginPath(); ctx.arc(knee.x,knee.y,model.size*0.03*shade,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(ft.x,ft.y,model.size*0.035*shade,0,TAU); ctx.fill();
  };
  for(let i=0;i<walk.legs.length;i++) drawLeg(i,false);

  // ── the GEM body ──
  const glow=s.glow, refr=s.refraction, contrast=s.facetContrast;
  const lightA = tsec*(0.6+m.pulse*1.4);          // sweeping refraction light
  const pulse = 0.5+0.5*Math.sin(tsec*(2+m.pulse*6));
  ctx.save();
  ctx.globalAlpha=s.opacity;
  ctx.shadowColor=`hsla(${model.palHsl[2].h},90%,60%,${0.5*glow})`;
  ctx.shadowBlur=model.size*0.5*glow;

  for(const fac of model.facets){
    const pc=model.palHsl[fac.pal];
    // facet centroid angle → specular against sweeping light
    let cx=0,cy=0; for(const p of fac.pts){cx+=p.x;cy+=p.y;} cx/=fac.pts.length; cy/=fac.pts.length;
    const fang=Math.atan2(cy,cx);
    const spec=Math.pow(Math.max(0,Math.cos(fang - lightA)),3);
    const hue=pc.h + fac.hoff*contrast + refr*Math.sin(tsec*0.5 + fac.hoff*0.02);
    const light=clamp(pc.l + (fac.ring? -8:6) + spec*34*contrast + (fac.ring?0:pulse*4), 12, 90);
    const sat=clamp(pc.s + spec*14, 30, 100);
    ctx.beginPath();
    fac.pts.forEach((p,k)=>{ const q=tp(p.x,p.y); k?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y); });
    ctx.closePath();
    ctx.fillStyle=`hsl(${hue},${sat}%,${light}%)`;
    ctx.fill();
    ctx.shadowBlur=0;                              // only silhouette carries the glow
    // facet edge — bright crystalline seam
    ctx.strokeStyle=`hsla(${hue+10},95%,${Math.min(92,light+22)}%,${0.35+spec*0.4})`;
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.shadowBlur=model.size*0.5*glow;
  }
  ctx.restore();

  // outer silhouette — bright rim
  ctx.save();
  ctx.globalAlpha=s.opacity;
  ctx.beginPath();
  model.outer.forEach((p,k)=>{ const q=tp(p.x,p.y); k?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y); });
  ctx.closePath();
  ctx.strokeStyle=`hsla(${model.palHsl[4].h},95%,80%,0.55)`;
  ctx.lineWidth=1.6; ctx.stroke();
  ctx.restore();

  // ── vertex sparkle glints (pulse to motion.pulse) ──
  const glintN=model.palHsl[4];
  for(let i=0;i<model.outer.length;i++){
    const q=tp(model.outer[i].x,model.outer[i].y);
    const ph=i*1.7;
    const tw=0.5+0.5*Math.sin(tsec*(2+m.pulse*6)+ph);
    const rad=model.size*(0.05+0.14*tw)*(0.6+glow*0.7);
    if(tw<0.35) continue;
    ctx.save();
    ctx.globalAlpha=tw*0.9;
    ctx.strokeStyle=`hsla(${glintN.h},100%,88%,${tw})`;
    ctx.lineWidth=1.2; ctx.beginPath();
    ctx.moveTo(q.x-rad,q.y); ctx.lineTo(q.x+rad,q.y);
    ctx.moveTo(q.x,q.y-rad); ctx.lineTo(q.x,q.y+rad); ctx.stroke();
    const gr=ctx.createRadialGradient(q.x,q.y,0,q.x,q.y,rad*0.9);
    gr.addColorStop(0,`hsla(${glintN.h},100%,92%,${tw})`); gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(q.x,q.y,rad*0.9,0,TAU); ctx.fill();
    ctx.restore();
  }

  // near legs on top
  for(let i=0;i<walk.legs.length;i++) drawLeg(i,true);
}

/* ════════════════ ANIMATION LOOP ════════════════ */
let last=0;
function frame(now){
  if(!state){ requestAnimationFrame(frame); return; }
  const dt=Math.min((now-(last||now))/1000, 0.05); last=now;
  state.clock += dt;
  updateWalk(dt);
  draw(now,dt);
  if(window.FAUNA) window.FAUNA.frame++;
  requestAnimationFrame(frame);
}

/* ════════════════ UI + STATE WIRING ════════════════ */
const el=id=>document.getElementById(id);
const $title=el('title'), $id=el('idchip'), $rar=el('rarity'), $json=el('json'), $status=el('status');

function paintDNA(genome){ $json.textContent=JSON.stringify(genome,null,2); }
function paintHeader(){
  $title.textContent=state.title;
  $id.textContent=state.id;
  $rar.textContent=state.rarity;
  $rar.style.color=RCOL[state.rarity]||'#8b93b8';
  $rar.style.background=(RCOL[state.rarity]||'#8b93b8')+'22';
}
function setStatus(msg,cls){ $status.textContent=msg||''; $status.className='status'+(cls?' '+cls:''); }

async function apply(genome, meta){
  const rarity = meta && meta.rarity || rollRarity(genome);
  const title  = meta && meta.title  || ('Prismstride “'+pick(EPITHETS)+'”');
  const {egg,id} = await EGG.pack(genome,{title,rarity,source:'learnwithkody-fauna'});
  const model = buildModel(genome, Math.min(W,H));
  const walk  = initWalk(model, W, H);
  state = { model, walk, genome, id, eggB64:egg, title, rarity, clock: state?state.clock:0 };
  paintHeader(); paintDNA(genome);
  return id;
}

async function newCreature(){
  const g=mkGenome();
  const id=await apply(g);
  setStatus('minted · '+id,'ok');
  return id;
}
async function loadEgg(b64){
  const payload=EGG.unpack(b64);
  if(!payload||!payload.genome||!Array.isArray(payload.genome.layers))
    throw new Error('not a rappter egg');
  const id=await apply(payload.genome,{title:payload.title,rarity:payload.rarity});
  state.eggB64=b64.trim();               // preserve exact loaded bytes
  return payload.id||id;
}

el('new').addEventListener('click', async ()=>{ try{ await newCreature(); }catch(e){ setStatus('mint failed','err'); } });
el('save').addEventListener('click', ()=>{
  if(!state) return;
  EGG.download(state.eggB64, state.id);
  setStatus('saved rappter-'+state.id.slice(0,8)+'.egg','ok');
});
el('loadbtn').addEventListener('click', async ()=>{
  const v=el('eggin').value.trim();
  if(!v){ setStatus('paste an .egg string first','err'); return; }
  try{ const id=await loadEgg(v); setStatus('loaded · '+id,'ok'); }
  catch(e){ setStatus('invalid egg — '+e.message,'err'); }
});
el('filebtn').addEventListener('click', ()=>el('file').click());
el('file').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=async ()=>{ try{ const id=await loadEgg(String(rd.result)); el('eggin').value=String(rd.result).trim(); setStatus('loaded · '+id,'ok'); }
    catch(err){ setStatus('invalid egg file','err'); } };
  rd.onerror=()=>setStatus('could not read file','err');
  rd.readAsText(file);
  e.target.value='';
});

/* ════════════════ BOOT ════════════════ */
resize();
(async ()=>{
  await newCreature();
  requestAnimationFrame(frame);
  // debug hook — set only after first creature is live & rendering
  window.FAUNA = {
    title: "Prismstride",
    get genome(){ return state.genome; },
    get id(){ return state.id; },
    get eggB64(){ return state.eggB64; },
    newCreature: async ()=>await newCreature(),
    loadEgg: async (b64)=>await loadEgg(b64),
    frame: 0
  };
})();
})();
</script>
