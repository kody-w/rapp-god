<!DOCTYPE html>
<html lang="en">
<head>

<title>GALACTIC NEWS NETWORK — LIVE WAR COVERAGE</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #fff; user-select: none;
}
#container { position: fixed; inset: 0; z-index: 1; }
.overlay { position: fixed; z-index: 10; pointer-events: none; }

#logo { top: 16px; left: 22px; display: flex; align-items: center; gap: 12px; }
#logo .glyph {
  width: 44px; height: 44px;
  background: linear-gradient(135deg,#ff2a2a 0%,#7a0000 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 24px; letter-spacing: -1px;
  box-shadow: 0 0 22px rgba(255,40,40,0.6);
  border: 1px solid rgba(255,255,255,0.25);
  font-family: 'Helvetica Neue', sans-serif;
}
#logo .name { font-weight: 900; font-size: 19px; letter-spacing: 3px; text-shadow: 0 2px 6px rgba(0,0,0,0.95); }
#logo .sub { font-size: 10px; letter-spacing: 4px; opacity: 0.7; margin-top: 2px; }
#logo .live {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(220,0,0,0.92); padding: 4px 11px;
  font-size: 12px; font-weight: 900; letter-spacing: 3px;
  margin-left: 6px;
  box-shadow: 0 0 12px rgba(220,0,0,0.6);
}
#logo .live::before {
  content: ''; width: 8px; height: 8px; background: #fff; border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

#daybar {
  top: 16px; left: 50%; transform: translateX(-50%);
  text-align: center;
}
#daybar .day {
  font-weight: 900; font-size: 22px; letter-spacing: 5px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.95);

}
#daybar .systems {
  margin-top: 6px; font-size: 11px; letter-spacing: 2px;
  color: rgba(255,255,255,0.95); font-weight: 700;
  background: rgba(0,0,0,0.7);
  padding: 5px 14px;
  border-top: 1px solid rgba(255,255,255,0.18);
  border-bottom: 1px solid rgba(255,255,255,0.18);

}

#leaderboard {
  top: 110px; right: 22px;

  background: rgba(5,10,22,0.82);

#leaderboard h3 {

.lbRow {

}
.lbRow.leader {
  background: rgba(255,255,255,0.06);

}
@keyframes leaderPulse {
  0%,100% { box-shadow: inset 0 0 0 0 rgba(255,255,255,0); }

}
.lbRow .swatch {

#lowerthird {
  bottom: 130px; left: 0; right: 0;

}
#ltPanel {
  min-width: 600px; max-width: 80%;

  border-top: 4px solid #fff; border-bottom: 4px solid #fff;

}
#ltPanel.show { transform: translateX(0); }
#ltPanel.profile { background: linear-gradient(90deg,rgba(0,30,80,0.95) 0%,rgba(0,10,40,0.95) 100%); }
#ltPanel.casualty { background: linear-gradient(90deg,rgba(40,40,40,0.97) 0%,rgba(0,0,0,0.97) 100%); }
#ltPanel.battle { background: linear-gradient(90deg,rgba(80,30,0,0.95) 0%,rgba(40,0,0,0.95) 100%); border-color: #ffaa33; }
#ltLabel {
  font-size: 11px; letter-spacing: 7px;

}
#ltHead {
  font-size: 26px; font-weight: 900; letter-spacing: 1.5px;
  margin-top: 5px;

}
#ltSub {
  font-size: 13px; margin-top: 7px; opacity: 0.92;

}

#ticker {
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: #000;
  border-top: 3px solid #ff2a2a;

}
#ticker .label {

}
#ticker .feedWrap {

}
#ticker .feed {

@keyframes scroll {

#pip {

#pip .pipLabel {

}

#camlabel {

#battlebanner {

#battlebanner .sub {

}

#victory {

#vCrest {

#vTitle {

#vSub {
  margin-top: 18px; font-size: 16px; letter-spacing: 5px; opacity: 0.7;

}
#vCasualties {

}
#vMotto {

}

.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 6;
  box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
}

</div>
<script>
'use strict';

// ============================================================
// GALACTIC NEWS NETWORK — single-file 3D autoplay broadcast demo
// ============================================================

const FACTIONS = [
  { id:'SOL', name:'Solarian Hegemony', short:'SOL', color:0xffdd33, hex:'#ffdd33',
    capital:'Sol Prime', leader:'Marshal Aurelia Sol',
    bio:'A decorated veteran who rose through the militant ranks of the Hegemony. She believes the galaxy must be unified under one banner — preferably hers.',
    motto:'BY SOLAR FIRE, WE BURN', emblem:'☼' },
  { id:'VEX', name:'Vexion Concord', short:'VEX', color:0x33aaff, hex:'#33aaff',
    capital:'Vexion Cradle', leader:'Director Helix-9 Vorr',
    bio:'A council of cyberneticists runs the Concord, but Director Vorr speaks for them. Cold, calculating, and convinced biological strategy is obsolete.',
    motto:'COMPUTE THE FUTURE', emblem:'◊' },
  { id:'KHZ', name:'Khazran Imperium', short:'KHZ', color:0xff3333, hex:'#ff3333',
    capital:'Khazran Spire', leader:'Warlord Kazgar the Iron-Fanged',
    bio:'A former gladiator who slew his predecessor in single combat. The Imperium follows him out of fear and admiration. He keeps a personal collection of conquered banners.',
    motto:'BLOOD FOR THE SPIRE', emblem:'⚔' },
  { id:'DRK', name:'Drakthi Collective', short:'DRK', color:0xaa55ff, hex:'#aa55ff',
    capital:'The Hive', leader:'Queen-Mother Tessari',
    bio:'A psychic insectoid sovereign whose voice is heard in the dreams of every Drakthi. The Collective rarely engages — but when it does, planets fall silent.',
    motto:'WE ARE THE SWARM', emblem:'✶' },
  { id:'LUM', name:'Lumeni Pact', short:'LUM', color:0x33ff99, hex:'#33ff99',
    capital:'Library World', leader:'Archon Mellah Vasari',
    bio:'A scholar-leader who reads more reports than any general. The Pact prefers research stations to battleships — but their precision strikes are legendary.',
    motto:'KNOWLEDGE IS THE BLADE', emblem:'⌬' },
  { id:'FWA', name:'Free Worlds Alliance', short:'FWA', color:0xff8833, hex:'#ff8833',
    capital:'Anchor Station', leader:'Captain Dax Ortega',
    bio:'A former smuggler who united a thousand independent planets through sheer charisma and a faulty hyperdrive. The Alliance fights dirty and fights free.',
    motto:'NO MASTER, NO CHAINS', emblem:'⚓' }
];

const FACTIONS_BY_ID = {};
FACTIONS.forEach(f => FACTIONS_BY_ID[f.id] = f);

const SYSTEM_NAMES = [
  'Helios Gate','Phoenix Reach','Crucible','Dawnspire','Auric Forge',
  'Quanta Nexus','Logic Gate','Mirror Loop','Cipher Vault','Synapse Hold',
  'Bloodforge','Skullhold','Iron Maw','Ash Throne','Razorshard',
  'Carapace','Dreamspine','Pheromone Ridge','Brood Crest','Pupa Veil',
  'Star Codex','Athenaeum','Lumeni Crown','Photon Court','Veritas Spire',
  'Free Drift','Rust Belt','Patchwork','Wayfarer','Boomerang Run',
  'Ghost Lane','Frontier Echo','Veil Junction','Pyre Crossing','Hollow Star'
];

const TICKER_FILLERS = [
  'CIVILIAN TRANSPORTS DIVERTED FROM CONTESTED SECTORS',
  'ANALYSTS PREDICT EXTENDED HOSTILITIES',
  'INTERSTELLAR MARKETS OPEN DOWN 4.2%',
  'REFUGEE COLUMNS REPORTED ON HYPERLANE 7',
  'WAR BONDS HIT RECORD SUBSCRIPTION RATES',
  'GNN CORRESPONDENT KILLED COVERING FRONTLINE',
  'BLACK MARKET FUEL PRICES TRIPLE OVERNIGHT',
  'PEACE TALKS COLLAPSE AFTER FOUR HOURS',
  'COURT-MARTIAL HEARINGS BEGIN AT FLEET COMMAND',
  'ORBITAL DEFENSE PLATFORMS ON HIGH ALERT',
  'GENERATIONAL SHIPS RECALLED TO HOMEWORLDS',
  'AI ETHICS COUNCIL DEMANDS REVIEW OF DRONE STRIKES'
];

// ----- Random (seeded) -----
let _seed = (Date.now() ^ 0xC0FFEE) >>> 0;
function rand(){ _seed = (_seed * 1664525 + 1013904223) >>> 0; return _seed / 4294967296; }
function rint(a,b){ return Math.floor(rand()*(b-a+1))+a; }
function pick(a){ return a[Math.floor(rand()*a.length)]; }
function rseed(){ _seed = ((Date.now() ^ Math.floor(Math.random()*0xffffffff)) >>> 0) || 1; }

// ----- THREE state -----
let scene, camera, renderer, clock;
let starGroup, laneGroup, fleetGroup, battleGroup, planetGroup, particleGroup;
let stars = [], lanes = [], fleets = [];
let battleStage = null;

// ----- Game state -----
let day = 0, dayTimer = 0, DAY_LENGTH = 5;
let news = [], tickerLines = [], breakingPipUntil = 0;
let lowerThirdQueue = [], lowerThirdActive = null, lowerThirdTimer = 0, ltCooldown = 8;
let lastLTPick = 0;
let camMode = 'GALAXY', camTimer = 0, camTarget = null, camLockUntil = 0;
let battleMode = false, battleTimer = 0, battleData = null;
let totalCasualties = { soldiers: 0, credits: 0, ships: 0 };
let firstContact = false;
let gameOver = false, restartTimer = 0;
let speakerLine = '', speakerSide = 0, speakerTimer = 0;
let scriptedEvents = [];

// ----- DOM refs -----
const $ = id => document.getElementById(id);
const dayText = $('dayText'), systemsText = $('systemsText'), rankRows = $('rankRows');
const ltPanel = $('ltPanel'), ltLabel = $('ltLabel'), ltHead = $('ltHead'), ltSub = $('ltSub');
const tickerFeed = $('tickerFeed'), pipCanvas = $('pipCanvas'), pipBreaking = $('pipBreaking');
const pipLabel = $('pipLabel'), pip = $('pip'), camLabelEl = $('camlabel');
const battleBanner = $('battlebanner'), victoryEl = $('victory');
const vCrest = $('vCrest'), vTitle = $('vTitle'), vSub = $('vSub'),
      vCasualties = $('vCasualties'), vMotto = $('vMotto');

// ============================================================
// 3D INIT
// ============================================================
function initThree(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000208);
  scene.fog = new THREE.FogExp2(0x000208, 0.0033);

  camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 1500);
  camera.position.set(0, 95, 130);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(2, devicePixelRatio));
  $('container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x445566, 0.45));
  const sun = new THREE.DirectionalLight(0xffffff, 0.6);
  sun.position.set(50,80,40); scene.add(sun);

  // Background star particles
  const bgGeom = new THREE.BufferGeometry();
  const bgPos = [], bgCol = [];
  for(let i=0;i<2200;i++){
    const r = 220 + rand()*450;
    const t = rand()*Math.PI*2;
    const p = (rand()-0.5)*Math.PI;
    bgPos.push(Math.cos(t)*Math.cos(p)*r, Math.sin(p)*r, Math.sin(t)*Math.cos(p)*r);
    const c = 0.5 + rand()*0.5;
    bgCol.push(c, c*0.95, c*0.85);
  }
  bgGeom.setAttribute('position', new THREE.Float32BufferAttribute(bgPos,3));
  bgGeom.setAttribute('color', new THREE.Float32BufferAttribute(bgCol,3));
  const bgMat = new THREE.PointsMaterial({size:0.7, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:0.85});
  scene.add(new THREE.Points(bgGeom, bgMat));

  // Galaxy disk (faint)
  const disk = new THREE.Mesh(
    new THREE.RingGeometry(20, 110, 80, 1),
    new THREE.MeshBasicMaterial({color:0x224477, transparent:true, opacity:0.06, side:THREE.DoubleSide})
  );
  disk.rotation.x = -Math.PI/2;
  scene.add(disk);

  // Center black hole / galactic core
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(3.5, 24, 24),
    new THREE.MeshBasicMaterial({color:0xffeebb})
  );
  scene.add(core);
  const coreGlow = new THREE.Mesh(
    new THREE.SphereGeometry(7, 24, 24),
    new THREE.MeshBasicMaterial({color:0xffaa55, transparent:true, opacity:0.12})
  );
  scene.add(coreGlow);

  starGroup = new THREE.Group(); scene.add(starGroup);
  laneGroup = new THREE.Group(); scene.add(laneGroup);
  fleetGroup = new THREE.Group(); scene.add(fleetGroup);
  battleGroup = new THREE.Group(); scene.add(battleGroup);
  planetGroup = new THREE.Group(); scene.add(planetGroup);
  particleGroup = new THREE.Group(); scene.add(particleGroup);
}

// ============================================================
// GALAXY GENERATION
// ============================================================
function buildGalaxy(){
  // Clear
  [starGroup, laneGroup, fleetGroup, battleGroup, planetGroup, particleGroup].forEach(g=>{
    while(g.children.length) g.remove(g.children[0]);
  });
  stars = []; lanes = []; fleets = [];

  // Place 6 capitals at hex angles, radius 50
  const baseAngles = [0,60,120,180,240,300].map(a=>a + (rand()-0.5)*15);
  const factionOrder = FACTIONS.slice().sort(()=>rand()-0.5);

  factionOrder.forEach((f, i)=>{
    const a = baseAngles[i] * Math.PI/180;
    const r = 48 + rand()*7;
    const x = Math.cos(a)*r, z = Math.sin(a)*r;
    const y = (rand()-0.5)*5;
    addStar(x, y, z, f.capital, f.id, true);
  });

  // 4 secondary systems per faction near home
  factionOrder.forEach((f, i)=>{
    const a0 = baseAngles[i] * Math.PI/180;
    for(let k=0;k<4;k++){
      const aSpread = a0 + (rand()-0.5)*0.85;
      const r = 30 + rand()*32;
      const x = Math.cos(aSpread)*r, z = Math.sin(aSpread)*r;
      const y = (rand()-0.5)*8;
      const nm = pickName();
      addStar(x, y, z, nm, f.id, false);
    }
  });

  // Build jump lanes via nearest-neighbor (each star connects to 2-3 nearest)
  for(let i=0;i<stars.length;i++){
    const s = stars[i];
    const dists = [];
    for(let j=0;j<stars.length;j++){
      if(i===j) continue;
      const dx = s.pos.x-stars[j].pos.x, dy = s.pos.y-stars[j].pos.y, dz = s.pos.z-stars[j].pos.z;
      dists.push({j, d: dx*dx+dy*dy+dz*dz});
    }
    dists.sort((a,b)=>a.d-b.d);
    const k = 2 + (rand()<0.4?1:0);
    for(let n=0;n<k;n++){
      addLane(i, dists[n].j);
    }
  }

  // Some planets around several stars
  stars.forEach((s, idx)=>{
    if(rand() < 0.55){
      const planetCount = rint(1, 3);
      for(let p=0;p<planetCount;p++){
        const orbitR = 2.4 + p*1.4 + rand()*0.6;
        const planet = new THREE.Mesh(
          new THREE.SphereGeometry(0.32 + rand()*0.25, 12, 12),
          new THREE.MeshStandardMaterial({color: 0x445577 + (rint(0,80)<<16), roughness:0.6, metalness:0.2})
        );
        planet.userData = { star: s, orbitR, theta: rand()*Math.PI*2, speed: 0.5 + rand()*1.6 };
        s.group.add(planet);
        s.planets.push(planet);
        if(rand() < 0.35){
          const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.5, 0.85, 24),
            new THREE.MeshBasicMaterial({color: 0xddccaa, transparent:true, opacity:0.35, side:THREE.DoubleSide})
          );
          ring.rotation.x = Math.PI/2 + (rand()-0.5)*0.7;
          planet.add(ring);
        }
      }
    }
  });
}

function pickName(){
  const used = new Set(stars.map(s=>s.name));
  for(let tries=0;tries<40;tries++){
    const n = pick(SYSTEM_NAMES);
    if(!used.has(n)) return n;
  }
  return 'System ' + rint(100,999);
}

function addStar(x, y, z, name, ownerId, isCapital){
  const f = FACTIONS_BY_ID[ownerId];
  const group = new THREE.Group();
  group.position.set(x, y, z);

  const coreSize = isCapital ? 1.6 : 1.0;
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(coreSize, 18, 18),
    new THREE.MeshBasicMaterial({color: 0xffffff})
  );
  group.add(core);

  const glowSize = isCapital ? 3.2 : 2.2;
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(glowSize, 18, 18),
    new THREE.MeshBasicMaterial({color: f.color, transparent:true, opacity:0.18})
  );
  group.add(glow);

  const light = new THREE.PointLight(f.color, 1.6, 28);
  group.add(light);

  // Territory disc
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(isCapital ? 9 : 6.5, 24),
    new THREE.MeshBasicMaterial({color:f.color, transparent:true, opacity:0.16, side:THREE.DoubleSide, depthWrite:false})
  );
  disc.rotation.x = -Math.PI/2;
  disc.position.y = -0.5;
  group.add(disc);

  if(isCapital){
    // Outer ring marker
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(3.2, 3.6, 32),
      new THREE.MeshBasicMaterial({color:f.color, transparent:true, opacity:0.6, side:THREE.DoubleSide})
    );
    ring.rotation.x = -Math.PI/2;
    ring.position.y = -0.4;
    group.add(ring);
  }

  starGroup.add(group);

  const star = {
    pos: new THREE.Vector3(x,y,z),
    name, owner: ownerId, isCapital,
    group, core, glow, light, disc,
    planets: [],
    laneIdx: [],
    underSiege: false,
    flashUntil: 0
  };
  stars.push(star);
  return star;
}

function addLane(i, j){
  if(i>j) [i,j] = [j,i];
  for(const l of lanes) if(l.a===i && l.b===j) return;
  const a = stars[i].pos, b = stars[j].pos;
  const geom = new THREE.BufferGeometry().setFromPoints([a,b]);
  const mat = new THREE.LineDashedMaterial({color:0x335577, dashSize:1.4, gapSize:0.9, transparent:true, opacity:0.45});
  const line = new THREE.Line(geom, mat);
  line.computeLineDistances();
  laneGroup.add(line);
  lanes.push({a:i, b:j, line});
  stars[i].laneIdx.push(j);
  stars[j].laneIdx.push(i);
}

function updateStarVisual(s){
  const f = FACTIONS_BY_ID[s.owner];
  s.glow.material.color.set(f.color);
  s.light.color.set(f.color);
  s.disc.material.color.set(f.color);
}

function dispatchFleet(fromIdx, toIdx, ownerId, power){
  const from = stars[fromIdx], to = stars[toIdx];
  const f = FACTIONS_BY_ID[ownerId];
  const geom = new THREE.ConeGeometry(0.55, 1.6, 8);
  const mat = new THREE.MeshBasicMaterial({color:f.color});
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(from.pos);
  // Trail
  const trail = new THREE.Mesh(
    new THREE.SphereGeometry(0.9, 10, 10),
    new THREE.MeshBasicMaterial({color:f.color, transparent:true, opacity:0.45})
  );
  trail.position.copy(from.pos);
  fleetGroup.add(mesh);
  fleetGroup.add(trail);
  const dist = from.pos.distanceTo(to.pos);
  const fleet = {
    from: fromIdx, to: toIdx,
    owner: ownerId, mesh, trail,
    progress: 0, speed: 0.045 + rand()*0.015,
    power, arrived: false
  };
  // Orient
  mesh.lookAt(to.pos);
  mesh.rotateX(Math.PI/2);
  fleets.push(fleet);
  // Mark target as under siege if capital
  if(to.isCapital && to.owner !== ownerId){
    to.underSiege = true;
    queueLowerThird({
      label:'CAPITAL UNDER SIEGE',
      head: to.name.toUpperCase() + ' UNDER ATTACK',
      sub: f.name.toUpperCase() + ' FLEET INBOUND • DEFENDERS SCRAMBLED',
      style:'battle', pri: 8
    });
    pushNews('CAPITAL UNDER SIEGE: ' + f.name.toUpperCase() + ' STRIKES AT ' + to.name.toUpperCase());
    flashBreakingPip();
  }
}

function startBattle(fleet){
  const target = stars[fleet.to];
  const attacker = FACTIONS_BY_ID[fleet.owner];
  const defenderId = target.owner;
  const defender = FACTIONS_BY_ID[defenderId];
  const sysCount = stars.filter(s=>s.owner===defenderId).length;
  // Power: attackers vs defenders
  const defPower = 1 + sysCount * 0.18 + (target.isCapital ? 1.8 : 0.4) + rand()*0.6;
  const atkPower = fleet.power + rand()*0.5;
  const winner = atkPower > defPower ? fleet.owner : defenderId;
  const losses = Math.floor((Math.min(atkPower, defPower) * 80 + rand()*150)*1e6);
  const credits = Math.floor(losses * (12 + rand()*40));

  totalCasualties.soldiers += losses;
  totalCasualties.credits += credits;
  totalCasualties.ships += rint(8,42);

  // Battle stage setup at target location (slightly above)
  const center = target.pos.clone();
  center.y += 1.5;
  battleData = {
    center,
    target,
    attackerId: fleet.owner,
    defenderId,
    winnerId: winner,
    losses, credits,
    attackerShips: [],
    defenderShips: [],
    lasers: [],
    explosions: [],
    timer: 0,
    duration: 4.6
  };
  battleMode = true;
  battleTimer = 0;
  // Zoom camera in
  camMode = 'BATTLE';
  camLockUntil = battleData.duration;
  setCamLabel('BATTLE');

  // Spawn ships
  const atkF = FACTIONS_BY_ID[fleet.owner], defF = FACTIONS_BY_ID[defenderId];
  spawnSquad(battleData.attackerShips, center.clone().add(new THREE.Vector3(-7, 0, 0)), atkF.color, 1);
  spawnSquad(battleData.defenderShips, center.clone().add(new THREE.Vector3(7, 0, 0)), defF.color, -1);

  // Banner
  showBattleBanner('BATTLE OF ' + target.name.toUpperCase(), atkF.short + ' vs ' + defF.short);
  pushNews('BATTLE: ' + atkF.name.toUpperCase() + ' ENGAGES ' + defF.name.toUpperCase() + ' AT ' + target.name.toUpperCase());

  if(!firstContact){
    firstContact = true;
    queueLowerThird({
      label:'FIRST CONTACT',
      head:'INTERSTELLAR WAR BEGINS',
      sub: atkF.name.toUpperCase() + ' AND ' + defF.name.toUpperCase() + ' EXCHANGE FIRE AT ' + target.name.toUpperCase(),
      style:'battle', pri: 9
    });
  }
  // Speaker line
  setSpeaker(0, '"' + target.name + ' is under direct fire — we are seeing weapons discharge across the entire system."');
}

function spawnSquad(arr, pos, color, dir){
  const n = 3 + rint(0,1);
  for(let i=0;i<n;i++){
    const ship = buildFrigate(color);
    ship.position.copy(pos);
    ship.position.x += (rand()-0.5)*1.2;
    ship.position.y += (rand()-0.5)*1.2;
    ship.position.z += (i-1)*1.6 + (rand()-0.5)*0.6;
    ship.userData = {
      vx: dir * (0.4 + rand()*0.3),
      vy: (rand()-0.5)*0.15,
      vz: (rand()-0.5)*0.2,
      alive: true,
      fireTimer: rand()*1.0,
      hp: 1.0
    };
    ship.lookAt(pos.x + dir*5, pos.y, pos.z);
    battleGroup.add(ship);
    arr.push(ship);
  }
}

function buildFrigate(color){
  const grp = new THREE.Group();
  // Hull
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 0.45, 0.55),
    new THREE.MeshStandardMaterial({color:0x222222, metalness:0.6, roughness:0.4, emissive:0x111111})
  );
  grp.add(hull);
  // Wings
  const wingMat = new THREE.MeshStandardMaterial({color:0x444444, metalness:0.5, roughness:0.5});
  const wL = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.9), wingMat);
  wL.position.set(0.1, 0, 0.6); grp.add(wL);
  const wR = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.9), wingMat);
  wR.position.set(0.1, 0, -0.6); grp.add(wR);
  // Cockpit
  const cock = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 10, 10),
    new THREE.MeshBasicMaterial({color: color})
  );
  cock.position.set(0.6, 0.18, 0);
  grp.add(cock);
  // Engine glow
  const eng = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 10, 10),
    new THREE.MeshBasicMaterial({color: color, transparent:true, opacity:0.85})
  );
  eng.position.set(-0.85, 0, 0);
  grp.add(eng);
  // Trail line
  const trail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.18, 1.2, 8),
    new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.5})
  );
  trail.position.set(-1.4, 0, 0);
  trail.rotation.z = Math.PI/2;
  grp.add(trail);
  return grp;
}

function fireLaser(from, to, color){
  const dir = new THREE.Vector3().subVectors(to.position, from.position);
  const len = dir.length();
  const mid = from.position.clone().add(dir.clone().multiplyScalar(0.5));
  const cyl = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, len, 6),
    new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.95})
  );
  cyl.position.copy(mid);
  // Orient
  cyl.lookAt(to.position);
  cyl.rotateX(Math.PI/2);
  battleGroup.add(cyl);
  battleData.lasers.push({mesh:cyl, ttl: 0.18, color});
}

function explodeShip(ship){
  const pos = ship.position.clone();
  // Particle burst
  const num = 28;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(num*3);
  const vels = [];
  for(let i=0;i<num;i++){
    positions[i*3] = pos.x;
    positions[i*3+1] = pos.y;
    positions[i*3+2] = pos.z;
    vels.push([(rand()-0.5)*4, (rand()-0.5)*4, (rand()-0.5)*4]);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color:0xffaa33, size:0.45, transparent:true, opacity:1, depthWrite:false});
  const pts = new THREE.Points(geom, mat);
  battleGroup.add(pts);
  battleData.explosions.push({pts, vels, ttl: 1.4, age: 0});
  // Flash
  const flash = new THREE.PointLight(0xffaa55, 4, 12);
  flash.position.copy(pos);
  battleGroup.add(flash);
  battleData.explosions.push({flash, ttl: 0.4, age: 0, isFlash: true});
}

function endBattle(){
  if(!battleData) return;
  const target = battleData.target;
  const winnerId = battleData.winnerId;
  const winnerF = FACTIONS_BY_ID[winnerId];
  const loserId = winnerId === battleData.attackerId ? battleData.defenderId : battleData.attackerId;
  // Transfer ownership if attacker won
  const attackerWon = winnerId === battleData.attackerId;
  if(attackerWon && target.owner !== winnerId){
    const oldOwner = target.owner;
    target.owner = winnerId;
    target.flashUntil = clock.getElapsedTime() + 2.5;
    updateStarVisual(target);
    showBattleBanner(target.name.toUpperCase() + ' FALLS', winnerF.short + ' RAISES BANNER');
    pushNews('SYSTEM CAPTURED: ' + target.name.toUpperCase() + ' FALLS TO ' + winnerF.name.toUpperCase());
    queueLowerThird({
      label:'BREAKING: PLANET FALLEN',
      head: target.name.toUpperCase() + ' FALLS TO ' + winnerF.short,
      sub: 'New owner: ' + winnerF.name.toUpperCase() + ' • previous: ' + FACTIONS_BY_ID[oldOwner].name.toUpperCase() + (target.isCapital ? ' • CAPITAL LOST' : ''),
      style:'breaking', pri: 9
    });
    flashBreakingPip();
    setSpeaker(1, '"' + target.name + ' has changed hands. Caldera, this rewrites the entire balance of power."');
  } else {
    showBattleBanner(target.name.toUpperCase() + ' HOLDS', 'DEFENDERS REPEL ASSAULT');
    pushNews('REPELLED: ' + FACTIONS_BY_ID[battleData.defenderId].name.toUpperCase() + ' HOLDS ' + target.name.toUpperCase());
    queueLowerThird({
      label:'BATTLE REPORT',
      head: target.name.toUpperCase() + ' HOLDS THE LINE',
      sub: FACTIONS_BY_ID[battleData.defenderId].name.toUpperCase() + ' REPELS ' + FACTIONS_BY_ID[battleData.attackerId].short + ' INCURSION',
      style:'battle', pri: 5
    });
  }
  target.underSiege = false;

  queueLowerThird({
    label:'CASUALTY REPORT',
    head: 'BATTLE OF ' + target.name.toUpperCase(),
    sub: fmt(battleData.losses) + ' SOLDIERS LOST • ' + fmt(battleData.credits) + ' CREDITS DESTROYED',
    style:'casualty', pri: 4
  });

  // Cleanup ships
  battleData.attackerShips.concat(battleData.defenderShips).forEach(s=>battleGroup.remove(s));
  battleData.lasers.forEach(l=>battleGroup.remove(l.mesh));
  battleData.explosions.forEach(e=>{
    if(e.pts) battleGroup.remove(e.pts);
    if(e.flash) battleGroup.remove(e.flash);
  });
  battleData = null;
  battleMode = false;
  camMode = 'GALAXY';
  camLockUntil = 0;
  setCamLabel('GALAXY');
  checkVictory();
}

function fmt(n){
  if(n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if(n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if(n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toString();
}

function aiTurn(){
  // Each faction considers attacking adjacent enemy systems
  const ownership = stars.map(s=>s.owner);
  const counts = {};
  FACTIONS.forEach(f=>counts[f.id]=0);
  ownership.forEach(o=>counts[o]++);

  FACTIONS.forEach(f=>{
    if(counts[f.id] === 0) return;
    if(rand() < 0.45) return; // not every turn
    // Find candidate targets: enemy systems adjacent to ours
    const candidates = [];
    stars.forEach((s, idx)=>{
      if(s.owner !== f.id) return;
      s.laneIdx.forEach(j=>{
        if(stars[j].owner !== f.id){
          candidates.push({from: idx, to: j});
        }
      });
    });
    if(!candidates.length) return;
    // Skip if already 2 fleets dispatched by faction
    const inFlight = fleets.filter(fl=>fl.owner===f.id).length;
    if(inFlight >= 2) return;
    // Bias: prefer weaker enemy or capital
    candidates.sort((a,b)=>{
      const aF = FACTIONS_BY_ID[stars[a.to].owner];
      const bF = FACTIONS_BY_ID[stars[b.to].owner];
      const aScore = (counts[aF.id] - (stars[a.to].isCapital?2:0)) - rand()*2;
      const bScore = (counts[bF.id] - (stars[b.to].isCapital?2:0)) - rand()*2;
      return aScore - bScore;
    });
    const pick0 = candidates[Math.floor(rand()*Math.min(3, candidates.length))];
    if(!pick0) return;
    // Power: based on home count
    const power = 0.9 + counts[f.id] * 0.18 + rand()*0.7;
    dispatchFleet(pick0.from, pick0.to, f.id, power);
  });
}

function checkVictory(){
  if(gameOver) return;
  const counts = {};
  FACTIONS.forEach(f=>counts[f.id]=0);
  stars.forEach(s=>counts[s.owner]++);
  const total = stars.length;
  // Strategic victory at 60%+
  for(const f of FACTIONS){
    if(counts[f.id] / total >= 0.6){
      declareVictory(f.id, 'STRATEGIC VICTORY');
      return;
    }
  }
  // Military victory: only one faction has any capitals
  const capOwners = new Set();
  stars.forEach(s=>{ if(s.isCapital) capOwners.add(s.owner); });
  // Actually military victory = one faction holds all 6 originally-capital stars
  if(capOwners.size === 1){
    const winId = Array.from(capOwners)[0];
    // Only declare if winner conquered at least one foreign capital
    const winnerOriginalCapitals = stars.filter(s=>s.isCapital && s.owner === winId).length;
    if(winnerOriginalCapitals >= 4){
      declareVictory(winId, 'MILITARY VICTORY');
      return;
    }
  }
  // Timeout victory
  if(day >= 100){
    let topId = FACTIONS[0].id, topN = -1;
    FACTIONS.forEach(f=>{ if(counts[f.id] > topN){ topN = counts[f.id]; topId = f.id; }});
    declareVictory(topId, 'TIMEOUT VICTORY');
  }
}

  vCrest.style.color = f.hex;
  vCrest.style.background = 'radial-gradient(circle, ' + f.hex + '33 0%, #000 70%)';
  vTitle.textContent = f.name.toUpperCase() + ' WINS THE WAR';
  vTitle.style.color = f.hex;

  vCasualties.innerHTML =
    'TOTAL CASUALTIES • ' + fmt(totalCasualties.soldiers) + ' SOLDIERS<br>' +
    fmt(totalCasualties.credits) + ' CREDITS DESTROYED • ' +
    totalCasualties.ships + ' SHIPS LOST<br><br>' +
    'A NEW ORDER UNDER ' + f.leader.toUpperCase();
  vMotto.textContent = '"' + f.motto + '"';
  pushNews(f.name.toUpperCase() + ' WINS THE WAR • ' + reason);

function pushNews(line){
  news.unshift(line);
  if(news.length > 24) news = news.slice(0, 24);

}
function refreshTicker(){
  // Build ticker text: most recent first then fillers
  const recent = news.slice(0, 8);
  const filler = TICKER_FILLERS;
  const all = recent.concat(filler);
  tickerFeed.textContent = '• ' + all.join(' • ') + ' • ';
}

function refreshLeaderboard(){
  const counts = {};
  FACTIONS.forEach(f=>counts[f.id]=0);
  stars.forEach(s=>counts[s.owner]++);
  const sorted = FACTIONS.slice().sort((a,b)=>counts[b.id]-counts[a.id]);
  let html = '';
  sorted.forEach((f, i)=>{
    const isLeader = i === 0 && counts[f.id] > 0;
    const dead = counts[f.id] === 0;
    html += '<div class="lbRow' + (isLeader?' leader':'') + (dead?' dead':'') + '">' +
      '<span><span class="swatch" style="background:' + f.hex + ';color:' + f.hex + ';"></span>' +
      '<span class="nm">' + f.short + ' • ' + f.name.split(' ')[0] + '</span></span>' +
      '<span class="pts">' + counts[f.id] + '</span></div>';
  });
  rankRows.innerHTML = html;
}

function refreshDayBar(){
  dayText.textContent = 'DAY ' + day + ' OF WAR';
  const counts = {};
  FACTIONS.forEach(f=>counts[f.id]=0);
  stars.forEach(s=>counts[s.owner]++);
  systemsText.textContent = 'SYSTEMS — SOL ' + counts.SOL + ' | VEX ' + counts.VEX + ' | KHZ ' + counts.KHZ + ' | DRK ' + counts.DRK + ' | LUM ' + counts.LUM + ' | FWA ' + counts.FWA;
}

function queueLowerThird(item){
  lowerThirdQueue.push(item);
  lowerThirdQueue.sort((a,b)=>(b.pri||0)-(a.pri||0));
  if(lowerThirdQueue.length > 8) lowerThirdQueue.length = 8;
}

function showLowerThird(item){
  ltPanel.classList.remove('breaking','profile','casualty','battle');
  ltPanel.classList.add(item.style || 'breaking');
  ltLabel.textContent = item.label || 'BREAKING';
  ltHead.textContent = item.head || '';
  ltSub.textContent = item.sub || '';
  ltPanel.classList.add('show');
  lowerThirdActive = item;
  lowerThirdTimer = 7;
}

function hideLowerThird(){
  ltPanel.classList.remove('show');
  lowerThirdActive = null;
}

function showBattleBanner(top, sub){
  battleBanner.innerHTML = top + (sub ? '<span class="sub">' + sub + '</span>' : '');
  battleBanner.classList.add('show');
  setTimeout(()=>battleBanner.classList.remove('show'), 2400);
}

function flashBreakingPip(){
  pipBreaking.classList.add('show');
  pipBreaking.textContent = 'BREAKING';
  breakingPipUntil = clock ? clock.getElapsedTime() + 5 : 5;
}

function setCamLabel(label){
  camLabelEl.textContent = 'CAM: ' + label;
}

function setSpeaker(side, line){
  speakerSide = side;
  speakerLine = line;
  speakerTimer = 5.5;
}

// ============================================================
// PIP ANCHOR DESK — drawn on canvas
// ============================================================
const pipCtx = pipCanvas.getContext('2d');
function drawAnchorDesk(t){
  const c = pipCtx;
  const W = pipCanvas.width, H = pipCanvas.height;
  c.clearRect(0,0,W,H);

  // Studio bg gradient
  const grad = c.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#0a1530');
  grad.addColorStop(0.55, '#040820');
  grad.addColorStop(1, '#000510');
  c.fillStyle = grad;
  c.fillRect(0,0,W,H);

  // Background screen — galaxy preview
  c.save();
  c.translate(W/2, 110);
  // Frame
  c.fillStyle = '#001028';
  c.fillRect(-220, -80, 440, 160);
  c.strokeStyle = 'rgba(80,160,220,0.55)';
  c.lineWidth = 2;
  c.strokeRect(-220, -80, 440, 160);
  // Faint stars
  for(let i=0;i<60;i++){
    const x = ((i*97 + Math.floor(t*8)) % 420) - 210;
    const y = ((i*53) % 150) - 75;
    c.fillStyle = 'rgba(160,200,240,' + (0.3 + (i%3)*0.2) + ')';
    c.fillRect(x, y, 1.6, 1.6);
  }
  // Faction nodes (rough)
  FACTIONS.forEach((f, i)=>{
    const a = (i*60 + t*2) * Math.PI / 180;
    const r = 70;
    const x = Math.cos(a)*r;
    const y = Math.sin(a)*r * 0.55;
    c.fillStyle = f.hex;
    c.shadowColor = f.hex;
    c.shadowBlur = 12;
    c.beginPath();
    c.arc(x, y, 4, 0, Math.PI*2);
    c.fill();
  });
  c.shadowBlur = 0;
  // Title
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.font = 'bold 11px Arial';
  c.textAlign = 'left';
  c.fillText('GALAXY MAP — LIVE', -210, -64);
  c.fillStyle = '#ff5544';
  c.fillText('DAY ' + day, 160, -64);
  c.restore();

  // Desk surface
  const deskGrad = c.createLinearGradient(0, 280, 0, H);
  deskGrad.addColorStop(0, '#1a0a0a');
  deskGrad.addColorStop(1, '#050000');
  c.fillStyle = deskGrad;
  c.fillRect(0, 280, W, H-280);
  c.fillStyle = 'rgba(255,40,40,0.5)';
  c.fillRect(0, 278, W, 2);

  // Anchor desk emblem
  c.save();
  c.translate(W/2, 320);
  c.fillStyle = '#cc1818';
  c.fillRect(-58, -22, 116, 44);
  c.fillStyle = '#fff';
  c.font = 'bold 22px Arial';
  c.textAlign = 'center';
  c.fillText('GNN', 0, 7);
  c.font = 'bold 9px Arial';
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.fillText('LIVE COVERAGE', 0, 22);
  c.restore();

  // Anchors
  const talkA = speakerSide === 0 && speakerTimer > 0 ? 1 : 0;
  const talkB = speakerSide === 1 && speakerTimer > 0 ? 1 : 0;
  drawAnchor(c, 145, 200, '#d4a37a', '#3a2218', t, talkA, 'CALDERA VEX', '#ffffff', 'NEWS ANCHOR');
  drawAnchor(c, 495, 200, '#c08868', '#2a2018', t, talkB, 'DOC BRENNAN SOLIS', '#ffdd33', 'STRATEGIC ANALYST');

  // Speaker bubble
  if(speakerTimer > 0 && speakerLine){
    c.save();
    const tx = speakerSide === 0 ? 145 : 495;
    c.fillStyle = 'rgba(0,0,0,0.78)';
    const bubW = 280;
    const bx = Math.max(8, Math.min(W-bubW-8, tx - bubW/2));
    c.fillRect(bx, 50, bubW, 38);
    c.strokeStyle = speakerSide === 0 ? '#ffffff' : '#ffdd33';
    c.lineWidth = 2;
    c.strokeRect(bx, 50, bubW, 38);
    c.fillStyle = speakerSide === 0 ? '#ffffff' : '#ffdd33';
    c.font = 'bold 10px Arial';
    c.textAlign = 'left';
    // Wrap text
    const words = speakerLine.split(' ');
    let line = '', y = 65;
    for(let i=0;i<words.length;i++){
      const test = line + words[i] + ' ';
      if(c.measureText(test).width > bubW - 16 && line){
        c.fillText(line, bx + 8, y);
        line = words[i] + ' ';
        y += 13;
        if(y > 84) break;
      } else {
        line = test;
      }
    }
    if(y <= 84) c.fillText(line, bx + 8, y);
    c.restore();
  }

  // Bottom corner channel ID
  c.fillStyle = 'rgba(255,255,255,0.55)';
  c.font = 'bold 9px Arial';
  c.textAlign = 'right';
  c.fillText('GNN-7 • SAT FEED', W-10, H-8);
  c.textAlign = 'left';
  c.fillStyle = '#ff5544';
  c.fillText('● REC', 10, H-8);
}

function drawAnchor(c, x, y, skin, hair, t, talking, name, nameColor, role){
  c.save();
  // Suit
  c.fillStyle = '#0a0a0a';
  c.beginPath();
  c.moveTo(x-78, y+170);
  c.lineTo(x-58, y+30);
  c.lineTo(x-15, y+15);
  c.lineTo(x+15, y+15);
  c.lineTo(x+58, y+30);
  c.lineTo(x+78, y+170);
  c.closePath();
  c.fill();
  // Suit highlight
  c.fillStyle = '#1a1a1a';
  c.fillRect(x-26, y+25, 52, 80);
  // Tie
  c.fillStyle = name === 'DOC BRENNAN SOLIS' ? '#bb8822' : '#cc2222';
  c.beginPath();
  c.moveTo(x-7, y+18);
  c.lineTo(x+7, y+18);
  c.lineTo(x+5, y+95);
  c.lineTo(x, y+105);
  c.lineTo(x-5, y+95);
  c.closePath();
  c.fill();
  // Neck
  c.fillStyle = skin;
  c.fillRect(x-13, y-12, 26, 30);
  // Head
  c.fillStyle = skin;
  c.beginPath();
  c.arc(x, y-32, 35, 0, Math.PI*2);
  c.fill();
  // Hair
  c.fillStyle = hair;
  c.beginPath();
  c.arc(x, y-44, 35, Math.PI*1.05, Math.PI*1.95);
  c.lineTo(x-32, y-30);
  c.lineTo(x-26, y-50);
  c.lineTo(x+26, y-50);
  c.lineTo(x+32, y-30);
  c.closePath();
  c.fill();
  // Ears
  c.fillStyle = skin;
  c.beginPath(); c.arc(x-34, y-32, 5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+34, y-32, 5, 0, Math.PI*2); c.fill();
  // Eyes
  c.fillStyle = '#ffffff';
  c.beginPath();
  c.arc(x-12, y-34, 5, 0, Math.PI*2);
  c.arc(x+12, y-34, 5, 0, Math.PI*2);
  c.fill();
  const blink = (Math.sin(t*1.3 + (name.length))) > 0.92 ? 0.2 : 1.0;
  c.save();
  c.translate(x-12, y-34); c.scale(1, blink);
  c.fillStyle = '#000'; c.beginPath(); c.arc(Math.sin(t*0.6)*1.2, 0, 2.5, 0, Math.PI*2); c.fill();
  c.restore();
  c.save();
  c.translate(x+12, y-34); c.scale(1, blink);
  c.fillStyle = '#000'; c.beginPath(); c.arc(Math.sin(t*0.6)*1.2, 0, 2.5, 0, Math.PI*2); c.fill();
  c.restore();
  // Brows
  c.strokeStyle = hair; c.lineWidth = 3;
  c.beginPath(); c.moveTo(x-18, y-43); c.lineTo(x-7, y-44); c.stroke();
  c.beginPath(); c.moveTo(x+7, y-44); c.lineTo(x+18, y-43); c.stroke();
  // Mouth
  const open = talking ? (Math.sin(t*16 + (name.length))*0.5+0.5) * 8 + 1 : 1.5;
  c.fillStyle = '#3a0010';
  c.fillRect(x-9, y-15, 18, open);
  c.strokeStyle = '#5a2030';
  c.lineWidth = 1;
  c.strokeRect(x-9, y-15, 18, open);
  // Nose
  c.strokeStyle = '#000'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(x-3, y-26); c.lineTo(x-4, y-19); c.lineTo(x+4, y-19); c.lineTo(x+3, y-26); c.stroke();

  // Headset
  c.strokeStyle = '#222'; c.lineWidth = 3;
  c.beginPath(); c.arc(x, y-44, 38, Math.PI*1.1, Math.PI*1.9); c.stroke();
  c.fillStyle = '#222';
  c.beginPath(); c.arc(x-37, y-32, 5, 0, Math.PI*2); c.fill();
  // Mic
  c.strokeStyle = '#222'; c.lineWidth = 2;
  c.beginPath(); c.moveTo(x-37, y-32); c.quadraticCurveTo(x-44, y-12, x-22, y-6); c.stroke();
  c.fillStyle = '#444';
  c.beginPath(); c.arc(x-22, y-6, 3, 0, Math.PI*2); c.fill();

  // Name plate
  c.fillStyle = 'rgba(0,0,0,0.85)';
  c.fillRect(x-92, y+115, 184, 30);
  c.fillStyle = nameColor;
  c.fillRect(x-92, y+115, 4, 30);
  c.font = 'bold 12px Arial';
  c.textAlign = 'left';
  c.fillStyle = nameColor;
  c.fillText(name, x-82, y+128);
  c.font = 'bold 9px Arial';
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.fillText(role, x-82, y+140);

  c.restore();
}

// ============================================================
// CAMERA DIRECTOR
// ============================================================
function pickCamera(){
  if(battleMode || gameOver) return;
  const r = rand();
  if(r < 0.35){
    camMode = 'GALAXY';
  } else if(r < 0.6){
    camMode = 'SYSTEM';
    camTarget = stars[Math.floor(rand()*stars.length)];
  } else if(r < 0.8){
    camMode = 'DIPLOMAT';
    const caps = stars.filter(s=>s.isCapital);
    camTarget = caps[Math.floor(rand()*caps.length)];
  } else {
    camMode = 'ANCHOR';
  }
  setCamLabel(camMode);
  camTimer = 0;
  pip.classList.toggle('large', camMode === 'ANCHOR');
}

function updateCamera(t, dt){
  // Battle mode: zoom into battleData.center
  if(battleMode && battleData){
    const target = battleData.center;
    const desired = new THREE.Vector3(
      target.x + Math.cos(t*0.7)*9,
      target.y + 4,
      target.z + Math.sin(t*0.7)*9
    );
    camera.position.lerp(desired, 0.07);
    camera.lookAt(target);
    return;
  }
  if(gameOver){
    // Slow orbit
    const r = 130;
    camera.position.set(Math.cos(t*0.08)*r, 70 + Math.sin(t*0.05)*15, Math.sin(t*0.08)*r);
    camera.lookAt(0, 0, 0);
    return;
  }
  if(camMode === 'GALAXY'){
    const a = t * 0.06;
    const desired = new THREE.Vector3(Math.cos(a)*120, 90, Math.sin(a)*120);
    camera.position.lerp(desired, 0.04);
    camera.lookAt(0, 0, 0);
  } else if(camMode === 'SYSTEM' && camTarget){
    const tp = camTarget.pos;
    const desired = new THREE.Vector3(
      tp.x + Math.cos(t*0.4)*16,
      tp.y + 8,
      tp.z + Math.sin(t*0.4)*16
    );
    camera.position.lerp(desired, 0.05);
    camera.lookAt(tp);
  } else if(camMode === 'DIPLOMAT' && camTarget){
    const tp = camTarget.pos;
    const desired = new THREE.Vector3(
      tp.x + Math.cos(t*0.3)*22,
      tp.y + 12,
      tp.z + Math.sin(t*0.3)*22
    );
    camera.position.lerp(desired, 0.05);
    camera.lookAt(tp);
  } else if(camMode === 'ANCHOR'){
    // Pull back
    const a = t * 0.04;
    const desired = new THREE.Vector3(Math.cos(a)*180, 130, Math.sin(a)*180);
    camera.position.lerp(desired, 0.03);
    camera.lookAt(0, 0, 0);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function animate(){
  const dt = Math.min(0.06, clock.getDelta());
  const t = clock.getElapsedTime();

  // ----- Game tick -----
  if(!gameOver){
    dayTimer += dt;
    if(dayTimer >= DAY_LENGTH){
      dayTimer = 0;
      day++;
      refreshDayBar();
      aiTurn();
      maybeSpecialEvent();
      checkVictory();
    }
  } else {
    restartTimer -= dt;
    if(restartTimer <= 0){
      restart();
    }
  }

  // ----- Fleets -----
  for(let i = fleets.length - 1; i >= 0; i--){
    const fl = fleets[i];
    fl.progress += fl.speed * dt * 60 * 0.4;
    if(fl.progress >= 1){
      // Arrival
      const target = stars[fl.to];
      // Trigger battle if hostile
      if(target.owner !== fl.owner){
        if(!battleMode){
          // Only one battle at a time; if blocked, force-resolve quickly
          fl.power = fl.power;
          // Move ship to target
          fl.mesh.position.copy(target.pos);
          fleetGroup.remove(fl.mesh);
          fleetGroup.remove(fl.trail);
          fleets.splice(i, 1);
          startBattle({to: fl.to, from: fl.from, owner: fl.owner, power: fl.power});
          continue;
        } else {
          // Wait — keep at target edge
          fl.progress = 1;
          fl.mesh.position.copy(target.pos);
          continue;
        }
      } else {
        // Friendly reinforcement — disappear
        fleetGroup.remove(fl.mesh);
        fleetGroup.remove(fl.trail);
        fleets.splice(i, 1);
        continue;
      }
    }
    const a = stars[fl.from].pos, b = stars[fl.to].pos;
    fl.mesh.position.lerpVectors(a, b, fl.progress);
    fl.mesh.position.y += Math.sin(fl.progress*Math.PI)*1.5;
    fl.trail.position.lerpVectors(a, b, Math.max(0, fl.progress - 0.04));
  }

  // ----- Battle update -----
  if(battleMode && battleData){
    battleTimer += dt;
    battleData.timer += dt;
    // Move ships
    const allShips = battleData.attackerShips.concat(battleData.defenderShips);
    allShips.forEach(s=>{
      if(!s.userData.alive) return;
      s.position.x += s.userData.vx * dt;
      s.position.y += s.userData.vy * dt;
      s.position.z += s.userData.vz * dt;
      // Slow down then reverse occasionally
      s.userData.vx *= 0.985;
      // Damp toward center
      s.userData.vx += (battleData.center.x - s.position.x) * 0.0008;
      s.userData.vy += (battleData.center.y - s.position.y) * 0.001;
      s.userData.vz += (battleData.center.z - s.position.z) * 0.001;
      // Fire
      s.userData.fireTimer -= dt;
      if(s.userData.fireTimer <= 0){
        s.userData.fireTimer = 0.3 + rand()*0.5;
        const enemies = battleData.attackerShips.includes(s) ? battleData.defenderShips : battleData.attackerShips;
        const live = enemies.filter(e=>e.userData.alive);
        if(live.length){
          const tgt = live[Math.floor(rand()*live.length)];
          const col = (s.children[2].material.color.getHex());
          fireLaser(s, tgt, col);
          // chance to damage
          if(rand() < 0.4){
            tgt.userData.hp -= 0.3 + rand()*0.4;
            if(tgt.userData.hp <= 0){
              tgt.userData.alive = false;
              explodeShip(tgt);
              battleGroup.remove(tgt);
            }
          }
        }
      }
    });
    // Update lasers
    for(let i = battleData.lasers.length - 1; i >= 0; i--){
      const l = battleData.lasers[i];
      l.ttl -= dt;
      l.mesh.material.opacity = Math.max(0, l.ttl / 0.18);
      if(l.ttl <= 0){
        battleGroup.remove(l.mesh);
        battleData.lasers.splice(i, 1);
      }
    }
    // Update explosions
    for(let i = battleData.explosions.length - 1; i >= 0; i--){
      const e = battleData.explosions[i];
      e.age += dt;
      if(e.isFlash){
        e.flash.intensity = Math.max(0, 4 * (1 - e.age / 0.4));
        if(e.age >= 0.4){
          battleGroup.remove(e.flash);
          battleData.explosions.splice(i, 1);
        }
      } else {
        const positions = e.pts.geometry.attributes.position.array;
        for(let k = 0; k < e.vels.length; k++){
          positions[k*3]   += e.vels[k][0] * dt;
          positions[k*3+1] += e.vels[k][1] * dt;
          positions[k*3+2] += e.vels[k][2] * dt;
          e.vels[k][1] -= dt * 0.5;
        }
        e.pts.geometry.attributes.position.needsUpdate = true;
        e.pts.material.opacity = Math.max(0, 1 - e.age / e.ttl);
        if(e.age >= e.ttl){
          battleGroup.remove(e.pts);
          battleData.explosions.splice(i, 1);
        }
      }
    }
    if(battleTimer >= battleData.duration){
      endBattle();
    }
  }

  // ----- Star pulses -----
  stars.forEach(s=>{
    const f = FACTIONS_BY_ID[s.owner];
    s.glow.material.color.set(f.color);
    s.disc.material.color.set(f.color);
    s.light.color.set(f.color);
    if(s.flashUntil > t){
      s.glow.material.opacity = 0.5 + Math.sin(t*12)*0.3;
    } else {
      s.glow.material.opacity = 0.18 + Math.sin(t*1.5 + s.pos.x)*0.04;
    }
    if(s.underSiege){
      s.disc.material.opacity = 0.1 + Math.sin(t*5)*0.15;
    } else {
      s.disc.material.opacity = 0.16;
    }
    // Planets orbit
    s.planets.forEach(p=>{
      p.userData.theta += p.userData.speed * dt;
      p.position.x = Math.cos(p.userData.theta) * p.userData.orbitR;
      p.position.z = Math.sin(p.userData.theta) * p.userData.orbitR;
      p.position.y = Math.sin(p.userData.theta*2)*0.2;
    });
  });

  // ----- Lane animation: subtle dash offset by changing material -----
  // (LineDashedMaterial is static; we'll keep static for perf)

  // ----- Camera director ticks -----
  if(!battleMode && !gameOver){
    camTimer += dt;
    if(camTimer > 11 + rand()*5){
      pickCamera();
    }
  }
  updateCamera(t, dt);

  // ----- Lower-third queue -----
  if(lowerThirdActive){
    lowerThirdTimer -= dt;
    if(lowerThirdTimer <= 0){
      hideLowerThird();
      ltCooldown = 1.5;
    }
  } else {
    ltCooldown -= dt;
    if(ltCooldown <= 0 && lowerThirdQueue.length){
      showLowerThird(lowerThirdQueue.shift());
    }
  }

  // ----- PIP breaking flash decay -----
  if(breakingPipUntil && t > breakingPipUntil){
    pipBreaking.classList.remove('show');
    breakingPipUntil = 0;
  }

  // ----- Speaker ticks -----
  if(speakerTimer > 0) speakerTimer -= dt;

  // ----- Periodic news/leaderboard refresh -----
  if(Math.floor(t*2) !== Math.floor((t-dt)*2)){
    refreshLeaderboard();
  }

  // ----- Fleet sentinel news (on dispatch) is already pushed on creation -----

  // ----- Anchor PIP draw -----
  drawAnchorDesk(t);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// ============================================================
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ============================================================
// BOOT
// ============================================================
function boot(){
  initThree();
  clock = new THREE.Clock();
  rseed();
  buildGalaxy();
  refreshLeaderboard();
  refreshDayBar();
  // Initial broadcast
  pushNews('BREAKING: WAR DECLARED ACROSS THE OUTER RIM');
  pushNews('GNN ACTIVATES 24/7 WAR COVERAGE');
  pushNews('SIX FACTIONS MOBILIZE FOR TOTAL WAR');
  TICKER_FILLERS.forEach(t=>pushNews(t));
  queueLowerThird({
    label:'BREAKING',
    head:'WAR DECLARED ACROSS THE GALAXY',
    sub:'SIX FACTIONS BEGIN HOSTILITIES • CIVILIAN POPULATIONS WARNED • GNN COVERAGE BEGINS',
    style:'breaking', pri: 10
  });
  flashBreakingPip();
  setSpeaker(0, '"Welcome to the Galactic News Network. We\'re live with breaking war coverage."');
  setTimeout(()=>setSpeaker(1, '"Caldera, in three decades I have never seen all six factions mobilize at once."'), 4500);
  setTimeout(()=>setSpeaker(0, '"We\'re getting reports of ANOTHER incursion into Khazran space — Doc, what are you seeing?"'), 11000);
  setTimeout(()=>setSpeaker(1, '"Caldera, this looks like a feint. Watch the Drakthi pull troops from their southern flank."'), 17000);
  animate();
}

boot();
