<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>76 — AI Soccer · 11v11</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body{margin:0;height:100%;background:#0a1108;color:#e8f5e9;
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;}
  #stage{position:fixed;inset:0;display:block;}
  #hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;padding:8px 18px;
    background:rgba(0,0,0,.55);border-radius:14px;font-weight:700;
    letter-spacing:.5px;font-size:15px;backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:5;}
  #hud .pill{padding:3px 10px;border-radius:8px;font-size:13px;}
  #hud .red{background:#c0392b;color:#fff;}
  #hud .blue{background:#1f6feb;color:#fff;}
  #hud .clock{font-variant-numeric:tabular-nums;color:#fffbe7;}
  #hud .phase{font-size:11px;color:#cfe6c8;text-transform:uppercase;letter-spacing:1.5px;}
  #ticker{position:fixed;left:0;right:0;bottom:0;height:54px;
    background:linear-gradient(180deg,rgba(0,0,0,.0),rgba(0,0,0,.78));
    display:flex;align-items:center;padding:0 22px;z-index:5;
    font-size:15px;letter-spacing:.2px;color:#f3fff2;}
  #ticker .lbl{font-size:10px;color:#84d177;letter-spacing:2px;
    margin-right:14px;padding:3px 8px;border:1px solid #2e6b27;border-radius:4px;}
  #ticker .text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #card{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:10;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);}
  #card .box{padding:28px 44px;border-radius:18px;background:#11210d;
    border:1px solid #2c4a25;box-shadow:0 18px 60px rgba(0,0,0,.6);
    text-align:center;min-width:280px;}
  #card .ttl{font-size:13px;color:#9bd190;letter-spacing:3px;}
  #card .sc{font-size:54px;font-weight:800;margin:8px 0 2px;
    font-variant-numeric:tabular-nums;}
  #card .sub{font-size:13px;color:#bcd9b6;margin-top:6px;}
  #credit{position:fixed;top:10px;right:14px;z-index:5;font-size:11px;
    color:#9bd190;letter-spacing:1.5px;text-transform:uppercase;opacity:.85;}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="hud">
  <span class="pill red" id="nameA">REDS</span>
  <span class="clock" id="score">0 — 0</span>
  <span class="pill blue" id="nameB">BLUES</span>
  <span class="clock" id="clock">00:00</span>
  <span class="phase" id="phase">1ST HALF</span>
</div>
<div id="credit">demo 76 · ai soccer</div>
<div id="ticker"><span class="lbl">LIVE</span><span class="text" id="tickText">Kickoff…</span></div>
<div id="card"><div class="box">
  <div class="ttl" id="cardTtl">HALF TIME</div>
  <div class="sc" id="cardSc">0 — 0</div>
  <div class="sub" id="cardSub">Reds vs Blues</div>
</div></div>
<script>
(()=>{
"use strict";

// ------- canvas / sizing -------
const cv = document.getElementById('stage');
const cx = cv.getContext('2d');
let DPR = Math.min(window.devicePixelRatio||1, 2);
let W=0,H=0;
// pitch coordinates within canvas
let PX=0,PY=0,PW=0,PH=0;
// real soccer ratio 105:68, render with margin for goal nets and ticker
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
  // leave room for HUD top (60) and ticker bottom (60), keep aspect ~1.55:1
  const availW = W - 60;
  const availH = H - 130;
  const ratio = 1.55;
  let pw = availW, ph = pw/ratio;
  if(ph>availH){ ph = availH; pw = ph*ratio; }
  PW = pw; PH = ph;
  PX = (W-PW)/2;
  PY = 70 + (availH-PH)/2;
}
window.addEventListener('resize', resize);
resize();

// ------- match params -------
const HALF_REAL_SECONDS = 120;          // 2 real min per half (4 min total)
const HALFTIME_PAUSE = 5.0;             // s
const FULLTIME_PAUSE = 6.5;             // s
const MAX_TIME = 90;                    // sim minutes total
const SIM_SCALE = MAX_TIME/(HALF_REAL_SECONDS*2); // sim min per real second

// ------- helpers -------
const rnd = (a,b)=>a + Math.random()*(b-a);
const rndi = (a,b)=>Math.floor(rnd(a,b));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(a,b)=>{const dx=a.x-b.x,dy=a.y-b.y;return Math.hypot(dx,dy);};
const dist2=(a,b)=>{const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;};
const norm=(x,y)=>{const m=Math.hypot(x,y)||1;return {x:x/m,y:y/m};};
const lerp=(a,b,t)=>a+(b-a)*t;

// goalie / shooting params  (in pitch units, where pitch is 1050x680 internal)
const PUW=1050, PUH=680;
const GOAL_W=78;                    // goal mouth width (px in pitch units)
const GOAL_DEPTH=28;
const PEN_W=165, PEN_H=400;         // penalty area
const GA_W=55, GA_H=183;            // 6-yd box
const CIRCLE_R=92;

function P2C(x,y){ // pitch-internal -> canvas
  return { x: PX + (x/PUW)*PW, y: PY + (y/PUH)*PH };
}
function P2CL(x){ return (x/PUW)*PW; }

// ------- player / team setup -------
// 4-1-2-1-2 / formation given: GK, CB CB LB RB, CDM CM CM CAM, LW RW
const FORMATION = [
  {role:'GK',  hx:0.06, hy:0.50},
  {role:'LB',  hx:0.22, hy:0.18},
  {role:'CB',  hx:0.18, hy:0.38},
  {role:'CB',  hx:0.18, hy:0.62},
  {role:'RB',  hx:0.22, hy:0.82},
  {role:'CDM', hx:0.34, hy:0.50},
  {role:'CM',  hx:0.45, hy:0.32},
  {role:'CM',  hx:0.45, hy:0.68},
  {role:'CAM', hx:0.58, hy:0.50},
  {role:'LW',  hx:0.72, hy:0.22},
  {role:'RW',  hx:0.72, hy:0.78},
];

const SURNAMES = [
  "Smith","Jones","Walker","Reyes","Okafor","Tanaka","Silva","Bauer","Khan","Vidic",
  "Ortega","Müller","Costa","Lindberg","Volkov","Park","Adeyemi","Romero","De Bruyne","Iniesta",
  "Ronaldo","Messi","Neymar","Pirlo","Maldini","Beckenbauer","Zidane","Cruyff","Maradona","Pelé",
  "Henry","Modric","Kane","Vinicius","Foden","Bellingham","Kroos","Hazard","Salah","Saka",
  "Pulisic","Yamal","Mbappé","Haaland","Rooney"
];
function pickName(used){
  for(let i=0;i<200;i++){
    const n = SURNAMES[rndi(0,SURNAMES.length)];
    if(!used.has(n)){ used.add(n); return n; }
  }
  return "Player"+rndi(10,99);
}

// kit colors
const KIT_RED  = {primary:'#d23b3b',shirt:'#e94b4b',short:'#7a1b1b',num:'#fff8d8',gk:'#f7c948',gks:'#222'};
const KIT_BLUE = {primary:'#2160d8',shirt:'#3679ff',short:'#0d2c6b',num:'#fff8d8',gk:'#1de9b6',gks:'#062c1a'};
const KIT_GREEN= {primary:'#21a85a',shirt:'#3ed47a',short:'#0d3d1f',num:'#fff8d8',gk:'#ffce4d',gks:'#222'};
const KIT_GOLD = {primary:'#caa233',shirt:'#ffd962',short:'#5e4111',num:'#1c1305',gk:'#5e72e4',gks:'#0a0e2c'};
const KIT_SETS = [[KIT_RED,KIT_BLUE],[KIT_GREEN,KIT_GOLD],[KIT_BLUE,KIT_GOLD],[KIT_RED,KIT_GREEN]];

// match state
let teams, ball, score, simTime, halfNum, phase, cardUntil, kickoffTeam;
let usedNumbers, usedNames, lastEventAt, lastFoulAt, possessor, possessTeam;
let kits, teamNames;
let restartAt = 0;

const TEAM_NAME_POOL = ["REDS","BLUES","FOREST","TIGERS","COMETS","ROVERS","UNITED","KINGS","RANGERS","FALCONS"];

function makeTeam(side, kit, label){
  // side: -1 means attacks +x (left side of pitch), +1 attacks -x (right side)
  const used = new Set();
  const players = FORMATION.map((f,i)=>{
    let hx,hy;
    if(side===-1){ hx = f.hx*PUW; hy = f.hy*PUH; }
    else        { hx = (1-f.hx)*PUW; hy = (1-f.hy)*PUH; }
    return {
      role:f.role, team:label,
      x:hx, y:hy, vx:0, vy:0,
      hx:hx, hy:hy,
      side, kit,
      name: pickName(usedNames),
      num: i===0?1: 1+rndi(2,30),
      cool:0,            // cooldown for re-pickup of ball
      kickCool:0,        // cooldown after kicking
      stamina: 1.0,
      facing: side===-1?0:Math.PI,
      idx:i
    };
  });
  // ensure unique numbers
  const nums = new Set([1]);
  for(let i=1;i<players.length;i++){
    while(nums.has(players[i].num)) players[i].num = 2+rndi(0,30);
    nums.add(players[i].num);
  }
  return players;
}

function newMatch(swapKits){
  usedNames = new Set();
  usedNumbers = new Set();
  // pick kits
  const set = KIT_SETS[Math.floor(Math.random()*KIT_SETS.length)];
  kits = swapKits ? [set[1],set[0]] : [set[0],set[1]];
  teamNames = [pickTeamName(null), pickTeamName(null)];
  document.getElementById('nameA').textContent = teamNames[0];
  document.getElementById('nameB').textContent = teamNames[1];
  document.getElementById('nameA').style.background = kits[0].primary;
  document.getElementById('nameB').style.background = kits[1].primary;
  teams = [makeTeam(-1, kits[0], 'A'), makeTeam(+1, kits[1], 'B')];
  ball = { x:PUW/2, y:PUH/2, vx:0, vy:0, lastKicker:null, owner:null, ownerCool:0 };
  score = [0,0];
  simTime = 0;
  halfNum = 1;
  phase = 'kickoff';
  cardUntil = 0;
  kickoffTeam = Math.random()<0.5?0:1;
  possessor = null; possessTeam=null;
  lastEventAt = 0; lastFoulAt = -10;
  setTickerText("Welcome to the stadium! "+teamNames[0]+" in "+kitWord(kits[0])+", "+teamNames[1]+" in "+kitWord(kits[1])+".");
  setTimeout(()=>setTickerText("And we're underway! "+teamNames[kickoffTeam]+" with the kickoff."),900);
  doKickoff();
}
function pickTeamName(avoid){
  for(let i=0;i<10;i++){
    const n = TEAM_NAME_POOL[rndi(0,TEAM_NAME_POOL.length)];
    if(n!==avoid) return n;
  }
  return "TEAM";
}
function kitWord(k){
  if(k===KIT_RED) return "red";
  if(k===KIT_BLUE) return "blue";
  if(k===KIT_GREEN) return "green";
  if(k===KIT_GOLD) return "gold";
  return "color";
}

function doKickoff(){
  // place all players in their home, ball at center
  for(const team of teams) for(const p of team){ p.x=p.hx; p.y=p.hy; p.vx=0; p.vy=0; }
  // pull two kicker forwards to center
  const t = teams[kickoffTeam];
  const k1 = t[10], k2 = t[9]; // wingers
  k1.x = PUW/2 - 18; k1.y = PUH/2;
  k2.x = PUW/2 + 18; k2.y = PUH/2;
  ball.x=PUW/2; ball.y=PUH/2; ball.vx=0; ball.vy=0;
  ball.owner = k1; ball.ownerCool = 0;
  possessor = k1; possessTeam = kickoffTeam;
  phase = 'play';
}

// ------- ticker -------
const tickEl = document.getElementById('tickText');
let tickerQueue = [];
let tickerT = 0;
function setTickerText(s){ tickEl.textContent = s; tickerT = 0; }
function commentary(s, priority){
  // priority high replaces; else queue
  if(priority){ tickerQueue.length = 0; setTickerText(s); return; }
  tickerQueue.push(s);
  if(tickerQueue.length===1) setTickerText(s);
}
function tickTicker(dt){
  tickerT += dt;
  if(tickerQueue.length>1 && tickerT>3.5){
    tickerQueue.shift();
    setTickerText(tickerQueue[0]);
  } else if(tickerQueue.length===1 && tickerT>5){
    tickerQueue.shift();
  }
}

// ------- pitch drawing -------
function drawPitch(){
  // surrounding band
  cx.fillStyle = '#08160a';
  cx.fillRect(0,0,W,H);
  // grass with stripes
  const stripes = 14;
  const sw = PW/stripes;
  for(let i=0;i<stripes;i++){
    cx.fillStyle = (i%2===0)?'#1f7a32':'#1c6e2c';
    cx.fillRect(PX+i*sw, PY, sw+0.5, PH);
  }
  // soft vignette
  const grad = cx.createRadialGradient(PX+PW/2,PY+PH/2,Math.min(PW,PH)*0.2,PX+PW/2,PY+PH/2,Math.max(PW,PH)*0.7);
  grad.addColorStop(0,'rgba(255,255,255,0.04)');
  grad.addColorStop(1,'rgba(0,0,0,0.35)');
  cx.fillStyle = grad;
  cx.fillRect(PX,PY,PW,PH);

  // markings
  cx.strokeStyle = 'rgba(255,255,255,0.92)';
  cx.lineWidth = Math.max(1.4, PW*0.0022);
  cx.lineCap='butt';
  cx.lineJoin='miter';
  // touchlines
  cx.strokeRect(PX,PY,PW,PH);
  // halfway
  cx.beginPath();
  cx.moveTo(PX+PW/2, PY);
  cx.lineTo(PX+PW/2, PY+PH);
  cx.stroke();
  // center circle
  cx.beginPath();
  const c = P2C(PUW/2, PUH/2);
  cx.arc(c.x, c.y, P2CL(CIRCLE_R), 0, Math.PI*2);
  cx.stroke();
  // center spot
  cx.fillStyle='#fff';
  cx.beginPath(); cx.arc(c.x,c.y,Math.max(2,P2CL(4)),0,Math.PI*2); cx.fill();

  // penalty + goal areas + goals (each end)
  function box(x,w,h){
    const a = P2C(x, (PUH-h)/2);
    cx.strokeRect(a.x, a.y, P2CL(w), (h/PUH)*PH);
  }
  // left side
  box(0, PEN_W, PEN_H);
  box(0, GA_W, GA_H);
  // right side
  box(PUW-PEN_W, PEN_W, PEN_H);
  box(PUW-GA_W,  GA_W,  GA_H);
  // penalty spots
  for(const sx of [110, PUW-110]){
    const sp = P2C(sx, PUH/2);
    cx.beginPath(); cx.arc(sp.x,sp.y,Math.max(2,P2CL(4)),0,Math.PI*2); cx.fill();
  }
  // penalty arcs
  cx.beginPath();
  let a = P2C(110, PUH/2);
  cx.arc(a.x,a.y, P2CL(72), -0.93, 0.93);
  cx.stroke();
  cx.beginPath();
  a = P2C(PUW-110, PUH/2);
  cx.arc(a.x,a.y, P2CL(72), Math.PI-0.93, Math.PI+0.93);
  cx.stroke();

  // goals — drawn as nets outside the pitch
  cx.save();
  cx.fillStyle = 'rgba(255,255,255,0.18)';
  cx.strokeStyle = 'rgba(255,255,255,0.85)';
  cx.lineWidth = Math.max(1.2, PW*0.0018);
  // left goal
  let g1 = P2C(0, (PUH-GOAL_W)/2);
  let gw = P2CL(GOAL_DEPTH);
  let gh = (GOAL_W/PUH)*PH;
  cx.fillRect(g1.x-gw, g1.y, gw, gh);
  cx.strokeRect(g1.x-gw, g1.y, gw, gh);
  // net hatch
  cx.strokeStyle='rgba(255,255,255,0.35)';
  for(let i=1;i<6;i++){
    cx.beginPath(); cx.moveTo(g1.x-gw, g1.y + gh*i/6); cx.lineTo(g1.x, g1.y + gh*i/6); cx.stroke();
    cx.beginPath(); cx.moveTo(g1.x-gw + gw*i/6, g1.y); cx.lineTo(g1.x-gw + gw*i/6, g1.y+gh); cx.stroke();
  }
  // right goal
  cx.strokeStyle = 'rgba(255,255,255,0.85)';
  let g2 = P2C(PUW, (PUH-GOAL_W)/2);
  cx.fillRect(g2.x, g2.y, gw, gh);
  cx.strokeRect(g2.x, g2.y, gw, gh);
  cx.strokeStyle='rgba(255,255,255,0.35)';
  for(let i=1;i<6;i++){
    cx.beginPath(); cx.moveTo(g2.x, g2.y + gh*i/6); cx.lineTo(g2.x+gw, g2.y + gh*i/6); cx.stroke();
    cx.beginPath(); cx.moveTo(g2.x + gw*i/6, g2.y); cx.lineTo(g2.x + gw*i/6, g2.y+gh); cx.stroke();
  }
  cx.restore();

  // corner arcs
  cx.strokeStyle='rgba(255,255,255,0.92)';
  cx.lineWidth = Math.max(1.2, PW*0.0018);
  for(const cc of [{x:0,y:0,a0:0,a1:Math.PI/2},
                   {x:PUW,y:0,a0:Math.PI/2,a1:Math.PI},
                   {x:PUW,y:PUH,a0:Math.PI,a1:1.5*Math.PI},
                   {x:0,y:PUH,a0:1.5*Math.PI,a1:2*Math.PI}]){
    const p = P2C(cc.x,cc.y);
    cx.beginPath();
    cx.arc(p.x,p.y, P2CL(10), cc.a0, cc.a1);
    cx.stroke();
  }
}

// ------- player drawing -------
function drawPlayer(p){
  const isGK = p.role==='GK';
  const k = p.kit;
  const c = P2C(p.x,p.y);
  const r = Math.max(7, P2CL(13));
  // shadow
  cx.fillStyle='rgba(0,0,0,0.35)';
  cx.beginPath(); cx.ellipse(c.x+1, c.y+r*0.45, r*0.8, r*0.35, 0,0,Math.PI*2); cx.fill();
  // shorts ring
  cx.fillStyle = isGK?k.gks:k.short;
  cx.beginPath(); cx.arc(c.x,c.y, r*0.95, 0, Math.PI*2); cx.fill();
  // shirt
  cx.fillStyle = isGK?k.gk:k.shirt;
  cx.beginPath(); cx.arc(c.x,c.y, r*0.78, 0, Math.PI*2); cx.fill();
  // outline
  cx.strokeStyle='rgba(0,0,0,0.55)';
  cx.lineWidth=1.2;
  cx.stroke();
  // possession glow
  if(possessor===p){
    cx.strokeStyle='rgba(255,255,180,0.85)';
    cx.lineWidth=2;
    cx.beginPath(); cx.arc(c.x,c.y, r*1.15, 0, Math.PI*2); cx.stroke();
  }
  // number
  cx.fillStyle = isGK ? (k===KIT_BLUE?'#062c1a':'#222') : k.num;
  cx.font = 'bold '+Math.max(8, r*0.85)+'px ui-sans-serif,system-ui,Helvetica';
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText(String(p.num), c.x, c.y+0.5);
}

function drawBall(){
  const c = P2C(ball.x, ball.y);
  const r = Math.max(3, P2CL(8));
  cx.fillStyle='rgba(0,0,0,0.45)';
  cx.beginPath(); cx.ellipse(c.x+1, c.y+r*0.55, r*0.85, r*0.4, 0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#fff';
  cx.beginPath(); cx.arc(c.x,c.y,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#101010'; cx.lineWidth=1.1; cx.stroke();
  // pentagon dots for flair
  cx.fillStyle='#101010';
  cx.beginPath(); cx.arc(c.x-r*0.35,c.y-r*0.1,r*0.18,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(c.x+r*0.3,c.y+r*0.25,r*0.16,0,Math.PI*2); cx.fill();
}

// ------- AI behaviour -------
const PLAYER_SPEED = 165;     // pitch units / sec (sprint)
const PLAYER_SPEED_DRIBBLE = 120;
const BALL_FRICTION = 0.985;  // per frame
const PASS_SPEED_MIN = 360;
const PASS_SPEED_MAX = 520;
const SHOT_SPEED = 640;
const PICKUP_RADIUS = 13;
const TACKLE_RADIUS = 16;
const SHOOT_RANGE = 320;      // pitch units to goal center
const PRESS_RADIUS = 200;     // press if defender in range

function attackingDir(p){ return -p.side; } // p.side -1 attacks +x => dir = +1
function ownGoal(p){ return p.side===-1 ? {x:0, y:PUH/2} : {x:PUW, y:PUH/2}; }
function targetGoal(p){ return p.side===-1 ? {x:PUW, y:PUH/2} : {x:0, y:PUH/2}; }
function teamOf(p){ return p.team==='A'?0:1; }
function teammates(p){ return teams[teamOf(p)]; }
function opponents(p){ return teams[1-teamOf(p)]; }

function nearestOpponent(p){
  let best=null,bd=1e9;
  for(const o of opponents(p)){
    const d = dist2(o,p);
    if(d<bd){ bd=d; best=o; }
  }
  return {opp:best, d:Math.sqrt(bd)};
}
function nearestOf(arr, x, y, exclude){
  let best=null,bd=1e9;
  for(const o of arr){
    if(o===exclude) continue;
    const d = (o.x-x)*(o.x-x)+(o.y-y)*(o.y-y);
    if(d<bd){ bd=d; best=o; }
  }
  return {p:best, d:Math.sqrt(bd)};
}
// is line from A to B clear (no opponent within "lane" of segment)
function laneClear(ax,ay,bx,by,oppList,lane){
  const dx=bx-ax, dy=by-ay; const L=Math.hypot(dx,dy)||1;
  const ux=dx/L, uy=dy/L;
  for(const o of oppList){
    const rx=o.x-ax, ry=o.y-ay;
    const t = rx*ux + ry*uy;
    if(t<6 || t>L-6) continue;
    const px = ax+ux*t, py=ay+uy*t;
    const d = Math.hypot(o.x-px, o.y-py);
    if(d<lane) return false;
  }
  return true;
}

function bestPass(p){
  // score teammates: forwardness + open lane + open angle to goal
  const tg = targetGoal(p);
  const opps = opponents(p);
  let best=null, bs=-1e9;
  for(const m of teammates(p)){
    if(m===p) continue;
    if(m.role==='GK') continue;
    const dx = m.x-p.x, dy=m.y-p.y;
    const d = Math.hypot(dx,dy);
    if(d<60 || d>620) continue;
    const forward = (tg.x-p.x===0)?0:Math.sign(tg.x-p.x)*(m.x-p.x);
    if(!laneClear(p.x,p.y,m.x,m.y,opps,18)) continue;
    // bonus if teammate has open lane to goal
    const lane2goal = laneClear(m.x,m.y,tg.x,tg.y,opps,22)?80:0;
    const goalDist = Math.hypot(tg.x-m.x, tg.y-m.y);
    const score = forward*0.7 + lane2goal - goalDist*0.15 - d*0.08 + rnd(-15,15);
    if(score>bs){ bs=score; best=m; }
  }
  return best;
}

function shouldShoot(p){
  const tg = targetGoal(p);
  const d = Math.hypot(tg.x-p.x, tg.y-p.y);
  if(d>SHOOT_RANGE) return false;
  // angle to goal mouth
  const opps = opponents(p);
  return laneClear(p.x,p.y,tg.x,tg.y,opps,22);
}

function moveToward(p, tx, ty, speed, dt){
  const dx=tx-p.x, dy=ty-p.y;
  const L = Math.hypot(dx,dy);
  if(L<1){ p.vx*=0.6; p.vy*=0.6; return; }
  const ux=dx/L, uy=dy/L;
  const tvx = ux*speed, tvy = uy*speed;
  p.vx = lerp(p.vx, tvx, 0.18);
  p.vy = lerp(p.vy, tvy, 0.18);
  p.facing = Math.atan2(p.vy, p.vx);
}

function supportPos(p, baller){
  // teammate of baller — get to a forward space lane
  const tg = targetGoal(p);
  const aheadX = lerp(p.hx, baller.x + (tg.x-baller.x)*0.35, 0.55);
  const spread = (p.hy - PUH/2)*0.6 + PUH/2;  // keep some lateral spread
  let ty = lerp(spread, baller.y, 0.25);
  // avoid clustering with baller
  if(Math.abs(p.x-baller.x)<55 && Math.abs(p.y-baller.y)<55){
    ty += (p.y<baller.y?-1:1)*60;
  }
  return {x:clamp(aheadX,30,PUW-30), y:clamp(ty,30,PUH-30)};
}

function defensivePos(p, baller){
  // mark zone between home and ball, but goalkeeper stays
  if(p.role==='GK'){
    const og = ownGoal(p);
    const tg = targetGoal(p);
    // goalie shifts along goalline based on ball y, slight step out toward ball
    const t = clamp((baller? baller.y : ball.y)/PUH, 0.18, 0.82);
    const stepOut = clamp(Math.abs(ball.x - og.x)/PUW, 0, 1);
    const ox = og.x + (p.side===-1? +1:-1)*lerp(0, 30, 1-stepOut);
    return { x: ox, y: lerp(PUH/2 - GOAL_W*0.45, PUH/2 + GOAL_W*0.45, t) };
  }
  // others: slide between home and ball
  const tx = lerp(p.hx, ball.x, 0.35);
  const ty = lerp(p.hy, ball.y, 0.35);
  return { x:clamp(tx, 30, PUW-30), y:clamp(ty,30,PUH-30) };
}

function chosenPresser(team){
  // closest non-GK to ball
  let best=null,bd=1e9;
  for(const p of team){
    if(p.role==='GK') continue;
    const d = dist2(p, ball);
    if(d<bd){ bd=d; best=p; }
  }
  return best;
}

// ------- ball mechanics -------
function pass(p, target){
  const dx = target.x-p.x, dy = target.y-p.y;
  const L = Math.hypot(dx,dy)||1;
  const speed = clamp(L*1.6, PASS_SPEED_MIN, PASS_SPEED_MAX);
  // small inaccuracy
  const ang = Math.atan2(dy,dx) + rnd(-0.05,0.05);
  ball.vx = Math.cos(ang)*speed;
  ball.vy = Math.sin(ang)*speed;
  ball.lastKicker = p;
  releaseBall(p);
  commentary(p.name+" with the pass...");
}
function shoot(p){
  const tg = targetGoal(p);
  // aim at random spot inside goal mouth (with inaccuracy from distance)
  const d = Math.hypot(tg.x-p.x, tg.y-p.y);
  const inacc = clamp(d/SHOOT_RANGE, 0.2, 1.4);
  const ay = tg.y + rnd(-GOAL_W*0.42, GOAL_W*0.42) + rnd(-30,30)*inacc;
  const ax = tg.x;
  const dx=ax-p.x, dy=ay-p.y;
  const L=Math.hypot(dx,dy)||1;
  ball.vx = (dx/L)*SHOT_SPEED;
  ball.vy = (dy/L)*SHOT_SPEED;
  ball.lastKicker = p;
  releaseBall(p);
  commentary(p.name+" SHOOTS!", true);
  shotInFlight = { team: teamOf(p), at: simTime };
}
let shotInFlight = null;

function releaseBall(p){
  ball.owner = null;
  ball.ownerCool = 0.35;
  if(p) p.kickCool = 0.35;
  possessor = null; possessTeam = teamOf(p);
}

function setOwner(p){
  ball.owner = p;
  possessor = p;
  possessTeam = teamOf(p);
}

// ------- main update -------
function updateBall(dt){
  // owner carries the ball
  if(ball.owner){
    const o = ball.owner;
    // ball sits slightly ahead of player in moving direction
    const ang = Math.atan2(o.vy, o.vx);
    const sp = Math.hypot(o.vx,o.vy);
    const ahead = sp>5 ? 16 : 11;
    ball.x = o.x + Math.cos(ang)*ahead;
    ball.y = o.y + Math.sin(ang)*ahead;
    ball.vx = o.vx; ball.vy = o.vy;
    return;
  }
  // free ball
  ball.x += ball.vx*dt;
  ball.y += ball.vy*dt;
  // friction
  ball.vx *= Math.pow(BALL_FRICTION, dt*60);
  ball.vy *= Math.pow(BALL_FRICTION, dt*60);
  if(Math.hypot(ball.vx,ball.vy) < 8){ ball.vx*=0.85; ball.vy*=0.85; }

  // bounce off touchlines softly (not goals)
  if(ball.y < 6){ ball.y=6; ball.vy = Math.abs(ball.vy)*0.55; throwIn(); }
  if(ball.y > PUH-6){ ball.y=PUH-6; ball.vy = -Math.abs(ball.vy)*0.55; throwIn(); }
  // crossing ends — check goal
  if(ball.x < 0){
    if(Math.abs(ball.y-PUH/2) < GOAL_W/2){
      // goal for team that attacks +x => team attacking left goal scores
      scoreGoal(0); // team attacking +x... wait. team[0] side=-1 attacks +x (so toward right). a goal scored on left means team[1] scored. fix below.
    } else {
      ball.x=2; ball.vx = Math.abs(ball.vx)*0.4; goalKickOrCorner(0);
    }
  } else if(ball.x > PUW){
    if(Math.abs(ball.y-PUH/2) < GOAL_W/2){
      scoreGoal(1);
    } else {
      ball.x=PUW-2; ball.vx = -Math.abs(ball.vx)*0.4; goalKickOrCorner(1);
    }
  }

  if(ball.ownerCool>0) ball.ownerCool -= dt;
}

let goalCelebUntil = 0;

function scoreGoal(sideHit){
  // sideHit 0 means ball crossed left goal line — team attacking left scored = team with side=+1 = team[1] if team[1].side===+1
  let scoringTeam;
  if(sideHit===0){ // left goal
    // who attacks left? side=+1
    scoringTeam = teams[0][0].side===+1?0:1;
  } else {
    scoringTeam = teams[0][0].side===-1?0:1;
  }
  score[scoringTeam]++;
  const scorer = ball.lastKicker;
  const minute = Math.floor(simTime);
  if(scorer && teamOf(scorer)===scoringTeam){
    commentary("⚽ GOAL! "+scorer.name+" finds the net for "+teamNames[scoringTeam]+"! ("+minute+"')", true);
  } else {
    commentary("⚽ GOAL for "+teamNames[scoringTeam]+"! ("+minute+"')", true);
  }
  goalCelebUntil = perf+1.6;
  // restart from center, possession to opposite team
  kickoffTeam = 1-scoringTeam;
  resetForKickoff();
  shotInFlight = null;
}

function resetForKickoff(){
  for(const team of teams) for(const p of team){ p.x=p.hx; p.y=p.hy; p.vx=0; p.vy=0; p.kickCool=0.5; }
  const t = teams[kickoffTeam];
  const k1 = t[10], k2 = t[9];
  k1.x = PUW/2 - 20; k1.y = PUH/2;
  k2.x = PUW/2 + 20; k2.y = PUH/2;
  ball.x=PUW/2; ball.y=PUH/2; ball.vx=0; ball.vy=0;
  setOwner(k1);
  ball.ownerCool = 0.4;
  phase='play';
}

function throwIn(){
  // simple — closest player gets the ball, slight pause via cooldown
  if(ball.owner) return;
  const all=[...teams[0],...teams[1]];
  let best=null,bd=1e9,bestTeam=0;
  for(const p of all){ const d=dist2(p,ball); if(d<bd){bd=d;best=p;bestTeam=teamOf(p);} }
  // give to opposite of last kicker for realism
  if(ball.lastKicker){
    const opp = opponents(ball.lastKicker);
    let bo=null,bo_d=1e9;
    for(const p of opp){ const d=dist2(p,ball); if(d<bo_d){bo_d=d;bo=p;} }
    if(bo){ best=bo; }
  }
  if(best){
    setOwner(best);
    ball.ownerCool=0.4;
    commentary("Out for a throw-in. "+best.name+" to take.");
  }
}
function goalKickOrCorner(sideHit){
  // last kicker on attacking team => corner; otherwise goal kick to GK
  let cornerFor = null;
  if(ball.lastKicker){
    // attackers attacking this end => kicker's side determines:
    const kSide = ball.lastKicker.side; // -1 attacks +x (right), +1 attacks left
    const attackingLeft = (sideHit===0);
    const attackerSideValue = attackingLeft ? +1 : -1;
    if(kSide===attackerSideValue){
      // they kicked it out at opposite end -> defending team's goal kick
      cornerFor=null;
    } else {
      // attacker forced it out from defenders => corner for attackers
      cornerFor = (kSide===attackerSideValue?null: (1- (kSide===-1?0:1)));
      // simpler: corner for the team OPPOSITE the team that kicked out
      cornerFor = teamOf(ball.lastKicker)===0?1:0;
    }
  }
  if(cornerFor!==null){
    // place ball at corner near that end
    const cy = ball.y < PUH/2 ? 12 : PUH-12;
    const cx_ = sideHit===0?12:PUW-12;
    ball.x=cx_; ball.y=cy; ball.vx=0; ball.vy=0;
    // give to nearest player of cornerFor team
    const t = teams[cornerFor];
    let best=null,bd=1e9;
    for(const p of t){ if(p.role==='GK') continue; const d=dist2(p,ball); if(d<bd){bd=d;best=p;} }
    if(best){ setOwner(best); ball.ownerCool=0.5; commentary("Corner kick for "+teamNames[cornerFor]+"."); }
  } else {
    // goal kick
    const team = sideHit===0 ? (teams[0][0].side===-1?0:1) : (teams[0][0].side===+1?0:1);
    const gk = teams[team][0];
    ball.x = sideHit===0?40:PUW-40; ball.y = PUH/2;
    ball.vx=0; ball.vy=0;
    setOwner(gk); ball.ownerCool=0.5;
    commentary("Goal kick to "+gk.name+".");
  }
  shotInFlight=null;
}

function freeKick(spotX, spotY, forTeam){
  ball.x=spotX; ball.y=spotY; ball.vx=0; ball.vy=0;
  const t = teams[forTeam];
  // give to nearest non-GK player
  let best=null,bd=1e9;
  for(const p of t){ if(p.role==='GK') continue; const d=dist2(p,ball); if(d<bd){bd=d;best=p;} }
  if(best){ setOwner(best); ball.ownerCool=0.55; }
  commentary("Free kick to "+teamNames[forTeam]+".", true);
}

// ------- per-player AI tick -------
function tickPlayers(dt){
  const haveBall = ball.owner;
  const havTeam  = haveBall ? teamOf(haveBall) : null;
  const presserA = havTeam===1 ? chosenPresser(teams[0]) : null;
  const presserB = havTeam===0 ? chosenPresser(teams[1]) : null;

  for(let ti=0; ti<2; ti++){
    const team = teams[ti];
    for(const p of team){
      if(p.kickCool>0) p.kickCool -= dt;

      // GK behaviour overrides for sanity even when in possession
      if(p.role==='GK' && haveBall===p){
        // GK always passes quickly to nearest defender
        const cands = teammates(p).filter(t=>t!==p && t.role!=='GK');
        let best=null,bd=1e9;
        for(const m of cands){ const d=dist2(m,p); if(d<bd){bd=d;best=m;} }
        if(best){ pass(p,best); }
        continue;
      }

      // 1) I have the ball
      if(haveBall===p){
        const opps = opponents(p);
        const tg = targetGoal(p);
        const og = ownGoal(p);

        // GK threat?
        let threatD=1e9, threat=null;
        for(const o of opps){
          if(o.role==='GK') continue;
          const d=dist(o,p); if(d<threatD){threatD=d;threat=o;}
        }
        const closeThreat = threatD < 28;

        // shooting check
        if(!closeThreat && shouldShoot(p)){
          shoot(p); continue;
        }
        // pass under pressure
        if(closeThreat){
          const m = bestPass(p);
          if(m){ pass(p, m); continue; }
          // else hoof it forward
          ball.vx = Math.sign(tg.x-p.x)*SHOT_SPEED*0.65 + rnd(-50,50);
          ball.vy = (tg.y-p.y)*0.4 + rnd(-50,50);
          ball.lastKicker=p;
          releaseBall(p);
          commentary(p.name+" clears it upfield.");
          continue;
        }
        // sometimes try a forward pass even without pressure
        if(Math.random()<0.012){
          const m = bestPass(p);
          if(m){ pass(p,m); continue; }
        }
        // dribble toward goal
        let tx = tg.x, ty = tg.y;
        // avoid running directly into nearest opponent — sidestep
        if(threat && threatD<70){
          const sideStep = (p.y<threat.y?-1:1)*40;
          ty += sideStep;
        }
        moveToward(p, tx, ty, PLAYER_SPEED_DRIBBLE, dt);
        continue;
      }

      // 2) teammate has the ball
      if(haveBall && teamOf(haveBall)===teamOf(p)){
        const tgt = supportPos(p, haveBall);
        moveToward(p, tgt.x, tgt.y, PLAYER_SPEED*0.78, dt);
        continue;
      }

      // 3) opponent has ball OR ball loose
      if(haveBall && teamOf(haveBall)!==teamOf(p)){
        const presser = (teamOf(p)===0?presserA:presserB);
        if(p===presser){
          // sprint to ball-holder
          moveToward(p, haveBall.x, haveBall.y, PLAYER_SPEED, dt);
        } else {
          const tgt = defensivePos(p, haveBall);
          moveToward(p, tgt.x, tgt.y, PLAYER_SPEED*0.85, dt);
        }
      } else {
        // loose ball
        // closest player on each team chases; others to home
        const myClose = nearestOf(teams[teamOf(p)], ball.x, ball.y, null).p;
        if(p===myClose){
          moveToward(p, ball.x, ball.y, PLAYER_SPEED, dt);
        } else {
          if(p.role==='GK'){
            const tgt = defensivePos(p,null);
            moveToward(p, tgt.x, tgt.y, PLAYER_SPEED*0.7, dt);
          } else {
            // home position
            moveToward(p, p.hx, p.hy, PLAYER_SPEED*0.7, dt);
          }
        }
      }
    }
  }

  // integrate motion and clamp
  for(const team of teams) for(const p of team){
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.x = clamp(p.x, 14, PUW-14);
    p.y = clamp(p.y, 14, PUH-14);
  }

  // pickup / tackle resolution
  resolvePickup(dt);

  // GK save
  if(shotInFlight){
    const targetTeam = shotInFlight.team===0?1:0; // shot is from team X, GK of opposite
    const gk = teams[targetTeam][0];
    const d = Math.hypot(gk.x-ball.x, gk.y-ball.y);
    if(d < 24 && !ball.owner){
      // save chance grows with proximity & ball speed in GK direction
      const sp = Math.hypot(ball.vx, ball.vy);
      const saveChance = clamp(1.1 - d/30, 0.3, 0.95) * (sp>200?0.85:1);
      if(Math.random() < saveChance){
        commentary("Brilliant save by "+gk.name+"!", true);
        setOwner(gk);
        ball.vx=0; ball.vy=0; ball.ownerCool=0.6;
        shotInFlight = null;
      }
    } else if(simTime - shotInFlight.at > 0.05*5){ // expire if too long
      // (sim time is in minutes so this is approx)
    }
    if(Math.hypot(ball.vx,ball.vy) < 50) shotInFlight = null;
  }
}

function resolvePickup(dt){
  if(ball.owner){
    // tackle attempts: opponents close to owner
    const o = ball.owner;
    if(o.kickCool>0) return;
    for(const opp of opponents(o)){
      if(opp.role==='GK') continue;
      if(opp.kickCool>0) continue;
      const d = dist(opp,o);
      if(d < TACKLE_RADIUS){
        const r = Math.random();
        if(r < 0.05 && simTime-lastFoulAt > 0.3){
          // foul
          lastFoulAt = simTime;
          commentary("FOUL! "+opp.name+" brings down "+o.name+"!", true);
          freeKick(o.x, o.y, teamOf(o));
          return;
        } else if(r < 0.55){
          // tackle wins
          commentary("Great tackle by "+opp.name+"! Possession to "+teamNames[teamOf(opp)]+".");
          setOwner(opp);
          opp.kickCool = 0.25; o.kickCool = 0.4;
          // kick ball slightly in opp's direction to break inertia
          const a = Math.atan2(opp.vy, opp.vx);
          ball.vx = Math.cos(a)*60; ball.vy = Math.sin(a)*60;
          return;
        } else {
          // attacker shrugs off
          o.kickCool = 0.18;
          opp.kickCool = 0.25;
        }
      }
    }
    return;
  }
  if(ball.ownerCool>0) return;
  // find closest player
  const all=[...teams[0],...teams[1]];
  let best=null,bd=1e9;
  for(const p of all){
    if(p.kickCool>0) continue;
    const d=dist2(p,ball);
    if(d<bd){bd=d;best=p;}
  }
  if(best && Math.sqrt(bd) < PICKUP_RADIUS){
    setOwner(best);
    // small redirect of ball
    ball.vx*=0.2; ball.vy*=0.2;
    ball.ownerCool = 0.18;
    if(Math.random()<0.4) commentary(best.name+" picks up possession.");
  }
}

// ------- main loop -------
let last=performance.now()/1000;
let perf = 0;
function loop(){
  const now = performance.now()/1000;
  let dt = Math.min(0.05, now-last);
  last = now;
  perf += dt;

  if(phase==='halftime'){
    if(now>=cardUntil){
      // start 2nd half
      hideCard();
      halfNum=2;
      // swap sides
      for(const team of teams) for(const p of team){
        p.side = -p.side;
        p.hx = PUW - p.hx;
        p.hy = PUH - p.hy;
      }
      kickoffTeam = 1-kickoffTeam;
      doKickoff();
      phase='play';
      commentary("We're back for the second half!", true);
    }
  } else if(phase==='fulltime'){
    if(now>=cardUntil){
      hideCard();
      newMatch(true);
    }
  } else if(phase==='play'){
    simTime += dt * SIM_SCALE;
    tickPlayers(dt);
    updateBall(dt);

    if(halfNum===1 && simTime>=45){
      // halftime
      phase='halftime';
      cardUntil = now + HALFTIME_PAUSE;
      simTime = 45;
      showCard("HALF TIME", score[0]+" — "+score[1], teamNames[0]+" vs "+teamNames[1]);
      commentary("That's the halftime whistle!", true);
    } else if(halfNum===2 && simTime>=90){
      phase='fulltime';
      cardUntil = now + FULLTIME_PAUSE;
      simTime = 90;
      const winner = score[0]===score[1] ? "Draw" : (score[0]>score[1] ? teamNames[0]+" win!" : teamNames[1]+" win!");
      showCard("FULL TIME", score[0]+" — "+score[1], winner);
      commentary("And that's full time! "+winner, true);
    }
  }

  // --- render ---
  drawPitch();
  // draw players with owner highlight last
  for(const team of teams){
    for(const p of team){ if(possessor!==p) drawPlayer(p); }
  }
  for(const team of teams){
    for(const p of team){ if(possessor===p) drawPlayer(p); }
  }
  drawBall();

  // HUD updates
  document.getElementById('score').textContent = score[0]+" — "+score[1];
  const mm = Math.floor(simTime).toString().padStart(2,'0');
  const ss = Math.floor((simTime-Math.floor(simTime))*60).toString().padStart(2,'0');
  document.getElementById('clock').textContent = mm+"'"+ss;
  document.getElementById('phase').textContent = phase==='halftime'?'HALF TIME': phase==='fulltime'?'FULL TIME': (halfNum===1?'1ST HALF':'2ND HALF');

  tickTicker(dt);
  requestAnimationFrame(loop);
}

function showCard(t, sc, sub){
  document.getElementById('cardTtl').textContent=t;
  document.getElementById('cardSc').textContent=sc;
  document.getElementById('cardSub').textContent=sub;
  document.getElementById('card').style.display='flex';
}
function hideCard(){ document.getElementById('card').style.display='none'; }

// kickoff!
newMatch(false);
loop();

})();
</script>
</body>
</html>
