<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Detective Noir 3D — Round 11</title>
<style>
  html,body{margin:0;padding:0;background:#000;color:#d8d3c8;font-family:'Courier New',Courier,monospace;overflow:hidden;height:100%;}
  #c{position:fixed;inset:0;display:block;width:100vw;height:100vh;}
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.55) 70%,#000 100%);
    z-index:5;mix-blend-mode:multiply;}
  .grain{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:0.18;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");}
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:7;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 1px,transparent 1px,transparent 3px);
    mix-blend-mode:multiply;opacity:0.55;}
  .frame{position:fixed;inset:0;pointer-events:none;z-index:8;border:14px solid #000;box-shadow:inset 0 0 80px #000;}
  .tint{position:fixed;inset:0;pointer-events:none;z-index:4;background:rgba(20,28,40,0.18);transition:background 1s;}
  #fade{position:fixed;inset:0;background:#000;z-index:20;opacity:1;transition:opacity 1.2s;pointer-events:none;}
  #title{position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:11;text-align:center;
    color:#e9e2cf;letter-spacing:0.18em;text-shadow:0 0 10px #000,2px 2px 0 #000;pointer-events:none;}
  #title .big{font-size:42px;font-weight:bold;}
  #title .sm{font-size:13px;opacity:0.78;margin-top:6px;}
  #notebook{position:fixed;left:24px;bottom:24px;width:360px;max-height:46vh;z-index:10;
    background:linear-gradient(180deg,#f4ecd2 0%,#e8dcb6 100%);
    color:#1a1207;border:1px solid #2a1f0a;border-radius:2px;
    box-shadow:0 12px 30px rgba(0,0,0,0.7),inset 0 0 0 2px #d6c89a;
    padding:12px 14px;font-size:12px;line-height:1.5;
    background-image:repeating-linear-gradient(180deg,transparent 0,transparent 18px,rgba(120,40,30,0.18) 18px,rgba(120,40,30,0.18) 19px);
    overflow:hidden;}
  #notebook .nbhead{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid #6b4a1a;padding-bottom:4px;margin-bottom:6px;}
  #notebook .nbhead .t{font-weight:bold;letter-spacing:0.12em;text-transform:uppercase;font-size:11px;}
  #notebook .nbhead .a{font-size:10px;color:#7a3a14;}
  #notebook .body{white-space:pre-wrap;font-family:'Courier New',Courier,monospace;min-height:140px;max-height:32vh;overflow:hidden;}
  @keyframes blk{50%{opacity:0;}}
  #suspects{position:fixed;right:24px;top:24px;width:300px;z-index:10;
    background:#2a1410;color:#f1e4c6;border:1px solid #6b3a2a;
    box-shadow:0 10px 24px rgba(0,0,0,0.7);padding:10px 12px;font-size:11px;}
  #suspects h3{margin:0 0 6px 0;font-size:11px;letter-spacing:0.18em;color:#d99;border-bottom:1px solid #6b3a2a;padding-bottom:4px;}
  #suspects .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted rgba(255,200,180,0.18);}
  #suspects .row.dim{opacity:0.35;text-decoration:line-through;}
  #suspects .row.killer{color:#ff5944;font-weight:bold;}
  #board{position:fixed;right:24px;bottom:24px;width:300px;z-index:10;
    background:#3a2a18;color:#f1e4c6;border:1px solid #6b4a1a;padding:10px 12px;font-size:11px;
    box-shadow:0 10px 24px rgba(0,0,0,0.7);max-height:36vh;overflow:hidden;}
  #board h3{margin:0 0 6px 0;font-size:11px;letter-spacing:0.18em;color:#e9c97a;border-bottom:1px solid #6b4a1a;padding-bottom:4px;}
  #board .ev{padding:3px 0;border-bottom:1px dotted rgba(233,201,122,0.2);}
  #board .ev.hard{color:#ffe28a;}
  #board .ev.red{color:#ff8a6a;font-style:italic;}
  #act{position:fixed;left:50%;top:60px;transform:translateX(-50%);z-index:11;
    color:#c9b88a;font-size:12px;letter-spacing:0.36em;text-shadow:0 0 8px #000;}
  #stakes{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:14;
    color:#ff3322;font-size:46px;font-weight:bold;letter-spacing:0.18em;
    text-shadow:0 0 24px #c00,3px 3px 0 #000;text-align:center;
    opacity:0;transition:opacity 0.6s;pointer-events:none;}
  #closed{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:14;
    color:#f5e7b8;font-size:42px;font-weight:bold;letter-spacing:0.24em;
    text-shadow:0 0 24px #000,3px 3px 0 #6b1e10;text-align:center;
    opacity:0;transition:opacity 0.8s;pointer-events:none;}
  #dialog{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:12;
    max-width:520px;background:rgba(8,8,8,0.78);color:#e9d8b5;border:1px solid #5a4a2a;
    padding:10px 14px;font-size:13px;line-height:1.4;display:none;}
  #dialog .who{color:#e9c97a;font-weight:bold;letter-spacing:0.12em;font-size:10px;text-transform:uppercase;}
  #signature{position:fixed;left:24px;top:24px;z-index:11;color:#a89572;font-size:10px;letter-spacing:0.3em;}
  #flash{position:fixed;inset:0;background:#fff;z-index:13;opacity:0;pointer-events:none;transition:opacity 0.06s;}
</style>
</head>
<body>
<!-- ROUND11_3D_EPIC v1 -->
<canvas id="c"></canvas>
<div class="tint" id="tint"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain"></div>
<div class="frame"></div>
<div id="flash"></div>
<div id="title"><div class="big" id="titleBig">THE CASE</div><div class="sm" id="titleSm">A 1940s Noir</div></div>
<div id="signature">CASE FILE — DEPT. OF HOMICIDE</div>
<div id="act">ACT I — DISCOVERY</div>
<div id="stakes">THE STAKES JUST GOT HIGHER</div>
<div id="closed">CASE CLOSED</div>
<div id="notebook">
  <div class="nbhead"><span class="t" id="nbsec">SCENE</span><span class="a" id="nbloc">CRIME SCENE</span></div>
  <div class="body" id="nbbody"></div>
</div>
<div id="suspects">
  <h3>SUSPECT BOARD</h3>
  <div id="suspectList"></div>
</div>
<div id="board">
  <h3>EVIDENCE LOCKER</h3>
  <div id="evidList"></div>
</div>
<div id="dialog"><div class="who" id="who">DETECTIVE</div><div id="line"></div></div>
<div id="fade"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';
(function(){
const T = THREE;
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

// ---- DATA POOLS ------------------------------------------------------------
const DETECTIVES = [
  {name:'Eli Marston',  hat:0x1a1a1a, coat:0x2a2118},
  {name:'Vera Kane',    hat:0x1a1410, coat:0x3a2018},
  {name:'Cole Reeves',  hat:0x1a1a14, coat:0x1f2a22},
  {name:'Marlowe Quinn',hat:0x141414, coat:0x2a2a30}
];
const SUSPECTS_POOL = [
  {name:'Roxie Vance',         role:'Lounge Singer', hat:null,     coat:0xb0203a, accent:'sparkle'},
  {name:"Tony 'Cards' DeLuca", role:'Bookie',        hat:0x18181c, coat:0x3a3038, accent:'card'},
  {name:'Dr. Hyram Wells',     role:'Coroner',       hat:null,     coat:0xe6e2d5, accent:'glasses'},
  {name:'Lottie Mills',        role:'Heiress',       hat:null,     coat:0x6e5a3a, accent:'fur'},
  {name:'Boss Carlucci',       role:'Crime Lord',    hat:0x141416, coat:0x222226, accent:'broad'},
  {name:'Beatrix Holloway',    role:'Author',        hat:null,     coat:0x3a2a22, accent:'glasses'}
];
const VICTIMS = ['Sal Greco','Mae Linwood','Eddie Bracco','Diana Hart','Frankie Doyle','Helen Vasquez','Ivor Bell','Tessa Romano'];
const MOTIVES = ['greed','revenge','love','blackmail','fear','loyalty'];
const WEAPONS = [
  {name:'.38 revolver',  clue:'spent .38 shell casing'},
  {name:'kitchen knife', clue:'bloodied paring knife in the sink'},
  {name:'arsenic poison',clue:'a half-empty teacup laced with arsenic'},
  {name:'strangulation', clue:'silk-stocking fibers around the throat'},
  {name:'a long fall',   clue:'a torn cuff button at the balcony rail'}
];
const LOCATIONS = [
  {id:'crime',     name:'CRIME SCENE',      desc:"a fourth-floor walk-up that smells of cordite"},
  {id:'precinct',  name:'POLICE PRECINCT',  desc:"the bullpen, blue with cigarette smoke"},
  {id:'morgue',    name:"CORONER'S OFFICE", desc:"the morgue, cold as a Christmas conscience"},
  {id:'lounge',    name:'MARIPOSA LOUNGE',  desc:"a jazz club where the saxophone never stops"},
  {id:'mansion',   name:"HEIRESS'S MANSION",desc:"a library lined with secrets and oak"},
  {id:'docks',     name:'THE DOCKS',        desc:"pier 9, fog so thick you could lean on it"},
  {id:'street',    name:'NEWSSTAND/STREET', desc:"a rain-slick corner under a bleeding neon sign"},
  {id:'hotel',     name:'HOTEL',            desc:"the Beresford lobby, gilt and grime"}
];
function makeRand(){ let s=(Date.now()^Math.floor(Math.random()*0xffffffff))>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return (s>>>8)/0xffffff; }; }
let rand = makeRand();
const pick = a => a[Math.floor(rand()*a.length)];
const pickN = (a,n)=>{ const c=a.slice(),r=[]; while(r.length<n && c.length){ r.push(c.splice(Math.floor(rand()*c.length),1)[0]); } return r; };

// ---- CASE GENERATOR --------------------------------------------------------
function genCase(){
  const detective = pick(DETECTIVES);
  const suspects = pickN(SUSPECTS_POOL, 6);
  const killer = pick(suspects);
  const victim = pick(VICTIMS);
  const motive = pick(MOTIVES);
  const weapon = pick(WEAPONS);
  const setting = pick(LOCATIONS);
  const evidence = [];
  evidence.push({text:weapon.clue+' near the body', kind:'hard', against:killer.name});
  const tells = [
    'a single cigar match — '+killer.name.split(' ')[0]+"'s brand",
    'a shoe print sized to '+killer.name.split(' ')[0],
    'a torn ticket stub from the '+pick(['Mariposa','Beresford','Pier 9','Greyhound'])+' — places '+killer.name+' near the scene',
    "an alibi that cracks under questioning: "+killer.name+" was seen on Sutter Street, not at the "+pick(['poker game','dinner','radio show'])+" they claimed"
  ];
  pickN(tells,3).forEach(t=>evidence.push({text:t,kind:'hard',against:killer.name}));
  evidence.push({text:'a bloody handkerchief in the hallway, monogrammed but unrelated', kind:'red'});
  suspects.filter(s=>s!==killer).forEach(s=>{
    if(rand()<0.5) evidence.push({text:'a misleading note implicating '+s.name+' — paper from the wrong year', kind:'red'});
  });
  // solvability check: only killer accumulates "hard" pointers; ensure unique max
  const pointers = {}; suspects.forEach(s=>pointers[s.name]=0);
  evidence.forEach(e=>{ if(e.kind==='hard' && e.against) pointers[e.against]++; });
  let solvable = true;
  Object.keys(pointers).forEach(n=>{ if(n!==killer.name && pointers[n]>=pointers[killer.name]) solvable=false; });
  return { detective, suspects, killer, victim, motive, weapon, setting, evidence, solvable };
}

// ---- THREE.JS CORE ---------------------------------------------------------
const canvas = document.getElementById('c');
const renderer = new T.WebGLRenderer({canvas, antialias:false, powerPreference:'low-power'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.setSize(W(),H());
renderer.outputColorSpace = T.SRGBColorSpace;

const scene = new T.Scene();
scene.background = new T.Color(0x05060a);
scene.fog = new T.FogExp2(0x0a0c12, 0.045);

const camera = new T.PerspectiveCamera(38, W()/H(), 0.1, 200);
camera.position.set(0,3,8);

window.addEventListener('resize', ()=>{
  renderer.setSize(W(),H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});

// ---- MATERIALS (desaturated palette) ---------------------------------------
const MAT = {
  floor:    new T.MeshLambertMaterial({color:0x14161b}),
  wall:     new T.MeshLambertMaterial({color:0x1c1e23}),
  wood:     new T.MeshLambertMaterial({color:0x2a2018}),
  darkWood: new T.MeshLambertMaterial({color:0x1a120c}),
  metal:    new T.MeshLambertMaterial({color:0x2a2c30}),
  paper:    new T.MeshLambertMaterial({color:0xb8b09a}),
  red:      new T.MeshLambertMaterial({color:0x8a1414}),
  blood:    new T.MeshBasicMaterial({color:0xb01010}),
  chalk:    new T.MeshBasicMaterial({color:0xe8e4d2}),
  glass:    new T.MeshLambertMaterial({color:0x0e0f12, transparent:true, opacity:0.55}),
  skin:     new T.MeshLambertMaterial({color:0x9c8770}),
  white:    new T.MeshLambertMaterial({color:0xb8b4a8}),
  flame:    new T.PointsMaterial({color:0xd87020, size:0.18, transparent:true, opacity:0.9, depthWrite:false}),
  smoke:    new T.PointsMaterial({color:0x9a98a0, size:0.6, transparent:true, opacity:0.18, depthWrite:false}),
  rain:     new T.LineBasicMaterial({color:0x6a7080, transparent:true, opacity:0.45})
};

// ---- LIGHTS ----------------------------------------------------------------
const ambient = new T.AmbientLight(0x4a5060, 0.18);
scene.add(ambient);

const keyLight = new T.SpotLight(0xfff2d8, 4.5, 36, Math.PI*0.20, 0.55, 1.2);
keyLight.position.set(0,10,4);
keyLight.target.position.set(0,0,0);
scene.add(keyLight);
scene.add(keyLight.target);

const rimLight = new T.PointLight(0x6a8aff, 0.5, 22);
rimLight.position.set(-6,4,-6);
scene.add(rimLight);

// ---- HUMANOID BUILDER ------------------------------------------------------
function makeHumanoid(opts){
  opts = opts || {};
  const g = new T.Group();
  const skinMat = MAT.skin;
  const coatMat = new T.MeshLambertMaterial({color: opts.coat != null ? opts.coat : 0x2a2118});
  const hatMat  = new T.MeshLambertMaterial({color: opts.hat  != null ? opts.hat  : 0x141414});
  // legs
  const legL = new T.Mesh(new T.BoxGeometry(0.22,0.95,0.22), MAT.darkWood); legL.position.set(-0.14,0.48,0);
  const legR = legL.clone(); legR.position.x = 0.14; g.add(legL,legR);
  // torso
  const torso = new T.Mesh(new T.BoxGeometry(0.7,0.9,0.4), coatMat); torso.position.y=1.4; g.add(torso);
  if(opts.accent === 'broad'){ torso.scale.x = 1.3; }
  // arms
  const armL = new T.Mesh(new T.BoxGeometry(0.18,0.75,0.18), coatMat); armL.position.set(-0.45,1.4,0);
  const armR = armL.clone(); armR.position.x = 0.45; g.add(armL,armR);
  // hands
  const handL = new T.Mesh(new T.SphereGeometry(0.1,6,5), skinMat); handL.position.set(-0.45,1.0,0);
  const handR = handL.clone(); handR.position.x = 0.45; g.add(handL,handR);
  // head
  const head = new T.Mesh(new T.SphereGeometry(0.22,10,8), skinMat); head.position.y=2.05; g.add(head);
  // fedora (cylinder + brim)
  if(opts.hat !== null){
    const crown = new T.Mesh(new T.CylinderGeometry(0.22,0.24,0.16,12), hatMat); crown.position.y=2.27; g.add(crown);
    const brim  = new T.Mesh(new T.CylinderGeometry(0.34,0.34,0.03,16), hatMat); brim.position.y=2.20; g.add(brim);
  }
  // trench coat skirt
  const skirt = new T.Mesh(new T.CylinderGeometry(0.42,0.5,0.7,8,1,true), coatMat); skirt.position.y=0.9; g.add(skirt);
  // accents
  if(opts.accent === 'sparkle'){
    const sg = new T.BufferGeometry();
    const pts = []; for(let i=0;i<60;i++){ pts.push((rand()-0.5)*0.7,1.0+rand()*0.9,(rand()-0.5)*0.45); }
    sg.setAttribute('position', new T.Float32BufferAttribute(pts,3));
    g.add(new T.Points(sg, new T.PointsMaterial({color:0xffe6c0,size:0.05,transparent:true,opacity:0.9})));
  } else if(opts.accent === 'glasses'){
    const r1 = new T.Mesh(new T.RingGeometry(0.05,0.08,12), MAT.metal); r1.position.set(-0.08,2.05,0.22);
    const r2 = r1.clone(); r2.position.x = 0.08; g.add(r1,r2);
  } else if(opts.accent === 'fur'){
    const fur = new T.Mesh(new T.TorusGeometry(0.32,0.08,6,16), new T.MeshLambertMaterial({color:0x8a7a5a}));
    fur.rotation.x = Math.PI/2; fur.position.y=1.8; g.add(fur);
  } else if(opts.accent === 'card'){
    const card = new T.Mesh(new T.BoxGeometry(0.1,0.14,0.01), MAT.paper);
    card.position.set(0.5,1.0,0.05); card.rotation.z=0.2; g.add(card);
  }
  g.userData.head = head;
  return g;
}

// ---- SCENE BUILDERS (8 LOCATIONS) ------------------------------------------
const sceneRoot = new T.Group();
scene.add(sceneRoot);
let smokePoints = null;

function clearScene(){
  while(sceneRoot.children.length) {
    const c = sceneRoot.children.pop();
    sceneRoot.remove(c);
    if(c.geometry && c.geometry.dispose) c.geometry.dispose();
  }
  sceneRoot.userData = {};
  smokePoints = null;
}

function addFloor(color){
  const g = new T.Mesh(new T.PlaneGeometry(40,40), new T.MeshLambertMaterial({color: color||0x0e1014}));
  g.rotation.x = -Math.PI/2; sceneRoot.add(g); return g;
}
function addWall(w,h,x,y,z,ry,color){
  const m = new T.Mesh(new T.BoxGeometry(w,h,0.2), new T.MeshLambertMaterial({color: color||0x1c1e23}));
  m.position.set(x,y,z); m.rotation.y = ry||0; sceneRoot.add(m); return m;
}
function addSmoke(){
  const sg = new T.BufferGeometry();
  const pts=[], n=140;
  for(let i=0;i<n;i++){ pts.push((Math.random()-0.5)*30, Math.random()*6+0.5, (Math.random()-0.5)*30); }
  sg.setAttribute('position', new T.Float32BufferAttribute(pts,3));
  const p = new T.Points(sg, MAT.smoke);
  sceneRoot.add(p); smokePoints = p;
}

function buildCrime(){
  addFloor(0x141114);
  addWall(12,5,0,2.5,-4); addWall(5,5,-4,2.5,0,Math.PI/2); addWall(5,5,4,2.5,0,Math.PI/2);
  // chalk outline
  const chalkPts = [
    [-0.3,1.5],[-0.5,1.0],[-0.5,0.4],[-0.4,-0.2],[-0.5,-0.7],[-0.6,-1.0],
    [0.3,1.5],[0.5,1.0],[0.5,0.4],[0.4,-0.2],[0.5,-0.7],[0.6,-1.0],
    [-0.2,1.7],[0.2,1.7],[-0.7,-1.2],[0.7,-1.2]
  ];
  chalkPts.forEach(p=>{
    const m = new T.Mesh(new T.BoxGeometry(0.18,0.02,0.18), MAT.chalk);
    m.position.set(p[0],0.015,p[1]); sceneRoot.add(m);
  });
  // blood drop accent
  const blood = new T.Mesh(new T.CircleGeometry(0.18,8), MAT.blood);
  blood.rotation.x = -Math.PI/2; blood.position.set(0.4,0.02,0.2); sceneRoot.add(blood);
  // broken lamp
  const lamp = new T.Group();
  const lampBase = new T.Mesh(new T.CylinderGeometry(0.12,0.16,0.1,10), MAT.metal);
  const lampPole = new T.Mesh(new T.CylinderGeometry(0.04,0.04,0.7,8), MAT.metal); lampPole.position.y=0.4;
  const lampShade = new T.Mesh(new T.ConeGeometry(0.3,0.3,12,1,true), MAT.paper); lampShade.position.y=0.85;
  lamp.add(lampBase,lampPole,lampShade);
  lamp.rotation.z = Math.PI/2.4; lamp.position.set(2.2,0.2,-1.5); sceneRoot.add(lamp);
  // overturned chair
  const chair = new T.Group();
  const seat = new T.Mesh(new T.BoxGeometry(0.5,0.06,0.5), MAT.wood);
  const back = new T.Mesh(new T.BoxGeometry(0.5,0.6,0.06), MAT.wood); back.position.set(0,0.3,-0.22);
  for(let i=0;i<4;i++){
    const leg = new T.Mesh(new T.BoxGeometry(0.05,0.5,0.05), MAT.wood);
    leg.position.set((i%2?1:-1)*0.2, -0.28, (i<2?1:-1)*0.2); chair.add(leg);
  }
  chair.add(seat,back); chair.rotation.z = -Math.PI/3; chair.position.set(-2.4,0.4,-1.0); sceneRoot.add(chair);
  // window
  const win = new T.Mesh(new T.PlaneGeometry(1.6,1.8), new T.MeshBasicMaterial({color:0x404a5a}));
  win.position.set(0,2.4,-3.85); sceneRoot.add(win);
  scene.fog.density = 0.045;
  keyLight.position.set(2,8,-1); keyLight.target.position.set(0,0,0); keyLight.color.setHex(0xfff0d0);
}

function buildPrecinct(){
  addFloor(0x18181c);
  addWall(14,5,0,2.5,-5,0,0x222226);
  addWall(5,5,-7,2.5,-2.5,Math.PI/2,0x1e1e22);
  // desk
  const desk = new T.Mesh(new T.BoxGeometry(2.2,0.1,1.0), MAT.wood); desk.position.set(0,0.85,-1); sceneRoot.add(desk);
  for(let i=0;i<4;i++){
    const leg = new T.Mesh(new T.BoxGeometry(0.08,0.85,0.08), MAT.darkWood);
    leg.position.set((i%2?1:-1)*1.0,0.42,(i<2?1:-1)*0.4 - 1); sceneRoot.add(leg);
  }
  // typewriter
  const typer = new T.Mesh(new T.BoxGeometry(0.5,0.25,0.4), new T.MeshLambertMaterial({color:0x0a0a0a}));
  typer.position.set(-0.3,1.05,-1); sceneRoot.add(typer);

// ---- CAMERA CHOREOGRAPHY ---------------------------------------------------
let camAnchor = new T.Vector3(0,1.0,0);
let camRadius = 6;
let camAngle = 0;
let camHeight = 2.4;
let camTargetY = 1.0;
let camSpeed = 0.06;
function setCam(anchor, radius, angle, height, ty, speed){

  camTargetY = ty!==undefined?ty:1.0; camSpeed = speed!==undefined?speed:0.06;

// ---- FADE ------------------------------------------------------------------
const fadeEl = document.getElementById('fade');
function fadeOut(ms, cb){
  fadeEl.style.transition = `opacity ${ms/1000}s`;
  fadeEl.style.opacity = 1;
  setTimeout(cb, ms+50);
}
function fadeIn(ms){
  fadeEl.style.transition = `opacity ${ms/1000}s`;
  fadeEl.style.opacity = 0;
}

// ---- TYPEWRITER NOTEBOOK ---------------------------------------------------
const nbBody = document.getElementById('nbbody');
const nbSec  = document.getElementById('nbsec');
let typeQueue = [];
let typing = false;
function nbSection(s){ nbSec.textContent = s; }
function nbClear(){ nbBody.textContent = ''; }
function nbWrite(text, speed){
  return new Promise(res=>{
    typeQueue.push({text, speed:speed||32, done:res});
    if(!typing) processType();
  });
}
function processType(){
  if(!typeQueue.length){ typing = false; return; }
  typing = true;
  const job = typeQueue.shift();
  let i = 0;
  const interval = 1000/job.speed;
  const t = setInterval(()=>{
    if(i < job.text.length){
      const ch = job.text[i++];
      nbBody.textContent += ch;
      if(nbBody.textContent.length > 1100){
        nbBody.textContent = nbBody.textContent.slice(-1000);
      }
    } else {
      clearInterval(t);
      job.done();
      processType();
    }
  }, interval);
}

// ---- ANIMATION LOOP --------------------------------------------------------
let tFrame = 0;
function animate(){
  requestAnimationFrame(animate);
  tFrame += 0.016;

  camAngle += camSpeed * 0.01;
  const cx = camAnchor.x + Math.cos(camAngle)*camRadius;
  const cz = camAnchor.z + Math.sin(camAngle)*camRadius;
  camera.position.set(cx, camHeight + Math.sin(tFrame*0.3)*0.05, cz);
  camera.lookAt(camAnchor.x, camTargetY, camAnchor.z);

  if(smokePoints){
    const pos = smokePoints.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      pos.array[i*3+1] += 0.004;
      pos.array[i*3+0] += Math.sin(tFrame*0.5 + i)*0.001;
      if(pos.array[i*3+1] > 6) pos.array[i*3+1] = 0.5;
    }
    pos.needsUpdate = true;
  }
  const flame = sceneRoot.userData.flame;
  if(flame){
    const fp = flame.geometry.attributes.position;
    for(let i=0;i<fp.count;i++){
      fp.array[i*3+1] += 0.02 + Math.random()*0.02;
      if(fp.array[i*3+1] > 1.4) fp.array[i*3+1] = 0.4 + Math.random()*0.2;
    }
    fp.needsUpdate = true;
    flame.material.opacity = 0.7 + Math.sin(tFrame*7)*0.2;
  }
  const neonG = sceneRoot.userData.neon;
  if(neonG){
    neonG.children.forEach(c=>{
      c.material.color.setRGB(1.0, 0.13 + Math.random()*0.06, 0.26 + (Math.random()<0.05?-0.2:0));
    });
  }
  const rain = sceneRoot.userData.rain;
  if(rain){
    const rp = rain.geometry.attributes.position;
    for(let i=0;i<rp.count;i++){
      rp.array[i*3+1] -= 0.18;
      if(rp.array[i*3+1] < 0){ rp.array[i*3+1] = 8 + Math.random()*2; }
    }
    rp.needsUpdate = true;
  }
  actors.children.forEach((a,i)=>{
    const br = a.userData.baseRot || 0;
    a.rotation.y = br + Math.sin(tFrame*1.2 + i)*0.04;
    if(a.userData.head) a.userData.head.rotation.y = Math.sin(tFrame*0.9 + i)*0.18;
  });

  renderer.render(scene, camera);
}
animate();

// ---- SCRIPT ENGINE ---------------------------------------------------------
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function placeActor(model, pos, rot){
  model.position.copy(pos);
  model.rotation.y = rot||0;
  model.userData.baseRot = rot||0;
  actors.add(model);
  return model;
}

async function transitionTo(locId, anchor, radius, angle, height, ty, speed){
  await new Promise(r=>fadeOut(900, r));
  loadScene(locId);
  setCam(anchor||new T.Vector3(0,1,0), radius||6, angle||0, height||2.4, ty||1.0, speed||0.06);
  await wait(120);
  fadeIn(900);
  await wait(950);
}

// ---- CASE RUNNER -----------------------------------------------------------
async function runCase(){
  hideClosed(); hideDialog(); nbClear();
  document.getElementById('flash').style.opacity = 0;

  rand = makeRand();
  let C = genCase();
  let guard = 0;
  while(!C.solvable && guard < 20){ C = genCase(); guard++; }
  console.log('CASE:', C.victim, '/ killer:', C.killer.name, '/ motive:', C.motive, '/ weapon:', C.weapon.name, '/ setting:', C.setting.name);

  document.getElementById('titleBig').textContent = 'THE '+C.victim.split(' ')[1].toUpperCase()+' HOMICIDE';
  document.getElementById('titleSm').textContent = 'A 1940s Noir — Detective '+C.detective.name;

  renderSuspects(C, {}, null);
  renderEvidence([]);

  // ===== ACT 1 =====
  setAct('ACT I — DISCOVERY');
  await transitionTo(C.setting.id, new T.Vector3(0,1,0), 5.5, 0, 2.0, 1.0, 0.08);
  nbSection('SCENE');
  await nbWrite(`The body of ${C.victim} lies in ${C.setting.desc}.\n`, 38);
  await nbWrite(`Detective ${C.detective.name} climbs the stairs at 2:47 a.m.\n`, 36);

  const detModel = makeHumanoid({hat:C.detective.hat, coat:C.detective.coat});
  placeActor(detModel, new T.Vector3(-1.2,0,1.5), 0.4);

  await wait(1000);
  nbSection('EVIDENCE');
  await nbWrite(`Found: ${C.evidence[0].text}.\n`, 38);
  renderEvidence([C.evidence[0]]);
  await wait(700);
  await nbWrite(`First witness: ${C.suspects[0].name}, ${C.suspects[0].role}.\n`, 36);

  const witness = makeHumanoid(C.suspects[0]);
  placeActor(witness, new T.Vector3(1.4,0,1.0), -0.5);
  showDialog(C.suspects[0].name.toUpperCase(),
    pick(["I heard nothing. I saw less.",
          "Don't look at me — I was on the other side of town.",
          "Poor "+C.victim+". They didn't deserve this.",
          "I'd been told to stay away from this place tonight."]));
  await wait(2800);
  hideDialog();

  // ===== ACT 2 =====
  setAct('ACT II — INVESTIGATION');
  const otherLocs = LOCATIONS.filter(l=>l.id!==C.setting.id);
  const tour = pickN(otherLocs, 4);
  const evidShown = [C.evidence[0]];

  for(let i=0;i<tour.length;i++){
    const loc = tour[i];
    const interview = C.suspects[(i+1) % C.suspects.length];
    await transitionTo(loc.id, new T.Vector3(0,1,0), 5.8, i*0.6, 2.2, 1.1, 0.05);
    nbSection('SUSPECTS');
    await nbWrite(`\n— ${loc.name} —\n`, 80);
    await nbWrite(`Interview: ${interview.name} (${interview.role}).\n`, 36);

    const det = makeHumanoid({hat:C.detective.hat, coat:C.detective.coat});
    placeActor(det, new T.Vector3(-1.2,0,1.6), 0.3);
    const sus = makeHumanoid(interview);
    placeActor(sus, new T.Vector3(1.2,0,1.6), -0.3);

    const lines = [
      ["DETECTIVE","Where were you the night of the killing?"],
      [interview.name.toUpperCase(),
        interview===C.killer
          ? pick([`At a poker game. Or maybe... I don't recall.`,
                  `Home alone. Cup of coffee. Who's asking?`,
                  `Out walking. Nowhere in particular.`])
          : pick([`The Mariposa, ask Roxie.`, `At work. Plenty of witnesses.`,
                  `The Beresford bar. They know me there.`,
                  `On a streetcar headed uptown.`])],
      ["DETECTIVE", `And ${C.victim}? When did you last see them?`],
      [interview.name.toUpperCase(),
        interview===C.killer
          ? `That's... a long time ago. We weren't close.`
          : `Tuesday, I think. They owed me a drink.`]
    ];
    for(const pair of lines){
      const who = pair[0], line = pair[1];
      showDialog(who,line);
      await nbWrite(`${who}: ${line}\n`, 60);
      await wait(1700);
    }
    hideDialog();

    if(i+1 < C.evidence.length){
      const e = C.evidence[i+1];
      evidShown.push(e);
      renderEvidence(evidShown);
      nbSection('EVIDENCE');
      await nbWrite(`+ ${e.text}\n`, 38);
    }
    await wait(600);
  }

  // ===== ACT 3 — TWIST =====
  setAct('ACT III — THE STAKES RISE');
  const beat = pick(['mob','witness','crack','herring']);
  if(beat==='mob'){
    flashScreen();
    showStakes('THE STAKES JUST GOT HIGHER');
    nbSection('DEDUCTIONS');
    await nbWrite(`\nA mob threat: phone rings — silence — click. Carlucci's people are watching.\n`, 36);
  } else if(beat==='witness'){
    showStakes('A SURPRISE WITNESS APPEARS');
    nbSection('DEDUCTIONS');
    await nbWrite(`\nA surprise witness arrives at the precinct: ${pick(C.suspects.filter(s=>s!==C.killer)).name} has more to say.\n`, 36);
  } else if(beat==='crack'){
    showStakes('THE ALIBI CRACKS');
    nbSection('DEDUCTIONS');
    await nbWrite(`\n${C.killer.name}'s alibi cracks under pressure — the times don't add up.\n`, 36);
  } else {
    showStakes('A RED HERRING SURFACES');
    nbSection('DEDUCTIONS');
    await nbWrite(`\nA misleading clue surfaces — but the paper is from the wrong year.\n`, 36);
  }
  await wait(2400);

  // ===== ACT 4 — REVEAL =====
  setAct('ACT IV — THE REVEAL');
  await transitionTo('mansion', new T.Vector3(0,1,0), 7.5, 0, 2.6, 1.4, 0.10);
  nbSection('DEDUCTIONS');
  await nbWrite(`\n${C.detective.name} gathers the suspects in the mansion library.\n`, 36);

  const det2 = makeHumanoid({hat:C.detective.hat, coat:C.detective.coat});
  placeActor(det2, new T.Vector3(0,0,2.4), Math.PI);
  C.suspects.forEach((s,i)=>{
    const angle = -Math.PI/2 + (i/(C.suspects.length-1))*Math.PI;
    const r = 2.6;
    const sm = makeHumanoid(s);
    placeActor(sm, new T.Vector3(Math.cos(angle)*r, 0, -Math.sin(angle)*r - 0.2), angle - Math.PI/2);
  });

  await wait(1300);

  const dismissed = {};
  for(const s of C.suspects){
    if(s===C.killer) continue;
    dismissed[s.name] = true;
    renderSuspects(C, dismissed, null);
    showDialog(C.detective.name.toUpperCase(),
      pick([`Not you, ${s.name.split(' ')[0]}.`,
            `${s.name} — you have an alibi that holds.`,
            `${s.name}, your story checks out.`]));
    await nbWrite(`Cleared: ${s.name}.\n`, 50);
    await wait(1300);
  }
  hideDialog();

  await wait(500);
  showDialog(C.detective.name.toUpperCase(),
    `${C.killer.name} — it was you. Motive: ${C.motive}. Weapon: ${C.weapon.name}.`);
  await nbWrite(`\nNAMED: ${C.killer.name}.\nMotive: ${C.motive}. Weapon: ${C.weapon.name}.\n`, 50);
  renderSuspects(C, dismissed, C.killer.name);
  await wait(2200);

  // cuffs
  showDialog('CUFFS', `*click* — bracelets on ${C.killer.name}.`);
  flashScreen();
  await wait(1600);
  hideDialog();

  const lastName = C.victim.split(' ')[1].toUpperCase();
  showClosed(`CASE CLOSED<br><span style="font-size:22px;letter-spacing:0.2em">${lastName} HOMICIDE — DETECTIVE ${C.detective.name.toUpperCase()}</span>`);
  await wait(10000);
  hideClosed();
}

// ---- AUTO-RESTART LOOP ----------------------------------------------------
async function loop(){
  while(true){
    try { await runCase(); } catch(e){ console.error(e); }
    await new Promise(r=>fadeOut(1500, r));
    await wait(500);
  }
}

// kick off
loadScene('crime');
setCam(new T.Vector3(0,1,0), 6, 0, 2.4, 1.0, 0.06);
fadeIn(1400);
setTimeout(loop, 1500);

})();
</script>
