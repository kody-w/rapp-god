<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Evolving Ecosystem — Learn With Kody</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0e14;
    color: #d4dae0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    display: grid;
    grid-template-columns: 820px 320px;
    grid-template-rows: 1fr 180px;
    gap: 8px;
    padding: 10px;
    height: 100vh;
    width: 100vw;
  }
  #stage {
    position: relative;
    background: #06090d;
    border: 1px solid #1c2330;
    border-radius: 6px;
    overflow: hidden;
    grid-row: 1;
    grid-column: 1;
  }
  #world { display: block; }
  #side {
    grid-row: 1 / span 2;
    grid-column: 2;
    background: #0d121a;
    border: 1px solid #1c2330;
    border-radius: 6px;
    padding: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #graph {
    grid-row: 2;
    grid-column: 1;
    background: #0d121a;
    border: 1px solid #1c2330;
    border-radius: 6px;
    display: block;
  }
  h1 {
    font-size: 14px;
    color: #6cd5b3;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid #1c2330;
    padding-bottom: 6px;
  }
  h2 {
    font-size: 11px;
    color: #8aa0b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 11px;
  }
  .controls label {
    display: flex;
    justify-content: space-between;
    color: #8aa0b8;
    font-size: 10px;
    align-items: center;
  }
  .controls input[type=range] {
    width: 100%;
    accent-color: #6cd5b3;
  }
  button {
    background: #1c2330;
    color: #d4dae0;
    border: 1px solid #2a3548;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  button:hover { background: #2a3548; color: #6cd5b3; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 2px 0;
  }
  .stat-row span:first-child { color: #8aa0b8; }
  .stat-row span:last-child { color: #d4dae0; font-weight: bold; }
  .pheno {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 4px 0;
  }
  .pheno-row {
    display: grid;
    grid-template-columns: 70px 1fr 30px;
    align-items: center;
    font-size: 9px;
    gap: 4px;
  }
  .pheno-row .label { color: #8aa0b8; text-transform: uppercase; }
  .pheno-row .bar-bg {
    height: 6px;
    background: #1c2330;
    border-radius: 2px;
    overflow: hidden;
  }
  .pheno-row .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .pheno-row .val { font-size: 9px; color: #d4dae0; text-align: right; }
  .species-block {
    border-top: 1px solid #1c2330;
    padding-top: 6px;
  }
  #overlay-info {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 10px;
    color: #8aa0b8;
    background: rgba(6,9,13,0.7);
    padding: 4px 8px;
    border-radius: 3px;
    pointer-events: none;
    line-height: 1.4;
  }
  #legend {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 10px;
    color: #8aa0b8;
    background: rgba(6,9,13,0.7);
    padding: 6px 8px;
    border-radius: 3px;
    pointer-events: none;
    line-height: 1.5;
  }
  .swatch {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 4px;
  }
  .btn-row { display: flex; gap: 4px; }
  .btn-row button { flex: 1; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="world" width="800" height="600"></canvas>
    <div id="overlay-info"></div>
    <div id="legend">
      <div><span class="swatch" style="background:#3eaa5e"></span>Plant</div>
      <div><span class="swatch" style="background:#88aaff"></span>Herbivore</div>
      <div><span class="swatch" style="background:#ff7766;border-radius:0;transform:rotate(45deg)"></span>Carnivore</div>
    </div>
  </div>

  <div id="side">
    <h1>Evolving Ecosystem</h1>

    <div class="controls">
      <label>Sim Speed <span id="speedVal">4x</span></label>
      <input type="range" id="speed" min="1" max="20" value="4">
      <div class="btn-row">
        <button id="resetBtn">Reset</button>
        <button id="injectBtn">Inject Diversity</button>
      </div>
      <div class="btn-row">
        <button id="pauseBtn">Pause</button>
        <button id="sunBtn">Toggle Sun</button>
      </div>
    </div>

    <div class="stat-row"><span>Generation</span><span id="gen">0</span></div>
    <div class="stat-row"><span>Tick</span><span id="tick">0</span></div>
    <div class="stat-row"><span>Ticks/sec</span><span id="tps">0</span></div>
    <div class="stat-row"><span>Plants</span><span id="cP" style="color:#3eaa5e">0</span></div>
    <div class="stat-row"><span>Herbivores</span><span id="cH" style="color:#88aaff">0</span></div>
    <div class="stat-row"><span>Carnivores</span><span id="cC" style="color:#ff7766">0</span></div>

    <h2>Dominant Phenotypes</h2>
    <div id="phenoPanels"></div>
  </div>

  <canvas id="graph" width="820" height="180"></canvas>
</div>

<script>
'use strict';

// ====== CONFIG ======
const W = 800, H = 600;
const CELL = 32;                           // spatial hash cell size
const COLS = Math.ceil(W / CELL);
const ROWS = Math.ceil(H / CELL);
const SUN_RES = 32;                        // sunlight grid resolution
const SUN_COLS = Math.ceil(W / SUN_RES);
const SUN_ROWS = Math.ceil(H / SUN_RES);

const TRAIT_NAMES = [
  'size','speed','sense','metab','reprod',
  'aggr','red','green','blue','effic','life','mut'
];
// indices for clarity
const T_SIZE=0, T_SPEED=1, T_SENSE=2, T_METAB=3, T_REPROD=4,
      T_AGGR=5, T_R=6, T_G=7, T_B=8, T_EFFIC=9, T_LIFE=10, T_MUT=11;
const NTR = 12;

// species ids
const SP_PLANT = 0, SP_HERB = 1, SP_CARN = 2;

// initial counts
const INIT_PLANTS = 280;
const INIT_HERBS  = 90;
const INIT_CARNS  = 25;

// hard caps to keep perf sane
const MAX_PLANTS = 1500;
const MAX_HERBS  = 800;
const MAX_CARNS  = 400;

// ====== STATE ======
const world = document.getElementById('world');
const ctx = world.getContext('2d');
const graph = document.getElementById('graph');
const gctx = graph.getContext('2d');

let plants = [];
let herbs  = [];
let carns  = [];
let nextId = 1;
let tickCount = 0;
let generation = 0;
let lastReproTick = 0;
let popHistory = []; // [{p,h,c}]
const HIST_MAX = 600;
let paused = false;
let sunActive = true;
let sunPhase = 0;
let simSpeed = 4;
let lastFpsTime = performance.now();
let fpsTickCount = 0;
let displayedTps = 0;

// sunlight grid (low-frequency variation)
const sunlight = new Float32Array(SUN_COLS * SUN_ROWS);

// ====== UTIL ======
function rand(){ return Math.random(); }
function randn() {
  // Box-Muller
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function clamp(x,lo,hi){ return x<lo?lo:(x>hi?hi:x); }
function clamp01(x){ return x<0?0:(x>1?1:x); }

// toroidal helpers
function tdx(a,b){
  let d = a - b;
  if (d > W*0.5) d -= W;
  else if (d < -W*0.5) d += W;
  return d;
}
function tdy(a,b){
  let d = a - b;
  if (d > H*0.5) d -= H;
  else if (d < -H*0.5) d += H;
  return d;
}
function tdist2(x1,y1,x2,y2){
  const dx = tdx(x1,x2), dy = tdy(y1,y2);
  return dx*dx + dy*dy;
}
function wrap(x, lim){ x %= lim; if (x<0) x+=lim; return x; }

// simple value-noise based sunlight (low-freq)
function buildSunlight(seed){
  const s = seed || Math.random()*1000;
  // build a tiny lattice and lerp
  const lw = 6, lh = 5;
  const lattice = new Float32Array(lw*lh);
  for (let i=0;i<lattice.length;i++){
    lattice[i] = 0.55 + Math.sin(i*1.7+s)*0.25 + Math.random()*0.15;
  }
  for (let y=0;y<SUN_ROWS;y++){
    for (let x=0;x<SUN_COLS;x++){
      const fx = (x/SUN_COLS)*(lw-1);
      const fy = (y/SUN_ROWS)*(lh-1);
      const ix = Math.floor(fx), iy = Math.floor(fy);
      const tx = fx-ix, ty = fy-iy;
      const a = lattice[iy*lw + ix];
      const b = lattice[iy*lw + Math.min(ix+1, lw-1)];
      const c = lattice[Math.min(iy+1,lh-1)*lw + ix];
      const d = lattice[Math.min(iy+1,lh-1)*lw + Math.min(ix+1, lw-1)];
      const ux = tx*tx*(3-2*tx);
      const uy = ty*ty*(3-2*ty);
      const v = (a*(1-ux)+b*ux)*(1-uy) + (c*(1-ux)+d*ux)*uy;
      sunlight[y*SUN_COLS + x] = clamp(v, 0.25, 1.1);
    }
  }
}
function sunAt(x,y){
  const sx = Math.floor(x / SUN_RES);
  const sy = Math.floor(y / SUN_RES);
  return sunlight[sy*SUN_COLS + sx] || 0.5;
}

// ====== GENOME ======
function randGenome(species){
  const g = new Float32Array(NTR);
  for (let i=0;i<NTR;i++) g[i] = Math.random();

  // Bias initial pools so things actually function
  if (species === SP_PLANT){
    g[T_SIZE]   = 0.15 + Math.random()*0.25;
    g[T_SPEED]  = 0;
    g[T_SENSE]  = 0;
    g[T_METAB]  = 0.05 + Math.random()*0.1;
    g[T_REPROD] = 0.4 + Math.random()*0.3;
    g[T_AGGR]   = 0;
    g[T_R]      = 0.1 + Math.random()*0.2;
    g[T_G]      = 0.55 + Math.random()*0.3;
    g[T_B]      = 0.1 + Math.random()*0.2;
    g[T_EFFIC]  = 0.5 + Math.random()*0.4;
    g[T_LIFE]   = 0.4 + Math.random()*0.4;
    g[T_MUT]    = 0.05 + Math.random()*0.1;
  } else if (species === SP_HERB){
    g[T_SIZE]   = 0.25 + Math.random()*0.35;
    g[T_SPEED]  = 0.35 + Math.random()*0.4;
    g[T_SENSE]  = 0.35 + Math.random()*0.4;
    g[T_METAB]  = 0.2 + Math.random()*0.2;
    g[T_REPROD] = 0.45 + Math.random()*0.3;
    g[T_AGGR]   = 0.1 + Math.random()*0.3;
    g[T_R]      = 0.3 + Math.random()*0.3;
    g[T_G]      = 0.4 + Math.random()*0.3;
    g[T_B]      = 0.55 + Math.random()*0.3;
    g[T_EFFIC]  = 0.5 + Math.random()*0.3;
    g[T_LIFE]   = 0.4 + Math.random()*0.4;
    g[T_MUT]    = 0.05 + Math.random()*0.12;
  } else { // SP_CARN
    g[T_SIZE]   = 0.4 + Math.random()*0.4;
    g[T_SPEED]  = 0.5 + Math.random()*0.4;
    g[T_SENSE]  = 0.45 + Math.random()*0.4;
    g[T_METAB]  = 0.25 + Math.random()*0.25;
    g[T_REPROD] = 0.55 + Math.random()*0.3;
    g[T_AGGR]   = 0.55 + Math.random()*0.4;
    g[T_R]      = 0.7 + Math.random()*0.3;
    g[T_G]      = 0.2 + Math.random()*0.25;
    g[T_B]      = 0.15 + Math.random()*0.2;
    g[T_EFFIC]  = 0.5 + Math.random()*0.3;
    g[T_LIFE]   = 0.45 + Math.random()*0.45;
    g[T_MUT]    = 0.05 + Math.random()*0.12;
  }
  return g;
}

function mutateGenome(g, species){
  const rate = 0.02 + g[T_MUT] * 0.18; // baseline + evolved
  const out = new Float32Array(NTR);
  for (let i=0;i<NTR;i++){
    let v = g[i] + randn() * rate;
    out[i] = clamp01(v);
  }
  // species-specific locked traits
  if (species === SP_PLANT){
    out[T_SPEED] = 0;
    out[T_SENSE] = 0;
    out[T_AGGR]  = 0;
  }
  return out;
}

function crossover(g1, g2, species){
  const child = new Float32Array(NTR);
  for (let i=0;i<NTR;i++){
    child[i] = Math.random() < 0.5 ? g1[i] : g2[i];
  }
  return mutateGenome(child, species);
}

// ====== ENTITIES ======
function makePlant(x, y, genome){
  return {
    id: nextId++,
    sp: SP_PLANT,
    x, y,
    vx: 0, vy: 0,
    g: genome || randGenome(SP_PLANT),
    energy: 8 + Math.random()*6,
    age: 0,
    gen: 0
  };
}
function makeHerb(x, y, genome){
  const g = genome || randGenome(SP_HERB);
  return {
    id: nextId++,
    sp: SP_HERB,
    x, y,
    vx: (Math.random()*2-1),
    vy: (Math.random()*2-1),
    g,
    energy: 25 + Math.random()*20,
    age: 0,
    gen: 0,
    target: null
  };
}
function makeCarn(x, y, genome){
  const g = genome || randGenome(SP_CARN);
  return {
    id: nextId++,
    sp: SP_CARN,
    x, y,
    vx: (Math.random()*2-1),
    vy: (Math.random()*2-1),
    g,
    energy: 60 + Math.random()*30,
    age: 0,
    gen: 0,
    target: null
  };
}

function maxEnergy(e){
  if (e.sp === SP_PLANT) return 25 + e.g[T_SIZE] * 50;
  if (e.sp === SP_HERB)  return 60 + e.g[T_SIZE] * 90;
  return 100 + e.g[T_SIZE] * 200;
}
function radiusOf(e){
  if (e.sp === SP_PLANT) return 1.5 + e.g[T_SIZE] * 2.5;
  if (e.sp === SP_HERB)  return 2.5 + e.g[T_SIZE] * 4;
  return 3.5 + e.g[T_SIZE] * 5;
}
function senseRadius(e){
  return 20 + e.g[T_SENSE] * 130;
}
function speedOf(e){
  return 0.3 + e.g[T_SPEED] * 2.6;
}
function lifespanOf(e){
  if (e.sp === SP_PLANT) return 600 + e.g[T_LIFE]*2000;
  if (e.sp === SP_HERB)  return 500 + e.g[T_LIFE]*1500;
  return 700 + e.g[T_LIFE]*2000;
}
function reproEnergy(e){
  return maxEnergy(e) * (0.45 + e.g[T_REPROD]*0.35);
}
function metabolismOf(e){
  // base + scaled by size & speed
  if (e.sp === SP_PLANT) return 0.02 + e.g[T_METAB]*0.06;
  return 0.05 + e.g[T_METAB]*0.15 + e.g[T_SIZE]*0.05;
}

// ====== SPATIAL HASH ======
// Per-species hash. Reset each tick (cheap).
const grids = {
  [SP_PLANT]: new Array(COLS*ROWS),
  [SP_HERB]:  new Array(COLS*ROWS),
  [SP_CARN]:  new Array(COLS*ROWS)
};
function clearGrids(){
  for (let i=0;i<COLS*ROWS;i++){
    grids[SP_PLANT][i] = null;
    grids[SP_HERB][i]  = null;
    grids[SP_CARN][i]  = null;
  }
}
function gridKey(x,y){
  const cx = Math.floor(x/CELL);
  const cy = Math.floor(y/CELL);
  return ((cy%ROWS+ROWS)%ROWS)*COLS + ((cx%COLS+COLS)%COLS);
}
function insertEntity(e){
  const k = gridKey(e.x, e.y);
  const list = grids[e.sp];
  if (!list[k]) list[k] = [];
  list[k].push(e);
}
function neighborsInRange(sp, x, y, r, out){
  out.length = 0;
  const cellRange = Math.ceil(r/CELL);
  const cx = Math.floor(x/CELL);
  const cy = Math.floor(y/CELL);
  const r2 = r*r;
  const list = grids[sp];
  for (let dy=-cellRange; dy<=cellRange; dy++){
    const ry = ((cy+dy)%ROWS+ROWS)%ROWS;
    for (let dx=-cellRange; dx<=cellRange; dx++){
      const rx = ((cx+dx)%COLS+COLS)%COLS;
      const cell = list[ry*COLS + rx];
      if (!cell) continue;
      for (let i=0;i<cell.length;i++){
        const e = cell[i];
        if (tdist2(e.x, e.y, x, y) <= r2) out.push(e);
      }
    }
  }
  return out;
}

// ====== INIT ======
function init(){
  plants = []; herbs = []; carns = [];
  nextId = 1; tickCount = 0; generation = 0;
  popHistory = [];
  buildSunlight();
  for (let i=0;i<INIT_PLANTS;i++) plants.push(makePlant(Math.random()*W, Math.random()*H));
  for (let i=0;i<INIT_HERBS;i++)  herbs.push(makeHerb(Math.random()*W, Math.random()*H));
  for (let i=0;i<INIT_CARNS;i++)  carns.push(makeCarn(Math.random()*W, Math.random()*H));
}

// ====== SIM TICK ======
const tmpNeigh = [];

function tickPlants(){
  // grow from sunlight, divide when full
  const newOnes = [];
  for (let i=0;i<plants.length;i++){
    const p = plants[i];
    p.age++;
    const sun = sunAt(p.x,p.y);
    p.energy += sun * (0.18 + p.g[T_EFFIC]*0.45);
    p.energy -= metabolismOf(p);
    const cap = maxEnergy(p);
    if (p.energy > cap) p.energy = cap;

    if (p.energy <= 0 || p.age > lifespanOf(p)) { p.dead = true; continue; }

    // divide
    const thr = reproEnergy(p);
    if (p.energy > thr && plants.length + newOnes.length < MAX_PLANTS) {
      // density check via grid
      neighborsInRange(SP_PLANT, p.x, p.y, 8, tmpNeigh);
      if (tmpNeigh.length < 4) {
        const ang = Math.random()*Math.PI*2;
        const r = 6 + Math.random()*10;
        const nx = wrap(p.x + Math.cos(ang)*r, W);
        const ny = wrap(p.y + Math.sin(ang)*r, H);
        const child = makePlant(nx, ny, mutateGenome(p.g, SP_PLANT));
        child.energy = p.energy * 0.45;
        child.gen = p.gen + 1;
        if (child.gen > generation) generation = child.gen;
        p.energy *= 0.5;
        newOnes.push(child);
      }
    }
  }
  if (newOnes.length) plants.push(...newOnes);
  plants = plants.filter(p => !p.dead);
}

function tickHerbs(){
  const newOnes = [];
  for (let i=0;i<herbs.length;i++){
    const h = herbs[i];
    h.age++;
    h.energy -= metabolismOf(h) * (0.5 + Math.hypot(h.vx,h.vy)*0.4);
    if (h.energy <= 0 || h.age > lifespanOf(h)) { h.dead = true; continue; }

    const sense = senseRadius(h);
    // flee predators
    let fleeX = 0, fleeY = 0, fleeing = false;
    neighborsInRange(SP_CARN, h.x, h.y, sense, tmpNeigh);
    for (let j=0;j<tmpNeigh.length;j++){
      const c = tmpNeigh[j];
      const dx = tdx(h.x, c.x), dy = tdy(h.y, c.y);
      const d2 = dx*dx+dy*dy;
      if (d2 < 1) continue;
      const w = 1 / Math.sqrt(d2);
      fleeX += dx*w*w*100;
      fleeY += dy*w*w*100;
      fleeing = true;
    }

    // seek nearest plant
    let bestPlant = null, bestD2 = Infinity;
    if (!fleeing) {
      neighborsInRange(SP_PLANT, h.x, h.y, sense, tmpNeigh);
      for (let j=0;j<tmpNeigh.length;j++){
        const p = tmpNeigh[j];
        const d2 = tdist2(h.x, h.y, p.x, p.y);
        if (d2 < bestD2) { bestD2 = d2; bestPlant = p; }
      }
    }

    const sp = speedOf(h);
    let ax = 0, ay = 0;
    if (fleeing){
      const m = Math.hypot(fleeX,fleeY) || 1;
      ax = fleeX/m * sp;
      ay = fleeY/m * sp;
    } else if (bestPlant){
      const dx = -tdx(h.x, bestPlant.x);
      const dy = -tdy(h.y, bestPlant.y);
      const m = Math.hypot(dx,dy) || 1;
      ax = dx/m * sp;
      ay = dy/m * sp;
    } else {
      // wander
      h.vx += (Math.random()-0.5)*0.3;
      h.vy += (Math.random()-0.5)*0.3;
    }

    h.vx = h.vx*0.7 + ax*0.3;
    h.vy = h.vy*0.7 + ay*0.3;
    const vmag = Math.hypot(h.vx, h.vy);
    if (vmag > sp) { h.vx = h.vx/vmag*sp; h.vy = h.vy/vmag*sp; }

    h.x = wrap(h.x + h.vx, W);
    h.y = wrap(h.y + h.vy, H);

    // eat plant on contact
    const eatR = radiusOf(h) + 4;
    neighborsInRange(SP_PLANT, h.x, h.y, eatR, tmpNeigh);
    for (let j=0;j<tmpNeigh.length;j++){
      const p = tmpNeigh[j];
      if (p.dead) continue;
      const d2 = tdist2(h.x, h.y, p.x, p.y);
      if (d2 < (radiusOf(h)+radiusOf(p))*(radiusOf(h)+radiusOf(p))) {
        h.energy += p.energy * (0.4 + h.g[T_EFFIC]*0.5);
        const cap = maxEnergy(h);
        if (h.energy > cap) h.energy = cap;
        p.dead = true;
        break;
      }
    }

    // reproduce
    const thr = reproEnergy(h);
    if (h.energy > thr && herbs.length + newOnes.length < MAX_HERBS) {
      // try sexual: nearest mate within sense
      let mate = null, mateD = Infinity;
      neighborsInRange(SP_HERB, h.x, h.y, Math.min(sense, 60), tmpNeigh);
      for (let j=0;j<tmpNeigh.length;j++){
        const o = tmpNeigh[j];
        if (o === h || o.dead) continue;
        if (o.energy < reproEnergy(o)*0.5) continue;
        const d2 = tdist2(h.x,h.y,o.x,o.y);
        if (d2 < mateD) { mateD = d2; mate = o; }
      }
      const childGenome = mate ? crossover(h.g, mate.g, SP_HERB) : mutateGenome(h.g, SP_HERB);
      const ang = Math.random()*Math.PI*2;
      const child = makeHerb(
        wrap(h.x + Math.cos(ang)*6, W),
        wrap(h.y + Math.sin(ang)*6, H),
        childGenome
      );
      child.energy = h.energy * 0.4;
      child.gen = h.gen + 1;
      if (child.gen > generation) generation = child.gen;
      h.energy *= 0.5;
      newOnes.push(child);
    }
  }
  if (newOnes.length) herbs.push(...newOnes);
  herbs = herbs.filter(h => !h.dead);
}

function tickCarns(){
  const newOnes = [];
  for (let i=0;i<carns.length;i++){
    const c = carns[i];
    c.age++;
    c.energy -= metabolismOf(c) * (0.5 + Math.hypot(c.vx,c.vy)*0.4);
    if (c.energy <= 0 || c.age > lifespanOf(c)) { c.dead = true; continue; }

    const sense = senseRadius(c);
    let bestH = null, bestD2 = Infinity;
    neighborsInRange(SP_HERB, c.x, c.y, sense, tmpNeigh);
    for (let j=0;j<tmpNeigh.length;j++){
      const h = tmpNeigh[j];
      const d2 = tdist2(c.x, c.y, h.x, h.y);
      if (d2 < bestD2) { bestD2 = d2; bestH = h; }
    }

    const sp = speedOf(c);
    let ax = 0, ay = 0;
    if (bestH && c.g[T_AGGR] > 0.15){
      const dx = -tdx(c.x, bestH.x);
      const dy = -tdy(c.y, bestH.y);
      const m = Math.hypot(dx,dy) || 1;
      ax = dx/m * sp;
      ay = dy/m * sp;
    } else {
      c.vx += (Math.random()-0.5)*0.4;
      c.vy += (Math.random()-0.5)*0.4;
    }
    c.vx = c.vx*0.75 + ax*0.25;
    c.vy = c.vy*0.75 + ay*0.25;
    const vmag = Math.hypot(c.vx, c.vy);
    if (vmag > sp) { c.vx = c.vx/vmag*sp; c.vy = c.vy/vmag*sp; }

    c.x = wrap(c.x + c.vx, W);
    c.y = wrap(c.y + c.vy, H);

    // eat herb on contact
    const eatR = radiusOf(c) + 4;
    neighborsInRange(SP_HERB, c.x, c.y, eatR, tmpNeigh);
    for (let j=0;j<tmpNeigh.length;j++){
      const h = tmpNeigh[j];
      if (h.dead) continue;
      const d2 = tdist2(c.x, c.y, h.x, h.y);
      if (d2 < (radiusOf(c)+radiusOf(h))*(radiusOf(c)+radiusOf(h))) {
        c.energy += h.energy * (0.5 + c.g[T_EFFIC]*0.5);
        const cap = maxEnergy(c);
        if (c.energy > cap) c.energy = cap;
        h.dead = true;
        break;
      }
    }

    // reproduce
    const thr = reproEnergy(c);
    if (c.energy > thr && carns.length + newOnes.length < MAX_CARNS) {
      let mate = null, mateD = Infinity;
      neighborsInRange(SP_CARN, c.x, c.y, Math.min(sense, 80), tmpNeigh);
      for (let j=0;j<tmpNeigh.length;j++){
        const o = tmpNeigh[j];
        if (o === c || o.dead) continue;
        if (o.energy < reproEnergy(o)*0.5) continue;
        const d2 = tdist2(c.x,c.y,o.x,o.y);
        if (d2 < mateD) { mateD = d2; mate = o; }
      }
      const childGenome = mate ? crossover(c.g, mate.g, SP_CARN) : mutateGenome(c.g, SP_CARN);
      const ang = Math.random()*Math.PI*2;
      const child = makeCarn(
        wrap(c.x + Math.cos(ang)*6, W),
        wrap(c.y + Math.sin(ang)*6, H),
        childGenome
      );
      child.energy = c.energy * 0.4;
      child.gen = c.gen + 1;
      if (child.gen > generation) generation = child.gen;
      c.energy *= 0.5;
      newOnes.push(child);
    }
  }
  if (newOnes.length) carns.push(...newOnes);
  carns = carns.filter(c => !c.dead);
}

function step(){
  // build spatial hash
  clearGrids();
  for (let i=0;i<plants.length;i++) insertEntity(plants[i]);
  for (let i=0;i<herbs.length;i++)  insertEntity(herbs[i]);
  for (let i=0;i<carns.length;i++)  insertEntity(carns[i]);

  if (sunActive) {
    sunPhase += 0.0008;
  }

  tickPlants();
  tickHerbs();
  tickCarns();

  // emergency reseed if a species dies out completely (extinction events allowed but optional rescue)
  // we don't auto-rescue - lets the user use Inject Diversity

  tickCount++;
}

// ====== AVERAGE GENOME (for dominant phenotype panel) ======
function averageGenome(arr){
  if (!arr.length) return null;
  const avg = new Float32Array(NTR);
  for (let i=0;i<arr.length;i++){
    const g = arr[i].g;
    for (let j=0;j<NTR;j++) avg[j] += g[j];
  }
  for (let j=0;j<NTR;j++) avg[j] /= arr.length;
  return avg;
}

// ====== RENDER ======
function render(){
  // sunlight background
  for (let y=0;y<SUN_ROWS;y++){
    for (let x=0;x<SUN_COLS;x++){
      const v = sunlight[y*SUN_COLS + x];
      const lum = Math.floor(8 + v*22);
      ctx.fillStyle = `rgb(${lum-4},${lum},${Math.max(0,lum-8)})`;
      ctx.fillRect(x*SUN_RES, y*SUN_RES, SUN_RES, SUN_RES);
    }
  }

  // plants
  ctx.fillStyle = '#3eaa5e';
  for (let i=0;i<plants.length;i++){
    const p = plants[i];
    const r = radiusOf(p);
    const pr = Math.floor(p.g[T_R]*120);
    const pg = Math.floor(120 + p.g[T_G]*120);
    const pb = Math.floor(p.g[T_B]*100);
    ctx.fillStyle = `rgb(${pr},${pg},${pb})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
  }

  // herbivores
  for (let i=0;i<herbs.length;i++){
    const h = herbs[i];
    const r = radiusOf(h);
    const cr = Math.floor(60 + h.g[T_R]*195);
    const cg = Math.floor(60 + h.g[T_G]*195);
    const cb = Math.floor(80 + h.g[T_B]*175);
    ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
    ctx.beginPath();
    ctx.arc(h.x, h.y, r, 0, Math.PI*2);
    ctx.fill();
    // tiny direction indicator
    if (Math.hypot(h.vx,h.vy) > 0.4) {
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.6)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(h.x, h.y);
      ctx.lineTo(h.x + h.vx*3, h.y + h.vy*3);
      ctx.stroke();
    }
  }

  // carnivores - triangles
  for (let i=0;i<carns.length;i++){
    const c = carns[i];
    const r = radiusOf(c) * 1.3;
    const cr = Math.floor(120 + c.g[T_R]*135);
    const cg = Math.floor(40 + c.g[T_G]*155);
    const cb = Math.floor(40 + c.g[T_B]*135);
    ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
    const ang = Math.atan2(c.vy, c.vx);
    ctx.beginPath();
    ctx.moveTo(c.x + Math.cos(ang)*r, c.y + Math.sin(ang)*r);
    ctx.lineTo(c.x + Math.cos(ang+2.5)*r, c.y + Math.sin(ang+2.5)*r);
    ctx.lineTo(c.x + Math.cos(ang-2.5)*r, c.y + Math.sin(ang-2.5)*r);
    ctx.closePath();
    ctx.fill();
  }
}

function renderGraph(){
  const W2 = graph.width, H2 = graph.height;
  gctx.fillStyle = '#0a0e14';
  gctx.fillRect(0,0,W2,H2);

  // grid
  gctx.strokeStyle = '#1a2030';
  gctx.lineWidth = 1;
  for (let i=1;i<5;i++){
    const y = (H2-20) * i / 5;
    gctx.beginPath(); gctx.moveTo(0,y); gctx.lineTo(W2,y); gctx.stroke();
  }

  if (popHistory.length < 2) return;

  let maxV = 1;
  for (let i=0;i<popHistory.length;i++){
    const r = popHistory[i];
    if (r.p > maxV) maxV = r.p;
    if (r.h > maxV) maxV = r.h;
    if (r.c > maxV) maxV = r.c;
  }
  maxV *= 1.05;

  const drawLine = (key, color) => {
    gctx.strokeStyle = color;
    gctx.lineWidth = 1.5;
    gctx.beginPath();
    for (let i=0;i<popHistory.length;i++){
      const x = (i / Math.max(1,popHistory.length-1)) * W2;
      const v = popHistory[i][key];
      const y = (H2-20) - (v/maxV) * (H2-25);
      if (i===0) gctx.moveTo(x,y); else gctx.lineTo(x,y);
    }
    gctx.stroke();
  };
  drawLine('p', '#3eaa5e');
  drawLine('h', '#88aaff');
  drawLine('c', '#ff7766');

  // labels
  gctx.fillStyle = '#8aa0b8';
  gctx.font = '10px monospace';
  gctx.fillText('Population over time (max: ' + Math.floor(maxV) + ')', 6, 12);
  gctx.fillText('plants', W2-180, 12);
  gctx.fillStyle = '#3eaa5e'; gctx.fillRect(W2-200, 5, 8, 8);
  gctx.fillStyle = '#88aaff'; gctx.fillRect(W2-130, 5, 8, 8);
  gctx.fillStyle = '#8aa0b8'; gctx.fillText('herbs', W2-115, 12);
  gctx.fillStyle = '#ff7766'; gctx.fillRect(W2-65, 5, 8, 8);
  gctx.fillStyle = '#8aa0b8'; gctx.fillText('carns', W2-50, 12);
}

// ====== UI ======
const phenoEl = document.getElementById('phenoPanels');
const overlayEl = document.getElementById('overlay-info');
const cP = document.getElementById('cP');
const cH = document.getElementById('cH');
const cC = document.getElementById('cC');
const tickEl = document.getElementById('tick');
const genEl = document.getElementById('gen');
const tpsEl = document.getElementById('tps');
const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');

speedSlider.addEventListener('input', () => {
  simSpeed = parseInt(speedSlider.value);
  speedVal.textContent = simSpeed + 'x';
});

document.getElementById('resetBtn').addEventListener('click', () => init());
document.getElementById('pauseBtn').addEventListener('click', (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('sunBtn').addEventListener('click', () => {
  sunActive = !sunActive;
  if (sunActive) buildSunlight();
  else {
    // dim everything
    for (let i=0;i<sunlight.length;i++) sunlight[i] *= 0.4;
  }
});
document.getElementById('injectBtn').addEventListener('click', () => {
  // re-randomize 25% of each species' genomes
  const shuffle = (arr, sp) => {
    const n = Math.floor(arr.length * 0.25);
    for (let i=0;i<n;i++){
      const idx = Math.floor(Math.random()*arr.length);
      arr[idx].g = randGenome(sp);
    }
  };
  shuffle(plants, SP_PLANT);
  shuffle(herbs, SP_HERB);
  shuffle(carns, SP_CARN);
  // also add a few fresh ones if low
  if (herbs.length < 30) for (let i=0;i<20;i++) herbs.push(makeHerb(Math.random()*W, Math.random()*H));
  if (carns.length < 10) for (let i=0;i<8;i++) carns.push(makeCarn(Math.random()*W, Math.random()*H));
  if (plants.length < 50) for (let i=0;i<60;i++) plants.push(makePlant(Math.random()*W, Math.random()*H));
});

// build pheno panels DOM once
function buildPhenoPanels(){
  phenoEl.innerHTML = '';
  ['Plants', 'Herbivores', 'Carnivores'].forEach((label, sp) => {
    const block = document.createElement('div');
    block.className = 'species-block';
    const title = document.createElement('div');
    title.style.fontSize = '10px';
    title.style.color = ['#3eaa5e','#88aaff','#ff7766'][sp];
    title.style.fontWeight = 'bold';
    title.textContent = label;
    block.appendChild(title);
    const traits = document.createElement('div');
    traits.className = 'pheno';
    block.appendChild(traits);
    // generate trait rows
    const relevant = sp === SP_PLANT
      ? [T_SIZE,T_METAB,T_REPROD,T_EFFIC,T_LIFE,T_MUT]
      : [T_SIZE,T_SPEED,T_SENSE,T_METAB,T_REPROD,T_AGGR,T_EFFIC,T_LIFE,T_MUT];
    relevant.forEach(idx => {
      const row = document.createElement('div');
      row.className = 'pheno-row';
      row.innerHTML = `
        <div class="label">${TRAIT_NAMES[idx]}</div>
        <div class="bar-bg"><div class="bar-fill" id="bar_${sp}_${idx}" style="width:0%;background:${['#3eaa5e','#88aaff','#ff7766'][sp]}"></div></div>
        <div class="val" id="val_${sp}_${idx}">-</div>
      `;
      traits.appendChild(row);
    });
    phenoEl.appendChild(block);
  });
}
buildPhenoPanels();

function updatePhenoPanels(){
  const groups = [plants, herbs, carns];
  for (let sp=0; sp<3; sp++){
    const avg = averageGenome(groups[sp]);
    const relevant = sp === SP_PLANT
      ? [T_SIZE,T_METAB,T_REPROD,T_EFFIC,T_LIFE,T_MUT]
      : [T_SIZE,T_SPEED,T_SENSE,T_METAB,T_REPROD,T_AGGR,T_EFFIC,T_LIFE,T_MUT];
    relevant.forEach(idx => {
      const bar = document.getElementById(`bar_${sp}_${idx}`);
      const val = document.getElementById(`val_${sp}_${idx}`);
      if (avg) {
        bar.style.width = (avg[idx]*100).toFixed(0) + '%';
        val.textContent = avg[idx].toFixed(2);
      } else {
        bar.style.width = '0%';
        val.textContent = '-';
      }
    });
  }
}

// ====== MAIN LOOP ======
init();

let lastUiUpdate = 0;
let lastHistorySnap = 0;

function loop(t){
  if (!paused) {
    for (let s=0;s<simSpeed;s++) step();
    fpsTickCount += simSpeed;
  }
  render();

  if (t - lastFpsTime > 500) {
    displayedTps = Math.round(fpsTickCount * 1000 / (t - lastFpsTime));
    fpsTickCount = 0;
    lastFpsTime = t;
  }

  // history snapshot every ~10 ticks
  if (tickCount - lastHistorySnap >= 6) {
    popHistory.push({ p: plants.length, h: herbs.length, c: carns.length });
    if (popHistory.length > HIST_MAX) popHistory.shift();
    lastHistorySnap = tickCount;
  }
  renderGraph();

  // UI updates throttled
  if (t - lastUiUpdate > 200) {
    cP.textContent = plants.length;
    cH.textContent = herbs.length;
    cC.textContent = carns.length;
    tickEl.textContent = tickCount;
    genEl.textContent = generation;
    tpsEl.textContent = displayedTps;
    updatePhenoPanels();
    overlayEl.innerHTML = `World: ${W}x${H} (toroidal)<br>Sunlight: ${sunActive ? 'ON' : 'OFF'}<br>Total entities: ${plants.length+herbs.length+carns.length}`;
    lastUiUpdate = t;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
