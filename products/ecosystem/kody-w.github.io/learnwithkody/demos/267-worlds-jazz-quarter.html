<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Worlds 10/12 :: JAZZ QUARTER — Brimsworth Living City</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#f4c98c;font-family:Georgia,'Times New Roman',serif;overflow:hidden;height:100%}
canvas#c{display:block;width:100vw;height:100vh;background:#05060a}
.hud{position:fixed;pointer-events:none;text-shadow:0 0 4px #000,0 0 2px #000;font-size:12px;z-index:5}
#stamp{top:8px;left:8px;background:rgba(0,0,0,0.7);padding:6px 10px;border-left:3px solid #f4c98c;letter-spacing:3px;font-weight:bold;color:#f9d8a0}
#cred{top:8px;left:50%;transform:translateX(-50%);font-size:10px;color:#f4c98c99;letter-spacing:2px}
#plan{top:8px;right:8px;background:rgba(0,0,0,0.6);padding:6px 8px;max-width:260px;font-size:11px;line-height:1.45;border-right:2px solid #5cb6ff66}
#actbar{top:74px;left:8px;width:280px;background:rgba(0,0,0,0.55);padding:4px 8px;font-size:11px;border-left:2px solid #ff5e7a66}
#timeline{bottom:8px;left:8px;background:rgba(0,0,0,0.65);padding:4px 8px;font-size:11px;font-family:'Courier New',monospace;color:#cfd5ff}
#drama{bottom:8px;right:8px;background:rgba(0,0,0,0.65);padding:4px 8px;font-size:11px;border-right:2px solid #ff7a3a66;min-width:170px}
#chyron{position:fixed;left:0;right:0;bottom:38px;background:linear-gradient(90deg,transparent,#000c 12%,#000c 88%,transparent);color:#fff;padding:7px 12px;font-size:13px;letter-spacing:2px;text-align:center;font-style:italic;z-index:6}
#mm{position:fixed;top:48px;right:8px;width:170px;height:170px;border:1px solid #f4c98c88;background:#000a;z-index:5}
#camlbl{position:fixed;top:230px;right:8px;font-size:10px;background:rgba(0,0,0,0.65);padding:3px 7px;color:#f4c98c;letter-spacing:2px;z-index:5;max-width:170px}
#fork{position:fixed;top:260px;right:8px;width:170px;background:rgba(0,0,0,0.55);padding:4px 6px;font-size:10px;font-family:'Courier New',monospace;color:#cfd5ff;z-index:5;line-height:1.3}
#ledger{position:fixed;top:260px;left:8px;width:280px;background:rgba(0,0,0,0.55);padding:4px 8px;font-size:10px;font-family:'Courier New',monospace;color:#9bb0d6;z-index:5;line-height:1.35;max-height:170px;overflow:hidden}
#zones{position:fixed;top:440px;left:8px;width:280px;background:rgba(0,0,0,0.55);padding:4px 8px;font-size:10px;font-family:'Courier New',monospace;color:#cfd5ff;z-index:5;line-height:1.35}
.tag{color:#f4c98c;font-weight:bold}
.dim{color:#9bb0d6}
.warm{color:#ff9a52}
.cool{color:#5cb6ff}
.rose{color:#ff5e7a}
</style>
</head>
<body>
<!-- ROUND25_WORLDS v1 -->
<canvas id="c"></canvas>
<div id="cred" class="hud">BRIMSWORTH JAZZ QUARTER — A ROMANTIC MYSTERY — FICTIONAL DEMO</div>
<div id="stamp" class="hud">CITY 10/12 :: JAZZ QUARTER</div>
<div id="plan" class="hud"></div>
<div id="actbar" class="hud"></div>
<div id="timeline" class="hud"></div>
<div id="drama" class="hud"></div>
<div id="chyron" class="hud"></div>
<canvas id="mm" width="170" height="170"></canvas>
<div id="camlbl" class="hud">CAM</div>
<div id="fork" class="hud"></div>
<div id="ledger" class="hud"></div>
<div id="zones" class="hud"></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
'use strict';
const T=window.THREE;
if(!T){document.body.innerHTML='<pre style="color:#f4c98c">three.js failed to load</pre>';return;}

// ---------- localStorage helpers ----------
function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// ---------- canon cross-read ----------
const canon=lsGet('brimsworth_canon_v1',{events:[],people:{}});
canon.events=canon.events||[]; canon.people=canon.people||{};

// ---------- worlds ledger ----------
const wledger=lsGet('brimsworth_worlds_v1',{cities:{}});
wledger.cities=wledger.cities||{};
wledger.cities['jazz-quarter']={
  city_id:'jazz-quarter',
  index:'10/12',
  title:'Jazz Quarter',
  era:'1940s noir, late-evening',
  tone:'romantic-mystery, NO crime-graphics',
  zones:['blue-note-club','all-night-diner','rain-street','alley-garden','neon-square','riverside-pier'],
  population_named:0,
  events_planned:['14:00 wedding ceremony','16:00 reception cocktails','18:00 sax soundcheck','19:00 diner opens','20:00 first set','22:00 second set','00:00 midnight jazz','02:00 last call'],
  last_seen:Date.now()
};
lsSet('brimsworth_worlds_v1',wledger);

// also store local snapshot
const localSnap=lsGet('worlds_jazz_quarter_v1',{visits:0,first:Date.now()});
localSnap.visits=(localSnap.visits||0)+1;
localSnap.last=Date.now();
lsSet('worlds_jazz_quarter_v1',localSnap);

// append canon
canon.events.push({u:'jazz-quarter',t:Date.now(),kind:'quarter-opened',loc:'Brimsworth Jazz Quarter'});
if(canon.events.length>240) canon.events=canon.events.slice(-240);
lsSet('brimsworth_canon_v1',canon);

// ---------- BroadcastChannel ----------
let bc=null;
try{bc=new BroadcastChannel('brimsworth_worlds_v1')}catch(e){}
const bcMsgs=[];
function bcEmit(o){if(bc){try{bc.postMessage(o)}catch(e){}}}
if(bc){bc.onmessage=(ev)=>{bcMsgs.push(ev.data);if(bcMsgs.length>30)bcMsgs.shift()}}
bcEmit({city:'jazz-quarter',kind:'opened',t:Date.now()});

// ---------- renderer / scene ----------
const cv=document.getElementById('c');
const ren=new T.WebGLRenderer({canvas:cv,antialias:true});
ren.setPixelRatio(Math.min(devicePixelRatio||1,1.7));
ren.setSize(innerWidth,innerHeight);
ren.shadowMap.enabled=false;
ren.toneMapping=T.ACESFilmicToneMapping;
ren.toneMappingExposure=0.95;
const sc=new T.Scene();
sc.background=new T.Color(0x05060a);
sc.fog=new T.FogExp2(0x07090f,0.018);
const cam=new T.PerspectiveCamera(55,innerWidth/innerHeight,0.4,400);
cam.position.set(0,12,42);
cam.lookAt(0,3,0);
addEventListener('resize',()=>{ren.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();});

// ---------- lighting ----------
const ambient=new T.HemisphereLight(0x223344,0x06070a,0.32);
sc.add(ambient);
const moonlight=new T.DirectionalLight(0x8aa6d0,0.18);
moonlight.position.set(-30,40,-12);
sc.add(moonlight);

// chiaroscuro spots — warm amber, neon blue, neon red, neon pink
const spotsDef=[
  {x:0,y:9,z:-7,c:0xffb968,i:1.4,a:Math.PI/4,p:8,d:30},
  {x:-22,y:10,z:6,c:0x5cb6ff,i:1.1,a:Math.PI/5,p:7,d:28},
  {x:22,y:10,z:6,c:0xff4d6d,i:1.1,a:Math.PI/5,p:7,d:28},
  {x:0,y:14,z:18,c:0xff7eb6,i:0.9,a:Math.PI/4,p:6,d:30},
  {x:-12,y:8,z:-22,c:0xffd089,i:0.9,a:Math.PI/5,p:6,d:24},
  {x:14,y:7,z:-20,c:0x6affd2,i:0.7,a:Math.PI/5,p:6,d:22}
];
const spots=spotsDef.map(s=>{
  const sp=new T.SpotLight(s.c,s.i,s.d,s.a,0.55,s.p);
  sp.position.set(s.x,s.y,s.z);
  const tg=new T.Object3D(); tg.position.set(s.x*0.3,1,s.z*0.4); sc.add(tg);
  sp.target=tg;
  sc.add(sp);
  return sp;
});

// ---------- procedural textures ----------
function rainPuddleTex(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const g=c.getContext('2d');
  g.fillStyle='#0a0d14';g.fillRect(0,0,512,512);
  for(let i=0;i<340;i++){
    const x=Math.random()*512,y=Math.random()*512,r=2+Math.random()*16;
    const grd=g.createRadialGradient(x,y,0,x,y,r);
    grd.addColorStop(0,'rgba(120,150,200,0.35)');
    grd.addColorStop(1,'rgba(10,12,18,0)');
    g.fillStyle=grd;g.beginPath();g.arc(x,y,r,0,7);g.fill();
  }
  for(let i=0;i<180;i++){g.fillStyle='rgba(60,70,90,0.3)';g.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*3,1)}
  const t=new T.CanvasTexture(c);
  t.wrapS=t.wrapT=T.RepeatWrapping;t.repeat.set(4,4);
  return t;
}
function brickTex(col1,col2){
  const c=document.createElement('canvas');c.width=256;c.height=256;
  const g=c.getContext('2d');
  g.fillStyle=col1;g.fillRect(0,0,256,256);
  for(let y=0;y<256;y+=18){
    const off=(y/18)%2?0:18;
    for(let x=-18;x<256;x+=36){
      g.fillStyle=Math.random()<0.3?col2:col1;
      g.fillRect(x+off,y,34,16);
      g.strokeStyle='#0a0a0e';g.lineWidth=1;g.strokeRect(x+off,y,34,16);
    }
  }
  g.fillStyle='rgba(0,0,0,0.35)';
  for(let i=0;i<60;i++)g.fillRect(Math.random()*256,Math.random()*256,Math.random()*40,Math.random()*8);
  const t=new T.CanvasTexture(c);
  t.wrapS=t.wrapT=T.RepeatWrapping;
  return t;
}
function neonGlyphTex(text,bg,fg){
  const c=document.createElement('canvas');c.width=512;c.height=128;
  const g=c.getContext('2d');
  g.fillStyle=bg;g.fillRect(0,0,512,128);
  g.font='bold 72px serif';g.textAlign='center';g.textBaseline='middle';
  g.shadowColor=fg;g.shadowBlur=24;
  g.fillStyle=fg;g.fillText(text,256,68);
  g.shadowBlur=8;g.fillText(text,256,68);
  return new T.CanvasTexture(c);
}

// ---------- ground (rain street) ----------
const streetTex=rainPuddleTex();
const ground=new T.Mesh(
  new T.PlaneGeometry(160,160,1,1),
  new T.MeshStandardMaterial({map:streetTex,roughness:0.35,metalness:0.4,color:0x12161e})
);
ground.rotation.x=-Math.PI/2;ground.position.y=0;
sc.add(ground);

// curb stripes
for(let i=-3;i<=3;i++){
  const stripe=new T.Mesh(
    new T.PlaneGeometry(2.2,0.18),
    new T.MeshStandardMaterial({color:0xfff2c2,emissive:0x553311,roughness:0.5})
  );
  stripe.rotation.x=-Math.PI/2;
  stripe.position.set(i*8,0.02,-2);
  sc.add(stripe);
}

// ---------- buildings ----------
const buildings=[];
function addBuilding(x,z,w,h,d,brickA,brickB,winColor,name){
  const tex=brickTex(brickA,brickB);
  tex.repeat.set(Math.max(1,w/3),Math.max(1,h/3));
  const m=new T.Mesh(
    new T.BoxGeometry(w,h,d),
    new T.MeshStandardMaterial({map:tex,roughness:0.85,metalness:0.05,color:0x5a5252})
  );
  m.position.set(x,h/2,z);
  sc.add(m);
  // windows
  const wRows=Math.max(2,Math.floor(h/2.4));
  const wCols=Math.max(2,Math.floor(w/2.2));
  for(let r=0;r<wRows;r++){
    for(let c=0;c<wCols;c++){
      if(Math.random()<0.18) continue;
      const lit=Math.random()<0.55;
      const wm=new T.Mesh(
        new T.PlaneGeometry(0.9,1.1),
        new T.MeshStandardMaterial({color:lit?winColor:0x222a36,emissive:lit?winColor:0x000000,emissiveIntensity:lit?0.7:0,roughness:0.4,transparent:true,opacity:0.95})
      );
      wm.position.set(x-w/2+0.6+c*((w-1.2)/(wCols-1||1)),1.4+r*((h-2)/(wRows||1)),z+d/2+0.02);
      wm.userData={lit,baseEmissive:lit?0.7:0};
      sc.add(wm);
      buildings.push(wm);
    }
  }
  return m;
}

// front row (jazz district facing camera)
addBuilding(-30,-12,12,18,8,'#332a2a','#221a1a',0xffb867,'Whitcomb Lofts');
addBuilding(-16,-12,8,22,8,'#2a2030','#1c1626',0xff8aa6,'Vesper Apartments');
addBuilding(-6,-12,6,12,7,'#2c2218','#1a130d',0xffd48a,'Holloway Hat & Tailor');
// Blue Note club facade (centerpiece)
addBuilding(0,-12,9,14,8,'#1a1626','#0d0a18',0x5cb6ff,'Blue Note Club');
addBuilding(8,-12,7,12,7,'#241a1a','#170f0f',0xff5e7a,'Crispin Cigars');
addBuilding(16,-12,8,16,8,'#221c2a','#15101a',0x8effb6,'Eldridge Bookery');
addBuilding(28,-12,12,20,8,'#2a2424','#1a1414',0xffa45c,'Marlowe & Vance Offices');

// back row
addBuilding(-30,18,14,16,8,'#1f1a26','#100c18',0x5cb6ff,'Pennyworth Press');
addBuilding(-14,18,10,22,8,'#26202a','#15101a',0xff8aa6,'Sinclair Hotel');
addBuilding(2,18,12,14,8,'#221d18','#120e0a',0xffd48a,'Mosswick Florist');
addBuilding(18,18,10,18,8,'#26261c','#15150f',0xff5e7a,'Beaumont Watchworks');
addBuilding(32,18,12,15,8,'#1c2226','#0e1218',0xa0e0ff,'Riverside Lofts');

// ---------- BLUE NOTE neon sign ----------
const neonGroup=new T.Group();
const signTex=neonGlyphTex('BLUE NOTE','#08070d','#5cb6ff');
const signMat=new T.MeshStandardMaterial({map:signTex,emissive:0x5cb6ff,emissiveIntensity:1.2,emissiveMap:signTex});
const signMesh=new T.Mesh(new T.PlaneGeometry(7,1.8),signMat);
signMesh.position.set(0,8.4,-7.96);
neonGroup.add(signMesh);
const signGlow=new T.PointLight(0x5cb6ff,1.6,16);
signGlow.position.set(0,8.4,-6.5);
neonGroup.add(signGlow);
// vertical sax silhouette neon
const saxTex=neonGlyphTex('♪ JAZZ ♪','#08070d','#ff8aa6');
const saxMesh=new T.Mesh(new T.PlaneGeometry(2.2,5),new T.MeshStandardMaterial({map:saxTex,emissive:0xff8aa6,emissiveIntensity:1.0,emissiveMap:saxTex,transparent:true}));
saxMesh.position.set(-4.6,5.2,-7.96);saxMesh.rotation.z=Math.PI/2;
neonGroup.add(saxMesh);
// red "OPEN" hanging sign
const openTex=neonGlyphTex('OPEN','#0a0608','#ff4d6d');
const openMesh=new T.Mesh(new T.PlaneGeometry(2.2,0.7),new T.MeshStandardMaterial({map:openTex,emissive:0xff4d6d,emissiveIntensity:1.4,emissiveMap:openTex}));
openMesh.position.set(0,3.0,-7.6);
neonGroup.add(openMesh);
sc.add(neonGroup);

// neon billboards on square (zone 5)
const billboards=new T.Group();
const bbDefs=[
  {x:-22,y:9,z:25,t:'CASABLANCA',c:0xffd48a},
  {x:0,y:11,z:26,t:'BRIMSWORTH GIN',c:0x5cb6ff},
  {x:22,y:9,z:25,t:'NIGHTINGALE',c:0xff8aa6}
];
bbDefs.forEach(b=>{
  const tex=neonGlyphTex(b.t,'#0a0608','#'+b.c.toString(16).padStart(6,'0'));
  const m=new T.Mesh(new T.PlaneGeometry(8,2.2),new T.MeshStandardMaterial({map:tex,emissive:b.c,emissiveIntensity:1.1,emissiveMap:tex}));
  m.position.set(b.x,b.y,b.z);m.rotation.y=Math.PI;
  billboards.add(m);
  const pl=new T.PointLight(b.c,0.7,12);pl.position.set(b.x,b.y,b.z-2);
  billboards.add(pl);
});
sc.add(billboards);

// ---------- BLUE NOTE interior (open-front bar) ----------
const clubGroup=new T.Group();
clubGroup.position.set(0,0,-7.5);

// floor (warm wood)
const clubFloor=new T.Mesh(
  new T.PlaneGeometry(8,7),
  new T.MeshStandardMaterial({color:0x2a1810,roughness:0.7,metalness:0.1})
);
clubFloor.rotation.x=-Math.PI/2;clubFloor.position.set(0,0.04,-2);
clubGroup.add(clubFloor);

// rear wall (deep red velvet)
const rearWall=new T.Mesh(
  new T.PlaneGeometry(8,5),
  new T.MeshStandardMaterial({color:0x40121a,roughness:0.95,emissive:0x1a0408,emissiveIntensity:0.4})
);
rearWall.position.set(0,2.5,-5.5);
clubGroup.add(rearWall);

// bar counter
const barCounter=new T.Mesh(
  new T.BoxGeometry(5,1.1,0.7),
  new T.MeshStandardMaterial({color:0x4a2a14,roughness:0.4,metalness:0.5,emissive:0x110800,emissiveIntensity:0.2})
);
barCounter.position.set(-2.4,0.55,-1.6);
clubGroup.add(barCounter);
// bar bottles
for(let i=0;i<7;i++){
  const bottle=new T.Mesh(
    new T.CylinderGeometry(0.07,0.09,0.5,8),
    new T.MeshStandardMaterial({color:[0x3a1a08,0x2a4818,0x4a1822,0x483820,0x18324a][i%5],emissive:0x080604,emissiveIntensity:0.3,roughness:0.3})
  );
  bottle.position.set(-4.4+i*0.7,1.4,-2.0);
  clubGroup.add(bottle);
}
// stools
for(let i=0;i<5;i++){
  const stool=new T.Mesh(
    new T.CylinderGeometry(0.22,0.22,0.85,10),
    new T.MeshStandardMaterial({color:0x6a2c1c,roughness:0.6,metalness:0.4})
  );
  stool.position.set(-4.0+i*1.0,0.45,-0.8);
  clubGroup.add(stool);
}
// jukebox (curved cabinet)
const juke=new T.Mesh(new T.CylinderGeometry(0.5,0.5,1.6,12,1,false,0,Math.PI),new T.MeshStandardMaterial({color:0x6a3018,roughness:0.4,metalness:0.5,emissive:0xff7a3a,emissiveIntensity:0.45}));
juke.position.set(2.6,0.84,-4.6);juke.rotation.y=Math.PI;
clubGroup.add(juke);
// jukebox glow ring
const jukeRing=new T.Mesh(new T.TorusGeometry(0.42,0.04,6,18),new T.MeshStandardMaterial({color:0xff7a3a,emissive:0xff7a3a,emissiveIntensity:1.2}));
jukeRing.position.set(2.6,1.55,-4.6);jukeRing.rotation.x=Math.PI/2;
clubGroup.add(jukeRing);

// stage with sax trio
const stage=new T.Mesh(new T.BoxGeometry(4.5,0.3,2.2),new T.MeshStandardMaterial({color:0x32130a,roughness:0.5,metalness:0.3}));
stage.position.set(2.0,0.15,-3.6);
clubGroup.add(stage);
// sax trio stand stands
function makeStand(x,z,col){
  const g=new T.Group();
  const pole=new T.Mesh(new T.CylinderGeometry(0.04,0.04,1.2),new T.MeshStandardMaterial({color:0x1a1a1a,metalness:0.8}));
  pole.position.set(0,0.6,0);g.add(pole);
  const top=new T.Mesh(new T.BoxGeometry(0.5,0.4,0.05),new T.MeshStandardMaterial({color:0x222,metalness:0.7}));
  top.position.set(0,1.1,0);g.add(top);
  const sheet=new T.Mesh(new T.PlaneGeometry(0.42,0.3),new T.MeshStandardMaterial({color:0xf2e6c4,emissive:0x6a4818,emissiveIntensity:0.5}));
  sheet.position.set(0,1.1,0.03);g.add(sheet);
  // instrument
  const inst=new T.Mesh(new T.TorusKnotGeometry(0.13,0.04,16,4),new T.MeshStandardMaterial({color:col,metalness:0.85,roughness:0.2,emissive:col,emissiveIntensity:0.3}));
  inst.position.set(0.1,0.7,0.2);g.add(inst);
  g.position.set(x,0.3,z);
  return g;
}
clubGroup.add(makeStand(0.6,-3.6,0xc89a3a));
clubGroup.add(makeStand(2.0,-3.5,0xd9b86a));
clubGroup.add(makeStand(3.4,-3.6,0xb2812a));

// chandelier
const chandLamp=new T.Group();
const chandRod=new T.Mesh(new T.CylinderGeometry(0.03,0.03,1.5),new T.MeshStandardMaterial({color:0x3a2818}));
chandRod.position.set(0,4.2,-3);chandLamp.add(chandRod);
const chandCenter=new T.Mesh(new T.SphereGeometry(0.22,10,8),new T.MeshStandardMaterial({color:0xffd089,emissive:0xffaa55,emissiveIntensity:1.4}));
chandCenter.position.set(0,3.4,-3);chandLamp.add(chandCenter);
for(let i=0;i<6;i++){
  const a=i/6*Math.PI*2;
  const arm=new T.Mesh(new T.SphereGeometry(0.1,8,6),new T.MeshStandardMaterial({color:0xffd089,emissive:0xffb86a,emissiveIntensity:1.2}));
  arm.position.set(Math.cos(a)*0.55,3.3,-3+Math.sin(a)*0.55);
  chandLamp.add(arm);
}
const chandLight=new T.PointLight(0xffb86a,0.7,8);chandLight.position.set(0,3.3,-3);
chandLamp.add(chandLight);
clubGroup.add(chandLamp);
sc.add(clubGroup);

// ---------- DINER (zone 2, right side) ----------
const dinerGroup=new T.Group();
dinerGroup.position.set(20,0,-3);
// chrome counter shell
const dinerShell=new T.Mesh(
  new T.BoxGeometry(8,4,5),
  new T.MeshStandardMaterial({color:0xc0c8d0,roughness:0.3,metalness:0.7})
);
dinerShell.position.set(0,2,0);
dinerGroup.add(dinerShell);

const NSEED=512; // 512 named citizens
function makeRng(s){let n=s|0;return function(){n=(n*1664525+1013904223)|0;return((n>>>0)/4294967296)}}

function pick(a){return a[Math.floor(rng()*a.length)]}

  nameAttempts++;
  if(usedNames[fn]) continue;

  // assign home zone bias
  const role=pick(ROLES);
  const zone=Math.floor(rng()*6);
  // schedule daily — these will move between zones during cycle

    id:citizens.length,

    vx:0,vz:0,

// ---------- TIME / DAY CYCLE ----------
// 12 hours @ 50s/hr = 600s total cycle = reseed boundary

// start at 14:00 (afternoon ceremony)
const START_HOUR=14;

function getTimeOfDay(t){
  // t in seconds since runStart
  const h=(START_HOUR+(t/HOUR_S))%24;
  return h;
}
function fmtClock(h){
  const hh=Math.floor(h)%24;
  const mm=Math.floor((h-Math.floor(h))*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

  {at:14.0,n:'WEDDING CEREMONY at neon square gazebo'},

];
// translate to "hours since start"
EVENTS.forEach(e=>{e.tSec=(e.at-START_HOUR)*HOUR_S; if(e.tSec<0) e.tSec+=12*HOUR_S});

// ---------- CITIZEN BEHAVIOR ----------
// scheduled by hour: which zone each role tends toward
function targetZoneFor(role,h){
  // 14:00 - 17:00 wedding+square
  if(h>=14 && h<17){
    if(['wedding-guest','best-man','maid-of-honor','officiant','flower-girl-jr','ringbearer','torch-singer','wedding-singer','photographer','flower-girl','admirer','lover'].indexOf(role)>=0) return 4;
  }
  // 17:00-19:00 cooldown to diner/club/street
  if(h>=17 && h<19){
    if(role==='diner-cook'||role==='diner-waitress'||role==='dishwasher') return 1;
    if(role==='saxophonist'||role==='pianist'||role==='bassist'||role==='drummer'||role==='trumpeter'||role==='clarinetist'||role==='songwriter'||role==='lyricist'||role==='spotlight-op'||role==='sound-tech'||role==='stagehand') return 0;
    if(role==='taxi-driver'||role==='cabbie') return 2;
  }
  // 19:00-23:00 EVENING hub: club, diner, street
  if(h>=19 && h<23){
    if(role==='diner-cook'||role==='diner-waitress'||role==='dishwasher') return 1;
    if(['saxophonist','pianist','bassist','singer','torch-singer','drummer','trumpeter','clarinetist','bartender','barback','waiter','waitress','hat-check','doorman','bouncer','cigarette-girl','poet-at-bar','dancer','dance-partner','dance-coach','wedding-singer','songwriter','lyricist','spotlight-op','sound-tech','stagehand'].indexOf(role)>=0) return 0;
    if(role==='taxi-driver'||role==='cabbie'||role==='beat-walker'||role==='flatfoot'||role==='detective-on-case'||role==='reporter'||role==='photographer'||role==='newspaper-vendor'||role==='umbrella-merchant'||role==='street-sweeper') return 2;
    if(role==='fire-escape-romeo'||role==='rooftop-watcher'||role==='lover'||role==='admirer'||role==='painter'||role==='sketch-artist'||role==='vagrant-poet') return 3;
  }
  // 23:00-01:00 peak — most everyone in/near club, square, river romance
  if(h>=23 || h<1){
    if(role==='ferryman'||role==='river-pilot'||role==='dock-worker'||role==='sailor-on-leave') return 5;
    if(role==='lover'||role==='admirer'||role==='mystery-stranger') return Math.random()<0.5?5:3;
    if(['saxophonist','pianist','bassist','singer','torch-singer','drummer','trumpeter','clarinetist','bartender','barback','waiter','waitress','hat-check','doorman','bouncer','cigarette-girl','dancer','dance-partner','poet-at-bar'].indexOf(role)>=0) return 0;
    if(role==='diner-cook'||role==='diner-waitress'||role==='dishwasher') return 1;
  }
  // 01:00-02:00 last call — diner & taxi
  if(h>=1 && h<2){
    if(role==='diner-cook'||role==='diner-waitress'||role==='dishwasher') return 1;
    if(role==='taxi-driver'||role==='cabbie') return 2;
  }
  // dawn 02:00+ quiet rain
  // home/zones disperse
  return Math.floor(Math.random()*6);
}

// ---------- camera state ----------
let camIdx=0,camTimer=0,camHold=8;

// ---------- MAIN LOOP ----------
const tmpV=new T.Vector3();
let lastFrame=performance.now();
let frame=0;
let bcLast=0;

function update(){
  const now=performance.now();
  const dt=Math.min(0.06,(now-lastFrame)/1000);
  lastFrame=now;
  frame++;
  const t=(now/1000)-runStart;
  const h=getTimeOfDay(t);

  // --- reseed every 600s (one full cycle) ---
  if(t-((lastReseed-runStart))>=600){
    lastReseed=performance.now()/1000;
    // re-pick palette accents and movement seeds
    citizens.forEach(c=>{c.coatHSL[0]=Math.random();c.targetX=ZONES[c.home].cx+(Math.random()-0.5)*ZONES[c.home].r*1.2;c.targetZ=ZONES[c.home].cz+(Math.random()-0.5)*ZONES[c.home].r*1.2});
    canon.events.push({u:'jazz-quarter',t:Date.now(),kind:'reseed-cycle',loc:'Brimsworth Jazz Quarter'});
    if(canon.events.length>240) canon.events=canon.events.slice(-240);
    lsSet('brimsworth_canon_v1',canon);
    bcEmit({city:'jazz-quarter',kind:'reseed',t:Date.now()});
    pushChy('— RESEED :: A NEW EVENING SETTLES OVER BRIMSWORTH —');
    dPush('reseed: 600s cycle complete');
  }

  // --- portal at 5min ---
  if(t>=300 && !portalGroup.visible){
    portalGroup.visible=true;
    pushChy('— A PURPLE DOOR HUMS OPEN BESIDE THE BLUE NOTE :: MULTIVERSE PORTAL —');
    dPush('portal: opened at 05:00 mark');
    canon.events.push({u:'jazz-quarter',t:Date.now(),kind:'portal-open',loc:'Quarter alley'});
    lsSet('brimsworth_canon_v1',canon);
    bcEmit({city:'jazz-quarter',kind:'portal',t:Date.now()});
  }
  if(portalGroup.visible){
    ring.rotation.z+=dt*0.4;
    ring.material.emissiveIntensity=1.0+0.4*Math.sin(t*4);
    portalDisk.material.opacity=0.35+0.18*Math.sin(t*3);
  }

  // --- events ---
  while(nextEvIdx<EVENTS.length && t>=EVENTS[nextEvIdx].tSec){
    const e=EVENTS[nextEvIdx];
    pushChy('— '+fmtClock((START_HOUR+e.tSec/HOUR_S)%24)+' :: '+e.n+' —');
    dPush(e.n);
    canon.events.push({u:'jazz-quarter',t:Date.now(),kind:'event',loc:e.n});
    lsSet('brimsworth_canon_v1',canon);
    bcEmit({city:'jazz-quarter',kind:'event',name:e.n,t:Date.now()});
    nextEvIdx++;
  }

  // --- citizens move toward zone ---
  // every ~2 sec retarget for some
  if(frame%30===0){
    for(let k=0;k<60;k++){
      const c=citizens[Math.floor(Math.random()*citizens.length)];
      const tz=targetZoneFor(c.role,h);
      c.home=tz;
      const z=ZONES[tz];
      c.targetX=z.cx+(Math.random()-0.5)*z.r*1.4;
      c.targetZ=z.cz+(Math.random()-0.5)*z.r*1.4;
    }
  }
  // movement
  const visibles=[];
  for(let i=0;i<citizens.length;i++){
    const c=citizens[i];
    const dx=c.targetX-c.px,dz=c.targetZ-c.pz;
    const d=Math.hypot(dx,dz);
    if(d>0.05){
      const sp=0.6+(c.id%5)*0.08;
      c.px+=dx/d*sp*dt;
      c.pz+=dz/d*sp*dt;
    }
    // distance to camera for visibility
    const cdx=c.px-cam.position.x,cdz=c.pz-cam.position.z;
    c.distSq=cdx*cdx+cdz*cdz;
  }
  // sort by camera distance, take CIT_INST closest
  citizens.sort((a,b)=>a.distSq-b.distSq);
  for(let i=0;i<CIT_INST;i++){
    const c=citizens[i];
    if(!c){
      dummy.position.set(0,-100,0);dummy.updateMatrix();
      bodyInst.setMatrixAt(i,dummy.matrix);headInst.setMatrixAt(i,dummy.matrix);hatInst.setMatrixAt(i,dummy.matrix);
      continue;
    }
    const bob=Math.sin((t+c.id*0.7)*4)*0.04;
    dummy.position.set(c.px,0.55+bob,c.pz);
    dummy.rotation.y=Math.atan2(c.targetX-c.px,c.targetZ-c.pz);
    dummy.updateMatrix();
    bodyInst.setMatrixAt(i,dummy.matrix);
    tmpC.setHSL(c.coatHSL[0],c.coatHSL[1],c.coatHSL[2]);
    bodyInst.setColorAt(i,tmpC);
    dummy.position.set(c.px,1.20+bob,c.pz);
    dummy.updateMatrix();
    headInst.setMatrixAt(i,dummy.matrix);
    dummy.position.set(c.px,1.40+bob,c.pz);
    dummy.updateMatrix();
    hatInst.setMatrixAt(i,dummy.matrix);
  }
  bodyInst.instanceMatrix.needsUpdate=true;
  headInst.instanceMatrix.needsUpdate=true;
  hatInst.instanceMatrix.needsUpdate=true;
  if(bodyInst.instanceColor) bodyInst.instanceColor.needsUpdate=true;

  // --- rain ---
  for(let i=0;i<RAIN_CT;i++){
    rainPos[i*3+1]-=rainVel[i]*dt;
    if(rainPos[i*3+1]<0){
      rainPos[i*3]=(Math.random()-0.5)*120;
      rainPos[i*3+1]=30+Math.random()*10;
      rainPos[i*3+2]=(Math.random()-0.5)*120;
    }
  }
  rainGeom.attributes.position.needsUpdate=true;
  // streaks
  for(let i=0;i<220;i++){
    streakArr[i*6+1]-=18*dt;
    streakArr[i*6+4]=streakArr[i*6+1]-0.6;
    if(streakArr[i*6+1]<0){
      streakArr[i*6]=(Math.random()-0.5)*60;
      streakArr[i*6+1]=18+Math.random()*8;
      streakArr[i*6+2]=(Math.random()-0.5)*40;
      streakArr[i*6+3]=streakArr[i*6];
      streakArr[i*6+4]=streakArr[i*6+1]-0.6;
      streakArr[i*6+5]=streakArr[i*6+2];
    }
  }
  streakGeom.attributes.position.needsUpdate=true;

  // --- smoke drift ---
  smokes.forEach((s,i)=>{
    s.position.x+=Math.sin(t*0.1+i)*0.005;
    s.position.y+=0.04*dt+Math.sin(t*0.2+i)*0.003;
    s.rotation.z+=0.003;
    if(s.position.y>9){s.position.y=1+Math.random()*2;s.position.x=(Math.random()-0.5)*40;s.position.z=(Math.random()-0.5)*30}
    s.lookAt(cam.position);
  });

  // --- taxis along street ---
  taxis.forEach((tx,i)=>{
    const s=tx.speed;
    if(tx.g.rotation.y>0){tx.g.position.x+=s*4*dt;if(tx.g.position.x>40)tx.g.position.x=-40}
    else{tx.g.position.x-=s*4*dt;if(tx.g.position.x<-40)tx.g.position.x=40}
    // wheels not animated for perf
  });

  // --- light intensity by hour ---
  // 14-16 afternoon (overcast amber), 16-18 twilight (warm pink), 18-22 evening neon (full), 22-02 midnight, 02-04 dawn quiet
  let neon=1.0,warm=1.0,amb=0.32,bgH=0.6;
  if(h>=14 && h<16){neon=0.45;warm=0.9;amb=0.55;bgH=0.55;sc.background=new T.Color(0x1a1a2c)}
  else if(h>=16 && h<18){neon=0.7;warm=1.05;amb=0.4;bgH=0.45;sc.background=new T.Color(0x1c1422)}
  else if(h>=18 && h<22){neon=1.1;warm=1.1;amb=0.28;bgH=0.3;sc.background=new T.Color(0x0c0a18)}
  else if((h>=22)||(h<2)){neon=1.25;warm=1.05;amb=0.18;bgH=0.18;sc.background=new T.Color(0x05060a)}
  else if(h>=2 && h<4){neon=0.65;warm=0.55;amb=0.35;bgH=0.5;sc.background=new T.Color(0x0e1018)}
  else if(h>=4 && h<6){neon=0.3;warm=0.4;amb=0.55;bgH=0.7;sc.background=new T.Color(0x1a2034)}
  else{neon=0.5;warm=0.7;amb=0.45;sc.background=new T.Color(0x101626)}
  ambient.intensity=amb;
  spots.forEach((sp,i)=>{
    sp.intensity=spotsDef[i].i*neon*(0.85+0.15*Math.sin(t*1.2+i));
  });
  // neon group flicker
  signMat.emissiveIntensity=1.2*neon*(0.9+0.1*Math.sin(t*8));
  saxMesh.material.emissiveIntensity=1.0*neon*(0.85+0.15*Math.sin(t*5+1));
  openMesh.material.emissiveIntensity=1.4*neon;
  signGlow.intensity=1.6*neon;
  dinerGlow.intensity=0.9*warm;
  chandLight.intensity=0.7*warm;
  // scene fog
  sc.fog.density=0.012+0.012*(1.0-neon*0.5);

  // --- camera ---
  camTimer+=dt;
  if(camTimer>camHold){camTimer=0;camIdx=(camIdx+1)%CAMS.length;camHold=6+Math.random()*5}
  CAMS[camIdx].f(t);

  // --- BroadcastChannel periodic heartbeat ---
  if(t-bcLast>15){bcLast=t;bcEmit({city:'jazz-quarter',kind:'heartbeat',hour:fmtClock(h),t:Date.now()})}

  ren.render(sc,cam);
  drawHUD(t,h);
  requestAnimationFrame(update);
}

// ---------- minimap ----------
function drawMM(){
  mmCtx.clearRect(0,0,170,170);
  mmCtx.fillStyle='#0a0c12';mmCtx.fillRect(0,0,170,170);
  // worldXZ -> mm: x range -40..40 -> 0..170, z -20..60 -> 170..0
  function W(x,z){return [(x+40)*170/80,170-(z+20)*170/80]}
  // zones
  ZONES.forEach((z,i)=>{
    const [px,py]=W(z.cx,z.cz);
    const r=z.r*170/80;
    mmCtx.beginPath();mmCtx.arc(px,py,r,0,7);
    mmCtx.fillStyle='#'+z.col.toString(16).padStart(6,'0')+'33';mmCtx.fill();
    mmCtx.strokeStyle='#'+z.col.toString(16).padStart(6,'0')+'aa';mmCtx.stroke();
    mmCtx.fillStyle='#fff';mmCtx.font='8px monospace';mmCtx.fillText(z.name,px-r+1,py-r-1);
  });
  // citizens
  for(let i=0;i<Math.min(citizens.length,200);i++){
    const c=citizens[i];
    const [px,py]=W(c.px,c.pz);
    if(px<0||px>170||py<0||py>170) continue;
    mmCtx.fillStyle='#f4c98c';mmCtx.fillRect(px,py,1.5,1.5);
  }
  // taxis
  taxis.forEach(tx=>{
    const [px,py]=W(tx.g.position.x,tx.g.position.z);
    mmCtx.fillStyle='#f6c74a';mmCtx.fillRect(px-1,py-1,3,3);
  });
  // camera
  const [cx,cy]=W(cam.position.x,cam.position.z);
  mmCtx.strokeStyle='#fff';mmCtx.beginPath();mmCtx.arc(cx,cy,3,0,7);mmCtx.stroke();
  // portal
  if(portalGroup.visible){
    const [px,py]=W(portalGroup.position.x,portalGroup.position.z);
    mmCtx.fillStyle='#b06fff';mmCtx.beginPath();mmCtx.arc(px,py,3,0,7);mmCtx.fill();
  }
}

function drawHUD(t,h){
  // stamp shows hour
  const clk=fmtClock(h);
  const stp=document.getElementById('stamp');
  stp.innerHTML='CITY 10/12 :: JAZZ QUARTER :: '+clk;

  // plan
  const tone=h>=18&&h<26?'EVENING NEON':(h>=14&&h<18?'TWILIGHT DRIZZLE':(h<6?'DAWN-QUIET RAIN':'AFTERNOON DRIZZLE'));
  elPlan.innerHTML='<span class="tag">PLAN</span><br>'+
    '<span class="dim">city_id:</span> jazz-quarter<br>'+
    '<span class="dim">era:</span> 1940s noir<br>'+
    '<span class="dim">tone:</span> romantic-mystery<br>'+
    '<span class="dim">named:</span> '+citizens.length+' citizens<br>'+
    '<span class="dim">phase:</span> '+tone+'<br>'+
    '<span class="dim">portal:</span> '+(portalGroup.visible?'OPEN':'@5:00');

  // act bar
  const next=EVENTS[nextEvIdx];
  let actHtml='<span class="tag">EVENTS</span>';
  for(let i=Math.max(0,nextEvIdx-1);i<Math.min(EVENTS.length,nextEvIdx+3);i++){
    const e=EVENTS[i];
    const tt=fmtClock((START_HOUR+e.tSec/HOUR_S)%24);
    const cls=i<nextEvIdx?'dim':(i===nextEvIdx?'warm':'cool');
    actHtml+='<br><span class="'+cls+'">'+tt+'</span> '+e.n;
  }
  elAct.innerHTML=actHtml;

  // timeline
  const pct=Math.min(1,t/TOTAL_S);
  const bars=Math.floor(pct*30);
  let bar='';
  for(let i=0;i<30;i++) bar+=(i<bars?'█':'░');
  elTL.innerHTML='<span class="tag">CYCLE</span> '+bar+' '+fmtClock(h);

  // drama log
  let dl='<span class="tag">SIGNALS</span>';
  for(let i=Math.max(0,dramaLog.length-5);i<dramaLog.length;i++){
    dl+='<br><span class="dim">'+Math.floor(dramaLog[i].t-runStart)+'s</span> '+dramaLog[i].s;
  }
  elDr.innerHTML=dl;

  // chyron rotates
  const cur=chyronQ.length?chyronQ[chyronQ.length-1].s:'— BRIMSWORTH JAZZ QUARTER —';
  elCh.textContent=cur;

  // fork (cam list near current)
  let fk='<span class="tag">CAM '+(camIdx+1)+'/'+CAMS.length+'</span>';
  for(let i=0;i<3;i++){
    const k=(camIdx+i)%CAMS.length;
    fk+='<br><span class="'+(i===0?'warm':'dim')+'">'+(i===0?'▶ ':'  ')+CAMS[k].n+'</span>';
  }
  elFork.innerHTML=fk;
  elCam.textContent='► '+CAMS[camIdx].n;

  // ledger
  let ld='<span class="tag">LEDGER</span> brimsworth_worlds_v1';
  ld+='<br><span class="dim">city:</span> jazz-quarter <span class="dim">10/12</span>';
  ld+='<br><span class="dim">visits:</span> '+localSnap.visits+' <span class="dim">events:</span> '+canon.events.length;
  ld+='<br><span class="tag">CANON</span>';
  const evs=canon.events.slice(-4);
  for(let i=evs.length-1;i>=0;i--){
    const e=evs[i];
    ld+='<br><span class="cool">'+e.u+'</span> '+e.kind+' <span class="dim">'+(e.loc||'').substring(0,28)+'</span>';
  }
  if(bcMsgs.length){
    ld+='<br><span class="tag">BC</span> '+bcMsgs.length+' rx';
  }
  elLed.innerHTML=ld;

  // zones list with named example citizen each
  let zh='<span class="tag">ZONES</span>';
  ZONES.forEach((z,i)=>{
    const ppl=citizens.filter(c=>c.home===i);
    const ex=ppl.length?ppl[Math.floor(t*0.5+i)%ppl.length]:null;
    zh+='<br><span class="cool">'+z.name+'</span> <span class="dim">('+ppl.length+')</span> '+(ex?'<span class="warm">'+ex.name+'</span> <span class="dim">'+ex.role+'</span>':'');
  });
  elZon.innerHTML=zh;

  if(frame%4===0) drawMM();
}

// ---------- start ----------
update();
})();
</script>
</body>
</html>
