<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURORAFEST 2026 — LIVE</title>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;overflow:hidden}
#stage{position:fixed;inset:0}
#stage canvas{display:block;width:100%;height:100%}
.ui{position:fixed;pointer-events:none;z-index:5}
#logo{top:18px;left:20px;font-weight:900;letter-spacing:.18em;font-size:20px;
  background:linear-gradient(90deg,#ff3df0,#ffb800,#00f0ff);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 20px rgba(255,61,240,.4)}
#logo small{display:block;font-weight:300;letter-spacing:.5em;font-size:10px;color:#ffb800;-webkit-text-fill-color:#ffb800;margin-top:2px}
#liveDot{position:fixed;top:22px;left:230px;display:flex;align-items:center;gap:6px;font-weight:900;font-size:12px;letter-spacing:.2em;z-index:5}
#liveDot .d{width:8px;height:8px;border-radius:50%;background:#ff2940;box-shadow:0 0 12px #ff2940;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#camLabel{top:20px;right:20px;background:rgba(0,0,0,.55);padding:6px 14px;border-left:3px solid #ff3df0;font-size:11px;letter-spacing:.25em;font-weight:700;color:#fff}
#clock{top:52px;right:20px;background:rgba(0,0,0,.45);padding:4px 12px;font-size:10px;letter-spacing:.18em;color:#9af}
#schedule{top:90px;right:20px;width:240px;background:rgba(8,4,18,.78);border:1px solid rgba(255,61,240,.35);padding:10px 12px;backdrop-filter:blur(6px)}
#schedule h3{font-size:10px;letter-spacing:.3em;color:#ffb800;margin-bottom:8px;font-weight:700}
.row{display:grid;grid-template-columns:46px 1fr;gap:6px;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.row:last-child{border-bottom:none}
.row .t{color:#7af}
.row .n{color:#fff;font-weight:600;letter-spacing:.05em}
.row.live .n{color:#ff3df0;text-shadow:0 0 8px #ff3df0}
.row.done{opacity:.4}
#meters{bottom:140px;left:20px;width:260px;background:rgba(0,0,0,.55);padding:10px 12px;border-left:3px solid #00f0ff}
#meters h3{font-size:10px;letter-spacing:.25em;color:#00f0ff;margin-bottom:6px}
.meter{margin:4px 0;font-size:10px}
.meter .lab{display:flex;justify-content:space-between;color:#cef;margin-bottom:2px}
.meter .bar{height:5px;background:rgba(255,255,255,.1);overflow:hidden}
.meter .bar .fill{height:100%;background:linear-gradient(90deg,#00f0ff,#ff3df0);transition:width .25s}
#nowPlaying{bottom:20px;left:20px;background:linear-gradient(90deg,rgba(255,61,240,.85),rgba(255,184,0,.7));padding:14px 22px 14px 18px;min-width:380px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 100%,14px 100%);border-left:4px solid #fff}
#nowPlaying .stage{font-size:9px;letter-spacing:.4em;color:rgba(255,255,255,.85);font-weight:700}
#nowPlaying .band{font-size:22px;font-weight:900;letter-spacing:.04em;margin-top:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#nowPlaying .genre{font-size:10px;letter-spacing:.3em;color:#ffeb99;margin-top:2px}
#anchor{bottom:20px;right:20px;width:240px;background:rgba(0,0,0,.85);border:2px solid #ff3df0;padding:10px}
#anchor h4{font-size:9px;letter-spacing:.3em;color:#ff3df0;margin-bottom:6px}
#anchor .body{font-size:11px;line-height:1.4;color:#fff;min-height:42px}
#anchor .name{font-size:9px;color:#ffb800;margin-top:6px;letter-spacing:.2em}
#countdown{top:90px;left:20px;background:rgba(0,0,0,.55);padding:10px 14px;border-left:3px solid #ffb800}
#countdown h3{font-size:9px;letter-spacing:.3em;color:#ffb800}
#countdown .num{font-size:24px;font-weight:900;letter-spacing:.1em;margin-top:4px;color:#fff;text-shadow:0 0 16px #ff3df0}
#countdown .who{font-size:10px;color:#cef;letter-spacing:.2em;margin-top:2px}
#ticker{position:fixed;left:0;right:0;bottom:0;height:28px;background:linear-gradient(90deg,#0a0218,#180330,#0a0218);border-top:1px solid rgba(255,61,240,.5);overflow:hidden;z-index:6}
#ticker .scroll{position:absolute;white-space:nowrap;font-size:11px;line-height:28px;letter-spacing:.15em;color:#fff;animation:tk 60s linear infinite}
#ticker .tag{color:#ff3df0;font-weight:900;margin:0 18px}
@keyframes tk{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:8;transition:opacity .15s}
#banner{position:fixed;top:38%;left:0;right:0;text-align:center;font-size:64px;font-weight:900;letter-spacing:.1em;
  background:linear-gradient(90deg,#ff3df0,#ffb800,#00f0ff);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(255,61,240,.6);opacity:0;pointer-events:none;z-index:9;transition:opacity .8s;transform:scale(.9)}
#banner.show{opacity:1;transform:scale(1)}
#banner small{display:block;font-size:14px;letter-spacing:.5em;color:#fff;-webkit-text-fill-color:#fff;margin-top:8px;text-shadow:0 0 12px #000}
#weather{top:140px;left:20px;background:rgba(0,0,0,.45);padding:6px 12px;font-size:10px;letter-spacing:.18em;color:#9af;border-left:2px solid #00f0ff}
.hidden{display:none!important}
</style>
</head>
<body>
<!-- ROUND14_LIVING v1 -->
<div id="stage"></div>
<div class="ui" id="logo">AURORAFEST<small>2026 · LIVE</small></div>
<div id="liveDot"><div class="d"></div>LIVE</div>
<div class="ui" id="camLabel">CAM 01 · AERIAL WIDE</div>
<div class="ui" id="clock">DAY 2 · 14:00</div>
<div class="ui" id="weather">☀ CLEAR · 78°F · WIND 4MPH</div>
<div class="ui" id="countdown"><h3>HEADLINER IN</h3><div class="num" id="cnum">--:--</div><div class="who" id="cwho">TBA</div></div>
<div class="ui" id="schedule"><h3>TODAY · 4 STAGES</h3><div id="rows"></div></div>
<div class="ui" id="meters"><h3>CROWD METERS</h3><div id="mlist"></div></div>
<div class="ui" id="nowPlaying"><div class="stage" id="npStage">MAIN STAGE EAST</div><div class="band" id="npBand">—</div><div class="genre" id="npGenre">—</div></div>
<div class="ui" id="anchor"><h4>FROM THE BOOTH</h4><div class="body" id="ancBody">Welcome back to AURORAFEST 2026, day two of nonstop sound.</div><div class="name" id="ancName">— DJ NOVA & MC PIXEL</div></div>
<div id="ticker"><div class="scroll" id="tkScroll"></div></div>
<div id="flash"></div>
<div id="banner"><span id="bnText"></span><small id="bnSub"></small></div>
<script>
(function(){'use strict';
var THREE=window.THREE;if(!THREE){document.body.innerHTML='<pre style="color:#f33;padding:20px">three.js failed to load</pre>';return;}
var W=window.innerWidth,H=window.innerHeight;
var renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=false;
document.getElementById('stage').appendChild(renderer.domElement);

var scene=new THREE.Scene();
var fogColor=new THREE.Color(0x88aacc);
scene.background=fogColor.clone();
scene.fog=new THREE.Fog(fogColor.clone(),120,520);

var disposables=[];
function track(o){if(!o)return o;disposables.push(o);return o;}
function trackMat(m){disposables.push(m);return m;}
function trackGeo(g){disposables.push(g);return g;}
function disposeAll(){
  for(var i=0;i<disposables.length;i++){try{if(disposables[i].dispose)disposables[i].dispose();}catch(e){}}
  disposables.length=0;
}

// ---------- cameras ----------
var cams=[];
function makeCam(name,pos,look){
  var c=new THREE.PerspectiveCamera(58,W/H,1,2000);
  c.position.set(pos[0],pos[1],pos[2]);
  c.lookAt(look[0],look[1],look[2]);
  c.userData={name:name,basePos:pos.slice(),baseLook:look.slice()};
  cams.push(c);return c;
}
makeCam('AERIAL WIDE',[0,180,260],[0,10,0]);
makeCam('MAIN STAGE',[150,40,90],[150,18,-10]);
makeCam('BASS DOME',[-150,30,80],[-150,15,-5]);
makeCam('ACOUSTIC GROVE',[40,18,-110],[0,8,-160]);
makeCam('COMEDY/POP',[-30,22,110],[0,10,160]);
makeCam('CROWD FLOW',[0,30,80],[40,4,0]);
makeCam('MOSH PIT',[150,8,40],[150,4,10]);
makeCam('SKYCAM FIREWORKS',[80,140,200],[0,80,0]);
var cam=cams[0],camIdx=0,camTimer=0,camHold=8;

// ---------- lighting ----------
var hemi=new THREE.HemisphereLight(0xbfd9ff,0x223344,0.7);scene.add(hemi);
var sun=new THREE.DirectionalLight(0xffeecc,0.9);
sun.position.set(120,200,80);scene.add(sun);
var moon=new THREE.DirectionalLight(0x6688ff,0.0);
moon.position.set(-100,180,-60);scene.add(moon);

// ---------- ground ----------
(function(){
  var gg=new THREE.PlaneGeometry(900,900,1,1);trackGeo(gg);
  var gm=new THREE.MeshLambertMaterial({color:0x2a3320});trackMat(gm);
  var ground=new THREE.Mesh(gg,gm);
  ground.rotation.x=-Math.PI/2;
  ground.position.y=-0.05;
  scene.add(ground);

  // dirt path cross
  var pm=new THREE.MeshLambertMaterial({color:0x6b5638});trackMat(pm);
  var p1=new THREE.Mesh(new THREE.PlaneGeometry(280,16),pm);trackGeo(p1.geometry);
  p1.rotation.x=-Math.PI/2;p1.position.y=0.01;scene.add(p1);
  var p2=new THREE.Mesh(new THREE.PlaneGeometry(16,280),pm);trackGeo(p2.geometry);
  p2.rotation.x=-Math.PI/2;p2.position.y=0.01;scene.add(p2);

  // central plaza
  var plaza=new THREE.Mesh(new THREE.CircleGeometry(20,28),pm);trackGeo(plaza.geometry);
  plaza.rotation.x=-Math.PI/2;plaza.position.y=0.02;scene.add(plaza);
})();

// ---------- band & festival data ----------
var BAND_PARTS_A=['Neon','Velvet','Crystal','Ghost','Plastic','Solar','Echo','Iron','Lunar','Glass','Saturn','Ruby','Cosmic','Static','Honey','Diamond','Phantom','Atomic','Silver','Indigo','Wild','Riot','Holy','Wax','Cyber'];
var BAND_PARTS_B=['Tigers','Vultures','Pilots','Children','Wolves','Garden','Choir','Sons','Saints','Ghosts','Falcons','Dolls','Engine','Static','Bears','Knights','Empire','Hearts','Sirens','Foxes','Lions','Lights','Crows','Vipers','Bones'];
var BAND_SOLO=['Dj Helios','Lyra Storm','Mc Atlas','Saint Echo','Nova Reign','Velvet Vox','Kid Comet','Iris Bloom','Maxx Volt','Aria Phase'];
var GENRES=['ROCK','METAL','EDM','HOUSE','POP','K-POP','HIP-HOP','INDIE','ACOUSTIC','FOLK','SYNTHWAVE','PUNK','JAZZ','COMEDY'];
var STAGES=[
  {id:0,name:'MAIN STAGE EAST',short:'MAIN',pos:[150,0,0],dir:[-1,0,0],size:[44,28,22],color:0xff3df0,bias:['ROCK','METAL','EDM','POP']},
  {id:1,name:'BASS DOME WEST',short:'BASS',pos:[-150,0,0],dir:[1,0,0],size:[36,22,36],color:0x00f0ff,bias:['EDM','HOUSE','SYNTHWAVE']},
  {id:2,name:'ACOUSTIC GROVE NORTH',short:'GROVE',pos:[0,0,-150],dir:[0,0,1],size:[24,14,16],color:0xffb800,bias:['ACOUSTIC','FOLK','INDIE','JAZZ']},
  {id:3,name:'COMEDY POP SOUTH',short:'POP',pos:[0,0,150],dir:[0,0,-1],size:[28,18,18],color:0x9affb0,bias:['POP','K-POP','HIP-HOP','COMEDY']}
];
function rand(a){return a[(Math.random()*a.length)|0];}
function pickBand(stageBias){
  var n;
  if(Math.random()<0.25)n=rand(BAND_SOLO).toUpperCase();
  else n=(rand(BAND_PARTS_A)+' '+rand(BAND_PARTS_B)).toUpperCase();
  var g=Math.random()<0.7?rand(stageBias):rand(GENRES);
  return {name:n,genre:g};
}

// ---------- stage builder ----------
var stageObjects=[];
var soundBars=null,soundBarMatrix=null;
function buildStage(s){
  var grp=new THREE.Group();
  grp.position.set(s.pos[0],s.pos[1],s.pos[2]);
  // facing direction
  if(s.dir[0]<0)grp.rotation.y=Math.PI;
  else if(s.dir[0]>0)grp.rotation.y=0;
  else if(s.dir[2]>0)grp.rotation.y=-Math.PI/2;
  else grp.rotation.y=Math.PI/2;

  // platform
  var pg=new THREE.BoxGeometry(s.size[0],3,s.size[2]*0.55);trackGeo(pg);
  var pm=new THREE.MeshLambertMaterial({color:0x111418});trackMat(pm);
  var plat=new THREE.Mesh(pg,pm);plat.position.set(0,1.5,0);grp.add(plat);

  // back wall / LED
  var ww=s.size[0]*0.92,wh=s.size[1]*0.85;
  var wg=new THREE.BoxGeometry(ww,wh,1.2);trackGeo(wg);
  var wm=new THREE.MeshBasicMaterial({color:0x000000});trackMat(wm);
  var wall=new THREE.Mesh(wg,wm);wall.position.set(0,wh/2+3,-s.size[2]*0.25);grp.add(wall);

  // LED screen (emissive plane)
  var lcv=document.createElement('canvas');lcv.width=512;lcv.height=256;
  var ltx=new THREE.CanvasTexture(lcv);ltx.colorSpace=THREE.SRGBColorSpace;trackMat(ltx);
  var lm=new THREE.MeshBasicMaterial({map:ltx});trackMat(lm);
  var lg=new THREE.PlaneGeometry(ww*0.92,wh*0.7);trackGeo(lg);
  var led=new THREE.Mesh(lg,lm);led.position.set(0,wh/2+3,-s.size[2]*0.25+0.7);grp.add(led);

  // truss towers (left/right)
  var tg=new THREE.BoxGeometry(1.2,wh+6,1.2);trackGeo(tg);
  var tm=new THREE.MeshLambertMaterial({color:0x444444});trackMat(tm);
  var tL=new THREE.Mesh(tg,tm);tL.position.set(-s.size[0]/2+1,(wh+6)/2,-s.size[2]*0.18);grp.add(tL);
  var tR=new THREE.Mesh(tg,tm);tR.position.set(s.size[0]/2-1,(wh+6)/2,-s.size[2]*0.18);grp.add(tR);
  // top truss
  var ttg=new THREE.BoxGeometry(s.size[0]-2,1,1);trackGeo(ttg);
  var topT=new THREE.Mesh(ttg,tm);topT.position.set(0,wh+6,-s.size[2]*0.18);grp.add(topT);

  // speakers L/R
  var spg=new THREE.BoxGeometry(2.4,5,2.4);trackGeo(spg);
  var spm=new THREE.MeshLambertMaterial({color:0x080808});trackMat(spm);
  var spL=new THREE.Mesh(spg,spm);spL.position.set(-s.size[0]/2+3,5,2);grp.add(spL);
  var spR=new THREE.Mesh(spg,spm);spR.position.set(s.size[0]/2-3,5,2);grp.add(spR);

  // moving lights (cones)
  var mlGeo=new THREE.ConeGeometry(0.5,1.2,8);trackGeo(mlGeo);
  var mlMat=new THREE.MeshBasicMaterial({color:s.color});trackMat(mlMat);
  var lights=[];
  for(var k=0;k<6;k++){
    var ml=new THREE.Mesh(mlGeo,mlMat);
    ml.position.set(-s.size[0]/2+3+(k*((s.size[0]-6)/5)),wh+5.5,-s.size[2]*0.18);
    ml.rotation.x=Math.PI;
    grp.add(ml);lights.push(ml);
  }
  // beam cones (additive transparent)
  var beamGeo=new THREE.ConeGeometry(6,30,12,1,true);trackGeo(beamGeo);
  var beamMat=new THREE.MeshBasicMaterial({color:s.color,transparent:true,opacity:0.10,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});trackMat(beamMat);
  var beams=[];
  for(var b=0;b<4;b++){
    var bm=new THREE.Mesh(beamGeo,beamMat);
    bm.position.set(-s.size[0]/2+8+b*((s.size[0]-16)/3),wh+5,-s.size[2]*0.18);
    bm.rotation.x=Math.PI;
    grp.add(bm);beams.push(bm);
  }

  // crowd barrier rail
  var rg=new THREE.BoxGeometry(s.size[0]*0.95,0.4,0.4);trackGeo(rg);
  var rm=new THREE.MeshLambertMaterial({color:0x222});trackMat(rm);
  var rail=new THREE.Mesh(rg,rm);rail.position.set(0,1.2,s.size[2]*0.55*0.5+5);grp.add(rail);

  // PA flags
  var flagMat=trackMat(new THREE.MeshBasicMaterial({color:s.color}));
  var flagGeo=trackGeo(new THREE.PlaneGeometry(2.4,1.4));
  var f1=new THREE.Mesh(flagGeo,flagMat);f1.position.set(-s.size[0]/2+1,wh+8,-s.size[2]*0.18);grp.add(f1);
  var f2=new THREE.Mesh(flagGeo,flagMat);f2.position.set(s.size[0]/2-1,wh+8,-s.size[2]*0.18);grp.add(f2);

  scene.add(grp);
  return {group:grp,led:led,ledCanvas:lcv,ledTex:ltx,lights:lights,lightMat:mlMat,beams:beams,beamMat:beamMat,wh:wh,size:s.size,color:s.color,name:s.name,short:s.short,pos:s.pos.slice(),idx:s.id};
}

// build all stages
function buildAllStages(){
  for(var i=0;i<STAGES.length;i++){
    stageObjects.push(buildStage(STAGES[i]));
  }
}

// ---------- environment props ----------
function buildProps(){
  // food trucks at corners of plaza
  var ftGeo=trackGeo(new THREE.BoxGeometry(6,4,3));
  var colors=[0xff4466,0xffaa22,0x44aaff,0x66cc66];
  for(var i=0;i<4;i++){
    var fm=trackMat(new THREE.MeshLambertMaterial({color:colors[i]}));
    var ft=new THREE.Mesh(ftGeo,fm);
    var ang=i*Math.PI/2+Math.PI/4;
    ft.position.set(Math.cos(ang)*30,2,Math.sin(ang)*30);
    ft.rotation.y=-ang;
    scene.add(ft);
  }
  // porta-potty rows
  var ppGeo=trackGeo(new THREE.BoxGeometry(1.4,2.4,1.4));
  var ppMat=trackMat(new THREE.MeshLambertMaterial({color:0x88ccaa}));
  for(var p=0;p<8;p++){
    var pp=new THREE.Mesh(ppGeo,ppMat);
    pp.position.set(-90+p*2.2,1.2,90);scene.add(pp);
  }
  // VIP tent
  var vg=trackGeo(new THREE.ConeGeometry(8,5,8));
  var vm=trackMat(new THREE.MeshLambertMaterial({color:0xffd866}));
  var vip=new THREE.Mesh(vg,vm);vip.position.set(85,2.5,-85);scene.add(vip);
  // tent pole / flag
  var pg=trackGeo(new THREE.PlaneGeometry(1.6,1));
  var pm=trackMat(new THREE.MeshBasicMaterial({color:0xff3df0,side:THREE.DoubleSide}));
  var pf=new THREE.Mesh(pg,pm);pf.position.set(85,7,-85);scene.add(pf);

  // ferris wheel (background)
  var fwGrp=new THREE.Group();fwGrp.position.set(-180,18,-180);
  var hubG=trackGeo(new THREE.CylinderGeometry(1,1,2,12));
  var hubM=trackMat(new THREE.MeshLambertMaterial({color:0x666666}));
  var hub=new THREE.Mesh(hubG,hubM);hub.rotation.x=Math.PI/2;fwGrp.add(hub);
  var rimG=trackGeo(new THREE.TorusGeometry(16,0.4,6,28));
  var rimM=trackMat(new THREE.MeshBasicMaterial({color:0x884488}));
  var rim=new THREE.Mesh(rimG,rimM);fwGrp.add(rim);
  var carG=trackGeo(new THREE.BoxGeometry(1.6,1.4,1.6));
  for(var c=0;c<10;c++){
    var ang2=c/10*Math.PI*2;
    var cm=trackMat(new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(c/10,0.8,0.6)}));
    var car=new THREE.Mesh(carG,cm);
    car.position.set(Math.cos(ang2)*16,Math.sin(ang2)*16,0);
    fwGrp.add(car);
  }
  fwGrp.userData.spin=true;
  scene.add(fwGrp);
  state.ferris=fwGrp;

  // inflatable art
  var artG=trackGeo(new THREE.SphereGeometry(6,16,12));
  var artM=trackMat(new THREE.MeshLambertMaterial({color:0xff66dd,emissive:0x442233}));
  var art=new THREE.Mesh(artG,artM);art.position.set(0,8,0);scene.add(art);
  state.art=art;

  // trees around grove
  var trG=trackGeo(new THREE.ConeGeometry(3,8,7));
  var trM=trackMat(new THREE.MeshLambertMaterial({color:0x2c5028}));
  var trkG=trackGeo(new THREE.CylinderGeometry(0.4,0.5,3,6));
  var trkM=trackMat(new THREE.MeshLambertMaterial({color:0x553322}));
  for(var t=0;t<28;t++){
    var rad=60+Math.random()*40;
    var an=Math.PI+(Math.random()-0.5)*1.2;
    var x=Math.cos(an)*rad,z=-150+Math.sin(an)*rad*0.5;
    if(Math.abs(x)<26&&Math.abs(z+150)<22)continue;
    var trunk=new THREE.Mesh(trkG,trkM);trunk.position.set(x,1.5,z);scene.add(trunk);
    var tree=new THREE.Mesh(trG,trM);tree.position.set(x,7,z);scene.add(tree);
  }

  // camp tents (background SE area)
  var tentG=trackGeo(new THREE.ConeGeometry(1.4,1.6,4));
  for(var ct=0;ct<40;ct++){
    var tcol=new THREE.Color().setHSL(Math.random(),0.6,0.5);
    var tm2=trackMat(new THREE.MeshLambertMaterial({color:tcol}));
    var tent=new THREE.Mesh(tentG,tm2);
    tent.position.set(120+Math.random()*60,0.8,90+Math.random()*60);
    tent.rotation.y=Math.random()*Math.PI;
    scene.add(tent);
  }

  // distant mountains (low-poly cones)
  var mG=trackGeo(new THREE.ConeGeometry(60,40,5));
  var mM=trackMat(new THREE.MeshLambertMaterial({color:0x445566}));
  for(var mn=0;mn<8;mn++){
    var an2=mn/8*Math.PI*2;
    var mt=new THREE.Mesh(mG,mM);

// ---------- crowd (InstancedMesh) ----------
var CROWD_N=260;
var crowdMesh=null,crowdData=[],dummy=new THREE.Object3D();
var crowdColors=null;
function buildCrowd(){
  var bg=trackGeo(new THREE.BoxGeometry(0.55,1.7,0.4));
  var bm=trackMat(new THREE.MeshLambertMaterial({color:0xffffff,vertexColors:false}));
  // we use per-instance color via MeshLambertMaterial + setColorAt
  crowdMesh=new THREE.InstancedMesh(bg,bm,CROWD_N);
  crowdMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  // init color buffer
  crowdMesh.instanceColor=null;
  var colArr=new Float32Array(CROWD_N*3);
  for(var i=0;i<CROWD_N;i++){
    var c=new THREE.Color().setHSL(Math.random(),0.6+Math.random()*0.3,0.45+Math.random()*0.3);
    colArr[i*3]=c.r;colArr[i*3+1]=c.g;colArr[i*3+2]=c.b;
  }
  crowdMesh.instanceColor=new THREE.InstancedBufferAttribute(colArr,3);
  scene.add(crowdMesh);

  // populate metadata
  crowdData.length=0;
  for(var k=0;k<CROWD_N;k++){
    // assign home stage by lottery weighted
    var st=(k%STAGES.length+(Math.random()<0.3?(Math.random()*4|0):0))%STAGES.length;
    var d={
      home:st,
      target:st,
      pos:new THREE.Vector3(),
      vel:new THREE.Vector3(),
      phase:Math.random()*Math.PI*2,
      moshing:false,
      raised:false,
      bouncing:false,
      moveTimer:0,
      idleY:0,
      role:Math.random()
    };
    placeNearStage(d,st);
    crowdData.push(d);
  }
}
function placeNearStage(d,si){
  var s=STAGES[si];
  // crowd zone in front of stage (stage faces inward)
  var fx=-s.dir[0],fz=-s.dir[2];
  var ox=s.pos[0]+fx*(20+Math.random()*60);
  var oz=s.pos[2]+fz*(20+Math.random()*60);
  // lateral spread perpendicular to dir
  var px=-s.dir[2],pz=s.dir[0];
  var lat=(Math.random()-0.5)*60;
  d.pos.set(ox+px*lat,0,oz+pz*lat);
  d.target=si;
}

var fireworks=[];
function launchFirework(x,y,z){
  var n=40;

  var velArr=[];

    colArr[i*3]=col.r;colArr[i*3+1]=col.g;colArr[i*3+2]=col.b;
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(posArr,3));
  g.setAttribute('color',new THREE.BufferAttribute(colArr,3));

// ---------- schedule generator ----------
function buildSchedule(){
  state.schedule.length=0;
  // headliner: choose stage 0 last band
  for(var s=0;s<STAGES.length;s++){
    for(var b=0;b<3;b++){
      var bd=pickBand(STAGES[s].bias);
      var startMin=10+b*40+s*4; // staggered
      var dur=30+(b===2?12:0);
      var isHeadliner=(s===0&&b===2);
      state.schedule.push({stage:s,band:bd.name,genre:bd.genre,start:startMin,dur:dur,headliner:isHeadliner});
    }
  }
  state.schedule.sort(function(a,b){return a.start-b.start;});
  state.slotIdx=[0,0,0,0];
  state.currentSlots=[null,null,null,null];
}

// ---------- LED screen drawing ----------
function drawLED(stageObj,band,beatPhase,timeNow){
  var c=stageObj.ledCanvas,ctx=c.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
  // background bars (genre tied)
  var hue=Math.abs(timeNow*40)%360;
  ctx.save();
  for(var i=0;i<24;i++){
    var v=Math.abs(Math.sin(beatPhase*2+i*0.4));
    ctx.fillStyle='hsl('+((hue+i*8)%360)+',90%,'+(30+v*40)+'%)';
    ctx.fillRect(i*(c.width/24),c.height*(0.3+v*0.5),c.width/24-1,c.height*0.6);
  }
  ctx.restore();
  // band name
  ctx.fillStyle='#fff';
  ctx.font='bold 56px Helvetica, Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#ff3df0';ctx.shadowBlur=20;
  ctx.fillText(band||'AURORAFEST',c.width/2,c.height*0.32);
  ctx.shadowBlur=0;
  ctx.font='bold 22px Helvetica, Arial';
  ctx.fillStyle='#ffb800';
  ctx.fillText(stageObj.name,c.width/2,c.height*0.6);
  stageObj.ledTex.needsUpdate=true;
}

// ---------- mosh / behavior helpers ----------
function genreBPM(g){
  if(g==='METAL'||g==='PUNK')return 160;
  if(g==='ROCK')return 130;
  if(g==='EDM'||g==='HOUSE'||g==='SYNTHWAVE')return 132;
  if(g==='POP'||g==='K-POP')return 118;
  if(g==='HIP-HOP')return 96;
  if(g==='ACOUSTIC'||g==='FOLK'||g==='JAZZ')return 78;
  if(g==='COMEDY')return 60;
  return 110;
}
function genreBehavior(g){
  if(g==='METAL'||g==='PUNK'||g==='ROCK')return 'mosh';
  if(g==='EDM'||g==='HOUSE'||g==='SYNTHWAVE')return 'rave';
  if(g==='POP'||g==='K-POP')return 'wave';
  if(g==='HIP-HOP')return 'bounce';
  if(g==='ACOUSTIC'||g==='FOLK'||g==='JAZZ')return 'sway';
  return 'sway';
}

// ---------- render loop ----------
var clock=new THREE.Clock();
var skyDay=new THREE.Color(0x88aacc);
var skySunset=new THREE.Color(0xff8a3c);
var skyNight=new THREE.Color(0x0a0820);
var fogDay=new THREE.Color(0xa8c0dc);
var fogSunset=new THREE.Color(0xff6a3a);
var fogNight=new THREE.Color(0x141233);

function tick(){
  requestAnimationFrame(tick);
  var dt=Math.min(0.05,clock.getDelta());
  state.t+=dt;
  var p=state.t/state.cycleLen; // 0..1

  // sky / fog cycle
  var sk=new THREE.Color(),fg=new THREE.Color();
  if(p<0.5){
    // day -> early evening
    var u=p/0.5;
    sk.copy(skyDay).lerp(skySunset,u*0.4);
    fg.copy(fogDay).lerp(fogSunset,u*0.4);
    sun.intensity=0.9-u*0.2;
    moon.intensity=0;
    hemi.intensity=0.7-u*0.2;
  }else if(p<0.78){
    var u2=(p-0.5)/0.28;
    sk.copy(skySunset).lerp(skyNight,u2);
    fg.copy(fogSunset).lerp(fogNight,u2);
    sun.intensity=0.7-u2*0.7;
    moon.intensity=u2*0.4;
    hemi.intensity=0.5-u2*0.35;
  }else{
    sk.copy(skyNight);fg.copy(fogNight);
    sun.intensity=0;moon.intensity=0.45;hemi.intensity=0.18;
  }
  scene.background.copy(sk);
  scene.fog.color.copy(fg);

  // events
  for(var e=0;e<state.events.length;e++){
    var ev=state.events[e];
    if(!ev.fired&&state.t>=ev.t){ev.fired=true;ev.fn();}
  }

  // schedule activation: convert sim minutes to current minute
  var simMin=p*8*60;
  for(var sl=0;sl<state.schedule.length;sl++){
    var item=state.schedule[sl];
    var stIdx=item.stage;
    if(simMin>=item.start&&simMin<item.start+item.dur){
      if(state.currentSlots[stIdx]!==item){
        // deactivate old (if any) only if older
        if(!state.currentSlots[stIdx]||state.currentSlots[stIdx].start<item.start){
          activateSlot(stIdx,item);
        }
      }
    }else if(state.currentSlots[stIdx]===item&&simMin>=item.start+item.dur){
      deactivateSlot(stIdx);
      refreshNowPlaying();
    }
  }

  // stage visuals
  for(var i=0;i<stageObjects.length;i++){
    var so=stageObjects[i];
    var slot=state.currentSlots[so.idx];
    var bpm=slot?genreBPM(slot.genre):60;
    var beat=state.t*(bpm/60)*Math.PI;
    drawLED(so,slot?slot.band:null,beat,state.t);
    // moving light intensity / colors
    var pulse=0.5+0.5*Math.sin(beat*2);
    so.lightMat.color.setHSL(((state.t*0.2)+i*0.13)%1,0.9,0.4+pulse*0.4);
    // beam swing
    for(var bi=0;bi<so.beams.length;bi++){
      so.beams[bi].rotation.z=Math.sin(state.t*1.5+bi)*0.8;
      so.beams[bi].material.opacity=slot?0.10+pulse*0.18:0.04;
    }
    // light tilt
    for(var li=0;li<so.lights.length;li++){
      so.lights[li].rotation.z=Math.sin(state.t*1.2+li*0.7)*0.6;
    }
  }

  // crowd update
  if(crowdMesh){
    var instCol=crowdMesh.instanceColor;
    for(var ci=0;ci<crowdData.length;ci++){
      var d=crowdData[ci];
      var sObj=stageObjects[d.target];
      var slotT=state.currentSlots[d.target];
      var beh=slotT?genreBehavior(slotT.genre):'idle';
      var bpm2=slotT?genreBPM(slotT.genre):72;
      var beat2=state.t*(bpm2/60)*Math.PI;
      // movement: if moveTimer>0, drift toward target zone
      var stage=STAGES[d.target];
      var fx=-stage.dir[0],fz=-stage.dir[2];
      var px=-stage.dir[2],pz=stage.dir[0];
      var anchorX=stage.pos[0]+fx*(20+(d.role*60));
      var anchorZ=stage.pos[2]+fz*(20+(d.role*60));
      var lat=(d.phase-Math.PI)*8;
      anchorX+=px*lat;anchorZ+=pz*lat;
      var dx=anchorX-d.pos.x,dz=anchorZ-d.pos.z;
      var dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>1){
        var sp=Math.min(6,dist*1.2);
        d.pos.x+=(dx/dist)*sp*dt;
        d.pos.z+=(dz/dist)*sp*dt;
      }
      // behavior offset
      var ox=0,oy=0,oz=0,rotY=0,sclY=1;
      if(beh==='mosh'){
        var mosh=Math.sin(beat2*0.7+d.phase*5)*1.2;
        ox=mosh;oz=Math.cos(beat2*0.7+d.phase)*1.2;
        oy=Math.abs(Math.sin(beat2*0.7+d.phase))*0.3;
      }else if(beh==='rave'){
        oy=Math.abs(Math.sin(beat2+d.phase))*0.6;
        sclY=1+Math.sin(beat2+d.phase)*0.2;
      }else if(beh==='wave'){
        oy=Math.sin(beat2*0.5+d.phase+d.pos.x*0.05)*0.4;
      }else if(beh==='bounce'){
        oy=Math.abs(Math.sin(beat2*0.8+d.phase))*0.5;
      }else if(beh==='sway'){
        ox=Math.sin(beat2*0.3+d.phase)*0.3;
        rotY=Math.sin(beat2*0.3+d.phase)*0.25;
      }else{
        ox=Math.sin(state.t*0.5+d.phase)*0.1;
      }
      dummy.position.set(d.pos.x+ox,0.85+oy,d.pos.z+oz);
      dummy.rotation.y=rotY+(d.phase);
      dummy.scale.set(1,sclY,1);
      dummy.updateMatrix();
      crowdMesh.setMatrixAt(ci,dummy.matrix);
    }
    crowdMesh.instanceMatrix.needsUpdate=true;
  }

  // dust drift
  if(dustGeo){
    var pa=dustGeo.attributes.position.array;
    for(var di=0;di<DUST_N;di++){
      pa[di*3]+=dustVel[di].x*dt*5;
      pa[di*3+1]+=dustVel[di].y*dt*5;
      pa[di*3+2]+=dustVel[di].z*dt*5;
      if(pa[di*3+1]>40)pa[di*3+1]=2;
      if(Math.abs(pa[di*3])>200)pa[di*3]*=-0.95;
      if(Math.abs(pa[di*3+2])>200)pa[di*3+2]*=-0.95;
    }
    dustGeo.attributes.position.needsUpdate=true;
  }

  // lasers (from bass dome)
  for(var li2=0;li2<laserLines.length;li2++){
    var L=laserLines[li2];
    var ox2=Math.cos(state.t*L.speed+L.phase)*60;
    var oz2=Math.sin(state.t*L.speed+L.phase)*60;
    var pa2=L.geo.attributes.position.array;
    pa2[0]=-150;pa2[1]=18;pa2[2]=0;
    pa2[3]=-150+ox2;pa2[4]=2;pa2[5]=oz2;
    L.geo.attributes.position.needsUpdate=true;
    L.mat.opacity=0.3+Math.sin(state.t*4+L.phase)*0.3;
  }

  // ferris wheel spin
  if(state.ferris)state.ferris.rotation.z+=dt*0.3;
  // art bob
  if(state.art){state.art.position.y=8+Math.sin(state.t*0.6)*0.6;state.art.rotation.y+=dt*0.2;}

  // fireworks night
  if(p>0.85&&Math.random()<0.04){
    launchFirework((Math.random()-0.5)*200,80+Math.random()*40,(Math.random()-0.5)*200);
  }
  // launch one for headliner reveal too
  for(var fi=fireworks.length-1;fi>=0;fi--){
    var fw=fireworks[fi];
    fw.life+=dt;
    var posA=fw.geo.attributes.position.array;
    for(var pi=0;pi<fw.vel.length;pi++){
      posA[pi*3]+=fw.vel[pi].x*dt;
      posA[pi*3+1]+=fw.vel[pi].y*dt;
      posA[pi*3+2]+=fw.vel[pi].z*dt;
      fw.vel[pi].y-=8*dt;
    }
    fw.geo.attributes.position.needsUpdate=true;
    fw.mat.opacity=Math.max(0,1-fw.life/fw.max);
    if(fw.life>fw.max){
      scene.remove(fw.pts);
      fw.geo.dispose();fw.mat.dispose();
      fireworks.splice(fi,1);
    }
  }

  // camera switching
  camTimer+=dt;
  if(camTimer>camHold){
    var next=(camIdx+1)%cams.length;
    // weight: during night go to fireworks more
    if(p>0.9&&Math.random()<0.5)next=7;
    if(p>0.78&&p<0.85&&Math.random()<0.5)next=1; // headliner main
    switchCam(next);
  }
  // tiny camera jitter for handheld feel
  var cj=Math.sin(state.t*1.7)*0.15;
  cam.position.y+=Math.sin(state.t*2.1)*0.005;
  cam.rotation.z=Math.sin(state.t*0.5)*0.005;

  // periodic UI refresh (cheap, every ~0.5s)
  if(!state.lastTickerUpdate||state.t-state.lastTickerUpdate>0.4){
    state.lastTickerUpdate=state.t;
    refreshScheduleUI();
    refreshMeters();
    refreshClock();
    refreshCountdown();
  }

  renderer.render(scene,cam);

  // reseed forever
  if(state.t>state.cycleLen){
    reseed();
  }
}
clock.start();
state.cycleStart=performance.now()/1000;
showBanner('AURORAFEST 2026','GATES OPEN · DAY 2',3500);
ancMsg('Welcome to AURORAFEST 2026 — twelve acts, four stages, one unforgettable night.','DJ NOVA');
tick();

// resize
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);
  for(var i=0;i<cams.length;i++){
    cams[i].aspect=W/H;cams[i].updateProjectionMatrix();
  }
});
})();
</script></body></html>
