<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QUANTUM PONG — TENNIS WITH THE SCHRÖDINGER EQUATION</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #02030a;
    color: #cfe9ff;
    font-family: 'Courier New', monospace;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    padding: 8px;
    box-sizing: border-box;
  }
  #title {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 4px;
    color: #7fdcff;
    text-shadow: 0 0 6px #2af, 0 0 12px #08c;
  }
  #hud {
    display: flex;
    width: 100%;
    max-width: 1000px;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 4px;
    color: #9fefff;
  }
  #hud .stat { color: #ff9bd0; text-shadow: 0 0 6px #f06; }
  #score { font-size: 22px; color: #ffffff; text-shadow: 0 0 8px #5cf, 0 0 16px #08f; letter-spacing: 3px; }
  canvas {
    display: block;
    background: #000;
    box-shadow: 0 0 24px #0af inset, 0 0 24px #08f;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #134;
  }
  #help {
    font-size: 11px;
    color: #6aa;
    margin-top: 6px;
    text-align: center;
    line-height: 1.5;
  }
  #help b { color: #9fe; }
  button {
    background: #022; color: #6df; border: 1px solid #088;
    font-family: inherit; font-size: 11px; padding: 3px 8px; cursor: pointer;
    margin: 0 4px;
  }
  button:hover { background: #044; box-shadow: 0 0 8px #0af; }
  button.on { background: #084; border-color: #0fa; color: #afc; }
</style>
</head>
<body>
<div id="wrap">
  <div id="title">QUANTUM PONG — TENNIS WITH THE SCHRÖDINGER EQUATION</div>
  <div id="hud">
    <div>Norm: <span id="norm">1.000</span></div>
    <div id="score">LEFT: 0 &nbsp;&nbsp; RIGHT: 0</div>
    <div class="stat">Decoherence: <span id="decoh">0.0%</span></div>
  </div>
  <canvas id="cv" width="800" height="400"></canvas>
  <div id="help">
    <b>W/S</b> left paddle &nbsp;|&nbsp; <b>↑/↓</b> right paddle &nbsp;|&nbsp;
    <button id="cpuBtn">CPU: ON</button>
    <button id="resetBtn">Reset Wave</button>
    <button id="kickBtn">Kick (impulse)</button>
    <br>
    Watch the wavepacket split into reflected + transmitted parts when it strikes a paddle (real quantum tunneling). Score @ 30% probability past goal line.
  </div>
</div>

<script>
"use strict";
/*
  QUANTUM PONG
  ------------
  Solves the 2D time-dependent Schrödinger equation
       i ħ ∂ψ/∂t = [ -ħ²/(2m) ∇² + V(x,y) ] ψ
  on a NX x NY grid with the second-order finite-difference Laplacian
  and an explicit symplectic-style leapfrog integrator that updates
  Re and Im parts in alternation:
       Re_{n+1} = Re_n + dt * H · Im_n
       Im_{n+1} = Im_n - dt * H · Re_{n+1}
  This is the Visscher integrator — it is unconditionally stable when
  dt is below the CFL bound and conserves the modified norm
       N = Σ ( Re_n² + Im_n · Im_{n+1} )
  to machine precision.  We renormalize lightly each frame to absorb
  numerical drift.
*/

(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d', { alpha: false });
  const W = cv.width, H = cv.height;

  // Grid resolution. Cell size in pixels = W/NX.
  const NX = 200;
  const NY = 100;
  const N  = NX * NY;
  const CELL_W = W / NX;
  const CELL_H = H / NY;

  // Physical / numerical params (natural units, ħ=1, m=1)
  const dx   = 1.0;
  const dt   = 0.18;          // chosen below CFL ≈ 0.5
  const HBAR = 1.0;
  const MASS = 1.0;
  const KIN  = HBAR * HBAR / (2.0 * MASS * dx * dx); // = 1/(2 dx²)

  // Wavefunction storage (typed for speed)
  const Re = new Float32Array(N);
  const Im = new Float32Array(N);
  const V  = new Float32Array(N); // potential
  const trail = new Float32Array(N); // decoherence trail
  // density buffer reused each frame
  const dens = new Float32Array(N);

  // Image buffer for the heatmap
  const img = ctx.createImageData(NX, NY);
  // Offscreen canvas for the cheap upscale
  const off = document.createElement('canvas');
  off.width = NX; off.height = NY;
  const offCtx = off.getContext('2d');
  const offImg = offCtx.createImageData(NX, NY);

  // -- Game state ------------------------------------------------------
  let scoreL = 0, scoreR = 0;
  let leftPaddleY  = NY * 0.5;
  let rightPaddleY = NY * 0.5;
  const PADDLE_HALF = 9;          // half-height in cells
  const PADDLE_W    = 3;          // width in cells
  const LEFT_PAD_X  = 18;
  const RIGHT_PAD_X = NX - 19;
  const PADDLE_V    = 0.55;       // potential height (eV-like, must be > E for partial barrier)
  const WALL_V      = 4.0;        // top/bottom walls
  const PADDLE_SPEED = 1.1;
  let cpuOn = true;
  let lastScoreSide = 'right';    // who lost previous round, launches from their side

  // Probability that already crossed each goal line this round
  let leakLeft = 0, leakRight = 0;
  // Decoherence stat (cumulative leak through paddles)
  let decoh = 0;

  // -- Inputs ----------------------------------------------------------
  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
        e.key === ' ') e.preventDefault();
  });
  window.addEventListener('keyup',   e=>{ keys[e.key.toLowerCase()] = false; });
  document.getElementById('cpuBtn').addEventListener('click', e=>{
    cpuOn = !cpuOn;
    e.target.textContent = 'CPU: ' + (cpuOn ? 'ON' : 'OFF');
    e.target.classList.toggle('on', cpuOn);
  });
  document.getElementById('resetBtn').addEventListener('click', ()=> resetWave(lastScoreSide));
  document.getElementById('kickBtn').addEventListener('click', ()=> kick());

  // -- Wavefunction setup ---------------------------------------------
  function gaussianPacket(cx, cy, kx, ky, sigma){
    let sumSq = 0;
    for (let j = 0; j < NY; j++){
      for (let i = 0; i < NX; i++){
        const idx = j*NX + i;
        const dxg = i - cx, dyg = j - cy;
        const r2  = dxg*dxg + dyg*dyg;
        const env = Math.exp(-r2/(2*sigma*sigma));
        const phase = kx*dxg + ky*dyg;
        Re[idx] = env * Math.cos(phase);
        Im[idx] = env * Math.sin(phase);
        sumSq += Re[idx]*Re[idx] + Im[idx]*Im[idx];
      }
    }
    // normalize so Σ |ψ|² dx dy = 1
    const norm = Math.sqrt(sumSq * dx * dx);
    const inv = 1.0 / norm;
    for (let k = 0; k < N; k++){ Re[k] *= inv; Im[k] *= inv; }
  }

  function resetWave(loserSide){
    // launch from the side of the player who lost (i.e., toward winner...
    // simpler: launch from loser side toward opponent)
    // Convention: if loser is 'left', the wave was sent to the left; relaunch from left moving right.
    leakLeft = 0; leakRight = 0;
    if (loserSide === 'left'){
      // launch from left side moving right
      gaussianPacket(NX*0.30, NY*0.5, 1.7, 0.0, 6.0);
    } else {
      gaussianPacket(NX*0.70, NY*0.5, -1.7, 0.0, 6.0);
    }
    // dampen trail a bit on reset for visual clarity
    for (let k = 0; k < N; k++) trail[k] *= 0.4;
  }

  function kick(){
    // Add a small momentum boost in current motion direction
    // by multiplying psi by exp(i*kx_extra*x).
    const kAdd = 0.6 * (Math.random() < 0.5 ? -1 : 1);
    for (let j = 0; j < NY; j++){
      for (let i = 0; i < NX; i++){
        const idx = j*NX + i;
        const c = Math.cos(kAdd*i), s = Math.sin(kAdd*i);
        const nr = Re[idx]*c - Im[idx]*s;
        const ni = Re[idx]*s + Im[idx]*c;
        Re[idx] = nr; Im[idx] = ni;
      }
    }
  }

  // -- Potential field ------------------------------------------------
  function rebuildPotential(){
    for (let k = 0; k < N; k++) V[k] = 0;

    // Top + bottom walls (3 cells thick, very high to fully reflect)
    for (let i = 0; i < NX; i++){
      for (let t = 0; t < 3; t++){
        V[t*NX + i]      = WALL_V;
        V[(NY-1-t)*NX+i] = WALL_V;
      }
    }
    // (We do NOT put walls on left/right - those are scoring zones.
    //  We rely on absorbing layers there.)

    // Paddles (finite barriers)
    paddleBarrier(LEFT_PAD_X,  leftPaddleY);
    paddleBarrier(RIGHT_PAD_X, rightPaddleY);
  }

  function paddleBarrier(cx, cy){
    const y0 = Math.max(3, Math.floor(cy - PADDLE_HALF));
    const y1 = Math.min(NY-3, Math.floor(cy + PADDLE_HALF));
    const x0 = Math.max(0, Math.floor(cx - PADDLE_W*0.5));
    const x1 = Math.min(NX-1, Math.floor(cx + PADDLE_W*0.5));
    for (let j = y0; j < y1; j++){
      for (let i = x0; i <= x1; i++){
        // smooth edges: full V in middle, half on borders
        const edge = (i === x0 || i === x1 || j === y0 || j === y1-1);
        V[j*NX + i] = edge ? PADDLE_V*0.7 : PADDLE_V;
      }
    }
  }

  // -- Time integration: Visscher staggered leapfrog -----------------
  // Re and Im are conceptually staggered by dt/2 in time;
  // the average density (Re_n² + Im_{n-1/2}*Im_{n+1/2}) is conserved.
  function step(){
    // 1) Update Re using current Im
    //    dRe/dt = +(1/ħ) [ -KIN ∇²Im + V·Im ] = (V*Im - KIN*Lap(Im)) / ħ
    // We use ħ = 1.
    for (let j = 1; j < NY-1; j++){
      const row = j*NX;
      for (let i = 1; i < NX-1; i++){
        const k = row + i;
        const lap = Im[k+1] + Im[k-1] + Im[k+NX] + Im[k-NX] - 4*Im[k];
        Re[k] += dt * (V[k]*Im[k] - KIN*lap);
      }
    }
    // 2) Update Im using new Re
    //    dIm/dt = -(1/ħ) [ -KIN ∇²Re + V·Re ] = -(V*Re - KIN*Lap(Re)) / ħ
    for (let j = 1; j < NY-1; j++){
      const row = j*NX;
      for (let i = 1; i < NX-1; i++){
        const k = row + i;
        const lap = Re[k+1] + Re[k-1] + Re[k+NX] + Re[k-NX] - 4*Re[k];
        Im[k] -= dt * (V[k]*Re[k] - KIN*lap);
      }
    }
    // 3) Absorbing boundary layers near left/right walls
    //    so that probability that "scored" doesn't bounce back.
    //    We multiply by a smooth mask < 1 near the edges and accumulate
    //    the lost probability into leakLeft/leakRight.
    const ABS = 12; // absorbing layer width in cells
    for (let j = 0; j < NY; j++){
      const row = j*NX;
      // Left edge
      for (let i = 0; i < ABS; i++){
        const k = row + i;
        const t = i / ABS; // 0 at boundary -> 1 at inner edge
        const mask = t*t; // smooth
        const before = Re[k]*Re[k] + Im[k]*Im[k];
        Re[k] *= mask; Im[k] *= mask;
        const after  = Re[k]*Re[k] + Im[k]*Im[k];
        leakLeft += (before - after);
      }
      // Right edge
      for (let i = 0; i < ABS; i++){
        const k = row + (NX-1-i);
        const t = i / ABS;
        const mask = t*t;
        const before = Re[k]*Re[k] + Im[k]*Im[k];
        Re[k] *= mask; Im[k] *= mask;
        const after  = Re[k]*Re[k] + Im[k]*Im[k];
        leakRight += (before - after);
      }
    }
  }

  // -- Compute density and totals -------------------------------------
  function computeDensity(){
    let total = 0;
    for (let k = 0; k < N; k++){
      const d = Re[k]*Re[k] + Im[k]*Im[k];
      dens[k] = d;
      total += d;
    }
    return total * dx * dx;
  }

  // Renormalize so total mass on the playing field stays bounded
  // (we let "leak" through goal lines reduce it; we only renormalize
  //  small numerical drift, NOT the physically meaningful leak.)
  function gentleRenormalize(){
    // The full conserved quantity is total + leakLeft + leakRight + decoh.
    // We expect this sum ≈ 1 always.  Correct slow drift only.
    let total = 0;
    for (let k = 0; k < N; k++) total += dens[k];
    total *= dx*dx;
    const expected = 1.0 - leakLeft - leakRight - decoh;
    if (expected > 1e-6 && total > 1e-9){
      const scale = Math.sqrt(expected / total);
      // Only rescale if drift > 0.5%
      if (Math.abs(scale - 1) > 0.005){
        for (let k = 0; k < N; k++){ Re[k] *= scale; Im[k] *= scale; }
      }
    }
  }

  // -- Decoherence trail (visualization of probability inside paddles) -
  function updateTrail(){
    // any density that is currently inside a paddle barrier is "leaking through"
    // we record it and slowly fade.
    let added = 0;
    // left paddle area
    let y0 = Math.max(3, Math.floor(leftPaddleY - PADDLE_HALF));
    let y1 = Math.min(NY-3, Math.floor(leftPaddleY + PADDLE_HALF));
    let x0 = Math.max(0, Math.floor(LEFT_PAD_X - PADDLE_W*0.5));
    let x1 = Math.min(NX-1, Math.floor(LEFT_PAD_X + PADDLE_W*0.5));
    for (let j = y0; j < y1; j++){
      for (let i = x0; i <= x1; i++){
        const k = j*NX + i;
        added += dens[k];
        trail[k] = Math.max(trail[k], dens[k]*4);
      }
    }
    y0 = Math.max(3, Math.floor(rightPaddleY - PADDLE_HALF));
    y1 = Math.min(NY-3, Math.floor(rightPaddleY + PADDLE_HALF));
    x0 = Math.max(0, Math.floor(RIGHT_PAD_X - PADDLE_W*0.5));
    x1 = Math.min(NX-1, Math.floor(RIGHT_PAD_X + PADDLE_W*0.5));
    for (let j = y0; j < y1; j++){
      for (let i = x0; i <= x1; i++){
        const k = j*NX + i;
        added += dens[k];
        trail[k] = Math.max(trail[k], dens[k]*4);
      }
    }
    decoh += added * dx * dx * 0.01; // tiny accumulation
    // fade trail
    for (let k = 0; k < N; k++) trail[k] *= 0.94;
  }

  // -- Rendering ------------------------------------------------------
  // Color map: dark navy -> blue -> cyan -> white
  function colorMap(v){
    // v in [0,1]
    v = Math.max(0, Math.min(1, v));
    let r, g, b;
    if (v < 0.25){
      const t = v / 0.25;
      r = 4 + t*8;  g = 6 + t*30;  b = 30 + t*120;
    } else if (v < 0.55){
      const t = (v - 0.25)/0.30;
      r = 12;        g = 36 + t*180; b = 150 + t*100;
    } else if (v < 0.85){
      const t = (v-0.55)/0.30;
      r = 12 + t*200;  g = 216 + t*39; b = 250;
    } else {
      const t = (v-0.85)/0.15;
      r = 212 + t*43;  g = 255;        b = 250 + t*5;
    }
    return [r|0, g|0, b|0];
  }

  function render(){
    // Find max density for normalization (skip if too small)
    let maxD = 1e-9;
    for (let k = 0; k < N; k++) if (dens[k] > maxD) maxD = dens[k];
    const inv = 1 / maxD;
    const data = offImg.data;

    for (let j = 0; j < NY; j++){
      for (let i = 0; i < NX; i++){
        const k = j*NX + i;
        let v = dens[k] * inv;
        // log-ish boost for tails
        v = Math.pow(v, 0.55);
        // add trail
        const tr = Math.min(1, trail[k] * 8);
        const cell = colorMap(v);
        // overlay potential as cyan glow
        let r = cell[0], g = cell[1], b = cell[2];
        if (V[k] > 0.001){
          // paddle / wall — render as a soft magenta-cyan bar
          const vt = Math.min(1, V[k]/PADDLE_V);
          r = Math.min(255, r*0.3 + 250*vt);
          g = Math.min(255, g*0.3 + 80*vt);
          b = Math.min(255, b*0.3 + 200*vt);
        }
        // trail: pinkish faint overlay
        if (tr > 0.01){
          r = Math.min(255, r + tr*200);
          g = Math.min(255, g + tr*60);
          b = Math.min(255, b + tr*150);
        }
        const p = k*4;
        data[p]   = r;
        data[p+1] = g;
        data[p+2] = b;
        data[p+3] = 255;
      }
    }
    offCtx.putImageData(offImg, 0, 0);
    // upscale to canvas
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, NX, NY, 0, 0, W, H);

    // Goal lines
    ctx.strokeStyle = 'rgba(80,255,200,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(8, 0); ctx.lineTo(8, H);
    ctx.moveTo(W-8, 0); ctx.lineTo(W-8, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Score-progress bars
    ctx.fillStyle = 'rgba(255,80,160,0.6)';
    ctx.fillRect(2, H - leakLeft*H, 4, leakLeft*H);
    ctx.fillStyle = 'rgba(80,180,255,0.6)';
    ctx.fillRect(W-6, H - leakRight*H, 4, leakRight*H);

    // Center of mass marker
    let cmx = 0, cmy = 0, mass = 0;
    for (let j = 0; j < NY; j++){
      for (let i = 0; i < NX; i++){
        const d = dens[j*NX+i];
        cmx += d*i; cmy += d*j; mass += d;
      }
    }
    if (mass > 1e-6){
      cmx /= mass; cmy /= mass;
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(cmx*CELL_W, cmy*CELL_H, 4, 0, 6.283);
      ctx.stroke();
    }
  }

  // -- Score handling -------------------------------------------------
  function checkScore(){
    if (leakLeft  > 0.30){
      // probability passed left goal -> RIGHT scored
      scoreR++;
      lastScoreSide = 'left';
      updateScore();
      resetWave('left');
    } else if (leakRight > 0.30){
      scoreL++;
      lastScoreSide = 'right';
      updateScore();
      resetWave('right');
    }
  }
  function updateScore(){
    document.getElementById('score').innerHTML =
      'LEFT: ' + scoreL + ' &nbsp;&nbsp; RIGHT: ' + scoreR;
  }

  // -- Paddle controls ------------------------------------------------
  function updatePaddles(){
    if (keys['w']) leftPaddleY -= PADDLE_SPEED;
    if (keys['s']) leftPaddleY += PADDLE_SPEED;
    if (cpuOn){
      // CPU: track center of mass of right half of density
      let cy = 0, m = 0;
      for (let j = 0; j < NY; j++){
        for (let i = NX/2; i < NX; i++){
          const d = dens[j*NX+i];
          cy += d*j; m += d;
        }
      }
      if (m > 1e-6){
        cy /= m;
        const targetErr = cy - rightPaddleY;
        rightPaddleY += Math.sign(targetErr) * Math.min(Math.abs(targetErr), 0.85);
      }
    } else {
      if (keys['arrowup'])   rightPaddleY -= PADDLE_SPEED;
      if (keys['arrowdown']) rightPaddleY += PADDLE_SPEED;
    }
    // clamp
    leftPaddleY  = Math.max(PADDLE_HALF+3, Math.min(NY-PADDLE_HALF-3, leftPaddleY));
    rightPaddleY = Math.max(PADDLE_HALF+3, Math.min(NY-PADDLE_HALF-3, rightPaddleY));
  }

  // -- Main loop ------------------------------------------------------
  let frame = 0;
  function loop(){
    updatePaddles();
    rebuildPotential();
    // Multiple physics substeps per render for snappier motion
    const SUBSTEPS = 3;
    for (let s = 0; s < SUBSTEPS; s++) step();

    const totalNorm = computeDensity();
    updateTrail();
    gentleRenormalize();
    checkScore();
    render();

    if ((frame++ & 7) === 0){
      document.getElementById('norm').textContent =
        (totalNorm + leakLeft + leakRight + decoh).toFixed(3);
      document.getElementById('decoh').textContent =
        (decoh*100).toFixed(1) + '%';
    }
    requestAnimationFrame(loop);
  }

  // -- Boot -----------------------------------------------------------
  resetWave('right');
  rebuildPotential();
  updateScore();
  document.getElementById('cpuBtn').classList.add('on');
  loop();
})();
</script>
</body>
</html>
