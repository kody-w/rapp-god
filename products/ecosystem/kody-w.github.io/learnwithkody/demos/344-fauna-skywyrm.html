<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Skywyrm · Learn with Kody</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230b0d10'/%3E%3Cellipse cx='16' cy='17' rx='8' ry='10' fill='%237cf0c8'/%3E%3C/svg%3E">
<style>
  :root{
    --ink:#eaf6ff; --dim:#8fb0c8; --line:rgba(150,200,255,.16);
    --panel:rgba(10,16,28,.62); --panel2:rgba(8,12,22,.82);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#03060d;color:var(--ink);
    font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0;display:block}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* top-left control cluster */
  #hud{position:fixed;top:16px;left:16px;z-index:5;max-width:min(92vw,420px);
    display:flex;flex-direction:column;gap:10px;pointer-events:none}
  .card{pointer-events:auto;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;backdrop-filter:blur(14px) saturate(1.3);
    -webkit-backdrop-filter:blur(14px) saturate(1.3);
    box-shadow:0 18px 60px -24px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.05)}
  #title-card{padding:13px 15px 12px}
  .kicker{font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--dim);font-weight:600;margin-bottom:5px}
  #cname{font-size:21px;font-weight:700;line-height:1.12;letter-spacing:-.01em;
    background:linear-gradient(96deg,#c9fff0,#8fd6ff 55%,#c9a9ff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .meta{display:flex;align-items:center;gap:9px;margin-top:8px;flex-wrap:wrap}
  #cid{font-family:var(--mono);font-size:12px;color:#7fe9ff;
    background:rgba(20,60,80,.35);border:1px solid rgba(120,220,255,.2);
    padding:2px 8px;border-radius:7px;letter-spacing:.04em}
  #crare{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    padding:3px 9px;border-radius:20px;border:1px solid currentColor}
  .caption{font-size:11.5px;color:var(--dim);margin-top:10px;line-height:1.5}
  .caption b{color:#bfe4ff;font-weight:600}

  #btns{display:flex;gap:8px;flex-wrap:wrap}
  button{pointer-events:auto;font-family:var(--sans);font-size:12.5px;font-weight:600;
    color:var(--ink);background:var(--panel);border:1px solid var(--line);
    padding:9px 13px;border-radius:12px;cursor:pointer;letter-spacing:.01em;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    transition:transform .12s ease,border-color .18s ease,background .18s ease}
  button:hover{border-color:rgba(150,220,255,.42);background:rgba(20,32,52,.7);
    transform:translateY(-1px)}
  button:active{transform:translateY(0)}
  #b-new{background:linear-gradient(120deg,rgba(20,120,120,.5),rgba(80,40,140,.5));
    border-color:rgba(120,230,220,.4)}

  /* DNA + load panel bottom-left */
  #dna{position:fixed;left:16px;bottom:16px;z-index:5;max-width:min(92vw,420px);
    pointer-events:none}
  details{pointer-events:auto;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;overflow:hidden}
  summary{cursor:pointer;list-style:none;padding:10px 14px;font-size:11.5px;
    font-weight:600;letter-spacing:.03em;color:var(--dim);display:flex;
    align-items:center;gap:8px;user-select:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸";color:#5fd6ff;transition:transform .2s}
  details[open] summary::before{transform:rotate(90deg)}
  .dna-body{max-height:min(46vh,380px);overflow:auto;border-top:1px solid var(--line)}
  pre{margin:0;padding:12px 14px;font-family:var(--mono);font-size:11px;line-height:1.55;
    color:#a9e6d6;white-space:pre-wrap;word-break:break-word}

  #load-wrap{margin-top:8px}
  .load-inner{padding:11px 13px;display:flex;flex-direction:column;gap:8px}
  textarea{width:100%;min-height:62px;resize:vertical;font-family:var(--mono);
    font-size:10.5px;line-height:1.5;color:#cfe9ff;background:rgba(4,10,20,.7);
    border:1px solid var(--line);border-radius:9px;padding:8px}
  .load-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .hint{font-size:10.5px;color:var(--dim)}
  #load-status{font-size:11px;min-height:14px}
  .ok{color:#6ff0b0}.err{color:#ff8ea0}
  input[type=file]{display:none}
  @media (max-width:560px){
    #cname{font-size:18px} #hud{top:12px;left:12px} #dna{left:12px;bottom:12px}
  }
</style>

<div id="stage"><canvas id="c"></canvas></div>

<div id="hud">
  <div id="title-card" class="card">
    <div class="kicker">Learn with Kody · Fauna</div>
    <div id="cname">Skywyrm</div>
    <div class="meta">
      <span id="cid">············</span>
      <span id="crare">—</span>
    </div>
    <div class="caption" id="caption"></div>
  </div>
  <div id="btns">
    <button id="b-new">✦ New Skywyrm</button>
    <button id="b-save">🥚 Save .egg</button>
    <button id="b-load">Load .egg</button>
  </div>
</div>

<div id="dna">
  <details>
    <summary>Genome · the DNA it grew from</summary>
    <div class="dna-body"><pre id="dna-json"></pre></div>
  </details>
  <div id="load-wrap" class="card" hidden>
    <div class="load-inner">
      <div class="hint">Paste a <b>.egg</b> string (or choose a file) to hatch that exact wyrm.</div>
      <textarea id="load-text" spellcheck="false" placeholder="eyJnZW5vbWUiOns…"></textarea>
      <div class="load-row">
        <button id="b-render">Hatch it</button>
        <button id="b-file">Choose file…</button>
        <input type="file" id="file-input" accept=".egg,text/plain">
      </div>
      <div id="load-status"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   FAUNA-EGG CORE — verified byte-exact against openrappter-vui / genome.js.
   Embed VERBATIM in each demo. Do NOT edit: genomeId must stay reproducible
   or the .egg will not load in rapp·go. (Verified: genomeId of the reference
   egg === "fb18657910a5", and re-encode reproduces the original bytes.)
   ══════════════════════════════════════════════════════════════════════════ */
const EGG = (() => {
  const b64enc = s => btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const b64dec = s => { s=String(s).replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); };
  async function sha256hex(str){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
  function canonical(v){
    if(Array.isArray(v)) return '['+v.map(canonical).join(',')+']';
    if(v!==null&&typeof v==='object') return '{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+canonical(v[k])).join(',')+'}';
    return JSON.stringify(v);
  }
  async function genomeId(genome){ return (await sha256hex(canonical(genome))).slice(0,12); }
  // xmur3 → mulberry32 deterministic PRNG (byte-identical to genome.js mkRng)
  function mkRng(seed){ let h=1779033703^seed.length; for(let i=0;i<seed.length;i++){h=Math.imul(h^seed.charCodeAt(i),3432918353);h=h<<13|h>>>19;} h=Math.imul(h^h>>>16,2246822507); h=Math.imul(h^h>>>13,3266489909); let s=(h^=h>>>16)>>>0; return function(){s+=0x6D2B79F5;let t=Math.imul(s^s>>>15,1|s);t=(t+Math.imul(t^t>>>7,61|t))^t;return((t^t>>>14)>>>0)/4294967296;}; }
  // geohash encode (precision 6) so each egg carries a plausible born.coord
  function geohash(lat,lng,precision=6){ const B='0123456789bcdefghjkmnpqrstuvwxyz'; let even=true,hash='',bits=0,hc=0; const la=[-90,90],lo=[-180,180]; while(hash.length<precision){ if(even){const m=(lo[0]+lo[1])/2; if(lng>m){hc=(hc<<1)|1;lo[0]=m;}else{hc<<=1;lo[1]=m;}} else {const m=(la[0]+la[1])/2; if(lat>m){hc=(hc<<1)|1;la[0]=m;}else{hc<<=1;la[1]=m;}} even=!even; if(++bits===5){hash+=B[hc];bits=0;hc=0;} } return hash; }

  // Pack a genome into a canonical .egg payload (matches openrappter-vui exactly).
  async function pack(genome, meta={}){
    const id = await genomeId(genome);
    const rng = mkRng(id);
    const payload = {
      genome, id,
      born: meta.born || { coord: geohash((rng()*140)-70, (rng()*360)-180), t: 0 },
      title: meta.title || 'a rappter',
      rarity: meta.rarity || 'uncommon',
      source: meta.source || 'learnwithkody-fauna'
    };
    return { egg: b64enc(JSON.stringify(payload)), id, payload };
  }
  function unpack(b64){ return JSON.parse(b64dec(b64.trim())); }
  function download(b64, id){ const a=document.createElement('a'); a.href='data:application/octet-stream;base64,'+btoa(b64); /* raw text egg */ a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(b64); a.download=`rappter-${String(id).slice(0,8)}.egg`; document.body.appendChild(a); a.click(); a.remove(); }
  return { b64enc, b64dec, genomeId, mkRng, geohash, pack, unpack, download };
})();

/* ══════════════════════════════════════════════════════════════════════════
   SKYWYRM — an aurora ribbon serpent.
   A long chain of segments follows a sine spine; the head leads a slithering
   path that loops around the frame; the aurora gradient scrolls along its body.
   Everything you see is grown from a real rappter genome.
   ══════════════════════════════════════════════════════════════════════════ */

// ── small math ──────────────────────────────────────────────────────────────
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp =(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;

// HSL(0-360,0-1,0-1) → #rrggbb
function hslHex(h,s,l){
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r,g,b;
  if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];
  else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
  const to=v=>clamp(Math.round((v+m)*255),0,255).toString(16).padStart(2,'0');
  return '#'+to(r)+to(g)+to(b);
}
function hexToRgb(hex){
  let h=String(hex).replace('#','');
  if(h.length===3) h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16); if(!isFinite(n)) return [120,220,255];
  return [(n>>16)&255,(n>>8)&255,n&255];
}
// sample a wrapping color ramp (aurora loops seamlessly)
function sampleRamp(ramp,t){
  const n=ramp.length; if(!n) return [120,220,255];
  const f=(((t%1)+1)%1)*n, i=Math.floor(f), fr=f-i;
  const a=ramp[i%n], b=ramp[(i+1)%n];
  return [a[0]+(b[0]-a[0])*fr, a[1]+(b[1]-a[1])*fr, a[2]+(b[2]-a[2])*fr];
}
const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;

// ── genome generation, biased to the Skywyrm identity ─────────────────────────
// Aurora hue families (degrees). Each mint jitters these → always unique.
const FAMILIES={
  boreal:[150,172,196,262], rose:[322,286,250,176],
  solar:[46,330,286,166],   ice:[188,208,236,158],
  flare:[280,318,20,182],   abyss:[196,230,262,300]
};
function randomGenome(){
  const seed=Math.random().toString(36).slice(2)+Date.now().toString(36);
  const rng=EGG.mkRng(seed);
  const pick=a=>a[Math.floor(rng()*a.length)];
  const rf=(lo,hi)=>lo+rng()*(hi-lo);
  const ri=(lo,hi)=>Math.floor(rf(lo,hi+0.999));
  const r3=(lo,hi)=>+rf(lo,hi).toFixed(3);

  const famName=pick(Object.keys(FAMILIES));
  const baseHues=FAMILIES[famName];
  const count=ri(3,5);
  const palette=[];
  for(let i=0;i<count;i++){
    const h=baseHues[i%baseHues.length]+rf(-15,15);
    const s=rf(.74,1);
    const l=clamp(rf(.52,.7)-i*.015,.4,.72);
    palette.push(hslHex(h,s,l));
  }
  const form={
    role:'form', k:40,
    shape: pick(['ring','ring','star','blob']),      // serpents love the loop
    limbs: ri(0,8), segments: ri(7,12),               // long body
    symmetry: pick(['radial','bilateral']),
    body_r: r3(.24,.5), limb_len: r3(.12,.55),
    // Skywyrm morphology extensions (hash into the id — still a real egg):
    taper: r3(.7,1.7), head: r3(1.15,1.85), petals: ri(3,6)
  };
  const surface={
    role:'surface', k:60, palette,
    pattern: pick(['glow','glow','stripe','spot','solid']),
    glow: r3(.45,.95), opacity: r3(.74,.96),
    shimmer: r3(.3,1), bands: ri(4,10), family: famName
  };
  const motion={
    role:'motion', k:50,
    breathe: r3(.2,.72), drift: r3(.15,.85),          // drift = wavelength
    pulse: r3(.3,.9),  reach: r3(.32,.9),             // reach = amplitude
    slither: r3(.2,.8)
  };
  return { layers:[form,surface,motion], compose:{ windows:[[0,1,2]], loop:true } };
}

// deterministic display name + rarity from the 12-char id
const SYL_A=['Aur','Cael','Vysh','Nyx','Sol','Zeph','Bor','Umbr','Lyr','Thal','Iri','Vael'];
const SYL_B=['ora','yth','ith','une','ael','oros','ynn','ara','eon','ixi','uma','ael'];
const EPITHET=['of the Boreal Veil','of Nine Currents','who scrolls the dark',
  'of the Pale Meridian','of the Long Slither','of the Cold Corona',
  'of the Waking Sky','of the Silent Tide','of the First Light'];
function nameFromId(id){
  const n=parseInt(id.slice(0,6),16)||0;
  const a=SYL_A[n%SYL_A.length], b=SYL_B[(n>>4)%SYL_B.length];
  const e=EPITHET[(n>>7)%EPITHET.length];
  return `${a}${b} ${e}`;
}
const RARITY=[['common','#8fb0c8'],['uncommon','#6ff0b0'],['rare','#5fd0ff'],
  ['epic','#c79bff'],['legendary','#ffd06b'],['mythic','#ff7ad0']];
function rarityFromId(id){
  const r=(parseInt(id.slice(0,4),16)||0)/0xffff;
  const idx = r>.965?5 : r>.9?4 : r>.74?3 : r>.5?2 : r>.24?1 : 0;
  return RARITY[idx][0];
}
function rarityColor(name){ const m=RARITY.find(x=>x[0]===name); return m?m[1]:'#8fb0c8'; }

// ── mint / load ───────────────────────────────────────────────────────────────
async function mintFromGenome(genome){
  const id=await EGG.genomeId(genome);
  const title=nameFromId(id), rarity=rarityFromId(id);
  const {egg,payload}=await EGG.pack(genome,{title,rarity,source:'learnwithkody-fauna'});
  return { genome, id, title, rarity, eggB64:egg, payload };
}

// ── derived render parameters (recomputed on genome change + resize) ──────────
function computeParams(g,W,H){
  const [form,surface,motion]=g.layers;
  const mn=Math.min(W,H);
  const nodes=clamp(form.segments|0,3,12)*7+8;      // 29 … 92 spine nodes
  const spacing=(mn*1.55)/nodes;
  const baseW=clamp(form.body_r,0.2,0.6)*mn*0.135;
  const ramp=(Array.isArray(surface.palette)&&surface.palette.length?surface.palette:['#26ffd0'])
    .map(hexToRgb);
  // drift = wavelength: more drift → longer wave → fewer bends along the body
  const waveFreq=lerp(11,4.2,clamp(motion.drift,0,1));
  const amp=clamp(motion.reach,0,1)*mn*0.115 + spacing*1.1;   // reach = amplitude
  const pat=['glow','stripe','spot','solid'].includes(surface.pattern)?surface.pattern:'glow';
  return {
    form,surface,motion,W,H,mn,nodes,spacing,baseW,ramp,waveFreq,amp,
    taper: form.taper||1, headScale: form.head||1.5, petals: clamp(form.petals|0||5,2,7),
    pattern: pat, glow: clamp(surface.glow??0.6,0,1), opacity: clamp(surface.opacity??0.9,0,1),
    shimmer: clamp(surface.shimmer??0.6,0,1), bands: clamp(surface.bands|0||6,2,14),
    breathe: clamp(motion.breathe??0.35,0,1), pulse: clamp(motion.pulse??0.5,0,1),
    slither: clamp(motion.slither??0.4,0,1),
    fins: clamp(form.limbs|0,0,8), finLen: clamp(form.limb_len??0,0,0.6),
    shape: ['ring','star','blob'].includes(form.shape)?form.shape:'ring',
    symmetry: form.symmetry==='bilateral'?'bilateral':'radial',
    pathSpeed: 0.30+ (motion.breathe??0.35)*0.14,
    trail: pat==='glow'?0.20 : pat==='solid'?0.34 : 0.27
  };
}

// ── macro path the head traces (loops around the canvas) ──────────────────────
function shapePoint(P,theta){
  const cx=P.W/2, cy=P.H/2;
  if(P.shape==='star'){
    const rr=P.mn*0.205*(0.6+0.4*Math.cos(P.petals*theta));
    return { x:cx+rr*Math.cos(theta), y:cy+rr*Math.sin(theta) };
  }
  if(P.shape==='blob'){
    return { x:cx+P.W*0.31*Math.sin(2*theta+0.6), y:cy+P.H*0.30*Math.sin(3*theta) };
  }
  // ring
  return { x:cx+P.W*0.33*Math.cos(theta), y:cy+P.H*0.30*Math.sin(theta) };
}

// ── application state ─────────────────────────────────────────────────────────
const S={ genome:null, id:'', title:'', rarity:'', eggB64:'', payload:null,
  P:null, chain:[], theta:0, hueScroll:0, time:0 };

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=innerWidth, H=innerHeight, DPR=1, bg=null;

function sizeCanvas(){
  W=innerWidth; H=innerHeight;
  DPR=Math.min(devicePixelRatio||1, 2);
  canvas.width=Math.max(1,W*DPR); canvas.height=Math.max(1,H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// aurora background (dark sky, haze bands tinted by the palette, deterministic stars)
function buildBG(){
  bg=document.createElement('canvas');
  bg.width=Math.max(1,W*DPR); bg.height=Math.max(1,H*DPR);
  const g=bg.getContext('2d'); g.setTransform(DPR,0,0,DPR,0,0);
  const sky=g.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#04070f'); sky.addColorStop(.55,'#050a16'); sky.addColorStop(1,'#02040a');
  g.fillStyle=sky; g.fillRect(0,0,W,H);
  const ramp=S.P?S.P.ramp:[[40,220,180]];
  // soft aurora haze bands
  g.globalCompositeOperation='lighter';
  for(let i=0;i<4;i++){
    const c=sampleRamp(ramp,i/4);
    const bx=W*(0.15+0.72*(i/3));
    const grd=g.createRadialGradient(bx,H*0.62,0,bx,H*0.62,W*0.42);
    grd.addColorStop(0,rgba(c,0.10)); grd.addColorStop(1,rgba(c,0));
    g.fillStyle=grd; g.fillRect(0,0,W,H);
  }
  g.globalCompositeOperation='source-over';
  // stars — seeded from the id so a given egg always keeps its sky
  const srng=EGG.mkRng((S.id||'skywyrm')+'stars');
  const N=Math.round((W*H)/9000);
  for(let i=0;i<N;i++){
    const x=srng()*W, y=srng()*H*0.96, r=srng()*1.3+0.15, a=srng()*0.6+0.12;
    g.beginPath(); g.arc(x,y,r,0,TAU);
    g.fillStyle=`rgba(${200+srng()*55|0},${220+srng()*35|0},255,${a})`; g.fill();
  }
}

function initChain(){
  const P=S.P; const h=shapePoint(P,0);
  S.chain=[];
  for(let i=0;i<P.nodes;i++) S.chain.push({ x:h.x-i*P.spacing, y:h.y });
  S.theta=0;
}

// ── apply a fully-minted creature ─────────────────────────────────────────────
function apply(st){
  S.genome=st.genome; S.id=st.id; S.title=st.title; S.rarity=st.rarity;
  S.eggB64=st.eggB64; S.payload=st.payload;
  S.P=computeParams(st.genome,W,H);
  initChain(); buildBG();
  // seed the frame with the fresh background so there is no black flash
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  ctx.drawImage(bg,0,0,W,H);
  updateOverlay();
}

function updateOverlay(){
  const g=S.genome, f=g.layers[0], s=g.layers[1], m=g.layers[2];
  document.getElementById('cname').textContent=S.title||'Skywyrm';
  document.getElementById('cid').textContent=S.id;
  const rc=document.getElementById('crare');
  rc.textContent=S.rarity; rc.style.color=rarityColor(S.rarity);
  document.getElementById('dna-json').textContent=JSON.stringify(g,null,2);
  const cap=document.getElementById('caption');
  cap.textContent='';
  const parts=[
    ['A ',''],['spine of '+f.segments+' segments',''],[' traces a ',''],
    [s.family?s.family+' ':'',''],['aurora',''],[' · ',''],
    ['drift '+m.drift+' sets the wavelength',''],[', ',''],
    ['reach '+m.reach+' the amplitude.','']
  ];
  // build caption safely (textContent only)
  const b=document.createElement('b'); b.textContent='drift='+m.drift+' → wavelength';
  const b2=document.createElement('b'); b2.textContent='reach='+m.reach+' → amplitude';
  cap.appendChild(document.createTextNode(`A ${f.segments}-segment ${f.shape} spine sheds a `));
  const fam=document.createElement('b'); fam.textContent=(s.family||'aurora')+' aurora';
  cap.appendChild(fam);
  cap.appendChild(document.createTextNode('. '));
  cap.appendChild(b); cap.appendChild(document.createTextNode(', '));
  cap.appendChild(b2); cap.appendChild(document.createTextNode('.'));
}

// ── the render step ───────────────────────────────────────────────────────────
function step(dt){
  const P=S.P; if(!P) return;
  S.time+=dt;
  S.theta+=dt*P.pathSpeed;
  S.hueScroll+=dt*(0.04+P.shimmer*0.26);

  // head follows the macro path, plus a perpendicular slither that propagates
  const h0=shapePoint(P,S.theta), h1=shapePoint(P,S.theta+0.012);
  let tx=h1.x-h0.x, ty=h1.y-h0.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
  const px=-ty, py=tx;
  const wob=P.amp*Math.sin(S.theta*P.waveFreq)
          + P.amp*0.28*P.slither*Math.sin(S.theta*P.waveFreq*2.6 + S.time*2.4);
  const chain=S.chain;
  chain[0].x=h0.x+px*wob; chain[0].y=h0.y+py*wob;
  // follow-the-leader: hold constant spacing behind the head
  for(let i=1;i<chain.length;i++){
    let dx=chain[i].x-chain[i-1].x, dy=chain[i].y-chain[i-1].y;
    let d=Math.hypot(dx,dy); if(d<1e-4){ dx=1; dy=0; d=1; }
    chain[i].x=chain[i-1].x+dx/d*P.spacing;
    chain[i].y=chain[i-1].y+dy/d*P.spacing;
  }
  draw(P);
}

function draw(P){
  const chain=S.chain, n=chain.length;
  const breathe=1+P.breathe*0.16*Math.sin(S.time*1.5);
  const glowPulse=P.glow*(0.68+0.32*Math.sin(S.time*(1.4+P.pulse*2)));

  // 1 · fade toward the background → glowing comet trails, stars stay crisp
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=P.trail;
  ctx.drawImage(bg,0,0,W,H);
  ctx.globalAlpha=1;

  // precompute per-node normal, width, edge points, colour
  const L=new Array(n), R=new Array(n), col=new Array(n), wid=new Array(n);
  for(let i=0;i<n;i++){
    const a=chain[Math.max(0,i-1)], b=chain[Math.min(n-1,i+1)];
    let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
    const nx=-ty, ny=tx;
    const f=i/(n-1);
    let prof=Math.pow(1-f,P.taper);         // wide head → thin tail
    if(f<0.06) prof*=0.55+f/0.06*0.45;      // round the nose
    const w=Math.max(0.4,P.baseW*prof*breathe);
    wid[i]=w;
    L[i]={x:chain[i].x+nx*w, y:chain[i].y+ny*w};
    R[i]={x:chain[i].x-nx*w, y:chain[i].y-ny*w};
    let c=sampleRamp(P.ramp, f*1.15 + S.hueScroll);
    if(P.pattern==='stripe'){
      const band=0.5+0.5*Math.sin((f*P.bands - S.hueScroll*P.bands)*TAU);
      const k=0.45+0.55*band; c=[c[0]*k,c[1]*k,c[2]*k];
    }
    col[i]=c;
  }

  ctx.globalCompositeOperation='lighter';

  // 2 · dorsal fins (drawn under the ribbon core)
  if(P.fins>0 && P.finLen>0){
    for(let k=0;k<P.fins;k++){
      const f=0.12+0.72*(P.fins===1?0.4:k/(P.fins-1));
      const i=clamp(Math.round(f*(n-1)),1,n-2);
      const a=chain[i-1], b=chain[i+1];
      let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
      const nx=-ty, ny=tx;
      const len=P.baseW*3.2*P.finLen*(1-f*0.5);
      const c=sampleRamp(P.ramp, f*1.15 + S.hueScroll + 0.12);
      const sides=P.symmetry==='bilateral'?[1]:[1,-1];
      for(const sgn of sides){
        const bx=chain[i].x, by=chain[i].y;
        const tipx=bx+nx*len*sgn, tipy=by+ny*len*sgn;
        ctx.beginPath();
        ctx.moveTo(bx-tx*wid[i]*1.1, by-ty*wid[i]*1.1);
        ctx.lineTo(tipx, tipy);
        ctx.lineTo(bx+tx*wid[i]*1.1, by+ty*wid[i]*1.1);
        ctx.closePath();
        ctx.fillStyle=rgba(c,0.22*P.opacity);
        ctx.fill();
      }
    }
  }

  // 3 · aura — one soft, heavily-blurred stroke down the spine
  const mid=sampleRamp(P.ramp, S.hueScroll+0.3);
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(chain[0].x,chain[0].y);
  for(let i=1;i<n;i++) ctx.lineTo(chain[i].x,chain[i].y);
  ctx.lineWidth=P.baseW*2.1*breathe;
  ctx.strokeStyle=rgba(mid,0.10*P.opacity);
  ctx.shadowColor=rgba(mid,0.9);
  ctx.shadowBlur=(10+24*glowPulse);
  ctx.stroke();
  ctx.shadowBlur=0;

  // 4 · ribbon core — per-segment aurora quads
  for(let i=0;i<n-1;i++){
    const c=col[i];
    ctx.beginPath();
    ctx.moveTo(L[i].x,L[i].y); ctx.lineTo(L[i+1].x,L[i+1].y);
    ctx.lineTo(R[i+1].x,R[i+1].y); ctx.lineTo(R[i].x,R[i].y);
    ctx.closePath();
    ctx.fillStyle=rgba(c, (0.42+0.35*glowPulse)*P.opacity);
    ctx.fill();
  }
  // bright inner filament
  ctx.beginPath(); ctx.moveTo(chain[0].x,chain[0].y);
  for(let i=1;i<n;i++) ctx.lineTo(chain[i].x,chain[i].y);
  ctx.lineWidth=Math.max(1,P.baseW*0.35);
  ctx.strokeStyle=rgba(sampleRamp(P.ramp,S.hueScroll+0.55),0.5*P.opacity);
  ctx.stroke();

  // 5 · spot pattern — glinting nodes
  if(P.pattern==='spot'){
    for(let i=2;i<n;i+=3){
      const c=sampleRamp(P.ramp, i/n + S.hueScroll);
      const r=wid[i]*0.7+1;
      const gr=ctx.createRadialGradient(chain[i].x,chain[i].y,0,chain[i].x,chain[i].y,r*2.2);
      gr.addColorStop(0,rgba(c,0.5*P.opacity)); gr.addColorStop(1,rgba(c,0));
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.arc(chain[i].x,chain[i].y,r*2.2,0,TAU); ctx.fill();
    }
  }

  // 6 · the head — a bright bulb with two eye-glints
  const hp=chain[0], hn=chain[1];
  const ang=Math.atan2(hp.y-hn.y, hp.x-hn.x);
  const hr=P.baseW*P.headScale;
  ctx.save();
  ctx.translate(hp.x,hp.y); ctx.rotate(ang);
  const hc=sampleRamp(P.ramp,S.hueScroll+0.7);
  const hg=ctx.createRadialGradient(hr*0.2,0,0,0,0,hr*1.6);
  hg.addColorStop(0,rgba([255,255,255],0.9*P.opacity));
  hg.addColorStop(0.4,rgba(hc,0.75*P.opacity));
  hg.addColorStop(1,rgba(hc,0));
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.ellipse(hr*0.25,0,hr*1.25,hr*0.85,0,0,TAU); ctx.fill();
  // eyes
  ctx.fillStyle=rgba([10,20,30],0.85);
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(hr*0.55,s*hr*0.34,hr*0.16,hr*0.22,0,0,TAU); ctx.fill(); }
  ctx.fillStyle=rgba([220,255,255],0.95);
  for(const s of [-1,1]){ ctx.beginPath(); ctx.arc(hr*0.62,s*hr*0.34,hr*0.07,0,TAU); ctx.fill(); }
  ctx.restore();

  ctx.globalCompositeOperation='source-over';
}

// ── animation loop ────────────────────────────────────────────────────────────
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now;
  if(!(dt>0)) dt=0.016; if(dt>0.05) dt=0.05;   // clamp after tab-switches
  step(dt);
  if(window.FAUNA) window.FAUNA.frame++;
  requestAnimationFrame(frame);
}

// ── UI wiring ─────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function setStatus(msg,cls){ const el=$('load-status'); el.textContent=msg; el.className=cls||''; }

async function newCreature(){
  const st=await mintFromGenome(randomGenome());
  apply(st);
  return st.id;
}
async function loadEggB64(b64){
  const payload=EGG.unpack(b64);          // throws on malformed → caller catches
  if(!payload || !payload.genome || !Array.isArray(payload.genome.layers))
    throw new Error('not a rappter egg');
  const genome=payload.genome;
  const id=payload.id || await EGG.genomeId(genome);
  apply({
    genome, id,
    title: payload.title || nameFromId(id),
    rarity: payload.rarity || rarityFromId(id),
    eggB64: b64.trim(), payload
  });
  return id;
}

$('b-new').addEventListener('click', ()=>{ newCreature(); });
$('b-save').addEventListener('click', ()=>{ if(S.eggB64) EGG.download(S.eggB64,S.id); });
$('b-load').addEventListener('click', ()=>{
  const w=$('load-wrap'); w.hidden=!w.hidden;
  if(!w.hidden){ $('load-text').focus(); }
});
$('b-render').addEventListener('click', async ()=>{
  const v=$('load-text').value.trim();
  if(!v){ setStatus('Paste an .egg string first.','err'); return; }
  try{ const id=await loadEggB64(v); setStatus('Hatched '+id,'ok'); }
  catch(e){ setStatus('Could not hatch: '+e.message,'err'); }
});
$('b-file').addEventListener('click', ()=> $('file-input').click());
$('file-input').addEventListener('change', ev=>{
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=async ()=>{
    const v=String(rd.result||'').trim();
    $('load-text').value=v;
    try{ const id=await loadEggB64(v); setStatus('Hatched '+id,'ok'); }
    catch(e){ setStatus('Could not hatch: '+e.message,'err'); }
  };
  rd.readAsText(file);
  ev.target.value='';
});

addEventListener('resize', ()=>{
  sizeCanvas();
  if(S.genome){ S.P=computeParams(S.genome,W,H); initChain(); buildBG();
    ctx.globalAlpha=1; ctx.drawImage(bg,0,0,W,H); }
});

// ── boot ──────────────────────────────────────────────────────────────────────
(async function boot(){
  sizeCanvas();
  await newCreature();               // first creature is generated + rendering
  // expose the debug hook ONLY after the first creature exists
  window.FAUNA={
    title:'Skywyrm',
    get genome(){ return S.genome; },
    get id(){ return S.id; },
    get eggB64(){ return S.eggB64; },
    newCreature: async ()=> await newCreature(),
    loadEgg: async (b64)=> await loadEggB64(b64),
    frame:0
  };
  requestAnimationFrame(frame);
})();
</script>
