<!doctype html><title>PROMPT.4K</title><style>html,body{margin:0;background:#000;overflow:hidden;height:100%;font:bold 14px monospace;color:#fff;text-align:center}canvas{image-rendering:pixelated;width:100vw;height:100vh;display:block}#t{position:fixed;top:50%;left:0;right:0;transform:translateY(-50%);text-shadow:0 0 12px #0ff,0 0 4px #f0f;letter-spacing:4px;mix-blend-mode:screen;pointer-events:none;font-size:6vw;font-weight:900}</style><canvas id=c width=160 height=100></canvas><div id=t></div><script>
A=Math,S=A.sin,C=A.cos,X=c.getContext`2d`,W=160,H=100,I=X.createImageData(W,H),D=I.data,B=0,K=0;
N=new(window.AudioContext||webkitAudioContext);onclick=onkeydown=_=>N.resume();
function v(f,d,w,g,F){o=N.createOscillator();o.type=w;o.frequency.value=f;G=N.createGain();G.gain.setValueAtTime(g,T=N.currentTime);G.gain.exponentialRampToValueAtTime(.001,T+d);if(F){Q=N.createBiquadFilter();Q.frequency.value=F;o.connect(Q);Q.connect(G)}else o.connect(G);G.connect(N.destination);o.start();o.stop(T+d)}
M=[0,3,7,10,3,7,10,15];
function step(){
i=B&31;k=M[(B>>2)&7];f=55*A.pow(2,k/12);
if((B&3)==0)v(f,.5,"sawtooth",.16,900+S(B/8)*500);
if((i&3)==0)v(55,.18,"sine",.7);
if((i&3)==2)v(8000,.05,"square",.05);
v(f*4,.2,"square",.06,1400+S(B/3)*700);
B++;
}
setInterval(step,140);
function r(O,d){
t=0;
for(j=0;j<40;j++){
px=O[0]+d[0]*t;py=O[1]+d[1]*t;pz=O[2]+d[2]*t;
s1=1.2-A.hypot(S(pz*.3+K)*.3+px,C(pz*.3+K)*.3+py);
s2=A.hypot(px-S(K)*.6,py-C(K*.7)*.4,pz-O[2]-3-S(K*.3))-.5;
ds=A.min(s1,s2);
if(K>30){s3=A.hypot(px+S(K*.5)*.6,py+C(K*.5)*.4,pz-O[2]-4)-.4;ds=A.min(ds,s3)}
if(ds<.01)return[t,s2<s1?2:1,px,py,pz];
if(t>20)break;
t+=ds*.8;
}
return[t,0,px,py,pz];
}
function Z(){
K=performance.now()/1000;
F=K*.4;cf=C(F);sf=S(F);
for(y=0;y<H;y++)for(x=0;x<W;x++){
u=(x-W/2)/H;w=(y-H/2)/H;
O=[0,0,K*1.2];
dx=u*cf-1*sf;dz=u*sf+1*cf;
m=A.hypot(dx,w,dz);
d=[dx/m,w/m,dz/m];
e=r(O,d);
hit=e[1];sh=A.exp(-e[0]*.15);
if(hit==2){
nx=(e[2]-S(K)*.6)*2;ny=(e[3]-C(K*.7)*.4)*2;nz=(e[4]-O[2]-3-S(K*.3))*2;
l=A.max(nx*.4+ny*-.5+nz*-.7,.1);
R=l*255*sh;G2=l*120*sh;Bl=l*40*sh;
}else if(hit==1){
g=(A.floor(A.atan2(e[3],e[2])*4+e[4]*.5+K)&1);
hue=K*.3+e[4]*.1;
R=(g?100:30)*sh+S(hue)*60+80;
G2=(g?30:100)*sh+S(hue+2)*60+60;
Bl=(g?180:80)*sh+S(hue+4)*60+120;
}else{
R=5+y*.4;G2=10+y*.6;Bl=30+y*1.2;
}
i=(y*W+x)*4;D[i]=R;D[i+1]=G2;D[i+2]=Bl;D[i+3]=255;
}
X.putImageData(I,0,0);
T.innerText=N.state!="running"?"CLICK FOR SOUND":K<4?"PROMPT.4K":K<8?"a vibe-coded":K<12?"4KB demo":K<16?"for learnwithkody":K>55?"~ FIN ~":K>30&&K<34?"// SCENE 2":"";
requestAnimationFrame(Z);
}
Z();
</script>
