<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>First-Person Rapier Duel — learnwithkody</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0a0509; color: #f4e6c8;
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    overflow: hidden;
    cursor: none;
  }
  #canvas { position: fixed; inset: 0; display: block; }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.95);
  }
  .bar-wrap {
    position: absolute;
    width: 220px; height: 14px;
    border: 1px solid rgba(255, 220, 170, 0.55);
    background: rgba(20, 8, 6, 0.55);
    box-shadow: inset 0 0 8px rgba(0,0,0,0.85), 0 0 8px rgba(0,0,0,0.6);
    border-radius: 2px;
    padding: 2px;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(180deg, #f4cf86 0%, #c97a2a 60%, #6b3010 100%);
    border-radius: 1px;
    transition: width 0.18s ease-out;
    box-shadow: 0 0 6px rgba(255,180,80,0.5);
  }
  .bar-label {
    position: absolute;
    top: -22px; left: 0;
    font-size: 14px; letter-spacing: 2px;
    font-variant: small-caps;
    color: #f4e6c8;
    opacity: 0.95;
  }
  #stamina-you { left: 28px; bottom: 38px; }
  #stamina-foe { right: 28px; top: 56px; }
  #stamina-foe .bar-label { left: auto; right: 0; text-align: right; width: 100%; }
  #stamina-foe .bar-fill {
    background: linear-gradient(180deg, #c8e3ff 0%, #5a7a9c 60%, #1f2a3c 100%);
    box-shadow: 0 0 6px rgba(140,180,220,0.45);
  }

  #round-display {
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    font-size: 22px; letter-spacing: 6px;
    font-variant: small-caps;
    color: #f4e6c8;
    opacity: 0.85;
  }
  #score-display {
    position: absolute;
    top: 48px; left: 50%; transform: translateX(-50%);
    font-size: 28px; letter-spacing: 14px;
    color: #f4cf86;
  }
  .pip { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #f4cf86; margin: 0 4px; vertical-align: middle; }
  .pip.you-won { background: #f4cf86; box-shadow: 0 0 8px #f4cf86; }
  .pip.foe-won { background: #5a7a9c; border-color: #5a7a9c; box-shadow: 0 0 6px #5a7a9c; }

  #subtitle {
    position: absolute;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    font-size: 36px; letter-spacing: 8px;
    font-variant: small-caps;
    color: #f4e6c8;
    opacity: 0;
    transition: opacity 0.4s;
    text-align: center;
    width: 80%;
    pointer-events: none;
  }
  #subtitle.show { opacity: 1; }
  #subtitle.huge { font-size: 64px; letter-spacing: 14px; color: #f4cf86; }

  /* ---------- difficulty / start ---------- */
  #menu {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, rgba(20,10,8,0.55), rgba(5,2,2,0.92));
    pointer-events: auto;
    cursor: default;
  }
  #menu h1 {
    font-size: 64px; letter-spacing: 12px;
    margin: 0 0 4px 0;
    font-variant: small-caps;
    color: #f4cf86;
    text-shadow: 0 0 18px rgba(255,180,80,0.4), 0 4px 0 rgba(0,0,0,0.85);
  }
  #menu .sub {
    font-size: 16px; letter-spacing: 6px; margin-bottom: 32px;
    color: #c9b48a; opacity: 0.85;
    font-variant: small-caps;
  }
  .diff-row { display: flex; gap: 20px; margin-bottom: 22px; }
  .diff-btn {
    cursor: pointer;
    padding: 10px 28px;
    font-size: 22px; letter-spacing: 4px;
    font-variant: small-caps;
    color: #f4e6c8;
    background: rgba(40, 20, 12, 0.6);
    border: 1px solid rgba(244, 207, 134, 0.5);
    transition: all 0.18s;
    font-family: inherit;
  }
  .diff-btn:hover, .diff-btn.selected {
    background: rgba(80, 40, 16, 0.85);
    border-color: #f4cf86;
    color: #f4cf86;
    transform: translateY(-1px);
  }
  #start-btn {
    margin-top: 14px;
    padding: 14px 50px;
    font-size: 28px; letter-spacing: 8px;
    font-variant: small-caps;
    background: linear-gradient(180deg, rgba(120,70,30,0.85), rgba(60,30,12,0.95));
    color: #fbe8b8;
    border: 1px solid #f4cf86;
    cursor: pointer;
    font-family: inherit;
  }
  #start-btn:hover { background: linear-gradient(180deg, rgba(160,90,40,0.95), rgba(80,40,18,1)); }
  #controls-hint {
    margin-top: 28px; font-size: 14px; letter-spacing: 3px;
    color: #c9b48a; opacity: 0.8; text-align: center;
    font-variant: small-caps; line-height: 1.9;
  }

  /* ---------- crosshair (subtle) ---------- */
  #reticle {
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: rgba(255,230,180,0.55);
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
    pointer-events: none;
  }

  /* ---------- vignette + flashes ---------- */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.55) 100%);
  }
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 6;
    background: rgba(255, 230, 180, 0);
    transition: background 0.12s;
  }

  /* ---------- end overlay ---------- */
  #end-overlay {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column; justify-content: center; align-items: center;
    z-index: 40;
    background: radial-gradient(ellipse at center, rgba(20,8,6,0.4), rgba(0,0,0,0.92));
    pointer-events: auto;
    cursor: default;
  }
  #end-overlay h2 {
    font-size: 90px; letter-spacing: 16px;
    margin: 0;
    font-variant: small-caps;
    color: #f4cf86;
    text-shadow: 0 0 24px rgba(255,180,80,0.5);
  }
  #end-overlay p { font-size: 22px; letter-spacing: 4px; opacity: 0.9; font-variant: small-caps; }
  #end-overlay button {
    margin-top: 22px;
    padding: 12px 40px;
    font-size: 22px; letter-spacing: 6px;
    font-variant: small-caps;
    background: rgba(80,40,16,0.85);
    color: #fbe8b8; border: 1px solid #f4cf86; cursor: pointer;
    font-family: inherit;
  }

  .hint-key { display: inline-block; min-width: 26px; padding: 1px 6px; margin: 0 2px;
    border: 1px solid rgba(244,207,134,0.45); border-radius: 3px;
    background: rgba(40,22,12,0.5); color: #f4cf86; font-variant: normal; letter-spacing: 1px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="vignette"></div>
<div id="flash"></div>

<div id="hud">
  <div id="reticle"></div>

  <div id="round-display">Round&nbsp;1</div>
  <div id="score-display">
    <span class="pip" id="pip-you-1"></span>
    <span class="pip" id="pip-you-2"></span>
    <span class="pip" id="pip-you-3"></span>
    &nbsp;&nbsp;
    <span class="pip" id="pip-foe-1"></span>
    <span class="pip" id="pip-foe-2"></span>
    <span class="pip" id="pip-foe-3"></span>
  </div>

  <div class="bar-wrap" id="stamina-you">
    <div class="bar-label">Breath</div>
    <div class="bar-fill" id="stamina-you-fill" style="width:100%"></div>
  </div>
  <div class="bar-wrap" id="stamina-foe">
    <div class="bar-label">Foe</div>
    <div class="bar-fill" id="stamina-foe-fill" style="width:100%"></div>
  </div>

  <div id="subtitle"></div>
</div>

<div id="menu">
  <h1>Il&nbsp;Duello</h1>
  <div class="sub">A First-Person Rapier Combat at Dusk</div>
  <div class="diff-row">
    <button class="diff-btn" data-diff="easy">Apprentice</button>
    <button class="diff-btn selected" data-diff="normal">Duelist</button>
    <button class="diff-btn" data-diff="master">Maestro</button>
  </div>
  <button id="start-btn">Cross Blades</button>
  <div id="controls-hint">
    Move the mouse to guide your blade<br>
    <span class="hint-key">L-Click</span> Thrust&nbsp;&nbsp;&nbsp;
    <span class="hint-key">R-Click</span> Parry<br>
    <span class="hint-key">W</span><span class="hint-key">A</span><span class="hint-key">S</span><span class="hint-key">D</span> Footwork&nbsp;&nbsp;&nbsp;
    <span class="hint-key">Esc</span> Release Cursor
  </div>
</div>

<div id="end-overlay">
  <h2 id="end-title">Victory</h2>
  <p id="end-sub">The piazza is yours.</p>
  <button id="end-restart">Cross Blades Again</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }

<script type="module">
import * as THREE from 'three';

/* ============================================================================
   AUDIO  — procedural lute, footsteps, blade clinks, voices
   ============================================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.musicGain = null;
    this.sfxGain = null;
    this.ambGain = null;
    this.musicScheduled = 0;
    this.musicTimer = null;
  }
  ensure() {
    if (this.ctx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.85;
    this.master.connect(this.ctx.destination);

    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.18;
    this.musicGain.connect(this.master);

    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 0.65;
    this.sfxGain.connect(this.master);

    this.ambGain = this.ctx.createGain();
    this.ambGain.gain.value = 0.22;
    this.ambGain.connect(this.master);

    this._startAmbient();
    this._startMusic();
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }

  // Karplus-Strong plucked string for lute
  _pluck(freq, when, dur = 1.4, gain = 0.6) {
    const ctx = this.ctx;
    const sr = ctx.sampleRate;
    const N = Math.max(8, Math.floor(sr / freq));
    const buf = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const data = buf.getChannelData(0);
    const ks = new Float32Array(N);
    for (let i = 0; i < N; i++) ks[i] = (Math.random() * 2 - 1) * 0.9;
    let idx = 0;
    const decay = 0.494 + 0.002 * Math.random();
    const damping = 0.5;
    for (let i = 0; i < data.length; i++) {
      const cur = ks[idx];
      const next = ks[(idx + 1) % N];
      const newVal = (cur * (1 - damping) + next * damping) * (decay + 0.498);
      ks[idx] = newVal;
      data[i] = cur;
      idx = (idx + 1) % N;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.value = gain;
    g.gain.setTargetAtTime(0, when + dur * 0.7, dur * 0.2);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 3200;
    src.connect(filter).connect(g).connect(this.musicGain);
    src.start(when);
    src.stop(when + dur + 0.05);
  }

  _startMusic() {
    // Phrygian on E: E F G A B C D
    const phrygian = [82.41, 87.31, 98.00, 110.00, 123.47, 130.81, 146.83, 164.81];
    // melancholic motif with slight variation
    const motif = [0, 1, 0, -2, -3, -2, -3, -4, -2, 0, 1, 0, 3, 1, 0, -2];
    let pos = 0;
    const tempo = 0.55; // seconds per note
    const schedule = () => {
      const ctx = this.ctx;
      if (!ctx) return;
      const lookahead = 1.5;
      while (this.musicScheduled < ctx.currentTime + lookahead) {
        if (this.musicScheduled < ctx.currentTime) this.musicScheduled = ctx.currentTime + 0.1;
        const step = motif[pos % motif.length];
        const baseIdx = step + 4;
        const f = phrygian[Math.max(0, Math.min(phrygian.length - 1, baseIdx))];
        if (f) {
          this._pluck(f, this.musicScheduled, 1.6, 0.35);
          // occasional bass note
          if (pos % 4 === 0) this._pluck(f / 2, this.musicScheduled, 2.0, 0.3);
          // light harmony every other measure
          if (pos % 8 === 4) this._pluck(f * 1.5, this.musicScheduled + 0.03, 1.2, 0.18);
        }
        this.musicScheduled += tempo;
        pos++;
      }
    };
    schedule();
    this.musicTimer = setInterval(schedule, 250);
  }

  _startAmbient() {
    // gentle wind / crowd murmur via filtered noise
    const ctx = this.ctx;
    const bufSize = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < bufSize; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) * 0.99;
      data[i] = last * 6.0;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 480;
    const g = ctx.createGain();
    g.gain.value = 0.7;
    src.connect(filt).connect(g).connect(this.ambGain);
    src.start();

    // schedule occasional gull cries and distant voices
    const tickAmb = () => {
      if (!this.ctx) return;
      const t = this.ctx.currentTime + 0.05;
      if (Math.random() < 0.35) this._gull(t);
      if (Math.random() < 0.5) this._voice(t + 0.3);
      setTimeout(tickAmb, 5000 + Math.random() * 8000);
    };
    setTimeout(tickAmb, 3000);
  }

  _gull(when) {
    const ctx = this.ctx;
    const o = ctx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(900, when);
    o.frequency.exponentialRampToValueAtTime(1800, when + 0.08);
    o.frequency.exponentialRampToValueAtTime(700, when + 0.22);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.06, when + 0.04);
    g.gain.linearRampToValueAtTime(0, when + 0.32);
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1300;
    o.connect(f).connect(g).connect(this.ambGain);
    o.start(when); o.stop(when + 0.4);
  }

  _voice(when) {
    const ctx = this.ctx;
    const o = ctx.createOscillator();
    o.type = 'sine';
    const base = 110 + Math.random() * 90;
    o.frequency.setValueAtTime(base, when);
    o.frequency.linearRampToValueAtTime(base * 0.85, when + 0.6);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.045, when + 0.1);
    g.gain.linearRampToValueAtTime(0, when + 0.7);
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 700;
    o.connect(f).connect(g).connect(this.ambGain);
    o.start(when); o.stop(when + 0.8);
  }

  bladeClink(intensity = 1, pitch = 1) {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    // 3 partials of bright bell
    [1.0, 2.7, 4.3].forEach((m, i) => {
      const o = ctx.createOscillator();
      o.type = i === 0 ? 'triangle' : 'sine';
      o.frequency.setValueAtTime(1800 * pitch * m, t);
      o.frequency.exponentialRampToValueAtTime(1200 * pitch * m, t + 0.3);
      const g = ctx.createGain();
      const peak = 0.18 * intensity * (1 / (i + 1));
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(peak, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
      o.connect(g).connect(this.sfxGain);
      o.start(t); o.stop(t + 0.34);
    });
    // noise burst
    const buf = ctx.createBuffer(1, 0.06 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 2400;
    const g = ctx.createGain();
    g.gain.value = 0.15 * intensity;
    src.connect(f).connect(g).connect(this.sfxGain);
    src.start();
  }

  thrustWoosh() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, 0.25 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.sin((i / d.length) * Math.PI);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 2;
    f.frequency.setValueAtTime(400, t);
    f.frequency.exponentialRampToValueAtTime(1400, t + 0.2);
    const g = ctx.createGain(); g.gain.value = 0.2;
    src.connect(f).connect(g).connect(this.sfxGain);
    src.start();
  }

  hitFlesh() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, 0.18 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.exp(-i / d.length * 6);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 380;
    const g = ctx.createGain(); g.gain.value = 0.55;
    src.connect(f).connect(g).connect(this.sfxGain);
    src.start();
    // crowd reaction
    setTimeout(() => this._crowdGasp(), 220);
  }

  _crowdGasp() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, 0.7 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.sin((i / d.length) * Math.PI);
      d[i] = (Math.random() * 2 - 1) * env * 0.6;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 1;
    const g = ctx.createGain(); g.gain.value = 0.32;
    src.connect(f).connect(g).connect(this.ambGain);
    src.start();
  }

  footstep(intensity = 1) {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, 0.12 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.exp(-i / d.length * 14);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 1200;
    const g = ctx.createGain(); g.gain.value = 0.18 * intensity;
    src.connect(f).connect(g).connect(this.sfxGain);
    src.start();
  }

  breath(intensity = 0.5) {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, 0.55 * ctx.sampleRate, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.sin((i / d.length) * Math.PI);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 600 + intensity * 400; f.Q.value = 0.6;
    const g = ctx.createGain(); g.gain.value = 0.07 + intensity * 0.06;
    src.connect(f).connect(g).connect(this.sfxGain);
    src.start();
  }
}
const Audio = new AudioEngine();

/* ============================================================================
   THREE.JS SCENE
   ============================================================================ */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x6a3a28, 0.018);

// World camera (the actual eye position)
const FOV = 58;
const camera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.65, 5);

// Separate scene for "viewmodel" (sword) so it doesn't clip through walls.
const vmScene = new THREE.Scene();
const vmCamera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 0.01, 10);
vmCamera.position.set(0, 0, 0);
const vmAmbient = new THREE.AmbientLight(0xffe2b0, 0.6);
vmScene.add(vmAmbient);
const vmKey = new THREE.DirectionalLight(0xffd6a0, 1.2);

/* ---------- sky ---------- */
function makeSky() {
  const skyGeo = new THREE.SphereGeometry(80, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: { time: { value: 0 } },
    vertexShader: `
      varying vec3 vWorldPos;
      void main(){
        vWorldPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vWorldPos;
      uniform float time;
      void main(){
        float h = normalize(vWorldPos).y;
        // dusk: oranges at horizon, deep blue/violet at top
        vec3 horizon = vec3(1.0, 0.55, 0.28);
        vec3 mid = vec3(0.85, 0.42, 0.45);
        vec3 zenith = vec3(0.10, 0.08, 0.20);
        float t1 = smoothstep(-0.05, 0.25, h);
        float t2 = smoothstep(0.2, 0.85, h);
        vec3 col = mix(mix(horizon, mid, t1), zenith, t2);
        // sun glow at low horizon
        float ang = atan(vWorldPos.z, vWorldPos.x);
        float sun = exp(-pow((ang + 0.7) * 1.4, 2.0)) * smoothstep(-0.05, 0.18, h) * (1.0 - smoothstep(0.05, 0.35, h));
        col += vec3(1.0, 0.7, 0.3) * sun * 0.9;
        // gentle stars at top
        float st = step(0.997, fract(sin(dot(floor(vWorldPos.xz*2.0),vec2(12.9898,78.233)))*43758.5453));
        col += vec3(1.0) * st * smoothstep(0.7, 1.0, h) * 0.4;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  return new THREE.Mesh(skyGeo, skyMat);
}

function makeCobblestoneTexture() {
  const size = 512;
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#2a221c'; ctx.fillRect(0, 0, size, size);
  // irregular cobble cells
  const cells = 18;
  for (let i = 0; i < cells * cells; i++) {
    const cx = (i % cells) * (size / cells) + (Math.random() - 0.5) * 8;
    const cy = Math.floor(i / cells) * (size / cells) + (Math.random() - 0.5) * 8;
    const r = (size / cells) * (0.42 + Math.random() * 0.18);
    const grey = 70 + Math.random() * 80;
    const tint = 10 + Math.random() * 30;
    const grad = ctx.createRadialGradient(cx + r * 0.2, cy + r * 0.2, r * 0.1, cx, cy, r);
    grad.addColorStop(0, `rgb(${grey + 25}, ${grey + 18}, ${grey + tint})`);
    grad.addColorStop(0.6, `rgb(${grey - 5}, ${grey - 8}, ${grey + tint - 10})`);
    grad.addColorStop(1, `rgb(${grey - 35}, ${grey - 38}, ${grey + tint - 30})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * (0.8 + Math.random() * 0.4), Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  // dark grout
  ctx.globalCompositeOperation = 'multiply';
  for (let i = 0; i < 800; i++) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(Math.random() * size, Math.random() * size, 2, 2);
  }
  ctx.globalCompositeOperation = 'source-over';
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeStoneTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#9b8770'; ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 1500; i++) {
    const v = 100 + Math.random() * 90;
    ctx.fillStyle = `rgba(${v},${v - 10},${v - 25},${Math.random() * 0.4})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, Math.random() * 6, Math.random() * 6);
  }
  // horizontal block lines
  ctx.strokeStyle = 'rgba(40,30,20,0.55)'; ctx.lineWidth = 1.5;
  for (let y = 0; y < 256; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(256, y); ctx.stroke();
  }
  for (let y = 0; y < 256; y += 32) {
    const off = (y % 64 === 0) ? 0 : 32;
    for (let x = off; x < 256; x += 64) {
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 32); ctx.stroke();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeBuilding(width, height, depth, color) {
  const g = new THREE.Group();
  const wallMat = new THREE.MeshStandardMaterial({ map: stoneTex.clone(), color, roughness: 0.88 });
  wallMat.map.repeat.set(width / 4, height / 4); wallMat.map.needsUpdate = true;
  const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), wallMat);
  body.position.y = height / 2;
  body.castShadow = body.receiveShadow = true;
  g.add(body);
  // roof
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(Math.max(width, depth) * 0.78, 1.6, 4),
    new THREE.MeshStandardMaterial({ color: 0x4a2418, roughness: 0.9 })
  );
  roof.position.y = height + 0.8;
  roof.rotation.y = Math.PI / 4;
  roof.scale.set(1, 1, depth / width);
  roof.castShadow = true;
  g.add(roof);
  // windows (lit)
  for (let row = 0; row < 2; row++) {
    for (let col = -1; col <= 1; col++) {
      if (Math.random() < 0.85) {
        const w = new THREE.Mesh(
          new THREE.PlaneGeometry(0.7, 1.0),
          new THREE.MeshBasicMaterial({ color: 0xffc880 })
        );
        w.position.set(col * 1.4, 1.5 + row * 1.6, depth / 2 + 0.01);
        g.add(w);
      }
    }
  }
  // wooden door
  const doorMat = new THREE.MeshStandardMaterial({ color: 0x4a2c14, roughness: 0.8 });
  const door = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.8, 0.06), doorMat);
  door.position.set(0, 0.9, depth / 2 + 0.04);

  );
  arch.position.set(0, 1.8, depth / 2 + 0.04);
  arch.rotation.z = 0;
  g.add(arch);
  return g;
}

/* ============================================================================
   BLADE TRAIL — ribbon following the player's tip
   ============================================================================ */
class BladeTrail {
  constructor(scene, color = 0xffffff) {
    this.maxPoints = 22;
    this.points = [];
    const positions = new Float32Array(this.maxPoints * 2 * 3);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const indices = [];
    for (let i = 0; i < this.maxPoints - 1; i++) {
      const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
      indices.push(a, b, c, b, d, c);
    }
    geom.setIndex(indices);
    const mat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.9,
      side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
    });
    this.mesh = new THREE.Mesh(geom, mat);
    this.mesh.frustumCulled = false;
    scene.add(this.mesh);
    this.geom = geom;
    this.intensity = 0;
  }
  push(p) {
    this.points.unshift(p.clone());
    if (this.points.length > this.maxPoints) this.points.length = this.maxPoints;
  }
  setIntensity(v) { this.intensity = v; }
  update() {
    const pos = this.geom.attributes.position.array;
    const n = this.points.length;
    for (let i = 0; i < this.maxPoints; i++) {
      const p = this.points[Math.min(i, n - 1)] || new THREE.Vector3();
      const next = this.points[Math.min(i + 1, n - 1)] || p;
      const dir = next.clone().sub(p);
      if (dir.lengthSq() < 1e-6) dir.set(0, 0.001, 0);
      // perpendicular thickness
      const up = new THREE.Vector3(0, 1, 0);
      const side = new THREE.Vector3().crossVectors(dir, up).normalize();
      if (side.lengthSq() < 1e-3) side.set(1, 0, 0);
      const taper = (1 - i / this.maxPoints) * 0.012 * (0.5 + this.intensity * 1.5);
      const a = p.clone().add(side.multiplyScalar(taper));
      const b = p.clone().add(side.multiplyScalar(-1));
      pos[i * 6 + 0] = a.x; pos[i * 6 + 1] = a.y; pos[i * 6 + 2] = a.z;
      pos[i * 6 + 3] = b.x; pos[i * 6 + 4] = b.y; pos[i * 6 + 5] = b.z;
    }
    this.geom.attributes.position.needsUpdate = true;
    this.mesh.material.opacity = 0.15 + this.intensity * 0.7;
  }
}
const trail = new BladeTrail(vmScene, 0xfff6c6);

/* ============================================================================
   PARTICLES — blood
   ============================================================================ */
class ParticleBurst {
  constructor(scene, count = 30) {
    this.count = count;
    this.parts = [];
    const geom = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xa01010, size: 0.04, transparent: true, opacity: 0.95,
      depthWrite: false
    });
    this.points = new THREE.Points(geom, mat);
    this.points.visible = false;
    scene.add(this.points);
  }
  burst(origin, intensity = 1) {
    this.parts = [];
    for (let i = 0; i < this.count; i++) {
      const dir = new THREE.Vector3(
        (Math.random() - 0.5),
        Math.random() * 0.7,
        (Math.random() - 0.5)
      ).normalize().multiplyScalar(0.6 + Math.random() * 1.4 * intensity);
      this.parts.push({
        pos: origin.clone(),
        vel: dir,
        life: 1.0
      });
    }
    this.points.visible = true;
  }
  update(dt) {
    if (!this.points.visible) return;
    let alive = 0;
    const arr = this.points.geometry.attributes.position.array;
    for (let i = 0; i < this.parts.length; i++) {
      const p = this.parts[i];
      p.life -= dt * 1.4;
      if (p.life > 0) {
        p.vel.y -= 4.0 * dt;
        p.pos.addScaledVector(p.vel, dt);
        alive++;
      }
      arr[i * 3 + 0] = p.pos.x;
      arr[i * 3 + 1] = p.pos.y;
      arr[i * 3 + 2] = p.pos.z;
    }
    this.points.geometry.attributes.position.needsUpdate = true;
    this.points.material.opacity = 0.4 + 0.55 * Math.max(0, this.parts[0]?.life || 0);
    if (alive === 0) this.points.visible = false;
  }
}
const blood = new ParticleBurst(scene, 40);

const DIFFICULTY = {

  normal: { foeReact: 0.36, foeAggression: 0.65, foeParryChance: 0.55, foeAccuracy: 0.82, foeSpeed: 1.0 },

/* ---------- input ---------- */
let pointerLocked = false;
canvas.addEventListener('click', () => {
  if (!state.running) return;
  if (!pointerLocked) canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = (document.pointerLockElement === canvas);
});

document.addEventListener('mousemove', e => {
  if (!state.running) return;
  if (pointerLocked) {
    // mouse delta drives aim
    const sens = 0.0035;
    state.aim.x += e.movementX * sens;
    state.aim.y -= e.movementY * sens;
    state.aim.x = Math.max(-1.05, Math.min(1.05, state.aim.x));
    state.aim.y = Math.max(-0.7, Math.min(0.6, state.aim.y));
  }
});

document.addEventListener('mousedown', e => {
  if (!state.running) return;
  if (!pointerLocked) { canvas.requestPointerLock(); return; }
  if (e.button === 0) tryThrust();
  if (e.button === 2) tryParry();
});
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'w') state.keys.w = true;
  if (e.key.toLowerCase() === 'a') state.keys.a = true;
  if (e.key.toLowerCase() === 's') state.keys.s = true;
  if (e.key.toLowerCase() === 'd') state.keys.d = true;
  if (e.key === 'Escape') {
    if (pointerLocked) document.exitPointerLock();
  }
});
document.addEventListener('keyup', e => {
  if (e.key.toLowerCase() === 'w') state.keys.w = false;
  if (e.key.toLowerCase() === 'a') state.keys.a = false;
  if (e.key.toLowerCase() === 's') state.keys.s = false;
  if (e.key.toLowerCase() === 'd') state.keys.d = false;
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  vmCamera.aspect = window.innerWidth / window.innerHeight;
  vmCamera.updateProjectionMatrix();
});

/* ============================================================================
   ACTIONS
   ============================================================================ */
function tryThrust() {
  if (state.thrusting || state.parryActiveUntil > performance.now()) return;
  if (state.staminaYou < 0.05) return;
  state.thrusting = true;
  state.thrustHitChecked = false;
  state.thrustTarget = 1.0;
  // immediate cost (small)
  state.staminaYou = Math.max(0, state.staminaYou - 0.04);
  Audio.thrustWoosh();
  setTimeout(() => {
    state.thrustTarget = 0.0;
    setTimeout(() => state.thrusting = false, 220);
  }, 130);
}

function tryParry() {
  if (state.parryActiveUntil > performance.now()) return;
  if (state.thrusting) return;
  state.parry = 0;
  state.parryTarget = 1.0;
  state.parryActiveUntil = performance.now() + 360;
  setTimeout(() => state.parryTarget = 0, 250);
  // clinking sound only if it actually deflects
}

function checkPlayerHit() {
  if (!state.thrusting || state.thrustHitChecked) return;
  if (state.thrust < 0.78) return;
  state.thrustHitChecked = true;

  // tip world position (in world scene, not vm)
  // approximate tip: project from camera in aim direction
  const aimDir = computeAimWorldDir();
  // tip is ~ 1.4 units forward at full thrust
  const tipWorld = camera.position.clone().add(aimDir.clone().multiplyScalar(1.4));

  // foe chest center
  const foeChest = opponent.position.clone();
  foeChest.y = 1.25;

  const dist = tipWorld.distanceTo(foeChest);

  // is foe parrying?
  const foeParrying = (state.foeAction === 'parry');

  if (dist < 0.45) {
    if (foeParrying) {
      // CLANG! foe parried
      onParryClash(tipWorld, true);
      state.staminaYou = Math.max(0, state.staminaYou - 0.10);
      // foe riposte
      scheduleFoeRiposte();
    } else {
      onPlayerHit(foeChest);
    }
  } else if (dist < 1.1) {
    // missed close — opponent might counter
    state.staminaYou = Math.max(0, state.staminaYou - 0.04);
  } else {
    // clear miss
    state.staminaYou = Math.max(0, state.staminaYou - 0.02);
  }
}

function onPlayerHit(at) {
  state.staminaFoe = Math.max(0, state.staminaFoe - 0.34);
  Audio.hitFlesh();
  blood.burst(at, 1.0);
  flash('rgba(180,30,20,0.45)', 0.6);
  showSubtitle('Touché!', 900);
  shake(0.25);
  // foe stagger
  state.foeAction = 'recover';
  state.foeActionDur = 0.7;
  state.foeActionTimer = 0;
  state.foeBodyLean = -0.3;
  state.foeShoulderDip = 0.4;
  if (state.staminaFoe <= 0) {
    triggerSlowMo();
    setTimeout(() => endRound('player'), 850);
  }
}

function onParryClash(at, foeParried) {
  Audio.bladeClink(0.95, 0.85 + Math.random() * 0.4);
  shake(0.18);
  flash('rgba(255,230,180,0.35)', 0.4);
  // sparks (tiny)
  blood.points.material.color.setHex(0xffe4a8);
  blood.burst(at, 0.4);
  // restore color after burst draws
  setTimeout(() => blood.points.material.color.setHex(0xa01010), 100);
  if (foeParried) showSubtitle('Parried!', 700);
}

function scheduleFoeRiposte() {
  const d = DIFFICULTY[state.difficulty];
  setTimeout(() => {
    if (state.inRoundEnd) return;
    state.foeAction = 'thrust';
    state.foeActionDur = 0.45 / d.foeSpeed;
    state.foeActionTimer = 0;
  }, 220);
}

function triggerSlowMo() {
  state.slowMoTarget = 0.22;
  setTimeout(() => state.slowMoTarget = 1.0, 900);
}

function shake(amount) { state.shakeAmount = Math.min(1, state.shakeAmount + amount); }
function flash(color, strength) { state.flashColor = color; state.flashStrength = strength; }

function showSubtitle(text, ms = 1200, huge = false) {
  const el = document.getElementById('subtitle');
  el.textContent = text;
  el.classList.toggle('huge', huge);
  el.classList.add('show');
  clearTimeout(showSubtitle._t);
  showSubtitle._t = setTimeout(() => el.classList.remove('show'), ms);
}

/* ---------- compute world-space aim direction from screen-space aim ---------- */
function computeAimWorldDir() {
  // base forward from camera (camera looks toward -Z in its local space, plus body yaw)
  const forward = new THREE.Vector3(0, 0, -1);
  forward.applyEuler(new THREE.Euler(0, state.playerLookY, 0, 'YXZ'));
  // small tilt from aim
  const right = new THREE.Vector3(1, 0, 0).applyEuler(new THREE.Euler(0, state.playerLookY, 0, 'YXZ'));
  const up = new THREE.Vector3(0, 1, 0);
  const dir = forward.clone()
    .addScaledVector(right, state.aimSmooth.x * 0.28)
    .addScaledVector(up, state.aimSmooth.y * 0.20)
    .normalize();
  return dir;
}

/* ============================================================================
   FOE AI
   ============================================================================ */
function foeThink(dt, now) {
  if (state.inRoundEnd) return;
  const d = DIFFICULTY[state.difficulty];

  // detect player thrust + decide to parry
  if (state.thrusting && state.thrust > 0.4 && state.foeAction === 'idle') {
    if (Math.random() < d.foeParryChance) {
      state.foeAction = 'parry';
      state.foeActionDur = 0.40 / d.foeSpeed;
      state.foeActionTimer = 0;
    }
  }

  // tick action
  if (state.foeAction !== 'idle') {
    state.foeActionTimer += dt;
    if (state.foeActionTimer >= state.foeActionDur) {
      // action complete — may have hit
      if (state.foeAction === 'thrust' || state.foeAction === 'lunge') {
        resolveFoeAttack();
      }
      state.foeAction = 'idle';
      state.foeBodyLean = 0;
      state.foeShoulderDip = 0;
      state.foeFootRaise = 0;
    }
  } else {
    // think next move
    if (now > state.foeNextThink) {
      const r = Math.random();
      if (state.staminaFoe < 0.3 && Math.random() < 0.4) {
        // back off to recover
        state.foeAction = 'recover';
        state.foeActionDur = 0.9;
        state.foeActionTimer = 0;
      } else if (r < d.foeAggression * 0.6) {
        // thrust with telegraph
        state.foeAction = 'telegraph';
        state.foeActionDur = d.foeReact;
        state.foeActionTimer = 0;
        state.foeShoulderDip = 1;
        // chain to thrust
        const dur = d.foeReact * 1000;
        setTimeout(() => {
          if (state.inRoundEnd) return;
          if (state.foeAction === 'telegraph') {
            state.foeAction = 'thrust';
            state.foeActionDur = 0.42 / d.foeSpeed;
            state.foeActionTimer = 0;
            state.foeShoulderDip = 0;
          }
        }, dur);
      } else if (r < d.foeAggression * 0.85) {
        // lunge with foot raise telegraph
        state.foeAction = 'telegraph';
        state.foeActionDur = d.foeReact * 1.1;
        state.foeActionTimer = 0;
        state.foeFootRaise = 1;
        const dur = d.foeReact * 1100;
        setTimeout(() => {
          if (state.inRoundEnd) return;
          if (state.foeAction === 'telegraph') {
            state.foeAction = 'lunge';
            state.foeActionDur = 0.55 / d.foeSpeed;
            state.foeActionTimer = 0;
            state.foeFootRaise = 0;
          }
        }, dur);
      } else if (r < 0.95) {
        // feint — little jab no follow-through
        state.foeAction = 'telegraph';
        state.foeActionDur = 0.18;
        state.foeActionTimer = 0;
        state.foeShoulderDip = 0.5;
        setTimeout(() => {
          state.foeAction = 'idle';
          state.foeShoulderDip = 0;
        }, 200);
      }
      state.foeNextThink = now + 800 + Math.random() * 1500;
    }
  }
}

function resolveFoeAttack() {
  const d = DIFFICULTY[state.difficulty];
  // is player parrying right now?
  const playerParrying = state.parryActiveUntil > performance.now();
  // accuracy roll
  const hits = Math.random() < d.foeAccuracy;
  if (playerParrying && hits) {
    // CLANG — player parried
    onParryClash(opponent.position.clone().setY(1.4), false);
    state.staminaFoe = Math.max(0, state.staminaFoe - 0.10);
    // small advantage subtitle
    showSubtitle('Parried', 700);
    // give player riposte window — reset foe to recover
    state.foeAction = 'recover';
    state.foeActionDur = 0.55;
    state.foeActionTimer = 0;
  } else if (hits) {
    // hits player
    onFoeHit();
  } else {
    // miss — small foe stamina loss
    state.staminaFoe = Math.max(0, state.staminaFoe - 0.05);
  }
}

function onFoeHit() {
  state.staminaYou = Math.max(0, state.staminaYou - 0.32);
  Audio.hitFlesh();
  shake(0.32);
  flash('rgba(120,16,16,0.55)', 0.7);
  showSubtitle('Struck!', 800);
  // small particle in front of camera
  const front = computeAimWorldDir();
  blood.burst(camera.position.clone().add(front.multiplyScalar(0.8)).setY(1.4), 0.7);
  if (state.staminaYou <= 0) {
    triggerSlowMo();
    setTimeout(() => endRound('foe'), 850);
  }
}

/* ============================================================================
   ROUND FLOW
   ============================================================================ */
function endRound(winner) {
  if (state.inRoundEnd) return;
  state.inRoundEnd = true;
  if (winner === 'player') state.scoreYou++;
  else state.scoreFoe++;
  updateScore();
  showSubtitle(winner === 'player' ? 'Round Won' : 'Round Lost', 1400, true);

  if (state.scoreYou >= 2 || state.scoreFoe >= 2 || state.round >= 3) {
    setTimeout(() => endMatch(state.scoreYou > state.scoreFoe ? 'player' : 'foe'), 1800);
    return;
  }
  setTimeout(() => startNextRound(), 2000);
}

function startNextRound() {
  state.round++;
  state.staminaYou = 1.0;
  state.staminaFoe = 1.0;
  state.foeAction = 'idle';
  state.thrusting = false;
  state.thrust = state.thrustTarget = 0;
  state.parry = state.parryTarget = 0;
  state.parryActiveUntil = 0;
  state.inRoundEnd = false;
  state.foePosOffset.set(0, 0, -1.5);
  state.playerOffset.set(0, 0, 5);
  document.getElementById('round-display').textContent = 'Round ' + state.round;
  showSubtitle('En Garde', 1100, true);
}

function endMatch(winner) {
  state.matchOver = true;
  state.running = false;
  if (pointerLocked) document.exitPointerLock();
  const ov = document.getElementById('end-overlay');
  ov.style.display = 'flex';
  document.getElementById('end-title').textContent = winner === 'player' ? 'Victory' : 'Defeat';
  document.getElementById('end-sub').textContent =
    winner === 'player'
      ? 'The piazza is yours.'
      : 'The lanterns flicker — your blade falls.';
}

function updateScore() {
  for (let i = 1; i <= 3; i++) {
    document.getElementById('pip-you-' + i).className = 'pip' + (i <= state.scoreYou ? ' you-won' : '');
    document.getElementById('pip-foe-' + i).className = 'pip' + (i <= state.scoreFoe ? ' foe-won' : '');
  }
}

/* ============================================================================
   ANIMATION LOOP
   ============================================================================ */
const clock = new THREE.Clock();
let lastFootstepTime = 0;
let lastBreathTime = 0;
let timeAccum = 0;
let breathPhase = 0;

function animate() {
  requestAnimationFrame(animate);
  const rawDt = Math.min(0.05, clock.getDelta());
  timeAccum += rawDt;

  // smooth slow-mo
  state.slowMo += (state.slowMoTarget - state.slowMo) * 0.12;
  const dt = rawDt * state.slowMo;

  // sky pulse
  sky.material.uniforms.time.value = timeAccum;
  // water ripples
  waterUniforms.time.value = timeAccum;

  // -------- player movement (footwork) --------
  if (state.running && !state.inRoundEnd) {
    const moveSpeed = 1.7;
    const lookCenter = opponent.position;
    // compute strafe-circle around opponent
    let dx = 0, dz = 0;
    if (state.keys.w) dz -= 1;
    if (state.keys.s) dz += 1;
    if (state.keys.a) dx -= 1;
    if (state.keys.d) dx += 1;
    if (dx !== 0 || dz !== 0) {
      const len = Math.hypot(dx, dz);
      dx /= len; dz /= len;
      // rotate to camera-yaw frame
      const yaw = state.playerLookY;
      const cz = Math.cos(yaw), sz = Math.sin(yaw);
      const wx = dx * cz - dz * sz;
      const wz = dx * sz + dz * cz;
      state.playerOffset.x += wx * moveSpeed * dt;
      state.playerOffset.z += wz * moveSpeed * dt;
      // footsteps
      if (timeAccum - lastFootstepTime > 0.5) {
        Audio.footstep(0.6);
        lastFootstepTime = timeAccum;
      }
    }
    // clamp distance from foe
    const v = state.playerOffset.clone().sub(state.foePosOffset);
    const horiz = Math.hypot(v.x, v.z);
    const minDist = 2.0, maxDist = 7.5;
    if (horiz < minDist) {
      const sc = minDist / horiz;
      v.x *= sc; v.z *= sc;
      state.playerOffset.x = state.foePosOffset.x + v.x;
      state.playerOffset.z = state.foePosOffset.z + v.z;
    }
    if (horiz > maxDist) {
      const sc = maxDist / horiz;
      v.x *= sc; v.z *= sc;
      state.playerOffset.x = state.foePosOffset.x + v.x;
      state.playerOffset.z = state.foePosOffset.z + v.z;
    }
    // keep within piazza
    const r = Math.hypot(state.playerOffset.x, state.playerOffset.z);
    if (r > 11) {
      state.playerOffset.x *= 11 / r;
      state.playerOffset.z *= 11 / r;
    }

    // auto-yaw to face opponent (smoothed)
    const fx = state.foePosOffset.x - state.playerOffset.x;
    const fz = state.foePosOffset.z - state.playerOffset.z;
    const targetYaw = Math.atan2(fx, -fz) + Math.PI; // we look toward opponent
    let dy = targetYaw - state.playerLookY;
    while (dy > Math.PI) dy -= Math.PI * 2;
    while (dy < -Math.PI) dy += Math.PI * 2;
    state.playerLookY += dy * Math.min(1, dt * 5);
  }

  // camera position + slight bob
  const bob = Math.sin(timeAccum * 4) * 0.012 * (state.keys.w || state.keys.s || state.keys.a || state.keys.d ? 1 : 0.3);
  camera.position.set(state.playerOffset.x, 1.65 + bob, state.playerOffset.z);
  // shake
  const sh = state.shakeAmount;
  state.shakeAmount = Math.max(0, sh - dt * 3.5);
  camera.position.x += (Math.random() - 0.5) * sh * 0.06;
  camera.position.y += (Math.random() - 0.5) * sh * 0.06;
  // look at foe
  const lookTarget = new THREE.Vector3(
    state.foePosOffset.x,
    1.55,
    state.foePosOffset.z
  );
  // small up/down nudge from aim Y
  lookTarget.y += state.aimSmooth.y * 0.6;
  camera.lookAt(lookTarget);
  // also small yaw nudge from aim X for cinematic feel
  camera.rotateY(-state.aimSmooth.x * 0.06);

  // -------- aim smoothing (gives blade weight/inertia) --------
  const k = 16; // spring
  const c = 5;  // damping
  const ax = (state.aim.x - state.aimSmooth.x) * k - state.aimVel.x * c;
  const ay = (state.aim.y - state.aimSmooth.y) * k - state.aimVel.y * c;
  state.aimVel.x += ax * rawDt;
  state.aimVel.y += ay * rawDt;
  state.aimSmooth.x += state.aimVel.x * rawDt;
  state.aimSmooth.y += state.aimVel.y * rawDt;

  // -------- update viewmodel sword (player) --------
  const vm = playerSword.userData;
  // shoulder follows aim (the whole arm rises/swings)
  vm.shoulder.rotation.x = -state.aimSmooth.y * 0.5 - 0.05;
  vm.shoulder.rotation.y = -state.aimSmooth.x * 0.6;
  vm.shoulder.rotation.z = state.aimSmooth.x * 0.15;
  // wrist tilt
  vm.wrist.rotation.z = state.aimSmooth.x * 0.25;
  vm.wrist.rotation.x = -state.aimSmooth.y * 0.2;

  // thrust extension
  state.thrust += (state.thrustTarget - state.thrust) * 0.35;
  vm.shoulder.position.z = -0.5 + state.thrust * 0.55;
  vm.shoulder.position.y = -0.45 - state.aimSmooth.y * 0.05 + state.thrust * 0.05;

  // parry rotation — twist blade across center
  state.parry += (state.parryTarget - state.parry) * 0.25;
  vm.sword.rotation.z = state.parry * 1.3;
  vm.sword.rotation.x = state.parry * -0.4;
  vm.shoulder.position.x = 0.45 - state.parry * 0.25;

  // blade glint — pulse with thrust + slight wobble
  vm.blade.material.emissive.setRGB(
    0.3 * state.thrust + 0.05 * (1 + Math.sin(timeAccum * 6)),
    0.22 * state.thrust,
    0.05 * state.thrust
  );

  // breathing — subtle vertical drift on the whole sword group when at rest
  const breathing = Math.sin(timeAccum * 1.5) * 0.008 * (1 - state.thrust);
  vm.shoulder.position.y += breathing;

  // tip world position in vmScene
  const tipVM = new THREE.Vector3();
  vm.tip.getWorldPosition(tipVM);
  trail.push(tipVM);
  trail.setIntensity(Math.min(1, Math.abs(state.aimVel.x) * 0.4 + Math.abs(state.aimVel.y) * 0.4 + state.thrust * 0.6));
  trail.update();

  // hit check during thrust apex
  if (state.thrusting && !state.thrustHitChecked) {
    if (state.thrust > 0.78) checkPlayerHit();
  }

  // -------- foe AI --------
  if (state.running && !state.inRoundEnd) {
    foeThink(rawDt, performance.now());

    // foe footwork — mirror around player
    const playerPos = new THREE.Vector3(state.playerOffset.x, 0, state.playerOffset.z);
    const foeRel = state.foePosOffset.clone().sub(playerPos);
    const targetDist = 3.2;
    const curDist = Math.hypot(foeRel.x, foeRel.z);
    const desired = foeRel.clone().normalize().multiplyScalar(targetDist).add(playerPos);
    state.foePosOffset.x += (desired.x - state.foePosOffset.x) * Math.min(1, dt * 1.3);
    state.foePosOffset.z += (desired.z - state.foePosOffset.z) * Math.min(1, dt * 1.3);
    // small circling
    const orbit = Math.sin(timeAccum * 0.4) * 0.4;
    const tx = playerPos.x + Math.sin(Math.atan2(foeRel.x, foeRel.z) + orbit * dt) * targetDist;
    const tz = playerPos.z + Math.cos(Math.atan2(foeRel.x, foeRel.z) + orbit * dt) * targetDist;
    state.foePosOffset.x += (tx - state.foePosOffset.x) * Math.min(1, dt * 0.5);
    state.foePosOffset.z += (tz - state.foePosOffset.z) * Math.min(1, dt * 0.5);
  }
  opponent.position.set(state.foePosOffset.x, 0, state.foePosOffset.z);
  // face player
  const facingX = state.playerOffset.x - state.foePosOffset.x;
  const facingZ = state.playerOffset.z - state.foePosOffset.z;
  opponent.rotation.y = Math.atan2(facingX, facingZ);

  // -------- foe animation --------
  const fdata = opponent.userData;
  // arm based on action
  let targetArmX = -0.6, targetArmY = 0.0, targetArmZ = 0.0;
  let targetBodyLean = 0;
  if (state.foeAction === 'idle') {
    // rest pose, blade pointing forward
    targetArmX = -0.6;
  } else if (state.foeAction === 'telegraph') {
    targetArmX = -0.4 - state.foeShoulderDip * 0.25;
    targetBodyLean = state.foeShoulderDip * 0.15;
  } else if (state.foeAction === 'thrust') {
    const t = state.foeActionTimer / state.foeActionDur;
    const ext = Math.sin(t * Math.PI);
    targetArmX = -0.6 + ext * 1.2;
    targetBodyLean = ext * 0.25;
  } else if (state.foeAction === 'lunge') {
    const t = state.foeActionTimer / state.foeActionDur;
    const ext = Math.sin(t * Math.PI);
    targetArmX = -0.6 + ext * 1.5;
    targetBodyLean = ext * 0.45;
  } else if (state.foeAction === 'parry') {
    const t = state.foeActionTimer / state.foeActionDur;
    const ext = Math.sin(t * Math.PI);
    targetArmX = -0.6 + ext * 0.4;
    targetArmZ = ext * 1.0;
  } else if (state.foeAction === 'recover') {
    targetArmX = -0.4;
    targetBodyLean = -0.2;
  }
  // smooth
  fdata.armPivot.rotation.x += (targetArmX - fdata.armPivot.rotation.x) * Math.min(1, rawDt * 12);
  fdata.armPivot.rotation.z += (targetArmZ - fdata.armPivot.rotation.z) * Math.min(1, rawDt * 12);
  fdata.body.rotation.x = -targetBodyLean * 0.5 + state.foeBodyLean * 0.3;
  state.foeBodyLean *= 0.92;
  state.foeShoulderDip = Math.max(0, state.foeShoulderDip - rawDt * 1.2);

  // foot raise telegraph
  if (state.foeFootRaise > 0) {
    fdata.bootR.position.y = 0.05 + state.foeFootRaise * 0.12;
    fdata.legR.position.y = 0.48 + state.foeFootRaise * 0.05;
  } else {
    fdata.bootR.position.y += (0.05 - fdata.bootR.position.y) * 0.3;
    fdata.legR.position.y += (0.48 - fdata.legR.position.y) * 0.3;
  }

  // eyes track player blade tip (head subtle yaw)
  // head sits at body top — we can tilt body slightly
  const trackY = state.aimSmooth.y * 0.04;
  fdata.head.rotation.x = -trackY;

  // plume sway
  fdata.plume.rotation.z = 0.3 + Math.sin(timeAccum * 1.6) * 0.15;

  // collapse on death
  if (state.staminaFoe <= 0 && !opponent.userData.fallen) {
    opponent.userData.fallen = true;
    const fall = setInterval(() => {
      opponent.rotation.x += 0.04;
      opponent.position.y -= 0.01;
      if (opponent.rotation.x > Math.PI / 2 - 0.1) clearInterval(fall);
    }, 30);
  }
  // player collapse
  if (state.staminaYou <= 0 && !state._fallen) {
    state._fallen = true;
    const fall = setInterval(() => {
      camera.position.y -= 0.04;
      if (camera.position.y < 0.4) clearInterval(fall);
    }, 30);
  }

  // -------- breath sound, getting heavier as stamina drops --------
  if (state.running && timeAccum - lastBreathTime > 1.4 + state.staminaYou * 1.5) {
    Audio.breath(1 - state.staminaYou * 0.7);
    lastBreathTime = timeAccum;
  }

  // -------- hud bars --------
  document.getElementById('stamina-you-fill').style.width = (state.staminaYou * 100).toFixed(0) + '%';
  document.getElementById('stamina-foe-fill').style.width = (state.staminaFoe * 100).toFixed(0) + '%';

  // -------- flash --------
  const flashEl = document.getElementById('flash');
  if (state.flashStrength > 0) {
    flashEl.style.background = state.flashColor || 'rgba(255,255,255,0.4)';
    state.flashStrength = Math.max(0, state.flashStrength - rawDt * 3);
    if (state.flashStrength < 0.05) {
      flashEl.style.background = 'rgba(0,0,0,0)';
    }
  }

  // -------- lantern flicker --------
  for (const l of lanterns) {
    const f = 1 + (Math.sin(timeAccum * 7 + l.group.position.x) + Math.sin(timeAccum * 11 + l.group.position.z)) * 0.05;
    l.light.intensity = 1.4 * f;
    l.glow.material.color.setRGB(1.0 * f, 0.7 * f, 0.4 * f);
  }

  // -------- render --------
  renderer.clear();
  renderer.render(scene, camera);
  renderer.autoClear = false;
  renderer.clearDepth();
  renderer.render(vmScene, vmCamera);
  renderer.autoClear = true;

  // -------- particles after render is fine, they'll show next frame --------
  blood.update(rawDt);
}
animate();

/* ============================================================================
   MENU
   ============================================================================ */
const diffBtns = document.querySelectorAll('.diff-btn');
diffBtns.forEach(b => {
  b.addEventListener('click', () => {
    diffBtns.forEach(x => x.classList.remove('selected'));
    b.classList.add('selected');
    state.difficulty = b.dataset.diff;
  });
});
document.getElementById('start-btn').addEventListener('click', () => {
  Audio.ensure(); Audio.resume();
  document.getElementById('menu').style.display = 'none';
  state.running = true;
  state.round = 1;
  state.scoreYou = 0;
  state.scoreFoe = 0;
  state.staminaYou = 1.0;
  state.staminaFoe = 1.0;
  state.matchOver = false;
  state.inRoundEnd = false;
  state._fallen = false;
  opponent.userData.fallen = false;
  opponent.rotation.x = 0;
  opponent.position.y = 0;
  document.getElementById('round-display').textContent = 'Round 1';
  updateScore();
  setTimeout(() => {
    showSubtitle('En Garde', 1100, true);
    canvas.requestPointerLock();
  }, 250);
});

document.getElementById('end-restart').addEventListener('click', () => {
  document.getElementById('end-overlay').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
});

</script>
