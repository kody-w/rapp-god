<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>R24 Multiverse · Universe 2/12 · Cyberpunk 2099</title>
<style>
:root{--mag:#ff007f;--cy:#00ffff;--yl:#ffeb00;--pp:#1a0033;--ch:#c0c0c0;--ink:#0a0014}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);color:#e8f0ff;font:12px/1.35 ui-monospace,Menlo,Consolas,monospace}
canvas{display:block;position:fixed;inset:0;z-index:0}
.hud{position:fixed;z-index:5;pointer-events:none;text-shadow:0 0 8px rgba(255,0,127,.6),0 0 2px #000}
.box{background:linear-gradient(180deg,rgba(26,0,51,.86),rgba(10,0,20,.86));border:1px solid #ff007f55;border-radius:6px;padding:7px 9px;backdrop-filter:blur(4px);box-shadow:0 0 18px #ff007f33,inset 0 0 10px #00ffff22}
.box b{color:var(--mag)}
.box i{color:var(--cy);font-style:normal}
.box em{color:var(--yl);font-style:normal}
#stamp{top:8px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:1.5px}
#stamp .u{color:var(--cy)}
#stamp .g{color:var(--mag)}
#chyron{bottom:54px;left:0;right:0;text-align:center;font-size:14px;letter-spacing:.5px}
#chyron span{display:inline-block;padding:6px 14px;background:linear-gradient(90deg,#1a0033cc,#330044cc,#1a0033cc);border-top:1px solid #ff007f;border-bottom:1px solid #00ffff}
#fork{top:42px;left:8px;width:248px;font-size:11px}
#plan{top:42px;right:8px;width:262px;font-size:11px}
#drama{bottom:8px;left:8px;width:300px;font-size:11px}
#mini{bottom:8px;right:8px;width:170px;height:118px;padding:4px}
#mini canvas{position:relative;width:100%;height:100%;display:block;background:#06000c;border-radius:4px}
#pip{top:182px;right:8px;width:262px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:9px}
.pipcell{height:62px;background:#0a0020;border:1px solid #00ffff44;border-radius:3px;position:relative;overflow:hidden}
.pipcell canvas{position:absolute;inset:0;width:100%;height:100%}
.pipcell .lbl{position:absolute;left:3px;bottom:2px;background:#000a;padding:1px 4px;font-size:8px;letter-spacing:.4px;color:var(--cy)}
#cam{top:8px;left:8px;font-size:10px;color:var(--cy)}
#act{top:8px;right:8px;font-size:10px;color:var(--yl)}
.bar{height:4px;background:#220033;border:1px solid #ff007f55;border-radius:2px;overflow:hidden;margin-top:3px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#00ffff,#ff007f,#ffeb00);font-style:normal}
.rung{display:flex;justify-content:space-between;font-size:10px;margin-top:2px;color:#aab}
.rung b{color:var(--yl)}
.row{display:flex;justify-content:space-between;font-size:10px;color:#bcd}
.row b{color:#fff}
.glitch{animation:gl .25s steps(2) infinite}
@keyframes gl{50%{transform:translate(1px,-1px)}}
#flash{position:fixed;inset:0;pointer-events:none;z-index:4;background:radial-gradient(circle at 50% 50%,#ff007f33,transparent 60%);opacity:0;transition:opacity .2s}
</style>
</head>
<body>
<!-- ROUND24_MULTIVERSE v1 -->
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="cam" class="hud box">CAM 01 / 32 · DIRECTOR</div>
<div id="act" class="hud box">ACT I · NEON ARRIVAL</div>
<div id="stamp" class="hud box"><span class="u">UNIVERSE 2/12</span> · <span class="g">CYBERPUNK 2099</span> · BRIMSWORTH MEGALOPOLIS</div>
<div id="fork" class="hud box"><b>TIMELINE FORK · R24</b><div id="forkbody"></div></div>
<div id="plan" class="hud box"><b>AGENTIC PLAN TREE</b><div id="planbody"></div></div>
<div id="drama" class="hud box"><b>DRAMA LADDER</b><div id="dramabody"></div></div>
<div id="mini" class="hud box"><canvas id="minic" width="320" height="220"></canvas></div>
<div id="pip" class="hud">
<div class="pipcell"><canvas id="pip0" width="200" height="120"></canvas><div class="lbl">C·1984</div></div>
<div class="pipcell"><canvas id="pip1" width="200" height="120"></canvas><div class="lbl">C·2024</div></div>
<div class="pipcell"><canvas id="pip2" width="200" height="120"></canvas><div class="lbl">U·STEAMPUNK</div></div>
<div class="pipcell"><canvas id="pip3" width="200" height="120"></canvas><div class="lbl">U·SOLARPUNK</div></div>
</div>
<div id="chyron" class="hud"><span id="chytext">— rooftop neon shrine boots up · Universe 2/12 begins —</span></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
"use strict";
var SENTINEL = "ROUND24"+"_MULTIVERSE"+" v1";
var LS_SELF = "multiverse_cyberpunk_v1";
var LS_LEDGER = "brimsworth_multiverse_v1";
var LS_CENTURY = "brimsworth_century_v1";
var LS_LIFETIME = "brimsworth_lifetime_v1";
var LS_CAST = "recurring_cast_v1";
var RESEED_MS = 600000;

function readJSON(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function writeJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// --- multiverse handshake ---
var prevSteam = readJSON("multiverse_steampunk_v1",null);
var bytesFrom = prevSteam?"steampunk":null;
var ledger = readJSON(LS_LEDGER,[]);
ledger.push({universe_id:"cyberpunk",timestamp_visited:Date.now(),bytes_arrived_from:bytesFrom});
if(ledger.length>200) ledger=ledger.slice(-200);
writeJSON(LS_LEDGER,ledger);

var century = readJSON(LS_CENTURY,{decades:[],seeded:0});
var lifetime = readJSON(LS_LIFETIME,{years:[],seeded:0});
var castMem = readJSON(LS_CAST,{appearances:0,memories:[]});

// --- self state ---
var self = readJSON(LS_SELF,null);
var now = Date.now();
if(!self || now - (self.seeded||0) > RESEED_MS){
  self = {seeded:now, cycles:(self?self.cycles+1:1), bytesArrivals:0, drama:1, lastChyron:""};
}
self.cycles = (self.cycles||0)+1;
writeJSON(LS_SELF,self);

// --- broadcast channel ---
var bc=null;
try{ bc=new BroadcastChannel("brimsworth_multiverse"); }catch(e){}
function emit(t,p){ if(bc) try{bc.postMessage({t:t,p:p,u:"cyberpunk",ts:Date.now()})}catch(e){} }
if(bc) bc.onmessage = function(ev){
  var d=ev.data; if(!d) return;
  if(d.t==="twin-portal-opens" && d.u!=="cyberpunk"){
    setChyron("· twin-portal handshake from "+d.u+" universe ·");
  }
};

// --- THREE setup ---
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0014);
scene.fog = new THREE.FogExp2(0x140020, 0.012);

var renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.6));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

var W=window.innerWidth, H=window.innerHeight;
var mainCam = new THREE.PerspectiveCamera(60, W/H, 0.1, 800);
mainCam.position.set(20,12,30);

window.addEventListener("resize",function(){
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);
  mainCam.aspect=W/H; mainCam.updateProjectionMatrix();
});

// --- lighting ---
var ambient = new THREE.AmbientLight(0x331a55, 0.9);
scene.add(ambient);
var hemi = new THREE.HemisphereLight(0xff66cc, 0x000022, 0.4);
scene.add(hemi);
var moon = new THREE.DirectionalLight(0x88aaff, 0.35);
moon.position.set(40,80,30);
scene.add(moon);

function neonLight(c,x,y,z,i,d){
  var l = new THREE.PointLight(c,i||1.4,d||38,1.7);
  l.position.set(x,y,z);
  scene.add(l);
  return l;
}
var L_mag = neonLight(0xff007f,-8,9,4,2.0,42);
var L_cy = neonLight(0x00ffff,8,9,-2,2.0,42);
var L_yl = neonLight(0xffeb00,0,12,12,1.4,30);
var L_pink = neonLight(0xff66bb,-22,7,-18,1.0,40);
var L_blue = neonLight(0x4488ff,22,7,-18,1.0,40);
var L_drone = neonLight(0x00ffaa,0,3,0,1.6,12);

// --- materials ---
function emat(c,e,m){return new THREE.MeshStandardMaterial({color:c,emissive:e!==undefined?e:c,emissiveIntensity:m!==undefined?m:0.6,metalness:0.6,roughness:0.35})}
function mat(c,m,r){return new THREE.MeshStandardMaterial({color:c,metalness:m!==undefined?m:0.5,roughness:r!==undefined?r:0.5})}
function ghost(c,o){return new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o!==undefined?o:0.55,blending:THREE.AdditiveBlending,depthWrite:false})}

// --- rooftop shrine floor (mirror-pool) ---
var floorGeo = new THREE.PlaneGeometry(70,70,16,16);
var floorMat = new THREE.MeshStandardMaterial({color:0x110022,metalness:0.95,roughness:0.08,emissive:0x220044,emissiveIntensity:0.25});
var floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = 0;
scene.add(floor);

// reflective pool inset
var poolGeo = new THREE.CircleGeometry(14,48);
var poolMat = new THREE.MeshStandardMaterial({color:0x000010,metalness:1.0,roughness:0.02,emissive:0x110033,emissiveIntensity:0.4});
var pool = new THREE.Mesh(poolGeo,poolMat);
pool.rotation.x = -Math.PI/2;
pool.position.y = 0.01;
scene.add(pool);

// rooftop edge railing
var railMat = emat(0xff007f,0xff007f,0.9);
for(var ri=0;ri<60;ri++){
  var ang = ri/60*Math.PI*2;
  var rr = 30;
  var post = new THREE.Mesh(new THREE.BoxGeometry(0.18,2.6,0.18),railMat);
  post.position.set(Math.cos(ang)*rr,1.3,Math.sin(ang)*rr);
  scene.add(post);
}
var railRing = new THREE.Mesh(new THREE.TorusGeometry(30,0.07,8,80),emat(0x00ffff,0x00ffff,1.0));
railRing.rotation.x=Math.PI/2; railRing.position.y=2.55; scene.add(railRing);

// --- neon shrine arch ---
var shrineGroup = new THREE.Group();
scene.add(shrineGroup);
var pillarMat = emat(0x222244,0xff007f,0.5);
var p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,8,12),pillarMat);
p1.position.set(-5,4,-6); shrineGroup.add(p1);
var p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,8,12),pillarMat);
p2.position.set(5,4,-6); shrineGroup.add(p2);
var arch = new THREE.Mesh(new THREE.TorusGeometry(5.2,0.32,12,32,Math.PI),emat(0x00ffff,0x00ffff,1.4));
arch.position.set(0,8,-6); arch.rotation.z = Math.PI; shrineGroup.add(arch);
var arch2 = new THREE.Mesh(new THREE.TorusGeometry(4.4,0.16,8,28,Math.PI),emat(0xff007f,0xff007f,1.4));
arch2.position.set(0,8,-6); arch2.rotation.z = Math.PI; shrineGroup.add(arch2);

// --- fake-kanji glyph planes ---
var glyphGroup = new THREE.Group();
scene.add(glyphGroup);
function makeGlyphTex(seed,color){
  var c=document.createElement("canvas"); c.width=128; c.height=128;
  var g=c.getContext("2d");
  g.fillStyle="rgba(0,0,0,0)"; g.fillRect(0,0,128,128);
  g.strokeStyle=color; g.lineWidth=10; g.lineCap="square";
  var rng = seed;
  function r(){ rng = (rng*1103515245+12345)&0x7fffffff; return rng/0x7fffffff; }
  var n = 3+Math.floor(r()*4);
  for(var i=0;i<n;i++){
    g.beginPath();
    g.moveTo(20+r()*88, 20+r()*88);
    g.lineTo(20+r()*88, 20+r()*88);
    g.stroke();
  }
  // crossbars
  for(var j=0;j<2;j++){
    g.beginPath();
    g.moveTo(20, 30+j*40);
    g.lineTo(108, 30+j*40);
    g.stroke();
  }
  var t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  return t;
}
var glyphCols = [0xff007f,0x00ffff,0xffeb00,0xff66cc,0x44ffaa];
for(var gi=0;gi<22;gi++){
  var col = glyphCols[gi%glyphCols.length];
  var tex = makeGlyphTex(gi*9173+11,"#"+col.toString(16).padStart(6,"0"));
  var pmat = new THREE.MeshBasicMaterial({map:tex,transparent:true,color:col,blending:THREE.AdditiveBlending});
  var pl = new THREE.Mesh(new THREE.PlaneGeometry(2.4,2.4),pmat);
  var ang = gi/22 * Math.PI*2;
  var rr = 22 + (gi%3)*4;
  pl.position.set(Math.cos(ang)*rr, 6+ (gi%5)*1.6, Math.sin(ang)*rr);
  pl.lookAt(0,pl.position.y,0);
  pl.userData.spin = (gi%2?1:-1)*0.002;
  glyphGroup.add(pl);
}

// --- distant megalopolis skyline ---
var cityGroup = new THREE.Group();
scene.add(cityGroup);
function rng(s){return function(){s=(s*1664525+1013904223)&0xffffffff;return (s>>>0)/4294967295}}
var R = rng(1337);
for(var ci=0;ci<140;ci++){
  var hgt = 18+R()*70;
  var w = 4+R()*8;
  var d = 4+R()*8;
  var bg = new THREE.BoxGeometry(w,hgt,d);
  var col = (R()<0.5)?0x110022:0x1a0033;
  var m = new THREE.MeshStandardMaterial({color:col,emissive:R()<0.4?(R()<0.5?0xff007f:0x00ffff):0x110044,emissiveIntensity:0.35,metalness:0.4,roughness:0.6});
  var b = new THREE.Mesh(bg,m);
  var ang = R()*Math.PI*2;
  var dist = 70 + R()*200;
  b.position.set(Math.cos(ang)*dist, hgt/2 - 10, Math.sin(ang)*dist);
  cityGroup.add(b);
  // window strips
  if(R()<0.6){
    var stripMat = new THREE.MeshBasicMaterial({color:R()<0.5?0xff007f:0x00ffff,transparent:true,opacity:0.85});
    var strip = new THREE.Mesh(new THREE.PlaneGeometry(w*0.8,hgt*0.7),stripMat);
    strip.position.copy(b.position);
    strip.position.y += 1;
    strip.lookAt(0,strip.position.y,0);
    strip.position.add(new THREE.Vector3(Math.cos(ang),0,Math.sin(ang)).multiplyScalar(-d/2-0.05));
    cityGroup.add(strip);
  }
}

// --- hovercars ---
var hovercars = [];
for(var hc=0;hc<24;hc++){
  var g = new THREE.Group();
  var body = new THREE.Mesh(new THREE.BoxGeometry(2.2,0.5,1.0),emat(0x222244,0xff007f,0.6));
  var glow = new THREE.Mesh(new THREE.BoxGeometry(2.4,0.1,1.1),new THREE.MeshBasicMaterial({color:hc%2?0x00ffff:0xff007f,transparent:true,opacity:0.85}));
  glow.position.y=-0.25;
  g.add(body); g.add(glow);
  g.position.set(-100+R()*200, 12+R()*50, -100+R()*200);
  g.userData = {speed: 0.08+R()*0.18, dir:R()<0.5?1:-1, ax:R()*Math.PI*2};
  scene.add(g); hovercars.push(g);
}

// --- holographic petals ---
var petals = [];
var petalGeo = new THREE.PlaneGeometry(0.34,0.5);
for(var ph=0;ph<140;ph++){
  var pcol = ph%3===0?0xff66cc:(ph%3===1?0x00ffff:0xffeb00);
  var pmat2 = new THREE.MeshBasicMaterial({color:pcol,transparent:true,opacity:0.65,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  var pet = new THREE.Mesh(petalGeo,pmat2);
  pet.position.set(-25+R()*50, 1+R()*20, -25+R()*50);
  pet.userData = {vy:-0.005-R()*0.02, vx:(R()-0.5)*0.01, vz:(R()-0.5)*0.01, sp:R()*0.05};
  scene.add(pet); petals.push(pet);
}

// --- rain (sparse neon-glint) ---
var rainGeo = new THREE.BufferGeometry();
var rainCount = 600;
var rainPos = new Float32Array(rainCount*3);
for(var rp=0;rp<rainCount;rp++){
  rainPos[rp*3]=-40+Math.random()*80;
  rainPos[rp*3+1]=Math.random()*40;
  rainPos[rp*3+2]=-40+Math.random()*80;
}
rainGeo.setAttribute("position",new THREE.BufferAttribute(rainPos,3));
var rainMat = new THREE.PointsMaterial({color:0x88aaff,size:0.06,transparent:true,opacity:0.55});
var rain = new THREE.Points(rainGeo,rainMat);
scene.add(rain);

// --- character builder ---
function makeChar(opts){
  var g = new THREE.Group();
  var bodyCol = opts.body||0x335577;
  var headCol = opts.head||0xfdd0a2;
  var torso = new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.42,1.3,10),mat(bodyCol,0.6,0.4));
  torso.position.y = 0.85; g.add(torso);
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.27,12,12),mat(headCol,0.1,0.7));
  head.position.y = 1.78; g.add(head);
  if(opts.hair!==null){
    var hair = new THREE.Mesh(new THREE.SphereGeometry(0.29,12,8,0,Math.PI*2,0,Math.PI/2),mat(opts.hair||0x331122));
    hair.position.y = 1.86; g.add(hair);
  }
  // arms
  var aL = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.11,1.1,8),mat(bodyCol));
  aL.position.set(-0.42,0.95,0); aL.rotation.z=0.18; g.add(aL);
  var aR = aL.clone(); aR.position.x=0.42; aR.rotation.z=-0.18; g.add(aR);
  // legs
  var lL = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,1.0,8),mat(0x111122));
  lL.position.set(-0.16,0.18,0); g.add(lL);
  var lR = lL.clone(); lR.position.x=0.16; g.add(lR);
  // accents
  if(opts.glow){
    var coat = new THREE.Mesh(new THREE.CylinderGeometry(0.44,0.5,1.34,12),new THREE.MeshBasicMaterial({color:opts.glow,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending}));
    coat.position.y=0.85; g.add(coat);
  }
  if(opts.augEye){
    var eye = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),new THREE.MeshBasicMaterial({color:0x00ffff}));
    eye.position.set(0.09,1.82,0.22); g.add(eye);
    var glow2 = new THREE.PointLight(0x00ffff,0.6,2.5,2);
    glow2.position.set(0.09,1.82,0.22); g.add(glow2);
  }
  if(opts.veil){
    var veilMat = new THREE.MeshBasicMaterial({color:0xff66cc,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,side:THREE.DoubleSide});
    var veil = new THREE.Mesh(new THREE.ConeGeometry(0.6,1.4,12,1,true),veilMat);
    veil.position.y=1.4; veil.rotation.x=Math.PI; g.add(veil);
  }
  if(opts.neckcable){
    // curve: from neck to chest (cyberlily neckcable)
    var curve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0,1.55,0.2),
      new THREE.Vector3(0.3,1.35,0.25),
      new THREE.Vector3(-0.3,1.15,0.22),
      new THREE.Vector3(0.0,0.95,0.3)
    ]);
    var cgeo = new THREE.TubeGeometry(curve,24,0.04,6,false);
    var cmat = new THREE.MeshBasicMaterial({color:0xff00ff,transparent:true,opacity:0.95});
    var cable = new THREE.Mesh(cgeo,cmat); g.add(cable);
    var lily = new THREE.Mesh(new THREE.IcosahedronGeometry(0.11,0),new THREE.MeshBasicMaterial({color:0xff66ff}));
    lily.position.set(0,0.95,0.32); g.add(lily);
  }
  if(opts.waistcoat){
    var wmat = new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending});
    for(var wc=0;wc<5;wc++){
      var line = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.01,0.02),wmat);
      line.position.set(0,0.5+wc*0.18,0.43); g.add(line);
    }
  }
  return g;
}

// --- the recurring cast (R21 wedding) ---
var castObjs = {};
function place(name,obj,x,y,z){ obj.position.set(x,y||0,z); obj.userData.name=name; scene.add(obj); castObjs[name]=obj; return obj; }

var lily = makeChar({body:0xeeeeff,head:0xffe0c8,hair:0x442211,veil:true,neckcable:true,glow:0xff66cc});
place("Lily Bramble",lily,-0.7,0,-3);
var tomas = makeChar({body:0x222244,head:0xfdd0a2,hair:0x111111,augEye:true,waistcoat:true,glow:0x00ffff});
place("Tomas Field",tomas,0.7,0,-3);
var henry = makeChar({body:0x553333,head:0xeec8a0,hair:0xeeeeee});
place("Henry Sr",henry,-3,0,-1);
var marg = makeChar({body:0x664488,head:0xffd8b8,hair:0xcccccc});
place("Margaret",marg,3,0,-1);
var pemb = makeChar({body:0x222266,head:0xeed8b0,hair:0xffffff,glow:0xffeb00});
place("Mrs Pemberton",pemb,-5,0,1);
var eliza = makeChar({body:0x336688,head:0xfdd0a2,hair:0x553311});
place("Eliza Vellum",eliza,5,0,1);
var wren = makeChar({body:0x884488,head:0xffe0c8,hair:0x221100});
place("Margaret Wren",wren,-7,0,3);
var whit = makeChar({body:0x335544,head:0xeec8a0,hair:0x442211});
place("Mr Whitford",whit,7,0,3);

// --- Otto dog ---
function makeDog(c){
  var g=new THREE.Group();
  var b=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.32,0.26),mat(c||0xaa8866));
  b.position.y=0.3; g.add(b);
  var h=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.26,0.24),mat(c||0xaa8866));
  h.position.set(0.32,0.4,0); g.add(h);

// --- audio (glitch synth + sub bass + bit-crushed delay) ---
var ACtx=null, masterGain=null, delayNode=null, delayFb=null;
function startAudio(){
  if(ACtx) return;
  try{
    ACtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = ACtx.createGain();
    masterGain.gain.value = 0.0;
    masterGain.connect(ACtx.destination);
    // bit-crusher via waveshaper approximation
    var ws = ACtx.createWaveShaper();
    var n=64, curve = new Float32Array(n);
    for(var i=0;i<n;i++){curve[i]= Math.round((i/(n-1)*2-1)*8)/8;}
    ws.curve=curve; ws.oversample="2x";
    delayNode = ACtx.createDelay(); delayNode.delayTime.value = 0.32;
    delayFb = ACtx.createGain(); delayFb.gain.value = 0.32;
    delayNode.connect(ws); ws.connect(delayFb); delayFb.connect(delayNode);
    delayNode.connect(masterGain);
    // ramp up
    masterGain.gain.linearRampToValueAtTime(0.18, ACtx.currentTime+1.2);
  }catch(e){}
}
function note(freq,t0,dur,gain,detune){
  if(!ACtx) return;
  var o1=ACtx.createOscillator(); o1.type="square"; o1.frequency.value=freq;
  var o2=ACtx.createOscillator(); o2.type="square"; o2.frequency.value=freq; o2.detune.value=(detune||7);
  var sub=ACtx.createOscillator(); sub.type="sine"; sub.frequency.value=freq/2;
  var g=ACtx.createGain(); g.gain.value=0;
  o1.connect(g); o2.connect(g); sub.connect(g);
  g.connect(masterGain); g.connect(delayNode);
  g.gain.linearRampToValueAtTime((gain||0.08), t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o1.start(t0); o2.start(t0); sub.start(t0);
  o1.stop(t0+dur+0.05); o2.stop(t0+dur+0.05); sub.stop(t0+dur+0.05);
}
function leitmotif(){
  if(!ACtx) return;
  var t = ACtx.currentTime + 0.05;
  // C-E-G-C (C4, E4, G4, C5) — square detuned + sub
  var freqs=[261.63,329.63,392.00,523.25];
  for(var i=0;i<freqs.length;i++){
    note(freqs[i], t+i*0.42, 0.55, 0.06, 8+i*2);
  }
}

    mctx.strokeStyle = sw.col;
    mctx.stroke();
    mctx.fillStyle = "#fff"; mctx.font = "8px monospace";
    mctx.fillText(sw.name, x-sw.r*2, y-sw.r*2-2);
  }
  // hovercars
  for(var hci=0;hci<hovercars.length;hci++){
    var hh=hovercars[hci];
    mctx.fillStyle="#ffeb00";
    var hx=160+hh.position.x*1.4, hy=110+hh.position.z*1.4;
    if(hx>0&&hx<320&&hy>0&&hy<220){
      mctx.fillRect(hx,hy,2,1);
    }
  }
  // bride/groom
  mctx.fillStyle="#ff66cc"; mctx.fillRect(160+lily.position.x*4-2,110+lily.position.z*4-2,4,4);
  mctx.fillStyle="#00ffff"; mctx.fillRect(160+tomas.position.x*4-2,110+tomas.position.z*4-2,4,4);
  // bytes
  mctx.fillStyle="#00ffaa"; mctx.fillRect(160+bytes.position.x*4-2,110+bytes.position.z*4-2,3,3);
  // portal
  if(portalGroup.visible){
    mctx.fillStyle="#ff007f"; mctx.beginPath(); mctx.arc(160+8*4,110+4*4,5,0,Math.PI*2); mctx.fill();
  }
  mctx.fillStyle="#fff"; mctx.font="9px monospace"; mctx.fillText("CAM "+camName, 6,14);
  mctx.fillText("t="+fmt(t),6,24);
}

// --- pip thumbnails ---
var pipCanvases = ["pip0","pip1","pip2","pip3"].map(function(id){var c=document.getElementById(id);return {c:c,g:c.getContext("2d")};});
function drawPiP(t){
  // 0: 1984 century
  var p0=pipCanvases[0].g;
  p0.fillStyle="#1a0a00"; p0.fillRect(0,0,200,120);
  p0.fillStyle="#88aa44"; p0.fillRect(20,40,160,40);
  p0.fillStyle="#000"; p0.fillRect(28,48,144,24);
  p0.fillStyle="#0f0"; p0.font="8px monospace";
  p0.fillText("> CRT BRIMSWORTH 1984", 32, 60);
  p0.fillText("R23·c1984", 32, 70);
  p0.fillStyle="#0f0"; p0.fillRect(32+(t*8)%140, 74, 4, 2);
  // 1: 2024 century
  var p1=pipCanvases[1].g;
  p1.fillStyle="#001633"; p1.fillRect(0,0,200,120);
  for(var i=0;i<20;i++){p1.fillStyle="rgba(255,200,100,"+(0.3+Math.sin(t+i)*0.2)+")";p1.fillRect(i*10,80-Math.sin(t+i)*30,8,40);}
  p1.fillStyle="#fff"; p1.font="9px monospace"; p1.fillText("R23·c2024 APEX", 8, 14);
  // 2: STEAMPUNK universe
  var p2=pipCanvases[2].g;
  p2.fillStyle="#221100"; p2.fillRect(0,0,200,120);
  p2.fillStyle="#c88a3a"; p2.fillRect(60,40,80,40);
  p2.strokeStyle="#ddaa55";
  for(var ar=0;ar<6;ar++){p2.beginPath();p2.arc(100,60,8+ar*4,0,Math.PI*2);p2.stroke();}
  p2.fillStyle="#fff"; p2.font="9px monospace"; p2.fillText("U·STEAMPUNK 1899", 8, 14);
  // 3: SOLARPUNK
  var p3=pipCanvases[3].g;
  p3.fillStyle="#003322"; p3.fillRect(0,0,200,120);
  for(var sp=0;sp<8;sp++){p3.fillStyle="#88ffaa";p3.fillRect(sp*25,60+Math.sin(t+sp)*10,18,30);}
  p3.fillStyle="#ffeb00"; p3.beginPath(); p3.arc(100,30,12,0,Math.PI*2); p3.fill();
  p3.fillStyle="#fff"; p3.font="9px monospace"; p3.fillText("U·SOLARPUNK 2199", 8, 14);
}

// --- agentic NPC focus rotator ---
var npcFocusList = [
  {name:"Lily Bramble",goal:"speak vows under neon arch",plan:"clasp Tomas circuit-ring → recite 4-line vow",step:"raise hand to neckcable",mood:"resolute-romantic"},
  {name:"Tomas Field",goal:"sync augment-eye to Lily",plan:"calibrate iris → dim shrine LEDs",step:"blink twice",mood:"melancholy-warm"},
  {name:"Henry Sr",goal:"hold composure",plan:"breath-cycle of 4 → smile at Margaret",step:"steady hands",mood:"proud-aged"},
  {name:"Margaret",goal:"track Otto",plan:"lower hand → dog stay",step:"glance at Otto",mood:"vigilant-fond"},
  {name:"Mrs Pemberton",goal:"recall the 1984 broadcast",plan:"cross-reference century ledger",step:"nod at chyron",mood:"timeless"},
  {name:"Eliza Vellum",goal:"document genre transplant",plan:"mental archive: petals→holos",step:"raise stylus",mood:"observant"},
  {name:"Margaret Wren",goal:"pilot drone-quartet",plan:"hover-formation diamond",step:"signal Q4",mood:"focused"},
  {name:"Mr Whitford",goal:"verify augment-eye laws",plan:"scan Tomas firmware",step:"cross-check",mood:"professional"},
  {name:"Otto",goal:"stay near Henry",plan:"sit-on-cue → tail wag",step:"sit",mood:"loyal"},
  {name:"Captain Crunch",goal:"watch the portal",plan:"low growl → stand-by",step:"ears forward",mood:"alert"},
  {name:"Bytes",goal:"recognize self across timelines",plan:"approach portal → mirror-yawn",step:"leg-step toward brass-self",mood:"feline-cosmic"}
];

var crossoverChyrons = [
  "the multiverse cat acknowledges itself across timelines.",
  "neon shrine boots up · R21 vows reseeded as 2099 circuit-clasp",
  "Pemberton Sr's 1984 broadcast echoes through hovercar static",
  "Tomas's augment-eye mirrors the 2024 apex camera angle",
  "petals from R23 century thumbnails drift into the holo-chapel",
  "drone-quartet flies the diamond formation last seen at R20",
  "Lily's neckcable hums in C-E-G-C — leitmotif retained",
  "Wren-Drone family tree branches off the Wren bridesmaid line",
  "the rooftop rain falls on the same souls, 75 years on",
  "Whitford-Aug bureau cleared the augment-eye for ceremony"
];

function focusFor(t){
  var idx = Math.floor(t/8) % npcFocusList.length;
  var f = npcFocusList[idx];
  return {
    name:f.name, goal:f.goal, plan:f.plan, step:f.step, mood:f.mood,
    bar: (Math.sin(t*0.5)*0.5+0.5)
  };
}

// --- main loop ---
var clock = new THREE.Clock();
var t0 = performance.now();
var camIdx = 0;
var lastCamSwitch = 0;
var portalSpawnedAt = 300; // 5 minutes
var portalActive = false;
var bytesMet = false;
var act = 1;

setChyron("— rooftop neon shrine boots up · Universe 2/12 begins —");

function animate(){
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  var elapsed = (performance.now()-t0)/1000;

  // cycle camera every 9s
  if(elapsed - lastCamSwitch > 9){
    camIdx = (camIdx+1) % cameras.length;
    lastCamSwitch = elapsed;
    // sometimes change chyron
    if(Math.random()<0.5){
      setChyron("· "+crossoverChyrons[(camIdx)%crossoverChyrons.length]+" ·");
    }
  }

  // rotate hovercars
  for(var hh=0;hh<hovercars.length;hh++){
    var h=hovercars[hh];
    h.userData.ax += h.userData.speed*0.02*h.userData.dir;
    var rad = 60+(hh%5)*12;
    h.position.x = Math.cos(h.userData.ax)*rad + Math.sin(elapsed*0.1+hh)*4;
    h.position.z = Math.sin(h.userData.ax)*rad + Math.cos(elapsed*0.1+hh)*4;
    h.position.y = 12 + (hh%9)*4 + Math.sin(elapsed*0.5+hh)*0.6;
    h.rotation.y = h.userData.ax + Math.PI/2;
  }
  // glyph rotation
  for(var gx=0;gx<glyphGroup.children.length;gx++){
    glyphGroup.children[gx].rotation.y += glyphGroup.children[gx].userData.spin || 0.001;
  }
  // petals drift
  for(var pt=0;pt<petals.length;pt++){
    var p=petals[pt];
    p.position.y += p.userData.vy;
    p.position.x += p.userData.vx + Math.sin(elapsed*0.5+pt)*0.005;
    p.position.z += p.userData.vz;
    p.rotation.z += p.userData.sp*0.05;
    if(p.position.y < 0.5){
      p.position.y = 18 + Math.random()*4;
      p.position.x = -25+Math.random()*50;
      p.position.z = -25+Math.random()*50;
    }
  }
  // rain fall
  var rps = rain.geometry.attributes.position.array;
  for(var rr=0;rr<rainCount;rr++){
    rps[rr*3+1]-=0.6;
    if(rps[rr*3+1]<0){rps[rr*3+1]=40;rps[rr*3]=-40+Math.random()*80;rps[rr*3+2]=-40+Math.random()*80;}
  }
  rain.geometry.attributes.position.needsUpdate=true;

  // bytes idle hover
  bytes.position.y = 1.2 + Math.sin(elapsed*1.5)*0.08;
  bytes.rotation.y = Math.sin(elapsed*0.3)*0.5;
  // rotors spin
  bytes.children.forEach(function(ch){ if(ch.userData && ch.userData.spin) ch.rotation.y += 0.6; });

  // neon flicker on lights
  L_mag.intensity = 1.8 + Math.sin(elapsed*5)*0.4 + (Math.random()<0.04?0.8:0);
  L_cy.intensity = 1.8 + Math.cos(elapsed*4)*0.4 + (Math.random()<0.04?0.8:0);

  // act
  if(elapsed < 90) act = "ACT I · NEON ARRIVAL";
  else if(elapsed < 290) act = "ACT II · CIRCUIT VOWS";
  else act = "ACT III · MULTIVERSE PORTAL";

  // PORTAL EVENT at 300s
  if(!portalActive && elapsed >= portalSpawnedAt){
    portalActive = true;
    portalGroup.visible = true;
    portalLight.intensity = 4.0;
    brassBytes.visible = true;
    brassBytes.position.set(8, 2.5, 4);
    setChyron("· glitch portal opens · brass-collared Bytes steps through ·");
    emit("twin-portal-opens",{from:"cyberpunk",t:elapsed});
    $flash.style.opacity="0.9";
    setTimeout(function(){$flash.style.opacity="0";},400);
    self.bytesArrivals = (self.bytesArrivals||0)+1;
    writeJSON(LS_SELF,self);
  }

  if(portalActive){
    portalGroup.children[0].rotation.z += 0.06;
    portalGroup.children[1].rotation.x += 0.04;
    portalLight.intensity = 3 + Math.sin(elapsed*8)*1.5;
    var prog = Math.min(1,(elapsed-portalSpawnedAt)/30);
    // brass bytes walks toward drone-bytes
    brassBytes.position.x = 8 + (bytes.position.x - 8) * prog;
    brassBytes.position.z = 4 + (bytes.position.z - 4) * prog;
    brassBytes.position.y = 2.5 + (1.0 - 2.5) * prog;
    if(prog>=1 && !bytesMet){
      bytesMet = true;
      // both yawn and settle on windowsill
      bytes.position.set(-9.4, 1.3, -9.4);
      brassBytes.position.set(-8.6, 1.3, -9.4);
      setChyron("· the multiverse cat acknowledges itself across timelines ·");
      // spawn small windowsill for them
      var sill = new THREE.Mesh(new THREE.BoxGeometry(2.4,0.2,0.6), emat(0x222244,0xff66cc,0.3));
      sill.position.set(-9, 1.05, -9.4);
      scene.add(sill);
    }
  }

  // leitmotif every 16s after ramp-up
  if(ACtx && elapsed - lastLeit > 16){
    lastLeit = elapsed;
    leitmotif();
  }

  // drama ladder
  var rung = 0;
  if(elapsed>10) rung=1;
  if(elapsed>60) rung=2;
  if(elapsed>180) rung=3;
  if(elapsed>=portalSpawnedAt) rung=4;
  if(bytesMet) rung=5;
  if(elapsed>portalSpawnedAt+60) rung=6;
  var dramaPct = Math.min(100, (elapsed/420)*100);

  // render with active cam
  var cam = mainCam;
  cameras[camIdx].update(cam,elapsed);

  renderer.render(scene,cam);
  renderHUD(elapsed, act, cameras[camIdx].name, focusFor(elapsed), null, rung, dramaPct);
  drawMini(cameras[camIdx].name,elapsed);
  drawPiP(elapsed);

  // periodic localStorage sync
  if(Math.floor(elapsed) % 30 === 0 && Math.floor(elapsed*10)%10===0){
    self.lastTick = elapsed;
    writeJSON(LS_SELF,self);
  }
}
animate();

// --- console badge ---
try{ console.log("%c"+SENTINEL+" · cyberpunk universe boot · entities="+entityCount+" cams="+cameras.length, "color:#ff007f;font-weight:bold"); }catch(e){}

})();
</script>
