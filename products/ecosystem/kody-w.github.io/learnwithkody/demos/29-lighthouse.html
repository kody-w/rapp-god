<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lighthouse — vibe coding</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #02050a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8eef7;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 16px; z-index: 10;
    pointer-events: none; user-select: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85);
    font-size: 12px; letter-spacing: 0.06em;
  }
  #hud .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; opacity: 0.95; }
  #hud .sub { opacity: 0.62; line-height: 1.55; }
  kbd {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);

  }
  #click {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 50%, rgba(8,14,24,0.55), rgba(0,0,0,0.92));
    color: #cfd8e6; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.5s ease;
  }
  #click .inner { text-align: center; }
  #click .big { font-size: 22px; letter-spacing: 0.18em; margin-bottom: 14px; opacity: 0.9; }
  #click .small { font-size: 11px; opacity: 0.55; margin-top: 18px; }
  #click.hidden { opacity: 0; pointer-events: none; }
  #vignette {
    position: fixed; inset: 0; z-index: 8; pointer-events: none;

  }

<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="flash"></div>
<div id="hud">
  <div class="title">LAMP ROOM — Storm Watch</div>
  <div class="sub">
    <kbd>WASD</kbd> walk &nbsp;·&nbsp; <kbd>Mouse</kbd> look &nbsp;·&nbsp; <kbd>Space</kbd> beam color &nbsp;·&nbsp; <kbd>H</kbd> foghorn
  </div>
</div>
<div id="click">
  <div class="inner">
    <div class="big">Enter the Lighthouse</div>
    <div>Click to begin · Mouse to look · WASD to walk</div>
    <div class="small">Headphones recommended</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// =====================================================================
// CORE SCENE
// =====================================================================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05080f, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1018, 0.0025);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 4000);
// Lamp room interior radius is ~2.0, walking constrained to ~1.4
camera.position.set(0, 1.55, 0.4);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// =====================================================================
// SHARED CLOCK / UNIFORMS
// =====================================================================
const clock = new THREE.Clock();
const sharedUniforms = {
  uTime:        { value: 0 },
  uBeamAngle:   { value: 0 },              // current rotation of beam (radians)
  uBeamColor:   { value: new THREE.Color(0xfff2c9) },
  uBeamOrigin:  { value: new THREE.Vector3(0, 24, 0) }, // world position of lamp
  uLightning:   { value: 0 },              // 0..1 lightning intensity
  uLightningPos:{ value: new THREE.Vector3(200, 80, -300) }, // world pos of bolt
  uCameraPos:   { value: new THREE.Vector3() }
};

// Beam color cycle
const beamColors = [
  new THREE.Color(0xfff2c9), // warm white
  new THREE.Color(0xffb060), // amber
  new THREE.Color(0xff5040), // red
  new THREE.Color(0x60ff90), // green
  new THREE.Color(0x60d8ff)  // cyan
];
let beamColorIdx = 0;

// =====================================================================
// SKY (storm dome)
// =====================================================================
const skyGeo = new THREE.SphereGeometry(1800, 48, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uTime: sharedUniforms.uTime,
    uLightning: sharedUniforms.uLightning,
    uLightningPos: sharedUniforms.uLightningPos
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vWorldPos;
    uniform float uTime;
    uniform float uLightning;
    uniform vec3  uLightningPos;

    // hash
    float hash(vec3 p){ p = fract(p*0.3183099 + vec3(0.71,0.113,0.419));
      p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z));
    }
    float noise(vec3 p){
      vec3 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                     mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                     mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
    }
    float fbm(vec3 p){
      float v=0.0, a=0.5;
      for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.07; a*=0.5; }
      return v;
    }

    void main(){
      vec3 dir = normalize(vWorldPos);
      float h = clamp(dir.y*0.5+0.5, 0.0, 1.0);
      // dark slate sky base
      vec3 horizon = vec3(0.05,0.08,0.13);
      vec3 zenith  = vec3(0.015,0.025,0.05);
      vec3 col = mix(horizon, zenith, smoothstep(0.4, 0.95, h));

      // moving cloud layer
      vec3 q = dir*4.0; q.x += uTime*0.02; q.z += uTime*0.013;
      float cloud = fbm(q);
      cloud = smoothstep(0.42, 0.85, cloud);
      float cloudBand = smoothstep(0.18, 0.6, h) * (1.0 - smoothstep(0.85, 1.0, h));
      vec3 cloudColor = mix(vec3(0.08,0.10,0.14), vec3(0.18,0.20,0.26), cloud);
      col = mix(col, cloudColor, cloud * cloudBand * 0.92);

      // internal cloud lightning flicker (subtle, always on)
      float flick = pow(fbm(dir*8.0 + vec3(uTime*0.5)), 6.0);
      col += vec3(0.4,0.5,0.7) * flick * 0.04 * cloud;

      // lightning flash from world pos
      vec3 ldir = normalize(uLightningPos);
      float ldot = max(dot(dir, ldir), 0.0);
      float halo = pow(ldot, 8.0);
      col += vec3(0.7,0.78,1.0) * halo * uLightning * 1.4;
      col += vec3(0.5,0.55,0.75) * uLightning * 0.18;

      // horizon line glow (very faint, distant city/storm)
      float horizonLine = exp(-abs(dir.y)*30.0);
      col += vec3(0.04,0.05,0.08) * horizonLine;

      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// =====================================================================
// SEA — Gerstner waves with foam where they hit rocks
// =====================================================================
const seaSize = 2400;
const seaGeo = new THREE.PlaneGeometry(seaSize, seaSize, 256, 256);
seaGeo.rotateX(-Math.PI/2);

const seaMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: sharedUniforms.uTime,
    uBeamAngle: sharedUniforms.uBeamAngle,
    uBeamColor: sharedUniforms.uBeamColor,
    uBeamOrigin: sharedUniforms.uBeamOrigin,
    uLightning: sharedUniforms.uLightning,
    uCameraPos: sharedUniforms.uCameraPos
  },
  vertexShader: `
    precision highp float;
    uniform float uTime;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying float vFoam;

    // Gerstner wave
    vec3 gerstner(vec2 p, vec2 dir, float steepness, float wavelength, float speed, inout vec3 normal){
      float k = 6.2831853 / wavelength;
      float c = sqrt(9.81/k);
      vec2 d = normalize(dir);
      float f = k * (dot(d, p) - c * speed * uTime);
      float a = steepness / k;
      normal.xz += -d.xy * (k * a * cos(f));
      normal.y  +=        - (k * a * sin(f));
      return vec3(d.x*a*cos(f), a*sin(f), d.y*a*cos(f));
    }

    void main(){
      vec3 pos = position;
      vec3 n = vec3(0.0, 1.0, 0.0);

      vec3 d  = vec3(0.0);
      d += gerstner(pos.xz, vec2( 1.0, 0.2), 0.18, 28.0, 1.0, n);
      d += gerstner(pos.xz, vec2( 0.7,-0.8), 0.14, 18.0, 1.2, n);
      d += gerstner(pos.xz, vec2(-0.3, 0.9), 0.10, 11.0, 1.4, n);
      d += gerstner(pos.xz, vec2( 0.5, 0.6), 0.08,  6.5, 1.7, n);
      d += gerstner(pos.xz, vec2(-0.8,-0.4), 0.06,  3.4, 2.1, n);

      pos += d;
      vec4 wp = modelMatrix * vec4(pos, 1.0);
      vWorldPos = wp.xyz;
      vNormal = normalize(n);

      // foam where waves are steep / near peaks
      vFoam = smoothstep(0.6, 1.4, length(d.xz)) * smoothstep(0.2, 1.6, d.y);

      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying float vFoam;
    uniform float uTime;
    uniform float uBeamAngle;
    uniform vec3  uBeamColor;
    uniform vec3  uBeamOrigin;
    uniform float uLightning;
    uniform vec3  uCameraPos;

    float beamMask(vec3 wp){
      vec3 toP = wp - uBeamOrigin;
      vec3 dir = vec3(sin(uBeamAngle), 0.0, cos(uBeamAngle));
      float along = dot(toP, dir);
      if (along < 0.0) return 0.0;
      vec3 perp = toP - dir*along;
      float perpDist = length(perp);
      // cone half-angle ~ 9 degrees; widens with distance
      float coneR = along * 0.16;
      float m = 1.0 - smoothstep(coneR*0.4, coneR, perpDist);
      // attenuation with distance
      m *= exp(-along*0.0015);
      return m;
    }

    void main(){
      vec3 N = normalize(vNormal);
      vec3 V = normalize(uCameraPos - vWorldPos);
      // base water color: deep slate-blue
      vec3 deep    = vec3(0.012, 0.025, 0.045);
      vec3 shallow = vec3(0.05, 0.10, 0.16);
      float fres = pow(1.0 - max(dot(N,V), 0.0), 4.0);
      vec3 col = mix(deep, shallow, fres);

      // sky tint reflection (cool gray)
      col += vec3(0.03,0.05,0.08) * fres;

      // foam
      col += vec3(0.85,0.9,1.0) * vFoam * 0.85;

      // lightning lift
      col += vec3(0.25,0.30,0.45) * uLightning * (0.4 + fres);

      // beam illumination on water
      float bm = beamMask(vWorldPos);
      col += uBeamColor * bm * 0.55;
      // specular highlight along beam
      vec3 beamDir = vec3(sin(uBeamAngle), 0.0, cos(uBeamAngle));
      vec3 beamReflect = reflect(-beamDir, N);
      float spec = pow(max(dot(beamReflect, V), 0.0), 32.0);
      col += uBeamColor * spec * bm * 0.6;

      // distance fade to fog
      float fogDist = length(vWorldPos - uCameraPos);
      float fogAmt = 1.0 - exp(-fogDist*0.0025);
      col = mix(col, vec3(0.04,0.06,0.09), fogAmt);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const sea = new THREE.Mesh(seaGeo, seaMat);
sea.position.y = -22.0;  // below the cliff lamp
scene.add(sea);

// =====================================================================
// CLIFF (the rocky base of the lighthouse)
// =====================================================================
const cliffGeo = new THREE.CylinderGeometry(14, 22, 22, 24, 6);
// Distort vertices for jagged look
{
  const pos = cliffGeo.attributes.position;
  for (let i=0;i<pos.count;i++){
    const x = pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const r = Math.sqrt(x*x+z*z);
    const noiseV = Math.sin(x*0.3+y*0.2)*Math.cos(z*0.25)*1.6 + Math.sin(y*0.7)*0.6;
    const k = 1.0 + noiseV*0.05;
    pos.setX(i, x*k);
    pos.setZ(i, z*k);
  }
  cliffGeo.computeVertexNormals();
}
const cliffMat = new THREE.MeshStandardMaterial({
  color: 0x222831, roughness: 0.95, metalness: 0.05, flatShading: true
});
const cliff = new THREE.Mesh(cliffGeo, cliffMat);
cliff.position.y = -10;
scene.add(cliff);

// Jagged sea-stack rocks scattered around the cliff base
function makeRock(seed){
  const g = new THREE.IcosahedronGeometry(1, 1);
  const pos = g.attributes.position;
  const rng = (s) => {
    s = (s*9301 + 49297) % 233280; return s/233280;
  };
  for (let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const k = 0.7 + rng(seed*97 + i*13)*0.7;
    pos.setX(i, x*k);
    pos.setY(i, y*k*0.6);
    pos.setZ(i, z*k);
  }
  g.computeVertexNormals();
  return g;
}
const rockMat = new THREE.MeshStandardMaterial({
  color: 0x141a22, roughness: 1.0, metalness: 0.0, flatShading: true
});
for (let i=0;i<22;i++){
  const angle = i/22 * Math.PI*2 + (i*1.7)%1.0;
  const dist = 28 + (i*7%14);
  const rock = new THREE.Mesh(makeRock(i+1), rockMat);
  const s = 1.5 + ((i*3)%5)*0.7;
  rock.scale.set(s, s*1.4, s);
  rock.position.set(Math.cos(angle)*dist, -19 + ((i*11)%6)*0.4, Math.sin(angle)*dist);
  rock.rotation.y = angle;
  scene.add(rock);
}

// Distant rock formations (so beam has things to illuminate)
for (let i=0;i<30;i++){
  const angle = (i/30 + 0.07) * Math.PI*2;
  const dist = 180 + (i*23%140);
  const rock = new THREE.Mesh(makeRock(i+50), rockMat);
  const s = 4 + ((i*5)%9);
  rock.scale.set(s, s*1.6, s);
  rock.position.set(Math.cos(angle)*dist, -20 + ((i*7)%4)*0.6, Math.sin(angle)*dist);
  rock.rotation.y = angle;
  scene.add(rock);
}

// =====================================================================
// LIGHTHOUSE TOWER (exterior, below the lamp room)
// =====================================================================
const towerGeo = new THREE.CylinderGeometry(2.6, 3.4, 18, 24, 1, true);
const towerMat = new THREE.MeshStandardMaterial({
  color: 0xd5d2c8, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide
});
const tower = new THREE.Mesh(towerGeo, towerMat);
tower.position.y = 7;
scene.add(tower);

// Red stripe
const stripeGeo = new THREE.CylinderGeometry(2.65, 2.85, 3.5, 24, 1, true);
const stripeMat = new THREE.MeshStandardMaterial({ color: 0x8a2222, roughness: 0.9 });
const stripe = new THREE.Mesh(stripeGeo, stripeMat);
stripe.position.y = 9;
scene.add(stripe);

// Gallery deck under the lamp room
const deckGeo = new THREE.CylinderGeometry(3.2, 3.2, 0.4, 24);
const deckMat = new THREE.MeshStandardMaterial({ color: 0x4a3a25, roughness: 0.85 });
const deck = new THREE.Mesh(deckGeo, deckMat);
deck.position.y = 18.4;
scene.add(deck);

// Gallery railing (ring of small posts visible from outside, but here we are inside)
// Lamp room dome (visible only from outside, but cool to have)
const domeGeo = new THREE.SphereGeometry(2.4, 24, 16, 0, Math.PI*2, 0, Math.PI/2);
const domeMat = new THREE.MeshStandardMaterial({ color: 0x222a33, roughness: 0.7, metalness: 0.4 });
const dome = new THREE.Mesh(domeGeo, domeMat);
dome.position.y = 26.5;
scene.add(dome);
const finialGeo = new THREE.ConeGeometry(0.18, 1.2, 8);
const finialMat = new THREE.MeshStandardMaterial({ color: 0x101418, roughness: 0.5, metalness: 0.6 });
const finial = new THREE.Mesh(finialGeo, finialMat);
finial.position.y = 27.4;
scene.add(finial);

// =====================================================================
// LAMP ROOM INTERIOR (where the camera lives)
// =====================================================================
// Origin: (0, 24, 0). Floor at y=23.4, ceiling at y=26.5
const lampRoom = new THREE.Group();
lampRoom.position.set(0, 24, 0);
scene.add(lampRoom);

// Floor (weathered planks)
function makePlankTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(0,0,256,256);
  for (let y=0; y<256; y+=32){
    ctx.fillStyle = `rgb(${50+Math.random()*30|0},${36+Math.random()*16|0},${22+Math.random()*10|0})`;
    ctx.fillRect(0, y, 256, 30);
    // grain
    for (let i=0;i<40;i++){
      ctx.strokeStyle = `rgba(20,12,5,${0.15+Math.random()*0.25})`;
      ctx.beginPath();
      ctx.moveTo(0, y + Math.random()*30);
      ctx.bezierCurveTo(60,y+Math.random()*30,120,y+Math.random()*30,256,y+Math.random()*30);
      ctx.stroke();
    }
    // dark line between planks
    ctx.fillStyle = '#0a0604';
    ctx.fillRect(0, y+29, 256, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2,2);
  return tex;
}
const plankTex = makePlankTexture();
const floorGeo = new THREE.CircleGeometry(2.2, 32);
floorGeo.rotateX(-Math.PI/2);
const floorMat = new THREE.MeshStandardMaterial({
  map: plankTex, roughness: 0.85, metalness: 0.05
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.y = -0.6;
lampRoom.add(floor);

// Ceiling (dark wood + brass center)
const ceilGeo = new THREE.CircleGeometry(2.2, 32);
ceilGeo.rotateX(Math.PI/2);
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x1a120a, roughness: 0.9 });
const ceil = new THREE.Mesh(ceilGeo, ceilMat);
ceil.position.y = 2.5;
lampRoom.add(ceil);

// Brass support ring (top)
const brassRingGeo = new THREE.TorusGeometry(2.0, 0.08, 12, 48);
brassRingGeo.rotateX(Math.PI/2);
const brassMat = new THREE.MeshStandardMaterial({
  color: 0xc28a3a, roughness: 0.35, metalness: 0.85
});
const brassRingTop = new THREE.Mesh(brassRingGeo, brassMat);
brassRingTop.position.y = 2.4;
lampRoom.add(brassRingTop);

const brassRingMid = new THREE.Mesh(brassRingGeo, brassMat);
brassRingMid.position.y = 0.9;
lampRoom.add(brassRingMid);

const brassRingBot = new THREE.Mesh(brassRingGeo, brassMat);
brassRingBot.position.y = -0.55;
lampRoom.add(brassRingBot);

// Vertical brass posts/window mullions — these define 8 windows around the room
const numPosts = 8;
for (let i=0;i<numPosts;i++){
  const a = i / numPosts * Math.PI*2;
  const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 3.0, 6);
  const post = new THREE.Mesh(postGeo, brassMat);
  post.position.set(Math.cos(a)*2.0, 0.95, Math.sin(a)*2.0);
  lampRoom.add(post);

  // small lamp sconce on post
  const sc = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshStandardMaterial({
    color: 0xffaa55, emissive: 0x331808, emissiveIntensity: 1.2, roughness: 0.4
  }));
  sc.position.set(Math.cos(a)*1.85, 1.55, Math.sin(a)*1.85);
  lampRoom.add(sc);
}

// Brass railing (waist height) - small horizontal bar between posts
const railGeo = new THREE.TorusGeometry(2.0, 0.04, 8, 48);
railGeo.rotateX(Math.PI/2);
const rail = new THREE.Mesh(railGeo, brassMat);
rail.position.y = 0.2;
lampRoom.add(rail);

// Central lamp mechanism — the rotating Fresnel housing
const lampHousing = new THREE.Group();
lampHousing.position.y = 0.6;
lampRoom.add(lampHousing);

// Bottom plate
const plateGeo = new THREE.CylinderGeometry(0.55, 0.6, 0.1, 24);
const plate = new THREE.Mesh(plateGeo, brassMat);
plate.position.y = -0.05;
lampHousing.add(plate);

// Glass Fresnel column (semi-transparent ridged drum)
const fresnelGeo = new THREE.CylinderGeometry(0.45, 0.45, 1.0, 32, 8, true);
const fresnelMat = new THREE.MeshPhysicalMaterial({
  color: 0xffeec0, roughness: 0.15, metalness: 0.0,
  transmission: 0.85, thickness: 0.3, ior: 1.45,
  emissive: 0xffd28a, emissiveIntensity: 0.6,
  side: THREE.DoubleSide
});
const fresnel = new THREE.Mesh(fresnelGeo, fresnelMat);
fresnel.position.y = 0.5;
lampHousing.add(fresnel);

// Glow core (the actual bulb)
const bulbGeo = new THREE.SphereGeometry(0.25, 16, 16);
const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffe9b3 });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.y = 0.5;
lampHousing.add(bulb);

// Top cap
const capGeo = new THREE.CylinderGeometry(0.5, 0.55, 0.08, 24);
const cap = new THREE.Mesh(capGeo, brassMat);
cap.position.y = 1.04;
lampHousing.add(cap);

// Point light at bulb
const lampLight = new THREE.PointLight(0xffe2a8, 1.4, 6, 1.6);
lampLight.position.y = 0.5;
lampHousing.add(lampLight);

// Subtle ambient and the storm key light (cold)
scene.add(new THREE.AmbientLight(0x1a2230, 0.55));
const moonLight = new THREE.DirectionalLight(0x8aa0c2, 0.35);
moonLight.position.set(-100, 80, -60);
scene.add(moonLight);

// =====================================================================
// VOLUMETRIC BEAM — large cone with custom shader, billboarded outward
// =====================================================================
// Big cone reaching far out from the lamp.
const BEAM_LEN = 600;
const BEAM_R   = 60;
const beamGeo = new THREE.ConeGeometry(BEAM_R, BEAM_LEN, 48, 32, true);
beamGeo.rotateX(-Math.PI/2);
beamGeo.translate(0, 0, BEAM_LEN/2);

const beamMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: sharedUniforms.uTime,
    uBeamColor: sharedUniforms.uBeamColor,
    uCameraPos: sharedUniforms.uCameraPos
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  vertexShader: `
    varying vec3 vLocal;
    varying vec3 vWorldPos;
    void main(){
      vLocal = position;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vLocal;
    varying vec3 vWorldPos;
    uniform float uTime;
    uniform vec3 uBeamColor;
    uniform vec3 uCameraPos;

    // hash + noise for fog density
    float hash(vec3 p){ p = fract(p*0.3183099 + vec3(0.71,0.113,0.419));
      p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z));
    }
    float noise(vec3 p){
      vec3 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                     mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                     mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
    }
    float fbm(vec3 p){
      float v = 0.0, a = 0.5;
      for(int i=0;i<4;i++){ v += a*noise(p); p *= 2.07; a *= 0.5; }
      return v;
    }

    void main(){
      // vLocal is in cone-local space; cone axis along +Z, length 0..600, radius scales with z.
      float along = vLocal.z;            // 0 at apex, BEAM_LEN at base
      float r2d = length(vLocal.xy);     // radial distance from cone axis at this z
      float coneR = (along / 600.0) * 60.0;
      // soft radial falloff (1 at center, 0 at edge)
      float rad = 1.0 - smoothstep(coneR*0.0, coneR, r2d);
      rad = pow(rad, 2.0);

      // axial falloff (bright near apex, dimmer down the cone)
      float axial = exp(-along * 0.0035);

      // animated noise — drifting fog inside the beam
      vec3 q = vec3(vLocal.xy*0.06, along*0.012);
      q.z += uTime * 1.2;
      float n = fbm(q);
      float density = mix(0.5, 1.4, n);

      // small scintillation (rain-in-beam)
      float sparkle = pow(noise(vec3(vLocal.xy*4.0, along*0.5 + uTime*4.0)), 18.0);

      float intensity = rad * axial * density;
      intensity += sparkle * rad * axial * 1.5;

      // distance-from-camera fade so beam doesn't pop close to the player
      float distToCam = length(vWorldPos - uCameraPos);
      float nearFade = smoothstep(2.0, 8.0, distToCam);

      vec3 col = uBeamColor * intensity * 1.6 * nearFade;

      gl_FragColor = vec4(col, intensity * nearFade * 0.85);
    }
  `
});
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.set(0, 24, 0);
scene.add(beam);

// =====================================================================
// RAIN — instanced
// =====================================================================
const RAIN_COUNT = 4000;
const rainGeo = new THREE.BufferGeometry();
{
  const positions = new Float32Array(RAIN_COUNT * 3);
  const speeds    = new Float32Array(RAIN_COUNT);
  const seeds     = new Float32Array(RAIN_COUNT);
  for (let i=0; i<RAIN_COUNT; i++){
    const r = Math.sqrt(Math.random()) * 90;
    const a = Math.random() * Math.PI*2;
    positions[i*3+0] = Math.cos(a)*r;
    positions[i*3+1] = Math.random() * 80;   // 0..80
    positions[i*3+2] = Math.sin(a)*r;
    speeds[i] = 28 + Math.random()*30;
    seeds[i]  = Math.random();
  }
  rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  rainGeo.setAttribute('aSpeed',   new THREE.BufferAttribute(speeds, 1));
  rainGeo.setAttribute('aSeed',    new THREE.BufferAttribute(seeds, 1));
}
const rainMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: sharedUniforms.uTime,
    uBeamAngle: sharedUniforms.uBeamAngle,
    uBeamColor: sharedUniforms.uBeamColor,
    uBeamOrigin: sharedUniforms.uBeamOrigin,
    uLightning: sharedUniforms.uLightning,
    uPixel: { value: window.innerHeight }
  },
  vertexShader: `
    precision highp float;
    attribute float aSpeed;
    attribute float aSeed;
    uniform float uTime;
    uniform float uBeamAngle;
    uniform vec3  uBeamOrigin;
    varying float vBeam;
    varying float vSeed;
    void main(){
      vec3 p = position;
      float t = uTime * aSpeed + aSeed*100.0;
      // wrap vertically
      p.y = mod(p.y - t, 80.0);
      // slight wind sway
      p.x += sin(uTime*0.7 + aSeed*6.0)*1.5;
      // jitter in xz
      p.x += sin(aSeed*131.0)*0.3;
      p.z += cos(aSeed*97.0)*0.3;

      // place around camera
      vec3 worldPos = p + vec3(uBeamOrigin.x, -10.0, uBeamOrigin.z);

      // beam mask
      vec3 toP = worldPos - uBeamOrigin;
      vec3 dir = vec3(sin(uBeamAngle), 0.0, cos(uBeamAngle));
      float along = dot(toP, dir);
      float perp = length(toP - dir*along);
      float coneR = max(along, 0.0) * 0.16;
      float m = (along > 0.0) ? (1.0 - smoothstep(coneR*0.3, coneR, perp)) : 0.0;
      m *= exp(-along*0.0025);
      vBeam = m;
      vSeed = aSeed;

      vec4 mvp = modelViewMatrix * vec4(worldPos, 1.0);
      gl_Position = projectionMatrix * mvp;
      gl_PointSize = (1.5 + m*4.0) * (300.0 / -mvp.z);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying float vBeam;
    varying float vSeed;
    uniform vec3 uBeamColor;
    uniform float uLightning;
    void main(){
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      float a = 1.0 - smoothstep(0.0, 0.5, d);
      vec3 baseCol = vec3(0.45,0.55,0.7);
      vec3 col = baseCol * (0.25 + uLightning*0.8);
      col += uBeamColor * vBeam * 1.6;
      a *= (0.18 + vBeam*0.9 + uLightning*0.5);
      gl_FragColor = vec4(col, a);
    }
  `
});
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// =====================================================================
// DISTANT SHIPS (silhouettes drifting on horizon)
// =====================================================================
const ships = [];
function makeShip(){
  const g = new THREE.Group();
  // hull
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(8, 1.6, 2.2),
    new THREE.MeshStandardMaterial({ color: 0x080a10, roughness: 1.0 })
  );
  g.add(hull);
  // wheelhouse
  const wh = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 1.2, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x080a10, roughness: 1.0 })
  );
  wh.position.set(-1.5, 1.2, 0);
  g.add(wh);
  // mast
  const mast = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 4),
    new THREE.MeshStandardMaterial({ color: 0x080a10, roughness: 1.0 })
  );
  mast.position.set(0.5, 2.4, 0);
  g.add(mast);
  // tiny running light
  const lightDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xff5040 })
  );
  lightDot.position.set(0.5, 4.3, 0);
  g.add(lightDot);
  return g;
}
for (let i=0;i<3;i++){
  const s = makeShip();
  s.userData.angle = Math.random() * Math.PI*2;
  s.userData.speed = 0.005 + Math.random()*0.005;
  s.userData.dist  = 600 + Math.random()*200;
  s.scale.setScalar(2.5);
  scene.add(s);
  ships.push(s);
}

// =====================================================================
// CONTROLS — pointer lock + WASD
// =====================================================================
const move = { forward:false, back:false, left:false, right:false };
const yawPitch = { yaw: 0, pitch: 0 };
const tmpEuler = new THREE.Euler(0,0,0,'YXZ');
let pointerLocked = false;

const clickOverlay = document.getElementById('click');
clickOverlay.addEventListener('click', () => {
  renderer.domElement.requestPointerLock?.();
  initAudio();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
  if (pointerLocked) clickOverlay.classList.add('hidden');
  else clickOverlay.classList.remove('hidden');
});

document.addEventListener('mousemove', (e) => {
  if (!pointerLocked) return;
  yawPitch.yaw   -= e.movementX * 0.0024;
  yawPitch.pitch -= e.movementY * 0.0024;
  yawPitch.pitch = Math.max(-Math.PI*0.45, Math.min(Math.PI*0.45, yawPitch.pitch));
});

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    move.forward = true; break;
    case 'KeyS': case 'ArrowDown':  move.back    = true; break;
    case 'KeyA': case 'ArrowLeft':  move.left    = true; break;
    case 'KeyD': case 'ArrowRight': move.right   = true; break;
    case 'Space':
      beamColorIdx = (beamColorIdx + 1) % beamColors.length;
      sharedUniforms.uBeamColor.value.copy(beamColors[beamColorIdx]);
      bulb.material.color.copy(beamColors[beamColorIdx]).lerp(new THREE.Color(0xffffff), 0.5);
      lampLight.color.copy(beamColors[beamColorIdx]);
      e.preventDefault();
      break;
    case 'KeyH':
      triggerFoghorn();
      e.preventDefault();
      break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    move.forward = false; break;
    case 'KeyS': case 'ArrowDown':  move.back    = false; break;
    case 'KeyA': case 'ArrowLeft':  move.left    = false; break;
    case 'KeyD': case 'ArrowRight': move.right   = false; break;
  }
});

// =====================================================================
// AUDIO — Web Audio (storm wind, rain, thunder, foghorn)
// =====================================================================
let audioCtx = null;
let windGain, rainGain, masterGain;
let foghornBusy = false;

function initAudio(){
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  // ---- Wind: filtered brown-ish noise ----
  const sampleRate = audioCtx.sampleRate;
  const noiseLen = sampleRate * 4;
  const noiseBuf = audioCtx.createBuffer(1, noiseLen, sampleRate);
  {
    const data = noiseBuf.getChannelData(0);
    let last = 0;
    for (let i=0;i<noiseLen;i++){
      const w = (Math.random()*2 - 1);
      last = (last + 0.02 * w) / 1.02;
      data[i] = last * 3.5;
    }
  }
  const windSrc = audioCtx.createBufferSource();
  windSrc.buffer = noiseBuf; windSrc.loop = true;
  const windFilt = audioCtx.createBiquadFilter();
  windFilt.type = 'lowpass'; windFilt.frequency.value = 600; windFilt.Q.value = 0.6;
  const windFilt2 = audioCtx.createBiquadFilter();
  windFilt2.type = 'bandpass'; windFilt2.frequency.value = 220; windFilt2.Q.value = 0.7;
  windGain = audioCtx.createGain(); windGain.gain.value = 0.18;
  windSrc.connect(windFilt).connect(windFilt2).connect(windGain).connect(masterGain);
  windSrc.start();

  // LFO modulating wind
  const windLFO = audioCtx.createOscillator();
  windLFO.frequency.value = 0.13;
  const windLFOGain = audioCtx.createGain();
  windLFOGain.gain.value = 0.10;
  windLFO.connect(windLFOGain).connect(windGain.gain);
  windLFO.start();

  // ---- Rain: high-pass white noise ----
  const rainBuf = audioCtx.createBuffer(1, sampleRate*3, sampleRate);
  {
    const data = rainBuf.getChannelData(0);
    for (let i=0;i<data.length;i++){
      data[i] = (Math.random()*2 - 1) * 0.7;
    }
  }
  const rainSrc = audioCtx.createBufferSource();
  rainSrc.buffer = rainBuf; rainSrc.loop = true;
  const rainHP = audioCtx.createBiquadFilter();
  rainHP.type = 'highpass'; rainHP.frequency.value = 1500;
  const rainLP = audioCtx.createBiquadFilter();
  rainLP.type = 'lowpass'; rainLP.frequency.value = 4500;
  rainGain = audioCtx.createGain(); rainGain.gain.value = 0.10;
  rainSrc.connect(rainHP).connect(rainLP).connect(rainGain).connect(masterGain);
  rainSrc.start();
}

// Thunder: synthesized rumble with stereo panning
function playThunder(panX, intensity){
  if (!audioCtx) return;
  const dur = 2.0 + Math.random()*2.0;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr*dur, sr);
  const data = buf.getChannelData(0);
  // brown noise + low-frequency rumble
  let last = 0;
  for (let i=0;i<data.length;i++){
    const w = (Math.random()*2 - 1);
    last = (last + 0.006*w) / 1.006;
    const env = Math.max(0, 1 - i/data.length);
    data[i] = last * 9.0 * env * env;
  }
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 280;
  const g = audioCtx.createGain();
  g.gain.value = 0.0;
  g.gain.linearRampToValueAtTime(0.55 * intensity, audioCtx.currentTime + 0.02);
  g.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + dur);
  const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  if (pan){ pan.pan.value = Math.max(-1, Math.min(1, panX)); }
  src.connect(lp).connect(g);
  if (pan) g.connect(pan).connect(masterGain);
  else g.connect(masterGain);
  src.start();
}

// Foghorn: deep low oscillator, 2-second blast
function triggerFoghorn(){
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  if (foghornBusy) return;
  foghornBusy = true;

  const t = audioCtx.currentTime;
  const dur = 2.0;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator(); // sub
  osc1.type = 'sawtooth'; osc1.frequency.value = 110;
  osc2.type = 'sine';     osc2.frequency.value = 73;
  osc3.type = 'sine';     osc3.frequency.value = 36.5;
  // slight pitch dip toward end
  osc1.frequency.linearRampToValueAtTime(95, t+dur);
  osc2.frequency.linearRampToValueAtTime(64, t+dur);

  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 0.7;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.45, t+0.2);
  g.gain.linearRampToValueAtTime(0.40, t+dur-0.3);
  g.gain.linearRampToValueAtTime(0.0, t+dur);

  osc1.connect(lp); osc2.connect(lp); osc3.connect(lp);
  lp.connect(g).connect(masterGain);
  osc1.start(t); osc2.start(t); osc3.start(t);
  osc1.stop(t+dur); osc2.stop(t+dur); osc3.stop(t+dur);

  setTimeout(() => { foghornBusy = false; }, dur * 1000 + 200);
}

// =====================================================================
// LIGHTNING SCHEDULING
// =====================================================================
let nextLightning = 4 + Math.random()*4;
let lightningT = 0;          // active flash timer
let lightningActive = 0;     // 0..1
let pendingThunder = null;   // {at, panX, intensity}
const flashEl = document.getElementById('flash');

function scheduleLightning(time){
  // Pick a random direction in front-ish region
  const angle = Math.random() * Math.PI*2;
  const dist  = 220 + Math.random()*400;
  const lx = Math.cos(angle)*dist;
  const lz = Math.sin(angle)*dist;
  const ly = 60 + Math.random()*120;
  sharedUniforms.uLightningPos.value.set(lx, ly, lz);

  lightningT = 0.6;            // duration of glow
  lightningActive = 1.0;
  flashEl.style.opacity = '0.85';

  // Compute screen X for stereo pan
  const v = new THREE.Vector3(lx, ly, lz).project(camera);
  const panX = Math.max(-1, Math.min(1, v.x));
  // distance-proportional thunder delay
  const totalDist = Math.sqrt(lx*lx + lz*lz + (ly-24)*(ly-24));
  const delay = Math.min(5, totalDist / 340.0);  // ~speed of sound for drama
  pendingThunder = {
    at: time + delay,
    panX: panX,
    intensity: 0.5 + (1.0 - Math.min(1, totalDist/700)) * 0.7
  };
  nextLightning = time + 7 + Math.random()*8;
}

// =====================================================================
// CAMERA WALK CONSTRAINT
// =====================================================================
const walkRadius = 1.4; // can walk within this radius inside lamp room
const walkY = 1.55;     // eye height above lamp room origin

// initial: place camera offset slightly inside
camera.position.set(0, 24 + 0.2, 0.4);

// =====================================================================
// LOOP
// =====================================================================
let last = performance.now();
function tick(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  const t  = clock.getElapsedTime();
  sharedUniforms.uTime.value = t;

  // ---- beam rotation: 6 RPM = one revolution / 10s ----
  sharedUniforms.uBeamAngle.value = (t * (Math.PI*2 / 10.0)) % (Math.PI*2);

  // ---- lightning ----
  if (t > nextLightning) {
    scheduleLightning(t);
  }
  if (lightningT > 0){
    lightningT -= dt;
    // exponential decay with initial pop
    lightningActive = Math.max(0, lightningT / 0.6);
    // multi-strobe pop in first 120ms
    const phase = 0.6 - lightningT;
    let pop = 1.0;
    if (phase < 0.18){
      pop = 0.5 + 0.5 * Math.abs(Math.sin(phase*70));
    }
    sharedUniforms.uLightning.value = lightningActive * pop;
    flashEl.style.opacity = (lightningActive * pop * 0.85).toFixed(3);
  } else {
    sharedUniforms.uLightning.value = 0;
    flashEl.style.opacity = '0';
  }
  if (pendingThunder && t >= pendingThunder.at){
    playThunder(pendingThunder.panX, pendingThunder.intensity);
    pendingThunder = null;
  }

  // ---- camera ----
  tmpEuler.set(yawPitch.pitch, yawPitch.yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(tmpEuler);

  // movement (planar, relative to yaw only)
  const speed = 1.6 * dt;
  const fwd = new THREE.Vector3(-Math.sin(yawPitch.yaw), 0, -Math.cos(yawPitch.yaw));
  const right = new THREE.Vector3(Math.cos(yawPitch.yaw), 0, -Math.sin(yawPitch.yaw));
  const delta = new THREE.Vector3();
  if (move.forward) delta.add(fwd);
  if (move.back)    delta.sub(fwd);
  if (move.right)   delta.add(right);
  if (move.left)    delta.sub(right);
  if (delta.lengthSq() > 0) delta.normalize().multiplyScalar(speed);

  // apply, but constrain to lamp room interior radius
  const newX = camera.position.x + delta.x;
  const newZ = camera.position.z + delta.z;
  const distFromCenter = Math.sqrt(newX*newX + newZ*newZ);
  if (distFromCenter < walkRadius){
    camera.position.x = newX;
    camera.position.z = newZ;
  } else {
    // slide along the wall
    const ang = Math.atan2(newZ, newX);
    camera.position.x = Math.cos(ang) * walkRadius;
    camera.position.z = Math.sin(ang) * walkRadius;
  }
  // small head bob while walking
  const bob = (move.forward||move.back||move.left||move.right) ? Math.sin(t*8.5)*0.012 : 0;
  camera.position.y = 24 + walkY + bob;
  sharedUniforms.uCameraPos.value.copy(camera.position);

  // ---- lamp housing rotation matches beam ----
  lampHousing.rotation.y = sharedUniforms.uBeamAngle.value;
  // tint the bulb during lightning + hover glow
  const beamCol = sharedUniforms.uBeamColor.value;
  bulb.material.color.setRGB(
    Math.min(1, beamCol.r*0.6 + 0.5),
    Math.min(1, beamCol.g*0.6 + 0.5),
    Math.min(1, beamCol.b*0.6 + 0.5)
  );

  // ---- beam mesh follows lamp position + angle ----
  beam.rotation.y = sharedUniforms.uBeamAngle.value;
  // also apply slight downward tilt so beam goes slightly out toward sea
  beam.rotation.x = -0.04;

  // ---- ships drift ----
  for (const s of ships){
    s.userData.angle += s.userData.speed * dt;
    const a = s.userData.angle;
    s.position.set(
      Math.cos(a) * s.userData.dist,
      -19 + Math.sin(a*2.3)*0.4,
      Math.sin(a) * s.userData.dist
    );
    s.rotation.y = -a + Math.PI/2;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
