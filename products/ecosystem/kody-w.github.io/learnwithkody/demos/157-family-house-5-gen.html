// ============ Disposable registry ============
var DISP=[];
function track(o){if(o)DISP.push(o);return o;}
function disposeOne(d){
  try{
    if(d.geometry&&d.geometry.dispose)d.geometry.dispose();
    if(d.material){
      var ms=Array.isArray(d.material)?d.material:[d.material];
      for(var i=0;i<ms.length;i++){
        var m=ms[i];if(!m)continue;
        if(m.map&&m.map.dispose)m.map.dispose();
        if(m.dispose)m.dispose();
      }
    }
    if(d.isTexture&&d.dispose)d.dispose();
    if(d.dispose&&!d.geometry&&!d.material&&!d.isTexture)d.dispose();
  }catch(e){}
}
function disposeAll(){
  for(var i=0;i<DISP.length;i++)disposeOne(DISP[i]);
  DISP.length=0;
}

// ============ Renderer / Scene ============
var renderer=new T.WebGLRenderer({canvas:elC,antialias:true,powerPreference:'high-performance'});

// ============ Procedural canvas helpers ============
function mkCanvas(s){var c=DOC.createElement('canvas');c.width=s;c.height=s;return c;}
function ctxOf(c){return c.getContext('2d');}

// Wallpaper texture per decade — unique pattern + color palette
function wallpaperTex(year){
  var c=mkCanvas(256),x=ctxOf(c);
  if(year<1920){
    x.fillStyle='#7a4a2e';x.fillRect(0,0,256,256);
    x.strokeStyle='#d4a373';x.lineWidth=1.5;
    for(var i=0;i<256;i+=32)for(var j=0;j<256;j+=32){
      x.beginPath();x.arc(i,j,9,0,6.28);x.stroke();
      x.beginPath();x.moveTo(i-6,j+9);x.lineTo(i,j+18);x.lineTo(i+6,j+9);x.stroke();
    }
  }else if(year<1940){
    x.fillStyle='#e8d5a3';x.fillRect(0,0,256,256);
    x.fillStyle='#3a4a6e';
    for(var i2=0;i2<256;i2+=24){x.fillRect(i2,0,2,256);}
    x.fillStyle='#bf8f4a';
    for(var j2=0;j2<256;j2+=48)for(var k2=0;k2<256;k2+=48){
      x.beginPath();x.arc(j2+12,k2+12,5,0,6.28);x.fill();
    }
  }else if(year<1960){
    x.fillStyle='#d8b993';x.fillRect(0,0,256,256);
    x.strokeStyle='#8b5a3a';x.lineWidth=1;
    for(var i3=0;i3<256;i3+=20){
      x.beginPath();x.moveTo(0,i3);x.lineTo(256,i3+10);x.stroke();
    }
  }else if(year<1980){
    x.fillStyle='#c89e5a';x.fillRect(0,0,256,256);
    x.fillStyle='#7a3a1a';
    for(var i4=0;i4<256;i4+=64)for(var j4=0;j4<256;j4+=64){
      x.beginPath();x.moveTo(i4+32,j4+8);
      x.lineTo(i4+56,j4+32);x.lineTo(i4+32,j4+56);x.lineTo(i4+8,j4+32);
      x.closePath();x.fill();
    }
  }else if(year<2000){
    x.fillStyle='#e6dcc4';x.fillRect(0,0,256,256);
    x.fillStyle='#9a7a4a';x.font='bold 18px serif';
    for(var i5=0;i5<256;i5+=32)for(var j5=0;j5<256;j5+=32){
      x.fillText('❀',i5+4,j5+22);
    }
  }else if(year<2020){
    x.fillStyle='#f0ece4';x.fillRect(0,0,256,256);
    x.fillStyle='#cdbfa3';
    for(var i6=0;i6<256;i6+=8){x.fillRect(i6,0,1,256);}
  }else if(year<2050){
    x.fillStyle='#e8e4dc';x.fillRect(0,0,256,256);
    x.fillStyle='#b8a890';
    for(var i7=0;i7<256;i7+=48)for(var j7=0;j7<256;j7+=48){
      x.fillRect(i7+4,j7+4,40,40);
    }
    x.fillStyle='#f0ece4';
    for(var i8=0;i8<256;i8+=48)for(var j8=0;j8<256;j8+=48){
      x.fillRect(i8+10,j8+10,28,28);
    }
  }else if(year<2080){
    x.fillStyle='#dee4ec';x.fillRect(0,0,256,256);
    var g=x.createLinearGradient(0,0,256,256);
    g.addColorStop(0,'#dee4ec');g.addColorStop(1,'#b8c8de');
    x.fillStyle=g;x.fillRect(0,0,256,256);
    x.strokeStyle='#7a8aa0';x.lineWidth=0.5;
    for(var i9=0;i9<256;i9+=12){
      x.beginPath();x.moveTo(i9,0);x.lineTo(i9+30,256);x.stroke();
    }
  }else{
    x.fillStyle='#f4f4f8';x.fillRect(0,0,256,256);
    x.fillStyle='#9aa0c0';
    for(var ia=0;ia<256;ia+=32)for(var ja=0;ja<256;ja+=32){
      x.beginPath();x.arc(ia+16,ja+16,3,0,6.28);x.fill();
    }
  }
  var tex=new T.CanvasTexture(c);
  tex.wrapS=tex.wrapT=T.RepeatWrapping;
  tex.repeat.set(2,1);
  track(tex);
  return tex;
}

// Tiny portrait texture (for photo wall)
function portraitTex(name,colr,year){
  var c=mkCanvas(64),x=ctxOf(c);
  x.fillStyle='#3a2818';x.fillRect(0,0,64,64);
  x.fillStyle='#'+colr.toString(16).padStart(6,'0');x.fillRect(6,6,52,52);
  x.fillStyle='#e8c89a';x.beginPath();x.arc(32,28,12,0,6.28);x.fill();
  x.fillStyle='#1a1008';x.fillRect(20,40,24,18);
  x.fillStyle='#fff';x.font='bold 7px serif';x.textAlign='center';
  x.fillText(name.split(' ')[0].slice(0,8),32,60);
  var tex=new T.CanvasTexture(c);track(tex);return tex;
}

// Photo of a person for in-world frames (uses portrait tex with simple frame)
function makeFrame(name,colr){
  var g=new T.Group();
  var b=new T.Mesh(track(new T.PlaneGeometry(0.55,0.7)),
    track(new T.MeshStandardMaterial({color:0x4a2818,roughness:0.6})));
  b.position.z=-0.01;g.add(b);
  var p=new T.Mesh(track(new T.PlaneGeometry(0.42,0.55)),
    track(new T.MeshBasicMaterial({map:portraitTex(name,colr,0)})));
  g.add(p);
  return g;
}

// Front facade with windows/door (partial wall — leaves visible interior)
var front=new T.Group();house.add(front);
// Door section
var doorWallMat=track(new T.MeshStandardMaterial({color:0xc8b594,roughness:0.85}));
// Two sides of front wall, leaving a center opening
var fL=new T.Mesh(track(new T.BoxGeometry(5,HH,0.2)),doorWallMat);
fL.position.set(-5.5,HH/2,HD/2);fL.castShadow=true;front.add(fL);
var fR=new T.Mesh(track(new T.BoxGeometry(5,HH,0.2)),doorWallMat);
fR.position.set(5.5,HH/2,HD/2);fR.castShadow=true;front.add(fR);
// Windows on front
var winMat=track(new T.MeshStandardMaterial({color:0x6a8aa0,emissive:0x1a2a3a,emissiveIntensity:0.2,roughness:0.3,metalness:0.2}));
var winG=track(new T.PlaneGeometry(1.4,1.6));
function addWin(parent,x,y,z,ry){
  var m=new T.Mesh(winG,winMat);m.position.set(x,y,z);if(ry)m.rotation.y=ry;parent.add(m);
}
addWin(house,-5.5,2,HD/2+0.12);addWin(house,-3,2,HD/2+0.12);
addWin(house,3,2,HD/2+0.12);addWin(house,5.5,2,HD/2+0.12);
addWin(house,-5.5,5.5,HD/2+0.12);addWin(house,-3,5.5,HD/2+0.12);
addWin(house,3,5.5,HD/2+0.12);addWin(house,5.5,5.5,HD/2+0.12);
addWin(house,-HW/2-0.12,2,-3,Math.PI/2);

// Each character is a group with three sub-groups (child, adult, elder), only one visible
function buildCharBody(scale,colr,sex,age){
  var g=new T.Group();
  var skin=age==='elder'?0xd8c0a8:(age==='child'?0xf5d0b0:0xe8c89a);
  var hair=age==='elder'?0xe8e4dc:(sex==='F'?0x6a4a2a:0x3a2818);
  var bodyH=age==='child'?0.7:(age==='adult'?1.2:1.05);
  var bodyW=age==='child'?0.32:(age==='adult'?0.45:0.42);
  // Body
  var body=new T.Mesh(new T.BoxGeometry(bodyW,bodyH,bodyW*0.6),
    new T.MeshStandardMaterial({color:colr,roughness:0.85}));
  body.position.y=bodyH/2;body.castShadow=true;g.add(body);
  // Head
  var headR=age==='child'?0.16:0.18;
  var head=new T.Mesh(new T.SphereGeometry(headR,8,7),
    new T.MeshStandardMaterial({color:skin,roughness:0.9}));
  head.position.y=bodyH+headR;head.castShadow=true;g.add(head);
  // Hair cap
  var hairCap=new T.Mesh(new T.SphereGeometry(headR*1.05,8,7,0,Math.PI*2,0,Math.PI*0.55),
    new T.MeshStandardMaterial({color:hair,roughness:0.85}));
  hairCap.position.y=bodyH+headR+0.02;g.add(hairCap);
  // Skirt for F
  if(sex==='F'&&age!=='child'){
    var skirt=new T.Mesh(new T.ConeGeometry(bodyW*0.9,bodyH*0.5,8),
      new T.MeshStandardMaterial({color:colr,roughness:0.85}));
    skirt.position.y=bodyH*0.25;g.add(skirt);
  }
  // Cane for elder
  if(age==='elder'){
    var cane=new T.Mesh(new T.CylinderGeometry(0.025,0.025,0.85,5),
      new T.MeshStandardMaterial({color:0x4a2a18}));
    cane.position.set(bodyW*0.7,0.42,0);g.add(cane);
    g.rotation.x=0.05;
  }
  g.scale.setScalar(scale);
  return g;
}

var characters=[]; // active characters
function buildCharacter(spec){
  var g=new T.Group();
  var c={spec:spec,group:g,childG:null,adultG:null,elderG:null,active:false};
  c.childG=buildCharBody(0.9,spec.color,spec.sex,'child');g.add(c.childG);
  c.adultG=buildCharBody(1.0,spec.color,spec.sex,'adult');g.add(c.adultG);
  c.elderG=buildCharBody(1.0,spec.color,spec.sex,'elder');g.add(c.elderG);
  c.childG.visible=c.adultG.visible=c.elderG.visible=false;
  // Track its meshes for disposal
  g.traverse(function(o){if(o.geometry||o.material)track(o);});
  return c;
}

function applyCam(c,t){
  // Smooth interpolation toward target
  var tp=new T.Vector3().fromArray(c.p);
  var tl=new T.Vector3().fromArray(c.l);
  camera.position.lerp(tp,Math.min(1,t));
  // Look-at via quaternion blend
  var current=new T.Vector3();
  current.copy(camera.position).add(camera.getWorldDirection(new T.Vector3()).multiplyScalar(10));
  current.lerp(tl,Math.min(1,t));
  camera.lookAt(current);
}

// ============ Initial seed ============
function setFamily(idx){
  state.familyIdx=idx%FAMS.length;
  state.family=FAMS[state.familyIdx];
  // Build characters
  // Dispose any previous character meshes (they'll be in DISP for full reseed; for in-cycle reload not needed)
  for(var i=0;i<state.characters.length;i++){
    house.remove(state.characters[i].group);
  }
  state.characters=[];
  for(var j=0;j<state.family.members.length;j++){
    var c=buildCharacter(state.family.members[j]);
    state.characters.push(c);
    house.add(c.group);
  }
  saveMem();
}

// ============ Era / chyron ============
var chyronQueue=[];
var chyronUntil=0;
function pushChyron(text,durMs){
  chyronQueue.push({t:text,d:durMs||5000});
}
function tickChyron(now){
  if(now<chyronUntil&&elChy.textContent)return;
  if(chyronQueue.length===0)return;
  var item=chyronQueue.shift();
  elChy.classList.remove('fadeIn');
  void elChy.offsetWidth;
  elChy.classList.add('fadeIn');
  elChy.textContent=item.t;
  chyronUntil=now+item.d;
}

function setEra(year){
  // find latest era <= year
  var idx=0;
  for(var i=0;i<ERAS.length;i++){
    if(year>=ERAS[i][0])idx=i;else break;
  }
  if(idx!==state.prevEraIdx){
    state.prevEraIdx=idx;
    var er=ERAS[idx];
    elEra.innerHTML='<small>The '+state.family.surname+' House</small><b>'+er[0]+'</b>'+er[1];
    pushChyron('· '+er[0]+' — '+er[1]+' ·',7000);
  }
}

function drawMap(activeRoom){
  var w=elMap.width,h=elMap.height;
  mctx.clearRect(0,0,w,h);
  mctx.fillStyle='rgba(20,12,4,0.85)';mctx.fillRect(0,0,w,h);
  // Title
  mctx.fillStyle='#c9a861';mctx.font='bold 9px Georgia';
  mctx.fillText('FLOOR PLAN',8,12);
  mctx.fillText('YR '+Math.round(state.year),140,12);
  // House boundary
  var ox=24,oy=22,sw=160,sh=124;
  mctx.strokeStyle='#c9a861';mctx.lineWidth=1.5;
  mctx.strokeRect(ox,oy,sw,sh);
  // Room divisions: living | kitchen on bottom; master | kids on top
  mctx.beginPath();
  mctx.moveTo(ox,oy+sh*0.5);mctx.lineTo(ox+sw,oy+sh*0.5);
  mctx.moveTo(ox+sw*0.5,oy);mctx.lineTo(ox+sw*0.5,oy+sh);
  mctx.stroke();
  var rooms=[
    {n:'MASTER',k:'master',x:ox,y:oy,w:sw*0.5,h:sh*0.5},
    {n:'KIDS',k:'kids',x:ox+sw*0.5,y:oy,w:sw*0.5,h:sh*0.5},

  // Highlight active
  for(var i=0;i<rooms.length;i++){

  mctx.fillStyle=activeRoom==='yard'?'rgba(212,162,90,0.35)':'rgba(60,90,40,0.5)';
  mctx.fillRect(ox-12,oy-14,sw+24,12);
  mctx.fillStyle='#e6d6a3';mctx.fillText('YARD · OAK',ox-8,oy-4);
  // Garage
  mctx.fillStyle=activeRoom==='garage'?'rgba(212,162,90,0.35)':'rgba(60,60,60,0.5)';
  mctx.fillRect(ox+sw+4,oy+sh*0.3,16,30);
  mctx.fillStyle='#e6d6a3';mctx.font='6px Georgia';mctx.fillText('GAR',ox+sw+5,oy+sh*0.3+10);
  mctx.font='8px Georgia';
  // Active dot
  mctx.fillStyle='#ff6';
  var rp={living:[ox+sw*0.25,oy+sh*0.75],kitchen:[ox+sw*0.75,oy+sh*0.75],
    master:[ox+sw*0.25,oy+sh*0.25],kids:[ox+sw*0.75,oy+sh*0.25],

    dining:[ox+sw*0.75,oy+sh*0.6]}[activeRoom];
  if(rp){mctx.beginPath();mctx.arc(rp[0],rp[1],3.5,0,6.28);mctx.fill();}
}

// ============ Update systems ============

function updateCharacters(year){
  // Determine which characters are alive at this year
  // Children visible if 0<=age<13, adult 13<=age<60, elder 60+
  for(var i=0;i<state.characters.length;i++){
    var c=state.characters[i];
    var s=c.spec;
    var age=year-s.b;
    var alive=(year>=s.b)&&(year<=s.d);
    if(!alive){
      c.group.visible=false;
      continue;
    }
    c.group.visible=true;
    var phase=age<13?'child':(age<60?'adult':'elder');
    c.childG.visible=(phase==='child');
    c.adultG.visible=(phase==='adult');
    c.elderG.visible=(phase==='elder');
    // Position based on home room + phase offset
    var rp=ROOM_POSITIONS[s.room]||ROOM_POSITIONS.living;
    var jx=Math.sin((s.b+year)*0.3)*0.6;
    var jz=Math.cos((s.b+year)*0.4)*0.6;
    c.group.position.set(rp.x+jx,rp.y,rp.z+jz);
    // Face toward center
    c.group.rotation.y=Math.sin(year*0.07+s.b)*0.6;
  }
}

function updateOakTree(year){
  // 1900 sapling, 2100 huge. Smooth growth curve.
  var p=Math.max(0,Math.min(1,(year-1900)/200));
  // ease-out
  var s=0.18+1.6*Math.pow(p,0.65);
  oakTree.scale.setScalar(s);
  // Fall foliage in autumn for variety
  // Rope swing visible from 1925
  ropeSwing.visible=(year>=1925&&year<2080);
}

function updateWallpaper(year){
  var dec=Math.floor(year/10);
  if(dec!==state.prevDecade){
    state.prevDecade=dec;
    var newTex=wallpaperTex(year);
    var oldMap=interiorMat.map;
    interiorMat.map=newTex;
    interiorMat.needsUpdate=true;
    if(oldMap&&oldMap.dispose)oldMap.dispose();
    // Photo wall: add new portrait every 10 years if family member alive
    var avail=null;
    for(var i=0;i<state.family.members.length;i++){
      var m=state.family.members[i];
      if(year>=m.b&&year<=m.d){avail=m;break;}
    }
    if(avail&&state.photoFilledMax<photoSlots.length){
      var slot=photoSlots[state.photoFilledMax++];
      var fr=makeFrame(avail.name,avail.color);
      fr.position.copy(slot.pos);
      photoWall.add(fr);
    }
  }
}

}

function updateWho(now){
  if(now-state.lastWhoUpdate<6000)return;
  state.lastWhoUpdate=now;
  // Pick a name to feature in WHO IS chyron
  var pool=[],i;
  for(i=0;i<state.family.members.length;i++){
    var m=state.family.members[i];
    if(state.year>=m.b&&state.year<=m.d)pool.push({name:m.name,gen:m.gen,b:m.b,d:m.d,kind:'family'});
  }
  if(pool.length<3)pool.push({name:NEIGHBORS[(state.year+state.epochCount)%NEIGHBORS.length],gen:0,b:0,d:0,kind:'neighbor'});
  var pick=pool[Math.floor(Math.random()*pool.length)];
  var label;
  if(pick.kind==='family'){
    label='<b>'+pick.name+'</b><span>GEN '+pick.gen+' · Born '+pick.b+(state.year>=pick.d?' · Passed '+pick.d:'')+'</span>';
  }else{
    label='<b>'+pick.name+'</b><span>NEIGHBOR</span>';
  }
  elWho.innerHTML='<b>WHO IS</b>'+label;
}

// ============ Reseed ============
function reseed(){
  state.epochCount++;
  // Advance family pointer
  setFamily(state.epochCount);
  state.startTs=performance.now();
  state.year=1900;
  state.prevYear=1900;
  state.prevDecade=189;
  state.prevEraIdx=-1;
  // Reset photo wall
  while(photoWall.children.length){
    var ch=photoWall.children[0];photoWall.remove(ch);
    ch.traverse(function(o){
      if(o.geometry&&o.geometry.dispose)o.geometry.dispose();
      if(o.material){var ms=Array.isArray(o.material)?o.material:[o.material];
        for(var i=0;i<ms.length;i++)if(ms[i].dispose)ms[i].dispose();}
    });
  }
  state.photoFilledMax=0;
  // Reset oak tree
  oakTree.scale.setScalar(0.18);
  // Clear any pending chyron
  chyronQueue.length=0;
  pushChyron('· '+state.family.surname+' family inherits the house. The next 200 years begin. ·',8000);
  pushChyron('1900 — A new family. The same oak. The same porch. ',6000);
  saveMem();
}

var lastT=performance.now();
function tick(){
  var now=performance.now();
  var dt=(now-lastT)/1000;lastT=now;
  // Year progression
  var elapsed=(now-state.startTs)/1000;
  var prog=elapsed/state.cycleLen;
  if(prog>=1){
    reseed();
    return requestAnimationFrame(tick);
  }
  state.year=1900+200*prog;

  // Update systems
  setEra(state.year);
  updateOakTree(state.year);
  updateWallpaper(state.year);
  updateFurniture(state.year);
  updateStructural(state.year);
  updateCharacters(state.year);

  // Interior lamp flicker
  interiorLamp.intensity=0.5+Math.sin(now*0.003)*0.08;
  interiorLamp.position.set(-3,2.3+Math.sin(now*0.001)*0.05,2);

  // Camera switching
  camTimer+=dt;
  // Pace: shorter holds during interior moments, longer for drone
  var holdS=camHoldS;
  if(camTimer>=holdS){
    camTimer=0;
    camIdx=(camIdx+1)%CAMS.length;
    elCam.textContent='CAM · '+CAMS[camIdx].n;
  }
  applyCam(CAMS[camIdx],dt*1.6);

  // Mini-map: pick currently focused room based on cam name
  var camN=CAMS[camIdx].n;
  var actR='living';
  if(camN.indexOf('KITCHEN')===0)actR='kitchen';
  else if(camN.indexOf('MASTER')===0)actR='master';
  else if(camN.indexOf('KIDS')===0)actR='kids';
  else if(camN.indexOf('ATTIC')===0)actR='attic';
  else if(camN.indexOf('BASEMENT')===0)actR='basement';
  else if(camN.indexOf('PORCH')===0||camN.indexOf('SWING')>=0)actR='porch';
  else if(camN.indexOf('OAK')>=0||camN.indexOf('YARD')>=0||camN.indexOf('TREE')>=0||camN.indexOf('GARDEN')>=0)actR='yard';
  else if(camN.indexOf('GARAGE')>=0)actR='garage';
  else if(camN.indexOf('DINING')>=0)actR='dining';
  else if(camN.indexOf('LIVING')>=0||camN.indexOf('HEARTH')>=0||camN.indexOf('FIREPLACE')>=0||camN.indexOf('HALLWAY')>=0)actR='living';
  drawMap(actR);

  // HUD: gen + year
  // Determine generation by youngest active gen visible
  var gen=1;
  for(var i=0;i<state.family.members.length;i++){
    var m=state.family.members[i];
    if(state.year>=m.b&&state.year<=m.d&&m.gen>gen)gen=m.gen;
  }
  if(gen>5)gen=5;
  elGen.innerHTML='GEN '+gen+' of 5<span class="y">YEAR '+Math.round(state.year)+'</span><span class="f">'+state.family.surname.toUpperCase()+' FAMILY</span>';

  // Year-tick chyron events
  var yi=Math.floor(state.year);
  if(yi!==Math.floor(state.prevYear)){
    // Pick an EVENT_LINES based on (year-1900)/(200/N)
    var ratio=(yi-1900)/200;
    var idx=Math.floor(ratio*EVENT_LINES.length);
    if(idx<0)idx=0;if(idx>=EVENT_LINES.length)idx=EVENT_LINES.length-1;
    // Push only some years so we don't flood
    if(yi%5===0){
      pushChyron(EVENT_LINES[idx](yi,state.family.surname),5500);
    }
  }
  state.prevYear=state.year;

  tickChyron(now);
  updateWho(now);

  // Save memory occasionally
  if(yi%25===0&&Math.floor(state.prevYear)!==yi){saveMem();}

  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}

// Save on unload (best-effort)
W.addEventListener('beforeunload',function(){try{saveMem();}catch(e){}});

// Expose for debug / reseed shortcut
W.__house={reseed:reseed,disposeAll:disposeAll,state:state};

requestAnimationFrame(tick);
})();
</script>
