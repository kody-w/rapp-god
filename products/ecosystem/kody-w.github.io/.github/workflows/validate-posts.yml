name: Validate Posts

on:
  push:
    paths:
      - '_posts/**'
  pull_request:
    paths:
      - '_posts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate front matter
        run: |
          exit_code=0
          for file in _posts/*.md; do
            [ -f "$file" ] || continue

            # Check filename format
            basename=$(basename "$file")
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-.+\.md$'; then
              echo "::error file=$file::Invalid filename format. Expected YYYY-MM-DD-slug.md"
              exit_code=1
            fi

            # Extract front matter (between first two ---)
            front_matter=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')

            # Check required fields
            for field in layout title date; do
              if ! echo "$front_matter" | grep -q "^${field}:"; then
                echo "::error file=$file::Missing required front matter field: $field"
                exit_code=1
              fi
            done

            # Validate layout is 'post'
            layout=$(echo "$front_matter" | grep '^layout:' | sed 's/layout: *//')
            if [ "$layout" != "post" ]; then
              echo "::error file=$file::Layout must be 'post', got '$layout'"
              exit_code=1
            fi
          done

          if [ $exit_code -eq 0 ]; then
            echo "✅ All posts have valid front matter"
          fi
          exit $exit_code
