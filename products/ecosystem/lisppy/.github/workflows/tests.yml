name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions: {}
    strategy:
      matrix:
        python-version: ["3.8", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - run: python tools/verify_rapp_compliance.py
      - name: Build and inspect artifacts
        run: |
          set -euo pipefail
          source_pin_before="$(
            python lisp.py --doctor inventory@1 \
              --doctor-mode source --json |
            python -c 'import json,sys; print(json.load(sys.stdin)["pins"]["actual_inventory_sha256"])'
          )"
          contract_pin="$(
            python -c 'from lisppy.contracts import contract_manifest; print(contract_manifest()["sha256"])'
          )"
          build_pin_before="$(
            python -c 'import lisp; print(lisp.build_source_sha256())'
          )"
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          source_pin_after="$(
            python lisp.py --doctor inventory@1 \
              --doctor-mode source --json |
            python -c 'import json,sys; print(json.load(sys.stdin)["pins"]["actual_inventory_sha256"])'
          )"
          test "$source_pin_before" = "$source_pin_after"
          build_pin_after="$(
            python -c 'import lisp; print(lisp.build_source_sha256())'
          )"
          test "$build_pin_before" = "$build_pin_after"
          python -m pip wheel dist/*.tar.gz \
            --no-deps --wheel-dir dist/rebuilt
      - name: Doctor direct wheel
        shell: bash
        run: |
          set -euo pipefail
          pin="$(
            python lisp.py --doctor inventory@1 \
              --doctor-mode source --json |
            python -c 'import json,sys; print(json.load(sys.stdin)["pins"]["actual_inventory_sha256"])'
          )"
          python -m venv "$RUNNER_TEMP/direct"
          "$RUNNER_TEMP/direct/bin/python" -m pip install dist/*.whl
          (
            cd "$RUNNER_TEMP"
            "$RUNNER_TEMP/direct/bin/python" -I -m lisppy \
              --doctor release@2 --doctor-mode installed \
              --expect-inventory "$pin" --json
            "$RUNNER_TEMP/direct/bin/python" -I -m lisppy.demo
            "$RUNNER_TEMP/direct/bin/python" -I -m lisppy.contracts \
              > "$RUNNER_TEMP/direct-contract.json"
            "$RUNNER_TEMP/direct/bin/python" -I -m lisppy.contracts \
              --verify "$RUNNER_TEMP/direct-contract.json" \
              --expect-manifest "$contract_pin"
          )
      - name: Doctor sdist-derived wheel
        shell: bash
        run: |
          set -euo pipefail
          pin="$(
            python lisp.py --doctor inventory@1 \
              --doctor-mode source --json |
            python -c 'import json,sys; print(json.load(sys.stdin)["pins"]["actual_inventory_sha256"])'
          )"
          python -m venv "$RUNNER_TEMP/sdist"
          "$RUNNER_TEMP/sdist/bin/python" -m pip install dist/rebuilt/*.whl
          (
            cd "$RUNNER_TEMP"
            "$RUNNER_TEMP/sdist/bin/python" -I -m lisppy \
              --doctor release@2 --doctor-mode installed \
              --expect-inventory "$pin" --json
            "$RUNNER_TEMP/sdist/bin/python" -I -m lisppy.demo
            "$RUNNER_TEMP/sdist/bin/python" -I -m lisppy.contracts \
              > "$RUNNER_TEMP/sdist-contract.json"
            "$RUNNER_TEMP/sdist/bin/python" -I -m lisppy.contracts \
              --verify "$RUNNER_TEMP/sdist-contract.json" \
              --expect-manifest "$contract_pin"
          )
