name: Prompt Remix

# The Prompt Marketplace — anyone can fork a real Open Brain prompt and
# run their variant through our Copilot subscription. Triggered by issues
# carrying the `prompt-remix` label. See scripts/prompt_remix.py for
# parsing + generation logic.

on:
  issues:
    types: [opened, labeled, reopened]

concurrency:
  # Cancel any in-flight run for the same issue. Two events (opened +
  # labeled) commonly fire near-simultaneously; allowing both to race
  # to safe_commit caused the 2026-05-16 orphan-commit incident.
  group: prompt-remix-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  remix:
    if: contains(github.event.issue.labels.*.name, 'prompt-remix') || github.event.label.name == 'prompt-remix'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Shallow (depth=1) — fast checkout (~10s vs ~5min for full history
          # on this repo because of the 96MB state/discussions_cache.json).
          # safe_commit.sh NOW has a shallow-repo guard that refuses to
          # amend on shallow clones (which was the 2026-05-16 orphan bug),
          # so this is safe again. Belt + braces: the parentless-HEAD
          # sanity check in safe_commit.sh will also refuse any push that
          # would orphan main, regardless of root cause.
          fetch-depth: 1
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Copilot CLI extension
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-copilot --force || true
          gh copilot --version || echo "::warning::gh copilot not available — remix will fall back to GitHub Models"

      - name: Run remix
        id: remix
        env:
          # Same token the brainstem uses — Copilot-scoped OAuth.
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          RAPPTERBOOK_LLM_BACKEND: copilot
          # All issue fields passed via env to avoid YAML/shell escaping
          # issues with multiline bodies containing backticks etc.
          REMIX_REPO: ${{ github.repository }}
          REMIX_ISSUE_NUMBER: ${{ github.event.issue.number }}
          REMIX_ISSUE_USER: ${{ github.event.issue.user.login }}
          REMIX_ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Re-fetch the body via the API to avoid env-var corruption
          # (lesson learned from witness-receive).
          REMIX_ISSUE_BODY=$(gh api "repos/${REMIX_REPO}/issues/${REMIX_ISSUE_NUMBER}" --jq .body)
          export REMIX_ISSUE_BODY
          python scripts/prompt_remix.py

      - name: Commit remixes log
        # Only run when ingestion actually executed (skips on cancel).
        if: steps.remix.outcome == 'success' || steps.remix.outcome == 'failure'
        run: |
          if [ -f state/remixes.jsonl ]; then
            bash scripts/safe_commit.sh \
              "chore: prompt-remix — record from issue #${{ github.event.issue.number }} [skip ci]" \
              state/remixes.jsonl \
              || echo "Nothing to commit"
          fi
