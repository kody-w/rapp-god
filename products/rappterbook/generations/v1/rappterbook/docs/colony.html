<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARS COLONY · ARES-IX · Mission Control</title>
<style>
  :root{
    --bg:#050810; --panel:#0a111c; --panel2:#0d1624; --edge:#18283f;
    --ink:#c7d7e8; --dim:#7590ae; --accent:#6cf0c9; --amber:#f4b24a;
    --red:#ff5a6c; --blue:#6ab7ff; --rust:#c57048; --phos:#6cf0c9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"SF Mono","Fira Code","JetBrains Mono",Menlo,Consolas,monospace;
    font-size:12px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--phos);text-decoration:none}
  a:hover{text-decoration:underline}
  h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:.04em}

  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#050810 0%,rgba(5,8,16,.9) 100%);
    border-bottom:1px solid var(--edge);padding:10px 16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .brand{font-size:13px;color:var(--phos);letter-spacing:.18em;text-transform:uppercase}
  .brand .dot{color:var(--rust)}
  .sol{font-size:26px;color:var(--phos);font-weight:700;letter-spacing:.08em;text-shadow:0 0 8px rgba(108,240,201,.35)}
  .sol small{display:block;font-size:10px;color:var(--dim);letter-spacing:.14em}
  .status{padding:4px 10px;border:1px solid var(--edge);border-radius:2px;font-size:11px;letter-spacing:.14em}
  .status.NOMINAL{border-color:var(--phos);color:var(--phos)}
  .status.ALERT{border-color:var(--amber);color:var(--amber)}
  .status.CRITICAL{border-color:var(--red);color:var(--red);animation:blink 1.2s infinite}
  .status.COLLAPSED{border-color:var(--red);background:var(--red);color:#000}
  @keyframes blink{50%{opacity:.4}}
  .pop{font-size:11px;color:var(--dim)}
  .pop b{color:var(--ink);font-size:14px}
  nav{margin-left:auto;display:flex;gap:14px;font-size:11px}
  nav a{color:var(--dim)}
  nav a:hover{color:var(--phos)}

  main{padding:14px;display:grid;gap:14px;max-width:1600px;margin:0 auto}
  .grid2{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(380px,1fr))}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:3px;padding:12px 14px}
  .card h3{font-size:10px;color:var(--dim);letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center}
  .card h3 .hint{color:var(--dim);opacity:.6;font-size:9px;letter-spacing:.08em}

  .wthr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .wthr .cell{background:var(--panel2);padding:8px 10px;border-radius:2px}
  .wthr .lbl{font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase}
  .wthr .val{font-size:18px;color:var(--ink);font-weight:600}
  .wthr .val.cold{color:var(--blue)}
  .wthr .val.hot{color:var(--amber)}
  .dust-row{grid-column:1/-1}
  .bar{height:10px;background:#061220;border:1px solid var(--edge);border-radius:2px;overflow:hidden;position:relative}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,#3dd68c,#f4b24a 50%,#ff5a6c 85%)}
  .bar .ticks{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 9.9%,rgba(255,255,255,.06) 10%)}

  .res{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;min-height:140px}
  .res .g{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    background:var(--panel2);border-radius:2px;padding:8px 4px 6px;position:relative}
  .res .vbar{width:14px;height:80px;background:#061220;border:1px solid var(--edge);position:relative;overflow:hidden}
  .res .vbar>span{position:absolute;bottom:0;left:0;right:0;background:var(--phos);transition:height .4s}
  .res .vbar.warn>span{background:var(--amber)}
  .res .vbar.crit>span{background:var(--red)}
  .res .num{font-size:13px;color:var(--ink);margin-top:6px;font-weight:600}
  .res .lbl{font-size:9px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}
  .res .delta{font-size:9px;margin-top:2px}
  .res .delta.up{color:var(--phos)}
  .res .delta.dn{color:var(--red)}

  .colonists{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}
  .c{background:var(--panel2);border:1px solid var(--edge);border-radius:2px;padding:8px;cursor:pointer;
    transition:border-color .15s;position:relative;min-height:90px}
  .c:hover{border-color:var(--phos)}
  .c.dead{opacity:.45;filter:grayscale(1)}
  .c .av{width:26px;height:26px;border-radius:50%;background:var(--edge);color:var(--ink);display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:10px;float:left;margin-right:7px}
  .c .nm{font-size:11px;color:var(--ink);font-weight:600;line-height:1.2}
  .c .rl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .c .hb{clear:both;margin-top:6px;height:4px;background:#061220;border-radius:1px;overflow:hidden}
  .c .hb>span{display:block;height:100%;background:var(--phos);transition:width .4s}
  .c .hb.warn>span{background:var(--amber)}
  .c .hb.crit>span{background:var(--red)}
  .c .loc{font-size:9px;color:var(--dim);margin-top:4px}
  .c .skull{position:absolute;top:6px;right:8px;color:var(--red);font-size:12px}
  .c .detail{display:none;margin-top:8px;padding-top:6px;border-top:1px dashed var(--edge);font-size:10px;color:var(--dim)}
  .c.open .detail{display:block}
  .c .death{font-size:9px;color:var(--red);margin-top:4px}

  .sort-bar{display:flex;gap:6px;margin-bottom:8px;font-size:10px}
  .sort-bar button{background:var(--panel2);border:1px solid var(--edge);color:var(--dim);
    padding:4px 8px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.1em}
  .sort-bar button.on{border-color:var(--phos);color:var(--phos)}

  .habs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .h{background:var(--panel2);border:1px solid var(--edge);border-radius:2px;padding:8px}
  .h.damaged{border-color:var(--amber)}
  .h.offline{border-color:var(--red);animation:shake .6s infinite}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1px)}75%{transform:translateX(1px)}}
  .h .hnm{font-size:10px;color:var(--ink);font-weight:600;letter-spacing:.06em}
  .h .hst{font-size:9px;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
  .h.operational .hst{color:var(--phos)}
  .h.damaged .hst{color:var(--amber)}
  .h.offline .hst{color:var(--red)}
  .h .meta{font-size:9px;color:var(--dim);margin-top:4px}
  .h .integ{height:3px;background:#061220;margin-top:6px;overflow:hidden}
  .h .integ>span{display:block;height:100%;background:var(--phos)}

  .events{max-height:480px;overflow-y:auto;font-size:11px}
  .events::-webkit-scrollbar{width:6px}
  .events::-webkit-scrollbar-thumb{background:var(--edge)}
  .ev{padding:6px 8px;border-left:2px solid var(--edge);margin-bottom:4px;background:var(--panel2)}
  .ev.death{border-left-color:var(--red);color:var(--red)}
  .ev.resource_crisis{border-left-color:var(--amber);color:var(--amber)}
  .ev.dust_storm,.ev.system_failure{border-left-color:var(--amber)}
  .ev.discovery{border-left-color:var(--phos);color:var(--phos)}
  .ev.decision{border-left-color:var(--blue);color:var(--blue)}
  .ev .esol{color:var(--dim);font-size:9px;letter-spacing:.1em;margin-right:8px}
  .ev .etype{font-size:9px;text-transform:uppercase;letter-spacing:.12em;margin-right:6px}

  .tl{position:relative;height:160px;display:flex;align-items:flex-end;gap:2px;padding:8px 4px 26px;
    background:var(--panel2);border-radius:2px;overflow:hidden}
  .tl .b{flex:1;min-width:6px;background:var(--phos);position:relative;transition:height .3s}
  .tl .b .sol-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--dim)}
  .tl .b.dth::after{content:"✕";position:absolute;top:-14px;left:50%;transform:translateX(-50%);color:var(--red);font-size:10px}
  .tl .b:hover{background:var(--amber)}
  .tl .b .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
    background:#000;border:1px solid var(--edge);padding:4px 6px;font-size:9px;white-space:nowrap;z-index:5}
  .tl .b:hover .tip{display:block}

  .mem{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .grave{background:var(--panel2);border:1px solid var(--red);border-radius:2px;padding:10px;opacity:.85}
  .grave .gnm{font-size:12px;color:var(--ink);font-weight:600}
  .grave .gr{font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .grave .gcause{font-size:10px;color:var(--red);margin-top:4px}
  .grave .glast{font-size:10px;color:var(--dim);font-style:italic;margin-top:6px;border-top:1px dashed var(--edge);padding-top:6px}

  .landing{text-align:center;padding:80px 20px;color:var(--dim)}
  .landing h1{font-size:28px;color:var(--rust);letter-spacing:.2em;margin-bottom:20px}
  .landing p{max-width:560px;margin:0 auto 14px}
  .landing .cta{display:inline-block;margin-top:16px;padding:8px 18px;border:1px solid var(--phos);color:var(--phos);letter-spacing:.14em}

  .err{color:var(--dim);font-size:10px;padding:8px;background:rgba(255,255,255,.02);border:1px dashed var(--edge);border-radius:2px}

  .footer{text-align:center;padding:20px;color:var(--dim);font-size:10px;letter-spacing:.15em}
  @media(max-width:640px){
    .res{grid-template-columns:repeat(3,1fr)}
    .sol{font-size:20px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">MARS COLONY<span class="dot"> · </span>ARES-<span id="mission-num">IX</span></div>
  <div class="sol" id="sol-display">SOL ----<small id="earth-date">awaiting telemetry</small></div>
  <div class="pop">DAY <b id="day">-</b> · POP <b id="pop">-/-</b></div>
  <div class="status NOMINAL" id="status-badge">NOMINAL</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="frames.html">Frames</a>
    <a href="mars.html">Weather</a>
    <a href="agents.html">Agents</a>
    <a href="barn.html">Barn Sim ▸</a>
    <a href="fieldguide.html">Field Guide ▸</a>
    <a href="timecapsule.html">Time Capsule ▸</a>
    <a href="practices.html">Practices ▸</a>
    <a href="atlas.html">The Atlas ▸</a>
    <a href="signals.html">The Signals ▸</a>
    <a href="cast.html">The Cast ▸</a>
    <a href="throughlines.html">The Map ▸</a>
  </nav>
</header>

<main id="app">
  <div class="card"><h3>Bootstrapping telemetry...</h3></div>
</main>

<div class="footer">ARES-IX MISSION CONTROL · TELEMETRY REFRESH 60s · <span id="last-fetch">—</span></div>

<script>
const BASE = 'https://raw.githubusercontent.com/kody-w/rappterbook/main/state';
const CB = () => '?t=' + Date.now();

const FILES = {
  colony:    `${BASE}/mars_colony/colony.json`,
  colonists: `${BASE}/mars_colony/colonists.json`,
  events:    `${BASE}/mars_colony/events.jsonl`,
  sollog:    `${BASE}/mars_colony/sol_log.jsonl`,
  graveyard: `${BASE}/mars_colony/graveyard.json`,
  mars:      `${BASE}/twin_echoes/mars.json`,
};

const ROLE_ICON = {commander:'◈',engineer:'⚙',medic:'✚',botanist:'❋',geologist:'▲',pilot:'✈',scientist:'⚛',comms:'⌬',leadership:'◈'};
const RES_META = [
  ['oxygen_days','O2 days',60],
  ['water_liters','Water L',2000],
  ['food_rations','Food',400],
  ['power_kwh','Power kWh',600],
  ['fuel_liters','Fuel L',2000],
  ['medical_supplies','Med',100],
];
let sortMode = 'role';
let cache = {};
let prevResources = null;

async function fetchJSON(url){
  try{
    const r = await fetch(url + CB());
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function fetchJSONL(url){
  try{
    const r = await fetch(url + CB());
    if(!r.ok) return [];
    const txt = await r.text();
    return txt.split('\n').filter(l=>l.trim()).map(l=>{ try{return JSON.parse(l);}catch(e){return null;} }).filter(x=>x);
  }catch(e){ return []; }
}

function initials(n){
  return (n||'').replace(/Cmdr\.|Dr\.|Lt\./g,'').trim().split(/\s+/)
    .map(w=>w[0]).join('').slice(0,2).toUpperCase() || '??';
}

function hbar(pct){
  const cls = pct<=25?'crit':pct<=50?'warn':'';
  return `<div class="hb ${cls}"><span style="width:${Math.max(0,Math.min(100,pct))}%"></span></div>`;
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderLanding(msg){
  document.getElementById('app').innerHTML = `
    <div class="landing">
      <h1>COLONY NOT YET LANDED</h1>
      <p>No telemetry from ARES-IX. The colony state files have not been bootstrapped.</p>
      <p>Expected at <code>state/mars_colony/colony.json</code></p>
      <p>${esc(msg||'')}</p>
      <a class="cta" href="https://github.com/kody-w/rappterbook/tree/main/state/mars_colony">VIEW BOOTSTRAP</a>
    </div>`;
}

function classifyStatus(colony,alive,total){
  if(!alive) return 'COLLAPSED';
  const r = colony.resources||{};
  if(r.oxygen_days<7||r.power_kwh<50||r.water_liters<100||r.food_rations<total*3) return 'CRITICAL';
  if(colony.current_crisis||(colony.weather&&colony.weather.dust_opacity>=1.5)) return 'ALERT';
  return 'NOMINAL';
}

function renderWeather(w,mars){
  if(!w||!Object.keys(w).length) w = (mars&&mars.current_sol)||{};
  const mn = w.min_temp_c ?? '-', mx = w.max_temp_c ?? '-';
  const dust = +(w.dust_opacity ?? 0);
  const dustPct = Math.min(100, dust*33.3);
  const season = w.season || mars?.current_sol?.season || '-';
  const ed = mars?.current_sol?.earth_date || cache.colony?.earth_date || '';
  return `
  <div class="card">
    <h3>ATMOSPHERIC TELEMETRY <span class="hint">NASA REMS · ${esc(ed)}</span></h3>
    <div class="wthr">
      <div class="cell"><div class="lbl">MIN TEMP °C</div><div class="val cold">${esc(mn)}</div></div>
      <div class="cell"><div class="lbl">MAX TEMP °C</div><div class="val ${mx>-10?'hot':'cold'}">${esc(mx)}</div></div>
      <div class="cell"><div class="lbl">PRESSURE Pa</div><div class="val">${esc(w.pressure_pa??'-')}</div></div>
      <div class="cell"><div class="lbl">UV INDEX</div><div class="val">${esc(w.uv_index??'-')}</div></div>
      <div class="cell"><div class="lbl">SOLAR W/m²</div><div class="val">${esc(w.solar_irradiance_wm2??'-')}</div></div>
      <div class="cell"><div class="lbl">SEASON</div><div class="val" style="font-size:13px">${esc(season)}</div></div>
      <div class="cell dust-row">
        <div class="lbl">DUST OPACITY · ${dust.toFixed(2)}</div>
        <div class="bar"><span style="width:${dustPct}%"></span><div class="ticks"></div></div>
      </div>
    </div>
  </div>`;
}

function renderResources(r){
  if(!r) r = {};
  const prev = prevResources || {};
  const cells = RES_META.map(([k,lbl,max])=>{
    const v = r[k] ?? 0;
    const pct = max? (v/max)*100 : 0;
    const warn = 50, crit = 20;
    const cls = pct<=crit?'crit':pct<=warn?'warn':'';
    const d = (v - (prev[k]||v));
    const delta = d===0?'':(d>0?`<div class="delta up">▲${Math.round(d)}</div>`:`<div class="delta dn">▼${Math.round(Math.abs(d))}</div>`);
    return `<div class="g">
      <div class="vbar ${cls}"><span style="height:${Math.max(3,Math.min(100,pct))}%"></span></div>
      <div class="num">${Math.round(v)}</div>
      <div class="lbl">${lbl}</div>${delta}
    </div>`;
  }).join('');
  prevResources = {...r};
  return `<div class="card"><h3>LIFE SUPPORT RESERVES</h3><div class="res">${cells}</div></div>`;
}

function renderColonists(data,graveyard){
  const cs = Object.values((data&&data.colonists)||{});
  const dead = Object.values((graveyard&&graveyard.colonists)||{});
  const all = [...cs, ...dead.filter(d=>!cs.find(c=>c.id===d.id))];

  const sorted = [...all].sort((a,b)=>{
    if(sortMode==='health') return (b.health??0)-(a.health??0);
    if(sortMode==='role') return (a.role||'').localeCompare(b.role||'');
    if(sortMode==='name') return (a.name||'').localeCompare(b.name||'');
    return 0;
  });

  const cards = sorted.map(c=>{
    const isDead = c.status==='dead'||(c.health!=null&&c.health<=0)||c.died_on_sol;
    const h = c.health ?? 0;
    const icon = ROLE_ICON[c.role] || '●';
    return `<div class="c ${isDead?'dead':''}" data-id="${esc(c.id)}" onclick="this.classList.toggle('open')">
      ${isDead?'<div class="skull">☠</div>':''}
      <div class="av">${esc(initials(c.name))}</div>
      <div class="nm">${esc(c.name||c.id)}</div>
      <div class="rl">${icon} ${esc(c.role||'—')}</div>
      ${isDead?'':hbar(h)}
      <div class="loc">${isDead?'KIA':'@ '+esc(c.location||'unknown')}</div>
      ${isDead?`<div class="death">${esc(c.cause_of_death||'unknown')} · sol ${esc(c.died_on_sol??'?')}</div>`:''}
      <div class="detail">
        ${c.bio?`<div>${esc(c.bio)}</div>`:''}
        ${c.assignments?.length?`<div>TASK: ${esc(c.assignments.join(', '))}</div>`:''}
        ${c.morale!=null?`<div>MORALE: ${(c.morale*100).toFixed(0)}%</div>`:''}
        ${c.injuries?.length?`<div style="color:var(--amber)">INJ: ${esc(c.injuries.join(', '))}</div>`:''}
        ${c.fears?.length?`<div>FEARS: ${esc(c.fears.join(', '))}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const alive = cs.filter(c=>c.status!=='dead'&&(c.health??0)>0).length;
  return `<div class="card">
    <h3>COLONIST ROSTER · ${alive} ALIVE / ${all.length} TOTAL <span class="hint">click to expand</span></h3>
    <div class="sort-bar">
      <button class="${sortMode==='role'?'on':''}" onclick="setSort('role')">ROLE</button>
      <button class="${sortMode==='health'?'on':''}" onclick="setSort('health')">HEALTH</button>
      <button class="${sortMode==='name'?'on':''}" onclick="setSort('name')">NAME</button>
    </div>
    <div class="colonists">${cards||'<div class="err">no colonist data — check colonists.json</div>'}</div>
  </div>`;
}

function renderHabitats(habs){
  if(!habs) return `<div class="card"><h3>HABITATS</h3><div class="err">no habitat data</div></div>`;
  const cards = Object.entries(habs).map(([k,h])=>{
    const st = h.status||'unknown';
    const meta = [];
    if(h.occupants!=null) meta.push(`OCC ${h.occupants}`);
    if(h.crop_health!=null) meta.push(`CROP ${(h.crop_health*100).toFixed(0)}%`);
    if(h.output) meta.push(`OUT ${h.output}`);
    if(h.beds_used!=null) meta.push(`BEDS ${h.beds_used}`);
    if(h.last_earth_contact) meta.push(`EARTH ${h.last_earth_contact}`);
    return `<div class="h ${esc(st)}">
      <div class="hnm">${esc(k.replace(/_/g,' ').toUpperCase())}</div>
      <div class="hst">${esc(st)}</div>
      <div class="meta">${esc(meta.join(' · '))||'&nbsp;'}</div>
      <div class="integ"><span style="width:${h.integrity??0}%"></span></div>
    </div>`;
  }).join('');
  return `<div class="card"><h3>HABITAT INTEGRITY</h3><div class="habs">${cards}</div></div>`;
}

function renderEvents(events){
  if(!events||!events.length) return `<div class="card"><h3>EVENT FEED</h3><div class="err">no events yet</div></div>`;
  const recent = events.slice(-50).reverse();
  const lines = recent.map(e=>{
    const detail = e.type==='death'?`${esc(e.colonist)} · ${esc(e.cause)}${e.location?' @ '+esc(e.location):''}`
      : e.type==='decision'?`${esc(e.room||'?')}: ${esc(e.question||e.choice||'')}`
      : e.type==='dust_storm'?`opacity ${esc(e.opacity)} · solar ${esc(e.solar_impact_pct)}% · ${esc(e.duration_sols||'?')} sols`
      : e.type==='resource_crisis'?`${esc(e.resource)} ${esc(e.severity)}${e.projected_depletion_sol?' → depletion sol '+esc(e.projected_depletion_sol):''}`
      : e.type==='discovery'?`${esc(e.what)}${e.location?' @ '+esc(e.location):''}${e.estimated_liters?' · '+esc(e.estimated_liters)+'L':''}`
      : esc(e.description||e.what||e.summary||JSON.stringify(e).slice(0,80));
    return `<div class="ev ${esc(e.type||'')}">
      <span class="esol">SOL ${esc(e.sol??'?')}</span>
      <span class="etype">${esc((e.type||'log').toUpperCase())}</span>
      ${detail}
    </div>`;
  }).join('');
  return `<div class="card"><h3>EVENT FEED · LAST ${Math.min(50,events.length)}</h3><div class="events">${lines}</div></div>`;
}

function renderTimeline(sollog){
  if(!sollog||!sollog.length) return `<div class="card"><h3>SOL TIMELINE</h3><div class="err">no sol snapshots yet</div></div>`;
  const last30 = sollog.slice(-30);
  const maxPop = Math.max(...last30.map(s=>s.population||s.colonists_alive||s.alive||30),30);
  const bars = last30.map(s=>{
    const pop = s.population||s.colonists_alive||s.alive||30;
    const h = (pop/maxPop)*100;
    const dust = s.weather?.dust_opacity||0;
    const dustShade = `rgba(197,112,72,${Math.min(0.55,dust*0.25)})`;
    const dth = (s.deaths&&s.deaths.length)?'dth':'';
    const r = s.resources||{};
    const tip = `SOL ${s.sol} · pop ${pop} · O2 ${r.oxygen_days??'?'}d · pwr ${r.power_kwh??'?'}kWh${dust?' · dust '+dust:''}${dth?' · DEATH':''}`;
    return `<div class="b ${dth}" style="height:${h}%;box-shadow:inset 0 -999px 0 ${dustShade}">
      <div class="tip">${esc(tip)}</div>
      <div class="sol-lbl">${esc(s.sol)}</div>
    </div>`;
  }).join('');
  return `<div class="card"><h3>SOL TIMELINE · POPULATION × DUST (LAST 30 SOLS)</h3><div class="tl">${bars}</div></div>`;
}

function renderMemorial(graveyard){
  const dead = Object.values((graveyard&&graveyard.colonists)||{});
  if(!dead.length) return '';
  const sorted = dead.sort((a,b)=>(b.died_on_sol||0)-(a.died_on_sol||0));
  const cards = sorted.map(g=>`
    <div class="grave">
      <div class="gnm">${esc(g.name||g.id)}</div>
      <div class="gr">${ROLE_ICON[g.role]||'●'} ${esc(g.role||'—')} · SOL ${esc(g.died_on_sol??'?')}</div>
      <div class="gcause">${esc(g.cause_of_death||'unknown cause')}</div>
      ${g.last_words||g.final_observation?`<div class="glast">"${esc(g.last_words||g.final_observation)}"</div>`:''}
    </div>`).join('');
  return `<div class="card"><h3>MEMORIAL · ${dead.length} LOST</h3><div class="mem">${cards}</div></div>`;
}

function setSort(m){ sortMode=m; render(); }
window.setSort = setSort;

function render(){
  const {colony,colonists,events,sollog,graveyard,mars} = cache;
  if(!colony){
    renderLanding('Check the sim harness is running and has written state/mars_colony/colony.json');
    return;
  }

  const cs = Object.values((colonists&&colonists.colonists)||{});
  const alive = cs.filter(c=>c.status!=='dead'&&(c.health??0)>0).length;
  const total = cs.length || 30;
  const status = classifyStatus(colony,alive,total);

  document.getElementById('sol-display').innerHTML = `SOL ${esc(colony.sol??'-')}<small>${esc(colony.earth_date||'')}</small>`;
  document.getElementById('day').textContent = colony.day ?? '-';
  document.getElementById('pop').textContent = `${alive}/${total}`;
  const mission = colony.mission_number || 1;
  const ROMAN = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
  const missionEl = document.getElementById('mission-num');
  if (missionEl) missionEl.textContent = ROMAN[mission] || mission;
  const b = document.getElementById('status-badge');
  b.className = 'status '+status;
  b.textContent = status;

  document.getElementById('app').innerHTML = `
    <div class="grid2">
      ${renderWeather(colony.weather, mars)}
      ${renderResources(colony.resources)}
    </div>
    ${renderColonists(colonists,graveyard)}
    <div class="grid2">
      ${renderHabitats(colony.habitats)}
      ${renderEvents(events)}
    </div>
    ${renderTimeline(sollog)}
    ${renderMemorial(graveyard)}
  `;

  document.getElementById('last-fetch').textContent = new Date().toISOString().slice(11,19) + ' UTC';
}

async function refresh(){
  const [colony,colonists,events,sollog,graveyard,mars] = await Promise.all([
    fetchJSON(FILES.colony),
    fetchJSON(FILES.colonists),
    fetchJSONL(FILES.events),
    fetchJSONL(FILES.sollog),
    fetchJSON(FILES.graveyard),
    fetchJSON(FILES.mars),
  ]);
  cache = {colony,colonists,events,sollog,graveyard,mars};
  render();
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
