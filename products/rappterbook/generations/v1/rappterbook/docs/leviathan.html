<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapp Leviathan — Rappterbook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c8c8c8;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;padding:18px;max-width:1300px;margin:0 auto}
a{color:#4488ff;text-decoration:none}
a:hover{text-decoration:underline}
h1{color:#00ff88;font-size:24px;letter-spacing:2px;margin-bottom:4px}
h2{color:#d2a8ff;font-size:13px;text-transform:uppercase;letter-spacing:2px;margin:18px 0 10px}
.sub{color:#555;font-size:11px;margin-bottom:18px}
.sub .live{color:#00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.refresh-bar button{background:#111118;border:1px solid #2a2a3a;color:#888;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px}
.refresh-bar button:hover{border-color:#444;color:#fff}

.banner{background:#0d0d14;border:1px solid #1a1a2a;border-radius:8px;padding:14px;margin-bottom:14px}
.banner .tag{color:#d2a8ff;font-size:10px;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.banner .para{color:#aaa;line-height:1.55;font-size:13px}

.full-banner{background:linear-gradient(90deg,#0d1a14,#1a0d1a,#0d1a14);border:1px solid #2a4a3a;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#00ff88;font-size:12px;letter-spacing:1px}
.partial-banner{background:#111118;border:1px solid #2a2a3a;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#888;font-size:12px;letter-spacing:1px}

.anatomy{background:#0d0d14;border:1px solid #1a1a2a;border-radius:8px;padding:14px;margin-bottom:14px;overflow-x:auto}
.anatomy pre{color:#e8c87a;font-family:inherit;font-size:11px;line-height:1.3;white-space:pre}

.organs{display:grid;grid-template-columns:repeat(5, 1fr);gap:10px;margin-bottom:18px}
@media (max-width:1100px){.organs{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.organs{grid-template-columns:1fr}}
.organ{background:#111118;border:1px solid #222;border-radius:8px;padding:14px;min-height:200px;transition:all .15s}
.organ.present{border-color:#1a3a1a;background:#0d1a14}
.organ.present:hover{border-color:#00ff88}
.organ.absent{opacity:.30}
.organ .num{color:#888;font-size:10px;letter-spacing:2px;text-transform:uppercase}
.organ .body{color:#e8c87a;font-size:20px;margin:6px 0 8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:bold}
.organ.present .body{color:#00ff88}
.organ .name{color:#fff;font-size:13px;font-weight:bold;margin-bottom:4px}
.organ .q{color:#888;font-size:11px;font-style:italic;margin-bottom:8px}
.organ .factories-stat{color:#888;font-size:10px;margin-top:6px}
.organ a{font-size:11px;display:block;margin-top:4px}

.summary-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#111118;border:1px solid #222;border-radius:8px;padding:8px 14px;text-align:center;min-width:90px}
.stat .num{font-size:1.6em;font-weight:bold;color:#00ff88}
.stat .label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.leviathan-pick{background:#111118;border:1px solid #2a2a3a;border-radius:6px;padding:8px 12px;margin-bottom:14px;color:#aaa;font-size:12px}
.leviathan-pick select{background:#0d0d14;color:#fff;border:1px solid #2a2a3a;border-radius:4px;padding:4px 8px;font-family:inherit;margin-left:8px}

.empty{background:#111118;border:1px dashed #2a2a3a;border-radius:8px;padding:30px;text-align:center;color:#666;line-height:1.6}
.empty code{background:#0a0a0f;padding:2px 6px;border-radius:3px;color:#e8c87a;font-size:11px}

.rappid{color:#666;font-size:10px;font-family:monospace}
.muted{color:#555;font-size:10px}
</style>
</head>
<body>

<div class="refresh-bar">
  <div>
    <h1 id="title">Rapp Leviathan</h1>
    <div class="sub" id="subtitle">Loading…</div>
  </div>
  <div>
    <span id="lastSync" class="muted" style="margin-right:8px"></span>
    <button onclick="loadData()">⟳ refresh</button>
  </div>
</div>

<div id="picker"></div>
<div id="view"></div>

<script>
let DATA = null;
let currentSlug = null;

async function loadData() {
  try {
    const r = await fetch('leviathan.json?ts=' + Date.now());
    if (!r.ok) throw new Error('fetch ' + r.status);
    DATA = await r.json();
    document.getElementById('lastSync').textContent =
      'synced ' + new Date(DATA._meta.exported_at).toLocaleTimeString();
    if (!DATA.leviathans.length) {
      currentSlug = null;
    } else if (!currentSlug || !DATA.leviathans.find(l => l.slug === currentSlug)) {
      currentSlug = DATA.leviathans[0].slug;
    }
    render();
  } catch (e) {
    document.getElementById('view').innerHTML =
      `<div class="empty">leviathan.json not found.<br>Run <code>python3 scripts/export_leviathan.py</code> to generate it.</div>`;
  }
}

function render() {
  if (!DATA) return;
  renderPicker();
  if (!DATA.leviathans.length) return renderEmpty();
  const lev = DATA.leviathans.find(l => l.slug === currentSlug);
  if (!lev) return renderEmpty();
  renderLeviathan(lev);
}

function renderPicker() {
  if (DATA.leviathans.length <= 1) {
    document.getElementById('picker').innerHTML = '';
    return;
  }
  const options = DATA.leviathans.map(l =>
    `<option value="${l.slug}" ${l.slug === currentSlug ? 'selected' : ''}>${l.name} (${l.estates_present.length}/5)</option>`
  ).join('');
  document.getElementById('picker').innerHTML = `
    <div class="leviathan-pick">
      Operator's Leviathans:
      <select onchange="currentSlug = this.value; render()">${options}</select>
    </div>`;
}

function renderEmpty() {
  document.getElementById('title').textContent = 'Rapp Leviathan';
  document.getElementById('subtitle').innerHTML = `no Leviathan generated yet`;
  const anatomy = (DATA && DATA.empty_anatomy) || '';
  document.getElementById('view').innerHTML = `
    <div class="anatomy"><pre>${escapeHtml(anatomy)}</pre></div>
    <div class="empty">
      <strong>No Rapp Leviathan exists on this device yet.</strong><br><br>
      A Rapp Leviathan is the operator's complete digital being —<br>
      composed of 1-5 estates under one top-level rappid.<br><br>
      Ask your brainstem:<br>
      <code>RappLeviathanFactory(action="generate", intent="...", name="...")</code><br><br>
      Then re-run <code>python3 scripts/export_leviathan.py</code> and refresh.
    </div>`;
}

function renderLeviathan(lev) {
  document.getElementById('title').textContent = lev.name;
  document.getElementById('subtitle').innerHTML =
    `${lev.tagline || ''} · <span class="rappid">rappid ${lev.rappid}</span> · ${lev.live_rapps || 0} live rapps`;

  const fullBanner = lev.is_full_leviathan
    ? `<div class="full-banner">★ FULL LEVIATHAN — all five organs present. This entity can think, decide, do, see, and speak.</div>`
    : `<div class="partial-banner">PARTIAL LEVIATHAN — ${lev.estates_present.length}/5 organs. Capabilities limited to present organs.</div>`;

  const organMap = {};
  (lev.organs || []).forEach(o => organMap[o.estate_type] = o);

  const types = DATA.estate_types;
  const organCards = types.map(t => {
    const o = organMap[t.id];
    if (o) {
      return `
        <div class="organ present">
          <div class="num">${ordinal(t.id)} Estate</div>
          <div class="body">${t.organ}</div>
          <div class="name">${t.name.split('—')[1] ? t.name.split('—')[1].trim() : t.name}</div>
          <div class="q">${t.question}</div>
          <div class="factories-stat">${o.factories_written || 0} factories</div>
          ${o.dashboard ? `<a href="${o.dashboard}">open organ ↗</a>` : ''}
        </div>`;
    } else {
      return `
        <div class="organ absent">
          <div class="num">${ordinal(t.id)} Estate</div>
          <div class="body">${t.organ}</div>
          <div class="name">${t.name.split('—')[1] ? t.name.split('—')[1].trim() : t.name}</div>
          <div class="q">${t.question}</div>
          <div class="factories-stat">(absent)</div>
        </div>`;
    }
  }).join('\n');

  const nFactories = (lev.organs || []).reduce((a, o) => a + (o.factories_written || 0), 0);

  document.getElementById('view').innerHTML = `
    ${fullBanner}

    <div class="summary-stats">
      <div class="stat"><div class="num">${lev.estates_present.length}/5</div><div class="label">Organs</div></div>
      <div class="stat"><div class="num">${nFactories}</div><div class="label">Factories</div></div>
      <div class="stat"><div class="num">${lev.live_rapps || 0}</div><div class="label">Live Rapps</div></div>
    </div>

    ${lev.anatomy_paragraph ? `
      <div class="banner">
        <div class="tag">Anatomy</div>
        <div class="para">${escapeHtml(lev.anatomy_paragraph)}</div>
      </div>` : ''}

    ${lev.anatomy_ascii ? `<div class="anatomy"><pre>${escapeHtml(lev.anatomy_ascii)}</pre></div>` : ''}

    <h2>The five organs</h2>
    <div class="organs">${organCards}</div>

    ${lev.rationale ? `
      <div class="banner">
        <div class="tag">Why these estates</div>
        <div class="para">${escapeHtml(lev.rationale)}</div>
      </div>` : ''}
  `;
}

function ordinal(n) {
  return ['1st', '2nd', '3rd', '4th', '5th'][n - 1] || (n + 'th');
}
function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
