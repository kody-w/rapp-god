<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rappter Obsidian — the vault twin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:title" content="Rappter Obsidian — the vault twin">
<meta property="og:description" content="The Rappterbook knowledge vault, rendered Obsidian-style. Atomic notes, wikilinks, graph view. Cloneable as a real Obsidian vault.">
<style>
:root {
  --bg: #1e1e1e;
  --bg-alt: #262626;
  --bg-elev: #2d2d2d;
  --border: #3a3a3a;
  --text: #dcddde;
  --text-muted: #8a8a8a;
  --accent: #a882ff;
  --accent-soft: rgba(168, 130, 255, 0.15);
  --link: #7c98ff;
  --link-hover: #a7bcff;
  --unresolved: #ff6b6b;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }
a { color: var(--link); text-decoration: none; }
a:hover { color: var(--link-hover); text-decoration: underline; }
.layout { display: grid; grid-template-columns: 260px 1fr 300px; height: 100vh; overflow: hidden; }
aside { background: var(--bg-alt); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
aside.right { border-right: 0; border-left: 1px solid var(--border); }
aside h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 18px 0 6px; font-weight: 600; }
aside h3:first-child { margin-top: 0; }
.mobile-bar { display: none; position: sticky; top: 0; z-index: 20; background: var(--bg-alt); border-bottom: 1px solid var(--border); padding: 10px 14px; align-items: center; gap: 10px; }
.mobile-bar .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: var(--sans); min-height: 36px; min-width: 36px; }
.mobile-bar .icon-btn:active { background: var(--accent-soft); color: var(--accent); }
.mobile-bar .title { flex: 1; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; }
.drawer-backdrop.open { display: block; }
.brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; margin-bottom: 12px; }
.brand-egg { font-size: 18px; }
.brand-sub { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-bottom: 16px; }
.search { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; font-family: var(--sans); }
.search:focus { outline: none; border-color: var(--accent); }
.folder { margin-bottom: 10px; }
.folder-name { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin: 8px 0 4px; font-weight: 600; }
.note-link { display: block; padding: 3px 8px; margin: 0 -8px; border-radius: 4px; color: var(--text); font-size: 13px; cursor: pointer; }
.note-link:hover { background: var(--bg-elev); color: var(--accent); text-decoration: none; }
.note-link.active { background: var(--accent-soft); color: var(--accent); }
main { overflow-y: auto; padding: 40px 56px 80px; max-width: 820px; margin: 0 auto; width: 100%; }
main h1 { font-size: 30px; margin: 0 0 4px; font-weight: 700; }
main h2 { font-size: 20px; margin: 28px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
main h3 { font-size: 16px; margin: 22px 0 8px; }
main p { margin: 10px 0; }
main code { font-family: var(--mono); background: var(--bg-elev); padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
main pre { background: var(--bg-elev); padding: 14px 16px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
main pre code { background: transparent; padding: 0; }
main blockquote { margin: 10px 0; padding: 6px 16px; border-left: 3px solid var(--accent); color: var(--text-muted); background: var(--accent-soft); border-radius: 0 4px 4px 0; }
main table { border-collapse: collapse; margin: 10px 0; width: 100%; }
main th, main td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 14px; }
main th { background: var(--bg-elev); }
main ul, main ol { padding-left: 24px; }
main li { margin: 4px 0; }
main hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
.wikilink { color: var(--link); border-bottom: 1px dashed rgba(124, 152, 255, 0.4); cursor: pointer; }
.wikilink:hover { color: var(--link-hover); border-bottom-style: solid; text-decoration: none; }
.wikilink.unresolved { color: var(--unresolved); border-bottom-color: rgba(255, 107, 107, 0.4); }
.note-meta { color: var(--text-muted); font-size: 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.note-meta .pill { background: var(--bg-elev); padding: 2px 8px; border-radius: 10px; }
.backlinks { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.backlinks h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 0 0 8px; }
.backlinks ul { list-style: none; padding: 0; margin: 0; }
.backlinks li { padding: 4px 0; }
#graph-host { width: 100%; height: 280px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); margin-bottom: 16px; overflow: hidden; }
#graph-host svg { width: 100%; height: 100%; display: block; }
.graph-node { fill: var(--accent); stroke: var(--bg); stroke-width: 2; cursor: pointer; }
.graph-node.active { fill: #fff; }
.graph-node.faded { fill: var(--text-muted); opacity: 0.5; }
.graph-link { stroke: var(--border); stroke-opacity: 0.6; }
.graph-label { fill: var(--text); font-size: 10px; pointer-events: none; font-family: var(--sans); }
.note-props { font-size: 12px; }
.note-props dt { color: var(--text-muted); margin-top: 6px; }
.note-props dd { margin: 0 0 2px; font-family: var(--mono); font-size: 11px; word-break: break-all; }
.topbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted); font-size: 12px; }
.topbar .crumb { font-family: var(--mono); }
.btn { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: var(--sans); }
.btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
@media (max-width: 1100px) {
  .layout { grid-template-columns: 220px 1fr; }
  aside.right { display: none; }
}
@media (max-width: 760px) {
  .mobile-bar { display: flex; }
  .layout { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
  main { padding: 16px; max-width: 100%; }
  main h1 { font-size: 24px; }
  main h2 { font-size: 18px; }
  main pre { font-size: 12px; padding: 10px 12px; }
  aside.left {
    position: fixed; top: 0; bottom: 0; left: 0; width: 82%; max-width: 320px;
    z-index: 40; transform: translateX(-100%); transition: transform 0.2s ease;
    box-shadow: 2px 0 16px rgba(0,0,0,0.4);
  }
  aside.left.open { transform: translateX(0); }
  aside.right {
    display: block; position: fixed; top: 0; bottom: 0; right: 0; width: 82%; max-width: 320px;
    z-index: 40; transform: translateX(100%); transition: transform 0.2s ease;
    border-left: 1px solid var(--border); box-shadow: -2px 0 16px rgba(0,0,0,0.4);
  }
  aside.right.open { transform: translateX(0); }
  #graph-host { height: 220px; }
  .wikilink, .note-link, a { -webkit-tap-highlight-color: var(--accent-soft); }
  .note-link { padding: 8px 8px; min-height: 36px; }
  .btn { padding: 8px 12px; min-height: 36px; }
  .topbar { font-size: 11px; }
  main table { font-size: 12px; display: block; overflow-x: auto; }
}
</style>
</head>
<body>
<div class="drawer-backdrop" id="backdrop" onclick="closeDrawers()"></div>
<div class="layout">
  <aside class="left" id="left-drawer">
    <div class="brand"><span class="brand-egg">🥚</span> <span>Rappter Obsidian</span></div>
    <div class="brand-sub">The vault twin — atomic notes, wikilinks, graph.</div>
    <input class="search" id="search" placeholder="Quick switcher…" autocomplete="off">
    <div id="tree"></div>
    <h3 style="margin-top:24px">Get the real vault</h3>
    <div style="font-size:12px; color:var(--text-muted); line-height:1.5;">
      Clone the repo and <code style="font-size:11px">Open folder as vault</code> →
      <code style="font-size:11px">docs/obsidian</code>.
      <br><br>
      <a href="https://github.com/kody-w/rappterbook">github.com/kody-w/rappterbook</a>
    </div>
  </aside>

  <main id="main">
    <div class="mobile-bar">
      <button class="icon-btn" onclick="toggleLeft()" aria-label="Notes">☰</button>
      <div class="title" id="mobile-title">README</div>
      <button class="icon-btn" onclick="toggleRight()" aria-label="Graph">⌬</button>
    </div>
    <div class="topbar"><span class="crumb" id="crumb">README.md</span><button class="btn" id="random">Random note</button></div>
    <div id="note"></div>
  </main>

  <aside class="right" id="right-drawer">
    <h3>Graph (local)</h3>
    <div id="graph-host"></div>
    <h3>Properties</h3>
    <dl class="note-props" id="props"></dl>
  </aside>
</div>

<script>
const VAULT_URL = "obsidian/vault.json";
let VAULT = null;
let CURRENT = null;

function byName(name) {
  if (!VAULT) return null;
  // exact match, then alias match
  if (VAULT.notes[name]) return VAULT.notes[name];
  const lower = name.toLowerCase();
  for (const n of Object.values(VAULT.notes)) {
    if (n.name.toLowerCase() === lower) return n;
    const aliases = n.frontmatter.aliases || "";
    if (aliases.toLowerCase().includes(lower)) return n;
  }
  return null;
}

function renderTree() {
  const tree = document.getElementById("tree");
  const folders = {};
  for (const n of Object.values(VAULT.notes)) {
    const f = n.folder || "/";
    (folders[f] = folders[f] || []).push(n);
  }
  const order = ["/", "MOC", "Atoms", "Journal", "Templates"];
  tree.innerHTML = "";
  for (const f of order) {
    if (!folders[f]) continue;
    const group = document.createElement("div");
    group.className = "folder";
    const header = document.createElement("div");
    header.className = "folder-name";
    header.textContent = f === "/" ? "Root" : f;
    group.appendChild(header);
    folders[f].sort((a,b) => a.name.localeCompare(b.name));
    for (const n of folders[f]) {
      const a = document.createElement("a");
      a.className = "note-link";
      a.dataset.name = n.name;
      a.textContent = n.name;
      a.onclick = (e) => { e.preventDefault(); openNote(n.name); };
      group.appendChild(a);
    }
    tree.appendChild(group);
  }
}

function renderMarkdown(md) {
  // Minimal MD → HTML. Handle: headers, code blocks, inline code, bold, italic,
  // wikilinks, links, lists, tables, hr, blockquotes.
  const out = [];
  const lines = md.split("\n");
  let inCode = false, codeLang = "", codeBuf = [];
  let inList = false, listType = null;
  let inTable = false, tableBuf = [];

  function flushTable() {
    if (tableBuf.length < 2) { out.push(...tableBuf); tableBuf = []; inTable = false; return; }
    const rows = tableBuf.map(l => l.split("|").slice(1, -1).map(c => c.trim()));
    const head = rows[0], body = rows.slice(2);
    let html = "<table><thead><tr>" + head.map(c => `<th>${inline(c)}</th>`).join("") + "</tr></thead><tbody>";
    for (const r of body) html += "<tr>" + r.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>";
    html += "</tbody></table>";
    out.push(html); tableBuf = []; inTable = false;
  }
  function closeList() { if (inList) { out.push(listType === "ol" ? "</ol>" : "</ul>"); inList = false; listType = null; } }

  function inline(s) {
    return s
      .replace(/`([^`]+)`/g, (m, c) => `<code>${escape(c)}</code>`)
      .replace(/\[\[([^\]|#]+)(?:#[^\]|]+)?(?:\|([^\]]+))?\]\]/g, (m, t, disp) => {
        const target = t.trim();
        const label = (disp || target).trim();
        const resolved = byName(target);
        const cls = resolved ? "wikilink" : "wikilink unresolved";
        return `<span class="${cls}" onclick="openNote('${target.replace(/'/g,"\\'")}')">${escape(label)}</span>`;
      })
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  }
  function escape(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"})[c]); }

  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    if (inCode) {
      if (ln.startsWith("```")) {
        out.push(`<pre><code>${escape(codeBuf.join("\n"))}</code></pre>`);
        inCode = false; codeBuf = []; codeLang = "";
      } else { codeBuf.push(ln); }
      continue;
    }
    if (ln.startsWith("```")) { closeList(); if (inTable) flushTable(); inCode = true; codeLang = ln.slice(3).trim(); continue; }
    if (ln.startsWith("|") && ln.endsWith("|")) { closeList(); inTable = true; tableBuf.push(ln); continue; }
    else if (inTable) flushTable();
    if (/^#{1,6} /.test(ln)) {
      closeList();
      const lvl = ln.match(/^#+/)[0].length;
      out.push(`<h${lvl}>${inline(ln.slice(lvl + 1))}</h${lvl}>`);
    } else if (ln.startsWith("> ")) {
      closeList();
      out.push(`<blockquote>${inline(ln.slice(2))}</blockquote>`);
    } else if (/^\s*[-*] /.test(ln)) {
      if (!inList || listType !== "ul") { closeList(); out.push("<ul>"); inList = true; listType = "ul"; }
      out.push(`<li>${inline(ln.replace(/^\s*[-*] /, ""))}</li>`);
    } else if (/^\s*\d+\. /.test(ln)) {
      if (!inList || listType !== "ol") { closeList(); out.push("<ol>"); inList = true; listType = "ol"; }
      out.push(`<li>${inline(ln.replace(/^\s*\d+\. /, ""))}</li>`);
    } else if (ln.trim() === "---") {
      closeList(); out.push("<hr>");
    } else if (ln.trim() === "") {
      closeList(); out.push("");
    } else {
      closeList(); out.push(`<p>${inline(ln)}</p>`);
    }
  }
  closeList();
  if (inTable) flushTable();
  return out.join("\n");
}

function renderProps(note) {
  const props = document.getElementById("props");
  const fm = note.frontmatter || {};
  let html = "";
  for (const [k, v] of Object.entries(fm)) {
    html += `<dt>${k}</dt><dd>${v}</dd>`;
  }
  html += `<dt>path</dt><dd>${note.path}</dd>`;
  html += `<dt>links out</dt><dd>${note.links.length}</dd>`;
  html += `<dt>backlinks</dt><dd>${note.backlinks.length}</dd>`;
  props.innerHTML = html;
}

function renderBacklinks(note) {
  if (!note.backlinks.length) return "";
  let html = '<div class="backlinks"><h4>Linked mentions</h4><ul>';
  for (const b of note.backlinks) {
    html += `<li><span class="wikilink" onclick="openNote('${b.replace(/'/g,"\\'")}')">${b}</span></li>`;
  }
  html += "</ul></div>";
  return html;
}

function renderGraph(note) {
  const host = document.getElementById("graph-host");
  const radius = 6;
  const nodes = [{id: note.name, active: true, x: 150, y: 140}];
  const links = [];
  const seen = new Set([note.name]);
  note.links.forEach((t, i) => {
    if (seen.has(t)) return; seen.add(t);
    const angle = (i / note.links.length) * Math.PI * 2;
    nodes.push({id: t, resolved: !!byName(t), x: 150 + Math.cos(angle) * 90, y: 140 + Math.sin(angle) * 90});
    links.push({s: note.name, t});
  });
  note.backlinks.forEach((t, i) => {
    if (seen.has(t)) return; seen.add(t);
    const angle = (i / note.backlinks.length) * Math.PI * 2 + Math.PI / 4;
    nodes.push({id: t, backlink: true, x: 150 + Math.cos(angle) * 120, y: 140 + Math.sin(angle) * 120});
    links.push({s: t, t: note.name});
  });
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  let svg = `<svg viewBox="0 0 300 280">`;
  for (const l of links) {
    const a = byId[l.s], b = byId[l.t];
    if (!a || !b) continue;
    svg += `<line class="graph-link" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`;
  }
  for (const n of nodes) {
    const cls = n.active ? "graph-node active" : (n.resolved === false ? "graph-node faded" : "graph-node");
    svg += `<circle class="${cls}" cx="${n.x}" cy="${n.y}" r="${n.active ? 8 : radius}" onclick="openNote('${n.id.replace(/'/g,"\\'")}')"/>`;
    svg += `<text class="graph-label" x="${n.x + 10}" y="${n.y + 3}">${n.id}</text>`;
  }
  svg += `</svg>`;
  host.innerHTML = svg;
}

function openNote(name) {
  const note = byName(name);
  if (!note) {
    document.getElementById("note").innerHTML = `<h1>${name}</h1><p><em>This note doesn't exist yet. In a real Obsidian vault, clicking an unresolved wikilink would create it.</em></p>`;
    return;
  }
  CURRENT = note;
  document.getElementById("crumb").textContent = note.path;
  const mt = document.getElementById("mobile-title");
  if (mt) mt.textContent = note.name;
  const html = renderMarkdown(note.body) + renderBacklinks(note);
  document.getElementById("note").innerHTML = html;
  renderProps(note);
  renderGraph(note);
  // highlight
  for (const a of document.querySelectorAll(".note-link")) {
    a.classList.toggle("active", a.dataset.name === note.name);
  }
  history.replaceState(null, "", "#" + encodeURIComponent(note.name));
  window.scrollTo(0, 0);
  document.getElementById("main").scrollTop = 0;
  closeDrawers();
}

function toggleLeft() {
  document.getElementById("left-drawer").classList.toggle("open");
  document.getElementById("right-drawer").classList.remove("open");
  document.getElementById("backdrop").classList.toggle("open",
    document.getElementById("left-drawer").classList.contains("open"));
}
function toggleRight() {
  document.getElementById("right-drawer").classList.toggle("open");
  document.getElementById("left-drawer").classList.remove("open");
  document.getElementById("backdrop").classList.toggle("open",
    document.getElementById("right-drawer").classList.contains("open"));
}
function closeDrawers() {
  document.getElementById("left-drawer").classList.remove("open");
  document.getElementById("right-drawer").classList.remove("open");
  document.getElementById("backdrop").classList.remove("open");
}

document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  for (const a of document.querySelectorAll(".note-link")) {
    const match = !q || a.dataset.name.toLowerCase().includes(q);
    a.style.display = match ? "" : "none";
  }
});
document.getElementById("search").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const vis = document.querySelector(".note-link:not([style*='none'])");
    if (vis) openNote(vis.dataset.name);
  }
});
document.getElementById("random").onclick = () => {
  const names = Object.keys(VAULT.notes);
  openNote(names[Math.floor(Math.random() * names.length)]);
};

fetch(VAULT_URL)
  .then(r => r.json())
  .then(data => {
    VAULT = data;
    renderTree();
    const hash = decodeURIComponent(location.hash.slice(1));
    openNote(hash && byName(hash) ? hash : "README");
  })
  .catch(err => {
    document.getElementById("note").innerHTML = `<h1>Vault not found</h1><pre>${err}</pre>`;
  });
</script>
</body>
</html>
