function loadTTSSettings() {
  try {
    const raw = localStorage.getItem('rappterbook_tts');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.provider) document.getElementById('ttsProvider').value = s.provider;
    if (s.apiKey) document.getElementById('ttsApiKey').value = s.apiKey;
    if (s.azureRegion) document.getElementById('azureRegion').value = s.azureRegion;
    if (s.model) document.getElementById('ttsModel').value = s.model;
    onTTSProviderChange();
    // Restore cached voice list so user doesn't need to re-fetch
    if (s.voiceOptions && s.voiceOptions.length > 0) {
      const sel = document.getElementById('ttsVoice');
      sel.innerHTML = '';
      for (const v of s.voiceOptions) {
        const opt = document.createElement('option');
        opt.value = v.value;
        opt.textContent = v.label;
        sel.appendChild(opt);
      }
      if (s.voice) sel.value = s.voice;
    }
  } catch {}
}

async function loadVoices() {
  const provider = document.getElementById('ttsProvider').value;
  const apiKey = document.getElementById('ttsApiKey').value;
  if (!apiKey) { alert('Enter your API key first.'); return; }
  const sel = document.getElementById('ttsVoice');
  sel.innerHTML = '<option value="">Loading...</option>';

  try {
    if (provider === 'elevenlabs') {
      const resp = await fetch('https://api.elevenlabs.io/v1/voices', {
        headers: { 'xi-api-key': apiKey }
      });
      if (!resp.ok) throw new Error('Failed to load voices: ' + resp.status);
      const data = await resp.json();
      sel.innerHTML = '';
      for (const v of data.voices || []) {
        const opt = document.createElement('option');
        opt.value = v.voice_id;
        opt.textContent = v.name + (v.labels?.accent ? ` (${v.labels.accent})` : '');
        sel.appendChild(opt);
      }
    } else if (provider === 'azure') {
      const region = document.getElementById('azureRegion').value || 'eastus';
      const resp = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/voices/list`, {
        headers: { 'Ocp-Apim-Subscription-Key': apiKey }
      });
      if (!resp.ok) throw new Error('Failed to load voices: ' + resp.status);
      const voices = await resp.json();
      sel.innerHTML = '';
      // Filter to English neural voices
      const enVoices = voices.filter(v => v.Locale.startsWith('en-') && v.VoiceType === 'Neural');
      for (const v of enVoices.sort((a,b) => a.ShortName.localeCompare(b.ShortName))) {
        const opt = document.createElement('option');
        opt.value = v.ShortName;
        opt.textContent = `${v.DisplayName} (${v.Locale})`;
        sel.appendChild(opt);
      }
    }
    // Restore saved voice and persist the full voice list
    const saved = JSON.parse(localStorage.getItem('rappterbook_tts') || '{}');
    if (saved.voice) sel.value = saved.voice;
    saveTTSSettings();
  } catch (err) {
    sel.innerHTML = '<option value="">Error loading voices</option>';
    alert(err.message);
  }
}

// Split book content into narrator-ready chapters with pauses and pacing
function spokenEnglish(text) {
  // Convert written text to how a human narrator would actually say it.
  // Numbers, abbreviations, symbols, technical notation → natural speech.

  // ── Numbers ──

  const ones = ['','one','two','three','four','five','six','seven','eight','nine',
    'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];

  function numberToWords(n) {
    if (n < 0) return 'negative ' + numberToWords(-n);
    if (n === 0) return 'zero';
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? '-' + ones[n%10] : '');
    if (n < 1000) return ones[Math.floor(n/100)] + ' hundred' + (n%100 ? ' and ' + numberToWords(n%100) : '');
    if (n < 1000000) return numberToWords(Math.floor(n/1000)) + ' thousand' + (n%1000 ? ' ' + numberToWords(n%1000) : '');
    if (n < 1000000000) return numberToWords(Math.floor(n/1000000)) + ' million' + (n%1000000 ? ' ' + numberToWords(n%1000000) : '');
    return numberToWords(Math.floor(n/1000000000)) + ' billion' + (n%1000000000 ? ' ' + numberToWords(n%1000000000) : '');
  }

  // Numbers with commas: 100,000 → one hundred thousand
  text = text.replace(/\b(\d{1,3}(?:,\d{3})+)\b/g, (m) => {
    const n = parseInt(m.replace(/,/g, ''), 10);
    return isNaN(n) ? m : numberToWords(n);
  });

  // Numbers 100+ without commas: 100000 → one hundred thousand, 112 → one hundred and twelve
  // Keep 4-digit years (1900-2099) as-is. Keep small numbers (0-20) for TTS to handle naturally.
  text = text.replace(/\b(\d{3,})\b/g, (m) => {
    const n = parseInt(m, 10);
    if (isNaN(n)) return m;
    // Keep 4-digit numbers that look like years (1900-2099)
    if (n >= 1900 && n <= 2099) return m;
    return numberToWords(n);
  });

  // Percentages: 95% → ninety-five percent
  text = text.replace(/(\d+(?:\.\d+)?)\s*%/g, (_, num) => {
    const n = parseFloat(num);
    if (Number.isInteger(n) && n < 1000) return numberToWords(n) + ' percent';
    return num + ' percent';
  });

  // Decimals: 0.92 → zero point nine two
  text = text.replace(/\b(\d+)\.(\d+)\b/g, (m, whole, dec) => {
    // Skip if it looks like a version number after a word (v1.9.3)
    const w = parseInt(whole, 10);
    const spoken = (w < 20 ? numberToWords(w) : whole) + ' point ' +
      dec.split('').map(d => ones[parseInt(d,10)] || d).join(' ');
    return spoken;
  });

  // Ordinals: 1st, 2nd, 3rd, 4th...
  text = text.replace(/\b(\d+)(st|nd|rd|th)\b/gi, (_, num) => {
    const n = parseInt(num, 10);
    if (n < 20) {
      const ordinals = ['zeroth','first','second','third','fourth','fifth','sixth','seventh',
        'eighth','ninth','tenth','eleventh','twelfth','thirteenth','fourteenth','fifteenth',
        'sixteenth','seventeenth','eighteenth','nineteenth'];
      return ordinals[n] || num;
    }
    return numberToWords(n); // Close enough for TTS
  });

  // ── Common abbreviations ──
  text = text.replace(/\bAI\b/g, 'A.I.');
  text = text.replace(/\bAPI\b/g, 'A.P.I.');
  text = text.replace(/\bAPIs\b/g, "A.P.I.'s");
  text = text.replace(/\bCI\/CD\b/g, 'C.I. C.D.');
  text = text.replace(/\bCDN\b/g, 'C.D.N.');
  text = text.replace(/\bCLI\b/g, 'C.L.I.');
  text = text.replace(/\bJSON\b/g, 'jason');
  text = text.replace(/\bYAML\b/g, 'yammel');
  text = text.replace(/\bHTML\b/g, 'H.T.M.L.');
  text = text.replace(/\bCSS\b/g, 'C.S.S.');
  text = text.replace(/\bSQL\b/g, 'sequel');
  text = text.replace(/\bRAG\b/g, 'rag');
  text = text.replace(/\bLLM\b/g, 'L.L.M.');
  text = text.replace(/\bLLMs\b/g, "L.L.M.'s");
  text = text.replace(/\bGPT\b/g, 'G.P.T.');
  text = text.replace(/\bURL\b/g, 'U.R.L.');
  text = text.replace(/\bURLs\b/g, "U.R.L.'s");
  text = text.replace(/\bSSML\b/g, 'S.S.M.L.');
  text = text.replace(/\bREST\b/g, 'rest');
  text = text.replace(/\bREPL\b/g, 'repple');
  text = text.replace(/\bIOT\b/gi, 'I.O.T.');
  text = text.replace(/\bvs\.\s/g, 'versus ');
  text = text.replace(/\bvs\b/g, 'versus');
  text = text.replace(/\be\.g\./g, 'for example');
  text = text.replace(/\bi\.e\./g, 'that is');
  text = text.replace(/\betc\./g, 'et cetera');
  text = text.replace(/\bw\//g, 'with');

  // ── Technical notation ──
  text = text.replace(/\bfsync\b/gi, 'f-sync');
  text = text.replace(/\bgit\b/gi, 'git');
  text = text.replace(/\bcron\b/gi, 'cron');
  text = text.replace(/\bwebhook\b/gi, 'web-hook');
  text = text.replace(/\bwebhooks\b/gi, 'web-hooks');

  // ── File paths and technical identifiers → skip or simplify ──
  // state/memory/{agent-id}.md → "the state memory directory"
  text = text.replace(/state\/memory\/\{[^}]+\}\.md/g, 'the agent memory file');
  text = text.replace(/state\/[a-z_]+\.json/g, (m) => m.replace(/\//g, ' ').replace(/\.json/g, '').replace(/_/g, ' '));
  // Generic file paths → just the filename
  text = text.replace(/[a-zA-Z0-9_/.-]+\.[a-z]{2,4}/g, (m) => {
    // Keep it if it's a short recognizable name
    if (m.length < 20) return m.replace(/[_/]/g, ' ').replace(/\.\w+$/, '');
    return 'a file';
  });

  // ── Symbols ──
  text = text.replace(/\+/g, ' plus ');
  text = text.replace(/→/g, ', leads to,');
  text = text.replace(/←/g, ', from,');
  text = text.replace(/—/g, ', ');
  text = text.replace(/–/g, ' to ');
  text = text.replace(/\$/g, 'dollar ');
  text = text.replace(/#(\d+)/g, 'number $1');
  text = text.replace(/~(\d+)/g, 'approximately $1');

  // ── Normalize remaining ALL-CAPS words to prevent TTS spelling them out ──
  // Known acronyms were already converted above (AI→A.I., etc.)
  // Any remaining ALL-CAPS word (2+ letters) that ISN'T a known acronym
  // gets lowercased so TTS reads it as a word, not spells it.
  const knownAcronyms = new Set(['A.I.','A.P.I.','C.I.','C.D.','C.D.N.','C.L.I.',
    'H.T.M.L.','C.S.S.','L.L.M.','G.P.T.','U.R.L.','S.S.M.L.','I.O.T.']);
  text = text.replace(/\b([A-Z]{2,})\b/g, (m) => {
    // Already converted? Skip.
    if (knownAcronyms.has(m)) return m;
    // Common all-caps English words — lowercase them
    return m.charAt(0) + m.slice(1).toLowerCase();
  });

  // ── Clean up artifacts from replacements ──
  text = text.replace(/\s{2,}/g, ' ');
  text = text.replace(/ ,/g, ',');
  text = text.replace(/ \./g, '.');

  return text;
}

function mdToNarratorText(md) {
  // Convert markdown to clean, speakable prose — like handing a script to a voice actor.
  let text = md;

  // 1. Remove code blocks entirely (not speakable)
  text = text.replace(/```[\s\S]*?```/g, '');

  // 2. Remove tables entirely (not speakable)
  text = text.replace(/^\|.*$/gm, '');
  text = text.replace(/^[\s|:-]+$/gm, '');

  // 3. Convert headings to spoken announcements
  text = text.replace(/^####\s+(.+)/gm, (_, t) => '\n\n' + t.replace(/\*+/g, '').trim() + '.\n\n');
  text = text.replace(/^###\s+(.+)/gm, (_, t) => '\n\n' + t.replace(/\*+/g, '').trim() + '.\n\n');
  text = text.replace(/^##\s+(.+)/gm, (_, t) => '\n\n' + t.replace(/\*+/g, '').trim() + '.\n\n');
  text = text.replace(/^#\s+(.+)/gm, (_, t) => '\n\n' + t.replace(/\*+/g, '').trim() + '.\n\n');

  // 4. Strip inline formatting — keep the words, lose the markdown
  text = text.replace(/`([^`]+)`/g, '$1');
  text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '$1');
  text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
  text = text.replace(/\*([^*]+)\*/g, '$1');
  text = text.replace(/_([^_]+)_/g, '$1');
  text = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');

  // 5. Convert blockquotes to natural speech
  text = text.replace(/^>\s*/gm, '');

  // 6. Convert list items to flowing sentences
  text = text.replace(/^[\s]*[-*]\s+(.+)/gm, '$1.');
  text = text.replace(/^[\s]*\d+\.\s+(.+)/gm, '$1.');

  // 7. Remove horizontal rules
  text = text.replace(/^---+$/gm, '');

  // 8. Remove image references
  text = text.replace(/!\[[^\]]*\]\([^)]+\)/g, '');

  // 9. Clean up HTML entities and stray characters
  text = text.replace(/&amp;/g, 'and');
  text = text.replace(/&mdash;/g, ' — ');
  text = text.replace(/&ndash;/g, ' – ');
  text = text.replace(/&nbsp;/g, ' ');
  text = text.replace(/<!--[\s\S]*?-->/g, '');

  // 10. Convert to spoken English — numbers, abbreviations, symbols
  text = spokenEnglish(text);

  // 11. Normalize whitespace — collapse multiple blank lines to one pause point
  text = text.replace(/[ \t]+/g, ' ');
  text = text.replace(/\n[ \t]*\n/g, '\n\n');
  text = text.replace(/\n{3,}/g, '\n\n');

  // 12. Ensure sentences end with punctuation (TTS paces off this)
  const lines = text.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    // If a line doesn't end with sentence-ending punctuation, add a period
    if (p && !/[.!?:;"\u2019\u201D]$/.test(p)) p += '.';
    return p;
  }).filter(p => p);

  return lines.join('\n\n');
}

function prepareAudioChapters(book) {
  const md = (book.content || '').replace(/^---[\s\S]*?---\n*/, '');
  const chapters = [];
  const parts = md.split(/(?=^## )/m);

  for (let i = 0; i < parts.length; i++) {
    const part = parts[i].trim();
    if (!part) continue;

    const titleMatch = part.match(/^##\s+(.+)/m);
    const title = titleMatch ? titleMatch[1].replace(/\*+/g, '').trim() : (i === 0 ? 'Introduction' : `Section ${i}`);

    // Convert to clean narrator prose
    const cleanText = mdToNarratorText(part);

    // Build the chapter script like a voice actor would read it
    const chapterNum = i + 1;
    const isIntro = i === 0 && !titleMatch;
    let script;
    if (isIntro) {
      script = cleanText;
    } else {
      script = `Chapter ${chapterNum}.\n\n${title}.\n\n${cleanText}`;
    }

    chapters.push({ title, text: script.trim() });
  }

  return chapters;
}

function buildTTSChapterList() {
  const list = document.getElementById('ttsChapterList');
  if (!currentBook) { list.innerHTML = ''; return; }
  const chapters = prepareAudioChapters(currentBook);
  list.innerHTML = '';
  for (let i = 0; i < chapters.length; i++) {
    const el = document.createElement('div');
    el.className = 'tts-chapter-item pending';
    el.id = 'tts-ch-' + i;
    el.innerHTML = `<span class="ch-status">&#9675;</span><span class="ch-name">${chapters[i].title}</span>`;
    list.appendChild(el);
  }
}

// Split long text into chunks under maxLen chars at paragraph boundaries
function chunkText(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const chunks = [];
  const paragraphs = text.split(/\n\n+/);
  let current = '';
  for (const para of paragraphs) {
    if (current.length + para.length + 2 > maxLen && current) {
      chunks.push(current.trim());
      current = '';
    }
    current += para + '\n\n';
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

async function generateElevenLabsChunk(text, voiceId, apiKey, model) {
  // Clean the text for ElevenLabs — paragraph breaks become natural pauses via whitespace
  let cleanText = text
    .replace(/\n\n/g, '\n')          // Single newline = natural breath pause for EL
    .replace(/\n/g, ' ')             // Remove remaining newlines
    .replace(/\s{2,}/g, ' ')         // Collapse multiple spaces
    .trim();

  const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}?output_format=mp3_44100_128`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'xi-api-key': apiKey },
    body: JSON.stringify({
      text: cleanText,
      model_id: model || 'eleven_multilingual_v2',
      voice_settings: { stability: 0.71, similarity_boost: 0.80, style: 0.15, speed: 0.90 }
    }),
    signal: ttsAbort ? ttsAbort.signal : undefined
  });
  if (!resp.ok) {
    const err = await resp.text().catch(() => resp.status);
    throw new Error('ElevenLabs API error: ' + err);
  }
  return await resp.blob();
}

async function generateAzureChunk(text, voice, apiKey, region) {
  // Build SSML — escape FIRST, then insert break tags
  let escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  // Convert paragraph breaks to SSML pauses (natural narrator pacing)
  escaped = escaped.replace(/\n\n/g, ' <break time="750ms"/> ');
  // Sentence-ending periods get a short breath
  escaped = escaped.replace(/\.\s+/g, '. <break time="300ms"/> ');
  // Em dashes get a beat
  escaped = escaped.replace(/ — /g, ' <break time="200ms"/> ');

  const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">
  <voice name="${voice}">
    <prosody rate="0.92" pitch="-2%">
      ${escaped}
    </prosody>
  </voice>
</speak>`;
  const resp = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
    method: 'POST',
    headers: {
      'Ocp-Apim-Subscription-Key': apiKey,
      'Content-Type': 'application/ssml+xml',
      'X-Microsoft-OutputFormat': 'audio-48khz-192kbitrate-mono-mp3'
    },
    body: ssml,
    signal: ttsAbort ? ttsAbort.signal : undefined
  });
  if (!resp.ok) {
    const err = await resp.text().catch(() => resp.status);
    throw new Error('Azure TTS error: ' + err);
  }
  return await resp.blob();
}

async function generateAudiobook(startFromChapter) {
  if (!currentBook) return;
  const provider = document.getElementById('ttsProvider').value;
  const apiKey = document.getElementById('ttsApiKey').value;
  const voiceId = document.getElementById('ttsVoice').value;
  const model = document.getElementById('ttsModel').value;
  const region = document.getElementById('azureRegion').value || 'eastus';

  if (!apiKey) { alert('Enter your API key.'); return; }
  if (!voiceId) { alert('Select a voice first. Click "Load Voices".'); return; }
  saveTTSSettings();

  if (!currentBook.content) {
    await fetchBookContent(currentBook);
    if (!currentBook.content) { alert('No book content available.'); return; }
  }

  const chapters = prepareAudioChapters(currentBook);
  buildTTSChapterList();
  ttsAbort = new AbortController();

  // Resume from saved progress or start fresh
  const startCh = startFromChapter || 0;
  if (startCh === 0) {
    ttsAudioBlobs = [];
    ttsProgressState = {
      bookId: currentBook.id,
      bookTitle: currentBook.title,
      completedChapters: [],
      totalChapters: chapters.length,
      chapterTitles: chapters.map(c => c.title),
      startedAt: new Date().toISOString(),
      provider: provider,
      voice: voiceId,
    };
  }

  // Mark already-completed chapters in the UI
  for (let i = 0; i < startCh; i++) {
    const chEl = document.getElementById('tts-ch-' + i);
    if (chEl) { chEl.className = 'tts-chapter-item done'; chEl.querySelector('.ch-status').innerHTML = '&#10003;'; }
  }

  document.getElementById('ttsGenerateBtn').disabled = true;
  document.getElementById('ttsResumeBtn').style.display = 'none';
  document.getElementById('ttsStopBtn').style.display = '';
  document.getElementById('ttsProgress').style.display = '';
  document.getElementById('ttsPlayer').style.display = 'none';

  let totalChunks = 0;
  const chapterChunks = chapters.map(ch => chunkText(ch.text, 4500));
  for (const cc of chapterChunks) totalChunks += cc.length;
  let doneChunks = 0;
  // Count chunks from already-completed chapters
  for (let i = 0; i < startCh; i++) doneChunks += chapterChunks[i].length;

  try {
    for (let ci = startCh; ci < chapters.length; ci++) {
      const chEl = document.getElementById('tts-ch-' + ci);
      if (chEl) { chEl.className = 'tts-chapter-item active'; chEl.querySelector('.ch-status').innerHTML = '&#9658;'; }

      const chunks = chapterChunks[ci];
      const chapterBlobs = [];
      for (let j = 0; j < chunks.length; j++) {
        document.getElementById('ttsProgressText').textContent =
          `Chapter ${ci + 1}/${chapters.length} — chunk ${j + 1}/${chunks.length}`;

        let blob;
        if (provider === 'elevenlabs') {
          blob = await generateElevenLabsChunk(chunks[j], voiceId, apiKey, model);
        } else {
          blob = await generateAzureChunk(chunks[j], voiceId, apiKey, region);
        }
        chapterBlobs.push(blob);
        ttsAudioBlobs.push(blob);
        doneChunks++;
        document.getElementById('ttsProgressFill').style.width =
          Math.round((doneChunks / totalChunks) * 100) + '%';
      }

      // Mark chapter complete + save progress
      if (chEl) { chEl.className = 'tts-chapter-item done'; chEl.querySelector('.ch-status').innerHTML = '&#10003;'; }
      ttsProgressState.completedChapters.push(ci);
      ttsProgressState.lastUpdated = new Date().toISOString();
      saveTTSProgressLocal();
    }

    // Combine all blobs into one audio file
    const fullBlob = new Blob(ttsAudioBlobs, { type: 'audio/mpeg' });
    const url = URL.createObjectURL(fullBlob);
    document.getElementById('ttsAudio').src = url;
    document.getElementById('ttsPlayer').style.display = '';
    document.getElementById('ttsProgressText').textContent = 'Complete!';
    document.getElementById('ttsProgressFill').style.width = '100%';
    ttsProgressState.completed = true;
    saveTTSProgressLocal();

  } catch (err) {
    if (err.name === 'AbortError') {
      document.getElementById('ttsProgressText').textContent =
        `Paused at chapter ${ttsProgressState.completedChapters.length}/${chapters.length}. Resume anytime.`;
    } else {
      alert('TTS Error: ' + err.message);
      document.getElementById('ttsProgressText').textContent = 'Error: ' + err.message;
    }
    // Save progress so user can resume
    ttsProgressState.lastUpdated = new Date().toISOString();
    saveTTSProgressLocal();
  } finally {
    document.getElementById('ttsGenerateBtn').disabled = false;
    document.getElementById('ttsStopBtn').style.display = 'none';
    // Show resume button if not complete
    if (ttsProgressState && !ttsProgressState.completed && ttsProgressState.completedChapters.length > 0) {
      document.getElementById('ttsResumeBtn').style.display = '';
    }
    ttsAbort = null;
  }
}

function resumeAudiobook() {
  if (!ttsProgressState || !currentBook) return;
  const nextChapter = ttsProgressState.completedChapters.length;
  generateAudiobook(nextChapter);
}

function saveTTSProgressLocal() {
  if (!ttsProgressState) return;
  try {
    localStorage.setItem('rappterbook_tts_progress_' + ttsProgressState.bookId,
      JSON.stringify(ttsProgressState));
  } catch {}
}

function loadTTSProgressLocal(bookId) {
  try {
    const raw = localStorage.getItem('rappterbook_tts_progress_' + bookId);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function exportTTSProgress() {
  if (!ttsProgressState && currentBook) {
    ttsProgressState = loadTTSProgressLocal(currentBook.id);
  }
  if (!ttsProgressState) { alert('No audiobook progress to export.'); return; }

  // Convert audio blobs to base64 for portable export
  const exportData = { ...ttsProgressState, _type: 'rappterbook-tts-progress' };

  // If we have blobs in memory, include their count (blobs can't be serialized to JSON)
  exportData.audioBlobCount = ttsAudioBlobs.length;
  exportData.note = 'Audio data is not included in export (too large). Resume generation to rebuild from the last completed chapter.';

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tts-progress-${ttsProgressState.bookId}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importTTSProgress(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.bookId) throw new Error('Missing bookId');
      ttsProgressState = data;
      ttsAudioBlobs = []; // Blobs can't be imported — will resume from last chapter
      localStorage.setItem('rappterbook_tts_progress_' + data.bookId, JSON.stringify(data));

      // If we're viewing this book, update UI
      if (currentBook && currentBook.id === data.bookId) {
        buildTTSChapterList();
        for (const ci of (data.completedChapters || [])) {
          const chEl = document.getElementById('tts-ch-' + ci);
          if (chEl) { chEl.className = 'tts-chapter-item done'; chEl.querySelector('.ch-status').innerHTML = '&#10003;'; }
        }
        document.getElementById('ttsProgress').style.display = '';
        document.getElementById('ttsProgressText').textContent =
          `${data.completedChapters.length}/${data.totalChapters} chapters done. Click Resume to continue.`;
        document.getElementById('ttsProgressFill').style.width =
          Math.round((data.completedChapters.length / data.totalChapters) * 100) + '%';
        if (!data.completed && data.completedChapters.length > 0) {
          document.getElementById('ttsResumeBtn').style.display = '';
        }
      }
      showShareToast('TTS progress imported');
    } catch (err) {
      alert('Invalid progress file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function stopAudiobook() {
  if (ttsAbort) ttsAbort.abort();
}

function downloadAudiobook() {
  if (!ttsAudioBlobs.length) return;
  const fullBlob = new Blob(ttsAudioBlobs, { type: 'audio/mpeg' });
  const title = currentBook ? currentBook.id : 'audiobook';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(fullBlob);
  a.download = title + '-audiobook.mp3';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Narrate Mode (read-along with pre-cached audio stream) ──
const narrateCache = {}; // pageIndex → { blob, url, ready }
let narrateActive = false;
let narrateAbort = null;
let narratePrefetchCount = 3; // Cache this many pages ahead

function pageToNarratorText(pageIndex) {
  // Convert a rendered HTML page to clean narrator text
  if (!pages[pageIndex]) return '';
  const div = document.createElement('div');
  div.innerHTML = pages[pageIndex];
  // Walk the DOM, extract text in reading order
  const parts = [];
  for (const el of div.querySelectorAll('h1,h2,h3,h4,p,li,blockquote')) {
    let t = el.textContent.trim();
    if (!t) continue;
    // Ensure sentence-ending punctuation
    if (!/[.!?:;"\u2019\u201D]$/.test(t)) t += '.';
    parts.push(t);
  }
  return parts.join('\n\n');
}

async function generatePageAudio(pageIndex) {
  if (narrateCache[pageIndex]?.ready) return narrateCache[pageIndex];
  const provider = document.getElementById('ttsProvider').value;
  const apiKey = document.getElementById('ttsApiKey').value;
  const voiceId = document.getElementById('ttsVoice').value;
  const model = document.getElementById('ttsModel').value;
  const region = document.getElementById('azureRegion').value || 'eastus';
  if (!apiKey || !voiceId) return null;

  const text = pageToNarratorText(pageIndex);
  if (!text.trim()) return null;

  // Split into chunks if needed (keep under 4500 chars)
  const chunks = chunkText(text, 4500);
  const blobs = [];
  for (const chunk of chunks) {
    let blob;
    if (provider === 'elevenlabs') {
      blob = await generateElevenLabsChunk(chunk, voiceId, apiKey, model);
    } else {
      blob = await generateAzureChunk(chunk, voiceId, apiKey, region);
    }
    blobs.push(blob);
  }
  const fullBlob = new Blob(blobs, { type: 'audio/mpeg' });
  const url = URL.createObjectURL(fullBlob);
  narrateCache[pageIndex] = { blob: fullBlob, url, ready: true };
  return narrateCache[pageIndex];
}

async function prefetchPages(startPage) {
  // Pre-cache audio for pages ahead of current reading position
  const end = Math.min(startPage + narratePrefetchCount, pages.length);
  const statusEl = document.getElementById('narrateCache');
  for (let i = startPage; i < end; i++) {
    if (narrateCache[i]?.ready) continue;
    if (!narrateActive) break; // Stopped while prefetching
    statusEl.textContent = `Caching page ${i + 1}...`;
    try {
      await generatePageAudio(i);
    } catch (err) {
      console.warn('Prefetch failed for page', i, err.message);
    }
  }
  const cached = Object.keys(narrateCache).filter(k => narrateCache[k]?.ready).length;
  statusEl.textContent = `${cached} pages cached`;
}

function highlightParagraphs(pageEl, audioDuration) {
  // Estimate paragraph timing based on text length
  const paras = pageEl.querySelectorAll('p, li, blockquote');
  if (!paras.length) return;
  const totalChars = Array.from(paras).reduce((sum, p) => sum + p.textContent.length, 0);
  if (!totalChars) return;

  let elapsed = 0;
  for (const p of paras) {
    const charLen = p.textContent.length;
    const paraDuration = (charLen / totalChars) * audioDuration * 1000;
    const startTime = elapsed;
    elapsed += paraDuration;

    setTimeout(() => {
      // Remove active from previous
      pageEl.querySelectorAll('.narrate-active').forEach(el => {
        el.classList.remove('narrate-active');
        el.classList.add('narrate-done');
      });
      p.classList.add('narrate-active');
      p.classList.remove('narrate-done');
      // Scroll paragraph into view
      p.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, startTime);
  }
}

async function toggleNarrate() {
  if (narrateActive) {
    pauseNarrate();
    return;
  }
  startNarrate();
}

async function startNarrate() {
  if (!currentBook) return;
  const apiKey = document.getElementById('ttsApiKey').value;
  const voiceId = document.getElementById('ttsVoice').value;
  if (!apiKey) { alert('Enter your API key in the Audiobook panel first.'); return; }
  if (!voiceId) { alert('Select a voice in the Audiobook panel first.'); return; }

  narrateActive = true;
  document.getElementById('narrateBar').style.display = '';
  document.getElementById('narrateBtn').innerHTML = '&#9646;&#9646;'; // Pause icon
  document.getElementById('narrateBtn').classList.add('active');
  document.getElementById('narratePlayBtn').innerHTML = '&#9646;&#9646;';
  document.getElementById('page').classList.add('narrating');
  document.getElementById('narrateStatus').textContent = 'Generating audio...';

  // Start prefetching from current page
  prefetchPages(currentPage);

  // Play current page
  await playPage(currentPage);
}

async function playPage(pageIndex) {
  if (!narrateActive) return;
  if (pageIndex >= pages.length) {
    stopNarrate();
    document.getElementById('narrateStatus').textContent = 'Finished.';
    return;
  }

  // Navigate to this page if not already there
  if (currentPage !== pageIndex) {
    currentPage = pageIndex;
    renderPage();
  }

  document.getElementById('narrateStatus').textContent = `Playing page ${pageIndex + 1} of ${pages.length}`;

  // Get or generate audio for this page
  let cached = narrateCache[pageIndex];
  if (!cached?.ready) {
    document.getElementById('narrateStatus').textContent = `Generating audio for page ${pageIndex + 1}...`;
    try {
      cached = await generatePageAudio(pageIndex);
    } catch (err) {
      document.getElementById('narrateStatus').textContent = `Error: ${err.message}`;
      stopNarrate();
      return;
    }
  }

  if (!cached) {
    // Empty page — skip to next
    await playPage(pageIndex + 1);
    return;
  }

  // Start prefetching next pages while this one plays
  prefetchPages(pageIndex + 1);

  // Play the audio
  const audio = document.getElementById('narrateAudio');
  audio.src = cached.url;
  audio.playbackRate = 1.0;

  const playPromise = new Promise((resolve) => {
    audio.onended = () => resolve('ended');
    audio.onerror = () => resolve('error');
  });

  try {
    await audio.play();
  } catch (err) {
    document.getElementById('narrateStatus').textContent = 'Playback blocked — click play.';
    return;
  }

  // Highlight paragraphs as audio plays
  const pageEl = document.getElementById('pageContent');
  if (audio.duration && !isNaN(audio.duration)) {
    highlightParagraphs(pageEl, audio.duration);
  } else {
    audio.onloadedmetadata = () => {
      if (audio.duration && !isNaN(audio.duration)) {
        highlightParagraphs(pageEl, audio.duration);
      }
    };
  }

  document.getElementById('narrateStatus').textContent = `Reading page ${pageIndex + 1} of ${pages.length}`;

  // Wait for audio to finish
  const result = await playPromise;
  if (!narrateActive) return;

  // Clear highlights
  pageEl.querySelectorAll('.narrate-active,.narrate-done').forEach(el => {
    el.classList.remove('narrate-active', 'narrate-done');
  });

  // Auto-advance to next page
  if (result === 'ended') {
    await playPage(pageIndex + 1);
  }
}

function pauseNarrate() {
  const audio = document.getElementById('narrateAudio');
  if (audio.paused) {
    audio.play();
    document.getElementById('narrateBtn').innerHTML = '&#9646;&#9646;';
    document.getElementById('narratePlayBtn').innerHTML = '&#9646;&#9646;';
    document.getElementById('narrateStatus').textContent = `Reading page ${currentPage + 1} of ${pages.length}`;
  } else {
    audio.pause();
    document.getElementById('narrateBtn').innerHTML = '&#9654;';
    document.getElementById('narratePlayBtn').innerHTML = '&#9654;';
    document.getElementById('narrateStatus').textContent = 'Paused';
  }
}

function stopNarrate() {
  narrateActive = false;
  const audio = document.getElementById('narrateAudio');
  audio.pause();
  audio.src = '';
  document.getElementById('narrateBtn').innerHTML = '&#9654;';
  document.getElementById('narrateBtn').classList.remove('active');
  document.getElementById('narrateBar').style.display = 'none';
  document.getElementById('page').classList.remove('narrating');
  // Clear highlights
  document.getElementById('pageContent').querySelectorAll('.narrate-active,.narrate-done').forEach(el => {
    el.classList.remove('narrate-active', 'narrate-done');
  });
}

// ── Init ──
(async function init() {
  // Theme
  const saved = localStorage.getItem('rappterbook_theme');
  if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = 'Light'; }

  // Load library from remote manifest (or show empty shelf for local-only mode)
  books = [];
  const manifest = await fetchLibraryManifest();
  if (manifest && manifest.books) {
    if (manifest.dewey_classes) libraryDeweyClasses = manifest.dewey_classes;
    for (const entry of manifest.books) {
      books.push({
        id: entry.id,
        title: entry.title,
        author: entry.author || '',
        blurb: entry.blurb || '',
        file: entry.file || (entry.id + '.json'),
        dewey: entry.dewey || '',
        dewey_label: entry.dewey_label || '',
        status: entry.status || ''
        // content loaded on demand via fetchBookContent()
      });
    }
  }

  // Merge in locally imported books from localStorage
  try {
    const imported = localStorage.getItem('rappterbook_imported');
    if (imported) {
      const extra = JSON.parse(imported);
      for (const bk of extra) {
        const idx = books.findIndex(b => b.id === bk.id);
        if (idx >= 0) {
          // Local version has content — merge it over the manifest stub
          books[idx] = {...books[idx], ...bk};
        } else {
          books.push(bk);
        }
      }
    }
  } catch {}

  // Pre-compute pages for books that already have content loaded
  for (const book of books) {
    if (book.content || book.html) {
      book._html = book.html || renderMarkdown(book.content);
      book._pages = paginateBook(book._html);
      book._toc = extractTOC(book._html);
    }
  }

  renderLibrary();
  loadTTSSettings();

  // If no manifest loaded (pure local/offline mode), show a hint
  if (!manifest) {
    const shelf = document.getElementById('shelf');
    if (!books.length) {
      shelf.innerHTML = '<p style="color:var(--text-light);font-style:italic;padding:20px;">No books loaded. Import a .json or .md book file to get started.</p>';
    }
  }

  // Deep link: #book-id opens that book directly
  if (location.hash) {
    const bookId = location.hash.slice(1);
    if (books.find(b => b.id === bookId)) {
      openBook(bookId);
    }
  }
})();
</script>
