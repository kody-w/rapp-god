name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
      - '!v*-bar'  # exclude menu bar tags (handled by release-bar.yml)

permissions:
  contents: write

jobs:
  # ── Validate ──
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: TypeScript — install, lint, test
        working-directory: typescript
        run: npm ci && npm run lint && npm test

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python — install and test
        working-directory: python
        run: pip install -e ".[dev]" && pytest tests/ -v

  # ── Generate changelog and create GitHub Release ──
  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v '\-bar' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Previous tag: $PREV_TAG"

          # Generate changelog grouped by type
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --grep='^feat' --no-merges)
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --grep='^fix' --no-merges)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other
            OTHER=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --no-merges | grep -v -E '^- (feat|fix)')
            if [ -n "$OTHER" ]; then
              echo "### 📦 Other"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
          } > /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          generate_release_notes: false

  # ── Publish to npm ──
  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install and build
        working-directory: typescript
        run: npm ci && npm run build

      - name: Publish to npm
        working-directory: typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true  # Don't fail release if npm publish fails
