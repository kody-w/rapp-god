name: Install Smoke Tests

on:
  workflow_call:
    inputs:
      release_artifact_name:
        description: Use the caller's already-built npm tarball
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths: &install-smoke-paths
      - 'install.sh'
      - 'docs/install.sh'
      - 'tests/install/**'
      - 'tests/test_install.sh'
      - 'typescript/package.json'
      - 'typescript/package-lock.json'
      - 'python/pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths: *install-smoke-paths

concurrency:
  group: install-smoke-${{ github.event_name }}-${{ github.event_name == 'workflow_call' && github.run_id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (install.sh functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run install.sh unit tests
        run: bash tests/test_install.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on install.sh
        run: shellcheck install.sh

  docs-sync:
    name: Verify docs/install.sh is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs/install.sh matches root install.sh
        run: diff install.sh docs/install.sh

  docker-smoke:
    name: Docker smoke test (npm method)
    runs-on: ubuntu-latest
    needs: [unit-tests, shellcheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build npm tarball
        if: inputs.release_artifact_name == ''
        run: cd typescript && npm install --no-fund --no-audit && npm run build && npm pack
      - name: Download already-built release tarball
        if: inputs.release_artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release_artifact_name }}
          path: release-dist
      - name: Copy artifacts to Docker context
        if: inputs.release_artifact_name == ''
        run: |
          cp install.sh tests/install/docker/smoke/install.sh
          cp typescript/openrappter-*.tgz tests/install/docker/smoke/
      - name: Copy release artifact to Docker context
        if: inputs.release_artifact_name != ''
        run: |
          cp install.sh tests/install/docker/smoke/install.sh
          cp release-dist/openrappter-*.tgz tests/install/docker/smoke/
      - name: Build and run smoke test
        run: docker build --no-cache -t openrappter-test-smoke tests/install/docker/smoke/

  docker-nonroot:
    name: Docker non-root test
    runs-on: ubuntu-latest
    needs: [unit-tests, shellcheck]
    steps:
      - uses: actions/checkout@v4
      - name: Copy install.sh to Docker context
        run: cp install.sh tests/install/docker/nonroot/install.sh
      - name: Build and run non-root test
        run: docker build --no-cache -t openrappter-test-nonroot tests/install/docker/nonroot/

  docker-git:
    name: Docker git method test
    runs-on: ubuntu-latest
    needs: [unit-tests, shellcheck]
    steps:
      - uses: actions/checkout@v4
      - name: Copy install.sh to Docker context
        run: cp install.sh tests/install/docker/git-method/install.sh
      - name: Build and run git method test
        run: docker build --no-cache -t openrappter-test-git tests/install/docker/git-method/
