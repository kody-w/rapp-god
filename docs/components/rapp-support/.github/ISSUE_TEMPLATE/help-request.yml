name: 🆘 Help request
description: Something isn't working and you want a human (or agent) to help
labels: [help]
body:
  - type: input
    id: version
    attributes:
      label: Brainstem version
      description: Shown in the web UI header, or `cat ~/.brainstem/src/rapp_brainstem/VERSION`
      placeholder: v0.6.5
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you see instead?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: In the brainstem UI click Get Help → download the diagnostics JSON → drag it here. It never contains your tokens.
