name: 🐛 Bug report
description: Reproducible misbehavior worth fixing in the product
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Brainstem version
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
