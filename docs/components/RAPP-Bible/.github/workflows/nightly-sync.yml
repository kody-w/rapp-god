name: nightly-sync

on:
  schedule:
    - cron: "17 7 * * *"  # 07:17 UTC daily
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Re-mirror specs
        run: python3 scripts/mirror_sync.py
      - name: Rebuild repo pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_repo_pages.py
      - name: Run tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. pytest tests/ -v
      - name: Open PR on drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="nightly-sync-$(date -u +%Y%m%d)"
            git config user.name "rapp-bible-bot"
            git config user.email "bot@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "Nightly sync: refresh mirrored specs and repo pages"
            git push -u origin "$BRANCH"
            gh pr create --title "Nightly sync $(date -u +%Y-%m-%d)" \
              --body "Automated: re-mirror from upstream, regenerate repo pages." \
              --base main --head "$BRANCH" || true
          else
            echo "No drift detected."
          fi
