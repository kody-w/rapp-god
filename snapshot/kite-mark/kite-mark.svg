<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 138" width="320" height="442" role="img" aria-label="Kited — the Microsoft four-colour logo flown as a kite">
  <title>The Kite Mark — Microsoft logo flown as a kite</title>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
      values="-6 50 6; 6 50 6; -6 50 6" keyTimes="0;0.5;1"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      dur="3.6s" repeatCount="indefinite"/>
    <!-- four panels, on point (logo turned + bottom stretched into a kite) -->
    <polygon points="50,6 10,40 50,40" fill="#F25022"/>
    <polygon points="50,6 90,40 50,40" fill="#7FBA00"/>
    <polygon points="50,98 90,40 50,40" fill="#FFB900"/>
    <polygon points="50,98 10,40 50,40" fill="#00A4EF"/>
    <!-- white spars + outline -->
    <polygon points="50,6 90,40 50,98 10,40" fill="none" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/>
    <line x1="50" y1="6" x2="50" y2="98" stroke="#fff" stroke-width="2.2"/>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#fff" stroke-width="2.2"/>
    <!-- tail + bow-ties -->
    <path d="M50,98 Q58,108 52,116 Q46,124 54,131" fill="none" stroke="#9aa0a6" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M50.8,105.8 L54,109 L50.8,112.2 Z M57.2,105.8 L54,109 L57.2,112.2 Z" fill="#F25022"/>
    <path d="M46.8,113.8 L50,117 L46.8,120.2 Z M53.2,113.8 L50,117 L53.2,120.2 Z" fill="#7FBA00"/>
    <path d="M51.8,123.8 L55,127 L51.8,130.2 Z M58.2,123.8 L55,127 L58.2,130.2 Z" fill="#FFB900"/>
  </g>
</svg>
