name: build

on:
  push:
    branches: [main]
    paths:
      - 'vault/cards/**'
      - 'scripts/build.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build seed-index and card payloads
        run: python scripts/build.py

      - name: Commit generated files
        run: |
          if [ -n "$(git status --porcelain seed-index.json cards/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seed-index.json cards/
            git commit -m "build: regenerate seed-index and card payloads"
            git push
          else
            echo "No changes to commit."
          fi
