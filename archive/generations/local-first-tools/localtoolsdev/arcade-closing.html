<script type="module">
import * as THREE from 'three';

// ---------- HUD: scrolling high scores ----------
const scoresEl = document.getElementById('scores');
const NAMES = ['AAA','BOB','JIM','TIM','SAM','PAM','RAY','KAT','MAX','ZED','JOE','LIZ','ACE','GUS','EVE','RON','MEL','HAL','MIA','VEX'];
function genScores(){
  const out = [];
  for (let i=0;i<8;i++){
    const n = NAMES[(Math.random()*NAMES.length)|0];
    const s = (1000 + Math.floor(Math.random()*99000)) * 10;
    out.push({n, s, r: i+1});
  }
  out.sort((a,b)=>b.s-a.s);
  return out;
}
function renderScores(){
  const list = genScores();
  let html = '<div class="row head"><span>RANK</span><span>NAME</span><span>SCORE</span></div>';
  list.forEach((r,i)=>{
    html += `<div class="row"><span>${String(i+1).padStart(2,'0')}</span><span>${r.n}</span><span>${r.s.toLocaleString()}</span></div>`;
  });
  scoresEl.innerHTML = html;
}
renderScores();
setInterval(renderScores, 14000);

// ---------- THREE setup ----------
const wrap = document.getElementById('wrap');
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.outputColorSpace = THREE.SRGBColorSpace;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06030a);
scene.fog = new THREE.FogExp2(0x0a0612, 0.045);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.05, 80);
camera.position.set(0, 1.65, 6.0);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- Lights ----------
const ambient = new THREE.AmbientLight(0x1a0a28, 0.55);
scene.add(ambient);

const moonLight = new THREE.DirectionalLight(0x4a3a8a, 0.18);
moonLight.position.set(-3, 8, -2);
scene.add(moonLight);

// Single flickering fluorescent over the back
const fluorescent = new THREE.PointLight(0xc8e8ff, 0.0, 18, 1.5);
fluorescent.position.set(-3.5, 3.4, -4);
scene.add(fluorescent);

// Lit cabinet emissive light (this is the star)
const cabinetLight = new THREE.PointLight(0x66aaff, 2.6, 10, 1.6);
cabinetLight.position.set(2.2, 1.6, -2.0);
scene.add(cabinetLight);

// Neon sign accent
const neonLight = new THREE.PointLight(0xff1a7a, 1.4, 14, 1.8);
neonLight.position.set(0, 3.0, -5.5);
scene.add(neonLight);

// Soda machine glows
const sodaPink = new THREE.PointLight(0xff5fa8, 1.1, 6, 2);
sodaPink.position.set(-4.2, 1.4, 1.0);
scene.add(sodaPink);
const sodaBlue = new THREE.PointLight(0x5fb6ff, 1.0, 6, 2);
sodaBlue.position.set(-4.2, 1.4, 2.6);
scene.add(sodaBlue);

// ---------- Procedural carpet shader ----------
const carpetVS = /* glsl */`
  varying vec2 vUv;
  varying vec3 vWorld;
  uniform float uTime;
  void main(){
    vUv = uv;
    vec3 p = position;
    float w = sin(p.x*0.6 + uTime*0.4)*0.012 + cos(p.y*0.7 - uTime*0.3)*0.010;
    p.z += w;
    vec4 wp = modelMatrix * vec4(p,1.0);
    vWorld = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const carpetFS = /* glsl */`
  precision highp float;
  varying vec2 vUv;
  varying vec3 vWorld;
  uniform float uTime;
  uniform vec3 uLitPos;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i);
    float b = hash(i+vec2(1,0));
    float c = hash(i+vec2(0,1));
    float d = hash(i+vec2(1,1));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v=0.0, a=0.5;
    for(int i=0;i<5;i++){ v += a*noise(p); p*=2.03; a*=0.5; }
    return v;
  }

  void main(){
    vec2 uv = vUv * 24.0;
    // geometric purple/teal swirls
    float swirl = sin(uv.x*0.6 + sin(uv.y*0.4)*2.0) * cos(uv.y*0.5 - sin(uv.x*0.3)*1.6);
    float tri = abs(fract(uv.x*0.5+uv.y*0.3)-0.5)*2.0;
    float dia = abs(fract(uv.x*0.4-uv.y*0.4)-0.5)*2.0;
    float pat = smoothstep(0.4,0.55, mix(tri, dia, 0.5+0.5*sin(swirl*1.3)));

    vec3 purple = vec3(0.18,0.05,0.34);
    vec3 teal   = vec3(0.05,0.32,0.34);
    vec3 deep   = vec3(0.06,0.02,0.10);
    vec3 col = mix(deep, purple, pat);
    col = mix(col, teal, smoothstep(0.45,0.85,fbm(uv*0.3)));

    // fiber grain
    float grain = fbm(uv*8.0)*0.18;
    col += vec3(grain*0.25, grain*0.18, grain*0.30);

    // dim everything (carpet is dark)
    col *= 0.55;

    // light from lit cabinet falls onto carpet — moving spot
    float d = distance(vWorld.xz, uLitPos.xz);
    float spot = exp(-d*0.55) * 0.9;
    spot *= 0.85 + 0.15*sin(uTime*2.4);
    col += vec3(0.32,0.55,0.95) * spot * 0.5;

    // distance fall-off near walls
    col *= smoothstep(14.0, 2.0, length(vWorld.xz));

    gl_FragColor = vec4(col, 1.0);
  }
`;
const carpetGeo = new THREE.PlaneGeometry(30, 30, 64, 64);
const carpetMat = new THREE.ShaderMaterial({
  vertexShader: carpetVS,
  fragmentShader: carpetFS,
  uniforms:{
    uTime:{value:0},
    uLitPos:{value: new THREE.Vector3(2.2,0,-2.0)}
  }
});
const carpet = new THREE.Mesh(carpetGeo, carpetMat);

// ---------- Walls (wood paneling lower / dark upper) ----------
function makeWall(w,h,zPos,rotY=0,xPos=0){
  const c = document.createElement('canvas');
  c.width=512; c.height=256;
  const g = c.getContext('2d');
  g.fillStyle='#1a0e1f'; g.fillRect(0,0,512,256);
  // wood paneling lower half
  g.fillStyle='#3a1a18'; g.fillRect(0,128,512,128);
  for (let i=0;i<8;i++){
    g.strokeStyle='rgba(20,8,8,0.7)'; g.lineWidth=1;
    g.beginPath(); g.moveTo(i*64,128); g.lineTo(i*64,256); g.stroke();
  }
  // grain
  for (let i=0;i<200;i++){
    g.fillStyle=`rgba(${30+Math.random()*30},${10+Math.random()*8},${10+Math.random()*8},${0.15+Math.random()*0.3})`;
    g.fillRect(Math.random()*512, 128+Math.random()*128, 1+Math.random()*40, 1);
  }
  // upper carpet/wallpaper hint
  for (let i=0;i<80;i++){
    g.fillStyle=`rgba(60,20,80,${0.12+Math.random()*0.18})`;
    g.fillRect(Math.random()*512, Math.random()*128, 8,8);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(Math.max(1,w/4),1);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w,h),
    new THREE.MeshStandardMaterial({map:tex,roughness:0.95,metalness:0.05,color:0x6a5a6a})
  );
  m.position.set(xPos, h/2, zPos);
  m.rotation.y = rotY;
  scene.add(m);
  return m;
}

  stick.position.set(-0.18, 1.06, 0.46);

// ---- CRT attract-mode shader (3-4 phase ~30s loop) ----
const crtFS = /* glsl */`
  precision highp float;
  varying vec2 vUv;
  uniform float uTime;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }

  // curvature
  vec2 curve(vec2 uv){
    uv = uv*2.0 - 1.0;
    vec2 off = abs(uv.yx)/vec2(7.0,5.0);
    uv = uv + uv*off*off;
    uv = uv*0.5 + 0.5;
    return uv;
  }

  // phase A: bouncing geometric shapes
  vec3 phaseA(vec2 uv, float t){
    vec3 col = vec3(0.04,0.02,0.10);
    // grid
    vec2 g = uv*8.0;
    vec2 fg = abs(fract(g)-0.5);
    float grid = smoothstep(0.45,0.5, max(fg.x,fg.y));
    col += vec3(0.0,0.18,0.4)*grid*0.4;
    for (int i=0;i<5;i++){
      float fi = float(i);
      vec2 p = vec2(0.5+0.4*sin(t*(0.7+fi*0.13)+fi*1.3),
                    0.5+0.35*cos(t*(0.5+fi*0.11)+fi*0.9));
      float d = distance(uv, p);
      vec3 c = vec3(0.5+0.5*sin(fi*1.7), 0.5+0.5*cos(fi*1.3+1.0), 1.0);
      col += c * smoothstep(0.08,0.0,d) * 0.9;
      // square
      vec2 d2 = abs(uv-p);
      float sq = smoothstep(0.06,0.04, max(d2.x,d2.y)) - smoothstep(0.04,0.02, max(d2.x,d2.y));
      col += c * sq * 0.6;
    }
    return col;
  }

  // phase B: scrolling text "INSERT COIN  -  HIGH SCORE"
  vec3 phaseB(vec2 uv, float t){
    vec3 col = vec3(0.0);
    // big block letters approximated by vertical bars scrolling
    float scroll = fract(t*0.18 + uv.x*0.5);
    float band = smoothstep(0.43,0.5, abs(uv.y-0.55))-smoothstep(0.5,0.57, abs(uv.y-0.55));
    // not used, do simpler stripes
    float row1 = step(0.44, uv.y) * step(uv.y, 0.56);
    float chunk = step(0.5, fract((uv.x - t*0.3)*8.0));
    col += vec3(1.0,0.1,0.4)* row1 * chunk;
    // smaller row
    float row2 = step(0.20, uv.y) * step(uv.y, 0.28);
    float chunk2 = step(0.6, fract((uv.x + t*0.5)*14.0));
    col += vec3(0.2,0.9,1.0) * row2 * chunk2 * 0.8;
    // title big "FLIPPER PALACE"
    float row3 = step(0.74, uv.y) * step(uv.y, 0.92);
    float chunk3 = step(0.5, fract((uv.x)*22.0 - sin(t*2.0)*0.2));
    col += vec3(1.0,0.9,0.2) * row3 * chunk3 * (0.7+0.3*sin(t*4.0));
    return col;
  }

  // phase C: swirling colors (vortex)
  vec3 phaseC(vec2 uv, float t){
    vec2 p = uv-0.5;
    float r = length(p);
    float a = atan(p.y,p.x);
    float swirl = sin(a*5.0 + r*18.0 - t*2.0);
    vec3 col = 0.5+0.5*cos(vec3(0.0,2.0,4.0) + swirl*1.5 + r*4.0);
    col *= smoothstep(0.7, 0.0, r);
    col += vec3(0.05,0.0,0.1);
    return col;
  }

  // phase D: pac-man dot loop
  vec3 phaseD(vec2 uv, float t){
    vec3 col = vec3(0.01,0.0,0.05);
    // maze walls
    float wall = step(0.94, fract(uv.y*4.0)) + step(0.94, fract(uv.x*4.0));
    col += vec3(0.0,0.1,0.6) * wall * 0.4;
    // dots
    vec2 g = fract(uv*8.0)-0.5;
    float dot = smoothstep(0.08,0.05,length(g));
    // erase trail behind moving pac-man
    vec2 pp = vec2(0.1+0.8*fract(t*0.15), 0.5);
    float eaten = step(uv.x, pp.x) * step(0.45, uv.y) * step(uv.y, 0.55);
    col += vec3(1.0,1.0,0.2)*dot*(1.0-eaten);
    // pac-man
    float pac = smoothstep(0.07,0.05,distance(uv,pp));
    // wedge mouth
    float a = atan(uv.y-pp.y, uv.x-pp.x);
    float mouth = step(abs(a), 0.4*(0.5+0.5*sin(t*16.0)));
    col += vec3(1.0,1.0,0.0) * pac * (1.0-mouth);
    // ghost
    vec2 gp = vec2(0.1+0.8*fract(t*0.15+0.18), 0.5);
    float gh = smoothstep(0.07,0.05,distance(uv,gp));
    col += vec3(1.0,0.2,0.4) * gh;
    return col;
  }

  void main(){
    vec2 uv = curve(vUv);
    if (uv.x<0.0||uv.x>1.0||uv.y<0.0||uv.y>1.0){
      gl_FragColor = vec4(0.0,0.0,0.0,1.0);
      return;
    }
    float cycle = 30.0;
    float t = mod(uTime, cycle);
    float phase = floor(t/7.5);
    float local = mod(uTime, 7.5);
    vec3 col;
    if (phase<0.5)      col = phaseA(uv, uTime);
    else if (phase<1.5) col = phaseB(uv, uTime);
    else if (phase<2.5) col = phaseC(uv, uTime);
    else                col = phaseD(uv, uTime);

    // fade between phases
    float fade = smoothstep(7.0,7.5,local);
    col = mix(col, vec3(0.0), fade*0.7);

    // chromatic aberration
    float ca = 0.0035;
    // approximate by sampling shifted values of computed col — skip, do tint
    col.r *= 1.05;
    col.b *= 1.04;

    // scanlines
    float scan = 0.85 + 0.15*sin(uv.y*900.0);
    col *= scan;

    // vignette
    vec2 cv = uv-0.5;
    col *= 1.0 - dot(cv,cv)*1.4;

    // phosphor glow / brightness
    col = pow(col, vec3(0.92));
    col *= 1.6;

    // noise
    col += (hash(uv*vec2(uTime*60.0, 1.0))-0.5)*0.05;

    gl_FragColor = vec4(col, 1.0);
  }
`;

// ---------- Neon "ARCADE" sign (back wall above cabinets) ----------
const neonFS = /* glsl */`
  precision highp float;
  varying vec2 vUv;
  uniform float uTime;
  void main(){
    vec2 uv = vUv;
    // letterforms approximated by vertical bars and gaps
    // we render a simple "ARCADE" wordmark using stripes
    float letters = 0.0;
    // bounding rows
    float row = step(0.18, uv.y) * step(uv.y, 0.82);
    // 6 letters across — make a tube per letter
    for (int i=0;i<6;i++){
      float fi = float(i);
      float cx = 0.10 + fi*0.135;
      float dx = abs(uv.x - cx);
      float tube = smoothstep(0.04,0.02,dx) * row;
      // crossbar
      float cb = step(0.45, uv.y)*step(uv.y,0.55) * step(cx-0.05,uv.x)*step(uv.x,cx+0.05);
      letters += tube + cb*0.7;
    }
    float flick = 0.85 + 0.15*sin(uTime*60.0) + 0.10*sin(uTime*7.3);
    if (sin(uTime*1.7) > 0.97) flick *= 0.3; // rare blink
    vec3 hot = vec3(1.0, 0.15, 0.55);
    vec3 cold = vec3(0.4, 0.0, 0.3);
    vec3 col = mix(cold, hot, letters) * (0.4 + letters*flick*1.6);
    // glow halo
    float halo = exp(-pow((uv.y-0.5)*4.0,2.0)) * 0.25;
    col += hot * halo * flick;
    float a = clamp(letters*flick + halo*0.5, 0.0, 1.0);
    gl_FragColor = vec4(col, a);
  }
`;

  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: neonFS,
  uniforms:{uTime:{value:0}},
  transparent:true
});

// ---------- Camera control: drag look + WASD walk ----------
let yaw = 0, pitch = -0.05;
let dragging=false, lastX=0, lastY=0;
const keys = {};

renderer.domElement.addEventListener('pointerdown', (e)=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
addEventListener('pointerup', ()=>{ dragging=false; });
addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  const dx = e.clientX-lastX, dy = e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  yaw -= dx*0.0035;
  pitch -= dy*0.0035;
  pitch = Math.max(-0.55, Math.min(0.45, pitch));
  yaw = Math.max(-1.3, Math.min(1.3, yaw));
});
addEventListener('keydown', (e)=>{ keys[e.code]=true; if (e.code==='KeyE') tryEasterEgg(); });
addEventListener('keyup', (e)=>{ keys[e.code]=false; });

function updateCamera(dt){
  const speed = 1.4 * dt;
  const fwd = new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));
  const move = new THREE.Vector3();
  if (keys['KeyW']||keys['ArrowUp'])    move.add(fwd);
  if (keys['KeyS']||keys['ArrowDown'])  move.sub(fwd);
  if (keys['KeyA']||keys['ArrowLeft'])  move.sub(right);
  if (keys['KeyD']||keys['ArrowRight']) move.add(right);
  if (move.lengthSq()>0){ move.normalize().multiplyScalar(speed); camera.position.add(move); }
  // soft walk bob
  const bob = (move.lengthSq()>0) ? Math.sin(performance.now()*0.008)*0.012 : 0;
  // clamp to room
  camera.position.x = Math.max(-7.0, Math.min(7.0, camera.position.x));
  camera.position.z = Math.max(-7.0, Math.min(7.5, camera.position.z));
  camera.position.y = 1.65 + bob;

  // look direction
  const target = new THREE.Vector3(
    camera.position.x + Math.sin(yaw)*Math.cos(pitch),
    camera.position.y + Math.sin(pitch),
    camera.position.z - Math.cos(yaw)*Math.cos(pitch)
  );
  camera.lookAt(target);
}

// ---------- Easter egg: insert quarter ----------
const goEl = document.getElementById('gameover');
let goTimer = 0;
function tryEasterEgg(){
  const lit = cabinets[4].group.position;
  const d = camera.position.distanceTo(lit);
  if (d < 2.6){
    goEl.classList.add('show');
    goTimer = 3.0;
    playCoinDrop();
  }
}

// ---------- Audio (gesture-gated) ----------
let audioCtx = null;
let masterGain = null;
let audioStarted = false;

function startAudio(){
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  startAmbientHum();
  startNeonHum();
  startJukebox();
  scheduleVacuum();
  scheduleBlips();
  scheduleSqueak();
}

// arcade ambient hum (low rumble + air conditioner)
function startAmbientHum(){
  const o1 = audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value=55;
  const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=82.4;
  const g = audioCtx.createGain(); g.gain.value=0.08;
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
  o1.connect(lp); o2.connect(lp); lp.connect(g); g.connect(masterGain);
  o1.start(); o2.start();
  // subtle wobble
  const lfo = audioCtx.createOscillator(); lfo.frequency.value=0.13;
  const lfoG = audioCtx.createGain(); lfoG.gain.value=0.025;
  lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();

  // pink noise air
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*4, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0;
  for (let i=0;i<d.length;i++){
    const w = Math.random()*2-1;
    b0 = 0.99*b0 + 0.029*w;
    b1 = 0.96*b1 + 0.083*w;
    b2 = 0.57*b2 + 0.24*w;
    d[i] = (b0+b1+b2+w*0.18)*0.16;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const ng = audioCtx.createGain(); ng.gain.value=0.06;
  const nlp = audioCtx.createBiquadFilter(); nlp.type='lowpass'; nlp.frequency.value=900;
  src.connect(nlp); nlp.connect(ng); ng.connect(masterGain);
  src.start();
}

// neon 60hz hum (triangle high-passed)
function startNeonHum(){
  const o = audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=60;
  const o2 = audioCtx.createOscillator(); o2.type='triangle'; o2.frequency.value=120;
  const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=400;
  const g = audioCtx.createGain(); g.gain.value=0.018;
  o.connect(hp); o2.connect(hp); hp.connect(g); g.connect(masterGain);
  o.start(); o2.start();
  // flicker — random gain dips to mirror neon flicker
  setInterval(()=>{
    if (Math.random()<0.07){
      g.gain.cancelScheduledValues(audioCtx.currentTime);
      g.gain.setValueAtTime(g.gain.value, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime+0.04);
      g.gain.linearRampToValueAtTime(0.018, audioCtx.currentTime+0.12);
    }
  }, 400);
}

// 8-bit blip melodies, panned random, every 6-12s
const SCALE = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
function play8bitMelody(){
  const startT = audioCtx.currentTime + 0.05;
  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random()-0.5)*1.4;
  const out = audioCtx.createGain();
  out.gain.value = 0.08;
  pan.connect(out); out.connect(masterGain);
  const noteCount = 4 + ((Math.random()*5)|0);
  for (let i=0;i<noteCount;i++){
    const f = SCALE[(Math.random()*SCALE.length)|0] * (Math.random()<0.3?2:1);
    const t = startT + i*0.13;
    const o = audioCtx.createOscillator();
    o.type = Math.random()<0.5?'square':'sawtooth';
    o.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.5, t+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.11);
    o.connect(g); g.connect(pan);
    o.start(t); o.stop(t+0.13);
  }
}
function scheduleBlips(){
  const next = 6000 + Math.random()*6000;
  setTimeout(()=>{ if (audioStarted){ play8bitMelody(); scheduleBlips(); } }, next);
}

// vacuum whir, slow L→R pan, rare
function playVacuum(){
  const dur = 9 + Math.random()*5;
  // brown noise
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  let last=0;
  for (let i=0;i<d.length;i++){
    const w = (Math.random()*2-1)*0.1;
    last = (last+w)/1.02;
    d[i] = last*3.0;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=850; bp.Q.value=0.7;
  const g = audioCtx.createGain(); g.gain.value=0.0;
  const pan = audioCtx.createStereoPanner();
  pan.pan.setValueAtTime(-0.9, audioCtx.currentTime);
  pan.pan.linearRampToValueAtTime(0.9, audioCtx.currentTime + dur);
  src.connect(bp); bp.connect(g); g.connect(pan); pan.connect(masterGain);
  g.gain.linearRampToValueAtTime(0.13, audioCtx.currentTime+1.2);
  g.gain.linearRampToValueAtTime(0.10, audioCtx.currentTime+dur-1.2);
  g.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime+dur);
  src.start();
  src.stop(audioCtx.currentTime+dur+0.1);
}
function scheduleVacuum(){
  const next = 25000 + Math.random()*30000;
  setTimeout(()=>{ if (audioStarted){ playVacuum(); scheduleVacuum(); } }, next);
}

// rare cabinet squeak (>30s)
function playSqueak(){
  const t = audioCtx.currentTime;
  const dur = 0.4 + Math.random()*0.3;
  const o = audioCtx.createOscillator();
  o.type='sawtooth';
  o.frequency.setValueAtTime(900+Math.random()*600, t);
  o.frequency.exponentialRampToValueAtTime(300, t+dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.05, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1200; bp.Q.value=4;
  o.connect(bp); bp.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t+dur+0.05);
}
function scheduleSqueak(){
  const next = 30000 + Math.random()*40000;
  setTimeout(()=>{ if (audioStarted){ playSqueak(); scheduleSqueak(); } }, next);
}

// jukebox synth-pop loop, 120 BPM, Cmaj-Am-Fmaj-G7
function startJukebox(){
  const bpm = 120;
  const beat = 60/bpm; // 0.5s
  const bar = beat*4;
  const muffler = audioCtx.createBiquadFilter();
  muffler.type='lowpass'; muffler.frequency.value=1100; muffler.Q.value=0.8;
  const jukeGain = audioCtx.createGain(); jukeGain.gain.value=0.12;
  muffler.connect(jukeGain); jukeGain.connect(masterGain);

  const chords = [
    [261.63, 329.63, 392.00], // C
    [220.00, 261.63, 329.63], // Am
    [174.61, 220.00, 261.63], // F
    [196.00, 246.94, 293.66, 174.61], // G7 (b7)
  ];
  const bassNotes = [65.41, 55.00, 43.65, 49.00]; // C2, A1, F1, G1

  function scheduleBar(barStart, chordIdx){
    const c = chords[chordIdx];
    const bN = bassNotes[chordIdx];
    // bass: saw, 8th notes
    for (let i=0;i<8;i++){
      const t = barStart + i*(beat/2);
      const o = audioCtx.createOscillator(); o.type='sawtooth';
      o.frequency.value = bN * (i%4===2?1.5:1);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.45,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+beat/2*0.9);
      const bp = audioCtx.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=400;
      o.connect(bp); bp.connect(g); g.connect(muffler);
      o.start(t); o.stop(t+beat/2+0.05);
    }
    // square lead pattern (riffs)
    const riff = [0, 2, 1, 2, 0, 1, 2, 1];
    for (let i=0;i<8;i++){
      const t = barStart + i*(beat/2);
      const o = audioCtx.createOscillator(); o.type='square';
      o.frequency.value = c[riff[i]%c.length]*2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.16,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+beat/2*0.7);
      o.connect(g); g.connect(muffler);
      o.start(t); o.stop(t+beat/2+0.05);
    }
    // snare on 2 and 4
    for (let i=0;i<4;i++){
      if (i%2!==1) continue;
      const t = barStart + i*beat;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let k=0;k<d.length;k++) d[k] = (Math.random()*2-1)*Math.exp(-k/2200);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1500;
      const g = audioCtx.createGain(); g.gain.value=0.18;
      src.connect(hp); hp.connect(g); g.connect(muffler);
      src.start(t);
    }
    // kick on 1 and 3
    for (let i=0;i<4;i++){
      if (i%2!==0) continue;
      const t = barStart + i*beat;
      const o = audioCtx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(120,t);
      o.frequency.exponentialRampToValueAtTime(40, t+0.12);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.5,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
      o.connect(g); g.connect(muffler);
      o.start(t); o.stop(t+0.2);
    }
  }

  let nextBar = audioCtx.currentTime + 0.1;
  let chordI = 0;
  function tick(){
    while (nextBar < audioCtx.currentTime + 1.0){
      scheduleBar(nextBar, chordI);
      chordI = (chordI+1)%4;
      nextBar += bar;
    }
    setTimeout(tick, 250);
  }
  tick();
}

function playCoinDrop(){
  const t = audioCtx.currentTime;
  for (let i=0;i<5;i++){
    const tt = t + i*0.07 + Math.random()*0.02;
    const o = audioCtx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(1200+Math.random()*400, tt);
    o.frequency.exponentialRampToValueAtTime(400, tt+0.18);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0,tt);
    g.gain.linearRampToValueAtTime(0.18, tt+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, tt+0.2);
    o.connect(g); g.connect(masterGain);
    o.start(tt); o.stop(tt+0.22);
  }
  // game over swoop
  const t2 = t + 0.5;
  const o = audioCtx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(440, t2);
  o.frequency.exponentialRampToValueAtTime(80, t2+1.2);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0,t2);
  g.gain.linearRampToValueAtTime(0.18, t2+0.05);
  g.gain.exponentialRampToValueAtTime(0.001, t2+1.4);
  o.connect(g); g.connect(masterGain);
  o.start(t2); o.stop(t2+1.5);
}

// ---------- Gate ----------
const gate = document.getElementById('gate');
gate.addEventListener('click', ()=>{
  startAudio();
  gate.style.transition='opacity 0.6s';
  gate.style.opacity='0';
  setTimeout(()=>gate.remove(), 700);
});

// ---------- Animation loop ----------
const clock = new THREE.Clock();
let flickerTimer = 0;
let flickerNext = 1.5;
let fluorOn = false;
function tick(){
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.getElapsedTime();

  carpetMat.uniforms.uTime.value = t;
  neonMat.uniforms.uTime.value = t;
  dustMat.uniforms.uTime.value = t;
  cabinets.forEach(c=>{
    if (c.lit && c.screenMat.uniforms){ c.screenMat.uniforms.uTime.value = t; }
  });

  // flickering fluorescent
  flickerTimer += dt;
  if (flickerTimer > flickerNext){
    flickerTimer = 0;
    flickerNext = 0.6 + Math.random()*5.0;
    fluorOn = !fluorOn || Math.random()<0.3;
  }
  let fluor = fluorOn ? 0.4 + Math.random()*0.2 : 0.02 + Math.random()*0.02;
  if (Math.random()<0.04) fluor *= 0.1; // micro-stutter
  fluorescent.intensity = fluor * 1.4;
  fixMat.emissiveIntensity = fluor * 1.8;

  // lit cabinet pulse on carpet
  cabinetLight.intensity = 2.4 + Math.sin(t*3.2)*0.25 + Math.sin(t*9.7)*0.12;

  // neon flicker
  if (Math.random()<0.01){ neonLight.intensity = 0.4; }
  else { neonLight.intensity = 1.4 + Math.sin(t*2.1)*0.18; }

  // soda machines steady soft pulse
  sodaPink.intensity = 1.0 + Math.sin(t*0.8)*0.08;
  sodaBlue.intensity = 0.95 + Math.sin(t*0.6+1.4)*0.08;

  // game over timer
  if (goTimer > 0){
    goTimer -= dt;
    if (goTimer <= 0) goEl.classList.remove('show');
  }

  updateCamera(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
