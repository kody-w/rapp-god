    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — click to toggle visibility';
        hud.textContent = '✦ GOLD';
        let v = false;
        hud.onclick = () => { v = !v; hud.style.opacity = v ? '1' : '0.25'; };
        document.body.appendChild(hud);
        hud.style.opacity = '1';
        setTimeout(() => { hud.style.opacity = '0.25'; }, 4000);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
              if (hud) hud.textContent += ' ↓';
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;

          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);

<script type="module">
import * as THREE from 'three';

/* =========================================================================
   KUROTAKE ONSEN — autumn dusk soak
   single-file three.js + GLSL + WebAudio mood piece
   ========================================================================= */

const W = () => window.innerWidth;
const H = () => window.innerHeight;

/* ---------- Renderer ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setClearColor(0x1a1410, 1);

/* ---------- Scene + Camera ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xb89878, 0.018);

const camera = new THREE.PerspectiveCamera(58, W()/H(), 0.05, 200);
// Chest height in the bath, looking out toward mountains (negative Z)
const CAM_HOME = new THREE.Vector3(-1.2, 0.55, 1.6);
camera.position.copy(CAM_HOME);
camera.lookAt(0, 0.7, -8);

/* ---------- Lighting (warm dusk) ---------- */
const sun = new THREE.DirectionalLight(0xffb070, 1.4);
sun.position.set(-6, 3.2, -10);
scene.add(sun);

const sky = new THREE.HemisphereLight(0xf5b890, 0x2a1810, 0.55);
scene.add(sky);

const fill = new THREE.PointLight(0xff9050, 0.45, 14, 1.6);
fill.position.set(2.0, 1.6, 0.5);
scene.add(fill);

const lantern = new THREE.PointLight(0xffc080, 0.7, 6, 1.8);
lantern.position.set(2.4, 1.0, 1.4);
scene.add(lantern);

/* ---------- Shared uniforms ---------- */
const U = {
  time: { value: 0 },
  steamPulse: { value: 0 },     // 0..1 occasionally pulses to obscure
  windPhase: { value: 0 },
  sunDir: { value: new THREE.Vector3(-0.5, 0.35, -0.8).normalize() },
};

/* =========================================================================
   GLSL helper chunks
   ========================================================================= */
const FBM_GLSL = /* glsl */`
float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
float hash21(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash21(i), b=hash21(i+vec2(1,0)), c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; }
  return v;
}
float fbm3(vec2 p){
  float v=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<3;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; }
  return v;
}
`;

/* =========================================================================
   STONE (rough natural rock with moss + wet sheen)
   ========================================================================= */
const stoneMat = new THREE.ShaderMaterial({
  uniforms: { uTime: U.time, uWet: { value: 1.0 } },
  vertexShader: /* glsl */`
    varying vec3 vN; varying vec3 vWP; varying vec3 vLP;
    void main(){
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWP = wp.xyz; vLP = position;
      vN = normalize(mat3(modelMatrix)*normal);
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vN; varying vec3 vWP; varying vec3 vLP;
    uniform float uTime; uniform float uWet;
    ${FBM_GLSL}
    void main(){
      vec3 base = vec3(0.32,0.27,0.22);
      // rough rock pitting
      float n1 = fbm(vLP.xz*5.5 + vLP.y*2.0);
      float n2 = fbm(vLP.xy*9.0 + 11.3);
      float pits = smoothstep(0.4,0.75,fbm(vLP.xz*22.0));
      base = mix(base, vec3(0.18,0.14,0.11), pits*0.6);
      base = mix(base, vec3(0.42,0.35,0.28), n1*0.5);
      base *= 0.78 + n2*0.4;

      // moss in crevices on top-facing surfaces
      float upness = clamp(vN.y, 0.0, 1.0);
      float mossN = fbm(vLP.xz*3.2);
      float moss = smoothstep(0.45,0.7,mossN) * upness;
      vec3 mossCol = mix(vec3(0.12,0.22,0.10), vec3(0.28,0.36,0.14), fbm(vLP.xz*7.0));
      base = mix(base, mossCol, moss*0.55);

      // wet sheen on lower stones (water line)
      float waterLine = smoothstep(0.0, -0.05, vWP.y);
      float wet = waterLine * uWet;
      base *= mix(1.0, 0.65, wet);
      // micro-spec from below water reflection-ish
      float gloss = wet * pow(max(dot(normalize(vN), normalize(vec3(0.2,0.8,0.4))),0.0), 8.0);
      base += vec3(0.5,0.35,0.25)*gloss*0.4;

      // warm dusk rim
      vec3 V = normalize(cameraPosition - vWP);
      float rim = pow(1.0 - max(dot(V, vN),0.0), 2.5);
      base += vec3(1.0,0.55,0.30) * rim * 0.18;

      // sun warm tint
      float sd = max(dot(vN, normalize(vec3(-0.5,0.4,-0.8))),0.0);
      base += vec3(1.0,0.6,0.35) * sd * 0.22;

      gl_FragColor = vec4(base, 1.0);
    }
  `,
});

/* =========================================================================
   WATER SURFACE (mineral green tint with ripples + steam-distortion)
   ========================================================================= */
const waterMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: U.time,
    uSteam: U.steamPulse,
  },
  transparent: true,
  vertexShader: /* glsl */`
    varying vec3 vWP; varying vec2 vUv; varying vec3 vN;
    uniform float uTime;
    ${FBM_GLSL}
    void main(){
      vUv = uv;
      vec3 p = position;
      // gentle long ripples
      float r = fbm3(p.xy*0.6 + uTime*0.06) * 0.025
              + sin(p.x*4.5 + uTime*0.7)*0.006
              + cos(p.y*3.2 + uTime*0.5)*0.005;
      p.z += r;
      vec4 wp = modelMatrix * vec4(p,1.0);
      vWP = wp.xyz;
      vN = vec3(0.0,0.0,1.0);
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vWP; varying vec2 vUv; varying vec3 vN;
    uniform float uTime; uniform float uSteam;
    ${FBM_GLSL}
    void main(){
      // mineral green-tinted water (sulfur / iron mineral)
      vec3 deep = vec3(0.12,0.22,0.18);
      vec3 shallow = vec3(0.32,0.42,0.32);
      // micro ripples (cell pattern)
      vec2 q = vUv*8.0;
      float ripples = 0.0;
      for(int i=0;i<3;i++){
        float a = float(i)*1.7;
        ripples += sin(q.x*3.1 + uTime*0.9 + a) * cos(q.y*2.7 + uTime*0.6 + a);
      }
      ripples *= 0.08;
      float foamN = fbm(vUv*14.0 + uTime*0.05);
      vec3 col = mix(deep, shallow, 0.4 + ripples + foamN*0.18);
      // light steam-distortion glaze when steam pulse spikes
      float steamGlaze = uSteam * 0.5;
      col = mix(col, vec3(0.78,0.72,0.65), steamGlaze*0.25);

      // warm specular from setting sun
      vec3 V = normalize(cameraPosition - vWP);
      float spec = pow(max(dot(reflect(-normalize(vec3(-0.5,0.6,-0.8)), vN), V),0.0), 24.0);
      col += vec3(1.0,0.55,0.30) * spec * 0.55;

      // soft warm ambience near edges
      float d = length(vUv - 0.5);
      col += vec3(1.0,0.6,0.35) * smoothstep(0.4,0.7,d) * 0.06;

      // very faint steam highlights drifting across surface
      float sf = fbm(vUv*6.0 + vec2(uTime*0.04,uTime*0.02));
      col += vec3(0.9,0.8,0.7) * sf * 0.06 * (0.4 + uSteam);

      gl_FragColor = vec4(col, 0.94);
    }
  `,
});

/* =========================================================================
   MAPLE LEAF (red/orange/yellow with veining + slight warp)
   ========================================================================= */
const leafMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: U.time,
    uTint: { value: new THREE.Vector3(0.95,0.35,0.12) },
    uSeed: { value: 0.0 },
  },
  transparent: true, depthWrite: false, side: THREE.DoubleSide,
  vertexShader: /* glsl */`
    varying vec2 vUv; varying vec3 vWP;
    uniform float uTime; uniform float uSeed;
    void main(){
      vUv = uv;
      vec3 p = position;
      float w = sin(uTime*1.2 + uSeed*7.0 + p.x*4.0)*0.012;
      p.z += w;
      vec4 wp = modelMatrix * vec4(p,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv; varying vec3 vWP;
    uniform vec3 uTint; uniform float uSeed; uniform float uTime;
    // 5-lobed maple shape via polar
    float mapleMask(vec2 uv){
      vec2 p = uv*2.0 - 1.0;
      float r = length(p);
      float a = atan(p.y, p.x);
      // 5-fold lobes
      float lobes = 0.5 + 0.5*cos(a*5.0);
      float edge = 0.62 + 0.32*lobes;
      // gentle stem at bottom
      float stem = smoothstep(0.04,0.0,abs(p.x))*step(p.y,-0.7)*0.4;
      return smoothstep(edge, edge-0.06, r) + stem;
    }
    void main(){
      float m = mapleMask(vUv);
      if (m < 0.02) discard;
      // veining
      vec2 p = vUv*2.0 - 1.0;
      float a = atan(p.y,p.x);
      float vein = abs(sin(a*5.0 + length(p)*8.0));
      vein = smoothstep(0.85,1.0,vein) * 0.55;
      vec3 col = uTint;
      // gradient toward darker tip
      col *= 0.7 + vUv.y*0.5;
      col -= vec3(0.0,0.06,0.10) * vein;
      // slight color variance
      col += sin(uSeed*9.0 + vUv.x*4.0)*vec3(0.06,0.04,0.0);
      // wet sheen
      col += vec3(0.4,0.2,0.1)*0.06;
      gl_FragColor = vec4(col, m);
    }
  `,
});

/* =========================================================================
   DISTANT MOUNTAIN (snow-capped silhouettes with sunset gradient)
   ========================================================================= */
const mountainMat = new THREE.ShaderMaterial({
  uniforms: { uTime: U.time },
  side: THREE.BackSide,
  vertexShader: /* glsl */`
    varying vec3 vWP; varying vec3 vLP;
    void main(){
      vLP = position;
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vWP; varying vec3 vLP;
    uniform float uTime;
    ${FBM_GLSL}
    void main(){
      // sky / gradient
      vec3 dir = normalize(vLP);
      float h = clamp(dir.y, -0.2, 1.0);
      // dusk gradient: deep blue at top → warm orange at horizon
      vec3 zenith = vec3(0.18,0.20,0.30);
      vec3 mid    = vec3(0.55,0.40,0.42);
      vec3 horizon= vec3(1.00,0.55,0.32);
      vec3 sky = mix(horizon, mid, smoothstep(0.0,0.25,h));
      sky = mix(sky, zenith, smoothstep(0.25,0.85,h));

      // sun glow toward -z, slightly left
      vec3 sunDir = normalize(vec3(-0.35,0.15,-1.0));
      float sd = max(dot(dir, sunDir),0.0);
      sky += vec3(1.0,0.5,0.25) * pow(sd, 18.0) * 1.4;
      sky += vec3(1.0,0.6,0.3) * pow(sd, 4.0) * 0.18;

      // mountain silhouette band — only near horizon
      float ang = atan(dir.x, -dir.z); // 0 forward
      // long wavy ridge profile
      float ridge = 0.04
                  + 0.05*sin(ang*2.3 + 0.7)
                  + 0.03*sin(ang*5.1 + 1.3)
                  + 0.018*sin(ang*9.7 + 2.1)
                  + 0.01*fbm3(vec2(ang*4.0, 0.0));
      // second smaller distant ridge
      float ridge2 = 0.018
                  + 0.025*sin(ang*1.7 + 0.2)
                  + 0.015*sin(ang*4.3 + 1.9);

      vec3 col = sky;
      // far ridge (lighter, hazy)
      if (h < ridge2) {
        vec3 farMt = mix(vec3(0.55,0.40,0.45), vec3(0.7,0.5,0.45), 1.0 - h/max(ridge2,0.001));
        col = mix(col, farMt, 0.55);
      }
      // near ridge (darker, snow on top)
      if (h < ridge) {
        float depth = 1.0 - h/max(ridge,0.001);
        vec3 mt = mix(vec3(0.32,0.26,0.28), vec3(0.16,0.13,0.16), depth);
        // snow line: top of ridge gets snow
        float snow = smoothstep(ridge*0.55, ridge*0.95, h);
        // warm sun on snow peaks (alpenglow)
        vec3 snowCol = mix(vec3(0.85,0.75,0.78), vec3(1.0,0.62,0.45), pow(sd,3.0)*0.7);
        mt = mix(mt, snowCol, snow*0.85);
        // fbm fuzz for forest
        float forest = fbm3(vec2(ang*30.0, h*30.0));
        mt *= 0.85 + forest*0.25;
        col = mt;
      }

      // very subtle clouds
      float cl = fbm(vec2(ang*3.0, h*8.0 + uTime*0.01));
      cl = smoothstep(0.55,0.78,cl);
      col = mix(col, vec3(1.0,0.7,0.55), cl * smoothstep(ridge,0.5,h) * 0.3);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

/* =========================================================================
   BAMBOO shader (vertical segments, green/tan)
   ========================================================================= */
const bambooMat = new THREE.ShaderMaterial({
  uniforms: { uTime: U.time, uHue: { value: new THREE.Vector3(0.42,0.46,0.22) } },
  vertexShader: /* glsl */`
    varying vec3 vWP; varying vec3 vLP; varying vec3 vN;
    void main(){
      vLP = position;
      vN = normalize(mat3(modelMatrix)*normal);
      vec4 wp = modelMatrix*vec4(position,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vWP; varying vec3 vLP; varying vec3 vN;
    uniform float uTime; uniform vec3 uHue;
    ${FBM_GLSL}
    void main(){
      // segment rings
      float seg = abs(fract(vLP.y*1.6) - 0.5);
      float ring = smoothstep(0.42,0.49,seg) * 0.6;
      vec3 base = uHue;
      base = mix(base, base*0.55, ring);
      // long fiber streaks
      float streak = fbm(vec2(atan(vLP.x,vLP.z)*3.0, vLP.y*0.6));
      base *= 0.85 + streak*0.4;
      // age tan
      base = mix(base, vec3(0.65,0.55,0.32), smoothstep(0.6,1.0,streak)*0.4);

      vec3 V = normalize(cameraPosition - vWP);
      float rim = pow(1.0 - max(dot(V, vN),0.0), 2.0);
      base += vec3(1.0,0.55,0.30) * rim * 0.22;
      float sd = max(dot(vN, normalize(vec3(-0.5,0.4,-0.8))),0.0);
      base += vec3(1.0,0.6,0.35) * sd * 0.25;
      gl_FragColor = vec4(base,1.0);
    }
  `,
});

/* =========================================================================
   FENCE WOOD shader (dark weathered cedar planks)
   ========================================================================= */
const woodMat = new THREE.ShaderMaterial({
  uniforms: { uTime: U.time },
  vertexShader: /* glsl */`
    varying vec3 vWP; varying vec3 vLP; varying vec3 vN;
    void main(){
      vLP = position;
      vN = normalize(mat3(modelMatrix)*normal);
      vec4 wp = modelMatrix*vec4(position,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vWP; varying vec3 vLP; varying vec3 vN;
    ${FBM_GLSL}
    void main(){
      // long vertical grain
      float grain = fbm(vec2(vLP.x*30.0, vLP.y*1.4));
      float dark = fbm(vec2(vLP.x*4.0, vLP.y*0.6));
      vec3 base = mix(vec3(0.18,0.13,0.09), vec3(0.32,0.22,0.14), dark);
      base *= 0.7 + grain*0.45;
      // weathered grey patches
      float weather = fbm(vec2(vLP.x*0.8, vLP.y*0.9));
      base = mix(base, vec3(0.28,0.26,0.24), smoothstep(0.55,0.85,weather)*0.5);

      vec3 V = normalize(cameraPosition - vWP);
      float rim = pow(1.0 - max(dot(V,vN),0.0), 2.5);
      base += vec3(1.0,0.55,0.30)*rim*0.16;
      float sd = max(dot(vN, normalize(vec3(-0.5,0.4,-0.8))),0.0);
      base += vec3(1.0,0.6,0.3) * sd * 0.18;

      gl_FragColor = vec4(base,1.0);
    }
  `,
});

/* =========================================================================
   STEAM BILLOW shader (FBM noise, vertical drift, alpha)
   ========================================================================= */
const steamMat = (seed) => new THREE.ShaderMaterial({
  uniforms: {
    uTime: U.time,
    uSteam: U.steamPulse,
    uSeed: { value: seed },
  },
  transparent: true, depthWrite: false,
  blending: THREE.NormalBlending,
  vertexShader: /* glsl */`
    varying vec2 vUv; varying vec3 vWP;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix*vec4(position,1.0);
      vWP = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv; varying vec3 vWP;
    uniform float uTime; uniform float uSeed; uniform float uSteam;
    ${FBM_GLSL}
    void main(){
      vec2 uv = vUv;
      // multi-layer FBM with vertical drift
      float t = uTime*0.18 + uSeed*5.0;
      float n1 = fbm(uv*2.5 + vec2(t*0.3, -t));
      float n2 = fbm(uv*5.5 + vec2(-t*0.5, -t*1.4));
      float n3 = fbm(uv*1.2 + vec2(t*0.2, -t*0.6));
      float n = n1*0.55 + n2*0.30 + n3*0.5;
      // soft circular mask, drifting upward
      vec2 c = uv - vec2(0.5,0.55);
      float radial = 1.0 - smoothstep(0.15,0.55, length(c));
      // edges fade
      float edge = smoothstep(0.0,0.18,uv.x)*smoothstep(1.0,0.82,uv.x)
                 * smoothstep(0.0,0.20,uv.y)*smoothstep(1.0,0.85,uv.y);
      float a = pow(n, 1.6) * radial * edge;
      a *= 0.55 + uSteam*0.9;
      // warm dusk-tinted steam (slight pink/orange in highlights)
      vec3 col = mix(vec3(0.62,0.56,0.50), vec3(1.0,0.78,0.65), n*0.5 + 0.2);
      // slight blueshift in shadows
      col = mix(vec3(0.45,0.45,0.50), col, 0.4 + n*0.6);
      gl_FragColor = vec4(col, clamp(a*0.85,0.0,0.92));
    }
  `,
});

/* =========================================================================
   AUDIO ENGINE — gated until first user gesture
   ========================================================================= */
let audioReady = false;
let actx = null;
const A = {};

function buildAudio(){
  actx = new (window.AudioContext||window.webkitAudioContext)();
  const master = actx.createGain(); master.gain.value = 0.0; master.connect(actx.destination);
  A.master = master;
  // fade in
  master.gain.setValueAtTime(0, actx.currentTime);
  master.gain.linearRampToValueAtTime(0.65, actx.currentTime + 3.0);

  /* small reverb impulse */
  function makeReverb(seconds=2.6, decay=2.4){
    const rate = actx.sampleRate;
    const len = Math.floor(rate*seconds);
    const buf = actx.createBuffer(2, len, rate);
    for (let ch=0; ch<2; ch++){
      const d = buf.getChannelData(ch);
      for (let i=0;i<len;i++){
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
      }
    }
    const c = actx.createConvolver(); c.buffer = buf; return c;
  }
  const reverb = makeReverb(3.2, 2.8);
  const reverbGain = actx.createGain(); reverbGain.gain.value = 0.45;
  reverb.connect(reverbGain); reverbGain.connect(master);
  A.reverb = reverb;

  /* ----- pink-ish noise buffer ----- */
  function noiseBuf(seconds=2.0){
    const rate = actx.sampleRate;
    const len = Math.floor(rate*seconds);
    const buf = actx.createBuffer(1, len, rate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0;i<len;i++){
      const w = Math.random()*2-1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362)*0.11;
      b6 = w*0.115926;
    }
    return buf;
  }
  const nb = noiseBuf(4.0);

  /* ----- water lapping (very low filtered noise + gentle modulation) ----- */
  const water = actx.createBufferSource(); water.buffer = nb; water.loop = true;
  const waterLP = actx.createBiquadFilter(); waterLP.type='lowpass'; waterLP.frequency.value=420; waterLP.Q.value=0.6;
  const waterHP = actx.createBiquadFilter(); waterHP.type='highpass'; waterHP.frequency.value=120;
  const waterGain = actx.createGain(); waterGain.gain.value = 0.10;
  // slow lfo for gentle lapping feel
  const wLfo = actx.createOscillator(); wLfo.frequency.value=0.18;
  const wLfoG = actx.createGain(); wLfoG.gain.value = 0.04;
  wLfo.connect(wLfoG); wLfoG.connect(waterGain.gain); wLfo.start();
  water.connect(waterHP); waterHP.connect(waterLP); waterLP.connect(waterGain); waterGain.connect(master);
  water.start();

  /* ----- steam hiss (faint high) ----- */
  const hiss = actx.createBufferSource(); hiss.buffer = nb; hiss.loop = true;
  const hissHP = actx.createBiquadFilter(); hissHP.type='highpass'; hissHP.frequency.value=4500;
  const hissLP = actx.createBiquadFilter(); hissLP.type='lowpass'; hissLP.frequency.value=9000;
  const hissGain = actx.createGain(); hissGain.gain.value = 0.025;
  hiss.connect(hissHP); hissHP.connect(hissLP); hissLP.connect(hissGain); hissGain.connect(master);
  hiss.start();
  A.hissGain = hissGain;

  /* ----- cicadas — 3 panned layers ----- */
  function cicada(freq, pan, gainV){
    const osc = actx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const tremGain = actx.createGain(); tremGain.gain.value=0;
    const trem = actx.createOscillator(); trem.frequency.value=22 + Math.random()*6; trem.type='square';
    const tremAmp = actx.createGain(); tremAmp.gain.value=0.6;
    trem.connect(tremAmp); tremAmp.connect(tremGain.gain);
    const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq*1.5; bp.Q.value=8;
    const g = actx.createGain(); g.gain.value=gainV;
    const p = actx.createStereoPanner(); p.pan.value=pan;
    osc.connect(tremGain); tremGain.connect(bp); bp.connect(g); g.connect(p); p.connect(master);
    osc.start(); trem.start();
    // slowly modulate base gain so they ebb and flow
    let t = actx.currentTime;
    const update = ()=>{
      const target = (Math.random()*0.5 + 0.5) * gainV;
      g.gain.linearRampToValueAtTime(target, actx.currentTime + 4 + Math.random()*4);
      setTimeout(update, 4000 + Math.random()*5000);
    };
    update();
  }
  cicada(2400, -0.7, 0.012);
  cicada(2900, 0.6,  0.010);
  cicada(2100, 0.1,  0.008);

  /* ----- ambient pad: F major triad, detuned saws, very faint ----- */
  function pad(freq, detune, pan, gv){
    const o1 = actx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=freq; o1.detune.value=-detune;
    const o2 = actx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq; o2.detune.value=detune;
    const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.Q.value=0.5;
    const g = actx.createGain(); g.gain.value=gv;
    const p = actx.createStereoPanner(); p.pan.value=pan;
    o1.connect(lp); o2.connect(lp); lp.connect(g); g.connect(p); p.connect(master);
    p.connect(reverb);
    o1.start(); o2.start();
    // very slow filter sweep
    setInterval(()=>{
      lp.frequency.linearRampToValueAtTime(700 + Math.random()*500, actx.currentTime + 12);
    }, 13000);
  }
  // F major: F3=174.6 A3=220 C4=261.6
  pad(174.61, 6, -0.3, 0.022);
  pad(220.00, 8,  0.0, 0.018);
  pad(261.63, 5,  0.3, 0.020);
  // octave below for warmth
  pad(87.31, 4, 0.0, 0.018);

  /* ----- distant temple bell (deep bronze) ----- */
  function bell(){
    const t0 = actx.currentTime;
    const partials = [
      {f: 80,  g: 0.6, d: 8.0},
      {f: 160, g: 0.4, d: 6.5},
      {f: 240, g: 0.25,d: 4.5},
      {f: 320, g: 0.15,d: 3.5},
      {f: 480, g: 0.08,d: 2.5},
      {f: 640, g: 0.06,d: 1.5},
    ];
    const out = actx.createGain(); out.gain.value = 0.0;
    out.gain.setValueAtTime(0, t0);
    out.gain.linearRampToValueAtTime(0.55, t0+0.02);
    out.gain.exponentialRampToValueAtTime(0.001, t0+8.5);
    out.connect(reverb); out.connect(master);
    for (const p of partials){
      const o = actx.createOscillator(); o.type='sine'; o.frequency.value = p.f * (1 + (Math.random()-0.5)*0.002);
      const g = actx.createGain(); g.gain.value = 0;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(p.g, t0+0.005);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + p.d);
      o.connect(g); g.connect(out);
      o.start(t0); o.stop(t0 + p.d + 0.5);
    }
  }
  A.bell = bell;
  // schedule bell every 3-5 minutes
  function scheduleBell(){
    const wait = 180 + Math.random()*120;
    setTimeout(()=>{ bell(); scheduleBell(); }, wait*1000);
  }
  // first bell after 35-90s
  setTimeout(()=>{ bell(); scheduleBell(); }, (35 + Math.random()*55)*1000);

  /* ----- bamboo fountain "PONG" — deep wood-on-stone thud ----- */
  function pong(){
    const t0 = actx.currentTime;
    // body resonance
    const o1 = actx.createOscillator(); o1.type='triangle'; o1.frequency.value = 95;
    const o2 = actx.createOscillator(); o2.type='sine';     o2.frequency.value = 140;
    const o3 = actx.createOscillator(); o3.type='sine';     o3.frequency.value = 220;
    o1.frequency.setValueAtTime(140, t0);
    o1.frequency.exponentialRampToValueAtTime(85, t0+0.18);
    const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=160; bp.Q.value=4.5;
    const g = actx.createGain(); g.gain.value = 0;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.55, t0+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t0+1.2);
    o1.connect(bp); o2.connect(bp); o3.connect(bp);
    bp.connect(g); g.connect(master); g.connect(reverb);
    o1.start(t0); o2.start(t0); o3.start(t0);
    o1.stop(t0+1.3); o2.stop(t0+1.3); o3.stop(t0+1.3);
    // click attack from noise
    const nbsrc = actx.createBufferSource(); nbsrc.buffer = nb;
    const nlp = actx.createBiquadFilter(); nlp.type='bandpass'; nlp.frequency.value=300; nlp.Q.value=2;
    const ng = actx.createGain(); ng.gain.value = 0.6;
    ng.gain.setValueAtTime(0.6, t0);
    ng.gain.exponentialRampToValueAtTime(0.001, t0+0.08);
    nbsrc.connect(nlp); nlp.connect(ng); ng.connect(master);
    nbsrc.start(t0); nbsrc.stop(t0+0.1);
    // visual flash
    const ind = document.getElementById('pong');
    ind.classList.add('on');
    setTimeout(()=>ind.classList.remove('on'), 280);
  }
  A.pong = pong;

  /* ----- wind in distant trees — occasional swell ----- */
  const wind = actx.createBufferSource(); wind.buffer = nb; wind.loop = true;
  const wLP = actx.createBiquadFilter(); wLP.type='lowpass'; wLP.frequency.value=600;
  const wHP = actx.createBiquadFilter(); wHP.type='highpass'; wHP.frequency.value=200;
  const wG  = actx.createGain(); wG.gain.value = 0.0;
  wind.connect(wHP); wHP.connect(wLP); wLP.connect(wG); wG.connect(master);
  wind.start();
  function gust(){
    const t = actx.currentTime;
    const peak = 0.04 + Math.random()*0.04;
    wG.gain.cancelScheduledValues(t);
    wG.gain.linearRampToValueAtTime(peak, t + 4 + Math.random()*4);
    wG.gain.linearRampToValueAtTime(0.0, t + 12 + Math.random()*8);
    setTimeout(gust, (15 + Math.random()*25)*1000);
  }
  setTimeout(gust, 8000);

  audioReady = true;
}

/* =========================================================================
   SHISHI-ODOSHI STATE MACHINE
   ========================================================================= */
const shishi = {
  state: 'filling',    // filling → tipping → resetting
  fillT: 0,
  fillTarget: 8 + Math.random()*4,  // 8-12s
  pivotAngle: 0,       // current rotation around z
  vel: 0,
  streamLen: 0.6,
};

function updateShishi(dt){
  if (shishi.state === 'filling'){
    shishi.fillT += dt;
    // bamboo tilts gradually as it fills (small visible droop)
    shishi.pivotAngle = THREE.MathUtils.lerp(shishi.pivotAngle, -0.18 * (shishi.fillT/shishi.fillTarget), 0.05);
    // stream visible
    streamMat.opacity = 0.55;
    if (shishi.fillT >= shishi.fillTarget){
      shishi.state = 'tipping';
      shishi.vel = -3.2;  // angular velocity (downward tilt away)
    }
  } else if (shishi.state === 'tipping'){
    shishi.vel -= 9.0 * dt;  // gravity-ish
    shishi.pivotAngle += shishi.vel * dt;
    if (shishi.pivotAngle < -0.85){
      // strikes!
      shishi.pivotAngle = -0.85;
      if (audioReady && A.pong) A.pong();
      shishi.state = 'resetting';
      shishi.vel = 4.0;
    }
  } else if (shishi.state === 'resetting'){
    shishi.vel -= 12.0 * dt;
    shishi.pivotAngle += shishi.vel * dt;
    if (shishi.pivotAngle > 0){
      shishi.pivotAngle = 0;
      shishi.vel = 0;
      shishi.state = 'filling';
      shishi.fillT = 0;
      shishi.fillTarget = 8 + Math.random()*4;
    }
  }
  tipPivot.rotation.z = shishi.pivotAngle;
  // hide stream when tipping/resetting briefly
  streamMat.opacity = (shishi.state === 'filling') ? 0.55 : 0.15;
  // animate stream "flow" by uv-ing... we just shift y a touch
  stream.position.y = 1.40 + Math.sin(performance.now()*0.02)*0.005;
}

/* =========================================================================
   STEAM PULSE STATE
   ========================================================================= */
const pulse = {
  cur: 0.0,
  target: 0.0,
  nextAt: performance.now() + 12000 + Math.random()*8000,
  state: 'idle',  // idle | rising | holding | falling
  stateUntil: 0,
};
function updatePulse(now, dt){
  if (pulse.state === 'idle' && now > pulse.nextAt){
    pulse.state = 'rising';
    pulse.target = 0.85 + Math.random()*0.15;
    pulse.stateUntil = now + 3500;
  } else if (pulse.state === 'rising' && now > pulse.stateUntil){
    pulse.state = 'holding';
    pulse.stateUntil = now + 1500 + Math.random()*1500;
  } else if (pulse.state === 'holding' && now > pulse.stateUntil){
    pulse.state = 'falling';
    pulse.target = 0.0;
    pulse.stateUntil = now + 5000;
  } else if (pulse.state === 'falling' && now > pulse.stateUntil){
    pulse.state = 'idle';
    pulse.nextAt = now + 30000 + Math.random()*30000; // 30-60s
  }
  pulse.cur += (pulse.target - pulse.cur) * Math.min(1, dt*0.7);
  U.steamPulse.value = pulse.cur;
  // bump hiss volume on pulse
  if (audioReady && A.hissGain){
    A.hissGain.gain.linearRampToValueAtTime(0.025 + pulse.cur*0.05, actx.currentTime + 0.5);
  }
}

/* =========================================================================
   ANIMATION LOOP
   ========================================================================= */
let last = performance.now();
let t0 = last;
function tick(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;
  const t = (now - t0)/1000;
  U.time.value = t;

  // smooth camera look
  look.yaw   += (look.targetYaw   - look.yaw)   * 0.08;
  look.pitch += (look.targetPitch - look.pitch) * 0.08;
  // gentle breathing motion
  const breathe = Math.sin(t*0.4)*0.012;
  camera.position.set(
    CAM_HOME.x + Math.sin(t*0.13)*0.01,
    CAM_HOME.y + breathe,
    CAM_HOME.z + Math.cos(t*0.1)*0.008
  );
  // build lookat from yaw/pitch — base direction is forward and slightly down toward mountains
  const baseYaw = -0.05; // looking slightly toward -x of forward (over fence)
  const yaw = baseYaw + look.yaw;
  const pitch = -0.05 + look.pitch;
  const lx = camera.position.x + Math.sin(yaw)*8;
  const ly = camera.position.y + Math.sin(pitch)*4;
  const lz = camera.position.z - Math.cos(yaw)*8;
  camera.lookAt(lx, ly, lz);

  // shishi
  updateShishi(dt);

  // steam pulse
  updatePulse(now, dt);

  // animate steam billboards: rise + reset + face camera + sway
  for (const p of steamPlanes){
    p.position.y += (p.userData.rise + pulse.cur*0.05) * dt * 1.0;
    p.position.x += Math.sin(t*0.3 + p.userData.seed)*p.userData.sway*dt;
    if (p.position.y > p.userData.baseY + 2.4){
      p.position.y = p.userData.baseY - 0.4;
    }
    // billboard
    p.lookAt(camera.position.x, p.position.y, camera.position.z);
  }

  // animate floating leaves
  for (const leaf of leaves){
    const ud = leaf.userData;
    leaf.rotation.z += ud.spin * dt;
    // gentle circular drift on water surface
    const phase = t*ud.drift + ud.seed;
    leaf.position.x = ud.cx + Math.cos(phase)*ud.rad + Math.sin(t*0.2 + ud.seed)*0.04;
    leaf.position.z = ud.cz + Math.sin(phase)*ud.rad + Math.cos(t*0.15 + ud.seed)*0.04;
    leaf.position.y = 0.01 + Math.sin(t*1.3 + ud.seed)*0.006;
  }

  // SHIFT hold detection (5s)
  if (shiftHeld && !monkeyActive && (now - shiftStart) > 5000){
    summonMonkey();
  }
  // monkey behavior
  if (monkeyActive){
    const tLeft = monkeyEndsAt - now;
    // grow in
    if (tLeft > 6500){
      const k = (8000 - tLeft) / 1500;
      monkey.scale.setScalar(THREE.MathUtils.smoothstep(k, 0, 1));
      monkey.position.y = THREE.MathUtils.lerp(-0.4, 0.55, THREE.MathUtils.smoothstep(k,0,1));
    } else if (tLeft > 1500){
      monkey.scale.setScalar(1);
      monkey.position.y = 0.55 + Math.sin(t*1.4)*0.005; // tiny breathing
      // slow head turn
      monkey.rotation.y = Math.sin(t*0.3)*0.25 - 0.6;
    } else if (tLeft > 0){
      // amble off
      const k = 1 - tLeft/1500;
      monkey.position.x -= 0.6*dt;
      monkey.position.y = 0.55 + Math.sin(t*1.4)*0.005;
      monkey.scale.setScalar(1 - k*0.3);
    } else {
      monkeyActive = false;
      monkey.visible = false;
    }
  }

  // gentle lantern flicker
  lantern.intensity = 0.7 + Math.sin(t*7.0)*0.04 + (Math.random()-0.5)*0.04;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* =========================================================================
   CLOCK — gentle tick from 17:32 forward
   ========================================================================= */
const clockEl = document.getElementById('clock');
let clockMin = 17*60 + 32;
const startMs = Date.now();
setInterval(()=>{
  // advance 1 minute every ~25 real seconds for slow dusk feel
  clockMin = (17*60 + 32) + Math.floor((Date.now()-startMs)/25000);
  const hh = Math.floor(clockMin/60) % 24;
  const mm = clockMin % 60;
  clockEl.textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}, 1000);

/* =========================================================================
   RESIZE
   ========================================================================= */
window.addEventListener('resize', ()=>{
  renderer.setSize(W(),H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});

/* =========================================================================
   prevent context menu on canvas + tap gate
   ========================================================================= */
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('touchstart', ()=>{ if (!audioReady) { /* user must click gate */ } }, {passive:true});

/* end */
</script>
