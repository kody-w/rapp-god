<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0805);
scene.fog = new THREE.FogExp2(0x0c0a06, 0.06);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 30);
camera.position.set(0, 1.55, 2);
camera.lookAt(0, 0.85, 0);

// ── Wooden desk ──
const deskMat = new THREE.MeshStandardMaterial({color:0x3a2a18, roughness:0.7, metalness:0.05});
const desk = new THREE.Mesh(new THREE.BoxGeometry(3, 0.06, 1.6), deskMat);
desk.position.set(0, 0.7, 0);
scene.add(desk);
[[1.4, 0.35, 0.7], [-1.4, 0.35, 0.7], [1.4, 0.35, -0.7], [-1.4, 0.35, -0.7]].forEach(p => {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.7, 0.06), deskMat);
  leg.position.set(p[0], p[1], p[2]);
  scene.add(leg);
});

// ── Typewriter base ──
const tpMat = new THREE.MeshStandardMaterial({color:0x080604, roughness:0.4, metalness:0.3});
const tpAccentMat = new THREE.MeshStandardMaterial({color:0x4a3020, roughness:0.5, metalness:0.4});
const tpKeysMat = new THREE.MeshStandardMaterial({color:0xe8e0d0, roughness:0.5});
const tpKeysMatRed = new THREE.MeshStandardMaterial({color:0xb83020, roughness:0.5});

// Body
const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.20, 0.5), tpMat);
body.position.set(0, 0.84, -0.05);
scene.add(body);
// Brand plate
const plate = new THREE.Mesh(
  new THREE.BoxGeometry(0.18, 0.04, 0.01),
  new THREE.MeshStandardMaterial({color:0xc8a050, metalness:0.7, roughness:0.3})
);
plate.position.set(0, 0.96, 0.20);
scene.add(plate);

// Carriage (top, with paper)
const carriageGroup = new THREE.Group();
const carriage = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.05, 0.20), tpAccentMat);
carriage.position.set(0, 0, 0);
carriageGroup.add(carriage);
// Paper rolled in
const paperMat = new THREE.MeshStandardMaterial({color:0xf4eedd, roughness:0.7});
const paperFront = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.55), paperMat);
paperFront.position.set(0, 0.30, 0.005);
carriageGroup.add(paperFront);
// Roller
const roller = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.5, 16), tpAccentMat);
roller.position.set(0, 0.04, 0);
roller.rotation.z = Math.PI/2;
carriageGroup.add(roller);
// Knobs on roller
[[0.27, 0.04, 0], [-0.27, 0.04, 0]].forEach(p => {
  const knob = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.04, 12), tpMat);
  knob.position.set(p[0], p[1], p[2]);
  knob.rotation.z = Math.PI/2;
  carriageGroup.add(knob);
});
// Bell on left
const bell = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6, 0, Math.PI*2, 0, Math.PI/2), tpAccentMat);
bell.position.set(-0.32, 0.08, 0.05);
carriageGroup.add(bell);
carriageGroup.position.set(0, 0.95, -0.15);
scene.add(carriageGroup);

// Keys (4 rows × 10 keys)
const keysGroup = new THREE.Group();
const keysData = [];
const keyRows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM,.', '         '];
const keyW = 0.045;
const keySpaceX = 0.052;
for (let row = 0; row < 4; row++) {
  const rowOffset = row * 0.045;
  const rowZ = 0.10 - row * 0.04;
  const rowKeys = keyRows[row];
  const numInRow = (row === 3) ? 1 : rowKeys.length;
  const totalW = numInRow * keySpaceX;
  for (let i = 0; i < numInRow; i++) {
    const x = (row === 3) ? 0 : (i - rowKeys.length/2 + 0.5) * keySpaceX;
    const w = (row === 3) ? 0.4 : keyW;  // spacebar wider
    const k = new THREE.Mesh(new THREE.CylinderGeometry(w/2, w/2 * 1.1, 0.025, 8), tpKeysMat);
    k.position.set(x, 0.83 + row * 0.005, rowZ + rowOffset * 0.5);
    k.rotation.x = -0.18;  // angle for typewriter look
    keysGroup.add(k);
    keysData.push({mesh: k, baseY: k.position.y, char: rowKeys[i] || ' '});
  }
}
scene.add(keysGroup);

lampShade.rotation.x = Math.PI;

    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec3 sky = mix(vec3(0.06,0.05,0.10), vec3(0.10,0.10,0.20), 1.0-vUv.y);

      if (r > 0.985) sky += vec3(0.7) * 0.6;
      gl_FragColor = vec4(sky, 1.0);

win.position.set(0, 1.7, -1.49);
scene.add(win);

[[0,1.96,-1.48,0.85,0.04,0.02],[0,1.44,-1.48,0.85,0.04,0.02],
 [0.42,1.7,-1.48,0.04,0.55,0.02],[-0.42,1.7,-1.48,0.04,0.55,0.02]].forEach(p=>{
  const m=new THREE.Mesh(new THREE.BoxGeometry(p[3],p[4],p[5]),winFrameMat);

});

const fillLight = new THREE.DirectionalLight(0x4060a0, 0.15);
fillLight.position.set(0, 5, -10);
scene.add(fillLight);

// ── Procedural story generator ──
const subjects = ['the man', 'the woman', 'the boy', 'the doctor', 'the stranger', 'she', 'he', 'the captain', 'the teacher', 'no one in particular'];
const verbs = ['walked through', 'stared at', 'remembered', 'tried to forget', 'opened', 'closed', 'searched for', 'whispered to', 'turned away from', 'paused before', 'considered'];
const objects = ['the empty room', 'the photograph', 'the dark window', 'his old letters', 'her hands', 'the rusted gate', 'the kettle', 'the train timetable', 'a half-finished sentence', 'the dog', 'a piano', 'his father\'s coat'];
const adverbs = ['slowly', 'carefully', 'without hurry', 'as if for the last time', 'with sudden recognition', 'silently', 'reluctantly', 'almost smiling', 'eventually'];
const conjunctions = ['. Then ', '. After that, ', '. ', '. Later, ', '. The next morning, ', '. ', '. By midnight, ', '. ', '. '];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

let storyText = "";
let writtenText = "";
let nextSentence = generateSentence();

function generateSentence() {
  const useAdverb = Math.random() < 0.5;
  const phrase = pick(subjects) + ' ' + pick(verbs) + ' ' + pick(objects);
  return useAdverb ? phrase + ', ' + pick(adverbs) : phrase;
}

function getNextChar() {
  if (writtenText.length >= storyText.length) {
    // Add new sentence
    const conj = (storyText.length === 0) ? '' : pick(conjunctions);
    storyText += conj + nextSentence.charAt(0).toUpperCase() + nextSentence.slice(1);
    nextSentence = generateSentence();
  }
  const c = storyText.charAt(writtenText.length);
  writtenText += c;
  return c;
}

// ── Audio: typewriter clacks + ambient ──
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.50;
  masterGain.connect(audioCtx.destination);

  // Faint room ambient (low filtered noise)
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const room = audioCtx.createBufferSource();
  room.buffer = buf; room.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 250;
  const g = audioCtx.createGain(); g.gain.value = 0.06;
  room.connect(lp).connect(g).connect(masterGain);
  room.start();

  // Distant cricket (one occasional)
  function scheduleCricket() {
    const next = 30 + Math.random() * 60;
    setTimeout(() => { if (audioCtx) { cricket(); scheduleCricket(); } }, next * 1000);
  }
  scheduleCricket();
  function cricket() {
    if (!audioCtx) return;
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.value = 5200;
        const cg = audioCtx.createGain(); cg.gain.value = 0;
        cg.gain.linearRampToValueAtTime(0.012, t + 0.001);
        cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.025);
        const cp = audioCtx.createStereoPanner(); cp.pan.value = -0.7;
        o.connect(cg).connect(cp).connect(masterGain);
        o.start(t); o.stop(t + 0.04);
      }, i * 35);
    }
  }
}

function clack(isBig) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Two-component clack: high snap (filtered noise) + lower thud (sine pitch envelope)
  const dur = 0.06;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random()*2-1) * Math.exp(-i/d.length * 12);
  }
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 2400 + Math.random()*1600; bp.Q.value = 4;
  const sg = audioCtx.createGain(); sg.gain.value = 0.07 + Math.random()*0.02;
  s.connect(bp).connect(sg).connect(masterGain);
  s.start(t0);

  // Low thud
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(180 + Math.random()*60, t0);
  o.frequency.exponentialRampToValueAtTime(60, t0 + 0.06);
  const og = audioCtx.createGain(); og.gain.value = 0;
  og.gain.linearRampToValueAtTime(0.06, t0 + 0.005);
  og.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.10);
  o.connect(og).connect(masterGain);
  o.start(t0); o.stop(t0 + 0.12);
}

function ring() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Bell: 3 partial sine cluster
  [1200, 2400, 3600].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.04 / (i+1), t0 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.5);
    o.connect(g).connect(masterGain);
    o.start(t0); o.stop(t0 + 1.6);
  });
}

function carriageReturn() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Whirring-mechanical sound
  const dur = 0.4;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length * 3) * 0.7;
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 2;
  const g = audioCtx.createGain(); g.gain.value = 0.06;
  s.connect(bp).connect(g).connect(masterGain);
  s.start(t0);
}

// ── Animation ──
let prev = performance.now(), time = 0;
const animatedKeys = [];

// Track text written
let textVisible = '';
const LINE_WIDTH = 50;  // chars per line
let charsThisLine = 0;

function updateText() {
  // Convert raw written text to display with line wraps + insertion of <br>
  const lines = [];
  let currentLine = '';
  let charCount = 0;
  for (let i = 0; i < writtenText.length; i++) {
    const c = writtenText[i];
    currentLine += c;
    charCount++;
    if (charCount >= LINE_WIDTH || c === '\n') {
      lines.push(currentLine);
      currentLine = '';
      charCount = 0;
    }
  }
  if (currentLine) lines.push(currentLine);
  document.getElementById('text-content').innerHTML = lines.slice(-12).join('<br>');
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  winShader.uniforms.time.value = time;

  // Animate keys
  for (let i = animatedKeys.length - 1; i >= 0; i--) {
    const a = animatedKeys[i];
    const elapsed = now - a.t0;
    const phase = elapsed / 100;  // 100ms cycle
    if (phase >= 1) {
      a.key.position.y = a.baseY;
      animatedKeys.splice(i, 1);
    } else if (phase < 0.3) {
      a.key.position.y = a.baseY - 0.012 * (phase / 0.3);
    } else {
      a.key.position.y = a.baseY - 0.012 * (1 - (phase - 0.3) / 0.7);
    }
  }

  // Slight camera breath
  camera.position.x = Math.sin(time * 0.2) * 0.03;
  camera.position.y = 1.55 + Math.sin(time * 0.27) * 0.015;
  camera.lookAt(0, 0.92, 0);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
});

// Type any letter to advance
window.addEventListener('keydown', (e) => {
  // Filter to only character keys
  if (e.key.length !== 1 && e.key !== 'Enter' && e.key !== 'Backspace' && e.key !== ' ') return;
  e.preventDefault();
  if (e.key === 'Backspace') {
    if (writtenText.length > 0) {
      writtenText = writtenText.slice(0, -1);
      updateText();
    }
    return;
  }
  // Get next char from procedural story
  const c = getNextChar();
  // Animate a random key
  if (keysData.length > 0) {
    const k = keysData[Math.floor(Math.random() * keysData.length)];
    animatedKeys.push({ key: k.mesh, baseY: k.baseY, t0: performance.now() });
  }
  charsThisLine++;
  // Bell at LINE_WIDTH-7 chars (warning before line end)
  if (charsThisLine === LINE_WIDTH - 5) ring();
  // Carriage return at LINE_WIDTH
  if (charsThisLine >= LINE_WIDTH) {
    carriageReturn();
    charsThisLine = 0;
  } else {
    clack();
  }
  updateText();
});
</script>
