<style>
:root {
  --ink: #efe9dd;
  --dim: rgba(239,233,221,0.55);
  --faint: rgba(239,233,221,0.22);
  --bg: #0a0907;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background: var(--bg); color: var(--ink);
  font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}
canvas { display:block; }

#stage {
  position: fixed; inset:0;
  background: radial-gradient(ellipse at center, #1a140d 0%, #050403 80%);
}

/* Cinematic vignette overlay */
#vignette {
  position: fixed; inset:0; pointer-events:none; z-index: 5;
  background:
    radial-gradient(ellipse at center,
      rgba(0,0,0,0) 40%,
      rgba(0,0,0,0.35) 75%,
      rgba(0,0,0,0.7) 100%);
  mix-blend-mode: multiply;
}
/* Subtle warm grain */
#grain {
  position: fixed; inset:0; pointer-events:none; z-index: 6;
  opacity: 0.06;
  background-image:
    repeating-radial-gradient(circle at 13% 27%, rgba(240,200,140,0.5) 0 1px, transparent 1px 3px),
    repeating-radial-gradient(circle at 73% 41%, rgba(220,180,120,0.4) 0 1px, transparent 1px 4px),
    repeating-radial-gradient(circle at 47% 89%, rgba(255,220,170,0.4) 0 1px, transparent 1px 5px);
  animation: grainShift 0.8s steps(6) infinite;
  mix-blend-mode: overlay;
}
@keyframes grainShift {
  0%   { transform: translate(0,0); }
  20%  { transform: translate(-1px,1px); }
  40%  { transform: translate(1px,-1px); }
  60%  { transform: translate(-1px,-1px); }
  80%  { transform: translate(1px,1px); }
  100% { transform: translate(0,0); }
}

/* HUD */
#hud {
  position: fixed; inset:0; pointer-events:none; z-index: 10;
  font-family: 'Noto Serif JP', serif;
  color: var(--ink);
  user-select: none;
}
.season-display {
  position: absolute;
  bottom: 38px; left:50%; transform: translateX(-50%);
  text-align:center;
  opacity: 0.85;
  transition: opacity 1.2s ease;
}
.kanji {
  font-size: 32px; font-weight: 300;
  letter-spacing: 0.18em;
  text-shadow: 0 0 18px rgba(0,0,0,0.6);
  color: var(--ink);
}
.romaji {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.4em;
  margin-top: 6px;
  color: var(--dim);
  text-transform: lowercase;
}

/* Vertical "ma" indicator on the right */
.ma-indicator {
  position: absolute;
  right: 32px; top:50%; transform: translateY(-50%);
  width: 1px; height: 180px;
  background: linear-gradient(to bottom, transparent, var(--faint), transparent);
}
.ma-glyph {
  position: absolute;
  right: 18px; top: 50%; transform: translateY(-50%);
  font-size: 22px;
  color: var(--faint);
  letter-spacing: 0.1em;
  writing-mode: vertical-rl;
  font-weight: 200;
  transition: color 0.5s, opacity 0.6s;
  opacity: 0.5;
}
.ma-glyph.active { color: var(--ink); opacity: 0.95; }

/* Top-left whisper of title */
.title {
  position: absolute;
  top: 28px; left: 32px;
  font-size: 14px;
  color: var(--dim);
  letter-spacing: 0.25em;
  font-weight: 300;
}
.title .sub {
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  display:block;
  margin-top: 4px;
  color: var(--faint);
  letter-spacing: 0.4em;
  text-transform: lowercase;
}

/* Bottom-right hints */
.hint {
  position: absolute;
  bottom: 28px; right: 32px;
  text-align: right;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--faint);
  line-height: 1.9;
  text-transform: lowercase;
}
.hint b { color: var(--dim); font-weight: 300; font-style: normal; font-family: 'Noto Serif JP', serif; margin-right: 8px; }

/* Click to begin overlay */
#begin {
  position: fixed; inset:0; z-index: 100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at center, #14100a 0%, #050403 90%);
  cursor: pointer;
  transition: opacity 1.6s ease;
}
#begin.fade { opacity: 0; pointer-events:none; }
#begin .mark {
  font-size: 96px; font-weight: 200;
  color: #d6c9a8;
  letter-spacing: 0.18em;
  text-shadow: 0 0 40px rgba(220,180,120,0.18);
}
#begin .word {
  margin-top: 28px;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(214,201,168,0.55);
  letter-spacing: 0.55em;
  text-transform: lowercase;
}
#begin .pulse {
  margin-top: 60px;
  width: 6px; height:6px; border-radius:50%;
  background: rgba(214,201,168,0.6);
  animation: pulse 2.6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.25; transform: scale(1); }
  50%     { opacity: 0.9;  transform: scale(1.6); }
}

/* Bow / pour quick captions */
.gesture {
  position: absolute;
  top:50%; left:50%; transform: translate(-50%,-50%);
  font-size: 28px; color: var(--ink); opacity:0;
  letter-spacing: 0.3em; font-weight: 300;
  text-shadow: 0 0 20px rgba(0,0,0,0.7);
  transition: opacity 0.6s ease;
}
.gesture.show { opacity: 0.9; }

@media (max-width: 640px){

  .hint{ display:none;}
  .kanji{ font-size:24px;}
  #begin .mark{ font-size:64px;}
}
</style>

<script type="module">
import * as THREE from 'three';

// ============================================================================
//  TEA CEREMONY · 茶の湯
//  A wabi-sabi single-room contemplation in four seasons.
//  Stillness is the deliverable.
// ============================================================================

// ---------- Tunables ----------
const BPM = 72;
const BEAT_MS = 60000 / BPM;       // ~833ms per beat
const PETAL_COUNT = 30;
const STEAM_LAYERS = 8;

// ---------- Scene state ----------
const SEASONS = ['spring', 'summer', 'autumn', 'winter'];
const KANJI = { spring:'春', summer:'夏', autumn:'秋', winter:'冬' };
const ROMAJI = {
  spring:'haru · spring',
  summer:'natsu · summer',
  autumn:'aki · autumn',
  winter:'fuyu · winter'
};
let seasonIndex = 0;
const sceneState = {
  seasonIndex: 0,
  prevSeason: 'spring',
  currentSeason: 'spring',
  blend: 1.0,         // 0 = mid-transition, 1 = fully on currentSeason
  // smoothed visual values
  light: { warm:1, cool:0, intensity:1.0 },
  foliage: { green:0.6, pink:1.0, red:0, white:0 },
};

// Pentatonic scales — semitones from root.
// Real Japanese modes; root pitches per season chosen to suit mood.
const SCALES = {
  hirajoshi: [0, 2, 3, 7, 8],   // D mode-ish
  ryo:       [0, 2, 4, 7, 9],   // bright (major-pentatonic-like)
  insen:     [0, 1, 5, 7, 10],  // dark, contemplative
  kumoi:     [0, 2, 3, 7, 9]    // melancholic, "cloud well"
};
const SEASON_SCALE = {
  spring: { name:'hirajoshi', notes:SCALES.hirajoshi, rootMidi: 62 }, // D4
  summer: { name:'ryo',       notes:SCALES.ryo,       rootMidi: 64 }, // E4 — brighter
  autumn: { name:'insen',     notes:SCALES.insen,     rootMidi: 60 }, // C4 — somber
  winter: { name:'kumoi',     notes:SCALES.kumoi,     rootMidi: 57 }  // A3 — low, hollow
};

// ============================================================================
//  THREE.JS SETUP
// ============================================================================
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a140d, 0.045);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.05, 80);
camera.position.set(0, 1.15, 2.7);
camera.lookAt(0, 0.55, 0);

// ---------- Lights (will be tinted per season) ----------

// ---- Tatami shader: subtle stripes modulated by perlin-ish noise ----
const tatamiVS = `
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vWorld;
void main(){
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorld = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;

const tatamiFS = `
precision highp float;
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vWorld;
uniform vec3 uWarm;
uniform vec3 uShade;
uniform float uTime;
uniform float uSeasonCool; // 0=warm, 1=cool gray (winter)

// hash + value-noise (poor-man's perlin)
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  float a = hash(i);
  float b = hash(i+vec2(1.,0.));
  float c = hash(i+vec2(0.,1.));
  float d = hash(i+vec2(1.,1.));
  vec2 u = f*f*(3.-2.*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v = 0.0; float a = 0.5;
  for(int i=0;i<5;i++){ v += a*vnoise(p); p *= 2.07; a *= 0.5; }
  return v;
}

void main(){
  // tatami mat tiling — long stripes (weave), each mat ~ 1.0 x 0.5
  vec2 uv = vUv * vec2(8.0, 16.0);
  // weave stripes
  float warp = sin(uv.y * 3.14159 * 22.0) * 0.5 + 0.5;
  float weft = sin(uv.x * 3.14159 * 22.0) * 0.5 + 0.5;
  float weave = mix(warp, weft, step(0.5, fract(uv.x*0.5)+fract(uv.y*0.5)*0.0));
  // perlin-ish noise variation
  float n = fbm(vUv * 14.0);
  float wear = smoothstep(0.2, 0.9, fbm(vUv*3.0));
  // base colors
  vec3 straw = mix(uShade, uWarm, 0.35 + 0.55*weave + 0.15*n);
  // borders between mats — every 0.5 units in v, tape-like darker line
  float edgeV = smoothstep(0.48,0.5, fract(vUv.y*4.0)) - smoothstep(0.5,0.52, fract(vUv.y*4.0));
  float edgeU = smoothstep(0.48,0.5, fract(vUv.x*2.0)) - smoothstep(0.5,0.52, fract(vUv.x*2.0));
  float edge = clamp(edgeV+edgeU,0.0,1.0);
  vec3 edgeCol = vec3(0.05,0.04,0.03);
  vec3 col = mix(straw, edgeCol, edge*0.7);
  // wear darkening
  col *= 0.85 + 0.15*wear;
  // cool tint in winter
  vec3 winterTint = vec3(0.78, 0.80, 0.85);
  col = mix(col, col*winterTint, uSeasonCool*0.55);

  // simple lambert-ish shading using world normal vs sun dir (approx +x +y)
  vec3 sunDir = normalize(vec3(0.6,0.85,0.2));
  float diff = max(dot(vNormal, sunDir),0.0);
  col *= 0.55 + 0.6*diff;

  gl_FragColor = vec4(col, 1.0);
}`;

const shojiVS = `

void main(){

const shojiFS = `
precision highp float;
varying vec2 vUv;
varying vec3 vNormal;
uniform vec3 uPaperWarm;
uniform vec3 uPaperCool;
uniform float uBleed;       // 0..1
uniform vec3 uOutsideTint;  // foliage seen through screen (smudged)
uniform float uTime;
uniform float uSeasonCool;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  float a = hash(i);
  float b = hash(i+vec2(1.,0.));
  float c = hash(i+vec2(0.,1.));
  float d = hash(i+vec2(1.,1.));
  vec2 u = f*f*(3.-2.*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<4;i++){ v += a*vnoise(p); p*=2.13; a*=0.5; }
  return v;
}

void main(){
  // Paper grain — fine fibers
  float fiber = fbm(vUv*vec2(180.0, 14.0));
  float crinkle = fbm(vUv*8.0);
  vec3 paper = mix(uPaperCool, uPaperWarm, 0.55 + 0.45*fiber*crinkle);

  // Smudged outside foliage — soft blobs of color
  float blob = fbm(vUv*3.5 + uTime*0.02);
  float blob2 = fbm(vUv*7.0 + 0.3);
  float outside = smoothstep(0.4, 0.85, blob*0.7+blob2*0.3);
  paper = mix(paper, paper*uOutsideTint, outside*0.55);

  // Light bleed — bright halo from outside sun
  float bleed = smoothstep(0.0, 0.6, vUv.y) * smoothstep(1.0, 0.4, vUv.y);
  bleed *= mix(0.6, 1.0, uBleed);
  paper += vec3(1.0,0.78,0.45) * bleed * 0.55 * (1.0 - uSeasonCool*0.55);

  // wood lattice (kumiko) — dark grid
  float gridX = step(0.97, abs(sin(vUv.x*3.14159*8.0)));
  float gridY = step(0.97, abs(sin(vUv.y*3.14159*5.0)));
  float frame = clamp(gridX+gridY,0.0,1.0);
  vec3 wood = vec3(0.10,0.07,0.05);
  vec3 col = mix(paper, wood, frame);

  // outer thicker frame
  float bx = smoothstep(0.005,0.0, vUv.x) + smoothstep(0.995,1.0, vUv.x);
  float by = smoothstep(0.005,0.0, vUv.y) + smoothstep(0.995,1.0, vUv.y);
  col = mix(col, wood, clamp(bx+by,0.0,1.0));

  gl_FragColor = vec4(col, 1.0);
}`;

const steamFS = `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform float uOffset;
uniform float uIntensity;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  float a = hash(i); float b = hash(i+vec2(1.,0.));
  float c = hash(i+vec2(0.,1.)); float d = hash(i+vec2(1.,1.));
  vec2 u = f*f*(3.-2.*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v += a*vnoise(p); p*=2.07; a*=0.5; }

}

void main(){

  float r = length(uv);
  float t = uTime*0.18;
  float n = fbm(uv*3.0 + vec2(t, t*0.7) + uOffset*5.0);

  float mask = smoothstep(0.55, 0.0, length(uv*vec2(1.6, 0.9)));

  alpha = pow(alpha, 1.6);
  vec3 col = vec3(0.92, 0.92, 0.94);
  gl_FragColor = vec4(col, alpha*0.5);
}`;

// L-system: build branches recursively into a single LineSegments + leaves group
const bonsaiGroup = new THREE.Group();
bonsaiGroup.position.y = 0.255;
tableGroup.add(bonsaiGroup);

const branchMat = new THREE.MeshStandardMaterial({ color: 0x1a100a, roughness: 0.95 });
const leafMatBase = new THREE.MeshStandardMaterial({
  color: 0x6f9550, roughness: 0.7, side: THREE.DoubleSide,
  transparent: true, opacity: 0.95
});

function buildBonsai(){
  while (bonsaiGroup.children.length) bonsaiGroup.remove(bonsaiGroup.children[0]);

  // L-system: F = forward, +/- = rotate, [ ] = branch
  // We'll do a stochastic recursion instead for organic feel.
  const rng = mulberry32(12345);
  const leaves = [];
  function grow(p, dir, length, thick, depth){
    if (depth > 5 || length < 0.012) return;
    const end = p.clone().add(dir.clone().multiplyScalar(length));
    // Branch cylinder
    const branchGeo = new THREE.CylinderGeometry(thick*0.7, thick, length, 6, 1, false);
    const branch = new THREE.Mesh(branchGeo, branchMat);
    // orient cylinder along dir
    const mid = p.clone().add(end).multiplyScalar(0.5);
    branch.position.copy(mid);
    const up = new THREE.Vector3(0,1,0);
    const q = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
    branch.quaternion.copy(q);
    bonsaiGroup.add(branch);

    // Leaves clustered at branch ends and along smaller branches
    if (depth >= 3) {
      const count = 2 + Math.floor(rng()*3);
      for (let i=0;i<count;i++){
        const lp = end.clone().add(new THREE.Vector3(
          (rng()-0.5)*0.04,
          (rng()-0.5)*0.04,
          (rng()-0.5)*0.04
        ));
        leaves.push(lp);
      }
    }

    if (depth >= 5) return;
    // Spawn 2-3 children with stochastic angle
    const children = 2 + (rng()<0.35?1:0);
    for (let i=0;i<children;i++){
      const angle = (rng()-0.5) * 0.9;
      const tilt  = (rng()-0.5) * 0.9;
      const newDir = dir.clone();
      newDir.applyAxisAngle(new THREE.Vector3(0,0,1), angle);
      newDir.applyAxisAngle(new THREE.Vector3(1,0,0), tilt);
      // Bias up-ish
      newDir.y = Math.max(newDir.y, 0.15);
      newDir.normalize();
      const newLen = length * (0.62 + rng()*0.18);
      const newThick = thick * 0.62;
      grow(end, newDir, newLen, newThick, depth+1);
    }
  }
  grow(new THREE.Vector3(0,0,0), new THREE.Vector3(0,1,0), 0.09, 0.012, 0);

  // Build merged leaf cloud as instanced points (using sphere-ish small geos)
  const leafGeo = new THREE.PlaneGeometry(0.022, 0.022);
  const leafColor = currentLeafColor();
  const leafMat = leafMatBase.clone();
  leafMat.color.copy(leafColor);

    const s = 0.7 + Math.random()*0.7;
    dummy.scale.set(s,s,s);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  }
  inst.instanceMatrix.needsUpdate = true;
  bonsaiGroup.add(inst);
  bonsaiGroup.userData.leafInst = inst;
  bonsaiGroup.userData.leafCount = leaves.length;

// Deterministic random
function mulberry32(seed){
  let a = seed | 0;
  return function(){
    a = (a + 0x6D2B79F5) | 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Texture for petal — generated procedurally on canvas
function makePetalTexture(type){
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.clearRect(0,0,64,64);
  if (type === 'blossom'){
    // five-pointed soft pink petal
    const grd = g.createRadialGradient(32,32,2,32,32,30);
    grd.addColorStop(0, 'rgba(255,225,235,1)');
    grd.addColorStop(0.5, 'rgba(255,180,200,0.9)');
    grd.addColorStop(1, 'rgba(255,180,200,0)');
    g.fillStyle = grd;
    g.beginPath();
    // single curved petal shape
    g.moveTo(32, 6);
    g.bezierCurveTo(54, 18, 54, 50, 32, 58);
    g.bezierCurveTo(10, 50, 10, 18, 32, 6);
    g.closePath();
    g.fill();
  } else if (type === 'green'){
    const grd = g.createLinearGradient(32,8,32,56);
    grd.addColorStop(0, 'rgba(140,200,120,0.9)');
    grd.addColorStop(1, 'rgba(60,120,40,0.0)');
    g.fillStyle = grd;
    g.beginPath();
    g.moveTo(32,8); g.bezierCurveTo(60, 28, 50, 56, 32, 56);
    g.bezierCurveTo(14, 56, 4, 28, 32, 8); g.closePath();
    g.fill();
  } else if (type === 'maple'){
    g.fillStyle = '#c64a1f';
    g.translate(32,32);
    // five-lobed maple-ish star
    g.beginPath();
    for (let i=0;i<5;i++){
      const a = (i/5)*Math.PI*2 - Math.PI/2;
      const x = Math.cos(a)*22, y = Math.sin(a)*22;
      g.lineTo(x,y);
      const a2 = ((i+0.5)/5)*Math.PI*2 - Math.PI/2;
      const x2 = Math.cos(a2)*9, y2 = Math.sin(a2)*9;
      g.lineTo(x2,y2);
    }
    g.closePath(); g.fill();
    // tinge
    g.globalAlpha = 0.4; g.fillStyle = '#7a1a08';
    g.beginPath(); g.arc(0,0,8,0,Math.PI*2); g.fill();
  } else if (type === 'snow'){
    const grd = g.createRadialGradient(32,32,1,32,32,18);
    grd.addColorStop(0,'rgba(255,255,255,1)');
    grd.addColorStop(0.6,'rgba(220,235,255,0.7)');
    grd.addColorStop(1,'rgba(220,235,255,0)');
    g.fillStyle = grd;
    g.fillRect(0,0,64,64);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

let nextGust = 6 + Math.random()*8;
let gustTimer = 0;
let gustForce = new THREE.Vector3(0,0,0);

function updatePetals(dt){
  gustTimer += dt;
  if (gustTimer > nextGust){
    gustTimer = 0;
    nextGust = 8 + Math.random()*14;
    gustForce.set(
      (Math.random()-0.3)*0.4,
      0.1,
      (Math.random()-0.5)*0.3
    );
    // Decay handled per frame
    setTimeout(()=>{ gustForce.set(0,0,0); }, 1200 + Math.random()*1500);
  }

  // Boids: simple cohesion / separation / alignment
  const COH = 0.0008, SEP = 0.04, ALI = 0.0006, NEIGHBOR = 0.7;
  const center = new THREE.Vector3();
  const avgVel = new THREE.Vector3();
  let n = 0;
  // Pre-compute means
  for (const p of petals){ center.add(p.position); avgVel.add(p.userData.vel); n++; }
  center.divideScalar(n); avgVel.divideScalar(n);

  for (const p of petals){
    const u = p.userData;
    // cohesion toward center (very gentle)
    u.vel.add(center.clone().sub(p.position).multiplyScalar(COH));
    // alignment
    u.vel.add(avgVel.clone().sub(u.vel).multiplyScalar(ALI));
    // separation from too-close neighbors
    let sep = new THREE.Vector3();
    for (const q of petals){
      if (q === p) continue;
      const d = p.position.distanceTo(q.position);
      if (d < NEIGHBOR && d > 0.0001){
        sep.add(p.position.clone().sub(q.position).divideScalar(d*d));
      }
    }
    u.vel.add(sep.multiplyScalar(SEP));

    // gust
    u.vel.add(gustForce.clone().multiplyScalar(dt*0.6));

    // gravity (snow falls straight, petals drift)
    if (u.type === 'snow') u.vel.y -= 0.02*dt;
    else u.vel.y -= 0.005*dt;

    // damp
    u.vel.multiplyScalar(0.985);

    // sway
    p.position.x += Math.sin(performance.now()*0.0008 + u.phase) * 0.0015;
    p.position.add(u.vel.clone().multiplyScalar(dt*30));

    // rotation
    p.rotateOnAxis(u.rotAxis, u.rotSpeed * dt);

    // recycle when off-floor
    if (p.position.y < -0.2 || Math.abs(p.position.x) > 4 || Math.abs(p.position.z) > 3){
      p.position.set(
        (Math.random()-0.5)*5,
        2.4 + Math.random()*1.0,
        (Math.random()-0.5)*4
      );
      u.vel.set(
        (Math.random()-0.5)*0.06,
        -0.05 - Math.random()*0.04,
        (Math.random()-0.5)*0.06
      );
    }
  }
}

//  AUDIO — Karplus-Strong koto, wind, bell, birds
// ============================================================================
let audioCtx = null;
let masterGain = null;
let reverbNode = null;
let koto = null;
let ambience = null;

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);
  // simple reverb via convolver with a generated short impulse
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = makeImpulse(audioCtx, 2.4, 2.0);
  const dryGain = audioCtx.createGain(); dryGain.gain.value = 0.55;
  const wetGain = audioCtx.createGain(); wetGain.gain.value = 0.45;
  // bus structure: instruments -> bus -> [dry -> master, wet -> reverb -> master]
  const bus = audioCtx.createGain();
  bus.gain.value = 1.0;
  bus.connect(dryGain).connect(masterGain);
  bus.connect(reverbNode).connect(wetGain).connect(masterGain);

  koto = new KotoEngine(audioCtx, bus);
  koto.setSeason(sceneState.currentSeason);
  ambience = new AmbienceEngine(audioCtx, bus);

  // fade in master
  masterGain.gain.setTargetAtTime(0.85, audioCtx.currentTime, 1.5);
}

function makeImpulse(ctx, duration, decay){
  const rate = ctx.sampleRate;
  const length = rate * duration;
  const buffer = ctx.createBuffer(2, length, rate);
  for (let ch=0; ch<2; ch++){
    const data = buffer.getChannelData(ch);
    for (let i=0; i<length; i++){
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/length, decay);
    }
  }
  return buffer;
}

// -------- Karplus-Strong koto --------
class KotoEngine {
  constructor(ctx, dest){
    this.ctx = ctx;
    this.dest = dest;
    this.scale = SEASON_SCALE.spring;
    this.bufferCache = new Map(); // midi -> AudioBuffer
    this.nextNoteAt = 0;
    this.maActive = false;
    this.maGlyph = document.getElementById('maGlyph');
    this.start();
  }

  setSeason(season){
    this.scale = SEASON_SCALE[season];
    // Clear cache so timbre subtly responds to season root
    this.bufferCache.clear();
  }

  midiToFreq(m){ return 440 * Math.pow(2, (m-69)/12); }

  // Synthesize a Karplus-Strong pluck buffer
  synthNote(midi, season){
    const ctx = this.ctx;
    const sr = ctx.sampleRate;
    const freq = this.midiToFreq(midi);
    const N = Math.max(2, Math.round(sr / freq));
    const duration = 3.5; // seconds — koto sustains
    const totalSamples = Math.floor(sr * duration);
    const buf = ctx.createBuffer(1, totalSamples, sr);
    const out = buf.getChannelData(0);

    // Initial noise burst — pluck
    const delay = new Float32Array(N);
    // Shape excitation: noise with quick fade — gives metallic-string attack
    for (let i=0;i<N;i++){
      const env = Math.exp(-i / (N*0.5));
      delay[i] = (Math.random()*2 - 1) * env * 0.95;
    }

    // Damping factor (0..1) — higher = brighter, longer
    // Koto has medium-bright sustain
    const damp = 0.9965 - (season==='winter'?0.0015:0.0);  // winter slightly darker
    // Slight stretch (string stiffness) — average of two samples + tiny self
    let lastOut = 0;
    let idx = 0;
    for (let i=0; i<totalSamples; i++){
      const cur = delay[idx];
      // low-pass: average current + previous, then dampen
      const filtered = (cur + lastOut) * 0.5 * damp;
      out[i] = filtered;
      delay[idx] = filtered;
      lastOut = filtered;
      idx = (idx+1) % N;
    }

    // Apply envelope
    const attackS = Math.floor(sr * 0.005);
    const releaseS = Math.floor(sr * 0.6);
    for (let i=0; i<attackS; i++) out[i] *= i/attackS;
    for (let i=0; i<releaseS; i++){
      const k = totalSamples - 1 - i;
      out[k] *= 1 - i/releaseS;
    }

    // Slight body resonance — soft second-order shaping done by pre-emphasis
    let prev=0;
    for (let i=0;i<totalSamples;i++){
      const v = out[i];
      out[i] = v * 0.85 + prev*0.15;
      prev = v;
    }

    // Normalize gently
    let peak = 0;
    for (let i=0;i<totalSamples;i++) peak = Math.max(peak, Math.abs(out[i]));
    if (peak > 0){
      const g = 0.85 / peak;
      for (let i=0;i<totalSamples;i++) out[i] *= g;
    }
    return buf;
  }

  getBuffer(midi){
    const key = midi + ':' + this.scale.name;
    if (!this.bufferCache.has(key)){
      this.bufferCache.set(key, this.synthNote(midi, sceneState.currentSeason));
    }
    return this.bufferCache.get(key);
  }

  pluck(midi, gain=1.0, when=0){
    const ctx = this.ctx;
    const buf = this.getBuffer(midi);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.value = gain;
    src.connect(g).connect(this.dest);
    src.start(when || ctx.currentTime);
  }

  // Pick a note from current scale, biased toward root and 5th
  pickNote(){
    const root = this.scale.rootMidi;
    const notes = this.scale.notes;
    // Choose octave: bias to middle but allow up an octave
    const oct = Math.random() < 0.7 ? 0 : (Math.random()<0.6 ? 12 : -12);
    // Weight: root, 5th heavier
    const weights = notes.map((n,i) => {
      if (i===0) return 3.0;          // root
      if (n===7) return 2.4;          // 5th
      if (i===notes.length-1) return 1.4;
      return 1.7;
    });
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*total, idx=0;
    for (let i=0;i<weights.length;i++){
      r -= weights[i];
      if (r<=0){ idx=i; break; }
    }
    return root + notes[idx] + oct;
  }

  // Sequencer: schedules notes with weighted-random rhythm and ma silences
  start(){
    this.nextNoteAt = this.ctx.currentTime + 1.6;
    const tick = () => {
      const ctx = this.ctx;
      const lookahead = 0.25; // schedule slightly ahead
      while (this.nextNoteAt < ctx.currentTime + lookahead){
        // Decide rhythm
        // Rhythmic weights (in beats): 0.5, 1, 1.5, 2, 3, 4(rest+silence)
        const RHYTHMS = [
          {beats:0.5, w:0.7},
          {beats:1,   w:2.5},
          {beats:1.5, w:1.6},
          {beats:2,   w:1.6},
          {beats:3,   w:0.9},
          {beats:4,   w:0.5}
        ];
        const totalW = RHYTHMS.reduce((a,r)=>a+r.w,0);
        let pick = Math.random()*totalW;
        let chosen = RHYTHMS[0];
        for (const r of RHYTHMS){
          pick -= r.w;
          if (pick<=0){ chosen = r; break; }
        }
        const beats = chosen.beats;
        const dur = beats * BEAT_MS / 1000;

        // Decide whether to play note OR ma (silence)
        const maChance = sceneState.currentSeason==='winter' ? 0.35 :
                         sceneState.currentSeason==='autumn' ? 0.30 :
                         sceneState.currentSeason==='spring' ? 0.22 : 0.18;
        const isMa = Math.random() < maChance;

        if (isMa){
          // schedule ma indicator highlight at this time
          const t = (this.nextNoteAt - ctx.currentTime)*1000;
          setTimeout(()=>{
            this.maGlyph.classList.add('active');
          }, Math.max(0,t));
          setTimeout(()=>{
            this.maGlyph.classList.remove('active');
          }, Math.max(0,t) + dur*1000*0.8);
        } else {
          // Sometimes a small ornament — pluck two close notes
          const ornament = Math.random() < 0.18;
          const midi = this.pickNote();
          this.pluck(midi, 0.65 + Math.random()*0.25, this.nextNoteAt);
          if (ornament){
            const orn = midi + (Math.random()<0.5? this.scale.notes[1] : -this.scale.notes[1]);
            this.pluck(orn, 0.35, this.nextNoteAt + 0.18);
          }
        }
        this.nextNoteAt += dur;
      }
      this._timer = setTimeout(tick, 100);
    };
    tick();
  }
}

// -------- Ambience: wind, bell, birds --------
class AmbienceEngine {
  constructor(ctx, dest){
    this.ctx = ctx;
    this.dest = dest;
    this.startWind();
    this.scheduleBell();
    this.scheduleBirds();
  }

  startWind(){
    const ctx = this.ctx;
    // pink-ish noise via white noise buffer + lowpass
    const bufferSize = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let lastOut = 0;
    for (let i=0;i<bufferSize;i++){
      const white = Math.random()*2-1;
      lastOut = (lastOut + 0.02*white) / 1.02;
      data[i] = lastOut * 5;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;

    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 380;
    lp.Q.value = 0.5;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 60;
    const g = ctx.createGain();
    g.gain.value = 0.07;

    noise.connect(hp).connect(lp).connect(g).connect(this.dest);
    noise.start();

    this.windGain = g;
    this.windLP = lp;

    // Slow LFO for wind volume
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.07;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.05;
    lfo.connect(lfoGain).connect(g.gain);
    lfo.start();
  }

  scheduleBell(){
    const next = 35 + Math.random()*55; // rare
    setTimeout(()=>{ this.playBell(); this.scheduleBell(); }, next * 1000);
  }

  playBell(){
    const ctx = this.ctx;
    const now = ctx.currentTime;
    // distant temple bell: low fundamental + a few partials
    const fundamental = 110 + Math.random()*30;
    const partials = [1.0, 2.76, 5.40, 8.93];
    const bellG = ctx.createGain();
    bellG.gain.setValueAtTime(0.0, now);
    bellG.gain.linearRampToValueAtTime(0.6, now + 0.02);
    bellG.gain.exponentialRampToValueAtTime(0.0001, now + 7.0);
    bellG.connect(this.dest);

    partials.forEach((mult, i)=>{
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = fundamental * mult;
      const og = ctx.createGain();
      og.gain.value = 0.4 / (i+1);
      osc.connect(og).connect(bellG);
      osc.start(now);
      osc.stop(now + 7.5);
    });
  }

  scheduleBirds(){
    const next = 5 + Math.random()*12;
    setTimeout(()=>{
      // birds quieter / absent in winter
      if (sceneState.currentSeason !== 'winter' || Math.random() < 0.15){
        this.playBird();
      }
      this.scheduleBirds();
    }, next * 1000);
  }

  playBird(){
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const scale = koto ? koto.scale : SEASON_SCALE.spring;
    const root = scale.rootMidi + 24; // 2 octaves up
    const notes = scale.notes;
    // 2-4 quick chirps
    const chirps = 2 + Math.floor(Math.random()*3);
    for (let i=0; i<chirps; i++){
      const note = notes[Math.floor(Math.random()*notes.length)];
      const f = 440 * Math.pow(2, (root + note - 69)/12);
      const t = now + i*0.13 + Math.random()*0.05;
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f*0.95, t);
      osc.frequency.exponentialRampToValueAtTime(f*1.04, t+0.04);
      osc.frequency.exponentialRampToValueAtTime(f*0.92, t+0.09);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.06, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.10);
      osc.connect(g).connect(this.dest);
      osc.start(t);
      osc.stop(t+0.12);
    }
  }

  bowChime(){
    if (!this.ctx) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const f = 880;
    const osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = f;
    const osc2 = ctx.createOscillator();
    osc2.type = 'sine'; osc2.frequency.value = f*1.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now+2.4);
    osc.connect(g); osc2.connect(g); g.connect(this.dest);
    osc.start(now); osc2.start(now);
    osc.stop(now+2.6); osc2.stop(now+2.6);
  }
}

// ============================================================================
//  INTERACTIONS — TAB season, B bow, C pour, drag look
// ============================================================================
let bowAmount = 0;          // 0 = upright, 1 = bowed
let bowTarget = 0;
let pourAmount = 0;
let pourTarget = 0;
let pouring = false;
let steamBoost = 0;

function showGesture(text){
  const el = document.getElementById('gesture');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(()=>{ el.classList.remove('show'); }, 1300);
}

document.addEventListener('keydown', e => {
  if (!audioCtx) return;
  if (e.code === 'Tab'){
    e.preventDefault();
    setSeason(sceneState.seasonIndex + 1);
    showGesture(KANJI[sceneState.currentSeason]);
  } else if (e.code === 'KeyB' || e.key === 'b'){
    bowTarget = 1;
    setTimeout(()=>{ bowTarget = 0; }, 1200);
    if (ambience) ambience.bowChime();
    showGesture('礼');
  } else if (e.code === 'KeyC' || e.key === 'c'){
    if (!pouring){
      pouring = true;
      pourTarget = 1;
      steamBoost = 1;
      setTimeout(()=>{ pourTarget = 0; }, 1500);
      setTimeout(()=>{ pouring = false; steamBoost = 0; }, 4000);
      showGesture('注');
    }
  }
});

// Mouse drag — limited look
let dragging = false;
let dragStart = null;
let camYaw = 0, camPitch = 0;
const camTargetYaw = { v: 0 }, camTargetPitch = { v: 0 };
const MAX_YAW = 0.45;   // ~25°
const MAX_PITCH = 0.18;

renderer.domElement.addEventListener('pointerdown', e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY, yaw: camTargetYaw.v, pitch: camTargetPitch.v };
});
window.addEventListener('pointerup', ()=>{ dragging=false; });
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = (e.clientX - dragStart.x) / window.innerWidth;
  const dy = (e.clientY - dragStart.y) / window.innerHeight;
  camTargetYaw.v   = THREE.MathUtils.clamp(dragStart.yaw   - dx*1.4, -MAX_YAW, MAX_YAW);
  camTargetPitch.v = THREE.MathUtils.clamp(dragStart.pitch - dy*0.9, -MAX_PITCH, MAX_PITCH);
});

// ============================================================================
//  WATER POUR — small stream from spout to cup when pouring
// ============================================================================
const pourGeo = new THREE.BufferGeometry();
const pourPos = new Float32Array(2*3);
pourGeo.setAttribute('position', new THREE.BufferAttribute(pourPos, 3));
const pourMat = new THREE.LineBasicMaterial({ color: 0x88c8e8, transparent: true, opacity: 0 });
const pourLine = new THREE.Line(pourGeo, pourMat);
ROOM.add(pourLine);

function updatePour(){
  // Spout world position
  const spoutTip = new THREE.Vector3();
  spout.getWorldPosition(spoutTip);
  // Aim at cup
  const cupTop = new THREE.Vector3();
  cupGroup.getWorldPosition(cupTop);
  cupTop.y += 0.06;

  pourPos[0]=spoutTip.x; pourPos[1]=spoutTip.y; pourPos[2]=spoutTip.z;
  pourPos[3]=cupTop.x;   pourPos[4]=cupTop.y;   pourPos[5]=cupTop.z;
  pourGeo.attributes.position.needsUpdate = true;
  pourMat.opacity = pourAmount * 0.85;

  // Slight tilt of kettle when pouring
  const tilt = pourAmount * 0.45;
  kettleGroup.rotation.z = -tilt;
  kettleGroup.position.y = 0.06 + pourAmount*0.04;
}

//  CLICK TO BEGIN
// ============================================================================
const beginEl = document.getElementById('begin');
beginEl.addEventListener('click', ()=>{
  if (audioCtx) return;
  initAudio();
  beginEl.classList.add('fade');
  setTimeout(()=>{ beginEl.style.display = 'none'; }, 1700);
});

// ============================================================================
//  RESIZE
// ============================================================================
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================================
//  RENDER LOOP
// ============================================================================
const clock = new THREE.Clock();

function animate(){
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.elapsedTime;

  // Palette transition
  tickPalette(dt);

  // Tatami / shoji time uniforms
  tatamiUniforms.uTime.value = t;
  shojiUniforms.uTime.value = t;

  // Steam — face camera + animate
  for (const m of steamMeshes){
    m.material.uniforms.uTime.value = t;
    m.material.uniforms.uIntensity.value = THREE.MathUtils.lerp(
      m.material.uniforms.uIntensity.value,
      0.85 + steamBoost*0.9,
      dt*1.5
    );
    // billboard: orient to camera (yaw only)
    m.lookAt(camera.position.x, m.position.y + steamGroup.position.y, camera.position.z);
    // Rising — recycle
    m.position.y -= 0; // managed by uTime offset in shader vertically
  }

  // Embers breathing
  for (const e of embers){
    const phase = e.userData.phase + t*1.4;
    e.material.opacity = 0.35 + 0.55 * (Math.sin(phase)*0.5+0.5) * e.userData.base;
  }

  // Bonsai gentle sway
  bonsaiGroup.rotation.z = Math.sin(t*0.5) * 0.012;

  // Petals
  updatePetals(dt);

  // Bow (camera dip)
  bowAmount = THREE.MathUtils.lerp(bowAmount, bowTarget, dt*4.0);
  pourAmount = THREE.MathUtils.lerp(pourAmount, pourTarget, dt*3.5);
  updatePour();

  // Camera framing
  camYaw   = THREE.MathUtils.lerp(camYaw,   camTargetYaw.v,   dt*4.0);
  camPitch = THREE.MathUtils.lerp(camPitch, camTargetPitch.v, dt*4.0);
  const baseY = 1.15 - bowAmount*0.45;
  const baseZ = 2.7  + bowAmount*0.10;
  camera.position.x = Math.sin(camYaw) * 2.7 * 0.10; // slight parallax
  camera.position.y = baseY - Math.sin(camPitch)*0.4;
  camera.position.z = baseZ;
  camera.lookAt(
    Math.sin(camYaw)*0.5,
    0.55 + camPitch*0.3 - bowAmount*0.35,
    Math.cos(camYaw)*-0.2
  );

  // Embers position drift (very subtle)
  for (const e of embers){
    e.position.y = 0.052 + Math.sin(t*0.7 + e.userData.phase)*0.002;
  }

  // Kettle glow flicker
  kettleGlow.intensity = 0.32 + Math.sin(t*4.3)*0.04 + Math.sin(t*1.7)*0.03;
  irorIGlow.intensity  = 0.85 + Math.sin(t*3.1)*0.06 + Math.sin(t*0.8)*0.04;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// Initial palette apply
applyPalette();
animate();
