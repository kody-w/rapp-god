      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;

        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — click to toggle visibility';
        hud.textContent = '✦ GOLD';
        let v = false;
        hud.onclick = () => { v = !v; hud.style.opacity = v ? '1' : '0.25'; };
        document.body.appendChild(hud);
        hud.style.opacity = '1';
        setTimeout(() => { hud.style.opacity = '0.25'; }, 4000);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
              if (hud) hud.textContent += ' ↓';
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});

      }.bind(localStorage);

            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';

<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.80;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080c);
scene.fog = new THREE.FogExp2(0x080a0e, 0.04);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 30);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 1.0, -10);

// ── Floor: corporate carpet (gray-blue with subtle pattern) ──
const floorMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0}, monitorPos:{value:new THREE.Vector3(2.5, 0.8, -3.5)} },
  vertexShader:`varying vec3 vP; varying vec2 vUv;
    void main(){ vP=(modelMatrix*vec4(position,1.0)).xyz; vUv=uv;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform vec3 monitorPos; varying vec3 vP; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      // Loop carpet with subtle texture
      vec2 p = vUv * vec2(60.0, 60.0);
      float fiber = h(floor(p)) * 0.15;
      vec3 base = vec3(0.18, 0.22, 0.28) + vec3(fiber);
      // Periodic pattern lines
      if (mod(p.x, 12.0) < 0.5 || mod(p.y, 12.0) < 0.5) base *= 0.85;
      // Monitor blue glow on the floor near it
      float distToMonitor = distance(vP, monitorPos);
      vec3 glow = vec3(0.3, 0.4, 0.7) * exp(-distToMonitor * 0.5) * 0.4;
      gl_FragColor = vec4(base + glow, 1.0);
    }`
});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ── Ceiling tiles ──
const ceilingMat = new THREE.MeshStandardMaterial({color:0x14181c, roughness:0.95});
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), ceilingMat);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 2.8;
scene.add(ceiling);

// ── Windows in distance (city lights at 21st floor) ──
const winShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      // Distant city skyline
      vec3 sky = mix(vec3(0.04,0.04,0.10), vec3(0.10,0.06,0.04), 1.0-vUv.y);
      // Buildings as procedural rectangles
      vec2 bGrid = vec2(vUv.x * 14.0, vUv.y);
      float bx = floor(bGrid.x);
      float bldgH = 0.30 + h(vec2(bx, 1.0)) * 0.30;
      float bldg = step(vUv.y, bldgH);
      sky = mix(sky, vec3(0.06,0.07,0.10), bldg * 0.7);
      // Window-light dots
      vec2 wGrid = vec2(vUv.x * 60.0, vUv.y * 25.0);
      vec2 wIp = floor(wGrid);
      if (wIp.y < bldgH * 25.0 && h(wIp) > 0.85) {
        sky += vec3(1.0, 0.7, 0.4) * 0.8;
      }
      gl_FragColor = vec4(sky, 1.0);
    }`
};
const win = new THREE.Mesh(new THREE.PlaneGeometry(20, 4), new THREE.ShaderMaterial(winShader));
win.position.set(0, 1.5, -15);
scene.add(win);

// ── Cubicles: short walls forming offices ──
const cubicleMat = new THREE.MeshStandardMaterial({color:0x2a2820, roughness:0.85});  // beige
function makeCubicle(x, z) {
  const g = new THREE.Group();
  // Front wall
  const fw = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.4, 0.08), cubicleMat);
  fw.position.set(0, 0.7, 0); g.add(fw);
  // Side walls
  [[-1.25, 0.7, -1], [1.25, 0.7, -1]].forEach(p => {
    const sw = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.4, 2), cubicleMat);
    sw.position.set(p[0], p[1], p[2]); g.add(sw);
  });
  // Desk
  const desk = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.05, 1.0), new THREE.MeshStandardMaterial({color:0x1a1a14, roughness:0.7}));
  desk.position.set(0, 0.75, -0.6); g.add(desk);
  // Chair
  const chairMat = new THREE.MeshStandardMaterial({color:0x080808, roughness:0.85});
  const chairSeat = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.06, 16), chairMat);
  chairSeat.position.set(0, 0.45, -1.6); g.add(chairSeat);
  const chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.55, 0.06), chairMat);
  chairBack.position.set(0, 0.74, -1.78); g.add(chairBack);
  const chairBase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.04, 16), chairMat);
  chairBase.position.set(0, 0.04, -1.6); g.add(chairBase);
  // Monitor (off, just a black rectangle)
  const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.36, 0.04), new THREE.MeshStandardMaterial({color:0x080808, roughness:0.5}));
  monitor.position.set(0, 1.05, -0.95); g.add(monitor);

  g.position.set(x, 0, z);
  return g;
}
// Grid of cubicles
const cubicles = [];
for (let i = 0; i < 5; i++) {
  for (let j = 0; j < 4; j++) {
    const x = -8 + i * 4;
    const z = -3 - j * 4;
    const c = makeCubicle(x, z);
    cubicles.push(c);
    scene.add(c);
  }
}

// ── ONE special cubicle with a glowing monitor (the forgotten one) ──
const specialCubicle = cubicles[7]; // Pick one
const specialMonitor = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.36, 0.04),
  new THREE.ShaderMaterial({
    uniforms:{ time:{value:0} },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`uniform float time; varying vec2 vUv;
      void main(){
        // Screensaver-like: bouncing logo or just blue gradient
        vec3 col = vec3(0.3, 0.5, 0.85);
        // Small text-block silhouette (suggests an open document)
        if (vUv.y > 0.7 && vUv.y < 0.85 && vUv.x > 0.2 && vUv.x < 0.8) col *= 1.5;
        if (vUv.y > 0.55 && vUv.y < 0.65 && vUv.x > 0.2 && vUv.x < 0.6) col *= 1.4;
        if (vUv.y > 0.4 && vUv.y < 0.5 && vUv.x > 0.2 && vUv.x < 0.7) col *= 1.4;
        // Subtle scanlines
        col *= 0.92 + sin(vUv.y * 600.0) * 0.08;
        gl_FragColor = vec4(col, 1.0);
      }`
  })
);
const specialCubiclePos = specialCubicle.position;
specialMonitor.position.set(specialCubiclePos.x, specialCubiclePos.y + 1.05, specialCubiclePos.z - 0.95);
scene.add(specialMonitor);
const monitorLight = new THREE.PointLight(0x4080cc, 0.8, 6, 1.5);
monitorLight.position.set(specialCubiclePos.x, 1.15, specialCubiclePos.z - 0.85);
scene.add(monitorLight);

// ── Few LED indicators on equipment ──
function addLED(x, y, z, color) {
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.015, 6, 6), new THREE.MeshBasicMaterial({color}));
  led.position.set(x, y, z);
  scene.add(led);
}
addLED(-7, 0.78, -8, 0x00ff00);  // Computer green
addLED(8, 0.78, -8, 0x00ff00);
addLED(0, 1.5, -3, 0xff0000);  // Smoke detector red

// ── EXIT sign overhead ──
const exitMat = new THREE.MeshBasicMaterial({color:0x00ff44});
const exitSign = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.18, 0.05), exitMat);
exitSign.position.set(0, 2.4, -14.5);
scene.add(exitSign);
const exitLight = new THREE.PointLight(0x00ff44, 0.4, 4, 1.5);
exitLight.position.set(0, 2.4, -14.4);
scene.add(exitLight);

// ── Lighting (mostly dark) ──
scene.add(new THREE.AmbientLight(0x040608, 0.5));
// Single emergency dim ceiling fixture far away
const emergencyLight = new THREE.PointLight(0x6080a0, 0.5, 8, 1.5);
emergencyLight.position.set(0, 2.5, -8);
scene.add(emergencyLight);

// ── Audio ──
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.50;
  masterGain.connect(audioCtx.destination);

  // HVAC drone (the most important office sound)
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const hvac = audioCtx.createBufferSource();
  hvac.buffer = buf; hvac.loop = true;
  const hvacLP = audioCtx.createBiquadFilter();
  hvacLP.type = 'lowpass'; hvacLP.frequency.value = 220;
  const hvacG = audioCtx.createGain(); hvacG.gain.value = 0.18;
  hvac.connect(hvacLP).connect(hvacG).connect(masterGain);
  hvac.start();

  // Distant vacuum cleaner (panning slowly L→R as if the cleaner walks)
  const vacOsc = audioCtx.createOscillator();
  vacOsc.type = 'sawtooth';
  vacOsc.frequency.value = 95;
  const vacLP = audioCtx.createBiquadFilter();
  vacLP.type = 'lowpass'; vacLP.frequency.value = 600;
  const vacG = audioCtx.createGain(); vacG.gain.value = 0.04;
  const vacPan = audioCtx.createStereoPanner(); vacPan.pan.value = -0.7;
  // LFO for vacuum panning over time
  const vacLFO = audioCtx.createOscillator();
  vacLFO.frequency.value = 0.012;  // very slow
  const vacLFOAmt = audioCtx.createGain(); vacLFOAmt.gain.value = 1.0;
  vacLFO.connect(vacLFOAmt); vacLFOAmt.connect(vacPan.pan);
  vacOsc.connect(vacLP).connect(vacG).connect(vacPan).connect(masterGain);
  vacOsc.start(); vacLFO.start();

  // Computer fans humming (continuous)
  for (let i = 0; i < 3; i++) {
    const fan = audioCtx.createOscillator();
    fan.type = 'sine';
    fan.frequency.value = 440 + i * 30;
    const fg = audioCtx.createGain(); fg.gain.value = 0.005;
    fan.connect(fg).connect(masterGain);
    fan.start();
  }

  // Floor creak occasionally
  function scheduleCreak() {
    const next = 30 + Math.random() * 60;
    setTimeout(() => { if (audioCtx) { creak(); scheduleCreak(); } }, next * 1000);
  }
  scheduleCreak();
  function creak() {
    const t0 = audioCtx.currentTime;
    const dur = 0.4;
    const cBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = cBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length * 5);
    const s = audioCtx.createBufferSource(); s.buffer = cBuf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 350 + Math.random()*200; bp.Q.value = 4;
    const g = audioCtx.createGain(); g.gain.value = 0.04;
    const p = audioCtx.createStereoPanner(); p.pan.value = (Math.random()-0.5);
    s.connect(bp).connect(g).connect(p).connect(masterGain);
    s.start(t0);
  }

  // Phone ring at distant cubicle (every 3-7 minutes)
  function schedulePhone() {
    const next = 180 + Math.random() * 240;
    setTimeout(() => { if (audioCtx) { phone(); schedulePhone(); } }, next * 1000);
  }
  schedulePhone();
  function phone() {
    if (!audioCtx) return;
    // 4 rings, then nobody answers
    for (let r = 0; r < 4; r++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        // Two-tone ring
        const o1 = audioCtx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 440;
        const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 480;
        const g = audioCtx.createGain(); g.gain.value = 0;
        g.gain.linearRampToValueAtTime(0.025, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);
        const p = audioCtx.createStereoPanner(); p.pan.value = -0.8;
        o1.connect(g); o2.connect(g); g.connect(p).connect(masterGain);
        o1.start(t); o1.stop(t + 1.3);
        o2.start(t); o2.stop(t + 1.3);
      }, r * 2000);
    }
  }
}

// ── Animation ──
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  floorMat.uniforms.time.value = time;
  win.material.uniforms.time.value = time;
  specialMonitor.material.uniforms.time.value = time;

  // Camera breath
  camera.position.x = Math.sin(time * 0.15) * 0.04;
  camera.position.y = 1.5 + Math.sin(time * 0.20) * 0.02;
  camera.lookAt(0, 1.0, -10);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 1s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 1100);
  startAudio();
});
</script>
