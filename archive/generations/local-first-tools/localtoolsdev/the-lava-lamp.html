<script>
'use strict';

const canvas = document.getElementById('c');

camera.position.set(0.4, 1.4, 4);

// ── Wood-paneled walls ────────────────────────────────────────────
const woodShader = {
  uniforms:{ time:{value:0}, lampPos:{value:new THREE.Vector3(0, 1.0, 0)} },
  vertexShader:`varying vec3 vP; varying vec3 vN; varying vec2 vUv;
    void main(){ vP=(modelMatrix*vec4(position,1.0)).xyz; vN=normal; vUv=uv;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform vec3 lampPos; varying vec3 vP; varying vec3 vN; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // Vertical wood planks
      float plank = step(0.95, fract(vUv.x*4.0));
      float grain = n(vec2(vUv.y*30.0, vUv.x*5.0)) * 0.4 + 0.4;
      vec3 base = mix(vec3(0.08,0.05,0.03), vec3(0.04,0.03,0.02), grain);
      base = mix(base, vec3(0.02,0.01,0.01), plank);
      // Lamp light cast on the wall
      float dist = distance(vP, lampPos);
      vec3 light = vec3(1.0, 0.45, 0.15) * exp(-dist*0.5) * 1.2;
      base += light;
      gl_FragColor = vec4(base, 1.0);
    }`
};
const wallMat = new THREE.ShaderMaterial(woodShader);

// Glass cylinder shader — this is the lava lamp glass
const lavaShader = {
  uniforms:{
    time:{value:0},
    intensity:{value:1.0}
  },
  vertexShader:`varying vec2 vUv; varying vec3 vP;
    void main(){ vUv=uv; vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float intensity; varying vec2 vUv; varying vec3 vP;
    float blob(vec2 uv, vec2 c, float r){ return r*r / max(0.0001, dot(uv-c, uv-c)); }
    void main(){
      // Map to local 2D with vertical bias (taller glass)
      vec2 uv = vec2(vUv.x, vUv.y);
      // Multiple metaball-like blobs, each rising/falling on its own cycle
      float field = 0.0;
      // 5 blobs with different cycle periods
      for (int i=0; i<5; i++){
        float fi = float(i);
        float period = 14.0 + fi * 4.5;
        float phase = (time + fi * 7.0) / period;
        // Blob rises 0→1 then falls 1→0 over one period
        float p = mod(phase, 1.0);
        float y = abs(sin(p * 3.14159));  // 0→1→0 within period (use absolute sine for smooth rise+fall)
        // Slight horizontal drift
        float x = 0.5 + sin(phase * 6.28 * 0.3 + fi * 1.5) * 0.18 + cos(phase * 6.28 * 0.7 + fi * 2.0) * 0.06;
        float r = 0.07 + sin(phase * 6.28 + fi) * 0.02 + 0.04;
        field += blob(uv, vec2(x, 0.1 + y * 0.78), r);
      }
      // Plus a static blob at top + bottom (where wax pools)
      field += blob(uv, vec2(0.5, 0.94), 0.06);  // top pool
      field += blob(uv, vec2(0.5, 0.05), 0.10);  // bottom pool
      // Threshold for blob shape
      float blobMask = smoothstep(1.5, 4.0, field);
      // Background: warm amber liquid
      vec3 liquidCol = mix(vec3(0.10, 0.05, 0.02), vec3(0.22, 0.10, 0.04), 1.0 - vUv.y);
      // Blob color: bright orange-red
      vec3 blobCol = mix(vec3(1.0, 0.4, 0.1), vec3(1.0, 0.6, 0.15), 0.5 + sin(time + uv.x*5.0)*0.5);
      vec3 col = mix(liquidCol, blobCol * intensity, blobMask);
      // Subtle inner glow at edges of blobs (rim)
      float rim = smoothstep(2.5, 1.8, field) * smoothstep(1.5, 2.5, field);
      col += vec3(1.0, 0.4, 0.1) * rim * 0.6;
      // Glass tint over everything
      col *= vec3(1.0, 0.95, 0.85);
      // Edge darkening
      float edge = smoothstep(0.5, 0.4, abs(uv.x - 0.5));
      col *= edge * 0.5 + 0.5;
      gl_FragColor = vec4(col, 1.0);
    }`

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);

  // Room ambient hum
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const room = audioCtx.createBufferSource();
  room.buffer = buf; room.loop = true;
  const roomLP = audioCtx.createBiquadFilter();
  roomLP.type = 'lowpass'; roomLP.frequency.value = 250;
  const roomG = audioCtx.createGain(); roomG.gain.value = 0.10;
  room.connect(roomLP).connect(roomG).connect(masterGain);
  room.start();

  // Distant CSN-style folk acoustic guitar — heavily filtered like through walls
  // Procedural: arpeggiated chord progression in G major, very slow
  const guitarChords = [
    [55, 59, 62, 67],  // G chord (G3 B3 D4 G4)
    [50, 57, 62, 65],  // D7 chord (D3 A3 D4 F4)
    [52, 56, 59, 64],  // E minor (E3 G#3 B3 E4)
    [48, 52, 55, 60],  // C chord (C3 E3 G3 C4)
  ];

  function strumChord(chord, t0, dur) {
    // Pluck each string with slight delay (strum)
    chord.forEach((midi, i) => {
      setTimeout(() => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        // Karplus-Strong-lite: filtered noise burst → resonates
        const o = audioCtx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = freq;
        // Through bandpass (simulating thru-walls muffling)
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 600;  // strong narrow band
        bp.Q.value = 1.5;
        const lp = audioCtx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 1200;
        const g = audioCtx.createGain();
        g.gain.value = 0;
        g.gain.linearRampToValueAtTime(0.018, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(bp).connect(lp).connect(g).connect(masterGain);
        o.start(t);
        o.stop(t + dur + 0.05);
      }, i * 80);
    });
  }

  let chordIdx = 0;
  function scheduleChord() {
    if (!audioCtx) return;
    const chord = guitarChords[chordIdx % guitarChords.length];
    strumChord(chord, audioCtx.currentTime, 4.0);
    chordIdx++;
    setTimeout(scheduleChord, 4200);  // 4.2s per chord — very slow
  }
  scheduleChord();
}

// ── Animation ──
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  lavaMat.uniforms.time.value = time;
  wallMat.uniforms.time.value = time;
  // Slight lamp light flicker (heat from lamp)
  lampLight.intensity = 4 + Math.sin(time * 7) * 0.2 + Math.sin(time * 13) * 0.1;

  // Subtle camera breathing
  camera.position.x = 0.4 + Math.sin(time * 0.2) * 0.04;
  camera.position.y = 1.4 + Math.sin(time * 0.27) * 0.02;
  camera.lookAt(0, 1.2, 0);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
});
</script>
