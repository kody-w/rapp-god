const skyShader = {
  uniforms:{ time:{value:0}, dawnPhase:{value:0} },
  vertexShader:`varying vec2 vUv; varying vec3 vP;
    void main(){ vUv = uv; vP = position;
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float dawnPhase; varying vec2 vUv; varying vec3 vP;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // dawnPhase: 0 = pre-dawn (deep blue + first hint of orange)
      //           0.3 = false dawn (orange band on horizon)
      //           0.5 = horizon glow growing
      //           0.7 = sun cresting horizon
      //           1.0 = morning sun warm
      vec3 zenithStart = vec3(0.04, 0.06, 0.18);  // deep night blue
      vec3 zenithEnd = vec3(0.30, 0.55, 0.88);     // morning sky blue
      vec3 zenith = mix(zenithStart, zenithEnd, dawnPhase);

      vec3 horizonStart = vec3(0.05, 0.05, 0.10);
      vec3 horizonMid = vec3(0.95, 0.40, 0.20);    // warm orange glow
      vec3 horizonEnd = vec3(1.00, 0.90, 0.65);    // bright morning amber
      vec3 horizon = dawnPhase < 0.5 ?
                    mix(horizonStart, horizonMid, dawnPhase * 2.0) :
                    mix(horizonMid, horizonEnd, (dawnPhase - 0.5) * 2.0);

      // Vertical gradient
      float t = clamp(vUv.y, 0.0, 1.0);
      vec3 sky = mix(horizon, zenith, smoothstep(0.0, 0.6, t));

      // Sun position on horizon (rises from below to up)
      float sunY = -0.15 + dawnPhase * 0.40;
      float sunDist = distance(vUv, vec2(0.5, sunY));
      float sun = smoothstep(0.04, 0.0, sunDist) * step(0.0, sunY);
      // Sun halo
      float halo = smoothstep(0.5, 0.0, sunDist) * 0.4 * dawnPhase;
      sky += vec3(1.0, 0.85, 0.6) * sun;
      sky += vec3(1.0, 0.5, 0.2) * halo;

      // Stars only visible early in dawn
      float starOpacity = max(0.0, 1.0 - dawnPhase * 1.8);
      vec2 starP = vUv * vec2(80.0, 40.0);
      float starR = h(floor(starP));
      if (starR > 0.99) sky += vec3(0.7) * starOpacity * 0.6;

      cloud *= smoothstep(0.0, 0.2, vUv.y) * smoothstep(0.5, 0.2, vUv.y);
      sky += (cloud * cloud) * vec3(0.05, 0.04, 0.06);
      // Warm cloud underbellies during dawn
      sky += cloud * vec3(0.6, 0.3, 0.15) * dawnPhase * smoothstep(0.0, 0.3, vUv.y);

      gl_FragColor = vec4(sky, 1.0);
    }`,

    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      float treeY = 0.04 + h(floor(vec2(vUv.x*40.0, 1.0))) * 0.03;
      treeY += h(floor(vec2(vUv.x*15.0, 5.0))) * 0.02;
      if (vUv.y < treeY) {
        // Tree color: dark, darker at bottom
        vec3 treeCol = mix(vec3(0.02,0.03,0.04), vec3(0.06,0.08,0.06), dawnPhase);
        gl_FragColor = vec4(treeCol, 1.0);
      } else {
        discard;
      }
    }`,
  transparent: true
};
const treeline = new THREE.Mesh(new THREE.PlaneGeometry(800, 12), new THREE.ShaderMaterial(treelineShader));
treeline.position.set(0, 4, -250);
scene.add(treeline);

// ── Ambient ──
scene.add(new THREE.AmbientLight(0x808090, 0.6));
const dirLight = new THREE.DirectionalLight(0xffd0a0, 0.5);
dirLight.position.set(0, 5, -20);
scene.add(dirLight);

// ── Audio ──
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.40;
  masterGain.connect(audioCtx.destination);

  // Lake ambient: soft water lapping (low-passed pink noise with very slow LFO)
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const ambient = audioCtx.createBufferSource();
  ambient.buffer = buf; ambient.loop = true;
  const ambientLP = audioCtx.createBiquadFilter();
  ambientLP.type = 'lowpass'; ambientLP.frequency.value = 350; ambientLP.Q.value = 0.4;
  const ambientLFO = audioCtx.createOscillator();
  ambientLFO.frequency.value = 0.05;
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 100;
  ambientLFO.connect(lfoG); lfoG.connect(ambientLP.frequency);
  const ambientG = audioCtx.createGain(); ambientG.gain.value = 0.20;
  ambient.connect(ambientLP).connect(ambientG).connect(masterGain);
  ambient.start(); ambientLFO.start();

  // Bird waking up: sparse chirps, building over time as dawn progresses
  function scheduleBird() {
    const next = 5 + Math.random() * 15;  // every 5-20s, but as dawn grows, more frequent
    setTimeout(() => { if (audioCtx) { birdChirp(); scheduleBird(); } }, next * 1000);
  }
  scheduleBird();

  // Pad ambient: very faint sustained chord, evolving
  const padFreqs = [261.63, 329.63, 392.00, 523.25];  // C major triad + octave
  padFreqs.forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = freq * (1 + (Math.random() - 0.5) * 0.005);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 800 + i * 200;
    const g = audioCtx.createGain();
    g.gain.value = 0.012;  // Very faint
    // Slow LFO on amplitude for shimmering
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.05 + i * 0.02;
    const lfoAmt = audioCtx.createGain();
    lfoAmt.gain.value = 0.005;
    lfo.connect(lfoAmt); lfoAmt.connect(g.gain);
    o.connect(lp).connect(g).connect(masterGain);
    o.start(); lfo.start();
  });
}

function birdChirp() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Bird species: random freq range, random pattern
  const f0 = 1500 + Math.random() * 2000;
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(f0 * (0.6 + Math.random() * 0.6), t0 + 0.1);
  const g = audioCtx.createGain();
  g.gain.value = 0;
  // Bird volume scales with dawn progression (more birds awake later)
  const dawnVol = (sky.material.uniforms.dawnPhase.value || 0) * 0.5 + 0.1;
  g.gain.linearRampToValueAtTime(0.018 * dawnVol, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.15);
  const p = audioCtx.createStereoPanner();
  p.pan.value = (Math.random() - 0.5) * 1.6;
  o.connect(g).connect(p).connect(masterGain);
  o.start(t0);
  o.stop(t0 + 0.2);
  // Maybe a 2-note phrase
  if (Math.random() > 0.5) {
    setTimeout(() => birdChirp(), 200 + Math.random() * 200);
  }
}

// ── Breath pacer logic ──
const BREATH_CYCLE = 10;  // 4s in + 6s out
const BREATH_IN = 4;
const BREATH_OUT = 6;
const breathEl = document.getElementById('breath');
const breathTextEl = document.getElementById('breath-text');

let startTime = 0;
let lastBreathPhase = '';

// ── Animation ──
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  if (startTime > 0) {
    const elapsed = (now - startTime) / 1000;
    // Total session: 9 minutes = 540s
    const sessionTotal = 540;
    const dawnPhase = Math.min(1.0, elapsed / sessionTotal);
    sky.material.uniforms.dawnPhase.value = dawnPhase;
    sky.material.uniforms.time.value = time;
    water.material.uniforms.dawnPhase.value = dawnPhase;
    water.material.uniforms.time.value = time;
    treeline.material.uniforms.dawnPhase.value = dawnPhase;

    // Breath pacer
    const breathTime = elapsed % BREATH_CYCLE;
    let scale, phase;
    if (breathTime < BREATH_IN) {
      // Inhale
      const t = breathTime / BREATH_IN;
      scale = 1 + t * 1.2;  // 1 to 2.2
      phase = 'INHALE';
    } else {
      // Exhale
      const t = (breathTime - BREATH_IN) / BREATH_OUT;
      scale = 2.2 - t * 1.2;  // 2.2 to 1.0
      phase = 'EXHALE';
    }
    breathEl.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(3)})`;
    if (phase !== lastBreathPhase) {
      breathTextEl.textContent = phase;
      lastBreathPhase = phase;
    }

    // Update timer
    const min = Math.floor(elapsed / 60);
    const sec = Math.floor(elapsed % 60);
    document.getElementById('elapsed').textContent = `${min}:${sec.toString().padStart(2,'0')}`;

    // End session
    if (elapsed >= sessionTotal) {
      breathTextEl.textContent = 'COMPLETE';
      breathEl.style.transition = 'opacity 2s';
      breathEl.style.opacity = '0.3';
    }
  }

  // Subtle camera breathing
  camera.position.y = 1.5 + Math.sin(time * 0.3) * 0.02;
  camera.lookAt(0, 1.0, -50);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 1s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 1100);
  startAudio();
  startTime = performance.now();
});
</script>
