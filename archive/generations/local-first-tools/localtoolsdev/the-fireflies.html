      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,

      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;

          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));

        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — click to toggle visibility';
        hud.textContent = '✦ GOLD';
        let v = false;
        hud.onclick = () => { v = !v; hud.style.opacity = v ? '1' : '0.25'; };
        document.body.appendChild(hud);
        hud.style.opacity = '1';
        setTimeout(() => { hud.style.opacity = '0.25'; }, 4000);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
              if (hud) hud.textContent += ' ↓';
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });

            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){

<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1018);
scene.fog = new THREE.FogExp2(0x14202c, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 6);
camera.lookAt(0, 1.0, -10);

// ── Sky shader (twilight gradient) ────────────────────────────────
const skyShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      // Sky: deep blue at zenith, warm orange-pink at horizon
      vec3 zenith = vec3(0.05, 0.08, 0.18);
      vec3 horizon = vec3(0.85, 0.45, 0.30);
      vec3 sky = mix(horizon, zenith, smoothstep(0.0, 0.6, vUv.y));
      // First stars at zenith
      float starP = h(floor(vUv * 60.0));
      if (starP > 0.99) sky += vec3(0.6) * (vUv.y - 0.4);
      gl_FragColor = vec4(sky, 1.0);
    }`,
  side: THREE.BackSide
};
const sky = new THREE.Mesh(new THREE.SphereGeometry(150, 32, 16), new THREE.ShaderMaterial(skyShader));
scene.add(sky);

// ── Distant rolling hills ──────────────────────────────────────────
const hillsShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      float hill1 = step(vUv.y, 0.20 + n(vec2(vUv.x*4.0, 0.0))*0.06);
      float hill2 = step(vUv.y, 0.16 + n(vec2(vUv.x*3.0, 5.0))*0.04);
      vec3 col = vec3(0.06, 0.08, 0.10);
      if (hill1 > 0.5) col = vec3(0.04, 0.05, 0.08);
      if (hill2 > 0.5) col = vec3(0.03, 0.04, 0.06);
      // Tiny far farmhouse light
      vec2 farm = abs(vUv - vec2(0.78, 0.21));
      if (length(farm) < 0.005) col = vec3(1.0, 0.6, 0.2);
      gl_FragColor = vec4(col, 1.0);
    }`,
  transparent: true
};
const hills = new THREE.Mesh(new THREE.PlaneGeometry(120, 30), new THREE.ShaderMaterial(hillsShader));
hills.position.set(0, 5, -50);
scene.add(hills);

// ── Tall grass ground (animated) ──────────────────────────────────
const grassShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; varying vec3 vP;
    void main(){ vUv=uv; vP=position;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv; varying vec3 vP;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // Tall grass blades drawn as shader pattern
      vec2 p = vUv * vec2(80.0, 30.0);
      // Wind ripple
      p.y += sin(p.x*0.3 + time*0.5)*0.5;
      float grass = step(0.85, h(floor(p)));
      vec3 base = vec3(0.04, 0.06, 0.04);
      vec3 grassTip = vec3(0.10, 0.14, 0.08);
      vec3 col = mix(base, grassTip, grass);
      // Distance fade
      float d = length(vP.xz) * 0.02;
      col = mix(col, vec3(0.06, 0.08, 0.10), smoothstep(0.0, 1.5, d));
      gl_FragColor = vec4(col, 1.0);
    }`
};
const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.ShaderMaterial(grassShader));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ── Fireflies ─────────────────────────────────────────────────────
const FIREFLY_COUNT = 400;
const flyGeo = new THREE.BufferGeometry();
const flyPos = new Float32Array(FIREFLY_COUNT * 3);
const flyVel = new Float32Array(FIREFLY_COUNT * 3);
const flyPhase = new Float32Array(FIREFLY_COUNT);
const flyPeriod = new Float32Array(FIREFLY_COUNT);

for (let i = 0; i < FIREFLY_COUNT; i++) {
  // Distribute throughout meadow at various heights
  flyPos[i*3+0] = (Math.random() - 0.5) * 60;
  flyPos[i*3+1] = 0.5 + Math.random() * 4.0;
  flyPos[i*3+2] = (Math.random() - 0.5) * 60 - 5;
  // Lazy random walk velocity
  flyVel[i*3+0] = (Math.random() - 0.5) * 0.4;
  flyVel[i*3+1] = (Math.random() - 0.5) * 0.2;
  flyVel[i*3+2] = (Math.random() - 0.5) * 0.4;
  flyPhase[i] = Math.random() * Math.PI * 2;
  flyPeriod[i] = 2.5 + Math.random() * 3.0;  // each firefly blinks at its own rate
}
flyGeo.setAttribute('position', new THREE.BufferAttribute(flyPos, 3));
flyGeo.setAttribute('phase', new THREE.BufferAttribute(flyPhase, 1));
flyGeo.setAttribute('period', new THREE.BufferAttribute(flyPeriod, 1));

const flyMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`uniform float time; attribute float phase; attribute float period;
    varying float vBright;
    void main(){
      // Firefly brightness: smooth blink with ON-ON-OFF pattern
      float t = mod(time + phase, period) / period;  // 0..1
      // Blink shape: rises sharp, decays slow, with low-amp baseline
      float blink = 0.0;
      if (t < 0.05) blink = t / 0.05;        // rapid rise
      else if (t < 0.4) blink = 1.0 - (t - 0.05) / 0.35 * 0.6;  // slow decay
      else if (t < 0.5) blink = 0.4 - (t - 0.4) / 0.1 * 0.4;     // fade
      else blink = 0.0;                                            // off
      vBright = blink;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = 8.0 + blink * 8.0 * (200.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader:`varying float vBright;
    void main(){
      vec2 p = gl_PointCoord - 0.5;
      float r = length(p);
      if (r > 0.5) discard;
      float a = exp(-r * 6.0) * vBright;
      // Greenish-yellow firefly glow
      vec3 col = mix(vec3(0.6, 1.0, 0.3), vec3(1.0, 1.0, 0.4), vBright);
      gl_FragColor = vec4(col, a);
    }`,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const fireflies = new THREE.Points(flyGeo, flyMat);
scene.add(fireflies);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x4060a0, 0.4));
const dirLight = new THREE.DirectionalLight(0xffaa66, 0.3);
dirLight.position.set(20, 5, -10);
scene.add(dirLight);

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(audioCtx.destination);

  // Cricket layers (5 different chirr patterns)
  const cricketBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = cricketBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  // Layer 1: low rolling cricket bed
  const c1 = audioCtx.createBufferSource();
  c1.buffer = cricketBuf; c1.loop = true;
  const c1bp = audioCtx.createBiquadFilter();
  c1bp.type = 'bandpass'; c1bp.frequency.value = 4500; c1bp.Q.value = 12;
  const c1G = audioCtx.createGain(); c1G.gain.value = 0.13;
  c1.connect(c1bp).connect(c1G).connect(masterGain);
  c1.start();

  // Schedule individual cricket chirps — each chirp is a series of 3-5 quick clicks
  function scheduleChirp() {
    const next = 0.4 + Math.random() * 1.2;
    setTimeout(() => { if (audioCtx) { chirpBurst(); scheduleChirp(); } }, next * 1000);
  }
  scheduleChirp();

  function chirpBurst() {
    const t0 = audioCtx.currentTime;
    const count = 3 + Math.floor(Math.random() * 4);
    const freq = 4000 + Math.random() * 2000;
    const pan = (Math.random() - 0.5) * 1.6;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.value = freq;
        const g = audioCtx.createGain();
        g.gain.value = 0;
        g.gain.linearRampToValueAtTime(0.025, t + 0.001);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.025);
        const p = audioCtx.createStereoPanner();
        p.pan.value = pan;
        o.connect(g).connect(p).connect(masterGain);
        o.start(t);
        o.stop(t + 0.04);
      }, i * 35);
    }
  }

  // Distant cattle low (rare, every 5+ minutes)
  function scheduleCattle() {
    const next = 200 + Math.random() * 200;
    setTimeout(() => { if (audioCtx) { cattle(); scheduleCattle(); } }, next * 1000);
  }
  scheduleCattle();
  function cattle() {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = 110;
    o.frequency.exponentialRampToValueAtTime(85, t0 + 0.8);
    const g = audioCtx.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.08, t0 + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.5);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 350;
    const p = audioCtx.createStereoPanner();
    p.pan.value = (Math.random() - 0.5) * 1.4;
    o.connect(lp).connect(g).connect(p).connect(masterGain);
    o.start(t0); o.stop(t0 + 1.6);
  }

  // Bullfrog every 60+ seconds
  function scheduleBullfrog() {
    const next = 60 + Math.random() * 90;
    setTimeout(() => { if (audioCtx) { bullfrog(); scheduleBullfrog(); } }, next * 1000);
  }
  scheduleBullfrog();
  function bullfrog() {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.value = 78;
    o.frequency.exponentialRampToValueAtTime(60, t0 + 0.4);
    const g = audioCtx.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.07, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 200;
    const p = audioCtx.createStereoPanner();
    p.pan.value = (Math.random() - 0.5) * 1.6;
    o.connect(lp).connect(g).connect(p).connect(masterGain);
    o.start(t0); o.stop(t0 + 0.7);
  }

  // Faint wind through grass
  const wind = audioCtx.createBufferSource();
  wind.buffer = cricketBuf; wind.loop = true;
  const windLP = audioCtx.createBiquadFilter();
  windLP.type = 'lowpass'; windLP.frequency.value = 250;
  const windG = audioCtx.createGain(); windG.gain.value = 0.10;
  wind.connect(windLP).connect(windG).connect(masterGain);
  wind.start();
}

// ── Animation ───────────────────────────────────────────────────
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  flyMat.uniforms.time.value = time;
  skyShader.uniforms.time.value = time;
  hillsShader.uniforms.time.value = time;
  grassShader.uniforms.time.value = time;

  // Update firefly positions (lazy random walk)
  for (let i = 0; i < FIREFLY_COUNT; i++) {
    flyPos[i*3+0] += flyVel[i*3+0] * dt;
    flyPos[i*3+1] += flyVel[i*3+1] * dt;
    flyPos[i*3+2] += flyVel[i*3+2] * dt;
    // Occasionally change direction
    if (Math.random() < 0.005) {
      flyVel[i*3+0] = (Math.random() - 0.5) * 0.4;
      flyVel[i*3+1] = (Math.random() - 0.5) * 0.2;
      flyVel[i*3+2] = (Math.random() - 0.5) * 0.4;
    }
    // Stay within meadow bounds
    if (flyPos[i*3+1] < 0.3) { flyVel[i*3+1] = Math.abs(flyVel[i*3+1]); }
    if (flyPos[i*3+1] > 5) { flyVel[i*3+1] = -Math.abs(flyVel[i*3+1]); }
    if (Math.abs(flyPos[i*3+0]) > 30) { flyVel[i*3+0] *= -1; }
    if (Math.abs(flyPos[i*3+2] + 5) > 30) { flyVel[i*3+2] *= -1; }
  }
  flyGeo.attributes.position.needsUpdate = true;

  // Subtle camera breathing
  camera.position.x = Math.sin(time * 0.15) * 0.05;
  camera.position.y = 1.5 + Math.sin(time * 0.22) * 0.03;
  camera.lookAt(0, 1.0, -10);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 1s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 1100);
  startAudio();
});
</script>
