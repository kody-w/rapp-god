<script type="module">
import * as THREE from 'three';

// ============================================================
// CONSTANTS / CONFIG

const TOTAL_FLOORS = 60;
const START_FLOOR = 60;
const END_FLOOR = 1;
const STOP_FLOOR = 17;
const TOTAL_DURATION = 300; // 5 minutes
const FLOOR_HEIGHT = 4.0;   // meters (in world units)
const STOP_DWELL = 4.0;     // seconds
const DECEL_TIME = 3.5;     // approach to stop
const ACCEL_TIME = 3.0;     // departure from stop
const HOLD_DURATION = 4.0;  // SPACE pause

// SCENE / RENDERER / CAMERA
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('scene').appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.05, 2000);
camera.position.set(0, 1.55, 0.0);
camera.lookAt(0, 1.55, -1);

// ============================================================
// LIGHTING
// ============================================================
const ambient = new THREE.AmbientLight(0x4a3a30, 0.55);
scene.add(ambient);

// Warm interior cabin light (overhead)
const cabinLight = new THREE.PointLight(0xffb070, 1.4, 8, 1.2);
cabinLight.position.set(0, 2.6, 0);
scene.add(cabinLight);

// Subtle backfill from the city
const cityFill = new THREE.HemisphereLight(0xff8050, 0x150818, 0.35);
scene.add(cityFill);

// Panel glow (small pool near the elevator panel)
const panelLight = new THREE.PointLight(0xff9050, 0.7, 2.0, 2.0);
panelLight.position.set(-1.05, 1.3, -0.15);
scene.add(panelLight);

// ============================================================
// SKY (gradient shader, dynamic time-of-day)
// ============================================================
const skyGeo = new THREE.SphereGeometry(900, 32, 16);
const skyUniforms = {
  uTime: { value: 0 },
  uTimeOfDay: { value: 0.0 } // 0 = dusk, 1 = night
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms,
  side: THREE.BackSide,
  depthWrite: false,
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    varying vec3 vWorldPos;
    uniform float uTime;
    uniform float uTimeOfDay; // 0..1

    // hash + noise
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      float a = hash(i), b = hash(i+vec2(1.,0.)), c = hash(i+vec2(0.,1.)), d = hash(i+vec2(1.,1.));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(a,b,u.x) + (c-a)*u.y*(1.-u.x) + (d-b)*u.x*u.y;
    }

    void main() {
      vec3 dir = normalize(vWorldPos);
      float h = clamp(dir.y * 0.5 + 0.5, 0.0, 1.0);

      // DUSK palette
      vec3 duskZenith  = vec3(0.05, 0.10, 0.32);   // deep blue above
      vec3 duskMid     = vec3(0.78, 0.42, 0.30);   // peach
      vec3 duskHorizon = vec3(1.05, 0.62, 0.22);   // gold
      vec3 dusk = mix(duskHorizon, duskMid, smoothstep(0.0, 0.35, h));
      dusk = mix(dusk, duskZenith, smoothstep(0.35, 0.85, h));

      // NIGHT palette
      vec3 nightZenith = vec3(0.01, 0.015, 0.05);
      vec3 nightMid    = vec3(0.06, 0.05, 0.13);
      vec3 nightHor    = vec3(0.18, 0.10, 0.16);
      vec3 night = mix(nightHor, nightMid, smoothstep(0.0, 0.35, h));
      night = mix(night, nightZenith, smoothstep(0.35, 0.85, h));

      vec3 col = mix(dusk, night, uTimeOfDay);

      // soft horizon haze warm tint mixed with cool
      float haze = exp(-h*4.0);
      vec3 hazeCol = mix(vec3(1.1, 0.55, 0.18), vec3(0.10, 0.06, 0.20), uTimeOfDay);
      col += hazeCol * haze * 0.35;

      // subtle cloud band
      float cloud = noise(dir.xz * 6.0 + vec2(uTime*0.01, 0.0));
      cloud = smoothstep(0.55, 0.85, cloud) * smoothstep(0.05, 0.25, h) * (1.0 - smoothstep(0.45, 0.85, h));
      vec3 cloudCol = mix(vec3(0.95, 0.55, 0.30), vec3(0.10, 0.08, 0.20), uTimeOfDay);
      col = mix(col, cloudCol, cloud * 0.55);

      // subtle stars (only at night)
      float starField = step(0.997, hash(floor(dir.xz*200.0)));
      col += vec3(0.9, 0.92, 1.0) * starField * uTimeOfDay * 0.6 * smoothstep(0.3, 0.7, h);

      // tiny vertical gradient stripe variation
      col *= 1.0 + 0.04 * sin(dir.y * 30.0 + uTime*0.1);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

// CITY SKYLINE (3 parallax layers, GLSL)
// ============================================================
function makeCityLayer(distance, scaleY, density, hueShift, opacity, scrollMul) {
  const geo = new THREE.PlaneGeometry(1200, 380, 1, 1);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uTime: { value: 0 },
      uScroll: { value: 0 }, // vertical scroll (descent)
      uTimeOfDay: { value: 0 },
      uDensity: { value: density },
      uHueShift: { value: hueShift },
      uOpacity: { value: opacity },
      uScrollMul: { value: scrollMul },
      uScaleY: { value: scaleY }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uScroll;
      uniform float uTimeOfDay;
      uniform float uDensity;
      uniform float uHueShift;
      uniform float uOpacity;
      uniform float uScrollMul;
      uniform float uScaleY;

      float hash(float n) { return fract(sin(n)*43758.5453123); }
      float hash2(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

      // Building silhouette: returns building height fraction + window pattern
      // Each column 'col' is a building, each segment a window grid
      vec3 buildingCol(vec2 uv, float col, float seed) {
          float h0 = hash(col*1.7 + seed);
          float h1 = hash(col*3.3 + seed*7.0);
          float bh = mix(0.18, 0.92, h0*h0); // tall variation
          // some buildings narrow, some wide
          float wMod = mix(0.7, 1.4, h1);

          // is point inside building silhouette?
          float inSilo = step(uv.y, bh);

          // window grid (only inside silhouette)
          float wx = floor(uv.x * 24.0 * wMod);
          float wy = floor(uv.y * 60.0);
          float wkey = hash2(vec2(wx + col*100.0, wy)) ;

          // each window: lit or dark, with flicker
          float lit = step(0.42, wkey);
          // some windows out
          float out_ = step(hash2(vec2(wx*0.3 + col*50.0 + seed, wy*0.7)), 0.18);
          lit *= 1.0 - out_;
          // flicker (rare)
          float flick = step(0.97, hash2(vec2(wx + col*5.0, floor(uTime*4.0 + wy)))) ;
          lit *= 1.0 - flick * 0.6;

          // ambient light fade with height (more lit at base)
          lit *= mix(0.9, 0.45, uv.y / max(bh, 0.001));

          // window position inside cell (small lit rectangle)
          vec2 wf = fract(vec2(uv.x * 24.0 * wMod, uv.y * 60.0));
          float winShape = smoothstep(0.18, 0.22, wf.x) * (1.0 - smoothstep(0.78, 0.82, wf.x));
          winShape *= smoothstep(0.20, 0.28, wf.y) * (1.0 - smoothstep(0.72, 0.80, wf.y));

          float windowGlow = lit * winShape * inSilo;

          return vec3(inSilo, windowGlow, bh);
      }

      void main() {
        vec2 uv = vUv;

        // scroll vertically (because camera descends -> world scrolls up relative to layer)
        uv.y -= uScroll * uScrollMul;
        // wrap
        uv.y = fract(uv.y * 0.5) * 2.0;

        // each column is a building
        float colFloat = uv.x * uDensity;
        float colIdx = floor(colFloat);
        float colFrac = fract(colFloat);

        // stretch/repeat horizontal too with slow scroll
        float hScroll = uTime * 0.002 * uScrollMul;
        colIdx += floor(hScroll);

        vec2 luv = vec2(colFrac, uv.y * uScaleY);

        vec3 b = buildingCol(luv, colIdx, 13.7);

        // building color: warm during dusk, cool deep blue at night
        vec3 buildingDayColor = vec3(0.10, 0.07, 0.14);
        vec3 buildingNightColor = vec3(0.025, 0.02, 0.05);
        vec3 buildingCol_ = mix(buildingDayColor, buildingNightColor, uTimeOfDay);
        // distance haze tint
        buildingCol_ = mix(buildingCol_, vec3(0.85, 0.45, 0.22) * (1.0-uTimeOfDay) + vec3(0.05,0.04,0.10)*uTimeOfDay, 0.35);

        // window glow: warm
        vec3 windowDuskColor = vec3(1.6, 1.05, 0.45);
        vec3 windowNightColor = vec3(1.4, 1.15, 0.6);
        vec3 windowColor = mix(windowDuskColor, windowNightColor, uTimeOfDay);

        // assemble
        vec3 col = vec3(0.0);
        col += buildingCol_ * b.x;
        col += windowColor * b.y * 1.2;

        // hueShift mixes a faint bluish tint for far layers
        col = mix(col, col * vec3(0.7, 0.85, 1.15), uHueShift);

        // alpha
        float alpha = b.x * uOpacity;
        // smooth top (sky transition - slight halo)
        alpha = max(alpha, b.y * 0.9 * uOpacity);

        gl_FragColor = vec4(col, alpha);
      }
    `
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(0, 0, -distance);
  m.scale.set(1, 1, 1);
  return m;
}

const trafficUniforms = {

const TRAFFIC_COUNT = 60;
const trafficGeo = new THREE.BufferGeometry();
const trafficPos = new Float32Array(TRAFFIC_COUNT * 3);
const trafficSeed = new Float32Array(TRAFFIC_COUNT);
const trafficColor = new Float32Array(TRAFFIC_COUNT);
for (let i=0; i<TRAFFIC_COUNT; i++) {
  trafficPos[i*3+0] = (Math.random() - 0.5) * 400;
  trafficPos[i*3+1] = 25 + Math.random() * 80;
  trafficPos[i*3+2] = -100 - Math.random() * 90;
  trafficSeed[i] = Math.random();
  trafficColor[i] = Math.random() < 0.5 ? 0 : 1; // red or white-amber
}
trafficGeo.setAttribute('position', new THREE.BufferAttribute(trafficPos, 3));
trafficGeo.setAttribute('aSeed', new THREE.BufferAttribute(trafficSeed, 1));
trafficGeo.setAttribute('aColor', new THREE.BufferAttribute(trafficColor, 1));

const trafficMat = new THREE.ShaderMaterial({
  uniforms: trafficUniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aSeed;
    attribute float aColor;
    varying float vAlpha;
    varying float vColor;
    uniform float uTime;
    void main() {
      vec3 p = position;
      // drift across sky (mostly horizontal)
      float speed = 1.5 + aSeed * 2.0;
      p.x += sin(uTime * 0.05 * speed + aSeed * 6.28) * 30.0;
      p.x += uTime * (0.7 + aSeed * 0.6) * (aSeed > 0.5 ? 1.0 : -1.0);
      // wrap
      p.x = mod(p.x + 200.0, 400.0) - 200.0;

      // gentle bob
      p.y += sin(uTime * 0.3 + aSeed * 12.0) * 0.4;

      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;

      // blink
      float blink = step(0.5, fract(uTime * 1.4 + aSeed * 6.0));
      vAlpha = mix(0.4, 1.0, blink);
      vColor = aColor;

      gl_PointSize = 3.0 + 4.0 * (1.0 - clamp(length(mv.xyz)/200.0, 0.0, 1.0));
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    varying float vColor;
    uniform float uTimeOfDay;
    void main() {
      vec2 c = gl_PointCoord - 0.5;
      float d = length(c);
      float a = smoothstep(0.5, 0.0, d);
      vec3 red = vec3(1.0, 0.25, 0.15);
      vec3 white = vec3(1.0, 0.85, 0.55);
      vec3 col = mix(red, white, vColor);
      gl_FragColor = vec4(col, a * vAlpha * (0.4 + 0.6*uTimeOfDay));
    }
  `
});

  uniforms: {
    uTime: { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;

    // damask-ish pattern using overlapping sine motifs
    float damask(vec2 uv) {
      vec2 p = uv * vec2(8.0, 8.0);
      vec2 g = fract(p) - 0.5;
      vec2 id = floor(p);
      // alternate
      float alt = mod(id.x + id.y, 2.0);
      float r = length(g) * 2.0;
      float petal = abs(sin(atan(g.y, g.x) * 4.0)) * 0.5 + 0.5;
      float motif = smoothstep(0.55, 0.45, r * mix(1.0, 0.85, petal));
      // diamond cross
      float diamond = smoothstep(0.4, 0.36, abs(g.x) + abs(g.y));
      return mix(motif * 0.7, diamond * 0.9, alt);
    }
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }

    void main() {
      vec2 uv = vUv;
      float d = damask(uv);
      vec3 base = vec3(0.32, 0.10, 0.08);   // deep maroon
      vec3 motifCol = vec3(0.65, 0.45, 0.20); // brassy gold
      vec3 col = mix(base, motifCol, d * 0.7);

      float n = hash(floor(uv*600.0));
      col *= 0.85 + n*0.25;

      // edge darken
      vec2 e = abs(uv - 0.5) * 2.0;
      float v = max(e.x, e.y);
      col *= 1.0 - smoothstep(0.85, 1.0, v) * 0.4;

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

  vertexShader: `

  fragmentShader: `
    varying vec3 vN;
    varying vec3 vWp;
    varying vec2 vUv;
    uniform vec3 uColor;
    uniform vec3 uLight;
    uniform float uTime;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    void main() {
      vec3 n = normalize(vN);
      // brushed scratches along U
      float scratch = sin(vUv.y * 600.0 + hash(vec2(floor(vUv.x*40.0), 0.0))*10.0) * 0.5 + 0.5;
      scratch = mix(0.85, 1.05, scratch);

      float rim = pow(1.0 - clamp(dot(n, vec3(0.0, 0.0, 1.0)), 0.0, 1.0), 2.0);
      vec3 col = uColor * (0.45 + ndl * 0.7) * scratch * dirt;
      col += vec3(1.0, 0.7, 0.35) * rim * 0.55;
      // tarnish in shadow
      col = mix(col, col * vec3(0.55, 0.45, 0.32), 1.0 - ndl);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

const marbleMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p);
      float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
      vec2 u=f*f*(3.0-2.0*f);
      return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
    }
    float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.0; a*=0.5;} return v;}
    void main(){
      vec2 uv=vUv*4.0;
      float v = fbm(uv*1.2);
      float vein = abs(sin(uv.x*3.0 + v*4.0)) ;
      vein = smoothstep(0.92, 1.0, 1.0 - vein);
      vec3 base = mix(vec3(0.92,0.88,0.82), vec3(0.78,0.72,0.65), v);
      vec3 col = mix(base, vec3(0.35,0.28,0.22), vein*0.7);
      // checker scale subtle
      float ch = mod(floor(vUv.x*8.0)+floor(vUv.y*8.0), 2.0);
      col *= 0.95 + ch*0.05;
      gl_FragColor=vec4(col,1.0);
    }
  `
});

const lookState = {
  yaw: 0, pitch: 0,
  targetYaw: 0, targetPitch: 0,
  dragging: false,
  lastX: 0, lastY: 0
};
const MAX_YAW = 0.55;
const MAX_PITCH = 0.32;

renderer.domElement.addEventListener('pointerdown', (e) => {
  lookState.dragging = true;
  lookState.lastX = e.clientX;
  lookState.lastY = e.clientY;
  document.body.classList.add('dragging');
});
window.addEventListener('pointerup', () => {
  lookState.dragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('pointermove', (e) => {
  if (!lookState.dragging) return;
  const dx = e.clientX - lookState.lastX;
  const dy = e.clientY - lookState.lastY;
  lookState.lastX = e.clientX;
  lookState.lastY = e.clientY;
  lookState.targetYaw -= dx * 0.0035;
  lookState.targetPitch -= dy * 0.0035;
  lookState.targetYaw = Math.max(-MAX_YAW, Math.min(MAX_YAW, lookState.targetYaw));
  lookState.targetPitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH, lookState.targetPitch));
});

// ============================================================
// AUDIO ENGINE
// ============================================================
const audio = {
  ready: false,
  ctx: null,
  master: null,
  musicGain: null,
  ambGain: null,
  fxGain: null,
  bpm: 90,
  startTime: 0,
  nextNoteTime: 0,
  step: 0,
  lookahead: null,

  init() {
    if (this.ready) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.0;
    this.master.connect(this.ctx.destination);

    // smooth fade-in
    this.master.gain.linearRampToValueAtTime(0.85, this.ctx.currentTime + 2.5);

    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.55;
    this.musicGain.connect(this.master);

    this.ambGain = this.ctx.createGain();
    this.ambGain.gain.value = 0.6;
    this.ambGain.connect(this.master);

    this.fxGain = this.ctx.createGain();
    this.fxGain.gain.value = 0.7;
    this.fxGain.connect(this.master);

    // Reverb (convolution synth via noise impulse)
    this.reverb = this.ctx.createConvolver();
    this.reverb.buffer = this.makeImpulse(2.4, 2.0);
    const wet = this.ctx.createGain();
    wet.gain.value = 0.15;
    this.reverb.connect(wet);
    wet.connect(this.master);
    this.wetSend = wet;

    this.ready = true;

    this.startAmbient();
    this.startMusic();
  },

  makeImpulse(duration, decay) {
    const rate = this.ctx.sampleRate;
    const length = rate * duration;
    const impulse = this.ctx.createBuffer(2, length, rate);
    for (let ch=0; ch<2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i=0; i<length; i++) {
        data[i] = (Math.random()*2-1) * Math.pow(1 - i/length, decay);
      }
    }
    return impulse;
  },

  startAmbient() {
    // Sub-rumble (elevator hum)
    const rumble = this.ctx.createOscillator();
    rumble.type = 'sine';
    rumble.frequency.value = 42;
    const rumbleGain = this.ctx.createGain();
    rumbleGain.gain.value = 0.08;
    const rumbleLFO = this.ctx.createOscillator();
    rumbleLFO.frequency.value = 0.3;
    const rumbleLFOGain = this.ctx.createGain();
    rumbleLFOGain.gain.value = 0.02;
    rumbleLFO.connect(rumbleLFOGain).connect(rumbleGain.gain);
    rumble.connect(rumbleGain).connect(this.ambGain);
    rumble.start(); rumbleLFO.start();

    // 60Hz buzz
    const buzz = this.ctx.createOscillator();
    buzz.type = 'sawtooth';
    buzz.frequency.value = 60;
    const buzzFilt = this.ctx.createBiquadFilter();
    buzzFilt.type = 'lowpass';
    buzzFilt.frequency.value = 120;
    const buzzGain = this.ctx.createGain();
    buzzGain.gain.value = 0.012;
    buzz.connect(buzzFilt).connect(buzzGain).connect(this.ambGain);
    buzz.start();

    // Air vent whoosh: filtered noise
    const noiseBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 4, this.ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*0.5;
    const noiseSrc = this.ctx.createBufferSource();
    noiseSrc.buffer = noiseBuf;
    noiseSrc.loop = true;
    const noiseFilt = this.ctx.createBiquadFilter();
    noiseFilt.type = 'bandpass';
    noiseFilt.frequency.value = 700;
    noiseFilt.Q.value = 0.7;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.value = 0.05;
    noiseSrc.connect(noiseFilt).connect(noiseGain).connect(this.ambGain);
    noiseSrc.start();

    // Vinyl crackle
    const crackleBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 3, this.ctx.sampleRate);
    const cd = crackleBuf.getChannelData(0);
    for (let i=0;i<cd.length;i++) {
      cd[i] = Math.random() < 0.0008 ? (Math.random()*2-1) * 0.6 : 0;
    }
    const crackleSrc = this.ctx.createBufferSource();
    crackleSrc.buffer = crackleBuf;
    crackleSrc.loop = true;
    const crackleFilt = this.ctx.createBiquadFilter();
    crackleFilt.type = 'highpass';
    crackleFilt.frequency.value = 1500;
    const crackleGain = this.ctx.createGain();
    crackleGain.gain.value = 0.09;
    crackleSrc.connect(crackleFilt).connect(crackleGain).connect(this.ambGain);
    crackleSrc.start();
  },

  // ----- MUSIC: bossa nova lo-fi loop (Dm9-G7-Cmaj7-Am7) at 90 BPM -----
  startMusic() {
    this.startTime = this.ctx.currentTime + 0.1;
    this.nextNoteTime = this.startTime;
    this.step = 0;
    this.lookahead = setInterval(() => this.scheduler(), 25);
  },

  scheduler() {
    while (this.nextNoteTime < this.ctx.currentTime + 0.2) {
      this.scheduleStep(this.step, this.nextNoteTime);
      const sixteenth = 60 / this.bpm / 4;
      this.nextNoteTime += sixteenth;
      this.step = (this.step + 1) % 64; // 4 bars of 16ths
    }
  },

  // Note frequency
  freq(n) { return 440 * Math.pow(2, (n - 69) / 12); },

  scheduleStep(step, time) {
    const beat = Math.floor(step / 4);          // 0..15 (beat in 4 bars)
    const sub = step % 4;                       // 0..3
    const bar = Math.floor(step / 16) % 4;      // 0..3 (4 chord bars)

    // Chord progression: Dm9 - G7 - Cmaj7 - Am7
    const chords = [
      { root: 38, notes: [38, 53, 57, 60, 64] }, // Dm9 (D, F, A, C, E)
      { root: 31, notes: [31, 50, 53, 59, 62] }, // G7 (G, B, D, F + tensions...) approx
      { root: 36, notes: [36, 52, 55, 59, 62] }, // Cmaj7 (C, E, G, B, D)
      { root: 33, notes: [33, 48, 52, 55, 60] }  // Am7 (A, C, E, G + 13)
    ];
    const chord = chords[bar];

    // Bass on root: beat 1 + & of 3 (bossa-flavored)
    if (sub === 0 && (beat % 4 === 0 || beat % 4 === 2)) {
      this.bass(this.freq(chord.root), time, 0.7);
    }
    // & of 2 / 4 light bass
    if (sub === 2 && (beat % 4 === 1 || beat % 4 === 3)) {
      this.bass(this.freq(chord.root + 7), time, 0.5);
    }

    // Brushed snare on 2 & 4 (beat % 4 == 1 or 3, sub 0)
    if (sub === 0 && (beat % 4 === 1 || beat % 4 === 3)) {
      this.brushSnare(time, 0.55);
    }
    // Hi-hat / shaker on every 8th
    if (sub === 0 || sub === 2) {
      this.shaker(time, sub === 0 ? 0.18 : 0.12);
    }

    // Chord stabs (pad-like) on beats 1 and 3 of each bar (offset feel)
    if (sub === 0 && (beat % 4 === 0 || beat % 4 === 2)) {
      // play 3-note voicing
      const voicing = [chord.notes[1], chord.notes[2], chord.notes[3]];
      voicing.forEach((n, i) => this.padNote(this.freq(n), time + i * 0.005, 1.6, 0.07));
    }

    // Bell-like FM lead (sparse)
    // play melody notes on bar 1 beat 1, bar 2 beat 3, bar 3 beat 1, bar 4 beat 4 (improvy)
    const melodyMap = {
      0: [chord.notes[3], chord.notes[4]],       // Dm9 -> C, E
      16: [chord.notes[2], chord.notes[3]],
      40: [chord.notes[3], chord.notes[2]],
      52: [chord.notes[4]]
    };
    if (melodyMap[step]) {
      melodyMap[step].forEach((n, i) => this.bellLead(this.freq(n + 12), time + i*0.18, 0.9, 0.08));
    }
  },

  bass(f, t, vel) {
    const g = this.musicGain;
    const o = this.ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    const og = this.ctx.createGain();
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(vel * 0.55, t + 0.01);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 220;
    o.connect(filt).connect(og).connect(g);
    o.start(t); o.stop(t + 0.75);
  },

  brushSnare(t, vel) {
    // filtered noise burst with quick decay
    const len = 0.18;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 1200;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vel * 0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + len);
    src.connect(filt).connect(g).connect(this.musicGain);
    src.start(t); src.stop(t + len);
  },

  shaker(t, vel) {
    const len = 0.05;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 5000;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vel * 0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + len);
    src.connect(filt).connect(g).connect(this.musicGain);
    src.start(t); src.stop(t + len);
  },

  padNote(f, t, dur, vel) {
    // soft sine pad
    const o = this.ctx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = f;
    const o2 = this.ctx.createOscillator();
    o2.type = 'sine';
    o2.frequency.value = f * 1.005;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 1400;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.05);
    g.gain.linearRampToValueAtTime(vel*0.6, t + dur*0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(filt); o2.connect(filt);
    filt.connect(g);
    g.connect(this.musicGain);
    g.connect(this.wetSend);
    o.start(t); o2.start(t);
    o.stop(t+dur+0.05); o2.stop(t+dur+0.05);
  },

  bellLead(f, t, dur, vel) {
    // FM bell: carrier + modulator
    const car = this.ctx.createOscillator();
    car.type = 'sine';
    car.frequency.value = f;
    const mod = this.ctx.createOscillator();
    mod.type = 'sine';
    mod.frequency.value = f * 2.01;
    const modGain = this.ctx.createGain();
    modGain.gain.setValueAtTime(f * 1.5, t);
    modGain.gain.exponentialRampToValueAtTime(1, t + dur);
    mod.connect(modGain).connect(car.frequency);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    car.connect(g).connect(this.musicGain);
    car.connect(this.wetSend);
    mod.start(t); car.start(t);
    mod.stop(t+dur+0.05); car.stop(t+dur+0.05);
  },

  // 2-tone soft bell (floor ding)
  playDing() {
    if (!this.ready) return;
    const t = this.ctx.currentTime;
    const tones = [880, 1318.5];
    tones.forEach((f, i) => {
      const o = this.ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const o2 = this.ctx.createOscillator();
      o2.type = 'sine';
      o2.frequency.value = f * 2.01;
      const mg = this.ctx.createGain();
      mg.gain.value = f * 0.2;
      o2.connect(mg).connect(o.frequency);
      const g = this.ctx.createGain();
      const tt = t + i * 0.18;
      g.gain.setValueAtTime(0, tt);
      g.gain.linearRampToValueAtTime(0.18, tt + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, tt + 1.2);
      o.connect(g).connect(this.fxGain);
      o.connect(this.wetSend);
      o.start(tt); o2.start(tt);
      o.stop(tt + 1.3); o2.stop(tt + 1.3);
    });
  },

  // Slowing-pulse rising tone (approaching stop)
  playSlowingPulse() {
    if (!this.ready) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(660, t + DECEL_TIME);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.1, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + DECEL_TIME);
    o.connect(g).connect(this.fxGain);
    o.start(t); o.stop(t + DECEL_TIME + 0.1);
  },

  // Door open hiss
  playDoorHiss() {
    if (!this.ready) return;
    const t = this.ctx.currentTime;
    const len = 1.6;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) {
      const env = Math.sin(Math.PI * i/d.length);
      d[i] = (Math.random()*2-1) * env * 0.6;
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 1800;
    filt.Q.value = 0.6;
    const g = this.ctx.createGain();
    g.gain.value = 0.18;
    src.connect(filt).connect(g).connect(this.fxGain);
    src.start(t); src.stop(t + len + 0.05);
  },

  // 3-tone arrival chime
  playArrival() {
    if (!this.ready) return;
    const t = this.ctx.currentTime;
    const tones = [523.25, 659.25, 783.99]; // C5 E5 G5
    tones.forEach((f, i) => {
      const tt = t + i * 0.35;
      const o = this.ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const o2 = this.ctx.createOscillator();
      o2.type = 'sine';
      o2.frequency.value = f * 3.01;
      const m = this.ctx.createGain();
      m.gain.value = f * 0.15;
      o2.connect(m).connect(o.frequency);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, tt);
      g.gain.linearRampToValueAtTime(0.22, tt + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, tt + 1.8);
      o.connect(g).connect(this.fxGain);
      o.connect(this.wetSend);
      o.start(tt); o2.start(tt);
      o.stop(tt + 1.85); o2.stop(tt + 1.85);
    });
  }
};

// ============================================================
// ELEVATOR STATE MACHINE
// ============================================================
const elevatorState = {
  phase: 'descending',     // 'descending', 'decelerating', 'stopped', 'accelerating', 'arrived'
  currentFloor: START_FLOOR,
  floorFraction: 0,        // 0 at floor, 1 = transitioned to next-lower
  speed: 1.0,              // multiplier
  baseTime: 0,             // virtual elapsed (excludes pauses)
  doorOpenAmount: 0,       // 0..1
  stopTimer: 0,
  decelStartTime: 0,
  hasStoppedAt17: false,
  arrived: false,
  marqueeShown: false
};

// Elapsed-floor calculation:
// floors_per_second = (60-1) / TOTAL_DURATION = 59/300 ≈ 0.197
const FLOORS_PER_SEC = (START_FLOOR - END_FLOOR) / TOTAL_DURATION;

let lastDingFloor = START_FLOOR;
let virtualTime = 0; // time across descending only

function updateElevator(dt) {
  const st = elevatorState;

  // Hold (SPACE) override — smoothly stop while in 'descending'
  let speed = 1.0;

  if (holdActive) {
    holdTimer -= dt;
    if (holdTimer <= 0) {
      holdActive = false;
      document.getElementById('hold-indicator').classList.remove('show');
    }
    speed = 0.0;
  }

  // Phase machine
  if (st.phase === 'descending') {
    // Compute how close to floor 17
    const floorsToStop = (st.currentFloor + (1 - st.floorFraction) * 0) - STOP_FLOOR;
    // Approximate continuous floor (60 → 1)
    const contFloor = START_FLOOR - virtualTime * FLOORS_PER_SEC;
    if (!st.hasStoppedAt17 && contFloor <= STOP_FLOOR + (DECEL_TIME * FLOORS_PER_SEC)) {
      st.phase = 'decelerating';
      st.decelStartTime = 0;
      audio.playSlowingPulse();
    }
    // arrival check
    if (contFloor <= END_FLOOR + (DECEL_TIME * FLOORS_PER_SEC) && st.hasStoppedAt17) {
      st.phase = 'arriving';
      st.decelStartTime = 0;
      audio.playSlowingPulse();
    }

    if (!holdActive) virtualTime += dt;
  } else if (st.phase === 'decelerating') {
    st.decelStartTime += dt;
    const k = Math.min(st.decelStartTime / DECEL_TIME, 1.0);
    speed = 1.0 - k;
    virtualTime += dt * speed; // slow virtual time too
    if (k >= 1.0) {
      st.phase = 'stopped';
      st.stopTimer = STOP_DWELL;
      // Snap to STOP_FLOOR exactly
      virtualTime = (START_FLOOR - STOP_FLOOR) / FLOORS_PER_SEC;
      audio.playDing();
      audio.playDoorHiss();
      // Reveal doors and animate open
      doorL.visible = true;
      doorR.visible = true;
      lobbyGroup.visible = true;
      lobbyGroup.position.set(0, 0, -3.8); // place lobby behind doors
      showMarquee('FLOOR 17 · LOBBY');
    }
  } else if (st.phase === 'stopped') {
    // animate doors open (during first 1.5s of dwell)
    const doorTime = STOP_DWELL - st.stopTimer;
    if (doorTime < 1.5) {
      st.doorOpenAmount = doorTime / 1.5;
    } else if (doorTime > STOP_DWELL - 1.5) {
      st.doorOpenAmount = (STOP_DWELL - doorTime) / 1.5;
    } else {
      st.doorOpenAmount = 1.0;
    }
    st.stopTimer -= dt;
    if (st.stopTimer <= 0) {
      st.phase = 'accelerating';
      st.decelStartTime = 0;
      st.doorOpenAmount = 0;
      doorL.visible = false;
      doorR.visible = false;
      lobbyGroup.visible = false;
      st.hasStoppedAt17 = true;
      hideMarquee();
    }
    speed = 0;
  } else if (st.phase === 'accelerating') {
    st.decelStartTime += dt;
    const k = Math.min(st.decelStartTime / ACCEL_TIME, 1.0);
    speed = k;
    virtualTime += dt * speed;
    if (k >= 1.0) {
      st.phase = 'descending';
    }
  } else if (st.phase === 'arriving') {
    st.decelStartTime += dt;
    const k = Math.min(st.decelStartTime / DECEL_TIME, 1.0);
    speed = 1.0 - k;
    virtualTime += dt * speed;
    if (k >= 1.0) {
      st.phase = 'arrived';
      st.stopTimer = 999;
      virtualTime = (START_FLOOR - END_FLOOR) / FLOORS_PER_SEC;
      audio.playArrival();
      audio.playDoorHiss();
      doorL.visible = true;
      doorR.visible = true;
      gardenGroup.visible = true;
      gardenGroup.position.set(0, 0, -3.8);
      showMarquee('WELCOME TO THE TWILIGHT TOWER');
    }
  } else if (st.phase === 'arrived') {
    // Doors open and stay open
    st.doorOpenAmount = Math.min(1.0, st.doorOpenAmount + dt * 0.6);
    speed = 0;
  }

  // Compute display floor
  const contFloor = Math.max(END_FLOOR, START_FLOOR - virtualTime * FLOORS_PER_SEC);
  st.currentFloor = Math.ceil(contFloor);
  st.floorFraction = st.currentFloor - contFloor;

  // Floor changed? Ding (skip when stopped)
  if (st.currentFloor !== lastDingFloor && st.phase !== 'stopped' && st.phase !== 'arrived') {
    lastDingFloor = st.currentFloor;
    audio.playDing();
  }

  // Speed display
  const ms = (speed * 0.6).toFixed(1);
  const speedEl = document.getElementById('speed-display');
  if (st.phase === 'arrived') speedEl.textContent = '0.0 m/s · ARRIVED';
  else if (st.phase === 'stopped') speedEl.textContent = '0.0 m/s · DOORS OPEN';
  else speedEl.textContent = `${ms} m/s · DESCENDING`;

  // Floor number
  document.getElementById('floor-num').textContent = String(st.currentFloor).padStart(2, '0');

  // Time-of-day mapping: 0 at start, 1 at end
  const t01 = Math.min(1, virtualTime / TOTAL_DURATION);
  skyUniforms.uTimeOfDay.value = t01;
  cityFar.material.uniforms.uTimeOfDay.value = t01;
  cityMid.material.uniforms.uTimeOfDay.value = t01;
  cityNear.material.uniforms.uTimeOfDay.value = t01;
  trafficUniforms.uTimeOfDay.value = t01;

  // Time HUD
  const minutes = 18;
  const baseMin = 42;
  const totalMin = baseMin + Math.floor(t01 * 38); // dusk 18:42 → 19:20 night
  const h = 18 + Math.floor(totalMin / 60);
  const mm = String(totalMin % 60).padStart(2, '0');
  let label = 'DUSK';
  if (t01 > 0.45) label = 'TWILIGHT';
  if (t01 > 0.85) label = 'NIGHT';
  document.getElementById('time-display').textContent = `${label} · ${h}:${mm}`;

  // City scroll: scroll uScroll proportional to virtualTime (so buildings stream upward)
  cityFar.material.uniforms.uScroll.value = virtualTime * 0.0035;
  cityMid.material.uniforms.uScroll.value = virtualTime * 0.0070;
  cityNear.material.uniforms.uScroll.value = virtualTime * 0.0150;

  // Subtle vertical layer drift to enhance sense of motion
  const yOffset = (virtualTime % 60) * 0.05 * speed;
  cityFar.position.y = 28 + Math.sin(virtualTime*0.03) * 0.5;
  cityMid.position.y = 18 + Math.sin(virtualTime*0.04+1) * 0.4;
  cityNear.position.y = 10 + Math.sin(virtualTime*0.05+2) * 0.3;

  // Door open animation
  doorL.position.x = -0.92 - st.doorOpenAmount * 1.85;
  doorR.position.x = 0.92 + st.doorOpenAmount * 1.85;
  doorL.material.opacity = 1.0 - st.doorOpenAmount * 0.0; // remain visible until fully open
  doorR.material.opacity = 1.0;
  // Fade door visibility at extremes
  if (st.doorOpenAmount > 0.99) { /* let lobby/garden show */ }

  // Hold button glow
  holdBtnMat.emissiveIntensity = holdActive ? 1.5 : 0.4;
  holdBtnMat.emissive.setHex(holdActive ? 0xff7030 : 0x803020);

  // Cabin light flicker (subtle)
  cabinLight.intensity = 1.4 + Math.sin(performance.now()*0.001) * 0.05 + (Math.random()<0.005 ? -0.4 : 0);

  // Panel light pulses with descent
  panelLight.intensity = 0.7 + speed * 0.2;
}

function showMarquee(text) {
  const el = document.getElementById('marquee');
  el.textContent = text;
  el.classList.add('show');
  elevatorState.marqueeShown = true;
}
function hideMarquee() {
  document.getElementById('marquee').classList.remove('show');
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastT = performance.now() / 1000;
function loop() {
  const now = performance.now() / 1000;
  const dt = Math.min(0.06, now - lastT);
  lastT = now;

  // Smooth look
  lookState.yaw += (lookState.targetYaw - lookState.yaw) * 0.08;
  lookState.pitch += (lookState.targetPitch - lookState.pitch) * 0.08;
  camera.rotation.order = 'YXZ';
  camera.rotation.y = lookState.yaw;
  camera.rotation.x = lookState.pitch;

  // Tiny camera bob to simulate elevator vibration
  const bob = Math.sin(now * 4.0) * 0.0025 + Math.sin(now * 7.3) * 0.0015;
  camera.position.x = lookState.yaw * 0.04;
  camera.position.y = 1.55 + bob;
  camera.position.z = 0.0;

  // Update uniforms
  skyUniforms.uTime.value = now;
  cityFar.material.uniforms.uTime.value = now;
  cityMid.material.uniforms.uTime.value = now;
  cityNear.material.uniforms.uTime.value = now;
  trafficUniforms.uTime.value = now;
  carpetMat.uniforms.uTime.value = now;
  marbleMat.uniforms.uTime.value = now;
  glassUniforms.uTime.value = now;
  brassMat.uniforms.uTime.value = now;

  updateElevator(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// ============================================================
// AUDIO GATE
// ============================================================
const gate = document.getElementById('audio-gate');
const enterBtn = document.getElementById('enter-btn');
function startExperience() {
  audio.init();
  gate.classList.add('hide');
  setTimeout(() => gate.style.display = 'none', 1300);
  // Show initial marquee
  setTimeout(() => {
    showMarquee('FLOOR 60 · OBSERVATION DECK · BEGIN DESCENT');
    setTimeout(hideMarquee, 5000);
  }, 1800);
}
enterBtn.addEventListener('click', startExperience);
gate.addEventListener('click', (e) => {
  if (e.target === gate) startExperience();
});

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// kick
loop();
</script>
