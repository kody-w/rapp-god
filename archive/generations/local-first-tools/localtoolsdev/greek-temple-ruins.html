    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);

          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — click to toggle visibility';
        hud.textContent = '✦ GOLD';

        hud.style.opacity = '1';
        setTimeout(() => { hud.style.opacity = '0.25'; }, 4000);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);

            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);

              if (hud) hud.textContent += ' ↓';
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;

        }

      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});

        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){

            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

            const append = () => { if (document.body) document.body.appendChild(gate); };

          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';

<script type="module">
import * as THREE from 'three';

/* ════════════════════════════════════════════════════════════════════════
   TEMPLE OF HELIOS · DELOS · LATE AFTERNOON
   First DAYTIME flagship for RappterZoo. Mood: the loud chirring quietude
   of Mediterranean ruins. Sun-bleached marble, cobalt sea, golden grass,
   cypress shadows, cicadas as the hero sound.
   ════════════════════════════════════════════════════════════════════════ */

const $ = (s) => document.querySelector(s);
const TAU = Math.PI * 2;
const clamp = (v,a,b)=>v<a?a:v>b?b:v;
const lerp  = (a,b,t)=>a+(b-a)*t;
const smooth= (t)=>t*t*(3-2*t);

const toast = (msg, ms=1900) => {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
};

/* ───────────────────────── RENDERER / SCENE ───────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;          // bright daylight
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
$('#app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xe9d8a8, 0.0042);   // warm haze

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 4000);
camera.position.set(0, 1.72, 8);

/* ───────────────────────── SUN STATE ────────────────────────────── */
// Time runs 16:00 -> 18:00 across an 8-min cycle. SPACE jumps +30 min.
const SUN = {
  time: 16.0,          // hours, 16..18
  cycleStart: performance.now(),
  cycleMs: 8 * 60 * 1000,
  bonus: 0,            // hours added by SPACE
  dir: new THREE.Vector3(),
  color: new THREE.Color(),
  ambientColor: new THREE.Color(),
  intensity: 1,
};

function updateSun(now){
  const elapsed = (now - SUN.cycleStart) / SUN.cycleMs;
  SUN.time = 16 + (elapsed % 1) * 2 + SUN.bonus;
  if (SUN.time >= 18) { SUN.bonus -= 2; SUN.time = 16 + (elapsed % 1) * 2 + SUN.bonus; }
  // sun azimuth / altitude
  const t = (SUN.time - 16) / 2;       // 0..1 across afternoon
  const altitude = lerp(0.55, 0.08, t); // radians; lowering toward horizon
  const azimuth  = lerp(-0.35, -1.05, t); // sweeping westward
  SUN.dir.set(
    Math.cos(altitude)*Math.cos(azimuth),
    Math.sin(altitude),
    Math.cos(altitude)*Math.sin(azimuth)
  ).normalize();
  // color: from bright daylight -> golden hour
  const warm = smooth(t);
  SUN.color.setRGB(
    lerp(1.00, 1.00, warm),
    lerp(0.96, 0.78, warm),
    lerp(0.86, 0.55, warm)
  );
  SUN.ambientColor.setRGB(
    lerp(0.55, 0.55, warm),
    lerp(0.62, 0.50, warm),
    lerp(0.78, 0.62, warm)
  );
  SUN.intensity = lerp(2.6, 2.2, warm);
}

/* ───────────────────────── LIGHTS ────────────────────────────────── */
const sunLight = new THREE.DirectionalLight(0xfff1d0, 2.6);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 120;
sunLight.shadow.camera.left = -40;
sunLight.shadow.camera.right = 40;
sunLight.shadow.camera.top = 40;
sunLight.shadow.camera.bottom = -40;
sunLight.shadow.bias = -0.0006;
sunLight.shadow.normalBias = 0.06;
scene.add(sunLight);
scene.add(sunLight.target);

const skyLight = new THREE.HemisphereLight(0x9fcfff, 0xc2a06a, 0.85);
scene.add(skyLight);

const fillLight = new THREE.DirectionalLight(0xb6d8ff, 0.35);
fillLight.position.set(-1, 0.4, -1);
scene.add(fillLight);

/* ───────────────────────── SHARED UNIFORMS ───────────────────────── */
const U = {
  uTime:    { value: 0 },
  uSunDir:  { value: new THREE.Vector3(0,1,0) },
  uSunColor:{ value: new THREE.Color(1,1,1) },
  uShadowColor:{ value: new THREE.Color(0.32, 0.36, 0.55) },
  uWind:    { value: 0 },
};

/* ═════════════════════════════════════════════════════════════════════
   SHADERS
   ═════════════════════════════════════════════════════════════════════ */

const GLSL_NOISE = /* glsl */`
  // hash & fbm helpers
  float hash21(vec2 p){ p = fract(p*vec2(123.34,345.45)); p += dot(p,p+34.345); return fract(p.x*p.y); }
  float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash21(i), b = hash21(i+vec2(1.0,0.0));
    float c = hash21(i+vec2(0.0,1.0)), d = hash21(i+vec2(1.0,1.0));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float v=0.0, a=0.5;
    for(int i=0;i<5;i++){ v += a*vnoise(p); p *= 2.07; a *= 0.5; }
    return v;
  }
  float ridgedFbm(vec2 p){
    float v=0.0, a=0.5;
    for(int i=0;i<5;i++){ v += a*(1.0 - abs(vnoise(p)*2.0-1.0)); p *= 2.13; a *= 0.5; }
    return v;
  }
  float voronoi(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float md = 8.0;
    for(int y=-1;y<=1;y++)for(int x=-1;x<=1;x++){
      vec2 g = vec2(float(x),float(y));
      vec2 o = vec2(hash21(i+g), hash21(i+g+13.13));
      vec2 r = g + o - f;
      md = min(md, dot(r,r));
    }
    return sqrt(md);
  }
`;

/* ── MARBLE shader ────────────────────────────────────────────────── */
const marbleVert = /* glsl */`
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  void main(){
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorld = wp.xyz;
    vNormal = normalize(mat3(modelMatrix) * normal);
    vUv = uv;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const marbleFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform vec3  uSunDir;
  uniform vec3  uSunColor;
  uniform vec3  uShadowColor;
  uniform float uTime;
  uniform float uAge;        // 0..1 amount of staining
  ${GLSL_NOISE}
  void main(){
    // sample world coords for procedural marble (so cylinders & blocks share grain)
    vec3 p = vWorld * 0.55;
    // veining (anisotropic ridged fbm along Y)
    vec2 vp = vec2(p.x*1.4 + p.z*0.6, p.y*0.35);
    float vein = ridgedFbm(vp*1.3);
    vein = pow(vein, 2.5);
    // base bleached white with warm cream tint
    vec3 base = mix(vec3(0.94,0.92,0.86), vec3(0.99,0.98,0.93), fbm(p.xz*1.7));
    // veins darker grey
    base = mix(base, vec3(0.68,0.66,0.60), clamp(vein*0.55,0.0,1.0));
    // micro-detail aging stains
    float stain = fbm(p.xz*4.3 + p.y*0.7);
    stain = smoothstep(0.55, 0.85, stain) * uAge;
    base = mix(base, vec3(0.74,0.62,0.42), stain*0.55);
    // moss/lichen patches at low-altitude on rough sides
    float lichen = smoothstep(0.45,0.9, fbm(vWorld.xz*2.1 + 7.3));
    lichen *= smoothstep(1.6, -0.4, vWorld.y);   // lower = more
    lichen *= clamp(1.0 - vNormal.y, 0.2, 1.0);  // sides more than tops
    base = mix(base, vec3(0.36,0.42,0.22), lichen*0.45*uAge);
    // cracks via voronoi edges
    float cr = voronoi(p.xz*5.2);
    float crack = smoothstep(0.04, 0.0, cr);
    base = mix(base, vec3(0.18,0.16,0.13), crack*0.85);
    // vertical fluting hint (cylindrical shafts) using uv.x
    float flute = 0.5 + 0.5*sin(vUv.x*6.2831*20.0);
    flute = smoothstep(0.3,0.95,flute);
    base = mix(base, base*0.93, flute*0.35*step(0.2, abs(vNormal.y)<0.6?1.0:0.0));
    // lighting: warm sun vs cool shadow
    float ndl = clamp(dot(normalize(vNormal), uSunDir), 0.0, 1.0);
    vec3 lit = base * (uShadowColor + uSunColor * ndl * 1.1);
    // subtle subsurface-warm rim at glancing angles
    vec3 V = normalize(cameraPosition - vWorld);
    float rim = pow(1.0 - clamp(dot(V, normalize(vNormal)),0.0,1.0), 2.5);
    lit += uSunColor * rim * 0.10;
    // bake-y top brightness (sun-bleached tops)
    lit += uSunColor * 0.08 * smoothstep(0.4,0.95, vNormal.y);
    gl_FragColor = vec4(lit, 1.0);
  }
`;

function makeMarbleMaterial(age=0.55){
  return new THREE.ShaderMaterial({
    vertexShader: marbleVert,
    fragmentShader: marbleFrag,
    uniforms: {
      uTime: U.uTime, uSunDir: U.uSunDir, uSunColor: U.uSunColor,
      uShadowColor: U.uShadowColor,
      uAge: { value: age }
    },
  });
}

/* ── FLAGSTONE shader (variant of marble) ─────────────────────────── */
const flagstoneFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform vec3 uShadowColor;
  uniform float uTime;
  ${GLSL_NOISE}
  void main(){
    vec2 p = vWorld.xz;
    // tile grid 1.4m
    vec2 tile = p / 1.4;
    vec2 tid = floor(tile);
    vec2 lf  = fract(tile);
    float jitter = hash21(tid)*0.2;
    // gap = darker line near tile borders
    float gx = min(lf.x, 1.0-lf.x);
    float gy = min(lf.y, 1.0-lf.y);
    float gap = smoothstep(0.04, 0.0, min(gx,gy));
    // slight per-tile color variation
    vec3 stoneA = vec3(0.86,0.82,0.72);
    vec3 stoneB = vec3(0.78,0.72,0.60);
    vec3 base = mix(stoneA, stoneB, hash21(tid+3.1) + jitter*0.5);
    // veining + stains
    float vein = ridgedFbm(p*1.7 + tid*0.3);
    base = mix(base, vec3(0.55,0.50,0.40), pow(vein,2.5)*0.35);
    float stain = fbm(p*3.1+tid);
    base = mix(base, vec3(0.62,0.50,0.32), smoothstep(0.6,0.85,stain)*0.4);
    // grass tufts in gaps + cracks
    float crack = voronoi(p*2.6 + tid*0.4);
    crack = smoothstep(0.06, 0.0, crack);
    float grassMask = gap * (0.4 + 0.6*hash21(tid+7.7));
    grassMask *= step(0.55, hash21(tid+11.3));   // not every gap
    vec3 grassCol = mix(vec3(0.62,0.60,0.18), vec3(0.42,0.50,0.18), fbm(p*8.0));
    base = mix(base, vec3(0.16,0.13,0.10), gap*0.85);   // dark gap shadow
    base = mix(base, grassCol, grassMask*0.85);
    base = mix(base, vec3(0.20,0.18,0.14), crack*0.65);
    // worn polish in the center of tiles (like footpath)
    float center = 1.0 - smoothstep(0.0, 0.6, length(lf-0.5));
    base = mix(base, base*1.06, center*0.25);
    // lighting
    float ndl = clamp(dot(normalize(vNormal), uSunDir), 0.0, 1.0);
    vec3 lit = base * (uShadowColor + uSunColor*ndl*1.05);
    lit += uSunColor * 0.06 * smoothstep(0.4,0.95,vNormal.y);
    gl_FragColor = vec4(lit, 1.0);
  }
`;
function makeFlagstoneMaterial(){
  return new THREE.ShaderMaterial({
    vertexShader: marbleVert, fragmentShader: flagstoneFrag,
    uniforms: { uTime:U.uTime, uSunDir:U.uSunDir, uSunColor:U.uSunColor, uShadowColor:U.uShadowColor }
  });
}

/* ── CYPRESS shader (silhouette + sway) ───────────────────────────── */
const cypressVert = /* glsl */`
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vY;
  uniform float uTime;
  uniform float uWind;
  void main(){
    vec3 p = position;
    // sway proportional to height. pivot at base.
    float h = clamp(p.y/4.0, 0.0, 1.0);
    float swayPhase = uTime*1.1 + p.x*0.6 + p.z*0.4;
    float sway = sin(swayPhase) * 0.06 + sin(swayPhase*2.3)*0.025;
    sway *= (0.6 + uWind);
    p.x += sway * h * 1.0;
    p.z += sway * h * 0.45;
    vec4 wp = modelMatrix * vec4(p,1.0);
    vWorld = wp.xyz; vNormal = normalize(mat3(modelMatrix)*normal); vUv = uv; vY = h;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const cypressFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vY;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform vec3 uShadowColor;
  uniform float uTime;
  ${GLSL_NOISE}
  void main(){
    // dark green base, deeper near interior
    vec3 deep = vec3(0.06,0.13,0.07);
    vec3 mid  = vec3(0.13,0.26,0.13);
    vec3 hi   = vec3(0.32,0.42,0.20);
    // foliage texture
    float n = fbm(vec2(vUv.x*30.0, vUv.y*60.0 + uTime*0.05));
    float n2 = fbm(vWorld.xz*8.0 + vWorld.y*2.0);
    vec3 base = mix(deep, mid, smoothstep(0.3,0.8, n));
    base = mix(base, hi, smoothstep(0.6,0.95, n2)*0.55);
    // bottom darker
    base *= mix(0.55, 1.05, vY);
    // lighting (soft-foliage)
    float ndl = clamp(dot(normalize(vNormal), uSunDir), 0.0, 1.0);
    float wrap = clamp(dot(normalize(vNormal), uSunDir)*0.5+0.5, 0.0, 1.0);
    vec3 lit = base * (uShadowColor*0.85 + uSunColor*wrap*0.85);
    // sun-rim through foliage
    vec3 V = normalize(cameraPosition - vWorld);
    float trans = pow(clamp(dot(-uSunDir, V), 0.0, 1.0), 4.0);
    lit += uSunColor * trans * 0.25 * (1.0-vY*0.3);
    // alpha-ish silhouette via discard for ragged tip
    float edge = smoothstep(0.9,1.0, vY) * (1.0 - n);
    if (edge > 0.55) discard;
    gl_FragColor = vec4(lit, 1.0);
  }
`;
function makeCypressMaterial(){
  return new THREE.ShaderMaterial({
    vertexShader: cypressVert, fragmentShader: cypressFrag,
    uniforms: { uTime:U.uTime, uWind:U.uWind, uSunDir:U.uSunDir, uSunColor:U.uSunColor, uShadowColor:U.uShadowColor },
    side: THREE.DoubleSide
  });
}

/* ── SEA shader (Gerstner-lite, sun glint) ────────────────────────── */
const seaVert = /* glsl */`
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform float uTime;
  // cheap multi-wave displacement for the near band; far band stays flat for cost
  vec3 gerstner(vec2 p, vec2 dir, float steep, float wl, float t, inout vec3 n){
    float k = 6.2831/wl;
    float c = sqrt(9.8/k);
    float f = k*dot(dir,p) - c*t;
    float a = steep/k;
    n.x -= dir.x*k*a*cos(f);
    n.z -= dir.y*k*a*cos(f);
    n.y -= steep*sin(f);
    return vec3(dir.x*a*cos(f), a*sin(f), dir.y*a*cos(f));
  }
  void main(){
    vec3 p = position;
    vec3 n = vec3(0.0, 1.0, 0.0);
    // only displace the near area; falls off with distance from origin
    float falloff = exp(-length(p.xz)*0.0015);
    vec3 d = vec3(0.0);
    d += gerstner(p.xz, normalize(vec2(1.0,0.4)), 0.18, 6.5, uTime*0.6, n) * falloff;
    d += gerstner(p.xz, normalize(vec2(-0.6,0.9)), 0.10, 3.7, uTime*0.8, n) * falloff;
    d += gerstner(p.xz, normalize(vec2(0.7,-0.3)), 0.06, 1.8, uTime*1.2, n) * falloff;
    p += d;
    vec4 wp = modelMatrix * vec4(p,1.0);
    vWorld = wp.xyz; vUv = uv;
    vNormal = normalize(n);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const seaFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform float uTime;
  ${GLSL_NOISE}
  void main(){
    vec3 V = normalize(cameraPosition - vWorld);
    vec3 N = normalize(vNormal);
    // depth gradient: shallow turquoise -> deep cobalt with distance from cliff
    float dist = clamp((vWorld.z + 80.0) / 600.0, 0.0, 1.0);
    vec3 shallow = vec3(0.05,0.42,0.55);
    vec3 deep    = vec3(0.02,0.10,0.30);
    vec3 base = mix(shallow, deep, smoothstep(0.0, 0.7, dist));
    // micro-glitter
    float glint = fbm(vWorld.xz*0.55 + uTime*0.3);
    glint = smoothstep(0.65, 0.95, glint);
    // sun glint highlight (specular toward sun reflection vector)
    vec3 R = reflect(-uSunDir, N);
    float spec = pow(clamp(dot(V, R), 0.0, 1.0), 80.0);
    // broader glitter band toward sun azimuth
    vec2 sunAz = normalize(uSunDir.xz);
    float bandT = abs(dot(normalize(vWorld.xz - cameraPosition.xz), sunAz));
    float band  = smoothstep(0.82, 0.999, bandT);
    // fresnel
    float fres = pow(1.0 - clamp(dot(V, N), 0.0, 1.0), 4.0);
    vec3 sky = mix(vec3(0.55,0.72,0.95), vec3(0.85,0.93,1.0), 0.5);
    vec3 col = mix(base, sky, fres*0.55);
    col += uSunColor * spec * 1.6;
    col += uSunColor * band * glint * 0.65;
    col += uSunColor * glint * 0.06;
    // haze toward horizon
    float horizon = smoothstep(0.4, 1.0, dist);
    col = mix(col, vec3(0.86,0.82,0.70), horizon*0.55);
    gl_FragColor = vec4(col, 1.0);
  }
`;
function makeSeaMaterial(){
  return new THREE.ShaderMaterial({
    vertexShader: seaVert, fragmentShader: seaFrag,
    uniforms: { uTime:U.uTime, uSunDir:U.uSunDir, uSunColor:U.uSunColor }
  });
}

/* ── SKY shader ───────────────────────────────────────────────────── */
const skyVert = /* glsl */`
  varying vec3 vWorld;
  varying vec3 vDir;
  void main(){
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorld = wp.xyz;
    vDir = normalize(position);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const skyFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vDir;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform float uTime;
  ${GLSL_NOISE}
  void main(){
    vec3 d = normalize(vDir);
    float up = clamp(d.y, 0.0, 1.0);
    // deep-blue zenith -> warmer creamy horizon
    vec3 zenith = vec3(0.18, 0.42, 0.78);
    vec3 horiz = vec3(0.92, 0.80, 0.62);
    vec3 col = mix(horiz, zenith, smoothstep(0.0, 0.7, up));
    // sun disc + halo
    float sd = clamp(dot(d, uSunDir), 0.0, 1.0);
    float disc = smoothstep(0.9985, 0.9998, sd);
    float halo = pow(sd, 30.0);
    float wide = pow(sd, 5.0);
    col += uSunColor * disc * 12.0;
    col += uSunColor * halo * 1.4;
    col += uSunColor * wide * 0.35;
    // cirrus cloud streaks (only above horizon)
    if (d.y > 0.05){
      vec2 sky2 = vec2(atan(d.z,d.x)*1.6, d.y*4.0);
      float clouds = 0.0;
      // 5 streak bands at various altitudes
      for (int i=0;i<5;i++){
        float fi = float(i);
        float band = smoothstep(0.02, 0.0, abs(d.y - (0.30 + fi*0.13) - sin(sky2.x*0.4+fi)*0.04));
        float n = fbm(vec2(sky2.x*1.2 + fi*7.7 + uTime*0.01, sky2.y*0.6 + fi));
        clouds += band * smoothstep(0.45, 0.85, n);
      }
      clouds = clamp(clouds, 0.0, 1.2);
      col = mix(col, vec3(1.0,0.97,0.92), clouds*0.55);
      col += uSunColor * clouds * pow(sd, 6.0) * 0.4; // sun lighting clouds
    }
    // hazy band near horizon
    float h = smoothstep(0.0, 0.18, up);
    col = mix(vec3(0.96,0.86,0.70), col, h);
    gl_FragColor = vec4(col, 1.0);
  }
`;
function makeSkyMaterial(){
  return new THREE.ShaderMaterial({
    vertexShader: skyVert, fragmentShader: skyFrag,
    uniforms: { uTime:U.uTime, uSunDir:U.uSunDir, uSunColor:U.uSunColor },
    side: THREE.BackSide, depthWrite:false
  });
}

/* ── GRASS shader (golden dry, wind ripple) ───────────────────────── */
const grassVert = /* glsl */`
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform float uTime;
  uniform float uWind;
  void main(){
    vec3 p = position;
    // small wind ripple displacement on top
    float r = sin(p.x*0.4 + uTime*1.4)*0.04 + cos(p.z*0.5 + uTime*1.1)*0.04;
    p.y += r * (0.5 + uWind*0.6);
    vec4 wp = modelMatrix * vec4(p,1.0);
    vWorld = wp.xyz; vNormal = normalize(mat3(modelMatrix)*normal); vUv = uv;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const grassFrag = /* glsl */`
  precision highp float;
  varying vec3 vWorld;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform vec3 uSunDir;
  uniform vec3 uSunColor;
  uniform vec3 uShadowColor;
  uniform float uTime;
  ${GLSL_NOISE}
  void main(){
    vec2 p = vWorld.xz;
    float clumps = fbm(p*0.6);
    vec3 dryA = vec3(0.78,0.66,0.30);
    vec3 dryB = vec3(0.62,0.48,0.18);
    vec3 dryC = vec3(0.34,0.30,0.14);
    vec3 base = mix(dryB, dryA, clumps);
    base = mix(base, dryC, smoothstep(0.7,1.0, fbm(p*3.0))*0.4);
    // bare-earth patches
    float earth = smoothstep(0.55, 0.85, fbm(p*1.4 + 5.0));
    base = mix(base, vec3(0.55,0.40,0.22), earth*0.6);
    // wind ripple highlight band
    float ripple = sin(p.x*0.6 + p.y*0.3 + uTime*1.5);
    base += vec3(0.05,0.04,0.0) * ripple * 0.4;
    // lighting
    float ndl = clamp(dot(normalize(vNormal), uSunDir), 0.0, 1.0);
    vec3 lit = base * (uShadowColor + uSunColor*ndl*1.0);
    lit += uSunColor * pow(ndl, 8.0) * 0.15;
    gl_FragColor = vec4(lit, 1.0);
  }
`;
function makeGrassMaterial(){
  return new THREE.ShaderMaterial({
    vertexShader: grassVert, fragmentShader: grassFrag,
    uniforms: { uTime:U.uTime, uWind:U.uWind, uSunDir:U.uSunDir, uSunColor:U.uSunColor, uShadowColor:U.uShadowColor }
  });
}

/* ═════════════════════════════════════════════════════════════════════
   SCENE BUILDING
   ═════════════════════════════════════════════════════════════════════ */

/* ── SKY DOME ─────────────────────────────────────────────────────── */
const skyMat = makeSkyMaterial();
const sky = new THREE.Mesh(new THREE.SphereGeometry(1500, 48, 32), skyMat);
sky.frustumCulled = false;
scene.add(sky);

/* ── GROUND PLATEAU ───────────────────────────────────────────────── */
const groundGeo = new THREE.PlaneGeometry(220, 220, 64, 64);
groundGeo.rotateX(-Math.PI/2);
// give it gentle undulation
const gpos = groundGeo.attributes.position;
for (let i=0;i<gpos.count;i++){
  const x = gpos.getX(i), z = gpos.getZ(i);
  const y = Math.sin(x*0.05)*0.12 + Math.cos(z*0.07)*0.18 + Math.sin((x+z)*0.11)*0.08;
  gpos.setY(i, y);
}
groundGeo.computeVertexNormals();
const ground = new THREE.Mesh(groundGeo, makeGrassMaterial());
ground.receiveShadow = true;
scene.add(ground);

// cliff drop edge: the ground stops at z=-30; beyond is sea.
// To suggest a cliff, place a darker rocky band along the edge.
const cliffGeo = new THREE.BoxGeometry(220, 8, 4);
const cliffMat = new THREE.MeshStandardMaterial({ color:0x7a5a36, roughness:0.95 });
const cliff = new THREE.Mesh(cliffGeo, cliffMat);
cliff.position.set(0, -3.5, -32);
cliff.receiveShadow = true;
scene.add(cliff);

/* ── FLAGSTONE FLOOR (temple platform) ────────────────────────────── */
const stylobate = new THREE.Mesh(
  new THREE.BoxGeometry(20, 0.6, 14),
  makeFlagstoneMaterial()
);
stylobate.position.set(0, 0.3, 0);
stylobate.receiveShadow = true;
stylobate.castShadow = true;
scene.add(stylobate);

// 2-step crepidoma underneath
const step1 = new THREE.Mesh(new THREE.BoxGeometry(22, 0.4, 16), makeMarbleMaterial(0.5));
step1.position.set(0, 0.0, 0); step1.receiveShadow=true; step1.castShadow=true; scene.add(step1);
const step2 = new THREE.Mesh(new THREE.BoxGeometry(24, 0.4, 18), makeMarbleMaterial(0.55));
step2.position.set(0, -0.4, 0); step2.receiveShadow=true; step2.castShadow=true; scene.add(step2);

/* ── COLUMNS ──────────────────────────────────────────────────────── */
// 8 columns total: in a peripteral hint - 4 standing, 2 half, 2 toppled

const COL_R = 0.55;
const COL_H_FULL = 6.4;

function makeColumnDrum(h, r=COL_R, age=0.55){
  // fluted by uv-driven shader; use cylinder with extra segs
  const g = new THREE.CylinderGeometry(r, r*1.02, h, 24, 1, false);
  const m = makeMarbleMaterial(age);
  const mesh = new THREE.Mesh(g, m);
  mesh.castShadow = true; mesh.receiveShadow = true;
  return mesh;
}
function makeCapital(r=COL_R, age=0.5){
  // simple Doric capital: echinus + abacus
  const grp = new THREE.Group();
  const echinus = new THREE.Mesh(new THREE.CylinderGeometry(r*1.25, r, 0.35, 18), makeMarbleMaterial(age));
  echinus.position.y = 0.18;
  const abacus = new THREE.Mesh(new THREE.BoxGeometry(r*2.7, 0.22, r*2.7), makeMarbleMaterial(age));
  abacus.position.y = 0.46;
  echinus.castShadow=abacus.castShadow=true;
  echinus.receiveShadow=abacus.receiveShadow=true;
  grp.add(echinus); grp.add(abacus);
  return grp;
}
function makeBase(r=COL_R, age=0.6){
  const g = new THREE.CylinderGeometry(r*1.18, r*1.25, 0.28, 16);
  const m = makeMarbleMaterial(age);
  const mesh = new THREE.Mesh(g,m);
  mesh.castShadow=mesh.receiveShadow=true;
  return mesh;
}

function buildStandingColumn(x, z, height=COL_H_FULL, age=0.5){
  const g = new THREE.Group();
  const base = makeBase(COL_R, age); base.position.y = 0.74;
  g.add(base);
  // shaft as 3 stacked drums (visible drum lines)
  const drumH = (height-0.5)/3;
  for (let i=0;i<3;i++){
    const d = makeColumnDrum(drumH-0.04, COL_R, age + i*0.04);
    d.position.y = 0.88 + drumH/2 + i*drumH;
    g.add(d);
  }
  const cap = makeCapital(COL_R, age*0.85);
  cap.position.y = 0.88 + height - 0.5;
  g.add(cap);
  g.position.set(x, 0.6, z);
  return g;
}
function buildHalfColumn(x, z, height=3.5, age=0.65){
  const g = new THREE.Group();
  const base = makeBase(COL_R, age); base.position.y = 0.74; g.add(base);
  const drumH = height-0.5;
  const d = makeColumnDrum(drumH, COL_R, age);
  d.position.y = 0.88 + drumH/2;
  // ragged top: add a small skewed slab on top
  const cap = new THREE.Mesh(new THREE.BoxGeometry(COL_R*2.05, 0.25, COL_R*1.6), makeMarbleMaterial(age*1.1));
  cap.position.y = 0.88 + drumH;
  cap.rotation.z = 0.18;
  cap.castShadow=cap.receiveShadow=true;
  g.add(d); g.add(cap);
  g.position.set(x, 0.6, z);
  return g;
}
function buildToppledColumn(x, z, rotY=0, age=0.7){
  // a base + 3-4 drums lying on the ground
  const g = new THREE.Group();
  const bs = makeBase(COL_R, age);
  bs.rotation.z = Math.PI/2;
  bs.position.set(0, COL_R, 0);
  g.add(bs);
  for (let i=0;i<4;i++){
    const d = makeColumnDrum(1.6, COL_R, age + i*0.04);
    d.rotation.z = Math.PI/2;
    d.position.set(0.5 + 1.7*i + (Math.random()*0.2-0.1), COL_R, (Math.random()*0.4-0.2));
    d.rotation.y = (Math.random()-0.5)*0.15;

  cap.rotation.z = Math.PI/2 + 0.2;
  cap.position.set(7.6, COL_R*1.1, 0.1);
  g.add(cap);
  g.position.set(x, 0.6, z);
  g.rotation.y = rotY;
  return g;
}

function buildCypress(x,z,scale=1){
  const grp = new THREE.Group();
  const mat = makeCypressMaterial();
  // approximate cypress: tall narrow ellipsoid via stretched icosahedron
  const geo = new THREE.IcosahedronGeometry(1, 2);
  const pos = geo.attributes.position;
  for (let i=0;i<pos.count;i++){
    const x0 = pos.getX(i), y0 = pos.getY(i), z0 = pos.getZ(i);
    // stretch vertically, taper top
    const yy = y0*3.6;
    const taper = 1.0 - clamp((yy)/4.0, 0.0, 1.0)*0.55;
    const xx = x0*0.55*taper;
    const zz = z0*0.55*taper;
    // ragged surface
    const n = 0.12*Math.sin(x0*7+y0*5)+0.07*Math.cos(z0*9+y0*3);
    pos.setXYZ(i, xx + n*0.3, yy + 1.8 + n*0.5, zz + n*0.3);
  }
  geo.computeVertexNormals();
  const tree = new THREE.Mesh(geo, mat);
  tree.castShadow = true;
  // small trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, 0.6, 6),
    new THREE.MeshStandardMaterial({ color:0x3a2818, roughness:1 })
  );
  trunk.position.y = 0.3;
  trunk.castShadow = true;
  grp.add(trunk); grp.add(tree);
  grp.position.set(x, 0, z);
  grp.scale.setScalar(scale);
  return grp;
}

function drawSwallow(phase){
  sctx.clearRect(0,0,64,64);
  sctx.fillStyle = '#0a0a0a';
  sctx.beginPath();
  // body
  sctx.moveTo(32,32);
  // wing positions sway with phase
  const w = Math.sin(phase)*8;
  sctx.lineTo(8, 28 + w);
  sctx.lineTo(20, 32);
  sctx.lineTo(32,32);
  sctx.lineTo(56, 28 - w);
  sctx.lineTo(44, 32);
  sctx.closePath(); sctx.fill();
  // forked tail
  sctx.beginPath();
  sctx.moveTo(32,33);
  sctx.lineTo(28,40);
  sctx.lineTo(32,36);
  sctx.lineTo(36,40);
  sctx.closePath(); sctx.fill();
}

/* ═════════════════════════════════════════════════════════════════════
   AUDIO  —  the cicadas are the hero
   ═════════════════════════════════════════════════════════════════════ */
const AUDIO = {
  ctx: null,
  master: null,
  ready: false,
  cicadaFilter: null,
  cicadaPhase: 0,
  start(){
    if (this.ready) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    this.ctx = new Ctx();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const m = this.ctx.createGain(); m.gain.value = 0.0; m.connect(this.ctx.destination);
    this.master = m;
    this._buildCicadas();
    this._buildWind();
    this._buildOcean();
    // schedule rare goat bell
    this._scheduleBell();
    // fade in
    m.gain.setTargetAtTime(0.85, this.ctx.currentTime + 0.1, 1.4);
    this.ready = true;
  },
  _buildCicadas(){
    // 3 layered FM bursts at slightly different rates, panned L/C/R
    // This is the SIGNATURE sound: must be loud and present.
    const ctx = this.ctx;
    // shared output through a bandpass filter for "aged silence" sweep
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 4500; bp.Q.value = 1.2;
    const out = ctx.createGain(); out.gain.value = 0.55;
    bp.connect(out); out.connect(this.master);
    this.cicadaFilter = bp;
    this.cicadaOut = out;
    const layers = [
      { rate: 38, freq: 4400, modFreq: 60, modAmt: 1500, pan:-0.65, gain:0.55 },
      { rate: 41, freq: 4900, modFreq: 75, modAmt: 1700, pan: 0.05, gain:0.60 },
      { rate: 44, freq: 5200, modFreq: 90, modAmt: 1900, pan: 0.65, gain:0.50 },
    ];
    layers.forEach(L => {
      const carrier = ctx.createOscillator(); carrier.type='sine'; carrier.frequency.value = L.freq;
      const mod     = ctx.createOscillator(); mod.type='sine'; mod.frequency.value = L.modFreq;
      const modGain = ctx.createGain(); modGain.gain.value = L.modAmt;
      mod.connect(modGain); modGain.connect(carrier.frequency);
      // tremolo for chirr texture (rate Hz)
      const trem = ctx.createOscillator(); trem.type='square'; trem.frequency.value = L.rate;
      const tremGain = ctx.createGain(); tremGain.gain.value = 0.5; // 0..1 envelope
      const tremDC = ctx.createConstantSource(); tremDC.offset.value = 0.5;
      trem.connect(tremGain); tremDC.connect(tremGain);   // adds 0.5 baseline
      const amp = ctx.createGain(); amp.gain.value = 0;
      tremGain.connect(amp.gain);
      // panner
      const pan = ctx.createStereoPanner(); pan.pan.value = L.pan;
      const lvl = ctx.createGain(); lvl.gain.value = L.gain;
      carrier.connect(amp); amp.connect(pan); pan.connect(lvl); lvl.connect(bp);
      carrier.start(); mod.start(); trem.start(); tremDC.start();
      // slow modulation of the rate for organic feel
      const slow = ctx.createOscillator(); slow.frequency.value = 0.07;
      const slowGain = ctx.createGain(); slowGain.gain.value = 4;
      slow.connect(slowGain); slowGain.connect(trem.frequency);
      slow.start();
    });
  },
  _buildWind(){
    const ctx = this.ctx;
    const bufSize = 2 * ctx.sampleRate;
    const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    const noise = ctx.createBufferSource(); noise.buffer = noiseBuf; noise.loop = true;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 380; lp.Q.value = 0.7;
    const g  = ctx.createGain(); g.gain.value = 0.18;
    noise.connect(lp); lp.connect(g); g.connect(this.master);
    noise.start();
    // gust LFO on filter freq + gain
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.06;
    const lfoG = ctx.createGain(); lfoG.gain.value = 220;
    lfo.connect(lfoG); lfoG.connect(lp.frequency);
    lfo.start();
    this.windGain = g;
    this.windFilter = lp;
    // occasional bigger gust scheduling
    const gust = () => {
      if (!this.ready) return;
      const t = ctx.currentTime;
      g.gain.cancelScheduledValues(t);
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.linearRampToValueAtTime(0.42, t + 1.5);
      g.gain.linearRampToValueAtTime(0.18, t + 5.0);
      lp.frequency.cancelScheduledValues(t);
      lp.frequency.setValueAtTime(lp.frequency.value, t);
      lp.frequency.linearRampToValueAtTime(900, t + 1.5);
      lp.frequency.linearRampToValueAtTime(380, t + 5.0);
      U.uWind.value = 1; setTimeout(()=>U.uWind.value=0, 4500);
      setTimeout(gust, 14000 + Math.random()*16000);
    };
    setTimeout(gust, 6000 + Math.random()*4000);
  },
  _buildOcean(){
    const ctx = this.ctx;
    const bufSize = 4 * ctx.sampleRate;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    const n = ctx.createBufferSource(); n.buffer = buf; n.loop = true;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 220;
    const g  = ctx.createGain(); g.gain.value = 0.07;
    n.connect(lp); lp.connect(g); g.connect(this.master);
    n.start();
    // very slow swell
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.03;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.04;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    lfo.start();
  },
  _scheduleBell(){
    const ring = () => {
      if (!this.ready) return;
      const ctx = this.ctx;
      const t = ctx.currentTime;
      const o = ctx.createOscillator(); o.type='sine'; o.frequency.value = 720;
      const o2= ctx.createOscillator(); o2.type='sine'; o2.frequency.value = 1180;
      const g = ctx.createGain(); g.gain.value = 0;
      const pan = ctx.createStereoPanner(); pan.pan.value = (Math.random()*2-1)*0.7;
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1800;
      o.connect(g); o2.connect(g); g.connect(lp); lp.connect(pan); pan.connect(this.master);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t+1.6);
      o.start(t); o2.start(t); o.stop(t+1.7); o2.stop(t+1.7);
      setTimeout(ring, 60000 + Math.random()*45000);
    };
    setTimeout(ring, 25000 + Math.random()*30000);
  },
  flutter(){
    if (!this.ready) return;
    const ctx = this.ctx;
    const bufSize = 0.4 * ctx.sampleRate;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
    const n = ctx.createBufferSource(); n.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1200; bp.Q.value=2;
    const g = ctx.createGain(); g.gain.value = 0.10;
    const pan = ctx.createStereoPanner(); pan.pan.value = (Math.random()*2-1)*0.6;
    n.connect(bp); bp.connect(g); g.connect(pan); pan.connect(this.master);
    n.start(); n.stop(ctx.currentTime + 0.4);
  },
  // slow filter sweep on cicadas — "aged silence" pulse
  tickCicada(t){
    if (!this.ready || !this.cicadaFilter) return;
    // very slow breathing of bandpass freq + Q
    const f = 4500 + Math.sin(t*0.0006)*900 + Math.sin(t*0.00017)*450;
    this.cicadaFilter.frequency.setTargetAtTime(f, this.ctx.currentTime, 0.5);
    const q = 1.0 + 0.5*Math.sin(t*0.0004 + 1.2);
    this.cicadaFilter.Q.setTargetAtTime(q, this.ctx.currentTime, 0.6);
    // master volume contemplative pulse (subtle)
    const v = 0.82 + 0.08*Math.sin(t*0.00045);
    this.cicadaOut.gain.setTargetAtTime(0.55*v, this.ctx.currentTime, 0.5);
  }
};

/* ═════════════════════════════════════════════════════════════════════
   CONTROLS — WASD walk, mouse drag look, SPACE = +30min
   ═════════════════════════════════════════════════════════════════════ */
const player = {
  pos: new THREE.Vector3(0, 1.72, 5.5),
  yaw: 0,
  pitch: -0.05,
  vel: new THREE.Vector3(),
  speed: 2.6,
};
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true;
  if (e.code === 'Space'){
    e.preventDefault();
    SUN.bonus += 0.5;
    toast('TIME +30 MIN', 1400);
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

let dragging = false, lastX = 0, lastY = 0;
renderer.domElement.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
addEventListener('pointerup',   () => dragging = false);
addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  player.yaw   -= dx * 0.0035;
  player.pitch -= dy * 0.0030;
  player.pitch = clamp(player.pitch, -1.0, 1.0);
});

function updatePlayer(dt){
  const fwd = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const move = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    move.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown'])  move.sub(fwd);
  if (keys['KeyD'] || keys['ArrowRight']) move.add(right);
  if (keys['KeyA'] || keys['ArrowLeft'])  move.sub(right);
  if (move.lengthSq() > 0){
    move.normalize().multiplyScalar(player.speed * dt);
    player.pos.add(move);
  }
  // soft bounds: stay on-ish the plateau
  player.pos.x = clamp(player.pos.x, -16, 16);
  player.pos.z = clamp(player.pos.z, -22, 12);
  // height bob
  const moving = move.lengthSq() > 0;
  const bob = moving ? Math.sin(performance.now()*0.008)*0.03 : 0;
  camera.position.copy(player.pos).y += bob;
  camera.position.set(player.pos.x, player.pos.y + bob, player.pos.z);
  // look
  const look = new THREE.Vector3(
    -Math.sin(player.yaw)*Math.cos(player.pitch),
     Math.sin(player.pitch),
    -Math.cos(player.yaw)*Math.cos(player.pitch)
  );
  camera.lookAt(camera.position.clone().add(look));
}

/* ═════════════════════════════════════════════════════════════════════
   GATE / RESIZE / LOOP
   ═════════════════════════════════════════════════════════════════════ */
const gate = $('#gate');
gate.addEventListener('click', () => {
  gate.classList.add('gone');
  setTimeout(()=>gate.remove(), 1200);
  AUDIO.start();
});

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

let last = performance.now();
let swallowFlapPhase = 0;
function frame(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;
  U.uTime.value = now * 0.001;
  updateSun(now);
  U.uSunDir.value.copy(SUN.dir);
  U.uSunColor.value.copy(SUN.color);
  // shadow color shifts cool-blue when sun is high, warmer-mauve at golden hour
  const t = clamp((SUN.time-16)/2, 0, 1);
  U.uShadowColor.value.setRGB(
    lerp(0.35, 0.42, t),
    lerp(0.40, 0.36, t),
    lerp(0.58, 0.50, t)
  );
  // sun light
  sunLight.position.copy(SUN.dir).multiplyScalar(60);
  sunLight.target.position.set(0, 0, 0);
  sunLight.color.copy(SUN.color);
  sunLight.intensity = SUN.intensity;
  skyLight.intensity = lerp(0.95, 0.65, t);

  updatePlayer(dt);

  // swallow logic
  swallowTimer -= dt;
  if (swallowTimer <= 0 && !swallowState.active){
    triggerSwallow();
    swallowTimer = 18 + Math.random()*22;
  }
  if (swallowState.active){
    swallowState.t += dt;
    const k = swallowState.t / swallowState.dur;
    if (k >= 1){
      swallowState.active = false;
      swallow.position.set(-200, 30, -50);
    } else {
      const p = swallowState.start.clone().lerp(swallowState.end, k);
      p.y += Math.sin(k*Math.PI)*swallowState.arc + Math.sin(k*8)*0.6;
      swallow.position.copy(p);
      swallowFlapPhase += dt*22;
      drawSwallow(swallowFlapPhase);
      swallowTex.needsUpdate = true;
    }
  }

  // audio cicada slow filter sweep
  AUDIO.tickCicada(now);

  // sun HUD position
  const sunIcon = $('#sun-icon');
  const ang = (SUN.time-16)/2; // 0..1
  const ringR = 26;
  const cx = 34 - Math.sin(ang*Math.PI - Math.PI*0.5)*ringR*0.9;
  const cy = 34 - Math.cos(ang*Math.PI - Math.PI*0.5)*ringR*0.9;
  sunIcon.style.left = cx + 'px';
  sunIcon.style.top  = cy + 'px';
  const hh = Math.floor(SUN.time);
  const mm = Math.floor((SUN.time-hh)*60);
  $('#sun-time').textContent = String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
