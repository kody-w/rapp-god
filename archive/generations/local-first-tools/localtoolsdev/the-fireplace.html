<script>
'use strict';

// ─── Scene ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0703);
scene.fog = new THREE.FogExp2(0x0a0703, 0.04);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 50);
camera.position.set(0, 1.6, 4.5);
camera.lookAt(0, 0.8, 0);

// ─── Stone wall + hearth ─────────────────────────────────────────────
const stoneShader = {
  uniforms:{ time:{value:0}, glow:{value:1.0} },
  vertexShader:`varying vec3 vN; varying vec3 vP;
    void main(){ vN=normal; vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float glow; varying vec3 vN; varying vec3 vP;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float s=0., a=0.5;
      for(int i=0;i<4;i++){ s+=a*n(p); p*=2.05; a*=0.5; } return s; }
    void main(){
      vec3 stoneCol = vec3(0.18, 0.14, 0.11);
      float mortar = step(0.92, fract(vP.y*1.5)) + step(0.95, fract(vP.x*1.0+0.5*step(0.5,fract(vP.y*0.75))));
      mortar = clamp(mortar, 0.0, 1.0);
      float age = fbm(vP.xy*4.0)*0.4 + 0.3;
      vec3 col = mix(stoneCol*age, stoneCol*0.4, mortar);
      // soot near the bottom (where firelight hits hardest)
      float soot = smoothstep(2.0, 0.3, length(vP.xy - vec2(0.0, 1.0))) * 0.4;
      col = mix(col, col*0.3, soot);
      // warm firelight reflection
      float dist = length(vP - vec3(0.0, 0.7, 0.3));
      float fire = exp(-dist*0.6) * glow;
      col += vec3(1.0, 0.55, 0.18) * fire * 0.6;
      gl_FragColor = vec4(col, 1.0);
    }`
};
const wallMat = new THREE.ShaderMaterial(stoneShader);
const wall = new THREE.Mesh(new THREE.PlaneGeometry(8, 5), wallMat);
wall.position.set(0, 1.5, -1.5);
scene.add(wall);

// hearth (simple box of darker stone)
const hearth = new THREE.Mesh(
  new THREE.BoxGeometry(2.4, 0.3, 1.0),
  new THREE.MeshStandardMaterial({color:0x2a1f17, roughness:0.95, metalness:0.0})
);
hearth.position.set(0, 0.05, -0.6);
scene.add(hearth);

// fireplace opening (an arched alcove — visualized as a darker rectangle)
const opening = new THREE.Mesh(
  new THREE.PlaneGeometry(1.6, 1.5),
  new THREE.MeshBasicMaterial({color:0x000000})
);
opening.position.set(0, 0.95, -1.49);
scene.add(opening);

// fireplace mantle
const mantle = new THREE.Mesh(
  new THREE.BoxGeometry(2.6, 0.18, 0.5),
  new THREE.MeshStandardMaterial({color:0x3a2d20, roughness:0.92})
);
mantle.position.set(0, 1.85, -1.2);
scene.add(mantle);

// hearth bricks: simple horizontal log inside opening (3 logs)
function makeLog(x, y, z, size, charLevel){
  const g = new THREE.CylinderGeometry(size, size, 1.3, 16, 1);
  g.rotateZ(Math.PI/2);
  const m = new THREE.ShaderMaterial({
    uniforms:{ time:{value:0}, char:{value:charLevel} },
    vertexShader:`varying vec3 vP; varying vec3 vN;
      void main(){ vP=position; vN=normal; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`uniform float time; uniform float char; varying vec3 vP; varying vec3 vN;
      float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
      float n(vec3 p){ vec3 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
        float a=h(i.xy+i.z*7.0), b=h(i.xy+vec2(1,0)+i.z*7.0);
        return mix(mix(a,b,f.x), mix(h(i.xy+vec2(0,1)+i.z*7.0),h(i.xy+vec2(1,1)+i.z*7.0),f.x), f.y); }
      void main(){
        // bark texture (lengthwise grain)
        float grain = n(vec3(vP.x*15.0, vP.y*30.0, vP.z*15.0));
        vec3 bark = mix(vec3(0.12,0.08,0.05), vec3(0.05,0.03,0.02), grain);
        // char (blackened underside)
        vec3 charCol = vec3(0.02, 0.015, 0.01);
        bark = mix(bark, charCol, smoothstep(0.0, 1.0, char));
        // glowing embers in cracks (only on the bottom-most logs)
        float ember = smoothstep(0.6, 0.95, n(vec3(vP.x*8.0+time*0.5, vP.y*8.0, vP.z*8.0))) * char;
        bark += vec3(1.6, 0.6, 0.15) * ember * 1.5;
        gl_FragColor = vec4(bark, 1.0);
      }`
  });
  const log = new THREE.Mesh(g, m);
  log.position.set(x, y, z);
  return { mesh: log, mat: m };
}
const logs = [
  makeLog(-0.05, 0.32, -1.0, 0.14, 0.95),
  makeLog( 0.10, 0.42, -1.0, 0.13, 0.88),
  makeLog(-0.10, 0.55, -1.0, 0.12, 0.55)
];
logs.forEach(l => scene.add(l.mesh));

// ─── Fire shader (layered fbm flame plane positioned in alcove) ──────
const fireShader = {
  uniforms:{ time:{value:0}, intensity:{value:1.0}, flicker:{value:0.0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float intensity; uniform float flicker; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float s=0., a=0.5; for(int i=0;i<5;i++){ s+=a*n(p); p*=2.07; a*=0.5; } return s; }
    void main(){
      vec2 p = vUv;
      // flame shape: thin at top, wide at bottom; modulated by noise
      float t = time * 0.5;
      float distort = fbm(vec2(p.x*4.0, p.y*8.0 - t*2.5)) * 0.4;
      vec2 q = vec2(p.x + (p.y-0.5)*distort*0.6, p.y);
      float core = smoothstep(0.5, 0.0, length(q - vec2(0.5, 0.18))*1.4);
      // flame body (taller, wider)
      float body = smoothstep(1.0, 0.0, length((q - vec2(0.5, 0.35))*vec2(2.2, 1.0)));
      body *= smoothstep(0.0, 0.3, p.y);  // fade at bottom
      body *= smoothstep(1.0, 0.6, p.y);  // fade at top
      // turbulent flame tendrils
      float turb = fbm(vec2(q.x*7.0, q.y*4.0 - t*3.0));
      body *= 0.7 + 0.6 * turb;
      // color gradient: blue base → orange middle → yellow tips → fade
      vec3 col = vec3(0.0);
      col += vec3(0.2, 0.4, 1.0) * smoothstep(0.0, 0.1, p.y) * (1.0 - p.y) * 0.4;  // blue base
      col += vec3(1.0, 0.4, 0.05) * body * 1.5;
      col += vec3(1.0, 0.85, 0.4) * core * 2.5;
      col += vec3(1.0, 0.95, 0.7) * smoothstep(0.7, 1.0, body * (1.0-p.y)) * 1.0;
      col *= intensity * (1.0 + flicker * 0.4);
      // alpha: only emit where there's actual flame
      float alpha = clamp(body * 1.5 + core, 0.0, 1.0) * intensity;
      gl_FragColor = vec4(col, alpha);
    }`,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
};
const fireMat = new THREE.ShaderMaterial(fireShader);
const flameLayers = [];
for (let i = 0; i < 3; i++) {
  const flame = new THREE.Mesh(new THREE.PlaneGeometry(1.4 - i*0.15, 1.6 - i*0.1), fireMat.clone());
  flame.material.uniforms = { time:{value:Math.random()*100}, intensity:{value:1.0 - i*0.2}, flicker:{value:0.0} };
  flame.material.transparent = true;
  flame.material.blending = THREE.AdditiveBlending;
  flame.material.depthWrite = false;
  flame.position.set((i-1)*0.05, 0.85 + i*0.03, -1.45 + i*0.02);
  scene.add(flame);
  flameLayers.push(flame);
}

// ─── Embers (instanced points, rising) ─────────────────────────────────
const EMBER_COUNT = 280;
const emberGeo = new THREE.BufferGeometry();
const emberPos = new Float32Array(EMBER_COUNT * 3);
const emberSpeed = new Float32Array(EMBER_COUNT);
const emberPhase = new Float32Array(EMBER_COUNT);
const emberSize = new Float32Array(EMBER_COUNT);
function resetEmber(i, partial){
  emberPos[i*3+0] = (Math.random()-0.5) * 1.0;
  emberPos[i*3+1] = partial ? Math.random()*1.5 : 0.4 + Math.random()*0.2;
  emberPos[i*3+2] = -1.4 + (Math.random()-0.5)*0.3;
  emberSpeed[i] = 0.4 + Math.random()*0.8;
  emberPhase[i] = Math.random() * Math.PI * 2;
  emberSize[i] = 1.5 + Math.random()*4.0;
}
for (let i = 0; i < EMBER_COUNT; i++) resetEmber(i, true);
emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
emberGeo.setAttribute('size', new THREE.BufferAttribute(emberSize, 1));
const emberMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`attribute float size; varying float vY;
    void main(){ vY=position.y; vec4 mv = modelViewMatrix*vec4(position,1.0);
      gl_PointSize = size * (300.0/-mv.z); gl_Position = projectionMatrix*mv; }`,
  fragmentShader:`varying float vY;
    void main(){
      vec2 p = gl_PointCoord - 0.5; float r = length(p);
      if(r > 0.5) discard;
      float a = smoothstep(0.5, 0.0, r);
      // hotter = brighter, colder = dimmer
      float heat = clamp(1.5 - vY*0.8, 0.0, 1.5);
      vec3 col = mix(vec3(1.5,0.45,0.05), vec3(1.5,1.0,0.4), heat-1.0);
      gl_FragColor = vec4(col * a, a);
    }`,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const embers = new THREE.Points(emberGeo, emberMat);
scene.add(embers);

// ─── Lighting ───────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x1a0c05, 0.3);
scene.add(ambient);
const fireLight = new THREE.PointLight(0xffa050, 6, 6, 1.4);
fireLight.position.set(0, 0.7, -1.2);
scene.add(fireLight);
const fillLight = new THREE.PointLight(0xff6020, 2, 4, 1.6);
fillLight.position.set(0, 0.4, 0.3);
scene.add(fillLight);

// ─── Optional snow window (toggleable) ───────────────────────────────
let snowWindow = null;
function toggleSnowWindow(){
  if (snowWindow){
    scene.remove(snowWindow);
    snowWindow = null;
    return;
  }
  const winGroup = new THREE.Group();
  // window pane
  const pane = new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, 1.0),
    new THREE.ShaderMaterial({
      uniforms:{ time:{value:0} },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`uniform float time; varying vec2 vUv;
        float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
        void main(){
          // dark blue night sky with snow specks
          vec3 sky = mix(vec3(0.04,0.06,0.12), vec3(0.10,0.14,0.22), 1.0-vUv.y);
          // distant snow falling: small bright dots scrolling down
          float total = 0.0;
          for(int i=0;i<3;i++){
            float fi = float(i);
            vec2 p = vUv * (4.0 + fi*3.0) + vec2(0.0, time*(0.05+fi*0.04));
            vec2 ip = floor(p), fp = fract(p);
            vec2 r = vec2(h(ip), h(ip+vec2(7,11)));
            float d = distance(fp, r);
            total += smoothstep(0.05/(fi+1.0), 0.0, d) * (1.0/(fi+1.0));
          }
          sky += vec3(total) * 0.9;
          // condensation fog at top
          sky += vec3(0.05) * smoothstep(1.0, 0.7, vUv.y);
          gl_FragColor = vec4(sky, 1.0);
        }`
    })
  );
  pane.position.set(3.2, 1.6, -0.5);
  pane.rotation.y = -Math.PI/2;
  winGroup.add(pane);
  // window frame
  const frameMat = new THREE.MeshStandardMaterial({color:0x2a1f17, roughness:0.85});
  const fr1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.05, 1.45), frameMat); fr1.position.set(3.22, 1.6, -0.5); winGroup.add(fr1);
  const fr2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.0, 0.05), frameMat); fr2.position.set(3.22, 1.6, -0.5); winGroup.add(fr2);
  const fr3 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.05, 1.45), frameMat); fr3.position.set(3.22, 1.6, -0.5); winGroup.add(fr3);
  scene.add(winGroup);
  snowWindow = winGroup;
}

// ─── Audio ───────────────────────────────────────────────────────────
let audioCtx = null, audioStarted = false, masterGain;
const cracklePool = [];
function startAudio(){
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  // continuous fire roar (filtered noise)
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random()*2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf; noise.loop = true;
  const noiseLP = audioCtx.createBiquadFilter();
  noiseLP.type = 'lowpass'; noiseLP.frequency.value = 220; noiseLP.Q.value = 0.5;
  const noiseHP = audioCtx.createBiquadFilter();
  noiseHP.type = 'highpass'; noiseHP.frequency.value = 60;
  const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.18;
  noise.connect(noiseHP).connect(noiseLP).connect(noiseGain).connect(masterGain);
  noise.start();

  // crackle scheduler
  function scheduleCrackle(){
    const next = 0.08 + Math.random() * 1.2;
    setTimeout(() => { if (audioStarted) { crackle(); scheduleCrackle(); } }, next * 1000);
  }
  scheduleCrackle();

  function crackle(){
    const t0 = audioCtx.currentTime;
    const noiseLen = 0.06 + Math.random() * 0.12;
    const cb = audioCtx.createBuffer(1, audioCtx.sampleRate * noiseLen, audioCtx.sampleRate);
    const cd = cb.getChannelData(0);
    for (let i = 0; i < cd.length; i++){
      const env = Math.exp(-(i/cd.length) * 6 + Math.sin(i*0.05)*0.4);
      cd[i] = (Math.random()*2 - 1) * env;
    }
    const cs = audioCtx.createBufferSource(); cs.buffer = cb;
    const csBP = audioCtx.createBiquadFilter();
    csBP.type = 'bandpass'; csBP.frequency.value = 800 + Math.random()*2400; csBP.Q.value = 2;
    const csG = audioCtx.createGain(); csG.gain.value = 0.04 + Math.random()*0.12;
    const csP = audioCtx.createStereoPanner();
    csP.pan.value = (Math.random()-0.5) * 0.7;
    cs.connect(csBP).connect(csG).connect(csP).connect(masterGain);
    cs.start(t0);
  }

  // occasional pop (a louder thud)
  function schedulePop(){
    const next = 6 + Math.random() * 12;
    setTimeout(() => { if (audioStarted) { pop(); schedulePop(); } }, next * 1000);
  }
  schedulePop();
  function pop(){
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(180, t0);
    o.frequency.exponentialRampToValueAtTime(40, t0 + 0.3);
    const g = audioCtx.createGain(); g.gain.value = 0; g.gain.linearRampToValueAtTime(0.18, t0+0.005); g.gain.exponentialRampToValueAtTime(0.001, t0+0.4);
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 600;
    o.connect(lp).connect(g).connect(masterGain);
    o.start(t0); o.stop(t0 + 0.5);
    // also intensify flames briefly
    fireIntensityBoost = 1.0;
  }

  // ambient pad (very faint major/minor 3-note slow chord drift)
  const pad = audioCtx.createGain(); pad.gain.value = 0.08;
  pad.connect(masterGain);
  const reverb = audioCtx.createGain(); reverb.gain.value = 0.5; reverb.connect(masterGain);
  const padNotes = [55, 65.41, 82.41]; // A1, C2, E2 — A minor triad way down
  padNotes.forEach((freq, idx) => {
    const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
    const o2 = audioCtx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.005;
    const og = audioCtx.createGain(); og.gain.value = 0.04;
    const olp = audioCtx.createBiquadFilter(); olp.type='lowpass'; olp.frequency.value = 600 + idx*100;
    o1.connect(olp); o2.connect(olp); olp.connect(og).connect(pad);
    o1.start(); o2.start();
  });
}
function stopAudio(){
  if (audioCtx) audioCtx.suspend();
  audioStarted = false;
}

// ─── Animation loop ──────────────────────────────────────────────────
let fireIntensity = 1.0, fireIntensityBoost = 0, time = 0;
let prevTime = performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;
  time += dt;

  // boost decays toward 0
  fireIntensityBoost *= 0.94;

  // flicker is a smooth-ish noise based on time
  const flicker = Math.sin(time*23) * 0.3 + Math.sin(time*37) * 0.2 + Math.sin(time*5) * 0.1;
  const intensity = fireIntensity + fireIntensityBoost + flicker * 0.15;

  // update flame layers
  flameLayers.forEach((f, i) => {
    f.material.uniforms.time.value += dt * (1.0 + i*0.2);
    f.material.uniforms.intensity.value = intensity * (1.0 - i*0.18);
    f.material.uniforms.flicker.value = flicker;
  });

  // update wall light glow
  wallMat.uniforms.glow.value = intensity * 1.0;

  // update logs
  logs.forEach(l => l.mat.uniforms.time.value = time);

  // update fire light
  fireLight.intensity = 5.0 + flicker * 1.8 + fireIntensityBoost * 4;
  fillLight.intensity = 1.5 + flicker * 0.6;

  // update embers
  for (let i = 0; i < EMBER_COUNT; i++){
    emberPos[i*3+1] += emberSpeed[i] * dt * 0.6;
    emberPos[i*3+0] += Math.sin(time*2 + emberPhase[i]) * 0.0015;
    emberPos[i*3+2] += Math.cos(time*1.5 + emberPhase[i]) * 0.001;
    if (emberPos[i*3+1] > 2.5) resetEmber(i, false);
  }
  emberGeo.attributes.position.needsUpdate = true;
  emberMat.uniforms.time.value = time;

  // optional snow window animation
  if (snowWindow){
    const pane = snowWindow.children[0];
    if (pane && pane.material.uniforms) pane.material.uniforms.time.value = time;
  }

  // subtle camera breathing
  camera.position.x = Math.sin(time * 0.3) * 0.04;
  camera.position.y = 1.6 + Math.sin(time * 0.45) * 0.025;
  camera.lookAt(0, 0.85, -1.0);

  renderer.render(scene, camera);
}
animate();

// ─── Controls ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space'){ e.preventDefault(); fireIntensityBoost = 1.5; }
  if (e.key === '+' || e.key === '=') fireIntensity = Math.min(2.0, fireIntensity + 0.15);
  if (e.key === '-' || e.key === '_') fireIntensity = Math.max(0.3, fireIntensity - 0.15);
  if (e.key === 's' || e.key === 'S') toggleSnowWindow();
  if (e.key === 'm' || e.key === 'M'){
    if (audioCtx) {
      masterGain.gain.value = (masterGain.gain.value > 0.01) ? 0 : 0.55;
    }
  }
});

// click to begin
document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => { document.getElementById('begin').remove(); }, 700);
  startAudio();
});
