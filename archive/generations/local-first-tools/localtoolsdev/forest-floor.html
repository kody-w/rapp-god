<script type="module">
import * as THREE from 'three';

// =============================================================================
// FOREST FLOOR · Olympic Peninsula · Oct · Light Rain
// Camera lying on the moss, looking up into the canopy.
// =============================================================================

const root = document.getElementById('root');
const gate = document.getElementById('gate');
const fadeOverlay = document.getElementById('fadeOverlay');

// -----------------------------------------------------------------------------
// Renderer / Scene / Camera
// -----------------------------------------------------------------------------
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: 'high-performance',
  alpha: false
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setClearColor(0x0a1410, 1);
root.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x223028, 0.022);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 220);
// "Lying on ground, head 30cm up"
const HEAD_Y = 0.30;
camera.position.set(0, HEAD_Y, 0);
camera.up.set(0, 1, 0);
// initial look: 70° upward toward canopy
camera.lookAt(0.0, HEAD_Y + 4.0, -2.0);

// -----------------------------------------------------------------------------
// Lights — forest is mostly bounce / GI, with intermittent godrays we fake.
// -----------------------------------------------------------------------------
const hemi = new THREE.HemisphereLight(0xb6cdb0, 0x2a3a2c, 0.65);
scene.add(hemi);

const sunDir = new THREE.DirectionalLight(0xfff0c8, 0.55);
sunDir.position.set(8, 14, 5);
scene.add(sunDir);

// Soft fill from forest floor
const fill = new THREE.PointLight(0x88a08c, 0.5, 14, 1.6);
fill.position.set(0, 0.4, 0);
scene.add(fill);

// =============================================================================
// SHADER LIBRARY
// Inline GLSL — bark, fern, moss, mushroom cap, mushroom stem, canopy dome,
// ant-line, drop splash, leaf-rustle.
// =============================================================================

// ---- noise helpers (shared) ----
const NOISE_GLSL = `
float hash(vec2 p){
  p = fract(p*vec2(123.34,456.21));
  p += dot(p, p+45.32);
  return fract(p.x*p.y);
}
float hash3(vec3 p){
  p = fract(p*vec3(0.1031,0.1030,0.0973));
  p += dot(p, p.yxz+33.33);
  return fract((p.x+p.y)*p.z);
}
float noise2(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1.,0.));
  float c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
  vec2 u=f*f*(3.-2.*f);
  return mix(a,b,u.x) + (c-a)*u.y*(1.-u.x) + (d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0., a=0.5;
  for(int i=0;i<5;i++){ v += a*noise2(p); p*=2.03; a*=0.5; }
  return v;
}
float voronoi(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float md=8.;
  for(int y=-1;y<=1;y++)
  for(int x=-1;x<=1;x++){
    vec2 g=vec2(x,y);
    vec2 o=vec2(hash(i+g), hash(i+g+17.3));
    vec2 r=g+o-f;
    md=min(md, dot(r,r));
  }
  return sqrt(md);
}
`;

// =============================================================================
// CONIFER BARK SHADER
// vertical grain, dark wet wood, mossy stripe near base
// =============================================================================
const barkVS = `
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
void main(){
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorld = wp.xyz;
  vNormal = normalize(normalMatrix * normal);
  vUv = uv;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;
const barkFS = `
precision highp float;
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform float uMossHeight;
uniform vec3 uTint;
${NOISE_GLSL}

void main(){
  // Vertical grain via stretched fbm
  vec2 grainUv = vec2(vUv.x*8.0, vUv.y*1.4 + 0.0);
  float grain = fbm(grainUv*vec2(14.0, 1.2));
  float ridges = abs(sin(grainUv.x*9.0 + grain*4.5));
  ridges = pow(ridges, 2.0);

  // Cracks
  float crack = smoothstep(0.4, 0.85, voronoi(vec2(vUv.x*22.0, vUv.y*4.0)));

  vec3 darkBark = vec3(0.10, 0.07, 0.055);
  vec3 lightBark = vec3(0.22, 0.16, 0.11);
  vec3 bark = mix(darkBark, lightBark, ridges*0.65 + grain*0.35);
  bark *= mix(0.55, 1.0, crack);
  bark *= uTint;

  // Wet sheen — Fresnel-ish using normal
  float fres = pow(1.0 - max(dot(normalize(vNormal), vec3(0,1,0)), 0.0), 2.0);
  bark += fres * vec3(0.06, 0.07, 0.06);

  // Moss stripe near base of trunk (world Y)
  float mossBand = smoothstep(uMossHeight+0.6, uMossHeight-0.2, vWorld.y);
  // moss patches via fbm
  float mossFbm = fbm(vWorld.xz*3.2 + vWorld.y*1.2);
  float moss = mossBand * smoothstep(0.35, 0.7, mossFbm);
  vec3 mossColor = vec3(0.12, 0.32, 0.16) * (0.7 + 0.3*fbm(vWorld.xz*8.0));
  bark = mix(bark, mossColor, moss * 0.85);

  // Wetness — slightly brighter on top of ridges
  bark += smoothstep(0.7, 0.95, ridges) * vec3(0.04, 0.04, 0.035);

  // Subtle vertical drips
  float drip = smoothstep(0.6, 0.95, fbm(vec2(vUv.x*30.0, vUv.y*0.5 + uTime*0.005)));
  bark += drip * 0.04 * vec3(0.6, 0.7, 0.6);

  // Tone down high
  bark *= mix(0.55, 1.0, smoothstep(0.0, 6.0, vWorld.y));

  gl_FragColor = vec4(bark, 1.0);
}
`;

// =============================================================================
// MOSS SHADER — lush green carpet with wet sheen, voronoi clumping
// =============================================================================
const mossVS = `
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
${NOISE_GLSL}
void main(){
  vec3 p = position;
  // Slight bumpy displacement
  float bump = fbm(p.xz*4.0)*0.05 + voronoi(p.xz*8.0)*0.02;
  p.y += bump;
  vec4 wp = modelMatrix * vec4(p, 1.0);
  vWorld = wp.xyz;
  vNormal = normalize(normalMatrix * normal);
  vUv = uv;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;
const mossFS = `
precision highp float;
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform float uWetness;
${NOISE_GLSL}

void main(){
  vec2 p = vWorld.xz;

  // Multi-scale moss clumps
  float clump1 = voronoi(p*4.0);
  float clump2 = voronoi(p*12.0);
  float fines  = fbm(p*32.0);

  // Color palette — wet PNW moss: deep green, yellow-green, dark loam
  vec3 deepGreen   = vec3(0.07, 0.20, 0.10);
  vec3 livingGreen = vec3(0.18, 0.42, 0.18);
  vec3 yellowGreen = vec3(0.32, 0.48, 0.16);
  vec3 loam        = vec3(0.12, 0.08, 0.05);

  float life = clamp(1.0 - clump1*1.4, 0.0, 1.0);
  vec3 c = mix(deepGreen, livingGreen, life);
  c = mix(c, yellowGreen, smoothstep(0.4, 0.9, fines)*0.5);

  // Bare patches of dirt/loam
  float bare = smoothstep(0.55, 0.85, fbm(p*1.7));
  c = mix(c, loam, bare*0.5);

  // Tiny detail moss spots
  float sparkle = smoothstep(0.85, 1.0, fines);
  c += sparkle * vec3(0.1, 0.16, 0.07);

  // Wet sheen
  float fres = pow(1.0 - max(dot(normalize(vNormal), normalize(cameraPosition - vWorld)), 0.0), 3.0);
  c += fres * uWetness * vec3(0.10, 0.13, 0.10);

  // AO from clumps
  c *= mix(0.55, 1.0, 1.0 - clump1*0.5);

  // Tint near edges of view (faint atmospheric)
  c *= 0.95;

  gl_FragColor = vec4(c, 1.0);
}
`;

// =============================================================================
// FERN SHADER — applied to a frond strip; procedural leaf-edges + translucency
// =============================================================================
const fernVS = `
varying vec2 vUv;
varying vec3 vWorld;
varying vec3 vNormal;
uniform float uTime;
uniform float uSway;
${NOISE_GLSL}
void main(){
  vec3 p = position;
  // Wind sway: more at tip (y=high in local), driven by world-space position
  vec3 wp0 = (modelMatrix * vec4(p,1.0)).xyz;
  float t = uTime*0.6 + wp0.x*0.3 + wp0.z*0.2;
  float sway = (sin(t) + 0.5*sin(t*2.3))*uSway;
  float tipFactor = smoothstep(-0.1, 1.0, p.y);
  p.x += sway * 0.10 * tipFactor;
  p.z += sway * 0.06 * tipFactor;

  vec4 wp = modelMatrix * vec4(p, 1.0);
  vWorld = wp.xyz;
  vNormal = normalize(normalMatrix * normal);
  vUv = uv;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;
const fernFS = `
precision highp float;
varying vec2 vUv;
varying vec3 vWorld;
varying vec3 vNormal;
uniform float uTime;
${NOISE_GLSL}

// frond shape: central rachis with paired leaflets along it.
// uv.x = across (0.5 = rachis), uv.y = along frond (0=base, 1=tip)
void main(){
  vec2 uv = vUv;
  float along = uv.y;
  float across = uv.x - 0.5;

  // taper toward tip
  float halfwidth = mix(0.5, 0.05, along);
  if (abs(across) > halfwidth) discard;

  // leaflet stripes — sin along the rachis
  float stripe = sin(along * 38.0);
  stripe = smoothstep(0.0, 0.3, stripe); // alternating leaflets
  // each leaflet: shape across that diminishes from rachis
  float leafletProfile = 1.0 - smoothstep(0.0, halfwidth, abs(across));
  // alternate sides slightly
  float side = sign(across);
  float alt = sin(along*38.0 + side*0.6);
  float leaflet = leafletProfile * smoothstep(-0.2, 0.6, alt);
  // gaps between leaflets
  float gap = smoothstep(0.4, 0.0, abs(fract(along*19.0)-0.5));
  if (leaflet*gap < 0.18) discard;

  // color: deep emerald to chartreuse near center
  vec3 deep = vec3(0.05, 0.18, 0.07);
  vec3 mid  = vec3(0.16, 0.36, 0.12);
  vec3 hi   = vec3(0.32, 0.50, 0.20);
  float lightSide = smoothstep(0.0, 0.6, leaflet);
  vec3 c = mix(deep, mid, lightSide);
  c = mix(c, hi, smoothstep(0.6, 1.0, lightSide)*0.6);

  // rachis (central spine)
  float rachis = smoothstep(0.04, 0.0, abs(across));
  c = mix(c, vec3(0.18, 0.14, 0.08), rachis*0.7);

  // translucency: brighter where light comes through, fbm-modulated
  float trans = fbm(vec2(along*4.0, across*8.0))*0.5 + 0.5;
  c += trans*0.12*vec3(0.45, 0.55, 0.25);

  // wet droplets occasionally on leaf
  float drop = smoothstep(0.97, 1.0, hash(floor(vec2(along*40.0, across*24.0))));
  c += drop * vec3(0.4, 0.5, 0.45);

  // Slight grain
  c += (hash(uv*113.0)-0.5)*0.04;

  gl_FragColor = vec4(c, 1.0);
}
`;

// =============================================================================
// MUSHROOM CAP SHADER — 3 species selectable
// 0 = fly agaric (red w/ white spots)
// 1 = porcini (brown)
// 2 = chanterelle (yellow w/ folds)
// =============================================================================
const mushCapVS = `
varying vec3 vNormal;
varying vec3 vWorld;
varying vec2 vUv;
varying vec3 vLocal;
void main(){
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorld = wp.xyz;
  vNormal = normalize(normalMatrix * normal);
  vLocal = position;
  vUv = uv;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;
const mushCapFS = `
precision highp float;
varying vec3 vNormal;
varying vec3 vWorld;
varying vec2 vUv;
varying vec3 vLocal;
uniform float uTime;
uniform int uSpecies;
${NOISE_GLSL}

void main(){
  vec3 c;
  // top-of-cap = high local Y; underside = low local Y
  bool underside = vNormal.y < 0.05;
  vec2 capUv = vec2(atan(vLocal.z, vLocal.x), length(vLocal.xz));

  if (uSpecies == 0) {
    // Fly agaric
    if (!underside) {
      vec3 base = mix(vec3(0.55, 0.05, 0.04), vec3(0.85, 0.18, 0.10), smoothstep(0.0, 0.2, vLocal.y));
      // white spots via voronoi
      float v = voronoi(vec2(capUv.x*4.0, capUv.y*22.0));
      float spot = smoothstep(0.18, 0.05, v);
      vec3 spotCol = vec3(0.92, 0.9, 0.85);
      c = mix(base, spotCol, spot*0.85);
      // wet sheen
      float fres = pow(1.0 - max(dot(vNormal, vec3(0,1,0)), 0.0), 2.0);
      c += fres*vec3(0.2, 0.05, 0.05)*0.5;
    } else {
      // gills
      float gills = abs(sin(capUv.x*60.0));
      c = mix(vec3(0.85, 0.82, 0.75), vec3(0.55, 0.5, 0.45), gills);
    }
  } else if (uSpecies == 1) {
    // Porcini
    if (!underside) {
      float n = fbm(vec2(capUv.x*3.0, capUv.y*8.0));
      vec3 lo = vec3(0.18, 0.10, 0.05);
      vec3 hi = vec3(0.45, 0.28, 0.14);
      c = mix(lo, hi, n);
      c *= 0.85 + 0.15*fbm(vWorld.xz*10.0);
      // sheen
      float fres = pow(1.0 - max(dot(vNormal, vec3(0,1,0)), 0.0), 3.0);
      c += fres*vec3(0.1, 0.07, 0.04);
    } else {
      // pores
      float pores = voronoi(vec2(capUv.x*40.0, capUv.y*60.0));
      c = mix(vec3(0.85, 0.80, 0.65), vec3(0.55, 0.48, 0.35), pores);
    }
  } else {
    // Chanterelle — yellow with folded ridges
    if (!underside) {
      float folds = sin(capUv.x*8.0 + capUv.y*4.0);
      folds = 0.5 + 0.5*folds;
      vec3 lo = vec3(0.78, 0.50, 0.10);
      vec3 hi = vec3(0.95, 0.75, 0.20);
      c = mix(lo, hi, folds);
      c += fbm(vec2(capUv.x*6.0, capUv.y*12.0))*0.1;
    } else {
      // false-gills (ridges)
      float ridge = sin(capUv.x*30.0)*0.5+0.5;
      c = mix(vec3(0.88, 0.7, 0.18), vec3(0.55, 0.4, 0.08), ridge);
    }
  }

  // Subtle AO at base
  c *= mix(0.6, 1.0, smoothstep(0.0, 0.4, vLocal.y + 0.2));

  gl_FragColor = vec4(c, 1.0);
}
`;

// =============================================================================
// MUSHROOM STEM SHADER — pale fibrous
// =============================================================================
const mushStemFS = `
precision highp float;
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
uniform int uSpecies;
${NOISE_GLSL}

void main(){
  // vertical fibers
  float fiber = sin(vUv.x*70.0 + fbm(vec2(vUv.x*4.0, vUv.y*20.0))*4.0);
  fiber = 0.5 + 0.5*fiber;

  vec3 baseCol;
  if (uSpecies == 0)      baseCol = vec3(0.93, 0.88, 0.78); // amanita
  else if (uSpecies == 1) baseCol = vec3(0.78, 0.65, 0.45); // porcini bulb
  else                    baseCol = vec3(0.92, 0.78, 0.32); // chanterelle

  vec3 c = baseCol * (0.85 + 0.15*fiber);
  // base darkening
  c *= mix(0.55, 1.0, smoothstep(-0.2, 0.4, vWorld.y));
  // wet
  float fres = pow(1.0 - max(dot(vNormal, vec3(0,1,0)), 0.0), 3.0);
  c += fres*0.06;
  gl_FragColor = vec4(c, 1.0);
}
`;

// =============================================================================
// CANOPY DOME SHADER — overhead leaves with light shafts
// =============================================================================
const canopyVS = `
varying vec3 vWorld;
varying vec3 vDir;
varying vec2 vUv;
void main(){
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorld = wp.xyz;
  vDir = normalize(position);
  vUv = uv;
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;
const canopyFS = `
precision highp float;
varying vec3 vWorld;
varying vec3 vDir;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSunDir;
${NOISE_GLSL}

void main(){
  // Spherical coords
  float lon = atan(vDir.z, vDir.x);
  float lat = asin(clamp(vDir.y, -1.0, 1.0));

  // base: dense canopy
  vec2 p = vec2(lon*2.0, lat*3.5);
  float leaves = fbm(p*4.0);
  float clumps = voronoi(p*8.0);
  float density = smoothstep(0.0, 1.0, leaves) * (1.0 - clumps*0.6);

  // gaps (where sky shows through)
  float gap = smoothstep(0.55, 0.95, fbm(p*1.4 + vec2(13.0, 7.0)));
  // gap intensity drives light shafts
  float gapStrength = clamp(gap, 0.0, 1.0);

  // colors
  vec3 darkLeaf  = vec3(0.04, 0.10, 0.05);
  vec3 midLeaf   = vec3(0.10, 0.22, 0.08);
  vec3 hiLeaf    = vec3(0.22, 0.40, 0.16);
  vec3 sky       = vec3(0.65, 0.78, 0.78);
  vec3 sunSky    = vec3(1.0, 0.92, 0.65);

  vec3 leafCol = mix(darkLeaf, midLeaf, density);
  leafCol = mix(leafCol, hiLeaf, smoothstep(0.45, 1.0, density)*0.7);

  // sun position influence
  float sunDot = max(dot(vDir, normalize(uSunDir)), 0.0);
  vec3 skyCol = mix(sky, sunSky, pow(sunDot, 4.0));

  vec3 c = mix(leafCol, skyCol, gapStrength);

  // Light shafts: brighter where there's a gap and view aligns with sun
  float shaft = pow(sunDot, 16.0) * gapStrength;
  c += shaft * vec3(1.0, 0.85, 0.55) * 1.4;

  // tiny bird-silhouette dots? (No, omit.)

  // moving leaf flicker (wind in canopy)
  float flicker = noise2(p*8.0 + uTime*0.3);
  c *= 0.92 + 0.08*flicker;

  // dim toward horizon
  float horizon = smoothstep(-0.1, 0.6, vDir.y);
  c *= mix(0.45, 1.0, horizon);

  // subtle vignette near edge
  c = pow(c, vec3(1.05));

  gl_FragColor = vec4(c, 1.0);
}
`;

// =============================================================================
// LOG SHADER (uses bark VS, similar but with denser moss)
// =============================================================================
const logFS = `
precision highp float;
varying vec3 vWorld;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
${NOISE_GLSL}

void main(){
  // Bark grain along log
  float grain = fbm(vec2(vUv.x*22.0, vUv.y*1.8));
  float ridges = abs(sin(vUv.x*4.0 + grain*3.0));
  ridges = pow(ridges, 1.6);
  vec3 wood = mix(vec3(0.10, 0.07, 0.04), vec3(0.25, 0.18, 0.10), ridges*0.7+grain*0.3);

  // Moss covering the top half — based on world normal Y
  float upDot = clamp(vNormal.y, 0.0, 1.0);
  float mossCoverage = smoothstep(0.1, 0.7, upDot);
  float mossDetail = fbm(vWorld.xz*5.0 + vWorld.y*1.5);
  float moss = mossCoverage * smoothstep(0.25, 0.7, mossDetail);
  vec3 mossCol = vec3(0.10, 0.30, 0.13)*(0.7+0.3*fbm(vWorld.xz*14.0));

  vec3 c = mix(wood, mossCol, moss);

  // Wet dark patches
  float wet = smoothstep(0.6, 0.95, fbm(vWorld.xz*3.0 + vWorld.y*0.8));
  c *= mix(0.7, 1.0, 1.0-wet);
  c += wet*0.04;

  // Tiny moss tendrils hanging off
  float tendril = smoothstep(0.7, 0.95, fbm(vec2(vUv.x*40.0, vUv.y*8.0)));
  c = mix(c, vec3(0.13, 0.30, 0.12), tendril*moss*0.6);

  gl_FragColor = vec4(c, 1.0);
}
`;

// ANT-LINE SHADER — small dark dots crawling along a path

precision highp float;
varying vec2 vUv;
void main(){
  vec2 c = vUv - 0.5;
  float r = length(c);
  if (r > 0.5) discard;
  // 3 segments: head/thorax/abdomen
  float body = smoothstep(0.5, 0.35, r);
  vec3 col = vec3(0.04, 0.02, 0.01);
  col *= 0.8 + 0.2*smoothstep(0.4, 0.0, abs(c.x));
  gl_FragColor = vec4(col, body);
}
`;

precision highp float;
varying vec2 vUv;
uniform float uAge; // 0..1
void main(){
  vec2 c = vUv - 0.5;

  float fade = 1.0 - uAge;
  gl_FragColor = vec4(vec3(0.7, 0.85, 0.85), ring*fade*0.7);
}

// =============================================================================
// RAIN STREAK SHADER (for falling drops as instanced quads)
// =============================================================================
const rainVS = `
attribute vec3 iPos;
attribute float iSpeed;
attribute float iSeed;
uniform float uTime;
uniform float uRange;
varying float vAlpha;
void main(){
  vec3 p = position;
  // local quad oriented vertical, scaled by aspect
  vec3 wp = iPos;
  // animate downward
  float t = uTime*iSpeed + iSeed*100.0;
  wp.y = mod(iPos.y - t, uRange) - 1.0;
  // billboard transform by reading camera right/up from view
  vec3 camRight = vec3(viewMatrix[0][0], viewMatrix[1][0], viewMatrix[2][0]);
  vec3 camUp    = vec3(0.0, 1.0, 0.0); // rain is vertical
  vec3 worldPos = wp + camRight*p.x*0.006 + camUp*p.y*0.20;
  vec4 mvp = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
  vAlpha = 0.7;
  gl_Position = mvp;
}
`;
const rainFS = `
precision highp float;
varying float vAlpha;
void main(){
  gl_FragColor = vec4(0.78, 0.84, 0.88, vAlpha*0.55);
}
`;

// ---- Conifer trunks ---------------------------------------------------------
const trunks = [];
function makeTrunk(x, z, radius, height, tint) {
  const geo = new THREE.CylinderGeometry(radius*0.7, radius, height, 24, 8, true);
  const mat = new THREE.ShaderMaterial({
    vertexShader: barkVS,
    fragmentShader: barkFS,
    uniforms: {

      uMossHeight: { value: 1.6 + Math.random()*0.6 },
      uTint: { value: tint || new THREE.Vector3(1,1,1) },
    },
    side: THREE.DoubleSide,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, height/2 - 0.05, z);
  worldGroup.add(m);
  trunks.push(m);
  return m;
}

// 5 trunks scattered around
makeTrunk(-3.2, -2.4, 0.55, 30, new THREE.Vector3(1.0, 0.95, 0.92));
makeTrunk( 4.1, -3.0, 0.62, 32, new THREE.Vector3(0.95, 0.95, 1.0));
makeTrunk(-2.8,  4.5, 0.48, 28, new THREE.Vector3(1.0, 1.0, 0.95));
makeTrunk( 3.6,  3.3, 0.70, 34, new THREE.Vector3(1.0, 0.92, 0.88));
makeTrunk(-5.0,  0.2, 0.40, 26, new THREE.Vector3(0.95, 1.0, 0.95));

// ---- Fallen log -------------------------------------------------------------
const logGeo = new THREE.CylinderGeometry(0.42, 0.46, 7.0, 22, 4, false);
logGeo.rotateZ(Math.PI/2);
const logMat = new THREE.ShaderMaterial({

// log end-caps (flat disks with rings) — simple meshes
function makeLogEndCap(x, z, side) {

makeLogEndCap( 3.5, -1.0,  1);

// ---- Mushrooms (8-10 procedural) -------------------------------------------
const mushrooms = [];
function makeMushroom(x, z, species, scale, rot) {
  scale = scale || 1.0;
  const grp = new THREE.Group();
  // stem
  const stemH = 0.18 * scale + Math.random()*0.05;
  const stemR = 0.04 * scale + Math.random()*0.01;
  const stemGeo = new THREE.CylinderGeometry(stemR*0.85, stemR, stemH, 14);
  const stemMat = new THREE.ShaderMaterial({
    vertexShader: mushStemVS,
    fragmentShader: mushStemFS,
    uniforms: { uTime, uSpecies: { value: species } },
  });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = stemH/2;
  grp.add(stem);

  // cap (parametric — squashed sphere)
  const capR = 0.10 * scale + Math.random()*0.04;
  const capH = 0.07 * scale + Math.random()*0.02;
  const capGeo = new THREE.SphereGeometry(capR, 26, 20, 0, Math.PI*2, 0, Math.PI*0.55);
  capGeo.scale(1.0, capH/capR, 1.0);
  const capMat = new THREE.ShaderMaterial({
    vertexShader: mushCapVS,
    fragmentShader: mushCapFS,
    uniforms: { uTime, uSpecies: { value: species } },
    side: THREE.DoubleSide,
  });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = stemH;
  grp.add(cap);

  // tiny underside disk
  const undGeo = new THREE.CircleGeometry(capR*0.95, 18);
  undGeo.rotateX(Math.PI/2);
  const und = new THREE.Mesh(undGeo, capMat);
  und.position.y = stemH - 0.001;
  grp.add(und);

  grp.position.set(x, 0.0, z);
  grp.rotation.y = rot || Math.random()*Math.PI*2;
  worldGroup.add(grp);
  mushrooms.push(grp);

function makeFern(x, z, scale, rot) {
  scale = scale || 1.0;
  const grp = new THREE.Group();
  // 5-7 fronds per fern, planar strips
  const frondCount = 5 + Math.floor(Math.random()*3);
  for (let i=0; i<frondCount; i++) {
    const len = (0.7 + Math.random()*0.5) * scale;
    const wide = 0.20 * scale;
    const geo = new THREE.PlaneGeometry(wide, len, 1, 8);
    geo.translate(0, len/2, 0); // anchor at base
    const mat = new THREE.ShaderMaterial({
      vertexShader: fernVS,
      fragmentShader: fernFS,
      uniforms: {
        uTime,
        uSway: { value: 0.4 + Math.random()*0.6 },
      },
      side: THREE.DoubleSide,
      transparent: true,
      depthWrite: true,
      alphaTest: 0.05,
    });
    const m = new THREE.Mesh(geo, mat);
    const angle = (i / frondCount) * Math.PI*2 + Math.random()*0.3;
    const tilt = 0.7 + Math.random()*0.4;
    m.rotation.order = 'YXZ';
    m.rotation.y = angle;
    m.rotation.x = -tilt;
    m.rotation.z = (Math.random()-0.5)*0.3;
    grp.add(m);
  }
  grp.position.set(x, 0.0, z);
  grp.rotation.y = rot || Math.random()*Math.PI*2;
  worldGroup.add(grp);
  return grp;
}

// CAMERA RIG — lying-down look controller
// =============================================================================
const lookState = {
  yaw: 0,            // around Y
  pitch: 0.95,       // looking up toward canopy (positive = up)
  targetYaw: 0,
  targetPitch: 0.95,
  dragging: false,
  lastX: 0, lastY: 0,
};

function applyLook() {
  // Smooth follow
  lookState.yaw   += (lookState.targetYaw   - lookState.yaw  ) * 0.10;
  lookState.pitch += (lookState.targetPitch - lookState.pitch) * 0.10;
  // Clamp pitch a little (don't fully look at floor; we're lying down)
  lookState.pitch = Math.max(-0.4, Math.min(1.45, lookState.pitch));

  // Breath: tiny tilt
  const breath = Math.sin(uTime.value * 0.6) * 0.012;
  const blink  = Math.sin(uTime.value * 0.2) * 0.004;

  // Compose view direction from yaw/pitch
  const cy = Math.cos(lookState.yaw),     sy = Math.sin(lookState.yaw);
  const cp = Math.cos(lookState.pitch + breath), sp = Math.sin(lookState.pitch + breath);
  const dir = new THREE.Vector3(sy*cp, sp, -cy*cp);

  // Camera height oscillates ever so slightly (chest rising)
  camera.position.y = HEAD_Y + breath*0.2 + blink*0.05;
  // Slight head roll
  camera.up.set(Math.sin(breath*0.5), 1, 0).normalize();
  camera.lookAt(camera.position.clone().add(dir));
}

// Mouse / touch
function onPointerDown(e) {
  lookState.dragging = true;
  root.classList.add('dragging');
  const p = e.touches ? e.touches[0] : e;
  lookState.lastX = p.clientX;
  lookState.lastY = p.clientY;
}
function onPointerUp() {
  lookState.dragging = false;
  root.classList.remove('dragging');
}
function onPointerMove(e) {
  if (!lookState.dragging) return;
  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - lookState.lastX;
  const dy = p.clientY - lookState.lastY;
  lookState.lastX = p.clientX;
  lookState.lastY = p.clientY;
  lookState.targetYaw   -= dx * 0.005;
  lookState.targetPitch += dy * 0.005;
}
root.addEventListener('mousedown', onPointerDown);
window.addEventListener('mouseup', onPointerUp);
window.addEventListener('mousemove', onPointerMove);

let shiftDownAt = -1;
let deerAppeared = false;
let deerStartTime = 0;
let deerLeavingAt = -1;

window.addEventListener('keydown', (e) => {
  if (e.key === 'Shift' && shiftDownAt < 0 && !deerAppeared) {
    shiftDownAt = performance.now();
  }
});

  if (e.key === 'Shift') shiftDownAt = -1;
});

function updateDeer(dt) {
  const now = performance.now();
  if (!deerAppeared && shiftDownAt > 0 && now - shiftDownAt > 4000) {
    deerAppeared = true;
    deerStartTime = now;
    deerLeavingAt = now + 6000;
    // place deer relative to current view
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    const horiz = new THREE.Vector3(fwd.x, 0, fwd.z).normalize();
    deer.position.set(horiz.x*1.8, 5.5, horiz.z*1.8);
    if (audio.ready) audio.deerSnort();
  }
  if (deerAppeared) {
    const since = (now - deerStartTime) / 1000;
    const tIn = Math.min(since / 1.4, 1.0);
    let opacity = tIn;
    if (now > deerLeavingAt) {
      const tOut = Math.min((now - deerLeavingAt)/2000, 1);
      opacity = (1 - tOut);
      // drift up out of view
      deer.position.y += dt * 0.6;
      if (tOut >= 1) {
        deerAppeared = false;
        opacity = 0;
      }
    } else {
      // small bob (curious)
      deer.position.y = 5.5 + Math.sin(since*1.4)*0.15;
    }
    deerMat.opacity = opacity * 0.95;
  }
}

let sunbeamCycleTime = 0;
function updateSunbeam(dt) {
  sunbeamCycleTime += dt;
  // 22-second sunbeam cycle: builds, peaks, fades
  const period = 24.0;
  const phase = (sunbeamCycleTime % period) / period;
  let intensity = 0;
  if (phase < 0.25) intensity = phase / 0.25;
  else if (phase < 0.5) intensity = 1.0 - (phase-0.25)/0.25;
  intensity *= 0.85;
  // additionally modulate to pulse with leaf flicker
  intensity *= 0.85 + 0.15*Math.sin(uTime.value*2.7);
  sunbeamMat.uniforms.uIntensity.value = intensity;
  sunbeam.visible = intensity > 0.02;

  // slight drift in position
  sunbeam.position.x = 2.0 + Math.sin(sunbeamCycleTime*0.05)*0.4;
  sunbeam.position.z = -1.5 + Math.cos(sunbeamCycleTime*0.07)*0.3;
}

// =============================================================================
// AUDIO — Web Audio API
// =============================================================================
const audio = {
  ctx: null,
  ready: false,
  master: null,
  bus: {
    canopy: null,   // distant rain ABOVE
    impacts: null,  // drops on log/moss/leaves
    ambience: null, // wind, creak, crow
  },
  noiseBuf: null,
};

function makeNoiseBuffer(ctx, sec) {
  const len = ctx.sampleRate * sec;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<len; i++) d[i] = Math.random()*2-1;
  return buf;
}

audio.init = function() {
  if (audio.ready) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  audio.ctx = new Ctx();
  audio.master = audio.ctx.createGain();
  audio.master.gain.value = 0.85;
  audio.master.connect(audio.ctx.destination);

  // Subtle stereo widening compressor
  const comp = audio.ctx.createDynamicsCompressor();
  comp.threshold.value = -18;
  comp.ratio.value = 3;
  comp.connect(audio.master);

  audio.bus.canopy = audio.ctx.createGain();
  audio.bus.canopy.gain.value = 0.55;
  audio.bus.canopy.connect(comp);

  audio.bus.impacts = audio.ctx.createGain();
  audio.bus.impacts.gain.value = 0.85;
  audio.bus.impacts.connect(comp);

  audio.bus.ambience = audio.ctx.createGain();
  audio.bus.ambience.gain.value = 0.7;
  audio.bus.ambience.connect(comp);

  audio.noiseBuf = makeNoiseBuffer(audio.ctx, 6);

  audio.ready = true;

  audio.startCanopy();
  audio.startWind();
  audio.scheduleCrow();
  audio.scheduleCreak();
};

// ---- canopy rain (distant, hi-passed long-tail noise — sounds 'above' you) ----
audio.startCanopy = function() {
  // Multiple noise layers slightly detuned
  for (let i=0; i<3; i++) {
    const src = audio.ctx.createBufferSource();
    src.buffer = audio.noiseBuf;
    src.loop = true;
    src.playbackRate.value = 0.7 + Math.random()*0.6;

    const hp = audio.ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1800 + i*400;
    hp.Q.value = 0.7;

    const lp = audio.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 7000;

    // slow modulation
    const lfoGain = audio.ctx.createGain();
    lfoGain.gain.value = 0.18 + Math.random()*0.15;
    const lfo = audio.ctx.createOscillator();
    lfo.frequency.value = 0.07 + Math.random()*0.1;
    const lfoOffset = audio.ctx.createConstantSource();
    lfoOffset.offset.value = 0.5;
    lfoOffset.start();

    const amp = audio.ctx.createGain();
    amp.gain.value = 0.18;

    const lfoMul = audio.ctx.createGain();
    lfoMul.gain.value = 0.4;
    lfo.connect(lfoMul);
    lfoMul.connect(amp.gain);
    lfoOffset.connect(amp.gain);
    lfo.start();

    // pan
    const pan = audio.ctx.createStereoPanner();
    pan.pan.value = (i-1)*0.6;

    src.connect(hp).connect(lp).connect(amp).connect(pan).connect(audio.bus.canopy);
    src.start();
  }
};

// ---- wind through canopy (very low-passed slow-modulating noise) ----
audio.startWind = function() {
  const src = audio.ctx.createBufferSource();
  src.buffer = audio.noiseBuf;
  src.loop = true;

  const lp = audio.ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 320;
  lp.Q.value = 0.4;

  const hp = audio.ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 50;

  const amp = audio.ctx.createGain();
  amp.gain.value = 0.0;

  // LFO breathing
  const lfo = audio.ctx.createOscillator();
  lfo.frequency.value = 0.06;
  const lfoG = audio.ctx.createGain();
  lfoG.gain.value = 0.35;
  const offset = audio.ctx.createConstantSource();
  offset.offset.value = 0.4;
  offset.start();
  lfo.connect(lfoG); lfoG.connect(amp.gain); offset.connect(amp.gain);
  lfo.start();

  src.connect(lp).connect(hp).connect(amp).connect(audio.bus.ambience);
  src.start();
};

// ---- impacts: drop on log, moss, leaf ----
audio.dropOnSurface = function(surface, x, z) {
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  // pan from world position
  const pan = ctx.createStereoPanner();
  pan.pan.value = Math.max(-1, Math.min(1, x/4));
  const dist = Math.sqrt(x*x + z*z);
  const distGain = ctx.createGain();
  distGain.gain.value = 1.0 / (1.0 + dist*0.5);

  const env = ctx.createGain();
  env.gain.value = 0;

  const noise = ctx.createBufferSource();
  noise.buffer = audio.noiseBuf;
  noise.playbackRate.value = 0.6 + Math.random()*0.8;

  const filter = ctx.createBiquadFilter();

  if (surface === 'log') {
    // wood-knock: bandpass with decay + a click
    filter.type = 'bandpass';
    filter.frequency.value = 600 + Math.random()*300;
    filter.Q.value = 4.5;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.65, t0 + 0.003);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);

    // tone (wood resonance)
    const osc = ctx.createOscillator();
    osc.frequency.value = 380 + Math.random()*120;
    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0, t0);
    oscEnv.gain.linearRampToValueAtTime(0.25, t0 + 0.005);
    oscEnv.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
    osc.connect(oscEnv).connect(distGain);
    osc.start(t0); osc.stop(t0+0.25);

    noise.connect(filter).connect(env).connect(distGain);
    distGain.connect(pan).connect(audio.bus.impacts);
    noise.start(t0); noise.stop(t0 + 0.25);
  } else if (surface === 'leaf') {
    // leaf-rustle: hi-passed crinkle
    filter.type = 'highpass';
    filter.frequency.value = 4500;
    filter.Q.value = 1.2;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.20, t0 + 0.005);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
    noise.connect(filter).connect(env).connect(distGain);
    distGain.connect(pan).connect(audio.bus.impacts);
    noise.start(t0); noise.stop(t0 + 0.18);
  } else {
    // moss: soft thud
    filter.type = 'lowpass';
    filter.frequency.value = 280 + Math.random()*150;
    filter.Q.value = 0.6;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.35, t0 + 0.004);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.10);

    // small thump tone
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 120 + Math.random()*40;
    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0, t0);
    oscEnv.gain.linearRampToValueAtTime(0.18, t0 + 0.005);
    oscEnv.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
    osc.connect(oscEnv).connect(distGain);
    osc.start(t0); osc.stop(t0+0.16);

    noise.connect(filter).connect(env).connect(distGain);
    distGain.connect(pan).connect(audio.bus.impacts);
    noise.start(t0); noise.stop(t0 + 0.15);
  }
};

// ---- distant crow caw (FM with formant) ----
audio.crowCaw = function() {
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  const out = ctx.createGain();
  out.gain.value = 0;

  // FM: carrier ~ 380 Hz, mod ~ 70 Hz
  const carrier = ctx.createOscillator();
  carrier.type = 'sawtooth';
  carrier.frequency.value = 360 + Math.random()*60;
  const mod = ctx.createOscillator();
  mod.frequency.value = 65 + Math.random()*20;
  const modG = ctx.createGain();
  modG.gain.value = 320;
  mod.connect(modG).connect(carrier.frequency);

  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1100;
  bp.Q.value = 2.5;

  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 350;

  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 2400;

  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random()-0.5)*1.4;

  const dist = ctx.createGain();
  dist.gain.value = 0.15; // distant

  // 2-3 caws
  let t = t0;
  const cawCount = 2 + Math.floor(Math.random()*2);
  for (let i=0; i<cawCount; i++) {
    out.gain.setValueAtTime(0, t);
    out.gain.linearRampToValueAtTime(0.6, t+0.04);
    out.gain.linearRampToValueAtTime(0.4, t+0.12);
    out.gain.exponentialRampToValueAtTime(0.001, t+0.32);
    t += 0.45 + Math.random()*0.2;
  }

  carrier.connect(bp).connect(hp).connect(lp).connect(out).connect(dist).connect(pan).connect(audio.bus.ambience);
  carrier.start(t0); carrier.stop(t + 0.5);
  mod.start(t0); mod.stop(t + 0.5);
};

audio.scheduleCrow = function() {
  const interval = 60000 + Math.random()*60000;
  setTimeout(() => {
    if (audio.ready) audio.crowCaw();
    audio.scheduleCrow();
  }, interval);
};

// ---- tree creak ----
audio.creak = function() {
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  const noise = ctx.createBufferSource();
  noise.buffer = audio.noiseBuf;
  noise.playbackRate.value = 0.3;

  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 220;
  bp.Q.value = 8;
  // sweep frequency
  bp.frequency.setValueAtTime(180, t0);
  bp.frequency.linearRampToValueAtTime(280, t0 + 0.6);
  bp.frequency.linearRampToValueAtTime(160, t0 + 1.2);

  const env = ctx.createGain();
  env.gain.value = 0;
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.22, t0 + 0.2);
  env.gain.linearRampToValueAtTime(0.18, t0 + 0.8);
  env.gain.exponentialRampToValueAtTime(0.001, t0 + 1.4);

  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random()-0.5)*1.2;

  noise.connect(bp).connect(env).connect(pan).connect(audio.bus.ambience);
  noise.start(t0); noise.stop(t0 + 1.6);
};

audio.scheduleCreak = function() {
  const interval = 25000 + Math.random()*30000;
  setTimeout(() => {
    if (audio.ready) audio.creak();
    audio.scheduleCreak();
  }, interval);
};

// ---- deer snort (easter egg) ----
audio.deerSnort = function() {
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  const noise = ctx.createBufferSource();
  noise.buffer = audio.noiseBuf;
  noise.playbackRate.value = 0.5;

  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 800;
  bp.Q.value = 3;

  const env = ctx.createGain();
  env.gain.value = 0;
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.3, t0 + 0.05);
  env.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);

  noise.connect(bp).connect(env).connect(audio.bus.ambience);
  noise.start(t0); noise.stop(t0 + 0.5);
};

// =============================================================================
// SURFACE-AWARE DROP DETECTION
// We don't run physics on every drop; we statistically pick "events" each frame
// and pick the surface based on a small spatial test near the camera.
// =============================================================================

const dropSurfaces = [
  { type: 'log',  bounds: { x0:-3.5, x1:3.5, z0:-2.0, z1:-1.2, y: 0.62 }, prob: 0.20 },
  { type: 'leaf', bounds: { x0:-3.5, x1:3.5, z0:-3.5, z1:3.5, y: 0.30 }, prob: 0.25 }, // ferns/canopy mid-drops
  { type: 'moss', bounds: { x0:-5.0, x1:5.0, z0:-5.0, z1:5.0, y: 0.0  }, prob: 0.55 },
];

function tickDrops(dt) {
  // Roughly 1 visible-drop event ~every 0.05s
  const eventsPerSec = 14;
  const expected = eventsPerSec * dt;
  // Poisson-ish — issue floor + extra prob
  const n = Math.floor(expected) + (Math.random() < (expected - Math.floor(expected)) ? 1 : 0);
  for (let i=0; i<n; i++) {
    // pick surface by prob
    let r = Math.random();
    let chosen = dropSurfaces[2];
    for (const s of dropSurfaces) { if (r < s.prob) { chosen = s; break; } r -= s.prob; }
    const x = chosen.bounds.x0 + Math.random()*(chosen.bounds.x1-chosen.bounds.x0);
    const z = chosen.bounds.z0 + Math.random()*(chosen.bounds.z1-chosen.bounds.z0);
    // Confine to within 6m radius for sound clarity
    if (Math.sqrt(x*x+z*z) > 6.5) continue;
    emitSplash(x, chosen.y, z, chosen.type);
  }
}

function tickSplashes(dt) {
  for (const s of splashes) {
    if (!s.visible) continue;
    s.userData.age += dt / s.userData.life;
    if (s.userData.age >= 1.0) {
      s.visible = false;
    } else {
      s.material.uniforms.uAge.value = s.userData.age;
    }
  }
}

// =============================================================================
// ANT SPLINE TICK
// =============================================================================
function tickAnts(dt) {
  for (let i=0; i<antSprites.length; i++) {
    const m = antSprites[i];
    m.userData.t = (m.userData.t + dt * 0.04) % 1.0;
    const p = antPath.getPointAt(m.userData.t);
    m.position.copy(p);
    // face camera approx (billboard)
    m.lookAt(camera.position);
  }
}

// =============================================================================
// MAIN LOOP
// =============================================================================
const clock = new THREE.Clock();

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  uTime.value += dt;

  applyLook();

  // Slow sway of trunks (very subtle)
  const swayPhase = uTime.value * 0.15;
  for (let i=0; i<trunks.length; i++) {
    const t = trunks[i];
    t.rotation.z = Math.sin(swayPhase + i*0.7) * 0.0025;
    t.rotation.x = Math.cos(swayPhase + i*0.4) * 0.002;
  }

  tickAnts(dt);
  tickDrops(dt);
  tickSplashes(dt);
  updateSunbeam(dt);
  updateDeer(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// =============================================================================
// RESIZE
// =============================================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// =============================================================================
// GATE → start audio + fade
// =============================================================================
gate.addEventListener('click', () => {
  audio.init();
  gate.classList.add('fade');
  setTimeout(() => gate.remove(), 1500);
  fadeOverlay.classList.add('gone');
  setTimeout(() => fadeOverlay.remove(), 2700);
});

// Auto-fade overlay shortly even without click (keep visual entrance)
setTimeout(() => {
  fadeOverlay.classList.add('gone');
}, 800);

animate();

// =============================================================================
// VISIBILITY — pause audio bus on tab hidden
// =============================================================================
document.addEventListener('visibilitychange', () => {
  if (!audio.ready || !audio.master) return;
  if (document.hidden) {
    audio.master.gain.setTargetAtTime(0.0, audio.ctx.currentTime, 0.2);
  } else {
    audio.master.gain.setTargetAtTime(0.85, audio.ctx.currentTime, 0.5);
  }
});

</script>
