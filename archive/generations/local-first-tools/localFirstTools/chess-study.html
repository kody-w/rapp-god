    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;

      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;

      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));

        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;

        if (hud) return;

        hud.id = 'levigold-fps-hud';

        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();

        }

        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;

<script type="module">
import * as THREE from 'three';

/* ============================================================
   CHESS STUDY · DUSK
   Cinematic single-file mood piece.
   ============================================================ */

const W=()=>innerWidth, H=()=>innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.95;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x1a0e08,0.045);
scene.background=new THREE.Color(0x0c0805);

const camera=new THREE.PerspectiveCamera(38,W()/H(),0.1,80);
camera.position.set(0,2.4,5.6);
camera.lookAt(0,0.6,0);

addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H())});

/* -----------------------------------------------------------
   SHADERS
   ----------------------------------------------------------- */
const feltMat=new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uColor:{value:new THREE.Color(0x1a3a22)} },
  vertexShader:`varying vec2 vUv; varying vec3 vN; varying vec3 vP;
    void main(){vUv=uv;vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.);vP=mv.xyz;gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying vec2 vUv; varying vec3 vN; varying vec3 vP; uniform vec3 uColor;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      float fib=n(vUv*420.)*0.18+n(vUv*1100.)*0.08;
      vec3 c=uColor*(0.85+fib);
      float r=length(vUv-0.5);
      c*=1.-r*0.55;
      vec3 L=normalize(vec3(0.4,0.9,0.3));
      float d=max(dot(vN,L),0.)*0.4+0.6;
      gl_FragColor=vec4(c*d,1.);
    }`
});

const woodMat=(tint=0x3a2412)=>new THREE.ShaderMaterial({
  uniforms:{ uColor:{value:new THREE.Color(tint)}, uTime:{value:0} },
  vertexShader:`varying vec2 vUv; varying vec3 vN; varying vec3 vWp;
    void main(){vUv=uv;vN=normalize(normalMatrix*normal);vec4 wp=modelMatrix*vec4(position,1.);vWp=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
  fragmentShader:`varying vec2 vUv; varying vec3 vN; varying vec3 vWp; uniform vec3 uColor;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.05;a*=.5;}return v;}
    void main(){
      vec2 p=vWp.xz*1.4+vWp.y*0.2;
      float ring=sin(p.x*8.+fbm(p*3.)*4.)*0.5+0.5;
      float grain=fbm(vec2(p.x*40.,p.y*4.));
      vec3 c=uColor*(0.55+ring*0.5+grain*0.18);
      vec3 L=normalize(vec3(0.5,0.8,0.2));
      float d=max(dot(vN,L),0.)*0.5+0.55;
      gl_FragColor=vec4(c*d,1.);
    }`
});

const brassMat=new THREE.ShaderMaterial({
  uniforms:{},
  vertexShader:`varying vec3 vN; varying vec3 vV;
    void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying vec3 vN; varying vec3 vV;
    void main(){
      float fr=pow(1.-max(dot(vN,vV),0.),2.);
      vec3 base=vec3(0.78,0.55,0.22);
      vec3 hi=vec3(1.0,0.85,0.5);
      vec3 c=mix(base,hi,fr);
      vec3 L=normalize(vec3(0.6,0.7,0.4));
      float d=max(dot(vN,L),0.)*0.6+0.55;
      gl_FragColor=vec4(c*d,1.);
    }`
});

const fireFlameMat=new THREE.ShaderMaterial({
  transparent:true, depthWrite:false, side:THREE.DoubleSide, blending:THREE.AdditiveBlending,
  uniforms:{ uTime:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec2 vUv; uniform float uTime;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.07;a*=.55;}return v;}
    void main(){
      vec2 uv=vUv;
      float t=uTime*0.9;
      vec2 p=vec2(uv.x*2.0,uv.y*1.4-t*1.3);
      float f=fbm(p+fbm(p*2.+t)*0.5);
      float shape=smoothstep(0.0,0.25,uv.y)*smoothstep(1.0,0.45,uv.y);
      float horiz=1.-pow(abs(uv.x-0.5)*2.0,2.0);
      float fl=f*shape*horiz*1.6;
      vec3 col=mix(vec3(1.0,0.25,0.05),vec3(1.0,0.9,0.4),fl);
      col=mix(col,vec3(0.4,0.05,0.0),1.-fl);
      gl_FragColor=vec4(col,fl*1.2);
    }`
});

const top=new THREE.Mesh(new THREE.BoxGeometry(4.6,0.18,3.2),woodMat(0x4a2a14));

/* -----------------------------------------------------------
   CHESS ENGINE
   Board: 8x8, ranks 0..7 (white at 0,1) files 0..7 (a..h)
   Piece: { type:'p|r|n|b|q|k', color:'w'|'b' }
   ----------------------------------------------------------- */
function newBoard(){
  const b=Array.from({length:8},()=>Array(8).fill(null));
  const back=['r','n','b','q','k','b','n','r'];
  for(let f=0;f<8;f++){
    b[0][f]={type:back[f],color:'w',moved:false};
    b[1][f]={type:'p',color:'w',moved:false};
    b[6][f]={type:'p',color:'b',moved:false};
    b[7][f]={type:back[f],color:'b',moved:false};
  }
  return b;
}
function inB(r,f){return r>=0&&r<8&&f>=0&&f<8}
function clone(b){
  const c=Array.from({length:8},()=>Array(8).fill(null));
  for(let r=0;r<8;r++)for(let f=0;f<8;f++)if(b[r][f])c[r][f]={...b[r][f]};
  return c;
}
function findKing(b,col){for(let r=0;r<8;r++)for(let f=0;f<8;f++){const p=b[r][f];if(p&&p.type==='k'&&p.color===col)return[r,f]}return null}
function pseudoMoves(b,col){
  const out=[];
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const p=b[r][f]; if(!p||p.color!==col) continue;
    if(p.type==='p'){
      const dir=col==='w'?1:-1, start=col==='w'?1:6;
      if(inB(r+dir,f)&&!b[r+dir][f]){
        out.push([r,f,r+dir,f]);
        if(r===start&&!b[r+2*dir][f]) out.push([r,f,r+2*dir,f]);
      }
      for(const df of [-1,1]){
        const nr=r+dir,nf=f+df;
        if(inB(nr,nf)&&b[nr][nf]&&b[nr][nf].color!==col) out.push([r,f,nr,nf]);
      }
    } else if(p.type==='n'){
      for(const[dr,df] of [[1,2],[2,1],[-1,2],[-2,1],[1,-2],[2,-1],[-1,-2],[-2,-1]]){
        const nr=r+dr,nf=f+df;
        if(inB(nr,nf)&&(!b[nr][nf]||b[nr][nf].color!==col)) out.push([r,f,nr,nf]);
      }
    } else {
      const dirs=[];
      if(p.type==='r'||p.type==='q'||p.type==='k') dirs.push([1,0],[-1,0],[0,1],[0,-1]);
      if(p.type==='b'||p.type==='q'||p.type==='k') dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
      const lim=p.type==='k'?1:7;
      for(const[dr,df] of dirs){
        for(let i=1;i<=lim;i++){
          const nr=r+dr*i,nf=f+df*i;
          if(!inB(nr,nf)) break;
          if(!b[nr][nf]){ out.push([r,f,nr,nf]); }
          else { if(b[nr][nf].color!==col) out.push([r,f,nr,nf]); break; }
        }
      }
    }
  }
  return out;
}
function attacks(b,col,tr,tf){
  const moves=pseudoMoves(b,col);
  for(const m of moves) if(m[2]===tr&&m[3]===tf) return true;
  return false;
}
function inCheck(b,col){
  const k=findKing(b,col); if(!k) return false;
  return attacks(b,col==='w'?'b':'w',k[0],k[1]);
}
function legalMoves(b,col){
  return pseudoMoves(b,col).filter(m=>{
    const c=clone(b);
    const piece=c[m[0]][m[1]];
    c[m[2]][m[3]]=piece; c[m[0]][m[1]]=null;
    if(piece.type==='p'&&(m[2]===0||m[2]===7)) c[m[2]][m[3]]={...piece,type:'q'};
    return !inCheck(c,col);
  });
}
function makeMove(b,m){
  const c=clone(b);
  const piece=c[m[0]][m[1]];
  const captured=c[m[2]][m[3]];
  c[m[2]][m[3]]={...piece,moved:true};
  c[m[0]][m[1]]=null;
  let promo=false;
  if(piece.type==='p'&&(m[2]===0||m[2]===7)){ c[m[2]][m[3]].type='q'; promo=true; }
  return {board:c,captured,promo};
}
const VAL={p:100,n:320,b:330,r:500,q:900,k:20000};
const PST_P=[
  [0,0,0,0,0,0,0,0],[5,10,10,-20,-20,10,10,5],[5,-5,-10,0,0,-10,-5,5],
  [0,0,0,20,20,0,0,0],[5,5,10,25,25,10,5,5],[10,10,20,30,30,20,10,10],
  [50,50,50,50,50,50,50,50],[0,0,0,0,0,0,0,0]
];
function evalBoard(b){
  let s=0;
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const p=b[r][f]; if(!p) continue;
    let v=VAL[p.type];
    if(p.type==='p') v+=p.color==='w'?PST_P[r][f]:PST_P[7-r][f];
    s+=p.color==='w'?v:-v;
  }
  return s;
}
function negamax(b,col,depth,alpha,beta){
  if(depth===0) return {score: (col==='w'?1:-1)*evalBoard(b)};
  const moves=legalMoves(b,col);
  if(moves.length===0){
    if(inCheck(b,col)) return {score:-99999};
    return {score:0};
  }
  // simple ordering: captures first
  moves.sort((a,b2)=>{
    const ca=b[a[2]][a[3]]?VAL[b[a[2]][a[3]].type]:0;
    const cb=b[b2[2]][b2[3]]?VAL[b[b2[2]][b2[3]].type]:0;
    return cb-ca;
  });
  let best={score:-Infinity,move:moves[0]};
  for(const m of moves){
    const c=clone(b);
    const piece=c[m[0]][m[1]];
    c[m[2]][m[3]]={...piece,moved:true}; c[m[0]][m[1]]=null;
    if(piece.type==='p'&&(m[2]===0||m[2]===7)) c[m[2]][m[3]].type='q';
    const r=negamax(c,col==='w'?'b':'w',depth-1,-beta,-alpha);
    const s=-r.score;
    if(s>best.score){best={score:s,move:m}}
    alpha=Math.max(alpha,s);
    if(alpha>=beta) break;
  }
  return best;
}
function bestMove(b,col,depth=2){
  // depth 3 is heavy in JS; use 2 with capture extension
  const r=negamax(b,col,depth,-Infinity,Infinity);
  return r.move;
}
function algebraic(b,m,promo){
  const piece=b[m[0]][m[1]];
  const files='abcdefgh';
  const cap=b[m[2]][m[3]]?'x':'';
  const from=files[m[1]]+(m[0]+1);
  const to=files[m[3]]+(m[2]+1);
  const sym=piece.type==='p'?'':piece.type.toUpperCase();
  return (sym?sym:from[0]+(cap?'':''))+(piece.type==='p'?(cap?from[0]:''):'')+cap+to+(promo?'=Q':'');
}

let board=newBoard();
let pieceMeshes=[]; // {mesh,piece,r,f}
function buildPieces(){
  pieceMeshes.forEach(p=>BOARD.remove(p.mesh));
  pieceMeshes=[];
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const p=board[r][f]; if(!p) continue;
    const m=PIECE_FACTORY[p.type](p.color==='w');
    const wp=squareWorld(f,r);
    m.position.copy(wp);
    if(p.type==='n'&&p.color==='b') m.rotation.y=Math.PI;
    BOARD.add(m);
    pieceMeshes.push({mesh:m,piece:p,r,f});
  }
}
buildPieces();

function findMesh(r,f){return pieceMeshes.find(x=>x.r===r&&x.f===f)}

/* -----------------------------------------------------------
   MOVE ANIMATION
   ----------------------------------------------------------- */
const captured={w:[],b:[]};
let moveAnim=null;
function animateMove(m,onDone){
  const moverEntry=findMesh(m[0],m[1]);
  if(!moverEntry){onDone&&onDone();return}
  const mover=moverEntry.mesh;
  const targetEntry=findMesh(m[2],m[3]);
  const startPos=mover.position.clone();
  const endPos=squareWorld(m[3],m[2]);
  const lift=0.18;
  moveAnim={
    t:0, dur:1.5,
    update(dt){
      this.t+=dt;
      const k=Math.min(this.t/this.dur,1);
      // lift -> slide -> drop, eased
      const ease=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
      const x=startPos.x+(endPos.x-startPos.x)*ease;
      const z=startPos.z+(endPos.z-startPos.z)*ease;
      let yLift;
      if(k<0.25) yLift=lift*(k/0.25);
      else if(k<0.75) yLift=lift;
      else yLift=lift*(1-(k-0.75)/0.25);
      mover.position.set(x,startPos.y+yLift,z);
      if(k>=1){
        if(targetEntry){
          // capture: ease to side
          const side=targetEntry.piece.color==='w'? -1 : 1;
          const slot=captured[targetEntry.piece.color].length;
          const cx=side*1.45;
          const cy=0.024;
          const cz=-0.7+slot*0.12;
          tweenTo(targetEntry.mesh,new THREE.Vector3(cx,cy,cz),0.6);
          captured[targetEntry.piece.color].push(targetEntry);
          // remove from active list
          pieceMeshes=pieceMeshes.filter(x=>x!==targetEntry);
          playFloorCreak();
        }
        moverEntry.r=m[2]; moverEntry.f=m[3];
        moveAnim=null;
        onDone&&onDone();
      }
    }
  };
}
const tweens=[];
function tweenTo(obj,target,dur){
  tweens.push({obj,from:obj.position.clone(),to:target.clone(),t:0,dur});
}

/* -----------------------------------------------------------
   GAME LOOP (move scheduling)
   ----------------------------------------------------------- */
let toMove='w';
let moveCount=1;
let history=[];
let lastMoveAt=performance.now();
let nextMoveDelay=1500+Math.random()*2000; // first move quickly, then real timing
let firstMoveDone=false;
let gameOver=false;

function scheduleNextMove(){
  if(gameOver) return;
  // 30-45 seconds between moves
  nextMoveDelay= firstMoveDone ? (30000+Math.random()*15000) : 2500;
  lastMoveAt=performance.now();
}

function executeMove(){
  if(moveAnim) return;
  const moves=legalMoves(board,toMove);
  if(moves.length===0){
    gameOver=true;
    setTimeout(()=>{
      board=newBoard();
      captured.w=[]; captured.b=[];
      buildPieces();
      toMove='w'; moveCount=1; history=[]; gameOver=false;
      document.getElementById('hist').innerHTML='';
      document.getElementById('last').textContent='—';
      document.getElementById('mv').textContent='1';
      scheduleNextMove();
    },4000);
    return;
  }
  const m=bestMove(board,toMove,2);
  const algBefore=algebraic(board,m,false);
  const r=makeMove(board,m);
  const alg=algebraic(board,m,r.promo);
  animateMove(m,()=>{
    board=r.board;
    if(r.promo){
      // swap mesh to queen
      const e=pieceMeshes.find(x=>x.r===m[2]&&x.f===m[3]);
      if(e){
        BOARD.remove(e.mesh);
        const ng=makeQueen(e.piece.color==='w');
        ng.position.copy(squareWorld(m[3],m[2]));
        BOARD.add(ng);
        e.mesh=ng;
        e.piece={...e.piece,type:'q'};
      }
    }
    history.push({alg,col:toMove});
    document.getElementById('last').textContent=(toMove==='w'?'· ':'  ')+alg;
    const histEl=document.getElementById('hist');
    const lines=[];
    for(let i=0;i<history.length;i+=2){
      const num=Math.floor(i/2)+1;
      const w=history[i]?history[i].alg:'';
      const b=history[i+1]?history[i+1].alg:'';
      lines.push(`${num}. ${w} ${b}`);
    }
    histEl.innerHTML=lines.slice(-6).join('<br>');
    if(toMove==='b') moveCount++;
    document.getElementById('mv').textContent=moveCount;
    toMove=toMove==='w'?'b':'w';
    firstMoveDone=true;
    if(moveCount>=60){
      gameOver=true;
      setTimeout(()=>{
        board=newBoard(); captured.w=[]; captured.b=[];
        buildPieces();
        toMove='w'; moveCount=1; history=[]; gameOver=false;
        document.getElementById('hist').innerHTML=''; document.getElementById('last').textContent='—';
        document.getElementById('mv').textContent='1';
        scheduleNextMove();
      },5000);
      return;
    }
    playPianoPhrase();
    scheduleNextMove();
  });
}
scheduleNextMove();

/* -----------------------------------------------------------
   AUDIO (gesture-gated)
   ----------------------------------------------------------- */
let actx=null, master=null, reverb=null, pianoBus=null, ambBus=null, audioReady=false;
async function initAudio(){
  if(audioReady) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0.6; master.connect(actx.destination);

  // simple convolution reverb
  const len=actx.sampleRate*2.2;
  const imp=actx.createBuffer(2,len,actx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=imp.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);
  }
  reverb=actx.createConvolver(); reverb.buffer=imp;
  const wet=actx.createGain(); wet.gain.value=0.36; reverb.connect(wet); wet.connect(master);

  pianoBus=actx.createGain(); pianoBus.gain.value=0.55;
  pianoBus.connect(master); pianoBus.connect(reverb);

  ambBus=actx.createGain(); ambBus.gain.value=0.4;
  ambBus.connect(master);

  startFireplace();
  startClock();
  audioReady=true;
  // initial chord
  setTimeout(()=>playPianoPhrase(),1200);
}

// Karplus-Strong pluck
function pluckNote(freq,dur=2.6,vel=0.7){
  if(!actx) return;
  const sr=actx.sampleRate;
  const N=Math.floor(sr/freq);
  const buf=actx.createBuffer(1,Math.floor(sr*dur),sr);
  const d=buf.getChannelData(0);
  const noise=new Float32Array(N);
  for(let i=0;i<N;i++) noise[i]=(Math.random()*2-1);
  // soft attack window
  for(let i=0;i<N;i++){
    const w=Math.sin(Math.PI*i/N);
    noise[i]*=w*0.85;
  }
  const damp=0.498;
  for(let i=0;i<d.length;i++){
    if(i<N) d[i]=noise[i];
    else d[i]=damp*(d[i-N]+d[i-N+1]);
  }
  // envelope
  const env=actx.createGain();
  env.gain.setValueAtTime(0.0001,actx.currentTime);
  env.gain.exponentialRampToValueAtTime(vel,actx.currentTime+0.01);
  env.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  const src=actx.createBufferSource(); src.buffer=buf;
  // slight body filter
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2400+freq*1.2; lp.Q.value=0.6;
  src.connect(lp); lp.connect(env); env.connect(pianoBus);
  src.start();
  src.stop(actx.currentTime+dur+0.05);
}
function midi(n){return 440*Math.pow(2,(n-69)/12)}

// Chopin-flavored sequencer in C minor / Eb major
const SCALES={
  cMin:[60,62,63,65,67,68,70,72], // C natural minor
  ebMaj:[63,65,67,68,70,72,74,75]
};
const PROGRESSIONS=[
  // each entry: [bassRoot, chordTones[]]
  [36,[60,63,67,70]],   // Cm7
  [41,[65,68,72,75]],   // Fm7  (heavily used in Chopin's prelude i)
  [43,[67,70,74,77]],   // Gm
  [44,[68,72,75,79]],   // Ab maj7
  [39,[63,67,70,74]],   // Eb
  [38,[62,65,69,72]],   // Bb-ish
];
let proIdx=0;
function playPianoPhrase(){
  if(!actx) return;
  const t0=actx.currentTime+0.06;
  const beat=60/72; // 72 BPM
  const sub=beat/4; // 16ths
  const c=PROGRESSIONS[proIdx%PROGRESSIONS.length];
  proIdx++;
  // bass + sustained
  schedulePluck(c[0],t0,beat*4,0.55);
  schedulePluck(c[0]+12,t0+beat*0.05,beat*4,0.32);
  // arpeggio cascade (a la Chopin Etude/Prelude)
  const arp=[c[1][0],c[1][1],c[1][2],c[1][3],c[1][2],c[1][1]];
  for(let s=0;s<16;s++){
    const note=arp[s%arp.length] + (s>=8?12:0);
    const v=0.32 + 0.18*Math.sin(s*0.7) + (Math.random()*0.06-0.03);
    schedulePluck(note,t0+s*sub,1.6,v);
  }
  // melody fragment (rubato-ish)
  const sc = (Math.random()<0.5?SCALES.cMin:SCALES.ebMaj);
  let mt=t0+beat*0.5;
  for(let i=0;i<5;i++){
    const note=sc[Math.floor(Math.random()*sc.length)] + 12;
    const dur=[sub*2,sub*3,sub*4,beat][Math.floor(Math.random()*4)];
    schedulePluck(note,mt,dur*1.5+0.4,0.48);
    mt+=dur*(0.92+Math.random()*0.18); // tiny rubato
    if(mt>t0+beat*4) break;
  }
}
function schedulePluck(midiNote,when,dur,vel){
  const f=midi(midiNote);
  const delay=Math.max(0,when-actx.currentTime);
  setTimeout(()=>pluckNote(f,dur,vel),delay*1000);
}

// Fireplace crackle (filtered noise + transients)
function startFireplace(){
  if(!actx) return;
  const noise=actx.createBufferSource();
  const len=actx.sampleRate*4;
  const buf=actx.createBuffer(1,len,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.3;
  noise.buffer=buf; noise.loop=true;
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=0.4;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80;
  const g=actx.createGain(); g.gain.value=0.18;
  noise.connect(hp); hp.connect(lp); lp.connect(g); g.connect(ambBus); g.connect(reverb);
  noise.start();
  // transient pops
  function pop(){
    if(!actx) return;
    const dur=0.06+Math.random()*0.08;
    const sr=actx.sampleRate;
    const b=actx.createBuffer(1,Math.floor(sr*dur),sr);
    const dd=b.getChannelData(0);
    for(let i=0;i<dd.length;i++){
      const e=Math.pow(1-i/dd.length,3);
      dd[i]=(Math.random()*2-1)*e*0.6;
    }
    const s=actx.createBufferSource(); s.buffer=b;
    const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=400+Math.random()*1800; f.Q.value=2;
    const gg=actx.createGain(); gg.gain.value=0.14+Math.random()*0.18;
    s.connect(f); f.connect(gg); gg.connect(ambBus); gg.connect(reverb);
    s.start(); s.stop(actx.currentTime+dur+0.05);
    setTimeout(pop, 600+Math.random()*2400);
  }
  pop();
}

// Grandfather clock tick (1 Hz)
function startClock(){
  if(!actx) return;
  function tick(){
    if(!actx) return;
    const t=actx.currentTime;
    const o=actx.createOscillator();
    o.type='triangle'; o.frequency.value=1800;
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.18,t+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
    o.connect(g); g.connect(ambBus); g.connect(reverb);
    o.start(t); o.stop(t+0.1);
    // alternating second tick (slightly lower)
    setTimeout(()=>{
      if(!actx) return;
      const t2=actx.currentTime;
      const o2=actx.createOscillator();
      o2.type='triangle'; o2.frequency.value=1500;
      const g2=actx.createGain();
      g2.gain.setValueAtTime(0.0001,t2);
      g2.gain.exponentialRampToValueAtTime(0.14,t2+0.002);
      g2.gain.exponentialRampToValueAtTime(0.0001,t2+0.06);
      o2.connect(g2); g2.connect(ambBus); g2.connect(reverb);
      o2.start(t2); o2.stop(t2+0.1);
    },1000);
    setTimeout(tick,2000);
  }
  tick();
  // page rustle, rare
  function rustle(){
    if(!actx) return;
    const dur=0.7+Math.random()*0.5;
    const sr=actx.sampleRate;
    const b=actx.createBuffer(1,Math.floor(sr*dur),sr);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const e=Math.sin(Math.PI*i/d.length);
      d[i]=(Math.random()*2-1)*e*0.4;
    }
    const s=actx.createBufferSource(); s.buffer=b;
    const f=actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=2200;
    const g=actx.createGain(); g.gain.value=0.06;
    s.connect(f); f.connect(g); g.connect(ambBus); g.connect(reverb);
    s.start(); s.stop(actx.currentTime+dur+0.1);
    setTimeout(rustle, 30000+Math.random()*60000);
  }
  setTimeout(rustle, 20000+Math.random()*40000);
}

function playFloorCreak(){
  if(!actx) return;
  const t=actx.currentTime;
  const dur=0.45+Math.random()*0.3;
  const o=actx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(80+Math.random()*40,t);
  o.frequency.exponentialRampToValueAtTime(40,t+dur);
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=380; f.Q.value=4;
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.08,t+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(f); f.connect(g); g.connect(ambBus); g.connect(reverb);
  o.start(t); o.stop(t+dur+0.05);
}

/* -----------------------------------------------------------
   CAMERA · MOUSE-DRAG LIMITED LOOK
   ----------------------------------------------------------- */
let dragging=false, dx=0, dy=0, tx=0, ty=0;
const cBase=camera.position.clone();
addEventListener('mousedown',e=>{dragging=true});
addEventListener('mouseup',()=>{dragging=false});
addEventListener('mousemove',e=>{
  if(!dragging) return;
  tx += e.movementX*0.0015;
  ty += e.movementY*0.0015;
  tx=Math.max(-0.45,Math.min(0.45,tx));
  ty=Math.max(-0.18,Math.min(0.25,ty));
});

/* -----------------------------------------------------------
   HUD CLOCK
   ----------------------------------------------------------- */
const startReal=Date.now();
const startGame=17*60+23; // 17:23
function updateClock(){
  const elapsedSec=Math.floor((Date.now()-startReal)/1000);
  const tot=startGame+Math.floor(elapsedSec/4); // 4 real sec = 1 study min
  const hh=Math.floor(tot/60)%24, mm=tot%60;
  document.getElementById('clk').textContent=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

/* -----------------------------------------------------------
   INPUT
   ----------------------------------------------------------- */
addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(!gameOver && !moveAnim) executeMove();
  } else if(e.code==='KeyC'){
    board=newBoard(); captured.w=[]; captured.b=[];
    buildPieces();
    toMove='w'; moveCount=1; history=[]; gameOver=false;
    document.getElementById('hist').innerHTML='';
    document.getElementById('last').textContent='—';
    document.getElementById('mv').textContent='1';
    scheduleNextMove();
  }
});

/* -----------------------------------------------------------
   AUDIO GATE
   ----------------------------------------------------------- */
const gate=document.getElementById('gate');
gate.addEventListener('click',async()=>{
  await initAudio();
  if(actx&&actx.state==='suspended') await actx.resume();
  gate.classList.add('hide');
});

/* -----------------------------------------------------------
   RENDER LOOP
   ----------------------------------------------------------- */
const clock=new THREE.Clock();
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;

  // shader uniforms
  feltMat.uniforms.uTime.value=t;
  fireFlameMat.uniforms.uTime.value=t;

  // fire flicker
  const fl=2.0+Math.sin(t*7.3)*0.4+Math.sin(t*13.7)*0.25+(Math.random()-0.5)*0.4;
  fireLight.intensity=Math.max(0.6,fl);
  fireLight.color.setHSL(0.05+Math.random()*0.01,0.85,0.55);

  // lamp subtle flicker
  lampL.intensity=3.1+Math.sin(t*0.4)*0.05+(Math.random()-0.5)*0.04;

  // tweens
  for(let i=tweens.length-1;i>=0;i--){
    const tw=tweens[i]; tw.t+=dt;
    const k=Math.min(tw.t/tw.dur,1);
    const e=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    tw.obj.position.lerpVectors(tw.from,tw.to,e);
    if(k>=1) tweens.splice(i,1);
  }

  // move animation
  if(moveAnim) moveAnim.update(dt);

  // schedule moves
  if(!moveAnim && !gameOver && performance.now()-lastMoveAt>nextMoveDelay){
    executeMove();
  }

  // camera drift toward target
  dx += (tx-dx)*0.05;
  dy += (ty-dy)*0.05;
  camera.position.x = cBase.x + dx*1.4;
  camera.position.y = cBase.y - dy*0.8;
  camera.position.z = cBase.z;
  camera.lookAt(0,0.4-dy*0.3,0);

  updateClock();
  renderer.render(scene,camera);
}
frame();
