<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LocalFirst Protocol — Validator</title>
<style>
 body{margin:0;background:#07070d;color:#e7ecff;font:15px/1.6 system-ui,sans-serif;padding:28px;max-width:760px;margin:auto}
 h1{font-size:24px} a{color:#5fd0ff}
 textarea{width:100%;height:150px;background:#10111c;border:1px solid #242741;color:#e7ecff;border-radius:10px;padding:12px;font-family:ui-monospace,monospace;font-size:13px}
 .btn{background:linear-gradient(90deg,#7CFFB2,#5fd0ff);color:#04120a;border:0;border-radius:9px;padding:9px 15px;font:inherit;font-weight:800;cursor:pointer;margin-top:8px}
 .r{margin-top:14px;padding:12px 14px;border-radius:10px;border:1px solid #242741;background:#10111c;font-family:ui-monospace,monospace;font-size:13px}
 .ok{color:#7CFFB2} .bad{color:#ff6ad5}
</style></head><body>
<h1>LocalFirst Protocol — message validator</h1>
<p>Paste a bus message; it's checked against <a href="localfirst.schema.json">localfirst.schema.json</a>. Spec: <a href="../../PROTOCOL.md">PROTOCOL.md</a>.</p>
<textarea id="in">{ "__lf": 1, "channel": "score", "payload": { "game": "snake4", "score": 420 }, "ts": 1730000000000, "from": "lf-ab12cd" }</textarea>
<button class="btn" onclick="check()">Validate</button>
<div class="r" id="out"></div>
<script>
function check(){ const o=document.getElementById('out'); let m; try{ m=JSON.parse(document.getElementById('in').value);}catch(e){ o.innerHTML='<span class="bad">✖ invalid JSON: '+e.message+'</span>'; return; }
 const errs=[];
 if(m.__lf!==1) errs.push('__lf must be 1');
 if(typeof m.channel!=='string'||!/^[a-z][a-z0-9-]*$/.test(m.channel)) errs.push('channel must be lowercase-kebab');
 if(typeof m.payload!=='object'||m.payload===null) errs.push('payload must be an object');
 if(!Number.isInteger(m.ts)) errs.push('ts must be an integer (epoch ms)');
 if('from' in m && typeof m.from!=='string') errs.push('from must be a string');
 o.innerHTML = errs.length ? '<span class="bad">✖ '+errs.length+' issue(s):</span><br>'+errs.map(e=>'• '+e).join('<br>')
   : '<span class="ok">✓ valid LocalFirst v1 message</span>'; }
check();
</script></body></html>
