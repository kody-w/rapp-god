<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker News Simulator</title>
  <meta name="description" content="A Hacker News frame machine that replays feed logic, ranking pressure, fork dimensions, and backup reimport using portable raw JSON state.">
  <!-- Keywords: hacker news, frame machine, local-first, import export, feed simulation -->
  <link rel="stylesheet" href="./frame-machines/frame-machine.css">
</head>
<body>
  <main class="wrap">
    <div id="hn-frame-machine-app" class="frame-machine-app">
      <noscript><p>This proof needs JavaScript enabled so the frame machine can render.</p></noscript>
      <p class="frame-machine-loading">Loading Hacker News frame machine...</p>
    </div>
  </main>
  <script>
    window.hnFrameMachineConfig = {
      appId: 'hacker-news-frame-machine',
      flowPath: 'data/frame-machines/hacker-news/frame-flow.json',
      feedPath: 'data/content/hacker-news-posts.json',
      liquidPath: 'data/frame-machines/hacker-news/liquid-dimension.json'
    };
  </script>
  <script src="./frame-machines/hacker-news-runtime.js"></script>
</body>
</html>
