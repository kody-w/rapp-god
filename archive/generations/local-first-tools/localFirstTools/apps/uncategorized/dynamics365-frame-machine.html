<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulated Dynamics 365 Frame Machine</title>
  <meta name="description" content="A portable Dynamics 365 frame machine that pulls publicly available raw state from the public repo, supports import/export backups, liquid fork dimensions, and a lockstep twin console.">
  <!-- Keywords: frame machine, dynamics 365, crm, digital twin, local-first -->
  <link rel="stylesheet" href="./frame-machines/frame-machine.css">
</head>
<body>
  <main class="wrap">
    <div id="frame-machine-app" class="frame-machine-app">
      <noscript><p>This proof needs JavaScript enabled so the frame machine can render.</p></noscript>
      <p class="frame-machine-loading">Loading frame machine...</p>
    </div>
  </main>
  <script>
    window.frameMachineConfig = {
      appId: 'dynamics365-frame-machine',
      machinePath: 'data/frame-machines/dynamics365/machine.json',
      overlayPath: 'data/frame-machines/dynamics365/active-system-data.json',
      liquidPath: 'data/frame-machines/dynamics365/liquid-dimension.json'
    };
  </script>
  <script src="./frame-machines/dynamics365-runtime.js"></script>
</body>
</html>
