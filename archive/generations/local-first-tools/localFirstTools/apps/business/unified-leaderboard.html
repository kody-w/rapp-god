<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Subscribes to the 'score' telepathy channel and persists best scores per game">
    <meta name="keywords" content="leaderboard,broadcastchannel,pubsub">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛠%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Leaderboard — Snake · Balatro · Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1020 0%, #1a1d3a 100%);
            color: #e6e9ef;
            min-height: 100vh;
            padding: 20px;
        }
        .wrap { max-width: 900px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.9em;
            background: linear-gradient(90deg, #ff7eb6, #7aa2f7, #9ece6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #9aa5ce; font-size: 0.9em; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 600;
            background: #1a1d29;
            border: 1px solid #2a2f42;
            color: #7aa2f7;
        }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        button, label.button {
            background: #2a2f42;
            color: #e6e9ef;
            border: 1px solid #3a3f56;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 0.85em;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover, label.button:hover { background: #3a3f56; }
        button.primary {
            background: linear-gradient(135deg, #7aa2f7, #bb9af7);
            color: #0c0e14;
            border: none;
            font-weight: 600;
        }
        .toggle {
            display: inline-flex;
            border: 1px solid #2a2f42;
            border-radius: 6px;
            overflow: hidden;
        }
        .toggle button {
            border: none;
            border-radius: 0;
            border-right: 1px solid #2a2f42;
        }
        .toggle button:last-child { border-right: none; }
        .toggle button.active {
            background: linear-gradient(135deg, #7aa2f7, #bb9af7);
            color: #0c0e14;
            font-weight: 600;
        }
        .panel {
            background: rgba(22, 24, 36, 0.85);
            border: 1px solid #2a2f42;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
        }
        .panel h2 {
            font-size: 1em;
            color: #bb9af7;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #2a2f42;
        }
        th {
            font-size: 0.75em;
            text-transform: uppercase;
            color: #9aa5ce;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        td.rank {
            font-size: 1.4em;
            font-weight: 700;
            color: #565f89;
            width: 50px;
        }
        tr:nth-child(1) td.rank { color: #ffd700; }
        tr:nth-child(2) td.rank { color: #c0c0c0; }
        tr:nth-child(3) td.rank { color: #cd7f32; }
        td.game {
            font-weight: 600;
        }
        td.game .icon {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            text-align: center;
            line-height: 28px;
            margin-right: 8px;
            font-size: 1.1em;
            vertical-align: middle;
        }
        .icon.snake   { background: linear-gradient(135deg,#9ece6a,#73d0a4); }
        .icon.balatro { background: linear-gradient(135deg,#ff7eb6,#bb9af7); }
        .icon.life    { background: linear-gradient(135deg,#7aa2f7,#7dcfff); }
        td.score {
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 1.15em;
            color: #c0caf5;
            font-weight: 600;
        }
        td.score.live { color: #9ece6a; }
        td.best { color: #e0af68; font-family: 'SF Mono', Menlo, monospace; }
        td.ts { color: #565f89; font-size: 0.8em; }
        .empty {
            text-align: center;
            padding: 30px;
            color: #565f89;
        }
        .feed {
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 0.78em;
            background: #0c0e14;
            border: 1px solid #2a2f42;
            border-radius: 6px;
            padding: 10px;
            max-height: 220px;
            overflow-y: auto;
        }
        .feed-line {
            padding: 3px 0;
            border-bottom: 1px solid #1a1d29;
        }
        .feed-line:last-child { border-bottom: none; }
        .feed-line .t { color: #565f89; }
        .feed-line .g { color: #9ece6a; font-weight: 600; }
        .pulse {
            animation: pulse 0.6s ease;
        }
        @keyframes pulse {
            0% { background-color: rgba(122, 162, 247, 0.3); }
            100% { background-color: transparent; }
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div>
                <h1>🏆 Unified Leaderboard</h1>
                <div class="subtitle">
                    Live scores via the Telepathy bus
                    <span id="transport-badge" class="badge">…</span>
                </div>
            </div>
            <div class="controls">
                <div class="toggle" role="tablist">
                    <button id="view-live" class="active">Live</button>
                    <button id="view-best">All-Time Best</button>
                </div>
                <button id="btn-export">Export JSON</button>
                <label class="button" for="file-import">Import JSON</label>
                <input id="file-import" type="file" accept="application/json" />
                <button id="btn-clear">Reset Bests</button>
            </div>
        </header>

        <div class="panel">
            <h2 id="board-title">Live Scores</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Game</th>
                        <th id="col-score">Current Score</th>
                        <th>All-Time Best</th>
                        <th>Last Update</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div id="empty" class="empty" style="display:none;">
                No score events yet. Open a game in another tab to start the feed.
            </div>
        </div>

        <div class="panel">
            <h2>Live Score Feed</h2>
            <div id="feed" class="feed">
                <div class="feed-line"><span class="t">— waiting for events —</span></div>
            </div>
        </div>
    </div>

    <script>
    /* === Telepathy Bus snippet (idempotent, BroadcastChannel + storage fallback) === */
    (function () {
        if (window.bus && window.bus.__telepathy) return;
        var CHANNEL_NAME = 'telepathy';
        var HIST_PREFIX  = 'telepathy:history:';
        var MSG_PREFIX   = 'telepathy:msg:';
        var MAX_HIST     = 50;
        var subs         = Object.create(null);
        var seen         = Object.create(null);
        var bc           = null;
        try {
            if (typeof BroadcastChannel !== 'undefined') {
                bc = new BroadcastChannel(CHANNEL_NAME);
                bc.onmessage = function (ev) {
                    var m = ev && ev.data;
                    if (!m || !m.id || seen[m.id]) return;
                    seen[m.id] = 1;
                    dispatch(m);
                };
            }
        } catch (e) { bc = null; }
        function readHist(ch) {
            try { return JSON.parse(localStorage.getItem(HIST_PREFIX + ch)) || []; }
            catch (e) { return []; }
        }
        function writeHist(ch, msg) {
            try {
                var h = readHist(ch);
                h.push(msg);
                while (h.length > MAX_HIST) h.shift();
                localStorage.setItem(HIST_PREFIX + ch, JSON.stringify(h));
            } catch (e) {}
        }
        function dispatch(msg) {
            if (!msg || !msg.channel) return;
            var list = (subs[msg.channel] || []).slice();
            var all  = (subs['*'] || []).slice();
            list.concat(all).forEach(function (fn) {
                try { fn(msg.payload, msg); } catch (e) {}
            });
        }
        try {
            window.addEventListener('storage', function (ev) {
                if (!ev.key || ev.key.indexOf(MSG_PREFIX) !== 0 || !ev.newValue) return;
                try {
                    var m = JSON.parse(ev.newValue);
                    if (!m || !m.id || seen[m.id]) return;
                    seen[m.id] = 1;
                    dispatch(m);
                } catch (e) {}
            });
        } catch (e) {}
        window.bus = {
            __telepathy: true,
            transport: bc ? 'BroadcastChannel' : 'storage',
            publish: function (channel, payload) {
                var msg = {
                    id: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
                    channel: String(channel),
                    payload: payload,
                    ts: Date.now(),
                    src: (location && location.pathname) || ''
                };
                seen[msg.id] = 1;
                writeHist(msg.channel, msg);
                dispatch(msg);
                try { if (bc) bc.postMessage(msg); } catch (e) {}
                try { localStorage.setItem(MSG_PREFIX + msg.channel, JSON.stringify(msg)); } catch (e) {}
                return msg;
            },
            subscribe: function (channel, fn) {
                if (typeof fn !== 'function') return function(){};
                if (!subs[channel]) subs[channel] = [];
                subs[channel].push(fn);
                return function () {
                    subs[channel] = (subs[channel] || []).filter(function (f) { return f !== fn; });
                };
            },
            history: function (channel, n) {
                var h = readHist(channel);
                if (typeof n === 'number' && n > 0) return h.slice(-n);
                return h;
            }
        };
    })();
    /* === end snippet === */

    /* ====== Leaderboard application ====== */
    (function () {
        var APP_NAME = 'unified-leaderboard';
        var STORAGE_KEY = APP_NAME;

        var GAMES = {
            snake:   { label: 'Snake 3D',     icon: '🐍', cls: 'snake'   },
            balatro: { label: 'Balatro',      icon: '🃏', cls: 'balatro' },
            life:    { label: 'Game of Life', icon: '🧬', cls: 'life'    }
        };

        var state = loadState();   // { bests: {snake:{score,ts}, ...} }
        var live  = {};            // current per-game running score (in-memory only)
        var view  = 'live';        // 'live' | 'best'

        function loadState() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    var s = JSON.parse(raw);
                    if (s && s.bests) return s;
                }
            } catch (e) {}
            return { bests: {} };
        }
        function saveState() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            catch (e) {}
        }

        function ingest(payload, msg) {
            if (!payload || typeof payload !== 'object') return;
            var game = payload.game;
            if (!game || !GAMES[game]) return;
            var score = Number(payload.score);
            if (!isFinite(score)) return;
            var ts = Number(payload.timestamp) || msg.ts || Date.now();

            live[game] = { score: score, ts: ts };

            var best = state.bests[game];
            if (!best || score > best.score) {
                state.bests[game] = { score: score, ts: ts };
                saveState();
            }
            render();
            addFeed(game, score, ts);
        }

        function render() {
            var rows = document.getElementById('rows');
            var emptyEl = document.getElementById('empty');
            var col = document.getElementById('col-score');
            var title = document.getElementById('board-title');

            col.textContent = (view === 'live') ? 'Current Score' : 'All-Time Best';
            title.textContent = (view === 'live') ? 'Live Scores' : 'All-Time Best Scores';

            var entries = Object.keys(GAMES).map(function (g) {
                var liveEntry = live[g];
                var bestEntry = state.bests[g];
                var sortVal = (view === 'live')
                    ? (liveEntry ? liveEntry.score : -Infinity)
                    : (bestEntry ? bestEntry.score : -Infinity);
                return { game: g, live: liveEntry, best: bestEntry, sortVal: sortVal };
            }).sort(function (a, b) { return b.sortVal - a.sortVal; });

            var anyData = entries.some(function (e) { return e.live || e.best; });
            emptyEl.style.display = anyData ? 'none' : 'block';

            rows.innerHTML = '';
            entries.forEach(function (e, idx) {
                var meta = GAMES[e.game];
                var liveScore = e.live ? e.live.score : (view === 'live' ? '—' : '—');
                var bestScore = e.best ? e.best.score : '—';
                var ts = e.live ? e.live.ts : (e.best ? e.best.ts : null);
                var tsStr = ts ? new Date(ts).toLocaleTimeString() : '—';
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="rank">' + (idx + 1) + '</td>' +
                    '<td class="game"><span class="icon ' + meta.cls + '">' + meta.icon + '</span>' +
                        meta.label + '</td>' +
                    '<td class="score' + (view === 'live' && e.live ? ' live' : '') + '">' +
                        (view === 'live' ? liveScore : bestScore) + '</td>' +
                    '<td class="best">' + bestScore + '</td>' +
                    '<td class="ts">' + tsStr + '</td>';
                rows.appendChild(tr);
            });
        }

        function addFeed(game, score, ts) {
            var feed = document.getElementById('feed');
            var line = document.createElement('div');
            line.className = 'feed-line pulse';
            line.innerHTML =
                '<span class="t">' + new Date(ts).toLocaleTimeString() + '</span> ' +
                '<span class="g">' + game + '</span> → ' +
                '<strong>' + score + '</strong>';
            feed.insertBefore(line, feed.firstChild);
            // cap to 50 lines
            while (feed.childNodes.length > 50) feed.removeChild(feed.lastChild);
        }

        // Replay history so the leaderboard reflects state from before this tab opened
        try {
            var hist = window.bus.history('score', 50) || [];
            hist.forEach(function (m) { ingest(m.payload, m); });
        } catch (e) {}

        // Subscribe to live events
        try { window.bus.subscribe('score', ingest); } catch (e) {}

        // Transport badge
        try {
            document.getElementById('transport-badge').textContent =
                (window.bus && window.bus.transport) || 'unavailable';
        } catch (e) {}

        // View toggle
        document.getElementById('view-live').addEventListener('click', function () {
            view = 'live';
            this.classList.add('active');
            document.getElementById('view-best').classList.remove('active');
            render();
        });
        document.getElementById('view-best').addEventListener('click', function () {
            view = 'best';
            this.classList.add('active');
            document.getElementById('view-live').classList.remove('active');
            render();
        });

        // Export
        document.getElementById('btn-export').addEventListener('click', function () {
            var out = {
                app: APP_NAME,
                exportedAt: new Date().toISOString(),
                bests: state.bests,
                live: live
            };
            var blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            var date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = APP_NAME + '-data-' + date + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Import
        document.getElementById('file-import').addEventListener('change', function (ev) {
            var f = ev.target.files && ev.target.files[0];
            if (!f) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data && data.bests && typeof data.bests === 'object') {
                        state.bests = data.bests;
                        saveState();
                        render();
                        alert('Leaderboard imported.');
                    } else {
                        alert('Invalid file: missing "bests" object.');
                    }
                } catch (err) {
                    alert('Import failed: ' + err.message);
                }
            };
            reader.readAsText(f);
            ev.target.value = '';
        });

        // Reset bests
        document.getElementById('btn-clear').addEventListener('click', function () {
            if (!confirm('Reset all-time best scores? This cannot be undone.')) return;
            state.bests = {};
            saveState();
            render();
        });

        render();
    })();
    </script>
</body>
</html>
