<script type="module">
import * as THREE from 'three';

// ============================================================
// SNOW GLOBE VILLAGE — A Winter's Memory
// ------------------------------------------------------------
// A cinematic music-box snow globe. Curved glass, tiny houses
// with warm window-lights, a church spire, miniature pines,
// drifting snow that EXPLODES when you grab the glass and
// settles slowly back. A tiny figure walks the village path
// when the world has been still long enough. Procedural music
// box melody on a 30-second loop.
// ============================================================

const $ = (s) => document.querySelector(s);
const errEl = $('#error');
function showError(msg) {
  errEl.style.display = 'flex';
  errEl.innerHTML = '<div>Sorry — the music box is broken.<br><br>' + String(msg) + '</div>';
  console.error(msg);
}
window.addEventListener('error', (e) => showError(e.message || e.error || 'unknown'));

// ----------------------------------------------------------
// CORE STATE
// ----------------------------------------------------------
const state = {
  audioReady: false,
  started: false,
  shaking: false,
  shakeIntensity: 0,        // 0..1 current
  shakeTarget: 0,           // 0..1 desired
  lastShakeT: -9999,
  stillSince: 0,
  figureActive: false,
  figureT: 0,               // 0..1 along path
  hintFaded: false,
  bellLastT: 0,
};

// ----------------------------------------------------------
// RENDERER + SCENE + CAMERA
// ----------------------------------------------------------
const canvas = $('#scene');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: false,
  powerPreference: 'high-performance',
  stencil: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x070912, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0d18, 0.018);

const camera = new THREE.PerspectiveCamera(
  42,
  window.innerWidth / window.innerHeight,
  0.1,
  200
);
// Camera orbits around globe center
const cam = {
  azimuth: Math.PI * 0.12,   // around Y
  elevation: 0.18,           // up/down
  distance: 11.5,
  targetDistance: 11.5,
  shakeOffset: new THREE.Vector3(),
  baseTarget: new THREE.Vector3(0, 1.6, 0),
};
function applyCamera() {
  const r = cam.distance;
  const x = Math.sin(cam.azimuth) * Math.cos(cam.elevation) * r;
  const z = Math.cos(cam.azimuth) * Math.cos(cam.elevation) * r;
  const y = Math.sin(cam.elevation) * r + cam.baseTarget.y;
  camera.position.set(x, y, z);
  camera.position.add(cam.shakeOffset);
  camera.lookAt(cam.baseTarget.x + cam.shakeOffset.x * 0.3,
                cam.baseTarget.y + cam.shakeOffset.y * 0.3,
                cam.baseTarget.z);
}
applyCamera();

// ----------------------------------------------------------
// LIGHTING — warm interior glow + cool moonlight outside
// ----------------------------------------------------------
const ambient = new THREE.AmbientLight(0x8898b8, 0.35);
scene.add(ambient);

const moon = new THREE.DirectionalLight(0xc8d8ff, 0.55);
moon.position.set(-6, 9, 4);
scene.add(moon);

const warmFill = new THREE.PointLight(0xffb878, 0.7, 8, 1.6);
warmFill.position.set(0, 1.2, 0);
scene.add(warmFill);

// Distant rim light
const rim = new THREE.DirectionalLight(0xffd6a8, 0.25);
rim.position.set(5, 3, -8);
scene.add(rim);

// ----------------------------------------------------------
// WOOD BASE — wooden pedestal with brass plaque
// ----------------------------------------------------------
const woodVert = /* glsl */`
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  void main() {
    vPos = position;
    vNormal = normalize(normalMatrix * normal);
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const woodFrag = /* glsl */`
  precision highp float;
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform float uTime;
  uniform vec3 uLightDir;

  // hash + noise
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i);
    float b = hash(i + vec2(1,0));
    float c = hash(i + vec2(0,1));
    float d = hash(i + vec2(1,1));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float v = 0.0, a = 0.5;
    for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }
    return v;
  }

  void main(){
    // Ring grain — sample by radial+angular coords
    float r = length(vPos.xz);
    float ang = atan(vPos.z, vPos.x);
    // Concentric rings with noise
    float rings = sin((r*55.0 + fbm(vec2(r*8.0, ang*2.0))*4.0));
    rings = smoothstep(0.0, 0.7, abs(rings));
    // Long grain streaks
    float grain = fbm(vec2(ang*8.0 + r*2.0, vPos.y*30.0)) * 0.5 + 0.5;
    // Base wood color (mahogany / walnut)
    vec3 dark = vec3(0.18, 0.09, 0.045);
    vec3 mid  = vec3(0.36, 0.18, 0.085);
    vec3 light = vec3(0.55, 0.32, 0.16);
    vec3 col = mix(dark, mid, grain);
    col = mix(col, light, rings * 0.35);
    // Edge darkening
    float edge = smoothstep(0.7, 1.05, r);
    col *= 1.0 - edge * 0.4;
    // Lighting
    float diff = max(dot(vNormal, normalize(uLightDir)), 0.0);
    float amb = 0.45;
    col *= (amb + diff * 0.7);
    // Subtle varnish highlight
    float spec = pow(max(dot(reflect(-normalize(uLightDir), vNormal), vec3(0,0,1)), 0.0), 24.0);
    col += spec * 0.18 * vec3(1.0, 0.9, 0.7);
    // Warm bias
    col *= vec3(1.05, 0.98, 0.92);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// HOUSES — procedural gabled houses with warm windows
// ----------------------------------------------------------
const houseVert = /* glsl */`
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec3 vWorld;
  void main(){
    vPos = position;
    vNormal = normalize(normalMatrix * normal);
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorld = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const houseFrag = /* glsl */`
  precision highp float;
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec3 vWorld;
  uniform float uTime;
  uniform vec3 uWallColor;
  uniform vec3 uRoofColor;
  uniform vec3 uLightDir;
  uniform float uFlicker;
  uniform float uSeed;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }

  void main(){
    vec3 col;
    float upDot = vNormal.y;
    bool isRoof = upDot > 0.5;
    bool isUnder = upDot < -0.3;

    // Snow on roof: top-facing surfaces get snow
    if (isRoof) {
      // Plank-like roof boards underneath
      float planks = step(0.5, fract(vPos.x * 4.0 + vPos.z * 0.3));
      vec3 roofBase = mix(uRoofColor*0.9, uRoofColor*1.1, planks);
      // Snow coverage — heavier toward top, lighter at eaves
      float snowCov = smoothstep(0.55, 0.95, upDot);
      snowCov *= 0.85 + noise(vPos.xz*8.0 + uSeed)*0.3;
      vec3 snow = vec3(0.95, 0.97, 1.05);
      col = mix(roofBase, snow, clamp(snowCov, 0.0, 1.0));
    } else if (isUnder) {
      col = uWallColor * 0.45;
    } else {
      // Walls — clapboard-ish horizontal lines
      col = uWallColor;
      float clap = abs(sin(vPos.y * 30.0 + uSeed));
      col *= 0.85 + 0.15 * clap;
      // Plank weathering
      col += (noise(vPos.xy*12.0)-0.5) * 0.06;

      // WINDOWS — glow rectangles
      // Local coords: vPos is in local box space; box height ~0.5
      // Map onto wall: use vPos.x and vPos.y (or vPos.z and vPos.y depending)
      vec2 wallUv = abs(vNormal.x) > 0.5 ? vec2(vPos.z, vPos.y) : vec2(vPos.x, vPos.y);
      // Window grid: 2 windows per wall
      vec2 wuv = wallUv;
      // Cell size depending on wall axis
      vec2 cellSize = vec2(0.35, 0.18);
      vec2 cell = mod(wuv + 0.5, cellSize) - cellSize*0.5;
      vec2 winSize = vec2(0.07, 0.08);
      float winY = wuv.y;
      // Only show windows in middle band
      bool inBand = (winY > -0.05) && (winY < 0.12);
      // box mask
      vec2 d = abs(cell) - winSize;
      float winMask = step(max(d.x, d.y), 0.0);
      if (!inBand) winMask = 0.0;
      // Cross frame
      float frame = step(abs(cell.x), 0.005) + step(abs(cell.y), 0.005);
      // Door at center-bottom on front
      float doorMask = 0.0;
      if (abs(vNormal.z) > 0.7 && vNormal.z > 0.0) {
        vec2 dwUv = vec2(vPos.x, vPos.y);
        float dw = step(abs(dwUv.x), 0.05) * step(dwUv.y, -0.05) * step(-0.25, dwUv.y);
        doorMask = dw;
      }
      // Apply window glow
      vec3 winCol = vec3(1.0, 0.78, 0.42) * (1.6 + uFlicker * 0.4);
      col = mix(col, winCol, winMask * 0.95);
      col = mix(col, winCol*0.6, frame * winMask * 0.5);
      col = mix(col, vec3(0.18, 0.08, 0.03), doorMask);
      // Door warm halo
      col += doorMask * vec3(0.6, 0.35, 0.12) * 0.5;
    }

    // Lighting
    float diff = max(dot(vNormal, normalize(uLightDir)), 0.0);
    float amb = 0.55;
    col *= (amb + diff * 0.5);

    // Warm interior glow bleed
    float interior = 1.0 - smoothstep(0.0, 0.6, length(vWorld.xz - vec2(0.0,0.0)) / 2.5);
    col += interior * vec3(0.05, 0.025, 0.01);

    gl_FragColor = vec4(col, 1.0);
  }
`;

function makeHouse(opts) {
  const grp = new THREE.Group();
  const wallColor = opts.wallColor || new THREE.Color(0xb88a5a);
  const roofColor = opts.roofColor || new THREE.Color(0x4a2820);
  const seed = Math.random() * 100;

  const mat = new THREE.ShaderMaterial({
    vertexShader: houseVert,
    fragmentShader: houseFrag,
    uniforms: {
      uTime: { value: 0 },
      uWallColor: { value: wallColor },
      uRoofColor: { value: roofColor },
      uLightDir: { value: new THREE.Vector3(-0.5, 1.0, 0.4).normalize() },
      uFlicker: { value: 0.0 },
      uSeed: { value: seed },
    },
  });

  const w = opts.width || 0.5;
  const h = opts.height || 0.45;
  const d = opts.depth || 0.5;

  // Box (walls)
  const wallGeom = new THREE.BoxGeometry(w, h, d);
  const walls = new THREE.Mesh(wallGeom, mat);
  walls.position.y = h * 0.5;
  grp.add(walls);

  // Gabled roof: two triangular prisms forming a peak
  // Use a simple peaked roof via custom geometry
  const roofH = opts.roofH || 0.32;
  const roofGeom = new THREE.BufferGeometry();
  const wo = w * 0.55, doh = d * 0.55, eaves = 0.08;
  const verts = new Float32Array([
    // front slope (4 verts)
    -wo - eaves, 0, doh + eaves,    wo + eaves, 0, doh + eaves,    0, roofH, doh,    0, roofH, -doh,
    // back slope
    -wo - eaves, 0, -doh - eaves,   wo + eaves, 0, -doh - eaves,
  ]);
  // We'll build with explicit triangles + position attribute:
  const positions = [];
  const normals = [];
  function addTri(a, b, c) {
    const A = a, B = b, C = c;
    const ab = [B[0]-A[0], B[1]-A[1], B[2]-A[2]];
    const ac = [C[0]-A[0], C[1]-A[1], C[2]-A[2]];
    const n = [
      ab[1]*ac[2]-ab[2]*ac[1],
      ab[2]*ac[0]-ab[0]*ac[2],
      ab[0]*ac[1]-ab[1]*ac[0],
    ];
    const len = Math.hypot(n[0],n[1],n[2]) || 1;
    n[0]/=len; n[1]/=len; n[2]/=len;
    positions.push(...A, ...B, ...C);
    for (let i = 0; i < 3; i++) normals.push(...n);
  }
  // Roof points
  const FL = [-wo - eaves, h, doh + eaves];
  const FR = [ wo + eaves, h, doh + eaves];
  const BL = [-wo - eaves, h, -doh - eaves];
  const BR = [ wo + eaves, h, -doh - eaves];
  const PF = [0, h + roofH, doh + 0.0];
  const PB = [0, h + roofH, -doh - 0.0];
  // Front slope (FL, FR up to PF/PB? we want a ridge along z-axis from PF->PB)
  // Quads -> tris:
  // Right slope: FR, BR, PB, PF
  addTri(FR, BR, PB);
  addTri(FR, PB, PF);
  // Left slope: BL, FL, PF, PB
  addTri(BL, FL, PF);
  addTri(BL, PF, PB);
  // Front gable triangle (FL, FR, PF)
  addTri(FL, FR, PF);
  // Back gable triangle
  addTri(BR, BL, PB);

  roofGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  roofGeom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  const roof = new THREE.Mesh(roofGeom, mat);
  grp.add(roof);

  // Chimney
  const chimGeom = new THREE.BoxGeometry(0.07, 0.18, 0.07);
  const chimMat = new THREE.MeshStandardMaterial({ color: 0x6a3a20, roughness: 0.9 });
  const chim = new THREE.Mesh(chimGeom, chimMat);
  chim.position.set(w * 0.25, h + roofH * 0.55, 0);
  grp.add(chim);
  // Snow cap on chimney
  const chimSnow = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.02, 0.08),
    new THREE.MeshStandardMaterial({ color: 0xf0f3ff, roughness: 0.95 })
  );
  chimSnow.position.set(w * 0.25, h + roofH * 0.55 + 0.1, 0);
  grp.add(chimSnow);

  // Tiny warm window light source for atmosphere
  const winLight = new THREE.PointLight(0xff9c50, 0.18, 1.4, 1.5);
  winLight.position.set(0, h * 0.55, 0);
  grp.add(winLight);

  // Smoke from chimney (sprite-like)
  const smokeGeom = new THREE.PlaneGeometry(0.12, 0.16);
  const smokeMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uTime: { value: 0 },
      uSeed: { value: seed },
    },
    vertexShader: /* glsl */`
      varying vec2 vUv;
      uniform float uTime;
      uniform float uSeed;
      void main(){
        vUv = uv;
        vec3 p = position;
        // Wind sway
        float sw = sin(uTime*0.6 + uSeed) * 0.04;
        p.x += sw;
        // billboard
        vec4 mv = modelViewMatrix * vec4(0.0,0.0,0.0,1.0);
        mv.xy += p.xy;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uSeed;
      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }
      void main(){
        vec2 uv = vUv - 0.5;
        float r = length(uv);
        float a = smoothstep(0.5, 0.05, r);
        float t = uTime * 0.3 + uSeed;
        float n = noise(vUv*4.0 + vec2(t, t*0.7));
        a *= 0.55 * n;
        vec3 col = vec3(0.65, 0.62, 0.6);
        gl_FragColor = vec4(col, a);
      }
    `,
  });
  const smoke = new THREE.Mesh(smokeGeom, smokeMat);
  smoke.position.set(w * 0.25, h + roofH * 0.55 + 0.18, 0);
  grp.add(smoke);

  // Store refs for animation
  grp.userData.mat = mat;
  grp.userData.smokeMat = smokeMat;
  grp.userData.winLight = winLight;
  grp.userData.flickerSeed = Math.random() * 10;
  grp.userData.flickerOffset = Math.random() * 100;

  return grp;
}

const pineVert = /* glsl */`
  varying vec3 vPos;
  varying vec3 vNormal;
  varying float vY01; // 0..1 from base to tip
  uniform float uTime;
  uniform float uShake;
  uniform float uSeed;
  void main(){
    vPos = position;
    vNormal = normalize(normalMatrix * normal);
    vY01 = clamp((position.y) / 0.9, 0.0, 1.0);
    vec3 p = position;
    // Shake sway
    float sway = sin(uTime*1.4 + uSeed)*0.005 + uShake * sin(uTime*8.0 + uSeed*5.0)*0.04;
    p.x += sway * vY01;
    p.z += sway * 0.5 * vY01;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
  }
`;
const pineFrag = /* glsl */`
  precision highp float;
  varying vec3 vPos;
  varying vec3 vNormal;
  varying float vY01;
  uniform vec3 uLightDir;
  uniform float uSeed;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }

  void main(){
    // Tiered look: brighter green in needles, darker in shadow
    float upDot = vNormal.y;
    // Snow cover concentrated on upper, top-facing
    float snowCov = smoothstep(0.2, 0.85, upDot) * (0.4 + vY01*0.7);
    // Add noise to snow edge
    snowCov *= 0.7 + hash(floor(vPos.xz*40.0 + uSeed))*0.6;
    snowCov = clamp(snowCov, 0.0, 1.0);
    // Pine needle color (deep cool green, slightly toward blue at top)
    vec3 needles = mix(vec3(0.10, 0.22, 0.13), vec3(0.18, 0.32, 0.22), vY01);
    // Subtle hue noise
    needles += (hash(floor(vPos.xy*30.0 + uSeed))-0.5) * 0.05;
    vec3 snow = vec3(0.95, 0.97, 1.04);
    vec3 col = mix(needles, snow, snowCov);
    // Lighting
    float diff = max(dot(vNormal, normalize(uLightDir)), 0.0);
    col *= 0.55 + diff * 0.7;
    // Trunk darkening
    if (vY01 < 0.05) col *= vec3(0.3, 0.18, 0.08);
    gl_FragColor = vec4(col, 1.0);
  }
`;

  precision highp float;

// ----------------------------------------------------------
// AUDIO ENGINE
// ----------------------------------------------------------
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let fxGain = null;
let windNode = null;

const C_MAJOR = {
  // freq table for our melody
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
  G4: 392.00, A4: 440.00, B4: 493.88,
  C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46,
  G5: 783.99, A5: 880.00, B5: 987.77,
  C6: 1046.50,
};

// 30-second melody — folk-style, 7-8 note phrases.
// Each entry: [note, duration in beats], rest = ['_', d]
// 4/4, ~110 BPM => beat=0.545s, 30s ≈ 55 beats. We'll compose ~56 beats.
const MELODY = [
  // Phrase A — Twinkle-Twinkle-ish opening
  ['C5', 1], ['C5', 1], ['G5', 1], ['G5', 1],
  ['A5', 1], ['A5', 1], ['G5', 2],
  ['F5', 1], ['F5', 1], ['E5', 1], ['E5', 1],
  ['D5', 1], ['D5', 1], ['C5', 2],
  // Phrase B — answer with dotted figure
  ['G5', 1], ['G5', 1], ['F5', 1], ['F5', 1],
  ['E5', 1], ['E5', 1], ['D5', 2],
  ['G5', 1], ['G5', 1], ['F5', 1], ['F5', 1],
  ['E5', 1], ['E5', 1], ['D5', 2],
  // Phrase C — Old MacDonald-ish
  ['C5', 1], ['C5', 1], ['C5', 1], ['G4', 1],
  ['A4', 1], ['A4', 1], ['G4', 2],
  ['E5', 1], ['E5', 1], ['D5', 1], ['D5', 1],
  ['C5', 4],
  // Phrase D — gentle close
  ['E5', 1], ['G5', 1], ['E5', 1], ['C5', 1],
  ['D5', 1], ['F5', 1], ['D5', 1], ['B4', 1],
  ['C5', 4],
];
const BPM = 110;
const BEAT_S = 60.0 / BPM;
let melodyTotalBeats = MELODY.reduce((a, [n, d]) => a + d, 0);
let melodyTotalSec = melodyTotalBeats * BEAT_S;
// Loop length is the next round number above; we use exact total.

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.65;
  masterGain.connect(audioCtx.destination);

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.55;
  musicGain.connect(masterGain);

  fxGain = audioCtx.createGain();
  fxGain.gain.value = 0.7;
  fxGain.connect(masterGain);

  // Faint convolver-like reverb via filtered noise burst delay
  // Cheap reverb: feedback delay with lowpass
  const delay = audioCtx.createDelay(0.6);
  delay.delayTime.value = 0.18;
  const fb = audioCtx.createGain();
  fb.gain.value = 0.32;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 4200;
  delay.connect(lp); lp.connect(fb); fb.connect(delay);
  const wetMusic = audioCtx.createGain();
  wetMusic.gain.value = 0.22;
  delay.connect(wetMusic);
  wetMusic.connect(masterGain);
  // Music sends to delay
  const sendMusic = audioCtx.createGain();
  sendMusic.gain.value = 0.7;
  musicGain.connect(sendMusic); sendMusic.connect(delay);

  // Wind: pink-ish noise lowpassed, modulated
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  let lastN = 0;
  for (let i = 0; i < nd.length; i++) {
    const w = (Math.random() * 2 - 1) * 0.6;
    lastN = lastN * 0.96 + w * 0.04;
    nd[i] = lastN * 4;
  }
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  noiseSrc.loop = true;
  const noiseFilt = audioCtx.createBiquadFilter();
  noiseFilt.type = 'lowpass';
  noiseFilt.frequency.value = 420;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.04;
  noiseSrc.connect(noiseFilt); noiseFilt.connect(noiseGain); noiseGain.connect(masterGain);
  noiseSrc.start();
  windNode = { gain: noiseGain, filt: noiseFilt };

  // Schedule melody
  scheduleMelody();
  state.audioReady = true;
}

// Music-box bell synthesis: pure sine + short envelope, no filter
// To make it feel METALLIC, layer 3 partials at inharmonic ratios with fast decay
function playBellNote(when, freq, durBeats) {
  if (!audioCtx) return;
  const dur = Math.max(durBeats * BEAT_S * 1.2, 0.4);
  // Three partials — tuned-bell ratios slightly inharmonic
  const ratios = [1.0, 2.01, 3.02, 5.42];
  const gains  = [1.0, 0.55, 0.32, 0.18];
  const noteGain = audioCtx.createGain();
  noteGain.gain.setValueAtTime(0, when);
  noteGain.gain.linearRampToValueAtTime(0.42, when + 0.005);
  noteGain.gain.exponentialRampToValueAtTime(0.0002, when + dur * 0.95);
  noteGain.connect(musicGain);
  ratios.forEach((r, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq * r, when);
    const g = audioCtx.createGain();
    g.gain.value = gains[i];
    o.connect(g); g.connect(noteGain);
    o.start(when);
    o.stop(when + dur + 0.05);
  });
  // Tiny "click" attack — VERY short noise burst for the music-box hammer sound
  const clickBuf = audioCtx.createBuffer(1, 256, audioCtx.sampleRate);
  const cd = clickBuf.getChannelData(0);
  for (let i = 0; i < 256; i++) cd[i] = (Math.random()*2-1) * Math.exp(-i/30);
  const clickSrc = audioCtx.createBufferSource();
  clickSrc.buffer = clickBuf;
  const clickG = audioCtx.createGain();
  clickG.gain.value = 0.07;
  clickSrc.connect(clickG); clickG.connect(noteGain);
  clickSrc.start(when);
}

let melodyScheduledUntil = 0;
function scheduleMelody() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Anchor loop start to a multiple of melodyTotalSec from when we initialized
  if (melodyScheduledUntil < now + 0.1) {
    melodyScheduledUntil = now + 0.1;
  }
  // Schedule next ~3 seconds ahead
  while (melodyScheduledUntil < now + 3.0) {
    // Find current position in loop
    const loopStart = melodyScheduledUntil;
    let t = loopStart;
    for (const [note, dur] of MELODY) {
      const noteEnd = t + dur * BEAT_S;
      if (noteEnd > now) {
        if (note !== '_' && t >= now - 0.01) {
          const f = C_MAJOR[note];
          if (f) playBellNote(t, f, dur);
        }
      }
      t = noteEnd;
    }
    melodyScheduledUntil = t;
  }
}

// Shake whoosh (filtered noise burst) + glass tinkle (rapid bell cluster)
function playShakeWhoosh() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Whoosh: noise burst through bandpass
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.0, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i / (audioCtx.sampleRate*0.45));
  const s = audioCtx.createBufferSource();
  s.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(380, now);
  bp.frequency.exponentialRampToValueAtTime(1100, now + 0.6);
  bp.Q.value = 0.8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.45, now + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
  s.connect(bp); bp.connect(g); g.connect(fxGain);
  s.start(now); s.stop(now + 1.1);

  // Glass tinkle cluster
  const tinkleNotes = ['G5','C6','E5','A5','B5','D5'];
  for (let i = 0; i < 8; i++) {
    const t = now + Math.random() * 0.55 + 0.02;
    const n = tinkleNotes[Math.floor(Math.random()*tinkleNotes.length)];
    const f = C_MAJOR[n] * (1 + (Math.random()-0.5)*0.04);
    // tiny tinkle bell
    const ratios = [1.0, 2.76];
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0, t);
    gainNode.gain.linearRampToValueAtTime(0.18, t+0.003);
    gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    gainNode.connect(fxGain);
    ratios.forEach((r, j) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f * r;
      const og = audioCtx.createGain();
      og.gain.value = j === 0 ? 1 : 0.4;
      o.connect(og); og.connect(gainNode);
      o.start(t); o.stop(t + 0.4);
    });
  }
}

function playChurchBell() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Single deep tolling bell — three partials, long decay
  const f = 220;
  const ratios = [1.0, 1.51, 2.04, 2.97];
  const gains = [1.0, 0.6, 0.4, 0.22];
  const dur = 5.0;
  const noteGain = audioCtx.createGain();
  noteGain.gain.setValueAtTime(0, now);
  noteGain.gain.linearRampToValueAtTime(0.32, now + 0.01);
  noteGain.gain.exponentialRampToValueAtTime(0.0005, now + dur);
  noteGain.connect(fxGain);
  ratios.forEach((r,i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f * r;
    const g = audioCtx.createGain();
    g.gain.value = gains[i];
    o.connect(g); g.connect(noteGain);
    o.start(now); o.stop(now + dur + 0.1);
  });
}

// ----------------------------------------------------------
// INPUT — orbit camera, click+drag globe to shake
// ----------------------------------------------------------
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let pointerDown = false;
let dragMode = null; // 'orbit' | 'shake'
let lastX = 0, lastY = 0;
let shakeAccum = 0;
let shakeImpulseDir = new THREE.Vector3();

function onPointerDown(e) {
  if (!state.started) return;
  const x = e.clientX, y = e.clientY;
  ndc.x = (x / window.innerWidth) * 2 - 1;
  ndc.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(glass);
  if (hits.length > 0) {
    dragMode = 'shake';
    document.body.classList.add('shaking');
  } else {
    dragMode = 'orbit';
  }
  pointerDown = true;
  lastX = x; lastY = y;
  if (canvas.setPointerCapture && e.pointerId !== undefined) {
    canvas.setPointerCapture(e.pointerId);
  }
}
function onPointerMove(e) {
  if (!pointerDown) return;
  const x = e.clientX, y = e.clientY;
  const dx = x - lastX, dy = y - lastY;
  lastX = x; lastY = y;
  if (dragMode === 'orbit') {
    cam.azimuth -= dx * 0.0055;
    cam.elevation = Math.max(-0.5, Math.min(0.95, cam.elevation + dy * 0.0045));
  } else if (dragMode === 'shake') {
    const speed = Math.hypot(dx, dy);
    shakeAccum += speed;
    state.shakeTarget = Math.min(1.0, state.shakeTarget + speed * 0.012);
    state.lastShakeT = performance.now() / 1000;
    // Impulse direction: project pointer movement to world space (camera right/up)
    const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
    shakeImpulseDir.copy(camRight.multiplyScalar(dx*0.04))
                   .add(camUp.multiplyScalar(-dy*0.04));
    // Hide hint after first shake
    if (!state.hintFaded) {
      state.hintFaded = true;
      $('#hint').classList.add('fade');
    }
  }
}
function onPointerUp(e) {
  pointerDown = false;
  dragMode = null;
  document.body.classList.remove('shaking');
}
function onWheel(e) {
  if (!state.started) return;
  cam.targetDistance = Math.max(6, Math.min(18, cam.targetDistance + e.deltaY * 0.01));
  e.preventDefault();
}

canvas.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('wheel', onWheel, { passive: false });

// Apply impulses to snow particles when shaken
function applySnowImpulse(strength) {
  for (let i = 0; i < SNOW_COUNT; i++) {
    snowVel[i*3+0] += (Math.random() - 0.5) * 0.5 * strength + shakeImpulseDir.x * 0.2 * strength;
    snowVel[i*3+1] += (Math.random() * 0.4 - 0.05) * strength + shakeImpulseDir.y * 0.2 * strength;
    snowVel[i*3+2] += (Math.random() - 0.5) * 0.5 * strength + shakeImpulseDir.z * 0.2 * strength;
    // Also re-distribute particles that have fallen out
    if (snowPos[i*3+1] < 0.1) {
      const ang = Math.random() * Math.PI * 2;
      const r = Math.random() * GLOBE_R * 0.85;
      snowPos[i*3+0] = Math.cos(ang) * r;
      snowPos[i*3+1] = 0.2 + Math.random() * 0.3;
      snowPos[i*3+2] = Math.sin(ang) * r;
    }
  }
}

// ----------------------------------------------------------
// RESIZE
// ----------------------------------------------------------
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  snowMat.uniforms.uPxScale.value = h * 0.5;
}
window.addEventListener('resize', resize);

// ----------------------------------------------------------
// MAIN LOOP
// ----------------------------------------------------------
const clock = new THREE.Clock();
let lastShakeWhooshT = -10;
let lastFrameTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.elapsedTime;
  const now = performance.now() / 1000;

  // Camera distance interpolation
  cam.distance += (cam.targetDistance - cam.distance) * Math.min(1, dt * 4);

  // Shake intensity decay
  if (state.shakeTarget > 0) {
    state.shakeTarget -= dt * 0.18;
    if (state.shakeTarget < 0) state.shakeTarget = 0;
  }
  state.shakeIntensity += (state.shakeTarget - state.shakeIntensity) * Math.min(1, dt * 6);

  // Camera shake offset
  const sk = state.shakeIntensity;
  cam.shakeOffset.set(
    (Math.random() - 0.5) * 0.18 * sk,
    (Math.random() - 0.5) * 0.18 * sk,
    (Math.random() - 0.5) * 0.18 * sk
  );
  applyCamera();

  // While shaking: continuously apply impulses
  if (sk > 0.05 && pointerDown && dragMode === 'shake') {
    applySnowImpulse(sk * 0.6);
  }
  // Whoosh trigger when shake intensity rises above threshold
  if (sk > 0.4 && (now - lastShakeWhooshT) > 0.9) {
    lastShakeWhooshT = now;
    playShakeWhoosh();
    applySnowImpulse(1.2);
  }

  // SNOW physics
  const swirl = sk; // 0..1
  for (let i = 0; i < SNOW_COUNT; i++) {
    const ix = i*3, iy = i*3+1, iz = i*3+2;
    let px = snowPos[ix], py = snowPos[iy], pz = snowPos[iz];
    let vx = snowVel[ix], vy = snowVel[iy], vz = snowVel[iz];

    // Base swirl: tangential force around Y, tiny
    const radial = Math.hypot(px, pz);
    const angT = Math.atan2(pz, px);
    const swirlForce = 0.12 + swirl * 1.6;
    const tangX = -Math.sin(angT) * swirlForce;
    const tangZ = Math.cos(angT) * swirlForce;
    vx += tangX * dt * (0.4 + swirl * 1.5);
    vz += tangZ * dt * (0.4 + swirl * 1.5);

    // Per-particle drift noise
    const ph = snowPhase[i];
    vx += Math.sin(t*0.7 + ph) * 0.04 * dt;
    vz += Math.cos(t*0.6 + ph*1.3) * 0.04 * dt;

    // Gravity (gentler when shaken — particles get suspended)
    const g = 0.12 - swirl * 0.05;
    vy -= g * dt;

    // Friction / damping
    const damp = swirl > 0.1 ? 0.985 : 0.978;
    vx *= damp; vy *= damp; vz *= damp;
    // Air resistance min terminal velocity
    if (vy < -0.6) vy = -0.6;

    px += vx * dt * 60 * 0.016;
    py += vy * dt * 60 * 0.016;
    pz += vz * dt * 60 * 0.016;

    // Contain inside globe sphere (radius GLOBE_R, center y=0.05)
    const cy = py - 0.05;
    const rr = Math.sqrt(px*px + cy*cy + pz*pz);
    if (rr > GLOBE_R - 0.05) {
      // bounce inward
      const nx = px/rr, ny = cy/rr, nz = pz/rr;
      const newR = GLOBE_R - 0.05;
      px = nx * newR; py = ny * newR + 0.05; pz = nz * newR;
      // reflect velocity
      const dot = vx*nx + vy*ny + vz*nz;
      vx -= 2*dot*nx*0.5;
      vy -= 2*dot*ny*0.5;
      vz -= 2*dot*nz*0.5;
      vx *= 0.6; vy *= 0.6; vz *= 0.6;
    }

    // Reset when settled at bottom (below ground level)
    if (py < 0.05) {
      // Respawn near top
      const ang = Math.random() * Math.PI * 2;
      const rad = Math.random() * GLOBE_R * 0.9;
      px = Math.cos(ang) * rad;
      pz = Math.sin(ang) * rad;
      py = GLOBE_R * 0.85 + Math.random() * 0.4;
      vx = (Math.random() - 0.5) * 0.04;
      vz = (Math.random() - 0.5) * 0.04;
      vy = -0.06 - Math.random() * 0.04;
    }

    snowPos[ix] = px; snowPos[iy] = py; snowPos[iz] = pz;
    snowVel[ix] = vx; snowVel[iy] = vy; snowVel[iz] = vz;
  }
  snow.geometry.attributes.position.needsUpdate = true;

  // Shader uniforms
  snowMat.uniforms.uTime.value = t;
  snowMat.uniforms.uShake.value = sk;
  glassMat.uniforms.uTime.value = t;
  glassMat.uniforms.uShake.value = sk;
  baseMat.uniforms.uTime.value = t;
  snowGroundMat.uniforms.uTime.value = t;

  // House flickering and smoke
  for (const h of houses) {
    const f = (Math.sin(t * 2.3 + h.userData.flickerOffset) * 0.5 + 0.5) *
              (Math.sin(t * 11.7 + h.userData.flickerOffset * 1.7) * 0.5 + 0.5);
    h.userData.mat.uniforms.uTime.value = t;
    h.userData.mat.uniforms.uFlicker.value = f * 0.8;
    h.userData.smokeMat.uniforms.uTime.value = t;
    if (h.userData.winLight) {
      h.userData.winLight.intensity = 0.18 + f * 0.05;
    }
  }
  // Pines sway
  for (const p of pines) {
    p.userData.mat.uniforms.uTime.value = t;
    p.userData.mat.uniforms.uShake.value = sk;
  }
  // Weathervane spin
  if (church.userData.weathervane) {
    const spin = Math.sin(t * 0.4) + sk * 4;
    church.userData.weathervane.rotation.y = spin;
    church.userData.rooster.rotation.y = spin;
    church.userData.rooster.position.x = Math.cos(spin) * 0.07;
    church.userData.rooster.position.z = 0.5 + Math.sin(spin) * 0.07;
  }

  // Globe-rocking visual: tilt entire scene contents slightly when shaken
  const tilt = sk * 0.06;
  village.rotation.z = Math.sin(t * 14) * tilt;
  village.rotation.x = Math.sin(t * 11.3) * tilt * 0.7;

  // Stillness tracker for figurine
  if (sk > 0.04 || pointerDown) {
    state.stillSince = now;
    if (state.figureActive) {
      state.figureActive = false;
      state.figureT = 0;
      figurine.visible = false;
    }
  }
  const stillFor = now - state.stillSince;
  if (!state.figureActive && stillFor > 30 && state.started) {
    state.figureActive = true;
    state.figureT = 0;
    figurine.visible = true;
  }
  if (state.figureActive) {
    // Walk over ~25 seconds
    state.figureT += dt / 25;
    if (state.figureT >= 1) {
      state.figureActive = false;
      state.figureT = 0;
      figurine.visible = false;
      state.stillSince = now; // reset, won't reappear immediately
    } else {
      const pos = figurineCurve.getPointAt(state.figureT);
      const tangent = figurineCurve.getTangentAt(state.figureT);
      figurine.position.copy(pos);
      figurine.rotation.y = Math.atan2(tangent.x, tangent.z);
      // Walk cycle for boots
      const walkPhase = state.figureT * 60;
      figurine.userData.mat.uniforms.uWalk.value = walkPhase;
      figurine.userData.boot1.position.z = Math.sin(walkPhase) * 0.012;
      figurine.userData.boot2.position.z = -Math.sin(walkPhase) * 0.012;
    }
  }

  // Schedule music
  if (state.audioReady) {
    scheduleMelody();
    // Faint church bell every ~3 minutes (180s)
    if (now - state.bellLastT > 180 && state.started) {
      state.bellLastT = now;
      playChurchBell();
    }
  }

  // Wind modulation (audio-side)
  if (windNode) {
    windNode.gain.gain.value = 0.025 + sk * 0.18;
    windNode.filt.frequency.value = 380 + sk * 1400;
  }

  renderer.render(scene, camera);
}

// ----------------------------------------------------------
// STARTUP — audio gate
// ----------------------------------------------------------
function start() {
  if (state.started) return;
  state.started = true;
  initAudio();
  // resume in case it was created suspended
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  $('#gate').classList.add('hidden');
  $('#loader').classList.add('hidden');
  $('#hud-label').classList.add('show');
  setTimeout(() => $('#hint').classList.add('show'), 1800);
  // Auto-fade hint after 14s if user hasn't shaken
  setTimeout(() => {
    if (!state.hintFaded) {
      state.hintFaded = true;
      $('#hint').classList.add('fade');
    }
  }, 14000);
  state.stillSince = performance.now() / 1000;
  state.bellLastT = performance.now() / 1000 - 170; // first bell ~10s in
}

$('#gate').addEventListener('click', start);
$('#gate').addEventListener('pointerdown', start);

// Start render loop immediately so world is alive behind the gate
$('#loader').classList.add('hidden');
animate();

// ----------------------------------------------------------
// END
// ----------------------------------------------------------
</script>
</body>
</html>
