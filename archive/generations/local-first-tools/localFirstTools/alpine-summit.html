      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;

      function ensureHud(){

        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';

            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });

            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);

        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;

<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2030);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1500);
camera.position.set(0, 1.6, 2);
camera.lookAt(0, 1.5, -100);

// ── Sky shader ──
const skyShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      // Strong gradient: peach at horizon, deep blue at zenith
      vec3 horizon = vec3(1.0, 0.65, 0.45);
      vec3 mid = vec3(0.7, 0.5, 0.55);
      vec3 zenith = vec3(0.20, 0.30, 0.55);
      float t = vUv.y;
      vec3 col;
      if (t < 0.3) col = mix(horizon, mid, t / 0.3);
      else col = mix(mid, zenith, (t - 0.3) / 0.7);
      // First star or two visible at high zenith
      vec2 sp = vUv * vec2(60.0, 30.0);
      float r = h(floor(sp));
      if (r > 0.997 && t > 0.7) col += vec3(0.5) * 0.5;
      // Tiny sun near horizon
      float sunDist = distance(vUv, vec2(0.5, 0.10));
      if (sunDist < 0.04) col = vec3(1.0, 0.92, 0.75);
      // Sun halo
      col += vec3(1.0, 0.5, 0.25) * smoothstep(0.5, 0.0, sunDist) * 0.4;
      gl_FragColor = vec4(col, 1.0);
    }`,
  side: THREE.BackSide
};
const sky = new THREE.Mesh(new THREE.SphereGeometry(700, 32, 16), new THREE.ShaderMaterial(skyShader));
scene.add(sky);

// ── Sea of clouds (large plane below summit, scrolling fbm) ──
const cloudShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; varying vec3 vP;
    void main(){ vUv=uv; vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv; varying vec3 vP;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float s=0.,a=0.5; for(int i=0;i<5;i++){s+=a*n(p);p*=2.07;a*=0.5;} return s; }
    void main(){
      vec2 p = vUv * 8.0 + vec2(time * 0.003, time * 0.001);
      float cloud = fbm(p);
      // Distance fade
      float dist = length(vP.xz) * 0.005;
      cloud *= smoothstep(0.0, 0.5, 1.0 - dist);
      // Cloud shading: warm-lit underside near horizon (sun direction)
      vec3 base = vec3(1.0, 0.95, 0.95);
      vec3 shadow = vec3(0.6, 0.65, 0.78);
      vec3 col = mix(shadow, base, smoothstep(0.4, 0.7, cloud));
      // Sunlit edges (warm tint where puffy)
      col = mix(col, vec3(1.0, 0.85, 0.65), smoothstep(0.6, 0.85, cloud) * 0.5);
      // Distance fades to sky color
      float horizon = smoothstep(0.0, 1.0, dist);
      col = mix(col, vec3(0.9, 0.7, 0.55), horizon);
      gl_FragColor = vec4(col, 1.0);
    }`
};
const clouds = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.ShaderMaterial(cloudShader));
clouds.rotation.x = -Math.PI/2;
clouds.position.set(0, -2, 0);
scene.add(clouds);

// ── Distant peaks emerging from cloud layer ──
const peaksShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // 3 layers of peaks at different distances
      float p1 = step(vUv.y, 0.18 + n(vec2(vUv.x*8.0, 0.0)) * 0.10);
      float p2 = step(vUv.y, 0.13 + n(vec2(vUv.x*6.0, 5.0)) * 0.07);
      float p3 = step(vUv.y, 0.10 + n(vec2(vUv.x*4.0, 10.0)) * 0.04);
      // Snow-capped: top portion of peaks lit warm by sun
      vec3 col = vec3(0.9, 0.7, 0.55);  // base sky color
      if (p3 > 0.5) {
        // Furthest peaks (warmest tint, most sunlit)
        col = vec3(0.95, 0.85, 0.75);
        // Peak top is bright snow
        if (vUv.y > 0.08) col = mix(col, vec3(1.0, 0.8, 0.65), 0.5);
      } else if (p2 > 0.5) {
        col = vec3(0.45, 0.45, 0.55);  // mid distance shadowed
      } else if (p1 > 0.5) {
        col = vec3(0.20, 0.22, 0.30);  // close, mostly in shadow
      }
      gl_FragColor = vec4(col, p1 > 0.5 ? 1.0 : 0.0);
    }`,
  transparent: true
};
const peaks = new THREE.Mesh(new THREE.PlaneGeometry(800, 60), new THREE.ShaderMaterial(peaksShader));
peaks.position.set(0, 8, -300);
scene.add(peaks);

// ── Foreground rocks (the summit you're sitting on) ──
const rockMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec3 vP; varying vec3 vN;
    void main(){ vP=position; vN=normal; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`varying vec3 vP; varying vec3 vN;
    float n(vec3 p){ return fract(sin(dot(p,vec3(12.9898,78.233,45.123)))*43758.5453); }
    void main(){
      vec3 base = vec3(0.20, 0.17, 0.15);
      float roughness = n(vP * 4.0) * 0.4 + 0.6;
      vec3 col = base * roughness;
      // Snow patches on top-facing surfaces
      float snow = smoothstep(0.6, 0.9, vN.y) * smoothstep(0.6, 1.0, n(vP * 3.0));
      col = mix(col, vec3(0.95, 0.92, 0.88), snow);
      // Warm sun-lit side
      float sun = max(0.0, dot(vN, normalize(vec3(0.0, 0.3, 1.0))));
      col += vec3(1.0, 0.7, 0.5) * sun * 0.4;
      gl_FragColor = vec4(col, 1.0);
    }`
});
// Rocks: scatter a bunch of irregular boxes
for (let i = 0; i < 12; i++) {
  const w = 0.3 + Math.random() * 0.7;
  const h = 0.2 + Math.random() * 0.5;
  const d = 0.3 + Math.random() * 0.7;
  const rock = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), rockMat);
  rock.position.set(
    -3 + Math.random() * 6,
    0.5 + Math.random() * 0.3,
    -2 + Math.random() * 3
  );
  rock.rotation.set(Math.random()*0.3, Math.random()*Math.PI, Math.random()*0.3);
  scene.add(rock);
}
// Larger flat summit rock you "sit on"
const summit = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 1.8), rockMat);
summit.position.set(0, 1.0, 1);
scene.add(summit);

// Distant single bird (eagle)
const eagleGeo = new THREE.PlaneGeometry(0.8, 0.4);
const eagleMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.6});
const eagle = new THREE.Mesh(eagleGeo, eagleMat);
eagle.position.set(20, 5, -50);
scene.add(eagle);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x404060, 0.5));
const sun = new THREE.DirectionalLight(0xffd0a0, 0.9);
sun.position.set(0, 5, -50);
scene.add(sun);

// ── Audio ──
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.40;
  masterGain.connect(audioCtx.destination);

  // Very faint thin-air wind
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const wind = audioCtx.createBufferSource();
  wind.buffer = buf; wind.loop = true;
  const windLP = audioCtx.createBiquadFilter();
  windLP.type = 'lowpass'; windLP.frequency.value = 280; windLP.Q.value = 0.5;
  const windLFO = audioCtx.createOscillator();
  windLFO.frequency.value = 0.1;
  const lfoG = audioCtx.createGain(); lfoG.gain.value = 100;
  windLFO.connect(lfoG); lfoG.connect(windLP.frequency);
  const windG = audioCtx.createGain(); windG.gain.value = 0.10;
  wind.connect(windLP).connect(windG).connect(masterGain);
  wind.start(); windLFO.start();

  // Ambient pad: slow detuned saws on Cmaj9 (the cosmic awe sound)
  const pad = audioCtx.createGain(); pad.gain.value = 0.04;
  const reverbG = audioCtx.createGain(); reverbG.gain.value = 1.0;
  reverbG.connect(masterGain);
  const padNotes = [261.63, 329.63, 392.00, 523.25, 587.33];  // C E G C D (Cmaj9)
  padNotes.forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = freq * (1 + (Math.random()-0.5)*0.005);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600 + i*200;
    const g = audioCtx.createGain();
    g.gain.value = 0.012;
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.04 + i*0.02;
    const lfoAmt = audioCtx.createGain(); lfoAmt.gain.value = 0.005;
    lfo.connect(lfoAmt); lfoAmt.connect(g.gain);
    o.connect(lp).connect(g).connect(masterGain);
    o.start(); lfo.start();
  });

  // Distant eagle cry every 60-180s
  function scheduleEagle() {
    const next = 60 + Math.random() * 120;
    setTimeout(() => { if (audioCtx) { eagleCry(); scheduleEagle(); } }, next * 1000);
  }
  scheduleEagle();
  function eagleCry() {
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(2200, t0);
    o.frequency.exponentialRampToValueAtTime(1100, t0 + 0.4);
    const g = audioCtx.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.05, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 4;
    const p = audioCtx.createStereoPanner(); p.pan.value = (Math.random()-0.5) * 1.6;
    o.connect(bp).connect(g).connect(p).connect(masterGain);
    o.start(t0); o.stop(t0 + 0.7);
  }
}

// ── Animation ──
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  cloudShader.uniforms.time.value = time;
  skyShader.uniforms.time.value = time;
  peaksShader.uniforms.time.value = time;

  // Animate eagle
  eagle.position.x -= 1.5 * dt;
  eagle.position.y = 5 + Math.sin(time * 0.5) * 0.5;
  if (eagle.position.x < -30) eagle.position.x = 30;

  // Camera breath
  camera.position.x = Math.sin(time * 0.15) * 0.05;
  camera.position.y = 1.6 + Math.sin(time * 0.20) * 0.025;
  camera.lookAt(0, 1.5, -100);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 1s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 1100);
  startAudio();
});
</script>
</body>
</html>
