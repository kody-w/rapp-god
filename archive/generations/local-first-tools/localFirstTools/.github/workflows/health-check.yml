name: health-check

# Nightly health check of every featured app. Boots a static server, opens
# each app in a headless Chrome via puppeteer, captures pageerrors / console
# errors / 4xx responses, writes the report to data/reports/, and commits.
#
# Output:
#   - data/reports/health-check-latest.json (machine-readable, full results)
#   - data/reports/health-check-latest.md   (human-readable summary)
#
# Trigger: every day at 06:00 UTC, on push to main, or manual via UI.

on:
  schedule:
    - cron: '0 6 * * *'        # 06:00 UTC daily (~ 23:00 Pacific previous day)
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which apps to check'
        required: true
        default: 'featured'
        type: choice
        options:
          - featured
          - all
      concurrency:
        description: 'Parallel browser pages'
        required: false
        default: '4'

permissions:
  contents: write              # so we can commit the report back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install puppeteer
        run: |
          npm init -y >/dev/null
          npm install puppeteer --silent

      - name: Run health check
        run: |
          SCOPE="${{ github.event.inputs.scope || 'featured' }}"
          CONC="${{ github.event.inputs.concurrency || '4' }}"
          if [ "$SCOPE" = "all" ]; then
            node scripts/health_check.mjs --all --concurrency "$CONC" || true
          else
            node scripts/health_check.mjs --concurrency "$CONC" || true
          fi
        env:
          # The script's own exit code drives the workflow conclusion below.
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'

      - name: Show report summary
        if: always()
        run: |
          if [ -f data/reports/health-check-latest.md ]; then
            cat data/reports/health-check-latest.md
          fi

      - name: Commit report
        if: always()
        run: |
          if [ ! -f data/reports/health-check-latest.json ]; then
            echo "no report produced; skipping commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/reports/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): nightly health-check report $(date -u +%Y-%m-%d)" \
            -m "Auto-generated by .github/workflows/health-check.yml" \
            -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
