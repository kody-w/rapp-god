name: landgrab-index
# Self-updating catalog (#10): whenever tools change, regenerate the public
# machine-readable index / llms.txt / sitemap / MCP manifest / corpus and commit them back.
on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'landgrab/generate.mjs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: landgrab-index
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate landgrab artifacts
        run: node landgrab/generate.mjs
      - name: Commit if changed
        run: |
          git config user.name "landgrab-bot"
          git config user.email "landgrab-bot@users.noreply.github.com"
          git add landgrab/index.json landgrab/mcp/tools.json landgrab/corpus/corpus.jsonl \
                  landgrab/structured-data.jsonld llms.txt sitemap.xml robots.txt || true
          if git diff --cached --quiet; then
            echo "index up to date"
          else
            git commit -m "chore(landgrab): regenerate public index [skip ci]"
            git push
          fi
