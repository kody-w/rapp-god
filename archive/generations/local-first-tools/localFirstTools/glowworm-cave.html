<script type="module">
import * as THREE from 'three';

/* ============================================================================
   GLOWWORM CAVE
   A single-file cinematic scene: raymarched cave (SDF stalactites/walls/floor),
   3000 ceiling glowworms with breathing pulse, mirror-still pool reflecting
   them, a single drifting firefly, full 360° look, deep cave audio with long
   reverb tails, and a constellation-wish easter egg after 90s of stillness.
   ========================================================================== */

const $ = (sel) => document.querySelector(sel);
const stage = $('#stage');
const gate = $('#gate');
const titleEl = $('#title');
const subtitleEl = $('#subtitle');
const hintEl = $('#hint');
const compassEl = $('#compass');
const wishEl = $('#wish');

/* ---------------- Renderer / Scene / Camera ---------------- */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.setClearColor(0x000000, 1);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x040608, 0.022);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 220);

/* Sitting position (eye height ~ 0.9m above cave floor) */
const PRESETS = {
  pool:    new THREE.Vector3( 0.0, 0.9,  4.6),   // pool's edge — water in front
  cluster: new THREE.Vector3(-2.4, 1.0, -1.8),   // beneath densest glowworm cluster
  mouth:   new THREE.Vector3( 4.2, 0.95, 6.2)    // by the cave entrance
};
camera.position.copy(PRESETS.pool);

/* yaw/pitch we drive ourselves so we don't fight any controller */
let yaw   = Math.PI;       // looking back into the cave
let pitch = 0.05;          // a hair upward
const targetYaw = { v: yaw };
const targetPitch = { v: pitch };

function applyCameraOrientation() {
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const cy = Math.cos(yaw),   sy = Math.sin(yaw);
  const dir = new THREE.Vector3(sy * cp, sp, cy * cp);
  camera.lookAt(camera.position.clone().add(dir));
}
applyCameraOrientation();

/* ---------------- Background: raymarched cave shell ----------------
   Renders as a big inverted sphere with custom shader. The shader marches
   from the camera through the local volume to render stalactites (ceiling
   spikes), bumpy damp walls, and stalagmites on the floor. Writes to
   gl_FragDepth so points (glowworms, firefly) Z-test correctly against it.
*/
const caveUniforms = {
  uTime: { value: 0 },
  uCamPos: { value: new THREE.Vector3() },
  uInvProj: { value: new THREE.Matrix4() },
  uInvView: { value: new THREE.Matrix4() },
  uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  uNear: { value: camera.near },
  uFar: { value: camera.far },
  uExposureBoost: { value: 1.0 }
};

const caveVS = /* glsl */`
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position.xy, 0.9999, 1.0); // full-screen quad at far depth
  }
`;

const caveFS = /* glsl */`
  precision highp float;
  varying vec2 vUv;
  uniform float uTime;
  uniform vec3  uCamPos;
  uniform mat4  uInvProj;
  uniform mat4  uInvView;
  uniform vec2  uResolution;
  uniform float uNear;
  uniform float uFar;
  uniform float uExposureBoost;

  /* ---------------- noise / fbm ---------------- */
  float hash13(vec3 p){ p=fract(p*0.1031); p+=dot(p,p.yzx+33.33); return fract((p.x+p.y)*p.z); }
  float vnoise(vec3 p){
    vec3 i=floor(p), f=fract(p);
    f = f*f*(3.0-2.0*f);
    float n000=hash13(i+vec3(0,0,0));
    float n100=hash13(i+vec3(1,0,0));
    float n010=hash13(i+vec3(0,1,0));
    float n110=hash13(i+vec3(1,1,0));
    float n001=hash13(i+vec3(0,0,1));
    float n101=hash13(i+vec3(1,0,1));
    float n011=hash13(i+vec3(0,1,1));
    float n111=hash13(i+vec3(1,1,1));
    return mix(
      mix(mix(n000,n100,f.x), mix(n010,n110,f.x), f.y),
      mix(mix(n001,n101,f.x), mix(n011,n111,f.x), f.y),
      f.z);
  }
  float fbm(vec3 p){
    float a=0.5, s=0.0; mat3 m = mat3(0.8,0.6,0.0, -0.6,0.8,0.0, 0.0,0.0,1.0);
    for(int i=0;i<5;i++){ s += a*vnoise(p); p = m*p*2.02; a*=0.5; }
    return s;
  }

  /* ---------------- SDF cave ----------------
     The cave is a hollow chamber. We sample a "ceiling height" and "floor
     height" from fbm and combine to make an irregular tube. Stalactites
     hang from ceiling, stalagmites rise from floor. */
  float ceilingY(vec2 xz){
    float h = 3.4 + fbm(vec3(xz*0.18, 0.0))*1.6;
    /* a few sagging zones */
    h -= smoothstep(0.7,0.0,length(xz-vec2(-2.0,-1.5)))*0.6;
    h -= smoothstep(0.9,0.0,length(xz-vec2( 2.6,-3.2)))*0.4;
    return h;
  }
  float floorY(vec2 xz){
    float h = -1.6 - fbm(vec3(xz*0.22+11.0, 0.0))*0.5;
    /* the still pool is a perfectly flat depression around origin */
    float pool = smoothstep(2.4, 1.0, length(xz - vec2(0.0, 1.4)));
    h = mix(h, -1.4, pool);
    return h;
  }

  /* hanging stalactite cone field */
  float stalactites(vec3 p){
    /* scattered across ceiling using a hash grid */
    vec2 cell = floor(p.xz*0.55);
    float d = 1e9;
    for(int dx=-1; dx<=1; dx++){
      for(int dz=-1; dz<=1; dz++){
        vec2 c = cell + vec2(float(dx), float(dz));
        vec2 r = vec2(hash13(vec3(c, 7.0)), hash13(vec3(c, 13.0))) - 0.5;
        vec2 pos = (c + 0.5 + r*0.7) / 0.55;
        float len = 0.5 + hash13(vec3(c, 1.7))*1.4;
        float rad = 0.10 + hash13(vec3(c, 3.1))*0.18;
        float top = ceilingY(pos) - 0.05;
        /* cone hanging down: distance to a downward cone */
        vec3 q = p - vec3(pos.x, top, pos.y);
        float h = clamp(-q.y, 0.0, len);
        float cone = length(vec2(length(q.xz) - rad*(1.0 - h/len), q.y + h)) - 0.04;
        d = min(d, cone);
      }
    }
    return d;
  }

  /* stalagmites rising from floor */
  float stalagmites(vec3 p){
    vec2 cell = floor(p.xz*0.4 + 0.3);
    float d = 1e9;
    for(int dx=-1; dx<=1; dx++){
      for(int dz=-1; dz<=1; dz++){
        vec2 c = cell + vec2(float(dx), float(dz));
        float keep = step(0.45, hash13(vec3(c, 19.0))); /* not in every cell */
        vec2 r = vec2(hash13(vec3(c, 23.0)), hash13(vec3(c, 29.0))) - 0.5;
        vec2 pos = (c + 0.5 + r*0.8) / 0.4;
        /* avoid pool */
        float poolMask = smoothstep(2.2, 2.6, length(pos - vec2(0.0, 1.4)));
        float len = (0.25 + hash13(vec3(c, 5.5))*1.0) * keep * poolMask;
        if(len < 0.05) continue;
        float rad = 0.12 + hash13(vec3(c, 8.8))*0.10;
        float bot = floorY(pos) + 0.02;
        vec3 q = p - vec3(pos.x, bot, pos.y);
        float h = clamp(q.y, 0.0, len);
        float cone = length(vec2(length(q.xz) - rad*(1.0 - h/len), q.y - h)) - 0.05;
        d = min(d, cone);
      }
    }
    return d;
  }

  float sdCave(vec3 p){
    /* hollow shell: positive inside the cave, negative outside */
    float dCeil  = ceilingY(p.xz) - p.y;       /* > 0 below ceiling */
    float dFloor = p.y - floorY(p.xz);          /* > 0 above floor   */
    /* lateral walls — keep us in roughly a 16m-wide irregular tube */
    float wallNoise = fbm(vec3(p.xz*0.25, p.y*0.3))*0.9;
    float dWallX = 8.0 + wallNoise - abs(p.x);
    float dWallZ = 9.0 + wallNoise - abs(p.z - 0.5);
    float interior = min(min(dCeil, dFloor), min(dWallX, dWallZ));
    /* SDF for raymarch is *distance to nearest wall*; we're inside so
       distance = -interior gives positive when we hit. We want the
       exterior surface, so return -interior, then add stalactite/mite
       subtraction. */
    float d = -interior;
    /* union with stalactites/stalagmites (they add geometry) */
    d = min(d, stalactites(p));
    d = min(d, stalagmites(p));
    return d;
  }

  vec3 calcNormal(vec3 p){
    const vec2 e = vec2(0.005, 0.0);
    return normalize(vec3(
      sdCave(p+e.xyy) - sdCave(p-e.xyy),
      sdCave(p+e.yxy) - sdCave(p-e.yxy),
      sdCave(p+e.yyx) - sdCave(p-e.yyx)));
  }

  /* damp moss / mineral wall shading */
  vec3 shadeRock(vec3 p, vec3 n, vec3 rd){
    float damp = fbm(p*1.4);
    float drip = fbm(vec3(p.x*3.0, p.y*8.0 - uTime*0.05, p.z*3.0));
    float moss = smoothstep(0.45, 0.85, fbm(p*0.6 + 13.0)) * smoothstep(-0.2, 0.5, n.y);
    /* base limestone — cool damp grey-blue */
    vec3 stone = mix(vec3(0.06, 0.07, 0.085), vec3(0.10, 0.115, 0.13), damp);
    stone = mix(stone, vec3(0.04, 0.075, 0.06), moss*0.6);          /* moss tint */
    stone = mix(stone, vec3(0.02, 0.04, 0.06), smoothstep(0.0,1.0,drip)*0.25); /* dark damp streaks */
    /* rim from the glowworm-blue ceiling — ambient bounce */
    float upDot = clamp(n.y*0.5+0.5, 0.0, 1.0);
    vec3 ceilingTint = vec3(0.18, 0.34, 0.55);
    stone += ceilingTint * upDot * 0.045;
    /* very soft view rim */
    float fres = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);
    stone += vec3(0.05, 0.08, 0.12) * fres * 0.15;
    return stone;
  }

  /* reconstruct world-space ray from screen-space uv */
  void getRay(out vec3 ro, out vec3 rd){
    vec2 ndc = vUv*2.0 - 1.0;
    vec4 clip = vec4(ndc, -1.0, 1.0);
    vec4 view = uInvProj * clip;
    view /= view.w;
    vec4 world = uInvView * vec4(view.xyz, 1.0);
    ro = uCamPos;
    rd = normalize(world.xyz - ro);
  }

  void main(){
    vec3 ro, rd; getRay(ro, rd);
    float t = 0.05;
    float d = 0.0;
    bool  hit = false;
    for(int i=0;i<96;i++){
      vec3 p = ro + rd*t;
      d = sdCave(p);
      if(d < 0.003){ hit = true; break; }
      if(t > 60.0) break;
      t += d * 0.85;
    }

    vec3 col;
    float depth01;

    if(hit){
      vec3 p = ro + rd*t;
      vec3 n = calcNormal(p);
      col = shadeRock(p, n, rd);

      /* fake ambient occlusion in crevices */
      float ao = clamp(0.5 + 0.5*sdCave(p + n*0.18)/0.18, 0.0, 1.0);
      col *= mix(0.55, 1.0, ao);

      /* faint light from below from the pool reflecting glowworm blue */
      float poolGlow = smoothstep(2.4, 0.4, length(p.xz - vec2(0.0, 1.4))) * smoothstep(-1.5, -0.6, p.y);
      col += vec3(0.05, 0.10, 0.14) * poolGlow * 0.8;

      /* distance fog */
      float fogA = 1.0 - exp(-t*0.045);
      col = mix(col, vec3(0.012, 0.018, 0.026), fogA);

      /* compute clip depth so points z-test against this surface */
      vec4 clip = (projectionMatrix * viewMatrix) * vec4(p, 1.0);
      depth01 = (clip.z / clip.w) * 0.5 + 0.5;
    } else {
      col = vec3(0.005, 0.008, 0.012);
      depth01 = 0.99999;
    }

    col *= uExposureBoost;
    gl_FragColor = vec4(col, 1.0);
    gl_FragDepth = depth01;
  }
`;

/* fullscreen quad for the cave */
const caveMat = new THREE.ShaderMaterial({
  uniforms: caveUniforms,
  vertexShader: caveVS,
  fragmentShader: caveFS,
  depthTest: false,
  depthWrite: true,
  side: THREE.DoubleSide,
  glslVersion: THREE.GLSL3
});
/* Note: we provide projection/view matrices automatically because we use
   a Mesh — but for a fullscreen quad we still want them as built-ins. */

/* WebGL2 GLSL3: gl_FragColor → out, gl_FragDepth ok. Rewrite shader for GLSL3. */
const caveFS_glsl3 = `
out vec4 fragColor;
` + caveFS
  .replace(/varying /g, 'in ')
  .replace(/gl_FragColor/g, 'fragColor');

caveMat.fragmentShader = caveFS_glsl3;
caveMat.vertexShader = caveVS.replace(/varying /g, 'out ');

const caveQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), caveMat);
caveQuad.frustumCulled = false;
caveQuad.renderOrder = -10;
scene.add(caveQuad);

/* ============================================================================
   GLOWWORMS
   ~3000 points on the ceiling. Density varies with fbm noise + cluster bias.
   Each has its own pulse phase so they breathe at different rhythms. Some are
   hand-placed in constellation patterns and tagged so we can address them
   individually for the wish easter egg.
   ========================================================================== */

const GLOWWORM_COUNT = 3000;
const glowPositions = new Float32Array(GLOWWORM_COUNT * 3);
const glowHomes     = new Float32Array(GLOWWORM_COUNT * 3); /* original positions */
const glowPhases    = new Float32Array(GLOWWORM_COUNT);
const glowSizes     = new Float32Array(GLOWWORM_COUNT);
const glowColors    = new Float32Array(GLOWWORM_COUNT * 3);
const glowKinds     = new Float32Array(GLOWWORM_COUNT);     /* 0=normal, 1=constellation, 2=wish */
const glowWishMask  = new Uint8Array(GLOWWORM_COUNT);

/* helper: 2D simplex-ish */
function noise2(x, z){
  /* cheap value noise just for density distribution */
  const xi = Math.floor(x), zi = Math.floor(z);
  const xf = x - xi, zf = z - zi;
  const h = (a,b) => {
    const s = Math.sin(a*127.1 + b*311.7) * 43758.5453;
    return s - Math.floor(s);
  };
  const a = h(xi, zi), b = h(xi+1, zi), c = h(xi, zi+1), d = h(xi+1, zi+1);
  const u = xf*xf*(3-2*xf), v = zf*zf*(3-2*zf);
  return a*(1-u)*(1-v) + b*u*(1-v) + c*(1-u)*v + d*u*v;
}

/* ceiling height matching the SDF approximation in JS */
function ceilingHeightAt(x, z){
  const fb = (
    noise2(x*0.18, z*0.18)*0.5 +
    noise2(x*0.36+5, z*0.36+5)*0.25 +
    noise2(x*0.72+9, z*0.72+9)*0.125
  );
  let h = 3.4 + fb*1.6;
  const d1 = Math.hypot(x+2, z+1.5); h -= Math.max(0, 1 - d1/0.7) * 0.6;
  const d2 = Math.hypot(x-2.6, z+3.2); h -= Math.max(0, 1 - d2/0.9) * 0.4;
  return h;
}

/* density map: clusters where fbm is high */
function densityAt(x, z){
  let n = 0;
  n += noise2(x*0.22+1.1, z*0.22+2.3)*0.6;
  n += noise2(x*0.6+9.0,  z*0.6+4.2)*0.3;
  /* dense pocket near (-2, -1) — "the densest cluster" */
  n += Math.exp(-((x+2.4)*(x+2.4) + (z+1.8)*(z+1.8))/8.0) * 0.7;
  /* secondary zone over the pool */
  n += Math.exp(-((x-0.0)*(x-0.0) + (z-1.4)*(z-1.4))/14.0) * 0.4;
  return Math.max(0, Math.min(1, n));
}

/* hand-placed constellation positions (in cave-space, ceiling-attached)
   coordinates are (x, z) — y will be set to ceiling height - small offset */
const CONSTELLATIONS = {
  bigDipper: [
    [-5.4, -4.2], [-4.6, -3.8], [-3.7, -3.6], [-2.9, -3.5],
    [-2.4, -2.7], [-3.0, -1.9], [-3.7, -2.1]
  ],
  cassiopeia: [
    [3.2, -5.0], [4.0, -4.4], [4.6, -5.0], [5.4, -4.4], [6.0, -5.1]
  ],
  orionsBelt: [
    [-1.0, 4.5], [0.0, 4.6], [1.0, 4.7]
  ],
  southernCross: [
    [5.6, 3.0], [6.2, 2.0], [5.9, 1.4], [4.8, 2.2]
  ],
  /* one custom: a spiral of seven, the "Cave-Heart" */
  caveHeart: (() => {
    const arr = [];
    for(let i=0;i<7;i++){
      const t = i/6;
      const r = 0.6 + t*1.2;
      const a = t * Math.PI * 1.6 + 0.4;
      arr.push([Math.cos(a)*r - 1.0, Math.sin(a)*r + 0.2]);
    }
    return arr;
  })()
};

/* Place constellation glowworms first so they get specific indices */
const constellationIndices = []; /* [{name, indices:[i,...]}]
                                    we can rotate them later */
let g = 0;
for(const [name, points] of Object.entries(CONSTELLATIONS)){
  const indices = [];
  for(const [x, z] of points){
    if(g >= GLOWWORM_COUNT) break;
    const y = ceilingHeightAt(x, z) - 0.05;
    glowPositions[g*3+0] = glowHomes[g*3+0] = x;
    glowPositions[g*3+1] = glowHomes[g*3+1] = y;
    glowPositions[g*3+2] = glowHomes[g*3+2] = z;
    glowPhases[g] = Math.random() * Math.PI * 2;
    glowSizes[g]  = 1.6 + Math.random()*0.8;     /* constellations a touch brighter */
    /* warm-cool palette: most pale cyan, some warm */
    const warm = Math.random() < 0.18;
    if(warm){
      glowColors[g*3+0] = 1.00; glowColors[g*3+1] = 0.86; glowColors[g*3+2] = 0.62;
    } else {
      glowColors[g*3+0] = 0.55; glowColors[g*3+1] = 0.85; glowColors[g*3+2] = 1.05;
    }
    glowKinds[g] = 1;
    indices.push(g);
    g++;
  }
  constellationIndices.push({ name, indices });
}

/* Fill the rest with density-weighted ceiling positions */
while(g < GLOWWORM_COUNT){
  /* rejection sample on density */
  const x = (Math.random()*2-1) * 7.6;
  const z = (Math.random()*2-1) * 8.4 + 0.5;
  const d = densityAt(x, z);
  if(Math.random() > d) continue;
  const y = ceilingHeightAt(x, z) - (0.04 + Math.random()*0.18);
  glowPositions[g*3+0] = glowHomes[g*3+0] = x;
  glowPositions[g*3+1] = glowHomes[g*3+1] = y;
  glowPositions[g*3+2] = glowHomes[g*3+2] = z;
  glowPhases[g] = Math.random() * Math.PI * 2;
  glowSizes[g]  = 0.8 + Math.random()*1.4;
  const warm = Math.random() < 0.10;
  if(warm){
    /* very rare warm "older" worms */
    glowColors[g*3+0] = 1.00; glowColors[g*3+1] = 0.78 + Math.random()*0.1; glowColors[g*3+2] = 0.55 + Math.random()*0.1;
  } else {
    /* cool blue-cyan with slight variance */
    const t = Math.random();
    glowColors[g*3+0] = 0.45 + t*0.25;
    glowColors[g*3+1] = 0.80 + Math.random()*0.18;
    glowColors[g*3+2] = 1.00 + Math.random()*0.05;
  }
  glowKinds[g] = 0;
  g++;
}

const glowGeo = new THREE.BufferGeometry();
glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPositions, 3));
glowGeo.setAttribute('aPhase',   new THREE.BufferAttribute(glowPhases, 1));
glowGeo.setAttribute('aSize',    new THREE.BufferAttribute(glowSizes, 1));
glowGeo.setAttribute('aColor',   new THREE.BufferAttribute(glowColors, 3));
glowGeo.setAttribute('aKind',    new THREE.BufferAttribute(glowKinds, 1));

const glowVS = /* glsl */`
  attribute float aPhase;
  attribute float aSize;
  attribute vec3  aColor;
  attribute float aKind;
  varying vec3 vColor;
  varying float vPulse;
  varying float vKind;
  uniform float uTime;
  uniform float uPxScale;
  uniform float uBreath;        /* global slow breath multiplier */
  void main(){
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    gl_Position = projectionMatrix * mv;
    /* per-worm sine pulse + global breath cycle */
    float p = sin(uTime*1.6 + aPhase) * 0.5 + 0.5;
    p = pow(p, 1.6);
    /* secondary slow flicker */
    float flick = sin(uTime*0.4 + aPhase*2.7)*0.5 + 0.5;
    vPulse = mix(0.35, 1.0, p) * mix(0.85, 1.05, flick) * uBreath;
    vColor = aColor;
    vKind  = aKind;
    float dist = -mv.z;
    gl_PointSize = aSize * uPxScale / max(dist, 0.5);
    gl_PointSize = clamp(gl_PointSize, 1.0, 32.0);
  }
`;

const glowFS = /* glsl */`
  precision highp float;
  varying vec3 vColor;
  varying float vPulse;
  varying float vKind;
  void main(){
    vec2 uv = gl_PointCoord*2.0 - 1.0;
    float r2 = dot(uv,uv);
    if(r2 > 1.0) discard;
    /* tight bright core + soft halo */
    float core = exp(-r2*14.0);
    float halo = exp(-r2*2.4) * 0.45;
    float a = (core + halo) * vPulse;
    vec3 c = vColor * (1.2 + vPulse*0.5);
    /* very subtle cyan rim for constellations to make them feel "tagged" */
    if(vKind > 0.5) c += vec3(0.05, 0.10, 0.15) * halo;
    gl_FragColor = vec4(c, a);
  }
`;

const glowMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:    { value: 0 },
    uPxScale: { value: window.innerHeight * 0.6 },
    uBreath:  { value: 1.0 }
  },
  vertexShader: glowVS,
  fragmentShader: glowFS,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const glowworms = new THREE.Points(glowGeo, glowMat);
glowworms.frustumCulled = false;
scene.add(glowworms);

/* A second, dimmer "reflection" copy below the water plane that mirrors the
   ceiling. Cheap trick: clone geometry, flip Y around water level, render
   with subtle attenuation in the shader. We bake this into the water shader
   instead — see below. */

/* ============================================================================
   STILL POOL  (mirror of the ceiling)
   A horizontal plane at y = -1.4. The shader samples a virtual reflected
   ray and renders a starfield that mirrors the glowworms. Because doing a
   real reflection of 3000 points is expensive, we approximate using a
   procedurally generated point texture pre-rendered each frame from a
   small shader, but here we sample positions from a UV tile of the actual
   ceiling glowworm density function — looks correct for stillness.
   ========================================================================== */

const POOL_LEVEL = -1.4;

/* We render the reflection by drawing the glowworms a SECOND time below the
   water plane, flipped, with attenuated alpha. That way reflections stay
   physically tied to the actual constellations (so the wish reflects too).
*/
/* Share the same geometry — so reflections track wish formation live */
const reflectGeo = glowGeo;
const reflectMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: glowMat.uniforms.uTime,
    uPxScale: glowMat.uniforms.uPxScale,
    uBreath:  glowMat.uniforms.uBreath,
    uPoolY:   { value: POOL_LEVEL }
  },
  vertexShader: /* glsl */`
    attribute float aPhase;
    attribute float aSize;
    attribute vec3  aColor;
    attribute float aKind;
    varying vec3 vColor;
    varying float vPulse;
    varying float vMaskY;
    uniform float uTime;
    uniform float uPxScale;
    uniform float uBreath;
    uniform float uPoolY;
    void main(){
      vec3 reflectedPos = position;
      reflectedPos.y = uPoolY - (position.y - uPoolY);   /* mirror in pool plane */
      vec4 mv = modelViewMatrix * vec4(reflectedPos, 1.0);
      gl_Position = projectionMatrix * mv;
      float p = sin(uTime*1.6 + aPhase) * 0.5 + 0.5;
      p = pow(p, 1.6);
      vPulse = mix(0.35, 1.0, p) * uBreath;
      vColor = aColor;
      /* fade with depth into water */
      vMaskY = smoothstep(uPoolY-0.2, uPoolY-2.4, reflectedPos.y);
      float dist = -mv.z;
      gl_PointSize = aSize * uPxScale / max(dist, 0.5) * 0.85;
      gl_PointSize = clamp(gl_PointSize, 1.0, 24.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vColor;
    varying float vPulse;
    varying float vMaskY;
    void main(){
      vec2 uv = gl_PointCoord*2.0 - 1.0;
      /* slight horizontal stretch to suggest faint ripple smear */
      uv.x *= 1.0;
      uv.y *= 1.18;
      float r2 = dot(uv,uv);
      if(r2 > 1.0) discard;
      float core = exp(-r2*16.0);
      float halo = exp(-r2*3.0) * 0.30;
      float a = (core + halo) * vPulse * (1.0 - vMaskY) * 0.55;
      vec3 c = vColor * (1.0 + vPulse*0.4) * 0.85;
      gl_FragColor = vec4(c, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const reflections = new THREE.Points(reflectGeo, reflectMat);
reflections.frustumCulled = false;
scene.add(reflections);

/* The actual water surface — a translucent plane with a slow ripple normal
   tinting the light from below and a hint of fresnel rim. */
const waterUniforms = {
  uTime: { value: 0 },
  uCamPos: { value: new THREE.Vector3() }
};
const water = new THREE.Mesh(
  new THREE.CircleGeometry(2.6, 80),
  new THREE.ShaderMaterial({
    uniforms: waterUniforms,
    vertexShader: /* glsl */`
      varying vec2 vUv;
      varying vec3 vWorld;
      void main(){
        vUv = uv;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      varying vec3 vWorld;
      uniform float uTime;
      uniform vec3 uCamPos;
      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7)))*43758.5453); }
      float vn(vec2 p){
        vec2 i=floor(p), f=fract(p);
        f=f*f*(3.0-2.0*f);
        float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
        return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
      }
      void main(){
        vec2 p = vWorld.xz;
        /* very faint ripple — concentric, slow */
        float r = length(p - vec2(0.0, 1.4));
        float ripple = sin(r*5.5 - uTime*0.4) * 0.5 + 0.5;
        ripple *= smoothstep(2.6, 0.0, r);
        ripple *= 0.04;

        /* edge darken */
        float edge = smoothstep(2.6, 1.6, r);
        /* fresnel */
        vec3 v = normalize(uCamPos - vWorld);
        float fres = pow(1.0 - clamp(v.y, 0.0, 1.0), 4.0);

        /* base water — almost black, faint blue */
        vec3 base = vec3(0.005, 0.012, 0.022);
        base += vec3(0.04, 0.10, 0.16) * fres * 0.4;
        base += ripple * vec3(0.10, 0.22, 0.32);

        float alpha = 0.92 * edge + 0.08;
        gl_FragColor = vec4(base, alpha);
      }
    `,
    transparent: true,
    depthWrite: false
  })
);
water.rotation.x = -Math.PI/2;
water.position.set(0, POOL_LEVEL + 0.001, 1.4);
water.renderOrder = 5;
scene.add(water);

/* ============================================================================
   FIREFLY
   A single warm dot drifting through the cave. Generates a smooth bezier-ish
   path with random anchor points and occasionally pauses on a stalactite tip.
   ========================================================================== */

const fireflyUniforms = {
  uTime: { value: 0 }
};

const fireflyGeo = new THREE.BufferGeometry();
const fireflyPos = new Float32Array([0, 2.0, 0]);
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fireflyPos, 3));
const fireflyMat = new THREE.ShaderMaterial({
  uniforms: { uTime: fireflyUniforms.uTime, uPxScale: { value: window.innerHeight * 0.9 } },
  vertexShader: /* glsl */`
    uniform float uPxScale;
    void main(){
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
      float dist = -mv.z;
      gl_PointSize = clamp(uPxScale / max(dist, 0.5) * 0.45, 4.0, 60.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    uniform float uTime;
    void main(){
      vec2 uv = gl_PointCoord*2.0 - 1.0;
      float r2 = dot(uv,uv);
      if(r2 > 1.0) discard;
      float core = exp(-r2*22.0);
      float halo = exp(-r2*2.5) * 0.55;
      /* warm yellow-green */
      vec3 c = vec3(1.05, 1.15, 0.55) * (core*1.4 + halo*0.6);
      float pulse = 0.85 + sin(uTime*7.0)*0.15;
      gl_FragColor = vec4(c*pulse, (core + halo*0.5));
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const firefly = new THREE.Points(fireflyGeo, fireflyMat);
firefly.frustumCulled = false;
scene.add(firefly);

/* Trail: ribbon of N segments updated each frame */
const TRAIL_LEN = 60;
const trailPositions = new Float32Array(TRAIL_LEN * 3);
const trailAlpha = new Float32Array(TRAIL_LEN);
for(let i=0;i<TRAIL_LEN;i++){
  trailPositions[i*3+0] = 0;
  trailPositions[i*3+1] = 2.0;
  trailPositions[i*3+2] = 0;
  trailAlpha[i] = i / TRAIL_LEN;
}
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeo.setAttribute('aAlpha', new THREE.BufferAttribute(trailAlpha, 1));
const trailMat = new THREE.ShaderMaterial({
  uniforms: { uPxScale: { value: window.innerHeight * 0.9 } },
  vertexShader: /* glsl */`
    attribute float aAlpha;
    varying float vA;
    uniform float uPxScale;
    void main(){
      vA = aAlpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
      float dist = -mv.z;
      gl_PointSize = clamp(uPxScale / max(dist, 0.5) * 0.18 * (0.4 + aAlpha*0.6), 1.0, 18.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying float vA;
    void main(){
      vec2 uv = gl_PointCoord*2.0 - 1.0;
      float r2 = dot(uv,uv);
      if(r2 > 1.0) discard;
      float core = exp(-r2*8.0);
      vec3 c = vec3(1.0, 1.1, 0.5);
      gl_FragColor = vec4(c*core*vA*0.6, core*vA*0.5);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const trail = new THREE.Points(trailGeo, trailMat);
trail.frustumCulled = false;
scene.add(trail);

/* Firefly path planner */
const fireflyState = {
  pos: new THREE.Vector3(0, 2.0, 0),
  vel: new THREE.Vector3(),
  target: new THREE.Vector3(0, 2.0, 0),
  nextRetargetAt: 0,
  pausedUntil: 0,
  perchedOn: null
};
function pickFireflyTarget(now){
  /* sometimes pick a stalactite tip; otherwise a roaming point */
  if(Math.random() < 0.35){
    const x = (Math.random()*2-1)*5.5;
    const z = (Math.random()*2-1)*6.0;
    const tipY = ceilingHeightAt(x, z) - 0.6 - Math.random()*0.6;
    fireflyState.target.set(x, tipY, z);
    fireflyState.pausedUntil = now + 4 + Math.random()*5;
    fireflyState.perchedOn = 'stalactite';
  } else {
    const x = (Math.random()*2-1)*6;
    const y = -0.4 + Math.random()*2.6;
    const z = (Math.random()*2-1)*6.5;
    fireflyState.target.set(x, y, z);
    fireflyState.pausedUntil = 0;
    fireflyState.perchedOn = null;
  }
  fireflyState.nextRetargetAt = now + 6 + Math.random()*7;
}
pickFireflyTarget(0);

/* ============================================================================
   "BREATH" SPRITES
   Briefly visible breath puff in front of the camera at slow intervals.
   ========================================================================== */
const BREATH_PARTICLES = 80;
const breathPos = new Float32Array(BREATH_PARTICLES*3);
const breathLife = new Float32Array(BREATH_PARTICLES);
const breathSeed = new Float32Array(BREATH_PARTICLES);
for(let i=0;i<BREATH_PARTICLES;i++){
  breathPos[i*3+0] = 0; breathPos[i*3+1] = -10; breathPos[i*3+2] = 0;
  breathLife[i] = 0;
  breathSeed[i] = Math.random();
}
const breathGeo = new THREE.BufferGeometry();
breathGeo.setAttribute('position', new THREE.BufferAttribute(breathPos, 3));
breathGeo.setAttribute('aLife', new THREE.BufferAttribute(breathLife, 1));
breathGeo.setAttribute('aSeed', new THREE.BufferAttribute(breathSeed, 1));
const breathMat = new THREE.ShaderMaterial({
  uniforms: { uPxScale: { value: window.innerHeight*0.9 } },
  vertexShader: /* glsl */`
    attribute float aLife;
    attribute float aSeed;
    varying float vLife;
    uniform float uPxScale;
    void main(){
      vLife = aLife;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
      float dist = -mv.z;
      gl_PointSize = clamp(uPxScale / max(dist, 0.5) * (0.10 + aLife*0.20), 4.0, 80.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying float vLife;
    void main(){
      vec2 uv = gl_PointCoord*2.0 - 1.0;
      float r2 = dot(uv,uv);
      if(r2>1.0) discard;
      float a = exp(-r2*3.0) * vLife * 0.10;
      gl_FragColor = vec4(0.85,0.92,1.0, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const breath = new THREE.Points(breathGeo, breathMat);
breath.frustumCulled = false;
scene.add(breath);

let nextBreathAt = 0;
function emitBreath(now){
  /* spawn 40 particles in front of camera */
  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion).normalize();
  const up = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion).normalize();
  const origin = camera.position.clone().add(fwd.clone().multiplyScalar(0.15)).add(up.clone().multiplyScalar(-0.15));
  for(let k=0;k<40;k++){
    /* find a dead particle */
    for(let i=0;i<BREATH_PARTICLES;i++){
      if(breathLife[i] <= 0.001){
        const r = Math.random()*0.06;
        const ang = Math.random()*Math.PI*2;
        const off = right.clone().multiplyScalar(Math.cos(ang)*r).add(up.clone().multiplyScalar(Math.sin(ang)*r));
        breathPos[i*3+0] = origin.x + off.x;
        breathPos[i*3+1] = origin.y + off.y;
        breathPos[i*3+2] = origin.z + off.z;
        breathLife[i] = 1.0;
        breathSeed[i] = Math.random();
        break;
      }
    }
  }
  breathGeo.attributes.position.needsUpdate = true;
  breathGeo.attributes.aLife.needsUpdate = true;
  nextBreathAt = now + 7 + Math.random()*7;
}
function updateBreath(dt){
  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  for(let i=0;i<BREATH_PARTICLES;i++){
    if(breathLife[i] > 0){
      breathLife[i] -= dt * 0.55;
      if(breathLife[i] < 0) breathLife[i] = 0;
      const drift = (1.0 - breathLife[i]) * 0.45;
      breathPos[i*3+0] += fwd.x * dt * drift + (Math.random()-0.5)*0.003;
      breathPos[i*3+1] += dt * 0.05 + (Math.random()-0.5)*0.002;
      breathPos[i*3+2] += fwd.z * dt * drift + (Math.random()-0.5)*0.003;
    }
  }
  breathGeo.attributes.position.needsUpdate = true;
  breathGeo.attributes.aLife.needsUpdate = true;
}

/* ============================================================================
   AUDIO  (gated until first user gesture)
   ========================================================================== */
let audio = null;
function initAudio(){
  if(audio) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if(!Ctx) return;
  const ctx = new Ctx();

  /* Master + a long convolution reverb (cathedral-y) */
  const master = ctx.createGain(); master.gain.value = 0.85;
  master.connect(ctx.destination);

  /* Generated impulse response for cave reverb */
  function makeIR(seconds, decay){
    const len = ctx.sampleRate * seconds;
    const ir = ctx.createBuffer(2, len, ctx.sampleRate);
    for(let ch=0; ch<2; ch++){
      const data = ir.getChannelData(ch);
      for(let i=0;i<len;i++){
        const t = i/len;
        /* sparse early reflections + dense tail */
        const er = (Math.random()*2-1) * (i < ctx.sampleRate*0.04 ? 0.6 : 0.0);
        const tail = (Math.random()*2-1) * Math.pow(1 - t, decay);
        /* dampen highs over time */
        const damp = Math.pow(1 - t, 1.5);
        data[i] = (er*0.4 + tail) * damp;
      }
    }
    return ir;
  }
  const reverb = ctx.createConvolver(); reverb.buffer = makeIR(4.6, 2.4);
  const reverbGain = ctx.createGain(); reverbGain.gain.value = 0.78;
  reverb.connect(reverbGain).connect(master);

  const dry = ctx.createGain(); dry.gain.value = 0.22; dry.connect(master);

  /* Bus utility: feed both dry and wet */
  function bus(gainVal=1.0){
    const g = ctx.createGain(); g.gain.value = gainVal;
    g.connect(dry);
    g.connect(reverb);
    return g;
  }

  /* ---------- Continuous deep cave resonance ----------
     Low-passed pink-ish noise + a slow detuned sub-rumble around 45Hz. */
  const noiseBuf = ctx.createBuffer(1, ctx.sampleRate*4, ctx.sampleRate);
  {
    const d = noiseBuf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<d.length;i++){
      const w = Math.random()*2-1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      d[i] = b0+b1+b2+b3+b4+b5+b6+w*0.5362; b6 = w*0.115926;
      d[i] *= 0.11;
    }
  }
  const ambSrc = ctx.createBufferSource(); ambSrc.buffer = noiseBuf; ambSrc.loop = true;
  const ambLP = ctx.createBiquadFilter(); ambLP.type = 'lowpass'; ambLP.frequency.value = 220; ambLP.Q.value = 0.6;
  const ambHP = ctx.createBiquadFilter(); ambHP.type = 'highpass'; ambHP.frequency.value = 25;
  const ambGain = ctx.createGain(); ambGain.gain.value = 0.10;
  ambSrc.connect(ambHP).connect(ambLP).connect(ambGain);
  ambGain.connect(bus(1.0));
  ambSrc.start();

  /* slow LFO modulating amb filter cutoff for "breathing" cave */
  const ambLfo = ctx.createOscillator(); ambLfo.frequency.value = 0.06;
  const ambLfoGain = ctx.createGain(); ambLfoGain.gain.value = 80;
  ambLfo.connect(ambLfoGain).connect(ambLP.frequency);
  ambLfo.start();

  /* sub rumble — two detuned sines around 45Hz */
  const sub1 = ctx.createOscillator(); sub1.type='sine'; sub1.frequency.value = 44;
  const sub2 = ctx.createOscillator(); sub2.type='sine'; sub2.frequency.value = 46.5;
  const subG = ctx.createGain(); subG.gain.value = 0.040;
  sub1.connect(subG); sub2.connect(subG);
  /* slow amplitude breathing for the "alive" feel — synced to 4s glowworm cycle */
  const subLfo = ctx.createOscillator(); subLfo.frequency.value = 0.25; /* 4s period */
  const subLfoGain = ctx.createGain(); subLfoGain.gain.value = 0.020;
  subLfo.connect(subLfoGain).connect(subG.gain);
  subLfo.start();
  subG.connect(bus(1.0));
  sub1.start(); sub2.start();

  /* ---------- Cave breeze ---------- */
  const breezeBuf = ctx.createBuffer(1, ctx.sampleRate*3, ctx.sampleRate);
  {
    const d = breezeBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * 0.18;
  }
  const breezeSrc = ctx.createBufferSource(); breezeSrc.buffer = breezeBuf; breezeSrc.loop = true;
  const breezeBP = ctx.createBiquadFilter(); breezeBP.type='bandpass'; breezeBP.frequency.value=600; breezeBP.Q.value=1.4;
  const breezeG = ctx.createGain(); breezeG.gain.value = 0.018;
  breezeSrc.connect(breezeBP).connect(breezeG).connect(bus(0.6));
  /* mod cutoff slowly */
  const brLfo = ctx.createOscillator(); brLfo.frequency.value = 0.07;
  const brLfoG = ctx.createGain(); brLfoG.gain.value = 240;
  brLfo.connect(brLfoG).connect(breezeBP.frequency);
  brLfo.start(); breezeSrc.start();

  /* ---------- Drips ---------- */
  function dripEnvelope(freq, vol, when){
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq*2.4, when);
    o.frequency.exponentialRampToValueAtTime(freq, when+0.04);
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, when+0.32);
    /* a subtle high "click" at the impact */
    const click = ctx.createOscillator();
    const cg = ctx.createGain();
    click.type='triangle';
    click.frequency.setValueAtTime(2200 + Math.random()*600, when);
    click.frequency.exponentialRampToValueAtTime(800, when+0.05);
    cg.gain.setValueAtTime(0, when);
    cg.gain.linearRampToValueAtTime(vol*0.20, when+0.003);
    cg.gain.exponentialRampToValueAtTime(0.0001, when+0.07);
    o.connect(g); click.connect(cg);
    g.connect(bus(1.0));
    cg.connect(bus(1.0));
    o.start(when); o.stop(when+0.5);
    click.start(when); click.stop(when+0.1);
  }
  function scheduleDrip(){
    const delay = 2 + Math.random()*5;
    setTimeout(() => {
      const now = ctx.currentTime;
      const f = 380 + Math.random()*260;
      dripEnvelope(f, 0.45, now);
      scheduleDrip();
    }, delay*1000);
  }
  scheduleDrip();

  /* ---------- Rare dramatic stalactite drop ---------- */
  function scheduleStalactiteDrop(){
    const delay = 35 + Math.random()*65;
    setTimeout(() => {
      const now = ctx.currentTime;
      /* deep plonk: low sine sweep + filtered noise burst */
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(140, now);
      o.frequency.exponentialRampToValueAtTime(48, now+0.6);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.55, now+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now+0.9);
      const ns = ctx.createBufferSource(); ns.buffer = noiseBuf;
      const nf = ctx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=350;
      const ng = ctx.createGain(); ng.gain.setValueAtTime(0, now);
      ng.gain.linearRampToValueAtTime(0.3, now+0.005);
      ng.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
      o.connect(g); ns.connect(nf).connect(ng);
      g.connect(bus(1.2)); ng.connect(bus(0.9));
      o.start(now); o.stop(now+1.2); ns.start(now); ns.stop(now+0.5);
      scheduleStalactiteDrop();
    }, delay*1000);
  }
  scheduleStalactiteDrop();

  audio = { ctx, master, reverbGain };

  /* fade in master */
  master.gain.setValueAtTime(0.0001, ctx.currentTime);
  master.gain.exponentialRampToValueAtTime(0.85, ctx.currentTime + 5.0);
}

/* ============================================================================
   INPUT — mouse drag look (full 360°), WASD walk, SPACE look up, idle timer
   ========================================================================== */

let dragging = false;
let lastX = 0, lastY = 0;
let lastInteractionAt = performance.now();

function onPointerDown(e){
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  registerInteraction();
}
function onPointerMove(e){
  if(!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  targetYaw.v   -= dx * 0.0035;       /* full 360° — no clamp on yaw */
  targetPitch.v -= dy * 0.0035;
  /* clamp pitch but allow looking nearly straight up & down */
  const lim = Math.PI*0.49;
  targetPitch.v = Math.max(-lim, Math.min(lim, targetPitch.v));
  registerInteraction();
}
function onPointerUp(){ dragging = false; }
window.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerUp);

/* Walk to presets */
let walkTarget = camera.position.clone();
let walking = false;
function walkTo(name, label){
  walkTarget = PRESETS[name].clone();
  walking = true;
  compassEl.textContent = `Chamber A · ${label}`;
  compassEl.style.opacity = '1';
  clearTimeout(compassEl._t);
  compassEl._t = setTimeout(() => compassEl.style.opacity = '0.0', 4000);
  registerInteraction();
}

window.addEventListener('keydown', e => {
  if(e.repeat) return;
  registerInteraction();
  switch(e.code){
    case 'KeyW': walkTo('cluster', "beneath the densest cluster"); break;
    case 'KeyA': walkTo('pool',    "pool's edge"); break;
    case 'KeyS': walkTo('mouth',   "near the cave mouth"); break;
    case 'KeyD': walkTo('cluster', "beneath the densest cluster"); break;
    case 'Space':
      e.preventDefault();
      targetPitch.v = Math.PI*0.42; /* fast look up */
      break;
  }
});

function registerInteraction(){
  lastInteractionAt = performance.now();
  /* if we were mid-wish, cancel it */
  if(wishState.phase !== 'idle'){
    wishState.phase = 'returning';
    wishState.phaseStart = performance.now()/1000;
    wishEl.style.opacity = '0';
  }
}

/* Resize */
function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  caveUniforms.uResolution.value.set(w, h);
  glowMat.uniforms.uPxScale.value = h*0.6;
  reflectMat.uniforms.uPxScale.value = h*0.6;
  fireflyMat.uniforms.uPxScale.value = h*0.9;
  trailMat.uniforms.uPxScale.value = h*0.9;
  breathMat.uniforms.uPxScale.value = h*0.9;
}
window.addEventListener('resize', onResize);

/* ============================================================================
   THE WISH  (easter egg)
   After 90s of stillness, ~80 nearby ceiling glowworms migrate to spell out a
   procedurally-generated short phrase from a 200-word emotionally-weighted
   lexicon. They hold the shape ~10s, then drift back over 8s.
   ========================================================================== */

/* Emotionally weighted lexicon (~200 words across categories) */
const WISH_LEXICON = {
  openers: [
    "may you", "find", "be held by", "remember", "carry", "be kept", "trust",
    "rest in", "wake to", "be met by", "hold", "release", "begin again with",
    "soften toward", "make room for", "follow", "return to"
  ],
  qualities: [
    "quiet", "deep", "still", "warm", "ancient", "tender", "honest", "patient",
    "small", "kind", "spacious", "slow", "true", "soft", "luminous", "secret",
    "unhurried", "uncomplicated", "gentle", "vast", "low", "near", "humming",
    "remembered", "named", "open", "rooted", "nameless", "easy", "near-enough"
  ],
  things: [
    "light", "water", "sleep", "love", "company", "silence", "breath", "ground",
    "thaw", "rest", "song", "shelter", "courage", "weather", "wonder", "season",
    "home", "morning", "evening", "voice", "memory", "warmth", "field", "river",
    "fire", "a return", "your name", "a hand", "a window", "the long room",
    "the kept fire", "an old friend", "a kept promise", "next year",
    "a green hour", "the road back", "a softer noon"
  ],
  closers: [
    "and somewhere it will be enough", "and the dark will not have you",
    "and time will be kind", "and you will know it when it comes",
    "and you will be found", "and the cave will not forget you",
    "and the morning will keep you", "and the rest will arrive",
    "and you will be answered", "and it will sit beside you",
    "and the years will be gentle", "and there will be more of it",
    "until you are home", "for a long, long time"
  ]
};

function pick(arr){ return arr[(Math.random()*arr.length)|0]; }

function generateWish(){
  /* 60% short two-clause; 40% three-clause */
  const useThree = Math.random() < 0.4;
  const a = pick(WISH_LEXICON.openers);
  const b = pick(WISH_LEXICON.qualities);
  const c = pick(WISH_LEXICON.things);
  if(useThree){
    const d = pick(WISH_LEXICON.closers);
    return `${a} ${b} ${c}, ${d}`;
  }
  return `${a} ${b} ${c}`;
}

/* Rasterize text into a list of (x,y) sample positions in [-1..1] x [-0.4..0.4] */
function rasterizeText(text){
  const c = document.createElement('canvas');
  const W = 1024, H = 220;
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  /* fit text */
  let size = 56;
  ctx.font = `300 ${size}px "Iowan Old Style", "Hoefler Text", "Palatino Linotype", Georgia, serif`;
  while(ctx.measureText(text).width > W*0.92 && size > 18){
    size -= 2;
    ctx.font = `300 ${size}px "Iowan Old Style", "Hoefler Text", "Palatino Linotype", Georgia, serif`;
  }
  ctx.fillText(text, W/2, H/2);
  const img = ctx.getImageData(0,0,W,H);
  const points = [];
  /* Sample on a grid */
  const stride = 6;
  for(let y=0;y<H;y+=stride){
    for(let x=0;x<W;x+=stride){
      const a = img.data[(y*W + x)*4];
      if(a > 128){
        points.push([
          (x / W) * 2 - 1,
          (y / H) * 2 - 1
        ]);
      }
    }
  }
  return points;
}

const wishState = {
  phase: 'idle', /* idle | forming | held | returning */
  phaseStart: 0,
  text: '',
  /* assigned wish points: each ent has { idx, fromX,Y,Z, toX,Y,Z } */
  ents: []
};

function startWish(){
  wishState.text = generateWish();
  /* place a wish in front of the camera, on the ceiling */
  const camFwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  /* anchor center: above and a bit forward from camera */
  const anchor = camera.position.clone()
    .add(camFwd.clone().multiplyScalar(7.0))
    .setY(2.6);
  /* compute yaw to face camera */
  const yawToText = Math.atan2(anchor.x - camera.position.x, anchor.z - camera.position.z);

  const pts = rasterizeText(wishState.text);
  /* sample ~140 candidate points if too many */
  const MAX_PTS = 140;
  let chosen = pts;
  if(pts.length > MAX_PTS){
    chosen = [];
    const step = pts.length / MAX_PTS;
    for(let i=0;i<MAX_PTS;i++) chosen.push(pts[(i*step)|0]);
  }

  /* pick glowworms close to anchor */
  const cand = [];
  for(let i=0;i<GLOWWORM_COUNT;i++){
    const px = glowHomes[i*3+0], py = glowHomes[i*3+1], pz = glowHomes[i*3+2];
    const d = Math.hypot(px-anchor.x, pz-anchor.z);
    cand.push({ i, d });
  }
  cand.sort((a,b) => a.d-b.d);

  wishState.ents = [];
  for(let k=0;k<chosen.length && k<cand.length; k++){
    const idx = cand[k].i;
    const tx = chosen[k][0], ty = chosen[k][1];
    /* map text x to a horizontal arc in cave-space */
    const halfW = 3.4;
    const halfH = 0.9;
    const localX = tx * halfW;
    const localY = -ty * halfH;
    /* rotate around Y to face camera */
    const cy = Math.cos(yawToText), sy = Math.sin(yawToText);
    /* text is in plane z=0 facing -z; rotate so its forward = direction from camera to anchor */
    const wx = anchor.x + localX*cy;
    const wz = anchor.z - localX*sy;
    const wy = anchor.y + localY;
    wishState.ents.push({
      idx,
      fx: glowHomes[idx*3+0], fy: glowHomes[idx*3+1], fz: glowHomes[idx*3+2],
      tx: wx, ty: wy, tz: wz
    });
    glowWishMask[idx] = 1;
  }

  wishState.phase = 'forming';
  wishState.phaseStart = performance.now()/1000;
}

function updateWish(now){
  if(wishState.phase === 'idle') return;
  const t = now - wishState.phaseStart;
  if(wishState.phase === 'forming'){
    const k = Math.min(1, t/8.0);
    const e = easeInOutCubic(k);
    for(const ent of wishState.ents){
      const i = ent.idx;
      glowPositions[i*3+0] = ent.fx + (ent.tx-ent.fx)*e;
      glowPositions[i*3+1] = ent.fy + (ent.ty-ent.fy)*e;
      glowPositions[i*3+2] = ent.fz + (ent.tz-ent.fz)*e;
    }
    glowGeo.attributes.position.needsUpdate = true;
    if(k >= 1){
      wishState.phase = 'held';
      wishState.phaseStart = now;
      wishEl.textContent = wishState.text;
      wishEl.style.opacity = '1';
    }
  } else if(wishState.phase === 'held'){
    if(t > 12){
      wishState.phase = 'returning';
      wishState.phaseStart = now;
      wishEl.style.opacity = '0';
    }
  } else if(wishState.phase === 'returning'){
    const k = Math.min(1, t/8.0);
    const e = easeInOutCubic(k);
    for(const ent of wishState.ents){
      const i = ent.idx;
      glowPositions[i*3+0] = ent.tx + (ent.fx-ent.tx)*e;
      glowPositions[i*3+1] = ent.ty + (ent.fy-ent.ty)*e;
      glowPositions[i*3+2] = ent.tz + (ent.fz-ent.tz)*e;
    }
    glowGeo.attributes.position.needsUpdate = true;
    if(k >= 1){
      for(const ent of wishState.ents) glowWishMask[ent.idx] = 0;
      wishState.phase = 'idle';
      wishState.ents = [];
      /* reset interaction timer so it can happen again after another 90s */
      lastInteractionAt = performance.now();
    }
  }
}

function easeInOutCubic(x){ return x<0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2; }

/* ============================================================================
   ANIMATE / RENDER
   ========================================================================== */

let prevT = performance.now();
let started = false;

function animate(){
  const now = performance.now();
  const dt = Math.min(0.05, (now - prevT) / 1000);
  prevT = now;
  const t = now / 1000;

  /* smooth camera orientation */
  yaw   += (targetYaw.v   - yaw)   * Math.min(1, dt*8);
  pitch += (targetPitch.v - pitch) * Math.min(1, dt*8);

  /* walk lerp */
  if(walking){
    camera.position.lerp(walkTarget, Math.min(1, dt*1.4));
    if(camera.position.distanceTo(walkTarget) < 0.01){
      walking = false;
    }
  }

  applyCameraOrientation();
  camera.updateMatrixWorld(true);

  /* uniforms */
  caveUniforms.uTime.value = t;
  caveUniforms.uCamPos.value.copy(camera.position);
  caveUniforms.uInvProj.value.copy(camera.projectionMatrix).invert();
  caveUniforms.uInvView.value.copy(camera.matrixWorld);

  glowMat.uniforms.uTime.value = t;
  /* breath cycle: 4-second period — gentle global multiplier */
  glowMat.uniforms.uBreath.value = 0.92 + Math.sin(t * (Math.PI*2/4)) * 0.10;

  fireflyUniforms.uTime.value = t;
  waterUniforms.uTime.value = t;
  waterUniforms.uCamPos.value.copy(camera.position);

  /* slowly rotate the constellations around Y so they "rotate with the sky" */
  const slowRot = t * 0.012;
  for(const cn of constellationIndices){
    for(const i of cn.indices){
      if(glowWishMask[i]) continue;       /* don't move wish-stolen ones */
      const hx = glowHomes[i*3+0], hz = glowHomes[i*3+2];
      const cx = hx*Math.cos(slowRot) - hz*Math.sin(slowRot);
      const cz = hx*Math.sin(slowRot) + hz*Math.cos(slowRot);
      glowPositions[i*3+0] = cx;
      glowPositions[i*3+2] = cz;
    }
  }
  glowGeo.attributes.position.needsUpdate = true;

  /* firefly path */
  if(now/1000 > fireflyState.nextRetargetAt && now/1000 > fireflyState.pausedUntil){
    pickFireflyTarget(now/1000);
  }
  if(now/1000 > fireflyState.pausedUntil){
    /* spring toward target with damping */
    const toward = fireflyState.target.clone().sub(fireflyState.pos);
    const distF = toward.length();
    if(distF > 0.001){
      toward.multiplyScalar(0.6/distF);
      fireflyState.vel.lerp(toward, dt*0.9);
    }
    /* random meander */
    fireflyState.vel.x += (Math.random()-0.5)*dt*0.3;
    fireflyState.vel.y += (Math.random()-0.5)*dt*0.2;
    fireflyState.vel.z += (Math.random()-0.5)*dt*0.3;
    fireflyState.vel.multiplyScalar(0.96);
    fireflyState.pos.add(fireflyState.vel.clone().multiplyScalar(dt*1.6));
  } else {
    /* perched — gentle bob */
    fireflyState.vel.multiplyScalar(0.85);
    fireflyState.pos.y += Math.sin(t*2.4)*0.0015;
  }
  fireflyPos[0] = fireflyState.pos.x;
  fireflyPos[1] = fireflyState.pos.y;
  fireflyPos[2] = fireflyState.pos.z;
  fireflyGeo.attributes.position.needsUpdate = true;

  /* trail: shift down and write head */
  for(let i=TRAIL_LEN-1;i>0;i--){
    trailPositions[i*3+0] = trailPositions[(i-1)*3+0];
    trailPositions[i*3+1] = trailPositions[(i-1)*3+1];
    trailPositions[i*3+2] = trailPositions[(i-1)*3+2];
  }
  trailPositions[0] = fireflyState.pos.x;
  trailPositions[1] = fireflyState.pos.y;
  trailPositions[2] = fireflyState.pos.z;
  trailGeo.attributes.position.needsUpdate = true;

  /* breath */
  if(started && now/1000 > nextBreathAt) emitBreath(now/1000);
  updateBreath(dt);

  /* idle wish trigger */
  if(started && wishState.phase === 'idle'){
    const idle = (now - lastInteractionAt) / 1000;
    if(idle > 90){
      startWish();
    }
  }
  updateWish(now/1000);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

/* ============================================================================
   START GATE
   ========================================================================== */
function start(){
  if(started) return;
  started = true;
  initAudio();
  gate.classList.add('hide');
  /* HUD reveal sequence */
  setTimeout(() => titleEl.style.opacity = '1', 800);
  setTimeout(() => subtitleEl.style.opacity = '1', 1500);
  setTimeout(() => hintEl.style.opacity = '1', 3500);
  setTimeout(() => compassEl.style.opacity = '1', 4200);
  setTimeout(() => compassEl.style.opacity = '0.0', 8200);
  /* fade out hint after 12s */
  setTimeout(() => hintEl.style.opacity = '0.0', 12000);
  lastInteractionAt = performance.now();
  prevT = performance.now();
  /* first breath after 6s */
  nextBreathAt = performance.now()/1000 + 6;
}
gate.addEventListener('click', start);
window.addEventListener('keydown', e => { if(!started) start(); }, { once: false });

/* kick the loop */
requestAnimationFrame(animate);

/* compass label updates on walk completion handled in walkTo() */
</script>
</body>
