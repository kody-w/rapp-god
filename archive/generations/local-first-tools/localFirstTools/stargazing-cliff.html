<script type="module">
import * as THREE from 'three';

/* ============================================================
   STARGAZING CLIFF — 1:14 AM, PERSEID PEAK
   A cinematic single-file app for RappterZoo.
============================================================ */

// ----- Renderer / scene / camera -------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.setClearColor(0x000000, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02030a, 0.0008);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 4000);
// "Sitting on blanket on cliff edge" — eye height ~1.1m above blanket, slightly back from edge
camera.position.set(0, 1.15, 0.4);
camera.lookAt(0, 1.5, -8);

// ----- Lights (very dim, mostly skylight ambient) --------------
const ambient = new THREE.AmbientLight(0x101828, 0.55);
scene.add(ambient);

// Cool starlight skylight from above
const skyHemi = new THREE.HemisphereLight(0x2a3a5a, 0x080808, 0.35);
scene.add(skyHemi);

// Tiny faint point light pretending to be the open thermos cap glow (a warm presence)
const thermosWarm = new THREE.PointLight(0xffb070, 0.4, 1.4, 2.0);
thermosWarm.position.set(0.55, 0.95, 0.25);
scene.add(thermosWarm);

// ----- Camera look controls ------------------------------------
const look = {
  yaw: 0,        // -0.6..0.6 (radians) limited horizontal
  pitch: 0.55,   // up bias on load (favor sky)
  targetYaw: 0,
  targetPitch: 0.55,
  dragging: false,
  lastX: 0, lastY: 0,
};
const PITCH_MIN = -0.35;   // cannot look below cliff edge much
const PITCH_MAX = 1.45;    // up to zenith
const YAW_LIMIT = 0.85;

function onPointerDown(e) {
  look.dragging = true;
  document.body.classList.add('dragging');
  const t = e.touches ? e.touches[0] : e;
  look.lastX = t.clientX; look.lastY = t.clientY;
}
function onPointerMove(e) {
  if (!look.dragging) return;
  const t = e.touches ? e.touches[0] : e;
  const dx = t.clientX - look.lastX;
  const dy = t.clientY - look.lastY;
  look.lastX = t.clientX; look.lastY = t.clientY;
  look.targetYaw   = THREE.MathUtils.clamp(look.targetYaw   - dx * 0.0028, -YAW_LIMIT, YAW_LIMIT);
  look.targetPitch = THREE.MathUtils.clamp(look.targetPitch + dy * 0.0028, PITCH_MIN, PITCH_MAX);
}
function onPointerUp() { look.dragging = false; document.body.classList.remove('dragging'); }

renderer.domElement.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
renderer.domElement.addEventListener('touchstart', (e) => { onPointerDown(e); }, { passive: true });
window.addEventListener('touchmove', (e) => { onPointerMove(e); }, { passive: true });
window.addEventListener('touchend', onPointerUp);

// ============================================================
// SKYDOME — starfield + milky way band
// Two-pass dome:
//   1) Inner dome with starfield shader (procedural stars w/ twinkle + spectral color)
//   2) Same dome with additive milky-way overlay shader (dense lane + dust + warm/cool variation)
// We do this with one big inverted icosphere using a single shader that combines both.
// ============================================================

const skyVert = /* glsl */`
varying vec3 vWorldPos;
varying vec3 vDir;
void main() {
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWorldPos = wp.xyz;
  vDir = normalize(position);
  gl_Position = projectionMatrix * viewMatrix * wp;
}
`;

const skyFrag = /* glsl */`
precision highp float;
varying vec3 vDir;
uniform float uTime;
uniform vec3  uMilkyAxis;   // axis perpendicular to the milky way band (band passes through points where dot(dir, axis) ~ 0)
uniform vec3  uMilkyDir;    // direction along the band length (for color/dust lane variation)
uniform float uExposure;

// ---- hash / noise utilities ----
float hash13(vec3 p){ p = fract(p*0.3183099 + vec3(0.71,0.113,0.419)); p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
float hash12(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }

// 3D value noise
float vnoise(vec3 p){
  vec3 i = floor(p); vec3 f = fract(p);
  f = f*f*(3.0 - 2.0*f);
  float n000 = hash13(i+vec3(0,0,0));
  float n100 = hash13(i+vec3(1,0,0));
  float n010 = hash13(i+vec3(0,1,0));
  float n110 = hash13(i+vec3(1,1,0));
  float n001 = hash13(i+vec3(0,0,1));
  float n101 = hash13(i+vec3(1,0,1));
  float n011 = hash13(i+vec3(0,1,1));
  float n111 = hash13(i+vec3(1,1,1));
  return mix(
    mix(mix(n000,n100,f.x), mix(n010,n110,f.x), f.y),
    mix(mix(n001,n101,f.x), mix(n011,n111,f.x), f.y),
    f.z
  );
}
float fbm3(vec3 p){
  float v = 0.0; float a = 0.5;
  for (int i=0;i<5;i++){ v += a*vnoise(p); p *= 2.02; a *= 0.5; }
  return v;
}

// Star layer — produces small near-point stars from a dir
// freq controls grid density; threshold controls rarity; tint biases color.
vec3 starLayer(vec3 dir, float freq, float threshold, float sizeBoost, float seedShift){
  // Project to 3D grid via dir scaled
  vec3 p = dir * freq;
  vec3 ip = floor(p);
  vec3 fp = fract(p);

  vec3 acc = vec3(0.0);
  // Sample 3x3x3 neighborhood for nearest star center
  for (int z=-1; z<=1; z++)
  for (int y=-1; y<=1; y++)
  for (int x=-1; x<=1; x++) {
    vec3 cell = ip + vec3(float(x),float(y),float(z));
    float h  = hash13(cell + seedShift);
    if (h < threshold) continue; // most cells empty
    vec3 starCenter = vec3(float(x),float(y),float(z)) + vec3(
      hash13(cell+11.1), hash13(cell+22.2), hash13(cell+33.3)
    );
    vec3 d = fp - starCenter;
    float r = length(d);
    // tiny twinkle (per-star phase)
    float phase = hash13(cell+7.7) * 6.2831;
    float twk = 0.6 + 0.4 * sin(uTime*1.6 + phase) * sin(uTime*0.7 + phase*1.7);
    // spectral type — bias from hash13(cell+99)
    float spec = hash13(cell+99.9);
    vec3 col;
    if (spec < 0.55) col = vec3(0.85, 0.93, 1.05);            // bluish-white (most)
    else if (spec < 0.78) col = vec3(1.0, 0.97, 0.88);        // warm white
    else if (spec < 0.92) col = vec3(1.0, 0.78, 0.55);        // orange
    else col = vec3(1.0, 0.55, 0.45);                         // red giant rare
    // brightness: rarer stars get amplified
    float bright = pow((h - threshold) / (1.0 - threshold), 1.4);
    bright = mix(0.15, 1.0, bright);

    // sharp gaussian for the star core
    float core = exp(-r*r * (140.0/sizeBoost));
    // soft halo
    float halo = exp(-r*r * (28.0/sizeBoost)) * 0.18;
    float intensity = (core + halo) * twk * bright;
    acc += col * intensity;
  }
  return acc;
}

// Milky-way band: returns additive bright dense star cluster + dust + color variation
// uMilkyAxis is the band-normal. The band runs perpendicular.
vec3 milkyWay(vec3 dir){
  float bandCoord = dot(dir, uMilkyAxis);   // -1..1, ~0 means inside band
  // Band density profile (gauss with thickness ~0.18)
  float band = exp(-bandCoord*bandCoord / 0.06);

  // Position along band (for color/structure variation)
  float along = dot(dir, uMilkyDir);

  // Cloud structure
  vec3 q = dir * 6.0;
  float cloud = fbm3(q + vec3(2.0, -1.0, 4.0)*along);
  cloud = smoothstep(0.30, 0.95, cloud);

  // Dust lanes (darker stripes inside the band)
  float dust = fbm3(dir * 4.5 + vec3(7.7, 2.3, 0.5));
  dust = smoothstep(0.45, 0.9, dust);

  // Color: warm toward galactic center side, cool toward arms
  vec3 warmCore = vec3(1.05, 0.78, 0.55);
  vec3 cool     = vec3(0.55, 0.70, 1.10);
  vec3 milkCol  = mix(cool, warmCore, smoothstep(-0.4, 0.6, along));

  // Faint nebula tints
  float nebRed   = fbm3(dir*3.2 + vec3(11.0, 4.0, 0.0));
  float nebBlue  = fbm3(dir*3.7 + vec3(0.0, 7.0, 9.0));
  vec3 nebula = vec3(nebRed*0.35, nebRed*0.08 + nebBlue*0.04, nebBlue*0.45);

  // Dense star fog INSIDE the band (extra bright star carpet)
  vec3 denseStars  = starLayer(dir, 220.0, 0.93, 1.0, 13.7) * 0.9;
  vec3 denseStars2 = starLayer(dir, 480.0, 0.97, 0.6, 99.1) * 0.55;

  // Compose
  vec3 milk = vec3(0.0);
  milk += milkCol * (cloud * 0.32);                // soft glow
  milk += nebula * 0.55 * cloud;                   // nebula tints
  milk += (denseStars + denseStars2) * (0.6 + 0.4*cloud);

  // Dust suppresses the glow but slightly less the stars (dust silhouettes against stars)
  milk *= mix(1.0, 0.20, dust * 0.85);

  // Mask by band (outside band, contribution falls off)
  return milk * band;
}

void main() {
  vec3 dir = normalize(vDir);

  // Below horizon — discard (we have ocean / cliff below)
  // Sky covers everything, but we darken below
  float belowFade = smoothstep(-0.05, 0.05, dir.y);

  // ---- Base sky gradient (very dark, slight blue-purple toward horizon) ----
  vec3 zenith  = vec3(0.005, 0.008, 0.020);
  vec3 horizon = vec3(0.012, 0.018, 0.038);
  vec3 sky = mix(horizon, zenith, smoothstep(0.0, 0.45, dir.y));

  // Subtle large-scale sky glow noise (airglow)
  float airglow = fbm3(dir * 0.7 + vec3(0.0, 0.0, uTime*0.005));
  sky += vec3(0.006, 0.010, 0.014) * airglow;

  // ---- Star layers ----
  // Layer A: many faint background stars
  vec3 stars  = starLayer(dir, 180.0, 0.86, 1.0, 1.1);
  // Layer B: medium stars
  vec3 stars2 = starLayer(dir, 90.0, 0.82, 1.6, 5.5) * 0.85;
  // Layer C: rare bright stars (flagship sparkle)
  vec3 stars3 = starLayer(dir,  35.0, 0.74, 3.6, 9.9) * 1.05;

  vec3 starfield = stars + stars2 + stars3;

  // ---- Milky way ----
  vec3 milk = milkyWay(dir);

  vec3 col = sky + starfield + milk;

  // Below horizon fade out (sky shouldn't punch through ocean too much)
  col *= belowFade * 0.92 + 0.08;

  col *= uExposure;

  gl_FragColor = vec4(col, 1.0);
}
`;

varying vec2 vUv;
varying vec3 vWorldPos;

  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorldPos = wp.xyz;

`;
const oceanFrag = /* glsl */`
precision highp float;
varying vec2 vUv;
varying vec3 vWorldPos;
uniform float uTime;

float hash12(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
float vnoise2(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  f = f*f*(3.0 - 2.0*f);
  float a = hash12(i);
  float b = hash12(i+vec2(1,0));
  float c = hash12(i+vec2(0,1));
  float d = hash12(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}
float fbm2(vec2 p){
  float v=0.0; float a=0.5;
  for (int i=0;i<5;i++){ v += a*vnoise2(p); p*=2.03; a*=0.5; }
  return v;
}

void main(){
  vec2 p = vWorldPos.xz * 0.04;
  float waves = fbm2(p + vec2(uTime*0.04, uTime*0.02));
  float chop  = fbm2(p*3.5 + vec2(-uTime*0.1, uTime*0.07));

  // Whitecap glints — sparse hash thresholding
  vec2 cellP = floor(vWorldPos.xz * 0.5);
  float h = hash12(cellP);
  float twinkle = step(0.985, h * (0.4 + 0.6*sin(uTime*1.2 + h*30.0)));
  vec3 glint = vec3(0.45, 0.55, 0.7) * twinkle * 0.6;

  // Phosphorescent flicker (very rare)
  float phosphor = step(0.999, hash12(cellP*1.7 + floor(uTime*1.5)));
  glint += vec3(0.15, 0.55, 0.7) * phosphor * 0.5;

  // Base ocean color — almost black, slight cool variation
  vec3 base = vec3(0.005, 0.010, 0.022);
  base += vec3(0.005, 0.011, 0.024) * waves;
  base += vec3(0.001, 0.003, 0.008) * chop;

  // Distance darkening — far ocean is darker
  float dist = length(vWorldPos.xz);
  float distFade = clamp(1.0 - dist*0.0025, 0.4, 1.0);
  base *= distFade;
  glint *= distFade;

  vec3 col = base + glint;
  gl_FragColor = vec4(col, 1.0);
}
`;

float hash12(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }

  float a=hash12(i),b=hash12(i+vec2(1,0)),c=hash12(i+vec2(0,1)),d=hash12(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){v+=a*vnoise2(p);p*=2.0;a*=0.5;} return v; }

void main(){

}

// Cliff top — a wide deformed plane in front of camera, ending at z = -1.4 (the edge)
function makeCliffTop() {
  const g = new THREE.PlaneGeometry(40, 18, 64, 28);
  g.rotateX(-Math.PI/2);
  const pos = g.attributes.position;
  for (let i=0; i<pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    // Drop-off after z < -1.4 (toward viewer's forward = -z)
    let y = 0;
    const edge = -1.4;
    if (z < edge) {
      // Cliff face plunges
      const t = (edge - z);
      y = -Math.min(80, t*t*0.6 + t*1.2);
    } else {
      // Slight lump variation on top
      y = Math.sin(x*0.5+1.7)*0.05 + Math.cos(z*0.7+0.3)*0.04;
      y += (Math.random()-0.5)*0.02;
    }
    pos.setY(i, y);
  }
  g.computeVertexNormals();
  return g;
}

varying float vSway;

attribute vec3 instancePos;

precision highp float;

  col += rimWarm * ndl * fall * 0.55;
  col += rimWarm * fres * 0.18;

      float a = pow(n, 2.0) * mask * 0.35;

// ============================================================
// METEORS — shooting stars
// Two kinds:
//   - "streak" : fast, short, common (every 10–30s)
//   - "fireball": slow, brilliant, with audio swoosh + extra trail (every 60–120s)
//
// Implementation: each meteor is a thin tapered geometry with shader.
// We point it along its direction in world space and animate its
// life from 0..1, fading head/tail.
// ============================================================
const meteorVert = /* glsl */`
varying float vT;       // 0 head .. 1 tail
varying vec2  vUv;
void main(){
  vT  = uv.x;
  vUv = uv;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0);
}
`;
const meteorFrag = /* glsl */`
precision highp float;
varying float vT;
varying vec2  vUv;
uniform float uLife;        // 0..1
uniform float uIntensity;   // base brightness
uniform vec3  uColor;
uniform float uFireball;    // 0..1
void main(){
  // Distance from line center
  float across = abs(vUv.y - 0.5)*2.0;
  float lineMask = exp(-across*across * (8.0 + uFireball*4.0));

  // Head bright (vT~0), tail dim
  float headBright = exp(-vT*vT * 6.0);                      // sharp head
  float tailFade   = (1.0 - vT) * (1.0 - vT);                // soft fall

  // Life envelope — fade in then fade out
  float env = sin(uLife * 3.14159);
  env = pow(env, 0.6);

  // Fireball adds wider warm halo + smoke shimmer
  float halo = exp(-across*across * 1.8) * 0.35 * uFireball;

  float intensity = (headBright * 1.6 + tailFade * 0.6) * lineMask + halo;
  intensity *= env * uIntensity;

  vec3 col = uColor * intensity;
  // Hot core white-out
  col += vec3(1.0,1.0,1.0) * pow(headBright * lineMask * env, 4.0) * 0.9;

  gl_FragColor = vec4(col, intensity);
}
`;

// ============================================================
// NAMED BRIGHT STARS — billboarded sprites for hero stars (Vega, Deneb,
// Altair forming the Summer Triangle; Polaris). Adds a sense of place.
// ============================================================
function makeStarSprite(color=0xffffff, size=0.05) {
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    fog: false,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(color) },
      uPhase: { value: Math.random()*6.28 },
    },
    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uPhase;
      void main(){
        vec2 c = vUv - 0.5;
        float r = length(c);
        float core = exp(-r*r * 60.0);
        float halo = exp(-r*r * 8.0) * 0.25;
        // Cross diffraction spike
        float spikeH = exp(-pow(c.y, 2.0)*900.0) * exp(-pow(c.x,2.0)*4.0);
        float spikeV = exp(-pow(c.x, 2.0)*900.0) * exp(-pow(c.y,2.0)*4.0);
        float spike = (spikeH + spikeV) * 0.35;
        float twk = 0.7 + 0.3*sin(uTime*1.4 + uPhase) * sin(uTime*0.7 + uPhase*1.7);
        float a = (core + halo + spike) * twk;
        vec3 col = uColor * a;
        col += vec3(1.0)*pow(core*twk, 4.0)*0.7;
        gl_FragColor = vec4(col, a);
      }
    `,
  });
  const g = new THREE.PlaneGeometry(size, size);
  const m = new THREE.Mesh(g, mat);
  m.renderOrder = -2;
  return m;
}
function placeStarOnDome(mesh, az, el, radius=850) {
  mesh.position.set(
    Math.cos(az)*Math.cos(el)*radius,
    Math.sin(el)*radius,
    Math.sin(az)*Math.cos(el)*radius
  );
}

// ============================================================
// CONSTELLATION LINES — faint lines between bright stars (Summer Triangle)
// Drawn as additive thin quads (lines look bad in three.js).
// ============================================================
function makeConstellationLine(p1, p2, color=0x4a6090, intensity=0.20) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  const geo = new THREE.PlaneGeometry(len, 4.0);
  const mat = new THREE.ShaderMaterial({
    transparent:true, blending: THREE.AdditiveBlending, depthWrite:false, fog:false,
    uniforms:{
      uTime:{value:0},
      uColor:{value:new THREE.Color(color)},
      uIntensity:{value:intensity},
    },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader:/* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uIntensity;
      void main(){
        float across = abs(vUv.y-0.5)*2.0;
        float line = exp(-across*across * 80.0);
        float along = smoothstep(0.0,0.1,vUv.x)*smoothstep(1.0,0.9,vUv.x);
        float pulse = 0.7 + 0.3*sin(uTime*0.4 + vUv.x*4.0);
        float a = line*along*uIntensity*pulse;
        gl_FragColor = vec4(uColor*a, a);
      }
    `,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(mid);
  // Orient: face the line direction
  m.lookAt(p2);
  // The plane is in xy, length is along x. Need to rotate so x aligns with dir.
  // Easier approach: build basis matrix.
  const x = dir.clone().normalize();
  const up = new THREE.Vector3(0,1,0);
  if (Math.abs(x.dot(up)) > 0.95) up.set(1,0,0);
  const y = new THREE.Vector3().crossVectors(up, x).normalize();
  const z = new THREE.Vector3().crossVectors(x, y).normalize();
  const rot = new THREE.Matrix4().makeBasis(x, y, z);
  m.quaternion.setFromRotationMatrix(rot);
  m.renderOrder = -3;
  return m;
}

function makeMeteorGeometry(length=200) {

  const w = 1.5;

function spawnMeteor(opts={}) {
  const isFireball = !!opts.fireball;
  const length = isFireball ? (260 + Math.random()*180) : (140 + Math.random()*120);
  const geo = makeMeteorGeometry(length);
  const color = isFireball
    ? new THREE.Color().setHSL(0.10 + Math.random()*0.05, 0.7, 0.7)   // warm
    : new THREE.Color().setHSL(0.55 + Math.random()*0.10, 0.4, 0.85); // cool

  const mat = new THREE.ShaderMaterial({
    vertexShader: meteorVert,
    fragmentShader: meteorFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    uniforms: {
      uLife: { value: 0 },
      uIntensity: { value: isFireball ? 2.6 : 1.4 },
      uColor: { value: color },
      uFireball: { value: isFireball ? 1.0 : 0.0 },
    },
    fog: false,
  });
  const m = new THREE.Mesh(geo, mat);
  m.renderOrder = -1;          // behind close objects but in front of sky

  // Position high up, random direction. Perseids appear to radiate
  // from Perseus, but we'll use random trajectories with a bias toward
  // the upper sky.
  // Place far away in random sky position, oriented along a tangent direction
  const skyR = 600;
  const az = Math.random() * Math.PI * 2;       // around camera
  const el = 0.6 + Math.random()*0.85;          // upper hemisphere bias
  const center = new THREE.Vector3(
    Math.cos(az)*Math.cos(el)*skyR,
    Math.sin(el)*skyR,
    Math.sin(az)*Math.cos(el)*skyR
  );
  m.position.copy(center);

  // Orient so the strip's local +X aligns with travel direction.
  // Travel direction is roughly tangent to the celestial sphere.
  const radial = center.clone().normalize();
  // pick an arbitrary up that is NOT radial
  const tmp = (Math.abs(radial.y) < 0.9) ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
  const tangent = new THREE.Vector3().crossVectors(radial, tmp).normalize();
  // Rotate by random angle around radial to randomize travel direction
  const ang = Math.random()*Math.PI*2;
  tangent.applyAxisAngle(radial, ang).normalize();
  // Build a basis: x=tangent, y=radial(out, will be normal/away from camera)
  const x = tangent;
  const y = radial; // up away from origin
  const z = new THREE.Vector3().crossVectors(x, y).normalize();
  const rotMat = new THREE.Matrix4().makeBasis(x, y, z);
  m.quaternion.setFromRotationMatrix(rotMat);

  scene.add(m);

  meteors.push({
    mesh: m,
    born: clock.getElapsedTime(),
    life: 0,
    duration: isFireball ? (1.6 + Math.random()*1.2) : (0.5 + Math.random()*0.4),
    fireball: isFireball,
  });

  meteorState.totalSeen += 1;
  meteorState.countEl.textContent = meteorState.totalSeen;

  if (isFireball) playFireballSwoosh();
}

const meteorState = {

const clock = new THREE.Clock();

function scheduleMeteors(t) {

}

function updateMeteors(t, dt) {
  for (let i = meteors.length-1; i >= 0; i--) {

    M.life += dt / M.duration;

  }

// AUDIO — Web Audio API, gated by user gesture
// ============================================================
let audioCtx = null;
let masterGain = null;
let oceanNode = null;
let windNode = null;
let heartGain = null;

function startAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  audioCtx = new Ctx();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);
  // Fade in master
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 2.0);

  // ---- ocean: low-passed noise + slow LFO modulating gain ----
  {
    const bufSize = 2 * audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    let lastOut = 0;
    for (let i=0; i<bufSize; i++) {
      // brown noise
      const white = Math.random()*2 - 1;
      lastOut = (lastOut + 0.02*white) / 1.02;
      data[i] = lastOut * 3.5;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 280; lp.Q.value = 0.5;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 60;
    const g = audioCtx.createGain(); g.gain.value = 0.32;

    // LFO on gain (slow swell)
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.08;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.10;
    lfo.connect(lfoGain).connect(g.gain);
    lfo.start();

    src.connect(hp).connect(lp).connect(g).connect(masterGain);
    src.start();
    oceanNode = { src, g };
  }

  // ---- wind: filtered noise with random gusts ----
  {
    const bufSize = 2 * audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const bp = audioCtx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value = 480; bp.Q.value = 0.6;
    const g = audioCtx.createGain(); g.gain.value = 0.06;
    src.connect(bp).connect(g).connect(masterGain);
    src.start();
    windNode = { src, g, bp };
    // random gust scheduler
    function gust(){
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const peak = 0.06 + Math.random()*0.10;
      g.gain.cancelScheduledValues(now);
      g.gain.setValueAtTime(g.gain.value, now);
      g.gain.linearRampToValueAtTime(peak, now + 1.5 + Math.random()*1.5);
      g.gain.linearRampToValueAtTime(0.04, now + 4.0 + Math.random()*2.0);
      bp.frequency.cancelScheduledValues(now);
      bp.frequency.setValueAtTime(bp.frequency.value, now);
      bp.frequency.linearRampToValueAtTime(380 + Math.random()*350, now + 2.0);
      setTimeout(gust, 6000 + Math.random()*8000);
    }
    setTimeout(gust, 2000);
  }

  // ---- heartbeat: very subtle low thump every ~1s ----
  {
    heartGain = audioCtx.createGain();
    heartGain.gain.value = 0.06;
    heartGain.connect(masterGain);

    function thump(time, strong) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(70, time); o.frequency.exponentialRampToValueAtTime(38, time+0.18);
      g.gain.setValueAtTime(0.0, time);
      g.gain.linearRampToValueAtTime(strong?0.55:0.32, time+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, time+0.22);
      o.connect(g).connect(heartGain);
      o.start(time); o.stop(time+0.3);
    }
    function tick(){
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      thump(now, true);
      thump(now+0.28, false);
      setTimeout(tick, 1050 + Math.random()*120);
    }
    setTimeout(tick, 1500);
  }

  // ---- coyote howl every 5–8 minutes ----
  function scheduleCoyote() {
    const wait = (300 + Math.random()*180) * 1000;  // 5–8 min in ms
    setTimeout(() => { howlCoyote(); scheduleCoyote(); }, wait);
  }
  // first howl: 90–180s (so user can hear one in a normal session)
  setTimeout(() => { howlCoyote(); scheduleCoyote(); }, (90 + Math.random()*90)*1000);
}

function howlCoyote() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Two short yips then a long howl, panned slightly off-center
  const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  if (pan) pan.pan.value = (Math.random()-0.5)*1.4;

  const out = audioCtx.createGain();
  out.gain.value = 0.10;
  if (pan) { out.connect(pan); pan.connect(masterGain); }
  else out.connect(masterGain);

  function note(start, dur, f0, f1, peak) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(f0, start);
    o.frequency.exponentialRampToValueAtTime(f1, start+dur);
    // mild filter
    const filt = audioCtx.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value = 1100; filt.Q.value = 4;
    g.gain.setValueAtTime(0.0, start);
    g.gain.linearRampToValueAtTime(peak, start+0.06);
    g.gain.linearRampToValueAtTime(peak*0.7, start+dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
    o.connect(filt).connect(g).connect(out);
    o.start(start); o.stop(start+dur+0.05);
  }
  note(t0+0.0, 0.18, 480, 360, 0.5);
  note(t0+0.30,0.18, 510, 380, 0.5);
  note(t0+0.7, 1.6,  420, 720, 0.7);
  note(t0+0.7, 1.6,  421, 723, 0.4); // detune layer
  note(t0+2.4, 0.9,  680, 380, 0.4);
}

function playFireballSwoosh() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + 0.05;
  // White noise burst -> band-passed sweep
  const bufSize = audioCtx.sampleRate * 2.0;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = 4;
  bp.frequency.setValueAtTime(2400, t0);
  bp.frequency.exponentialRampToValueAtTime(280, t0 + 1.6);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t0);
  g.gain.linearRampToValueAtTime(0.28, t0+0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+1.7);
  src.connect(bp).connect(g).connect(masterGain);
  src.start(t0); src.stop(t0+1.9);
}

// MAIN LOOP
// ============================================================
const tmpQuat = new THREE.Quaternion();
const tmpEuler = new THREE.Euler(0, 0, 0, 'YXZ');

function animate() {
  const dt = Math.min(0.05, clock.getDelta());
  const t  = clock.getElapsedTime();

  // Smooth look
  look.yaw   += (look.targetYaw   - look.yaw  ) * 0.08;
  look.pitch += (look.targetPitch - look.pitch) * 0.08;
  // Tiny breathing motion (head sway from heartbeat)
  const sway = Math.sin(t*0.7)*0.0035 + Math.sin(t*1.3+0.5)*0.0018;
  tmpEuler.set(look.pitch + sway*0.4, look.yaw + sway, sway*0.2);
  camera.quaternion.setFromEuler(tmpEuler);

  // Update shader times
  skyMat.uniforms.uTime.value = t;
  oceanMat.uniforms.uTime.value = t;
  cliffMat.uniforms.uTime.value = t;
  blanketMat.uniforms.uTime.value = t;
  thermosMat.uniforms.uTime.value = t;
  thermosCap.material.uniforms.uTime.value = t;
  steamMat.uniforms.uTime.value = t;
  grassPatch.material.uniforms.uTime.value = t;

  // Steam billboard toward camera
  steam.lookAt(camera.position);

  // Meteors
  scheduleMeteors(t);
  updateMeteors(t, dt);
  updateSatellites(t);

  // Hero stars: update time uniform + billboard toward camera
  for (const hs of heroStars) {
    hs.material.uniforms.uTime.value = t;
    hs.lookAt(camera.position);
  }
  for (const s of satellites) {
    s.sprite.material.uniforms.uTime.value = t;
    s.sprite.lookAt(camera.position);
  }
  for (const ln of constellationLines) {
    ln.material.uniforms.uTime.value = t;
  }

  // Subtle thermos warm light flicker
  thermosWarm.intensity = 0.35 + Math.sin(t*2.3)*0.04 + Math.sin(t*5.7)*0.025;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// ============================================================
// Tiny perf guard: pause when tab hidden
// ============================================================
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  } else {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

</script>
</body>
</html>
