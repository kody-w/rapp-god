<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e16);
scene.fog = new THREE.FogExp2(0x14202c, 0.018);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 1.4, 0);
camera.lookAt(0, 1.0, -10);

// ── Porch floor (planked wood) ──────────────────────────────────────
const porchFloorMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0}, wet:{value:0.4} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float wet; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      vec2 p = vUv * vec2(8.0, 30.0);
      float plank = step(0.95, fract(p.x));
      float grain = n(p*vec2(0.6, 5.0)) * 0.4 + 0.4;
      vec3 col = mix(vec3(0.20,0.13,0.07), vec3(0.10,0.06,0.03), grain);
      col = mix(col, vec3(0.04,0.02,0.01), plank);
      // wet sheen
      col = mix(col, col * vec3(1.2, 1.1, 1.05), wet * 0.4);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const porchFloor = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), porchFloorMat);
porchFloor.rotation.x = -Math.PI/2;
porchFloor.position.set(0, 0, 1.5);
scene.add(porchFloor);

// ── Porch ceiling (covered) ──────────────────────────────────────────
const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(8, 4),
  new THREE.MeshStandardMaterial({color:0x1a1208, roughness:0.95})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.set(0, 2.6, 1.5);
scene.add(ceiling);

// ── Posts holding up the porch roof ─────────────────────────────────
const postMat = new THREE.MeshStandardMaterial({color:0x2a1a08, roughness:0.85});
const postGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.6, 8);
[[-3.5, 1.3, -0.5], [3.5, 1.3, -0.5], [-3.5, 1.3, 3.5], [3.5, 1.3, 3.5]].forEach(p => {
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(p[0], p[1], p[2]);
  scene.add(post);
});

// ── Railing ──────────────────────────────────────────────────────────
const railMat = new THREE.MeshStandardMaterial({color:0x352010, roughness:0.85});
const topRail = new THREE.Mesh(new THREE.BoxGeometry(7.0, 0.06, 0.08), railMat);
topRail.position.set(0, 1.0, -0.5);
scene.add(topRail);
const botRail = new THREE.Mesh(new THREE.BoxGeometry(7.0, 0.04, 0.08), railMat);
botRail.position.set(0, 0.4, -0.5);
scene.add(botRail);
// balusters
for (let i = -3; i <= 3; i += 0.5) {
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.55, 0.04), railMat);
  b.position.set(i, 0.7, -0.5);
  scene.add(b);
}

// ── Porch swing ─────────────────────────────────────────────────────
const swingGroup = new THREE.Group();
const swingMat = new THREE.MeshStandardMaterial({color:0x1a0e06, roughness:0.7});
const seat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.05, 0.5), swingMat);
seat.position.set(0, 0, 0);
const back = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.4, 0.05), swingMat);
back.position.set(0, 0.2, -0.22);
const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.5), swingMat);
leftArm.position.set(-0.7, 0.1, 0);
const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.5), swingMat);
rightArm.position.set(0.7, 0.1, 0);
swingGroup.add(seat, back, leftArm, rightArm);
swingGroup.position.set(2.2, 1.2, 1.0);
scene.add(swingGroup);
// swing chains (2 thin lines from ceiling to swing corners)
const chainMat = new THREE.LineBasicMaterial({color:0x6a5a3a, transparent:true, opacity:0.7});
function makeChain(x0, z0) {
  const pts = [
    new THREE.Vector3(x0, 2.6, z0),
    new THREE.Vector3(x0, 1.2, z0)
  ];
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(g, chainMat);
}
const chainL = makeChain(2.2 - 0.55, 1.0);
const chainR = makeChain(2.2 + 0.55, 1.0);
scene.add(chainL, chainR);

// ── Far landscape — distant hills + sky ──────────────────────────────
const hillsShader = {
  uniforms:{ time:{value:0}, lightning:{value:0}, lightningPos:{value:new THREE.Vector2(0,0)} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float lightning; uniform vec2 lightningPos;
    varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float s=0.,a=0.5; for(int i=0;i<5;i++){s+=a*n(p);p*=2.07;a*=0.5;} return s; }
    void main(){
      vec2 uv = vUv;
      // sky gradient (storm gray at top, deep purple at horizon)
      vec3 sky = mix(vec3(0.10,0.08,0.18), vec3(0.07,0.06,0.12), 1.0-uv.y);
      // turbulent storm clouds (top half)
      float cloud = fbm(uv*5.0 + vec2(time*0.05, 0.0));
      cloud = smoothstep(0.45, 0.85, cloud) * smoothstep(0.0, 1.0, uv.y);
      sky = mix(sky, vec3(0.06,0.05,0.10) * (0.5 + cloud * 0.8), cloud);
      // distant hill silhouettes (3 layers parallax via noise)
      float hill1 = step(uv.y, 0.32 + n(vec2(uv.x*4.0, 0.0))*0.06);
      float hill2 = step(uv.y, 0.28 + n(vec2(uv.x*3.0, 5.0))*0.04);
      float hill3 = step(uv.y, 0.25 + n(vec2(uv.x*2.0, 10.0))*0.02);
      vec3 hCol1 = vec3(0.04,0.05,0.08);
      vec3 hCol2 = vec3(0.06,0.06,0.10);
      vec3 hCol3 = vec3(0.08,0.08,0.12);
      sky = mix(sky, hCol1, hill1);
      sky = mix(sky, hCol2, hill2 - hill1);
      sky = mix(sky, hCol3, hill3 - hill2);
      // lightning flash from a position in sky
      float lDist = distance(uv, lightningPos);
      float flash = lightning * exp(-lDist * 4.0);
      sky += vec3(1.5, 1.4, 1.2) * flash;
      // lightning bolt path (vertical fbm column when lightning > 0.3)
      if (lightning > 0.3) {
        float boltX = lightningPos.x + (n(vec2(uv.y*30.0, time*5.0)) - 0.5) * 0.04;
        float boltDist = abs(uv.x - boltX);
        float bolt = exp(-boltDist*200.0) * smoothstep(0.0, 1.0, lightning);
        bolt *= step(uv.y, lightningPos.y); // only above hills
        sky += vec3(2.0, 1.8, 1.6) * bolt;
      }
      gl_FragColor = vec4(sky, 1.0);
    }`,
  side: THREE.BackSide
};
const hills = new THREE.Mesh(new THREE.PlaneGeometry(80, 30), new THREE.ShaderMaterial(hillsShader));
hills.position.set(0, 5, -25);
scene.add(hills);

// ── Rain — ahead, in front of the porch (not on it) ──────────────────
const RAIN_COUNT = 1500;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(RAIN_COUNT * 3);
const rainSpeed = new Float32Array(RAIN_COUNT);
function resetRain(i, partial) {
  rainPos[i*3+0] = (Math.random()-0.5) * 30;
  rainPos[i*3+1] = partial ? Math.random() * 12 : 10 + Math.random() * 4;
  rainPos[i*3+2] = -2 - Math.random() * 12;
  rainSpeed[i] = 16 + Math.random() * 8;
}
for (let i = 0; i < RAIN_COUNT; i++) resetRain(i, true);
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.ShaderMaterial({
  uniforms:{ lightning:{value:0} },
  vertexShader:`varying vec3 vP;
    void main(){ vP=position; vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize = 1.0 + 2.0/(-mv.z*0.1); gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`uniform float lightning; varying vec3 vP;
    void main(){
      vec3 col = vec3(0.4, 0.5, 0.6) * (0.4 + lightning * 1.2);
      gl_FragColor = vec4(col, 0.7);
    }`,
  transparent: true, depthWrite: false
});
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// ── Splashes on porch floor (where rain hits) ────────────────────────
// Implemented as additive ring sprites that grow + fade
const SPLASH_COUNT = 30;
const splashGeo = new THREE.BufferGeometry();
const splashPos = new Float32Array(SPLASH_COUNT * 3);
const splashAge = new Float32Array(SPLASH_COUNT);
for (let i = 0; i < SPLASH_COUNT; i++) {
  splashPos[i*3+0] = (Math.random()-0.5) * 14;
  splashPos[i*3+1] = 0;
  splashPos[i*3+2] = -1 - Math.random() * 4;
  splashAge[i] = Math.random() * 1.5;
}
splashGeo.setAttribute('position', new THREE.BufferAttribute(splashPos, 3));
const splashMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`attribute float age; varying float vA;
    void main(){ vA = age; vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize = 6.0 * age; gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`varying float vA;
    void main(){
      vec2 p = gl_PointCoord - 0.5; float r = length(p);
      if (r > 0.5) discard;
      float ring = smoothstep(0.45, 0.5, r) * smoothstep(0.5, 0.45, r);
      float a = ring * (1.0 - vA / 1.5) * 0.6;
      gl_FragColor = vec4(0.6, 0.7, 0.85, a);
    }`,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
splashGeo.setAttribute('age', new THREE.BufferAttribute(splashAge, 1));
const splashes = new THREE.Points(splashGeo, splashMat);
scene.add(splashes);

// ── Lighting ───────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x4060a0, 0.4);
scene.add(ambient);
const lightningLight = new THREE.PointLight(0xffffff, 0, 60, 1);
lightningLight.position.set(0, 15, -20);
scene.add(lightningLight);
const porchLight = new THREE.PointLight(0xffaa55, 0.8, 6, 1.5);
porchLight.position.set(-2.5, 2.4, 2);
scene.add(porchLight);

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx = null, masterGain;
let strikeCount = 0;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  // Continuous rain noise
  const rainBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = rainBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const rainSrc = audioCtx.createBufferSource();
  rainSrc.buffer = rainBuf; rainSrc.loop = true;
  const rainHP = audioCtx.createBiquadFilter();
  rainHP.type = 'highpass'; rainHP.frequency.value = 800;
  const rainLP = audioCtx.createBiquadFilter();
  rainLP.type = 'lowpass'; rainLP.frequency.value = 4500;
  const rainG = audioCtx.createGain(); rainG.gain.value = 0.35;
  rainSrc.connect(rainHP).connect(rainLP).connect(rainG).connect(masterGain);
  rainSrc.start();

  // Roof-on-rain (a slightly different frequency band, perceptually 'on top')
  const roofSrc = audioCtx.createBufferSource();
  roofSrc.buffer = rainBuf; roofSrc.loop = true;
  const roofBP = audioCtx.createBiquadFilter();
  roofBP.type = 'bandpass'; roofBP.frequency.value = 600; roofBP.Q.value = 0.6;
  const roofG = audioCtx.createGain(); roofG.gain.value = 0.18;
  roofSrc.connect(roofBP).connect(roofG).connect(masterGain);
  roofSrc.start();

  // Distant wind
  const windBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 6, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = windBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const windSrc = audioCtx.createBufferSource();
  windSrc.buffer = windBuf; windSrc.loop = true;
  const windLP = audioCtx.createBiquadFilter();
  windLP.type = 'lowpass'; windLP.frequency.value = 200; windLP.Q.value = 0.6;
  const windLFO = audioCtx.createOscillator();
  windLFO.frequency.value = 0.1;
  const windLFOG = audioCtx.createGain(); windLFOG.gain.value = 100;
  windLFO.connect(windLFOG); windLFOG.connect(windLP.frequency);
  const windG = audioCtx.createGain(); windG.gain.value = 0.10;
  windSrc.connect(windLP).connect(windG).connect(masterGain);
  windSrc.start(); windLFO.start();

  // Schedule lightning strikes
  function scheduleStrike() {
    const interval = 12 + Math.random() * 18; // every 12-30s
    setTimeout(() => { triggerStrike(); scheduleStrike(); }, interval * 1000);
  }
  scheduleStrike();

  // Schedule swing creaks
  function scheduleCreak() {
    const interval = 8 + Math.random() * 15;
    setTimeout(() => { triggerCreak(); scheduleCreak(); }, interval * 1000);
  }
  scheduleCreak();
}

function triggerStrike() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Visual flash (immediate)
  const intensity = 0.6 + Math.random() * 0.4;
  const sx = Math.random() - 0.5;  // -0.5 to 0.5 (screen-x of bolt)
  const sy = 0.4 + Math.random() * 0.3; // 0.4 to 0.7 (screen-y)
  hills.material.uniforms.lightning.value = intensity;
  hills.material.uniforms.lightningPos.value.set(sx + 0.5, sy);
  lightningLight.intensity = 6 * intensity;
  document.getElementById('flash').style.opacity = (0.18 * intensity).toString();
  setTimeout(() => {
    document.getElementById('flash').style.opacity = '0';
    lightningLight.intensity = 0;
    hills.material.uniforms.lightning.value = 0;
  }, 80 + Math.random()*120);
  strikeCount++;
  document.getElementById('strikes').textContent = strikeCount;

  // Distance (in km) determines thunder delay (343 m/s ≈ 1km per ~3s)
  const distanceKm = 1 + Math.random() * 8; // 1-9km away
  const delay = distanceKm * 3.0;
  const thunderVolume = Math.exp(-distanceKm / 4) * 0.7;
  const pan = sx * 1.5; // stereo pan based on lightning x-position

  setTimeout(() => playThunder(thunderVolume, pan, distanceKm), delay * 1000);
}

function playThunder(vol, pan, dist) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Thunder = burst of low-passed noise + sub-rumble
  const dur = 1.5 + Math.random() * 2;
  const tBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const td = tBuf.getChannelData(0);
  for (let i = 0; i < td.length; i++) {
    const env = Math.exp(-i/td.length * 2.5) * (1 - Math.exp(-i/td.length * 30));
    td[i] = (Math.random()*2-1) * env;
  }
  const ts = audioCtx.createBufferSource(); ts.buffer = tBuf;
  const tlp = audioCtx.createBiquadFilter();
  tlp.type = 'lowpass'; tlp.frequency.value = 200 + (4-dist)*60; tlp.Q.value = 0.8;
  const tg = audioCtx.createGain(); tg.gain.value = vol;
  const tp = audioCtx.createStereoPanner(); tp.pan.value = pan;
  ts.connect(tlp).connect(tg).connect(tp).connect(masterGain);
  ts.start(t0);

  // Sub-rumble (deep, reverberant)
  const subOsc = audioCtx.createOscillator();
  subOsc.type = 'sawtooth'; subOsc.frequency.value = 35 + Math.random()*15;
  const subG = audioCtx.createGain();
  subG.gain.value = 0;
  subG.gain.linearRampToValueAtTime(vol * 0.4, t0 + 0.1);
  subG.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  const subLP = audioCtx.createBiquadFilter();
  subLP.type = 'lowpass'; subLP.frequency.value = 80;
  subOsc.connect(subLP).connect(subG).connect(tp);
  subOsc.start(t0); subOsc.stop(t0 + dur + 0.1);
}

function triggerCreak() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Wood creak: short, slightly pitched, low-pass filter
  const dur = 0.7;
  const cBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const cd = cBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) {
    const env = Math.exp(-i/cd.length * 4);
    cd[i] = (Math.random()*2-1) * env * (Math.sin(i*0.05) + 0.3);
  }
  const cs = audioCtx.createBufferSource(); cs.buffer = cBuf;
  const cbp = audioCtx.createBiquadFilter();
  cbp.type = 'bandpass'; cbp.frequency.value = 400 + Math.random()*300; cbp.Q.value = 3;
  const cg = audioCtx.createGain(); cg.gain.value = 0.16;
  const cp = audioCtx.createStereoPanner(); cp.pan.value = 0.4 + (Math.random()-0.5)*0.3;
  cs.connect(cbp).connect(cg).connect(cp).connect(masterGain);
  cs.start(t0);
}

// ── Animation ──────────────────────────────────────────────────────
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  // Update rain
  for (let i = 0; i < RAIN_COUNT; i++) {
    rainPos[i*3+1] -= rainSpeed[i] * dt;
    if (rainPos[i*3+1] < 0) resetRain(i, false);
  }
  rainGeo.attributes.position.needsUpdate = true;
  rainMat.uniforms.lightning.value = hills.material.uniforms.lightning.value;

  // Update splashes (they age, then reset)
  let any = false;
  for (let i = 0; i < SPLASH_COUNT; i++) {
    splashAge[i] += dt * 2;
    if (splashAge[i] > 1.5) {
      splashAge[i] = 0;
      splashPos[i*3+0] = (Math.random()-0.5) * 14;
      splashPos[i*3+2] = -1 - Math.random() * 4;
      any = true;
    }
  }
  splashGeo.attributes.age.needsUpdate = true;
  if (any) splashGeo.attributes.position.needsUpdate = true;
  splashMat.uniforms.time.value = time;

  // Update porch wet shader
  porchFloorMat.uniforms.time.value = time;

  // Hills shader time
  hills.material.uniforms.time.value = time;

  // Swing gentle sway
  swingGroup.position.z = 1.0 + Math.sin(time * 0.55) * 0.06;
  swingGroup.rotation.x = Math.sin(time * 0.55) * 0.018;

  // Subtle camera breathing
  camera.position.x = Math.sin(time * 0.2) * 0.04;
  camera.position.y = 1.4 + Math.sin(time * 0.27) * 0.025;
  camera.lookAt(0, 1.0, -10);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Click to begin
document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
  // Trigger first strike soon
  setTimeout(triggerStrike, 4000);
});

// Optional: L key triggers manual strike
window.addEventListener('keydown', (e) => {
  if (e.key === 'l' || e.key === 'L') triggerStrike();
});
</script>
</body>
</html>
