<script type="module">
import * as THREE from 'three';

// =============================================================================
// CORE SETUP
// =============================================================================

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0805, 0.018);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.65, 16);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// =============================================================================
// CATHEDRAL DIMENSIONS (40m nave x 12m wide x 24m high, 6 bays)
// =============================================================================

const NAVE_LEN = 40;
const NAVE_WID = 12;
const NAVE_HGT = 24;
const BAYS = 6;
const BAY_LEN = NAVE_LEN / BAYS;
const HALF_LEN = NAVE_LEN / 2;
const HALF_WID = NAVE_WID / 2;

// =============================================================================
// SHARED GLSL SNIPPETS
// =============================================================================

const GLSL_NOISE = `
  // 2D hash + value noise + fbm
  float hash21(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
  }
  float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f*f*(3.0-2.0*f);
    float a = hash21(i);
    float b = hash21(i + vec2(1.0,0.0));
    float c = hash21(i + vec2(0.0,1.0));
    float d = hash21(i + vec2(1.0,1.0));
    return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
  }
  float fbm(vec2 p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 5; i++) {
      v += a * vnoise(p);
      p *= 2.03;
      a *= 0.5;
    }
    return v;
  }
`;

// =============================================================================
// STONE WALL SHADER (procedural blocks + dampness near base)
// =============================================================================

const stoneVS = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  void main() {
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    vNormal = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const stoneFS = `
  precision highp float;
  uniform float uTime;
  uniform vec3 uTint;
  uniform vec2 uBlockScale;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  ${GLSL_NOISE}

  float blocks(vec2 uv) {
    // Offset every other row
    vec2 g = uv * uBlockScale;
    float row = floor(g.y);
    g.x += mod(row, 2.0) * 0.5;
    vec2 cell = fract(g);
    float lineX = smoothstep(0.0, 0.02, cell.x) * smoothstep(0.0, 0.02, 1.0 - cell.x);
    float lineY = smoothstep(0.0, 0.02, cell.y) * smoothstep(0.0, 0.02, 1.0 - cell.y);
    return lineX * lineY;
  }

  void main() {
    vec2 uv = vUv;
    float n = fbm(uv * 14.0);
    float bk = blocks(uv);
    // Per-block darken
    vec2 g = uv * uBlockScale;
    float row = floor(g.y);
    g.x += mod(row, 2.0) * 0.5;
    vec2 ci = floor(g);
    float blockShade = 0.78 + 0.22 * hash21(ci);

    vec3 col = uTint * blockShade;
    col *= mix(0.78, 1.0, n);                  // mottle
    col = mix(col * 0.55, col, bk);            // mortar lines darker

    // Dampness gradient near base (world-space y)
    float damp = smoothstep(2.5, 0.0, vWorldPos.y);
    col = mix(col, col * vec3(0.55, 0.6, 0.65), damp * 0.55);

    // Soot gradient near top
    float soot = smoothstep(${(NAVE_HGT-6).toFixed(1)}, ${NAVE_HGT.toFixed(1)}, vWorldPos.y);
    col = mix(col, col * vec3(0.42, 0.4, 0.38), soot * 0.65);

    gl_FragColor = vec4(col, 1.0);
  }
`;

function makeStoneMaterial(tint = new THREE.Color(0x6e6450), blockScale = new THREE.Vector2(8, 18)) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uTint: { value: tint },
      uBlockScale: { value: blockScale }
    },
    vertexShader: stoneVS,
    fragmentShader: stoneFS,
    side: THREE.DoubleSide
  });
}

// =============================================================================
// STAINED GLASS SHADER (lead grid + colored quads + radial mandala + figure noise)
// =============================================================================

const stainedVS = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  void main() {
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const stainedFS = `
  precision highp float;
  uniform float uTime;
  uniform float uIntensity;     // emissive multiplier (driven by sun)
  uniform vec3  uPalette[4];    // 4 dominant colors for this window
  uniform float uRosette;       // 0 = lancet, 1 = rose window
  varying vec2 vUv;
  varying vec3 vWorldPos;
  ${GLSL_NOISE}

  vec3 paletteAt(float k) {
    k = clamp(k, 0.0, 0.999) * 4.0;
    int i = int(floor(k));
    if (i == 0) return uPalette[0];
    if (i == 1) return uPalette[1];
    if (i == 2) return uPalette[2];
    return uPalette[3];
  }

  float lead(vec2 cell, float w) {
    float lx = smoothstep(0.0, w, cell.x) * smoothstep(0.0, w, 1.0 - cell.x);
    float ly = smoothstep(0.0, w, cell.y) * smoothstep(0.0, w, 1.0 - cell.y);
    return lx * ly;
  }

  void main() {
    vec2 uv = vUv;

    vec3 baseCol;
    float panelMask = 1.0;

    if (uRosette < 0.5) {
      // Lancet: 4 cols x 8 rows of irregular tiles
      vec2 g = uv * vec2(4.0, 8.0);
      vec2 ci = floor(g);
      vec2 cf = fract(g);
      float h = hash21(ci);
      vec3 c = paletteAt(h);
      // sub-shapes: small noise + biblical figure suggestion
      float fig = fbm(uv * 6.0 + ci * 3.1);
      c *= 0.7 + 0.45 * fig;
      // jewel highlights
      float jewel = smoothstep(0.85, 0.99, hash21(ci + 7.7)) * smoothstep(0.4, 0.0, length(cf - 0.5));
      c += jewel * vec3(1.0, 0.95, 0.7) * 0.6;
      // lead grid
      float L = lead(cf, 0.04);
      panelMask = L;
      baseCol = c;
    } else {
      // Rose window: radial mandala
      vec2 p = uv - 0.5;
      float r = length(p) * 2.0;       // 0..1
      float a = atan(p.y, p.x);
      float petals = 12.0;
      float pa = mod(a * petals / 6.28318 + 0.5, 1.0);
      float ring = floor(r * 5.0);
      vec2 ci = vec2(floor(pa * petals), ring);
      float h = hash21(ci);
      vec3 c = paletteAt(h);
      // central rosette
      float center = smoothstep(0.1, 0.0, r);
      c = mix(c, vec3(1.0, 0.85, 0.4), center * 0.8);
      // outer fade to dark stone
      float outer = smoothstep(0.95, 1.05, r);
      panelMask = (1.0 - outer);
      // lead lines: radial spokes + ring boundaries
      float spoke = smoothstep(0.0, 0.04, abs(fract(pa) - 0.5));
      float rline = smoothstep(0.0, 0.04, abs(fract(r * 5.0) - 0.5));
      panelMask *= spoke * rline;
      baseCol = c;
    }

    // Figure noise: faint robed silhouettes
    float figure = fbm(uv * vec2(3.0, 5.0)) * 0.3;
    baseCol *= 0.85 + figure;

    // Subtle flicker as if real sunlight
    float flick = 0.95 + 0.05 * sin(uTime * 0.7 + vWorldPos.x * 0.4);

    vec3 col = baseCol * uIntensity * flick;
    col += baseCol * 0.15; // ambient self-glow

    gl_FragColor = vec4(col, 1.0);
  }
`;

function makeStainedGlass(palette, isRose = false) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uIntensity: { value: 1.5 },
      uPalette: { value: palette.map(c => new THREE.Color(c)) },
      uRosette: { value: isRose ? 1 : 0 }
    },
    vertexShader: stainedVS,
    fragmentShader: stainedFS,
    side: THREE.DoubleSide,
    transparent: false
  });
}

// 4 cool blue + 4 warm gold palettes
const COOL_PALETTES = [
  [0x1a3a8a, 0x2860c0, 0x88aaff, 0x0c1a4a],
  [0x163278, 0x4070d0, 0xa0c8ff, 0x081240],
  [0x224488, 0x3a78c8, 0x70a8ee, 0x0a1a40],
  [0x1c2c70, 0x4878c0, 0x90b4ee, 0x101848]
];
const WARM_PALETTES = [
  [0xc0481a, 0xe89030, 0xf0c850, 0x701808],
  [0xa83018, 0xd87830, 0xe8b040, 0x602010],
  [0xd86028, 0xf0a040, 0xf8d870, 0x782010],
  [0xb84020, 0xe88838, 0xe8b840, 0x682010]
];
const ROSE_PALETTE = [0xa01828, 0xe87030, 0x3060c0, 0xf0c050];

// =============================================================================
// PEW WOOD SHADER (grain noise)
// =============================================================================

const pewVS = stoneVS;
const pewFS = `
  precision highp float;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  ${GLSL_NOISE}
  void main() {
    vec2 uv = vUv * vec2(8.0, 1.0);
    float grain = fbm(uv * vec2(20.0, 2.0));
    float rings = sin(uv.x * 30.0 + grain * 4.0) * 0.5 + 0.5;
    vec3 dark = vec3(0.18, 0.10, 0.06);
    vec3 light = vec3(0.34, 0.20, 0.10);
    vec3 col = mix(dark, light, rings * 0.6 + grain * 0.4);
    // worn edges
    float edge = smoothstep(0.0, 0.02, vUv.x) * smoothstep(0.0, 0.02, 1.0 - vUv.x);
    col *= 0.7 + 0.3 * edge;
    gl_FragColor = vec4(col, 1.0);
  }
`;
const pewMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: pewVS,
  fragmentShader: pewFS,
  side: THREE.DoubleSide
});

// =============================================================================
// GOLD LEAF SHADER (anisotropic)
// =============================================================================

const goldFS = `
  precision highp float;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  ${GLSL_NOISE}
  void main() {
    float n = fbm(vUv * 20.0);
    vec3 col = mix(vec3(0.6, 0.45, 0.18), vec3(1.0, 0.85, 0.45), n);
    // anisotropic streak
    float streak = sin(vUv.y * 80.0 + n * 6.0) * 0.5 + 0.5;
    col *= 0.8 + 0.4 * streak;
    col += vec3(0.3, 0.22, 0.08); // emissive warm
    gl_FragColor = vec4(col, 1.0);
  }
`;
const goldMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: stoneVS,
  fragmentShader: goldFS,
  side: THREE.DoubleSide
});

// =============================================================================
// FLAGSTONE FLOOR SHADER
// =============================================================================

const floorFS = `
  precision highp float;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  ${GLSL_NOISE}
  void main() {
    vec2 uv = vUv * vec2(${NAVE_WID.toFixed(1)}, ${NAVE_LEN.toFixed(1)});
    vec2 g = uv;
    vec2 ci = floor(g);
    vec2 cf = fract(g);
    float h = hash21(ci);
    float n = fbm(uv * 4.0 + ci);
    vec3 col = mix(vec3(0.18,0.16,0.13), vec3(0.34,0.30,0.24), n) * (0.85 + 0.15 * h);
    float lx = smoothstep(0.0, 0.04, cf.x) * smoothstep(0.0, 0.04, 1.0 - cf.x);
    float ly = smoothstep(0.0, 0.04, cf.y) * smoothstep(0.0, 0.04, 1.0 - cf.y);
    col *= 0.4 + 0.6 * (lx * ly);
    // worn aisle path
    float aisle = smoothstep(2.0, 0.0, abs(vWorldPos.x));
    col = mix(col, col * 1.18, aisle * 0.4);
    gl_FragColor = vec4(col, 1.0);
  }
`;
const floorMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: stoneVS,
  fragmentShader: floorFS,
  side: THREE.DoubleSide
});

function buildSideWall(sign) {
  // sign = +1 right, -1 left
  const group = new THREE.Group();
  const x = sign * HALF_WID;
  // Window aperture per bay (centered): 2.4m wide x 6m tall, sill at 8m
  const winW = 2.6, winH = 7.0, sillY = 8.0;
  for (let b = 0; b < BAYS; b++) {
    const cz = -HALF_LEN + BAY_LEN * (b + 0.5);
    // wall below window
    const below = new THREE.Mesh(new THREE.PlaneGeometry(BAY_LEN, sillY), wallMat);
    below.position.set(x, sillY/2, cz);
    below.rotation.y = sign > 0 ? -Math.PI/2 : Math.PI/2;
    group.add(below);
    // wall above window
    const aboveH = NAVE_HGT - (sillY + winH);
    const above = new THREE.Mesh(new THREE.PlaneGeometry(BAY_LEN, aboveH), wallMat);
    above.position.set(x, sillY + winH + aboveH/2, cz);
    above.rotation.y = sign > 0 ? -Math.PI/2 : Math.PI/2;
    group.add(above);
    // wall left of window
    const sideW = (BAY_LEN - winW) / 2;
    const left = new THREE.Mesh(new THREE.PlaneGeometry(sideW, winH), wallMat);
    left.position.set(x, sillY + winH/2, cz - BAY_LEN/2 + sideW/2);
    left.rotation.y = sign > 0 ? -Math.PI/2 : Math.PI/2;
    group.add(left);
    const right = new THREE.Mesh(new THREE.PlaneGeometry(sideW, winH), wallMat);
    right.position.set(x, sillY + winH/2, cz + BAY_LEN/2 - sideW/2);
    right.rotation.y = sign > 0 ? -Math.PI/2 : Math.PI/2;
    group.add(right);
    // stained glass window in aperture
    // alternate cool/warm by bay; but spec says 4 cool / 4 warm with 8 windows total → 4 per side, but we have 6 bays.
    // We'll use 6 per side; first 3 cool, last 3 warm (or alternate).
    const palette = (b < 3)
      ? COOL_PALETTES[b % COOL_PALETTES.length]
      : WARM_PALETTES[b % WARM_PALETTES.length];
    const glassMat = makeStainedGlass(palette, false);
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), glassMat);
    glass.position.set(x - sign * 0.05, sillY + winH/2, cz);
    glass.rotation.y = sign > 0 ? -Math.PI/2 : Math.PI/2;
    glass.userData.isWindow = true;
    glass.userData.side = sign;
    glass.userData.bay = b;
    glass.userData.palette = palette;
    glass.userData.material = glassMat;
    group.add(glass);
    windows.push(glass);
  }
  return group;
}

// Vaulted ceiling: 6 bays of cross vaults — approximate with curved triangular panels per bay
function buildVault() {
  const group = new THREE.Group();
  const ribMat = makeStoneMaterial(new THREE.Color(0x453d2e), new THREE.Vector2(2, 2));
  const vaultMat = makeStoneMaterial(new THREE.Color(0x5c5240), new THREE.Vector2(4, 4));

  for (let b = 0; b < BAYS; b++) {
    const cz = -HALF_LEN + BAY_LEN * (b + 0.5);
    // Build two halves of cross vault per bay using curved geometry
    // Approximate as four triangle-fan panels
    const segments = 12;
    const apexY = NAVE_HGT;
    const springY = NAVE_HGT - 6;
    const halfBay = BAY_LEN / 2;

    // We'll build as a CylinderGeometry slice approximated by ParametricGeometry-free approach:
    // Make 4 quadrant meshes using BufferGeometry
    function quadrant(signX, signZ) {
      const pos = [];
      const idx = [];
      const uvs = [];
      // Grid: i=0..segments along longitudinal arc, j=0..segments along transverse arc
      for (let i = 0; i <= segments; i++) {
        for (let j = 0; j <= segments; j++) {
          const u = i / segments;
          const v = j / segments;
          // u along bay length (0 at center → 1 at edge)
          // v along nave width (0 at center → 1 at wall)
          const x = signX * v * HALF_WID;
          const z = cz + signZ * u * halfBay;
          // Vault height: max at center, drops at edges. Cross vault: y = apex - (1-cosA)*r along both axes
          const ang1 = u * Math.PI/2;
          const ang2 = v * Math.PI/2;
          const drop = (1 - Math.cos(ang1)) * (apexY - springY) * 0.5
                     + (1 - Math.cos(ang2)) * (apexY - springY) * 0.5;
          const y = apexY - drop;
          pos.push(x, y, z);
          uvs.push(u, v);
        }
      }
      for (let i = 0; i < segments; i++) {
        for (let j = 0; j < segments; j++) {
          const a = i*(segments+1) + j;
          const b1 = a + 1;
          const c = a + (segments+1);
          const d = c + 1;
          if (signX * signZ > 0) {
            idx.push(a,b1,c, b1,d,c);
          } else {
            idx.push(a,c,b1, b1,c,d);
          }
        }
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geom.setIndex(idx);
      geom.computeVertexNormals();
      return new THREE.Mesh(geom, vaultMat);
    }
    group.add(quadrant(+1, +1));
    group.add(quadrant(+1, -1));
    group.add(quadrant(-1, +1));
    group.add(quadrant(-1, -1));

    // Ribs: arches at the four edges
    function rib(x1,z1,x2,z2) {
      const arcSegs = 24;
      const pts = [];
      for (let k = 0; k <= arcSegs; k++) {
        const t = k / arcSegs;
        const x = x1 + (x2-x1) * t;
        const z = z1 + (z2-z1) * t;
        const a = (t - 0.5) * Math.PI;
        const y = apexY - (1 - Math.cos(a)) * (apexY - springY) * 0.5 * 2.0;
        pts.push(new THREE.Vector3(x, y, z));
      }
      const curve = new THREE.CatmullRomCurve3(pts);
      const ribGeom = new THREE.TubeGeometry(curve, 24, 0.18, 8, false);
      return new THREE.Mesh(ribGeom, ribMat);
    }
    group.add(rib(-HALF_WID, cz - halfBay, +HALF_WID, cz + halfBay));
    group.add(rib(-HALF_WID, cz + halfBay, +HALF_WID, cz - halfBay));
  }
  return group;
}
cathedral.add(buildVault());

// Columns at bay boundaries
function buildColumns() {
  const group = new THREE.Group();
  const colMat = makeStoneMaterial(new THREE.Color(0x6b6049), new THREE.Vector2(1, 8));
  for (let b = 0; b <= BAYS; b++) {

// =============================================================================
// LIGHT SHAFTS (cone meshes with additive volumetric shader)
// =============================================================================

const shaftVS = `
  varying vec3 vWorldPos;
  varying vec2 vUv;
  varying vec3 vLocalPos;
  void main() {
    vUv = uv;
    vLocalPos = position;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const shaftFS = `
  precision highp float;
  uniform float uTime;
  uniform vec3 uColor;
  uniform float uIntensity;
  varying vec3 vWorldPos;
  varying vec2 vUv;
  varying vec3 vLocalPos;
  ${GLSL_NOISE}
  void main() {
    // vUv.y goes 0 (top, source) → 1 (bottom, floor)
    float lengthFalloff = smoothstep(1.0, 0.05, vUv.y) * 0.6 + smoothstep(0.0, 0.4, vUv.y);
    // Radial falloff from cone center
    float radial = 1.0 - smoothstep(0.0, 1.0, vUv.y * 0.0); // placeholder; use local radius instead
    // local radius: distance from cone axis (which is Y in local cone space)
    float r = length(vLocalPos.xz);
    float maxR = mix(0.05, 1.5, vUv.y); // cone widens
    float radial2 = 1.0 - smoothstep(0.0, maxR, r);
    // Scrolling fbm noise (volumetric dust drift)
    vec2 nuv = vec2(vUv.x * 4.0 + uTime * 0.04, vUv.y * 6.0 + uTime * 0.02);
    float n = fbm(nuv);
    float vol = (0.55 + 0.45 * n) * radial2 * lengthFalloff;
    vec3 col = uColor * vol * uIntensity;
    gl_FragColor = vec4(col, vol);
  }
`;

function makeLightShaft(color) {
  const geo = new THREE.ConeGeometry(2.6, 26, 24, 1, true);
  // Note: ConeGeometry default has tip at +y, base at -y. UV.y goes 0..1 along height.
  geo.translate(0, -13, 0); // pivot at tip
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(color) },
      uIntensity: { value: 0 }
    },
    vertexShader: shaftVS,
    fragmentShader: shaftFS,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });
  return new THREE.Mesh(geo, mat);
}

// One shaft per window
const shafts = [];
for (const w of windows) {
  if (w.userData.bay === -1) continue; // skip rose for shaft (pointing into back)
  const palette = w.userData.palette;
  // pick a mid-bright color from palette
  const tintColor = new THREE.Color(palette[1]);
  const shaft = makeLightShaft(tintColor);
  // Position shaft tip at window center, pointing inward and downward
  w.getWorldPosition(shaft.position);
  // Aim from window into the nave floor center along the bay
  shaft.userData.window = w;
  shaft.userData.tipPos = shaft.position.clone();
  // Compute downward-inward direction
  const inward = new THREE.Vector3(-w.userData.side, 0, 0); // points to nave center
  const down = new THREE.Vector3(0, -1, 0);
  const dir = inward.clone().multiplyScalar(0.55).add(down).normalize();
  shaft.userData.dir = dir;
  // Orient cone: cone tip at +y in local. We want axis aligned with -dir (so tip at window, base toward floor).
  // ConeGeometry default points +Y; after translate the tip is at origin and base at -Y=-26.
  // So cone "down" is -Y locally. We want world dir = -Y (local) -> `quaternion.setFromUnitVectors(-Y_local, dir)`
  const fromAxis = new THREE.Vector3(0, -1, 0);
  shaft.quaternion.setFromUnitVectors(fromAxis, dir);
  scene.add(shaft);
  shafts.push(shaft);
}

// =============================================================================
// DUST MOTES (~600 particles, only bright when inside an active light cone)
// =============================================================================

const MOTE_COUNT = 600;
const moteGeom = new THREE.BufferGeometry();
const motePos = new Float32Array(MOTE_COUNT * 3);
const moteSeed = new Float32Array(MOTE_COUNT);
for (let i = 0; i < MOTE_COUNT; i++) {
  motePos[i*3+0] = (Math.random() - 0.5) * NAVE_WID * 0.95;
  motePos[i*3+1] = Math.random() * NAVE_HGT * 0.85 + 0.5;
  motePos[i*3+2] = (Math.random() - 0.5) * NAVE_LEN * 0.95;
  moteSeed[i] = Math.random();
}
moteGeom.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
moteGeom.setAttribute('aSeed', new THREE.BufferAttribute(moteSeed, 1));

const MAX_SHAFTS = 12;
const shaftTipsArr = new Float32Array(MAX_SHAFTS * 3);
const shaftDirsArr = new Float32Array(MAX_SHAFTS * 3);
const shaftColorsArr = new Float32Array(MAX_SHAFTS * 3);
const shaftIntsArr = new Float32Array(MAX_SHAFTS);

const moteMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uTips: { value: shaftTipsArr },
    uDirs: { value: shaftDirsArr },
    uColors: { value: shaftColorsArr },
    uIntensities: { value: shaftIntsArr },
    uShaftCount: { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute float aSeed;
    uniform float uTime;
    uniform vec3 uTips[${MAX_SHAFTS}];
    uniform vec3 uDirs[${MAX_SHAFTS}];
    uniform vec3 uColors[${MAX_SHAFTS}];
    uniform float uIntensities[${MAX_SHAFTS}];
    uniform int uShaftCount;
    uniform float uPixelRatio;
    varying vec3 vTint;
    varying float vBright;

    void main() {
      vec3 p = position;
      // Slow drift
      float t = uTime * 0.05;
      p.x += sin(t + aSeed * 6.28) * 0.6;
      p.y += sin(t * 0.7 + aSeed * 12.0) * 0.3 - mod(t * 0.06 + aSeed, 1.0) * 0.2;
      p.z += cos(t * 0.4 + aSeed * 9.0) * 0.4;

      // Test if p is within any active cone: project onto cone axis, check angle.
      float maxBright = 0.0;
      vec3 tint = vec3(0.0);
      for (int i = 0; i < ${MAX_SHAFTS}; i++) {
        if (i >= uShaftCount) break;
        vec3 toP = p - uTips[i];
        float along = dot(toP, uDirs[i]);
        if (along < 0.0 || along > 26.0) continue;
        vec3 axisPt = uTips[i] + uDirs[i] * along;
        float r = length(p - axisPt);
        float maxR = mix(0.05, 2.6, along / 26.0);
        if (r < maxR) {
          float radial = 1.0 - r / maxR;
          float bright = radial * uIntensities[i];
          if (bright > maxBright) {
            maxBright = bright;
            tint = uColors[i];
          }
        }
      }
      vBright = maxBright;
      vTint = tint;

      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = (1.4 + maxBright * 4.0) * uPixelRatio * (40.0 / -mv.z);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vTint;
    varying float vBright;
    void main() {
      vec2 c = gl_PointCoord - 0.5;
      float d = length(c);
      if (d > 0.5) discard;
      float a = smoothstep(0.5, 0.0, d);
      vec3 col = mix(vec3(0.05,0.04,0.03), vTint, vBright);
      col += vTint * vBright * 1.5;
      float alpha = a * (0.08 + vBright * 0.9);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const motes = new THREE.Points(moteGeom, moteMat);
scene.add(motes);

// =============================================================================
// CANDLE FLAME SHADER + ENTITIES
// =============================================================================

const flameVS = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  void main() {
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    // Billboard
    vec3 cameraRight = vec3(viewMatrix[0][0], viewMatrix[1][0], viewMatrix[2][0]);
    vec3 cameraUp = vec3(viewMatrix[0][1], viewMatrix[1][1], viewMatrix[2][1]);
    vec3 worldPos = (modelMatrix * vec4(0.0,0.0,0.0,1.0)).xyz
                  + cameraRight * position.x
                  + cameraUp * position.y;
    gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
  }
`;
const flameFS = `
  precision highp float;
  uniform float uTime;
  uniform float uSeed;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  ${GLSL_NOISE}
  void main() {
    vec2 p = vUv - vec2(0.5, 0.0);
    p.x *= 1.8;
    float t = uTime * 2.0 + uSeed;
    // Distort flame body
    float flick = fbm(vec2(p.x * 4.0, p.y * 5.0 - t)) * 0.6;
    float teardrop = 1.0 - smoothstep(0.0, 0.55, abs(p.x) + p.y * 0.55);
    teardrop *= smoothstep(0.0, 0.05, p.y);
    teardrop *= smoothstep(1.0, 0.5, p.y);
    float core = teardrop * (0.5 + flick);
    // Color gradient: white core → yellow → orange → red edge
    vec3 white = vec3(1.0, 0.95, 0.7);
    vec3 yellow = vec3(1.0, 0.75, 0.25);
    vec3 orange = vec3(1.0, 0.45, 0.1);
    vec3 col = mix(orange, yellow, smoothstep(0.0, 0.6, core));
    col = mix(col, white, smoothstep(0.6, 1.0, core));
    // Halo
    float halo = exp(-length(p * vec2(2.5, 1.5))) * 0.4;
    col += vec3(1.0, 0.7, 0.3) * halo;
    float a = clamp(core + halo, 0.0, 1.0);
    gl_FragColor = vec4(col, a);
  }
`;

const candles = []; // { mesh, light, flameMat, seed }
let candleCount = 0;

function lightCandle() {
  if (candleCount >= 24) return;
  // Spawn position along stand (3m wide), centered
  const idx = candleCount;
  const row = Math.floor(idx / 8);
  const col = idx % 8;
  const x = -1.3 + col * 0.37;
  const y = 0.95 + row * 0.0;
  const z = -0.05 + row * 0.18;

  const group = new THREE.Group();

  // Wax body
  const wax = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.05, 0.32, 12),
    new THREE.MeshBasicMaterial({ color: 0xece0c0 })
  );
  wax.position.set(0, 0.16, 0);
  group.add(wax);

  // Flame billboard
  const flameMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uSeed: { value: Math.random() * 100 }
    },
    vertexShader: flameVS,
    fragmentShader: flameFS,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const flame = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 0.34), flameMat);
  flame.position.set(0, 0.50, 0);
  group.add(flame);

  // Point light
  const pl = new THREE.PointLight(0xffaa55, 1.4, 6.0, 2.0);
  pl.position.set(0, 0.55, 0);
  group.add(pl);

  group.position.set(x, y, z);
  candleRack.add(group);

  candles.push({ group, flameMat, light: pl, baseIntensity: 1.4, seed: Math.random() * 100 });
  candleCount++;

  // Audio
  if (audio.ready) playCandleLight();
}

// =============================================================================
// TIME OF DAY (8 minute cycle = 480s)
// =============================================================================

const DAY_LENGTH = 480; // seconds
let timeOfDay = 0.30; // 0..1, start at mid-afternoon

// 0 = midnight, 0.25 = sunrise (east, +Z), 0.5 = noon (top), 0.75 = sunset (west, -Z), 1 = back to midnight
function updateTimeOfDay(dt) {
  timeOfDay = (timeOfDay + dt / DAY_LENGTH) % 1;
}

// Sun direction in world space; returns vec3
function sunDirection() {
  // Sun travels in a circle around the cathedral. Cathedral runs along Z axis (long axis).
  // Side walls face +X and -X. East side = +X (left from interior facing -Z), West = -X.
  const angle = (timeOfDay - 0.25) * Math.PI * 2; // sunrise at angle=0
  // Sun azimuth: from +X (east) → +Y (top) → -X (west) → underground
  const sx = Math.cos(angle);
  const sy = Math.sin(angle);
  const sz = 0; // simplification: sun on east-west plane
  return new THREE.Vector3(sx, sy, sz);
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
let pointerLocked = false;
let dragging = false;
let lastMouseX = 0, lastMouseY = 0;

renderer.domElement.addEventListener('click', () => {
  if (!pointerLocked) renderer.domElement.requestPointerLock?.();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});

renderer.domElement.addEventListener('mousedown', e => {
  if (!pointerLocked) { dragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; }
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (pointerLocked) {
    yaw   -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
  } else if (dragging) {
    yaw   -= (e.clientX - lastMouseX) * 0.0042;
    pitch -= (e.clientY - lastMouseY) * 0.0042;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
  }
  pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
});

window.addEventListener('keydown', e => {
  if (e.code === 'KeyE') tryLightCandle();
  if (e.code === 'Space') { e.preventDefault(); ringBell(); }
});

function tryLightCandle() {
  // Only when near candle rack
  const rackPos = new THREE.Vector3();
  candleStand.getWorldPosition(rackPos);
  const d = rackPos.distanceTo(camera.position);
  if (d < 5.0) lightCandle();
}

// Camera movement bounds (inside cathedral, clear of walls/pews/altar)
function clampCameraPos(p) {
  p.x = Math.max(-HALF_WID + 1.0, Math.min(HALF_WID - 1.0, p.x));
  p.z = Math.max(-HALF_LEN + 4.5, Math.min(HALF_LEN - 1.0, p.z));
  p.y = 1.65;
  return p;
}

// =============================================================================
// AUDIO (gated behind first user gesture)
// =============================================================================

const audio = {
  ctx: null,
  ready: false,
  master: null,
  reverb: null,
  drone: null,
  chant: null,
  bell: null,
  lastChant: 0,
  nextChantAt: 25,
  lastBell: 0,
  nextBellAt: 60 + Math.random() * 240
};

function buildReverbImpulse(ctx, seconds = 5.0, decay = 3.0) {
  const rate = ctx.sampleRate;
  const length = rate * seconds;
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const t = i / length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
    }
  }
  return impulse;
}

function startAudio() {
  if (audio.ready) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  const ctx = new Ctx();
  audio.ctx = ctx;
  // Master
  const master = ctx.createGain();
  master.gain.value = 0.42;
  master.connect(ctx.destination);
  audio.master = master;
  // Reverb
  const conv = ctx.createConvolver();
  conv.buffer = buildReverbImpulse(ctx, 5.5, 3.2);
  const reverbWet = ctx.createGain();
  reverbWet.gain.value = 0.7;
  conv.connect(reverbWet).connect(master);
  audio.reverb = conv;
  // Dry bus
  const dry = ctx.createGain();
  dry.gain.value = 0.6;
  dry.connect(master);
  audio.dry = dry;

  // Drone: 4-voice C-minor (C2, Eb2, G2, C3)
  const droneFreqs = [65.4, 77.78, 98.0, 130.8];
  const droneGain = ctx.createGain();
  droneGain.gain.value = 0.0;
  droneGain.connect(conv);
  droneGain.connect(dry);
  for (const f of droneFreqs) {
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    const g = ctx.createGain();
    g.gain.value = 0.18;
    // slow LFO on amplitude
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.05 + Math.random() * 0.04;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.04;
    lfo.connect(lfoGain).connect(g.gain);
    lfo.start();
    o.connect(g).connect(droneGain);
    o.start();
  }
  // Fade in drone
  droneGain.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 6);
  audio.drone = droneGain;

  audio.ready = true;
}

// Procedural Gregorian chant (FM voice + formant biquads)
// Dorian on D: D E F G A B C D
const DORIAN = [146.83, 164.81, 174.61, 196.0, 220.0, 246.94, 261.63, 293.66];
function playChantPhrase() {
  if (!audio.ready) return;
  const ctx = audio.ctx;
  const phraseLen = 3 + Math.floor(Math.random() * 5); // 3-7 syllables
  const t0 = ctx.currentTime + 0.5;
  const noteDur = 0.85 + Math.random() * 0.5;
  const phraseGain = ctx.createGain();
  phraseGain.gain.value = 0.0;
  // Heavy reverb
  const wetSend = ctx.createGain();
  wetSend.gain.value = 1.0;
  phraseGain.connect(wetSend).connect(audio.reverb);
  const drySend = ctx.createGain();
  drySend.gain.value = 0.18;
  phraseGain.connect(drySend).connect(audio.dry);

  // Formant filter chain (vowel "ah" formants approx: 730, 1090, 2440)
  const f1 = ctx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=730; f1.Q.value=10;
  const f2 = ctx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=1090; f2.Q.value=12;
  const f3 = ctx.createBiquadFilter(); f3.type='bandpass'; f3.frequency.value=2440; f3.Q.value=14;
  const formantGain = ctx.createGain(); formantGain.gain.value = 4.0;
  f1.connect(formantGain);
  f2.connect(formantGain);
  f3.connect(formantGain);
  formantGain.connect(phraseGain);

  // Build syllables
  let cursor = t0;
  for (let s = 0; s < phraseLen; s++) {
    const noteIdx = Math.floor(Math.random() * 5); // tend to lower part of mode
    const f = DORIAN[noteIdx] * 0.5; // octave down
    // FM voice: carrier = saw-ish (square+harmonics), modulator at 0.5x
    const car = ctx.createOscillator();
    car.type = 'sawtooth';
    car.frequency.value = f;
    const mod = ctx.createOscillator();
    mod.type = 'sine';
    mod.frequency.value = f * 1.5;
    const modGain = ctx.createGain();
    modGain.gain.value = f * 0.4;
    mod.connect(modGain).connect(car.frequency);
    const gate = ctx.createGain();
    gate.gain.value = 0;
    car.connect(gate);
    // Route through formants
    gate.connect(f1);
    gate.connect(f2);
    gate.connect(f3);
    // ADSR
    const dur = noteDur * (0.8 + Math.random() * 0.4);
    gate.gain.setValueAtTime(0, cursor);
    gate.gain.linearRampToValueAtTime(0.18, cursor + 0.2);
    gate.gain.linearRampToValueAtTime(0.14, cursor + dur * 0.7);
    gate.gain.linearRampToValueAtTime(0.0, cursor + dur);
    car.start(cursor);
    car.stop(cursor + dur + 0.05);
    mod.start(cursor);
    mod.stop(cursor + dur + 0.05);
    cursor += dur * 0.95;
  }
  // Phrase envelope
  phraseGain.gain.setValueAtTime(0, t0);
  phraseGain.gain.linearRampToValueAtTime(0.7, t0 + 0.4);
  phraseGain.gain.linearRampToValueAtTime(0.55, cursor - 0.3);
  phraseGain.gain.linearRampToValueAtTime(0.0, cursor + 0.5);
}

function ringBell() {
  if (!audio.ready) return;
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  // Bell: sum of inharmonic partials, exponential decay
  const partials = [0.5, 1.0, 1.5, 2.0, 2.51, 2.66, 3.01, 4.1, 5.43, 6.79];
  const gains    = [0.4, 1.0, 0.5, 0.7, 0.4, 0.3, 0.5, 0.2, 0.15, 0.1];
  const fundamental = 220 + (Math.random() - 0.5) * 6;
  const bellGain = ctx.createGain();
  bellGain.gain.value = 0.7;
  bellGain.connect(audio.reverb);
  bellGain.connect(audio.dry);
  for (let i = 0; i < partials.length; i++) {
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = fundamental * partials[i];
    const g = ctx.createGain();
    g.gain.value = 0;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gains[i] * 0.35, t0 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 4.0 + i * 0.2);
    o.connect(g).connect(bellGain);
    o.start(t0);
    o.stop(t0 + 5.5);
  }
  audio.lastBell = totalTime;
  audio.nextBellAt = totalTime + 300 + Math.random() * 240; // 5-9 min
}

function playCandleLight() {
  if (!audio.ready) return;
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  // Soft "whoosh" — filtered noise burst
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.35, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const f = ctx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 1800; f.Q.value = 1.2;
  const g = ctx.createGain();
  g.gain.value = 0.18;
  src.connect(f).connect(g).connect(audio.reverb);
  src.start(t0);
}

function playFootstep() {
  if (!audio.ready) return;
  const ctx = audio.ctx;
  const t0 = ctx.currentTime;
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 4);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 800;
  const g = ctx.createGain();
  g.gain.value = 0.12;
  src.connect(f).connect(g);
  g.connect(audio.reverb);
  g.connect(audio.dry);
  src.start(t0);
}

// =============================================================================
// HUD: time-of-day dial
// =============================================================================

const todCanvas = document.getElementById('tod');
const todCtx = todCanvas.getContext('2d');
function drawTOD() {
  const w = todCanvas.width, h = todCanvas.height;
  todCtx.clearRect(0,0,w,h);
  const cx = w/2, cy = h/2, r = 22;
  todCtx.strokeStyle = '#6a5a3a';
  todCtx.lineWidth = 1;
  todCtx.beginPath(); todCtx.arc(cx, cy, r, 0, Math.PI*2); todCtx.stroke();
  // Sun marker
  const ang = (timeOfDay - 0.25) * Math.PI * 2;
  const sx = cx + Math.cos(ang) * r;
  const sy = cy - Math.sin(ang) * r;
  // Color by phase
  const sun = sunDirection();
  const above = Math.max(0, sun.y);
  const c = above > 0.05 ? '#e8c887' : '#605066';
  todCtx.fillStyle = c;
  todCtx.beginPath(); todCtx.arc(sx, sy, 3, 0, Math.PI*2); todCtx.fill();
  // Labels
  todCtx.fillStyle = '#8a7a52';
  todCtx.font = '8px serif';
  todCtx.textAlign = 'center';
  let phase = '';
  if (above > 0.5) phase = 'NOON';
  else if (above > 0.05 && sun.x > 0) phase = 'MORN';
  else if (above > 0.05 && sun.x < 0) phase = 'EVE';
  else phase = 'NIGHT';
  todCtx.fillText(phase, cx, h - 4);
}

    promptEl.classList.add('show');
  } else {
    promptEl.classList.remove('show');
  }
}

// =============================================================================
// GATE / START
// =============================================================================

const gate = document.getElementById('gate');
let started = false;
function startExperience() {
  if (started) return;
  started = true;
  startAudio();
  gate.classList.add('fading');
  setTimeout(() => { gate.style.display = 'none'; }, 1500);
}
gate.addEventListener('click', startExperience);
window.addEventListener('keydown', e => {
  if (!started && (e.code === 'Enter' || e.code === 'Space')) startExperience();
});

// =============================================================================
// MAIN LOOP
// =============================================================================

let lastT = performance.now() / 1000;
let totalTime = 0;
const moveVel = new THREE.Vector3();
let footTimer = 0;

function tick() {
  const now = performance.now() / 1000;
  let dt = now - lastT; lastT = now;
  if (dt > 0.1) dt = 0.1;
  totalTime += dt;

  // --- Time of day ---
  updateTimeOfDay(dt);
  const sun = sunDirection();

  // --- Update window shaft intensities based on sun direction ---
  // Active window = on the side facing the sun.
  // Side +1 (right) windows face +X; activate when sun.x > 0
  // Side -1 (left) windows face -X; activate when sun.x < 0
  // Intensity = max(0, sun.dot(windowNormal)) * (sun above horizon)
  const aboveFactor = Math.max(0, sun.y);
  let activeShafts = 0;
  for (let i = 0; i < shafts.length; i++) {
    const sh = shafts[i];
    const w = sh.userData.window;
    const side = w.userData.side; // +1 or -1
    // Window normal (pointing inward): -side, 0, 0
    const normal = new THREE.Vector3(-side, 0, 0);
    const dot = Math.max(0, sun.x * (-normal.x));
    // Wait—sun.dot(outward normal). Outward normal = (side, 0, 0).
    const facing = Math.max(0, sun.x * side);
    const intensity = facing * aboveFactor;
    sh.material.uniforms.uIntensity.value = intensity * 1.6;
    sh.material.uniforms.uTime.value = totalTime;
    sh.visible = intensity > 0.02;
    // Glass intensity
    w.userData.material.uniforms.uIntensity.value = 0.7 + intensity * 2.4;
    w.userData.material.uniforms.uTime.value = totalTime;
    if (sh.visible && activeShafts < MAX_SHAFTS) {
      // pack into mote uniform arrays
      const tip = sh.userData.tipPos;
      const dir = sh.userData.dir;
      const col = new THREE.Color(w.userData.palette[1]);
      shaftTipsArr[activeShafts*3+0] = tip.x;
      shaftTipsArr[activeShafts*3+1] = tip.y;
      shaftTipsArr[activeShafts*3+2] = tip.z;
      shaftDirsArr[activeShafts*3+0] = dir.x;
      shaftDirsArr[activeShafts*3+1] = dir.y;
      shaftDirsArr[activeShafts*3+2] = dir.z;
      shaftColorsArr[activeShafts*3+0] = col.r;
      shaftColorsArr[activeShafts*3+1] = col.g;
      shaftColorsArr[activeShafts*3+2] = col.b;
      shaftIntsArr[activeShafts] = intensity;
      activeShafts++;
    }
  }
  // Rose window (always visible, intensity tracks aboveFactor)
  rose.userData.material.uniforms.uIntensity.value = 0.5 + aboveFactor * 2.0;
  rose.userData.material.uniforms.uTime.value = totalTime;

  moteMat.uniforms.uTime.value = totalTime;
  moteMat.uniforms.uShaftCount.value = activeShafts;

  // Update window point lights
  for (const pl of windowLights) {
    const w = pl.userData.window;
    const side = w.userData.side;
    const facing = Math.max(0, sun.x * side);
    pl.intensity = facing * aboveFactor * 1.4;
  }

  // --- Movement ---
  const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 5.0 : 2.6;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
  moveVel.set(0,0,0);
  if (keys['KeyW'] || keys['ArrowUp'])    moveVel.add(forward);
  if (keys['KeyS'] || keys['ArrowDown'])  moveVel.sub(forward);
  if (keys['KeyD'] || keys['ArrowRight']) moveVel.add(right);
  if (keys['KeyA'] || keys['ArrowLeft'])  moveVel.sub(right);
  if (moveVel.lengthSq() > 0) {
    moveVel.normalize().multiplyScalar(speed * dt);
    camera.position.add(moveVel);
    clampCameraPos(camera.position);
    footTimer += dt * speed * 0.6;
    if (footTimer > 0.6) { playFootstep(); footTimer = 0; }
  }

  // Camera rotation
  const e = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(e);

  // --- Candles ---
  for (const c of candles) {
    c.flameMat.uniforms.uTime.value = totalTime;
    // Flicker the light intensity
    const flick = 0.7 + Math.sin(totalTime * 9 + c.seed) * 0.15
                     + Math.sin(totalTime * 23 + c.seed * 2) * 0.08;
    c.light.intensity = c.baseIntensity * flick;
  }

  // --- Audio scheduling ---
  if (audio.ready) {
    if (totalTime > audio.nextChantAt) {
      playChantPhrase();
      audio.nextChantAt = totalTime + 30 + Math.random() * 60;
    }
    if (totalTime > audio.nextBellAt && audio.lastBell === 0) {
      // first bell after 5-9 min (already scheduled in init)
      ringBell();
    } else if (audio.lastBell > 0 && totalTime > audio.nextBellAt) {
      ringBell();
    }
  }

  // --- HUD ---
  drawTOD();
  updatePrompt();

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

// Initial fade-in: dim exposure briefly
renderer.toneMappingExposure = 0.0;
const startFade = performance.now();
function fadeIn() {
  const t = (performance.now() - startFade) / 3000;
  renderer.toneMappingExposure = Math.min(1.0, t);
  if (t < 1) requestAnimationFrame(fadeIn);
}
fadeIn();

</script>
