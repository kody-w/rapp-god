const woodFloorShader = {
  vert: `
    varying vec2 vUv; varying vec3 vWorld; varying vec3 vNormal;
    void main(){
      vUv = uv * vec2(8.0, 1.5);
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWorld = wp.xyz; vNormal = normalize(normalMatrix*normal);
      gl_Position = projectionMatrix*viewMatrix*wp;

  frag: `
    precision highp float;
    varying vec2 vUv; varying vec3 vWorld; varying vec3 vNormal;
    uniform float uTime; uniform vec3 uLamp; uniform vec3 uCam;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p);
      float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
      vec2 u=f*f*(3.0-2.0*f);
      return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
    }
    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.05;a*=0.5;}return v;}
    void main(){
      vec2 uv = vUv;
      float plank = floor(uv.y*4.0);
      float seed = hash(vec2(plank,1.0));
      uv.x += seed*3.0;
      float grain = fbm(vec2(uv.x*22.0, uv.y*1.6 + seed*8.0));
      float rings = sin(uv.x*40.0 + grain*9.0 + seed*30.0)*0.5+0.5;
      rings = pow(rings, 2.5);
      vec3 dark = vec3(0.18,0.10,0.05);
      vec3 mid  = vec3(0.36,0.22,0.11);
      vec3 lite = vec3(0.55,0.36,0.20);
      vec3 col = mix(dark, mid, grain);
      col = mix(col, lite, rings*0.45);
      // plank gap
      float gap = smoothstep(0.0,0.02,fract(uv.y*4.0))*smoothstep(1.0,0.98,fract(uv.y*4.0));
      col *= mix(0.25, 1.0, gap);
      // dust
      float dust = fbm(vUv*60.0)*0.12;
      col += dust*vec3(0.6,0.5,0.4);
      // lamp falloff
      float d = length(vWorld.xz - uLamp.xz);
      float lamp = exp(-d*0.10) * 1.4;
      col *= 0.32 + lamp*vec3(1.0,0.78,0.5);
      // boot scuffs near center walking path
      float scuff = smoothstep(2.0,0.0,abs(vWorld.x))*smoothstep(0.2,0.0,abs(fbm(vUv*8.0)-0.5));
      col *= 1.0 - scuff*0.18;
      gl_FragColor = vec4(col,1.0);
    }`
};

      col = mix(col, vec3(0.1,0.06,0.03), max(minTick*0.7, hourTick));
      // patina greenish in cracks
      float patina = (sin(vUv.x*120.0)*sin(vUv.y*120.0))*0.5+0.5;
      col = mix(col, vec3(0.4,0.55,0.4), uPatina*patina*0.25);
      // brushed circular streaks
      float brush = sin(ang*80.0 + r*40.0)*0.5+0.5;
      col *= 0.85+brush*0.18;
      // outer dark
      col = mix(col, vec3(0.15,0.10,0.04), ring);
      // discard outside circle
      if(r>0.50) discard;
      // lamp
      float d = length(vWorld-uLamp);
      float lamp = exp(-d*0.10);
      col *= 0.25 + lamp*vec3(1.0,0.78,0.5)*1.6;
      // specular highlight
      vec3 V = normalize(uCam-vWorld);
      vec3 L = normalize(uLamp-vWorld);
      vec3 H = normalize(L+V);
      float spec = pow(max(dot(vN,H),0.0), 60.0);
      col += spec*vec3(1.0,0.85,0.5)*0.7;
      gl_FragColor = vec4(col,1.0);
    }`
};

const glassShader = {
  vert: `varying vec3 vWorld; varying vec3 vN;
    void main(){vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz;
      vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*viewMatrix*wp;}`,
  frag: `
    precision highp float;
    varying vec3 vWorld; varying vec3 vN;
    uniform vec3 uCam; uniform vec3 uLamp;
    void main(){
      vec3 V = normalize(uCam-vWorld);
      float fres = pow(1.0-max(dot(vN,V),0.0), 3.0);
      vec3 L = normalize(uLamp-vWorld);
      vec3 H = normalize(L+V);
      float spec = pow(max(dot(vN,H),0.0), 80.0);
      vec3 col = vec3(0.85,0.7,0.45)*spec + vec3(0.4,0.32,0.2)*fres*0.6;
      float alpha = 0.10 + fres*0.55 + spec*0.5;
      gl_FragColor = vec4(col, alpha);
    }`
};

const mahoganyShader = {
  vert: `varying vec2 vUv; varying vec3 vWorld; varying vec3 vN;
    void main(){vUv=uv; vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz;
      vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*viewMatrix*wp;}`,
  frag: `
    precision highp float;
    varying vec2 vUv; varying vec3 vWorld; varying vec3 vN;
    uniform vec3 uLamp; uniform vec3 uCam;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p),f=fract(p);
      float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
      vec2 u=f*f*(3.0-2.0*f);
      return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;}
    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}
    void main(){
      vec2 uv = vUv*vec2(2.0,8.0);
      float grain = fbm(uv*4.0);
      float rings = sin(uv.y*20.0+grain*6.0)*0.5+0.5;
      rings = pow(rings,3.0);
      vec3 dark = vec3(0.20,0.06,0.03);
      vec3 mid  = vec3(0.40,0.13,0.06);
      vec3 high = vec3(0.55,0.22,0.10);
      vec3 col = mix(dark,mid,grain);
      col = mix(col,high,rings*0.6);
      // varnish gloss
      vec3 V = normalize(uCam-vWorld);
      vec3 L = normalize(uLamp-vWorld);
      vec3 H = normalize(L+V);
      float spec = pow(max(dot(vN,H),0.0), 30.0);
      col += spec*vec3(1.0,0.8,0.5)*0.5;
      // lamp
      float d=length(vWorld-uLamp);
      col *= 0.20 + exp(-d*0.10)*vec3(1.0,0.78,0.5)*1.5;
      gl_FragColor = vec4(col,1.0);
    }`
};

const cuckooHouseShader = {
  vert: `varying vec2 vUv; varying vec3 vWorld;
    void main(){vUv=uv; vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz;
      gl_Position=projectionMatrix*viewMatrix*wp;}`,
  frag: `
    precision highp float;
    varying vec2 vUv; varying vec3 vWorld;
    uniform vec3 uLamp; uniform float uHue;
    void main(){
      vec3 base = mix(vec3(0.45,0.18,0.10), vec3(0.30,0.40,0.18), uHue);
      // carved leaves pattern
      float leaves = sin(vUv.x*30.0)*sin(vUv.y*22.0+1.5);
      leaves = smoothstep(0.3,0.6,leaves);
      vec3 col = mix(base, base*1.3, leaves);
      // beam stripes
      float beam = step(0.92, sin(vUv.y*4.0)*0.5+0.5);
      col = mix(col, vec3(0.20,0.08,0.04), beam);
      // dirt
      col *= 0.85 + 0.3*sin(vUv.x*60.0+vUv.y*47.0);
      float d = length(vWorld-uLamp);
      col *= 0.25 + exp(-d*0.10)*vec3(1.0,0.78,0.5)*1.4;
      gl_FragColor = vec4(col,1.0);
    }`
};

const goldChainShader = {
  vert: `varying vec3 vWorld; varying vec3 vN; varying vec2 vUv;
    void main(){vUv=uv; vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz;
      vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*viewMatrix*wp;}`,
  frag: `
    precision highp float;
    varying vec3 vWorld; varying vec3 vN; varying vec2 vUv;
    uniform vec3 uLamp; uniform vec3 uCam;
    void main(){
      vec3 gold = vec3(1.0,0.78,0.32);
      float links = step(0.5, fract(vUv.y*40.0));
      vec3 col = gold * (0.7+0.5*links);
      vec3 V = normalize(uCam-vWorld);
      vec3 L = normalize(uLamp-vWorld);
      vec3 H = normalize(L+V);
      float spec = pow(max(dot(vN,H),0.0),40.0);
      col += spec*vec3(1.0,0.85,0.5);
      float d = length(vWorld-uLamp);
      col *= 0.4+exp(-d*0.10)*1.5;
      gl_FragColor = vec4(col,1.0);
    }`
};

const ownerShader = {
  vert: `varying vec3 vWorld; varying vec3 vN;
    void main(){vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz;
      vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*viewMatrix*wp;}`,
  frag: `
    precision highp float;
    varying vec3 vWorld; varying vec3 vN;
    uniform vec3 uLamp;
    void main(){
      // dark silhouette tinted by lamp
      vec3 base = vec3(0.04,0.03,0.025);
      float d = length(vWorld-uLamp);
      float lamp = exp(-d*0.18);
      vec3 rim = vec3(1.0,0.65,0.35) * lamp * pow(1.0-abs(vN.z),2.0)*0.7;
      vec3 col = base + rim;
      gl_FragColor = vec4(col,1.0);
    }`
};

function clockFaceGroup(radius, patina){
  const grp = new THREE.Group();
  const faceMat = new THREE.ShaderMaterial({
    uniforms: {...sharedUniforms(), uPatina:{value:patina||0.3}},
    vertexShader: brassFaceShader.vert,
    fragmentShader: brassFaceShader.frag,
    transparent:true
  });
  const face = new THREE.Mesh(new THREE.CircleGeometry(radius, 48), faceMat);
  grp.add(face);
  // glass cover
  const glassMat = new THREE.ShaderMaterial({
    uniforms: sharedUniforms(),
    vertexShader: glassShader.vert,
    fragmentShader: glassShader.frag,
    transparent:true,
    depthWrite:false
  });
  const glass = new THREE.Mesh(new THREE.CircleGeometry(radius*1.02, 32), glassMat);
  glass.position.z = 0.01;
  grp.add(glass);
  // hands
  const hourHand = new THREE.Mesh(
    new THREE.PlaneGeometry(radius*0.06, radius*0.55),
    new THREE.MeshBasicMaterial({color:0x140a04, side:THREE.DoubleSide})
  );
  hourHand.position.set(0, radius*0.22, 0.005);
  const hourPivot = new THREE.Group();
  hourPivot.add(hourHand);
  hourPivot.position.z = 0.005;
  grp.add(hourPivot);

  const minHand = new THREE.Mesh(
    new THREE.PlaneGeometry(radius*0.04, radius*0.78),
    new THREE.MeshBasicMaterial({color:0x140a04, side:THREE.DoubleSide})
  );
  minHand.position.set(0, radius*0.32, 0.006);
  const minPivot = new THREE.Group();
  minPivot.add(minHand);
  minPivot.position.z = 0.006;
  grp.add(minPivot);

  const secHand = new THREE.Mesh(
    new THREE.PlaneGeometry(radius*0.014, radius*0.85),
    new THREE.MeshBasicMaterial({color:0x802010, side:THREE.DoubleSide})
  );
  secHand.position.set(0, radius*0.36, 0.007);
  const secPivot = new THREE.Group();
  secPivot.add(secHand);
  secPivot.position.z = 0.007;
  grp.add(secPivot);

  // center cap
  const cap = new THREE.Mesh(
    new THREE.CircleGeometry(radius*0.04, 16),
    new THREE.MeshBasicMaterial({color:0x2a1408})
  );
  cap.position.z = 0.012;
  grp.add(cap);

  return {grp, hourPivot, minPivot, secPivot};
}

// ============================================================
// SIMULATED TIME (real * 600). Start near 18:54.
// ============================================================
let simStart = 18*3600 + 54*60; // seconds since midnight
let realStart = performance.now()/1000;
function getSimSeconds(){
  return simStart + (performance.now()/1000 - realStart)*600;
}
function formatSim(sec){
  sec = ((sec%86400)+86400)%86400;
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// SPACE: skip to next hour
function skipToHour(){
  const sec = getSimSeconds();
  const nextHour = Math.ceil(sec/3600)*3600;
  const advance = (nextHour - sec) - 3; // arrive 3s before for chime windup
  // adjust simStart so getSimSeconds() jumps forward by `advance`
  simStart += advance;
  // schedule hour chime at the new time
  scheduleHourChime(Math.floor(nextHour/3600)%24);
}

// ============================================================
// AUDIO SYSTEM — Web Audio
// ============================================================
let audioCtx = null;
let masterGain = null;
let convolver = null;
let dryGain = null, wetGain = null;
let audioReady = false;
let lastCuckooHour = -1;

function makeImpulseResponse(ctx, duration, decay){
  const sr = ctx.sampleRate;
  const len = sr*duration;
  const ir = ctx.createBuffer(2, len, sr);
  for(let c=0;c<2;c++){
    const ch = ir.getChannelData(c);
    for(let i=0;i<len;i++){
      ch[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
  }
  return ir;
}

function startAudio(){
  if(audioReady) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);

  // Reverb
  convolver = audioCtx.createConvolver();
  convolver.buffer = makeImpulseResponse(audioCtx, 2.4, 2.5);
  dryGain = audioCtx.createGain(); dryGain.gain.value = 0.78;
  wetGain = audioCtx.createGain(); wetGain.gain.value = 0.32;
  dryGain.connect(masterGain);
  convolver.connect(wetGain).connect(masterGain);

  audioReady = true;

  // initialize each clock's nextTick at slight stagger
  const t0 = audioCtx.currentTime + 0.25;
  for(const c of clocks){
    c.nextTick = t0 + Math.random()*c.tickPeriod;
  }
  // start scheduler
  scheduleLoop();
  startSnore();
  startPendulumWhoosh();
}

// Tick: short filtered noise burst
function scheduleTick(time, freq, gain, isPocket){
  if(!audioReady) return;
  const dur = isPocket ? 0.006 : (0.008 + Math.random()*0.006);
  const bufLen = Math.floor(audioCtx.sampleRate*dur);
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufLen;i++){
    const env = Math.pow(1 - i/bufLen, 2.5);
    d[i] = (Math.random()*2-1) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = freq;
  bp.Q.value = 8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(gain*(isPocket?0.3:1.0), time+0.001);
  g.gain.exponentialRampToValueAtTime(0.0001, time+dur);
  src.connect(bp).connect(g);
  g.connect(dryGain);
  // tiny reverb send
  const sendG = audioCtx.createGain();
  sendG.gain.value = 0.10;
  g.connect(sendG); sendG.connect(convolver);
  src.start(time);
  src.stop(time+dur+0.05);
}

let displayTickClockId = Math.floor(Math.random()*30);
function scheduleLoop(){
  if(!audioReady) return;
  const lookahead = 0.12;
  const horizon = audioCtx.currentTime + lookahead;
  for(const c of clocks){
    while(c.nextTick < horizon){
      const isPocket = c.type === 'pocket';
      scheduleTick(c.nextTick, c.tickFreq, c.tickGain, isPocket);
      c.nextTick += c.tickPeriod;
      c.tickCount++;
    }
  }
  setTimeout(scheduleLoop, 25);
}

// Cuckoo call (FM with vibrato): "cu-coo!"
function cuckooCall(time, pitchOffset){
  if(!audioReady) return;
  // "cu" — short
  function chirp(t, freq, dur, level){
    const carrier = audioCtx.createOscillator();
    carrier.type = 'sine';
    const mod = audioCtx.createOscillator();
    const modGain = audioCtx.createGain();
    mod.frequency.value = 6;
    modGain.gain.value = 22; // vibrato depth
    mod.connect(modGain).connect(carrier.frequency);
    carrier.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(level, t+0.03);
    g.gain.linearRampToValueAtTime(level*0.85, t+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    carrier.connect(g);
    g.connect(dryGain);
    const send = audioCtx.createGain(); send.gain.value = 0.4;
    g.connect(send); send.connect(convolver);
    carrier.start(t); carrier.stop(t+dur+0.05);
    mod.start(t); mod.stop(t+dur+0.05);
  }
  const base = 700 + pitchOffset*40;
  chirp(time, base, 0.15, 0.18);
  chirp(time+0.18, base*0.78, 0.32, 0.22);
}

function triggerCuckooCacophony(){
  if(!audioReady) return;
  const t0 = audioCtx.currentTime + 0.1;
  // 5 cuckoo clocks, each fires multiple times spaced randomly across 8 seconds
  for(let i=0;i<cuckooClocks.length;i++){
    const cc = cuckooClocks[i];
    cc._cacophonyEnd = performance.now()/1000 + 8.0;
    const calls = 6 + Math.floor(Math.random()*3);
    for(let k=0;k<calls;k++){
      const offset = Math.random()*7.5;
      cuckooCall(t0+offset, i);
      // schedule door open/close by storing as DOM-side animation events
      setTimeout(()=>{ cc._doorOpen = true; cc._doorOpenUntil = performance.now()/1000+0.45; },
        offset*1000);
    }
  }
}

// Grandfather hour chime: 3-5 strikes of bronze tone
function scheduleHourChime(hour){
  if(!audioReady) return;
  const strikes = (hour===0)?12:(hour>12?hour-12:hour);
  const max = Math.min(strikes, 12);
  const t0 = audioCtx.currentTime + 0.05;
  for(let i=0;i<max;i++){
    bronzeChime(t0 + i*0.55);
  }
}

function bronzeChime(t){
  if(!audioReady) return;
  // Multiple sine partials
  const partials = [220, 330, 466, 660, 880];
  const amps    = [0.28, 0.18, 0.10, 0.06, 0.04];
  for(let i=0;i<partials.length;i++){
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = partials[i] * (1 + (Math.random()-0.5)*0.003);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(amps[i], t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0005, t+2.5);
    o.connect(g); g.connect(dryGain);
    const send = audioCtx.createGain(); send.gain.value = 0.55;
    g.connect(send); send.connect(convolver);
    o.start(t); o.stop(t+2.6);
  }
}

// Owner snore: low sawtooth blip every ~3s
function startSnore(){
  if(!audioReady) return;
  function next(){
    const t = audioCtx.currentTime + 0.05;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(70, t);
    o.frequency.linearRampToValueAtTime(110, t+0.4);
    o.frequency.linearRampToValueAtTime(60, t+1.1);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 280;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.05, t+0.2);
    g.gain.linearRampToValueAtTime(0.04, t+0.7);
    g.gain.exponentialRampToValueAtTime(0.0005, t+1.2);
    o.connect(lp).connect(g).connect(dryGain);
    const send = audioCtx.createGain(); send.gain.value = 0.2;
    g.connect(send); send.connect(convolver);
    o.start(t); o.stop(t+1.3);
    setTimeout(next, 2800 + Math.random()*1800);
  }
  next();
}

// Rare pendulum whoosh
function startPendulumWhoosh(){
  if(!audioReady) return;
  function next(){
    const t = audioCtx.currentTime + 0.05;
    const dur = 0.6;
    const bufLen = Math.floor(audioCtx.sampleRate*dur);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<bufLen;i++){ d[i] = (Math.random()*2-1)*0.5; }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 320;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.07, t+0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    src.connect(lp).connect(g).connect(dryGain);
    const send = audioCtx.createGain(); send.gain.value = 0.4;
    g.connect(send); send.connect(convolver);
    src.start(t); src.stop(t+dur+0.05);
    setTimeout(next, 6000 + Math.random()*8000);
  }
  setTimeout(next, 4000);
}

// ============================================================
// HOUR / CUCKOO TRIGGERS — checked each frame
// ============================================================
let lastHourTriggered = -1;
function checkScheduledEvents(simSec){
  const h = Math.floor(simSec/3600)%24;
  const m = Math.floor((simSec%3600)/60);
  const s = simSec%60;
  // We trigger right at top-of-hour (m==0, s<1)
  if(m===0 && s<1.0 && h !== lastHourTriggered){
    lastHourTriggered = h;
    if(h===19){
      // 7 PM: cuckoo cacophony
      triggerCuckooCacophony();
      // cuckoo clocks also drive their door animation flags
    }
    // grandfather chime on any hour
    scheduleHourChime(h);
  }
}

  '(in this room, anyway)',
  '(nobody really knows)',
  '(by the wall clock)',
  '(by the grandfather)',
  '(if the moon is right)',
];
let noteIndex = 0;
setInterval(()=>{
  noteIndex = (noteIndex+1)%noteOptions.length;
  hudNote.textContent = noteOptions[noteIndex];
}, 4500);
hudNote.textContent = noteOptions[0];

// ============================================================
// MAIN LOOP
// ============================================================
const tmpVec = new THREE.Vector3();
const moveVec = new THREE.Vector3();
let prev = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now-prev)/1000);
  prev = now;
  const t = now*0.001;

  // Simulated time
  const simSec = getSimSeconds();
  hudTime.textContent = formatSim(simSec);
  checkScheduledEvents(simSec);

  // Camera movement
  const speed = (keys['ShiftLeft']||keys['ShiftRight'])?2.6:1.4;
  moveVec.set(0,0,0);
  if(keys['KeyW']) moveVec.z -= 1;
  if(keys['KeyS']) moveVec.z += 1;
  if(keys['KeyA']) moveVec.x -= 1;
  if(keys['KeyD']) moveVec.x += 1;
  if(moveVec.lengthSq()>0){
    moveVec.normalize().multiplyScalar(speed*dt);
    // rotate by yaw
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const dx = moveVec.x*cy - moveVec.z*sy;
    const dz = moveVec.x*sy + moveVec.z*cy;
    camera.position.x += dx;
    camera.position.z += dz;
  }
  // bob
  if(moveVec.lengthSq()>0){
    camera.position.y = 1.65 + Math.sin(t*7)*0.012;
  } else {
    camera.position.y += (1.65 - camera.position.y)*0.05;
  }
  // Constrain
  camera.position.x = Math.max(SHOP.minX+0.4, Math.min(SHOP.maxX-0.4, camera.position.x));
  camera.position.z = Math.max(SHOP.minZ+0.4, Math.min(SHOP.maxZ-0.4, camera.position.z));

  // Look (yaw + pitch)
  const dir = new THREE.Vector3(
    Math.sin(yaw)*Math.cos(pitch),
    Math.sin(pitch),
    -Math.cos(yaw)*Math.cos(pitch)
  );
  camera.lookAt(camera.position.x+dir.x, camera.position.y+dir.y, camera.position.z+dir.z);

  // Update shared shader uniforms
  scene.traverse(obj=>{
    if(obj.material && obj.material.uniforms){
      const u = obj.material.uniforms;
      if(u.uTime) u.uTime.value = t;
      if(u.uCam) u.uCam.value.copy(camera.position);
    }
  });

  // Update each clock
  for(const c of clocks){
    const local = simSec + c.simOffset;
    const sec = ((local%60)+60)%60;
    const min = ((local/60)%60+60)%60;
    const hr  = ((local/3600)%12+12)%12;
    c.secPivot.rotation.z = -sec/60 * Math.PI*2;
    c.minPivot.rotation.z = -min/60 * Math.PI*2;
    c.hourPivot.rotation.z = -hr/12 * Math.PI*2;
    if(c.pendulum){
      c.pendulum.rotation.z = Math.sin(t*Math.PI/c.tickPeriod + c.id) * 0.18;
    }
    // cuckoo door animation
    if(c.type==='cuckoo'){
      const open = c._doorOpen && (performance.now()/1000 < (c._doorOpenUntil||0));
      if(!open){ c._doorOpen = false; }
      const target = open ? 1.0 : 0.0;
      c._doorAnim = (c._doorAnim||0) + (target - (c._doorAnim||0))*0.25;
      c.doorL.rotation.y = -c._doorAnim*1.2;
      c.doorR.rotation.y =  c._doorAnim*1.2;
      c.bird.visible = c._doorAnim>0.05;
      c.bird.position.z = 0.08 + c._doorAnim*0.10;
    }
  }

  // Owner breathing
  ownerGroup.scale.y = 1 + Math.sin(t*0.55)*0.012;

  // bell tiny shimmer
  bell.rotation.y = Math.sin(t*0.2)*0.02;

  // tick stream display (random clock)
  if((now|0)%200<20){
    const c = clocks[displayTickClockId];
    hudTick.textContent = `clock #${c.id+1} (${c.type}) · ${c.tickCount} ticks`;
    if(Math.random()<0.05) displayTickClockId = Math.floor(Math.random()*clocks.length);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
