    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        // THREE may load later (importmap modules) — keep trying briefly
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      // ── Auto-pause on tab hidden ──────────────────────────────────────
      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS + auto-tuner + HUD ─────────────────────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — click to toggle visibility';
        hud.textContent = '✦ GOLD';
        let v = false;
        hud.onclick = () => { v = !v; hud.style.opacity = v ? '1' : '0.25'; };
        document.body.appendChild(hud);
        hud.style.opacity = '1';
        setTimeout(() => { hud.style.opacity = '0.25'; }, 4000);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
              if (hud) hud.textContent += ' ↓';
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }

        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      // If the page creates an AudioContext that's suspended, show overlay until user clicks.
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞] enhancement layer active —', tier, 'cap', PIXEL_CAP);
    })();

<script type="module">
import * as THREE from 'three';

/* ============================================================
   MUSEUM AFTER HOURS
   - One scene. One T-Rex. A whole lot of marble silence.
   - All shaders, geometry, audio, controls inline.
   ============================================================ */

const stage = document.getElementById('stage');
const placard = document.getElementById('placard');
const hint = document.getElementById('hint');
const gate = document.getElementById('gate');

/* ---------- Renderer ---------- */
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

/* ---------- Scene + Fog ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.FogExp2(0x0a0a10, 0.038);

/* ---------- Camera ---------- */
const camera = new THREE.PerspectiveCamera(
  62, window.innerWidth / window.innerHeight, 0.05, 220
);
camera.position.set(0, 1.65, 14);

/* ============================================================
   HALL DIMENSIONS
   ============================================================ */
const HALL = {
  width: 28,
  length: 56,
  height: 9,
  halfW: 14,
  halfL: 28
};

/* ============================================================
   MARBLE FLOOR (custom GLSL with FBM veining)
   ============================================================ */
const floorGeo = new THREE.PlaneGeometry(HALL.width, HALL.length, 1, 1);
floorGeo.rotateX(-Math.PI / 2);

const floorUniforms = {
  uTime: { value: 0 },
  uTint: { value: new THREE.Color(0x1a1a22) },
  uVein: { value: new THREE.Color(0x6a5a44) },
  uHigh: { value: new THREE.Color(0x2a2832) },
  uReflect: { value: 0.55 },
  uTileScale: { value: 4.0 }
};

const floorMat = new THREE.ShaderMaterial({
  uniforms: floorUniforms,
  vertexShader: /* glsl */`
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    uniform float uTime;
    uniform vec3 uTint;
    uniform vec3 uVein;
    uniform vec3 uHigh;
    uniform float uReflect;
    uniform float uTileScale;

    /* hash + noise + fbm */
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p); vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(a, b, u.x) + (c - a)*u.y*(1.0 - u.x) + (d - b)*u.x*u.y;
    }
    float fbm(vec2 p){
      float v = 0.0; float a = 0.5;
      for(int i=0;i<6;i++){
        v += a * noise(p);
        p *= 2.02; a *= 0.5;
      }
      return v;
    }

    void main(){
      vec2 p = vWorldPos.xz * 0.18;

      /* Tile lines */
      vec2 tile = vWorldPos.xz / uTileScale;
      vec2 tileF = abs(fract(tile) - 0.5);
      float grout = smoothstep(0.49, 0.495, max(tileF.x, tileF.y));

      /* Marble veining */
      float n = fbm(p * 1.6);
      float swirl = fbm(p * 0.6 + vec2(n*1.2, n*0.8));
      float vein = smoothstep(0.45, 0.55, swirl);
      float vein2 = smoothstep(0.62, 0.66, fbm(p*3.2 + swirl*2.0));

      /* Base color blend */
      vec3 col = mix(uTint, uHigh, n*0.6);
      col = mix(col, uVein, vein * 0.45);
      col = mix(col, vec3(0.85,0.78,0.62), vein2 * 0.18);

      /* Wet-marble specular hint based on world distance to camera */
      float dist = length(vWorldPos.xz);
      float sheen = pow(1.0 - clamp(dist*0.025, 0.0, 1.0), 3.0);
      col += sheen * uReflect * vec3(0.18, 0.16, 0.12);

      /* Reflective ghost of overhead lights */
      float beam = exp(-pow(vWorldPos.x*0.6, 2.0)) * exp(-pow((vWorldPos.z+4.0)*0.18, 2.0));
      col += beam * vec3(0.55, 0.42, 0.22) * 0.35;

      /* Grout lines (cool dark) */
      col = mix(col * 0.45, col, 1.0 - grout);

      /* Subtle amber glow puddles near sconce x columns */
      float p1 = smoothstep(2.5, 0.0, length(vWorldPos.xz - vec2(-12.0,  -8.0)));
      float p2 = smoothstep(2.5, 0.0, length(vWorldPos.xz - vec2( 12.0,  -8.0)));
      float p3 = smoothstep(2.5, 0.0, length(vWorldPos.xz - vec2(-12.0,   8.0)));
      float p4 = smoothstep(2.5, 0.0, length(vWorldPos.xz - vec2( 12.0,   8.0)));
      float pg = (p1+p2+p3+p4) * 0.35;
      col += pg * vec3(0.7, 0.45, 0.18);

      /* Slight desaturation in shadows */
      float lum = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(lum)*0.6, col, 0.92);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

const sconces = [];
function addSconce(x, z, side){
  const group = new THREE.Group();
  const wallX = side * (HALL.halfW - 0.2);
  group.position.set(wallX, 5.5, z);

  /* brass back plate */
  const back = new THREE.Mesh(

    })

  group.add(back);

  /* glass shade */
  const shade = new THREE.Mesh(
    new THREE.SphereGeometry(0.28, 18, 14, 0, Math.PI * 2, 0, Math.PI * 0.6),
    new THREE.MeshStandardMaterial({
      color: 0xffd28a, emissive: 0xff9c40, emissiveIntensity: 1.6,
      roughness: 0.4, metalness: 0.0, transparent: true, opacity: 0.85
    })

function bone(geo, x, y, z, rx=0, ry=0, rz=0, mat=boneMat){
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

const spinePoints = [];
for (let i = 0; i <= 18; i++){
  const t = i / 18;
  // S-curve from hips forward and up
  const x = 0;
  const z = -t * 3.6;                     // forward
  const y = hipY + Math.sin(t * Math.PI) * 0.6 + t * 0.6; // arch up to neck
  spinePoints.push(new THREE.Vector3(x, y, z));
}
spinePoints.forEach((p, i) => {
  const r = 0.18 - i * 0.004;
  const v = bone(new THREE.SphereGeometry(Math.max(r, 0.09), 12, 10),

});

/* Ribcage — arc of capsules sweeping down from the spine */
function rib(spineIdx, side, length, bend){
  const sp = spinePoints[spineIdx];
  const g = new THREE.CapsuleGeometry(0.05, length, 4, 8);
  const m = bone(g, sp.x + side * 0.2, sp.y - 0.4, sp.z, 0, 0, side * (0.55 + bend));
  m.position.x = sp.x + side * Math.cos(0.55 + bend) * length * 0.5;
  m.position.y = sp.y - Math.sin(0.55 + bend) * length * 0.5;
  m.position.z = sp.z;
  trex.add(m);
}
for (let i = 2; i <= 9; i++){
  const len = 1.5 - Math.abs(i - 5) * 0.08;
  rib(i, -1, len, (i - 5) * 0.04);
  rib(i,  1, len, (i - 5) * 0.04);
}

/* Upper teeth */
function addTeeth(parent, yOffset, count, dir){
  for (let i = 0; i < count; i++){
    const t = i / (count - 1);
    const x = (t - 0.5) * 0.55;
    const z = -0.2 - t * 0.7 * (1 - Math.abs(t - 0.5) * 0.4);
    const tooth = new THREE.Mesh(
      new THREE.ConeGeometry(0.035, 0.16, 6),
      boneMat
    );
    tooth.position.set(x, yOffset, z);
    tooth.rotation.x = dir * Math.PI;
    tooth.castShadow = true;
    parent.add(tooth);
  }
}

  const p = new THREE.Vector3().lerpVectors(spinePoints[spinePoints.length - 1],
    skullGroup.position, t);
  const v = bone(new THREE.SphereGeometry(0.18 - i*0.02, 10, 8),
    p.x, p.y, p.z, 0, 0, 0, boneDarkMat);

}

/* Tail — extends back from hip with gentle curve and taper */
const tailSegs = 16;
for (let i = 0; i < tailSegs; i++){
  const t = i / (tailSegs - 1);
  const x = 0;
  const z = t * 5.5;                              // backward
  const y = hipY + Math.sin(t * Math.PI * 0.8) * 0.4 - t * 0.7;
  const r = 0.32 * (1 - t * 0.85);
  const v = bone(new THREE.SphereGeometry(Math.max(r, 0.05), 10, 8),
    x, y, z, 0, 0, 0, boneDarkMat);
  trex.add(v);

  if (i < tailSegs - 1){
    const next_t = (i+1) / (tailSegs - 1);
    const nz = next_t * 5.5;
    const ny = hipY + Math.sin(next_t * Math.PI * 0.8) * 0.4 - next_t * 0.7;
    const dx = 0, dy = ny - y, dz = nz - z;
    const len = Math.sqrt(dy*dy + dz*dz);
    const seg = new THREE.Mesh(
      new THREE.CapsuleGeometry(Math.max(r * 0.55, 0.03), len * 0.9, 4, 8),
      boneMat
    );
    seg.position.set(0, y + dy*0.5, z + dz*0.5);
    seg.lookAt(new THREE.Vector3(0, ny, nz));
    seg.rotation.x += Math.PI/2;
    seg.castShadow = true;
    trex.add(seg);
  }
}

/* Legs — jointed cylinders, mid-stride */
function leg(side, forward){
  const hipPos = new THREE.Vector3(side * 0.55, hipY - 0.1, 0.1);

  /* Femur down + slightly forward/back */
  const femurLen = 1.6;
  const femurAngle = forward ? 0.25 : -0.25;
  const femurEnd = new THREE.Vector3(
    hipPos.x,
    hipPos.y - femurLen * Math.cos(femurAngle),
    hipPos.z + femurLen * Math.sin(femurAngle)
  );
  const femur = new THREE.Mesh(
    new THREE.CylinderGeometry(0.16, 0.13, femurLen, 14),
    boneMat
  );
  femur.position.copy(hipPos.clone().lerp(femurEnd, 0.5));
  femur.lookAt(femurEnd);
  femur.rotation.x += Math.PI/2;
  femur.castShadow = true;
  trex.add(femur);

  /* Knee + tibia angled back-down */
  const tibiaLen = 1.5;
  const tibiaAngle = forward ? -0.4 : 0.5;
  const tibiaEnd = new THREE.Vector3(
    femurEnd.x,
    femurEnd.y - tibiaLen * Math.cos(tibiaAngle),
    femurEnd.z + tibiaLen * Math.sin(tibiaAngle)
  );
  tibiaEnd.y = Math.max(tibiaEnd.y, 0.65);
  const tibia = new THREE.Mesh(
    new THREE.CylinderGeometry(0.11, 0.08, tibiaLen, 12),
    boneDarkMat
  );
  tibia.position.copy(femurEnd.clone().lerp(tibiaEnd, 0.5));
  tibia.lookAt(tibiaEnd);
  tibia.rotation.x += Math.PI/2;
  tibia.castShadow = true;
  trex.add(tibia);

  /* Knee cap */
  const knee = bone(new THREE.SphereGeometry(0.18, 10, 8),
    femurEnd.x, femurEnd.y, femurEnd.z, 0,0,0, boneDarkMat);
  trex.add(knee);

  /* Foot */
  const foot = bone(new THREE.BoxGeometry(0.35, 0.16, 0.7),
    tibiaEnd.x, 0.7, tibiaEnd.z + 0.15, 0, 0, 0, boneMat);
  trex.add(foot);

  /* Toes */
  for (let i = -1; i <= 1; i++){
    const toe = bone(new THREE.ConeGeometry(0.06, 0.32, 8),
      tibiaEnd.x + i * 0.13, 0.62, tibiaEnd.z + 0.55,
      Math.PI/2, 0, 0, boneMat);
    trex.add(toe);
  }
}

/* Plaque — small brass plate facing the visitor side */
function makePlaque(text){
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 192;
  const ctx = cv.getContext('2d');
  /* brushed brass */
  const grd = ctx.createLinearGradient(0, 0, 0, 192);
  grd.addColorStop(0, '#a0782e');
  grd.addColorStop(0.5, '#7a5618');
  grd.addColorStop(1, '#5e4014');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, 512, 192);
  /* engraved text */
  ctx.fillStyle = 'rgba(20,12,4,0.75)';
  ctx.font = '600 22px Georgia, serif';
  ctx.textBaseline = 'top';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, 28, 32 + i * 32);
  });
  /* engraved highlight */
  ctx.fillStyle = 'rgba(255,225,170,0.18)';
  ctx.fillRect(0, 0, 512, 2);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return new THREE.MeshStandardMaterial({
    map: tex, roughness: 0.32, metalness: 0.85
  });
}

function addCase(x, z, rotY, artifactIdx){
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.rotation.y = rotY;

  /* Wooden base */
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 1.0, 1.2), woodMat
  );
  base.position.y = 0.5;
  base.castShadow = true; base.receiveShadow = true;
  group.add(base);
  /* base trim */
  const baseTrim = new THREE.Mesh(
    new THREE.BoxGeometry(1.7, 0.05, 1.3), brassMat
  );
  baseTrim.position.y = 1.02;
  group.add(baseTrim);

  /* Glass case */
  const glassH = 1.3;
  const glassY = 1.0 + glassH/2;

  /* four glass panels */
  const panel = (w, h, d, lx, ly, lz, ry=0) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), glassMat);
    m.position.set(lx, ly, lz);
    m.rotation.y = ry;
    group.add(m);
  };
  panel(1.5, glassH, 0.02,  0, glassY,  0.6);
  panel(1.5, glassH, 0.02,  0, glassY, -0.6);
  panel(0.02, glassH, 1.2, -0.75, glassY, 0);
  panel(0.02, glassH, 1.2,  0.75, glassY, 0);
  /* top */
  const glassTop = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.02, 1.2), glassMat
  );
  glassTop.position.y = 1.0 + glassH;
  group.add(glassTop);

  /* brass corner posts */
  [[-0.75,-0.6],[0.75,-0.6],[-0.75,0.6],[0.75,0.6]].forEach(([px,pz]) => {
    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, glassH, 8),
      brassMat
    );
    post.position.set(px, glassY, pz);
    group.add(post);
  });

  /* spotlight inside */
  const innerLight = new THREE.PointLight(0xffeac0, 0.7, 2.4, 2.0);
  innerLight.position.set(0, glassY + 0.4, 0);
  group.add(innerLight);

  /* artifact */
  const a = ARTIFACTS[artifactIdx];
  const kind = ART_KINDS[artifactIdx % ART_KINDS.length];
  const color = ART_COLORS[artifactIdx % ART_COLORS.length];
  const artifact = makeArtifact(kind, color);
  artifact.position.y = 1.0;
  group.add(artifact);

  /* brass plaque on the base front */
  const plaqueMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9, 0.34),
    makePlaque(`${a.title}\n${a.binomial}\n${a.cat}`)
  );
  plaqueMesh.position.set(0, 0.55, 0.611);
  group.add(plaqueMesh);

  scene.add(group);
  cases.push({
    group,
    box: new THREE.Box3().setFromObject(base).expandByScalar(0.4),
    artifact: a,
    pos: group.position.clone(),
    light: innerLight
  });
}

/* Collision: keep camera inside hall + outside plinth/cases */
function collideMove(next){
  const r = 0.45;
  next.x = Math.max(-HALL.halfW + r + 1.0, Math.min(HALL.halfW - r - 1.0, next.x));
  next.z = Math.max(-HALL.halfL + r + 1.5, Math.min(HALL.halfL - r - 1.5, next.z));

  /* T-Rex plinth */
  const plinthBox = new THREE.Box3(
    new THREE.Vector3(-4.2, 0, -5.2),
    new THREE.Vector3( 4.2, 1.2, -0.8)
  );
  if (plinthBox.containsPoint(new THREE.Vector3(next.x, 1.0, next.z))){
    /* push outward */
    const cx = (plinthBox.min.x + plinthBox.max.x)/2;
    const cz = (plinthBox.min.z + plinthBox.max.z)/2;
    const dx = next.x - cx, dz = next.z - cz;
    const ax = Math.abs(dx) - (plinthBox.max.x - plinthBox.min.x)/2;
    const az = Math.abs(dz) - (plinthBox.max.z - plinthBox.min.z)/2;
    if (ax > az){
      next.x = cx + Math.sign(dx) * ((plinthBox.max.x - plinthBox.min.x)/2 + r);
    } else {
      next.z = cz + Math.sign(dz) * ((plinthBox.max.z - plinthBox.min.z)/2 + r);
    }
  }

  /* Display cases */
  for (const c of cases){
    if (c.box.containsPoint(new THREE.Vector3(next.x, 1.0, next.z))){
      const cx = c.pos.x, cz = c.pos.z;
      const dx = next.x - cx, dz = next.z - cz;
      if (Math.abs(dx) > Math.abs(dz)){
        next.x = cx + Math.sign(dx) * 1.2;
      } else {
        next.z = cz + Math.sign(dz) * 1.0;
      }
    }
  }
  return next;
}

renderer.domElement.addEventListener('click', () => {
  if (!ctrl.locked) return;
  ray.setFromCamera(center, camera);
  /* Test against each case base — find nearest under reticle and ≤ 4m */
  let best = null, bestDist = Infinity;
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  for (const c of cases){
    const d = camPos.distanceTo(c.pos);
    if (d < 4.5){
      /* approximate ray-AABB by distance from ray to case center */
      const dirToCase = c.pos.clone().sub(camPos);
      const fwd = new THREE.Vector3();
      camera.getWorldDirection(fwd);
      const dot = dirToCase.normalize().dot(fwd);
      if (dot > 0.85 && d < bestDist){
        best = c; bestDist = d;
      }
    }
  }
  if (best) showPlacard(best);
});

let audioCtx = null;
const audio = {
  master: null,
  reverbOut: null,
  drySend: null,
  wetSend: null,
  polisherPanner: null,
  drips: [],
  started: false
};

function dbToGain(db){ return Math.pow(10, db/20); }

function makeImpulseResponse(ac, seconds=2.6, decay=2.4){
  const rate = ac.sampleRate;
  const length = Math.floor(rate * seconds);
  const impulse = ac.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++){
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++){
      const t = i / length;
      data[i] = (Math.random()*2 - 1) * Math.pow(1 - t, decay);
    }
  }
  return impulse;
}

function noiseBuffer(ac, len=2){
  const buf = ac.createBuffer(1, ac.sampleRate * len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
  return buf;
}

function startAudio(){
  if (audio.started) return;
  audio.started = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  audio.master = audioCtx.createGain();
  audio.master.gain.value = 0.0;
  audio.master.connect(audioCtx.destination);

  /* Reverb */
  const conv = audioCtx.createConvolver();
  conv.buffer = makeImpulseResponse(audioCtx, 3.4, 2.6);

  audio.wetSend = audioCtx.createGain();
  audio.drySend = audioCtx.createGain();
  audio.drySend.gain.value = 0.7;
  audio.wetSend.gain.value = 0.55;

  audio.drySend.connect(audio.master);
  audio.wetSend.connect(conv);
  conv.connect(audio.master);

  audio.reverbOut = audio.wetSend;

  /* Room ambient — pink-ish noise */
  {
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(audioCtx, 4);
    src.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 0.6;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 60;
    const g = audioCtx.createGain();
    g.gain.value = 0.06;
    src.connect(lp); lp.connect(hp); hp.connect(g);
    g.connect(audio.drySend);
    g.connect(audio.wetSend);
    src.start();
  }

  /* HVAC hum — low droning sine cluster */
  {
    const freqs = [60, 90, 121, 154];
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine'; o.frequency.value = f;
      const g = audioCtx.createGain();
      g.gain.value = 0.018 / (i+1);
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.05 + i*0.02;
      const lfog = audioCtx.createGain();
      lfog.gain.value = 0.007;
      lfo.connect(lfog); lfog.connect(g.gain);
      lfo.start();
      o.connect(g);
      g.connect(audio.drySend);
      g.connect(audio.wetSend);
      o.start();
    });
  }

  /* Distant polisher whir — bandpassed noise on a panner that drifts */
  {
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(audioCtx, 5);
    src.loop = true;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 480; bp.Q.value = 6.0;
    const tremolo = audioCtx.createGain();
    tremolo.gain.value = 0.0;
    const tremLfo = audioCtx.createOscillator();
    tremLfo.frequency.value = 18;
    const tremLfoGain = audioCtx.createGain();
    tremLfoGain.gain.value = 0.04;
    tremLfo.connect(tremLfoGain); tremLfoGain.connect(tremolo.gain);
    tremLfo.start();

    const panner = audioCtx.createPanner();
    panner.panningModel = 'HRTF';
    panner.distanceModel = 'inverse';
    panner.refDistance = 4;
    panner.rolloffFactor = 1.4;
    panner.setPosition(-12, 1.5, 18);

    const g = audioCtx.createGain();
    g.gain.value = 0.16;

    src.connect(bp); bp.connect(tremolo); tremolo.connect(panner);
    panner.connect(g);
    g.connect(audio.drySend);
    g.connect(audio.wetSend);
    src.start();

    audio.polisherPanner = panner;
  }

  /* Master fade-in */
  audio.master.gain.setTargetAtTime(0.85, audioCtx.currentTime, 1.6);

  /* Schedule sporadic events */
  scheduleFootsteps();
  scheduleGlassSettle();
  scheduleDrip();
}

function scheduleFootsteps(){
  if (!audio.started) return;
  const delay = 28 + Math.random() * 50;
  setTimeout(() => {
    playFootsteps();
    scheduleFootsteps();
  }, delay * 1000);
}

function playFootsteps(){
  if (!audio.started) return;
  const steps = 5 + Math.floor(Math.random() * 6);
  const startX = (Math.random() - 0.5) * 24;
  const startZ = -HALL.halfL + 4 + Math.random() * 4;
  const endZ = startZ + (Math.random() < 0.5 ? -8 : 12);

  for (let i = 0; i < steps; i++){
    setTimeout(() => {
      const t0 = audioCtx.currentTime;
      const src = audioCtx.createBufferSource();
      src.buffer = noiseBuffer(audioCtx, 0.18);
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 4.0;
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0.0, t0);
      env.gain.linearRampToValueAtTime(0.18, t0 + 0.005);
      env.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
      const panner = audioCtx.createPanner();
      panner.panningModel = 'HRTF';
      const t = i / steps;
      panner.setPosition(startX, 0.2, startZ + (endZ - startZ) * t);
      src.connect(bp); bp.connect(env); env.connect(panner);
      panner.connect(audio.wetSend);
      panner.connect(audio.drySend);
      src.start(t0);
      src.stop(t0 + 0.2);
    }, i * (380 + Math.random() * 90));
  }
}

function scheduleGlassSettle(){
  if (!audio.started) return;
  const delay = 90 + Math.random() * 90;
  setTimeout(() => {
    playGlassSettle();
    scheduleGlassSettle();
  }, delay * 1000);
}

function playGlassSettle(){
  const t0 = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(2400 + Math.random()*900, t0);
  o.frequency.exponentialRampToValueAtTime(1200, t0 + 0.6);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t0);
  g.gain.linearRampToValueAtTime(0.04, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.6);
  const panner = audioCtx.createPanner();
  panner.panningModel = 'HRTF';
  panner.setPosition((Math.random()-0.5)*22, 1.5, (Math.random()-0.5)*40);
  o.connect(g); g.connect(panner);
  panner.connect(audio.wetSend);
  panner.connect(audio.drySend);
  o.start(t0);
  o.stop(t0 + 1.7);
}

function scheduleDrip(){
  if (!audio.started) return;
  const delay = 18 + Math.random() * 32;
  setTimeout(() => {
    playDrip();
    scheduleDrip();
  }, delay * 1000);
}

function playDrip(){
  const t0 = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  const f0 = 1200 + Math.random()*400;
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(f0 * 0.4, t0 + 0.18);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t0);
  g.gain.linearRampToValueAtTime(0.05, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.45);
  const panner = audioCtx.createPanner();
  panner.panningModel = 'HRTF';
  panner.setPosition((Math.random()-0.5)*20, 0.4, (Math.random()-0.5)*40);
  o.connect(g); g.connect(panner);
  panner.connect(audio.wetSend);
  panner.connect(audio.drySend);
  o.start(t0);
  o.stop(t0 + 0.5);
}

/* Polisher drift */
let polisherT = 0;
function updatePolisher(dt){
  if (!audio.polisherPanner) return;
  polisherT += dt;
  const x = Math.sin(polisherT * 0.04) * 12 + Math.cos(polisherT * 0.013) * 4;
  const z = Math.cos(polisherT * 0.027) * 18 + Math.sin(polisherT * 0.011) * 6;
  audio.polisherPanner.setPosition(x, 1.4, z);
}

/* Audio listener follows camera */
function updateAudioListener(){
  if (!audioCtx) return;
  const l = audioCtx.listener;
  if (l.positionX){
    l.positionX.value = camera.position.x;
    l.positionY.value = camera.position.y;
    l.positionZ.value = camera.position.z;
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    l.forwardX.value = fwd.x;
    l.forwardY.value = fwd.y;
    l.forwardZ.value = fwd.z;
    l.upX.value = 0; l.upY.value = 1; l.upZ.value = 0;
  } else {
    l.setPosition(camera.position.x, camera.position.y, camera.position.z);
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    l.setOrientation(fwd.x, fwd.y, fwd.z, 0, 1, 0);
  }
}

/* Audio gate handler */
function dismissGate(){
  if (gate.classList.contains('hidden')) return;
  gate.classList.add('hidden');
  setTimeout(() => { gate.style.display = 'none'; }, 1300);
  startAudio();
  setTimeout(() => {
    renderer.domElement.requestPointerLock?.();
  }, 700);
}
gate.addEventListener('click', dismissGate);
gate.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') dismissGate(); });

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
const clock = new THREE.Clock();
let frameCounter = 0;

function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  frameCounter++;

  /* Sconces — slight amber flicker */
  for (const s of sconces){
    const f = 0.92 + Math.sin(t*1.2 + s.phase) * 0.04 + Math.sin(t*7.0 + s.phase*2.0)*0.025;
    s.light.intensity = s.baseI * f;
  }

  /* T-Rex spotlight subtle breathing */
  trexSpot.intensity = 11.4 + Math.sin(t * 0.4) * 0.6;

  /* Floor shader time */
  floorUniforms.uTime.value = t;

  /* Camera movement */
  const speed = (keys.shift ? 4.4 : 2.0);
  let fwd = 0, rt = 0;
  if (keys.w) fwd += 1;
  if (keys.s) fwd -= 1;
  if (keys.d) rt  += 1;
  if (keys.a) rt  -= 1;

  const moveLen = Math.hypot(fwd, rt);
  if (moveLen > 0){
    fwd /= moveLen; rt /= moveLen;
  }

  const sinY = Math.sin(ctrl.yaw);
  const cosY = Math.cos(ctrl.yaw);
  const wantVx = (-sinY * fwd + cosY * rt) * speed;
  const wantVz = (-cosY * fwd - sinY * rt) * speed;

  /* Acceleration smoothing */
  ctrl.vel.x += (wantVx - ctrl.vel.x) * Math.min(1, dt * 8);
  ctrl.vel.z += (wantVz - ctrl.vel.z) * Math.min(1, dt * 8);

  /* Apply movement */
  const next = ctrl.pos.clone();
  next.x += ctrl.vel.x * dt;
  next.z += ctrl.vel.z * dt;
  collideMove(next);
  ctrl.pos.copy(next);

  /* Head bob */
  const moving = Math.hypot(ctrl.vel.x, ctrl.vel.z);
  ctrl.bobT += dt * (8 * (moving / Math.max(speed, 0.01)));
  const bobAmt = Math.min(moving / Math.max(speed, 0.01), 1.0);
  const bobY = Math.sin(ctrl.bobT * 1.6) * 0.025 * bobAmt;
  const bobX = Math.cos(ctrl.bobT * 0.8) * 0.018 * bobAmt;

  camera.position.set(
    ctrl.pos.x + bobX,
    1.65 + bobY,
    ctrl.pos.z
  );
  camera.rotation.set(ctrl.pitch, ctrl.yaw, 0, 'YXZ');

  /* Hint when looking at a near case */
  let nearCase = null, nearDist = 4.2;
  for (const c of cases){
    const d = camera.position.distanceTo(c.pos);
    if (d < nearDist){
      const fwdV = new THREE.Vector3();
      camera.getWorldDirection(fwdV);
      const toCase = c.pos.clone().sub(camera.position).normalize();
      if (fwdV.dot(toCase) > 0.85){
        nearDist = d; nearCase = c;
      }
    }
  }
  hint.classList.toggle('show',
    !!nearCase && ctrl.locked && !placardTargetCase);

  /* Update polisher and listener */
  if (audio.started){
    updatePolisher(dt);
    if (frameCounter % 4 === 0) updateAudioListener();
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

/* ============================================================
   RESIZE
   ============================================================ */
addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   Idle — rotate compass / hud subtle stamp
   ============================================================ */
const compass = document.getElementById('compass');
const halls = ['North Hall · Cretaceous Wing', 'East Gallery · Mesozoic', 'Stanley Hall · Hominids', 'Grainger · Gems & Minerals'];
let hallIdx = 0;
setInterval(() => {
  hallIdx = (hallIdx + 1) % halls.length;
  compass.style.opacity = '0';
  setTimeout(() => {
    compass.textContent = halls[hallIdx];
    compass.style.opacity = '0.6';
  }, 600);
}, 22000);
compass.style.transition = 'opacity 0.6s ease';
</script>
