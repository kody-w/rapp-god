[pytest]
# Default test config for RappterZoo.
#
# Heavy parametrized suites (test_quality_gate.py = 11,000+ tests, etc.)
# are marked `slow` and excluded by default so the core suite finishes fast.
#
# To run everything (CI / nightly):
#     pytest -m ''                          # run all (override default)
#   OR
#     pytest --override-ini="addopts="      # ignore default addopts
#
# To run only slow tests:
#     pytest -m slow
#
# To target a specific app through the quality gate:
#     pytest -m '' scripts/tests/test_quality_gate.py --new-files apps/path/foo.html

testpaths =
    scripts/tests

markers =
    slow: large parametrized suites (run in CI / nightly only)
    integration: hits external services (Copilot CLI, network, browser)
    quality_gate: catalog-wide quality assertions

addopts =
    -ra
    --tb=short
    --strict-markers
    -m "not slow"
    --ignore=scripts/tests/test_staleness.py

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
