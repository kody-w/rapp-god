<script>
"use strict";

// ============ DETERMINISTIC RNG ============
function mulberry32(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=s;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
function hash32(x,y,s){let h=s^0x9E3779B9;h=Math.imul(h^x,0x85EBCA77);h=Math.imul(h^y,0xC2B2AE3D);h^=h>>>16;return(h>>>0);}
function rngAt(x,y,s){return mulberry32(hash32(x,y,s));}
function vnoise(x,y,s){
  const xi=Math.floor(x),yi=Math.floor(y);
  const xf=x-xi,yf=y-yi;
  const a=rngAt(xi,yi,s)();
  const b=rngAt(xi+1,yi,s)();
  const c=rngAt(xi,yi+1,s)();
  const d=rngAt(xi+1,yi+1,s)();
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  return a*(1-u)*(1-v)+b*u*(1-v)+c*(1-u)*v+d*u*v;
}
function fbm(x,y,s,oct){
  let v=0,amp=1,freq=1,norm=0;
  for(let i=0;i<oct;i++){v+=vnoise(x*freq,y*freq,s+i*131)*amp;norm+=amp;amp*=0.5;freq*=2;}
  return v/norm;
}

// ============ TILES & BIOMES ============
const TILE={GRASS:0,FOREST:1,WATER:2,SAND:3,MOUNTAIN:4,FLOWER:5,SNOW:6,LAVA:7,STONE:8,PATH:9,DUNGEON_F:10,DUNGEON_W:11};
const TILE_COLOR={
  0:["#3a7a3a","#2e6a2e"],1:["#1a4a1a","#0e3a0e"],2:["#2a4a8a","#1a3a7a"],3:["#d8c878","#c8b868"],
  4:["#6a6a6a","#5a5a5a"],5:["#8aaa3a","#7a9a2a"],6:["#e8e8f0","#d0d0e0"],7:["#d04a1a","#a03a0a"],
  8:["#7a7a7a","#6a6a6a"],9:["#a89868","#988858"],10:["#3a2a4a","#2a1a3a"],11:["#1a0e2a","#0a0612"]
};
const TILE_PASS={0:1,1:1,2:0,3:1,4:0,5:1,6:1,7:0,8:1,9:1,10:1,11:0};
const BIOMES=["meadow","forest","desert","tundra","volcano","swamp"];

function biomeAt(cx,cy,seed){
  const t=fbm(cx*0.05,cy*0.05,seed^0x1337,4);
  const m=fbm(cx*0.07,cy*0.07,seed^0x7331,3);
  if(t<0.3)return"tundra";
  if(t>0.72)return m<0.4?"volcano":"desert";
  if(m<0.35)return"desert";
  if(m>0.7)return"swamp";
  return t<0.5?"forest":"meadow";
}

function tileAt(wx,wy,seed){
  const cx=Math.floor(wx/16),cy=Math.floor(wy/16);
  const b=biomeAt(cx,cy,seed);
  const e=fbm(wx*0.08,wy*0.08,seed,4);
  const m=fbm(wx*0.15,wy*0.15,seed^0xABCD,3);
  // paths between settlements (deterministic Manhattan corridors)
  const settle=settlementHere(cx,cy,seed);
  if(settle){
    const lx=wx-cx*16,ly=wy-cy*16;
    if(lx===8||ly===8)return TILE.PATH;
  }
  if(b==="tundra"){
    if(e<0.32)return TILE.WATER;
    if(e>0.78)return TILE.MOUNTAIN;
    if(m<0.3)return TILE.STONE;
    return TILE.SNOW;
  }
  if(b==="volcano"){
    if(e<0.25)return TILE.LAVA;
    if(e>0.7)return TILE.MOUNTAIN;
    return m<0.4?TILE.STONE:TILE.SAND;
  }
  if(b==="desert"){
    if(e<0.28)return TILE.WATER;
    if(e>0.85)return TILE.MOUNTAIN;
    return TILE.SAND;
  }
  if(b==="swamp"){
    if(e<0.5)return TILE.WATER;
    if(e>0.82)return TILE.MOUNTAIN;
    return m<0.4?TILE.FOREST:TILE.GRASS;
  }
  if(b==="forest"){
    if(e<0.3)return TILE.WATER;
    if(e>0.82)return TILE.MOUNTAIN;
    if(m>0.55)return TILE.FOREST;
    if(m<0.18)return TILE.FLOWER;
    return TILE.GRASS;
  }
  // meadow
  if(e<0.3)return TILE.WATER;
  if(e>0.85)return TILE.MOUNTAIN;
  if(m<0.2)return TILE.FLOWER;
  if(m>0.7)return TILE.FOREST;
  return TILE.GRASS;
}

function settlementHere(cx,cy,seed){
  const r=rngAt(cx,cy,seed^0xBEEF)();
  return r<0.18;
}

const FIRST_NAMES=["Aldric","Brina","Cael","Dorin","Elys","Faron","Gilda","Hesh","Ilya","Joren","Kael","Lira","Mirek","Nessa","Oren","Pelia","Quin","Rhona","Saen","Tova","Ulric","Vesna","Wren","Xara","Yorik","Zell","Aerin","Bren","Cira","Dane"];
const SURNAMES=["Stoneheart","Brightwater","of the Vale","Ashford","Mirewalker","Nightshade","Goldcloak","of the Glen","Wyrmsbane","Stillwind","Frostforge","Harrow","Pinevale","Redfern","Quickfoot"];

function npcAt(wx,wy,seed){
  // NPCs placed at chunk center if settlement
  const cx=Math.floor(wx/16),cy=Math.floor(wy/16);
  if(!settlementHere(cx,cy,seed))return null;
  const lx=wx-cx*16,ly=wy-cy*16;
  // up to 4 NPCs per settlement at fixed offsets
  const slots=[[6,6],[10,6],[6,10],[10,10]];
  for(let i=0;i<slots.length;i++){
    if(lx===slots[i][0]&&ly===slots[i][1]){
      const r=rngAt(cx*4+i,cy,seed^0xC0DE);
      const ai=Math.floor(r()*NPC_ARCH.length);
      const fi=Math.floor(r()*FIRST_NAMES.length);
      const si=Math.floor(r()*SURNAMES.length);
      const arch=NPC_ARCH[ai];
      return{
        id:`${cx},${cy},${i}`,
        x:wx,y:wy,
        name:`${FIRST_NAMES[fi]} ${SURNAMES[si]}`,
        arch:arch.n,glyph:arch.g,type:arch.t,col:arch.col,
        seed:hash32(cx*4+i,cy,seed)
      };
    }
  }
  return null;
}

// ============ QUEST GENERATION ============
const QUEST_TEMPLATES=[
  {
    id:"fetch",
    desc:(q)=>`Bring ${q.count} ${q.item} to ${q.giver}`,
    gen:(rng,giver)=>{
      const items=["herbs","mushrooms","crystals","feathers","pelts","gems","scrolls","relics","wildflowers","ore"];
      return{count:2+Math.floor(rng()*4),item:items[Math.floor(rng()*items.length)],giver:giver};
    },
    check:(q,player)=>player.inv.filter(i=>i.name===q.item).reduce((a,b)=>a+b.qty,0)>=q.count,
    complete:(q,player)=>{let n=q.count;for(let i=player.inv.length-1;i>=0&&n>0;i--){if(player.inv[i].name===q.item){const t=Math.min(player.inv[i].qty,n);player.inv[i].qty-=t;n-=t;if(player.inv[i].qty<=0)player.inv.splice(i,1);}}}
  },
  {
    id:"slay",
    desc:(q)=>`Defeat ${q.count} ${q.foe} for ${q.giver}`,
    gen:(rng,giver,biome)=>{
      const foes=BIOME_ENEMIES[biome]||BIOME_ENEMIES.meadow;
      return{count:2+Math.floor(rng()*4),foe:foes[Math.floor(rng()*foes.length)],giver:giver,killed:0};
    },
    check:(q)=>q.killed>=q.count,
    complete:()=>{}
  },
  {
    id:"explore",
    desc:(q)=>`Travel to coordinates near (${q.tx},${q.ty}) for ${q.giver}`,
    gen:(rng,giver,biome,px,py)=>{
      const ang=rng()*Math.PI*2,dist=20+Math.floor(rng()*30);
      return{tx:px+Math.round(Math.cos(ang)*dist),ty:py+Math.round(Math.sin(ang)*dist),giver:giver};
    },
    check:(q,player)=>Math.abs(player.x-q.tx)<3&&Math.abs(player.y-q.ty)<3,
    complete:()=>{}
  }
];

function genQuest(npc,player){
  const rng=mulberry32(npc.seed^0xFEED);
  const tmpl=QUEST_TEMPLATES[Math.floor(rng()*QUEST_TEMPLATES.length)];
  const cx=Math.floor(npc.x/16),cy=Math.floor(npc.y/16);
  const data=tmpl.gen(rng,npc.name,biomeAt(cx,cy,G.seed),player.x,player.y);
  const reward=20+Math.floor(rng()*40);
  const xp=10+Math.floor(rng()*20);
  return{
    id:`q_${npc.id}_${Date.now()}`,
    npcId:npc.id,
    template:tmpl.id,
    data:data,
    reward:reward,xp:xp,
    status:"active",
    desc:tmpl.desc(data)
  };
}

function spawnEnemyAt(wx,wy,seed){
  const cx=Math.floor(wx/16),cy=Math.floor(wy/16);
  const b=biomeAt(cx,cy,seed);
  const r=rngAt(wx,wy,seed^0xDEAD);
  if(r()>0.04)return null;
  if(settlementHere(cx,cy,seed)){const lx=wx-cx*16,ly=wy-cy*16;if(lx>4&&lx<12&&ly>4&&ly<12)return null;}
  const list=BIOME_ENEMIES[b];
  const name=list[Math.floor(r()*list.length)];
  const lvl=1+Math.floor((Math.abs(cx)+Math.abs(cy))*r()*0.3);
  return{name:name,lvl:lvl,x:wx,y:wy,seed:hash32(wx,wy,seed)};
}

// ============ AUDIO ============
const Audio={
  ready:false,synth:null,bass:null,
  init(){
    if(this.ready)return;
    try{
      this.synth=new Tone.Synth({oscillator:{type:"square"},envelope:{attack:0.005,decay:0.1,sustain:0,release:0.1}}).toDestination();
      this.synth.volume.value=-15;
      this.bass=new Tone.MembraneSynth().toDestination();
      this.bass.volume.value=-20;
      this.ready=true;
    }catch(e){console.warn("audio fail",e);}
  },
  blip(n="C5",d="16n"){if(!this.ready)return;try{this.synth.triggerAttackRelease(n,d);}catch(e){}},
  hit(){if(!this.ready)return;try{this.bass.triggerAttackRelease("C2","8n");}catch(e){}},
  win(){this.blip("C5","8n");setTimeout(()=>this.blip("E5","8n"),120);setTimeout(()=>this.blip("G5","8n"),240);setTimeout(()=>this.blip("C6","4n"),360);},
  lose(){this.blip("A3","8n");setTimeout(()=>this.blip("F3","8n"),150);setTimeout(()=>this.blip("D3","4n"),300);}
};

// ============ GAME STATE ============
const G={
  seed:Math.floor(Math.random()*0xFFFFFFFF),
  player:null,
  npcMemory:{},
  quests:[],
  killCounts:{},
  turn:0,
  combat:null,
  dlg:null,
  invSel:0,qstSel:0,mnuSel:0,
  invOpen:false,qstOpen:false,mnuOpen:false,

  init(s){
    if(s!==undefined)this.seed=s>>>0;
    this.player={x:0,y:0,hp:20,maxhp:20,mp:5,maxmp:5,lv:1,xp:0,xpNext:30,gold:10,atk:3,def:1,baseAtk:3,baseDef:1,
      inv:[{name:"potion",qty:3},{name:"bread",qty:2},{name:"iron sword",qty:1}],
      eq:{weapon:null,armor:null}};
    this.npcMemory={};
    this.quests=[];
    this.killCounts={};
    this.turn=0;
    // find safe spawn
    for(let r=0;r<50;r++){
      for(let dx=-r;dx<=r;dx++)for(let dy=-r;dy<=r;dy++){
        const t=tileAt(dx,dy,this.seed);
        if(TILE_PASS[t]){this.player.x=dx;this.player.y=dy;return;}
      }
    }
  },

  log(msg,cls="log-sys"){
    const el=document.getElementById("log");
    const d=document.createElement("div");
    d.className="log-entry "+cls;
    d.textContent=msg;
    el.appendChild(d);
    while(el.children.length>100)el.removeChild(el.firstChild);
    el.scrollTop=el.scrollHeight;
  },

  recalcStats(){
    const p=this.player;
    p.atk=p.baseAtk+(p.eq.weapon?(ITEMS[p.eq.weapon]?.atk||0):0);
    p.def=p.baseDef+(p.eq.armor?(ITEMS[p.eq.armor]?.def||0):0);
  },

  updateHUD(){
    const p=this.player;
    document.getElementById("sHP").textContent=p.hp+"/"+p.maxhp;
    document.getElementById("sMP").textContent=p.mp+"/"+p.maxmp;
    document.getElementById("sLV").textContent=p.lv;
    document.getElementById("sXP").textContent=p.xp+"/"+p.xpNext;
    document.getElementById("sGD").textContent=p.gold;
    document.getElementById("sAT").textContent=p.atk;
    document.getElementById("sDF").textContent=p.def;
    document.getElementById("sSD").textContent=this.seed.toString(16).slice(0,8);
    document.getElementById("coords").textContent=`(${p.x},${p.y}) ${biomeAt(Math.floor(p.x/16),Math.floor(p.y/16),this.seed)}`;
  },

  tryMove(dx,dy){
    if(this.combat||this.dlg||this.invOpen||this.qstOpen||this.mnuOpen)return;
    const nx=this.player.x+dx,ny=this.player.y+dy;
    const t=tileAt(nx,ny,this.seed);
    if(!TILE_PASS[t]){Audio.blip("F3","32n");return;}
    // NPC blocking?
    const npc=npcAt(nx,ny,this.seed);
    if(npc){this.startDialog(npc);return;}
    this.player.x=nx;this.player.y=ny;
    this.turn++;
    Audio.blip("E5","32n");
    // random encounter check
    const enc=spawnEnemyAt(nx,ny,this.seed^this.turn);
    if(enc){
      this.startCombat(enc);
    }
    // explore quest check
    this.checkExploreQuests();
    this.updateHUD();
    this.draw();
  },

  // ============ DIALOG / NPC ============
  startDialog(npc){
    this.dlg={npc:npc,phase:"greet",sel:0};
    if(!this.npcMemory[npc.id])this.npcMemory[npc.id]={met:0,helped:0,gifts:0};
    this.npcMemory[npc.id].met++;
    Audio.blip("A4","16n");
    this.renderDialog();
  },
  endDialog(){this.dlg=null;document.getElementById("dlgUI").classList.add("hidden");this.draw();this.updateHUD();},
  renderDialog(){
    if(!this.dlg)return;
    const ui=document.getElementById("dlgUI");
    ui.classList.remove("hidden");
    const npc=this.dlg.npc;
    const mem=this.npcMemory[npc.id];
    const greet=this.npcGreeting(npc,mem);
    let opts=[];
    if(this.dlg.phase==="greet"){
      const myQ=this.quests.find(q=>q.npcId===npc.id&&q.status==="active");
      const doneQ=this.quests.find(q=>q.npcId===npc.id&&q.status==="ready");
      if(doneQ){
        opts.push({label:"[Turn in quest]",act:()=>this.turnInQuest(doneQ)});
      }
      if(myQ){
        opts.push({label:"[About the quest...]",act:()=>{this.dlg.phase="quest";this.renderDialog();}});
      }else if(!doneQ){
        opts.push({label:"[Ask for work]",act:()=>this.offerQuest(npc)});
      }
      opts.push({label:"[Chat]",act:()=>{this.dlg.phase="chat";this.renderDialog();}});
      if(npc.type==="merchant"||npc.type==="smith"||npc.type==="alch"||npc.type==="trader"||npc.type==="goblin"){
        opts.push({label:"[Trade]",act:()=>{this.dlg.phase="trade";this.renderDialog();}});
      }
      if(npc.type==="inn"||npc.type==="healer"){
        opts.push({label:"[Rest (10g)]",act:()=>this.rest(npc)});
      }
      opts.push({label:"[Leave]",act:()=>this.endDialog()});
    }else if(this.dlg.phase==="chat"){
      opts.push({label:"[Back]",act:()=>{this.dlg.phase="greet";this.renderDialog();}});
    }else if(this.dlg.phase==="quest"){
      const q=this.quests.find(qq=>qq.npcId===npc.id&&qq.status==="active");
      opts.push({label:`Status: ${q?q.desc:"—"}`,act:()=>{}});
      opts.push({label:"[Back]",act:()=>{this.dlg.phase="greet";this.renderDialog();}});
    }else if(this.dlg.phase==="trade"){
      const stock=this.merchantStock(npc);
      stock.forEach(it=>{opts.push({label:`Buy ${it.name} — ${it.price}g`,act:()=>this.buy(npc,it)});});
      opts.push({label:"[Sell items]",act:()=>{this.dlg.phase="sell";this.dlg.sel=0;this.renderDialog();}});
      opts.push({label:"[Back]",act:()=>{this.dlg.phase="greet";this.renderDialog();}});
    }else if(this.dlg.phase==="sell"){
      this.player.inv.forEach((it,i)=>{
        const v=this.sellPrice(it.name);
        opts.push({label:`Sell ${it.name} x${it.qty} — ${v}g ea`,act:()=>this.sell(i)});
      });
      opts.push({label:"[Back]",act:()=>{this.dlg.phase="trade";this.renderDialog();}});
    }
    let html=`<div class="speaker">${npc.glyph} ${npc.name} <span style="color:#aaa">(${npc.arch})</span></div>`;
    html+=`<div style="margin-bottom:6px">${greet}</div>`;
    opts.forEach((o,i)=>{html+=`<div class="opt ${i===this.dlg.sel?"sel":""}" data-i="${i}" style="${i===this.dlg.sel?"background:#3a2a5a;color:#ffd700":""}">▶ ${o.label}</div>`;});
    ui.innerHTML=html;
    this.dlg.opts=opts;
    ui.querySelectorAll(".opt").forEach((el,i)=>{el.onclick=()=>{this.dlg.sel=i;this.renderDialog();setTimeout(()=>this.dlg&&this.dlg.opts[i]&&this.dlg.opts[i].act(),50);};});
  },
  npcGreeting(npc,mem){
    const greets={
      sage:["The wind whispers strange omens, traveler.","Knowledge is the only true wealth."],
      bard:["A song for a coin? A coin for a song?","I sing of heroes yet unborn."],
      smith:["My hammer never sleeps. Need a blade?","Steel sings true when struck right."],
      merchant:["Finest wares this side of the realm!","A copper saved is a copper earned."],
      guard:["Move along, citizen. Or stay and report trouble.","These roads see strange folk lately."],
      knight:["Honor calls, even far from home.","Have you faced the dragon of the eastern peaks?"],
      mage:["The ley lines are tangled today.","Magic answers those who listen."],
      druid:["The forest remembers every footfall.","Walk gently. The roots are listening."],
      fisher:["The catch is poor when the moons are wrong.","Patience is the fisher's truest hook."],
      farmer:["Soil knows no lord but the rain.","Another harvest, another year."],
      inn:["Warm bed, warmer stew. Stay a night?","Rumors arrive faster than guests."],
      monk:["Be still. The path reveals itself.","Each breath is a small forever."],
      scholar:["I have read of seven worlds, and walked in three.","Books outlive their readers."],
      thief:["Keep your purse close, friend.","I... ah... noticed your fine coin pouch."],
      oracle:["Your fate is a tangled thread of gold.","I see... a long road, and many doors."],
      child:["Have you seen my cat? It ran into the woods.","I'm not lost! I'm exploring."],
      sailor:["Salt in my beard, stories in my belly.","I once sailed past the world's edge. Almost."],
      beggar:["Spare a copper for an old soul?","Kindness costs nothing, but means everything."],
      messenger:["Urgent dispatch! Have you the time?","The crown's mail must fly."],
      royal:["Do not bow. I am... travelling incognito.","The court is a cage of mirrors."],
      goblin:["Shiny shiny? You has shiny? Trade trade!","Goblin trader make best deal, yes?"],
      ghost:["I... cannot remember my name.","The living burn so brightly."],
      alch:["A pinch of moondust, a drop of will...","Transmutation favors the patient."],
      hunter:["Big tracks near the river. Be wary.","The forest is bountiful if you know where to look."],
      drunk:["Hic. Y'know wha' I think? I think... uh...","One more, barkeep! Or three!"],
      stable:["The mares are restless tonight.","A horse is a friend that never argues."],
      healer:["Show me where it hurts, dear.","Light heals what swords can only cleave."],
      digger:["Six feet keeps the dead, dead.","Names fade. Stones remain. For a while."],
      carto:["I'm mapping the unmapped, which is most of it.","Every road leads somewhere. Some lead back."],
      trader:["Far lands, fine wares! Step closer."]
    };
    const list=greets[npc.type]||["Hello there, traveler."];
    const r=mulberry32(npc.seed^mem.met)();
    let line=list[Math.floor(r*list.length)];
    if(mem.met>3)line=`Ah, you again! `+line;
    if(mem.helped>0)line=`I haven't forgotten your help. `+line;
    return line;
  },
  offerQuest(npc){
    const q=genQuest(npc,this.player);
    this.quests.push(q);
    this.log(`New quest: ${q.desc} (reward: ${q.reward}g, ${q.xp}xp)`,"log-quest");
    Audio.blip("G5","16n");
    this.dlg.phase="greet";this.renderDialog();
  },
  turnInQuest(q){
    const tmpl=QUEST_TEMPLATES.find(t=>t.id===q.template);
    tmpl.complete(q.data,this.player);
    q.status="done";
    this.player.gold+=q.reward;
    this.gainXP(q.xp);
    this.npcMemory[q.npcId].helped++;
    this.log(`Quest complete: ${q.desc} (+${q.reward}g, +${q.xp}xp)`,"log-quest");
    Audio.win();
    this.dlg.phase="greet";this.renderDialog();
    this.updateHUD();
  },
  rest(npc){
    if(this.player.gold<10){this.log("Not enough gold to rest.","log-sys");return;}
    this.player.gold-=10;
    this.player.hp=this.player.maxhp;
    this.player.mp=this.player.maxmp;
    this.log("You rest and recover fully.","log-sys");
    Audio.blip("C5","8n");
    this.updateHUD();this.renderDialog();
  },
  merchantStock(npc){
    const r=mulberry32(npc.seed^Math.floor(this.turn/100));
    const stock=[];
    if(npc.type==="smith"){
      stock.push({name:"iron sword",price:30});
      if(r()<0.5)stock.push({name:"steel sword",price:120});
      if(r()<0.2)stock.push({name:"flame blade",price:400});
      stock.push({name:"leather armor",price:25});
      if(r()<0.5)stock.push({name:"chain mail",price:100});
      if(r()<0.15)stock.push({name:"dragon plate",price:500});
    }else if(npc.type==="alch"){
      stock.push({name:"potion",price:15});
      stock.push({name:"ether",price:25});
    }else{
      stock.push({name:"potion",price:18});
      stock.push({name:"bread",price:5});
      if(r()<0.3)stock.push({name:"ether",price:30});
      if(r()<0.2)stock.push({name:"iron sword",price:40});
    }
    return stock;
  },
  sellPrice(n){const it=ITEMS[n];if(!it)return 1;if(it.type==="weapon")return Math.floor((it.atk||1)*4);if(it.type==="armor")return Math.floor((it.def||1)*4);if(it.type==="consumable")return 4;return 3;},
  buy(npc,it){
    if(this.player.gold<it.price){this.log("Not enough gold.","log-sys");Audio.lose();return;}
    this.player.gold-=it.price;
    this.addItem(it.name,1);
    this.log(`Bought ${it.name} for ${it.price}g.`,"log-item");
    Audio.blip("E5","16n");
    this.renderDialog();this.updateHUD();
  },
  sell(idx){
    const it=this.player.inv[idx];
    if(!it)return;
    const v=this.sellPrice(it.name);
    this.player.gold+=v;
    it.qty--;
    if(it.qty<=0)this.player.inv.splice(idx,1);
    this.log(`Sold 1 ${it.name} for ${v}g.`,"log-item");
    Audio.blip("D5","16n");
    this.renderDialog();this.updateHUD();
  },
  addItem(name,qty){
    const ex=this.player.inv.find(i=>i.name===name);
    if(ex)ex.qty+=qty;
    else this.player.inv.push({name:name,qty:qty});
  },

  // ============ COMBAT ============
  startCombat(enc){
    const data=ENEMY_DATA[enc.name];
    const lvlMul=1+(enc.lvl-1)*0.4;
    this.combat={
      enemy:{
        name:enc.name,lvl:enc.lvl,
        hp:Math.floor(data.hp*lvlMul),maxhp:Math.floor(data.hp*lvlMul),
        atk:Math.floor(data.atk*lvlMul),def:data.def,
        xp:Math.floor(data.xp*lvlMul),gold:Math.floor(data.gold*lvlMul),
        glyph:data.glyph,col:data.col
      },
      msg:`A ${enc.name} (Lv ${enc.lvl}) appears!`,
      defending:false,sel:0
    };
    this.log(this.combat.msg,"log-combat");
    Audio.blip("D4","8n");setTimeout(()=>Audio.blip("A3","8n"),100);
    this.renderCombat();
  },
  renderCombat(){
    if(!this.combat){document.getElementById("combatUI").classList.add("hidden");return;}
    const c=this.combat,e=c.enemy,p=this.player;
    const ui=document.getElementById("combatUI");
    ui.classList.remove("hidden");
    const hpw=Math.max(0,e.hp/e.maxhp*100);
    const phpw=Math.max(0,p.hp/p.maxhp*100);
    const acts=["⚔ Attack","🛡 Defend","🧪 Item","🏃 Run"];
    let actsHTML=acts.map((a,i)=>`<button onclick="G.combatAct(${i})" style="${i===c.sel?'background:#5a4a7a;color:#ffd700':''}">[${i+1}] ${a}</button>`).join("");
    ui.innerHTML=`
      <div class="enemy">${e.glyph} ${e.name.toUpperCase()} Lv${e.lvl}</div>
      <div>HP: ${e.hp}/${e.maxhp}</div>
      <div class="bar"><div class="bar-fill" style="width:${hpw}%"></div></div>
      <div style="margin:18px 0;font-size:11px;color:#ffd">${c.msg}</div>
      <div>You: HP ${p.hp}/${p.maxhp} • MP ${p.mp}/${p.maxmp}</div>
      <div class="bar"><div class="bar-fill player" style="width:${phpw}%"></div></div>
      <div class="acts">${actsHTML}</div>
      <div style="margin-top:8px;font-size:10px;color:#888">Press 1-4 to act</div>
    `;
  },
  combatAct(i){
    if(!this.combat)return;
    const c=this.combat,e=c.enemy,p=this.player;
    c.defending=false;
    let playerActed=true;
    if(i===0){ // attack
      const dmg=Math.max(1,p.atk-e.def+Math.floor(Math.random()*3)-1);
      e.hp-=dmg;
      c.msg=`You strike for ${dmg} damage!`;
      Audio.hit();
      if(e.hp<=0){this.winCombat();return;}
    }else if(i===1){ // defend
      c.defending=true;c.msg="You brace yourself.";
      Audio.blip("G4","16n");
    }else if(i===2){ // item
      const pot=p.inv.find(it=>it.name==="potion");
      if(pot){
        const heal=Math.min(15,p.maxhp-p.hp);
        p.hp+=heal;pot.qty--;
        if(pot.qty<=0)p.inv.splice(p.inv.indexOf(pot),1);
        c.msg=`You drink a potion (+${heal} HP).`;
        Audio.blip("C5","8n");
      }else{c.msg="No potions left!";playerActed=false;Audio.lose();}
    }else if(i===3){ // run
      if(Math.random()<0.7){
        c.msg="You flee!";
        this.log("You escaped.","log-combat");
        setTimeout(()=>{this.combat=null;this.renderCombat();this.draw();},500);
        return;
      }else{c.msg="Couldn't escape!";Audio.lose();}
    }
    this.renderCombat();
    if(playerActed&&e.hp>0){
      setTimeout(()=>{
        if(!this.combat)return;
        const dmg=Math.max(1,e.atk-(p.def+(c.defending?5:0))+Math.floor(Math.random()*3)-1);
        p.hp-=dmg;
        c.msg+=` ${e.name} hits for ${dmg}!`;
        Audio.hit();
        if(p.hp<=0){this.gameOver();return;}
        this.renderCombat();this.updateHUD();
      },500);
    }
  },
  winCombat(){
    const c=this.combat,e=c.enemy,p=this.player;
    p.gold+=e.gold;
    this.killCounts[e.name]=(this.killCounts[e.name]||0)+1;
    this.quests.forEach(q=>{
      if(q.status==="active"&&q.template==="slay"&&q.data.foe===e.name){
        q.data.killed=(q.data.killed||0)+1;
        if(q.data.killed>=q.data.count){q.status="ready";this.log(`Quest ready to turn in: ${q.desc}`,"log-quest");}
      }
    });
    // chance drop
    if(Math.random()<0.3){
      const drops=["herbs","mushrooms","crystals","feathers","pelts","gems","scrolls","relics","wildflowers","ore"];
      const d=drops[Math.floor(Math.random()*drops.length)];
      this.addItem(d,1);
      this.log(`Found ${d}!`,"log-item");
    }
    this.log(`Defeated ${e.name}! +${e.xp}xp +${e.gold}g`,"log-combat");
    Audio.win();
    this.gainXP(e.xp);
    this.combat=null;
    this.renderCombat();
    this.updateHUD();
    this.draw();
  },
  gainXP(amt){
    const p=this.player;
    p.xp+=amt;
    while(p.xp>=p.xpNext){
      p.xp-=p.xpNext;
      p.lv++;
      p.xpNext=Math.floor(p.xpNext*1.5);
      p.maxhp+=5;p.hp=p.maxhp;
      p.maxmp+=2;p.mp=p.maxmp;
      p.baseAtk++;p.baseDef++;
      this.log(`LEVEL UP! Now Lv ${p.lv}.`,"log-quest");
      Audio.win();
    }
    this.recalcStats();
  },
  gameOver(){
    this.log("YOU HAVE FALLEN. The realm mourns. Press New Game.","log-combat");
    Audio.lose();
    this.combat=null;
    document.getElementById("combatUI").innerHTML=`<div style="font-size:32px;color:#f44">💀 GAME OVER 💀</div><div style="margin-top:14px">Lv ${this.player.lv} • ${this.player.gold}g • Turn ${this.turn}</div><button style="margin-top:18px" onclick="G.newGame()">New Game</button>`;
  },

  checkExploreQuests(){
    this.quests.forEach(q=>{
      if(q.status==="active"&&q.template==="explore"){
        const tmpl=QUEST_TEMPLATES.find(t=>t.id==="explore");
        if(tmpl.check(q.data,this.player)){q.status="ready";this.log(`Reached destination: ${q.desc}`,"log-quest");}
      }
      if(q.status==="active"&&q.template==="fetch"){
        const tmpl=QUEST_TEMPLATES.find(t=>t.id==="fetch");
        if(tmpl.check(q.data,this.player)){q.status="ready";this.log(`Quest ready: ${q.desc}`,"log-quest");}
      }
    });
  },

  // ============ INVENTORY UI ============
  toggleInv(){this.invOpen=!this.invOpen;this.invSel=0;document.getElementById("invUI").classList.toggle("hidden",!this.invOpen);if(this.invOpen)this.renderInv();},
  renderInv(){
    const ui=document.getElementById("invUI");
    let h=`<h3>📦 INVENTORY (${this.player.inv.length})</h3>`;
    h+=`<div style="font-size:10px;color:#888;margin-bottom:6px">Eq Weapon: ${this.player.eq.weapon||"none"} • Eq Armor: ${this.player.eq.armor||"none"}</div>`;
    if(this.player.inv.length===0)h+=`<div style="color:#888">Empty</div>`;
    this.player.inv.forEach((it,i)=>{
      const meta=ITEMS[it.name]||{type:"?",desc:""};
      h+=`<div class="row ${i===this.invSel?"sel":""}" data-i="${i}">${it.name} x${it.qty} <span style="color:#aaa;font-size:10px">[${meta.type}] ${meta.desc||""}</span></div>`;
    });
    h+=`<div style="margin-top:8px;font-size:10px;color:#888">↑↓ select • Enter use/equip • Esc close</div>`;
    ui.innerHTML=h;
    ui.querySelectorAll(".row").forEach((el,i)=>{el.onclick=()=>{this.invSel=i;this.useInv();};});
  },
  useInv(){
    const it=this.player.inv[this.invSel];if(!it)return;
    const meta=ITEMS[it.name];if(!meta)return;
    if(meta.type==="consumable"){
      if(meta.effect==="heal"){const h=Math.min(meta.amount,this.player.maxhp-this.player.hp);this.player.hp+=h;this.log(`Used ${it.name} (+${h} HP)`,"log-item");}
      else if(meta.effect==="mp"){const m=Math.min(meta.amount,this.player.maxmp-this.player.mp);this.player.mp+=m;this.log(`Used ${it.name} (+${m} MP)`,"log-item");}
      it.qty--;if(it.qty<=0)this.player.inv.splice(this.invSel,1);
      Audio.blip("C5","16n");
    }else if(meta.type==="weapon"){
      this.player.eq.weapon=it.name;this.log(`Equipped ${it.name}.`,"log-item");
      Audio.blip("E5","16n");
    }else if(meta.type==="armor"){
      this.player.eq.armor=it.name;this.log(`Equipped ${it.name}.`,"log-item");
      Audio.blip("E5","16n");
    }
    this.recalcStats();this.updateHUD();this.renderInv();
  },

  // ============ QUEST UI ============
  toggleQst(){this.qstOpen=!this.qstOpen;document.getElementById("qstUI").classList.toggle("hidden",!this.qstOpen);if(this.qstOpen)this.renderQst();},
  renderQst(){
    const ui=document.getElementById("qstUI");
    let h=`<h3>📜 QUEST LOG</h3>`;
    const act=this.quests.filter(q=>q.status==="active");
    const ready=this.quests.filter(q=>q.status==="ready");
    const done=this.quests.filter(q=>q.status==="done");
    if(ready.length){h+=`<div style="color:#ffd700;margin-top:4px">READY TO TURN IN:</div>`;ready.forEach(q=>{h+=`<div class="row">✅ ${q.desc}</div>`;});}
    if(act.length){h+=`<div style="color:#aaf;margin-top:4px">ACTIVE:</div>`;act.forEach(q=>{
      let p="";if(q.template==="fetch"){const has=this.player.inv.filter(i=>i.name===q.data.item).reduce((a,b)=>a+b.qty,0);p=` (${has}/${q.data.count})`;}
      else if(q.template==="slay"){p=` (${q.data.killed||0}/${q.data.count})`;}
      h+=`<div class="row">⚡ ${q.desc}${p}</div>`;
    });}
    if(done.length){h+=`<div style="color:#888;margin-top:4px">COMPLETED (${done.length}):</div>`;done.slice(-5).forEach(q=>{h+=`<div class="row" style="color:#888">✓ ${q.desc}</div>`;});}
    if(this.quests.length===0)h+=`<div style="color:#888">No quests yet. Talk to NPCs in towns.</div>`;
    h+=`<div style="margin-top:8px;font-size:10px;color:#888">Esc close</div>`;
    ui.innerHTML=h;
  },

  // ============ MENU ============
  toggleMnu(){this.mnuOpen=!this.mnuOpen;document.getElementById("mnuUI").classList.toggle("hidden",!this.mnuOpen);if(this.mnuOpen)this.renderMnu();},
  renderMnu(){
    const ui=document.getElementById("mnuUI");
    ui.innerHTML=`<h3>⚙ MENU</h3>
      <div class="row" onclick="G.save();G.toggleMnu()">💾 Save Game</div>
      <div class="row" onclick="G.load();G.toggleMnu()">📂 Load Game</div>
      <div class="row" onclick="G.exportSave();G.toggleMnu()">📤 Export Save (clipboard)</div>
      <div class="row" onclick="G.importSave();G.toggleMnu()">📥 Import Save</div>
      <div class="row" onclick="if(confirm('New game with new seed?')){G.newGame();G.toggleMnu()}">🌍 New Game (random seed)</div>
      <div class="row" onclick="var s=prompt('Enter seed (number):');if(s){G.newGame(parseInt(s)||0);G.toggleMnu()}">🎲 New Game (custom seed)</div>
      <div class="row" onclick="G.toggleMnu()">↩ Close</div>
      <div style="margin-top:8px;font-size:10px;color:#888">Player: Lv ${this.player.lv} • Turn ${this.turn} • NPCs met: ${Object.keys(this.npcMemory).length}</div>`;
  },

  // ============ SAVE/LOAD ============
  save(){
    const data={
      seed:this.seed,player:this.player,npcMemory:this.npcMemory,
      quests:this.quests,killCounts:this.killCounts,turn:this.turn,v:1
    };
    try{localStorage.setItem("infinite-rpg-save",JSON.stringify(data));this.log("Game saved.","log-sys");Audio.blip("E5","16n");}
    catch(e){this.log("Save failed: "+e.message,"log-combat");}
  },
  load(){
    try{
      const raw=localStorage.getItem("infinite-rpg-save");
      if(!raw){this.log("No save found.","log-sys");return;}
      const d=JSON.parse(raw);
      this.seed=d.seed;this.player=d.player;this.npcMemory=d.npcMemory||{};
      this.quests=d.quests||[];this.killCounts=d.killCounts||{};this.turn=d.turn||0;
      this.recalcStats();this.updateHUD();this.draw();
      this.log("Game loaded.","log-sys");Audio.blip("G5","16n");
    }catch(e){this.log("Load failed: "+e.message,"log-combat");}
  },
  exportSave(){
    const data={seed:this.seed,player:this.player,npcMemory:this.npcMemory,quests:this.quests,killCounts:this.killCounts,turn:this.turn,v:1};
    const json=JSON.stringify(data);
    navigator.clipboard?.writeText(json).then(()=>{this.log("Save copied to clipboard.","log-sys");}).catch(()=>{
      const w=window.open("","_blank");if(w)w.document.write("<pre>"+json.replace(/</g,"&lt;")+"</pre>");
    });
  },
  importSave(){
    const s=prompt("Paste save JSON:");if(!s)return;
    try{
      const d=JSON.parse(s);
      this.seed=d.seed;this.player=d.player;this.npcMemory=d.npcMemory||{};
      this.quests=d.quests||[];this.killCounts=d.killCounts||{};this.turn=d.turn||0;
      this.recalcStats();this.updateHUD();this.draw();
      this.log("Save imported.","log-sys");
    }catch(e){this.log("Import failed: "+e.message,"log-combat");}
  },
  newGame(s){
    this.init(s);
    this.recalcStats();this.updateHUD();this.draw();
    this.log("=== A new realm awakens. Seed: "+this.seed.toString(16)+" ===","log-sys");
    document.getElementById("combatUI").classList.add("hidden");
  },

  // ============ RENDER ============
  draw(){
    const cv=document.getElementById("cv");
    const ctx=cv.getContext("2d");
    const TS=16,VW=25,VH=18;
    const px=this.player.x,py=this.player.y;
    const x0=px-Math.floor(VW/2),y0=py-Math.floor(VH/2);
    for(let dy=0;dy<VH;dy++){
      for(let dx=0;dx<VW;dx++){
        const wx=x0+dx,wy=y0+dy;
        const t=tileAt(wx,wy,this.seed);
        const c=TILE_COLOR[t];
        const checker=((wx+wy)&1);
        ctx.fillStyle=c[checker];
        ctx.fillRect(dx*TS,dy*TS,TS,TS);
        // tile decoration
        if(t===TILE.FOREST){ctx.fillStyle="#062";ctx.fillRect(dx*TS+5,dy*TS+3,2,8);ctx.fillStyle="#1a4";ctx.fillRect(dx*TS+3,dy*TS+1,6,5);ctx.fillRect(dx*TS+9,dy*TS+5,5,5);}
        else if(t===TILE.FLOWER){ctx.fillStyle="#fc8";ctx.fillRect(dx*TS+4,dy*TS+4,2,2);ctx.fillStyle="#f8c";ctx.fillRect(dx*TS+10,dy*TS+9,2,2);}
        else if(t===TILE.MOUNTAIN){ctx.fillStyle="#444";ctx.beginPath();ctx.moveTo(dx*TS+2,dy*TS+14);ctx.lineTo(dx*TS+8,dy*TS+2);ctx.lineTo(dx*TS+14,dy*TS+14);ctx.closePath();ctx.fill();ctx.fillStyle="#eee";ctx.beginPath();ctx.moveTo(dx*TS+6,dy*TS+5);ctx.lineTo(dx*TS+8,dy*TS+2);ctx.lineTo(dx*TS+10,dy*TS+5);ctx.closePath();ctx.fill();}
        else if(t===TILE.WATER){ctx.fillStyle="#5af";ctx.fillRect(dx*TS+(this.turn%4)*2,dy*TS+8,2,1);}
        else if(t===TILE.LAVA){ctx.fillStyle="#fa4";ctx.fillRect(dx*TS+(this.turn%3)*3,dy*TS+6,3,2);}
        else if(t===TILE.SAND){ctx.fillStyle="#eda";ctx.fillRect(dx*TS+5,dy*TS+11,1,1);ctx.fillRect(dx*TS+11,dy*TS+5,1,1);}
        else if(t===TILE.SNOW){ctx.fillStyle="#fff";ctx.fillRect(dx*TS+3,dy*TS+3,1,1);ctx.fillRect(dx*TS+11,dy*TS+9,1,1);}
        // NPC
        const npc=npcAt(wx,wy,this.seed);
        if(npc){
          ctx.fillStyle="#000";ctx.fillRect(dx*TS+3,dy*TS+3,10,10);
          ctx.fillStyle=npc.col;ctx.fillRect(dx*TS+4,dy*TS+4,8,8);
          ctx.fillStyle="#000";ctx.fillRect(dx*TS+6,dy*TS+6,1,1);ctx.fillRect(dx*TS+9,dy*TS+6,1,1);
          // quest indicator
          const ready=this.quests.find(q=>q.npcId===npc.id&&q.status==="ready");
          const has=this.quests.find(q=>q.npcId===npc.id&&q.status==="active");
          if(ready){ctx.fillStyle="#ff0";ctx.fillRect(dx*TS+6,dy*TS-2,4,4);ctx.fillStyle="#000";ctx.fillText("!",dx*TS+7,dy*TS+2);}
          else if(has){ctx.fillStyle="#0af";ctx.fillRect(dx*TS+6,dy*TS-2,4,4);}
          else{
            // check if can offer quest
            const r=mulberry32(npc.seed^0xFF)();
            if(r<0.7){ctx.fillStyle="#fff";ctx.fillText("?",dx*TS+7,dy*TS+1);}
          }
        }
      }
    }
    // player
    const cx=Math.floor(VW/2)*TS,cy=Math.floor(VH/2)*TS;
    ctx.fillStyle="#000";ctx.fillRect(cx+2,cy+2,12,12);
    ctx.fillStyle="#fc4";ctx.fillRect(cx+3,cy+3,10,10);
    ctx.fillStyle="#000";ctx.fillRect(cx+5,cy+5,2,2);ctx.fillRect(cx+9,cy+5,2,2);
    ctx.fillStyle="#a40";ctx.fillRect(cx+5,cy+10,6,1);
    // border tint
    const b=biomeAt(Math.floor(px/16),Math.floor(py/16),this.seed);
    const tints={meadow:null,forest:"rgba(0,40,0,0.08)",desert:"rgba(200,160,0,0.08)",tundra:"rgba(180,200,255,0.12)",volcano:"rgba(200,40,0,0.12)",swamp:"rgba(80,60,30,0.15)"};
    if(tints[b]){ctx.fillStyle=tints[b];ctx.fillRect(0,0,cv.width,cv.height);}
    // HUD
    document.getElementById("hud").innerHTML=`<div>${b.toUpperCase()}</div><div style="font-size:9px">Turn ${this.turn}</div>`;
  }
};

// ============ INPUT ============
window.addEventListener("keydown",(e)=>{
  if(!Audio.ready){Audio.init();Tone.start?.();}
  if(G.combat){
    if(e.key>="1"&&e.key<="4"){G.combatAct(parseInt(e.key)-1);e.preventDefault();}
    return;
  }
  if(G.dlg){
    if(e.key==="Escape"){G.endDialog();e.preventDefault();return;}
    if(e.key==="ArrowUp"||e.key==="w"){G.dlg.sel=(G.dlg.sel-1+G.dlg.opts.length)%G.dlg.opts.length;G.renderDialog();e.preventDefault();}
    else if(e.key==="ArrowDown"||e.key==="s"){G.dlg.sel=(G.dlg.sel+1)%G.dlg.opts.length;G.renderDialog();e.preventDefault();}
    else if(e.key===" "||e.key==="Enter"){G.dlg.opts[G.dlg.sel]?.act();e.preventDefault();}
    return;
  }
  if(G.invOpen){
    if(e.key==="Escape"||e.key==="i"||e.key==="I"){G.toggleInv();e.preventDefault();return;}
    if(e.key==="ArrowUp"||e.key==="w"){G.invSel=Math.max(0,G.invSel-1);G.renderInv();e.preventDefault();}
    else if(e.key==="ArrowDown"||e.key==="s"){G.invSel=Math.min(G.player.inv.length-1,G.invSel+1);G.renderInv();e.preventDefault();}
    else if(e.key==="Enter"||e.key===" "){G.useInv();e.preventDefault();}
    return;
  }
  if(G.qstOpen){if(e.key==="Escape"||e.key==="q"||e.key==="Q"){G.toggleQst();e.preventDefault();}return;}
  if(G.mnuOpen){if(e.key==="Escape"||e.key==="m"||e.key==="M"){G.toggleMnu();e.preventDefault();}return;}
  switch(e.key){
    case"ArrowUp":case"w":case"W":G.tryMove(0,-1);e.preventDefault();break;
    case"ArrowDown":case"s":case"S":G.tryMove(0,1);e.preventDefault();break;
    case"ArrowLeft":case"a":case"A":G.tryMove(-1,0);e.preventDefault();break;
    case"ArrowRight":case"d":case"D":G.tryMove(1,0);e.preventDefault();break;
    case" ":case"Enter":
      // interact with adjacent NPC
      for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){const n=npcAt(G.player.x+dx,G.player.y+dy,G.seed);if(n){G.startDialog(n);e.preventDefault();return;}}
      break;
    case"i":case"I":G.toggleInv();e.preventDefault();break;
    case"q":case"Q":G.toggleQst();e.preventDefault();break;
    case"m":case"M":G.toggleMnu();e.preventDefault();break;
  }
});

// ============ BOOT ============
G.init();
G.recalcStats();
G.updateHUD();
G.draw();
G.log("=== INFINITE RPG ===","log-sys");
G.log("An endless realm awakens around you. Seek towns. Talk to villagers. Earn glory.","log-sys");
G.log("Seed: "+G.seed.toString(16),"log-sys");
G.log("Tip: Press Space near an NPC (?) to talk. Use arrows or WASD to move.","log-sys");

// auto-load if save exists
try{if(localStorage.getItem("infinite-rpg-save")){G.log("Save detected. Press Load to resume, or move to start fresh.","log-sys");}}catch(e){}

// ambient redraw for water/lava animation
setInterval(()=>{if(!G.combat&&!G.dlg)G.draw();},400);

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;

      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,

      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){

        THREE.WebGLRenderer = function PatchedRenderer(params){

          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');

          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));

        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);

      }

        window.LEVIGOLD.paused = document.hidden;

      let frames = 0, t0 = performance.now(), fps = 60;

          fps = Math.round(frames * 1000 / (now - t0));

              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;

      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>
