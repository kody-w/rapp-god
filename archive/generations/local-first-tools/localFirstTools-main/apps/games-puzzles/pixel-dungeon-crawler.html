    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

            </div>

                EXPLORE THE DUNGEON. DEFEAT MONSTERS. FIND THE STAIRS. <span class="blink">█</span>

    <div id="game-over-screen">
        <div class="game-over-text">GAME OVER</div>
        <div class="score-display">
            FLOOR REACHED: <span id="final-floor">0</span><br>
            MONSTERS DEFEATED: <span id="final-kills">0</span><br>
            GOLD COLLECTED: <span id="final-gold">0</span>
        </div>
        <button class="restart-btn" onclick="restartGame()">PRESS TO RESTART</button>

    <script>
        // ========================================
        // Canvas Setup
        // ========================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        const TILE_SIZE = 16;
        const MAP_WIDTH = 50;
        const MAP_HEIGHT = 37;

        // ========================================
        // Game State
        // ========================================
        let player = {
            x: 0,
            y: 0,
            hp: 100,
            maxHp: 100,
            attack: 10,
            gold: 0,
            kills: 0,
            floor: 1
        };

        let dungeon = [];
        let monsters = [];
        let items = [];
        let stairs = { x: 0, y: 0 };
        let camera = { x: 0, y: 0 };
        let gameOver = false;
        let message = "EXPLORE THE DUNGEON. DEFEAT MONSTERS. FIND THE STAIRS.";

        // ========================================
        // Procedural Dungeon Generation
        // ========================================
        function generateDungeon() {
            // Initialize with walls
            dungeon = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(1));

            // Create rooms
            const rooms = [];
            const numRooms = 8 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numRooms; i++) {
                const roomWidth = 5 + Math.floor(Math.random() * 8);
                const roomHeight = 5 + Math.floor(Math.random() * 8);
                const roomX = Math.floor(Math.random() * (MAP_WIDTH - roomWidth - 2)) + 1;
                const roomY = Math.floor(Math.random() * (MAP_HEIGHT - roomHeight - 2)) + 1;

                // Carve out room
                for (let y = roomY; y < roomY + roomHeight; y++) {
                    for (let x = roomX; x < roomX + roomWidth; x++) {
                        dungeon[y][x] = 0;
                    }
                }

                rooms.push({
                    x: roomX,
                    y: roomY,
                    width: roomWidth,
                    height: roomHeight,
                    centerX: roomX + Math.floor(roomWidth / 2),
                    centerY: roomY + Math.floor(roomHeight / 2)
                });
            }

            // Connect rooms with corridors
            for (let i = 0; i < rooms.length - 1; i++) {
                const room1 = rooms[i];
                const room2 = rooms[i + 1];

                if (Math.random() > 0.5) {
                    // Horizontal then vertical
                    for (let x = Math.min(room1.centerX, room2.centerX); x <= Math.max(room1.centerX, room2.centerX); x++) {
                        dungeon[room1.centerY][x] = 0;
                    }
                    for (let y = Math.min(room1.centerY, room2.centerY); y <= Math.max(room1.centerY, room2.centerY); y++) {
                        dungeon[y][room2.centerX] = 0;
                    }
                } else {
                    // Vertical then horizontal
                    for (let y = Math.min(room1.centerY, room2.centerY); y <= Math.max(room1.centerY, room2.centerY); y++) {
                        dungeon[y][room1.centerX] = 0;
                    }
                    for (let x = Math.min(room1.centerX, room2.centerX); x <= Math.max(room1.centerX, room2.centerX); x++) {
                        dungeon[room2.centerY][x] = 0;
                    }
                }
            }

            // Place player in first room
            player.x = rooms[0].centerX;
            player.y = rooms[0].centerY;

            // Place stairs in last room
            stairs.x = rooms[rooms.length - 1].centerX;
            stairs.y = rooms[rooms.length - 1].centerY;

            // Spawn monsters
            monsters = [];
            const numMonsters = 5 + player.floor * 2;
            for (let i = 0; i < numMonsters && i < rooms.length - 2; i++) {
                const room = rooms[i + 1];
                const x = room.x + 1 + Math.floor(Math.random() * (room.width - 2));
                const y = room.y + 1 + Math.floor(Math.random() * (room.height - 2));

                monsters.push({
                    x,
                    y,
                    hp: 20 + player.floor * 5,
                    maxHp: 20 + player.floor * 5,
                    attack: 5 + player.floor * 2,
                    type: Math.random() > 0.7 ? 'strong' : 'weak'
                });
            }

            // Spawn gold
            items = [];
            const numGold = 3 + Math.floor(Math.random() * 5);
            for (let i = 0; i < numGold; i++) {
                const room = rooms[1 + Math.floor(Math.random() * (rooms.length - 1))];
                const x = room.x + 1 + Math.floor(Math.random() * (room.width - 2));
                const y = room.y + 1 + Math.floor(Math.random() * (room.height - 2));

                items.push({
                    x,
                    y,
                    type: 'gold',
                    value: 5 + Math.floor(Math.random() * 15)
                });
            }
        }

        // ========================================
        // Movement
        // ========================================
        function movePlayer(dx, dy) {
            const newX = player.x + dx;
            const newY = player.y + dy;

            if (newX < 0 || newX >= MAP_WIDTH || newY < 0 || newY >= MAP_HEIGHT) return;
            if (dungeon[newY][newX] === 1) return;

            // Check for monster collision
            const monster = monsters.find(m => m.x === newX && m.y === newY);
            if (monster) {
                // Combat
                monster.hp -= player.attack;
                message = `HIT MONSTER FOR ${player.attack} DAMAGE!`;

                if (monster.hp <= 0) {
                    monsters = monsters.filter(m => m !== monster);
                    player.kills++;
                    player.gold += 10 + Math.floor(Math.random() * 20);
                    message = "MONSTER DEFEATED! +GOLD";
                } else {
                    // Monster counterattack
                    player.hp -= monster.attack;
                    if (player.hp <= 0) {
                        player.hp = 0;
                        gameOver = true;
                        document.getElementById('game-over-screen').classList.add('show');
                        document.getElementById('final-floor').textContent = player.floor;
                        document.getElementById('final-kills').textContent = player.kills;
                        document.getElementById('final-gold').textContent = player.gold;
                        return;
                    }
                }
                return;
            }

            // Move player
            player.x = newX;
            player.y = newY;

            // Check for items
            const item = items.find(i => i.x === newX && i.y === newY);
            if (item) {
                if (item.type === 'gold') {
                    player.gold += item.value;
                    message = `FOUND ${item.value} GOLD!`;
                    items = items.filter(i => i !== item);
                }
            }

            // Check for stairs
            if (player.x === stairs.x && player.y === stairs.y) {
                player.floor++;
                message = `DESCENDED TO FLOOR ${player.floor}!`;
                generateDungeon();
            }

            // Monster turn
            monsters.forEach(m => {
                const dx = player.x - m.x;
                const dy = player.y - m.y;
                const dist = Math.abs(dx) + Math.abs(dy);

                if (dist < 8) {
                    const moveX = dx > 0 ? 1 : (dx < 0 ? -1 : 0);
                    const moveY = dy > 0 ? 1 : (dy < 0 ? -1 : 0);

                    const newMX = m.x + (Math.abs(dx) > Math.abs(dy) ? moveX : 0);
                    const newMY = m.y + (Math.abs(dy) > Math.abs(dx) ? moveY : 0);

                    if (dungeon[newMY] && dungeon[newMY][newMX] === 0 &&
                        !monsters.some(other => other.x === newMX && other.y === newMY)) {
                        m.x = newMX;
                        m.y = newMY;
                    }
                }
            });
        }

        // ========================================
        // Rendering
        // ========================================
        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Camera follow player
            camera.x = Math.max(0, Math.min(player.x - Math.floor(canvas.width / TILE_SIZE / 2), MAP_WIDTH - Math.floor(canvas.width / TILE_SIZE)));
            camera.y = Math.max(0, Math.min(player.y - Math.floor(canvas.height / TILE_SIZE / 2), MAP_HEIGHT - Math.floor(canvas.height / TILE_SIZE)));

            // Draw dungeon
            for (let y = 0; y < MAP_HEIGHT; y++) {
                for (let x = 0; x < MAP_WIDTH; x++) {
                    const screenX = (x - camera.x) * TILE_SIZE;
                    const screenY = (y - camera.y) * TILE_SIZE;

                    if (screenX < -TILE_SIZE || screenX > canvas.width || screenY < -TILE_SIZE || screenY > canvas.height) continue;

                    if (dungeon[y][x] === 1) {
                        // Wall
                        ctx.fillStyle = '#444';
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#666';
                        ctx.fillRect(screenX + 2, screenY + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    } else {
                        // Floor
                        ctx.fillStyle = '#111';
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        if ((x + y) % 2 === 0) {
                            ctx.fillStyle = '#0a0a0a';
                            ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }
            }

            // Draw stairs
            const stairsX = (stairs.x - camera.x) * TILE_SIZE;
            const stairsY = (stairs.y - camera.y) * TILE_SIZE;
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(stairsX + 4, stairsY + 4, TILE_SIZE - 8, TILE_SIZE - 8);
            ctx.fillRect(stairsX + 2, stairsY + 6, TILE_SIZE - 4, 4);

            // Draw items
            items.forEach(item => {
                const itemX = (item.x - camera.x) * TILE_SIZE;
                const itemY = (item.y - camera.y) * TILE_SIZE;
                if (item.type === 'gold') {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(itemX + TILE_SIZE / 2, itemY + TILE_SIZE / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw monsters
            monsters.forEach(m => {
                const monsterX = (m.x - camera.x) * TILE_SIZE;
                const monsterY = (m.y - camera.y) * TILE_SIZE;

                ctx.fillStyle = m.type === 'strong' ? '#ff0055' : '#ff6600';
                ctx.fillRect(monsterX + 3, monsterY + 3, TILE_SIZE - 6, TILE_SIZE - 6);

                // Health bar
                const healthPercent = m.hp / m.maxHp;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(monsterX, monsterY - 4, TILE_SIZE, 2);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(monsterX, monsterY - 4, TILE_SIZE * healthPercent, 2);
            });

            // Draw player
            const playerX = (player.x - camera.x) * TILE_SIZE;
            const playerY = (player.y - camera.y) * TILE_SIZE;
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(playerX + 4, playerY + 4, TILE_SIZE - 8, TILE_SIZE - 8);
            ctx.fillRect(playerX + 6, playerY + 2, TILE_SIZE - 12, 4); // head

            // Update UI
            document.getElementById('hp').textContent = `${player.hp}/${player.maxHp}`;
            document.getElementById('floor').textContent = player.floor;
            document.getElementById('gold').textContent = player.gold;
            document.getElementById('kills').textContent = player.kills;
            document.getElementById('game-message').innerHTML = message + ' <span class="blink">█</span>';
        }

        // ========================================
        // Input
        // ========================================
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;

            switch(e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    movePlayer(0, -1);
                    break;
                case 's':
                case 'arrowdown':
                    movePlayer(0, 1);
                    break;
                case 'a':
                case 'arrowleft':
                    movePlayer(-1, 0);
                    break;
                case 'd':
                case 'arrowright':
                    movePlayer(1, 0);
                    break;
                case 'h':
                    if (player.gold >= 10) {
                        player.gold -= 10;
                        player.hp = Math.min(player.hp + 30, player.maxHp);
                        message = "HEALED FOR 30 HP!";
                    } else {
                        message = "NOT ENOUGH GOLD TO HEAL!";
                    }
                    break;
                case 'r':
                    restartGame();
                    break;
            }

            render();
        });

        // ========================================
        // Game Loop
        // ========================================
        function gameLoop() {
            if (!gameOver) {
                render();
            }
            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            player = {
                x: 0,
                y: 0,
                hp: 100,
                maxHp: 100,
                attack: 10,
                gold: 0,
                kills: 0,
                floor: 1
            };
            gameOver = false;
            message = "EXPLORE THE DUNGEON. DEFEAT MONSTERS. FIND THE STAIRS.";
            document.getElementById('game-over-screen').classList.remove('show');
            generateDungeon();
            render();
        }

        window.restartGame = restartGame;

        // Initialize
        generateDungeon();
        gameLoop();
    </script>
</body>
</html>
