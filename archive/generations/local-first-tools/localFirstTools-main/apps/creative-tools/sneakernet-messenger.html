    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <header>

    <div id="main">
        <div class="mode-switch">
            <button class="mode-btn active" onclick="setMode('send')">📤 Send</button>
            <button class="mode-btn" onclick="setMode('receive')">📥 Receive</button>
        </div>
        
        <!-- SEND MODE -->
        <div id="send-panel" class="panel active">
            <textarea id="message-input" placeholder="Type your secret message here..."></textarea>
            
            <div class="status-bar">
                <div>Speed: <span id="speed-val">10</span> FPS</div>
                <input type="range" min="1" max="30" value="10" oninput="updateSpeed(this.value)" style="width:100%">
            </div>
            
            <button id="send-btn" onclick="startTransmission()">Transmit Message</button>

            </div>
            
            <div class="status-bar">
                Status: <span id="rx-status">Waiting for signal...</span>
                <div id="rx-stats">Chunks: 0/0</div>
                <div class="progress-bar"><div id="rx-progress" class="progress-fill"></div></div>

    <script>
        // --- PROTOCOL DEFINITION ---
        // We use a custom 8x8 grid (64 bits) for high robustness and ease of detection
        // Header: 8 bits (Pattern 10101010)
        // Sequence: 8 bits (0-255)
        // Total Chunks: 8 bits (0-255)
        // Data: 32 bits (4 bytes)
        // Checksum: 8 bits
        
        const GRID_SIZE = 8;
        const CELL_SIZE = 300 / GRID_SIZE;
        const HEADER_PATTERN = 0b10101010;
        
        let txInterval;
        let txSpeed = 10; // FPS
        let chunks = [];
        let currentChunkIdx = 0;
        
        let rxActive = false;
        let rxChunks = [];
        let rxTotal = 0;
        let rxLastSeq = -1;
        
        // --- UI LOGIC ---
        
        function setMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if (mode === 'send') {
                document.querySelector('.mode-btn:nth-child(1)').classList.add('active');
                document.getElementById('send-panel').classList.add('active');
                stopScanner();
            } else {
                document.querySelector('.mode-btn:nth-child(2)').classList.add('active');
                document.getElementById('receive-panel').classList.add('active');
                stopTransmission();
            }
        }
        
        function updateSpeed(val) {
            txSpeed = val;
            document.getElementById('speed-val').textContent = val;
            if (txInterval) {
                stopTransmission();
                startTransmission();
            }
        }
        
        // --- TRANSMITTER ---
        
        function startTransmission() {
            const text = document.getElementById('message-input').value;
            if (!text) return alert("Enter a message!");
            
            // Encode text to bytes
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            
            // Chunk data (4 bytes per chunk)
            chunks = [];
            const chunkSize = 4;
            const totalChunks = Math.ceil(data.length / chunkSize);
            
            if (totalChunks > 255) return alert("Message too long! Max 1KB.");
            
            for (let i = 0; i < totalChunks; i++) {
                const chunkData = new Uint8Array(4);
                const slice = data.slice(i * chunkSize, (i + 1) * chunkSize);
                chunkData.set(slice);
                
                // Build packet
                // [Header 8][Seq 8][Total 8][Data 32][Checksum 8] = 64 bits
                const packet = new Uint8Array(8);
                packet[0] = HEADER_PATTERN;
                packet[1] = i;
                packet[2] = totalChunks;
                packet.set(chunkData, 3);
                
                // Simple checksum (XOR sum)
                let checksum = 0;
                for(let j=0; j<7; j++) checksum ^= packet[j];
                packet[7] = checksum;
                
                chunks.push(packet);
            }
            
            document.getElementById('message-input').style.display = 'none';
            document.getElementById('send-btn').style.display = 'none';
            document.getElementById('transmitter').style.display = 'flex';
            
            currentChunkIdx = 0;
            txInterval = setInterval(renderNextFrame, 1000 / txSpeed);
        }
        
        function stopTransmission() {
            clearInterval(txInterval);
            txInterval = null;
            document.getElementById('message-input').style.display = 'block';
            document.getElementById('send-btn').style.display = 'block';
            document.getElementById('transmitter').style.display = 'none';
        }
        
        function renderNextFrame() {
            const ctx = document.getElementById('visual-stream').getContext('2d');
            const packet = chunks[currentChunkIdx];
            
            // Draw Grid
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 300, 300);
            
            // Convert packet bytes to bits
            let bits = [];
            for(let byte of packet) {
                for(let b=7; b>=0; b--) {
                    bits.push((byte >> b) & 1);
                }
            }
            
            // Draw bits
            for(let i=0; i<64; i++) {
                const x = (i % 8) * (300/8);
                const y = Math.floor(i / 8) * (300/8);
                
                if (bits[i]) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x + 2, y + 2, (300/8) - 4, (300/8) - 4);
                }
            }
            
            // Update UI
            document.getElementById('tx-chunk').textContent = `${currentChunkIdx + 1}/${chunks.length}`;
            document.getElementById('tx-progress').style.width = `${((currentChunkIdx + 1) / chunks.length) * 100}%`;
            
            currentChunkIdx = (currentChunkIdx + 1) % chunks.length;
        }
        
        // --- RECEIVER ---
        
        function toggleScanner() {
            if (rxActive) stopScanner();
            else startScanner();
        }
        
        function startScanner() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    const video = document.getElementById('camera-preview');
                    video.srcObject = stream;
                    rxActive = true;
                    document.getElementById('scan-btn').textContent = "Stop Camera";
                    document.getElementById('scan-btn').style.background = "#ef4444";
                    requestAnimationFrame(scanLoop);
                })
                .catch(err => alert("Camera error: " + err));
        }
        
        function stopScanner() {
            rxActive = false;
            const video = document.getElementById('camera-preview');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            document.getElementById('scan-btn').textContent = "Start Camera";
            document.getElementById('scan-btn').style.background = "var(--accent)";
        }
        
        function scanLoop() {
            if (!rxActive) return;
            
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('scan-canvas');
            const ctx = canvas.getContext('2d');
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 300;
                canvas.height = 300;
                
                // Draw center crop of video
                const size = Math.min(video.videoWidth, video.videoHeight) * 0.6;
                const sx = (video.videoWidth - size) / 2;
                const sy = (video.videoHeight - size) / 2;
                
                ctx.drawImage(video, sx, sy, size, size, 0, 0, 300, 300);
                
                // Analyze Grid
                const packet = decodeFrame(ctx);
                if (packet) {
                    processPacket(packet);
                }
            }
            
            requestAnimationFrame(scanLoop);
        }
        
        function decodeFrame(ctx) {
            // Sample 8x8 grid points
            const step = 300 / 8;
            const half = step / 2;
            let bits = [];
            
            // Thresholding (simple average brightness)
            // In a real app, we'd use adaptive thresholding
            // Here we assume high contrast
            
            for(let y=0; y<8; y++) {
                for(let x=0; x<8; x++) {
                    const pixel = ctx.getImageData(x * step + half, y * step + half, 1, 1).data;
                    const brightness = (pixel[0] + pixel[1] + pixel[2]) / 3;
                    bits.push(brightness > 128 ? 1 : 0);
                }
            }
            
            // Reconstruct bytes
            const bytes = new Uint8Array(8);
            for(let i=0; i<64; i++) {
                if (bits[i]) {
                    const byteIdx = Math.floor(i / 8);
                    const bitIdx = 7 - (i % 8);
                    bytes[byteIdx] |= (1 << bitIdx);
                }
            }
            
            // Validate Header
            if (bytes[0] !== HEADER_PATTERN) return null;
            
            // Validate Checksum
            let checksum = 0;
            for(let j=0; j<7; j++) checksum ^= bytes[j];
            if (checksum !== bytes[7]) return null;
            
            return bytes;
        }
        
        function processPacket(packet) {
            const seq = packet[1];
            const total = packet[2];
            const data = packet.slice(3, 7);
            
            if (rxChunks.length !== total) {
                rxChunks = new Array(total).fill(null);
                rxTotal = total;
                document.getElementById('rx-status').textContent = "Receiving...";
            }
            
            if (!rxChunks[seq]) {
                rxChunks[seq] = data;
                updateRxProgress();
                
                // Flash effect
                document.getElementById('rx-status').style.color = '#fff';
                setTimeout(() => document.getElementById('rx-status').style.color = '#94a3b8', 100);
            }
        }
        
        function updateRxProgress() {
            const count = rxChunks.filter(c => c !== null).length;
            document.getElementById('rx-stats').textContent = `Chunks: ${count}/${rxTotal}`;
            document.getElementById('rx-progress').style.width = `${(count / rxTotal) * 100}%`;
            
            if (count === rxTotal && rxTotal > 0) {
                // Reassemble
                const fullData = new Uint8Array(rxTotal * 4);
                for(let i=0; i<rxTotal; i++) {
                    fullData.set(rxChunks[i], i * 4);
                }
                
                // Decode text
                const decoder = new TextDecoder();
                // Remove trailing nulls if any
                let text = decoder.decode(fullData);
                text = text.replace(/\0/g, '');
                
                document.getElementById('received-message').value = text;
                document.getElementById('rx-status').textContent = "Message Received!";
                document.getElementById('rx-status').style.color = "var(--accent)";
                
                // Reset for next message? No, keep it.
            }
        }
        
    </script>
