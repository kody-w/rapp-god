    <style>
        :root {
            --terminal-green: #00ff00;
            --terminal-bg: #0a0a0a;
            --accent: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Monaco', monospace;
            background: var(--terminal-bg);
            color: var(--terminal-green);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--terminal-green);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px var(--terminal-green);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 0.8; }
            94% { opacity: 1; }
            97% { opacity: 0.9; }
        }

        .subtitle {
            color: var(--accent);
            margin-top: 10px;
            font-size: 1.1em;
        }

        .boot-status {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--terminal-green);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-led {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--terminal-green);
            animation: pulse 1s infinite;
        }

        .status-led.booting {
            background: #ffff00;
        }

        .status-led.ready {
            background: var(--terminal-green);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px currentColor; }
            50% { opacity: 0.5; box-shadow: 0 0 5px currentColor; }
        }

        #screen_container {
            background: #000;
            border: 3px solid var(--terminal-green);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            margin: 20px 0;
        }

        #screen_container canvas {
            display: block;
            width: 100%;
            image-rendering: pixelated;
        }

        #terminal {
            background: #000;
            color: var(--terminal-green);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 10px;
            min-height: 400px;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--terminal-green);
            color: var(--terminal-bg);
            box-shadow: 0 0 20px var(--terminal-green);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn.danger:hover {
            background: #ff4444;
            color: white;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .info-card {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 15px;
            border-radius: 4px;
        }

        .info-card h3 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .info-card .value {
            font-size: 1.5em;
        }

        .quick-commands {
            margin: 20px 0;
        }

        .quick-commands h3 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .command-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .command-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .command-btn:hover {
            background: var(--accent);
            color: var(--terminal-bg);
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            margin-top: 30px;
            font-size: 0.9em;
            color: rgba(0, 255, 0, 0.7);
        }

        .loading-text {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.5em; }
            .container { padding: 10px; }
            .controls { justify-content: center; }
        }

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
    "use strict";

    // ============================================
    // CONFIGURATION - Multi-CDN with CORS support
    // ============================================
    const V86_NPM = "https://cdn.jsdelivr.net/npm/v86@latest";
    const V86_GH_RAW = "https://raw.githubusercontent.com/copy/v86/master";
    const V86_COPY = "https://copy.sh/v86";
    const CORS_PROXY = "https://corsproxy.io/?";

    const CONFIG = {
        memory_size: 128 * 1024 * 1024, // 128 MB
        vga_memory_size: 8 * 1024 * 1024, // 8 MB

        // WASM from jsDelivr npm CDN (has CORS headers)
        wasm_path: V86_NPM + "/build/v86.wasm",
        // BIOS from GitHub raw (has CORS headers)
        bios_url: V86_GH_RAW + "/bios/seabios.bin",
        vga_bios_url: V86_GH_RAW + "/bios/vgabios.bin",
        // Kernel image from copy.sh (no CORS - need proxy fallback)
        bzimage_url: V86_COPY + "/images/buildroot-bzimage68.bin",
        cmdline: "tsc=reliable mitigations=off random.trust_cpu=on",
    };

    // Fetch a binary asset as ArrayBuffer, with CORS proxy fallback
    async function fetchAsset(url, label) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(resp.status);
            return await resp.arrayBuffer();
        } catch (e) {
            console.warn(`Direct fetch failed for ${label} (${url}), trying CORS proxy...`);
            const proxyUrl = CORS_PROXY + encodeURIComponent(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`CORS proxy also failed for ${label}: ${resp.status}`);
            return await resp.arrayBuffer();
        }
    }

    // ============================================
    // EMULATOR INSTANCE
    // ============================================
    let emulator = null;
    let startTime = null;
    let statsInterval = null;

    // UI ELEMENTS
    // ============================================
    const elements = {
        statusLed: document.getElementById('status-led'),
        statusText: document.getElementById('status-text'),
        pauseBtn: document.getElementById('pause-btn'),
        resumeBtn: document.getElementById('resume-btn'),
        resetBtn: document.getElementById('reset-btn'),
        fullscreenBtn: document.getElementById('fullscreen-btn'),
        screenshotBtn: document.getElementById('screenshot-btn'),
        uptime: document.getElementById('uptime'),
        speed: document.getElementById('speed'),
        resolution: document.getElementById('resolution'),
        terminal: document.getElementById('terminal'),
        screenContainer: document.getElementById('screen_container'),
    };

    // ============================================
    // STATUS UPDATES
    // ============================================
    function setStatus(status, message) {
        elements.statusLed.className = 'status-led ' + status;
        elements.statusText.textContent = message;
        elements.statusText.className = status === 'booting' ? 'loading-text' : '';
    }

    function updateStats() {
        if (!emulator || !startTime) return;

        // Update uptime
        const uptimeSec = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(uptimeSec / 60);
        const seconds = uptimeSec % 60;
        elements.uptime.textContent = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

        // Update speed (MIPS) - safely handle method availability
        try {
            if (emulator.get_instruction_counter && uptimeSec > 0) {
                const ips = emulator.get_instruction_counter() / uptimeSec;
                elements.speed.textContent = (ips / 1e6).toFixed(1) + ' MIPS';
            }
        } catch (e) {
            // Ignore if not available
        }
    }

    // ============================================
    // EMULATOR CONTROLS
    // ============================================
    function enableControls() {
        elements.pauseBtn.disabled = false;
        elements.resetBtn.disabled = false;
        elements.screenshotBtn.disabled = false;
    }

    function pauseEmulator() {
        if (emulator) {
            emulator.stop();
            elements.pauseBtn.style.display = 'none';
            elements.resumeBtn.style.display = 'inline-block';
            elements.resumeBtn.disabled = false;
            setStatus('paused', 'Emulator paused');
        }
    }

    function resumeEmulator() {
        if (emulator) {
            emulator.run();
            elements.resumeBtn.style.display = 'none';
            elements.pauseBtn.style.display = 'inline-block';
            setStatus('ready', 'Linux is running - Click terminal to interact');
        }
    }

    function resetEmulator() {
        if (emulator && confirm('Reset the virtual machine?')) {
            emulator.restart();
            setStatus('booting', 'Rebooting Linux...');
        }
    }

    function goFullscreen() {
        const container = elements.screenContainer;
        if (container.requestFullscreen) {
            container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
            container.webkitRequestFullscreen();
        }
    }

    function takeScreenshot() {
        if (!emulator) return;
        
        // Get the canvas from screen_container
        const canvas = document.querySelector('#screen_container canvas');
        if (!canvas) {
            console.log("No canvas found for screenshot");
            return;
        }
        const link = document.createElement('a');
        link.download = 'linux-screenshot-' + Date.now() + '.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // ============================================
    // SERIAL OUTPUT HANDLING
    // ============================================
    let serialBuffer = "";
    let bootComplete = false;
    
    function handleSerialOutput(byte) {
        const char = String.fromCharCode(byte);
        
        // Skip carriage returns
        if (char === "\r") return;
        
        // Append to terminal display
        elements.terminal.textContent += char;
        
        // Auto-scroll terminal
        elements.terminal.scrollTop = elements.terminal.scrollHeight;
        
        // Track buffer for prompt detection
        serialBuffer += char;
        if (serialBuffer.length > 100) {
            serialBuffer = serialBuffer.slice(-100);
        }
        
        // Detect shell prompt (indicates boot complete)
        if (!bootComplete && (serialBuffer.endsWith("~% ") || serialBuffer.endsWith("# ") || serialBuffer.endsWith("$ "))) {
            bootComplete = true;
            setStatus('ready', 'Linux is running! Click terminal area then type commands.');
            enableControls();
        }
    }

    // ============================================
    // QUICK COMMANDS
    // ============================================
    function sendCommand(cmd) {
        if (!emulator) return;
        
        // Send the command via serial
        emulator.serial0_send(cmd);
    }

    // ============================================
    // BOOT SCREEN (canvas loading animation)
    // ============================================
    function drawBootScreen() {
        const canvas = document.querySelector('#screen_container canvas');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 720; canvas.height = 400;
        canvas.style.display = 'block';
        let frame = 0;
        function renderFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = '16px monospace';
            ctx.fillStyle = '#0f0';
            ctx.fillText('Booting Linux...', 20, 40);
            ctx.strokeStyle = '#0f0';
            ctx.strokeRect(20, 60, 200, 16);
            ctx.fillRect(20, 60, Math.min(frame * 3, 200), 16);
            frame++;
            if (!emulator) requestAnimationFrame(renderFrame);
        }
        renderFrame();
    }

    // ============================================
    // BOOT LINUX
    // ============================================
    async function bootLinux() {
        console.log("Initializing v86 emulator...");

        try {
            // Prefetch all binary assets as ArrayBuffers (handles CORS via proxy fallback)
            setStatus('booting', 'Downloading BIOS...');
            const [biosBuffer, vgaBiosBuffer] = await Promise.all([
                fetchAsset(CONFIG.bios_url, "BIOS"),
                fetchAsset(CONFIG.vga_bios_url, "VGA BIOS"),
            ]);

            setStatus('booting', 'Downloading Linux kernel (4.9 MB)...');
            const bzimageBuffer = await fetchAsset(CONFIG.bzimage_url, "Linux kernel");

            setStatus('booting', 'Starting emulator...');

            emulator = new V86({
                wasm_path: CONFIG.wasm_path,
                memory_size: CONFIG.memory_size,
                vga_memory_size: CONFIG.vga_memory_size,

                // Screen container for VGA output
                screen_container: elements.screenContainer,

                // BIOS files (passed as ArrayBuffers to avoid CORS issues)
                bios: { buffer: biosBuffer },
                vga_bios: { buffer: vgaBiosBuffer },

                // Linux kernel (passed as ArrayBuffer)
                bzimage: { buffer: bzimageBuffer },

                // Required for serial/filesystem
                filesystem: {},

                // Kernel command line
                cmdline: CONFIG.cmdline,

                // Auto-start the emulator
                autostart: true,

                // Disable keyboard capture initially (use serial instead)
                disable_keyboard: false,
            });

            startTime = Date.now();
            window.emulator = emulator; // For debugging

            // Listen for emulator ready
            emulator.add_listener("emulator-ready", function() {
                console.log("Emulator ready, kernel loading...");
                setStatus('booting', 'Kernel loading...');
            });

            // Listen for serial output
            emulator.add_listener("serial0-output-byte", (b) => handleSerialOutput(b));

            // Update stats every second
            statsInterval = setInterval(updateStats, 1000);

            // Safety timeout - enable controls after 15 seconds even if prompt not detected
            setTimeout(() => {
                if (!bootComplete) {
                    console.log("Timeout reached, enabling controls anyway");
                    enableControls();
                    setStatus('ready', 'Linux should be running - try typing commands');
                }
            }, 15000);

        } catch (error) {
            console.error("Failed to start emulator:", error);
            setStatus('error', 'Failed to download assets');
            elements.terminal.textContent = "ERROR: " + error.message +
                "\n\nCould not download v86 assets." +
                "\nThis may be caused by browser tracking prevention or CORS restrictions." +
                "\n\nTry:" +
                "\n  1. Disabling tracking prevention for this page" +
                "\n  2. Using a different browser (Chrome works best)" +
                "\n  3. Running via local server: python3 -m http.server";
        }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        elements.pauseBtn.addEventListener('click', () => pauseEmulator());
        elements.resumeBtn.addEventListener('click', () => resumeEmulator());
        elements.resetBtn.addEventListener('click', () => resetEmulator());
        elements.fullscreenBtn.addEventListener('click', () => goFullscreen());
        elements.screenshotBtn.addEventListener('click', () => takeScreenshot());

        // Quick command buttons
        document.querySelectorAll('.command-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const cmd = btn.getAttribute('data-cmd');
                if (cmd) {
                    sendCommand(cmd + '\n');
                    console.log("Sent command:", cmd);
                }
            });
        });
        
        // Show boot screen animation, then start emulator
        drawBootScreen();
        bootLinux();
    });

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
        if (statsInterval) clearInterval(statsInterval);
        if (emulator) emulator.stop();
    });
    </script>
</body>
</html>
