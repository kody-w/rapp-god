<div class="app">
  <header>

  <main id="main"></main>

  <div class="footer-note" id="statusLine">Ready. No servers, no accounts. Direct WebRTC + ECDH-P256 + AES-GCM.</div>

<div class="toast-zone" id="toasts"></div>

<script>
"use strict";

/* =========================================================================
 * QR MESH CHAT
 * Trustless P2P E2E chat. Two peers exchange offer/answer SDP via QR codes.
 * Shared key via ECDH-P256, messages encrypted via AES-GCM 256.
 * ========================================================================= */

const STUN_SERVERS = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun.cloudflare.com:3478" }
];

// --- State ---
const state = {
  screen: "home", // home | exchange | chat
  role: null,     // "offerer" | "answerer"
  pc: null,
  dc: null,
  myKeys: null,         // CryptoKeyPair
  myPubJwk: null,       // serializable
  peerPubJwk: null,
  sharedKey: null,      // CryptoKey AES-GCM
  fingerprint: null,    // hex string
  myName: "",
  peerName: "",
  messages: [],
  qrFrames: [],
  qrFrameIndex: 0,
  qrAnimTimer: null,
  scanning: false,
  scanStream: null,
  scanRAF: null,
  scanBuffer: new Map(), // for multi-frame QR
  pendingCandidates: [],
  iceComplete: false,
  iceWaitResolver: null,
};

// --- Util ---
const $ = sel => document.querySelector(sel);
const main = $("#main");

function toast(msg, type = "") {
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  $("#toasts").appendChild(el);
  setTimeout(() => {
    el.style.opacity = "0";
    el.style.transition = "opacity 200ms";
    setTimeout(() => el.remove(), 220);
  }, 3500);
}

function setStatus(s) { $("#statusLine").textContent = s; }

function bufToHex(buf) {
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
function bufToB64(buf) {
  let s = "";
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBuf(b64) {
  const s = atob(b64);
  const out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out.buffer;
}
function nowISO() { return new Date().toISOString(); }
function fmtTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  } catch (e) { return ""; }
}

// --- Crypto ---
async function genKeys() {
  const kp = await crypto.subtle.generateKey(
    { name: "ECDH", namedCurve: "P-256" },
    true,
    ["deriveBits", "deriveKey"]
  );
  const pubJwk = await crypto.subtle.exportKey("jwk", kp.publicKey);
  return { kp, pubJwk };
}
async function importPeerPub(jwk) {
  return crypto.subtle.importKey(
    "jwk", jwk,
    { name: "ECDH", namedCurve: "P-256" },
    true, []
  );
}
async function deriveShared(myPriv, peerPub) {
  // 256 bits ECDH
  const bits = await crypto.subtle.deriveBits(
    { name: "ECDH", public: peerPub }, myPriv, 256
  );
  // Sort fingerprint by canonical pub keys to match on both sides
  const aesKey = await crypto.subtle.importKey(
    "raw", bits,
    { name: "AES-GCM", length: 256 },
    false, ["encrypt", "decrypt"]
  );
  const fpBuf = await crypto.subtle.digest("SHA-256", bits);
  return { aesKey, fingerprint: bufToHex(fpBuf) };
}
async function aesEncrypt(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder().encode(plaintext);
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc);
  return { iv: bufToB64(iv.buffer), ct: bufToB64(ct) };
}
async function aesDecrypt(key, payload) {
  const iv = new Uint8Array(b64ToBuf(payload.iv));
  const ct = b64ToBuf(payload.ct);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

// --- SDP Compression ---
// SDP is huge for a QR. We strip aggressively then LZ-compress.
function compactSdp(sdp) {
  // Remove redundant whitespace, keep structure
  return sdp.split(/\r?\n/).filter(l => l.length > 0).join("\n");
}
function expandSdp(s) {
  return s.split("\n").join("\r\n") + "\r\n";
}
function packPayload(obj) {
  // Pre-process SDP to compact form
  const minimal = { ...obj };
  if (minimal.sdp) minimal.sdp = compactSdp(minimal.sdp);
  const json = JSON.stringify(minimal);
  // LZ-string compress to URI-safe alphabet
  return LZString.compressToEncodedURIComponent(json);
}
function unpackPayload(s) {
  const json = LZString.decompressFromEncodedURIComponent(s);
  if (!json) throw new Error("Invalid QR payload");
  const obj = JSON.parse(json);
  if (obj.sdp) obj.sdp = expandSdp(obj.sdp);
  return obj;
}

// --- QR Multi-frame protocol ---
// If payload too long, split into chunks. Frame format:
//   QMC|<id>|<index>|<total>|<chunk>
const QR_CHUNK_SIZE = 700; // chars per QR (M error correction can hold ~1k chars at v25-30)

function makeFrames(payload) {
  const id = Math.random().toString(36).slice(2, 8);
  if (payload.length <= QR_CHUNK_SIZE) {
    return ["QMC|" + id + "|0|1|" + payload];
  }
  const chunks = [];
  const total = Math.ceil(payload.length / QR_CHUNK_SIZE);
  for (let i = 0; i < total; i++) {
    const part = payload.slice(i * QR_CHUNK_SIZE, (i + 1) * QR_CHUNK_SIZE);
    chunks.push("QMC|" + id + "|" + i + "|" + total + "|" + part);
  }
  return chunks;
}
function parseFrame(text) {
  if (!text || !text.startsWith("QMC|")) return null;
  const parts = text.split("|");
  if (parts.length < 5) return null;
  const id = parts[1];
  const index = parseInt(parts[2], 10);
  const total = parseInt(parts[3], 10);
  const chunk = parts.slice(4).join("|");
  if (isNaN(index) || isNaN(total)) return null;
  return { id, index, total, chunk };
}

// --- WebRTC plumbing ---
function newPeer() {
  const pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  pc.oniceconnectionstatechange = () => {
    setStatus("ICE: " + pc.iceConnectionState);
    if (pc.iceConnectionState === "failed") {
      toast("Connection failed. Try again on the same LAN.", "err");
    }
  };
  pc.onicegatheringstatechange = () => {
    if (pc.iceGatheringState === "complete" && state.iceWaitResolver) {
      state.iceWaitResolver();
      state.iceWaitResolver = null;
    }
  };
  return pc;
}
function waitForIce(pc, timeoutMs = 4000) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === "complete") return resolve();
    state.iceWaitResolver = resolve;
    setTimeout(() => {
      if (state.iceWaitResolver) {
        state.iceWaitResolver();
        state.iceWaitResolver = null;
      }
    }, timeoutMs);
  });
}

function attachDataChannel(dc) {
  state.dc = dc;
  dc.binaryType = "arraybuffer";
  dc.onopen = () => {
    setStatus("Data channel open. Performing identity exchange...");
    // Send hello with name (still encrypted with shared key)
    sendCipher({ kind: "hello", name: state.myName || "Peer", at: nowISO() }).catch(e => {
      console.error(e);
      toast("Failed to send hello: " + e.message, "err");
    });
  };
  dc.onclose = () => {
    setStatus("Data channel closed.");
    addSystemMsg("Connection closed.");
  };
  dc.onerror = e => {
    console.error("dc error", e);
    setStatus("Data channel error.");
  };
  dc.onmessage = async ev => {
    try {
      const payload = JSON.parse(ev.data);
      const plain = await aesDecrypt(state.sharedKey, payload);
      const obj = JSON.parse(plain);
      handleIncoming(obj);
    } catch (e) {
      console.error("decrypt fail", e);
      toast("Decryption failed — possible MITM!", "err");
    }
  };
}

async function sendCipher(obj) {
  if (!state.dc || state.dc.readyState !== "open") throw new Error("Channel not open");
  const json = JSON.stringify(obj);
  const payload = await aesEncrypt(state.sharedKey, json);
  state.dc.send(JSON.stringify(payload));
}

function handleIncoming(obj) {
  if (obj.kind === "hello") {
    state.peerName = obj.name || "Peer";
    addSystemMsg("Connected to " + state.peerName + ". End-to-end encrypted.");
    if (state.screen !== "chat") showChat();
    else renderChat();
    loadHistory();
  } else if (obj.kind === "msg") {
    const m = { id: obj.id, from: "them", name: state.peerName, body: obj.body, at: obj.at };
    state.messages.push(m);
    saveHistory();
    appendMsg(m);
  } else if (obj.kind === "file") {
    const m = {
      id: obj.id, from: "them", name: state.peerName,
      body: "", at: obj.at,
      file: { name: obj.name, mime: obj.mime, size: obj.size, b64: obj.b64 }
    };
    state.messages.push(m);
    saveHistory();
    appendMsg(m);
  } else if (obj.kind === "typing") {
    // could show typing indicator (omitted for brevity)
  }
}

// --- Persistent history ---
function historyKey() {
  if (!state.fingerprint) return null;
  return "qrmc_history_" + state.fingerprint.slice(0, 32);
}
function nameKey() { return "qrmc_name"; }

function loadName() {
  try { return localStorage.getItem(nameKey()) || ""; } catch (e) { return ""; }
}
function saveName(n) {
  try { localStorage.setItem(nameKey(), n); } catch (e) {}
}
function loadHistory() {
  const k = historyKey();
  if (!k) return;
  try {
    const raw = localStorage.getItem(k);
    if (!raw) return;
    const arr = JSON.parse(raw);
    if (Array.isArray(arr)) {
      // Merge previous messages, but only if state is empty (initial connect)
      const existing = new Set(state.messages.map(m => m.id));
      const prior = arr.filter(m => !existing.has(m.id));
      state.messages = prior.concat(state.messages);
      renderChat();
    }
  } catch (e) { console.warn("history load failed", e); }
}
function saveHistory() {
  const k = historyKey();
  if (!k) return;
  try {
    // Cap to 500 most recent
    const arr = state.messages.slice(-500);
    localStorage.setItem(k, JSON.stringify(arr));
  } catch (e) { console.warn("history save failed", e); }
}

function startQrAnim(payload) {
  cleanupQrAnim();
  state.qrFrames = makeFrames(payload);
  state.qrFrameIndex = 0;
  $("#qrSizeLabel").textContent = payload.length + " B";
  drawQrFrame();
  if (state.qrFrames.length > 1) {
    state.qrAnimTimer = setInterval(drawQrFrame, 850);
  }
}
function cleanupQrAnim() {
  if (state.qrAnimTimer) { clearInterval(state.qrAnimTimer); state.qrAnimTimer = null; }
  state.qrFrames = [];
  state.qrFrameIndex = 0;
}
function drawQrFrame() {
  if (!state.qrFrames.length) return;
  const f = state.qrFrames[state.qrFrameIndex % state.qrFrames.length];
  const total = state.qrFrames.length;
  const idx = state.qrFrameIndex % total;
  const frameEl = document.getElementById("qrFrame");
  if (!frameEl) return;
  frameEl.innerHTML = "";
  const canvas = document.createElement("canvas");
  frameEl.appendChild(canvas);
  QRCode.toCanvas(canvas, f, { errorCorrectionLevel: "M", margin: 1, scale: 4 }, err => {
    if (err) { frameEl.textContent = "QR error: " + err.message; return; }
  });
  const lbl = document.getElementById("qrFrameLabel");
  if (lbl) lbl.textContent = "Frame " + (idx + 1) + "/" + total;
  const prog = document.getElementById("qrProg");
  if (prog) prog.style.width = (((idx + 1) / total) * 100) + "%";
  state.qrFrameIndex++;
}

async function startScan(onResult) {
  cleanupScan();
  state.scanBuffer = new Map();
  const video = document.getElementById("scanVideo");
  const overlay = document.getElementById("scanOverlay");
  const stateBadge = document.getElementById("scanState");
  if (!video) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    state.scanStream = stream;
    video.srcObject = stream;
    await video.play();
    overlay.textContent = "Aim at QR…";
    stateBadge.textContent = "scanning";
    stateBadge.className = "badge ok";
    state.scanning = true;
    const cnv = document.createElement("canvas");
    const ctx = cnv.getContext("2d", { willReadFrequently: true });
    const tick = () => {
      if (!state.scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const w = video.videoWidth, h = video.videoHeight;
        if (w && h) {
          cnv.width = w; cnv.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          try {
            const img = ctx.getImageData(0, 0, w, h);
            const code = jsQR(img.data, w, h, { inversionAttempts: "dontInvert" });
            if (code && code.data) {
              const f = parseFrame(code.data);
              if (f) {
                if (!state.scanBuffer.has(f.id)) state.scanBuffer.set(f.id, { total: f.total, parts: new Map() });
                const entry = state.scanBuffer.get(f.id);
                entry.parts.set(f.index, f.chunk);
                overlay.textContent = "Got " + entry.parts.size + "/" + entry.total;
                if (entry.parts.size === entry.total) {
                  let assembled = "";
                  for (let i = 0; i < entry.total; i++) {
                    const p = entry.parts.get(i);
                    if (p == null) { assembled = null; break; }
                    assembled += p;
                  }
                  if (assembled) {
                    state.scanning = false;
                    overlay.textContent = "✓ Scan complete";
                    stateBadge.textContent = "captured";
                    try { onResult(assembled); } catch (e) {
                      console.error(e); toast("Bad payload: " + e.message, "err");
                    }
                    return;
                  }
                }
              }
            }
          } catch (e) { /* keep ticking */ }
        }
      }
      state.scanRAF = requestAnimationFrame(tick);
    };
    state.scanRAF = requestAnimationFrame(tick);
  } catch (e) {
    console.error("camera error", e);
    overlay.textContent = "❌ " + (e.name === "NotAllowedError" ? "Permission denied" : "No camera");
    stateBadge.textContent = "no camera";
    stateBadge.className = "badge err";
    toast("Camera unavailable: " + e.message + ". Use 'Paste payload' instead.", "err");
  }
}
function cleanupScan() {
  state.scanning = false;
  if (state.scanRAF) { cancelAnimationFrame(state.scanRAF); state.scanRAF = null; }
  if (state.scanStream) {
    state.scanStream.getTracks().forEach(t => t.stop());
    state.scanStream = null;
  }
}

// --- Offerer flow ---
async function startOffererFlow() {
  state.role = "offerer";
  setStatus("Generating keys + offer…");
  const { kp, pubJwk } = await genKeys();
  state.myKeys = kp; state.myPubJwk = pubJwk;
  const pc = newPeer();
  state.pc = pc;
  const dc = pc.createDataChannel("chat", { ordered: true });
  attachDataChannel(dc);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce(pc);
  const finalOffer = pc.localDescription;
  const payload = packPayload({
    t: "offer",
    name: state.myName || "Peer",
    pub: pubJwk,
    sdp: finalOffer.sdp,
    type: finalOffer.type
  });
  setStatus("Show this QR to your peer. Then click 'Scan answer'.");
  renderExchange({
    side: "offerer",
    qrTitle: "Your offer (show this)",
    qrPayload: payload,
    scanTitle: "Scan peer's answer",
    onScanResult: handleAnswerScan,
    hint: "Tap 'Scan answer' once your peer presents their reply."
  });
}

async function handleAnswerScan(payload) {
  try {
    setStatus("Applying answer…");
    const obj = unpackPayload(payload);
    if (obj.t !== "answer") throw new Error("Expected answer, got " + obj.t);
    state.peerPubJwk = obj.pub;
    state.peerName = obj.name || "Peer";
    const peerPub = await importPeerPub(obj.pub);
    const { aesKey, fingerprint } = await deriveShared(state.myKeys.privateKey, peerPub);
    state.sharedKey = aesKey;
    state.fingerprint = fingerprint;
    await state.pc.setRemoteDescription({ type: "answer", sdp: obj.sdp });
    setStatus("Connecting…");
    cleanupQrAnim();
    cleanupScan();
    showConnecting();
  } catch (e) {
    console.error(e);
    toast("Failed to apply answer: " + e.message, "err");
  }
}

// --- Answerer flow ---
async function startAnswererFlow() {
  state.role = "answerer";
  setStatus("Camera ready. Scan your peer's offer QR.");
  renderExchange({
    side: "answerer",
    qrTitle: "Your reply will appear here",
    qrPayload: "QMC|wait|0|1|waiting-for-offer",
    scanTitle: "Scan peer's offer",
    onScanResult: handleOfferScan,
    hint: "Once you've scanned the offer, your reply QR appears on the left."
  });
}

async function handleOfferScan(payload) {
  try {
    setStatus("Applying offer + generating reply…");
    const obj = unpackPayload(payload);
    if (obj.t !== "offer") throw new Error("Expected offer, got " + obj.t);
    state.peerPubJwk = obj.pub;
    state.peerName = obj.name || "Peer";

    const { kp, pubJwk } = await genKeys();
    state.myKeys = kp; state.myPubJwk = pubJwk;

    const peerPub = await importPeerPub(obj.pub);
    const { aesKey, fingerprint } = await deriveShared(kp.privateKey, peerPub);
    state.sharedKey = aesKey;
    state.fingerprint = fingerprint;

    const pc = newPeer();
    state.pc = pc;
    pc.ondatachannel = ev => attachDataChannel(ev.channel);
    await pc.setRemoteDescription({ type: "offer", sdp: obj.sdp });
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await waitForIce(pc);
    const finalAnswer = pc.localDescription;
    const replyPayload = packPayload({
      t: "answer",
      name: state.myName || "Peer",
      pub: pubJwk,
      sdp: finalAnswer.sdp,
      type: finalAnswer.type
    });
    setStatus("Show your reply QR to the peer.");
    cleanupQrAnim();
    cleanupScan();
    renderExchange({
      side: "answerer",
      qrTitle: "Your reply (show this)",
      qrPayload: replyPayload,
      scanTitle: "Waiting for peer to scan…",
      onScanResult: () => toast("Already scanned offer.", ""),
      hint: "Have your peer scan this QR. Connection will establish automatically."
    });
    // No more scanning needed; visually indicate
    setTimeout(() => {
      const ov = document.getElementById("scanOverlay");
      if (ov) ov.textContent = "Waiting for connection…";
    }, 50);
  } catch (e) {
    console.error(e);
    toast("Failed to handle offer: " + e.message, "err");
  }
}

function renderChat() {
  const list = document.getElementById("msgList");
  if (!list) return;
  list.innerHTML = "";
  for (const m of state.messages) appendMsg(m, true);
  list.scrollTop = list.scrollHeight;

  if (cb && state.dc) {
    cb.textContent = state.dc.readyState;
    cb.className = "badge " + (state.dc.readyState === "open" ? "ok" : "warn");
  }
}
function appendMsg(m, skipScroll) {
  const list = document.getElementById("msgList");
  if (!list) return;
  const el = document.createElement("div");
  el.className = "msg " + (m.from === "system" ? "system" : (m.from === "me" ? "me" : ""));
  if (m.from === "system") {
    el.innerHTML = `<div class="body">${escapeHtml(m.body)}</div>`;
  } else {
    let fileHtml = "";
    if (m.file) {
      const dataUrl = "data:" + m.file.mime + ";base64," + m.file.b64;
      fileHtml = `<div class="file">📄 <a href="${dataUrl}" download="${escapeHtml(m.file.name)}">${escapeHtml(m.file.name)}</a> <span style="color:var(--fg-2)">(${formatBytes(m.file.size)})</span></div>`;
    }
    el.innerHTML = `
      <div class="body">${escapeHtml(m.body || "")}</div>
      ${fileHtml}
      <div class="meta">
        <span class="lock-good">🔒</span>
        <span>${escapeHtml(m.name || (m.from === "me" ? "you" : "peer"))}</span>
        <span>·</span>
        <span>${fmtTime(m.at)}</span>
      </div>
    `;
  }
  list.appendChild(el);
  if (!skipScroll) list.scrollTop = list.scrollHeight;
}
function addSystemMsg(body) {
  const m = { id: "sys-" + Math.random().toString(36).slice(2, 8), from: "system", body, at: nowISO() };
  state.messages.push(m);
  saveHistory();
  appendMsg(m);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}
function formatBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / 1024 / 1024).toFixed(2) + " MB";
}

async function sendMessage() {
  const ta = document.getElementById("msgInput");
  const body = ta.value.trim();
  if (!body) return;
  if (!state.dc || state.dc.readyState !== "open") {
    toast("Channel not open.", "err"); return;
  }
  const id = "m-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  const m = { id, from: "me", name: state.myName || "you", body, at: nowISO() };
  try {
    await sendCipher({ kind: "msg", id, body, at: m.at });
    state.messages.push(m);
    saveHistory();
    appendMsg(m);
    ta.value = "";
    ta.style.height = "auto";
  } catch (e) {
    console.error(e);
    toast("Send failed: " + e.message, "err");
  }
}

function attachFile() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.onchange = async () => {
    const f = inp.files && inp.files[0];
    if (!f) return;
    if (f.size > 1024 * 1024) { toast("File too large (max 1MB).", "err"); return; }
    const buf = await f.arrayBuffer();
    const b64 = bufToB64(buf);
    const id = "f-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
    const at = nowISO();
    try {
      await sendCipher({ kind: "file", id, name: f.name, mime: f.type || "application/octet-stream", size: f.size, b64, at });
      const m = {
        id, from: "me", name: state.myName || "you", body: "", at,
        file: { name: f.name, mime: f.type || "application/octet-stream", size: f.size, b64 }
      };
      state.messages.push(m);
      saveHistory();
      appendMsg(m);
    } catch (e) {
      console.error(e); toast("File send failed: " + e.message, "err");
    }
  };
  inp.click();
}

function showFingerprint() {
  const fp = state.fingerprint || "";
  const groups = [];
  for (let i = 0; i < 32 && i < fp.length; i += 4) groups.push(fp.slice(i, i + 4));
  const blocks = groups.map(g => `<div class="fp-block">${g}</div>`).join("");
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" role="dialog">
      <h2>🛡️ Verify fingerprint</h2>

        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;

        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');

        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
