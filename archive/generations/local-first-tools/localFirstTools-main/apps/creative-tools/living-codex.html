    color: var(--ink);
    border: 1px solid rgba(60, 30, 10, 0.3);
    padding: 5px 12px;

    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-style: italic;

    letter-spacing: 12px;

    position: relative;

    animation: fadeIn 1.2s ease-out forwards;
    padding-left: 4px;

    left: -28px;
    top: 2px;
    color: var(--gold);
    font-size: 18px;

    line-height: 0.85;
    padding-right: 8px;
    padding-top: 6px;
    color: var(--crimson);
    text-shadow: 2px 2px 0 rgba(176, 138, 44, 0.25);

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

    0% { transform: scaleY(0); opacity: 0.8; }
    60% { transform: scaleY(1); opacity: 0.6; }
    100% { transform: scaleY(1.2); opacity: 0; }
  }
  .ink-spill {
    position: absolute;
    background: linear-gradient(to bottom, var(--ink), transparent);
    width: 3px;
    height: 60px;
    transform-origin: top center;
    animation: inkSpill 1.4s ease-out forwards;
    pointer-events: none;
    z-index: 5;
  }
  a.glink {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px dotted var(--link);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    font-weight: 500;
  }

    color: var(--link-glow);
    border-bottom-color: var(--link-glow);
    text-shadow: 0 0 8px rgba(217, 117, 57, 0.5),

  a.glink.visited {
    color: var(--gold);
    border-bottom-style: solid;
  }
  .tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--parchment);

    border-radius: 2px;

/* Article helpers */
function withArticle(noun) {
  if (/^[aeiou]/i.test(noun)) return "an " + noun;
  return "a " + noun;
}

function pluralOf(noun) {
  if (/[sxz]$/.test(noun) || /[cs]h$/.test(noun)) return noun + "es";
  if (/[^aeiou]y$/.test(noun)) return noun.slice(0,-1) + "ies";
  if (/(fe|f)$/.test(noun)) return noun.replace(/(fe|f)$/, "ves");
  return noun + "s";
}

/* "Aa" capitalized "An/A" article based on first word */
const REGISTERS = ["mystical","scientific","poetic","epistolary","somber","bright","uneasy"];

/* ---------- Seeded RNG ---------- */
function strHash(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h >>> 0;
}
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededRng(pathStr) {
  return mulberry32(strHash(pathStr));
}
function rnd(rng, n) { return Math.floor(rng() * n); }
function pick(rng, arr) { return arr[rnd(rng, arr.length)]; }

/* ---------- Theme tracking ---------- */
function moodForRegister(reg) {
  switch (reg) {
    case "mystical": return "mystical";
    case "scientific": return "calm";
    case "poetic": return "bright";
    case "epistolary": return "uneasy";
    case "somber": return "somber";
    case "bright": return "bright";
    case "uneasy": return "uneasy";
  }
  return "calm";
}
function adjPoolForMood(mood) {
  switch (mood) {
    case "mystical": return ADJ.mystical.concat(ADJ.ornate);
    case "somber": return ADJ.somber;
    case "bright": return ADJ.bright;
    case "uneasy": return ADJ.uneasy;
    case "calm": return ADJ.calm;
  }
  return ADJ.mystical;
}

/* Pick a register influenced by parent context.
   "context" is array of recent registers. */
function chooseRegister(rng, context) {
  if (context && context.length) {
    if (rng() < 0.55) return context[context.length - 1];
  }
  return pick(rng, REGISTERS);
}

/* Determine mood for a noun key (people/places/etc) */
function nounPool(key) {
  return LEX[key];
}
function anyNoun(rng) {
  const keys = Object.keys(LEX);
  const k = pick(rng, keys);
  return pick(rng, LEX[k]);
}
function nounFromHint(rng, hint) {
  if (hint && LEX[hint]) return pick(rng, LEX[hint]);
  return anyNoun(rng);
}

/* Capitalize first letter (handles "an" → "An") */
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* Replace placeholders in template */
function fillTemplate(tpl, rng, register) {
  const mood = moodForRegister(register);
  const adjs = adjPoolForMood(mood);

  // Tokens: {p}, {pl}, {o}, {c}, {cr}, {e}, {n}, {v}, {a}, {am}, {as}, {ab}, {au}, {ac}, {ao}, {Aa}
  return tpl.replace(/\{([A-Za-z]{1,3})\}/g, (_, t) => {
    switch (t) {
      case "p":  return pick(rng, LEX.people);
      case "pl": return pick(rng, LEX.places);
      case "o":  return pick(rng, LEX.objects);
      case "c":  return pick(rng, LEX.concepts);
      case "cr": return pick(rng, LEX.creatures);
      case "e":  return pick(rng, LEX.elements);
      case "n":  return anyNoun(rng);
      case "v":  return pick(rng, VERBS.past);
      case "a":  return pick(rng, adjs);
      case "am": return pick(rng, ADJ.mystical);
      case "as": return pick(rng, ADJ.somber);
      case "ab": return pick(rng, ADJ.bright);
      case "au": return pick(rng, ADJ.uneasy);
      case "ac": return pick(rng, ADJ.calm);
      case "ao": return pick(rng, ADJ.ornate);
      case "Aa": {
        // "An adj" or "A adj"
        const adj = pick(rng, adjs);
        return (/^[aeiou]/i.test(adj) ? "An " : "A ") + adj;
      }
      case "A":  return cap(pick(rng, adjs));
      default:   return "";
    }
  });
}

/* Generate one paragraph of 3-6 sentences for given path */
function generateParagraph(pathArr) {
  const pathStr = pathArr.length ? pathArr.join("/") : "ROOT";
  const rng = seededRng(pathStr);

  // Recent registers from ancestors (loose context)
  const ctx = [];
  for (let i = Math.max(0, pathArr.length - 3); i < pathArr.length; i++) {
    const sub = pathArr.slice(0, i + 1).join("/");
    const r2 = seededRng(sub + "::reg");
    ctx.push(REGISTERS[Math.floor(r2() * REGISTERS.length)]);
  }
  const register = chooseRegister(rng, ctx);
  // Persist register seed
  const r2 = seededRng(pathStr + "::reg");
  const persistedReg = REGISTERS[Math.floor(r2() * REGISTERS.length)];
  const finalRegister = persistedReg;

  const pool = TEMPLATES[finalRegister];
  const sentenceCount = 3 + rnd(rng, 4);
  const sentences = [];
  const used = new Set();
  for (let i = 0; i < sentenceCount; i++) {
    let attempts = 0;
    let tpl;
    do {
      tpl = pick(rng, pool);
      attempts++;
    } while (used.has(tpl) && attempts < 6);
    used.add(tpl);
    sentences.push(fillTemplate(tpl, rng, finalRegister));
  }
  return { text: sentences.join(" "), register: finalRegister };
}

/* Convert nouns in text into clickable links.
   Mark 5-8 random noun occurrences as glinks; deterministic by path. */
function linkifyParagraph(rawText, pathArr) {
  const pathStr = pathArr.length ? pathArr.join("/") : "ROOT";
  const rng = seededRng(pathStr + "::links");

  // Build a regex of all nouns from lexicon (longest first)
  if (!linkifyParagraph._allNouns) {
    const all = [];
    for (const k of Object.keys(LEX)) for (const w of LEX[k]) all.push(w);
    // Dedup
    linkifyParagraph._allNouns = Array.from(new Set(all)).sort((a,b)=>b.length - a.length);
    const escaped = linkifyParagraph._allNouns.map(w => w.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&"));
    linkifyParagraph._regex = new RegExp("\\b(" + escaped.join("|") + ")\\b", "gi");
  }

  // Find all noun matches with index
  const matches = [];
  let m;
  const text = rawText;
  linkifyParagraph._regex.lastIndex = 0;
  while ((m = linkifyParagraph._regex.exec(text)) !== null) {
    matches.push({ word: m[1], index: m.index });
  }

  // Choose 5-8 unique words to be links
  const targetCount = Math.min(matches.length, 5 + rnd(rng, 4));
  const selectedIndices = new Set();
  const seenWords = new Set();
  let safety = 0;
  while (selectedIndices.size < targetCount && safety++ < 100 && matches.length > 0) {
    const i = rnd(rng, matches.length);
    const w = matches[i].word.toLowerCase();
    if (seenWords.has(w)) {
      // Allow same word eventually but prefer variety
      if (rng() < 0.3) {
        selectedIndices.add(i);
      }
      continue;
    }
    seenWords.add(w);
    selectedIndices.add(i);
  }

  // Build output by walking the text, replacing selected matches with anchor tags
  let out = "";
  let cursor = 0;
  for (let i = 0; i < matches.length; i++) {
    const M = matches[i];
    if (selectedIndices.has(i)) {
      out += escapeHtml(text.slice(cursor, M.index));
      const word = text.slice(M.index, M.index + M.word.length);
      const wordKey = word.toLowerCase();
      out += '<a class="glink" data-word="' + escapeHtml(wordKey) + '" data-disp="' + escapeHtml(word) + '">' + escapeHtml(word) + "</a>";
      cursor = M.index + M.word.length;
    }
  }
  out += escapeHtml(text.slice(cursor));
  return out;
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ---------- App state ---------- */

const STORAGE_KEY = "living-codex-v1";

const state = {
  path: [],            // array of clicked words forming current path
  visited: {},         // map pathStr -> true (visited)
  bookmarks: [],       // array of pathArr
  history: [],         // path stack (for back)
  sidebarOpen: false
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.visited = parsed.visited || {};
      state.bookmarks = parsed.bookmarks || [];
    }
  } catch(e) { console.warn("loadState failed", e); }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      visited: state.visited,
      bookmarks: state.bookmarks
    }));
  } catch(e) { console.warn("saveState failed", e); }
}

/* ---------- Rendering ---------- */

const elParagraphs = document.getElementById("paragraphs");
const elBreadcrumb = document.getElementById("breadcrumb");
const elTooltip = document.getElementById("tooltip");
const elStats = document.getElementById("stats");
const elMapTree = document.getElementById("mapTree");
const elBookmarkList = document.getElementById("bookmarkList");

function renderAll() {
  elParagraphs.innerHTML = "";
  // Render the chain: root + each step in path
  // Each prior step also gets shown as a paragraph (so user sees the descent)
  const chain = [];
  for (let i = 0; i <= state.path.length; i++) {
    chain.push(state.path.slice(0, i));
  }
  chain.forEach((p, i) => {
    const par = generateParagraph(p);
    const linked = linkifyParagraph(par.text, p);
    appendParagraph(linked, i, p, par.register, i === chain.length - 1);
  });

  updateBreadcrumb();
  updateStats();
  updateMap();
  updateBookmarkList();
  // Mark visited
  state.visited[ p2k(state.path) ] = true;
  saveState();
  // Update URL hash
  const hash = state.path.length ? "#" + state.path.map(encodeURIComponent).join("/") : "";
  if (location.hash !== hash) {
    history.replaceState(null, "", location.pathname + location.search + hash);
  }
}

function appendParagraph(html, idx, pathArr, register, isLatest) {
  const div = document.createElement("p");
  div.className = "paragraph" + (idx === 0 ? " first" : "");
  div.dataset.path = p2k(pathArr);
  div.dataset.register = register || "";

  // Drop cap for first paragraph
  let inner;
  if (idx === 0) {
    // Find first letter (skip leading spaces / punctuation)
    const m = html.match(/^(\W*)(\w)(.*)$/s);
    if (m) {
      inner = m[1] + '<span class="first-letter">' + m[2] + "</span>" + m[3];
    } else {
      inner = html;
    }
  } else {
    inner = html;
  }

  // Bookmark toggle
  const bmIdx = bookmarkIndex(pathArr);
  const bmClass = bmIdx >= 0 ? "bookmark-toggle on" : "bookmark-toggle";
  const bmIcon = bmIdx >= 0 ? "★" : "☆";

  div.innerHTML = inner +
    ' <span class="' + bmClass + '" data-path="' + p2k(pathArr) +
    '" title="bookmark">' + bmIcon + "</span>";

  if (bmIdx >= 0) div.classList.add("bookmarked");

  div.style.animationDelay = (idx === 0 ? 0 : 0.05) + "s";
  elParagraphs.appendChild(div);

  // Append ornament between sections
  if (!isLatest) {
    const orn = document.createElement("div");
    orn.className = "ornament";
    orn.innerHTML = "❦ &nbsp; · &nbsp; ❦";
    elParagraphs.appendChild(orn);
  }

  // Wire links
  div.querySelectorAll("a.glink").forEach(a => {
    const w = a.dataset.word;
    // Mark visited links
    const childKey = p2k([...pathArr, w]);
    if (state.visited[childKey]) a.classList.add("visited");
    a.addEventListener("click", (ev) => onLinkClick(ev, w, pathArr));
    a.addEventListener("mouseenter", (ev) => showTooltip(ev, w));
    a.addEventListener("mousemove", moveTooltip);
    a.addEventListener("mouseleave", hideTooltip);
  });

  div.querySelector(".bookmark-toggle").addEventListener("click", (ev) => {
    ev.stopPropagation();
    toggleBookmark(pathArr);
    renderAll();
  });
}

function p2k(arr) { return arr.length ? arr.join("/") : "ROOT"; }

function updateBreadcrumb() {
  if (state.path.length === 0) {
    elBreadcrumb.innerHTML = "<em>the threshold</em>";
    return;
  }
  let pieces = state.path;
  let prefix = "";
  if (pieces.length > 12) {
    prefix = "… <span class='sep'>›</span> ";
    pieces = pieces.slice(-12);
  }
  const html = pieces.map((w, i) => {
    const realIdx = state.path.length - pieces.length + i;
    return '<span class="crumb" data-idx="' + realIdx + '">' + escapeHtml(w) + "</span>";
  }).join(" <span class='sep'>›</span> ");
  elBreadcrumb.innerHTML = prefix + html;
  elBreadcrumb.querySelectorAll(".crumb").forEach(el => {
    el.addEventListener("click", () => {
      const i = parseInt(el.dataset.idx, 10);
      navigateTo(state.path.slice(0, i + 1));
    });
  });
}

function updateStats() {
  const n = Object.keys(state.visited).length;
  elStats.textContent = "passages discovered: " + n + " · current depth: " + state.path.length;
}

function updateMap() {
  // Build a tree from visited path strings
  const tree = {};
  Object.keys(state.visited).forEach(k => {
    if (k === "ROOT") return;
    const parts = k.split("/");
    let cur = tree;
    for (const p of parts) {
      if (!cur[p]) cur[p] = {};
      cur = cur[p];
    }
  });
  elMapTree.innerHTML = renderTree(tree, []);
  elMapTree.querySelectorAll(".map-node").forEach(el => {
    el.addEventListener("click", () => {
      const path = el.dataset.path.split("/").filter(Boolean);
      navigateTo(path);
    });
  });
}

function renderTree(tree, prefix) {
  const keys = Object.keys(tree);
  if (keys.length === 0) return "<em style='color:var(--ink-fade)'>no paths yet</em>";
  return keys.map(k => {
    const newPath = [...prefix, k];
    const cur = (p2k(state.path) === p2k(newPath)) ? " current" : "";
    const children = renderTree(tree[k], newPath);
    return '<div class="map-node' + cur + '" data-path="' + p2k(newPath) + '" style="margin-left:' + (prefix.length * 12) + 'px">' +
           '› ' + escapeHtml(k) + "</div>" + children;
  }).join("");
}

function updateBookmarkList() {
  if (state.bookmarks.length === 0) {
    elBookmarkList.innerHTML = "<em>none yet — mark passages with ★</em>";
    return;
  }
  elBookmarkList.innerHTML = state.bookmarks.map((p, i) => {
    const label = p.length ? p.join(" › ") : "the threshold";
    return '<div class="bookmark-item" data-idx="' + i + '">★ ' + escapeHtml(label) + "</div>";
  }).join("");
  elBookmarkList.querySelectorAll(".bookmark-item").forEach(el => {
    el.addEventListener("click", () => {
      const i = parseInt(el.dataset.idx, 10);
      navigateTo(state.bookmarks[i]);
    });
  });
}

/* ---------- Interaction ---------- */

function onLinkClick(ev, word, pathArr) {
  ev.preventDefault();
  // Ink spill animation at click location
  spillInk(ev);
  state.history.push([...state.path]);
  state.path = [...pathArr, word];
  setTimeout(() => {
    renderAll();
    // Scroll to bottom paragraph
    const all = elParagraphs.querySelectorAll(".paragraph");
    if (all.length) all[all.length - 1].scrollIntoView({ behavior: "smooth", block: "center" });
  }, 280);
}

function spillInk(ev) {
  const x = ev.clientX, y = ev.clientY;
  const ink = document.createElement("div");
  ink.className = "ink-spill";
  ink.style.left = x + "px";
  ink.style.top = y + "px";
  document.body.appendChild(ink);
  setTimeout(() => ink.remove(), 1500);
}

function showTooltip(ev, word) {
  const rng = seededRng(p2k([...state.path, word]) + "::tip");
  const dirs = [
    "deeper into mystery", "toward the silence", "into the ruined library",
    "down the stairway of names", "into the {x} of the {y}",
    "where the {y} ends", "back into memory", "across the bridge of the forsaken",
    "into the unwritten chapter", "where {x} meets {y}",
    "into the cold mirror", "to the threshold of {x}",
    "into the song of the {y}", "into the alchemy of {x}"
  ];
  let d = pick(rng, dirs);
  d = d.replace("{x}", pick(rng, LEX.concepts)).replace("{y}", pick(rng, LEX.places));
  elTooltip.textContent = "→ " + d;
  elTooltip.classList.add("show");
  moveTooltip(ev);
}
function moveTooltip(ev) {
  elTooltip.style.left = (ev.clientX + 12) + "px";
  elTooltip.style.top = (ev.clientY + 16) + "px";
}
function hideTooltip() {
  elTooltip.classList.remove("show");
}

function toggleBookmark(pathArr) {
  const idx = bookmarkIndex(pathArr);
  if (idx >= 0) state.bookmarks.splice(idx, 1);
  else state.bookmarks.push([...pathArr]);
  saveState();
}
function bookmarkIndex(pathArr) {
  const k = p2k(pathArr);
  return state.bookmarks.findIndex(b => p2k(b) === k);
}

function navigateTo(pathArr) {
  state.history.push([...state.path]);
  state.path = [...pathArr];
  renderAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* Random walk: from current path, take 10 random link clicks */
function randomWalk() {
  let path = [...state.path];
  for (let i = 0; i < 10; i++) {
    const par = generateParagraph(path);
    const linked = linkifyParagraph(par.text, path);
    // extract first link words
    const tmp = document.createElement("div");
    tmp.innerHTML = linked;
    const links = Array.from(tmp.querySelectorAll("a.glink")).map(a => a.dataset.word);
    if (!links.length) break;
    const rng = seededRng(p2k(path) + "::walk" + i);
    const w = links[Math.floor(rng() * links.length)];
    path = [...path, w];
  }
  state.history.push([...state.path]);
  state.path = path;
  renderAll();
  setTimeout(() => {
    const all = elParagraphs.querySelectorAll(".paragraph");
    if (all.length) all[all.length - 1].scrollIntoView({ behavior: "smooth" });
  }, 100);
}

/* Search: scan visited paragraphs and current chain for word, jump to first match */
function doSearch(q) {
  q = q.trim().toLowerCase();
  if (!q) return;
  // Scan current chain first
  const paragraphs = elParagraphs.querySelectorAll(".paragraph");
  for (const p of paragraphs) {
    if (p.textContent.toLowerCase().includes(q)) {
      p.scrollIntoView({ behavior: "smooth", block: "center" });
      // Brief highlight
      p.style.transition = "background 0.4s";
      p.style.background = "rgba(176, 138, 44, 0.25)";
      setTimeout(() => p.style.background = "", 1400);
      return;
    }
  }
  // Otherwise scan visited paths' generated text
  const keys = Object.keys(state.visited);
  for (const k of keys) {
    const arr = k === "ROOT" ? [] : k.split("/");
    const par = generateParagraph(arr);
    if (par.text.toLowerCase().includes(q)) {
      navigateTo(arr);
      return;
    }
  }
  alert('"' + q + '" not yet found in any walked passage. Wander further.');
}

/* ---------- Top bar wiring ---------- */

document.getElementById("randomWalkBtn").addEventListener("click", randomWalk);
document.getElementById("backBtn").addEventListener("click", () => {
  if (state.history.length) {
    const prev = state.history.pop();
    state.path = prev;
    renderAll();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else if (state.path.length) {
    state.path.pop();
    renderAll();
  }
});
document.getElementById("rootBtn").addEventListener("click", () => {
  state.history.push([...state.path]);
  state.path = [];
  renderAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

const sidePanel = document.getElementById("sidePanel");
document.getElementById("mapBtn").addEventListener("click", () => {
  sidePanel.classList.toggle("open");
});
document.getElementById("closePanel").addEventListener("click", () => {
  sidePanel.classList.remove("open");
});

document.getElementById("search").addEventListener("keydown", (ev) => {
  if (ev.key === "Enter") doSearch(ev.target.value);
});

/* Export / Import */
const ioModal = document.getElementById("ioModal");
const ioText = document.getElementById("ioText");
const ioTitle = document.getElementById("ioTitle");
let ioMode = "export";

document.getElementById("exportBtn").addEventListener("click", () => {
  ioMode = "export";
  ioTitle.textContent = "Export Codex Memory";
  ioText.value = JSON.stringify({
    visited: state.visited,
    bookmarks: state.bookmarks,
    path: state.path
  }, null, 2);
  ioText.readOnly = true;
  ioModal.classList.add("show");
});
document.getElementById("importBtn").addEventListener("click", () => {
  ioMode = "import";
  ioTitle.textContent = "Import Codex Memory";
  ioText.value = "";
  ioText.readOnly = false;
  ioModal.classList.add("show");
});
document.getElementById("ioCancel").addEventListener("click", () => {
  ioModal.classList.remove("show");
});
document.getElementById("ioConfirm").addEventListener("click", () => {
  if (ioMode === "import") {
    try {
      const data = JSON.parse(ioText.value);
      if (data.visited) state.visited = data.visited;
      if (data.bookmarks) state.bookmarks = data.bookmarks;
      if (data.path) state.path = data.path;
      saveState();
      renderAll();
    } catch (e) {
      alert("Invalid JSON: " + e.message);
      return;
    }
  }
  ioModal.classList.remove("show");
});

/* ---------- Boot ---------- */

function bootFromHash() {
  if (location.hash && location.hash.length > 1) {
    const parts = location.hash.slice(1).split("/").filter(Boolean).map(decodeURIComponent);
    state.path = parts;
  }
}

window.addEventListener("hashchange", () => {
  if (location.hash && location.hash.length > 1) {
    const parts = location.hash.slice(1).split("/").filter(Boolean).map(decodeURIComponent);
    if (p2k(parts) !== p2k(state.path)) {
      state.path = parts;
      renderAll();
    }
  } else if (state.path.length) {
    state.path = [];
    renderAll();
  }
});

window.addEventListener("keydown", (ev) => {
  if (ev.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    ev.preventDefault();
    document.getElementById("search").focus();
  } else if (ev.key === "Escape") {
    sidePanel.classList.remove("open");
    ioModal.classList.remove("show");
  } else if (ev.key === "ArrowLeft" && ev.altKey) {
    document.getElementById("backBtn").click();
  }
});

loadState();
bootFromHash();
renderAll();

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
