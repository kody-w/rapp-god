    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <div id="ui">
        <h2>Procedural Spider IK</h2>
        <p>Drag the spider body to move.<br>Click 'Edit Terrain' to draw obstacles.</p>
    </div>
    <div id="controls">
        <button id="btn-mode" onclick="toggleMode()">Mode: Move Spider</button>
        <button onclick="resetTerrain()">Reset Terrain</button>
    </div>

    <script>
        // --- Configuration ---
        const LEG_COUNT = 8;
        const BODY_RADIUS = 1.5;
        const LEG_SEGMENT_LENGTH = 2.5;
        const STEP_HEIGHT = 1.5;
        const STEP_SPEED = 0.2;
        
        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 20, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Terrain System ---
        const terrainGroup = new THREE.Group();
        scene.add(terrainGroup);
        
        // Base Plane
        const planeGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x222222, wireframe: false });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        terrainGroup.add(plane);

        // Obstacles
        const obstacles = [];
        
        function addObstacle(x, z) {
            const height = 1 + Math.random() * 2;
            const geo = new THREE.BoxGeometry(2, height, 2);
            const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, height/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            terrainGroup.add(mesh);
            obstacles.push(mesh);
        }

        function getTerrainHeight(x, z) {
            // Raycast down to find height
            const raycaster = new THREE.Raycaster();
            raycaster.set(new THREE.Vector3(x, 20, z), new THREE.Vector3(0, -1, 0));
            const intersects = raycaster.intersectObjects(terrainGroup.children);
            if (intersects.length > 0) {
                return intersects[0].point.y;
            }
            return 0;
        }

        // --- Spider System ---
        const spiderGroup = new THREE.Group();
        scene.add(spiderGroup);

        // Body
        const bodyGeo = new THREE.SphereGeometry(BODY_RADIUS, 16, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xaa0000 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.y = 4; // Hover height
        bodyMesh.castShadow = true;
        spiderGroup.add(bodyMesh);

        // Legs
        const legs = [];
        
        class Leg {
            constructor(index, total) {
                this.index = index;
                this.angle = (index / total) * Math.PI * 2;
                
                // IK Chain
                this.joint1 = new THREE.Group(); // Hip
                this.joint2 = new THREE.Group(); // Knee
                this.foot = new THREE.Group();   // Foot
                
                // Visuals
                const legMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
                const jointGeo = new THREE.SphereGeometry(0.3, 8, 8);
                const boneGeo = new THREE.CylinderGeometry(0.1, 0.1, LEG_SEGMENT_LENGTH, 8);
                boneGeo.translate(0, LEG_SEGMENT_LENGTH/2, 0);
                boneGeo.rotateX(Math.PI/2); // Point along Z

                this.mesh1 = new THREE.Mesh(boneGeo, legMat);
                this.mesh2 = new THREE.Mesh(boneGeo, legMat);
                
                // Hierarchy
                spiderGroup.add(this.joint1);
                this.joint1.add(this.mesh1);
                this.mesh1.add(this.joint2);
                this.joint2.add(this.mesh2);
                this.mesh2.add(this.foot);

                // State
                this.targetPos = new THREE.Vector3(); // Where we want to be
                this.currentPos = new THREE.Vector3(); // Where we actually are (animated)
                this.restPos = new THREE.Vector3(); // Ideal rest position relative to body
                
                // Animation
                this.isStepping = false;
                this.stepProgress = 0;
                this.stepStartPos = new THREE.Vector3();
                this.stepEndPos = new THREE.Vector3();

                // Init
                this.updateRestPos(bodyMesh.position);
                this.currentPos.copy(this.restPos);
                this.currentPos.y = getTerrainHeight(this.restPos.x, this.restPos.z);
            }

            updateRestPos(bodyPos) {
                // Calculate ideal foot position based on body position
                const reach = 4;
                this.restPos.set(
                    bodyPos.x + Math.cos(this.angle) * reach,
                    0,
                    bodyPos.z + Math.sin(this.angle) * reach
                );
            }

            solveIK(target) {
                // Simple 2-bone IK
                // Hip position (attached to body)
                const hipPos = bodyMesh.position.clone();
                hipPos.x += Math.cos(this.angle) * BODY_RADIUS * 0.8;
                hipPos.z += Math.sin(this.angle) * BODY_RADIUS * 0.8;
                
                this.joint1.position.copy(hipPos);

                // Vector from Hip to Target
                const toTarget = target.clone().sub(hipPos);
                const dist = toTarget.length();
                
                // Clamp distance
                const maxReach = LEG_SEGMENT_LENGTH * 1.99;
                if (dist > maxReach) {
                    toTarget.normalize().multiplyScalar(maxReach);
                }

                // Calculate angles (Law of Cosines)
                const a = LEG_SEGMENT_LENGTH;
                const b = LEG_SEGMENT_LENGTH;
                const c = dist;
                
                // Angle at Hip (relative to target vector)
                const angleHip = Math.acos((a*a + c*c - b*b) / (2*a*c));
                // Angle at Knee
                const angleKnee = Math.acos((a*a + b*b - c*c) / (2*a*b));

                // Orient Hip towards target
                this.joint1.lookAt(target);
                
                // Apply IK rotations
                // Rotate Hip up/down
                this.joint1.rotateX(-angleHip);
                // Rotate Knee
                this.joint2.position.set(0, 0, LEG_SEGMENT_LENGTH); // End of bone 1
                this.joint2.rotation.x = Math.PI - angleKnee;
            }

            update(dt) {
                // Check if we need to step
                const distToRest = this.currentPos.distanceTo(this.restPos);
                
                // Only step if far away AND not already stepping AND opposite legs aren't stepping
                // (Simple gait: only allow step if neighbors are grounded)
                if (!this.isStepping && distToRest > 2.5) {
                    // Check neighbors (simplified)
                    // In a real gait controller we'd check specific pairs
                    if (Math.random() > 0.5) { // Random stagger for organic feel
                        this.startStep();
                    }
                }

                if (this.isStepping) {
                    this.stepProgress += dt * 3; // Speed
                    if (this.stepProgress >= 1) {
                        this.stepProgress = 1;
                        this.isStepping = false;
                    }

                    // Interpolate (Parabolic arc)
                    const t = this.stepProgress;
                    this.currentPos.lerpVectors(this.stepStartPos, this.stepEndPos, t);
                    this.currentPos.y += Math.sin(t * Math.PI) * STEP_HEIGHT;
                } else {
                    // Stick to ground
                    this.currentPos.y = getTerrainHeight(this.currentPos.x, this.currentPos.z);
                }

                this.solveIK(this.currentPos);
            }

            startStep() {
                this.isStepping = true;
                this.stepProgress = 0;
                this.stepStartPos.copy(this.currentPos);
                
                // Predict future position based on body velocity?
                // For now just step to rest pos
                this.stepEndPos.copy(this.restPos);
                
                // Add some overshoot/randomness
                this.stepEndPos.x += (Math.random()-0.5) * 0.5;
                this.stepEndPos.z += (Math.random()-0.5) * 0.5;
                
                // Check terrain height at target
                this.stepEndPos.y = getTerrainHeight(this.stepEndPos.x, this.stepEndPos.z);
            }
        }

        // Create Legs
        for(let i=0; i<LEG_COUNT; i++) {
            legs.push(new Leg(i, LEG_COUNT));
        }


        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4); // Plane at y=4
        let isDragging = false;
        let editMode = false; // false = move spider, true = edit terrain

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDragging && !editMode) {
                raycaster.setFromCamera(mouse, camera);
                const target = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, target);
                if (target) {
                    bodyMesh.position.x = target.x;
                    bodyMesh.position.z = target.z;
                }
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (editMode) {
                // Add Obstacle
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(plane);
                if (intersects.length > 0) {
                    addObstacle(intersects[0].point.x, intersects[0].point.z);
                }
            } else {
                // Start Drag
                isDragging = true;
                controls.enabled = false;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            controls.enabled = true;
        });

        // --- UI Logic ---
        function toggleMode() {
            editMode = !editMode;
            const btn = document.getElementById('btn-mode');
            btn.innerText = editMode ? "Mode: Edit Terrain" : "Mode: Move Spider";
            btn.style.background = editMode ? "#522" : "#333";
        }

        function resetTerrain() {
            obstacles.forEach(o => terrainGroup.remove(o));
            obstacles.length = 0;
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();

            // Update Legs
            legs.forEach(leg => {
                leg.updateRestPos(bodyMesh.position);
                leg.update(dt);
            });

            // Body bobbing (breathing)
            bodyMesh.position.y = 4 + Math.sin(clock.elapsedTime * 2) * 0.1;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
