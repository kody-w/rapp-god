      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();

    <script>
        // Configuration
        const PALETTE_ANALYTICAL = [
            0xA67B5B, // Ochre
            0x8B7355, // Brown
            0x6B8E23, // Olive
            0x708090, // Slate gray
            0x262626, // Charcoal
            0xF2E9D8  // Canvas
        ];

        const PALETTE_SYNTHETIC = [
            0xD98E73, // Terracotta
            0xE6C229, // Mustard
            0x4682B4, // Steel blue
            0x8C3B3B, // Deep red
            0x2F4F4F, // Dark slate
            0xF5DEB3  // Wheat
        ];

        const PALETTE_COLLAGE = [
            0xFF6B6B, // Coral
            0x4ECDC4, // Turquoise
            0xFFE66D, // Yellow
            0x95E1D3, // Mint
            0xF38181, // Light red
            0xAA96DA  // Lavender
        ];

        let currentPalette = PALETTE_ANALYTICAL;
        let currentStyle = 'analytical';

        // Setup scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xF2E9D8);
        scene.fog = new THREE.Fog(0xF2E9D8, 10, 50);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xA67B5B, 0.3);
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
        rimLight.position.set(0, -5, -5);
        scene.add(rimLight);

        // Art group
        const artGroup = new THREE.Group();
        scene.add(artGroup);

        // Shadow plane
        const shadowPlaneGeo = new THREE.PlaneGeometry(30, 30);
        const shadowPlaneMat = new THREE.ShadowMaterial({ opacity: 0.15 });
        const shadowPlane = new THREE.Mesh(shadowPlaneGeo, shadowPlaneMat);
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -5;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);

        // Simple orbit controls (inline implementation)
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraRotation = { x: 0, y: 0 };
        let cameraDistance = 15;
        let targetRotation = { x: 0, y: 0 };
        let autoRotate = true;

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            autoRotate = false;
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.offsetX - previousMousePosition.x;
                const deltaY = e.offsetY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;
                targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            cameraDistance += e.deltaY * 0.01;
            cameraDistance = Math.max(8, Math.min(30, cameraDistance));
        });

        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                autoRotate = false;
                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;
                targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));

                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        });

        renderer.domElement.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Bowl generation
        let bowlFragments = [];
        let deconstructionLevel = 0.5;
        let targetDeconstruction = 0.5;

        function createShardMaterial(color, style) {
            const baseProps = {
                color: color,
                side: THREE.DoubleSide,
                flatShading: true
            };

            if (style === 'analytical') {
                return new THREE.MeshStandardMaterial({
                    ...baseProps,
                    roughness: 0.9,
                    metalness: 0.0
                });
            } else if (style === 'synthetic') {
                return new THREE.MeshPhongMaterial({
                    ...baseProps,
                    shininess: 5,
                    specular: 0x111111
                });
            } else { // collage
                return new THREE.MeshLambertMaterial({
                    ...baseProps
                });
            }
        }

        function createOutlineMaterial() {
            return new THREE.LineBasicMaterial({
                color: 0x262626,
                linewidth: 1,
                opacity: 0.8,
                transparent: true
            });
        }

        function generateBowl() {
            // Clear existing
            bowlFragments.forEach(frag => {
                artGroup.remove(frag.mesh);
                if (frag.mesh.geometry) frag.mesh.geometry.dispose();
                if (frag.mesh.material) frag.mesh.material.dispose();
            });
            bowlFragments = [];

            // Create bowl lathe geometry
            const points = [];
            const segments = 10;
            for (let i = 0; i < segments; i++) {
                const t = i / (segments - 1);
                const angle = t * Math.PI;
                const radius = Math.sin(angle) * 3 + 1;
                const y = (i - segments / 2) * 0.8;
                points.push(new THREE.Vector2(radius, y));
            }

            const latheSegments = currentStyle === 'analytical' ? 12 :
                                  currentStyle === 'synthetic' ? 16 : 20;
            const baseGeo = new THREE.LatheGeometry(points, latheSegments);
            const posAttribute = baseGeo.attributes.position;
            const index = baseGeo.index;

            // Create individual shards
            for (let i = 0; i < index.count; i += 3) {
                const a = index.getX(i);
                const b = index.getX(i + 1);
                const c = index.getX(i + 2);

                const vA = new THREE.Vector3().fromBufferAttribute(posAttribute, a);
                const vB = new THREE.Vector3().fromBufferAttribute(posAttribute, b);
                const vC = new THREE.Vector3().fromBufferAttribute(posAttribute, c);

                const shardGeo = new THREE.BufferGeometry();
                const vertices = new Float32Array([
                    vA.x, vA.y, vA.z,
                    vB.x, vB.y, vB.z,
                    vC.x, vC.y, vC.z
                ]);
                shardGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                shardGeo.computeVertexNormals();

                const center = new THREE.Vector3().addVectors(vA, vB).add(vC).divideScalar(3);
                const color = currentPalette[Math.floor(Math.random() * currentPalette.length)];

                const mesh = new THREE.Mesh(shardGeo, createShardMaterial(color, currentStyle));
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                // Add outline
                if (Math.random() > 0.2) {
                    const edges = new THREE.EdgesGeometry(shardGeo);
                    const line = new THREE.LineSegments(edges, createOutlineMaterial());
                    mesh.add(line);
                }

                artGroup.add(mesh);

                // Store fragment data
                const explodeDirection = center.clone().normalize();
                const rotAxis = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize();

                bowlFragments.push({
                    mesh: mesh,
                    basePosition: new THREE.Vector3(0, 0, 0),
                    explodeDirection: explodeDirection,
                    explodeFactor: Math.random() * 2 + 1,
                    rotAxis: rotAxis,
                    rotSpeed: (Math.random() - 0.5) * 0.8
                });
            }

            // Add abstract objects inside bowl
            const objectCount = currentStyle === 'analytical' ? 3 :
                               currentStyle === 'synthetic' ? 4 : 6;

            for (let i = 0; i < objectCount; i++) {
                const geometries = [
                    new THREE.DodecahedronGeometry(0.6, 0),
                    new THREE.TetrahedronGeometry(0.8, 0),
                    new THREE.OctahedronGeometry(0.7, 0)
                ];
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                const mesh = new THREE.Mesh(geo, createShardMaterial(color, currentStyle));

                const pos = new THREE.Vector3(
                    (Math.random() - 0.5) * 3,
                    (Math.random() * 2) - 1,
                    (Math.random() - 0.5) * 3
                );
                mesh.position.copy(pos);
                mesh.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                mesh.castShadow = true;

                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, createOutlineMaterial());
                mesh.add(line);

                artGroup.add(mesh);

                bowlFragments.push({
                    mesh: mesh,
                    basePosition: pos.clone(),
                    explodeDirection: pos.clone().normalize(),
                    explodeFactor: Math.random() * 1.5 + 0.5,
                    rotAxis: new THREE.Vector3(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize(),
                    rotSpeed: (Math.random() - 0.5) * 1.2
                });
            }

            // Add environment planes
            const planeCount = currentStyle === 'collage' ? 8 : 5;
            for (let i = 0; i < planeCount; i++) {
                const w = 5 + Math.random() * 8;
                const h = 5 + Math.random() * 8;
                const geo = new THREE.PlaneGeometry(w, h);
                const color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                const mat = createShardMaterial(color, currentStyle);
                mat.opacity = 0.7;
                mat.transparent = true;

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(
                    (Math.random() - 0.5) * 12,
                    -2 - Math.random() * 3,
                    (Math.random() - 0.5) * 8
                );
                mesh.rotation.x = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
                mesh.rotation.y = (Math.random() - 0.5) * 0.4;
                mesh.rotation.z = (Math.random() - 0.5) * Math.PI;
                mesh.receiveShadow = true;

                artGroup.add(mesh);
            }

            baseGeo.dispose();
        }

        function updateDeconstruction() {
            const t = deconstructionLevel;

            bowlFragments.forEach(frag => {
                const offset = frag.explodeDirection.clone().multiplyScalar(frag.explodeFactor * t);
                frag.mesh.position.copy(frag.basePosition).add(offset);

                const rotAngle = t * frag.rotSpeed * Math.PI;
                frag.mesh.rotation.x = rotAngle * frag.rotAxis.x;
                frag.mesh.rotation.y = rotAngle * frag.rotAxis.y;
                frag.mesh.rotation.z = rotAngle * frag.rotAxis.z;
            });
        }

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Smooth camera rotation
            if (autoRotate) {
                targetRotation.y += 0.003;
            }

            cameraRotation.x += (targetRotation.x - cameraRotation.x) * 0.1;
            cameraRotation.y += (targetRotation.y - cameraRotation.y) * 0.1;

            camera.position.x = Math.sin(cameraRotation.y) * Math.cos(cameraRotation.x) * cameraDistance;
            camera.position.y = Math.sin(cameraRotation.x) * cameraDistance + 5;
            camera.position.z = Math.cos(cameraRotation.y) * Math.cos(cameraRotation.x) * cameraDistance;
            camera.lookAt(0, 0, 0);

            // Smooth deconstruction transition
            deconstructionLevel += (targetDeconstruction - deconstructionLevel) * 0.05;
            updateDeconstruction();

            // Subtle floating animation
            artGroup.position.y = Math.sin(time * 0.5) * 0.2;
            artGroup.rotation.y = Math.sin(time * 0.3) * 0.05;

            renderer.render(scene, camera);
        }

        // UI Controls
        const deconstructSlider = document.getElementById('deconstruct-slider');
        deconstructSlider.addEventListener('input', (e) => {
            targetDeconstruction = e.target.value / 100;
        });

        document.getElementById('randomize-btn').addEventListener('click', () => {
            generateBowl();
            updateDeconstruction();
        });

        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                currentStyle = e.target.dataset.style;

                if (currentStyle === 'analytical') {
                    currentPalette = PALETTE_ANALYTICAL;
                } else if (currentStyle === 'synthetic') {
                    currentPalette = PALETTE_SYNTHETIC;
                } else {
                    currentPalette = PALETTE_COLLAGE;
                }

                generateBowl();
                updateDeconstruction();
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // Initialize
        generateBowl();
        targetDeconstruction = 0.5;
        updateDeconstruction();
        animate();
    </script>
</body>
</html>
