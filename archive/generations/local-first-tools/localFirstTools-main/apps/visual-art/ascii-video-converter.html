    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>

    <div id="canvas-container">
        <canvas id="ascii-canvas"></canvas>
        <div class="retro-overlay" id="scanlines"></div>
    </div>

    <div id="error-msg">
        <h2>Camera Access Required</h2>
        <p>Please allow camera access to use this application.</p>
    </div>

    <div id="ui-layer">
        <button id="btn-standard" class="active">Standard</button>
        <button id="btn-color">Color</button>
        <button id="btn-matrix">Matrix</button>
        <button id="btn-retro">Retro</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-record" style="border-color: #ff4444; color: #ff4444;">Record</button>
    </div>

    <video id="video-source" autoplay playsinline></video>

    <script>
        const video = document.getElementById('video-source');
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const scanlines = document.getElementById('scanlines');
        const errorMsg = document.getElementById('error-msg');

        // Configuration
        const config = {
            mode: 'standard', // standard, color, matrix, retro
            fontSize: 12,
            charSet: ' .:-=+*#%@', // Standard density
            matrixCharSet: 'ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ012345789:・.=*+-<>',
            paused: false,
            recording: false
        };

        // State
        let animationId;
        let width, height;
        let cols, rows;
        let matrixColumns = []; // Array to track matrix rain drops
        let recordedFrames = [];
        let recordingStartTime = 0;

        // Setup UI
        document.getElementById('btn-standard').onclick = () => setMode('standard');
        document.getElementById('btn-color').onclick = () => setMode('color');
        document.getElementById('btn-matrix').onclick = () => setMode('matrix');
        document.getElementById('btn-retro').onclick = () => setMode('retro');
        
        const btnPause = document.getElementById('btn-pause');
        btnPause.onclick = () => {
            config.paused = !config.paused;
            btnPause.textContent = config.paused ? "Resume" : "Pause";
            if (config.paused) {
                video.pause();
            } else {
                video.play();
                render();
            }
        };

        const btnRecord = document.getElementById('btn-record');
        btnRecord.onclick = () => {
            if (!config.recording) {
                // Start Recording
                config.recording = true;
                recordedFrames = [];
                recordingStartTime = Date.now();
                btnRecord.textContent = "Stop & Save";
                btnRecord.style.background = "#ff4444";
                btnRecord.style.color = "#fff";
            } else {
                // Stop Recording
                config.recording = false;
                btnRecord.textContent = "Record";
                btnRecord.style.background = "#222";
                btnRecord.style.color = "#ff4444";
                saveRecording();
            }
        };

        function saveRecording() {
            if (recordedFrames.length === 0) return;
            
            const blob = new Blob([JSON.stringify(recordedFrames)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ascii-clip-${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function setMode(mode) {
            config.mode = mode;
            
            // Update UI buttons
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            // Reset/Apply effects
            scanlines.style.display = mode === 'retro' ? 'block' : 'none';
            canvas.classList.toggle('retro-glow', mode === 'retro');

            if (mode === 'matrix') {
                initMatrixRain();
            }
        }

        // Initialize Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user"
                    } 
                });
                video.srcObject = stream;
                await new Promise(resolve => video.onloadedmetadata = resolve);
                resize();
                window.addEventListener('resize', resize);
                render();
            } catch (err) {
                console.error("Camera error:", err);
                errorMsg.style.display = 'block';
                document.getElementById('ui-layer').style.display = 'none';
            }
        }

        function resize() {
            // Make canvas fill the screen but maintain aspect ratio logic if needed
            // For ASCII, we want pixel-perfect font rendering
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Calculate grid dimensions
            cols = Math.floor(canvas.width / (config.fontSize * 0.6)); // 0.6 is approx aspect ratio of font
            rows = Math.floor(canvas.height / config.fontSize);

            ctx.font = `${config.fontSize}px monospace`;
            ctx.textBaseline = 'top';

            if (config.mode === 'matrix') {
                initMatrixRain();
            }
        }

        function initMatrixRain() {
            matrixColumns = [];
            for (let x = 0; x < cols; x++) {
                matrixColumns[x] = {
                    y: Math.floor(Math.random() * rows),
                    speed: Math.random() * 0.5 + 0.5,
                    chars: [] // Store chars for trail effect
                };
            }
        }

        // Offscreen canvas for reading pixel data
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

        function getPixelData() {
            // Resize offscreen canvas to match grid size
            if (offCanvas.width !== cols || offCanvas.height !== rows) {
                offCanvas.width = cols;
                offCanvas.height = rows;
            }
            
            // Draw video to offscreen canvas (scaled down)
            // We mirror the image for better UX
            offCtx.save();
            offCtx.scale(-1, 1);
            offCtx.drawImage(video, -cols, 0, cols, rows);
            offCtx.restore();

            return offCtx.getImageData(0, 0, cols, rows).data;
        }

        function render() {
            if (config.paused) return;

            // Clear background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const data = getPixelData();
            const len = config.charSet.length;

            ctx.font = `bold ${config.fontSize}px monospace`;

            if (config.mode === 'matrix') {
                renderMatrix(data);
            } else {
                renderStandard(data, len);
            }

            // Recording Logic
            if (config.recording) {
                captureFrame(data, len);
            }

            animationId = requestAnimationFrame(render);
        }

        function captureFrame(data, len) {
            // Capture the current frame as a string
            // We'll use the standard charset logic for simplicity in the CLI player
            // or we could try to capture the exact characters being rendered
            
            let frameString = "";
            
            // If in matrix mode, it's hard to capture the exact random chars unless we store them.
            // For now, let's just capture the "Standard" representation of the frame
            // so it's viewable in the CLI.
            
            // Actually, let's try to respect the mode if possible, but standard is safest for CLI.
            // Let's stick to standard grayscale mapping for the recording.
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    
                    let char = " ";
                    if (config.mode === 'matrix') {
                         // Simple threshold for matrix recording
                         if (avg > 30) {
                             char = config.matrixCharSet[Math.floor((avg/255) * (config.matrixCharSet.length-1))];
                         }
                    } else {
                        const charIndex = Math.floor((avg / 255) * (len - 1));
                        char = config.charSet[charIndex];
                    }
                    frameString += char;
                }
                frameString += "\n";
            }
            
            recordedFrames.push(frameString);
        }

        function renderStandard(data, len) {
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const i = (y * cols + x) * 4;
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Calculate brightness
                    const avg = (r + g + b) / 3;
                    
                    // Map to char
                    const charIndex = Math.floor((avg / 255) * (len - 1));
                    const char = config.charSet[charIndex];

                    // Color logic
                    if (config.mode === 'color') {
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                    } else if (config.mode === 'retro') {
                        // Green terminal look
                        // Brightness determines opacity/intensity
