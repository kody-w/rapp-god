    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>

            Signal Speed: <input type="range" id="speed-slider" min="1" max="10" value="5">

        <div id="info-panel" style="margin-top: auto; font-size: 12px; color: #888;">
            Select a node to see details.

    <div id="controls">
        <button class="action-btn" onclick="fireInputs()">⚡ Fire Inputs</button>

    <div id="tooltip"></div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Graph Data ---
        let nodes = [];
        let links = [];
        let nextId = 1;
        
        class Node {
            constructor(x, y, type) {
                this.id = nextId++;
                this.x = x;
                this.y = y;
                this.type = type; // 'neuron', 'input', 'output'
                this.activation = 0;
                this.bias = 0;
                this.radius = type === 'neuron' ? 20 : 15;
                this.label = type === 'input' ? 'In' : (type === 'output' ? 'Out' : '');
            }
        }
        
        class Link {
            constructor(source, target) {
                this.source = source;
                this.target = target;
                this.weight = (Math.random() * 2 - 1).toFixed(2);
                this.signals = []; // Array of {t: 0..1} for animation
            }
        }

        // --- Interaction State ---
        let tool = 'move';
        let selectedNode = null;
        let hoverNode = null;
        let dragNode = null;
        let connectStartNode = null;
        
        // --- Simulation State ---
        let signals = []; // Global signal list for animation

        function setTool(t) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + t).classList.add('active');
            connectStartNode = null;
            selectedNode = null;
            updateInfo();
        }

        // --- Input Handling ---
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            hoverNode = nodes.find(n => Math.hypot(n.x - x, n.y - y) < n.radius + 5);
            
            if (dragNode) {
                dragNode.x = x;
                dragNode.y = y;
            }
            
            // Tooltip
            const tt = document.getElementById('tooltip');
            if (hoverNode) {
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 15) + 'px';
                tt.style.top = (e.clientY + 15) + 'px';
                tt.textContent = `${hoverNode.type} (a: ${hoverNode.activation.toFixed(2)})`;
            } else {
                tt.style.display = 'none';
            }
        });

        canvas.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (tool === 'move') {
                if (hoverNode) {
                    dragNode = hoverNode;
                    selectedNode = hoverNode;
                    updateInfo();
                } else {
                    selectedNode = null;
                    updateInfo();
                }
            } else if (tool === 'neuron' || tool === 'input' || tool === 'output') {
                nodes.push(new Node(x, y, tool));
            } else if (tool === 'delete') {
                if (hoverNode) {
                    nodes = nodes.filter(n => n !== hoverNode);
                    links = links.filter(l => l.source !== hoverNode && l.target !== hoverNode);
                }
            } else if (tool === 'connect') {
                if (hoverNode) {
                    if (!connectStartNode) {
                        connectStartNode = hoverNode;
                    } else {
                        if (connectStartNode !== hoverNode) {
                            // Check if link exists
                            if (!links.find(l => l.source === connectStartNode && l.target === hoverNode)) {
                                links.push(new Link(connectStartNode, hoverNode));
                            }
                        }
                        connectStartNode = null;
                    }
                } else {
                    connectStartNode = null;
                }
            }
        });

        window.addEventListener('mouseup', () => {
            dragNode = null;
        });
        
        // --- Simulation Logic ---
        function fireInputs() {
            nodes.filter(n => n.type === 'input').forEach(n => {
                n.activation = 1;
                propagate(n);
            });
        }
        
        function propagate(sourceNode) {
            // Find outgoing links
            const outgoing = links.filter(l => l.source === sourceNode);
            outgoing.forEach(l => {
                l.signals.push({ t: 0, val: sourceNode.activation * l.weight });
            });
        }
        
        function updateSimulation() {
            const speed = document.getElementById('speed-slider').value * 0.01;
            
            links.forEach(l => {
                for (let i = l.signals.length - 1; i >= 0; i--) {
                    const s = l.signals[i];
                    s.t += speed;
                    if (s.t >= 1) {
                        // Signal arrived
                        l.target.activation = Math.tanh(l.target.activation + s.val); // Simple accumulation + activation
                        
                        // Decay activation over time? Or just keep it?
                        // For visual effect, let's propagate if activation changed significantly
                        if (Math.abs(s.val) > 0.1 && l.target.type !== 'output') {
                            propagate(l.target);
                        }
                        
                        l.signals.splice(i, 1);
                    }
                }
            });
            
            // Decay nodes slowly
            nodes.forEach(n => {
                if (n.type !== 'input') {
                    n.activation *= 0.99;
                }
            });
        }

        // --- Rendering ---
        function draw() {
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, width, height);
            
            // Draw Links
            links.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.source.x, l.source.y);
                ctx.lineTo(l.target.x, l.target.y);
                const w = Math.abs(l.weight);
                ctx.lineWidth = 1 + w * 3;
                ctx.strokeStyle = l.weight > 0 ? '#00ff00' : '#ff0000';
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.globalAlpha = 1;
                
                // Draw Signals
                l.signals.forEach(s => {
                    const x = l.source.x + (l.target.x - l.source.x) * s.t;
                    const y = l.source.y + (l.target.y - l.source.y) * s.t;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            });
            
            // Draw Connection Line (Draft)
            if (tool === 'connect' && connectStartNode) {
                const rect = canvas.getBoundingClientRect();
                // Need mouse pos, but we don't track it globally easily without extra listener
                // Skip for now or add global mouse tracker
            }
            
            // Draw Nodes
            nodes.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
                
                // Color based on activation
                const val = Math.max(-1, Math.min(1, n.activation));
                let r = 50, g = 50, b = 50;
                
                if (n.type === 'input') { r=0; g=100; b=200; }
                else if (n.type === 'output') { r=200; g=100; b=0; }
                
                // Add activation glow
                if (val > 0) { g += val * 155; }
                else { r += -val * 155; }
                
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fill();
                
                // Border
                ctx.lineWidth = 2;
                ctx.strokeStyle = (n === selectedNode) ? '#fff' : '#555';
                ctx.stroke();
                
                // Label
                ctx.fillStyle = '#fff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(n.label || n.activation.toFixed(1), n.x, n.y);
            });
            
            updateSimulation();
            requestAnimationFrame(draw);
        }
        
        function updateInfo() {
            const panel = document.getElementById('info-panel');
            if (selectedNode) {
                panel.innerHTML = `
                    <strong>Node #${selectedNode.id}</strong><br>
                    Type: ${selectedNode.type}<br>
                    Activation: ${selectedNode.activation.toFixed(3)}<br>
                    Bias: ${selectedNode.bias}
                `;
            } else {
                panel.textContent = "Select a node to see details.";
            }
        }
        
        function clearGraph() {
            if(confirm("Clear all?")) {
                nodes = [];
                links = [];
                nextId = 1;
            }
        }

        // Initial Setup (XOR-like structure)
        function initDemo() {
            const i1 = new Node(width/2 - 100, height/2 - 100, 'input');
            const i2 = new Node(width/2 - 100, height/2 + 100, 'input');
            const h1 = new Node(width/2, height/2 - 50, 'neuron');
            const h2 = new Node(width/2, height/2 + 50, 'neuron');
            const o1 = new Node(width/2 + 100, height/2, 'output');
            
            nodes.push(i1, i2, h1, h2, o1);
            
            links.push(new Link(i1, h1));
            links.push(new Link(i1, h2));
            links.push(new Link(i2, h1));
            links.push(new Link(i2, h2));
            links.push(new Link(h1, o1));
            links.push(new Link(h2, o1));
        }
        
        // Wait for resize then init
        setTimeout(initDemo, 100);
        
        draw();

    </script>
</body>
</html>
