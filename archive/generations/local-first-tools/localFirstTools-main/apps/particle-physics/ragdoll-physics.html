    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <div id="controls">
        <h1>Verlet Ragdoll Physics</h1>
        <p>Drag points to throw the ragdoll.</p>
        <p>Right-click to tear constraints.</p>
        <p><span class="key">R</span> to Reset</p>
        <p><span class="key">G</span> to Toggle Gravity</p>
        <button id="reset-btn">Reset Simulation</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        
        // Physics Config
        const CONFIG = {
            gravity: 0.5,
            friction: 0.99,
            groundFriction: 0.9,
            stiffness: 1.0, // How rigid the constraints are (iterations)
            iterations: 5,
            bounce: 0.7
        };

        // State
        let points = [];
        let constraints = [];
        let draggedPoint = null;
        let gravityEnabled = true;

        // --- Classes ---

        class Point {
            constructor(x, y, pinned = false) {
                this.x = x;
                this.y = y;
                this.oldx = x; // Previous position for Verlet
                this.oldy = y;
                this.pinned = pinned;
                this.radius = 6;
                this.mass = 1;
            }

            update() {
                if (this.pinned) return;

                // Verlet Integration: pos = pos + (pos - oldPos) * friction + acceleration
                const vx = (this.x - this.oldx) * CONFIG.friction;
                const vy = (this.y - this.oldy) * CONFIG.friction;

                this.oldx = this.x;
                this.oldy = this.y;

                this.x += vx;
                this.y += vy;
                
                if (gravityEnabled) {
                    this.y += CONFIG.gravity;
                }
            }

            constrain() {
                if (this.pinned) return;

                // Wall collisions
                if (this.x > width - this.radius) {
                    this.x = width - this.radius;
                    this.oldx = this.x + (this.x - this.oldx) * CONFIG.bounce;
                } else if (this.x < this.radius) {
                    this.x = this.radius;
                    this.oldx = this.x + (this.x - this.oldx) * CONFIG.bounce;
                }

                if (this.y > height - this.radius) {
                    this.y = height - this.radius;
                    // Ground friction
                    const vx = (this.x - this.oldx) * CONFIG.groundFriction;
                    this.oldx = this.x - vx;
                    
                    this.oldy = this.y + (this.y - this.oldy) * CONFIG.bounce;
                } else if (this.y < this.radius) {
                    this.y = this.radius;
                    this.oldy = this.y + (this.y - this.oldy) * CONFIG.bounce;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.pinned ? '#ff4444' : '#fff';
                ctx.fill();
            }
        }

        class Constraint {
            constructor(p1, p2, length = null, visible = true, width = 2) {
                this.p1 = p1;
                this.p2 = p2;
                // If length not provided, calculate current distance
                this.length = length || Math.hypot(p1.x - p2.x, p1.y - p2.y);
                this.visible = visible;
                this.width = width;
            }

            resolve() {
                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist === 0) return; // Avoid division by zero

                const diff = (this.length - dist) / dist;
                
                // Move points apart/together to satisfy constraint
                // Inverse mass weighting could go here, but simple 0.5 split works for equal mass
                const offsetX = dx * diff * 0.5;
                const offsetY = dy * diff * 0.5;

                if (!this.p1.pinned) {
                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                }
                if (!this.p2.pinned) {
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;
                }
            }

            draw() {
                if (!this.visible) return;
                ctx.beginPath();
                ctx.moveTo(this.p1.x, this.p1.y);
                ctx.lineTo(this.p2.x, this.p2.y);
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = this.width;
                ctx.stroke();
            }
        }

        // --- Setup ---

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        function createRagdoll(startX, startY) {
            // Head
            const head = new Point(startX, startY);
            // Neck/Shoulders
            const neck = new Point(startX, startY + 30);
            const shoulderL = new Point(startX - 20, startY + 30);
            const shoulderR = new Point(startX + 20, startY + 30);
            // Elbows
            const elbowL = new Point(startX - 20, startY + 60);
            const elbowR = new Point(startX + 20, startY + 60);
            // Hands
            const handL = new Point(startX - 20, startY + 90);
            const handR = new Point(startX + 20, startY + 90);
            // Hips
            const hips = new Point(startX, startY + 80);
            const hipL = new Point(startX - 15, startY + 80);
            const hipR = new Point(startX + 15, startY + 80);
            // Knees
            const kneeL = new Point(startX - 15, startY + 120);
            const kneeR = new Point(startX + 15, startY + 120);
            // Feet
            const footL = new Point(startX - 15, startY + 160);
            const footR = new Point(startX + 15, startY + 160);

            const newPoints = [head, neck, shoulderL, shoulderR, elbowL, elbowR, handL, handR, hips, hipL, hipR, kneeL, kneeR, footL, footR];
            points.push(...newPoints);

            // Structural Constraints (Bones)
            const newConstraints = [
                // Head & Torso
                new Constraint(head, neck),
                new Constraint(neck, hips),
                new Constraint(neck, shoulderL),
                new Constraint(neck, shoulderR),
                new Constraint(shoulderL, shoulderR), // Clavicle
                
                // Arms
                new Constraint(shoulderL, elbowL),
                new Constraint(elbowL, handL),
                new Constraint(shoulderR, elbowR),
                new Constraint(elbowR, handR),
                
                // Hips
                new Constraint(hips, hipL),
                new Constraint(hips, hipR),
                new Constraint(hipL, hipR), // Pelvis width
                
                // Legs
                new Constraint(hipL, kneeL),
                new Constraint(kneeL, footL),
                new Constraint(hipR, kneeR),
                new Constraint(kneeR, footR)
            ];

            // Internal Constraints (Muscles/Structure - invisible but keep shape)
            // Head to hips to keep upright-ish
            newConstraints.push(new Constraint(head, hips, null, false)); 
            // Shoulder to hips (Torso box)
            newConstraints.push(new Constraint(shoulderL, hips, null, false));
            newConstraints.push(new Constraint(shoulderR, hips, null, false));
            
            constraints.push(...newConstraints);
        }

        function init() {
            points = [];
            constraints = [];
            createRagdoll(width / 2, 100);
            
            // Add a simple box to throw around too
            const boxX = width / 2 + 100;
            const boxY = 100;
            const p1 = new Point(boxX, boxY);
            const p2 = new Point(boxX + 50, boxY);
            const p3 = new Point(boxX + 50, boxY + 50);
            const p4 = new Point(boxX, boxY + 50);
            points.push(p1, p2, p3, p4);
            constraints.push(
                new Constraint(p1, p2), new Constraint(p2, p3), 
                new Constraint(p3, p4), new Constraint(p4, p1),
                new Constraint(p1, p3), new Constraint(p2, p4) // Cross bracing
            );
        }

        // --- Interaction ---

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            const mouse = getMousePos(e);
            
            // Find nearest point
            let nearest = null;
            let minDist = 30; // Interaction radius

            for (const p of points) {
                const dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = p;
                }
            }

            if (nearest) {
                if (e.button === 2) { // Right click to cut
                    // Find constraints attached to this point and remove them
                    constraints = constraints.filter(c => c.p1 !== nearest && c.p2 !== nearest);
                } else {
                    draggedPoint = nearest;
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (draggedPoint) {
                const mouse = getMousePos(e);
                // Instead of setting position directly (which breaks physics), 
                // we pull it towards mouse strongly but allow some physics
                // Or for "God Mode" dragging, we just set it:
                draggedPoint.x = mouse.x;
                draggedPoint.y = mouse.y;
                // Reset velocity so it doesn't explode when released
                draggedPoint.oldx = mouse.x; 
                draggedPoint.oldy = mouse.y;
            }
        });

        window.addEventListener('mouseup', () => {
            if (draggedPoint) {
                // Give it a little throw velocity based on last movement
                // (Implicit in Verlet if we just stop updating oldx/oldy manually)
                draggedPoint = null;
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') init();
            if (e.key.toLowerCase() === 'g') gravityEnabled = !gravityEnabled;
        });
        
        document.getElementById('reset-btn').addEventListener('click', init);

        // --- Loop ---

        function update() {
            // 1. Update Points
            for (const p of points) {
                p.update();
                p.constrain();
            }

            // 2. Solve Constraints (Iterate for stability)
            for (let i = 0; i < CONFIG.iterations; i++) {
                for (const c of constraints) {
                    c.resolve();
                }
                // Re-constrain points to walls after constraint resolution
                // prevents points getting pushed out of bounds by stiff constraints
                for (const p of points) {
                    p.constrain();
                }
            }
            
            // Dragging override
            if (draggedPoint) {
                // Keep it pinned to mouse during physics steps
                // (Already handled in mousemove, but good to ensure)
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw Constraints
            for (const c of constraints) {
                c.draw();
            }

            // Draw Points
            for (const p of points) {
                p.draw();
            }
            
            // Draw Mouse Line if dragging
            if (draggedPoint) {
                ctx.beginPath();
                ctx.arc(draggedPoint.x, draggedPoint.y, 10, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.stroke();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start
        init();
        loop();

    </script>
