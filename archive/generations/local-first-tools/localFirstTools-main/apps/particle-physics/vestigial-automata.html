    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Vestigial Museum</h3>
        <div class="control-row">
            <label>Decay Rate <span class="value" id="decay-val">50</span></label>
            <input type="range" id="decay" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Fungi Growth <span class="value" id="fungi-val">40</span></label>
            <input type="range" id="fungi" min="0" max="100" value="40">
        </div>
        <button id="new-btn">New Automaton</button>
        <button id="restore-btn">Attempt Restore</button>
    </div>
    <div id="info">Click to introduce damage | Watch mechanical decay unfold</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let decayRate = 0.5;
        let fungiGrowth = 0.4;
        let time = 0;
        let automaton = null;
        let rustParticles = [];
        let fungi = [];
        
        class Gear {
            constructor(x, y, radius, teeth, speed) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.teeth = teeth;
                this.speed = speed;
                this.rotation = Math.random() * Math.PI * 2;
                this.rust = 0;
                this.damage = [];
                this.jitter = 0;
                this.seized = false;
            }
            update() {
                if (this.seized) {
                    this.jitter = Math.sin(time * 20) * 0.02;
                } else {
                    this.rotation += this.speed * (1 - this.rust * 0.8);
                    this.jitter *= 0.95;
                }
                
                this.rust += 0.0001 * decayRate;
                if (this.rust > 0.9 && Math.random() < 0.01) {
                    this.seized = true;
                }
                
                if (this.rust > 0.3 && Math.random() < 0.02 * decayRate) {
                    rustParticles.push({
                        x: this.x + (Math.random() - 0.5) * this.radius,
                        y: this.y + (Math.random() - 0.5) * this.radius,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: Math.random() * 0.5,
                        size: 1 + Math.random() * 2,
                        life: 1
                    });
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation + this.jitter);
                
                const rustColor = Math.floor(60 + this.rust * 80);
                const baseColor = "rgb(" + (180 - this.rust * 80) + "," + (150 - this.rust * 60) + "," + (80 - this.rust * 40) + ")";
                
                ctx.beginPath();
                for (let i = 0; i < this.teeth; i++) {
                    const angle = (i / this.teeth) * Math.PI * 2;
                    const nextAngle = ((i + 0.5) / this.teeth) * Math.PI * 2;
                    const outer = this.radius;
                    const inner = this.radius * 0.75;
                    
                    ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
                    ctx.lineTo(Math.cos(nextAngle) * inner, Math.sin(nextAngle) * inner);
                }
                ctx.closePath();
                ctx.fillStyle = baseColor;
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = "#1a1510";
                ctx.fill();
                
                if (this.rust > 0.2) {
                    for (let i = 0; i < 5; i++) {
                        const spotAngle = i * 1.3 + this.x * 0.01;
                        const spotDist = this.radius * (0.3 + Math.sin(i * 2.1) * 0.3);
                        ctx.beginPath();
                        ctx.arc(
                            Math.cos(spotAngle) * spotDist,
                            Math.sin(spotAngle) * spotDist,
                            5 + this.rust * 10,
                            0, Math.PI * 2
                        );
                        ctx.fillStyle = "rgba(" + (120 + this.rust * 40) + ", " + (60 + this.rust * 20) + ", 20, " + (this.rust * 0.5) + ")";
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            }
        }
        
        class Rod {
            constructor(x1, y1, x2, y2) {
                this.x1 = x1;
                this.y1 = y1;
                this.x2 = x2;
                this.y2 = y2;
                this.rust = 0;
                this.bend = 0;
            }
            update() {
                this.rust += 0.00005 * decayRate;
                if (this.rust > 0.5) {
                    this.bend += 0.0001 * decayRate;
                }
            }
            draw() {
                const midX = (this.x1 + this.x2) / 2;
                const midY = (this.y1 + this.y2) / 2 + this.bend * 50;
                
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y1);
                ctx.quadraticCurveTo(midX, midY, this.x2, this.y2);
                ctx.strokeStyle = "rgb(" + (140 - this.rust * 60) + "," + (110 - this.rust * 50) + "," + (60 - this.rust * 30) + ")";
                ctx.lineWidth = 6;
                ctx.stroke();
            }
        }
        
        class Fungus {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 0;
                this.maxSize = 5 + Math.random() * 15;
                this.hue = 120 + Math.random() * 60;
                this.phase = Math.random() * Math.PI * 2;
                this.branches = [];
                for (let i = 0; i < 3; i++) {
                    this.branches.push({
                        angle: Math.random() * Math.PI * 2,
                        length: 0,
                        maxLength: 10 + Math.random() * 20
                    });
                }
            }
            update() {
                if (this.size < this.maxSize) {
                    this.size += 0.02 * fungiGrowth;
                }
                this.phase += 0.02;
                this.branches.forEach(b => {
                    if (b.length < b.maxLength && this.size > this.maxSize * 0.5) {
                        b.length += 0.03 * fungiGrowth;
                    }
                });
            }
            draw() {
                const glow = 0.5 + Math.sin(this.phase) * 0.3;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 80%, 50%, " + (glow * 0.2) + ")";
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 70%, 40%, " + glow + ")";
                ctx.fill();
                
                this.branches.forEach(b => {
                    if (b.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(
                            this.x + Math.cos(b.angle) * b.length,
                            this.y + Math.sin(b.angle) * b.length
                        );
                        ctx.strokeStyle = "hsla(" + this.hue + ", 60%, 35%, " + glow + ")";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });
            }
        }
        
        function createAutomaton() {
            automaton = {
                gears: [],
                rods: [],
                baseX: W / 2,
                baseY: H / 2
            };
            fungi = [];
            rustParticles = [];
            
            const mainGear = new Gear(W/2, H/2, 80, 20, 0.01);
            automaton.gears.push(mainGear);
            
            automaton.gears.push(new Gear(W/2 + 120, H/2 - 30, 50, 14, -0.015));
            automaton.gears.push(new Gear(W/2 - 100, H/2 + 50, 60, 16, 0.012));
            automaton.gears.push(new Gear(W/2 + 60, H/2 + 100, 40, 12, -0.02));
            automaton.gears.push(new Gear(W/2 - 60, H/2 - 80, 45, 13, 0.018));
            
            automaton.rods.push(new Rod(W/2 + 80, H/2, W/2 + 120, H/2 - 30));
            automaton.rods.push(new Rod(W/2 - 80, H/2, W/2 - 100, H/2 + 50));
            automaton.rods.push(new Rod(W/2 + 50, H/2 + 80, W/2 + 60, H/2 + 100));
        }
        
        function drawBackground() {
            const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
            grad.addColorStop(0, '#1a1510');
            grad.addColorStop(1, '#0a0806');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            ctx.beginPath();
            ctx.arc(W * 0.8, H * 0.2, 100, 0, Math.PI * 2);
            const spotlight = ctx.createRadialGradient(W * 0.8, H * 0.2, 0, W * 0.8, H * 0.2, 200);
            spotlight.addColorStop(0, 'rgba(255, 220, 150, 0.1)');
            spotlight.addColorStop(1, 'transparent');
            ctx.fillStyle = spotlight;
            ctx.fill();
        }
        
        function animate() {
            time += 0.016;
            drawBackground();
            
            if (automaton) {
                automaton.rods.forEach(r => { r.update(); r.draw(); });
                automaton.gears.forEach(g => { g.update(); g.draw(); });
            }
            
            rustParticles = rustParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.02;
                p.life -= 0.01;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(150, 80, 30, " + p.life + ")";
                ctx.fill();
                
                return p.life > 0;
            });
            
            if (fungiGrowth > 0 && automaton && Math.random() < 0.005 * fungiGrowth) {
                const gear = automaton.gears[Math.floor(Math.random() * automaton.gears.length)];
                if (gear.rust > 0.3) {
                    fungi.push(new Fungus(
                        gear.x + (Math.random() - 0.5) * gear.radius,
                        gear.y + (Math.random() - 0.5) * gear.radius
                    ));
                }
            }
            
            fungi.forEach(f => { f.update(); f.draw(); });
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (!automaton) return;
            automaton.gears.forEach(g => {
                const dist = Math.hypot(e.clientX - g.x, e.clientY - g.y);
                if (dist < g.radius) {
                    g.rust += 0.1;
                    for (let i = 0; i < 10; i++) {
                        rustParticles.push({
                            x: e.clientX,
                            y: e.clientY,
                            vx: (Math.random() - 0.5) * 3,
                            vy: (Math.random() - 0.5) * 3,
                            size: 2 + Math.random() * 3,
                            life: 1
                        });
                    }
                }
            });
        };
        
        document.getElementById('decay').oninput = e => {
            decayRate = e.target.value / 100;
            document.getElementById('decay-val').textContent = e.target.value;
        };
        
        document.getElementById('fungi').oninput = e => {
            fungiGrowth = e.target.value / 100;
            document.getElementById('fungi-val').textContent = e.target.value;
        };
        
        document.getElementById('new-btn').onclick = createAutomaton;
        
        document.getElementById('restore-btn').onclick = () => {
            if (!automaton) return;
            automaton.gears.forEach(g => {
                g.rust *= 0.7;
                g.seized = false;
            });
            automaton.rods.forEach(r => {
                r.rust *= 0.7;
                r.bend *= 0.5;
            });
        };
        
        createAutomaton();
        animate();
    </script>
</body>
</html>
