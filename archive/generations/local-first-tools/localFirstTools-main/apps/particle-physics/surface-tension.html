    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Surface Tension</h3>
        <div class="control-row">
            <label>Tension Strength <span class="value" id="tension-val">70</span></label>
            <input type="range" id="tension" min="30" max="100" value="70">
        </div>
        <div class="control-row">
            <label>Ripple Decay <span class="value" id="decay-val">50</span></label>
            <input type="range" id="decay" min="20" max="80" value="50">
        </div>
        <button id="strider-btn">Add Strider</button>
        <button id="drop-btn">Drop Water</button>
        <button id="reset-btn">Reset Pond</button>
    </div>
    <div id="stats">
        <div>Striders: <span id="strider-count">0</span></div>
        <div>Ripples: <span id="ripple-count">0</span></div>
        <div>Tension: <span id="tension-state">Stable</span></div>
    </div>
    <div id="info">Click to create ripples | Watch striders dance on the surface</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let tensionStrength = 0.7;
        let rippleDecay = 0.5;
        let time = 0;
        let mouseX = W / 2;
        let mouseY = H / 2;
        
        const ripples = [];
        const striders = [];
        
        class Ripple {
            constructor(x, y, strength) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.strength = strength || 1;
                this.life = 1;
            }
            
            update() {
                this.radius += 2 + (1 - rippleDecay) * 2;
                this.life -= 0.01 * rippleDecay;
                return this.life > 0;
            }
            
            draw() {
                const alpha = this.life * 0.4 * this.strength;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(150, 200, 255, " + alpha + ")";
                ctx.lineWidth = 2 * this.life;
                ctx.stroke();
                
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(100, 150, 220, " + (alpha * 0.5) + ")";
                    ctx.lineWidth = 1 * this.life;
                    ctx.stroke();
                }
            }
            
            getHeightAt(x, y) {
                const dist = Math.hypot(x - this.x, y - this.y);
                const wave = Math.sin((dist - this.radius) * 0.3) * this.life * this.strength;
                const falloff = Math.max(0, 1 - Math.abs(dist - this.radius) / 50);
                return wave * falloff * 10;
            }
        }
        
        class WaterStrider {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.targetX = x;
                this.targetY = y;
                this.legPhase = Math.random() * Math.PI * 2;
                this.bodyAngle = Math.random() * Math.PI * 2;
                this.stepTimer = 0;
                this.isMoving = false;
            }
            
            update() {
                this.legPhase += 0.1;
                
                let totalHeight = 0;
                ripples.forEach(r => {
                    totalHeight += r.getHeightAt(this.x, this.y);
                });
                
                if (Math.abs(totalHeight) > 5) {
                    const escapeAngle = Math.atan2(this.y - H/2, this.x - W/2) + (Math.random() - 0.5);
                    this.vx += Math.cos(escapeAngle) * 0.3;
                    this.vy += Math.sin(escapeAngle) * 0.3;
                    this.isMoving = true;
                }
                
                if (Math.random() < 0.02) {
                    this.targetX = 100 + Math.random() * (W - 200);
                    this.targetY = 100 + Math.random() * (H - 200);
                }
                
                const toTargetX = this.targetX - this.x;
                const toTargetY = this.targetY - this.y;
                const distToTarget = Math.hypot(toTargetX, toTargetY);
                
                if (distToTarget > 10) {
                    this.vx += (toTargetX / distToTarget) * 0.05;
                    this.vy += (toTargetY / distToTarget) * 0.05;
                    this.isMoving = true;
                } else {
                    this.isMoving = false;
                }
                
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > 3) {
                    this.vx *= 3 / speed;
                    this.vy *= 3 / speed;
                }
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.vx *= 0.95;
                this.vy *= 0.95;
                
                if (speed > 0.5) {
                    this.bodyAngle = Math.atan2(this.vy, this.vx);
                }
                
                this.stepTimer += 0.016;
                if (this.isMoving && this.stepTimer > 0.3) {
                    this.stepTimer = 0;
                    ripples.push(new Ripple(this.x, this.y, 0.3));
                }
                
                this.x = Math.max(50, Math.min(W - 50, this.x));
                this.y = Math.max(50, Math.min(H - 50, this.y));
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.bodyAngle);
                
                const legSpread = 25;
                const legLength = 20;
                const legWobble = Math.sin(this.legPhase) * (this.isMoving ? 5 : 2);
                
                ctx.strokeStyle = 'rgba(60, 80, 100, 0.8)';
                ctx.lineWidth = 1;
                
                for (let side = -1; side <= 1; side += 2) {
                    for (let leg = 0; leg < 3; leg++) {
                        const baseAngle = (leg - 1) * 0.5 + side * 0.3;
                        const wobbleOffset = Math.sin(this.legPhase + leg * 0.5) * 0.1 * (this.isMoving ? 1 : 0.3);
                        
                        const startX = (leg - 1) * 5;
                        const startY = side * 3;
                        const endX = startX + Math.cos(baseAngle + wobbleOffset) * legLength;
                        const endY = startY + side * legSpread + Math.sin(this.legPhase + leg) * legWobble;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.arc(endX, endY, 3, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(100, 140, 180, 0.3)';
                        ctx.fill();
                    }
                }
                
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(40, 60, 80, 0.9)';
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(-8, 0, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function drawBackground() {
            const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
            gradient.addColorStop(0, '#0f1a28');
            gradient.addColorStop(1, '#0a1520');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.strokeStyle = 'rgba(80, 120, 160, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
        }
        
        function drawCursor() {
            let totalHeight = 0;
            ripples.forEach(r => {
                totalHeight += r.getHeightAt(mouseX, mouseY);
            });
            
            const cursorSize = 8 + Math.abs(totalHeight) * 0.5;
            
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, cursorSize, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(150, 200, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(150, 200, 255, 0.8)';
            ctx.fill();
        }
        
        function getTensionState() {
            const activeRipples = ripples.filter(r => r.life > 0.5).length;
            if (activeRipples > 10) return 'Turbulent';
            if (activeRipples > 5) return 'Disturbed';
            if (activeRipples > 2) return 'Rippling';
            return 'Calm';
        }
        
        function updateStats() {
            document.getElementById('strider-count').textContent = striders.length;
            document.getElementById('ripple-count').textContent = ripples.length;
            document.getElementById('tension-state').textContent = getTensionState();
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            
            for (let i = ripples.length - 1; i >= 0; i--) {
                if (!ripples[i].update()) {
                    ripples.splice(i, 1);
                } else {
                    ripples[i].draw();
                }
            }
            
            striders.forEach(s => {
                s.update();
                s.draw();
            });
            
            drawCursor();
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onmousemove = e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        };
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 320) return;
            ripples.push(new Ripple(e.clientX, e.clientY, 1));
        };
        
        document.getElementById('tension').oninput = e => {
            tensionStrength = e.target.value / 100;
            document.getElementById('tension-val').textContent = e.target.value;
        };
        
        document.getElementById('decay').oninput = e => {
            rippleDecay = e.target.value / 100;
            document.getElementById('decay-val').textContent = e.target.value;
        };
        
        document.getElementById('strider-btn').onclick = () => {
            striders.push(new WaterStrider(
                200 + Math.random() * (W - 400),
                100 + Math.random() * (H - 200)
            ));
        };
        
        document.getElementById('drop-btn').onclick = () => {
            const x = 200 + Math.random() * (W - 400);
            const y = 100 + Math.random() * (H - 200);
            ripples.push(new Ripple(x, y, 2));
        };
        
        document.getElementById('reset-btn').onclick = () => {
            ripples.length = 0;
            striders.length = 0;
        };
        
        for (let i = 0; i < 3; i++) {
            striders.push(new WaterStrider(
                W/2 + (Math.random() - 0.5) * 200,
                H/2 + (Math.random() - 0.5) * 200
            ));
        }
        
        animate();
    </script>
</body>
</html>
