    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <canvas id="world"></canvas>

    <script>
        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graph');
        const graphCtx = graphCanvas.getContext('2d');
        
        let width, height;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Config ---
        const FOOD_VALUE = 20;
        const START_POP = 50;
        const MUTATION_RATE = 0.1;
        const FOOD_SPAWN_RATE = 2; // Food per frame (probabilistic)

        // --- Classes ---
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(n) { this.x *= n; this.y *= n; return this; }
            mag() { return Math.sqrt(this.x*this.x + this.y*this.y); }
            normalize() {
                const m = this.mag();
                if (m > 0) this.mult(1/m);
                return this;
            }
            limit(max) {
                if (this.mag() > max) {
                    this.normalize();
                    this.mult(max);
                }
                return this;
            }
            copy() { return new Vector(this.x, this.y); }
            dist(v) { return Math.hypot(this.x - v.x, this.y - v.y); }
        }

        class Creature {
            constructor(x, y, dna) {
                this.pos = new Vector(x, y);
                this.vel = new Vector(Math.random()-0.5, Math.random()-0.5);
                this.acc = new Vector(0, 0);
                
                // DNA
                this.dna = dna || {
                    speed: 2 + Math.random(),
                    size: 5 + Math.random() * 5,
                    sense: 50 + Math.random() * 50
                };
                
                this.energy = 100;
                this.maxEnergy = 200;
                this.age = 0;
                this.dead = false;
                
                // Color based on DNA
                // Red = Speed, Green = Size, Blue = Sense
                const r = Math.min(255, this.dna.speed * 50);
                const g = Math.min(255, this.dna.size * 20);
                const b = Math.min(255, this.dna.sense * 2);
                this.color = `rgb(${r},${g},${b})`;
            }
            
            update() {
                this.age++;
                
                // Energy Cost
                // Speed costs energy^2
                // Size costs energy^3 (cube law)
                // Sense costs linear
                const cost = (this.dna.speed * this.dna.speed * 0.005) + 
                             (this.dna.size * this.dna.size * this.dna.size * 0.0001) +
                             (this.dna.sense * 0.001);
                
                this.energy -= cost;
                
                if (this.energy <= 0) this.dead = true;
                
                // Movement
                this.vel.add(this.acc);
                this.vel.limit(this.dna.speed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                
                // Boundaries
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.y < 0) this.pos.y = height;
                if (this.pos.y > height) this.pos.y = 0;
            }
            
            seek(target) {
                const desired = target.copy().sub(this.pos);
                desired.normalize();
                desired.mult(this.dna.speed);
                const steer = desired.sub(this.vel);
                steer.limit(0.5); // Turn speed
                this.acc.add(steer);
            }
            
            behavior(food) {
                let closest = null;
                let record = Infinity;
                
                // Find closest food
                for (let i = 0; i < food.length; i++) {
                    const d = this.pos.dist(food[i]);
                    if (d < this.dna.sense && d < record) {
                        record = d;
                        closest = food[i];
                    }
                }
                
                if (closest) {
                    this.seek(closest);
                } else {
                    // Wander
                    const wander = new Vector(Math.random()-0.5, Math.random()-0.5);
                    wander.mult(0.5);
                    this.acc.add(wander);
                }
            }
            
            eat(food) {
                for (let i = food.length - 1; i >= 0; i--) {
                    const d = this.pos.dist(food[i]);
                    if (d < this.dna.size) {
                        this.energy += FOOD_VALUE;
                        if (this.energy > this.maxEnergy) this.energy = this.maxEnergy;
                        food.splice(i, 1);
                    }
                }
            }
            
            reproduce() {
                if (this.energy > this.maxEnergy * 0.8 && Math.random() < 0.005) {
                    this.energy *= 0.5;
                    
                    // Mutate
                    const newDna = {
                        speed: this.dna.speed + (Math.random()-0.5) * MUTATION_RATE,
                        size: this.dna.size + (Math.random()-0.5) * MUTATION_RATE,
                        sense: this.dna.sense + (Math.random()-0.5) * MUTATION_RATE * 10
                    };
                    
                    // Clamp
                    newDna.speed = Math.max(0.5, newDna.speed);
                    newDna.size = Math.max(2, newDna.size);
                    newDna.sense = Math.max(10, newDna.sense);
                    
                    return new Creature(this.pos.x, this.pos.y, newDna);
                }
                return null;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, this.dna.size, 0, Math.PI*2);
                ctx.fill();
                
                // Draw sense radius (faint)
                if (selectedCreature === this) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.arc(this.pos.x, this.pos.y, this.dna.sense, 0, Math.PI*2);
                    ctx.stroke();
                }
            }
        }

        // --- State ---
        let creatures = [];
        let food = [];
        let paused = false;
        let speedMult = 1;
        let selectedCreature = null;
        let history = []; // For graph

        function init() {
            creatures = [];
            food = [];
            for (let i = 0; i < START_POP; i++) {
                creatures.push(new Creature(Math.random()*width, Math.random()*height));
            }
            for (let i = 0; i < 100; i++) {
                food.push(new Vector(Math.random()*width, Math.random()*height));
            }
        }

        function update() {
            if (paused) return;
            
            for (let s = 0; s < speedMult; s++) {
                // Spawn Food
                if (Math.random() < 0.1 * food.length < 200) { // Limit food
                    food.push(new Vector(Math.random()*width, Math.random()*height));
                }
                if (food.length < 50) {
                     food.push(new Vector(Math.random()*width, Math.random()*height));
                }

                // Update Creatures
                for (let i = creatures.length - 1; i >= 0; i--) {
                    const c = creatures[i];
                    c.behavior(food);
                    c.update();
                    c.eat(food);
                    
                    if (c.dead) {
                        creatures.splice(i, 1);
                        // Spawn food where it died (circle of life)
                        food.push(c.pos.copy());
                    } else {
                        const child = c.reproduce();
                        if (child) creatures.push(child);
                    }
                }
                
                // Extinction check
                if (creatures.length === 0) {
                    init(); // Restart
                }
            }
            
            updateStats();
        }

        function draw() {
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, width, height);
            
            // Draw Food
            ctx.fillStyle = '#0f0';
            for (let f of food) {
                ctx.beginPath();
                ctx.arc(f.x, f.y, 2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Draw Creatures
            for (let c of creatures) {
                c.draw();
            }
            
            update();
            requestAnimationFrame(draw);
        }
        
        function updateStats() {
            if (creatures.length === 0) return;
            
            let avgSpeed = 0;
            let avgSize = 0;
            let avgSense = 0;
            
            for (let c of creatures) {
                avgSpeed += c.dna.speed;
                avgSize += c.dna.size;
                avgSense += c.dna.sense;
            }
            
            avgSpeed /= creatures.length;
            avgSize /= creatures.length;
            avgSense /= creatures.length;
            
            document.getElementById('stats').innerHTML = `
                Population: ${creatures.length}<br>
                Avg Speed: ${avgSpeed.toFixed(2)}<br>
                Avg Size: ${avgSize.toFixed(2)}<br>
                Avg Sense: ${avgSense.toFixed(2)}
            `;
            
            // Graph
            if (Math.random() < 0.05) { // Sample occasionally
                history.push({s: avgSpeed, z: avgSize, n: creatures.length});
                if (history.length > 100) history.shift();
                drawGraph();
            }
        }
        
        function drawGraph() {
            graphCtx.clearRect(0, 0, 200, 100);
            
            // Draw Speed (Red)
            graphCtx.strokeStyle = '#f00';
            graphCtx.beginPath();
            for (let i = 0; i < history.length; i++) {
                const x = i * 2;
                const y = 100 - (history[i].s * 10);
                if (i===0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
            }
            graphCtx.stroke();
            
            // Draw Size (Green)
            graphCtx.strokeStyle = '#0f0';
            graphCtx.beginPath();
            for (let i = 0; i < history.length; i++) {
                const x = i * 2;
                const y = 100 - (history[i].z * 5);
                if (i===0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
            }
            graphCtx.stroke();
        }

        function resetSim() { init(); }
        function togglePause() { paused = !paused; }
        function toggleFast() { speedMult = speedMult === 1 ? 5 : 1; }
        
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const mouse = new Vector(x, y);
            
            let closest = null;
            let record = 50;
            for (let c of creatures) {
                const d = c.pos.dist(mouse);
                if (d < record) {
                    record = d;
                    closest = c;
                }
            }
            selectedCreature = closest;
        });

        init();
        draw();

    </script>
</body>
</html>
