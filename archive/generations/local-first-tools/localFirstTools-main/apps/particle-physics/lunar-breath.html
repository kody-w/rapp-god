    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <canvas id="canvas"></canvas>

            <input type="range" id="tide" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Cycle Speed <span class="value" id="speed-val">30</span></label>
            <input type="range" id="speed" min="5" max="100" value="30">
        </div>
        <button id="well-btn">Add Gravity Well</button>
        <button id="clear-btn">Clear Wells</button>

    <div id="phase-indicator"><div class="moon-phase" id="moon"></div></div>
    <div id="info">Click to add gravity wells | Text flows toward celestial bodies</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let tideStrength = 0.5;
        let cycleSpeed = 0.3;
        let time = 0;
        let lunarPhase = 0;
        
        const gravityWells = [];
        const textParticles = [];
        let currentText = 'breathe';
        
        class GravityWell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.mass = 0.5 + Math.random() * 0.5;
                this.phase = Math.random() * Math.PI * 2;
                this.orbitRadius = 0;
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = 0.001 + Math.random() * 0.002;
            }
            
            update() {
                this.orbitAngle += this.orbitSpeed * cycleSpeed;
                const tidePull = Math.sin(lunarPhase + this.phase) * tideStrength;
                this.currentMass = this.mass * (1 + tidePull * 0.5);
            }
            
            draw() {
                const glow = this.currentMass * 30;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glow);
                gradient.addColorStop(0, "rgba(200, 210, 240, " + (0.3 * this.currentMass) + ")");
                gradient.addColorStop(0.5, "rgba(150, 170, 220, " + (0.1 * this.currentMass) + ")");
                gradient.addColorStop(1, "transparent");
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - glow, this.y - glow, glow * 2, glow * 2);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8 * this.currentMass, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(200, 210, 240, 0.8)";
                ctx.fill();
            }
            
            getForceAt(x, y) {
                const dx = this.x - x;
                const dy = this.y - y;
                const dist = Math.hypot(dx, dy);
                if (dist < 20) return { fx: 0, fy: 0 };
                const force = (this.currentMass * tideStrength * 50) / (dist * dist);
                return {
                    fx: (dx / dist) * force,
                    fy: (dy / dist) * force
                };
            }
        }
        
        class TextParticle {
            constructor(char, x, y, baseX, baseY) {
                this.char = char;
                this.x = x;
                this.y = y;
                this.baseX = baseX;
                this.baseY = baseY;
                this.vx = 0;
                this.vy = 0;
                this.scale = 1;
                this.rotation = 0;
                this.hue = 220 + Math.random() * 40;
                this.stretch = { x: 1, y: 1 };
            }
            
            update() {
                let totalFx = 0;
                let totalFy = 0;
                let maxStretch = 0;
                
                gravityWells.forEach(well => {
                    const force = well.getForceAt(this.x, this.y);
                    totalFx += force.fx;
                    totalFy += force.fy;
                    
                    const dist = Math.hypot(well.x - this.x, well.y - this.y);
                    if (dist < 200) {
                        maxStretch = Math.max(maxStretch, (1 - dist / 200) * well.currentMass);
                    }
                });
                
                const lunarPull = Math.sin(lunarPhase) * tideStrength * 0.1;
                totalFy += lunarPull;
                
                const returnX = (this.baseX - this.x) * 0.02;
                const returnY = (this.baseY - this.y) * 0.02;
                
                this.vx += totalFx + returnX;
                this.vy += totalFy + returnY;
                this.vx *= 0.92;
                this.vy *= 0.92;
                
                this.x += this.vx;
                this.y += this.vy;
                
                const forceAngle = Math.atan2(totalFy, totalFx);
                const forceMag = Math.hypot(totalFx, totalFy);
                
                this.stretch.x = 1 + Math.cos(forceAngle) * maxStretch * 0.5;
                this.stretch.y = 1 + Math.sin(forceAngle) * maxStretch * 0.5;
                this.rotation = forceAngle * maxStretch * 0.3;
                
                const brightness = 50 + forceMag * 200;
                this.lightness = Math.min(80, brightness);
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.stretch.x, this.stretch.y);
                
                ctx.font = "bold 48px Georgia";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                ctx.shadowBlur = 20;
                ctx.shadowColor = "hsla(" + this.hue + ", 60%, 60%, 0.5)";
                ctx.fillStyle = "hsla(" + this.hue + ", 50%, " + this.lightness + "%, 0.9)";
                ctx.fillText(this.char, 0, 0);
                
                ctx.restore();
            }
        }
        
        function createTextParticles(text) {
            textParticles.length = 0;
            const charWidth = 40;
            const startX = W / 2 - (text.length * charWidth) / 2;
            const y = H / 2;
            
            for (let i = 0; i < text.length; i++) {
                const x = startX + i * charWidth + charWidth / 2;
                textParticles.push(new TextParticle(text[i], x, y, x, y));
            }
        }
        
        function drawBackground() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < 80; i++) {
                const x = (i * 137) % W;
                const y = (i * 89) % H;
                const twinkle = Math.sin(time * 0.3 + i) * 0.5 + 0.5;
                ctx.beginPath();
                ctx.arc(x, y, 0.5 + twinkle * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(180, 190, 220, " + (0.1 + twinkle * 0.15) + ")";
                ctx.fill();
            }
            
            const tidalGradient = ctx.createLinearGradient(0, 0, 0, H);
            const tidalIntensity = Math.sin(lunarPhase) * 0.03 * tideStrength;
            tidalGradient.addColorStop(0, "rgba(100, 120, 180, " + Math.max(0, tidalIntensity) + ")");
            tidalGradient.addColorStop(0.5, "transparent");
            tidalGradient.addColorStop(1, "rgba(100, 120, 180, " + Math.max(0, -tidalIntensity) + ")");
            ctx.fillStyle = tidalGradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawTidalField() {
            if (gravityWells.length === 0) return;
            
            const resolution = 80;
            for (let y = 0; y < H; y += resolution) {
                for (let x = 0; x < W; x += resolution) {
                    let totalFx = 0;
                    let totalFy = 0;
                    
                    gravityWells.forEach(well => {
                        const force = well.getForceAt(x, y);
                        totalFx += force.fx;
                        totalFy += force.fy;
                    });
                    
                    const mag = Math.hypot(totalFx, totalFy);
                    if (mag > 0.01) {
                        const angle = Math.atan2(totalFy, totalFx);
                        const length = Math.min(30, mag * 100);
                        
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + Math.cos(angle) * length, y + Math.sin(angle) * length);
                        ctx.strokeStyle = "rgba(100, 130, 200, " + Math.min(0.3, mag * 2) + ")";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function updateMoonPhase() {
            const moon = document.getElementById('moon');
            const phase = (Math.sin(lunarPhase) + 1) / 2;
            const shadowWidth = Math.abs(1 - phase * 2) * 100;
            const shadowDir = phase < 0.5 ? 'right' : 'left';
            
            if (phase < 0.5) {
                moon.style.background = "linear-gradient(to left, #c0d0f0 " + (100 - shadowWidth) + "%, #1a1a2a " + (100 - shadowWidth) + "%)";
            } else {
                moon.style.background = "linear-gradient(to right, #c0d0f0 " + (100 - shadowWidth) + "%, #1a1a2a " + (100 - shadowWidth) + "%)";
            }
        }
        
        function animate() {
            time += 0.016;
            lunarPhase += 0.01 * cycleSpeed;
            
            drawBackground();
            drawTidalField();
            
            gravityWells.forEach(w => w.update());
            gravityWells.forEach(w => w.draw());
            
            textParticles.forEach(p => p.update());
            textParticles.forEach(p => p.draw());
            
            updateMoonPhase();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX > 220 || e.clientY > 300) {
                gravityWells.push(new GravityWell(e.clientX, e.clientY));
            }
        };
        
        document.getElementById('text-input').oninput = e => {
            currentText = e.target.value || 'breathe';
            createTextParticles(currentText);
        };
        
        document.getElementById('tide').oninput = e => {
            tideStrength = e.target.value / 100;
            document.getElementById('tide-val').textContent = e.target.value;
        };
        
        document.getElementById('speed').oninput = e => {
            cycleSpeed = e.target.value / 100;
            document.getElementById('speed-val').textContent = e.target.value;
        };
        
        document.getElementById('well-btn').onclick = () => {
            gravityWells.push(new GravityWell(
                W * 0.3 + Math.random() * W * 0.4,
                H * 0.3 + Math.random() * H * 0.4
            ));
        };
        
        document.getElementById('clear-btn').onclick = () => {
            gravityWells.length = 0;
        };
        
        createTextParticles(currentText);
        gravityWells.push(new GravityWell(W * 0.7, H * 0.3));
        animate();
    </script>
</body>
</html>
