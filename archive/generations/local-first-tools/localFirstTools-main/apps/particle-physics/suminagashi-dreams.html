    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

        <div>Drops: <span id="drop-count">0</span></div>

    <div id="info">Click to drop ink | Drag with tools to create patterns | Pull to paper</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; initBath(); }
        resize(); window.onresize = resize;
        
        let surfaceTension = 0.5;
        let viscosity = 0.5;
        let time = 0;
        let currentColor = 0;
        let currentTool = 'drop';
        let isPulling = false;
        let pullProgress = 0;
        
        const INK_COLORS = [
            { h: 220, s: 60, l: 20 },
            { h: 0, s: 60, l: 30 },
            { h: 140, s: 50, l: 25 },
            { h: 45, s: 60, l: 30 }
        ];
        
        const inkDrops = [];
        const velocityField = [];
        const GRID_SIZE = 20;
        let gridW, gridH;
        
        function initBath() {
            gridW = Math.ceil(W / GRID_SIZE);
            gridH = Math.ceil(H / GRID_SIZE);
            velocityField.length = 0;
            for (let i = 0; i < gridW * gridH; i++) {
                velocityField.push({ vx: 0, vy: 0 });
            }
        }
        
        class InkDrop {
            constructor(x, y, colorIndex, size) {
                this.x = x;
                this.y = y;
                this.colorIndex = colorIndex;
                this.color = INK_COLORS[colorIndex];
                this.size = size || 30 + Math.random() * 20;
                this.points = [];
                this.initPoints();
                this.age = 0;
            }
            
            initPoints() {
                const segments = 32;
                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const noise = 0.8 + Math.random() * 0.4;
                    this.points.push({
                        angle: angle,
                        radius: this.size * noise,
                        vr: 0
                    });
                }
            }
            
            update() {
                this.age += 0.016;
                
                this.points.forEach((p, i) => {
                    const worldX = this.x + Math.cos(p.angle) * p.radius;
                    const worldY = this.y + Math.sin(p.angle) * p.radius;
                    
                    const gridX = Math.floor(worldX / GRID_SIZE);
                    const gridY = Math.floor(worldY / GRID_SIZE);
                    
                    if (gridX >= 0 && gridX < gridW && gridY >= 0 && gridY < gridH) {
                        const cell = velocityField[gridY * gridW + gridX];
                        const force = Math.cos(p.angle) * cell.vx + Math.sin(p.angle) * cell.vy;
                        p.vr += force * 0.5;
                    }
                    
                    inkDrops.forEach(other => {
                        if (other === this) return;
                        const ox = other.x - this.x;
                        const oy = other.y - this.y;
                        const dist = Math.hypot(ox, oy);
                        
                        if (dist < this.size + other.size + 20) {
                            const dx = worldX - other.x;
                            const dy = worldY - other.y;
                            const d = Math.hypot(dx, dy);
                            
                            other.points.forEach((op, oi) => {
                                const owx = other.x + Math.cos(op.angle) * op.radius;
                                const owy = other.y + Math.sin(op.angle) * op.radius;
                                const pd = Math.hypot(worldX - owx, worldY - owy);
                                
                                if (pd < 30) {
                                    const repel = (30 - pd) * surfaceTension * 0.01;
                                    p.vr += repel;
                                    op.vr += repel;
                                }
                            });
                        }
                    });
                    
                    const prevP = this.points[(i - 1 + this.points.length) % this.points.length];
                    const nextP = this.points[(i + 1) % this.points.length];
                    const avgRadius = (prevP.radius + nextP.radius) / 2;
                    p.vr += (avgRadius - p.radius) * 0.02 * surfaceTension;
                    
                    p.vr *= 0.95 * viscosity;
                    p.radius += p.vr;
                    p.radius = Math.max(5, p.radius);
                });
            }
            
            draw() {
                const alpha = isPulling ? 1 - pullProgress * 0.3 : 0.85;
                
                ctx.beginPath();
                this.points.forEach((p, i) => {
                    const x = this.x + Math.cos(p.angle) * p.radius;
                    const y = this.y + Math.sin(p.angle) * p.radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 1.5);
                gradient.addColorStop(0, "hsla(" + this.color.h + ", " + this.color.s + "%, " + (this.color.l + 10) + "%, " + alpha + ")");
                gradient.addColorStop(0.7, "hsla(" + this.color.h + ", " + this.color.s + "%, " + this.color.l + "%, " + (alpha * 0.9) + ")");
                gradient.addColorStop(1, "hsla(" + this.color.h + ", " + (this.color.s - 10) + "%, " + (this.color.l - 5) + "%, " + (alpha * 0.7) + ")");
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = "hsla(" + this.color.h + ", " + this.color.s + "%, " + (this.color.l - 10) + "%, " + (alpha * 0.3) + ")";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function applyTool(x, y, lastX, lastY) {
            if (currentTool === 'drop') return;
            
            const dx = x - lastX;
            const dy = y - lastY;
            const dist = Math.hypot(dx, dy);
            
            if (dist < 1) return;
            
            const toolWidth = currentTool === 'comb' ? 5 : 1;
            const perpX = -dy / dist;
            const perpY = dx / dist;
            
            for (let t = -toolWidth; t <= toolWidth; t++) {
                const tx = x + perpX * t * 15;
                const ty = y + perpY * t * 15;
                
                const gridX = Math.floor(tx / GRID_SIZE);
                const gridY = Math.floor(ty / GRID_SIZE);
                
                if (gridX >= 0 && gridX < gridW && gridY >= 0 && gridY < gridH) {
                    const cell = velocityField[gridY * gridW + gridX];
                    cell.vx += dx * 0.3;
                    cell.vy += dy * 0.3;
                }
            }
        }
        
        function drawBackground() {
            if (isPulling) {
                const paperGrain = ctx.createLinearGradient(0, 0, W, H);
                paperGrain.addColorStop(0, '#f8f4e8');
                paperGrain.addColorStop(0.5, '#f5f0e5');
                paperGrain.addColorStop(1, '#f2ede0');
                ctx.fillStyle = paperGrain;
            } else {
                ctx.fillStyle = '#e8e0d5';
            }
            ctx.fillRect(0, 0, W, H);
            
            if (!isPulling) {
                ctx.fillStyle = 'rgba(200, 190, 175, 0.3)';
                for (let i = 0; i < 50; i++) {
                    const x = (i * 137 + time * 2) % W;
                    const y = (i * 89) % H;
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            if (isPulling && pullProgress > 0.5) {
                ctx.globalAlpha = (pullProgress - 0.5) * 0.1;
                for (let i = 0; i < 100; i++) {
                    const x = Math.random() * W;
                    const y = Math.random() * H;
                    ctx.fillStyle = 'rgba(180, 160, 140, 0.5)';
                    ctx.fillRect(x, y, Math.random() * 3, 1);
                }
                ctx.globalAlpha = 1;
            }
        }
        
        function updateVelocityField() {
            velocityField.forEach(cell => {
                cell.vx *= 0.95;
                cell.vy *= 0.95;
            });
        }
        
        function pullPaper() {
            isPulling = true;
            pullProgress = 0;
            document.getElementById('bath-state').textContent = 'Pulling...';
            
            const pullAnim = () => {
                pullProgress += 0.02;
                if (pullProgress >= 1) {
                    isPulling = false;
                    document.getElementById('bath-state').textContent = 'Print Complete';
                    setTimeout(() => {
                        document.getElementById('bath-state').textContent = 'Ready';
                    }, 2000);
                    return;
                }
                requestAnimationFrame(pullAnim);
            };
            pullAnim();
        }
        
        function updateStats() {
            document.getElementById('drop-count').textContent = inkDrops.length;
            let swirls = 0;
            inkDrops.forEach(d => {
                d.points.forEach(p => {
                    if (Math.abs(p.vr) > 0.5) swirls++;
                });
            });
            document.getElementById('swirl-count').textContent = Math.floor(swirls / 10);
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            updateVelocityField();
            
            inkDrops.forEach(d => {
                d.update();
                d.draw();
            });
            
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        
        canvas.onmousedown = e => {
            if (e.clientX < 200 && e.clientY < 380) return;
            
            isDrawing = true;
            lastX = e.clientX;
            lastY = e.clientY;
            
            if (currentTool === 'drop') {
                inkDrops.push(new InkDrop(e.clientX, e.clientY, currentColor));
            }
        };
        
        canvas.onmousemove = e => {
            if (!isDrawing) return;
            applyTool(e.clientX, e.clientY, lastX, lastY);
            lastX = e.clientX;
            lastY = e.clientY;
        };
        
        canvas.onmouseup = () => { isDrawing = false; };
        
        document.getElementById('tension').oninput = e => {
            surfaceTension = e.target.value / 100;
            document.getElementById('tension-val').textContent = e.target.value;
        };
        
        document.getElementById('viscosity').oninput = e => {
            viscosity = e.target.value / 100;
            document.getElementById('viscosity-val').textContent = e.target.value;
        };
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = parseInt(btn.dataset.color);
            };
        });
        
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            };
        });
        
        document.getElementById('pull-btn').onclick = pullPaper;
        document.getElementById('clear-btn').onclick = () => {
            inkDrops.length = 0;
            initBath();
        };
        
        initBath();
        animate();
    </script>
</body>
</html>
