    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Simulation state
        let organisms = [];
        let nutrients = [];
        let speciesRegistry = new Map();
        let stats = {
            generation: 0,
            mutations: 0,
            extinctions: 0,
            births: 0,
            deaths: 0,
            simulationTime: 0
        };

        let mutationRate = 0.05;
        let speed = 1;

        // DNA traits
        function createDNA() {
            return {
                speed: 0.5 + Math.random() * 1.5,
                size: 3 + Math.random() * 8,
                metabolism: 0.3 + Math.random() * 0.7,
                senseRadius: 30 + Math.random() * 70,
                aggression: Math.random(),
                hue: Math.random() * 360,
                reproductionThreshold: 50 + Math.random() * 50,
                diet: Math.random() // 0 = herbivore, 1 = carnivore
            };
        }

        function mutateDNA(dna) {
            const mutated = { ...dna };
            const traits = Object.keys(mutated);
            const trait = traits[Math.floor(Math.random() * traits.length)];

            const change = (Math.random() - 0.5) * 0.3;

            if (trait === 'hue') {
                mutated.hue = (mutated.hue + change * 60 + 360) % 360;
            } else {
                mutated[trait] = Math.max(0.1, Math.min(2, mutated[trait] * (1 + change)));
            }

            stats.mutations++;
            return mutated;
        }

        // Get species ID from DNA
        function getSpeciesId(dna) {
            const h = Math.round(dna.hue / 30) * 30;
            const d = dna.diet > 0.5 ? 'C' : 'H';
            const s = dna.size > 6 ? 'L' : 'S';
            return `${h}-${d}-${s}`;
        }

        // Create organism
        function createOrganism(x, y, dna = null, parent = null) {
            const org = {
                x: x || Math.random() * canvas.width,
                y: y || Math.random() * canvas.height,
                vx: 0,
                vy: 0,
                dna: dna || createDNA(),
                energy: 50,
                age: 0,
                generation: parent ? parent.generation + 1 : 0,
                id: Math.random().toString(36).substr(2, 9)
            };

            // Register species
            const speciesId = getSpeciesId(org.dna);
            if (!speciesRegistry.has(speciesId)) {
                speciesRegistry.set(speciesId, {
                    id: speciesId,
                    count: 0,
                    color: `hsl(${org.dna.hue}, 70%, 50%)`,
                    totalBorn: 0,
                    preys: new Set(),
                    predators: new Set()
                });
            }
            speciesRegistry.get(speciesId).count++;
            speciesRegistry.get(speciesId).totalBorn++;

            stats.generation = Math.max(stats.generation, org.generation);

            return org;
        }

        // Create nutrient
        function createNutrient(x, y) {
            return {
                x: x || Math.random() * canvas.width,
                y: y || Math.random() * canvas.height,
                energy: 10 + Math.random() * 20,
                type: Math.random() < 0.3 ? 'rich' : 'normal'
            };
        }

        // Initialize
        function init() {
            organisms = [];
            nutrients = [];
            speciesRegistry.clear();
            stats = { generation: 0, mutations: 0, extinctions: 0, births: 0, deaths: 0, simulationTime: 0 };

            // Spawn initial nutrients
            for (let i = 0; i < 200; i++) {
                nutrients.push(createNutrient());
            }

            // Spawn initial organisms
            for (let i = 0; i < 30; i++) {
                organisms.push(createOrganism());
            }

            addEvent('Life begins...', 'birth');
        }

        // Update organism
        function updateOrganism(org) {
            const dna = org.dna;

            // Find nearest target
            let nearestFood = null;
            let nearestPrey = null;
            let nearestPredator = null;
            let minFoodDist = Infinity;
            let minPreyDist = Infinity;
            let minPredatorDist = Infinity;

            // Herbivore behavior
            if (dna.diet < 0.5) {
                for (const n of nutrients) {
                    const dist = Math.hypot(n.x - org.x, n.y - org.y);
                    if (dist < dna.senseRadius && dist < minFoodDist) {
                        minFoodDist = dist;
                        nearestFood = n;
                    }
                }
            }

            // Carnivore/omnivore behavior
            for (const other of organisms) {
                if (other === org) continue;
                const dist = Math.hypot(other.x - org.x, other.y - org.y);

                // Prey detection (smaller organisms)
                if (dna.diet > 0.3 && other.dna.size < dna.size * 0.8 && dist < dna.senseRadius) {
                    if (dist < minPreyDist) {
                        minPreyDist = dist;
                        nearestPrey = other;
                    }
                }

                // Predator detection (larger organisms)
                if (other.dna.diet > 0.3 && other.dna.size > dna.size * 1.2 && dist < dna.senseRadius) {
                    if (dist < minPredatorDist) {
                        minPredatorDist = dist;
                        nearestPredator = other;
                    }
                }
            }

            // Movement decisions
            let targetX = org.x;
            let targetY = org.y;

            // Flee from predators (highest priority)
            if (nearestPredator && minPredatorDist < dna.senseRadius * 0.5) {
                targetX = org.x - (nearestPredator.x - org.x);
                targetY = org.y - (nearestPredator.y - org.y);
            }
            // Hunt prey
            else if (nearestPrey && dna.aggression > 0.4) {
                targetX = nearestPrey.x;
                targetY = nearestPrey.y;
            }
            // Seek food
            else if (nearestFood) {
                targetX = nearestFood.x;
                targetY = nearestFood.y;
            }
            // Random movement
            else {
                targetX = org.x + (Math.random() - 0.5) * 50;
                targetY = org.y + (Math.random() - 0.5) * 50;
            }

            // Apply movement
            const dx = targetX - org.x;
            const dy = targetY - org.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 1) {
                org.vx += (dx / dist) * dna.speed * 0.1;
                org.vy += (dy / dist) * dna.speed * 0.1;
            }

            // Friction
            org.vx *= 0.95;
            org.vy *= 0.95;

            // Speed limit
            const currentSpeed = Math.hypot(org.vx, org.vy);
            if (currentSpeed > dna.speed) {
                org.vx = (org.vx / currentSpeed) * dna.speed;
                org.vy = (org.vy / currentSpeed) * dna.speed;
            }

            // Update position
            org.x += org.vx;
            org.y += org.vy;

            // Wrap around
            if (org.x < 0) org.x += canvas.width;
            if (org.x > canvas.width) org.x -= canvas.width;
            if (org.y < 0) org.y += canvas.height;
            if (org.y > canvas.height) org.y -= canvas.height;

            // Metabolism - energy cost
            org.energy -= dna.metabolism * 0.1 * (dna.size / 5);
            org.age++;

            // Eating nutrients
            if (dna.diet < 0.7) {
                for (let i = nutrients.length - 1; i >= 0; i--) {
                    const n = nutrients[i];
                    if (Math.hypot(n.x - org.x, n.y - org.y) < dna.size + 3) {
                        org.energy += n.energy * (1 - dna.diet);
                        nutrients.splice(i, 1);
                        break;
                    }
                }
            }

            // Hunting
            if (dna.diet > 0.3) {
                for (let i = organisms.length - 1; i >= 0; i--) {
                    const prey = organisms[i];
                    if (prey === org) continue;
                    if (prey.dna.size >= dna.size * 0.8) continue;

                    if (Math.hypot(prey.x - org.x, prey.y - org.y) < dna.size) {
                        org.energy += prey.energy * 0.7;

                        // Record food web
                        const predatorSpecies = getSpeciesId(dna);
                        const preySpecies = getSpeciesId(prey.dna);
                        if (speciesRegistry.has(predatorSpecies)) {
                            speciesRegistry.get(predatorSpecies).preys.add(preySpecies);
                        }
                        if (speciesRegistry.has(preySpecies)) {
                            speciesRegistry.get(preySpecies).predators.add(predatorSpecies);
                        }

                        killOrganism(i, 'predation');
                        break;
                    }
                }
            }

            // Reproduction
            if (org.energy > dna.reproductionThreshold) {
                const childDna = Math.random() < mutationRate
                    ? mutateDNA({ ...dna })
                    : { ...dna };

                const childX = org.x + (Math.random() - 0.5) * 20;
                const childY = org.y + (Math.random() - 0.5) * 20;

                organisms.push(createOrganism(childX, childY, childDna, org));
                org.energy *= 0.5;
                stats.births++;
            }

            // Death check
            if (org.energy <= 0 || org.age > 3000) {
                return false;
            }

            return true;
        }

        function killOrganism(index, reason = 'death') {
            const org = organisms[index];
            const speciesId = getSpeciesId(org.dna);

            if (speciesRegistry.has(speciesId)) {
                speciesRegistry.get(speciesId).count--;

                // Check for extinction
                if (speciesRegistry.get(speciesId).count <= 0) {
                    stats.extinctions++;
                    addEvent(`Species ${speciesId} went extinct!`, 'death');
                }
            }

            // Leave nutrients behind
            nutrients.push({
                x: org.x,
                y: org.y,
                energy: org.dna.size * 2,
                type: 'organic'
            });

            organisms.splice(index, 1);
            stats.deaths++;
        }

        // Main update loop
        function update() {
            stats.simulationTime++;

            // Update organisms
            for (let i = organisms.length - 1; i >= 0; i--) {
                if (!updateOrganism(organisms[i])) {
                    killOrganism(i);
                }
            }

            // Spawn nutrients occasionally
            if (Math.random() < 0.1) {
                nutrients.push(createNutrient());
            }

            // Limit nutrients
            while (nutrients.length > 500) {
                nutrients.shift();
            }

            // Population control - add nutrients if too few organisms
            if (organisms.length < 10 && Math.random() < 0.3) {
                nutrients.push(createNutrient());
                nutrients.push(createNutrient());
            }

            // Spontaneous generation if extinction
            if (organisms.length === 0) {
                addEvent('Spontaneous generation!', 'birth');
                for (let i = 0; i < 5; i++) {
                    organisms.push(createOrganism());
                }
            }
        }

        // Render
        function render() {
            // Dark background with slight gradient
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Nutrients
            for (const n of nutrients) {
                ctx.beginPath();
                const color = n.type === 'rich' ? '#feca57' : n.type === 'organic' ? '#ff6b6b' : '#4ecdc4';
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.6;
                ctx.arc(n.x, n.y, 2 + n.energy / 15, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalAlpha = 1;

            // Organisms
            for (const org of organisms) {
                const dna = org.dna;

                // Body
                ctx.beginPath();
                ctx.fillStyle = `hsl(${dna.hue}, 70%, ${40 + org.energy / 3}%)`;
                ctx.arc(org.x, org.y, dna.size, 0, Math.PI * 2);
                ctx.fill();

                // Diet indicator (eye/mouth)
                ctx.fillStyle = dna.diet > 0.5 ? '#ff6b6b' : '#4ecdc4';
                const eyeAngle = Math.atan2(org.vy, org.vx);
                ctx.beginPath();
                ctx.arc(
                    org.x + Math.cos(eyeAngle) * dna.size * 0.5,
                    org.y + Math.sin(eyeAngle) * dna.size * 0.5,
                    dna.size * 0.3,
                    0, Math.PI * 2
                );
                ctx.fill();

                // Sense radius (very faint)
                if (organisms.length < 100) {
                    ctx.strokeStyle = `hsla(${dna.hue}, 50%, 50%, 0.1)`;
                    ctx.beginPath();
                    ctx.arc(org.x, org.y, dna.senseRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        // Update UI
        function updateUI() {
            document.getElementById('orgCount').textContent = organisms.length;
            document.getElementById('nutrientCount').textContent = nutrients.length;
            document.getElementById('generation').textContent = stats.generation;
            document.getElementById('mutations').textContent = stats.mutations;
            document.getElementById('extinctions').textContent = stats.extinctions;

            // Count active species
            const activeSpecies = Array.from(speciesRegistry.values())
                .filter(s => s.count > 0)
                .sort((a, b) => b.count - a.count);

            document.getElementById('speciesCount').textContent = activeSpecies.length;

            // Update species list
            const list = document.getElementById('speciesList');
            list.innerHTML = '';
            activeSpecies.slice(0, 8).forEach(s => {
                const item = document.createElement('div');
                item.className = 'species-item';
                item.innerHTML = `
                    <div class="species-color" style="background: ${s.color}"></div>
                    <div class="species-info">
                        <div class="species-name">Species ${s.id}</div>
                        <div class="species-count">${s.count} alive (${s.totalBorn} total)</div>
                    </div>
                `;
                list.appendChild(item);
            });

            // Era display
            const years = stats.simulationTime / 60;
            let era = 'Hadean Era';
            if (years > 50) era = 'Archean Era';
            if (years > 150) era = 'Proterozoic Era';
            if (years > 300) era = 'Paleozoic Era';
            if (years > 500) era = 'Mesozoic Era';
            if (years > 800) era = 'Cenozoic Era';

            document.getElementById('eraName').textContent = era;
            document.getElementById('eraYears').textContent = `${years.toFixed(0)} million years`;

            // Food web visualization
            updateFoodWeb(activeSpecies);
        }

        function updateFoodWeb(species) {
            const container = document.getElementById('foodChain');
            container.innerHTML = '';

            const top5 = species.slice(0, 5);
            const width = container.offsetWidth;
            const height = container.offsetHeight;

            top5.forEach((s, i) => {
                const x = 20 + (i / 4) * (width - 40);
                const y = height / 2 + (s.count > species[0].count * 0.5 ? -20 : 20);

                const node = document.createElement('div');
                node.className = 'food-node';
                node.style.left = x + 'px';
                node.style.top = y + 'px';
                node.style.background = s.color;
                node.style.width = (4 + Math.sqrt(s.count) * 2) + 'px';
                node.style.height = (4 + Math.sqrt(s.count) * 2) + 'px';
                container.appendChild(node);
            });
        }

        // Event log
        const eventLog = document.getElementById('eventLog');
        function addEvent(text, type = 'info') {
            const event = document.createElement('div');
            event.className = `event ${type}`;
            event.textContent = `[${Math.floor(stats.simulationTime / 60)}My] ${text}`;
            eventLog.insertBefore(event, eventLog.firstChild);

            while (eventLog.children.length > 20) {
                eventLog.removeChild(eventLog.lastChild);
            }
        }

        // Controls
        document.getElementById('mutationSlider').addEventListener('input', (e) => {
            mutationRate = parseInt(e.target.value) / 100;
            document.getElementById('mutationValue').textContent = e.target.value + '%';
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = speed + 'x';
        });

        document.getElementById('cataclysm').addEventListener('click', () => {
            addEvent('CATACLYSM! Mass extinction event!', 'death');
            // Kill 80% of organisms
            const killCount = Math.floor(organisms.length * 0.8);
            for (let i = 0; i < killCount; i++) {
                if (organisms.length > 5) {
                    killOrganism(Math.floor(Math.random() * organisms.length));
                }
            }
            // Remove half the nutrients
            nutrients.length = Math.floor(nutrients.length / 2);
        });

        document.getElementById('addNutrients').addEventListener('click', () => {
            addEvent('Nutrient injection!', 'birth');
            for (let i = 0; i < 50; i++) {
                nutrients.push(createNutrient());
            }
        });

        document.getElementById('reset').addEventListener('click', init);

        // Main loop
        function gameLoop() {
            for (let i = 0; i < speed; i++) {
                update();
            }
            render();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // Start
        init();
        gameLoop();
    </script>
</body>
</html>
