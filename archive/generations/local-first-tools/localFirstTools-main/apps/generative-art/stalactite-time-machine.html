    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Time Machine</h3>
        <div class="control-row">
            <label>Time Speed <span class="value" id="speed-val">1000 yrs/s</span></label>
            <input type="range" id="speed" min="1" max="100" value="10">
        </div>
        <div class="control-row">
            <label>Mineral Concentration <span class="value" id="mineral-val">50%</span></label>
            <input type="range" id="mineral" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Water Flow <span class="value" id="flow-val">50%</span></label>
            <input type="range" id="flow" min="10" max="100" value="50">
        </div>
        <button id="reset-btn">Reset Cave (0 years)</button>
        <button id="jump-btn">Jump 1 Million Years</button>
    </div>
    <div id="time-display">
        <div class="time-value" id="years">0</div>
        <div class="time-label">Years Elapsed</div>
        <div style="margin-top:15px">
            <div class="time-value" id="formations">0</div>
            <div class="time-label">Formations</div>
        </div>
    </div>
    <div id="info">Watch stalactites and stalagmites form over geological time</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let years = 0;
        let timeSpeed = 1000;
        let mineralConc = 50;
        let waterFlow = 50;
        let stalactites = [];
        let stalagmites = [];
        let drips = [];
        let particles = [];
        
        const CEILING_Y = 80;
        const FLOOR_Y_OFFSET = 100;
        
        function initCave() {
            stalactites = [];
            stalagmites = [];
            drips = [];
            years = 0;
            
            for (let i = 0; i < 15; i++) {
                const x = 100 + Math.random() * (W - 200);
                stalactites.push({
                    x: x,
                    y: CEILING_Y,
                    length: 5 + Math.random() * 10,
                    width: 3 + Math.random() * 5,
                    growthRate: 0.0001 + Math.random() * 0.0002,
                    hue: 30 + Math.random() * 20,
                    dripping: Math.random() > 0.5
                });
                stalagmites.push({
                    x: x + (Math.random() - 0.5) * 20,
                    y: H - FLOOR_Y_OFFSET,
                    length: 3 + Math.random() * 8,
                    width: 2 + Math.random() * 4,
                    growthRate: 0.00008 + Math.random() * 0.00015,
                    hue: 25 + Math.random() * 25
                });
            }
        }
        
        function drawCave() {
            // Gradient background
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#1a1510');
            bgGrad.addColorStop(0.3, '#0a0806');
            bgGrad.addColorStop(0.7, '#0a0806');
            bgGrad.addColorStop(1, '#151210');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);
            
            // Ceiling rock
            ctx.fillStyle = '#2a2520';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(W, 0);
            ctx.lineTo(W, CEILING_Y + 20);
            for (let x = W; x >= 0; x -= 30) {
                ctx.lineTo(x, CEILING_Y + Math.sin(x * 0.02) * 15 + Math.random() * 5);
            }
            ctx.closePath();
            ctx.fill();
            
            // Floor rock
            const floorY = H - FLOOR_Y_OFFSET;
            ctx.fillStyle = '#252018';
            ctx.beginPath();
            ctx.moveTo(0, H);
            ctx.lineTo(W, H);
            ctx.lineTo(W, floorY - 20);
            for (let x = W; x >= 0; x -= 30) {
                ctx.lineTo(x, floorY - Math.sin(x * 0.025) * 12 - Math.random() * 5);
            }
            ctx.closePath();
            ctx.fill();
            
            // Subtle glow from below
            const glowGrad = ctx.createRadialGradient(W/2, H, 0, W/2, H, H * 0.6);
            glowGrad.addColorStop(0, 'rgba(60, 40, 20, 0.15)');
            glowGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawFormation(f, isStalactite) {
            const direction = isStalactite ? 1 : -1;
            const baseY = isStalactite ? f.y : f.y;
            const tipY = isStalactite ? f.y + f.length : f.y - f.length;
            
            // Main body
            ctx.beginPath();
            ctx.moveTo(f.x - f.width, baseY);
            ctx.quadraticCurveTo(f.x - f.width * 0.8, baseY + direction * f.length * 0.3, f.x - f.width * 0.3, baseY + direction * f.length * 0.7);
            ctx.lineTo(f.x, tipY);
            ctx.lineTo(f.x + f.width * 0.3, baseY + direction * f.length * 0.7);
            ctx.quadraticCurveTo(f.x + f.width * 0.8, baseY + direction * f.length * 0.3, f.x + f.width, baseY);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(f.x - f.width, baseY, f.x + f.width, baseY);
            const baseColor = "hsl(" + f.hue + ", 30%, 35%)";
            const lightColor = "hsl(" + f.hue + ", 25%, 50%)";
            const darkColor = "hsl(" + f.hue + ", 35%, 20%)";
            gradient.addColorStop(0, darkColor);
            gradient.addColorStop(0.3, lightColor);
            gradient.addColorStop(0.7, baseColor);
            gradient.addColorStop(1, darkColor);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Wet sheen
            if (f.dripping || Math.random() > 0.7) {
                ctx.beginPath();
                ctx.moveTo(f.x - f.width * 0.2, baseY + direction * f.length * 0.2);
                ctx.lineTo(f.x - f.width * 0.1, tipY - direction * f.length * 0.1);
                ctx.strokeStyle = 'rgba(200, 180, 150, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function drawDrip(d) {
            ctx.beginPath();
            ctx.ellipse(d.x, d.y, 2, 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180, 200, 220, 0.6)';
            ctx.fill();
        }
        
        function drawParticle(p) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(200, 180, 150, " + p.alpha + ")";
            ctx.fill();
        }
        
        function update() {
            const dt = timeSpeed;
            years += dt;
            
            const growthMult = (mineralConc / 50) * (waterFlow / 50);
            
            stalactites.forEach((s, i) => {
                s.length += s.growthRate * dt * growthMult;
                s.width = Math.min(s.width + s.growthRate * dt * 0.1 * growthMult, 25);
                
                // Column formation when stalactite meets stalagmite
                const correspondingStag = stalagmites[i];
                if (correspondingStag) {
                    const gap = (H - FLOOR_Y_OFFSET - correspondingStag.length) - (CEILING_Y + s.length);
                    if (gap < 0) {
                        s.length = (H - FLOOR_Y_OFFSET - correspondingStag.length - CEILING_Y) / 2;
                        correspondingStag.length = s.length;
                    }
                }
                
                // Dripping
                if (s.dripping && Math.random() < 0.002 * (waterFlow / 50)) {
                    drips.push({
                        x: s.x + (Math.random() - 0.5) * 4,
                        y: CEILING_Y + s.length,
                        vy: 0.5 + Math.random()
                    });
                }
            });
            
            stalagmites.forEach(s => {
                s.length += s.growthRate * dt * growthMult * 0.8;
                s.width = Math.min(s.width + s.growthRate * dt * 0.08 * growthMult, 20);
            });
            
            // Update drips
            drips = drips.filter(d => {
                d.y += d.vy;
                d.vy += 0.1;
                if (d.y > H - FLOOR_Y_OFFSET) {
                    // Splash particles
                    for (let i = 0; i < 3; i++) {
                        particles.push({
                            x: d.x + (Math.random() - 0.5) * 10,
                            y: H - FLOOR_Y_OFFSET,
                            vx: (Math.random() - 0.5) * 2,
                            vy: -Math.random() * 2,
                            size: 1 + Math.random(),
                            alpha: 0.6
                        });
                    }
                    return false;
                }
                return true;
            });
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.alpha -= 0.02;
                return p.alpha > 0;
            });
            
            // Occasionally add new formations
            if (Math.random() < 0.00001 * (waterFlow / 50) && stalactites.length < 30) {
                const x = 100 + Math.random() * (W - 200);
                stalactites.push({
                    x: x,
                    y: CEILING_Y,
                    length: 2,
                    width: 2,
                    growthRate: 0.0001 + Math.random() * 0.0002,
                    hue: 30 + Math.random() * 20,
                    dripping: Math.random() > 0.3
                });
                stalagmites.push({
                    x: x + (Math.random() - 0.5) * 30,
                    y: H - FLOOR_Y_OFFSET,
                    length: 1,
                    width: 1,
                    growthRate: 0.00008 + Math.random() * 0.00015,
                    hue: 25 + Math.random() * 25
                });
            }
            
            // Update display
            document.getElementById('years').textContent = formatYears(years);
            document.getElementById('formations').textContent = stalactites.length + stalagmites.length;
        }
        
        function formatYears(y) {
            if (y >= 1000000000) return (y / 1000000000).toFixed(2) + 'B';
            if (y >= 1000000) return (y / 1000000).toFixed(2) + 'M';
            if (y >= 1000) return (y / 1000).toFixed(1) + 'K';
            return Math.floor(y).toString();
        }
        
        function animate() {
            drawCave();
            
            // Draw formations back to front
            stalagmites.forEach(s => drawFormation(s, false));
            stalactites.forEach(s => drawFormation(s, true));
            
            drips.forEach(d => drawDrip(d));
            particles.forEach(p => drawParticle(p));
            
            update();
            
            requestAnimationFrame(animate);
        }
        
        document.getElementById('speed').oninput = e => {
            timeSpeed = Math.pow(e.target.value, 2);
            document.getElementById('speed-val').textContent = formatYears(timeSpeed) + '/s';
        };
        document.getElementById('mineral').oninput = e => {
            mineralConc = parseInt(e.target.value);
            document.getElementById('mineral-val').textContent = mineralConc + '%';
        };
        document.getElementById('flow').oninput = e => {
            waterFlow = parseInt(e.target.value);
            document.getElementById('flow-val').textContent = waterFlow + '%';
        };
        
        document.getElementById('reset-btn').onclick = () => initCave();
        document.getElementById('jump-btn').onclick = () => {
            for (let i = 0; i < 1000; i++) update();
        };
        
        initCave();
        animate();
    </script>
</body>
</html>
