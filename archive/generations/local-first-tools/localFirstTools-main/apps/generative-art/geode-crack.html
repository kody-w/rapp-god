    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Geode Crack</h3>
        <button id="new-btn">Find New Geode</button>
        <button id="crack-btn">Crack Open</button>
    </div>
    <div id="stats">
        <div>Geodes Found: <span id="found-count">0</span></div>
        <div>Rarest: <span id="rarest">None</span></div>
    </div>
    <div id="collection"></div>
    <div id="info">Click the geode to crack it open | Discover hidden crystals</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let time = 0;
        let geodesFound = 0;
        
        const CRYSTAL_TYPES = [
            { name: 'Amethyst', hue: 280, rarity: 0.25, saturation: 60 },
            { name: 'Quartz', hue: 0, rarity: 0.3, saturation: 5 },
            { name: 'Citrine', hue: 45, rarity: 0.15, saturation: 70 },
            { name: 'Rose Quartz', hue: 340, rarity: 0.1, saturation: 40 },
            { name: 'Celestite', hue: 200, rarity: 0.1, saturation: 50 },
            { name: 'Obsidian', hue: 0, rarity: 0.05, saturation: 0 },
            { name: 'Opal', hue: -1, rarity: 0.03, saturation: 80 },
            { name: 'Dragon Vein', hue: 15, rarity: 0.02, saturation: 90 }
        ];
        
        let collection = [];
        let rarest = null;
        
        let geode = null;
        let cracks = [];
        let crystals = [];
        let isRevealed = false;
        let crackProgress = 0;
        let particles = [];
        
        function generateGeode() {
            isRevealed = false;
            crackProgress = 0;
            cracks = [];
            crystals = [];
            particles = [];
            
            let roll = Math.random();
            let crystalType = CRYSTAL_TYPES[0];
            for (const type of CRYSTAL_TYPES) {
                if (roll < type.rarity) {
                    crystalType = type;
                    break;
                }
                roll -= type.rarity;
            }
            
            const crystalCount = 20 + Math.floor(Math.random() * 30);
            const cavityRadius = 60 + Math.random() * 40;
            
            for (let i = 0; i < crystalCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = cavityRadius * (0.3 + Math.random() * 0.7);
                
                let hue = crystalType.hue;
                if (hue === -1) {
                    hue = Math.random() * 360;
                }
                
                crystals.push({
                    angle: angle,
                    dist: dist,
                    length: 15 + Math.random() * 35,
                    width: 3 + Math.random() * 8,
                    hue: hue + (Math.random() - 0.5) * 20,
                    saturation: crystalType.saturation,
                    rotation: angle + Math.PI + (Math.random() - 0.5) * 0.5
                });
            }
            
            geode = {
                x: W / 2,
                y: H / 2,
                radius: 100 + Math.random() * 30,
                crystalType: crystalType,
                cavityRadius: cavityRadius
            };
        }
        
        function drawBackground() {
            const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
            gradient.addColorStop(0, '#2a2015');
            gradient.addColorStop(1, '#1a1510');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawGeodeExterior() {
            if (!geode) return;
            
            ctx.save();
            ctx.translate(geode.x, geode.y);
            
            for (let layer = 3; layer >= 0; layer--) {
                const layerRadius = geode.radius + layer * 5;
                ctx.beginPath();
                
                for (let a = 0; a < Math.PI * 2; a += 0.1) {
                    const noise = Math.sin(a * 5 + layer) * 8 + Math.sin(a * 13) * 5;
                    const r = layerRadius + noise;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    if (a === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                
                const shade = 40 + layer * 10;
                ctx.fillStyle = "rgb(" + shade + ", " + (shade - 5) + ", " + (shade - 10) + ")";
                ctx.fill();
            }
            
            cracks.forEach(crack => {
                ctx.beginPath();
                ctx.moveTo(crack.x1, crack.y1);
                crack.segments.forEach(seg => {
                    ctx.lineTo(seg.x, seg.y);
                });
                ctx.strokeStyle = 'rgba(20, 15, 10, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            ctx.restore();
        }
        
        function drawCrystals() {
            if (!geode || !isRevealed) return;
            
            ctx.save();
            ctx.translate(geode.x, geode.y);
            
            const cavityGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, geode.cavityRadius);
            cavityGrad.addColorStop(0, '#1a1510');
            cavityGrad.addColorStop(1, '#2a2520');
            ctx.beginPath();
            ctx.arc(0, 0, geode.cavityRadius, 0, Math.PI * 2);
            ctx.fillStyle = cavityGrad;
            ctx.fill();
            
            crystals.forEach(crystal => {
                ctx.save();
                
                const baseX = Math.cos(crystal.angle) * crystal.dist;
                const baseY = Math.sin(crystal.angle) * crystal.dist;
                
                ctx.translate(baseX, baseY);
                ctx.rotate(crystal.rotation);
                
                const sparkle = Math.sin(time * 3 + crystal.angle * 5) * 0.2 + 0.8;
                
                const gradient = ctx.createLinearGradient(0, 0, 0, -crystal.length);
                gradient.addColorStop(0, "hsla(" + crystal.hue + ", " + crystal.saturation + "%, 30%, 0.9)");
                gradient.addColorStop(0.5, "hsla(" + crystal.hue + ", " + crystal.saturation + "%, " + (50 * sparkle) + "%, 0.85)");
                gradient.addColorStop(1, "hsla(" + crystal.hue + ", " + (crystal.saturation + 20) + "%, " + (70 * sparkle) + "%, 0.8)");
                
                ctx.beginPath();
                ctx.moveTo(-crystal.width / 2, 0);
                ctx.lineTo(0, -crystal.length);
                ctx.lineTo(crystal.width / 2, 0);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(-crystal.width / 4, -crystal.length * 0.2);
                ctx.lineTo(0, -crystal.length);
                ctx.lineTo(crystal.width / 4, -crystal.length * 0.3);
                ctx.closePath();
                ctx.fillStyle = "hsla(" + crystal.hue + ", " + (crystal.saturation + 10) + "%, 80%, " + (0.3 * sparkle) + ")";
                ctx.fill();
                
                ctx.restore();
            });
            
            ctx.restore();
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(" + p.r + ", " + p.g + ", " + p.b + ", " + p.life + ")";
                ctx.fill();
            }
        }
        
        function addCrack(x, y) {
            const segments = [];
            let cx = x - geode.x;
            let cy = y - geode.y;
            
            for (let i = 0; i < 5 + Math.random() * 5; i++) {
                cx += (Math.random() - 0.5) * 30;
                cy += (Math.random() - 0.5) * 30;
                segments.push({ x: cx, y: cy });
            }
            
            cracks.push({
                x1: x - geode.x,
                y1: y - geode.y,
                segments: segments
            });
            
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    size: 2 + Math.random() * 3,
                    life: 1,
                    r: 80 + Math.random() * 40,
                    g: 70 + Math.random() * 30,
                    b: 60 + Math.random() * 20
                });
            }
            
            crackProgress += 0.15;
            
            if (crackProgress >= 1 && !isRevealed) {
                revealGeode();
            }
        }
        
        function revealGeode() {
            isRevealed = true;
            geodesFound++;
            
            if (!collection.includes(geode.crystalType.name)) {
                collection.push(geode.crystalType.name);
            }
            
            if (!rarest || geode.crystalType.rarity < rarest.rarity) {
                rarest = geode.crystalType;
            }
            
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: geode.x + Math.cos(angle) * geode.cavityRadius * 0.5,
                    y: geode.y + Math.sin(angle) * geode.cavityRadius * 0.5,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    size: 3 + Math.random() * 4,
                    life: 1,
                    r: 150 + Math.random() * 100,
                    g: 100 + Math.random() * 100,
                    b: 150 + Math.random() * 100
                });
            }
            
            updateCollection();
        }
        
        function updateStats() {
            document.getElementById('found-count').textContent = geodesFound;
            document.getElementById('rarest').textContent = rarest ? rarest.name : 'None';
        }
        
        function updateCollection() {
            document.getElementById('collection').textContent = 'Collection: ' + collection.join(', ');
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            
            if (isRevealed) {
                drawCrystals();
            }
            drawGeodeExterior();
            drawParticles();
            
            if (isRevealed && geode) {
                ctx.font = '16px Georgia';
                ctx.textAlign = 'center';
                ctx.fillStyle = "hsla(" + geode.crystalType.hue + ", 60%, 70%, 0.9)";
                ctx.fillText(geode.crystalType.name, geode.x, geode.y + geode.radius + 40);
            }
            
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 200) return;
            if (!geode || isRevealed) return;
            
            const dist = Math.hypot(e.clientX - geode.x, e.clientY - geode.y);
            if (dist < geode.radius + 20) {
                addCrack(e.clientX, e.clientY);
            }
        };
        
        document.getElementById('new-btn').onclick = generateGeode;
        
        document.getElementById('crack-btn').onclick = () => {
            if (!geode || isRevealed) return;
            
            const angle = Math.random() * Math.PI * 2;
            const x = geode.x + Math.cos(angle) * geode.radius * 0.8;
            const y = geode.y + Math.sin(angle) * geode.radius * 0.8;
            addCrack(x, y);
        };
        
        generateGeode();
        animate();
    </script>
</body>
</html>
