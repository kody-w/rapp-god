    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Shadow Theater</h3>
        <div class="control-row">
            <label>Light Height <span class="value" id="height-val">50</span></label>
            <input type="range" id="lightHeight" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Layer Depth <span class="value" id="depth-val">3</span></label>
            <input type="range" id="layerDepth" min="1" max="5" value="3">
        </div>
        <button id="scene-btn">Next Scene</button>
        <button id="animate-btn">Toggle Animation</button>
    </div>
    <div id="info">Move mouse to control light source | Watch shadows cascade through layers</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let lightX = W / 2, lightY = 100;
        let lightHeight = 50;
        let layerDepth = 3;
        let time = 0;
        let animating = true;
        let currentScene = 0;
        
        const scenes = [
            { name: 'Forest', puppets: [
                { type: 'tree', x: 0.2, layer: 0 },
                { type: 'tree', x: 0.4, layer: 1 },
                { type: 'bird', x: 0.6, layer: 2 },
                { type: 'tree', x: 0.8, layer: 0 }
            ]},
            { name: 'City', puppets: [
                { type: 'building', x: 0.15, layer: 0 },
                { type: 'building', x: 0.35, layer: 1 },
                { type: 'person', x: 0.5, layer: 2 },
                { type: 'building', x: 0.7, layer: 0 },
                { type: 'building', x: 0.9, layer: 1 }
            ]},
            { name: 'Ocean', puppets: [
                { type: 'wave', x: 0.2, layer: 0 },
                { type: 'fish', x: 0.4, layer: 2 },
                { type: 'wave', x: 0.6, layer: 1 },
                { type: 'fish', x: 0.8, layer: 2 }
            ]}
        ];
        
        function drawPuppet(type, x, y, size, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            
            if (type === 'tree') {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-size * 0.1, size);
                ctx.lineTo(size * 0.1, size);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(0, -size * 0.3, size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'bird') {
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.4, size * 0.15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                const wingAngle = Math.sin(time * 5) * 0.5;
                ctx.beginPath();
                ctx.moveTo(-size * 0.2, 0);
                ctx.lineTo(-size * 0.6, -size * 0.3 + Math.sin(time * 5) * size * 0.2);
                ctx.lineTo(-size * 0.3, 0);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(size * 0.2, 0);
                ctx.lineTo(size * 0.6, -size * 0.3 + Math.sin(time * 5 + 0.5) * size * 0.2);
                ctx.lineTo(size * 0.3, 0);
                ctx.fill();
            } else if (type === 'building') {
                ctx.fillRect(-size * 0.3, -size, size * 0.6, size);
                
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 2; col++) {
                        ctx.clearRect(-size * 0.2 + col * size * 0.25, -size * 0.9 + row * size * 0.22, size * 0.1, size * 0.15);
                    }
                }
            } else if (type === 'person') {
                ctx.beginPath();
                ctx.arc(0, -size * 0.8, size * 0.15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillRect(-size * 0.1, -size * 0.65, size * 0.2, size * 0.4);
                
                const walkPhase = Math.sin(time * 3) * 0.3;
                ctx.save();
                ctx.translate(-size * 0.05, -size * 0.25);
                ctx.rotate(walkPhase);
                ctx.fillRect(-size * 0.04, 0, size * 0.08, size * 0.3);
                ctx.restore();
                
                ctx.save();
                ctx.translate(size * 0.05, -size * 0.25);
                ctx.rotate(-walkPhase);
                ctx.fillRect(-size * 0.04, 0, size * 0.08, size * 0.3);
                ctx.restore();
            } else if (type === 'wave') {
                ctx.beginPath();
                ctx.moveTo(-size, 0);
                for (let i = 0; i <= 20; i++) {
                    const wx = -size + (i / 20) * size * 2;
                    const wy = Math.sin(i * 0.5 + time * 2) * size * 0.2;
                    ctx.lineTo(wx, wy);
                }
                ctx.lineTo(size, size * 0.5);
                ctx.lineTo(-size, size * 0.5);
                ctx.closePath();
                ctx.fill();
            } else if (type === 'fish') {
                const swimOffset = Math.sin(time * 4) * size * 0.1;
                ctx.beginPath();
                ctx.ellipse(swimOffset, 0, size * 0.3, size * 0.15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(swimOffset + size * 0.25, 0);
                ctx.lineTo(swimOffset + size * 0.45, -size * 0.15);
                ctx.lineTo(swimOffset + size * 0.45, size * 0.15);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#2a2015');
            grad.addColorStop(1, '#0a0805');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawLight() {
            const gradient = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, 300);
            gradient.addColorStop(0, 'rgba(255, 220, 150, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 200, 100, 0.1)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.beginPath();
            ctx.arc(lightX, lightY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 240, 200, 0.8)';
            ctx.fill();
        }
        
        function drawLayers() {
            const scene = scenes[currentScene];
            const stageY = H * 0.7;
            const stageHeight = H * 0.4;
            
            for (let layer = layerDepth - 1; layer >= 0; layer--) {
                const layerY = stageY - layer * 30;
                const layerOpacity = 0.3 + layer * 0.2;
                
                ctx.fillStyle = "rgba(40, 30, 20, " + layerOpacity + ")";
                ctx.fillRect(0, layerY, W, stageHeight);
                
                scene.puppets.filter(p => p.layer === layer).forEach(puppet => {
                    const puppetX = W * puppet.x;
                    const puppetY = layerY - 20;
                    const puppetSize = 60 + layer * 20;
                    
                    ctx.fillStyle = '#000';
                    drawPuppet(puppet.type, puppetX, puppetY, puppetSize);
                    
                    const shadowLength = (lightHeight / 100) * 200 * (1 + layer * 0.5);
                    const shadowAngle = Math.atan2(puppetY - lightY, puppetX - lightX);
                    const shadowX = puppetX + Math.cos(shadowAngle) * shadowLength;
                    const shadowY = puppetY + Math.sin(shadowAngle) * shadowLength * 0.3;
                    
                    for (let s = layerDepth - 1; s > layer; s--) {
                        const sLayerY = stageY - s * 30;
                        const shadowOpacity = 0.3 / (s - layer + 1);
                        
                        ctx.fillStyle = "rgba(0, 0, 0, " + shadowOpacity + ")";
                        ctx.save();
                        ctx.translate(0, (s - layer) * 40);
                        ctx.scale(1 + (s - layer) * 0.2, 0.3);
                        drawPuppet(puppet.type, shadowX, shadowY, puppetSize * (1 + (s - layer) * 0.3));
                        ctx.restore();
                    }
                });
            }
        }
        
        function drawDust() {
            for (let i = 0; i < 30; i++) {
                const x = (i * 97 + time * 20) % W;
                const y = (i * 61 + Math.sin(time + i) * 20) % H;
                const brightness = 0.1 + Math.sin(time * 2 + i) * 0.05;
                
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 230, 180, " + brightness + ")";
                ctx.fill();
            }
        }
        
        function animate() {
            if (animating) time += 0.016;
            
            drawBackground();
            drawLayers();
            drawLight();
            drawDust();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onmousemove = e => {
            lightX = e.clientX;
            lightY = Math.min(H * 0.5, e.clientY);
        };
        
        canvas.ontouchmove = e => {
            e.preventDefault();
            lightX = e.touches[0].clientX;
            lightY = Math.min(H * 0.5, e.touches[0].clientY);
        };
        
        document.getElementById('lightHeight').oninput = e => {
            lightHeight = parseInt(e.target.value);
            document.getElementById('height-val').textContent = lightHeight;
        };
        
        document.getElementById('layerDepth').oninput = e => {
            layerDepth = parseInt(e.target.value);
            document.getElementById('depth-val').textContent = layerDepth;
        };
        
        document.getElementById('scene-btn').onclick = () => {
            currentScene = (currentScene + 1) % scenes.length;
        };
        
        document.getElementById('animate-btn').onclick = () => {
            animating = !animating;
            document.getElementById('animate-btn').textContent = animating ? 'Pause' : 'Play';
        };
        
        animate();
    </script>
</body>
</html>
