    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Atmospheric Sculptor</h3>
        <div class="control-row">
            <label>Humidity <span class="value" id="humid-val">60</span>%</label>
            <input type="range" id="humid" min="20" max="100" value="60">
        </div>
        <div class="control-row">
            <label>Wind Speed <span class="value" id="wind-val">30</span></label>
            <input type="range" id="wind" min="0" max="80" value="30">
        </div>
        <button id="seed-btn">Seed Cloud (click sky)</button>
        <button id="clear-btn">Clear Atmosphere</button>
    </div>
    <div id="stats">
        <div>Particles: <span id="particle-count">0</span></div>
        <div>Clouds: <span id="cloud-count">0</span></div>
    </div>
    <div id="info">Click to seed condensation nuclei | Watch vapor form into clouds</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; initParticles(); }
        
        let humidity = 0.6;
        let windSpeed = 0.3;
        let time = 0;
        let seedMode = false;
        
        const particles = [];
        const clouds = [];
        const seeds = [];
        
        function getTemperatureAt(y) {
            return 1 - (y / H);
        }
        
        function getDewPointAt(y) {
            const temp = getTemperatureAt(y);
            return temp * humidity;
        }
        
        class VaporParticle {
            constructor(x, y) {
                this.x = x || Math.random() * W;
                this.y = y || H - Math.random() * 100;
                this.vx = 0;
                this.vy = -0.5 - Math.random() * 0.5;
                this.size = 2 + Math.random() * 2;
                this.condensed = false;
                this.alpha = 0.3 + Math.random() * 0.3;
                this.cloud = null;
            }
            
            update() {
                const temp = getTemperatureAt(this.y);
                const dewPoint = getDewPointAt(this.y);
                
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vx += windSpeed * 0.02;
                this.vx *= 0.98;
                
                if (!this.condensed) {
                    this.vy = -0.3 - (1 - temp) * 0.5;
                    
                    if (temp < dewPoint) {
                        const nearSeed = seeds.find(s => Math.hypot(s.x - this.x, s.y - this.y) < 50);
                        if (nearSeed || Math.random() < 0.01 * humidity) {
                            this.condense();
                        }
                    }
                } else {
                    this.vy *= 0.95;
                    if (this.cloud) {
                        const dx = this.cloud.x - this.x;
                        const dy = this.cloud.y - this.y;
                        this.vx += dx * 0.001;
                        this.vy += dy * 0.001;
                    }
                }
                
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < 0) {
                    this.y = H;
                    this.condensed = false;
                    this.cloud = null;
                }
                if (this.y > H) this.y = 0;
            }
            
            condense() {
                this.condensed = true;
                this.size *= 1.5;
                this.alpha = 0.6;
                
                let nearestCloud = null;
                let minDist = 100;
                
                clouds.forEach(cloud => {
                    const dist = Math.hypot(cloud.x - this.x, cloud.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        nearestCloud = cloud;
                    }
                });
                
                if (nearestCloud) {
                    this.cloud = nearestCloud;
                    nearestCloud.particles.push(this);
                } else {
                    const newCloud = new Cloud(this.x, this.y);
                    newCloud.particles.push(this);
                    this.cloud = newCloud;
                    clouds.push(newCloud);
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                if (this.condensed) {
                    ctx.fillStyle = "rgba(255, 255, 255, " + this.alpha + ")";
                } else {
                    const temp = getTemperatureAt(this.y);
                    const hue = 200 + temp * 20;
                    ctx.fillStyle = "hsla(" + hue + ", 50%, 70%, " + (this.alpha * 0.5) + ")";
                }
                ctx.fill();
            }
        }
        
        class Cloud {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.type = this.determineType(y);
            }
            
            determineType(y) {
                const altitude = 1 - (y / H);
                if (altitude > 0.7) return 'cirrus';
                if (altitude > 0.4) return 'cumulus';
                return 'stratus';
            }
            
            update() {
                if (this.particles.length === 0) return false;
                
                let sumX = 0, sumY = 0;
                this.particles.forEach(p => {
                    sumX += p.x;
                    sumY += p.y;
                });
                this.x = sumX / this.particles.length;
                this.y = sumY / this.particles.length;
                
                this.type = this.determineType(this.y);
                
                return true;
            }
            
            draw() {
                if (this.particles.length < 3) return;
                
                const radius = Math.sqrt(this.particles.length) * 10;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius);
                
                if (this.type === 'cirrus') {
                    gradient.addColorStop(0, 'rgba(220, 240, 255, 0.2)');
                    gradient.addColorStop(1, 'transparent');
                } else if (this.type === 'cumulus') {
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                    gradient.addColorStop(0.5, 'rgba(240, 245, 255, 0.15)');
                    gradient.addColorStop(1, 'transparent');
                } else {
                    gradient.addColorStop(0, 'rgba(200, 210, 220, 0.25)');
                    gradient.addColorStop(1, 'transparent');
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - radius, this.y - radius, radius * 2, radius * 2);
            }
        }
        
        function initParticles() {
            particles.length = 0;
            const count = Math.floor((W * H) / 3000);
            for (let i = 0; i < count; i++) {
                particles.push(new VaporParticle());
            }
        }
        
        resize(); window.onresize = resize;
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a1525');
            gradient.addColorStop(0.3, '#1a3050');
            gradient.addColorStop(0.7, '#3a5070');
            gradient.addColorStop(1, '#7090a0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = 'rgba(255, 200, 100, 0.8)';
            ctx.beginPath();
            ctx.arc(W * 0.85, H - 50, 30, 0, Math.PI, true);
            ctx.fill();
            
            const sunGlow = ctx.createRadialGradient(W * 0.85, H, 0, W * 0.85, H, 150);
            sunGlow.addColorStop(0, 'rgba(255, 180, 100, 0.3)');
            sunGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGlow;
            ctx.fillRect(W * 0.6, H - 150, W * 0.5, 150);
        }
        
        function drawTemperatureGuide() {
            ctx.globalAlpha = 0.3;
            for (let y = 0; y < H; y += 50) {
                const temp = getTemperatureAt(y);
                const dewPoint = getDewPointAt(y);
                
                if (temp < dewPoint) {
                    ctx.fillStyle = 'rgba(200, 220, 255, 0.1)';
                    ctx.fillRect(0, y, W, 50);
                }
            }
            ctx.globalAlpha = 1;
        }
        
        function drawSeeds() {
            seeds.forEach(seed => {
                seed.life -= 0.005;
                
                ctx.beginPath();
                ctx.arc(seed.x, seed.y, 5 * seed.life, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(200, 255, 255, " + seed.life + ")";
                ctx.fill();
            });
            
            for (let i = seeds.length - 1; i >= 0; i--) {
                if (seeds[i].life <= 0) seeds.splice(i, 1);
            }
        }
        
        function updateStats() {
            document.getElementById('particle-count').textContent = particles.length;
            document.getElementById('cloud-count').textContent = clouds.filter(c => c.particles.length > 2).length;
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            drawTemperatureGuide();
            
            for (let i = clouds.length - 1; i >= 0; i--) {
                if (!clouds[i].update()) {
                    clouds.splice(i, 1);
                } else {
                    clouds[i].draw();
                }
            }
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            drawSeeds();
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 250) return;
            
            if (seedMode) {
                seeds.push({ x: e.clientX, y: e.clientY, life: 1 });
                
                for (let i = 0; i < 10; i++) {
                    particles.push(new VaporParticle(
                        e.clientX + (Math.random() - 0.5) * 50,
                        e.clientY + (Math.random() - 0.5) * 50
                    ));
                }
            }
        };
        
        document.getElementById('humid').oninput = e => {
            humidity = e.target.value / 100;
            document.getElementById('humid-val').textContent = e.target.value;
        };
        
        document.getElementById('wind').oninput = e => {
            windSpeed = e.target.value / 100;
            document.getElementById('wind-val').textContent = e.target.value;
        };
        
        document.getElementById('seed-btn').onclick = () => {
            seedMode = !seedMode;
            document.getElementById('seed-btn').textContent = seedMode ? 
                'Seeding... (click to stop)' : 'Seed Cloud (click sky)';
        };
        
        document.getElementById('clear-btn').onclick = () => {
            particles.forEach(p => {
                p.condensed = false;
                p.cloud = null;
            });
            clouds.length = 0;
            seeds.length = 0;
        };
        
        seedMode = true;
        animate();
    </script>
</body>
</html>
