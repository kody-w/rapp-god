    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Neural Weave</h3>
        <div class="control-row">
            <label>Pulse Speed <span class="value" id="pulse-val">50</span></label>
            <input type="range" id="pulse" min="20" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Decay Rate <span class="value" id="decay-val">30</span></label>
            <input type="range" id="decay" min="10" max="80" value="30">
        </div>
        <button id="fire-btn">Fire All Neurons</button>
        <button id="clear-btn">Reset Network</button>
    </div>
    <div id="stats">
        <div>Neurons: <span id="neuron-count">0</span></div>
        <div>Connections: <span id="conn-count">0</span></div>
        <div>Strongest: <span id="strongest">0</span></div>
    </div>
    <div id="info">Click to create neurons | Drag between neurons to connect | Repeat to strengthen</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let pulseSpeed = 0.5;
        let decayRate = 0.3;
        let time = 0;
        
        const neurons = [];
        const connections = [];
        const pulses = [];
        
        let isDragging = false;
        let dragStart = null;
        let dragEnd = null;
        
        class Neuron {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.charge = 0;
                this.hue = 260 + Math.random() * 40;
                this.id = neurons.length;
                this.connections = [];
            }
            
            fire() {
                this.charge = 1;
                
                this.connections.forEach(conn => {
                    const targetId = conn.from === this.id ? conn.to : conn.from;
                    const target = neurons[targetId];
                    
                    pulses.push({
                        x: this.x,
                        y: this.y,
                        targetX: target.x,
                        targetY: target.y,
                        progress: 0,
                        strength: conn.strength,
                        hue: this.hue
                    });
                });
            }
            
            update() {
                if (this.charge > 0) {
                    this.charge -= 0.02;
                }
            }
            
            draw() {
                const pulse = 1 + this.charge * 0.3;
                const glow = this.charge * 0.5;
                
                if (glow > 0.1) {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
                    gradient.addColorStop(0, "hsla(" + this.hue + ", 70%, 60%, " + glow + ")");
                    gradient.addColorStop(1, "transparent");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(this.x - this.radius * 3, this.y - this.radius * 3, this.radius * 6, this.radius * 6);
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 60%, " + (40 + this.charge * 30) + "%, 0.9)";
                ctx.fill();
                ctx.strokeStyle = "hsla(" + this.hue + ", 70%, 70%, 0.8)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            containsPoint(x, y) {
                return Math.hypot(x - this.x, y - this.y) < this.radius * 2;
            }
        }
        
        function findConnection(a, b) {
            return connections.find(c => 
                (c.from === a && c.to === b) || (c.from === b && c.to === a)
            );
        }
        
        function createConnection(a, b) {
            const existing = findConnection(a, b);
            if (existing) {
                existing.strength = Math.min(1, existing.strength + 0.15);
                existing.lastReinforced = time;
                
                for (let i = 0; i < 5; i++) {
                    const t = Math.random();
                    pulses.push({
                        x: neurons[a].x + (neurons[b].x - neurons[a].x) * t,
                        y: neurons[a].y + (neurons[b].y - neurons[a].y) * t,
                        targetX: neurons[a].x + (neurons[b].x - neurons[a].x) * t,
                        targetY: neurons[a].y + (neurons[b].y - neurons[a].y) * t,
                        progress: 1,
                        strength: existing.strength,
                        hue: (neurons[a].hue + neurons[b].hue) / 2,
                        isSparkle: true
                    });
                }
            } else {
                const conn = { from: a, to: b, strength: 0.2, lastReinforced: time };
                connections.push(conn);
                neurons[a].connections.push(conn);
                neurons[b].connections.push(conn);
            }
        }
        
        function drawConnections() {
            connections.forEach(conn => {
                const a = neurons[conn.from];
                const b = neurons[conn.to];
                
                const age = time - conn.lastReinforced;
                const decay = Math.max(0, conn.strength - age * decayRate * 0.0001);
                
                if (decay < 0.05) return;
                
                const pulse = Math.sin(time * pulseSpeed * 2) * 0.2 + 0.8;
                
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                
                const midX = (a.x + b.x) / 2;
                const midY = (a.y + b.y) / 2;
                const offset = Math.sin(time + conn.from) * 10 * decay;
                
                ctx.quadraticCurveTo(midX + offset, midY + offset, b.x, b.y);
                
                const hue = (a.hue + b.hue) / 2;
                ctx.strokeStyle = "hsla(" + hue + ", 60%, " + (40 + decay * 30) + "%, " + (decay * pulse) + ")";
                ctx.lineWidth = 1 + decay * 4;
                ctx.stroke();
            });
        }
        
        function drawPulses() {
            for (let i = pulses.length - 1; i >= 0; i--) {
                const p = pulses[i];
                
                if (p.isSparkle) {
                    p.progress -= 0.05;
                    if (p.progress <= 0) {
                        pulses.splice(i, 1);
                        continue;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4 * p.progress, 0, Math.PI * 2);
                    ctx.fillStyle = "hsla(" + p.hue + ", 80%, 80%, " + p.progress + ")";
                    ctx.fill();
                    continue;
                }
                
                p.progress += 0.03 * pulseSpeed;
                
                if (p.progress >= 1) {
                    const targetNeuron = neurons.find(n => 
                        Math.hypot(n.x - p.targetX, n.y - p.targetY) < 5
                    );
                    if (targetNeuron && Math.random() < p.strength * 0.5) {
                        targetNeuron.fire();
                    }
                    pulses.splice(i, 1);
                    continue;
                }
                
                const x = p.x + (p.targetX - p.x) * p.progress;
                const y = p.y + (p.targetY - p.y) * p.progress;
                
                ctx.beginPath();
                ctx.arc(x, y, 4 + p.strength * 4, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + p.hue + ", 80%, 70%, " + (1 - p.progress) + ")";
                ctx.fill();
            }
        }
        
        function drawDragLine() {
            if (!isDragging || !dragStart) return;
            
            ctx.beginPath();
            ctx.moveTo(dragStart.x, dragStart.y);
            ctx.lineTo(dragEnd.x, dragEnd.y);
            ctx.strokeStyle = 'rgba(180, 150, 220, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawBackground() {
            ctx.fillStyle = '#080810';
            ctx.fillRect(0, 0, W, H);
        }
        
        function updateStats() {
            document.getElementById('neuron-count').textContent = neurons.length;
            document.getElementById('conn-count').textContent = connections.length;
            
            let strongest = 0;
            connections.forEach(c => {
                if (c.strength > strongest) strongest = c.strength;
            });
            document.getElementById('strongest').textContent = (strongest * 100).toFixed(0) + '%';
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            drawConnections();
            neurons.forEach(n => n.update());
            neurons.forEach(n => n.draw());
            drawPulses();
            drawDragLine();
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onmousedown = e => {
            if (e.clientX < 200 && e.clientY < 250) return;
            
            const clickedNeuron = neurons.find(n => n.containsPoint(e.clientX, e.clientY));
            
            if (clickedNeuron) {
                isDragging = true;
                dragStart = { x: clickedNeuron.x, y: clickedNeuron.y, neuron: clickedNeuron };
                dragEnd = { x: e.clientX, y: e.clientY };
            } else {
                neurons.push(new Neuron(e.clientX, e.clientY));
            }
        };
        
        canvas.onmousemove = e => {
            if (isDragging) {
                dragEnd = { x: e.clientX, y: e.clientY };
            }
        };
        
        canvas.onmouseup = e => {
            if (isDragging && dragStart) {
                const endNeuron = neurons.find(n => n.containsPoint(e.clientX, e.clientY));
                
                if (endNeuron && endNeuron !== dragStart.neuron) {
                    createConnection(dragStart.neuron.id, endNeuron.id);
                    dragStart.neuron.fire();
                }
            }
            
            isDragging = false;
            dragStart = null;
        };
        
        document.getElementById('pulse').oninput = e => {
            pulseSpeed = e.target.value / 100;
            document.getElementById('pulse-val').textContent = e.target.value;
        };
        
        document.getElementById('decay').oninput = e => {
            decayRate = e.target.value / 100;
            document.getElementById('decay-val').textContent = e.target.value;
        };
        
        document.getElementById('fire-btn').onclick = () => {
            neurons.forEach(n => n.fire());
        };
        
        document.getElementById('clear-btn').onclick = () => {
            neurons.length = 0;
            connections.length = 0;
            pulses.length = 0;
        };
        
        animate();
    </script>
</body>
</html>
