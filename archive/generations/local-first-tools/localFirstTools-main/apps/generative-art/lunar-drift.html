    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Lunar Drift</h3>
        <div class="control-row">
            <label>Moth Count <span class="value" id="moth-val">40</span></label>
            <input type="range" id="moth" min="10" max="80" value="40">
        </div>
        <div class="control-row">
            <label>Trail Length <span class="value" id="trail-val">50</span></label>
            <input type="range" id="trail" min="10" max="100" value="50">
        </div>
        <button id="lamp-btn">Place Lamp (click canvas)</button>
        <button id="clear-btn">Clear Lamps</button>
    </div>
    <div id="stats">
        <div>Moths: <span id="moth-count">0</span></div>
        <div>Lamps: <span id="lamp-count">0</span></div>
    </div>
    <div id="info">Drag the moon | Click to place streetlamps | Watch moths spiral in confusion</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let mothCount = 40;
        let trailLength = 50;
        let time = 0;
        let placingLamp = false;
        
        let moon = { x: W * 0.7, y: H * 0.3, radius: 40 };
        const lamps = [];
        const moths = [];
        
        class Moth {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 1.5 + Math.random() * 1;
                this.size = 3 + Math.random() * 2;
                this.targetAngle = 0;
                this.trail = [];
                this.hue = 40 + Math.random() * 20;
                this.wingPhase = Math.random() * Math.PI * 2;
            }
            
            findStrongestLight() {
                let strongest = { x: moon.x, y: moon.y, strength: 1 };
                let maxStrength = 1 / (Math.hypot(this.x - moon.x, this.y - moon.y) + 50);
                
                lamps.forEach(lamp => {
                    const dist = Math.hypot(this.x - lamp.x, this.y - lamp.y);
                    const strength = lamp.brightness / (dist + 30);
                    if (strength > maxStrength) {
                        maxStrength = strength;
                        strongest = { x: lamp.x, y: lamp.y, strength: lamp.brightness };
                    }
                });
                
                return strongest;
            }
            
            update() {
                this.wingPhase += 0.3;
                
                const target = this.findStrongestLight();
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.hypot(dx, dy);
                
                const directAngle = Math.atan2(dy, dx);
                const offset = Math.PI / 4 + (target.strength > 0.5 ? 0.2 : 0);
                this.targetAngle = directAngle + offset;
                
                let angleDiff = this.targetAngle - this.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                
                this.angle += angleDiff * 0.1;
                
                const speedMod = dist < 100 ? 1.5 : 1;
                this.x += Math.cos(this.angle) * this.speed * speedMod;
                this.y += Math.sin(this.angle) * this.speed * speedMod;
                
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > trailLength) this.trail.shift();
                
                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < 0) this.y = H;
                if (this.y > H) this.y = 0;
            }
            
            draw() {
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    const gradient = ctx.createLinearGradient(
                        this.trail[0].x, this.trail[0].y,
                        this.x, this.y
                    );
                    gradient.addColorStop(0, 'transparent');
                    gradient.addColorStop(1, "hsla(" + this.hue + ", 50%, 60%, 0.3)");
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                const wingSpread = Math.sin(this.wingPhase) * 0.5 + 0.5;
                
                ctx.beginPath();
                ctx.ellipse(-this.size * 0.5, -this.size * wingSpread, this.size, this.size * 0.5, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 40%, 50%, 0.7)";
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(-this.size * 0.5, this.size * wingSpread, this.size, this.size * 0.5, 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size * 0.8, this.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 30%, 40%, 0.9)";
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class Lamp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.brightness = 0.8;
                this.flicker = Math.random() * Math.PI * 2;
            }
            
            draw() {
                this.flicker += 0.1;
                const flick = 1 + Math.sin(this.flicker) * 0.05;
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 80);
                gradient.addColorStop(0, "rgba(255, 200, 100, " + (0.4 * flick) + ")");
                gradient.addColorStop(0.3, "rgba(255, 180, 80, " + (0.2 * flick) + ")");
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - 80, this.y - 80, 160, 160);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 220, 150, " + (0.9 * flick) + ")";
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 8);
                ctx.lineTo(this.x, this.y + 40);
                ctx.strokeStyle = 'rgba(80, 60, 40, 0.8)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }
        
        function initMoths() {
            moths.length = 0;
            for (let i = 0; i < mothCount; i++) {
                moths.push(new Moth());
            }
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a0a18');
            gradient.addColorStop(1, '#151525');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < 100; i++) {
                const x = (i * 137 + time * 0.01) % W;
                const y = (i * 89) % H;
                const twinkle = Math.sin(time * 2 + i) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(x, y, 0.5 + twinkle * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(200, 220, 255, " + (twinkle * 0.5) + ")";
                ctx.fill();
            }
        }
        
        function drawMoon() {
            const gradient = ctx.createRadialGradient(moon.x, moon.y, 0, moon.x, moon.y, moon.radius * 3);
            gradient.addColorStop(0, 'rgba(255, 255, 220, 0.3)');
            gradient.addColorStop(0.3, 'rgba(200, 220, 255, 0.1)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(moon.x - moon.radius * 3, moon.y - moon.radius * 3, moon.radius * 6, moon.radius * 6);
            
            ctx.beginPath();
            ctx.arc(moon.x, moon.y, moon.radius, 0, Math.PI * 2);
            const moonGrad = ctx.createRadialGradient(
                moon.x - moon.radius * 0.3, moon.y - moon.radius * 0.3, 0,
                moon.x, moon.y, moon.radius
            );
            moonGrad.addColorStop(0, '#fffff0');
            moonGrad.addColorStop(0.8, '#e8e8d8');
            moonGrad.addColorStop(1, '#c0c0b0');
            ctx.fillStyle = moonGrad;
            ctx.fill();
            
            for (let i = 0; i < 5; i++) {
                const cx = moon.x + (Math.sin(i * 1.5) * moon.radius * 0.5);
                const cy = moon.y + (Math.cos(i * 2) * moon.radius * 0.4);
                ctx.beginPath();
                ctx.arc(cx, cy, 3 + i * 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180, 180, 170, 0.3)';
                ctx.fill();
            }
        }
        
        function updateStats() {
            document.getElementById('moth-count').textContent = moths.length;
            document.getElementById('lamp-count').textContent = lamps.length;
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            drawMoon();
            lamps.forEach(l => l.draw());
            
            while (moths.length < mothCount) {
                moths.push(new Moth());
            }
            while (moths.length > mothCount) {
                moths.pop();
            }
            
            moths.forEach(m => {
                m.update();
                m.draw();
            });
            
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        let isDraggingMoon = false;
        
        canvas.onmousedown = e => {
            if (e.clientX < 200 && e.clientY < 250) return;
            
            const dist = Math.hypot(e.clientX - moon.x, e.clientY - moon.y);
            if (dist < moon.radius * 1.5) {
                isDraggingMoon = true;
                canvas.style.cursor = 'grabbing';
            } else if (placingLamp) {
                lamps.push(new Lamp(e.clientX, e.clientY));
            }
        };
        
        canvas.onmousemove = e => {
            if (isDraggingMoon) {
                moon.x = e.clientX;
                moon.y = e.clientY;
            }
        };
        
        canvas.onmouseup = () => {
            isDraggingMoon = false;
            canvas.style.cursor = 'grab';
        };
        
        document.getElementById('moth').oninput = e => {
            mothCount = parseInt(e.target.value);
            document.getElementById('moth-val').textContent = e.target.value;
        };
        
        document.getElementById('trail').oninput = e => {
            trailLength = parseInt(e.target.value);
            document.getElementById('trail-val').textContent = e.target.value;
        };
        
        document.getElementById('lamp-btn').onclick = () => {
            placingLamp = !placingLamp;
            document.getElementById('lamp-btn').textContent = placingLamp ? 
                'Placing Lamps... (click again to stop)' : 'Place Lamp (click canvas)';
        };
        
        document.getElementById('clear-btn').onclick = () => {
            lamps.length = 0;
        };
        
        initMoths();
        animate();
    </script>
</body>
</html>
