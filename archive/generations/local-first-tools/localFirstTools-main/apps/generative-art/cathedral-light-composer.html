    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">

        <div class="control-row">
            <label>Glass Color</label>

                <span class="color-btn active" style="background:#c41e3a" data-color="#c41e3a"></span>

                <span class="color-btn" style="background:#228b22" data-color="#228b22"></span>

            </div>
        </div>
        <button id="clear-btn">Clear Window</button>

        <div id="time-text" style="font-size:18px;color:#ffd080">Noon</div>
        <div style="font-size:11px;opacity:0.7">Light Angle</div>

    <div id="info">Click to place glass tiles | Watch light rays pass through</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let sunPosition = 0.5;
        let lightIntensity = 0.7;
        let currentColor = '#c41e3a';
        let tiles = [];
        let rays = [];
        
        class GlassTile {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.shape = Math.floor(Math.random() * 3);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.beginPath();
                if (this.shape === 0) {
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                } else if (this.shape === 1) {
                    const s = this.size / 2;
                    ctx.moveTo(0, -s);
                    ctx.lineTo(s, 0);
                    ctx.lineTo(0, s);
                    ctx.lineTo(-s, 0);
                    ctx.closePath();
                } else {
                    ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                }
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.7, this.color);
                gradient.addColorStop(1, darkenColor(this.color, 0.5));
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = '#2a2520';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(-this.size * 0.2, -this.size * 0.2, this.size * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function darkenColor(hex, factor) {
            const r = Math.floor(parseInt(hex.slice(1,3), 16) * factor);
            const g = Math.floor(parseInt(hex.slice(3,5), 16) * factor);
            const b = Math.floor(parseInt(hex.slice(5,7), 16) * factor);
            return "#" + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
        }
        
        function hexToRgb(hex) {
            return {
                r: parseInt(hex.slice(1,3), 16),
                g: parseInt(hex.slice(3,5), 16),
                b: parseInt(hex.slice(5,7), 16)
            };
        }
        
        function drawWindow() {
            const cx = W / 2;
            const cy = H / 2;
            const windowW = Math.min(W * 0.6, 500);
            const windowH = Math.min(H * 0.8, 700);
            
            ctx.fillStyle = '#0a0805';
            ctx.fillRect(cx - windowW/2 - 30, cy - windowH/2 - 30, windowW + 60, windowH + 60);
            
            ctx.fillStyle = '#1a1510';
            ctx.fillRect(cx - windowW/2, cy - windowH/2, windowW, windowH);
            
            ctx.strokeStyle = '#3a3530';
            ctx.lineWidth = 20;
            ctx.strokeRect(cx - windowW/2, cy - windowH/2, windowW, windowH);
            
            ctx.beginPath();
            ctx.moveTo(cx - windowW/2, cy - windowH/4);
            ctx.lineTo(cx + windowW/2, cy - windowH/4);
            ctx.moveTo(cx - windowW/2, cy + windowH/4);
            ctx.lineTo(cx + windowW/2, cy + windowH/4);
            ctx.moveTo(cx, cy - windowH/2);
            ctx.lineTo(cx, cy + windowH/2);
            ctx.strokeStyle = '#2a2520';
            ctx.lineWidth = 8;
            ctx.stroke();
        }
        
        function drawLightRays() {
            const sunAngle = (sunPosition - 0.5) * Math.PI * 0.8;
            const sunX = W / 2 + Math.sin(sunAngle) * 500;
            const sunY = -100;
            
            tiles.forEach(tile => {
                const dx = tile.x - sunX;
                const dy = tile.y - sunY;
                const angle = Math.atan2(dy, dx);
                const length = 400 * lightIntensity;
                
                const c = hexToRgb(tile.color);
                
                for (let i = 0; i < 3; i++) {
                    const spread = (i - 1) * 0.1;
                    const endX = tile.x + Math.cos(angle + spread) * length;
                    const endY = tile.y + Math.sin(angle + spread) * length;
                    
                    const gradient = ctx.createLinearGradient(tile.x, tile.y, endX, endY);
                    gradient.addColorStop(0, "rgba(" + c.r + "," + c.g + "," + c.b + "," + (0.4 * lightIntensity) + ")");
                    gradient.addColorStop(0.3, "rgba(" + c.r + "," + c.g + "," + c.b + "," + (0.2 * lightIntensity) + ")");
                    gradient.addColorStop(1, "transparent");
                    
                    ctx.beginPath();
                    ctx.moveTo(tile.x, tile.y);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = tile.size * 0.8;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
            });
        }
        
        function drawFloorLight() {
            tiles.forEach(tile => {
                const floorY = H - 50;
                const spread = (tile.y / H) * 100 + 50;
                const c = hexToRgb(tile.color);
                
                ctx.beginPath();
                ctx.ellipse(tile.x + (sunPosition - 0.5) * 100, floorY, spread, 20, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(" + c.r + "," + c.g + "," + c.b + "," + (0.15 * lightIntensity) + ")";
                ctx.fill();
            });
        }
        
        function animate() {
            ctx.fillStyle = '#0a0805';
            ctx.fillRect(0, 0, W, H);
            
            const floorGrad = ctx.createLinearGradient(0, H - 150, 0, H);
            floorGrad.addColorStop(0, '#1a1510');
            floorGrad.addColorStop(1, '#252015');
            ctx.fillStyle = floorGrad;
            ctx.fillRect(0, H - 150, W, 150);
            
            drawWindow();
            drawLightRays();
            tiles.forEach(t => t.draw());
            drawFloorLight();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            const cx = W / 2;
            const cy = H / 2;
            const windowW = Math.min(W * 0.6, 500);
            const windowH = Math.min(H * 0.8, 700);
            
            if (e.clientX > cx - windowW/2 && e.clientX < cx + windowW/2 &&
                e.clientY > cy - windowH/2 && e.clientY < cy + windowH/2) {
                tiles.push(new GlassTile(e.clientX, e.clientY, 40 + Math.random() * 30, currentColor));
            }
        };
        
        document.getElementById('sun').oninput = e => {
            sunPosition = e.target.value / 100;
            const hour = 6 + sunPosition * 12;
            const h = Math.floor(hour);
            const m = Math.floor((hour % 1) * 60);
            document.getElementById('sun-val').textContent = h + ':' + m.toString().padStart(2,'0');
            const times = ['Dawn', 'Morning', 'Noon', 'Afternoon', 'Dusk'];
            document.getElementById('time-text').textContent = times[Math.floor(sunPosition * 4.99)];
        };
        
        document.getElementById('intensity').oninput = e => {
            lightIntensity = e.target.value / 100;
            document.getElementById('intensity-val').textContent = e.target.value + '%';
        };
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            };
        });
        
        document.getElementById('clear-btn').onclick = () => tiles = [];
        
        document.getElementById('rose-btn').onclick = () => {
            tiles = [];
            const cx = W / 2;
            const cy = H / 2;
            const colors = ['#c41e3a', '#1e90ff', '#ffd700', '#228b22', '#9932cc'];
            
            for (let ring = 0; ring < 3; ring++) {
                const r = 80 + ring * 60;
                const count = 6 + ring * 4;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    tiles.push(new GlassTile(
                        cx + Math.cos(angle) * r,
                        cy + Math.sin(angle) * r,
                        40 - ring * 5,
                        colors[(i + ring) % colors.length]
                    ));
                }
            }
            tiles.push(new GlassTile(cx, cy, 50, '#ffd700'));
        };
        
        document.getElementById('gothic-btn').onclick = () => {
            tiles = [];
            const cx = W / 2;
            const cy = H / 2;
            const colors = ['#c41e3a', '#1e90ff', '#ffd700'];
            
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 4; col++) {
                    tiles.push(new GlassTile(
                        cx - 90 + col * 60,
                        cy - 150 + row * 75,
                        35,
                        colors[(row + col) % colors.length]
                    ));
                }
            }
        };
        
        animate();
    </script>
</body>
</html>
