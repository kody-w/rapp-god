    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Umbral Genesis</h3>
        <div class="control-row">
            <label>Light Height <span class="value" id="height-val">50</span></label>
            <input type="range" id="height" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Object Glow <span class="value" id="glow-val">70</span></label>
            <input type="range" id="glow" min="20" max="100" value="70">
        </div>
        <button id="invert-btn">Invert Reality</button>
        <button id="clear-btn">Dissolve All</button>
    </div>
    <div id="info">Draw shadows | They will generate their light sources above</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let lightHeight = 0.5;
        let objectGlow = 0.7;
        let inverted = false;
        let time = 0;
        
        const shadows = [];
        const lightObjects = [];
        const particles = [];
        
        let isDrawing = false;
        let currentPath = [];
        
        let lightSourceX = W / 2;
        let lightSourceY = 100;
        
        class Shadow {
            constructor(path) {
                this.path = path;
                this.center = this.calculateCenter();
                this.age = 0;
                this.lightObject = null;
                
                this.generateLightObject();
            }
            
            calculateCenter() {
                let cx = 0, cy = 0;
                this.path.forEach(p => { cx += p.x; cy += p.y; });
                return { x: cx / this.path.length, y: cy / this.path.length };
            }
            
            generateLightObject() {
                const objectPath = this.path.map(point => {
                    const dx = point.x - lightSourceX;
                    const dy = point.y - lightSourceY;
                    const dist = Math.hypot(dx, dy);
                    
                    const heightFactor = lightHeight * 200;
                    const projectionFactor = heightFactor / (dist + 100);
                    
                    return {
                        x: lightSourceX + dx * projectionFactor * 0.5,
                        y: lightSourceY + dy * projectionFactor * 0.3,
                        z: heightFactor * 0.5
                    };
                });
                
                this.lightObject = {
                    path: objectPath,
                    hue: 40 + Math.random() * 40,
                    pulse: Math.random() * Math.PI * 2,
                    center: {
                        x: objectPath.reduce((s, p) => s + p.x, 0) / objectPath.length,
                        y: objectPath.reduce((s, p) => s + p.y, 0) / objectPath.length
                    }
                };
            }
            
            update() {
                this.age += 0.016;
                
                if (this.lightObject) {
                    this.lightObject.pulse += 0.05;
                }
            }
            
            drawShadow() {
                if (this.path.length < 3) return;
                
                ctx.beginPath();
                ctx.moveTo(this.path[0].x, this.path[0].y);
                for (let i = 1; i < this.path.length; i++) {
                    ctx.lineTo(this.path[i].x, this.path[i].y);
                }
                ctx.closePath();
                
                const alpha = inverted ? 0.1 : 0.6;
                ctx.fillStyle = "rgba(0, 0, 0, " + alpha + ")";
                ctx.fill();
                
                ctx.strokeStyle = "rgba(30, 30, 30, 0.8)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            drawLightObject() {
                if (!this.lightObject || this.lightObject.path.length < 3) return;
                
                const pulse = 1 + Math.sin(this.lightObject.pulse) * 0.1;
                const path = this.lightObject.path;
                const center = this.lightObject.center;
                
                ctx.beginPath();
                ctx.arc(center.x, center.y, 50 * objectGlow * pulse, 0, Math.PI * 2);
                const glowGrad = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, 50 * objectGlow);
                glowGrad.addColorStop(0, "hsla(" + this.lightObject.hue + ", 80%, 70%, 0.3)");
                glowGrad.addColorStop(1, "transparent");
                ctx.fillStyle = glowGrad;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i].x, path[i].y);
                }
                ctx.closePath();
                
                const fillAlpha = inverted ? 0.9 : 0.4;
                ctx.fillStyle = "hsla(" + this.lightObject.hue + ", 70%, 60%, " + fillAlpha + ")";
                ctx.fill();
                
                ctx.strokeStyle = "hsla(" + this.lightObject.hue + ", 90%, 80%, 0.8)";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(this.center.x, this.center.y);
                ctx.strokeStyle = "rgba(100, 100, 100, 0.2)";
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            drawConnections() {
                if (!this.lightObject) return;
                
                for (let i = 0; i < this.path.length; i++) {
                    const shadowPoint = this.path[i];
                    const lightPoint = this.lightObject.path[i];
                    
                    if (i % 3 === 0) {
                        ctx.beginPath();
                        ctx.moveTo(shadowPoint.x, shadowPoint.y);
                        ctx.lineTo(lightPoint.x, lightPoint.y);
                        ctx.strokeStyle = "rgba(150, 130, 100, 0.1)";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function drawBackground() {
            if (inverted) {
                ctx.fillStyle = '#e0e0e0';
            } else {
                ctx.fillStyle = '#0a0a0a';
            }
            ctx.fillRect(0, 0, W, H);
            
            ctx.beginPath();
            ctx.arc(lightSourceX, lightSourceY, 15, 0, Math.PI * 2);
            ctx.fillStyle = inverted ? 'rgba(0, 0, 0, 0.8)' : 'rgba(255, 220, 150, 0.8)';
            ctx.fill();
            
            const sunGrad = ctx.createRadialGradient(lightSourceX, lightSourceY, 0, lightSourceX, lightSourceY, 80);
            sunGrad.addColorStop(0, inverted ? 'rgba(0, 0, 0, 0.3)' : 'rgba(255, 220, 150, 0.3)');
            sunGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGrad;
            ctx.fillRect(lightSourceX - 80, lightSourceY - 80, 160, 160);
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy -= 0.02;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(45, 80%, 70%, " + (p.life * 0.5) + ")";
                ctx.fill();
            }
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            
            shadows.forEach(s => {
                s.update();
                s.drawConnections();
            });
            
            shadows.forEach(s => s.drawShadow());
            shadows.forEach(s => s.drawLightObject());
            
            drawParticles();
            
            if (isDrawing && currentPath.length > 1) {
                ctx.beginPath();
                ctx.moveTo(currentPath[0].x, currentPath[0].y);
                currentPath.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.strokeStyle = 'rgba(100, 100, 100, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            requestAnimationFrame(animate);
        }
        
        canvas.onmousedown = e => {
            isDrawing = true;
            currentPath = [{ x: e.clientX, y: e.clientY }];
        };
        
        canvas.onmousemove = e => {
            lightSourceX = lightSourceX * 0.95 + e.clientX * 0.05;
            lightSourceY = lightSourceY * 0.95 + (e.clientY * 0.3) * 0.05;
            
            if (isDrawing) {
                const last = currentPath[currentPath.length - 1];
                if (Math.hypot(e.clientX - last.x, e.clientY - last.y) > 10) {
                    currentPath.push({ x: e.clientX, y: e.clientY });
                }
            }
            
            shadows.forEach(s => s.generateLightObject());
        };
        
        canvas.onmouseup = e => {
            if (currentPath.length > 5) {
                shadows.push(new Shadow(currentPath));
                
                for (let i = 0; i < 10; i++) {
                    const idx = Math.floor(Math.random() * currentPath.length);
                    particles.push({
                        x: currentPath[idx].x,
                        y: currentPath[idx].y,
                        vx: (Math.random() - 0.5) * 3,
                        vy: -Math.random() * 3,
                        size: 2 + Math.random() * 3,
                        life: 1
                    });
                }
            }
            isDrawing = false;
            currentPath = [];
        };
        
        document.getElementById('height').oninput = e => {
            lightHeight = e.target.value / 100;
            document.getElementById('height-val').textContent = e.target.value;
            shadows.forEach(s => s.generateLightObject());
        };
        
        document.getElementById('glow').oninput = e => {
            objectGlow = e.target.value / 100;
            document.getElementById('glow-val').textContent = e.target.value;
        };
        
        document.getElementById('invert-btn').onclick = () => {
            inverted = !inverted;
            document.getElementById('invert-btn').textContent = inverted ? 'Normal Reality' : 'Invert Reality';
        };
        
        document.getElementById('clear-btn').onclick = () => {
            shadows.forEach(s => {
                for (let i = 0; i < 20; i++) {
                    particles.push({
                        x: s.center.x + (Math.random() - 0.5) * 50,
                        y: s.center.y + (Math.random() - 0.5) * 50,
                        vx: (Math.random() - 0.5) * 5,
                        vy: -Math.random() * 5,
                        size: 3 + Math.random() * 4,
                        life: 1
                    });
                }
            });
            shadows.length = 0;
        };
        
        animate();
    </script>
</body>
