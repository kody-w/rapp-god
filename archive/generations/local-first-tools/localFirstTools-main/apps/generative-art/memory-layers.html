    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Memory Layers</h3>
        <div class="control-row">
            <label>Excavation Size <span class="value" id="size-val">30</span></label>
            <input type="range" id="size" min="15" max="60" value="30">
        </div>
        <div class="control-row">
            <label>Drip Rate <span class="value" id="drip-val">50</span></label>
            <input type="range" id="drip" min="0" max="100" value="50">
        </div>
        <button id="add-btn">Add Memory Layer</button>
        <button id="reset-btn">Reset Layers</button>
    </div>
    <div id="stats">
        <div>Layers: <span id="layer-count">0</span></div>
        <div>Revealed: <span id="revealed-pct">0</span>%</div>
        <div>Drips: <span id="drip-count">0</span></div>
    </div>
    <div id="info">Click and drag to excavate | Reveal memories frozen in wax</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; initLayers(); }
        resize(); window.onresize = resize;
        
        let excavationSize = 30;
        let dripRate = 0.5;
        let time = 0;
        let dripCount = 0;
        let isExcavating = false;
        
        const MEMORIES = [
            'summer of 1998', 'first bicycle', 'grandmothers kitchen', 'old photographs',
            'birthday candles', 'rainy afternoon', 'forgotten song', 'fading laughter',
            'childhood home', 'letters never sent', 'promises made', 'distant voices',
            'autumn leaves', 'midnight conversations', 'first heartbreak', 'healing wounds',
            'lost friends', 'found treasures', 'quiet moments', 'endless dreams'
        ];
        
        const layers = [];
        const drips = [];
        
        class WaxLayer {
            constructor(depth) {
                this.depth = depth;
                this.opacity = 0.15 + depth * 0.1;
                this.hue = 30 + depth * 5;
                this.waxGrid = [];
                this.memories = [];
                
                const cols = Math.ceil(W / 4);
                const rows = Math.ceil(H / 4);
                for (let y = 0; y < rows; y++) {
                    this.waxGrid[y] = [];
                    for (let x = 0; x < cols; x++) {
                        this.waxGrid[y][x] = 1;
                    }
                }
                
                const memoryCount = 3 + Math.floor(Math.random() * 4);
                for (let i = 0; i < memoryCount; i++) {
                    this.memories.push({
                        x: 200 + Math.random() * (W - 400),
                        y: 100 + Math.random() * (H - 200),
                        text: MEMORIES[Math.floor(Math.random() * MEMORIES.length)],
                        revealed: false
                    });
                }
            }
            
            excavate(x, y, radius) {
                const cols = Math.ceil(W / 4);
                const rows = Math.ceil(H / 4);
                const gx = Math.floor(x / 4);
                const gy = Math.floor(y / 4);
                const gridRadius = Math.ceil(radius / 4);
                
                for (let dy = -gridRadius; dy <= gridRadius; dy++) {
                    for (let dx = -gridRadius; dx <= gridRadius; dx++) {
                        const nx = gx + dx;
                        const ny = gy + dy;
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist <= gridRadius) {
                                const falloff = 1 - (dist / gridRadius);
                                this.waxGrid[ny][nx] = Math.max(0, this.waxGrid[ny][nx] - 0.1 * falloff);
                            }
                        }
                    }
                }
                
                this.memories.forEach(mem => {
                    const dist = Math.hypot(mem.x - x, mem.y - y);
                    if (dist < radius * 1.5) {
                        const mgx = Math.floor(mem.x / 4);
                        const mgy = Math.floor(mem.y / 4);
                        if (mgy >= 0 && mgy < rows && mgx >= 0 && mgx < cols) {
                            if (this.waxGrid[mgy][mgx] < 0.3) {
                                mem.revealed = true;
                            }
                        }
                    }
                });
            }
            
            addDrip(x, y) {
                const cols = Math.ceil(W / 4);
                const rows = Math.ceil(H / 4);
                const gx = Math.floor(x / 4);
                const gy = Math.floor(y / 4);
                
                if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
                    this.waxGrid[gy][gx] = Math.min(1, this.waxGrid[gy][gx] + 0.3);
                    
                    for (let d = 1; d <= 2; d++) {
                        for (let dx = -d; dx <= d; dx++) {
                            for (let dy = -d; dy <= d; dy++) {
                                const nx = gx + dx;
                                const ny = gy + dy;
                                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                                    this.waxGrid[ny][nx] = Math.min(1, this.waxGrid[ny][nx] + 0.1 / d);
                                }
                            }
                        }
                    }
                }
            }
            
            getRevealedPercent() {
                let total = 0;
                let excavated = 0;
                const rows = this.waxGrid.length;
                
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < this.waxGrid[y].length; x++) {
                        total++;
                        if (this.waxGrid[y][x] < 0.5) excavated++;
                    }
                }
                
                return Math.floor((excavated / total) * 100);
            }
            
            draw() {
                const rows = this.waxGrid.length;
                const cols = this.waxGrid[0] ? this.waxGrid[0].length : 0;
                
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const wax = this.waxGrid[y][x];
                        if (wax > 0.05) {
                            const px = x * 4;
                            const py = y * 4;
                            const alpha = wax * this.opacity;
                            ctx.fillStyle = "hsla(" + this.hue + ", 50%, " + (40 + this.depth * 5) + "%, " + alpha + ")";
                            ctx.fillRect(px, py, 4, 4);
                        }
                    }
                }
                
                this.memories.forEach(mem => {
                    if (mem.revealed) {
                        ctx.font = 'italic 14px Georgia';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = "hsla(" + (this.hue - 10) + ", 30%, 70%, 0.9)";
                        ctx.fillText(mem.text, mem.x, mem.y);
                        
                        const glow = ctx.createRadialGradient(mem.x, mem.y, 0, mem.x, mem.y, 40);
                        glow.addColorStop(0, "hsla(" + this.hue + ", 40%, 60%, 0.2)");
                        glow.addColorStop(1, "transparent");
                        ctx.fillStyle = glow;
                        ctx.fillRect(mem.x - 40, mem.y - 40, 80, 80);
                    }
                });
            }
        }
        
        class Drip {
            constructor(x) {
                this.x = x;
                this.y = 0;
                this.speed = 1 + Math.random() * 2;
                this.size = 3 + Math.random() * 4;
                this.hue = 35 + Math.random() * 15;
            }
            
            update() {
                this.y += this.speed;
                this.speed += 0.1;
                
                if (this.y > H) {
                    return true;
                }
                
                if (Math.random() < 0.02 && layers.length > 0) {
                    const targetLayer = layers[Math.floor(Math.random() * layers.length)];
                    targetLayer.addDrip(this.x, this.y);
                }
                
                return false;
            }
            
            draw() {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size * 0.6, this.size, 0, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + this.hue + ", 60%, 55%, 0.8)";
                ctx.fill();
            }
        }
        
        function initLayers() {
            layers.length = 0;
            for (let i = 0; i < 3; i++) {
                layers.push(new WaxLayer(i));
            }
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#1a1510');
            gradient.addColorStop(1, '#251a12');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function updateStats() {
            document.getElementById('layer-count').textContent = layers.length;
            
            let totalRevealed = 0;
            layers.forEach(l => totalRevealed += l.getRevealedPercent());
            const avgRevealed = layers.length > 0 ? Math.floor(totalRevealed / layers.length) : 0;
            document.getElementById('revealed-pct').textContent = avgRevealed;
            
            document.getElementById('drip-count').textContent = dripCount;
        }
        
        function animate() {
            time += 0.016;
            
            if (Math.random() < 0.02 * dripRate && dripRate > 0) {
                drips.push(new Drip(Math.random() * W));
                dripCount++;
            }
            
            drawBackground();
            
            for (let i = layers.length - 1; i >= 0; i--) {
                layers[i].draw();
            }
            
            for (let i = drips.length - 1; i >= 0; i--) {
                if (drips[i].update()) {
                    drips.splice(i, 1);
                } else {
                    drips[i].draw();
                }
            }
            
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onmousedown = e => {
            if (e.clientX < 200 && e.clientY < 320) return;
            isExcavating = true;
        };
        
        canvas.onmouseup = () => isExcavating = false;
        canvas.onmouseleave = () => isExcavating = false;
        
        canvas.onmousemove = e => {
            if (!isExcavating) return;
            if (e.clientX < 200 && e.clientY < 320) return;
            
            layers.forEach(layer => {
                layer.excavate(e.clientX, e.clientY, excavationSize);
            });
        };
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 320) return;
            
            layers.forEach(layer => {
                layer.excavate(e.clientX, e.clientY, excavationSize);
            });
        };
        
        document.getElementById('size').oninput = e => {
            excavationSize = parseInt(e.target.value);
            document.getElementById('size-val').textContent = e.target.value;
        };
        
        document.getElementById('drip').oninput = e => {
            dripRate = e.target.value / 100;
            document.getElementById('drip-val').textContent = e.target.value;
        };
        
        document.getElementById('add-btn').onclick = () => {
            layers.push(new WaxLayer(layers.length));
        };
        
        document.getElementById('reset-btn').onclick = () => {
            initLayers();
            drips.length = 0;
            dripCount = 0;
        };
        
        initLayers();
        animate();
    </script>
</body>
</html>
