    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Confluence</h3>
        <div class="control-row">
            <label>Dissolution Rate <span class="value" id="dissolve-val">50</span></label>
            <input type="range" id="dissolve" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Reformation Speed <span class="value" id="reform-val">40</span></label>
            <input type="range" id="reform" min="10" max="100" value="40">
        </div>
        <button id="merge-btn">Force Merger</button>
        <button id="scatter-btn">Scatter Apart</button>
        <button id="reset-btn">Reset Field</button>
    </div>
    <div id="region-count">Regions: 0</div>
    <div id="info">Click to dissolve boundaries | Drag to sculpt regions | Watch them reform</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let dissolutionRate = 0.5;
        let reformationSpeed = 0.4;
        let time = 0;
        
        const regions = [];
        const particles = [];
        
        class Region {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 40 + Math.random() * 60;
                this.targetRadius = this.radius;
                this.hue = Math.random() * 360;
                this.saturation = 40 + Math.random() * 30;
                this.lightness = 30 + Math.random() * 20;
                this.opacity = 0;
                this.breathPhase = Math.random() * Math.PI * 2;
                this.dissolving = false;
                this.mergeTarget = null;
            }
            
            update() {
                this.breathPhase += 0.02;
                const breath = 1 + Math.sin(this.breathPhase) * 0.05;
                
                if (this.opacity < 1 && !this.dissolving) {
                    this.opacity += 0.02;
                }
                
                if (this.dissolving) {
                    this.opacity -= 0.02 * dissolutionRate;
                    this.radius *= 0.99;
                    
                    if (this.mergeTarget) {
                        const dx = this.mergeTarget.x - this.x;
                        const dy = this.mergeTarget.y - this.y;
                        this.vx += dx * 0.001;
                        this.vy += dy * 0.001;
                    }
                }
                
                this.radius += (this.targetRadius * breath - this.radius) * 0.05;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                this.vx += (Math.random() - 0.5) * 0.02;
                this.vy += (Math.random() - 0.5) * 0.02;
                
                if (this.x < this.radius) this.vx += 0.1;
                if (this.x > W - this.radius) this.vx -= 0.1;
                if (this.y < this.radius) this.vy += 0.1;
                if (this.y > H - this.radius) this.vy -= 0.1;
                
                return this.opacity > 0 && this.radius > 5;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 1.5
                );
                
                const coreColor = "hsla(" + this.hue + ", " + this.saturation + "%, " + this.lightness + "%, " + (this.opacity * 0.8) + ")";
                const midColor = "hsla(" + this.hue + ", " + (this.saturation * 0.7) + "%, " + (this.lightness * 0.8) + "%, " + (this.opacity * 0.4) + ")";
                const edgeColor = "hsla(" + this.hue + ", " + (this.saturation * 0.5) + "%, " + (this.lightness * 0.5) + "%, 0)";
                
                gradient.addColorStop(0, coreColor);
                gradient.addColorStop(0.4, midColor);
                gradient.addColorStop(1, edgeColor);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            containsPoint(x, y) {
                return Math.hypot(x - this.x, y - this.y) < this.radius;
            }
            
            distanceTo(other) {
                return Math.hypot(other.x - this.x, other.y - this.y);
            }
        }
        
        function initRegions() {
            regions.length = 0;
            const count = 8 + Math.floor(Math.random() * 5);
            
            for (let i = 0; i < count; i++) {
                regions.push(new Region(
                    100 + Math.random() * (W - 200),
                    100 + Math.random() * (H - 200)
                ));
            }
        }
        
        function checkMergers() {
            for (let i = 0; i < regions.length; i++) {
                for (let j = i + 1; j < regions.length; j++) {
                    const a = regions[i];
                    const b = regions[j];
                    
                    if (a.dissolving || b.dissolving) continue;
                    
                    const dist = a.distanceTo(b);
                    const overlap = (a.radius + b.radius) - dist;
                    
                    if (overlap > a.radius * 0.5 || overlap > b.radius * 0.5) {
                        const smaller = a.radius < b.radius ? a : b;
                        const larger = a.radius < b.radius ? b : a;
                        
                        smaller.dissolving = true;
                        smaller.mergeTarget = larger;
                        
                        larger.targetRadius = Math.sqrt(
                            larger.radius * larger.radius + smaller.radius * smaller.radius
                        );
                        
                        larger.hue = (larger.hue + smaller.hue) / 2;
                        
                        for (let k = 0; k < 10; k++) {
                            particles.push({
                                x: smaller.x + (Math.random() - 0.5) * smaller.radius,
                                y: smaller.y + (Math.random() - 0.5) * smaller.radius,
                                vx: (Math.random() - 0.5) * 2,
                                vy: (Math.random() - 0.5) * 2,
                                size: 3 + Math.random() * 3,
                                hue: smaller.hue,
                                life: 1
                            });
                        }
                    }
                }
            }
        }
        
        function spawnNewRegion() {
            if (regions.length < 15 && Math.random() < 0.002 * reformationSpeed) {
                regions.push(new Region(
                    Math.random() * W,
                    Math.random() * H
                ));
            }
        }
        
        function drawBackground() {
            ctx.fillStyle = '#0a0810';
            ctx.fillRect(0, 0, W, H);
            
            const pressureGradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.6);
            pressureGradient.addColorStop(0, 'rgba(30, 20, 40, 0.2)');
            pressureGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = pressureGradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + p.hue + ", 60%, 60%, " + p.life + ")";
                ctx.fill();
            }
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            
            checkMergers();
            spawnNewRegion();
            
            for (let i = regions.length - 1; i >= 0; i--) {
                if (!regions[i].update()) {
                    regions.splice(i, 1);
                }
            }
            
            regions.forEach(r => r.draw());
            drawParticles();
            
            document.getElementById('region-count').textContent = 'Regions: ' + regions.length;
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 280) return;
            
            let clickedRegion = null;
            regions.forEach(r => {
                if (r.containsPoint(e.clientX, e.clientY)) {
                    clickedRegion = r;
                }
            });
            
            if (clickedRegion) {
                clickedRegion.dissolving = true;
                
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: clickedRegion.x + (Math.random() - 0.5) * clickedRegion.radius * 2,
                        y: clickedRegion.y + (Math.random() - 0.5) * clickedRegion.radius * 2,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        size: 4 + Math.random() * 4,
                        hue: clickedRegion.hue,
                        life: 1
                    });
                }
            } else {
                regions.push(new Region(e.clientX, e.clientY));
            }
        };
        
        let isDragging = false;
        let dragX = 0, dragY = 0;
        
        canvas.onmousedown = e => {
            if (e.clientX < 200 && e.clientY < 280) return;
            isDragging = true;
            dragX = e.clientX;
            dragY = e.clientY;
        };
        
        canvas.onmousemove = e => {
            if (!isDragging) return;
            
            const dx = e.clientX - dragX;
            const dy = e.clientY - dragY;
            
            regions.forEach(r => {
                const dist = Math.hypot(e.clientX - r.x, e.clientY - r.y);
                if (dist < r.radius * 2) {
                    const force = 1 - dist / (r.radius * 2);
                    r.vx += dx * 0.05 * force;
                    r.vy += dy * 0.05 * force;
                }
            });
            
            dragX = e.clientX;
            dragY = e.clientY;
        };
        
        canvas.onmouseup = () => { isDragging = false; };
        
        document.getElementById('dissolve').oninput = e => {
            dissolutionRate = e.target.value / 100;
            document.getElementById('dissolve-val').textContent = e.target.value;
        };
        
        document.getElementById('reform').oninput = e => {
            reformationSpeed = e.target.value / 100;
            document.getElementById('reform-val').textContent = e.target.value;
        };
        
        document.getElementById('merge-btn').onclick = () => {
            regions.forEach(r => {
                r.vx += (W/2 - r.x) * 0.01;
                r.vy += (H/2 - r.y) * 0.01;
            });
        };
        
        document.getElementById('scatter-btn').onclick = () => {
            regions.forEach(r => {
                r.vx += (r.x - W/2) * 0.02;
                r.vy += (r.y - H/2) * 0.02;
            });
        };
        
        document.getElementById('reset-btn').onclick = () => {
            initRegions();
            particles.length = 0;
        };
        
        initRegions();
        animate();
    </script>
</body>
</html>
