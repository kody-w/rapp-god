      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;

      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Lava Blobs</h3>
        <div class="control-row">
            <label>Heat <span class="value" id="heat-val">50</span></label>
            <input type="range" id="heat" min="20" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Blob Hue <span class="value" id="hue-val">320</span></label>
            <input type="range" id="hue" min="0" max="360" value="320">
        </div>
        <button id="add-btn">Add Blob</button>
        <button id="clear-btn">Reset Lamp</button>
    </div>
    <div id="stats">
        <div>Blobs: <span id="blob-count">0</span></div>
        <div>Temp: <span id="temp-state">Warm</span></div>
    </div>
    <div id="info">Click to add blobs | Adjust heat to control flow</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize(); window.onresize = resize;
        
        let heat = 0.5;
        let blobHue = 320;
        let time = 0;
        
        const blobs = [];
        const LAMP_X = 0;
        const LAMP_WIDTH = 200;
        
        class Blob {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size || 30 + Math.random() * 40;
                this.vx = 0;
                this.vy = 0;
                this.temperature = 0.5;
                this.hue = blobHue + (Math.random() - 0.5) * 30;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.5 + Math.random() * 0.5;
            }
            
            update() {
                this.wobblePhase += 0.02 * this.wobbleSpeed;
                
                const lampCenterX = W / 2;
                const lampTop = H * 0.1;
                const lampBottom = H * 0.9;
                const lampWidth = Math.min(W * 0.25, 150);
                
                const distFromBottom = lampBottom - this.y;
                const heatInfluence = heat * (1 - distFromBottom / (lampBottom - lampTop));
                
                if (this.y > lampBottom - 50) {
                    this.temperature += 0.01 * heat;
                } else {
                    this.temperature -= 0.005;
                }
                this.temperature = Math.max(0, Math.min(1, this.temperature));
                
                const buoyancy = (this.temperature - 0.5) * heat * 0.15;
                this.vy += buoyancy;
                
                this.vy *= 0.98;
                this.vx *= 0.95;
                
                this.vx += (Math.random() - 0.5) * 0.1 * heat;
                
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x - this.size < lampCenterX - lampWidth) {
                    this.x = lampCenterX - lampWidth + this.size;
                    this.vx *= -0.5;
                }
                if (this.x + this.size > lampCenterX + lampWidth) {
                    this.x = lampCenterX + lampWidth - this.size;
                    this.vx *= -0.5;
                }
                
                if (this.y - this.size < lampTop) {
                    this.y = lampTop + this.size;
                    this.vy *= -0.3;
                    this.temperature -= 0.1;
                }
                if (this.y + this.size > lampBottom) {
                    this.y = lampBottom - this.size;
                    this.vy *= -0.3;
                }
            }
            
            draw() {
                const wobble = Math.sin(this.wobblePhase) * 0.15;
                const stretchX = 1 + wobble;
                const stretchY = 1 - wobble * 0.5;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(stretchX, stretchY);
                
                const gradient = ctx.createRadialGradient(
                    -this.size * 0.2, -this.size * 0.2, 0,
                    0, 0, this.size
                );
                
                const lightness = 50 + this.temperature * 20;
                const saturation = 70 + this.temperature * 20;
                
                gradient.addColorStop(0, "hsla(" + this.hue + ", " + saturation + "%, " + (lightness + 20) + "%, 0.95)");
                gradient.addColorStop(0.5, "hsla(" + this.hue + ", " + saturation + "%, " + lightness + "%, 0.9)");
                gradient.addColorStop(1, "hsla(" + this.hue + ", " + (saturation - 20) + "%, " + (lightness - 15) + "%, 0.85)");
                
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                if (this.temperature > 0.6) {
                    const glowSize = this.size * 1.5;
                    const glow = ctx.createRadialGradient(0, 0, this.size * 0.5, 0, 0, glowSize);
                    glow.addColorStop(0, "hsla(" + this.hue + ", 80%, 60%, 0.2)");
                    glow.addColorStop(1, "transparent");
                    ctx.fillStyle = glow;
                    ctx.fillRect(-glowSize, -glowSize, glowSize * 2, glowSize * 2);
                }
                
                ctx.restore();
            }
            
            checkMerge(other) {
                const dist = Math.hypot(this.x - other.x, this.y - other.y);
                if (dist < (this.size + other.size) * 0.7) {
                    return true;
                }
                return false;
            }
        }
        
        function drawLamp() {
            const lampCenterX = W / 2;
            const lampTop = H * 0.08;
            const lampBottom = H * 0.92;
            const lampWidth = Math.min(W * 0.25, 150);
            
            const glassGradient = ctx.createLinearGradient(
                lampCenterX - lampWidth, 0,
                lampCenterX + lampWidth, 0
            );
            glassGradient.addColorStop(0, 'rgba(60, 40, 80, 0.3)');
            glassGradient.addColorStop(0.2, 'rgba(40, 30, 60, 0.2)');
            glassGradient.addColorStop(0.8, 'rgba(40, 30, 60, 0.2)');
            glassGradient.addColorStop(1, 'rgba(60, 40, 80, 0.3)');
            
            ctx.beginPath();
            ctx.moveTo(lampCenterX - lampWidth * 0.7, lampTop);
            ctx.quadraticCurveTo(lampCenterX - lampWidth, lampTop + 50, lampCenterX - lampWidth, H * 0.3);
            ctx.lineTo(lampCenterX - lampWidth, H * 0.7);
            ctx.quadraticCurveTo(lampCenterX - lampWidth, lampBottom - 50, lampCenterX - lampWidth * 0.7, lampBottom);
            ctx.lineTo(lampCenterX + lampWidth * 0.7, lampBottom);
            ctx.quadraticCurveTo(lampCenterX + lampWidth, lampBottom - 50, lampCenterX + lampWidth, H * 0.7);
            ctx.lineTo(lampCenterX + lampWidth, H * 0.3);
            ctx.quadraticCurveTo(lampCenterX + lampWidth, lampTop + 50, lampCenterX + lampWidth * 0.7, lampTop);
            ctx.closePath();
            
            ctx.fillStyle = glassGradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(100, 80, 120, 0.4)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            const heatGlow = ctx.createRadialGradient(
                lampCenterX, lampBottom, 0,
                lampCenterX, lampBottom, 100
            );
            heatGlow.addColorStop(0, "rgba(255, 100, 50, " + (heat * 0.3) + ")");
            heatGlow.addColorStop(1, "transparent");
            ctx.fillStyle = heatGlow;
            ctx.fillRect(lampCenterX - 100, lampBottom - 100, 200, 100);
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a0510');
            gradient.addColorStop(1, '#150a18');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function checkMerges() {
            for (let i = 0; i < blobs.length; i++) {
                for (let j = i + 1; j < blobs.length; j++) {
                    if (blobs[i].checkMerge(blobs[j])) {
                        const newSize = Math.sqrt(blobs[i].size * blobs[i].size + blobs[j].size * blobs[j].size);
                        
                        if (newSize > 80 && Math.random() < 0.02) {
                            continue;
                        }
                        
                        blobs[i].x = (blobs[i].x + blobs[j].x) / 2;
                        blobs[i].y = (blobs[i].y + blobs[j].y) / 2;
                        blobs[i].size = newSize;
                        blobs[i].temperature = (blobs[i].temperature + blobs[j].temperature) / 2;
                        blobs.splice(j, 1);
                        j--;
                    }
                }
            }
            
            for (let i = blobs.length - 1; i >= 0; i--) {
                if (blobs[i].size > 70 && Math.random() < 0.005) {
                    const newSize = blobs[i].size * 0.6;
                    blobs[i].size = newSize;
                    blobs.push(new Blob(
                        blobs[i].x + (Math.random() - 0.5) * 20,
                        blobs[i].y + (Math.random() - 0.5) * 20,
                        newSize
                    ));
                }
            }
        }
        
        function getTempState() {
            if (heat < 0.3) return 'Cool';
            if (heat < 0.5) return 'Warm';
            if (heat < 0.7) return 'Hot';
            return 'Scorching';
        }
        
        function updateStats() {
            document.getElementById('blob-count').textContent = blobs.length;
            document.getElementById('temp-state').textContent = getTempState();
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            drawLamp();
            
            checkMerges();
            
            blobs.forEach(b => {
                b.update();
                b.draw();
            });
            
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 280) return;
            
            const lampCenterX = W / 2;
            const lampWidth = Math.min(W * 0.25, 150);
            
            if (Math.abs(e.clientX - lampCenterX) < lampWidth) {
                blobs.push(new Blob(e.clientX, e.clientY));
            }
        };
        
        document.getElementById('heat').oninput = e => {
            heat = e.target.value / 100;
            document.getElementById('heat-val').textContent = e.target.value;
        };
        
        document.getElementById('hue').oninput = e => {
            blobHue = parseInt(e.target.value);
            document.getElementById('hue-val').textContent = e.target.value;
        };
        
        document.getElementById('add-btn').onclick = () => {
            const lampCenterX = W / 2;
            blobs.push(new Blob(
                lampCenterX + (Math.random() - 0.5) * 100,
                H * 0.7 + Math.random() * (H * 0.15)
            ));
        };
        
        document.getElementById('clear-btn').onclick = () => {
            blobs.length = 0;
            for (let i = 0; i < 5; i++) {
                blobs.push(new Blob(
                    W/2 + (Math.random() - 0.5) * 100,
                    H * 0.6 + Math.random() * (H * 0.25)
                ));
            }
        };
        
        for (let i = 0; i < 6; i++) {
            blobs.push(new Blob(
                W/2 + (Math.random() - 0.5) * 100,
                H * 0.4 + Math.random() * (H * 0.4)
            ));
        }
        
        animate();
    </script>
</body>
</html>
