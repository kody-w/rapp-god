    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Retrograde Garden</h3>
        <div class="control-row">
            <label>Time Flow <span class="value" id="time-val">1x</span></label>
            <input type="range" id="timeflow" min="1" max="10" value="1">
        </div>
        <div class="control-row">
            <label>Root Energy <span class="value" id="root-val">50</span></label>
            <input type="range" id="rootenergy" min="20" max="100" value="50">
        </div>
        <button id="plant-btn">Plant Memory Seed</button>
        <button id="paradox-btn">Trigger Paradox Bloom</button>
    </div>
    <div id="info">Click to plant seeds | Watch plants un-grow above while roots expand below</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, groundY;
        function resize() { 
            W = canvas.width = innerWidth; 
            H = canvas.height = innerHeight;
            groundY = H * 0.6;
        }
        resize(); window.onresize = resize;
        
        let timeFlow = 1;
        let rootEnergy = 0.5;
        let time = 0;
        const plants = [];
        const particles = [];
        
        class Plant {
            constructor(x) {
                this.x = x;
                this.seedY = groundY;
                
                this.abovePhase = 1;
                this.belowPhase = 0;
                
                this.maxHeight = 80 + Math.random() * 60;
                this.maxRootDepth = 60 + Math.random() * 40;
                
                this.stemSegments = [];
                this.rootSegments = [];
                this.leaves = [];
                this.flower = null;
                
                this.hueAbove = 80 + Math.random() * 40;
                this.hueBelow = 20 + Math.random() * 30;
                this.flowerHue = 300 + Math.random() * 60;
                
                this.paradox = false;
                this.paradoxTimer = 0;
                
                this.generateFullPlant();
            }
            
            generateFullPlant() {
                let y = this.seedY;
                let x = this.x;
                for (let i = 0; i < 8; i++) {
                    const segHeight = this.maxHeight / 8;
                    y -= segHeight;
                    x += (Math.random() - 0.5) * 5;
                    this.stemSegments.push({
                        x: x,
                        y: y,
                        width: 3 - i * 0.3,
                        visible: true
                    });
                    
                    if (i > 2 && i < 7 && Math.random() > 0.4) {
                        this.leaves.push({
                            segIndex: i,
                            side: Math.random() > 0.5 ? 1 : -1,
                            size: 15 + Math.random() * 10,
                            angle: (Math.random() - 0.5) * 0.5,
                            visible: true
                        });
                    }
                }
                
                this.flower = {
                    x: this.stemSegments[7].x,
                    y: this.stemSegments[7].y - 10,
                    size: 12 + Math.random() * 8,
                    petals: 5 + Math.floor(Math.random() * 3),
                    visible: true
                };
                
                y = this.seedY;
                x = this.x;
                for (let i = 0; i < 6; i++) {
                    const spread = (Math.random() - 0.5) * 40;
                    y += this.maxRootDepth / 6;
                    x = this.x + spread;
                    this.rootSegments.push({
                        x: x,
                        y: y,
                        width: 2 - i * 0.2,
                        grown: false
                    });
                }
            }
            
            update() {
                const speed = 0.002 * timeFlow;
                
                if (!this.paradox) {
                    this.abovePhase -= speed;
                    this.belowPhase += speed * rootEnergy;
                } else {
                    this.abovePhase += speed;
                    this.belowPhase -= speed * 0.5;
                    this.paradoxTimer -= 0.016;
                    if (this.paradoxTimer <= 0) this.paradox = false;
                }
                
                this.abovePhase = Math.max(0, Math.min(1, this.abovePhase));
                this.belowPhase = Math.max(0, Math.min(1, this.belowPhase));
                
                const visibleSegs = Math.floor(this.abovePhase * this.stemSegments.length);
                this.stemSegments.forEach((seg, i) => {
                    seg.visible = i < visibleSegs;
                });
                
                this.leaves.forEach(leaf => {
                    leaf.visible = leaf.segIndex < visibleSegs;
                });
                
                this.flower.visible = this.abovePhase > 0.9;
                
                const grownRoots = Math.floor(this.belowPhase * this.rootSegments.length);
                this.rootSegments.forEach((root, i) => {
                    root.grown = i < grownRoots;
                });
                
                if (this.abovePhase < 0.3 && this.belowPhase > 0.8) {
                    if (Math.random() < 0.001 * timeFlow) {
                        this.triggerParadoxBloom();
                    }
                }
                
                return this.abovePhase > 0 || this.belowPhase > 0;
            }
            
            triggerParadoxBloom() {
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: this.x,
                        y: this.seedY,
                        vx: (Math.random() - 0.5) * 3,
                        vy: -Math.random() * 4 - 2,
                        size: 3 + Math.random() * 5,
                        life: 1,
                        hue: this.flowerHue
                    });
                }
            }
            
            draw() {
                const fadeAbove = 0.3 + this.abovePhase * 0.7;
                const fadeBelow = 0.3 + this.belowPhase * 0.7;
                
                ctx.save();
                
                this.rootSegments.forEach((root, i) => {
                    if (!root.grown) return;
                    const prev = i === 0 ? {x: this.x, y: this.seedY} : this.rootSegments[i-1];
                    
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(root.x, root.y);
                    ctx.strokeStyle = "hsla(" + this.hueBelow + ", 60%, " + (40 + i * 5) + "%, " + fadeBelow + ")";
                    ctx.lineWidth = root.width;
                    ctx.stroke();
                    
                    const pulse = Math.sin(time * 3 + i) * 0.3;
                    ctx.beginPath();
                    ctx.arc(root.x, root.y, root.width + pulse, 0, Math.PI * 2);
                    ctx.fillStyle = "hsla(" + (this.hueBelow + 20) + ", 80%, 60%, " + (fadeBelow * 0.5) + ")";
                    ctx.fill();
                });
                
                const visibleSegs = this.stemSegments.filter(s => s.visible);
                if (visibleSegs.length > 0) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.seedY);
                    visibleSegs.forEach((seg, i) => {
                        ctx.lineTo(seg.x, seg.y);
                    });
                    ctx.strokeStyle = "hsla(" + this.hueAbove + ", 50%, 35%, " + fadeAbove + ")";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                
                this.leaves.forEach(leaf => {
                    if (!leaf.visible) return;
                    const seg = this.stemSegments[leaf.segIndex];
                    if (!seg) return;
                    
                    ctx.save();
                    ctx.translate(seg.x, seg.y);
                    ctx.rotate(leaf.angle + leaf.side * 0.5);
                    
                    ctx.beginPath();
                    ctx.ellipse(leaf.side * leaf.size * 0.5, 0, leaf.size * 0.6, leaf.size * 0.25, 0, 0, Math.PI * 2);
                    ctx.fillStyle = "hsla(" + (this.hueAbove + 10) + ", 60%, 40%, " + fadeAbove + ")";
                    ctx.fill();
                    
                    ctx.restore();
                });
                
                if (this.flower.visible) {
                    const f = this.flower;
                    for (let i = 0; i < f.petals; i++) {
                        const angle = (i / f.petals) * Math.PI * 2 + time * 0.5;
                        ctx.save();
                        ctx.translate(f.x, f.y);
                        ctx.rotate(angle);
                        
                        ctx.beginPath();
                        ctx.ellipse(0, -f.size * 0.6, f.size * 0.3, f.size * 0.6, 0, 0, Math.PI * 2);
                        ctx.fillStyle = "hsla(" + this.flowerHue + ", 70%, 60%, " + fadeAbove + ")";
                        ctx.fill();
                        
                        ctx.restore();
                    }
                    
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = "hsla(" + (this.flowerHue - 30) + ", 90%, 70%, " + fadeAbove + ")";
                    ctx.fill();
                }
                
                if (this.paradox) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.seedY - this.maxHeight * 0.5, this.maxHeight, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(255, 200, 100, 0.2)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        function drawBackground() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
            skyGrad.addColorStop(0, '#0a1520');
            skyGrad.addColorStop(1, '#152010');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, groundY);
            
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
            groundGrad.addColorStop(0, '#1a1510');
            groundGrad.addColorStop(1, '#0a0805');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, W, H - groundY);
            
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(W, groundY);
            ctx.strokeStyle = 'rgba(100, 80, 60, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(150, 120, 80, 0.1)';
            ctx.font = '10px Georgia';
            ctx.fillText('PAST (Above)', 10, 30);
            ctx.fillText('FUTURE (Below)', 10, groundY + 20);
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.life -= 0.02;
                p.size *= 0.98;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = "hsla(" + p.hue + ", 80%, 60%, " + p.life + ")";
                ctx.fill();
            }
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            
            for (let i = plants.length - 1; i >= 0; i--) {
                if (!plants[i].update()) {
                    plants.splice(i, 1);
                }
            }
            
            plants.forEach(p => p.draw());
            drawParticles();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientY > groundY - 50 && e.clientY < groundY + 50) {
                plants.push(new Plant(e.clientX));
            }
        };
        
        document.getElementById('timeflow').oninput = e => {
            timeFlow = parseInt(e.target.value);
            document.getElementById('time-val').textContent = timeFlow + 'x';
        };
        
        document.getElementById('rootenergy').oninput = e => {
            rootEnergy = e.target.value / 100;
            document.getElementById('root-val').textContent = e.target.value;
        };
        
        document.getElementById('plant-btn').onclick = () => {
            plants.push(new Plant(W * 0.3 + Math.random() * W * 0.4));
        };
        
        document.getElementById('paradox-btn').onclick = () => {
            plants.forEach(p => {
                p.paradox = true;
                p.paradoxTimer = 3;
            });
        };
        
        for (let i = 0; i < 5; i++) {
            const p = new Plant(W * 0.2 + i * W * 0.15);
            p.abovePhase = 0.5 + Math.random() * 0.5;
            p.belowPhase = Math.random() * 0.5;
            plants.push(p);
        }
        
        animate();
    </script>
</body>
</html>
