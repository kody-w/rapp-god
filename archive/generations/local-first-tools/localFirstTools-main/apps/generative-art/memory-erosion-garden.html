    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let memories = [];
        let flora = [];
        let particles = [];
        let gardenAge = 0;
        let preserveMode = false;
        let selectedMemory = null;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Memory class
        class Memory {
            constructor(text, x, y) {
                this.text = text;
                this.originalText = text;
                this.x = x;
                this.y = y;
                this.opacity = 1;
                this.erosion = 0;
                this.createdAt = Date.now();
                this.preserved = false;
                this.fontSize = 14 + Math.random() * 8;
                this.rotation = (Math.random() - 0.5) * 0.2;
                this.color = {
                    r: 180 + Math.random() * 40,
                    g: 140 + Math.random() * 40,
                    b: 80 + Math.random() * 40
                };
            }
            
            update(dt) {
                if (this.preserved || preserveMode) return;
                
                // Erosion rate increases with age
                const ageSeconds = (Date.now() - this.createdAt) / 1000;
                const erosionRate = 0.0001 + ageSeconds * 0.00001;
                this.erosion += erosionRate * dt;
                
                // Fade opacity
                this.opacity = Math.max(0, 1 - this.erosion);
                
                // Gradually lose letters
                if (this.erosion > 0.1 && Math.random() < 0.01 * dt) {
                    this.erodeLetter();
                }
                
                // Spawn flora particles from erosion
                if (this.erosion > 0.2 && Math.random() < 0.02 * dt) {
                    this.spawnFlora();
                }
                
                // Emit decay particles
                if (Math.random() < 0.1 * this.erosion * dt) {
                    particles.push(new Particle(
                        this.x + (Math.random() - 0.5) * 100,
                        this.y + (Math.random() - 0.5) * 30,
                        this.color
                    ));
                }
            }
            
            erodeLetter() {
                if (this.text.length <= 1) return;
                
                // Replace random letter with space or remove it
                const idx = Math.floor(Math.random() * this.text.length);
                const chars = this.text.split('');
                
                if (Math.random() < 0.5) {
                    chars[idx] = ' ';
                } else {
                    chars.splice(idx, 1);
                }
                
                this.text = chars.join('');
            }
            
            spawnFlora() {
                flora.push(new Flora(
                    this.x + (Math.random() - 0.5) * 150,
                    this.y + Math.random() * 50,
                    this.color
                ));
            }
            
            draw(ctx) {
                if (this.opacity <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.font = `${this.fontSize}px Georgia, serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Glow effect for preserved memories
                if (this.preserved) {
                    ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`;
                    ctx.shadowBlur = 20;
                }
                
                // Draw with erosion effects
                const lines = this.wrapText(this.text, 200);
                lines.forEach((line, i) => {
                    const y = (i - lines.length / 2) * (this.fontSize * 1.4);
                    
                    // Each character might have slightly different opacity
                    let x = -ctx.measureText(line).width / 2;
                    for (let char of line) {
                        const charOpacity = this.opacity * (0.7 + Math.random() * 0.3);
                        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${charOpacity})`;
                        ctx.fillText(char, x, y);
                        x += ctx.measureText(char).width;
                    }
                });
                
                ctx.restore();
            }
            
            wrapText(text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                
                words.forEach(word => {
                    const testLine = currentLine + (currentLine ? ' ' : '') + word;
                    if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                });
                if (currentLine) lines.push(currentLine);
                return lines;
            }
            
            isNearPoint(px, py) {
                return Math.abs(px - this.x) < 100 && Math.abs(py - this.y) < 50;
            }
        }
        
        // Flora class - grows from memory decay
        class Flora {
            constructor(x, y, parentColor) {
                this.x = x;
                this.y = y;
                this.height = 0;
                this.maxHeight = 20 + Math.random() * 60;
                this.growthRate = 0.02 + Math.random() * 0.03;
                this.sway = Math.random() * Math.PI * 2;
                this.swaySpeed = 0.01 + Math.random() * 0.02;
                this.branches = Math.floor(Math.random() * 4) + 1;
                this.color = {
                    r: Math.floor(parentColor.r * 0.5 + 50),
                    g: Math.floor(parentColor.g * 0.8 + 80),
                    b: Math.floor(parentColor.b * 0.3 + 30)
                };
                this.hasFlower = Math.random() < 0.3;
                this.flowerColor = {
                    r: 200 + Math.random() * 55,
                    g: 100 + Math.random() * 100,
                    b: 100 + Math.random() * 100
                };
            }
            
            update(dt) {
                if (this.height < this.maxHeight) {
                    this.height += this.growthRate * dt;
                }
                this.sway += this.swaySpeed * dt;
            }
            
            draw(ctx) {
                const swayOffset = Math.sin(this.sway) * (this.height * 0.1);
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw stem
                ctx.strokeStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.lineWidth = 1 + this.height / 30;
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(
                    swayOffset * 0.5, -this.height * 0.5,
                    swayOffset, -this.height
                );
                ctx.stroke();
                
                // Draw branches/leaves
                for (let i = 0; i < this.branches; i++) {
                    const branchY = -this.height * (0.3 + i * 0.2);
                    const branchDir = i % 2 === 0 ? 1 : -1;
                    const branchLen = 5 + Math.random() * 10;
                    
                    const branchSwayOffset = swayOffset * (branchY / -this.height);
                    
                    ctx.beginPath();
                    ctx.moveTo(branchSwayOffset * (branchY / -this.height), branchY);
                    ctx.lineTo(
                        branchSwayOffset * (branchY / -this.height) + branchDir * branchLen,
                        branchY - branchLen * 0.5
                    );
                    ctx.stroke();
                }
                
                // Draw flower if mature
                if (this.hasFlower && this.height > this.maxHeight * 0.8) {
                    ctx.fillStyle = `rgb(${this.flowerColor.r}, ${this.flowerColor.g}, ${this.flowerColor.b})`;
                    ctx.beginPath();
                    ctx.arc(swayOffset, -this.height, 3 + this.height / 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 0.5 - 0.2;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 1 + Math.random() * 2;
                this.color = color;
            }
            
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy -= 0.01 * dt; // Float upward
                this.life -= this.decay * dt;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life * 0.5})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Main animation
        let lastTime = Date.now();
        
        function animate() {
            const now = Date.now();
            const dt = Math.min(100, now - lastTime) / 16;
            lastTime = now;
            
            // Accelerated garden time (1 real second = 1 garden minute)
            gardenAge += dt / 60 / 24; // Days
            
            // Clear
            ctx.fillStyle = 'rgba(13, 10, 8, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw flora (behind memories)
            flora = flora.filter(f => f.height < f.maxHeight * 1.5);
            flora.forEach(f => {
                f.update(dt);
                f.draw(ctx);
            });
            
            // Update and draw memories
            memories = memories.filter(m => m.opacity > 0 || m.text.length > 0);
            memories.forEach(m => {
                m.update(dt);
                m.draw(ctx);
            });
            
            // Update and draw particles
            particles = particles.filter(p => p.update(dt));
            particles.forEach(p => p.draw(ctx));
            
            // Update UI
            document.getElementById('time-display').textContent = 
                `Garden Age: ${Math.floor(gardenAge)} days`;
            document.getElementById('memory-count').textContent = memories.length;
            document.getElementById('flora-count').textContent = flora.length;
            
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        document.getElementById('plant-btn').addEventListener('click', () => {
            document.getElementById('memory-modal').classList.add('active');
            document.getElementById('memory-text').focus();
        });
        
        document.getElementById('cancel-btn').addEventListener('click', () => {
            document.getElementById('memory-modal').classList.remove('active');
            document.getElementById('memory-text').value = '';
        });
        
        document.getElementById('confirm-plant').addEventListener('click', () => {
            const text = document.getElementById('memory-text').value.trim();
            if (text) {
                const x = 100 + Math.random() * (width - 200);
                const y = 100 + Math.random() * (height - 200);
                memories.push(new Memory(text, x, y));
                saveGarden();
            }
            document.getElementById('memory-modal').classList.remove('active');
            document.getElementById('memory-text').value = '';
        });
        
        document.getElementById('preserve-btn').addEventListener('click', () => {
            preserveMode = !preserveMode;
            document.getElementById('preserve-btn').textContent = 
                preserveMode ? 'Resume Erosion' : 'Preserve Mode';
            document.getElementById('preserve-btn').style.background = 
                preserveMode ? 'rgba(100, 150, 80, 0.3)' : 'rgba(0, 0, 0, 0.4)';
        });
        
        // Click to preserve individual memory
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            memories.forEach(m => {
                if (m.isNearPoint(x, y)) {
                    m.preserved = !m.preserved;
                    
                    // Visual feedback
                    for (let i = 0; i < 10; i++) {
                        particles.push(new Particle(m.x + (Math.random() - 0.5) * 50, m.y, m.color));
                    }
                }
            });
        });
        
        // Export/Import
        document.getElementById('export-btn').addEventListener('click', () => {
            const data = {
                memories: memories.map(m => ({
                    text: m.text,
                    originalText: m.originalText,
                    x: m.x,
                    y: m.y,
                    erosion: m.erosion,
                    preserved: m.preserved,
                    createdAt: m.createdAt
                })),
                flora: flora.map(f => ({
                    x: f.x,
                    y: f.y,
                    height: f.height,
                    maxHeight: f.maxHeight
                })),
                gardenAge: gardenAge
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'memory-garden.json';
            a.click();
            URL.revokeObjectURL(url);
        });
        
        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('import-file').click();
        });
        
        document.getElementById('import-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        loadGardenData(data);
                    } catch (err) {
                        alert('Invalid file');
                    }
                };
                reader.readAsText(file);
            }
        });
        
        function loadGardenData(data) {
            memories = data.memories.map(m => {
                const mem = new Memory(m.text, m.x, m.y);
                mem.originalText = m.originalText;
                mem.erosion = m.erosion;
                mem.preserved = m.preserved;
                mem.createdAt = m.createdAt;
                mem.opacity = Math.max(0, 1 - m.erosion);
                return mem;
            });
            
            flora = data.flora.map(f => {
                const fl = new Flora(f.x, f.y, { r: 150, g: 150, b: 100 });
                fl.height = f.height;
                fl.maxHeight = f.maxHeight;
                return fl;
            });
            
            gardenAge = data.gardenAge || 0;
        }
        
        function saveGarden() {
            const data = {
                memories: memories.map(m => ({
                    text: m.text,
                    originalText: m.originalText,
                    x: m.x,
                    y: m.y,
                    erosion: m.erosion,
                    preserved: m.preserved,
                    createdAt: m.createdAt
                })),
                flora: flora.slice(0, 100).map(f => ({
                    x: f.x,
                    y: f.y,
                    height: f.height,
                    maxHeight: f.maxHeight
                })),
                gardenAge: gardenAge
            };
            localStorage.setItem('memoryErosionGarden', JSON.stringify(data));
        }
        
        // Load saved garden
        const saved = localStorage.getItem('memoryErosionGarden');
        if (saved) {
            try {
                loadGardenData(JSON.parse(saved));
            } catch (e) {}
        }
        
        // Auto-save
        setInterval(saveGarden, 10000);
        
        // Start
        animate();
    </script>
</body>
</html>
