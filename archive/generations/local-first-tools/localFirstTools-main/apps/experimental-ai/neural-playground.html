    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<script>
// ===== STATE =====
let data = [];
let currentClass = 0;
let training = false;
let epoch = 0;
let net = null;
let lossHistory = [];
let accHistory = [];
let layerSizes = [8, 6];
let animFrame = null;

// ===== ACTIVATION FUNCTIONS =====
const ACT = {
  relu:    { fn: x => Math.max(0, x), dfn: x => x > 0 ? 1 : 0 },
  sigmoid: { fn: x => 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, x)))), dfn: x => { const s = 1/(1+Math.exp(-Math.max(-500,Math.min(500,x)))); return s*(1-s); }},
  tanh:    { fn: x => Math.tanh(x), dfn: x => 1 - Math.tanh(x)**2 }
};

// ===== NEURAL NETWORK (from scratch) =====
function createNet() {
  const act = document.getElementById('activation').value;
  const sizes = [2, ...layerSizes, 1];
  const layers = [];
  for (let i = 0; i < sizes.length - 1; i++) {
    const nIn = sizes[i], nOut = sizes[i+1];
    const scale = Math.sqrt(2.0 / nIn);
    const w = Array.from({length: nOut}, () =>
      Array.from({length: nIn}, () => (Math.random() * 2 - 1) * scale)
    );
    const b = new Array(nOut).fill(0);
    layers.push({ w, b, nIn, nOut });
  }
  return { layers, act, sizes };
}

function forward(net, input) {
  const act = ACT[net.act];
  let a = input.slice();
  const activations = [a.slice()];
  const preActs = [];
  for (let l = 0; l < net.layers.length; l++) {
    const layer = net.layers[l];
    const z = [];
    for (let j = 0; j < layer.nOut; j++) {
      let sum = layer.b[j];
      for (let i = 0; i < layer.nIn; i++) sum += layer.w[j][i] * a[i];
      z.push(sum);
    }
    preActs.push(z.slice());
    if (l === net.layers.length - 1) {
      a = z.map(v => ACT.sigmoid.fn(v));
    } else {
      a = z.map(v => act.fn(v));
    }
    activations.push(a.slice());
  }
  return { output: a[0], activations, preActs };
}

function trainStep(net, batch, lr, reg) {
  const act = ACT[net.act];
  const nL = net.layers.length;
  const gradW = net.layers.map(l => l.w.map(row => new Array(row.length).fill(0)));
  const gradB = net.layers.map(l => new Array(l.nOut).fill(0));
  let totalLoss = 0;
  let correct = 0;

  for (const pt of batch) {
    const { output, activations, preActs } = forward(net, [pt.x, pt.y]);
    const y = pt.c;
    const pred = output;
    const eps = 1e-7;
    totalLoss += -(y * Math.log(pred + eps) + (1 - y) * Math.log(1 - pred + eps));
    if ((pred >= 0.5 ? 1 : 0) === y) correct++;

    // Backprop
    const deltas = new Array(nL);
    // Output layer delta (sigmoid + binary cross-entropy => pred - y)
    deltas[nL - 1] = [pred - y];

    // Hidden layers
    for (let l = nL - 2; l >= 0; l--) {
      const nextLayer = net.layers[l + 1];
      const d = [];
      for (let j = 0; j < net.layers[l].nOut; j++) {
        let err = 0;
        for (let k = 0; k < nextLayer.nOut; k++) {
          err += nextLayer.w[k][j] * deltas[l + 1][k];
        }
        d.push(err * act.dfn(preActs[l][j]));
      }
      deltas[l] = d;
    }

    // Accumulate gradients
    for (let l = 0; l < nL; l++) {
      for (let j = 0; j < net.layers[l].nOut; j++) {
        gradB[l][j] += deltas[l][j];
        for (let i = 0; i < net.layers[l].nIn; i++) {
          gradW[l][j][i] += deltas[l][j] * activations[l][i];
        }
      }
    }
  }

  // Update weights
  const n = batch.length;
  for (let l = 0; l < nL; l++) {
    for (let j = 0; j < net.layers[l].nOut; j++) {
      net.layers[l].b[j] -= lr * gradB[l][j] / n;
      for (let i = 0; i < net.layers[l].nIn; i++) {
        net.layers[l].w[j][i] -= lr * (gradW[l][j][i] / n + reg * net.layers[l].w[j][i]);
      }
    }
  }

  return { loss: totalLoss / n, acc: correct / n };
}

// ===== PRESETS =====
function genSpiral(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    for (let c = 0; c < 2; c++) {
      const r = (i / n) * 0.45 + 0.05;
      const t = 1.75 * i / n * 2 * Math.PI + c * Math.PI;
      const x = r * Math.cos(t) + (Math.random() - 0.5) * 0.06 + 0.5;
      const y = r * Math.sin(t) + (Math.random() - 0.5) * 0.06 + 0.5;
      pts.push({ x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)), c });
    }
  }
  return pts;
}

function genXOR(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const x = Math.random(), y = Math.random();
    const c = ((x > 0.5) !== (y > 0.5)) ? 1 : 0;
    pts.push({ x: x * 0.8 + 0.1, y: y * 0.8 + 0.1, c });
  }
  return pts;
}

function genCircles(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    if (Math.random() < 0.5) {
      const r = Math.random() * 0.15;
      pts.push({ x: 0.5 + r * Math.cos(a), y: 0.5 + r * Math.sin(a), c: 0 });
    } else {
      const r = 0.25 + Math.random() * 0.15;
      pts.push({ x: 0.5 + r * Math.cos(a), y: 0.5 + r * Math.sin(a), c: 1 });
    }
  }
  return pts;
}

function genMoons(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (i % 2 === 0) {
      const a = Math.random() * Math.PI;
      pts.push({
        x: 0.35 + 0.25 * Math.cos(a) + (Math.random() - 0.5) * 0.06,
        y: 0.5 - 0.25 * Math.sin(a) + (Math.random() - 0.5) * 0.06,
        c: 0
      });
    } else {
      const a = Math.PI + Math.random() * Math.PI;
      pts.push({
        x: 0.55 + 0.25 * Math.cos(a) + (Math.random() - 0.5) * 0.06,
        y: 0.5 - 0.25 * Math.sin(a) + 0.15 + (Math.random() - 0.5) * 0.06,
        c: 1
      });
    }
  }
  return pts;
}

function loadPreset(name) {
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('pre' + name.charAt(0).toUpperCase() + name.slice(1));
  if (btn) btn.classList.add('active');
  const gen = { spiral: genSpiral, xor: genXOR, circles: genCircles, moons: genMoons };
  data = gen[name](150);
  resetNet();
}

// ===== DRAWING =====
const mainCanvas = document.getElementById('mainCanvas');
const mainCtx = mainCanvas.getContext('2d');

function resizeMain() {
  const r = mainCanvas.parentElement.getBoundingClientRect();
  mainCanvas.width = r.width * devicePixelRatio;
  mainCanvas.height = r.height * devicePixelRatio;
  mainCanvas.style.width = r.width + 'px';
  mainCanvas.style.height = r.height + 'px';
  drawMain();
}

mainCanvas.addEventListener('pointerdown', e => {
  addPoint(e);
  const onMove = ev => addPoint(ev);
  const onUp = () => { mainCanvas.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
  mainCanvas.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
});

let lastAddTime = 0;
function addPoint(e) {
  if (Date.now() - lastAddTime < 50) return;
  lastAddTime = Date.now();
  const rect = mainCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  data.push({ x, y, c: currentClass });
  if (!training) drawMain();
}

function setClass(c) {
  currentClass = c;
  document.querySelectorAll('.class-btn').forEach((b, i) => b.classList.toggle('active', i === c));
}

function clearData() {
  data = [];
  lossHistory = [];
  accHistory = [];
  epoch = 0;
  updateStats(0, 0);
  drawMain();
  drawCharts();
}

// ===== HEATMAP + MAIN RENDER =====
let heatmapBuf = null;
const HEAT_RES = 60;

function computeHeatmap() {
  if (!net || data.length === 0) { heatmapBuf = null; return; }
  const buf = new Float32Array(HEAT_RES * HEAT_RES);
  for (let gy = 0; gy < HEAT_RES; gy++) {
    for (let gx = 0; gx < HEAT_RES; gx++) {
      const nx = (gx + 0.5) / HEAT_RES;
      const ny = (gy + 0.5) / HEAT_RES;
      const { output } = forward(net, [nx, ny]);
      buf[gy * HEAT_RES + gx] = output;
    }
  }
  heatmapBuf = buf;
}

function drawMain() {
  const W = mainCanvas.width, H = mainCanvas.height;
  mainCtx.fillStyle = '#0d1117';
  mainCtx.fillRect(0, 0, W, H);

  // Draw grid
  mainCtx.strokeStyle = '#21262d';
  mainCtx.lineWidth = devicePixelRatio;
  for (let i = 0; i <= 10; i++) {
    const x = (i / 10) * W, y = (i / 10) * H;
    mainCtx.beginPath(); mainCtx.moveTo(x, 0); mainCtx.lineTo(x, H); mainCtx.stroke();
    mainCtx.beginPath(); mainCtx.moveTo(0, y); mainCtx.lineTo(W, y); mainCtx.stroke();
  }

  // Draw heatmap
  if (heatmapBuf) {
    const cw = W / HEAT_RES, ch = H / HEAT_RES;
    for (let gy = 0; gy < HEAT_RES; gy++) {
      for (let gx = 0; gx < HEAT_RES; gx++) {
        const v = heatmapBuf[gy * HEAT_RES + gx];
        const r = Math.round(255 * (1 - v) * 0.85 + 30);
        const g = Math.round(60 + 80 * (1 - Math.abs(v - 0.5) * 2));
        const b = Math.round(255 * v * 0.85 + 30);
        mainCtx.fillStyle = `rgba(${r},${g},${b},0.55)`;
        mainCtx.fillRect(gx * cw, gy * ch, cw + 1, ch + 1);
      }
    }
    // Decision boundary contour
    mainCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    mainCtx.lineWidth = 1.5 * devicePixelRatio;
    for (let gy = 0; gy < HEAT_RES - 1; gy++) {
      for (let gx = 0; gx < HEAT_RES - 1; gx++) {
        const v00 = heatmapBuf[gy * HEAT_RES + gx];
        const v10 = heatmapBuf[gy * HEAT_RES + gx + 1];
        const v01 = heatmapBuf[(gy+1) * HEAT_RES + gx];
        if ((v00 >= 0.5) !== (v10 >= 0.5) || (v00 >= 0.5) !== (v01 >= 0.5)) {
          const cx = (gx + 0.5) / HEAT_RES * W;
          const cy = (gy + 0.5) / HEAT_RES * H;
          mainCtx.beginPath();
          mainCtx.arc(cx, cy, 1.5 * devicePixelRatio, 0, Math.PI * 2);
          mainCtx.stroke();
        }
      }
    }
  }

  // Draw data points
  const pr = 5 * devicePixelRatio;
  for (const pt of data) {
    const px = pt.x * W, py = pt.y * H;
    mainCtx.beginPath();
    mainCtx.arc(px, py, pr, 0, Math.PI * 2);
    mainCtx.fillStyle = pt.c === 0 ? '#ff6b6b' : '#48bfe3';
    mainCtx.fill();
    mainCtx.strokeStyle = '#fff';
    mainCtx.lineWidth = 1.2 * devicePixelRatio;
    mainCtx.stroke();
  }
}

// ===== CHARTS =====
function drawCharts() {
  drawChart('lossChart', lossHistory, '#f0883e', 'Loss');
  drawChart('accChart', accHistory, '#3fb950', 'Accuracy');
}

function drawChart(id, hist, color, label) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = 120 * devicePixelRatio;
  const W = canvas.width, H = canvas.height;
  const pad = 5 * devicePixelRatio;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (hist.length < 2) {
    ctx.fillStyle = '#30363d';
    ctx.font = `${12 * devicePixelRatio}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for training data...', W / 2, H / 2);
    return;
  }

  const maxV = label === 'Accuracy' ? 1 : Math.max(...hist) * 1.1 || 1;
  const minV = 0;
  const plotW = W - pad * 2, plotH = H - pad * 2;

  // Grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = devicePixelRatio;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (i / 4) * plotH;
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - pad, y); ctx.stroke();
  }

  // Line
  ctx.strokeStyle = color;
  ctx.lineWidth = 2 * devicePixelRatio;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const step = Math.max(1, Math.floor(hist.length / plotW));
  for (let i = 0; i < hist.length; i += step) {
    const x = pad + (i / (hist.length - 1)) * plotW;
    const y = pad + plotH - ((hist[i] - minV) / (maxV - minV)) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Latest value label
  ctx.fillStyle = color;
  ctx.font = `bold ${11 * devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'right';
  const latest = hist[hist.length - 1];
  ctx.fillText(label === 'Accuracy' ? (latest * 100).toFixed(1) + '%' : latest.toFixed(4), W - pad, pad + 12 * devicePixelRatio);
}

// ===== NETWORK VISUALIZATION =====
function drawNetVis() {
  const canvas = document.getElementById('netVis');
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  const W = canvas.width, H = canvas.height;
  const dpr = devicePixelRatio;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (!net) return;

  const sizes = net.sizes;
  const nLayers = sizes.length;
  const padX = 30 * dpr, padY = 20 * dpr;
  const layerSpacing = (W - padX * 2) / (nLayers - 1);
  const maxNodes = Math.max(...sizes);

  // Compute positions
  const positions = sizes.map((s, li) => {
    const x = padX + li * layerSpacing;
    const nodeSpacing = Math.min(24 * dpr, (H - padY * 2) / (s + 1));
    const startY = H / 2 - ((s - 1) * nodeSpacing) / 2;
    return Array.from({length: s}, (_, ni) => ({ x, y: startY + ni * nodeSpacing }));
  });

  // Get activations for sample point
  let sampleActs = null;
  if (data.length > 0) {
    const sp = data[Math.floor(data.length / 2)];
    sampleActs = forward(net, [sp.x, sp.y]).activations;
  }

  // Draw connections with weight colors
  for (let l = 0; l < net.layers.length; l++) {
    const layer = net.layers[l];
    const maxW = Math.max(0.01, ...layer.w.flat().map(Math.abs));
    for (let j = 0; j < layer.nOut; j++) {
      for (let i = 0; i < layer.nIn; i++) {
        const w = layer.w[j][i];
        const norm = w / maxW;
        const alpha = Math.min(1, Math.abs(norm) * 0.7 + 0.05);
        const p1 = positions[l][i], p2 = positions[l + 1][j];
        ctx.strokeStyle = norm > 0
          ? `rgba(56,166,255,${alpha})`
          : `rgba(248,81,73,${alpha})`;
        ctx.lineWidth = Math.max(0.5, Math.abs(norm) * 2.5) * dpr;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  for (let l = 0; l < nLayers; l++) {
    for (let n = 0; n < sizes[l]; n++) {
      const pos = positions[l][n];
      const r = Math.min(10, 7) * dpr;
      let actVal = 0;
      if (sampleActs && sampleActs[l]) actVal = sampleActs[l][n] || 0;
      const intensity = Math.min(1, Math.abs(actVal));

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      if (l === 0) {
        ctx.fillStyle = '#8b949e';
      } else if (l === nLayers - 1) {
        ctx.fillStyle = actVal > 0.5 ? '#48bfe3' : '#ff6b6b';
      } else {
        const g = Math.round(100 + intensity * 155);
        ctx.fillStyle = actVal >= 0
          ? `rgb(56,${g},255)`
          : `rgb(${g},81,73)`;
      }
      ctx.fill();
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 1.5 * dpr;
      ctx.stroke();
    }
  }

  // Layer labels
  ctx.fillStyle = '#484f58';
  ctx.font = `${9 * dpr}px sans-serif`;
  ctx.textAlign = 'center';
  const labels = ['Input', ...layerSizes.map((_, i) => `H${i+1}`), 'Out'];
  for (let l = 0; l < nLayers; l++) {
    const pos = positions[l][0];
    ctx.fillText(labels[l] || '', pos.x, padY - 5 * dpr);
  }
}

// ===== LAYER UI =====
function updateLayerUI() {
  const n = parseInt(document.getElementById('nLayers').value);
  document.getElementById('nLayersVal').textContent = n;
  while (layerSizes.length < n) layerSizes.push(6);
  while (layerSizes.length > n) layerSizes.pop();

  const cont = document.getElementById('layerConfigs');
  cont.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const div = document.createElement('div');
    div.className = 'layer-config';
    div.innerHTML = `<span class="lbl">Layer ${i+1}</span>
      <input type="range" min="1" max="20" value="${layerSizes[i]}" data-idx="${i}"
        oninput="layerSizes[${i}]=parseInt(this.value);this.nextElementSibling.textContent=this.value;resetNet()">
      <span class="val">${layerSizes[i]}</span>`;
    cont.appendChild(div);
  }
  resetNet();
}

// ===== TRAINING LOOP =====
function updateStats(loss, acc) {
  document.getElementById('epochDisp').textContent = epoch;
  document.getElementById('lossDisp').textContent = loss ? loss.toFixed(4) : '-';
  document.getElementById('accDisp').textContent = acc ? (acc * 100).toFixed(1) + '%' : '-';
}

function resetNet() {
  if (training) toggleTrain();
  net = createNet();
  epoch = 0;
  lossHistory = [];
  accHistory = [];
  heatmapBuf = null;
  updateStats(0, 0);
  drawMain();
  drawCharts();
  drawNetVis();
}

function toggleTrain() {
  training = !training;
  const btn = document.getElementById('btnTrain');
  if (training) {
    if (data.length < 2) { training = false; return; }
    if (!net) net = createNet();
    btn.textContent = '⏸ Stop';
    btn.classList.add('running');
    trainLoop();
  } else {
    btn.textContent = '▶ Train';
    btn.classList.remove('running');
    if (animFrame) cancelAnimationFrame(animFrame);
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function trainLoop() {
  if (!training) return;
  const lr = Math.pow(10, parseFloat(document.getElementById('lr').value));
  const bs = parseInt(document.getElementById('bs').value);
  const reg = parseFloat(document.getElementById('reg').value);

  const stepsPerFrame = 5;
  let frameLoss = 0, frameAcc = 0;
  for (let s = 0; s < stepsPerFrame; s++) {
    const shuffled = shuffle(data.slice());
    let eLoss = 0, eAcc = 0, batches = 0;
    for (let i = 0; i < shuffled.length; i += bs) {
      const batch = shuffled.slice(i, i + bs);
      const r = trainStep(net, batch, lr, reg);
      eLoss += r.loss;
      eAcc += r.acc;
      batches++;
    }
    frameLoss = eLoss / batches;
    frameAcc = eAcc / batches;
    epoch++;
  }

  lossHistory.push(frameLoss);
  accHistory.push(frameAcc);
  updateStats(frameLoss, frameAcc);

  computeHeatmap();
  drawMain();
  drawCharts();
  drawNetVis();

  animFrame = requestAnimationFrame(trainLoop);
}

// ===== INIT =====
function init() {
  updateLayerUI();
  window.addEventListener('resize', () => { resizeMain(); drawCharts(); drawNetVis(); });
  resizeMain();
  drawCharts();
  drawNetVis();
  loadPreset('spiral');
}

init();
</script>
