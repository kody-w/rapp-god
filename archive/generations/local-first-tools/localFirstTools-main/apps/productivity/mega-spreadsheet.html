<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--cell-bg:#0f3460;--cell-border:#1a1a4e;--text:#e0e0e0;--accent:#e94560;--accent2:#0ea5e9;--header-bg:#1a1a4e;--sel:#e9456033;--toolbar-bg:#0d1b36}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#toolbar{background:var(--toolbar-bg);padding:4px 8px;display:flex;gap:4px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--cell-border)}
#toolbar button,#toolbar select{background:var(--surface);color:var(--text);border:1px solid var(--cell-border);border-radius:3px;padding:3px 8px;cursor:pointer;font-size:12px}
#toolbar button:hover{background:var(--accent);color:#fff}
#toolbar button.active{background:var(--accent);color:#fff}
.sep{width:1px;height:20px;background:var(--cell-border);margin:0 4px}
#formulaBar{display:flex;align-items:center;background:var(--toolbar-bg);border-bottom:1px solid var(--cell-border);padding:2px 4px}
#cellRef{width:70px;background:var(--surface);color:var(--accent2);border:1px solid var(--cell-border);padding:3px 6px;font-size:12px;text-align:center;border-radius:3px}
#formulaInput{flex:1;background:var(--surface);color:var(--text);border:1px solid var(--cell-border);padding:3px 8px;font-size:13px;margin-left:4px;border-radius:3px;font-family:monospace}
#formulaInput:focus{border-color:var(--accent2);outline:none}
#mainArea{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#sheetContainer{flex:1;overflow:auto;position:relative}
#grid{display:grid;position:relative}
.col-header,.row-header{background:var(--header-bg);color:#aaa;font-size:11px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--cell-border);border-bottom:1px solid var(--cell-border);position:sticky;z-index:2;cursor:pointer}
.col-header{top:0;min-height:24px}
.row-header{left:0;min-width:40px}
.corner{position:sticky;top:0;left:0;z-index:3;background:var(--header-bg);border-right:1px solid var(--cell-border);border-bottom:1px solid var(--cell-border)}
.cell{background:var(--cell-bg);border-right:1px solid var(--cell-border);border-bottom:1px solid var(--cell-border);padding:1px 4px;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:cell;line-height:24px;min-height:24px}
.cell:hover{background:#1a4a7a}
.cell.selected{outline:2px solid var(--accent2);outline-offset:-1px;z-index:1}
.cell.in-range{background:var(--sel)}
.cell.editing{background:#1a2a5a;outline:2px solid var(--accent);z-index:1}
.cell-input{width:100%;height:100%;border:none;background:transparent;color:var(--text);font-size:13px;font-family:inherit;outline:none;padding:0}
#tabBar{display:flex;align-items:center;background:var(--toolbar-bg);border-top:1px solid var(--cell-border);padding:2px 4px;gap:2px;min-height:30px}
.tab{padding:4px 14px;background:var(--surface);color:#aaa;border:1px solid var(--cell-border);border-radius:4px 4px 0 0;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px}
.tab.active{background:var(--cell-bg);color:var(--text);border-bottom-color:var(--cell-bg)}
.tab .close-tab{font-size:10px;opacity:.5;cursor:pointer}
.tab .close-tab:hover{opacity:1;color:var(--accent)}
#addTab{background:transparent;border:1px dashed var(--cell-border);color:#666;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:14px}
#addTab:hover{color:var(--accent);border-color:var(--accent)}
#chartPanel{display:none;width:420px;background:var(--surface);border-left:1px solid var(--cell-border);flex-shrink:0;flex-direction:column;overflow:auto}
#chartPanel.open{display:flex}
#chartPanel h3{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--cell-border);display:flex;justify-content:space-between;align-items:center}
#chartPanel h3 span{cursor:pointer;font-size:16px}
#chartConfig{padding:8px 12px;display:flex;flex-direction:column;gap:6px;font-size:12px}
#chartConfig label{display:flex;justify-content:space-between;align-items:center}
#chartConfig input,#chartConfig select{background:var(--cell-bg);color:var(--text);border:1px solid var(--cell-border);padding:3px 6px;border-radius:3px;width:140px}
#chartCanvas{margin:8px;border-radius:6px;background:var(--bg)}
.fill-handle{width:8px;height:8px;background:var(--accent2);position:absolute;cursor:crosshair;z-index:4;border:1px solid var(--bg);border-radius:1px}
#contextMenu{position:fixed;background:var(--surface);border:1px solid var(--cell-border);border-radius:4px;padding:4px 0;z-index:100;display:none;min-width:160px;box-shadow:0 4px 16px #0008}
#contextMenu div{padding:5px 16px;font-size:12px;cursor:pointer}
#contextMenu div:hover{background:var(--accent);color:#fff}
.status-bar{background:var(--toolbar-bg);border-top:1px solid var(--cell-border);padding:3px 12px;font-size:11px;color:#888;display:flex;justify-content:space-between}
#colorPicker{position:fixed;z-index:100;display:none;background:var(--surface);border:1px solid var(--cell-border);border-radius:6px;padding:8px;box-shadow:0 4px 16px #0008}
#colorPicker .colors{display:grid;grid-template-columns:repeat(8,24px);gap:3px}
#colorPicker .swatch{width:24px;height:24px;border-radius:3px;cursor:pointer;border:2px solid transparent}
#colorPicker .swatch:hover{border-color:#fff}
</style>

<script>
const COLS=26,ROWS=100,COL_W=90,ROW_H=25,HEADER_W=40,HEADER_H=24;
const colName=c=>{let s='';c++;while(c>0){c--;s=String.fromCharCode(65+c%26)+s;c=Math.floor(c/26)}return s};
const parseRef=r=>{const m=r.match(/^([A-Z]+)(\d+)$/i);if(!m)return null;let c=0;for(let i=0;i<m[1].length;i++)c=c*26+(m[1].toUpperCase().charCodeAt(i)-64);return{col:c-1,row:parseInt(m[2])-1}};
const refStr=(c,r)=>colName(c)+(r+1);
let sheets=[],activeSheet=0,selection={col:0,row:0},selEnd=null,editing=false,undoStack=[],redoStack=[];
let fillDragging=false,fillStart=null,fillEnd=null;
let chartData=null;

function newSheetData(name){return{name,cells:{},colWidths:{},rowHeights:{}}}
function initSheets(){sheets=[newSheetData('Sheet1')];activeSheet=0;renderTabs();buildGrid();}
function getCell(r,c,sheet){const s=sheet||sheets[activeSheet];const k=r+','+c;if(!s.cells[k])s.cells[k]={raw:'',computed:null,fmt:{}};return s.cells[k]}
function setCellRaw(r,c,val,sheet){const cell=getCell(r,c,sheet);cell.raw=val;cell.computed=null;}

function pushUndo(){
  const snap=JSON.stringify(sheets[activeSheet].cells);
  undoStack.push({sheet:activeSheet,cells:snap});
  if(undoStack.length>100)undoStack.shift();
  redoStack=[];
}
function doUndo(){
  if(!undoStack.length)return;
  const s=undoStack.pop();
  redoStack.push({sheet:s.sheet,cells:JSON.stringify(sheets[s.sheet].cells)});
  sheets[s.sheet].cells=JSON.parse(s.cells);
  recalcAll();renderCells();
}
function doRedo(){
  if(!redoStack.length)return;
  const s=redoStack.pop();
  undoStack.push({sheet:s.sheet,cells:JSON.stringify(sheets[s.sheet].cells)});
  sheets[s.sheet].cells=JSON.parse(s.cells);
  recalcAll();renderCells();
}

// Formula engine
function evaluate(expr,sheet,visited){
  if(!expr||expr[0]!=='=')return expr;
  const formula=expr.substring(1);
  return evalFormula(formula,sheet||sheets[activeSheet],visited||new Set());
}

function evalFormula(f,sheet,visited){
  try{return evalExpr(f,sheet,visited)}catch(e){return '#ERROR'}
}

function resolveRange(rangeStr,sheet){
  const parts=rangeStr.split(':');
  if(parts.length!==2)return[];
  const s=parseRef(parts[0]),e=parseRef(parts[1]);
  if(!s||!e)return[];
  const vals=[];
  for(let r=Math.min(s.row,e.row);r<=Math.max(s.row,e.row);r++)
    for(let c=Math.min(s.col,e.col);c<=Math.max(s.col,e.col);c++){
      const cell=getCell(r,c,sheet);
      const v=computeCell(r,c,sheet,new Set());
      if(v!==''&&v!==null&&v!==undefined)vals.push(v);
    }
  return vals;
}

function resolveRangeWithLabels(rangeStr,sheet){
  const parts=rangeStr.split(':');
  if(parts.length!==2)return[];
  const s=parseRef(parts[0]),e=parseRef(parts[1]);
  if(!s||!e)return[];
  const rows=[];
  for(let r=Math.min(s.row,e.row);r<=Math.max(s.row,e.row);r++){
    const row=[];
    for(let c=Math.min(s.col,e.col);c<=Math.max(s.col,e.col);c++){
      row.push(computeCell(r,c,sheet,new Set()));
    }
    rows.push(row);
  }
  return rows;
}

function evalExpr(f,sheet,visited){
  // SUM
  let m=f.match(/^SUM\((.+)\)$/i);
  if(m){const vals=resolveRange(m[1],sheet);return vals.reduce((a,b)=>a+(parseFloat(b)||0),0)}
  // AVERAGE
  m=f.match(/^(?:AVG|AVERAGE)\((.+)\)$/i);
  if(m){const vals=resolveRange(m[1],sheet).map(Number).filter(v=>!isNaN(v));return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0}
  // MIN
  m=f.match(/^MIN\((.+)\)$/i);
  if(m){const vals=resolveRange(m[1],sheet).map(Number).filter(v=>!isNaN(v));return vals.length?Math.min(...vals):0}
  // MAX
  m=f.match(/^MAX\((.+)\)$/i);
  if(m){const vals=resolveRange(m[1],sheet).map(Number).filter(v=>!isNaN(v));return vals.length?Math.max(...vals):0}
  // COUNT
  m=f.match(/^COUNT\((.+)\)$/i);
  if(m){return resolveRange(m[1],sheet).filter(v=>!isNaN(Number(v))).length}
  // COUNTIF
  m=f.match(/^COUNTIF\(([^,]+),\s*(.+)\)$/i);
  if(m){
    const vals=resolveRange(m[1],sheet);
    let crit=m[2].trim().replace(/^"|"$/g,'');
    const op=crit.match(/^([><=!]+)(.*)/);
    if(op){
      const num=parseFloat(op[2]);
      return vals.filter(v=>{const n=parseFloat(v);switch(op[1]){case'>':return n>num;case'<':return n<num;case'>=':return n>=num;case'<=':return n<=num;case'<>':case'!=':return n!==num;default:return n===num}}).length;
    }
    return vals.filter(v=>String(v).toLowerCase()===crit.toLowerCase()).length;
  }
  // IF
  m=f.match(/^IF\((.+)\)$/i);
  if(m){
    const args=splitArgs(m[1]);
    if(args.length>=3){
      const cond=evalExpr(args[0].trim(),sheet,visited);
      const condVal=evalCondition(cond,args[0].trim(),sheet,visited);
      return condVal?evalArg(args[1].trim(),sheet,visited):evalArg(args[2].trim(),sheet,visited);
    }
  }
  // VLOOKUP
  m=f.match(/^VLOOKUP\((.+)\)$/i);
  if(m){
    const args=splitArgs(m[1]);
    if(args.length>=3){
      const lookup=evalArg(args[0].trim(),sheet,visited);
      const tbl=resolveRangeWithLabels(args[1].trim(),sheet);
      const colIdx=parseInt(evalArg(args[2].trim(),sheet,visited))-1;
      const exact=args.length<4||String(evalArg(args[3].trim(),sheet,visited)).toUpperCase()!=='TRUE';
      for(const row of tbl){
        if(row[0]==lookup||(typeof row[0]==='number'&&row[0]===Number(lookup)))return row[colIdx]!==undefined?row[colIdx]:'#N/A';
      }
      return '#N/A';
    }
  }
  // CONCAT
  m=f.match(/^CONCAT\((.+)\)$/i);
  if(m){const args=splitArgs(m[1]);return args.map(a=>evalArg(a.trim(),sheet,visited)).join('')}
  // ABS, ROUND, SQRT, POW
  m=f.match(/^ABS\((.+)\)$/i);
  if(m)return Math.abs(Number(evalExpr(m[1],sheet,visited)));
  m=f.match(/^ROUND\((.+)\)$/i);
  if(m){const a=splitArgs(m[1]);return Number(Number(evalExpr(a[0],sheet,visited)).toFixed(Number(evalExpr(a[1]||'0',sheet,visited))))}
  m=f.match(/^SQRT\((.+)\)$/i);
  if(m)return Math.sqrt(Number(evalExpr(m[1],sheet,visited)));
  m=f.match(/^POW\((.+)\)$/i);
  if(m){const a=splitArgs(m[1]);return Math.pow(Number(evalExpr(a[0],sheet,visited)),Number(evalExpr(a[1],sheet,visited)))}
  // SUMIF
  m=f.match(/^SUMIF\((.+)\)$/i);
  if(m){
    const args=splitArgs(m[1]);
    if(args.length>=2){
      const rng=args[0].trim(),crit=args[1].trim().replace(/^"|"$/g,'');
      const sumRng=args.length>=3?args[2].trim():rng;
      const parts1=rng.split(':'),parts2=sumRng.split(':');
      const s1=parseRef(parts1[0]),e1=parseRef(parts1[1]);
      const s2=parseRef(parts2[0]),e2=parseRef(parts2[1]);
      if(!s1||!e1||!s2||!e2)return '#ERROR';
      let sum=0,idx=0;
      const op=crit.match(/^([><=!]+)(.*)/);
      for(let r=s1.row;r<=e1.row;r++)for(let c=s1.col;c<=e1.col;c++){
        const v=computeCell(r,c,sheet,new Set());
        let match=false;
        if(op){const n=parseFloat(v),t=parseFloat(op[2]);switch(op[1]){case'>':match=n>t;break;case'<':match=n<t;break;case'>=':match=n>=t;break;case'<=':match=n<=t;break;case'<>':case'!=':match=n!==t;break;default:match=n===t}}
        else match=String(v).toLowerCase()===crit.toLowerCase();
        if(match){
          const r2=s2.row+Math.floor(idx/(e1.col-s1.col+1)),c2=s2.col+idx%(e1.col-s1.col+1);
          sum+=parseFloat(computeCell(r2,c2,sheet,new Set()))||0;
        }
        idx++;
      }
      return sum;
    }
  }
  // Cell reference
  m=f.match(/^([A-Z]+\d+)$/i);
  if(m){const ref=parseRef(m[1]);if(ref){const k=ref.row+','+ref.col;if(visited.has(k))return '#CIRC';return computeCell(ref.row,ref.col,sheet,visited)}}
  // Arithmetic: replace cell refs then eval safely
  let expr=f.replace(/([A-Z]+\d+)/gi,(match)=>{
    const ref=parseRef(match);if(!ref)return match;
    const k=ref.row+','+ref.col;if(visited.has(k))return '"#CIRC"';
    const v=computeCell(ref.row,ref.col,sheet,visited);
    return typeof v==='number'?v:isNaN(Number(v))?'"'+String(v).replace(/"/g,'\\"')+'"':Number(v);
  });
  // Safe eval for arithmetic
  if(/^[\d\s+\-*/().,"#A-Za-z]+$/.test(expr)){
    try{const r=Function('"use strict";return('+expr+')')();return r}catch(e){return '#ERROR'}
  }
  // String literal
  if(f.startsWith('"')&&f.endsWith('"'))return f.slice(1,-1);
  return f;
}

function splitArgs(s){
  const args=[];let depth=0,cur='',inStr=false;
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='(')depth++;if(ch===')')depth--;if(ch===','&&depth===0){args.push(cur);cur='';continue;}}
    cur+=ch;
  }
  if(cur)args.push(cur);
  return args;
}

function evalArg(a,sheet,visited){
  a=a.trim();
  if(a.startsWith('"')&&a.endsWith('"'))return a.slice(1,-1);
  const n=Number(a);if(!isNaN(n)&&a!=='')return n;
  return evalExpr(a,sheet,visited);
}

function evalCondition(v,expr,sheet,visited){
  const m=expr.match(/^(.+?)\s*([><=!]+)\s*(.+)$/);
  if(m){
    let left=evalArg(m[1],sheet,visited),right=evalArg(m[3],sheet,visited);
    left=isNaN(Number(left))?left:Number(left);
    right=isNaN(Number(right))?right:Number(right);
    switch(m[2]){
      case'>':return left>right;case'<':return left<right;
      case'>=':return left>=right;case'<=':return left<=right;
      case'=':case'==':return left==right;case'<>':case'!=':return left!=right;
    }
  }
  return!!v&&v!==0&&v!=='0'&&v!=='FALSE'&&v!==false;
}

function computeCell(r,c,sheet,visited){
  const k=r+','+c;
  if(visited.has(k))return'#CIRC';
  visited.add(k);
  const cell=getCell(r,c,sheet);
  if(cell.raw===''||cell.raw===null||cell.raw===undefined)return'';
  if(String(cell.raw).startsWith('=')){
    if(cell.computed!==null&&cell.computed!==undefined)return cell.computed;
    cell.computed=evaluate(cell.raw,sheet,visited);
    return cell.computed;
  }
  const n=Number(cell.raw);
  return(cell.raw!==''&&!isNaN(n))?n:cell.raw;
}

function recalcAll(){
  for(const s of sheets)for(const k in s.cells)s.cells[k].computed=null;
  for(const s of sheets)for(const k in s.cells){
    if(String(s.cells[k].raw).startsWith('=')){
      const[r,c]=k.split(',').map(Number);
      computeCell(r,c,s,new Set());
    }
  }
}

function formatValue(val,fmt){
  if(val===''||val===null||val===undefined)return'';
  const nf=fmt&&fmt.numFormat;
  if(!nf||nf==='auto'||nf==='text')return String(val);
  const n=Number(val);
  if(isNaN(n))return String(val);
  switch(nf){
    case'number':return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    case'currency':return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    case'percent':return(n*100).toFixed(1)+'%';
    case'date':{const d=new Date(n);return isNaN(d)?String(val):d.toLocaleDateString();}
  }
  return String(val);
}

// Grid rendering
let gridEl,cellEls={};

function buildGrid(){
  const container=document.getElementById('sheetContainer');
  container.innerHTML='';
  gridEl=document.createElement('div');
  gridEl.id='grid';
  gridEl.style.gridTemplateColumns=HEADER_W+'px '+Array(COLS).fill(COL_W+'px').join(' ');
  gridEl.style.gridTemplateRows=HEADER_H+'px '+Array(ROWS).fill(ROW_H+'px').join(' ');
  cellEls={};
  // Corner
  const corner=document.createElement('div');
  corner.className='corner';
  gridEl.appendChild(corner);
  // Col headers
  for(let c=0;c<COLS;c++){
    const h=document.createElement('div');
    h.className='col-header';h.textContent=colName(c);
    h.style.gridRow='1';h.style.gridColumn=(c+2);
    h.addEventListener('click',()=>selectColumn(c));
    gridEl.appendChild(h);
  }
  // Rows
  for(let r=0;r<ROWS;r++){
    const rh=document.createElement('div');
    rh.className='row-header';rh.textContent=r+1;
    rh.style.gridRow=r+2;rh.style.gridColumn='1';
    rh.addEventListener('click',()=>selectRow(r));
    gridEl.appendChild(rh);
    for(let c=0;c<COLS;c++){
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.r=r;d.dataset.c=c;
      d.style.gridRow=r+2;d.style.gridColumn=c+2;
      d.addEventListener('mousedown',e=>cellMouseDown(e,r,c));
      d.addEventListener('mouseover',e=>cellMouseOver(e,r,c));
      d.addEventListener('dblclick',e=>startEdit(r,c));
      d.addEventListener('contextmenu',e=>showContextMenu(e,r,c));
      gridEl.appendChild(d);
      cellEls[r+','+c]=d;
    }
  }
  container.appendChild(gridEl);
  renderCells();
  updateSelection();
}

function renderCells(){
  const sheet=sheets[activeSheet];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=cellEls[r+','+c];if(!el)continue;
    const cell=getCell(r,c,sheet);
    const val=computeCell(r,c,sheet,new Set());
    el.textContent=formatValue(val,cell.fmt);
    // Apply formatting
    const f=cell.fmt||{};
    el.style.fontWeight=f.bold?'bold':'';
    el.style.fontStyle=f.italic?'italic':'';
    el.style.color=f.textColor||'';
    el.style.backgroundColor=f.bgColor||'';
    el.style.textAlign=f.align||'';
    el.style.borderTop=f.borderTop||'';
    el.style.borderBottom=f.borderBottom||'';
    el.style.borderLeft=f.borderLeft||'';
    el.style.borderRight=f.borderRight||'';
  }
  updateStatusCalc();
  if(chartData)renderChart();
}

function updateSelection(){
  document.querySelectorAll('.cell.selected,.cell.in-range').forEach(el=>{el.classList.remove('selected','in-range')});
  const el=cellEls[selection.row+','+selection.col];
  if(el)el.classList.add('selected');
  if(selEnd){
    const r1=Math.min(selection.row,selEnd.row),r2=Math.max(selection.row,selEnd.row);
    const c1=Math.min(selection.col,selEnd.col),c2=Math.max(selection.col,selEnd.col);
    for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
      const el2=cellEls[r+','+c];if(el2)el2.classList.add('in-range');
    }
  }
  document.getElementById('cellRef').value=refStr(selection.col,selection.row);
  const cell=getCell(selection.row,selection.col);
  document.getElementById('formulaInput').value=cell.raw||'';
  // Update toolbar state
  document.getElementById('btnBold').classList.toggle('active',!!cell.fmt.bold);
  document.getElementById('btnItalic').classList.toggle('active',!!cell.fmt.italic);
  showFillHandle();
}

function showFillHandle(){
  let h=document.querySelector('.fill-handle');
  if(!h){h=document.createElement('div');h.className='fill-handle';document.getElementById('sheetContainer').appendChild(h)}
  const target=selEnd||selection;
  const r=Math.max(selection.row,target.row),c=Math.max(selection.col,target.col);
  const el=cellEls[r+','+c];
  if(el){
    const rect=el.getBoundingClientRect();
    const cont=document.getElementById('sheetContainer').getBoundingClientRect();
    h.style.left=(rect.right-cont.left+document.getElementById('sheetContainer').scrollLeft-4)+'px';
    h.style.top=(rect.bottom-cont.top+document.getElementById('sheetContainer').scrollTop-4)+'px';
    h.style.display='block';
  }
  h.onmousedown=e=>{e.preventDefault();e.stopPropagation();fillDragging=true;fillStart={row:selection.row,col:selection.col};fillEnd={row:r,col:c}};
}

function cellMouseDown(e,r,c){
  if(e.button===2)return;
  if(editing)commitEdit();
  if(e.shiftKey){selEnd={row:r,col:c};}
  else{selection={row:r,col:c};selEnd=null;}
  updateSelection();
  const onMove=ev=>{
    const el=document.elementFromPoint(ev.clientX,ev.clientY);
    if(el&&el.dataset&&el.dataset.r!==undefined){
      if(fillDragging){fillEnd={row:+el.dataset.r,col:+el.dataset.c};highlightFillRange()}
      else{selEnd={row:+el.dataset.r,col:+el.dataset.c};updateSelection()}
    }
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    if(fillDragging){performFill();fillDragging=false;}
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}
function cellMouseOver(e,r,c){}

function highlightFillRange(){
  document.querySelectorAll('.cell.in-range').forEach(el=>el.classList.remove('in-range'));
  if(!fillStart||!fillEnd)return;
  const r1=Math.min(fillStart.row,fillEnd.row),r2=Math.max(fillStart.row,fillEnd.row);
  const c1=Math.min(fillStart.col,fillEnd.col),c2=Math.max(fillStart.col,fillEnd.col);
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
    const el=cellEls[r+','+c];if(el)el.classList.add('in-range');
  }
}

function performFill(){
  if(!fillStart||!fillEnd)return;
  pushUndo();
  const sr=selection.row,sc=selection.col;
  const er=selEnd?selEnd.row:sr,ec=selEnd?selEnd.col:sc;
  const srcR1=Math.min(sr,er),srcR2=Math.max(sr,er);
  const srcC1=Math.min(sc,ec),srcC2=Math.max(sc,ec);
  const dstR1=Math.min(fillStart.row,fillEnd.row),dstR2=Math.max(fillStart.row,fillEnd.row);
  const dstC1=Math.min(fillStart.col,fillEnd.col),dstC2=Math.max(fillStart.col,fillEnd.col);
  const sheet=sheets[activeSheet];
  // Determine fill direction and fill
  if(dstR2>srcR2){ // fill down
    for(let r=srcR2+1;r<=dstR2;r++)for(let c=srcC1;c<=srcC2;c++){
      const srcCell=getCell(srcR1+((r-srcR1-1)%(srcR2-srcR1+1)),c,sheet);
      const raw=adjustFormula(srcCell.raw,r-(srcR1+((r-srcR1-1)%(srcR2-srcR1+1))),0);
      setCellRaw(r,c,raw,sheet);
      getCell(r,c,sheet).fmt={...srcCell.fmt};
    }
  }else if(dstR1<srcR1){ // fill up
    for(let r=dstR1;r<srcR1;r++)for(let c=srcC1;c<=srcC2;c++){
      const srcCell=getCell(srcR2-((srcR1-r-1)%(srcR2-srcR1+1)),c,sheet);
      setCellRaw(r,c,adjustFormula(srcCell.raw,r-srcR1,0),sheet);
      getCell(r,c,sheet).fmt={...srcCell.fmt};
    }
  }
  if(dstC2>srcC2){ // fill right
    for(let r=srcR1;r<=srcR2;r++)for(let c=srcC2+1;c<=dstC2;c++){
      const srcCell=getCell(r,srcC1+((c-srcC1-1)%(srcC2-srcC1+1)),sheet);
      setCellRaw(r,c,adjustFormula(srcCell.raw,0,c-(srcC1+((c-srcC1-1)%(srcC2-srcC1+1)))),sheet);
      getCell(r,c,sheet).fmt={...srcCell.fmt};
    }
  }
  recalcAll();renderCells();updateSelection();saveToStorage();
}

function adjustFormula(raw,dRow,dCol){
  if(!raw||!String(raw).startsWith('='))return raw;
  return raw.replace(/([A-Z]+)(\d+)/gi,(m,col,row)=>{
    let c=0;for(let i=0;i<col.length;i++)c=c*26+(col.toUpperCase().charCodeAt(i)-64);
    c=c-1+dCol;const r=parseInt(row)-1+dRow;
    if(c<0||r<0)return m;
    return colName(c)+(r+1);
  });
}

function startEdit(r,c){
  if(editing)commitEdit();
  editing=true;selection={row:r,col:c};selEnd=null;
  const el=cellEls[r+','+c];
  el.classList.add('editing');
  const cell=getCell(r,c);
  const inp=document.createElement('input');
  inp.className='cell-input';inp.value=cell.raw||'';
  el.textContent='';el.appendChild(inp);inp.focus();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commitEdit();moveSel(1,0)}
    else if(e.key==='Tab'){e.preventDefault();commitEdit();moveSel(0,e.shiftKey?-1:1)}
    else if(e.key==='Escape'){cancelEdit()}
  });
}

function commitEdit(){
  if(!editing)return;
  editing=false;
  const el=cellEls[selection.row+','+selection.col];
  const inp=el.querySelector('input');
  if(inp){
    pushUndo();
    setCellRaw(selection.row,selection.col,inp.value);
    recalcAll();
  }
  el.classList.remove('editing');
  renderCells();updateSelection();saveToStorage();
}

function cancelEdit(){
  if(!editing)return;
  editing=false;
  const el=cellEls[selection.row+','+selection.col];
  el.classList.remove('editing');
  renderCells();updateSelection();
}

function moveSel(dr,dc){
  selection.row=Math.max(0,Math.min(ROWS-1,selection.row+dr));
  selection.col=Math.max(0,Math.min(COLS-1,selection.col+dc));
  selEnd=null;updateSelection();
  // Scroll into view
  const el=cellEls[selection.row+','+selection.col];
  if(el)el.scrollIntoView({block:'nearest',inline:'nearest'});
}

function selectRow(r){selection={row:r,col:0};selEnd={row:r,col:COLS-1};updateSelection()}
function selectColumn(c){selection={row:0,col:c};selEnd={row:ROWS-1,col:c};updateSelection()}

// Keyboard
document.addEventListener('keydown',e=>{
  if(editing&&e.target.classList.contains('cell-input'))return;
  if(e.target===document.getElementById('formulaInput')){
    if(e.key==='Enter'){
      pushUndo();
      setCellRaw(selection.row,selection.col,e.target.value);
      recalcAll();renderCells();updateSelection();saveToStorage();
      moveSel(1,0);e.preventDefault();
    }else if(e.key==='Escape'){
      updateSelection();e.target.blur();
    }
    return;
  }
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'){e.preventDefault();doUndo();return}
    if(e.key==='y'){e.preventDefault();doRedo();return}
    if(e.key==='c'){copySelection();return}
    if(e.key==='v'){pasteSelection();return}
    if(e.key==='x'){cutSelection();return}
    if(e.key==='b'){e.preventDefault();toggleFormat('bold');return}
    if(e.key==='i'){e.preventDefault();toggleFormat('italic');return}
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    e.preventDefault();
    pushUndo();
    forEachSelected((r,c)=>setCellRaw(r,c,''));
    recalcAll();renderCells();updateSelection();saveToStorage();
    return;
  }
  switch(e.key){
    case'ArrowUp':e.preventDefault();moveSel(-1,0);break;
    case'ArrowDown':e.preventDefault();moveSel(1,0);break;
    case'ArrowLeft':e.preventDefault();moveSel(0,-1);break;
    case'ArrowRight':e.preventDefault();moveSel(0,1);break;
    case'Tab':e.preventDefault();moveSel(0,e.shiftKey?-1:1);break;
    case'Enter':e.preventDefault();startEdit(selection.row,selection.col);break;
    case'F2':e.preventDefault();startEdit(selection.row,selection.col);break;
    default:
      if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
        startEdit(selection.row,selection.col);
        const inp=cellEls[selection.row+','+selection.col].querySelector('input');
        if(inp){inp.value=e.key;inp.setSelectionRange(1,1)}
        e.preventDefault();
      }
  }
});

function forEachSelected(fn){
  const r1=selEnd?Math.min(selection.row,selEnd.row):selection.row;
  const r2=selEnd?Math.max(selection.row,selEnd.row):selection.row;
  const c1=selEnd?Math.min(selection.col,selEnd.col):selection.col;
  const c2=selEnd?Math.max(selection.col,selEnd.col):selection.col;
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)fn(r,c);
}

// Clipboard
let clipboard=null,clipCut=false;
function copySelection(){
  clipboard=[];clipCut=false;
  const r1=selEnd?Math.min(selection.row,selEnd.row):selection.row;
  const c1=selEnd?Math.min(selection.col,selEnd.col):selection.col;
  forEachSelected((r,c)=>{
    const cell=getCell(r,c);
    clipboard.push({dr:r-r1,dc:c-c1,raw:cell.raw,fmt:{...cell.fmt}});
  });
}
function cutSelection(){copySelection();clipCut=true;pushUndo();forEachSelected((r,c)=>setCellRaw(r,c,''));recalcAll();renderCells();saveToStorage()}
function pasteSelection(){
  if(!clipboard)return;
  pushUndo();
  clipboard.forEach(({dr,dc,raw,fmt})=>{
    const r=selection.row+dr,c=selection.col+dc;
    if(r<ROWS&&c<COLS){setCellRaw(r,c,raw);getCell(r,c).fmt={...fmt}}
  });
  if(clipCut){clipCut=false;clipboard=null}
  recalcAll();renderCells();updateSelection();saveToStorage();
}

// Formatting
function toggleFormat(prop){
  pushUndo();
  if(prop==='alignLeft'||prop==='alignCenter'||prop==='alignRight'){
    const align=prop==='alignLeft'?'left':prop==='alignCenter'?'center':'right';
    forEachSelected((r,c)=>getCell(r,c).fmt.align=align);
  }else{
    const first=getCell(selection.row,selection.col);
    const newVal=!first.fmt[prop];
    forEachSelected((r,c)=>getCell(r,c).fmt[prop]=newVal);
  }
  renderCells();updateSelection();saveToStorage();
}

function applyNumberFormat(fmt){
  pushUndo();
  forEachSelected((r,c)=>getCell(r,c).fmt.numFormat=fmt);
  recalcAll();renderCells();saveToStorage();
}

function applyBorder(style){
  pushUndo();
  const bdr='1px solid #e0e0e0';
  forEachSelected((r,c)=>{
    const f=getCell(r,c).fmt;
    if(style==='all'){f.borderTop=bdr;f.borderBottom=bdr;f.borderLeft=bdr;f.borderRight=bdr}
    else if(style==='outer'){/* simplified - apply to all */f.borderTop=bdr;f.borderBottom=bdr;f.borderLeft=bdr;f.borderRight=bdr}
    else if(style==='bottom'){f.borderBottom=bdr}
    else if(style==='none'){f.borderTop='';f.borderBottom='';f.borderLeft='';f.borderRight=''}
  });
  renderCells();saveToStorage();
  document.getElementById('borderStyle').value='';
}

function addSheet(){

}
function switchSheet(i){

// CSV Import/Export
function exportCSV(){
  const sheet=sheets[activeSheet];let maxR=0,maxC=0;
  for(const k in sheet.cells){const[r,c]=k.split(',').map(Number);if(sheet.cells[k].raw!==''){maxR=Math.max(maxR,r);maxC=Math.max(maxC,c)}}
  let csv='';
  for(let r=0;r<=maxR;r++){
    const row=[];
    for(let c=0;c<=maxC;c++){
      let val=String(computeCell(r,c,sheet,new Set()));
      if(val.includes(',')||val.includes('"')||val.includes('\n'))val='"'+val.replace(/"/g,'""')+'"';
      row.push(val);
    }
    csv+=row.join(',')+'\n';
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(sheet.name||'sheet')+'.csv';a.click();
  URL.revokeObjectURL(a.href);
}

function importCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      pushUndo();
      const lines=parseCSVLines(ev.target.result);
      lines.forEach((row,r)=>row.forEach((val,c)=>{if(r<ROWS&&c<COLS)setCellRaw(r,c,val)}));
      recalcAll();renderCells();saveToStorage();
    };
    reader.readAsText(file);
  };
  inp.click();
}

function parseCSVLines(text){
  const rows=[];let row=[],cell='',inQuote=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQuote){
      if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++}else inQuote=false}
      else cell+=ch;
    }else{
      if(ch==='"')inQuote=true;
      else if(ch===','){row.push(cell);cell=''}
      else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(cell);rows.push(row);row=[];cell=''}
      else cell+=ch;
    }
  }
  if(cell||row.length)row.push(cell);
  if(row.length)rows.push(row);
  return rows;
}

// Context menu
function showContextMenu(e,r,c){
  e.preventDefault();
  const menu=document.getElementById('contextMenu');
  menu.innerHTML='';
  const items=[
    {label:'Cut',fn:cutSelection},{label:'Copy',fn:copySelection},{label:'Paste',fn:pasteSelection},
    {label:'─────',fn:null},
    {label:'Insert Row Above',fn:()=>insertRow(r)},{label:'Insert Row Below',fn:()=>insertRow(r+1)},
    {label:'Delete Row',fn:()=>deleteRow(r)},
    {label:'Insert Column Left',fn:()=>insertCol(c)},{label:'Insert Column Right',fn:()=>insertCol(c+1)},
    {label:'Delete Column',fn:()=>deleteCol(c)},
    {label:'─────',fn:null},
    {label:'Clear Contents',fn:()=>{pushUndo();forEachSelected((r2,c2)=>setCellRaw(r2,c2,''));recalcAll();renderCells();saveToStorage()}},
    {label:'Clear Formatting',fn:()=>{pushUndo();forEachSelected((r2,c2)=>getCell(r2,c2).fmt={});renderCells();saveToStorage()}}
  ];
  items.forEach(({label,fn})=>{
    const d=document.createElement('div');d.textContent=label;
    if(fn)d.onclick=()=>{fn();menu.style.display='none'};
    else d.style.cssText='color:#555;cursor:default;padding:1px 16px';
    menu.appendChild(d);
  });
  menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';menu.style.display='block';
  setTimeout(()=>document.addEventListener('click',()=>menu.style.display='none',{once:true}),10);
}

function insertRow(at){
  pushUndo();
  const sheet=sheets[activeSheet];const newCells={};
  for(const k in sheet.cells){
    const[r,c]=k.split(',').map(Number);
    if(r>=at)newCells[(r+1)+','+c]=sheet.cells[k];
    else newCells[k]=sheet.cells[k];
  }
  sheet.cells=newCells;recalcAll();renderCells();saveToStorage();
}
function deleteRow(at){
  pushUndo();
  const sheet=sheets[activeSheet];const newCells={};
  for(const k in sheet.cells){
    const[r,c]=k.split(',').map(Number);
    if(r===at)continue;
    if(r>at)newCells[(r-1)+','+c]=sheet.cells[k];
    else newCells[k]=sheet.cells[k];
  }
  sheet.cells=newCells;recalcAll();renderCells();saveToStorage();
}
function insertCol(at){
  pushUndo();
  const sheet=sheets[activeSheet];const newCells={};
  for(const k in sheet.cells){
    const[r,c]=k.split(',').map(Number);
    if(c>=at)newCells[r+','+(c+1)]=sheet.cells[k];
    else newCells[k]=sheet.cells[k];
  }
  sheet.cells=newCells;recalcAll();renderCells();saveToStorage();
}
function deleteCol(at){
  pushUndo();
  const sheet=sheets[activeSheet];const newCells={};
  for(const k in sheet.cells){
    const[r,c]=k.split(',').map(Number);
    if(c===at)continue;
    if(c>at)newCells[r+','+(c-1)]=sheet.cells[k];
    else newCells[k]=sheet.cells[k];
  }
  sheet.cells=newCells;recalcAll();renderCells();saveToStorage();
}

// Status bar calculation
function updateStatusCalc(){
  if(!selEnd){document.getElementById('statusCalc').textContent='';return}
  const vals=[];
  forEachSelected((r,c)=>{const v=computeCell(r,c,sheets[activeSheet],new Set());if(v!==''&&!isNaN(Number(v)))vals.push(Number(v))});
  if(vals.length){
    const sum=vals.reduce((a,b)=>a+b,0);
    const avg=sum/vals.length;
    document.getElementById('statusCalc').textContent=`Sum: ${sum.toFixed(2)}  Avg: ${avg.toFixed(2)}  Count: ${vals.length}  Min: ${Math.min(...vals).toFixed(2)}  Max: ${Math.max(...vals).toFixed(2)}`;
  }else{
    const cnt=[];forEachSelected((r,c)=>{const v=computeCell(r,c,sheets[activeSheet],new Set());if(v!=='')cnt.push(v)});
    document.getElementById('statusCalc').textContent=cnt.length?`Count: ${cnt.length}`:'';
  }
}

// Charts
function toggleChartPanel(){
  const p=document.getElementById('chartPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')&&selEnd){
    document.getElementById('chartRange').value=refStr(Math.min(selection.col,selEnd.col),Math.min(selection.row,selEnd.row))+':'+refStr(Math.max(selection.col,selEnd.col),Math.max(selection.row,selEnd.row));
  }
}

function renderChart(){
  const canvas=document.getElementById('chartCanvas');
  const ctx=canvas.getContext('2d');
  const type=document.getElementById('chartType').value;
  const range=document.getElementById('chartRange').value;
  const title=document.getElementById('chartTitle').value;
  if(!range)return;
  const data=resolveRangeWithLabels(range,sheets[activeSheet]);
  if(!data.length)return;
  chartData={type,range,title};
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // Determine labels (first column) and series (remaining columns)
  const hasLabels=data[0].length>1&&isNaN(Number(data[0][0]));
  const labels=hasLabels?data.map(r=>String(r[0])):data.map((_,i)=>''+( i+1));
  const series=data.map(r=>hasLabels?r.slice(1).map(Number):r.map(Number));
  const numSeries=series[0]?series[0].length:0;
  const colors=['#e94560','#0ea5e9','#ffd93d','#6bcb77','#9b59b6','#f97316','#ec4899','#14b8a6'];
  // Title
  ctx.fillStyle='#e0e0e0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText(title||'Chart',W/2,20);
  if(type==='pie'){
    const vals=series.map(r=>Math.abs(r[0]||0));
    const total=vals.reduce((a,b)=>a+b,0)||1;
    let angle=-Math.PI/2;const cx=W/2-40,cy=H/2+10,radius=Math.min(W,H)/2-50;
    vals.forEach((v,i)=>{
      const slice=v/total*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,radius,angle,angle+slice);
      ctx.fillStyle=colors[i%colors.length];ctx.fill();
      // Label
      const mid=angle+slice/2;
      const lx=cx+Math.cos(mid)*(radius+18),ly=cy+Math.sin(mid)*(radius+18);
      ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText(labels[i],lx,ly);
      angle+=slice;
    });
    // Legend
    const lx=W-80;
    vals.forEach((v,i)=>{
      ctx.fillStyle=colors[i%colors.length];ctx.fillRect(lx,36+i*16,10,10);
      ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='left';
      ctx.fillText(labels[i]+' ('+Math.round(v/total*100)+'%)',lx+14,46+i*16);
    });
  }else{
    const pad={top:40,right:20,bottom:50,left:55};
    const gw=W-pad.left-pad.right,gh=H-pad.top-pad.bottom;
    const allVals=series.flat().filter(v=>!isNaN(v));
    let maxVal=Math.max(...allVals,0),minVal=Math.min(...allVals,0);
    if(maxVal===minVal){maxVal+=1;minVal-=1}
    const range2=maxVal-minVal||1;
    // Grid lines
    ctx.strokeStyle='#333';ctx.lineWidth=0.5;
    const steps=5;
    for(let i=0;i<=steps;i++){
      const y=pad.top+gh-gh*(i/steps);
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+gw,y);ctx.stroke();
      ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='right';
      ctx.fillText((minVal+(range2*i/steps)).toFixed(1),pad.left-5,y+3);
    }
    // X labels
    const barGroupW=gw/labels.length;
    labels.forEach((l,i)=>{
      const x=pad.left+barGroupW*i+barGroupW/2;
      ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.save();ctx.translate(x,H-pad.bottom+14);ctx.rotate(labels.length>10?-0.5:0);
      ctx.fillText(l.length>8?l.substring(0,7)+'…':l,0,0);ctx.restore();
    });
    const zeroY=pad.top+gh-gh*((0-minVal)/range2);
    if(type==='bar'){
      const bw=barGroupW/(numSeries+1);
      series.forEach((row,i)=>row.forEach((v,s)=>{
        if(isNaN(v))return;
        const x=pad.left+barGroupW*i+bw*(s+0.5);
        const h=gh*(v-minVal)/range2;const y=pad.top+gh-h;
        ctx.fillStyle=colors[s%colors.length];
        ctx.fillRect(x,Math.min(y,zeroY),bw-2,Math.abs(y-zeroY)||1);
      }));
    }else if(type==='line'){
      for(let s=0;s<numSeries;s++){
        ctx.strokeStyle=colors[s%colors.length];ctx.lineWidth=2;ctx.beginPath();
        series.forEach((row,i)=>{
          const v=row[s];if(isNaN(v))return;
          const x=pad.left+barGroupW*i+barGroupW/2;
          const y=pad.top+gh-gh*((v-minVal)/range2);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        });
        ctx.stroke();
        // Dots
        ctx.fillStyle=colors[s%colors.length];
        series.forEach((row,i)=>{
          const v=row[s];if(isNaN(v))return;
          const x=pad.left+barGroupW*i+barGroupW/2;
          const y=pad.top+gh-gh*((v-minVal)/range2);
          ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
        });
      }
    }
    // Series legend if multiple
    if(numSeries>1){
      for(let s=0;s<numSeries;s++){
        ctx.fillStyle=colors[s%colors.length];ctx.fillRect(pad.left+s*70,H-12,10,8);
        ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='left';
        ctx.fillText('Series '+(s+1),pad.left+s*70+13,H-5);
      }
    }
  }
}

// localStorage
const STORAGE_KEY='mega-spreadsheet-data';
function saveToStorage(){
  try{
    const data={sheets:sheets.map(s=>({name:s.name,cells:s.cells})),activeSheet};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  }catch(e){}
}
function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    sheets=data.sheets.map(s=>{const sh=newSheetData(s.name);sh.cells=s.cells||{};return sh});
    activeSheet=data.activeSheet||0;
    return true;
  }catch(e){return false}
}

// Init
if(!loadFromStorage())initSheets();
else{renderTabs();buildGrid()}
recalcAll();renderCells();updateSelection();
document.getElementById('statusInfo').textContent='Mega Spreadsheet — '+sheets.reduce((n,s)=>n+Object.keys(s.cells).filter(k=>s.cells[k].raw!=='').length,0)+' cells';
</script>
