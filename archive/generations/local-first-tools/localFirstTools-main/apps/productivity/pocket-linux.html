<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Linux — RappterZoo</title>
<meta name="description" content="A complete fake Linux desktop in one HTML file: boot, login, window manager, terminal, files, paint, calculator, monitor, clock.">
<meta name="rappterzoo:author" content="agent">
<meta name="rappterzoo:author-type" content="agent">
<meta name="rappterzoo:category" content="productivity">
<meta name="rappterzoo:tags" content="desktop,linux,terminal,filesystem,window-manager,os-simulator">
<meta name="rappterzoo:type" content="interactive">
<meta name="rappterzoo:complexity" content="advanced">
<meta name="rappterzoo:created" content="2026-05-03">
<meta name="rappterzoo:generation" content="1">
<meta name="rappterzoo:experience" content="discovery">
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --panel:#1c2128; --panel2:#22272e;
  --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  --green:#3fb950; --red:#f85149; --yellow:#d29922; --purple:#bc8cff;
  --titlebar:#2d333b; --shadow:0 8px 32px rgba(0,0,0,0.5);
}
.light{
  --bg:#f6f8fa; --bg2:#eaeef2; --panel:#ffffff; --panel2:#f0f3f6;
  --border:#d0d7de; --text:#1f2328; --muted:#656d76; --accent:#0969da;
  --titlebar:#eaeef2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:"SF Mono","Monaco","Menlo","Ubuntu Mono","Consolas",monospace;background:#000;color:var(--text);user-select:none}
button,input,textarea{font-family:inherit;color:inherit;background:transparent;border:none;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#666}

/* === BOOT SCREEN === */
#boot{position:fixed;inset:0;background:#000;color:#c9d1d9;font-family:"Courier New",monospace;font-size:13px;padding:20px;overflow:hidden;z-index:1000}
#boot .line{white-space:pre;line-height:1.4;opacity:0;animation:bootLine .05s forwards}
#boot .line.ok{color:#3fb950}
#boot .line.warn{color:#d29922}
#boot .line.err{color:#f85149}
#boot .line.info{color:#58a6ff}
@keyframes bootLine{to{opacity:1}}
#cursor{display:inline-block;width:8px;height:14px;background:#c9d1d9;animation:blink 1s infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}

/* === GRUB MENU === */
#grub{position:fixed;inset:0;background:#000;color:#c9d1d9;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1001;font-family:"Courier New",monospace}
#grub h1{color:#58a6ff;margin-bottom:30px;font-size:24px;letter-spacing:4px}
#grub .menu{border:2px solid #30363d;padding:0;width:600px;background:#0d1117}
#grub .menu .item{padding:12px 20px;border-bottom:1px solid #30363d}
#grub .menu .item.sel{background:#58a6ff;color:#000}
#grub .menu .item:last-child{border-bottom:none}
#grub .hint{margin-top:20px;color:#8b949e;font-size:12px;text-align:center;line-height:1.6}
#grub .countdown{margin-top:10px;color:#d29922}

/* === LOGIN === */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);display:none;align-items:center;justify-content:center;z-index:1002;flex-direction:column}
#login::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(88,166,255,0.1),transparent 40%),radial-gradient(circle at 80% 70%,rgba(188,140,255,0.1),transparent 40%)}
.login-card{background:rgba(28,33,40,0.85);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:40px;min-width:340px;box-shadow:var(--shadow);position:relative;z-index:1}
.login-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#bc8cff);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#000}
.login-card h2{text-align:center;margin-bottom:20px;font-size:20px}
.login-card input{width:100%;padding:10px 14px;background:#0d1117;border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:12px;font-size:14px;user-select:auto}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:10px;background:var(--accent);color:#000;border-radius:6px;font-weight:bold;margin-top:8px}
.login-card button:hover{filter:brightness(1.1)}
.login-card .err{color:var(--red);font-size:12px;text-align:center;min-height:16px;margin-top:8px}
.login-clock{position:absolute;top:30px;right:40px;color:#8b949e;font-size:14px;z-index:2}

/* === DESKTOP === */
#desktop{position:fixed;inset:0;display:none;overflow:hidden;background:var(--bg)}
#wallpaper{position:absolute;inset:0;z-index:0}
.wp-stars{background:radial-gradient(ellipse at center,#1a1f2e 0%,#000 100%)}
.wp-grad{background:linear-gradient(135deg,#0d1117 0%,#1a1a3a 35%,#3a1a5c 75%,#1a1a3a 100%);background-size:400% 400%;animation:wpGrad 20s ease infinite}
@keyframes wpGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.wp-aurora{background:linear-gradient(135deg,#001233,#003566,#006494,#003566);background-size:400% 400%;animation:wpGrad 25s ease infinite}
#starfield{position:absolute;inset:0;pointer-events:none}

/* === MENU BAR === */
#menubar{position:absolute;top:0;left:0;right:0;height:28px;background:rgba(13,17,23,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;z-index:100;font-size:12px;gap:14px}
#menubar .item{padding:4px 8px;border-radius:4px;cursor:pointer}
#menubar .item:hover{background:rgba(255,255,255,0.08)}
#menubar .spacer{flex:1}
#menubar .clock{color:var(--text);font-variant-numeric:tabular-nums}
#menubar .tray{display:flex;gap:10px;align-items:center;color:var(--muted)}
#menubar .tray .icon{cursor:pointer}
#menubar .tray .icon:hover{color:var(--text)}

/* === APP LAUNCHER === */
.dropdown{position:absolute;background:rgba(28,33,40,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:200px;box-shadow:var(--shadow);z-index:200;font-size:13px}
.dropdown .entry{padding:8px 12px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:10px}
.dropdown .entry:hover{background:rgba(88,166,255,0.15)}
.dropdown .entry .ico{font-size:16px;width:20px;text-align:center}
.dropdown .sep{height:1px;background:var(--border);margin:6px 0}

/* === DOCK === */
#dock{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(28,33,40,0.7);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;padding:6px;display:flex;gap:4px;z-index:90;box-shadow:var(--shadow)}
.dock-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:transform .15s,background .15s;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(0,0,0,0.1))}
.dock-icon:hover{transform:translateY(-6px) scale(1.1);background:linear-gradient(180deg,rgba(88,166,255,0.2),rgba(88,166,255,0.05))}
.dock-icon .dot{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0}
.dock-icon.running .dot{opacity:1}
.dock-icon .tip{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.dock-icon:hover .tip{opacity:1}

/* === WINDOWS === */
.window{position:absolute;background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:280px;min-height:180px;overflow:hidden;animation:winOpen .2s ease-out}
@keyframes winOpen{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.window.closing{animation:winClose .15s ease-in forwards}
@keyframes winClose{to{opacity:0;transform:scale(.96)}}
.window.minim{animation:winMin .2s ease-in forwards}
@keyframes winMin{to{opacity:0;transform:scale(.3) translateY(400px)}}
.window.max{border-radius:0}
.titlebar{height:32px;background:var(--titlebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;cursor:move;user-select:none;flex-shrink:0}
.titlebar .controls{display:flex;gap:6px;margin-right:10px}
.titlebar .btn{width:12px;height:12px;border-radius:50%;cursor:pointer;border:none}
.titlebar .btn.close{background:#ff5f57}
.titlebar .btn.min{background:#febc2e}
.titlebar .btn.max{background:#28c840}
.titlebar .btn:hover{filter:brightness(1.2)}
.titlebar .title{font-size:12px;color:var(--muted);flex:1;text-align:center;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.titlebar .icon{font-size:14px;margin-right:6px}
.window.active .titlebar{background:var(--panel2)}
.window.active .titlebar .title{color:var(--text)}
.win-body{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.resize{position:absolute;background:transparent;z-index:5}
.resize.r{top:0;right:-3px;width:6px;height:100%;cursor:ew-resize}
.resize.b{left:0;bottom:-3px;width:100%;height:6px;cursor:ns-resize}
.resize.l{top:0;left:-3px;width:6px;height:100%;cursor:ew-resize}
.resize.t{left:0;top:-3px;width:100%;height:6px;cursor:ns-resize}
.resize.br{bottom:-3px;right:-3px;width:14px;height:14px;cursor:nwse-resize}
.resize.bl{bottom:-3px;left:-3px;width:14px;height:14px;cursor:nesw-resize}
.resize.tr{top:-3px;right:-3px;width:14px;height:14px;cursor:nesw-resize}
.resize.tl{top:-3px;left:-3px;width:14px;height:14px;cursor:nwse-resize}

/* === CONTEXT MENU === */
#ctxmenu{position:absolute;background:rgba(28,33,40,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:6px;padding:4px;min-width:180px;display:none;z-index:300;font-size:13px;box-shadow:var(--shadow)}
#ctxmenu .entry{padding:6px 12px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:10px}
#ctxmenu .entry:hover{background:var(--accent);color:#000}
#ctxmenu .sep{height:1px;background:var(--border);margin:4px 0}

/* === TERMINAL === */
.terminal{flex:1;background:#0a0e14;color:#c9d1d9;padding:8px 10px;font-family:"SF Mono","Monaco","Consolas",monospace;font-size:13px;overflow-y:auto;line-height:1.4;user-select:text;cursor:text}
.terminal .prompt-line{display:flex;flex-wrap:wrap}
.terminal .prompt{color:#3fb950;white-space:pre}
.terminal .path{color:#58a6ff}
.terminal .cmd-input{flex:1;min-width:50px;background:transparent;border:none;outline:none;color:#c9d1d9;font:inherit}
.terminal .out{white-space:pre-wrap;word-break:break-all}
.terminal .out.err{color:#f85149}
.terminal .out.info{color:#58a6ff}

/* === FILE MANAGER === */
.fm{display:flex;flex:1;overflow:hidden}
.fm .sidebar{width:160px;background:var(--bg2);border-right:1px solid var(--border);padding:8px;overflow-y:auto;font-size:12px}
.fm .sidebar .heading{color:var(--muted);font-size:10px;text-transform:uppercase;padding:8px 4px 4px}
.fm .sidebar .item{padding:5px 8px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:6px}
.fm .sidebar .item:hover{background:rgba(255,255,255,0.05)}
.fm .sidebar .item.active{background:var(--accent);color:#000}
.fm .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.fm .toolbar{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg2);align-items:center;font-size:12px}
.fm .toolbar button{padding:4px 8px;border-radius:4px;color:var(--text)}
.fm .toolbar button:hover{background:rgba(255,255,255,0.08)}
.fm .toolbar button:disabled{opacity:.4;cursor:default}
.fm .pathbar{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;color:var(--muted)}
.fm .grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;align-content:start}
.fm .file{padding:8px 4px;border-radius:6px;text-align:center;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;word-break:break-word}
.fm .file:hover{background:rgba(88,166,255,0.1)}
.fm .file.sel{background:rgba(88,166,255,0.25)}
.fm .file .ico{font-size:32px}
.fm .statusbar{padding:4px 8px;border-top:1px solid var(--border);background:var(--bg2);font-size:11px;color:var(--muted)}

/* === EDITOR === */
.editor{display:flex;flex:1;flex-direction:column;background:#0d1117}
.editor .toolbar{padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:6px;font-size:12px}
.editor .toolbar button{padding:3px 8px;border-radius:3px;color:var(--text)}
.editor .toolbar button:hover{background:rgba(255,255,255,0.08)}
.editor .toolbar input{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;color:var(--text);user-select:auto}
.editor .work{flex:1;display:flex;overflow:hidden;position:relative}
.editor .gutter{background:var(--bg2);color:var(--muted);padding:8px 6px;font-family:"SF Mono",monospace;font-size:12px;line-height:1.5;text-align:right;user-select:none;overflow:hidden;border-right:1px solid var(--border);min-width:38px}
.editor .area{flex:1;position:relative;overflow:hidden}
.editor .pre{position:absolute;inset:0;padding:8px;font-family:"SF Mono",monospace;font-size:12px;line-height:1.5;white-space:pre;pointer-events:none;color:var(--text);overflow:auto}
.editor textarea{position:absolute;inset:0;padding:8px;background:transparent;color:transparent;caret-color:var(--text);font-family:"SF Mono",monospace;font-size:12px;line-height:1.5;border:none;resize:none;white-space:pre;overflow:auto;user-select:auto}
.editor .status{padding:3px 10px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.tk-kw{color:#ff7b72}
.tk-str{color:#a5d6ff}
.tk-num{color:#79c0ff}
.tk-com{color:#8b949e;font-style:italic}
.tk-tag{color:#7ee787}
.tk-fn{color:#d2a8ff}
.tk-h{color:#bc8cff;font-weight:bold}

/* === PAINT === */
.paint{display:flex;flex:1;flex-direction:column;background:var(--bg2)}
.paint .toolbar{padding:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);font-size:12px}
.paint .toolbar button{padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--panel)}
.paint .toolbar button.act{background:var(--accent);color:#000;border-color:var(--accent)}
.paint .toolbar input[type=color]{width:30px;height:24px;border:none;cursor:pointer;border-radius:4px;padding:0;background:none}
.paint .toolbar input[type=range]{width:80px}
.paint .canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#444;padding:16px}
.paint canvas{background:#fff;cursor:crosshair;box-shadow:0 0 0 1px #000;display:block}

/* === CALC === */
.calc{display:flex;flex:1;flex-direction:column;background:var(--bg2);padding:8px;gap:6px}
.calc .display{background:#000;color:#3fb950;font-family:"SF Mono",monospace;font-size:24px;text-align:right;padding:14px;border-radius:6px;min-height:60px;word-break:break-all;border:1px solid var(--border)}
.calc .display .sub{color:var(--muted);font-size:12px;min-height:14px;text-align:right}
.calc .keys{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;flex:1}
.calc .keys button{background:var(--panel);border:1px solid var(--border);border-radius:5px;font-size:14px;color:var(--text);min-height:32px}
.calc .keys button:hover{background:var(--titlebar)}
.calc .keys button.op{background:#d29922;color:#000;border-color:#d29922}
.calc .keys button.eq{background:var(--accent);color:#000;border-color:var(--accent)}
.calc .keys button.fn{background:var(--bg)}
.calc .keys button.clr{background:var(--red);color:#fff;border-color:var(--red)}

/* === MONITOR === */
.mon{display:flex;flex:1;flex-direction:column;background:var(--bg)}
.mon .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);font-size:12px}
.mon .tabs button{padding:8px 14px;border-bottom:2px solid transparent;color:var(--muted)}
.mon .tabs button.act{color:var(--accent);border-bottom-color:var(--accent)}
.mon .tab-body{flex:1;overflow:auto;padding:10px}
.mon .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.mon .stat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px}
.mon .stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase}
.mon .stat .val{font-size:22px;color:var(--accent);font-weight:bold;margin-top:4px}
.mon .stat .sub{font-size:11px;color:var(--muted)}
.mon canvas{width:100%;height:80px;background:#000;border-radius:4px;display:block}
.mon .charts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mon .chart h4{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.mon table{width:100%;font-size:12px;border-collapse:collapse}
.mon th{background:var(--bg2);text-align:left;padding:6px;font-size:11px;color:var(--muted);text-transform:uppercase;position:sticky;top:0}
.mon td{padding:5px 6px;border-bottom:1px solid var(--border);font-family:"SF Mono",monospace;font-size:11px}
.mon tr:hover td{background:var(--bg2)}
.mon .killbtn{color:var(--red);cursor:pointer;background:none;font-size:11px}

/* === CLOCK === */
.clk{display:flex;flex:1;flex-direction:column;background:var(--bg)}
.clk .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);font-size:12px}
.clk .tabs button{padding:8px 14px;color:var(--muted)}
.clk .tabs button.act{color:var(--accent);background:var(--bg)}
.clk .tab-body{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;align-items:center;gap:14px}
.clk canvas.analog{background:radial-gradient(circle,#1c2128,#0d1117);border-radius:50%;border:3px solid var(--border)}
.clk .digital{font-family:"SF Mono",monospace;font-size:48px;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:2px}
.clk .date{font-size:14px;color:var(--muted)}
.clk .sw{font-family:"SF Mono",monospace;font-size:54px;color:var(--green);font-variant-numeric:tabular-nums}
.clk .sw-laps{font-size:12px;font-family:"SF Mono",monospace;color:var(--muted);max-height:120px;overflow:auto;width:100%;text-align:center}
.clk .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.clk .controls button{padding:8px 16px;background:var(--accent);color:#000;border-radius:6px;font-size:13px;font-weight:bold}
.clk .controls button.danger{background:var(--red);color:#fff}
.clk .controls button.alt{background:var(--titlebar);color:var(--text)}
.clk input{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);user-select:auto}

/* === NOTIFICATION === */
#notify{position:absolute;top:40px;right:10px;display:flex;flex-direction:column;gap:8px;z-index:500;pointer-events:none}
.note{background:rgba(28,33,40,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:240px;box-shadow:var(--shadow);font-size:12px;animation:noteIn .25s;pointer-events:auto}
@keyframes noteIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.note.fade{animation:noteOut .3s forwards}
@keyframes noteOut{to{transform:translateX(120%);opacity:0}}
.note .ttl{font-weight:bold;margin-bottom:2px;color:var(--accent)}

/* === DIALOG === */
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:600}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;min-width:300px;max-width:500px;box-shadow:var(--shadow)}
.modal-box h3{margin-bottom:10px;font-size:14px}
.modal-box p{font-size:13px;color:var(--muted);margin-bottom:14px}
.modal-box input{width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);margin-bottom:12px;user-select:auto}
.modal-box .actions{display:flex;gap:8px;justify-content:flex-end}
.modal-box button{padding:6px 14px;border-radius:4px;font-size:13px}
.modal-box button.primary{background:var(--accent);color:#000;font-weight:bold}
.modal-box button.alt{background:var(--titlebar);color:var(--text)}
</style>
</head>
<body>

<!-- Boot screen -->
<div id="boot"></div>

<!-- GRUB menu -->
<div id="grub">
  <h1>POCKET LINUX BOOT MENU</h1>
  <div class="menu" id="grub-menu"></div>
  <div class="hint">Use ↑ ↓ keys to select, Enter to boot.<div class="countdown" id="grub-countdown"></div></div>
</div>

<!-- Login -->
<div id="login">
  <div class="login-clock" id="login-clock"></div>
  <div class="login-card">

"use strict";
const $ = (s,r)=>(r||document).querySelector(s);
const $$ = (s,r)=>[...(r||document).querySelectorAll(s)];
const ce = (t,c,h)=>{const e=document.createElement(t); if(c) e.className=c; if(h!=null) e.innerHTML=h; return e;};
const esc = s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = ms=>new Promise(r=>setTimeout(r,ms));
const pad = (n,w)=>String(n).padStart(w||2,"0");
const fmtBytes = b=>{ if(b<1024)return b+" B"; if(b<1048576)return (b/1024).toFixed(1)+" KB"; if(b<1073741824)return (b/1048576).toFixed(1)+" MB"; return (b/1073741824).toFixed(2)+" GB";};

// ----- Storage -----
const STORE_KEY = "pocket-linux-state-v1";
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(typeof s !== "object" || s === null) throw new Error("bad");
    return s;
  }catch(e){
    console.warn("State corrupted, resetting:", e);
    try{ localStorage.removeItem(STORE_KEY); }catch(_){}
    return null;
  }
}
function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(STATE));
  }catch(e){
    notify("Disk full","Cannot write to localStorage: "+e.message);
  }
}

// Simple non-cryptographic hash for password (offline toy use)
function hash(s){
  let h = 0x811c9dc5;
  for(let i=0;i<s.length;i++){ h = (h ^ s.charCodeAt(i)) >>> 0; h = Math.imul(h, 0x01000193) >>> 0; }
  let h2 = 0xdeadbeef;
  for(let i=s.length-1;i>=0;i--){ h2 = (h2 ^ s.charCodeAt(i)) >>> 0; h2 = Math.imul(h2, 0x85ebca6b) >>> 0; }
  return ("00000000"+h.toString(16)).slice(-8) + ("00000000"+h2.toString(16)).slice(-8);
}

// ----- Initial state / virtual filesystem -----
function defaultState(){
  return {
    user: "user",
    host: "pocket-linux",
    pwHash: null,
    theme: "dark",
    wallpaper: "wp-grad",
    bootCount: 0,
    cwd: "/home/user",
    fs: defaultFs(),
    history: [],
    procSeed: 1000
  };
}
function defaultFs(){
  const f = {};
  const mk = (path, type, content)=>{ f[path] = { type, content: content==null?"":content, mtime: Date.now() - Math.floor(Math.random()*1e8) }; };
  mk("/", "dir");
  mk("/bin", "dir");
  mk("/etc", "dir");
  mk("/home", "dir");
  mk("/home/user", "dir");
  mk("/home/user/Documents", "dir");
  mk("/home/user/Pictures", "dir");
  mk("/home/user/Downloads", "dir");
  mk("/tmp", "dir");
  mk("/usr", "dir");
  mk("/usr/share", "dir");
  mk("/var", "dir");
  mk("/var/log", "dir");
  mk("/home/user/welcome.txt", "file",
"Welcome to Pocket Linux!\n========================\n\nThis is a complete Linux desktop simulator running entirely in your browser.\n\nThings to try:\n  * Open the Terminal and type 'help'\n  * Browse files with the File Manager\n  * Doodle in Paint\n  * Watch processes in System Monitor\n  * Toggle dark/light theme from the menu bar\n\nEverything is saved to localStorage. Your wallpaper, files,\npassword and preferences will persist between visits.\n\nEnjoy exploring! - The Pocket Linux Team\n");
  mk("/home/user/Documents/README.md", "file",
"# Pocket Linux Notes\n\nThis is a **markdown** file. The text editor will syntax-highlight headings,\ncode blocks, and emphasis.\n\n## Features\n- Multitasking window manager\n- Virtual filesystem stored in localStorage\n- Working terminal with pipes\n\n## Code\n\n    function hello(name){ return 'hi '+name; }\n\nGo wild.\n");
  mk("/home/user/Documents/hello.js", "file",
"// Tiny JavaScript demo\nfunction greet(name){\n  const msg = 'Hello, ' + name + '!';\n  console.log(msg);\n  return msg;\n}\n\n// Try running this in your head:\nfor(let i=0; i<3; i++){\n  greet('world ' + i);\n}\n");
  mk("/etc/passwd", "file",
"root:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nuser:x:1000:1000:Pocket User,,,:/home/user:/bin/bash\nnobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin\n");
  mk("/etc/hostname","file","pocket-linux\n");
  mk("/etc/os-release","file",'NAME="Pocket Linux"\nVERSION="1.0 (Tabby)"\nID=pocketlinux\nPRETTY_NAME="Pocket Linux 1.0"\nHOME_URL="https://kody-w.github.io/localFirstTools-main/"\n');
  mk("/var/log/syslog","file",
"May  3 09:14:01 pocket-linux systemd[1]: Started Daily apt activities.\nMay  3 09:14:02 pocket-linux kernel: [ 0.000000] Linux version 6.1.0-pocket\nMay  3 09:14:03 pocket-linux NetworkManager: <info>  device (wlan0): supplicant connected\nMay  3 09:14:05 pocket-linux systemd-logind: New session opened for user user.\nMay  3 09:15:21 pocket-linux dhclient: bound to 192.168.1.42 -- renewal in 1800 seconds.\n");
  mk("/usr/share/quotes.txt","file",
"\"The most likely way for the world to be destroyed is by accident.\" -- John von Neumann\n\"Talk is cheap. Show me the code.\" -- Linus Torvalds\n\"There are two ways of constructing software: make it so simple there are obviously no deficiencies, or make it so complicated there are no obvious deficiencies.\" -- Tony Hoare\n\"Programs must be written for people to read.\" -- Hal Abelson\n");
  return f;
}

let STATE = loadState();
if(!STATE){ STATE = defaultState(); saveState(); }
else {
  // Backfill any missing keys from default to be resilient to schema changes
  const def = defaultState();
  for(const k in def) if(!(k in STATE)) STATE[k] = def[k];
  if(typeof STATE.fs !== "object" || !STATE.fs["/"]) STATE.fs = defaultFs();
}

// ----- VFS helpers -----
const VFS = {
  norm(path){
    if(!path) return STATE.cwd || "/";
    if(path[0] !== "/") path = (STATE.cwd||"/").replace(/\/$/,"") + "/" + path;
    const parts = path.split("/").filter(Boolean);
    const out = [];
    for(const p of parts){
      if(p === ".") continue;
      else if(p === "..") out.pop();
      else out.push(p);
    }
    return "/" + out.join("/");
  },
  exists(p){ return !!STATE.fs[this.norm(p)]; },
  isDir(p){ const n=this.norm(p); return STATE.fs[n] && STATE.fs[n].type === "dir"; },
  isFile(p){ const n=this.norm(p); return STATE.fs[n] && STATE.fs[n].type === "file"; },
  read(p){ const n=this.norm(p); if(!STATE.fs[n]) throw new Error("No such file: "+n); if(STATE.fs[n].type!=="file") throw new Error("Is a directory: "+n); return STATE.fs[n].content; },
  write(p, content){ const n=this.norm(p); const parent=n.replace(/\/[^/]*$/,"")||"/"; if(!this.isDir(parent)) throw new Error("Parent does not exist: "+parent); STATE.fs[n] = { type:"file", content: String(content), mtime: Date.now() }; saveState(); },
  mkdir(p){ const n=this.norm(p); if(STATE.fs[n]) throw new Error("Already exists: "+n); const parent=n.replace(/\/[^/]*$/,"")||"/"; if(!this.isDir(parent)) throw new Error("Parent does not exist: "+parent); STATE.fs[n] = { type:"dir", content:"", mtime: Date.now() }; saveState(); },
  rm(p, recursive){ const n=this.norm(p); if(!STATE.fs[n]) throw new Error("No such: "+n); if(n==="/") throw new Error("Refusing to remove /"); if(STATE.fs[n].type==="dir"){ const ch=this.list(n); if(ch.length && !recursive) throw new Error("Directory not empty (use -r): "+n); for(const c of ch) this.rm(n+"/"+c, true); } delete STATE.fs[n]; saveState(); },
  mv(a,b){ const A=this.norm(a), B=this.norm(b); if(!STATE.fs[A]) throw new Error("No such: "+A); if(STATE.fs[B] && STATE.fs[B].type==="dir"){ const name = A.split("/").pop(); return this.mv(A, B+"/"+name); } STATE.fs[B] = STATE.fs[A]; delete STATE.fs[A]; if(STATE.fs[B].type==="dir"){ // rename children
    for(const k of Object.keys(STATE.fs)){ if(k.startsWith(A+"/")){ const newK = B + k.substring(A.length); STATE.fs[newK] = STATE.fs[k]; delete STATE.fs[k]; } }
  } saveState(); },
  cp(a,b){ const A=this.norm(a), B=this.norm(b); if(!STATE.fs[A]) throw new Error("No such: "+A); if(STATE.fs[A].type==="dir") throw new Error("cp: directory copy not supported"); let dst = B; if(STATE.fs[B] && STATE.fs[B].type==="dir") dst = B+"/"+A.split("/").pop(); STATE.fs[dst] = { type:"file", content: STATE.fs[A].content, mtime: Date.now() }; saveState(); },
  list(p){ const n=this.norm(p).replace(/\/$/,"")||""; const prefix = n + "/"; const set = new Set(); for(const k of Object.keys(STATE.fs)){ if(k===n||k==="/"&&n==="") continue; if(n===""){ const m = k.match(/^\/([^/]+)/); if(m) set.add(m[1]); } else if(k.startsWith(prefix)){ const rest = k.substring(prefix.length); if(rest && !rest.includes("/")) set.add(rest); } } return [...set].sort(); },
  stat(p){ return STATE.fs[this.norm(p)] || null; },
  size(p){ const s=this.stat(p); if(!s) return 0; if(s.type==="dir") return this.list(p).length; return s.content.length; },
};

async function grubMenu(){
  const grub = $("#grub");
  const menu = $("#grub-menu");
  const cd = $("#grub-countdown");
  const items = [
    "Pocket Linux 1.0 (default)",
    "Pocket Linux 1.0 (recovery mode)",
    "Memory test (memtest86+)",
    "System setup",
  ];
  let sel = 0;
  function render(){
    menu.innerHTML = items.map((t,i)=>'<div class="item'+(i===sel?' sel':'')+'">'+esc(t)+'</div>').join("");
  }
  render();
  grub.style.display = "flex";
  let secs = 4;
  cd.textContent = "Auto-boot in "+secs+"s";
  let go = false;
  const t = setInterval(()=>{ secs--; cd.textContent = "Auto-boot in "+secs+"s"; if(secs<=0){ clearInterval(t); if(!go){ go=true; finish(); } }}, 1000);
  function finish(){
    grub.style.display = "none";
    document.removeEventListener("keydown", onKey);
    showLogin();
  }
  function onKey(e){
    if(e.key==="ArrowUp"){ sel = (sel-1+items.length)%items.length; render(); }
    else if(e.key==="ArrowDown"){ sel = (sel+1)%items.length; render(); }
    else if(e.key==="Enter"){ go=true; clearInterval(t); finish(); }
  }
  document.addEventListener("keydown", onKey);
}

function showLogin(){
  const lg = $("#login");
  const av = $("#login-avatar");
  const title = $("#login-title");
  const pw = $("#login-pass");
  const pw2 = $("#login-pass2");
  const btn = $("#login-btn");
  const err = $("#login-err");
  av.textContent = (STATE.user||"u").charAt(0).toUpperCase();
  title.textContent = STATE.user + "@" + STATE.host;
  const firstBoot = !STATE.pwHash;
  if(firstBoot){
    pw.placeholder = "Choose a password";
    pw2.style.display = "block";
    btn.textContent = "Create account";
    err.textContent = "First boot — set your password (any text, even empty).";
    err.style.color = "var(--muted)";
  }else{
    pw2.style.display = "none";
    btn.textContent = "Sign in";
  }
  function tickClock(){
    const d = new Date();
    $("#login-clock").textContent = pad(d.getHours())+":"+pad(d.getMinutes())+" • "+d.toDateString();
  }
  tickClock();
  const ci = setInterval(tickClock, 1000);
  lg.style.display = "flex";
  setTimeout(()=>pw.focus(), 100);
  function attempt(){
    err.style.color = "var(--red)";
    if(firstBoot){
      if(pw.value !== pw2.value){ err.textContent = "Passwords do not match"; return; }
      STATE.pwHash = hash(pw.value);
      saveState();
    }else{
      if(hash(pw.value) !== STATE.pwHash){ err.textContent = "Incorrect password"; pw.value=""; pw.focus(); return; }
    }
    clearInterval(ci);
    lg.style.display = "none";
    err.textContent = "";
    pw.value = ""; pw2.value = "";
    STATE.bootCount = (STATE.bootCount||0) + 1;
    saveState();
    startDesktop();
  }
  btn.onclick = attempt;
  function onKey(e){ if(e.key==="Enter"){ if(firstBoot && document.activeElement===pw){ pw2.focus(); return; } attempt(); } }
  pw.onkeydown = onKey; pw2.onkeydown = onKey;
}

// ============================================================
const PROCESSES = []; // {pid, name, cpu, mem, kind, win}
let WIN_Z = 100;
const WINDOWS = {}; // id -> {el, app, ...}
let nextWinId = 1;

function startDesktop(){
  $("#desktop").style.display = "block";
  document.body.classList.toggle("light", STATE.theme === "light");
  // Wallpaper
  $("#wallpaper").className = STATE.wallpaper || "wp-grad";
  initStarfield();
  // Menu bar clock
  setInterval(()=>{ const d=new Date(); $("#m-clock").textContent = pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds()); }, 1000);
  $("#m-clock").textContent = (()=>{ const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds()); })();
  // Tray
  $("#tray-theme").onclick = toggleTheme;
  // Dock
  buildDock();
  // Launcher menu
  $("#m-launcher").onclick = (e)=>{ e.stopPropagation(); showLauncher(e.currentTarget); };
  $("#m-file").onclick = (e)=>{ e.stopPropagation(); showFileMenu(e.currentTarget); };
  $("#m-edit").onclick = (e)=>{ e.stopPropagation(); showEditMenu(e.currentTarget); };
  $("#m-view").onclick = (e)=>{ e.stopPropagation(); showViewMenu(e.currentTarget); };
  $("#m-help").onclick = (e)=>{ e.stopPropagation(); openApp("about"); };
  // Right-click
  $("#desktop").addEventListener("contextmenu", e=>{
    if(e.target.closest(".window")) return;
    e.preventDefault();
    showContextMenu(e.clientX, e.clientY, [
      {label:"Open Terminal", icon:"⌨", action:()=>openApp("terminal")},
      {label:"Open File Manager", icon:"📁", action:()=>openApp("files")},
      {sep:true},
      {label:"Toggle theme", icon:"◐", action:toggleTheme},
      {label:"Change wallpaper ▸", icon:"🖼", action:cycleWallpaper},
      {sep:true},
      {label:"About Pocket Linux", icon:"ⓘ", action:()=>openApp("about")},
    ]);
  });
  // Click to dismiss menus
  document.addEventListener("click", ()=>{ closeDropdowns(); $("#ctxmenu").style.display="none"; });
  // Keyboard shortcuts
  document.addEventListener("keydown", desktopKeys);
  // Background processes
  initBackgroundProcesses();
  // Welcome notify on first boot
  if(STATE.bootCount === 1){
    setTimeout(()=>notify("Welcome!", "First boot complete. Try opening a terminal."), 700);
  }else{
    setTimeout(()=>notify("Welcome back", "Boot #"+STATE.bootCount+" — uptime starting fresh."), 500);
  }
  // Auto-open file manager first time
  if(STATE.bootCount === 1) setTimeout(()=>openApp("about"), 1200);
}

function initStarfield(){
  const c = $("#starfield");
  if(!c) return;
  const ctx = c.getContext("2d");
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  resize();
  addEventListener("resize", resize);
  const stars = Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+0.2,s:Math.random()*0.3+0.05,p:Math.random()*Math.PI*2}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const t = performance.now()/1000;
    for(const s of stars){
      s.y += s.s;
      if(s.y > c.height){ s.y = 0; s.x = Math.random()*c.width; }
      const alpha = 0.4 + 0.6*Math.abs(Math.sin(t + s.p));
      ctx.fillStyle = "rgba(255,255,255,"+alpha.toFixed(2)+")";
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
}

function toggleTheme(){
  STATE.theme = STATE.theme === "dark" ? "light" : "dark";

    el.onclick = ()=>openApp(app.id);
    dock.appendChild(el);
  }
}
function refreshDock(){
  for(const el of $$(".dock-icon")){

function showViewMenu(a){
  closeDropdowns();
  const dd = ce("div","dropdown");
  dd.style.top="30px"; dd.style.left=a.offsetLeft+"px";
  const items = [
    {l:"Toggle theme", a:toggleTheme},
    {l:"Change wallpaper", a:cycleWallpaper},
    {sep:true},
    {l:"Close all windows", a:closeAllWindows},
  ];
  for(const it of items){
    if(it.sep){ dd.appendChild(ce("div","sep")); continue; }
    const e = ce("div","entry","<span class='ico'></span>"+esc(it.l));
    e.onclick = ()=>{ closeDropdowns(); it.a(); };
    dd.appendChild(e);
  }
  document.body.appendChild(dd);
}
function closeDropdowns(){ for(const d of $$(".dropdown")) d.remove(); }

function showContextMenu(x,y,items){
  const m = $("#ctxmenu");
  m.innerHTML = "";
  for(const it of items){
    if(it.sep){ m.appendChild(ce("div","sep")); continue; }
    const e = ce("div","entry","<span style='width:18px;text-align:center'>"+(it.icon||"")+"</span>"+esc(it.label));
    e.onclick = ()=>{ m.style.display = "none"; it.action(); };
    m.appendChild(e);
  }
  m.style.left = Math.min(x, innerWidth-200)+"px";
  m.style.top  = Math.min(y, innerHeight-200)+"px";
  m.style.display = "block";
}

function notify(title, body, ms){
  const wrap = $("#notify");
  const n = ce("div","note",'<div class="ttl">'+esc(title)+'</div>'+esc(body));
  wrap.appendChild(n);
  setTimeout(()=>{ n.classList.add("fade"); setTimeout(()=>n.remove(), 320); }, ms||3500);
}

function lockScreen(){
  const lg = $("#login");
  $("#login-pass").value = "";
  $("#login-err").textContent = "";
  $("#login-pass2").style.display = "none";
  $("#login-btn").textContent = "Unlock";
  lg.style.display = "flex";

}
function reboot(){
  saveState();
  closeAllWindows();
  $("#desktop").style.display = "none";
  document.removeEventListener("keydown", desktopKeys);
  bootSequence();
}
function resetFs(){
  confirmModal("Reset filesystem","This will erase all files and restore defaults. Continue?",()=>{
    STATE.fs = defaultFs(); saveState(); notify("Done","Filesystem restored to defaults.");
    for(const id in WINDOWS){ if(WINDOWS[id].app === "files" || WINDOWS[id].app === "editor") closeWindow(id); }
  });
}

function desktopKeys(e){
  // Cmd/Ctrl+Q to close active window
  const isMod = e.metaKey || e.ctrlKey;
  if(isMod && e.key.toLowerCase() === "q"){
    e.preventDefault();
    const top = topWindow();
    if(top) closeWindow(top.id);
    return;
  }
  // Cmd/Ctrl+Tab to cycle
  if(isMod && e.key === "Tab"){
    e.preventDefault();
    cycleWindows();
    return;
  }
  // Esc closes ctx menu
  if(e.key === "Escape"){ $("#ctxmenu").style.display="none"; closeDropdowns(); }
}
function topWindow(){
  let t=null, z=-1;
  for(const id in WINDOWS){ const w=WINDOWS[id]; const wz = parseInt(w.el.style.zIndex||0); if(wz>z){ z=wz; t=w; } }
  return t;
}
function cycleWindows(){
  const ids = Object.keys(WINDOWS);
  if(ids.length<2) return;
  const sorted = ids.sort((a,b)=>parseInt(WINDOWS[b].el.style.zIndex||0)-parseInt(WINDOWS[a].el.style.zIndex||0));
  focusWindow(sorted[1]);
}
function closeAllWindows(){ for(const id of Object.keys(WINDOWS)) closeWindow(id); }

function openApp(id, params){
  const app = APPS.find(a=>a.id===id);
  if(!app) return;
  // single-instance for some
  if(["calc","monitor","clock","about"].includes(id)){
    for(const wid in WINDOWS){ if(WINDOWS[wid].app===id){ focusWindow(wid); return WINDOWS[wid]; } }
  }
  return createWindow(app, params);
}

function createWindow(app, params){
  const id = "w"+(nextWinId++);
  const el = ce("div","window active");
  el.id = id;
  const w = app.w, h = app.h;
  const cx = innerWidth/2 - w/2, cy = innerHeight/2 - h/2;
  const off = (Object.keys(WINDOWS).length % 6) * 24;
  el.style.left = Math.max(20, cx+off-60) + "px";
  el.style.top  = Math.max(36, cy+off-60) + "px";
  el.style.width = w + "px";
  el.style.height = h + "px";
  el.style.zIndex = ++WIN_Z;

  const tb = ce("div","titlebar");
  tb.innerHTML = '<div class="controls"><button class="btn close"></button><button class="btn min"></button><button class="btn max"></button></div><span class="icon">'+app.icon+'</span><span class="title">'+esc(app.name)+'</span>';
  el.appendChild(tb);
  const body = ce("div","win-body");
  el.appendChild(body);
  for(const r of ["t","r","b","l","tl","tr","bl","br"]){ el.appendChild(ce("div","resize "+r)); }

  $("#windows").appendChild(el);

  const winObj = { id, el, app:app.id, name:app.name, body, titleEl: tb.querySelector(".title"), title: app.name, iconEl: tb.querySelector(".icon"), pid: registerProcess(app.name, id) };
  WINDOWS[id] = winObj;

  // Controls
  tb.querySelector(".close").onclick = (e)=>{ e.stopPropagation(); closeWindow(id); };
  tb.querySelector(".min").onclick   = (e)=>{ e.stopPropagation(); minimizeWindow(id); };
  tb.querySelector(".max").onclick   = (e)=>{ e.stopPropagation(); toggleMax(id); };
  tb.ondblclick = ()=>toggleMax(id);

  // Drag
  makeDraggable(el, tb);
  // Resize
  for(const r of $$(".resize", el)) makeResizable(el, r);
  // Focus on click
  el.addEventListener("mousedown", ()=>focusWindow(id), true);

  focusWindow(id);

  // Build content
  try{ app.build(winObj, params); }catch(e){ body.innerHTML = '<div style="padding:20px;color:#f85149">App crashed: '+esc(e.message)+'</div>'; console.error(e); }
  refreshDock();
  return winObj;
}

function focusWindow(id){
  const w = WINDOWS[id]; if(!w) return;
  for(const k in WINDOWS) WINDOWS[k].el.classList.remove("active");
  w.el.classList.add("active");
  w.el.style.zIndex = ++WIN_Z;
}
function closeWindow(id){
  const w = WINDOWS[id]; if(!w) return;
  w.closing = true;
  w.el.classList.add("closing");
  // unregister process
  const idx = PROCESSES.findIndex(p=>p.win===id);
  if(idx>=0) PROCESSES.splice(idx,1);
  if(w.onClose) try{ w.onClose(); }catch(_){}
  setTimeout(()=>{ w.el.remove(); delete WINDOWS[id]; refreshDock(); }, 150);
}
function minimizeWindow(id){
  const w = WINDOWS[id]; if(!w) return;
  w.el.style.display = "none";
}
function toggleMax(id){
  const w = WINDOWS[id]; if(!w) return;
  if(w.el.classList.contains("max")){
    w.el.classList.remove("max");
    if(w.preMax){ Object.assign(w.el.style, w.preMax); }
  }else{
    w.preMax = { left:w.el.style.left, top:w.el.style.top, width:w.el.style.width, height:w.el.style.height };
    w.el.classList.add("max");
    Object.assign(w.el.style, { left:"0px", top:"28px", width:innerWidth+"px", height:(innerHeight-28-66)+"px" });
  }
}
function setWindowTitle(win, t){
  win.title = t;
  win.titleEl.textContent = t;
}

function makeDraggable(el, handle){
  handle.addEventListener("mousedown", e=>{
    if(e.target.classList.contains("btn")) return;
    if(el.classList.contains("max")) return;
    const sx=e.clientX, sy=e.clientY;
    const r = el.getBoundingClientRect();
    const ox = r.left, oy = r.top;
    function mv(ev){
      const nx = Math.max(0, Math.min(innerWidth-60, ox + ev.clientX - sx));
      const ny = Math.max(28, Math.min(innerHeight-60, oy + ev.clientY - sy));
      el.style.left = nx+"px"; el.style.top = ny+"px";
    }
    function up(){ removeEventListener("mousemove",mv); removeEventListener("mouseup",up); }
    addEventListener("mousemove", mv); addEventListener("mouseup", up);
  });
}
function makeResizable(el, handle){
  handle.addEventListener("mousedown", e=>{
    e.stopPropagation();
    if(el.classList.contains("max")) return;
    const r = el.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sw = r.width, sh = r.height, sl = r.left, st = r.top;
    const cls = handle.className;
    function mv(ev){
      let nw=sw, nh=sh, nl=sl, nt=st;
      if(cls.includes("r")) nw = Math.max(280, sw + (ev.clientX - sx));
      if(cls.includes("b")) nh = Math.max(140, sh + (ev.clientY - sy));
      if(cls.includes("l")){ const dx = ev.clientX - sx; nw = Math.max(280, sw - dx); nl = sl + (sw - nw); }
      if(cls.includes("t")){ const dy = ev.clientY - sy; nh = Math.max(140, sh - dy); nt = Math.max(28, st + (sh - nh)); }
      el.style.width = nw+"px"; el.style.height = nh+"px";
      el.style.left = nl+"px"; el.style.top = nt+"px";
    }
    function up(){ removeEventListener("mousemove",mv); removeEventListener("mouseup",up); }
    addEventListener("mousemove", mv); addEventListener("mouseup", up);
  });
}

function registerProcess(name, win){
  const pid = ++STATE.procSeed;
  PROCESSES.push({ pid, name, cpu: Math.random()*5, mem: 20+Math.random()*120, kind:"app", win, started: Date.now() });
  return pid;
}
function initBackgroundProcesses(){
  PROCESSES.length = 0;
  const bg = ["systemd","kthreadd","init","NetworkManager","sshd","dbus-daemon","cron","udevd","rsyslogd","avahi-daemon","polkitd","cupsd","accounts-daemon","colord","chrony","gdm-session-worker","wpa_supplicant","gvfsd","tracker-miner","whoopsie"];
  for(const n of bg){
    PROCESSES.push({ pid: ++STATE.procSeed, name: n, cpu: Math.random()*1.5, mem: 5+Math.random()*60, kind:"bg", win:null, started: Date.now()-Math.floor(Math.random()*1e7) });
  }
  saveState();
}
function killProcess(pid){
  const p = PROCESSES.find(p=>p.pid===pid);
  if(!p) return false;
  if(p.win){ closeWindow(p.win); return true; }
  if(p.kind==="bg"){ const i=PROCESSES.indexOf(p); PROCESSES.splice(i,1); return true; }
  return false;
}

function buildTerminal(win){
  const term = ce("div","terminal");
  win.body.appendChild(term);
  setWindowTitle(win, STATE.user+"@"+STATE.host+": ~");

  const motd = "Pocket Linux 1.0 (tabby) — kernel 6.1.0-pocket\nLast login: "+new Date().toLocaleString()+" on tty1\nType 'help' for available commands.\n";
  printOut(term, motd);

  const histLocal = STATE.history.slice();
  let histIdx = histLocal.length;

  function newPromptLine(){
    const line = ce("div","prompt-line");
    const cwdShort = STATE.cwd.replace("/home/"+STATE.user, "~");
    const prompt = ce("span","prompt"); prompt.textContent = STATE.user+"@"+STATE.host+":";
    const path = ce("span","path"); path.textContent = cwdShort;
    const dollar = ce("span","prompt"); dollar.textContent = "$ ";
    const inp = ce("input","cmd-input");
    inp.spellcheck = false; inp.autocapitalize="off"; inp.autocomplete="off";
    line.appendChild(prompt); line.appendChild(path); line.appendChild(dollar); line.appendChild(inp);
    term.appendChild(line);
    inp.focus();
    inp.onkeydown = onKey;
    setTimeout(()=>{ term.scrollTop = term.scrollHeight; },0);
    return inp;
  }

  function onKey(e){
    const inp = e.target;
    if(e.key === "Enter"){
      const cmd = inp.value;
      inp.disabled = true;
      // freeze the prompt line (replace input with text)
      const repl = document.createElement("span"); repl.textContent = cmd; repl.style.color="#c9d1d9";
      inp.replaceWith(repl);
      if(cmd.trim()){
        STATE.history.push(cmd); if(STATE.history.length>500) STATE.history.shift(); saveState();
        histLocal.push(cmd);
      }
      histIdx = histLocal.length;
      runPipeline(cmd, term).finally(()=>{
        setWindowTitle(win, STATE.user+"@"+STATE.host+": "+STATE.cwd.replace("/home/"+STATE.user,"~"));
        newPromptLine();
      });
    }
    else if(e.key === "ArrowUp"){
      e.preventDefault();
      if(histIdx>0){ histIdx--; inp.value = histLocal[histIdx]||""; setTimeout(()=>inp.setSelectionRange(inp.value.length,inp.value.length),0); }
    }
    else if(e.key === "ArrowDown"){
      e.preventDefault();
      if(histIdx<histLocal.length-1){ histIdx++; inp.value = histLocal[histIdx]||""; }
      else { histIdx = histLocal.length; inp.value=""; }
    }
    else if(e.key === "Tab"){
      e.preventDefault();
      const v = inp.value;
      const parts = v.split(/\s+/);
      const last = parts[parts.length-1] || "";
      let pool = [];
      if(parts.length===1){
        pool = Object.keys(COMMANDS);
      }else{
        // file completion
        const dir = last.includes("/") ? last.replace(/\/[^/]*$/,"") || "/" : ".";
        try{
          pool = VFS.list(VFS.norm(dir)).map(n => (last.includes("/") ? dir.replace(/\/$/,"")+"/"+n : n) + (VFS.isDir(VFS.norm((last.includes("/") ? dir.replace(/\/$/,"")+"/" : "")+n)) ? "/" : ""));
        }catch(_){}
      }
      const matches = pool.filter(p=>p.startsWith(last));
      if(matches.length===1){
        parts[parts.length-1] = matches[0];
        inp.value = parts.join(" ");
      } else if(matches.length>1){
        const out = ce("div","out"); out.textContent = matches.join("  ");
        term.insertBefore(out, inp.parentElement);
      }
    }
    else if(e.key === "c" && e.ctrlKey){
      const repl = document.createElement("span"); repl.textContent = inp.value+"^C"; repl.style.color="#c9d1d9";
      inp.replaceWith(repl);
      newPromptLine();
    }
    else if(e.key === "l" && e.ctrlKey){
      e.preventDefault();
      term.innerHTML = "";
      newPromptLine();
    }
  }

  newPromptLine();
  term.addEventListener("click", e=>{
    if(window.getSelection().toString()) return;
    const last = term.querySelector(".prompt-line:last-child .cmd-input");
    if(last) last.focus();
  });
}

function printOut(term, text, cls){
  if(!text) return;
  const parts = String(text).split(/\n/);
  for(let i=0;i<parts.length;i++){
    if(i===parts.length-1 && parts[i]==="") break;
    const o = ce("div","out"+(cls?" "+cls:""));
    o.textContent = parts[i];
    term.appendChild(o);
  }
  term.scrollTop = term.scrollHeight;
}

function tokenize(line){
  // Splits a single command into argv, respecting quotes
  const out = [];
  let cur = "", q = null;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(q){
      if(c===q){ q=null; }
      else cur += c;
    } else if(c==='"' || c==="'"){
      q = c;
    } else if(c===" " || c==="\t"){
      if(cur){ out.push(cur); cur=""; }
    } else cur += c;
  }
  if(cur) out.push(cur);
  return out;
}

async function runPipeline(line, term){
  line = line.trim();
  if(!line) return;
  // Split on ';' for sequential commands at top level (basic)
  const segments = line.split(/;(?![^"]*"[^"]*$)/);
  for(const seg of segments){
    if(seg.trim()) await runOnePipeline(seg.trim(), term);
  }
}
async function runOnePipeline(line, term){
  // Detect redirects on the LAST stage only
  let outRedirect = null, append = false;
  let m = line.match(/(.*?)\s*(>>|>)\s*(\S+)\s*$/);
  if(m){ line = m[1]; append = m[2] === ">>"; outRedirect = m[3]; }
  // Split pipes
  const stages = line.split(/\|/).map(s=>s.trim()).filter(Boolean);
  let pipeInput = "";
  let finalOut = "";
  for(let i=0;i<stages.length;i++){
    const argv = tokenize(stages[i]);
    if(!argv.length) continue;
    const cmd = argv.shift();
    const builtin = COMMANDS[cmd];
    if(!builtin){
      printOut(term, cmd+": command not found", "err");
      return;
    }
    const isLast = i === stages.length-1;
    const captureOutput = !isLast || outRedirect;
    const ctx = {
      argv, term, stdin: pipeInput, capture: captureOutput,
      out: "", err: "",
      print(s){ if(captureOutput) ctx.out += (s.endsWith("\n")?s:s+"\n"); else printOut(term, s); },
      printErr(s){ if(captureOutput) ctx.err += (s.endsWith("\n")?s:s+"\n"); else printOut(term, s, "err"); },
      printRaw(s){ if(captureOutput) ctx.out += s; else printOut(term, s); }
    };
    try{
      await builtin(ctx);
    }catch(e){
      ctx.printErr(cmd+": "+e.message);
    }
    pipeInput = ctx.out;
    if(ctx.err && !captureOutput) {} // already printed
    if(ctx.err && captureOutput) printOut(term, ctx.err.replace(/\n$/,""), "err");
    finalOut = ctx.out;
  }
  if(outRedirect){
    try{
      const target = VFS.norm(outRedirect);
      const existing = (append && VFS.isFile(target)) ? VFS.read(target) : "";
      VFS.write(target, existing + finalOut);
    }catch(e){
      printOut(term, "redirect: "+e.message, "err");
    }
  }
}

const COMMANDS = {
  help: ({print})=>{
    print("Pocket Linux Shell — built-in commands:");
    print("  Filesystem:  ls, cd, pwd, cat, mkdir, rmdir, rm, mv, cp, touch, tree, stat, find");
    print("  Text:        echo, head, tail, wc, grep, sort, uniq, rev");
    print("  System:      whoami, hostname, uname, date, uptime, free, df, ps, kill, env");
    print("  Misc:        clear, history, fortune, banner, neofetch, reboot, exit, theme, open");
    print("  Operators:   |  pipe   >  redirect   >>  append   ;  sequence");
    print("Tip: Tab completes commands and filenames.");
  },
  ls: ({argv, print, printErr})=>{
    let path = STATE.cwd, longF=false, allF=false;
    for(const a of argv){
      if(a.startsWith("-")){ if(a.includes("l")) longF=true; if(a.includes("a")) allF=true; }
      else path = a;
    }
    let entries;
    try{ entries = VFS.list(path); }
    catch(e){ printErr("ls: "+e.message); return; }
    if(!VFS.exists(path)){ printErr("ls: cannot access '"+path+"': No such file or directory"); return; }
    if(VFS.isFile(path)){ print(path); return; }
    if(longF){
      let total = 0;
      for(const n of entries){ total += VFS.size(VFS.norm(path)+"/"+n); }
      print("total "+total);
      for(const n of entries){
        if(!allF && n.startsWith(".")) continue;
        const full = VFS.norm(path).replace(/\/$/,"")+"/"+n;
        const s = VFS.stat(full);
        const t = s.type==="dir" ? "drwxr-xr-x" : "-rw-r--r--";
        const sz = String(VFS.size(full)).padStart(8);
        const d = new Date(s.mtime||Date.now());
        const ds = d.toLocaleString("en-US",{month:"short",day:"2-digit"})+" "+pad(d.getHours())+":"+pad(d.getMinutes());
        print(t+" 1 "+STATE.user+" "+STATE.user+" "+sz+" "+ds+" "+n+(s.type==="dir"?"/":""));
      }
    }else{
      const cols = [];
      for(const n of entries){
        if(!allF && n.startsWith(".")) continue;
        const full = VFS.norm(path).replace(/\/$/,"")+"/"+n;
        cols.push(VFS.isDir(full) ? n+"/" : n);
      }
      print(cols.join("  "));
    }
  },
  cd: ({argv, printErr})=>{
    let target = argv[0] || "/home/"+STATE.user;
    if(target === "~") target = "/home/"+STATE.user;
    if(target === "-") target = STATE.prevCwd || STATE.cwd;
    const n = VFS.norm(target);
    if(!VFS.exists(n)){ printErr("cd: no such file or directory: "+target); return; }
    if(!VFS.isDir(n)){ printErr("cd: not a directory: "+target); return; }
    STATE.prevCwd = STATE.cwd;
    STATE.cwd = n;
    saveState();
  },
  pwd: ({print})=>{ print(STATE.cwd); },
  cat: ({argv, stdin, print, printErr})=>{
    if(!argv.length){ if(stdin) print(stdin.replace(/\n$/,"")); return; }
    for(const a of argv){
      try{ print(VFS.read(a).replace(/\n$/,"")); }
      catch(e){ printErr("cat: "+e.message); }
    }
  },
  mkdir: ({argv, printErr})=>{
    if(!argv.length){ printErr("mkdir: missing operand"); return; }
    for(const a of argv){ try{ VFS.mkdir(a); }catch(e){ printErr("mkdir: "+e.message); } }
  },
  rmdir: ({argv, printErr})=>{
    for(const a of argv){
      const n = VFS.norm(a);
      if(!VFS.isDir(n)){ printErr("rmdir: not a directory: "+a); continue; }
      if(VFS.list(n).length){ printErr("rmdir: directory not empty: "+a); continue; }
      try{ VFS.rm(n); }catch(e){ printErr("rmdir: "+e.message); }
    }
  },
  rm: ({argv, printErr})=>{
    let recursive=false, force=false;
    const targets = [];
    for(const a of argv){ if(a.startsWith("-")){ if(a.includes("r")||a.includes("R")) recursive=true; if(a.includes("f")) force=true; } else targets.push(a); }
    for(const t of targets){
      try{ VFS.rm(t, recursive); }catch(e){ if(!force) printErr("rm: "+e.message); }
    }
  },
  mv: ({argv, printErr})=>{
    if(argv.length<2){ printErr("mv: missing operand"); return; }
    const dst = argv.pop();
    for(const s of argv){ try{ VFS.mv(s,dst); }catch(e){ printErr("mv: "+e.message); } }
  },
  cp: ({argv, printErr})=>{
    if(argv.length<2){ printErr("cp: missing operand"); return; }
    const dst = argv.pop();
    for(const s of argv){ try{ VFS.cp(s,dst); }catch(e){ printErr("cp: "+e.message); } }
  },
  touch: ({argv, printErr})=>{
    for(const a of argv){
      try{ if(VFS.exists(a)){ const n=VFS.norm(a); STATE.fs[n].mtime = Date.now(); saveState(); } else VFS.write(a, ""); }
      catch(e){ printErr("touch: "+e.message); }
    }
  },
  tree: ({argv, print, printErr})=>{
    const root = argv[0] ? VFS.norm(argv[0]) : STATE.cwd;
    if(!VFS.isDir(root)){ printErr("tree: not a directory"); return; }
    let dirs=0, files=0;
    function walk(p, depth, prefix){
      const items = VFS.list(p);
      items.forEach((n,i)=>{
        const last = i===items.length-1;
        const full = (p==="/"?"":p)+"/"+n;
        const isDir = VFS.isDir(full);
        print(prefix + (last ? "└── " : "├── ") + n + (isDir?"/":""));
        if(isDir){ dirs++; walk(full, depth+1, prefix + (last ? "    " : "│   ")); }
        else files++;
      });
    }
    print(root);
    walk(root, 0, "");
    print("");
    print(dirs+" directories, "+files+" files");
  },
  stat: ({argv, print, printErr})=>{
    for(const a of argv){
      const s = VFS.stat(a); if(!s){ printErr("stat: '"+a+"': No such file or directory"); continue; }
      print("  File: "+VFS.norm(a));
      print("  Size: "+VFS.size(a)+"\tType: "+s.type);
      print("Modify: "+new Date(s.mtime).toString());
    }
  },
  find: ({argv, print})=>{
    const root = argv[0] ? VFS.norm(argv[0]) : STATE.cwd;
    const pat = argv[2] || (argv[1] && !argv[1].startsWith("-") ? argv[1] : null);
    const re = pat ? new RegExp(pat.replace(/\*/g,".*").replace(/\?/g,".")) : null;
    function walk(p){
      if(!re || re.test(p.split("/").pop()||p)) print(p);
      if(VFS.isDir(p)) for(const n of VFS.list(p)) walk((p==="/"?"":p)+"/"+n);
    }
    walk(root);
  },
  echo: ({argv, print})=>{ print(argv.join(" ")); },
  head: ({argv, stdin, print, printErr})=>{
    let n = 10; const files = [];
    for(let i=0;i<argv.length;i++){ if(argv[i]==="-n"){ n=parseInt(argv[++i]); } else files.push(argv[i]); }
    const sources = files.length ? files.map(f=>{ try{return VFS.read(f);}catch(e){printErr("head: "+e.message);return"";} }) : [stdin||""];
    for(const src of sources){ print(src.split("\n").slice(0,n).join("\n")); }
  },
  tail: ({argv, stdin, print, printErr})=>{
    let n = 10; const files = [];
    for(let i=0;i<argv.length;i++){ if(argv[i]==="-n"){ n=parseInt(argv[++i]); } else files.push(argv[i]); }
    const sources = files.length ? files.map(f=>{ try{return VFS.read(f);}catch(e){printErr("tail: "+e.message);return"";} }) : [stdin||""];
    for(const src of sources){ const lines = src.split("\n"); print(lines.slice(Math.max(0, lines.length-n-1)).join("\n").replace(/\n$/,"")); }
  },
  wc: ({argv, stdin, print, printErr})=>{
    let total = "";
    if(argv.length){
      for(const a of argv){ try{ total = VFS.read(a); }catch(e){ printErr("wc: "+e.message); continue; }
        const lines = total.split("\n").length-1, words = (total.match(/\S+/g)||[]).length, chars = total.length;
        print("  "+lines+"  "+words+"  "+chars+" "+a);
      }
    }else{
      total = stdin || "";
      const lines = total.split("\n").length-(total.endsWith("\n")?1:0), words = (total.match(/\S+/g)||[]).length, chars = total.length;
      print("  "+lines+"  "+words+"  "+chars);
    }
  },
  grep: ({argv, stdin, print, printErr})=>{
    if(!argv.length){ printErr("grep: missing pattern"); return; }
    const pat = argv.shift();
    let re; try{ re = new RegExp(pat); }catch(e){ printErr("grep: bad pattern"); return; }
    const sources = argv.length ? argv.map(a=>{ try{return [a, VFS.read(a)];}catch(e){printErr("grep: "+e.message);return null;} }).filter(Boolean) : [["", stdin||""]];
    for(const [name, src] of sources){
      for(const line of src.split("\n")){
        if(re.test(line)) print((sources.length>1 && name ? name+":" : "") + line);
      }
    }
  },
  sort: ({stdin, argv, print, printErr})=>{
    let src = stdin;
    if(argv[0] && !argv[0].startsWith("-")){ try{ src = VFS.read(argv[0]); }catch(e){ printErr("sort: "+e.message); return; } }
    const lines = (src||"").split("\n");
    const tail = lines[lines.length-1]==="" ? lines.pop() : null;
    lines.sort();
    if(tail!==null) lines.push(tail);
    print(lines.join("\n").replace(/\n$/,""));
  },
  uniq: ({stdin, print})=>{
    const lines = (stdin||"").split("\n");
    const out = [];
    for(let i=0;i<lines.length;i++){ if(i===0 || lines[i]!==lines[i-1]) out.push(lines[i]); }
    print(out.join("\n").replace(/\n$/,""));
  },
  rev: ({stdin, argv, print, printErr})=>{
    let src = stdin;
    if(argv[0]){ try{ src = VFS.read(argv[0]); }catch(e){ printErr("rev: "+e.message); return; } }
    print((src||"").split("\n").map(l=>l.split("").reverse().join("")).join("\n").replace(/\n$/,""));
  },
  whoami: ({print})=>print(STATE.user),
  hostname: ({print})=>print(STATE.host),
  uname: ({argv, print})=>{
    if(argv[0]==="-a") print("Linux pocket-linux 6.1.0-pocket #1 SMP "+new Date().toDateString()+" x86_64 GNU/Linux");
    else print("Linux");
  },
  date: ({print})=>print(new Date().toString()),
  uptime: ({print})=>{
    const up = (Date.now() - PAGE_LOADED)/1000;
    const h = Math.floor(up/3600), m = Math.floor((up%3600)/60);
    const d = new Date();
    print(" "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())+" up "+h+":"+pad(m)+",  1 user,  load average: "+(Math.random()*0.8).toFixed(2)+", "+(Math.random()*0.5).toFixed(2)+", "+(Math.random()*0.3).toFixed(2));
  },
  free: ({print})=>{
    print("              total        used        free      shared  buff/cache   available");
    print("Mem:       16384000     4321000    11000000      230000      1063000    11700000");
    print("Swap:       4194304           0     4194304");
  },
  df: ({print})=>{
    print("Filesystem     1K-blocks    Used Available Use% Mounted on");
    let total = 0; for(const k in STATE.fs) total += (STATE.fs[k].content||"").length;
    const used = Math.ceil(total/1024);
    print("/dev/sda1      52428800  "+pad(used,8)+"  52000000   1% /");
    print("tmpfs           8192000        0   8192000   0% /tmp");
  },
  ps: ({argv, print})=>{
    print("  PID TTY          TIME CMD");
    for(const p of PROCESSES){
      const sec = Math.floor((Date.now()-p.started)/1000);
      print(String(p.pid).padStart(5)+" pts/0    "+pad(Math.floor(sec/60))+":"+pad(sec%60)+" "+p.name);
    }
  },
  kill: ({argv, print, printErr})=>{
    for(const a of argv){
      const pid = parseInt(a); if(!pid) continue;
      if(killProcess(pid)) print("kill: process "+pid+" terminated");
      else printErr("kill: "+pid+": no such process");
    }
  },
  env: ({print})=>{
    print("USER="+STATE.user); print("HOME=/home/"+STATE.user); print("HOSTNAME="+STATE.host);
    print("PATH=/usr/local/bin:/usr/bin:/bin"); print("SHELL=/bin/bash"); print("TERM=xterm-256color");
    print("PWD="+STATE.cwd); print("LANG=en_US.UTF-8");
  },
  clear: ({term})=>{ term.innerHTML = ""; },
  history: ({print})=>{
    STATE.history.forEach((c,i)=>print(String(i+1).padStart(5)+"  "+c));
  },
  fortune: ({print})=>{
    try{
      const list = VFS.read("/usr/share/quotes.txt").split("\n").filter(Boolean);
      print(list[Math.floor(Math.random()*list.length)]);
    }catch(e){ print("No fortunes available."); }
  },
  banner: ({argv, print})=>{
    const t = argv.join(" ") || "Pocket";
    const big = ce("pre"); print("");
    print("╔══════════════════════════════╗");
    print("║  "+t.toUpperCase().padEnd(26," ")+"║");
    print("╚══════════════════════════════╝");
  },
  neofetch: ({print})=>{
    const lines = [
      STATE.user+"@"+STATE.host,
      "-----------------",
      "OS: Pocket Linux 1.0",
      "Host: RappterZoo Browser",
      "Kernel: 6.1.0-pocket",
      "Uptime: "+Math.floor((Date.now()-PAGE_LOADED)/1000)+"s",
      "Shell: bash 5.1",
      "Resolution: "+innerWidth+"x"+innerHeight,
      "Theme: "+STATE.theme,
      "Apps installed: "+APPS.length,
      "Files: "+Object.keys(STATE.fs).length,
      "CPU: Intel(R) Pocket(R) @ 3.42GHz",
      "Memory: 4321MiB / 16384MiB",
    ];
    const logo = [
      "        _nnnn_       ",
      "       dGGGGMMb      ",
      "      @p~qp~~qMb     ",
      "      M|@||@) M|     ",
      "      @,----.JM|     ",
      "     JS^\\__/  qKL    ",
      "    dZP        qKRb  ",
      "   dZP          qKKb ",
      "  fZP            SMMb",
      "  HZM            MMMM",
      "  FqM            MMMM",
      "__| |__        |__|__",
    ];
    for(let i=0;i<Math.max(logo.length,lines.length);i++){
      print((logo[i]||"".padEnd(22," "))+" "+(lines[i]||""));

  },
  reboot: ()=>{ reboot(); },
  exit: ({term})=>{ const win = Object.values(WINDOWS).find(w=>w.body.contains(term)); if(win) closeWindow(win.id); },
  theme: ({argv, print})=>{
    if(argv[0]==="dark"||argv[0]==="light"){ STATE.theme=argv[0]; document.body.classList.toggle("light",argv[0]==="light"); saveState(); }
    else toggleTheme();

  },
  open: ({argv, print, printErr})=>{
    if(!argv[0]){ printErr("open: usage: open <filename>"); return; }
    const path = VFS.norm(argv[0]);
    if(!VFS.isFile(path)){ printErr("open: not a file: "+argv[0]); return; }

  sudo: ({argv, print})=>{ print("[sudo] password for "+STATE.user+": ******\nNice try. " + argv.join(" ") + " executed in dream-mode."); },
  yes: ({argv, print})=>{ const s = argv.join(" ")||"y"; for(let i=0;i<20;i++) print(s); print("(stopped after 20 — this isn't a real terminal)"); },

    const top = " "+"_".repeat(m.length+2);
    const bot = " "+"-".repeat(m.length+2);
    print(top); print("< "+m+" >"); print(bot);
    print("        \\   ^__^");

function buildFiles(win, params){
  setWindowTitle(win, "Files — "+(params&&params.path||"/home/"+STATE.user));
  const root = ce("div","fm");
  win.body.appendChild(root);
  const sidebar = ce("div","sidebar");
  const main = ce("div","main");
  root.appendChild(sidebar); root.appendChild(main);

  const places = [
    {l:"Home", p:"/home/"+STATE.user, i:"🏠"},
    {l:"Documents", p:"/home/"+STATE.user+"/Documents", i:"📄"},
    {l:"Pictures", p:"/home/"+STATE.user+"/Pictures", i:"🖼"},
    {l:"Downloads", p:"/home/"+STATE.user+"/Downloads", i:"⬇"},
    {l:"Trash (/tmp)", p:"/tmp", i:"🗑"},
    {l:"Filesystem (/)", p:"/", i:"💾"},
    {l:"etc", p:"/etc", i:"⚙"},
    {l:"var/log", p:"/var/log", i:"📜"},
  ];
  sidebar.innerHTML = '<div class="heading">Places</div>';
  for(const pl of places){
    const it = ce("div","item",'<span>'+pl.i+'</span><span>'+esc(pl.l)+'</span>');
    it.dataset.path = pl.p;
    it.onclick = ()=>navigate(pl.p);
    sidebar.appendChild(it);
  }

  const tb = ce("div","toolbar");
  const back = ce("button",null,"◀"); const fwd = ce("button",null,"▶"); const up = ce("button",null,"▲");
  const rfs = ce("button",null,"↻"); const newF = ce("button",null,"+ File"); const newD = ce("button",null,"+ Folder");
  const del = ce("button",null,"🗑"); const pathbar = ce("div","pathbar");
  tb.appendChild(back); tb.appendChild(fwd); tb.appendChild(up); tb.appendChild(rfs);
  tb.appendChild(pathbar); tb.appendChild(newF); tb.appendChild(newD); tb.appendChild(del);
  main.appendChild(tb);

  const grid = ce("div","grid");
  main.appendChild(grid);
  const sb = ce("div","statusbar"); main.appendChild(sb);

  let history = [], hi = -1, current = (params&&params.path) || "/home/"+STATE.user;
  let selected = null;

  function navigate(p, fromHistory){
    if(!VFS.exists(p)){ notify("Files","No such directory: "+p); return; }
    if(!VFS.isDir(p)){ openFile(p); return; }
    current = p;
    if(!fromHistory){ history = history.slice(0, hi+1); history.push(p); hi = history.length-1; }
    pathbar.textContent = p;
    setWindowTitle(win, "Files — "+p);
    selected = null;
    render();
    for(const it of $$(".sidebar .item",sidebar)) it.classList.toggle("active", it.dataset.path===p);
    back.disabled = hi<=0; fwd.disabled = hi>=history.length-1;
  }
  function render(){
    grid.innerHTML = "";
    const items = VFS.list(current);
    if(current !== "/"){
      const upe = makeFile("..", "📂", true);
      upe.onclick = ()=>navigate(current.replace(/\/[^/]+\/?$/,"")||"/");
      grid.appendChild(upe);
    }
    for(const n of items){
      const full = (current==="/"?"":current)+"/"+n;
      const isDir = VFS.isDir(full);
      const ico = isDir ? "📁" : pickIcon(n);
      const f = makeFile(n, ico, isDir);
      f.onclick = (e)=>{
        for(const x of $$(".file",grid)) x.classList.remove("sel");
        f.classList.add("sel");
        selected = full;
      };
      f.ondblclick = ()=>{
        if(isDir) navigate(full);
        else openFile(full);
      };
      f.addEventListener("contextmenu", e=>{
        e.preventDefault(); e.stopPropagation();
        selected = full;
        for(const x of $$(".file",grid)) x.classList.remove("sel"); f.classList.add("sel");
        showContextMenu(e.clientX, e.clientY, [
          {label:"Open", icon:"↗", action:()=>{ if(isDir) navigate(full); else openFile(full); }},
          {label:"Rename", icon:"✎", action:()=>renameFile(full)},
          {label:"Delete", icon:"🗑", action:()=>deleteFile(full)},
          {sep:true},
          {label:"Copy path", icon:"📋", action:()=>{ navigator.clipboard&&navigator.clipboard.writeText(full); notify("Copied", full); }},
        ]);
      });
      // Drag & drop reorder/move
      f.draggable = true;
      f.addEventListener("dragstart", e=>{ e.dataTransfer.setData("text/path", full); e.dataTransfer.effectAllowed="move"; });
      if(isDir){
        f.addEventListener("dragover", e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; f.style.background="rgba(88,166,255,0.3)"; });
        f.addEventListener("dragleave", ()=>{ f.style.background=""; });
        f.addEventListener("drop", e=>{
          e.preventDefault(); f.style.background="";
          const src = e.dataTransfer.getData("text/path");
          if(!src||src===full) return;
          try{ VFS.mv(src, full); render(); notify("Files","Moved "+src.split("/").pop()+" → "+full); }
          catch(err){ notify("Files",err.message); }
        });
      }
      grid.appendChild(f);
    }
    sb.textContent = items.length+" item"+(items.length===1?"":"s")+" • "+current;
  }
  function makeFile(name, ico, isDir){
    const e = ce("div","file",'<div class="ico">'+ico+'</div><div>'+esc(name)+'</div>');
    return e;
  }
  function pickIcon(n){
    const ext = (n.split(".").pop()||"").toLowerCase();
    if(["txt","md","log"].includes(ext)) return "📄";
    if(["js","ts","py","html","css","json","sh"].includes(ext)) return "📋";
    if(["png","jpg","jpeg","gif","svg","bmp"].includes(ext)) return "🖼";
    if(["mp3","wav","ogg"].includes(ext)) return "🎵";
    if(["mp4","webm","mov"].includes(ext)) return "🎬";
    if(["zip","tar","gz"].includes(ext)) return "📦";
    return "📃";
  }
  function openFile(path){
    const ext = (path.split(".").pop()||"").toLowerCase();
    if(["png","jpg","jpeg","gif","bmp"].includes(ext)){ openApp("paint",{path}); }
    else { openApp("editor",{path}); }
  }
  function renameFile(full){
    promptModal("Rename","Enter new name", full.split("/").pop(), v=>{
      if(!v||v===full.split("/").pop()) return;
      const parent = full.replace(/\/[^/]+$/,"")||"/";
      try{ VFS.mv(full, (parent==="/"?"":parent)+"/"+v); render(); }
      catch(e){ notify("Rename", e.message); }
    });
  }
  function deleteFile(full){
    confirmModal("Delete","Delete "+full+"?", ()=>{
      try{ VFS.rm(full, VFS.isDir(full)); render(); }catch(e){ notify("Delete", e.message); }
    });
  }

  back.onclick = ()=>{ if(hi>0){ hi--; navigate(history[hi], true); }};
  fwd.onclick  = ()=>{ if(hi<history.length-1){ hi++; navigate(history[hi], true); }};
  up.onclick   = ()=>{ if(current!=="/") navigate(current.replace(/\/[^/]+\/?$/,"")||"/"); };
  rfs.onclick  = ()=>render();
  newF.onclick = ()=>promptModal("New File","Enter file name","untitled.txt",v=>{ if(!v) return; try{ VFS.write(current+"/"+v,""); render(); }catch(e){ notify("New File",e.message); } });
  newD.onclick = ()=>promptModal("New Folder","Enter folder name","New Folder",v=>{ if(!v) return; try{ VFS.mkdir(current+"/"+v); render(); }catch(e){ notify("New Folder",e.message); } });
  del.onclick  = ()=>{ if(selected) deleteFile(selected); };

  // grid drop zone for moving up
  grid.addEventListener("dragover", e=>{ e.preventDefault(); });

  navigate(current);
}

function buildEditor(win, params){
  const path = (params&&params.path) || null;
  const root = ce("div","editor");
  win.body.appendChild(root);
  const tb = ce("div","toolbar");
  const fname = ce("input"); fname.placeholder="filename"; fname.value = path || "/home/"+STATE.user+"/untitled.txt";
  const save = ce("button",null,"💾 Save");
  const open = ce("button",null,"📂 Open");
  const newb = ce("button",null,"📄 New");
  const status = ce("span"); status.style.marginLeft="auto"; status.style.color="var(--muted)";
  tb.appendChild(newb); tb.appendChild(open); tb.appendChild(save); tb.appendChild(fname); tb.appendChild(status);
  root.appendChild(tb);

  const work = ce("div","work");
  const gutter = ce("div","gutter");
  const area = ce("div","area");
  const pre = ce("div","pre");
  const ta = ce("textarea"); ta.spellcheck=false; ta.autocapitalize="off";
  area.appendChild(pre); area.appendChild(ta);
  work.appendChild(gutter); work.appendChild(area);
  root.appendChild(work);

  const stat = ce("div","status");
  stat.innerHTML = '<span id="ed-cur">Ln 1, Col 1</span><span id="ed-info"></span>';
  root.appendChild(stat);

  function highlight(text, ext){
    let html = esc(text);
    if(ext === "js" || ext === "ts"){
      html = html.replace(/(\/\/[^\n]*)/g,'<span class="tk-com">$1</span>');
      html = html.replace(/("[^"\n]*"|'[^'\n]*')/g,'<span class="tk-str">$1</span>');
      html = html.replace(/\b(function|const|let|var|return|if|else|for|while|class|new|true|false|null|undefined|this|import|export|from|async|await|try|catch|throw|do|switch|case|break|continue|in|of|typeof|instanceof|delete|void)\b/g,'<span class="tk-kw">$1</span>');
      html = html.replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="tk-num">$1</span>');
      html = html.replace(/\b([A-Za-z_$][\w$]*)(?=\s*\()/g,'<span class="tk-fn">$1</span>');
    } else if(ext === "html" || ext === "xml"){
      html = html.replace(/(&lt;\/?[a-zA-Z][^&]*?&gt;)/g,'<span class="tk-tag">$1</span>');
      html = html.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="tk-com">$1</span>');
    } else if(ext === "css"){
      html = html.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="tk-com">$1</span>');
      html = html.replace(/([a-z-]+)(\s*:)/g,'<span class="tk-kw">$1</span>$2');
      html = html.replace(/(#[0-9a-fA-F]{3,8})/g,'<span class="tk-num">$1</span>');
    } else if(ext === "md"){
      html = html.replace(/^(#{1,6}\s.+)$/gm,'<span class="tk-h">$1</span>');
      html = html.replace(/(\*\*[^*\n]+\*\*|\*[^*\n]+\*|`[^`\n]+`)/g,'<span class="tk-str">$1</span>');
    } else if(ext === "json"){
      html = html.replace(/("[^"\n]*")(\s*:)/g,'<span class="tk-kw">$1</span>$2');
      html = html.replace(/:\s*("[^"\n]*")/g,': <span class="tk-str">$1</span>');
      html = html.replace(/\b(true|false|null)\b/g,'<span class="tk-kw">$1</span>');
      html = html.replace(/\b(-?\d+(?:\.\d+)?)\b/g,'<span class="tk-num">$1</span>');
    }
    return html + "\n";
  }

  function updateGutter(){
    const lines = ta.value.split("\n").length;
    let g = "";
    for(let i=1;i<=lines;i++) g += i+"\n";
    gutter.textContent = g;
  }
  function updateHighlight(){
    const ext = (fname.value.split(".").pop()||"").toLowerCase();
    pre.innerHTML = highlight(ta.value, ext);
  }
  function syncScroll(){
    pre.scrollTop = ta.scrollTop; pre.scrollLeft = ta.scrollLeft;
    gutter.scrollTop = ta.scrollTop;
  }
  function updatePos(){
    const v = ta.value.substring(0, ta.selectionStart);
    const ln = v.split("\n").length, col = v.length - v.lastIndexOf("\n");
    $("#ed-cur",stat).textContent = "Ln "+ln+", Col "+col;
    const ext = (fname.value.split(".").pop()||"").toLowerCase();
    $("#ed-info",stat).textContent = ta.value.length+" chars • "+(ext||"text");
  }
  ta.addEventListener("input", ()=>{ updateGutter(); updateHighlight(); updatePos(); });
  ta.addEventListener("scroll", syncScroll);
  ta.addEventListener("keyup", updatePos);
  ta.addEventListener("click", updatePos);
  ta.addEventListener("keydown", e=>{
    if(e.key === "Tab"){
      e.preventDefault();
      const s=ta.selectionStart, e2=ta.selectionEnd;
      ta.value = ta.value.substring(0,s) + "  " + ta.value.substring(e2);
      ta.selectionStart = ta.selectionEnd = s+2;
      updateGutter(); updateHighlight(); updatePos();
    }
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="s"){ e.preventDefault(); doSave(); }
  });

  function doSave(){
    try{
      const p = VFS.norm(fname.value);
      VFS.write(p, ta.value);
      setWindowTitle(win, "Editor — "+p);
      notify("Saved", p);
    }catch(e){ notify("Save failed", e.message); }
  }
  save.onclick = doSave;
  open.onclick = ()=>promptModal("Open file","Enter path", fname.value, v=>{
    try{ ta.value = VFS.read(v); fname.value = VFS.norm(v); updateGutter(); updateHighlight(); updatePos(); setWindowTitle(win,"Editor — "+VFS.norm(v)); }
    catch(e){ notify("Open", e.message); }
  });
  newb.onclick = ()=>{ ta.value=""; fname.value="/home/"+STATE.user+"/untitled.txt"; updateGutter(); updateHighlight(); updatePos(); setWindowTitle(win,"Editor — untitled"); };

  if(path){
    try{ ta.value = VFS.read(path); setWindowTitle(win, "Editor — "+path); }
    catch(e){ ta.value = "// "+e.message; }
  }else{
    setWindowTitle(win, "Editor — untitled");
  }
  updateGutter(); updateHighlight(); updatePos();
}
