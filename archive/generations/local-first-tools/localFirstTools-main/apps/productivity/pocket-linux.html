function buildPaint(win, params){
  const root = ce("div","paint");
  win.body.appendChild(root);
  const tb = ce("div","toolbar");
  root.appendChild(tb);

  const tools = ["✏ Pencil","🖌 Brush","🪣 Fill","⬛ Eraser","◯ Circle","▭ Rect","╱ Line"];
  const toolBtns = [];
  let tool = "Pencil";
  for(const t of tools){
    const b = ce("button",null,t);
    b.onclick = ()=>{ tool = t.split(" ")[1]; for(const x of toolBtns) x.classList.remove("act"); b.classList.add("act"); };
    if(t.includes("Pencil")) b.classList.add("act");
    toolBtns.push(b); tb.appendChild(b);
  }
  const color = ce("input"); color.type="color"; color.value="#58a6ff"; tb.appendChild(color);
  const size = ce("input"); size.type="range"; size.min="1"; size.max="40"; size.value="3"; tb.appendChild(size);
  const sizeLab = ce("span"); sizeLab.style.minWidth="22px"; sizeLab.textContent="3"; tb.appendChild(sizeLab);
  size.oninput = ()=>{ sizeLab.textContent = size.value; };
  const clr = ce("button",null,"🗑 Clear"); tb.appendChild(clr);
  const sav = ce("button",null,"💾 Save"); tb.appendChild(sav);

  const wrap = ce("div","canvas-wrap");
  const canvas = ce("canvas"); canvas.width=560; canvas.height=400;
  wrap.appendChild(canvas);
  root.appendChild(wrap);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);

  // load if path is image
  if(params && params.path){
    try{
      const data = VFS.read(params.path);
      if(data.startsWith("data:image")){
        const img = new Image(); img.onload = ()=>{ canvas.width = img.width; canvas.height=img.height; ctx.drawImage(img,0,0); }; img.src = data;
        setWindowTitle(win,"Paint — "+params.path);
      }else{
        notify("Paint","Not an image: "+params.path);
      }
    }catch(e){ notify("Paint", e.message); }
  }else{
    setWindowTitle(win,"Paint — untitled.png");
  }

  let drawing=false, startX=0, startY=0, snap=null;
  function pos(e){ const r=canvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }
  canvas.addEventListener("mousedown", e=>{
    drawing = true;
    [startX, startY] = pos(e);
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.strokeStyle = color.value; ctx.fillStyle = color.value; ctx.lineWidth = +size.value;
    if(tool==="Eraser"){ ctx.strokeStyle="#ffffff"; }
    if(["Circle","Rect","Line"].includes(tool)){
      snap = ctx.getImageData(0,0,canvas.width,canvas.height);
    }else if(tool==="Fill"){
      floodFill(ctx, Math.floor(startX), Math.floor(startY), hex2rgb(color.value));
      drawing = false;
    }else{
      ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(startX+0.01,startY+0.01); ctx.stroke();
    }
  });
  canvas.addEventListener("mousemove", e=>{
    if(!drawing) return;
    const [x,y] = pos(e);
    if(tool==="Pencil"||tool==="Brush"||tool==="Eraser"){
      ctx.lineTo(x,y); ctx.stroke();
    }else if(snap){
      ctx.putImageData(snap,0,0);
      ctx.beginPath();
      if(tool==="Rect"){ ctx.strokeRect(startX,startY,x-startX,y-startY); }
      else if(tool==="Circle"){ const r = Math.hypot(x-startX,y-startY); ctx.arc(startX,startY,r,0,Math.PI*2); ctx.stroke(); }
      else if(tool==="Line"){ ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.stroke(); }
    }
  });
  addEventListener("mouseup", ()=>{ drawing = false; snap = null; });

  function hex2rgb(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255,255]; }
  function floodFill(ctx, x, y, fill){
    const img = ctx.getImageData(0,0,canvas.width,canvas.height); const d = img.data;
    const W = canvas.width, H = canvas.height;
    function idx(x,y){ return (y*W+x)*4; }
    const i0 = idx(x,y);
    const tgt = [d[i0],d[i0+1],d[i0+2],d[i0+3]];
    if(tgt[0]===fill[0]&&tgt[1]===fill[1]&&tgt[2]===fill[2]) return;
    const stack = [[x,y]];
    while(stack.length){
      const [cx,cy] = stack.pop();
      if(cx<0||cy<0||cx>=W||cy>=H) continue;
      const i = idx(cx,cy);
      if(d[i]!==tgt[0]||d[i+1]!==tgt[1]||d[i+2]!==tgt[2]||d[i+3]!==tgt[3]) continue;
      d[i]=fill[0]; d[i+1]=fill[1]; d[i+2]=fill[2]; d[i+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img,0,0);
  }

  clr.onclick = ()=>{ ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height); };
  sav.onclick = ()=>{
    promptModal("Save image","Path", "/home/"+STATE.user+"/Pictures/drawing-"+Date.now()+".png", v=>{
      if(!v) return;
      try{ VFS.write(v, canvas.toDataURL("image/png")); notify("Paint","Saved to "+v); setWindowTitle(win,"Paint — "+v); }
      catch(e){ notify("Paint",e.message); }
    });
  };
}

// ============================================================
function buildCalc(win){
  const root = ce("div","calc");
  win.body.appendChild(root);
  const display = ce("div","display");
  const sub = ce("div","sub"); sub.id="c-sub";
  const main = ce("div"); main.id="c-main"; main.textContent = "0";
  display.appendChild(sub); display.appendChild(main);
  root.appendChild(display);
  const keys = ce("div","keys");
  root.appendChild(keys);
  setWindowTitle(win, "Calculator");

  const layout = [
    ["sin","fn"],["cos","fn"],["tan","fn"],["ln","fn"],["AC","clr"],
    ["√","fn"],["x²","fn"],["xʸ","fn"],["π","fn"],["±","fn"],
    ["7"],["8"],["9"],["÷","op"],["%","op"],
    ["4"],["5"],["6"],["×","op"],["("],
    ["1"],["2"],["3"],["−","op"],[")"],
    ["0"],["."],["⌫","fn"],["+","op"],["=","eq"],
  ];
  let expr = "";
  for(const [t, cls] of layout){
    const b = ce("button", cls||""); b.textContent = t;
    b.onclick = ()=>press(t);
    keys.appendChild(b);
  }
  function press(k){
    const main = $("#c-main", display); const sub = $("#c-sub", display);
    if(k==="AC"){ expr=""; main.textContent="0"; sub.textContent=""; return; }
    if(k==="⌫"){ expr = expr.slice(0,-1); main.textContent = expr || "0"; return; }
    if(k==="="){
      try{
        const r = evalExpr(expr);
        sub.textContent = expr;
        expr = String(r);
        main.textContent = expr;
      }catch(e){ main.textContent="Error"; }
      return;
    }
    if(k==="±"){ if(expr.startsWith("-")) expr = expr.slice(1); else expr = "-"+expr; main.textContent = expr || "0"; return; }
    let add = k;
    if(k==="×") add="*"; if(k==="÷") add="/"; if(k==="−") add="-";
    if(k==="π") add = String(Math.PI);
    if(k==="x²"){ try{ const r=evalExpr(expr); expr = String(r*r); main.textContent=expr; return; }catch(e){return;} }
    if(k==="√"){ try{ const r=evalExpr(expr); expr = String(Math.sqrt(r)); main.textContent=expr; return; }catch(e){return;} }
    if(k==="xʸ"){ add = "**"; }
    if(k==="ln"){ add = "ln("; }
    if(k==="sin"){ add="sin("; } if(k==="cos"){ add="cos("; } if(k==="tan"){ add="tan("; }
    expr += add;
    main.textContent = expr;
  }
  function evalExpr(s){
    if(!s) return 0;
    // Replace functions
    s = s.replace(/sin\(/g,"Math.sin(").replace(/cos\(/g,"Math.cos(").replace(/tan\(/g,"Math.tan(").replace(/ln\(/g,"Math.log(");
    if(/[^0-9+\-*/().%\sMathsincoetaglo]/.test(s)) throw new Error("bad");
    // Use Function for safe-ish eval (no globals exposed in Function ctor)
    const r = Function('"use strict";return ('+s+')')();
    if(!isFinite(r)) throw new Error("infinity");
    return r;
  }
  win.body.addEventListener("keydown", e=>{
    const k = e.key;
    if(/^[0-9.+\-*/()]$/.test(k)){ press(k==="*"?"×":k==="/"?"÷":k==="-"?"−":k); }
    else if(k==="Enter"||k==="="){ press("="); }
    else if(k==="Backspace"){ press("⌫"); }
    else if(k==="Escape"){ press("AC"); }
  });
  win.body.tabIndex = 0;
}

function buildMonitor(win){
  const root = ce("div","mon");
  win.body.appendChild(root);
  setWindowTitle(win,"System Monitor");
  const tabs = ce("div","tabs");
  const tabBody = ce("div","tab-body");
  root.appendChild(tabs); root.appendChild(tabBody);
  const tabNames = ["Resources","Processes","System"];
  const tabBtns = {};
  for(const n of tabNames){
    const b = ce("button",null,n);
    b.onclick = ()=>switchTab(n);
    tabs.appendChild(b);
    tabBtns[n] = b;
  }
  let current = "Resources";
  let cpuHist = Array(60).fill(0), memHist = Array(60).fill(0), netHist = Array(60).fill(0);

  function switchTab(n){
    current = n;
    for(const k in tabBtns) tabBtns[k].classList.toggle("act", k===n);
    render();
  }
  function render(){
    tabBody.innerHTML = "";
    if(current==="Resources") renderResources();
    else if(current==="Processes") renderProcs();
    else renderSystem();
  }
  function renderResources(){
    const stats = ce("div","stats");
    const cpu = (Math.random()*40+5+cpuHist[cpuHist.length-1]*0.5).toFixed(1);
    const mem = (4321 + Math.random()*200);
    const net = (Math.random()*120).toFixed(1);
    stats.innerHTML =
      '<div class="stat"><div class="lbl">CPU</div><div class="val">'+cpu+'%</div><div class="sub">8 cores @ 3.42GHz</div></div>' +
      '<div class="stat"><div class="lbl">Memory</div><div class="val">'+mem.toFixed(0)+'MB</div><div class="sub">of 16384MB</div></div>' +
      '<div class="stat"><div class="lbl">Disk</div><div class="val">'+Math.floor(Math.random()*4+24)+'%</div><div class="sub">52GB used</div></div>' +
      '<div class="stat"><div class="lbl">Network</div><div class="val">'+net+' KB/s</div><div class="sub">192.168.1.42</div></div>';
    tabBody.appendChild(stats);

    const charts = ce("div","charts");
    charts.innerHTML =
      '<div class="chart"><h4>CPU history</h4><canvas id="cv-cpu" width="300" height="80"></canvas></div>' +
      '<div class="chart"><h4>Memory history</h4><canvas id="cv-mem" width="300" height="80"></canvas></div>' +
      '<div class="chart" style="grid-column:1/-1"><h4>Network throughput</h4><canvas id="cv-net" width="600" height="80"></canvas></div>';
    tabBody.appendChild(charts);

    cpuHist.push(parseFloat(cpu)); cpuHist.shift();
    memHist.push(mem/16384*100); memHist.shift();
    netHist.push(parseFloat(net)); netHist.shift();
    drawGraph($("#cv-cpu",tabBody), cpuHist, "#58a6ff", 100);
    drawGraph($("#cv-mem",tabBody), memHist, "#3fb950", 100);
    drawGraph($("#cv-net",tabBody), netHist, "#bc8cff", 200);
  }
  function drawGraph(c, data, color, max){
    if(!c) return;
    const ctx = c.getContext("2d");
    const w = c.width, h = c.height;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = "#222"; ctx.lineWidth=1;
    for(let i=1;i<4;i++){ const y=h*i/4; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, color+"aa"); grad.addColorStop(1, color+"00");
    ctx.beginPath(); ctx.moveTo(0,h);
    for(let i=0;i<data.length;i++){
      const x = i/(data.length-1)*w;
      const y = h - (data[i]/max)*h;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath();
    for(let i=0;i<data.length;i++){ const x=i/(data.length-1)*w; const y=h-(data[i]/max)*h; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.strokeStyle = color; ctx.lineWidth=1.5; ctx.stroke();
  }
  function renderProcs(){
    const wrap = ce("div");
    wrap.innerHTML = '<div style="margin-bottom:8px;color:var(--muted);font-size:12px">'+PROCESSES.length+' active processes</div>';
    const tbl = ce("table");
    tbl.innerHTML = '<thead><tr><th>PID</th><th>Name</th><th>CPU%</th><th>Mem MB</th><th>Kind</th><th></th></tr></thead><tbody></tbody>';
    const tb = tbl.querySelector("tbody");
    const sorted = PROCESSES.slice().sort((a,b)=>b.cpu - a.cpu);
    for(const p of sorted){
      // jiggle stats slightly
      p.cpu = Math.max(0, p.cpu + (Math.random()-0.5)*0.4);
      p.mem = Math.max(1, p.mem + (Math.random()-0.5)*2);
      const tr = ce("tr");
      tr.innerHTML = '<td>'+p.pid+'</td><td>'+esc(p.name)+'</td><td>'+p.cpu.toFixed(1)+'</td><td>'+p.mem.toFixed(0)+'</td><td>'+p.kind+'</td><td></td>';
      const kb = ce("button","killbtn","kill");
      kb.onclick = ()=>{ if(killProcess(p.pid)){ render(); } };
      tr.lastChild.appendChild(kb);
      tb.appendChild(tr);
    }
    wrap.appendChild(tbl);
    tabBody.appendChild(wrap);
  }
  function renderSystem(){
    const fileCount = Object.keys(STATE.fs).length;
    const totalBytes = Object.values(STATE.fs).reduce((s,e)=>s+(e.content?.length||0),0);
    const html = '<div class="stats">'+
      '<div class="stat"><div class="lbl">Hostname</div><div class="val" style="font-size:14px">'+STATE.host+'</div></div>'+
      '<div class="stat"><div class="lbl">User</div><div class="val" style="font-size:14px">'+STATE.user+'</div></div>'+
      '<div class="stat"><div class="lbl">Theme</div><div class="val" style="font-size:14px">'+STATE.theme+'</div></div>'+
      '<div class="stat"><div class="lbl">Boot count</div><div class="val">'+STATE.bootCount+'</div></div>'+
      '<div class="stat"><div class="lbl">Files in VFS</div><div class="val">'+fileCount+'</div></div>'+
      '<div class="stat"><div class="lbl">VFS size</div><div class="val" style="font-size:14px">'+fmtBytes(totalBytes)+'</div></div>'+
      '<div class="stat"><div class="lbl">Resolution</div><div class="val" style="font-size:14px">'+innerWidth+'×'+innerHeight+'</div></div>'+
      '<div class="stat"><div class="lbl">Uptime (this session)</div><div class="val" style="font-size:14px" id="up-val">--</div></div>'+
      '</div>'+
      '<h4 style="margin:14px 0 6px;font-size:12px;color:var(--muted)">Kernel ring buffer (dmesg)</h4>'+
      '<pre style="background:#000;color:#3fb950;padding:10px;border-radius:6px;font-size:11px;overflow:auto;max-height:140px">'+esc(VFS.read("/var/log/syslog"))+'</pre>';
    tabBody.innerHTML = html;
    const up = $("#up-val", tabBody);
    if(up){ const s=Math.floor((Date.now()-PAGE_LOADED)/1000); up.textContent = Math.floor(s/60)+"m "+(s%60)+"s"; }
  }
  switchTab("Resources");
  const iv = setInterval(()=>{ if(!WINDOWS[win.id]){ clearInterval(iv); return; } render(); }, 1500);
  win.onClose = ()=>clearInterval(iv);
}

// ============================================================
// CLOCK
// ============================================================
function buildClock(win){
  const root = ce("div","clk");
  win.body.appendChild(root);
  setWindowTitle(win,"Clock");
  const tabs = ce("div","tabs");
  const body = ce("div","tab-body");
  root.appendChild(tabs); root.appendChild(body);
  const tnames = ["World","Stopwatch","Timer","Alarm"];
  const tbtns = {};
  for(const n of tnames){
    const b = ce("button",null,n);
    b.onclick = ()=>switchTab(n);
    tabs.appendChild(b); tbtns[n] = b;
  }
  let current = "World";
  let intervals = [];
  function clearAll(){ for(const i of intervals) clearInterval(i); intervals=[]; }
  function switchTab(n){
    current = n;
    for(const k in tbtns) tbtns[k].classList.toggle("act", k===n);
    clearAll();
    body.innerHTML = "";
    if(n==="World") renderWorld();
    else if(n==="Stopwatch") renderSW();
    else if(n==="Timer") renderTimer();
    else renderAlarm();
  }
  function renderWorld(){
    const cv = ce("canvas","analog"); cv.width=200; cv.height=200;
    const dig = ce("div","digital"); const dat = ce("div","date");
    body.appendChild(cv); body.appendChild(dig); body.appendChild(dat);
    const ctx = cv.getContext("2d");
    function tick(){
      const d = new Date();
      // analog
      ctx.clearRect(0,0,200,200);
      ctx.translate(100,100);
      ctx.strokeStyle="#444"; ctx.lineWidth=1;
      for(let i=0;i<60;i++){
        ctx.beginPath();
        const a = i*Math.PI/30;
        const o = i%5===0?10:5;
        ctx.moveTo(Math.sin(a)*(85-o),-Math.cos(a)*(85-o));
        ctx.lineTo(Math.sin(a)*85,-Math.cos(a)*85);
        ctx.stroke();
      }
      const h = d.getHours()%12 + d.getMinutes()/60;
      const m = d.getMinutes() + d.getSeconds()/60;
      const s = d.getSeconds() + d.getMilliseconds()/1000;
      function hand(angle, len, w, color){
        ctx.strokeStyle=color; ctx.lineWidth=w; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.sin(angle)*len, -Math.cos(angle)*len); ctx.stroke();
      }
      hand(h*Math.PI/6, 50, 4, "#c9d1d9");
      hand(m*Math.PI/30, 70, 3, "#c9d1d9");
      hand(s*Math.PI/30, 80, 1, "#f85149");
      ctx.fillStyle="#f85149"; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
      ctx.setTransform(1,0,0,1,0,0);
      dig.textContent = pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
      dat.textContent = d.toDateString();
    }
    tick(); intervals.push(setInterval(tick, 1000));
  }
  function renderSW(){
    const t = ce("div","sw"); t.textContent = "00:00.00";
    const ctrls = ce("div","controls");
    const start = ce("button",null,"Start");
    const lap = ce("button","alt","Lap");
    const reset = ce("button","danger","Reset");
    ctrls.appendChild(start); ctrls.appendChild(lap); ctrls.appendChild(reset);
    const laps = ce("div","sw-laps");
    body.appendChild(t); body.appendChild(ctrls); body.appendChild(laps);
    let running=false, ms=0, last=0, lapList=[];
    function fmt(ms){ const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), c=Math.floor((ms%1000)/10); return pad(m)+":"+pad(s)+"."+pad(c); }
    function update(){ if(running){ const now=performance.now(); ms += now-last; last=now; t.textContent = fmt(ms); } }
    intervals.push(setInterval(update, 31));
    start.onclick = ()=>{
      if(!running){ running=true; last=performance.now(); start.textContent="Stop"; start.classList.add("danger"); }
      else { running=false; start.textContent="Start"; start.classList.remove("danger"); }
    };
    lap.onclick = ()=>{ lapList.unshift(fmt(ms)); laps.innerHTML = lapList.map((l,i)=>"Lap "+(lapList.length-i)+": "+l).join("<br>"); };
    reset.onclick = ()=>{ running=false; ms=0; t.textContent="00:00.00"; lapList=[]; laps.innerHTML=""; start.textContent="Start"; start.classList.remove("danger"); };
  }
  function renderTimer(){
    const t = ce("div","sw"); t.textContent="00:00";
    const inputs = ce("div"); inputs.style.display="flex"; inputs.style.gap="6px";
    const min = ce("input"); min.type="number"; min.min="0"; min.max="59"; min.value="0"; min.style.width="60px";
    const sec = ce("input"); sec.type="number"; sec.min="0"; sec.max="59"; sec.value="30"; sec.style.width="60px";
    inputs.appendChild(ce("span",null,"Min")); inputs.appendChild(min);
    inputs.appendChild(ce("span",null,"Sec")); inputs.appendChild(sec);
    const ctrls = ce("div","controls");
    const start = ce("button",null,"Start");
    const reset = ce("button","danger","Reset");
    ctrls.appendChild(start); ctrls.appendChild(reset);
    body.appendChild(t); body.appendChild(inputs); body.appendChild(ctrls);
    let running=false, end=0;
    function tick(){
      if(!running) return;
      const left = Math.max(0, end - Date.now());
      const m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);
      t.textContent = pad(m)+":"+pad(s);
      if(left===0){ running=false; start.textContent="Start"; notify("Timer","Time's up!"); beep(); }
    }
    intervals.push(setInterval(tick, 200));
    start.onclick = ()=>{
      if(!running){ const total = (parseInt(min.value)||0)*60000 + (parseInt(sec.value)||0)*1000; if(total<=0) return; end = Date.now()+total; running=true; start.textContent="Stop"; }
      else { running=false; start.textContent="Start"; }
    };
    reset.onclick = ()=>{ running=false; t.textContent="00:00"; start.textContent="Start"; };
  }
  function renderAlarm(){
    const inp = ce("input"); inp.type="time"; inp.value="07:00";
    const ctrls = ce("div","controls");
    const set = ce("button",null,"Set alarm");
    const cancel = ce("button","danger","Cancel");
    const status = ce("div"); status.style.color="var(--muted)"; status.style.fontSize="13px";
    body.appendChild(ce("div","date","Set an alarm for any time today."));
    body.appendChild(inp); ctrls.appendChild(set); ctrls.appendChild(cancel); body.appendChild(ctrls); body.appendChild(status);
    let alarmAt = null;
    set.onclick = ()=>{ const [h,m] = inp.value.split(":").map(Number); const d=new Date(); d.setHours(h,m,0,0); if(d<Date.now()) d.setDate(d.getDate()+1); alarmAt = d.getTime(); status.textContent = "Alarm set for " + d.toLocaleString(); };
    cancel.onclick = ()=>{ alarmAt=null; status.textContent="No alarm set."; };
    intervals.push(setInterval(()=>{ if(alarmAt && Date.now()>=alarmAt){ notify("⏰ Alarm","It is "+inp.value); beep(); alarmAt=null; status.textContent="Alarm fired."; } },1000));
  }
  function beep(){
    try{
      const ac = new (window.AudioContext||window.webkitAudioContext)();
      const o = ac.createOscillator(); const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 880; o.type = "sine";
      g.gain.setValueAtTime(0.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.4, ac.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.6);
      o.start(); o.stop(ac.currentTime+0.6);
    }catch(_){}
  }
  switchTab("World");
  win.onClose = clearAll;
}

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();

      // ── THREE renderer monkey-patch ───────────────────────────────────

        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);

      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
