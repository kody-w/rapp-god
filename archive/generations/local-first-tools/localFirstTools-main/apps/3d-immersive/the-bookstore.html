      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');

      if (document.body) onApply();

      // ── THREE renderer monkey-patch ───────────────────────────────────

        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;

        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;

      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();

      Storage.prototype.setItem = function(key, val){

        return _set.call(this, key, val);

      // ── Audio gesture auto-overlay ─────────────────────────────────────

        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';

      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.92;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0806);
scene.fog = new THREE.FogExp2(0x0a0806, 0.045);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.05, 80);
const CAM_PRESETS = [
  { name: 'window',    pos: new THREE.Vector3(-3.4, 1.55, 2.2), look: new THREE.Vector3(-5.0, 1.4, -0.5) },
  { name: 'chair',     pos: new THREE.Vector3( 2.2, 1.45, 2.6), look: new THREE.Vector3( 1.0, 0.9,  0.5) },
  { name: 'turntable', pos: new THREE.Vector3( 3.2, 1.30, -1.2), look: new THREE.Vector3( 4.4, 1.0, -2.4) }
];
let camIdx = 0;
camera.position.copy(CAM_PRESETS[0].pos);
camera.lookAt(CAM_PRESETS[0].look);

// =====================================================================

// =====================================================================
const ambient = new THREE.AmbientLight(0x2a1a0a, 0.45);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x4a3a20, 0x0a0604, 0.35);
scene.add(hemi);

const windowLight = new THREE.DirectionalLight(0x6a88a8, 1.1);
windowLight.position.set(-8, 4, 3);
windowLight.target.position.set(-3, 1, 0);
scene.add(windowLight); scene.add(windowLight.target);

const lamp1 = new THREE.PointLight(0xffaa55, 1.2, 8, 1.4);
lamp1.position.set(2.0, 2.2, 1.4);
scene.add(lamp1);

const lampMesh2 = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 8), new THREE.MeshBasicMaterial({ color: 0xffc890 }));
lampMesh2.position.copy(lamp2.position); scene.add(lampMesh2);

// ---- WOOD SHADER (shelves, floor) ----
const woodVert = `
varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
void main(){ vUv = uv; vNormal = normalize(normalMatrix * normal); vec4 wp = modelMatrix * vec4(position,1.0); vWorld = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }`;
const woodFrag = `
precision highp float;
varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
uniform vec3 uColorA; uniform vec3 uColorB; uniform float uScale; uniform float uTime;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} 
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);} 
float fbm(vec2 p){ float v=0.,a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.07; a*=0.5;} return v;} 
void main(){
  vec2 p = vec2(vUv.x*uScale, vUv.y*uScale*8.0);
  float rings = sin(p.y*0.6 + fbm(p*0.4)*4.0)*0.5+0.5;
  float grain = fbm(vec2(vUv.x*40.0, vUv.y*4.0));
  float k = mix(rings, grain, 0.35);
  vec3 col = mix(uColorA, uColorB, k);
  col *= 0.85 + 0.15*fbm(vUv*60.0);
  // light
  vec3 L = normalize(vec3(0.3,0.8,0.5));
  float diff = max(dot(vNormal, L), 0.0);
  col *= 0.35 + 0.75*diff;
  // warm lamp falloff
  vec3 lp = vec3(2.0,2.2,1.4); float d = length(vWorld-lp); col += vec3(1.0,0.55,0.2) * 0.45 / (1.0 + d*d*0.7);
  gl_FragColor = vec4(col, 1.0);
}`;

function woodMat(a, b, scale) {
  return new THREE.ShaderMaterial({
    vertexShader: woodVert, fragmentShader: woodFrag,
    uniforms: { uColorA:{value:new THREE.Color(a)}, uColorB:{value:new THREE.Color(b)}, uScale:{value:scale}, uTime:{value:0} }
  });
}

// ---- BOOK SPINE SHADER (instanced) ----
const spineVert = `
attribute vec3 iColor; attribute float iSeed; attribute float iWear;
varying vec2 vUv; varying vec3 vColor; varying float vSeed; varying float vWear; varying vec3 vWorld;
void main(){
  vUv = uv; vColor = iColor; vSeed = iSeed; vWear = iWear;
  vec4 wp = modelMatrix * instanceMatrix * vec4(position,1.0);
  vWorld = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const spineFrag = `
precision highp float;
varying vec2 vUv; varying vec3 vColor; varying float vSeed; varying float vWear; varying vec3 vWorld;
uniform float uTime;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} 
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);} 
void main(){
  vec3 base = vColor;
  // top/bottom darker (page edge), middle = cloth/leather
  float edge = smoothstep(0.0, 0.05, vUv.y) * smoothstep(0.0, 0.05, 1.0-vUv.y);
  vec3 page = vec3(0.84,0.78,0.62) * (0.7 + 0.3*hash(vec2(vSeed*9.7, vUv.y*7.0)));
  base = mix(page, base, edge);
  // title stripe
  float band = smoothstep(0.55, 0.58, vUv.y) * smoothstep(0.78, 0.75, vUv.y);
  vec3 stripe = mix(base, vec3(0.95,0.86,0.6), 0.55);
  base = mix(base, stripe, band * (0.5 + 0.5*step(0.4, fract(vSeed*3.7))));
  // faux gold lettering — alternating dark dashes
  float letters = step(0.5, fract(vUv.x*14.0 + vSeed*7.0)) * step(0.66, vUv.y) * step(vUv.y, 0.74);
  base = mix(base, vec3(0.9,0.7,0.3), letters * 0.45 * step(0.3, fract(vSeed*5.1)));
  // wear: scratches and fading
  float scratch = noise(vec2(vUv.x*40.0+vSeed*13.0, vUv.y*60.0));
  base *= 1.0 - vWear*0.45*smoothstep(0.6,0.95,scratch);
  base *= 0.85 + 0.15*noise(vec2(vUv.x*80.0, vUv.y*200.0));
  // lighting
  vec3 lp = vec3(2.0,2.2,1.4); float d = length(vWorld-lp);
  vec3 lamp = vec3(1.0,0.55,0.2) * 0.55/(1.0+d*d*0.7);
  vec3 wlp = vec3(-5.0,3.0,1.0); float wd = length(vWorld-wlp);
  vec3 win = vec3(0.4,0.55,0.7) * 0.5/(1.0+wd*wd*0.18);
  base = base * (0.35 + lamp + win);
  gl_FragColor = vec4(base, 1.0);
}`;

const spineMat = new THREE.ShaderMaterial({
  vertexShader: spineVert, fragmentShader: spineFrag,
  uniforms: { uTime: { value: 0 } }
});

// ---- RAIN-ON-GLASS SHADER (window) ----
const rainVert = `varying vec2 vUv; varying vec3 vWorld; void main(){ vUv=uv; vec4 wp=modelMatrix*vec4(position,1.0); vWorld=wp.xyz; gl_Position=projectionMatrix*viewMatrix*wp; }`;
const rainFrag = `
precision highp float;
varying vec2 vUv; varying vec3 vWorld;
uniform float uTime;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} 
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);} 
float fbm(vec2 p){ float v=0.,a=0.5; for(int i=0;i<5;i++){v+=a*noise(p); p=p*2.07; a*=0.5;} return v;}
float drop(vec2 uv, vec2 c, float r, float t){
  vec2 d = uv - c; float h = max(0.0, 1.0 - length(d)/r);
  return h*h * (0.6 + 0.4*sin(t*8.0));
}
void main(){
  vec2 uv = vUv;
  // streaks running down
  float streak = 0.0;
  for(int i=0;i<8;i++){
    float fi = float(i);
    float x = hash(vec2(fi, 1.7))*1.0;
    float speed = 0.04 + hash(vec2(fi,3.1))*0.06;
    float yt = mod(uv.y - uTime*speed + hash(vec2(fi,9.1)), 1.0);
    float w = 0.004 + hash(vec2(fi,5.5))*0.006;
    float band = smoothstep(w, 0.0, abs(uv.x-x));
    streak += band * smoothstep(0.0, 0.3, yt) * (1.0-yt);
  }
  // droplets accreting
  float drops = 0.0;
  for(int i=0;i<14;i++){
    float fi = float(i);
    vec2 c = vec2(hash(vec2(fi,11.0)), fract(hash(vec2(fi,7.0)) - uTime*0.015 - hash(vec2(fi,2.1))*0.05));
    float r = 0.012 + hash(vec2(fi,4.4))*0.020;
    drops += drop(uv, c, r, uTime + fi);
  }
  // distorted blurry exterior — stormy sky and street smear
  vec2 dist = uv + vec2(streak*0.02, drops*0.02);
  float sky = 0.25 + 0.20*fbm(dist*3.0 + vec2(uTime*0.05,0.0));
  vec3 outside = mix(vec3(0.20,0.26,0.32), vec3(0.45,0.50,0.55), sky);
  // far lamps as warm smudges
  float lampSmudge = smoothstep(0.7, 0.95, fbm(dist*8.0 + vec2(uTime*0.02, 0.0)));
  outside += vec3(1.0,0.7,0.4) * lampSmudge * 0.35;
  // condensation / streak highlight
  vec3 col = outside + vec3(0.6,0.7,0.8) * (streak*0.6 + drops*0.9);
  // glass tint
  col *= 0.85;
  // edge frame darken
  float frame = smoothstep(0.0, 0.06, uv.x)*smoothstep(0.0,0.06,1.0-uv.x)*smoothstep(0.0,0.06,uv.y)*smoothstep(0.0,0.06,1.0-uv.y);
  col *= 0.4 + 0.6*frame;
  gl_FragColor = vec4(col, 1.0);
}`;

const rainMat = new THREE.ShaderMaterial({
  vertexShader: rainVert, fragmentShader: rainFrag,
  uniforms: { uTime: { value: 0 } }
});

// ---- LEATHER SHADER (chair) ----
const leatherFrag = `
precision highp float;
varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
uniform vec3 uColor; uniform float uTime;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} 
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);} 
float fbm(vec2 p){ float v=0.,a=0.5; for(int i=0;i<5;i++){v+=a*noise(p); p*=2.07; a*=0.5;} return v;}
void main(){
  vec2 uv = vUv;
  float crackle = fbm(uv*22.0);
  float pores = noise(uv*180.0);
  vec3 col = uColor * (0.55 + 0.45*crackle);
  col *= 0.85 + 0.15*pores;
  // worn highlights on top/edges
  float wear = smoothstep(0.4, 0.6, fbm(uv*6.0));
  col = mix(col, col*1.3 + vec3(0.05,0.04,0.02), wear*0.4);
  vec3 L = normalize(vec3(0.3,0.8,0.5));
  float diff = max(dot(vNormal, L), 0.0);
  col *= 0.30 + 0.7*diff;
  vec3 lp = vec3(2.0,2.2,1.4); float d = length(vWorld-lp);
  col += vec3(1.0,0.5,0.2) * 0.5/(1.0+d*d*0.6);
  gl_FragColor = vec4(col,1.0);
}`;
const leatherMat = new THREE.ShaderMaterial({
  vertexShader: woodVert, fragmentShader: leatherFrag,
  uniforms: { uColor:{value:new THREE.Color(0x4a2818)}, uTime:{value:0} }
});

// ---- VINYL SHADER ----
const vinylFrag = `
precision highp float;
varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
uniform float uTime; uniform float uSpinning;
void main(){
  vec2 p = vUv - 0.5;
  float r = length(p);
  float a = atan(p.y,p.x);
  // grooves
  float g = sin(r*240.0)*0.5+0.5;
  vec3 col = vec3(0.04,0.04,0.05) * (0.7+0.3*g);
  // label
  if(r < 0.18){ col = vec3(0.7,0.1,0.05) * (0.8+0.2*g); 
    if(r<0.025) col = vec3(0.1,0.08,0.06);
    // print a faint ring of letters on label
    float ring = step(0.13, r) * step(r, 0.16);
    float seg = step(0.5, fract((a/6.2831 + uTime*uSpinning*0.05)*40.0));
    col = mix(col, vec3(0.95,0.85,0.6), ring*seg*0.4);
  }
  // shine
  float shine = pow(max(0.0, dot(vNormal, normalize(vec3(0.4,0.9,0.5)))), 12.0);
  col += shine*0.3;
  // spinning specular sweep
  float sweep = 0.5+0.5*sin(a*2.0 + uTime*uSpinning*8.0);
  col += vec3(0.2,0.2,0.25) * sweep * (1.0-r) * 0.18;
  gl_FragColor = vec4(col,1.0);
}`;
const vinylMat = new THREE.ShaderMaterial({

  uniforms: { uTime:{value:0}, uSpinning:{value:1.0} }

function buildShelfUnit(width, x, z, rotY) {
  const grp = new THREE.Group();
  grp.position.set(x, 0, z); grp.rotation.y = rotY;
  // back panel
  const backMat = woodMat(0x1a0e06, 0x3a2010, 4);
  const back = new THREE.Mesh(new THREE.BoxGeometry(width, ROOM.h*0.85, 0.03), backMat);
  back.position.set(0, ROOM.h*0.425, -SHELF_DEPTH/2 - 0.015); grp.add(back);
  // sides

  const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.04, ROOM.h*0.85, SHELF_DEPTH), sideMat);
  sideL.position.set(-width/2, ROOM.h*0.425, 0); grp.add(sideL);
  const sideR = new THREE.Mesh(new THREE.BoxGeometry(0.04, ROOM.h*0.85, SHELF_DEPTH), sideMat);
  sideR.position.set(width/2, ROOM.h*0.425, 0); grp.add(sideR);
  // shelves
  const shelfYs = [];
  for (let s = 0; s <= SHELVES_PER_UNIT; s++) {
    const y = 0.05 + s * (ROOM.h*0.85 - 0.1) / SHELVES_PER_UNIT;
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(width, SHELF_THICK, SHELF_DEPTH), sideMat);
    shelf.position.set(0, y, 0); grp.add(shelf);
    if (s < SHELVES_PER_UNIT) shelfYs.push(y + SHELF_THICK/2);
  }
  return { group: grp, shelfYs, width };
}

const booksPerShelfActual = Math.ceil(TARGET_BOOKS / TOTAL_SHELVES);
const totalBooks = TOTAL_SHELVES * booksPerShelfActual;

const iColors = new Float32Array(totalBooks * 3);
const iSeeds = new Float32Array(totalBooks);
const iWears = new Float32Array(totalBooks);

const bookPalette = [
  [0.32,0.10,0.08],[0.40,0.20,0.10],[0.18,0.22,0.34],[0.14,0.30,0.22],
  [0.45,0.35,0.18],[0.22,0.10,0.20],[0.50,0.42,0.28],[0.28,0.34,0.40],
  [0.55,0.28,0.18],[0.16,0.16,0.18],[0.38,0.16,0.22],[0.30,0.40,0.32]
];

const bookData = []; // for raycast detail
const dummy = new THREE.Object3D();
let bi = 0;

shelfUnits.forEach(unit => {
  unit.shelfYs.forEach(shelfY => {
    const w = unit.width - 0.12;
    const startX = -w/2 + 0.06;
    let cursorX = 0;
    for (let k = 0; k < booksPerShelfActual; k++) {
      const t = k / booksPerShelfActual;
      const tilt = (Math.random() < 0.04) ? (Math.random()*0.3 - 0.15) : 0;
      const bw = 0.025 + Math.random()*0.030;
      const bh = 0.16 + Math.random()*0.13;
      const bd = 0.18 + Math.random()*0.10;
      const x = startX + cursorX + bw/2;
      cursorX += bw + 0.002;
      if (x > w/2 - 0.03) break;
      // local -> world
      const local = new THREE.Vector3(x, shelfY + bh/2, 0);
      const wp = local.clone().applyEuler(unit.group.rotation).add(unit.group.position);
      dummy.position.copy(wp);
      dummy.rotation.set(0, unit.group.rotation.y, tilt);
      dummy.scale.set(bw, bh, bd);
      dummy.updateMatrix();
      booksMesh.setMatrixAt(bi, dummy.matrix);
      const col = bookPalette[Math.floor(Math.random()*bookPalette.length)];
      const variance = 0.85 + Math.random()*0.3;
      iColors[bi*3+0] = col[0]*variance;
      iColors[bi*3+1] = col[1]*variance;
      iColors[bi*3+2] = col[2]*variance;
      iSeeds[bi] = Math.random();
      iWears[bi] = 0.3 + Math.random()*0.7;
      bookData.push({ idx: bi, pos: wp.clone(), rotY: unit.group.rotation.y, h: bh, w: bw, d: bd, baseTilt: tilt, tiltAnim: 0 });
      bi++;
      if (bi >= totalBooks) break;
    }
    if (bi >= totalBooks) return;
  });
});

    attribute float aSeed; varying float vAlpha;
    uniform float uTime;
    void main(){
      vec3 p = position;
      p.y += sin(uTime*0.3 + aSeed*30.0)*0.05;
      p.x += sin(uTime*0.2 + aSeed*22.0)*0.04;

let audioCtx = null, masterGain = null, rainNode = null, hissNode = null;
let pianoGain = null, vinylNoiseGain = null, purrLfo = null;
let audioStarted = false;

function startAudio(){
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);
  masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 1.6);

  // === RAIN BED — pink-ish noise through bandpass + lowpass ===
  const bufSize = 2 * audioCtx.sampleRate;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  let b0=0,b1=0,b2=0;
  for (let i = 0; i < bufSize; i++) {
    const w = Math.random()*2-1;
    b0 = 0.99765*b0 + w*0.0990460;
    b1 = 0.96300*b1 + w*0.2965164;
    b2 = 0.57000*b2 + w*1.0526913;
    data[i] = (b0+b1+b2 + w*0.1848)*0.18;
  }
  const rainSrc = audioCtx.createBufferSource();
  rainSrc.buffer = noiseBuf; rainSrc.loop = true;
  const rainBP = audioCtx.createBiquadFilter(); rainBP.type='bandpass'; rainBP.frequency.value=1200; rainBP.Q.value=0.6;
  const rainLP = audioCtx.createBiquadFilter(); rainLP.type='lowpass'; rainLP.frequency.value=2400;
  rainNode = audioCtx.createGain(); rainNode.gain.value = 0.6;
  rainSrc.connect(rainBP); rainBP.connect(rainLP); rainLP.connect(rainNode); rainNode.connect(masterGain);
  rainSrc.start();

  // === Wind/room hiss ===
  const hissSrc = audioCtx.createBufferSource();
  hissSrc.buffer = noiseBuf; hissSrc.loop = true;
  const hissLP = audioCtx.createBiquadFilter(); hissLP.type='lowpass'; hissLP.frequency.value=400;
  hissNode = audioCtx.createGain(); hissNode.gain.value = 0.05;
  hissSrc.connect(hissLP); hissLP.connect(hissNode); hissNode.connect(masterGain);
  hissSrc.start();

  // === Vinyl crackle layer ===
  const crackleSrc = audioCtx.createBufferSource();
  crackleSrc.buffer = noiseBuf; crackleSrc.loop = true;
  const crackleHP = audioCtx.createBiquadFilter(); crackleHP.type='highpass'; crackleHP.frequency.value=3200;
  vinylNoiseGain = audioCtx.createGain(); vinylNoiseGain.gain.value = 0.04;
  crackleSrc.connect(crackleHP); crackleHP.connect(vinylNoiseGain); vinylNoiseGain.connect(masterGain);
  crackleSrc.start();

  // === Piano bus ===
  pianoGain = audioCtx.createGain(); pianoGain.gain.value = 0.32;
  const pianoConv = audioCtx.createConvolver();
  // tiny IR — synthesize a short reverb tail
  const irLen = audioCtx.sampleRate * 1.8;
  const irBuf = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const ch = irBuf.getChannelData(c);
    for (let i = 0; i < irLen; i++) {
      ch[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 3.0);
    }
  }
  pianoConv.buffer = irBuf;
  const pianoDry = audioCtx.createGain(); pianoDry.gain.value = 0.6;
  const pianoWet = audioCtx.createGain(); pianoWet.gain.value = 0.55;
  pianoGain.connect(pianoDry); pianoDry.connect(masterGain);
  pianoGain.connect(pianoConv); pianoConv.connect(pianoWet); pianoWet.connect(masterGain);

  schedulePiano();

  // occasional ambient: page rustle, wood creak
  setInterval(() => { if (Math.random() < 0.5) pageRustle(); }, 9000);
  setInterval(() => { if (Math.random() < 0.4) woodCreak(); }, 14000);
}

function pianoNote(freq, time, dur, vel) {
  if (!audioCtx) return;
  // additive: fundamental + a few harmonics with quick decay (hammer-like)
  const partials = [
    { m: 1.00, a: 1.00 }, { m: 2.00, a: 0.42 }, { m: 3.01, a: 0.20 },
    { m: 4.02, a: 0.10 }, { m: 5.04, a: 0.06 }, { m: 6.06, a: 0.03 }
  ];
  const noteGain = audioCtx.createGain();
  noteGain.gain.setValueAtTime(0.0001, time);
  noteGain.gain.exponentialRampToValueAtTime(vel, time + 0.005);
  noteGain.gain.exponentialRampToValueAtTime(vel*0.4, time + 0.20);
  noteGain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 2800; lp.Q.value=0.4;
  noteGain.connect(lp); lp.connect(pianoGain);
  partials.forEach(p => {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * p.m;
    const g = audioCtx.createGain(); g.gain.value = p.a;
    o.connect(g); g.connect(noteGain);
    o.start(time);
    o.stop(time + dur + 0.05);
  });
  // tiny pluck noise at attack
  const nLen = Math.floor(0.04*audioCtx.sampleRate);
  const nb = audioCtx.createBuffer(1, nLen, audioCtx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = (Math.random()*2-1) * (1 - i/nLen);
  const ns = audioCtx.createBufferSource(); ns.buffer = nb;
  const ng = audioCtx.createGain(); ng.gain.value = vel*0.05;
  const nbp = audioCtx.createBiquadFilter(); nbp.type='bandpass'; nbp.frequency.value = freq*2; nbp.Q.value = 4;
  ns.connect(nbp); nbp.connect(ng); ng.connect(pianoGain);
  ns.start(time);
}

// === Procedural Satie-esque scheduler ===
// 60 BPM. Slow chords + sparse top melody. Rests permitted.
const NOTE = (n) => 440 * Math.pow(2, (n-69)/12);
const CHORDS_C = [
  [60,64,67,71], // Cmaj7
  [57,60,64,67], // Am7
  [62,65,69,72], // Dm7
  [55,59,62,65], // G7
  [65,69,72,76], // Fmaj7
  [60,63,67,70], // Cm7-ish (color)
];
let pianoMeasure = 0;
function schedulePiano(){
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const beat = 1.0; // 60 BPM
  const measureLen = beat*4;
  const chord = CHORDS_C[pianoMeasure % CHORDS_C.length];
  pianoMeasure++;

  // sustained left-hand chord on beat 1
  const chordTime = now + 0.05;
  const root = chord[0] - 12;
  pianoNote(NOTE(root), chordTime, 3.6, 0.18);
  // arpeggiated middle
  chord.forEach((m, idx) => {
    const t = chordTime + idx*0.35;
    if (Math.random() < 0.92) pianoNote(NOTE(m), t, 1.8, 0.10 + Math.random()*0.04);
  });
  // top-line melody — pick from chord scale tones, with rests
  const scale = [60,62,64,65,67,69,71,72,74,76,77];
  const melodySteps = 6;
  for (let i = 0; i < melodySteps; i++) {
    const t = chordTime + 1.2 + i*0.55;
    if (Math.random() < 0.62) {
      const m = scale[Math.floor(Math.random()*scale.length)] + 12;
      const dur = 0.6 + Math.random()*0.8;
      pianoNote(NOTE(m), t, dur, 0.07 + Math.random()*0.05);
    }
  }
  // 6th/9th colour drop
  if (Math.random() < 0.4) {
    pianoNote(NOTE(chord[1]+12), chordTime + 2.3, 1.0, 0.08);
  }

  // schedule the next measure slightly before this one ends
  setTimeout(schedulePiano, (measureLen - 0.2) * 1000);
}

function pageRustle(){
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const len = 0.4;
  const lenS = Math.floor(len*audioCtx.sampleRate);
  const buf = audioCtx.createBuffer(1, lenS, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < lenS; i++) {
    const t = i/lenS;
    d[i] = (Math.random()*2-1) * (1-t) * (0.4 + 0.6*Math.sin(t*40 + Math.random()*0.5));
  }
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.08;
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 4000; bp.Q.value = 0.8;
  s.connect(bp); bp.connect(g); g.connect(masterGain);
  s.start(now);
}
function woodCreak(){
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value = 90 + Math.random()*40;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.04, now+0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, now+0.6);
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 600;
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  o.start(now); o.stop(now+0.7);
  // pitch droop
  o.frequency.exponentialRampToValueAtTime(60, now+0.6);
}

function makeTitle(seed){
  const r = (i,arr) => arr[Math.floor(seed*1000 + i*7) % arr.length];
  let t = `${r(0,TITLE_W1)} ${r(1,TITLE_W2)}`;
  const tail = r(2,TITLE_W3);
  if (tail) t += ' ' + tail;
  return t;
}
function makeAuthor(seed){
  const a = FIRST_NAMES[Math.floor(seed*1000) % FIRST_NAMES.length];
  const b = LAST_NAMES[Math.floor(seed*7777) % LAST_NAMES.length];
  return `${a} ${b}`;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function makeExcerpt(){
  const sents = 4 + Math.floor(Math.random()*2);
  const out = [];
  for (let i = 0; i < sents; i++) {
    const templates = [
      `The ${pick(ADJ)} ${pick(NOUN)} ${pick(VERB)} the ${pick(NOUN)} ${pick(PHRASE)}.`,
      `In a ${pick(ADJ)} ${pick(NOUN)}, she ${pick(VERB)} the ${pick(ADJ)} ${pick(NOUN)}.`,
      `He could not say whether the ${pick(NOUN)} ${pick(VERB)} him, or whether he ${pick(VERB)} it.`,

let modalTimers = [];
function openBookModal(id){
  const seed = iSeeds[id];
  bmTitle.textContent = makeTitle(seed);
  bmAuthor.textContent = makeAuthor(seed);
  const excerpt = makeExcerpt();
  bmText.innerHTML = '';
  const words = excerpt.split(' ');
  words.forEach((w, i) => {
    const sp = document.createElement('span'); sp.className = 'word'; sp.textContent = w + ' ';
    bmText.appendChild(sp);
    const tm = setTimeout(() => sp.classList.add('in'), i*180);
    modalTimers.push(tm);
  });
  bookModal.classList.add('show');
  pageRustle();
}
function closeBookModal(){
  bookModal.classList.remove('show');
  modalTimers.forEach(t => clearTimeout(t));
  modalTimers = [];
}
bookModal.addEventListener('click', closeBookModal);

// =====================================================================
// OVERLAY → AUDIO START
// =====================================================================
const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  overlay.classList.add('gone');
  startAudio();
  setTimeout(() => overlay.style.display = 'none', 1700);
});

// =====================================================================
// RESIZE
// =====================================================================
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// =====================================================================
// ANIMATE
// =====================================================================
const clock = new THREE.Clock();
const tiltDummy = new THREE.Object3D();

function animate(){
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.elapsedTime;

  rainMat.uniforms.uTime.value = t;
  vinylMat.uniforms.uTime.value = t;
  posterMat.uniforms.uTime.value = t;
  moteMat.uniforms.uTime.value = t;
  spineMat.uniforms.uTime.value = t;
  floorMat.uniforms.uTime.value = t;
  leatherMat.uniforms.uTime.value = t;

  // book tilt animations (raycast hovered)
  for (let i = 0; i < bookData.length; i++) {
    const b = bookData[i];
    if (b.tiltAnim > 0) {
      b.tiltAnim = Math.max(0, b.tiltAnim - dt*0.6);
      // recompose matrix
      tiltDummy.position.copy(b.pos);
      // wobble: extend forward and tilt
      const fwd = new THREE.Vector3(0, 0, 1).applyEuler(new THREE.Euler(0, b.rotY, 0));
      const k = b.tiltAnim;
      tiltDummy.position.addScaledVector(fwd, k * 0.05);
      tiltDummy.rotation.set(k*0.4, b.rotY, b.baseTilt);
      tiltDummy.scale.set(b.w, b.h, b.d);
      tiltDummy.updateMatrix();
      booksMesh.setMatrixAt(b.idx, tiltDummy.matrix);
      booksMesh.instanceMatrix.needsUpdate = true;
    }
  }

  // cat breathing
  const breathe = 1 + Math.sin(t*0.9)*0.025;
  cat.scale.y = breathe;
  // tail flick — occasional
  tail.rotation.x = 0.4 + Math.sin(t*0.6)*0.15;
  // eye blink — closed mostly, occasional opening
  const blink = Math.sin(t*0.13);
  const open = blink > 0.92 ? 1 : 0;
  eyeL.scale.y = open*1.0 + 0.05;
  eyeR.scale.y = open*1.0 + 0.05;

  // turntable spin
  record.rotation.y += dt * (Math.PI*2 / 1.8);

  // lamp flicker
  lamp1.intensity = 1.15 + Math.sin(t*9.3)*0.04 + Math.sin(t*23.1)*0.02;
  lamp2.intensity = 0.68 + Math.sin(t*7.7+1.3)*0.03;

  // camera smoothing
  camCurrent.pos.lerp(camTarget.pos, 0.04);
  camCurrent.look.lerp(camTarget.look, 0.04);
  camera.position.copy(camCurrent.pos);
  // apply yaw/pitch offset around target
  const lookDir = new THREE.Vector3().subVectors(camCurrent.look, camCurrent.pos);
  const upAxis = new THREE.Vector3(0,1,0);
  const rightAxis = new THREE.Vector3().crossVectors(lookDir, upAxis).normalize();
  const yawQ = new THREE.Quaternion().setFromAxisAngle(upAxis, yawOff);
  const pitchQ = new THREE.Quaternion().setFromAxisAngle(rightAxis, pitchOff);
  lookDir.applyQuaternion(yawQ).applyQuaternion(pitchQ);
  const finalLook = new THREE.Vector3().addVectors(camCurrent.pos, lookDir);
  camera.lookAt(finalLook);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
