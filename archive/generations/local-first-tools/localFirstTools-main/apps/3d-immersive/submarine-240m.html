<style>

  .hud {
    position: fixed;
    background: rgba(8, 22, 28, 0.55);
    border: 1px solid rgba(108, 242, 255, 0.35);
    box-shadow:

  #hud-pressure{ top: 110px; left: 18px; min-width: 160px; }

    border: 1px solid rgba(108,242,255,0.7);

    font-size: 11px;
    letter-spacing: 0.15em;

    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);

    33% { filter: brightness(0.3) hue-rotate(-10deg); }
    66% { filter: brightness(1.4); }

    <style id="levigold-enhancement-css">

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;

`;

const lampHead = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 16, 12, 0, Math.PI*2, 0, Math.PI/2),
  new THREE.MeshStandardMaterial({ color: 0x2a2418, metalness: 0.6, roughness: 0.5, emissive: 0x804010, emissiveIntensity: 0.6 })
);
lampHead.position.set(0, 0.55, -0.18);
lampHead.rotation.x = Math.PI;
scene.add(lampHead);

// =========================================================================
//  WEB AUDIO — sonar ping, hull groan, generator hum, drips, whale
// =========================================================================
let audio = null;
const audioState = {
  groanTimer: 0,
  groanNext: 8,
  dripTimer: 0,
  whaleTimer: 0,
  whaleNext: 22,
};

function initAudio() {
  if (audio) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const master = ctx.createGain();
  master.gain.value = 0.7;
  master.connect(ctx.destination);

  // simple convolver "reverb" — a synthesized noise IR
  const ir = ctx.createBuffer(2, ctx.sampleRate * 1.6, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++){
    const d = ir.getChannelData(ch);
    for (let i = 0; i < d.length; i++){
      const t = i / d.length;
      d[i] = (Math.random()*2-1) * Math.pow(1 - t, 3.0) * 0.9;
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = ir;
  const wet = ctx.createGain(); wet.gain.value = 0.35;
  conv.connect(wet); wet.connect(master);

  // generator hum: low oscillator + slight detune
  const humA = ctx.createOscillator(); humA.type = 'sawtooth'; humA.frequency.value = 58;
  const humB = ctx.createOscillator(); humB.type = 'sawtooth'; humB.frequency.value = 116.4;
  const humLp = ctx.createBiquadFilter(); humLp.type = 'lowpass'; humLp.frequency.value = 280; humLp.Q.value = 0.4;
  const humGain = ctx.createGain(); humGain.gain.value = 0.10;
  humA.connect(humLp); humB.connect(humLp);
  humLp.connect(humGain); humGain.connect(master);
  humA.start(); humB.start();
  // gentle hum LFO
  const humLFO = ctx.createOscillator(); humLFO.frequency.value = 0.13;
  const humLFOg = ctx.createGain(); humLFOg.gain.value = 0.025;
  humLFO.connect(humLFOg); humLFOg.connect(humGain.gain);
  humLFO.start();

  // ambient ocean — pink-ish noise band
  const noiseLen = ctx.sampleRate * 4;
  const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  let lp = 0;
  for (let i = 0; i < noiseLen; i++){
    const w = Math.random()*2-1;
    lp = lp*0.97 + w*0.03;
    nd[i] = lp;
  }
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = noiseBuf; noiseSrc.loop = true;
  const noiseLp = ctx.createBiquadFilter(); noiseLp.type = 'lowpass'; noiseLp.frequency.value = 380; noiseLp.Q.value = 0.7;
  const noiseGain = ctx.createGain(); noiseGain.gain.value = 0.20;
  noiseSrc.connect(noiseLp); noiseLp.connect(noiseGain); noiseGain.connect(master);
  noiseSrc.start();

  audio = { ctx, master, conv, humLp, humGain, noiseLp, noiseGain };
}

function playPing() {
  if (!audio) return;
  const { ctx, master, conv } = audio;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.exponentialRampToValueAtTime(220, t + 0.6);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.5, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
  osc.connect(g);
  g.connect(master);
  g.connect(conv);
  osc.start(t);
  osc.stop(t + 1.0);
}

function playGroan() {
  if (!audio) return;
  const { ctx, master, conv } = audio;
  const t = ctx.currentTime;
  const dur = 3.5 + Math.random()*2.5;
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let lp = 0;
  for (let i = 0; i < d.length; i++){
    const w = Math.random()*2-1;
    lp = lp*0.992 + w*0.008;
    d[i] = lp * (1.0 - i / d.length);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(120, t);
  filt.frequency.linearRampToValueAtTime(60, t + dur);
  filt.Q.value = 4;
  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random()*2-1) * 0.7;
  const g = ctx.createGain();
  g.gain.value = 0.0;
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.55, t + 0.2);
  g.gain.linearRampToValueAtTime(0.0, t + dur);
  src.connect(filt); filt.connect(pan); pan.connect(g);
  g.connect(master);
  g.connect(conv);
  src.start(t);

  // creak overtone — band-passed noise
  const buf2 = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d2 = buf2.getChannelData(0);
  for (let i = 0; i < d2.length; i++) d2[i] = (Math.random()*2-1) * 0.4;
  const src2 = ctx.createBufferSource(); src2.buffer = buf2;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 280 + Math.random()*120; bp.Q.value = 18;
  const g2 = ctx.createGain(); g2.gain.value = 0.0;
  g2.gain.linearRampToValueAtTime(0.08, t+0.3);
  g2.gain.linearRampToValueAtTime(0.0, t+dur);
  src2.connect(bp); bp.connect(g2); g2.connect(master); g2.connect(conv);
  src2.start(t);

  triggerFlicker();
}

function playDrip() {
  if (!audio) return;
  const { ctx, master, conv } = audio;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  const f = 700 + Math.random()*900;
  osc.frequency.setValueAtTime(f, t);
  osc.frequency.exponentialRampToValueAtTime(f*0.55, t + 0.12);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.18, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random()*2-1) * 0.8;
  osc.connect(g); g.connect(pan); pan.connect(master); pan.connect(conv);
  osc.start(t); osc.stop(t + 0.25);
}

function playWhale() {
  if (!audio) return;
  const { ctx, master, conv } = audio;
  const t = ctx.currentTime;
  const dur = 6 + Math.random()*4;
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  const f0 = 70 + Math.random()*40;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.linearRampToValueAtTime(f0 * 0.4, t + dur*0.5);
  osc.frequency.linearRampToValueAtTime(f0 * 0.6, t + dur);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.12, t + 1.0);
  g.gain.linearRampToValueAtTime(0.0,  t + dur);
  const pan = ctx.createStereoPanner();
  pan.pan.value = (Math.random()*2-1) * 0.95;
  osc.connect(g); g.connect(pan); pan.connect(master); pan.connect(conv);
  osc.start(t); osc.stop(t + dur + 0.1);
}

// =========================================================================
//  STATE
// =========================================================================
const state = {
  depth: 240,
  targetDepth: 240,
  heading: 0,
  oxygen: 98.4,
  pressure: 25.1,
  startTime: performance.now(),
  flickerUntil: 0,
  pingTimer: 0,
  pingInterval: 4.0,
  periscope: false,
  zoom: 1.0,
};

function triggerFlicker() {
  state.flickerUntil = performance.now() + 280 + Math.random()*220;
  document.querySelectorAll('.hud').forEach(h => {
    h.classList.remove('flicker');
    void h.offsetWidth;
    h.classList.add('flicker');
  });
}

// =========================================================================
//  SONAR — 2D radial CRT
// =========================================================================
const sonarCanvas = $('#sonar-canvas');
const sctx = sonarCanvas.getContext('2d');
const SW = sonarCanvas.width, SH = sonarCanvas.height;
const sonarBlips = [];
for (let i = 0; i < 6; i++) {
  sonarBlips.push({
    angle: Math.random() * Math.PI*2,
    radius: 60 + Math.random()*160,
    drift: (Math.random()*2-1) * 0.0006,
    radialDrift: (Math.random()*2-1) * 0.04,
    pulse: Math.random() * Math.PI*2,
    detectedAt: -1
  });
}
let sonarSweep = 0;

function drawSonar(dt) {
  // phosphor decay
  sctx.fillStyle = 'rgba(2, 8, 12, 0.10)';
  sctx.fillRect(0,0,SW,SH);

  const cx = SW/2, cy = SH/2;
  const R = Math.min(SW,SH)*0.46;

  // grid
  sctx.strokeStyle = 'rgba(108,242,255,0.16)';
  sctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++){
    sctx.beginPath();
    sctx.arc(cx, cy, R * (i/4), 0, Math.PI*2);
    sctx.stroke();
  }
  for (let a = 0; a < 12; a++){
    const ang = (a/12) * Math.PI*2;
    sctx.beginPath();
    sctx.moveTo(cx, cy);
    sctx.lineTo(cx + Math.cos(ang)*R, cy + Math.sin(ang)*R);
    sctx.stroke();
  }

  // sweep
  sonarSweep += dt * (Math.PI*2 / state.pingInterval);
  if (sonarSweep > Math.PI*2) sonarSweep -= Math.PI*2;

  // sweep gradient cone
  for (let i = 0; i < 36; i++) {
    const aOff = -i * 0.025;
    const a = sonarSweep + aOff;
    sctx.strokeStyle = `rgba(140, 255, 180, ${0.55 * (1 - i/36)})`;
    sctx.lineWidth = 2;
    sctx.beginPath();
    sctx.moveTo(cx, cy);
    sctx.lineTo(cx + Math.cos(a)*R, cy + Math.sin(a)*R);
    sctx.stroke();
  }

  // sub center
  sctx.fillStyle = 'rgba(108,242,255,0.9)';
  sctx.beginPath(); sctx.arc(cx, cy, 4, 0, Math.PI*2); sctx.fill();
  sctx.strokeStyle = 'rgba(108,242,255,0.5)';
  sctx.beginPath(); sctx.arc(cx, cy, 9, 0, Math.PI*2); sctx.stroke();

  // blips
  for (const b of sonarBlips) {
    b.angle += b.drift * dt * 60;
    b.radius += b.radialDrift * dt * 60;
    if (b.radius < 30) b.radialDrift = Math.abs(b.radialDrift);
    if (b.radius > R - 6) b.radialDrift = -Math.abs(b.radialDrift);
    b.pulse += dt * 2.0;

    // detect when sweep passes
    let aDiff = ((b.angle - sonarSweep) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    if (aDiff < 0.05) b.detectedAt = performance.now();

    if (b.detectedAt > 0) {
      const age = (performance.now() - b.detectedAt) / 1000;
      const fade = Math.max(0, 1 - age / state.pingInterval);
      if (fade > 0) {
        const x = cx + Math.cos(b.angle) * b.radius;
        const y = cy + Math.sin(b.angle) * b.radius;
        sctx.fillStyle = `rgba(180, 255, 200, ${fade * 0.95})`;
        sctx.beginPath(); sctx.arc(x, y, 4 + 2*Math.sin(b.pulse), 0, Math.PI*2); sctx.fill();
        sctx.strokeStyle = `rgba(180, 255, 200, ${fade * 0.4})`;
        sctx.lineWidth = 1.2;
        sctx.beginPath(); sctx.arc(x, y, 10, 0, Math.PI*2); sctx.stroke();
      }
    }
  }

  // bezel CRT vignette
  const grad = sctx.createRadialGradient(cx, cy, R*0.7, cx, cy, R);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.7)');
  sctx.fillStyle = grad;
  sctx.beginPath(); sctx.arc(cx, cy, R, 0, Math.PI*2); sctx.fill();
}

// =========================================================================
//  INPUT
// =========================================================================
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camYaw.target   += dx * 0.0028;
  camPitch.target -= dy * 0.0022;
  camPitch.target = Math.max(-0.5, Math.min(0.5, camPitch.target));
});
window.addEventListener('wheel', (e) => {
  state.zoom += -e.deltaY * 0.0008;
  state.zoom = Math.max(0.6, Math.min(2.4, state.zoom));
  $('#psc-zoom').textContent = state.zoom.toFixed(1);
}, { passive: true });

// ballast lever drag
const track = $('#ballast-track');
const knob  = $('#ballast-knob');
let ballastDrag = false;
function setBallast(clientX) {
  const r = track.getBoundingClientRect();
  const t = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
  state.targetDepth = 200 + t * 300;
  knob.style.left = (t * 100) + '%';
  $('#ballast-target').textContent = Math.round(state.targetDepth) + 'm';
}
track.addEventListener('mousedown', (e) => { ballastDrag = true; setBallast(e.clientX); e.stopPropagation(); });
window.addEventListener('mousemove', (e) => { if (ballastDrag) setBallast(e.clientX); });
window.addEventListener('mouseup',   () => { ballastDrag = false; });
// init knob
knob.style.left = (((240-200)/300) * 100) + '%';

window.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') { playPing(); state.pingTimer = 0; }
  else if (e.key === 'l' || e.key === 'L') { triggerFlicker(); playGroan(); }
  else if (e.key === ' ') {
    e.preventDefault();
    const cycle = [220, 280, 360, 440, 240];
    const cur = cycle.findIndex(v => Math.abs(v - state.targetDepth) < 25);
    state.targetDepth = cycle[(cur + 1) % cycle.length];
    const t = (state.targetDepth - 200) / 300;
    knob.style.left = (t * 100) + '%';
    $('#ballast-target').textContent = Math.round(state.targetDepth) + 'm';
  }
  else if (e.key === 'v' || e.key === 'V') togglePeriscope();
});

// periscope toggle
function togglePeriscope() {
  state.periscope = !state.periscope;
  $('#periscope-overlay').classList.toggle('active', state.periscope);
  $('#periscope-toggle').classList.toggle('active', state.periscope);
}
$('#periscope-toggle').addEventListener('click', togglePeriscope);

// intro click to start
const intro = $('#intro');
intro.addEventListener('click', () => {
  initAudio();
  intro.classList.add('fading');
  setTimeout(() => intro.remove(), 1500);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// =========================================================================
//  HUD UPDATE
// =========================================================================
const hudDepth = $('#depth-val');
const hudHeading = $('#heading-val');
const hudTime = $('#time-val');
const hudO2 = $('#o2-val');
const hudP = $('#pressure-val');
const pscBearing = $('#psc-bearing');

function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

// =========================================================================
//  ANIMATION LOOP
// =========================================================================
const clock = new THREE.Clock();
let elapsed = 0;
function animate() {
  const dt = Math.min(0.05, clock.getDelta());
  elapsed += dt;

  // smooth camera yaw/pitch
  camYaw.value   += (camYaw.target   - camYaw.value)   * 0.12;
  camPitch.value += (camPitch.target - camPitch.value) * 0.12;

  // periscope = wider FOV reset so look feels different
  const fovTarget = state.periscope ? (32 / state.zoom) : 62;
  camera.fov += (fovTarget - camera.fov) * 0.08;
  camera.updateProjectionMatrix();

  camera.rotation.order = 'YXZ';
  camera.rotation.y = camYaw.value;
  camera.rotation.x = camPitch.value;

  // depth approach
  state.depth += (state.targetDepth - state.depth) * 0.012;
  state.pressure = state.depth / 9.55;
  state.oxygen = Math.max(60, 99 - elapsed * 0.018);

  // heading drift slightly with yaw
  state.heading = (camYaw.value * 180/Math.PI + 360) % 360;

  // sonar
  drawSonar(dt);

  // ping cycle
  state.pingTimer += dt;
  if (state.pingTimer >= state.pingInterval) {
    state.pingTimer = 0;
    playPing();
  }

  // groan timer
  audioState.groanTimer += dt;
  if (audioState.groanTimer >= audioState.groanNext) {
    audioState.groanTimer = 0;
    audioState.groanNext = 18 + Math.random()*22 - Math.min(15, (state.depth-200)*0.04);
    playGroan();
  }

  // drips (sparse)
  audioState.dripTimer += dt;
  if (audioState.dripTimer > 1.5 + Math.random()*4) {
    audioState.dripTimer = 0;
    if (Math.random() < 0.6) playDrip();
  }

  // whale
  audioState.whaleTimer += dt;
  if (audioState.whaleTimer >= audioState.whaleNext) {
    audioState.whaleTimer = 0;
    audioState.whaleNext = 25 + Math.random()*40;
    playWhale();
  }

  // light flicker
  let flick = 1.0;
  if (performance.now() < state.flickerUntil) {
    flick = 0.25 + Math.random()*0.7;
    cabinLamp.intensity = 1.6 * flick;
  } else {
    cabinLamp.intensity += (1.6 - cabinLamp.intensity) * 0.1;
    flick = cabinLamp.intensity / 1.6;
  }

  // shader updates
  hullUniforms.uTime.value = elapsed;
  hullUniforms.uFlicker.value = flick;
  hullUniforms.uPortFlux.value = 0.6 + 0.15*Math.sin(elapsed*0.7) + 0.25*(1.0 - state.depth/500);
  abyssUniforms.uTime.value = elapsed;
  abyssUniforms.uDepth.value = state.depth;
  abyssUniforms.uYaw.value = camYaw.value;
  godrayUniforms.uTime.value = elapsed;
  godrayUniforms.uIntensity.value = (0.55 + 0.25*Math.sin(elapsed*0.4)) * (1.0 - state.depth/600);

  // gauges
  paintGauge(gauges[0]);
  paintGauge(gauges[1]);
  paintGauge(gauges[2]);

  // hud text
  hudDepth.textContent = state.depth.toFixed(1);
  hudHeading.textContent = String(Math.round(state.heading)).padStart(3,'0');
  hudTime.textContent = fmtTime(performance.now() - state.startTime);
  hudO2.textContent = state.oxygen.toFixed(1);
  hudP.textContent = state.pressure.toFixed(1);
  pscBearing.textContent = String(Math.round(state.heading)).padStart(3,'0');

  // fog density tracks depth
  scene.fog.density = 0.05 + (state.depth - 200) * 0.0008;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// auto-start audio if user has already interacted (some browsers permit)
window.addEventListener('click', () => initAudio(), { once: true });

</script>
