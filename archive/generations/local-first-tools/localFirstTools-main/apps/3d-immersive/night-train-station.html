{

<script type="module">
import * as THREE from 'three';

/* ────────────────────────────────────────────────────────────────────────
   PLATFORM 47B · 11:47 PM
   A cinematic mood piece. The train will pass. You will not be on it.
   ──────────────────────────────────────────────────────────────────────── */

const stage = document.getElementById('stage');
const gate  = document.getElementById('gate');
const boom  = document.getElementById('boom');

/* ───── renderer ───── */
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.setClearColor(0x05060a, 1);
stage.appendChild(renderer.domElement);

/* ───── scene + fog (heavy night fog) ───── */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05070c, 0.022);

/* ───── camera (sitting on bench) ───── */
const SEAT_HEIGHT = 1.20;          // eyes a bit above bench seat
const SEAT_POS    = new THREE.Vector3(2.2, SEAT_HEIGHT, 0.0);
const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 600);
camera.position.copy(SEAT_POS);
camera.lookAt(SEAT_POS.x - 4, SEAT_HEIGHT - 0.15, -8);

/* ───── lights ───── */
const moonAmb = new THREE.AmbientLight(0x1a2238, 0.18);
scene.add(moonAmb);

const moon = new THREE.DirectionalLight(0x6a7a9a, 0.18);
moon.position.set(-30, 40, -25);
scene.add(moon);

// Lamp post light – warm yellow incandescent
const lampLight = new THREE.PointLight(0xffb86b, 2.6, 22, 1.7);
lampLight.position.set(-1.0, 4.6, -3.5);
scene.add(lampLight);

const lampInner = new THREE.PointLight(0xffd098, 1.6, 6, 1.2);
lampInner.position.copy(lampLight.position);
scene.add(lampInner);

// Inside-shelter dim warm light
const shelterLight = new THREE.PointLight(0xffa860, 0.45, 6, 2.0);
shelterLight.position.set(4.0, 2.7, -2.0);
scene.add(shelterLight);

/* ────────────────────────────────────────────────────────────────────────
   SKY — procedural starfield + soft milky band
   ──────────────────────────────────────────────────────────────────────── */
const skyGeo = new THREE.SphereGeometry(380, 48, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite:false,
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    varying vec3 vWorld;
    void main(){
      vWorld = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader:`
    precision highp float;
    varying vec3 vWorld;
    uniform float uTime;

    float hash(vec3 p){
      p = fract(p*0.3183099 + vec3(0.71,0.113,0.419));
      p *= 17.0;
      return fract(p.x*p.y*p.z*(p.x+p.y+p.z));
    }
    float starField(vec3 d, float dens, float thr, float sharp){
      vec3 g = d * dens;
      vec3 i = floor(g);
      vec3 f = fract(g);
      float h = hash(i);
      if(h < thr) return 0.0;
      vec2 c = f.xy - 0.5;
      float r = length(c) + abs(f.z-0.5)*0.7;
      float s = smoothstep(sharp, 0.0, r);
      // twinkle
      float tw = 0.6 + 0.4*sin(uTime*2.0 + h*42.0);
      return s * (h-thr)/(1.0-thr) * tw;
    }
    void main(){
      vec3 d = normalize(vWorld);
      // base night gradient
      float up = clamp(d.y*0.5+0.5, 0.0, 1.0);
      vec3 base = mix(vec3(0.018,0.022,0.040), vec3(0.005,0.008,0.018), up);
      // very faint horizon warm pollution from a far town
      float horiz = pow(1.0 - abs(d.y), 16.0);
      base += vec3(0.06,0.04,0.02) * horiz * 0.35;

      // milky band-ish soft brightening
      float band = exp(-pow((d.y - 0.15)*3.4,2.0)) * 0.04;
      base += vec3(0.05,0.06,0.09) * band;

      // stars: three layers at different density
      float s1 = starField(d, 240.0, 0.985, 0.06);
      float s2 = starField(d, 120.0, 0.992, 0.10);
      float s3 = starField(d, 60.0,  0.997, 0.16);
      vec3 starCol = vec3(0.95,0.96,1.0)*s1 + vec3(1.0,0.95,0.85)*s2*1.3 + vec3(0.85,0.92,1.0)*s3*1.8;

      // upper-sky stars only
      float starMask = smoothstep(-0.05, 0.25, d.y);
      base += starCol * starMask;

      gl_FragColor = vec4(base, 1.0);
    }
  `
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

/* ────────────────────────────────────────────────────────────────────────
   GROUND — distant dark countryside w/ farm lights
   ──────────────────────────────────────────────────────────────────────── */
const fieldUniforms = {
  uTime:{value:0},
  uLamp:{value:lampLight.position}
};
const fieldGeo = new THREE.PlaneGeometry(600, 600, 96, 96);
const fieldMat = new THREE.ShaderMaterial({
  uniforms: fieldUniforms,
  vertexShader:`
    varying vec3 vWorld;
    varying vec2 vUv;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader:`
    precision highp float;
    varying vec3 vWorld;
    varying vec2 vUv;
    uniform float uTime;

    float hash21(vec2 p){
      p = fract(p*vec2(123.34,456.21));
      p += dot(p, p+45.32);
      return fract(p.x*p.y);
    }
    float vnoise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      float a = hash21(i);
      float b = hash21(i+vec2(1,0));
      float c = hash21(i+vec2(0,1));
      float d = hash21(i+vec2(1,1));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }

    void main(){
      vec2 p = vWorld.xz;
      float d = length(p);

      // base dark green-blue field
      float n = vnoise(p*0.05);
      float n2 = vnoise(p*0.18 + 13.0);
      vec3 col = mix(vec3(0.012,0.020,0.014), vec3(0.020,0.035,0.022), n);
      col = mix(col, vec3(0.014,0.025,0.018), n2*0.6);

      // hedgerows & furrows
      float furrow = sin(p.x*0.6 + n*4.0)*0.5 + 0.5;
      col *= 0.85 + furrow*0.15;

      // FARM LIGHTS — sparse warm dots far away
      // grid cells, one possible light per cell
      float lights = 0.0;
      vec3 lightCol = vec3(0.0);
      for(int gx=-2; gx<=2; gx++){
        for(int gy=-2; gy<=2; gy++){
          vec2 cell = floor(p*0.012) + vec2(gx,gy);
          float h = hash21(cell);
          if(h < 0.86) continue;
          vec2 jitter = vec2(hash21(cell+1.7), hash21(cell+3.3))-0.5;
          vec2 lp = (cell + 0.5 + jitter*0.7)/0.012;
          float ld = length(p - lp);
          // only show if far enough away (no farm lights in close foreground)
          if(length(lp) < 50.0) continue;
          float intens = 0.6 + 0.4*hash21(cell+5.1);
          // tiny twinkle
          float tw = 0.85 + 0.15*sin(uTime*1.2 + h*18.0);
          float pt = exp(-ld*ld*0.18);
          float halo = exp(-ld*0.15)*0.06;
          float warm = mix(0.0, 1.0, hash21(cell+9.0));
          vec3 c = mix(vec3(1.0,0.78,0.45), vec3(1.0,0.85,0.55), warm);
          lights += (pt*1.6 + halo) * intens * tw;
          lightCol += c * (pt*1.6 + halo) * intens * tw;
        }
      }
      col += lightCol;

      // distance darkening (extra)
      float fade = smoothstep(180.0, 30.0, d);
      col *= mix(0.55, 1.0, fade);

      // foreground gravel/dirt edge near tracks (suppress field detail close)
      float closeMask = smoothstep(8.0, 30.0, d);
      col = mix(vec3(0.018,0.022,0.018), col, closeMask);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const field = new THREE.Mesh(fieldGeo, fieldMat);
field.rotation.x = -Math.PI/2;
field.position.y = -0.05;
scene.add(field);

/* ────────────────────────────────────────────────────────────────────────
   GRASS — procedural cricket grass tufts (instanced + vertex sway shader)
   ──────────────────────────────────────────────────────────────────────── */
const grassBladeGeo = new THREE.PlaneGeometry(0.06, 0.42, 1, 4);
grassBladeGeo.translate(0, 0.21, 0);

const GRASS_COUNT = 4200;
const grassMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent:true,
  depthWrite:false,
  uniforms:{
    uTime:{value:0},
    uLampPos:{value:lampLight.position},
    uTrainLight:{value:0.0},
    uTrainPos:{value:new THREE.Vector3(0,0,0)},
  },
  vertexShader:`
    attribute vec3 iPos;
    attribute float iRot;
    attribute float iScale;
    attribute float iSeed;
    varying float vH;
    varying float vSeed;
    varying vec3 vWorld;
    uniform float uTime;
    void main(){
      vH = uv.y;
      vSeed = iSeed;
      // rotate billboard around Y
      float c = cos(iRot), s = sin(iRot);
      vec3 p = position * iScale;
      p.x = position.x*iScale*c - position.z*iScale*s;
      p.z = position.x*iScale*s + position.z*iScale*c;
      // sway: stronger toward tip
      float sway = sin(uTime*1.4 + iSeed*7.0 + iPos.x*0.3 + iPos.z*0.2)*0.06
                 + sin(uTime*2.2 + iSeed*3.0)*0.03;
      p.x += sway * pow(uv.y, 1.6);
      p.z += sway * 0.5 * pow(uv.y, 1.6);
      vec4 wp = vec4(p + iPos, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * wp;
    }
  `,
  fragmentShader:`
    precision highp float;
    varying float vH;
    varying float vSeed;
    varying vec3 vWorld;
    uniform vec3 uLampPos;
    uniform float uTrainLight;
    uniform vec3 uTrainPos;

    void main(){
      // tip soft alpha
      float alpha = smoothstep(1.0, 0.4, vH) * 0.92;
      // base color: dark grass
      vec3 base = mix(vec3(0.02,0.06,0.025), vec3(0.05,0.10,0.04), vH);
      // lamp warm wash
      float lampD = distance(vWorld, uLampPos);
      float lampF = exp(-lampD*0.18) * 1.4;
      base += vec3(1.0,0.7,0.35) * lampF * 0.18;
      // train headlight wash
      float trD = distance(vWorld, uTrainPos);
      float trF = exp(-trD*0.07) * uTrainLight;
      base += vec3(1.0,0.95,0.82) * trF * 0.55;
      // slight blade variation
      base *= 0.85 + 0.3*fract(vSeed*13.7);
      gl_FragColor = vec4(base, alpha);
    }
  `
});

const grassMesh = new THREE.InstancedMesh(grassBladeGeo, grassMat, GRASS_COUNT);
const iPos    = new Float32Array(GRASS_COUNT*3);
const iRot    = new Float32Array(GRASS_COUNT);
const iScale  = new Float32Array(GRASS_COUNT);
const iSeed   = new Float32Array(GRASS_COUNT);

for(let i=0;i<GRASS_COUNT;i++){
  // place around platform but not on it
  let x,z, ok=false;
  for(let tries=0;tries<6 && !ok;tries++){
    const r = 4.5 + Math.random()*Math.random()*36.0;
    const a = Math.random()*Math.PI*2;
    x = Math.cos(a)*r;
    z = Math.sin(a)*r;
    // exclude platform area (rectangle ~ x in [-3.5,6], z in [-7,7])
    const onPlatform = (x>-3.5 && x<6.0 && z>-7.5 && z<7.5);
    // exclude tracks lanes (x roughly -10..-6 and -16..-12)
    const onTrack1 = (x>-10 && x<-5 && Math.abs(z)<60);
    const onTrack2 = (x>-17 && x<-12 && Math.abs(z)<60);
    if(!onPlatform && !onTrack1 && !onTrack2) ok=true;
  }
  iPos[i*3]   = x;
  iPos[i*3+1] = 0.0;
  iPos[i*3+2] = z;
  iRot[i]     = Math.random()*Math.PI;
  iScale[i]   = 0.55 + Math.random()*0.9;
  iSeed[i]    = Math.random();
}
grassBladeGeo.setAttribute('iPos',   new THREE.InstancedBufferAttribute(iPos,3));
grassBladeGeo.setAttribute('iRot',   new THREE.InstancedBufferAttribute(iRot,1));
grassBladeGeo.setAttribute('iScale', new THREE.InstancedBufferAttribute(iScale,1));
grassBladeGeo.setAttribute('iSeed',  new THREE.InstancedBufferAttribute(iSeed,1));
grassMesh.frustumCulled = false;
scene.add(grassMesh);

/* ────────────────────────────────────────────────────────────────────────
   PLATFORM — wooden planks + safety stripe
   ──────────────────────────────────────────────────────────────────────── */
const platformGroup = new THREE.Group();
scene.add(platformGroup);

const woodUniforms = {
  uTime:{value:0},
  uLampPos:{value:lampLight.position},
};
const woodVS = `
  varying vec3 vWorld;
  varying vec2 vUv;
  varying vec3 vNormal;
  void main(){
    vUv = uv;
    vNormal = normalMatrix * normal;
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorld = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const woodFS = `
  precision highp float;
  varying vec3 vWorld;
  varying vec2 vUv;
  varying vec3 vNormal;
  uniform float uTime;
  uniform vec3 uLampPos;

  float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
  float vnoise(vec2 p){
    vec2 i=floor(p),f=fract(p);
    float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
    vec2 u=f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
  }
  float fbm(vec2 p){
    float v=0.0,a=0.5;
    for(int i=0;i<5;i++){v+=a*vnoise(p);p*=2.07;a*=0.5;}
    return v;
  }
  void main(){
    // plank pattern aligned along Z (length of platform)
    vec2 wp = vWorld.xz;
    // plank ID by X
    float plankW = 0.42;
    float plankId = floor(wp.x / plankW);
    float plankX  = fract(wp.x / plankW);
    // wood grain: long noise stretched along z
    float grain = fbm(vec2(wp.x*5.5, wp.y*0.4 + wp.x*0.0 + wp.y) + vec2(0.0, plankId*9.7));
    float grainLong = fbm(vec2(wp.x*3.0 + plankId*17.0, vWorld.z*0.6));
    // base plank color – varies plank-to-plank
    float plankShade = 0.55 + 0.45*hash(vec2(plankId, 1.7));
    vec3 wood = mix(vec3(0.10,0.06,0.035), vec3(0.18,0.12,0.07), grainLong);
    wood = mix(wood, vec3(0.06,0.035,0.020), grain*0.6);
    wood *= 0.6 + 0.5*plankShade;

    // gap between planks (dark line)
    float gap = smoothstep(0.0, 0.04, plankX) * smoothstep(1.0, 0.96, plankX);
    wood *= gap*0.6 + 0.4;
    if(plankX < 0.02 || plankX > 0.98) wood *= 0.15;

    // knots
    float knot = smoothstep(0.92, 1.0, fbm(vec2(wp.x*8.0, vWorld.z*1.8 + plankId*5.3)));
    wood = mix(wood, vec3(0.04,0.02,0.01), knot*0.7);

    // weathering / silver-grey aging on edges
    float edge = smoothstep(2.5, 6.0, abs(vWorld.z));
    wood = mix(wood, wood*0.85 + vec3(0.04,0.05,0.05), edge*0.5);

    // YELLOW SAFETY STRIPE near the track-side edge (x ≈ -3.0..-2.6)
    float stripe = smoothstep(-3.05, -2.95, vWorld.x) * (1.0 - smoothstep(-2.65, -2.55, vWorld.x));
    vec3 stripeCol = vec3(0.85, 0.62, 0.10);
    // worn stripe – patches scratched away
    float wear = smoothstep(0.55, 0.85, fbm(vec2(vWorld.z*1.4, vWorld.x*8.0)));
    stripeCol = mix(stripeCol, wood, wear*0.6);
    wood = mix(wood, stripeCol, stripe);

    // lamp warm directional wash
    vec3 toLamp = uLampPos - vWorld;
    float lampD = length(toLamp);
    vec3 L = toLamp / lampD;
    float ndl = max(dot(normalize(vNormal), L), 0.0);
    float falloff = 1.0 / (1.0 + lampD*0.45 + lampD*lampD*0.04);
    vec3 lampCol = vec3(1.0, 0.72, 0.38);
    vec3 lit = wood * (0.35 + ndl * falloff * 4.5);
    lit += wood * lampCol * falloff * 1.6;
    // slight ambient cool moonlight
    lit += wood * vec3(0.06,0.08,0.12);

    gl_FragColor = vec4(lit, 1.0);
  }
`;

      float a = (core + halo*0.7);

    }
  `
});

function makeSignTexture(text, sub){
  const c = document.createElement('canvas');
  c.width = 512; c.height = 192;
  const g = c.getContext('2d');
  g.fillStyle = '#0e0d0a';
  g.fillRect(0,0,c.width,c.height);
  g.strokeStyle = '#3a3528'; g.lineWidth = 6;
  g.strokeRect(8,8,c.width-16,c.height-16);
  g.fillStyle = '#e8c878';
  g.font = 'bold 78px Courier New, monospace';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(text, c.width/2, c.height/2 - 18);
  if(sub){
    g.font = '22px Courier New, monospace';
    g.fillStyle = '#8a7a4a';
    g.fillText(sub, c.width/2, c.height/2 + 50);
  }
  // grain
  const img = g.getImageData(0,0,c.width,c.height);
  for(let i=0;i<img.data.length;i+=4){
    const n = (Math.random()-0.5)*22;
    img.data[i]   = Math.max(0,Math.min(255,img.data[i]+n));
    img.data[i+1] = Math.max(0,Math.min(255,img.data[i+1]+n));
    img.data[i+2] = Math.max(0,Math.min(255,img.data[i+2]+n));
  }
  g.putImageData(img,0,0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return tex;
}

const TRACK_LEN = 280;

function makeTrackSet(centerX){
  const g = new THREE.Group();
  // ballast
  const bal = new THREE.Mesh(
    new THREE.BoxGeometry(3.4, 0.14, TRACK_LEN),
    new THREE.MeshStandardMaterial({color:0x1a1816, roughness:1.0})
  );
  bal.position.set(centerX, -0.04, 0);
  g.add(bal);
  // sleepers
  const sleeperMat = new THREE.MeshStandardMaterial({color:0x0c0a08, roughness:0.95});
  const sleeperGeo = new THREE.BoxGeometry(2.6, 0.10, 0.22);
  const sleepers = new THREE.InstancedMesh(sleeperGeo, sleeperMat, Math.floor(TRACK_LEN/0.6));
  const m = new THREE.Matrix4();
  for(let i=0;i<sleepers.count;i++){
    const z = -TRACK_LEN/2 + i*0.6 + 0.3;
    m.identity();
    m.setPosition(centerX, 0.02, z);
    sleepers.setMatrixAt(i, m);
  }
  g.add(sleepers);
  // rails
  const railMat = new THREE.MeshStandardMaterial({color:0x4a4a4a, roughness:0.35, metalness:0.85});
  const railGeo = new THREE.BoxGeometry(0.07, 0.12, TRACK_LEN);
  for(const dx of [-0.7, 0.7]){
    const rail = new THREE.Mesh(railGeo, railMat);
    rail.position.set(centerX+dx, 0.08, 0);
    g.add(rail);
  }
  return g;
}

/* ────────────────────────────────────────────────────────────────────────
   TRAIN — locomotive + freight cars + headlight cone
   ──────────────────────────────────────────────────────────────────────── */
function buildTrain(){
  const t = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({color:0x1c1c20, roughness:0.55, metalness:0.7});
  const accentMat = new THREE.MeshStandardMaterial({color:0x251a14, roughness:0.7, metalness:0.4});
  const windowMat = new THREE.MeshStandardMaterial({color:0x040406, roughness:0.2, metalness:0.0, emissive:0x331a08, emissiveIntensity:0.5});

  // Locomotive (engine)
  const eng = new THREE.Group();
  const hood = new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.3, 8.0), bodyMat);
  hood.position.set(0, 1.55, 0);
  eng.add(hood);
  // cab
  const cab = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.6, 2.4), accentMat);
  cab.position.set(0, 2.3 + 0.8, -3.5);
  eng.add(cab);
  // cab windows
  const cabWin = new THREE.Mesh(new THREE.BoxGeometry(2.62, 0.6, 2.42), windowMat);
  cabWin.position.copy(cab.position);
  cabWin.position.y += 0.35;
  eng.add(cabWin);
  // nose grill / number panel
  const nosePanel = new THREE.Mesh(new THREE.BoxGeometry(2.55,0.7,0.05), accentMat);
  nosePanel.position.set(0, 2.0, 4.02);
  eng.add(nosePanel);
  // headlight housings
  const hlHousing = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.18), accentMat);
  hlHousing.position.set(0, 2.3, 4.05);
  eng.add(hlHousing);
  // glowing headlight bulb
  const hlBulb = new THREE.Mesh(new THREE.SphereGeometry(0.16,12,10), new THREE.MeshBasicMaterial({color:0xfff2d0}));
  hlBulb.position.set(0, 2.3, 4.15);
  eng.add(hlBulb);
  // ditch lights
  const ditchL = new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8), new THREE.MeshBasicMaterial({color:0xfff0c0}));
  ditchL.position.set(-0.7, 0.9, 4.05);
  eng.add(ditchL);
  const ditchR = ditchL.clone(); ditchR.position.x = 0.7; eng.add(ditchR);
  // wheel trucks (just blocks)
  const truckMat = new THREE.MeshStandardMaterial({color:0x070707, roughness:0.9});
  for(const z of [-2.8, 2.8]){
    const truck = new THREE.Mesh(new THREE.BoxGeometry(2.7,0.45,1.6), truckMat);
    truck.position.set(0, 0.25, z);
    eng.add(truck);
    for(const wx of [-1.05, 1.05]){
      for(const wz of [-0.55, 0.55]){
        const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.18,16), truckMat);
        wheel.rotation.z = Math.PI/2;
        wheel.position.set(wx, 0.34, z+wz);
        eng.add(wheel);
      }
    }
  }
  // headlight CONE shader (volumetric fake)
  const coneMat = new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms:{
      uTime:{value:0},
      uIntensity:{value:1.0},
    },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vLocal;
      void main(){
        vUv = uv;
        vLocal = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader:`
      precision highp float;
      varying vec2 vUv;
      varying vec3 vLocal;
      uniform float uTime;
      uniform float uIntensity;
      float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
      void main(){
        // vUv.y=0 at apex (near light), 1 at far
        float along = vUv.y;
        float radial = abs(vUv.x - 0.5)*2.0;
        // soft cone falloff (radial)
        float cone = smoothstep(1.0, 0.0, radial);
        // length falloff – brighter near, fading along distance, but with body
        float len = mix(1.4, 0.0, along);
        // dust motes flicker
        float n = hash(floor(vec2(vUv.x*40.0, vUv.y*30.0 + uTime*0.6)));
        float motes = smoothstep(0.85, 1.0, n) * (1.0 - along);
        vec3 col = vec3(1.0, 0.95, 0.78) * cone * len + vec3(1.0,0.92,0.7)*motes*0.6;
        float a = cone * len * 0.55 * uIntensity;
        gl_FragColor = vec4(col, a);
      }
    `
  });
  // a long thin cone in front of engine
  const coneGeo = new THREE.ConeGeometry(8.0, 70.0, 24, 1, true);
  // ConeGeometry has apex at y=h/2 by default; rotate so apex toward +Z (forward) and shift
  coneGeo.rotateX(-Math.PI/2);
  coneGeo.translate(0, 0, 35.0); // apex at z=0 → 70 (we'll position at headlight)
  const coneMesh = new THREE.Mesh(coneGeo, coneMat);
  coneMesh.position.set(0, 2.3, 4.2);
  eng.add(coneMesh);
  eng.userData.coneMat = coneMat;

  // Real Three.js spotlight from the engine for actual scene illumination
  const spot = new THREE.SpotLight(0xfff0c8, 0.0, 90, Math.PI*0.10, 0.35, 1.5);
  spot.position.set(0, 2.3, 4.2);
  const spotTarget = new THREE.Object3D();
  spotTarget.position.set(0, 2.0, 60);
  eng.add(spot);
  eng.add(spotTarget);
  spot.target = spotTarget;
  eng.userData.spot = spot;
  eng.userData.hlBulb = hlBulb;
  eng.userData.ditch = [ditchL, ditchR];

  t.add(eng);
  t.userData.engine = eng;

  // FREIGHT CARS – varied
  const carMats = [
    new THREE.MeshStandardMaterial({color:0x2a1a14, roughness:0.85, metalness:0.2}), // boxcar rust
    new THREE.MeshStandardMaterial({color:0x142a1a, roughness:0.85, metalness:0.2}), // green tank
    new THREE.MeshStandardMaterial({color:0x141420, roughness:0.85, metalness:0.2}), // dark blue
    new THREE.MeshStandardMaterial({color:0x2a2618, roughness:0.85, metalness:0.2}), // ochre
    new THREE.MeshStandardMaterial({color:0x18181a, roughness:0.9,  metalness:0.3}), // black
  ];
  function makeCar(typeIdx, pos){
    const car = new THREE.Group();
    const mat = carMats[typeIdx % carMats.length];
    if(typeIdx % 3 === 0){
      // boxcar
      const b = new THREE.Mesh(new THREE.BoxGeometry(2.6, 3.0, 9.0), mat);
      b.position.y = 2.0;
      car.add(b);
      // door
      const door = new THREE.Mesh(new THREE.BoxGeometry(2.62, 2.0, 1.6), accentMat);
      door.position.set(0, 1.7, 0);
      car.add(door);
    } else if(typeIdx % 3 === 1){
      // tanker
      const tank = new THREE.Mesh(new THREE.CylinderGeometry(1.3,1.3,8.0,18), mat);
      tank.rotation.z = Math.PI/2;
      tank.position.y = 2.2;
      car.add(tank);
      const dome = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.5,12), accentMat);
      dome.position.set(0, 3.55, 0);
      car.add(dome);
    } else {
      // flatcar w/ container
      const flat = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.4, 9.0), accentMat);
      flat.position.y = 1.0;
      car.add(flat);
      const container = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.4, 6.5), mat);
      container.position.y = 2.5;
      car.add(container);
    }
    // trucks
    for(const z of [-3.2, 3.2]){
      const truck = new THREE.Mesh(new THREE.BoxGeometry(2.7,0.45,1.6), truckMat);
      truck.position.set(0, 0.3, z);
      car.add(truck);
      for(const wx of [-1.05, 1.05]){
        for(const wz of [-0.55, 0.55]){
          const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.18,16), truckMat);
          wheel.rotation.z = Math.PI/2;
          wheel.position.set(wx, 0.34, z+wz);
          car.add(wheel);
        }
      }
    }
    car.position.set(0, 0, pos);
    return car;
  }

  const CAR_SPACING = 10.0;
  // engine occupies z roughly 0..8, cars behind (negative z relative to engine front).
  // We'll keep engine local at z=0 and put cars at z = -CAR_SPACING * (i+1)
  const NUM_CARS = 14;
  for(let i=0;i<NUM_CARS;i++){
    const car = makeCar(i, -CAR_SPACING*(i+1) - 4);
    t.add(car);
  }

  // Red TAILLIGHT on rear car
  const tailLight = new THREE.PointLight(0xff2a1a, 1.4, 12, 2.0);
  tailLight.position.set(0, 2.0, -CAR_SPACING*NUM_CARS - 4 - 4.5);
  t.add(tailLight);
  const tailBulb = new THREE.Mesh(new THREE.SphereGeometry(0.12,10,8), new THREE.MeshBasicMaterial({color:0xff2010}));
  tailBulb.position.copy(tailLight.position);
  t.add(tailBulb);
  t.userData.tailLight = tailLight;
  t.userData.tailBulb = tailBulb;

  // total length so we can reuse
  t.userData.totalLength = CAR_SPACING * NUM_CARS + 14;

  return t;
}

   - trainNear runs on track centerX=-7.5, moving +Z direction (away into +Z then we recycle)
   - trainFar  runs on track centerX=-13.5, moving -Z direction
*/

/* ────────────────────────────────────────────────────────────────────────
   AUDIO ENGINE (gated)
   ──────────────────────────────────────────────────────────────────────── */
let audioCtx = null, masterGain = null, audioReady = false;
const sfx = {
  cricketLayers: [],
  hum: null,
  trainRumble: null,
  trainHorn: null,
  trainClack: null,
  brakeHiss: null,
  dopplerLFO: null,
};

function initAudio(){
  if(audioReady) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);
  // gentle fade-in
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 1.4);

  // Reverb-ish convolver (simple synthetic IR)
  const convolver = audioCtx.createConvolver();
  const ir = audioCtx.createBuffer(2, audioCtx.sampleRate*1.4, audioCtx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d = ir.getChannelData(ch);
    for(let i=0;i<d.length;i++){
      d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 2.6) * 0.45;
    }
  }
  convolver.buffer = ir;
  const wetGain = audioCtx.createGain(); wetGain.gain.value = 0.18;
  convolver.connect(wetGain).connect(masterGain);

  // ─── CRICKETS: 5 layered chirr patterns ───
  function makeCricket(rateHz, freq, pan, vol){
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = freq;
    const ampGain = audioCtx.createGain();
    ampGain.gain.value = 0.0;
    // band-pass for chirr texture
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = freq;
    bp.Q.value = 18;
    const panner = audioCtx.createStereoPanner();
    panner.pan.value = pan;
    osc.connect(bp).connect(ampGain).connect(panner);
    panner.connect(masterGain);
    panner.connect(convolver);
    osc.start();

    // pulsed gating: short bursts at rateHz, with micro-pattern
    const pulse = audioCtx.createBufferSource();
    // We won't drive ampGain via a buffer; we'll schedule gain envelopes in a tick.
    return {osc, ampGain, freq, rateHz, vol, panner, lastSchedule: 0};
  }
  sfx.cricketLayers.push(makeCricket(7.0,  4400, -0.65, 0.012));
  sfx.cricketLayers.push(makeCricket(8.4,  4900, -0.20, 0.010));
  sfx.cricketLayers.push(makeCricket(6.2,  4150,  0.10, 0.011));
  sfx.cricketLayers.push(makeCricket(9.1,  5300,  0.55, 0.009));
  sfx.cricketLayers.push(makeCricket(5.6,  3700,  0.80, 0.013));

  // ─── LAMP HUM 60Hz triangle very faint ───
  {
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = 60;
    const g = audioCtx.createGain();
    g.gain.value = 0.0035;
    const lp = audioCtx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=200;
    const pan = audioCtx.createStereoPanner();
    pan.pan.value = -0.55;
    o.connect(lp).connect(g).connect(pan);
    pan.connect(masterGain);
    o.start();
    // slight wobble
    const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.7;
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.0008;
    lfo.connect(lfoG).connect(g.gain);
    lfo.start();
    sfx.hum = {o,g};
  }

  // ─── TRAIN RUMBLE (sub) ───
  {
    // brown-ish noise
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*4, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let lp=0;
    for(let i=0;i<d.length;i++){
      lp = lp*0.985 + (Math.random()*2-1)*0.015;
      d[i] = lp*8.0;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const lp2 = audioCtx.createBiquadFilter();
    lp2.type='lowpass'; lp2.frequency.value=120; lp2.Q.value=0.7;
    const g = audioCtx.createGain(); g.gain.value = 0.0;
    const pan = audioCtx.createStereoPanner(); pan.pan.value=0;
    src.connect(lp2).connect(g).connect(pan);
    pan.connect(masterGain);
    src.start();
    sfx.trainRumble = {src,g,pan,lp:lp2};
  }

  // ─── TRAIN HORN ───
  {
    const o1 = audioCtx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=320;
    const o2 = audioCtx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=400;
    const o3 = audioCtx.createOscillator(); o3.type='sawtooth'; o3.frequency.value=240;
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1400;
    const g  = audioCtx.createGain(); g.gain.value=0;
    const pan = audioCtx.createStereoPanner(); pan.pan.value=0;
    o1.connect(lp); o2.connect(lp); o3.connect(lp);
    lp.connect(g).connect(pan).connect(masterGain);
    pan.connect(convolver);
    o1.start(); o2.start(); o3.start();
    sfx.trainHorn = {o1,o2,o3,g,pan};
  }

  // ─── WHEEL CLACK (rhythmic noise burst) ───
  {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,3);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=2;
    const g = audioCtx.createGain(); g.gain.value=0;
    const pan = audioCtx.createStereoPanner(); pan.pan.value=0;
    src.connect(bp).connect(g).connect(pan).connect(masterGain);
    src.start();
    sfx.trainClack = {src,g,pan,bp};
  }

  // ─── BRAKE HISS ───
  {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*3, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*0.6;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2400;
    const g = audioCtx.createGain(); g.gain.value=0;
    const pan = audioCtx.createStereoPanner(); pan.pan.value=0;
    src.connect(hp).connect(g).connect(pan).connect(masterGain);
    src.start();
    sfx.brakeHiss = {src,g,hp,pan};
  }

  audioReady = true;
}

// Cricket scheduler: schedule short bursts ahead
let cricketClock = 0;
function scheduleCrickets(now){
  if(!audioReady) return;
  for(const c of sfx.cricketLayers){
    while(c.lastSchedule < now + 0.5){
      const t = Math.max(c.lastSchedule, now);
      const period = 1.0 / c.rateHz + (Math.random()-0.5)*0.04;
      // chirr = short pulse train of 3-4 ticks
      const ticks = 3 + Math.floor(Math.random()*3);
      const tickDur = 0.012 + Math.random()*0.008;
      const tickGap = 0.022 + Math.random()*0.012;
      let tt = t;
      const burstVol = c.vol * (0.6 + Math.random()*0.5);
      for(let k=0;k<ticks;k++){
        c.ampGain.gain.setValueAtTime(0.0, tt);
        c.ampGain.gain.linearRampToValueAtTime(burstVol, tt+0.002);
        c.ampGain.gain.exponentialRampToValueAtTime(0.0001, tt+tickDur);
        tt += tickDur + tickGap;
      }
      c.lastSchedule = t + period;
    }
  }
}

// Distant cattle moo (rare)
let nextMoo = 240 + Math.random()*120;
function maybeMoo(elapsed){

  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
  const g = audioCtx.createGain(); g.gain.value=0;
  const pan = audioCtx.createStereoPanner(); pan.pan.value=(Math.random()-0.5)*1.4;
  o.connect(lp).connect(g).connect(pan).connect(masterGain);
  o.start(now);
  // pitch drift down
  o.frequency.setValueAtTime(85, now);

  g.gain.linearRampToValueAtTime(0.018, now+0.25);

/* ────────────────────────────────────────────────────────────────────────
   TRAIN PASS CHOREOGRAPHY
   ──────────────────────────────────────────────────────────────────────── */
const TRAIN = {
  active:false,
  side:'near',           // 'near' (right side, +x..) or 'far' (left side)
  startTime:0,
  duration:0,
  // train geometry length used for repositioning
  // We move via timeline: phases approach(0..t1), pass(t1..t2), recede(t2..end)
  phases:null,
  obj:null,
  // sound timeline state
  hornStarted:false,
  hornStopped:false,
  brakeStarted:false,
  passApex:0,
};

function startTrainPass(side){
  if(TRAIN.active) return;
  TRAIN.active = true;
  TRAIN.side = side;
  TRAIN.startTime = clock.elapsed;
  TRAIN.duration = 35.0; // total visible/audible window
  TRAIN.passApex = TRAIN.startTime + 30.0; // peak when locomotive is right next to camera
  TRAIN.hornStarted = false;
  TRAIN.hornStopped = false;
  TRAIN.brakeStarted = false;

  TRAIN.obj = (side==='near') ? trainNear : trainFar;
  TRAIN.obj.visible = true;

  // align track + direction
  if(side==='near'){
    // moves -Z to +Z (entering from far darkness, leaving toward us-back)
    // Our track centerX = -7.5
    // We'll parameterize trainZ over time so locomotive is at z=0 (closest to bench) at apex
    TRAIN.obj.position.x = -7.5;
    TRAIN.obj.rotation.y = 0; // engine front faces +Z
  } else {
    // moves +Z to -Z (opposite direction). Mirror by rotation Y by π.
    TRAIN.obj.position.x = -13.5;
    TRAIN.obj.rotation.y = Math.PI;
  }

  // Schedule horn audio
  if(audioReady){
    const now = audioCtx.currentTime;
    // Distant horn ~3.5s into approach, again ~7s before apex
    scheduleHorn(now + 1.5, 1.6, 0.04);     // distant
    scheduleHorn(now + 12.0, 2.2, 0.10);    // mid
    scheduleHorn(now + 22.0, 1.4, 0.16);    // close warning
    // Sub rumble: linear ramp up over 25s, hold, fade out
    sfx.trainRumble.g.gain.cancelScheduledValues(now);
    sfx.trainRumble.g.gain.setValueAtTime(sfx.trainRumble.g.gain.value, now);
    sfx.trainRumble.g.gain.linearRampToValueAtTime(0.45, now+25);
    sfx.trainRumble.g.gain.linearRampToValueAtTime(0.55, now+30);
    sfx.trainRumble.g.gain.linearRampToValueAtTime(0.0,  now+35);
    // pan with side
    sfx.trainRumble.pan.pan.cancelScheduledValues(now);
    sfx.trainRumble.pan.pan.setValueAtTime(side==='near'?0.4:-0.4, now);
    // wheel clack: ramp up around 22s..38s
    sfx.trainClack.g.gain.cancelScheduledValues(now);
    sfx.trainClack.g.gain.setValueAtTime(0, now);
    sfx.trainClack.g.gain.linearRampToValueAtTime(0.0, now+20);
    sfx.trainClack.g.gain.linearRampToValueAtTime(0.10, now+28);
    sfx.trainClack.g.gain.linearRampToValueAtTime(0.18, now+30);
    sfx.trainClack.g.gain.linearRampToValueAtTime(0.05, now+34);
    sfx.trainClack.g.gain.linearRampToValueAtTime(0.0,  now+36);
    // brake hiss tiny puff on departure
    sfx.brakeHiss.g.gain.cancelScheduledValues(now);
    sfx.brakeHiss.g.gain.setValueAtTime(0, now);
    sfx.brakeHiss.g.gain.linearRampToValueAtTime(0, now+30);
    sfx.brakeHiss.g.gain.linearRampToValueAtTime(0.05, now+30.4);
    sfx.brakeHiss.g.gain.exponentialRampToValueAtTime(0.001, now+32);
  }

  // Boom HUD
  boom.classList.add('show');
  boom.textContent = side==='near' ? '— DISTANT HORN — northbound —' : '— DISTANT HORN — southbound —';
  setTimeout(()=>boom.classList.remove('show'), 14000);
}

function scheduleHorn(at, dur, vol){
  if(!audioReady) return;
  const h = sfx.trainHorn;
  // Doppler: pitch starts higher, ends lower. Use detune approximation by shifting frequencies.
  const baseF = 320;
  h.o1.frequency.cancelScheduledValues(at);
  h.o2.frequency.cancelScheduledValues(at);
  h.o3.frequency.cancelScheduledValues(at);
  h.o1.frequency.setValueAtTime(baseF*1.05, at);
  h.o2.frequency.setValueAtTime(baseF*1.05*1.25, at);
  h.o3.frequency.setValueAtTime(baseF*1.05*0.75, at);
  h.o1.frequency.linearRampToValueAtTime(baseF*0.85, at+dur);
  h.o2.frequency.linearRampToValueAtTime(baseF*0.85*1.25, at+dur);
  h.o3.frequency.linearRampToValueAtTime(baseF*0.85*0.75, at+dur);
  // env
  h.g.gain.cancelScheduledValues(at);
  h.g.gain.setValueAtTime(0, at);
  h.g.gain.linearRampToValueAtTime(vol, at+0.3);
  h.g.gain.linearRampToValueAtTime(vol*0.9, at+dur*0.7);
  h.g.gain.exponentialRampToValueAtTime(0.0001, at+dur);
}

function updateTrain(elapsed, dt){
  if(!TRAIN.active) return;
  const t = elapsed - TRAIN.startTime;
  const progress = t / TRAIN.duration;
  if(progress > 1.0){
    // end
    TRAIN.active = false;
    TRAIN.obj.visible = false;
    if(TRAIN.obj.userData.spot) TRAIN.obj.userData.spot.intensity = 0.0;
    if(TRAIN.obj.userData.engine && TRAIN.obj.userData.engine.userData.coneMat){
      TRAIN.obj.userData.engine.userData.coneMat.uniforms.uIntensity.value = 0.0;
    }
    return;
  }

  // position along z. Locomotive z(t) such that at t=30 (apex) loco is at z=0
  // approach speed ~ 90 km/h ≈ 25 m/s. Use 22 m/s for close speed feel; ramp.
  const SPEED = 24.0;
  // z relative to track: at apex = 0
  const offsetT = t - 30.0; // negative before, positive after
  let trainZ = offsetT * SPEED;

  if(TRAIN.side === 'near'){
    // train moves +Z; engine front at z = trainZ
    TRAIN.obj.position.z = trainZ;
  } else {
    // far track, mirrored. Rotated 180° on Y → engine front faces -Z.
    // We want it to enter from +Z and leave to -Z. So engine front world-z = -trainZ.
    TRAIN.obj.position.z = -trainZ;
  }

  // headlight cone + spot intensity grows as approaches, then 0 after pass
  const eng = TRAIN.obj.userData.engine;
  if(eng){
    // distance from camera to engine
    const engWorld = new THREE.Vector3();
    eng.getWorldPosition(engWorld);
    const distToCam = engWorld.distanceTo(camera.position);

    // Before apex (engine still forward in its motion direction), cone illuminates camera area
    const beforeApex = (TRAIN.side==='near') ? (engWorld.z < 4) : (engWorld.z > -4);
    let coneI = 0.0;
    if(beforeApex){
      coneI = THREE.MathUtils.clamp(1.0 - distToCam/120, 0.0, 1.0);
      coneI = Math.pow(coneI, 1.5) * 1.2;
    } else {
      coneI = 0.0;
    }
    if(eng.userData.coneMat){
      eng.userData.coneMat.uniforms.uIntensity.value = coneI;
    }
    if(eng.userData.spot){
      eng.userData.spot.intensity = coneI * 4.5;
    }

    // pass to grass shader for a beautiful sweep
    const trU = grassMat.uniforms;
    trU.uTrainLight.value = coneI;
    trU.uTrainPos.value.copy(engWorld);
  }

  // Camera shake near apex
  const distApex = Math.abs(t - 30.0);
  if(distApex < 5.0){
    const k = (1.0 - distApex/5.0);
    cameraShake = Math.max(cameraShake, k*k * (TRAIN.side==='near' ? 1.0 : 0.45));
  }
}

/* ────────────────────────────────────────────────────────────────────────
   SCHEDULE: trains every cycle
   ──────────────────────────────────────────────────────────────────────── */
let nextTrainTime = 30.0;     // first horn at 30s, train at 60s passes apex
let trainSideToggle = 'near'; // alternates each cycle
let trainQueued = false;

function maybeScheduleTrain(elapsed){
  if(TRAIN.active) return;
  if(elapsed >= nextTrainTime - 0.05 && !trainQueued){
    trainQueued = true;
    startTrainPass(trainSideToggle);
    // schedule next: ~150s after this start
    const cycle = 150 + (Math.random()-0.5)*20;
    nextTrainTime = elapsed + cycle;
    // toggle sides
    trainSideToggle = (trainSideToggle==='near') ? 'far' : 'near';
    setTimeout(()=>{ trainQueued = false; }, 50);
  }
}

/* ────────────────────────────────────────────────────────────────────────
   INPUT — drag to look (limited yaw), space to trigger
   ──────────────────────────────────────────────────────────────────────── */
const look = {
  yaw: -Math.PI/2,        // looking toward -X (toward tracks)
  pitch: -0.05,
  yawTarget: -Math.PI/2,
  pitchTarget: -0.05,
  yawMin: -Math.PI/2 - 0.95,
  yawMax: -Math.PI/2 + 0.95,
  pitchMin: -0.5,
  pitchMax: 0.45,
};
let dragging=false, lastX=0, lastY=0;
function onDown(e){
  dragging = true;
  document.body.classList.add('dragging');
  const t = e.touches ? e.touches[0] : e;
  lastX = t.clientX; lastY = t.clientY;
}
function onMove(e){
  if(!dragging) return;
  const t = e.touches ? e.touches[0] : e;
  const dx = t.clientX - lastX, dy = t.clientY - lastY;
  lastX = t.clientX; lastY = t.clientY;
  look.yawTarget   = THREE.MathUtils.clamp(look.yawTarget   - dx*0.0035, look.yawMin, look.yawMax);
  look.pitchTarget = THREE.MathUtils.clamp(look.pitchTarget - dy*0.0030, look.pitchMin, look.pitchMax);
}
function onUp(){
  dragging = false;
  document.body.classList.remove('dragging');
}
window.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
window.addEventListener('touchstart', onDown, {passive:true});
window.addEventListener('touchmove',  onMove, {passive:true});
window.addEventListener('touchend',   onUp);
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    if(!TRAIN.active){
      startTrainPass(trainSideToggle);
      trainSideToggle = (trainSideToggle==='near') ? 'far' : 'near';
      nextTrainTime = clock.elapsed + 150 + Math.random()*20;
    }
  }
});

/* ────────────────────────────────────────────────────────────────────────
   LAMP FLICKER (subtle)
   ──────────────────────────────────────────────────────────────────────── */
function lampFlicker(t){
  const f = 0.94 + 0.06*Math.sin(t*47.0) + 0.04*Math.sin(t*7.3);
  const occasional = (Math.random() < 0.0015) ? -0.18 : 0.0;
  const v = THREE.MathUtils.clamp(f + occasional, 0.55, 1.05);
  lampLight.intensity = 2.6 * v;
  lampInner.intensity = 1.6 * v;
  bulbMat.opacity = 0.85 + 0.12*v;
  haloMat.uniforms.uFlicker.value = (occasional<0) ? 1.0 : 0.0;
}

/* ────────────────────────────────────────────────────────────────────────
   MAIN LOOP
   ──────────────────────────────────────────────────────────────────────── */
const clock = new THREE.Clock();
clock.elapsed = 0;
let cameraShake = 0;
let benchShift = 0;

function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  clock.elapsed += dt;
  const t = clock.elapsed;

  // shader uniforms
  skyMat.uniforms.uTime.value = t;
  fieldMat.uniforms.uTime.value = t;
  grassMat.uniforms.uTime.value = t;
  haloMat.uniforms.uTime.value = t;
  if(trainNear.userData.engine) trainNear.userData.engine.userData.coneMat.uniforms.uTime.value = t;
  if(trainFar.userData.engine)  trainFar.userData.engine.userData.coneMat.uniforms.uTime.value = t;

  lampFlicker(t);

  // camera look smoothing
  look.yaw   += (look.yawTarget   - look.yaw)   * 0.10;
  look.pitch += (look.pitchTarget - look.pitch) * 0.10;

  // breath bob
  const bob = Math.sin(t*0.8)*0.012 + Math.sin(t*0.31)*0.006;
  // bench shift fade
  benchShift *= 0.94;
  const shiftX = Math.sin(t*1.7)*0.004 * benchShift;
  const shiftY = Math.sin(t*2.3)*0.003 * benchShift;

  // shake
  cameraShake = Math.max(0, cameraShake - dt*0.8);
  const sx = (Math.random()-0.5)*cameraShake*0.06;
  const sy = (Math.random()-0.5)*cameraShake*0.05;
  const sr = (Math.random()-0.5)*cameraShake*0.012;

  camera.position.set(
    SEAT_POS.x + sx + shiftX,
    SEAT_POS.y + bob + sy + shiftY,
    SEAT_POS.z
  );
  // facing
  const fwd = new THREE.Vector3(
    Math.cos(look.pitch)*Math.cos(look.yaw),
    Math.sin(look.pitch),
    Math.cos(look.pitch)*Math.sin(look.yaw)
  );
  const target = camera.position.clone().add(fwd);
  camera.up.set(Math.sin(sr), 1, 0);
  camera.lookAt(target);

  // ambient audio scheduling
  if(audioReady){
    scheduleCrickets(audioCtx.currentTime);
    maybeMoo(t);
    maybeTruck(t);
    maybeCreak(t);
  }

  // schedule + update train
  maybeScheduleTrain(t);
  updateTrain(t, dt);
  // when no train, fade grass train light
  if(!TRAIN.active){
    grassMat.uniforms.uTrainLight.value *= 0.9;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

/* ────────────────────────────────────────────────────────────────────────
   END
   You're sitting on a bench. The train is coming. The train is not yours.
   ──────────────────────────────────────────────────────────────────────── */

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);

              window.LEVIGOLD.lastTune = now;

              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }

      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){

          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {

          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
