    display: inline-block; padding: 10px 26px;

  .gate-card:hover .enter {

  }

  .toast {

          m.name = 'viewport';

<script type="module">
import * as THREE from 'three';

/* ---------------------------------------------------------------------------
 * POLAR AURORA CABIN
 * A single-file cinematic Three.js scene: Arctic cabin interior at -38°C,
 * wood stove, frosted window, aurora borealis sky.
 * --------------------------------------------------------------------------*/

const $ = (id) => document.getElementById(id);
const sceneEl = $('scene');
const gateEl = $('gate');
const gateCard = $('gateCard');
const stoveFill = $('stoveFill');
const metaTime = $('metaTime');
const toastEl = $('toast');

let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

/* === Renderer ============================================================= */
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
sceneEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060c);
scene.fog = new THREE.FogExp2(0x07101f, 0.012);

/* === Camera =============================================================== */
const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.05, 600);
const POSITIONS = {
  chair:  new THREE.Vector3(-1.7, 1.45, 1.2),
  window: new THREE.Vector3(1.4, 1.55, -1.85),
};
camera.position.copy(POSITIONS.chair);

const camState = {
  yaw: -0.4,
  pitch: -0.05,
  targetYaw: -0.4,
  targetPitch: -0.05,
  posKey: 'chair',
  current: new THREE.Vector3().copy(POSITIONS.chair),
  target: new THREE.Vector3().copy(POSITIONS.chair),
};

function applyCamera() {
  camera.position.lerp(camState.target, 0.05);
  camState.yaw   += (camState.targetYaw   - camState.yaw)   * 0.12;
  camState.pitch += (camState.targetPitch - camState.pitch) * 0.12;
  const yaw = camState.yaw, pitch = camState.pitch;
  const dir = new THREE.Vector3(
    Math.sin(yaw) * Math.cos(pitch),
    Math.sin(pitch),
    -Math.cos(yaw) * Math.cos(pitch)
  );
  camera.lookAt(camera.position.clone().add(dir));
}

/* === Lighting ============================================================= */
const hemi = new THREE.HemisphereLight(0x1a3a6e, 0x0a0d18, 0.18);
scene.add(hemi);

const stoveLight = new THREE.PointLight(0xff7a2a, 2.4, 7.0, 1.6);
stoveLight.position.set(-2.4, 0.85, -1.0);
stoveLight.castShadow = true;
stoveLight.shadow.mapSize.set(512, 512);
stoveLight.shadow.bias = -0.001;
scene.add(stoveLight);

const lampLight = new THREE.PointLight(0xffb56b, 0.9, 4.5, 1.8);
lampLight.position.set(0.8, 1.55, 0.2);
scene.add(lampLight);

const auroraLight = new THREE.DirectionalLight(0x6effc1, 0.0); // dynamic
auroraLight.position.set(2, 6, -3);
scene.add(auroraLight);

const moonLight = new THREE.DirectionalLight(0x9fc4ff, 0.18);
moonLight.position.set(-3, 5, -4);
scene.add(moonLight);

/* === Aurora Sky =========================================================== */
// Big inverted sphere; fragment shader paints stars and an aurora ribbon
// using fbm-displaced parametric curves and additive green/pink palette.
const skyGeo = new THREE.SphereGeometry(280, 64, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    uTime:      { value: 0 },
    uIntensity: { value: 1.0 },
    uShootStar: { value: 0.0 },
  },
  vertexShader: `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vDir;
    uniform float uTime;
    uniform float uIntensity;
    uniform float uShootStar;

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float hash3(vec3 p){ return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
      vec2 u=f*f*(3.-2.*f);
      return mix(a,b,u.x) + (c-a)*u.y*(1.-u.x) + (d-b)*u.x*u.y;
    }
    float fbm(vec2 p){
      float v=0., a=0.5;
      for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.02; a*=0.5; }
      return v;
    }

    // Stars: tiny twinkling points
    float stars(vec3 d){
      vec3 g = floor(d * 220.0);
      float h = hash3(g);
      float pt = smoothstep(0.9985, 1.0, h);
      float tw = 0.6 + 0.4*sin(uTime*2.0 + h*40.0);
      return pt * tw * step(0.0, d.y);
    }

    // Aurora ribbon: a sinuous band drifting across the upper sky.
    // Sample multiple ribbons stacked, displaced by fbm.
    float ribbon(vec3 d, float layer){
      float u = atan(d.x, -d.z);             // azimuth
      float v = d.y;                          // altitude
      float t = uTime * 0.06;
      float wave = sin(u*1.2 + t*1.3 + layer*1.7) * 0.18
                 + sin(u*2.7 - t*0.9 + layer*2.3) * 0.10;
      float band = 0.45 + wave + layer*0.07;
      float dist = abs(v - band);
      float thickness = 0.12 + 0.08*sin(u*3.0 + t*2.0 + layer);
      float ridge = fbm(vec2(u*2.5 + t*1.2, v*5.0 + layer)) * 0.15;
      dist += ridge - 0.075;
      float curtain = exp(-dist*dist * 60.0);
      // Vertical streaks within the curtain
      float streak = pow(0.5 + 0.5*sin(u*60.0 + fbm(vec2(u*4.0, v*8.0))*6.0), 8.0);
      curtain *= (0.6 + 0.4*streak);
      return curtain;
    }

    void main(){
      vec3 d = normalize(vDir);
      // Base sky gradient: deep navy at horizon, near-black at zenith
      float h = clamp(d.y, -0.2, 1.0);
      vec3 sky = mix(vec3(0.04,0.06,0.12), vec3(0.005,0.012,0.03), smoothstep(0.0,0.7,h));
      sky += vec3(0.02,0.05,0.10) * smoothstep(-0.05, 0.15, d.y); // horizon glow

      // Stars
      float s = stars(d);
      sky += vec3(s) * vec3(0.9,0.95,1.0);

      // Milky band hint
      float mw = exp(-pow((d.y-0.05),2.0)*40.0) * 0.06;
      sky += vec3(0.08,0.10,0.18) * mw;

      // Aurora — three layers
      float a = 0.0;
      a += ribbon(d, 0.0) * 1.0;
      a += ribbon(d, 1.0) * 0.7;
      a += ribbon(d, 2.0) * 0.45;
      a *= smoothstep(0.05, 0.4, d.y);                 // upper sky only
      a *= uIntensity;

      // Color: green core, magenta edges
      vec3 cGreen = vec3(0.18, 1.0, 0.55);
      vec3 cPink  = vec3(0.85, 0.35, 0.95);
      vec3 cTeal  = vec3(0.20, 0.80, 0.95);
      vec3 aur = cGreen * a;
      aur += cPink * pow(a, 3.0) * 0.8;
      aur += cTeal * pow(a, 1.5) * 0.25;

      // Shooting star
      if(uShootStar > 0.001){
        // line from upper-left to lower-right, faded by uShootStar (0..1 then back)
        float t = uShootStar;
        vec2 sp = vec2(-0.6 + t*1.2, 0.55 - t*0.4);
        vec2 pix = vec2(atan(d.x, -d.z)/3.14159, d.y);
        float md = length(pix - sp);
        float trail = exp(-md*40.0) * smoothstep(0.0, 0.4, t) * smoothstep(1.0, 0.6, t);
        aur += vec3(1.0, 0.95, 0.85) * trail * 1.4;
      }

      vec3 col = sky + aur;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

/* --- Wood plank shader (floor + walls) --- */
function makeWoodMaterial(opts){
  const o = Object.assign({
    plankW: 0.32, plankL: 1.6,
    base: new THREE.Color(0x4a2e1a),
    light: new THREE.Color(0x86552c),
    dark: new THREE.Color(0x1d0e05),
    nails: 1.0,
    repeatU: 1.0, repeatV: 1.0,
  }, opts || {});
  return new THREE.ShaderMaterial({
    uniforms: {
      uPlank:  { value: new THREE.Vector2(o.plankW, o.plankL) },
      uBase:   { value: o.base },
      uLight:  { value: o.light },
      uDark:   { value: o.dark },
      uNails:  { value: o.nails },
      uRepeat: { value: new THREE.Vector2(o.repeatU, o.repeatV) },
      uStoveLight: stoveLight.position,
    },
    vertexShader: `
      varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
      void main(){
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 wp = modelMatrix * vec4(position,1.0);
        vWorld = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorld;
      uniform vec2 uPlank;
      uniform vec3 uBase; uniform vec3 uLight; uniform vec3 uDark;
      uniform float uNails;
      uniform vec2 uRepeat;
      uniform vec3 uStoveLight;

      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p){
        vec2 i=floor(p),f=fract(p);
        float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
        vec2 u=f*f*(3.-2.*f);
        return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
      }
      float fbm(vec2 p){ float v=0.,a=0.5; for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;} return v; }

      void main(){
        vec2 uv = vUv * uRepeat;
        // Plank index along V (length) and U (width)
        float plankRow = floor(uv.y / uPlank.y);
        float offset = hash(vec2(plankRow, 17.0)) * 0.5;
        float u = uv.x + offset;
        float plankCol = floor(u / uPlank.x);
        vec2 lUv = vec2(fract(u/uPlank.x), fract(uv.y/uPlank.y));

        // Grain: stretched fbm along plank length
        float grain = fbm(vec2(lUv.x*3.0 + plankCol*7.3, lUv.y*40.0 + plankRow*3.1));
        float rings = fbm(vec2(lUv.x*8.0, lUv.y*1.5)) * 0.5;
        float wood = grain*0.6 + rings*0.4;

        // Per-plank tint variation
        float tint = hash(vec2(plankCol, plankRow));

        vec3 col = mix(uDark, uBase, smoothstep(0.0,0.6,wood));
        col = mix(col, uLight, smoothstep(0.55,0.95,wood) * (0.5+tint*0.5));

        // Plank seams (gaps between planks)
        float seamX = smoothstep(0.0, 0.02, lUv.x) * smoothstep(1.0, 0.98, lUv.x);
        float seamY = smoothstep(0.0, 0.012, lUv.y) * smoothstep(1.0, 0.988, lUv.y);
        float seam = seamX * seamY;
        col *= mix(0.18, 1.0, seam);

        // Nail dots (two per plank, near ends)
        float nail = 0.0;
        if(uNails > 0.5){
          vec2 n1 = vec2(0.5, 0.06), n2 = vec2(0.5, 0.94);
          float d1 = length(lUv - n1), d2 = length(lUv - n2);
          nail = smoothstep(0.014, 0.008, d1) + smoothstep(0.014, 0.008, d2);
        }
        col = mix(col, vec3(0.18,0.16,0.14), nail*0.85);

        // Stove warmth: distance attenuation (cheap, no shadow)
        float dist = length(vWorld - uStoveLight);
        float warm = exp(-dist*0.45);
        col += vec3(1.0, 0.55, 0.22) * warm * 0.32;

        // Faint moon ambient
        col += vec3(0.05,0.07,0.12) * 0.15;

        // Subtle vignette by viewing angle
        float ndv = max(dot(vNormal, normalize(cameraPosition - vWorld)), 0.1);
        col *= mix(0.7, 1.0, ndv);

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
}

    uniform float uTime;
    uniform float uWipe;
    uniform vec2 uWipeCenter;
    uniform float uWipeR;

    float noise(vec2 p){

      float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));

    float fern(vec2 p){
      float n = fbm(p*3.0);
      float r = abs(fbm(p*8.0 + n*2.0) - 0.5);
      float f = smoothstep(0.05, 0.0, r);
      return f;

    void main(){
      vec2 uv = vUv;
      // Wipe mask: a soft circle around uWipeCenter grows with uWipeR

      float wipeMask = 1.0 - smoothstep(uWipeR-0.05, uWipeR+0.02, dW);
      // Slow regrowth: not implemented (frost stays cleared until reset)
      float frost = 1.0 - clamp(uWipe + wipeMask, 0.0, 1.0);

      frostCol += vec3(sp) * crystals * 0.3;

      gl_FragColor = vec4(frostCol, alpha);
    }
  `,

const flameMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uIntensity: { value: 1.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;
    uniform float uIntensity;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p);
      float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
      vec2 u=f*f*(3.-2.*f);
      return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
    }
    float fbm(vec2 p){ float v=0.,a=0.5; for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;} return v; }
    void main(){
      vec2 uv = vUv;
      // Flame core: rising, narrow
      vec2 q = vec2(uv.x - 0.5, uv.y);
      q.x += sin(uv.y*8.0 + uTime*3.0)*0.04;
      float core = fbm(vec2(q.x*4.0, q.y*3.0 - uTime*1.5));
      float mask = smoothstep(0.55, 0.0, length(q*vec2(3.5,1.0))) * smoothstep(0.0, 0.3, uv.y);
      float f = core * mask * uIntensity;
      vec3 col = vec3(0.0);
      col += vec3(1.0, 0.4, 0.05) * pow(f, 1.4) * 2.5;
      col += vec3(1.0, 0.85, 0.4) * pow(f, 3.0) * 3.0;
      col += vec3(0.4, 0.05, 0.0) * f * 0.5;
      // Embers floating
      vec2 ep = vec2(uv.x*8.0, uv.y*4.0 - uTime*2.0);
      float ember = step(0.985, hash(floor(ep)));
      col += vec3(1.0, 0.5, 0.1) * ember * 1.5;
      float a = clamp(f*1.2 + ember*0.6, 0.0, 1.0);
      gl_FragColor = vec4(col, a);
    }
  `,
});

/* === Audio ================================================================ */
let audioCtx = null;
let masterGain = null;
const audio = {
  stoveCrackleGain: null,
  windGain: null,
  ambientGain: null,
  started: false,
};
let lastCreak = 0;
let lastHowl = 0;
let lastWhistle = -180;

function initAudio(){
  if(audio.started) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  /* Stove crackle: filtered noise + occasional pops */
  const crackleNoise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*4, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*0.5;
  crackleNoise.buffer = buf; crackleNoise.loop = true;
  const cFilt = audioCtx.createBiquadFilter();
  cFilt.type = 'bandpass'; cFilt.frequency.value = 1200; cFilt.Q.value = 0.7;
  const cGain = audioCtx.createGain(); cGain.gain.value = 0.10;
  audio.stoveCrackleGain = cGain;
  crackleNoise.connect(cFilt); cFilt.connect(cGain); cGain.connect(masterGain);
  crackleNoise.start();

  // Pops via scheduled gain bumps on a silent oscillator path - simpler: schedule short noise bursts
  function popLoop(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const popBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.08, audioCtx.sampleRate);
    const pd = popBuf.getChannelData(0);
    for(let i=0;i<pd.length;i++){
      pd[i] = (Math.random()*2-1) * Math.exp(-i/pd.length * 12) * 0.8;
    }
    const popSrc = audioCtx.createBufferSource();
    popSrc.buffer = popBuf;
    const pf = audioCtx.createBiquadFilter();
    pf.type = 'lowpass'; pf.frequency.value = 2500;
    const pg = audioCtx.createGain(); pg.gain.value = 0.20 * (0.5 + Math.random()*0.5);
    popSrc.connect(pf); pf.connect(pg); pg.connect(masterGain);
    popSrc.start(t);
    setTimeout(popLoop, 800 + Math.random()*3500);
  }
  popLoop();

  /* Wind: filtered pink noise + slow LFO on filter */
  const windSrc = audioCtx.createBufferSource();
  const wBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*4, audioCtx.sampleRate);
  const wD = wBuf.getChannelData(0);
  let b0=0,b1=0,b2=0;
  for(let i=0;i<wD.length;i++){
    const white = Math.random()*2-1;
    b0 = 0.99765*b0 + white*0.0990460;
    b1 = 0.96300*b1 + white*0.2965164;
    b2 = 0.57000*b2 + white*1.0526913;
    wD[i] = (b0+b1+b2 + white*0.1848) * 0.3;
  }
  windSrc.buffer = wBuf; windSrc.loop = true;
  const wFilt = audioCtx.createBiquadFilter();
  wFilt.type = 'lowpass'; wFilt.frequency.value = 600;
  const wLfo = audioCtx.createOscillator(); wLfo.frequency.value = 0.07;
  const wLfoGain = audioCtx.createGain(); wLfoGain.gain.value = 350;
  wLfo.connect(wLfoGain); wLfoGain.connect(wFilt.frequency); wLfo.start();
  const wGain = audioCtx.createGain(); wGain.gain.value = 0.18;
  audio.windGain = wGain;
  windSrc.connect(wFilt); wFilt.connect(wGain); wGain.connect(masterGain);
  windSrc.start();

  /* Aurora ambient pad: slow detuned sines, A minor */
  const padFreqs = [110, 164.81, 196.0, 261.63]; // A2 E3 G3 C4
  const padGain = audioCtx.createGain(); padGain.gain.value = 0.04;
  audio.ambientGain = padGain; padGain.connect(masterGain);
  padFreqs.forEach((f, i) => {
    const o1 = audioCtx.createOscillator(); o1.frequency.value = f;
    const o2 = audioCtx.createOscillator(); o2.frequency.value = f * 1.005;
    o1.type = 'sine'; o2.type = 'sine';
    const og = audioCtx.createGain(); og.gain.value = 0.25;
    const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.05 + i*0.013;
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.12;
    lfo.connect(lfoG); lfoG.connect(og.gain); lfo.start();
    o1.connect(og); o2.connect(og); og.connect(padGain);
    o1.start(); o2.start();
  });

  audio.started = true;
}

function playCreak(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  if(t - lastCreak < 0.7) return;
  lastCreak = t;
  const o = audioCtx.createOscillator();
  o.type = 'square';
  const f = 200 + Math.random()*200;
  o.frequency.setValueAtTime(f*0.7, t);
  o.frequency.linearRampToValueAtTime(f, t+0.15);
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 350; bp.Q.value = 12;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.05, t+0.05);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  o.connect(bp); bp.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t+0.45);
}

function playHowl(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const vibrato = audioCtx.createOscillator();
  const vGain = audioCtx.createGain();
  o.frequency.value = 180;
  o.type = 'sawtooth';
  vibrato.frequency.value = 5; vGain.gain.value = 8;
  vibrato.connect(vGain); vGain.connect(o.frequency); vibrato.start(t);
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.07, t+0.6);
  g.gain.linearRampToValueAtTime(0.07, t+1.6);
  g.gain.exponentialRampToValueAtTime(0.001, t+3.0);
  o.frequency.setValueAtTime(180, t);
  o.frequency.linearRampToValueAtTime(280, t+0.7);
  o.frequency.linearRampToValueAtTime(220, t+1.8);
  o.frequency.exponentialRampToValueAtTime(120, t+3.0);
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t+3.2);
  vibrato.stop(t+3.2);
}

function playWhistle(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator(); o1.type='sine';
  const o2 = audioCtx.createOscillator(); o2.type='sine';
  const g = audioCtx.createGain(); g.gain.value = 0.0;
  o1.frequency.setValueAtTime(900, t);
  o1.frequency.linearRampToValueAtTime(1500, t+1.5);
  o1.frequency.linearRampToValueAtTime(1500, t+5.0);
  o1.frequency.linearRampToValueAtTime(900, t+6.5);
  o2.frequency.setValueAtTime(1800, t);
  o2.frequency.linearRampToValueAtTime(3000, t+1.5);
  o2.frequency.linearRampToValueAtTime(3000, t+5.0);
  o2.frequency.linearRampToValueAtTime(1800, t+6.5);
  g.gain.linearRampToValueAtTime(0.06, t+1.2);
  g.gain.linearRampToValueAtTime(0.06, t+5.5);
  g.gain.exponentialRampToValueAtTime(0.001, t+6.7);
  const og2 = audioCtx.createGain(); og2.gain.value = 0.25;
  o1.connect(g); o2.connect(og2); og2.connect(g);
  g.connect(masterGain);
  o1.start(t); o2.start(t); o1.stop(t+6.8); o2.stop(t+6.8);
}

function playWhoosh(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  noise.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=1.8;
  bp.frequency.setValueAtTime(400, t);
  bp.frequency.linearRampToValueAtTime(1800, t+0.4);
  const g = audioCtx.createGain(); g.gain.value = 0.18;
  g.gain.linearRampToValueAtTime(0.0, t+0.5);
  noise.connect(bp); bp.connect(g); g.connect(masterGain);
  noise.start(t);
}

function playLogPlop(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.3, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*8);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 400;
  const g = audioCtx.createGain(); g.gain.value = 0.4;
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t);
  // followed by a flare-up of crackle
  if(audio.stoveCrackleGain){
    const cg = audio.stoveCrackleGain;
    cg.gain.setValueAtTime(cg.gain.value, t);
    cg.gain.linearRampToValueAtTime(0.20, t+0.2);
    cg.gain.linearRampToValueAtTime(0.10, t+10);
  }
}

function playPour(){
  if(!audio.started) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*1.2, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * 0.8;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=2;
  const g = audioCtx.createGain(); g.gain.value = 0.0;
  g.gain.linearRampToValueAtTime(0.10, t+0.1);
  g.gain.linearRampToValueAtTime(0.10, t+1.0);
  g.gain.exponentialRampToValueAtTime(0.001, t+1.3);
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t);
}

/* === Game State =========================================================== */
const state = {
  fuel: 1.0,            // 0..1
  flameIntensity: 1.0,  // visual flame multiplier
  flameFlareUntil: 0,
  frostWipe: 0.0,       // 0..1
  wipeBurst: 0,
  boil: 0.4,
  pourBurst: 0,
  pourUntil: 0,
  stillTimer: 0,        // accumulated seconds with no input while at window
  lastInputT: 0,
  auroraIntensity: 1.0,
  shootStarT: -1,
  startTime: performance.now()/1000,
};

/* === Input ================================================================ */
const keys = { w: false, a: false, s: false, d: false };

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if(k === 'w' || k === 'a' || k === 's' || k === 'd'){
    keys[k] = true; state.lastInputT = performance.now()/1000;
    state.stillTimer = 0; playCreak();
  }
  if(k === 'e'){
    state.fuel = Math.min(1.0, state.fuel + 0.35);
    state.flameFlareUntil = performance.now()/1000 + 30;
    playLogPlop();
    toast('A LOG · STOVE FLARES');
    state.lastInputT = performance.now()/1000; state.stillTimer = 0;
  }
  if(k === 'f'){
    state.frostWipe = Math.min(1.0, state.frostWipe + 0.25);
    state.wipeBurst = 1.0;
    playWhoosh();
    toast('FROST · WIPED');
    state.lastInputT = performance.now()/1000; state.stillTimer = 0;
  }
  if(k === 'q'){
    state.pourUntil = performance.now()/1000 + 2;
    state.pourBurst = 1.0;
    playPour();
    toast('KETTLE · POURED');
    state.lastInputT = performance.now()/1000; state.stillTimer = 0;
  }
  if(k === '1'){ moveTo('chair'); }
  if(k === '2'){ moveTo('window'); }
});
window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if(k in keys) keys[k] = false;
});

function moveTo(key){
  camState.posKey = key;
  camState.target.copy(POSITIONS[key]);
  if(key === 'window'){ camState.targetYaw = 0.05; camState.targetPitch = 0.0; }
  else { camState.targetYaw = -0.4; camState.targetPitch = -0.05; }
}

// Mouse drag to look
let dragging = false, lastX = 0, lastY = 0;
sceneEl.addEventListener('pointerdown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', (e) => {
  if(!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camState.targetYaw   -= dx * 0.0035;
  camState.targetPitch -= dy * 0.0035;
  camState.targetYaw   = Math.max(-1.4, Math.min(1.4, camState.targetYaw));
  camState.targetPitch = Math.max(-0.6, Math.min(0.6, camState.targetPitch));
  state.lastInputT = performance.now()/1000;
  state.stillTimer = 0;
});

/* === Window-click to wipe frost (and W+drag if cam at window) ============= */
sceneEl.addEventListener('dblclick', () => {
  if(camState.posKey === 'window'){
    state.frostWipe = Math.min(1.0, state.frostWipe + 0.4);
    state.wipeBurst = 1.0;
    playWhoosh();
    toast('FROST · WIPED');
  }
});

/* === Resize =============================================================== */
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

/* === Gate =============================================================== */
gateCard.addEventListener('click', () => {
  initAudio();
  gateEl.classList.add('gone');
  setTimeout(() => gateEl.style.display='none', 1300);
});

/* === Animation Loop ====================================================== */
const clock = new THREE.Clock();
let dt = 0, elapsed = 0;

function tick(){
  dt = Math.min(0.05, clock.getDelta());
  elapsed += dt;
  const now = performance.now()/1000;

  /* Camera movement based on WASD (between two preset positions w/ blend) */
  // Use WASD to bias movement vector; we snap target between positions.
  // Simpler: hold W -> move toward window; S -> toward chair.
  if(keys.w && camState.posKey !== 'window'){ moveTo('window'); }
  if(keys.s && camState.posKey !== 'chair'){ moveTo('chair'); }
  // A/D nudge yaw
  if(keys.a) camState.targetYaw -= 0.9 * dt;
  if(keys.d) camState.targetYaw += 0.9 * dt;
  applyCamera();

  /* Stove fuel decay + flame intensity */
  const fuelDecay = 0.0025; // per second -> ~6.7 min full burn
  state.fuel = Math.max(0, state.fuel - fuelDecay * dt);
  let flame = state.fuel;
  if(now < state.flameFlareUntil){
    const remain = (state.flameFlareUntil - now)/30;
    flame = Math.min(1.5, flame + 0.5 * remain);
  }
  state.flameIntensity = flame;
  flameMat.uniforms.uIntensity.value = 0.6 + flame * 0.7;
  emberMat.uniforms.uIntensity.value = 0.6 + flame * 0.5;
  stoveBodyMat.uniforms.uHeat.value = 0.6 + flame * 0.6;
  // stove light flicker
  const flick = 1.0 + Math.sin(elapsed*7.3)*0.05 + Math.sin(elapsed*13.7)*0.04;
  stoveLight.intensity = 1.4 + flame * 1.6 * flick;

  // Update HUD fuel bar
  stoveFill.style.width = (state.fuel * 100).toFixed(1) + '%';
  if(state.fuel < 0.15){
    stoveFill.style.background = 'linear-gradient(90deg, #803010, #c04a18)';
  }

  /* Frost wipe burst decay */
  if(state.wipeBurst > 0) state.wipeBurst = Math.max(0, state.wipeBurst - dt*2);
  // The wipe is a circular reveal centered on view-space; for simplicity, center it.
  frostMat.uniforms.uTime.value = elapsed;
  frostMat.uniforms.uWipe.value = state.frostWipe;
  frostMat.uniforms.uWipeR.value = 0.0; // not using radial wipe currently

  /* Steam: pour burst decay */
  if(state.pourBurst > 0) state.pourBurst = Math.max(0, state.pourBurst - dt*0.6);
  steamMat.uniforms.uTime.value = elapsed;
  steamMat.uniforms.uBoil.value = 0.3 + flame*0.5;
  steamMat.uniforms.uBurst.value = state.pourBurst;

  /* Aurora intensity: drifts gently, easter egg boost */
  const baseAurora = 0.85 + Math.sin(elapsed*0.25)*0.15 + Math.sin(elapsed*0.07)*0.1;
  let auroraTarget = baseAurora;
  // Easter egg: 60s motionless at window
  if(camState.posKey === 'window' && (now - state.lastInputT) > 1.0){
    state.stillTimer += dt;
  } else {
    state.stillTimer = Math.max(0, state.stillTimer - dt*0.5);
  }
  if(state.stillTimer > 60){
    auroraTarget *= 1.8;
    if(state.shootStarT < 0){
      state.shootStarT = 0.0001;
      toast('THE SKY · LISTENS');
    }
  }
  state.auroraIntensity += (auroraTarget - state.auroraIntensity) * 0.02;
  skyMat.uniforms.uTime.value = elapsed;
  skyMat.uniforms.uIntensity.value = state.auroraIntensity;

  // Shooting star animation 0..1 then back to 0
  if(state.shootStarT >= 0){
    state.shootStarT += dt * 0.5;
    if(state.shootStarT > 2){ state.shootStarT = -1; state.stillTimer = 0; }
  }
  skyMat.uniforms.uShootStar.value = state.shootStarT > 0 ? Math.max(0, 1 - Math.abs(state.shootStarT - 1)) : 0;

  // Aurora light influence on scene (subtle dynamic green-cyan rim from window)
  auroraLight.intensity = 0.05 + state.auroraIntensity * 0.10;
  auroraLight.color.setHSL(0.36 + Math.sin(elapsed*0.1)*0.03, 0.9, 0.55);

  /* Snow shader */
  snowMat.uniforms.uTime.value = elapsed;

  /* Wolf howl: rare after 90 seconds in scene */
  if(audio.started && elapsed > 90 && now - lastHowl > 120){
    if(Math.random() < 0.0008){
      lastHowl = now; playHowl();
      toast('A WOLF · DISTANT');
    }
  }

  /* Kettle whistle: ~3 minute cycle */
  if(audio.started && elapsed - lastWhistle > 180){
    lastWhistle = elapsed;
    state.boil = 1.0;
    state.pourBurst = Math.max(state.pourBurst, 0.5);
    playWhistle();
    toast('THE KETTLE · WHISTLES');
  }

  /* Lamp flicker */
  lampLight.intensity = 0.85 + Math.sin(elapsed*4.7)*0.06 + Math.sin(elapsed*9.1)*0.04;

  /* HUD time tick (slow advance from 02:14) */
  const startMin = 2*60 + 14;
  const m = (startMin + Math.floor(elapsed/4)) % (24*60);
  const hh = String(Math.floor(m/60)).padStart(2,'0');
  const mm = String(m%60).padStart(2,'0');
  metaTime.textContent = `${hh}:${mm} LOCAL · WIND ${(10 + Math.floor(Math.sin(elapsed*0.05)*4)).toString().padStart(2,'0')} KT NNW`;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// Hint: nudge to start at chair, looking toward stove
camState.targetYaw = -0.55;
camState.targetPitch = -0.05;

</script>
