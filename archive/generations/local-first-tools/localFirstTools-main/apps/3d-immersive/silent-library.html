<script type="module">
import * as THREE from 'three';

// ---------------------------------------------------------------------
// Renderer / Scene / Camera
// ---------------------------------------------------------------------
const container = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080604, 0.018);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.65, 6);

// ---------------------------------------------------------------------
// Lighting — minimal. The lamp is the world.
// ---------------------------------------------------------------------
const ambient = new THREE.AmbientLight(0x14100a, 0.35);
scene.add(ambient);

const moonHint = new THREE.HemisphereLight(0x101820, 0x040302, 0.18);
scene.add(moonHint);

// THE LAMP — single primary light source
const lampPos = new THREE.Vector3(0, 1.32, 0);
const lampLight = new THREE.PointLight(0x88ddaa, 4.2, 16, 1.7);
lampLight.position.copy(lampPos);
lampLight.castShadow = true;
lampLight.shadow.mapSize.set(1024, 1024);
lampLight.shadow.bias = -0.0008;
lampLight.shadow.radius = 6;
lampLight.shadow.camera.near = 0.1;
lampLight.shadow.camera.far = 14;
scene.add(lampLight);

// Faint warm wall sconces (very dim, no shadow casting) — distant suggestions
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const r = 18;
  const sconce = new THREE.PointLight(0xffaa55, 0.12, 6, 2.0);
  sconce.position.set(Math.cos(angle) * r, 8 + Math.sin(i * 1.7) * 1.5, Math.sin(angle) * r);
  scene.add(sconce);
}

// ---------------------------------------------------------------------
// SHADERS — procedural, painterly
// ---------------------------------------------------------------------
const COMMON_NOISE = `
  // hash & value noise
  float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
  float hash21(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
  float vnoise(vec2 p){
    vec2 i=floor(p); vec2 f=fract(p);
    float a=hash21(i), b=hash21(i+vec2(1,0));
    float c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));
    vec2 u=f*f*(3.0-2.0*f);
    return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v=0.0; float a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
    for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; }
    return v;
  }
`;

// Marble floor — warm honey with darker veins
function makeMarbleMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uLampPos: { value: lampPos },
      uCamPos: { value: camera.position }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      void main(){
        vUv = uv * 8.0;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      uniform vec3 uLampPos;
      uniform vec3 uCamPos;
      ${COMMON_NOISE}
      void main(){
        vec2 p = vUv;
        float base = fbm(p * 0.6);
        float veins = fbm(p * 1.3 + base * 1.4);
        veins = smoothstep(0.42, 0.5, veins) - smoothstep(0.5, 0.62, veins);
        vec3 honey = mix(vec3(0.18, 0.12, 0.07), vec3(0.42, 0.28, 0.14), base);
        honey = mix(honey, vec3(0.08, 0.05, 0.03), veins * 0.7);
        // tile grout
        vec2 g = abs(fract(vUv * 0.5) - 0.5);
        float grout = smoothstep(0.48, 0.495, max(g.x, g.y));
        honey = mix(honey, vec3(0.04, 0.03, 0.02), grout);

        vec3 toLamp = uLampPos - vWorld;
        float dist = length(toLamp);
        vec3 L = toLamp / max(dist, 0.001);
        float NdotL = max(dot(vNormal, L), 0.0);
        float atten = 1.0 / (1.0 + dist * dist * 0.08);
        vec3 lampCol = vec3(0.55, 0.95, 0.75) * 4.0 * NdotL * atten;

        // specular sheen toward camera
        vec3 V = normalize(uCamPos - vWorld);
        vec3 H = normalize(L + V);
        float spec = pow(max(dot(vNormal, H), 0.0), 32.0) * atten * 0.6;

        vec3 col = honey * (0.04 + lampCol) + vec3(0.5,0.9,0.7) * spec;
        col += vec3(0.02, 0.018, 0.012); // ambient floor
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

// Oak wood — for table, shelves, balcony
function makeOakMaterial(opts = {}) {
  const tint = opts.tint ?? new THREE.Color(0.32, 0.18, 0.08);
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uLampPos: { value: lampPos },
      uCamPos: { value: camera.position },
      uTint: { value: tint },
      uScale: { value: opts.scale ?? 4.0 }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorld;
      varying vec3 vNormal;
      void main(){
        vUv = uv;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv; varying vec3 vWorld; varying vec3 vNormal;
      uniform vec3 uLampPos; uniform vec3 uCamPos; uniform vec3 uTint; uniform float uScale;
      ${COMMON_NOISE}
      void main(){
        vec2 p = vUv * uScale;
        float rings = sin(p.y * 18.0 + fbm(p * 0.6) * 4.0) * 0.5 + 0.5;
        float grain = fbm(vec2(p.x * 18.0, p.y * 1.2));
        float t = mix(rings, grain, 0.55);
        vec3 base = uTint * (0.55 + t * 0.55);
        base *= 0.85 + 0.15 * fbm(p * 12.0);

        vec3 toLamp = uLampPos - vWorld;
        float dist = length(toLamp);
        vec3 L = toLamp / max(dist, 0.001);
        float NdotL = max(dot(vNormal, L), 0.0);
        float atten = 1.0 / (1.0 + dist * dist * 0.1);
        vec3 lampCol = vec3(0.55, 0.95, 0.75) * 3.6 * NdotL * atten;

        vec3 V = normalize(uCamPos - vWorld);
        vec3 H = normalize(L + V);
        float spec = pow(max(dot(vNormal, H), 0.0), 22.0) * atten * 0.4;

        vec3 col = base * (0.06 + lampCol) + vec3(0.5,0.9,0.7) * spec;
        col += base * 0.02;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

// Brass — for railings, lamp base
function makeBrassMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uLampPos: { value: lampPos },
      uCamPos: { value: camera.position }
    },
    vertexShader: `
      varying vec3 vWorld; varying vec3 vNormal;
      void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vWorld; varying vec3 vNormal;
      uniform vec3 uLampPos; uniform vec3 uCamPos;
      ${COMMON_NOISE}
      void main(){
        vec3 toLamp = uLampPos - vWorld;
        float dist = length(toLamp);
        vec3 L = toLamp / max(dist, 0.001);
        vec3 V = normalize(uCamPos - vWorld);
        vec3 H = normalize(L + V);

        float NdotL = max(dot(vNormal, L), 0.0);
        float atten = 1.0 / (1.0 + dist * dist * 0.12);
        float spec = pow(max(dot(vNormal, H), 0.0), 64.0) * atten;

        // patina mottling
        float patina = fbm(vWorld.xz * 4.0 + vWorld.y * 2.0);
        vec3 brass = mix(vec3(0.55, 0.40, 0.18), vec3(0.32, 0.22, 0.08), patina * 0.6);

        // rim toward camera
        float rim = pow(1.0 - max(dot(vNormal, V), 0.0), 2.5);

        vec3 lampCol = vec3(0.55, 0.95, 0.75);
        vec3 col = brass * (0.05 + NdotL * atten * 3.5) + lampCol * spec * 1.6 + vec3(0.4,0.7,0.55) * rim * 0.18;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

// Lampshade — green glass, emissive from inside
function makeLampshadeMaterial() {
  return new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.DoubleSide,
    uniforms: { uCamPos: { value: camera.position } },
    vertexShader: `
      varying vec3 vWorld; varying vec3 vNormal;
      void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        vNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vWorld; varying vec3 vNormal;
      uniform vec3 uCamPos;
      void main(){
        vec3 V = normalize(uCamPos - vWorld);
        float fres = pow(1.0 - abs(dot(vNormal, V)), 2.0);
        vec3 inner = vec3(0.55, 1.4, 0.85);
        vec3 outer = vec3(0.10, 0.32, 0.20);
        vec3 col = mix(inner, outer, fres);
        col *= 1.2;
        gl_FragColor = vec4(col, 0.92);
      }
    `
  });
}

// Book spine — vertical bands, gilded title hint
function makeBookSpineMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uLampPos: { value: lampPos },
      uCamPos: { value: camera.position }
    },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aSeed;
      varying vec3 vColor;
      varying float vSeed;
      varying vec2 vUv;
      varying vec3 vWorld; varying vec3 vNormal;
      void main(){
        vColor = aColor;
        vSeed = aSeed;
        vUv = uv;
        vec4 wp = instanceMatrix * vec4(position, 1.0);
        wp = modelMatrix * wp;
        vWorld = wp.xyz;
        vNormal = normalize((modelMatrix * instanceMatrix * vec4(normal, 0.0)).xyz);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vColor; varying float vSeed; varying vec2 vUv;
      varying vec3 vWorld; varying vec3 vNormal;
      uniform vec3 uLampPos; uniform vec3 uCamPos;
      ${COMMON_NOISE}
      void main(){
        // subtle leather grain
        float grain = fbm(vUv * vec2(60.0, 8.0) + vSeed * 31.0);
        vec3 leather = vColor * (0.78 + grain * 0.32);

        // gilded title bar — only if face-on
        float band = smoothstep(0.62, 0.66, vUv.y) - smoothstep(0.74, 0.78, vUv.y);
        float titleBar = band * step(0.55, hash11(vSeed));
        vec3 gold = vec3(0.85, 0.65, 0.25);
        leather = mix(leather, gold, titleBar * 0.55);

        // ridges horizontal
        float ridge = sin(vUv.y * 50.0 + vSeed * 20.0);
        leather *= 0.92 + 0.08 * ridge;

        vec3 toLamp = uLampPos - vWorld;
        float dist = length(toLamp);
        vec3 L = toLamp / max(dist, 0.001);
        float NdotL = max(dot(vNormal, L), 0.0);
        float atten = 1.0 / (1.0 + dist * dist * 0.14);

        vec3 V = normalize(uCamPos - vWorld);
        vec3 H = normalize(L + V);
        float spec = pow(max(dot(vNormal, H), 0.0), 30.0) * atten * 0.3;

        vec3 lampCol = vec3(0.55, 0.95, 0.75);
        vec3 col = leather * (0.03 + lampCol * NdotL * atten * 3.2) + lampCol * spec * (0.4 + titleBar * 1.4);
        col += leather * 0.012;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

// Painted ceiling mural — dark angels and clouds, very dim
function makeMuralMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main(){
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      ${COMMON_NOISE}

      // simple figure: sample N "centers" with shaped falloff to suggest robed forms
      float angel(vec2 p, vec2 c, float s){
        vec2 d = (p - c) / s;
        // elongated body
        d.y *= 0.55;
        float body = exp(-dot(d,d) * 6.0);
        // wings — horizontal lobes
        vec2 w = (p - c) / s; w.y *= 2.0;
        float wing = exp(-dot(w,w) * 4.0) * smoothstep(0.0, 0.3, abs(p.x - c.x));
        return body + wing * 0.5;
      }

      void main(){
        vec2 p = vUv;
        // cloud base
        float cloud = fbm(p * 3.0 + vec2(0.0, uTime * 0.005));
        cloud = pow(cloud, 1.4);
        vec3 sky = mix(vec3(0.02, 0.018, 0.012), vec3(0.10, 0.07, 0.04), cloud);

        // sun-like halo at center, faint
        float halo = exp(-length(p - 0.5) * 4.0) * 0.5;
        sky += vec3(0.16, 0.12, 0.06) * halo;

        // angels around the center
        float ang = 0.0;
        ang += angel(p, vec2(0.32, 0.40), 0.10);
        ang += angel(p, vec2(0.68, 0.42), 0.10);
        ang += angel(p, vec2(0.50, 0.28), 0.09);
        ang += angel(p, vec2(0.25, 0.65), 0.10);
        ang += angel(p, vec2(0.75, 0.66), 0.10);
        ang += angel(p, vec2(0.42, 0.78), 0.09);
        ang += angel(p, vec2(0.58, 0.78), 0.09);

        // dim painterly figure color
        vec3 robe = vec3(0.18, 0.12, 0.06);
        vec3 col = mix(sky, robe, smoothstep(0.05, 0.6, ang));

        // gilt rim where angels meet sky
        float rim = smoothstep(0.04, 0.08, ang) - smoothstep(0.08, 0.14, ang);
        col += vec3(0.28, 0.20, 0.08) * rim * 0.6;

        // vignette around frame
        vec2 q = abs(p - 0.5) * 2.0;
        float vig = smoothstep(1.0, 0.6, max(q.x, q.y));
        col *= 0.4 + vig * 0.6;

        // tone the whole thing way down — ceiling is far from lamp
        col *= 0.28;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

const SHELF_TIER_H = 0.42;     // height of one shelf tier

function makeBookcaseShell(width, height, x, z, ry) {
  const back = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.08), oakMat);
  const grp = new THREE.Group();
  back.position.set(0, height/2, -SHELF_DEPTH);
  grp.add(back);
  // horizontal shelves
  const tiers = Math.floor(height / SHELF_TIER_H);
  for (let i = 0; i <= tiers; i++) {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(width, 0.04, SHELF_DEPTH), oakMat);
    sh.position.set(0, i * SHELF_TIER_H, -SHELF_DEPTH/2);
    sh.receiveShadow = true; sh.castShadow = true;
    grp.add(sh);
  }
  // vertical pilasters every ~2.5m
  const piCount = Math.max(2, Math.round(width / 2.5));
  for (let i = 0; i <= piCount; i++) {
    const px = -width/2 + i * (width / piCount);
    const pi = new THREE.Mesh(new THREE.BoxGeometry(0.10, height, SHELF_DEPTH + 0.02), oakMat);
    pi.position.set(px, height/2, -SHELF_DEPTH/2);
    pi.castShadow = true;
    grp.add(pi);
  }
  // crown molding at top
  const crown = new THREE.Mesh(new THREE.BoxGeometry(width + 0.2, 0.18, SHELF_DEPTH + 0.18), oakMat);
  crown.position.set(0, height + 0.05, -SHELF_DEPTH/2);
  grp.add(crown);

  grp.position.set(x, 0, z);
  grp.rotation.y = ry;
  return grp;
}

const aSeedArr = new Float32Array(MAX_BOOKS);
const colorAttr = new THREE.InstancedBufferAttribute(aColorArr, 3);
const seedAttr = new THREE.InstancedBufferAttribute(aSeedArr, 1);

seedAttr.setUsage(THREE.StaticDrawUsage);

// books data: per-instance { row, alongOffset, width, height, depth, title... }
const tmpObj = new THREE.Object3D();
let bIdx = 0;

for (const r of bookRows) {
  let along = 0;
  while (along < r.length && bIdx < MAX_BOOKS) {
    // some "leaning" books: skip a slot, leave gap
    if (rand() < 0.04 && along + 0.18 < r.length) { along += 0.18; continue; }

    const w = 0.030 + rand() * 0.040;       // spine width (along row)
    const h = 0.22 + rand() * 0.16;         // book height
    const d = 0.16 + rand() * 0.06;         // depth into shelf

    if (along + w > r.length) break;

    const cx = r.x0 + r.dirX * (along + w/2) + r.normalX * (d/2);
    const cz = r.z0 + r.dirZ * (along + w/2) + r.normalZ * (d/2);
    const cy = r.y0 + h/2;

    // orient: row direction is the X axis of the box (width = along), normal is Z of box (depth)
    tmpObj.position.set(cx, cy, cz);
    // basis: x-axis = (dirX, 0, dirZ); z-axis = (normalX, 0, normalZ); y-axis = up
    const yaw = Math.atan2(r.normalX, r.normalZ);
    tmpObj.rotation.set(0, yaw, 0);
    // small lean — random tilt
    if (rand() < 0.06) tmpObj.rotation.z = (rand() - 0.5) * 0.18;
    else tmpObj.rotation.z = 0;

    tmpObj.scale.set(w, h, d);
    tmpObj.updateMatrix();
    books.setMatrixAt(bIdx, tmpObj.matrix);

    const pal = palettes[Math.floor(rand() * palettes.length)];
    const c = pal[Math.floor(rand() * pal.length)];
    const jitter = 0.85 + rand() * 0.3;
    aColorArr[bIdx*3+0] = c[0] * jitter;
    aColorArr[bIdx*3+1] = c[1] * jitter;
    aColorArr[bIdx*3+2] = c[2] * jitter;
    aSeedArr[bIdx] = rand() * 1000.0;

    // store metadata for click-to-read (only retain for ground-floor reachable books to save memory)
    if (r.y0 < 5.5) {
      bookData.push({
        idx: bIdx,
        position: new THREE.Vector3(cx, cy, cz),
        title: pick(TITLE_WORDS_A) + ' ' + pick(TITLE_WORDS_B) + ' ' + pick(TITLE_WORDS_C),
        author: pick(AUTHORS),
        seed: aSeedArr[bIdx]
      });
    }

    along += w + 0.002;
    bIdx++;
  }
  if (bIdx >= MAX_BOOKS) break;
}

function makeRailing(x1, z1, x2, z2) {
  const grp = new THREE.Group();
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  const cx = (x1 + x2)/2, cz = (z1 + z2)/2;
  const yaw = Math.atan2(dx, dz);

  // Top rail
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, len, 12), brassMat);
  top.rotation.z = Math.PI/2;
  top.position.set(cx, BALCONY_Y + 1.05, cz);
  top.rotation.y = yaw;
  // The CylinderGeometry default along Y; we want along the line direction.
  top.geometry.rotateZ(Math.PI/2); // make it along X
  // reset rotation now that geometry is along X
  top.rotation.set(0, yaw, 0);
  top.position.set(cx, BALCONY_Y + 1.05, cz);
  grp.add(top);

  const bot = top.clone();
  bot.position.set(cx, BALCONY_Y + 0.40, cz);
  grp.add(bot);

  // Balusters every ~0.5
  const nB = Math.max(2, Math.floor(len / 0.45));
  for (let i = 0; i <= nB; i++) {
    const t = i / nB;
    const bx = x1 + (x2 - x1) * t;
    const bz = z1 + (z2 - z1) * t;
    const bl = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.7, 8), brassMat);
    bl.position.set(bx, BALCONY_Y + 0.7, bz);
    grp.add(bl);
  }
  return grp;
}

function makeSpiralStaircase() {
  const grp = new THREE.Group();
  const cx = 14, cz = 10, R = 1.6;
  const stepCount = 30;
  const totalRise = BALCONY_Y;
  const step = totalRise / stepCount;
  // central column
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, BALCONY_Y + 0.2, 24), brassMat);
  col.position.set(cx, BALCONY_Y/2, cz);
  grp.add(col);
  for (let i = 0; i < stepCount; i++) {
    const angle = i * 0.50;
    const wedgeShape = new THREE.Shape();
    wedgeShape.moveTo(0, 0);
    wedgeShape.absarc(0, 0, R, 0, 0.55, false);
    wedgeShape.lineTo(0, 0);
    const wedgeGeo = new THREE.ExtrudeGeometry(wedgeShape, { depth: 0.06, bevelEnabled: false });
    const wedge = new THREE.Mesh(wedgeGeo, oakMat);
    wedge.rotation.x = -Math.PI/2;
    wedge.rotation.z = angle;
    wedge.position.set(cx, i * step, cz);
    wedge.castShadow = true;
    grp.add(wedge);

    // outer rail post each 3 steps
    if (i % 2 === 0) {
      const px = cx + Math.cos(angle + 0.275) * R;
      const pz = cz + Math.sin(angle + 0.275) * R;
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.95, 8), brassMat);
      post.position.set(px, i * step + 0.45, pz);
      grp.add(post);
    }
  }
  return grp;
}
scene.add(makeSpiralStaircase());

const mothState = {
  pos: lampPos.clone().add(new THREE.Vector3(0.6, 0, 0.2)),
  vel: new THREE.Vector3(0.4, 0.1, 0.0),
  flap: 0
};

function updateMoth(dt) {
  // attraction toward lamp + perpendicular swirl + jitter
  const toLamp = lampPos.clone().sub(mothState.pos);
  const dist = toLamp.length();
  toLamp.normalize();
  const swirl = new THREE.Vector3(-toLamp.z, 0, toLamp.x);
  const desired = new THREE.Vector3()
    .addScaledVector(toLamp, dist > 0.5 ? 1.6 : -1.4)
    .addScaledVector(swirl, 2.2)
    .add(new THREE.Vector3((Math.random()-0.5)*1.5, (Math.random()-0.5)*0.6, (Math.random()-0.5)*1.5));
  mothState.vel.lerp(desired, 0.06);
  // clamp speed
  const speed = mothState.vel.length();
  if (speed > 1.6) mothState.vel.multiplyScalar(1.6/speed);
  mothState.pos.addScaledVector(mothState.vel, dt);
  // keep near lamp height
  mothState.pos.y = THREE.MathUtils.clamp(mothState.pos.y, 1.0, 1.7);

  moth.position.copy(mothState.pos);
  // face direction of motion
  const yaw = Math.atan2(mothState.vel.x, mothState.vel.z);
  moth.rotation.set(0, yaw, Math.sin(performance.now() * 0.04) * 0.6);
  // wing flap via scale
  mothState.flap += dt * 30.0;
  moth.scale.set(1, 0.6 + 0.4 * Math.abs(Math.sin(mothState.flap)), 1);
}

const keys = {};

let dragging = false;
let lastX = 0, lastY = 0;
renderer.domElement.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  // check if clicking a book first
  if (tryReadBookAtScreen(e.clientX, e.clientY)) return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
});

  // hover detection — cursor highlight
  updateCursorHover(e.clientX, e.clientY);
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  player.yaw -= dx * 0.0028;
  player.pitch -= dy * 0.0028;
  player.pitch = THREE.MathUtils.clamp(player.pitch, -1.2, 1.2);
});

function updatePlayer(dt) {
  const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 4.0 : 2.2;
  const f = (keys['KeyW']?1:0) - (keys['KeyS']?1:0);
  const s = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const want = new THREE.Vector3()
    .addScaledVector(forward, f)
    .addScaledVector(right, s);
  if (want.lengthSq() > 0) want.normalize().multiplyScalar(speed);
  player.vel.lerp(want, 0.18);

  // collide with walls (just clamp)
  player.pos.addScaledVector(player.vel, dt);
  const margin = 1.2;
  player.pos.x = THREE.MathUtils.clamp(player.pos.x, -ROOM_W/2 + margin, ROOM_W/2 - margin);
  player.pos.z = THREE.MathUtils.clamp(player.pos.z, -ROOM_D/2 + margin, ROOM_D/2 - margin);
  // simple ramp up if standing on staircase footprint
  let targetY = playerHeight;
  // staircase at (14,10) and at (-14,-10) — tiny radius -> step up to balcony
  for (const sc of [[14,10],[-14,-10]]) {
    const dx = player.pos.x - sc[0], dz = player.pos.z - sc[1];
    if (Math.hypot(dx, dz) < 1.8) {
      const angle = Math.atan2(dz, dx);
      // climb based on swept angle (rough)
      const climb = THREE.MathUtils.clamp((angle + Math.PI) / (Math.PI * 4) * BALCONY_Y, 0, BALCONY_Y);
      targetY = playerHeight + climb;
    }
  }
  // if walking out onto balcony
  const onBalcony = player.pos.y > playerHeight + 4 ||
    (Math.abs(player.pos.x) > 12.5 || Math.abs(player.pos.z) > 8.5) && player.pos.y > playerHeight + BALCONY_Y/2;
  if (player.pos.y > playerHeight + 0.5 && (Math.abs(player.pos.x) > 12.5 || Math.abs(player.pos.z) > 8.5)) {
    targetY = playerHeight + BALCONY_Y;
  }
  player.pos.y += (targetY - player.pos.y) * Math.min(1, dt * 4);

  // camera
  camera.position.copy(player.pos);
  const lookDir = new THREE.Vector3(
    -Math.sin(player.yaw) * Math.cos(player.pitch),
    Math.sin(player.pitch),
    -Math.cos(player.yaw) * Math.cos(player.pitch)
  );
  camera.lookAt(player.pos.clone().add(lookDir));
}

// CLICK A BOOK — find nearest book to ray, open modal
// ---------------------------------------------------------------------
const raycaster = new THREE.Raycaster();
raycaster.params.Mesh = { threshold: 0 };

function pickBook(clientX, clientY) {
  const ndc = new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  // raycast against the InstancedMesh
  const hits = raycaster.intersectObject(books, false);
  if (hits.length === 0) return null;
  const hit = hits[0];
  // only pick within reasonable reach
  if (hit.distance > 4.5) return null;
  // map instance to bookData (only ground floor books were stored)
  const inst = hit.instanceId;
  return bookData.find(b => b.idx === inst) || {
    title: pick(TITLE_WORDS_A) + ' ' + pick(TITLE_WORDS_B) + ' ' + pick(TITLE_WORDS_C),
    author: pick(AUTHORS),
    seed: 100 + inst
  };
}

function tryReadBookAtScreen(x, y) {
  if (document.getElementById('modal').classList.contains('show')) return false;
  const book = pickBook(x, y);
  if (!book) return false;
  openModal(book);
  pageRustleSound();
  return true;
}

function updateCursorHover(x, y) {
  const cur = document.getElementById('cursor');
  if (document.getElementById('gate') && !document.getElementById('gate').classList.contains('hidden')) {
    cur.classList.remove('hover'); return;
  }
  const ndc = new THREE.Vector2(
    (x / window.innerWidth) * 2 - 1,
    -(y / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(books, false);
  if (hits.length && hits[0].distance < 4.5) cur.classList.add('hover');
  else cur.classList.remove('hover');
}

function makePassage(seed) {
  const r = rng(Math.floor(seed * 1000) + 1);
  const lines = 3 + Math.floor(r() * 2);
  const out = [];
  for (let i = 0; i < lines; i++) {
    const a = FRAGMENTS_OPEN[Math.floor(r() * FRAGMENTS_OPEN.length)];
    const b = FRAGMENTS_MID[Math.floor(r() * FRAGMENTS_MID.length)];
    const c = FRAGMENTS_CLOSE[Math.floor(r() * FRAGMENTS_CLOSE.length)];
    out.push(a + ' ' + b + ' ' + c);
  }
  return out;
}

function openModal(book) {
  document.getElementById('modalTitle').textContent = book.title;
  document.getElementById('modalAuthor').textContent = book.author;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  const passage = makePassage(book.seed || Math.random() * 100);
  for (const p of passage) {
    const el = document.createElement('p');
    el.textContent = p;
    body.appendChild(el);
  }
  const ed = ['1887','1902','1918','1924','1931','1947','1958','1962','1971','1984'];
  document.getElementById('modalFooter').textContent = 'Page ' + (12 + Math.floor((book.seed || 0) % 270)) + '   ·   ' + ed[Math.floor((book.seed || 0) % ed.length)];
  document.getElementById('modal').classList.add('show');
}

// ---------------------------------------------------------------------
// AUDIO — gated, ambient
// ---------------------------------------------------------------------
let audioCtx = null;
let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // master gain
  const master = audioCtx.createGain();
  master.gain.value = 0.0;
  master.connect(audioCtx.destination);
  master.gain.linearRampToValueAtTime(0.55, audioCtx.currentTime + 4.0);

  // ambient hum (two detuned sines, slow LFO)
  function hum(freq, gainVal) {
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = gainVal;
    const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.07;
    const lfoG = audioCtx.createGain(); lfoG.gain.value = gainVal * 0.4;
    lfo.connect(lfoG).connect(g.gain);
    o.connect(g).connect(master);
    o.start(); lfo.start();
  }
  hum(54, 0.05);
  hum(81, 0.035);
  hum(108, 0.022);

  // very faint pink-ish noise via filtered white
  const bufSize = 2 * audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufSize; i++) {
    const w = Math.random() * 2 - 1;
    last = 0.97 * last + 0.03 * w;
    data[i] = last * 0.6;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  const noiseFilt = audioCtx.createBiquadFilter();
  noiseFilt.type = 'lowpass'; noiseFilt.frequency.value = 480;
  const noiseG = audioCtx.createGain(); noiseG.gain.value = 0.06;
  noise.connect(noiseFilt).connect(noiseG).connect(master);
  noise.start();

  // 1Hz clock tick — panned far right, distant
  function clockTick() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 2200;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.04, t + 0.001);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    const pan = audioCtx.createStereoPanner(); pan.pan.value = 0.85;
    const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000;
    o.connect(f).connect(g).connect(pan).connect(master);
    o.start(t); o.stop(t + 0.08);
  }
  setInterval(clockTick, 1000);

  // settling pings — irregular, very rare
  function ping() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type = 'triangle';
    o.frequency.value = 380 + Math.random() * 800;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.06, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
    const pan = audioCtx.createStereoPanner(); pan.pan.value = (Math.random()-0.5)*1.6;
    o.connect(g).connect(pan).connect(master);
    o.start(t); o.stop(t + 1.7);
    setTimeout(ping, 6000 + Math.random() * 14000);
  }
  setTimeout(ping, 4000);

  // floor creaks
  function creak() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.7);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.025, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 380;
    const pan = audioCtx.createStereoPanner(); pan.pan.value = (Math.random()-0.5)*1.4;
    o.connect(f).connect(g).connect(pan).connect(master);
    o.start(t); o.stop(t + 0.85);
    setTimeout(creak, 9000 + Math.random() * 22000);
  }
  setTimeout(creak, 7000);

  // bookshelf sigh — low filtered noise burst
  function sigh() {
    const t = audioCtx.currentTime;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 220;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.10, t + 1.2);
    g.gain.linearRampToValueAtTime(0.0001, t + 3.0);
    const pan = audioCtx.createStereoPanner(); pan.pan.value = (Math.random()-0.5)*1.0;
    src.connect(f).connect(g).connect(pan).connect(master);
    src.start(t); src.stop(t + 3.1);
    setTimeout(sigh, 18000 + Math.random() * 40000);
  }
  setTimeout(sigh, 12000);
}

function pageRustleSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 0.5;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const env = Math.exp(-i / (audioCtx.sampleRate * 0.18));
    d[i] = (Math.random()*2-1) * env * 0.35;
  }
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1200;
  const g = audioCtx.createGain(); g.gain.value = 0.55;
  src.connect(f).connect(g).connect(audioCtx.destination);
  src.start(t); src.stop(t + 0.5);
}

// ---------------------------------------------------------------------
// GATE
// ---------------------------------------------------------------------
const gate = document.getElementById('gate');
gate.addEventListener('click', () => {
  gate.classList.add('hidden');
  startAudio();
});

// ---------------------------------------------------------------------
// CLOCK HUD — slowly tick from 00:14 onward
// ---------------------------------------------------------------------
const clockEl = document.getElementById('clockText');
const clockStart = Date.now();
const baseMinutes = 14;
function updateClock() {
  const elapsed = (Date.now() - clockStart) / 1000;
  const totalMin = baseMinutes + Math.floor(elapsed / 12);
  const hh = Math.floor(totalMin / 60) % 24;
  const mm = totalMin % 60;
  clockEl.textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

// ---------------------------------------------------------------------
// RESIZE
// ---------------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------------------------------------------------------------------
// ANIMATE
// ---------------------------------------------------------------------
const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  // subtle lamp flicker
  lampLight.intensity = 4.0 + Math.sin(t * 7.3) * 0.10 + Math.sin(t * 1.7) * 0.18 + (Math.random()-0.5) * 0.04;

  // shader uniforms
  floorMat.uniforms.uTime.value = t;
  floorMat.uniforms.uCamPos.value.copy(camera.position);
  oakMat.uniforms.uTime.value = t;
  oakMat.uniforms.uCamPos.value.copy(camera.position);
  tableTopMat.uniforms.uTime.value = t;
  tableTopMat.uniforms.uCamPos.value.copy(camera.position);
  balconyMat.uniforms.uTime.value = t;
  balconyMat.uniforms.uCamPos.value.copy(camera.position);
  brassMat.uniforms.uCamPos.value.copy(camera.position);
  shadeMat.uniforms.uCamPos.value.copy(camera.position);
  bookSpineMat.uniforms.uCamPos.value.copy(camera.position);
  ceilingMat.uniforms.uTime.value = t;

  updatePlayer(dt);
  updateMoth(dt);
  updateClock();

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
