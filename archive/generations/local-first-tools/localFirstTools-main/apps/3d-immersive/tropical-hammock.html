<script type="module">
import * as THREE from 'three';

/* ============================================================
   TROPICAL HAMMOCK — Anguilla, 6:47 PM
   A cinematic single-file Three.js mood piece.
   The camera is laid back in a hammock between two palms.
   Ocean breathes. Sky burns orange-pink-purple. Steel drums
   drift in from the beach bar.
   ============================================================ */

/* ---------- Globals ---------- */
const stage = document.getElementById('stage');
const gate  = document.getElementById('gate');

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.05, 600);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.setClearColor(0x301414, 1);
stage.appendChild(renderer.domElement);

scene.fog = new THREE.FogExp2(0xff9b6a, 0.0035);

/* ---------- Camera rig (hammock) ----------
   The camera sits inside a hammock. Hammock has a sway origin
   (the rope anchor, between the trees) and the body of the hammock
   hangs below it. Gentle pendulum motion drives the camera.
*/
const HAMMOCK = {
  anchorY: 2.2,       // height where ropes meet trees
  cameraY: 1.05,      // resting eye height when lying down
  swayPhase: 0,
  swayAmp: 0.06,      // base meters
  targetAmp: 0.06,
  rollAmp: 0.025,     // radians
  pitchAmp: 0.012,
};

camera.position.set(0, HAMMOCK.cameraY, 0);
camera.rotation.order = 'YXZ';
camera.rotation.x =  0.42;       // tilted up — looking at sky/palms
camera.rotation.y =  0.0;

/* ---------- Look (mouse drag, limited) ---------- */
const Look = {
  yaw: 0,
  pitch: 0.42,
  yawTarget: 0,
  pitchTarget: 0.42,
  dragging: false,
  lastX: 0, lastY: 0,
};
const YAW_LIMIT   = 0.55;
const PITCH_MIN   = 0.05;
const PITCH_MAX   = 0.85;

renderer.domElement.addEventListener('pointerdown', (e) => {
  Look.dragging = true;
  Look.lastX = e.clientX; Look.lastY = e.clientY;
  document.body.classList.add('dragging');
});
window.addEventListener('pointerup', () => {
  Look.dragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('pointermove', (e) => {
  if (!Look.dragging) return;
  const dx = (e.clientX - Look.lastX) * 0.0025;
  const dy = (e.clientY - Look.lastY) * 0.0025;
  Look.lastX = e.clientX; Look.lastY = e.clientY;
  Look.yawTarget   = THREE.MathUtils.clamp(Look.yawTarget   - dx, -YAW_LIMIT, YAW_LIMIT);
  Look.pitchTarget = THREE.MathUtils.clamp(Look.pitchTarget - dy,  PITCH_MIN, PITCH_MAX);
});

/* SPACE — sway harder */
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    HAMMOCK.targetAmp = 0.22;
    if (Audio.ready) Audio.kickPalmRustle();
  }
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    HAMMOCK.targetAmp = 0.06;
  }
});

/* ============================================================
   SHADERS
   ============================================================ */

/* ---------- SKY — sunset gradient dome ---------- */
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    uTime:    { value: 0 },
    uSunDir:  { value: new THREE.Vector3(0.35, 0.06, -1.0).normalize() },
    uHorizon: { value: new THREE.Color(0xffc890) },
    uMid:     { value: new THREE.Color(0xff7a5a) },
    uHigh:    { value: new THREE.Color(0x6a3a72) },
    uZenith:  { value: new THREE.Color(0x2a1a48) },
  },
  vertexShader: /* glsl */`
    varying vec3 vWorldDir;
    void main() {
      vWorldDir = normalize((modelMatrix * vec4(position, 1.0)).xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vWorldDir;
    uniform float uTime;
    uniform vec3  uSunDir;
    uniform vec3  uHorizon, uMid, uHigh, uZenith;

    // hash + value noise for cloud streaks
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
    float vnoise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
      vec2 u=f*f*(3.-2.*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    float fbm(vec2 p){
      float s=0., a=0.5;
      for(int i=0;i<5;i++){ s+=a*vnoise(p); p*=2.03; a*=0.5; }
      return s;
    }

    void main(){
      vec3 dir = normalize(vWorldDir);
      float h = clamp(dir.y, -0.2, 1.0);

      // Vertical gradient — horizon -> mid -> high -> zenith
      vec3 col;
      float t1 = smoothstep(-0.05, 0.18, h);
      vec3 lower = mix(uHorizon, uMid, t1);
      float t2 = smoothstep(0.18, 0.52, h);
      vec3 upper = mix(uMid,    uHigh, t2);
      float t3 = smoothstep(0.45, 0.95, h);
      vec3 top   = mix(uHigh,   uZenith, t3);

      col = lower;
      col = mix(col, upper, smoothstep(0.10, 0.45, h));
      col = mix(col, top,   smoothstep(0.40, 0.85, h));

      // Sun bloom near sun direction
      float sd = max(dot(dir, normalize(uSunDir)), 0.0);
      float sun  = pow(sd, 220.0);
      float halo = pow(sd, 6.0)  * 0.55;
      float wide = pow(sd, 1.6)  * 0.18;
      vec3 sunCol = vec3(1.0, 0.78, 0.42);
      col += sun  * vec3(1.0, 0.95, 0.78) * 1.4;
      col += halo * sunCol;
      col += wide * vec3(1.0, 0.6, 0.35);

      // Cloud streaks (warm + magenta-tinted) — only above horizon
      if (h > 0.02) {
        vec2 sp = vec2(atan(dir.z, dir.x)*1.6 + uTime*0.005, h*3.4 + uTime*0.002);
        float cl = fbm(sp*1.2);
        cl = smoothstep(0.45, 0.9, cl) * smoothstep(0.0, 0.25, h);
        // distant lit underside
        vec3 cloudCol = mix(vec3(0.9,0.55,0.5), vec3(1.0,0.82,0.6), pow(sd, 2.0));
        col = mix(col, cloudCol, cl * 0.55);

        // Hi cloud whisps purple
        vec2 sp2 = vec2(atan(dir.z, dir.x)*0.8 - uTime*0.003, h*2.0);
        float c2 = fbm(sp2*0.6 + 4.2);
        c2 = smoothstep(0.55, 0.85, c2) * smoothstep(0.35, 0.7, h);
        col = mix(col, vec3(0.55,0.35,0.55), c2*0.35);
      }

      // Subtle vignette at zenith — deeper purple
      col *= 1.0 - 0.10 * smoothstep(0.6, 1.0, h);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float vnoise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
      vec2 u=f*f*(3.-2.*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }

      float s=0., a=0.5;
      for(int i=0;i<5;i++){ s+=a*vnoise(p); p=p*2.03+1.7; a*=0.5; }
      return s;

    void main(){
      // Distance from camera (in world XZ)

      float sparkle = pow(fbm(vW.xz*3.0 - uTime*1.2), 6.0);
      col += glitter * sparkle * uSunCol * 1.6;

      // wide warm glow blanket from sun direction
      col += smoothstep(0.0, 0.95, along) * vec3(1.0, 0.55, 0.35) * 0.18 * (1.0-depth);

      // Foam line near shore (very small Z near beach)
      float foamLine = 1.0 - smoothstep(0.6, 1.6, d);
      float foamN = fbm(vW.xz*2.4 + uTime*1.4);

      col += vec3(1.0,0.7,0.4) * spec * 0.05;

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

/* ---------- PALM TRUNK ----------
   Curving trunks framing left + right of view.
   Each trunk is a tube along a quadratic curve.
*/
function makePalmTrunk(rootX, leanX, leanZ, height, ringGeoSegments=24, rings=14) {
  // We'll build a custom tube along a curve
  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(rootX, -1.0, 0.0),
    new THREE.Vector3(rootX*0.7 + leanX*0.4, height*0.55, leanZ*0.55),
    new THREE.Vector3(rootX*0.45 + leanX, height, leanZ)
  );
  const radTop = 0.13, radBot = 0.34;
  const tubeSeg = 80;
  const radSeg = ringGeoSegments;
  const positions = [];
  const uvs = [];
  const indices = [];

  const tmpV = new THREE.Vector3();
  const up = new THREE.Vector3(0,1,0);
  for (let i = 0; i <= tubeSeg; i++){
    const t = i/tubeSeg;
    const p = curve.getPoint(t);
    const tan = curve.getTangent(t).normalize();
    const norm = new THREE.Vector3().crossVectors(up, tan).normalize();
    if (norm.lengthSq() < 1e-4) norm.set(1,0,0);
    const bin  = new THREE.Vector3().crossVectors(tan, norm).normalize();
    const r = THREE.MathUtils.lerp(radBot, radTop, t);
    // bulge slightly at base
    const bulge = 1.0 + 0.18 * Math.exp(-t*8.0);
    const rr = r * bulge;
    for (let j = 0; j < radSeg; j++){
      const a = (j/radSeg) * Math.PI * 2.0;
      const x = Math.cos(a)*rr;
      const y = Math.sin(a)*rr;
      tmpV.copy(p).addScaledVector(norm, x).addScaledVector(bin, y);
      positions.push(tmpV.x, tmpV.y, tmpV.z);
      uvs.push(j/radSeg, t);
    }
  }
  for (let i = 0; i < tubeSeg; i++){
    for (let j = 0; j < radSeg; j++){
      const a = i*radSeg + j;
      const b = i*radSeg + ((j+1)%radSeg);
      const c = (i+1)*radSeg + j;
      const d = (i+1)*radSeg + ((j+1)%radSeg);
      indices.push(a,c,b, b,c,d);
    }
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geom.setIndex(indices);
  geom.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: /* glsl */`
      varying vec2 vUv; varying vec3 vN; varying vec3 vW;
      void main(){
        vUv = uv;
        vN = normalize(normalMatrix * normal);
        vec4 wp = modelMatrix * vec4(position,1.0);
        vW = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv; varying vec3 vN; varying vec3 vW;
      uniform float uTime;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      float vnoise(vec2 p){
        vec2 i=floor(p), f=fract(p);
        float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
        vec2 u=f*f*(3.-2.*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }
      float fbm(vec2 p){ float s=0., a=0.5; for(int i=0;i<4;i++){ s+=a*vnoise(p); p*=2.05; a*=0.5;} return s; }

      void main(){
        // bark rings — horizontal banding
        float band = sin(vUv.y*120.0)*0.5+0.5;
        float bandSoft = smoothstep(0.4, 0.9, band);
        // vertical streaks
        float streak = fbm(vec2(vUv.x*8.0, vUv.y*40.0));
        float streak2= fbm(vec2(vUv.x*2.0, vUv.y*8.0));

        vec3 lightBark = vec3(0.55, 0.42, 0.30);
        vec3 darkBark  = vec3(0.32, 0.22, 0.16);
        vec3 col = mix(darkBark, lightBark, streak2*0.7 + streak*0.3);
        col = mix(col, darkBark, bandSoft*0.45);

        // Sunset rim (orange-side glow)
        vec3 rimDir = normalize(vec3(0.7, 0.1, -0.5));
        float rim = pow(max(0.0, 1.0 - dot(vN, rimDir)), 1.4);
        col += vec3(1.0, 0.55, 0.3) * rim * 0.35;

        // Backlight from sun
        float bl = max(0.0, dot(vN, vec3(0.35,0.1,-0.95)));
        col += vec3(1.0,0.6,0.3) * bl * 0.18;

        // Slight darken in shadow side
        float fl = max(0.0, dot(vN, vec3(-0.4,0.4,0.6)));
        col *= 0.7 + 0.4*fl;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  });

  const mesh = new THREE.Mesh(geom, mat);
  mesh.userData.curve = curve;
  return mesh;
}

/* ---------- PALM CROWN (FRONDS) ----------
   For each palm, a crown of ~12 fronds radiating outward.
   Each frond is a long, tapered plane with leaflet shader.
*/
const frondMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  depthWrite: true,
  uniforms: {
    uTime:  { value: 0 },
    uSway:  { value: 0.0 },     // wind sway scalar
    uSunDir:{ value: new THREE.Vector3(0.35, 0.06, -1.0).normalize() },
  },
  vertexShader: /* glsl */`
    uniform float uTime;
    uniform float uSway;
    varying vec2 vUv;
    varying vec3 vN; varying vec3 vW;
    attribute float aFlex;     // 0 at base, 1 at tip
    attribute float aPhase;    // per-frond phase
    void main(){
      vUv = uv;
      vec3 p = position;
      // flex along frond length — bend in wind
      float swayX = sin(uTime*1.4 + aPhase)*0.18 + sin(uTime*2.7 + aPhase*1.7)*0.06;
      float swayY = cos(uTime*1.1 + aPhase*0.8)*0.10;
      p.x += swayX * pow(aFlex, 1.6) * (0.4 + uSway*1.4);
      p.y += swayY * pow(aFlex, 2.0) * (0.4 + uSway*1.4);
      // gravity droop at tip
      p.y -= pow(aFlex, 2.2) * 0.6;
      vec4 wp = modelMatrix * vec4(p, 1.0);
      vW = wp.xyz;
      vN = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv; varying vec3 vN; varying vec3 vW;
    uniform vec3 uSunDir;

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }

    void main(){
      // frond shape: a centered rachis with leaflets striking out at angles
      // u ∈ [0,1] across width, v ∈ [0,1] along length
      float x = vUv.x - 0.5;     // -0.5 .. 0.5
      float v = vUv.y;            // 0 base -> 1 tip

      // Taper: half-width along v
      float halfW = mix(0.50, 0.10, smoothstep(0.0, 1.0, v));
      // Leaflets: stripe across by sin
      float leafFreq = 26.0;
      float across = x / max(halfW, 0.001);   // -1 .. 1 normalized
      // Outside the half-width? discard
      if (abs(across) > 1.0) discard;

      // Rachis (central rib) — slightly thicker
      float rachis = smoothstep(0.07, 0.0, abs(across)*halfW*1.0);

      // Leaflet mask: sharp stripes that fan slightly toward tip
      float fan = mix(1.0, 1.4, v);
      float stripe = sin((across*halfW)*leafFreq*fan + v*1.4);
      float leafEdge = smoothstep(0.0, 0.12, stripe) * smoothstep(-0.12, 0.0, stripe);
      // Make stripes — split fronds into discrete leaflets along v also
      float bands = sin(v * 70.0) * 0.5 + 0.5;
      float bandsSoft = smoothstep(0.05, 0.3, bands);
      // Combine: leaflets are presence
      float presence = max(rachis*0.7, leafEdge * (0.5 + bandsSoft*0.5));
      // Edge alpha by distance to half-width
      float edgeAlpha = smoothstep(1.0, 0.85, abs(across));
      float a = presence * edgeAlpha * smoothstep(0.0, 0.05, v) * smoothstep(1.0, 0.95, v);
      if (a < 0.05) discard;

      // Color — green base, warmer toward tips, sunset translucency
      vec3 dark = vec3(0.10, 0.22, 0.12);
      vec3 mid  = vec3(0.22, 0.42, 0.20);
      vec3 light= vec3(0.55, 0.62, 0.30);
      vec3 col  = mix(dark, mid, smoothstep(0.0, 0.5, v));
      col = mix(col, light, smoothstep(0.5, 1.0, v) * 0.6);

      // Translucent sunset rim — sun behind frond
      vec3 sd = normalize(uSunDir);
      float backlit = max(0.0, dot(-vN, sd));
      col = mix(col, vec3(1.0, 0.7, 0.4), backlit*0.6 * (0.4 + 0.6*v));

      // Forward facing shading
      float dn = max(0.0, dot(vN, vec3(0.3, 0.6, 0.5)));
      col *= 0.55 + 0.55*dn;

      // Tiny noise variation
      col *= 0.92 + hash(floor(vec2(vUv.x*40.0, vUv.y*80.0)))*0.18;

      // Sunset cast
      col *= vec3(1.05, 0.95, 0.85);

      gl_FragColor = vec4(col, a);
    }
  `
});

function makeFrond(length, width){
  // plane geometry, with custom attributes aFlex (along v) and aPhase (per frond)
  const segL = 24, segW = 6;
  const g = new THREE.PlaneGeometry(width, length, segW, segL);
  // Move pivot to base — translate so y=0 at base
  g.translate(0, length/2, 0);
  const pos = g.attributes.position;
  const aFlex  = new Float32Array(pos.count);
  const aPhase = new Float32Array(pos.count);
  const phase = Math.random()*Math.PI*2;
  for (let i=0;i<pos.count;i++){
    const y = pos.getY(i);
    aFlex[i]  = THREE.MathUtils.clamp(y/length, 0, 1);
    aPhase[i] = phase;
  }
  g.setAttribute('aFlex',  new THREE.BufferAttribute(aFlex, 1));
  g.setAttribute('aPhase', new THREE.BufferAttribute(aPhase, 1));
  return new THREE.Mesh(g, frondMat);
}

function makeCrown(palmMesh, frondCount){
  const crown = new THREE.Group();
  // Anchor at curve end (top of trunk)
  const top = palmMesh.userData.curve.getPoint(1.0);
  const tan = palmMesh.userData.curve.getTangent(1.0).normalize();
  crown.position.copy(top);
  // Orient crown roughly to trunk top tangent
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), tan);
  crown.quaternion.copy(q);
  for (let i=0;i<frondCount;i++){
    const angle = (i/frondCount) * Math.PI*2 + (Math.random()*0.18);
    const lean  = THREE.MathUtils.lerp(0.55, 1.05, Math.random());   // outward lean
    const length = 2.6 + Math.random()*0.9;
    const width  = 0.7 + Math.random()*0.18;
    const f = makeFrond(length, width);
    // First, rotate it to point outward in plane
    f.rotation.y = angle;
    // Tilt fronds outward + downward
    f.rotation.x = -Math.PI*0.5 + lean*0.55; // rotate so length goes out from center
    f.position.set(0, 0.0, 0);
    // small random twist for organic
    f.rotation.z = (Math.random()-0.5)*0.4;
    crown.add(f);
  }
  return crown;
}

  uniforms: {
    uTime: { value: 0 },
    uSunDir: { value: new THREE.Vector3(0.35, 0.06, -1.0).normalize() },
  },
  vertexShader: /* glsl */`
    varying vec3 vN; varying vec3 vW;
    void main(){
      vN = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(position,1.0);
      vW = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec3 vN; varying vec3 vW;
    uniform vec3 uSunDir;
    float hash(vec3 p){ return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453); }
    void main(){
      vec3 base = vec3(0.18, 0.10, 0.06);
      vec3 hi   = vec3(0.55, 0.32, 0.18);
      // micro fiber noise
      float n = hash(floor(vW*60.0));
      vec3 col = mix(base, hi, n*0.6 + 0.2);
      // sunset rim
      float rim = pow(max(0.0, 1.0 - dot(vN, normalize(uSunDir))), 1.6);
      col += vec3(1.0,0.55,0.3) * rim * 0.55;
      // basic shading
      float dn = max(0.0, dot(vN, vec3(0.3, 0.7, 0.4)));
      col *= 0.45 + 0.65*dn;
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

/* ---------- HAMMOCK FABRIC ----------
   The hammock is visible at the bottom edges of the frame
   (we're inside it). We model two ropes converging up, plus
   a curved fabric "U" arc visible at the bottom.
*/
const hammockMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uSunDir: { value: new THREE.Vector3(0.35, 0.06, -1.0).normalize() },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv; varying vec3 vN; varying vec3 vW;
    void main(){
      vUv = uv;
      vN = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(position,1.0);
      vW = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv; varying vec3 vN; varying vec3 vW;
    uniform float uTime;
    uniform vec3 uSunDir;

    void main(){
      // Woven texture: two perpendicular sinusoidal threads
      float u = vUv.x * 80.0;
      float v = vUv.y * 18.0;
      float warp = abs(sin(u));
      float weft = abs(sin(v));
      float weave = smoothstep(0.5, 0.95, warp) + smoothstep(0.5, 0.95, weft);
      weave = clamp(weave, 0.0, 1.0);

      // gap holes — every few intersections
      float holes = step(0.92, sin(u*0.5)*0.5+0.5) * step(0.92, sin(v*1.0)*0.5+0.5);

      // Stripes for color (classic hammock)
      float stripeBand = floor(vUv.y * 5.0);
      vec3 stripeA = vec3(0.95, 0.78, 0.55);    // sand cream
      vec3 stripeB = vec3(0.90, 0.40, 0.30);    // coral red
      vec3 stripeC = vec3(0.30, 0.50, 0.55);    // teal
      vec3 stripeColor;
      float m = mod(stripeBand, 3.0);
      if (m < 1.0) stripeColor = stripeA;
      else if (m < 2.0) stripeColor = stripeB;
      else stripeColor = stripeC;

      // Weave shading
      vec3 col = stripeColor * (0.65 + 0.5*weave);

      // Sunset rim
      vec3 sd = normalize(uSunDir);
      float rim = pow(max(0.0, 1.0 - dot(vN, sd)), 2.0);
      col += vec3(1.0,0.55,0.30) * rim * 0.4;

      // Forward shading
      float dn = max(0.0, dot(vN, vec3(0.0, 0.8, 0.6)));
      col *= 0.55 + 0.6*dn;

      // Back-lit warmth (translucency suggestion)
      float bl = max(0.0, dot(-vN, sd));
      col += vec3(1.0,0.7,0.45) * bl * 0.25;

      // Alpha — holes punch out
      float a = 1.0 - holes*0.85;
      // Slight edge falloff at top of fabric (vUv.y near 1)
      a *= smoothstep(1.0, 0.85, vUv.y) * smoothstep(0.0, 0.04, vUv.y);

      gl_FragColor = vec4(col, a);
    }
  `
});

function makeHammockFabric(){
  // Build a curved arc along X: y = a*(1 - cos((x/W)*pi)) ... a U shape opening upward.
  const W = 2.2;          // hammock half-width
  const D = 1.6;          // depth (front-to-back of the visible fabric)
  const SAG = 0.55;       // sag amount
  const segX = 60, segZ = 18;
  const positions = [];
  const uvs = [];
  const indices = [];
  for (let i = 0; i <= segX; i++){
    const tx = i/segX;
    const x = THREE.MathUtils.lerp(-W, W, tx);
    // sag profile across X (cosine)
    const sag = -SAG * (1.0 - Math.cos(tx * Math.PI));   // 0 at ends, -2*SAG at middle (more sag mid)
    for (let j = 0; j <= segZ; j++){
      const tz = j/segZ;
      const z = THREE.MathUtils.lerp(-D*0.5, D*0.5, tz);
      // Front edge sags more than back? Add a slight curl at edges
      const edgeCurl = Math.cos(tz * Math.PI) * 0.06;
      const y = sag + edgeCurl - 0.04 * Math.sin(tx*Math.PI);
      positions.push(x, y, z);
      uvs.push(tx, tz);
    }
  }
  for (let i = 0; i < segX; i++){
    for (let j = 0; j < segZ; j++){
      const a = i*(segZ+1) + j;
      const b = a + 1;
      const c = a + (segZ+1);
      const d = c + 1;
      indices.push(a,c,b, b,c,d);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  g.setIndex(indices);
  g.computeVertexNormals();
  return new THREE.Mesh(g, hammockMat);
}

}

const birdMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0x1a0e10) },
    uRim:   { value: new THREE.Color(0xffb070) },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;
    uniform vec3 uColor, uRim;
    void main(){
      // Stylized bird: a "M" silhouette using a flap-controlled curve
      vec2 p = vUv - vec2(0.5, 0.5);
      // animate flap
      float flap = sin(uTime*6.0)*0.5 + 0.5;
      float wing = abs(p.x);                      // 0 center .. 0.5 tip
      // wing curve: at center, body at y=0; at tips, y curves up by flap
      float curve = -0.18 + flap*0.28;            // wing tip raised when flapped
      float yLine = curve * pow(wing*2.0, 1.4);
      float dy = abs(p.y - yLine);
      // wing thickness
      float thick = mix(0.12, 0.025, wing*2.0);
      float a = smoothstep(thick, thick*0.4, dy);
      // body blob
      float body = smoothstep(0.05, 0.0, length(p*vec2(2.5, 4.0)));
      a = max(a, body*0.9);
      // discard outside bounds
      if (a < 0.05) discard;
      vec3 col = mix(uColor, uRim, smoothstep(0.0, 0.4, wing*2.0));
      gl_FragColor = vec4(col, a);
    }
  `
});

class Seabird {
  constructor(){
    const g = new THREE.PlaneGeometry(2.4, 1.0);
    this.mesh = new THREE.Mesh(g, birdMat);
    this.mesh.frustumCulled = false;
    this.reset(true);
    scene.add(this.mesh);
  }
  reset(initial=false){
    const fromLeft = Math.random() < 0.5;
    this.dir = fromLeft ? 1 : -1;
    const sx = fromLeft ? -60 : 60;
    const ex = fromLeft ?  60 : -60;
    this.x = initial ? THREE.MathUtils.lerp(sx, ex, Math.random()) : sx;
    this.endX = ex;
    this.y = THREE.MathUtils.randFloat(2.0, 6.5);
    this.z = THREE.MathUtils.randFloat(-55, -18);
    this.speed = THREE.MathUtils.randFloat(1.2, 2.4);
    this.bobPhase = Math.random()*Math.PI*2;
    this.bobAmp   = THREE.MathUtils.randFloat(0.05, 0.18);
    this.bobFreq  = THREE.MathUtils.randFloat(0.5, 1.2);
    this.callTimer = THREE.MathUtils.randFloat(2, 12);
  }
  update(dt){
    this.x += this.speed * this.dir * dt;
    this.bobPhase += this.bobFreq * dt;
    const yy = this.y + Math.sin(this.bobPhase)*this.bobAmp;
    this.mesh.position.set(this.x, yy, this.z);
    // Always face camera
    this.mesh.quaternion.copy(camera.quaternion);
    // Flip horizontally if going left
    this.mesh.scale.x = (this.dir > 0 ? 1 : -1) * 1.0;
    if ((this.dir > 0 && this.x > this.endX) || (this.dir < 0 && this.x < this.endX)) this.reset();
    this.callTimer -= dt;
    if (this.callTimer <= 0){
      if (Audio.ready && Math.random()<0.4) Audio.birdCall();
      this.callTimer = THREE.MathUtils.randFloat(6, 18);
    }
  }
}

/* ============================================================
   AUDIO ENGINE
   Steel drum pad calypso through a low-pass (it's a bar far
   away through palms). Wave wash. Wind. Coconut rustle. Birds.
   ============================================================ */

const Audio = {
  ready: false,
  ctx: null,
  master: null,
  oceanGain: null,
  windGain: null,
  musicGain: null,
  scheduler: null,

  init(){
    if (this.ready) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    const ctx = this.ctx;

    this.master = ctx.createGain();
    this.master.gain.value = 0.0;
    this.master.connect(ctx.destination);
    // gentle fade in
    this.master.gain.setValueAtTime(0, ctx.currentTime);
    this.master.gain.linearRampToValueAtTime(0.85, ctx.currentTime + 2.4);

    // ---- Ocean wave wash ----
    {
      const noiseBuf = this._makePinkNoise(6.0);
      const src = ctx.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 0.4;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 60;
      const g = ctx.createGain(); g.gain.value = 0.42;
      // breathing LFO (~10s breath cycle)
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.10;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.18;
      lfo.connect(lfoG).connect(g.gain);
      lfo.start();
      // secondary higher-frequency lap — periodic surge
      const lfo2 = ctx.createOscillator(); lfo2.frequency.value = 0.27;
      const lfo2G = ctx.createGain(); lfo2G.gain.value = 220;
      lfo2.connect(lfo2G).connect(lp.frequency);
      lfo2.start();

      src.connect(hp).connect(lp).connect(g).connect(this.master);
      src.start();
      this.oceanGain = g;
    }

    // ---- Wind in palms (low rumble, very faint) ----
    {
      const buf = this._makePinkNoise(8.0);
      const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=320; lp.Q.value=0.6;
      const g = ctx.createGain(); g.gain.value = 0.10;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.05;
      lfo.connect(lfoG).connect(g.gain);
      lfo.start();
      src.connect(lp).connect(g).connect(this.master);
      src.start();
      this.windGain = g;
    }

    // ---- Distant calypso steel drum music ----
    {
      // Music bus: a low-pass + slight reverb-ish delay to suggest distance
      const bus = ctx.createGain(); bus.gain.value = 0.28;
      const lp  = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1700; lp.Q.value = 0.6;
      const hp  = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 240;
      // simple feedback delay for slap-back
      const dly = ctx.createDelay(0.6);
      dly.delayTime.value = 0.27;
      const fb  = ctx.createGain(); fb.gain.value = 0.32;
      const wet = ctx.createGain(); wet.gain.value = 0.45;
      dly.connect(fb).connect(dly);
      dly.connect(wet);

      bus.connect(hp).connect(lp);
      lp.connect(this.master);
      lp.connect(dly); wet.connect(this.master);

      this.musicGain = bus;
      this.musicNode = lp;
    }

    this.ready = true;
    this._startMusic();
  },

  _makePinkNoise(seconds){
    const ctx = this.ctx;
    const sr = ctx.sampleRate;
    const len = sr * seconds;
    const buf = ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0;i<len;i++){
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179;
      b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520;
      b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522;
      b5=-0.7616*b5-w*0.0168980;
      data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6=w*0.115926;
    }
    return buf;
  },

  // Steel drum FM voice
  _steelDrumNote(freq, when, dur, vel=0.5){
    const ctx = this.ctx;
    const carrier = ctx.createOscillator();
    const mod1 = ctx.createOscillator();
    const mod2 = ctx.createOscillator();
    const mod1G = ctx.createGain();
    const mod2G = ctx.createGain();
    const env = ctx.createGain();

    carrier.frequency.value = freq;
    mod1.frequency.value = freq * 3.01;     // slightly inharmonic — that "ping"
    mod2.frequency.value = freq * 5.13;
    mod1G.gain.value = freq * 1.4 * vel;
    mod2G.gain.value = freq * 0.7 * vel;

    mod1.connect(mod1G).connect(carrier.frequency);
    mod2.connect(mod2G).connect(carrier.frequency);

    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(vel*0.6, when+0.005);
    env.gain.exponentialRampToValueAtTime(0.0001, when+dur);

    carrier.type = 'sine';
    carrier.connect(env).connect(this.musicGain);

    carrier.start(when); mod1.start(when); mod2.start(when);
    const stopAt = when + dur + 0.05;
    carrier.stop(stopAt); mod1.stop(stopAt); mod2.stop(stopAt);
  },

  _startMusic(){
    const ctx = this.ctx;
    // C major - A minor - F - G ; simple two-bar groove
    // Notes (Hz) for upper steel-drum register
    const N = (n)=> 440 * Math.pow(2,(n-69)/12);
    // Chord pool by chord index
    const chords = [
      [60,64,67,72],   // Cmaj
      [57,60,64,69],   // Am
      [53,57,60,65],   // F
      [55,59,62,67],   // G
    ];
    // a melodic motif over each chord (top of chord)
    const motifs = [
      [72,67,64,67,72,76,72,67],
      [69,64,60,64,69,72,69,64],
      [65,60,57,60,65,69,65,60],
      [67,62,59,62,67,71,67,62],
    ];
    let bar = 0;
    const tempo = 96;
    const beatLen = 60/tempo;        // seconds
    const stepLen = beatLen/2;       // 8th note

    let nextStep = ctx.currentTime + 0.5;
    let stepIndex = 0;

    const schedule = () => {
      while (nextStep < ctx.currentTime + 0.6) {
        const chord = chords[bar % chords.length];
        const motif = motifs[bar % motifs.length];
        // Beat 1 + 5: low chord stab
        if (stepIndex === 0 || stepIndex === 8) {
          // arpeggiate root + fifth softly
          this._steelDrumNote(N(chord[0]-12), nextStep, 0.9, 0.18);
          this._steelDrumNote(N(chord[2]-12), nextStep+0.04, 0.85, 0.14);
        }
        // melodic line on each step
        if (Math.random() < 0.78) {
          const m = motif[stepIndex % motif.length];
          // small humanization
          const t = nextStep + (Math.random()*0.012);
          this._steelDrumNote(N(m), t, 0.45 + Math.random()*0.25, 0.10 + Math.random()*0.10);
        }
        // off-beat chord shimmers
        if (stepIndex % 4 === 2) {
          const note = chord[1 + (stepIndex%2)];
          this._steelDrumNote(N(note), nextStep+0.005, 0.30, 0.08);
        }

        stepIndex++;
        nextStep += stepLen;
        if (stepIndex >= 16) {
          stepIndex = 0;
          bar++;
        }
      }
    };
    this.scheduler = setInterval(schedule, 80);
  },

  birdCall(){
    if (!this.ready) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    // FM-ish seagull squawk
    const o = ctx.createOscillator();
    const m = ctx.createOscillator();
    const mg = ctx.createGain();
    const env = ctx.createGain();
    const filt = ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1400; filt.Q.value=4;
    o.type='sawtooth';
    m.frequency.value = 50;
    mg.gain.value = 200;
    m.connect(mg).connect(o.frequency);
    // glide
    o.frequency.setValueAtTime(900, now);
    o.frequency.exponentialRampToValueAtTime(1700, now+0.08);
    o.frequency.exponentialRampToValueAtTime(700, now+0.18);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.18, now+0.02);
    env.gain.exponentialRampToValueAtTime(0.001, now+0.30);
    o.connect(filt).connect(env).connect(this.master);
    o.start(now); m.start(now);
    o.stop(now+0.32); m.stop(now+0.32);
  },

  kickPalmRustle(){
    if (!this.ready) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const buf = this._makePinkNoise(0.6);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value = 4000; filt.Q.value=1.5;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.30, now+0.04);
    env.gain.exponentialRampToValueAtTime(0.001, now+0.55);
    src.connect(filt).connect(env).connect(this.master);
    src.start(now); src.stop(now+0.6);
  },

};

/* ---------- AUDIO GATE ---------- */
gate.addEventListener('click', () => {
  Audio.init();
  gate.classList.add('fading');
  setTimeout(()=> gate.style.display='none', 1300);
});
gate.addEventListener('touchstart', (e)=>{ e.preventDefault(); gate.click(); }, { passive:false });

   RESIZE
   ============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
const clock = new THREE.Clock();
let lastRustle = 0;

function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  // Update shader uniforms
  skyMat.uniforms.uTime.value      = t;
  oceanMat.uniforms.uTime.value    = t;
  sandMat.uniforms.uTime.value     = t;
  frondMat.uniforms.uTime.value    = t;
  hammockMat.uniforms.uTime.value  = t;
  coconutMat.uniforms.uTime.value  = t;
  birdMat.uniforms.uTime.value     = t;
  islands.children.forEach(c => { if (c.material.uniforms) c.material.uniforms.uTime.value = t; });
  palmL.material.uniforms.uTime.value = t;
  palmR.material.uniforms.uTime.value = t;

  // Hammock sway: pendulum
  HAMMOCK.swayAmp += (HAMMOCK.targetAmp - HAMMOCK.swayAmp) * Math.min(1, dt*1.2);
  HAMMOCK.swayPhase += dt * 0.85;     // ~1.3s period
  const sway = Math.sin(HAMMOCK.swayPhase) * HAMMOCK.swayAmp;
  const sway2 = Math.sin(HAMMOCK.swayPhase*0.5 + 0.7) * HAMMOCK.swayAmp * 0.4;

  // Smooth look toward target
  Look.yaw   += (Look.yawTarget   - Look.yaw)   * Math.min(1, dt*4);
  Look.pitch += (Look.pitchTarget - Look.pitch) * Math.min(1, dt*4);

  // Camera position oscillates with sway
  camera.position.x = sway;                          // lateral
  camera.position.y = HAMMOCK.cameraY + sway2*0.3;   // tiny vertical bob
  camera.position.z = sway*0.15;                     // slight in/out

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y =  Look.yaw;
  camera.rotation.x =  Look.pitch + Math.sin(HAMMOCK.swayPhase)*HAMMOCK.pitchAmp;
  camera.rotation.z = -Math.sin(HAMMOCK.swayPhase)*HAMMOCK.rollAmp - sway*0.18;

  // Hammock & ropes follow the sway slightly (the hammock tips like the camera)
  hammockGroup.rotation.z = -Math.sin(HAMMOCK.swayPhase)*HAMMOCK.rollAmp*0.6;
  hammockGroup.position.x =  sway * 0.35;

  // Frond sway intensity tracks hammock
  frondMat.uniforms.uSway.value = 0.3 + HAMMOCK.swayAmp*4.0;

  // Crown subtle sway
  const crownSway = Math.sin(t*0.7)*0.04 + Math.sin(t*1.3+1.5)*0.018;
  crownL.rotation.z = crownSway*0.6;
  crownR.rotation.z = crownSway*0.5 + 0.1;
  crownL.rotation.x = Math.sin(t*0.5)*0.025;
  crownR.rotation.x = Math.sin(t*0.6+1.0)*0.022;

  // Coconuts dangle (driven by gentle pendulum)
  const coc = Math.sin(t*1.6)*0.04 + Math.sin(t*2.7+0.9)*0.02;
  mainCoconut.position.x = 0.18 + coc;
  mainCoconut.position.z = 0.05 + coc*0.4;
  coconut1.position.x = 0.30 + Math.sin(t*1.2+0.5)*0.02;
  coconut2.position.x = -0.25 + Math.sin(t*1.4+1.2)*0.02;
  coconut3.position.x = -0.30 + Math.sin(t*1.5+2.0)*0.025;

  // Occasional rustle when sway is large
  if (HAMMOCK.swayAmp > 0.18 && t - lastRustle > 1.6) {
    if (Audio.ready && Math.random()<0.6) Audio.kickPalmRustle();
    lastRustle = t;
  }

  // Birds
  for (let b of birds) b.update(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
