<script>
'use strict';

const canvas = document.getElementById('c');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080604);
scene.fog = new THREE.FogExp2(0x080604, 0.08);

// Camera lying on cot looking up
const camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 20);
camera.position.set(0, 0.5, 0);
camera.lookAt(0, 4, 0);

// ── Tin roof shader (CORRUGATED + RUSTY) ────────────────────────
const tinShader = {
  uniforms:{ time:{value:0}, lightning:{value:0} },
  vertexShader:`varying vec2 vUv; varying vec3 vP;
    void main(){ vUv=uv; vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform float lightning; varying vec2 vUv; varying vec3 vP;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float s=0.,a=0.5; for(int i=0;i<4;i++){s+=a*n(p);p*=2.07;a*=0.5;} return s; }
    void main(){
      // Corrugation pattern (vertical ribs)
      float ribX = sin(vUv.x * 60.0) * 0.5 + 0.5;
      // Rust patches (fbm masked)
      float rust = fbm(vUv * 4.0);
      vec3 cleanTin = vec3(0.30, 0.32, 0.35);
      vec3 rustCol = vec3(0.45, 0.20, 0.10);
      vec3 col = mix(cleanTin, rustCol, smoothstep(0.5, 0.7, rust));
      // Darker stripes between ribs
      col *= (0.5 + ribX * 0.5);
      // Random bigger rust holes (very dark)
      vec2 holePos = floor(vUv * 12.0);
      if (h(holePos) > 0.96) col *= 0.4;
      // Lightning illumination
      col += vec3(0.4, 0.45, 0.6) * lightning * 0.8;
      // Single bare bulb light from below (soft warm halo at center)
      vec2 bulbCenter = vec2(0.5, 0.45);
      float bulbDist = distance(vUv, bulbCenter);
      col += vec3(1.0, 0.7, 0.3) * exp(-bulbDist * 6.0) * 0.4;
      gl_FragColor = vec4(col, 1.0);
    }`
};
const roof = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), new THREE.ShaderMaterial(tinShader));
roof.rotation.x = Math.PI/2;

// ── Audio ──
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);

  // Heavy rain bed (filtered noise, with multiple band sources for realistic texture)
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  // Layer 1: bright high rain hiss
  const r1 = audioCtx.createBufferSource();
  r1.buffer = buf; r1.loop = true;
  const r1hp = audioCtx.createBiquadFilter();
  r1hp.type = 'highpass'; r1hp.frequency.value = 1500;
  const r1g = audioCtx.createGain(); r1g.gain.value = 0.30;
  r1.connect(r1hp).connect(r1g).connect(masterGain);
  r1.start();
  // Layer 2: mid-band rain on tin (the thump-thump)
  const r2 = audioCtx.createBufferSource();
  r2.buffer = buf; r2.loop = true;
  const r2bp = audioCtx.createBiquadFilter();
  r2bp.type = 'bandpass'; r2bp.frequency.value = 600; r2bp.Q.value = 0.6;
  const r2g = audioCtx.createGain(); r2g.gain.value = 0.30;
  r2.connect(r2bp).connect(r2g).connect(masterGain);
  r2.start();
  // Layer 3: deep rumble (heavy sheets of rain in distance)
  const r3 = audioCtx.createBufferSource();
  r3.buffer = buf; r3.loop = true;
  const r3lp = audioCtx.createBiquadFilter();
  r3lp.type = 'lowpass'; r3lp.frequency.value = 200; r3lp.Q.value = 0.6;
  const r3lfo = audioCtx.createOscillator();
  r3lfo.frequency.value = 0.07;
  const r3lfoG = audioCtx.createGain(); r3lfoG.gain.value = 80;
  r3lfo.connect(r3lfoG); r3lfoG.connect(r3lp.frequency);
  const r3g = audioCtx.createGain(); r3g.gain.value = 0.18;
  r3.connect(r3lp).connect(r3g).connect(masterGain);
  r3.start(); r3lfo.start();

  // Big drops on tin: scheduled "PLINK" / "PLOK" sounds at irregular intervals
  function scheduleDrop() {
    const next = 0.3 + Math.random() * 1.5;
    setTimeout(() => { if (audioCtx) { tinDrop(); scheduleDrop(); } }, next * 1000);
  }
  scheduleDrop();
  function tinDrop() {
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    const f0 = 800 + Math.random() * 1600;
    o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(f0 * 0.4, t0 + 0.04);
    const g = audioCtx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.05 + Math.random() * 0.04, t0 + 0.001);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
    const p = audioCtx.createStereoPanner();
    p.pan.value = (Math.random() - 0.5) * 1.6;
    o.connect(g).connect(p).connect(masterGain);
    o.start(t0); o.stop(t0 + 0.08);
  }

  // Distant thunder rolls
  function scheduleThunder() {
    const next = 25 + Math.random() * 35;
    setTimeout(() => { if (audioCtx) { thunder(); scheduleThunder(); } }, next * 1000);
  }
  scheduleThunder();
  function thunder() {
    const t0 = audioCtx.currentTime;
    const distance = 1 + Math.random() * 8;
    const dur = 1.5 + Math.random() * 2;
    // Visual flash first (relative volume)
    const intensity = Math.exp(-distance / 4);
    flashLight.intensity = 8 * intensity;
    const flashEl = document.getElementById('flash');
    flashEl.style.opacity = (0.18 * intensity).toString();
    setTimeout(() => { flashLight.intensity = 0; flashEl.style.opacity = '0'; }, 80 + Math.random()*120);
    tinShader.uniforms.lightning.value = intensity;
    setTimeout(() => { tinShader.uniforms.lightning.value = 0; }, 180);

    // Thunder audio after delay
    setTimeout(() => {
      if (!audioCtx) return;
      const tt = audioCtx.currentTime;
      const tBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const td = tBuf.getChannelData(0);
      for (let i = 0; i < td.length; i++) {
        const env = Math.exp(-i/td.length * 2.5) * (1 - Math.exp(-i/td.length * 30));
        td[i] = (Math.random()*2-1) * env;
      }
      const ts = audioCtx.createBufferSource(); ts.buffer = tBuf;
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 220 + (4-distance)*60;
      const tg = audioCtx.createGain(); tg.gain.value = intensity * 0.6;
      const tp = audioCtx.createStereoPanner(); tp.pan.value = (Math.random()-0.5);
      ts.connect(lp).connect(tg).connect(tp).connect(masterGain);
      ts.start(tt);
    }, distance * 3000);
  }
}

// ── Animation ──
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  tinShader.uniforms.time.value = time;

  // Bulb sway from "wind" (subtle)
  bulb.position.x = Math.sin(time * 0.4) * 0.04;
  bulbLight.position.x = bulb.position.x;
  cord.position.x = bulb.position.x * 0.5;
  // Bulb flicker (rare)
  if (Math.random() < 0.001) bulbLight.intensity = 0.4 + Math.random() * 1.0;
  else bulbLight.intensity = 1.2 + Math.sin(time * 5) * 0.05;

  // Camera breath (you're "breathing" while lying down)
  camera.position.y = 0.5 + Math.sin(time * 0.5) * 0.012;
  camera.position.x = Math.sin(time * 0.18) * 0.03;
  camera.lookAt(0, 4, 0);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 1s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 1100);
  startAudio();
});
</script>
