      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;

      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :

      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.

        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');

        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);

        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';

        if (now - t0 >= 500){

          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);

              window.LEVIGOLD.lastTune = now;

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));

        return _set.call(this, key, val);

      // ── Audio gesture auto-overlay ─────────────────────────────────────

            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';

<script>

// ── Sky shader (deep nighttime city blueish-purple gradient) ─────────
const skyShader = {
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      // sky gradient: light-pollution amber at horizon → indigo zenith
      vec3 col = mix(vec3(0.18,0.10,0.04), vec3(0.04,0.04,0.10), 1.0-vUv.y);
      // sparse distant stars (washed by light pollution)
      vec2 p = vUv * vec2(80.0, 40.0);
      float r = h(floor(p));
      if (r > 0.992) col += vec3(0.6,0.6,0.7) * 0.6;
      // distant clouds (slow scroll, low density)
      vec2 cp = vUv * 4.0 + vec2(time * 0.005, 0.0);
      float cloud = 0.0;
      vec2 ip = floor(cp); vec2 fp = fract(cp);
      cloud = h(ip) * (1.0 - fp.x) + h(ip + vec2(1,0)) * fp.x;
      cloud *= smoothstep(0.0, 0.4, vUv.y);
      col = mix(col, col*0.7 + vec3(0.05,0.04,0.06), cloud * 0.4);
      gl_FragColor = vec4(col, 1.0);
    }`,
  side: THREE.BackSide
};
const sky = new THREE.Mesh(new THREE.SphereGeometry(400, 32, 16), new THREE.ShaderMaterial(skyShader));
scene.add(sky);

// ── Distant city: hundreds of procedural building rectangles ─────────
function makeCity() {
  const cityGroup = new THREE.Group();
  // Parallax layers, each at different distances + heights
  const buildingGeos = [];
  for (let layer = 0; layer < 3; layer++) {
    const dist = 60 + layer * 80;
    const heightRange = [8, 30 + layer * 15];
    const count = 60 + layer * 30;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 0.9 + (Math.PI - Math.PI*0.45);  // mostly forward arc
      const x = Math.sin(angle) * (dist + (Math.random()-0.5) * 30);
      const z = -Math.cos(angle) * (dist + (Math.random()-0.5) * 30) - 30;
      const w = 4 + Math.random() * 8;
      const h = heightRange[0] + Math.random() * (heightRange[1] - heightRange[0]);
      const d = 4 + Math.random() * 6;

      // Building shader with random window pattern + flicker
      const buildingMat = new THREE.ShaderMaterial({
        uniforms:{ time:{value:0}, seed:{value:Math.random()*100} },
        vertexShader:`varying vec2 vUv; varying vec3 vP; varying vec3 vN;
          void main(){ vUv=uv; vP=position; vN=normal;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader:`uniform float time; uniform float seed; varying vec2 vUv; varying vec3 vP; varying vec3 vN;
          float h(vec2 p){ return fract(sin(dot(p+seed,vec2(12.9898,78.233)))*43758.5453); }
          void main(){
            // building face is a grid of windows
            float windowsX = 4.0;
            float windowsY = max(2.0, abs(vP.y) * 0.6);  // more windows on taller building
            vec2 grid = vec2(vUv.x * windowsX, vUv.y * windowsY);
            vec2 cell = floor(grid);
            vec2 inCell = fract(grid);
            float lit = h(cell);
            // some windows lit, most dark; flicker very rarely
            float onOff = step(0.4, lit);
            float flicker = step(0.998, h(cell + vec2(time*0.5, 0.0)));
            onOff = max(onOff * 0.4, flicker);
            // window shape (small rectangle in cell)
            float winShape = step(0.15, inCell.x) * step(inCell.x, 0.85) * step(0.2, inCell.y) * step(inCell.y, 0.85);
            vec3 col = vec3(0.06, 0.07, 0.10);
            // warm yellow-orange light
            vec3 windowCol = mix(vec3(1.0, 0.7, 0.3), vec3(1.0, 0.9, 0.6), h(cell + vec2(7.0)));
            col += windowCol * winShape * onOff * 1.4;
            // edges darker
            float edge = (1.0 - winShape) * 0.05;
            col += vec3(edge);
            gl_FragColor = vec4(col, 1.0);
          }`,
        fog: true
      });
      const bldg = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), buildingMat);
      bldg.position.set(x, h/2, z);
      cityGroup.add(bldg);
      buildingGeos.push(buildingMat);
    }
  }
  return { group: cityGroup, mats: buildingGeos };
}

  c.position.set(p[0]+2, p[1], p[2]); scene.add(c);
});

// String of bistro lights (decorative, warm)
const stringGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
  const x = -8 + i * 1.4;
  const y = 16.5 - Math.sin((i / 11) * Math.PI) * 0.4;  // slight droop
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 6, 6),
    new THREE.MeshBasicMaterial({color:0xffaa55})
  );
  bulb.position.set(x, y, 1.2);
  stringGroup.add(bulb);
  const light = new THREE.PointLight(0xffaa55, 0.4, 4, 1.5);
  light.position.set(x, y, 1.2);
  stringGroup.add(light);
}
scene.add(stringGroup);

// ── Birds — silhouette flock occasionally ────────────────────────────
const birds = [];
function makeBird() {
  const g = new THREE.PlaneGeometry(0.3, 0.1);
  const m = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.7});
  const b = new THREE.Mesh(g, m);
  b.position.set(-100, 30 + Math.random()*15, -50 - Math.random()*30);
  b.userData = {
    speed: 8 + Math.random()*5,
    phase: Math.random()*Math.PI*2,
    flap: Math.random()*Math.PI*2
  };
  scene.add(b);
  birds.push(b);
}
function spawnFlock() { for (let i=0; i<5; i++) setTimeout(makeBird, i*200); }

// ── Lighting ───────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x303040, 0.45);
scene.add(ambient);
const moon = new THREE.DirectionalLight(0xa0c0e0, 0.3);
moon.position.set(-30, 50, 20);
scene.add(moon);

// ── Audio ───────────────────────────────────────────────────────────
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);

  // Continuous distant city hum (dense layered low-passed noise)
  const noiseBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = noiseBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.5;
  }
  const cityNoise = audioCtx.createBufferSource();
  cityNoise.buffer = noiseBuf; cityNoise.loop = true;
  const cityLP = audioCtx.createBiquadFilter();
  cityLP.type = 'lowpass'; cityLP.frequency.value = 320; cityLP.Q.value = 0.6;
  const cityG = audioCtx.createGain(); cityG.gain.value = 0.20;
  cityNoise.connect(cityLP).connect(cityG).connect(masterGain);
  cityNoise.start();

  // Wind on the rooftop
  const wind = audioCtx.createBufferSource();
  wind.buffer = noiseBuf; wind.loop = true;
  const windLP = audioCtx.createBiquadFilter();
  windLP.type = 'lowpass'; windLP.frequency.value = 180; windLP.Q.value = 0.5;
  const windLFO = audioCtx.createOscillator();
  windLFO.frequency.value = 0.07;
  const windLFOG = audioCtx.createGain(); windLFOG.gain.value = 80;
  windLFO.connect(windLFOG); windLFOG.connect(windLP.frequency);
  const windG = audioCtx.createGain(); windG.gain.value = 0.12;
  wind.connect(windLP).connect(windG).connect(masterGain);
  wind.start(); windLFO.start();

  // Distant horns: scheduled
  function scheduleHorn() {
    const next = 8 + Math.random() * 25;
    setTimeout(() => { if (audioCtx) { honk(); scheduleHorn(); } }, next * 1000);
  }
  scheduleHorn();
  function honk() {
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200 + Math.random()*150, t0);
    o.frequency.linearRampToValueAtTime(180 + Math.random()*100, t0 + 0.15);
    const g = audioCtx.createGain(); g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.04 + Math.random()*0.06, t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6 + Math.random()*0.4);
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 800;
    const p = audioCtx.createStereoPanner(); p.pan.value = (Math.random()-0.5) * 1.6;
    o.connect(lp).connect(g).connect(p).connect(masterGain);
    o.start(t0); o.stop(t0 + 1.2);
  }

  // Bird flock occasionally
  function scheduleBirds() {
    const next = 30 + Math.random() * 60;
    setTimeout(() => { spawnFlock(); birdSounds(); scheduleBirds(); }, next * 1000);
  }
  scheduleBirds();
  function birdSounds() {
    for (let i = 0; i < 4; i++) setTimeout(() => {
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(2400 + Math.random()*1600, t0);
      o.frequency.exponentialRampToValueAtTime(1800, t0+0.08);
      const g = audioCtx.createGain(); g.gain.value = 0;
      g.gain.linearRampToValueAtTime(0.012, t0+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
      const p = audioCtx.createStereoPanner(); p.pan.value = (Math.random()-0.5) * 1.4;
      o.connect(g).connect(p).connect(masterGain);
      o.start(t0); o.stop(t0 + 0.2);
    }, i * 240 + Math.random()*100);
  }

  // Distant saxophone — procedural improvisation, very faint
  // Plays simple jazz phrases periodically
  scheduleSax();
  function scheduleSax() {
    const next = 45 + Math.random() * 60;
    setTimeout(() => { if (audioCtx) { saxPhrase(); scheduleSax(); } }, next * 1000);
  }

  // Subway rumble far below — very subtle, every 2-4 minutes
  scheduleSubway();
  function scheduleSubway() {
    const next = 120 + Math.random() * 180;
    setTimeout(() => { if (audioCtx) { subwayRumble(); scheduleSubway(); } }, next * 1000);
  }
  function subwayRumble() {
    const t0 = audioCtx.currentTime;
    const dur = 8;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const x = i/d.length;
      const env = Math.sin(x * Math.PI);
      d[i] = (Math.random()*2-1) * env;
    }
    const s = audioCtx.createBufferSource(); s.buffer = buf;
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 60; lp.Q.value = 0.6;
    const g = audioCtx.createGain(); g.gain.value = 0.18;
    s.connect(lp).connect(g).connect(masterGain);
    s.start(t0);
  }
}

// Saxophone phrase — D minor blues feel, slow, sparse
function saxPhrase() {
  if (!audioCtx) return;
  const scale = [62, 65, 67, 68, 69, 72, 74]; // D minor blues w/ b5
  let t = audioCtx.currentTime + 0.2;
  const phraseLen = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < phraseLen; i++) {
    const midi = scale[Math.floor(Math.random() * scale.length)] + (Math.random() < 0.2 ? 12 : 0);
    const dur = [0.4, 0.7, 1.0, 1.5][Math.floor(Math.random()*4)];
    saxNote(midi, t, dur);
    t += dur + (Math.random() < 0.3 ? Math.random()*0.5 : 0);
  }
}
function saxNote(midi, t0, dur) {
  if (!audioCtx) return;
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  // Sax-like FM synthesis
  const carrier = audioCtx.createOscillator();
  carrier.type = 'sawtooth';
  carrier.frequency.value = freq;
  // Subtle vibrato
  const vibrato = audioCtx.createOscillator();
  vibrato.frequency.value = 5;
  const vibAmt = audioCtx.createGain(); vibAmt.gain.value = 4;
  vibrato.connect(vibAmt); vibAmt.connect(carrier.frequency);
  // Filter for sax warmth
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(800, t0);
  lp.frequency.linearRampToValueAtTime(2000, t0 + 0.05);
  lp.frequency.linearRampToValueAtTime(900, t0 + dur);
  const g = audioCtx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.025, t0 + 0.06);
  g.gain.linearRampToValueAtTime(0.022, t0 + dur*0.7);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  // Pan slightly to evoke "from somewhere a couple blocks away"
  const pan = audioCtx.createStereoPanner(); pan.pan.value = -0.6;
  carrier.connect(lp).connect(g).connect(pan).connect(masterGain);
  carrier.start(t0); carrier.stop(t0 + dur + 0.05);
  vibrato.start(t0); vibrato.stop(t0 + dur + 0.05);
}

// ── Animation loop ──────────────────────────────────────────────────
let prev = performance.now(), time = 0, startTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  // Update sky time
  sky.material.uniforms.time.value = time;
  // Update building shaders
  city.mats.forEach(m => m.uniforms.time.value = time);

  // Update birds
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.position.x += b.userData.speed * dt;
    b.position.y += Math.sin(time*4 + b.userData.flap) * 0.05;
    b.lookAt(b.position.x + 1, b.position.y, b.position.z);
    if (b.position.x > 100) {
      scene.remove(b);
      birds.splice(i, 1);
    }
  }

  // Update bistro string lights — gentle sway
  stringGroup.position.x = Math.sin(time * 0.3) * 0.05;

  // Subtle camera breathing
  camera.position.x = Math.sin(time * 0.15) * 0.06;
  camera.position.y = 18 + Math.sin(time * 0.22) * 0.03;
  camera.lookAt(Math.sin(time*0.05) * 5, 18 + Math.sin(time*0.07) * 1, -50);

  // Update dawn timer
  const elapsed = (now - startTime) / 1000;
  // 2h 42m starting, counts down at real time accelerated 60×
  const totalSeconds = 2 * 3600 + 42 * 60;
  const remaining = Math.max(0, totalSeconds - elapsed * 60);
  const hr = Math.floor(remaining / 3600);
  const min = Math.floor((remaining % 3600) / 60);
  document.getElementById('dawn').textContent = `${hr}H ${min.toString().padStart(2,'0')}M`;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Click to begin
document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
  startTime = performance.now();
});
</script>
</body>
