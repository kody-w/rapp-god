    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Post Processing (Bloom)
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.1;
            bloomPass.strength = 1.5;
            bloomPass.radius = 0.5;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Player Setup
            createPlayer();

            // Level Setup
            loadLevel(0);

            // Input
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
            document.getElementById('next-level-btn').addEventListener('click', nextLevel);

            // Start Loop
            animate();
        }

        function createPlayer() {
            // Particle Form (Solid Robot/Ninja)
            const geometry = new THREE.BoxGeometry(0.8, 1.6, 0.8);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff0055, 
                emissive: 0xff0055,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });
            playerMesh = new THREE.Mesh(geometry, material);
            scene.add(playerMesh);

            // Wave Form (Particle System)
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 100;
            const posArray = new Float32Array(particleCount * 3);
            for(let i=0; i<particleCount*3; i++) {
                posArray[i] = (Math.random() - 0.5) * 1.5;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particleMat = new THREE.PointsMaterial({
                color: 0x00ffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            playerParticleSystem = new THREE.Points(particleGeo, particleMat);
            playerParticleSystem.visible = false;
            scene.add(playerParticleSystem);
        }

        function loadLevel(index) {
            if (levelGroup) scene.remove(levelGroup);
            if (enemyGroup) scene.remove(enemyGroup);
            
            levelGroup = new THREE.Group();
            enemyGroup = new THREE.Group();
            scene.add(levelGroup);
            scene.add(enemyGroup);

            const data = LEVELS[index];
            state.level = index;
            state.player.pos.set(data.startPos.x, data.startPos.y, 0);
            state.player.vel.set(0, 0, 0);
            state.lastCheckpoint.set(data.startPos.x, data.startPos.y, 0);

            // Build Platforms
            data.platforms.forEach(p => {
                const geo = new THREE.BoxGeometry(p.w, p.h, 4);
                let mat;
                
                if (p.type === 'solid') {
                    mat = new THREE.MeshStandardMaterial({ 
                        color: 0x222244, 
                        roughness: 0.1,
                        metalness: 0.5
                    });
                    // Add neon edges
                    const edges = new THREE.EdgesGeometry(geo);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.add(line);
                    mesh.position.set(p.x, p.y, 0);
                    mesh.userData = p;
                    levelGroup.add(mesh);
                } else if (p.type === 'slit') {
                    // Slit is a passable area for waves, but solid for particles?
                    // Actually, let's make it a "Polarizer" - a grate.
                    mat = new THREE.MeshStandardMaterial({
                        color: 0x00ffff,
                        emissive: 0x00ffff,
                        emissiveIntensity: 0.2,
                        transparent: true,
                        opacity: 0.3,
                        wireframe: true
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(p.x, p.y, 0);
                    mesh.userData = p;
                    levelGroup.add(mesh);
                } else if (p.type === 'goal') {
                    mat = new THREE.MeshStandardMaterial({
                        color: 0x00ff00,
                        emissive: 0x00ff00,
                        emissiveIntensity: 0.8,
                        transparent: true,
                        opacity: 0.5
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(p.x, p.y, 0);
                    mesh.userData = p;
                    levelGroup.add(mesh);
                    
                    // Goal particles
                    const goalLight = new THREE.PointLight(0x00ff00, 2, 10);
                    goalLight.position.set(p.x, p.y + 2, 0);
                    levelGroup.add(goalLight);
                }
            });

            // Build Enemies (Observers)
            data.enemies.forEach(e => {
                if (e.type === 'observer') {
                    // Eye mesh
                    const geo = new THREE.SphereGeometry(0.5, 16, 16);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xff0000, emissiveIntensity: 0.5 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(e.x, e.y, 0);
                    
                    // Cone of vision
                    const coneGeo = new THREE.ConeGeometry(2, e.range, 32, 1, true);
                    coneGeo.translate(0, -e.range/2, 0);
                    coneGeo.rotateZ(Math.PI / 2); // Point right
                    const coneMat = new THREE.MeshBasicMaterial({ 
                        color: 0xff0000, 
                        transparent: true, 
                        opacity: 0.1, 
                        side: THREE.DoubleSide,
                        blending: THREE.AdditiveBlending
                    });
                    const cone = new THREE.Mesh(coneGeo, coneMat);
                    cone.rotation.z = e.dir === 1 ? 0 : Math.PI; // Face direction
                    
                    mesh.add(cone);
                    mesh.userData = { ...e, cone: cone };
                    enemyGroup.add(mesh);
                }
            });

            // Reset UI
            document.getElementById('message-area').innerHTML = '';
            document.getElementById('level-complete').classList.remove('visible');
            
            // Show messages
            data.messages.forEach(msg => {
                const el = document.createElement('div');
                el.className = 'tutorial-msg';
                el.innerHTML = msg.text;
                el.dataset.x = msg.x;
                document.getElementById('message-area').appendChild(el);
            });
        }

        function nextLevel() {
            if (state.level + 1 < LEVELS.length) {
                loadLevel(state.level + 1);
            } else {
                alert("You have mastered the quantum realm! (More levels coming soon)");
                loadLevel(0);
            }
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': state.keys.w = true; break;
                case 'KeyA': state.keys.a = true; break;
                case 'KeyS': state.keys.s = true; break;
                case 'KeyD': state.keys.d = true; break;
                case 'Space': 
                    if (!state.keys.space && state.player.grounded) {
                        jump();
                    }
                    state.keys.space = true; 
                    break;
                case 'ShiftLeft': 
                case 'ShiftRight':
                    if (!state.keys.shift) toggleMode();
                    state.keys.shift = true;
                    break;
                case 'KeyR': loadLevel(state.level); break;
            }
        }

        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': state.keys.w = false; break;
                case 'KeyA': state.keys.a = false; break;
                case 'KeyS': state.keys.s = false; break;
                case 'KeyD': state.keys.d = false; break;
                case 'Space': state.keys.space = false; break;
                case 'ShiftLeft': 
                case 'ShiftRight':
                    state.keys.shift = false;
                    break;
            }
        }

        function toggleMode() {
            if (state.isObserved) return; // Cannot switch if observed
            
            state.mode = state.mode === 'PARTICLE' ? 'WAVE' : 'PARTICLE';
            updateModeUI();
        }

        function updateModeUI() {
            const display = document.getElementById('mode-display');
            const text = document.getElementById('mode-text');
            
            if (state.mode === 'PARTICLE') {
                display.className = 'mode-indicator particle-mode';
                text.textContent = 'PARTICLE FORM';
                playerMesh.visible = true;
                playerParticleSystem.visible = false;
            } else {
                display.className = 'mode-indicator wave-mode';
                text.textContent = 'WAVE FORM';
                playerMesh.visible = false;
                playerParticleSystem.visible = true;
            }
        }

        function jump() {
            const force = state.mode === 'WAVE' ? JUMP_FORCE * WAVE_JUMP_SCALE : JUMP_FORCE;
            state.player.vel.y = force;
            state.player.grounded = false;
        }

        function updatePhysics(dt) {
            const p = state.player;
            
            // Horizontal Movement
            let moveDir = 0;
            if (state.keys.a) moveDir -= 1;
            if (state.keys.d) moveDir += 1;

            const speed = state.mode === 'WAVE' ? MOVE_SPEED * WAVE_SPEED_SCALE : MOVE_SPEED;
            
            // Acceleration / Friction
            if (moveDir !== 0) {
                p.vel.x += moveDir * speed * 10 * dt;
                if (Math.abs(p.vel.x) > speed) p.vel.x = moveDir * speed;
            } else {
                p.vel.x *= 0.9; // Friction
            }

            // Gravity
            const gravity = state.mode === 'WAVE' ? GRAVITY * WAVE_GRAVITY_SCALE : GRAVITY;
            p.vel.y -= gravity * dt;

            // Apply Velocity
            p.pos.x += p.vel.x * dt;
            p.pos.y += p.vel.y * dt;

            // Collision Detection
            p.grounded = false;
            checkCollisions();

            // Death Plane
            if (p.pos.y < -10) {
                respawn();
            }

            // Update Mesh Position
            playerMesh.position.copy(p.pos);
            playerParticleSystem.position.copy(p.pos);
            
            // Rotate particle system for effect
            if (state.mode === 'WAVE') {
                playerParticleSystem.rotation.y += dt;
                playerParticleSystem.rotation.z += dt * 0.5;
            }
        }

        function checkCollisions() {
            const p = state.player;
            const playerBox = new THREE.Box3();
            const size = new THREE.Vector3(0.8, 1.6, 0.8);
            playerBox.setFromCenterAndSize(p.pos, size);

            levelGroup.children.forEach(mesh => {
                const platform = mesh.userData;
                if (!platform) return;

                const platformBox = new THREE.Box3().setFromObject(mesh);

                if (playerBox.intersectsBox(platformBox)) {
                    if (platform.type === 'goal') {
                        levelComplete();
                        return;
                    }

                    if (platform.type === 'slit') {
                        // If Wave, pass through. If Particle, collide.
                        if (state.mode === 'WAVE') return;
                    }

                    // Resolve Collision
                    // Simple AABB resolution
                    const overlapX = Math.min(playerBox.max.x, platformBox.max.x) - Math.max(playerBox.min.x, platformBox.min.x);
                    const overlapY = Math.min(playerBox.max.y, platformBox.max.y) - Math.max(playerBox.min.y, platformBox.min.y);

                    if (overlapX < overlapY) {
                        // Horizontal collision
                        if (p.pos.x < platform.x) {
                            p.pos.x -= overlapX;
                        } else {
                            p.pos.x += overlapX;
                        }
                        p.vel.x = 0;
                    } else {
                        // Vertical collision
                        if (p.pos.y < platform.y) {
                            p.pos.y -= overlapY;
                            p.vel.y = 0; // Hit head
                        } else {
                            p.pos.y += overlapY;
                            p.vel.y = 0;
                            p.grounded = true;
                        }
                    }
                    
                    // Update box for next check
                    playerBox.setFromCenterAndSize(p.pos, size);
                }
            });
        }

        function updateEnemies(dt) {
            state.isObserved = false;
            const pPos = state.player.pos;

            enemyGroup.children.forEach(enemy => {
                const data = enemy.userData;
                
                // Rotate observer
                // enemy.rotation.z = Math.sin(clock.getElapsedTime()) * 0.5;
                
                // Check vision
                const toPlayer = pPos.clone().sub(enemy.position);
                const dist = toPlayer.length();
                
                if (dist < data.range) {
                    // Check angle
                    // Assuming enemy faces X direction based on data.dir
                    const facing = new THREE.Vector3(data.dir, 0, 0);
                    // Apply rotation if we added animation
                    
                    const angle = facing.angleTo(toPlayer);
                    // data.angle is in degrees, convert to radians
                    const viewAngle = (data.angle * Math.PI / 180) / 2;
                    
                    if (angle < viewAngle) {
                        // Line of sight check (raycast)
                        const raycaster = new THREE.Raycaster(enemy.position, toPlayer.normalize(), 0, dist);
                        const intersects = raycaster.intersectObjects(levelGroup.children);
                        
                        // Filter out non-solid objects
                        const blocked = intersects.some(hit => hit.object.userData.type === 'solid');
                        
                        if (!blocked) {
                            state.isObserved = true;
                            
                            // Visual feedback
                            enemy.material.emissiveIntensity = 2.0;
                            enemy.children[0].material.opacity = 0.5;
                        } else {
                            enemy.material.emissiveIntensity = 0.5;
                            enemy.children[0].material.opacity = 0.1;
                        }
                    } else {
                        enemy.material.emissiveIntensity = 0.5;
                        enemy.children[0].material.opacity = 0.1;
                    }
                }
            });

            // Handle Observation Effect
            const warning = document.getElementById('observer-warning');
            if (state.isObserved) {
                warning.classList.add('visible');
                if (state.mode === 'WAVE') {
                    state.mode = 'PARTICLE';
                    updateModeUI();
                    // Add a "collapse" effect?
                }
            } else {
                warning.classList.remove('visible');
            }
        }

        function updateCamera() {
            // Smooth follow
            const targetX = state.player.pos.x;
            const targetY = Math.max(state.player.pos.y + 2, 5);
            
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.lookAt(camera.position.x, camera.position.y, 0);
        }

        function updateTutorial() {
            const msgs = document.querySelectorAll('.tutorial-msg');
            msgs.forEach(msg => {
                const x = parseFloat(msg.dataset.x);
                const dist = Math.abs(state.player.pos.x - x);
                if (dist < 8) {
                    msg.classList.add('visible');
                } else {
                    msg.classList.remove('visible');
                }
            });
        }

        function respawn() {
            state.player.pos.copy(state.lastCheckpoint);
            state.player.vel.set(0, 0, 0);
            state.mode = 'PARTICLE';
            updateModeUI();
        }

        function levelComplete() {
            document.getElementById('level-complete').classList.add('visible');
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1);
            
            updatePhysics(dt);
            updateEnemies(dt);
            updateCamera(dt);
            updateTutorial();
            
            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
