        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');

<script type="module">
import * as THREE from 'three';

// ---------------------------------------------------------------------------
// Tokyo Konbini · 3:14 AM
// Single-file cinematic mood piece. Three.js r160 + inline GLSL + Web Audio.
// ---------------------------------------------------------------------------

const $ = (s)=>document.querySelector(s);
const app = $('#app');

// ---------- Renderer / scene / camera --------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = false;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07090f);
scene.fog = new THREE.FogExp2(0x0a0d14, 0.045);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.05, 120);
camera.position.set(0, 1.62, 2.2);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lighting --------------------------------------------------------
const ambient = new THREE.AmbientLight(0x9fb6d4, 0.18);
scene.add(ambient);

// Fluorescent ceiling tubes (3) - cool white, slightly green-tinted
const tubeGroup = new THREE.Group();
scene.add(tubeGroup);
const tubeLights = [];
for (let i=0; i<3; i++){
  const l = new THREE.RectAreaLight(0xeaffff, 6.5, 4.0, 0.18);
  l.position.set(-3 + i*3, 2.78, -2.5 + i*0.0);
  l.lookAt(l.position.x, 0, l.position.z);
  tubeGroup.add(l);
  tubeLights.push(l);

  // Visible tube housing
  const tubeGeo = new THREE.BoxGeometry(3.6, 0.08, 0.32);
  const tubeMat = new THREE.MeshBasicMaterial({ color:0xf8ffff });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  tube.position.copy(l.position);
  tubeGroup.add(tube);
}

// Window-side cool blue spill (from neon outside)
const neonSpill = new THREE.PointLight(0x66aaff, 0.8, 14, 1.4);
neonSpill.position.set(0, 1.6, 6.5);
scene.add(neonSpill);

// Vending machine glow lights (set later)
const vendingLights = [];

// ---------- Materials & textures -------------------------------------------

// --- Procedural noise canvas (used for several materials)
function noiseCanvas(size, opts={}){
  const c = document.createElement('canvas'); c.width=c.height=size;
  const g = c.getContext('2d');
  const img = g.createImageData(size,size);
  for (let i=0;i<size*size;i++){
    const v = (Math.random()*255)|0;
    img.data[i*4]=v; img.data[i*4+1]=v; img.data[i*4+2]=v; img.data[i*4+3]=255;
  }
  g.putImageData(img,0,0);
  return c;
}

// --- Floor: scuffed off-white linoleum, slightly reflective via env color
const floorTex = (()=>{
  const c = document.createElement('canvas'); c.width=c.height=512;
  const g = c.getContext('2d');
  g.fillStyle='#dcdde2'; g.fillRect(0,0,512,512);
  // grid scuffs
  for (let i=0;i<2200;i++){
    g.fillStyle = `rgba(${100+Math.random()*40|0},${100+Math.random()*40|0},${110+Math.random()*40|0},${Math.random()*0.18})`;
    g.fillRect(Math.random()*512,Math.random()*512, Math.random()*3+0.5, Math.random()*3+0.5);
  }
  // tile lines
  g.strokeStyle='rgba(60,65,75,0.35)'; g.lineWidth=1;
  for (let i=0;i<=8;i++){ g.beginPath(); g.moveTo(i*64,0); g.lineTo(i*64,512); g.stroke(); g.beginPath(); g.moveTo(0,i*64); g.lineTo(512,i*64); g.stroke(); }
  const t = new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,3);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
})();

const floorMat = new THREE.MeshStandardMaterial({ map:floorTex, color:0xbfc2c8, roughness:0.55, metalness:0.05 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = 0;
scene.add(floor);

// --- Ceiling
const ceilTex = (()=>{
  const c=document.createElement('canvas'); c.width=c.height=256;
  const g=c.getContext('2d');
  g.fillStyle='#e9eaee'; g.fillRect(0,0,256,256);
  g.strokeStyle='rgba(140,145,160,0.4)'; g.lineWidth=1;
  for (let i=0;i<=4;i++){ g.beginPath(); g.moveTo(i*64,0); g.lineTo(i*64,256); g.stroke(); g.beginPath(); g.moveTo(0,i*64); g.lineTo(256,i*64); g.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(4,4);
  t.colorSpace=THREE.SRGBColorSpace; return t;
})();
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({ map:ceilTex, color:0xd8dae0, roughness:0.95 }));
ceiling.rotation.x = Math.PI/2; ceiling.position.y = 2.85; scene.add(ceiling);

// --- Walls (interior). Room: x in [-6,6], z in [-6, 7]; window wall at z=+7
const wallMat = new THREE.MeshStandardMaterial({ color:0xf2efe6, roughness:0.85 });
function addWall(w,h, pos, rotY=0){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h), wallMat);
  m.position.copy(pos); m.rotation.y=rotY; scene.add(m); return m;
}
// Back wall (cashier behind us at +z is camera looks toward -z window? actually we want player facing window at +z)
// Reorient: window at z = +7 (player looks +z), counter at z = -6 (behind player)
addWall(12, 2.85, new THREE.Vector3(0,1.425,-6), 0); // back wall (cashier)
addWall(13, 2.85, new THREE.Vector3(-6,1.425,0.5), Math.PI/2); // left wall (shelves)
addWall(13, 2.85, new THREE.Vector3(6,1.425,0.5), -Math.PI/2); // right wall

// ---------- Procedural Japanese-style packaging textures -------------------
function packageTexture(palette){
  const c=document.createElement('canvas'); c.width=128; c.height=192;

function makeShelfUnit(width, depth, levels, paletteIndices){
  const grp = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color:0xe6e7ea, roughness:0.7 });
  const shelfHeight = 2.0;
  const lvlSpacing = shelfHeight / levels;
  // sides
  const side = new THREE.BoxGeometry(0.04, shelfHeight, depth);
  const sL = new THREE.Mesh(side, frameMat); sL.position.set(-width/2, shelfHeight/2, 0); grp.add(sL);
  const sR = new THREE.Mesh(side, frameMat); sR.position.set( width/2, shelfHeight/2, 0); grp.add(sR);
  // back
  const back = new THREE.Mesh(new THREE.BoxGeometry(width, shelfHeight, 0.04), new THREE.MeshStandardMaterial({ color:0xcfd1d6, roughness:0.85 }));
  back.position.set(0, shelfHeight/2, -depth/2 + 0.02); grp.add(back);
  // shelves + products
  for (let lv=0; lv<levels; lv++){
    const y = 0.05 + lv*lvlSpacing;
    const sh = new THREE.Mesh(new THREE.BoxGeometry(width-0.02, 0.025, depth-0.02), frameMat);
    sh.position.set(0, y, 0); grp.add(sh);
    // products: rows of boxes
    const prodH = lvlSpacing*0.78;
    const prodD = depth*0.45;
    const cols = Math.max(4, Math.floor(width/0.18));
    const colW = (width-0.04)/cols;
    for (let cx=0; cx<cols; cx++){
      const palette = pkgPalettes[paletteIndices[(cx+lv)%paletteIndices.length]];
      const tex = packageTexture(palette);
      const mat = new THREE.MeshStandardMaterial({ map:tex, color:0xffffff, roughness:0.6 });
      // up to 2 rows deep
      for (let dz=0; dz<2; dz++){
        const box = new THREE.Mesh(new THREE.BoxGeometry(colW*0.86, prodH, prodD*0.45), mat);
        box.position.set(-width/2 + 0.02 + colW*(cx+0.5), y + prodH/2 + 0.01, depth/2 - prodD*0.3 - dz*prodD*0.5);
        grp.add(box);
      }
    }
  }
  return grp;
}

// ---------- Window glass with rain shader ---------------------------------
const rainUniforms = {
  uTime:{ value:0 },
  uIntensity:{ value:0.7 }, // 0..1
  uExposure:{ value:1.0 },
  uCity:{ value:cityCanvas },
};

const glassFrag = `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform float uIntensity;
uniform sampler2D uCity;

float hash(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }

// rain drop layer: cells with growing droplets that occasionally streak down
vec3 rainLayer(vec2 uv, float scale, float seedShift){
  vec2 g = uv*scale;
  vec2 id = floor(g);
  vec2 fp = fract(g) - 0.5;

  float n = hash(id + seedShift);
  float t = uTime*0.5 + n*7.2831;

  // life cycle 0..1
  float life = fract(t * (0.4 + 0.4*n));
  // drop position drifts down as it grows then streaks
  float drift = smoothstep(0.55, 1.0, life) * (life-0.55)/0.45;
  vec2 dropPos = vec2((n-0.5)*0.7, 0.2 - drift*1.8);

  // drop radius grows then bursts
  float r = mix(0.02, 0.18, smoothstep(0.0,0.55,life));
  // streak below the drop when it falls
  float streakMask = smoothstep(-0.5, 0.0, fp.y - dropPos.y) * step(fp.y, dropPos.y);
  float streakWidth = 0.04 + 0.02*n;
  float streak = smoothstep(streakWidth, 0.0, abs(fp.x - dropPos.x)) * streakMask * (drift>0.0?1.0:0.0);

  float d = length(fp - dropPos) / r;
  float drop = smoothstep(1.0, 0.55, d);

  // refraction-like brightness shift
  float brightness = drop*1.0 + streak*0.55;
  return vec3(brightness);
}

void main(){
  vec2 uv = vUv;
  // base view of city through the glass (slightly stretched)
  vec2 cuv = vec2(uv.x*0.7 + 0.15, uv.y*0.6 + 0.2);
  vec3 city = texture2D(uCity, cuv).rgb;

  // refraction offset from rain
  vec3 r1 = rainLayer(uv*vec2(1.0,1.6), 7.0, 0.13);
  vec3 r2 = rainLayer(uv*vec2(1.0,1.6) + vec2(0.4,0.2), 13.0, 5.7);
  vec3 r3 = rainLayer(uv*vec2(1.0,1.6) + vec2(0.7,0.9), 22.0, 11.3);
  float drops = (r1.x*1.0 + r2.x*0.6 + r3.x*0.35) * uIntensity;

  // refract: sample city again with offset based on drop edges
  vec2 refOff = vec2(0.0);
  refOff.x = (r1.x - r2.x)*0.012*uIntensity;
  refOff.y = (r2.x - r3.x)*0.012*uIntensity;
  vec3 cityRef = texture2D(uCity, cuv + refOff).rgb;
  city = mix(city, cityRef, smoothstep(0.0, 0.5, drops));

  // overall film of moisture: slight darkening + cool tint
  city *= mix(0.85, 1.0, 1.0 - uIntensity*0.4);
  city += vec3(0.04, 0.08, 0.14) * uIntensity * 0.4;

  // bright drop highlights (specular from interior fluorescents)
  float spec = drops*drops * 1.2;
  city += vec3(spec) * vec3(0.9, 0.95, 1.05);

  // streak smear darkening near top
  float topVignette = smoothstep(0.0, 0.4, 1.0 - uv.y) * 0.15;
  city -= topVignette;

  gl_FragColor = vec4(city, 1.0);
}
`;

    void main(){
      vec2 uv = vUv;

});

function makeVending(label, hue){
  const g = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 2.0, 0.7),
    new THREE.MeshStandardMaterial({ color:0xe9eaee, roughness:0.55, metalness:0.2 }));
  body.position.set(0,1.0,0); g.add(body);
  // colored top sign
  const signColor = new THREE.Color().setHSL(hue, 0.7, 0.55);
  const sign = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.32, 0.72),
    new THREE.MeshStandardMaterial({ color:signColor, emissive:signColor, emissiveIntensity:0.9 }));
  sign.position.set(0,1.84,0); g.add(sign);
  // sign text canvas
  const tc = document.createElement('canvas'); tc.width=256; tc.height=64;
  const tg = tc.getContext('2d'); tg.fillStyle='#fff'; tg.font='bold 32px sans-serif'; tg.textAlign='center'; tg.textBaseline='middle';
  tg.fillText(label, 128, 32);
  const tt = new THREE.CanvasTexture(tc); tt.colorSpace=THREE.SRGBColorSpace;
  const signFront = new THREE.Mesh(new THREE.PlaneGeometry(0.95,0.27), new THREE.MeshBasicMaterial({ map:tt, transparent:true }));
  signFront.position.set(0,1.84,0.361); g.add(signFront);

  // window with product display (canvas)
  const dispCanvas = document.createElement('canvas'); dispCanvas.width=256; dispCanvas.height=384;
  const dg = dispCanvas.getContext('2d');
  function redrawDisplay(flash=0){
    dg.fillStyle='#0c0e14'; dg.fillRect(0,0,256,384);
    // 3 rows x 4 cols of cans/bottles
    for (let r=0; r<3; r++){
      for (let cIdx=0; cIdx<4; cIdx++){
        const x = 16 + cIdx*58; const y = 30 + r*116;
        const palette = pkgPalettes[(cIdx + r*4 + (label.charCodeAt(0)%4)) % pkgPalettes.length];
        dg.fillStyle = palette.bg; dg.fillRect(x,y,46,90);
        dg.fillStyle = palette.band; dg.fillRect(x, y+10, 46, 14);
        dg.fillStyle = palette.accent; dg.fillRect(x, y+40, 46, 4);
        dg.fillStyle = palette.text; dg.fillRect(x+8, y+50, 30, 10);
        dg.fillStyle = palette.text2; dg.fillRect(x+8, y+62, 30, 6);
        // shelf
        dg.fillStyle = '#222a35'; dg.fillRect(x-2, y+92, 50, 4);
        // price
        dg.fillStyle = '#ffd166'; dg.font='bold 11px sans-serif'; dg.textAlign='left';
        dg.fillText('¥'+(120+cIdx*10+r*30), x+2, y+88);
      }
    }
    if (flash>0){
      dg.fillStyle = `rgba(255,255,255,${flash*0.5})`;
      dg.fillRect(0,0,256,384);
    }
    dispTex.needsUpdate = true;
  }
  const dispTex = new THREE.CanvasTexture(dispCanvas);
  dispTex.colorSpace = THREE.SRGBColorSpace;
  const dispMat = new THREE.MeshStandardMaterial({ map:dispTex, emissive:new THREE.Color(0xffffff), emissiveMap:dispTex, emissiveIntensity:0.4, roughness:1 });
  const display = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 1.3), dispMat);
  display.position.set(0, 1.25, 0.361);
  display.userData.isVending = true;
  g.add(display);

  // collection slot at bottom
  const slot = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.05),
    new THREE.MeshStandardMaterial({ color:0x111 }));
  slot.position.set(0, 0.35, 0.361); g.add(slot);
  // little buttons
  for (let i=0;i<3;i++){
    const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.015,12),
      new THREE.MeshStandardMaterial({ color:0xffd166, emissive:0xffd166, emissiveIntensity:0.4 }));
    btn.rotation.x=Math.PI/2;
    btn.position.set(-0.32 + i*0.08, 0.55, 0.361); g.add(btn);
  }

  // glow point light
  const glow = new THREE.PointLight(signColor, 0.9, 4.0, 1.6);
  glow.position.set(0, 1.4, 0.5);
  g.add(glow);
  vendingLights.push(glow);

  g.userData = { label, hue, redrawDisplay, display, glow, signColor, flash:0, dispTex };
  return g;
}

// ---------- Web Audio (gesture-gated) -------------------------------------
const Audio = (()=>{
  let ctx=null, master=null, started=false;
  let buzzGain, rainGain, hvacGain, fridgeGain, jazzGain;

  function ensureCtx(){
    if (ctx) return ctx;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value=0.85; master.connect(ctx.destination);
    return ctx;
  }

  // Filtered pink-ish noise generator
  function noiseSource(){
    const buf = ctx.createBuffer(1, ctx.sampleRate*4, ctx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0;i<d.length;i++){
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6=w*0.115926;
    }
    const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true; return src;
  }

  function start(){
    if (started) return; started=true;
    ensureCtx();
    if (ctx.state==='suspended') ctx.resume();

    // --- Fluorescent buzz: 120Hz sawtooth-ish + gentle 60Hz, tiny tremolo
    const buzzOsc1 = ctx.createOscillator(); buzzOsc1.type='sawtooth'; buzzOsc1.frequency.value=120;
    const buzzOsc2 = ctx.createOscillator(); buzzOsc2.type='sine'; buzzOsc2.frequency.value=60;
    const buzzFilt = ctx.createBiquadFilter(); buzzFilt.type='bandpass'; buzzFilt.frequency.value=180; buzzFilt.Q.value=2.5;
    buzzGain = ctx.createGain(); buzzGain.gain.value=0.012;
    buzzOsc1.connect(buzzFilt); buzzOsc2.connect(buzzFilt); buzzFilt.connect(buzzGain); buzzGain.connect(master);
    buzzOsc1.start(); buzzOsc2.start();

    // --- Rain: low-passed noise
    const rainSrc = noiseSource();
    const rainFilt = ctx.createBiquadFilter(); rainFilt.type='lowpass'; rainFilt.frequency.value=2400;
    const rainHP   = ctx.createBiquadFilter(); rainHP.type='highpass'; rainHP.frequency.value=300;
    rainGain = ctx.createGain(); rainGain.gain.value=0.18;
    rainSrc.connect(rainFilt); rainFilt.connect(rainHP); rainHP.connect(rainGain); rainGain.connect(master);
    rainSrc.start();

    // --- HVAC drone: low rumble
    const hvac = ctx.createOscillator(); hvac.type='sine'; hvac.frequency.value=58;
    const hvac2= ctx.createOscillator(); hvac2.type='sine'; hvac2.frequency.value=88;
    hvacGain = ctx.createGain(); hvacGain.gain.value=0.045;
    hvac.connect(hvacGain); hvac2.connect(hvacGain); hvacGain.connect(master);
    hvac.start(); hvac2.start();

    // --- Fridge compressor: occasional kick-on
    fridgeGain = ctx.createGain(); fridgeGain.gain.value=0;
    const fridgeOsc = ctx.createOscillator(); fridgeOsc.type='triangle'; fridgeOsc.frequency.value=72;
    const fridgeNoise = noiseSource();
    const fridgeNoiseFilt = ctx.createBiquadFilter(); fridgeNoiseFilt.type='lowpass'; fridgeNoiseFilt.frequency.value=300;
    fridgeOsc.connect(fridgeGain); fridgeNoise.connect(fridgeNoiseFilt); fridgeNoiseFilt.connect(fridgeGain);
    fridgeGain.connect(master);
    fridgeOsc.start(); fridgeNoise.start();
    function fridgeCycle(){
      const on = ctx.currentTime + 4 + Math.random()*8;
      const dur = 6 + Math.random()*9;
      fridgeGain.gain.setValueAtTime(0, on);
      fridgeGain.gain.linearRampToValueAtTime(0.05, on+0.8);
      fridgeGain.gain.linearRampToValueAtTime(0.05, on+dur-0.8);
      fridgeGain.gain.linearRampToValueAtTime(0, on+dur);
      setTimeout(fridgeCycle, (on-ctx.currentTime+dur+2)*1000);
    }
    fridgeCycle();

    // --- Soft jazz vamp: Dm9 - G7 - Cmaj7
    const chords = [
      [62,69,72,76,81], // Dm9: D F A C E
      [55,65,71,74,77], // G7:  G B F D
      [60,64,67,71,74], // Cmaj7: C E G B
    ];
    jazzGain = ctx.createGain(); jazzGain.gain.value=0.0;
    const jazzFilt = ctx.createBiquadFilter(); jazzFilt.type='lowpass'; jazzFilt.frequency.value=1100;
    jazzGain.connect(jazzFilt); jazzFilt.connect(master);
    // fade in jazz softly
    jazzGain.gain.linearRampToValueAtTime(0.085, ctx.currentTime+8);

    function midi(n){ return 440 * Math.pow(2,(n-69)/12); }
    function chordHit(notes, when, dur){
      notes.forEach((n,i)=>{
        const o=ctx.createOscillator(); o.type=i===0?'triangle':'sine';
        o.frequency.value = midi(n);
        const g=ctx.createGain(); g.gain.value=0;
        o.connect(g); g.connect(jazzGain);
        const v = i===0?0.18:0.07;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(v, when+0.4);
        g.gain.linearRampToValueAtTime(0, when+dur);
        o.start(when); o.stop(when+dur+0.05);
      });
      // soft brush snare on 2 & 4
      const noise = ctx.createBufferSource();
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.25, ctx.sampleRate);
      const d=buf.getChannelData(0); for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/2000);
      noise.buffer=buf;
      const ng=ctx.createGain(); ng.gain.value=0.022;
      const nf=ctx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=4500;
      noise.connect(nf); nf.connect(ng); ng.connect(jazzGain);
      noise.start(when+dur*0.5); noise.start; // brush on backbeat
    }
    function scheduleJazz(){
      const bpm=72; const beat=60/bpm; const bar=beat*4;
      let t = ctx.currentTime + 1.0;
      for (let cyc=0; cyc<4; cyc++){
        for (let ch=0; ch<3; ch++){
          chordHit(chords[ch], t, bar*0.95);
          t += bar;
        }
      }
      setTimeout(scheduleJazz, (bar*12)*1000 - 200);
    }
    scheduleJazz();
  }

  function playChime(vol=0.6){
    if (!ctx) return;
    // Konbini door chime: ding-dong (E5 then C5)
    const notes = [659.25, 523.25];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ctx.createGain(); g.gain.value=0;
      const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=3500;
      o.connect(filt); filt.connect(g); g.connect(master);
      const t0=ctx.currentTime + i*0.32;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol*0.5, t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t0+1.2);
      o.start(t0); o.stop(t0+1.3);
    });
  }

  function playJingle(label){
    if (!ctx) return;
    // Each label has a unique 4-bar synth jingle ~3s
    const tunes = {
      'SUNTORY': [ [60,4],[64,2],[67,2],[72,4],[71,2],[67,2],[69,4],[67,4] ],
      'POCARI':  [ [67,2],[69,2],[72,4],[76,4],[74,2],[72,2],[71,4],[67,4] ],
      'BOSS':    [ [55,2],[60,2],[63,4],[58,2],[60,2],[55,4],[63,2],[60,2],[55,4] ],
    };
    const seq = tunes[label] || tunes['SUNTORY'];
    const beat = 0.18;
    let t = ctx.currentTime + 0.05;
    seq.forEach(([n,len])=>{
      const o=ctx.createOscillator(); o.type='square';
      o.frequency.value = 440*Math.pow(2,(n-69)/12);
      const g=ctx.createGain(); g.gain.value=0;
      const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=2400;
      o.connect(filt); filt.connect(g); g.connect(master);
      const dur = beat*len*0.5;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.08, t+0.01);
      g.gain.linearRampToValueAtTime(0.05, t+dur*0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      o.start(t); o.stop(t+dur+0.02);
      t += dur;
    });
  }

  return { start, playJingle, playChime };
})();

// ---------- Animation loop -------------------------------------------------
const clock = new THREE.Clock();
let flickerSeed = 0;
let timeMin = 14; // 3:14
let timeMinFractional = 14;

function fluorescentFlicker(t){
  // 60Hz triangular flicker base + occasional dropout
  const base = 0.92 + 0.08*Math.abs(Math.sin(t*60.0*Math.PI));
  // slow stutter
  const stutter = (Math.sin(t*0.7)+Math.sin(t*1.31))*0.5;
  let mul = base + stutter*0.04;
  // rare dropout
  flickerSeed += 0.001;
  if (Math.random() < 0.001) mul *= 0.3;
  return mul;
}

function animate(){
  const dt = Math.min(clock.getDelta(), 1/30);
  const t = clock.elapsedTime;

  // shader updates
  rainUniforms.uTime.value = t;
  cooler.glassMat.uniforms.uTime.value = t;
  wetStripMat.uniforms.uTime.value = t;

  // Fluorescent flicker
  const fl = fluorescentFlicker(t);
  for (const tl of tubeLights){ tl.intensity = 6.5*fl; }

  // Neon HSV stutter on vending lights (subtle hue/value flicker)
  vendings.forEach((v, i)=>{
    const ph = t*0.6 + i*1.3;
    const stut = (Math.random()<0.003) ? 0.4 : 1.0;
    const wob = 0.85 + Math.sin(ph*5.2 + Math.sin(ph*1.7))*0.08;
    v.userData.glow.intensity = 0.9 * wob * stut;
    // hue shift
    const c = v.userData.signColor.clone();
    const hsl = {h:0,s:0,l:0}; c.getHSL(hsl);
    hsl.h = (hsl.h + Math.sin(ph*0.4)*0.01) % 1.0;
    const c2 = new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
    v.userData.glow.color.copy(c2);
    // display flash decay
    if (v.userData.flash > 0){
      v.userData.flash = Math.max(0, v.userData.flash - dt*1.5);
      v.userData.redrawDisplay(v.userData.flash);
    }
  });

  // Sleeping clerk breathing
  const clerk = counter.userData.clerk;
  if (clerk){
    const br = Math.sin(t*0.9)*0.012;
    clerk.position.y = br;
    clerk.children[0].scale.set(1, 1+br*0.5, 1); // torso
  }

  // Taxis sweep
  for (const tx of taxis){
    tx.t += dt;
    if (tx.t > 35){
      tx.t = -2 - Math.random()*15;
      tx.sprite.position.set(-14, 1.2 + Math.random()*0.6, 12.5);
    }
    if (tx.t > 0 && tx.t < 6){
      tx.sprite.material.opacity = Math.sin((tx.t/6)*Math.PI) * 1.0;
      tx.sprite.position.x = -14 + tx.t * 5.0;
    } else {
      tx.sprite.material.opacity = 0;
    }
  }

  // Bought products: simple drop+fade
  for (let i=boughtProducts.length-1; i>=0; i--){
    const p = boughtProducts[i];
    p.userData.life += dt;
    p.userData.vy -= 9.8*dt*0.4;
    p.position.y += p.userData.vy*dt;
    if (p.position.y < 0.06){ p.position.y = 0.06; p.userData.vy *= -0.3; }
    if (p.userData.life > 6){
      scene.remove(p); boughtProducts.splice(i,1);
    }
  }

  // WASD slow walk to camTarget
  const walkSpeed = 1.2;
  // Build forward/right based on yaw only
  const forward = new THREE.Vector3(-Math.sin(yawPitch.yaw), 0, -Math.cos(yawPitch.yaw));
  const right   = new THREE.Vector3(forward.z, 0, -forward.x);
  if (keys['w']) camTarget.addScaledVector(forward,  walkSpeed*dt);
  if (keys['s']) camTarget.addScaledVector(forward, -walkSpeed*dt);
  if (keys['a']) camTarget.addScaledVector(right,   -walkSpeed*dt);
  if (keys['d']) camTarget.addScaledVector(right,    walkSpeed*dt);
  // clamp inside store
  camTarget.x = Math.max(-5.4, Math.min(5.4, camTarget.x));
  camTarget.z = Math.max(-5.4, Math.min(6.6, camTarget.z));
  camTarget.y = 1.62;
  camera.position.lerp(camTarget, 1 - Math.pow(0.001, dt));

  // Apply yaw/pitch
  camera.rotation.set(yawPitch.pitch, yawPitch.yaw, 0);

  // Subtle clock advance: 1 real minute = 1 in-game minute (slow)
  timeMinFractional += dt/60;
  if (timeMinFractional >= timeMin + 1){
    timeMin++;
    const mm = String(timeMin % 60).padStart(2,'0');
    const hh = 3 + Math.floor(timeMin/60);
    $('#clock').textContent = `· ${hh}:${mm} AM`;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// ---------- Light ambient drift to keep scene alive ------------------------
setInterval(()=>{
  // slow neon spill hue drift
  const h = (performance.now()*0.00005) % 1;
  neonSpill.color.setHSL(0.55 + Math.sin(h*Math.PI*2)*0.08, 0.7, 0.55);
}, 200);

// Shift pointer cursor sensibly when over canvas edges
renderer.domElement.style.cursor = 'grab';

</script>
