const shaderCommon = `
  float hash(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){ vec2 i = floor(p), f = fract(p); float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1)); vec2 u = f*f*(3.0-2.0*f); return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y; }
  float fbm(vec2 p){ float v=0.0, a=0.5; for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.07; a *= 0.5; } return v; }
`;

const tileVS = `
  varying vec2 vUv; varying vec3 vWorld; varying vec3 vNormal;
  void main(){ vUv = uv; vec4 wp = modelMatrix * vec4(position,1.0); vWorld = wp.xyz; vNormal = normalize(normalMatrix*normal); gl_Position = projectionMatrix * viewMatrix * wp; }
`;

const tileFS = `
  precision highp float;
  varying vec2 vUv; varying vec3 vWorld; varying vec3 vNormal;
  uniform float uTime; uniform vec3 uTint; uniform vec2 uTileSize; uniform float uGroutWidth; uniform float uAge;
  ${shaderCommon}
  void main(){
    vec2 t = vUv * uTileSize;
    vec2 cell = floor(t); vec2 f = fract(t);
    float gx = smoothstep(0.0, uGroutWidth, f.x) * smoothstep(0.0, uGroutWidth, 1.0-f.x);
    float gy = smoothstep(0.0, uGroutWidth, f.y) * smoothstep(0.0, uGroutWidth, 1.0-f.y);
    float grout = gx*gy;
    float tileVar = hash(cell)*0.18 - 0.09;
    vec3 tileCol = uTint + tileVar;
    tileCol += (hash(cell+13.0)-0.5)*0.05;
    vec3 groutCol = vec3(0.06, 0.05, 0.04);
    vec3 base = mix(groutCol, tileCol, grout);
    float stain = fbm(vWorld.xz*0.6 + cell*0.3) * uAge;
    base *= 1.0 - stain*0.45;
    float crack = smoothstep(0.85, 1.0, fbm(vWorld.xz*5.0));
    base *= 1.0 - crack*0.3;
    float spec = pow(grout, 3.0)*0.12;
    gl_FragColor = vec4(base + spec, 1.0);
  }
`;

const haloVS = `

const haloFS = `
  precision highp float;
  varying vec2 vUv; uniform float uTime; uniform vec3 uColor; uniform float uIntensity;
  ${shaderCommon}
  void main(){
    vec2 c = vUv - 0.5; float d = length(c);
    float core = smoothstep(0.5, 0.0, d);
    float halo = smoothstep(0.55, 0.1, d);
    float flick = 1.0;
    float r1 = hash(vec2(floor(uTime*40.0), 1.0));
    float r2 = hash(vec2(floor(uTime*8.0), 7.0));
    if(r2 > 0.985) flick = 0.15 + r1*0.4;
    flick *= 0.93 + 0.07*sin(uTime*120.0);
    vec3 col = uColor*(core*1.4 + halo*0.6) * uIntensity * flick;
    float a = (core*0.9 + halo*0.4)*flick;
    gl_FragColor = vec4(col, a);
  }
`;

    radial = max(radial, 0.0);
    float flicker = 0.94 + 0.06*sin(uTime*7.0) + 0.04*hash(vec2(floor(uTime*30.0)));
    float dust = fbm(vUv*8.0 + vec2(0.0, -uTime*0.4));
    float a = core*radial*flicker*(0.55 + dust*0.5)*uIntensity;
    vec3 col = mix(vec3(1.0, 0.85, 0.55), vec3(1.0, 0.95, 0.8), core)*a;
    gl_FragColor = vec4(col, a*0.8);
  }
`;

const graffitiVS = tileVS;
const graffitiFS = `
  precision highp float;
  varying vec2 vUv; varying vec3 vWorld;
  uniform float uTime; uniform float uSeed;
  ${shaderCommon}
  vec3 palette(float t){
    vec3 a = vec3(0.5); vec3 b = vec3(0.5);
    vec3 c = vec3(1.0, 0.7, 0.4); vec3 d = vec3(0.0, 0.33, 0.67);
    return a + b*cos(6.2831*(c*t + d));
  }
  void main(){
    vec2 p = vUv;
    float wall = fbm(p*4.0 + uSeed);
    vec3 base = vec3(0.18, 0.16, 0.14)*(0.7 + wall*0.4);
    base *= 0.85 + (hash(floor(p*30.0))-0.5)*0.1;
    for(int i=0;i<5;i++){
      float fi = float(i);
      vec2 center = vec2(hash(vec2(fi, uSeed)), hash(vec2(fi+11.0, uSeed)));
      float r = 0.05 + hash(vec2(fi+22.0, uSeed))*0.13;
      vec2 d = (p - center) / vec2(r, r*0.6);
      float shape = 1.0 - smoothstep(0.6, 1.1, length(d) + fbm(d*5.0 + fi)*0.3);
      shape *= smoothstep(0.0, 0.1, shape);
      vec3 tagCol = palette(hash(vec2(fi+33.0, uSeed)));
      base = mix(base, tagCol*0.55, clamp(shape*0.7, 0.0, 1.0));
    }
    float dirt = fbm(p*2.5)*0.35;
    base *= 1.0 - dirt;
    float drip = smoothstep(0.4, 0.0, fract(p.x*8.0)) * smoothstep(0.0, 0.5, p.y) * 0.1;
    base *= 1.0 - drip;
    gl_FragColor = vec4(base, 1.0);
  }
`;

function makePosterTex(palette){
  const c = document.createElement('canvas'); c.width = 256; c.height = 384;
  const ctx = c.getContext('2d');
  ctx.fillStyle = palette[0]; ctx.fillRect(0,0,256,384);
  // gradient bg
  const g = ctx.createLinearGradient(0,0,0,384);
  g.addColorStop(0, palette[1]); g.addColorStop(1, palette[2]);
  ctx.fillStyle = g; ctx.globalAlpha = 0.7; ctx.fillRect(0,0,256,384); ctx.globalAlpha = 1;
  // bold shape
  ctx.fillStyle = palette[3];
  ctx.beginPath(); ctx.arc(128, 160, 70, 0, Math.PI*2); ctx.fill();
  // lines (movie/show fake)
  ctx.fillStyle = palette[4];
  ctx.fillRect(30, 280, 196, 14);
  ctx.fillRect(40, 304, 100, 8);
  ctx.fillRect(50, 320, 60, 6);
  // big title
  ctx.fillStyle = palette[5];
  ctx.font = 'bold 36px serif';
  ctx.textAlign = 'center';
  ctx.fillText('AFTER', 128, 80);
  ctx.fillText('HOURS', 128, 120);
  // grime overlay
  for(let i=0;i<400;i++){
    ctx.fillStyle = 'rgba(0,0,0,'+(Math.random()*0.15)+')';
    ctx.fillRect(Math.random()*256, Math.random()*384, Math.random()*6, Math.random()*6);
  }
  // tear
  ctx.fillStyle = 'rgba(40,30,20,0.8)';
  ctx.beginPath(); ctx.moveTo(0, 50 + Math.random()*100);
  ctx.lineTo(40+Math.random()*30, 80 + Math.random()*50);
  ctx.lineTo(0, 130 + Math.random()*30); ctx.fill();
  return new THREE.CanvasTexture(c);
}

  // Headlights (front)

  // Front cab face — black with red rear-style stripe

  // Cab window

  // Wheels

  // Pantograph/cable detail on roof
  const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, TRAIN_LENGTH-1, 8), carDarkMat);
  pipe.rotation.z = Math.PI/2; pipe.position.set(0, TRAIN_HEIGHT + 0.45, 0.6);
  train.add(pipe);

  // Train interior (visible through windows)
  const interior = new THREE.Group();
  // floor
  const intFloor = new THREE.Mesh(new THREE.BoxGeometry(TRAIN_LENGTH-0.4, 0.05, TRAIN_WIDTH-0.4), new THREE.MeshStandardMaterial({ color: 0x453830, roughness: 0.9 }));
  intFloor.position.y = 0.45; interior.add(intFloor);
  // benches
  for(const sz of [-TRAIN_WIDTH/2 + 0.4, TRAIN_WIDTH/2 - 0.4]){

  }
  // poles
  for(let i = -7; i <= 7; i += 2.0){
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.7, 8), new THREE.MeshStandardMaterial({ color: 0xb09040, roughness: 0.5, metalness: 0.6 }));
    pole.position.set(i, 1.6, 0);

  // ceiling lights
  const ceilLightMat = new THREE.MeshBasicMaterial({ color: 0xfff4d4 });
  for(let i = -7; i <= 7; i += 2.0){

  // single lonely passenger (low-poly)
  const pax = new THREE.Group();
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.7, 0.3), new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.9 }));

  interior.position.y = 0.4;
  train.add(interior);
  train.userData.interior = interior;

  // Position train far down the tunnel initially

const rats = [];
function makeRatSprite(){
  const c = document.createElement('canvas'); c.width = 64; c.height = 32;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,64,32);
  ctx.fillStyle = '#1a1612';
  ctx.beginPath(); ctx.ellipse(28, 18, 18, 8, 0, 0, Math.PI*2); ctx.fill();
  // head
  ctx.beginPath(); ctx.ellipse(46, 16, 8, 6, 0, 0, Math.PI*2); ctx.fill();
  // tail
  ctx.strokeStyle = '#1a1612'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(10, 18); ctx.quadraticCurveTo(2, 14, 6, 8); ctx.stroke();
  // ears
  ctx.beginPath(); ctx.ellipse(48, 11, 2, 3, 0, 0, Math.PI*2); ctx.fill();
  // eye
  ctx.fillStyle = '#ff5040'; ctx.fillRect(50, 15, 1, 1);
  return new THREE.CanvasTexture(c);
}
const ratTex = makeRatSprite();
function spawnRat(at){
  const mat = new THREE.SpriteMaterial({ map: ratTex, transparent: true, depthWrite: false });
  const s = new THREE.Sprite(mat);
  s.scale.set(0.45, 0.22, 1);
  s.position.copy(at);
  s.userData.vel = new THREE.Vector3((Math.random()-0.5)*1.2, 0, (Math.random()-0.5)*0.4);
  s.userData.life = 12 + Math.random()*8;
  s.userData.heading = Math.random()*Math.PI*2;
  scene.add(s);
  rats.push(s);
}

// ============================================================
//  WEB AUDIO
// ============================================================
let audio = null;
let audioStarted = false;

function initAudio(){
  if(audioStarted) return;
  audioStarted = true;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const master = ctx.createGain(); master.gain.value = 0.55; master.connect(ctx.destination);

  // ---------- Distant subway hum (pink-ish noise lowpass'd) ----------
  function makeNoiseBuffer(){
    const len = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){
      const w = Math.random()*2-1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6 = w*0.115926;
    }
    return buf;
  }
  const noiseBuf = makeNoiseBuffer();

  function startLoopNoise(filterFreq, q, gain){
    const src = ctx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = filterFreq; f.Q.value = q;
    const g = ctx.createGain(); g.gain.value = gain;
    src.connect(f); f.connect(g); g.connect(master);
    src.start();
    return { src, filter: f, gain: g };
  }
  const hum = startLoopNoise(140, 0.7, 0.18);

  // ---------- Fluorescent buzz ----------
  function makeBuzz(){
    const tri = ctx.createOscillator(); tri.type = 'triangle'; tri.frequency.value = 60;
    const sq = ctx.createOscillator(); sq.type = 'sawtooth'; sq.frequency.value = 120;
    const g = ctx.createGain(); g.gain.value = 0.018;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 450; f.Q.value = 4;
    tri.connect(f); sq.connect(f); f.connect(g); g.connect(master);
    tri.start(); sq.start();
    return g;
  }
  const buzzGain = makeBuzz();
  function buzzFlicker(){
    const g = buzzGain.gain;
    g.cancelScheduledValues(ctx.currentTime);
    g.setValueAtTime(0.04, ctx.currentTime);
    g.exponentialRampToValueAtTime(0.018, ctx.currentTime + 0.15);
  }

  // ---------- Drips ----------
  function drip(){
    const t = ctx.currentTime;
    const o = ctx.createOscillator(); o.type = 'sine';
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 1800;
    o.frequency.setValueAtTime(900 + Math.random()*400, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.25);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.connect(f); f.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.35);
  }
  function scheduleDrips(){
    drip();
    setTimeout(scheduleDrips, 4000 + Math.random()*9000);
  }
  setTimeout(scheduleDrips, 2500);

  // ---------- Train arrival audio nodes (pre-built; gain-controlled) ----------
  // Distant rumble (low filtered noise)
  const rumbleSrc = ctx.createBufferSource(); rumbleSrc.buffer = noiseBuf; rumbleSrc.loop = true;
  const rumbleFilter = ctx.createBiquadFilter(); rumbleFilter.type = 'lowpass'; rumbleFilter.frequency.value = 80; rumbleFilter.Q.value = 2;
  const rumbleGain = ctx.createGain(); rumbleGain.gain.value = 0;
  rumbleSrc.connect(rumbleFilter); rumbleFilter.connect(rumbleGain); rumbleGain.connect(master);
  rumbleSrc.start();

  // Mid rumble (more rolling)
  const midRumSrc = ctx.createBufferSource(); midRumSrc.buffer = noiseBuf; midRumSrc.loop = true;
  const midF = ctx.createBiquadFilter(); midF.type = 'bandpass'; midF.frequency.value = 220; midF.Q.value = 1.4;
  const midG = ctx.createGain(); midG.gain.value = 0;
  midRumSrc.connect(midF); midF.connect(midG); midG.connect(master);
  midRumSrc.start();

  // Whoosh (high filter swept)
  const whooshSrc = ctx.createBufferSource(); whooshSrc.buffer = noiseBuf; whooshSrc.loop = true;
  const whooshF = ctx.createBiquadFilter(); whooshF.type = 'highpass'; whooshF.frequency.value = 800;
  const whooshG = ctx.createGain(); whooshG.gain.value = 0;
  whooshSrc.connect(whooshF); whooshF.connect(whooshG); whooshG.connect(master);
  whooshSrc.start();

  // Onboard rumble (always available; ramped on boarding)
  const onboardSrc = ctx.createBufferSource(); onboardSrc.buffer = noiseBuf; onboardSrc.loop = true;
  const onboardF = ctx.createBiquadFilter(); onboardF.type = 'lowpass'; onboardF.frequency.value = 320; onboardF.Q.value = 0.9;
  const onboardG = ctx.createGain(); onboardG.gain.value = 0;
  onboardSrc.connect(onboardF); onboardF.connect(onboardG); onboardG.connect(master);
  onboardSrc.start();

  function brakeGrind(){
    const t = ctx.currentTime;
    const src = ctx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value = 2400; f.Q.value = 8;
    const g = ctx.createGain(); g.gain.value = 0;
    src.connect(f); f.connect(g); g.connect(master);
    src.start();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.6);
    f.frequency.linearRampToValueAtTime(900, t + 3.0);
    g.gain.linearRampToValueAtTime(0.0, t + 3.2);
    src.stop(t + 3.4);
  }
  function doorHiss(){
    const t = ctx.currentTime;
    const src = ctx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value = 1800;
    const g = ctx.createGain(); g.gain.value = 0;
    src.connect(f); f.connect(g); g.connect(master);
    src.start();
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.16, t+0.05);
    g.gain.linearRampToValueAtTime(0.0, t + 1.4);
    src.stop(t + 1.6);
  }
  function chime(){
    const t = ctx.currentTime;
    const notes = [659.25, 523.25];
    notes.forEach((n, i)=>{
      const o = ctx.createOscillator(); o.type='sine'; o.frequency.value = n;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t + i*0.35);
      g.gain.linearRampToValueAtTime(0.13, t + i*0.35 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.35 + 1.4);
      o.connect(g); g.connect(master);
      o.start(t + i*0.35); o.stop(t + i*0.35 + 1.5);
    });
  }
  function announcement(){
    // FM-modulated voice-like blurred glitch
    const t = ctx.currentTime;
    const car = ctx.createOscillator(); car.type='sawtooth'; car.frequency.value = 220;
    const mod = ctx.createOscillator(); mod.type='sine'; mod.frequency.value = 4;
    const modG = ctx.createGain(); modG.gain.value = 80;
    mod.connect(modG); modG.connect(car.frequency);
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value = 900; f.Q.value = 6;
    const g = ctx.createGain(); g.gain.value = 0;
    car.connect(f); f.connect(g); g.connect(master);
    car.start(t); mod.start(t);
    // syllable envelope
    const syllables = [0.0, 0.18, 0.5, 0.85, 1.3, 1.55, 2.1, 2.6];
    syllables.forEach((s, i)=>{
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.07 + Math.random()*0.04, t + s + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, t + s + 0.18 + Math.random()*0.1);
      car.frequency.setValueAtTime(180 + Math.random()*120, t + s);
    });
    car.stop(t + 3.0); mod.stop(t + 3.0);
  }
  // Rail clack pulses (during onboard motion)
  let clackTimer = null;
  function startClacks(){
    if(clackTimer) return;
    function next(){
      const t = ctx.currentTime;
      const o = ctx.createOscillator(); o.type='triangle'; o.frequency.value = 90 + Math.random()*30;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.12, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.12);
      const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=300; f.Q.value=3;
      o.connect(f); f.connect(g); g.connect(master);
      o.start(t); o.stop(t+0.15);
      clackTimer = setTimeout(next, 320 + Math.random()*120);
    }
    next();
  }
  function stopClacks(){ if(clackTimer){ clearTimeout(clackTimer); clackTimer = null; } }

  audio = {
    ctx, master, hum, buzzFlicker, rumbleGain, midG, whooshG, onboardG,
    brakeGrind, doorHiss, chime, announcement, startClacks, stopClacks
  };
}

// ============================================================
//  ARRIVAL STATE MACHINE
// ============================================================
const ARRIVAL = {
  IDLE: 0, APPROACH: 1, BRAKING: 2, STOPPED: 3, DOORS_OPEN: 4, BOARDING_WINDOW: 5, DOORS_CLOSING: 6, DEPARTING: 7, GONE: 8
};
const arrival = {
  state: ARRIVAL.IDLE,
  timer: 30.0,         // seconds until train begins approach
  approachT: 0,        // 0..1 over approach
  stopT: 0,
  doorT: 0,            // 0=closed, 1=open
  departT: 0,
  trainSpeed: 0,
  trainPos: -90,       // along x
  brakeStartedAt: 0,
  rumbleEnvelope: 0,
  whooshEnvelope: 0
};

const countdownEl = document.getElementById('countdown');
const boardHintEl = document.getElementById('boardHint');

function fmtTime(s){
  s = Math.max(0, s);
  const mm = Math.floor(s/60); const ss = Math.floor(s%60);
  return mm + ':' + String(ss).padStart(2, '0');
}

function startApproach(){
  if(arrival.state !== ARRIVAL.IDLE) return;
  arrival.state = ARRIVAL.APPROACH;
  train.visible = true;
  arrival.trainPos = -90;
  // Headlight on
  if(train.userData.headlight) train.userData.headlight.intensity = 8;
  // beam on
  if(train.userData.beamMat) train.userData.beamMat.uniforms.uIntensity.value = 1.2;
}

// SPACE forces early arrival
window.addEventListener('keydown', e => {
  if(e.code === 'Space' && arrival.state === ARRIVAL.IDLE){
    arrival.timer = 0.4;
  }
});

// E to board
window.addEventListener('keydown', e => {
  if(e.code === 'KeyE' && arrival.state === ARRIVAL.BOARDING_WINDOW && !player.onTrain){
    // must be near a door
    const minDoorDist = train.userData.doors
      .filter(d => d.side === -1) // platform-facing side (negative z relative to train local; train is on +z so platform is on -z side)
      .map(d => {
        const wp = new THREE.Vector3(); d.group.getWorldPosition(wp);
        return camera.position.distanceTo(wp);
      })
      .reduce((a,b)=>Math.min(a,b), Infinity);
    if(minDoorDist < 3.5){
      player.onTrain = true;
      boardHintEl.classList.remove('show');
      if(audio) audio.startClacks();
    }
  }
});

// ============================================================
//  ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
let elapsed = 0;

function update(dt){
  elapsed += dt;

  // ---------- Player movement ----------
  if(!player.onTrain){
    const speed = (keys['ShiftLeft'] ? 3.6 : 2.2);
    const fwd = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
    const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
    const move = new THREE.Vector3();
    if(keys['KeyW']) move.add(fwd);
    if(keys['KeyS']) move.sub(fwd);
    if(keys['KeyD']) move.add(right);
    if(keys['KeyA']) move.sub(right);
    if(move.lengthSq() > 0) move.normalize().multiplyScalar(speed * dt);
    player.pos.add(move);
    // constrain to platform: x in [-PLATFORM_LENGTH/2 + 0.5, PLATFORM_LENGTH/2 - 0.5], z in [-PLATFORM_WIDTH/2 + 0.4, PLATFORM_WIDTH/2 - 0.5]
    player.pos.x = Math.max(-PLATFORM_LENGTH/2 + 0.5, Math.min(PLATFORM_LENGTH/2 - 0.5, player.pos.x));
    player.pos.z = Math.max(-PLATFORM_WIDTH/2 + 0.4, Math.min(PLATFORM_WIDTH/2 - 0.5, player.pos.z));
    player.pos.y = PLATFORM_HEIGHT + 0.65 + Math.sin(elapsed*8.0)*Math.min(move.length()*0.6, 0.03);
    camera.position.copy(player.pos);
  } else {
    // Locked aboard, but can look around
    const seatWorld = new THREE.Vector3();
    train.localToWorld(seatWorld.copy(player.trainSeatOffset));
    camera.position.copy(seatWorld);
  }
  camera.rotation.set(player.pitch, player.yaw, 0, 'YXZ');

  // ---------- Fluorescent lights (flicker / stutter) ----------
  for(const f of fluorescents){
    f.flicker += dt;
    let intensity = f.baseIntensity * (0.93 + 0.07*Math.sin(elapsed*120 + f.flicker));
    if(Math.random() < (f.stutter ? 0.07 : 0.005)){
      intensity *= 0.2;
      if(audio) audio.buzzFlicker();
    }
    f.light.intensity = intensity * 1.6;
    f.tube.material.color.setRGB(1, 0.95*(0.85+0.15*intensity), 0.83*(0.85+0.15*intensity));
    f.halo.material.uniforms.uTime.value = elapsed;
    f.halo.material.uniforms.uIntensity.value = intensity;
  }

  // ---------- Tile shader time ----------
  tileMat.uniforms.uTime.value = elapsed;
  tunnelMat.uniforms.uTime.value = elapsed;
  if(train.userData.beamMat) train.userData.beamMat.uniforms.uTime.value = elapsed;

  // ---------- Dust drift ----------
  const dpos = dust.geometry.attributes.position.array;
  for(let i=0;i<dustCount;i++){
    dpos[i*3]   += dustVel[i*3] * dt;
    dpos[i*3+1] += Math.sin(elapsed*0.5 + i*0.13)*0.008*dt + dustVel[i*3+1]*dt;
    dpos[i*3+2] += dustVel[i*3+2] * dt;
    if(dpos[i*3] > 30) dpos[i*3] = -30;
    if(dpos[i*3] < -30) dpos[i*3] = 30;
    if(dpos[i*3+1] < 0.1) dpos[i*3+1] = 4;
    if(dpos[i*3+1] > 4.5) dpos[i*3+1] = 0.2;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // ---------- Rats ----------
  for(let i = rats.length-1; i >= 0; i--){
    const r = rats[i];
    r.userData.life -= dt;
    r.userData.heading += (Math.random()-0.5)*dt*4;
    const sp = 1.4 + Math.sin(elapsed*8 + i)*0.5;
    r.position.x += Math.cos(r.userData.heading) * sp * dt;
    r.position.z += Math.sin(r.userData.heading) * sp * dt * 0.2;
    // bounce off platform edges
    if(r.position.x < -PLATFORM_LENGTH/2 + 0.5 || r.position.x > PLATFORM_LENGTH/2 - 0.5) r.userData.heading += Math.PI;
    r.position.z = Math.max(-PLATFORM_WIDTH/2 + 0.3, Math.min(PLATFORM_WIDTH/2 - 0.6, r.position.z));
    r.material.opacity = Math.min(1, r.userData.life / 2.0);
    if(r.userData.life <= 0){ scene.remove(r); rats.splice(i, 1); }
  }

  // ---------- Arrival state machine ----------
  if(arrival.state === ARRIVAL.IDLE){
    arrival.timer -= dt;
    countdownEl.textContent = 'ARRIVING IN: ' + fmtTime(arrival.timer);
    if(arrival.timer < 30 && arrival.timer > 0) countdownEl.classList.add('show');
    if(arrival.timer < 8) countdownEl.classList.add('urgent');
    if(arrival.timer <= 0) startApproach();
  }

  if(arrival.state === ARRIVAL.APPROACH){
    arrival.approachT += dt / 7.0; // 7 sec approach
    arrival.trainPos = THREE.MathUtils.lerp(-90, -PLATFORM_LENGTH/2 - 5, Math.min(1, arrival.approachT));
    arrival.trainSpeed = THREE.MathUtils.lerp(28, 16, Math.min(1, arrival.approachT));
    train.position.x = arrival.trainPos;
    // aim headlight forward (negative x direction relative to train head)
    if(train.userData.headlight) train.userData.headlight.target.position.set(arrival.trainPos - 30, 1.0, PLATFORM_WIDTH/2 + 1.7);
    // tunnel shader headlight
    tunnelMat.uniforms.uHeadlight.value = THREE.MathUtils.lerp(0, 1.0, arrival.approachT);
    tunnelMat.uniforms.uHeadlightPos.value.set(arrival.trainPos - 5, 1.6, PLATFORM_WIDTH/2 + 1.7);
    // audio rumble crescendo
    if(audio){
      const k = Math.min(1, arrival.approachT);
      audio.rumbleGain.gain.setTargetAtTime(0.55*k, audio.ctx.currentTime, 0.4);
      audio.midG.gain.setTargetAtTime(0.32*k*k, audio.ctx.currentTime, 0.3);
    }
    if(arrival.approachT >= 1){
      arrival.state = ARRIVAL.BRAKING;
      arrival.brakeStartedAt = elapsed;
      if(audio){
        // whoosh peak
        audio.whooshG.gain.cancelScheduledValues(audio.ctx.currentTime);
        audio.whooshG.gain.setValueAtTime(0.0, audio.ctx.currentTime);
        audio.whooshG.gain.linearRampToValueAtTime(0.34, audio.ctx.currentTime + 0.4);
        audio.whooshG.gain.linearRampToValueAtTime(0.0, audio.ctx.currentTime + 3.5);
        audio.brakeGrind();
      }
    }
  }

  if(arrival.state === ARRIVAL.BRAKING){
    arrival.stopT += dt;
    const startX = -PLATFORM_LENGTH/2 - 5;
    const endX = -1.5; // train length 18.5; train origin centered, so end at x=endX puts middle window roughly at platform mid
    const k = Math.min(1, arrival.stopT / 3.5);
    const ease = 1 - Math.pow(1 - k, 3);
    train.position.x = THREE.MathUtils.lerp(startX, endX, ease);
    arrival.trainSpeed = (1 - ease) * 16;
    if(audio){
      audio.rumbleGain.gain.setTargetAtTime(0.55*(1-ease), audio.ctx.currentTime, 0.5);
      audio.midG.gain.setTargetAtTime(0.32*(1-ease), audio.ctx.currentTime, 0.5);
    }
    if(k >= 1){
      arrival.state = ARRIVAL.STOPPED;
      arrival.stopT = 0;
      // turn on interior lights
      train.userData.interiorLight.intensity = 1.2;
      for(const w of train.userData.windows) w.material.color.setRGB(1.0, 0.95, 0.83);
      // turn beam down (still on)
      if(train.userData.beamMat) train.userData.beamMat.uniforms.uIntensity.value = 0.4;
      if(train.userData.headlight) train.userData.headlight.intensity = 2;
      if(audio){ audio.doorHiss(); audio.chime(); }
    }
  }

  if(arrival.state === ARRIVAL.STOPPED){
    arrival.stopT += dt;
    if(arrival.stopT > 0.7){
      arrival.state = ARRIVAL.DOORS_OPEN;
      arrival.doorT = 0;
    }
  }

  if(arrival.state === ARRIVAL.DOORS_OPEN){
    arrival.doorT = Math.min(1, arrival.doorT + dt / 1.4);
    for(const d of train.userData.doors){
      d.lh.position.x = -arrival.doorT * 0.42;
      d.rh.position.x =  arrival.doorT * 0.42;
    }
    if(arrival.doorT >= 1){
      arrival.state = ARRIVAL.BOARDING_WINDOW;
      arrival.stopT = 0;
      countdownEl.classList.remove('urgent');
      countdownEl.classList.remove('show');
      if(audio) audio.announcement();
      if(!player.onTrain) boardHintEl.classList.add('show');
    }
  }

  if(arrival.state === ARRIVAL.BOARDING_WINDOW){
    arrival.stopT += dt;
    if(arrival.stopT > 7.5){
      arrival.state = ARRIVAL.DOORS_CLOSING;
      arrival.doorT = 1;
      boardHintEl.classList.remove('show');
      if(audio) { audio.chime(); audio.doorHiss(); }
    }
  }

  if(arrival.state === ARRIVAL.DOORS_CLOSING){
    arrival.doorT = Math.max(0, arrival.doorT - dt / 1.4);
    for(const d of train.userData.doors){
      d.lh.position.x = -arrival.doorT * 0.42;
      d.rh.position.x =  arrival.doorT * 0.42;
    }
    if(arrival.doorT <= 0){
      arrival.state = ARRIVAL.DEPARTING;
      arrival.departT = 0;
      if(audio){
        if(player.onTrain){
          // onboard sounds ramp up
          audio.onboardG.gain.setTargetAtTime(0.32, audio.ctx.currentTime, 0.5);
        }
      }
    }
  }

  if(arrival.state === ARRIVAL.DEPARTING){
    arrival.departT += dt;
    const k = Math.min(1, arrival.departT / 6.0);
    const eased = k*k;
    const startX = train.position.x;
    train.position.x = startX + eased * dt * 22;
    // rumble back up briefly
    if(audio){
      audio.rumbleGain.gain.setTargetAtTime(0.4 * (1 - k*0.6), audio.ctx.currentTime, 0.4);
      audio.midG.gain.setTargetAtTime(0.22 * (1 - k*0.5), audio.ctx.currentTime, 0.4);
    }
    if(train.position.x > 60){
      arrival.state = ARRIVAL.GONE;
      train.visible = false;
      if(!player.onTrain){
        // reset for next arrival
        setTimeout(() => {
          train.position.x = -90;
          arrival.state = ARRIVAL.IDLE;
          arrival.timer = 45;
          arrival.approachT = 0;
          arrival.stopT = 0;
          arrival.doorT = 0;
          arrival.departT = 0;
          if(audio){
            audio.rumbleGain.gain.setTargetAtTime(0, audio.ctx.currentTime, 1.0);
            audio.midG.gain.setTargetAtTime(0, audio.ctx.currentTime, 1.0);
            audio.whooshG.gain.setTargetAtTime(0, audio.ctx.currentTime, 1.0);
          }
        }, 6000);
      }
    }
  }
}

function loop(){
  const dt = Math.min(0.05, clock.getDelta());
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
