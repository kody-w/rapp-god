        window.AudioContext = PatchedAC;

          m.name = 'viewport';

<script type="module">
import * as THREE from 'three';

/* ===========================================================
   THE EMPTY CINEMA — single-file flagship piece
   ROW 7 / SEAT 12 / 1940s art deco house
   =========================================================== */

// ---------- Globals ----------
const canvas = document.getElementById('cv');
const introEl = document.getElementById('intro');
const filmTitleEl = document.getElementById('film-title');
const statusFlashEl = document.getElementById('status-flash');
const grainCanvas = document.getElementById('grain');
const scratchCanvas = document.getElementById('scratches');
const timeStampEl = document.getElementById('time-stamp');

const FILMS = [
  { id: 0, title: 'MARES OF THE DEEP', mood: 'organic',     palette: [0.04, 0.06, 0.10, 0.85, 0.55, 0.20] },
  { id: 1, title: 'LIQUID HORIZON',   mood: 'liquidmetal',  palette: [0.50, 0.55, 0.62, 0.20, 0.18, 0.16] },
  { id: 2, title: 'STAR THREADS',     mood: 'strings',      palette: [0.10, 0.05, 0.14, 0.95, 0.78, 0.40] },
  { id: 3, title: 'MIRROR MIRROR',    mood: 'kaleidoscope', palette: [0.30, 0.10, 0.20, 0.90, 0.70, 0.30] },
  { id: 4, title: 'THE STILL FRAME',  mood: 'monochrome',   palette: [0.02, 0.02, 0.02, 1.00, 0.95, 0.92] },
];

const state = {
  filmIndex: 0,
  curtainPhase: 0,        // 0 = open, 1 = fully closed
  curtainTarget: 0,
  curtainTimer: 0,
  shiftHeld: 0,
  shiftActiveOther: false,
  usherActive: false,
  usherT: 0,
  audioReady: false,
  started: false,
  pointer: { x: 0, y: 0, dragging: false, lastX: 0, lastY: 0, yaw: 0, pitch: 0 },
};

// ---------- Renderer / Scene / Camera ----------
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setClearColor(0x040202, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0606, 0.035);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
// Row 7, seat 12. Aisle at x=0, seats fan symmetrically. Each row ~1.2m apart, screen forward.
const ROW_SPACING = 1.25;
const SEAT_SPACING = 0.95;
const ROWS = 12;
const SEATS_PER_ROW = 16;
const CAMERA_HOME = new THREE.Vector3(
  (12 - SEATS_PER_ROW / 2 - 0.5) * SEAT_SPACING * 0.55,
  1.55,
  -2.0 + (7 - 1) * ROW_SPACING * 0.6
);
camera.position.copy(CAMERA_HOME);
camera.lookAt(0, 2.4, -14);

// ---------- Lights ----------
const hemi = new THREE.HemisphereLight(0x2a1a14, 0x080404, 0.18);
scene.add(hemi);

const screenLight = new THREE.PointLight(0xfff0c8, 0.6, 28, 1.6);

// ---------- Shared GLSL helpers ----------
const GLSL_NOISE = `
  // hash + value noise + fbm (Inigo Quilez style)
  float hash11(float p){ p = fract(p*0.1031); p *= p+33.33; p *= p+p; return fract(p); }
  float hash12(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
  vec3 hash33(vec3 p){
    p = vec3( dot(p,vec3(127.1,311.7, 74.7)),
              dot(p,vec3(269.5,183.3,246.1)),
              dot(p,vec3(113.5,271.9,124.6)) );
    return -1.0 + 2.0*fract(sin(p)*43758.5453123);
  }
  float vnoise(vec3 p){
    vec3 i = floor(p); vec3 f = fract(p);
    vec3 u = f*f*(3.0-2.0*f);
    float n000 = dot(hash33(i+vec3(0,0,0)), f-vec3(0,0,0));
    float n100 = dot(hash33(i+vec3(1,0,0)), f-vec3(1,0,0));
    float n010 = dot(hash33(i+vec3(0,1,0)), f-vec3(0,1,0));
    float n110 = dot(hash33(i+vec3(1,1,0)), f-vec3(1,1,0));
    float n001 = dot(hash33(i+vec3(0,0,1)), f-vec3(0,0,1));
    float n101 = dot(hash33(i+vec3(1,0,1)), f-vec3(1,0,1));
    float n011 = dot(hash33(i+vec3(0,1,1)), f-vec3(0,1,1));
    float n111 = dot(hash33(i+vec3(1,1,1)), f-vec3(1,1,1));
    float nx00 = mix(n000,n100,u.x); float nx10 = mix(n010,n110,u.x);
    float nx01 = mix(n001,n101,u.x); float nx11 = mix(n011,n111,u.x);
    float nxy0 = mix(nx00,nx10,u.y); float nxy1 = mix(nx01,nx11,u.y);
    return mix(nxy0,nxy1,u.z);
  }
  float fbm(vec3 p){
    float a=0.5, s=0.0;
    for(int i=0;i<5;i++){ s += a*vnoise(p); p*=2.03; a*=0.5; }
    return s;
  }
  float fbm2(vec2 p){
    float a=0.5, s=0.0;
    for(int i=0;i<5;i++){ s += a*vnoise(vec3(p,0.0)); p*=2.07; a*=0.5; }
    return s;
  }
`;

// SCREEN — procedural film shader (5 modes)
// ============================================================
const screenUniforms = {
  uTime: { value: 0 },
  uFilm: { value: 0 },
  uPaletteA: { value: new THREE.Vector3(...FILMS[0].palette.slice(0,3)) },
  uPaletteB: { value: new THREE.Vector3(...FILMS[0].palette.slice(3,6)) },
  uIntensity: { value: 1.0 },
};

const screenMat = new THREE.ShaderMaterial({
  uniforms: screenUniforms,
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;
    uniform int uFilm;
    uniform vec3 uPaletteA;
    uniform vec3 uPaletteB;
    uniform float uIntensity;
    ${GLSL_NOISE}

    // ---- film 0: organic blobs (mares of the deep) ----
    vec3 filmOrganic(vec2 p, float t){
      vec2 q = p*1.4;
      float n1 = fbm(vec3(q*1.5, t*0.10));
      float n2 = fbm(vec3(q*0.7 + n1, t*0.07));
      float blob = smoothstep(0.32, 0.78, n2);
      vec3 col = mix(uPaletteA, uPaletteB, blob);
      // dark "currents"
      float c = fbm(vec3(q*4.0 + t*0.02, t*0.05));
      col -= 0.18 * smoothstep(0.55, 0.85, c);
      // soft glow rim
      col += 0.12 * vec3(0.95, 0.7, 0.4) * pow(smoothstep(0.6, 0.95, n2), 3.0);
      return col;
    }

    // ---- film 1: liquid metal ----
    vec3 filmMetal(vec2 p, float t){
      vec2 q = p*2.0;
      float n = fbm(vec3(q*1.8 + vec2(t*0.06,0), t*0.04));
      float m = fbm(vec3(q*4.0 - n*1.4, t*0.10));
      float spec = pow(0.5 + 0.5*sin(6.2831*m + n*5.0 + t*0.8), 6.0);
      vec3 base = mix(uPaletteA, uPaletteB, n*0.5+0.5);
      base += spec * vec3(0.95, 0.9, 0.82);
      // ripple bands
      float band = sin(p.y*22.0 + n*4.0 + t*0.5);
      base += 0.06 * band;
      return base;
    }

    // ---- film 2: bloomed strings ----
    vec3 filmStrings(vec2 p, float t){
      vec3 col = vec3(0.0);
      for (int i=0; i<7; i++){
        float fi = float(i);
        float angle = fi*0.42 + t*0.05;
        vec2 dir = vec2(cos(angle), sin(angle));
        float d = abs(dot(p - vec2(sin(t*0.07+fi)*0.2, cos(t*0.05+fi)*0.15), dir));
        d -= 0.02*sin(p.x*8.0 + t*0.6 + fi);
        float line = exp(-d*32.0);
        vec3 c = mix(uPaletteA, uPaletteB, fract(fi*0.31 + t*0.02));
        col += line * c;
      }
      // bloom-y dust haze
      float h = fbm(vec3(p*3.0, t*0.05));
      col += 0.18 * uPaletteB * h;
      return col;
    }

    // ---- film 3: kaleidoscope ----
    vec3 filmKaleido(vec2 p, float t){
      float ang = atan(p.y, p.x);
      float r = length(p);
      float seg = 6.0;
      ang = mod(ang, 6.2831/seg);
      ang = abs(ang - 3.1415/seg);
      vec2 q = vec2(cos(ang), sin(ang)) * r;
      float n = fbm(vec3(q*4.0, t*0.15));
      float m = fbm(vec3(q*8.0 + n, t*0.10));
      vec3 col = mix(uPaletteA, uPaletteB, m);
      col += 0.4 * vec3(0.9,0.7,0.5) * pow(smoothstep(0.5, 1.0, m), 4.0);
      // dark vignette into center
      col *= smoothstep(0.0, 0.15, r);
      return col;
    }

    // ---- film 4: stark monochrome shadows ----
    vec3 filmMono(vec2 p, float t){
      vec2 q = p*1.2;
      float silhouette = fbm(vec3(q*1.5, t*0.04));
      silhouette += 0.4*fbm(vec3(q*5.0, t*0.02));
      float shape = smoothstep(0.45, 0.55, silhouette);
      // light from one side
      float light = smoothstep(-0.4, 0.5, p.x + 0.3*sin(t*0.1));
      float v = mix(0.95, 0.05, shape) * (0.4 + 0.6*light);
      vec3 col = vec3(v);
      // tint paper-warm
      col *= vec3(1.02, 0.97, 0.88);
      return col;
    }

    void main(){
      vec2 p = vUv * 2.0 - 1.0;
      // aspect correction (screen is wide)
      p.x *= 1.85;
      float t = uTime;

      vec3 col = vec3(0.0);
      if (uFilm == 0) col = filmOrganic(p, t);
      else if (uFilm == 1) col = filmMetal(p, t);
      else if (uFilm == 2) col = filmStrings(p, t);
      else if (uFilm == 3) col = filmKaleido(p, t);
      else col = filmMono(p, t);

      // 24fps shutter flicker
      float shutter = 0.96 + 0.04 * step(0.5, fract(t*24.0));
      col *= shutter;

      // film grain
      float g = (hash12(vUv*1024.0 + t*60.0) - 0.5) * 0.10;
      col += g;

      // light vignette inside frame
      float r = length(vUv - 0.5);
      col *= smoothstep(0.85, 0.30, r);

      // rare hair / scratch
      float scratchX = step(0.9985, hash12(vec2(floor(vUv.x*120.0), floor(t*4.0))));
      col += scratchX * 0.4;

      col *= uIntensity;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  toneMapped: true,
});

// CURTAIN — vertical fold normals + crimson palette
// ============================================================
const curtainUniforms = {
  uTime: { value: 0 },
  uPhase: { value: 0 }, // 0 open .. 1 closed
};
const curtainMat = new THREE.ShaderMaterial({
  uniforms: curtainUniforms,
  side: THREE.DoubleSide,
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vN;
    varying vec3 vWorld;
    uniform float uTime;
    uniform float uPhase;
    void main(){
      vUv = uv;
      vec3 p = position;
      // vertical folds — wave displacement on Z (curtain hangs along XY)
      float fold = sin(uv.x * 28.0) * 0.12;
      float drape = sin(uv.x * 6.2831 * 3.0 + uTime*0.3) * 0.04;
      p.z += fold + drape * (1.0 - uv.y);
      // closing animation: gather toward center as phase -> 1, dropping height (rolling top)
      float closed = uPhase;
      p.y -= (1.0 - uv.y) * 0.0;
      // inward gather
      p.x *= mix(1.0, 0.05 + 0.95*(1.0-pow(closed,0.6)), 0.0); // base x preserved
      // height shrink from top: when closed, the curtain "rolls down" -- y is mapped from full height (top=1) towards bottom
      float fullH = 1.0; // uv.y in [0,1]
      // we keep mesh anchored top: when closed, lower edge moves up.
      float bottomLift = (1.0 - uv.y) * (closed) * 0.0; // we'll handle drop via y scale outside
      vN = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(p, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vN;
    varying vec3 vWorld;
    uniform float uTime;
    uniform float uPhase;
    ${GLSL_NOISE}

    void main(){
      // crimson velvet palette
      vec3 deep = vec3(0.18, 0.02, 0.03);
      vec3 mid  = vec3(0.55, 0.05, 0.06);
      vec3 hi   = vec3(0.85, 0.20, 0.16);
      // vertical fold band
      float band = 0.5 + 0.5*sin(vUv.x * 28.0);
      band = pow(band, 2.0);
      // micro nap (velvet)
      float nap = fbm(vec3(vUv*180.0, 0.0));
      nap = smoothstep(0.4, 0.7, nap);

      vec3 col = mix(deep, mid, band);
      col = mix(col, hi, smoothstep(0.45, 0.95, band) * 0.7);
      col += nap * 0.05;

      // dust on the bottom hem
      float hem = smoothstep(0.0, 0.18, vUv.y);
      col *= 0.55 + 0.45*hem;

      // soft top shadow
      float top = smoothstep(0.85, 1.0, vUv.y);
      col *= 1.0 - 0.35*top;

      // gold-leaf trim hint at hem edges
      float trim = smoothstep(0.0, 0.012, vUv.y) * (1.0 - smoothstep(0.012, 0.022, vUv.y));
      col += trim * vec3(0.8, 0.6, 0.25);

      // light from screen / projector — assume screen behind, brighten when closed (lit by beam)
      float litByBeam = uPhase;
      col += litByBeam * vec3(0.18, 0.05, 0.04) * smoothstep(0.2, 0.8, vUv.y);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const beamUniforms = {
  uTime: { value: 0 },
  uPhase: { value: 0 },
};
const beamMat = new THREE.ShaderMaterial({
  uniforms: beamUniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  vertexShader: `
    varying vec3 vLocal;
    varying vec2 vUv;
    void main(){
      vLocal = position;
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec3 vLocal;
    varying vec2 vUv;
    uniform float uTime;
    uniform float uPhase;
    ${GLSL_NOISE}
    void main(){
      // cone aligned along -Y in local (will be rotated/oriented in scene)
      // vUv.y goes from 0 (apex) to 1 (base). vUv.x goes around angle.
      float t = uTime;
      float along = vUv.y;
      // density along axis: thicker near projector, thinner near screen, slight pulse
      float dens = mix(1.0, 0.55, along);
      // 24fps shutter flicker
      float shutter = 0.85 + 0.15 * step(0.5, fract(t*24.0));
      dens *= shutter;
      // fbm dust scrolling along axis
      vec2 q = vec2(vUv.x*4.0, along*8.0 - t*0.45);
      float n = fbm(vec3(q, t*0.08));
      n = smoothstep(0.25, 0.85, n);
      // radial soft falloff
      // fake: plain cone, edges already taper. But add subtle inner core.
      float core = smoothstep(0.9, 0.0, abs(vUv.x - 0.5)*2.0);
      float a = dens * (0.18 + 0.55*n) * (0.5 + 0.5*core);
      // boost when curtain closed (visible on curtain)
      a *= mix(1.0, 1.15, uPhase);
      // warm tungsten color
      vec3 col = mix(vec3(1.0, 0.92, 0.74), vec3(1.0, 0.78, 0.45), 1.0-along);
      col *= 0.55;
      gl_FragColor = vec4(col * a, a);
    }
  `,
});

// We construct an oriented cone from balcony (back, high) to screen.
const PROJ_ORIGIN = new THREE.Vector3(0, 5.6, 4.5);
const PROJ_TARGET = new THREE.Vector3(0, 3.4, -13.4);
const beamLen = PROJ_ORIGIN.distanceTo(PROJ_TARGET);
const beamGeo = new THREE.ConeGeometry(2.6, beamLen, 48, 1, true);
const beamMesh = new THREE.Mesh(beamGeo, beamMat);
// position it midway, oriented along axis from origin to target
{
  const mid = PROJ_ORIGIN.clone().add(PROJ_TARGET).multiplyScalar(0.5);
  beamMesh.position.copy(mid);
  // cone default axis is +Y, apex at +Y/2. We want apex at PROJ_ORIGIN (which is +Y end), base at PROJ_TARGET.
  // Therefore axis vector = target - origin (downward toward screen).
  const axis = PROJ_TARGET.clone().sub(PROJ_ORIGIN).normalize();
  // align +Y to -axis (so apex points to origin, base to target). Default cone apex is at +Y,
  // so we want +Y pointing toward PROJ_ORIGIN.
  const desiredUp = PROJ_ORIGIN.clone().sub(PROJ_TARGET).normalize();
  const up = new THREE.Vector3(0,1,0);
  const q = new THREE.Quaternion().setFromUnitVectors(up, desiredUp);
  beamMesh.quaternion.copy(q);
}
scene.add(beamMesh);

// DUST MOTES — instanced billboards, only visible inside cone
// ============================================================
const NUM_MOTES = 5000;
const moteGeo = new THREE.PlaneGeometry(0.012, 0.012);
const motesUniforms = {
  uTime: { value: 0 },
  uProjOrigin: { value: PROJ_ORIGIN.clone() },
  uProjTarget: { value: PROJ_TARGET.clone() },
  uConeAngle: { value: Math.tan(THREE.MathUtils.degToRad(7.0)) }, // tan(half-angle)
  uExposure: { value: 1.0 },
};
const motesMat = new THREE.ShaderMaterial({
  uniforms: motesUniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute vec3 iSeed;
    attribute float iSize;
    varying float vBeamMask;
    varying vec2 vUv;
    varying float vBright;
    uniform float uTime;
    uniform vec3 uProjOrigin;
    uniform vec3 uProjTarget;
    uniform float uConeAngle;
    ${GLSL_NOISE}

    void main(){
      vUv = uv;
      // base anchor in a roomy volume
      vec3 anchor = iSeed * vec3(7.0, 4.5, 12.0); // distributed roughly through audience hall
      anchor += vec3(0.0, 2.4, -4.0);
      // slow tumble drift via fbm
      float t = uTime * 0.05;
      vec3 drift;
      drift.x = (fbm(vec3(iSeed*4.0 + t, iSeed.y*3.0, iSeed.z + t)) - 0.5) * 1.6;
      drift.y = (fbm(vec3(iSeed.y*5.0 + t*1.3, iSeed.z*4.0, iSeed.x)) - 0.5) * 1.0;
      drift.z = (fbm(vec3(iSeed.z*4.0 - t, iSeed.x*5.0, iSeed.y + t*0.7)) - 0.5) * 1.4;
      // slow vertical settling
      drift.y -= mod(uTime*0.04 + iSeed.x*7.13, 1.0) * 0.5;

      vec3 worldPos = anchor + drift;

      // cone visibility test: project onto axis
      vec3 axis = normalize(uProjTarget - uProjOrigin);
      vec3 toMote = worldPos - uProjOrigin;
      float along = dot(toMote, axis);
      float lenAxis = length(uProjTarget - uProjOrigin);
      float t01 = clamp(along / lenAxis, 0.0, 1.0);
      // perpendicular distance to axis
      vec3 axisPoint = uProjOrigin + axis * along;
      float perp = length(worldPos - axisPoint);
      // cone radius at this along
      float coneR = mix(0.05, lenAxis*uConeAngle, t01);
      float inCone = 1.0 - smoothstep(coneR*0.5, coneR, perp);
      // also clip outside [0..len] band
      inCone *= step(0.02, t01) * step(t01, 0.98);
      vBeamMask = inCone;
      // brightness: highest near beam center axis, falls off with distance from center
      float radial = 1.0 - smoothstep(0.0, coneR, perp);
      vBright = inCone * pow(radial, 1.4);

      // billboard the quad to camera
      vec4 mvAnchor = modelViewMatrix * vec4(worldPos, 1.0);
      vec3 offset = vec3(position.xy * iSize, 0.0);
      mvAnchor.xyz += offset;
      gl_Position = projectionMatrix * mvAnchor;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying float vBeamMask;
    varying vec2 vUv;
    varying float vBright;
    void main(){
      vec2 p = vUv - 0.5;
      float r = length(p);
      float disk = smoothstep(0.5, 0.0, r);
      // soft glow halo
      float halo = exp(-r*r*22.0);
      float a = (disk*0.7 + halo*0.4) * vBeamMask * (0.55 + 0.55*vBright);
      vec3 col = mix(vec3(1.0, 0.94, 0.78), vec3(1.0, 0.85, 0.55), 1.0-vBright);
      gl_FragColor = vec4(col * a, a);
    }
  `,
});

const motesInstanced = new THREE.InstancedMesh(moteGeo, motesMat, NUM_MOTES);
{
  const seeds = new Float32Array(NUM_MOTES * 3);

// build a stylized seat: a base, a back, and "armrests" via a single merged box approach (kept low poly)
function buildSeatGeo(){
  const seat = new THREE.BoxGeometry(0.55, 0.18, 0.55, 1, 1, 1);
  seat.translate(0, 0.30, 0);
  const back = new THREE.BoxGeometry(0.55, 0.85, 0.18, 1, 2, 1);
  back.translate(0, 0.85, -0.20);
  // merge by hand (simple): we just create a group geo using BufferGeometryUtils-style concat
  const merged = new THREE.BufferGeometry();
  // since BufferGeometryUtils import isn't loaded, we'll merge by attribute concat:
  function concat(a, b){
    const out = new THREE.BufferGeometry();
    const aPos = a.attributes.position.array;
    const bPos = b.attributes.position.array;
    const aN = a.attributes.normal.array;
    const bN = b.attributes.normal.array;
    const aUv = a.attributes.uv.array;
    const bUv = b.attributes.uv.array;
    const pos = new Float32Array(aPos.length + bPos.length);
    pos.set(aPos, 0); pos.set(bPos, aPos.length);
    const norm = new Float32Array(aN.length + bN.length);
    norm.set(aN, 0); norm.set(bN, aN.length);
    const uv = new Float32Array(aUv.length + bUv.length);
    uv.set(aUv, 0); uv.set(bUv, aUv.length);
    out.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    out.setAttribute('normal', new THREE.BufferAttribute(norm, 3));
    out.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
    // index: convert non-indexed if needed
    const aIdx = a.index ? Array.from(a.index.array) : null;
    const bIdx = b.index ? Array.from(b.index.array) : null;
    if (aIdx && bIdx){
      const offset = aPos.length / 3;
      const idx = aIdx.concat(bIdx.map(v => v + offset));
      out.setIndex(idx);
    }
    return out;
  }
  return concat(seat, back);
}

let audioCtx = null;
const audio = {
  master: null,
  rainBus: null,
  hum: null,
  projector: null,
  ambientBus: null,
  ambientGain: null,
  filmAmbient: null,   // current film's ambient nodes group
  fabricGain: null,
};

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.value = 0.0;
  master.connect(audioCtx.destination);
  audio.master = master;

  // ramp up master after first user gesture
  master.gain.setTargetAtTime(0.7, audioCtx.currentTime, 1.2);

  // ---- rain on roof (filtered noise) ----
  const rainNoise = makePinkNoise(audioCtx, 4);
  const rainSrc = audioCtx.createBufferSource();
  rainSrc.buffer = rainNoise;
  rainSrc.loop = true;
  const rainLP = audioCtx.createBiquadFilter();
  rainLP.type = 'lowpass'; rainLP.frequency.value = 480; rainLP.Q.value = 0.4;
  const rainHP = audioCtx.createBiquadFilter();
  rainHP.type = 'highpass'; rainHP.frequency.value = 90;
  const rainGain = audioCtx.createGain();
  rainGain.gain.value = 0.20;
  rainSrc.connect(rainHP); rainHP.connect(rainLP); rainLP.connect(rainGain); rainGain.connect(master);
  rainSrc.start();

  // gentle dynamic gust LFO
  const rainLfo = audioCtx.createOscillator();
  rainLfo.frequency.value = 0.07;
  const rainLfoGain = audioCtx.createGain();
  rainLfoGain.gain.value = 0.06;
  rainLfo.connect(rainLfoGain); rainLfoGain.connect(rainGain.gain);
  rainLfo.start();

  // ---- hum (room tone) ----
  const hum = audioCtx.createOscillator();
  hum.type = 'sine';
  hum.frequency.value = 60;
  const humGain = audioCtx.createGain();
  humGain.gain.value = 0.012;
  const humLP = audioCtx.createBiquadFilter();
  humLP.type = 'lowpass'; humLP.frequency.value = 200;
  hum.connect(humLP); humLP.connect(humGain); humGain.connect(master);
  hum.start();
  audio.hum = humGain;

  // ---- 24fps projector clatter ----
  // schedule at exactly 24 Hz: a sharp clack + bandpass-noise mechanical body
  audio.projector = scheduleProjector(audioCtx, master);

  // ---- ambient bus for per-film beds ----
  const ambientBus = audioCtx.createGain();
  ambientBus.gain.value = 0.5;
  ambientBus.connect(master);
  audio.ambientBus = ambientBus;
  setFilmAmbient(state.filmIndex);

  // ---- rare fabric rustle ----
  audio.fabricGain = audioCtx.createGain();
  audio.fabricGain.gain.value = 0.0;
  audio.fabricGain.connect(master);
  scheduleFabric();

  state.audioReady = true;
}

function makePinkNoise(ctx, seconds){
  const sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, sr*seconds, sr);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i=0;i<d.length;i++){
    const w = Math.random()*2-1;
    b0 = 0.99886*b0 + w*0.0555179;
    b1 = 0.99332*b1 + w*0.0750759;
    b2 = 0.96900*b2 + w*0.1538520;
    b3 = 0.86650*b3 + w*0.3104856;
    b4 = 0.55000*b4 + w*0.5329522;
    b5 = -0.7616*b5 - w*0.0168980;
    d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
    b6 = w*0.115926;
  }
  return buf;
}

function makeWhiteNoise(ctx, seconds){
  const sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, sr*seconds, sr);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  return buf;
}

function scheduleProjector(ctx, dest){
  // 24Hz tempo. Each "frame" emits a sharp click + a brief mechanical noise burst.
  const projGain = ctx.createGain();
  projGain.gain.value = 0.18;
  projGain.connect(dest);
  // bandpass noise body
  const noiseBuf = makeWhiteNoise(ctx, 2);
  // We'll generate per-frame impulses via setInterval-driven scheduling at audio time.
  let nextTime = ctx.currentTime + 0.2;
  const period = 1/24; // exactly 24fps
  const lookahead = 0.1; // schedule 100ms ahead
  function tick(){
    while (nextTime < ctx.currentTime + lookahead){
      // 1) click (very short tone burst)
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 880 + Math.random()*120;
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.0, nextTime);
      og.gain.linearRampToValueAtTime(0.10, nextTime + 0.0006);
      og.gain.exponentialRampToValueAtTime(0.0005, nextTime + 0.012);
      osc.connect(og); og.connect(projGain);
      osc.start(nextTime); osc.stop(nextTime + 0.02);

      // 2) bandpass noise burst (mechanical body)
      const ns = ctx.createBufferSource();
      ns.buffer = noiseBuf;
      const nbp = ctx.createBiquadFilter();
      nbp.type = 'bandpass';
      nbp.frequency.value = 1800 + Math.random()*400;
      nbp.Q.value = 6;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.0, nextTime);
      ng.gain.linearRampToValueAtTime(0.04, nextTime + 0.001);
      ng.gain.exponentialRampToValueAtTime(0.0005, nextTime + 0.018);
      ns.connect(nbp); nbp.connect(ng); ng.connect(projGain);
      ns.start(nextTime + 0.0005); ns.stop(nextTime + 0.04);

      // 3) low thump (every other frame for sub presence)
      if (Math.random() < 0.5){
        const lo = ctx.createOscillator();
        lo.type = 'sine';
        lo.frequency.value = 70 + Math.random()*20;
        const lg = ctx.createGain();
        lg.gain.setValueAtTime(0.0, nextTime);
        lg.gain.linearRampToValueAtTime(0.03, nextTime + 0.002);
        lg.gain.exponentialRampToValueAtTime(0.0003, nextTime + 0.06);
        lo.connect(lg); lg.connect(projGain);
        lo.start(nextTime); lo.stop(nextTime + 0.08);
      }

      nextTime += period;
    }
    setTimeout(tick, 25);
  }
  tick();
  return projGain;
}

function scheduleFabric(){
  if (!audioCtx) return;
  const next = 6 + Math.random()*16;
  setTimeout(() => {
    if (!state.audioReady) { scheduleFabric(); return; }
    const ctx = audioCtx;
    const ns = ctx.createBufferSource();
    ns.buffer = makeWhiteNoise(ctx, 1.5);
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 1.2;
    const g = ctx.createGain();
    const t0 = ctx.currentTime;
    g.gain.setValueAtTime(0.0, t0);
    g.gain.linearRampToValueAtTime(0.03, t0 + 0.5);
    g.gain.linearRampToValueAtTime(0.0, t0 + 1.4);
    ns.connect(bp); bp.connect(g); g.connect(audio.master);
    ns.start(t0); ns.stop(t0 + 1.4);
    scheduleFabric();
  }, next * 1000);
}

function setFilmAmbient(idx){
  if (!audioCtx) return;
  // tear down previous
  if (audio.filmAmbient){
    try {
      audio.filmAmbient.gain.gain.cancelScheduledValues(audioCtx.currentTime);
      audio.filmAmbient.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.6);
      const old = audio.filmAmbient;
      setTimeout(() => {
        try { old.nodes.forEach(n => { try { n.stop && n.stop(); } catch(e){} }); } catch(e){}
        try { old.gain.disconnect(); } catch(e){}
      }, 1800);
    } catch(e){}
  }
  const film = FILMS[idx];
  const g = audioCtx.createGain();
  g.gain.value = 0.0;
  g.connect(audio.ambientBus);
  g.gain.setTargetAtTime(0.55, audioCtx.currentTime + 0.3, 0.9);

  const nodes = [];
  if (film.mood === 'organic'){
    // warm low pad (two slightly detuned sines + filter)
    [0, 7, 12].forEach((semi, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = 110 * Math.pow(2, semi/12);
      o.detune.value = (Math.random()-0.5)*8;
      const og = audioCtx.createGain();
      og.gain.value = 0.05 - i*0.012;
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 600; lp.Q.value = 0.7;
      o.connect(lp); lp.connect(og); og.connect(g);
      o.start(); nodes.push(o);
    });
  } else if (film.mood === 'liquidmetal'){
    // filtered noise gusts
    const n = audioCtx.createBufferSource();
    n.buffer = makePinkNoise(audioCtx, 6); n.loop = true;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 2.5;
    const ng = audioCtx.createGain(); ng.gain.value = 0.18;
    n.connect(bp); bp.connect(ng); ng.connect(g);
    n.start(); nodes.push(n);
    // sweep LFO
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.08;
    const lfg = audioCtx.createGain(); lfg.gain.value = 600;
    lfo.connect(lfg); lfg.connect(bp.frequency);
    lfo.start(); nodes.push(lfo);
  } else if (film.mood === 'strings'){
    // shimmery harmonics cluster
    [220, 277, 330, 440, 554].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'triangle';
      o.frequency.value = f;
      const og = audioCtx.createGain();
      og.gain.value = 0.02;
      o.connect(og); og.connect(g);
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.1 + i*0.07;
      const lfg = audioCtx.createGain(); lfg.gain.value = 0.015;
      lfo.connect(lfg); lfg.connect(og.gain);
      lfo.start(); o.start();
      nodes.push(o, lfo);
    });
  } else if (film.mood === 'kaleidoscope'){
    // bell-like with delay-ish
    const o1 = audioCtx.createOscillator();
    o1.type = 'sine'; o1.frequency.value = 392;
    const o2 = audioCtx.createOscillator();
    o2.type = 'sine'; o2.frequency.value = 587;
    const og = audioCtx.createGain(); og.gain.value = 0.04;
    const trem = audioCtx.createOscillator(); trem.frequency.value = 0.6;
    const tg = audioCtx.createGain(); tg.gain.value = 0.025;
    trem.connect(tg); tg.connect(og.gain);
    o1.connect(og); o2.connect(og); og.connect(g);
    trem.start(); o1.start(); o2.start();
    nodes.push(o1, o2, trem);
  } else {
    // monochrome: very low drone + occasional tape hiss
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = 55;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 180;
    const og = audioCtx.createGain(); og.gain.value = 0.06;
    o.connect(lp); lp.connect(og); og.connect(g);
    o.start(); nodes.push(o);
    const hiss = audioCtx.createBufferSource();
    hiss.buffer = makeWhiteNoise(audioCtx, 4); hiss.loop = true;
    const hg = audioCtx.createGain(); hg.gain.value = 0.015;
    const hbp = audioCtx.createBiquadFilter();
    hbp.type = 'highpass'; hbp.frequency.value = 4000;
    hiss.connect(hbp); hbp.connect(hg); hg.connect(g);
    hiss.start(); nodes.push(hiss);
  }

  audio.filmAmbient = { gain: g, nodes };
}

function resizeOverlays(){

    c.width = Math.floor(window.innerWidth * 0.5);

const grainCtx = grainCanvas.getContext('2d');
const scratchCtx = scratchCanvas.getContext('2d');

function drawGrain(){
  const w = grainCanvas.width, h = grainCanvas.height;
  const img = grainCtx.createImageData(w, h);
  const d = img.data;
  for (let i=0; i<d.length; i+=4){
    const v = (Math.random()*255)|0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  grainCtx.putImageData(img, 0, 0);
}

let scratchFrame = 0;
function drawScratches(){
  scratchFrame++;
  scratchCtx.clearRect(0, 0, scratchCanvas.width, scratchCanvas.height);
  if ((scratchFrame % 4) !== 0) return;
  scratchCtx.strokeStyle = 'rgba(255, 240, 200, 0.55)';
  scratchCtx.lineWidth = 1;
  const n = (Math.random() < 0.3) ? 1 + (Math.random()*2|0) : 0;
  for (let i=0; i<n; i++){
    const x = Math.random()*scratchCanvas.width;
    const yJ = Math.random()*8 - 4;
    scratchCtx.beginPath();
    scratchCtx.moveTo(x + yJ, 0);
    scratchCtx.lineTo(x - yJ, scratchCanvas.height);
    scratchCtx.stroke();
  }
  // occasional bright frame flash
  if (Math.random() < 0.005){
    scratchCtx.fillStyle = 'rgba(255,240,200,0.10)';
    scratchCtx.fillRect(0,0,scratchCanvas.width,scratchCanvas.height);
  }
}

}

function rollCurtain(){
  // toggle: if already rolling closed or already closed, open. Else close for 5s and auto-reopen.
  if (state.curtainTarget < 0.5){
    state.curtainTarget = 1.0;
    state.curtainTimer = 5.0; // hold closed for 5s
    flashStatus('CURTAIN');
  } else {
    state.curtainTarget = 0.0;
    state.curtainTimer = 0;
    flashStatus('CURTAIN');
  }
}

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (!state.started) return;
  state.shiftActiveOther = (e.key !== 'Shift');
  if (e.code === 'Space'){
    e.preventDefault();
    nextFilm();
  } else if (e.key === 'r' || e.key === 'R'){
    rollCurtain();
  }
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'Shift'){
    state.shiftHeld = 0;
  }
});

// SHIFT hold detection (track using interval since keydown repeats vary)
let shiftDown = false;
window.addEventListener('keydown', (e) => {
  if (e.key === 'Shift'){ shiftDown = true; }
  else { state.shiftHeld = 0; state.shiftActiveOther = true; }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'Shift'){ shiftDown = false; state.shiftHeld = 0; }
});

// mouse drag look — limited yaw/pitch
canvas.addEventListener('mousedown', (e) => {
  state.pointer.dragging = true;
  state.pointer.lastX = e.clientX;
  state.pointer.lastY = e.clientY;
});
window.addEventListener('mouseup', () => state.pointer.dragging = false);
window.addEventListener('mousemove', (e) => {
  if (!state.pointer.dragging) return;
  const dx = e.clientX - state.pointer.lastX;
  const dy = e.clientY - state.pointer.lastY;
  state.pointer.lastX = e.clientX;
  state.pointer.lastY = e.clientY;
  state.pointer.yaw += -dx * 0.0025;
  state.pointer.pitch += -dy * 0.0025;
  const maxYaw = 0.7, maxPitch = 0.35;
  state.pointer.yaw = Math.max(-maxYaw, Math.min(maxYaw, state.pointer.yaw));
  state.pointer.pitch = Math.max(-maxPitch, Math.min(maxPitch, state.pointer.pitch));
});

// touch drag
canvas.addEventListener('touchstart', (e) => {
  if (!e.touches[0]) return;
  state.pointer.dragging = true;
  state.pointer.lastX = e.touches[0].clientX;
  state.pointer.lastY = e.touches[0].clientY;
}, {passive: true});
canvas.addEventListener('touchend', () => state.pointer.dragging = false, {passive: true});
canvas.addEventListener('touchmove', (e) => {
  if (!state.pointer.dragging || !e.touches[0]) return;
  const dx = e.touches[0].clientX - state.pointer.lastX;
  const dy = e.touches[0].clientY - state.pointer.lastY;
  state.pointer.lastX = e.touches[0].clientX;
  state.pointer.lastY = e.touches[0].clientY;
  state.pointer.yaw += -dx * 0.0035;
  state.pointer.pitch += -dy * 0.0035;
  state.pointer.yaw = Math.max(-0.7, Math.min(0.7, state.pointer.yaw));
  state.pointer.pitch = Math.max(-0.35, Math.min(0.35, state.pointer.pitch));
}, {passive: true});

// resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ============================================================
// CURTAIN ANIMATION HELPER
// ============================================================
function applyCurtain(phase){
  // phase 0 = open (panels off-screen left/right). phase 1 = closed (meeting at center).
  // Each panel is 6m wide. Screen is 9.4m. Open: panels at x=±6.0 (just outside screen). Closed: x=±0 (overlapping center).
  const open = 7.2;   // outside screen
  const closed = 1.5; // overlap a bit
  const x = THREE.MathUtils.lerp(open, closed, phase);
  curtainL.position.x = -x;
  curtainR.position.x =  x;
  // also drop a bit when closing (drape feel)
  curtainL.position.y = 0.0 + Math.sin(performance.now()*0.0006)*0.01;
  curtainR.position.y = curtainL.position.y;
  // fold orientation
  curtainL.rotation.y = 0.05;
  curtainR.rotation.y = -0.05;
  // height: when closed, full; when open, also full (just out of frame)
  curtainGroup.position.set(0, 3.4, -13.4);
  curtainUniforms.uPhase.value = phase;
  // hide screen content very slightly when closed
  screenUniforms.uIntensity.value = THREE.MathUtils.lerp(1.0, 0.35, phase);
  // dim screen point light
  screenLight.intensity = THREE.MathUtils.lerp(0.6, 0.2, phase);
}

// ============================================================
// CLOCK FACE — back wall clock (decorative)
// ============================================================
function updateClock(){
  const now = new Date();
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = now.getMinutes().toString().padStart(2,'0');
  timeStampEl.textContent = `${hh} : ${mm}`;
}
setInterval(updateClock, 1000);
updateClock();

// ============================================================
// MAIN LOOP
// ============================================================
const clock = new THREE.Clock();
let acc = 0;

function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();
  acc += dt;

  // uniforms
  screenUniforms.uTime.value = t;
  curtainUniforms.uTime.value = t;
  beamUniforms.uTime.value = t;
  motesUniforms.uTime.value = t;
  floorMat.uniforms.uTime.value = t;
  wallMat.uniforms.uTime.value = t;
  seatUniforms.uTime.value = t;

  // curtain phase tween
  if (state.curtainTimer > 0){
    state.curtainTimer -= dt;
    if (state.curtainTimer <= 0){
      // auto-reopen
      state.curtainTarget = 0.0;
    }
  }
  state.curtainPhase += (state.curtainTarget - state.curtainPhase) * Math.min(1, dt * 1.6);
  applyCurtain(state.curtainPhase);
  beamUniforms.uPhase.value = state.curtainPhase;

  // SHIFT-hold easter egg
  if (shiftDown && !state.usherActive){
    state.shiftHeld += dt;
    if (state.shiftHeld >= 4.0){
      // trigger usher walk
      state.usherActive = true;
      state.usherT = 0;
      usherGroup.visible = true;
      usherLamp.intensity = 0.0;
      flashStatus('. . .');
    }
  }
  if (state.usherActive){
    state.usherT += dt;
    const dur = 7.0;
    const k = Math.min(state.usherT / dur, 1.0);
    // walk from -7 to +7 along the back row (z ~ 7)
    usherGroup.position.x = -7.5 + k * 15.0;
    usherGroup.position.z = 6.0 + Math.sin(k*Math.PI)*0.2;
    usherGroup.rotation.y = -Math.PI/2;
    // bobbing
    usherGroup.position.y = 0.0 + Math.abs(Math.sin(state.usherT * 6.5)) * 0.04;
    usherLamp.position.set(usherGroup.position.x + 0.32, 1.1, usherGroup.position.z);
    usherLamp.intensity = Math.sin(k*Math.PI) * 0.9;
    if (k >= 1.0){
      state.usherActive = false;
      usherGroup.visible = false;
      usherLamp.intensity = 0.0;
    }
  }

  // camera: home + slight breath + drag yaw/pitch
  const breath = Math.sin(t * 0.6) * 0.012;
  camera.position.x = CAMERA_HOME.x;
  camera.position.y = CAMERA_HOME.y + breath;
  camera.position.z = CAMERA_HOME.z;
  // look target with yaw/pitch
  const look = new THREE.Vector3(0, 3.0, -14);
  // rotate look around camera
  const dir = look.clone().sub(camera.position);
  const yaw = state.pointer.yaw;
  const pitch = state.pointer.pitch;
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  // yaw around Y
  let dx = dir.x*cy - dir.z*sy;
  let dz = dir.x*sy + dir.z*cy;
  let dy = dir.y;
  // pitch around X
  const ny = dy*cp - dz*sp;
  const nz = dy*sp + dz*cp;
  const target = new THREE.Vector3(camera.position.x + dx, camera.position.y + ny, camera.position.z + nz);
  camera.lookAt(target);

  // overlays
  drawGrain();
  drawScratches();

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

// ============================================================
// START
// ============================================================
introEl.addEventListener('click', startApp, { once: true });
introEl.addEventListener('touchend', (e) => { e.preventDefault(); startApp(); }, { once: true });

function startApp(){
  if (state.started) return;
  state.started = true;
  try { initAudio(); } catch(e){ console.warn('audio init failed', e); }
  introEl.classList.add('hidden');
  setTimeout(() => { introEl.style.display = 'none'; }, 1300);
  // initial film title
  filmTitleEl.textContent = FILMS[state.filmIndex].title;
  screenUniforms.uFilm.value = FILMS[state.filmIndex].id;
  screenUniforms.uPaletteA.value.set(FILMS[state.filmIndex].palette[0], FILMS[state.filmIndex].palette[1], FILMS[state.filmIndex].palette[2]);
  screenUniforms.uPaletteB.value.set(FILMS[state.filmIndex].palette[3], FILMS[state.filmIndex].palette[4], FILMS[state.filmIndex].palette[5]);
  tick();
}

// Allow keyboard "Enter" to also start
window.addEventListener('keydown', (e) => {
  if (!state.started && (e.code === 'Enter' || e.code === 'Space')){
    e.preventDefault();
    startApp();
  }
}, { once: false });

// while loading, render one frame so the scene is "ready" behind the intro
renderer.render(scene, camera);

// kick a soft pre-tick so curtains, lights, and materials settle before user enters
applyCurtain(0);
</script>
</body>
</html>
