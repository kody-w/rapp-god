      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

        const _Renderer = THREE.WebGLRenderer;

          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });

              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility

        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();

<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050306);
scene.fog = new THREE.FogExp2(0x050306, 0.05);

// Camera lying on bed, looking up at ceiling
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 30);
camera.position.set(0, 0.6, 0); // lying on bed
camera.lookAt(0, 2.5, -0.5); // looking mostly up

// ── Walls ────────────────────────────────────────────────────────
const wallShader = {
  uniforms:{ time:{value:0}, nightlightPos:{value:new THREE.Vector3(2.0, 0.7, -2)} },
  vertexShader:`varying vec3 vP; varying vec3 vN;
    void main(){ vP = (modelMatrix*vec4(position,1.0)).xyz; vN = normal;
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform float time; uniform vec3 nightlightPos; varying vec3 vP; varying vec3 vN;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // Pale-blue painted wall (with subtle paint texture from noise)
      vec3 baseCol = vec3(0.22, 0.20, 0.28);
      float paint = n(vP.xy * 8.0) * 0.05;
      vec3 col = baseCol + vec3(paint);
      // Nightlight warm orange glow falloff
      float dist = distance(vP, nightlightPos);
      float light = exp(-dist * 0.7);
      col += vec3(1.0, 0.45, 0.15) * light * 0.6;
      // Dim moonlight from window (constant)
      col += vec3(0.10, 0.12, 0.18) * 0.3;
      gl_FragColor = vec4(col, 1.0);
    }`
};
const wallMat = new THREE.ShaderMaterial(wallShader);

const room = new THREE.Group();
const wallSize = 5;
// Back wall (with window)
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(wallSize, 3), wallMat);
backWall.position.set(0, 1.5, -wallSize/2);
room.add(backWall);
// Front wall (behind camera, facing it — closes off the room)
const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(wallSize, 3), wallMat);
frontWall.position.set(0, 1.5, wallSize/2);
frontWall.rotation.y = Math.PI;
room.add(frontWall);
// Left wall (where the door is)
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(wallSize, 3), wallMat);
leftWall.position.set(-wallSize/2, 1.5, 0);
leftWall.rotation.y = Math.PI/2;
room.add(leftWall);
// Right wall (where the dresser/nightlight is)
const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(wallSize, 3), wallMat);
rightWall.position.set(wallSize/2, 1.5, 0);
rightWall.rotation.y = -Math.PI/2;
room.add(rightWall);
scene.add(room);

// Floor (carpet)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(wallSize, wallSize),
  new THREE.MeshStandardMaterial({color:0x1a1820, roughness:0.9})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ── Ceiling with glow-in-the-dark stars ─────────────────────────────
const ceilingShader = {
  uniforms:{
    time:{value:0},
    nightlightPos:{value:new THREE.Vector3(2.0, 0.7, -2)}
  },
  vertexShader:`varying vec3 vP; varying vec2 vUv;
    void main(){
      vP = (modelMatrix*vec4(position,1.0)).xyz;
      vUv = uv;
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }`,
  fragmentShader:`uniform float time; uniform vec3 nightlightPos; varying vec3 vP; varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      // Pale ceiling base
      vec3 base = vec3(0.16, 0.15, 0.22);
      float paint = n(vUv * 12.0) * 0.04;
      vec3 col = base + vec3(paint);
      // Stars: scattered randomly with warm-green phosphor glow
      vec2 starGrid = vUv * 25.0;
      vec2 ip = floor(starGrid), fp = fract(starGrid);
      float star = h(ip);
      float starPresence = step(0.95, star);
      if (starPresence > 0.5) {
        // Star shape: smooth dot
        vec2 cellCenter = vec2(h(ip + vec2(7.0)), h(ip + vec2(13.0)));
        float dist = distance(fp, cellCenter);
        // Slow gentle pulse — phosphor "breathing"
        float pulse = 0.7 + 0.3 * sin(time * 0.3 + h(ip) * 6.28);
        float bright = smoothstep(0.18, 0.0, dist) * pulse;
        col += vec3(0.4, 1.0, 0.5) * bright * 0.9;
      }
      // Even more sparse "big" stars (stickers from a different pack — yellow ones)
      vec2 bigGrid = vUv * 8.0;
      vec2 bip = floor(bigGrid), bfp = fract(bigGrid);
      float bigStar = h(bip + vec2(31.0));
      if (bigStar > 0.92) {
        vec2 bcc = vec2(h(bip + vec2(7.0)), h(bip + vec2(13.0)));
        float bdist = distance(bfp, bcc);
        float bpulse = 0.65 + 0.35 * sin(time * 0.2 + h(bip) * 6.28 + 1.5);
        col += vec3(1.0, 0.85, 0.3) * smoothstep(0.20, 0.0, bdist) * bpulse * 0.7;
      }
      // Glow fade away from nightlight
      float dist = distance(vP, nightlightPos);
      col += vec3(1.0, 0.45, 0.15) * exp(-dist * 0.8) * 0.3;
      gl_FragColor = vec4(col, 1.0);

      float roof = step(vUv.y, 0.18 + h(floor(vec2(vUv.x*4.0, 1.0))) * 0.08);
      sky = mix(sky, vec3(0.02,0.02,0.04), roof);
      // Mullions
      if (abs(vUv.x - 0.5) < 0.012 || abs(vUv.y - 0.5) < 0.012) sky = vec3(0.04,0.03,0.02);
      gl_FragColor = vec4(sky, 1.0);
    }`
};
const winFrame = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.0), new THREE.ShaderMaterial(windowShader));
winFrame.position.set(0, 1.7, -wallSize/2 + 0.005);
scene.add(winFrame);
// Window frame (wood)
const winFrameMat = new THREE.MeshStandardMaterial({color:0x3a2a1a, roughness:0.85});
[
  [0, 2.25, -wallSize/2 + 0.01, 1.7, 0.06, 0.04], // top

// Soft moonlight from window

moonLight.position.set(0, 2.5, -wallSize/2);
moonLight.target.position.set(0, 0.5, wallSize/3);

// ── Posters on walls (procedural rectangles with glowing borders) ──
function makePoster(x, y, z, w, h, rotation, color) {
  const mat = new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.4});
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  m.position.set(x, y, z);
  m.rotation.y = rotation;
  scene.add(m);
}
// 3 posters on the left wall (the wall to your left when lying on your back)

// ── A single dust mote slowly drifting in moonlight ────────────────
const motesGeo = new THREE.BufferGeometry();
const moteCount = 80;
const motePos = new Float32Array(moteCount * 3);
for (let i = 0; i < moteCount; i++) {
  motePos[i*3+0] = (Math.random() - 0.5) * 4;
  motePos[i*3+1] = 0.5 + Math.random() * 2;
  motePos[i*3+2] = (Math.random() - 0.5) * 4;
}
motesGeo.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
const motesMat = new THREE.PointsMaterial({color:0xddccaa, size:0.025, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false});

scene.add(motes);

// ── Audio ────────────────────────────────────────────────────────
let audioCtx = null, masterGain;
function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.40;
  masterGain.connect(audioCtx.destination);

  // Distant hum of the world (very faint, low-passed white noise)
  const buf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  }
  const hum = audioCtx.createBufferSource();
  hum.buffer = buf; hum.loop = true;
  const humLP = audioCtx.createBiquadFilter();
  humLP.type = 'lowpass'; humLP.frequency.value = 200; humLP.Q.value = 0.5;
  const humG = audioCtx.createGain(); humG.gain.value = 0.10;
  hum.connect(humLP).connect(humG).connect(masterGain);
  hum.start();

  // Distant TV from another room (very faint, occasionally peaks of warm voice-ish)
  function scheduleTVPeak() {
    const next = 30 + Math.random() * 90;
    setTimeout(() => { if (audioCtx) { tvMuffled(); scheduleTVPeak(); } }, next * 1000);
  }
  scheduleTVPeak();
  function tvMuffled() {
    const t0 = audioCtx.currentTime;
    const dur = 1 + Math.random() * 2;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = 250 + Math.random() * 100;
    const g = audioCtx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.012, t0 + 0.2);
    g.gain.linearRampToValueAtTime(0.005, t0 + dur - 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 350;
    o.connect(lp).connect(g).connect(masterGain);
    o.start(t0); o.stop(t0 + dur + 0.1);
  }

  // Breath / heartbeat (very subtle)
  function heartbeat() {
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 60;
    const g = audioCtx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.04, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
    o.connect(g).connect(masterGain);
    o.start(t0); o.stop(t0 + 0.25);
    // Second beat
    setTimeout(() => {
      const t1 = audioCtx.currentTime;
      const o2 = audioCtx.createOscillator();
      o2.type = 'sine'; o2.frequency.value = 60;
      const g2 = audioCtx.createGain();
      g2.gain.value = 0;
      g2.gain.linearRampToValueAtTime(0.025, t1 + 0.02);
      g2.gain.exponentialRampToValueAtTime(0.0001, t1 + 0.15);
      o2.connect(g2).connect(masterGain);
      o2.start(t1); o2.stop(t1 + 0.2);
    }, 200);
    setTimeout(heartbeat, 1100 + Math.random() * 100);
  }
  heartbeat();

  // Floor creaks from outside the room (rare)
  function scheduleCreak() {
    const next = 20 + Math.random() * 60;
    setTimeout(() => { if (audioCtx) { creak(); scheduleCreak(); } }, next * 1000);
  }
  scheduleCreak();
  function creak() {
    const t0 = audioCtx.currentTime;
    const dur = 0.4;
    const buf2 = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = buf2.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length * 5);
    const s = audioCtx.createBufferSource(); s.buffer = buf2;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 350 + Math.random()*250; bp.Q.value = 4;
    const g = audioCtx.createGain(); g.gain.value = 0.04;
    const p = audioCtx.createStereoPanner(); p.pan.value = (Math.random()-0.5);
    s.connect(bp).connect(g).connect(p).connect(masterGain);
    s.start(t0);
  }
}

// ── Animation ──────────────────────────────────────────────────────
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  ceiling.material.uniforms.time.value = time;
  wallMat.uniforms.time.value = time;
  winFrame.material.uniforms.time.value = time;

  // Drift dust motes
  for (let i = 0; i < moteCount; i++) {
    motePos[i*3+0] += Math.sin(time*0.4 + i) * 0.0008;
    motePos[i*3+1] += -0.001 * dt + Math.sin(time*0.6 + i*1.3) * 0.0006;
    motePos[i*3+2] += Math.cos(time*0.3 + i) * 0.0006;
    if (motePos[i*3+1] < 0.3) {
      motePos[i*3+1] = 2.5 + Math.random() * 0.4;
      motePos[i*3+0] = (Math.random()-0.5) * 4;
      motePos[i*3+2] = (Math.random()-0.5) * 4;
    }
  }
  motesGeo.attributes.position.needsUpdate = true;

  // Slight breath (camera bobs gently)
  camera.position.y = 0.6 + Math.sin(time * 0.8) * 0.008;
  camera.lookAt(Math.sin(time*0.05) * 0.1, 2.5 + Math.sin(time*0.07) * 0.05, -0.5);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
});
</script>
