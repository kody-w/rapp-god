    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>



    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

        // --- Configuration ---
        const CONFIG = {
            chunkSize: 200, // Size of one city block chunk
            renderDistance: 6, // How many chunks ahead to render
            fogDensity: 0.008,
            speed: 40, // Units per second
            buildingDensity: 0.6,
            colors: {
                fog: 0x0a001a,
                ground: 0x1a0033,
                grid: 0xff00ff,
                buildingBase: 0x000033,
                neon1: 0x00ffff, // Cyan
                neon2: 0xff00ff, // Magenta
                neon3: 0xffff00  // Yellow
            }
        };

        // --- State ---
        const state = {
            chunks: [], // Array of active chunks
            currentChunkZ: 0,
            distanceTraveled: 0,
            cameraMode: 'fly', // 'fly' or 'street'
            time: 0
        };

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.colors.fog);
        scene.fog = new THREE.FogExp2(CONFIG.colors.fog, CONFIG.fogDensity);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Disable AA for retro feel
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Post Processing ---
        const renderScene = new RenderPass(scene, camera);
        
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.5;
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Materials ---
        // Reuse materials for performance
        const materials = {
            building: new THREE.MeshLambertMaterial({ color: CONFIG.colors.buildingBase }),
            window: new THREE.MeshBasicMaterial({ color: CONFIG.colors.neon1 }),
            gridLine: new THREE.LineBasicMaterial({ color: CONFIG.colors.grid, transparent: true, opacity: 0.5 }),
            sun: new THREE.MeshBasicMaterial({ 
                color: 0xff00aa, 
                transparent: true, 
                fog: false 
            })
        };

        // --- Sun ---
        // Vaporwave sun with stripes
        const sunGeo = new THREE.CircleGeometry(300, 32);
        const sun = new THREE.Mesh(sunGeo, materials.sun);
        sun.position.set(0, 100, -800);
        scene.add(sun);

        // Sun stripes (using simple planes to mask)
        for(let i=0; i<8; i++) {
            const h = 5 + i * 2;
            const y = -50 + i * 15;
            const stripe = new THREE.Mesh(
                new THREE.PlaneGeometry(600, h),
                new THREE.MeshBasicMaterial({ color: CONFIG.colors.fog, fog: false })
            );
            stripe.position.set(0, y, 1); // Slightly in front of sun
            sun.add(stripe);
        }

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040); // Soft white light
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xff00ff, 0.5);
        dirLight.position.set(0, 1, 0);
        scene.add(dirLight);

        // --- City Generation ---
        
        class Chunk {
            constructor(zPos) {
                this.zPos = zPos;
                this.group = new THREE.Group();
                this.group.position.z = zPos;
                
                this.generateGround();
                this.generateBuildings();
                
                scene.add(this.group);
            }
            
            generateGround() {
                // Grid ground
                const size = CONFIG.chunkSize;
                const divisions = 10;
                
                const gridHelper = new THREE.GridHelper(size, divisions, CONFIG.colors.grid, CONFIG.colors.grid);
                gridHelper.position.y = 0;
                gridHelper.position.z = size / 2; // Center it relative to chunk start
                // Fade grid into distance? 
                // Three.js GridHelper doesn't support opacity easily without custom shader or modifying material
                gridHelper.material = materials.gridLine;
                this.group.add(gridHelper);
                
                // Solid ground below grid to hide background
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(size, size),
                    new THREE.MeshBasicMaterial({ color: CONFIG.colors.ground })
                );
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = -0.1;
                plane.position.z = size / 2;
                this.group.add(plane);
            }
            
            generateBuildings() {
                const size = CONFIG.chunkSize;
                const blockSize = size / 10; // 10x10 grid per chunk
                
                // Leave center path clear for "road"
                const roadWidth = 2; 
                
                for(let x = 0; x < 10; x++) {
                    for(let z = 0; z < 10; z++) {
                        // Skip road
                        if (x >= 5 - roadWidth && x < 5 + roadWidth) continue;
                        
                        if (Math.random() < CONFIG.buildingDensity) {
                            const h = 10 + Math.random() * 50 + (Math.random() < 0.1 ? 60 : 0); // Occasional supertall
                            const w = blockSize * 0.8;
                            const d = blockSize * 0.8;
                            
                            const geometry = new THREE.BoxGeometry(w, h, d);
                            const mesh = new THREE.Mesh(geometry, materials.building);
                            
                            mesh.position.x = (x - 4.5) * blockSize;
                            mesh.position.y = h / 2;
                            mesh.position.z = z * blockSize;
                            
                            this.group.add(mesh);
                            
                            // Add neon edges or windows
                            if (Math.random() < 0.5) {
                                this.addNeon(mesh, w, h, d);
                            }
                        }
                    }
                }
            }
            
            addNeon(parent, w, h, d) {
                // Random neon strip
                const type = Math.floor(Math.random() * 3);
                const color = [CONFIG.colors.neon1, CONFIG.colors.neon2, CONFIG.colors.neon3][Math.floor(Math.random()*3)];
                const mat = new THREE.MeshBasicMaterial({ color: color });
                
                if (type === 0) {
                    // Vertical strip
                    const geo = new THREE.BoxGeometry(w * 0.1, h, d * 0.1);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.x = (Math.random() - 0.5) * w;
                    mesh.position.z = d/2 + 0.1;
                    parent.add(mesh);
                } else if (type === 1) {
                    // Top rim
                    const geo = new THREE.BoxGeometry(w, 1, d);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.y = h/2 - 0.5;
                    parent.add(mesh);
                } else {
                    // Random windows
                    const winCount = Math.floor(h / 5);
                    for(let i=0; i<winCount; i++) {
                        if(Math.random() < 0.3) {
                            const geo = new THREE.PlaneGeometry(w * 0.6, 2);
                            const mesh = new THREE.Mesh(geo, mat);
                            mesh.position.z = d/2 + 0.1;
                            mesh.position.y = (i - winCount/2) * 4;
                            parent.add(mesh);
                        }
                    }
                }
            }
            
            dispose() {
                scene.remove(this.group);
                // Cleanup geometries to prevent memory leaks
                this.group.traverse(obj => {
                    if(obj.geometry) obj.geometry.dispose();
                });
            }
        }

        // --- Logic ---
        
        function init() {
            // Initial chunks
            for(let i=0; i<CONFIG.renderDistance; i++) {
                const chunk = new Chunk(-i * CONFIG.chunkSize);
                state.chunks.push(chunk);
            }
            
            updateCamera();
        }
        
        function updateCamera() {
            if (state.cameraMode === 'fly') {
                camera.position.y = 40;
                camera.position.x = 0;
                camera.rotation.x = 0;
            } else {
                // Street view
                camera.position.y = 2;
                camera.position.x = 0;
                camera.rotation.x = 0.1;
            }
        }

        function updateChunks() {
            // Move chunks towards camera (positive Z)
            // Or move camera negative Z?
            // Moving camera is easier for logic, but floating point precision issues eventually.
            // Let's move camera negative Z, and reset when crossing a chunk boundary.
            
            // Actually, let's keep camera at Z=0 and move world positive Z.
            // This creates the "treadmill" effect.
            
            const moveDist = CONFIG.speed * 0.016; // Approx per frame
            state.distanceTraveled += moveDist;
            
            // Move all chunks
            for(const chunk of state.chunks) {
                chunk.group.position.z += moveDist;
            }
            
            // Check if first chunk is behind camera
            if (state.chunks[0].group.position.z > CONFIG.chunkSize) {
                // Remove old chunk
                const oldChunk = state.chunks.shift();
                oldChunk.dispose();
                
                // Add new chunk at the end
                const lastChunkZ = state.chunks[state.chunks.length - 1].group.position.z;
                const newChunk = new Chunk(lastChunkZ - CONFIG.chunkSize);
                state.chunks.push(newChunk);
            }
            
            // Update UI
            document.getElementById('dist-val').textContent = Math.floor(state.distanceTraveled / 100);
        }

        // --- Interaction ---
        document.getElementById('toggle-cam').addEventListener('click', () => {
            state.cameraMode = state.cameraMode === 'fly' ? 'street' : 'fly';
            updateCamera();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            state.time += 0.01;
            
            updateChunks();
            
            // Camera sway
            if (state.cameraMode === 'fly') {
                camera.position.x = Math.sin(state.time * 0.5) * 10;
                camera.rotation.z = Math.sin(state.time * 0.5) * 0.05;
                camera.position.y = 40 + Math.sin(state.time) * 2;
            }
            
            // Sun follows camera (illusion of infinity)
            // Since we move the world and keep camera at 0, sun stays at fixed Z relative to camera
            // But we might want it to bob slightly
            sun.position.y = 100 + Math.sin(state.time * 0.2) * 5;

            composer.render();
        }

        init();
        animate();

    </script>
</body>
</html>
