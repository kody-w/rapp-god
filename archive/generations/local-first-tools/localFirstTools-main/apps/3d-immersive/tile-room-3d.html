    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();

    <script>
        // Project data structure
        let projectData = {
            projectName: "Tiling Project 3D",
            room: {
                width: 15,
                length: 18,
                height: 8
            },
            tiles: {
                totalNeeded: 285.12,
                boxCount: 20,
                tileSize: 1,
                pattern: "grid",
                colors: ["#e0e0e0", "#d0d0d0", "#c0c0c0"]
            },
            labor: {
                hours: 52,
                workers: 1
            },
            metadata: {
                createdDate: new Date().toISOString(),
                lastModified: new Date().toISOString(),
                version: "1.0"
            }
        };

        // Preset configurations
        const presets = {
            bathroom: {
                projectName: "Bathroom Renovation",
                room: { width: 8, length: 10, height: 8 },
                tiles: { totalNeeded: 85, boxCount: 6, tileSize: 0.5, pattern: "grid", colors: ["#ffffff", "#f0f0f0", "#e8e8e8"] },
                labor: { hours: 16, workers: 1 }
            },
            kitchen: {
                projectName: "Kitchen Floor",
                room: { width: 12, length: 14, height: 9 },
                tiles: { totalNeeded: 175, boxCount: 13, tileSize: 1.5, pattern: "diagonal", colors: ["#8b7355", "#a0826d", "#bc9a6a"] },
                labor: { hours: 28, workers: 2 }
            },
            large: {
                projectName: "Commercial Space",
                room: { width: 30, length: 40, height: 12 },
                tiles: { totalNeeded: 1250, boxCount: 88, tileSize: 2, pattern: "grid", colors: ["#333333", "#444444", "#555555"] },
                labor: { hours: 120, workers: 3 }
            }
        };

        // Three.js scene variables
        let scene, camera, renderer, roomGroup, tileGroup, boxGroup;
        
        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x764ba2, 100, 500);
            
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.near = 0.1;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -15;
            directionalLight.shadow.camera.right = 15;
            directionalLight.shadow.camera.top = 15;
            directionalLight.shadow.camera.bottom = -15;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x667eea, 0.5);
            pointLight.position.set(-5, 5, -5);
            scene.add(pointLight);
        }

        // Build 3D scene from data
        function buildScene() {
            // Clear existing room
            if (roomGroup) {
                scene.remove(roomGroup);
            }

            const scale = 0.5;
            const roomWidth = projectData.room.width * scale;
            const roomDepth = projectData.room.length * scale;
            const roomHeight = projectData.room.height * scale;

            // Create room group
            roomGroup = new THREE.Group();

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(roomWidth, roomDepth);
            const floorMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xf0f0f0,
                side: THREE.DoubleSide
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            roomGroup.add(floor);

            // Create tile grid
            const tileSize = projectData.tiles.tileSize * scale;
            const tilesX = Math.floor(roomWidth / tileSize);
            const tilesZ = Math.floor(roomDepth / tileSize);
            const tileThickness = 0.05;
            
            tileGroup = new THREE.Group();
            
            for (let x = 0; x < tilesX; x++) {
                for (let z = 0; z < tilesZ; z++) {
                    const tileGeometry = new THREE.BoxGeometry(
                        tileSize * 0.95,
                        tileThickness,
                        tileSize * 0.95
                    );
                    
                    const colorHex = parseInt(projectData.tiles.colors[(x + z) % projectData.tiles.colors.length].replace('#', '0x'));
                    const tileMaterial = new THREE.MeshPhongMaterial({
                        color: colorHex,
                        specular: 0x222222,
                        shininess: 30
                    });
                    
                    const tile = new THREE.Mesh(tileGeometry, tileMaterial);
                    tile.position.set(
                        -roomWidth/2 + tileSize/2 + x * tileSize,
                        tileThickness/2,
                        -roomDepth/2 + tileSize/2 + z * tileSize
                    );
                    tile.castShadow = true;
                    tile.receiveShadow = true;
                    tileGroup.add(tile);
                }
            }
            roomGroup.add(tileGroup);

            // Walls
            const wallMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x8b7355,
                transparent: true,
                opacity: 0.3
            });

            // Back wall
            const backWallGeometry = new THREE.PlaneGeometry(roomWidth, roomHeight);
            const backWall = new THREE.Mesh(backWallGeometry, wallMaterial);
            backWall.position.z = -roomDepth / 2;
            backWall.position.y = roomHeight / 2;
            roomGroup.add(backWall);

            // Front wall
            const frontWall = new THREE.Mesh(backWallGeometry, wallMaterial);
            frontWall.position.z = roomDepth / 2;
            frontWall.position.y = roomHeight / 2;
            frontWall.rotation.y = Math.PI;
            roomGroup.add(frontWall);

            // Left wall
            const sideWallGeometry = new THREE.PlaneGeometry(roomDepth, roomHeight);
            const leftWall = new THREE.Mesh(sideWallGeometry, wallMaterial);
            leftWall.position.x = -roomWidth / 2;
            leftWall.position.y = roomHeight / 2;
            leftWall.rotation.y = Math.PI / 2;
            roomGroup.add(leftWall);

            // Right wall
            const rightWall = new THREE.Mesh(sideWallGeometry, wallMaterial);
            rightWall.position.x = roomWidth / 2;
            rightWall.position.y = roomHeight / 2;
            rightWall.rotation.y = -Math.PI / 2;
            roomGroup.add(rightWall);

            // Tile boxes
            boxGroup = new THREE.Group();
            const boxGeometry = new THREE.BoxGeometry(0.8, 0.3, 0.6);
            const boxMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x8b4513
            });
            
            const boxCount = projectData.tiles.boxCount;
            const maxStack = 5;
            
            for (let i = 0; i < boxCount; i++) {
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                const stackRow = Math.floor(i / maxStack);
                const stackCol = i % maxStack;
                box.position.set(
                    roomWidth/2 + 1.5,
                    0.15 + stackRow * 0.31,
                    -roomDepth/2 + 1 + stackCol * 0.65
                );
                box.castShadow = true;
                boxGroup.add(box);
            }
            
            roomGroup.add(boxGroup);

            // Measurement lines
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffff00 });
            
            // Width measurement
            const widthPoints = [];
            widthPoints.push(new THREE.Vector3(-roomWidth/2, 0.01, roomDepth/2 + 0.5));
            widthPoints.push(new THREE.Vector3(roomWidth/2, 0.01, roomDepth/2 + 0.5));
            const widthGeometry = new THREE.BufferGeometry().setFromPoints(widthPoints);
            const widthLine = new THREE.Line(widthGeometry, lineMaterial);
            roomGroup.add(widthLine);

            // Depth measurement
            const depthPoints = [];
            depthPoints.push(new THREE.Vector3(roomWidth/2 + 0.5, 0.01, -roomDepth/2));
            depthPoints.push(new THREE.Vector3(roomWidth/2 + 0.5, 0.01, roomDepth/2));
            const depthGeometry = new THREE.BufferGeometry().setFromPoints(depthPoints);
            const depthLine = new THREE.Line(depthGeometry, lineMaterial);
            roomGroup.add(depthLine);

            scene.add(roomGroup);

            // Set camera position based on room size
            const maxDimension = Math.max(roomWidth, roomDepth);
            camera.position.set(maxDimension * 1.5, maxDimension * 1.2, maxDimension * 1.5);
            camera.lookAt(0, 0, 0);
        }

        // Update UI with data
        function updateUI() {
            document.getElementById('project-name').textContent = projectData.projectName;
            document.getElementById('room-dimensions').textContent = `${projectData.room.width}' × ${projectData.room.length}'`;
            document.getElementById('floor-area').textContent = `${projectData.room.width * projectData.room.length} sq ft`;
            document.getElementById('total-tiles').textContent = `${projectData.tiles.totalNeeded} sq ft`;
            document.getElementById('tile-boxes').textContent = `${projectData.tiles.boxCount} boxes`;
            document.getElementById('labor-time').textContent = `${projectData.labor.hours} hours`;
            
            const floorArea = projectData.room.width * projectData.room.length;
            const wasteFactor = ((projectData.tiles.totalNeeded - floorArea) / floorArea * 100).toFixed(1);
            document.getElementById('waste-factor').textContent = `${wasteFactor}%`;
        }

        // Export data as JSON
        function exportData() {
            projectData.metadata.lastModified = new Date().toISOString();
            const dataStr = JSON.stringify(projectData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportName = `${projectData.projectName.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportName);
            linkElement.click();
        }

        // Import data from JSON file
        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        projectData = { ...projectData, ...importedData };
                        projectData.metadata.lastModified = new Date().toISOString();
                        updateUI();
                        buildScene();
                    } catch (error) {
                        alert('Invalid JSON file. Please check the file format.');
                        console.error(error);
                    }
                };
                reader.readAsText(file);
            }
        }

        // Show JSON editor
        function showJsonEditor() {
            document.getElementById('json-textarea').value = JSON.stringify(projectData, null, 2);
            document.getElementById('json-editor').style.display = 'block';
        }

        // Hide JSON editor
        function hideJsonEditor() {
            document.getElementById('json-editor').style.display = 'none';
        }

        // Apply JSON data from editor
        function applyJsonData() {
            try {
                const newData = JSON.parse(document.getElementById('json-textarea').value);
                projectData = { ...projectData, ...newData };
                projectData.metadata.lastModified = new Date().toISOString();
                updateUI();
                buildScene();
                hideJsonEditor();
            } catch (error) {
                alert('Invalid JSON format. Please check your syntax.');
                console.error(error);
            }
        }

        // Load preset configuration
        function loadPreset(presetName) {
            if (presets[presetName]) {
                projectData = {
                    ...presets[presetName],
                    metadata: {
                        createdDate: new Date().toISOString(),
                        lastModified: new Date().toISOString(),
                        version: "1.0"
                    }
                };
                updateUI();
                buildScene();
            }
        }

        // Mouse controls
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2) / window.innerWidth * 2;
            mouseY = (event.clientY - window.innerHeight / 2) / window.innerHeight * 2;
        });

        // Zoom controls
        document.addEventListener('wheel', (event) => {
            if (camera) {
                camera.position.multiplyScalar(1 + event.deltaY * 0.001);
            }
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            if (roomGroup) {
                // Smooth camera rotation
                targetRotationY = mouseX * Math.PI * 0.5;
                targetRotationX = mouseY * Math.PI * 0.25;
                
                roomGroup.rotation.y += (targetRotationY - roomGroup.rotation.y) * 0.05;
                roomGroup.rotation.x += (targetRotationX - roomGroup.rotation.x) * 0.05;

                // Floating animation for boxes
                if (boxGroup) {
                    boxGroup.children.forEach((child, index) => {
                        if (child.geometry && child.geometry.type === 'BoxGeometry') {
                            child.position.y += Math.sin(Date.now() * 0.001 + index) * 0.001;
                        }
                    });
                }
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Initialize everything
        initScene();
        buildScene();
        updateUI();
        animate();
    </script>
</body>
</html>
