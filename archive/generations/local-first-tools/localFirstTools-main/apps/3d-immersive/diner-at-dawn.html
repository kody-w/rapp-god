<script type="module">
import * as THREE from 'three';

/* =========================================================================
   DINER AT DAWN — single-file cinematic
   ========================================================================= */

const canvas = document.getElementById('c');
const splash = document.getElementById('splash');
const clockEl = document.getElementById('clock');
const trackEl = document.getElementById('track');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080d);
scene.fog = new THREE.FogExp2(0x0a0c14, 0.022);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.05, 200);
camera.position.set(0.0, 1.55, 2.6);

/* ---------- camera look (mouse drag, gentle clamp) ---------- */
const look = {x:0, y:0, tx:0, ty:0, dragging:false, lx:0, ly:0};
canvas.addEventListener('pointerdown', e => { look.dragging = true; look.lx = e.clientX; look.ly = e.clientY; });
window.addEventListener('pointerup', () => look.dragging = false);
window.addEventListener('pointermove', e => {
  if (!look.dragging) {
    const nx = (e.clientX/window.innerWidth-0.5);
    const ny = (e.clientY/window.innerHeight-0.5);
    look.tx = nx * 0.35;
    look.ty = -ny * 0.18;
    return;
  }
  const dx = (e.clientX - look.lx)/window.innerWidth;
  const dy = (e.clientY - look.ly)/window.innerHeight;
  look.tx = THREE.MathUtils.clamp(look.tx + dx*1.4, -0.9, 0.9);
  look.ty = THREE.MathUtils.clamp(look.ty - dy*0.9, -0.4, 0.4);
  look.lx = e.clientX; look.ly = e.clientY;
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

/* =========================================================================
   LIGHTING — tungsten interior + cool exterior + neon
   ========================================================================= */
const ambient = new THREE.AmbientLight(0x2a1f14, 0.55);
scene.add(ambient);

// Fluorescent ceiling tube — warm tungsten with slight green, flickers
const fluor = new THREE.RectAreaLight(0xffd9a0, 7.0, 3.6, 0.5);
fluor.position.set(0, 2.55, 0);
fluor.lookAt(0, 0, 0);
scene.add(fluor);

const fluor2 = new THREE.PointLight(0xffc888, 0.9, 8, 1.6);
fluor2.position.set(0, 2.5, 0);
scene.add(fluor2);

// Neon OPEN sign light (red/orange)
const neonLight = new THREE.PointLight(0xff5a22, 1.6, 6, 1.8);
neonLight.position.set(-1.6, 1.9, -2.9);
scene.add(neonLight);

// Cool dawn light from outside through window
const dawn = new THREE.DirectionalLight(0x6b88c4, 0.35);
dawn.position.set(-3, 3, -5);
scene.add(dawn);

// Streetlamp sodium glow far outside
const street = new THREE.PointLight(0xffb060, 1.4, 14, 1.4);
street.position.set(3.2, 2.4, -7.5);
scene.add(street);

/* =========================================================================
   SHADERS
   ========================================================================= */

const noiseGLSL = `
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(a,b,u.x)+ (c-a)*u.y*(1.0-u.x)+ (d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p*=2.03; a*=0.5; }
  return v;
}
`;

/* ---------- Window glass with rain streaks (screen-space-ish) ---------- */
const rainGlassMat = new THREE.ShaderMaterial({
  transparent:true,
  uniforms:{
    uTime:{value:0},
    uIntensity:{value:0.85},
    uTint:{value: new THREE.Color(0x7592b8)},
    uInner:{value: new THREE.Color(0xffb070)},
  },
  vertexShader:`
    varying vec2 vUv; varying vec3 vWorld;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: noiseGLSL + `
    uniform float uTime, uIntensity;
    uniform vec3 uTint, uInner;
    varying vec2 vUv; varying vec3 vWorld;

    // single rain drop streak
    float drop(vec2 uv, vec2 c, float seed, float t){
      float fall = mod(t*(0.18+0.5*seed) + seed*7.0, 1.6) - 0.3;
      vec2 p = uv - vec2(c.x, fall);
      float trail = smoothstep(0.06, 0.0, abs(p.x))
                  * smoothstep(0.0, -0.32, p.y)
                  * smoothstep(0.0, 0.02, p.y+0.32);
      float head = smoothstep(0.022, 0.0, length(p*vec2(1.6,1.0)));
      return clamp(trail*0.55 + head, 0.0, 1.0);
    }

    void main(){
      vec2 uv = vUv;
      // base haze + condensation noise
      float cond = fbm(uv*8.0 + vec2(0.0,uTime*0.05));
      float haze = smoothstep(0.2,0.9,cond);

      // distant lights blurred through glass
      vec3 col = mix(uTint*0.18, uInner*0.6, smoothstep(0.35,0.7, fbm(uv*3.0 - vec2(0.0,uTime*0.02))));
      col = mix(col, uTint*0.4, 0.4);

      // accumulate streaks
      float streaks = 0.0;
      for(int i=0;i<14;i++){
        float fi = float(i);
        float seed = hash(vec2(fi*1.7, 3.1));
        vec2 c = vec2(hash(vec2(fi,1.0)), 0.0);
        streaks += drop(uv, c, seed, uTime + fi);
      }
      streaks *= uIntensity;

      // refraction shimmer along streaks
      vec3 streakCol = mix(vec3(0.6,0.7,0.9), uInner, 0.3) * streaks * 1.4;

      // condensation "blur" in low areas
      col += haze*0.05;
      col += streakCol;

      // alpha: glass is mostly transparent except where condensation/streaks
      float alpha = clamp(0.18 + haze*0.25 + streaks*0.9, 0.0, 0.95);

      gl_FragColor = vec4(col, alpha);
    }
  `,
  side: THREE.DoubleSide,
  depthWrite:false,
});

/* ---------- Neon OPEN sign material ---------- */
const neonMat = new THREE.ShaderMaterial({
  transparent:true,
  uniforms:{ uTime:{value:0}, uFlicker:{value:1.0}, uColor:{value: new THREE.Color(0xff4a18)} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    varying vec2 vUv;
    uniform float uTime, uFlicker;
    uniform vec3 uColor;
    void main(){
      vec2 p = vUv*2.0-1.0;
      float core = smoothstep(0.92, 0.0, length(p));
      float halo = smoothstep(1.4, 0.0, length(p))*0.55;
      float buzz = 0.92 + 0.08*sin(uTime*120.0);
      float stutter = step(0.985, fract(sin(uTime*3.1)*43758.5));
      float on = uFlicker * buzz * (1.0 - stutter*0.8);
      vec3 col = uColor * (core*1.6 + halo*0.8) * on;
      gl_FragColor = vec4(col, (core + halo*0.7) * on);
    }
  `,
  depthWrite:false,
  blending: THREE.AdditiveBlending,
});

/* ---------- Formica counter material with subtle reflection ---------- */
const formicaMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uTint:{value: new THREE.Color(0xf5e8c8)} },
  vertexShader:`
    varying vec2 vUv; varying vec3 vN; varying vec3 vP;
    void main(){
      vUv=uv; vN=normalize(normalMatrix*normal);
      vec4 mv = modelViewMatrix*vec4(position,1.0);
      vP = mv.xyz;
      gl_Position = projectionMatrix*mv;
    }
  `,
  fragmentShader: noiseGLSL + `
    varying vec2 vUv; varying vec3 vN; varying vec3 vP;
    uniform float uTime; uniform vec3 uTint;
    void main(){
      // boomerang fleck pattern
      float speck = step(0.92, hash(floor(vUv*60.0)));
      float speck2 = step(0.96, hash(floor(vUv*120.0 + 3.7)));
      vec3 base = uTint;
      base = mix(base, vec3(0.95,0.55,0.35), speck*0.45);
      base = mix(base, vec3(0.3,0.55,0.7), speck2*0.5);
      // soft fbm wear
      float wear = fbm(vUv*8.0)*0.15;
      base *= 0.85 + wear;
      // grazing reflection: brighter at glancing angles
      vec3 V = normalize(-vP);
      float fres = pow(1.0 - max(dot(V,vN),0.0), 2.5);
      base += vec3(1.0,0.85,0.6) * fres * 0.18;
      gl_FragColor = vec4(base, 1.0);
    }
  `,
});

/* ---------- Steam billboard shader ---------- */
const steamMat = new THREE.ShaderMaterial({
  transparent:true,
  uniforms:{ uTime:{value:0}, uSeed:{value:0.0} },
  vertexShader:`
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }
  `,
  fragmentShader: noiseGLSL + `
    varying vec2 vUv;
    uniform float uTime, uSeed;
    void main(){
      vec2 p = vUv;
      vec2 q = p*vec2(1.0,1.4) + vec2(uSeed*3.1, -uTime*0.18);
      float n = fbm(q*2.4);
      n += 0.5*fbm(q*5.0 + vec2(0.0,uTime*0.1));
      // shape: column rising, fade at edges and bottom-out
      float radial = smoothstep(0.5, 0.05, length(p-vec2(0.5,0.55)));
      float rise = smoothstep(0.0, 0.25, p.y) * smoothstep(1.0, 0.4, p.y);
      float a = clamp(n*0.85*radial*rise, 0.0, 1.0);
      // warm bottom (coffee), cool top (room air)
      vec3 warm = vec3(1.0, 0.78, 0.55);
      vec3 cool = vec3(0.8, 0.85, 1.0);
      vec3 col = mix(warm, cool, smoothstep(0.2, 0.9, p.y));
      gl_FragColor = vec4(col, a*0.55);
    }
  `,
  depthWrite:false,
  blending: THREE.NormalBlending,
});

/* ---------- Fluorescent halo plane ---------- */
const haloMat = new THREE.ShaderMaterial({
  transparent:true,
  uniforms:{ uTime:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    varying vec2 vUv; uniform float uTime;
    void main(){
      vec2 p = vUv*2.0-1.0;
      float buzz = 0.9 + 0.1*sin(uTime*377.0);
      float stutter = step(0.992, fract(sin(uTime*2.3)*43758.5));
      float on = buzz * (1.0 - stutter*0.7);
      float core = smoothstep(1.0, 0.0, abs(p.y))*smoothstep(1.2, 0.1, abs(p.x));
      float halo = exp(-2.0*dot(p,p));
      vec3 col = vec3(1.0, 0.88, 0.66)*(core*1.0 + halo*0.6) * on;
      gl_FragColor = vec4(col, clamp(core+halo*0.5,0.,1.) * on * 0.7);
    }
  `,
  depthWrite:false,
  blending: THREE.AdditiveBlending,
});

const jbTabs = [];
const genres = ['JAZZ TRIO', 'DOO-WOP', 'COUNTRY', 'LO-FI', 'BLUES', 'SURF'];
for (let i=0;i<6;i++){
  const tab = new THREE.Mesh(new THREE.BoxGeometry(0.10,0.04,0.02),
    new THREE.MeshStandardMaterial({color:0xeee0a0, emissive:0xff8030, emissiveIntensity:0.4}));
  const angle = -Math.PI/2 + (i/5)*Math.PI;
  tab.position.set(Math.cos(angle)*0.36, 1.45, Math.sin(angle)*0.36*0.55 + 0.18);
  tab.userData.genre = i;
  jukebox.add(tab); jbTabs.push(tab);
}
// front grille
const grille = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.4),
  new THREE.MeshStandardMaterial({color:0x140a04, roughness:0.9}));
grille.position.set(0,0.55,0.251); jukebox.add(grille);
jukebox.position.set(5.4, 0, -1.6);
diner.add(jukebox);

// Raycaster for jukebox click
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function pick(ev){
  ndc.x = (ev.clientX/window.innerWidth)*2 - 1;
  ndc.y = -(ev.clientY/window.innerHeight)*2 + 1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects([jukebox, ...jbTabs], true);
  if (hits.length){
    const o = hits[0].object;
    if (o.userData && typeof o.userData.genre === 'number'){
      playGenre(o.userData.genre);
    } else {
      playGenre((currentGenre+1)%6);
    }
  }
}

/* =========================================================================
   WEB AUDIO ENGINE
   ========================================================================= */
let audio = null;
let masterGain, musicGain, ambGain;
let crackleNode, rainNode, buzzOsc;
let currentGenre = -1;
let scheduler = null;
let nextNoteTime = 0;
let currentBeat = 0;

function ensureAudio(){
  if (audio) return;
  audio = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audio.createGain(); masterGain.gain.value = 0.7; masterGain.connect(audio.destination);
  musicGain = audio.createGain(); musicGain.gain.value = 0.5; musicGain.connect(masterGain);
  ambGain = audio.createGain(); ambGain.gain.value = 0.4; ambGain.connect(masterGain);

  // Pink-noise rain
  const rainBuf = audio.createBuffer(1, audio.sampleRate*4, audio.sampleRate);
  const rd = rainBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i=0;i<rd.length;i++){
    const w = Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
    b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    rd[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
    b6 = w*0.115926;
  }
  rainNode = audio.createBufferSource(); rainNode.buffer = rainBuf; rainNode.loop = true;
  const rainFilt = audio.createBiquadFilter(); rainFilt.type='lowpass'; rainFilt.frequency.value=2200;
  const rainGain = audio.createGain(); rainGain.gain.value = 0.55;
  rainNode.connect(rainFilt).connect(rainGain).connect(ambGain);
  rainNode.start();
  window.__rainGain = rainGain;
  window.__rainFilt = rainFilt;

  // Vinyl crackle
  const crBuf = audio.createBuffer(1, audio.sampleRate*3, audio.sampleRate);
  const cd = crBuf.getChannelData(0);
  for (let i=0;i<cd.length;i++) cd[i] = (Math.random()<0.0008?(Math.random()*2-1)*0.6:0) + (Math.random()*2-1)*0.015;
  crackleNode = audio.createBufferSource(); crackleNode.buffer = crBuf; crackleNode.loop = true;
  const crGain = audio.createGain(); crGain.gain.value = 0.18;
  const crHigh = audio.createBiquadFilter(); crHigh.type='highpass'; crHigh.frequency.value=1500;
  crackleNode.connect(crHigh).connect(crGain).connect(ambGain);
  crackleNode.start();

  // 60Hz fluorescent buzz
  buzzOsc = audio.createOscillator(); buzzOsc.type='sawtooth'; buzzOsc.frequency.value = 60;
  const buzzGain = audio.createGain(); buzzGain.gain.value = 0.012;
  const buzzFilt = audio.createBiquadFilter(); buzzFilt.type='bandpass'; buzzFilt.frequency.value=120; buzzFilt.Q.value=2.5;
  buzzOsc.connect(buzzFilt).connect(buzzGain).connect(ambGain);
  buzzOsc.start();
  window.__buzzGain = buzzGain;
}

/* ---------- Synth voices ---------- */
function noteFreq(midi){ return 440 * Math.pow(2, (midi-69)/12); }

function playTone(freq, dur, vol, type='sine', t0=null, attack=0.01, release=0.18, dest=null){
  const t = t0 || audio.currentTime;
  const osc = audio.createOscillator(); osc.type = type; osc.frequency.value = freq;
  const g = audio.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t+attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur+release);
  osc.connect(g).connect(dest||musicGain);
  osc.start(t); osc.stop(t+dur+release+0.05);
}

function playPluck(freq, dur, vol, t0, color=0.6, dest=null){
  const t = t0 || audio.currentTime;
  // Karplus-strong-ish: noise burst into delayed comb
  const noiseBuf = audio.createBuffer(1, Math.floor(audio.sampleRate*0.05), audio.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i=0;i<nd.length;i++) nd[i] = (Math.random()*2-1);
  const src = audio.createBufferSource(); src.buffer = noiseBuf;
  const lp = audio.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1200 + color*2400;
  const delay = audio.createDelay(); delay.delayTime.value = 1/freq;
  const fb = audio.createGain(); fb.gain.value = 0.92;
  const out = audio.createGain(); out.gain.value = vol;
  src.connect(lp).connect(delay);
  delay.connect(fb).connect(delay);
  delay.connect(out).connect(dest||musicGain);
  out.gain.setValueAtTime(vol, t);
  out.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  src.start(t); src.stop(t+0.05);
}

function playKick(t0, vol=0.7){
  const t = t0;
  const osc = audio.createOscillator(); osc.type='sine';
  const g = audio.createGain();
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(40, t+0.18);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.28);
  osc.connect(g).connect(musicGain);
  osc.start(t); osc.stop(t+0.32);
}
function playSnare(t0, vol=0.4){
  const t = t0;
  const buf = audio.createBuffer(1, audio.sampleRate*0.25, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 2.5);
  const src = audio.createBufferSource(); src.buffer = buf;
  const hp = audio.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 1200;
  const g = audio.createGain(); g.gain.value = vol;
  src.connect(hp).connect(g).connect(musicGain);
  src.start(t);
}
function playHat(t0, vol=0.18, open=false){
  const t=t0;
  const buf = audio.createBuffer(1, audio.sampleRate*(open?0.18:0.05), audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, open?1.6:3.0);
  const src = audio.createBufferSource(); src.buffer = buf;
  const hp = audio.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 7000;
  const g = audio.createGain(); g.gain.value = vol;
  src.connect(hp).connect(g).connect(musicGain);
  src.start(t);
}
function playBrush(t0, vol=0.22){
  const t=t0;
  const buf = audio.createBuffer(1, audio.sampleRate*0.4, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 2.0)*0.6;
  const src = audio.createBufferSource(); src.buffer = buf;
  const bp = audio.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 4500; bp.Q.value=0.6;
  const g = audio.createGain(); g.gain.value = vol;
  src.connect(bp).connect(g).connect(musicGain);
  src.start(t);
}

/* ---------- Genre engines ----------
   Each engine: function(beat, t) — schedules events at time t for this 16th-beat index.
*/
const SIXTEENTH_BPM = {jazz:96, doowop:84, country:104, lofi:72, blues:88, surf:130};
let bpm = 88;
function secsPerBeat(){ return 60/bpm/4; } // 16th note

const scales = {
  Dm7:[62,65,69,72], G7:[67,71,74,77], Cmaj7:[60,64,67,71], Am7:[57,60,64,67],
  C:[60,64,67], Am:[57,60,64], F:[53,57,60], G:[55,59,62], D:[62,66,69],
  Cm9:[60,63,67,70,74], Fm7:[53,56,60,63], Bbmaj7:[58,62,65,69], Ebmaj7:[51,55,58,62],
  A7:[57,61,64,67,70], D7:[50,54,57,60,63], E:[64,68,71], B7:[59,63,66,69],
};

function chordVoice(name, t, dur, voiceVol=0.13, color=0.6){
  const ch = scales[name]; if (!ch) return;
  for (let i=0;i<ch.length;i++){
    playTone(noteFreq(ch[i]), dur, voiceVol*0.9, i===0?'triangle':'sine', t, 0.05, 0.5);
  }
}
function bassNote(midi, t, dur, vol=0.22){
  playTone(noteFreq(midi-12), dur, vol, 'sine', t, 0.005, 0.3);
}

/* Jazz Trio: Dm7-G7-Cmaj7-Am7 */
function jazzTick(beat, t){
  const bar = Math.floor(beat/16) % 4;
  const ch = ['Dm7','G7','Cmaj7','Am7'][bar];
  const root = scales[ch][0]-12;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*14, 0.10);
  // walking bass on quarters
  if (beat%4===0){
    const walk = [0,3,5,7][((beat/4)|0)%4];
    bassNote(root+walk, t, secsPerBeat()*3.5, 0.22);
  }
  // brush on 2 and 4
  if (beat%8===4 || beat%16===12) playBrush(t, 0.18);
  // ride hat 8ths
  if (beat%2===0) playHat(t, 0.10);
  // melody — random scale tones from chord
  if (beat%4===2 && Math.random()<0.6){
    const tones = scales[ch];
    const m = tones[Math.floor(Math.random()*tones.length)] + 12;
    playTone(noteFreq(m), secsPerBeat()*1.6, 0.10, 'triangle', t, 0.02, 0.3);
  }
}

/* Doo-wop: C-Am-F-G */
function doowopTick(beat, t){
  const bar = Math.floor(beat/16) % 4;
  const ch = ['C','Am','F','G'][bar];
  const root = scales[ch][0]-12;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*15, 0.11);
  if (beat%8===0) bassNote(root, t, secsPerBeat()*7, 0.20);
  if (beat%8===4) bassNote(root+7, t, secsPerBeat()*3, 0.16);
  if (beat%4===0) playKick(t, 0.55);
  if (beat%8===4) playSnare(t, 0.32);
  if (beat%2===1) playHat(t, 0.10);
  // doo-wop "ooh" vocal — sine triad arpeggio
  if (beat%16 === 14){
    const tones = scales[ch];
    for (let i=0;i<tones.length;i++)
      playTone(noteFreq(tones[i]+12), secsPerBeat()*2, 0.08, 'sine', t+i*0.05, 0.05, 0.3);
  }
}

/* Country: G-C-D, twangy guitar */
function countryTick(beat, t){
  const bar = Math.floor(beat/16) % 4;
  const ch = ['G','G','C','D'][bar];
  const root = scales[ch][0]-12;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*14, 0.08, 0.4);
  // boom-chick bass
  if (beat%8===0) bassNote(root, t, secsPerBeat()*1.2, 0.26);
  if (beat%8===4) bassNote(root+7, t, secsPerBeat()*1.2, 0.22);
  // strums on 2, 4
  if (beat%8===2 || beat%8===6){
    const tones = scales[ch];
    for (let i=0;i<tones.length;i++) playPluck(noteFreq(tones[i]+12), secsPerBeat()*2, 0.10, t+i*0.005, 0.5);
  }
  if (beat%4===0) playKick(t, 0.5);
  if (beat%8===4) playSnare(t, 0.28);
}

/* Lo-fi: Cm9 - Fm7 - Bbmaj7 - Ebmaj7 */
function lofiTick(beat, t){
  const bar = Math.floor(beat/16) % 4;
  const ch = ['Cm9','Fm7','Bbmaj7','Ebmaj7'][bar];
  const root = scales[ch][0]-24;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*15, 0.09);
  if (beat%16===0) bassNote(root, t, secsPerBeat()*15, 0.20);
  // dusty kick on 1 & 9
  if (beat%16===0 || beat%16===10) playKick(t, 0.55);
  // lazy snare on 5 & 13
  if (beat%16===4 || beat%16===12) playSnare(t, 0.22);
  if (beat%2===0) playHat(t, 0.05, beat%8===6);
  // melodic pluck — pentatonic over chord
  if (beat%4===2 && Math.random()<0.45){
    const tones = scales[ch];
    const m = tones[Math.floor(Math.random()*tones.length)] + 12 + 12;
    playPluck(noteFreq(m), secsPerBeat()*1.6, 0.08, t, 0.5);
  }
}

/* 12-bar blues in A: A7-A7-A7-A7-D7-D7-A7-A7-E-D7-A7-E */
const BLUES_BARS = ['A7','A7','A7','A7','D7','D7','A7','A7','E','D7','A7','E'];
function bluesTick(beat, t){
  const bar = Math.floor(beat/16) % 12;
  const ch = BLUES_BARS[bar];
  const root = scales[ch][0]-12;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*14, 0.09);
  // shuffle bass — root, 3, 5, 6 pattern
  const pat = [0,4,7,9,7,4,0,4];
  if (beat%2===0) bassNote(root + pat[((beat/2)|0)%8], t, secsPerBeat()*1.5, 0.22);
  if (beat%4===0) playKick(t, 0.6);
  if (beat%8===4) playSnare(t, 0.3);
  if (beat%2===1) playHat(t, 0.10);
  // blues lick — pentatonic: 0,3,5,6,7,10
  if (beat%8===6 && Math.random()<0.55){
    const pent=[0,3,5,6,7,10];
    const m = root+12 + pent[Math.floor(Math.random()*pent.length)] + 12;
    playTone(noteFreq(m), secsPerBeat()*1.4, 0.10, 'sawtooth', t, 0.02, 0.25);
  }
}

/* Surf rock in E: E-A-B-E with twang lead */
function surfTick(beat, t){
  const bar = Math.floor(beat/16) % 4;
  const ch = ['E','E','B7','A7'][bar];
  const root = scales[ch][0]-12;
  if (beat%16===0) chordVoice(ch, t, secsPerBeat()*15, 0.09);
  // driving 8th-note bass
  if (beat%2===0) bassNote(root, t, secsPerBeat()*1.5, 0.20);
  // backbeat
  if (beat%8===0) playKick(t, 0.6);
  if (beat%8===4) playSnare(t, 0.4);
  if (beat%2===0) playHat(t, 0.13);
  // surf lead — chromatic descending
  if (beat%4===0){
    const seq = [12,11,10,7,5,3,2,0];
    const m = root+12 + seq[((beat/4)|0)%8];
    playPluck(noteFreq(m), secsPerBeat()*2, 0.13, t, 0.85);
  }
  // reverb tail tape echo (cheap): single delayed pluck
  if (beat%8===2){
    playPluck(noteFreq(root+12+7), secsPerBeat()*1.5, 0.08, t+0.05, 0.7);
  }
}

const ENGINES = [jazzTick, doowopTick, countryTick, lofiTick, bluesTick, surfTick];
const BPM_PER_GENRE = [96, 84, 104, 72, 88, 130];

function playGenre(g){
  ensureAudio();
  if (audio.state === 'suspended') audio.resume();
  currentGenre = ((g%6)+6)%6;
  bpm = BPM_PER_GENRE[currentGenre];
  trackEl.textContent = '♪ ' + genres[currentGenre] + ' · ' + bpm + ' BPM';
  currentBeat = 0;
  nextNoteTime = audio.currentTime + 0.1;
  // visual: highlight tab
  jbTabs.forEach((tab,i) => { tab.material.emissiveIntensity = (i===currentGenre)?1.4:0.4; });
}

function audioScheduler(){
  if (!audio || currentGenre<0) return;
  const lookahead = 0.12;
  while (nextNoteTime < audio.currentTime + lookahead){
    ENGINES[currentGenre](currentBeat, nextNoteTime);
    nextNoteTime += secsPerBeat();
    currentBeat++;
  }
}

/* ---------- Inputs ---------- */
canvas.addEventListener('click', pick);
splash.addEventListener('click', () => {
  splash.classList.add('hide');
  ensureAudio();
  if (audio.state==='suspended') audio.resume();
  // start with jazz softly
  setTimeout(()=>playGenre(0), 250);
});

let timeOfDay = 5.28; // 5:17am decimal
let timeFlow = 1; // multiplier
let rainIntensity = 0.85;
window.addEventListener('keydown', e => {
  if (e.key==='t' || e.key==='T'){ timeFlow = (timeFlow===1)?40:(timeFlow===40)?-40:1; }
  if (e.key==='j' || e.key==='J'){ playGenre((currentGenre+1)%6); }
  if (e.key==='r' || e.key==='R'){
    rainIntensity = (rainIntensity > 1.0) ? 0.2 : (rainIntensity < 0.4) ? 0.85 : 1.4;
    rainGlassMat.uniforms.uIntensity.value = rainIntensity;
    if (window.__rainGain) window.__rainGain.gain.linearRampToValueAtTime(0.3 + rainIntensity*0.5, audio.currentTime+0.5);
    if (window.__rainFilt) window.__rainFilt.frequency.linearRampToValueAtTime(1500 + rainIntensity*2000, audio.currentTime+0.5);
  }
});

/* =========================================================================
   ANIMATION LOOP
   ========================================================================= */
const clock = new THREE.Clock();
let flickerState = 1.0;

function fmtClock(td){
  const h = Math.floor(td) % 24;
  const m = Math.floor((td*60)%60);
  const ampm = h>=12?'PM':'AM';
  const hh = ((h+11)%12)+1;
  return String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0')+' '+ampm;
}

function tick(){
  const t = clock.getElapsedTime();
  const dt = Math.min(0.05, clock.getDelta());

  timeOfDay = (timeOfDay + dt*timeFlow*0.0006) % 24;
  if (timeOfDay < 0) timeOfDay += 24;
  clockEl.textContent = fmtClock(timeOfDay);

  // adjust dawn light by time
  const dayPhase = (Math.sin((timeOfDay/24)*Math.PI*2 - Math.PI/2)+1)*0.5;
  dawn.intensity = 0.15 + dayPhase*1.2;
  dawn.color.setHSL(0.6 - dayPhase*0.15, 0.6, 0.55);
  scene.fog.color.setHSL(0.62 - dayPhase*0.18, 0.4, 0.04 + dayPhase*0.08);
  ambient.intensity = 0.45 + dayPhase*0.3;

  // shader uniforms
  rainGlassMat.uniforms.uTime.value = t;
  neonMat.uniforms.uTime.value = t;
  formicaMat.uniforms.uTime.value = t;
  haloMat.uniforms.uTime.value = t;
  for (const child of steamGroup.children){
    child.material.uniforms.uTime.value = t;
    // gentle vertical drift
    child.position.y = child.userData.baseY + Math.sin(t*0.7 + child.userData.phase)*0.02;
    child.lookAt(camera.position);
  }
  smokeMat2.uniforms.uTime.value = t;

  // fluorescent flicker
  flickerState = 0.92 + Math.sin(t*120)*0.05;
  if (Math.random()<0.005) flickerState *= 0.4;
  fluor.intensity = 6.0 + flickerState*2.0;
  fluor2.intensity = 0.7 + flickerState*0.4;
  if (window.__buzzGain) window.__buzzGain.gain.value = 0.012 + (1-flickerState)*0.02;

  // neon stutter
  let neonOn = 1.0;
  if (Math.random()<0.012) neonOn = 0.2 + Math.random()*0.4;
  neonMat.uniforms.uFlicker.value = neonOn;
  neonLight.intensity = 1.2 + neonOn*0.8;

  // smoke particle update
  const pa = smokeGeo.attributes.position.array;
  const la = smokeGeo.attributes.aLife.array;
  for (let i=0;i<SMOKE_COUNT;i++){
    la[i] -= dt;
    if (la[i] <= 0){
      pa[3*i+0] = smokeOrigin.x + (Math.random()-0.5)*0.02;
      pa[3*i+1] = smokeOrigin.y + 0.04;
      pa[3*i+2] = smokeOrigin.z + (Math.random()-0.5)*0.02;
      la[i] = 2.5 + Math.random()*1.5;
    } else {
      pa[3*i+0] += (Math.random()-0.5)*0.004 + Math.sin(t*0.7 + i)*0.003*dt*60;
      pa[3*i+1] += (0.18 + Math.random()*0.08) * dt;
      pa[3*i+2] += (Math.random()-0.5)*0.004;
    }
  }
  smokeGeo.attributes.position.needsUpdate = true;
  smokeGeo.attributes.aLife.needsUpdate = true;

  // camera look damping
  look.x += (look.tx - look.x)*0.06;
  look.y += (look.ty - look.y)*0.06;
  camera.rotation.y = -look.x*0.6;
  camera.rotation.x = look.y*0.4;
  camera.position.x = look.x*0.18;
  camera.position.y = 1.55 + look.y*0.06 + Math.sin(t*0.4)*0.005;

  // schedule audio
  audioScheduler();

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

/* prime initial uniform */
rainGlassMat.uniforms.uIntensity.value = rainIntensity;
