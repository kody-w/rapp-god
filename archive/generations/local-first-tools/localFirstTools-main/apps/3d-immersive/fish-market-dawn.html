<script type="module">
import * as THREE from 'three';

/* =====================================================================
   TOYOSU FISH MARKET · 05:14
   A pre-dawn cinematic walk-through. Industrial magic-hour.
   Crushed ice, fluorescent flicker, vendor calls echoing under tin roof.
   ===================================================================== */

/* ---------- 1.  GLOBAL CONFIG  --------------------------------------- */
const CFG = {
  aisleLength: 60,
  stallCount: 8,
  stallSpacing: 7.2,
  stallWidth: 3.4,
  stallDepth: 2.6,
  ceilingHeight: 5.4,
  walkSpeed: 2.7,
  runSpeed: 4.4,
  eyeHeight: 1.62,
  bounds: { minX:-3.6, maxX:3.6, minZ:-30, maxZ:30 }
};

/* ---------- 2.  AUDIO ENGINE  ---------------------------------------- */
class FishMarketAudio {
  constructor(){
    this.ctx = null;
    this.master = null;
    this.busAmbient = null;
    this.busVoice = null;
    this.busFx = null;
    this.started = false;
    this.lastFootstep = 0;
    this.nextVendorCall = 0;
    this.nextBellRing = 0;
    this.nextTruck = 0;
    this.nextCrow = 0;
    this.nextKettle = 0;
  }
  init(){
    if(this.started) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.62;
    this.master.connect(this.ctx.destination);

    // Reverb-ish convolution surrogate via feedback delay (tin-roof market echo)
    this.reverb = this.ctx.createDelay(0.6);
    this.reverb.delayTime.value = 0.18;
    const rfb = this.ctx.createGain(); rfb.gain.value = 0.32;
    const rfilt = this.ctx.createBiquadFilter(); rfilt.type='lowpass'; rfilt.frequency.value=2400;
    this.reverb.connect(rfilt); rfilt.connect(rfb); rfb.connect(this.reverb);
    this.reverb.connect(this.master);

    this.busAmbient = this.ctx.createGain(); this.busAmbient.gain.value = 0.55; this.busAmbient.connect(this.master);
    this.busVoice = this.ctx.createGain(); this.busVoice.gain.value = 0.38; this.busVoice.connect(this.master); this.busVoice.connect(this.reverb);
    this.busFx = this.ctx.createGain(); this.busFx.gain.value = 0.5; this.busFx.connect(this.master); this.busFx.connect(this.reverb);

    this.startFreezerHum();
    this.startTinRoofWind();
    this.nextVendorCall = this.ctx.currentTime + 1.2;
    this.nextBellRing = this.ctx.currentTime + 14;
    this.nextTruck = this.ctx.currentTime + 8;
    this.nextCrow = this.ctx.currentTime + 22;
    this.nextKettle = this.ctx.currentTime + 36;
    this.started = true;
  }

  /* ----- continuous ambient layers ----- */
  startFreezerHum(){
    const ctx=this.ctx;
    // Two detuned saws + lowpass = compressor drone
    const o1=ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=58;
    const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=58.7;
    const o3=ctx.createOscillator(); o3.type='sine'; o3.frequency.value=29;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180; lp.Q.value=0.7;
    const g=ctx.createGain(); g.gain.value=0.18;
    // slow LFO for compressor cycling
    const lfo=ctx.createOscillator(); lfo.frequency.value=0.07;
    const lfoG=ctx.createGain(); lfoG.gain.value=0.08;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    o1.connect(lp); o2.connect(lp); o3.connect(g);
    lp.connect(g); g.connect(this.busAmbient);
    o1.start(); o2.start(); o3.start(); lfo.start();
  }
  startTinRoofWind(){
    const ctx=this.ctx;
    // pink-ish noise through bandpass = distant outside wind / tin roof
    const buf=ctx.createBuffer(1, ctx.sampleRate*4, ctx.sampleRate);
    const d=buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for(let i=0;i<d.length;i++){
      const w=Math.random()*2-1;
      b0=0.99*b0+w*0.0555; b1=0.96*b1+w*0.2965; b2=0.57*b2+w*1.0;
      d[i]=(b0+b1+b2+w*0.2)*0.12;
    }
    const src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=420; bp.Q.value=0.6;
    const g=ctx.createGain(); g.gain.value=0.22;
    const lfo=ctx.createOscillator(); lfo.frequency.value=0.11;
    const lfoG=ctx.createGain(); lfoG.gain.value=0.12;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    src.connect(bp); bp.connect(g); g.connect(this.busAmbient);
    src.start(); lfo.start();
  }

  /* ----- VENDOR CALLS — FM voice synth with formants ----- */
  vendorCall(when, panX){
    const ctx=this.ctx;
    // Build a 2-3 syllable burst from JP-like vowels
    const vowels = [
      // [F1, F2, F3] approximate formant freqs Hz (male 80-140 fundamental)
      {n:'a', f:[770, 1100, 2400]},
      {n:'e', f:[530, 1840, 2480]},
      {n:'i', f:[270, 2290, 3010]},
      {n:'o', f:[570, 840, 2410]},
      {n:'u', f:[440, 1020, 2240]},
    ];
    const consonants = ['h','s','m','y','t','k','r','sh','ch'];
    const syllableCount = 2 + (Math.random()<0.55?1:0) + (Math.random()<0.18?1:0);
    let t = when;
    const fund = 110 + Math.random()*55; // pitch drift between callers
    const totalDur = 0.18 + syllableCount*0.18 + Math.random()*0.18;

    // panner
    const panner = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const outGain = ctx.createGain(); outGain.gain.value=0.0;
    if(panner){ panner.pan.value = panX; outGain.connect(panner); panner.connect(this.busVoice); }
    else { outGain.connect(this.busVoice); }

    // overall envelope (vendor-call shape: fast attack, slight rise, drop)
    const env = ctx.createGain(); env.gain.value=0;
    env.connect(outGain);
    const peak = 0.55 + Math.random()*0.4;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(peak, t+0.04);
    env.gain.linearRampToValueAtTime(peak*0.85, t+totalDur*0.55);
    env.gain.linearRampToValueAtTime(peak*0.95, t+totalDur*0.85);
    env.gain.linearRampToValueAtTime(0, t+totalDur+0.05);

    // pitched saw + square = larynx
    const carrier = ctx.createOscillator(); carrier.type='sawtooth';
    const carrier2 = ctx.createOscillator(); carrier2.type='square';
    carrier2.detune.value = 6;
    const fmMod = ctx.createOscillator(); fmMod.type='sine'; fmMod.frequency.value=5.3;
    const fmGain = ctx.createGain(); fmGain.gain.value=2.6;
    fmMod.connect(fmGain); fmGain.connect(carrier.frequency);

    // pitch contour over the call (rising-then-falling)
    carrier.frequency.setValueAtTime(fund*0.92, t);
    carrier.frequency.linearRampToValueAtTime(fund*1.18, t+totalDur*0.4);
    carrier.frequency.linearRampToValueAtTime(fund*0.78, t+totalDur);
    carrier2.frequency.setValueAtTime(fund*0.92, t);
    carrier2.frequency.linearRampToValueAtTime(fund*1.18, t+totalDur*0.4);
    carrier2.frequency.linearRampToValueAtTime(fund*0.78, t+totalDur);

    // formant filters in parallel
    const formantSum = ctx.createGain(); formantSum.gain.value=0.5;
    formantSum.connect(env);
    const formants = [];
    for(let i=0;i<3;i++){
      const f = ctx.createBiquadFilter(); f.type='bandpass'; f.Q.value = 7 - i*1.5;
      const g = ctx.createGain(); g.gain.value = [0.7, 0.5, 0.3][i];
      carrier.connect(f); carrier2.connect(f); f.connect(g); g.connect(formantSum);
      formants.push(f);
    }

    // breathy noise overlay (consonants)
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate*0.5, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const noise = ctx.createBufferSource(); noise.buffer=noiseBuf; noise.loop=true;
    const noiseFilt = ctx.createBiquadFilter(); noiseFilt.type='highpass'; noiseFilt.frequency.value=2000;
    const noiseG = ctx.createGain(); noiseG.gain.value=0;
    noise.connect(noiseFilt); noiseFilt.connect(noiseG); noiseG.connect(env);

    // schedule per-syllable formant changes
    let syT = t;
    for(let s=0;s<syllableCount;s++){
      const v = vowels[Math.floor(Math.random()*vowels.length)];
      const useC = Math.random()<0.7;
      const c = useC ? consonants[Math.floor(Math.random()*consonants.length)] : null;
      const sylDur = 0.14 + Math.random()*0.16;

      if(c){
        // consonant burst: a quick noise pre-attack
        const cDur = 0.04 + Math.random()*0.04;
        noiseG.gain.setValueAtTime(0, syT);
        noiseG.gain.linearRampToValueAtTime(0.35, syT+0.005);
        noiseG.gain.linearRampToValueAtTime(0.0, syT+cDur);
        // shape filter for fricatives
        if(c==='s'||c==='sh'||c==='ch') noiseFilt.frequency.setValueAtTime(c==='s'?5500:c==='sh'?3200:3800, syT);
        else noiseFilt.frequency.setValueAtTime(2000, syT);
      }
      // formant transition
      formants[0].frequency.setValueAtTime(formants[0].frequency.value, syT);
      formants[0].frequency.linearRampToValueAtTime(v.f[0], syT+0.06);
      formants[1].frequency.setValueAtTime(formants[1].frequency.value, syT);
      formants[1].frequency.linearRampToValueAtTime(v.f[1], syT+0.06);
      formants[2].frequency.setValueAtTime(formants[2].frequency.value, syT);
      formants[2].frequency.linearRampToValueAtTime(v.f[2], syT+0.06);
      syT += sylDur + (Math.random()<0.3?0.05:0.0);
    }

    carrier.start(t); carrier2.start(t); fmMod.start(t); noise.start(t);
    const stop = t+totalDur+0.15;
    carrier.stop(stop); carrier2.stop(stop); fmMod.stop(stop); noise.stop(stop);
  }

  /* ----- AUCTIONEER BELL ----- */
  bellRing(when){
    const ctx=this.ctx;
    const ringCount = 3 + Math.floor(Math.random()*3);
    for(let i=0;i<ringCount;i++){
      const t = when + i*0.18;
      // Tinkly bell = additive sines + fast decay
      const partials = [1, 2.756, 5.404, 8.933, 13.34];
      const out = ctx.createGain(); out.gain.value=0;
      out.connect(this.busFx);
      const fund = 1820 + Math.random()*120;
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(0.32, t+0.003);
      out.gain.exponentialRampToValueAtTime(0.0001, t+0.5);
      partials.forEach((p,k)=>{
        const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=fund*p;
        const g=ctx.createGain(); g.gain.value=Math.pow(0.55,k);
        o.connect(g); g.connect(out);
        o.start(t); o.stop(t+0.55);
      });
    }
  }

  /* ----- DISTANT TRUCK ----- */
  truck(when){
    const ctx=this.ctx;
    const dur = 5 + Math.random()*6;
    const out = ctx.createGain(); out.gain.value=0; out.connect(this.busAmbient);
    const o1=ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=70;
    const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=72;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300; lp.Q.value=2;
    o1.connect(lp); o2.connect(lp); lp.connect(out);
    out.gain.setValueAtTime(0, when);
    out.gain.linearRampToValueAtTime(0.12, when+dur*0.4);
    out.gain.linearRampToValueAtTime(0, when+dur);
    // engine throb LFO
    const lfo=ctx.createOscillator(); lfo.frequency.value=8;
    const lfoG=ctx.createGain(); lfoG.gain.value=14;
    lfo.connect(lfoG); lfoG.connect(o1.frequency);
    o1.start(when); o2.start(when); lfo.start(when);
    o1.stop(when+dur+0.1); o2.stop(when+dur+0.1); lfo.stop(when+dur+0.1);
    // beep beep (reverse warning) ~50% chance
    if(Math.random()<0.5){
      for(let i=0;i<3;i++){
        const bt = when + 1.2 + i*0.55;
        const b = ctx.createOscillator(); b.type='square'; b.frequency.value=1100;
        const bg = ctx.createGain(); bg.gain.value=0;
        b.connect(bg); bg.connect(this.busAmbient);
        bg.gain.setValueAtTime(0,bt);
        bg.gain.linearRampToValueAtTime(0.06, bt+0.005);
        bg.gain.linearRampToValueAtTime(0, bt+0.22);
        b.start(bt); b.stop(bt+0.25);
      }
    }
  }

  /* ----- DISTANT 5AM CROW ----- */
  crow(when){
    const ctx=this.ctx;
    const calls = 1 + Math.floor(Math.random()*3);
    for(let i=0;i<calls;i++){
      const t = when + i*0.45;
      const dur = 0.32;
      const o=ctx.createOscillator(); o.type='sawtooth';
      o.frequency.setValueAtTime(420, t);
      o.frequency.linearRampToValueAtTime(280, t+dur*0.6);
      o.frequency.linearRampToValueAtTime(220, t+dur);
      const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=900; f.Q.value=4;
      const g=ctx.createGain(); g.gain.value=0;
      o.connect(f); f.connect(g); g.connect(this.busFx);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.08, t+0.04);
      g.gain.linearRampToValueAtTime(0.0, t+dur);
      o.start(t); o.stop(t+dur+0.05);
    }
  }

  /* ----- TEA KETTLE WHISTLE ----- */
  kettle(when){
    const ctx=this.ctx;
    const dur = 3.5 + Math.random()*2.5;
    const o = ctx.createOscillator(); o.type='sine';
    const o2 = ctx.createOscillator(); o2.type='sine';
    o.frequency.value = 2100; o2.frequency.value = 2103;
    const noise = ctx.createBufferSource();
    const nb = ctx.createBuffer(1, ctx.sampleRate*0.5, ctx.sampleRate);
    const nd = nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    noise.buffer = nb; noise.loop=true;
    const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2100; nf.Q.value=12;
    const ng = ctx.createGain(); ng.gain.value = 0.4;
    noise.connect(nf); nf.connect(ng);
    const g = ctx.createGain(); g.gain.value=0;
    o.connect(g); o2.connect(g); ng.connect(g);
    g.connect(this.busFx);
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.04, when+0.5);
    g.gain.linearRampToValueAtTime(0.07, when+dur*0.55);
    g.gain.linearRampToValueAtTime(0.05, when+dur*0.85);
    g.gain.linearRampToValueAtTime(0, when+dur);
    // wobble the pitch (kettle vibrato)
    const lfo = ctx.createOscillator(); lfo.frequency.value=6.5;
    const lfoG = ctx.createGain(); lfoG.gain.value=12;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.start(when); o2.start(when); noise.start(when); lfo.start(when);
    const stop = when+dur+0.1;
    o.stop(stop); o2.stop(stop); noise.stop(stop); lfo.stop(stop);
  }

  /* ----- WET FOOTSTEP ----- */
  footstep(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;
    if(t - this.lastFootstep < 0.34) return;
    this.lastFootstep = t;
    const ctx=this.ctx;
    // wet slap = noise burst + low thump
    const nb = ctx.createBuffer(1, ctx.sampleRate*0.18, ctx.sampleRate);
    const nd = nb.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,2);
    const ns = ctx.createBufferSource(); ns.buffer=nb;
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1400; f.Q.value=1.2;
    const g = ctx.createGain(); g.gain.value=0.18;
    ns.connect(f); f.connect(g); g.connect(this.busFx);
    ns.start(t);
    // low thump
    const o = ctx.createOscillator(); o.type='sine'; o.frequency.value=85;
    const og = ctx.createGain(); og.gain.value=0;
    o.connect(og); og.connect(this.busFx);
    og.gain.setValueAtTime(0,t);
    og.gain.linearRampToValueAtTime(0.18, t+0.005);
    og.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    o.start(t); o.stop(t+0.2);
  }

  /* ----- update scheduler ----- */
  update(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    if(t >= this.nextVendorCall){
      const pan = (Math.random()*2-1)*0.85;
      this.vendorCall(t + 0.02, pan);
      this.nextVendorCall = t + 6 + Math.random()*6;
    }
    if(t >= this.nextBellRing){
      this.bellRing(t + 0.05);
      this.nextBellRing = t + 30 + Math.random()*60;
    }
    if(t >= this.nextTruck){
      this.truck(t + 0.05);
      this.nextTruck = t + 18 + Math.random()*30;
    }
    if(t >= this.nextCrow){
      this.crow(t + 0.05);
      this.nextCrow = t + 28 + Math.random()*45;
    }
    if(t >= this.nextKettle){
      this.kettle(t + 0.05);
      this.nextKettle = t + 40 + Math.random()*60;
    }
  }
}

/* WET CONCRETE FLOOR — reflective with subtle puddles */
const concreteVS = /* glsl */`
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  void main(){
    vUv = uv * 14.0;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const concreteFS = /* glsl */`
  precision highp float;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  uniform float uTime;
  uniform vec3 uCamPos;
  uniform vec3 uLight1;
  uniform vec3 uLight2;
  uniform vec3 uLight3;
  uniform vec3 uLight4;
  uniform vec3 uLight5;
  uniform vec3 uLight6;
  uniform float uFlick;

  // hash & noise
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){
    vec2 i=floor(p); vec2 f=fract(p);
    float a=hash(i); float b=hash(i+vec2(1.,0.));
    float c=hash(i+vec2(0.,1.)); float d=hash(i+vec2(1.,1.));
    vec2 u=f*f*(3.-2.*f);
    return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v=0.0, a=0.5;
    for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.07; a*=0.5; }
    return v;
  }

  void main(){
    vec2 uv = vUv;
    // Base concrete: cold gray-blue with grit
    float grit = fbm(uv*7.0)*0.5 + fbm(uv*22.0)*0.3 + fbm(uv*55.0)*0.2;
    vec3 baseCol = mix(vec3(0.16,0.18,0.21), vec3(0.10,0.12,0.14), grit);
    // wet stains
    float stain = smoothstep(0.55, 0.85, fbm(uv*1.4));
    baseCol = mix(baseCol, vec3(0.06,0.08,0.10), stain*0.6);
    // crack lines
    float crack = smoothstep(0.92, 0.99, fbm(uv*4.0+vec2(uTime*0.0,0.0)));
    baseCol = mix(baseCol, vec3(0.04,0.05,0.06), crack*0.7);

    // PUDDLES — low-frequency mask
    float puddle = smoothstep(0.62, 0.78, fbm(uv*0.5 + vec2(2.3, 7.1)));
    // small ripples in puddle
    float ripple = sin(length(vWorldPos.xz*8.0)*1.8 - uTime*1.4)*0.5+0.5;
    ripple = pow(ripple, 8.0);
    puddle = clamp(puddle - ripple*0.05*puddle, 0.0, 1.0);

    // Fluorescent reflections from each fixture
    vec3 reflectCol = vec3(0.0);
    vec3 lights[6];
    lights[0]=uLight1; lights[1]=uLight2; lights[2]=uLight3;
    lights[3]=uLight4; lights[4]=uLight5; lights[5]=uLight6;
    for(int i=0;i<6;i++){
      vec3 L = lights[i];
      vec2 dxz = vWorldPos.xz - L.xz;
      float d = length(dxz);
      // glow shape based on wet specular
      float glow = exp(-d*0.55);
      float streak = exp(-abs(dxz.x)*1.6) * exp(-abs(dxz.y*0.0)) * exp(-d*0.18);
      float fix = (i==2) ? uFlick : 1.0; // light 3 stutters
      reflectCol += vec3(0.78,0.92,1.05) * (glow*0.35 + streak*0.55) * fix;
    }
    reflectCol *= mix(0.18, 1.0, puddle);

    // Specular hot streak directly under fluorescents (anisotropic-ish)
    vec3 col = baseCol + reflectCol * (0.6 + 0.4*puddle);

    // Cool tint overall
    col *= vec3(0.92, 0.97, 1.04);

    // edge darkening
    float edge = smoothstep(20.0, 32.0, length(vWorldPos.xz));
    col = mix(col, vec3(0.02,0.03,0.04), edge*0.6);

    gl_FragColor = vec4(col, 1.0);
  }
`;

/* FLUORESCENT FIXTURE — flickering tube */
const fluorVS = /* glsl */`
  varying vec2 vUv;
  varying vec3 vNormal;
  void main(){
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
  }
`;
const fluorFS = /* glsl */`
  precision highp float;
  varying vec2 vUv;
  varying vec3 vNormal;
  uniform float uTime;
  uniform float uFlicker;
  uniform float uIsBroken;
  void main(){
    // tube glow: brighter mid, slight gradient
    float along = smoothstep(0.0,0.05,vUv.x) * smoothstep(1.0,0.95,vUv.x);
    float across = 1.0 - abs(vUv.y-0.5)*1.6;
    across = clamp(across, 0.0, 1.0);
    float intensity = along * pow(across, 0.5);

    // flicker for broken fixture
    float flickerVal = 1.0;
    if(uIsBroken > 0.5){
      float n = fract(sin(floor(uTime*23.0))*43758.5453);
      float f2 = fract(sin(floor(uTime*7.0))*12345.678);
      flickerVal = (n>0.6) ? 1.0 : (f2>0.85 ? 0.4 : 0.08);
      flickerVal *= 0.6 + 0.4*sin(uTime*180.0);
    }
    vec3 col = vec3(1.05, 1.12, 1.18) * intensity * flickerVal * 2.4;
    // a faint hum-modulated band
    col += vec3(0.06,0.08,0.12) * sin(uTime*100.0 + vUv.x*40.0)*0.05;
    gl_FragColor = vec4(col, 1.0);
  }
`;

/* ICE PILE — translucent cubes with cool tint */
const iceVS = /* glsl */`
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec2 vUv;
  void main(){
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorldPos = wp.xyz;
    vNormal = normalize(normalMatrix * normal);
    vViewDir = normalize(cameraPosition - wp.xyz);

`;
const iceFS = /* glsl */`
  precision highp float;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec2 vUv;
  uniform float uTime;

  float hash(vec3 p){ p=fract(p*vec3(443.8,397.2,491.7)); p+=dot(p,p.yzx+19.19); return fract((p.x+p.y)*p.z); }
  float noise3(vec3 p){
    vec3 i=floor(p); vec3 f=fract(p); f=f*f*(3.0-2.0*f);
    float n000=hash(i); float n100=hash(i+vec3(1,0,0));
    float n010=hash(i+vec3(0,1,0)); float n110=hash(i+vec3(1,1,0));
    float n001=hash(i+vec3(0,0,1)); float n101=hash(i+vec3(1,0,1));
    float n011=hash(i+vec3(0,1,1)); float n111=hash(i+vec3(1,1,1));
    return mix(
      mix(mix(n000,n100,f.x),mix(n010,n110,f.x),f.y),
      mix(mix(n001,n101,f.x),mix(n011,n111,f.x),f.y), f.z);
  }
  void main(){
    // cube facets via worldspace
    vec3 p = vWorldPos*9.0;
    float facets = noise3(floor(p)+0.5);
    float crystal = noise3(p*2.0)*0.5 + noise3(p*7.0)*0.3 + noise3(p*22.0)*0.2;

    vec3 baseIce = mix(vec3(0.78,0.88,0.96), vec3(0.92,0.97,1.0), crystal);
    // cool-blue interior tint
    baseIce *= mix(0.65, 1.05, facets);

    // fresnel rim
    float fres = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.0);
    vec3 rim = vec3(1.0,1.05,1.1) * fres * 0.7;

    // subsurface scatter glow
    float sss = pow(crystal, 1.5)*0.6;

    vec3 col = baseIce*0.7 + rim + sss*vec3(0.85,0.96,1.05);

    // Sparkles — bright random pinpoints
    float spark = pow(noise3(p*30.0+vec3(uTime*0.5)), 22.0);
    col += vec3(2.0,2.1,2.2)*spark;

    gl_FragColor = vec4(col, 1.0);
  }
`;

const fishFS = /* glsl */`
  precision highp float;
  varying vec3 vWorldPos;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec2 vUv;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform int uSpecies; // 0=tuna 1=octopus 2=prawn 3=seabream 4=mackerel
  uniform float uVariant;

  float hash(vec3 p){ p=fract(p*vec3(443.8,397.2,491.7)); p+=dot(p,p.yzx+19.19); return fract((p.x+p.y)*p.z); }
  float noise3(vec3 p){
    vec3 i=floor(p); vec3 f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(
      mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
      mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),
      f.z);
  }

  vec3 speciesColor(int s, vec2 uv, vec3 lp){
    float scale = noise3(lp*45.0 + uVariant)*0.4 + noise3(lp*120.0)*0.6;
    float belly = smoothstep(-0.2, 0.2, lp.y);
    if(s==0){
      // TUNA — deep red-pink flesh, dark blue back
      vec3 back = vec3(0.08,0.10,0.18);
      vec3 flesh = mix(vec3(0.78,0.18,0.22), vec3(0.92,0.32,0.30), scale);
      vec3 col = mix(flesh, back, smoothstep(0.45,0.95,belly));
      return col;
    } else if(s==1){
      // OCTOPUS — pink-purple, suction cup pattern
      float sucker = step(0.7, noise3(lp*80.0));
      vec3 base = mix(vec3(0.62,0.30,0.42), vec3(0.85,0.55,0.62), scale);
      base = mix(base, vec3(0.92,0.78,0.78), sucker*0.5);
      return base;
    } else if(s==2){
      // PRAWN — translucent orange shell with darker bands
      float band = sin(lp.x*40.0)*0.5+0.5;
      band = step(0.55, band);
      vec3 col = mix(vec3(0.96,0.55,0.30), vec3(0.78,0.32,0.18), band);
      return col;
    } else if(s==3){
      // SEA BREAM — silver with pink flush
      float silver = 0.78 + scale*0.25;
      vec3 col = vec3(silver,silver*0.95,silver*1.02);
      col += vec3(0.18,0.05,0.08)*smoothstep(0.0,0.4,belly);
      return col;
    } else {
      // MACKEREL — blue-silver with dark wavy stripes
      float stripe = sin(lp.x*22.0 + sin(lp.z*8.0)*1.5)*0.5+0.5;
      stripe = smoothstep(0.55, 0.75, stripe);
      vec3 base = mix(vec3(0.72,0.78,0.85), vec3(0.18,0.28,0.42), stripe*0.7);
      base = mix(base, vec3(0.85,0.88,0.92), smoothstep(0.55,0.95,belly));
      return base;
    }
  }

  void main(){
    vec3 base = speciesColor(uSpecies, vUv, vLocalPos);
    // wet sheen — high fresnel
    float fres = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 2.5);
    vec3 sheen = vec3(0.85,0.94,1.05)*fres*0.55;
    // scale sparkle (tiny specular pinpoints)
    float scaleN = noise3(vLocalPos*180.0);
    float spec = pow(scaleN, 18.0)*1.4;
    // slightly cool fluorescent ambient
    vec3 amb = vec3(0.78,0.86,0.96);
    vec3 col = base*amb*0.65 + sheen + vec3(0.95,0.98,1.0)*spec;
    // dampen octopus a bit
    if(uSpecies==1) col *= 1.05;
    gl_FragColor = vec4(col, 1.0);
  }
`;

/* WOOD STALL SHADER */
const woodVS = /* glsl */`
  varying vec3 vWorldPos; varying vec2 vUv; varying vec3 vNormal;
  void main(){
    vUv=uv; vec4 wp=modelMatrix*vec4(position,1.0); vWorldPos=wp.xyz;
    vNormal=normalize(normalMatrix*normal);
    gl_Position=projectionMatrix*viewMatrix*wp;
  }
`;
const woodFS = /* glsl */`
  precision highp float;
  varying vec3 vWorldPos; varying vec2 vUv; varying vec3 vNormal;
  uniform float uTime;
  uniform vec3 uTint;
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){ vec2 i=floor(p); vec2 f=fract(p); float a=hash(i); float b=hash(i+vec2(1,0)); float c=hash(i+vec2(0,1)); float d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y; }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.07; a*=0.5; } return v; }
  void main(){
    vec2 uv = vUv*vec2(1.0, 8.0);
    float grain = fbm(uv*4.0+fbm(uv*0.5)*1.5);
    float rings = sin(uv.y*1.8 + grain*5.0)*0.5+0.5;
    vec3 light = vec3(0.55,0.40,0.28);
    vec3 dark = vec3(0.28,0.18,0.12);
    vec3 col = mix(dark, light, rings*0.5+grain*0.5);
    col *= uTint;
    // wet patches
    float wet = smoothstep(0.6,0.85,fbm(uv*0.4));
    col = mix(col, col*0.55, wet*0.5);
    // fluorescent sheen
    float top = smoothstep(0.0, 0.4, vNormal.y);
    col += vec3(0.18,0.22,0.27)*top*0.4;
    gl_FragColor = vec4(col, 1.0);
  }
`;

/* STEAM SHADER */
const steamVS = /* glsl */`
  varying vec2 vUv; varying vec3 vWorldPos;
  uniform float uTime;
  void main(){
    vUv = uv;
    vec3 p = position;
    p.x += sin(uTime*0.6 + position.y*2.0)*0.04;
    p.z += cos(uTime*0.5 + position.y*1.7)*0.04;
    vec4 wp = modelMatrix * vec4(p,1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const steamFS = /* glsl */`
  precision highp float;
  varying vec2 vUv; varying vec3 vWorldPos;
  uniform float uTime;
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){ vec2 i=floor(p); vec2 f=fract(p); float a=hash(i); float b=hash(i+vec2(1,0)); float c=hash(i+vec2(0,1)); float d=hash(i+vec2(1,1)); vec2 u=f*f*(3.-2.*f); return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y; }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){ v+=a*noise(p); p*=2.07; a*=0.5; } return v; }
  void main(){
    vec2 uv = vUv;
    float t = uTime*0.22;
    float n = fbm(uv*3.0 + vec2(t, -t*1.4));
    float n2 = fbm(uv*7.0 + vec2(-t*0.8, t*1.1));
    float density = pow(n*0.6 + n2*0.4, 1.5);
    // shape: rises and dissipates
    float shape = smoothstep(1.0, 0.5, vUv.y) * smoothstep(0.0, 0.15, vUv.y);
    float radial = 1.0 - smoothstep(0.2, 0.5, abs(vUv.x-0.5));
    density *= shape * radial;
    vec3 warm = mix(vec3(0.95,0.86,0.72), vec3(0.78,0.84,0.92), vUv.y);
    gl_FragColor = vec4(warm, density*0.85);
  }
`;

function makeFluorescents(){
  const fixtures = [];
  // Strip lights every ~7 m down the aisle, plus side rows
  const positions = [];
  for(let i=-4;i<=4;i++) positions.push(new THREE.Vector3(0, CFG.ceilingHeight-0.1, i*7.5));
  for(let i=-3;i<=3;i++) positions.push(new THREE.Vector3(-5.5, CFG.ceilingHeight-0.1, i*8));
  for(let i=-3;i<=3;i++) positions.push(new THREE.Vector3(5.5, CFG.ceilingHeight-0.1, i*8));

  positions.forEach((pos, idx)=>{
    // The tube
    const isBroken = (idx===2);
    const tubeGeo = new THREE.PlaneGeometry(2.2, 0.32);
    const mat = new THREE.ShaderMaterial({
      vertexShader: fluorVS, fragmentShader: fluorFS,
      uniforms:{ uTime:{value:0}, uFlicker:{value:0}, uIsBroken:{value: isBroken?1:0} },
      side: THREE.DoubleSide, transparent: false
    });
    const tube = new THREE.Mesh(tubeGeo, mat);
    tube.rotation.x = -Math.PI/2;
    tube.position.copy(pos);
    scene.add(tube);

    // housing (slim box)
    const housingGeo = new THREE.BoxGeometry(2.4, 0.18, 0.5);
    const housingMat = new THREE.MeshBasicMaterial({color:0x1a1f25});
    const housing = new THREE.Mesh(housingGeo, housingMat);
    housing.position.copy(pos);
    housing.position.y += 0.04;
    scene.add(housing);

    // PointLight for actual scene lighting
    const light = new THREE.PointLight(0xcfe3f5, isBroken?0.8:1.4, 18, 1.6);
    light.position.copy(pos);
    light.position.y -= 0.2;
    scene.add(light);
    fixtures.push({ tube, housing, light, material: mat, isBroken, basePos: pos.clone() });
    fixturePositions.push(pos.clone());
  });
  return fixtures;
}
const fluorescents = makeFluorescents();

// Update floor uniforms with the 6 nearest light positions (just take first 6)
function updateFloorLights(){
  const mat = floor.userData.material;
  const u = mat.uniforms;
  const keys = ['uLight1','uLight2','uLight3','uLight4','uLight5','uLight6'];
  for(let i=0;i<6;i++){

    u[keys[i]].value.copy(f.light.position);
  }
}

const fishMaterials = []; // for animation

function buildStall(side, idx, zPos){
  const group = new THREE.Group();
  const sign = side==='left' ? -1 : 1;
  group.position.set(sign*CFG.stallWidth*0.85, 0, zPos);

  // Tilted counter top (slight angle towards aisle)
  const counterGeo = new THREE.BoxGeometry(CFG.stallWidth, 0.12, CFG.stallDepth);
  const counterMat = new THREE.ShaderMaterial({
    vertexShader: woodVS, fragmentShader: woodFS,
    uniforms:{ uTime:{value:0}, uTint:{value:new THREE.Color(0.9,0.85,0.78)} }
  });
  const counter = new THREE.Mesh(counterGeo, counterMat);
  counter.position.set(0, 0.85, 0);
  group.add(counter);

  // Legs
  const legMat = new THREE.MeshBasicMaterial({color:0x1a1410});
  const legGeo = new THREE.BoxGeometry(0.08, 0.85, 0.08);
  const legPositions = [
    [-CFG.stallWidth/2+0.1, 0.42, -CFG.stallDepth/2+0.1],
    [ CFG.stallWidth/2-0.1, 0.42, -CFG.stallDepth/2+0.1],
    [-CFG.stallWidth/2+0.1, 0.42,  CFG.stallDepth/2-0.1],
    [ CFG.stallWidth/2-0.1, 0.42,  CFG.stallDepth/2-0.1],
  ];
  legPositions.forEach(p=>{ const leg=new THREE.Mesh(legGeo,legMat); leg.position.set(...p); group.add(leg); });

  // Back wall (low) with hanging signage
  const backGeo = new THREE.PlaneGeometry(CFG.stallWidth, 1.6);
  const backMat = new THREE.MeshBasicMaterial({color:0x141a1f});
  const back = new THREE.Mesh(backGeo, backMat);
  back.position.set(0, 1.7, sign*-CFG.stallDepth/2);
  back.rotation.y = sign>0 ? Math.PI : 0;
  group.add(back);

  // Hanging price/sign card (canvas texture)
  const sign1 = makeSignCanvas(['本まぐろ','TUNA','¥4,800/kg','築地直送'][Math.floor(Math.random()*4)] || 'まぐろ', idx);
  const signMat = new THREE.MeshBasicMaterial({map:sign1, transparent:true});
  const signGeo = new THREE.PlaneGeometry(0.85, 0.55);
  const signMesh = new THREE.Mesh(signGeo, signMat);
  signMesh.position.set(-CFG.stallWidth/4 + (idx%3)*0.6, 2.45, sign*(-CFG.stallDepth/2+0.02));
  signMesh.rotation.y = sign>0 ? Math.PI : 0;
  group.add(signMesh);

  // Crushed-ice tray (a flat shallow box on top)
  const iceTrayGeo = new THREE.BoxGeometry(CFG.stallWidth*0.86, 0.32, CFG.stallDepth*0.7);
  const iceMat = new THREE.ShaderMaterial({
    vertexShader: iceVS, fragmentShader: iceFS,
    uniforms:{ uTime:{value:0} }
  });
  const iceTray = new THREE.Mesh(iceTrayGeo, iceMat);
  iceTray.position.set(0, 1.05, 0);
  group.add(iceTray);

  // FISH! Many little procedural fish on the ice
  const speciesIdx = idx % 5;
  const fishCount = 7 + Math.floor(Math.random()*6);
  for(let f=0;f<fishCount;f++){
    const fish = buildFish(speciesIdx);
    fish.position.set(
      (Math.random()*0.86 - 0.43) * CFG.stallWidth,
      1.22 + Math.random()*0.05,
      (Math.random()*0.7 - 0.35) * CFG.stallDepth
    );
    fish.rotation.y = Math.random()*Math.PI*2;
    fish.rotation.z = (Math.random()-0.5)*0.4;
    group.add(fish);
  }
  // Mix in one second species occasionally
  if(Math.random()<0.45){
    const altSpecies = (speciesIdx + 1 + Math.floor(Math.random()*3)) % 5;
    const altCount = 3 + Math.floor(Math.random()*4);
    for(let f=0;f<altCount;f++){
      const fish = buildFish(altSpecies);
      fish.position.set(
        (Math.random()*0.86 - 0.43) * CFG.stallWidth,
        1.22 + Math.random()*0.05,
        (Math.random()*0.7 - 0.35) * CFG.stallDepth
      );
      fish.rotation.y = Math.random()*Math.PI*2;
      group.add(fish);
    }
  }

  scene.add(group);
  return group;
}

function buildFish(speciesIdx){
  // species: 0 tuna(big oval), 1 octopus(blob+arms), 2 prawn(tube), 3 seabream(med oval), 4 mackerel(slim long)
  let geo;
  const variant = Math.random();
  if(speciesIdx===0){
    // tuna — long, slightly torpedo
    geo = new THREE.CapsuleGeometry(0.18 + Math.random()*0.05, 0.55+Math.random()*0.2, 6, 12);
    geo.rotateZ(Math.PI/2);
    geo.scale(1.0, 0.7, 0.7);
  } else if(speciesIdx===1){
    // octopus — sphere with 8 cone arms
    const blob = new THREE.SphereGeometry(0.18, 12, 10);
    const m = new THREE.ShaderMaterial({ vertexShader:fishVS, fragmentShader:fishFS, uniforms:{ uTime:{value:0}, uSpecies:{value:1}, uVariant:{value:variant} }});
    fishMaterials.push(m);
    const g = new THREE.Group();
    const head = new THREE.Mesh(blob, m); g.add(head);
    for(let a=0;a<8;a++){
      const arm = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.32, 6), m);
      const ang = (a/8)*Math.PI*2;
      arm.position.set(Math.cos(ang)*0.12, -0.1, Math.sin(ang)*0.12);
      arm.rotation.x = Math.PI;
      arm.rotation.z = Math.cos(ang)*0.5;
      arm.rotation.y = ang;
      g.add(arm);
    }
    g.scale.setScalar(0.85 + Math.random()*0.4);
    return g;
  } else if(speciesIdx===2){
    // prawn — short curved cylinder
    geo = new THREE.CapsuleGeometry(0.045, 0.18, 4, 8);
    geo.rotateZ(Math.PI/2);
  } else if(speciesIdx===3){
    // seabream — medium oval
    geo = new THREE.SphereGeometry(0.16, 14, 10);
    geo.scale(1.5, 0.7, 0.55);
  } else {
    // mackerel — long slim
    geo = new THREE.CapsuleGeometry(0.07, 0.32, 4, 10);
    geo.rotateZ(Math.PI/2);
    geo.scale(1.0, 0.65, 0.5);
  }
  const mat = new THREE.ShaderMaterial({
    vertexShader: fishVS, fragmentShader: fishFS,
    uniforms:{ uTime:{value:0}, uSpecies:{value:speciesIdx}, uVariant:{value:variant} }
  });
  fishMaterials.push(mat);
  const fish = new THREE.Mesh(geo, mat);
  fish.scale.setScalar(0.85 + Math.random()*0.4);
  return fish;
}

function makeSignCanvas(text, idx){
  const c = document.createElement('canvas');
  c.width = 256; c.height = 160;
  const g = c.getContext('2d');
  // paper background
  g.fillStyle = ['#f4eed8','#efe5c8','#e8dcb6','#fff5dc'][idx%4];
  g.fillRect(0,0,c.width,c.height);
  // edge stain
  const grd = g.createLinearGradient(0,0,0,c.height);
  grd.addColorStop(0,'rgba(60,40,20,0)');
  grd.addColorStop(1,'rgba(60,40,20,0.35)');
  g.fillStyle=grd; g.fillRect(0,0,c.width,c.height);
  // bold ink text
  g.fillStyle='#181210';
  g.textAlign='center';
  g.font='bold 56px "Hiragino Sans", sans-serif';
  g.fillText(text, c.width/2, c.height/2 + 20);
  // small ¥ tag corner
  g.font = 'bold 14px monospace';
  g.fillStyle='#a6231b';
  g.fillText('特選', 36, 28);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

  g.lineTo(174, 240);
  g.lineTo(180, 200);
  g.lineTo(76, 200);
  g.closePath();
  g.fill();
  // sleeves
  g.fillRect(58, 200, 28, 120);
  g.fillRect(170, 200, 28, 120);
  // hands
  g.fillStyle = skin;
  g.beginPath(); g.arc(72, 326, 12, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(184, 326, 12, 0, Math.PI*2); g.fill();

  // neck
  g.fillStyle = skin;
  g.fillRect(116, 180, 24, 26);

  // head
  g.beginPath(); g.arc(128, 165, 28, 0, Math.PI*2); g.fillStyle = skin; g.fill();
  // hair / cap shadow
  g.fillStyle = cap;
  g.beginPath();
  g.moveTo(98, 162);
  g.quadraticCurveTo(128, 110, 158, 162);
  g.lineTo(160, 145);
  g.quadraticCurveTo(128, 100, 96, 145);
  g.closePath();
  g.fill();
  // forehead band
  g.fillStyle = '#a6231b';
  g.fillRect(100, 152, 56, 6);

  // eyes (tiny dots)
  g.fillStyle='#171717';
  g.fillRect(118, 168, 3, 4);
  g.fillRect(135, 168, 3, 4);

  // rim light (cool from above)
  g.globalCompositeOperation = 'screen';
  const rimGrd = g.createLinearGradient(0,0,0,512);
  rimGrd.addColorStop(0,'rgba(170,200,230,0.45)');
  rimGrd.addColorStop(0.4,'rgba(170,200,230,0.0)');
  g.fillStyle=rimGrd; g.fillRect(0,0,c.width,c.height);
  g.globalCompositeOperation = 'source-over';

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function buildVendor(x, z, variant){
  const tex = makeVendorTexture(variant);
  const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, alphaTest:0.05, side:THREE.DoubleSide});
  const geo = new THREE.PlaneGeometry(0.9, 1.85);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0.95, z);
  m.userData.basePos = m.position.clone();
  m.userData.bobOffset = Math.random()*Math.PI*2;
  scene.add(m);
  return m;
}
const vendors = [
  buildVendor(-2.4, -8, 0),
  buildVendor( 2.4, 4, 1),
  buildVendor(-2.4, 14, 2),
  buildVendor( 2.0, -22, 0)  // tea corner attendant area
];

/* ---------- 10. MISC PROPS — crates, hoses, blue tubs ---------------- */
function buildMiscProps(){
  // Blue plastic tubs in random spots
  for(let i=0;i<14;i++){
    const tubGeo = new THREE.BoxGeometry(0.55, 0.32, 0.4);
    const tubMat = new THREE.MeshBasicMaterial({color:[0x2363a5,0x1c5896,0x2a72b8][i%3]});
    const tub = new THREE.Mesh(tubGeo, tubMat);
    const side = i%2 === 0 ? -1 : 1;
    tub.position.set(side * (3.5 + Math.random()*1.6), 0.16, -25 + i*4 + Math.random()*1.2);
    tub.rotation.y = Math.random()*Math.PI;
    scene.add(tub);
  }
  // Wooden crates near walls
  for(let i=0;i<10;i++){
    const cg = new THREE.BoxGeometry(0.6, 0.5, 0.45);
    const cm = new THREE.ShaderMaterial({ vertexShader:woodVS, fragmentShader:woodFS, uniforms:{ uTime:{value:0}, uTint:{value:new THREE.Color(0.78,0.62,0.44)} }});
    const cr = new THREE.Mesh(cg, cm);
    const s = i%2===0?-1:1;
    cr.position.set(s*(5.4+Math.random()*1.5), 0.25, -28+i*5.4+Math.random()*2);
    cr.rotation.y = Math.random()*0.5;
    scene.add(cr);
  }
  // Coiled green hose near the floor
  for(let i=0;i<3;i++){
    const tor = new THREE.TorusGeometry(0.3, 0.04, 6, 24);
    const tm = new THREE.MeshBasicMaterial({color:0x2c5e3a});
    const t = new THREE.Mesh(tor, tm);
    t.position.set([-4.8, 4.6, 4.2][i], 0.05, [-12, 6, -16][i]);
    t.rotation.x = Math.PI/2;
    scene.add(t);
  }
  // Hanging bare bulb at one stall (warm contrast)
  const bulb = new THREE.PointLight(0xffc080, 0.5, 4, 2.0);
  bulb.position.set(0, 2.6, -2);
  scene.add(bulb);
  const bulbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8), new THREE.MeshBasicMaterial({color:0xffd09a}));
  bulbMesh.position.copy(bulb.position);
  scene.add(bulbMesh);
}
buildMiscProps();

/* ---------- 11. DUST PARTICLES IN LIGHT ------------------------------ */
function buildDust(){
  const count = 220;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const seed = new Float32Array(count);
  for(let i=0;i<count;i++){
    pos[i*3] = (Math.random()-0.5)*12;
    pos[i*3+1] = Math.random()*4 + 0.5;
    pos[i*3+2] = (Math.random()-0.5)*55;
    seed[i] = Math.random();
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('seed', new THREE.BufferAttribute(seed, 1));
  const mat = new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    uniforms:{ uTime:{value:0} },
    vertexShader: `
      attribute float seed;
      varying float vSeed;
      uniform float uTime;
      void main(){
        vSeed = seed;
        vec3 p = position;
        p.y += sin(uTime*0.3 + seed*10.0)*0.08;
        p.x += cos(uTime*0.2 + seed*7.0)*0.04;
        vec4 mv = modelViewMatrix * vec4(p,1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = (1.5 + seed*1.5) * (200.0 / -mv.z);
      }`,
    fragmentShader: `
      varying float vSeed;
      void main(){
        vec2 d = gl_PointCoord - 0.5;
        float a = smoothstep(0.5, 0.0, length(d));
        gl_FragColor = vec4(vec3(0.85,0.92,1.0), a*0.18);
      }`
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  return { mat };
}
const dust = buildDust();

/* ---------- 12. CONTROLS — WASD + mouse drag look -------------------- */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

let dragging=false, lastX=0, lastY=0;
let yaw = Math.PI, pitch = -0.05;
canvas.addEventListener('mousedown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', ()=>{ dragging=false; });
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  yaw -= dx*0.0035;
  pitch -= dy*0.0035;
  pitch = Math.max(-1.1, Math.min(1.1, pitch));
});
// Touch
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length>0){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
});
window.addEventListener('touchend', ()=>{ dragging=false; });
window.addEventListener('touchmove', e=>{
  if(!dragging || e.touches.length===0) return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  yaw -= dx*0.0035; pitch -= dy*0.0035;
  pitch = Math.max(-1.1, Math.min(1.1, pitch));
}, {passive:true});

let walkBob = 0;
function updateMovement(dt){
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  let mv = new THREE.Vector3();
  let moving = false;
  const speed = (keys['shift'] ? CFG.runSpeed : CFG.walkSpeed);
  if(keys['w'] || keys['arrowup']){ mv.add(fwd); moving=true; }
  if(keys['s'] || keys['arrowdown']){ mv.sub(fwd); moving=true; }
  if(keys['a'] || keys['arrowleft']){ mv.sub(right); moving=true; }
  if(keys['d'] || keys['arrowright']){ mv.add(right); moving=true; }
  if(mv.lengthSq()>0){ mv.normalize().multiplyScalar(speed*dt); camera.position.add(mv); }
  // bounds
  camera.position.x = Math.max(CFG.bounds.minX, Math.min(CFG.bounds.maxX, camera.position.x));
  camera.position.z = Math.max(CFG.bounds.minZ, Math.min(CFG.bounds.maxZ, camera.position.z));
  // walk bob
  if(moving){
    walkBob += dt * (keys['shift']?14:9);
    camera.position.y = CFG.eyeHeight + Math.sin(walkBob)*0.04;
    if(audio.started && Math.sin(walkBob) > 0.92){ audio.footstep(); }
  } else {
    camera.position.y += (CFG.eyeHeight - camera.position.y)*0.08;
  }
  // apply yaw/pitch
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

/* ---------- 13. FILM GRAIN OVERLAY  ---------------------------------- */
const grainCanvas = document.getElementById('grain');
const grainCtx = grainCanvas.getContext('2d');
function resizeGrain(){
  grainCanvas.width = window.innerWidth/2;
  grainCanvas.height = window.innerHeight/2;
}
resizeGrain();
function drawGrain(){
  const w = grainCanvas.width, h = grainCanvas.height;
  const img = grainCtx.createImageData(w, h);
  const d = img.data;
  for(let i=0;i<d.length;i+=4){
    const v = (Math.random()*255)|0;
    d[i]=v; d[i+1]=v+8; d[i+2]=v+18; d[i+3]=22;
  }
  grainCtx.putImageData(img,0,0);
}

/* ---------- 14. ANIMATE LOOP ----------------------------------------- */
const clock = new THREE.Clock();
let frameCount = 0;
function animate(){
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.elapsedTime;
  frameCount++;

  updateMovement(dt);
  audio.update();

  // shader uniforms
  floor.userData.material.uniforms.uTime.value = t;
  floor.userData.material.uniforms.uCamPos.value.copy(camera.position);
  // flicker for the broken-tube reflection
  const brokenIdx = 2;
  const broken = fluorescents[brokenIdx];
  let flickAmt = 1.0;
  if(broken && broken.isBroken){
    const r1 = Math.sin(t*53.0 + Math.sin(t*13.0)*4.0);
    flickAmt = (r1 > 0.2) ? 1.0 : (Math.random()<0.3 ? 0.3 : 0.05);
    broken.light.intensity = (flickAmt > 0.5 ? 1.3 : 0.2);
  }
  floor.userData.material.uniforms.uFlick.value = flickAmt;

  // fluor materials uTime
  fluorescents.forEach(f=>{ f.material.uniforms.uTime.value = t; });

  // ice + fish
  fishMaterials.forEach(m=> m.uniforms.uTime.value = t);
  scene.traverse(obj=>{
    if(obj.material && obj.material.uniforms){
      if(obj.material.uniforms.uTime) obj.material.uniforms.uTime.value = t;
    }
  });

  // steam rises
  teaCorner.steamMats.forEach((s,i)=>{
    s.mat.uniforms.uTime.value = t + i*0.4;
    s.mesh.position.y = s.base + ((t*0.4 + i*0.6) % 1.2);
    // make billboard face camera roughly
    s.mesh.lookAt(camera.position.x, s.mesh.position.y, camera.position.z);
  });

  // vendor billboards face camera (Y only) + tiny bob
  vendors.forEach(v=>{
    const dx = camera.position.x - v.position.x;
    const dz = camera.position.z - v.position.z;
    v.rotation.y = Math.atan2(dx, dz);
    v.position.y = v.userData.basePos.y + Math.sin(t*1.3 + v.userData.bobOffset)*0.012;
  });

  // dust
  dust.mat.uniforms.uTime.value = t;

  // grain ~30 fps
  if(frameCount % 2 === 0) drawGrain();

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

/* ---------- 15. RESIZE  ---------------------------------------------- */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  resizeGrain();
});

/* ---------- 16. AUDIO GATE  ------------------------------------------ */
const gate = document.getElementById('gate');
function startEverything(){
  try { audio.init(); } catch(err){ console.warn('audio init failed', err); }
  gate.classList.add('hide');
  setTimeout(()=>{ gate.style.display='none'; }, 1700);
}
gate.addEventListener('click', startEverything);
gate.addEventListener('touchend', startEverything);
window.addEventListener('keydown', e=>{
  if(!audio.started && (e.key==='Enter' || e.key===' ')) startEverything();
});

/* ---------- 17. BOOT  ------------------------------------------------ */
animate();

// Helpful console banner
console.log('%c Toyosu Fish Market · 05:14 ', 'background:#0a1018;color:#9bd6ff;font-size:14px;padding:6px 12px;letter-spacing:0.3em;');
console.log('Walk with WASD. Drag to look. Audio gated by click.');
</script>
