      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.

        // Heuristic: only enable if the experience is mood-driven AND

        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');

        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);

      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;

      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;

        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);

      function ensureHud(){

          window.LEVIGOLD.fpsHistory.push(fps);

      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){

          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));

        return _set.call(this, key, val);

      // ── Audio gesture auto-overlay ─────────────────────────────────────

              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);

            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';

<script>
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14181f);

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.set(0, 0, 2);

// ── Single fullscreen quad with the window shader ───────────────────
const winShader = {
  uniforms:{
    time: {value: 0},
    resolution: {value: new THREE.Vector2(window.innerWidth, window.innerHeight)},
    bird: {value: 0}, // 0 = no bird, 1 = bird visible (animated)
    birdX: {value: 0}, // 0..1
    birdY: {value: 0}
  },
  vertexShader:`varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader:`
    uniform float time;
    uniform vec2 resolution;
    uniform float bird;
    uniform float birdX;
    uniform float birdY;
    varying vec2 vUv;

    float h(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
    float n(vec2 p){
      vec2 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(mix(h(i), h(i+vec2(1,0)), f.x),
                 mix(h(i+vec2(0,1)), h(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p){
      float s = 0.0, a = 0.5;
      for (int i=0; i<4; i++) { s += a*n(p); p *= 2.07; a *= 0.5; }
      return s;
    }
    float drop(vec2 uv, vec2 center, float size, float age){
      vec2 d = uv - center;
      d.y -= age * age * 0.4;  // gravity-streak: drop falls faster as age increases
      // squashed circle (drop shape)
      float r = length(d * vec2(1.0, 0.7));
      float circ = smoothstep(size, 0.0, r);
      // streak above the drop (water trail)
      float streak = 0.0;
      if (d.y > 0.0 && abs(d.x) < size*0.5) {
        streak = smoothstep(size*0.4, 0.0, abs(d.x)) *
                 smoothstep(0.4 * age, 0.0, d.y);
      }
      return clamp(circ + streak * 0.5, 0.0, 1.0);
    }

    void main(){
      vec2 uv = vUv;
      float aspect = resolution.x / resolution.y;
      vec2 p = vec2((uv.x - 0.5) * aspect + 0.5, uv.y);

      // ── Outside view (out of focus, soft gray daylight) ──
      // Sky gradient
      vec3 sky = mix(vec3(0.32, 0.36, 0.42), vec3(0.50, 0.52, 0.56), 1.0 - uv.y);
      // Distant trees silhouette (soft, low-contrast)
      float trees = step(uv.y, 0.42 + n(vec2(uv.x*8.0, 0.0)) * 0.08 - 0.04);
      vec3 treeCol = vec3(0.18, 0.22, 0.20);
      vec3 outside = mix(sky, treeCol, trees * 0.7);
      // Closer tree branches with sway
      float branch = 0.0;
      vec2 bp = uv;
      bp.x += sin(time * 0.3 + uv.y * 4.0) * 0.005;
      branch = step(0.96, n(bp * vec2(15.0, 8.0)));
      outside = mix(outside, vec3(0.10, 0.13, 0.12), branch * 0.6);
      // Buildings far in distance (blurry rectangles)
      vec2 bgrid = vec2(uv.x * 8.0, uv.y);
      float bx = floor(bgrid.x);
      float bldg = step(uv.y, 0.36 + h(vec2(bx, 1.0)) * 0.05);
      bldg *= step(0.4, fract(bgrid.x));
      bldg *= step(fract(bgrid.x), 0.85);
      outside = mix(outside, vec3(0.16, 0.18, 0.20), bldg * 0.5);
      // Window-light dots in distant buildings (warm)
      float winDots = step(0.998, h(floor(bgrid * vec2(15.0, 6.0))));
      outside = mix(outside, vec3(1.0, 0.7, 0.4), winDots * 0.5);

      // Soft blur (defocus) by mixing with neighbor noise
      float blur = fbm(uv * 30.0) * 0.06;
      outside += vec3(blur);

      // ── Window frame (visible at edges) ──
      vec3 frameCol = vec3(0.08, 0.05, 0.03);
      float frame = smoothstep(0.04, 0.03, uv.x) +
                    smoothstep(0.96, 0.97, uv.x) +
                    smoothstep(0.04, 0.03, uv.y) +
                    smoothstep(0.96, 0.97, uv.y);
      // Mullion (cross dividing window)
      float mullV = smoothstep(0.005, 0.0, abs(uv.x - 0.5));
      float mullH = smoothstep(0.004, 0.0, abs(uv.y - 0.5));
      frame = max(frame, max(mullV, mullH) * 0.9);

      // ── Rain drops ──
      float wet = fbm(uv * 5.0 + time * 0.05) * 0.15;
      vec3 windowTint = mix(outside, outside * vec3(1.0, 1.05, 1.05), 0.3);
      windowTint += vec3(wet);

      // Animated drops: 6 streams of drops at different x positions
      float dropMask = 0.0;
      for (int i=0; i<8; i++) {
        float fi = float(i);
        float dropX = (h(vec2(fi, 1.0)) - 0.5) + 0.5;
        // dropX is in 0..1 across width
        float speed = 0.5 + h(vec2(fi, 7.0)) * 0.6;
        float t = time * speed + fi * 7.0;
        // Stagger drops along stream — each stream has multiple drops at different ages
        for (int j=0; j<3; j++) {
          float fj = float(j);
          float age = fract(t * 0.4 + fj * 0.33) * 1.4 + 0.05;
          // drop position falls down with age
          vec2 dropPos = vec2(dropX + sin(age * 2.0 + fi) * 0.01, 1.0 - age);
          float size = 0.012 + h(vec2(fi*7.0, fj)) * 0.015;
          float dr = drop(uv, dropPos, size, age);
          dropMask = max(dropMask, dr);
        }
      }
      // Drops refract behind them (sample a slightly offset position)
      vec2 refracted = uv + vec2(0.0, 0.04) * dropMask;
      vec3 refractedCol = mix(outside, outside * 1.15, dropMask);
      windowTint = mix(windowTint, refractedCol, dropMask);
      // Highlight on drop edge
      windowTint += vec3(dropMask * 0.15);

      // ── Bird sprite (when active) ──
      if (bird > 0.5) {
        vec2 birdPos = vec2(birdX, birdY);
        vec2 bd = uv - birdPos;
        // Bird shape: small ellipse + wing flicker
        float birdSize = 0.04;
        float bShape = smoothstep(birdSize, 0.0, length(bd * vec2(1.0, 1.5)));
        // Wing animation
        float wing = sin(time * 12.0) * 0.5 + 0.5;
        float wingShape = smoothstep(birdSize * 1.4, 0.0, length((bd + vec2(0.0, 0.005)) * vec2(0.7, 2.0))) * wing;
        bShape = max(bShape, wingShape * 0.7);
        windowTint = mix(windowTint, vec3(0.25, 0.18, 0.10), bShape);
      }

      // Apply window frame ON TOP
      vec3 finalCol = mix(windowTint, frameCol, frame);

      // Subtle sill condensation at bottom
      float sill = smoothstep(0.97, 0.92, uv.y);
      finalCol += vec3(0.03) * sill;

      gl_FragColor = vec4(finalCol, 1.0);
    }`
};
const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.ShaderMaterial(winShader));
scene.add(win);

  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(audioCtx.destination);

  // Soft rain noise (no thunder, just rain)
  const noiseBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = noiseBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  }
  const rain = audioCtx.createBufferSource();
  rain.buffer = noiseBuf;
  rain.loop = true;
  // Shaped: highpass at 600Hz to suggest "small drops"
  const rainHP = audioCtx.createBiquadFilter();
  rainHP.type = 'highpass'; rainHP.frequency.value = 600;
  const rainLP = audioCtx.createBiquadFilter();
  rainLP.type = 'lowpass'; rainLP.frequency.value = 4500;
  const rainG = audioCtx.createGain();
  rainG.gain.value = 0.30;
  rain.connect(rainHP).connect(rainLP).connect(rainG).connect(masterGain);
  rain.start();

  // Occasional drop on the windowsill (heavier, deeper drop)
  function scheduleDrop() {
    const next = 8 + Math.random() * 22;
    setTimeout(() => { if (audioCtx) { dropSound(); scheduleDrop(); } }, next * 1000);
  }
  scheduleDrop();
  function dropSound() {
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(800, t0);
    o.frequency.exponentialRampToValueAtTime(180, t0 + 0.08);
    const g = audioCtx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.07, t0 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.2);
    const p = audioCtx.createStereoPanner();
    p.pan.value = (Math.random() - 0.5) * 0.6;
    o.connect(g).connect(p).connect(masterGain);
    o.start(t0);
    o.stop(t0 + 0.25);
  }

  // Bird visit: every 60-180 seconds, a bird appears + chirps + leaves
  function scheduleBird() {
    const next = 60 + Math.random() * 120;
    setTimeout(() => { if (audioCtx) { spawnBird(); scheduleBird(); } }, next * 1000);
  }
  scheduleBird();
}

function chirp(t0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  const f0 = 2400 + Math.random() * 1600;
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(1700, t0 + 0.1);
  const g = audioCtx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.025, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.15);
  o.connect(g).connect(masterGain);
  o.start(t0);
  o.stop(t0 + 0.2);
}

let birdActive = false;
let birdStartTime = 0;
function spawnBird() {
  if (!audioCtx) return;
  birdActive = true;
  birdStartTime = performance.now();
  // play 4-5 chirps over 6 seconds
  for (let i = 0; i < 5; i++) {
    setTimeout(() => chirp(audioCtx.currentTime), i * 1200 + Math.random() * 300);
  }
  // Bird visits sill for ~6 seconds
  setTimeout(() => { birdActive = false; }, 6000);
}

// ── Animation ──────────────────────────────────────────────────────
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  win.material.uniforms.time.value = time;

  if (birdActive) {
    const elapsed = (now - birdStartTime) / 1000;
    win.material.uniforms.bird.value = 1.0;
    win.material.uniforms.birdX.value = 0.5 + Math.sin(elapsed * 0.4) * 0.15;
    win.material.uniforms.birdY.value = 0.93 + Math.sin(elapsed * 1.5) * 0.012;
  } else {
    win.material.uniforms.bird.value = 0.0;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  win.material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
});

// "B" manually spawns bird
window.addEventListener('keydown', (e) => {
  if (e.key === 'b' || e.key === 'B') spawnBird();
});
</script>
</body>
