<script type="module">
import * as THREE from 'three';

/* =====================================================================
 * ROYAL CONCERT HALL · CELLIST · BACH PRELUDE
 * Single-file flagship piece. Shaders inline. Audio procedural.
 * Vienna-style horseshoe hall. Row 14 Seat 7. You are alone with art.
 * ===================================================================*/

// ---------------------------------------------------------------------
// Renderer setup
// ---------------------------------------------------------------------
const stageEl = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: 'high-performance',
  alpha: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stageEl.appendChild(renderer.domElement);

// ---------------------------------------------------------------------
// Scene + camera (locked at row 14 seat 7)
// ---------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070405);
scene.fog = new THREE.FogExp2(0x070405, 0.022);

const camera = new THREE.PerspectiveCamera(
  42,
  window.innerWidth / window.innerHeight,
  0.1,
  300
);

// Row 14 Seat 7 — slightly off-center, ~17m back from stage, eye height ~1.65m
const SEAT_POS = new THREE.Vector3(2.1, 1.72, 17.5);
camera.position.copy(SEAT_POS);

// Stage center (cellist standing point) — ~5m forward from proscenium edge
const STAGE_CENTER = new THREE.Vector3(0, 0.95, -2.2);
camera.lookAt(STAGE_CENTER);

// ---------------------------------------------------------------------
// Camera look state — mouse drag with limits
// ---------------------------------------------------------------------
const lookState = {
  yaw: 0,
  pitch: 0,
  targetYaw: 0,
  targetPitch: 0,
  baseYaw: Math.atan2(STAGE_CENTER.x - SEAT_POS.x, SEAT_POS.z - STAGE_CENTER.z),
  basePitch: Math.atan2(STAGE_CENTER.y - SEAT_POS.y,
    Math.sqrt((STAGE_CENTER.x-SEAT_POS.x)**2 + (STAGE_CENTER.z-SEAT_POS.z)**2)),
};
lookState.yaw = lookState.baseYaw;
lookState.pitch = lookState.basePitch;
lookState.targetYaw = lookState.baseYaw;
lookState.targetPitch = lookState.basePitch;

let dragging = false;
let dragX = 0, dragY = 0;

renderer.domElement.addEventListener('mousedown', e => {
  dragging = true;
  dragX = e.clientX;
  dragY = e.clientY;
  document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragX;
  const dy = e.clientY - dragY;
  dragX = e.clientX;
  dragY = e.clientY;
  lookState.targetYaw   -= dx * 0.0035;
  lookState.targetPitch -= dy * 0.0028;
  // Limits — you're stuck in a seat
  const yawRange = 0.55;
  const pitchUp = 0.45, pitchDown = 0.30;
  lookState.targetYaw = THREE.MathUtils.clamp(
    lookState.targetYaw,
    lookState.baseYaw - yawRange,
    lookState.baseYaw + yawRange
  );
  lookState.targetPitch = THREE.MathUtils.clamp(
    lookState.targetPitch,
    lookState.basePitch - pitchDown,
    lookState.basePitch + pitchUp
  );
});

// Touch support
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragX = e.touches[0].clientX;
    dragY = e.touches[0].clientY;
  }
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!dragging || e.touches.length === 0) return;
  const dx = e.touches[0].clientX - dragX;
  const dy = e.touches[0].clientY - dragY;
  dragX = e.touches[0].clientX;
  dragY = e.touches[0].clientY;
  lookState.targetYaw -= dx * 0.0035;
  lookState.targetPitch -= dy * 0.0028;
  lookState.targetYaw = THREE.MathUtils.clamp(
    lookState.targetYaw,
    lookState.baseYaw - 0.55,
    lookState.baseYaw + 0.55
  );
  lookState.targetPitch = THREE.MathUtils.clamp(
    lookState.targetPitch,
    lookState.basePitch - 0.30,
    lookState.basePitch + 0.45
  );

// Common noise helpers (used in multiple shaders)
const NOISE_GLSL = `
float hash21(vec2 p){ p = fract(p*vec2(123.34,456.21)); p += dot(p,p+45.32); return fract(p.x*p.y); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash21(i);
  float b = hash21(i+vec2(1.0,0.0));
  float c = hash21(i+vec2(0.0,1.0));
  float d = hash21(i+vec2(1.0,1.0));
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for (int i=0; i<5; i++){ v += a*vnoise(p); p *= 2.07; a *= 0.5; }
  return v;
}
`;

// --- RED VELVET SEAT shader -----------------------------------------
const seatVS = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
void main(){
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorldPos = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const seatFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSpotPos;
${NOISE_GLSL}
void main(){
  // Woven velvet — two crossed warp directions
  vec2 uv = vUv * vec2(38.0, 52.0);
  float warp = sin(uv.x*3.14159) * 0.5 + 0.5;
  float weft = sin(uv.y*3.14159) * 0.5 + 0.5;
  float weave = mix(warp, weft, step(fract(uv.y*0.5), 0.5));
  // Pile direction — micro fibers
  float fibers = fbm(vUv*180.0)*0.45 + fbm(vUv*60.0)*0.55;
  // Base — deep wine red
  vec3 base = vec3(0.42, 0.06, 0.08);
  vec3 deep = vec3(0.18, 0.02, 0.03);
  vec3 col = mix(deep, base, weave*0.7 + fibers*0.4);
  // Gold piping (trim) at uv.x edges
  float trim = smoothstep(0.0, 0.02, vUv.x) * smoothstep(0.0, 0.02, 1.0-vUv.x);
  trim *= smoothstep(0.0, 0.02, vUv.y) * smoothstep(0.0, 0.02, 1.0-vUv.y);
  vec3 gold = vec3(0.85, 0.62, 0.22);
  col = mix(gold*0.55, col, trim);
  // Subtle sheen toward viewer
  vec3 V = normalize(cameraPosition - vWorldPos);
  float fres = pow(1.0 - max(dot(V, vNormal), 0.0), 2.0);
  col += vec3(0.30, 0.10, 0.05) * fres * 0.35;
  // Light from spotlight (very weak — most seats are in shadow)
  vec3 L = normalize(uSpotPos - vWorldPos);
  float diff = max(dot(vNormal, L), 0.0);
  float dist = length(uSpotPos - vWorldPos);
  float atten = 1.0 / (1.0 + dist*dist*0.012);
  col += vec3(1.0, 0.78, 0.55) * diff * atten * 0.10;
  // Ambient floor
  col += vec3(0.04, 0.025, 0.018);
  gl_FragColor = vec4(col, 1.0);
}`;

const seatMat = new THREE.ShaderMaterial({
  vertexShader: seatVS,
  fragmentShader: seatFS,
  uniforms: {
    uTime: { value: 0 },
    uSpotPos: { value: spot.position },
  },
});

// --- GOLD-LEAF TRIM shader ------------------------------------------
const goldVS = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
void main(){
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorldPos = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const goldFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSpotPos;
${NOISE_GLSL}
void main(){
  // Gold leaf — rich warm metallic with wear
  vec3 baseGold = vec3(0.92, 0.70, 0.28);
  vec3 deepGold = vec3(0.55, 0.38, 0.10);
  // Aged patina patches
  float patina = fbm(vUv*8.0);
  float wear   = fbm(vUv*30.0 + 12.3);
  vec3 col = mix(deepGold, baseGold, smoothstep(0.3, 0.7, patina));
  // Tarnish lines
  col -= vec3(0.18, 0.12, 0.05) * smoothstep(0.55, 0.85, wear);
  // Specular toward spotlight
  vec3 V = normalize(cameraPosition - vWorldPos);
  vec3 L = normalize(uSpotPos - vWorldPos);
  vec3 H = normalize(L + V);
  float spec = pow(max(dot(vNormal, H), 0.0), 28.0);
  float diff = max(dot(vNormal, L), 0.0);
  float dist = length(uSpotPos - vWorldPos);
  float atten = 1.0 / (1.0 + dist*dist*0.008);
  col += vec3(1.0, 0.85, 0.50) * spec * atten * 1.6;
  col += vec3(1.0, 0.78, 0.40) * diff * atten * 0.45;
  // Sconce-like warm bounce — small ambient glow
  col += baseGold * 0.10;
  gl_FragColor = vec4(col, 1.0);
}`;
const goldMat = new THREE.ShaderMaterial({
  vertexShader: goldVS,
  fragmentShader: goldFS,
  uniforms: {
    uTime: { value: 0 },
    uSpotPos: { value: spot.position },
  },
});

// --- MARBLE FLOOR shader (foyer at edges) ---------------------------
const marbleVS = goldVS;
const marbleFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSpotPos;
${NOISE_GLSL}
void main(){
  // Cream marble with darker veins
  vec2 p = vUv * 4.0;
  float v1 = fbm(p*1.2);
  float v2 = fbm(p*3.5 + v1*1.8);
  float veinMask = smoothstep(0.55, 0.62, v2);
  vec3 cream = vec3(0.88, 0.82, 0.70);
  vec3 vein  = vec3(0.42, 0.32, 0.22);
  vec3 col = mix(cream, vein, veinMask*0.7);
  // Polish — reflect spot weakly
  vec3 V = normalize(cameraPosition - vWorldPos);
  vec3 L = normalize(uSpotPos - vWorldPos);
  vec3 H = normalize(L + V);
  float spec = pow(max(dot(vNormal, H), 0.0), 60.0);
  float dist = length(uSpotPos - vWorldPos);
  float atten = 1.0 / (1.0 + dist*dist*0.015);
  col += vec3(1.0, 0.85, 0.6) * spec * atten * 0.8;
  // Most of the floor is dark
  col *= 0.35;
  gl_FragColor = vec4(col, 1.0);
}`;
const marbleMat = new THREE.ShaderMaterial({
  vertexShader: marbleVS,
  fragmentShader: marbleFS,
  uniforms: {
    uTime: { value: 0 },
    uSpotPos: { value: spot.position },
  },
});

// --- WOODEN STAGE FLOOR shader --------------------------------------
const woodVS = goldVS;
const woodFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSpotPos;
${NOISE_GLSL}
void main(){
  // Polished hardwood planks running stage-left to stage-right
  float plankWidth = 0.12;
  float plank = floor(vUv.y / plankWidth);
  float withinPlank = fract(vUv.y / plankWidth);
  // Per-plank shade variation
  float plankShade = hash21(vec2(plank, 7.3)) * 0.4 + 0.7;
  // Grain — long stretched noise along plank length
  float grain = fbm(vec2(vUv.x*40.0, plank*5.7 + vUv.x*2.0));
  vec3 darkWood = vec3(0.18, 0.10, 0.05);
  vec3 lightWood= vec3(0.55, 0.32, 0.15);
  vec3 col = mix(darkWood, lightWood, grain*0.65 + 0.20) * plankShade;
  // Plank seams
  float seam = smoothstep(0.0, 0.04, withinPlank) * smoothstep(0.0, 0.04, 1.0-withinPlank);
  col *= mix(0.55, 1.0, seam);
  // Polish — strong reflection of spotlight
  vec3 V = normalize(cameraPosition - vWorldPos);
  vec3 L = normalize(uSpotPos - vWorldPos);
  vec3 H = normalize(L + V);
  float spec = pow(max(dot(vNormal, H), 0.0), 40.0);
  float dist = length(uSpotPos - vWorldPos);
  float atten = 1.0 / (1.0 + dist*dist*0.010);
  // Brighter near the cellist
  float spotMask = smoothstep(8.0, 2.0, length(vWorldPos.xz - vec2(0.0, -2.2)));
  col += vec3(1.0, 0.78, 0.45) * spec * atten * 1.2 * (0.4 + spotMask);
  col *= mix(0.30, 1.0, spotMask);
  // Diffuse from spot
  float diff = max(dot(vNormal, L), 0.0);
  col += vec3(1.0, 0.78, 0.45) * diff * atten * 0.6 * spotMask;
  gl_FragColor = vec4(col, 1.0);
}`;
const woodMat = new THREE.ShaderMaterial({
  vertexShader: woodVS,
  fragmentShader: woodFS,
  uniforms: {
    uTime: { value: 0 },
    uSpotPos: { value: spot.position },
  },
});

// --- PAINTED CEILING MURAL shader -----------------------------------
const ceilingVS = goldVS;
const ceilingFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
${NOISE_GLSL}
void main(){
  // Faded fresco — vague figures swirling toward a central oculus
  vec2 p = vUv - 0.5;
  float r = length(p);
  float a = atan(p.y, p.x);
  // Concentric clouds
  float clouds = fbm(vec2(r*8.0, a*3.0 + r*4.0));
  float figs   = fbm(vec2(a*2.5 + clouds*1.2, r*5.0));
  // Sky / cloud / figure tones
  vec3 sky    = vec3(0.32, 0.28, 0.40);
  vec3 cloud  = vec3(0.65, 0.55, 0.45);
  vec3 figure = vec3(0.45, 0.30, 0.22);
  vec3 col = mix(sky, cloud, smoothstep(0.3, 0.7, clouds));
  col = mix(col, figure, smoothstep(0.55, 0.75, figs) * 0.5);
  // Central oculus — golden glow
  float oculus = smoothstep(0.18, 0.0, r);
  col = mix(col, vec3(0.95, 0.78, 0.40), oculus*0.55);
  // Heavy darkening — hall is mostly unlit
  col *= 0.35;
  // Slight ambient warm
  col += vec3(0.04, 0.025, 0.015);
  gl_FragColor = vec4(col, 1.0);
}`;
const ceilingMat = new THREE.ShaderMaterial({
  vertexShader: ceilingVS,
  fragmentShader: ceilingFS,
  uniforms: { uTime: { value: 0 } },
  side: THREE.DoubleSide,
});

// --- CELLIST FIGURE shader (silhouette w/ skin tone in light) -------
const figureVS = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec3 vLocalPos;
void main(){
  vNormal = normalize(normalMatrix * normal);
  vLocalPos = position;
  vec4 wp = modelMatrix * vec4(position,1.0);
  vWorldPos = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const figureFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec3 vLocalPos;
uniform float uTime;
uniform vec3 uSpotPos;
uniform vec3 uBaseColor;
uniform float uSkinFactor;
${NOISE_GLSL}
void main(){
  vec3 base = uBaseColor;
  // Subtle fabric variation
  float weave = fbm(vLocalPos.xy*22.0 + vLocalPos.z*8.0);
  base *= mix(0.80, 1.06, weave);
  // Spotlight diffuse
  vec3 L = normalize(uSpotPos - vWorldPos);
  vec3 V = normalize(cameraPosition - vWorldPos);
  vec3 H = normalize(L + V);
  float diff = max(dot(vNormal, L), 0.0);
  float wrap = max(dot(vNormal, L)*0.5 + 0.5, 0.0); // wrap shading
  float spec = pow(max(dot(vNormal, H), 0.0), 12.0);
  float dist = length(uSpotPos - vWorldPos);
  float atten = 1.0 / (1.0 + dist*dist*0.005);
  vec3 lit = base * (0.10 + wrap*0.7) * vec3(1.0, 0.80, 0.55);
  // Skin gets subsurface warmth
  vec3 skinTint = vec3(1.0, 0.55, 0.40) * uSkinFactor * wrap * 0.30;
  lit += skinTint;
  lit += vec3(1.0, 0.85, 0.55) * spec * atten * 0.4 * (1.0 - uSkinFactor*0.3);
  // Silhouette darkening at backside
  float backFace = smoothstep(0.0, 0.4, max(-dot(vNormal, L), 0.0));
  lit *= mix(1.0, 0.25, backFace);
  // Tiny ambient
  lit += base * 0.04;
  gl_FragColor = vec4(lit, 1.0);
}`;
function makeFigureMat(baseColor, skinFactor = 0.0) {
  return new THREE.ShaderMaterial({
    vertexShader: figureVS,
    fragmentShader: figureFS,
    uniforms: {
      uTime: { value: 0 },
      uSpotPos: { value: spot.position },
      uBaseColor: { value: new THREE.Color(baseColor) },
      uSkinFactor: { value: skinFactor },
    },
  });
}

const wallFS = `
precision highp float;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying vec2 vUv;
uniform float uTime;
uniform vec3 uSpotPos;
${NOISE_GLSL}
void main(){
  // Cream plaster
  float n = fbm(vUv*6.0);
  vec3 plaster = mix(vec3(0.36, 0.28, 0.22), vec3(0.50, 0.40, 0.30), n);

// --- Side walls (horseshoe) -----------------------------------------
// Build a horseshoe wall by lofting curved segments.
function buildHorseshoeWall(radiusInner, radiusOuter, yBase, yTop, segments=64) {
  // We make a "U" shape: straight sides toward stage, semicircle at back.
  const geom = new THREE.BufferGeometry();
  const verts = [];
  const norms = [];
  const uvs = [];
  const idx = [];
  // Centerline path of horseshoe
  const path = [];
  // Two straight sides from stage front (z=0) to z=ZBack
  const Zback = 22;
  const halfWidth = radiusInner;
  const arcSeg = 40;
  // Left side straight from (-halfWidth, 0) to (-halfWidth, Zback)
  for (let i = 0; i <= 20; i++) {
    const t = i/20;
    path.push(new THREE.Vector2(-halfWidth, t*Zback));
  }
  // Arc from (-halfWidth, Zback) sweeping to (+halfWidth, Zback)
  for (let i = 1; i <= arcSeg; i++) {
    const a = Math.PI - (i/arcSeg) * Math.PI;
    path.push(new THREE.Vector2(-Math.cos(a)*halfWidth, Zback + Math.sin(a)*halfWidth*0.85));
  }
  // Right side straight back to stage
  for (let i = 1; i <= 20; i++) {
    const t = 1 - i/20;
    path.push(new THREE.Vector2(halfWidth, t*Zback));
  }
  // Build wall by extruding upward
  const N = path.length;
  for (let i = 0; i < N; i++) {
    const p = path[i];
    verts.push(p.x, yBase, p.y);
    verts.push(p.x, yTop, p.y);
    uvs.push(i/N, 0);
    uvs.push(i/N, 1);
    // Inward normal — perpendicular to path, pointing toward center
    const next = path[Math.min(i+1, N-1)];
    const prev = path[Math.max(i-1, 0)];
    const tang = new THREE.Vector2(next.x-prev.x, next.y-prev.y).normalize();
    const inward = new THREE.Vector2(-tang.y, tang.x);
    // Determine sign: should point toward center (0, Zback*0.5)
    const toCenter = new THREE.Vector2(0-p.x, Zback*0.5-p.y);
    if (inward.dot(toCenter) < 0) inward.multiplyScalar(-1);
    norms.push(inward.x, 0, inward.y);
    norms.push(inward.x, 0, inward.y);
  }
  for (let i = 0; i < N-1; i++) {
    const a = i*2, b = i*2+1, c = (i+1)*2, d = (i+1)*2+1;
    idx.push(a, c, b, b, c, d);
  }
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setAttribute('normal',   new THREE.Float32BufferAttribute(norms, 3));
  geom.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geom.setIndex(idx);
  return geom;
}

function makeCurtain(side) {
  const g = new THREE.Group();
  // Folded curtain — vertical strips
  for (let i = 0; i < 7; i++) {
    const stripGeom = new THREE.PlaneGeometry(0.6, 11, 1, 12);
    // Add wave to vertical strips
    const pos = stripGeom.attributes.position;
    for (let j = 0; j < pos.count; j++) {
      const y = pos.getY(j);
      const x = pos.getX(j);
      const wave = Math.sin(y * 0.8 + i) * 0.05;
      pos.setZ(j, wave);
    }
    pos.needsUpdate = true;
    stripGeom.computeVertexNormals();
    const strip = new THREE.Mesh(stripGeom, curtainMat);
    strip.position.set((i - 3) * 0.55, 5.5, 0);
    strip.rotation.y = (i - 3) * 0.06;
    g.add(strip);
  }
  return g;
}

const ROWS = 22;       // back to front
const SEATS_PER_ROW = 24;
const ROW_SPACING = 0.95;
const SEAT_SPACING = 0.70;
const FIRST_ROW_Z = 1.5; // closest to stage
for (let r = 0; r < ROWS; r++) {
  const z = FIRST_ROW_Z + r * ROW_SPACING;
  const yLift = Math.max(0, z - 4) * 0.06; // matches rake
  for (let s = 0; s < SEATS_PER_ROW; s++) {
    const x = (s - SEATS_PER_ROW/2 + 0.5) * SEAT_SPACING;
    // Horseshoe trim — skip seats outside the curve
    const distFromCenter = Math.sqrt(x*x + Math.max(0, z-22)*Math.max(0,z-22));
    if (Math.abs(x) > HALL_INNER - 1.0) continue;
    if (distFromCenter > HALL_INNER - 0.5) continue;
    // Center aisle
    if (Math.abs(x) < 0.4) continue;
    const seat = makeSeat(seatMat);
    seat.position.set(x, yLift, z);
    // Slight angle toward stage on side seats
    seat.rotation.y = -x * 0.005;
    seatGroup.add(seat);
  }
}

// Mezzanine balcony 1 seating — single curved row
function buildBalconySeats(yLevel, radius, count) {
  const arc = Math.PI * 1.0;
  for (let i = 0; i < count; i++) {
    // Place along U-shape
    const t = i / (count-1);
    let x, z;
    if (t < 0.30) {
      // Left straight
      const lt = t / 0.30;
      x = -radius;
      z = lt * 18 + 2;
    } else if (t < 0.70) {
      // Back arc
      const at = (t - 0.30) / 0.40;
      const a = Math.PI - at * Math.PI;
      x = -Math.cos(a)*radius;
      z = 20 + Math.sin(a)*radius*0.85;
    } else {
      // Right straight
      const rt = (t - 0.70) / 0.30;
      x = radius;
      z = (1 - rt) * 18 + 2;
    }
    const seat = makeSeat(seatMat);
    seat.position.set(x, yLevel, z);
    seat.rotation.y = Math.atan2(-x, 10 - z);
    seatGroup.add(seat);
  }
}

// AUDIO — Karplus-Strong cello synthesis + Bach Prelude G major
// ---------------------------------------------------------------------
let audioCtx = null;
let masterGain = null;
let convolverNode = null;
let dryGain = null;
let wetGain = null;
let audioStarted = false;

// Build a long impulse response for concert hall reverb (4 seconds)
function buildConcertHallIR(ctx) {
  const sampleRate = ctx.sampleRate;
  const length = Math.floor(sampleRate * 4.0);
  const ir = ctx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    // Early reflections — a few discrete echoes (concert hall character)
    const earlyDelays = [0.012, 0.025, 0.041, 0.058, 0.077, 0.099, 0.124];
    for (const d of earlyDelays) {
      const idx = Math.floor(d * sampleRate);
      if (idx < length) {
        data[idx] = (Math.random() * 2 - 1) * 0.45 / Math.pow(d*30+1, 0.5);
      }
    }
    // Diffuse tail — exponentially decaying noise
    for (let i = 0; i < length; i++) {
      const t = i / sampleRate;
      const decay = Math.exp(-t * 0.85); // ~4s RT60-ish
      // Pre-delay region quieter
      const env = (t < 0.020) ? 0.0 : decay;
      // Mild low-pass character — bias noise toward smoother
      const n = (Math.random()*2-1) * 0.6 + (Math.random()*2-1) * 0.3;
      data[i] += n * env * 0.32;
    }
  }
  return ir;
}

// Karplus-Strong pluck/bow synthesis using ScriptProcessor or AudioBuffer
// Approach: synthesize each note offline into an AudioBuffer, then play it.
// This gives us proper string-resonance character with bow attack.
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

// Karplus-Strong note synthesis with cello-like bow attack.
// Returns an AudioBuffer with the synthesized note.
function synthCelloNote(ctx, midi, durationSec, velocity = 0.7) {
  const sr = ctx.sampleRate;
  const N = Math.floor(durationSec * sr);
  const buf = ctx.createBuffer(1, N, sr);
  const out = buf.getChannelData(0);
  const freq = midiToFreq(midi);

  // Karplus-Strong delay length
  const delayLen = Math.max(2, Math.floor(sr / freq));
  const delay = new Float32Array(delayLen);
  // Initialize delay line with bow noise (band-limited)
  // Bow attack: noisy initial buffer with low-pass character
  let prev = 0;
  for (let i = 0; i < delayLen; i++) {
    const n = (Math.random() * 2 - 1);
    prev = prev * 0.7 + n * 0.3; // simple LP
    delay[i] = prev * 0.5;
  }

  // Sustain — re-inject noise during note (bow continues to drive string)
  // This is what makes it cello-like vs. plucked.
  let dPos = 0;
  let lastSample = 0;
  // Loss filter coefficients (tuned for cello-like decay)
  const damping = 0.498; // 0.5 = no damping; <0.5 = more
  // String stiffness allpass (subtle inharmonicity)
  let apX1 = 0, apY1 = 0;
  const stiffness = 0.18;

  // Bow excitation envelope
  // Attack 30ms, sustain mostly steady, release at end
  const attackSamples = Math.floor(0.030 * sr);
  const releaseSamples = Math.floor(0.080 * sr);
  // Vibrato — slow, slight pitch wobble (we won't pitch-mod, but amplitude AM gives life)
  const vibFreq = 5.5;

  // Bow re-injection level
  const bowLevel = 0.022 * velocity;

  for (let i = 0; i < N; i++) {
    // Bow excitation noise
    const noise = (Math.random() * 2 - 1);
    let bowEnv;
    if (i < attackSamples) bowEnv = i / attackSamples;
    else if (i > N - releaseSamples) bowEnv = Math.max(0, (N - i) / releaseSamples);
    else bowEnv = 1.0;
    // Slight tremolo
    const trem = 1.0 + 0.04 * Math.sin(2*Math.PI*vibFreq*(i/sr));
    const bowSig = noise * bowLevel * bowEnv * trem;

    // Read from delay line
    const fromDelay = delay[dPos];
    // Loss filter — average current and previous (simple LP)
    const filtered = (fromDelay + lastSample) * damping;
    // Stiffness allpass: y[n] = a*x[n] + x[n-1] - a*y[n-1]
    const apIn = filtered;
    const apOut = stiffness * apIn + apX1 - stiffness * apY1;
    apX1 = apIn; apY1 = apOut;
    // Re-inject bow excitation + filtered feedback
    delay[dPos] = apOut + bowSig;
    lastSample = filtered;
    out[i] = apOut;
    dPos++;
    if (dPos >= delayLen) dPos = 0;
  }

  // Apply overall amplitude envelope and gentle high-cut
  let lpY = 0;
  const lpA = 0.32;
  for (let i = 0; i < N; i++) {
    lpY = lpY * (1 - lpA) + out[i] * lpA;
    let s = lpY * 1.8;
    // Soft saturation for warmth
    s = Math.tanh(s * 1.4) * 0.85;
    out[i] = s * velocity;
  }

  return buf;
}

// --- BACH PRELUDE NOTE PATTERN --------------------------------------
// Cello Suite No. 1 in G major, BWV 1007 — Prelude opening.
// 16th notes, 4/4, ~70 bpm. Each measure has 16 sixteenths.
// MIDI note numbers (cello range):
//   G2 = 43, D3 = 50, B3 = 59, E3 = 52, C4 = 60, F#3 = 54, A3 = 57
//   G3 = 55, F#4 = 66, E4 = 64, D4 = 62, A2 = 45, F#2 = 42
//
// The actual Prelude pattern (first 4 bars approximated as authentic as possible):
// Bar 1: G2 D3 B3 D3 G3 D3 B3 D3 | G2 D3 B3 D3 G3 D3 B3 D3   (G major - I)
// Bar 2: G2 E3 C4 E3 G3 E3 C4 E3 | G2 E3 C4 E3 G3 E3 C4 E3   (C/G - IV6/4)
// Bar 3: G2 F#3 C4 F#3 A3 F#3 C4 F#3 | G2 F#3 C4 F#3 A3 F#3 C4 F#3 (D7/G)
// Bar 4: G2 D3 B3 D3 G3 D3 B3 D3 | G2 D3 B3 D3 G3 D3 B3 D3   (G - I)
// Bar 5: G2 C3 E3 G3 C4 E3 G3 E3 | C3 G3 E3 G3 C4 E3 G3 E3   (C major - IV)
// Bar 6: A2 C3 E3 G3 C4 E3 G3 E3 | C3 G3 E3 G3 C4 E3 G3 E3   (am)
// Bar 7: D2 A2 D3 F#3 C4 D3 F#3 D3 | A2 D3 F#3 D3 C4 D3 F#3 D3 (D7)
// Bar 8: G2 B2 D3 G3 B3 D3 G3 D3 | B2 G3 D3 G3 B3 D3 G3 D3   (G)
//
// We'll use 8 bars then loop. Tempo 70 BPM so quarter = 60/70 = 0.857s
// 16th = quarter/4 = ~0.214s

const PRELUDE_PATTERN = [
  // Bar 1
  43, 50, 59, 50, 55, 50, 59, 50,  43, 50, 59, 50, 55, 50, 59, 50,
  // Bar 2
  43, 52, 60, 52, 55, 52, 60, 52,  43, 52, 60, 52, 55, 52, 60, 52,
  // Bar 3
  43, 54, 60, 54, 57, 54, 60, 54,  43, 54, 60, 54, 57, 54, 60, 54,
  // Bar 4
  43, 50, 59, 50, 55, 50, 59, 50,  43, 50, 59, 50, 55, 50, 59, 50,
  // Bar 5 — C major arpeggios
  48, 52, 55, 60, 64, 60, 55, 52,  48, 55, 60, 55, 64, 60, 55, 52,
  // Bar 6 — A minor color
  45, 52, 57, 60, 64, 60, 57, 52,  45, 57, 60, 57, 64, 60, 57, 52,
  // Bar 7 — D7
  38, 45, 50, 54, 60, 50, 54, 50,  45, 50, 54, 50, 60, 50, 54, 50,
  // Bar 8 — back to G
  43, 47, 50, 55, 59, 50, 55, 50,  47, 55, 50, 55, 59, 50, 55, 50,
];

// Cache notes — synthesize each unique pitch once.
const noteCache = new Map();
function getNoteBuffer(ctx, midi) {
  const key = midi;
  if (!noteCache.has(key)) {
    // Note duration: each 16th lasts ~0.215s but tail decays into next via reverb
    const dur = midi < 50 ? 0.85 : 0.55; // low notes slightly longer body
    noteCache.set(key, synthCelloNote(ctx, midi, dur, 0.78));
  }
  return noteCache.get(key);
}

// Audio scheduler
let scheduleTimer = null;
let nextNoteTime = 0;
let noteIndex = 0;
let bowDirection = 1; // for visual sync
let lastNoteAt = 0;
let currentTempo = 70; // BPM, can vary slightly

function startAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(audioCtx.destination);

  // Reverb
  convolverNode = audioCtx.createConvolver();
  convolverNode.buffer = buildConcertHallIR(audioCtx);
  dryGain = audioCtx.createGain();
  wetGain = audioCtx.createGain();
  dryGain.gain.value = 0.55;
  wetGain.gain.value = 0.85;
  dryGain.connect(masterGain);
  convolverNode.connect(wetGain);
  wetGain.connect(masterGain);

  // Pre-render notes for the unique pitches
  const uniquePitches = [...new Set(PRELUDE_PATTERN)];
  for (const p of uniquePitches) getNoteBuffer(audioCtx, p);

  // Fade in
  masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 2.5);

  audioStarted = true;
  nextNoteTime = audioCtx.currentTime + 0.4;
  noteIndex = 0;

  scheduleLoop();
}

function scheduleLoop() {
  if (!audioCtx) return;
  const lookahead = 0.25; // seconds ahead to schedule
  while (nextNoteTime < audioCtx.currentTime + lookahead) {
    scheduleNote(noteIndex, nextNoteTime);
    // 16th note duration with tempo drift
    const sixteenth = 60.0 / currentTempo / 4.0;
    nextNoteTime += sixteenth;
    noteIndex++;
    // Loop the pattern; introduce subtle tempo variation each loop
    if (noteIndex >= PRELUDE_PATTERN.length) {
      noteIndex = 0;
      currentTempo = 68 + Math.random() * 5; // 68-73 BPM rubato
    }
  }
  scheduleTimer = setTimeout(scheduleLoop, 50);
}

function scheduleNote(idx, time) {
  const midi = PRELUDE_PATTERN[idx];
  const buffer = getNoteBuffer(audioCtx, midi);
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  // Subtle per-note gain variation (musical phrasing)
  const noteGain = audioCtx.createGain();
  // Phrasing: emphasize beat 1 (idx % 16 === 0) and beat 3 (idx % 16 === 8)
  const beatPos = idx % 16;
  let velocity = 0.55;
  if (beatPos === 0) velocity = 0.85;
  else if (beatPos === 8) velocity = 0.70;
  else if (beatPos === 4 || beatPos === 12) velocity = 0.62;
  // Gentle dynamic swell across each bar
  velocity *= 0.92 + 0.08 * Math.sin((idx % 16) * Math.PI / 16);
  noteGain.gain.value = velocity;
  src.connect(noteGain);
  noteGain.connect(dryGain);
  noteGain.connect(convolverNode);
  src.start(time);
  // Mark visual hit
  scheduledHits.push({ time, idx, midi, velocity });
}

// Visual hits — consumed in animate() to drive bow arm
const scheduledHits = [];
let activeBowVelocity = 0;
let activeBowEnergy = 0;

// SPACE = applaud — get rebuked
let lastApplaud = 0;
function applaud() {
  if (!audioCtx) return;
  if (performance.now() - lastApplaud < 4500) return;
  lastApplaud = performance.now();
  // Soft creak — short pitched noise burst
  const t = audioCtx.currentTime;
  const dur = 0.42;
  const buf = audioCtx.createBuffer(1, Math.floor(dur*audioCtx.sampleRate), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const env = Math.exp(-i / (dur*audioCtx.sampleRate*0.20)) * (1 - Math.exp(-i/200));
    // Wood creak: filtered noise + faint sine
    const n = (Math.random()*2-1) * 0.5;
    const sine = Math.sin(2*Math.PI*180*(i/audioCtx.sampleRate)) * 0.3;
    d[i] = (n + sine) * env * 0.20;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  // Pan slightly to the side — like a seat near you settling
  const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  if (pan) { pan.pan.value = -0.4; src.connect(pan); pan.connect(dryGain); pan.connect(convolverNode); }
  else { src.connect(dryGain); src.connect(convolverNode); }
  src.start(t);

  // Show rebuke text
  const rebukeEl = document.getElementById('rebuke');
  rebukeEl.classList.remove('show');
  void rebukeEl.offsetWidth;
  rebukeEl.classList.add('show');
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    applaud();
  }
});

// ---------------------------------------------------------------------
// TITLE SCREEN — click "Enter" to start audio + fade in
// ---------------------------------------------------------------------
const titleEl = document.getElementById('title');
titleEl.addEventListener('click', () => {
  startAudio();
  titleEl.classList.add('fade');
  setTimeout(() => titleEl.remove(), 3000);
});
// Fallback — click anywhere in window starts (in case titleEl somehow misses)
window.addEventListener('click', () => {
  if (!audioStarted) startAudio();
}, { once: false });

// ---------------------------------------------------------------------
// CLOCK — slowly tick from 21:14 to 21:15+ to feel real
// ---------------------------------------------------------------------
const clockEl = document.getElementById('clock');
const clockStart = Date.now();
const clockBase = 21 * 60 + 14; // minutes from midnight
function updateClock() {
  const elapsedSec = (Date.now() - clockStart) / 1000;
  const totalMin = clockBase + Math.floor(elapsedSec / 6); // 6s real = 1min hall time
  const h = Math.floor(totalMin / 60) % 24;
  const m = totalMin % 60;
  clockEl.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}
setInterval(updateClock, 1500);

// ---------------------------------------------------------------------
// ANIMATE LOOP
// ---------------------------------------------------------------------
const clock = new THREE.Clock();
let elapsedTotal = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsedTotal += dt;

  // ----- Camera look smoothing + breath bob -----
  lookState.yaw   += (lookState.targetYaw   - lookState.yaw)   * Math.min(1, dt*5.5);
  lookState.pitch += (lookState.targetPitch - lookState.pitch) * Math.min(1, dt*5.5);
  // Slight breath
  const breath = Math.sin(elapsedTotal * 0.9) * 0.0030
               + Math.sin(elapsedTotal * 0.47) * 0.0014;
  const microSway = Math.sin(elapsedTotal * 0.21) * 0.0010;
  // Build look direction
  const lookDir = new THREE.Vector3(
    Math.sin(lookState.yaw) * Math.cos(lookState.pitch),
    Math.sin(lookState.pitch),
    -Math.cos(lookState.yaw) * Math.cos(lookState.pitch)
  );
  camera.position.copy(SEAT_POS);
  camera.position.y += breath;
  camera.position.x += microSway;
  const lookTarget = new THREE.Vector3().copy(camera.position).add(lookDir);
  camera.lookAt(lookTarget);

  // ----- Update shader uTime -----
  for (const m of shaderMats) {
    if (m.uniforms && m.uniforms.uTime) m.uniforms.uTime.value = elapsedTotal;
  }
  if (curtainMat.uniforms.uTime) curtainMat.uniforms.uTime.value = elapsedTotal;

  // ----- Sconce flicker -----
  for (const s of sconceLights) {
    const f = 0.85 + Math.sin(elapsedTotal * 2.3 + s.phase) * 0.10
                   + (Math.random() - 0.5) * 0.06;
    s.light.intensity = s.base * f;
  }
  // Chandelier — dim slow pulse
  chandelierLight.intensity = 1.4 + Math.sin(elapsedTotal * 0.4) * 0.20;

  // ----- Spotlight tiny flicker -----
  spot.intensity = 14.0 + Math.sin(elapsedTotal * 1.7) * 0.25
                       + Math.sin(elapsedTotal * 0.33) * 0.18;

  // ----- BOW ARM ANIMATION (driven by scheduled audio) -----
  // Consume past hits to determine current bow energy
  if (audioCtx) {
    const now = audioCtx.currentTime;
    while (scheduledHits.length > 0 && scheduledHits[0].time < now) {
      const hit = scheduledHits.shift();
      bowDirection = -bowDirection; // alternate up/down bows roughly
      activeBowVelocity = hit.velocity;
      activeBowEnergy = 1.0;
      lastNoteAt = now;
    }
    // Decay energy
    activeBowEnergy = Math.max(0, activeBowEnergy - dt * 4.5);
  }

  // Smooth bow swing — sine driven by phase tied to note rate
  const bowPhase = elapsedTotal * 5.0;  // ~5 Hz sweeps to match 16th notes at 70bpm
  const bowSwingAngle = Math.sin(bowPhase) * 0.45 * (0.6 + activeBowEnergy * 0.4);
  bowForearmGroup.rotation.x = -0.2 + bowSwingAngle * 0.3;
  bowForearmGroup.rotation.z = bowSwingAngle * 0.25;
  bowGroup.position.x = 0.10 + Math.sin(bowPhase) * 0.05;
  // Bow lateral movement on string
  bowGroup.rotation.y = Math.sin(bowPhase) * 0.10;

  // Left hand vibrato — small wobble
  leftArmGroup.rotation.z = Math.sin(elapsedTotal * 6.5) * 0.020;
  leftArmGroup.position.y = 0.95 + Math.sin(elapsedTotal * 3.2) * 0.004;

  // Torso slight sway with the music
  torso.rotation.z = Math.sin(elapsedTotal * 1.1) * 0.018;
  cellist.rotation.y = 0.05 + Math.sin(elapsedTotal * 0.7) * 0.012;
  head.rotation.x = 0.10 + Math.sin(elapsedTotal * 0.55) * 0.04;
  head.rotation.z = Math.sin(elapsedTotal * 0.9) * 0.025;

  // ----- String vibrato visual -----
  for (let i = 0; i < strings.length; i++) {
    strings[i].scale.x = 1.0 + Math.sin(elapsedTotal * 18 + i*1.3) * 0.05;
  }

  renderer.render(scene, camera);
}
animate();

// ---------------------------------------------------------------------
// AUTOSTART AUDIO ON FIRST INTERACTION (any input unlocks)
// ---------------------------------------------------------------------
function unlockAudio() {
  if (!audioStarted) startAudio();
}
window.addEventListener('keydown', unlockAudio, { once: true });
window.addEventListener('mousedown', unlockAudio, { once: true });
window.addEventListener('touchstart', unlockAudio, { once: true });

// ---------------------------------------------------------------------
// Hide loading title automatically after 14s if user never clicks
// ---------------------------------------------------------------------
setTimeout(() => {
  if (!titleEl.classList.contains('fade')) {
    titleEl.classList.add('fade');
    setTimeout(() => titleEl.remove(), 3000);
  }
}, 14000);

</script>
