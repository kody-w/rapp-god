      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {

      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;

        const _Renderer = THREE.WebGLRenderer;

          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');

          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';

        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);

            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });

              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);

        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────

            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);

      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);

// ── Hall floor — wooden planks ───────────────────────────────────────
const floorMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`varying vec2 vUv;
    float h(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y); }
    void main(){
      vec2 p = vUv * vec2(20.0, 50.0);
      float plank = step(0.92, fract(p.x));
      float grain = n(p*vec2(0.5, 6.0)) * 0.3 + 0.5;
      vec3 col = mix(vec3(0.18,0.13,0.08), vec3(0.10,0.07,0.04), grain);
      col = mix(col, vec3(0.04,0.03,0.02), plank);
      // light pool from window/lamp
      float dist = length(vUv - vec2(0.5, 0.7));
      col += vec3(0.6, 0.55, 0.4) * exp(-dist*4.0) * 0.4;
      gl_FragColor = vec4(col, 1.0);
    }`
});

desk.rotation.x = 0.15;
pianoGroup.add(desk);

// Keys (88-key procedural generation)
const keysGroup = new THREE.Group();
const whiteKeyGeo = new THREE.BoxGeometry(0.05, 0.02, 0.45);
const blackKeyGeo = new THREE.BoxGeometry(0.03, 0.025, 0.28);
const whiteKeyMat = new THREE.MeshStandardMaterial({color:0xf0e8d8, roughness:0.4});
const blackKeyMat = new THREE.MeshStandardMaterial({color:0x05030a, roughness:0.3});
const keyBaseY = 0.92;
const keyZ = 0.85;
const TOTAL_KEYS = 52; // We'll show 52 white keys + black overlays (close to full 88-key range)
const keys = [];  // {mesh, startY, midi}
const blackOffsetWithinOctave = [1, 3, 6, 8, 10]; // semitone offsets for black keys (C#=1, D#=3, F#=6, G#=8, A#=10)
// Map MIDI 21 (A0) to MIDI 108 (C8). We'll show middle keys.
let whiteCount = 0;
for (let m = 21; m <= 108; m++) {
  const semi = m % 12;
  const isBlack = blackOffsetWithinOctave.includes(semi);
  if (!isBlack) {
    const x = -1.275 + whiteCount * 0.05;
    const k = new THREE.Mesh(whiteKeyGeo, whiteKeyMat);
    k.position.set(x, keyBaseY, keyZ);
    keysGroup.add(k);
    keys[m] = {mesh: k, baseY: keyBaseY, midi: m};
    whiteCount++;
  }
}
whiteCount = 0;
for (let m = 21; m <= 108; m++) {
  const semi = m % 12;
  const isBlack = blackOffsetWithinOctave.includes(semi);
  if (!isBlack) { whiteCount++; continue; }
  // Position relative to the white key BEFORE this black one
  const x = -1.275 + (whiteCount - 0.5) * 0.05;  // between this white and next
  const k = new THREE.Mesh(blackKeyGeo, blackKeyMat);
  k.position.set(x, keyBaseY + 0.025, keyZ - 0.08);
  keysGroup.add(k);
  keys[m] = {mesh: k, baseY: keyBaseY + 0.025, midi: m};
}
pianoGroup.add(keysGroup);

// Three legs
const legMat = new THREE.MeshStandardMaterial({color:0x0a0806, roughness:0.4, metalness:0.05});
const legGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.8, 8);
[[0, 0.4, 0.5], [-1.05, 0.4, -0.5], [1.05, 0.4, -0.5]].forEach(p => {
  const leg = new THREE.Mesh(legGeo, legMat);
  leg.position.set(p[0], p[1], p[2]);
  pianoGroup.add(leg);
});

// Bench (small)
const benchMat = new THREE.MeshStandardMaterial({color:0x150a06, roughness:0.6});
const bench = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.06, 0.35), benchMat);
bench.position.set(0, 0.55, 1.4);
pianoGroup.add(bench);
[[-0.3, 0.3, 1.55], [0.3, 0.3, 1.55], [-0.3, 0.3, 1.25], [0.3, 0.3, 1.25]].forEach(p => {
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.5, 8), benchMat);
  leg.position.set(p[0], p[1], p[2]);
  pianoGroup.add(leg);
});

scene.add(pianoGroup);

// Subtle uplight on the piano (suggests it's the only thing illuminated)
const pianoLight = new THREE.PointLight(0xffd28e, 1.6, 6, 1.8);
pianoLight.position.set(0, 0.5, -2.5);
scene.add(pianoLight);

// Minimum ambient
scene.add(new THREE.AmbientLight(0x080614, 0.5));

// ── Dust motes drifting through window light ────────────────────────
const DUST_COUNT = 600;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_COUNT * 3);
const dustVel = new Float32Array(DUST_COUNT * 3);
const dustPhase = new Float32Array(DUST_COUNT);
for (let i = 0; i < DUST_COUNT; i++) {
  // Cluster in the window light cone
  dustPos[i*3+0] = -5 + (Math.random() * 5);  // x: from window into room
  dustPos[i*3+1] = 0.5 + Math.random() * 5;
  dustPos[i*3+2] = -3 + (Math.random()-0.5) * 6;
  dustVel[i*3+0] = (Math.random()-0.5) * 0.1;
  dustVel[i*3+1] = -0.05 - Math.random()*0.05;
  dustVel[i*3+2] = (Math.random()-0.5) * 0.05;
  dustPhase[i] = Math.random() * Math.PI * 2;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`varying vec3 vP;
    void main(){ vP=position; vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize = 2.5 * (200.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`varying vec3 vP;
    void main(){
      vec2 p = gl_PointCoord - 0.5; float r = length(p);
      if (r > 0.5) discard;
      float a = smoothstep(0.5, 0.0, r) * 0.7;
      // brighter when near window light pool
      float lit = exp(-distance(vP, vec3(-3.0, 3.5, -1.0)) * 0.2);
      gl_FragColor = vec4(vec3(1.0, 0.95, 0.8) * lit, a * lit);
    }`,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ── Audio — Karplus-Strong piano synthesis ───────────────────────────
let audioCtx = null, masterGain;
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

function startAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.42;
  // Reverb: convolve with a simple impulse response (decaying noise)
  const irLen = audioCtx.sampleRate * 2.8;
  const irBuf = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) {
      d[i] = (Math.random()*2 - 1) * Math.pow(1 - i/irLen, 2.5);
    }
  }
  const conv = audioCtx.createConvolver();
  conv.buffer = irBuf;
  const wet = audioCtx.createGain(); wet.gain.value = 0.4;
  conv.connect(wet).connect(masterGain);
  masterGain.connect(audioCtx.destination);
  window._convReverb = conv;
}

function playNote(midi, vel = 0.7, duration = 1.2) {
  if (!audioCtx) return;
  const freq = midiToFreq(midi);
  const t0 = audioCtx.currentTime;
  // Karplus-Strong-ish: white-noise burst → delay-line via shorter loop, but simpler approach:
  // additive sines tuned to harmonic series with envelope (still musical, more piano-like)
  const now = audioCtx.currentTime;
  const envG = audioCtx.createGain(); envG.gain.value = 0;
  envG.gain.setValueAtTime(0, now);
  envG.gain.linearRampToValueAtTime(vel * 0.9, now + 0.005);
  envG.gain.exponentialRampToValueAtTime(vel * 0.3, now + 0.3);
  envG.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  // 5 partials with decreasing amplitude
  const partials = [1, 2, 3, 4, 5.05];
  const amps = [1.0, 0.5, 0.25, 0.12, 0.06];
  partials.forEach((p, i) => {
    const o = audioCtx.createOscillator();
    o.type = i === 0 ? 'triangle' : 'sine';
    o.frequency.value = freq * p;
    o.detune.value = (Math.random()-0.5) * 4; // subtle untuning
    const og = audioCtx.createGain();
    og.gain.value = amps[i];
    o.connect(og).connect(envG);
    o.start(now);
    o.stop(now + duration + 0.1);
  });
  // attack noise burst (hammer thud)
  const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.025, audioCtx.sampleRate);
  const nD = nBuf.getChannelData(0);
  for (let i = 0; i < nD.length; i++) nD[i] = (Math.random()*2-1) * Math.exp(-i/nD.length * 8);
  const ns = audioCtx.createBufferSource(); ns.buffer = nBuf;
  const nlp = audioCtx.createBiquadFilter(); nlp.type = 'lowpass'; nlp.frequency.value = freq * 4;
  const ng = audioCtx.createGain(); ng.gain.value = vel * 0.15;
  ns.connect(nlp).connect(ng).connect(envG);
  ns.start(now);
  // Through master + reverb send
  envG.connect(masterGain);
  envG.connect(window._convReverb);
}

// ── Melody scheduler — picks notes from a curated phrase pool ───────
// A slow, melancholy, mostly-A-minor melody. ~60 BPM.
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteToMidi(name, octave) {
  return noteNames.indexOf(name) + (octave + 1) * 12;
}

// Simple phrase library: each phrase is [midi, duration_in_beats] pairs.
// Phrases mix slow legato lines, sparse chords, and ornamental flourishes.
const phrases = [
  // Slow A minor descending phrase
  [[69, 1.5], [67, 0.5], [65, 1.0], [64, 1.0], [62, 1.5], [60, 0.5], [57, 2.0]],
  // Whisper chord (A minor)
  [[57, 4.0], [60, 4.0], [64, 4.0]],
  // Melodic ascending
  [[57, 0.5], [60, 0.5], [64, 0.5], [69, 0.5], [72, 1.0], [69, 0.5], [67, 1.0]],
  // Sparse single notes with rest
  [[64, 2.0], [-1, 2.0], [60, 2.0]],
  // Moonlight-style triplets
  [[55, 0.33], [60, 0.33], [64, 0.33], [55, 0.33], [60, 0.33], [64, 0.33], [55, 0.33], [60, 0.33], [64, 1.0]],
  // F major 7 contemplation
  [[53, 4.0], [57, 4.0], [60, 4.0], [64, 4.0]],
  // Distant high note alone
  [[88, 0.5], [-1, 1.0], [83, 0.5], [-1, 1.5]],
  // Walking melodic
  [[60, 0.75], [62, 0.75], [64, 0.75], [65, 0.75], [67, 1.5], [64, 0.5], [60, 2.0]],
];

const BPM = 56; // very slow
const BEAT = 60 / BPM;

let scheduledTime = 0;
let phraseIdx = 0;
let currentNote = '';

function schedulePhrase() {
  const phrase = phrases[Math.floor(Math.random() * phrases.length)];
  let cursor = scheduledTime;
  phrase.forEach(([midi, beats]) => {
    if (midi < 0) {
      cursor += beats * BEAT;
      return;
    }
    const tForNote = cursor;
    const dur = beats * BEAT * 0.95;
    if (audioCtx && tForNote >= audioCtx.currentTime) {
      setTimeout(() => {
        playNote(midi, 0.4 + Math.random()*0.3, beats * BEAT * 1.5);
        animateKey(midi, beats * BEAT);
        currentNote = noteAtMidi(midi);
        document.getElementById('now').textContent = currentNote;
      }, (tForNote - audioCtx.currentTime) * 1000);
    }
    cursor += beats * BEAT;
  });
  scheduledTime = cursor + (1 + Math.random()*3) * BEAT; // breath between phrases
  // Schedule next phrase
  if (audioCtx) {
    const ms = (scheduledTime - audioCtx.currentTime - 8) * 1000;
    setTimeout(schedulePhrase, Math.max(500, ms));
  }
}

function noteAtMidi(m) {
  const name = noteNames[m % 12];
  const oct = Math.floor(m/12) - 1;
  return name + oct;
}

const animatedKeys = [];
function animateKey(midi, dur) {
  const k = keys[midi];
  if (!k) return;
  animatedKeys.push({ key: k, t0: performance.now(), dur: dur * 1000 });
}

// ── Animation loop ──────────────────────────────────────────────────
let prev = performance.now(), time = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;
  time += dt;

  // Update dust
  for (let i = 0; i < DUST_COUNT; i++) {
    dustPos[i*3+0] += dustVel[i*3+0] * dt + Math.sin(time*0.4 + dustPhase[i]) * 0.0008;
    dustPos[i*3+1] += dustVel[i*3+1] * dt + Math.sin(time*0.6 + dustPhase[i]*1.3) * 0.0006;
    dustPos[i*3+2] += dustVel[i*3+2] * dt + Math.cos(time*0.3 + dustPhase[i]) * 0.0006;
    if (dustPos[i*3+1] < 0.2) {
      dustPos[i*3+0] = -5 + Math.random()*5;
      dustPos[i*3+1] = 4 + Math.random()*2;
      dustPos[i*3+2] = -3 + (Math.random()-0.5) * 6;
    }
  }
  dustGeo.attributes.position.needsUpdate = true;
  dustMat.uniforms.time.value = time;
  floorMat.uniforms.time.value = time;

  // Animated keys (depress and rebound)
  for (let i = animatedKeys.length - 1; i >= 0; i--) {
    const a = animatedKeys[i];
    const elapsed = now - a.t0;
    const phase = elapsed / a.dur;
    if (phase >= 1) {
      a.key.mesh.position.y = a.key.baseY;
      animatedKeys.splice(i, 1);
    } else if (phase < 0.1) {
      // depress
      a.key.mesh.position.y = a.key.baseY - 0.012 * (phase / 0.1);
    } else {
      // hold then release
      const rel = (phase - 0.1) / 0.9;
      a.key.mesh.position.y = a.key.baseY - 0.012 * (1 - rel);
    }
  }

  // Subtle camera breathing
  camera.position.x = Math.sin(time * 0.2) * 0.05;
  camera.position.y = 1.4 + Math.sin(time * 0.27) * 0.025;
  camera.lookAt(0, 1.0, -3);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Click to begin
document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').style.transition = 'opacity 0.6s';
  document.getElementById('begin').style.opacity = '0';
  setTimeout(() => document.getElementById('begin').remove(), 700);
  startAudio();
  scheduledTime = audioCtx.currentTime + 1.5;
  schedulePhrase();
});
</script>
