    <style id="levigold-enhancement-css">
    body { opacity: 0; animation: levigold-fadein 0.6s ease forwards; }
    @keyframes levigold-fadein { to { opacity: 1; } }
    canvas { will-change: transform; transform: translateZ(0); }
    .modal-overlay, .panel, .stats-box, .menu, .hud, .dialog { contain: layout style; }

    /* Cinematic overlays — only applied when body has class .levigold-cinematic */

    body.levigold-cinematic::before {

    @keyframes levigold-grain {
      0% { transform: translate(0, 0); }   17% { transform: translate(-1%, 1%); }

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>


    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 100, 500);
        
        // Camera setup - Isometric view
        const aspect = window.innerWidth / window.innerHeight;
        const d = 50;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        camera.position.set(100, 100, 100);
        camera.lookAt(0, 0, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor(0x87CEEB);
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        // Ground
        const groundGeometry = new THREE.PlaneGeometry(300, 300);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x3a8c3a });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Create environment
        function createTree(x, z) {
            const group = new THREE.Group();
            
            // Trunk
            const trunkGeometry = new THREE.CylinderGeometry(2, 3, 15);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 7.5;
            trunk.castShadow = true;
            group.add(trunk);
            
            // Foliage
            const foliageGeometry = new THREE.SphereGeometry(8, 8, 6);
            const foliageMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 });
            const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage.position.y = 18;
            foliage.castShadow = true;
            group.add(foliage);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createBuilding(x, z, height) {
            const width = 10 + Math.random() * 10;
            const depth = 10 + Math.random() * 10;
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshLambertMaterial({ 
                color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.6, 0.3, 0.6)
            });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, height / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            return building;
        }
        
        // Add trees
        for (let i = 0; i < 15; i++) {
            const x = (Math.random() - 0.5) * 250;
            const z = (Math.random() - 0.5) * 250;
            if (Math.abs(x) > 30 || Math.abs(z) > 30) {
                scene.add(createTree(x, z));
            }
        }
        
        // Add buildings
        for (let i = 0; i < 8; i++) {
            const x = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 200;
            const height = 20 + Math.random() * 40;
            if (Math.abs(x) > 40 || Math.abs(z) > 40) {
                scene.add(createBuilding(x, z, height));
            }
        }
        
        // Create drone
        class Drone {
            constructor() {
                this.group = new THREE.Group();
                
                // Body
                const bodyGeometry = new THREE.BoxGeometry(4, 1, 4);
                const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.body.castShadow = true;
                this.group.add(this.body);
                
                // Propellers
                this.propellers = [];
                const propellerPositions = [
                    [-2, 0.5, -2], [2, 0.5, -2],
                    [-2, 0.5, 2], [2, 0.5, 2]
                ];
                
                propellerPositions.forEach(pos => {
                    const propGeometry = new THREE.CylinderGeometry(0.1, 0.1, 3);
                    const propMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
                    const propeller = new THREE.Mesh(propGeometry, propMaterial);
                    propeller.rotation.z = Math.PI / 2;
                    propeller.position.set(...pos);
                    propeller.castShadow = true;
                    this.propellers.push(propeller);
                    this.group.add(propeller);
                });
                
                // Light
                const light = new THREE.PointLight(0x00ff00, 1, 10);
                light.position.y = -0.5;
                this.group.add(light);
                
                // Position and physics
                this.group.position.set(0, 20, 0);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.targetPosition = new THREE.Vector3(0, 20, 0);
                this.isManual = false;
                this.battery = 100;
                
                scene.add(this.group);
            }
            
            update(deltaTime) {
                // Rotate propellers
                this.propellers.forEach(prop => {
                    prop.rotation.y += deltaTime * 50;
                });
                
                // Battery drain
                this.battery = Math.max(0, this.battery - deltaTime * 0.5);
                
                if (!this.isManual) {
                    // Autonomous flight
                    const time = Date.now() * 0.001;
                    
                    // Create a smooth flight path
                    this.targetPosition.x = Math.sin(time * 0.3) * 50;
                    this.targetPosition.z = Math.cos(time * 0.2) * 50;
                    this.targetPosition.y = 20 + Math.sin(time * 0.5) * 10;
                    
                    // Move towards target
                    const direction = new THREE.Vector3().subVectors(this.targetPosition, this.group.position);
                    const distance = direction.length();
                    
                    if (distance > 0.1) {
                        direction.normalize();
                        this.velocity.lerp(direction.multiplyScalar(10), deltaTime * 2);
                    }
                }
                
                // Apply velocity
                this.group.position.add(this.velocity.clone().multiplyScalar(deltaTime));
                
                // Tilt based on velocity
                this.group.rotation.z = this.velocity.x * 0.02;
                this.group.rotation.x = -this.velocity.z * 0.02;
                
                // Damping
                this.velocity.multiplyScalar(0.98);
                
                // Keep within bounds
                this.group.position.clamp(
                    new THREE.Vector3(-100, 5, -100),
                    new THREE.Vector3(100, 50, 100)
                );
            }
            
            setManualControl(vx, vy, vz) {
                if (this.isManual) {
                    this.velocity.x += vx;
                    this.velocity.y += vy;
                    this.velocity.z += vz;
                }
            }
            
            reset() {
                this.group.position.set(0, 20, 0);
                this.velocity.set(0, 0, 0);
                this.battery = 100;
            }
        }
        
        const drone = new Drone();
        
        // Controls
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);
        
        // UI Controls
        const toggleModeBtn = document.getElementById('toggleMode');
        const resetBtn = document.getElementById('resetDrone');
        const modeDisplay = document.getElementById('mode');
        
        toggleModeBtn.addEventListener('click', () => {
            drone.isManual = !drone.isManual;
            toggleModeBtn.textContent = drone.isManual ? 'Switch to Autonomous' : 'Switch to Manual';
            modeDisplay.textContent = drone.isManual ? 'Manual' : 'Autonomous';
        });
        
        resetBtn.addEventListener('click', () => {
            drone.reset();
        });
        
        // Animation loop
        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            if (deltaTime > 0 && deltaTime < 0.1) {
                // Manual controls
                if (drone.isManual) {
                    if (keys['ArrowUp']) drone.setManualControl(0, 0, -1);
                    if (keys['ArrowDown']) drone.setManualControl(0, 0, 1);
                    if (keys['ArrowLeft']) drone.setManualControl(-1, 0, 0);
                    if (keys['ArrowRight']) drone.setManualControl(1, 0, 0);
                    if (keys[' ']) drone.setManualControl(0, 1, 0);
                    if (keys['Shift']) drone.setManualControl(0, -1, 0);
                }
                
                drone.update(deltaTime);
                
                // Update UI
                document.getElementById('altitude').textContent = drone.group.position.y.toFixed(1);
                document.getElementById('speed').textContent = drone.velocity.length().toFixed(1);
                document.getElementById('battery').textContent = drone.battery.toFixed(0);
                
                // Camera follow with smooth damping
                const cameraTarget = new THREE.Vector3(
                    drone.group.position.x * 0.3,
                    0,
                    drone.group.position.z * 0.3
                );
                camera.position.x = 100 + cameraTarget.x;
                camera.position.z = 100 + cameraTarget.z;
                camera.lookAt(cameraTarget);
            }
            
            renderer.render(scene, camera);
        }
        
        animate(0);
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
