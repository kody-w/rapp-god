    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

(function(){
const apps = DATA.apps;
const catColors = DATA.colors;
const catKeys = Object.keys(catColors);
const catNames = {};
apps.forEach(a => { catNames[a.c] = a.cn; });

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 150, 400);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Starfield background
const starGeo = new THREE.BufferGeometry();
const starCount = 8000;
const starPos = new Float32Array(starCount*3);
const starCol = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r=1500+Math.random()*2000, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
  starPos[i*3]=r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
  starPos[i*3+2]=r*Math.cos(ph);
  const b=0.3+Math.random()*0.7;
  starCol[i*3]=b*0.8;starCol[i*3+1]=b*0.85;starCol[i*3+2]=b;
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color',new THREE.BufferAttribute(starCol,3));
const starMat=new THREE.PointsMaterial({size:1.2,vertexColors:true,transparent:true,opacity:0.8,sizeAttenuation:true});
scene.add(new THREE.Points(starGeo,starMat));

// Category cluster positions (arrange in a ring with some vertical spread)
const catPositions = {};
catKeys.forEach((key,i)=>{
  const angle = (i/catKeys.length)*Math.PI*2;
  const radius = 180 + (i%2)*40;
  catPositions[key] = new THREE.Vector3(
    Math.cos(angle)*radius,
    (Math.sin(angle*2.7))*50,
    Math.sin(angle)*radius
  );
});

// Place apps as stars
const appPositions = [];
const appMeshes = [];
const appGroup = new THREE.Group();
scene.add(appGroup);

// Sprite texture for stars
function makeStarTexture(color, size){
  const c=document.createElement('canvas');
  c.width=c.height=size;
  const ctx=c.getContext('2d');
  const grad=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0,'rgba(255,255,255,1)');
  grad.addColorStop(0.15,color);
  grad.addColorStop(0.5,color.replace(')',',0.3)').replace('rgb','rgba'));
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

// Build instanced points per category for performance
const pointsPerCat = {};
catKeys.forEach(key=>{
  const catApps = apps.filter(a=>a.c===key);
  if(!catApps.length) return;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(catApps.length*3);
  const sizes = new Float32Array(catApps.length);
  const brightnesses = new Float32Array(catApps.length);
  const center = catPositions[key];
  
  catApps.forEach((app,i)=>{
    // Spread within cluster using gaussian-like distribution
    const spread = 60;
    const rx = (Math.random()-0.5)*2, ry = (Math.random()-0.5)*2, rz = (Math.random()-0.5)*2;
    const px = center.x + rx*spread*(0.5+Math.random());
    const py = center.y + ry*spread*0.6*(0.5+Math.random());
    const pz = center.z + rz*spread*(0.5+Math.random());
    positions[i*3]=px; positions[i*3+1]=py; positions[i*3+2]=pz;
    
    // Size by score (3-12 range)
    const scoreNorm = Math.max(0,Math.min(100,app.s))/100;
    sizes[i] = 3 + scoreNorm*12;
    
    // Brightness by generation
    const gen = typeof app.g === 'number' ? app.g : 1;
    brightnesses[i] = 0.4 + Math.min(gen/8, 1)*0.6;
    
    appPositions.push({x:px,y:py,z:pz,app:app,catIdx:catKeys.indexOf(key)});
  });
  
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  
  const hexColor = catColors[key];
  const col = new THREE.Color(hexColor);
  
  const mat = new THREE.ShaderMaterial({
    uniforms:{
      uColor:{value:col},
      uTime:{value:0},
      uOpacity:{value:1.0}
    },
    vertexShader:`
      attribute float size;
      varying float vSize;
      void main(){
        vSize=size;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(300.0/-mv.z);
        gl_Position=projectionMatrix*mv;
      }
    `,
    fragmentShader:`
      uniform vec3 uColor;
      uniform float uTime;
      uniform float uOpacity;
      varying float vSize;
      void main(){
        float d=length(gl_PointCoord-0.5)*2.0;
        if(d>1.0) discard;
        float glow=exp(-d*d*3.0);
        float core=exp(-d*d*12.0);
        vec3 col=mix(uColor,vec3(1.0),core*0.8);
        float alpha=(glow*0.6+core*0.4)*uOpacity;
        gl_FragColor=vec4(col,alpha);
      }
    `,
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending
  });
  
  const points = new THREE.Points(geo,mat);
  appGroup.add(points);
  pointsPerCat[key] = {points, mat, catApps};
});

// Nebula glow per category
catKeys.forEach(key=>{
  const center = catPositions[key];
  const col = new THREE.Color(catColors[key]);
  const nebulaGeo = new THREE.SphereGeometry(55,16,16);
  const nebulaMat = new THREE.ShaderMaterial({
    uniforms:{uColor:{value:col},uTime:{value:0}},
    vertexShader:`
      varying vec3 vNormal;
      void main(){
        vNormal=normalize(normalMatrix*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
      }
    `,
    fragmentShader:`
      uniform vec3 uColor;
      uniform float uTime;
      varying vec3 vNormal;
      void main(){
        float intensity=pow(0.65-dot(vNormal,vec3(0,0,1.0)),2.5);
        gl_FragColor=vec4(uColor*0.4,intensity*0.12);
      }
    `,
    transparent:true,
    side:THREE.BackSide,
    depthWrite:false,
    blending:THREE.AdditiveBlending
  });
  const nebula=new THREE.Mesh(nebulaGeo,nebulaMat);
  nebula.position.copy(center);
  scene.add(nebula);
});

// Tag connections (particle trails between apps sharing tags)
// Only connect top tags to avoid visual clutter
const tagIndex = {};
apps.forEach((a,i)=>{
  (a.tg||[]).forEach(tag=>{
    if(!tagIndex[tag]) tagIndex[tag]=[];
    tagIndex[tag].push(i);
  });
});

const trailGroup = new THREE.Group();
scene.add(trailGroup);

// Build connections for less common tags (more meaningful connections)
const connections = [];
const connectedPairs = new Set();
Object.keys(tagIndex).forEach(tag=>{
  const indices = tagIndex[tag];
  if(indices.length<2 || indices.length>30) return; // skip very common/rare tags
  // Sample a few connections per tag
  const maxConns = Math.min(3, indices.length-1);
  for(let i=0;i<maxConns;i++){
    const a = indices[Math.floor(Math.random()*indices.length)];
    const b = indices[Math.floor(Math.random()*indices.length)];
    if(a===b) continue;
    const pairKey = Math.min(a,b)+'-'+Math.max(a,b);
    if(connectedPairs.has(pairKey)) continue;
    connectedPairs.add(pairKey);
    connections.push([a,b,tag]);
  }
});

// Create trail geometry
const trailPositions = new Float32Array(connections.length*6);
const trailColors = new Float32Array(connections.length*6);
connections.forEach(([ai,bi,tag],i)=>{
  const a=appPositions[ai], b=appPositions[bi];
  if(!a||!b) return;
  trailPositions[i*6]=a.x; trailPositions[i*6+1]=a.y; trailPositions[i*6+2]=a.z;
  trailPositions[i*6+3]=b.x; trailPositions[i*6+4]=b.y; trailPositions[i*6+5]=b.z;
  const colA=new THREE.Color(catColors[apps[ai].c]||'#888');
  const colB=new THREE.Color(catColors[apps[bi].c]||'#888');
  trailColors[i*6]=colA.r; trailColors[i*6+1]=colA.g; trailColors[i*6+2]=colA.b;
  trailColors[i*6+3]=colB.r; trailColors[i*6+4]=colB.g; trailColors[i*6+5]=colB.b;
});

const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position',new THREE.BufferAttribute(trailPositions,3));
trailGeo.setAttribute('color',new THREE.BufferAttribute(trailColors,3));
const trailMat = new THREE.LineBasicMaterial({
  vertexColors:true,transparent:true,opacity:0.06,blending:THREE.AdditiveBlending,depthWrite:false
});
trailGroup.add(new THREE.LineSegments(trailGeo,trailMat));

// Ambient light
scene.add(new THREE.AmbientLight(0x111122));

// Camera controls (simple orbit)
let isDragging=false, prevMouse={x:0,y:0};
let camTheta=0, camPhi=0.3, camDist=450;
let targetTheta=camTheta, targetPhi=camPhi, targetDist=camDist;
let targetLookAt=new THREE.Vector3(0,0,0);
let currentLookAt=new THREE.Vector3(0,0,0);
let autoRotate=true;

function updateCamera(){
  camTheta+=(targetTheta-camTheta)*0.05;
  camPhi+=(targetPhi-camPhi)*0.05;
  camDist+=(targetDist-camDist)*0.05;
  currentLookAt.lerp(targetLookAt,0.03);
  camPhi=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,camPhi));
  camDist=Math.max(50,Math.min(1500,camDist));
  camera.position.set(
    currentLookAt.x+Math.cos(camPhi)*Math.sin(camTheta)*camDist,
    currentLookAt.y+Math.sin(camPhi)*camDist,
    currentLookAt.z+Math.cos(camPhi)*Math.cos(camTheta)*camDist
  );
  camera.lookAt(currentLookAt);
}

renderer.domElement.addEventListener('mousedown',e=>{
  isDragging=true;autoRotate=false;prevMouse={x:e.clientX,y:e.clientY};
});
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  const dx=e.clientX-prevMouse.x, dy=e.clientY-prevMouse.y;
  targetTheta-=dx*0.005;
  targetPhi+=dy*0.005;
  prevMouse={x:e.clientX,y:e.clientY};
});
window.addEventListener('mouseup',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000)});
renderer.domElement.addEventListener('wheel',e=>{
  targetDist+=e.deltaY*0.5;
  autoRotate=false;
  setTimeout(()=>autoRotate=true,3000);
},{passive:true});

// Touch support
let lastTouch=null, lastTouchDist=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;autoRotate=false;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}}
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy)}
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDragging){const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;targetTheta-=dx*0.005;targetPhi+=dy*0.005;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}}
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);targetDist+=(lastTouchDist-dist)*1.5;lastTouchDist=dist}
},{passive:true});
renderer.domElement.addEventListener('touchend',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000)},{passive:true});

// Raycaster for picking
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=5;
const mouse=new THREE.Vector2();
let hoveredApp=null, selectedApp=null;
const tooltip=document.getElementById('tooltip');

function getAppAtMouse(x,y){
  mouse.x=(x/innerWidth)*2-1;
  mouse.y=-(y/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check against all app positions
  let closest=null, closestDist=Infinity;
  appPositions.forEach((ap,i)=>{
    const pos=new THREE.Vector3(ap.x,ap.y,ap.z);
    const projected=pos.clone().project(camera);
    const sx=(projected.x+1)/2*innerWidth;
    const sy=(-projected.y+1)/2*innerHeight;
    const dist=Math.sqrt((sx-x)**2+(sy-y)**2);
    if(dist<20 && projected.z<1 && dist<closestDist){
      closestDist=dist;
      closest=ap;
    }
  });
  return closest;
}

renderer.domElement.addEventListener('mousemove',e=>{
  const ap=getAppAtMouse(e.clientX,e.clientY);
  if(ap){
    hoveredApp=ap;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+15)+'px';
    tooltip.style.top=(e.clientY-10)+'px';
    tooltip.textContent=ap.app.t+' ('+ap.app.s+')';
    renderer.domElement.style.cursor='pointer';
  } else {
    hoveredApp=null;
    tooltip.style.display='none';
    renderer.domElement.style.cursor='grab';
  }
});

renderer.domElement.addEventListener('click',e=>{
  const ap=getAppAtMouse(e.clientX,e.clientY);
  if(ap) showHud(ap.app);
});

function showHud(app){
  selectedApp=app;
  const hud=document.getElementById('hud');
  document.getElementById('hud-title').textContent=app.t;
  const scoreBadge=document.getElementById('hud-score');
  scoreBadge.textContent='Score: '+app.s;
  const scoreColor=app.s>=80?'#2ecc71':app.s>=60?'#f39c12':app.s>=40?'#e67e22':'#e74c3c';
  scoreBadge.style.background=scoreColor+'33';
  scoreBadge.style.color=scoreColor;
  scoreBadge.style.border='1px solid '+scoreColor+'66';
  document.getElementById('hud-cat').textContent='Category: '+app.cn;
  document.getElementById('hud-gen').textContent='Generation: '+(app.g||1)+' · Complexity: '+app.cx;
  document.getElementById('hud-complexity').textContent='File: '+app.f;
  document.getElementById('hud-desc').textContent=app.d;
  const tagsEl=document.getElementById('hud-tags');
  tagsEl.innerHTML=(app.tg||[]).map(t=>'<span class="tag">'+t+'<\/span>').join('');
  document.getElementById('hud-launch').href='../'+app.fo+'/'+app.f;
  hud.style.display='block';
}

document.getElementById('hud-close').addEventListener('click',()=>{
  document.getElementById('hud').style.display='none';
  selectedApp=null;
});

// Search
const searchInput=document.getElementById('search');
let searchResults=[];
let searchHighlight=null;

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase().trim();
  if(!q){
    searchResults=[];
    // Reset all opacities
    Object.values(pointsPerCat).forEach(({mat})=>{mat.uniforms.uOpacity.value=1.0});
    trailMat.opacity=0.06;
    return;
  }
  searchResults=appPositions.filter(ap=>{
    const a=ap.app;
    return a.t.toLowerCase().includes(q)||a.d.toLowerCase().includes(q)||(a.tg||[]).some(t=>t.toLowerCase().includes(q));
  });
  
  // Dim non-matching categories
  const matchingCats=new Set(searchResults.map(r=>r.app.c));
  Object.entries(pointsPerCat).forEach(([key,{mat}])=>{
    mat.uniforms.uOpacity.value=matchingCats.has(key)?1.0:0.1;
  });
  trailMat.opacity=0.02;
  
  // Zoom to first result
  if(searchResults.length>0){
    if(searchResults.length===1){
      const ap=searchResults[0];
      targetLookAt.set(ap.x,ap.y,ap.z);
      targetDist=80;
      autoRotate=false;
    } else {
      // Zoom to centroid of results
      const cx=searchResults.reduce((s,r)=>s+r.x,0)/searchResults.length;
      const cy=searchResults.reduce((s,r)=>s+r.y,0)/searchResults.length;
      const cz=searchResults.reduce((s,r)=>s+r.z,0)/searchResults.length;
      targetLookAt.set(cx,cy,cz);
      targetDist=Math.min(350, 80+searchResults.length*2);
      autoRotate=false;
    }
    setTimeout(()=>autoRotate=true,5000);
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='/'){
    e.preventDefault();
    searchInput.focus();
  }
  if(e.key==='Escape'){
    searchInput.value='';
    searchInput.dispatchEvent(new Event('input'));
    searchInput.blur();
    document.getElementById('hud').style.display='none';
    targetLookAt.set(0,0,0);
    targetDist=450;
    autoRotate=true;
  }
});

// Legend
const legend=document.getElementById('legend');
catKeys.forEach(key=>{
  const count=apps.filter(a=>a.c===key).length;
  const item=document.createElement('div');
  item.className='legend-item';
  item.innerHTML='<span class="legend-dot" style="background:'+catColors[key]+'"><\/span>'+(catNames[key]||key)+' <span style="color:#556">('+count+')<\/span>';
  item.addEventListener('click',()=>{
    const center=catPositions[key];
    targetLookAt.set(center.x,center.y,center.z);
    targetDist=120;
    autoRotate=false;
    setTimeout(()=>autoRotate=true,4000);
  });
  legend.appendChild(item);
});

// Stats
document.getElementById('stats').innerHTML=apps.length+' apps · '+catKeys.length+' categories · '+connections.length+' tag connections<br>Drag to orbit · Scroll to zoom · / to search · Esc to reset';

// Remove loading
document.getElementById('loading').style.display='none';

// Animation loop
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=0.016;
  
  if(autoRotate) targetTheta+=0.001;
  updateCamera();
  
  // Pulse nebulae
  Object.values(pointsPerCat).forEach(({mat})=>{
    mat.uniforms.uTime.value=time;
  });
  
  // Slowly rotate trail group for shimmer
  trailGroup.rotation.y=Math.sin(time*0.1)*0.02;
  
  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

})();
</script>
</body>
</html>
