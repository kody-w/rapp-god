    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Memory Crease</h3>
        <div class="control-row">
            <label>Unfold Speed <span class="value" id="speed-val">50</span></label>
            <input type="range" id="speed" min="10" max="100" value="50">
        </div>
        <div class="control-row">
            <label>Memory Intensity <span class="value" id="memory-val">60</span></label>
            <input type="range" id="memory" min="20" max="100" value="60">
        </div>
        <button id="unfold-btn">Unfold One Step</button>
        <button id="refold-btn">Refold</button>
        <button id="new-btn">New Origami</button>
    </div>
    <div id="stats">
        <div>Folds: <span id="fold-count">0</span></div>
        <div>State: <span id="current-state">Folded</span></div>
    </div>
    <div id="info">Click Unfold to reveal the memory traces in each crease</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; initOrigami(); }
        
        let unfoldSpeed = 0.5;
        let memoryIntensity = 0.6;
        let time = 0;
        
        let creases = [];
        let currentFold = 0;
        let isUnfolding = false;
        let unfoldProgress = 0;
        
        const FOLD_MEMORIES = [
            'The first careful crease, anticipation in fingertips',
            'Sunlight through the window during this fold',
            'A moment of hesitation before committing',
            'The paper resisted slightly here',
            'Confidence growing with each precise line',
            'Background music fading into focus',
            'The smell of fresh paper',
            'A breath held during the delicate work',
            'Satisfaction at the symmetry achieved',
            'Almost done, the form emerging'
        ];
        
        function initOrigami() {
            creases = [];
            currentFold = 0;
            unfoldProgress = 0;
            
            const centerX = W / 2;
            const centerY = H / 2;
            const size = Math.min(W, H) * 0.35;
            
            const foldCount = 8 + Math.floor(Math.random() * 5);
            
            for (let i = 0; i < foldCount; i++) {
                const angle = Math.random() * Math.PI;
                const offset = (Math.random() - 0.5) * size * 0.5;
                const isMountain = Math.random() > 0.5;
                
                creases.push({
                    x1: centerX + Math.cos(angle) * size + Math.sin(angle) * offset,
                    y1: centerY + Math.sin(angle) * size - Math.cos(angle) * offset,
                    x2: centerX - Math.cos(angle) * size + Math.sin(angle) * offset,
                    y2: centerY - Math.sin(angle) * size - Math.cos(angle) * offset,
                    isMountain: isMountain,
                    order: i,
                    revealed: false,
                    revealProgress: 0,
                    memory: FOLD_MEMORIES[i % FOLD_MEMORIES.length],
                    hue: isMountain ? 200 : 30
                });
            }
            
            creases.sort((a, b) => b.order - a.order);
        }
        
        resize(); window.onresize = resize;
        
        function drawPaper() {
            const centerX = W / 2;
            const centerY = H / 2;
            const size = Math.min(W, H) * 0.35;
            
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;
            
            ctx.beginPath();
            ctx.rect(centerX - size, centerY - size, size * 2, size * 2);
            ctx.fillStyle = '#fffef8';
            ctx.fill();
            
            ctx.restore();
            
            ctx.strokeStyle = 'rgba(180, 160, 140, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(centerX - size, centerY - size, size * 2, size * 2);
        }
        
        function drawCreases() {
            creases.forEach((crease, index) => {
                if (!crease.revealed && index !== currentFold) return;
                
                let progress = crease.revealProgress;
                if (index === currentFold && isUnfolding) {
                    progress = unfoldProgress;
                }
                
                if (progress <= 0) return;
                
                const midX = (crease.x1 + crease.x2) / 2;
                const midY = (crease.y1 + crease.y2) / 2;
                const length = Math.hypot(crease.x2 - crease.x1, crease.y2 - crease.y1);
                const angle = Math.atan2(crease.y2 - crease.y1, crease.x2 - crease.x1);
                
                const drawLength = length * progress;
                const startX = midX - Math.cos(angle) * drawLength / 2;
                const startY = midY - Math.sin(angle) * drawLength / 2;
                const endX = midX + Math.cos(angle) * drawLength / 2;
                const endY = midY + Math.sin(angle) * drawLength / 2;
                
                if (crease.isMountain) {
                    ctx.setLineDash([]);
                } else {
                    ctx.setLineDash([8, 4]);
                }
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                
                const alpha = progress * memoryIntensity;
                const lightness = crease.isMountain ? 40 : 50;
                ctx.strokeStyle = "hsla(" + crease.hue + ", 40%, " + lightness + "%, " + alpha + ")";
                ctx.lineWidth = 2 + (crease.order / creases.length) * 2;
                ctx.stroke();
                ctx.setLineDash([]);
                
                if (progress > 0.5) {
                    const glowAlpha = (progress - 0.5) * 2 * memoryIntensity * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = "hsla(" + crease.hue + ", 60%, 70%, " + glowAlpha + ")";
                    ctx.lineWidth = 6;
                    ctx.stroke();
                }
                
                if (progress > 0.8 && index === currentFold) {
                    ctx.font = '12px Georgia';
                    ctx.fillStyle = "rgba(100, 90, 70, " + ((progress - 0.8) * 5 * 0.6) + ")";
                    ctx.textAlign = 'center';
                    ctx.fillText(crease.memory, midX, midY - 15);
                }
            });
        }
        
        function drawBackground() {
            const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
            gradient.addColorStop(0, '#f8f5f0');
            gradient.addColorStop(1, '#e8e5e0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }
        
        function unfoldStep() {
            if (currentFold >= creases.length) return;
            
            isUnfolding = true;
            unfoldProgress = 0;
        }
        
        function updateStats() {
            const revealedCount = creases.filter(c => c.revealed).length;
            document.getElementById('fold-count').textContent = revealedCount + ' / ' + creases.length;
            
            if (revealedCount === 0) {
                document.getElementById('current-state').textContent = 'Folded';
            } else if (revealedCount === creases.length) {
                document.getElementById('current-state').textContent = 'Fully Unfolded';
            } else {
                document.getElementById('current-state').textContent = 'Unfolding...';
            }
        }
        
        function animate() {
            time += 0.016;
            
            if (isUnfolding) {
                unfoldProgress += 0.02 * unfoldSpeed;
                
                if (unfoldProgress >= 1) {
                    creases[currentFold].revealed = true;
                    creases[currentFold].revealProgress = 1;
                    currentFold++;
                    isUnfolding = false;
                    unfoldProgress = 0;
                }
            }
            
            drawBackground();
            drawPaper();
            drawCreases();
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        document.getElementById('speed').oninput = e => {
            unfoldSpeed = e.target.value / 100;
            document.getElementById('speed-val').textContent = e.target.value;
        };
        
        document.getElementById('memory').oninput = e => {
            memoryIntensity = e.target.value / 100;
            document.getElementById('memory-val').textContent = e.target.value;
        };
        
        document.getElementById('unfold-btn').onclick = () => {
            unfoldStep();
        };
        
        document.getElementById('refold-btn').onclick = () => {
            creases.forEach(c => {
                c.revealed = false;
                c.revealProgress = 0;
            });
            currentFold = 0;
            isUnfolding = false;
            unfoldProgress = 0;
        };
        
        document.getElementById('new-btn').onclick = () => {
            initOrigami();
        };
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 280) return;
            unfoldStep();
        };
        
        animate();
    </script>
</body>
