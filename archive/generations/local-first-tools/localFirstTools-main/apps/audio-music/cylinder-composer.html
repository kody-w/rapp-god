    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        
        let audioCtx = null;
        let playing = false;
        let rotation = 0;
        let tempo = 80;
        let currentScale = 'major';
        let pins = [];
        let lastPlayedCol = -1;
        
        const scales = {
            major: [0, 2, 4, 5, 7, 9, 11, 12],
            minor: [0, 2, 3, 5, 7, 8, 10, 12],
            pentatonic: [0, 2, 4, 7, 9, 12, 14, 16],
            chromatic: [0, 1, 2, 3, 4, 5, 6, 7]
        };
        
        const COLS = 24;
        const ROWS = 8;
        const CYL_X = W / 2;
        const CYL_Y = H / 2 - 20;
        const CYL_WIDTH = 450;
        const CYL_HEIGHT = 200;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playNote(noteIndex) {
            if (!audioCtx) return;
            const baseFreq = 523.25;
            const semitone = scales[currentScale][noteIndex] || 0;
            const freq = baseFreq * Math.pow(2, semitone / 12);
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filter.Q.setValueAtTime(5, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialDecayTo = 0.01;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialDecayTo(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            
            document.getElementById('note-display').textContent = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C+'][noteIndex];
        }
        
        function getGridPos(x, y) {
            const cylLeft = CYL_X - CYL_WIDTH / 2;
            const cylTop = CYL_Y - CYL_HEIGHT / 2;
            const cellW = CYL_WIDTH / COLS;
            const cellH = CYL_HEIGHT / ROWS;
            
            if (x < cylLeft || x > cylLeft + CYL_WIDTH) return null;
            if (y < cylTop || y > cylTop + CYL_HEIGHT) return null;
            
            const col = Math.floor((x - cylLeft) / cellW);
            const row = Math.floor((y - cylTop) / cellH);
            
            return { col, row };
        }
        
        function togglePin(col, row) {
            const existing = pins.findIndex(p => p.col === col && p.row === row);
            if (existing >= 0) {
                pins.splice(existing, 1);
            } else {
                pins.push({ col, row, glow: 0 });
            }
            document.getElementById('pin-count').textContent = pins.length;
        }
        
        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const pos = getGridPos(x, y);
            if (pos) {
                togglePin(pos.col, pos.row);
            }
        };
        
        function drawCylinder() {
            const cylLeft = CYL_X - CYL_WIDTH / 2;
            const cylTop = CYL_Y - CYL_HEIGHT / 2;
            
            // Draw cylinder body
            const gradient = ctx.createLinearGradient(cylLeft, 0, cylLeft + CYL_WIDTH, 0);
            gradient.addColorStop(0, '#5a4a30');
            gradient.addColorStop(0.3, '#8a7a50');
            gradient.addColorStop(0.5, '#a08860');
            gradient.addColorStop(0.7, '#8a7a50');
            gradient.addColorStop(1, '#5a4a30');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(cylLeft, cylTop, CYL_WIDTH, CYL_HEIGHT);
            
            // Draw end caps
            ctx.fillStyle = '#4a3a20';
            ctx.beginPath();
            ctx.ellipse(cylLeft, CYL_Y, 15, CYL_HEIGHT / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cylLeft + CYL_WIDTH, CYL_Y, 15, CYL_HEIGHT / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw grooves
            const cellW = CYL_WIDTH / COLS;
            ctx.strokeStyle = 'rgba(60, 40, 20, 0.5)';
            ctx.lineWidth = 1;
            for (let i = 1; i < COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(cylLeft + i * cellW, cylTop);
                ctx.lineTo(cylLeft + i * cellW, cylTop + CYL_HEIGHT);
                ctx.stroke();
            }
            
            // Draw row guides
            const cellH = CYL_HEIGHT / ROWS;
            for (let i = 1; i < ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(cylLeft, cylTop + i * cellH);
                ctx.lineTo(cylLeft + CYL_WIDTH, cylTop + i * cellH);
                ctx.stroke();
            }
            
            // Draw playhead
            if (playing) {
                const playX = cylLeft + ((rotation / (Math.PI * 2)) * COLS % COLS) * cellW;
                ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                ctx.fillRect(playX, cylTop, cellW, CYL_HEIGHT);
            }
        }
        
        function drawPins() {
            const cylLeft = CYL_X - CYL_WIDTH / 2;
            const cylTop = CYL_Y - CYL_HEIGHT / 2;
            const cellW = CYL_WIDTH / COLS;
            const cellH = CYL_HEIGHT / ROWS;
            
            pins.forEach(pin => {
                const x = cylLeft + pin.col * cellW + cellW / 2;
                const y = cylTop + pin.row * cellH + cellH / 2;
                
                // Glow effect
                if (pin.glow > 0) {
                    ctx.beginPath();
                    ctx.arc(x, y, 12 + pin.glow * 5, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 220, 150, " + (pin.glow * 0.5) + ")";
                    ctx.fill();
                    pin.glow *= 0.9;
                }
                
                // Pin head
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                const pinGrad = ctx.createRadialGradient(x - 2, y - 2, 0, x, y, 6);
                pinGrad.addColorStop(0, '#ffd700');
                pinGrad.addColorStop(0.7, '#c8a800');
                pinGrad.addColorStop(1, '#8a7000');
                ctx.fillStyle = pinGrad;
                ctx.fill();
                
                // Highlight
                ctx.beginPath();
                ctx.arc(x - 2, y - 2, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.fill();
            });
        }
        
        function drawComb() {
            const combY = CYL_Y + CYL_HEIGHT / 2 + 30;
            const cylLeft = CYL_X - CYL_WIDTH / 2;
            const cellH = CYL_HEIGHT / ROWS;
            
            // Comb base
            ctx.fillStyle = '#3a2a15';
            ctx.fillRect(cylLeft - 20, combY, CYL_WIDTH + 40, 50);
            
            // Teeth
            const cellW = CYL_WIDTH / COLS;
            const currentCol = Math.floor((rotation / (Math.PI * 2)) * COLS) % COLS;
            
            for (let i = 0; i < ROWS; i++) {
                const toothX = cylLeft + 10;
                const toothY = combY - 60 + i * (cellH * 0.7);
                const toothWidth = CYL_WIDTH - 20;
                const toothHeight = 8;
                
                const isPlaying = playing && pins.some(p => p.col === currentCol && p.row === i);
                
                ctx.fillStyle = isPlaying ? '#d4a050' : '#8a6a40';
                ctx.fillRect(toothX, toothY + 80, toothWidth * 0.3, toothHeight);
                
                // Note label
                ctx.fillStyle = '#a08060';
                ctx.font = '10px Georgia';
                ctx.textAlign = 'right';
                ctx.fillText(['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C'][i], cylLeft - 10, CYL_Y - CYL_HEIGHT/2 + i * cellH + cellH/2 + 4);
            }
        }
        
        function drawFrame() {
            // Ornate frame around cylinder
            ctx.strokeStyle = '#6a5a40';
            ctx.lineWidth = 8;
            ctx.strokeRect(CYL_X - CYL_WIDTH/2 - 30, CYL_Y - CYL_HEIGHT/2 - 30, CYL_WIDTH + 60, CYL_HEIGHT + 120);
            
            // Decorative corners
            const corners = [
                [CYL_X - CYL_WIDTH/2 - 30, CYL_Y - CYL_HEIGHT/2 - 30],
                [CYL_X + CYL_WIDTH/2 + 30, CYL_Y - CYL_HEIGHT/2 - 30],
                [CYL_X - CYL_WIDTH/2 - 30, CYL_Y + CYL_HEIGHT/2 + 90],
                [CYL_X + CYL_WIDTH/2 + 30, CYL_Y + CYL_HEIGHT/2 + 90]
            ];
            
            corners.forEach(([cx, cy]) => {
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#8a7a50';
                ctx.fill();
            });
        }
        
        function update() {
            if (playing) {
                const speed = (tempo / 60) * 0.02;
                rotation += speed;
                
                const currentCol = Math.floor((rotation / (Math.PI * 2)) * COLS) % COLS;
                
                if (currentCol !== lastPlayedCol) {
                    pins.filter(p => p.col === currentCol).forEach(p => {
                        playNote(ROWS - 1 - p.row);
                        p.glow = 1;
                    });
                    lastPlayedCol = currentCol;
                }
            }
        }
        
        function animate() {
            ctx.fillStyle = '#1a0a00';
            ctx.fillRect(0, 0, W, H);
            
            drawFrame();
            drawCylinder();
            drawPins();
            drawComb();
            
            update();
            
            requestAnimationFrame(animate);
        }
        
        document.getElementById('play-btn').onclick = function() {
            initAudio();
            playing = !playing;
            this.textContent = playing ? 'Stop' : 'Play';
            if (playing) lastPlayedCol = -1;
        };
        
        document.getElementById('clear-btn').onclick = () => {
            pins = [];
            document.getElementById('pin-count').textContent = 0;
        };
        
        document.getElementById('random-btn').onclick = () => {
            pins = [];
            const numPins = 15 + Math.floor(Math.random() * 20);
            for (let i = 0; i < numPins; i++) {
                const col = Math.floor(Math.random() * COLS);
                const row = Math.floor(Math.random() * ROWS);
                if (!pins.some(p => p.col === col && p.row === row)) {
                    pins.push({ col, row, glow: 0 });
                }
            }
            document.getElementById('pin-count').textContent = pins.length;
        };
        
        document.getElementById('tempo').oninput = e => tempo = parseInt(e.target.value);
        document.getElementById('scale').onchange = e => currentScale = e.target.value;
        
        // Fix for exponentialDecayTo not being a function
        GainNode.prototype.exponentialDecayTo = function(value, time) {
            this.gain.exponentialRampToValueAtTime(Math.max(0.001, value), time);
        };
        
        animate();
    </script>
</body>
</html>
