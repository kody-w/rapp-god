    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Blind Navigator</h3>
        <div class="control-row">
            <label>Pulse Speed <span class="value" id="speed-val">60</span></label>
            <input type="range" id="speed" min="30" max="100" value="60">
        </div>
        <div class="control-row">
            <label>Echo Decay <span class="value" id="decay-val">40</span></label>
            <input type="range" id="decay" min="10" max="80" value="40">
        </div>
        <button id="regenerate-btn">New Environment</button>
        <button id="reveal-btn">Reveal All (cheat)</button>
    </div>
    <div id="stats">
        <div>Pulses: <span id="pulse-count">0</span></div>
        <div>Surfaces Found: <span id="surface-count">0</span></div>
    </div>
    <div id="info">Click to emit sonar pulses | Map the invisible world through sound</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; generateEnvironment(); }
        
        let pulseSpeed = 0.6;
        let echoDecay = 0.4;
        let time = 0;
        let pulseCount = 0;
        let revealMode = false;
        
        const walls = [];
        const pulses = [];
        const echoes = [];
        const discoveredPoints = [];
        
        function generateEnvironment() {
            walls.length = 0;
            discoveredPoints.length = 0;
            
            walls.push({ x1: 0, y1: 0, x2: W, y2: 0 });
            walls.push({ x1: W, y1: 0, x2: W, y2: H });
            walls.push({ x1: W, y1: H, x2: 0, y2: H });
            walls.push({ x1: 0, y1: H, x2: 0, y2: 0 });
            
            const structures = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < structures; i++) {
                const cx = 200 + Math.random() * (W - 400);
                const cy = 100 + Math.random() * (H - 200);
                const type = Math.floor(Math.random() * 3);
                
                if (type === 0) {
                    const size = 50 + Math.random() * 100;
                    walls.push({ x1: cx - size/2, y1: cy - size/2, x2: cx + size/2, y2: cy - size/2 });
                    walls.push({ x1: cx + size/2, y1: cy - size/2, x2: cx + size/2, y2: cy + size/2 });
                    walls.push({ x1: cx + size/2, y1: cy + size/2, x2: cx - size/2, y2: cy + size/2 });
                    walls.push({ x1: cx - size/2, y1: cy + size/2, x2: cx - size/2, y2: cy - size/2 });
                } else if (type === 1) {
                    const sides = 5 + Math.floor(Math.random() * 4);
                    const radius = 40 + Math.random() * 60;
                    for (let j = 0; j < sides; j++) {
                        const a1 = (j / sides) * Math.PI * 2;
                        const a2 = ((j + 1) / sides) * Math.PI * 2;
                        walls.push({
                            x1: cx + Math.cos(a1) * radius,
                            y1: cy + Math.sin(a1) * radius,
                            x2: cx + Math.cos(a2) * radius,
                            y2: cy + Math.sin(a2) * radius
                        });
                    }
                } else {
                    const length = 80 + Math.random() * 120;
                    const angle = Math.random() * Math.PI;
                    walls.push({
                        x1: cx - Math.cos(angle) * length/2,
                        y1: cy - Math.sin(angle) * length/2,
                        x2: cx + Math.cos(angle) * length/2,
                        y2: cy + Math.sin(angle) * length/2
                    });
                }
            }
        }
        
        resize(); window.onresize = resize;
        
        class Pulse {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(W, H) * 1.5;
                this.speed = 3 + pulseSpeed * 5;
                this.alpha = 1;
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                
                walls.forEach(wall => {
                    const hits = this.getWallIntersections(wall);
                    hits.forEach(hit => {
                        if (!this.pointDiscovered(hit.x, hit.y)) {
                            discoveredPoints.push({
                                x: hit.x,
                                y: hit.y,
                                alpha: 1,
                                wall: wall
                            });
                            
                            echoes.push({
                                x: hit.x,
                                y: hit.y,
                                alpha: 1,
                                size: 10
                            });
                        }
                    });
                });
                
                return this.radius < this.maxRadius;
            }
            
            pointDiscovered(x, y) {
                return discoveredPoints.some(p => Math.hypot(p.x - x, p.y - y) < 5);
            }
            
            getWallIntersections(wall) {
                const hits = [];
                const dx = wall.x2 - wall.x1;
                const dy = wall.y2 - wall.y1;
                const length = Math.hypot(dx, dy);
                const steps = Math.ceil(length / 5);
                
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const px = wall.x1 + dx * t;
                    const py = wall.y1 + dy * t;
                    const dist = Math.hypot(px - this.x, py - this.y);
                    
                    if (Math.abs(dist - this.radius) < 5) {
                        hits.push({ x: px, y: py });
                    }
                }
                
                return hits;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0, 255, 255, " + (this.alpha * 0.3) + ")";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        function drawBackground() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
        }
        
        function drawDiscoveredGeometry() {
            discoveredPoints.forEach(point => {
                point.alpha -= 0.002 * echoDecay;
                if (point.alpha < 0.1) point.alpha = 0.1;
                
                ctx.beginPath();
                ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 255, 255, " + point.alpha + ")";
                ctx.fill();
            });
            
            const segments = {};
            discoveredPoints.forEach(point => {
                if (point.wall) {
                    const key = point.wall.x1 + "," + point.wall.y1 + "-" + point.wall.x2 + "," + point.wall.y2;
                    if (!segments[key]) {
                        segments[key] = { wall: point.wall, points: [] };
                    }
                    segments[key].points.push(point);
                }
            });
            
            Object.values(segments).forEach(seg => {
                if (seg.points.length > 1) {
                    seg.points.sort((a, b) => {
                        const ta = (a.x - seg.wall.x1) / (seg.wall.x2 - seg.wall.x1 || 1);
                        const tb = (b.x - seg.wall.x1) / (seg.wall.x2 - seg.wall.x1 || 1);
                        return ta - tb;
                    });
                    
                    ctx.beginPath();
                    ctx.moveTo(seg.points[0].x, seg.points[0].y);
                    for (let i = 1; i < seg.points.length; i++) {
                        ctx.lineTo(seg.points[i].x, seg.points[i].y);
                    }
                    const avgAlpha = seg.points.reduce((sum, p) => sum + p.alpha, 0) / seg.points.length;
                    ctx.strokeStyle = "rgba(0, 200, 200, " + (avgAlpha * 0.5) + ")";
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });
        }
        
        function drawEchoes() {
            for (let i = echoes.length - 1; i >= 0; i--) {
                const echo = echoes[i];
                echo.alpha -= 0.02;
                echo.size += 0.5;
                
                if (echo.alpha <= 0) {
                    echoes.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                ctx.arc(echo.x, echo.y, echo.size, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(100, 255, 255, " + echo.alpha + ")";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        function drawRevealMode() {
            if (!revealMode) return;
            
            ctx.globalAlpha = 0.2;
            walls.forEach(wall => {
                ctx.beginPath();
                ctx.moveTo(wall.x1, wall.y1);
                ctx.lineTo(wall.x2, wall.y2);
                ctx.strokeStyle = '#004040';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            ctx.globalAlpha = 1;
        }
        
        function updateStats() {
            document.getElementById('pulse-count').textContent = pulseCount;
            
            const uniqueWalls = new Set();
            discoveredPoints.forEach(p => {
                if (p.wall) {
                    uniqueWalls.add(p.wall);
                }
            });
            document.getElementById('surface-count').textContent = uniqueWalls.size + " / " + walls.length;
        }
        
        function animate() {
            time += 0.016;
            
            drawBackground();
            drawRevealMode();
            drawDiscoveredGeometry();
            
            for (let i = pulses.length - 1; i >= 0; i--) {
                if (!pulses[i].update()) {
                    pulses.splice(i, 1);
                } else {
                    pulses[i].draw();
                }
            }
            
            drawEchoes();
            updateStats();
            
            requestAnimationFrame(animate);
        }
        
        canvas.onclick = e => {
            if (e.clientX < 200 && e.clientY < 250) return;
            
            pulses.push(new Pulse(e.clientX, e.clientY));
            pulseCount++;
        };
        
        document.getElementById('speed').oninput = e => {
            pulseSpeed = e.target.value / 100;
            document.getElementById('speed-val').textContent = e.target.value;
        };
        
        document.getElementById('decay').oninput = e => {
            echoDecay = e.target.value / 100;
            document.getElementById('decay-val').textContent = e.target.value;
        };
        
        document.getElementById('regenerate-btn').onclick = () => {
            generateEnvironment();
            pulses.length = 0;
            echoes.length = 0;
            pulseCount = 0;
        };
        
        document.getElementById('reveal-btn').onclick = () => {
            revealMode = !revealMode;
            document.getElementById('reveal-btn').textContent = revealMode ? 
                'Hide Geometry' : 'Reveal All (cheat)';
        };
        
        animate();
    </script>
</body>
</html>
