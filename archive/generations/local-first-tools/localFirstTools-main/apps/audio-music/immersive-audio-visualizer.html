    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

        // Canvas Setup

        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========================================
        // Audio Context Setup
        // ========================================
        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let source;
        let audioElement;
        let isActive = false;
        let currentMode = 'spectrum';

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                analyser.smoothingTimeConstant = 0.8;
                analyser.connect(audioContext.destination);
            }
        }

        // ========================================
        // Microphone Input
        // ========================================
        document.getElementById('micBtn').addEventListener('click', async () => {
            try {
                initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                isActive = true;
                animate();
            } catch (error) {
                alert('Microphone access denied: ' + error.message);
            }
        });

        // ========================================
        // File Upload
        // ========================================
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                initAudio();

                if (audioElement) {
                    audioElement.pause();
                    audioElement = null;
                }

                audioElement = new Audio();
                audioElement.src = URL.createObjectURL(file);
                audioElement.play();

                source = audioContext.createMediaElementSource(audioElement);
                source.connect(analyser);

                isActive = true;
                animate();
            }
        });

        // ========================================
        // Stop Audio
        // ========================================
        document.getElementById('stopBtn').addEventListener('click', () => {
            isActive = false;
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            if (source) {
                source.disconnect();
                source = null;
            }
        });

        // ========================================
        // Visualization Modes
        // ========================================
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // ========================================
        // Color Schemes
        // ========================================
        function getColor(index, total, scheme, hueShift = 0) {
            const schemes = {
                rainbow: (i, t) => `hsl(${(i / t * 360 + hueShift) % 360}, 100%, 50%)`,
                ocean: (i, t) => `hsl(${180 + (i / t * 60) + hueShift}, 80%, 50%)`,
                fire: (i, t) => `hsl(${(i / t * 60) + hueShift}, 100%, 50%)`,
                neon: (i, t) => `hsl(${(i / t * 360 + hueShift) % 360}, 100%, 70%)`,
                purple: (i, t) => `hsl(${270 + (i / t * 60) + hueShift}, 80%, 60%)`,
                mono: (i, t) => `hsl(${hueShift}, 0%, ${30 + (i / t * 70)}%)`
            };

            const schemeValue = document.getElementById('colorScheme').value;
            return schemes[schemeValue](index, total);
        }

        // ========================================
        // Particle System
        // ========================================
        class Particle {
            constructor(x, y, angle, speed) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.size = Math.random() * 3 + 1;
                this.hue = Math.random() * 360;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.01;
                this.vy += 0.1; // gravity
            }

            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let particles = [];

        // ========================================
        // Visualization Functions
        // ========================================
        function drawSpectrum() {
            analyser.getByteFrequencyData(dataArray);

            const barWidth = canvas.width / bufferLength * 2.5;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value);
            const colorShift = parseInt(document.getElementById('colorShift').value);

            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height * sensitivity;

                ctx.fillStyle = getColor(i, bufferLength, null, colorShift);
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                x += barWidth + 1;
            }
        }

        function drawCircular() {
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.3;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value);
            const colorShift = parseInt(document.getElementById('colorShift').value);

            const sliceAngle = (Math.PI * 2) / bufferLength;

            for (let i = 0; i < bufferLength; i++) {
                const value = dataArray[i] / 255 * sensitivity;
                const angle = i * sliceAngle;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;

                const x2 = centerX + Math.cos(angle) * (radius + value * 200);
                const y2 = centerY + Math.sin(angle) * (radius + value * 200);

                ctx.strokeStyle = getColor(i, bufferLength, null, colorShift);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Draw center circle
            ctx.fillStyle = 'rgba(0, 255, 163, 0.3)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawParticles() {
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value);

            // Create new particles from audio
            for (let i = 0; i < bufferLength; i += 10) {
                if (dataArray[i] > 100) {
                    const angle = (i / bufferLength) * Math.PI * 2;
                    const speed = (dataArray[i] / 255) * 5 * sensitivity;
                    particles.push(new Particle(centerX, centerY, angle, speed));
                }
            }

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Limit particle count
            if (particles.length > 1000) {
                particles = particles.slice(-1000);
            }
        }

        function drawWaveform() {
            analyser.getByteTimeDomainData(dataArray);

            const sensitivity = parseFloat(document.getElementById('sensitivity').value);
            const colorShift = parseInt(document.getElementById('colorShift').value);

            ctx.lineWidth = 3;
            ctx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height / 2) * sensitivity;

                ctx.strokeStyle = getColor(i, bufferLength, null, colorShift);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.stroke();
        }

        function drawBars3D() {
            analyser.getByteFrequencyData(dataArray);

            const barWidth = canvas.width / bufferLength * 3;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value);
            const colorShift = parseInt(document.getElementById('colorShift').value);

            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height * sensitivity;
                const y = canvas.height - barHeight;

                // 3D effect with shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(x + 10, y + 10, barWidth, barHeight);

                ctx.fillStyle = getColor(i, bufferLength, null, colorShift);
                ctx.fillRect(x, y, barWidth, barHeight);

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(x, y, barWidth, 10);

                x += barWidth + 2;
            }
        }

        function drawGalaxy() {
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value);
            const colorShift = parseInt(document.getElementById('colorShift').value);

            for (let i = 0; i < bufferLength; i += 2) {
                const value = dataArray[i] / 255;
                const angle = (i / bufferLength) * Math.PI * 6 + Date.now() * 0.001;
                const radius = (i / bufferLength) * Math.min(canvas.width, canvas.height) * 0.4;

                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                const size = value * 10 * sensitivity;

                ctx.fillStyle = getColor(i, bufferLength, null, colorShift);
                ctx.shadowBlur = 20;
                ctx.shadowColor = getColor(i, bufferLength, null, colorShift);
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ========================================
        // Animation Loop
        // ========================================
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function animate(currentTime = performance.now()) {
            if (!isActive) return;

            requestAnimationFrame(animate);

            // FPS counter
            frameCount++;
            if (currentTime - lastFpsTime > 1000) {
                document.getElementById('fpsStat').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = currentTime;
            }

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw visualization
            switch(currentMode) {
                case 'spectrum':
                    drawSpectrum();
                    break;
                case 'circular':
                    drawCircular();
                    break;
                case 'particles':
                    drawParticles();
                    break;
                case 'waveform':
                    drawWaveform();
                    break;
                case 'bars3d':
                    drawBars3D();
                    break;
                case 'galaxy':
                    drawGalaxy();
                    break;
            }

            // Update stats
            updateStats();
        }

        // ========================================
        // Stats Update
        // ========================================
        function updateStats() {
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            // Calculate average volume
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            const average = sum / bufferLength;
            const db = 20 * Math.log10(average / 255);
            document.getElementById('volumeStat').textContent = db.toFixed(0) + ' dB';

            // Find dominant frequency
            let maxValue = 0;
            let maxIndex = 0;
            for (let i = 0; i < bufferLength; i++) {
                if (dataArray[i] > maxValue) {
                    maxValue = dataArray[i];
                    maxIndex = i;
                }
            }
            const frequency = (maxIndex * audioContext.sampleRate) / (analyser.fftSize * 2);
            document.getElementById('freqStat').textContent = frequency.toFixed(0) + ' Hz';
        }

        // ========================================
        // Control Updates
        // ========================================
        document.getElementById('sensitivity').addEventListener('input', (e) => {
            document.getElementById('sensitivityValue').textContent = e.target.value;
        });

        document.getElementById('smoothing').addEventListener('input', (e) => {
            document.getElementById('smoothingValue').textContent = e.target.value;
            if (analyser) {
                analyser.smoothingTimeConstant = parseFloat(e.target.value);
            }
        });

        document.getElementById('colorShift').addEventListener('input', (e) => {
            document.getElementById('colorShiftValue').textContent = e.target.value;
        });

        // ========================================
        // Toggle Controls
        // ========================================
        document.getElementById('toggle-controls').addEventListener('click', () => {
            const overlay = document.getElementById('controls-overlay');
            overlay.style.display = overlay.style.display === 'none' ? 'block' : 'none';
        });

        // ========================================
        // Fullscreen
        // ========================================
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ========================================
        // Keyboard Shortcuts
        // ========================================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isActive) {
                    document.getElementById('stopBtn').click();
                } else {
                    document.getElementById('micBtn').click();
                }
            } else if (e.code === 'KeyF') {
                document.getElementById('fullscreenBtn').click();
            } else if (e.code === 'KeyC') {
                document.getElementById('toggle-controls').click();
            }
        });

        // Auto-save settings
        setInterval(() => {
            const settings = {
                sensitivity: document.getElementById('sensitivity').value,
                smoothing: document.getElementById('smoothing').value,
                colorShift: document.getElementById('colorShift').value,
                colorScheme: document.getElementById('colorScheme').value,
                mode: currentMode
            };
            localStorage.setItem('visualizerSettings', JSON.stringify(settings));
        }, 5000);

        // Load saved settings
        const savedSettings = localStorage.getItem('visualizerSettings');
        if (savedSettings) {
            try {
                const settings = JSON.parse(savedSettings);
                if (settings.sensitivity) document.getElementById('sensitivity').value = settings.sensitivity;
                if (settings.smoothing) document.getElementById('smoothing').value = settings.smoothing;
                if (settings.colorShift) document.getElementById('colorShift').value = settings.colorShift;
                if (settings.colorScheme) document.getElementById('colorScheme').value = settings.colorScheme;
                if (settings.mode) {
                    currentMode = settings.mode;
                    document.querySelectorAll('.mode-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.mode === settings.mode);
                    });
                }

                ['sensitivity', 'smoothing', 'colorShift'].forEach(id => {
                    document.getElementById(id).dispatchEvent(new Event('input'));
                });
            } catch (e) {
                console.error('Failed to load settings');
            }
        }
    </script>
</body>
</html>
