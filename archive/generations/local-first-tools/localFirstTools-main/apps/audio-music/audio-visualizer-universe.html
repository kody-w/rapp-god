        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 0.9em;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

            width: 100%;
            height: 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .button-grid button {
            margin: 0;
            font-size: 0.8em;
            padding: 8px;
        }

            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 20px;
            text-align: center;

    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Audio context
        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let source;
        let oscillator;
        let gainNode;

        // Visualization state
        let currentMode = 0;
        let sensitivity = 1.0;
        let colorTheme = 'neon';
        let customColor1 = '#667eea';
        let customColor2 = '#764ba2';

        // Color themes
        const themes = {
            neon: ['#ff00ff', '#00ffff', '#ffff00', '#ff0080'],
            ocean: ['#0077be', '#00d4ff', '#40e0d0', '#7fffd4'],
            fire: ['#ff4500', '#ff6347', '#ff8c00', '#ffd700'],
            synthwave: ['#ff00ff', '#00ffff', '#ff1493', '#7b68ee'],
            custom: [customColor1, customColor2]
        };

        // Particles for nebula mode
        let particles = [];
        const particleCount = 2000;

        // Stars for starfield mode
        let stars = [];
        const starCount = 1000;

        // FPS tracking
        let lastFrameTime = performance.now();
        let fps = 60;
        let frameCount = 0;
        let lastFpsUpdate = performance.now();

        // Mode names
        const modeNames = [
            'Circular Spectrum',
            'Waveform Landscape',
            'Particle Nebula',
            'Geometric Kaleidoscope',
            'Starfield Warp',
            'DNA Helix'
        ];

        // Initialize
        function init() {
            initParticles();
            initStars();
            setupEventListeners();
            animate();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 2 + 0.5,
                    hue: Math.random() * 360
                });
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * width * 2,
                    y: (Math.random() - 0.5) * height * 2,
                    z: Math.random() * width,
                    size: Math.random() * 2
                });
            }
        }

        function setupAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            gainNode = audioContext.createGain();
            gainNode.connect(audioContext.destination);
        }

        async function startMicrophone() {
            if (!audioContext) setupAudio();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stopCurrentSource();
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.connect(gainNode);
            } catch (err) {
                alert('Microphone access denied: ' + err.message);
            }
        }

        function startToneGenerator() {
            if (!audioContext) setupAudio();

            stopCurrentSource();
            oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
            oscillator.connect(analyser);
            analyser.connect(gainNode);
            oscillator.start();

            document.getElementById('toneControls').style.display = 'block';
        }

        function startAudioFile(file) {
            if (!audioContext) setupAudio();

            const reader = new FileReader();
            reader.onload = function(e) {
                audioContext.decodeAudioData(e.target.result, function(buffer) {
                    stopCurrentSource();
                    source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(analyser);
                    analyser.connect(gainNode);
                    source.start();
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function stopCurrentSource() {
            if (source) {
                try {
                    if (source.mediaStream) {
                        source.mediaStream.getTracks().forEach(track => track.stop());
                    }
                    source.disconnect();
                } catch (e) {}
                source = null;
            }
            if (oscillator) {
                try {
                    oscillator.stop();
                    oscillator.disconnect();
                } catch (e) {}
                oscillator = null;
            }
            document.getElementById('toneControls').style.display = 'none';
        }

        function getColors() {
            if (colorTheme === 'custom') {
                return [customColor1, customColor2];
            }
            return themes[colorTheme];
        }

        function getAverageVolume() {
            if (!dataArray) return 0;
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            return (sum / bufferLength / 255) * sensitivity;
        }

        function getBassLevel() {
            if (!dataArray) return 0;
            let sum = 0;
            const bassRange = Math.floor(bufferLength * 0.1);
            for (let i = 0; i < bassRange; i++) {
                sum += dataArray[i];
            }
            return (sum / bassRange / 255) * sensitivity;
        }

        function getMidLevel() {
            if (!dataArray) return 0;
            let sum = 0;
            const start = Math.floor(bufferLength * 0.1);
            const end = Math.floor(bufferLength * 0.5);
            for (let i = start; i < end; i++) {
                sum += dataArray[i];
            }
            return (sum / (end - start) / 255) * sensitivity;
        }

        function getTrebleLevel() {
            if (!dataArray) return 0;
            let sum = 0;
            const start = Math.floor(bufferLength * 0.5);
            for (let i = start; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            return (sum / (bufferLength - start) / 255) * sensitivity;
        }

        // Visualization modes
        function drawCircularSpectrum() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 3;
            const barCount = 128;
            const colors = getColors();

            for (let i = 0; i < barCount; i++) {
                const angle = (i / barCount) * Math.PI * 2;
                const value = dataArray[Math.floor(i * bufferLength / barCount)];
                const barHeight = (value / 255) * radius * sensitivity;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                const colorIndex = Math.floor(i / barCount * colors.length);
                const color = colors[colorIndex % colors.length];

                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
            }
            ctx.shadowBlur = 0;
        }

        function drawWaveformLandscape() {
            if (!analyser) return;
            analyser.getByteTimeDomainData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const colors = getColors();
            const layers = 20;
            const baseY = height * 0.8;

            for (let layer = 0; layer < layers; layer++) {
                const alpha = 1 - (layer / layers) * 0.7;
                const scale = 1 - (layer / layers) * 0.5;
                const offset = (layer / layers) * height * 0.3;

                ctx.strokeStyle = colors[layer % colors.length];
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 2;
                ctx.beginPath();

                const sliceWidth = width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = baseY - offset + (v - 1) * height * 0.2 * sensitivity * scale;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    x += sliceWidth;
                }

                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }

        function drawParticleNebula() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const bass = getBassLevel();
            const mid = getMidLevel();
            const treble = getTrebleLevel();
            const colors = getColors();

            particles.forEach((particle, i) => {
                // Update position
                const freqIndex = Math.floor(i / particles.length * bufferLength);
                const freq = dataArray[freqIndex] / 255;

                particle.vx += (Math.random() - 0.5) * bass * 2;
                particle.vy += (Math.random() - 0.5) * mid * 2;
                particle.x += particle.vx;
                particle.y += particle.vy;

                // Friction
                particle.vx *= 0.98;
                particle.vy *= 0.98;

                // Wrap around
                if (particle.x < 0) particle.x = width;
                if (particle.x > width) particle.x = 0;
                if (particle.y < 0) particle.y = height;
                if (particle.y > height) particle.y = 0;

                // Draw
                const size = particle.size * (1 + freq * treble * 3);
                const colorIndex = Math.floor(freq * colors.length);
                ctx.fillStyle = colors[colorIndex % colors.length];
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function drawKaleidoscope() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const segments = 12;
            const colors = getColors();
            const time = Date.now() * 0.001;

            ctx.save();
            ctx.translate(centerX, centerY);

            for (let seg = 0; seg < segments; seg++) {
                ctx.save();
                ctx.rotate((seg / segments) * Math.PI * 2);

                for (let i = 0; i < 50; i++) {
                    const freqIndex = Math.floor(i * bufferLength / 50);
                    const value = dataArray[freqIndex] / 255;
                    const radius = i * 10 + value * 100 * sensitivity;
                    const size = 5 + value * 20;
                    const angle = time + i * 0.1;

                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    ctx.fillStyle = colors[i % colors.length];
                    ctx.globalAlpha = 0.6;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            ctx.restore();
            ctx.globalAlpha = 1;
        }

        function drawStarfield() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            const volume = getAverageVolume();
            const speed = 1 + volume * 20;
            const colors = getColors();

            ctx.save();
            ctx.translate(width / 2, height / 2);

            stars.forEach((star, i) => {
                star.z -= speed;
                if (star.z <= 0) {
                    star.x = (Math.random() - 0.5) * width * 2;
                    star.y = (Math.random() - 0.5) * height * 2;
                    star.z = width;
                }

                const x = (star.x / star.z) * width;
                const y = (star.y / star.z) * height;
                const size = (1 - star.z / width) * star.size * (1 + volume * 2);

                const freqIndex = Math.floor(i / stars.length * bufferLength);
                const freq = dataArray[freqIndex] / 255;
                const colorIndex = Math.floor(freq * colors.length);

                ctx.fillStyle = colors[colorIndex % colors.length];
                ctx.shadowBlur = size * 2;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function drawDNAHelix() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const colors = getColors();
            const time = Date.now() * 0.001;
            const segments = 100;
            const spacing = height / segments;

            for (let i = 0; i < segments; i++) {
                const y = i * spacing;
                const freqIndex = Math.floor(i * bufferLength / segments);
                const value = dataArray[freqIndex] / 255;
                const angle = time + i * 0.2;
                const radius = 100 + value * 200 * sensitivity;

                const x1 = width / 2 + Math.cos(angle) * radius;
                const x2 = width / 2 - Math.cos(angle) * radius;

                const color1 = colors[0];
                const color2 = colors[1 % colors.length];

                // Strand 1
                ctx.fillStyle = color1;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color1;
                ctx.beginPath();
                ctx.arc(x1, y, 5 + value * 10, 0, Math.PI * 2);
                ctx.fill();

                // Strand 2
                ctx.fillStyle = color2;
                ctx.shadowColor = color2;
                ctx.beginPath();
                ctx.arc(x2, y, 5 + value * 10, 0, Math.PI * 2);
                ctx.fill();

                // Connection
                if (i % 5 === 0) {
                    ctx.strokeStyle = colors[2 % colors.length];
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x1, y);
                    ctx.lineTo(x2, y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.shadowBlur = 0;
        }

        function animate() {
            requestAnimationFrame(animate);

            // FPS calculation
            const now = performance.now();
            frameCount++;
            if (now - lastFpsUpdate > 1000) {
                fps = Math.round(frameCount * 1000 / (now - lastFpsUpdate));
                frameCount = 0;
                lastFpsUpdate = now;
                document.getElementById('fps').textContent = fps;
            }

            // Draw current mode
            switch(currentMode) {
                case 0: drawCircularSpectrum(); break;
                case 1: drawWaveformLandscape(); break;
                case 2: drawParticleNebula(); break;
                case 3: drawKaleidoscope(); break;
                case 4: drawStarfield(); break;
                case 5: drawDNAHelix(); break;
            }
        }

        function setupEventListeners() {
            // Resize
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initParticles();
                initStars();
            });

            // Audio source buttons
            document.getElementById('micBtn').addEventListener('click', startMicrophone);
            document.getElementById('toneBtn').addEventListener('click', startToneGenerator);
            document.getElementById('stopBtn').addEventListener('click', stopCurrentSource);

            // Tone frequency
            document.getElementById('freqSlider').addEventListener('input', (e) => {
                const freq = parseFloat(e.target.value);
                document.getElementById('freqValue').textContent = freq + ' Hz';
                if (oscillator) {
                    oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
                }
            });

            // File drop
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('audio/')) {
                    startAudioFile(file);
                }
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    startAudioFile(file);
                }
            });

            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = parseInt(btn.dataset.mode);
                    document.getElementById('modeName').textContent = modeNames[currentMode];
                });
            });

            // Theme select
            document.getElementById('themeSelect').addEventListener('change', (e) => {
                colorTheme = e.target.value;
                document.getElementById('customColors').style.display =
                    colorTheme === 'custom' ? 'block' : 'none';
            });

            // Custom colors
            document.getElementById('color1').addEventListener('input', (e) => {
                customColor1 = e.target.value;
                themes.custom[0] = customColor1;
            });

            document.getElementById('color2').addEventListener('input', (e) => {
                customColor2 = e.target.value;
                themes.custom[1] = customColor2;
            });

            // Sensitivity
            document.getElementById('sensitivity').addEventListener('input', (e) => {
                sensitivity = parseFloat(e.target.value);
                document.getElementById('sensValue').textContent = sensitivity.toFixed(1) + 'x';
            });

            // Fullscreen
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });

            // Toggle controls
            const controlsPanel = document.getElementById('controls');
            const toggleBtn = document.getElementById('toggleControls');
            let controlsVisible = true;

            function toggleControls() {
                controlsVisible = !controlsVisible;
                controlsPanel.classList.toggle('hidden');
                toggleBtn.textContent = controlsVisible ? 'Hide Controls (H)' : 'Show Controls (H)';
            }

            toggleBtn.addEventListener('click', toggleControls);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'h' || e.key === 'H') {
                    toggleControls();
                }
                if (e.key === 'f' || e.key === 'F') {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
                // Number keys for mode switching
                const num = parseInt(e.key);
                if (num >= 1 && num <= 6) {
                    currentMode = num - 1;
                    document.querySelectorAll('.mode-btn').forEach((btn, i) => {
                        btn.classList.toggle('active', i === currentMode);
                    });
                    document.getElementById('modeName').textContent = modeNames[currentMode];
                }
            });
        }

        // Start
        init();
    </script>
</body>
</html>
