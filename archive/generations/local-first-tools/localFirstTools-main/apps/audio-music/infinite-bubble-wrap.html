    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

    <script>
        const canvas = document.getElementById('bubbleCanvas');
        const ctx = canvas.getContext('2d');

        // Settings
        let soundEnabled = true;
        let hapticEnabled = true;

        // Stats
        let totalPops = 0;
        let recentPops = [];
        let combo = 0;
        let lastPopTime = 0;

        // Audio context
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Generate pop sound with synthesis
        function playPop(x, y, size) {
            if (!soundEnabled || !audioCtx) return;

            // Base frequency based on size (smaller = higher pitch)
            const baseFreq = 800 - (size * 20) + Math.random() * 100;

            // Create noise burst
            const duration = 0.08 + Math.random() * 0.04;
            const now = audioCtx.currentTime;

            // Pop sound: filtered noise burst
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);

            for (let i = 0; i < noiseBuffer.length; i++) {
                // Exponential decay
                const envelope = Math.exp(-i / (noiseBuffer.length * 0.15));
                output[i] = (Math.random() * 2 - 1) * envelope;
            }

            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            // Filter for "pop" character
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = baseFreq;
            filter.Q.value = 5;

            // Gain
            const gain = audioCtx.createGain();
            gain.gain.value = 0.3 + Math.random() * 0.2;

            // Add subtle reverb feel with delay
            const delay = audioCtx.createDelay();
            delay.delayTime.value = 0.02;
            const delayGain = audioCtx.createGain();
            delayGain.gain.value = 0.1;

            noiseSource.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            // Tiny delay for room feel
            gain.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(audioCtx.destination);

            noiseSource.start(now);
            noiseSource.stop(now + duration);

            // Secondary "air release" sound
            const airDuration = 0.05;
            const airOsc = audioCtx.createOscillator();
            airOsc.type = 'sine';
            airOsc.frequency.value = baseFreq * 2;
            airOsc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, now + airDuration);

            const airGain = audioCtx.createGain();
            airGain.gain.value = 0.05;
            airGain.gain.exponentialRampToValueAtTime(0.001, now + airDuration);

            airOsc.connect(airGain);
            airGain.connect(audioCtx.destination);
            airOsc.start(now);
            airOsc.stop(now + airDuration);
        }

        // Haptic feedback
        function vibrate(pattern) {
            if (!hapticEnabled) return;
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // Bubble class
        class Bubble {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.popped = false;
                this.popProgress = 0;
                this.hue = 200 + Math.random() * 30; // Blue-ish
                this.pressProgress = 0;
            }

            draw() {
                if (this.popped) {
                    // Draw pop animation
                    if (this.popProgress < 1) {
                        const scale = 1 + this.popProgress * 0.3;
                        const alpha = 1 - this.popProgress;

                        ctx.save();
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius * scale, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${this.hue}, 50%, 70%, 0.5)`;
                        ctx.fill();
                        ctx.restore();

                        this.popProgress += 0.15;
                    }
                    return;
                }

                const r = this.radius * (1 - this.pressProgress * 0.1);

                // Bubble shadow
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 2, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fill();

                // Bubble body
                const gradient = ctx.createRadialGradient(
                    this.x - r * 0.3, this.y - r * 0.3, 0,
                    this.x, this.y, r
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 60%, 85%, 0.9)`);
                gradient.addColorStop(0.7, `hsla(${this.hue}, 50%, 75%, 0.8)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 40%, 65%, 0.7)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(this.x - r * 0.3, this.y - r * 0.3, r * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                // Second smaller highlight
                ctx.beginPath();
                ctx.arc(this.x - r * 0.15, this.y - r * 0.45, r * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                // Pressed effect
                if (this.pressProgress > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.pressProgress * 0.3})`;
                    ctx.fill();
                }
            }

            contains(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius;
            }

            pop() {
                if (this.popped) return false;
                this.popped = true;
                return true;
            }
        }

        // Grid of bubbles
        let bubbles = [];
        let bubbleSize = 25;
        let cols, rows;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateBubbles();
        }

        function generateBubbles() {
            bubbles = [];
            const padding = 5;
            const totalSize = bubbleSize * 2 + padding;

            cols = Math.ceil(canvas.width / totalSize) + 1;
            rows = Math.ceil(canvas.height / totalSize) + 1;

            const offsetX = (canvas.width - (cols - 1) * totalSize) / 2;
            const offsetY = 50 + (canvas.height - 50 - (rows - 1) * totalSize) / 2;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = offsetX + col * totalSize + (row % 2 ? totalSize / 2 : 0);
                    const y = offsetY + row * totalSize * 0.866;
                    const size = bubbleSize * (0.9 + Math.random() * 0.2);
                    bubbles.push(new Bubble(x, y, size));
                }
            }
        }

        // Input handling
        let activePointers = new Map();

        function handlePointerDown(e) {
            e.preventDefault();
            initAudio();

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            activePointers.set(e.pointerId, { x, y });

            // Check for bubble press
            for (const bubble of bubbles) {
                if (!bubble.popped && bubble.contains(x, y)) {
                    bubble.pressProgress = 0.5;
                }
            }
        }

        function handlePointerMove(e) {
            if (!activePointers.has(e.pointerId)) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            activePointers.set(e.pointerId, { x, y });

            // Update press progress for bubbles under pointer
            for (const bubble of bubbles) {
                if (!bubble.popped && bubble.contains(x, y)) {
                    bubble.pressProgress = Math.min(1, bubble.pressProgress + 0.1);
                }
            }
        }

        function handlePointerUp(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Pop bubbles
            for (const bubble of bubbles) {
                if (!bubble.popped && bubble.contains(x, y)) {
                    if (bubble.pop()) {
                        totalPops++;
                        recentPops.push(Date.now());
                        updateCombo();

                        playPop(bubble.x, bubble.y, bubble.radius);
                        vibrate([10]);

                        // Jiggle neighbors
                        jiggleNeighbors(bubble);
                    }
                }
            }

            activePointers.delete(e.pointerId);

            // Reset press progress for all bubbles
            for (const bubble of bubbles) {
                bubble.pressProgress = 0;
            }

            updateStats();
            checkAchievements();
        }

        function jiggleNeighbors(poppedBubble) {
            for (const bubble of bubbles) {
                if (bubble.popped) continue;

                const dx = bubble.x - poppedBubble.x;
                const dy = bubble.y - poppedBubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < bubbleSize * 4) {
                    // Apply jiggle
                    const strength = 1 - dist / (bubbleSize * 4);
                    bubble.pressProgress = strength * 0.3;
                }
            }
        }

        function updateCombo() {
            const now = Date.now();
            if (now - lastPopTime < 300) {
                combo++;
            } else {
                combo = 1;
            }
            lastPopTime = now;

            const comboDisplay = document.getElementById('comboDisplay');
            if (combo >= 3) {
                comboDisplay.textContent = `${combo}x COMBO!`;
                comboDisplay.classList.add('visible');

                clearTimeout(comboDisplay.hideTimeout);
                comboDisplay.hideTimeout = setTimeout(() => {
                    comboDisplay.classList.remove('visible');
                }, 1000);
            }
        }

        // Stats
        function updateStats() {
            document.getElementById('popCount').textContent = totalPops;

            // Calculate pops per second
            const now = Date.now();
            recentPops = recentPops.filter(t => now - t < 1000);
            document.getElementById('popSpeed').textContent = recentPops.length;
        }

        // Achievements
        const achievements = [
            { count: 10, message: "First 10! Keep going!" },
            { count: 50, message: "50 pops! Stress relief engaged!" },
            { count: 100, message: "100 pops! Bubble master!" },
            { count: 250, message: "250! You're addicted!" },
            { count: 500, message: "500 POPS! LEGENDARY!" },
            { count: 1000, message: "1000!!! BUBBLE GOD!!!" }
        ];
        let achievementIndex = 0;

        function checkAchievements() {
            if (achievementIndex >= achievements.length) return;

            if (totalPops >= achievements[achievementIndex].count) {
                showAchievement(achievements[achievementIndex].message);
                achievementIndex++;
            }
        }

        function showAchievement(message) {
            const el = document.getElementById('achievement');
            el.textContent = message;
            el.classList.add('show');

            setTimeout(() => {
                el.classList.remove('show');
            }, 3000);
        }

        // Controls
        document.getElementById('soundToggle').addEventListener('click', (e) => {
            soundEnabled = !soundEnabled;
            e.target.textContent = soundEnabled ? 'Sound ON' : 'Sound OFF';
            e.target.classList.toggle('active', soundEnabled);
            if (soundEnabled) initAudio();
        });

        document.getElementById('hapticToggle').addEventListener('click', (e) => {
            hapticEnabled = !hapticEnabled;
            e.target.textContent = hapticEnabled ? 'Haptics ON' : 'Haptics OFF';
            e.target.classList.toggle('active', hapticEnabled);
        });

        document.getElementById('freshSheet').addEventListener('click', () => {
            generateBubbles();
            if (soundEnabled) {
                // Paper crinkle sound
                initAudio();
                const duration = 0.3;
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < buffer.length; i++) {
                    const t = i / buffer.length;
                    const envelope = Math.sin(t * Math.PI);
                    data[i] = (Math.random() * 2 - 1) * envelope * 0.2;
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 2000;

                source.connect(filter);
                filter.connect(audioCtx.destination);
                source.start();
            }
        });

        // Event listeners
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);
        canvas.addEventListener('pointerleave', handlePointerUp);

        window.addEventListener('resize', resize);

        // Animation loop
        function animate() {
            // Clear with gradient
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bubbles
            for (const bubble of bubbles) {
                bubble.draw();

                // Decay press progress
                if (bubble.pressProgress > 0 && !activePointers.size) {
                    bubble.pressProgress *= 0.9;
                    if (bubble.pressProgress < 0.01) bubble.pressProgress = 0;
                }
            }

            requestAnimationFrame(animate);
        }

        // Initialize
        resize();
        animate();

        // Load saved stats
        const savedPops = localStorage.getItem('bubbleWrapPops');
        if (savedPops) {
            totalPops = parseInt(savedPops);
            document.getElementById('popCount').textContent = totalPops;

            // Set achievement index
            for (let i = 0; i < achievements.length; i++) {
                if (totalPops >= achievements[i].count) {
                    achievementIndex = i + 1;
                }
            }
        }

        // Save on unload
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('bubbleWrapPops', totalPops);
        });

        // Periodic save
        setInterval(() => {
            localStorage.setItem('bubbleWrapPops', totalPops);
        }, 5000);
    </script>
</body>
</html>
