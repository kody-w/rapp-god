    <script>
    (function leviGOLDEnhancement(){
      if (window.LEVIGOLD && window.LEVIGOLD.installed) return;
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const cores = navigator.hardwareConcurrency || 4;
      const mem = navigator.deviceMemory || 4;
      const tier = (isMobile || cores < 4 || mem < 4) ? 'mobile' :
                   (cores >= 8 && mem >= 8) ? 'high' : 'medium';
      const PIXEL_CAP = tier === 'mobile' ? 1.25 : tier === 'medium' ? 1.5 : 1.75;
      window.LEVIGOLD = {
        installed: true, tier, isMobile, cores, mem, pixelCap: PIXEL_CAP,
        renderers: new Set(), fpsHistory: [], lastTune: 0,
        targetFPS: 55, lowFPS: 40, highFPS: 58
      };

      // ── Cinematic detection: opt-in via experience meta tag ──────────
      function detectCinematic() {
        const expMeta = document.querySelector('meta[name="rappterzoo:experience"]');
        if (!expMeta) return false;
        const exp = (expMeta.getAttribute('content') || '').toLowerCase();
        // Cinematic experiences benefit from vignette+grain.
        // Utility apps (mastery, flow on tools) don't.
        // Heuristic: only enable if the experience is mood-driven AND
        // the app type is 'visual' (not 'interactive'/'game'/'interface').
        const typeMeta = document.querySelector('meta[name="rappterzoo:type"]');
        const type = (typeMeta && typeMeta.getAttribute('content') || '').toLowerCase();
        const cinematicTypes = ['visual'];
        const cinematicExperiences = ['melancholy','wonder','hypnosis','dread','flow','tension','discovery','mastery'];
        return cinematicTypes.includes(type) && cinematicExperiences.includes(exp);
      }
      const isCinematic = detectCinematic();
      window.LEVIGOLD.cinematic = isCinematic;
      const onApply = () => {
        if (isCinematic) document.body.classList.add('levigold-cinematic');
      };
      if (document.body) onApply();
      else document.addEventListener('DOMContentLoaded', onApply, {once:true});

      // ── THREE renderer monkey-patch ───────────────────────────────────
      function patchTHREE(){
        if (typeof THREE === 'undefined' || !THREE.WebGLRenderer || THREE.__leviGOLD) return false;
        THREE.__leviGOLD = true;
        const _Renderer = THREE.WebGLRenderer;
        THREE.WebGLRenderer = function PatchedRenderer(params){
          params = params || {};
          if (!('powerPreference' in params)) params.powerPreference = 'high-performance';
          if (!('antialias' in params)) params.antialias = (tier !== 'mobile');
          const r = new _Renderer(params);
          if (THREE.ACESFilmicToneMapping !== undefined) r.toneMapping = THREE.ACESFilmicToneMapping;
          r.toneMappingExposure = 1.0;
          if ('outputEncoding' in r && THREE.sRGBEncoding !== undefined) r.outputEncoding = THREE.sRGBEncoding;
          else if ('outputColorSpace' in r && THREE.SRGBColorSpace !== undefined) r.outputColorSpace = THREE.SRGBColorSpace;
          r.setPixelRatio(Math.min(window.devicePixelRatio || 1, PIXEL_CAP));
          window.LEVIGOLD.renderers.add(r);
          return r;
        };
        THREE.WebGLRenderer.prototype = _Renderer.prototype;
        Object.setPrototypeOf(THREE.WebGLRenderer, _Renderer);
        return true;
      }
      if (!patchTHREE()) {
        let tries = 0;
        const iv = setInterval(() => { if (patchTHREE() || ++tries > 50) clearInterval(iv); }, 100);
      }

      document.addEventListener('visibilitychange', () => {
        window.LEVIGOLD.paused = document.hidden;
        if (!document.hidden) window.LEVIGOLD.fpsHistory.length = 0;
      });

      // ── FPS auto-tuner (HUD hidden until F8) ──────────────────────────
      let frames = 0, t0 = performance.now(), fps = 60;
      let hud = null;
      function ensureHud(){
        if (hud) return;
        hud = document.createElement('div');
        hud.id = 'levigold-fps-hud';
        hud.title = 'leviGOLD perf — F8 to toggle, click to dismiss';
        hud.textContent = '✦ GOLD';
        hud.onclick = () => { hud.classList.remove('visible'); };
        document.body.appendChild(hud);
      }
      function tick(){
        frames++;
        const now = performance.now();
        if (now - t0 >= 500){
          fps = Math.round(frames * 1000 / (now - t0));
          frames = 0; t0 = now;
          window.LEVIGOLD.fpsHistory.push(fps);
          if (window.LEVIGOLD.fpsHistory.length > 20) window.LEVIGOLD.fpsHistory.shift();
          if (hud && hud.classList.contains('visible')) hud.textContent = '✦ GOLD ' + fps + 'fps · ' + tier + ' · ' + window.LEVIGOLD.pixelCap.toFixed(2);
          if (now - window.LEVIGOLD.lastTune > 5000 && window.LEVIGOLD.fpsHistory.length >= 6){
            const avg = window.LEVIGOLD.fpsHistory.slice(-6).reduce((a,b)=>a+b,0) / 6;
            if (avg < window.LEVIGOLD.lowFPS && window.LEVIGOLD.pixelCap > 0.6){
              window.LEVIGOLD.pixelCap = Math.max(0.6, window.LEVIGOLD.pixelCap - 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            } else if (avg > window.LEVIGOLD.highFPS && window.LEVIGOLD.pixelCap < PIXEL_CAP){
              window.LEVIGOLD.pixelCap = Math.min(PIXEL_CAP, window.LEVIGOLD.pixelCap + 0.25);
              window.LEVIGOLD.renderers.forEach(r => { try { r.setPixelRatio(Math.min(window.devicePixelRatio||1, window.LEVIGOLD.pixelCap)); } catch(e){} });
              window.LEVIGOLD.lastTune = now;
            }
          }
        }
        requestAnimationFrame(tick);
      }
      const onReady = () => { ensureHud(); requestAnimationFrame(tick); };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onReady, {once:true});
      else onReady();

      // F8 toggles HUD visibility
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F8') { e.preventDefault(); if (hud) hud.classList.toggle('visible'); }
      });

      // ── Save throttling ────────────────────────────────────────────────
      const _set = Storage.prototype.setItem;
      const pendingSaves = new Map();
      Storage.prototype.setItem = function(key, val){
        if (typeof val === 'string' && val.length > 50000 && /save|world|galaxy|state/i.test(key)){
          if (pendingSaves.has(key)) clearTimeout(pendingSaves.get(key));
          pendingSaves.set(key, setTimeout(() => {
            try { _set.call(this, key, val); } catch(e){}
            pendingSaves.delete(key);
          }, 800));
          return;
        }
        return _set.call(this, key, val);
      }.bind(localStorage);

      // ── Audio gesture auto-overlay ─────────────────────────────────────
      const _AC = window.AudioContext || window.webkitAudioContext;
      if (_AC) {
        const _orig = _AC;
        function PatchedAC(){
          const ctx = new _orig(...arguments);
          if (ctx.state === 'suspended') {
            const gate = document.createElement('div');
            gate.id = 'levigold-audio-gate';
            gate.classList.add('show');
            gate.innerHTML = '<div class="pulse"></div><h2>CLICK TO BEGIN</h2><p>audio engine — headphones recommended</p>';
            const arm = () => {
              ctx.resume().catch(()=>{});
              gate.classList.remove('show');
              setTimeout(() => gate.remove(), 300);
            };
            gate.addEventListener('click', arm);
            window.addEventListener('click', arm, { once: true });
            const append = () => { if (document.body) document.body.appendChild(gate); };
            if (document.body) append(); else document.addEventListener('DOMContentLoaded', append, { once: true });
          }
          return ctx;
        }
        PatchedAC.prototype = _orig.prototype;
        Object.setPrototypeOf(PatchedAC, _orig);
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      }

      // ── Ensure mobile viewport meta if missing ─────────────────────────
      const onDom = () => {
        if (!document.querySelector('meta[name="viewport"]')){
          const m = document.createElement('meta');
          m.name = 'viewport';
          m.content = 'width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover';
          document.head.appendChild(m);
        }
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', onDom, {once:true});
      else onDom();

      console.log('[leviGOLD ∞ v2] active —', tier, 'cap', PIXEL_CAP, '· cinematic:', isCinematic);
    })();
    </script>

<body>

    <h1>Webcam Theremin</h1>
    
    <div class="container">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
        
        <div id="overlay">
            <div class="axis-label top-label">High Pitch</div>
            <div class="axis-label bottom-label">Low Pitch</div>
            <div class="axis-label left-label">Low Volume</div> <!-- Mirrored: Left on screen is Right in reality due to mirror effect, but let's keep it intuitive for the viewer looking at the screen -->
            <div class="axis-label right-label">High Volume</div>
        </div>
        
        <div id="cursor" class="hud-value"></div>
    </div>

    <div id="controls">
        <button id="startBtn">Start Camera & Audio</button>
        <select id="waveform">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
        </select>
    </div>
    
    <div id="status">Click Start to begin. Ensure you have good lighting.</div>

<script>
/**
 * WEBCAM THEREMIN
 * Uses pixel differencing to track motion and control audio.
 */

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const waveformSel = document.getElementById('waveform');
const cursor = document.getElementById('cursor');

// Audio Context
let audioCtx;
let oscillator;
let gainNode;
let isPlaying = false;

// Motion Detection
let prevFrame = null;
// We process at a lower resolution for performance
const procWidth = 64;
const procHeight = 48;
const procCanvas = document.createElement('canvas');
procCanvas.width = procWidth;
procCanvas.height = procHeight;
const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

// Smoothing
let targetX = 0.5;
let targetY = 0.5;
let currentX = 0.5;
let currentY = 0.5;
const smoothing = 0.15; // 0 to 1, lower is smoother but laggier

// Configuration
const minFreq = 100;
const maxFreq = 1000;
const threshold = 20; // Pixel difference threshold (0-255)

async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 640 }, 
                height: { ideal: 480 },
                facingMode: "user"
            }, 
            audio: false 
        });
        video.srcObject = stream;
        
        // Wait for video to be ready
        video.onloadedmetadata = () => {
            statusEl.innerText = "Camera active. Move your hand!";
            startAudio();
            requestAnimationFrame(loop);
        };
    } catch (err) {
        console.error(err);
        statusEl.innerText = "Error accessing camera: " + err.message;
    }
}

function startAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();

    oscillator.type = waveformSel.value;
    oscillator.frequency.value = 440;
    
    // Start with 0 volume
    gainNode.gain.value = 0;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    isPlaying = true;
    startBtn.innerText = "Stop";
    startBtn.classList.add('active');
}

function stopAudio() {
    if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
        gainNode.disconnect();
        oscillator = null;
        gainNode = null;
    }
    isPlaying = false;
    startBtn.innerText = "Start Camera & Audio";
    startBtn.classList.remove('active');
}

function toggle() {
    if (!isPlaying) {
        init();
    } else {
        stopAudio();
        // Stop video stream
        const stream = video.srcObject;
        if (stream) {
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
            video.srcObject = null;
        }
    }
}

function loop() {
    if (!isPlaying || !video.srcObject) return;

    // Draw current video frame to processing canvas
    procCtx.drawImage(video, 0, 0, procWidth, procHeight);
    
    const frame = procCtx.getImageData(0, 0, procWidth, procHeight);
    const data = frame.data;
    const length = data.length;
    
    let sumX = 0;
    let sumY = 0;
    let count = 0;

    // If we have a previous frame, compare
    if (prevFrame) {
        const prevData = prevFrame.data;
        
        // Loop through pixels (step by 4 for RGBA)
        for (let i = 0; i < length; i += 4) {
            // Simple grayscale difference
            // r=0, g=1, b=2
            const rDiff = Math.abs(data[i] - prevData[i]);
            const gDiff = Math.abs(data[i+1] - prevData[i+1]);
            const bDiff = Math.abs(data[i+2] - prevData[i+2]);
            
            const diff = (rDiff + gDiff + bDiff) / 3;
            
            if (diff > threshold) {
                // Calculate x, y coordinate of this pixel
                const pixelIndex = i / 4;
                const x = pixelIndex % procWidth;
                const y = Math.floor(pixelIndex / procWidth);
                
                sumX += x;
                sumY += y;
                count++;
                
                // Visual debug: highlight motion on main canvas
                // We'll do this later in the draw step
            }
        }
    }
    
    // Save current frame for next loop
    // We need to clone the data, otherwise we just reference the same array
    prevFrame = new ImageData(new Uint8ClampedArray(frame.data), procWidth, procHeight);

    // Update target position if significant motion detected
    if (count > 10) { // Noise filter
        targetX = (sumX / count) / procWidth;
        targetY = (sumY / count) / procHeight;
        
        // Visual feedback on main canvas
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw motion pixels (optional, maybe too heavy? let's just draw the tracker)
        
    } else {
        // Decay to center or stay put? Let's stay put but fade volume
        // targetX = 0.5; 
        // targetY = 0.5;
    }

    // Smooth interpolation
    currentX += (targetX - currentX) * smoothing;
    currentY += (targetY - currentY) * smoothing;

    // Update Audio
    if (oscillator && gainNode) {
        // Y controls Pitch (Up = High Freq, Down = Low Freq)
        // Canvas Y is 0 at top, 1 at bottom.
        // We want 0 (top) -> High Freq, 1 (bottom) -> Low Freq
        // Actually, standard theremin: hand up = high pitch.
        // So Y=0 (top) should be High Freq.
        const pitch = minFreq + (1 - currentY) * (maxFreq - minFreq);
        oscillator.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.05);
        
        // X controls Volume (Left = Low, Right = High)
        // Canvas X is 0 left, 1 right.
        // Note: Video is mirrored via CSS, but logic sees raw video.
        // If I move my hand to the right of the screen (my right), that is the left side of the camera image if not mirrored.
        // But we mirrored the video element with CSS.
        // Let's just map 0..1 to volume.
        // If I move right (screen right), X increases.
        const vol = currentX; 
        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
        
        // Update Visuals
        const drawX = currentX * canvas.width;
        const drawY = currentY * canvas.height;
        
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(drawX, drawY, 20, 0, Math.PI * 2);
        ctx.stroke();
        
        // Crosshairs
        ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
        ctx.beginPath();
        ctx.moveTo(drawX, 0);
        ctx.lineTo(drawX, canvas.height);
        ctx.moveTo(0, drawY);
        ctx.lineTo(canvas.width, drawY);
        ctx.stroke();
        
        // Text feedback
        cursor.style.left = (drawX + 20) + 'px';
        cursor.style.top = (drawY - 20) + 'px';
        cursor.innerText = `${Math.round(pitch)}Hz`;
        cursor.classList.add('visible');
    }

    requestAnimationFrame(loop);
}

startBtn.addEventListener('click', toggle);

waveformSel.addEventListener('change', (e) => {
    if (oscillator) {
        oscillator.type = e.target.value;
    }
});

</script>
