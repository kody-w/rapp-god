<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Pucman Arena — X Post</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px; height: 400px; overflow: hidden;
    background: #000000;
    font-family: "TwitterChirp", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #E7E9EA;
  }
  .tw-card {
    width: 600px; height: 400px;
    background: #000000;
    display: flex; flex-direction: column;
    padding: 16px 20px;
    border: 1px solid #2F3336;
  }
  .tw-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 8px;
  }
  .tw-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1D9BF0, #0A66C2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .tw-name-row {
    flex: 1;
  }
  .tw-name-line {
    display: flex; align-items: center; gap: 6px;
    line-height: 1.3;
  }
  .tw-display-name {
    font-size: 15.5px; font-weight: 700;
    color: #E7E9EA;
  }
  .tw-verified {
    width: 18px; height: 18px;
    background: #1D9BF0;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff;
  }
  .tw-handle {
    font-size: 15px; color: #71767B;
  }
  .tw-dot {
    color: #71767B; font-size: 15px;
  }
  .tw-more {
    color: #71767B; font-size: 20px; margin-left: auto;
    cursor: pointer;
  }
  .tw-body {
    flex: 1;
    font-size: 15.5px;
    line-height: 1.45;
    color: #E7E9EA;
    padding: 4px 0 12px 56px;
    overflow: hidden;
  }
  .tw-time {
    font-size: 15px; color: #71767B;
    padding: 4px 0 12px 56px;
  }
  .tw-time a {
    color: #1D9BF0;
    text-decoration: none;
  }
  .tw-metrics {
    display: flex; gap: 0;
    padding: 12px 0 0 56px;
    border-top: 1px solid #2F3336;
  }
  .tw-metric {
    display: flex; align-items: center; gap: 6px;
    flex: 1;
    font-size: 13.5px; color: #71767B;
    cursor: pointer;
  }
  .tw-metric:hover { color: #1D9BF0; }
  .tw-metric-icon {
    font-size: 18px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .tw-metric:hover .tw-metric-icon { background: rgba(29,155,240,0.1); }
  .tw-metric.like:hover { color: #F91880; }
  .tw-metric.like:hover .tw-metric-icon { background: rgba(249,24,128,0.1); }
  .tw-metric.rt:hover { color: #00BA7C; }
  .tw-metric.rt:hover .tw-metric-icon { background: rgba(0,186,124,0.1); }
</style>
</head>
<body>
<div class="tw-card">
  <div class="tw-header">
    <div class="tw-avatar">🟡</div>
    <div class="tw-name-row">
      <div class="tw-name-line">
        <span class="tw-display-name">Pucman Arena</span>
        <span class="tw-verified">✓</span>
        <span class="tw-handle">@pucman_arena</span>
        <span class="tw-dot">·</span>
        <span class="tw-handle">2h</span>
      </div>
    </div>
    <span class="tw-more">···</span>
  </div>

  <div class="tw-body">🏟️ ROUND 3 RESULT<br><br>🏆 GHOSTS wins Round 3!<br><br>Score: 110 | Dots: 11 | Ticks: 66</div>

  <div class="tw-time">4:25 AM · Apr 12, 2026 · <a href="#">42.1K</a> Views</div>

  <div class="tw-metrics">
    <div class="tw-metric"><span class="tw-metric-icon">💬</span> 38</div>
    <div class="tw-metric rt"><span class="tw-metric-icon">🔄</span> 127</div>
    <div class="tw-metric like"><span class="tw-metric-icon">❤️</span> 842</div>
    <div class="tw-metric"><span class="tw-metric-icon">📊</span> 12.4K</div>
    <div class="tw-metric"><span class="tw-metric-icon">⬆️</span></div>
  </div>
</div>
</body>
</html>
