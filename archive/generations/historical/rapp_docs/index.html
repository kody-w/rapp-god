<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAPP Engineering Docs</title>
<meta property="og:title" content="RAPP Engineering Docs"><meta property="og:description" content="Every RAPP spec in one place, streamed live from each home repo's GitHub raw data.">
<style>
:root{--bg:#06080d;--ink:#e8edf4;--mut:#8b95a5;--card:#10141d;--line:#1c2433;--pa:#4ade80;--pb:#38bdf8;--code:#0b0f18}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Helvetica Neue,Arial,sans-serif;display:flex;min-height:100vh}
a{color:var(--pb)}
#side{width:300px;flex-shrink:0;border-right:1px solid var(--line);height:100vh;position:sticky;top:0;overflow-y:auto;padding:18px 14px 60px;background:#080b11}
#side h1{font-size:19px;margin:6px 8px 2px}#side h1 b{background:linear-gradient(90deg,var(--pa),var(--pb));-webkit-background-clip:text;background-clip:text;color:transparent}
#side .tag{color:var(--mut);font-size:12px;margin:0 8px 14px;line-height:1.4}
#q{width:100%;background:var(--code);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 10px;font-size:13px;margin-bottom:12px}
.grp{color:var(--mut);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:16px 8px 6px}
.it{display:block;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600}
.it:hover{background:#121826}.it.on{background:#16202f;color:var(--pb)}
.it .id{display:block;color:var(--mut);font-size:11px;font-weight:500;margin-top:2px;font-family:ui-monospace,monospace}
#main{flex:1;min-width:0;padding:30px 40px 90px;max-width:900px}
#crumb{color:var(--mut);font-size:13px;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
#crumb .pill{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700}
#crumb .live{color:var(--pa)}
#doc{line-height:1.65;font-size:15px}
#doc h1{font-size:30px;border-bottom:1px solid var(--line);padding-bottom:8px;margin-top:10px}
#doc h2{font-size:22px;margin-top:30px;border-bottom:1px solid #141b27;padding-bottom:5px}#doc h3{font-size:17px;margin-top:22px}
#doc code{background:var(--code);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:13px}
#doc pre{background:var(--code);border:1px solid var(--line);border-radius:10px;padding:14px;overflow:auto}#doc pre code{border:0;padding:0}
#doc table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}#doc th,#doc td{border:1px solid var(--line);padding:7px 10px;text-align:left}#doc th{background:var(--card)}
#doc blockquote{border-left:3px solid var(--pb);margin:14px 0;padding:2px 14px;color:var(--mut)}
#doc img{max-width:100%}
.msg{color:var(--mut);padding:40px 0}
@media(max-width:760px){body{flex-direction:column}#side{width:100%;height:auto;position:static;border-right:0;border-bottom:1px solid var(--line)}#main{padding:20px}}
</style></head>
<body>
<nav id="side">
  <h1>📚 <b>RAPP Docs</b></h1>
  <p class="tag" id="tag"></p>
  <input id="q" placeholder="filter specs…" oninput="filter(this.value)">
  <div id="nav"></div>
</nav>
<main id="main">
  <div id="crumb"></div>
  <div id="doc"><div class="msg">Loading the index…</div></div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
let SPECS = [], INDEX = {};
function esc(s){ return (s==null?"":""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
async function boot(){
  let data; try{ data = await (await fetch("specs.json?_="+Date.now())).json(); }catch(e){ document.getElementById("doc").innerHTML='<div class="msg">Could not load specs.json</div>'; return; }
  document.getElementById("tag").textContent = data.tagline || "";
  const nav = document.getElementById("nav"); nav.innerHTML = "";
  (data.groups||[]).forEach(function(g){
    const h = document.createElement("div"); h.className="grp"; h.textContent=g.name; nav.appendChild(h);
    (g.specs||[]).forEach(function(s){ SPECS.push(s); INDEX[s.id]=s;
      const a = document.createElement("a"); a.className="it"; a.dataset.id=s.id; a.dataset.q=(s.title+" "+s.id+" "+s.repo).toLowerCase();
      a.innerHTML = esc(s.title)+'<span class="id">'+esc(s.id)+'</span>';
      a.onclick = function(){ location.hash = encodeURIComponent(s.id); };
      nav.appendChild(a);
    });
  });
  window.onhashchange = route; route();
}
function filter(v){ v=(v||"").toLowerCase(); document.querySelectorAll(".it").forEach(function(a){ a.style.display = a.dataset.q.indexOf(v)>=0 ? "" : "none"; }); }
function route(){
  const id = decodeURIComponent((location.hash||"").replace(/^#/,"")) || (SPECS[0]&&SPECS[0].id);
  const s = INDEX[id]; if(!s){ return; }
  document.querySelectorAll(".it").forEach(function(a){ a.classList.toggle("on", a.dataset.id===id); });
  render(s);
}
async function render(s){
  const crumb = document.getElementById("crumb"), doc = document.getElementById("doc");
  crumb.innerHTML = '<span class="pill">'+esc(s.id)+'</span><span>from <a href="https://github.com/'+esc(s.repo)+'" target="_blank" rel="noopener">'+esc(s.repo)+'</a></span><span class="live">● streamed live from raw</span><a href="'+s.raw+'" target="_blank" rel="noopener">view source</a>';
  doc.innerHTML = '<div class="msg">Streaming '+esc(s.id)+' from '+esc(s.repo)+'…</div>';
  let md; try{ const r = await fetch(s.raw+(s.raw.indexOf("?")>=0?"&":"?")+"_="+Date.now()); if(!r.ok) throw new Error(r.status); md = await r.text(); }
  catch(e){ doc.innerHTML = '<div class="msg">Couldn’t stream this spec ('+esc(String(e))+').<br>Its PR may still be pending merge, or the path moved.<br><a href="'+s.raw+'" target="_blank" rel="noopener">'+esc(s.raw)+'</a></div>'; return; }
  md = md.replace(/^<!--[\s\S]*?-->\s*/, "");   // drop a leading provenance/licence comment
  doc.innerHTML = marked.parse(md);
  document.title = s.title + " — RAPP Docs";
  doc.scrollIntoView({block:"start"});
}
boot();
</script></body></html>
