version: '3.8'

services:
  rapphub:
    build: .
    container_name: rapphub-server
    ports:
      - "8888:8888"
    volumes:
      - ./worlds:/app/worlds:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
