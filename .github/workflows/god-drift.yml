name: god-drift
# The signal. Sweeps the whole ecosystem for drift on every push, on a schedule, and on demand.
# Fails when a canonical snapshot drifts or a "must match" cross-repo copy diverges — a red badge
# means the ecosystem has unreconciled drift (the canary working), not a broken build.
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:
permissions:
  contents: read
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: God's-eye drift sweep
        run: bash check.sh
