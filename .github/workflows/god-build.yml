name: god-build
# Captures version frames and regenerates the legacy registry + static API. Observed mirrors may
# drift without failing; the pinned v0.6.9 authority hash is enforced.
on:
  push:
    branches: [ main ]
    paths:
      - "manifest.json"
      - "build_god.py"
      - "api/**"
      - "registry.json"
      - "authority/**"
      - "provenance/observatory-*"
      - "README.md"
      - "MONOREPO.md"
      - "GRAIL_SCAN.md"
      - ".github/workflows/god-build.yml"
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: god-build
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Capture versions + rebuild registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 build_god.py
      - name: Commit new frames + registry (only if changed)
        run: |
          git config user.name "rapp-god"
          git config user.email "actions@users.noreply.github.com"
          git add -A versions registry.json api
          if git diff --cached --quiet; then
            echo "no new frames, no drift change — nothing to commit"
          else
            git commit -m "rapp-god: capture frames + refresh registry [skip ci]"
            git push
          fi
