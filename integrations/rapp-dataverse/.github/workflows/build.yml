name: Build vTwin

# Rebuilds the OOTB Dataverse vTwin (rapp-dataverse/1.0) on seed change.
# Idempotent + stable-write, so it only commits real changes.

on:
  push:
    paths:
      - 'twin/seed/**'
      - 'twin/build.py'
      - 'twin/manifest.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build the vTwin
        run: python twin/build.py
      - name: Commit only real changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "RAPP Twin Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add twin/api twin/registry.json
          git diff --cached --quiet || git commit -m "Rebuild vTwin [skip ci]"
          git push
