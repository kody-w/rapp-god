name: retired-frame-forge

# Manual dispatch is retained only so the retirement is visible in the Actions UI.
# The sole job is unconditionally skipped and has no token permissions.
on:
  workflow_dispatch:

permissions: {}

jobs:
  retired:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    steps:
      - name: Retired
        run: exit 78
