# CI for rapp-dynamic-workflows.
# The test suite runs entirely against a fake runtime (BaseRuntime subclass) —
# no Copilot login, auth token, or live inference is needed in CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[test]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
