<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holodex — the double-jump creatures</title>
<meta property="og:title" content="Holodex — living holographic organisms">
<meta property="og:description" content="A pokedex of digital organisms, each card the actual 3D creature. Click one to walk it.">
<style>
  :root{--bg:#0a0e16;--surface:#161b27;--line:#222a3a;--txt:#e8ecf4;--mut:#8b93a7;
    --savanna:#78C850;--canyon:#E0C068;--forest:#35e0c0;--volcanic:#F08030;--void:#7038F8;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:24px}
  /* the single shared 3D canvas sits ON TOP (transparent); each organism is scissor-rendered into its card's art slot */
  #gl{position:fixed;inset:0;width:100%;height:100%;z-index:5;pointer-events:none}
  h1{font-size:clamp(1.8rem,4vw,2.6rem);text-align:center;letter-spacing:-.5px;position:relative;z-index:1}
  h1 .b{color:#6f8cff}.lede{color:var(--mut);text-align:center;max-width:680px;margin:6px auto 0;position:relative;z-index:1}
  .lede a{color:#6f8cff}
  .bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px auto;max-width:900px;position:relative;z-index:1}
  .chip{background:var(--surface);border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:999px;font-size:13px;cursor:pointer}
  .chip.active{border-color:#6f8cff;background:#1c2540}
  input.search{width:100%;max-width:520px;display:block;margin:0 auto;padding:11px 16px;border-radius:999px;
    background:var(--surface);border:1px solid var(--line);color:var(--txt);font-size:15px;outline:none;position:relative;z-index:1}
  #dex{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:14px;max-width:1240px;margin:18px auto 60px;position:relative;z-index:1}
  .c{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;
    text-align:center;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;z-index:1}
  .c:hover{transform:translateY(-6px);box-shadow:0 14px 30px rgba(0,0,0,.5);border-color:#6f8cff}
  .c .no{position:absolute;top:8px;left:10px;color:var(--mut);font-size:11px;font-weight:700;z-index:2}
  .c .rar{position:absolute;top:8px;right:10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;z-index:2}
  /* the 3D window: transparent so the shared canvas shows through, with a dark inset frame */
  .art3d{width:100%;aspect-ratio:1/1;border-radius:12px;margin:2px 0 8px;background:radial-gradient(circle at 50% 38%,#10182a,#060a12);
    box-shadow:inset 0 0 0 1px #1b2336;overflow:hidden}
  .art3d svg{width:100%;height:100%;display:block}
  .c .nm{font-weight:700;font-size:14px}
  .c .ty{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#0b0e14;padding:2px 8px;border-radius:999px;margin-top:6px}
  .c .st{color:var(--mut);font-size:11px;margin-top:6px}
  .leg{color:#ffd24a}.rare{color:#5bc8ff}.unc{color:#7ee787}.com{color:var(--mut)}
  #ov{position:fixed;inset:0;background:rgba(4,6,12,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
  #ov.on{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:20px;max-width:880px;width:100%;max-height:92vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:0}
  @media(max-width:680px){.modal{grid-template-columns:1fr}}
  .holo{background:#05060a;aspect-ratio:1/1;position:relative}
  .holo iframe{width:100%;height:100%;border:0;display:block}
  .info{padding:20px}.info h2{font-size:20px}.info .sub{color:var(--mut);font-size:13px;margin-bottom:12px}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
  .stat{background:#0e131d;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .stat .k{color:var(--mut);font-size:11px;text-transform:uppercase}.stat .v{font-weight:800;font-size:18px}
  .ab{background:#0e131d;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px}
  .ab .an{font-weight:700;color:#6f8cff}.flav{color:var(--mut);font-style:italic;margin-top:12px;font-size:13px}
  .x{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.5);border-radius:50%;width:34px;height:34px;border:0;color:#fff;font-size:18px;cursor:pointer;z-index:2}
  .play{display:inline-block;margin-top:12px;background:#6f8cff;color:#0b0e14;font-weight:700;padding:8px 14px;border-radius:10px;text-decoration:none}
  .djnav{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:2px;align-items:center;background:rgba(12,16,24,.85);border:1px solid #222a3a;border-radius:999px;padding:5px 6px;backdrop-filter:blur(8px);max-width:94vw}
  .djnav a{color:#aeb6c8;text-decoration:none;font-weight:600;font-size:13px;padding:7px 11px;border-radius:999px;white-space:nowrap}
  .djnav a:hover{color:#fff}.djnav a.active{background:#1c2540;color:#fff}.djnav .brand{color:#35e0c0;font-weight:800}
  @media(max-width:560px){.djnav{left:8px;right:8px;transform:none;overflow-x:auto}.djnav a{padding:7px 9px;font-size:12px}}
  body{padding-top:62px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="assets/species.js"></script>
</head>
<body>
<nav class="djnav"><a class="brand" href="index.html">◆ dj</a><a href="index.html">Gallery</a><a href="evolve.html">Evolve</a><a href="arena.html">Arena</a><a href="pokedex.html" class="active">Holodex</a><a href="nft.html">Metadata</a><a href="evolution.html">Evolution</a></nav>
<canvas id="gl"></canvas>
<h1>Holo<span class="b">dex</span></h1>
<p class="lede">Every double-jump creature is a living holographic organism — each card is the actual 3D
creature. Click one to <b>walk it</b>. They all compete in the <a href="arena.html">arena</a>.</p>
<div class="bar" id="types"></div>
<input class="search" id="q" placeholder="Search creatures…">
<div id="dex">Loading the dex…</div>

<div id="ov"><div class="modal" id="modal"></div></div>

<script>
var TYPE={savanna:"#78C850",canyon:"#E0C068",forest:"#35e0c0",volcanic:"#F08030",void:"#7038F8"};
var RAR={legendary:"leg",rare:"rare",uncommon:"unc",common:"com"};
var CARDS=[],FILTER="",TYPEF="",VIEWS=[],HAS3D=(typeof THREE!=="undefined");
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function playOf(c){return "https://kody-w.github.io/rapp-hologram/?m="+encodeURIComponent(c.holo.token);}

function decodeToken(t){try{t=t.replace(/-/g,"+").replace(/_/g,"/");return JSON.parse(decodeURIComponent(escape(atob(t))));}catch(e){return null;}}
function biomeOf(c){return (c.agent_types&&c.agent_types[1]||"VOID").toLowerCase();}

// ---- organism genome -> form (same voxel creature as the arena) ----
var LIN=["s","l","p","g"],DRIFT=["x","z"];
function sortK(k){return (k||[]).slice().sort(function(a,b){return a.at-b.at;});}
function sampleForm(m,at){var s=sortK(m.k);if(!s.length)return{s:.4,l:.4,p:.2,g:.3,h:200,x:0,z:0};
  if(at<=s[0].at)return s[0];if(at>=s[s.length-1].at)return s[s.length-1];
  for(var i=0;i<s.length-1;i++){var a=s[i],b=s[i+1];if(a.at<=at&&at<=b.at){var t=(at-a.at)/((b.at-a.at)||1),o={};
   LIN.concat(DRIFT).forEach(function(f){o[f]=(a[f]||0)+((b[f]||0)-(a[f]||0))*t;});o.h=a.h||0;return o;}}return s[s.length-1];}
function hsl(h){var c=new THREE.Color();c.setHSL((((h%360)+360)%360)/360,0.72,0.56);return c;}
function buildForm(f){
  var col=hsl(f.h),size=0.8+f.s*1.9,legLen=0.35+f.l*1.9,bodyY=legLen+size*0.5,g=new THREE.Group();
  var mat=new THREE.MeshStandardMaterial({color:col,roughness:0.5,metalness:0.1,emissive:col,emissiveIntensity:0.25+f.g*0.7});
  var body=new THREE.Mesh(new THREE.BoxGeometry(size*1.7,size,size*1.1),mat);body.position.y=bodyY;g.add(body);
  var lt=new THREE.PointLight(col,0.6+f.g*2.2,22);lt.position.set(0,bodyY+1.2,0);g.add(lt);
  var head=new THREE.Mesh(new THREE.BoxGeometry(size*0.75,size*0.75,size*0.75),mat);head.position.set(size*1.05,bodyY+size*0.25,0);g.add(head);
  [-0.22,0.22].forEach(function(dz){var e=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffe08a,emissiveIntensity:1.3}));e.position.set(size*1.45,bodyY+size*0.35,dz*size);g.add(e);});
  [[-0.55,-0.42],[-0.55,0.42],[0.55,-0.42],[0.55,0.42]].forEach(function(p){var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,legLen,6),mat);leg.position.set(p[0]*size,legLen/2,p[1]*size);g.add(leg);});
  var ns=Math.round(f.p*8);for(var i=0;i<ns;i++){var sp=new THREE.Mesh(new THREE.ConeGeometry(0.14,0.4+f.p*0.6,5),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.5}));sp.position.set(((i+0.5)/ns-0.5)*size*1.2,bodyY+size*0.55,0);g.add(sp);}
  g.userData={heart:lt,baseLI:0.6+f.g*2.2,bodyY:bodyY,size:size};return g;
}
function disposeScene(s){s.traverse(function(o){if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});}

// ---- shared renderer + per-card scenes, drawn via scissored viewports ----
var renderer,camera;
if(HAS3D){
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById("gl"),antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.autoClear=false;renderer.setClearColor(0x000000,0);
  camera=new THREE.PerspectiveCamera(40,1,0.1,100);
  function resize(){renderer.setSize(window.innerWidth,window.innerHeight,false);}
  window.addEventListener("resize",resize);resize();
}
function makeScene(m,c){
  var sc=new THREE.Scene();sc.add(new THREE.AmbientLight(0xffffff,0.75));
  var d=new THREE.DirectionalLight(0xfff2d6,1.0);d.position.set(6,10,6);sc.add(d);
  var disc=new THREE.Mesh(new THREE.CircleGeometry(3.4,40),new THREE.MeshBasicMaterial({color:0x0c1322}));disc.rotateX(-Math.PI/2);sc.add(disc);
  var g=DoubleJumpSpecies.build(THREE,c.morphology,sampleForm(m,0));sc.add(g);sc.userData={g:g,m:m,phase:Math.random()*100};return sc;
}
var t=0;
function loop(){
  requestAnimationFrame(loop);
  if(!HAS3D||document.getElementById("ov").classList.contains("on"))return;
  t+=0.6;var H=renderer.domElement.height/renderer.getPixelRatio(),W=renderer.domElement.width/renderer.getPixelRatio();
  renderer.setScissorTest(false);renderer.clear();renderer.setScissorTest(true);
  for(var i=0;i<VIEWS.length;i++){
    var v=VIEWS[i],r=v.el.getBoundingClientRect();
    if(r.bottom<0||r.top>window.innerHeight||r.width<2)continue;
    var g=v.scene.userData.g,ph=v.scene.userData.phase;
    g.rotation.y=t*0.012+ph;g.position.y=Math.sin((t+ph)*0.05)*0.18;
    var beat=Math.pow(Math.max(0,Math.sin((t+ph)*0.12)),6);
    if(g.userData.heart)g.userData.heart.intensity=g.userData.baseLI*(0.55+beat);
    camera.position.set(4.6,3.0+g.userData.bodyY*0.4,6.4);camera.lookAt(0,g.userData.bodyY*0.7+0.4,0);
    var bottom=window.innerHeight-r.bottom;
    var dpr=renderer.getPixelRatio();
    renderer.setViewport(r.left,bottom,r.width,r.height);
    renderer.setScissor(r.left,bottom,r.width,r.height);
    renderer.render(v.scene,camera);
  }
}
if(HAS3D)loop();

// ---- cards ----
function tile(c,i){
  var b=biomeOf(c),col=TYPE[b]||"#888",d=document.createElement("div");d.className="c";d.onclick=function(){open(c);};
  d.innerHTML='<span class="no">#'+String(i+1).padStart(2,"0")+'</span>'+
    '<span class="rar '+esc(RAR[c.rarity_tier]||"com")+'">'+esc(c.rarity_label)+'</span>'+
    '<div class="art3d">'+(HAS3D?"":c.avatar_svg)+'</div>'+
    '<div class="nm">'+esc(c.morphology.species_name)+'</div>'+
    '<span class="ty" style="background:'+col+'">'+b+'</span>'+
    '<div class="st">⚡ '+esc(c.holo.strength)+' · '+esc(c.holo.keyframes)+'f</div>';
  return d;
}
function open(c){
  var m=document.getElementById("modal");
  var ab=(c.abilities||[]).map(function(a){return '<div class="ab"><span class="an">'+esc(a.name)+'</span> '+(a.damage?'· '+esc(a.damage)+' dmg ':'')+'<div style="color:var(--mut);font-size:13px">'+esc(a.text)+'</div></div>';}).join("");
  var s=c.stats;
  var localPlay="organism.html?id="+encodeURIComponent(c.id.split("/").pop());
  m.innerHTML='<div class="holo"><button class="x" onclick="shut(event)">×</button><iframe src="'+localPlay+'" title="'+esc(c.morphology.species_name)+'"></iframe></div>'+
    '<div class="info"><h2>'+esc(c.morphology.species_name)+' '+esc(c.evolution.icon)+'</h2>'+
      '<div class="sub">'+esc(c.title)+' · '+esc(c.morphology.body_plan)+' · '+esc(c.morphology.locomotion)+' · '+esc(biomeOf(c))+'</div>'+
      '<div class="stats">'+
        '<div class="stat"><div class="k">HP</div><div class="v">'+esc(c.hp)+'</div></div>'+
        '<div class="stat"><div class="k">ATK (motion)</div><div class="v">'+esc(s.atk)+'</div></div>'+
        '<div class="stat"><div class="k">DEF (vitality)</div><div class="v">'+esc(s.def)+'</div></div>'+
        '<div class="stat"><div class="k">SPD (spikes)</div><div class="v">'+esc(s.spd)+'</div></div>'+
        '<div class="stat"><div class="k">INT (articulation)</div><div class="v">'+esc(s.int)+'</div></div>'+
        '<div class="stat"><div class="k">Strength</div><div class="v">'+esc(c.holo.strength)+'</div></div>'+
      '</div>'+ab+'<div class="flav">“'+esc(c.flavor_text)+'”</div>'+
      '<a class="play" href="'+localPlay+'" target="_blank" rel="noopener">▶ Inspect species fullscreen</a></div>';
  document.getElementById("ov").classList.add("on");
}
function shut(e){if(e)e.stopPropagation();document.getElementById("ov").classList.remove("on");}
document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")shut();};

function render(){
  VIEWS.forEach(function(v){disposeScene(v.scene);});VIEWS=[];
  var dex=document.getElementById("dex");dex.innerHTML="";
  var list=CARDS.filter(function(c){
    var okT=!TYPEF||biomeOf(c)===TYPEF;
    var okQ=!FILTER||(c.name+" "+c.title+" "+c.holo.author).toLowerCase().indexOf(FILTER)>=0;
    return okT&&okQ;}).sort(function(a,b){return b.holo.strength-a.holo.strength;});
  if(!list.length){dex.innerHTML='<div style="color:var(--mut);padding:30px">No creatures match.</div>';return;}
  list.forEach(function(c,i){
    var el=tile(c,i);dex.appendChild(el);
    if(HAS3D){var m=decodeToken(c.holo.token);if(m)VIEWS.push({el:el.querySelector(".art3d"),scene:makeScene(m,c)});}
  });
}
document.getElementById("q").oninput=function(e){FILTER=e.target.value.toLowerCase();render();};

fetch("cards.json").then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(d){
  CARDS=Object.values(d.cards||{});
  var types=document.getElementById("types"),seen={};
  var all=document.createElement("span");all.className="chip active";all.textContent="all";
  all.onclick=function(){TYPEF="";[].forEach.call(types.children,function(c){c.classList.remove("active");});all.classList.add("active");render();};
  types.appendChild(all);
  CARDS.forEach(function(c){var b=biomeOf(c);if(seen[b])return;seen[b]=1;
    var ch=document.createElement("span");ch.className="chip";ch.textContent=b;ch.style.borderColor=TYPE[b];
    ch.onclick=function(){TYPEF=b;[].forEach.call(types.children,function(c){c.classList.remove("active");});ch.classList.add("active");render();};
    types.appendChild(ch);});
  render();
}).catch(function(e){var dex=document.getElementById("dex");dex.textContent="Could not load cards.json: "+e;dex.style.color="#ff6b6b";});
</script>
</body>
</html>
