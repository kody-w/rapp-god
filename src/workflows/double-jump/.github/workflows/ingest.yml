name: ingest

# Static-API CRUD via issue-ops: a `moment-submit` issue is the write endpoint. This workflow decodes the
# Moment token, verifies it, applies the op to warehouse/moments.json (append-only, idempotent), commits,
# comments the result + live player link, and closes the issue. Mirrors the federate.yml convention.

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: write
  issues: write

# Serialize per-issue so the opened+labeled events can't race each other to push (the loser would hit a
# non-fast-forward). The second run starts only after the first finishes, sees the commit, and no-ops.
concurrency:
  group: double-jump-writes
  cancel-in-progress: false

jobs:
  ingest:
    # only act on submission issues
    if: contains(github.event.issue.labels.*.name, 'moment-submit')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ingest the submission
        id: ingest
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 tools/ingest.py > result.json || true
          echo "----- ingest result -----"; cat result.json

      - name: Rebuild static artifacts
        run: python3 tools/build_artifacts.py

      - name: Commit warehouse change
        run: |
          if [[ -z "$(git status --porcelain warehouse/ cards.json seed-index.json resolve/)" ]]; then
            echo "No warehouse change."
          else
            git config user.name  "double-jump-harness"
            git config user.email "actions@github.com"
            git add warehouse/ cards.json seed-index.json resolve/
            git commit -m "ingest: #${{ github.event.issue.number }} $(python3 -c "import json;print(json.load(open('result.json')).get('status',''))") [skip ci]"
            # tolerate a concurrent push (e.g. the scheduled harness): rebase + retry the fast-forward race
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push race (attempt $attempt) — retrying"; sleep 3
            done
            $pushed || { echo "push failed after 3 attempts"; exit 1; }
          fi

      - name: Comment + close
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**Ingest result**"
            echo ''
            echo '```json'
            cat result.json
            echo '```'
            PLAY=$(python3 -c "import json;print(json.load(open('result.json')).get('play_url',''))")
            if [ -n "$PLAY" ]; then echo ''; echo "▶️ Play the hologram: $PLAY"; fi
          } > comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file comment.md
          STATUS=$(python3 -c "import json;print(json.load(open('result.json')).get('status',''))")
          if [ "$STATUS" != "error" ] && [ "$STATUS" != "rejected" ]; then
            gh issue close "${{ github.event.issue.number }}" --reason completed || true
          fi
