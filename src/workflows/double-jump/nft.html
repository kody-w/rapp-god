<!DOCTYPE html>
<!-- (c) 2026 Kody Wildfeuer · PolyForm Noncommercial 1.0.0 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holo Market — the hologram lives inside the NFT</title>
<style>
  :root{--bg:#0a0e16;--panel:#13192600;--card:#161b27;--line:#222a3a;--txt:#e8ecf4;--mut:#8b93a7;--ac:#35e0c0;--blue:#6f8cff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 700px at 50% -10%,#16203a,var(--bg));color:var(--txt);min-height:100vh;
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:24px}
  .top{max-width:1100px;margin:0 auto 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .top h1{font-size:22px}.top h1 .b{color:var(--ac)}
  .badge{font-size:12px;color:var(--ac);border:1px solid #1c4a40;background:#0d201b;border-radius:999px;padding:4px 10px}
  .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:22px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}}
  .media{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .media .live{position:relative;aspect-ratio:1/1;background:#05060a}
  .media iframe{width:100%;height:100%;border:0;display:block}
  .live .tag{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);border:1px solid #2a3550;border-radius:999px;
    padding:5px 11px;font-size:12px;color:var(--ac);z-index:2}
  .live .full{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.6);border:1px solid #2a3550;border-radius:10px;
    padding:7px 12px;font-size:12px;color:#fff;text-decoration:none;z-index:2}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px}
  .collab{color:var(--blue);font-size:13px;font-weight:600}
  .name{font-size:28px;font-weight:800;margin:2px 0 4px}
  .rar{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    padding:3px 10px;border-radius:999px;color:#0b0e14}
  .price{display:flex;align-items:baseline;gap:8px;margin:16px 0 4px}
  .price .p{font-size:30px;font-weight:800}.price .u{color:var(--mut)}
  .buy{display:flex;gap:10px;margin:14px 0 6px}
  .buy button{flex:1;padding:13px;border-radius:12px;border:0;font:inherit;font-weight:700;cursor:pointer}
  .buy .b1{background:var(--blue);color:#0b0e14}.buy .b2{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .share{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .share button{flex:1;min-width:118px;background:#0e131d;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .share button:hover{border-color:var(--ac)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#16203a;border:1px solid var(--ac);color:#dffaf3;padding:9px 16px;border-radius:10px;font-size:13px;display:none;z-index:70}
  .traits{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
  @media(max-width:520px){.traits{grid-template-columns:repeat(2,1fr)}}
  .tr{background:#0e131d;border:1px solid var(--line);border-radius:10px;padding:9px 10px}
  .tr .k{color:var(--blue);font-size:10px;text-transform:uppercase;letter-spacing:.04em}.tr .v{font-weight:700;font-size:14px;margin-top:1px}
  .meta{margin-top:16px;font-size:12px;color:var(--mut);word-break:break-all}
  .meta a{color:var(--blue);text-decoration:none}
  .meta code{background:#0e131d;border:1px solid var(--line);border-radius:6px;padding:1px 5px}
  .switch{max-width:1100px;margin:20px auto 0;display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
  .switch button{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:7px 11px;font-size:12px;cursor:pointer}
  .switch button.on{border-color:var(--ac)}
  .djnav{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:2px;align-items:center;background:rgba(12,16,24,.85);border:1px solid #222a3a;border-radius:999px;padding:5px 6px;backdrop-filter:blur(8px);max-width:94vw}
  .djnav a{color:#aeb6c8;text-decoration:none;font-weight:600;font-size:13px;padding:7px 11px;border-radius:999px;white-space:nowrap}
  .djnav a:hover{color:#fff}.djnav a.active{background:#1c2540;color:#fff}.djnav .brand{color:#35e0c0;font-weight:800}
  @media(max-width:560px){.djnav{left:8px;right:8px;transform:none;overflow-x:auto}.djnav a{padding:7px 9px;font-size:12px}}
  body{padding-top:62px}
</style>
</head>
<body>
<nav class="djnav"><a class="brand" href="index.html">◆ dj</a><a href="index.html">Gallery</a><a href="evolve.html">Evolve</a><a href="arena.html">Arena</a><a href="pokedex.html">Holodex</a><a href="nft.html" class="active">Metadata</a><a href="evolution.html">Evolution</a></nav>
<div class="top">
  <h1>Holo<span class="b">Market</span></h1>
  <span class="badge">Git-backed metadata preview · unsigned · the art is alive</span>
  <span style="flex:1"></span>
  <a href="pokedex.html" style="color:var(--blue);text-decoration:none;font-size:13px">← Holodex</a>
</div>

<div class="wrap">
  <div class="media">
    <div class="live">
      <span class="tag">▶ live · walkable · 100 frames</span>
      <iframe id="frame" title="hologram" sandbox="allow-scripts"></iframe>
      <a class="full" id="full" target="_blank">⤢ open</a>
    </div>
  </div>
  <div class="panel">
    <div class="collab" id="collab">double-jump</div>
    <div class="name" id="name">…</div>
    <span class="rar" id="rar"></span>
    <div class="price"><span class="p" id="price">—</span><span class="u">≈ strength × 10 Ξ (vibes)</span></div>
    <div class="buy"><button class="b2" disabled>Metadata preview — not listed for sale</button></div>
    <div class="share"><button onclick="copyLink()">🔗 Copy link</button><button onclick="copyEmbed()">⧉ Copy embed</button><button onclick="shareNative()">📤 Share</button><button onclick="tweet()">𝕏 Tweet</button></div>
    <div class="traits" id="traits"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>
<div class="switch" id="switch"></div>
<div class="toast" id="toast"></div>

<script>
var RAR={legendary:"#ffd24a",rare:"#5bc8ff",uncommon:"#7ee787",common:"#aab2c5"};
var SPEC="https://github.com/kody-w/rapp-moment/blob/main/SPEC.md";
var COMMONS="rappid:dimension:0c0ba7d21766be26e61700893fd94";
var RAW="https://raw.githubusercontent.com/kody-w/double-jump/main/resolve/";
var CARDS=[],CUR=null;
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function playOf(c){return "https://kody-w.github.io/rapp-hologram/?m="+encodeURIComponent(c.holo.token);}
function curUrl(){return location.origin+location.pathname+"?id="+(CUR?CUR.id.split("/").pop():"");}
function curEmbed(){return CUR?'<iframe src="'+playOf(CUR)+'" width="480" height="480" sandbox="allow-scripts" style="border:0;border-radius:16px" title="'+String(CUR.name).replace(/"/g,"&quot;")+'"></iframe>':"";}
function toast(t){var e=document.getElementById("toast");e.textContent=t;e.style.display="block";clearTimeout(e._t);e._t=setTimeout(function(){e.style.display="none";},1900);}
function copyLink(){navigator.clipboard.writeText(curUrl()).then(function(){toast("🔗 link copied — opens this exact creature");});}
function copyEmbed(){navigator.clipboard.writeText(curEmbed()).then(function(){toast("⧉ embed copied — paste the live hologram anywhere");});}
function shareNative(){if(navigator.share&&CUR){navigator.share({title:CUR.name,text:CUR.name+" — a living holographic NFT",url:curUrl()}).catch(function(){});}else{copyLink();}}
function tweet(){if(!CUR)return;window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(CUR.name+" — a living holographic NFT; the art IS the walkable hologram ")+"&url="+encodeURIComponent(curUrl()),"_blank");}
function setMeta(prop,val){var key=prop.indexOf("og:")===0?"property":"name";var m=document.querySelector('meta['+key+'="'+prop+'"]');if(!m){m=document.createElement("meta");m.setAttribute(key,prop);document.head.appendChild(m);}m.setAttribute("content",val);}

// client-side resolve() — the same ERC-721/OpenSea doc tools/resolve_card.py emits (the Gateway, SPEC §11¾)
async function sha256hex(s){var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0");}).join("");}
async function resolve(c){
  var h=c.holo,play=playOf(c),rid="rappid:moment:"+await sha256hex("moment:"+h.token), s=c.stats;
  return {name:c.name,description:c.flavor_text,image:"data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(c.avatar_svg))),
    animation_url:play,external_url:play,rappid:rid,sig_suite:"ecdsa-p256",dimension:COMMONS,spec:SPEC,
    chain:{repo:"kody-w/double-jump",kind:"git-blockchain"},
    attributes:[{trait_type:"Species",value:c.morphology.species_name},{trait_type:"Body plan",value:c.morphology.body_plan},
      {trait_type:"Locomotion",value:c.morphology.locomotion},{trait_type:"Biome",value:h.biome},{trait_type:"Strength",value:h.strength},
      {trait_type:"Keyframes",value:h.keyframes},{trait_type:"Rarity",value:c.rarity_label},
      {trait_type:"ATK · motion",value:s.atk},{trait_type:"DEF · vitality",value:s.def},
      {trait_type:"SPD · spikes",value:s.spd},{trait_type:"INT · articulation",value:s.int},
      {trait_type:"Author",value:h.author}],
    _slug:c.id.split("/").pop(),_tokenuri:RAW+c.id.split("/").pop()+".json"};
}
async function show(c){
  var d=await resolve(c);
  document.getElementById("frame").src=d.animation_url;
  document.getElementById("full").href=d.animation_url;
  document.getElementById("name").textContent=d.name;
  var rar=document.getElementById("rar");rar.textContent=c.rarity_label;rar.style.background=RAR[c.rarity_tier]||"#aab2c5";
  document.getElementById("price").textContent=(c.holo.strength*10).toFixed(2)+" Ξ";
  document.getElementById("traits").innerHTML=d.attributes.map(function(a){
    return '<div class="tr"><div class="k">'+esc(a.trait_type)+'</div><div class="v">'+esc(a.value)+'</div></div>';}).join("");
  document.getElementById("meta").innerHTML=
    '<div><b>rappid</b> <code>'+esc(d.rappid.slice(0,38))+'…</code></div>'+
    '<div style="margin-top:6px"><b>tokenURI</b> (static ERC-721-compatible metadata): <a href="'+esc(d._tokenuri)+'" target="_blank" rel="noopener">'+esc(d._tokenuri)+'</a></div>'+
    '<div style="margin-top:6px"><b>animation_url</b> = the live hologram itself · <b>image</b> = a self-contained SVG data-URI · <b>chain</b> = git. No server anywhere.</div>';
  [].forEach.call(document.querySelectorAll("#switch button"),function(b){b.classList.toggle("on",b.dataset.id===c.id);});
  CUR=c;
  try{history.replaceState(null,"","?id="+c.id.split("/").pop());}catch(e){}
  document.title=c.name+" · Holo Market";
  setMeta("og:title",c.name+" — a living holographic NFT");
  setMeta("og:description","Strength "+c.holo.strength+" · "+c.holo.biome+" · the card art IS the live walkable hologram. Zero servers.");
  setMeta("twitter:card","summary_large_image");
  setMeta("twitter:title",c.name+" — living holographic NFT");
}
fetch("cards.json").then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(d){
  CARDS=Object.values(d.cards).sort(function(a,b){return b.holo.strength-a.holo.strength;});
  var sw=document.getElementById("switch");
  CARDS.forEach(function(c){var b=document.createElement("button");b.dataset.id=c.id;
    b.textContent=c.name+" · "+c.holo.strength;b.onclick=function(){show(c);};sw.appendChild(b);});
  var qid=new URLSearchParams(location.search).get("id");
  var start=qid?CARDS.find(function(c){return c.id.split("/").pop()===qid;}):null;
  show(start||CARDS[0]);   // ?id deep-link, else the champion
});
</script>
</body>
</html>
