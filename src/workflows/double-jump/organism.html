<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Living Species — Double Jump</title>
<style>*{box-sizing:border-box}body{margin:0;overflow:hidden;background:radial-gradient(circle at 50% 38%,#17243a,#05070d);color:#eef3ff;font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;inset:10px 10px auto;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.badge,.actions{background:rgba(5,8,15,.76);border:1px solid #293550;border-radius:12px;padding:7px 10px;backdrop-filter:blur(7px)}.badge b{display:block;color:#35e0c0}.badge span{color:#9aa7bf;font-size:11px}.actions{display:flex;gap:6px;pointer-events:auto}.actions a,.actions button{border:0;border-radius:8px;background:#1b2842;color:#fff;padding:7px 9px;font:inherit;text-decoration:none;cursor:pointer}.hint{position:fixed;bottom:9px;left:50%;transform:translateX(-50%);color:#aeb8ca;background:rgba(5,8,15,.65);padding:5px 9px;border-radius:999px;font-size:11px}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="assets/species.js"></script></head>
<body><div class="hud"><div class="badge"><b id="species">Living species</b><span id="meta">Loading…</span></div><div class="actions"><a id="remix" href="evolve.html" target="_top">Remix</a><button id="share">Share</button></div></div><div class="hint">drag to inspect · scroll to zoom</div>
<script>
"use strict";var id=new URLSearchParams(location.search).get("id"),renderer,scene,camera,creature,drag=false,lastX=0,lastY=0,rx=.1,ry=.4,zoom=6,t=0;
function decode(t){try{return JSON.parse(decodeURIComponent(escape(atob(t.replace(/-/g,"+").replace(/_/g,"/")))));}catch(e){return null;}}
function setup(card){var moment=decode(card.holo.token),f=(moment&&moment.k&&moment.k[0])||{s:.5,l:.5,p:.3,g:.5,h:card.morphology.primary_hue};document.getElementById("species").textContent=card.morphology.species_name;document.getElementById("meta").textContent=card.morphology.body_plan+" · "+card.morphology.locomotion+" · "+card.holo.biome;document.title=card.morphology.species_name+" · "+card.name;
renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));document.body.insertBefore(renderer.domElement,document.body.firstChild);scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(42,1,.1,100);scene.add(new THREE.AmbientLight(0xffffff,.8));var key=new THREE.DirectionalLight(0xfff2d6,1.15);key.position.set(5,9,6);scene.add(key);var rim=new THREE.DirectionalLight(0x6f8cff,.7);rim.position.set(-5,3,-5);scene.add(rim);creature=DoubleJumpSpecies.build(THREE,card.morphology,f);scene.add(creature);var floor=new THREE.Mesh(new THREE.CircleGeometry(3.2,48),new THREE.MeshBasicMaterial({color:0x0b1220,transparent:true,opacity:.72}));floor.rotation.x=-Math.PI/2;floor.position.y=.02;scene.add(floor);resize();animate();}
function resize(){if(!renderer)return;renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
function animate(){requestAnimationFrame(animate);t+=.012;if(!drag)ry+=.003;creature.rotation.set(rx,ry,0);creature.position.y=Math.sin(t*2)*.08;var beat=Math.pow(Math.max(0,Math.sin(t*5)),6);if(creature.userData.heart)creature.userData.heart.intensity=creature.userData.baseLI*(.55+beat);camera.position.set(0,2.1,zoom);camera.lookAt(0,creature.userData.bodyY*.66,0);renderer.render(scene,camera);}
addEventListener("resize",resize);addEventListener("pointerdown",function(e){drag=true;lastX=e.clientX;lastY=e.clientY;});addEventListener("pointermove",function(e){if(!drag)return;ry+=(e.clientX-lastX)*.01;rx=Math.max(-.8,Math.min(.8,rx+(e.clientY-lastY)*.006));lastX=e.clientX;lastY=e.clientY;});addEventListener("pointerup",function(){drag=false;});addEventListener("wheel",function(e){zoom=Math.max(3.5,Math.min(9,zoom+e.deltaY*.005));},{passive:true});document.getElementById("share").onclick=function(){var u=location.href;(navigator.clipboard?navigator.clipboard.writeText(u):Promise.reject()).then(function(){document.getElementById("share").textContent="Copied";});};
fetch("cards.json").then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){var cards=Object.values(d.cards||{}),card=cards.find(function(c){return c.id.split("/").pop()===id;})||cards[0];if(!card)throw 0;setup(card);}).catch(function(){document.getElementById("meta").textContent="Species unavailable";});
</script></body></html>
