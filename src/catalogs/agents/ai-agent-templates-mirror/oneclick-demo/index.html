<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M365 Copilot - One-Click Deploy</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; background:#faf9f8; height:100vh; display:flex; overflow:hidden; color:#323130; }
  .sidebar{ width:260px; background:#fff; display:flex; flex-direction:column; border-right:1px solid #edebe9; }
  .sidebar-header{ padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #edebe9; height:48px; }
  .copilot-icon{ width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
  .copilot-icon img{ width:100%; height:100%; }
  .sidebar-title{ font-size:14px; font-weight:600; }
  .sidebar-button{ margin-left:auto; background:none; border:none; padding:4px; cursor:pointer; color:#605e5c; border-radius:4px; width:32px; height:32px; }
  .search-container{ padding:8px 16px; border-bottom:1px solid #edebe9; }
  .search-box{ position:relative; width:100%; }
  .search-icon{ position:absolute; left:8px; top:50%; transform:translateY(-50%); color:#605e5c; font-size:14px; }
  .search-input{ width:100%; padding:6px 8px 6px 32px; border:1px solid #d2d0ce; border-radius:4px; font-size:14px; background:#faf9f8; outline:none; }
  .nav-section{ flex:1; overflow-y:auto; padding:4px 0; }
  .nav-item{ padding:8px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; font-size:14px; color:#323130; position:relative; user-select:none; }
  .nav-item:hover{ background:#f3f2f1; } .nav-item.active{ background:#f3f2f1; }
  .nav-item.active::before{ content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px; background:#742774; border-radius:1px; }
  .nav-icon{ width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .demo-controls-section{ border-top:1px solid #edebe9; padding:12px 16px; background:#faf9f8; }
  .demo-controls-title{ font-size:12px; font-weight:600; color:#605e5c; margin-bottom:8px; }
  .demo-controls{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .demo-btn{ padding:6px 12px; border:1px solid #d2d0ce; border-radius:4px; background:#fff; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; color:#323130; transition:all .2s; }
  .demo-btn:hover:not(:disabled){ background:#f3f2f1; border-color:#605e5c; } .demo-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .demo-btn.primary{ background:#742774; color:#fff; border-color:#742774; } .demo-btn.primary:hover{ background:#5a1d5a; }
  #watch-badge{ display:none; font-size:12px; font-weight:600; color:#0b6a0b; padding:4px 0; }
  body.watcher .host-only{ display:none; } body.watcher #watch-badge{ display:block; }
  .sidebar-bottom{ border-top:1px solid #edebe9; padding:8px 0; }
  .user-section{ padding:8px 16px; display:flex; align-items:center; gap:12px; }
  .user-avatar{ width:28px; height:28px; border-radius:50%; background:#742774; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
  .main-content{ flex:1; display:flex; flex-direction:column; background:#faf9f8; }
  .content-header{ height:48px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; background:#fff; border-bottom:1px solid #edebe9; }
  .header-title{ font-size:14px; color:#605e5c; }
  .status-indicator{ display:flex; align-items:center; gap:8px; padding:6px 12px; background:#f3f2f1; border-radius:4px; font-size:12px; color:#605e5c; }
  .status-dot{ width:8px; height:8px; border-radius:50%; background:#10b981; }
  .status-dot.processing{ background:#f59e0b; animation:pulse 1s infinite; } @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.5} }
  .chat-container{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .chat-messages{ flex:1; overflow-y:auto; padding:20px; }
  .message{ max-width:900px; margin:0 auto 24px; }
  .message-header{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .message-avatar-user{ width:28px; height:28px; border-radius:50%; background:#00a651; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
  .message-avatar-agent{ width:28px; height:28px; border-radius:6px; background:linear-gradient(135deg,#742774 0%,#00a651 100%); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; }
  .message-author{ font-size:14px; font-weight:600; color:#323130; }
  .message-tag{ padding:2px 8px; background:#f3f2f1; border-radius:4px; font-size:12px; color:#605e5c; }
  .message-time{ font-size:12px; color:#a19f9d; }
  .message-content{ margin-left:40px; font-size:14px; line-height:1.6; color:#323130; white-space:pre-wrap; }
  .agent-card{ margin-left:40px; margin-top:16px; background:#fff; border:1px solid #edebe9; border-radius:8px; overflow:hidden; max-width:860px; }
  .agent-card-header{ padding:16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #edebe9; background:linear-gradient(135deg,rgba(116,39,116,.05) 0%,rgba(0,166,81,.05) 100%); }
  .agent-card-icon{ font-size:20px; } .agent-card-title{ font-size:16px; font-weight:600; }
  .agent-card-status{ margin-left:auto; padding:4px 12px; background:#10b981; color:#fff; border-radius:12px; font-size:12px; font-weight:600; }
  .agent-card-content{ padding:16px; }
  .detail-list{ list-style:none; }
  .detail-item{ padding:8px 0; font-size:14px; display:flex; gap:8px; border-bottom:1px solid #f3f2f1; } .detail-item:last-child{ border-bottom:none; }
  .detail-label{ font-weight:600; min-width:180px; color:#605e5c; } .detail-value{ flex:1; }
  .input-container{ padding:16px 20px; background:#fff; border-top:1px solid #edebe9; }
  .input-wrapper{ max-width:900px; margin:0 auto; position:relative; }
  .input-field{ width:100%; padding:12px 48px 12px 16px; border:1px solid #d2d0ce; border-radius:8px; font-size:14px; background:#faf9f8; min-height:44px; outline:none; color:#605e5c; }
  .input-actions{ position:absolute; right:8px; bottom:8px; }
  .input-button{ width:28px; height:28px; border:none; background:none; cursor:pointer; border-radius:4px; color:#742774; }
  #qr{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:60; }
  #qr .box{ background:#fff; border-radius:12px; padding:24px; text-align:center; max-width:340px; }
  #qr img{ width:230px; height:230px; image-rendering:pixelated; } #qr .lnk{ font:11px ui-monospace,Menlo,monospace; color:#605e5c; word-break:break-all; margin:8px 0; }
  #gate{ position:fixed; inset:0; background:#faf9f8; display:flex; align-items:center; justify-content:center; z-index:80; }
  #gate .box{ background:#fff; border:1px solid #edebe9; border-radius:12px; padding:28px 30px; max-width:340px; width:90%; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.1); }
</style>
</head><body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="copilot-icon"><img src="https://res.public.onecdn.static.microsoft/midgard/versionless/officestartresources/copilot_20_light_and_dark.svg" alt="Copilot"></div>
      <span class="sidebar-title">M365 Copilot</span><button class="sidebar-button">&#9776;</button>
    </div>
    <div class="search-container"><div class="search-box"><span class="search-icon">&#128269;</span><input type="text" class="search-input" placeholder="Search"></div></div>
    <div class="nav-section">
      <div class="nav-item active"><div class="nav-icon">&#128172;</div><span>Chat</span></div>
      <div class="nav-item"><div class="nav-icon">&#129302;</div><span>Agents</span></div>
      <div class="nav-item"><div class="nav-icon">&#128172;</div><span>Conversations</span></div>
      <div class="nav-item"><div class="nav-icon">&#128196;</div><span>Pages</span></div>
      <div class="nav-item"><div class="nav-icon">&#10133;</div><span>Create</span></div>
      <div class="nav-item"><div class="nav-icon">&#128241;</div><span>Apps</span></div>
    </div>
    <div class="demo-controls-section">
      <div class="demo-controls-title">Demo Controls <span id="counter" style="float:right;font-weight:400">&ndash;</span></div>
      <div class="demo-controls">
        <button class="demo-btn host-only" id="prev">&#9664; Prev</button>
        <button class="demo-btn primary host-only" id="next">Next &#9654;</button>
        <button class="demo-btn host-only" id="share">&#128247; Share</button>
        <button class="demo-btn host-only" id="exp">&#11015; Export</button>
        <button class="demo-btn host-only" id="imp">&#11014; Import</button>
        <input type="file" id="impf" accept=".json" style="display:none">
      </div>
      <div id="watch-badge">&#128064; watching live &middot; &#128274; sealed</div>
    </div>
    <div class="sidebar-bottom"><div class="user-section"><div class="user-avatar">DU</div><span style="font-size:14px">Demo User</span></div></div>
  </div>
  <div class="main-content">
    <div class="content-header">
      <div class="header-title" id="hdr-title">One-Click Deploy Agent</div>
      <div class="header-actions"><div class="status-indicator"><span class="status-dot" id="statusDot"></span><span id="statusText">Ready</span></div></div>
    </div>
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="input-container"><div class="input-wrapper">
        <input class="input-field" placeholder="Message Copilot&hellip;" disabled>
        <div class="input-actions"><button class="input-button">&#10148;</button></div>
      </div></div>
    </div>
  </div>

  <div id="qr" onclick="this.style.display='none'"><div class="box" onclick="event.stopPropagation()">
    <div style="font-weight:600;margin-bottom:4px">&#128247; Scan to watch live</div>
    <div style="color:#605e5c;font-size:13px;margin-bottom:10px">Read-only &middot; end-to-end sealed.</div>
    <input id="qr-kw" type="text" placeholder="Keyword (optional &mdash; blank = anyone with the link)" autocomplete="off" style="width:100%;padding:9px 11px;border:1px solid #e1dfdd;border-radius:8px;font-size:14px;margin-bottom:8px;box-sizing:border-box">
    <div id="qr-mode" style="font-size:12.5px;margin-bottom:10px"></div>
    <img id="qr-img" alt="QR"><div class="lnk" id="qr-lnk"></div>
    <button class="demo-btn" style="margin-top:8px" onclick="document.getElementById('qr').style.display='none'">close</button>
  </div></div>

<script>
window.SCENARIO = {"schema": "rapp-demo/1.0", "appName": "One-Click Deploy", "appIcon": "🚀", "agentName": "One-Click Deploy", "script": [{"type": "user", "content": "Deploy the Predictive Asset Maintenance Intelligence stack to Copilot Studio."}, {"type": "agent", "content": "Found it in the AI Agent Templates library. Here's the stack I'll deploy:", "agentData": {"title": "Predictive Asset Maintenance Intelligence", "icon": "⚡", "status": "Ready", "details": {"Industry": "Energy & Utilities", "Agents in stack": "8", "Complexity": "Intermediate", "Source": "ai-agent-templates-mirror · energy_stacks", "Deploy mode": "Standalone MCS agent · sequential"}}}, {"type": "user", "content": "Go ahead — one click."}, {"type": "agent", "content": "Importing agent-by-agent into Copilot Studio…", "agentData": {"title": "Sequential Import", "icon": "📦", "status": "8 / 8 imported", "details": {"1 · Asset Sensor Aggregator": "✓ imported", "2 · Asset Health Scorer": "✓ imported", "3 · Failure Probability Ranker": "✓ imported", "4 · Maintenance Work Order": "✓ imported", "5 · Parts Planner": "✓ imported", "+ 3 more": "✓ Field Execution · Lifecycle CapEx · Asset Register Writeback"}}}, {"type": "agent", "content": "Multi-agent stack merged into one Copilot Studio agent and validated.", "agentData": {"title": "Deployment Validation", "icon": "✅", "status": "Success", "details": {"Imported": "8 / 8 agents", "Merged": "1 stack → 1 MCS agent", "Connectors": "resolved (DLP exceptions applied)", "Build summary": "all green — 0 failures, 0 partial"}}}, {"type": "user", "content": "Is it live? What can it do?"}, {"type": "agent", "content": "Yes — the Predictive Asset Maintenance Intelligence agent is live in Copilot Studio and ready to use.", "agentData": {"title": "Live in Copilot Studio", "icon": "🟢", "status": "Published", "details": {"Agent": "Predictive Asset Maintenance Intelligence", "Channel": "Microsoft 365 Copilot", "Capabilities": "score asset health · rank failure probability · auto-draft work orders", "Try it": "\"Score the health of asset AST-00011\""}}}]};
window.GATE_HASH = null;
(function(){
  const url = new URL(location.href);
  const peerParam = url.searchParams.get('peer'), keyParam = url.searchParams.get('k');
  let scenario = window.SCENARIO, step = 0;
  const msgs = document.getElementById('chatMessages');
  const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function now(){ const d = new Date(); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); }
  function setHeader(){ document.getElementById('hdr-title').textContent = (scenario.appName || 'Demo') + ' Agent'; document.title = 'M365 Copilot - ' + (scenario.appName || 'Demo'); }

  function turnHTML(t){
    if (t.type === 'user') {
      return '<div class="message"><div class="message-header"><div class="message-avatar-user">U</div>'
        + '<span class="message-author">You</span><span class="message-time">' + now() + '</span></div>'
        + '<div class="message-content">' + esc(t.content) + '</div></div>';
    }
    const author = scenario.agentName || scenario.appName || 'Copilot';
    let card = '';
    if (t.agentData) { const a = t.agentData;
      card = '<div class="agent-card"><div class="agent-card-header"><span class="agent-card-icon">' + esc(a.icon || scenario.appIcon || '📋') + '</span>'
        + '<span class="agent-card-title">' + esc(a.title || 'Result') + '</span>'
        + (a.status ? '<span class="agent-card-status">' + esc(a.status) + '</span>' : '') + '</div>'
        + '<div class="agent-card-content"><ul class="detail-list">'
        + Object.entries(a.details || {}).map(([k,v]) => '<li class="detail-item"><span class="detail-label">' + esc(k) + '</span><span class="detail-value">' + esc(v) + '</span></li>').join('')
        + '</ul></div></div>';
    }
    return '<div class="message"><div class="message-header"><div class="message-avatar-agent">' + esc(scenario.appIcon || '🤖') + '</div>'
      + '<span class="message-author">' + esc(author) + '</span><span class="message-tag">Agent</span><span class="message-time">' + now() + '</span></div>'
      + '<div class="message-content">' + esc(t.content) + '</div>' + card + '</div>';
  }
  function render(){
    const script = scenario.script || [];
    msgs.innerHTML = script.slice(0, step + 1).map(turnHTML).join('');
    document.getElementById('counter').textContent = Math.min(step + 1, script.length) + ' / ' + script.length;
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── kited sealed sync (AES-256-GCM; key from the link secret + optional keyword) ──
  let activeKeyword = '';
  async function sha256hex(s){ const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join(''); }
  const _b64 = b => btoa(String.fromCharCode.apply(null, new Uint8Array(b)));
  const _ub = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function _key(secret){ const e = new TextEncoder();
    const base = await crypto.subtle.importKey('raw', e.encode(secret + (activeKeyword ? '|sesame|' + activeKeyword : '')), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({ name:'PBKDF2', salt:e.encode('rapp-neighborhood-5a/1'), iterations:210000, hash:'SHA-256' }, base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']); }
  async function _seal(secret, obj){ const k = await _key(secret); const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, k, new TextEncoder().encode(JSON.stringify(obj))); return { iv:_b64(iv), ct:_b64(ct) }; }
  async function _open(secret, m){ const k = await _key(secret);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:_ub(m.iv) }, k, _ub(m.ct)); return JSON.parse(new TextDecoder().decode(pt)); }
  function _loadPeer(){ return new Promise((res, rej) => { if (window.Peer) return res();
    const s = document.createElement('script'); s.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js'; s.onload = res; s.onerror = () => rej(new Error('PeerJS load failed')); document.head.appendChild(s); }); }
  let conns = [], secret = null;
  async function broadcast(){ for (const c of conns) { try { c.send(await _seal(secret, { step })); } catch(e){} } }
  async function pushState(c){ try { c.send(await _seal(secret, { scenario, step })); } catch(e){} }

  function boot(){
    if (peerParam) {                                   // ── WATCHER: read-only, follows the host live ──
      document.body.classList.add('watcher');
      document.getElementById('statusText').textContent = 'Watching live';
      _loadPeer().then(() => { const p = new Peer();
        p.on('open', () => { const c = p.connect(peerParam);
          c.on('data', async m => { try { const d = await _open(keyParam, m);
            if (d.scenario) { scenario = d.scenario; setHeader(); }
            if (d.step !== undefined) step = d.step; render(); } catch(e){} }); }); });
    } else {                                           // ── HOST: drives the demo, broadcasts each step ──
      document.getElementById('next').onclick = () => { if (step < (scenario.script||[]).length - 1) { step++; render(); broadcast(); } };
      document.getElementById('prev').onclick = () => { if (step > 0) { step--; render(); broadcast(); } };
      document.getElementById('exp').onclick = () => { const blob = new Blob([JSON.stringify(scenario, null, 2)], { type:'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = (scenario.appName || 'demo').replace(/\s+/g,'-').toLowerCase() + '.json'; a.click(); };
      document.getElementById('imp').onclick = () => document.getElementById('impf').click();
      document.getElementById('impf').onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader();
        r.onload = () => { try { scenario = JSON.parse(r.result); step = 0; setHeader(); render(); conns.forEach(pushState); } catch(err){ alert('bad scenario JSON: ' + err.message); } }; r.readAsText(f); };
      let _peerId = null;
      function updateShare(){ if (!_peerId) return;
        const kwInput = document.getElementById('qr-kw'), mode = document.getElementById('qr-mode');
        const base = location.origin + location.pathname + '?peer=' + _peerId + '&k=' + encodeURIComponent(secret);
        const setQR = lk => { document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data=' + encodeURIComponent(lk); document.getElementById('qr-lnk').textContent = lk; };
        if (window.GATE_HASH) { if (kwInput) kwInput.style.display = 'none'; setQR(base + '&g=' + window.GATE_HASH);
          mode.innerHTML = '🔐 Keyword required (set at generation) — tell your viewers the keyword'; mode.style.color = '#0b6a0b'; return; }
        const kw = (kwInput.value || '').trim(); activeKeyword = kw;
        if (kw) { sha256hex(kw).then(g => setQR(base + '&g=' + g)); mode.innerHTML = '🔐 Keyword required — tell your viewers the keyword'; mode.style.color = '#0b6a0b'; }
        else { setQR(base); mode.innerHTML = '🔓 Open — anyone with this link can watch'; mode.style.color = '#605e5c'; } }
      document.getElementById('share').onclick = async () => {
        try { await _loadPeer();
          if (!secret) secret = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36));
          const kwi = document.getElementById('qr-kw'); if (kwi && !kwi._wired) { kwi._wired = 1; kwi.addEventListener('input', updateShare); }
          if (!_peerId) { const p = new Peer();
            p.on('connection', c => { conns.push(c); c.on('open', () => pushState(c)); c.on('close', () => { conns = conns.filter(x => x !== c); }); });
            p.on('open', id => { _peerId = id; updateShare(); document.getElementById('qr').style.display = 'flex'; });
            p.on('error', e => alert('share error: ' + e.message));
          } else { updateShare(); document.getElementById('qr').style.display = 'flex'; }
        } catch(e){ alert('share unavailable: ' + e.message); } };
      render();
    }
  }

  // ── OPTIONAL open-sesame gate: raised only if a keyword was baked (window.GATE_HASH) or added at
  // share time (?g=<hash> in the link). No keyword anywhere → open broadcast to anyone with the link. ──
  setHeader();
  const GATE = window.GATE_HASH || url.searchParams.get('g');
  function showGate(){
    const g = document.createElement('div'); g.id = 'gate';
    g.innerHTML = '<div class="box"><div style="font-size:30px">🔓</div>'
      + '<div style="font-weight:600;font-size:18px;margin:6px 0 2px">' + esc(scenario.appName || 'Demo') + '</div>'
      + '<div style="color:#605e5c;font-size:13.5px;margin-bottom:14px">Enter the keyword to continue.</div>'
      + '<input id="gate-in" type="password" placeholder="keyword" autocomplete="off" style="width:100%;padding:11px 12px;border:1px solid #e1dfdd;border-radius:8px;font-size:16px;text-align:center;box-sizing:border-box">'
      + '<div id="gate-err" style="color:#a4262c;font-size:12.5px;height:15px;margin:6px 0"></div>'
      + '<button class="demo-btn primary" id="gate-go" style="width:100%;padding:11px">Unlock</button></div>';
    document.body.appendChild(g);
    const inp = g.querySelector('#gate-in'), err = g.querySelector('#gate-err');
    const submit = async () => { const v = inp.value.trim(); if (!v) return;
      if ((await sha256hex(v)) === GATE) { activeKeyword = v; try { localStorage.setItem('rapp_demo_gate_' + GATE, v); } catch(e){} g.remove(); boot(); }
      else { err.textContent = 'wrong keyword'; inp.value = ''; inp.focus(); } };
    g.querySelector('#gate-go').onclick = submit; inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    setTimeout(() => { try { inp.focus(); } catch(e){} }, 50);
  }
  (async () => {
    if (!GATE) { boot(); return; }
    let cached = null; try { cached = localStorage.getItem('rapp_demo_gate_' + GATE); } catch(e){}
    if (cached && (await sha256hex(cached)) === GATE) { activeKeyword = cached; boot(); }
    else showGate();
  })();
})();
</script>
</body></html>
