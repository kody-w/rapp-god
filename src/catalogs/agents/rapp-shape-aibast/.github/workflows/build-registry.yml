name: Build Agent Registry

on:
  push:
    paths:
      - 'agents/**/*.py'
      - 'build_registry.py'
      - '.github/workflows/build-registry.yml'
  pull_request:
    paths:
      - 'agents/**/*.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build registry
        run: python build_registry.py

      - name: Commit registry.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "RAPP Registry Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add registry.json
          git diff --cached --quiet || git commit -m "Auto-build registry.json [skip ci]"
          git push
