<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPP Engineering Blog</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
    --accent: #58a6ff; --green: #39d353; --purple: #d2a8ff;
    --red: #f85149; --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    line-height: 1.7; max-width: 780px; margin: 0 auto; padding: 40px 24px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .blog-header {
    border-bottom: 1px solid var(--border); padding-bottom: 32px; margin-bottom: 40px;
  }
  .blog-title {
    font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .blog-subtitle { color: var(--text-dim); font-size: .95rem; margin-top: 8px; }
  .blog-nav { margin-top: 16px; display: flex; gap: 16px; font-size: .85rem; }
  .blog-nav a { color: var(--text-dim); }

  .post-list { display: flex; flex-direction: column; gap: 32px; }
  .post-entry {
    border: 1px solid var(--border); border-radius: 12px; padding: 24px;
    background: var(--surface); transition: border-color .2s;
  }
  .post-entry:hover { border-color: var(--accent); }
  .post-date { font-size: .75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .post-title { font-size: 1.3rem; font-weight: 700; margin: 8px 0; }
  .post-excerpt { color: var(--text-dim); font-size: .9rem; line-height: 1.6; }
  .post-tags { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .post-tag {
    font-size: .7rem; padding: 2px 10px; border-radius: 99px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }

  .post-content { display: none; }
  .post-content.active { display: block; }
  .post-content h2 { font-size: 1.4rem; margin: 32px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .post-content h3 { font-size: 1.1rem; margin: 24px 0 12px; color: var(--purple); }
  .post-content p { margin: 12px 0; }
  .post-content ul, .post-content ol { margin: 12px 0 12px 24px; }
  .post-content li { margin: 6px 0; }
  .post-content code {
    font-family: 'SF Mono', Consolas, monospace; font-size: .85em;
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
  }
  .post-content pre {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; overflow-x: auto; margin: 16px 0; font-size: .85rem;
    font-family: 'SF Mono', Consolas, monospace; line-height: 1.5;
  }
  .post-content pre code { background: none; padding: 0; }
  .post-content blockquote {
    border-left: 3px solid var(--purple); padding-left: 16px; margin: 16px 0;
    color: var(--text-dim); font-style: italic;
  }
  .post-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .88rem; }
  .post-content th, .post-content td { padding: 10px 12px; text-align: left; border: 1px solid var(--border); }
  .post-content th { background: var(--surface2); font-weight: 600; }

  .back-link { display: inline-block; margin-bottom: 24px; font-size: .85rem; color: var(--text-dim); }

  @media (max-width: 600px) {
    body { padding: 20px 16px; }
    .blog-title { font-size: 1.5rem; }
    .post-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="blog-header">
  <div class="blog-title">RAPP Engineering Blog</div>
  <div class="blog-subtitle">Field notes from building a frontier digital ecosystem from the ground up.</div>
  <div class="blog-nav">
    <a href="../index.html">Agent Store</a>
    <a href="lore/index.html">The Operator's Field Guide</a>
    <a href="../CONSTITUTION.md">Constitution</a>
    <a href="https://github.com/kody-w/RAR">GitHub</a>
  </div>
</div>

<div id="blog-index" class="post-list">
  <!-- Posts are loaded dynamically from posts/index.json -->
</div>

<div id="blog-post" class="post-content"></div>

<script>
const POSTS_INDEX = 'posts/index.json';

async function loadIndex() {
  try {
    const res = await fetch(POSTS_INDEX);
    const posts = await res.json();
    renderIndex(posts);

    // Check URL hash for deep link
    const hash = location.hash.slice(1);
    if (hash) loadPost(hash, posts);
  } catch (e) {
    document.getElementById('blog-index').innerHTML =
      '<p style="color:var(--text-dim)">No posts yet. Check back soon.</p>';
  }
}

function renderIndex(posts) {
  const el = document.getElementById('blog-index');
  el.innerHTML = posts.map(p => `
    <div class="post-entry" onclick="loadPost('${p.slug}', window._posts)">
      <div class="post-date">${p.date}</div>
      <div class="post-title"><a href="#${p.slug}">${p.title}</a></div>
      <div class="post-excerpt">${p.excerpt}</div>
      <div class="post-tags">${(p.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
  window._posts = posts;
}

async function loadPost(slug, posts) {
  const post = (posts || []).find(p => p.slug === slug);
  if (!post) return;

  try {
    const res = await fetch(`posts/${slug}.html`);
    const html = await res.text();
    document.getElementById('blog-index').style.display = 'none';
    const el = document.getElementById('blog-post');
    el.className = 'post-content active';
    el.innerHTML = `
      <a class="back-link" href="#" onclick="event.preventDefault();showIndex()">&larr; All posts</a>
      <div class="post-date">${post.date}</div>
      <h1 style="font-size:1.8rem;margin:12px 0 24px">${post.title}</h1>
      ${html}
    `;
    location.hash = slug;
    window.scrollTo(0, 0);
  } catch (e) {
    console.error('Failed to load post:', e);
  }
}

function showIndex() {
  document.getElementById('blog-index').style.display = '';
  document.getElementById('blog-post').className = 'post-content';
  location.hash = '';
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (!hash) showIndex();
  else if (window._posts) loadPost(hash, window._posts);
});

loadIndex();
</script>
</body>
</html>
