function arenaCardStats(name) {
  const h = seedHash(name);
  const rng = mulberry32(h);
  const power = 1 + Math.floor(rng() * 7);
  const toughness = 1 + Math.floor(rng() * 7);
  const spec = ['Haste', 'Shield', 'Leech', 'Pierce', 'Regen'][Math.floor(rng() * 5)];
  return { name, power, toughness, spec };
}

function arenaResolveCard(name) {
  const agent = REGISTRY.agents.find(a => a.name === name || a.slug === name || (a.display_name || '').toLowerCase() === name.toLowerCase());
  const label = agent ? (agent.display_name || agent.name) : name;
  return arenaCardStats(label);
}

function arenaGenAIName() {
  const prefixes = ['Shadow', 'Iron', 'Neon', 'Storm', 'Void', 'Nexus', 'Cyber'];
  const suffixes = ['Walker', 'Caster', 'Core', 'Bot', 'Blade', 'Drone', 'Pulse'];
  const rng = mulberry32(Date.now() & 0xFFFFFFFF);
  return prefixes[Math.floor(rng() * prefixes.length)] + suffixes[Math.floor(rng() * suffixes.length)];
}

function arenaGenAIDeck() {
  const pool = ['@rapp/basic-agent', '@kody/memory-agent', '@borg/assimilator', '@discreetRappers/pipeline-agent', '@kody/registry-client', 'CipherCore', 'DataWraith', 'NullVector'];
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3).map(n => arenaCardStats(n));
}

function arenaSimBattle(deck, aiDeck) {
  const log = [];
  let playerHP = deck.reduce((s, c) => s + c.toughness, 0);
  let aiHP = aiDeck.reduce((s, c) => s + c.toughness, 0);
  log.push(`  Your HP: ${playerHP}  |  AI HP: ${aiHP}`);
  log.push('  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
  for (let round = 1; round <= 3 && playerHP > 0 && aiHP > 0; round++) {
    const pc = deck[(round - 1) % deck.length];
    const ac = aiDeck[(round - 1) % aiDeck.length];
    const pAtk = pc.power + Math.floor(Math.random() * 3);
    const aAtk = ac.power + Math.floor(Math.random() * 3);
    let pBonus = 0, aBonus = 0;
    if (pc.spec === 'Haste') pBonus += 2;
    if (pc.spec === 'Pierce') pBonus += 1;
    if (ac.spec === 'Haste') aBonus += 2;
    if (ac.spec === 'Pierce') aBonus += 1;
    let dmgToAI = Math.max(0, pAtk + pBonus - Math.floor(ac.toughness / 2));
    let dmgToPlayer = Math.max(0, aAtk + aBonus - Math.floor(pc.toughness / 2));
    if (ac.spec === 'Shield') dmgToAI = Math.floor(dmgToAI / 2);
    if (pc.spec === 'Shield') dmgToPlayer = Math.floor(dmgToPlayer / 2);
    if (pc.spec === 'Leech') playerHP = Math.min(playerHP + 2, 30);
    if (ac.spec === 'Leech') aiHP = Math.min(aiHP + 2, 30);
    aiHP -= dmgToAI;
    playerHP -= dmgToPlayer;
    if (pc.spec === 'Regen') playerHP += 1;
    log.push(`  Round ${round}: [${pc.name.slice(0,12)}] ${pc.spec} vs [${ac.name.slice(0,12)}] ${ac.spec}`);
    log.push(`    You deal ${dmgToAI} dmg  |  AI deals ${dmgToPlayer} dmg`);
  }
  log.push('  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
  log.push(`  Final: Your HP ${Math.max(0, playerHP)}  |  AI HP ${Math.max(0, aiHP)}`);
  return { playerWon: playerHP > aiHP, log };
}

function arenaELOUpdate(elo, won) {
  const K = 32;
  const expected = 1 / (1 + Math.pow(10, (1000 - elo) / 400));
  return Math.round(elo + K * ((won ? 1 : 0) - expected));
}

function handleArenaInput(win, src) {
  printToWindow(win.id, `[] ${src}`, 'cmd');
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const a = win.arena;
  switch (cmd) {
    case 'create': {
      const code = Math.random().toString(36).slice(2, 6).toUpperCase();
      a.room = code;
      printToWindow(win.id, `Room created: ${code}`, 'success');
      printToWindow(win.id, 'Share this code with your opponent (or fight AI).', 'info');
      printToWindow(win.id, 'Set your deck: deck <card1> <card2> <card3>', 'info');
      break;
    }
    case 'deck': {
      const names = parts.slice(1);
      if (names.length !== 3) { printToWindow(win.id, 'Usage: deck <card1> <card2> <card3>', 'err'); break; }
      a.deck = names.map(n => arenaResolveCard(n));
      printToWindow(win.id, 'Deck set:', 'success');
      for (const c of a.deck) printToWindow(win.id, `  [${c.name.slice(0,18).padEnd(18)}] P:${c.power} T:${c.toughness} [${c.spec}]`, 'result');
      break;
    }
    case 'fight': {
      if (!a.deck.length) { printToWindow(win.id, 'Set your deck first: deck <c1> <c2> <c3>', 'warn'); break; }
      const aiName = arenaGenAIName();
      const aiDeck = arenaGenAIDeck();
      printToWindow(win.id, `Opponent: ${aiName}`, 'sys');
      printToWindow(win.id, 'AI Deck:', 'info');
      for (const c of aiDeck) printToWindow(win.id, `  [${c.name.slice(0,18).padEnd(18)}] P:${c.power} T:${c.toughness} [${c.spec}]`, 'info');
      printToWindow(win.id, '');
      const { playerWon, log } = arenaSimBattle(a.deck, aiDeck);
      for (const line of log) printToWindow(win.id, line, '');
      printToWindow(win.id, '');
      if (playerWon) {
        a.record.wins++; a.elo = arenaELOUpdate(a.elo, true);
        printToWindow(win.id, '  VICTORY! Well played.', 'success');
      } else {
        a.record.losses++; a.elo = arenaELOUpdate(a.elo, false);
        printToWindow(win.id, '  DEFEAT. Better luck next time.', 'err');
      }
      printToWindow(win.id, `  ELO: ${a.elo}`, 'result');
      break;
    }
    case 'status': {
      const total = a.record.wins + a.record.losses;
      const wr = total ? Math.round((a.record.wins / total) * 100) : 0;
      printToWindow(win.id, '  Battle Record', 'sys');
      printToWindow(win.id, `  Wins:   ${a.record.wins}`, 'success');
      printToWindow(win.id, `  Losses: ${a.record.losses}`, 'err');
      printToWindow(win.id, `  Win %:  ${wr}%`, 'info');
      printToWindow(win.id, `  ELO:    ${a.elo}`, 'result');
      if (a.room) printToWindow(win.id, `  Room:   ${a.room}`, 'info');
      break;
    }
    case 'clear': clearOutput(win.id); break;
    case 'help': printToWindow(win.id, '  create  deck c1 c2 c3  fight  status', 'info'); break;
    default: if (src.trim()) printToWindow(win.id, `Unknown: ${src}. Type "help".`, 'warn');
  }
}

   DUNGEON APP — Roguelike crawler
   ============================================================ */
const DUNGEON_ROOM_TYPES = ['.', '.', '.', '!', '$', 'X', '>'];
const DUNGEON_W = 5;
const DUNGEON_H = 5;

function dungeonGenFloor(floor) {
  const rng = mulberry32(seedHash('floor-' + floor));
  const grid = [];
  for (let y = 0; y < DUNGEON_H; y++) {
    const row = [];
    for (let x = 0; x < DUNGEON_W; x++) {
      if (x === 0 && y === 0) { row.push('S'); continue; }
      if (x === 4 && y === 4) { row.push('>'); continue; }
      row.push(DUNGEON_ROOM_TYPES[Math.floor(rng() * DUNGEON_ROOM_TYPES.length)]);
    }
    grid.push(row);
  }
  return grid;
}

function dungeonGenEnemy(floor) {
  const names = ['Goblin', 'Slime', 'Skeleton', 'Dark Elf', 'Wraith', 'Golem', 'Dragon'];
  const rng = mulberry32(seedHash('enemy-' + floor + '-' + (Date.now() & 0xFFFFF)));
  const idx = Math.min(Math.floor(rng() * (floor + 2)), names.length - 1);
  return { name: names[idx], hp: 3 + floor * 2 + Math.floor(rng() * 3), atk: 1 + floor + Math.floor(rng() * 2) };
}

function dungeonRenderMap(win) {
  const { grid, px, py, visited } = win.dungeon;
  const lines = [`  Floor ${win.dungeon.floor} / 5`, '  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510'];
  for (let y = 0; y < DUNGEON_H; y++) {
    let row = '  \u2502';
    for (let x = 0; x < DUNGEON_W; x++) {
      const key = x + ',' + y;
      row += (x === px && y === py) ? '@' : visited.has(key) ? grid[y][x] : '?';
      row += ' ';
    }
    lines.push(row.trimEnd() + '\u2502');
  }
  lines.push('  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518');
  lines.push('  @ you  . empty  ! fight  $ loot  X trap  > stairs  ? fog');
  return lines;
}

/* ============================================================
   DUNGEON GUI helpers
   ============================================================ */
function dgLog(winId, text, cls) {
  const log = document.getElementById(`dg-log-${winId}`);
  if (!log) return;
  const span = document.createElement('span');
  span.className = 'dg-log-line' + (cls ? ' ' + cls : '');
  span.textContent = text;
  log.appendChild(span);
  log.appendChild(document.createElement('br'));
  log.scrollTop = log.scrollHeight;
}

function dgCellClass(room, isPlayer) {
  if (isPlayer) return 'player';
  const m = { '.':'empty', 'S':'start', '>':'stairs', '$':'loot', 'X':'trap', '!':'fight' };
  return m[room] || 'empty';
}
function dgCellEmoji(room, isPlayer) {
  if (isPlayer) return '&#9650;';
  const m = { '.':'', 'S':'&#10022;', '>':'&#8659;', '$':'&#128142;', 'X':'&#9760;', '!':'&#9881;' };
  return m[room] || '';
}

function dgRenderGUI(win) {
  const gui = document.getElementById(`dg-gui-${win.id}`);
  if (!gui) return;
  const d = win.dungeon;
  const hpPct = Math.max(0, d.hp / d.maxHp);
  const hpColor = hpPct > 0.5 ? 'var(--accent)' : hpPct > 0.2 ? '#ffa657' : '#f85149';

  // Build map grid HTML
  let mapHtml = '';
  for (let y = 0; y < DUNGEON_H; y++) {
    for (let x = 0; x < DUNGEON_W; x++) {
      const key = x + ',' + y;
      const isPlayer = (x === d.px && y === d.py);
      const visited = d.visited.has(key);
      let cls, content;
      if (isPlayer) {
        cls = 'player'; content = '&#9650;';
      } else if (!visited) {
        cls = 'fog'; content = '';
      } else {
        cls = dgCellClass(d.grid[y][x], false);
        content = dgCellEmoji(d.grid[y][x], false);
      }
      mapHtml += `<div class="dg-cell ${cls}">${content}</div>`;
    }
  }

  // Inventory pills
  const invHtml = d.inventory.length
    ? d.inventory.map(i => `<span class="dg-inv-item">${escHtml(i)}</span>`).join('')
    : '<span class="dg-inv-item" style="opacity:0.4">empty</span>';

  gui.innerHTML = `
    <div class="dg-header">
      <div class="dg-stat"><span class="dg-stat-label">Floor</span><span class="dg-stat-value">${d.floor}/5</span></div>
      <div class="dg-stat"><span class="dg-stat-label">Score</span><span class="dg-stat-value">${d.score}</span></div>
      <div class="dg-stat"><span class="dg-stat-label">ATK</span><span class="dg-stat-value">${d.atk}</span></div>
      <div class="dg-stat"><span class="dg-stat-label">DEF</span><span class="dg-stat-value">${d.def}</span></div>
      <div class="dg-hp-bar-wrap">
        <span class="dg-stat-label" style="white-space:nowrap">HP</span>
        <div class="dg-hp-bar-bg"><div class="dg-hp-bar-fill" id="dg-hp-fill-${win.id}" style="width:${(hpPct*100).toFixed(0)}%;background:${hpColor}"></div></div>
        <span style="font-size:9px;font-family:var(--font-mono);color:var(--text-faint);white-space:nowrap">${d.hp}/${d.maxHp}</span>
      </div>
    </div>
    <div class="dg-map-area" id="dg-map-area-${win.id}" style="position:relative">
      <div class="dg-map-grid" id="dg-map-${win.id}">${mapHtml}</div>
      <div class="dg-dir-pad">
        <button class="dg-dir-btn" data-dir="n" onclick="dgGuiMove(${win.id},'n')" title="North">&#8593;</button>
        <button class="dg-dir-btn" data-dir="w" onclick="dgGuiMove(${win.id},'w')" title="West">&#8592;</button>
        <button class="dg-dir-btn" data-dir="s" onclick="dgGuiMove(${win.id},'s')" title="South">&#8595;</button>
        <button class="dg-dir-btn" data-dir="e" onclick="dgGuiMove(${win.id},'e')" title="East">&#8594;</button>
      </div>
    </div>
    <div class="dg-inv-list">${invHtml}</div>
    <div class="dg-log" id="dg-log-${win.id}"></div>
  `;
}

function dgUpdateHPBar(winId) {
  const win = windows.get(winId);
  if (!win || !win.dungeon) return;
  const d = win.dungeon;
  const hpPct = Math.max(0, d.hp / d.maxHp);
  const hpColor = hpPct > 0.5 ? 'var(--accent)' : hpPct > 0.2 ? '#ffa657' : '#f85149';
  const fill = document.getElementById(`dg-hp-fill-${winId}`);
  if (fill) { fill.style.width = (hpPct*100).toFixed(0) + '%'; fill.style.background = hpColor; }
}

function dgGuiEnter(winId) {
  const win = windows.get(winId);
  if (!win) return;
  win.dungeon = { floor: 1, grid: dungeonGenFloor(1), px: 0, py: 0, visited: new Set(['0,0']), hp: 15, maxHp: 15, atk: 3, def: 1, inventory: [], score: 0 };
  dgRenderGUI(win);
  setTimeout(() => {
    dgLog(winId, 'You descend into the dungeon...', 'sys');
    dgLog(winId, 'Use arrow buttons or keyboard arrows to move.', '');
    dgEnterRoom(win);
  }, 50);
  // Keyboard support
  const el = document.getElementById(`win-${winId}`);
  if (el && !el._dgKeyBound) {
    el._dgKeyBound = true;
    el.setAttribute('tabindex', '-1');
    el.addEventListener('keydown', (e) => {
      if (!win.dungeon) return;
      const dirMap = { ArrowUp:'n', ArrowDown:'s', ArrowLeft:'w', ArrowRight:'e' };
      if (dirMap[e.key]) { dgGuiMove(winId, dirMap[e.key]); e.preventDefault(); }
    }, true);
  }
}

function dgGuiMove(winId, dir) {
  const win = windows.get(winId);
  if (!win || !win.dungeon) return;
  let nx = win.dungeon.px, ny = win.dungeon.py;
  if (dir === 'n') ny--;
  else if (dir === 's') ny++;
  else if (dir === 'w') nx--;
  else if (dir === 'e') nx++;
  if (nx < 0 || nx >= DUNGEON_W || ny < 0 || ny >= DUNGEON_H) {
    dgLog(winId, 'A wall blocks your path.', 'warn');
    return;
  }
  win.dungeon.px = nx; win.dungeon.py = ny;
  dgEnterRoom(win);
}

function bootDungeon(win) {
  win.dungeon = null;
  // GUI already in body from buildDungeonBody
}

function dgEnterRoom(win) {
  if (!win.dungeon) return;
  const winId = win.id;
  const { grid, px, py, floor } = win.dungeon;
  const room = grid[py][px];
  win.dungeon.visited.add(px + ',' + py);

  if (room === 'S' || room === '.') {
    dgRenderGUI(win);
    if (room === 'S') dgLog(winId, 'Start room. Head to the stairs (↘).', 'sys');
    else dgLog(winId, 'Empty room.', '');
  } else if (room === '>') {
    if (floor >= 5) {
      const score = win.dungeon.score;
      const items = win.dungeon.inventory.length;
      win.dungeon = null;
      const gui = document.getElementById(`dg-gui-${winId}`);
      if (gui) gui.innerHTML = `
        <div class="dg-start-overlay">
          <div class="dg-start-title" style="color:var(--accent)">VICTORY!</div>
          <div class="dg-start-desc">You conquered all 5 floors!<br>Score: ${score} &bull; Items found: ${items}</div>
          <button class="gui-big-btn primary" onclick="dgGuiEnter(${winId})">PLAY AGAIN</button>
        </div>`;
    } else {
      win.dungeon.floor++;
      win.dungeon.grid = dungeonGenFloor(win.dungeon.floor);
      win.dungeon.px = 0; win.dungeon.py = 0;
      win.dungeon.visited = new Set(['0,0']);
      dgRenderGUI(win);
      dgLog(winId, `Descending to floor ${win.dungeon.floor}...`, 'sys');
    }
  } else if (room === '$') {
    const items = ['Health Potion', 'Power Crystal', 'Iron Shield', 'Speed Rune', 'Magic Scroll'];
    const item = items[Math.floor(Math.random() * items.length)];
    win.dungeon.inventory.push(item);
    win.dungeon.score += 50;
    grid[py][px] = '.';
    if (item === 'Health Potion') win.dungeon.hp = Math.min(win.dungeon.maxHp, win.dungeon.hp + 5);
    if (item === 'Power Crystal') win.dungeon.atk++;
    if (item === 'Iron Shield') win.dungeon.def++;
    dgRenderGUI(win);
    dgLog(winId, `Treasure! Found: ${item}`, 'gold');
  } else if (room === 'X') {
    const dmg = 1 + Math.floor(Math.random() * 3);
    win.dungeon.hp -= dmg;
    grid[py][px] = '.';
    dgRenderGUI(win);
    dgLog(winId, `TRAP! -${dmg} HP`, 'bad');
    if (win.dungeon.hp <= 0) dgDeath(win);
  } else if (room === '!') {
    const enemy = dungeonGenEnemy(floor);
    grid[py][px] = '.';
    // Show combat overlay briefly
    const mapArea = document.getElementById(`dg-map-area-${winId}`);
    if (mapArea) {
      const overlay = document.createElement('div');
      overlay.className = 'dg-combat-overlay';
      overlay.innerHTML = `
        <div class="dg-combat-title">&#9881; ${escHtml(enemy.name)}</div>
        <div class="dg-combat-info">HP: ${enemy.hp} &bull; ATK: ${enemy.atk}</div>
        <div class="dg-combat-info" style="color:var(--text-faint);font-size:9px">Auto-resolving...</div>
      `;
      mapArea.appendChild(overlay);
    }
    // Auto-resolve after 600ms
    setTimeout(() => {
      let ehp = enemy.hp, php = win.dungeon.hp, logLines = [], turns = 0;
      while (ehp > 0 && php > 0 && turns < 20) {
        const pdmg = Math.max(1, win.dungeon.atk + Math.floor(Math.random() * 3) - win.dungeon.def);
        const edmg = Math.max(0, enemy.atk - win.dungeon.def + Math.floor(Math.random() * 2));
        ehp -= pdmg;
        if (ehp <= 0) { logLines.push(`You strike for ${pdmg}! ${enemy.name} defeated!`); break; }
        php -= edmg;
        logLines.push(`You:${pdmg}dmg  ${enemy.name}:${edmg}dmg  (enemy HP:${Math.max(0,ehp)})`);
        turns++;
      }
      win.dungeon.hp = php;
      dgRenderGUI(win);
      logLines.slice(-3).forEach(l => dgLog(winId, l, ''));
      if (php <= 0) {
        dgDeath(win);
      } else {
        const xp = 10 + floor * 5;
        win.dungeon.score += xp;
        dgLog(winId, `Victory! +${xp} score  HP: ${Math.max(0,win.dungeon.hp)}/${win.dungeon.maxHp}`, 'good');
      }
    }, 650);
  }
}

function handleSchoolInput(win, src) {
  printToWindow(win.id, '^ ' + src, 'cmd');
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const rest = parts.slice(1).join(' ');
  const s = win.school;
  switch (cmd) {
    case 'enroll': {
      const subject = rest.toLowerCase();
      if (!SCHOOL_LESSONS[subject]) {
        printToWindow(win.id, '  Unknown subject: ' + subject, 'err');
        printToWindow(win.id, '  Available: python, math, ai, history', 'info');
        break;
      }
      s.subject = subject; s.lessonIdx = 0; s.pendingQuiz = null;
      if (!s.grades[subject]) s.grades[subject] = { correct: 0, total: 0 };
      printToWindow(win.id, '  Enrolled in: ' + subject.toUpperCase(), 'success');
      printToWindow(win.id, '  ' + SCHOOL_LESSONS[subject].length + ' lessons. Type "lesson" to begin.', 'info');
      break;
    }
    case 'lesson': {
      if (!s.subject) { printToWindow(win.id, '  Enroll first: enroll <subject>', 'warn'); break; }
      const lessons = SCHOOL_LESSONS[s.subject];
      if (s.lessonIdx >= lessons.length) { printToWindow(win.id, '  All lessons complete! Type "quiz".', 'success'); break; }
      const lesson = lessons[s.lessonIdx];
      printToWindow(win.id, '  Lesson ' + (s.lessonIdx + 1) + '/' + lessons.length + ': ' + lesson.title, 'sys');
      printToWindow(win.id, '  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'info');
      for (const line of lesson.content.split('\n')) printToWindow(win.id, '  ' + line, '');
      printToWindow(win.id, '');
      s.xp += 20; s.lessonIdx++;
      printToWindow(win.id, '  +20 XP  Total: ' + s.xp + ' XP  [' + schoolLevel(s.xp).name + ']', 'result');
      break;
    }
    case 'quiz': {
      if (!s.subject) { printToWindow(win.id, '  Enroll first.', 'warn'); break; }
      const lessons = SCHOOL_LESSONS[s.subject];
      const qIdx = Math.min(Math.max(0, s.lessonIdx - 1), lessons.length - 1);
      const quiz = lessons[qIdx].quiz;
      s.pendingQuiz = { quiz, subject: s.subject };
      printToWindow(win.id, '  QUIZ: ' + quiz.q, 'sys');
      quiz.opts.forEach((opt, i) => printToWindow(win.id, '    ' + (i+1) + '. ' + opt, 'info'));
      printToWindow(win.id, '  Type: answer 1-4', 'info');
      break;
    }
    case 'answer': {
      if (!s.pendingQuiz) { printToWindow(win.id, '  No active quiz. Type "quiz".', 'warn'); break; }
      const choice = parseInt(rest, 10) - 1;
      const { quiz, subject } = s.pendingQuiz;
      if (isNaN(choice) || choice < 0 || choice > 3) { printToWindow(win.id, '  Enter 1-4.', 'err'); break; }
      if (!s.grades[subject]) s.grades[subject] = { correct: 0, total: 0 };
      s.grades[subject].total++;
      if (choice === quiz.ans) {
        s.grades[subject].correct++; s.xp += 50;
        printToWindow(win.id, '  Correct! +50 XP  Total: ' + s.xp + ' XP  [' + schoolLevel(s.xp).name + ']', 'success');
      } else {
        printToWindow(win.id, '  Incorrect. Correct: ' + quiz.opts[quiz.ans], 'err');
      }
      s.pendingQuiz = null;
      break;
    }
    case 'grade': {
      printToWindow(win.id, '  Grades:', 'sys');
      let any = false;
      for (const [subj, g] of Object.entries(s.grades)) {
        any = true;
        const pct = g.total ? Math.round((g.correct / g.total) * 100) : 0;
        printToWindow(win.id, '    ' + subj.padEnd(10) + ' ' + g.correct + '/' + g.total + ' (' + pct + '%)', 'result');
      }
      if (!any) printToWindow(win.id, '  No quizzes taken yet.', 'info');
      printToWindow(win.id, '  Total XP: ' + s.xp + '  [' + schoolLevel(s.xp).name + ']', 'result');
      break;
    }
    case 'ask': {
      const answer = s.subject && SCHOOL_TEMPLATE_ANSWERS[s.subject]
        ? SCHOOL_TEMPLATE_ANSWERS[s.subject]
        : 'Enroll in a subject first: python, math, ai, or history.';
      printToWindow(win.id, '  Q: ' + (rest || '(empty)'), 'info');
      printToWindow(win.id, '  A: ' + answer, '');
      break;
    }
    case 'clear': clearOutput(win.id); break;
    case 'help': printToWindow(win.id, '  enroll <subject>  lesson  quiz  answer 1-4  grade  ask <q>', 'info'); break;
    default: if (src.trim()) printToWindow(win.id, 'Unknown: ' + src + '. Type "help".', 'warn');
  }
}

function handleTimeCapsuleInput(win, src) {
  printToWindow(win.id, '& ' + src, 'cmd');
  const trimmed = src.trim();
  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  switch (cmd) {
    case 'create': {
      const m = trimmed.slice(6).trim().match(/"([^"]+)"\s+([\d]{4}-[\d]{2}-[\d]{2})/);
      if (!m) { printToWindow(win.id, '  Usage: create "your message" YYYY-MM-DD', 'err'); break; }
      const openDate = new Date(m[2] + 'T00:00:00');
      if (isNaN(openDate.getTime())) { printToWindow(win.id, '  Invalid date.', 'err'); break; }
      const capsule = { id: win.capsules.length + 1, msg: m[1], openDate: m[2], createdAt: new Date().toISOString().slice(0,10), opened: false };
      win.capsules.push(capsule);
      printToWindow(win.id, '  +-------+', 'sys');
      printToWindow(win.id, '  | SEALED|', 'sys');
      printToWindow(win.id, '  |[_____]|', 'sys');
      printToWindow(win.id, '  +-------+', 'sys');
      printToWindow(win.id, '  Capsule #' + capsule.id + ' sealed until ' + capsule.openDate, 'success');
      break;
    }
    case 'diary': {
      const msgMatch = trimmed.slice(5).trim().match(/"([^"]+)"|(.+)/);
      const msg = msgMatch ? (msgMatch[1] || msgMatch[2] || '').trim() : '';
      if (!msg) { printToWindow(win.id, '  Usage: diary "your message"', 'err'); break; }
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const openDate = tomorrow.toISOString().slice(0, 10);
      const capsule = { id: win.capsules.length + 1, msg, openDate, createdAt: new Date().toISOString().slice(0,10), opened: false };
      win.capsules.push(capsule);
      printToWindow(win.id, '  +-------+', 'sys');
      printToWindow(win.id, '  | DIARY |', 'sys');
      printToWindow(win.id, '  |[_____]|', 'sys');
      printToWindow(win.id, '  +-------+', 'sys');
      printToWindow(win.id, '  Diary #' + capsule.id + ' sealed. Opens: ' + openDate, 'success');
      break;
    }
    case 'list': {
      if (!win.capsules.length) { printToWindow(win.id, '  No capsules yet.', 'info'); break; }
      printToWindow(win.id, '  Capsules:', 'sys');
      for (const c of win.capsules) {
        if (c.opened) printToWindow(win.id, '  #' + c.id + ' [OPENED]  "' + c.msg.slice(0,30) + '"', 'success');
        else printToWindow(win.id, '  #' + c.id + ' [SEALED until ' + c.openDate + ']', 'warn');
      }
      break;
    }
    case 'open': {
      const idx = parseInt(parts[1], 10);
      if (isNaN(idx)) { printToWindow(win.id, '  Usage: open <n>', 'err'); break; }
      const capsule = win.capsules.find(c => c.id === idx);
      if (!capsule) { printToWindow(win.id, '  Capsule #' + idx + ' not found.', 'err'); break; }
      if (capsule.opened) { printToWindow(win.id, '  Already opened: "' + capsule.msg + '"', 'info'); break; }
      const today = new Date().toISOString().slice(0, 10);
      if (today < capsule.openDate) {
        printToWindow(win.id, '  Too early! Sealed until ' + capsule.openDate + '.', 'err');
        printToWindow(win.id, '  +-------+', 'sys');
        printToWindow(win.id, '  | SEALED|', 'sys');
        printToWindow(win.id, '  |[_____]|', 'sys');
        printToWindow(win.id, '  +-------+', 'sys');
        break;
      }
      capsule.opened = true;
      printToWindow(win.id, '  +-------+', 'success');
      printToWindow(win.id, '  |OPENED!|', 'success');
      printToWindow(win.id, '  | \\o/   |', 'success');
      printToWindow(win.id, '  +-------+', 'success');
      printToWindow(win.id, '  * * * CAPSULE OPENED * * *', 'success');
      printToWindow(win.id, '');
      printToWindow(win.id, '  "' + capsule.msg + '"', 'result');
      printToWindow(win.id, '');
      printToWindow(win.id, '  Created: ' + capsule.createdAt + '  Opened: ' + today, 'info');
      break;
    }
    case 'count': {
      const sealed = win.capsules.filter(c => !c.opened).length;
      const opened = win.capsules.filter(c => c.opened).length;
      printToWindow(win.id, '  Sealed: ' + sealed, 'warn');
      printToWindow(win.id, '  Opened: ' + opened, 'success');
      printToWindow(win.id, '  Total:  ' + win.capsules.length, 'info');
      break;
    }
    case 'clear': clearOutput(win.id); break;
    case 'help': printToWindow(win.id, '  create "msg" YYYY-MM-DD  |  list  |  open <n>  |  diary "msg"  |  count', 'info'); break;
    default: if (src.trim()) printToWindow(win.id, 'Unknown: ' + src + '. Type "help".', 'warn');
  }
}

function romLoaderCard(rom) {
  const h = seedHash(rom.title);
  const rng = mulberry32(h);
  const power = 1 + Math.floor(rng() * 9);
  const toughness = 1 + Math.floor(rng() * 9);
  const rarity = ['common', 'uncommon', 'rare', 'mythic'][Math.floor(rng() * 4)];
  const rating = (3 + rng() * 2).toFixed(1);
  return { power, toughness, rarity, rating };
}

function handleRomLoaderInput(win, src) {
  printToWindow(win.id, '= ' + src, 'cmd');
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const rest = parts.slice(1).join(' ');
  switch (cmd) {
    case 'scan': {
      printToWindow(win.id, '  ROM Library:', 'sys');
      printToWindow(win.id, '  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'info');
      for (const rom of ROMLOADER_LIBRARY) {
        printToWindow(win.id, '  ' + String(rom.id).padStart(2) + '. ' + rom.title.padEnd(22) + ' [' + rom.platform.padEnd(8) + '] ' + rom.year + '  ' + rom.genre, 'result');
      }
      printToWindow(win.id, '  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'info');
      printToWindow(win.id, '  ' + ROMLOADER_LIBRARY.length + ' ROMs in demo library. Use "info <n>" for details.', 'info');
      break;
    }
    case 'info': {
      const n = parseInt(rest, 10);
      const rom = ROMLOADER_LIBRARY.find(r => r.id === n);
      if (!rom) { printToWindow(win.id, '  ROM #' + n + ' not found. Try "scan".', 'err'); break; }
      const c = romLoaderCard(rom);
      printToWindow(win.id, '  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510', 'sys');
      printToWindow(win.id, '  \u2502  ' + rom.title.padEnd(32) + '\u2502', 'sys');
      printToWindow(win.id, '  \u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524', 'sys');
      printToWindow(win.id, '  \u2502  Platform:  ' + rom.platform.padEnd(21) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502  Year:      ' + String(rom.year).padEnd(21) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502  Genre:     ' + rom.genre.padEnd(21) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502  Publisher: ' + rom.publisher.padEnd(21) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502  P/T: ' + c.power + '/' + c.toughness + '  Rarity: ' + c.rarity.padEnd(18) + '\u2502', 'result');
      printToWindow(win.id, '  \u2502  Rating: ' + '\u2605'.repeat(Math.round(c.rating)) + ' (' + c.rating + ')'.padEnd(21) + '\u2502', 'result');
      printToWindow(win.id, '  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518', 'sys');
      win.romloader.history.push({ title: rom.title, at: new Date().toLocaleTimeString() });
      break;
    }
    case 'card': {
      const query = rest.toLowerCase();
      const rom = ROMLOADER_LIBRARY.find(r => r.title.toLowerCase().includes(query) || String(r.id) === query)
        || { id: 0, title: rest || 'Unknown ROM', platform: 'Unknown', year: 0, genre: 'Unknown', publisher: 'Unknown' };
      const c = romLoaderCard(rom);
      printToWindow(win.id, '  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510', 'sys');
      printToWindow(win.id, '  \u2502 ' + rom.title.slice(0,32).padEnd(32) + '\u2502', 'result');
      printToWindow(win.id, '  \u2502 ' + rom.platform.padEnd(16) + String(rom.year).padEnd(16) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502                                 \u2502', '');
      printToWindow(win.id, '  \u2502  POWER / TOUGHNESS             \u2502', 'warn');
      printToWindow(win.id, '  \u2502       ' + String(c.power).padStart(2) + '  /  ' + String(c.toughness).padEnd(2) + '                 \u2502', 'result');
      printToWindow(win.id, '  \u2502                                 \u2502', '');
      printToWindow(win.id, '  \u2502 Genre:  ' + rom.genre.padEnd(24) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502 Rarity: ' + c.rarity.padEnd(24) + '\u2502', 'info');
      printToWindow(win.id, '  \u2502 Rating: ' + '\u2605'.repeat(Math.round(c.rating)) + ' (' + c.rating + ')          \u2502', 'result');
      printToWindow(win.id, '  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518', 'sys');
      break;
    }
    case 'history': {
      if (!win.romloader.history.length) { printToWindow(win.id, '  No history yet. Use "info <n>" to view a ROM.', 'info'); break; }
      printToWindow(win.id, '  View History:', 'sys');
      for (const h of win.romloader.history.slice().reverse()) {
        printToWindow(win.id, '    ' + h.at + '  ' + h.title, 'result');
      }
      break;
    }
    case 'clear': clearOutput(win.id); break;
    case 'help': printToWindow(win.id, '  scan  info <n>  card <title>  history', 'info'); break;
    default: if (src.trim()) printToWindow(win.id, 'Unknown: ' + src + '. Type "help".', 'warn');
  }
}

function handleLispInput(win, src) {
  printToWindow(win.id, `> ${src}`, 'cmd');
  const res = lispEval(src, win.env);
  if (res.output) {
    const lines = res.output.trim().split('\n');
    for (const line of lines) printToWindow(win.id, line, res.ok ? 'success' : 'err');
  }
  if (!isNil(res.result) && res.repr !== '()') {
    if (typeof res.result === 'string') printToWindow(win.id, res.result, 'result');
    else printToWindow(win.id, res.repr, 'result');
  }
  if (!res.ok) printToWindow(win.id, res.repr, 'err');
}

/* ============================================================
   TASKBAR REPL
   ============================================================ */
const replInput = document.getElementById('taskbar-repl-input');
const replOut = document.getElementById('taskbar-repl-out');
const replHistory = [];
let replHistIdx = -1;

replInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const src = replInput.value.trim();
    if (!src) return;
    replHistory.unshift(src);
    replHistIdx = -1;
    const res = lispEval(src);
    const out = res.output ? res.output.trim() : res.repr;
    replOut.textContent = out.length > 60 ? out.slice(0, 60) + '...' : out;
    replOut.className = res.ok ? '' : 'err';
    replInput.value = '';
    e.preventDefault();
  }
  if (e.key === 'ArrowUp') {
    replHistIdx = Math.min(replHistIdx + 1, replHistory.length - 1);
    replInput.value = replHistory[replHistIdx] || '';
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    replHistIdx = Math.max(replHistIdx - 1, -1);
    replInput.value = replHistIdx >= 0 ? replHistory[replHistIdx] : '';
    e.preventDefault();
  }
});

/* ============================================================
   APP LAUNCHER BUILD
   ============================================================ */
function buildLauncher() {
  const grid = document.getElementById('launcher-grid');
  grid.innerHTML = '';
  for (const app of APPS) {
    const btn = document.createElement('div');
    btn.className = 'app-icon-btn';
    btn.dataset.app = app.id;
    btn.title = app.desc;
    btn.innerHTML = `
      <div class="app-icon-glyph" style="color:${app.color}">${escHtml(app.icon)}</div>
      <div class="app-icon-name">${escHtml(app.name)}</div>
    `;
    btn.onclick = () => openApp(app.id);
    grid.appendChild(btn);
  }
}

/* ============================================================
   REGISTRY FETCH
   ============================================================ */
async function fetchRegistry() {
  const urls = [
    'registry.json',
    'https://raw.githubusercontent.com/kody-w/RAR/main/registry.json',
    'https://raw.githubusercontent.com/kody-w/CommunityRAPP/main/RAR/registry.json',
  ];

  for (const url of urls) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
      if (!res.ok) continue;
      const data = await res.json();
      const agents = Array.isArray(data) ? data : (data.agents || Object.values(data));
      if (agents.length) {
        REGISTRY.agents = agents;
        REGISTRY.loaded = true;
        return true;
      }
    } catch {}
  }
  return false;
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const bar = document.getElementById('boot-bar');
  const msg = document.getElementById('boot-msg');
  const screen = document.getElementById('boot-screen');

  const step = async (pct, text, ms = 60) => {
    msg.textContent = text;
    bar.style.width = pct + '%';
    await new Promise(r => setTimeout(r, ms));
  };

  await step(10, 'Initializing LisPy VM...');

  // Smoke-test VM
  const test = lispEval('(+ 1 2 3)');
  if (!test.ok || test.result !== 6) {
    msg.textContent = 'VM ERROR: ' + test.error;
    return;
  }

  await step(30, 'Building app launcher...', 40);
  buildLauncher();

  await step(50, 'Fetching agent registry...', 40);
  // Non-blocking registry fetch
  const registryPromise = fetchRegistry().then(ok => {
    if (ok) addNotification(`Registry loaded: ${REGISTRY.agents.length} agents`);
    else addNotification('Registry offline — demo mode active');
  }).catch(() => addNotification('Registry offline'));

  await step(75, 'Booting desktop environment...', 60);

  await step(100, 'Desktop ready.', 80);
  screen.classList.add('hidden');

  // Show launcher
  showLauncher();

  // Close notif panel on outside click
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('notif-panel');
    const btn = document.getElementById('taskbar-notif-btn');
    if (panel.classList.contains('visible') && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
      panel.classList.remove('visible');
    }
  });

  // Desktop click to close launcher only if there are open windows
  document.getElementById('desktop').addEventListener('click', (e) => {
    if (e.target === document.getElementById('desktop') ||
        e.target === document.getElementById('desktop-watermark') ||
        e.target === document.getElementById('desktop-tagline')) {
      if (windows.size > 0) {
        document.getElementById('launcher').classList.add('hidden');
      }
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      replInput.focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('notif-panel').classList.remove('visible');
    }
    // Ctrl+L = launcher toggle
    if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
      e.preventDefault();
      toggleLauncher();
    }
  });

  await registryPromise.catch(() => {});
}

window.addEventListener('DOMContentLoaded', init);
</script>
