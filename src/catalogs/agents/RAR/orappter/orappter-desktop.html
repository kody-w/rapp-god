const TERMINAL_FS = {
  '/': ['@rapp/', '@kody/', '@discreetRappers/', '@borg/', 'README.md', 'registry.json'],
  '@rapp/': ['basic-agent.py'],
  '@kody/': ['registry-client.py', 'memory-agent.py'],
  '@discreetRappers/': ['pipeline-agent.py', 'sales-agent.py'],
  '@borg/': ['assimilator.py'],
};

let terminalCwd = '/';

function bootTerminal(win) {
  printToWindow(win.id, 'ORAPPTER Terminal v1.0.0', 'sys');
  printToWindow(win.id, 'Registry filesystem loaded. Type "help" for commands.', 'info');
  printToWindow(win.id, '');
}

const TERMINAL_HELP = `Commands:
  ls           — list files
  cd <dir>     — change directory
  cat <file>   — show file contents
  pwd          — print working directory
  whoami       — show user info
  grep <q>     — search registry
  agents       — list loaded agents
  clear        — clear terminal
  help         — this message

LisPy: any (expr) is evaluated directly`;

function handleTerminalInput(win, src) {
  printToWindow(win.id, `${terminalCwd}$ ${src}`, 'cmd');

  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ');

  if (src.startsWith('(')) {
    // LisPy expression
    const res = lispEval(src, win.env);
    if (res.output) printToWindow(win.id, res.output.trim(), res.ok ? 'success' : 'err');
    if (!res.output || res.repr !== '()') {
      printToWindow(win.id, res.repr, res.ok ? 'result' : 'err');
    }
    return;
  }

  switch (cmd) {
    case 'help':
      printToWindow(win.id, TERMINAL_HELP, 'info');
      break;
    case 'pwd':
      printToWindow(win.id, terminalCwd);
      break;
    case 'whoami':
      printToWindow(win.id, 'binder  uid=0(root)  groups=orappter,agents,sovereign', 'success');
      break;
    case 'clear':
      clearOutput(win.id);
      break;
    case 'ls': {
      const path = arg || terminalCwd;
      const key = path.endsWith('/') ? path : path + '/';
      const items = TERMINAL_FS[key] || TERMINAL_FS[terminalCwd] || [];
      if (!items.length && REGISTRY.agents.length) {
        // Dynamic from registry
        const agents = REGISTRY.agents.slice(0, 20).map(a => '  ' + a.name);
        printToWindow(win.id, agents.join('\n') || '  (empty)');
      } else {
        printToWindow(win.id, items.map(i => '  ' + i).join('\n') || '  (empty)');
      }
      break;
    }
    case 'cd':
      if (!arg || arg === '/') { terminalCwd = '/'; printToWindow(win.id, '/'); }
      else { terminalCwd = arg.endsWith('/') ? arg : arg + '/'; printToWindow(win.id, terminalCwd); }
      break;
    case 'cat': {
      if (!arg) { printToWindow(win.id, 'Usage: cat <file>', 'warn'); break; }
      // Look up in registry
      const agentName = arg.startsWith('@') ? arg : (terminalCwd !== '/' ? terminalCwd.replace(/\/$/, '') + '/' + arg : arg);
      const agent = REGISTRY.agents.find(a => a.name === agentName || a.name === arg);
      if (agent) {
        printToWindow(win.id, formatAgentCard(agent), 'info');
      } else if (arg === 'README.md') {
        printToWindow(win.id, 'RAPP — RAPP Agent Registry\nOpen agent registry for CommunityRAPP ecosystem.\n15+ agents. 1 OS. 0 internet required.', 'info');
      } else {
        printToWindow(win.id, `cat: ${arg}: No such file (try resolve-card)`, 'err');
      }
      break;
    }
    case 'grep':
    case 'search':
    case 'agents': {
      const q = arg || '';
      if (!q && cmd === 'agents') {
        printToWindow(win.id, REGISTRY.agents.slice(0, 15).map(a => `  ${a.name.padEnd(35)} ${(a.description || '').slice(0,40)}`).join('\n') || '  Registry not loaded', 'info');
      } else {
        const matches = REGISTRY.agents.filter(a =>
          !q ||
          (a.name || '').toLowerCase().includes(q.toLowerCase()) ||
          (a.description || '').toLowerCase().includes(q.toLowerCase())
        );
        printToWindow(win.id, matches.slice(0, 12).map(a => `  ${a.name} — ${(a.description || '').slice(0,50)}`).join('\n') || '  No matches', 'info');
      }
      break;
    }
    default:
      if (src.trim()) printToWindow(win.id, `${cmd}: command not found (try "help" or use LisPy)`, 'err');
  }
}

function formatAgentCard(a) {
  return [
    '╔══════════════════════════════════════╗',
    `║ ${(a.display_name || a.name || '').slice(0,38).padEnd(38)} ║`,
    `║ name: ${(a.name || '').slice(0,35).padEnd(35)} ║`,
    `║ ver:  ${(a.version || '1.0.0').padEnd(35)} ║`,
    `║ tier: ${(a.quality_tier || 'community').padEnd(35)} ║`,
    `║ cat:  ${(a.category || 'unknown').padEnd(35)} ║`,
    `║ desc: ${(a.description || '').slice(0,35).padEnd(35)} ║`,
    `║ tags: ${(a.tags || []).join(', ').slice(0,35).padEnd(35)} ║`,
    '╚══════════════════════════════════════╝',
  ].join('\n');
}

function bootObsidian(win) {
  renderObsidianSidebar(win);
  renderObsidianDoc(win, 'HOME');
}

function renderObsidianSidebar(win) {
  const sidebar = document.getElementById(`obs-sidebar-${win.id}`);
  if (!sidebar) return;
  sidebar.innerHTML = '<div class="obsidian-sidebar-header">Files</div>' +
    Object.entries(OBSIDIAN_DOCS).map(([slug, doc]) =>
      `<div class="obsidian-file" onclick="obsidianOpen(${win.id}, '${escHtml(slug)}')">${escHtml(doc.title)}</div>`
    ).join('');
}

function obsidianOpen(winId, slug) {
  const win = windows.get(winId);
  if (win) renderObsidianDoc(win, slug);
}

function renderObsidianDoc(win, slug) {
  const doc = OBSIDIAN_DOCS[slug];
  if (!doc) return;
  win.currentDoc = slug;

  // Update sidebar active state
  const sidebar = document.getElementById(`obs-sidebar-${win.id}`);
  if (sidebar) {
    sidebar.querySelectorAll('.obsidian-file').forEach(el => {
      el.classList.toggle('active', el.textContent === doc.title);
    });
  }

  const main = document.getElementById(`obs-main-${win.id}`);
  if (!main) return;

  // Simple markdown render
  let html = doc.content
    .replace(/^###\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/\[\[([^\]]+)\]\]/g, (_, t) => `<a style="color:var(--accent-purple);cursor:pointer" onclick="obsidianOpen(${win.id},'${t.trim()}')">${t.trim()}</a>`)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^- \[ \] (.+)$/gm, '<li style="list-style:none">&#9744; $1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>')
    .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent-purple);padding:4px 12px;margin:8px 0;color:var(--text-muted)">$1</blockquote>')
    .replace(/^\|(.+)\|\s*$/gm, (row) => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td style="padding:3px 8px;border:1px solid var(--border)">${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    })
    .replace(/((<tr>.*<\/tr>\n?)+)/g, '<table style="border-collapse:collapse;margin:8px 0;width:100%">$1</table>')
    .replace(/#([\w-]+)/g, '<span style="color:var(--accent-purple);font-size:11px">#$1</span>');

  // Wrap paragraphs
  const finalLines = html.split('\n');
  let result = [];
  for (const line of finalLines) {
    const t = line.trim();
    if (!t) { result.push(''); continue; }
    if (/^<(h[1-6]|ul|ol|li|table|tr|blockquote|pre|hr)/.test(t)) { result.push(t); }
    else result.push(`<p>${t}</p>`);
  }

  main.innerHTML = result.join('\n');
  main.scrollTop = 0;
}

function handleObsidianInput(win, src) {
  // Obsidian uses its own sidebar, but also has a command input (at bottom)
  const main = document.getElementById(`obs-main-${win.id}`);
  if (!main) return;

  if (src.startsWith('(')) {
    const res = lispEval(src, win.env);
    const out = res.output ? res.output.trim() : res.repr;
    main.innerHTML = `<pre style="color:var(--accent);font-family:var(--font-mono);font-size:11px;white-space:pre-wrap">${escHtml(out)}</pre>` + main.innerHTML;
    return;
  }

  const [cmd, ...args] = src.trim().split(/\s+/);
  switch (cmd.toLowerCase()) {
    case 'ls':
    case 'list':
      main.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)"><strong>Documents:</strong><br>${Object.values(OBSIDIAN_DOCS).map(d => `  ${d.title}`).join('<br>')}</div>` + main.innerHTML;
      break;
    case 'open':
      if (args.length) renderObsidianDoc(win, args.join(' '));
      break;
    case 'search': {
      const q = args.join(' ').toLowerCase();
      const matches = Object.entries(OBSIDIAN_DOCS).filter(([_, d]) =>
        d.title.toLowerCase().includes(q) || d.content.toLowerCase().includes(q)
      );
      main.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)"><strong>Search: "${args.join(' ')}"</strong><br>${matches.map(([s,d]) => `  ${d.title}`).join('<br>') || '  No results'}</div>` + main.innerHTML;
      break;
    }
    default:
      if (src.trim()) main.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint)">Commands: ls, open "title", search "query", or LisPy</div>` + main.innerHTML;
  }
}

const TETROMINOS = {
  I: { shape: [[1,1,1,1]], color: '#58a6ff' },
  O: { shape: [[1,1],[1,1]], color: '#ffa657' },
  T: { shape: [[0,1,0],[1,1,1]], color: '#a371f7' },
  S: { shape: [[0,1,1],[1,1,0]], color: '#3fb950' },
  Z: { shape: [[1,1,0],[0,1,1]], color: '#f85149' },
  J: { shape: [[1,0,0],[1,1,1]], color: '#1f6feb' },
  L: { shape: [[0,0,1],[1,1,1]], color: '#ff7b72' },
};
const TETROMINO_KEYS = Object.keys(TETROMINOS);

function makeTetrisState(winId) {
  const COLS = 10, ROWS = 20, CELL = 18;
  return {
    winId,
    cols: COLS, rows: ROWS, cellSize: CELL,
    board: Array.from({length: ROWS}, () => Array(COLS).fill(null)),
    current: null,
    next: randomTetromino(),
    score: 0, level: 1, lines: 0,
    gameOver: false,
    running: false,
    dropInterval: 800,
    lastDrop: 0,
  };
}

function randomTetromino() {
  const key = TETROMINO_KEYS[Math.floor(Math.random() * TETROMINO_KEYS.length)];
  const t = TETROMINOS[key];
  return {
    key,
    shape: t.shape.map(r => [...r]),
    color: t.color,
    x: 3,
    y: 0,
  };
}

/* GUI button helpers for Tetris */
function tetrisGuiStart(winId) {
  const win = windows.get(winId);
  if (!win) return;
  if (win.tetrisLoop) clearInterval(win.tetrisLoop);
  win.tetrisState = makeTetrisState(winId);
  const st = win.tetrisState;
  const canvas = document.getElementById(`tboard-${winId}`);
  if (canvas) { canvas.width = st.cols * st.cellSize; canvas.height = st.rows * st.cellSize; }
  st.running = true;
  st.current = spawnTetromino(st);
  const statusEl = document.getElementById(`t-status-${winId}`);
  if (statusEl) statusEl.textContent = 'Arrow keys | ↑=rotate | Space=drop';
  const startBtn = document.getElementById(`t-startbtn-${winId}`);
  if (startBtn) startBtn.textContent = 'RESTART';
  win.tetrisLoop = setInterval(() => tetrisTick(st), st.dropInterval);
  drawTetrisBoard(st);
}
function tetrisGuiMove(winId, dx) {
  const win = windows.get(winId);
  if (win && win.tetrisState && win.tetrisState.running) tetrisMove(win.tetrisState, dx, 0);
}
function tetrisGuiRotate(winId) {
  const win = windows.get(winId);
  if (win && win.tetrisState && win.tetrisState.running) tetrisRotate(win.tetrisState);
}
function tetrisGuiDrop(winId) {
  const win = windows.get(winId);
  if (win && win.tetrisState && win.tetrisState.running) tetrisHardDrop(win.tetrisState);
}

function bootTetris(win) {
  win.tetrisState = makeTetrisState(win.id);
  const canvas = document.getElementById(`tboard-${win.id}`);
  if (canvas) {
    canvas.width = win.tetrisState.cols * win.tetrisState.cellSize;
    canvas.height = win.tetrisState.rows * win.tetrisState.cellSize;
    drawTetrisBoard(win.tetrisState);
  }
  // Keyboard controls: listen on the window element so focus isn't required on hidden input
  const el = document.getElementById(`win-${win.id}`);
  if (el) {
    el.setAttribute('tabindex', '-1');
    el.addEventListener('keydown', (e) => {
      const st = win.tetrisState;
      if (!st || !st.running) {
        if (e.key === 'Enter' || e.key === ' ') { tetrisGuiStart(win.id); e.preventDefault(); }
        return;
      }
      switch (e.key) {
        case 'ArrowLeft':  tetrisMove(st, -1, 0); e.preventDefault(); break;
        case 'ArrowRight': tetrisMove(st, 1, 0);  e.preventDefault(); break;
        case 'ArrowDown':  tetrisDrop(st);         e.preventDefault(); break;
        case 'ArrowUp':    tetrisRotate(st);        e.preventDefault(); break;
        case ' ':          tetrisHardDrop(st);      e.preventDefault(); break;
        case 'Enter':      tetrisGuiStart(win.id);  e.preventDefault(); break;
      }
    }, true);
  }
  // Also wire the hidden inp for legacy text commands
  const inp = document.getElementById(`inp-${win.id}`);
  if (inp) {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const src = inp.value.trim();
        if (!src) return;
        handleTetrisInput(win, src);
        inp.value = '';
        e.preventDefault();
      }
    });
  }
}

function handleTetrisInput(win, src) {
  const st = win.tetrisState;
  if (!st) return;

  const cmd = src.trim().toLowerCase().replace(/[()]/g, '');

  if (cmd === 'start' || cmd === 'restart') {
    tetrisGuiStart(win.id);
    return;
  }

  if (!st.running) { return; }

  switch (cmd) {
    case 'l': case 'left':   tetrisMove(st, -1, 0); break;
    case 'r': case 'right':  tetrisMove(st, 1, 0); break;
    case 't': case 'turn':   tetrisRotate(st); break;
    case 's': case 'soft':   tetrisDrop(st); break;
    case 'd': case 'drop':   tetrisHardDrop(st); break;
    default:
      if (src.startsWith('(')) {
        const res = lispEval(src, win.env);
        const statusEl = document.getElementById(`t-status-${win.id}`);
        if (statusEl) statusEl.textContent = res.output ? res.output.trim() : res.repr;
      }
  }
}

function spawnTetromino(st) {
  const t = st.next;
  t.x = Math.floor((st.cols - t.shape[0].length) / 2);
  t.y = 0;
  st.next = randomTetromino();
  if (tetrisCollides(st, t, 0, 0)) { st.gameOver = true; st.running = false; }
  drawTetrisNext(st);
  return t;
}

function tetrisCollides(st, t, dx, dy, shape) {
  const s = shape || t.shape;
  for (let r = 0; r < s.length; r++) {
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      const nx = t.x + c + dx;
      const ny = t.y + r + dy;
      if (nx < 0 || nx >= st.cols || ny >= st.rows) return true;
      if (ny >= 0 && st.board[ny][nx]) return true;
    }
  }
  return false;
}

function tetrisMove(st, dx, dy) {
  if (!st.current || st.gameOver) return;
  if (!tetrisCollides(st, st.current, dx, dy)) {
    st.current.x += dx;
    st.current.y += dy;
    drawTetrisBoard(st);
  }
}

function tetrisDrop(st) {
  if (!st.current || st.gameOver) return;
  if (!tetrisCollides(st, st.current, 0, 1)) {
    st.current.y += 1;
  } else {
    lockTetromino(st);
  }
  drawTetrisBoard(st);
}

function tetrisHardDrop(st) {
  if (!st.current || st.gameOver) return;
  while (!tetrisCollides(st, st.current, 0, 1)) st.current.y++;
  lockTetromino(st);
  drawTetrisBoard(st);
}

function tetrisRotate(st) {
  if (!st.current || st.gameOver) return;
  const shape = st.current.shape;
  const rotated = shape[0].map((_, i) => shape.map(row => row[i]).reverse());
  if (!tetrisCollides(st, st.current, 0, 0, rotated)) {
    st.current.shape = rotated;
    drawTetrisBoard(st);
  }
}

function lockTetromino(st) {
  const t = st.current;
  for (let r = 0; r < t.shape.length; r++) {
    for (let c = 0; c < t.shape[r].length; c++) {
      if (!t.shape[r][c]) continue;
      const ny = t.y + r;
      if (ny >= 0) st.board[ny][t.x + c] = t.color;
    }
  }
  clearLines(st);
  st.current = spawnTetromino(st);
  if (st.gameOver) {
    const statusEl = document.getElementById(`t-status-${st.winId}`);
    if (statusEl) statusEl.textContent = `Game Over! Score: ${st.score}`;
    const startBtn = document.getElementById(`t-startbtn-${st.winId}`);
    if (startBtn) startBtn.textContent = 'PLAY AGAIN';
    const winObj = windows.get(st.winId);
    if (winObj && winObj.tetrisLoop) { clearInterval(winObj.tetrisLoop); winObj.tetrisLoop = null; }
  }
}

function clearLines(st) {
  let cleared = 0;
  for (let r = st.rows - 1; r >= 0; r--) {
    if (st.board[r].every(c => c !== null)) {
      st.board.splice(r, 1);
      st.board.unshift(Array(st.cols).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    const points = [0, 100, 300, 500, 800][cleared] || 800;
    st.score += points * st.level;
    st.lines += cleared;
    st.level = Math.floor(st.lines / 10) + 1;
    const newInterval = Math.max(100, 800 - (st.level - 1) * 70);
    const win = windows.get(st.winId);
    if (win && win.tetrisLoop && newInterval !== st.dropInterval) {
      clearInterval(win.tetrisLoop);
      st.dropInterval = newInterval;
      win.tetrisLoop = setInterval(() => tetrisTick(st), st.dropInterval);
    }
    document.getElementById(`t-score-${st.winId}`).textContent = st.score;
    document.getElementById(`t-level-${st.winId}`).textContent = st.level;
    document.getElementById(`t-lines-${st.winId}`).textContent = st.lines;
  }
}

function tetrisTick(st) {
  if (!st.running || st.gameOver) return;
  tetrisDrop(st);
}

function drawTetrisBoard(st) {
  const canvas = document.getElementById(`tboard-${st.winId}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const C = st.cellSize;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#1c2128';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < st.rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * C); ctx.lineTo(canvas.width, r * C); ctx.stroke();
  }
  for (let c = 0; c < st.cols; c++) {
    ctx.beginPath(); ctx.moveTo(c * C, 0); ctx.lineTo(c * C, canvas.height); ctx.stroke();
  }

  // Board cells
  for (let r = 0; r < st.rows; r++) {
    for (let c = 0; c < st.cols; c++) {
      const color = st.board[r][c];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(c * C + 1, r * C + 1, C - 2, C - 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(c * C + 1, r * C + 1, C - 2, 4);
      }
    }
  }

  // Ghost piece
  if (st.current && !st.gameOver) {
    let ghostY = st.current.y;
    while (!tetrisCollides(st, st.current, 0, ghostY - st.current.y + 1)) ghostY++;
    const s = st.current.shape;
    for (let r = 0; r < s.length; r++) {
      for (let c = 0; c < s[r].length; c++) {
        if (!s[r][c]) continue;
        const gr = ghostY + r, gc = st.current.x + c;
        if (gr >= 0 && gr < st.rows) {
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect(gc * C + 1, gr * C + 1, C - 2, C - 2);
        }
      }
    }

    // Current piece
    for (let r = 0; r < s.length; r++) {
      for (let c = 0; c < s[r].length; c++) {
        if (!s[r][c]) continue;
        const pr = st.current.y + r, pc = st.current.x + c;
        if (pr >= 0) {
          ctx.fillStyle = st.current.color;
          ctx.fillRect(pc * C + 1, pr * C + 1, C - 2, C - 2);
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.fillRect(pc * C + 1, pr * C + 1, C - 2, 4);
        }
      }
    }
  }

  if (st.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f85149';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillStyle = '#8b949e';
    ctx.font = '13px monospace';
    ctx.fillText(`Score: ${st.score}`, canvas.width / 2, canvas.height / 2 + 15);
    ctx.fillText(`(start) to replay`, canvas.width / 2, canvas.height / 2 + 35);
  }
}

function drawTetrisNext(st) {
  const canvas = document.getElementById(`tnext-${st.winId}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, 60, 60);

  const t = st.next;
  const C = 12;
  const offsetX = Math.floor((60 - t.shape[0].length * C) / 2);
  const offsetY = Math.floor((60 - t.shape.length * C) / 2);

  for (let r = 0; r < t.shape.length; r++) {
    for (let c = 0; c < t.shape[r].length; c++) {
      if (!t.shape[r][c]) continue;
      ctx.fillStyle = t.color;
      ctx.fillRect(offsetX + c * C + 1, offsetY + r * C + 1, C - 2, C - 2);
    }
  }
}

function handleCardsInput(win, src) {
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (src.startsWith('(')) {
    const res = lispEval(src, win.env);
    if (res.output) printToWindow(win.id, res.output.trim(), res.ok ? 'success' : 'err');
    if (!isNil(res.result) && res.repr !== '()') {
      if (typeof res.result === 'string') printToWindow(win.id, res.result, 'result');
      else printToWindow(win.id, res.repr, 'result');
    }
    if (!res.ok) printToWindow(win.id, res.repr, 'err');
    return;
  }
  // Also accept shell-style: "search sales"
  const [cmd, ...args] = src.trim().split(/\s+/);
  switch (cmd.toLowerCase()) {
    case 'search':
      handleLispInput(win, `(search "${args.join(' ')}")`); break;
    case 'resolve':
    case 'card':
      handleLispInput(win, `(resolve-card "${args.join(' ')}")`); break;
    case 'status':
      handleLispInput(win, '(binder-status)'); break;
    case 'ls':
    case 'list':
      handleLispInput(win, '(agents)'); break;
    case 'clear':
      clearOutput(win.id); break;
    case 'help':
      printToWindow(win.id, 'Commands: (resolve-card "@x/y") (search "q") (binder-status) (agents)', 'info');
      break;
    default:
      if (src.trim()) printToWindow(win.id, `Unknown: ${src} (wrap in parens for LisPy)`, 'warn');
  }
}

/* ============================================================
   RAPPTERDAEMON APP  — Turn-based RPG
   ============================================================ */
const DAEMON_PREFIXES = ['Glitch','Flux','Nova','Byte','Null','Void','Arc','Hex','Ping','Echo','Sync','Kron','Nyx','Zap','Core'];
const DAEMON_SUFFIXES = ['mon','dex','tron','byte','net','forge','spark','glyph','bit','node','flux','wave','code','run','bot'];
const DAEMON_TYPES = ['core','pipeline','integrations','productivity','devtools'];
const DAEMON_MOVES = {
  core:         ['Root Strike','Dependency Chain','Package Bomb','Fork Blast'],
  pipeline:     ['Data Flow','Async Rush','Buffer Drain','Stream Slash'],
  integrations: ['API Spike','Webhook Flare','OAuth Surge','REST Barrage'],
  productivity: ['Focus Burst','Todo Sweep','Sprint Dash','Deep Work'],
  devtools:     ['Debug Ray','Stack Trace','Lint Lash','Deploy Drop'],
};

function makeDaemon(name, level, type) {
  const t = type || DAEMON_TYPES[Math.floor(Math.random() * DAEMON_TYPES.length)];
  const rng = mulberry32(seedHash(name + level));
  const base = 20 + level * 3;
  return {
    name,
    level: level || 1,
    type: t,
    hp: base + Math.floor(rng() * 10),
    maxHp: base + Math.floor(rng() * 10),
    atk: 5 + Math.floor(rng() * 5) + Math.floor(level / 3),
    def: 3 + Math.floor(rng() * 3) + Math.floor(level / 4),
    xp: 0,
    xpNeeded: level * 20,
    moves: DAEMON_MOVES[t],
    caught: false,
  };
}

function makeWildDaemon(locationLevel) {
  const lvl = locationLevel + Math.floor(Math.random() * 4) - 1;
  const safeLvl = Math.max(1, lvl);
  const n = DAEMON_PREFIXES[Math.floor(Math.random() * DAEMON_PREFIXES.length)] +
            DAEMON_SUFFIXES[Math.floor(Math.random() * DAEMON_SUFFIXES.length)];
  return makeDaemon(n, safeLvl);
}

const STARTER_DAEMONS = [
  makeDaemon('Coremon', 5, 'core'),
  makeDaemon('Pipelix', 5, 'pipeline'),
  makeDaemon('Devtron', 5, 'devtools'),
];

function daemonHpBar(d) {
  const pct = Math.max(0, d.hp / d.maxHp);
  const filled = Math.round(pct * 16);
  const bar = '='.repeat(filled) + '-'.repeat(16 - filled);
  const col = pct > 0.5 ? 'success' : pct > 0.2 ? 'warn' : 'err';
  return { bar: `[${bar}] ${d.hp}/${d.maxHp}`, col };
}

function rdGuiExplore(winId) {
  const win = windows.get(winId);
  if (!win) return;
  const st = win.rdState;
  const roll = Math.random();
  if (roll < 0.5) {
    st.wild = makeWildDaemon(st.locationLevel);
    st.phase = 'battle';
    const gui = document.getElementById(`rd-gui-${win.id}`);
    if (gui) { gui.classList.add('rd-flash'); setTimeout(() => gui.classList.remove('rd-flash'), 400); }
    setTimeout(() => rdRenderBattle(win), 420);
  } else if (roll < 0.7) {
    st.items.potion = (st.items.potion || 0) + 1;
    st.locationLevel = Math.min(st.locationLevel + 1, 50);
    rdRenderOverworld(win);
    setTimeout(() => rdLog(win.id, 'You found a Potion!', 'good'), 50);
  } else {
    st.locationLevel = Math.min(st.locationLevel + 1, 50);
    rdRenderOverworld(win);
    setTimeout(() => rdLog(win.id, 'Nothing here... the path is quiet.', ''), 50);
  }
}

function rdGuiHeal(winId) {
  const win = windows.get(winId);
  if (!win) return;
  const st = win.rdState;
  if (st.items.potion > 0) {
    st.items.potion--;
    st.party.forEach(d => { d.hp = d.maxHp; });
    rdRenderOverworld(win);
    setTimeout(() => rdLog(win.id, `Party healed! (${st.items.potion} potions left)`, 'good'), 50);
  } else {
    rdRenderOverworld(win);

function rdGuiBackToExplore(winId) {

function rdGuiFight(winId, moveIdx) {
  const win = windows.get(winId);
  if (!win) return;
  const st = win.rdState;
  if (st.phase !== 'battle' || !st.wild || !st.active) return;
  const moveName = st.active.moves[moveIdx - 1] || st.active.moves[0];
  const playerDmg = Math.max(1, st.active.atk - Math.floor(st.wild.def / 2) + Math.floor(Math.random() * 5));
  st.wild.hp = Math.max(0, st.wild.hp - playerDmg);
  rdLog(win.id, `${st.active.name} used ${moveName}! -${playerDmg} HP`, 'good');
  rdRenderHP(win.id, 'wild', st.wild);

  if (st.wild.hp === 0) {
    const xp = 10 + st.wild.level * 5;
    st.active.xp += xp;
    rdLog(win.id, `${st.wild.name} fainted! +${xp} XP`, 'good');
    if (st.active.xp >= st.active.xpNeeded) {
      st.active.level++;
      st.active.xp -= st.active.xpNeeded;
      st.active.xpNeeded = st.active.level * 20;
      st.active.maxHp += 3; st.active.hp = st.active.maxHp;
      st.active.atk += 1; st.active.def += 1;
      rdLog(win.id, `${st.active.name} grew to Lv.${st.active.level}!`, 'sys');
    }
    st.phase = 'explore'; st.wild = null;
    setTimeout(() => rdRenderOverworld(win), 700);
    return;
  }

  // Enemy turn
  const eMoveIdx = Math.floor(Math.random() * st.wild.moves.length);
  const eMoveName = st.wild.moves[eMoveIdx];
  const enemyDmg = Math.max(1, st.wild.atk - Math.floor(st.active.def / 2) + Math.floor(Math.random() * 4));
  st.active.hp = Math.max(0, st.active.hp - enemyDmg);
  rdLog(win.id, `${st.wild.name} used ${eMoveName}! -${enemyDmg} HP`, 'bad');
  rdRenderHP(win.id, 'player', st.active);
  if (st.active.hp === 0) { rdGuiHandleFaint(win); }
}

function rdGuiCatch(winId) {
  const win = windows.get(winId);
  if (!win) return;
  const st = win.rdState;
  if (!st.wild) return;
  const catchRate = 0.3 + (1 - st.wild.hp / st.wild.maxHp) * 0.5;
  rdLog(win.id, 'Throwing daemon ball...', 'sys');
  if (Math.random() < catchRate) {
    st.wild.caught = true;
    if (st.party.length < 6) { st.party.push(st.wild); rdLog(win.id, `Caught ${st.wild.name}! Added to party.`, 'good'); }
    else rdLog(win.id, `Caught ${st.wild.name}! Party full — released.`, 'good');
    st.phase = 'explore'; st.wild = null;
    setTimeout(() => rdRenderOverworld(win), 700);
  } else {
    rdLog(win.id, `${st.wild.name} broke free!`, 'warn');
    const dmg = Math.max(1, st.wild.atk - Math.floor(st.active.def / 2) + Math.floor(Math.random() * 3));
    st.active.hp = Math.max(0, st.active.hp - dmg);
    rdLog(win.id, `${st.wild.name} attacks! -${dmg} HP`, 'bad');
    rdRenderHP(win.id, 'player', st.active);
    if (st.active.hp === 0) { rdGuiHandleFaint(win); }
  }
}

function rdGuiRun(winId) {
  const win = windows.get(winId);
  if (!win) return;
  const st = win.rdState;
  const fled = Math.random() > 0.4;
  if (fled) {
    rdLog(win.id, 'Got away safely!', 'good');
    st.phase = 'explore'; st.wild = null;
    setTimeout(() => rdRenderOverworld(win), 500);
  } else {
    rdLog(win.id, "Can't escape!", 'bad');
    const dmg = Math.max(1, st.wild.atk - st.active.def + Math.floor(Math.random() * 4));
    st.active.hp = Math.max(0, st.active.hp - dmg);
    rdLog(win.id, `${st.wild.name} attacks! -${dmg} HP`, 'bad');
    rdRenderHP(win.id, 'player', st.active);
    if (st.active.hp === 0) { rdGuiHandleFaint(win); }
  }
}

function rdGuiHandleFaint(win) {
  const st = win.rdState;
  rdLog(win.id, `${st.active.name} fainted!`, 'bad');
  const next = st.party.find(d => d.hp > 0 && d !== st.active);
  if (next) {
    st.active = next;
    rdLog(win.id, `Go! ${next.name}!`, 'warn');
    rdRenderBattle(win);
  } else {
    rdLog(win.id, 'All daemons fainted! Blacked out...', 'bad');
    st.party.forEach(d => { d.hp = Math.floor(d.maxHp * 0.3); });
    st.active = st.party[0];
    st.phase = 'explore'; st.wild = null;
    setTimeout(() => rdRenderOverworld(win), 1000);
  }
}

/* ============================================================
   SYNTH APP  — Web Audio synthesizer
   ============================================================ */
const SYNTH_WAVEFORMS = { core: 'sine', pipeline: 'sawtooth', integrations: 'square', productivity: 'triangle', devtools: 'square' };

// NOTE FREQUENCIES (Hz)
const NOTE_FREQS = {
  'C4':261.63, 'C#4':277.18, 'D4':293.66, 'D#4':311.13, 'E4':329.63,
  'F4':349.23, 'F#4':369.99, 'G4':392.00, 'G#4':415.30, 'A4':440.00,
  'A#4':466.16, 'B4':493.88, 'C5':523.25,
};
const SYNTH_KEYMAP = { a:'C4', w:'C#4', s:'D4', e:'D#4', d:'E4', f:'F4', t:'F#4', g:'G4', y:'G#4', h:'A4', u:'A#4', j:'B4', k:'C5' };

function bootSynth(win) {
  win.synthGuiState = {
    audioCtx: null,
    analyser: null,
    gainNode: null,
    waveform: 'sine',
    volume: 0.6,
    bpm: 120,
    activeNodes: {},  // keyIdx -> {osc, gain}
    scopeAnim: null,
  };
  // Boot keyboard listener
  requestAnimationFrame(() => synthGuiInit(win.id));
}

function synthGuiGetCtx(wid) {
  const win = windows.get(wid);
  if (!win) return null;
  const st = win.synthGuiState;
  if (!st.audioCtx) {
    try {
      st.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      st.gainNode = st.audioCtx.createGain();
      st.gainNode.gain.setValueAtTime(st.volume, st.audioCtx.currentTime);
      st.analyser = st.audioCtx.createAnalyser();
      st.analyser.fftSize = 256;
      st.gainNode.connect(st.analyser);
      st.analyser.connect(st.audioCtx.destination);
    } catch(e) { return null; }
  }
  if (st.audioCtx.state === 'suspended') st.audioCtx.resume();
  return st.audioCtx;
}

function synthGuiInit(wid) {
  const win = windows.get(wid);
  if (!win) return;
  // Start scope animation
  synthGuiStartScope(wid);
  // Keyboard listener
  win._synthKeyDown = (e) => {
    const note = SYNTH_KEYMAP[e.key.toLowerCase()];
    if (!note) return;
    const keys = document.querySelectorAll(`#synth-piano-${wid} .piano-key`);
    keys.forEach((k, i) => { if (k.dataset.note === note) synthGuiPlayNote(wid, note, i); });
  };
  win._synthKeyUp = (e) => {
    const note = SYNTH_KEYMAP[e.key.toLowerCase()];
    if (!note) return;
    const keys = document.querySelectorAll(`#synth-piano-${wid} .piano-key`);
    keys.forEach((k, i) => { if (k.dataset.note === note) synthGuiStopNote(wid, i); });
  };
  document.addEventListener('keydown', win._synthKeyDown);
  document.addEventListener('keyup', win._synthKeyUp);
}

function synthGuiStartScope(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.synthGuiState;
  const canvas = document.getElementById(`synth-scope-${wid}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const draw = () => {
    st.scopeAnim = requestAnimationFrame(draw);
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#060610';
    ctx.fillRect(0, 0, w, h);
    if (st.analyser) {
      const buf = new Uint8Array(st.analyser.frequencyBinCount);
      st.analyser.getByteTimeDomainData(buf);
      ctx.strokeStyle = '#a371f7';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const sliceW = w / buf.length;
      let ix = 0;
      for (let i = 0; i < buf.length; i++) {
        const v = buf[i] / 128.0;
        const y = v * h / 2;
        i === 0 ? ctx.moveTo(ix, y) : ctx.lineTo(ix, y);
        ix += sliceW;
      }
      ctx.stroke();
    } else {
      // Draw flat line when idle
      ctx.strokeStyle = '#2a2a60';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, h/2);
      ctx.lineTo(w, h/2);
      ctx.stroke();
    }
  };
  draw();
}

function synthGuiPlayNote(wid, note, keyIdx) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.synthGuiState;
  if (st.activeNodes[keyIdx]) return; // already playing
  const ctx = synthGuiGetCtx(wid);
  if (!ctx) return;
  const freq = NOTE_FREQS[note] || 440;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = st.waveform;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
  osc.connect(gain);
  gain.connect(st.gainNode);
  osc.start();
  st.activeNodes[keyIdx] = {osc, gain};
  // Visual
  const keyEl = document.getElementById(`synth-key-${wid}-${keyIdx}`);
  if (keyEl) keyEl.classList.add('active');
  // Display freq
  const freqEl = document.getElementById(`synth-freq-${wid}`);
  if (freqEl) freqEl.textContent = `${note}  ${freq.toFixed(1)} Hz`;
}

function synthGuiStopNote(wid, keyIdx) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.synthGuiState;
  const node = st.activeNodes[keyIdx];
  if (node) {
    try {
      node.gain.gain.linearRampToValueAtTime(0, node.gain.context.currentTime + 0.08);
      node.osc.stop(node.gain.context.currentTime + 0.1);
    } catch(e) {}
    delete st.activeNodes[keyIdx];
  }
  const keyEl = document.getElementById(`synth-key-${wid}-${keyIdx}`);
  if (keyEl) keyEl.classList.remove('active');
}

}

function synthGuiPlayChord(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const ctx = synthGuiGetCtx(wid);
  if (!ctx) return;
  const st = win.synthGuiState;
  const slots = [
    (document.getElementById(`synth-slot1-${wid}`) || {}).value || '',
    (document.getElementById(`synth-slot2-${wid}`) || {}).value || '',
    (document.getElementById(`synth-slot3-${wid}`) || {}).value || '',
  ].filter(Boolean);
  if (!slots.length) { addNotification('Synth: Enter card names in the slots first'); return; }
  slots.forEach(card => {
    const p = synthCardToParams(card);
    synthPlayTone(ctx, p.freq, p.waveform, p.gain * 0.6, 2.0, ctx.currentTime);
  });
  addNotification(`Chord: ${slots.join(' + ')}`);
}

function synthGuiPlaySequence(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const ctx = synthGuiGetCtx(wid);
  if (!ctx) return;
  const st = win.synthGuiState;
  const slots = [
    (document.getElementById(`synth-slot1-${wid}`) || {}).value || '',
    (document.getElementById(`synth-slot2-${wid}`) || {}).value || '',
    (document.getElementById(`synth-slot3-${wid}`) || {}).value || '',
  ].filter(Boolean);
  if (!slots.length) { addNotification('Synth: Enter card names in the slots first'); return; }
  const beatDur = 60 / st.bpm;
  slots.forEach((card, i) => {
    const p = synthCardToParams(card);
    synthPlayTone(ctx, p.freq, p.waveform, p.gain, beatDur * 0.9, ctx.currentTime + i * beatDur);
  });
  addNotification(`Sequence @ ${st.bpm}BPM: ${slots.join(' → ')}`);
}

function synthGuiStop(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.synthGuiState;
  // Stop all active notes
  Object.keys(st.activeNodes).forEach(k => synthGuiStopNote(wid, parseInt(k)));
  if (st.audioCtx) { st.audioCtx.close(); st.audioCtx = null; st.gainNode = null; st.analyser = null; }
  addNotification('Synth stopped');
}

function synthGetOrCreateCtx(win) {
  if (!win.synthState.audioCtx) {
    try { win.synthState.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (win.synthState.audioCtx.state === 'suspended') win.synthState.audioCtx.resume();
  return win.synthState.audioCtx;
}

function synthCardToParams(cardName) {
  const hash = seedHash(cardName);
  const rng = mulberry32(hash);
  const freq = 200 + Math.floor(rng() * 600);
  const gain = 0.15 + rng() * 0.25;
  const parts = cardName.split('/');
  const slug = parts[1] || parts[0];
  const agent = REGISTRY.agents.find(a => a.name === cardName || a.slug === slug);
  const cat = agent ? (agent.category || 'core') : DAEMON_TYPES[Math.floor(rng() * DAEMON_TYPES.length)];
  const waveform = SYNTH_WAVEFORMS[cat] || 'sine';
  return { freq, gain, waveform, cat };
}

function synthPlayTone(ctx, freq, waveform, gain, duration, startTime) {
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.type = waveform;
  osc.frequency.setValueAtTime(freq, startTime);
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(gain, startTime + 0.02);
  gainNode.gain.linearRampToValueAtTime(0, startTime + duration - 0.05);
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
  return osc;
}

function synthAsciiWave(waveform, freq) {
  const waves = {
    sine:     '∿∿∿∿∿∿∿∿∿∿∿∿',
    sawtooth: '/|/|/|/|/|/|',
    square:   '⊓_⊓_⊓_⊓_⊓_',
    triangle: '/\\/\\/\\/\\/\\',
  };
  return `[${waves[waveform] || '~~~~~~~'}] ${freq}Hz`;
}

function handleSynthInput(win, src) {
  const st = win.synthState;
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (cmd === 'stop') {
    if (st.audioCtx) { st.audioCtx.close(); st.audioCtx = null; }
    st.nodes = [];
    printToWindow(win.id, 'All sound stopped.', 'info');
    return;
  }

  if (cmd === 'bpm' && parts[1]) {
    const b = parseInt(parts[1]);
    if (b > 0 && b < 500) { st.bpm = b; printToWindow(win.id, `BPM set to ${b}`, 'success'); }
    else printToWindow(win.id, 'BPM must be 1-499', 'warn');
    return;
  }

  if (cmd === 'play' && parts[1]) {
    const ctx = synthGetOrCreateCtx(win);
    if (!ctx) { printToWindow(win.id, 'Web Audio not available in this browser', 'err'); return; }
    const p = synthCardToParams(parts[1]);
    synthPlayTone(ctx, p.freq, p.waveform, p.gain, 1.5, ctx.currentTime);
    printToWindow(win.id, `Playing: ${parts[1]}`, 'success');
    printToWindow(win.id, `  Wave: ${synthAsciiWave(p.waveform, p.freq)}`, 'result');
    printToWindow(win.id, `  Type: ${p.waveform}  Gain: ${p.gain.toFixed(2)}  Cat: ${p.cat}`, 'info');
    return;
  }

  if (cmd === 'chord' && parts.length >= 2) {
    const ctx = synthGetOrCreateCtx(win);
    if (!ctx) { printToWindow(win.id, 'Web Audio not available', 'err'); return; }
    const cards = parts.slice(1);
    cards.forEach(c => {
      const p = synthCardToParams(c);
      synthPlayTone(ctx, p.freq, p.waveform, p.gain * 0.7, 2, ctx.currentTime);
    });
    printToWindow(win.id, `Chord: ${cards.join(' + ')}`, 'success');
    cards.forEach(c => {
      const p = synthCardToParams(c);
      printToWindow(win.id, `  ${c}: ${synthAsciiWave(p.waveform, p.freq)}`, 'result');
    });
    return;
  }

  if (cmd === 'sequence' && parts.length >= 2) {
    const ctx = synthGetOrCreateCtx(win);
    if (!ctx) { printToWindow(win.id, 'Web Audio not available', 'err'); return; }
    const cards = parts.slice(1);
    const beatDur = 60 / st.bpm;
    printToWindow(win.id, `Sequence @ ${st.bpm}BPM:`, 'success');
    cards.forEach((c, i) => {
      const p = synthCardToParams(c);
      synthPlayTone(ctx, p.freq, p.waveform, p.gain, beatDur * 0.9, ctx.currentTime + i * beatDur);
      printToWindow(win.id, `  [${i+1}] ${c} ${synthAsciiWave(p.waveform, p.freq)}`, 'result');
    });
    return;
  }

  printToWindow(win.id, 'Commands: play <card> | chord c1 c2 c3 | sequence c1 c2 | bpm N | stop', 'info');
}

/* ============================================================
   RADIO APP  — AI Radio Station
   ============================================================ */
const RADIO_CHANNELS = [
  { freq: '88.1', name: 'Core FM',        cat: 'core',         desc: 'The root of all signal. Pure agent infrastructure.' },
  { freq: '91.5', name: 'Pipeline Radio', cat: 'pipeline',     desc: 'Data flowing end to end. Never skips a beat.' },
  { freq: '94.7', name: 'Sales Wave',     cat: 'b2b_sales',    desc: 'Conversions happen here. Pitch-perfect broadcast.' },
  { freq: '97.9', name: 'DevTools FM',    cat: 'devtools',     desc: 'Debug beats. Code drops. Stack traces remixed.' },
  { freq: '101.3',name: 'Productivity+', cat: 'productivity',  desc: 'Deep work. Focus frequencies. No interruptions.' },
  { freq: '104.5',name: 'IntegrationZ',  cat: 'integrations',  desc: 'Every API talking to every other API.' },
  { freq: '107.1',name: 'Health Hz',     cat: 'healthcare',    desc: 'Wellness frequencies. Healing data streams.' },
];

const RADIO_DJ_LINES = [
  'You are locked in on {freq} — {name}.',
  'This next segment brought to you by {name}.',
  'Riding the {cat} frequencies tonight.',
  'No static. Pure signal. This is {name}.',
  'Coming up next — agents so clean they parse themselves.',
  'The feed is live. The registry never sleeps.',
  'Offline-first, always-on. This is your {cat} channel.',
];

function radioGenBroadcast(channel, agent) {
  const dj = RADIO_DJ_LINES[Math.floor(Math.random() * RADIO_DJ_LINES.length)]
    .replace('{freq}', channel.freq)
    .replace('{name}', channel.name)
    .replace('{cat}', channel.cat);
  const agentLine = agent
    ? `Now featuring: ${agent.display_name || agent.name} — "${(agent.description || '').slice(0, 60)}"`
    : `Broadcasting live from the ${channel.cat} district.`;
  const tags = agent && agent.tags ? `  Tags: ${agent.tags.slice(0, 4).join(', ')}` : '';
  return [dj, agentLine, tags].filter(Boolean).join('\n');
}

function radioAsciiDisplay(ch) {
  const bar = '|'.repeat(12);
  return [
    '  ┌──────────────────────────────────────┐',
    `  │  ${('FM ' + ch.freq).padEnd(8)}  ${ch.name.padEnd(20)}  │`,
    `  │  ${bar}  [ON AIR]              │`,
    `  │  ${ch.desc.slice(0, 38).padEnd(38)}  │`,
    '  └──────────────────────────────────────┘',
  ].join('\n');
}

function bootRadio(win) {
  win.radioState = {
    channelIdx: 0,
    tuned: RADIO_CHANNELS[0],
    recordings: [],
  };
  printToWindow(win.id, '╔══════════════════════════════════════╗', 'sys');
  printToWindow(win.id, '║         ORAPPTER RADIO  v1.0.0       ║', 'sys');
  printToWindow(win.id, '║   AI-generated radio. Always on.     ║', 'sys');
  printToWindow(win.id, '╚══════════════════════════════════════╝', 'sys');
  printToWindow(win.id, '');
  printToWindow(win.id, radioAsciiDisplay(RADIO_CHANNELS[0]));
  printToWindow(win.id, '');
  printToWindow(win.id, 'Commands: list | next | prev | tune @card | record | broadcast', 'info');
  printToWindow(win.id, '');
}

function handleRadioInput(win, src) {
  const st = win.radioState;
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (cmd === 'list') {
    printToWindow(win.id, 'Available channels:', 'info');
    RADIO_CHANNELS.forEach((ch, i) => {
      const mark = (i === st.channelIdx) ? '>> ' : '   ';
      printToWindow(win.id, `${mark}${ch.freq.padEnd(6)} ${ch.name.padEnd(18)} [${ch.cat}]`, i === st.channelIdx ? 'success' : 'result');
    });
    return;
  }

  if (cmd === 'next') {
    st.channelIdx = (st.channelIdx + 1) % RADIO_CHANNELS.length;
    st.tuned = RADIO_CHANNELS[st.channelIdx];
    printToWindow(win.id, radioAsciiDisplay(st.tuned));
    const broadcast = radioGenBroadcast(st.tuned, null);
    printToWindow(win.id, broadcast, 'info');
    return;
  }

  if (cmd === 'prev') {
    st.channelIdx = (st.channelIdx - 1 + RADIO_CHANNELS.length) % RADIO_CHANNELS.length;
    st.tuned = RADIO_CHANNELS[st.channelIdx];
    printToWindow(win.id, radioAsciiDisplay(st.tuned));
    const broadcast = radioGenBroadcast(st.tuned, null);
    printToWindow(win.id, broadcast, 'info');
    return;
  }

  if (cmd === 'tune' && parts[1]) {
    const cardName = parts[1];
    const agent = REGISTRY.agents.find(a => a.name === cardName);
    const cat = agent ? (agent.category || 'core') : 'core';
    const matchCh = RADIO_CHANNELS.find(ch => ch.cat === cat) || RADIO_CHANNELS[0];
    const idx = RADIO_CHANNELS.indexOf(matchCh);
    st.channelIdx = idx;
    st.tuned = matchCh;
    st.lastAgent = agent || null;
    printToWindow(win.id, radioAsciiDisplay(matchCh));
    printToWindow(win.id, radioGenBroadcast(matchCh, agent), 'info');
    if (agent) {
      printToWindow(win.id, `  Version: v${agent.version || '1.0.0'}  Tier: ${agent.quality_tier || 'community'}`, 'result');
    }
    return;
  }

  if (cmd === 'broadcast') {
    const broadcast = radioGenBroadcast(st.tuned, st.lastAgent || null);
    printToWindow(win.id, broadcast, 'success');
    return;
  }

  if (cmd === 'record') {
    const broadcast = radioGenBroadcast(st.tuned, st.lastAgent || null);
    st.recordings.push({ ch: st.tuned.name, text: broadcast, time: new Date().toLocaleTimeString() });
    printToWindow(win.id, `Recorded! (${st.recordings.length} total)`, 'success');
    printToWindow(win.id, broadcast, 'result');
    return;
  }

  if (cmd === 'recordings') {
    if (!st.recordings.length) { printToWindow(win.id, 'No recordings yet. Use "record".', 'warn'); return; }
    st.recordings.forEach((r, i) => {
      printToWindow(win.id, `[${i+1}] ${r.time} — ${r.ch}`, 'info');
      printToWindow(win.id, r.text, 'result');
    });
    return;
  }

  printToWindow(win.id, 'Commands: list | next | prev | tune @card | broadcast | record | recordings', 'info');
}

/* ============================================================
   CANVAS APP  — ASCII drawing
   ============================================================ */
function bootCanvas(win) {
  win.canvasGuiState = {
    tool: 'pen',
    color: '#58a6ff',
    size: 4,
    drawing: false,
    startX: 0, startY: 0,
    lastX: 0, lastY: 0,
    undoStack: [],
    snapshot: null, // for preview on line/rect/circle
  };
  // Canvas setup is deferred until the DOM is ready (called in bootApp flow, el already attached)
  requestAnimationFrame(() => canvasGuiInit(win.id));
}

function canvasGuiInit(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const area = document.getElementById(`canvas-area-${wid}`);
  const canvasEl = document.getElementById(`canvas-el-${wid}`);
  if (!area || !canvasEl) return;

  // Size canvas to area
  const resize = () => {
    const w = area.clientWidth, h = area.clientHeight;
    if (w < 4 || h < 4) return;
    // Save pixel data
    let saved = null;
    if (canvasEl.width > 0 && canvasEl.height > 0) {
      const ctx = canvasEl.getContext('2d');
      try { saved = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height); } catch(e) {}
    }
    canvasEl.width = w;
    canvasEl.height = h;
    // Fill white
    const ctx = canvasEl.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    if (saved) ctx.putImageData(saved, 0, 0);
  };

  resize();
  const ro = new ResizeObserver(resize);
  ro.observe(area);
  win.canvasGuiState._ro = ro;

  const cs = win.canvasGuiState;
  const getCtx = () => canvasEl.getContext('2d');
  const getPos = (e) => {
    const r = canvasEl.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: Math.round((t.clientX - r.left) * (canvasEl.width / r.width)),
             y: Math.round((t.clientY - r.top)  * (canvasEl.height / r.height)) };
  };
  const updateCoords = (x, y) => {
    const el = document.getElementById(`canvas-coords-${wid}`);
    if (el) el.textContent = `x:${x} y:${y}`;
  };
  const saveUndo = () => {
    const ctx = getCtx();
    const img = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
    cs.undoStack.push(img);
    if (cs.undoStack.length > 12) cs.undoStack.shift();
  };

  const startDraw = (e) => {
    e.preventDefault();
    cs.drawing = true;
    const {x, y} = getPos(e);
    cs.startX = x; cs.startY = y; cs.lastX = x; cs.lastY = y;
    updateCoords(x, y);
    saveUndo();
    if (cs.tool === 'pen' || cs.tool === 'eraser') {
      const ctx = getCtx();
      ctx.beginPath();
      ctx.moveTo(x, y);
    } else if (cs.tool === 'fill') {
      canvasGuiFloodFill(canvasEl, x, y, cs.color);
      cs.drawing = false;
    }
    // snapshot for preview
    cs.snapshot = getCtx().getImageData(0, 0, canvasEl.width, canvasEl.height);
  };

  const moveDraw = (e) => {
    const {x, y} = getPos(e);
    updateCoords(x, y);
    if (!cs.drawing) return;
    e.preventDefault();
    const ctx = getCtx();
    if (cs.tool === 'pen' || cs.tool === 'eraser') {
      ctx.lineWidth = cs.size;
      ctx.lineCap = 'round';
      ctx.strokeStyle = cs.tool === 'eraser' ? '#ffffff' : cs.color;
      ctx.lineTo(x, y);
      ctx.stroke();
    } else if (['line','rect','circle'].includes(cs.tool)) {
      // restore snapshot, draw preview
      if (cs.snapshot) ctx.putImageData(cs.snapshot, 0, 0);
      ctx.strokeStyle = cs.color;
      ctx.lineWidth = cs.size;
      ctx.beginPath();
      if (cs.tool === 'line') {
        ctx.moveTo(cs.startX, cs.startY);
        ctx.lineTo(x, y);
        ctx.stroke();
      } else if (cs.tool === 'rect') {
        ctx.strokeRect(cs.startX, cs.startY, x - cs.startX, y - cs.startY);
      } else if (cs.tool === 'circle') {
        const rx = Math.abs(x - cs.startX), ry = Math.abs(y - cs.startY);
        const cx = cs.startX, cy = cs.startY;
        ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
        ctx.stroke();
      }
    }
    cs.lastX = x; cs.lastY = y;
  };

  const endDraw = () => { cs.drawing = false; cs.snapshot = null; };

  canvasEl.addEventListener('mousedown', startDraw);
  canvasEl.addEventListener('mousemove', moveDraw);
  canvasEl.addEventListener('mouseup', endDraw);
  canvasEl.addEventListener('mouseleave', endDraw);
  canvasEl.addEventListener('touchstart', startDraw, {passive:false});
  canvasEl.addEventListener('touchmove', moveDraw, {passive:false});
  canvasEl.addEventListener('touchend', endDraw);

  // Activate first swatch
  canvasGuiSetColor(wid, '#58a6ff');
}

function canvasGuiTool(wid, tool) {
  const win = windows.get(wid);
  if (!win) return;
  win.canvasGuiState.tool = tool;
  // Toggle active class on buttons
  ['pen','line','rect','circle','fill','eraser'].forEach(t => {
    const btn = document.getElementById(`ctool-${t}-${wid}`);
    if (btn) btn.classList.toggle('active', t === tool);
  });
  canvasGuiUpdateStatus(wid);
}

function canvasGuiSetColor(wid, color) {
  const win = windows.get(wid);
  if (!win) return;
  win.canvasGuiState.color = color;
  // Update swatches active state
  document.querySelectorAll(`#canvas-gui-${wid} .canvas-color-swatch`).forEach(sw => {
    sw.classList.toggle('active-color', sw.dataset.color === color);
  });
  // Update custom picker value
  const custom = document.getElementById(`canvas-custom-color-${wid}`);
  if (custom && /^#[0-9a-fA-F]{6}$/.test(color)) custom.value = color;
  canvasGuiUpdateStatus(wid);
}

function canvasGuiSetSize(wid, size) {
  const win = windows.get(wid);
  if (!win) return;
  win.canvasGuiState.size = parseInt(size);
  canvasGuiUpdateStatus(wid);
}

function canvasGuiUpdateStatus(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const cs = win.canvasGuiState;
  const el = document.getElementById(`canvas-status-${wid}`);
  if (el) el.textContent = `tool: ${cs.tool} | size: ${cs.size} | color: ${cs.color}`;
}

function canvasGuiUndo(wid) {
  const win = windows.get(wid);
  if (!win || !win.canvasGuiState.undoStack.length) return;
  const img = win.canvasGuiState.undoStack.pop();
  const canvasEl = document.getElementById(`canvas-el-${wid}`);
  if (canvasEl) canvasEl.getContext('2d').putImageData(img, 0, 0);
}

function canvasGuiClear(wid) {
  const canvasEl = document.getElementById(`canvas-el-${wid}`);
  if (!canvasEl) return;
  const win = windows.get(wid);
  if (win) {
    const ctx = canvasEl.getContext('2d');
    const img = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
    win.canvasGuiState.undoStack.push(img);
    if (win.canvasGuiState.undoStack.length > 12) win.canvasGuiState.undoStack.shift();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
  }
}

function canvasGuiExport(wid) {
  const canvasEl = document.getElementById(`canvas-el-${wid}`);
  if (!canvasEl) return;
  const url = canvasEl.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = `orappter-canvas-${Date.now()}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  addNotification('Canvas exported as PNG');
}

function canvasGuiFloodFill(canvas, x, y, fillColor) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const img = ctx.getImageData(0, 0, w, h);
  const data = img.data;
  const idx = (px, py) => (py * w + px) * 4;
  const tx = idx(x, y);
  const tr = data[tx], tg = data[tx+1], tb = data[tx+2], ta = data[tx+3];
  // Parse fill color
  const fc = document.createElement('canvas').getContext('2d');
  fc.fillStyle = fillColor; fc.fillRect(0, 0, 1, 1);
  const [fr, fg, fb, fa] = fc.getImageData(0, 0, 1, 1).data;
  if (tr === fr && tg === fg && tb === fb) return;
  const stack = [[x, y]];
  let iters = 0;
  while (stack.length && iters < 50000) {
    iters++;
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
    const ci = idx(cx, cy);
    if (data[ci] !== tr || data[ci+1] !== tg || data[ci+2] !== tb || data[ci+3] !== ta) continue;
    data[ci] = fr; data[ci+1] = fg; data[ci+2] = fb; data[ci+3] = fa;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img, 0, 0);
}

function makeCanvasGrid(w, h) {
  return Array.from({ length: h }, () => Array(w).fill(' '));
}

function renderCanvas(win) {
  const cs = win.canvasState;
  const border = '+' + '-'.repeat(cs.w) + '+';
  printToWindow(win.id, border, 'sys');
  for (let y = 0; y < cs.h; y++) {
    printToWindow(win.id, '|' + cs.grid[y].join('') + '|', 'result');
  }
  printToWindow(win.id, border, 'sys');
}

function canvasSet(cs, x, y, ch) {
  x = Math.round(x); y = Math.round(y);
  if (x >= 0 && x < cs.w && y >= 0 && y < cs.h) cs.grid[y][x] = ch[0] || ' ';
}

function canvasBresenham(cs, x0, y0, x1, y1, ch) {
  x0 = Math.round(x0); y0 = Math.round(y0); x1 = Math.round(x1); y1 = Math.round(y1);
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  let cx = x0, cy = y0;
  for (let i = 0; i < 1000; i++) {
    canvasSet(cs, cx, cy, ch);
    if (cx === x1 && cy === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; cx += sx; }
    if (e2 < dx) { err += dx; cy += sy; }
  }
}

function canvasFloodFill(cs, x, y, ch) {
  x = Math.round(x); y = Math.round(y);
  if (x < 0 || x >= cs.w || y < 0 || y >= cs.h) return;
  const target = cs.grid[y][x];
  if (target === ch[0]) return;
  const stack = [[x, y]];
  let iters = 0;
  while (stack.length && iters < 2000) {
    iters++;
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= cs.w || cy < 0 || cy >= cs.h) continue;
    if (cs.grid[cy][cx] !== target) continue;
    cs.grid[cy][cx] = ch[0];
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

function handleCanvasInput(win, src) {
  const cs = win.canvasState;
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (cmd === 'new') {
    const w = Math.min(parseInt(parts[1]) || 40, 80);
    const h = Math.min(parseInt(parts[2]) || 20, 40);
    cs.w = w; cs.h = h;
    cs.grid = makeCanvasGrid(w, h);
    printToWindow(win.id, `New canvas: ${w}x${h}`, 'success');
    return;
  }

  if (cmd === 'show') { renderCanvas(win); return; }

  if (cmd === 'clear') {
    cs.grid = makeCanvasGrid(cs.w, cs.h);
    printToWindow(win.id, 'Canvas cleared.', 'success');
    return;
  }

  if (cmd === 'dot' && parts.length >= 4) {
    const ch = parts[3];
    canvasSet(cs, parseInt(parts[1]), parseInt(parts[2]), ch);
    printToWindow(win.id, `Dot at (${parts[1]},${parts[2]}) with "${ch}"`, 'success');
    return;
  }

  if (cmd === 'line' && parts.length >= 6) {
    const ch = parts[5];
    canvasBresenham(cs, parseInt(parts[1]), parseInt(parts[2]), parseInt(parts[3]), parseInt(parts[4]), ch);
    printToWindow(win.id, `Line drawn with "${ch}"`, 'success');
    return;
  }

  if (cmd === 'rect' && parts.length >= 6) {
    const x1 = parseInt(parts[1]), y1 = parseInt(parts[2]);
    const x2 = parseInt(parts[3]), y2 = parseInt(parts[4]);
    const ch = parts[5];
    for (let x = x1; x <= x2; x++) { canvasSet(cs, x, y1, ch); canvasSet(cs, x, y2, ch); }
    for (let y = y1; y <= y2; y++) { canvasSet(cs, x1, y, ch); canvasSet(cs, x2, y, ch); }
    printToWindow(win.id, `Rect (${x1},${y1})-(${x2},${y2}) with "${ch}"`, 'success');
    return;
  }

  if (cmd === 'circle' && parts.length >= 5) {
    const cx = parseInt(parts[1]), cy = parseInt(parts[2]);
    const r = parseInt(parts[3]), ch = parts[4];
    for (let angle = 0; angle < 360; angle++) {
      const rad = angle * Math.PI / 180;
      canvasSet(cs, Math.round(cx + r * Math.cos(rad)), Math.round(cy + r * 0.5 * Math.sin(rad)), ch);
    }
    printToWindow(win.id, `Circle at (${cx},${cy}) r=${r} with "${ch}"`, 'success');
    return;
  }

  if (cmd === 'text' && parts.length >= 4) {
    const x = parseInt(parts[1]), y = parseInt(parts[2]);
    const text = parts.slice(3).join(' ');
    for (let i = 0; i < text.length; i++) canvasSet(cs, x + i, y, text[i]);
    printToWindow(win.id, `Text "${text}" at (${x},${y})`, 'success');
    return;
  }

  if (cmd === 'fill' && parts.length >= 4) {
    const ch = parts[3];
    canvasFloodFill(cs, parseInt(parts[1]), parseInt(parts[2]), ch);
    printToWindow(win.id, `Flood fill at (${parts[1]},${parts[2]}) with "${ch}"`, 'success');
    return;
  }

  if (cmd === 'stamp' && parts[1]) {
    const cardName = parts[1];
    const x = parseInt(parts[2]) || 1;
    const y = parseInt(parts[3]) || 1;
    const agent = REGISTRY.agents.find(a => a.name === cardName);
    const label = agent ? (agent.display_name || agent.name) : cardName;
    const short = label.slice(0, cs.w - x - 4);
    const tier = agent ? (agent.quality_tier || 'cmty')[0].toUpperCase() : '?';
    canvasBresenham(cs, x, y, x + short.length + 3, y, '-');
    canvasBresenham(cs, x, y + 3, x + short.length + 3, y + 3, '-');
    for (let ly = y; ly <= y + 3; ly++) { canvasSet(cs, x, ly, '|'); canvasSet(cs, x + short.length + 3, ly, '|'); }
    for (let i = 0; i < short.length; i++) canvasSet(cs, x + 1 + i, y + 1, short[i]);
    canvasSet(cs, x + 1, y + 2, tier);
    printToWindow(win.id, `Stamped "${short}" at (${x},${y})`, 'success');
    return;
  }

  printToWindow(win.id, 'new W H | dot X Y ch | line x1 y1 x2 y2 ch | rect x1 y1 x2 y2 ch | circle cx cy r ch | text X Y words | fill X Y ch | stamp @card X Y | show | clear', 'info');
}

/* ============================================================
   TAMAGOTCHI APP  — Virtual agent pet
   ============================================================ */
const TAMA_FACES = {
  happy:   '  \\(^▽^)/',
  neutral: '   (=_=) ',
  sad:     '   (;_;) ',
  hungry:  '   (*`o´)',
  tired:   '   (-_-) zZ',
  dead:    '   (x_x) ',
};

function tamaGetFace(st) {
  if (!st.alive) return TAMA_FACES.dead;
  if (st.hunger > 70) return TAMA_FACES.hungry;
  if (st.energy < 20) return TAMA_FACES.tired;
  if (st.happiness > 60 && st.hunger < 40) return TAMA_FACES.happy;
  if (st.happiness < 30 || st.hunger > 50) return TAMA_FACES.sad;
  return TAMA_FACES.neutral;
}

function tamaAgeLabel(xp) {
  if (xp < 100) return 'Baby';
  if (xp < 300) return 'Teen';
  return 'Adult';
}

function tamaTick(st) {
  // Each interaction decays stats slightly
  st.hunger = Math.min(100, st.hunger + 5);
  st.happiness = Math.max(0, st.happiness - 3);
  st.energy = Math.max(0, st.energy - 2);
  if (st.hunger >= 100 || st.energy === 0) { st.alive = false; }
}

function bootTamagotchi(win) {
  win.tamaState = {
    adopted: false,
    name: '',
    agent: null,
    hunger: 30,
    happiness: 50,
    energy: 80,
    xp: 0,
    alive: true,
    interactions: 0,
  };
  // GUI is already rendered in buildTamagotchiBody — nothing more to do here
}

function tamaGuiAdopt(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.tamaState;
  const inp = document.getElementById(`tama-adopt-inp-${wid}`);
  const cardName = (inp ? inp.value.trim() : '') || '@rapp/basic-agent';
  const agent = REGISTRY.agents.find(a => a.name === cardName);
  const name = agent ? (agent.display_name || agent.name) : cardName;
  st.adopted = true;
  st.name = name.slice(0, 16);
  st.agent = agent || null;
  st.hunger = 30; st.happiness = 60; st.energy = 80; st.xp = 0; st.alive = true;
  // Hide adopt screen, show pet
  const adoptEl = document.getElementById(`tama-adopt-${wid}`);
  if (adoptEl) adoptEl.style.display = 'none';
  const headerEl = document.getElementById(`tama-header-${wid}`);
  if (headerEl) headerEl.style.display = '';
  const petArea = document.getElementById(`tama-pet-area-${wid}`);
  if (petArea) petArea.style.display = '';
  const btnsEl = document.getElementById(`tama-btns-${wid}`);
  if (btnsEl) btnsEl.style.display = '';
  tamaGuiRender(wid);
  addNotification(`Adopted: ${st.name}`);
}

const TAMA_MOODS = {
  happy:   { cls: 'mood-happy',  mouth: '😊', pulse: true,  text: "Let's play!",     bg: '#0a1f0a' },
  neutral: { cls: 'mood-happy',  mouth: '😐', pulse: false, text: 'All good.',        bg: '#0a1214' },
  sad:     { cls: 'mood-sad',    mouth: '😢', pulse: false, text: "I feel lonely...", bg: '#0a0a1f' },
  hungry:  { cls: 'mood-hungry', mouth: '😋', pulse: false, text: "I'm hungry!",      bg: '#1f0a0a' },
  tired:   { cls: 'mood-tired',  mouth: '😴', pulse: false, text: 'Zzz...',           bg: '#080a14' },
  dead:    { cls: 'mood-dead',   mouth: '💀', pulse: false, text: 'Gone...',          bg: '#101010' },
};

function tamaGetMoodKey(st) {
  if (!st.alive) return 'dead';
  if (st.hunger > 70) return 'hungry';
  if (st.energy < 20) return 'tired';
  if (st.happiness > 60 && st.hunger < 40) return 'happy';
  if (st.happiness < 30 || st.hunger > 50) return 'sad';
  return 'neutral';
}

function tamaGuiRender(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.tamaState;
  const moodKey = tamaGetMoodKey(st);
  const mood = TAMA_MOODS[moodKey];
  const xpMax = st.xp < 100 ? 100 : st.xp < 300 ? 300 : 500;
  const level = st.xp < 100 ? 1 : st.xp < 300 ? 2 : 3;
  const ageName = st.xp < 100 ? 'Baby' : st.xp < 300 ? 'Teen' : 'Adult';

  // Header
  const nameEl = document.getElementById(`tama-name-${wid}`);
  if (nameEl) nameEl.textContent = `${st.name}  Lv.${level} ${ageName} (${st.xp} XP)`;
  const moodEl = document.getElementById(`tama-mood-${wid}`);
  if (moodEl) { moodEl.textContent = mood.text; moodEl.style.color = moodKey === 'dead' ? '#888' : ''; }

  // Face
  const face = document.getElementById(`tama-face-${wid}`);
  if (face) {
    face.className = 'tama-face ' + mood.cls;
    if (mood.pulse) face.classList.add('pulse');
  }
  const mouth = document.getElementById(`tama-mouth-${wid}`);
  if (mouth) mouth.textContent = mood.mouth;

  // Cheeks only when happy
  const gui = document.getElementById(`tama-gui-${wid}`);
  if (gui) gui.style.background = mood.bg;

  // Bars
  const setBar = (name, val, max) => {
    const fill = document.getElementById(`tama-bar-${name}-${wid}`);
    const valEl = document.getElementById(`tama-val-${name}-${wid}`);
    if (fill) fill.style.width = Math.min(100, Math.round(val / max * 100)) + '%';
    if (valEl) valEl.textContent = Math.round(val);
  };
  setBar('hunger', st.hunger, 100);
  setBar('happy', st.happiness, 100);
  setBar('energy', st.energy, 100);
  setBar('xp', st.xp % xpMax, xpMax);

  // Buttons disabled when dead
  document.querySelectorAll(`#tama-btns-${wid} .tama-btn`).forEach(b => {
    b.disabled = !st.alive;
  });
}

function tamaGuiAction(wid, action) {
  const win = windows.get(wid);
  if (!win) return;
  const st = win.tamaState;
  if (!st.alive) return;
  // Decay on each action
  st.hunger = Math.min(100, st.hunger + 5);
  st.happiness = Math.max(0, st.happiness - 2);
  st.energy = Math.max(0, st.energy - 1);
  st.interactions++;
  if (action === 'feed') {
    st.hunger = Math.max(0, st.hunger - 30);
    st.happiness = Math.min(100, st.happiness + 5);
  } else if (action === 'play') {
    st.happiness = Math.min(100, st.happiness + 20);
    st.energy = Math.max(0, st.energy - 10);
    st.xp += 10;
  } else if (action === 'train') {
    st.energy = Math.max(0, st.energy - 15);
    st.xp += 25;
    st.hunger = Math.min(100, st.hunger + 8);
  } else if (action === 'sleep') {
    st.energy = Math.min(100, st.energy + 40);
    st.happiness = Math.max(0, st.happiness - 5);
  }
  if (st.hunger >= 100 || st.energy === 0) st.alive = false;
  tamaGuiRender(wid);
}

function handleTamagotchiInput(win, src) {
  const st = win.tamaState;
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (cmd === 'adopt' && parts[1]) {
    const cardName = parts[1];
    const agent = REGISTRY.agents.find(a => a.name === cardName);
    const name = agent ? (agent.display_name || agent.name) : cardName;
    st.adopted = true;
    st.name = name.slice(0, 16);
    st.agent = agent || null;
    st.hunger = 30; st.happiness = 60; st.energy = 80; st.xp = 0; st.alive = true;
    printToWindow(win.id, `You adopted ${st.name}!`, 'success');
    printToWindow(win.id, tamaGetFace(st), 'sys');
    printToWindow(win.id, '');
    printToWindow(win.id, 'Commands: status | feed | play | train | sleep', 'info');
    return;
  }

  if (!st.adopted) {
    printToWindow(win.id, 'Adopt a pet first: adopt @card/name', 'warn');
    return;
  }

  if (!st.alive) {
    printToWindow(win.id, 'Your pet is gone... adopt a new one.', 'err');
    printToWindow(win.id, tamaGetFace(st), 'sys');
    if (cmd === 'adopt' && parts[1]) { /* handled above */ }
    return;
  }

  tamaTick(st);
  st.interactions++;

  if (cmd === 'status') {
    printToWindow(win.id, `${st.name} — ${tamaAgeLabel(st.xp)} (${st.xp} XP)`, 'sys');
    printToWindow(win.id, tamaGetFace(st), 'success');
    printToWindow(win.id, `  Hunger:    ${'#'.repeat(Math.floor(st.hunger/10))}${'.'.repeat(10-Math.floor(st.hunger/10))} ${st.hunger}%`, st.hunger > 70 ? 'err' : 'info');
    printToWindow(win.id, `  Happiness: ${'#'.repeat(Math.floor(st.happiness/10))}${'.'.repeat(10-Math.floor(st.happiness/10))} ${st.happiness}%`, st.happiness < 30 ? 'warn' : 'info');
    printToWindow(win.id, `  Energy:    ${'#'.repeat(Math.floor(st.energy/10))}${'.'.repeat(10-Math.floor(st.energy/10))} ${st.energy}%`, st.energy < 20 ? 'warn' : 'info');
    return;
  }

  if (cmd === 'feed') {
    st.hunger = Math.max(0, st.hunger - 25);
    printToWindow(win.id, `${st.name} ate! Hunger: ${st.hunger}%`, 'success');
    printToWindow(win.id, tamaGetFace(st), 'sys');
    return;
  }

  if (cmd === 'play') {
    st.happiness = Math.min(100, st.happiness + 20);
    st.energy = Math.max(0, st.energy - 10);
    st.xp += 10;
    printToWindow(win.id, `Played with ${st.name}! Happiness: ${st.happiness}% (+10 XP)`, 'success');
    printToWindow(win.id, tamaGetFace(st), 'sys');
    return;
  }

  if (cmd === 'train') {
    st.energy = Math.max(0, st.energy - 15);
    st.xp += 25;
    st.hunger = Math.min(100, st.hunger + 8);
    printToWindow(win.id, `Trained ${st.name}! +25 XP  Energy: ${st.energy}%`, 'success');
    printToWindow(win.id, `  Age: ${tamaAgeLabel(st.xp)} (${st.xp} XP)`, 'result');
    printToWindow(win.id, tamaGetFace(st), 'sys');
    return;
  }

  if (cmd === 'sleep') {
    st.energy = Math.min(100, st.energy + 40);
    st.happiness = Math.max(0, st.happiness - 5);
    printToWindow(win.id, `${st.name} is resting... Energy: ${st.energy}%`, 'info');
    printToWindow(win.id, '   (-_-) zZ zZ zZ', 'sys');
    return;
  }

  printToWindow(win.id, 'adopt @card | status | feed | play | train | sleep', 'info');
}

/* ============================================================
   GARDEN APP  — Plant agent seeds
   ============================================================ */
const GARDEN_STAGES = ['.', 'i', 'Y', '*', 'T'];
const GARDEN_STAGE_NAMES = ['Seed', 'Sprout', 'Growing', 'Blooming', 'Tree'];
const GARDEN_CAT_CHARS = {
  devtools: '#', pipeline: '~', integrations: '@',
  productivity: '+', core: 'O', b2b_sales: '$', healthcare: '+',
};

function makeGardenPlot() {
  return { agent: null, name: '', stage: 0, watered: 0, harvested: false, cat: 'core' };
}

function gardenRender(win) {
  const plots = win.gardenState.plots;
  printToWindow(win.id, '  ┌─────────┬─────────┬─────────┐', 'sys');
  for (let row = 0; row < 3; row++) {
    let plantRow = '  │';
    let labelRow = '  │';
    for (let col = 0; col < 3; col++) {
      const idx = row * 3 + col;
      const p = plots[idx];
      const ch = p.agent ? GARDEN_STAGES[p.stage] : ' ';
      const catCh = p.agent ? (GARDEN_CAT_CHARS[p.cat] || '.') : ' ';
      plantRow += ` ${catCh}${ch}${catCh}     `.slice(0, 9) + '│';
      const n = p.agent ? p.name.slice(0, 7).padEnd(7) : `[${idx+1}]    `.slice(0, 7);
      labelRow += ` ${n}  │`;
    }
    printToWindow(win.id, plantRow, 'success');
    printToWindow(win.id, labelRow, 'info');
    if (row < 2) printToWindow(win.id, '  ├─────────┼─────────┼─────────┤', 'sys');
  }
  printToWindow(win.id, '  └─────────┴─────────┴─────────┘', 'sys');
}

const GARDEN_STAGE_ICONS = ['🌱', '🌿', '🌾', '🌸', '🌳'];

function bootGarden(win) {
  win.gardenState = {
    plots: Array.from({ length: 9 }, makeGardenPlot),
    harvests: [],
    selected: null,
  };
  // GUI is rendered in buildGardenBody — update stats
  gardenGuiUpdateStats(win.id);
}

function gardenGuiSelect(wid, idx) {
  const win = windows.get(wid);
  if (!win) return;
  win.gardenState.selected = idx;
  for (let i = 0; i < 9; i++) {
    const el = document.getElementById(`garden-plot-${wid}-${i}`);
    if (el) el.classList.toggle('selected', i === idx);
  }
  const p = win.gardenState.plots[idx];
  const inp = document.getElementById(`garden-inp-${wid}`);
  if (inp && p.agent) inp.value = p.agent;
  gardenGuiLog(wid, p.agent
    ? `Plot ${idx+1}: ${p.name} — ${GARDEN_STAGE_NAMES[p.stage]} (watered: ${p.watered})`
    : `Plot ${idx+1}: empty. Enter agent name and click PLANT.`);
}

function gardenGuiLog(wid, msg) {
  const el = document.getElementById(`garden-log-${wid}`);
  if (el) el.textContent = msg;
}

function gardenGuiUpdateStats(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const gs = win.gardenState;
  const planted = gs.plots.filter(p => p.agent).length;
  const growing = gs.plots.filter(p => p.agent && p.stage < 4).length;
  const el = (id) => document.getElementById(id);
  if (el(`garden-count-planted-${wid}`)) el(`garden-count-planted-${wid}`).textContent = planted;
  if (el(`garden-count-growing-${wid}`)) el(`garden-count-growing-${wid}`).textContent = growing;
  if (el(`garden-count-harvested-${wid}`)) el(`garden-count-harvested-${wid}`).textContent = gs.harvests.length;
}

function gardenGuiRenderPlot(wid, idx) {
  const win = windows.get(wid);
  if (!win) return;
  const p = win.gardenState.plots[idx];
  const plotEl = document.getElementById(`garden-plot-${wid}-${idx}`);
  const iconEl = document.getElementById(`garden-icon-${wid}-${idx}`);
  const nameEl = document.getElementById(`garden-pname-${wid}-${idx}`);
  const progEl = document.getElementById(`garden-prog-${wid}-${idx}`);
  if (!plotEl) return;
  if (p.agent) {
    plotEl.classList.remove('empty');
    if (iconEl) iconEl.textContent = GARDEN_STAGE_ICONS[p.stage] || '🌱';
    if (nameEl) nameEl.textContent = p.name;
    const growThresh = 2;
    const pct = Math.min(100, ((p.watered % growThresh) / growThresh) * 100);
    if (progEl) progEl.style.width = (p.stage >= 4 ? 100 : pct) + '%';
  } else {
    plotEl.classList.add('empty');
    if (iconEl) iconEl.textContent = '🟫';
    if (nameEl) nameEl.textContent = 'empty';
    if (progEl) progEl.style.width = '0%';
  }
}

function gardenGuiPlant(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const gs = win.gardenState;
  const inp = document.getElementById(`garden-inp-${wid}`);
  const cardName = inp ? inp.value.trim() : '';
  const idx = gs.selected;
  if (idx === null) { gardenGuiLog(wid, 'Select a plot first (click on it).'); return; }
  if (!cardName) { gardenGuiLog(wid, 'Enter an agent name first.'); return; }
  const plot = gs.plots[idx];
  if (plot.agent) { gardenGuiLog(wid, `Plot ${idx+1} is occupied! Harvest first.`); return; }
  const agent = REGISTRY.agents.find(a => a.name === cardName);
  const cat = agent ? (agent.category || 'core') : 'core';
  const name = agent ? (agent.display_name || agent.name) : cardName;
  plot.agent = cardName;
  plot.name = name.slice(0, 10);
  plot.stage = 0; plot.watered = 0; plot.harvested = false; plot.cat = cat;
  gardenGuiRenderPlot(wid, idx);
  gardenGuiUpdateStats(wid);
  gardenGuiLog(wid, `Planted ${plot.name} in plot ${idx+1}!`);
}

function gardenGuiWater(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const gs = win.gardenState;
  const idx = gs.selected;
  if (idx === null) { gardenGuiLog(wid, 'Select a plot first.'); return; }
  const plot = gs.plots[idx];
  if (!plot.agent) { gardenGuiLog(wid, `Plot ${idx+1} is empty.`); return; }
  if (plot.stage >= 4) { gardenGuiLog(wid, `${plot.name} is fully grown! Time to harvest.`); return; }
  plot.watered++;
  const growThresh = 2;
  if (plot.watered % growThresh === 0 && plot.stage < GARDEN_STAGES.length - 1) {
    plot.stage++;
    gardenGuiLog(wid, `Plot ${idx+1} grew! ${plot.name}: ${GARDEN_STAGE_NAMES[plot.stage - 1]} → ${GARDEN_STAGE_NAMES[plot.stage]}`);
  } else {
    gardenGuiLog(wid, `Watered plot ${idx+1}. (${growThresh - (plot.watered % growThresh)} more to grow)`);
  }
  gardenGuiRenderPlot(wid, idx);
  gardenGuiUpdateStats(wid);
}

function gardenGuiHarvest(wid) {
  const win = windows.get(wid);
  if (!win) return;
  const gs = win.gardenState;
  const idx = gs.selected;
  if (idx === null) { gardenGuiLog(wid, 'Select a plot first.'); return; }
  const plot = gs.plots[idx];
  if (!plot.agent) { gardenGuiLog(wid, `Plot ${idx+1} is empty.`); return; }
  if (plot.stage < 4) { gardenGuiLog(wid, `${plot.name} isn't ready yet! (${GARDEN_STAGE_NAMES[plot.stage]})`); return; }
  gs.harvests.push({ name: plot.name, cat: plot.cat });
  gardenGuiLog(wid, `Harvested ${plot.name}! Total: ${gs.harvests.length}`);
  plot.agent = null; plot.name = ''; plot.stage = 0; plot.watered = 0; plot.harvested = false;
  gardenGuiRenderPlot(wid, idx);
  gardenGuiUpdateStats(wid);
  gs.selected = null;
  const plotEl = document.getElementById(`garden-plot-${wid}-${idx}`);
  if (plotEl) plotEl.classList.remove('selected');
}

function handleGardenInput(win, src) {
  const gs = win.gardenState;
  const parts = src.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  printToWindow(win.id, `> ${src}`, 'cmd');

  if (cmd === 'view') {
    gardenRender(win);
    const stages = gs.plots.filter(p => p.agent).map((p, i) => {
      const idx = gs.plots.indexOf(p) + 1;
      return `  [${idx}] ${p.name.slice(0, 12).padEnd(12)} ${GARDEN_STAGE_NAMES[p.stage]} (watered:${p.watered})`;
    });
    if (stages.length) stages.forEach(s => printToWindow(win.id, s, 'info'));
    else printToWindow(win.id, '  Garden is empty. Try: plant @rapp/basic-agent 1', 'info');
    return;
  }

  if (cmd === 'plant' && parts[1] && parts[2]) {
    const cardName = parts[1];
    const plotIdx = parseInt(parts[2]) - 1;
    if (plotIdx < 0 || plotIdx >= 9) { printToWindow(win.id, 'Plot must be 1-9', 'warn'); return; }
    const plot = gs.plots[plotIdx];
    if (plot.agent && !plot.harvested) { printToWindow(win.id, `Plot ${plotIdx+1} is occupied. Harvest first.`, 'warn'); return; }
    const agent = REGISTRY.agents.find(a => a.name === cardName);
    const cat = agent ? (agent.category || 'core') : 'core';
    const name = agent ? (agent.display_name || agent.name) : cardName;
    plot.agent = cardName;
    plot.name = name.slice(0, 8);
    plot.stage = 0;
    plot.watered = 0;
    plot.harvested = false;
    plot.cat = cat;
    printToWindow(win.id, `Planted ${name} in plot ${plotIdx+1}!`, 'success');
    printToWindow(win.id, `  Stage: ${GARDEN_STAGE_NAMES[0]} (${GARDEN_STAGES[0]})  Cat: ${cat}`, 'info');
    return;
  }

  if (cmd === 'water' && parts[1]) {
    const plotIdx = parseInt(parts[1]) - 1;
    if (plotIdx < 0 || plotIdx >= 9) { printToWindow(win.id, 'Plot must be 1-9', 'warn'); return; }
    const plot = gs.plots[plotIdx];
    if (!plot.agent) { printToWindow(win.id, `Plot ${plotIdx+1} is empty. Plant something first.`, 'warn'); return; }
    if (plot.harvested) { printToWindow(win.id, `Plot ${plotIdx+1} has been harvested.`, 'warn'); return; }
    plot.watered++;
    const growThresh = 2;
    if (plot.watered % growThresh === 0 && plot.stage < GARDEN_STAGES.length - 1) {
      plot.stage++;
      printToWindow(win.id, `Plot ${plotIdx+1} grew! ${plot.name}: ${GARDEN_STAGE_NAMES[plot.stage - 1]} → ${GARDEN_STAGE_NAMES[plot.stage]} ${GARDEN_STAGES[plot.stage]}`, 'success');
    } else {
      printToWindow(win.id, `Watered plot ${plotIdx+1}. (${plot.watered} total, needs ${growThresh - (plot.watered % growThresh)} more to grow)`, 'info');
    }
    return;
  }

  if (cmd === 'harvest' && parts[1]) {
    const plotIdx = parseInt(parts[1]) - 1;
    if (plotIdx < 0 || plotIdx >= 9) { printToWindow(win.id, 'Plot must be 1-9', 'warn'); return; }
    const plot = gs.plots[plotIdx];
    if (!plot.agent) { printToWindow(win.id, `Plot ${plotIdx+1} is empty.`, 'warn'); return; }
    if (plot.harvested) { printToWindow(win.id, `Plot ${plotIdx+1} already harvested.`, 'warn'); return; }
    if (plot.stage < 4) { printToWindow(win.id, `${plot.name} isn't ready yet! (${GARDEN_STAGE_NAMES[plot.stage]})`, 'warn'); return; }
    gs.harvests.push({ name: plot.name, stage: plot.stage, cat: plot.cat });
    printToWindow(win.id, `Harvested ${plot.name}! (${GARDEN_STAGE_NAMES[plot.stage]}) — plot cleared.`, 'success');
    printToWindow(win.id, `  Total harvests: ${gs.harvests.length}`, 'result');
    plot.agent = null; plot.name = ''; plot.stage = 0; plot.watered = 0; plot.harvested = false;
    return;
  }

  printToWindow(win.id, 'plant @card N | water N | view | harvest N', 'info');
}
