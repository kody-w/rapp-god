<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORAPPTER Desktop v1.0.0</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg-alt: #161b22;
  --bg-hover: #1c2128;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-faint: #484f58;
  --accent: #3fb950;
  --accent-blue: #58a6ff;
  --accent-purple: #a371f7;
  --border: #30363d;
  --taskbar-h: 36px;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  --win-min-w: 320px;
  --win-min-h: 200px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  user-select: none;
}

/* ============================================================ TASKBAR */
#taskbar {
  height: var(--taskbar-h);
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 1000;
  position: relative;
}

#taskbar-brand {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  letter-spacing: 0.5px;
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}
#taskbar-brand:hover { border-color: var(--accent); }

#taskbar-apps {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow: hidden;
}

.taskbar-tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.1s, color 0.1s;
  font-family: var(--font-mono);
}
.taskbar-tab:hover { background: #252c36; color: var(--text); }
.taskbar-tab.active { background: #1f2d3a; color: var(--accent-blue); border-color: var(--accent-blue); }
.taskbar-tab.minimized { opacity: 0.5; }
.taskbar-tab .tab-icon { font-size: 12px; }
.taskbar-tab .tab-close {
  margin-left: 4px;
  opacity: 0;
  color: var(--text-faint);
  font-size: 11px;
  line-height: 1;
}
.taskbar-tab:hover .tab-close { opacity: 1; }
.taskbar-tab .tab-close:hover { color: #f85149; }

#taskbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

#taskbar-repl-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}
#taskbar-repl-prompt {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
  white-space: nowrap;
}
#taskbar-repl-input {
  width: 200px;
  height: 22px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--accent-blue);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 0 6px;
  outline: none;
}
#taskbar-repl-input:focus { border-color: var(--accent-blue); }
#taskbar-repl-input::placeholder { color: var(--text-faint); }
#taskbar-repl-out {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#taskbar-repl-out.err { color: #f85149; }

#taskbar-clock {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

#taskbar-notif-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 5px;
  position: relative;
  transition: color 0.15s;
}
#taskbar-notif-btn:hover { color: var(--text); border-color: var(--border); }
#notif-badge {
  position: absolute;
  top: 0;
  right: 0;
  width: 8px;
  height: 8px;
  background: #f85149;
  border-radius: 50%;
  display: none;
}
#notif-badge.visible { display: block; }

#taskbar-launcher-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  padding: 2px 7px;
  transition: color 0.15s, border-color 0.15s;
  font-family: var(--font-mono);
}
#taskbar-launcher-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ============================================================ DESKTOP AREA */
#desktop {
  position: relative;
  width: 100%;
  height: calc(100vh - var(--taskbar-h));
  overflow: hidden;
  background: var(--bg);
}

/* SuperSeed watermark */
#desktop-watermark {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 0;
  opacity: 0.04;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--accent);
  white-space: pre;
}
#desktop-tagline {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  pointer-events: none;
  z-index: 0;
  white-space: nowrap;
  opacity: 0.4;
}

/* ============================================================ APP LAUNCHER */
#launcher {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  transition: opacity 0.2s;
}
#launcher.hidden { display: none; }

#launcher-title {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 24px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

#launcher-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  max-width: 420px;
}

.app-icon-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 12px 8px;
  border-radius: 10px;
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  background: transparent;
}
.app-icon-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border);
  transform: translateY(-2px);
}
.app-icon-btn:active { transform: translateY(0); }

.app-icon-glyph {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-family: var(--font-mono);
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--bg-alt);
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
}
.app-icon-btn:hover .app-icon-glyph {
  background: var(--bg-hover);
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

.app-icon-name {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}
.app-icon-btn:hover .app-icon-name { color: var(--text); }

/* Icon accent colors */
.app-icon-btn[data-app="terminal"] .app-icon-glyph { color: var(--accent); }
.app-icon-btn[data-app="cards"] .app-icon-glyph { color: var(--accent-blue); }
.app-icon-btn[data-app="obsidian"] .app-icon-glyph { color: var(--accent-purple); }
.app-icon-btn[data-app="tetris"] .app-icon-glyph { color: #ffa657; }
.app-icon-btn[data-app="settings"] .app-icon-glyph { color: var(--text-muted); }

/* ============================================================ WINDOWS */
.window {
  position: absolute;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: var(--win-min-w);
  min-height: var(--win-min-h);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 10;
  transition: box-shadow 0.1s;
}
.window.focused {
  border-color: #3a4a5e;
  box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(88,166,255,0.1);
  z-index: 20;
}
.window.maximized {
  top: 4px !important;
  left: 4px !important;
  width: calc(100% - 8px) !important;
  height: calc(100% - 8px) !important;
  border-radius: 6px;
}

/* Title bar */
.win-titlebar {
  height: 32px;
  background: var(--bg-hover);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 8px;
  cursor: grab;
  flex-shrink: 0;
  user-select: none;
}
.win-titlebar:active { cursor: grabbing; }

.win-controls {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.win-btn {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 0;
  flex-shrink: 0;
  transition: filter 0.1s;
}
.win-btn:hover { filter: brightness(1.3); }
.win-btn.close { background: #f85149; }
.win-btn.minimize { background: #d29922; }
.win-btn.maximize { background: var(--accent); }

.win-icon {
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  flex-shrink: 0;
}
.win-title {
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  font-family: var(--font-mono);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Window body */
.win-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 13px;
}

/* Terminal-style output */
.win-output {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  background: var(--bg);
  color: var(--accent);
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.win-output::-webkit-scrollbar { width: 4px; }
.win-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.out-line { display: block; }
.out-line.cmd { color: var(--accent-blue); }
.out-line.err { color: #f85149; }
.out-line.info { color: var(--text-muted); }
.out-line.success { color: var(--accent); }
.out-line.warn { color: #ffa657; }
.out-line.sys { color: var(--accent-purple); }
.out-line.result { color: #79c0ff; }

/* Input line */
.win-input-row {
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--bg-alt);
  padding: 0 8px;
  flex-shrink: 0;
  height: 30px;
}
.win-prompt {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent-blue);
  margin-right: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.win-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  caret-color: var(--accent-blue);
}
.win-input::placeholder { color: var(--text-faint); }

/* Resize handles */
.win-resize-e { position: absolute; right: 0; top: 0; width: 6px; height: 100%; cursor: ew-resize; }
.win-resize-s { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; cursor: ns-resize; }
.win-resize-se { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; cursor: nwse-resize; }

/* ============================================================ TETRIS GUI */
.win-tetris-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
  overflow: hidden;
  padding: 8px;
  gap: 6px;
}
#tetris-canvas-container {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
canvas.tetris-board {
  display: block;
  image-rendering: pixelated;
  border: 1px solid var(--border);
  border-radius: 2px;
}
#tetris-side-panel {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  min-width: 90px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#tetris-side-panel .panel-section {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 8px;
}
#tetris-side-panel .panel-label {
  color: var(--text-faint);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 2px;
}
#tetris-side-panel .panel-value {
  font-size: 15px;
  color: var(--text);
  font-weight: 700;
}
#tetris-next-canvas {
  display: block;
  border: 1px solid var(--border);
  background: var(--bg-alt);
  border-radius: 2px;
}
.tetris-controls-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
}
/* Tetris touch control buttons */
.tetris-btn-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.tetris-ctrl-btn {
  min-width: 52px;
  min-height: 48px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.tetris-ctrl-btn:hover { background: var(--bg-hover); border-color: var(--text-faint); }
.tetris-ctrl-btn:active { background: #2a3441; transform: scale(0.93); }
.tetris-ctrl-btn.start-btn {
  min-width: 110px;
  background: #1a3a1a;
  border-color: var(--accent);
  color: var(--accent);
  font-size: 12px;
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: 1px;
}
.tetris-ctrl-btn.start-btn:hover { background: #1f4a1f; }
.tetris-ctrl-btn.drop-btn { background: #1a1a3a; border-color: var(--accent-blue); color: var(--accent-blue); }
.tetris-ctrl-btn.drop-btn:hover { background: #1a1f4a; }

/* ============================================================ RAPPTERDAEMON GUI */
.rd-gui {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-mono);
}
.rd-battle-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.rd-enemy-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1117 0%, #111620 100%);
  position: relative;
  min-height: 90px;
}
.rd-player-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 6px 12px 10px;
  background: linear-gradient(180deg, #111620 0%, #0d1117 100%);
  position: relative;
  min-height: 90px;
}
.rd-daemon-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 320px;
}
.rd-daemon-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  border: 2px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  text-shadow: 0 0 8px currentColor;
}
.rd-daemon-info {
  flex: 1;
  min-width: 0;
}
.rd-daemon-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rd-daemon-level {
  font-size: 10px;
  color: var(--text-faint);
  margin-bottom: 4px;
}
.rd-hp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.rd-hp-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--bg-hover);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.rd-hp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.35s ease, background 0.35s;
}
.rd-hp-text {
  font-size: 9px;
  color: var(--text-faint);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}
/* HP bar color states */
.rd-hp-bar-fill.hp-high  { background: var(--accent); }
.rd-hp-bar-fill.hp-mid   { background: #ffa657; }
.rd-hp-bar-fill.hp-low   { background: #f85149; }
/* Daemon type colors */
.rd-type-core         { color: #e6edf3; border-color: #8b949e; background: #1c2128; }
.rd-type-pipeline     { color: #a371f7; border-color: #a371f7; background: #1a1228; }
.rd-type-integrations { color: #ffa657; border-color: #ffa657; background: #261a10; }
.rd-type-productivity { color: #3fb950; border-color: #3fb950; background: #102010; }
.rd-type-devtools     { color: #58a6ff; border-color: #58a6ff; background: #0d1a2e; }
.rd-type-sales        { color: #f0c040; border-color: #f0c040; background: #221a00; }

/* Battle log */
.rd-log {
  height: 52px;
  overflow-y: auto;
  padding: 4px 10px;
  background: var(--bg-alt);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  line-height: 1.5;
  flex-shrink: 0;
}
.rd-log::-webkit-scrollbar { width: 3px; }
.rd-log::-webkit-scrollbar-thumb { background: var(--border); }
.rd-log-line { display: block; color: var(--text-muted); }
.rd-log-line.good { color: var(--accent); }
.rd-log-line.bad  { color: #f85149; }
.rd-log-line.sys  { color: var(--accent-purple); }
.rd-log-line.warn { color: #ffa657; }

/* Move/action buttons */
.rd-actions {
  padding: 6px 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  flex-shrink: 0;
}
.rd-action-btn {
  padding: 8px 6px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 1px;
  -webkit-tap-highlight-color: transparent;
}
.rd-action-btn:hover { background: var(--bg-hover); border-color: var(--text-faint); }
.rd-action-btn:active { transform: scale(0.96); }
.rd-action-btn.move-btn { border-left: 3px solid var(--accent-blue); }
.rd-action-btn.run-btn  { border-left: 3px solid #ffa657; }
.rd-action-btn.catch-btn{ border-left: 3px solid var(--accent); }
.rd-action-btn.heal-btn { border-left: 3px solid #3fb950; }
.rd-action-btn.explore-btn { border-left: 3px solid var(--accent-purple); grid-column: span 2; }
.rd-action-btn.party-btn{ border-left: 3px solid #58a6ff; }
.rd-action-btn .btn-name { font-weight: 700; font-size: 11px; color: var(--text); }
.rd-action-btn .btn-sub  { color: var(--text-faint); font-size: 9px; }
/* Starter selection overlay */
.rd-starter-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg);
}
.rd-starter-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-mono);
  text-align: center;
}
.rd-starter-cards {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.rd-starter-card {
  width: 88px;
  background: var(--bg-alt);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, transform 0.1s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.rd-starter-card:hover { border-color: var(--text-faint); background: var(--bg-hover); transform: translateY(-3px); }
.rd-starter-card:active { transform: translateY(0) scale(0.97); }
.rd-starter-card .sc-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; margin: 0 auto 6px;
  font-family: var(--font-mono);
  text-shadow: 0 0 8px currentColor;
}
.rd-starter-card .sc-name { font-size: 10px; font-weight: 700; color: var(--text); font-family: var(--font-mono); }
.rd-starter-card .sc-type { font-size: 9px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 2px; }
.rd-starter-card .sc-stats { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 4px; }
/* Flash animation */
@keyframes rdFlash { 0%,100%{opacity:1} 30%,70%{opacity:0.1} }
.rd-flash { animation: rdFlash 0.4s ease; }
/* Title screen */
.rd-title-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--bg);
  padding: 16px;
}
.rd-title-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: #f85149;
  text-align: center;
  letter-spacing: 1px;
  text-shadow: 0 0 12px #f85149;
}
.rd-title-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
}
/* Overworld */
.rd-overworld {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.rd-location-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.rd-location-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-purple);
}
.rd-location-level {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
}
/* Party view overlay */
.rd-party-view {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.rd-party-card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.rd-party-card .pc-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; font-family: var(--font-mono);
  flex-shrink: 0;
  text-shadow: 0 0 6px currentColor;
}
.rd-party-card .pc-info { flex: 1; min-width: 0; }
.rd-party-card .pc-name { font-size: 11px; font-weight: 700; color: var(--text); font-family: var(--font-mono); }
.rd-party-card .pc-meta { font-size: 9px; color: var(--text-faint); font-family: var(--font-mono); }

/* ============================================================ DUNGEON GUI */
.dg-gui {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-mono);
}
.dg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-alt);
  gap: 8px;
  flex-wrap: wrap;
}
.dg-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.dg-stat-label {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-faint);
}
.dg-stat-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.dg-hp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  max-width: 120px;
}
.dg-hp-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--bg-hover);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.dg-hp-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width 0.3s ease, background 0.3s;
}
/* Map grid */
.dg-map-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  gap: 6px;
  overflow: hidden;
}
.dg-map-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  max-width: 240px;
  width: 100%;
}
.dg-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 1px solid transparent;
  transition: transform 0.15s;
  cursor: default;
  position: relative;
}
.dg-cell.fog     { background: #0d0d0d; border-color: #111; }
.dg-cell.empty   { background: #1a2030; border-color: #252d40; }
.dg-cell.start   { background: #0d2a1a; border-color: #1a5030; }
.dg-cell.fight   { background: #2a1010; border-color: #501818; }
.dg-cell.loot    { background: #2a2010; border-color: #504010; }
.dg-cell.trap    { background: #2a1a08; border-color: #503010; }
.dg-cell.stairs  { background: #0d1a2a; border-color: #183050; }
.dg-cell.player  { background: #102a10; border-color: var(--accent); border-width: 2px; }
/* Direction buttons */
.dg-dir-pad {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  max-width: 140px;
  width: 100%;
  flex-shrink: 0;
}
.dg-dir-btn {
  min-height: 44px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.08s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.dg-dir-btn:hover { background: var(--bg-hover); }
.dg-dir-btn:active { transform: scale(0.93); background: #2a3441; }
.dg-dir-btn:disabled { opacity: 0.3; cursor: default; }
.dg-dir-btn[data-dir="n"] { grid-column: 2; grid-row: 1; }
.dg-dir-btn[data-dir="w"] { grid-column: 1; grid-row: 2; }
.dg-dir-btn[data-dir="s"] { grid-column: 2; grid-row: 2; }
.dg-dir-btn[data-dir="e"] { grid-column: 3; grid-row: 2; }
/* Dungeon log */
.dg-log {
  height: 48px;
  overflow-y: auto;
  padding: 4px 10px;
  background: var(--bg-alt);
  border-top: 1px solid var(--border);
  font-size: 10px;
  line-height: 1.5;
  flex-shrink: 0;
}
.dg-log::-webkit-scrollbar { width: 3px; }
.dg-log::-webkit-scrollbar-thumb { background: var(--border); }
.dg-log-line { display: block; color: var(--text-muted); }
.dg-log-line.good { color: var(--accent); }
.dg-log-line.bad  { color: #f85149; }
.dg-log-line.warn { color: #ffa657; }
.dg-log-line.sys  { color: var(--accent-purple); }
.dg-log-line.gold { color: #f0c040; }
/* Start overlay */
.dg-start-overlay {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: var(--bg);
  padding: 16px;
}
.dg-start-title {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-align: center;
}
.dg-start-desc {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
  line-height: 1.6;
}
/* Combat popup overlay */
.dg-combat-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  gap: 10px;
  padding: 14px;
}
.dg-combat-title {
  font-size: 14px;
  font-weight: 700;
  color: #f85149;
  font-family: var(--font-mono);
  text-align: center;
  text-shadow: 0 0 10px #f85149;
}
.dg-combat-info {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
}
/* Inventory list */
.dg-inv-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
  padding: 4px 8px;
  flex-shrink: 0;
}
.dg-inv-item {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 6px;
  font-size: 9px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
/* Large GUI button helper */
.gui-big-btn {
  min-height: 44px;
  padding: 8px 20px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}
.gui-big-btn:hover { background: var(--bg-hover); }
.gui-big-btn:active { transform: scale(0.97); }
.gui-big-btn.primary {
  background: #0d2a0d;
  border-color: var(--accent);
  color: var(--accent);
}
.gui-big-btn.primary:hover { background: #102e10; }
.gui-big-btn.danger {
  background: #2a0d0d;
  border-color: #f85149;
  color: #f85149;
}
.gui-big-btn.danger:hover { background: #3a1010; }

/* Notification panel */
#notif-panel {
  position: absolute;
  top: calc(var(--taskbar-h) + 4px);
  right: 8px;
  width: 300px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 2000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
#notif-panel.visible { display: block; }
#notif-panel-header {
  padding: 10px 14px 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.notif-item {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.notif-item:last-child { border-bottom: none; }
.notif-clear-btn {
  background: transparent;
  border: none;
  color: var(--text-faint);
  font-size: 11px;
  cursor: pointer;
}
.notif-clear-btn:hover { color: var(--text); }

/* Boot animation */
#boot-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
}
#boot-screen.hidden { display: none; }
.boot-logo {
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 4px;
}
.boot-sub {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}
.boot-progress { width: 260px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-top: 8px; }
.boot-bar { height: 100%; background: var(--accent); border-radius: 1px; width: 0; transition: width 0.25s ease; }
.boot-msg { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }

/* ============================================================ OBSIDIAN APP */
.obsidian-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.obsidian-sidebar {
  width: 160px;
  background: var(--bg-alt);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 6px 0;
}
.obsidian-file {
  padding: 5px 12px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.1s, color 0.1s;
}
.obsidian-file:hover { background: var(--bg-hover); color: var(--text); }
.obsidian-file.active { color: var(--accent-purple); background: #1f1a2e; }
.obsidian-main {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  background: var(--bg);
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
}
.obsidian-main::-webkit-scrollbar { width: 4px; }
.obsidian-main::-webkit-scrollbar-thumb { background: var(--border); }
.obsidian-main h1 { font-size: 16px; color: var(--text); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.obsidian-main h2 { font-size: 13px; color: var(--text); margin: 12px 0 6px; }
.obsidian-main p { margin-bottom: 8px; color: var(--text-muted); }
.obsidian-main code { background: var(--bg-hover); color: #e06c75; font-family: var(--font-mono); font-size: 11px; padding: 1px 4px; border-radius: 3px; }
.obsidian-main ul { margin: 0 0 8px 16px; }
.obsidian-main li { color: var(--text-muted); margin: 2px 0; }
.obsidian-sidebar-header { padding: 4px 12px 4px; font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

/* ============================================================ MOBILE */
@media (max-width: 768px) {
  #launcher-grid { grid-template-columns: repeat(3, 1fr); max-width: 320px; }
  #taskbar-repl-wrap { display: none; }
  #taskbar-repl-out { display: none; }

  .window {
    position: fixed !important;
    top: var(--taskbar-h) !important;
    left: 0 !important;
    width: 100vw !important;
    height: calc(100vh - var(--taskbar-h)) !important;
    border-radius: 0;
    min-width: unset;
  }
  .win-resize-e, .win-resize-s, .win-resize-se { display: none; }
}

/* ============================================================ TAMAGOTCHI GUI */
.tama-gui {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: #0a1a0a;
  overflow: hidden;
  user-select: none;
}
.tama-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px 4px;
  background: #0d2a0d;
  border-bottom: 1px solid #1a4a1a;
}
.tama-name-level {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
}
.tama-mood-text {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  transition: color 0.5s;
}
.tama-adopt-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 14px;
  padding: 20px;
}
.tama-adopt-title {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 2px;
}
.tama-adopt-sub {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}
.tama-adopt-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 10px;
  width: 200px;
  outline: none;
}
.tama-adopt-input:focus { border-color: var(--accent); }
.tama-pet-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 8px;
  position: relative;
  transition: background 0.6s;
}
.tama-face-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* CSS pet face */
.tama-face {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #f5c842;
  position: relative;
  border: 4px solid #c89e20;
  transition: background 0.5s, transform 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tama-face.mood-happy { background: #f5c842; border-color: #c89e20; }
.tama-face.mood-sad   { background: #b0b8d0; border-color: #8090b0; }
.tama-face.mood-hungry { background: #e09050; border-color: #b06020; }
.tama-face.mood-tired { background: #a0c0d0; border-color: #6090a0; }
.tama-face.mood-dead  { background: #888; border-color: #555; filter: grayscale(1); }
@keyframes tama-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.tama-face.pulse { animation: tama-pulse 0.8s ease-in-out infinite; }

/* Eyes (CSS circles) */
.tama-eyes {
  display: flex;
  gap: 18px;
  position: absolute;
  top: 28px;
}
.tama-eye {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #222;
  position: relative;
}
/* Cheeks */
.tama-cheeks {
  position: absolute;
  display: flex;
  gap: 52px;
  top: 52px;
}
.tama-cheek {
  width: 12px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,100,100,0.4);
}
/* Mouth / expression */
.tama-mouth {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  line-height: 1;
}

.tama-bars {
  width: 100%;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.tama-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-family: var(--font-mono);
}
.tama-bar-label {
  width: 70px;
  color: var(--text-muted);
  text-align: right;
  flex-shrink: 0;
}
.tama-bar-track {
  flex: 1;
  height: 8px;
  background: var(--bg-hover);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.tama-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.tama-bar-fill.hunger  { background: #f85149; }
.tama-bar-fill.happy   { background: var(--accent); }
.tama-bar-fill.energy  { background: var(--accent-blue); }
.tama-bar-fill.xp      { background: var(--accent-purple); }
.tama-bar-val {
  width: 28px;
  color: var(--text-faint);
  font-size: 9px;
}

.tama-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 10px 14px 12px;
}
.tama-btn {
  padding: 8px 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-alt);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.15s, transform 0.1s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tama-btn:hover  { background: var(--bg-hover); border-color: var(--text-faint); }
.tama-btn:active { transform: scale(0.95); }
.tama-btn.feed   { border-left: 3px solid #f0c040; }
.tama-btn.play   { border-left: 3px solid var(--accent); }
.tama-btn.train  { border-left: 3px solid var(--accent-purple); }
.tama-btn.sleep  { border-left: 3px solid var(--accent-blue); }
.tama-btn:disabled { opacity: 0.35; cursor: default; }

/* ============================================================ GARDEN GUI */
.garden-gui {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: #0a1a08;
  overflow: hidden;
  user-select: none;
}
.garden-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: #0d2a0a;
  border-bottom: 1px solid #1a4a14;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}
.garden-stats-bar {
  display: flex;
  gap: 14px;
}
.garden-stat { color: var(--accent); font-weight: 700; }
.garden-plant-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
}
.garden-plant-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 8px;
  outline: none;

<script>
/* ============================================================
   LISPPY VM — Ported from orappter.html
   ============================================================ */

class LispSymbol extends String {
  constructor(s) { super(s); }
  toString() { return String.prototype.valueOf.call(this); }
  valueOf() { return String.prototype.valueOf.call(this); }
}

const NIL = Object.freeze({
  _type: 'nil',
  toString() { return '()'; },
  [Symbol.iterator]() { return [][Symbol.iterator](); }
});

function isNil(x) { return x === NIL || x === null || x === undefined; }

class LispLambda {
  constructor(params, body, env, name = 'lambda') {
    this.params = params;
    this.body = body;
    this.env = env;
    this.name = name;
  }
  toString() { return `#<procedure ${this.name}>`; }
}

class LispMacro {
  constructor(params, body, env, name = 'macro') {
    this.params = params;
    this.body = body;
    this.env = env;
    this.name = name;
  }
  toString() { return `#<macro ${this.name}>`; }
}

class LispError extends Error {
  constructor(msg) { super(msg); this.name = 'LispError'; }
}
class LispSyntaxError extends LispError {
  constructor(msg) { super(msg); this.name = 'LispSyntaxError'; }
}

class Env {
  constructor(params, args, outer) {
    this._bindings = {};
    this.outer = outer || null;
    if (params !== undefined) {
      if (typeof params === 'string') {
        this._bindings[params] = Array.from(args || []);
      } else {
        const p = params || [];
        const a = args || [];
        if (p.length !== a.length) throw new LispError(`expected ${p.length} args, got ${a.length}`);
        for (let i = 0; i < p.length; i++) this._bindings[p[i]] = a[i];
      }
    }
  }
  get(name) {
    if (name in this._bindings) return this._bindings[name];
    if (this.outer) return this.outer.get(name);
    throw new LispError(`unbound variable: ${name}`);
  }
  set(name, val) { this._bindings[name] = val; }
  find(name) {
    if (name in this._bindings) return this;
    if (this.outer) return this.outer.find(name);
    throw new LispError(`unbound variable: ${name}`);
  }
  has(name) {
    if (name in this._bindings) return true;
    if (this.outer) return this.outer.has(name);
    return false;
  }
}

function tokenize(source) {
  const tokens = [];
  let i = 0;
  while (i < source.length) {
    const c = source[i];
    if (' \t\n\r'.includes(c)) { i++; continue; }
    if (c === ';') { while (i < source.length && source[i] !== '\n') i++; continue; }
    if ('()[]\'`,'.includes(c)) { tokens.push(c); i++; continue; }
    if (c === '"') {
      let j = i + 1;
      while (j < source.length) {
        if (source[j] === '\\' && j + 1 < source.length) { j += 2; continue; }
        if (source[j] === '"') break;
        j++;
      }
      tokens.push(source.slice(i, j + 1));
      i = j + 1;
      continue;
    }
    let j = i;
    while (j < source.length && !' \t\n\r()[]";,'.includes(source[j])) j++;
    tokens.push(source.slice(i, j));
    i = j;
  }
  return tokens;
}

function parse(source) {
  const tokens = tokenize(source);
  const expressions = [];
  let pos = 0;

  function readExpr() {
    if (pos >= tokens.length) throw new LispSyntaxError('unexpected end of input');
    const tok = tokens[pos];
    if (tok === "'") { pos++; return [new LispSymbol('quote'), readExpr()]; }
    if (tok === '`') { pos++; return [new LispSymbol('quasiquote'), readExpr()]; }
    if (tok === ',') { pos++; return [new LispSymbol('unquote'), readExpr()]; }
    if (tok === '(' || tok === '[') {
      pos++;
      const close = tok === '(' ? ')' : ']';
      const lst = [];
      while (pos < tokens.length && tokens[pos] !== close) lst.push(readExpr());
      if (pos >= tokens.length) throw new LispSyntaxError(`missing closing '${close}'`);
      pos++;
      return lst;
    }
    if (tok === ')' || tok === ']') throw new LispSyntaxError(`unexpected '${tok}'`);
    pos++;
    return parseAtom(tok);
  }

  while (pos < tokens.length) expressions.push(readExpr());
  return expressions;
}

function parseAtom(tok) {
  if (tok === '#t') return true;
  if (tok === '#f') return false;
  if (tok === 'nil') return NIL;
  const n = Number(tok);
  if (!isNaN(n) && tok !== '') return n;
  if (tok.startsWith('"') && tok.endsWith('"')) {
    return tok.slice(1, -1)
      .replace(/\\n/g, '\n')
      .replace(/\\t/g, '\t')
      .replace(/\\"/g, '"')
      .replace(/\\\\/g, '\\');
  }
  return new LispSymbol(tok);
}

function valueRepr(val) {
  if (val === true) return '#t';
  if (val === false) return '#f';
  if (isNil(val)) return '()';
  if (val instanceof LispSymbol) return String(val);
  if (typeof val === 'string') return '"' + val.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n') + '"';
  if (typeof val === 'number') return String(val);
  if (Array.isArray(val)) return '(' + val.map(valueRepr).join(' ') + ')';
  if (val && typeof val === 'object' && !(val instanceof LispLambda) && !(val instanceof LispMacro) && !(val instanceof Env)) {
    if (val._type === 'nil') return '()';
    const items = Object.entries(val).map(([k, v]) => `(${valueRepr(k)} . ${valueRepr(v)})`).join(' ');
    return `(dict ${items})`;
  }
  if (val instanceof LispLambda || val instanceof LispMacro) return val.toString();
  if (typeof val === 'function') return '#<builtin>';
  return String(val);
}

function displayValue(val) {
  if (typeof val === 'string' && !(val instanceof LispSymbol)) return val;
  return valueRepr(val);
}

let _output = [];
function vmPrint(s) { _output.push(s); }

function evaluate(expr, env) {
  while (true) {
    if (expr === true || expr === false) return expr;
    if (typeof expr === 'number') return expr;
    if (isNil(expr)) return NIL;
    if (typeof expr === 'string' && !(expr instanceof LispSymbol)) return expr;
    if (expr instanceof LispSymbol) return env.get(String(expr));
    if (!Array.isArray(expr)) return expr;
    if (expr.length === 0) return NIL;

    const head = expr[0];

    if (head instanceof LispSymbol || typeof head === 'string') {
      const h = String(head);

      if (h === 'quote') {
        if (expr.length !== 2) throw new LispError('quote requires exactly 1 argument');
        return expr[1];
      }
      if (h === 'if') {
        if (expr.length < 3) throw new LispError('if requires at least 2 arguments');
        const test = evaluate(expr[1], env);
        if (test !== false && !isNil(test)) { expr = expr[2]; continue; }
        else if (expr.length > 3) { expr = expr[3]; continue; }
        else return NIL;
      }
      if (h === 'cond') {
        for (let i = 1; i < expr.length; i++) {
          const clause = expr[i];
          if (!Array.isArray(clause) || clause.length < 2) throw new LispError('invalid cond clause');
          const clauseHead = String(clause[0]);
          if (clauseHead === 'else' || clauseHead === 'true') { expr = ['begin', ...clause.slice(1)]; break; }
          const test = evaluate(clause[0], env);
          if (test !== false && !isNil(test)) {
            if (clause.length === 2) { expr = clause[1]; break; }
            expr = ['begin', ...clause.slice(1)]; break;
          }
        }
        if (h === 'cond') return NIL;
        continue;
      }
      if (h === 'define') {
        if (expr.length < 3) throw new LispError('define requires at least 2 arguments');
        const target = expr[1];
        if (Array.isArray(target)) {
          const name = String(target[0]);
          const params = target.slice(1).map(String);
          const body = expr.slice(2);
          const fn = new LispLambda(params, body, env, name);
          env.set(name, fn);
          return fn;
        } else {
          const name = String(target);
          const val = evaluate(expr[2], env);
          env.set(name, val);
          return val;
        }
      }
      if (h === 'set!') {
        if (expr.length !== 3) throw new LispError('set! requires exactly 2 arguments');
        const name = String(expr[1]);
        const val = evaluate(expr[2], env);
        env.find(name).set(name, val);
        return val;
      }
      if (h === 'lambda') {
        if (expr.length < 3) throw new LispError('lambda requires params and body');
        const params = expr[1];
        if (params instanceof LispSymbol || typeof params === 'string') return new LispLambda(String(params), expr.slice(2), env);
        if (Array.isArray(params)) return new LispLambda(params.map(String), expr.slice(2), env);
        throw new LispError(`invalid lambda params: ${params}`);
      }
      if (h === 'let') {
        if (expr.length < 3) throw new LispError('let requires bindings and body');
        const bindings = expr[1];
        const body = expr.slice(2);
        const newEnv = new Env(undefined, undefined, env);
        for (const binding of bindings) {
          if (!Array.isArray(binding) || binding.length !== 2) throw new LispError(`invalid let binding: ${binding}`);
          newEnv.set(String(binding[0]), evaluate(binding[1], env));
        }
        for (let i = 0; i < body.length - 1; i++) evaluate(body[i], newEnv);
        expr = body[body.length - 1]; env = newEnv; continue;
      }
      if (h === 'let*') {
        if (expr.length < 3) throw new LispError('let* requires bindings and body');
        const bindings = expr[1];
        const body = expr.slice(2);
        const newEnv = new Env(undefined, undefined, env);
        for (const binding of bindings) {
          if (!Array.isArray(binding) || binding.length !== 2) throw new LispError(`invalid let* binding`);
          newEnv.set(String(binding[0]), evaluate(binding[1], newEnv));
        }
        for (let i = 0; i < body.length - 1; i++) evaluate(body[i], newEnv);
        expr = body[body.length - 1]; env = newEnv; continue;
      }
      if (h === 'begin') {
        if (expr.length === 1) return NIL;
        for (let i = 1; i < expr.length - 1; i++) evaluate(expr[i], env);
        expr = expr[expr.length - 1]; continue;
      }
      if (h === 'and') {
        let result = true;
        for (let i = 1; i < expr.length; i++) {
          result = evaluate(expr[i], env);
          if (result === false || isNil(result)) return result;
        }
        return result;
      }
      if (h === 'or') {
        for (let i = 1; i < expr.length; i++) {
          const result = evaluate(expr[i], env);
          if (result !== false && !isNil(result)) return result;
        }
        return false;
      }
      if (h === 'define-macro') {
        if (expr.length < 3) throw new LispError('define-macro requires at least 2 arguments');
        const target = expr[1];
        if (Array.isArray(target)) {
          const name = String(target[0]);
          const params = target.slice(1).map(String);
          const body = expr.slice(2);
          const mac = new LispMacro(params, body, env, name);
          env.set(name, mac);
          return mac;
        }
        throw new LispError('invalid define-macro syntax');
      }
      if (h === 'do') return NIL;
    }

    const fn = evaluate(head, env);

    if (fn instanceof LispMacro) {
      const macArgs = expr.slice(1);
      const macEnv = new Env(fn.params, macArgs, fn.env);
      const expanded = evalBody(fn.body, macEnv);
      expr = expanded; continue;
    }

    const args = expr.slice(1).map(a => evaluate(a, env));

    if (typeof fn === 'function') return fn(...args);

    if (fn instanceof LispLambda) {
      const callEnv = new Env(fn.params, args, fn.env);
      for (let i = 0; i < fn.body.length - 1; i++) evaluate(fn.body[i], callEnv);
      expr = fn.body[fn.body.length - 1];
      env = callEnv;
      continue;
    }

    throw new LispError(`not callable: ${valueRepr(head)}`);
  }
}

function evalBody(body, env) {
  let result = NIL;
  for (const expr of body) result = evaluate(expr, env);
  return result;
}

function callFn(fn, args) {
  if (typeof fn === 'function') return fn(...args);
  if (fn instanceof LispLambda) {
    const callEnv = new Env(fn.params, args, fn.env);
    return evalBody(fn.body, callEnv);
  }
  throw new LispError(`not callable: ${valueRepr(fn)}`);
}

/* ============================================================
   GLOBAL ENVIRONMENT
   ============================================================ */
// Registry store
let REGISTRY = { agents: [], loaded: false };

function seedHash(title) {
  let h = 0;
  for (let i = 0; i < String(title).length; i++) h = ((h << 5) - h) + String(title).charCodeAt(i);
  return Math.abs(h);
}

function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function makeGlobalEnv() {
  const env = new Env();

  // Arithmetic
  env.set('+', (...a) => a.reduce((s, x) => s + x, 0));
  env.set('-', (a, ...rest) => rest.length ? a - rest.reduce((s,x)=>s+x,0) : -a);
  env.set('*', (...a) => a.reduce((p, x) => p * x, 1));
  env.set('/', (a, b) => { if (b === 0) throw new LispError('division by zero'); return a / b; });
  env.set('//', (a, b) => Math.floor(a / b));
  env.set('%', (a, b) => a % b);
  env.set('abs', Math.abs);
  env.set('min', (...a) => Math.min(...a));
  env.set('max', (...a) => Math.max(...a));
  env.set('floor', Math.floor);
  env.set('ceil', Math.ceil);
  env.set('round', Math.round);
  env.set('sqrt', Math.sqrt);
  env.set('expt', Math.pow);
  env.set('modulo', (a, b) => a % b);
  env.set('remainder', (a, b) => a % b);
  env.set('random', (n) => n !== undefined ? Math.floor(Math.random() * n) : Math.random());

  // Comparison
  env.set('=', (a, b) => a === b);
  env.set('equal?', (a, b) => JSON.stringify(a) === JSON.stringify(b));
  env.set('eq?', (a, b) => a === b);
  env.set('<', (a, b) => a < b);
  env.set('>', (a, b) => a > b);
  env.set('<=', (a, b) => a <= b);
  env.set('>=', (a, b) => a >= b);
  env.set('!=', (a, b) => a !== b);

  // Logic
  env.set('not', x => x === false || isNil(x));

  // Predicates
  env.set('null?', x => isNil(x) || (Array.isArray(x) && x.length === 0));
  env.set('pair?', x => Array.isArray(x) && x.length > 0);
  env.set('list?', x => Array.isArray(x));
  env.set('number?', x => typeof x === 'number' && !isNaN(x));
  env.set('string?', x => typeof x === 'string' && !(x instanceof LispSymbol));
  env.set('symbol?', x => x instanceof LispSymbol);
  env.set('boolean?', x => typeof x === 'boolean');
  env.set('procedure?', x => typeof x === 'function' || x instanceof LispLambda);
  env.set('dict?', x => x !== null && typeof x === 'object' && !Array.isArray(x) && !(x instanceof LispLambda) && !(x instanceof LispMacro) && x !== NIL);
  env.set('integer?', x => Number.isInteger(x));
  env.set('empty?', x => isNil(x) || (typeof x === 'string' && x.length === 0) || (Array.isArray(x) && x.length === 0));

  // List operations
  env.set('cons', (a, b) => Array.isArray(b) ? [a, ...b] : [a, b]);
  env.set('car', x => { if (Array.isArray(x) && x.length > 0) return x[0]; throw new LispError(`car: not a pair`); });
  env.set('cdr', x => { if (Array.isArray(x)) return x.length > 1 ? x.slice(1) : NIL; throw new LispError(`cdr: not a pair`); });
  env.set('list', (...a) => a);
  env.set('length', x => Array.isArray(x) ? x.length : typeof x === 'string' ? x.length : 0);
  env.set('append', (...lists) => { const r = []; for (const lst of lists) { if (Array.isArray(lst)) r.push(...lst); else if (!isNil(lst)) r.push(lst); } return r; });
  env.set('reverse', x => Array.isArray(x) ? [...x].reverse() : x);
  env.set('nth', (lst, n) => Array.isArray(lst) ? lst[n] : NIL);
  env.set('take', (lst, n) => Array.isArray(lst) ? lst.slice(0, n) : NIL);
  env.set('drop', (lst, n) => Array.isArray(lst) ? lst.slice(n) : NIL);
  env.set('range', (...a) => {
    let start = 0, end, step = 1;
    if (a.length === 1) end = a[0];
    else if (a.length === 2) { start = a[0]; end = a[1]; }
    else { start = a[0]; end = a[1]; step = a[2]; }
    const r = [];
    for (let i = start; i < end; i += step) r.push(i);
    return r;
  });
  env.set('flatten', function flatten(lst) { if (!Array.isArray(lst)) return [lst]; return lst.flatMap(x => Array.isArray(x) ? flatten(x) : [x]); });
  env.set('sort', (lst, fn) => {
    if (!Array.isArray(lst)) return lst;
    const copy = [...lst];
    if (fn) copy.sort((a, b) => { const r = callFn(fn, [a, b]); return (r === true || r > 0) ? -1 : 1; });
    else copy.sort((a, b) => String(a) < String(b) ? -1 : String(a) > String(b) ? 1 : 0);
    return copy;
  });
  env.set('first', x => { if (Array.isArray(x) && x.length > 0) return x[0]; throw new LispError('first: empty list'); });
  env.set('rest', x => { if (Array.isArray(x)) return x.length > 1 ? x.slice(1) : NIL; throw new LispError('rest: not a list'); });
  env.set('last', x => Array.isArray(x) && x.length ? x[x.length-1] : NIL);

  // Higher-order
  env.set('map', (fn, ...lists) => {
    if (!lists.length) throw new LispError('map: requires list');
    if (lists.length === 1) { const lst = lists[0]; return Array.isArray(lst) ? lst.map(x => callFn(fn, [x])) : NIL; }
    const minLen = Math.min(...lists.filter(Array.isArray).map(l => l.length));
    return Array.from({length: minLen}, (_, i) => callFn(fn, lists.map(l => l[i])));
  });
  env.set('filter', (fn, lst) => Array.isArray(lst) ? lst.filter(x => { const r = callFn(fn, [x]); return r !== false && !isNil(r); }) : NIL);
  env.set('reduce', (fn, lst, ...init) => {
    if (!Array.isArray(lst)) throw new LispError('reduce: requires list');
    if (init.length) return lst.reduce((acc, x) => callFn(fn, [acc, x]), init[0]);
    if (!lst.length) throw new LispError('reduce: empty list with no init');
    return lst.slice(1).reduce((acc, x) => callFn(fn, [acc, x]), lst[0]);
  });
  env.set('for-each', (fn, lst) => { if (Array.isArray(lst)) lst.forEach(x => callFn(fn, [x])); return NIL; });
  env.set('apply', (fn, args) => { if (Array.isArray(args)) return callFn(fn, args); throw new LispError('apply: requires list'); });
  env.set('compose', (f, g) => (...args) => callFn(f, [callFn(g, args)]));

  // Strings
  env.set('string-append', (...a) => a.map(String).join(''));
  env.set('string-length', s => String(s).length);
  env.set('substring', (s, start, end) => end !== undefined ? String(s).slice(start, end) : String(s).slice(start));
  env.set('string-upcase', s => String(s).toUpperCase());
  env.set('string-downcase', s => String(s).toLowerCase());
  env.set('string-contains?', (s, sub) => String(s).includes(String(sub)));
  env.set('string-split', (s, delim) => delim !== undefined ? String(s).split(String(delim)) : String(s).split(''));
  env.set('string-join', (lst, sep) => (Array.isArray(lst) ? lst : [lst]).map(String).join(sep !== undefined ? String(sep) : ' '));
  env.set('string-trim', s => String(s).trim());
  env.set('string-replace', (s, old, n) => String(s).split(String(old)).join(String(n)));
  env.set('string-ref', (s, i) => String(s)[i] || NIL);
  env.set('number->string', n => String(n));
  env.set('string->number', s => { const n = Number(s); return isNaN(n) ? false : n; });
  env.set('symbol->string', s => String(s));
  env.set('string->symbol', s => new LispSymbol(String(s)));
  env.set('->string', x => String(x));
  env.set('->number', x => Number(x));

  // Dicts
  env.set('make-dict', (...pairs) => { const d = {}; for (let i = 0; i < pairs.length; i += 2) d[pairs[i]] = pairs[i+1]; return d; });
  env.set('get', (obj, key, ...def) => {
    const dflt = def.length ? def[0] : NIL;
    if (obj && typeof obj === 'object' && !Array.isArray(obj)) { const v = obj[key]; return v !== undefined ? v : dflt; }
    if (Array.isArray(obj) && typeof key === 'number') { return key >= 0 && key < obj.length ? obj[key] : dflt; }
    return dflt;
  });
  env.set('keys', d => d && typeof d === 'object' && !Array.isArray(d) ? Object.keys(d) : NIL);
  env.set('values', d => d && typeof d === 'object' && !Array.isArray(d) ? Object.values(d) : NIL);
  env.set('has-key?', (d, k) => d && typeof d === 'object' ? k in d : false);
  env.set('dict-set', (d, k, v) => d && typeof d === 'object' ? {...d, [k]: v} : NIL);
  env.set('dict-merge', (...dicts) => Object.assign({}, ...dicts.filter(d => d && typeof d === 'object')));
  env.set('dict-map', (fn, d) => { if (!d || typeof d !== 'object' || Array.isArray(d)) return NIL; const r = {}; for (const [k, v] of Object.entries(d)) r[k] = callFn(fn, [k, v]); return r; });
  env.set('dict-filter', (fn, d) => { if (!d || typeof d !== 'object' || Array.isArray(d)) return NIL; const r = {}; for (const [k, v] of Object.entries(d)) { const res = callFn(fn, [k, v]); if (res !== false && !isNil(res)) r[k] = v; } return r; });

  // I/O
  env.set('display', (...args) => { args.forEach(a => vmPrint(displayValue(a))); return NIL; });
  env.set('newline', () => { vmPrint('\n'); return NIL; });
  env.set('print', x => { vmPrint(valueRepr(x)); return NIL; });
  env.set('println', x => { vmPrint(displayValue(x) + '\n'); return NIL; });

  // JSON
  env.set('json-parse', s => JSON.parse(String(s)));
  env.set('json-dump', val => JSON.stringify(val, null, 2));

  // Special values
  env.set('#t', true);
  env.set('#f', false);
  env.set('nil', NIL);
  env.set('true', true);
  env.set('false', false);
  env.set('pi', Math.PI);
  env.set('e', Math.E);
  env.set('error', msg => { throw new LispError(String(msg)); });

  // Seed hash (deterministic card system)
  env.set('seed-hash', (title) => seedHash(title));
  env.set('mulberry32', (seed) => {
    const rng = mulberry32(typeof seed === 'number' ? seed : 0);
    return rng;
  });

  // Registry / agent functions
  env.set('resolve-card', (name) => {
    const n = String(name);
    const agent = REGISTRY.agents.find(a => a.name === n || a.slug === n);
    if (!agent) {
      const hash = seedHash(n);
      const rng = mulberry32(hash);
      const tiers = ['community', 'verified', 'official'];
      const cats = ['core', 'pipeline', 'integrations', 'productivity', 'devtools'];
      return [
        '┌─────────────────────────────────┐',
        `│ CARD: ${n.padEnd(26)} │`,
        `│ Tier: ${tiers[Math.floor(rng() * 3)].padEnd(26)} │`,
        `│ Cat:  ${cats[Math.floor(rng() * 5)].padEnd(26)} │`,
        `│ Hash: ${String(hash).slice(0, 8).padEnd(26)} │`,
        '│ [Seed-generated — not in binder]│',
        '└─────────────────────────────────┘'
      ].join('\n');
    }
    return [
      '┌─────────────────────────────────┐',
      `│ ${(agent.display_name || agent.name).slice(0,32).padEnd(32)} │`,
      `│ ${(agent.name || '').slice(0,32).padEnd(32)} │`,
      `│ v${(agent.version || '1.0.0').padEnd(31)} │`,
      `│ tier: ${(agent.quality_tier || 'community').padEnd(26)} │`,
      `│ cat:  ${(agent.category || 'unknown').padEnd(26)} │`,
      `│ ${(agent.description || '').slice(0,32).padEnd(32)} │`,
      '└─────────────────────────────────┘'
    ].join('\n');
  });

  env.set('search-agents', (query) => {
    const q = String(query).toLowerCase();
    const matches = REGISTRY.agents.filter(a =>
      (a.name || '').toLowerCase().includes(q) ||
      (a.description || '').toLowerCase().includes(q) ||
      (a.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (a.category || '').toLowerCase().includes(q)
    );
    if (!matches.length) return `No agents matching "${query}"`;
    return matches.slice(0, 8).map(a => `  ${a.name}  [${a.quality_tier || 'community'}] — ${(a.description || '').slice(0, 50)}`).join('\n');
  });

  env.set('search', (query) => {
    const q = String(query).toLowerCase();
    const matches = REGISTRY.agents.filter(a =>
      (a.name || '').toLowerCase().includes(q) ||
      (a.description || '').toLowerCase().includes(q) ||
      (a.tags || []).some(t => t.toLowerCase().includes(q))
    );
    if (!matches.length) return `No results for "${query}"`;
    return matches.slice(0, 6).map((a, i) => `  ${i+1}. ${a.name} — ${(a.description || '').slice(0,45)}`).join('\n');
  });

  env.set('binder-status', () => {
    const total = REGISTRY.agents.length;
    const tiers = {};
    const cats = {};
    for (const a of REGISTRY.agents) {
      const t = a.quality_tier || 'community';
      const c = a.category || 'unknown';
      tiers[t] = (tiers[t] || 0) + 1;
      cats[c] = (cats[c] || 0) + 1;
    }
    const tierStr = Object.entries(tiers).map(([k,v]) => `${k}:${v}`).join(' ');
    const catStr = Object.entries(cats).map(([k,v]) => `${k}:${v}`).join(' ');
    const loaded = REGISTRY.loaded ? 'live' : 'offline';
    return `Binder: ${total} agents [${loaded}]\nTiers: ${tierStr}\nCats:  ${catStr}`;
  });

  env.set('agents', () => {
    if (!REGISTRY.agents.length) return 'Registry not loaded. Try (binder-status)';
    return REGISTRY.agents.slice(0, 10).map(a => `  ${a.name}`).join('\n') +
      (REGISTRY.agents.length > 10 ? `\n  ... and ${REGISTRY.agents.length - 10} more` : '');
  });

  // Desktop OS builtins
  env.set('open-app', (name) => { openApp(String(name)); return `Opening: ${name}`; });
  env.set('close-app', (name) => { closeAppByName(String(name)); return `Closed: ${name}`; });
  env.set('wallpaper', (name) => { setWallpaper(String(name)); return `Wallpaper: ${name}`; });
  env.set('theme', (name) => { setTheme(String(name)); return `Theme: ${name}`; });
  env.set('sysinfo', () => getSysInfo());
  env.set('notify', (msg) => { addNotification(String(msg)); return NIL; });

  return env;
}

const GLOBAL_ENV = makeGlobalEnv();

function lispEval(src, env) {
  _output = [];
  const evalEnv = env || GLOBAL_ENV;
  try {
    const exprs = parse(src);
    let result = NIL;
    for (const expr of exprs) result = evaluate(expr, evalEnv);
    const out = _output.join('');
    return { ok: true, result, repr: valueRepr(result), output: out };
  } catch(e) {
    return { ok: false, error: e.message, repr: `; error: ${e.message}`, output: _output.join('') };
  }
}

let windowCounter = 0;

let focusedWindowId = null;
let notifications = [];

function addNotification(msg) {
  notifications.unshift({ msg, time: new Date().toLocaleTimeString() });
  if (notifications.length > 30) notifications.pop();
  document.getElementById('notif-badge').classList.add('visible');
  renderNotifPanel();
}

function renderNotifPanel() {
  const list = document.getElementById('notif-list');
  if (!notifications.length) {
    list.innerHTML = '<div class="notif-item">No notifications</div>';
    return;
  }
  list.innerHTML = notifications.map(n =>
    `<div class="notif-item"><span style="color:var(--text-faint);font-size:10px">${n.time}</span> ${escHtml(n.msg)}</div>`
  ).join('');
}

function clearNotifications() {
  notifications = [];
  document.getElementById('notif-badge').classList.remove('visible');
  renderNotifPanel();
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('visible');
  document.getElementById('notif-badge').classList.remove('visible');
}

function toggleLauncher() {
  const launcher = document.getElementById('launcher');
  launcher.classList.toggle('hidden');
}

function showLauncher() {
  document.getElementById('launcher').classList.remove('hidden');
}

function hideLauncher() {
  document.getElementById('launcher').classList.add('hidden');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  return sizes[appId] || { w: 520, h: 380 };
}

function getDefaultPos(idx) {
  const desktop = document.getElementById('desktop');
  const dw = desktop.clientWidth;
  const dh = desktop.clientHeight;
  const { w, h } = getDefaultSize('default');
  const cols = Math.floor(dw / (w + 40));
  const col = idx % Math.max(cols, 1);
  const row = Math.floor(idx / Math.max(cols, 1));
  return {
    x: 40 + col * (Math.min(w, dw / 2) + 20),
    y: 20 + row * 40
  };
}

function openApp(appId) {
  const app = APPS.find(a => a.id === appId);
  if (!app) { addNotification(`App not found: ${appId}`); return; }

  const id = ++windowCounter;
  const { w, h } = getDefaultSize(appId);
  const pos = getDefaultPos(windows.size);

  const env = new Env(undefined, undefined, GLOBAL_ENV);
  const win = {
    id, appId, env,
    history: [],
    histIdx: -1,
    minimized: false,
    maximized: false,
    x: pos.x, y: pos.y, w, h,
    tetrisState: null,
    tetrisLoop: null,
  };

  const el = buildWindowEl(win, app);
  win.el = el;
  windows.set(id, win);
  document.getElementById('desktop').appendChild(el);

  hideLauncher();
  focusWindow(id);
  updateTaskbar();
  addNotification(`Opened: ${app.name}`);

  // Boot the app
  requestAnimationFrame(() => bootApp(win, app));
}

function buildWindowEl(win, app) {
  const el = document.createElement('div');
  el.className = 'window';
  el.id = `win-${win.id}`;
  el.style.left = win.x + 'px';
  el.style.top = win.y + 'px';
  el.style.width = win.w + 'px';
  el.style.height = win.h + 'px';

  const isTetris = win.appId === 'tetris';
  const isRD = win.appId === 'rappterdaemon';
  const isDungeon = win.appId === 'dungeon';
  const isTama = win.appId === 'tamagotchi';
  const isGarden = win.appId === 'garden';
  const isCanvas = win.appId === 'canvas';
  const isSynth = win.appId === 'synth';

  let bodyContent;
  if (isTetris) bodyContent = buildTetrisBody(win);
  else if (isRD) bodyContent = buildRDBody(win);
  else if (isDungeon) bodyContent = buildDungeonBody(win);
  else if (isTama) bodyContent = buildTamagotchiBody(win);
  else if (isGarden) bodyContent = buildGardenBody(win);
  else if (isCanvas) bodyContent = buildCanvasBody(win);
  else if (isSynth) bodyContent = buildSynthBody(win);
  else bodyContent = buildTerminalBody(win, app);

  el.innerHTML = `
    <div class="win-titlebar" id="tb-${win.id}">
      <div class="win-controls">
        <button class="win-btn close" onclick="closeWindow(${win.id})" title="Close"></button>
        <button class="win-btn minimize" onclick="minimizeWindow(${win.id})" title="Minimize"></button>
        <button class="win-btn maximize" onclick="maximizeWindow(${win.id})" title="Maximize"></button>
      </div>
      <span class="win-icon">${escHtml(app.icon)}</span>
      <span class="win-title">${escHtml(app.name)}</span>
    </div>
    <div class="win-body" id="wb-${win.id}">
      ${bodyContent}
    </div>
    <div class="win-resize-e" id="re-${win.id}"></div>
    <div class="win-resize-s" id="rs-${win.id}"></div>
    <div class="win-resize-se" id="rse-${win.id}"></div>
  `;

  // Drag
  setupDrag(el, el.querySelector(`#tb-${win.id}`), win);
  // Resize
  setupResize(el, el.querySelector(`#re-${win.id}`), win, 'e');
  setupResize(el, el.querySelector(`#rs-${win.id}`), win, 's');
  setupResize(el, el.querySelector(`#rse-${win.id}`), win, 'se');
  // Double-click title bar to maximize
  el.querySelector(`#tb-${win.id}`).addEventListener('dblclick', () => maximizeWindow(win.id));
  // Focus on click
  el.addEventListener('mousedown', () => focusWindow(win.id), true);

  return el;
}

function printToWindow(winId, text, cls) {
  const out = document.getElementById(`out-${winId}`);
  if (!out) return;
  const lines = String(text).split('\n');
  for (const line of lines) {
    const span = document.createElement('span');
    span.className = 'out-line' + (cls ? ' ' + cls : '');
    span.textContent = line;
    out.appendChild(span);
    out.appendChild(document.createElement('br'));
  }
  out.scrollTop = out.scrollHeight;
}

function clearOutput(winId) {
  const out = document.getElementById(`out-${winId}`);
  if (out) out.innerHTML = '';
}

/* ============================================================
   WINDOW DRAG & RESIZE
   ============================================================ */
function setupDrag(el, handle, win) {
  let ox = 0, oy = 0, dragging = false;

  handle.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('win-btn')) return;
    if (win.maximized) return;
    dragging = true;
    ox = e.clientX - el.offsetLeft;
    oy = e.clientY - el.offsetTop;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const desktop = document.getElementById('desktop');
    const dw = desktop.clientWidth;
    const dh = desktop.clientHeight;
    let nx = e.clientX - ox;
    let ny = e.clientY - oy;
    nx = Math.max(-el.offsetWidth + 60, Math.min(dw - 60, nx));
    ny = Math.max(0, Math.min(dh - 32, ny));
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
    win.x = nx; win.y = ny;
  });

  document.addEventListener('mouseup', () => { dragging = false; });

  // Touch support
  handle.addEventListener('touchstart', (e) => {
    if (win.maximized) return;
    const t = e.touches[0];
    dragging = true;
    ox = t.clientX - el.offsetLeft;
    oy = t.clientY - el.offsetTop;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    el.style.left = (t.clientX - ox) + 'px';
    el.style.top = (t.clientY - oy) + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => { dragging = false; });
}

function setupResize(el, handle, win, dir) {
  if (!handle) return;
  let startX, startY, startW, startH;

  handle.addEventListener('mousedown', (e) => {
    if (win.maximized) return;
    startX = e.clientX;
    startY = e.clientY;
    startW = el.offsetWidth;
    startH = el.offsetHeight;
    e.preventDefault();
    e.stopPropagation();

    const onMove = (e) => {
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (dir === 'e' || dir === 'se') el.style.width = Math.max(320, startW + dx) + 'px';
      if (dir === 's' || dir === 'se') el.style.height = Math.max(200, startH + dy) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function focusWindow(id) {
  focusedWindowId = id;
  for (const [wid, win] of windows) {
    if (win.el) win.el.classList.toggle('focused', wid === id);
  }
  updateTaskbar();
  // For GUI apps focus the window el itself; for terminal apps focus the input
  const win = windows.get(id);
  if (!win) return;
  const guiApps = ['tetris', 'rappterdaemon', 'dungeon', 'tamagotchi', 'garden', 'canvas', 'synth'];
  if (guiApps.includes(win.appId)) {
    const el = document.getElementById(`win-${id}`);
    if (el) setTimeout(() => el.focus(), 50);
  } else {
    const inp = document.getElementById(`inp-${id}`);
    if (inp) setTimeout(() => inp.focus(), 50);
  }
}

function closeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  // Stop tetris loop
  if (win.tetrisLoop) { clearInterval(win.tetrisLoop); win.tetrisLoop = null; }
  // Clean up synth audio context and keyboard listeners
  if (win.synthGuiState) {
    const st = win.synthGuiState;
    if (st.scopeAnim) { cancelAnimationFrame(st.scopeAnim); st.scopeAnim = null; }
    if (st.audioCtx) { try { st.audioCtx.close(); } catch(e) {} st.audioCtx = null; }
  }
  if (win._synthKeyDown) document.removeEventListener('keydown', win._synthKeyDown);
  if (win._synthKeyUp)   document.removeEventListener('keyup',   win._synthKeyUp);
  // Clean up canvas ResizeObserver
  if (win.canvasGuiState && win.canvasGuiState._ro) { win.canvasGuiState._ro.disconnect(); }
  win.el && win.el.remove();
  windows.delete(id);
  if (focusedWindowId === id) {
    focusedWindowId = null;
    const remaining = Array.from(windows.keys());
    if (remaining.length) focusWindow(remaining[remaining.length - 1]);
    else showLauncher();
  }
  updateTaskbar();
  const app = APPS.find(a => a.id === win.appId);
  addNotification(`Closed: ${app ? app.name : 'window'}`);
}

function closeAppByName(name) {
  for (const [id, win] of windows) {
    if (win.appId === name || APPS.find(a => a.id === win.appId)?.name.toLowerCase() === name.toLowerCase()) {
      closeWindow(id);
      return;
    }
  }
}

function minimizeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  win.minimized = !win.minimized;
  win.el.style.display = win.minimized ? 'none' : 'flex';
  if (win.minimized && focusedWindowId === id) {
    focusedWindowId = null;
    const visible = Array.from(windows.entries()).filter(([,w]) => !w.minimized);
    if (visible.length) focusWindow(visible[visible.length-1][0]);
    else showLauncher();
  }
  updateTaskbar();
}

function maximizeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  win.maximized = !win.maximized;
  if (win.maximized) {
    win._prevStyle = { left: win.el.style.left, top: win.el.style.top, width: win.el.style.width, height: win.el.style.height };
    win.el.classList.add('maximized');
  } else {
    win.el.classList.remove('maximized');
    if (win._prevStyle) {
      win.el.style.left = win._prevStyle.left;
      win.el.style.top = win._prevStyle.top;
      win.el.style.width = win._prevStyle.width;
      win.el.style.height = win._prevStyle.height;
    }
  }
}

function updateTaskbar() {
  const tabs = document.getElementById('taskbar-apps');
  tabs.innerHTML = '';
  for (const [id, win] of windows) {
    const app = APPS.find(a => a.id === win.appId);
    const tab = document.createElement('div');
    tab.className = 'taskbar-tab' +
      (id === focusedWindowId ? ' active' : '') +
      (win.minimized ? ' minimized' : '');
    tab.title = app ? app.name : win.appId;
    tab.innerHTML = `<span class="tab-icon">${escHtml(app ? app.icon : '?')}</span><span>${escHtml(app ? app.name : win.appId)}</span><span class="tab-close" onclick="closeWindow(${id});event.stopPropagation()">&#x2715;</span>`;
    tab.onclick = () => {
      if (win.minimized) { minimizeWindow(id); } // restore
      focusWindow(id);
    };
    tabs.appendChild(tab);
  }
}

function bootApp(win, app) {
  switch (win.appId) {
    case 'terminal': bootTerminal(win); break;
    case 'obsidian': bootObsidian(win); break;
    case 'tetris': bootTetris(win); break;
    case 'cards': bootCards(win); break;
    case 'settings': bootSettings(win); break;
    case 'rappterdaemon': bootRappterdaemon(win); break;
    case 'synth': bootSynth(win); break;
    case 'radio': bootRadio(win); break;
    case 'canvas': bootCanvas(win); break;
    case 'tamagotchi': bootTamagotchi(win); break;
    case 'garden': bootGarden(win); break;
    case 'arena':       bootArena(win); break;
    case 'dungeon':     bootDungeon(win); break;
    case 'school':      bootSchool(win); break;
    case 'timecapsule': bootTimeCapsule(win); break;
    case 'romloader':   bootRomLoader(win); break;
    default: bootStub(win, app); break;
  }

  // Wire up input (terminal-style apps only — GUI apps handle their own input)
  const guiOnlyApps = ['rappterdaemon', 'dungeon', 'tamagotchi', 'garden', 'canvas', 'synth'];
  if (guiOnlyApps.includes(win.appId)) return; // fully GUI-driven, no text input

  const inp = document.getElementById(`inp-${win.id}`);
  if (inp) {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const src = inp.value.trim();
        if (!src) return;
        win.history.unshift(src);
        win.histIdx = -1;
        handleInput(win, src);
        inp.value = '';
        e.preventDefault();
      }
      if (e.key === 'ArrowUp') {
        win.histIdx = Math.min(win.histIdx + 1, win.history.length - 1);
        inp.value = win.history[win.histIdx] || '';
        e.preventDefault();
      }
      if (e.key === 'ArrowDown') {
        win.histIdx = Math.max(win.histIdx - 1, -1);
        inp.value = win.histIdx >= 0 ? win.history[win.histIdx] : '';
        e.preventDefault();
      }
    });
    inp.focus();
  }
}

function handleInput(win, src) {
  switch (win.appId) {
    case 'terminal': handleTerminalInput(win, src); break;
    case 'obsidian': handleObsidianInput(win, src); break;
    case 'tetris': handleTetrisInput(win, src); break;
    case 'cards': handleCardsInput(win, src); break;
    case 'settings': handleSettingsInput(win, src); break;
    case 'rappterdaemon': handleRappterdaemonInput(win, src); break;
    case 'synth': handleSynthInput(win, src); break;
    case 'radio': handleRadioInput(win, src); break;
    case 'canvas': handleCanvasInput(win, src); break;
    case 'tamagotchi': handleTamagotchiInput(win, src); break;
    case 'garden':      handleGardenInput(win, src); break;
    case 'arena':       handleArenaInput(win, src); break;
    case 'dungeon':     handleDungeonInput(win, src); break;
    case 'school':      handleSchoolInput(win, src); break;
    case 'timecapsule': handleTimeCapsuleInput(win, src); break;
    case 'romloader':   handleRomLoaderInput(win, src); break;
    default: handleLispInput(win, src); break;
  }
}
