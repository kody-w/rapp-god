name: Build Private Registry

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'build_local_registry.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build private-registry.json
        run: python build_local_registry.py
      - name: Commit registry if changed
        run: |
          if [[ -n "$(git status --porcelain private-registry.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add private-registry.json
            git commit -m "Auto-build private-registry.json [skip ci]"
            git push
          fi
