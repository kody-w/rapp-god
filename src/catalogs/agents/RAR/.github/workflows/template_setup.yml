name: Template Setup

on:
  create:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  configure-instance:
    runs-on: ubuntu-latest
    # Only run on template instances, not the main RAR repo
    if: github.repository != 'kody-w/RAR'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure as RAPP instance + binder
        run: python scripts/setup_instance.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Rebuild registry with instance metadata
        run: python build_registry.py

      - name: Enable GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                source: { branch: 'main', path: '/' }
              });
              console.log('GitHub Pages enabled — Binder live at:');
              console.log(`https://${context.repo.owner}.github.io/${context.repo.repo}/`);
            } catch (e) {
              if (e.status === 409) {
                console.log('GitHub Pages already enabled.');
              } else {
                console.log(`Note: Could not auto-enable Pages (${e.status}). Enable manually in repo Settings > Pages.`);
              }
            }

      - name: Commit configuration
        run: |
          git config user.name "RAPP Setup Bot"
          git config user.email "rar-bot@users.noreply.github.com"
          git add rar.config.json registry.json binder/ staging/ agents/
          git diff --cached --quiet || git commit -m "Configure as RAPP binder instance [skip ci]"
          git push
