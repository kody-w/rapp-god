<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rappterpedia Daily</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IM+Fell+English+SC&display=swap');

  :root {
    --paper: #f4f0e8;
    --paper-dark: #e8e0d0;
    --ink: #1a1a18;
    --ink-light: #3a3a35;
    --ink-faint: #6a6a60;
    --rule: #1a1a18;
    --accent: #8b0000;
    --col-gap: 24px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Libre Baskerville', 'Georgia', serif;
    background: #d4cfc4;
    color: var(--ink);
    line-height: 1.55;
    font-size: 14px;
  }

  .newspaper {
    max-width: 1000px;
    margin: 20px auto;
    background: var(--paper);
    padding: 32px 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3), inset 0 0 80px rgba(0,0,0,.05);
    position: relative;
  }
  .newspaper::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,.008) 1px, rgba(0,0,0,.008) 2px);
    pointer-events: none;
  }

  /* ─── Masthead ─── */
  .masthead {
    text-align: center;
    border-bottom: 4px double var(--rule);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .masthead-top {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 4px;
    font-family: 'IM Fell English SC', serif;
  }
  .masthead h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 3.8rem;
    letter-spacing: 2px;
    line-height: 1;
    margin: 4px 0;
  }
  .masthead-subtitle {
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  /* ─── Section headers ─── */
  .section-head {
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--rule);
    border-top: 1px solid var(--rule);
    padding: 4px 0;
    margin: 20px 0 12px;
    color: var(--ink-light);
  }

  /* ─── Lead Story ─── */
  .lead-headline {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    line-height: 1.1;
    text-align: center;
    margin: 16px 0 8px;
    letter-spacing: -.5px;
  }
  .lead-deck {
    text-align: center;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-light);
    margin-bottom: 16px;
    max-width: 600px;
    margin-left: auto; margin-right: auto;
  }
  .lead-body {
    column-count: 3;
    column-gap: var(--col-gap);
    column-rule: 1px solid var(--ink-faint);
    text-align: justify;
    hyphens: auto;
  }
  .lead-body p { margin-bottom: 10px; text-indent: 1.5em; }
  .lead-body p:first-child { text-indent: 0; }
  .lead-body p:first-child::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 900;
    float: left;
    line-height: .8;
    margin: 4px 6px 0 0;
    color: var(--accent);
  }

  .hr-ornament {
    text-align: center; margin: 16px 0; color: var(--ink-faint);
    font-size: 1.2rem; letter-spacing: 8px;
  }

  /* ─── Two-column sections ─── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 2px solid var(--rule);
    margin-top: 16px;
  }
  .two-col > div { padding: 12px 16px; }
  .two-col > div:first-child { border-right: 1px solid var(--ink-faint); padding-left: 0; }
  .two-col > div:last-child { padding-right: 0; }

  /* ─── Headlines ─── */
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.15rem;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .headline-small {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: .95rem;
    line-height: 1.25;
    margin-bottom: 3px;
  }
  .byline {
    font-size: .72rem;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .story-text {
    font-size: .85rem;
    text-align: justify;
    hyphens: auto;
    margin-bottom: 14px;
  }
  .story-text p { margin-bottom: 6px; text-indent: 1.2em; }
  .story-text p:first-child { text-indent: 0; }

  /* ─── Classifieds ─── */
  .classifieds {
    background: var(--paper-dark);
    padding: 12px 16px;
    margin: 16px 0;
    border: 1px solid var(--ink-faint);
  }
  .classified-item {
    border-bottom: 1px dotted var(--ink-faint);
    padding: 8px 0;
    font-size: .82rem;
  }
  .classified-item:last-child { border-bottom: none; }
  .classified-item strong { font-family: 'Playfair Display', serif; }
  .classified-item .seeking { color: var(--accent); font-weight: 700; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; }

  /* ─── Weather ─── */
  .weather-box {
    border: 2px solid var(--rule);
    padding: 16px;
    text-align: center;
    margin: 16px 0;
  }
  .weather-icon { font-size: 2.5rem; margin-bottom: 4px; }
  .weather-temp {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
  }
  .weather-desc { font-size: .82rem; color: var(--ink-light); font-style: italic; }
  .weather-details { font-size: .75rem; color: var(--ink-faint); margin-top: 6px; }

  /* ─── Crossword ─── */
  .crossword-section { margin: 16px 0; }
  .crossword-grid {
    display: inline-grid;
    gap: 0;
    border: 2px solid var(--rule);
    margin: 8px 0;
  }
  .crossword-cell {
    width: 28px; height: 28px;
    border: 1px solid var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Libre Baskerville', serif;
    font-size: .75rem; font-weight: 700;
    position: relative;
    background: #fff;
    cursor: pointer;
    user-select: none;
  }
  .crossword-cell.black { background: var(--ink); cursor: default; }
  .crossword-cell .cell-num {
    position: absolute; top: 1px; left: 2px;
    font-size: .5rem; font-weight: 400; color: var(--ink-faint);
  }
  .crossword-cell.revealed { color: var(--accent); }
  .crossword-clues {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px;
    font-size: .78rem; margin-top: 8px;
  }
  .crossword-clues h4 {
    font-family: 'IM Fell English SC', serif;
    font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 4px; border-bottom: 1px solid var(--ink-faint); padding-bottom: 2px;
  }
  .clue { margin-bottom: 3px; cursor: pointer; }
  .clue:hover { color: var(--accent); }
  .clue-num { font-weight: 700; }
  .reveal-btn {
    font-family: 'IM Fell English SC', serif;
    background: var(--ink); color: var(--paper); border: none;
    padding: 6px 16px; font-size: .8rem; cursor: pointer;
    letter-spacing: .1em; margin-top: 8px;

  .reveal-btn:hover { background: var(--accent); }

  /* ─── Opinion ─── */
  .opinion-item {
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px dotted var(--ink-faint);
  }
  .opinion-item:last-child { border-bottom: none; }
  .opinion-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: .95rem;
    font-style: italic;
    margin-bottom: 2px;
  }
  .opinion-author { font-size: .72rem; color: var(--ink-faint); margin-bottom: 4px; }
  .opinion-excerpt { font-size: .82rem; color: var(--ink-light); }

  /* ─── Footer ─── */
  .paper-footer {
    border-top: 4px double var(--rule);
    margin-top: 24px;
    padding-top: 8px;
    text-align: center;
    font-size: .7rem;
    color: var(--ink-faint);
    font-family: 'IM Fell English SC', serif;
    letter-spacing: .15em;
  }

  /* ─── Ticker ─── */
  .ticker {
    background: var(--ink);
    color: var(--paper);
    padding: 6px 0;
    overflow: hidden;
    font-size: .75rem;
    letter-spacing: .05em;
    margin: 12px -40px 0;
  }
  .ticker-inner {
    display: flex; white-space: nowrap;
    animation: scroll 40s linear infinite;
  }
  .ticker-item { padding: 0 24px; }
  .ticker-item .bull { color: var(--accent); margin: 0 8px; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  @media (max-width: 700px) {
    .newspaper { padding: 20px 16px; margin: 10px; }
    .masthead h1 { font-size: 2.4rem; }
    .lead-headline { font-size: 1.6rem; }
    .lead-body { column-count: 1; }
    .two-col { grid-template-columns: 1fr; }
    .two-col > div:first-child { border-right: none; border-bottom: 1px solid var(--ink-faint); }
    .crossword-clues { grid-template-columns: 1fr; }
    .ticker { margin: 12px -16px 0; }
  }
</style>
</head>

const AGENT_WORDS = [
  "BASICAGENT", "CARDSMITH", "BORG", "RAPP", "DEALDESK", "PIPELINE",
  "TRIAGE", "FRAUD", "CLAIMS", "WEALTH", "INTAKE", "DISPATCH",
  "FORECAST", "COPILOT", "INVENTORY", "EMISSION", "PERMIT",
  "PROCUREMENT", "LOYALTY", "CHURN", "SENTIMENT", "ONBOARDING",
  "CREDENTIAL", "RECON", "COACH", "QUALIFY", "VELOCITY",
  "STALLED", "CROSSSELL", "WINLOSS", "GRANTS", "FOIA",

  agents: 131, articles: 403, threads: 55, tests: 962,
  publishers: 6, categories: 19, genesisDate: "April 5, 2026",
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UTILITIES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

const today = new Date();
const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
const vol = Math.floor((today - new Date('2025-01-15')) / (1000*60*60*24));
const edition = `Vol. ${Math.floor(vol/30)+1}, No. ${(vol%30)+1}`;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WEATHER REPORT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CROSSWORD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function generateCrossword() {
  // Pick 4-5 words for across and 3-4 for down
  const words = shuffle(AGENT_WORDS.filter(w => w.length >= 4 && w.length <= 10));
  const across = words.slice(0, 4);
  const down = words.slice(4, 7);
  const SIZE = 12;

  // Simple placement: stack across words, try to intersect down words
  const grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  const placements = [];
  let clueNum = 1;

  // Place across words
  across.forEach((word, i) => {
    const row = i * 3;
    const col = rand(0, SIZE - word.length);
    if (row < SIZE) {
      for (let c = 0; c < word.length; c++) grid[row][col+c] = word[c];
      placements.push({ num: clueNum++, word, dir: 'across', row, col, clue: `Agent: ${word.charAt(0) + word.slice(1).toLowerCase()} (${word.length})` });
    }
  });

  // Place down words — try to intersect with an across word
  down.forEach(word => {
    let placed = false;
    for (let attempt = 0; attempt < 50 && !placed; attempt++) {
      const col = rand(0, SIZE-1);
      const row = rand(0, SIZE - word.length);
      let canPlace = true;
      for (let r = 0; r < word.length; r++) {
        const existing = grid[row+r][col];
        if (existing !== null && existing !== word[r]) { canPlace = false; break; }
      }
      if (canPlace) {
        for (let r = 0; r < word.length; r++) grid[row+r][col] = word[r];
        placements.push({ num: clueNum++, word, dir: 'down', row, col, clue: `Agent: ${word.charAt(0) + word.slice(1).toLowerCase()} (${word.length})` });
        placed = true;
      }
    }
  });

  // Build grid HTML
  let gridHtml = '';
  const numMap = {};
  placements.forEach(p => { numMap[`${p.row},${p.col}`] = p.num; });

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const letter = grid[r][c];
      const num = numMap[`${r},${c}`] || '';
      if (letter) {
        gridHtml += `<div class="crossword-cell" data-letter="${letter}" onclick="this.classList.toggle('revealed');this.textContent=this.classList.contains('revealed')?'${letter}':''">
          ${num ? `<span class="cell-num">${num}</span>` : ''}
        </div>`;
      } else {
        gridHtml += `<div class="crossword-cell black"></div>`;
      }
    }
  }

  const acrossClues = placements.filter(p => p.dir === 'across')
    .map(p => `<div class="clue"><span class="clue-num">${p.num}.</span> ${p.clue}</div>`).join('');
  const downClues = placements.filter(p => p.dir === 'down')
    .map(p => `<div class="clue"><span class="clue-num">${p.num}.</span> ${p.clue}</div>`).join('');

  return `
    <div class="crossword-section">
      <div class="crossword-grid" style="grid-template-columns: repeat(${SIZE}, 28px)">
        ${gridHtml}
      </div>
      <div class="crossword-clues">
        <div><h4>Across</h4>${acrossClues}</div>
        <div><h4>Down</h4>${downClues}</div>
      </div>
      <button class="reveal-btn" onclick="document.querySelectorAll('.crossword-cell[data-letter]').forEach(c=>{c.classList.add('revealed');c.textContent=c.dataset.letter})">Reveal All</button>
    </div>
  `;
}

function generateTicker() {
  const items = shuffle([
    `AGENTS: ${STATS.agents} indexed`,
    `TESTS: ${STATS.tests} passing`,
    `WIKI: ${STATS.articles}+ articles published`,
    `FORUM: ${STATS.threads}+ active threads`,
    `PUBLISHERS: ${STATS.publishers} namespaces registered`,
    `CATEGORIES: ${STATS.categories} verticals covered`,
    "GENESIS SET: 131 agents declared permanent",
    "DREAM CATCHER: Frame 47 complete",
    "QUALITY: All contract tests green",
    "FEDERATION: Template instances available",
    "ORAPPTER: Desktop OS now live",
    "CONSTITUTION: Article XX ratified",
  ]);
  const sep = '<span class="bull">\u2022</span>';
  const inner = items.map(i => `<span class="ticker-item">${i}</span>`).join(sep);
  return `<div class="ticker"><div class="ticker-inner">${inner}${sep}${inner}</div></div>`;
}
