<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPP Business Mode</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-panel: #1a1f2b;
    --bg-input: #0f1528;
    --bubble-user: linear-gradient(135deg, #4a6cf7 0%, #6a3de8 100%);
    --bubble-assistant: #2d2d44;
    --text-primary: #e8e8f0;
    --text-secondary: #8b949e;
    --accent: #4a6cf7;
    --border: #30363d;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --cyan: #00d4ff;
    --radius: 10px;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar h1 { font-size: 0.95rem; font-weight: 600; color: var(--cyan); }
  .topbar-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(251,191,36,0.15);
    color: var(--yellow);
    font-weight: 500;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn-scan, .btn-add {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-scan:hover, .btn-add:hover {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* ── Panels container ── */
  .panels {
    flex: 1;
    display: flex;
    overflow-x: auto;
    gap: 1px;
    background: var(--border);
  }

  /* ── Single panel ── */
  .panel {
    min-width: 380px;
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    position: relative;
  }
  .panel.solo { min-width: 100%; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-header-left { display: flex; align-items: center; gap: 8px; }
  .panel-title { font-size: 0.85rem; font-weight: 600; }
  .panel-subtitle { font-size: 0.7rem; color: var(--text-secondary); }
  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .panel-dot.online { background: var(--green); }
  .panel-dot.offline { background: var(--red); }
  .panel-dot.checking { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .panel-actions { display: flex; gap: 6px; }
  .panel-btn {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .panel-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
  .panel-btn.vscode { color: #007acc; border-color: #007acc33; }
  .panel-btn.vscode:hover { border-color: #007acc; background: #007acc15; }

  .panel-badge {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .badge-brainstem { background: #00d4ff22; color: var(--cyan); }
  .badge-project { background: #00ff8822; color: #00ff88; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-bottom-right-radius: 3px;
  }
  .msg.assistant .bubble {
    background: var(--bubble-assistant);
    border-bottom-left-radius: 3px;
  }
  .bubble p { margin-bottom: 0.5em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    background: rgba(0,0,0,0.3);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.82em;
  }
  .bubble pre {
    background: #0d1117;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; }

  .welcome-msg {
    text-align: center;
    padding: 30px 16px;
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  .welcome-msg strong { color: var(--text-primary); }

  .typing-indicator {
    display: none;
    padding: 4px 0;
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-style: italic;
  }
  .typing-indicator.visible { display: block; }

  /* ── Input area ── */
  .input-area {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg-input);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-secondary); }

  .btn-send {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    flex-shrink: 0;
    align-self: flex-end;
    transition: opacity 0.2s;
  }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    padding: 40px;
    text-align: center;
  }
  .empty-state h2 { color: var(--text-primary); margin-bottom: 8px; font-size: 1.1rem; }
  .empty-state p { font-size: 0.9rem; max-width: 400px; line-height: 1.6; }

  /* ── Add panel modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-width: 340px;
    max-width: 460px;
  }
  .modal h3 { font-size: 1rem; margin-bottom: 16px; }
  .modal label { font-size: 0.82rem; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .modal input {
    width: 100%;
    background: var(--bg-input);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.85rem;
    margin-bottom: 14px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .modal-actions .btn-cancel { background: transparent; color: var(--text-secondary); }
  .modal-actions .btn-confirm { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <h1>RAPP Business Mode</h1>
    <span class="topbar-tag">experimental</span>
  </div>
  <div class="topbar-right">
    <button class="btn-scan" id="btnScan" title="Scan for running RAPP instances">Scan</button>
    <button class="btn-add" id="btnAdd" title="Add a custom instance">+ Add</button>
  </div>
</div>

<!-- Panels -->
<div class="panels" id="panels">
  <div class="empty-state" id="emptyState">
    <div>
      <h2>No RAPP instances detected</h2>
      <p>Start your brainstem or a hatched project, then click <strong>Scan</strong> to discover running instances.</p>
    </div>
  </div>
</div>

<!-- Add modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add RAPP Instance</h3>
    <label>Name</label>
    <input type="text" id="modalName" placeholder="e.g. contoso-bot">
    <label>URL</label>
    <input type="text" id="modalUrl" placeholder="http://localhost:7073">
    <label>Project path (optional, for VS Code)</label>
    <input type="text" id="modalPath" placeholder="~/rapp-projects/contoso-bot">
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-confirm" id="modalConfirm">Add</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Markdown setup ──
  marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Instance registry ──
  // Each instance: { id, name, url, type ('brainstem'|'project'), path, port }
  let instances = [];
  let panels = {};  // id -> panel state

  const panelsEl = document.getElementById('panels');
  const emptyState = document.getElementById('emptyState');

  // ── Scan for running instances ──
  async function scanInstances() {
    const found = [];
    const portsToScan = [];

    // Brainstem on 7071
    portsToScan.push({ port: 7071, type: 'brainstem', name: 'Brainstem' });

    // Hatched projects on 7072-7085
    for (let p = 7072; p <= 7085; p++) {
      portsToScan.push({ port: p, type: 'project', name: `Project :${p}` });
    }

    // Also check saved custom instances
    const saved = JSON.parse(localStorage.getItem('rapp_biz_custom') || '[]');

    const checks = portsToScan.map(async (entry) => {
      const url = `http://localhost:${entry.port}`;
      try {
        const r = await fetch(`${url}/api/health`, { signal: AbortSignal.timeout(2000) });
        if (r.ok) {
          const data = await r.json();
          found.push({
            id: `port-${entry.port}`,
            name: data.assistant_name || entry.name,
            url: url + '/api',
            type: entry.type,
            port: entry.port,
            path: '',
            health: data,
          });
        }
      } catch (_) { /* not running */ }
    });

    await Promise.all(checks);

    // Add saved custom instances (check them too)
    for (const custom of saved) {
      const exists = found.some(f => f.url === custom.url);
      if (!exists) {
        try {
          const healthUrl = custom.url.replace(/\/api\/?$/, '/api') + '/health';
          const r = await fetch(healthUrl, { signal: AbortSignal.timeout(2000) });
          if (r.ok) {
            found.push({ ...custom, id: custom.id || 'custom-' + custom.port });
          }
        } catch (_) { /* offline */ }
      }
    }

    // Sort: brainstem first, then by port
    found.sort((a, b) => {
      if (a.type === 'brainstem') return -1;
      if (b.type === 'brainstem') return 1;
      return (a.port || 0) - (b.port || 0);
    });

    // Merge with existing (preserve conversation history)
    const newIds = new Set(found.map(f => f.id));
    instances = found;

    // Remove panels for instances no longer found
    for (const id of Object.keys(panels)) {
      if (!newIds.has(id)) {
        const el = document.getElementById(`panel-${id}`);
        if (el) el.remove();
        delete panels[id];
      }
    }

    // Add/update panels
    for (const inst of instances) {
      if (!panels[inst.id]) {
        addPanel(inst);
      } else {
        updatePanelStatus(inst.id, true);
      }
    }

    emptyState.style.display = instances.length ? 'none' : 'flex';
    updatePanelLayout();
  }

  // ── Panel creation ──
  function addPanel(inst) {
    const id = inst.id;
    panels[id] = {
      instance: inst,
      history: [],
      sending: false,
    };

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = `panel-${id}`;

    const badge = inst.type === 'brainstem'
      ? '<span class="panel-badge badge-brainstem">brainstem</span>'
      : '<span class="panel-badge badge-project">project</span>';

    const portLabel = inst.port ? `:${inst.port}` : '';

    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-header-left">
          <div class="panel-dot online" id="dot-${id}"></div>
          <div>
            <div class="panel-title">${escapeHtml(inst.name)} ${badge}</div>
            <div class="panel-subtitle">localhost${portLabel}</div>
          </div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn vscode" onclick="openVSCode('${id}')" title="Open in VS Code">VS Code</button>
          <button class="panel-btn" onclick="clearPanel('${id}')" title="Clear chat">Clear</button>
          <button class="panel-btn" onclick="removePanel('${id}')" title="Remove panel">x</button>
        </div>
      </div>
      <div class="chat-area" id="chat-${id}">
        <div class="welcome-msg">
          <strong>${escapeHtml(inst.name)}</strong><br>
          ${inst.type === 'brainstem' ? 'Your local AI assistant' : 'Customer cloud project'}
          <br><span style="font-size:0.75rem">Type a message to start</span>
        </div>
      </div>
      <div class="typing-indicator" id="typing-${id}">Thinking...</div>
      <div class="input-area">
        <textarea rows="1" placeholder="Message ${escapeHtml(inst.name)}..." id="input-${id}"
                  onkeydown="handleKey(event, '${id}')" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="send-${id}" onclick="sendMessage('${id}')">&#9654;</button>
      </div>
    `;

    panelsEl.appendChild(panel);
  }

  function updatePanelLayout() {
    const count = Object.keys(panels).length;
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('solo', count === 1);
    });
  }

  function updatePanelStatus(id, online) {
    const dot = document.getElementById(`dot-${id}`);
    if (dot) {
      dot.className = `panel-dot ${online ? 'online' : 'offline'}`;
    }
  }

  // ── Chat functions ──
  window.sendMessage = async function (id) {
    const state = panels[id];
    if (!state || state.sending) return;

    const input = document.getElementById(`input-${id}`);
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    state.sending = true;
    document.getElementById(`send-${id}`).disabled = true;

    // Add user message
    addBubble(id, 'user', escapeHtml(text));
    state.history.push({ role: 'user', content: text });

    // Show typing
    const typing = document.getElementById(`typing-${id}`);
    typing.classList.add('visible');

    try {
      // Get user GUID for this panel
      let guid = localStorage.getItem(`rapp_guid_${id}`);
      if (!guid) {
        guid = crypto.randomUUID();
        localStorage.setItem(`rapp_guid_${id}`, guid);
      }

      const chatUrl = state.instance.url + '/businessinsightbot_function';
      const r = await fetch(chatUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_input: text,
          conversation_history: state.history.slice(-20),
          user_guid: guid,
        }),
        signal: AbortSignal.timeout(60000),
      });

      if (!r.ok) throw new Error(`HTTP ${r.status}`);

      const data = await r.json();
      const response = data.assistant_response || data.response || 'No response';

      // Split at |||VOICE||| delimiter
      const parts = response.split('|||VOICE|||');
      const formatted = parts[0].trim();

      state.history.push({ role: 'assistant', content: formatted });
      addBubble(id, 'assistant', marked.parse(formatted), data.agent_logs);

    } catch (err) {
      addBubble(id, 'assistant', `<span style="color:var(--red)">Error: ${escapeHtml(err.message)}</span>`);
      updatePanelStatus(id, false);
    } finally {
      typing.classList.remove('visible');
      state.sending = false;
      document.getElementById(`send-${id}`).disabled = false;
    }
  };

  function addBubble(id, role, html, agentLogs) {
    const chat = document.getElementById(`chat-${id}`);
    // Remove welcome message
    const welcome = chat.querySelector('.welcome-msg');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    msg.appendChild(bubble);

    if (agentLogs && role === 'assistant') {
      const logs = document.createElement('div');
      logs.style.cssText = 'font-size:0.7rem;color:var(--text-secondary);margin-top:4px;padding-left:4px;';
      logs.textContent = agentLogs;
      msg.appendChild(logs);
    }

    chat.appendChild(msg);
    requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
  }

  // ── Panel actions ──
  window.clearPanel = function (id) {
    const state = panels[id];
    if (!state) return;
    state.history = [];
    const chat = document.getElementById(`chat-${id}`);
    chat.innerHTML = `
      <div class="welcome-msg">
        <strong>${escapeHtml(state.instance.name)}</strong><br>Chat cleared
      </div>
    `;
  };

  window.removePanel = function (id) {
    const el = document.getElementById(`panel-${id}`);
    if (el) el.remove();
    delete panels[id];
    instances = instances.filter(i => i.id !== id);
    emptyState.style.display = instances.length ? 'none' : 'flex';
    updatePanelLayout();

    // Remove from saved customs
    const saved = JSON.parse(localStorage.getItem('rapp_biz_custom') || '[]');
    localStorage.setItem('rapp_biz_custom', JSON.stringify(saved.filter(s => s.id !== id)));
  };

  window.openVSCode = function (id) {
    const state = panels[id];
    if (!state) return;
    const inst = state.instance;

    let path = inst.path;
    if (!path) {
      // Guess the path based on type
      if (inst.type === 'brainstem') {
        path = '~/rapp-installer/rapp_brainstem';
      } else {
        // Try to extract from name or use port-based guess
        const name = inst.name.toLowerCase().replace(/[^a-z0-9-]/g, '-');
        path = `~/rapp-projects/${name}`;
      }
    }

    // vscode:// URI scheme
    const expanded = path.replace(/^~/, '');
    window.open(`vscode://file${expanded}`, '_blank');
  };

  // ── Input handling ──
  window.handleKey = function (e, id) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(id);
    }
  };

  window.autoResize = function (el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  };

  // ── Add custom modal ──
  const addModal = document.getElementById('addModal');

  document.getElementById('btnAdd').addEventListener('click', () => {
    addModal.classList.add('visible');
    document.getElementById('modalName').focus();
  });

  document.getElementById('modalCancel').addEventListener('click', () => {
    addModal.classList.remove('visible');
  });

  document.getElementById('modalConfirm').addEventListener('click', () => {
    const name = document.getElementById('modalName').value.trim() || 'Custom';
    let url = document.getElementById('modalUrl').value.trim();
    const path = document.getElementById('modalPath').value.trim();

    if (!url) return;
    if (!url.endsWith('/api')) url += '/api';

    const port = parseInt(url.match(/:(\d+)/)?.[1] || '0');
    const inst = {
      id: 'custom-' + Date.now(),
      name: name,
      url: url,
      type: 'project',
      port: port,
      path: path,
    };

    // Save to localStorage
    const saved = JSON.parse(localStorage.getItem('rapp_biz_custom') || '[]');
    saved.push(inst);
    localStorage.setItem('rapp_biz_custom', JSON.stringify(saved));

    // Add panel immediately
    instances.push(inst);
    addPanel(inst);
    emptyState.style.display = 'none';
    updatePanelLayout();

    // Clear and close modal
    document.getElementById('modalName').value = '';
    document.getElementById('modalUrl').value = '';
    document.getElementById('modalPath').value = '';
    addModal.classList.remove('visible');

    // Check if it's actually online
    fetch(url + '/health', { signal: AbortSignal.timeout(2000) })
      .then(r => { if (!r.ok) throw new Error(); })
      .catch(() => updatePanelStatus(inst.id, false));
  });

  addModal.addEventListener('click', (e) => {
    if (e.target === addModal) addModal.classList.remove('visible');
  });

  // ── Scan button ──
  document.getElementById('btnScan').addEventListener('click', () => {
    document.getElementById('btnScan').textContent = 'Scanning...';
    scanInstances().finally(() => {
      document.getElementById('btnScan').textContent = 'Scan';
    });
  });

  // ── Periodic health checks ──
  setInterval(() => {
    for (const id of Object.keys(panels)) {
      const inst = panels[id].instance;
      const healthUrl = inst.url + '/health';
      fetch(healthUrl, { signal: AbortSignal.timeout(3000) })
        .then(r => updatePanelStatus(id, r.ok))
        .catch(() => updatePanelStatus(id, false));
    }
  }, 15000);

  // ── Initial scan on load ──
  scanInstances();
