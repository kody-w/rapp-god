name: Generate Mars Frames

on:
  # Automatic publication is paused until all historical frame schemas are
  # normalized. Manual runs remain fail-closed and append-only.
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of frames to generate'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Validate current release
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm test

      - name: Generate new frames
        env:
          FRAME_COUNT: ${{ github.event.inputs.count || '1' }}
        run: |
          case "$FRAME_COUNT" in
            ''|*[!0-9]*|0) echo "count must be a positive integer"; exit 2 ;;
          esac
          python3 tools/generate_frames.py --count "$FRAME_COUNT"
          python3 tools/generate_frames.py --check

      - name: Commit and push
        run: |
          git config user.name "Mars Frame Generator"
          git config user.email "frames@mars-barn.local"
          git add data/frames/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new frames to commit"
          else
            LATEST=$(cat data/frames/latest.json | python3 -c "import sys,json;print(json.load(sys.stdin)['sol'])")
            git commit -m "frame: Sol ${LATEST} — daily Mars conditions

            Auto-generated from NASA Mars climate models.
            Same planet for everyone. Compete on management."
            git push
          fi
