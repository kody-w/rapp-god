<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Marketplace - RAPPsquare</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/marketplace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-brand">
            <a href="../index.html">
                <span class="logo">RAPP<span style="font-weight:400">square</span></span>
            </a>
        </div>
        <div class="nav-links">
            <a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="marketplace.html" class="nav-link active"><i class="fas fa-store"></i> Marketplace</a>
            <a href="rappbook.html" class="nav-link"><i class="fas fa-book-open"></i> RAPPbook</a>
            <a href="cards.html" class="nav-link"><i class="fas fa-id-card"></i> Cards</a>
            <a href="rappverse.html" class="nav-link"><i class="fas fa-globe"></i> RAPPverse</a>
            <a href="api-docs.html" class="nav-link"><i class="fas fa-code"></i> API</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-ghost" id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button class="btn btn-primary"><i class="fas fa-plus"></i> Publish Agent</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="marketplace-container">
        <!-- Header -->
        <header class="marketplace-header">
            <h1><i class="fas fa-store"></i> Agent Marketplace</h1>
            <p>Browse, install, and publish AI agents for the RAPP ecosystem</p>
        </header>

        <!-- Search & Filters -->
        <section class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search agents...">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-category="all">All</button>
                <button class="filter-tab" data-category="core">Core</button>
                <button class="filter-tab" data-category="integrations">Integrations</button>
                <button class="filter-tab" data-category="industry">Industry</button>
                <button class="filter-tab" data-category="utilities">Utilities</button>
            </div>
        </section>

        <!-- Agent Grid -->
        <section class="agent-grid" id="agent-grid">
            <!-- Populated by JS -->
        </section>

        <!-- Agent Detail Modal -->
        <div class="modal-overlay" id="agent-modal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div id="modal-body">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Config: Load local overrides first (if exists), then defaults -->
    <script src="../assets/js/config.local.js" onerror=""></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        // Agent data
        const AGENTS = [
            {
                id: 'context_memory_agent',
                name: 'Context Memory',
                icon: 'brain',
                category: 'core',
                description: 'Persistent memory system for cross-session context recall. Stores facts, preferences, and conversation history.',
                author: 'RAPP Core',
                version: '2.1.0',
                installs: 3420,
                rating: 4.9,
                features: ['Persistent storage', 'User-specific memory', 'Shared memory'],
                code: `class ContextMemoryAgent(BasicAgent):
    def perform(self, user_guid=None, full_recall=False):
        memory = self.storage.get_user_memory(user_guid)
        return json.dumps(memory)`
            },
            {
                id: 'manage_memory_agent',
                name: 'Memory Manager',
                icon: 'database',
                category: 'core',
                description: 'Store and manage facts, insights, preferences, and tasks in the memory system.',
                author: 'RAPP Core',
                version: '2.0.0',
                installs: 2890,
                rating: 4.8,
                features: ['Fact storage', 'Preference tracking', 'Task management'],
                code: `class ManageMemoryAgent(BasicAgent):
    def perform(self, action, content, memory_type):
        if action == 'store':
            self.storage.store_memory(content, memory_type)
        return "Memory updated"`
            },
            {
                id: 'deal_tracker_agent',
                name: 'Deal Tracker',
                icon: 'handshake',
                category: 'integrations',
                description: 'CRM integration for tracking sales deals, pipeline stages, and forecasting.',
                author: 'Sales Team',
                version: '1.5.0',
                installs: 1856,
                rating: 4.7,
                features: ['Pipeline tracking', 'Deal forecasting', 'CRM sync'],
                code: `class DealTrackerAgent(BasicAgent):
    def perform(self, action, deal_id=None):
        if action == 'get_pipeline':
            return self.crm.get_pipeline()
        return "Deal operation complete"`
            },
            {
                id: 'email_agent',
                name: 'Email Agent',
                icon: 'envelope',
                category: 'utilities',
                description: 'Draft, send, and manage emails through natural language commands.',
                author: 'Productivity Team',
                version: '1.3.0',
                installs: 2134,
                rating: 4.6,
                features: ['Email drafting', 'Send emails', 'Template support'],
                code: `class EmailAgent(BasicAgent):
    def perform(self, action, recipient=None, subject=None):
        if action == 'draft':
            return self.draft_email(recipient, subject)
        return "Email operation complete"`
            },
            {
                id: 'calendar_agent',
                name: 'Calendar Sync',
                icon: 'calendar-alt',
                category: 'utilities',
                description: 'Manage calendar events, scheduling, and availability checks.',
                author: 'Productivity Team',
                version: '1.2.0',
                installs: 1678,
                rating: 4.5,
                features: ['Event creation', 'Availability check', 'Meeting scheduling'],
                code: `class CalendarAgent(BasicAgent):
    def perform(self, action, date=None, time=None):
        if action == 'check_availability':
            return self.check_slots(date)
        return "Calendar updated"`
            },
            {
                id: 'healthcare_agent',
                name: 'Healthcare Assistant',
                icon: 'heartbeat',
                category: 'industry',
                description: 'Patient scheduling, appointment reminders, and basic health inquiries.',
                author: 'Healthcare Solutions',
                version: '1.0.0',
                installs: 567,
                rating: 4.4,
                features: ['Patient scheduling', 'Appointment reminders', 'FAQ handling'],
                code: `class HealthcareAgent(BasicAgent):
    def perform(self, action, patient_id=None):
        if action == 'schedule':
            return self.schedule_appointment(patient_id)
        return "Healthcare operation complete"`
            },
            {
                id: 'finance_agent',
                name: 'Finance Tracker',
                icon: 'chart-line',
                category: 'industry',
                description: 'Track expenses, generate reports, and provide financial insights.',
                author: 'FinTech Team',
                version: '1.1.0',
                installs: 892,
                rating: 4.6,
                features: ['Expense tracking', 'Report generation', 'Budget alerts'],
                code: `class FinanceAgent(BasicAgent):
    def perform(self, action, amount=None, category=None):
        if action == 'track_expense':
            return self.log_expense(amount, category)
        return "Finance operation complete"`
            },
            {
                id: 'document_agent',
                name: 'Document Processor',
                icon: 'file-alt',
                category: 'utilities',
                description: 'Parse, analyze, and extract information from documents.',
                author: 'Document Team',
                version: '1.4.0',
                installs: 1234,
                rating: 4.7,
                features: ['PDF parsing', 'Text extraction', 'Summary generation'],
                code: `class DocumentAgent(BasicAgent):
    def perform(self, action, document=None):
        if action == 'summarize':
            return self.summarize(document)
        return "Document processed"`
            }
        ];

        let filteredAgents = [...AGENTS];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderAgents();
            initFilters();
            initSearch();
        });

        function renderAgents() {
            const grid = document.getElementById('agent-grid');
            grid.innerHTML = filteredAgents.map(agent => `
                <div class="agent-card" onclick="showAgentDetail('${agent.id}')">
                    <div class="agent-icon">
                        <i class="fas fa-${agent.icon}"></i>
                    </div>
                    <div class="agent-info">
                        <h3>${agent.name}</h3>
                        <span class="agent-category">${agent.category}</span>
                        <p>${agent.description}</p>
                        <div class="agent-meta">
                            <span><i class="fas fa-download"></i> ${formatNumber(agent.installs)}</span>
                            <span><i class="fas fa-star"></i> ${agent.rating}</span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); installAgent('${agent.id}')">
                        <i class="fas fa-plus"></i> Install
                    </button>
                </div>
            `).join('');
        }

        function initFilters() {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const category = tab.dataset.category;
                    filteredAgents = category === 'all'
                        ? [...AGENTS]
                        : AGENTS.filter(a => a.category === category);
                    renderAgents();
                });
            });
        }

        function initSearch() {
            const input = document.getElementById('search-input');
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                filteredAgents = AGENTS.filter(a =>
                    a.name.toLowerCase().includes(query) ||
                    a.description.toLowerCase().includes(query)
                );
                renderAgents();
            });
        }

        function showAgentDetail(agentId) {
            const agent = AGENTS.find(a => a.id === agentId);
            if (!agent) return;

            const modal = document.getElementById('agent-modal');
            const body = document.getElementById('modal-body');

            body.innerHTML = `
                <div class="agent-detail">
                    <div class="agent-detail-header">
                        <div class="agent-icon large">
                            <i class="fas fa-${agent.icon}"></i>
                        </div>
                        <div>
                            <h2>${agent.name}</h2>
                            <span class="agent-category">${agent.category}</span>
                            <p class="agent-author">by ${agent.author} &bull; v${agent.version}</p>
                        </div>
                    </div>

                    <p class="agent-description">${agent.description}</p>

                    <div class="agent-stats">
                        <div class="stat">
                            <i class="fas fa-download"></i>
                            <span>${formatNumber(agent.installs)} installs</span>
                        </div>
                        <div class="stat">
                            <i class="fas fa-star"></i>
                            <span>${agent.rating} rating</span>
                        </div>
                    </div>

                    <h3>Features</h3>
                    <ul class="feature-list">
                        ${agent.features.map(f => `<li><i class="fas fa-check"></i> ${f}</li>`).join('')}
                    </ul>

                    <h3>Example Code</h3>
                    <pre><code>${agent.code}</code></pre>

                    <div class="agent-actions">
                        <button class="btn btn-primary btn-lg" onclick="installAgent('${agent.id}')">
                            <i class="fas fa-download"></i> Install Agent
                        </button>
                        <button class="btn btn-secondary btn-lg" onclick="viewDocs('${agent.id}')">
                            <i class="fas fa-book"></i> View Docs
                        </button>
                    </div>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('agent-modal').classList.remove('active');
        }

        function installAgent(agentId) {
            const agent = AGENTS.find(a => a.id === agentId);
            RAPP.showToast(`Installing ${agent.name}...`, 'info');

            setTimeout(() => {
                RAPP.showToast(`${agent.name} installed successfully!`, 'success');
            }, 1500);
        }

        function viewDocs(agentId) {
            window.location.href = `api-docs.html#agent-${agentId}`;
        }

        function formatNumber(num) {
            return num >= 1000 ? (num / 1000).toFixed(1) + 'K' : num.toString();
        }

        // Close modal on outside click
        document.getElementById('agent-modal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
