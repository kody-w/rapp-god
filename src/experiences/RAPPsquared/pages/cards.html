<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPP Cards - RAPPsquare</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cards-container {
            padding: 100px var(--space-xl) var(--space-3xl);
            max-width: 1200px;
            margin: 0 auto;
        }

        .cards-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .cards-header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-md);
            font-size: 2.5rem;
            margin-bottom: var(--space-sm);
        }

        .cards-header h1 i { color: var(--accent-primary); }

        .pack-section {
            text-align: center;
            margin-bottom: var(--space-3xl);
        }

        .pack-container {
            display: flex;
            justify-content: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
            margin-bottom: var(--space-xl);
        }

        .card-pack {
            width: 180px;
            height: 260px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid var(--accent-primary);
            border-radius: var(--border-radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .card-pack::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .card-pack:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
        }

        .card-pack:hover::before { opacity: 0.1; }

        .card-pack i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: var(--space-md);
            z-index: 1;
        }

        .card-pack span {
            font-weight: 600;
            z-index: 1;
        }

        .card-pack .pack-price {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: var(--space-sm);
            z-index: 1;
        }

        .pack-legendary { border-color: #f59e0b; }
        .pack-legendary i { color: #f59e0b; }

        .collection-section h2 {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-lg);
        }

        .agent-card {
            aspect-ratio: 2.5/3.5;
            background: linear-gradient(145deg, #1e1e2e 0%, #12121a 100%);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .agent-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .agent-card.common { border-color: #6b7280; }
        .agent-card.uncommon { border-color: #10b981; }
        .agent-card.rare { border-color: #3b82f6; }
        .agent-card.epic { border-color: #8b5cf6; }
        .agent-card.legendary {
            border-color: #f59e0b;
            background: linear-gradient(145deg, #2d2416 0%, #1a1408 100%);
        }

        .agent-card.legendary::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: conic-gradient(from 0deg, transparent, #f59e0b, transparent, #f59e0b, transparent);
            animation: holographic 3s linear infinite;
            opacity: 0.1;
        }

        @keyframes holographic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-rarity {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: var(--border-radius-sm);
            text-transform: uppercase;
            font-weight: 600;
        }

        .card-rarity.common { background: #6b7280; }
        .card-rarity.uncommon { background: #10b981; }
        .card-rarity.rare { background: #3b82f6; }
        .card-rarity.epic { background: #8b5cf6; }
        .card-rarity.legendary { background: #f59e0b; color: #000; }

        .card-icon {
            width: 64px;
            height: 64px;
            margin: var(--space-md) auto;
            background: var(--accent-gradient);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            position: relative;
            z-index: 1;
        }

        .card-name {
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: var(--space-xs);
            position: relative;
            z-index: 1;
        }

        .card-type {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: var(--space-md);
            position: relative;
            z-index: 1;
        }

        .card-stats {
            display: flex;
            justify-content: space-around;
            margin-top: auto;
            padding-top: var(--space-sm);
            border-top: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .card-stat {
            text-align: center;
        }

        .card-stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .card-stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Pack Opening Modal */
        .pack-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .pack-modal.active { display: flex; }

        .pack-reveal {
            display: flex;
            gap: var(--space-xl);
            flex-wrap: wrap;
            justify-content: center;
        }

        .pack-reveal .agent-card {
            animation: cardReveal 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(50px) rotateY(180deg);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0) rotateY(0);
            }
        }

        .close-pack-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand">
            <a href="../index.html"><span class="logo">RAPP<span style="font-weight:400">square</span></span></a>
        </div>
        <div class="nav-links">
            <a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="marketplace.html" class="nav-link"><i class="fas fa-store"></i> Marketplace</a>
            <a href="rappbook.html" class="nav-link"><i class="fas fa-book-open"></i> RAPPbook</a>
            <a href="cards.html" class="nav-link active"><i class="fas fa-id-card"></i> Cards</a>
            <a href="rappverse.html" class="nav-link"><i class="fas fa-globe"></i> RAPPverse</a>
            <a href="api-docs.html" class="nav-link"><i class="fas fa-code"></i> API</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-ghost" id="theme-toggle"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <main class="cards-container">
        <header class="cards-header">
            <h1><i class="fas fa-id-card"></i> RAPP Cards</h1>
            <p class="text-muted">Collect, trade, and battle with AI agent cards</p>
        </header>

        <section class="pack-section">
            <h2>Open Packs</h2>
            <div class="pack-container">
                <div class="card-pack" onclick="openPack('standard')">
                    <i class="fas fa-box"></i>
                    <span>Standard Pack</span>
                    <span class="pack-price">100 RAPP</span>
                </div>
                <div class="card-pack pack-legendary" onclick="openPack('legendary')">
                    <i class="fas fa-crown"></i>
                    <span>Legendary Pack</span>
                    <span class="pack-price">500 RAPP</span>
                </div>
            </div>
        </section>

        <section class="collection-section">
            <h2><i class="fas fa-layer-group"></i> Your Collection</h2>
            <div class="card-grid" id="card-grid">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <div class="pack-modal" id="pack-modal">
        <span class="close-pack-modal" onclick="closePackModal()">&times;</span>
        <div class="pack-reveal" id="pack-reveal"></div>
    </div>

    <!-- Config: Load local overrides first (if exists), then defaults -->
    <script src="../assets/js/config.local.js" onerror=""></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        const CARDS = [
            { id: 1, name: 'Context Memory', type: 'Core Agent', icon: 'brain', rarity: 'legendary', power: 95, speed: 88, utility: 92 },
            { id: 2, name: 'Deal Tracker', type: 'Integration', icon: 'handshake', rarity: 'epic', power: 78, speed: 72, utility: 85 },
            { id: 3, name: 'Email Agent', type: 'Utility', icon: 'envelope', rarity: 'rare', power: 65, speed: 80, utility: 78 },
            { id: 4, name: 'Calendar Sync', type: 'Utility', icon: 'calendar-alt', rarity: 'uncommon', power: 55, speed: 70, utility: 72 },
            { id: 5, name: 'Document Parser', type: 'Utility', icon: 'file-alt', rarity: 'rare', power: 70, speed: 65, utility: 80 },
            { id: 6, name: 'Finance Tracker', type: 'Industry', icon: 'chart-line', rarity: 'epic', power: 75, speed: 68, utility: 82 },
            { id: 7, name: 'Healthcare Bot', type: 'Industry', icon: 'heartbeat', rarity: 'uncommon', power: 60, speed: 75, utility: 70 },
            { id: 8, name: 'Code Reviewer', type: 'Dev Tool', icon: 'code', rarity: 'common', power: 50, speed: 85, utility: 65 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderCollection();
        });

        function renderCollection() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = CARDS.map(card => renderCard(card)).join('');
        }

        function renderCard(card) {
            return `
                <div class="agent-card ${card.rarity}">
                    <span class="card-rarity ${card.rarity}">${card.rarity}</span>
                    <div class="card-icon">
                        <i class="fas fa-${card.icon}"></i>
                    </div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-stats">
                        <div class="card-stat">
                            <div class="card-stat-value">${card.power}</div>
                            <div class="card-stat-label">PWR</div>
                        </div>
                        <div class="card-stat">
                            <div class="card-stat-value">${card.speed}</div>
                            <div class="card-stat-label">SPD</div>
                        </div>
                        <div class="card-stat">
                            <div class="card-stat-value">${card.utility}</div>
                            <div class="card-stat-label">UTL</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function openPack(type) {
            const rarities = type === 'legendary'
                ? ['rare', 'rare', 'epic', 'epic', 'legendary']
                : ['common', 'common', 'uncommon', 'uncommon', 'rare'];

            const pulled = rarities.map(rarity => {
                const pool = CARDS.filter(c => c.rarity === rarity);
                return pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : CARDS[0];
            });

            const reveal = document.getElementById('pack-reveal');
            reveal.innerHTML = pulled.map((card, i) => `
                <div class="agent-card ${card.rarity}" style="animation-delay: ${i * 0.2}s">
                    <span class="card-rarity ${card.rarity}">${card.rarity}</span>
                    <div class="card-icon">
                        <i class="fas fa-${card.icon}"></i>
                    </div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-stats">
                        <div class="card-stat">
                            <div class="card-stat-value">${card.power}</div>
                            <div class="card-stat-label">PWR</div>
                        </div>
                        <div class="card-stat">
                            <div class="card-stat-value">${card.speed}</div>
                            <div class="card-stat-label">SPD</div>
                        </div>
                        <div class="card-stat">
                            <div class="card-stat-value">${card.utility}</div>
                            <div class="card-stat-label">UTL</div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('pack-modal').classList.add('active');
        }

        function closePackModal() {
            document.getElementById('pack-modal').classList.remove('active');
        }
    </script>
</body>
</html>
