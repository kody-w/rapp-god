  <!-- ─────────────────────────────────────────────────────────────
       ez-rapp Electron patches — applied on top of the upstream
       RAPP Brainstem index.html. The grail UI is locked at
       ~/.brainstem/src/rapp_brainstem/index.html; we vendor a copy
       at public/brainstem-shell.html and apply our Electron-specific
       fixes WITHOUT touching the original. To refresh from upstream,
       run scripts/sync-brainstem-shell.sh — it re-injects this block.
       ─────────────────────────────────────────────────────────── -->
  <base href="http://127.0.0.1:7071/">
  <script>
  (() => {
    // The brainstem JS uses relative paths (fetch("/chat"), XHR to
    // "/agents", etc). When this HTML loads from file:// inside the
    // Electron window, those relative paths resolve to file:/// and
    // never hit the brainstem. Force them to localhost:7071.
    const BASE = "http://127.0.0.1:7071";
    const _f = window.fetch.bind(window);
    window.fetch = (input, init) => {
      if (typeof input === "string" && input.startsWith("/")) input = BASE + input;
      else if (input instanceof Request && input.url.startsWith("file://")) {
        const u = new URL(input.url);
        input = new Request(BASE + u.pathname + u.search, input);
      }
      return _f(input, init);
    };
    const _open = window.XMLHttpRequest.prototype.open;
    window.XMLHttpRequest.prototype.open = function(method, url, ...rest) {
      if (typeof url === "string" && url.startsWith("/")) url = BASE + url;
      return _open.call(this, method, url, ...rest);
    };

    // Upstream typo fixes — the brainstem HTML renders some labels with
    // typos ("Trsh" instead of "Trash" on the agents-panel delete
    // button). Upstream is sacred; patch the rendered DOM here so the
    // text is correct in both the Electron build and the PWA.
    const TYPOS = { "Trsh": "Trash" };
    const fixTextNodes = (root) => {
      if (!root) return;
      const it = document.createNodeIterator(root, NodeFilter.SHOW_TEXT, null);
      let n;
      while ((n = it.nextNode())) {
        const fix = TYPOS[(n.nodeValue || "").trim()];
        if (fix) n.nodeValue = fix;
      }
    };
    const fixOne = (node) => {
      if (!node) return;
      if (node.nodeType === 1) fixTextNodes(node);
      else if (node.nodeType === 3 && TYPOS[(node.nodeValue || "").trim()]) {
        node.nodeValue = TYPOS[node.nodeValue.trim()];
      }
    };
    const startTypoWatcher = () => {
      fixTextNodes(document.body);
      new MutationObserver((muts) => {
        for (const m of muts) {
          m.addedNodes.forEach(fixOne);
          // Also catch text-only updates to existing elements (the
          // brainstem sometimes re-uses a button and just rewrites
          // textContent).
          if (m.type === "characterData") fixOne(m.target);
        }
      }).observe(document.body, { childList: true, subtree: true, characterData: true });
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", startTypoWatcher, { once: true });
    } else {
      startTypoWatcher();
    }
  })();
  </script>
  <style>
  /* macOS traffic-light room — Electron's titleBarStyle "hiddenInset"
     puts the close/min/zoom buttons at top-left (~14px). Shift the
     brainstem header right so the buttons sit clear of the logo. */
  body > header {
    padding-left: 92px !important;
    -webkit-app-region: drag;
  }
  /* Anything interactive inside the chrome must opt out of drag. */
  body > header button,
  body > header a,
  body > header input,
  body > header select,
  body > header [role="button"],
  body > header [tabindex],
  body > header .controls,
  body > header .controls *,
  button, input, textarea, select, a, [role="button"] {
    -webkit-app-region: no-drag;
  }

  /* ── Installed Agents panel layout fix ────────────────────────
     Upstream pins #agents-panel at 300px with .agent-list li using
     justify-content: space-between and no wrap. Long agent names
     like "RappLeviathanFactory (rapp_leviathan_factory_agent.py)"
     blow past the panel width and shove the Export/Trash buttons
     off the right edge. Make the panel wider, let the name flex-
     grow + wrap, and freeze the action buttons so they always sit
     visible at the right. */
  #agents-panel {
    width: 460px !important;
    max-width: calc(100vw - 32px);
  }
  .agent-list li {
    flex-wrap: wrap;
    gap: 6px 10px;
    align-items: center;
  }
  .agent-list .agent-name {
    flex: 1 1 220px;
    min-width: 0;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  /* The two action buttons cluster to the right and never shrink. */
  .agent-list li > button,
  .agent-list li > .export-btn,
  .agent-list li > .delete-btn,
  .agent-list li > [class*="export"],
  .agent-list li > [class*="trash"],
  .agent-list li > [class*="delete"] {
    flex: 0 0 auto;
  }
  </style>
  <!-- /ez-rapp Electron patches ─────────────────────────────────── -->
