name: Simulate Mars

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Run simulation step
        run: python src/main.py --sols 1 --quiet
          
      - name: Commit and push changes
        run: |
          git config --global user.name "Mars Barn Simulation Bot"
          git config --global user.email "bot@marsbarn.ai"
          
          if git diff --quiet state/colony.json; then
            echo "No state changes to commit."
          else
            git add state/colony.json
            git commit -m "chore(sim): auto-advance simulation by 1 sol"
            git push origin main
          fi
