<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Daily Drop — 24 auto-pressed every day</title>
<style>
:root{--bg:#06080d;--ink:#e8edf4;--mut:#8b95a5;--card:#10141d;--line:#1c2433;--pa:#4ade80;--pb:#38bdf8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Helvetica Neue,Arial,sans-serif}
a{color:inherit;text-decoration:none}
#bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:14px 22px;background:#06080df2;border-bottom:1px solid var(--line)}
#bar b{background:linear-gradient(90deg,#fbbf24,#fb7185);-webkit-background-clip:text;background-clip:text;color:transparent}
.sp{flex:1}.btn{border:1px solid #2a3650;background:#182030;border-radius:10px;padding:8px 13px;font-weight:700;font-size:13px;color:var(--ink)}
.wrap{max-width:1000px;margin:0 auto;padding:18px 22px 80px}
h1{font-size:30px;margin:14px 0 2px}.sub{color:var(--mut);margin:0 0 22px}
.day{margin:24px 0}.day h2{font-size:16px;margin:0 0 4px}.day .dm{color:var(--mut);font-size:13px;margin-bottom:12px}
.spectrum{display:grid;grid-template-columns:repeat(12,1fr);gap:8px}
@media(max-width:680px){.spectrum{grid-template-columns:repeat(6,1fr)}}
.slot{aspect-ratio:1;border-radius:12px;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:7px;cursor:default}
.slot.full{cursor:pointer}.slot.full:hover{outline:2px solid #fff6}
.slot .h{font-size:11px;font-weight:800;text-shadow:0 1px 4px #000;z-index:2}
.slot .p{position:absolute;top:6px;right:7px;font-size:9px;font-weight:800;opacity:.85;z-index:2;text-shadow:0 1px 4px #000}
.slot.empty{background:#0c1019;color:#3a4250}.slot.empty .h{color:#3a4250}
.legend{display:flex;gap:14px;color:var(--mut);font-size:12px;margin-top:8px;flex-wrap:wrap}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin-right:5px}
</style></head>
<body>
<div id="bar"><b>◷ The Drop Stream</b><span class="btn" style="padding:3px 9px;font-size:11px;margin-left:4px">one organism per UTC millisecond</span>
  <div class="sp"></div><a class="btn" href="./">Feed</a><a class="btn" href="market.html">Market</a></div>
<style>#stream{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:6px}#stream .slot .h{font-size:10px;letter-spacing:0}#stream .slot .p{font-size:9px;opacity:.8}</style>
<div class="wrap">
  <h1>The Drop Stream</h1>
  <p class="sub" id="streamsub">Every passing millisecond mints one — and only one — globally-unique organism, its DNA seeded by that exact UTC instant. Trolled as fast as the clock allows.</p>
  <div id="stream"></div>
</div>
<script>
function encode(m){ return btoa(unescape(encodeURIComponent(JSON.stringify(m)))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function strip(m){ var o={}; for(var k in m){ if(k[0]!=="_") o[k]=m[k]; } return o; }
function hue(m){ return (m.k&&m.k[0]?m.k[0].h:200); }
async function boot(){
  var data; try{ data=await (await fetch("drops.json?_="+Date.now())).json(); }catch(e){ data={drops:[]}; }
  var ds=(data.drops||[]).filter(function(d){return d.born!=null;}).sort(function(a,b){return b.born-a.born;});
  if(!ds.length){ document.getElementById("stream").innerHTML='<p class="sub">The stream is empty — the troll mints the next burst shortly.</p>'; return; }
  var born=ds.map(function(d){return d.born;}).sort(function(a,b){return a-b;}), gaps=[];
  for(var i=1;i<born.length;i++) gaps.push(born[i]-born[i-1]);
  var finest=gaps.length?Math.min.apply(null,gaps):0, span=((born[born.length-1]-born[0])/1000).toFixed(1);
  document.getElementById("streamsub").innerHTML = ds.length+" globally-unique organisms · finest gap <b style=\"color:var(--pa)\">"+finest+" ms</b> · a "+span+"s slice of time, one creature per instant. Tap any to walk into it.";
  document.getElementById("stream").innerHTML = ds.map(function(m){
    var h=hue(m), iso=((m.drop||{}).born_iso||"").replace("T"," ").replace("+00:00","");
    return '<a class="slot full" href="./?m='+encode(strip(m))+'" style="background:linear-gradient(160deg,hsl('+h+',70%,52%),#0b0f18)">'+
      '<span class="p">'+(m.b||"")+'</span><span class="h">'+iso.slice(11,23)+'</span></a>';
  }).join("");
}
boot();
</script></body></html>
