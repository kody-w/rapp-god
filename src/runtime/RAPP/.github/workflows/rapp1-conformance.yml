name: RAPP1 conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structural-pre-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out target bytes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements-rapp1-core.txt
            rapp_brainstem/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install target-owned test dependencies
        run: >-
          python3 -m pip install
          -r requirements-rapp1-core.txt
          -r rapp_brainstem/requirements.txt
          pytest

      - name: Run canonical structural pre-acceptance gate
        run: python3 tests/run_rapp1_conformance.py
