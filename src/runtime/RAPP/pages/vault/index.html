<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RAPP Vault — Second-brain wiki</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="The RAPP platform's second-brain wiki — founding decisions, architecture moments, removal lessons, and process stories.">
<meta property="og:title" content="RAPP Vault">
<meta property="og:description" content="Second-brain wiki for the RAPP platform. Read in the browser, export as a real Obsidian vault.">
<meta property="og:url" content="https://kody-w.github.io/RAPP/pages/vault/">

<!-- PWA: installable on every desktop + mobile browser, offline-readable. -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#cba6f7" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#6f42c1" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vault">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="icon" href="./icon-192.svg">

<link rel="stylesheet" href="./vault.css">
</head>
<body data-mode="loading" data-view="note">

<aside id="sidebar">
  <header>
    <a class="brand" href="#README.md">
      <span class="dot"></span>
      <span class="brand-text">
        <strong>RAPP Vault</strong>
        <small id="subtitle">Second-brain wiki</small>
      </span>
    </a>
    <input id="search" type="search" placeholder="Search…  ( / )" autocomplete="off">
    <div class="actions">
      <button id="exportBtn" type="button" title="Download as Obsidian-compatible zip">Export</button>
      <button id="importBtn" type="button" title="Import a vault zip">Import</button>
      <button id="resetBtn" type="button" title="Clear local cache and re-fetch from GitHub" hidden>Reset</button>
      <input id="importFile" type="file" accept=".zip" hidden>
    </div>
    <div class="actions secondary">
      <button id="graphBtn" type="button" title="Toggle graph view (g)">Graph</button>
      <button id="readingBtn" type="button" title="Toggle reading mode (m)">Reading</button>
      <button id="randomBtn" type="button" title="Open random note (r)">Random</button>
      <button id="obsidianBtn" type="button" title="Open this note in Obsidian (o)">Obsidian</button>
    </div>
    <div id="modeBanner" class="mode-banner" hidden></div>
  </header>
  <nav id="tree" aria-label="Notes"></nav>
  <footer>
    <a href="../../README.md">← repo</a>
    <span id="noteCount"></span>
  </footer>
</aside>

<header id="mobileHeader" class="mobile-only">
  <button id="navToggle" type="button" aria-label="Toggle navigation">☰</button>
  <span id="breadcrumb">Vault</span>
</header>

<main>
  <article id="note">
    <p class="loading">Loading vault…</p>
  </article>
  <section id="backlinks" hidden>
    <h3>Backlinks</h3>
    <ul id="backlinksList"></ul>
  </section>
  <section id="graph" hidden>
    <h3>Graph view</h3>
    <p class="hint">Click a node to open it. Hover to highlight neighbors.</p>
    <svg id="graphSvg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
  </section>
</main>

<div id="kbHint" class="kb-hint" hidden>
  <kbd>j</kbd>/<kbd>k</kbd> next/prev · <kbd>/</kbd> search · <kbd>g i</kbd> index · <kbd>r</kbd> random · <kbd>m</kbd> reading · <kbd>g</kbd> graph · <kbd>o</kbd> Obsidian · <kbd>?</kbd> close
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="./vault.js"></script>
<script>
  // Register the service worker so the vault is installable + offline-readable.
  // Best-effort — if registration fails the viewer still works fully online.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((err) => {
        console.warn('vault SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
