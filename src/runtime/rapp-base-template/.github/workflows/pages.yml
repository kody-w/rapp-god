name: Deploy Pages explorer

on:
  workflow_run:
    workflows: ["Read-only CI", "Process RAPP Base requests"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  decision:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       (github.event.workflow_run.name == 'Process RAPP Base requests' ||
        github.event.workflow_run.event == 'push'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy: ${{ steps.deployment-decision.outputs.deploy }}
      reason: ${{ steps.deployment-decision.outputs.reason }}
    steps:
      - name: Check out current main for decision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
      - name: Determine deployment need
        id: deployment-decision
        env:
          TRIGGER_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name || '' }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event || '' }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
        shell: bash
        run: |
          set -euo pipefail
          decision="$(
            python3 scripts/pages_deployment.py \
              --event-name "${TRIGGER_EVENT_NAME}" \
              --current-sha "$(git rev-parse HEAD)" \
              --workflow-name "${WORKFLOW_RUN_NAME}" \
              --workflow-event "${WORKFLOW_RUN_EVENT}" \
              --workflow-conclusion "${WORKFLOW_RUN_CONCLUSION}" \
              --workflow-head-sha "${WORKFLOW_RUN_HEAD_SHA}"
          )"
          printf '%s\n' "${decision}" | tee -a "${GITHUB_OUTPUT}"
          {
            printf '### Pages deployment decision\n\n'
            printf '```text\n%s\n```\n' "${decision}"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    needs: decision
    if: ${{ needs.decision.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out current main for deployment
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Verify and prepare
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          REQUIRE_NODE: "1"
        run: |
          make check
          python3 scripts/prepare_pages.py --output .pages
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .pages
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
