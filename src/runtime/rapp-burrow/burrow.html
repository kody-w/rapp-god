<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d12">
<title>Organ Control Room</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{--bg:#0b0d12;--card:#141823;--line:#222838;--txt:#e7ecf5;--dim:#8a93a6;
        --on:#37d399;--obs:#f0a830;--off:#5b6478;--bad:#f0556a;--accent:#6b8afd;}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
       background:radial-gradient(1200px 600px at 50% -10%,#161b2b,var(--bg));color:var(--txt);
       min-height:100vh;padding:max(20px,env(safe-area-inset-top)) 16px 48px}
  .wrap{max-width:600px;margin:0 auto}
  h1{font-size:22px;margin:6px 0 2px;letter-spacing:.3px}
  .host{color:var(--dim);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
  .top{display:flex;align-items:center;gap:12px}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
  .dot.on{background:var(--on);box-shadow:0 0 12px 1px var(--on)}
  .dot.observe{background:var(--obs)} .dot.off{background:var(--off)} .dot.bad{background:var(--bad)}
  .name{font-size:17px;font-weight:650} .icon{font-size:19px}
  .badge{margin-left:auto;font-size:11.5px;font-weight:650;letter-spacing:.4px;padding:4px 10px;border-radius:999px;text-transform:uppercase}
  .badge.on{background:rgba(55,211,153,.14);color:var(--on)} .badge.observe{background:rgba(240,168,48,.14);color:var(--obs)}
  .badge.off{background:rgba(91,100,120,.18);color:var(--dim)} .badge.bad{background:rgba(240,85,106,.14);color:var(--bad)}
  .desc{color:var(--dim);font-size:13px;margin:3px 0 2px 25px}
  .detail{font-size:13px;margin:6px 0 12px 25px;color:#c3ccdb}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-left:25px}
  button{border:0;border-radius:11px;padding:9px 14px;font-size:13.5px;font-weight:620;cursor:pointer;color:#fff}
  .primary{background:linear-gradient(180deg,#6b8afd,#5573e6)}
  .warn{background:#2a2118;color:var(--obs);border:1px solid #3c2f1c}
  .danger{background:#241a1f;color:var(--bad);border:1px solid #3a232c}
  .ghost{background:#1b2233;color:#cfd7e6;border:1px solid var(--line)}
  button:active{transform:translateY(1px)} button:disabled{opacity:.5;cursor:default}
  .note{color:var(--dim);font-size:12px;text-align:center;margin-top:16px;line-height:1.5}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1b2233;border:1px solid var(--line);
         padding:11px 16px;border-radius:11px;font-size:13.5px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎛️ Organ Control Room</h1>
  <div class="host" id="host">connecting…</div>
  <div id="organs"></div>
  <div class="note">Pulled from the global organ repo, served locally. You're in control —
    disable any organ anytime and re-enable later.</div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
const STYLE={primary:'primary',live:'primary',enable:'primary',burrow:'primary',
             observe:'warn',disable:'danger',unburrow:'danger',stop:'danger'};
async function refresh(){
  try{
    const d=await (await fetch('status',{cache:'no-store'})).json();
    $('host').textContent=d.host||'this mac';
    $('organs').innerHTML=(d.organs||[]).map(o=>{
      const st=o.state||'off';
      const btns=(o.controls||[]).map(c=>`<button class="${STYLE[c.control]||'ghost'}"
        onclick="act('${o.key}','${c.control}',this)">${c.label}</button>`).join('');
      return `<div class="card">
        <div class="top"><span class="dot ${st}"></span><span class="icon">${o.icon||'•'}</span>
          <span class="name">${o.name}</span><span class="badge ${st}">${o.state_label||st}</span></div>
        <div class="desc">${o.desc||''}</div>
        <div class="detail">${o.detail||''}</div>
        <div class="btns">${btns}</div></div>`;
    }).join('')||'<div class="card">No organs reported.</div>';
  }catch(e){$('host').textContent='control room offline';}
}
async function act(organ,control,btn){
  if((control==='disable'||control==='unburrow')&&!confirm(`${control} ${organ}?`))return;
  btn.disabled=true;toast(`${control} ${organ}…`);
  try{const r=await fetch('control',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({organ,control})});const d=await r.json();
      toast(d.ok?'done':('err: '+(d.error||'?')));}
  catch(e){toast('failed');}
  setTimeout(()=>{btn.disabled=false;refresh();}, control==='burrow'?9000:1400);
}
refresh();setInterval(refresh,4000);
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
