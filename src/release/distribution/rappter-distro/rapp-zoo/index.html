<!DOCTYPE html>
<!--
  rapp-zoo — local-first Pokédex for digital organisms.

  Lives at rapp-zoo/index.html in the kody-w/RAPP repo so GitHub Pages
  serves it at https://kody-w.github.io/RAPP/rapp-zoo/. Single self-
  contained static page, no build, no backend.

  Storage model — two layers, refresh-survives by design:

    localStorage["rapp_zoo_index"]
      = { schema, version, updated_at,
          organisms: [{ rappid, name, kind, host, kernel_version,
                        exported_at, size_bytes, sprite_seed,
                        added_at }] }
      Metadata only. Renders the grid instantly on first paint without
      waiting for IndexedDB.

    IndexedDB "rapp-zoo" → "eggs" object store
      key = rappid
      value = { rappid, blob: ArrayBuffer, manifest: {...} }
      The actual .egg bytes live here. Larger quota than localStorage
      (typically 50%+ of disk).

  Backup is one click:
    📥 Export → downloads rapp-zoo-collection-<ts>.json containing
       every egg as base64 + the index. Drop the same JSON back via
       📤 Import to restore on a new device.

  Re-uploading a .egg or a JSON updates localStorage so the latest
  upload always survives a refresh.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapp Trapper-Keeper · local-first cartridge collection</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%23ee2c2c'/%3E%3Crect x='4' y='30' width='56' height='4' fill='%23111'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23fff' stroke='%23111' stroke-width='2'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-elevated: #1c2128;
      --border: #30363d;
      --border-subtle: #21262d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-faint: #6e7681;
      --accent: #58a6ff;
      --accent-strong: #1f6feb;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #d2a8ff;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    header .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    header .logo .badge {
      background: rgba(63,185,80,0.12);
      color: var(--green);
      border: 1px solid rgba(63,185,80,0.4);
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    header .stats {
      color: var(--text-muted);
      font-size: 13px;
      margin-left: 8px;
    }
    header .actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      background: linear-gradient(180deg, #1f6feb 0%, #1858c4 100%);
      color: #fff;
      border-color: rgba(31,111,235,0.6);
      box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 4px rgba(0,0,0,0.25);
    }
    .btn.primary:hover { filter: brightness(1.08); color: #fff; }
    .btn.danger:hover { border-color: var(--red); color: var(--red); }

    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-subtle);
    }
    .tab {
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab:hover { color: var(--text); }
    .tab.tab-active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab .count {
      background: rgba(110,118,129,0.2);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .tab.tab-active .count {
      background: rgba(88,166,255,0.18);
      color: var(--accent);
    }

    main {
      flex: 1;
      padding: 24px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* Card grid — fixed column width so cards stay the same size
       regardless of how many fit per row. Otherwise a 3-card row
       stretches each card wider than a 4-card row.  */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 220px);
      gap: 14px;
      justify-content: start;
    }

    /* Sprite cell: two stacked frames; hover animates between them.
       Deterministic per-rappid breathing — same organism, same
       breath pattern, every time. The 1.4s steps(2) keyframes flip
       opacity so the visible frame alternates rest → breath → rest.  */
    .sprite-cell {
      position: relative;
      margin: 0 auto 6px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-elevated);
    }
    .sprite-frame {
      position: absolute; inset: 0;
      transition: opacity 0.12s;
    }
    .sprite-frame.sprite-breath { opacity: 0; }
    .info-card:hover .sprite-frame.sprite-rest,
    .card:hover       .sprite-frame.sprite-rest   { animation: zoo-rest   1.4s steps(2) infinite; }
    .info-card:hover .sprite-frame.sprite-breath,
    .card:hover       .sprite-frame.sprite-breath { animation: zoo-breath 1.4s steps(2) infinite; }
    @keyframes zoo-rest   { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @keyframes zoo-breath { 0%, 50% { opacity: 0; } 50.01%, 100% { opacity: 1; } }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card .sprite {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--bg-elevated);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card .sprite svg { width: 100%; height: 100%; }
    .card .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card .kind {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card .kind-pill {
      background: rgba(88,166,255,0.12);
      color: var(--accent);
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid rgba(88,166,255,0.3);
      font-weight: 600;
    }
    .card .kind-pill.organism    { background: rgba(63,185,80,0.12);  color: var(--green);  border-color: rgba(63,185,80,0.3); }
    .card .kind-pill.rapplication{ background: rgba(210,168,255,0.12); color: var(--purple); border-color: rgba(210,168,255,0.3); }
    .card .kind-pill.variant     { background: rgba(210,153,34,0.12);  color: var(--yellow); border-color: rgba(210,153,34,0.3); }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-muted);
      border: 2px dashed var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.01);
    }
    .empty .big-emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .empty h2 { color: var(--text); font-size: 18px; margin-bottom: 6px; font-weight: 600; }
    .empty p { font-size: 14px; max-width: 480px; line-height: 1.5; margin-bottom: 18px; }
    .empty code { background: rgba(110,118,129,0.16); padding: 1px 6px; border-radius: 4px; font-family: "SF Mono", ui-monospace, monospace; font-size: 12px; }

    /* Drop overlay */
    #drop-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(31,111,235,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      pointer-events: none;
      border: 6px dashed rgba(255,255,255,0.5);
      border-radius: 16px;
      margin: 16px;
      letter-spacing: -0.3px;
    }
    #drop-overlay .big { font-size: 64px; margin-bottom: 12px; }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .modal header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal header h3 { font-size: 16px; flex: 1; margin: 0; }
    .modal .body {
      padding: 20px;
      overflow-y: auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .modal .sprite-big {
      width: 200px; height: 200px;
      border-radius: 12px;
      background: var(--bg-elevated);
      flex-shrink: 0;
    }
    .modal .sprite-big svg { width: 100%; height: 100%; }
    .modal .meta { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 8px; }
    .modal .meta dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 12px;
      font-size: 13px;
    }
    .modal .meta dt { color: var(--text-faint); }
    .modal .meta dd {
      color: var(--text);
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: 12px;
      word-break: break-all;
    }
    .modal .actions-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--red); }
    #toast.success { border-color: var(--green); }

    /* Discover/Starters specific */
    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 18px;
      line-height: 1.55;
    }
    .info-card h3 { font-size: 15px; margin-bottom: 8px; color: var(--text); }
    .info-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .info-card a { color: var(--accent); text-decoration: none; }
    .info-card a:hover { text-decoration: underline; }
    .info-card .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .info-card + .info-card { margin-top: 12px; }
    .footer {
      max-width: 1200px;
      margin: 24px auto 16px;
      padding: 0 24px;
      color: var(--text-faint);
      font-size: 11px;
      text-align: center;
    }
    .footer a { color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <span class="logo">
    📒 Trapper-Keeper
    <span class="badge">local-first</span>
  </span>
  <span class="stats" id="stats">0 organisms</span>
  <div class="actions">
    <button class="btn" onclick="exportCollection()" title="Save your whole collection as a single JSON backup">
      📥 Export
    </button>
    <button class="btn" onclick="document.getElementById('json-import').click()" title="Restore a collection from a previously exported JSON">
      📤 Import
    </button>
    <input type="file" id="json-import" accept=".json,application/json" hidden onchange="importCollectionJson(event)">
    <button class="btn danger" onclick="clearCollection()" title="Wipe local collection">
      🗑 Clear
    </button>
  </div>
</header>

<nav class="tabs">
  <button class="tab tab-active" data-tab="collection" onclick="switchTab('collection')">
    🃏 My Collection <span class="count" id="count-collection">0</span>
  </button>
  <button class="tab" data-tab="starters" onclick="switchTab('starters')">
    🌱 Starters
  </button>
  <button class="tab" data-tab="discover" onclick="switchTab('discover')">
    🛍 Discover
  </button>
</nav>

<main id="main"></main>

<div class="footer">
  Drag any <code style="background:rgba(110,118,129,0.16);padding:1px 6px;border-radius:4px">.egg</code>
  cartridge anywhere on the page to add it to your collection.
  Everything stays in your browser — nothing uploads anywhere.
  ·
  <a href="https://github.com/kody-w/RAPP/tree/main/rapp-zoo" target="_blank" rel="noopener">source</a>
  ·
  <a href="https://github.com/kody-w/RAPP" target="_blank" rel="noopener">RAPP</a>
</div>

<div id="drop-overlay">
  <div class="big">🥚</div>
  Drop the .egg to add to your collection
</div>

<div class="modal-bg" id="card-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="card-modal-inner"></div>
</div>

<div id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────────────
  // Storage layer — two tiers
  //   localStorage["rapp_zoo_index"] = metadata only
  //   IndexedDB "rapp-zoo"."eggs"  = key=rappid, value={blob, manifest}
  // ─────────────────────────────────────────────────────────────

  const SCHEMA = 'rapp-zoo-collection/1.0';
  const LS_KEY = 'rapp_zoo_index';
  const IDB_NAME = 'rapp-zoo';
  const IDB_STORE = 'eggs';

  // Local-only index (metadata). Reads/writes are sync; first paint
  // doesn't wait on IndexedDB. Egg blobs live in IDB.
  function readIndex() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return _emptyIndex();
      const parsed = JSON.parse(raw);
      if (parsed && parsed.schema === SCHEMA && Array.isArray(parsed.organisms)) {
        return parsed;
      }
    } catch {}
    return _emptyIndex();
  }
  function writeIndex(idx) {
    idx.updated_at = new Date().toISOString();
    localStorage.setItem(LS_KEY, JSON.stringify(idx));
  }
  function _emptyIndex() {
    return { schema: SCHEMA, version: 1, updated_at: null, organisms: [] };
  }

  // IndexedDB helpers
  let _dbPromise = null;
  function _db() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE, { keyPath: 'rappid' });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return _dbPromise;
  }
  async function idbPut(rappid, blob, manifest) {
    const db = await _db();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put({ rappid, blob, manifest });
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGet(rappid) {
    const db = await _db();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(rappid);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbDelete(rappid) {
    const db = await _db();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(rappid);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbClear() {
    const db = await _db();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  }

  // ─────────────────────────────────────────────────────────────
  // .egg parsing — every egg is a zip with a manifest.json at root
  // ─────────────────────────────────────────────────────────────
  async function parseEgg(arrayBuffer) {
    const zip = await JSZip.loadAsync(arrayBuffer);
    const manifestEntry = zip.file('manifest.json');
    if (!manifestEntry) throw new Error('not a brainstem egg — no manifest.json at root');
    const manifestText = await manifestEntry.async('string');
    let manifest;
    try { manifest = JSON.parse(manifestText); }
    catch { throw new Error('manifest.json is not valid JSON'); }
    if (!manifest.rappid && !manifest.rapp_id) {
      throw new Error('manifest is missing rappid');
    }
    return manifest;
  }

  function deriveDisplayName(manifest) {
    const r = String(manifest.rappid || '');
    if (manifest.name) return String(manifest.name);
    // Canonical rappid (spec §6.1): rappid:@<owner>/<slug>:<64hex> — the slug
    // is the display name. Everything after ':@', before the ':<hash>'.
    const at = r.split(':@')[1];
    if (at) {
      const loc = at.split(':', 1)[0];            // <owner>/<slug>
      const slug = loc.includes('/') ? loc.split('/')[1] : loc;
      if (slug) return slug;
    }
    return r || 'unnamed';
  }
  function deriveKind(manifest) {
    return (manifest.type || manifest.kind || 'organism').toLowerCase();
  }

  async function ingestEggBlob(arrayBuffer, sourceName) {
    const manifest = await parseEgg(arrayBuffer);
    const rappid = manifest.rappid || manifest.rapp_id;
    const name = deriveDisplayName(manifest);
    const kind = deriveKind(manifest);

    // Persist the blob in IDB (full egg, lossless)
    await idbPut(rappid, arrayBuffer, manifest);

    // Update the localStorage index
    const idx = readIndex();
    const existing = idx.organisms.findIndex(o => o.rappid === rappid);
    const summary = {
      rappid,
      name,
      kind,
      host: manifest.host || null,
      kernel_version: manifest.kernel_version || null,
      exported_at: manifest.exported_at || null,
      size_bytes: arrayBuffer.byteLength,
      added_at: new Date().toISOString(),
      source_name: sourceName || null,
    };
    if (existing >= 0) idx.organisms[existing] = summary;
    else idx.organisms.unshift(summary);
    writeIndex(idx);

    return { rappid, name, kind, replaced: existing >= 0 };
  }

  // ─────────────────────────────────────────────────────────────
  // Sprite generation — deterministic from rappid.
  //
  // 16×16 pixel grid, mirrored across the vertical centerline so
  // every sprite is left/right symmetric. Each rappid produces a
  // unique combination of:
  //   palette       (8 schemes × 4 colors each)
  //   body silhouette (8 templates)
  //   ear/horn/antenna (8 templates, including none)
  //   eyes          (8 styles + 8 horizontal positions)
  //   mouth         (8 styles)
  //   body pattern  (8 patterns: plain, dots, stripes, belly, …)
  //   accent color  (highlight pixels in palette[2])
  // That's >2M unique combinations — collisions are effectively
  // never going to happen for a personal Pokédex.
  // ─────────────────────────────────────────────────────────────
  function hashCode(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  // 64-bit-ish entropy from a string. Returns 4 32-bit ints so we have
  // ~128 bits of uncorrelated randomness to slice into features.
  function _hashStream(str) {
    const a = hashCode(str + ':a');
    const b = hashCode(str + ':b');
    const c = hashCode(str + ':c');
    const d = hashCode(str + ':d');
    return [a, b, c, d];
  }

  // Each palette is 4 colors: [body, body-shadow, accent, eye].
  // Curated for high contrast on dark backgrounds.
  const _SPRITE_PALETTES = [
    ['#ff6b6b', '#c94646', '#ffd166', '#1a1a1a'],
    ['#118ab2', '#0a5d7a', '#06d6a0', '#1a1a1a'],
    ['#ef476f', '#a82851', '#ffd166', '#1a1a1a'],
    ['#7209b7', '#480475', '#3a86ff', '#fff8ff'],
    ['#fb5607', '#b03c00', '#ffbe0b', '#1a1a1a'],
    ['#8338ec', '#5a1fb0', '#ff006e', '#fff8ff'],
    ['#06d6a0', '#048967', '#118ab2', '#1a1a1a'],
    ['#ee2c2c', '#a81818', '#ffd166', '#1a1a1a'],
    ['#3a86ff', '#1f5cc4', '#06d6a0', '#fff8ff'],
    ['#ff8e72', '#c4634b', '#fff5e1', '#1a1a1a'],
    ['#a3d9ff', '#5e9bcc', '#ffb3ff', '#1a1a1a'],
    ['#ffe66d', '#c4ad3a', '#ff6b6b', '#1a1a1a'],
    ['#9b5de5', '#6c2eb5', '#f15bb5', '#fff8ff'],
    ['#00bbf9', '#0085bb', '#fee440', '#1a1a1a'],
    ['#80ed99', '#52b069', '#38a3a5', '#1a1a1a'],
    ['#bdb2ff', '#8a7ce0', '#ffc6ff', '#1a1a1a'],
  ];

  // Each "body" entry is an 8x12 grid (left half of the 16-tall, 16-
  // wide canvas, since right half mirrors). 1 = body, 2 = shadow band,
  // 0 = empty. The grid is positioned starting at row 3, col 0 of the
  // full 16x16 — leaving rows 0-2 for ears/horns and rows 15 for shadow.
  const _BODIES = [
    // round blob
    [
      '00011111',
      '00111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00111111',
      '00111111',
      '00011111',
    ],
    // square block
    [
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00000111',
    ],
    // pear
    [
      '00001111',
      '00011111',
      '00111111',
      '00111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00111111',
      '00011111',
    ],
    // tall slim
    [
      '00111110',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111111',
      '00111110',
    ],
    // egg
    [
      '00011110',
      '00111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00111111',
      '00111110',
    ],
    // mushroom
    [
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00011110',
      '00011111',
      '00011111',
      '00011111',
      '00011111',
      '00011111',
      '00011111',
      '00011111',
    ],
    // squat
    [
      '00000000',
      '00111110',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00111111',
    ],
    // bell
    [
      '00011110',
      '00111110',
      '00111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '01111111',
      '00000111',
    ],
  ];

  // Top-of-head feature on rows 0-2 (ears/horns/antenna). Each entry
  // is a 3x8 left-half block painted on top of the body. 0 = empty,
  // 1 = body color, 2 = accent.
  const _HEADTOPS = [
    // none
    ['00000000','00000000','00000000'],
    // pointed ears
    ['00000010','00000110','00001110'],
    // round ears
    ['00000010','00000110','00000111'],
    // tall horn
    ['00000010','00000010','00000110'],
    // antenna with bulb
    ['00000020','00000010','00000010'],
    // double antennae
    ['00002020','00001010','00001010'],
    // crown points
    ['00010101','00111111','00111111'],
    // long ears (drape down past head start)
    ['00000020','00000220','00000022'],
  ];

  // Eyes: row offset, x-positions (relative to half-grid), eye glyph.
  // Glyph is one of: dot, oval, slash, star, closed.
  const _EYE_STYLES = [
    'dot', 'big', 'slash-up', 'slash-down', 'star', 'closed', 'tiny', 'square',
  ];
  // Mouths: row offset (relative to body top), pattern.
  const _MOUTH_STYLES = [
    'smile', 'frown', 'flat', 'open', 'tongue', 'fangs', 'kiss', 'none',
  ];
  // Body patterns layered on top of the body color.
  const _PATTERNS = [
    'plain', 'belly', 'stripes', 'dots', 'cross', 'diamond', 'tum-stripe', 'spots-2',
  ];

  // phase = 0 (rest) | 1 (breath). Deterministic per-rappid mutation
  // applied at phase 1: eye-blink / mouth-shift / body-squash. The
  // mutation choice is hashed from the rappid so every organism has
  // its own consistent "breathing" pattern.
  function spriteSvg(rappid, kind, phase = 0) {
    const seed = rappid || 'default';
    const [h1, h2, h3, h4] = _hashStream(seed);

    const pal      = _SPRITE_PALETTES[h1 % _SPRITE_PALETTES.length];
    const body     = _BODIES[(h1 >> 4) % _BODIES.length];
    const headtop  = _HEADTOPS[(h2) % _HEADTOPS.length];
    let eyeStyle = _EYE_STYLES[(h2 >> 6) % _EYE_STYLES.length];
    const eyeX     = 1 + ((h2 >> 12) % 3); // 1..3 from center
    let mouth    = _MOUTH_STYLES[(h3) % _MOUTH_STYLES.length];
    const pattern  = _PATTERNS[(h3 >> 6) % _PATTERNS.length];
    const bgHue    = (h4) % 360;
    // Mutation kind: 0 = blink, 1 = mouth-flip, 2 = body-squash.
    const mutation = (h4 >> 4) % 3;
    let bodyOffset = 0;
    if (phase === 1) {
      if (mutation === 0)      eyeStyle = 'closed';
      else if (mutation === 1) mouth = mouth === 'smile' ? 'open' : (mouth === 'flat' ? 'smile' : 'flat');
      else                     bodyOffset = 1; // 1-pixel squash down
    }

    // Build the 16x16 grid. grid[row][col] is the color index for that
    // pixel: 0 = empty, 1 = body, 2 = shadow, 3 = accent, 4 = eye.
    const W = 16, H = 16;
    const grid = Array.from({ length: H }, () => Array(W).fill(0));

    // Helper: paint left half + mirror to right.
    function paintMirror(row, col, val) {
      if (row < 0 || row >= H || col < 0 || col >= 8) return;
      grid[row][col] = val;
      grid[row][W - 1 - col] = val;
    }
    function paintLeft(row, col, val) {
      // Used for left-half-only paints (the right half mirrors via
      // paintMirror). col here is the left-side column 0..7.
      paintMirror(row, col, val);
    }
    function paintCenter(row, col, val) {
      // For pixels on the centerline (col 7, mirrored to 8 — same
      // pixel-pair in mirror).
      if (row < 0 || row >= H) return;
      grid[row][col] = val;
    }

    // 1) Headtop on rows 0..2
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 8; c++) {
        const v = parseInt(headtop[r][c], 10);
        if (v) paintMirror(r, c, v === 2 ? 3 : 1);
      }
    }

    // 2) Body on rows 3..14 (offset down by bodyOffset for breath squash)
    for (let r = 0; r < body.length; r++) {
      const yy = 3 + r + bodyOffset;
      if (yy >= H) break;
      for (let c = 0; c < 8; c++) {
        const v = parseInt(body[r][c], 10);
        if (v) paintMirror(yy, c, 1);
      }
    }

    // 3) Body pattern (overlays on body pixels only)
    function ifBody(r, c, val) { if (grid[r] && grid[r][c] === 1) paintMirror(r, c, val); }
    if (pattern === 'belly') {
      for (let r = 9; r <= 13; r++) for (let c = 4; c <= 7; c++) ifBody(r, c, 2);
    } else if (pattern === 'stripes') {
      for (let r = 5; r <= 13; r += 2) for (let c = 0; c <= 7; c++) ifBody(r, c, 2);
    } else if (pattern === 'dots') {
      for (let r = 6; r <= 12; r += 3) for (let c = 2; c <= 7; c += 3) ifBody(r, c, 3);
    } else if (pattern === 'cross') {
      for (let r = 7; r <= 9; r++) for (let c = 0; c <= 7; c++) ifBody(r, c, 3);
      for (let c = 6; c <= 7; c++) for (let r = 5; r <= 11; r++) ifBody(r, c, 3);
    } else if (pattern === 'diamond') {
      const cx = 7, cy = 9;
      for (let r = 0; r < H; r++) for (let c = 0; c < 8; c++) {
        if (Math.abs(c - cx) + Math.abs(r - cy) === 2) ifBody(r, c, 3);
      }
    } else if (pattern === 'tum-stripe') {
      for (let c = 4; c <= 7; c++) ifBody(10, c, 2);
      for (let c = 4; c <= 7; c++) ifBody(11, c, 2);
    } else if (pattern === 'spots-2') {
      ifBody(6, 5, 3); ifBody(11, 5, 3);
    }
    // 'plain' = no overlay

    // 4) Eyes — row 7, columns relative to centerline
    const eyeRow = 7;
    const eyeC = 7 - eyeX;  // left-half column for the eye
    function setEye(r, c, v) { if (r < H && c >= 0 && c < 8) paintMirror(r, c, v); }
    if (eyeStyle === 'dot') {
      setEye(eyeRow, eyeC, 4);
    } else if (eyeStyle === 'big') {
      setEye(eyeRow, eyeC, 4); setEye(eyeRow + 1, eyeC, 4);
    } else if (eyeStyle === 'slash-up') {
      setEye(eyeRow + 1, eyeC, 4); setEye(eyeRow, eyeC + 1, 4);
    } else if (eyeStyle === 'slash-down') {
      setEye(eyeRow, eyeC, 4); setEye(eyeRow + 1, eyeC + 1, 4);
    } else if (eyeStyle === 'star') {
      setEye(eyeRow, eyeC, 4); setEye(eyeRow + 1, eyeC, 3); setEye(eyeRow, eyeC - 1, 3); setEye(eyeRow - 1, eyeC, 3);
    } else if (eyeStyle === 'closed') {
      setEye(eyeRow, eyeC, 4); setEye(eyeRow, eyeC + 1, 4); setEye(eyeRow, eyeC - 1, 4);
    } else if (eyeStyle === 'tiny') {
      setEye(eyeRow + 1, eyeC, 4);
    } else if (eyeStyle === 'square') {
      setEye(eyeRow, eyeC, 4); setEye(eyeRow + 1, eyeC, 4); setEye(eyeRow, eyeC + 1, 4); setEye(eyeRow + 1, eyeC + 1, 4);
    }

    // 5) Mouth — rows 10-11, centered
    function setMouth(r, c, v) { if (r < H && c >= 0 && c < 8) paintMirror(r, c, v); }
    if (mouth === 'smile') { setMouth(10, 7, 4); setMouth(11, 6, 4); setMouth(11, 5, 4); }
    else if (mouth === 'frown') { setMouth(11, 7, 4); setMouth(10, 6, 4); setMouth(10, 5, 4); }
    else if (mouth === 'flat')  { setMouth(10, 7, 4); setMouth(10, 6, 4); }
    else if (mouth === 'open')  { setMouth(10, 7, 4); setMouth(11, 7, 4); setMouth(11, 6, 4); }
    else if (mouth === 'tongue'){ setMouth(10, 7, 4); setMouth(11, 7, 3); }
    else if (mouth === 'fangs') { setMouth(10, 7, 4); setMouth(11, 7, 4); setMouth(11, 6, 4); setMouth(11, 5, 4); setMouth(12, 6, 4); }
    else if (mouth === 'kiss')  { setMouth(10, 7, 4); }
    // 'none' = blank

    // 6) Render to SVG. Use crispEdges for sharp pixels.
    const colors = [null, pal[0], pal[1], pal[2], pal[3]];
    const rects = [];
    for (let r = 0; r < H; r++) {
      for (let c = 0; c < W; c++) {
        const v = grid[r][c];
        if (!v) continue;
        rects.push(`<rect x="${c}" y="${r}" width="1" height="1" fill="${colors[v]}"/>`);
      }
    }

    // Unique gradient id per (rappid, phase) so two stacked frames in
    // the same DOM don't share an id and clobber each other.
    const gid = 'bg-' + (h1 >>> 0).toString(36) + '-' + (h2 >>> 0).toString(36) + '-p' + phase;
    return `
      <svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet" style="image-rendering:pixelated;display:block">
        <defs>
          <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="hsl(${bgHue},35%,16%)"/>
            <stop offset="100%" stop-color="hsl(${bgHue},35%,7%)"/>
          </linearGradient>
        </defs>
        <rect width="${W}" height="${H}" fill="url(#${gid})"/>
        ${rects.join('')}
      </svg>`;
  }

  // Two-frame breathing rendering. Returns a div containing both
  // sprite frames stacked; CSS hover triggers a 2-step animation that
  // alternates which frame is visible. Same rappid → same breath
  // pattern, every time.
  function spriteCellHTML(rappid, kind, sizePx = 96) {
    const rest   = spriteSvg(rappid, kind, 0);
    const breath = spriteSvg(rappid, kind, 1);
    return `
      <div class="sprite-cell" style="width:${sizePx}px;height:${sizePx}px">
        <div class="sprite-frame sprite-rest">${rest}</div>
        <div class="sprite-frame sprite-breath">${breath}</div>
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────
  // Render
  // ─────────────────────────────────────────────────────────────
  let _activeTab = 'collection';

  function switchTab(tab) {
    _activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('tab-active', t.dataset.tab === tab));
    render();
  }

  function render() {
    const idx = readIndex();
    document.getElementById('stats').textContent =
      `${idx.organisms.length} organism${idx.organisms.length === 1 ? '' : 's'}` +
      (idx.updated_at ? ` · last updated ${new Date(idx.updated_at).toLocaleString()}` : '');
    document.getElementById('count-collection').textContent = idx.organisms.length;

    const main = document.getElementById('main');
    if (_activeTab === 'collection') {
      main.innerHTML = renderCollection(idx);
      // Card click handlers (collection only — starters/discover use
      // their own per-card buttons rather than whole-card clicks)
      main.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => openCard(el.dataset.rappid));
      });
    } else if (_activeTab === 'starters') {
      renderStartersAsync();
    } else if (_activeTab === 'discover') {
      renderDiscoverAsync();
    }
  }

  function renderCollection(idx) {
    if (!idx.organisms.length) {
      return `
        <div class="empty">
          <div class="big-emoji">🥚</div>
          <h2>Your Trapper-Keeper is empty</h2>
          <p>
            Drop a <code>.egg</code> cartridge anywhere on this page to slot it in.
            Eggs come from a brainstem's Export button, from your Trapper-Keeper on
            another machine, or from a friend who AirDropped you their organism.
          </p>
          <p style="margin-top:8px">
            Already have a backup JSON? Click <strong>📤 Import</strong> at the top.
            Want a starter to play with? Open the <strong>🌱 Starters</strong> tab.
          </p>
        </div>`;
    }
    const cards = idx.organisms.map(org => {
      const kindCls = ['organism','rapplication','variant'].includes(org.kind) ? org.kind : 'organism';
      // Sprite cell sized to fill the card column: 220px wide card −
      // 28px padding = ~192px square avatar area.
      return `
        <div class="card" data-rappid="${escapeAttr(org.rappid)}">
          ${spriteCellHTML(org.rappid, org.kind, 192)}
          <div class="name" title="${escapeAttr(org.rappid)}">${escapeHtml(org.name)}</div>
          <div class="kind">
            <span class="kind-pill ${kindCls}">${escapeHtml(org.kind)}</span>
            <span style="margin-left:auto">${formatBytes(org.size_bytes)}</span>
          </div>
        </div>`;
    }).join('');
    return `<div class="grid">${cards}</div>`;
  }

  // ─────────────────────────────────────────────────────────────
  // External data — driven by ./api/v1/index.json so what shows in
  // Starters and Discover is data, not HTML. Updates to the catalog
  // don't require any change to this page.
  // ─────────────────────────────────────────────────────────────
  let _zooApi = null;     // ./api/v1/index.json
  let _storeCatalog = null; // RAPP_Store v1 catalog (lazy)

  async function loadZooApi() {
    if (_zooApi) return _zooApi;
    try {
      const r = await fetch('./api/v1/index.json', { cache: 'no-cache' });
      if (r.ok) _zooApi = await r.json();
    } catch {}
    return _zooApi;
  }

  async function loadStoreCatalog() {
    if (_storeCatalog) return _storeCatalog;
    const api = await loadZooApi();
    const url = (api && api.sources && api.sources.rapp_store) ||
                'https://raw.githubusercontent.com/kody-w/rapp_store/main/api/v1/index.json';
    try {
      const r = await fetch(url, { cache: 'no-cache' });
      if (r.ok) _storeCatalog = await r.json();
    } catch {}
    return _storeCatalog;
  }

  function _rappCardHTML(rapp) {
    // Use the same deterministic sprite generator as bundled starters.
    // Catalog rapps' RAPP_Store sprite URLs (rapp.sprite) are
    // intentionally ignored so every card on the page reads with one
    // visual language. Sprite seed is the rappid (catalog) or id
    // (fallback for entries without a rappid in the v1 thin index).
    const name = escapeHtml(rapp.name || rapp.id);
    const sprite = spriteCellHTML(rapp.rappid || rapp.id || rapp.name || 'unknown',
                                   rapp.kind || 'rapplication', 96);
    const meta = [];
    if (rapp.publisher) meta.push(escapeHtml(rapp.publisher));
    if (rapp.version)   meta.push('v' + escapeHtml(rapp.version));
    if (rapp.category)  meta.push(escapeHtml(rapp.category));
    return `
      <div class="info-card">
        ${sprite}
        <h3 style="text-align:center;margin-bottom:4px">${name}</h3>
        ${meta.length ? `<p style="text-align:center;font-size:11px;color:var(--text-faint)">${meta.join(' · ')}</p>` : ''}
        <div class="row" style="justify-content:center;margin-top:10px">
          ${rapp.egg ? `<a class="btn primary" href="${escapeAttr(rapp.egg)}" download>⬇ Download .egg</a>` : ''}
          ${rapp.url ? `<a class="btn" href="${escapeAttr(rapp.url)}" target="_blank" rel="noopener">Details</a>` : ''}
        </div>
      </div>`;
  }

  function _bundledStarterCardHTML(s) {
    // Same visual treatment as catalog rapps: deterministic pixel-pet
    // sprite generated from the rappid, hover-breathing across two
    // frames. One visual language across the whole page.
    const sprite = spriteCellHTML(s.rappid || ('starter:' + s.id), 'organism', 96);
    return `
      <div class="info-card">
        ${sprite}
        <h3 style="text-align:center;margin-bottom:4px">${escapeHtml(s.name || s.id)}</h3>
        <p style="text-align:center">${escapeHtml(s.tagline || '')}</p>
        <div class="row" style="justify-content:center;margin-top:10px">
          <a class="btn primary" href="${escapeAttr(s.egg)}" download>⬇ Download .egg</a>
        </div>
      </div>`;
  }

  async function renderStartersAsync() {
    const main = document.getElementById('main');
    main.innerHTML = `<div class="empty"><p>Loading starters…</p></div>`;
    const api = await loadZooApi();
    const bundled = (api && Array.isArray(api.starters)) ? api.starters : [];
    const featuredIds = (api && Array.isArray(api.featured_starters)) ? api.featured_starters : [];

    const intro = `
      <div class="info-card">
        <h3>Starter organisms</h3>
        <p>
          Three personalities pre-cooked, plus a curated set from the
          public catalog. Download one, then drop it back here (or onto
          your local brainstem) to hatch. The list below is driven by
          <code>./api/v1/index.json</code> — promote a new one and it
          shows up on next load.
        </p>
      </div>`;

    let bundledSection = '';
    if (bundled.length) {
      bundledSection = `
        <h3 style="margin:18px 0 8px;color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">
          Bundled
        </h3>
        <div class="grid">${bundled.map(_bundledStarterCardHTML).join('')}</div>`;
    }

    let featuredSection = '';
    if (featuredIds.length) {
      const cat = await loadStoreCatalog();
      const all = (cat && Array.isArray(cat.rapplications)) ? cat.rapplications : [];
      const featured = featuredIds.map(id => all.find(r => r.id === id)).filter(Boolean);
      if (featured.length) {
        featuredSection = `
          <h3 style="margin:24px 0 8px;color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">
            From the catalog
          </h3>
          <div class="grid">${featured.map(_rappCardHTML).join('')}</div>`;
      }
    }

    if (!bundledSection && !featuredSection) {
      main.innerHTML = `${intro}
        <div class="empty" style="margin-top:14px">
          <div class="big-emoji">🌱</div>
          <h2>No starters featured yet</h2>
          <p>Browse the full <strong>Discover</strong> tab to find rapplications you can drop into your collection right now.</p>
          <a class="btn primary" onclick="switchTab('discover')" style="margin-top:6px;cursor:pointer">🛍 Open Discover</a>
        </div>`;
      return;
    }
    main.innerHTML = intro + bundledSection + featuredSection;
  }

  async function renderDiscoverAsync() {
    const main = document.getElementById('main');
    main.innerHTML = `<div class="empty"><p>Loading catalog…</p></div>`;
    const cat = await loadStoreCatalog();
    if (!cat || !Array.isArray(cat.rapplications)) {
      main.innerHTML = `
        <div class="empty">
          <div class="big-emoji">🌐</div>
          <h2>Couldn't reach the catalog</h2>
          <p>
            <code>${escapeHtml((_zooApi && _zooApi.sources && _zooApi.sources.rapp_store) || 'rapp_store')}</code>
            didn't respond. Try again in a moment, or
            <a href="https://kody-w.github.io/RAPP_Store/" target="_blank" rel="noopener">browse the store directly</a>.
          </p>
        </div>`;
      return;
    }
    const rapps = cat.rapplications;
    const intro = `
      <div class="info-card">
        <h3>🛍 RAPP_Store catalog</h3>
        <p>
          ${rapps.length} cataloged rapplication${rapps.length === 1 ? '' : 's'}.
          Each entry has its own <code>.egg</code> — download and drop it
          on the page to add it to your collection, or hatch directly into
          your local brainstem.
        </p>
        <div class="row">
          <a class="btn" href="https://kody-w.github.io/RAPP_Store/" target="_blank" rel="noopener">Open store →</a>
          <a class="btn" href="${escapeAttr((_zooApi && _zooApi.sources && _zooApi.sources.rapp_store) || '#')}" target="_blank" rel="noopener">Source JSON</a>
        </div>
      </div>`;
    main.innerHTML = `${intro}<div class="grid" style="margin-top:14px">${rapps.map(_rappCardHTML).join('')}</div>`;
  }

  // ─────────────────────────────────────────────────────────────
  // Card detail modal
  // ─────────────────────────────────────────────────────────────
  async function openCard(rappid) {
    const idx = readIndex();
    const org = idx.organisms.find(o => o.rappid === rappid);
    if (!org) return;
    const inner = document.getElementById('card-modal-inner');
    const kindCls = ['organism','rapplication','variant'].includes(org.kind) ? org.kind : 'organism';
    inner.innerHTML = `
      <header>
        <h3>${escapeHtml(org.name)}</h3>
        <span class="kind-pill ${kindCls}" style="font-size:10px;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.4px">${escapeHtml(org.kind)}</span>
        <button class="btn" onclick="closeModal()" style="padding:4px 10px">✕</button>
      </header>
      <div class="body">
        <div class="sprite-big">${spriteSvg(org.rappid, org.kind)}</div>
        <div class="meta">
          <dl>
            <dt>RAPPID</dt><dd>${escapeHtml(org.rappid)}</dd>
            ${org.host ? `<dt>Host</dt><dd>${escapeHtml(org.host)}</dd>` : ''}
            ${org.kernel_version ? `<dt>Kernel</dt><dd>v${escapeHtml(org.kernel_version)}</dd>` : ''}
            ${org.exported_at ? `<dt>Exported</dt><dd>${escapeHtml(new Date(org.exported_at).toLocaleString())}</dd>` : ''}
            <dt>Added</dt><dd>${escapeHtml(new Date(org.added_at).toLocaleString())}</dd>
            <dt>Size</dt><dd>${formatBytes(org.size_bytes)}</dd>
          </dl>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn primary" onclick="downloadEgg('${escapeAttr(org.rappid)}')">⬇ Re-export .egg</button>
        <button class="btn" onclick="hatchInLocalBrainstem('${escapeAttr(org.rappid)}')">🧠 Hatch in localhost brainstem</button>
        <button class="btn danger" onclick="removeOrganism('${escapeAttr(org.rappid)}')" style="margin-left:auto">🗑 Remove</button>
      </div>`;
    document.getElementById('card-modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('card-modal').classList.remove('open');
  }

  async function downloadEgg(rappid) {
    const rec = await idbGet(rappid);
    if (!rec) { toast('Egg blob missing — try re-importing the collection JSON', 'error'); return; }
    const idx = readIndex();
    const org = idx.organisms.find(o => o.rappid === rappid);
    const slug = (org && org.name ? org.name : rappid)
      .replace(/[^a-zA-Z0-9@._-]/g, '-')
      .replace(/-+/g, '-').replace(/^-|-$/g, '');
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    const fname = `${slug}__${stamp}Z.egg`;
    const blob = new Blob([rec.blob], { type: 'application/zip' });
    triggerDownload(blob, fname);
    toast(`Downloaded ${fname}`, 'success');
  }

  async function hatchInLocalBrainstem(rappid) {
    const rec = await idbGet(rappid);
    if (!rec) { toast('Egg blob missing', 'error'); return; }
    const b64 = await blobToBase64(new Blob([rec.blob]));
    const ports = ['7071', '7072'];
    let ok = false;
    for (const port of ports) {
      try {
        const r = await fetch(`http://localhost:${port}/api/snapshot/import`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: rappid + '.egg', content_b64: b64 }),
        });
        if (r.ok) {
          const d = await r.json();
          if (d.status === 'ok') {
            toast(`Hatched into brainstem on :${port}`, 'success');
            ok = true;
            break;
          }
        }
      } catch {}
    }
    if (!ok) {
      toast('No brainstem reachable on localhost:7071 / :7072 — start one and retry', 'error');
    }
  }

  async function removeOrganism(rappid) {
    if (!confirm('Remove this organism from your collection? The egg will be deleted from local storage.')) return;
    await idbDelete(rappid);
    const idx = readIndex();
    idx.organisms = idx.organisms.filter(o => o.rappid !== rappid);
    writeIndex(idx);
    closeModal();
    render();
    toast('Removed');
  }

  // ─────────────────────────────────────────────────────────────
  // Drag-drop ingest
  // ─────────────────────────────────────────────────────────────
  const dropOverlay = document.getElementById('drop-overlay');
  let _dragCounter = 0;
  window.addEventListener('dragenter', (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
      _dragCounter++;
      dropOverlay.style.display = 'flex';
    }
  });
  window.addEventListener('dragover', (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
      e.preventDefault();
    }
  });
  window.addEventListener('dragleave', () => {
    _dragCounter = Math.max(0, _dragCounter - 1);
    if (_dragCounter === 0) dropOverlay.style.display = 'none';
  });
  window.addEventListener('drop', async (e) => {
    e.preventDefault();
    _dragCounter = 0;
    dropOverlay.style.display = 'none';
    const files = e.dataTransfer ? e.dataTransfer.files : null;
    if (!files || !files.length) return;
    let added = 0, failed = 0, replaced = 0;
    for (const f of files) {
      const lower = f.name.toLowerCase();
      if (lower.endsWith('.json')) {
        // JSON drag = collection import
        try { await importCollectionFile(f); added++; }
        catch (err) { failed++; toast(`Import failed: ${err.message}`, 'error'); }
        continue;
      }
      if (!(lower.endsWith('.egg') || lower.endsWith('.zip'))) {
        toast(`Skipped ${f.name} — not a .egg`, 'error');
        failed++;
        continue;
      }
      try {
        const buf = await f.arrayBuffer();
        const r = await ingestEggBlob(buf, f.name);
        added++;
        if (r.replaced) replaced++;
      } catch (err) {
        failed++;
        toast(`${f.name}: ${err.message}`, 'error');
      }
    }
    render();
    if (added) toast(`Added ${added}${replaced ? ` (${replaced} replaced)` : ''}`, 'success');
  });

  // ─────────────────────────────────────────────────────────────
  // Collection import / export — single JSON, base64 inline blobs
  // ─────────────────────────────────────────────────────────────
  async function exportCollection() {
    const idx = readIndex();
    if (!idx.organisms.length) { toast('Nothing to export — collection is empty', 'error'); return; }
    const out = { schema: SCHEMA, version: 1, exported_at: new Date().toISOString(), organisms: [] };
    for (const org of idx.organisms) {
      const rec = await idbGet(org.rappid);
      out.organisms.push({
        ...org,
        manifest: rec ? rec.manifest : null,
        egg_b64: rec ? await arrayBufferToBase64(rec.blob) : null,
      });
    }
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    triggerDownload(blob, `rapp-zoo-collection-${stamp}Z.json`);
    toast(`Exported ${idx.organisms.length} organism${idx.organisms.length === 1 ? '' : 's'}`, 'success');
  }

  function importCollectionJson(event) {
    const f = event.target.files && event.target.files[0];
    if (!f) return;
    event.target.value = '';
    importCollectionFile(f).catch(err => toast(`Import failed: ${err.message}`, 'error'));
  }
  async function importCollectionFile(file) {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed || parsed.schema !== SCHEMA || !Array.isArray(parsed.organisms)) {
      throw new Error('not a rapp-zoo collection JSON');
    }
    const idx = readIndex();
    let added = 0, replaced = 0;
    for (const org of parsed.organisms) {
      if (!org.rappid) continue;
      const existing = idx.organisms.findIndex(o => o.rappid === org.rappid);
      const summary = {
        rappid: org.rappid,
        name: org.name || deriveDisplayName({ rappid: org.rappid }),
        kind: org.kind || 'organism',
        host: org.host || null,
        kernel_version: org.kernel_version || null,
        exported_at: org.exported_at || null,
        size_bytes: org.size_bytes || 0,
        added_at: org.added_at || new Date().toISOString(),
        source_name: org.source_name || null,
      };
      if (existing >= 0) { idx.organisms[existing] = summary; replaced++; }
      else { idx.organisms.unshift(summary); added++; }
      if (org.egg_b64) {
        try {
          const buf = base64ToArrayBuffer(org.egg_b64);
          await idbPut(org.rappid, buf, org.manifest || null);
        } catch {}
      }
    }
    writeIndex(idx);
    render();
    toast(`Imported ${added + replaced} organism${added + replaced === 1 ? '' : 's'} (${replaced} replaced)`, 'success');
  }

  async function clearCollection() {
    const idx = readIndex();
    if (!idx.organisms.length) { toast('Already empty'); return; }
    if (!confirm(`Empty this Trapper-Keeper? All ${idx.organisms.length} organisms will be removed locally. Export first if you want a backup.`)) return;
    await idbClear();
    localStorage.removeItem(LS_KEY);
    render();
    toast('Collection cleared');
  }

  // ─────────────────────────────────────────────────────────────
  // Tiny helpers
  // ─────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
  }
  function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
  function formatBytes(n) {
    if (!n) return '—';
    if (n < 1024) return n + ' B';
    if (n < 1024*1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / 1024 / 1024).toFixed(2) + ' MB';
  }
  function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  async function arrayBufferToBase64(buf) {
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }
  function base64ToArrayBuffer(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }
  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => {
        const s = String(r.result || '');
        const i = s.indexOf(',');
        resolve(i >= 0 ? s.slice(i + 1) : s);
      };
      r.onerror = () => reject(r.error);
      r.readAsDataURL(blob);
    });
  }
  let _toastTimer = null;
  function toast(msg, kind) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.remove('error','success');
    if (kind) el.classList.add(kind);
    el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // Esc closes modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Initial render — localStorage gives us the cards immediately, no
  // wait for IndexedDB. The blobs only get pulled when the user opens
  // a card or triggers an export.
  render();
</script>
</body>
</html>
