name: RAPP drift lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out drift lint
        uses: actions/checkout@v4
        with:
          repository: kody-w/rapp-drift-lint
          path: .rapp-drift-lint
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run drift lint
        env:
          GITHUB_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node .rapp-drift-lint/lint.mjs --path .
